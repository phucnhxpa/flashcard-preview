<script>
const DATA={"selected":[{"question":"In the binomial expansion of $(2 - 3x)^6$, find the coefficient of the $x^3$ term. Explain how to avoid missing exponent-pair contributions.","answer":"The general term is $\\binom{6}{k}(2)^{6-k}(-3x)^k$. For $x^3$, $k=3$. The term is $\\binom{6}{3}(2)^3(-3)^3 x^3 = 20 \\times 8 \\times (-27) x^3 = -4320x^3$. To avoid errors, calculate the numerical coefficient and the $x$ power separately: $(-3)^3 = -27$ provides the sign and exponent, while $2^3=8$ provides the paired coefficient. The coefficient is $-4320$.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_1","tags":["WMA12","P2","past-paper review"],"judge_pick":true},{"question":"Find the coefficient of $x^3$ in the expansion of $(1 + 2x)^5(1 - x)^4$ in ascending powers of $x$.","answer":"Expand each factor up to $x^3$:\n$(1 + 2x)^5 = 1 + 10x + 40x^2 + 80x^3 + \\cdots$\n$(1 - x)^4 = 1 - 4x + 6x^2 - 4x^3 + \\cdots$\nThe $x^3$ term in the product arises from four exponent-pair contributions:\n$(1)(-4x^3) + (10x)(6x^2) + (40x^2)(-4x) + (80x^3)(1)$\n$= -4 + 60 - 160 + 80 = -24$\nThe coefficient of $x^3$ is $-24$.","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_1","tags":["WMA12","P2","past-paper review"],"judge_pick":true},{"question":"In the expansion of $(1+x)^n$, where $n$ is a positive integer, the coefficient of $x^2$ is $28$. Find the value of $n$.","answer":"$\\binom{n}{2}=\\dfrac{n(n-1)}{2}=28\\Rightarrow n(n-1)=56\\Rightarrow n=8$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_1","tags":["WMA12","P2","past-paper review"],"judge_pick":true},{"question":"Find the coefficient of $x^3$ in the expansion of $\\left(2 - \\dfrac{x}{4}\\right)^{10}$, giving your answer as an exact fraction. Show how you identify the correct term of $\\binom{10}{r}a^{10-r}b^{r}$.","answer":"General term: $\\binom{10}{r}(2)^{10-r}\\left(-\\dfrac{x}{4}\\right)^{r}$. For $x^3$ need $r=3$: $\\binom{10}{3}\\cdot 2^{7}\\cdot\\left(-\\tfrac14\\right)^{3}=120\\cdot 128\\cdot\\left(-\\tfrac{1}{64}\\right)=-240$. So the coefficient is $-240$. Common error: omitting the sign or using the wrong $r$ ‚ÄĒ always match the exponent of $x$ to $r$.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_1","tags":["WMA12","P2","past-paper review"],"judge_pick":true},{"question":"An arithmetic series has $u_6 = 2$ and $S_{10} = -80$. Find the first term $a$ and common difference $d$, then determine the smallest integer $n$ for which $S_n > 8000$. Show your method clearly.","answer":"$u_6 = a + 5d = 2$. $S_{10} = \\frac{10}{2}(2a + 9d) = -80 \\Rightarrow 2a + 9d = -16$. Solving simultaneously: $2(2 - 5d) + 9d = -16 \\Rightarrow 4 - d = -16 \\Rightarrow d = 20$. Then $a = 2 - 5(20) = -98$. For $S_n > 8000$: $\\frac{n}{2}(-196 + (n-1)20) > 8000 \\Rightarrow 10n^2 - 106n - 8000 > 0$. Solving $10n^2 - 106n - 8000 = 0$ gives $n \\approx 34.3$. Since $n$ must be an integer and $S_n$ is increasing for $n > 34.3$, the smallest integer is $n = 35$.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_2","tags":["WMA12","P2","past-paper review"],"judge_pick":true},{"question":"In an arithmetic series, the 6th term is $2$ and the sum of the first $10$ terms is $-80$. Find the first term $a$ and the common difference $d$.","answer":"Using $u_n = a + (n-1)d$ and $S_n = \\frac{n}{2}(2a + (n-1)d)$:\n$u_6 = a + 5d = 2 \\quad \\cdots (1)$\n$S_{10} = \\frac{10}{2}(2a + 9d) = 5(2a + 9d) = -80 \\implies 2a + 9d = -16 \\quad \\cdots (2)$\nFrom (1): $a = 2 - 5d$. Substitute into (2):\n$2(2 - 5d) + 9d = -16 \\implies 4 - 10d + 9d = -16 \\implies d = 20$\n$a = 2 - 5(20) = -98$\nSo $a = -98$ and $d = 20$.","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_2","tags":["WMA12","P2","past-paper review"],"judge_pick":true},{"question":"An arithmetic series has $u_6=2$ and $S_{10}=-80$. (a) Find $a$ and $d$. (b) Hence find the smallest positive integer $n$ such that $S_n>8000$.","answer":"$a+5d=2$ and $5(2a+9d)=-80\\Rightarrow 2a+9d=-16$. Solving gives $d=20$, $a=-98$. $S_n=\\dfrac{n}{2}\\bigl(2(-98)+(n-1)(20)\\bigr)=10n^2-108n$. $10n^2-108n>8000\\Rightarrow 5n^2-54n-4000>0$. Roots $n=\\dfrac{54\\pm\\sqrt{82916}}{10}\\approx\\dfrac{54\\pm 287.95}{10}$, so $n>34.195$. Smallest $n=35$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_2","tags":["WMA12","P2","past-paper review"],"judge_pick":true},{"question":"An arithmetic series has $u_6 = 2$ and $S_{10} = -80$. Find the first term $a$ and common difference $d$.","answer":"$u_6 = a+5d = 2$. $S_{10} = \\tfrac{10}{2}(2a+9d) = 5(2a+9d) = -80 \\Rightarrow 2a+9d = -16$. From the first equation $a = 2-5d$; substituting: $2(2-5d)+9d = -16 \\Rightarrow 4 - d = -16 \\Rightarrow d = 20$, so $a = 2 - 100 = -98$. Check: $S_{10} = 5(-196+180) = 5(-16) = -80$ ‚úď. Presentation: write both equations before solving simultaneously.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_2","tags":["WMA12","P2","past-paper review"],"judge_pick":true},{"question":"Given $f(x) = \\log_3(5 - 2x)$, state the domain of $f(x)$ and explain the mathematical reasoning behind this restriction.","answer":"The domain is $x < \\frac{5}{2}$. The argument of a logarithm must be strictly positive, so $5 - 2x > 0$. Solving this inequality gives $-2x > -5$, which yields $x < \\frac{5}{2}$.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_3","tags":["WMA12","P2","past-paper review"],"judge_pick":true},{"question":"An arithmetic series has first term $a = -98$ and common difference $d = 20$. Find the smallest positive integer $n$ such that $S_n > 8000$.","answer":"$S_n = \\frac{n}{2}[2(-98) + (n-1)(20)] = \\frac{n}{2}(20n - 216) = n(10n - 108) = 10n^2 - 108n$\nSet $10n^2 - 108n > 8000 \\implies 5n^2 - 54n - 4000 > 0$\n$n = \\frac{54 \\pm \\sqrt{54^2 + 4(5)(4000)}}{10} = \\frac{54 \\pm \\sqrt{82916}}{10} \\approx \\frac{54 + 287.95}{10} \\approx 34.20$\nSince $n$ must be a positive integer, $n \\geq 35$.\nCheck: $S_{34} = 34(340 - 108) = 7888 < 8000$ and $S_{35} = 35(350 - 108) = 8470 > 8000$.\nThe smallest integer is $n = 35$.","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_3","tags":["WMA12","P2","past-paper review"],"judge_pick":true},{"question":"State the range of values of $x$ for which $\\log_3(2x-1)+\\log_3(x+7)$ is defined.","answer":"Need $2x-1>0$ and $x+7>0$, i.e. $x>\\tfrac12$ and $x>-7$. Therefore $x>\\tfrac12$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_3","tags":["WMA12","P2","past-paper review"],"judge_pick":true},{"question":"Continuing Q2 with $a=-98$, $d=20$: find the smallest value of $n$ for which $S_n > 8000$, showing all method and confirming your final integer answer.","answer":"$S_n = \\tfrac{n}{2}\\left(2(-98)+(n-1)(20)\\right) = \\tfrac{n}{2}(20n-216) = 10n^2 - 108n > 8000$. So $10n^2 - 108n - 8000 > 0$, i.e. $5n^2 - 54n - 4000 > 0$. Roots: $n = \\dfrac{54 \\pm \\sqrt{2916 + 80000}}{10} = \\dfrac{54 \\pm \\sqrt{82916}}{10} \\approx \\dfrac{54 \\pm 287.95}{10}$, giving $n \\approx 34.2$ (reject negative root). Since the parabola opens upward, $S_n > 8000$ for $n > 34.2$, so smallest integer $n = 35$. Check: $S_{34} = 10(1156) - 108(34) = 11560 - 3672 = 7888 < 8000$; $S_{35} = 12250 - 3780 = 8470 > 8000$ ‚úď.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_3","tags":["WMA12","P2","past-paper review"],"judge_pick":true}],"models":{"glm_1":{"label":"GLM 5.2 ‚Ď†","cards":[{"question":"In the binomial expansion of $(2 - 3x)^6$, find the coefficient of the $x^3$ term. Explain how to avoid missing exponent-pair contributions.","answer":"The general term is $\\binom{6}{k}(2)^{6-k}(-3x)^k$. For $x^3$, $k=3$. The term is $\\binom{6}{3}(2)^3(-3)^3 x^3 = 20 \\times 8 \\times (-27) x^3 = -4320x^3$. To avoid errors, calculate the numerical coefficient and the $x$ power separately: $(-3)^3 = -27$ provides the sign and exponent, while $2^3=8$ provides the paired coefficient. The coefficient is $-4320$.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_1","tags":["WMA12","P2","past-paper review"]},{"question":"An arithmetic series has $u_6 = 2$ and $S_{10} = -80$. Find the first term $a$ and common difference $d$, then determine the smallest integer $n$ for which $S_n > 8000$. Show your method clearly.","answer":"$u_6 = a + 5d = 2$. $S_{10} = \\frac{10}{2}(2a + 9d) = -80 \\Rightarrow 2a + 9d = -16$. Solving simultaneously: $2(2 - 5d) + 9d = -16 \\Rightarrow 4 - d = -16 \\Rightarrow d = 20$. Then $a = 2 - 5(20) = -98$. For $S_n > 8000$: $\\frac{n}{2}(-196 + (n-1)20) > 8000 \\Rightarrow 10n^2 - 106n - 8000 > 0$. Solving $10n^2 - 106n - 8000 = 0$ gives $n \\approx 34.3$. Since $n$ must be an integer and $S_n$ is increasing for $n > 34.3$, the smallest integer is $n = 35$.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_2","tags":["WMA12","P2","past-paper review"]},{"question":"Given $f(x) = \\log_3(5 - 2x)$, state the domain of $f(x)$ and explain the mathematical reasoning behind this restriction.","answer":"The domain is $x < \\frac{5}{2}$. The argument of a logarithm must be strictly positive, so $5 - 2x > 0$. Solving this inequality gives $-2x > -5$, which yields $x < \\frac{5}{2}$.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_3","tags":["WMA12","P2","past-paper review"]},{"question":"A polynomial $P(x) = ax^3 + bx^2 - 5$ leaves a remainder of $3$ when divided by $(x-1)$, and a remainder of $-15$ when divided by $(x+2)$. Distinguish between the Remainder and Factor theorems, and set up the equations to find $a$ and $b$.","answer":"The Factor Theorem states $(x-c)$ is a factor if $P(c)=0$. The Remainder Theorem states the remainder upon division by $(x-c)$ is $P(c)$. Here, $P(1) = 3 \\Rightarrow a(1)^3 + b(1)^2 - 5 = 3 \\Rightarrow a + b = 8$. Also, $P(-2) = -15 \\Rightarrow a(-2)^3 + b(-2)^2 - 5 = -15 \\Rightarrow -8a + 4b = -10$. These two simultaneous equations can be solved to find $a$ and $b$.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_4","tags":["WMA12","P2","past-paper review"]},{"question":"Solve the inequality $\\frac{3x - 1}{x^2 + 4} \\ge 1$. Explain why you do not need to reverse the inequality sign when multiplying by the denominator.","answer":"First, note that $x^2 + 4 > 0$ for all real $x$. Because the denominator is always strictly positive, multiplying both sides by $x^2 + 4$ does not reverse the inequality sign. This gives $3x - 1 \\ge x^2 + 4 \\Rightarrow x^2 - 3x + 5 \\le 0$. The discriminant is $b^2 - 4ac = 9 - 20 = -11 < 0$, meaning the quadratic has no real roots and is always positive. Thus, there are no real solutions.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_5","tags":["WMA12","P2","past-paper review"]},{"question":"Use the trapezium rule with $4$ ordinates to estimate $\\int_1^4 \\frac{1}{\\sqrt{x+2}} \\, dx$. State the values of $h$ and the $x$-ordinates used.","answer":"With $4$ ordinates, there are $n = 3$ intervals. Step size $h = \\frac{4-1}{3} = 1$. The $x$-ordinates are $x_0=1, x_1=2, x_2=3, x_3=4$. The $y$-values are $y_0=\\frac{1}{\\sqrt{3}}$, $y_1=\\frac{1}{2}$, $y_2=\\frac{1}{\\sqrt{5}}$, $y_3=\\frac{1}{\\sqrt{6}}$. Area $\\approx \\frac{1}{2}h [y_0 + y_3 + 2(y_1 + y_2)] = \\frac{1}{2}(1) \\left[ \\frac{1}{\\sqrt{3}} + \\frac{1}{\\sqrt{6}} + 2\\left(\\frac{1}{2} + \\frac{1}{\\sqrt{5}}\\right) \\right] \\approx 1.42$.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_6","tags":["WMA12","P2","past-paper review"]},{"question":"A circle has equation $x^2 + y^2 - 8x + 6y - 11 = 0$. Find the exact radius of the circle and the exact distance from the centre to the point $(0, 0)$.","answer":"Complete the square: $(x-4)^2 + (y+3)^2 = 36$. The centre is $C(4, -3)$ and the exact radius is $r = \\sqrt{36} = 6$. The distance from $C(4, -3)$ to $(0, 0)$ is $d = \\sqrt{(4-0)^2 + (-3-0)^2} = \\sqrt{16 + 9} = \\sqrt{25} = 5$. Exact answers must be left in surd or integer form, not converted to decimals.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_7","tags":["WMA12","P2","past-paper review"]},{"question":"In a greenhouse model, the temperature $T$ (in $^\\circ$C) after $t$ minutes is $T = 15 + 10\\sin(0.5t^\\circ)$. Find the temperature after $12$ minutes, giving your answer to $1$ decimal place. What calculator mode must be used?","answer":"The angle is given in degrees, so the calculator must be in DEGREE mode. Substitute $t = 12$: $T = 15 + 10\\sin(0.5 \\times 12^\\circ) = 15 + 10\\sin(6^\\circ)$. $\\sin(6^\\circ) \\approx 0.1045$. Thus, $T \\approx 15 + 10(0.1045) = 16.045$. Rounded to $1$ decimal place, the temperature is $16.0^\\circ$C. Always include units in the final answer.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_8","tags":["WMA12","P2","past-paper review"]},{"question":"A curve $y = x(x-4)^2$ has a stationary point at $x = \\frac{4}{3}$. The area between the curve and the x-axis from $x=0$ to $x=4$ is found by integrating. Explain how to handle signed areas and why a diagram might lead to rejecting a root.","answer":"The curve crosses the x-axis at $x=0$ and $x=4$. Between $0$ and $4$, $(x-4)^2$ is positive and $x$ is positive, so $y \\ge 0$. The integral $\\int_0^4 x(x-4)^2 \\, dx$ gives the direct area. If solving for an unknown limit $k$ where the area is a specific value, you must ensure $k$ lies within the valid bounds of the region (e.g., $0 \\le k \\le 4$). A root outside this interval is diagram-invalid and must be rejected.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_9","tags":["WMA12","P2","past-paper review"]},{"question":"A geometric sequence models a population where $t=0$ corresponds to the initial year. The initial population is $5000$ and the common ratio is $1.04$. Write the formula for the population $P$ at year $t$, and find the population at $t=5$.","answer":"Because $t=0$ is the initial year, the first term $a = P_0 = 5000$. The formula is $P_t = 5000(1.04)^t$. For $t=5$, $P_5 = 5000(1.04)^5 = 5000 \\times 1.21665 \\approx 6083$. Note that if $t=0$ is the start, $t=5$ is the 6th term, so the exponent is exactly $t$, not $t-1$.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_10","tags":["WMA12","P2","past-paper review"]},{"question":"A quadratic equation $kx^2 + 4x - 2 = 0$ has two distinct real roots. Find the range of values for $k$. What happens if $k=0$?","answer":"For two distinct real roots, the discriminant must be strictly positive: $b^2 - 4ac > 0$. Here, $4^2 - 4(k)(-2) > 0 \\Rightarrow 16 + 8k > 0 \\Rightarrow 8k > -16 \\Rightarrow k > -2$. However, for it to be a quadratic, $k \\neq 0$. If $k=0$, the equation becomes linear ($4x - 2 = 0$), which has exactly one real root. Thus, the range is $k > -2, k \\neq 0$.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_11","tags":["WMA12","P2","past-paper review"]},{"question":"When expanding $(1 + px)^n$ up to the term in $x^3$, the coefficients of $x^2$ and $x^3$ are $24$ and $-32$ respectively. Set up the equations to find $n$ and $p$, and state how to present the final answer.","answer":"The expansion is $1 + n(px) + \\frac{n(n-1)}{2}(px)^2 + \\frac{n(n-1)(n-2)}{6}(px)^3$. Equating coefficients: $\\frac{n(n-1)}{2}p^2 = 24$ and $\\frac{n(n-1)(n-2)}{6}p^3 = -32$. Divide the second by the first: $\\frac{(n-2)}{3}p = \\frac{-32}{24} \\Rightarrow (n-2)p = -4$. Solve this alongside the first equation to find $n$ and $p$. Present the final values clearly as $n = \\dots, p = \\dots$.","source":"GLM 5.2 ‚Ď†","_id":"glm_1_12","tags":["WMA12","P2","past-paper review"]}]},"qwen_1":{"label":"Qwen 3.7 Max ‚Ď†","cards":[{"question":"Find the coefficient of $x^3$ in the expansion of $(1 + 2x)^5(1 - x)^4$ in ascending powers of $x$.","answer":"Expand each factor up to $x^3$:\n$(1 + 2x)^5 = 1 + 10x + 40x^2 + 80x^3 + \\cdots$\n$(1 - x)^4 = 1 - 4x + 6x^2 - 4x^3 + \\cdots$\nThe $x^3$ term in the product arises from four exponent-pair contributions:\n$(1)(-4x^3) + (10x)(6x^2) + (40x^2)(-4x) + (80x^3)(1)$\n$= -4 + 60 - 160 + 80 = -24$\nThe coefficient of $x^3$ is $-24$.","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_1","tags":["WMA12","P2","past-paper review"]},{"question":"In an arithmetic series, the 6th term is $2$ and the sum of the first $10$ terms is $-80$. Find the first term $a$ and the common difference $d$.","answer":"Using $u_n = a + (n-1)d$ and $S_n = \\frac{n}{2}(2a + (n-1)d)$:\n$u_6 = a + 5d = 2 \\quad \\cdots (1)$\n$S_{10} = \\frac{10}{2}(2a + 9d) = 5(2a + 9d) = -80 \\implies 2a + 9d = -16 \\quad \\cdots (2)$\nFrom (1): $a = 2 - 5d$. Substitute into (2):\n$2(2 - 5d) + 9d = -16 \\implies 4 - 10d + 9d = -16 \\implies d = 20$\n$a = 2 - 5(20) = -98$\nSo $a = -98$ and $d = 20$.","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_2","tags":["WMA12","P2","past-paper review"]},{"question":"An arithmetic series has first term $a = -98$ and common difference $d = 20$. Find the smallest positive integer $n$ such that $S_n > 8000$.","answer":"$S_n = \\frac{n}{2}[2(-98) + (n-1)(20)] = \\frac{n}{2}(20n - 216) = n(10n - 108) = 10n^2 - 108n$\nSet $10n^2 - 108n > 8000 \\implies 5n^2 - 54n - 4000 > 0$\n$n = \\frac{54 \\pm \\sqrt{54^2 + 4(5)(4000)}}{10} = \\frac{54 \\pm \\sqrt{82916}}{10} \\approx \\frac{54 + 287.95}{10} \\approx 34.20$\nSince $n$ must be a positive integer, $n \\geq 35$.\nCheck: $S_{34} = 34(340 - 108) = 7888 < 8000$ and $S_{35} = 35(350 - 108) = 8470 > 8000$.\nThe smallest integer is $n = 35$.","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_3","tags":["WMA12","P2","past-paper review"]},{"question":"Solve $\\log_3(x) + \\log_3(x - 2) = 1$, stating the domain restriction and rejecting any invalid solutions.","answer":"Domain requires $x > 0$ and $x - 2 > 0$, so $x > 2$.\nCombine using log laws: $\\log_3[x(x - 2)] = 1 \\implies x(x - 2) = 3^1 = 3$\n$x^2 - 2x - 3 = 0 \\implies (x - 3)(x + 1) = 0 \\implies x = 3$ or $x = -1$\nSince $x > 2$, reject $x = -1$.\nThe only solution is $x = 3$.\nCheck: $\\log_3(3) + \\log_3(1) = 1 + 0 = 1$. ‚úď","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_4","tags":["WMA12","P2","past-paper review"]},{"question":"Let $f(x) = 2x^3 + 3x^2 + ax + b$. Given that $(x + 2)$ is a factor of $f(x)$ and that $f(1) = 12$, find $a$ and $b$. Hence factorise $f(x)$ completely and use the discriminant to determine the nature of the roots of $f(x) = 0$.","answer":"Factor Theorem: $(x + 2)$ is a factor $\\implies f(-2) = 0$:\n$2(-8) + 3(4) - 2a + b = 0 \\implies b - 2a = 4 \\quad \\cdots (1)$\nRemainder Theorem: $f(1) = 12$:\n$2 + 3 + a + b = 12 \\implies a + b = 7 \\quad \\cdots (2)$\nFrom (2): $b = 7 - a$. Substitute into (1): $7 - a - 2a = 4 \\implies a = 1,\\; b = 6$.\n$f(x) = 2x^3 + 3x^2 + x + 6 = (x + 2)(2x^2 - x + 3)$\nDiscriminant of $2x^2 - x + 3$: $\\Delta = (-1)^2 - 4(2)(3) = 1 - 24 = -23 < 0$.\nThe quadratic has no real roots, so $f(x) = 0$ has exactly one real root: $x = -2$.","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_5","tags":["WMA12","P2","past-paper review"]},{"question":"Solve $\\dfrac{2x + 1}{x - 3} \\geq 4$. Explain why you cannot simply multiply both sides by $(x - 3)$.","answer":"You cannot multiply by $(x - 3)$ because its sign is unknown: if $x - 3 < 0$, the inequality direction would reverse, and if $x - 3 > 0$, it would stay the same. Instead, rearrange:\n$\\frac{2x + 1}{x - 3} - 4 \\geq 0 \\implies \\frac{2x + 1 - 4(x - 3)}{x - 3} \\geq 0 \\implies \\frac{13 - 2x}{x - 3} \\geq 0$\nCritical values: $x = 3$ (denominator zero, excluded) and $x = \\frac{13}{2}$ (numerator zero).\nSign analysis:\n- $x < 3$: $(+)/(-) < 0$ ‚úó\n- $3 < x < \\frac{13}{2}$: $(+)/(+) > 0$ ‚úď\n- $x > \\frac{13}{2}$: $(-)/(+) < 0$ ‚úó\nAt $x = \\frac{13}{2}$: expression $= 0 \\geq 0$ ‚úď\nSolution: $3 < x \\leq \\dfrac{13}{2}$.","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_6","tags":["WMA12","P2","past-paper review"]},{"question":"Use the trapezium rule with $4$ strips to estimate $\\displaystyle\\int_0^2 \\sqrt{x^2 + 1}\\;\\mathrm{d}x$, giving your answer to $3$ decimal places.","answer":"$h = \\frac{2 - 0}{4} = 0.5$. The $5$ ordinates are:\n\n| $x$ | $0$ | $0.5$ | $1$ | $1.5$ | $2$ |\n|---|---|---|---|---|---|\n| $y = \\sqrt{x^2+1}$ | $1$ | $\\sqrt{1.25} \\approx 1.11803$ | $\\sqrt{2} \\approx 1.41421$ | $\\sqrt{3.25} \\approx 1.80278$ | $\\sqrt{5} \\approx 2.23607$ |\n\n$T = \\frac{h}{2}\\big[y_0 + y_4 + 2(y_1 + y_2 + y_3)\\big]$\n$= \\frac{0.5}{2}\\big[1 + 2.23607 + 2(1.11803 + 1.41421 + 1.80278)\\big]$\n$= 0.25\\big[3.23607 + 2(4.33502)\\big] = 0.25 \\times 11.90611 = 2.97653$\n$T \\approx 2.977$ (to $3$ d.p.).","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_7","tags":["WMA12","P2","past-paper review"]},{"question":"The circle $C$ has equation $x^2 + y^2 + 4x - 6y - 12 = 0$. (a) Find the exact centre and exact radius. (b) Find the exact shortest distance from the centre to the line $4x + 3y - 5 = 0$. Give all answers in exact form (no decimals).","answer":"(a) Complete the square:\n$(x + 2)^2 - 4 + (y - 3)^2 - 9 - 12 = 0 \\implies (x + 2)^2 + (y - 3)^2 = 25$\nCentre $= (-2,\\, 3)$, radius $= 5$ (exact integer, not $5.0$).\n(b) Distance from $(-2, 3)$ to $4x + 3y - 5 = 0$:\n$d = \\frac{|4(-2) + 3(3) - 5|}{\\sqrt{4^2 + 3^2}} = \\frac{|-8 + 9 - 5|}{\\sqrt{25}} = \\frac{|-4|}{5} = \\frac{4}{5}$\nThe exact distance is $\\dfrac{4}{5}$.","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_8","tags":["WMA12","P2","past-paper review"]},{"question":"The temperature $T\\,^\\circ\\text{C}$ in a greenhouse is modelled by $T = 20 - 5\\cos\\!\\left(\\dfrac{\\pi t}{12}\\right)$ for $0 \\leq t \\leq 24$, where $t$ is hours after midnight. (a) Find the maximum temperature and the time it first occurs. (b) Find all values of $t$ for which $T = 17.5\\,^\\circ\\text{C}$. State the required calculator mode.","answer":"Calculator must be in **radian mode** since the argument is $\\frac{\\pi t}{12}$.\n(a) $T$ is maximised when $\\cos\\!\\left(\\frac{\\pi t}{12}\\right) = -1$:\n$T_{\\max} = 20 - 5(-1) = 25\\,^\\circ\\text{C}$\n$\\frac{\\pi t}{12} = \\pi \\implies t = 12$ (first occurs at noon).\n(b) $20 - 5\\cos\\!\\left(\\frac{\\pi t}{12}\\right) = 17.5 \\implies \\cos\\!\\left(\\frac{\\pi t}{12}\\right) = 0.5$\n$\\frac{\\pi t}{12} = \\frac{\\pi}{3} \\implies t = 4$\n$\\frac{\\pi t}{12} = 2\\pi - \\frac{\\pi}{3} = \\frac{5\\pi}{3} \\implies t = 20$\n$T = 17.5\\,^\\circ\\text{C}$ at $t = 4$ hours and $t = 20$ hours.","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_9","tags":["WMA12","P2","past-paper review"]},{"question":"The curve $C$ has equation $y = 6x^2 - x^3$. (a) Find the coordinates and nature of each stationary point. (b) Find the exact area enclosed between $C$ and the $x$-axis.","answer":"(a) $\\frac{\\mathrm{d}y}{\\mathrm{d}x} = 12x - 3x^2 = 3x(4 - x) = 0 \\implies x = 0$ or $x = 4$.\nAt $x = 0$: $y = 0$, $\\frac{\\mathrm{d}^2y}{\\mathrm{d}x^2} = 12 > 0 \\implies$ local minimum at $(0,\\, 0)$.\nAt $x = 4$: $y = 6(16) - 64 = 32$, $\\frac{\\mathrm{d}^2y}{\\mathrm{d}x^2} = 12 - 24 = -12 < 0 \\implies$ local maximum at $(4,\\, 32)$.\n(b) $x$-axis crossings: $x^2(6 - x) = 0 \\implies x = 0$ and $x = 6$. For $0 \\leq x \\leq 6$, $y \\geq 0$.\n$\\text{Area} = \\int_0^6 (6x^2 - x^3)\\,\\mathrm{d}x = \\left[2x^3 - \\frac{x^4}{4}\\right]_0^6 = 2(216) - \\frac{1296}{4} = 432 - 324 = 108$\nThe exact area is $108$ square units.","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_10","tags":["WMA12","P2","past-paper review"]},{"question":"A bacteria colony has $500$ cells at $t = 0$ hours and grows by $8\\%$ per hour, modelled by a geometric sequence. (a) Write an expression for the population at time $t$. (b) Find the smallest integer $t$ for which the population exceeds $2000$.","answer":"(a) Since $t = 0$ gives the initial value, the indexing is $P(t) = ar^t$ (not $ar^{t-1}$):\n$P(t) = 500 \\times 1.08^t$\n(b) $500 \\times 1.08^t > 2000 \\implies 1.08^t > 4$\nTaking logarithms: $t \\ln(1.08) > \\ln(4) \\implies t > \\frac{\\ln 4}{\\ln 1.08} \\approx \\frac{1.38629}{0.07696} \\approx 18.014$\nSmallest integer $t = 19$.\nCheck: $P(18) = 500 \\times 1.08^{18} \\approx 1998 < 2000$; $P(19) = 500 \\times 1.08^{19} \\approx 2158 > 2000$. ‚úď","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_11","tags":["WMA12","P2","past-paper review"]},{"question":"State the Remainder Theorem and the Factor Theorem. For $f(x) = 3x^3 - 5x^2 + 2x + k$, find $k$ if: (a) the remainder when $f(x)$ is divided by $(x - 1)$ is $4$; (b) $(x + 1)$ is a factor of $f(x)$. Explain why setting $f(1) = 0$ in part (a) would be an error.","answer":"**Remainder Theorem:** When $f(x)$ is divided by $(x - a)$, the remainder is $f(a)$.\n**Factor Theorem:** $(x - a)$ is a factor of $f(x)$ if and only if $f(a) = 0$ (a special case of the Remainder Theorem where the remainder is zero).\n(a) Remainder is $4$, so apply the Remainder Theorem: $f(1) = 4$:\n$3(1) - 5(1) + 2(1) + k = 4 \\implies k = 4$\n(b) $(x + 1) = (x - (-1))$ is a factor, so apply the Factor Theorem: $f(-1) = 0$:\n$3(-1) - 5(1) + 2(-1) + k = 0 \\implies -10 + k = 0 \\implies k = 10$\nSetting $f(1) = 0$ in part (a) would wrongly assume $(x - 1)$ is a factor. The problem states the remainder is $4 \\neq 0$, so $(x - 1)$ is **not** a factor; only the Remainder Theorem applies.","source":"Qwen 3.7 Max ‚Ď†","_id":"qwen_1_12","tags":["WMA12","P2","past-paper review"]}]},"minimax_2":{"label":"MiniMax M3 ‚Ď°","cards":[{"question":"In the expansion of $(1+x)^n$, where $n$ is a positive integer, the coefficient of $x^2$ is $28$. Find the value of $n$.","answer":"$\\binom{n}{2}=\\dfrac{n(n-1)}{2}=28\\Rightarrow n(n-1)=56\\Rightarrow n=8$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_1","tags":["WMA12","P2","past-paper review"]},{"question":"An arithmetic series has $u_6=2$ and $S_{10}=-80$. (a) Find $a$ and $d$. (b) Hence find the smallest positive integer $n$ such that $S_n>8000$.","answer":"$a+5d=2$ and $5(2a+9d)=-80\\Rightarrow 2a+9d=-16$. Solving gives $d=20$, $a=-98$. $S_n=\\dfrac{n}{2}\\bigl(2(-98)+(n-1)(20)\\bigr)=10n^2-108n$. $10n^2-108n>8000\\Rightarrow 5n^2-54n-4000>0$. Roots $n=\\dfrac{54\\pm\\sqrt{82916}}{10}\\approx\\dfrac{54\\pm 287.95}{10}$, so $n>34.195$. Smallest $n=35$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_2","tags":["WMA12","P2","past-paper review"]},{"question":"State the range of values of $x$ for which $\\log_3(2x-1)+\\log_3(x+7)$ is defined.","answer":"Need $2x-1>0$ and $x+7>0$, i.e. $x>\\tfrac12$ and $x>-7$. Therefore $x>\\tfrac12$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_3","tags":["WMA12","P2","past-paper review"]},{"question":"Use the discriminant to show that the line $y=2x-1$ does not intersect the curve $y=x^2+x+4$.","answer":"Equating: $2x-1=x^2+x+4\\Rightarrow x^2-x+5=0$. Discriminant $\\Delta=(-1)^2-4(1)(5)=-19<0$. Since $\\Delta<0$, the quadratic has no real roots, so the line does not meet the curve.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_4","tags":["WMA12","P2","past-paper review"]},{"question":"Find the set of values of $x$ for which $x^2-3x-10>0$.","answer":"$(x-5)(x+2)>0\\Rightarrow x<-2$ or $x>5$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_5","tags":["WMA12","P2","past-paper review"]},{"question":"A trapezium has parallel sides of lengths $5\\text{ cm}$ and $11\\text{ cm}$, and its area is $48\\text{ cm}^2$. Find the perpendicular distance between the parallel sides.","answer":"$A=\\tfrac12(a+b)h\\Rightarrow 48=\\tfrac12(5+11)h=8h\\Rightarrow h=6\\text{ cm}$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_6","tags":["WMA12","P2","past-paper review"]},{"question":"Find the centre and radius of the circle $x^2+y^2+10x-8y-8=0$.","answer":"Completing the square: $(x+5)^2+(y-4)^2=8+25+16=49$. Centre $(-5,4)$, radius $7$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_7","tags":["WMA12","P2","past-paper review"]},{"question":"The temperature $T$ in a greenhouse, in $^\\circ$C, $t$ hours after midnight, is modelled by $T=18+8\\sin(15t)^\\circ$. Find the maximum temperature and the value of $t$ when this first occurs.","answer":"$\\sin(15t)=1$ when $15t=90$, so $t=6$. $T_{\\max}=18+8=26^\\circ$C, first occurring at $t=6$ hours.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_8","tags":["WMA12","P2","past-paper review"]},{"question":"The curve $y=2x-x^2$ and the $x$-axis enclose a region. The line $x=k$ divides this region into two parts of equal area. Find the value of $k$.","answer":"Total area $=\\displaystyle\\int_0^2(2x-x^2)\\,dx=\\left[x^2-\\tfrac{x^3}{3}\\right]_0^2=4-\\tfrac83=\\tfrac43$. Half $=\\tfrac23$. $\\displaystyle\\int_0^k(2x-x^2)\\,dx=k^2-\\tfrac{k^3}{3}=\\tfrac23\\Rightarrow k^3-3k^2+2=0\\Rightarrow(k-1)(k^2-2k-2)=0$. Since $0<k<2$, $k=1$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_9","tags":["WMA12","P2","past-paper review"]},{"question":"The number of insects in a colony is modelled by $N_t=30\\times 1.5^t$, where $t$ is the number of weeks after observations begin. Find the number of insects at $t=0$.","answer":"$N_0=30\\times 1.5^0=30\\times 1=30$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_10","tags":["WMA12","P2","past-paper review"]},{"question":"A geometric series has first term $4$ and common ratio $3$. Find the sum of the first $6$ terms.","answer":"$S_6=\\dfrac{4(3^6-1)}{3-1}=\\dfrac{4\\times 728}{2}=1456$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_11","tags":["WMA12","P2","past-paper review"]},{"question":"Solve $2\\sin\\theta-1=0$ for $0^\\circ\\le\\theta\\le 360^\\circ$.","answer":"$\\sin\\theta=0.5\\Rightarrow\\theta=30^\\circ$ or $\\theta=150^\\circ$.","source":"MiniMax M3 ‚Ď°","_id":"minimax_2_12","tags":["WMA12","P2","past-paper review"]}]},"kimi_1":{"label":"Kimi K3 ‚Ď†","cards":[{"question":"Find the coefficient of $x^3$ in the expansion of $\\left(2 - \\dfrac{x}{4}\\right)^{10}$, giving your answer as an exact fraction. Show how you identify the correct term of $\\binom{10}{r}a^{10-r}b^{r}$.","answer":"General term: $\\binom{10}{r}(2)^{10-r}\\left(-\\dfrac{x}{4}\\right)^{r}$. For $x^3$ need $r=3$: $\\binom{10}{3}\\cdot 2^{7}\\cdot\\left(-\\tfrac14\\right)^{3}=120\\cdot 128\\cdot\\left(-\\tfrac{1}{64}\\right)=-240$. So the coefficient is $-240$. Common error: omitting the sign or using the wrong $r$ ‚ÄĒ always match the exponent of $x$ to $r$.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_1","tags":["WMA12","P2","past-paper review"]},{"question":"An arithmetic series has $u_6 = 2$ and $S_{10} = -80$. Find the first term $a$ and common difference $d$.","answer":"$u_6 = a+5d = 2$. $S_{10} = \\tfrac{10}{2}(2a+9d) = 5(2a+9d) = -80 \\Rightarrow 2a+9d = -16$. From the first equation $a = 2-5d$; substituting: $2(2-5d)+9d = -16 \\Rightarrow 4 - d = -16 \\Rightarrow d = 20$, so $a = 2 - 100 = -98$. Check: $S_{10} = 5(-196+180) = 5(-16) = -80$ ‚úď. Presentation: write both equations before solving simultaneously.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_2","tags":["WMA12","P2","past-paper review"]},{"question":"Continuing Q2 with $a=-98$, $d=20$: find the smallest value of $n$ for which $S_n > 8000$, showing all method and confirming your final integer answer.","answer":"$S_n = \\tfrac{n}{2}\\left(2(-98)+(n-1)(20)\\right) = \\tfrac{n}{2}(20n-216) = 10n^2 - 108n > 8000$. So $10n^2 - 108n - 8000 > 0$, i.e. $5n^2 - 54n - 4000 > 0$. Roots: $n = \\dfrac{54 \\pm \\sqrt{2916 + 80000}}{10} = \\dfrac{54 \\pm \\sqrt{82916}}{10} \\approx \\dfrac{54 \\pm 287.95}{10}$, giving $n \\approx 34.2$ (reject negative root). Since the parabola opens upward, $S_n > 8000$ for $n > 34.2$, so smallest integer $n = 35$. Check: $S_{34} = 10(1156) - 108(34) = 11560 - 3672 = 7888 < 8000$; $S_{35} = 12250 - 3780 = 8470 > 8000$ ‚úď.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_3","tags":["WMA12","P2","past-paper review"]},{"question":"State the largest possible domain of $f(x) = \\ln(5 - 2x)$ and justify your answer.","answer":"The logarithm requires a strictly positive argument: $5 - 2x > 0 \\Rightarrow x < \\tfrac52$. Domain: $\\{x \\in \\mathbb{R} : x < \\tfrac52\\}$. Error-prevention: the inequality is strict ($\\ln 0$ is undefined, not zero), and $\\ln$ of a negative number is not real.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_4","tags":["WMA12","P2","past-paper review"]},{"question":"When $f(x) = 2x^3 + ax^2 + bx - 6$ is divided by $(x-2)$ the remainder is $10$, and $(x+1)$ is a factor of $f(x)$. Explain the difference between the remainder theorem and the factor theorem, then find $a$ and $b$.","answer":"Remainder theorem: remainder when dividing by $(x-c)$ is $f(c)$; factor theorem is the special case where the remainder is $0$. So $f(2) = 10$: $16 + 4a + 2b - 6 = 10 \\Rightarrow 4a + 2b = 0 \\Rightarrow 2a + b = 0$. Factor: $f(-1) = 0$: $-2 + a - b - 6 = 0 \\Rightarrow a - b = 8$. Adding: $3a = 8 \\Rightarrow a = \\tfrac83$, $b = -\\tfrac{16}{3}$. Key distinction: use $f(c) = r$ for a nonzero remainder, $f(c) = 0$ only for a factor.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_5","tags":["WMA12","P2","past-paper review"]},{"question":"A quadratic $x^2 + bx + c$ is a factor of a cubic $f(x)$. State the condition on the discriminant $b^2 - 4ac$ of the quadratic factor that guarantees the cubic has exactly one real root, and explain why.","answer":"Since the quadratic divides the cubic exactly, $f(x) = (x^2+bx+c)(x - r)$ for some real $r$, giving one real root $x = r$. The other roots come from $x^2+bx+c=0$; for no further real roots need $b^2 - 4c < 0$ (negative discriminant). Then the cubic has exactly one real root. Check: strict inequality ‚ÄĒ $b^2-4c=0$ would give a repeated real root.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_6","tags":["WMA12","P2","past-paper review"]},{"question":"Solve $\\dfrac{6}{x+1} > x - 2$, stating why you may or may not multiply through by $(x+1)$ without reversing the inequality, and give the solution set.","answer":"$(x+1)$ can be negative, so multiplying directly is invalid without cases; safer to rearrange: $\\dfrac{6}{x+1} - (x-2) > 0 \\Rightarrow \\dfrac{6 - (x-2)(x+1)}{x+1} > 0 \\Rightarrow \\dfrac{8 + x - x^2}{x+1} > 0$, i.e. $\\dfrac{-(x-4)(x+2)}{x+1} > 0$. Critical values $x = -2, -1, 4$. Sign analysis: positive on $(-\\infty, -2) \\cup (-1, 4)$. Solution: $x < -2$ or $-1 < x < 4$. Exam point: always justify sign of any divisor before multiplying, and exclude $x = -1$ (undefined).","source":"Kimi K3 ‚Ď†","_id":"kimi_1_7","tags":["WMA12","P2","past-paper review"]},{"question":"Use the trapezium rule with 4 strips to estimate $\\displaystyle\\int_0^2 \\sqrt{1+x^3}\\,dx$, giving your answer to 3 decimal places. State the formula you use.","answer":"$h = \\tfrac{2-0}{4} = 0.5$. Ordinates: $y_0 = \\sqrt{1} = 1$, $y_1 = \\sqrt{1.125} \\approx 1.060660$, $y_2 = \\sqrt{2} \\approx 1.414214$, $y_3 = \\sqrt{4.375} \\approx 2.091650$, $y_4 = \\sqrt{9} = 3$. Estimate $= \\tfrac{h}{2}\\left[y_0 + y_4 + 2(y_1+y_2+y_3)\\right] = 0.25\\left[1 + 3 + 2(4.566524)\\right] = 0.25(13.133048) \\approx 3.283$. Keep full precision in working; round only at the end.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_8","tags":["WMA12","P2","past-paper review"]},{"question":"A circle has equation $x^2 + y^2 - 6x + 4y - 12 = 0$. Find the exact radius and the exact distance from the centre to the point $(8, 3)$, leaving answers in surd form (no decimals).","answer":"Complete the square: $(x-3)^2 - 9 + (y+2)^2 - 4 - 12 = 0 \\Rightarrow (x-3)^2 + (y+2)^2 = 25$. Centre $(3, -2)$, radius $r = 5$ (exact). Distance to $(8,3)$: $d = \\sqrt{(8-3)^2 + (3-(-2))^2} = \\sqrt{25+25} = \\sqrt{50} = 5\\sqrt{2}$. Since $5\\sqrt{2} > 5$, the point lies outside the circle. \"Exact\" means surd form, not $7.07$.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_9","tags":["WMA12","P2","past-paper review"]},{"question":"A greenhouse model gives temperature $T = 18 + 6\\sin(15t + 30)^\\circ$ where $t$ is hours after midnight. Find the first time after midnight when $T = 21$, giving your answer in hours and minutes, and state the calculator mode required.","answer":"Calculator must be in degree mode. $21 = 18 + 6\\sin(15t+30)^\\circ \\Rightarrow \\sin(15t+30)^\\circ = \\tfrac12$. Principal value: $15t + 30 = 30 \\Rightarrow t = 0$ (this is midnight, the starting point). Next solution: $15t + 30 = 180 - 30 = 150 \\Rightarrow t = 8$. So the first time strictly after midnight is $t = 8$, i.e. 08:00. Check: $\\sin 150^\\circ = \\tfrac12$ ‚úď. Watch units: angle in degrees, time in hours; round time sensibly to the minute.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_10","tags":["WMA12","P2","past-paper review"]},{"question":"A curve $y = f(x)$ has $\\dfrac{dy}{dx} = 3x^2 - 12x$. The line $x = a$ (with $a > 0$) splits the region between the curve and the $x$-axis from $x=0$ to $x=4$ into two equal signed areas. Explain why signed area matters, find the stationary points, and set up the equation for $a$, rejecting any root outside the valid range.","answer":"Stationary points: $3x^2 - 12x = 0 \\Rightarrow x = 0, 4$. $\\int f'(x)\\,dx = x^3 - 6x^2$, so take $f(x) = x^3 - 6x^2$ (constant cancels in areas). Equal signed areas: $\\int_0^a f\\,dx = \\tfrac12\\int_0^4 f\\,dx$. Total: $\\left[\\tfrac{x^4}{4} - 2x^3\\right]_0^4 = 64 - 128 = -64$, so half is $-32$. Then $\\tfrac{a^4}{4} - 2a^3 = -32 \\Rightarrow a^4 - 8a^3 + 128 = 0$. Try $a=2$: $16 - 64 + 128 = 80 \\neq 0$; $a=4$: $256 - 512 + 128 = -128$; solving numerically gives $a \\approx 3.6$ in $(0,4)$. Any root outside $[0,4]$ is diagram-invalid and must be rejected. Signed area matters because the curve is below the axis, so raw integrals are negative ‚ÄĒ \"equal areas\" must be interpreted consistently.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_11","tags":["WMA12","P2","past-paper review"]},{"question":"A geometric sequence models a value at time $t$ by $u_t = 500(1.06)^t$ where $t = 0$ corresponds to the start of 2024. In which year does the value first exceed $1000$? Explain the effect of indexing from $t=0$.","answer":"Need $500(1.06)^t > 1000 \\Rightarrow (1.06)^t > 2 \\Rightarrow t > \\dfrac{\\ln 2}{\\ln 1.06} \\approx \\dfrac{0.6931}{0.05827} \\approx 11.90$. Smallest integer $t = 12$. Since $t = 0$ is the start of 2024, $t = 12$ is the start of 2036. Check: $500(1.06)^{11} \\approx 949 < 1000$; $500(1.06)^{12} \\approx 1006 > 1000$ ‚úď. Indexing pitfall: with $t=0$ as the first term, the year is $2024 + t$, not $2024 + t - 1$.","source":"Kimi K3 ‚Ď†","_id":"kimi_1_12","tags":["WMA12","P2","past-paper review"]}]}},"meta":{"glm_1":{"model":"z-ai/glm-5.2","provider":"OpenRouter","temperature":0.25,"in_tokens":315,"out_tokens":5935,"finish_reason":"stop","attempt":1,"elapsed_seconds":52.5,"requested":12,"delivered":12},"qwen_1":{"model":"qwen/qwen3.7-max","provider":"OpenRouter","temperature":0.25,"in_tokens":329,"out_tokens":18206,"finish_reason":"stop","attempt":1,"elapsed_seconds":330.12,"requested":12,"delivered":12},"minimax_2":{"model":"minimax/minimax-m3","provider":"OpenRouter","temperature":0.15,"in_tokens":341,"out_tokens":19402,"finish_reason":"stop","attempt":2,"elapsed_seconds":217.04,"requested":12,"delivered":12},"kimi_1":{"model":"moonshotai/kimi-k3","provider":"OpenRouter","temperature":0.25,"in_tokens":392,"out_tokens":2802,"finish_reason":"stop","attempt":1,"elapsed_seconds":88.07,"requested":12,"delivered":12}}};
const SK='wma12_may2024_direct_selection_v1';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">‚ÄĘ ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">‚ÄĘ ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'‚ÄĒ'}
function fC(n){return n!=null?'‚ā¨'+n.toFixed(4):'‚ÄĒ'}
function fT(s){if(!s)return'‚ÄĒ';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">ūüďĆ My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">‚ú® Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'‚ÄĒ'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'‚ÄĒ'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'‚ÄĒ'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">ūüďč</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('ūüďč '+myCards.length+' cards copied ‚ÄĒ paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('./__notion_unavailable__',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('‚ÄĒ')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error ‚Üí clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
