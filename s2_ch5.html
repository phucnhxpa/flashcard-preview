<script>
const DATA={"selected": [{"question": "A continuous uniform distribution over $$[a, b]$$ has a p.d.f. that is constant on that interval. Why must that constant equal $$\\frac{1}{b-a}$$, and what would go wrong if it were any other value? (2 steps)", "answer": "- Step 1: The total probability over all values must equal 1. For a continuous distribution, this means the integral of the p.d.f. over its entire domain equals 1. For a uniform p.d.f. that is constant $$k$$ on $$[a,b]$$ and 0 elsewhere, the integral becomes $$\\int_a^b k \\, dx = k(b-a)$$.\n- Step 2: Setting $$k(b-a) = 1$$ forces $$k = \\frac{1}{b-a}$$. If $$k$$ were larger, the total area under the curve would exceed 1 (impossible for a probability). If $$k$$ were smaller, the total area would be less than 1, meaning some probability mass is \"missing\" — the distribution would not account for all possible outcomes.\n\nThe p.d.f. height is entirely determined by the width of the interval: a wider interval means a shorter rectangle, and vice versa.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "For $$X \\sim U[a,b]$$, explain why all outcomes are \"equally likely\" even though each specific point has probability zero. (3 steps)", "answer": "- Step 1: \"Equally likely\" doesn't mean each point has equal probability (they all have zero). It means every *equal-length sub-interval* has the same probability.\n- Step 2: So $$P(2 < X < 2.1) = P(3 < X < 3.1)$$ for $$X \\sim U[0, 10]$$ — both sub-intervals have width 0.1 and equal probability 0.01.\n- Step 3: This is captured formally by the constant PDF $$f(x) = \\frac{1}{b-a}$$, which doesn't depend on $$x$$.\n\nAlways interpret \"equally likely\" for continuous distributions as \"equal density,\" not \"equal point probability.\" Think intervals, not points.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Describe the shape of the PDF of $$X \\sim U[a,b]$$ and how its features visually represent the distribution. (3 steps)", "answer": "- Step 1: On a horizontal axis, the PDF is zero outside $$[a,b]$$ — flat on the floor.\n- Step 2: Inside $$[a, b]$$, the PDF is a horizontal line at height $$\\frac{1}{b-a}$$ — a \"flat roof.\"\n- Step 3: The overall shape is a rectangle of width $$(b-a)$$ and height $$\\frac{1}{b-a}$$, giving total area 1. The flatness *is* the uniformity; wider support ⇒ shorter rectangle (total area conserved).\n\nTakeaway: visualise every uniform as a fixed-area rectangle — widening stretches it horizontally and flattens it vertically.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "A tree cross-section has radius $$R \\sim U[1, 5]$$, and its area is $$A = \\pi R^2$$. What is the correct conceptual approach to find $$E(A)$$, and what's the classic trap? (4 steps)", "answer": "- Step 1: Use linearity: $$E(A) = E(\\pi R^2) = \\pi E(R^2)$$. The constant $$\\pi$$ comes out of expectation.\n- Step 2: $$E(R^2) \\neq [E(R)]^2$$ (the trap!). Instead, use $$E(R^2) = \\text{Var}(R) + [E(R)]^2$$.\n- Step 3: For $$R \\sim U[1,5]$$: $$E(R) = 3$$ and $$\\text{Var}(R) = \\frac{16}{12} = \\frac{4}{3}$$, so $$E(R^2) = \\frac{4}{3} + 9 = \\frac{31}{3}$$.\n- Step 4: So $$E(A) = \\frac{31\\pi}{3}$$. The trap answer $$\\pi \\cdot 3^2 = 9\\pi$$ ignores the spread — but spread contributes to the expected squared value.\n\nMoral: for nonlinear functions, you must use the full distribution, not just the mean.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "Why is it a common error to compute $$E(X^2)$$ as $$(E(X))^2$$, and how are they related? (3 steps)", "answer": "- Step 1: $$E(X^2)$$ is the expected value of the *squared* variable; $$(E(X))^2$$ is the square of the *expected* value. These differ whenever $$X$$ has any spread.\n- Step 2: The relationship is $$E(X^2) = \\text{Var}(X) + (E(X))^2 \\geq (E(X))^2$$, with equality only when $$\\text{Var}(X) = 0$$ (i.e., $$X$$ is constant).\n- Step 3: The gap $$E(X^2) - (E(X))^2$$ *is* the variance by definition — it measures exactly how much squaring amplifies the \"spread\" of the distribution.\n\nTakeaway: expectation does not commute with non-linear functions; squaring is non-linear.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "A continuous random variable has CDF $$\\mathrm{F}(x) = \\begin{cases} 0 & x < -3 \\\\ \\frac{x+3}{7} & -3 \\leq x \\leq 4 \\\\ 1 & x > 4 \\end{cases}$$. How can you identify this as a uniform distribution, and what are its parameters? (2 steps)", "answer": "- Step 1: The CDF is linear (of the form $$\\frac{x - a}{b - a}$$) in the region where it increases from 0 to 1. This linear CDF is the signature of a uniform distribution — it means probability accumulates at a constant rate. Comparing $$\\frac{x+3}{7} = \\frac{x - (-3)}{4 - (-3)}$$, we identify $$a = -3$$ and $$b = 4$$.\n- Step 2: Therefore $$X \\sim \\mathrm{U}[-3, 4]$$. You can verify: $$\\mathrm{E}(X) = \\frac{-3+4}{2} = 0.5$$ and $$\\mathrm{F}(0.5) = \\frac{0.5+3}{7} = \\frac{3.5}{7} = 0.5$$ ✓ (the CDF at the mean equals 0.5 by symmetry). The p.d.f. would be $$f(x) = \\frac{1}{7}$$ for $$-3 \\leq x \\leq 4$$.\n\nRecognising a uniform distribution from its CDF: look for a piecewise function that is 0, then linearly increasing, then 1. The endpoints of the linear portion are $$a$$ and $$b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "For $$X \\sim \\mathrm{U}[a, b]$$, derive the cumulative distribution function $$\\mathrm{F}(x)$$ for all values of $$x$$. Explain why it has the shape it does in each region. (3 steps)", "answer": "- Step 1: For $$x < a$$: there is no probability mass to the left of $$a$$, so $$\\mathrm{F}(x) = 0$$. The c.d.f. starts at zero.\n- Step 2: For $$a \\leq x \\leq b$$: $$\\mathrm{F}(x) = \\int_a^x \\frac{1}{b-a} \\, dt = \\left[\\frac{t}{b-a}\\right]_a^x = \\frac{x - a}{b-a}$$. This is a straight line from 0 (at $$x = a$$) to 1 (at $$x = b$$), rising at a constant rate. The linear shape reflects the fact that probability accumulates at a constant rate for a uniform distribution.\n- Step 3: For $$x > b$$: all probability has been accumulated, so $$\\mathrm{F}(x) = 1$$. The full c.d.f. is: $$\\mathrm{F}(x) = \\begin{cases} 0 & x < a \\\\ \\frac{x-a}{b-a} & a \\leq x \\leq b \\\\ 1 & x > b \\end{cases}$$. The CDF is NOT given in the formula booklet — you must be able to derive it.\n\nThe linear middle section is the hallmark of uniformity: equal-width intervals contribute equal probability increments, so the cumulative probability climbs at a constant rate — like filling a container with a steady stream of water.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "When is a continuous uniform distribution an appropriate model for a real-world variable, and when is it NOT? Give examples and the reasoning. (3 steps)", "answer": "- Step 1: Appropriate when: (a) all values in some bounded range are equally likely; (b) no preferred region or central tendency; (c) you have only range information. Examples: rounding errors, random cut position on a rod, waiting time for regular-interval events.\n- Step 2: NOT appropriate when: (a) values cluster near a target (use normal); (b) counts of discrete events (use binomial, Poisson); (c) there's known skewness or tail behavior.\n- Step 3: Example contrasts: masses of manufactured tins (normal, clustered around target); heights of people (normal); position of a bus arriving between two times (uniform if arrival is \"random\"); time of day of a spontaneous event (often uniform).\n\nQuick test: \"Is equally likely anywhere in a range a true description?\" If not, uniform is wrong.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "A wooden rod of length 20 cm is cut at a random point. Let X be the length of the longer piece. Explain why $X \\sim U[10, 20]$ and find the expected area when this piece forms one side of a rectangle with the other piece forming the adjacent side. (3 steps)", "answer": "- Step 1: When cutting at a random point uniformly along the rod, the shorter piece is uniformly distributed on $[0, 10]$ and the longer piece $X$ is on $[10, 20]$. Since the cut point is uniform, $X \\sim U[10, 20]$.\n- Step 2: If the longer piece has length $X$, the shorter piece has length $20 - X$. These form adjacent sides of a rectangle, so area $A = X(20 - X) = 20X - X^2$.\n- Step 3: $\\mathrm{E}(A) = \\mathrm{E}(20X - X^2) = 20\\mathrm{E}(X) - \\mathrm{E}(X^2)$\n$\\mathrm{E}(X) = \\frac{10 + 20}{2} = 15$\n$\\operatorname{Var}(X) = \\frac{(20-10)^2}{12} = \\frac{100}{12} = \\frac{25}{3}$\n$\\mathrm{E}(X^2) = \\operatorname{Var}(X) + (\\mathrm{E}(X))^2 = \\frac{25}{3} + 225 = \\frac{700}{3}$\n$\\mathrm{E}(A) = 20 \\times 15 - \\frac{700}{3} = 300 - \\frac{700}{3} = \\frac{200}{3} \\approx 66.67 \\text{ cm}^2$", "source": "MiniMax ①", "_id": "minimax_1_29"}, {"question": "Why does a linear transformation preserve uniformity, while a non-linear one like $$X^2$$ does not? Give the geometric intuition. (3 steps)", "answer": "- Step 1: A linear map $$Y = cX + d$$ stretches and shifts the PDF without changing its shape. A flat rectangle remains a flat rectangle — just repositioned and rescaled.\n- Step 2: Non-linear maps (like $$X^2$$) warp the axis unequally — some regions get compressed, others stretched. Constant density therefore becomes non-constant.\n- Step 3: Visually: slide/flip/rescale a rectangle → still a rectangle. Bend the axis non-uniformly → the rectangle warps into a non-rectangle.\n\nTakeaway: uniformity is a \"linear invariant\" — it survives only under affine re-parameterisations.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Derive the formula for the expected value E(X) of a continuous uniform distribution U[a, b] from first principles using integration. (3 steps)", "answer": "- Step 1: Write the definition. $$E(X) = \\int_a^b x \\cdot f(x) dx = \\int_a^b x \\cdot \\frac{1}{b-a} dx$$\n- Step 2: Integrate. $$= \\frac{1}{b-a} \\int_a^b x dx = \\frac{1}{b-a} \\left[\\frac{x^2}{2}\\right]_a^b = \\frac{1}{b-a} \\cdot \\frac{b^2 - a^2}{2} = \\frac{b^2 - a^2}{2(b-a)}$$\n- Step 3: Simplify using the difference of squares. Since $$b^2 - a^2 = (b-a)(b+a)$$, we get $$E(X) = \\frac{b+a}{2}$$. This is the midpoint of the interval, which makes intuitive sense since probability is symmetrically distributed.", "source": "MiniMax ②", "_id": "minimax_2_2"}, {"question": "Given $$X \\sim U[a,b]$$, express $$P(X \\geq x)$$ in terms of $$F(x)$$, and explain the \"complement\" formula geometrically. (3 steps)", "answer": "- Step 1: For continuous distributions, $$P(X \\geq x) = 1 - P(X < x) = 1 - F(x)$$, because $$P(X = x) = 0$$.\n- Step 2: Substitute the uniform CDF: $$P(X \\geq x) = 1 - \\frac{x-a}{b-a} = \\frac{(b-a) - (x-a)}{b-a} = \\frac{b-x}{b-a}$$.\n- Step 3: Geometrically, this is the fraction of the support from $$x$$ to $$b$$ (the \"right chunk\"), just as $$F(x)$$ is the fraction from $$a$$ to $$x$$ (the \"left chunk\"). Together they sum to 1.\n\nTakeaway: for uniforms, both $$F$$ and its complement are interval-proportion formulas.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "If $$X \\sim \\mathrm{U}[a, b]$$ and $$Y = cX + d$$ where $$c > 0$$ and $$d$$ are constants, what is the distribution of $$Y$$, and what are its parameters? (3 steps)", "answer": "- Step 1: Since $$X$$ ranges from $$a$$ to $$b$$, the transformed variable $$Y = cX + d$$ ranges from $$ca + d$$ to $$cb + d$$. The linear transformation stretches and shifts the interval.\n- Step 2: A linear transformation of a uniform distribution remains uniform. Why? If every value of $$X$$ in $$[a,b]$$ is equally likely, then every value of $$Y$$ in its new range is equally likely — the transformation just relabels the outcomes without changing the equal-probability structure.\n- Step 3: Therefore $$Y \\sim \\mathrm{U}[ca + d, \\, cb + d]$$. For example, if $$X \\sim \\mathrm{U}[2, 8]$$ and $$Y = 2X + 5$$, then $$Y \\sim \\mathrm{U}[2(2)+5, \\, 2(8)+5] = \\mathrm{U}[9, 21]$$. If $$c < 0$$, the interval reverses: $$Y \\sim \\mathrm{U}[cb + d, \\, ca + d]$$ since the lower bound must be the smaller value.\n\nKey principle: linear transformations preserve the \"shape\" of a distribution. Uniform stays uniform; they only shift and scale the parameters.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "Why is the continuous uniform distribution a poor model for the heights of randomly selected 18-year-old females, but a good model for rounding errors? What property of the data determines suitability? (2 steps)", "answer": "- Step 1: Heights of 18-year-old females cluster around a central value (around 165 cm) with fewer people at the extremes — this bell-shaped pattern is better modelled by a normal distribution. The uniform distribution assumes equal likelihood across the entire range, which doesn't match how human heights are distributed.\n- Step 2: Rounding errors are well-modelled by a uniform distribution because there is no \"preferred\" error value — when a true value falls within a rounding interval, it's equally likely to be anywhere within that interval. The key property that makes uniform suitable is the **absence of any central tendency**: every value in the range is genuinely equally likely.\n\nThe decision criterion: use uniform when there's no reason to favour any particular value within the range (maximum ignorance, rounding errors, random arrival times). Use normal (or other centrally-peaked distributions) when values tend to cluster around a central value with symmetric falloff.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "A drinks machine pours coffee uniformly between 190 ml and 210 ml. Find the value of $$x$$ such that $$\\mathrm{P}(X \\ge x) = 0.65$$. This is a \"percentile in reverse\" problem. How does it relate to the CDF? (3 steps)", "answer": "- Step 1: $$\\mathrm{P}(X \\ge x) = 0.65$$ means $$\\mathrm{P}(X < x) = 0.35$$, so $$\\mathrm{F}(x) = 0.35$$. Using the CDF: $$\\frac{x - 190}{210 - 190} = 0.35$$, so $$\\frac{x - 190}{20} = 0.35$$.\n- Step 2: Solve: $$x - 190 = 20 \\times 0.35 = 7$$, so $$x = 197$$ ml. This means 65% of cups contain at least 197 ml.\n- Step 3: The CDF inverts naturally for the uniform distribution because it's linear. For any percentile problem, you set $$\\mathrm{F}(x) = p$$ and solve the linear equation $$\\frac{x-a}{b-a} = p$$ to get $$x = a + p(b-a)$$. This is much simpler than for other distributions where the CDF may not have a closed-form inverse.\n\nThe formula $$x = a + p(b - a)$$ gives the $$p$$-th quantile of any uniform distribution directly.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "Explain the key difference between how you calculate probabilities for discrete uniform and continuous uniform distributions. (1 step)", "answer": "For discrete uniform, you count the number of favorable outcomes divided by total outcomes. For continuous uniform, you calculate the length of the favorable interval divided by the total interval length. Both involve \"proportion of the sample space,\" but for continuous, this is literally a length or area proportion. The key is: discrete = counting, continuous = measuring.", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "A pencil length is measured to the nearest cm. What is the distribution of the rounding error $$R$$, and why is the uniform distribution the right model here? (2 steps)", "answer": "- Step 1: If the true length is $$L$$ and the recorded (rounded) length is $$L_{\\text{rec}}$$, then the rounding error is $$R = L - L_{\\text{rec}}$$. Since rounding to the nearest cm means the true value lies within $$\\pm 0.5$$ cm of the recorded value, the error satisfies $$-0.5 \\le R < 0.5$$ (or $$\\le 0.5$$ depending on convention). So $$R \\sim \\mathrm{U}[-0.5, 0.5]$$.\n- Step 2: The uniform model is appropriate because we have no reason to think the error favours any particular value within this range — the true length could be anywhere in the rounding interval with equal likelihood. This is the \"principle of indifference\": with no additional information, all equally-sized sub-intervals should have equal probability.\n\nThis is a standard modelling assumption for measurement rounding errors and appears frequently in exam questions.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "The side length of a square is $X \\sim \\mathrm{U}[4.5, 5.5]$. Find the expected area of the square. (2 steps)", "answer": "- Step 1: The area is $A = X^2$. We need $$\\mathrm{E}(A) = \\mathrm{E}(X^2)$$. Find $$\\mathrm{E}(X) = \\frac{4.5 + 5.5}{2} = 5$$ and $$\\operatorname{Var}(X) = \\frac{(5.5 - 4.5)^2}{12} = \\frac{1}{12}$$.\n\n- Step 2: $$\\mathrm{E}(X^2) = \\operatorname{Var}(X) + (\\mathrm{E}(X))^2 = \\frac{1}{12} + 25 = \\frac{1 + 300}{12} = \\frac{301}{12} \\approx 25.08$$. Note: the naive answer would be $$5^2 = 25$$, but the correct expected area is slightly larger because squaring amplifies larger side lengths more. The difference of $$\\frac{1}{12}$$ is exactly the variance of $X$.\n\nTakeaway: $$\\mathrm{E}(X^2) = \\operatorname{Var}(X) + (\\mathrm{E}(X))^2$$ — the variance adds to the square of the mean.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "A 20 cm rod is cut at a random point. The length of the longer piece $$X$$ is modelled as $$X \\sim U[10, 20]$$. Why does $$X$$ start at 10, not 0? (3 steps)", "answer": "- Step 1: When a 20 cm rod is cut into two pieces of lengths $$p$$ and $$20 - p$$, the \"longer piece\" is always at least 10 cm — it's at least half the total length.\n- Step 2: The longer piece's maximum is 20 cm (only in the limit where the cut is at an end).\n- Step 3: So the possible range for $$X$$ is $$[10, 20]$$. The problem then models $$X$$ as *uniformly* distributed on this range (consistent with uniform cut-point).\n\nTakeaway: always reason about the *actual* range of the variable, not the naïve full interval.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "For any continuous random variable (not just uniform), what is $$P(X = k)$$ for a single point $$k$$, and why?", "answer": "$$P(X = k) = 0$$ for any single point $$k$$. The probability is accumulated from *areas* under the PDF, and a single point has zero width, hence zero area. Another way: splitting $$[a,b]$$ into infinitely many points, each with equal \"probability,\" would give infinite total probability unless each is 0. This is why $$P(c \\leq X \\leq d) = P(c < X < d)$$ for continuous distributions — endpoints contribute nothing.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "Why can’t the uniform distribution be defined on unbounded intervals?", "answer": "- The integral of a constant PDF over an unbounded interval diverges.  \n- For example, $\\int_{-\\infty}^\\infty h dx = \\infty$, which cannot equal 1 (required for a PDF).", "source": "Qwen 3 ②", "_id": "qwen_2_20"}, {"question": "Why is the variance of $$U[a,b]$$ ($$\\frac{(b-a)^2}{12}$$) much smaller than that of a two-point distribution placing mass equally at $$a$$ and $$b$$ ($$\\frac{(b-a)^2}{4}$$), given they have the same range? (3 steps)", "answer": "- Step 1: Two-point distribution: each point is $$\\frac{b-a}{2}$$ away from the mean, so squared deviation is always $$\\left(\\frac{b-a}{2}\\right)^2 = \\frac{(b-a)^2}{4}$$. Variance = that squared deviation.\n- Step 2: Uniform: mass is spread continuously, including much near the mean (with small deviations). Average squared deviation is only $$\\frac{(b-a)^2}{12}$$ — a third as much.\n- Step 3: Insight: variance depends not just on range, but on *how mass is distributed within* the range. Concentrating at extremes maximizes variance for a given range; spreading evenly is much gentler.\n\nSo for the same range, uniform is substantially \"less spread out\" in the variance sense than the endpoints-only distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "How does the variance $\\text{Var}(X)$ change as the interval [a, b] widens?", "answer": "Variance increases quadratically with the interval width.  \n- From $\\text{Var}(X) = \\frac{(b - a)^2}{12}$, doubling $b - a$ quadruples the variance.  \n- Intuition: A wider interval spreads values further from the mean.", "source": "Qwen 3 ②", "_id": "qwen_2_8"}, {"question": "Given $$Y \\sim U[a, b]$$ with $$E(Y) = 1$$ and $$\\text{Var}(Y) = \\frac{16}{3}$$, outline the strategy to recover $$a$$ and $$b$$. (3 steps)", "answer": "- Step 1: Use the mean formula: $$\\frac{a+b}{2} = 1 \\Rightarrow a + b = 2$$. This pins down the *sum* of the endpoints.\n- Step 2: Use the variance formula: $$\\frac{(b-a)^2}{12} = \\frac{16}{3} \\Rightarrow (b-a)^2 = 64 \\Rightarrow b - a = 8$$ (positive root since $$a < b$$). This pins down the *difference*.\n- Step 3: Two linear equations $$a + b = 2$$ and $$b - a = 8$$ give $$b = 5, a = -3$$ by addition/subtraction.\n\nTakeaway: *sum* of endpoints from the mean, *difference* from the variance — they decouple into two simple equations.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "What is the intuition behind the \"12\" in $\\operatorname{Var}(X) = \\frac{(b-a)^2}{12}$? Why doesn't the variance depend on the location of the interval? (2 steps)", "answer": "- Step 1: Variance measures *spread*, not location. Shifting an interval from, say, $[0, 10]$ to $[100, 110]$ doesn't change how spread out the values are — they still span a width of 10. The variance only depends on $$(b-a)$$, the width. The \"12\" comes from the mathematical integration — it's the constant that emerges from the cubic terms cancelling.\n\n- Step 2: For a quick sanity check, consider $$\\mathrm{U}[0, 1]$$: the variance is $$\\frac{1}{12} \\approx 0.083$$. The standard deviation is $$\\frac{1}{2\\sqrt{3}} \\approx 0.289$$, roughly 29% of the range. This makes sense — about 58% of values lie within one SD of the mean. If the 12 were replaced by 4, the SD would be half the range, which would be far too large for a uniform distribution.\n\nTakeaway: The 12 is a structural constant from integration; the key insight is that variance depends on width, not location.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "How are the PDF $$f(x)$$ and CDF $$F(x)$$ related, and what does that reveal about the CDF of a uniform distribution? (3 steps)", "answer": "- Step 1: In general, $$f(x) = F'(x)$$ — the PDF is the derivative of the CDF; equivalently, the CDF is the running integral of the PDF.\n- Step 2: For $$X \\sim U[a,b]$$, the PDF is constant at $$\\frac{1}{b-a}$$ inside the support. A constant derivative means the CDF must be linear inside $$[a,b]$$ — a straight ramp.\n- Step 3: Outside $$[a,b]$$, the PDF is 0, so the CDF's derivative is 0 there, meaning the CDF is flat (at 0 below, at 1 above).\n\nTakeaway: the ramp-like shape of the uniform CDF is a direct consequence of the constant PDF.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "What happens to the uniform distribution $\\mathrm{U}[a, b]$ as $b - a \\to 0$? What does the p.d.f. look like, and what is the variance? (2 steps)", "answer": "- Step 1: As $b \\to a$, the interval shrinks to a single point. The p.d.f. height is $$\\frac{1}{b-a}$$, which grows without bound (approaches infinity), while the width approaches 0. The rectangle becomes an infinitely tall, infinitely thin spike — essentially a Dirac delta function.\n\n- Step 2: The variance $$\\frac{(b-a)^2}{12} \\to 0$$, meaning there's no spread at all. The random variable becomes deterministic — it always equals $a$ (which equals $b$). This is called a degenerate distribution. It's the limiting case where \"uniform over an interval\" collapses to \"always the same value.\"\n\nTakeaway: As the interval shrinks to zero width, the uniform distribution becomes deterministic with zero variance.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "Explain why a continuous uniform distribution, when conditioned on lying in a sub-interval, remains uniform. (3 steps)", "answer": "- Step 1: The PDF of $$X \\sim U[a,b]$$ is constant at $$\\frac{1}{b-a}$$ inside $$[a,b]$$. Conditioning on $$X \\in [c, d]$$ focuses attention on that sub-region.\n- Step 2: The conditional density is $$\\frac{f(x)}{P(X \\in [c,d])} = \\frac{1/(b-a)}{(d-c)/(b-a)} = \\frac{1}{d-c}$$ for $$x \\in [c,d]$$.\n- Step 3: This is exactly the PDF of $$U[c, d]$$! Flatness is preserved because conditioning just *rescales* the restricted rectangle to have area 1 — no reshaping occurs.\n\nTakeaway: uniforms are \"invariant under sub-interval conditioning\" — a very computationally useful property.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "For $$X \\sim \\mathrm{U}[a, b]$$, what happens to the variance as the interval width $$(b - a)$$ approaches zero? What does the distribution approach in the limit? (2 steps)", "answer": "- Step 1: As $$(b - a) \\to 0$$, $$\\mathrm{Var}(X) = \\frac{(b-a)^2}{12} \\to 0$$. The variance vanishes because there is no spread — all probability concentrates at a single point.\n- Step 2: In the limit, $$X$$ becomes a degenerate (deterministic) random variable that takes the value $$\\frac{a+b}{2}$$ with probability 1. The p.d.f. becomes an infinitely tall, infinitely narrow spike (a Dirac delta function), and the CDF becomes a step function that jumps from 0 to 1 at the point $$\\frac{a+b}{2}$$.\n\nThis limiting case illustrates the connection between continuous distributions and discrete point masses: a uniform distribution with zero width is just a deterministic constant. The variance formula $$\\frac{(b-a)^2}{12}$$ smoothly approaches zero, confirming this intuition.", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "Why is the continuous uniform distribution commonly used to model waiting times when the arrival time is completely unknown (within a known window)? (3 steps)", "answer": "- Step 1: If no information suggests any time is more likely than another within a window of length $$L$$, the \"maximally non-committal\" model is that all moments are equally likely.\n- Step 2: E.g., if trains leave hourly and you arrive at a random moment, the time until the next train is $$U[0, 60]$$ minutes.\n- Step 3: This doesn't mean waits are *actually* uniform in every real system — it's a principle-of-indifference model for when you lack specific information about arrival structure.\n\nTakeaway: uniform = \"maximum ignorance\" model when you only know the support bounds.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "A bus arrives between 3 minutes early and 10 minutes late uniformly. Let $$X$$ = minutes after 9:00 am the bus arrives. Specify the distribution fully and explain the sign convention. (3 steps)", "answer": "- Step 1: \"3 minutes early\" corresponds to $$X = -3$$ (negative because it's before 9:00). \"10 minutes late\" gives $$X = 10$$.\n- Step 2: The window width is $$10 - (-3) = 13$$ minutes. Assuming equally likely arrival times, $$X \\sim U[-3, 10]$$.\n- Step 3: Full specification: $$f(x) = \\frac{1}{13}$$ for $$-3 \\leq x \\leq 10$$; 0 otherwise.\n\nTakeaway: careful sign handling is crucial — \"early\" becomes negative, but the support width is the full earliest-to-latest range.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "Prove that conditioning a $$U[a,b]$$ random variable on an event $$X > c$$ (where $$a < c < b$$) yields another uniform distribution. (3 steps)", "answer": "- Step 1: Conditional PDF is $$\\frac{f(x)}{P(X > c)}$$ for $$x > c$$ and 0 otherwise.\n- Step 2: Substitute $$f(x) = \\frac{1}{b-a}$$ and $$P(X > c) = \\frac{b-c}{b-a}$$: conditional PDF $$= \\frac{1/(b-a)}{(b-c)/(b-a)} = \\frac{1}{b-c}$$ for $$x \\in (c, b]$$.\n- Step 3: This is exactly the PDF of $$U[c, b]$$. So the conditional distribution is uniform on the new interval; flatness is preserved.\n\nTakeaway: conditioning doesn't warp a uniform — it only truncates and rescales.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "A spinner's angle $$\\theta \\sim U[0, 2\\pi]$$ and $$X = r\\sin\\theta$$ is the horizontal tip distance from the vertical. Why is $$E(X) = 0$$, and what quantity measures typical magnitude? (3 steps)", "answer": "- Step 1: By symmetry, for every angle giving positive $$x$$, the mirror angle (e.g. $$\\pi - \\theta$$ or $$-\\theta$$) gives the opposite negative $$x$$, with equal likelihood under the uniform distribution on $$\\theta$$.\n- Step 2: Positive and negative contributions to $$E(X) = rE(\\sin\\theta)$$ cancel exactly. So $$E(X) = 0$$.\n- Step 3: $$E(|X|)$$ is non-zero — it measures the average horizontal distance regardless of sign, which is what geometric experiments (like Buffon's needle variants for estimating $$\\pi$$) leverage.\n\nTakeaway: symmetry annihilates $$E(X)$$ for odd functions of a symmetric uniform; use $$E(|X|)$$ for \"typical size.\"", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "If $$Y = 20 - 2X$$ and you want to compute $$P(Y < 4)$$ in terms of $$X$$, how does the inequality transform? What's the critical step? (3 steps)", "answer": "- Step 1: Start: $$Y < 4 \\iff 20 - 2X < 4 \\iff -2X < -16$$.\n- Step 2: Divide both sides by $$-2$$. **Critical**: inequality *flips* when dividing by a negative. So $$X > 8$$.\n- Step 3: Thus $$P(Y < 4) = P(X > 8)$$, which can now be computed using the $$X$$-distribution.\n\nKey warning: multiplying/dividing by negatives reverses inequalities. This is a very common mistake when converting between transformed and original variables.", "source": "Opus 4.7 ②", "_id": "opus_2_62"}, {"question": "If $$X \\sim U[0, 2]$$ and $$Y = 10 - 5X$$, describe the distribution of $$Y$$. Watch the sign of the slope! (3 steps)", "answer": "- Step 1: Transform endpoints: at $$X = 0$$, $$Y = 10$$; at $$X = 2$$, $$Y = 0$$. So $$Y$$ takes values between 0 and 10.\n- Step 2: The slope is *negative* ($$-5$$), so orientation flips — but the stretching remains uniform. Density scales consistently, so uniformity is preserved.\n- Step 3: Hence $$Y \\sim U[0, 10]$$. Always write the smaller endpoint first, regardless of how the transformation's sign worked out.\n\nKey point: negative slope flips the direction, but the resulting distribution is still uniform on the new interval.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Suppose $$X \\sim U[b, 5b]$$ for some $$b > 0$$. Express $$E(X)$$ and $$\\text{Var}(X)$$ in terms of $$b$$. What's the scaling lesson? (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{b + 5b}{2} = 3b$$.\n- Step 2: Width is $$5b - b = 4b$$, so $$\\text{Var}(X) = \\frac{(4b)^2}{12} = \\frac{16b^2}{12} = \\frac{4b^2}{3}$$.\n- Step 3: Lesson: when the interval scales by factor $$b$$, the mean scales linearly (by $$b$$) but the variance scales by $$b^2$$. Standard deviation scales linearly, matching the range's scaling.\n\nThis reflects the general rule: $$\\text{Var}(kX) = k^2 \\text{Var}(X)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "You make $$n$$ observations of $$X \\sim U[a,b]$$ and want the probability that exactly $$k$$ of them fall below some threshold $$c$$. How do you combine the uniform with the binomial? (3 steps)", "answer": "- Step 1: Compute the single-trial probability: $$p = P(X < c) = \\frac{c-a}{b-a}$$ (using the uniform CDF).\n- Step 2: Each observation is an independent Bernoulli trial with success probability $$p$$ (success = \"below $$c$$\"). The total count across $$n$$ trials follows $$\\text{Binomial}(n, p)$$.\n- Step 3: So $$P(\\text{exactly } k) = \\binom{n}{k} p^k (1-p)^{n-k}$$ with $$p$$ from step 1.\n\nKey insight: uniform gives the per-trial probability; binomial counts successes across independent trials. Separate the two steps.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "Why does the uniform distribution arise so naturally in \"nothing is special\" scenarios — spinners, random cuts, rounding errors, random arrival times? (3 steps)", "answer": "- Step 1: **Physical symmetry**: In a spinner or random cut, no angle/position is privileged. The problem has rotational or translational symmetry forcing equal likelihood across the domain.\n- Step 2: **Epistemic symmetry**: Even without physical symmetry, if you know only the range of a quantity and nothing else, uniform is the \"unbiased\" guess — maximum entropy given only a range constraint.\n- Step 3: **Mathematical simplicity**: Linear CDF, easy probability calculations via proportion, clean transformations. Makes uniform the default modeling choice when no better information is available.\n\nThe uniform is to continuous probability what the fair coin is to discrete — the most basic, fair, information-minimal distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Why is it incorrect to say \"$$P(X = 198) = 0.05$$\" for $$X \\sim U[190, 210]$$, even though $$f(198) = 0.05$$? (3 steps)", "answer": "- Step 1: For any continuous random variable, $$P(X = k) = 0$$ for any specific value $$k$$. So $$P(X = 198) = 0$$, not 0.05.\n- Step 2: The value 0.05 is the *probability density* $$f(198) = \\frac{1}{20}$$ — probability per unit length, not probability itself.\n- Step 3: What *is* true: $$P(197.5 < X < 198.5) = 1 \\times 0.05 = 0.05$$, because this is an interval of width 1. Density × width = probability.\n\nTakeaway: the PDF is a density, not a probability; probabilities live in intervals of positive width.", "source": "Opus 4.7 ①", "_id": "opus_1_59"}, {"question": "Intuitively, why does the variance of $$U[a,b]$$ scale as $$(b-a)^2$$ (quadratically in width) rather than linearly? (2 steps)", "answer": "- Step 1: Variance is defined as *expected squared deviation*: $$E[(X-\\mu)^2]$$. Squaring amplifies the effect of spread — doubling the interval width quadruples squared deviations on average.\n- Step 2: Formally, scaling $$X$$ by factor $$k$$ gives $$(X - \\mu) \\to k(X-\\mu)$$, so $$(X-\\mu)^2 \\to k^2(X-\\mu)^2$$. Hence $$\\text{Var}(kX) = k^2 \\text{Var}(X)$$.\n\nStandard deviation (the square root) scales linearly, matching our physical intuition about \"spread\" — so the $$(b-a)^2$$ in the formula directly reflects this squaring.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "For $$X \\sim U[a,b]$$, how does the CDF help you find any quantile (percentile)? Derive a general formula for the $$p$$-th quantile. (3 steps)", "answer": "- Step 1: The CDF is $$F(x) = \\frac{x-a}{b-a}$$. To find $$x$$ with $$P(X \\leq x) = p$$, set $$\\frac{x-a}{b-a} = p$$.\n- Step 2: Solve: $$x = a + p(b-a)$$. This says: start at $$a$$, move a fraction $$p$$ of the way to $$b$$.\n- Step 3: Special cases: median ($$p = 0.5$$) = midpoint; $$Q_1$$ ($$p = 0.25$$) = a quarter of the way; $$Q_3$$ ($$p = 0.75$$) = three-quarters.\n\nUnlike other distributions, uniform percentiles are linear interpolations between the endpoints — beautifully simple.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Given $$X \\sim U[a, b]$$ with $$P(X < 5) = \\frac{1}{4}$$ and $$P(X > 7) = \\frac{1}{2}$$, outline how to deduce $$a$$ and $$b$$. (3 steps)", "answer": "- Step 1: $$P(X < 5) = \\frac{1}{4}$$ means 5 lies at the \"25% mark\" from $$a$$; i.e., $$\\frac{5-a}{b-a} = \\frac{1}{4}$$.\n- Step 2: $$P(X > 7) = \\frac{1}{2}$$ means 7 is the median (50% from either end), so 7 is exactly the midpoint: $$\\frac{a+b}{2} = 7 \\Rightarrow a+b = 14$$.\n- Step 3: Combining with the first equation gives a specific pair. Each probability condition fixes an endpoint at a known fraction of the width; two conditions determine $$(a,b)$$ uniquely.\n\nTakeaway: interpret each probability as a \"position within the support\" — this usually gives linear equations in $$a, b$$.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "For $$X \\sim U[a,b]$$, explain why $$P(X > c) = 1 - F(c) = \\frac{b-c}{b-a}$$. Which version is most natural to work with? (3 steps)", "answer": "- Step 1: $$P(X > c) + P(X \\leq c) = 1$$, so $$P(X > c) = 1 - P(X \\leq c) = 1 - F(c)$$. This holds for any distribution.\n- Step 2: For uniform specifically: $$1 - F(c) = 1 - \\frac{c-a}{b-a} = \\frac{b-a-c+a}{b-a} = \\frac{b-c}{b-a}$$.\n- Step 3: The form $$\\frac{b-c}{b-a}$$ is natural — it's just \"proportion of interval above $$c$$.\" For uniform, stick with proportions; they're geometric and intuitive.\n\nAll three expressions are equal; for uniform, the proportion form is usually quickest.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "For $$X \\sim U[a, b]$$, how do $$E(X)$$, $$\\text{Var}(X)$$, and PDF height change if you increase $$b$$ while keeping $$a$$ fixed? (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{a+b}{2}$$ increases linearly with $$b$$ — the midpoint shifts right.\n- Step 2: $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$ grows quadratically in $$(b-a)$$ — widening the support amplifies variance rapidly.\n- Step 3: PDF height $$\\frac{1}{b-a}$$ decreases — the rectangle widens and flattens to preserve unit area.\n\nTakeaway: all three changes are tied to the same $$(b-a)$$ factor — widening shifts mean, blows up variance, and squashes the density.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Priya's checkout time is $$\\mathrm{U}[2, 10]$$ minutes. Find the probability she takes less than 5 minutes on each of three successive visits. What assumption is needed? (3 steps)", "answer": "- Step 1: For one visit: $$\\mathrm{P}(X < 5) = \\frac{5 - 2}{10 - 2} = \\frac{3}{8}$$.\n- Step 2: For three successive visits, we need $$\\mathrm{P}(X_1 < 5) \\times \\mathrm{P}(X_2 < 5) \\times \\mathrm{P}(X_3 < 5) = \\left(\\frac{3}{8}\\right)^3 = \\frac{27}{512} \\approx 0.0527$$.\n- Step 3: The critical assumption is that the three visits are **independent** — the checkout time on one visit doesn't influence another. If Priya always chooses the same checkout operator, or if she visits at the same time of day when the store is equally busy, the times might be correlated, and the multiplication would be invalid.\n\nIndependence allows us to multiply probabilities. Without it, we'd need joint probability information that isn't provided by the marginal distribution alone.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "Why does the \"proportion of interval\" shortcut work for computing probabilities in a uniform distribution, but *not* for other continuous distributions? (3 steps)", "answer": "- Step 1: Probability is geometrically the area under the PDF: $$P(c < X < d) = \\int_c^d f(x)\\,dx$$.\n- Step 2: For uniform, $$f(x)$$ is constant, so the integral simplifies to (height)(width) = $$\\frac{d-c}{b-a}$$ — exactly the proportion of the total interval.\n- Step 3: For non-uniform distributions (e.g., normal), the PDF varies with $$x$$, so equal-width intervals have unequal probabilities. Proportion-of-width becomes meaningless.\n\nThe \"proportion\" rule is really just \"when PDF is flat, probability = geometric area of a rectangle.\"", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "For $$X \\sim U[175, 215]$$, describe how you'd find the value $$x$$ such that $$P(X \\geq x) = 0.65$$ — reasoning via quantiles. (3 steps)", "answer": "- Step 1: $$P(X \\geq x) = 0.65$$ means 65% of probability lies above $$x$$ and 35% lies below — i.e., $$F(x) = 0.35$$.\n- Step 2: For uniforms, $$F(x) = \\frac{x - a}{b-a}$$. Set $$\\frac{x - 175}{40} = 0.35$$.\n- Step 3: Solve: $$x = 175 + 0.35 \\times 40 = 189$$. Intuitively, $$x$$ is 35% of the way from minimum to maximum.\n\nTakeaway: for uniforms, quantile finding = \"which fraction of the way from $$a$$ to $$b$$?\"", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "Briefly explain how the spinner from the previous question could be used to estimate $\\pi$. What probability would you need to estimate experimentally? (2 steps)", "answer": "- Step 1: Consider the probability that the tip of the spinner lands within a specific region. For instance, the tip traces a circle of radius $r$. If you inscribe a square of side $2r$ around this circle, the ratio of the circle's area to the square's area is $$\\frac{\\pi r^2}{(2r)^2} = \\frac{\\pi}{4}$$.\n\n- Step 2: If you drop random points uniformly in the square and count the proportion that fall inside the circle, that proportion estimates $$\\frac{\\pi}{4}$$, so multiplying by 4 estimates $\\pi$. Geometric probabilities involving uniform distributions on circles naturally involve $\\pi$, enabling Monte Carlo estimation. The spinner itself doesn't directly give uniform points in a square, but a modified experiment (e.g., choosing $x$ and $y$ coordinates uniformly) would work.\n\nTakeaway: Geometric probabilities involving uniform distributions on circles naturally involve $\\pi$, enabling Monte Carlo estimation.", "source": "GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "Challenge: For $$X \\sim U[\\alpha, \\beta]$$, find $$P\\left(X < \\frac{3}{7}\\alpha + \\frac{4}{7}\\beta\\right)$$ using only the linearity of the CDF. (3 steps)", "answer": "- Step 1: Recognize the threshold: $$\\frac{3}{7}\\alpha + \\frac{4}{7}\\beta$$ is a weighted average — specifically, $$\\frac{4}{7}$$ of the way from $$\\alpha$$ to $$\\beta$$.\n- Step 2: Apply the CDF: $$P(X < x) = \\frac{x - \\alpha}{\\beta - \\alpha}$$.\n- Step 3: Substitute: $$\\frac{\\frac{3}{7}\\alpha + \\frac{4}{7}\\beta - \\alpha}{\\beta - \\alpha} = \\frac{\\frac{4}{7}(\\beta - \\alpha)}{\\beta - \\alpha} = \\frac{4}{7}$$.\n\nGeneral principle: for $$x = \\alpha + \\lambda(\\beta - \\alpha)$$, $$P(X < x) = \\lambda$$. Position in the interval = cumulative probability. Pure linearity.", "source": "Opus 4.7 ②", "_id": "opus_2_60"}, {"question": "Between a normal distribution and a continuous uniform, which would you recommend for (a) masses of 200 g tins from a production line, and (b) rounding error to the nearest cm? Justify. (3 steps)", "answer": "- Step 1: For (a) tin masses: a production line *aims* at 200 g but has random fluctuations. Masses cluster near 200 g with rare extremes — a bell-shape. This is **normal**.\n- Step 2: For (b) rounding errors: strictly bounded in $$[-0.5, 0.5]$$, with no preferred value inside (given arbitrary true values). This is **continuous uniform** $$U[-0.5, 0.5]$$.\n- Step 3: Diagnostic: does the process \"aim with scatter\" (→ normal) or \"fill a bounded ignorance window\" (→ uniform)?\n\nTakeaway: normal models aim-and-scatter; uniform models bounded ignorance.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "A drinks machine dispenses volume $$X \\sim U[190, 210]$$ ml. Measurements are displayed to the nearest 1 ml. What is the probability that the display reads \"200 ml\"? (3 steps)", "answer": "- Step 1: A reading of \"200 ml\" corresponds to true volume in $$[199.5, 200.5)$$ (the rounding window).\n- Step 2: Using proportion: $$P(199.5 \\leq X < 200.5) = \\frac{1}{210 - 190} = \\frac{1}{20} = 0.05$$.\n- Step 3: This positive probability arises because *rounding lumps* all values in a 1 ml window together — measurements operate at finite precision, creating intervals with positive probability.\n\nReconciles the continuous-vs-discrete paradox: true continuous values have zero point probability, but finite-precision *measurements* have positive interval probability.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "$X \\sim \\mathrm{U}[a, b]$ with $\\mathrm{E}(X) = 1$ and $\\operatorname{Var}(X) = \\frac{16}{3}$. Find $a$ and $b$. Explain why there are two algebraic solutions but only one valid answer. (3 steps)", "answer": "- Step 1: Set up simultaneous equations. From the mean: $$\\frac{a+b}{2} = 1 \\implies a + b = 2$$. From the variance: $$\\frac{(b-a)^2}{12} = \\frac{16}{3} \\implies (b-a)^2 = 64 \\implies b - a = \\pm 8$$.\n\n- Step 2: Solve both cases. Case 1: $b - a = 8$. Combined with $a + b = 2$: adding gives $2b = 10$, so $b = 5$ and $a = -3$. Case 2: $b - a = -8$, i.e., $a - b = 8$. Combined with $a + b = 2$: adding gives $2a = 10$, so $a = 5$ and $b = -3$.\n\n- Step 3: Since we require $a < b$ (by definition of the interval $[a, b]$), Case 2 is invalid because $a = 5 > b = -3$. The only valid solution is $a = -3$, $b = 5$. This is why the constraint $a < b$ matters — it eliminates the spurious solution.\n\nTakeaway: Always check that $a < b$ after solving; the variance equation gives $$(b-a)^2$$, which has two roots.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "If an angle $$\\theta \\sim U[0, 2\\pi]$$ and $$X = r\\sin\\theta$$, is $$X$$ uniformly distributed? Why or why not? (3 steps)", "answer": "- Step 1: Linear transformations of uniforms are uniform, but $$\\sin$$ is nonlinear. So $$X$$ is *not* uniform.\n- Step 2: Near $$\\theta = 0$$ or $$\\pi$$, $$\\sin\\theta$$ changes rapidly (slope $$\\pm 1$$), so equal ranges of $$\\theta$$ map to equal ranges of $$\\sin\\theta$$. But near $$\\theta = \\pi/2$$, $$\\sin\\theta$$ is nearly flat — equal $$\\theta$$ ranges squeeze into tiny $$\\sin\\theta$$ ranges.\n- Step 3: The net effect: $$X = r\\sin\\theta$$ has *higher* density near the extremes $$\\pm r$$ and *lower* density near 0. This is the \"arcsine distribution\" shape — U-shaped, not flat.\n\nWarning: uniform in $$\\theta$$ does NOT imply uniform in any nonlinear function of $$\\theta$$. The Jacobian of the transformation matters.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "A common error is to write the p.d.f. of $\\mathrm{U}[a, b]$ as $f(x) = \\frac{1}{b-a}$ for all $x$. Why is this wrong, and what is the correct full specification? (2 steps)", "answer": "- Step 1: The expression $$\\frac{1}{b-a}$$ only applies when $x$ is in the interval $[a, b]$. Outside this interval, the density is 0. Writing it without the piecewise specification implies the density is $$\\frac{1}{b-a}$$ everywhere, which would mean the total area (total probability) is infinite — violating the fundamental requirement that probabilities sum to 1.\n\n- Step 2: The correct full specification is: $$f(x) = \\begin{cases} \\frac{1}{b-a} & a \\leq x \\leq b \\\\ 0 & \\text{otherwise} \\end{cases}$$. Always include the \"0 otherwise\" part, or equivalently state the domain restriction. In exams, failing to specify the domain will lose marks.\n\nTakeaway: A p.d.f. must always specify where it is zero as well as where it is non-zero.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "Why is a continuous distribution often preferred over a discrete one for quantities like time or length, even if measurements are discrete? (3 steps)", "answer": "- Step 1: Time and length are fundamentally continuous — they take real values, not just whole numbers. The underlying *reality* is continuous.\n- Step 2: Measurements are discrete only because of finite precision. The rounding introduces a separate (often uniform) error, modelled on top of the continuous truth.\n- Step 3: Continuous models also give cleaner math: densities, CDFs, integrals — calculus simplifies many expressions that would be messy sums in the discrete case.\n\nTakeaway: pick models matching the *nature* of the variable, not the precision of measurement.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "If a pencil's length is measured to the nearest cm, what does $$E(R) = 0$$ tell us physically, and what does the variance represent? (3 steps)", "answer": "- Step 1: $$R \\sim U[-0.5, 0.5]$$, so $$E(R) = \\frac{-0.5 + 0.5}{2} = 0$$. This means there's no *systematic bias*: errors are centred on zero (as many over as under).\n- Step 2: The variance is $$\\frac{1^2}{12} \\approx 0.083 \\text{ cm}^2$$, so standard deviation $$\\sigma \\approx 0.29$$ cm. This is the *typical* magnitude of an individual error.\n- Step 3: Zero mean error does NOT mean zero error — it means errors cancel on average but each measurement has some spread around the true value.\n\nTakeaway: rounding produces zero *average* error but nonzero *typical* error — bias vs. precision are different concepts.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "For $$X \\sim \\mathrm{U}[a,b]$$, explain the visual intuition for why $$\\mathrm{P}(c < X < d)$$ (where $$a \\le c < d \\le b$$) equals $$\\frac{d-c}{b-a}$$, using the geometry of the p.d.f. sketch. (2 steps)", "answer": "- Step 1: The p.d.f. of a uniform distribution is a rectangle with base from $$a$$ to $$b$$ and height $$\\frac{1}{b-a}$$. The probability $$\\mathrm{P}(c < X < d)$$ is the area under this rectangle between $$c$$ and $$d$$, which forms a sub-rectangle with width $$d - c$$ and the same height $$\\frac{1}{b-a}$$.\n- Step 2: The area of this sub-rectangle is $$(d-c) \\times \\frac{1}{b-a} = \\frac{d-c}{b-a}$$. Geometrically, you're taking the fraction of the total base that lies between $$c$$ and $$d$$. Since the height is uniform, probability is purely proportional to interval length.\n\nThink of it as: \"what fraction of the total width does my sub-interval occupy?\" That fraction is the probability.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "What happens if $a = b$ in the uniform distribution's PDF?", "answer": "- The interval collapses to a single point, making the distribution invalid.  \n- Mathematically: PDF becomes $\\frac{1}{0}$, undefined.  \n- Interpretation: The variable is a constant (degenerate distribution), not a valid continuous uniform distribution.", "source": "Qwen 3 ②", "_id": "qwen_2_14"}, {"question": "What is the defining feature of a continuous uniform distribution $$X \\sim U[a,b]$$, and what does \"uniform\" mean both geometrically and probabilistically? (3 steps)", "answer": "- Step 1: Probabilistically, \"uniform\" means every sub-interval of $$[a,b]$$ of the same length has the *same* probability. An interval of width $$0.1$$ near $$a$$ has the same probability as one near $$b$$ — no region is preferred.\n- Step 2: Geometrically, the PDF is a flat horizontal line over $$[a,b]$$ — literally a rectangle. This is the only shape consistent with \"equal probability density everywhere.\"\n- Step 3: The formula $$f(x) = \\frac{1}{b-a}$$ on $$[a,b]$$ (and $$0$$ elsewhere) is *forced*: the height must make the rectangle's area equal 1.\n\nTakeaway: uniform = \"equally likely anywhere in the interval\" = flat PDF = rectangular.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "For $$X \\sim U[a, b]$$, why does the PDF's flatness imply the CDF must be a *line* rather than a curve on the support? (3 steps)", "answer": "- Step 1: $$F'(x) = f(x)$$. The PDF is a constant function of $$x$$ on $$[a,b]$$, equal to $$\\frac{1}{b-a}$$.\n- Step 2: The antiderivative of a constant is a linear function — that's elementary calculus. So $$F$$ must be linear in $$x$$ on the support.\n- Step 3: The constant PDF value $$\\frac{1}{b-a}$$ *is* the slope of this line. A non-constant PDF would give a non-linear CDF (curved).\n\nTakeaway: constant derivative ⇒ linear antiderivative; that's why the uniform CDF is a straight ramp.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "Contrast the effects of shifting ($$Y = X + c$$) vs. scaling ($$Y = cX$$) on a uniform distribution. Both preserve uniformity — so what do they each change? (3 steps)", "answer": "- Step 1: **Shift** $$Y = X + c$$: $$Y \\sim U[a+c, b+c]$$. Mean shifts by $$c$$, variance unchanged, width unchanged.\n- Step 2: **Scale** $$Y = cX$$ (with $$c > 0$$): $$Y \\sim U[ca, cb]$$. Mean scales by $$c$$, variance scales by $$c^2$$, width scales by $$c$$.\n- Step 3: **Combined** $$Y = cX + d$$: $$Y \\sim U[ca+d, cb+d]$$. Both effects combine. If $$c < 0$$, endpoints swap to maintain ordering.\n\nBoth preserve uniformity; shift moves the rectangle, scale stretches it. Variance responds only to scaling, not to shifting.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "Why does the variance of $$U[a,b]$$ depend only on the *width* $$(b-a)$$, not on where the interval sits on the number line? (2 steps)", "answer": "- Step 1: Variance measures *spread*, not *location*. Shifting $$[0,1]$$ to $$[100,101]$$ doesn't change how spread out the values are — it just relocates them.\n- Step 2: Mathematically, $$\\text{Var}(X + c) = \\text{Var}(X)$$ for any constant $$c$$. Since any $$U[a,b]$$ can be written as $$a + U[0, b-a]$$, variance depends only on $$b-a$$.\n\nIntuition: the \"uncertainty\" in $$X$$ depends on the interval length, not on which part of the number line it occupies.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "For $$X \\sim U[-1, 4]$$, how would you mentally estimate $$E(X^2)$$ without performing any integration? (3 steps)", "answer": "- Step 1: Use the identity $$E(X^2) = \\text{Var}(X) + [E(X)]^2$$.\n- Step 2: $$E(X) = \\frac{-1+4}{2} = 1.5$$. $$\\text{Var}(X) = \\frac{(4-(-1))^2}{12} = \\frac{25}{12}$$.\n- Step 3: So $$E(X^2) = \\frac{25}{12} + 1.5^2 = \\frac{25}{12} + \\frac{9}{4} = \\frac{25 + 27}{12} = \\frac{52}{12} = \\frac{13}{3}$$.\n\nThe shortcut avoids integrating $$\\int x^2 f(x)\\,dx$$ directly. Always remember: $$E(X^2) = \\text{Var}(X) + [E(X)]^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "If $$Y = 4X - 6$$ where $$X \\sim U[-1, 5]$$, how do $$E(Y)$$ and $$\\text{Var}(Y)$$ relate to $$E(X)$$ and $$\\text{Var}(X)$$? (3 steps)", "answer": "- Step 1: Linear transformation rules: $$E(aX + b) = aE(X) + b$$ and $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. The additive constant doesn't affect variance.\n- Step 2: $$E(X) = \\frac{-1+5}{2} = 2$$, so $$E(Y) = 4(2) - 6 = 2$$.\n- Step 3: $$\\text{Var}(X) = \\frac{36}{12} = 3$$, so $$\\text{Var}(Y) = 16 \\times 3 = 48$$.\n\nNote the asymmetry: the constant $$-6$$ shifts the mean but doesn't change variance; the scale $$4$$ scales mean by 4 and variance by $$4^2 = 16$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "If $$X \\sim \\mathrm{U}[3, 8]$$ and $$Y = 12 - 3X$$, find the distribution of $$Y$$ and explain why it is still uniform. (3 steps)", "answer": "- Step 1: Since $$Y = -3X + 12$$, this is a linear transformation with $$c = -3$$ (negative) and $$d = 12$$. A negative $$c$$ flips the interval.\n- Step 2: When $$X = 3$$: $$Y = 12 - 9 = 3$$. When $$X = 8$$: $$Y = 12 - 24 = -12$$. So $$Y$$ ranges from $$-12$$ to $$3$$, with the lower endpoint being $$-12$$ and the upper being $$3$$.\n- Step 3: Therefore $$Y \\sim \\mathrm{U}[-12, 3]$$. It is still uniform because the linear transformation merely rescales and reflects the original uniform distribution — it doesn't introduce any \"bunching up\" or \"thinning out\" of probability. The p.d.f. of $$Y$$ is $$\\frac{1}{3 - (-12)} = \\frac{1}{15}$$ over $$[-12, 3]$$.\n\nYou can verify: $$\\mathrm{E}(Y) = 12 - 3\\mathrm{E}(X) = 12 - 3(5.5) = -4.5$$, and $$\\frac{-12+3}{2} = \\frac{-9}{2} = -4.5$$. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "Why, for $$X \\sim U[a,b]$$, do the mean and median always coincide? (3 steps)", "answer": "- Step 1: The mean is $$\\frac{a+b}{2}$$, the midpoint by symmetry.\n- Step 2: The median $$m$$ satisfies $$F(m) = 0.5$$, giving $$\\frac{m-a}{b-a} = 0.5 \\Rightarrow m = \\frac{a+b}{2}$$ — also the midpoint.\n- Step 3: Both coincide because the PDF is symmetric about its centre. More generally: *any* symmetric continuous distribution has mean = median (when both exist).\n\nTakeaway: symmetry of the PDF forces mean = median — useful both as a check and as a mental shortcut.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "For $$X \\sim U[a,b]$$, how do you compute $$P(X > c \\mid X > d)$$ when $$a < d < c < b$$? Describe two equivalent approaches. (3 steps)", "answer": "- Step 1: **Approach 1 (restricted sample space):** Given $$X > d$$, the conditional distribution is uniform on $$[d, b]$$. So $$P(X > c \\mid X > d) = \\frac{b-c}{b-d}$$.\n- Step 2: **Approach 2 (formula):** $$P(X > c \\mid X > d) = \\frac{P(X > c \\cap X > d)}{P(X > d)}$$. Since $$c > d$$, the intersection is just $$\\{X > c\\}$$, giving $$\\frac{P(X > c)}{P(X > d)} = \\frac{(b-c)/(b-a)}{(b-d)/(b-a)} = \\frac{b-c}{b-d}$$.\n- Step 3: Both methods give the same answer. The restricted-uniform view is often faster mentally.\n\nTakeaway: conditioning a uniform on a sub-interval yields another uniform — the most useful feature for conditional probability.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "A wooden rod of length 20 cm is cut at a random point. The length of the piece with a mark on it is $$X \\sim \\mathrm{U}[0, 20]$$. Find the probability that the shorter piece is at least 8 cm long. (3 steps)", "answer": "- Step 1: The piece with the mark has length $$X$$, so the other piece has length $$20 - X$$. The shorter piece is $$\\min(X, 20 - X)$$.\n- Step 2: The shorter piece is at least 8 cm when both pieces are at least 8 cm: $$X \\ge 8$$ and $$20 - X \\ge 8$$. The second condition gives $$X \\le 12$$. So we need $$8 \\le X \\le 12$$.\n- Step 3: $$\\mathrm{P}(8 \\le X \\le 12) = \\frac{12 - 8}{20 - 0} = \\frac{4}{20} = \\frac{1}{5} = 0.2$$.\n\nThe shorter piece is at least 8 cm only when the cut falls within the \"middle zone\" $$[8, 12]$$, which has width 4 out of the total 20 cm — a 20% chance.", "source": "GLM 5.1 ③", "_id": "glm_3_32"}, {"question": "Describe the three essential formulas for $$U[a,b]$$: mean, variance, and CDF (middle piece). Briefly explain what each represents. (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{a+b}{2}$$ — the midpoint of the interval, which is also the median by symmetry. Represents the \"balance point\" of the rectangle.\n- Step 2: $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$ — depends only on width, quadratically. The \"12\" comes from $$3 \\times 4$$ in the variance derivation.\n- Step 3: $$F(x) = \\frac{x-a}{b-a}$$ for $$a \\leq x \\leq b$$ — the proportion of the interval accumulated up to $$x$$. Linear ramp from 0 to 1.\n\nThese three formulas form the complete toolkit — almost every uniform-distribution problem reduces to one or more of them.", "source": "Opus 4.7 ②", "_id": "opus_2_61"}, {"question": "For $$X \\sim U[a,b]$$, why does truncating to a sub-interval (conditioning on $$X > c$$ for $$a < c < b$$) yield another uniform distribution — specifically $$U[c, b]$$? (3 steps)", "answer": "- Step 1: Conditional CDF: $$P(X \\leq x \\mid X > c) = \\frac{P(c < X \\leq x)}{P(X > c)}$$ for $$x \\in (c, b]$$.\n- Step 2: Compute: $$P(c < X \\leq x) = \\frac{x-c}{b-a}$$ and $$P(X > c) = \\frac{b-c}{b-a}$$. The ratio is $$\\frac{x-c}{b-c}$$.\n- Step 3: This matches the CDF of $$U[c, b]$$. So the conditional distribution is uniform on the truncated interval.\n\nInterpretation: the uniform has \"no memory\" — once you know $$X$$ is somewhere in a sub-interval, it's still equally likely everywhere within that sub-interval. This is why the \"restricted sample space\" trick works for conditional probabilities.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "For $$X \\sim U[-5, 4]$$, describe conceptually how you would compute $$E(X^2)$$ using integration, and cross-check with another method. (4 steps)", "answer": "- Step 1: Set up: $$E(X^2) = \\int_{-5}^{4} x^2 \\cdot f(x)\\, dx$$ with $$f(x) = \\frac{1}{9}$$ on the support.\n- Step 2: Pull out the constant: $$E(X^2) = \\frac{1}{9} \\int_{-5}^{4} x^2\\, dx$$. The antiderivative is $$\\frac{x^3}{3}$$.\n- Step 3: Evaluate: $$\\frac{4^3 - (-5)^3}{3} = \\frac{64 + 125}{3} = 63$$. Divide by 9: $$E(X^2) = 7$$.\n- Step 4: Cross-check using $$E(X^2) = \\text{Var}(X) + (E(X))^2 = \\frac{81}{12} + \\left(-\\frac{1}{2}\\right)^2 = 6.75 + 0.25 = 7$$. ✓\n\nTakeaway: two independent routes (direct integral, variance identity) should always agree — good error check.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "A rod of random length $$X \\sim U[10, 20]$$ is used as one side of a rectangle, with the other side being $$20 - X$$. Find the expected area of the rectangle. Highlight the conceptual trap. (4 steps)", "answer": "- Step 1: Area $$A = X(20 - X) = 20X - X^2$$.\n- Step 2: Use linearity: $$E(A) = 20E(X) - E(X^2)$$.\n- Step 3: $$E(X) = 15$$, $$\\text{Var}(X) = \\frac{100}{12} = \\frac{25}{3}$$, so $$E(X^2) = \\frac{25}{3} + 225 = \\frac{700}{3}$$.\n- Step 4: $$E(A) = 300 - \\frac{700}{3} = \\frac{200}{3} \\approx 66.67$$ cm².\n\n**Trap**: computing $$E(X)(20 - E(X)) = 15 \\cdot 5 = 75$$ is WRONG. This treats $$X$$ as if it had no spread. The correct computation incorporates $$E(X^2) \\neq [E(X)]^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "When is a continuous uniform distribution a *poor* model, and what features can it not capture? (3 steps)", "answer": "- Step 1: Uniform fails when there's any *central tendency* — heights of people, IQ scores, production-line errors around a target all have peaks near a central value with tapering tails. Uniform has no peak.\n- Step 2: It also fails when values don't have a strict bounded range. Uniform strictly forbids values outside $$[a,b]$$; many real phenomena allow rare extreme values.\n- Step 3: Good uses: rounding errors, \"random time in window\" models, random spinners, random cut-points on a line. Bad uses: human body measurements, exam scores, measurement errors with systematic bias.\n\nTakeaway: uniform = \"no preferred value inside bounded support\"; use only when reality matches.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Describe a scenario requiring $$E(g(X)) = \\int g(x) f(x)\\, dx$$ (rather than $$g(E(X))$$) and execute the idea conceptually for a concrete non-linear $$g$$. (3 steps)", "answer": "- Step 1: Let $$X \\sim U[1,5]$$ (tree radius) and we want $$E(A) = E(\\pi X^2)$$. The function $$g(x) = \\pi x^2$$ is non-linear.\n- Step 2: The naïve (wrong) approach $$E(A) \\stackrel{?}{=} \\pi(E(X))^2 = 9\\pi$$ ignores the spread.\n- Step 3: The correct approach: use $$E(A) = \\pi E(X^2) = \\pi(\\text{Var}(X) + (E(X))^2) = \\pi(\\frac{4}{3} + 9) = \\frac{31\\pi}{3}$$. This exceeds $$9\\pi$$ because squaring amplifies spread.\n\nTakeaway: for non-linear $$g$$, never move $$E$$ inside — use the variance identity or integrate directly.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "A spinner with pointer length $$r$$ is spun, with angle $$\\theta \\sim U[0, 2\\pi]$$. Define $$X = r|\\sin\\theta|$$ = horizontal distance from vertical. How could this setup estimate $$\\pi$$? (4 steps)", "answer": "- Step 1: Compute $$E(X) = r \\cdot E(|\\sin\\theta|)$$. By symmetry, $$E(|\\sin\\theta|) = \\frac{1}{2\\pi}\\int_0^{2\\pi}|\\sin\\theta|\\,d\\theta = \\frac{1}{\\pi}\\int_0^\\pi \\sin\\theta\\,d\\theta = \\frac{2}{\\pi}$$.\n- Step 2: So $$E(X) = \\frac{2r}{\\pi}$$, which contains $$\\pi$$ in the denominator.\n- Step 3: **Experimental estimate**: spin many times, measure horizontal distances, compute sample mean $$\\bar{x}$$.\n- Step 4: Rearrange: $$\\hat\\pi = \\frac{2r}{\\bar{x}}$$. By the law of large numbers, $$\\bar{x} \\to \\frac{2r}{\\pi}$$ as sample size grows, so $$\\hat\\pi \\to \\pi$$.\n\nBeautiful Monte Carlo application: geometric randomness → numerical approximation of $$\\pi$$.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "For $$X \\sim \\mathrm{U}[a, b]$$, the mode is undefined. Explain why, and contrast this with the mean and median. (2 steps)", "answer": "- Step 1: The mode is the value at which the p.d.f. attains its maximum. For a uniform distribution, the p.d.f. is constant at $$\\frac{1}{b-a}$$ across the entire interval — every value in $$[a, b]$$ is equally \"peak-like.\" There is no unique value that occurs more frequently than others, so the mode is undefined (or equivalently, every value in the interval is a mode).\n- Step 2: This contrasts with the mean and median, which are both well-defined and equal to $$\\frac{a+b}{2}$$. The mean, median, and mode typically coincide for symmetric unimodal distributions (like the normal), but the uniform distribution is a special case: it's symmetric but not unimodal — it has no peak at all.\n\nThe uniform distribution is the \"flattest\" possible distribution on its interval. The absence of a mode reflects the complete lack of central tendency in the density — only the cumulative properties (mean, median) have meaningful values.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "If you arrive at a train station where trains leave every hour at random times (you don't know the schedule), explain why the waiting time X can be modelled as $X \\sim U[0, 60]$ minutes. What assumptions does this model make? (2 steps)", "answer": "- Step 1: If you arrive at a random time relative to the train schedule and have no information about when the last train left, your waiting time could be anywhere from 0 (arrive just as train comes) to 60 minutes (arrive just after train left). Assuming arrival time is equally likely at any point in the hour, waiting time is uniformly distributed.\n- Step 2: The key assumptions are: (1) your arrival time is random and independent of the train schedule; (2) trains leave at regular intervals but you have no knowledge of the phase; (3) there's no preference for any particular waiting time within the hour. In reality, this might not hold if trains don't run perfectly regularly.", "source": "MiniMax ①", "_id": "minimax_1_17"}, {"question": "Sketch the PDF and CDF of $$X \\sim U[2, 7]$$ in your mind. What are the key features, and how are they related? (3 steps)", "answer": "- Step 1: **PDF**: A horizontal rectangle at height $$\\frac{1}{5} = 0.2$$ between $$x = 2$$ and $$x = 7$$; zero elsewhere. Shape: \"flat-topped box.\"\n- Step 2: **CDF**: Flat at 0 for $$x < 2$$; linear ramp from 0 to 1 as $$x$$ goes from 2 to 7; flat at 1 for $$x > 7$$. Shape: three pieces (flat, rising, flat).\n- Step 3: The CDF's slope equals the PDF: 0 outside $$[2,7]$$, and $$\\frac{1}{5}$$ inside — matching the PDF height. This is $$f(x) = F'(x)$$.\n\nPDF = rectangle; CDF = ramp. They encode the same information in different forms.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "For $$X \\sim U[0, 1]$$ vs $$U[100, 101]$$ vs $$U[0, 10]$$ — how do the variances compare, and what does this reveal about the variance formula? (3 steps)", "answer": "- Step 1: $$U[0,1]$$: $$\\text{Var} = \\frac{1}{12}$$. $$U[100,101]$$: also $$\\frac{1}{12}$$. Same width → same variance.\n- Step 2: $$U[0, 10]$$: $$\\text{Var} = \\frac{100}{12} = \\frac{25}{3}$$. Ten times the width, but 100 times the variance.\n- Step 3: This confirms: variance is translation-invariant (shift doesn't matter) and quadratic in width (scaling width by $$k$$ scales variance by $$k^2$$).\n\nVariance cares about *how wide* the distribution is, not *where* on the number line it sits.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "For $$X \\sim U[3, 8]$$ and $$Y = 12 - 3X$$, explain how to compute $$P(X < 7 \\mid Y < 0)$$ in the simplest way. (3 steps)", "answer": "- Step 1: Convert the condition on $$Y$$ into a condition on $$X$$: $$Y < 0 \\Leftrightarrow 12 - 3X < 0 \\Leftrightarrow X > 4$$. Both probabilities now reference $$X$$.\n- Step 2: $$P(X < 7 \\mid X > 4) = \\frac{P(4 < X < 7)}{P(X > 4)} = \\frac{3/5}{4/5} = \\frac{3}{4}$$, via interval proportions (widths out of 5).\n- Step 3: Equivalently, conditioning on $$X > 4$$ gives $$X \\mid X > 4 \\sim U[4,8]$$, so $$P(X < 7) = \\frac{7-4}{8-4} = \\frac{3}{4}$$. Same answer.\n\nTakeaway: always reformulate conditional events in the same variable, then use the restricted-uniform shortcut.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "Why is the continuous uniform distribution sometimes called a \"flat prior\" or \"principle-of-indifference\" distribution? (3 steps)", "answer": "- Step 1: If you know only that a quantity lies in some interval $$[a, b]$$ but have no reason to favour any value over another, the \"maximally non-committal\" choice is a flat density.\n- Step 2: Any non-flat choice would implicitly assert \"this region is more likely\" — information we don't have.\n- Step 3: Thus uniform is the natural default when modelling \"pure ignorance within a bounded range\" — common in Bayesian priors, rounding-error analysis, and random-time models.\n\nTakeaway: uniform = \"no information beyond the support bounds\" — a principled choice under ignorance.", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "A student claims that for $X \\sim U[0, 10]$, the variance is simply $(10-0)^2 = 100$. Explain why this is incorrect and state the correct variance. (2 steps)", "answer": "- Step 1: The student's calculation of $(b-a)^2$ = 100 is wrong because the formula for variance of a uniform distribution is $\\frac{(b-a)^2}{12}$, not $(b-a)^2$. The factor of 12 comes from the integration of squared deviations from the mean.\n- Step 2: The correct variance is $\\frac{(10-0)^2}{12} = \\frac{100}{12} = \\frac{25}{3} \\approx 8.33$. This makes sense: the standard deviation is $\\frac{b-a}{\\sqrt{12}} \\approx \\frac{10}{3.46} \\approx 2.89$, indicating that values typically fall within about 2.89 of the mean of 5, which is much smaller than the range of 10.", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "In a continuous uniform distribution, why is \"probability of a range\" the same as \"proportion of the total interval\"? Explain both geometrically and algebraically. (3 steps)", "answer": "- Step 1: **Geometric view**: Probability is area under PDF. For uniform, PDF is a rectangle of height $$\\frac{1}{b-a}$$. A sub-interval of width $$w$$ gives area $$\\frac{w}{b-a}$$ — literally the proportion of the total rectangle.\n- Step 2: **Algebraic view**: $$P(c < X < d) = \\int_c^d \\frac{1}{b-a}\\,dx = \\frac{d-c}{b-a}$$. The integrand is constant, so the integral is just width × height.\n- Step 3: Both views agree: probability = proportion of interval.\n\nThis equivalence is *unique* to uniform. For other distributions, you need to integrate the varying PDF.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "The uniform distribution is rare in nature compared to the normal. Why? What are its theoretical limitations as a model? (3 steps)", "answer": "- Step 1: Most natural processes (heights, weights, measurement errors) arise from many small random contributions, which the **Central Limit Theorem** pushes toward the normal distribution. Uniform rarely emerges this way.\n- Step 2: Uniform models a very specific scenario: bounded range + no preferred value. Real quantities usually have *some* preferred region or tail decay.\n- Step 3: Its sharp cutoffs at $$a$$ and $$b$$ are unrealistic for most phenomena — in reality, values slightly outside are often possible but less likely. Uniform says they're *impossible*, a strong assumption.\n\nUse uniform when the range really is hard-bounded (angular position, rounding window, fixed time interval) — not as a generic stand-in for \"don't know.\"", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "Why does modeling rounding error as uniform imply that the underlying true quantity is \"information-free\" within the rounding window? (3 steps)", "answer": "- Step 1: The uniform is the **maximum entropy** distribution on a bounded interval — it encodes the minimum prior information beyond \"the value lies in this range.\"\n- Step 2: By assuming rounding error is $$U[-0.5, 0.5]$$, you're asserting no reason to think the true value is more likely at one point within the rounding window than another.\n- Step 3: If you had extra information (e.g., values tend to cluster at round numbers), the actual error distribution might not be uniform. But absent that, uniform is the unbiased default.\n\nUsing uniform is a specific epistemic statement: \"I know the range and nothing else.\"", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "In an exam, you're asked to \"suggest a suitable distribution\" for a real-world variable. What are the key questions to ask before choosing uniform? (3 steps)", "answer": "- Step 1: **Is there a preferred value or central tendency?** If yes (e.g., tins targeting 200g), use normal. If no, uniform may fit.\n- Step 2: **Is there a known bounded range with no other information?** If yes (e.g., rounding error, random cut), use uniform. If values can fall into tails, normal is better.\n- Step 3: **Is it a count of discrete events?** If yes, don't use uniform at all — use binomial, Poisson, etc.\n\nQuick tests:\n+ \"Equally likely in interval\", \"random position\", \"rounding\" → uniform\n+ \"Average\", \"typical\", \"most values near X\" → normal\n+ \"Number of\", \"count of\" → discrete", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "What fraction of a $$U[a,b]$$ distribution lies within one standard deviation of the mean, and how does this compare to a normal distribution? (3 steps)", "answer": "- Step 1: $$\\sigma = \\frac{b-a}{\\sqrt{12}}$$, so interval $$[\\mu - \\sigma, \\mu + \\sigma]$$ has width $$\\frac{2(b-a)}{\\sqrt{12}} = \\frac{b-a}{\\sqrt{3}}$$.\n- Step 2: Probability of falling in this interval = $$\\frac{1}{\\sqrt{3}} \\approx 0.577$$ or about 58%.\n- Step 3: Compare to normal: about 68% lies within one $$\\sigma$$. Uniforms have *less* central concentration because there's no peak.\n\nTakeaway: same \"$$\\sigma$$\" can imply different coverage across distributions — $$\\sigma$$ alone doesn't tell you the shape.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "If you're told a uniform has $$P(X > 7) = 0.5$$, what does this say about the endpoints $$a$$ and $$b$$? Can you determine them from just this? (3 steps)", "answer": "- Step 1: $$P(X > 7) = 0.5$$ means 7 is the median of the distribution.\n- Step 2: For a uniform, median = midpoint = $$\\frac{a+b}{2}$$. So $$\\frac{a+b}{2} = 7$$, i.e., $$a + b = 14$$.\n- Step 3: This gives only the midpoint — not enough to determine both endpoints. You'd need another piece of information (variance, width, another probability).\n\nOne uniform property (the median) doesn't uniquely specify a two-parameter distribution. You always need two independent constraints.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "If you divide the support of $$X \\sim U[a,b]$$ into $$n$$ equal-width sub-intervals, why does \"which sub-interval did $$X$$ land in?\" give a discrete uniform distribution? (3 steps)", "answer": "- Step 1: Each sub-interval has width $$\\frac{b-a}{n}$$ and probability $$\\frac{b-a}{n} \\cdot \\frac{1}{b-a} = \\frac{1}{n}$$.\n- Step 2: So \"sub-interval index\" is a discrete random variable on $$\\{1, 2, \\ldots, n\\}$$ with each outcome having probability $$\\frac{1}{n}$$ — that's the definition of a discrete uniform.\n- Step 3: This reveals a deep link: continuous uniform = limit of discrete uniform as bins shrink to zero width.\n\nTakeaway: binning a continuous uniform gives a discrete uniform; taking $$n \\to \\infty$$ recovers the continuous version.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "If $X \\sim \\mathrm{U}[3, 8]$ and $Y = 12 - 3X$, find the distribution of $Y$ and explain why the interval endpoints swap. (3 steps)", "answer": "- Step 1: Since $Y = 12 - 3X = -3X + 12$, this is a linear transformation with $c = -3$ (negative!) and $d = 12$. A linear transformation with a negative coefficient still produces a uniform distribution, but the interval reverses.\n\n- Step 2: When $X = 3$: $Y = 12 - 9 = 3$. When $X = 8$: $Y = 12 - 24 = -12$. So $Y$ takes values from $-12$ to $3$. Since we always write intervals with the smaller value first: $$Y \\sim \\mathrm{U}[-12, 3]$$.\n\n- Step 3: The \"swap\" happens because $c = -3 < 0$: as $X$ increases, $Y$ decreases. The minimum of $X$ maps to the maximum of $Y$ and vice versa. Verify: $$\\mathrm{E}(Y) = -3 \\times 5.5 + 12 = -4.5$$, which matches $$\\frac{-12+3}{2} = -4.5$$.\n\nTakeaway: When the scaling factor $c$ is negative, the interval endpoints reverse order.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "For $$X \\sim U[a,b]$$, what does $$F(x)$$ physically represent, and why is its slope exactly $$\\frac{1}{b-a}$$ on the support? (3 steps)", "answer": "- Step 1: $$F(x) = P(X \\leq x)$$ — accumulated probability up to $$x$$, equivalently the fraction of the support covered by $$[a, x]$$.\n- Step 2: Increasing $$x$$ by $$\\Delta x$$ increases covered fraction by $$\\frac{\\Delta x}{b-a}$$, so $$\\frac{\\Delta F}{\\Delta x} = \\frac{1}{b-a}$$.\n- Step 3: This slope equals the PDF value — probability accumulates at a constant rate because the density is constant. Steeper CDF ↔ higher local PDF; uniforms have neither.\n\nTakeaway: CDF slope = PDF value. For uniforms, this is constant $$\\frac{1}{b-a}$$ on the support.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Why does the uniform distribution have variance $$\\frac{(b-a)^2}{12}$$, rather than $$\\frac{(b-a)^2}{4}$$ which might seem natural (half-width squared)? (3 steps)", "answer": "- Step 1: The naïve $$(b-a)^2/4$$ is the *maximum squared deviation* — squared distance from the mean to an endpoint.\n- Step 2: But variance averages $$(x-\\mu)^2$$ over the whole support, and most points in $$[a,b]$$ are closer to the mean than the endpoints are.\n- Step 3: Averaging gives a factor of $$\\frac{1}{3}$$ less — so $$\\frac{(b-a)^2}{4} \\cdot \\frac{1}{3} = \\frac{(b-a)^2}{12}$$. The factor $$\\frac{1}{3}$$ arises from integrating $$x^2$$ from 0 to the half-width.\n\nTakeaway: variance is an *average* of squared deviations (not the max); the $$\\frac{1}{12}$$ reflects flat-density averaging.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "Why does $$P(a \\leq X \\leq b) = P(a < X < b)$$ for a continuous uniform distribution? Does this equality hold for discrete distributions? (2 steps)", "answer": "- Step 1: For any continuous distribution, $$P(X = c) = 0$$ for every specific $$c$$. So including or excluding single points doesn't change the probability of an interval.\n- Step 2: For discrete distributions, this fails! If $$Y$$ takes integer values with positive probability, $$P(2 \\leq Y \\leq 5)$$ includes $$Y = 2$$ and $$Y = 5$$, while $$P(2 < Y < 5)$$ excludes them. The two differ by $$P(Y=2) + P
