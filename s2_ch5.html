just uniform), what is $$P(X = k)$$ for a single point $$k$$, and why?", "answer": "$$P(X = k) = 0$$ for any single point $$k$$. The probability is accumulated from *areas* under the PDF, and a single point has zero width, hence zero area. Another way: splitting $$[a,b]$$ into infinitely many points, each with equal \"probability,\" would give infinite total probability unless each is 0. This is why $$P(c \\leq X \\leq d) = P(c < X < d)$$ for continuous distributions — endpoints contribute nothing.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "For $$X \\sim U[a,b]$$, state $$E(X)$$ and give the intuitive reason why it takes this value. (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{a+b}{2}$$ — the midpoint of the interval.\n- Step 2: The PDF is a flat rectangle — perfectly symmetric about its centre. The expected value is the \"balance point\" (centre of mass) of the PDF, which must be the midpoint.\n- Step 3: Equivalently, equal amounts of probability sit to the left and right of $$\\frac{a+b}{2}$$, so no value has more \"pull\" — the mean lands in the middle.\n\nTakeaway: for *any* symmetric distribution, $$E(X)$$ equals the axis of symmetry.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Derive $$E(X) = \\frac{a+b}{2}$$ for $$X \\sim U[a,b]$$ from the definition of expectation. (4 steps)", "answer": "- Step 1: By definition, $$E(X) = \\int_{-\\infty}^{\\infty} x \\cdot f(x)\\, dx$$. Since $$f(x) = 0$$ outside $$[a,b]$$, this reduces to $$\\int_a^b x \\cdot \\frac{1}{b-a}\\, dx$$.\n- Step 2: Pull out the constant: $$E(X) = \\frac{1}{b-a} \\int_a^b x\\, dx$$.\n- Step 3: Evaluate: $$\\int_a^b x\\, dx = \\left[\\frac{x^2}{2}\\right]_a^b = \\frac{b^2 - a^2}{2}$$.\n- Step 4: Factor $$b^2 - a^2 = (b-a)(b+a)$$, giving $$E(X) = \\frac{(b-a)(b+a)}{2(b-a)} = \\frac{a+b}{2}$$. The $$(b-a)$$ cancels — that's where the midpoint emerges algebraically.\n\nTakeaway: the algebra confirms the symmetry intuition — the midpoint isn't a coincidence.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "State $$\\text{Var}(X)$$ for $$X \\sim U[a,b]$$ and explain qualitatively why it scales as $$(b-a)^2$$. (3 steps)", "answer": "- Step 1: $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$.\n- Step 2: The *spread* is fundamentally controlled by the width $$(b-a)$$. Doubling the width doubles the typical distance from the mean — variance squares deviations, so it quadruples.\n- Step 3: Hence the $$(b-a)^2$$ factor. The constant $$\\frac{1}{12}$$ is the \"shape factor\" peculiar to the flat rectangle — other distributions (e.g. normal) would have different constants.\n\nTakeaway: variance scales with (range)² for any distribution; only the $$\\frac{1}{12}$$ is uniform-specific.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Derive $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$ for $$X \\sim U[a,b]$$ using $$\\text{Var}(X) = E(X^2) - (E(X))^2$$. (5 steps)", "answer": "- Step 1: Compute $$E(X^2) = \\int_a^b x^2 \\cdot \\frac{1}{b-a}\\, dx = \\frac{1}{b-a}\\left[\\frac{x^3}{3}\\right]_a^b = \\frac{b^3 - a^3}{3(b-a)}$$.\n- Step 2: Factor $$b^3 - a^3 = (b-a)(b^2 + ab + a^2)$$, so $$E(X^2) = \\frac{b^2 + ab + a^2}{3}$$.\n- Step 3: From $$E(X) = \\frac{a+b}{2}$$: $$(E(X))^2 = \\frac{a^2 + 2ab + b^2}{4}$$.\n- Step 4: Subtract over common denominator 12: $$\\text{Var}(X) = \\frac{4(b^2 + ab + a^2) - 3(a^2 + 2ab + b^2)}{12} = \\frac{b^2 - 2ab + a^2}{12}$$.\n- Step 5: Recognise $$b^2 - 2ab + a^2 = (b-a)^2$$, giving $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$.\n\nTakeaway: the slick factoring $$b^3 - a^3 = (b-a)(b^2+ab+a^2)$$ is what makes this work cleanly.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Derive $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$ using the $$\\int (x-\\mu)^2 f(x)\\, dx$$ form, exploiting the symmetry trick. (4 steps)", "answer": "- Step 1: With $$\\mu = \\frac{a+b}{2}$$, write $$\\text{Var}(X) = \\int_a^b \\frac{(x - \\mu)^2}{b-a}\\, dx$$.\n- Step 2: Since $$\\frac{d}{dx}(x-\\mu)^3 = 3(x-\\mu)^2$$, we have $$\\int (x-\\mu)^2\\, dx = \\frac{(x-\\mu)^3}{3}$$. So $$\\text{Var}(X) = \\frac{1}{3(b-a)}\\left[(x-\\mu)^3\\right]_a^b$$.\n- Step 3: Evaluate: $$b - \\mu = \\frac{b-a}{2}$$ and $$a - \\mu = -\\frac{b-a}{2}$$. Using $$-(a-\\mu)^3 = (\\mu-a)^3 = \\left(\\frac{b-a}{2}\\right)^3$$, both contributions are equal and add.\n- Step 4: Result: $$\\text{Var}(X) = \\frac{2 \\cdot (b-a)^3/8}{3(b-a)} = \\frac{(b-a)^2}{12}$$.\n\nTakeaway: shifting by $$\\mu$$ exploits the *symmetry* of the rectangle — both endpoints equidistant from the centre, so their cubes combine neatly.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "What is the cumulative distribution function $$F(x)$$ of $$X \\sim U[a,b]$$, and why is it piecewise with three cases? (3 steps)", "answer": "- Step 1: For $$x < a$$: no probability accumulated yet, so $$F(x) = 0$$. For $$x > b$$: all probability accumulated, so $$F(x) = 1$$.\n- Step 2: For $$a \\leq x \\leq b$$: we're in \"ramp-up\" phase. $$F(x) = \\frac{x-a}{b-a}$$ — this is the *fraction* of the support from $$a$$ to $$x$$.\n- Step 3: The three cases arise because the PDF is zero outside $$[a,b]$$ — the CDF is flat there (at 0 or 1). Inside $$[a,b]$$ the CDF grows linearly because the PDF is constant; slope of $$F$$ = value of $$f$$.\n\nTakeaway: the CDF is a ramp from 0 to 1 over the support, reflecting the constant density.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Derive $$F(x) = \\frac{x-a}{b-a}$$ for $$X \\sim U[a,b]$$ from first principles. (3 steps)", "answer": "- Step 1: By definition, $$F(x) = \\int_{-\\infty}^{x} f(t)\\, dt$$. Since $$f(t) = 0$$ for $$t < a$$, this reduces to $$F(x) = \\int_a^x \\frac{1}{b-a}\\, dt$$.\n- Step 2: Integrate the constant: $$\\int_a^x \\frac{1}{b-a}\\, dt = \\frac{1}{b-a}[t]_a^x = \\frac{x-a}{b-a}$$.\n- Step 3: This is a linear function of $$x$$, equal to 0 when $$x = a$$ and 1 when $$x = b$$ — matching the \"fraction of interval covered\" interpretation.\n\nTakeaway: CDF = integral of a constant = line; slope $$\\frac{1}{b-a}$$ equals the PDF height.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "How are the PDF $$f(x)$$ and CDF $$F(x)$$ related, and what does that reveal about the CDF of a uniform distribution? (3 steps)", "answer": "- Step 1: In general, $$f(x) = F'(x)$$ — the PDF is the derivative of the CDF; equivalently, the CDF is the running integral of the PDF.\n- Step 2: For $$X \\sim U[a,b]$$, the PDF is constant at $$\\frac{1}{b-a}$$ inside the support. A constant derivative means the CDF must be linear inside $$[a,b]$$ — a straight ramp.\n- Step 3: Outside $$[a,b]$$, the PDF is 0, so the CDF's derivative is 0 there, meaning the CDF is flat (at 0 below, at 1 above).\n\nTakeaway: the ramp-like shape of the uniform CDF is a direct consequence of the constant PDF.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "If $$X \\sim U[a,b]$$ and $$Y = cX + d$$ with $$c > 0$$, what is the distribution of $$Y$$ and why is uniformity preserved? (3 steps)", "answer": "- Step 1: The transformation $$Y = cX + d$$ is linear (affine): it scales by $$c$$ and shifts by $$d$$.\n- Step 2: Linear transformations preserve uniformity because they stretch the support *uniformly* — no region is compressed more than another. A flat density stays flat.\n- Step 3: The new support bounds are the images of the old endpoints: $$Y$$ ranges from $$ca + d$$ to $$cb + d$$. Hence $$Y \\sim U[ca + d,\\ cb + d]$$. (If $$c < 0$$, endpoints swap order.)\n\nTakeaway: scaling and shifting preserve flatness — only the bounds change.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "If $$X \\sim U[2, 8]$$ and $$Y = 2X + 5$$, describe the distribution of $$Y$$ and cross-check using mean and variance. (3 steps)", "answer": "- Step 1: Lower bound of $$Y$$ is $$2(2) + 5 = 9$$; upper bound is $$2(8) + 5 = 21$$. So $$Y \\sim U[9, 21]$$.\n- Step 2: Cross-check mean: $$E(Y) = 2E(X) + 5 = 2(5) + 5 = 15$$, which matches $$\\frac{9+21}{2} = 15$$. ✓\n- Step 3: Cross-check variance: $$\\text{Var}(Y) = 4\\text{Var}(X) = 4 \\cdot 3 = 12$$, matching $$\\frac{(21-9)^2}{12} = 12$$. ✓\n\nTakeaway: transform endpoints, then verify with mean/variance formulas — both should agree.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "For $$X \\sim U[a,b]$$, how do you compute $$P(X > c \\mid X > d)$$ when $$a < d < c < b$$? Describe two equivalent approaches. (3 steps)", "answer": "- Step 1: **Approach 1 (restricted sample space):** Given $$X > d$$, the conditional distribution is uniform on $$[d, b]$$. So $$P(X > c \\mid X > d) = \\frac{b-c}{b-d}$$.\n- Step 2: **Approach 2 (formula):** $$P(X > c \\mid X > d) = \\frac{P(X > c \\cap X > d)}{P(X > d)}$$. Since $$c > d$$, the intersection is just $$\\{X > c\\}$$, giving $$\\frac{P(X > c)}{P(X > d)} = \\frac{(b-c)/(b-a)}{(b-d)/(b-a)} = \\frac{b-c}{b-d}$$.\n- Step 3: Both methods give the same answer. The restricted-uniform view is often faster mentally.\n\nTakeaway: conditioning a uniform on a sub-interval yields another uniform — the most useful feature for conditional probability.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "Explain why a continuous uniform distribution, when conditioned on lying in a sub-interval, remains uniform. (3 steps)", "answer": "- Step 1: The PDF of $$X \\sim U[a,b]$$ is constant at $$\\frac{1}{b-a}$$ inside $$[a,b]$$. Conditioning on $$X \\in [c, d]$$ focuses attention on that sub-region.\n- Step 2: The conditional density is $$\\frac{f(x)}{P(X \\in [c,d])} = \\frac{1/(b-a)}{(d-c)/(b-a)} = \\frac{1}{d-c}$$ for $$x \\in [c,d]$$.\n- Step 3: This is exactly the PDF of $$U[c, d]$$! Flatness is preserved because conditioning just *rescales* the restricted rectangle to have area 1 — no reshaping occurs.\n\nTakeaway: uniforms are \"invariant under sub-interval conditioning\" — a very computationally useful property.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "Given $$Y \\sim U[a, b]$$ with $$E(Y) = 1$$ and $$\\text{Var}(Y) = \\frac{16}{3}$$, outline the strategy to recover $$a$$ and $$b$$. (3 steps)", "answer": "- Step 1: Use the mean formula: $$\\frac{a+b}{2} = 1 \\Rightarrow a + b = 2$$. This pins down the *sum* of the endpoints.\n- Step 2: Use the variance formula: $$\\frac{(b-a)^2}{12} = \\frac{16}{3} \\Rightarrow (b-a)^2 = 64 \\Rightarrow b - a = 8$$ (positive root since $$a < b$$). This pins down the *difference*.\n- Step 3: Two linear equations $$a + b = 2$$ and $$b - a = 8$$ give $$b = 5, a = -3$$ by addition/subtraction.\n\nTakeaway: *sum* of endpoints from the mean, *difference* from the variance — they decouple into two simple equations.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "Why is it a common error to compute $$E(X^2)$$ as $$(E(X))^2$$, and how are they related? (3 steps)", "answer": "- Step 1: $$E(X^2)$$ is the expected value of the *squared* variable; $$(E(X))^2$$ is the square of the *expected* value. These differ whenever $$X$$ has any spread.\n- Step 2: The relationship is $$E(X^2) = \\text{Var}(X) + (E(X))^2 \\geq (E(X))^2$$, with equality only when $$\\text{Var}(X) = 0$$ (i.e., $$X$$ is constant).\n- Step 3: The gap $$E(X^2) - (E(X))^2$$ *is* the variance by definition — it measures exactly how much squaring amplifies the \"spread\" of the distribution.\n\nTakeaway: expectation does not commute with non-linear functions; squaring is non-linear.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Why does the uniform distribution have variance $$\\frac{(b-a)^2}{12}$$, rather than $$\\frac{(b-a)^2}{4}$$ which might seem natural (half-width squared)? (3 steps)", "answer": "- Step 1: The naïve $$(b-a)^2/4$$ is the *maximum squared deviation* — squared distance from the mean to an endpoint.\n- Step 2: But variance averages $$(x-\\mu)^2$$ over the whole support, and most points in $$[a,b]$$ are closer to the mean than the endpoints are.\n- Step 3: Averaging gives a factor of $$\\frac{1}{3}$$ less — so $$\\frac{(b-a)^2}{4} \\cdot \\frac{1}{3} = \\frac{(b-a)^2}{12}$$. The factor $$\\frac{1}{3}$$ arises from integrating $$x^2$$ from 0 to the half-width.\n\nTakeaway: variance is an *average* of squared deviations (not the max); the $$\\frac{1}{12}$$ reflects flat-density averaging.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "For a continuous uniform distribution, why is \"equally likely\" correctly stated in terms of intervals rather than individual values? (3 steps)", "answer": "- Step 1: For any continuous distribution, $$P(X = k) = 0$$ for any specific value $$k$$. So saying \"all values are equally likely\" in the naïve sense would mean \"all have probability 0\" — an uninformative statement.\n- Step 2: The correct statement: equal-length sub-intervals of $$[a,b]$$ have equal probability. E.g., $$P(a \\leq X \\leq a + 0.01) = P(b - 0.01 \\leq X \\leq b)$$.\n- Step 3: This matches the physical picture: probability density is constant, so \"thickness of probability per unit length\" is the same everywhere in the support.\n\nTakeaway: for continuous distributions, \"likelihood\" lives in intervals, not in points.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Why is the continuous uniform distribution commonly used to model waiting times when the arrival time is completely unknown (within a known window)? (3 steps)", "answer": "- Step 1: If no information suggests any time is more likely than another within a window of length $$L$$, the \"maximally non-committal\" model is that all moments are equally likely.\n- Step 2: E.g., if trains leave hourly and you arrive at a random moment, the time until the next train is $$U[0, 60]$$ minutes.\n- Step 3: This doesn't mean waits are *actually* uniform in every real system — it's a principle-of-indifference model for when you lack specific information about arrival structure.\n\nTakeaway: uniform = \"maximum ignorance\" model when you only know the support bounds.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "Why is the rounding error from measuring to the nearest unit (e.g., nearest cm) typically modelled as $$U[-0.5, 0.5]$$? (3 steps)", "answer": "- Step 1: \"To the nearest cm\" means a recorded value $$n$$ corresponds to a true value in $$[n - 0.5, n + 0.5]$$ — the rounding rule.\n- Step 2: The error $$R = \\text{true} - \\text{recorded}$$ therefore lies in $$[-0.5, 0.5]$$ by construction.\n- Step 3: Without further information, the true value is assumed equally likely anywhere in that interval, making $$R \\sim U[-0.5, 0.5]$$.\n\nTakeaway: support comes directly from rounding precision; uniformity is the natural \"unbiased\" assumption.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "If a pencil's length is measured to the nearest cm, what does $$E(R) = 0$$ tell us physically, and what does the variance represent? (3 steps)", "answer": "- Step 1: $$R \\sim U[-0.5, 0.5]$$, so $$E(R) = \\frac{-0.5 + 0.5}{2} = 0$$. This means there's no *systematic bias*: errors are centred on zero (as many over as under).\n- Step 2: The variance is $$\\frac{1^2}{12} \\approx 0.083 \\text{ cm}^2$$, so standard deviation $$\\sigma \\approx 0.29$$ cm. This is the *typical* magnitude of an individual error.\n- Step 3: Zero mean error does NOT mean zero error — it means errors cancel on average but each measurement has some spread around the true value.\n\nTakeaway: rounding produces zero *average* error but nonzero *typical* error — bias vs. precision are different concepts.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "For $$R \\sim U[1, 5]$$ and $$A = \\pi R^2$$, why is $$E(A) \\neq \\pi(E(R))^2$$, and what's the correct approach? (3 steps)", "answer": "- Step 1: Squaring is non-linear, so $$E(R^2) \\neq (E(R))^2$$. Any formula assuming linearity fails here.\n- Step 2: The correct relation is $$E(A) = \\pi E(R^2)$$, and $$E(R^2) = \\text{Var}(R) + (E(R))^2$$.\n- Step 3: Plug in: $$\\text{Var}(R) = \\frac{16}{12} = \\frac{4}{3}$$, $$E(R) = 3$$, so $$E(R^2) = \\frac{4}{3} + 9 = \\frac{31}{3}$$, giving $$E(A) = \\frac{31\\pi}{3}$$. Note $$\\pi(E(R))^2 = 9\\pi$$ — which is *smaller* and wrong.\n\nTakeaway: for non-linear transformations, use $$E(X^2) = \\text{Var}(X) + (E(X))^2$$ or integrate $$g(x)f(x)$$ directly.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "When is a continuous uniform distribution a *poor* model, and what features can it not capture? (3 steps)", "answer": "- Step 1: Uniform fails when there's any *central tendency* — heights of people, IQ scores, production-line errors around a target all have peaks near a central value with tapering tails. Uniform has no peak.\n- Step 2: It also fails when values don't have a strict bounded range. Uniform strictly forbids values outside $$[a,b]$$; many real phenomena allow rare extreme values.\n- Step 3: Good uses: rounding errors, \"random time in window\" models, random spinners, random cut-points on a line. Bad uses: human body measurements, exam scores, measurement errors with systematic bias.\n\nTakeaway: uniform = \"no preferred value inside bounded support\"; use only when reality matches.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Between a normal distribution and a continuous uniform, which would you recommend for (a) masses of 200 g tins from a production line, and (b) rounding error to the nearest cm? Justify. (3 steps)", "answer": "- Step 1: For (a) tin masses: a production line *aims* at 200 g but has random fluctuations. Masses cluster near 200 g with rare extremes — a bell-shape. This is **normal**.\n- Step 2: For (b) rounding errors: strictly bounded in $$[-0.5, 0.5]$$, with no preferred value inside (given arbitrary true values). This is **continuous uniform** $$U[-0.5, 0.5]$$.\n- Step 3: Diagnostic: does the process \"aim with scatter\" (→ normal) or \"fill a bounded ignorance window\" (→ uniform)?\n\nTakeaway: normal models aim-and-scatter; uniform models bounded ignorance.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Derive the interquartile range (IQR) for $$X \\sim U[a,b]$$, and explain why its form makes intuitive sense. (3 steps)", "answer": "- Step 1: $$Q_1$$ satisfies $$F(Q_1) = 0.25$$, giving $$Q_1 = a + 0.25(b-a)$$. Similarly $$Q_3 = a + 0.75(b-a)$$.\n- Step 2: IQR $$= Q_3 - Q_1 = 0.5(b-a)$$ — exactly half the total width of the support.\n- Step 3: This makes sense: because the density is flat, equal widths carry equal probability, so half the probability (the middle 50%) sits in a sub-interval of length $$\\frac{1}{2}(b-a)$$.\n\nTakeaway: for uniforms, all quantile-based quantities are simple fractions of $$(b-a)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "If $$X \\sim U[a,b]$$ and we take $$n$$ independent observations, how do you model the probability that exactly $$k$$ fall in a given sub-interval? (3 steps)", "answer": "- Step 1: For a single observation, $$p = P(X \\text{ in sub-interval}) = \\frac{\\text{sub-interval width}}{b-a}$$ — easy geometric proportion.\n- Step 2: Each of the $$n$$ observations independently lies in the sub-interval with probability $$p$$. The count is then Binomial: $$\\text{Count} \\sim B(n, p)$$.\n- Step 3: $$P(\\text{exactly } k) = \\binom{n}{k} p^k (1-p)^{n-k}$$.\n\nTakeaway: uniform (per observation) + independent trials = binomial count — a common S2 setup.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Given $$X \\sim U[a, b]$$ with $$P(X < 5) = \\frac{1}{4}$$ and $$P(X > 7) = \\frac{1}{2}$$, outline how to deduce $$a$$ and $$b$$. (3 steps)", "answer": "- Step 1: $$P(X < 5) = \\frac{1}{4}$$ means 5 lies at the \"25% mark\" from $$a$$; i.e., $$\\frac{5-a}{b-a} = \\frac{1}{4}$$.\n- Step 2: $$P(X > 7) = \\frac{1}{2}$$ means 7 is the median (50% from either end), so 7 is exactly the midpoint: $$\\frac{a+b}{2} = 7 \\Rightarrow a+b = 14$$.\n- Step 3: Combining with the first equation gives a specific pair. Each probability condition fixes an endpoint at a known fraction of the width; two conditions determine $$(a,b)$$ uniquely.\n\nTakeaway: interpret each probability as a \"position within the support\" — this usually gives linear equations in $$a, b$$.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "If $$X \\sim U[a,b]$$ is uniform, is $$X^2$$ also uniform? What happens to the density? (3 steps)", "answer": "- Step 1: In general, $$X^2$$ is **not** uniform. Uniformity is preserved only under *linear* transformations; squaring is non-linear.\n- Step 2: The PDF of $$X^2$$ tends to spike near 0 (if 0 is in the support) and decays for larger values — because squaring compresses intervals near 0 and stretches intervals farther out.\n- Step 3: Geometrically: a flat probability slab on $$[-c,c]$$ gets \"folded and stretched\" under squaring — equal-width input intervals become unequal-width output intervals, breaking the flat density.\n\nTakeaway: only linear maps preserve uniformity; any curvature warps the density.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Describe how the CDF of $$X \\sim U[-3, 5]$$ looks, identifying its three regions and the slope on the support. (3 steps)", "answer": "- Step 1: For $$x < -3$$: $$F(x) = 0$$ (flat horizontal line at 0).\n- Step 2: For $$-3 \\leq x \\leq 5$$: $$F(x) = \\frac{x+3}{8}$$, a straight line rising from 0 at $$x=-3$$ to 1 at $$x=5$$.\n- Step 3: For $$x > 5$$: $$F(x) = 1$$ (flat line at 1). The slope on the support is $$\\frac{1}{8}$$, matching the PDF height — because $$f(x) = F'(x)$$.\n\nTakeaway: the uniform CDF is a \"trapezoidal ramp\": flat → linear → flat.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "A 20 cm rod is cut at a random point. The length of the longer piece $$X$$ is modelled as $$X \\sim U[10, 20]$$. Why does $$X$$ start at 10, not 0? (3 steps)", "answer": "- Step 1: When a 20 cm rod is cut into two pieces of lengths $$p$$ and $$20 - p$$, the \"longer piece\" is always at least 10 cm — it's at least half the total length.\n- Step 2: The longer piece's maximum is 20 cm (only in the limit where the cut is at an end).\n- Step 3: So the possible range for $$X$$ is $$[10, 20]$$. The problem then models $$X$$ as *uniformly* distributed on this range (consistent with uniform cut-point).\n\nTakeaway: always reason about the *actual* range of the variable, not the naïve full interval.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Given a CDF $$F(x) = \\frac{x+3}{7}$$ for $$-3 \\leq x \\leq 4$$ (with usual extensions), how do you identify the distribution and find $$f(x)$$? (3 steps)", "answer": "- Step 1: A linear CDF on a bounded support is the signature of a continuous uniform distribution. So $$X \\sim U[-3, 4]$$.\n- Step 2: Differentiate to recover the PDF: $$f(x) = F'(x) = \\frac{1}{7}$$ on $$[-3, 4]$$, 0 elsewhere.\n- Step 3: Verify: support width is 7, PDF height $$\\frac{1}{7}$$, so area = 1. Consistent.\n\nTakeaway: linear CDF on bounded support ⇔ continuous uniform distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "For $$X \\sim U[-5, 4]$$, describe conceptually how you would compute $$E(X^2)$$ using integration, and cross-check with another method. (4 steps)", "answer": "- Step 1: Set up: $$E(X^2) = \\int_{-5}^{4} x^2 \\cdot f(x)\\, dx$$ with $$f(x) = \\frac{1}{9}$$ on the support.\n- Step 2: Pull out the constant: $$E(X^2) = \\frac{1}{9} \\int_{-5}^{4} x^2\\, dx$$. The antiderivative is $$\\frac{x^3}{3}$$.\n- Step 3: Evaluate: $$\\frac{4^3 - (-5)^3}{3} = \\frac{64 + 125}{3} = 63$$. Divide by 9: $$E(X^2) = 7$$.\n- Step 4: Cross-check using $$E(X^2) = \\text{Var}(X) + (E(X))^2 = \\frac{81}{12} + \\left(-\\frac{1}{2}\\right)^2 = 6.75 + 0.25 = 7$$. ✓\n\nTakeaway: two independent routes (direct integral, variance identity) should always agree — good error check.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "For $$X \\sim U[3, 8]$$ and $$Y = 12 - 3X$$, explain how to compute $$P(X < 7 \\mid Y < 0)$$ in the simplest way. (3 steps)", "answer": "- Step 1: Convert the condition on $$Y$$ into a condition on $$X$$: $$Y < 0 \\Leftrightarrow 12 - 3X < 0 \\Leftrightarrow X > 4$$. Both probabilities now reference $$X$$.\n- Step 2: $$P(X < 7 \\mid X > 4) = \\frac{P(4 < X < 7)}{P(X > 4)} = \\frac{3/5}{4/5} = \\frac{3}{4}$$, via interval proportions (widths out of 5).\n- Step 3: Equivalently, conditioning on $$X > 4$$ gives $$X \\mid X > 4 \\sim U[4,8]$$, so $$P(X < 7) = \\frac{7-4}{8-4} = \\frac{3}{4}$$. Same answer.\n\nTakeaway: always reformulate conditional events in the same variable, then use the restricted-uniform shortcut.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "Why does a linear transformation preserve uniformity, while a non-linear one like $$X^2$$ does not? Give the geometric intuition. (3 steps)", "answer": "- Step 1: A linear map $$Y = cX + d$$ stretches and shifts the PDF without changing its shape. A flat rectangle remains a flat rectangle — just repositioned and rescaled.\n- Step 2: Non-linear maps (like $$X^2$$) warp the axis unequally — some regions get compressed, others stretched. Constant density therefore becomes non-constant.\n- Step 3: Visually: slide/flip/rescale a rectangle → still a rectangle. Bend the axis non-uniformly → the rectangle warps into a non-rectangle.\n\nTakeaway: uniformity is a \"linear invariant\" — it survives only under affine re-parameterisations.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "For $$X \\sim U[a,b]$$, how does $$P(a \\leq X \\leq a + \\epsilon)$$ behave as $$\\epsilon \\to 0$$, and what does this reveal about the PDF's role? (3 steps)", "answer": "- Step 1: By the area interpretation, $$P(a \\leq X \\leq a + \\epsilon) = \\frac{\\epsilon}{b-a}$$ — a tiny sliver of width $$\\epsilon$$ times height $$\\frac{1}{b-a}$$.\n- Step 2: As $$\\epsilon \\to 0$$, this probability shrinks to 0 — consistent with $$P(X = a) = 0$$.\n- Step 3: But the *ratio* $$\\frac{P(a \\leq X \\leq a + \\epsilon)}{\\epsilon} = \\frac{1}{b-a}$$ stays constant, and this equals $$f(a)$$. The PDF is \"probability per unit length.\"\n\nTakeaway: the PDF isn't a probability; it's a *density* that produces probability when multiplied by interval width.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "For $$X \\sim U[175, 215]$$, describe how you'd find the value $$x$$ such that $$P(X \\geq x) = 0.65$$ — reasoning via quantiles. (3 steps)", "answer": "- Step 1: $$P(X \\geq x) = 0.65$$ means 65% of probability lies above $$x$$ and 35% lies below — i.e., $$F(x) = 0.35$$.\n- Step 2: For uniforms, $$F(x) = \\frac{x - a}{b-a}$$. Set $$\\frac{x - 175}{40} = 0.35$$.\n- Step 3: Solve: $$x = 175 + 0.35 \\times 40 = 189$$. Intuitively, $$x$$ is 35% of the way from minimum to maximum.\n\nTakeaway: for uniforms, quantile finding = \"which fraction of the way from $$a$$ to $$b$$?\"", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "Why, for $$X \\sim U[a,b]$$, do the mean and median always coincide? (3 steps)", "answer": "- Step 1: The mean is $$\\frac{a+b}{2}$$, the midpoint by symmetry.\n- Step 2: The median $$m$$ satisfies $$F(m) = 0.5$$, giving $$\\frac{m-a}{b-a} = 0.5 \\Rightarrow m = \\frac{a+b}{2}$$ — also the midpoint.\n- Step 3: Both coincide because the PDF is symmetric about its centre. More generally: *any* symmetric continuous distribution has mean = median (when both exist).\n\nTakeaway: symmetry of the PDF forces mean = median — useful both as a check and as a mental shortcut.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "A bus arrives between 3 minutes early and 10 minutes late uniformly. Let $$X$$ = minutes after 9:00 am the bus arrives. Specify the distribution fully and explain the sign convention. (3 steps)", "answer": "- Step 1: \"3 minutes early\" corresponds to $$X = -3$$ (negative because it's before 9:00). \"10 minutes late\" gives $$X = 10$$.\n- Step 2: The window width is $$10 - (-3) = 13$$ minutes. Assuming equally likely arrival times, $$X \\sim U[-3, 10]$$.\n- Step 3: Full specification: $$f(x) = \\frac{1}{13}$$ for $$-3 \\leq x \\leq 10$$; 0 otherwise.\n\nTakeaway: careful sign handling is crucial — \"early\" becomes negative, but the support width is the full earliest-to-latest range.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "What fraction of a $$U[a,b]$$ distribution lies within one standard deviation of the mean, and how does this compare to a normal distribution? (3 steps)", "answer": "- Step 1: $$\\sigma = \\frac{b-a}{\\sqrt{12}}$$, so interval $$[\\mu - \\sigma, \\mu + \\sigma]$$ has width $$\\frac{2(b-a)}{\\sqrt{12}} = \\frac{b-a}{\\sqrt{3}}$$.\n- Step 2: Probability of falling in this interval = $$\\frac{1}{\\sqrt{3}} \\approx 0.577$$ or about 58%.\n- Step 3: Compare to normal: about 68% lies within one $$\\sigma$$. Uniforms have *less* central concentration because there's no peak.\n\nTakeaway: same \"$$\\sigma$$\" can imply different coverage across distributions — $$\\sigma$$ alone doesn't tell you the shape.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "For $$X \\sim U[a,b]$$, what does $$F(x)$$ physically represent, and why is its slope exactly $$\\frac{1}{b-a}$$ on the support? (3 steps)", "answer": "- Step 1: $$F(x) = P(X \\leq x)$$ — accumulated probability up to $$x$$, equivalently the fraction of the support covered by $$[a, x]$$.\n- Step 2: Increasing $$x$$ by $$\\Delta x$$ increases covered fraction by $$\\frac{\\Delta x}{b-a}$$, so $$\\frac{\\Delta F}{\\Delta x} = \\frac{1}{b-a}$$.\n- Step 3: This slope equals the PDF value — probability accumulates at a constant rate because the density is constant. Steeper CDF ↔ higher local PDF; uniforms have neither.\n\nTakeaway: CDF slope = PDF value. For uniforms, this is constant $$\\frac{1}{b-a}$$ on the support.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "If $$X \\sim U[b, 5b]$$ for $$b > 0$$, show conceptually why $$\\text{Var}(X) = \\frac{4b^2}{3}$$. (3 steps)", "answer": "- Step 1: Range $$= 5b - b = 4b$$.\n- Step 2: Apply $$\\text{Var}(X) = \\frac{(\\text{range})^2}{12} = \\frac{(4b)^2}{12} = \\frac{16b^2}{12}$$.\n- Step 3: Simplify: $$\\frac{16b^2}{12} = \\frac{4b^2}{3}$$. Scaling check: variance scales with (range)² — doubling $$b$$ doubles the range and quadruples the variance, consistent.\n\nTakeaway: for uniforms, just substitute the range into $$\\frac{(\\text{range})^2}{12}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "A spinner's angle $$\\theta \\sim U[0, 2\\pi]$$ and $$X = r\\sin\\theta$$ is the horizontal tip distance from the vertical. Why is $$E(X) = 0$$, and what quantity measures typical magnitude? (3 steps)", "answer": "- Step 1: By symmetry, for every angle giving positive $$x$$, the mirror angle (e.g. $$\\pi - \\theta$$ or $$-\\theta$$) gives the opposite negative $$x$$, with equal likelihood under the uniform distribution on $$\\theta$$.\n- Step 2: Positive and negative contributions to $$E(X) = rE(\\sin\\theta)$$ cancel exactly. So $$E(X) = 0$$.\n- Step 3: $$E(|X|)$$ is non-zero — it measures the average horizontal distance regardless of sign, which is what geometric experiments (like Buffon's needle variants for estimating $$\\pi$$) leverage.\n\nTakeaway: symmetry annihilates $$E(X)$$ for odd functions of a symmetric uniform; use $$E(|X|)$$ for \"typical size.\"", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Why is a continuous distribution often preferred over a discrete one for quantities like time or length, even if measurements are discrete? (3 steps)", "answer": "- Step 1: Time and length are fundamentally continuous — they take real values, not just whole numbers. The underlying *reality* is continuous.\n- Step 2: Measurements are discrete only because of finite precision. The rounding introduces a separate (often uniform) error, modelled on top of the continuous truth.\n- Step 3: Continuous models also give cleaner math: densities, CDFs, integrals — calculus simplifies many expressions that would be messy sums in the discrete case.\n\nTakeaway: pick models matching the *nature* of the variable, not the precision of measurement.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "For $$X \\sim U[a, b]$$, how do $$E(X)$$, $$\\text{Var}(X)$$, and PDF height change if you increase $$b$$ while keeping $$a$$ fixed? (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{a+b}{2}$$ increases linearly with $$b$$ — the midpoint shifts right.\n- Step 2: $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$ grows quadratically in $$(b-a)$$ — widening the support amplifies variance rapidly.\n- Step 3: PDF height $$\\frac{1}{b-a}$$ decreases — the rectangle widens and flattens to preserve unit area.\n\nTakeaway: all three changes are tied to the same $$(b-a)$$ factor — widening shifts mean, blows up variance, and squashes the density.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Given $$X \\sim U[a,b]$$, express $$P(X \\geq x)$$ in terms of $$F(x)$$, and explain the \"complement\" formula geometrically. (3 steps)", "answer": "- Step 1: For continuous distributions, $$P(X \\geq x) = 1 - P(X < x) = 1 - F(x)$$, because $$P(X = x) = 0$$.\n- Step 2: Substitute the uniform CDF: $$P(X \\geq x) = 1 - \\frac{x-a}{b-a} = \\frac{(b-a) - (x-a)}{b-a} = \\frac{b-x}{b-a}$$.\n- Step 3: Geometrically, this is the fraction of the support from $$x$$ to $$b$$ (the \"right chunk\"), just as $$F(x)$$ is the fraction from $$a$$ to $$x$$ (the \"left chunk\"). Together they sum to 1.\n\nTakeaway: for uniforms, both $$F$$ and its complement are interval-proportion formulas.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "If you divide the support of $$X \\sim U[a,b]$$ into $$n$$ equal-width sub-intervals, why does \"which sub-interval did $$X$$ land in?\" give a discrete uniform distribution? (3 steps)", "answer": "- Step 1: Each sub-interval has width $$\\frac{b-a}{n}$$ and probability $$\\frac{b-a}{n} \\cdot \\frac{1}{b-a} = \\frac{1}{n}$$.\n- Step 2: So \"sub-interval index\" is a discrete random variable on $$\\{1, 2, \\ldots, n\\}$$ with each outcome having probability $$\\frac{1}{n}$$ — that's the definition of a discrete uniform.\n- Step 3: This reveals a deep link: continuous uniform = limit of discrete uniform as bins shrink to zero width.\n\nTakeaway: binning a continuous uniform gives a discrete uniform; taking $$n \\to \\infty$$ recovers the continuous version.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "For $$X \\sim U[4, 7]$$, compute $$E(X)$$, $$\\text{Var}(X)$$, and $$F(5.5)$$, and interpret each. (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{4+7}{2} = 5.5$$ — the midpoint. This is also the median (by symmetry) and the balance point of the PDF.\n- Step 2: $$\\text{Var}(X) = \\frac{(7-4)^2}{12} = \\frac{9}{12} = 0.75$$. So $$\\sigma \\approx 0.866$$ — typical deviation from the mean.\n- Step 3: $$F(5.5) = \\frac{5.5 - 4}{3} = 0.5$$ — half the probability lies below 5.5, confirming 5.5 is the median.\n\nTakeaway: for uniforms, mean = median = midpoint; variance = width²/12.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "Prove that conditioning a $$U[a,b]$$ random variable on an event $$X > c$$ (where $$a < c < b$$) yields another uniform distribution. (3 steps)", "answer": "- Step 1: Conditional PDF is $$\\frac{f(x)}{P(X > c)}$$ for $$x > c$$ and 0 otherwise.\n- Step 2: Substitute $$f(x) = \\frac{1}{b-a}$$ and $$P(X > c) = \\frac{b-c}{b-a}$$: conditional PDF $$= \\frac{1/(b-a)}{(b-c)/(b-a)} = \\frac{1}{b-c}$$ for $$x \\in (c, b]$$.\n- Step 3: This is exactly the PDF of $$U[c, b]$$. So the conditional distribution is uniform on the new interval; flatness is preserved.\n\nTakeaway: conditioning doesn't warp a uniform — it only truncates and rescales.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "For $$T \\sim U[0,1]$$ (reaction time in seconds), compute $$\\text{Var}(T)$$ and interpret the magnitude. (3 steps)", "answer": "- Step 1: Support width = 1.\n- Step 2: $$\\text{Var}(T) = \\frac{1^2}{12} \\approx 0.083$$ seconds².\n- Step 3: So $$\\sigma \\approx \\frac{1}{\\sqrt{12}} \\approx 0.29$$ seconds. Reactions typically vary by about 0.29 s around the mean of 0.5 s — a substantial fraction of the support. A narrow support doesn't make the variance negligible in relative terms.\n\nTakeaway: even \"narrow\" uniforms can have non-trivial variance relative to the scale of the problem.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "Observed: a CDF is a straight line from $$(-3, 0)$$ to $$(4, 1)$$. What distribution is this, and what is the PDF? (3 steps)", "answer": "- Step 1: A linear CDF on a bounded support is the signature of a continuous uniform distribution. So $$X \\sim U[-3, 4]$$.\n- Step 2: Slope is $$\\frac{1-0}{4-(-3)} = \\frac{1}{7}$$, which equals the constant PDF height on the support.\n- Step 3: The linearity of the CDF *confirms* uniformity; any curvature would signal varying density (steeper slope ↔ higher local PDF).\n\nTakeaway: linear CDF ⇔ constant PDF ⇔ continuous uniform.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "Describe a scenario requiring $$E(g(X)) = \\int g(x) f(x)\\, dx$$ (rather than $$g(E(X))$$) and execute the idea conceptually for a concrete non-linear $$g$$. (3 steps)", "answer": "- Step 1: Let $$X \\sim U[1,5]$$ (tree radius) and we want $$E(A) = E(\\pi X^2)$$. The function $$g(x) = \\pi x^2$$ is non-linear.\n- Step 2: The naïve (wrong) approach $$E(A) \\stackrel{?}{=} \\pi(E(X))^2 = 9\\pi$$ ignores the spread.\n- Step 3: The correct approach: use $$E(A) = \\pi E(X^2) = \\pi(\\text{Var}(X) + (E(X))^2) = \\pi(\\frac{4}{3} + 9) = \\frac{31\\pi}{3}$$. This exceeds $$9\\pi$$ because squaring amplifies spread.\n\nTakeaway: for non-linear $$g$$, never move $$E$$ inside — use the variance identity or integrate directly.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "For uniform distributions, what's the one-line shortcut for \"given $$X$$ lies in a sub-interval, what's the probability it lies in a sub-sub-interval?\" (3 steps)", "answer": "- Step 1: The conditional distribution of a uniform on a sub-interval is *also* uniform on that sub-interval.\n- Step 2: So probabilities within the sub-interval are just ratios of lengths — no integration needed.\n- Step 3: Concretely: if $$X \\sim U[a,b]$$ and you condition on $$X \\in [c,d]$$, then $$X \\mid X \\in [c,d] \\sim U[c,d]$$, and $$P(X < e \\mid X \\in [c,d]) = \\frac{e-c}{d-c}$$ for $$c < e < d$$.\n\nTakeaway: uniformity-on-sub-interval is the single most useful computational shortcut for conditional probability with uniforms.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "For $$X \\sim U[190, 210]$$ (coffee volume in ml), describe the PDF with key values. (3 steps)", "answer": "- Step 1: On the $$x$$-axis, 190 and 210 are the support bounds. Outside this interval, $$f(x) = 0$$.\n- Step 2: Inside $$[190, 210]$$, the PDF is horizontal at height $$\\frac{1}{210 - 190} = 0.05$$ per ml.\n- Step 3: The shape is a rectangle of base 20 and height 0.05, giving area $$20 \\times 0.05 = 1$$ — confirming total probability.\n\nTakeaway: always mentally verify area = 1 via base × height.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "Given $$X \\sim U[190, 210]$$, describe how to find $$P(X > 200 \\mid X > 195)$$ using the conditional-uniform shortcut. (3 steps)", "answer": "- Step 1: Given $$X > 195$$, the conditional distribution is $$X \\mid X > 195 \\sim U[195, 210]$$ (new width = 15).\n- Step 2: Event $$X > 200$$ corresponds to sub-interval $$(200, 210]$$, width 10.\n- Step 3: $$P(X > 200 \\mid X > 195) = \\frac{10}{15} = \\frac{2}{3}$$.\n\nTakeaway: treat the conditional uniform as a fresh uniform on the conditioning interval — length ratios do the rest.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "For a uniform distribution, the probability of being \"within $$k$$ units of the mean\" depends on which feature of the support? (3 steps)", "answer": "- Step 1: \"Within $$k$$ units of the mean\" defines a symmetric sub-interval of width $$2k$$ centred on the mean.\n- Step 2: Probability = $$\\frac{\\text{sub-interval width}}{\\text{support width}} = \\frac{2k}{b-a}$$, provided the sub-interval sits entirely in $$[a,b]$$.\n- Step 3: So it depends only on the total support width: narrower support ⇒ higher in-range probability. If $$2k \\geq b-a$$, the probability is 1.\n\nTakeaway: for uniforms, \"within $$\\pm k$$ of mean\" = $$\\frac{2k}{b-a}$$ (when applicable).", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "Given $$X \\sim U[-3, 3]$$ (cutting errors in mm), explain why $$P(|X| > 2)$$ is the \"tail probability\" and compute it. (3 steps)", "answer": "- Step 1: $$|X| > 2$$ means $$X < -2$$ or $$X > 2$$ — the two tails of the support.\n- Step 2: Each tail has width 1 ($$[-3, -2]$$ and $$[2, 3]$$); the total support has width 6.\n- Step 3: $$P(|X| > 2) = \\frac{1 + 1}{6} = \\frac{1}{3}$$.\n\nTakeaway: for symmetric absolute-value events on uniforms, add matching tail widths and divide by support width.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "Why is it incorrect to say \"$$P(X = 198) = 0.05$$\" for $$X \\sim U[190, 210]$$, even though $$f(198) = 0.05$$? (3 steps)", "answer": "- Step 1: For any continuous random variable, $$P(X = k) = 0$$ for any specific value $$k$$. So $$P(X = 198) = 0$$, not 0.05.\n- Step 2: The value 0.05 is the *probability density* $$f(198) = \\frac{1}{20}$$ — probability per unit length, not probability itself.\n- Step 3: What *is* true: $$P(197.5 < X < 198.5) = 1 \\times 0.05 = 0.05$$, because this is an interval of width 1. Density × width = probability.\n\nTakeaway: the PDF is a density, not a probability; probabilities live in intervals of positive width.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": true}, {"question": "For $$X \\sim U[a, b]$$, why does the PDF's flatness imply the CDF must be a *line* rather than a curve on the support? (3 steps)", "answer": "- Step 1: $$F'(x) = f(x)$$. The PDF is a constant function of $$x$$ on $$[a,b]$$, equal to $$\\frac{1}{b-a}$$.\n- Step 2: The antiderivative of a constant is a linear function — that's elementary calculus. So $$F$$ must be linear in $$x$$ on the support.\n- Step 3: The constant PDF value $$\\frac{1}{b-a}$$ *is* the slope of this line. A non-constant PDF would give a non-linear CDF (curved).\n\nTakeaway: constant derivative ⇒ linear antiderivative; that's why the uniform CDF is a straight ramp.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "Why is the continuous uniform distribution sometimes called a \"flat prior\" or \"principle-of-indifference\" distribution? (3 steps)", "answer": "- Step 1: If you know only that a quantity lies in some interval $$[a, b]$$ but have no reason to favour any value over another, the \"maximally non-committal\" choice is a flat density.\n- Step 2: Any non-flat choice would implicitly assert \"this region is more likely\" — information we don't have.\n- Step 3: Thus uniform is the natural default when modelling \"pure ignorance within a bounded range\" — common in Bayesian priors, rounding-error analysis, and random-time models.\n\nTakeaway: uniform = \"no information beyond the support bounds\" — a principled choice under ignorance.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}], "count": 62}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What is the defining feature of a continuous uniform distribution $$X \\sim U[a,b]$$, and what does \"uniform\" mean both geometrically and probabilistically? (3 steps)", "answer": "- Step 1: Probabilistically, \"uniform\" means every sub-interval of $$[a,b]$$ of the same length has the *same* probability. An interval of width $$0.1$$ near $$a$$ has the same probability as one near $$b$$ — no region is preferred.\n- Step 2: Geometrically, the PDF is a flat horizontal line over $$[a,b]$$ — literally a rectangle. This is the only shape consistent with \"equal probability density everywhere.\"\n- Step 3: The formula $$f(x) = \\frac{1}{b-a}$$ on $$[a,b]$$ (and $$0$$ elsewhere) is *forced*: the height must make the rectangle's area equal 1.\n\nTakeaway: uniform = \"equally likely anywhere in the interval\" = flat PDF = rectangular.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Why must the height of the PDF for $$U[a,b]$$ be exactly $$\\frac{1}{b-a}$$ and not any other value? (3 steps)", "answer": "- Step 1: Any PDF must integrate to 1 over its domain — this is a fundamental axiom (total probability = 1).\n- Step 2: Since the PDF is a constant $$h$$ over an interval of width $$b-a$$, the total area is $$h(b-a)$$, which must equal 1.\n- Step 3: Solving $$h(b-a) = 1$$ gives $$h = \\frac{1}{b-a}$$ — the unique height that satisfies the probability axiom.\n\nSo $$\\frac{1}{b-a}$$ isn't a magic formula — it's the forced value of the constant density given the normalization constraint.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "For $$X \\sim U[a,b]$$, why is $$P(X = c) = 0$$ for any specific $$c$$, and how does this reconcile with the intuition that \"some value must occur\"? (3 steps)", "answer": "- Step 1: Mathematically, $$P(X = c) = \\int_c^c f(x)\\,dx = 0$$: integrating over a zero-width interval gives zero area. This holds for any continuous distribution.\n- Step 2: Intuition: with infinitely many possible values in the interval, probability \"mass\" is spread over a continuum. No single point can carry positive weight, or the total would be infinite.\n- Step 3: This implies $$P(a < X < b) = P(a \\leq X \\leq b)$$ for continuous distributions — endpoints don't matter. Continuous probability is about *ranges*, not points.\n\nSome value does occur in any realization, but the probability of any *pre-specified* value is zero. Realization $$\\neq$$ assigned probability.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "If $$X \\sim U[2, 7]$$, how would you compute $$P(3 < X < 5)$$ mentally using proportion reasoning, without integration? (2 steps)", "answer": "- Step 1: Total interval width is $$7 - 2 = 5$$. Target sub-interval width is $$5 - 3 = 2$$.\n- Step 2: Since density is constant (uniform), probability equals the fraction of the total interval: $$\\frac{2}{5} = 0.4$$.\n\nThe proportion trick works because \"uniform\" means probability is literally proportional to width — no integration needed.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Why does the \"proportion of interval\" shortcut work for computing probabilities in a uniform distribution, but *not* for other continuous distributions? (3 steps)", "answer": "- Step 1: Probability is geometrically the area under the PDF: $$P(c < X < d) = \\int_c^d f(x)\\,dx$$.\n- Step 2: For uniform, $$f(x)$$ is constant, so the integral simplifies to (height)(width) = $$\\frac{d-c}{b-a}$$ — exactly the proportion of the total interval.\n- Step 3: For non-uniform distributions (e.g., normal), the PDF varies with $$x$$, so equal-width intervals have unequal probabilities. Proportion-of-width becomes meaningless.\n\nThe \"proportion\" rule is really just \"when PDF is flat, probability = geometric area of a rectangle.\"", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "For $$X \\sim U[a,b]$$, why is $$E(X) = \\frac{a+b}{2}$$? Argue from symmetry without integration. (3 steps)", "answer": "- Step 1: The PDF is perfectly symmetric about the midpoint $$\\frac{a+b}{2}$$ — the rectangle has no tilt or preference for either side.\n- Step 2: The expected value is the \"balance point\" of the distribution — where it would balance if treated as a physical object of that shape.\n- Step 3: For a symmetric distribution, the balance point must coincide with the axis of symmetry (the midpoint). Any other value would contradict symmetry.\n\nFormal integration confirms this, but symmetry gives the answer instantly — no calculus required.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Derive $$E(X)$$ for $$X \\sim U[a,b]$$ from first principles using integration. (4 steps)", "answer": "- Step 1: By definition, $$E(X) = \\int_{-\\infty}^{\\infty} x f(x)\\,dx$$. Since $$f(x) = 0$$ outside $$[a,b]$$, this becomes $$\\int_a^b x \\cdot \\frac{1}{b-a}\\,dx$$.\n- Step 2: Pull out the constant: $$\\frac{1}{b-a}\\int_a^b x\\,dx = \\frac{1}{b-a}\\left[\\frac{x^2}{2}\\right]_a^b$$.\n- Step 3: Evaluate: $$\\frac{1}{b-a} \\cdot \\frac{b^2 - a^2}{2}$$.\n- Step 4: Factor $$b^2 - a^2 = (b-a)(b+a)$$, so $$E(X) = \\frac{(b-a)(b+a)}{2(b-a)} = \\frac{a+b}{2}$$.\n\nIntegration confirms what symmetry suggests — the midpoint.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Derive $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$ for $$X \\sim U[a,b]$$ using the definition $$\\text{Var}(X) = \\int (x-\\mu)^2 f(x)\\,dx$$ where $$\\mu = \\frac{a+b}{2}$$. (5 steps)", "answer": "- Step 1: $$\\text{Var}(X) = \\int_a^b \\left(x - \\frac{a+b}{2}\\right)^2 \\cdot \\frac{1}{b-a}\\,dx$$.\n- Step 2: Integrate $$(x-\\mu)^2$$: antiderivative is $$\\frac{(x-\\mu)^3}{3}$$. So $$\\text{Var}(X) = \\frac{1}{3(b-a)}\\left[(x-\\mu)^3\\right]_a^b$$.\n- Step 3: Upper limit: $$b - \\mu = \\frac{b-a}{2}$$, so this gives $$\\left(\\frac{b-a}{2}\\right)^3 = \\frac{(b-a)^3}{8}$$.\n- Step 4: Lower limit: $$a - \\mu = -\\frac{b-a}{2}$$, so this gives $$-\\frac{(b-a)^3}{8}$$.\n- Step 5: Subtracting: $$\\frac{1}{3(b-a)}\\left[\\frac{(b-a)^3}{8} + \\frac{(b-a)^3}{8}\\right] = \\frac{1}{3(b-a)} \\cdot \\frac{(b-a)^3}{4} = \\frac{(b-a)^2}{12}$$.\n\nThe $$12$$ emerges from $$3 \\times 4$$: the \"3\" from integrating $$x^2$$ and the \"4\" from cubing $$\\frac{1}{2}$$ and doubling.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Why does the variance of $$U[a,b]$$ depend only on the *width* $$(b-a)$$, not on where the interval sits on the number line? (2 steps)", "answer": "- Step 1: Variance measures *spread*, not *location*. Shifting $$[0,1]$$ to $$[100,101]$$ doesn't change how spread out the values are — it just relocates them.\n- Step 2: Mathematically, $$\\text{Var}(X + c) = \\text{Var}(X)$$ for any constant $$c$$. Since any $$U[a,b]$$ can be written as $$a + U[0, b-a]$$, variance depends only on $$b-a$$.\n\nIntuition: the \"uncertainty\" in $$X$$ depends on the interval length, not on which part of the number line it occupies.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "Intuitively, why does the variance of $$U[a,b]$$ scale as $$(b-a)^2$$ (quadratically in width) rather than linearly? (2 steps)", "answer": "- Step 1: Variance is defined as *expected squared deviation*: $$E[(X-\\mu)^2]$$. Squaring amplifies the effect of spread — doubling the interval width quadruples squared deviations on average.\n- Step 2: Formally, scaling $$X$$ by factor $$k$$ gives $$(X - \\mu) \\to k(X-\\mu)$$, so $$(X-\\mu)^2 \\to k^2(X-\\mu)^2$$. Hence $$\\text{Var}(kX) = k^2 \\text{Var}(X)$$.\n\nStandard deviation (the square root) scales linearly, matching our physical intuition about \"spread\" — so the $$(b-a)^2$$ in the formula directly reflects this squaring.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Derive the CDF $$F(x)$$ of $$X \\sim U[a,b]$$ for $$a \\leq x \\leq b$$, starting from the definition. (3 steps)", "answer": "- Step 1: By definition, $$F(x) = P(X \\leq x) = \\int_{-\\infty}^{x} f(t)\\,dt$$. For $$x \\in [a,b]$$, this becomes $$\\int_a^x \\frac{1}{b-a}\\,dt$$.\n- Step 2: Evaluate: $$F(x) = \\frac{1}{b-a}[t]_a^x = \\frac{x-a}{b-a}$$.\n- Step 3: Geometrically, this is the area of the rectangle from $$a$$ to $$x$$ with height $$\\frac{1}{b-a}$$: width $$(x-a)$$ times height $$\\frac{1}{b-a}$$.\n\nThe CDF grows linearly from 0 at $$x=a$$ to 1 at $$x=b$$ — a ramp function.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "What is the complete three-piece form of the CDF of $$U[a,b]$$, and why does each piece take its particular form? (3 steps)", "answer": "- Step 1: For $$x < a$$: $$F(x) = 0$$. There's no probability mass below $$a$$, so accumulated probability up to any point below $$a$$ is zero.\n- Step 2: For $$a \\leq x \\leq b$$: $$F(x) = \\frac{x-a}{b-a}$$. This captures the proportion of the interval accumulated so far: 0 at $$x = a$$, 1 at $$x = b$$.\n- Step 3: For $$x > b$$: $$F(x) = 1$$. All probability has been accumulated by $$b$$; going further adds nothing.\n\nThe CDF is a \"ramp\": flat at 0 → linear ascent → flat at 1. Every CDF must be non-decreasing and bounded by 0 and 1, and this one does it with straight lines.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "If $$X \\sim U[2, 8]$$ and $$Y = 2X + 5$$, what is the distribution of $$Y$$? Explain conceptually why linear transformations preserve uniformity. (3 steps)", "answer": "- Step 1: Transform endpoints: at $$X = 2$$, $$Y = 9$$; at $$X = 8$$, $$Y = 21$$. So $$Y$$ ranges over $$[9, 21]$$.\n- Step 2: Linear transformations stretch and shift uniformly — every sub-interval of $$X$$ maps to a sub-interval of $$Y$$ with the *same relative* width. No region becomes denser or sparser.\n- Step 3: So $$Y \\sim U[9, 21]$$. Generally, if $$X \\sim U[a,b]$$ and $$c > 0$$: $$cX + d \\sim U[ca+d, cb+d]$$.\n\nUniformity is preserved because the transformation doesn't \"bunch up\" or \"thin out\" probability density — it just rescales and translates it.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "If $$X \\sim U[0, 2]$$ and $$Y = 10 - 5X$$, describe the distribution of $$Y$$. Watch the sign of the slope! (3 steps)", "answer": "- Step 1: Transform endpoints: at $$X = 0$$, $$Y = 10$$; at $$X = 2$$, $$Y = 0$$. So $$Y$$ takes values between 0 and 10.\n- Step 2: The slope is *negative* ($$-5$$), so orientation flips — but the stretching remains uniform. Density scales consistently, so uniformity is preserved.\n- Step 3: Hence $$Y \\sim U[0, 10]$$. Always write the smaller endpoint first, regardless of how the transformation's sign worked out.\n\nKey point: negative slope flips the direction, but the resulting distribution is still uniform on the new interval.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Why is $$E(g(X))$$ generally *not* equal to $$g(E(X))$$ for nonlinear $$g$$? Illustrate with $$g(X) = X^2$$ where $$X \\sim U[-1, 1]$$. (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{-1+1}{2} = 0$$, so naively $$g(E(X)) = 0^2 = 0$$.\n- Step 2: But $$E(X^2) = \\text{Var}(X) + [E(X)]^2 = \\frac{4}{12} + 0 = \\frac{1}{3}$$, which is clearly not 0.\n- Step 3: Reason: expectation is a *linear* operator, but squaring is not. Squared values are always non-negative, so their average can't be below zero — even if the original values average to zero.\n\nRule: $$E[g(X)] = g(E(X))$$ holds only for *linear* $$g$$ (like $$g(X) = aX + b$$). For nonlinear $$g$$, there's always a gap (Jensen's inequality).", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "A tree cross-section has radius $$R \\sim U[1, 5]$$, and its area is $$A = \\pi R^2$$. What is the correct conceptual approach to find $$E(A)$$, and what's the classic trap? (4 steps)", "answer": "- Step 1: Use linearity: $$E(A) = E(\\pi R^2) = \\pi E(R^2)$$. The constant $$\\pi$$ comes out of expectation.\n- Step 2: $$E(R^2) \\neq [E(R)]^2$$ (the trap!). Instead, use $$E(R^2) = \\text{Var}(R) + [E(R)]^2$$.\n- Step 3: For $$R \\sim U[1,5]$$: $$E(R) = 3$$ and $$\\text{Var}(R) = \\frac{16}{12} = \\frac{4}{3}$$, so $$E(R^2) = \\frac{4}{3} + 9 = \\frac{31}{3}$$.\n- Step 4: So $$E(A) = \\frac{31\\pi}{3}$$. The trap answer $$\\pi \\cdot 3^2 = 9\\pi$$ ignores the spread — but spread contributes to the expected squared value.\n\nMoral: for nonlinear functions, you must use the full distribution, not just the mean.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "For $$X \\sim U[a,b]$$, why does truncating to a sub-interval (conditioning on $$X > c$$ for $$a < c < b$$) yield another uniform distribution — specifically $$U[c, b]$$? (3 steps)", "answer": "- Step 1: Conditional CDF: $$P(X \\leq x \\mid X > c) = \\frac{P(c < X \\leq x)}{P(X > c)}$$ for $$x \\in (c, b]$$.\n- Step 2: Compute: $$P(c < X \\leq x) = \\frac{x-c}{b-a}$$ and $$P(X > c) = \\frac{b-c}{b-a}$$. The ratio is $$\\frac{x-c}{b-c}$$.\n- Step 3: This matches the CDF of $$U[c, b]$$. So the conditional distribution is uniform on the truncated interval.\n\nInterpretation: the uniform has \"no memory\" — once you know $$X$$ is somewhere in a sub-interval, it's still equally likely everywhere within that sub-interval. This is why the \"restricted sample space\" trick works for conditional probabilities.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "Given a uniform $$X$$ with $$E(X) = 1$$ and $$\\text{Var}(X) = \\frac{16}{3}$$, how would you set up and solve for $$a$$ and $$b$$? (4 steps)", "answer": "- Step 1: From $$E(X) = \\frac{a+b}{2} = 1$$: equation (i) gives $$a + b = 2$$.\n- Step 2: From $$\\text{Var}(X) = \\frac{(b-a)^2}{12} = \\frac{16}{3}$$: $$(b-a)^2 = 64$$, so $$b - a = 8$$ (positive root since $$b > a$$).\n- Step 3: Solve simultaneously: adding gives $$2b = 10$$, so $$b = 5$$ and $$a = -3$$.\n- Step 4: Verify: midpoint $$= 1$$ ✓; width$$^2/12 = 64/12 = 16/3$$ ✓.\n\nGeneral recipe: $$E$$ fixes the midpoint; $$\\text{Var}$$ fixes the width. Two constraints → unique $$[a, b]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "A uniform PDF has height $$0.4$$ over its support. What is the width of the interval, and what's the underlying reasoning? (2 steps)", "answer": "- Step 1: For a uniform PDF, total area = height × width = 1 (normalization). So $$0.4 \\times \\text{width} = 1$$.\n- Step 2: Width = $$\\frac{1}{0.4} = 2.5$$.\n\nConceptually: once you know the PDF height for a uniform distribution, the width is forced. A tall-narrow and short-wide rectangle are both valid ways to hold unit probability, and height × width = 1 is the constraint.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "For $$X \\sim U[a,b]$$, how does the CDF help you find any quantile (percentile)? Derive a general formula for the $$p$$-th quantile. (3 steps)", "answer": "- Step 1: The CDF is $$F(x) = \\frac{x-a}{b-a}$$. To find $$x$$ with $$P(X \\leq x) = p$$, set $$\\frac{x-a}{b-a} = p$$.\n- Step 2: Solve: $$x = a + p(b-a)$$. This says: start at $$a$$, move a fraction $$p$$ of the way to $$b$$.\n- Step 3: Special cases: median ($$p = 0.5$$) = midpoint; $$Q_1$$ ($$p = 0.25$$) = a quarter of the way; $$Q_3$$ ($$p = 0.75$$) = three-quarters.\n\nUnlike other distributions, uniform percentiles are linear interpolations between the endpoints — beautifully simple.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "You make $$n$$ observations of $$X \\sim U[a,b]$$ and want the probability that exactly $$k$$ of them fall below some threshold $$c$$. How do you combine the uniform with the binomial? (3 steps)", "answer": "- Step 1: Compute the single-trial probability: $$p = P(X < c) = \\frac{c-a}{b-a}$$ (using the uniform CDF).\n- Step 2: Each observation is an independent Bernoulli trial with success probability $$p$$ (success = \"below $$c$$\"). The total count across $$n$$ trials follows $$\\text{Binomial}(n, p)$$.\n- Step 3: So $$P(\\text{exactly } k) = \\binom{n}{k} p^k (1-p)^{n-k}$$ with $$p$$ from step 1.\n\nKey insight: uniform gives the per-trial probability; binomial counts successes across independent trials. Separate the two steps.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "If a measurement is rounded to the nearest unit (e.g., nearest cm), what is the distribution of the rounding error, and why is it uniform? (3 steps)", "answer": "- Step 1: If the recorded value is $$L$$ (to nearest cm), the true value lies in $$[L - 0.5, L + 0.5)$$. The error = true − recorded lies in $$[-0.5, 0.5)$$.\n- Step 2: Assuming no systematic bias and that the true value is essentially arbitrary within the rounding window, every sub-interval of the error range has equal probability. No value is preferred.\n- Step 3: Therefore the rounding error $$R \\sim U[-0.5, 0.5]$$.\n\nWhy uniform (not triangular, say)? Because we assume *no prior information* beyond the range constraint — this is the maximum entropy (most uninformative) choice.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "When is a continuous uniform distribution an appropriate model for a real-world variable, and when is it NOT? Give examples and the reasoning. (3 steps)", "answer": "- Step 1: Appropriate when: (a) all values in some bounded range are equally likely; (b) no preferred region or central tendency; (c) you have only range information. Examples: rounding errors, random cut position on a rod, waiting time for regular-interval events.\n- Step 2: NOT appropriate when: (a) values cluster near a target (use normal); (b) counts of discrete events (use binomial, Poisson); (c) there's known skewness or tail behavior.\n- Step 3: Example contrasts: masses of manufactured tins (normal, clustered around target); heights of people (normal); position of a bus arriving between two times (uniform if arrival is \"random\"); time of day of a spontaneous event (often uniform).\n\nQuick test: \"Is equally likely anywhere in a range a true description?\" If not, uniform is wrong.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "A bus arrives every 60 minutes and you arrive at a random time unrelated to the schedule. What is the distribution of your waiting time, and what is the expected wait? (3 steps)", "answer": "- Step 1: If your arrival is independent of the schedule, your \"offset into the current hour\" is uniformly distributed.\n- Step 2: Your waiting time $$W$$ is therefore $$W \\sim U[0, 60]$$ — from \"just missed it\" ($$W \\approx 60$$) to \"it's arriving now\" ($$W \\approx 0$$), all equally likely.\n- Step 3: $$E(W) = \\frac{0 + 60}{2} = 30$$ minutes — half the scheduling interval.\n\nGeneral result: for random arrival at regularly scheduled events, expected wait is half the schedule interval. The independence assumption is crucial.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Why does $$P(a \\leq X \\leq b) = P(a < X < b)$$ for a continuous uniform distribution? Does this equality hold for discrete distributions? (2 steps)", "answer": "- Step 1: For any continuous distribution, $$P(X = c) = 0$$ for every specific $$c$$. So including or excluding single points doesn't change the probability of an interval.\n- Step 2: For discrete distributions, this fails! If $$Y$$ takes integer values with positive probability, $$P(2 \\leq Y \\leq 5)$$ includes $$Y = 2$$ and $$Y = 5$$, while $$P(2 < Y < 5)$$ excludes them. The two differ by $$P(Y=2) + P(Y=5)$$.\n\nFor continuous uniform, strict vs. non-strict inequality is cosmetic; for discrete, it's substantive.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "A 20 cm rod is cut at a random point uniformly along its length. Why is the length of the *longer* piece, $$X$$, modeled as $$U[10, 20]$$ and not $$U[0, 20]$$? (3 steps)", "answer": "- Step 1: If the cut position is $$C \\sim U[0, 20]$$, the two pieces have lengths $$C$$ and $$20 - C$$. The longer piece is $$X = \\max(C, 20 - C)$$.\n- Step 2: The longer piece must be at least 10 cm: if both were under 10 cm, their total would be under 20 cm (contradiction). So $$X \\geq 10$$.\n- Step 3: Within $$[10, 20]$$, each length corresponds to two cut positions (one from each side), and the combined density works out to be uniform on $$[10, 20]$$.\n\nThe support is geometrically restricted to $$[10, 20]$$ — the longer piece can never be shorter than half the rod.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "For $$X \\sim U[a,b]$$, what does $$f(x)$$ (the PDF) actually measure, and why is it different from $$P(X = x)$$? (3 steps)", "answer": "- Step 1: For continuous $$X$$, $$P(X = x) = 0$$ for every $$x$$. But clearly some ranges are more likely than others (well, for uniform they're equally likely). The density $$f(x)$$ captures \"local likelihood.\"\n- Step 2: $$f(x)$$ is probability *per unit length* near $$x$$: the limit of $$\\frac{P(x < X < x + h)}{h}$$ as $$h \\to 0$$. Its units are \"probability per unit of $$x$$,\" not probability itself.\n- Step 3: So $$f(x) = \\frac{1}{b-a}$$ is a density, not a probability. To convert to probability, multiply by an interval width (integrate).\n\nDensity × width ≈ probability. This is why $$f(x)$$ can exceed 1 (e.g., if $$b-a < 1$$) — densities aren't bounded by 1, only probabilities are.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Sketch the PDF and CDF of $$X \\sim U[2, 7]$$ in your mind. What are the key features, and how are they related? (3 steps)", "answer": "- Step 1: **PDF**: A horizontal rectangle at height $$\\frac{1}{5} = 0.2$$ between $$x = 2$$ and $$x = 7$$; zero elsewhere. Shape: \"flat-topped box.\"\n- Step 2: **CDF**: Flat at 0 for $$x < 2$$; linear ramp from 0 to 1 as $$x$$ goes from 2 to 7; flat at 1 for $$x > 7$$. Shape: three pieces (flat, rising, flat).\n- Step 3: The CDF's slope equals the PDF: 0 outside $$[2,7]$$, and $$\\frac{1}{5}$$ inside — matching the PDF height. This is $$f(x) = F'(x)$$.\n\nPDF = rectangle; CDF = ramp. They encode the same information in different forms.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Given a CDF of the form $$F(x) = \\frac{x+3}{7}$$ for $$-3 \\leq x \\leq 4$$, how can you identify this as a uniform distribution, and what are the endpoints? (3 steps)", "answer": "- Step 1: The standard uniform CDF is $$F(x) = \\frac{x-a}{b-a}$$. Compare: $$-a = 3 \\Rightarrow a = -3$$; $$b - a = 7 \\Rightarrow b = 4$$.\n- Step 2: Verify boundary conditions: $$F(-3) = 0$$ ✓ (must start at 0), $$F(4) = 1$$ ✓ (must end at 1).\n- Step 3: So $$X \\sim U[-3, 4]$$. The PDF is $$f(x) = F'(x) = \\frac{1}{7}$$ on this interval.\n\nRecognition rule: a *linear* CDF between two values is the signature of a uniform distribution. The slope gives the PDF height.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "For $$X \\sim U[-1, 4]$$, how would you mentally estimate $$E(X^2)$$ without performing any integration? (3 steps)", "answer": "- Step 1: Use the identity $$E(X^2) = \\text{Var}(X) + [E(X)]^2$$.\n- Step 2: $$E(X) = \\frac{-1+4}{2} = 1.5$$. $$\\text{Var}(X) = \\frac{(4-(-1))^2}{12} = \\frac{25}{12}$$.\n- Step 3: So $$E(X^2) = \\frac{25}{12} + 1.5^2 = \\frac{25}{12} + \\frac{9}{4} = \\frac{25 + 27}{12} = \\frac{52}{12} = \\frac{13}{3}$$.\n\nThe shortcut avoids integrating $$\\int x^2 f(x)\\,dx$$ directly. Always remember: $$E(X^2) = \\text{Var}(X) + [E(X)]^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "If $$Y = 4X - 6$$ where $$X \\sim U[-1, 5]$$, how do $$E(Y)$$ and $$\\text{Var}(Y)$$ relate to $$E(X)$$ and $$\\text{Var}(X)$$? (3 steps)", "answer": "- Step 1: Linear transformation rules: $$E(aX + b) = aE(X) + b$$ and $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. The additive constant doesn't affect variance.\n- Step 2: $$E(X) = \\frac{-1+5}{2} = 2$$, so $$E(Y) = 4(2) - 6 = 2$$.\n- Step 3: $$\\text{Var}(X) = \\frac{36}{12} = 3$$, so $$\\text{Var}(Y) = 16 \\times 3 = 48$$.\n\nNote the asymmetry: the constant $$-6$$ shifts the mean but doesn't change variance; the scale $$4$$ scales mean by 4 and variance by $$4^2 = 16$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "For $$X \\sim U[a,b]$$, explain why all outcomes are \"equally likely\" even though each specific point has probability zero. (3 steps)", "answer": "- Step 1: \"Equally likely\" doesn't mean each point has equal probability (they all have zero). It means every *equal-length sub-interval* has the same probability.\n- Step 2: So $$P(2 < X < 2.1) = P(3 < X < 3.1)$$ for $$X \\sim U[0, 10]$$ — both sub-intervals have width 0.1 and equal probability 0.01.\n- Step 3: This is captured formally by the constant PDF $$f(x) = \\frac{1}{b-a}$$, which doesn't depend on $$x$$.\n\nAlways interpret \"equally likely\" for continuous distributions as \"equal density,\" not \"equal point probability.\" Think intervals, not points.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Why does modeling rounding error as uniform imply that the underlying true quantity is \"information-free\" within the rounding window? (3 steps)", "answer": "- Step 1: The uniform is the **maximum entropy** distribution on a bounded interval — it encodes the minimum prior information beyond \"the value lies in this range.\"\n- Step 2: By assuming rounding error is $$U[-0.5, 0.5]$$, you're asserting no reason to think the true value is more likely at one point within the rounding window than another.\n- Step 3: If you had extra information (e.g., values tend to cluster at round numbers), the actual error distribution might not be uniform. But absent that, uniform is the unbiased default.\n\nUsing uniform is a specific epistemic statement: \"I know the range and nothing else.\"", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "Why is $$P(X < \\text{midpoint}) = 0.5$$ for $$X \\sim U[a,b]$$, and why does this fail for skewed distributions? (2 steps)", "answer": "- Step 1: Uniform is symmetric about its midpoint. Exactly half the PDF's area lies on each side, so the midpoint is simultaneously the mean AND the median.\n- Step 2: For skewed distributions (e.g., right-skewed), the mean is pulled rightward by the long right tail, while the median stays at the 50-50 point. So mean $$\\neq$$ median in general.\n\nFor uniform, the trio (mean, median, midpoint) all coincide — a rare coincidence enabled by symmetry.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Why is the variance of $$U[a,b]$$ ($$\\frac{(b-a)^2}{12}$$) much smaller than that of a two-point distribution placing mass equally at $$a$$ and $$b$$ ($$\\frac{(b-a)^2}{4}$$), given they have the same range? (3 steps)", "answer": "- Step 1: Two-point distribution: each point is $$\\frac{b-a}{2}$$ away from the mean, so squared deviation is always $$\\left(\\frac{b-a}{2}\\right)^2 = \\frac{(b-a)^2}{4}$$. Variance = that squared deviation.\n- Step 2: Uniform: mass is spread continuously, including much near the mean (with small deviations). Average squared deviation is only $$\\frac{(b-a)^2}{12}$$ — a third as much.\n- Step 3: Insight: variance depends not just on range, but on *how mass is distributed within* the range. Concentrating at extremes maximizes variance for a given range; spreading evenly is much gentler.\n\nSo for the same range, uniform is substantially \"less spread out\" in the variance sense than the endpoints-only distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Given $$X \\sim U[a,b]$$ and $$d < c < b$$, what are two equivalent ways to compute the conditional probability $$P(X < c \\mid X > d)$$? (3 steps)", "answer": "- Step 1: **Formula approach**: $$P(X < c \\mid X > d) = \\frac{P(d < X < c)}{P(X > d)}$$. Both probabilities can be computed by the proportion rule.\n- Step 2: **Restricted sample space**: Given $$X > d$$, the conditional distribution is $$U[d, b]$$. So compute $$P(X < c)$$ in this new uniform directly as $$\\frac{c-d}{b-d}$$.\n- Step 3: Both methods give the same answer $$\\frac{c-d}{b-d}$$. The second is faster and more intuitive for uniforms.\n\nWhy both work: truncating a uniform gives another uniform — every piece of the interval looks statistically the same.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "If an angle $$\\theta \\sim U[0, 2\\pi]$$ and $$X = r\\sin\\theta$$, is $$X$$ uniformly distributed? Why or why not? (3 steps)", "answer": "- Step 1: Linear transformations of uniforms are uniform, but $$\\sin$$ is nonlinear. So $$X$$ is *not* uniform.\n- Step 2: Near $$\\theta = 0$$ or $$\\pi$$, $$\\sin\\theta$$ changes rapidly (slope $$\\pm 1$$), so equal ranges of $$\\theta$$ map to equal ranges of $$\\sin\\theta$$. But near $$\\theta = \\pi/2$$, $$\\sin\\theta$$ is nearly flat — equal $$\\theta$$ ranges squeeze into tiny $$\\sin\\theta$$ ranges.\n- Step 3: The net effect: $$X = r\\sin\\theta$$ has *higher* density near the extremes $$\\pm r$$ and *lower* density near 0. This is the \"arcsine distribution\" shape — U-shaped, not flat.\n\nWarning: uniform in $$\\theta$$ does NOT imply uniform in any nonlinear function of $$\\theta$$. The Jacobian of the transformation matters.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Derive a formula for the interquartile range (IQR) of $$U[a,b]$$. Why is the answer so clean? (3 steps)", "answer": "- Step 1: Lower quartile $$Q_1$$ satisfies $$F(Q_1) = 0.25$$: $$Q_1 = a + 0.25(b-a)$$.\n- Step 2: Upper quartile $$Q_3$$ satisfies $$F(Q_3) = 0.75$$: $$Q_3 = a + 0.75(b-a)$$.\n- Step 3: IQR = $$Q_3 - Q_1 = 0.5(b-a) = \\frac{b-a}{2}$$ — exactly half the interval width.\n\nThe cleanness comes from the linear CDF: equal probability increments correspond to equal position increments. The middle 50% of the probability occupies the middle 50% of the interval.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Suppose $$X \\sim U[b, 5b]$$ for some $$b > 0$$. Express $$E(X)$$ and $$\\text{Var}(X)$$ in terms of $$b$$. What's the scaling lesson? (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{b + 5b}{2} = 3b$$.\n- Step 2: Width is $$5b - b = 4b$$, so $$\\text{Var}(X) = \\frac{(4b)^2}{12} = \\frac{16b^2}{12} = \\frac{4b^2}{3}$$.\n- Step 3: Lesson: when the interval scales by factor $$b$$, the mean scales linearly (by $$b$$) but the variance scales by $$b^2$$. Standard deviation scales linearly, matching the range's scaling.\n\nThis reflects the general rule: $$\\text{Var}(kX) = k^2 \\text{Var}(X)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "For $$X \\sim U[0, 1]$$ vs $$U[100, 101]$$ vs $$U[0, 10]$$ — how do the variances compare, and what does this reveal about the variance formula? (3 steps)", "answer": "- Step 1: $$U[0,1]$$: $$\\text{Var} = \\frac{1}{12}$$. $$U[100,101]$$: also $$\\frac{1}{12}$$. Same width → same variance.\n- Step 2: $$U[0, 10]$$: $$\\text{Var} = \\frac{100}{12} = \\frac{25}{3}$$. Ten times the width, but 100 times the variance.\n- Step 3: This confirms: variance is translation-invariant (shift doesn't matter) and quadratic in width (scaling width by $$k$$ scales variance by $$k^2$$).\n\nVariance cares about *how wide* the distribution is, not *where* on the number line it sits.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "A plumber measures pipe lengths to the nearest cm. What is the probability that one measurement is within 0.2 cm of the true length? What if we want all three of three independent measurements to be within 0.2 cm? (3 steps)", "answer": "- Step 1: Model the error as $$R \\sim U[-0.5, 0.5]$$.\n- Step 2: \"Within 0.2 cm\" means $$|R| < 0.2$$, i.e., $$-0.2 < R < 0.2$$. Using proportion: $$\\frac{0.4}{1} = 0.4$$.\n- Step 3: For three independent measurements all within 0.2 cm: assuming independence, multiply probabilities: $$(0.4)^3 = 0.064$$.\n\nSymmetric interval around zero → use geometric proportion; independent events → multiply probabilities.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Suppose $$X$$ is uniform with $$E(X) = 7.5$$ and $$P(X > 10.5) = 0.25$$. How do you set up and solve for $$a$$ and $$b$$? (4 steps)", "answer": "- Step 1: $$E(X) = \\frac{a+b}{2} = 7.5$$ gives equation (i): $$a + b = 15$$.\n- Step 2: $$P(X > 10.5) = 0.25$$ means the region above 10.5 covers 25% of the interval: $$\\frac{b - 10.5}{b - a} = 0.25$$.\n- Step 3: Rearrange: $$4(b - 10.5) = b - a$$, so $$3b + a = 42$$, equation (ii).\n- Step 4: Subtract (i) from (ii): $$2b = 27 \\Rightarrow b = 13.5$$ and $$a = 1.5$$. So $$X \\sim U[1.5, 13.5]$$.\n\nAny two pieces of information about a uniform (mean, variance, quantile, probability) suffice to pin down $$a$$ and $$b$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Why does the uniform distribution arise so naturally in \"nothing is special\" scenarios — spinners, random cuts, rounding errors, random arrival times? (3 steps)", "answer": "- Step 1: **Physical symmetry**: In a spinner or random cut, no angle/position is privileged. The problem has rotational or translational symmetry forcing equal likelihood across the domain.\n- Step 2: **Epistemic symmetry**: Even without physical symmetry, if you know only the range of a quantity and nothing else, uniform is the \"unbiased\" guess — maximum entropy given only a range constraint.\n- Step 3: **Mathematical simplicity**: Linear CDF, easy probability calculations via proportion, clean transformations. Makes uniform the default modeling choice when no better information is available.\n\nThe uniform is to continuous probability what the fair coin is to discrete — the most basic, fair, information-minimal distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "A coffee machine dispenses $$X \\sim U[175, 215]$$ ml. What is $$P(X = 200)$$? What is $$P(X > 200)$$? Why the huge contrast? (3 steps)", "answer": "- Step 1: $$P(X = 200) = 0$$. Any single point in a continuous distribution has zero probability — the area of a zero-width slice is zero.\n- Step 2: $$P(X > 200)$$ is a range probability. Using proportion: $$\\frac{215 - 200}{215 - 175} = \\frac{15}{40} = 0.375$$.\n- Step 3: The contrast reveals that continuous probability is about ranges, not points. \"Exactly 200 ml\" in a continuous model is a zero-probability event, even though values near 200 ml occur.\n\nNever ask for $$P(X = \\text{specific value})$$ in a continuous model — the answer is always zero. Ask for intervals instead.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "A drinks machine dispenses volume $$X \\sim U[190, 210]$$ ml. Measurements are displayed to the nearest 1 ml. What is the probability that the display reads \"200 ml\"? (3 steps)", "answer": "- Step 1: A reading of \"200 ml\" corresponds to true volume in $$[199.5, 200.5)$$ (the rounding window).\n-
