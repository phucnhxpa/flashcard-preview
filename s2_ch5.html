Step 2: Using proportion: $$P(199.5 \\leq X < 200.5) = \\frac{1}{210 - 190} = \\frac{1}{20} = 0.05$$.\n- Step 3: This positive probability arises because *rounding lumps* all values in a 1 ml window together — measurements operate at finite precision, creating intervals with positive probability.\n\nReconciles the continuous-vs-discrete paradox: true continuous values have zero point probability, but finite-precision *measurements* have positive interval probability.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "If you're told a PDF has the form $$f(x) = k$$ for $$a \\leq x \\leq b$$ and 0 otherwise, how do you identify this as uniform and find $$k$$? (3 steps)", "answer": "- Step 1: Recognize: \"constant density over a bounded interval\" = continuous uniform distribution.\n- Step 2: Apply normalization: total area = 1. Area is $$k(b-a)$$, so $$k(b-a) = 1$$.\n- Step 3: Hence $$k = \\frac{1}{b-a}$$ — the height is inversely proportional to width.\n\nAny constant PDF on a bounded interval is uniform, and its height is forced by normalization. You never have to \"remember\" $$\\frac{1}{b-a}$$ — it's derivable.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "Contrast the effects of shifting ($$Y = X + c$$) vs. scaling ($$Y = cX$$) on a uniform distribution. Both preserve uniformity — so what do they each change? (3 steps)", "answer": "- Step 1: **Shift** $$Y = X + c$$: $$Y \\sim U[a+c, b+c]$$. Mean shifts by $$c$$, variance unchanged, width unchanged.\n- Step 2: **Scale** $$Y = cX$$ (with $$c > 0$$): $$Y \\sim U[ca, cb]$$. Mean scales by $$c$$, variance scales by $$c^2$$, width scales by $$c$$.\n- Step 3: **Combined** $$Y = cX + d$$: $$Y \\sim U[ca+d, cb+d]$$. Both effects combine. If $$c < 0$$, endpoints swap to maintain ordering.\n\nBoth preserve uniformity; shift moves the rectangle, scale stretches it. Variance responds only to scaling, not to shifting.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "In a continuous uniform distribution, why is \"probability of a range\" the same as \"proportion of the total interval\"? Explain both geometrically and algebraically. (3 steps)", "answer": "- Step 1: **Geometric view**: Probability is area under PDF. For uniform, PDF is a rectangle of height $$\\frac{1}{b-a}$$. A sub-interval of width $$w$$ gives area $$\\frac{w}{b-a}$$ — literally the proportion of the total rectangle.\n- Step 2: **Algebraic view**: $$P(c < X < d) = \\int_c^d \\frac{1}{b-a}\\,dx = \\frac{d-c}{b-a}$$. The integrand is constant, so the integral is just width × height.\n- Step 3: Both views agree: probability = proportion of interval.\n\nThis equivalence is *unique* to uniform. For other distributions, you need to integrate the varying PDF.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "Given $$\\text{Var}(X) = \\frac{4}{3}$$ and $$E(X) = 5$$ for a uniform $$X$$, find $$a$$ and $$b$$ using a compact approach. (3 steps)", "answer": "- Step 1: From $$\\text{Var}(X) = \\frac{(b-a)^2}{12} = \\frac{4}{3}$$: $$(b-a)^2 = 16$$, so $$b - a = 4$$ (positive root).\n- Step 2: From $$E(X) = \\frac{a+b}{2} = 5$$: $$a + b = 10$$.\n- Step 3: Solve: $$2b = 14 \\Rightarrow b = 7$$, $$a = 3$$. So $$X \\sim U[3, 7]$$.\n\nShortcut: midpoint = $$E(X)$$, half-width = $$\\sqrt{3 \\cdot \\text{Var}(X)}$$, so $$a = E(X) - \\sqrt{3\\text{Var}(X)}$$, $$b = E(X) + \\sqrt{3\\text{Var}(X)}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "A rod of random length $$X \\sim U[10, 20]$$ is used as one side of a rectangle, with the other side being $$20 - X$$. Find the expected area of the rectangle. Highlight the conceptual trap. (4 steps)", "answer": "- Step 1: Area $$A = X(20 - X) = 20X - X^2$$.\n- Step 2: Use linearity: $$E(A) = 20E(X) - E(X^2)$$.\n- Step 3: $$E(X) = 15$$, $$\\text{Var}(X) = \\frac{100}{12} = \\frac{25}{3}$$, so $$E(X^2) = \\frac{25}{3} + 225 = \\frac{700}{3}$$.\n- Step 4: $$E(A) = 300 - \\frac{700}{3} = \\frac{200}{3} \\approx 66.67$$ cm².\n\n**Trap**: computing $$E(X)(20 - E(X)) = 15 \\cdot 5 = 75$$ is WRONG. This treats $$X$$ as if it had no spread. The correct computation incorporates $$E(X^2) \\neq [E(X)]^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "In an exam, you're asked to \"suggest a suitable distribution\" for a real-world variable. What are the key questions to ask before choosing uniform? (3 steps)", "answer": "- Step 1: **Is there a preferred value or central tendency?** If yes (e.g., tins targeting 200g), use normal. If no, uniform may fit.\n- Step 2: **Is there a known bounded range with no other information?** If yes (e.g., rounding error, random cut), use uniform. If values can fall into tails, normal is better.\n- Step 3: **Is it a count of discrete events?** If yes, don't use uniform at all — use binomial, Poisson, etc.\n\nQuick tests:\n+ \"Equally likely in interval\", \"random position\", \"rounding\" → uniform\n+ \"Average\", \"typical\", \"most values near X\" → normal\n+ \"Number of\", \"count of\" → discrete", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "Why is the CDF $$F(x)$$ useful even when you already have the PDF $$f(x)$$? Give a situation where $$F$$ is more convenient. (3 steps)", "answer": "- Step 1: $$F(x) = P(X \\leq x)$$ gives accumulated probability directly — no integration needed at point of use. For uniform, the CDF $$F(x) = \\frac{x-a}{b-a}$$ is a one-line formula.\n- Step 2: Using the CDF: $$P(c \\leq X \\leq d) = F(d) - F(c)$$, and percentiles come from inverting $$F$$.\n- Step 3: For the uniform, $$F$$ is especially clean (linear), turning many questions into trivial calculations.\n\nPDF tells you *where the density is*; CDF tells you *how much has accumulated*. The CDF is often the computational workhorse.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "For $$X \\sim U[-5, 4]$$, compute $$P(-0.2 < X < 0.6)$$ using both the PDF (proportion method) and the CDF. Verify they agree. (4 steps)", "answer": "- Step 1: **Proportion method**: Interval width $$= 0.8$$, total width $$= 9$$, so $$P = \\frac{0.8}{9} = \\frac{4}{45}$$.\n- Step 2: **CDF method**: $$F(x) = \\frac{x+5}{9}$$. So $$F(0.6) = \\frac{5.6}{9}$$ and $$F(-0.2) = \\frac{4.8}{9}$$.\n- Step 3: $$P(-0.2 < X < 0.6) = F(0.6) - F(-0.2) = \\frac{5.6 - 4.8}{9} = \\frac{0.8}{9} = \\frac{4}{45}$$.\n- Step 4: Both methods agree ✓.\n\nThe CDF method and proportion method are just two sides of the same coin: \"cumulative proportion traversed\" vs \"proportion of total.\"", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "If you're told a uniform has $$P(X > 7) = 0.5$$, what does this say about the endpoints $$a$$ and $$b$$? Can you determine them from just this? (3 steps)", "answer": "- Step 1: $$P(X > 7) = 0.5$$ means 7 is the median of the distribution.\n- Step 2: For a uniform, median = midpoint = $$\\frac{a+b}{2}$$. So $$\\frac{a+b}{2} = 7$$, i.e., $$a + b = 14$$.\n- Step 3: This gives only the midpoint — not enough to determine both endpoints. You'd need another piece of information (variance, width, another probability).\n\nOne uniform property (the median) doesn't uniquely specify a two-parameter distribution. You always need two independent constraints.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "For $$X \\sim U[a,b]$$, explain why $$P(X > c) = 1 - F(c) = \\frac{b-c}{b-a}$$. Which version is most natural to work with? (3 steps)", "answer": "- Step 1: $$P(X > c) + P(X \\leq c) = 1$$, so $$P(X > c) = 1 - P(X \\leq c) = 1 - F(c)$$. This holds for any distribution.\n- Step 2: For uniform specifically: $$1 - F(c) = 1 - \\frac{c-a}{b-a} = \\frac{b-a-c+a}{b-a} = \\frac{b-c}{b-a}$$.\n- Step 3: The form $$\\frac{b-c}{b-a}$$ is natural — it's just \"proportion of interval above $$c$$.\" For uniform, stick with proportions; they're geometric and intuitive.\n\nAll three expressions are equal; for uniform, the proportion form is usually quickest.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "In a spinner problem, $$\\theta \\sim U[0, 2\\pi]$$ and $$X = r\\sin\\theta$$. Why is $$E(X) = 0$$ even though $$X$$ ranges over $$[-r, r]$$? (3 steps)", "answer": "- Step 1: $$\\theta$$ is uniformly distributed, so for every $$\\theta$$, the value $$2\\pi - \\theta$$ is equally likely.\n- Step 2: $$\\sin(2\\pi - \\theta) = -\\sin(\\theta)$$, so the transformation is an *odd function* of $$\\theta$$ around $$\\pi$$. Positive and negative values of $$X$$ are paired and equally likely.\n- Step 3: Their contributions to $$E(X)$$ cancel, giving $$E(X) = 0$$.\n\nGeneral principle: if a symmetric distribution is transformed by an odd function, the expectation of the transformed variable is zero. Contrast: $$E(X^2) > 0$$ always (non-negative values can't average to zero unless they're all zero).", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "The uniform distribution is rare in nature compared to the normal. Why? What are its theoretical limitations as a model? (3 steps)", "answer": "- Step 1: Most natural processes (heights, weights, measurement errors) arise from many small random contributions, which the **Central Limit Theorem** pushes toward the normal distribution. Uniform rarely emerges this way.\n- Step 2: Uniform models a very specific scenario: bounded range + no preferred value. Real quantities usually have *some* preferred region or tail decay.\n- Step 3: Its sharp cutoffs at $$a$$ and $$b$$ are unrealistic for most phenomena — in reality, values slightly outside are often possible but less likely. Uniform says they're *impossible*, a strong assumption.\n\nUse uniform when the range really is hard-bounded (angular position, rounding window, fixed time interval) — not as a generic stand-in for \"don't know.\"", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "An iron rod cutting machine has error $$X \\sim U[-3, 3]$$ mm. What is $$P(|X| > 2)$$? Use symmetry to speed up the computation. (3 steps)", "answer": "- Step 1: $$|X| > 2$$ means $$X > 2$$ OR $$X < -2$$ — two symmetric tail regions.\n- Step 2: By symmetry around zero, $$P(X > 2) = P(X < -2) = \\frac{3-2}{6} = \\frac{1}{6}$$.\n- Step 3: Total: $$P(|X| > 2) = \\frac{1}{6} + \\frac{1}{6} = \\frac{1}{3}$$.\n\nSymmetry trick: for symmetric uniforms around zero, compute one tail and double it. Halves the work.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "Ten iron rods are cut independently with error $$X \\sim U[-3, 3]$$ mm each. Find the expected number within 2 mm of target, and set up the probability that exactly 6 are within 2 mm. (4 steps)", "answer": "- Step 1: Single-rod probability: $$P(|X| < 2) = \\frac{4}{6} = \\frac{2}{3}$$ (interval $$[-2, 2]$$ out of total width 6).\n- Step 2: Let $$N$$ = count of rods within 2 mm. Then $$N \\sim \\text{Binomial}(10, \\frac{2}{3})$$.\n- Step 3: Expected count: $$E(N) = 10 \\cdot \\frac{2}{3} \\approx 6.67$$.\n- Step 4: $$P(N = 6) = \\binom{10}{6}\\left(\\frac{2}{3}\\right)^6\\left(\\frac{1}{3}\\right)^4$$. Since 6 is near the mean 6.67, this is near the peak of the binomial.\n\nPattern: uniform gives the per-trial probability; binomial counts independent trials.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "A spinner with pointer length $$r$$ is spun, with angle $$\\theta \\sim U[0, 2\\pi]$$. Define $$X = r|\\sin\\theta|$$ = horizontal distance from vertical. How could this setup estimate $$\\pi$$? (4 steps)", "answer": "- Step 1: Compute $$E(X) = r \\cdot E(|\\sin\\theta|)$$. By symmetry, $$E(|\\sin\\theta|) = \\frac{1}{2\\pi}\\int_0^{2\\pi}|\\sin\\theta|\\,d\\theta = \\frac{1}{\\pi}\\int_0^\\pi \\sin\\theta\\,d\\theta = \\frac{2}{\\pi}$$.\n- Step 2: So $$E(X) = \\frac{2r}{\\pi}$$, which contains $$\\pi$$ in the denominator.\n- Step 3: **Experimental estimate**: spin many times, measure horizontal distances, compute sample mean $$\\bar{x}$$.\n- Step 4: Rearrange: $$\\hat\\pi = \\frac{2r}{\\bar{x}}$$. By the law of large numbers, $$\\bar{x} \\to \\frac{2r}{\\pi}$$ as sample size grows, so $$\\hat\\pi \\to \\pi$$.\n\nBeautiful Monte Carlo application: geometric randomness → numerical approximation of $$\\pi$$.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": true}, {"question": "Challenge: For $$X \\sim U[\\alpha, \\beta]$$, find $$P\\left(X < \\frac{3}{7}\\alpha + \\frac{4}{7}\\beta\\right)$$ using only the linearity of the CDF. (3 steps)", "answer": "- Step 1: Recognize the threshold: $$\\frac{3}{7}\\alpha + \\frac{4}{7}\\beta$$ is a weighted average — specifically, $$\\frac{4}{7}$$ of the way from $$\\alpha$$ to $$\\beta$$.\n- Step 2: Apply the CDF: $$P(X < x) = \\frac{x - \\alpha}{\\beta - \\alpha}$$.\n- Step 3: Substitute: $$\\frac{\\frac{3}{7}\\alpha + \\frac{4}{7}\\beta - \\alpha}{\\beta - \\alpha} = \\frac{\\frac{4}{7}(\\beta - \\alpha)}{\\beta - \\alpha} = \\frac{4}{7}$$.\n\nGeneral principle: for $$x = \\alpha + \\lambda(\\beta - \\alpha)$$, $$P(X < x) = \\lambda$$. Position in the interval = cumulative probability. Pure linearity.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": true}, {"question": "Describe the three essential formulas for $$U[a,b]$$: mean, variance, and CDF (middle piece). Briefly explain what each represents. (3 steps)", "answer": "- Step 1: $$E(X) = \\frac{a+b}{2}$$ — the midpoint of the interval, which is also the median by symmetry. Represents the \"balance point\" of the rectangle.\n- Step 2: $$\\text{Var}(X) = \\frac{(b-a)^2}{12}$$ — depends only on width, quadratically. The \"12\" comes from $$3 \\times 4$$ in the variance derivation.\n- Step 3: $$F(x) = \\frac{x-a}{b-a}$$ for $$a \\leq x \\leq b$$ — the proportion of the interval accumulated up to $$x$$. Linear ramp from 0 to 1.\n\nThese three formulas form the complete toolkit — almost every uniform-distribution problem reduces to one or more of them.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": true}, {"question": "If $$Y = 20 - 2X$$ and you want to compute $$P(Y < 4)$$ in terms of $$X$$, how does the inequality transform? What's the critical step? (3 steps)", "answer": "- Step 1: Start: $$Y < 4 \\iff 20 - 2X < 4 \\iff -2X < -16$$.\n- Step 2: Divide both sides by $$-2$$. **Critical**: inequality *flips* when dividing by a negative. So $$X > 8$$.\n- Step 3: Thus $$P(Y < 4) = P(X > 8)$$, which can now be computed using the $$X$$-distribution.\n\nKey warning: multiplying/dividing by negatives reverses inequalities. This is a very common mistake when converting between transformed and original variables.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": true}, {"question": "For a uniform distribution $$U[190, 210]$$, find the interquartile range and briefly describe the geometric intuition. (3 steps)", "answer": "- Step 1: Width of interval = $$210 - 190 = 20$$.\n- Step 2: IQR = half the width = $$\\frac{20}{2} = 10$$ (using the formula $$\\text{IQR} = \\frac{b-a}{2}$$).\n- Step 3: Geometric intuition: the middle 50% of the probability occupies the middle 50% of the interval (from $$195$$ to $$205$$). The lower quartile is 5 units in from the left, the upper quartile is 5 units in from the right.\n\nFor uniforms, quartiles always fall at the $$25\\%$$ and $$75\\%$$ marks of the interval — cleanly linear.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": false}, {"question": "Given a coffee machine dispensing $$X \\sim U[190, 210]$$ ml, find the value $$x$$ such that $$P(X \\geq x) = 0.65$$. Reason about position in the interval. (3 steps)", "answer": "- Step 1: $$P(X \\geq x) = 0.65$$ means 65% of probability is above $$x$$, so 35% is below. This places $$x$$ at the 35th percentile.\n- Step 2: The 35th percentile of $$U[a,b]$$ is $$a + 0.35(b-a)$$. So $$x = 190 + 0.35 \\times 20 = 190 + 7 = 197$$ ml.\n- Step 3: Verification via CDF: $$F(x) = 0.35$$, so $$\\frac{x - 190}{20} = 0.35$$, giving $$x = 197$$ ✓.\n\nFor uniform, every quantile is a simple linear interpolation — $$p$$-th percentile = $$a + p(b-a)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": false}], "count": 65}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 11219, "out_tokens": 37227, "reasoning_chars": 58913, "cost_eur": 0.1307, "elapsed_s": 831, "content_chars": 51030}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 11219, "out_tokens": 18715, "reasoning_chars": 1225, "cost_eur": 0.0711, "elapsed_s": 327, "content_chars": 54066}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 11219, "out_tokens": 18707, "reasoning_chars": 1597, "cost_eur": 0.0711, "elapsed_s": 182, "content_chars": 53210}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 10188, "out_tokens": 13784, "reasoning_chars": 1334, "cost_eur": 0.0158, "elapsed_s": 107, "content_chars": 38180}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 10188, "out_tokens": 9332, "reasoning_chars": 1086, "cost_eur": 0.0113, "elapsed_s": 78, "content_chars": 24349}, "opus_1": {"run": 1, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 16840, "out_tokens": 48581, "reasoning_chars": 0, "cost_eur": 3.5845, "elapsed_s": 587, "content_chars": 47963}, "opus_2": {"run": 2, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 16840, "out_tokens": 61555, "reasoning_chars": 0, "cost_eur": 4.4797, "elapsed_s": 752, "content_chars": 52583}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 11456, "out_tokens": 3568, "reasoning_chars": 3097, "cost_eur": 0.006, "elapsed_s": 61, "content_chars": 7482}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 11456, "out_tokens": 6549, "reasoning_chars": 12736, "cost_eur": 0.0093, "elapsed_s": 108, "content_chars": 9447}}};
const SK='s2_ch5';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  fetch('/api/notion',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>r.json()).then(d=>{if(d.url){toast('Done!');window.open(d.url)}else toast('Error: '+(d.error||'?'))}).catch(e=>toast('Error: '+e.message))
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
