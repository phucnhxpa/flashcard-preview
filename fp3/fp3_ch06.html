$\\begin{pmatrix} a & b & c \\\\ b & d & e \\\\ c & e & f \\end{pmatrix}$$ — only 6 independent entries, not 9.\n- Step 3: Geometrically, the entries above and below the leading diagonal mirror each other; the diagonal entries themselves are unconstrained.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why is the matrix product $$\\mathbf{M}^\\top \\mathbf{M}$$ always symmetric, regardless of what $$\\mathbf{M}$$ is? (3 steps)", "answer": "- Step 1: Take the transpose of the product: $$(\\mathbf{M}^\\top \\mathbf{M})^\\top$$.\n- Step 2: Apply the rule $$(\\mathbf{AB})^\\top = \\mathbf{B}^\\top \\mathbf{A}^\\top$$ — transposing a product reverses the order. So $$(\\mathbf{M}^\\top \\mathbf{M})^\\top = \\mathbf{M}^\\top (\\mathbf{M}^\\top)^\\top = \\mathbf{M}^\\top \\mathbf{M}$$.\n- Step 3: Since $$(\\mathbf{M}^\\top \\mathbf{M})^\\top = \\mathbf{M}^\\top \\mathbf{M}$$, the product equals its own transpose, which is the definition of symmetric.\n\nThe same reasoning shows $$\\mathbf{M} \\mathbf{M}^\\top$$ is symmetric. This is a deep structural property — it explains why \"covariance-like\" matrices in statistics and physics are always symmetric.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "If $$\\mathbf{A}$$ is $$n \\times m$$ and $$\\mathbf{B}$$ is $$m \\times p$$, what are the dimensions of $$\\mathbf{M}^\\top \\mathbf{M}$$ versus $$\\mathbf{M} \\mathbf{M}^\\top$$ when $$\\mathbf{M}$$ is $$3 \\times 2$$?", "answer": "- Step 1: $$\\mathbf{M}^\\top$$ is $$2 \\times 3$$, so $$\\mathbf{M}^\\top \\mathbf{M}$$ multiplies $$(2 \\times 3)(3 \\times 2) = 2 \\times 2$$.\n- Step 2: $$\\mathbf{M} \\mathbf{M}^\\top$$ multiplies $$(3 \\times 2)(2 \\times 3) = 3 \\times 3$$.\n- Step 3: Both products are square and symmetric, but they have **different dimensions** and represent different things — they are not equal in general.\n\nThe takeaway: matrix multiplication is non-commutative, and even when both products are defined, they may live in different dimensions.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "State the rule for the transpose of a matrix product, and explain intuitively why the order reverses.", "answer": "- Step 1: The rule is $$(\\mathbf{AB})^\\top = \\mathbf{B}^\\top \\mathbf{A}^\\top$$ — the transpose of a product equals the product of transposes **in reversed order**.\n- Step 2: Intuitively, think of $$\\mathbf{AB}$$ as \"first apply $$\\mathbf{B}$$, then apply $$\\mathbf{A}$$.\" When you transpose, you're flipping the underlying structure, which reverses the sequence.\n- Step 3: Algebraically: the $$(i,j)$$ entry of $$(\\mathbf{AB})^\\top$$ is the $$(j,i)$$ entry of $$\\mathbf{AB}$$, which is row $$j$$ of $$\\mathbf{A}$$ dotted with column $$i$$ of $$\\mathbf{B}$$. This equals column $$j$$ of $$\\mathbf{A}^\\top$$ dotted with row $$i$$ of $$\\mathbf{B}^\\top$$ — exactly the $$(i,j)$$ entry of $$\\mathbf{B}^\\top \\mathbf{A}^\\top$$.\n\nThis same \"order reversal\" pattern shows up for inverses too: $$(\\mathbf{AB})^{-1} = \\mathbf{B}^{-1} \\mathbf{A}^{-1}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "For a $$3 \\times 3$$ matrix $$\\mathbf{A} = \\begin{pmatrix} a & b & c \\\\ d & e & f \\\\ g & h & i \\end{pmatrix}$$, write the formula for $$\\det(\\mathbf{A})$$ and explain the sign pattern. (3 steps)", "answer": "- Step 1: $$\\det(\\mathbf{A}) = a\\begin{vmatrix} e & f \\\\ h & i \\end{vmatrix} - b\\begin{vmatrix} d & f \\\\ g & i \\end{vmatrix} + c\\begin{vmatrix} d & e \\\\ g & h \\end{vmatrix}$$.\n- Step 2: We **expand along the first row**. For each entry, we form a $$2\\times 2$$ \"minor\" by crossing out the row and column containing that entry, and take its determinant.\n- Step 3: The signs alternate $$+, -, +$$ across the row. This pattern arises because of how permutations contribute signs in the formal definition of the determinant.\n\nWhy this works conceptually: the determinant measures signed volume; expanding along a row decomposes the volume calculation into smaller pieces, with signs accounting for orientation.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "What is the geometric meaning of $$\\det(\\mathbf{A}) = 0$$ for a $$3 \\times 3$$ matrix, and what does it tell us about the transformation $$\\mathbf{A}$$ represents?", "answer": "- Step 1: $$\\det(\\mathbf{A})$$ measures the **signed volume scaling factor** of the linear transformation $$\\mathbf{A}$$ — the unit cube gets mapped to a parallelepiped of (signed) volume $$\\det(\\mathbf{A})$$.\n- Step 2: When $$\\det(\\mathbf{A}) = 0$$, the image parallelepiped has zero volume — meaning the transformation **collapses 3D space into a lower-dimensional set** (a plane, line, or point).\n- Step 3: This is why such matrices are called **singular**: they cannot be inverted because information is lost in the collapse — multiple input vectors map to the same output, so you can't uniquely reverse the operation.\n\nA non-singular matrix preserves dimensionality; a singular one destroys it.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Why must we cross out the row and column containing an entry when computing its minor, and why doesn't the formula use entries from those rows/columns?", "answer": "- Step 1: The determinant counts contributions from products that pick one entry from each row **and** each column (a permutation pattern).\n- Step 2: When we factor out a particular entry like $$a$$ from row 1, column 1, the remaining factors must come from rows 2 and 3 **and** columns 2 and 3 — the row and column containing $$a$$ are \"used up.\"\n- Step 3: So the minor is the determinant of what's left after removing row 1 and column 1 — it captures all the ways to complete the product without reusing that row or column.\n\nThis crossing-out is not arbitrary; it's enforced by the no-repeats rule in the determinant's definition.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Without computing fully, explain why $$\\det\\begin{pmatrix} 0 & a & -b \\\\ -a & 0 & c \\\\ b & -c & 0 \\end{pmatrix} = 0$$ for all values of $$a, b, c$$. (3 steps)", "answer": "- Step 1: This matrix is **skew-symmetric** — it satisfies $$\\mathbf{A}^\\top = -\\mathbf{A}$$. (Check: transposing flips entries across the diagonal, and each off-diagonal entry becomes its negative.)\n- Step 2: For any matrix, $$\\det(\\mathbf{A}^\\top) = \\det(\\mathbf{A})$$. For a skew-symmetric matrix, $$\\det(-\\mathbf{A}) = (-1)^n \\det(\\mathbf{A})$$ where $$n$$ is the size.\n- Step 3: Combining: $$\\det(\\mathbf{A}) = \\det(\\mathbf{A}^\\top) = \\det(-\\mathbf{A}) = (-1)^3 \\det(\\mathbf{A}) = -\\det(\\mathbf{A})$$. So $$2\\det(\\mathbf{A}) = 0$$, giving $$\\det(\\mathbf{A}) = 0$$.\n\nKey insight: every odd-dimensional skew-symmetric matrix is automatically singular — a beautiful structural fact.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "A $$3\\times 3$$ matrix has determinant $$2k^2 + 19k + 9$$. For what values of $$k$$ is the matrix singular?", "answer": "- Step 1: A matrix is singular precisely when its determinant is zero. So we need $$2k^2 + 19k + 9 = 0$$.\n- Step 2: Factor: $$2k^2 + 19k + 9 = (2k+1)(k+9) = 0$$.\n- Step 3: This gives $$k = -\\frac{1}{2}$$ or $$k = -9$$. At these specific values, the matrix collapses 3D space into a lower dimension.\n\nThe conceptual point: singularity occurs at isolated parameter values where the geometry degenerates — a measure-zero set in parameter space.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "State the multiplicative property of determinants and explain its geometric meaning.", "answer": "- Step 1: For square matrices of the same size, $$\\det(\\mathbf{AB}) = \\det(\\mathbf{A}) \\det(\\mathbf{B})$$.\n- Step 2: Geometrically, $$\\det(\\mathbf{A})$$ is the volume scaling factor of $$\\mathbf{A}$$, and $$\\det(\\mathbf{B})$$ is the scaling factor of $$\\mathbf{B}$$. Composing transformations means doing one then the other, so the total scaling factor is the **product** of the individual factors.\n- Step 3: Important consequence: if either $$\\mathbf{A}$$ or $$\\mathbf{B}$$ is singular ($$\\det = 0$$), then $$\\mathbf{AB}$$ is singular too. Once volume is destroyed, no further transformation can restore it.\n\nThis is why the determinant is the right notion of \"size\" for matrices — it respects composition.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Explain why $$\\det(\\mathbf{A}^\\top) = \\det(\\mathbf{A})$$ holds for any square matrix.", "answer": "- Step 1: The determinant can be computed by expanding along **any row or any column** with the same result.\n- Step 2: When we transpose $$\\mathbf{A}$$, rows become columns and vice versa. Expanding $$\\det(\\mathbf{A}^\\top)$$ along its first row uses the same numerical entries as expanding $$\\det(\\mathbf{A})$$ along its first column.\n- Step 3: The sign pattern $$+, -, +$$ is the same whether we expand by row or column, so the result is identical: $$\\det(\\mathbf{A}^\\top) = \\det(\\mathbf{A})$$.\n\nConceptually: the determinant treats rows and columns symmetrically, reflecting the fact that volume scaling doesn't care about the row/column distinction.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "What is the **minor** of an entry in a $$3\\times 3$$ matrix, and how does it differ from a **cofactor**?", "answer": "- Step 1: The **minor** of an entry is the determinant of the $$2\\times 2$$ matrix obtained by **crossing out the row and column** containing that entry.\n- Step 2: The **cofactor** is the minor with a sign attached, according to the chessboard pattern $$\\begin{pmatrix} + & - & + \\\\ - & + & - \\\\ + & - & + \\end{pmatrix}$$. So cofactor of entry at position $$(i,j)$$ is $$(-1)^{i+j} \\times$$ minor.\n- Step 3: In short: minor is just a number from a sub-determinant; cofactor is that number with the appropriate sign for the position.\n\nThe cofactor is what enters the inverse formula and the cofactor expansion of the determinant.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "List the five steps to find the inverse of a non-singular $$3\\times 3$$ matrix $$\\mathbf{A}$$. (5 steps)", "answer": "- Step 1: Compute $$\\det(\\mathbf{A})$$. If it's zero, no inverse exists; stop.\n- Step 2: Form the **matrix of minors** $$\\mathbf{M}$$ — replace each entry of $$\\mathbf{A}$$ by its minor (the $$2\\times 2$$ determinant obtained by crossing out that entry's row and column).\n- Step 3: Form the **matrix of cofactors** $$\\mathbf{C}$$ by applying the alternating sign pattern $$\\begin{pmatrix} + & - & + \\\\ - & + & - \\\\ + & - & + \\end{pmatrix}$$ to $$\\mathbf{M}$$ — flip the sign of entries marked with $$-$$.\n- Step 4: **Transpose** the cofactor matrix to get $$\\mathbf{C}^\\top$$ (this is sometimes called the \"adjugate\" or \"adjoint\").\n- Step 5: Divide by the determinant: $$\\mathbf{A}^{-1} = \\frac{1}{\\det(\\mathbf{A})} \\mathbf{C}^\\top$$.\n\nThis procedure encodes a deep idea: $$\\mathbf{A} \\mathbf{C}^\\top = \\det(\\mathbf{A}) \\mathbf{I}$$, so dividing by $$\\det(\\mathbf{A})$$ produces the identity-yielding inverse.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Why does the inverse formula involve dividing by $$\\det(\\mathbf{A})$$, and why does this make it impossible to invert a singular matrix?", "answer": "- Step 1: The cofactor matrix $$\\mathbf{C}$$ is constructed so that $$\\mathbf{A} \\cdot \\mathbf{C}^\\top = \\det(\\mathbf{A}) \\cdot \\mathbf{I}$$ — this is the heart of why the formula works.\n- Step 2: To get $$\\mathbf{A}^{-1}$$ from this, we need to \"divide\" both sides by $$\\det(\\mathbf{A})$$, giving $$\\mathbf{A}^{-1} = \\frac{1}{\\det(\\mathbf{A})} \\mathbf{C}^\\top$$.\n- Step 3: If $$\\det(\\mathbf{A}) = 0$$, this division is undefined — and it must be, because a singular matrix collapses dimensions, losing information that can't be recovered. There's no transformation that \"undoes\" the collapse.\n\nThe takeaway: the determinant being non-zero is **exactly** the algebraic condition for invertibility, mirroring the geometric requirement of preserving volume.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Prove that for non-singular matrices, $$(\\mathbf{AB})^{-1} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$. (4 steps)", "answer": "- Step 1: Let $$\\mathbf{P} = (\\mathbf{AB})^{-1}$$, so by definition $$(\\mathbf{AB})\\mathbf{P} = \\mathbf{I}$$.\n- Step 2: Multiply both sides on the left by $$\\mathbf{A}^{-1}$$: $$\\mathbf{A}^{-1}\\mathbf{A}\\mathbf{B}\\mathbf{P} = \\mathbf{A}^{-1}\\mathbf{I}$$, which simplifies (using $$\\mathbf{A}^{-1}\\mathbf{A} = \\mathbf{I}$$) to $$\\mathbf{B}\\mathbf{P} = \\mathbf{A}^{-1}$$.\n- Step 3: Now multiply both sides on the left by $$\\mathbf{B}^{-1}$$: $$\\mathbf{B}^{-1}\\mathbf{B}\\mathbf{P} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$, simplifying to $$\\mathbf{P} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$.\n- Step 4: Therefore $$(\\mathbf{AB})^{-1} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$.\n\nIntuition: To \"undo\" $$\\mathbf{AB}$$ (which means \"do $$\\mathbf{B}$$ then $$\\mathbf{A}$$\"), we must reverse the order — first undo $$\\mathbf{A}$$, then undo $$\\mathbf{B}$$. Like taking off shoes then socks, the inverse process reverses the order.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Compare the rules $$(\\mathbf{AB})^\\top = \\mathbf{B}^\\top \\mathbf{A}^\\top$$ and $$(\\mathbf{AB})^{-1} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$. What do they have in common, and what is a key difference?", "answer": "- Step 1: **Common feature**: Both rules **reverse the order** of the matrices when applied to a product. This \"order reversal\" is a recurring structural pattern.\n- Step 2: **Key difference**: The transpose rule holds for **any** matrices (singular or not, even non-square if dimensions allow). The inverse rule only holds when **both** $$\\mathbf{A}$$ and $$\\mathbf{B}$$ are non-singular (so their inverses exist).\n- Step 3: Why the reversal? In both cases, we're \"undoing\" a composition. To reverse a sequence of operations, you must apply the reversals in opposite order — the last thing done must be undone first.\n\nThis reversal pattern reflects the non-commutativity of matrix multiplication: $$\\mathbf{AB} \\neq \\mathbf{BA}$$ in general.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "What does it mean for a matrix $$\\mathbf{T}$$ to represent a linear transformation $$T: \\mathbb{R}^3 \\to \\mathbb{R}^3$$, and what two properties must such a transformation satisfy?", "answer": "- Step 1: $$\\mathbf{T}$$ represents $$T$$ if applying $$\\mathbf{T}$$ to a position vector produces the image of that point under $$T$$ — that is, $$T(\\mathbf{x}) = \\mathbf{T}\\mathbf{x}$$.\n- Step 2: Two defining properties of linearity:\n+ **Scaling**: $$T(k\\mathbf{x}) = kT(\\mathbf{x})$$ — scaling input scales the output by the same factor.\n+ **Additivity**: $$T(\\mathbf{x}_1 + \\mathbf{x}_2) = T(\\mathbf{x}_1) + T(\\mathbf{x}_2)$$ — the image of a sum equals the sum of images.\n- Step 3: Together these mean linear transformations preserve the linear structure of space — straight lines map to straight lines (or points), and the origin maps to the origin.\n\nThese properties are precisely what allows a transformation to be encoded by matrix multiplication.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "Given a $$3\\times 3$$ matrix $$\\mathbf{M}$$, why are the columns of $$\\mathbf{M}$$ exactly the images of the basis vectors $$\\mathbf{i}, \\mathbf{j}, \\mathbf{k}$$?", "answer": "- Step 1: Multiply $$\\mathbf{M}$$ by $$\\mathbf{i} = \\begin{pmatrix} 1 \\\\ 0 \\\\ 0 \\end{pmatrix}$$. The result is $$\\begin{pmatrix} a \\\\ d \\\\ g \\end{pmatrix}$$, which is the **first column** of $$\\mathbf{M}$$.\n- Step 2: Similarly, $$\\mathbf{M}\\mathbf{j}$$ extracts the second column, and $$\\mathbf{M}\\mathbf{k}$$ extracts the third column.\n- Step 3: This is no accident: the columns of any transformation matrix tell you **exactly where the basis vectors go**. Once you know the images of $$\\mathbf{i}, \\mathbf{j}, \\mathbf{k}$$, linearity determines the image of every other vector.\n\nPractical consequence: to find the matrix of a transformation, just compute the images of the basis vectors and stack them as columns.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "If transformation $$T$$ is followed by transformation $$U$$, which matrix product represents the combined transformation, and why is the order what it is? (3 steps)", "answer": "- Step 1: The combined transformation is represented by $$\\mathbf{UT}$$ (with $$\\mathbf{U}$$ on the **left**).\n- Step 2: When we apply this to a vector $$\\mathbf{x}$$: $$(\\mathbf{UT})\\mathbf{x} = \\mathbf{U}(\\mathbf{T}\\mathbf{x})$$. Reading inside-out: first $$\\mathbf{T}$$ acts on $$\\mathbf{x}$$, then $$\\mathbf{U}$$ acts on the result. This matches \"$$T$$ first, then $$U$$.\"\n- Step 3: The order can feel counterintuitive because we read left-to-right but the **rightmost** matrix acts first. Think of it like function composition: $$(U \\circ T)(\\mathbf{x}) = U(T(\\mathbf{x}))$$ — innermost function applied first.\n\nMisconception alert: writing $$\\mathbf{TU}$$ would mean \"$$U$$ first, then $$T$$\" — opposite of what we want.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "A linear transformation $$T$$ is represented by a singular matrix $$\\mathbf{T}$$. What can happen to a plane under $$T$$ that cannot happen under a non-singular transformation?", "answer": "- Step 1: Under a non-singular transformation, points map to points, lines to lines, and planes to planes — the dimensional structure is preserved because nothing is collapsed.\n- Step 2: Under a singular transformation, $$\\det(\\mathbf{T}) = 0$$ means the transformation collapses dimensions. A plane could be mapped to a **line**, or even to a **point**.\n- Step 3: This happens because the columns of $$\\mathbf{T}$$ are linearly dependent — the image of 3D space is at most 2D, so a 2D plane can collapse to 1D or 0D.\n\nConcrete intuition: if two basis vectors map to parallel images, the parallelogram they spanned becomes a line segment — area is destroyed.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Given a transformation $$T$$ represented by matrix $$\\mathbf{T}$$, if $$\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$$, how do you recover $$\\mathbf{x}_1$$ given $$\\mathbf{x}_2$$? Why does this method fail when $$\\mathbf{T}$$ is singular?", "answer": "- Step 1: Multiply both sides of $$\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$$ on the left by $$\\mathbf{T}^{-1}$$: $$\\mathbf{T}^{-1}\\mathbf{T}\\mathbf{x}_1 = \\mathbf{T}^{-1}\\mathbf{x}_2$$.\n- Step 2: Since $$\\mathbf{T}^{-1}\\mathbf{T} = \\mathbf{I}$$, this simplifies to $$\\mathbf{x}_1 = \\mathbf{T}^{-1}\\mathbf{x}_2$$.\n- Step 3: This works only when $$\\mathbf{T}^{-1}$$ exists — i.e., when $$\\det(\\mathbf{T}) \\neq 0$$. When $$\\mathbf{T}$$ is singular, the transformation collapses information: many input vectors could map to the same $$\\mathbf{x}_2$$, so there's no unique pre-image to recover.\n\nConceptual takeaway: invertibility = reversibility = preserved information.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "What is an **eigenvector** of a matrix $$\\mathbf{A}$$, and what is the corresponding **eigenvalue**?", "answer": "- Step 1: An eigenvector $$\\mathbf{x}$$ of $$\\mathbf{A}$$ is a **non-zero** column vector satisfying $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$ for some scalar $$\\lambda$$.\n- Step 2: The scalar $$\\lambda$$ is the **eigenvalue** corresponding to that eigenvector — it's the factor by which the matrix scales the eigenvector.\n- Step 3: Geometrically, applying $$\\mathbf{A}$$ to an eigenvector keeps it pointing in the same direction (or the exact opposite, if $$\\lambda < 0$$). Only the magnitude changes — the direction is **invariant**.\n\nWhy this is profound: most vectors get rotated as well as stretched by a transformation. Eigenvectors are the \"special\" directions that don't rotate — they reveal the intrinsic structure of the transformation.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Why must an eigenvector be non-zero, but an eigenvalue can be zero? (3 steps)", "answer": "- Step 1: If $$\\mathbf{x} = \\mathbf{0}$$ were allowed, then $$\\mathbf{A}\\mathbf{0} = \\mathbf{0} = \\lambda \\mathbf{0}$$ for **any** $$\\lambda$$ — the equation would be trivially satisfied by every scalar, making the concept useless.\n- Step 2: An eigenvalue of zero is meaningful: $$\\mathbf{A}\\mathbf{x} = 0\\cdot\\mathbf{x} = \\mathbf{0}$$ means $$\\mathbf{x}$$ is a **non-zero vector** that gets crushed to zero by $$\\mathbf{A}$$.\n- Step 3: This happens precisely when $$\\mathbf{A}$$ is singular — there's a non-trivial direction that the transformation collapses. So $$\\lambda = 0$$ is an eigenvalue if and only if $$\\det(\\mathbf{A}) = 0$$.\n\nThe asymmetry is built into the definition to keep the concept meaningful: zero vectors are \"trivially invariant\" and would clutter everything.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Derive the **characteristic equation** $$\\det(\\mathbf{A} - \\lambda \\mathbf{I}) = 0$$ from the definition of an eigenvector. (4 steps)", "answer": "- Step 1: Start from the definition: $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$, where $$\\mathbf{x} \\neq \\mathbf{0}$$.\n- Step 2: Rewrite the right side using the identity matrix: $$\\lambda \\mathbf{x} = \\lambda \\mathbf{I} \\mathbf{x}$$. So $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{I}\\mathbf{x}$$.\n- Step 3: Move everything to one side: $$\\mathbf{A}\\mathbf{x} - \\lambda \\mathbf{I}\\mathbf{x} = \\mathbf{0}$$, then factor: $$(\\mathbf{A} - \\lambda \\mathbf{I})\\mathbf{x} = \\mathbf{0}$$.\n- Step 4: This says the matrix $$\\mathbf{A} - \\lambda \\mathbf{I}$$ sends a **non-zero** vector $$\\mathbf{x}$$ to zero — meaning $$\\mathbf{A} - \\lambda \\mathbf{I}$$ is **singular**, so $$\\det(\\mathbf{A} - \\lambda \\mathbf{I}) = 0$$.\n\nThis is why the characteristic equation works: it's the algebraic condition that some non-zero vector gets crushed by $$\\mathbf{A} - \\lambda \\mathbf{I}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "What kind of equation is the characteristic equation for a $$2\\times 2$$ matrix versus a $$3\\times 3$$ matrix, and what does this tell you about possible numbers of (real) eigenvalues?", "answer": "- Step 1: For a $$2\\times 2$$ matrix, $$\\det(\\mathbf{A} - \\lambda\\mathbf{I})$$ is a **quadratic** polynomial in $$\\lambda$$, giving up to 2 real roots (could be 0, 1 repeated, or 2 distinct).\n- Step 2: For a $$3\\times 3$$ matrix, the characteristic equation is a **cubic** in $$\\lambda$$. A cubic with real coefficients always has at least one real root (since complex roots come in conjugate pairs), so there is always at least one real eigenvalue.\n- Step 3: Possible distributions for $$3\\times 3$$:\n+ Three distinct real roots\n+ One real and a repeated real (two distinct real values)\n+ One triple real root\n+ One real and two complex conjugate roots (only one real eigenvalue)\n\nPractically: a $$3\\times 3$$ may yield 1, 2, or 3 distinct real eigenvalues — the cubic structure constrains possibilities.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Why is any non-zero scalar multiple of an eigenvector also an eigenvector with the same eigenvalue?", "answer": "- Step 1: Suppose $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$, and let $$\\mathbf{y} = c\\mathbf{x}$$ for any non-zero scalar $$c$$.\n- Step 2: Then $$\\mathbf{A}\\mathbf{y} = \\mathbf{A}(c\\mathbf{x}) = c\\mathbf{A}\\mathbf{x} = c(\\lambda \\mathbf{x}) = \\lambda(c\\mathbf{x}) = \\lambda \\mathbf{y}$$.\n- Step 3: So $$\\mathbf{y}$$ also satisfies the eigenvector equation with the same eigenvalue $$\\lambda$$.\n\nConceptually: the eigenvalue is a property of a **direction**, not a specific vector. The whole **line** through the origin in that direction consists of eigenvectors. Normalization is a convention to pick a specific representative.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "What is a **normalized eigenvector**, and why might we want one?", "answer": "- Step 1: A normalized vector has **magnitude 1** (unit vector). For an eigenvector $$\\mathbf{x}$$, you normalize by dividing each component by $$|\\mathbf{x}| = \\sqrt{x_1^2 + x_2^2 + x_3^2}$$.\n- Step 2: Why normalize?\n+ Provides a **canonical choice** when many scalar multiples exist.\n+ Essential for forming **orthogonal matrices** in diagonalization.\n+ Useful in physics where directions matter but magnitudes are arbitrary.\n- Step 3: Note: $$\\mathbf{x}$$ and $$-\\mathbf{x}$$ are both valid normalized eigenvectors (a sign ambiguity remains), but together they pin down the unique line of eigenvectors.\n\nPractical tip: when forming the orthogonal matrix $$\\mathbf{P}$$ for diagonalization, you must use normalized eigenvectors.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "What is an **invariant line** under a linear transformation, and how does it relate to eigenvectors?", "answer": "- Step 1: An invariant line through the origin is a line such that any point on the line is mapped to **another point on the same line** under the transformation.\n- Step 2: The direction of an invariant line is exactly the direction of an **eigenvector**: if $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$, then any point on the line spanned by $$\\mathbf{x}$$ maps to $$\\lambda$$ times its position — still on the same line.\n- Step 3: For a $$2\\times 2$$ transformation, the Cartesian equation of an invariant line through the origin can be written down from each eigenvector $$(a, b)$$ as $$y = \\frac{b}{a}x$$ (or $$x = 0$$ if $$a = 0$$).\n\nSo eigenvectors **are** the invariant directions; the eigenvalues tell you the scaling along each.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "What's the special case when an eigenvalue equals 1, and what does it mean geometrically?", "answer": "- Step 1: When $$\\lambda = 1$$ and $$\\mathbf{A}\\mathbf{x} = \\mathbf{x}$$, the transformation maps $$\\mathbf{x}$$ to itself — $$\\mathbf{x}$$ is **completely fixed**, not just direction-preserved.\n- Step 2: Therefore every point on the line through $$\\mathbf{0}$$ in direction $$\\mathbf{x}$$ is **also** fixed (since multiplying by 1 doesn't move it). This is called a **line of invariant points**.\n- Step 3: Compare: if $$\\lambda \\neq 1$$, the line is invariant but only the origin is fixed — other points slide along the line.\n\nMisconception alert: invariant **line** ≠ invariant **points on the line**. An invariant line just means the line as a set is preserved; a line of invariant points means each individual point doesn't move.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Find the eigenvalues of $$\\mathbf{A} = \\begin{pmatrix} 2 & 5 \\\\ -1 & -4 \\end{pmatrix}$$ by setting up and solving the characteristic equation. (3 steps)", "answer": "- Step 1: Form $$\\mathbf{A} - \\lambda \\mathbf{I} = \\begin{pmatrix} 2-\\lambda & 5 \\\\ -1 & -4-\\lambda \\end{pmatrix}$$.\n- Step 2: Set the determinant to zero: $$(2-\\lambda)(-4-\\lambda) - 5(-1) = 0$$. Expand: $$\\lambda^2 + 2\\lambda - 8 + 5 = \\lambda^2 + 2\\lambda - 3 = 0$$.\n- Step 3: Factor: $$(\\lambda - 1)(\\lambda + 3) = 0$$, so $$\\lambda = 1$$ or $$\\lambda = -3$$.\n\nConceptually: these are the two scaling factors along the two invariant directions of the transformation. To find the directions, substitute each $$\\lambda$$ back and solve for $$\\mathbf{x}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "After finding $$\\lambda = 1$$ for some matrix $$\\mathbf{A}$$, you set up $$(\\mathbf{A} - \\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ and get **two equations** that turn out to give the same constraint. Why does this happen, and how does it affect your eigenvector?", "answer": "- Step 1: At an eigenvalue, the matrix $$\\mathbf{A} - \\lambda\\mathbf{I}$$ is **singular** (det = 0), so its rows are linearly dependent. For a $$2\\times 2$$, the two row equations represent the same line — they're not independent.\n- Step 2: This means one of the equations gives no new information; you have **one effective equation in two unknowns**, leaving a one-parameter family of solutions.\n- Step 3: This is exactly what we want: any non-zero solution is an eigenvector, and any non-zero scalar multiple of it is also an eigenvector. You make a **convenient choice** (e.g., set $$y = 1$$) to pick a representative.\n\nThe \"lost equation\" is a feature, not a bug — it reflects the line of eigenvectors.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "When solving for eigenvectors of a $$3\\times 3$$ matrix at a non-repeated eigenvalue, you typically get one free parameter. What happens at a **repeated eigenvalue** like $$\\lambda = 1$$ (multiplicity 2)?", "answer": "- Step 1: At a non-repeated eigenvalue, the matrix $$\\mathbf{A} - \\lambda \\mathbf{I}$$ has rank 2 (effectively two independent equations from three rows), giving a 1-parameter family of eigenvectors — a single line.\n- Step 2: At a repeated eigenvalue, the matrix $$\\mathbf{A} - \\lambda\\mathbf{I}$$ may have rank 1 — only one independent equation — giving a **2-parameter family of eigenvectors**, i.e., a whole **plane** of eigenvectors.\n- Step 3: This freedom (an \"eigenspace\" of dimension 2) is what allows diagonalization for a symmetric matrix even with repeated eigenvalues. Not every matrix with repeated eigenvalues has this property — only ones with enough independent eigenvectors.\n\nCaveat: some matrices with repeated eigenvalues only give one direction — these are \"defective\" and cannot be fully diagonalized. Symmetric matrices avoid this pathology.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "A matrix has eigenvalues 1, 3, and 4. What is its determinant, and what is its trace? (Hint: think about the characteristic polynomial.) (3 steps)", "answer": "- Step 1: For an $$n\\times n$$ matrix, the characteristic polynomial factors as $$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = (-1)^n(\\lambda - \\lambda_1)(\\lambda - \\lambda_2)\\cdots(\\lambda - \\lambda_n)$$.\n- Step 2: Setting $$\\lambda = 0$$ gives $$\\det(\\mathbf{A}) = \\lambda_1 \\lambda_2 \\lambda_3 = 1 \\times 3 \\times 4 = 12$$. The determinant equals the **product of the eigenvalues**.\n- Step 3: Comparing the coefficient of $$\\lambda^{n-1}$$ shows that the **trace** (sum of diagonal entries) equals the **sum of eigenvalues**: $$\\text{tr}(\\mathbf{A}) = 1 + 3 + 4 = 8$$.\n\nThese two facts give powerful sanity checks when computing eigenvalues — and let you spot errors quickly.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "What is an **orthogonal matrix**, and what are two equivalent ways to characterize one?", "answer": "- Step 1: A square matrix $$\\mathbf{M}$$ is **orthogonal** if $$\\mathbf{M}\\mathbf{M}^\\top = \\mathbf{I}$$.\n- Step 2: Equivalent characterizations:\n+ $$\\mathbf{M}^{-1} = \\mathbf{M}^\\top$$ — the inverse equals the transpose (very convenient!).\n+ The columns of $$\\mathbf{M}$$ are mutually **orthogonal** unit vectors (an orthonormal set).\n+ The rows of $$\\mathbf{M}$$ are mutually orthogonal unit vectors.\n- Step 3: Geometrically, orthogonal matrices represent **rigid motions** (rotations and reflections) — they preserve lengths, angles, and the right-angle structure of space.\n\nWhy useful: $$\\mathbf{M}^\\top$$ is trivially easy to compute, so problems involving $$\\mathbf{M}^{-1}$$ become trivial when $$\\mathbf{M}$$ is orthogonal.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Why are two eigenvectors $$\\mathbf{x}_1$$ and $$\\mathbf{x}_2$$ corresponding to **different** eigenvalues of a **symmetric** matrix automatically orthogonal? (4 steps)", "answer": "- Step 1: Suppose $$\\mathbf{A}\\mathbf{x}_1 = \\lambda_1 \\mathbf{x}_1$$ and $$\\mathbf{A}\\mathbf{x}_2 = \\lambda_2 \\mathbf{x}_2$$ with $$\\lambda_1 \\neq \\lambda_2$$, and $$\\mathbf{A}$$ is symmetric ($$\\mathbf{A}^\\top = \\mathbf{A}$$).\n- Step 2: Compute $$\\mathbf{x}_1 \\cdot \\mathbf{A}\\mathbf{x}_2$$ in two ways:\n+ Direct: $$\\mathbf{x}_1 \\cdot (\\lambda_2 \\mathbf{x}_2) = \\lambda_2 (\\mathbf{x}_1 \\cdot \\mathbf{x}_2)$$.\n+ Using symmetry: $$\\mathbf{x}_1^\\top \\mathbf{A} \\mathbf{x}_2 = (\\mathbf{A}\\mathbf{x}_1)^\\top \\mathbf{x}_2 = \\lambda_1 (\\mathbf{x}_1 \\cdot \\mathbf{x}_2)$$.\n- Step 3: Equating: $$\\lambda_1 (\\mathbf{x}_1 \\cdot \\mathbf{x}_2) = \\lambda_2 (\\mathbf{x}_1 \\cdot \\mathbf{x}_2)$$, so $$(\\lambda_1 - \\lambda_2)(\\mathbf{x}_1 \\cdot \\mathbf{x}_2) = 0$$.\n- Step 4: Since $$\\lambda_1 \\neq \\lambda_2$$, we must have $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = 0$$ — the eigenvectors are **orthogonal**.\n\nThis is the deep reason symmetric matrices can be diagonalized by orthogonal matrices — the eigenvectors form an orthonormal basis automatically (after normalization).", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "What is a **diagonal matrix**, and why are diagonal matrices computationally so much simpler to work with than general matrices?", "answer": "- Step 1: A diagonal matrix has all entries **off the leading diagonal** (top-left to bottom-right) equal to zero — only the diagonal entries can be non-zero.\n- Step 2: Why simpler:\n+ **Multiplication**: $$\\text{diag}(a,b,c) \\cdot \\text{diag}(d,e,f) = \\text{diag}(ad, be, cf)$$ — just multiply corresponding diagonal entries.\n+ **Powers**: $$\\text{diag}(a,b,c)^n = \\text{diag}(a^n, b^n, c^n)$$ — no matrix multiplication needed.\n+ **Inverse**: $$\\text{diag}(a,b,c)^{-1} = \\text{diag}(1/a, 1/b, 1/c)$$ when all entries are non-zero.\n+ **Determinant**: just the product of the diagonal.\n- Step 3: A diagonal matrix represents a transformation that **scales independently along the coordinate axes** — no mixing between axes. That's why everything decouples.\n\nThis is why diagonalization is so valuable: it transforms a complicated transformation into independent, simple scalings.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Outline the four-step procedure for reducing a symmetric matrix $$\\mathbf{A}$$ to a diagonal matrix $$\\mathbf{D}$$. (4 steps)", "answer": "- Step 1: Find **normalized eigenvectors** of $$\\mathbf{A}$$. Since $$\\mathbf{A}$$ is symmetric, eigenvectors corresponding to distinct eigenvalues are orthogonal; for repeated eigenvalues, choose orthogonal eigenvectors within the eigenspace.\n- Step 2: Form an **orthogonal matrix** $$\\mathbf{P}$$ whose columns are the normalized eigenvectors of $$\\mathbf{A}$$.\n- Step 3: Write down $$\\mathbf{P}^\\top$$, the transpose of $$\\mathbf{P}$$. (Since $$\\mathbf{P}$$ is orthogonal, $$\\mathbf{P}^\\top = \\mathbf{P}^{-1}$$.)\n- Step 4: Compute $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P} = \\mathbf{D}$$, where $$\\mathbf{D}$$ is diagonal with the eigenvalues of $$\\mathbf{A}$$ on the diagonal — in the order corresponding to how you placed the eigenvectors as columns of $$\\mathbf{P}$$.\n\nThe order matters: if you swap two columns of $$\\mathbf{P}$$, the diagonal entries of $$\\mathbf{D}$$ swap correspondingly.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Why does $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$ produce a diagonal matrix when $$\\mathbf{P}$$ has eigenvectors of $$\\mathbf{A}$$ as columns? (4 steps)", "answer": "- Step 1: Let $$\\mathbf{P} = (\\mathbf{x}_1 \\, | \\, \\mathbf{x}_2 \\, | \\, \\mathbf{x}_3)$$ where the $$\\mathbf{x}_i$$ are normalized eigenvectors.\n- Step 2: Compute $$\\mathbf{A}\\mathbf{P}$$. Each column $$\\mathbf{x}_i$$ becomes $$\\mathbf{A}\\mathbf{x}_i = \\lambda_i \\mathbf{x}_i$$. So $$\\mathbf{A}\\mathbf{P} = (\\lambda_1 \\mathbf{x}_1 \\, | \\, \\lambda_2 \\mathbf{x}_2 \\, | \\, \\lambda_3 \\mathbf{x}_3)$$.\n- Step 3: Now compute $$\\mathbf{P}^\\top (\\mathbf{A}\\mathbf{P})$$. The $$(i,j)$$ entry is $$\\mathbf{x}_i^\\top (\\lambda_j \\mathbf{x}_j) = \\lambda_j (\\mathbf{x}_i \\cdot \\mathbf{x}_j)$$. Since the $$\\mathbf{x}_i$$ are orthonormal, this is $$\\lambda_j$$ if $$i = j$$ and $$0$$ otherwise.\n- Step 4: So $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P} = \\text{diag}(\\lambda_1, \\lambda_2, \\lambda_3) = \\mathbf{D}$$ — the eigenvalues line up on the diagonal.\n\nThe whole procedure is essentially a **change of basis** to the eigenvector basis, where the matrix becomes diagonal because each axis is now an invariant direction.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Why is using normalized eigenvectors essential for the diagonalization procedure to give a **diagonal** matrix (not just a \"diagonal-up-to-scaling\" one)?", "answer": "- Step 1: If we use un-normalized eigenvectors $$\\mathbf{y}_i$$ as columns of $$\\mathbf{P}$$, the columns are still orthogonal (for distinct eigenvalues of a symmetric matrix), but not necessarily of unit length.\n- Step 2: When we compute $$\\mathbf{P}^\\top \\mathbf{P}$$, instead of getting $$\\mathbf{I}$$, we get $$\\text{diag}(|\\mathbf{y}_1|^2, |\\mathbf{y}_2|^2, |\\mathbf{y}_3|^2)$$ — a diagonal matrix, but not the identity.\n- Step 3: Then $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$ would give a diagonal matrix whose entries are scaled versions of the eigenvalues, which is messier and doesn't give the clean \"$$\\mathbf{D}$$ has eigenvalues on the diagonal\" result.\n\nNormalization ensures $$\\mathbf{P}^\\top \\mathbf{P} = \\mathbf{I}$$ (i.e., $$\\mathbf{P}$$ is **orthogonal**), which is what makes $$\\mathbf{P}^\\top = \\mathbf{P}^{-1}$$ and gives the clean diagonalization formula.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "A matrix $$\\mathbf{A}$$ has determinant 5, and matrix $$\\mathbf{B}$$ has determinant -3. What is $$\\det(\\mathbf{AB})$$, and what is $$\\det(\\mathbf{B}^\\top \\mathbf{A}^{-1})$$? Reason without computing matrix products. (3 steps)", "answer": "- Step 1: Use $$\\det(\\mathbf{AB}) = \\det(\\mathbf{A})\\det(\\mathbf{B}) = 5 \\times (-3) = -15$$.\n- Step 2: For $$\\det(\\mathbf{B}^\\top \\mathbf{A}^{-1})$$, apply: $$\\det(\\mathbf{B}^\\top) = \\det(\\mathbf{B}) = -3$$, and $$\\det(\\mathbf{A}^{-1}) = \\frac{1}{\\det(\\mathbf{A})} = \\frac{1}{5}$$.\n- Step 3: Multiply: $$\\det(\\mathbf{B}^\\top \\mathbf{A}^{-1}) = (-3)\\left(\\frac{1}{5}\\right) = -\\frac{3}{5}$$.\n\nThe takeaway: determinants compose multiplicatively across products, transposes, and inverses — so you can chain calculations purely with scalar arithmetic.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "A $$3\\times 3$$ matrix has eigenvalues $$\\lambda_1, \\lambda_2, \\lambda_3$$. How can you quickly check whether the matrix is singular without computing the determinant directly?", "answer": "- Step 1: The determinant equals the **product of the eigenvalues**: $$\\det(\\mathbf{A}) = \\lambda_1 \\lambda_2 \\lambda_3$$.\n- Step 2: A matrix is singular if and only if $$\\det(\\mathbf{A}) = 0$$, which happens if and only if **at least one eigenvalue is zero**.\n- Step 3: So just look at the eigenvalues: if any one of them is 0, the matrix is singular. Otherwise, it's non-singular.\n\nGeometric intuition: an eigenvalue of 0 means the transformation crushes the corresponding eigenvector to zero, collapsing a dimension — that's exactly what singular means.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "When solving a system like $$\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$$ for $$\\mathbf{x}_1$$ given $$\\mathbf{x}_2$$, when might you prefer **simultaneous equations** over computing $$\\mathbf{T}^{-1}$$?", "answer": "- Step 1: Computing $$\\mathbf{T}^{-1}$$ for a $$3\\times 3$$ matrix involves: determinant, $$3\\times 3$$ matrix of minors (9 sub-determinants), cofactor signs, transpose, division. Long process.\n- Step 2: For a **single** unknown vector $$\\mathbf{x}_1$$, simultaneous equations can be much faster — you write down the three component equations of $$\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$$ and use elimination/substitution.\n- Step 3: When to prefer each:\n+ **Inverse method**: better if you'll reuse $$\\mathbf{T}^{-1}$$ for many different right-hand sides, or if the question explicitly asks for $$\\mathbf{T}^{-1}$$.\n+ **Simultaneous equations**: better for one-off problems where computing the full inverse is overkill.\n\nStrategic thinking is part of efficient problem solving — choose the right tool.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "If $$\\mathbf{A}^2 = \\mathbf{I}$$, what does this tell you about $$\\mathbf{A}^{-1}$$? Give a geometric interpretation. (3 steps)", "answer": "- Step 1: $$\\mathbf{A}^2 = \\mathbf{A}\\mathbf{A} = \\mathbf{I}$$. Comparing with the definition $$\\mathbf{A}\\mathbf{A}^{-1} = \\mathbf{I}$$, we see $$\\mathbf{A}^{-1} = \\mathbf{A}$$ — the matrix is its own inverse (it's \"involutory\").\n- Step 2: Geometrically, applying $$\\mathbf{A}$$ twice returns every vector to itself. So $$\\mathbf{A}$$ represents a transformation that **undoes itself** when applied again.\n- Step 3: Common examples:\n+ Reflections (reflecting twice over the same plane returns to start).\n+ The identity itself ($$\\mathbf{I}^2 = \\mathbf{I}$$).\n+ \"180° rotation\" matrices in suitable contexts.\n\nThis gives a free way to compute $$\\mathbf{A}^{-1}$$ without any of the usual five-step procedure.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Suppose a transformation $$T$$ has matrix $$\\mathbf{T}$$ with $$\\det(\\mathbf{T}) = -2$$. What does the negative sign tell you geometrically?", "answer": "- Step 1: The **absolute value** $$|\\det(\\mathbf{T})| = 2$$ tells you that volumes are scaled by a factor of 2.\n- Step 2: The **sign** $$-1$$ tells you that the transformation reverses **orientation** — like a reflection. Think of it as turning a right-handed object into a left-handed mirror image.\n- Step 3: A determinant of $$-1$$ would be a pure orientation-reversal (e.g., reflection); $$-2$$ is reflection combined with a uniform doubling of volume.\n\nThis is why $$\\det$$ is called \"signed\" volume scaling — both magnitude and orientation matter.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Given $$\\mathbf{T}\\binom{1}{0} = \\binom{3}{4}$$ and $$\\mathbf{T}\\binom{0}{1} = \\binom{-1}{2}$$, write down the matrix $$\\mathbf{T}$$ immediately. (2 steps)", "answer": "- Step 1: The columns of any transformation matrix are exactly the images of the standard basis vectors. The first column is $$\\mathbf{T}\\binom{1}{0}$$ and the second column is $$\\mathbf{T}\\binom{0}{1}$$.\n- Step 2: So $$\\mathbf{T} = \\begin{pmatrix} 3 & -1 \\\\ 4 & 2 \\end{pmatrix}$$.\n\nThis is the fastest way to find a matrix when given the images of basis vectors — no equation-solving needed. The columns **are** the images.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "A line $$l$$ has parametric form $$\\mathbf{r} = \\mathbf{a} + t\\mathbf{d}$$, where $$\\mathbf{a}$$ is a position vector and $$\\mathbf{d}$$ is the direction vector. After transformation by matrix $$\\mathbf{T}$$, what is the parametric form of the image line? (3 steps)", "answer": "- Step 1: A general point on $$l$$ is $$\\mathbf{a} + t\\mathbf{d}$$. Apply $$\\mathbf{T}$$ to it: $$\\mathbf{T}(\\mathbf{a} + t\\mathbf{d})$$.\n- Step 2: By linearity, $$\\mathbf{T}(\\mathbf{a} + t\\mathbf{d}) = \\mathbf{T}\\mathbf{a} + t\\mathbf{T}\\mathbf{d}$$.\n- Step 3: So the image line has form $$\\mathbf{r}' = \\mathbf{T}\\mathbf{a} + t \\mathbf{T}\\mathbf{d}$$ — the transformed position vector $$\\mathbf{T}\\mathbf{a}$$ plus a parameter times the transformed direction $$\\mathbf{T}\\mathbf{d}$$.\n\nCaveat: if $$\\mathbf{T}\\mathbf{d} = \\mathbf{0}$$ (i.e., $$\\mathbf{d}$$ is in the null space of $$\\mathbf{T}$$), the line collapses to the single point $$\\mathbf{T}\\mathbf{a}$$. This happens when $$\\mathbf{T}$$ is singular and $$\\mathbf{d}$$ is an eigenvector with eigenvalue 0.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "A plane is given parametrically as $$\\mathbf{r} = \\mathbf{a} + s\\mathbf{b} + t\\mathbf{c}$$. Under transformation $$\\mathbf{T}$$, what is the image, and when might the image fail to be a plane?", "answer": "- Step 1: By linearity, $$\\mathbf{T}(\\mathbf{a} + s\\mathbf{b} + t\\mathbf{c}) = \\mathbf{T}\\mathbf{a} + s\\mathbf{T}\\mathbf{b} + t\\mathbf{T}\\mathbf{c}$$. So the image has parametric form $$\\mathbf{r}' = \\mathbf{T}\\mathbf{a} + s(\\mathbf{T}\\mathbf{b}) + t(\\mathbf{T}\\mathbf{c})$$.\n- Step 2: This is a plane only if $$\\mathbf{T}\\mathbf{b}$$ and $$\\mathbf{T}\\mathbf{c}$$ remain linearly independent (non-parallel).\n- Step 3: When this fails:\n+ If $$\\mathbf{T}\\mathbf{b}$$ and $$\\mathbf{T}\\mathbf{c}$$ are parallel (but non-zero), the image is a **line**.\n+ If both are zero, the image is a **single point**.\n\nThis dimension reduction happens when $$\\mathbf{T}$$ is singular — it can drop a 2D plane down to lower dimensions.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "A $$3\\times 3$$ matrix $$\\mathbf{A}$$ has characteristic polynomial $$-(\\lambda - 1)^2(\\lambda - 4)$$. What does this tell you about the structure of $$\\mathbf{A}$$ and its eigenvectors?", "answer": "- Step 1: The eigenvalues are $$\\lambda = 1$$ (with multiplicity 2) and $$\\lambda = 4$$ (multiplicity 1).\n- Step 2: For the simple eigenvalue 4, there's a 1-dimensional eigenspace (a single line of eigenvectors).\n- Step 3: For the repeated eigenvalue 1, the eigenspace **could be**:\n+ 2-dimensional (a whole plane of eigenvectors) — happens when the matrix is \"well-behaved\" like symmetric matrices. The matrix is diagonalizable.\n+ 1-dimensional (just a line) — the matrix is \"defective\" and cannot be diagonalized over reals.\n\nStrategically: when you solve $$(\\mathbf{A} - \\mathbf{I})\\mathbf{x} = \\mathbf{0}$$, if you get **one free parameter**, the eigenspace is 1D (defective); if **two free parameters**, it's 2D (full eigenspace).", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "A reflection matrix $$\\mathbf{M}$$ in the plane has eigenvalues 1 and -1. What's the geometric meaning of each eigenvalue and its corresponding eigenvector?", "answer": "- Step 1: Eigenvalue $$\\lambda = 1$$: the corresponding eigenvector points along the **mirror line** (axis of reflection) — it's fixed by the reflection.\n- Step 2: Eigenvalue $$\\lambda = -1$$: the corresponding eigenvector is **perpendicular to the mirror line** — reflection flips it to the opposite side, multiplying by $$-1$$.\n- Step 3: This decomposition reveals the structure: a reflection is the simplest non-trivial example of a symmetric matrix and beautifully illustrates the eigen-decomposition idea — every direction is a mix of \"stay\" (along mirror) and \"flip\" (perpendicular to mirror).\n\nFor 3D reflection in a plane $$\\Pi$$: eigenvalue 1 has eigenspace = $$\\Pi$$ (2D), eigenvalue $$-1$$ has eigenspace = normal to $$\\Pi$$ (1D).", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Why does the trace of $$\\mathbf{P}^{-1}\\mathbf{A}\\mathbf{P}$$ equal the trace of $$\\mathbf{A}$$ for any non-singular $$\\mathbf{P}$$? (Use the cyclic property of trace.) (3 steps)", "answer": "- Step 1: The cyclic property of trace says $$\\text{tr}(\\mathbf{X}\\mathbf{Y}) = \\text{tr}(\\mathbf{Y}\\mathbf{X})$$ for any matrices where the products are defined.\n- Step 2: Apply: $$\\text{tr}(\\mathbf{P}^{-1}\\mathbf{A}\\mathbf{P}) = \\text{tr}((\\mathbf{P}^{-1}\\mathbf{A})\\mathbf{P}) = \\text{tr}(\\mathbf{P}(\\mathbf{P}^{-1}\\mathbf{A})) = \\text{tr}(\\mathbf{P}\\mathbf{P}^{-1}\\mathbf{A}) = \\text{tr}(\\mathbf{I}\\mathbf{A}) = \\text{tr}(\\mathbf{A})$$.\n- Step 3: Consequence: when we diagonalize $$\\mathbf{A}$$ via $$\\mathbf{P}^{-1}\\mathbf{A}\\mathbf{P} = \\mathbf{D}$$, the trace of $$\\mathbf{D}$$ (sum of eigenvalues) equals the trace of $$\\mathbf{A}$$ (sum of diagonal entries of $$\\mathbf{A}$$).\n\nSo: **trace = sum of eigenvalues** — a powerful invariant under change of basis.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "Show that if $$\\mathbf{x}$$ is an eigenvector of $$\\mathbf{A}$$ with eigenvalue $$\\lambda$$, then $$\\mathbf{x}$$ is an eigenvector of $$\\mathbf{A}^2$$ with eigenvalue $$\\lambda^2$$. (3 steps)", "answer": "- Step 1: We're given $$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$$.\n- Step 2: Compute $$\\mathbf{A}^2\\mathbf{x} = \\mathbf{A}(\\mathbf{A}\\mathbf{x}) = \\mathbf{A}(\\lambda \\mathbf{x}) = \\lambda(\\mathbf{A}\\mathbf{x}) = \\lambda(\\lambda \\mathbf{x}) = \\lambda^2 \\mathbf{x}$$.\n- Step 3: So $$\\mathbf{x}$$ is an eigenvector of $$\\mathbf{A}^2$$ with eigenvalue $$\\lambda^2$$. By induction, $$\\mathbf{x}$$ is an eigenvector of $$\\mathbf{A}^n$$ with eigenvalue $$\\lambda^n$$ for any positive integer $$n$$.\n\nThis is why diagonalization is so powerful for computing high powers: $$\\mathbf{A}^n = \\mathbf{P}\\mathbf{D}^n \\mathbf{P}^{-1}$$ where $$\\mathbf{D}^n$$ just raises each diagonal entry to the $$n$$-th power.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "If $$\\mathbf{x}$$ is an eigenvector of $$\\mathbf{A}$$ with eigenvalue $$\\lambda \\neq 0$$, what is the eigenvalue of $$\\mathbf{x}$$ for $$\\mathbf{A}^{-1}$$? (3 steps)", "answer": "- Step 1: From $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$, multiply both sides on the left by $$\\mathbf{A}^{-1}$$: $$\\mathbf{A}^{-1}\\mathbf{A}\\mathbf{x} = \\mathbf{A}^{-1}(\\lambda \\mathbf{x})$$.\n- Step 2: This simplifies to $$\\mathbf{x} = \\lambda \\mathbf{A}^{-1}\\mathbf{x}$$, so $$\\mathbf{A}^{-1}\\mathbf{x} = \\frac{1}{\\lambda}\\mathbf{x}$$.\n- Step 3: The eigenvalue of $$\\mathbf{x}$$ for $$\\mathbf{A}^{-1}$$ is $$\\frac{1}{\\lambda}$$.\n\nThis makes intuitive sense: if $$\\mathbf{A}$$ stretches $$\\mathbf{x}$$ by factor $$\\lambda$$, then $$\\mathbf{A}^{-1}$$ must un-stretch it by the reciprocal factor $$\\frac{1}{\\lambda}$$. (And this is why $$\\lambda \\neq 0$$ matters — we can't take the reciprocal of zero.)", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "What's the relationship between **eigenvalues of a triangular matrix** and its **diagonal entries**? Why is this useful?", "answer": "- Step 1: For an upper- or lower-triangular matrix, the **eigenvalues are exactly the diagonal entries**.\n- Step 2: Why: the determinant of a triangular matrix is the product of its diagonal entries. The characteristic polynomial $$\\det(\\mathbf{A} - \\lambda \\mathbf{I})$$ involves $$\\mathbf{A} - \\lambda \\mathbf{I}$$, which is also triangular, with diagonal entries $$a_{ii} - \\lambda$$. So the determinant is $$\\prod_i(a_{ii} - \\lambda)$$.\n- Step 3: Setting this to zero gives $$\\lambda = a_{ii}$$ for each $$i$$ — the diagonal entries are precisely the roots of the characteristic equation.\n\nWhy useful: triangular matrices are easy to work with, and this fact lets you read off eigenvalues without any computation. Diagonal matrices are a special case (they're triangular).", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "The matrix $$\\mathbf{T}$$ has det = 0 and represents a transformation. The line $$l_1$$ passes through the origin. Under what condition is the image of $$l_1$$ a single point rather than a line?", "answer": "- Step 1: The image of $$l_1: \\mathbf{r} = t\\mathbf{d}$$ is $$\\mathbf{r}' = t\\mathbf{T}\\mathbf{d}$$.\n- Step 2: This is a line through the origin if $$\\mathbf{T}\\mathbf{d} \\neq \\mathbf{0}$$.\n- Step 3: It collapses to a single point (the origin) when $$\\mathbf{T}\\mathbf{d} = \\mathbf{0}$$ — that is, when $$\\mathbf{d}$$ is an eigenvector of $$\\mathbf{T}$$ with eigenvalue 0 (in the \"null space\" of $$\\mathbf{T}$$).\n\nGeometric picture: the singular transformation has a \"kernel direction\" along which it crushes everything to zero. Lines along that direction collapse; lines transverse to it remain lines.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "Given a plane $$\\Pi: \\mathbf{r}\\cdot\\mathbf{n} = d$$ and a transformation $$\\mathbf{T}$$, why does the **inverse-transpose** $$(\\mathbf{T}^{-1})^\\top$$ play a role in finding the image plane?", "answer": "- Step 1: A point $$\\mathbf{x}$$ is on $$\\Pi$$ iff $$\\mathbf{x}\\cdot\\mathbf{n} = d$$. The image point is $$\\mathbf{x}' = \\mathbf{T}\\mathbf{x}$$, so $$\\mathbf{x} = \\mathbf{T}^{-1}\\mathbf{x}'$$.\n- Step 2: Substitute: $$(\\mathbf{T}^{-1}\\mathbf{x}') \\cdot \\mathbf{n} = d$$. Using the identity $$\\mathbf{u}\\cdot\\mathbf{v} = \\mathbf{u}^\\top \\mathbf{v}$$, this becomes $$(\\mathbf{T}^{-1}\\mathbf{x}')^\\top \\mathbf{n} = d$$, or equivalently $$\\mathbf{x}'^\\top (\\mathbf{T}^{-1})^\\top \\mathbf{n} = d$$.\n- Step 3: So the image plane has normal $$(\\mathbf{T}^{-1})^\\top \\mathbf{n}$$ — the original normal transformed by the inverse-transpose.\n\nConceptual point: while points transform by $$\\mathbf{T}$$, **normal vectors transform by the inverse-transpose**. This is why normals don't behave like ordinary vectors under non-orthogonal transformations.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "Why does the formula $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P} = \\mathbf{D}$$ for diagonalizing a symmetric matrix coincide with $$\\mathbf{P}^{-1} \\mathbf{A} \\mathbf{P} = \\mathbf{D}$$ in this special case?", "answer": "- Step 1: For a general (non-symmetric) diagonalizable matrix, the diagonalization formula is $$\\mathbf{P}^{-1}\\mathbf{A}\\mathbf{P} = \\mathbf{D}$$, where $$\\mathbf{P}$$ has eigenvectors as columns but is generally not orthogonal.\n- Step 2: For symmetric matrices, eigenvectors corresponding to distinct eigenvalues are automatically **orthogonal**. After normalizing, the matrix $$\\mathbf{P}$$ is **orthogonal**.\n- Step 3: For an orthogonal matrix, $$\\mathbf{P}^{-1} = \\mathbf{P}^\\top$$. So $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$ and $$\\mathbf{P}^{-1}\\mathbf{A}\\mathbf{P}$$ give the same result.\n\nThis is a tremendous simplification: for symmetric matrices, you never need to compute $$\\mathbf{P}^{-1}$$ — just take the transpose!", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "Compute the eigenvalues of $$\\begin{pmatrix} 4 & -1 \\\\ -1 & 4 \\end{pmatrix}$$ without expanding the full quadratic from scratch — use trace and determinant. (3 steps)", "answer": "- Step 1: For a $$2\\times 2$$ matrix, the characteristic equation is $$\\lambda^2 - (\\text{trace})\\lambda + (\\text{det}) = 0$$.\n- Step 2: Trace $$= 4 + 4 = 8$$, determinant $$= (4)(4) - (-1)(-1) = 16 - 1 = 15$$. So the equation is $$\\lambda^2 - 8\\lambda + 15 = 0$$.\n- Step 3: Factor: $$(\\lambda - 3)(\\lambda - 5) = 0$$, giving eigenvalues $$\\lambda = 3$$ and $$\\lambda = 5$$.\n\nThis shortcut uses the deep facts trace = sum of eigenvalues and det = product of eigenvalues. Sanity check: $$3 + 5 = 8$$ ✓ and $$3 \\times 5 = 15$$ ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "A symmetric matrix represents a transformation that includes both stretching and rotation. Why does diagonalizing it \"decompose\" the transformation in a meaningful way?", "answer": "- Step 1: Diagonalization: $$\\mathbf{A} = \\mathbf{P}\\mathbf{D}\\mathbf{P}^\\top$$, where $$\\mathbf{P}$$ is orthogonal and $$\\mathbf{D}$$ is diagonal.\n- Step 2: Reading right to left, $$\\mathbf{A}$$ acts on a vector $$\\mathbf{v}$$ as:\n+ $$\\mathbf{P}^\\top \\mathbf{v}$$: rotate to align with eigenvector axes.\n+ $$\\mathbf{D}(\\mathbf{P}^\\top \\mathbf{v})$$: stretch independently along each axis by the eigenvalues.\n+ $$\\mathbf{P}(\\mathbf{D}\\mathbf{P}^\\top\\mathbf{v})$$: rotate back to original orientation.\n- Step 3: So $$\\mathbf{A}$$ is **rotation, stretch, un-rotation** — a clean decomposition. The \"true\" action of $$\\mathbf{A}$$ is just **independent scaling** along its eigenvector directions, but expressed in the standard basis it looks more complicated.\n\nThis is the foundation of **principal component analysis**, **stress analysis in mechanics**, and **moment of inertia tensors** — all use this decomposition.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "What does the **dot product** of two normalized eigenvectors $$\\mathbf{x}_1$$ and $$\\mathbf{x}_2$$ tell you, and what condition must hold for them to be \"orthogonal eigenvectors\"?", "answer": "- Step 1: For unit vectors, $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = \\cos\\theta$$ where $$\\theta$$ is the angle between them.\n- Step 2: They are **orthogonal** if $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = 0$$, meaning $$\\theta = 90°$$.\n- Step 3: For symmetric matrices, eigenvectors corresponding to **distinct** eigenvalues are automatically orthogonal — this is the deep theorem that makes diagonalization-by-orthogonal-matrix possible.\n\nFor repeated eigenvalues, you may have to **manually orthogonalize** within an eigenspace (e.g., using Gram-Schmidt) to get an orthogonal set.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": true}, {"question": "A $$2\\times 2$$ matrix has a repeated eigenvalue $$\\lambda = 2$$, and the only eigenvectors are scalar multiples of $$\\binom{1}{0}$$. Can this matrix be diagonalized? What's the geometric obstruction? (3 steps)", "answer": "- Step 1: To diagonalize a $$2\\times 2$$ matrix, we need **two linearly independent eigenvectors** to form $$\\mathbf{P}$$.\n- Step 2: Here, the eigenspace for $$\\lambda = 2$$ is only 1-dimensional (just a line of multiples of $$\\binom{1}{0}$$). There aren't enough independent eigenvectors.\n- Step 3: This matrix is **defective** — the algebraic multiplicity (2) exceeds the geometric multiplicity (1). It can be brought to **Jordan form** $$\\begin{pmatrix} 2 & 1 \\\\ 0 & 2 \\end{pmatrix}$$, but not to a diagonal matrix.\n\nMisconception alert: not every matrix is diagonalizable! Only ones with enough independent eigenvectors. **Symmetric matrices always have enough**, which is part of what makes them special.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "Why is $$\\mathbf{T}^{-1}$$ the matrix that **reverses** the transformation $$\\mathbf{T}$$? Make the connection to function inverses.", "answer": "- Step 1: A linear transformation $$T$$ takes input $$\\mathbf{x}_1$$ and produces output $$\\mathbf{x}_2 = \\mathbf{T}\\mathbf{x}_1$$. To \"reverse\" means: given the output $$\\mathbf{x}_2$$, recover the input $$\\mathbf{x}_1$$.\n- Step 2: We want a matrix $$\\mathbf{S}$$ such that $$\\mathbf{S}\\mathbf{x}_2 = \\mathbf{x}_1$$. Substituting: $$\\mathbf{S}(\\mathbf{T}\\mathbf{x}_1) = \\mathbf{x}_1$$, i.e., $$\\mathbf{S}\\mathbf{T} = \\mathbf{I}$$ for all $$\\mathbf{x}_1$$.\n- Step 3: This is exactly the definition of $$\\mathbf{S} = \\mathbf{T}^{-1}$$. Just like $$f^{-1}(f(x)) = x$$ for functions, $$\\mathbf{T}^{-1}\\mathbf{T} = \\mathbf{I}$$ means applying $$\\mathbf{T}$$ then $$\\mathbf{T}^{-1}$$ returns the original vector.\n\nThis is why \"to find $$\\mathbf{x}_1$$ given its image $$\\mathbf{x}_2$$, multiply by $$\\mathbf{T}^{-1}$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "A line $$l_2$$ has equation $$\\mathbf{r} = \\mathbf{a} + t\\mathbf{d}$$. Under transformation $$\\mathbf{T}$$, $$l_2$$ is the image of some original line $$l_1$$. How do you find the equation of $$l_1$$? (3 steps)", "answer": "- Step 1: A general point on $$l_2$$ is $$\\mathbf{a} + t\\mathbf{d}$$. The corresponding point on $$l_1$$ is $$\\mathbf{T}^{-1}(\\mathbf{a} + t\\mathbf{d})$$.\n- Step 2: By linearity, $$\\mathbf{T}^{-1}(\\mathbf{a} + t\\mathbf{d}) = \\mathbf{T}^{-1}\\mathbf{a} + t\\,\\mathbf{T}^{-1}\\mathbf{d}$$.\n- Step 3: So $$l_1$$ has equation $$\\mathbf{r} = \\mathbf{T}^{-1}\\mathbf{a} + t \\mathbf{T}^{-1}\\mathbf{d}$$.\n\nThe procedure is symmetric to the forward direction: forward uses $$\\mathbf{T}$$ on both position and direction; backward uses $$\\mathbf{T}^{-1}$$ on both. The key is that linearity preserves the parametric structure.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "Find the eigenvector of $$\\mathbf{A} = \\begin{pmatrix} 2 & 1 \\\\ 1 & 2 \\end{pmatrix}$$ corresponding to eigenvalue $$\\lambda = 3$$. Show conceptually rather than just computationally. (3 steps)", "answer": "- Step 1: We need $$\\mathbf{x}$$ such that $$\\mathbf{A}\\mathbf{x} = 3\\mathbf{x}$$, equivalent to $$(\\mathbf{A} - 3\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$. Compute $$\\mathbf{A} - 3\\mathbf{I} = \\begin{pmatrix} -1 & 1 \\\\ 1 & -1 \\end{pmatrix}$$.\n- Step 2: The equation $$(\\mathbf{A} - 3\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ gives $$-x + y = 0$$ (the second row gives the same), so $$y = x$$.\n- Step 3: So eigenvectors are scalar multiples of $$\\binom{1}{1}$$. Geometrically: this direction is the \"diagonal of symmetry\" of $$\\mathbf{A}$$ — the axis along which $$\\mathbf{A}$$'s symmetric structure aligns with the input.\n\nFor symmetric $$\\mathbf{A}$$, expect orthogonal eigenvectors. Indeed the other eigenvector here is $$\\binom{1}{-1}$$ (perpendicular to $$\\binom{1}{1}$$).", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "Explain why a $$3\\times 3$$ orthogonal matrix has columns that are **mutually orthogonal unit vectors**. (3 steps)", "answer": "- Step 1: $$\\mathbf{M}$$ orthogonal means $$\\mathbf{M}^\\top \\mathbf{M} = \\mathbf{I}$$.\n- Step 2: The $$(i,j)$$ entry of $$\\mathbf{M}^\\top \\mathbf{M}$$ is the dot product of column $$i$$ of $$\\mathbf{M}$$ with column $$j$$ of $$\\mathbf{M}$$.\n- Step 3: For this to equal $$\\mathbf{I}$$:\n+ $$(i,i)$$ entries = 1 means each column has length 1 (unit vectors).\n+ $$(i,j)$$ entries = 0 for $$i \\neq j$$ means different columns are perpendicular (orthogonal).\n\nSo orthogonality of $$\\mathbf{M}$$ is equivalent to its columns forming an **orthonormal set** — a perfect, well-aligned coordinate frame.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": true}, {"question": "Why is it that for a 3×3 transformation matrix $$\\mathbf{T}$$, knowing the images of three linearly independent vectors completely determines $$\\mathbf{T}$$? (3 steps)", "answer": "- Step 1: Linearity means once you know $$\\mathbf{T}$$ on a basis, you know $$\\mathbf{T}$$ everywhere: any vector $$\\mathbf{v} = a\\mathbf{e}_1 + b\\mathbf{e}_2 + c\\mathbf{e}_3$$ has $$\\mathbf{T}\\mathbf{v} = a\\,\\mathbf{T}\\mathbf{e}_1 + b\\,\\mathbf{T}\\mathbf{e}_2 + c\\,\\mathbf{T}\\mathbf{e}_3$$.\n- Step 2: So if we know $$\\mathbf{T}\\mathbf{e}_1, \\mathbf{T}\\mathbf{e}_2, \\mathbf{T}\\mathbf{e}_3$$, we know $$\\mathbf{T}$$ on all of $$\\mathbb{R}^3$$.\n- Step 3: Three **linearly independent** vectors form a basis (possibly different from standard), and we can express standard basis vectors as combinations of them — so knowledge is transferable. If the vectors are NOT linearly independent (e.g., coplanar), they don't span and don't determine $$\\mathbf{T}$$ uniquely.\n\nThis is why textbook problems often give you images of $$\\mathbf{i}, \\mathbf{j}, \\mathbf{k}$$ (already a basis) — it's the most direct way.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "A matrix $$\\mathbf{A}$$ has $$\\det(\\mathbf{A}) = 0$$ and at least one zero eigenvalue. Are the rows/columns of $$\\mathbf{A}$$ linearly independent? Why? (3 steps)", "answer": "- Step 1: $$\\det(\\mathbf{A}) = 0$$ means there exists a non-zero vector $$\\mathbf{v}$$ with $$\\mathbf{A}\\mathbf{v} = \\mathbf{0}$$ (an eigenvector with eigenvalue 0).\n- Step 2: Writing $$\\mathbf{A}\\mathbf{v} = \\mathbf{0}$$ in column form: if $$\\mathbf{v} = (v_1, v_2, v_3)$$, then $$v_1\\mathbf{c}_1 + v_2\\mathbf{c}_2 + v_3\\mathbf{c}_3 = \\mathbf{0}$$ where $$\\mathbf{c}_i$$ are the columns of $$\\mathbf{A}$$. Since not all $$v_i$$ are zero, this is a **non-trivial linear dependence** among the columns.\n- Step 3: So the **columns are linearly dependent**. Similarly (by considering $$\\mathbf{A}^\\top$$ which has the same determinant), the rows are linearly dependent.\n\nThe picture: a singular matrix has redundant rows/columns; the redundancy is what causes information loss and dimensional collapse.", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": true}, {"question": "What does it mean for matrix $$\\mathbf{A}$$ to satisfy $$\\mathbf{A}\\mathbf{A}^\\top = k\\mathbf{I}$$ for some scalar $$k$$, and what's the geometric interpretation?", "answer": "- Step 1: $$\\mathbf{A}\\mathbf{A}^\\top = k\\mathbf{I}$$ means each row of $$\\mathbf{A}$$ has length $$\\sqrt{k}$$, and different rows are orthogonal to each other.\n- Step 2: If we scale by $$\\frac{1}{\\sqrt{k}}$$: define $$\\mathbf{B} = \\frac{1}{\\sqrt{k}}\\mathbf{A}$$. Then $$\\mathbf{B}\\mathbf{B}^\\top = \\mathbf{I}$$ — $$\\mathbf{B}$$ is **orthogonal**.\n- Step 3: So $$\\mathbf{A}$$ is \"orthogonal up to a scaling\": it represents a rotation/reflection combined with a uniform stretch by $$\\sqrt{k}$$. Geometrically: a **conformal transformation** that preserves angles but uniformly scales lengths.\n\nSuch matrices are common: a rotation matrix scaled by a factor.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": false}, {"question": "A $$3 \\times 3$$ matrix has eigenvalues $$2, 3, 5$$. Quickly tell me: $$\\det(\\mathbf{A})$$, $$\\text{tr}(\\mathbf{A})$$, $$\\det(\\mathbf{A}^{-1})$$, eigenvalues of $$\\mathbf{A}^2$$. (4 steps)", "answer": "- Step 1: $$\\det(\\mathbf{A}) = 2 \\cdot 3 \\cdot 5 = 30$$ (product of eigenvalues).\n- Step 2: $$\\text{tr}(\\mathbf{A}) = 2 + 3 + 5 = 10$$ (sum of eigenvalues).\n- Step 3: $$\\det(\\mathbf{A}^{-1}) = \\frac{1}{\\det(\\mathbf{A})} = \\frac{1}{30}$$ (reciprocal of det).\n- Step 4: Eigenvalues of $$\\mathbf{A}^2$$ are $$2^2, 3^2, 5^2 = 4, 9, 25$$ (squaring the eigenvalues).\n\nThese compact relationships between $$\\mathbf{A}$$ and its eigenvalues are why eigen-analysis is so powerful — many quantities about $$\\mathbf{A}$$ reduce to simple operations on its eigenvalues.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": true}, {"question": "When we write $$\\mathbf{T}: \\mathbb{R}^3 \\to \\mathbb{R}^3$$, what does this notation mean, and how does the matrix represent this mapping?", "answer": "- Step 1: $$\\mathbb{R}^3$$ denotes 3-dimensional Euclidean space (all triples of real numbers, or equivalently, all 3D position vectors).\n- Step 2: $$T: \\mathbb{R}^3 \\to \\mathbb{R}^3$$ means $$T$$ is a transformation taking points (or vectors) from 3D space and producing points in 3D space.\n- Step 3: A $$3 \\times 3$$ matrix $$\\mathbf{T}$$ represents this transformation by matrix-vector multiplication: input a column vector $$\\mathbf{x} \\in \\mathbb{R}^3$$, multiply to get $$\\mathbf{T}\\mathbf{x} \\in \\mathbb{R}^3$$ — the image.\n\nFor non-square matrices, you can have $$T: \\mathbb{R}^n \\to \\mathbb{R}^m$$ where $$\\mathbf{T}$$ is $$m \\times n$$. But all our transformations here keep dimensions the same.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": false}, {"question": "For a singular $$3\\times 3$$ matrix $$\\mathbf{T}$$, the image of all of $$\\mathbb{R}^3$$ may collapse to a plane, line, or point. What determines which?", "answer": "- Step 1: The image is the column space of $$\\mathbf{T}$$ — the set of all linear combinations of the columns.\n- Step 2: The dimension of the image equals the **rank** of $$\\mathbf{T}$$, which is the number of linearly independent columns.\n+ Rank 3: full image, $$\\mathbf{T}$$ is non-singular.\n+ Rank 2: image is a 2D plane through origin.\n+ Rank 1: image is a 1D line through origin.\n+ Rank 0: only the zero vector (image is the origin) — happens only if $$\\mathbf{T} = \\mathbf{0}$$.\n- Step 3: For singular matrices (rank < 3), the geometry collapses: 3D space gets \"projected\" or \"squashed\" onto a lower-dimensional subspace.\n\nThis connects rank, eigenvalues (number of zero eigenvalues equals rank deficit), and singularity into one geometric story.", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": true}, {"question": "How can the **trace** of a matrix help you check eigenvalue computations quickly? Demonstrate with a $$3\\times 3$$ matrix $$\\mathbf{A}$$ where you've computed eigenvalues $$1, 2, 5$$ but the diagonal entries sum to 9.", "answer": "- Step 1: The trace = sum of diagonal entries = sum of eigenvalues. This is an invariant.\n- Step 2: Sum of computed eigenvalues: $$1 + 2 + 5 = 8$$.\n- Step 3: Trace of matrix: $$9$$. These don't match — there must be an **error** in the eigenvalue calculation. Either you've made an arithmetic slip in the characteristic polynomial, missed a root, or computed eigenvalues incorrectly.\n\nUse this as a routine check: it takes 5 seconds and catches many errors. Similarly, the **product** of eigenvalues should equal the determinant.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": true}, {"question": "Why must eigenvectors corresponding to **different** eigenvalues be linearly independent (for any matrix, not just symmetric)? (3 steps)", "answer": "- Step 1: Suppose $$\\mathbf{A}\\mathbf{v}_1 = \\lambda_1 \\mathbf{v}_1$$ and $$\\mathbf{A}\\mathbf{v}_2 = \\lambda_2 \\mathbf{v}_2$$ with $$\\lambda_1 \\neq \\lambda_2$$, and assume for contradiction that $$\\mathbf{v}_2 = c\\mathbf{v}_1$$ for some scalar $$c$$.\n- Step 2: Then $$\\mathbf{A}\\mathbf{v}_2 = \\mathbf{A}(c\\mathbf{v}_1) = c\\lambda_1 \\mathbf{v}_1$$. But also $$\\mathbf{A}\\mathbf{v}_2 = \\lambda_2 \\mathbf{v}_2 = \\lambda_2 c \\mathbf{v}_1$$. So $$c\\lambda_1 \\mathbf{v}_1 = c\\lambda_2 \\mathbf{v}_1$$.\n- Step 3: Since $$c \\neq 0$$ (else $$\\mathbf{v}_2 = \\mathbf{0}$$, not allowed) and $$\\mathbf{v}_1 \\neq \\mathbf{0}$$, we'd need $$\\lambda_1 = \\lambda_2$$ — contradicting our assumption. So $$\\mathbf{v}_1$$ and $$\\mathbf{v}_2$$ are linearly independent.\n\nThis is why distinct eigenvalues guarantee an independent set of eigenvectors — we don't need symmetry, just distinctness.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": true}, {"question": "When solving $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ for an eigenvector, you typically get **infinitely many solutions**. How do you choose a \"nice\" one, and why is any choice valid?", "answer": "- Step 1: At an eigenvalue $$\\lambda$$, the matrix $$\\mathbf{A} - \\lambda\\mathbf{I}$$ is singular, so the system has a continuous family of solutions parameterized by 1 (or more) free variables.\n- Step 2: Any **non-zero** solution is a valid eigenvector. To pick a specific one, you typically:\n+ Set one variable equal to a convenient value like 1 (avoiding fractions if possible).\n+ Or normalize to unit length if the question requires.\n- Step 3: The choice doesn't affect the eigen-direction — only the magnitude. The \"line of eigenvectors\" is what matters; specific representatives are just convenient labels.\n\nStrategy tip: if you spot a particular row giving a clean ratio like $$y = -2x$$, set $$x = 1$$ to get $$y = -2$$, $$z = $$ whatever the third equation says — this avoids fractions.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": true}, {"question": "A symmetric $$3\\times 3$$ matrix is diagonalized as $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P} = \\mathbf{D} = \\text{diag}(2, 5, 8)$$. Without computing $$\\mathbf{A}$$, what are its eigenvalues, eigenvectors (in some sense), determinant, and trace?", "answer": "- Step 1: **Eigenvalues**: directly read off the diagonal of $$\\mathbf{D}$$: $$2, 5, 8$$.\n- Step 2: **Eigenvectors**: the columns of $$\\mathbf{P}$$ are the normalized eigenvectors. The first column corresponds to eigenvalue 2, second to 5, third to 8 (or whatever order matches $$\\mathbf{D}$$).\n- Step 3: **Determinant**: product of eigenvalues = $$2 \\times 5 \\times 8 = 80$$. **Trace**: sum of eigenvalues = $$2 + 5 + 8 = 15$$.\n\nConceptual upshot: diagonalization compresses all the eigen-information into clean form. From $$\\mathbf{D}$$ alone you get eigenvalues; from $$\\mathbf{P}$$ you get eigenvectors; combined they give you everything about $$\\mathbf{A}$$ that matters for spectral analysis.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": true}, {"question": "Reflection in a plane through the origin can be represented by a $$3\\times 3$$ orthogonal matrix $$\\mathbf{M}$$. What are its eigenvalues, and how do they tell you the plane of reflection?", "answer": "- Step 1: A reflection has eigenvalues $$1$$ (multiplicity 2) and $$-1$$ (multiplicity 1).\n- Step 2: The eigenspace for $$\\lambda = 1$$ is 2-dimensional — it's exactly the **plane of reflection** (vectors in the plane are unchanged).\n- Step 3: The eigenvector for $$\\lambda = -1$$ is **normal to the plane** — it gets flipped by the reflection.\n\nSo if you compute the eigenvalues of a transformation matrix and find $$\\{1, 1, -1\\}$$, you immediately know it's a reflection, and the eigenvectors tell you the reflection plane and its normal. The plane has Cartesian equation $$\\mathbf{n} \\cdot \\mathbf{r} = 0$$ where $$\\mathbf{n}$$ is the eigenvector for $$\\lambda = -1$$.", "source": "Opus 4.7 ①", "_id": "opus_1_75", "judge_pick": false}, {"question": "Define a **scalar (dot) product** of two column vectors and explain its role in the orthogonal eigenvector framework.", "answer": "- Step 1: For vectors $$\\mathbf{x}_1 = (a_1, b_1, c_1)$$ and $$\\mathbf{x}_2 = (a_2, b_2, c_2)$$, the scalar product is $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = a_1 a_2 + b_1 b_2 + c_1 c_2$$.\n- Step 2: In matrix notation: $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = \\mathbf{x}_1^\\top \\mathbf{x}_2$$ (a $$1\\times 3$$ row times a $$3 \\times 1$$ column = $$1\\times 1$$ scalar).\n- Step 3: Two vectors are **orthogonal** iff their scalar product is 0. For symmetric matrices, eigenvectors with distinct eigenvalues are automatically orthogonal — this is the key property that makes the orthogonal matrix $$\\mathbf{P}$$ work in diagonalization.\n\nIn coordinate form: $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = |\\mathbf{x}_1| |\\mathbf{x}_2| \\cos\\theta$$ where $$\\theta$$ is the angle between them.", "source": "Opus 4.7 ①", "_id": "opus_1_76", "judge_pick": false}, {"question": "What is the **leading diagonal** of a square matrix, and why does it play a special role in defining diagonal matrices and computing the trace?", "answer": "- Step 1: The leading diagonal (also called main diagonal) of a square matrix runs from the **top-left to the bottom-right** — entries $$a_{11}, a_{22}, a_{33}, \\ldots$$\n- Step 2: A **diagonal matrix** is one where all entries off this diagonal are zero — only the leading diagonal can have non-zero entries.\n- Step 3: The **trace** is the sum of leading diagonal entries: $$\\text{tr}(\\mathbf{A}) = a_{11} + a_{22} + a_{33}$$. The diagonal is special because:\n+ Diagonal entries represent \"self-coupling\" (input axis $$i$$ to output axis $$i$$).\n+ They're invariant under the operation $$\\mathbf{P}^{-1}\\mathbf{A}\\mathbf{P}$$ in total (the trace doesn't change), even though individual entries do.\n\nThe leading diagonal anchors many of a matrix's most important invariants.", "source": "Opus 4.7 ①", "_id": "opus_1_77", "judge_pick": false}, {"question": "Why does **multiplying a matrix by the identity matrix** leave it unchanged? Connect this to the geometric picture.", "answer": "- Step 1: $$\\mathbf{I}$$ is the matrix that represents the **identity transformation** — every vector maps to itself: $$\\mathbf{I}\\mathbf{x} = \\mathbf{x}$$.\n- Step 2: For any matrix $$\\mathbf{A}$$: $$\\mathbf{A}\\mathbf{I} = \\mathbf{A}$$ because composing $$\\mathbf{A}$$ with the do-nothing transformation gives $$\\mathbf{A}$$. Similarly $$\\mathbf{I}\\mathbf{A} = \\mathbf{A}$$.\n- Step 3: Geometrically: the identity matrix has $$\\mathbf{i}, \\mathbf{j}, \\mathbf{k}$$ as its columns (it sends each basis vector to itself). It's the \"neutral element\" of matrix multiplication — like $$1$$ for ordinary multiplication.\n\nThis is why $$\\mathbf{A}\\mathbf{A}^{-1} = \\mathbf{I}$$ encodes \"doing $$\\mathbf{A}$$ then undoing $$\\mathbf{A}$$ gives nothing\" — and why $$\\lambda\\mathbf{I}$$ represents uniform scaling.", "source": "Opus 4.7 ①", "_id": "opus_1_78", "judge_pick": false}, {"question": "Suppose $$\\mathbf{A}$$ has eigenvalue $$\\lambda$$ and corresponding eigenvector $$\\mathbf{x}$$. What's the geometric meaning of $$|\\lambda| > 1$$, $$|\\lambda| < 1$$, $$\\lambda < 0$$, and $$\\lambda = 0$$?", "answer": "- Step 1: $$|\\lambda| > 1$$: $$\\mathbf{A}$$ **stretches** in the direction of $$\\mathbf{x}$$ — vectors along $$\\mathbf{x}$$ get longer.\n- Step 2: $$|\\lambda| < 1$$ (and $$\\lambda \\neq 0$$): $$\\mathbf{A}$$ **contracts** in this direction — vectors get shorter but keep their direction (or reverse).\n- Step 3: $$\\lambda < 0$$: the eigenvector gets **flipped** to the opposite direction (with stretch/contract by $$|\\lambda|$$).\n- Step 4: $$\\lambda = 0$$: the eigenvector gets **collapsed to the zero vector** — this direction is in the \"kernel\" (null space) of $$\\mathbf{A}$$, and $$\\mathbf{A}$$ is singular.\n\nSo the eigenvalue's sign and magnitude give a complete geometric picture along that direction: stretch/contract/flip/collapse.", "source": "Opus 4.7 ①", "_id": "opus_1_79", "judge_pick": true}, {"question": "Suppose I claim that $$\\binom{2}{3}$$ is an eigenvector of some matrix $$\\mathbf{A}$$ with eigenvalue 4. How do you verify this without finding eigenvalues from scratch?", "answer": "- Step 1: Compute $$\\mathbf{A}\\binom{2}{3}$$ and check if the result equals $$4\\binom{2}{3} = \\binom{8}{12}$$.\n- Step 2: If yes, the claim is verified — by definition, $$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$$ is the eigenvector equation.\n- Step 3: This is much faster than computing the characteristic polynomial. It's the \"plug in and check\" method, suitable when an eigenvector candidate is given.\n\nThis is why exam problems often **give** an eigenvector and ask you to verify it — they're testing whether you understand the definition, not the cubic-solving algorithm.", "source": "Opus 4.7 ①", "_id": "opus_1_80", "judge_pick": true}, {"question": "Why is the formula $$\\det(\\mathbf{A}\\mathbf{B}) = \\det(\\mathbf{A})\\det(\\mathbf{B})$$ special — what would break if it didn't hold?", "answer": "- Step 1: This formula links determinants to matrix multiplication. It says $$\\det$$ is a \"homomorphism\" — it converts multiplicative structure (matrix products) into multiplicative structure (number products).\n- Step 2: Without it: deciding whether $$\\mathbf{A}\\mathbf{B
