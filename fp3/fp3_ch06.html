$.\n\nVisual intuition: A symmetric matrix looks like a mirror image across its main diagonal (top-left to bottom-right). For a $2 \\times 2$ matrix, it has the form $$\\begin{pmatrix} a & b \\\\ b & c \\end{pmatrix}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "If you have two matrices $\\mathbf{A}$ and $\\mathbf{B}$, what is the transpose of their product, $(\\mathbf{A}\\mathbf{B})^T$? (2 steps)", "answer": "- Step 1: The order of multiplication reverses when taking the transpose of a product.\n- Step 2: The formula is $$(\\mathbf{A}\\mathbf{B})^T = \\mathbf{B}^T\\mathbf{A}^T$$.\n\nMisconception probe: It is **not** $\\mathbf{A}^T\\mathbf{B}^T$. Matrix multiplication is not commutative, and the order must be reversed. This is analogous to the inverse of a product: $(\\mathbf{A}\\mathbf{B})^{-1} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Let $\\mathbf{A} = \\begin{pmatrix} 1 & 2 \\\\ 3 & 4 \\end{pmatrix}$ and $\\mathbf{B} = \\begin{pmatrix} 0 & 1 \\\\ -1 & 0 \\end{pmatrix}$. Without full calculation, determine the dimensions of $\\mathbf{A}^T\\mathbf{B}$. Is $\\mathbf{A}^T\\mathbf{B}$ defined? (3 steps)", "answer": "- Step 1: $\\mathbf{A}$ is $2 \\times 2$, so $\\mathbf{A}^T$ is also $2 \\times 2$.\n- Step 2: $\\mathbf{B}$ is $2 \\times 0$ (columns) $\\to 2 \\times 2$.\n- Step 3: The product $\\mathbf{A}^T\\mathbf{B}$ involves a $2 \\times 2$ matrix multiplied by a $2 \\times 2$ matrix. The inner dimensions match (2 and 2), so the product is defined and results in a $2 \\times 2$ matrix.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "How do you calculate the determinant of a $3 \\times 3$ matrix using the first row? (3 steps)", "answer": "- Step 1: Take the elements of the first row ($a, b, c$).\n- Step 2: Multiply each element by the determinant of the $2 \\times 2$ sub-matrix formed by deleting the row and column containing that element (the \"minor\").\n- Step 3: Apply the alternating sign pattern ($+ - +$) and sum the results:\n$$\\det(\\mathbf{A}) = a \\begin{vmatrix} e & f \\\\ h & i \\end{vmatrix} - b \\begin{vmatrix} d & f \\\\ g & i \\end{vmatrix} + c \\begin{vmatrix} d & e \\\\ g & h \\end{vmatrix}$$", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "A matrix $\\mathbf{A}$ has a determinant of 0. What is the specific term used to describe this matrix, and what does it imply about the linear transformation it represents? (2 steps)", "answer": "- Step 1: The matrix is called **singular**. A non-zero determinant implies a non-singular matrix.\n- Step 2: Geometrically, a singular matrix represents a linear transformation that collapses 3D space into a lower dimension (a plane or a line or a point), meaning the volume scale factor is 0. It implies the matrix does not have an inverse.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "If $\\det(\\mathbf{A}) = 2$ and $\\det(\\mathbf{B}) = 5$, what is $\\det(\\mathbf{A}\\mathbf{B})$?", "answer": "The determinant of a product of matrices is the product of their determinants.\n- Step 1: Use the rule $$\\det(\\mathbf{A}\\mathbf{B}) = \\det(\\mathbf{A})\\det(\\mathbf{B})$$.\n- Step 2: Substitute the given values: $$2 \\times 5 = 10$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "List the 5 steps to find the inverse of a $3 \\times 3$ matrix $\\mathbf{A}$. (5 steps)", "answer": "- Step 1: Find the determinant, $\\det(\\mathbf{A})$. If it is 0, stop (no inverse exists).\n- Step 2: Form the **matrix of minors** ($\\mathbf{M}$). Replace each element with the determinant of the $2 \\times 2$ sub-matrix left after crossing out its row and column.\n- Step 3: Form the **matrix of cofactors** ($\\mathbf{C}$). Apply the checkerboard sign pattern ($+ - +$ / $- + -$ / $+ - +$) to the minors.\n- Step 4: Form the **adjugate** (or adjoint) matrix by transposing the cofactor matrix: $\\mathbf{C}^T$.\n- Step 5: Multiply the adjugate by $\\frac{1}{\\det(\\mathbf{A})}$. The inverse is $$\\mathbf{A}^{-1} = \\frac{1}{\\det(\\mathbf{A})}\\mathbf{C}^T$$.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "What is the sign pattern used to convert a matrix of minors into a matrix of cofactors for a $3 \\times 3$ matrix? (2 steps)", "answer": "- Step 1: The signs alternate starting with a positive in the top-left corner.\n- Step 2: The pattern is:\n$$\\begin{pmatrix} + & - & + \\\\ - & + & - \\\\ + & - & + \\end{pmatrix}$$\nYou add the sign to the corresponding minor value.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "If $\\mathbf{A}$ and $\\mathbf{B}$ are non-singular matrices, what is the inverse of their product, $(\\mathbf{A}\\mathbf{B})^{-1}$? (2 steps)", "answer": "- Step 1: The inverse of a product reverses the order of the multiplication, just like taking off socks and shoes: to undo, you take off shoes first, then socks.\n- Step 2: $$(\\mathbf{A}\\mathbf{B})^{-1} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "If you are given that $\\mathbf{A}^2 = \\mathbf{I}$ (the identity matrix), what is a quick way to write down $\\mathbf{A}^{-1}$? (2 steps)", "answer": "- Step 1: Start with the definition of an inverse: $\\mathbf{A}\\mathbf{A}^{-1} = \\mathbf{I}$.\n- Step 2: You are given $\\mathbf{A}\\mathbf{A} = \\mathbf{I}$. Comparing the two equations, the matrix multiplying $\\mathbf{A}$ to get $\\mathbf{I}$ is $\\mathbf{A}$ itself.\nTherefore, $$\\mathbf{A}^{-1} = \\mathbf{A}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "How do you determine the matrix representing a linear transformation in 3D? (2 steps)", "answer": "- Step 1: Apply the transformation to the three standard basis vectors: $\\mathbf{i} = \\begin{pmatrix} 1 \\\\ 0 \\\\ 0 \\end{pmatrix}$, $\\mathbf{j} = \\begin{pmatrix} 0 \\\\ 1 \\\\ 0 \\end{pmatrix}$, and $\\mathbf{k} = \\begin{pmatrix} 0 \\\\ 0 \\\\ 1 \\end{pmatrix}$.\n- Step 2: The resulting image vectors become the columns of the transformation matrix. The image of $\\mathbf{i}$ is the first column, $\\mathbf{j}$ is the second, and $\\mathbf{k}$ is the third.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Transformation $T$ is represented by matrix $\\mathbf{T}$ and transformation $U$ by matrix $\\mathbf{U}$. What transformation does the matrix product $\\mathbf{U}\\mathbf{T}$ represent? (2 steps)", "answer": "- Step 1: Matrix multiplication is applied right-to-left. The vector is multiplied by the rightmost matrix first.\n- Step 2: Therefore, $\\mathbf{U}\\mathbf{T}$ represents the transformation $T$ followed by the transformation $U$.\n\nMisconception probe: It is **not** $U$ followed by $T$. The order of the letters matches the order of application, but the matrices are written in reverse order.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "A transformation $T$ maps a point $\\mathbf{x}_1$ to $\\mathbf{x}_2$ using the equation $\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$. How can you find the original point $\\mathbf{x}_1$ if you know $\\mathbf{x}_2$ and $\\mathbf{T}^{-1}$? (2 steps)", "answer": "- Step 1: Multiply the equation $\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$ on the left by $\\mathbf{T}^{-1}$.\n- Step 2: This yields $$\\mathbf{x}_1 = \\mathbf{T}^{-1}\\mathbf{x}_2$$.\nThis effectively reverses the transformation.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "What is the defining equation for an eigenvector $\\mathbf{x}$ and its corresponding eigenvalue $\\lambda$ for a matrix $\\mathbf{A}$? (2 steps)", "answer": "- Step 1: An eigenvector is a non-zero vector whose direction is unchanged (or reversed) by the transformation $\\mathbf{A}$.\n- Step 2: The transformation scales the vector by a factor $\\lambda$, so the equation is:\n$$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$$", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Geometrically, what happens to an eigenvector when a linear transformation represented by matrix $\\mathbf{A}$ is applied to it? (2 steps)", "answer": "- Step 1: The eigenvector remains on the same line (span) through the origin.\n- Step 2: Its magnitude is scaled by the corresponding eigenvalue $\\lambda$.\n+ If $\\lambda > 0$, it points in the same direction.\n+ If $\\lambda < 0$, it points in the opposite direction.\n+ If $\\lambda = 0$, it maps to the zero vector.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "How do you find the eigenvalues of a matrix $\\mathbf{A}$? (3 steps)", "answer": "- Step 1: Rearrange the definition $\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$ to $\\mathbf{A}\\mathbf{x} - \\lambda\\mathbf{I}\\mathbf{x} = \\mathbf{0}$, which factors to $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$.\n- Step 2: For a non-zero solution $\\mathbf{x}$ to exist, the matrix $(\\mathbf{A} - \\lambda\\mathbf{I})$ must be singular.\n- Step 3: Therefore, solve the **characteristic equation**:\n$$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = 0$$", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Once an eigenvalue $\\lambda$ is found, how do you calculate the corresponding eigenvector? (3 steps)", "answer": "- Step 1: Substitute the value of $\\lambda$ into the matrix $(\\mathbf{A} - \\lambda\\mathbf{I})$.\n- Step 2: Solve the homogeneous system of linear equations $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$.\n- Step 3: This usually results in a set of dependent equations. Choose simple values for the free variables (often setting one variable to 1) to find a non-zero vector $\\mathbf{x}$ that satisfies the equations.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "How do you normalise a 3D vector $\\mathbf{v} = \\begin{pmatrix} a \\\\ b \\\\ c \\end{pmatrix}$? (2 steps)", "answer": "- Step 1: Calculate the magnitude of the vector: $$|\\mathbf{v}| = \\sqrt{a^2 + b^2 + c^2}$$.\n- Step 2: Divide each component by this magnitude to create a unit vector:\n$$\\text{Normalised vector} = \\begin{pmatrix} \\frac{a}{\\sqrt{a^2+b^2+c^2}} \\\\ \\frac{b}{\\sqrt{a^2+b^2+c^2}} \\\\ \\frac{c}{\\sqrt{a^2+b^2+c^2}} \\end{pmatrix}$$", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A linear transformation has an eigenvalue of 1. What special property does the line of action of the corresponding eigenvector possess? (2 steps)", "answer": "- Step 1: Since $\\lambda = 1$, the transformation maps the eigenvector $\\mathbf{x}$ to $1\\mathbf{x} = \\mathbf{x}$.\n- Step 2: This means every point on the line spanned by this eigenvector is mapped to itself. This line is called a **line of invariant points**.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "What condition defines an orthogonal matrix $\\mathbf{M}$? (2 steps)", "answer": "- Step 1: An orthogonal matrix is a square matrix whose columns are mutually orthogonal unit vectors.\n- Step 2: Algebraically, this is equivalent to the condition $$\\mathbf{M}\\mathbf{M}^T = \\mathbf{I}$$.\nBecause $\\mathbf{M}^{-1}\\mathbf{M} = \\mathbf{I}$, this also implies $$\\mathbf{M}^{-1} = \\mathbf{M}^T$$ for orthogonal matrices.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Describe the process to reduce a symmetric matrix $\\mathbf{A}$ to a diagonal matrix $\\mathbf{D}$. (4 steps)", "answer": "- Step 1: Find the eigenvalues and corresponding eigenvectors of $\\mathbf{A}$.\n- Step 2: Normalise the eigenvectors.\n- Step 3: Form a matrix $\\mathbf{P}$ where the columns are these normalised eigenvectors. $\\mathbf{P}$ will be an orthogonal matrix.\n- Step 4: Calculate $\\mathbf{D}$ using the formula $$\\mathbf{D} = \\mathbf{P}^T\\mathbf{A}\\mathbf{P}$$.\nThe elements on the leading diagonal of $\\mathbf{D}$ will be the eigenvalues of $\\mathbf{A}$, in the order corresponding to the columns of $\\mathbf{P}$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "If you diagonalise a matrix $\\mathbf{A}$ such that $\\mathbf{P}^T\\mathbf{A}\\mathbf{P} = \\mathbf{D}$, what are the entries on the leading diagonal of $\\mathbf{D}$? (2 steps)", "answer": "- Step 1: The diagonal matrix $\\mathbf{D}$ contains the eigenvalues of the matrix $\\mathbf{A}$.\n- Step 2: The order of the eigenvalues on the diagonal corresponds to the order of the normalised eigenvectors used as columns in the matrix $\\mathbf{P}$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}], "count": 23}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "If M is an n×m matrix and N is an m×p matrix, what is the dimension of M^T N? Explain your reasoning.", "answer": "M is n×m, so M^T is m×n. N is m×p. When multiplying M^T N: the inner dimensions (n and m) must match - but they don't! M^T is m×n and N is m×p, so n must equal m for multiplication to be defined. If m = n, then M^T N is n×p. The key insight is that you can only multiply matrices when the column count of the left matrix equals the row count of the right matrix.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Prove that for any matrices A and B where AB exists, (AB)^T = B^T A^T. (2 steps)", "answer": "- Step 1: Let A be n×m and B be m×p. Then AB is n×p, so (AB)^T is p×n. Also B^T is p×m and A^T is m×n, so B^T A^T is p×n - both sides have the same dimensions.\n\n- Step 2: Consider element (AB)^T_{ij} = (AB)_{ji} = sum over k of A_{jk} B_{ki}. This equals sum over k of B^T_{ik} A^T_{kj} = (B^T A^T)_{ij}. Since all elements match, (AB)^T = B^T A^T.\n\nThis is true for all matrices where AB exists, unlike the inverse property which requires non-singularity.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "How do you calculate the determinant of a 3×3 matrix using the cofactor expansion method? (3 steps)", "answer": "- Step 1: For matrix $$\\begin{pmatrix}a & b & c \\\\ d & e & f \\\\ g & h & i\\end{pmatrix}$$, the determinant is: $$a\\begin{pmatrix}e & f \\\\ h & i\\end{pmatrix} - b\\begin{pmatrix}d & f \\\\ g & i\\end{pmatrix} + c\\begin{pmatrix}d & e \\\\ g & h\\end{pmatrix}$$\n\n- Step 2: Notice the alternating signs pattern in the formula: +, -, + for the first row elements. The middle term has a negative sign.\n\n- Step 3: Each 2×2 determinant is found by crossing out the row and column containing that element. For example, for element a, cross out row 1 and column 1, leaving $$\\begin{pmatrix}e & f \\\\ h & i\\end{pmatrix}$$, whose determinant is ei - fh.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What is the difference between a singular and non-singular matrix? How can you determine this from the determinant?", "answer": "If det(A) = 0, the matrix A is singular (no inverse exists). If det(A) ≠ 0, A is non-singular (inverse exists). This is because the formula for the inverse involves dividing by det(A), which would require division by zero if the determinant were zero. Geometrically, a singular matrix represents a transformation that \"collapses\" dimensions - it squashes space onto a lower dimension, making it impossible to reverse.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Find the determinant of $$\\begin{pmatrix}1 & 2 & 4 \\\\ 3 & 2 & 1 \\\\ -1 & 4 & 3\\end{pmatrix}$$. Show your working. (2 steps)", "answer": "- Step 1: Using the formula: = 1×(2×3 - 1×4) - 2×(3×3 - 1×(-1)) + 4×(3×4 - 2×(-1)) = 1×(6-4) - 2×(9+1) + 4×(12+2)\n\n- Step 2: = 1×2 - 2×10 + 4×14 = 2 - 20 + 56 = 38", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A matrix A is given by $$\\begin{pmatrix}3 & k & 0 \\\\ -2 & 1 & 2 \\\\ 5 & 0 & k+3\\end{pmatrix}$$. Find det(A) in terms of k. (3 steps)", "answer": "- Step 1: Expand along first row: det(A) = 3×det$$\\begin{pmatrix}1 & 2 \\\\ 0 & k+3\\end{pmatrix}$$ - k×det$$\\begin{pmatrix}-2 & 2 \\\\ 5 & k+3\\end{pmatrix}$$ + 0×(something)\n\n- Step 2: = 3((k+3)×1 - 2×0) - k((-2)(k+3) - 2×5) = 3(k+3) - k(-2k - 6 - 10)\n\n- Step 3: = 3k + 9 - k(-2k - 16) = 3k + 9 + 2k² + 16k = 2k² + 19k + 9", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Describe the 5-step process for finding the inverse of a non-singular 3×3 matrix A. (5 steps)", "answer": "- Step 1: Find det(A). If det(A) = 0, the matrix is singular and has no inverse.\n\n- Step 2: Form the matrix of minors M. For each element of A, cross out its row and column and find the determinant of the remaining 2×2 matrix.\n\n- Step 3: Form the matrix of cofactors C by applying the alternating signs pattern: $$\\begin{pmatrix}+ & - & + \\\\ - & + & - \\\\ + & - & +\\end{pmatrix}$$. Change signs of elements corresponding to minus positions.\n\n- Step 4: Find C^T, the transpose of the matrix of cofactors.\n\n- Step 5: The inverse is A⁻¹ = (1/det(A)) × C^T", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "If A and B are non-singular matrices, prove that (AB)⁻¹ = B⁻¹ A⁻¹. (4 steps)", "answer": "- Step 1: Let P = (AB)⁻¹. By definition, (AB)P = I.\n\n- Step 2: Multiply on the left by A⁻¹: A⁻¹(AB)P = A⁻¹I, giving (A⁻¹A)BP = A⁻¹, so IBP = A⁻¹, thus BP = A⁻¹.\n\n- Step 3: Multiply on the left by B⁻¹: B⁻¹BP = B⁻¹A⁻¹, so IP = B⁻¹A⁻¹.\n\n- Step 4: Therefore P = B⁻¹A⁻¹, proving (AB)⁻¹ = B⁻¹A⁻¹.\n\nNote the reversed order! This is like undoing transformations in reverse order.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "A linear transformation T in 3 dimensions maps point (x, y, z) to (x+z, y, x+2y+z). Write down the matrix representing T. (2 steps)", "answer": "- Step 1: The matrix columns are the images of the basis vectors i = (1,0,0), j = (0,1,0), k = (0,0,1).\n\n- Step 2: T(1,0,0) = (1, 0, 1); T(0,1,0) = (0, 1, 2); T(0,0,1) = (1, 0, 1). These become the columns: $$\\begin{pmatrix}1 & 0 & 1 \\\\ 0 & 1 & 0 \\\\ 1 & 2 & 1\\end{pmatrix}$$\n\nThe first column is where i maps, second column is where j maps, third column is where k maps.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "If transformation T is represented by matrix T and transformation U is represented by matrix U, what matrix represents \"T followed by U\"? Explain why. (2 steps)", "answer": "- Step 1: First apply T, then apply U to the result. Mathematically: U(T(x)) = UTx. So the combined transformation is represented by UT (U multiplied by T, in that order).\n\n- Step 2: The matrix closest to the vector is applied first. If we write U then T (as in \"U followed by T\"), the matrix is TU. The key insight is that matrix multiplication represents composition of transformations in the reverse order of how we typically read \"followed by\".\n\nThis is because (TU)(x) = T(U(x)): apply U first, then T.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "A transformation T maps line r = a + t d to line r = a' + t d'. How would you find the matrix representing T given this information?", "answer": "The direction vector d is transformed to d'. So the matrix columns are T applied to the basis vectors. If you know where three non-collinear points map to, you can find the transformation matrix. Specifically, if T(i), T(j), and T(k) are known, these become the columns of the matrix. For the line transformation, you need both the image of a point on the line and how the direction changes: T(a + td) = T(a) + t T(d).", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "If T is a linear transformation represented by matrix T, and vector x₁ transforms to x₂ (so Tx₁ = x₂), how do you find x₁ when you know x₂? (2 steps)", "answer": "- Step 1: We have Tx₁ = x₂. Multiply both sides on the left by T⁻¹: T⁻¹Tx₁ = T⁻¹x₂, so Ix₁ = T⁻¹x₂.\n\n- Step 2: Therefore x₁ = T⁻¹x₂. The inverse matrix \"reverses\" the transformation, sending the image back to the original vector.\n\nThis is how you find the pre-image (the point before transformation) given the image.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "What is the definition of an eigenvalue and eigenvector of a matrix A? (2 steps)", "answer": "- Step 1: An eigenvector of A is a non-zero column vector x that satisfies Ax = λx, where λ is a scalar (the eigenvalue).\n\n- Step 2: The eigenvector's direction is unchanged (invariant) under the transformation, but its magnitude changes by factor λ. The eigenvalue λ can be interpreted as the magnification factor. If λ = 1, points on that eigenvector's line are invariant (don't move).\n\nEigen means \"particular\" or \"special\" in German - these are special vectors!", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "How do you find eigenvalues of a matrix A? Derive the characteristic equation. (3 steps)", "answer": "- Step 1: Start with Ax = λx. Since Ix = x, we can write Ax = λIx.\n\n- Step 2: Rearranging: Ax - λIx = (A - λI)x = 0. For a non-zero eigenvector x, the matrix (A - λI) must be singular.\n\n- Step 3: Therefore det(A - λI) = 0. This is the characteristic equation. Solving it gives the eigenvalues λ.\n\nThe characteristic polynomial is det(A - λI), and its roots are the eigenvalues.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Find the eigenvalues and eigenvectors of $$\\begin{pmatrix}2 & 5 \\\\ -1 & -4\\end{pmatrix}$$. (4 steps)", "answer": "- Step 1: Characteristic equation: det$$\\begin{pmatrix}2-λ & 5 \\\\ -1 & -4-λ\\end{pmatrix}$$ = (2-λ)(-4-λ) + 5 = λ² + 2λ - 3 = 0, so λ = 1 or λ = -3.\n\n- Step 2: For λ = 1: (A - I)v = 0 gives $$\\begin{pmatrix}1 & 5 \\\\ -1 & -5\\end{pmatrix}$$v = 0. From first row: x + 5y = 0, so v = $$\\begin{pmatrix}-5 \\\\ 1\\end{pmatrix}$$.\n\n- Step 3: For λ = -3: (A + 3I)v = 0 gives $$\\begin{pmatrix}5 & 5 \\\\ -1 & -1\\end{pmatrix}$$v = 0. From first row: 5x + 5y = 0, so v = $$\\begin{pmatrix}1 \\\\ -1\\end{pmatrix}$$.\n\n- Step 4: Eigenvalue 1 has eigenvector (-5, 1), eigenvalue -3 has eigenvector (1, -1). Any non-zero multiples work too.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "For a 3×3 matrix, what is the process for finding eigenvectors once eigenvalues are known? (2 steps)", "answer": "- Step 1: For each eigenvalue λ, solve (A - λI)v = 0. This gives a system of equations. Typically 2 independent equations will determine the eigenvector (since one equation is redundant for a 3×3 with distinct eigenvalues).\n\n- Step 2: You have a free variable choice - pick a convenient non-zero value for one variable, then solve for the others. Any non-zero multiple of this vector is also an eigenvector. For example, if y = 1 gives x = -5/4, you could multiply by 4 to get (-5, 4, 0) or just use fractions.\n\nThe eigenvector is not unique - any direction in that eigenspace works.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "What is a normalised eigenvector and how do you find one from an eigenvector? (2 steps)", "answer": "- Step 1: A normalised eigenvector has magnitude 1. For a 2D eigenvector $$\\begin{pmatrix}a \\\\ b\\end{pmatrix}$$, magnitude = √(a² + b²). For 3D: √(a² + b² + c²).\n\n- Step 2: Divide each component by the magnitude. For eigenvector (1, 1, 0) with magnitude √2, the normalised version is (1/√2, 1/√2, 0).\n\nNote: Both v and -v are eigenvectors with the same eigenvalue, so there are two possible normalised eigenvectors pointing in opposite directions.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "In a 2D transformation, the matrix has eigenvalues 3 and -1. Find the Cartesian equations of the two invariant lines through the origin. (3 steps)", "answer": "- Step 1: For eigenvalue 3, solve (A - 3I)v = 0. This gives the direction of one invariant line.\n\n- Step 2: For eigenvalue -1, solve (A + I)v = 0. This gives the direction of the other invariant line.\n\n- Step 3: Each eigenvector defines an invariant line through the origin. The line's direction is given by the eigenvector components. If eigenvector for λ = 3 is (5, 1), the line is y = (1/5)x.\n\nThese lines are mapped to themselves (though points move along them, except at origin).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Why do complex eigenvalues occur in real matrices, and what do they represent geometrically?", "answer": "When solving the characteristic equation, you may get complex roots like 2 ± 3i. These occur in conjugate pairs for real matrices. Geometrically, they represent a rotation in the plane! A real matrix with complex eigenvalues acts as a rotation combined with scaling (a \"rotation-dilation\"). Points don't simply stretch or compress - they spiral around the origin. This is essential in analyzing 2D systems that exhibit rotational behavior (like oscillations).", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": true}, {"question": "What is an orthogonal matrix? How can you verify if a matrix is orthogonal? (2 steps)", "answer": "- Step 1: A square matrix M is orthogonal if MM^T = I (equivalently, M^T = M⁻¹).\n\n- Step 2: This means the columns (and rows) are mutually orthogonal unit vectors. Geometrically, an orthogonal matrix represents a rotation or reflection (a distance-preserving transformation). To verify, multiply M by its transpose - you should get the identity matrix.\n\nFor example, $$\\begin{pmatrix}cos θ & -sin θ \\\\ sin θ & cos θ\\end{pmatrix}$$ is orthogonal (rotation by θ).", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Describe the process for reducing a symmetric matrix A to diagonal form D = P^T AP. (4 steps)", "answer": "- Step 1: Find the eigenvalues of A from the characteristic equation.\n\n- Step 2: For each eigenvalue, find a normalised eigenvector. Since A is symmetric, eigenvectors for distinct eigenvalues are automatically orthogonal.\n\n- Step 3: Form matrix P using these normalised eigenvectors as columns (in any order).\n\n- Step 4: Compute D = P^T AP. The diagonal elements of D are the eigenvalues (in the same order as eigenvectors in P). Since P is orthogonal, P^T = P⁻¹, so D = P⁻¹AP also works.\n\nThe matrix P represents the change of basis to the eigenvector coordinate system.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A symmetric matrix has eigenvalues 1, 3, and 5 with normalised eigenvectors x₁, x₂, x₃. What is the trace of A? How does this relate to the eigenvalues? (2 steps)", "answer": "- Step 1: The trace of a matrix is the sum of its diagonal elements. For a symmetric matrix diagonalised by P^T AP = D, we have tr(D) = tr(P^T AP) = tr(APP^T) = tr(A).\n\n- Step 2: Since D is diagonal with eigenvalues on the diagonal, tr(D) = 1 + 3 + 5 = 9. Therefore tr(A) = 9. In general, the trace equals the sum of eigenvalues (with multiplicities). This is true for ALL matrices, not just symmetric ones.\n\nThis provides a quick check on eigenvalue calculations.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": true}, {"question": "If you know that (AB)^T = B^T A^T, explain why this identity is always true, while (AB)^(-1) = B^(-1)A^(-1) requires non-singularity.", "answer": "The transpose identity (AB)^T = B^T A^T holds for any matrices where AB exists because it's a property of how matrix multiplication works element-wise. It doesn't require any conditions on the matrices.\n\nHowever, the inverse identity (AB)^(-1) = B^(-1)A^(-1) requires A and B to be non-singular (invertible). If either A or B is singular (det = 0), then AB may also be singular, and the inverse doesn't exist. The inverse property fails because division by zero would be needed. In essence, transpose always exists, but inverse only exists for non-singular matrices.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "A matrix A satisfies A² = I. What can you conclude about A^-1? Give an example of such a matrix.", "answer": "- Step 1: If A² = I, then AA = I. By definition of inverse, A × A = I means A^-1 = A. The matrix is its own inverse!\n\n- Step 2: Examples include the identity matrix I (trivially), and reflection matrices. For instance, $$\\begin{pmatrix}0 & 1 \\\\ 1 & 0\\end{pmatrix}$$ squares to identity (it swaps x and y coordinates, doing it twice returns to original). Also $$\\begin{pmatrix}1 & 0 \\\\ 0 & -1\\end{pmatrix}$$ reflects in the x-axis: applying twice gives identity.\n\nThese are orthogonal matrices with eigenvalues ±1.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Find the inverse of the 3×3 matrix $$\\begin{pmatrix}1 & 3 & 1 \\\\ 0 & 4 & 1 \\\\ 2 & -1 & 0\\end{pmatrix}$$. Use the 5-step method. (5 steps)", "answer": "- Step 1: det = 1×(4×0 - 1×(-1)) - 3×(0×0 - 1×2) + 1×(0×(-1) - 4×2) = 1×1 - 3×(-2) + 1×(-8) = 1 + 6 - 8 = -1\n\n- Step 2: Matrix of minors M = $$\\begin{pmatrix}1 & -2 & -8 \\\\ 1 & -2 & -7 \\\\ -1 & 1 & 4\\end{pmatrix}$$\n\n- Step 3: Cofactor matrix C = $$\\begin{pmatrix}1 & 2 & -8 \\\\ -1 & -2 & 7 \\\\ -1 & -1 & 4\\end{pmatrix}$$ (apply alternating signs)\n\n- Step 4: C^T = $$\\begin{pmatrix}1 & -1 & -1 \\\\ 2 & -2 & -1 \\\\ -8 & 7 & 4\\end{pmatrix}$$\n\n- Step 5: A^-1 = (1/det)×C^T = -1 × C^T = $$\\begin{pmatrix}-1 & 1 & 1 \\\\ -2 & 2 & 1 \\\\ 8 & -7 & -4\\end{pmatrix}$$", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Prove that det(AB) = det(A)det(B) for square matrices. What does this imply about singular matrices?", "answer": "This is a fundamental property of determinants. If A or B is singular (det = 0), then det(AB) = det(A)det(B) = 0, so AB is also singular. Conversely, if both are non-singular, AB is non-singular. This means:\n- A singular matrix cannot have an inverse\n- The product of singular matrices is singular\n- The determinant of a product equals the product of determinants\n\nThis property is essential for understanding why the characteristic polynomial works and how eigenvalues multiply.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A transformation T is represented by matrix M. The line through origin with direction (1, 1, 1) is mapped to itself. What does this tell you about (1, 1, 1)?", "answer": "If the line through origin is invariant, then every point on it maps to another point on the same line. This means the direction vector is an eigenvector! Specifically, M(1,1,1) = λ(1,1,1) for some scalar λ. The eigenvalue λ tells you what happens to points on this line: if λ = 1, points stay fixed; if λ > 1, points move outward; if 0 < λ < 1, points move toward origin; if λ < 0, points reverse direction.\n\nThis is how you find invariant lines under linear transformations.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "For a symmetric matrix, explain why eigenvectors corresponding to distinct eigenvalues are orthogonal. (2 steps)", "answer": "- Step 1: Let Ax = λx and Ay = μy with λ ≠ μ. Consider x^T Ay = x^T(μy) = μ(x·y). But also x^T Ay = (x^TA)y = (Ax)^Ty = (λx)^Ty = λ(x·y).\n\n- Step 2: Therefore μ(x·y) = λ(x·y), so (μ - λ)(x·y) = 0. Since μ ≠ λ, we must have x·y = 0. Two non-zero eigenvectors with different eigenvalues are always orthogonal!\n\nThis is a key property that makes diagonalising symmetric matrices possible with orthogonal matrices.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A matrix A has eigenvalues 2, 3, and 5. What is det(A)? What is tr(A)? Explain your reasoning.", "answer": "- The determinant equals the product of eigenvalues: det(A) = 2 × 3 × 5 = 30. This is because det(A) = λ₁λ₂λ₃ when eigenvalues are λ₁, λ₂, λ₃.\n\n- The trace (sum of diagonal elements) equals the sum of eigenvalues: tr(A) = 2 + 3 + 5 = 10. This holds for ALL matrices.\n\nThese relationships provide useful checks when finding eigenvalues by solving the characteristic equation.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Two matrices A and B represent the same linear transformation but in different coordinate systems. What matrix relationship connects them?", "answer": "If P is the change-of-basis matrix (from one coordinate system to another), then B = P⁻¹AP. The matrices A and B are similar - they represent the same transformation viewed from different bases. Key properties (determinant, trace, eigenvalues) are preserved: det(B) = det(A), tr(B) = tr(A), and both have the same eigenvalues. For symmetric matrices, we can diagonalise: D = P^T AP where P is orthogonal (since symmetric matrices can be diagonalised by orthogonal matrices).", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": true}, {"question": "What is wrong with this statement: \"For any matrix A, (A^T)^-1 = (A^-1)^T\"? Is it ever false?", "answer": "This statement is actually CORRECT! For any invertible matrix A: (A^T)^-1 = (A^-1)^T. To verify: A^T × (A^-1)^T = (A^-1 A)^T = I^T = I. Both sides multiply to identity, so they're equal. This holds for ALL invertible matrices, not just special cases. It's a fundamental property linking transpose and inverse operations.\n\nThis is useful because if you need (A^T)^-1, you can compute A^-1 and transpose it instead.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": true}, {"question": "A 3×3 matrix has determinant 0 and rank 2. What does this tell you about its eigenvalues?", "answer": "- Since det = 0, one eigenvalue is 0 (because product of eigenvalues = det = 0).\n\n- The other two eigenvalues are non-zero (since rank 2 means 2 linearly independent rows/columns, so 2 pivots, meaning 2 non-zero eigenvalues).\n\n- For example, eigenvalues might be 0, 3, -2. The zero eigenvalue corresponds to the \"collapsed\" direction - vectors in that direction get mapped to zero. The transformation squashes space onto a plane.\n\nThis connects rank, nullity, and eigenvalues: nullity = dimension of eigenspace for λ = 0.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "How would you use a matrix inverse to find the point that maps to (2, 5, 3) under transformation with matrix $$\\begin{pmatrix}1 & 0 & 2 \\\\ 0 & 2 & 0 \\\\ 1 & 0 & 1\\end{pmatrix}$$? (3 steps)", "answer": "- Step 1: We need x such that Tx = (2,5,3). So x = T^-1(2,5,3).\n\n- Step 2: Find T^-1 using the 5-step method. det(T) = 1×(2×1 - 0×0) - 0×(...) + 2×(0×0 - 2×1) = 2 - 4 = -2.\n\n- Step 3: After computing minors, cofactors, and transposing: T^-1 = $$\\begin{pmatrix}-1 & 0 & 2 \\\\ 0 & 1/2 & 0 \\\\ 1 & 0 & -1\\end{pmatrix}$$. Then x = T^-1(2,5,3) = (-2+0+6, 0+2.5+0, 2+0-3) = (4, 2.5, -1).\n\nThe original point was (4, 2.5, -1).", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A symmetric matrix A is diagonalised by orthogonal matrix P: P^T AP = D. What special properties do P and D have?", "answer": "- P is orthogonal: P^T = P^-1. Its columns are mutually orthogonal unit vectors (normalised eigenvectors of A).\n\n- D is diagonal: D = diag(λ₁, λ₂, λ₃) where λᵢ are the eigenvalues of A. The i-th column of P corresponds to the i-th eigenvalue in D.\n\n- Since P is orthogonal, P^-1 = P^T. This makes the diagonalisation computationally simpler.\n\n- The matrix A can be written as A = PDP^T where D is diagonal. This is the spectral decomposition: A = λ₁v₁v₁^T + λ₂v₂v₂^T + λ₃v₃v₃^T where vᵢ are the normalised eigenvectors.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "When reducing a 3×3 symmetric matrix to diagonal form, what should you do if you get repeated eigenvalues? How does this affect the orthogonal matrix P?", "answer": "- With repeated eigenvalues (e.g., λ = 5, 5, 3), you need to find linearly independent eigenvectors for the repeated eigenvalue. There will be a whole plane of eigenvectors for λ = 5.\n\n- You then use any two orthogonal unit vectors from that eigenspace (they must be orthogonal to each other AND to the eigenvector for λ = 3).\n\n- Gram-Schmidt orthogonalisation can be used if your initially found eigenvectors aren't orthogonal. The key is: columns of P must be mutually orthogonal (for the diagonalisation to work with P^T rather than P^-1).\n\nEven with repeated eigenvalues, you can always find three mutually orthogonal eigenvectors for a symmetric matrix.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": true}, {"question": "A matrix M satisfies MM^T = kI for some scalar k. What type of matrix is M? What does this mean about its columns?", "answer": "- If MM^T = kI (not necessarily k=1), M is a scaled orthogonal matrix (sometimes called a conformal matrix). If k = 1, M is orthogonal.\n\n- The columns of M are orthogonal to each other, but each has magnitude √k. If you divide M by √k, you get an orthogonal matrix.\n\n- This is useful because M preserves angles but scales lengths by √k. Geometrically, it's a rotation combined with uniform scaling.\n\nThis property appears in problems involving reflections and rotations in higher dimensions.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": true}, {"question": "If you apply transformation T (matrix T) to a plane, how can you find the image plane's equation? (3 steps)", "answer": "- Step 1: Write the plane in parametric form: r = a + su + tv, where a is a point on the plane, u and v are direction vectors.\n\n- Step 2: Apply T to this: r' = T(a) + sT(u) + tT(v). This is the parametric equation of the image plane.\n\n- Step 3: To find Cartesian form, find a normal vector by crossing the transformed direction vectors: n' = T(u) × T(v). Then the plane equation is n' · (r - T(a)) = 0.\n\nThe transformation preserves (or collapses) planes - it never creates a curved surface!", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": true}, {"question": "The matrix of cofactors C for a matrix A is given. Without full calculation, how would you find A^-1?", "answer": "The inverse formula is A^-1 = (1/det(A)) × C^T. Given C (the matrix of cofactors), you just need det(A) and then transpose C. However, a key insight: For any matrix A, A × C^T = det(A) × I. This is always true! So if you have C^T, you can find det(A) from any diagonal element: for example, (AC^T)₁₁ = det(A). Then divide C^T by det(A) to get A^-1.\n\nThis provides a quick verification method.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A linear transformation T in 3D has only one invariant line through the origin. What does this imply about its eigenvalues?", "answer": "- If there's only ONE invariant line, the transformation doesn't preserve any other directions. This typically happens when there's a single real eigenvalue and two complex conjugate eigenvalues (which represent rotation, not invariant lines).\n\n- The real eigenvalue corresponds to the one invariant line direction. The complex eigenvalues correspond to a rotation in the plane perpendicular to that line - no directions in that plane are invariant.\n\n- Alternatively, all three eigenvalues could be real but with only one having a 1D eigenspace while the other two are \"defective\" (not enough independent eigenvectors).\n\nThis happens in many practical systems like rotating systems with damping.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "If P is an orthogonal matrix, prove that det(P) = ±1. What does each case represent?", "answer": "- Since P is orthogonal: P^T P = I. Taking determinants: det(P^T)det(P) = det(I) = 1. But det(P^T) = det(P), so [det(P)]² = 1.\n\n- Therefore det(P) = 1 or det(P) = -1.\n\n- det(P) = +1: P is a pure rotation (orientation-preserving). Example: rotation matrices.\n\n- det(P) = -1: P includes a reflection (orientation-reversing). Example: reflection matrices, or rotation followed by reflection.\n\nThis is why orthogonal matrices represent rigid motions - they preserve distances and angles.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "A matrix has eigenvalues 1 and 2 with eigenvectors (1,0,0) and (0,1,0) respectively. What is one possible eigenvalue and eigenvector for the third dimension? Explain your reasoning.", "answer": "The third eigenvalue could be any λ, and the eigenvector must be orthogonal to both (1,0,0) and (0,1,0), so it must be of form (0,0,1) times any scalar (any vector along the z-axis). However, for a symmetric matrix, the third eigenvector MUST be orthogonal to the first two. If the matrix is NOT specified as symmetric, the third eigenvector could be any vector that is linearly independent of the first two - it doesn't have to be orthogonal. The symmetry condition guarantees orthogonality of eigenvectors.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": true}, {"question": "Prove that similar matrices have the same eigenvalues. (2 steps)", "answer": "- Step 1: Let B = P^-1AP, so A and B are similar. Let λ be an eigenvalue of B with eigenvector v: Bv = λv.\n\n- Step 2: Then P^-1AP v = λv, so A(Pv) = λ(Pv). This means λ is also an eigenvalue of A, with eigenvector Pv.\n\nSince similar matrices represent the same linear transformation in different bases, they must have the same intrinsic properties - eigenvalues are intrinsic, not basis-dependent.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": true}, {"question": "What is the Cayley-Hamilton theorem? How could you use it to find A^-1?", "answer": "The Cayley-Hamilton theorem states that every square matrix satisfies its own characteristic equation. For a 2×2 matrix A with characteristic polynomial λ² - tr(A)λ + det(A) = 0, we have A² - tr(A)A + det(A)I = 0. Rearranging: A² - tr(A)A = -det(A)I. If det(A) ≠ 0, multiply by A^-1: A - tr(A)I = -det(A)A^-1, so A^-1 = (tr(A)I - A)/det(A). This gives a formula for inverse without the cofactor matrix method!", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": true}, {"question": "A matrix A satisfies A³ = I. What are the possible eigenvalues of A? (2 steps)", "answer": "- Step 1: If λ is an eigenvalue of A with eigenvector v, then A³v = λ³v. But A³v = Iv = v, so λ³ = 1.\n\n- Step 2: The solutions to λ³ = 1 are λ = 1, λ = e^(2πi/3) = -1/2 + i√3/2, or λ = e^(4πi/3) = -1/2 - i√3/2. For real matrices, complex eigenvalues come in conjugate pairs. So the real eigenvalue must be λ = 1. The other two (if present) are complex conjugates.\n\nThis explains why rotation matrices of order 3 (rotate by 120°) have eigenvalues 1, ω, ω².", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": true}, {"question": "Explain why the matrix of cofactors for a singular matrix multiplied by its transpose gives the zero matrix: AC^T = 0.", "answer": "- For any square matrix A, the adjugate (adj(A) = C^T) satisfies A × adj(A) = det(A) × I.\n\n- If A is singular, det(A) = 0, so A × adj(A) = 0. This means every column of adj(A) is in the nullspace of A.\n\n- Since adj(A) = C^T, this means AC^T = 0. The columns of C^T (rows of C) are orthogonal to the row space of A.\n\nThis is a useful check: for singular matrices, AC^T should be zero.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": true}, {"question": "A transformation T in 3D is represented by a singular matrix. Can it still map a plane to a line? Explain.", "answer": "YES! A singular matrix has determinant zero, meaning it collapses at least one dimension. This can indeed map a plane to a line. For example, projection onto the xy-plane (matrix with third row all zeros) maps the entire z-axis to the origin, and any plane not parallel to z maps to a line in the xy-plane. More generally: under a singular transformation, the image of an n-dimensional subspace has dimension at most n-1. A plane (2D) can collapse to a line (1D) or point (0D).", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": true}, {"question": "What conditions must be satisfied for a matrix to be diagonalizable by an orthogonal matrix?", "answer": "The matrix must be symmetric (or more generally, normal: AA^T = A^T A). For symmetric matrices: 1) All eigenvalues are real, 2) There exist enough eigenvectors to form a basis (always true for symmetric), 3) Eigenvectors for distinct eigenvalues are automatically orthogonal. Even with repeated eigenvalues, you can always find a full set of mutually orthogonal eigenvectors. Therefore: symmetric ⇨ orthogonally diagonalizable. This is not true for non-symmetric matrices - they may not be diagonalizable at all, or may require non-orthogonal P.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": true}, {"question": "Two different matrices A and B have the same eigenvalues with the same eigenvectors. What can you conclude about A and B?", "answer": "If A and B share all eigenvalues and the same complete set of eigenvectors, then A = B. More generally, if they share eigenvalues and eigenvectors (forming a basis), they're the same transformation. However, be careful: different matrices can have the same eigenvalues but be different (e.g., $$\\begin{pmatrix}1 & 1 \\\\ 0 & 1\\end{pmatrix}$$ and $$\\begin{pmatrix}1 & 0 \\\\ 0 & 1\\end{pmatrix}$$ both have eigenvalue 1, but aren't equal). They need the SAME eigenvectors to be equal.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": true}, {"question": "How do you find the power of a matrix using diagonalisation? Explain the process.", "answer": "- If A = PDP^T where D is diagonal with eigenvalues λ₁, λ₂, λ₃ on diagonal, then A² = (PDP^T)(PDP^T) = PD(P^TP)DP^T = PD²P^T.\n\n- In general, A^n = PD^nP^n = PD^nP^T (since orthogonal: P^T = P^-1). D^n is just diagonal with λᵢ^n.\n\nThis is much easier than repeated matrix multiplication! Example: for eigenvalues 2, -1, 3, A¹⁰ has eigenvalues 2¹⁰ = 1024, (-1)¹⁰ = 1, and 3¹⁰ = 59049.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": true}], "count": 49}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What condition must hold for a square matrix to be classified as symmetric? Give the general form of a $3 \\times 3$ symmetric matrix. (1 step)", "answer": "- A square matrix $\\mathbf{A}$ is symmetric if and only if $\\mathbf{A} = \\mathbf{A}^{\\top}$ (the matrix equals its transpose).\n\n- The general $3 \\times 3$ symmetric matrix has the form:\n$$\\mathbf{A} = \\begin{pmatrix} a & b & c \\\\ b & d & e \\\\ c & e & f \\end{pmatrix}$$\nwhere elements symmetric about the main diagonal are equal: $a_{12} = a_{21} = b$, $a_{13} = a_{31} = c$, and $a_{23} = a_{32} = e$.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Given $\\mathbf{M} = \\begin{pmatrix} 3 & 2 \\\\ 1 & -2 \\\\ 4 & 0 \\end{pmatrix}$, find $\\mathbf{M}^{\\top}\\mathbf{M}$ and state its dimension. (2 steps)", "answer": "- Step 1: First find $\\mathbf{M}^{\\top}$:\n$$\\mathbf{M}^{\\top} = \\begin{pmatrix} 3 & 1 & 4 \\\\ 2 & -2 & 0 \\end{pmatrix}$$\n\n- Step 2: Now compute $\\mathbf{M}^{\\top}\\mathbf{M}$:\n$$\\mathbf{M}^{\\top}\\mathbf{M} = \\begin{pmatrix} 3 & 1 & 4 \\\\ 2 & -2 & 0 \\end{pmatrix} \\begin{pmatrix} 3 & 2 \\\\ 1 & -2 \\\\ 4 & 0 \\end{pmatrix} = \\begin{pmatrix} 26 & 4 \\\\ 4 & 8 \\end{pmatrix}$$\n\nThe dimension of $\\mathbf{M}^{\\top}\\mathbf{M}$ is $2 \\times 2$.\n\nNote: $\\mathbf{MM}^{\\top}$ would be a $3 \\times 3$ matrix.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Verify the identity $(\\mathbf{AB})^{\\top} = \\mathbf{B}^{\\top}\\mathbf{A}^{\\top}$ for $\\mathbf{A} = \\begin{pmatrix} 3 & 0 & 2 \\\\ -2 & 1 & 0 \\\\ 1 & -2 & 4 \\end{pmatrix}$ and $\\mathbf{B} = \\begin{pmatrix} 1 & 0 & 4 \\\\ 0 & 2 & 0 \\\\ 2 & 0 & 1 \\end{pmatrix}$. What property do both products have? (3 steps)", "answer": "- Step 1: Compute $\\mathbf{AB}$:\n$$\\mathbf{AB} = \\begin{pmatrix} 7 & 0 & 14 \\\\ -2 & 2 & -8 \\\\ 9 & -4 & 8 \\end{pmatrix}$$\n\n- Step 2: Find $(\\mathbf{AB})^{\\top}$:\n$$(\\mathbf{AB})^{\\top} = \\begin{pmatrix} 7 & -2 & 9 \\\\ 0 & 2 & -4 \\\\ 14 & -8 & 8 \\end{pmatrix}$$\n\n- Step 3: Compute $\\mathbf{B}^{\\top}\\mathbf{A}^{\\top}$:\n$$\\mathbf{B}^{\\top}\\mathbf{A}^{\\top} = \\begin{pmatrix} 1 & 0 & 2 \\\\ 0 & 2 & 0 \\\\ 4 & 0 & 1 \\end{pmatrix} \\begin{pmatrix} 3 & -2 & 1 \\\\ 0 & 1 & -2 \\\\ 2 & 0 & 4 \\end{pmatrix} = \\begin{pmatrix} 7 & -2 & 9 \\\\ 0 & 2 & -4 \\\\ 14 & -8 & 8 \\end{pmatrix}$$\n\nSince $(\\mathbf{AB})^{\\top} = \\mathbf{B}^{\\top}\\mathbf{A}^{\\top}$, both are equal. Note that both $\\mathbf{M}^{\\top}\\mathbf{M}$ and $\\mathbf{MM}^{\\top}$ are symmetric matrices for any matrix $\\mathbf{M}$.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Using the cofactor expansion method, find the determinant of $\\begin{pmatrix} 1 & 2 & 4 \\\\ 3 & 2 & 1 \\\\ -1 & 4 & 3 \\end{pmatrix}$. (3 steps)", "answer": "- Step 1: Apply the formula:\n$$\\det(\\mathbf{A}) = a\\begin{vmatrix} e & f \\\\ h & i \\end{vmatrix} - b\\begin{vmatrix} d & f \\\\ g & i \\end{vmatrix} + c\\begin{vmatrix} d & e \\\\ g & h \\end{vmatrix}$$\n\nFor our matrix:\n$$= 1\\begin{vmatrix} 2 & 1 \\\\ 4 & 3 \\end{vmatrix} - 2\\begin{vmatrix} 3 & 1 \\\\ -1 & 3 \\end{vmatrix} + 4\\begin{vmatrix} 3 & 2 \\\\ -1 & 4 \\end{vmatrix}$$\n\n- Step 2: Evaluate each $2 \\times 2$ determinant:\n$$\\begin{vmatrix} 2 & 1 \\\\ 4 & 3 \\end{vmatrix} = 2(3) - 1(4) = 6 - 4 = 2$$\n$$\\begin{vmatrix} 3 & 1 \\\\ -1 & 3 \\end{vmatrix} = 3(3) - 1(-1) = 9 + 1 = 10$$\n$$\\begin{vmatrix} 3 & 2 \\\\ -1 & 4 \\end{vmatrix} = 3(4) - 2(-1) = 12 + 2 = 14$$\n\n- Step 3: Combine:\n$$= 1(2) - 2(10) + 4(14) = 2 - 20 + 56 = 38$$", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A matrix $\\mathbf{A} = \\begin{pmatrix} 3 & k & 0 \\\\ -2 & 1 & 2 \\\\ 5 & 0 & k+3 \\end{pmatrix}$ is singular. Find the possible values of $k$. (3 steps)", "answer": "- Step 1: Compute the determinant using first row expansion:\n$$\\det(\\mathbf{A}) = 3\\begin{vmatrix} 1 & 2 \\\\ 0 & k+3 \\end{vmatrix} - k\\begin{vmatrix} -2 & 2 \\\\ 5 & k+3 \\end{vmatrix} + 0$$\n\n$$= 3(1(k+3) - 2(0)) - k((-2)(k+3) - 2(5))$$\n\n- Step 2: Simplify:\n$$= 3(k+3) - k(-2k - 6 - 10)$$\n$$= 3k + 9 + 2k^2 + 16k$$\n$$= 2k^2 + 19k + 9$$\n\n- Step 3: For singularity, set determinant = 0:\n$$2k^2 + 19k + 9 = 0$$\n$$(2k + 1)(k + 9) = 0$$\n\nTherefore, $k = -\\frac{1}{2}$ or $k = -9$", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "State the relationship between the determinant of a matrix product and the determinants of the individual matrices. If $\\det(\\mathbf{A}) = -35$ and $\\det(\\mathbf{B}) = 2$, find $\\det(\\mathbf{AB})$. (2 steps)", "answer": "- Step 1: For any two square matrices $\\mathbf{A}$ and $\\mathbf{B}$ of the same size:\n$$\\det(\\mathbf{AB}) = \\det(\\mathbf{A}) \\times \\det(\\mathbf{B})$$\n\n- Step 2: Substituting the given values:\n$$\\det(\\mathbf{AB}) = (-35) \\times 2 = -70$$\n\nThis property extends to any number of matrices: $\\det(\\mathbf{A}_1\\mathbf{A}_2...\\mathbf{A}_n) = \\det(\\mathbf{A}_1)\\det(\\mathbf{A}_2)...\\det(\\mathbf{A}_n)$.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Explain what is meant by a minor of an element in a $3 \\times 3$ matrix, and find the minors of the elements 5 and 7 in the matrix $\\begin{pmatrix} 5 & 0 & 2 \\\\ -1 & 8 & 1 \\\\ 6 & 7 & 3 \\end{pmatrix}$. (2 steps)", "answer": "- Step 1: The minor of an element in a $3 \\times 3$ matrix is the determinant of the $2 \\times 2$ submatrix remaining when the row and column containing that element are crossed out.\n\n- Step 2: For element 5 (position row 1, column 1):\nCross out row 1 and column 1 → remaining elements form $\\begin{pmatrix} 8 & 1 \\\\ 7 & 3 \\end{pmatrix}$\nMinor = $8(3) - 1(7) = 24 - 7 = 17$\n\nFor element 7 (position row 3, column 2):\nCross out row 3 and column 2 → remaining elements form $\\begin{pmatrix} 5 & 2 \\\\ -1 & 1 \\end{pmatrix}$\nMinor = $5(1) - 2(-1) = 5 + 2 = 7$", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Find the inverse of $\\mathbf{A} = \\begin{pmatrix} 1 & 3 & 1 \\\\ 0 & 4 & 1 \\\\ 2 & -1 & 0 \\end{pmatrix}$ using the five-step method. (5 steps)", "answer": "- Step 1 (Find determinant):\n$$\\det(\\mathbf{A}) = 1\\begin{vmatrix} 4 & 1 \\\\ -1 & 0 \\end{vmatrix} - 3\\begin{vmatrix} 0 & 1 \\\\ 2 & 0 \\end{vmatrix} + 1\\begin{vmatrix} 0 & 4 \\\\ 2 & -1 \\end{vmatrix}$$\n$$= 1(0+1) - 3(0-2) + 1(0-8) = 1 + 6 - 8 = -1$$\n\n- Step 2 (Matrix of minors):\n$$\\mathbf{M} = \\begin{pmatrix} 1 & -2 & -8 \\\\ 1 & -2 & -7 \\\\ -1 & 1 & 4 \\end{pmatrix}$$\n\n- Step 3 (Matrix of cofactors): Apply alternating signs pattern $\\begin{pmatrix} + & - & + \\\\ - & + & - \\\\ + & - & + \\end{pmatrix}$:\n$$\\mathbf{C} = \\begin{pmatrix} 1 & 2 & -8 \\\\ -1 & -2 & 7 \\\\ -1 & -1 & 4 \\end{pmatrix}$$\n\n- Step 4 (Transpose of cofactor matrix):\n$$\\mathbf{C}^{\\top} = \\begin{pmatrix} 1 & -1 & -1 \\\\ 2 & -2 & -1 \\\\ -8 & 7 & 4 \\end{pmatrix}$$\n\n- Step 5 (Compute inverse):\n$$\\mathbf{A}^{-1} = \\frac{1}{\\det(\\mathbf{A})}\\mathbf{C}^{\\top} = \\frac{1}{-1}\\mathbf{C}^{\\top} = \\begin{pmatrix} -1 & 1 & 1 \\\\ -2 & 2 & 1 \\\\ 8 & -7 & -4 \\end{pmatrix}$$", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Prove that for non-singular matrices $\\mathbf{A}$ and $\\mathbf{B}$, $(\\mathbf{AB})^{-1} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$. (3 steps)", "answer": "- Step 1: Let $\\mathbf{P} = (\\mathbf{AB})^{-1}$. By definition of inverse: $(\\mathbf{AB})\\mathbf{P} = \\mathbf{I}$\n\n- Step 2: Multiply on the left by $\\mathbf{A}^{-1}$:\n$$\\mathbf{A}^{-1}\\mathbf{ABP} = \\mathbf{A}^{-1}\\mathbf{I}$$\n$$\\mathbf{IBP} = \\mathbf{A}^{-1}$$\n$$\\mathbf{BP} = \\mathbf{A}^{-1}$$\n\n- Step 3: Multiply on the left by $\\mathbf{B}^{-1}$:\n$$\\mathbf{B}^{-1}\\mathbf{BP} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$\n$$\\mathbf{IP} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$\n\nTherefore, $\\mathbf{P} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$, proving $(\\mathbf{AB})^{-1} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$.\n\nThis is analogous to the transpose property $(\\mathbf{AB})^{\\top} = \\mathbf{B}^{\\top}\\mathbf{A}^{\\top}$.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Given $\\mathbf{A} = \\begin{pmatrix} -2 & 3 & -3 \\\\ 0 & 1 & 0 \\\\ 1 & -1 & 2 \\end{pmatrix}$, show that $\\mathbf{A}^{-1} = \\mathbf{A}$ and find $\\mathbf{B}^{-1}$ given that $(\\mathbf{AB})^{-1} = \\begin{pmatrix} 8 & -17 & 9 \\\\ -5 & 10 & -6 \\\\ -3 & 5 & -4 \\end{pmatrix}$. (3 steps)", "answer": "- Step 1: Compute $\\mathbf{A}^2$:\n$$\\mathbf{A}^2 = \\begin{pmatrix} -2 & 3 & -3 \\\\ 0 & 1 & 0 \\\\ 1 & -1 & 2 \\end{pmatrix}\\begin{pmatrix} -2 & 3 & -3 \\\\ 0 & 1 & 0 \\\\ 1 & -1 & 2 \\end{pmatrix} = \\begin{pmatrix} 1 & 0 & 0 \\\\ 0 & 1 & 0 \\\\ 0 & 0 & 1 \\end{pmatrix} = \\mathbf{I}$$\n\n- Step 2: Since $\\mathbf{A}^2 = \\mathbf{I}$, comparing with $\\mathbf{AA}^{-1} = \\mathbf{I}$, we have $\\mathbf{A}^{-1} = \\mathbf{A}$.\n\n- Step 3: Using $(\\mathbf{AB})^{-1} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$, multiply on the right by $\\mathbf{A}$:\n$$\\mathbf{B}^{-1} = (\\mathbf{AB})^{-1}\\mathbf{A} = \\begin{pmatrix} 8 & -17 & 9 \\\\ -5 & 10 & -6 \\\\ -3 & 5 & -4 \\end{pmatrix}\\begin{pmatrix} -2 & 3 & -3 \\\\ 0 & 1 & 0 \\\\ 1 & -1 & 2 \\end{pmatrix} = \\begin{pmatrix} -7 & -2 & -6 \\\\ 4 & 1 & 3 \\\\ 2 & 0 & 1 \\end{pmatrix}$$", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A linear transformation $T$ in three dimensions maps a point with position vector $\\begin{pmatrix} x \\\\ y \\\\ z \\end{pmatrix}$ to $\\begin{pmatrix} x+z \\\\ y \\\\ x+2y+z \\end{pmatrix}$. Find the $3 \\times 3$ matrix representing this transformation. (2 steps)", "answer": "- Step 1: Consider the images of basis vectors:\n$$T\\begin{pmatrix} 1 \\\\ 0 \\\\ 0 \\end{pmatrix} = \\begin{pmatrix} 1 \\\\ 0 \\\\ 1 \\end{pmatrix}, \\quad T\\begin{pmatrix} 0 \\\\ 1 \\\\ 0 \\end{pmatrix} = \\begin{pmatrix} 0 \\\\ 1 \\\\ 2 \\end{pmatrix}, \\quad T\\begin{pmatrix} 0 \\\\ 0 \\\\ 1 \\end{pmatrix} = \\begin{pmatrix} 1 \\\\ 0 \\\\ 1 \\end{pmatrix}$$\n\n- Step 2: The columns of the transformation matrix are these images:\n$$\\mathbf{T} = \\begin{pmatrix} 1 & 0 & 1 \\\\ 0 & 1 & 0 \\\\ 1 & 2 & 1 \\end{pmatrix}$$\n\nThe first column is the image of $(1,0,0)$, the second column is the image of $(0,1,0)$, and the third column is the image of $(0,0,1)$.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "The transformation $T$ is represented by matrix $\\mathbf{T} = \\begin{pmatrix} 3 & -2 & 1 \\\\ 1 & 3 & 4 \\\\ 2 & -1 & 1 \\end{pmatrix}$. The line $l_1$ has vector equation $\\mathbf{r} = \\begin{pmatrix} 2 \\\\ 0 \\\\ -3 \\end{pmatrix} + t\\begin{pmatrix} 3 \\\\ -2 \\\\ 1 \\end{pmatrix}$. Find a vector equation for the image line $l_2$. (3 steps)", "answer": "- Step 1: Write a general point on $l_1$:\n$$\\mathbf{r} = \\begin{pmatrix} 2 + 3t \\\\ -2t \\\\ -3 + t \\end{pmatrix}$$\n\n- Step 2: Apply transformation $\\mathbf{T}$:\n$$\\mathbf{r}' = \\mathbf{T}\\mathbf{r} = \\begin{pmatrix} 3 & -2 & 1 \\\\ 1 & 3 & 4 \\\\ 2 & -1 & 1 \\end{pmatrix}\\begin{pmatrix} 2 + 3t \\\\ -2t \\\\ -3 + t \\end{pmatrix} = \\begin{pmatrix} 14t + 3 \\\\ t - 10 \\\\ 9t + 1 \\end{pmatrix}$$\n\n- Step 3: Write in vector form:\n$$\\mathbf{r}' = \\begin{pmatrix} 3 \\\\ -10 \\\\ 1 \\end{pmatrix} + t\\begin{pmatrix} 14 \\\\ 1 \\\\ 9 \\end{pmatrix}$$\n\nThis is the vector equation of $l_2$.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Given that the inverse of $\\mathbf{T}$ is $\\mathbf{T}^{-1} = \\begin{pmatrix} -1 & 0 & 2 \\\\ 0 & \\frac{1}{2} & 0 \\\\ 1 & 0 & -1 \\end{pmatrix}$, find the original vector $\\begin{pmatrix} a \\\\ b \\\\ c \\end{pmatrix}$ that under transformation $\\mathbf{T}$ maps to $\\begin{pmatrix} -3 \\\\ 4 \\\\ 2 \\end{pmatrix}$. (2 steps)", "answer": "- Step 1: We have $\\mathbf{T}\\begin{pmatrix} a \\\\ b \\\\ c \\end{pmatrix} = \\begin{pmatrix} -3 \\\\ 4 \\\\ 2 \\end{pmatrix}$. To reverse, multiply both sides by $\\mathbf{T}^{-1}$:\n$$\\begin{pmatrix} a \\\\ b \\\\ c \\end{pmatrix} = \\mathbf{T}^{-1}\\begin{pmatrix} -3 \\\\ 4 \\\\ 2 \\end{pmatrix}$$\n\n- Step 2: Compute:\n$$\\begin{pmatrix} a \\\\ b \\\\ c \\end{pmatrix} = \\begin{pmatrix} -1 & 0 & 2 \\\\ 0 & \\frac{1}{2} & 0 \\\\ 1 & 0 & -1 \\end{pmatrix}\\begin{pmatrix} -3 \\\\ 4 \\\\ 2 \\end{pmatrix} = \\begin{pmatrix} 3 + 4 \\\\ 2 \\\\ -3 - 2 \\end{pmatrix} = \\begin{pmatrix} 7 \\\\ 2 \\\\ -5 \\end{pmatrix}$$\n\nSo $a = 7, b = 2, c = -5$.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Define what is meant by an eigenvalue and an eigenvector of a matrix. What is the geometric interpretation of an eigenvector under the transformation represented by that matrix? (1 step)", "answer": "- An eigenvector of a matrix $\\mathbf{A}$ is a non-zero column vector $\\mathbf{x}$ that satisfies $\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$, where $\\lambda$ is a scalar called the eigenvalue corresponding to that eigenvector.\n\n- Geometrically: Under the linear transformation represented by $\\mathbf{A}$, an eigenvector's direction remains unchanged (invariant), while its magnitude is scaled by the eigenvalue $\\lambda$. The eigenvalue can be interpreted as the magnification factor (scaling factor) of the eigenvector. If $\\lambda > 1$, the eigenvector is stretched; if $0 < \\lambda < 1$, it's compressed; if $\\lambda < 0$, the direction is reversed.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Find the eigenvalues and corresponding eigenvectors of $\\mathbf{A} = \\begin{pmatrix} 2 & 5 \\\\ -1 & -4 \\end{pmatrix}$. (4 steps)", "answer": "- Step 1: Find the characteristic equation:\n$$\\mathbf{A} - \\lambda\\mathbf{I} = \\begin{pmatrix} 2-\\lambda & 5 \\\\ -1 & -4-\\lambda \\end{pmatrix}$$\n$$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = (2-\\lambda)(-4-\\lambda) - 5(-1) = \\lambda^2 + 2\\lambda - 3 = 0$$\n$$(\\lambda - 1)(\\lambda + 3) = 0$$\n\nSo eigenvalues are $\\lambda = 1$ and $\\lambda = -3$.\n\n- Step 2: For $\\lambda = 1$:\n$$\\begin{pmatrix} 2 & 5 \\\\ -1 & -4 \\end{pmatrix}\\begin{pmatrix} x \\\\ y \\end{pmatrix} = \\begin{pmatrix} x \\\\ y \\end{pmatrix}$$\n$$2x + 5y = x \\Rightarrow x = -5y$$\nLet $y = 1$, then $x = -5$. Eigenvector: $\\begin{pmatrix} -5 \\\\ 1 \\end{pmatrix}$\n\n- Step 3: For $\\lambda = -3$:\n$$\\begin{pmatrix} 2 & 5 \\\\ -1 & -4 \\end{pmatrix}\\begin{pmatrix} x \\\\ y \\end{pmatrix} = \\begin{pmatrix} -3x \\\\ -3y \\end{pmatrix}$$\n$$2x + 5y = -3x \\Rightarrow 5x + 5y = 0 \\Rightarrow y = -x$$\nLet $x = 1$, then $y = -1$. Eigenvector: $\\begin{pmatrix} 1 \\\\ -1 \\end{pmatrix}$\n\n- Step 4: Any non-zero multiples of these eigenvectors are also valid.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Find the eigenvalues of $\\mathbf{A} = \\begin{pmatrix} 2 & 1 & -3 \\\\ 0 & 2 & 1 \\\\ 0 & -4 & -3 \\end{pmatrix}$ and find an eigenvector corresponding to $\\lambda = -2$. (4 steps)", "answer": "- Step 1: Form $\\mathbf{A} - \\lambda\\mathbf{I}$ and find its determinant:\n$$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = \\begin{vmatrix} 2-\\lambda & 1 & -3 \\\\ 0 & 2-\\lambda & 1 \\\\ 0 & -4 & -3-\\lambda \\end{vmatrix}$$\n\n$$= (2-\\lambda)\\begin{vmatrix} 2-\\lambda & 1 \\\\ -4 & -3-\\lambda \\end{vmatrix} = (2-\\lambda)((2-\\lambda)(-3-\\lambda) + 4)$$\n$$= (2-\\lambda)(-6 - 2\\lambda + 3\\lambda + \\lambda^2 + 4) = (2-\\lambda)(\\lambda^2 + \\lambda - 2)$$\n$$= (2-\\lambda)(\\lambda+2)(\\lambda-1)$$\n\nSo eigenvalues are $\\lambda = -2, 1, 2$.\n\n- Step 2: For $\\lambda = -2$, solve $\\mathbf{A}\\mathbf{x} = -2\\mathbf{x}$:\n$$\\begin{pmatrix} 2 & 1 & -3 \\\\ 0 & 2 & 1 \\\\ 0 & -4 & -3 \\end{pmatrix}\\begin{pmatrix} x \\\\ y \\\\ z \\end{pmatrix} = \\begin{pmatrix} -2x \\\\ -2y \\\\ -2z \\end{pmatrix}$$\n\n- Step 3: From middle equation: $2y + z = -2y \\Rightarrow z = -4y$\nFrom lowest equation: $-4y - 3z = -2z \\Rightarrow -4y = z$\n\n- Step 4: From top equation: $2x + y - 3z = -2x \\Rightarrow 4x = -y + 3z$\nSubstituting $z = -4y$: $4x = -y - 12y = -13y \\Rightarrow x = -\\frac{13}{4}y$\nLet $y = 1$, then $z = -4$, and $x = -\\frac{13}{4}$.\nEigenvector: $\\begin{pmatrix} -\\frac{13}{4} \\\\ 1 \\\\ -4 \\end{pmatrix}$ or any non-zero multiple.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "For $\\mathbf{A} = \\begin{pmatrix} 2 & -1 \\\\ -1 & 2 \\end{pmatrix}$, find the eigenvalues and corresponding normalised eigenvectors. (3 steps)", "answer": "- Step 1: Characteristic equation:\n$$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = \\begin{vmatrix} 2-\\lambda & -1 \\\\ -1 & 2-\\lambda \\end{vmatrix} = (2-\\lambda)^2 - 1 = \\lambda^2 - 4\\lambda + 3 = 0$$\n$$(\\lambda - 1)(\\lambda - 3) = 0 \\Rightarrow \\lambda = 1, 3$$\n\n- Step 2: For $\\lambda = 1$: $\\begin{pmatrix} 2 & -1 \\\\ -1 & 2 \\end{pmatrix}\\begin{pmatrix} x \\\\ y \\end{pmatrix} = \\begin{pmatrix} x \\\\ y \\end{pmatrix}$\n$2x - y = x \\Rightarrow x = y$. Eigenvector: $\\begin{pmatrix} 1 \\\\ 1 \\end{pmatrix}$, magnitude $\\sqrt{2}$.\nNormalised: $\\begin{pmatrix} \\frac{1}{\\sqrt{2}} \\\\ \\frac{1}{\\sqrt{2}} \\end{pmatrix}$\n\n- Step 3: For $\\lambda = 3$: $\\begin{pmatrix} 2 & -1 \\\\ -1 & 2 \\end{pmatrix}\\begin{pmatrix} x \\\\ y \\end{pmatrix} = \\begin{pmatrix} 3x \\\\ 3y \\end{pmatrix}$\n$2x - y = 3x \\Rightarrow y = -x$. Eigenvector: $\\begin{pmatrix} 1 \\\\ -1 \\end{pmatrix}$, magnitude $\\sqrt{2}$.\nNormalised: $\\begin{pmatrix} \\frac{1}{\\sqrt{2}} \\\\ -\\frac{1}{\\sqrt{2}} \\end{pmatrix}$", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "What is a normalised eigenvector? If $\\begin{pmatrix} -\\frac{1}{2} \\\\ -1 \\\\ 1 \\end{pmatrix}$ is an eigenvector of a matrix corresponding to eigenvalue $-2$, find a normalised eigenvector. (2 steps)", "answer": "- Step 1: A normalised eigenvector is a vector of unit magnitude (length 1) in the same direction as the original eigenvector. It is found by dividing each component by the magnitude of the vector.\n\n- Step 2: First find magnitude of $\\begin{pmatrix} -\\frac{1}{2} \\\\ -1 \\\\ 1 \\end{pmatrix}$:\n$$\\text{Magnitude} = \\sqrt{\\left(-\\frac{1}{2}\\right)^2 + (-1)^2 + 1^2} = \\sqrt{\\frac{1}{4} + 1 + 1} = \\sqrt{\\frac{9}{4}} = \\frac{3}{2}$$\n\nNormalise by multiplying by $\\frac{2}{3}$:\n$$\\begin{pmatrix} -\\frac{1}{2} \\\\ -1 \\\\ 1 \\end{pmatrix} \\times \\frac{2}{3} = \\begin{pmatrix} -\\frac{1}{3} \\\\ -\\frac{2}{3} \\\\ \\frac{2}{3} \\end{pmatrix}$$\n\nThe normalised eigenvector is $\\begin{pmatrix} -\\frac{1}{3} \\\\ -\\frac{2}{3} \\\\ \\frac{2}{3} \\end{pmatrix}$.\n\nNote: $\\begin{pmatrix} \\frac{1}{3} \\\\ \\frac{2}{3} \\\\ -\\frac{2}{3} \\end{pmatrix}$ is also valid (the negative of a normalised eigenvector is also normalised).", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Find the characteristic equation of $\\mathbf{A} = \\begin{pmatrix} 2 & 1 & 1 \\\\ 1 & 2 & 1 \\\\ 1 & 1 & 2 \\end{pmatrix}$ and show that $\\lambda = 1$ is an eigenvalue. (3 steps)", "answer": "- Step 1: Form $\\mathbf{A} - \\lambda\\mathbf{I}$:\n$$\\mathbf{A} - \\lambda\\mathbf{I} = \\begin{pmatrix} 2-\\lambda & 1 & 1 \\\\ 1 & 2-\\lambda & 1 \\\\ 1 & 1 & 2-\\lambda \\end{pmatrix}$$\n\n- Step 2: Find determinant:\n$$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = (2-\\lambda)\\begin{vmatrix} 2-\\lambda & 1 \\\\ 1 & 2-\\lambda \\end{vmatrix} - 1\\begin{vmatrix} 1 & 1 \\\\ 1 & 2-\\lambda \\end{vmatrix} + 1\\begin{vmatrix} 1 & 2-\\lambda \\\\ 1 & 1 \\end{vmatrix}$$\n$$= (2-\\lambda)((2-\\lambda)^2 - 1) - (2-\\lambda - 1) + (1 - (2-\\lambda))$$\n$$= (2-\\lambda)(\\lambda^2 - 4\\lambda + 3) - (1-\\lambda) + (\\lambda - 1)$$\n$$= (2-\\lambda)(\\lambda-3)(\\lambda-1) - 2(1-\\lambda)$$\n$$= -(\\lambda-1)^2(\\lambda-4)$$\n\n- Step 3: The characteristic equation is $-(\\lambda-1)^2(\\lambda-4) = 0$, so $\\lambda = 1$ (repeated) or $\\lambda = 4$.\n\n$\\lambda = 1$ is an eigenvalue (repeated), and $\\lambda = 4$ is the other distinct eigenvalue.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "What is an orthogonal matrix? If $\\mathbf{M} = \\begin{pmatrix} \\frac{1}{3} & \\frac{2}{3} & \\frac{2}{3} \\\\ -\\frac{2}{3} & \\frac{2}{3} & -\\frac{1}{3} \\\\ -\\frac{2}{3} & -\\frac{1}{3} & \\frac{2}{3} \\end{pmatrix}$, verify that $\\mathbf{M}$ is orthogonal. (3 steps)", "answer": "- Step 1: A square matrix $\\mathbf{M}$ is orthogonal if $\\mathbf{M}\\mathbf{M}^{\\top} = \\mathbf{I}$ (or equivalently $\\mathbf{M}^{-1} = \\mathbf{M}^{\\top}$).\n\n- Step 2: Compute $\\mathbf{M}\\mathbf{M}^{\\top}$:\n$$\\mathbf{M}\\mathbf{M}^{\\top} = \\begin{pmatrix} \\frac{1}{3} & \\frac{2}{3} & \\frac{2}{3} \\\\ -\\frac{2}{3} & \\frac{2}{3} & -\\frac{1}{3} \\\\ -\\frac{2}{3} & -\\frac{1}{3} & \\frac{2}{3} \\end{pmatrix} \\begin{pmatrix} \\frac{1}{3} & -\\frac{2}{3} & -\\frac{2}{3} \\\\ \\frac{2}{3} & \\frac{2}{3} & -\\frac{1}{3} \\\\ \\frac{2}{3} & -\\frac{1}{3} & \\frac{2}{3} \\end{pmatrix}$$\n\n- Step 3: Computing element (1,1): $\\frac{1}{3} \\cdot \\frac{1}{3} + \\frac{2}{3} \\cdot \\frac{2}{3} + \\frac{2}{3} \\cdot \\frac{2}{3} = \\frac{1}{9} + \\frac{4}{9} + \\frac{4}{9} = \\frac{9}{9} = 1$\n\nSimilarly, all diagonal elements are 1, and all off-diagonal elements are 0.\nThus $\\mathbf{M}\\mathbf{M}^{\\top} = \\mathbf{I}$, confirming $\\mathbf{M}$ is orthogonal.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Given that $\\mathbf{P} = \\begin{pmatrix} \\frac{1}{\\sqrt{2}} & \\frac{1}{\\sqrt{2}} \\\\ \\frac{1}{\\sqrt{2}} & -\\frac{1}{\\sqrt{2}} \\end{pmatrix}$ is an orthogonal matrix and $\\mathbf{A} = \\begin{pmatrix} 2 & -1 \\\\ -1 & 2 \\end{pmatrix}$, verify that $\\mathbf{P}^{\\top}\\mathbf{AP}$ is a diagonal matrix and state what appears on the diagonal. (3 steps)", "answer": "- Step 1: $\\mathbf{P}$ is formed from normalised eigenvectors of $\\mathbf{A}$. Compute $\\mathbf{P}^{\\top}\\mathbf{AP}$:\n$$\\mathbf{P}^{\\top}\\mathbf{AP} = \\begin{pmatrix} \\frac{1}{\\sqrt{2}} & \\frac{1}{\\sqrt{2}} \\\\ \\frac{1}{\\sqrt{2}} & -\\frac{1}{\\sqrt{2}} \\end{pmatrix} \\begin{pmatrix} 2 & -1 \\\\ -1 & 2 \\end{pmatrix} \\begin{pmatrix} \\frac{1}{\\sqrt{2}} & \\frac{1}{\\sqrt{2}} \\\\ \\frac{1}{\\sqrt{2}} & -\\frac{1}{\\sqrt{2}} \\end{pmatrix}$$\n\n- Step 2: First multiply $\\mathbf{AP}$:\n$$\\mathbf{AP} = \\begin{pmatrix} 2 & -1 \\\\ -1 & 2 \\end{pmatrix} \\begin{pmatrix} \\frac{1}{\\sqrt{2}} & \\frac{1}{\\sqrt{2}} \\\\ \\frac{1}{\\sqrt{2}} & -\\frac{1}{\\sqrt{2}} \\end{pmatrix} = \\begin{pmatrix} \\frac{1}{\\sqrt{2}} & \\frac{3}{\\sqrt{2}} \\\\ \\frac{1}{\\sqrt{2}} & -\\frac{3}{\\sqrt{2}} \\end{pmatrix}$$\n\n- Step 3: Now compute $\\mathbf{P}^{\\top}(\\mathbf{AP})$:\n$$\\mathbf{P}^{\\top}\\mathbf{AP} = \\begin{pmatrix} \\frac{1}{\\sqrt{2}} & \\frac{1}{\\sqrt{2}} \\\\ \\frac{1}{\\sqrt{2}} & -\\frac{1}{\\sqrt{2}} \\end{pmatrix} \\begin{pmatrix} \\frac{1}{\\sqrt{2}} & \\frac{3}{\\sqrt{2}} \\\\ \\frac{1}{\\sqrt{2}} & -\\frac{3}{\\sqrt{2}} \\end{pmatrix} = \\begin{pmatrix} 1 & 0 \\\\ 0 & 3 \\end{pmatrix}$$\n\nThe diagonal elements (1 and 3) are the eigenvalues of $\\mathbf{A}$. For symmetric matrices, diagonalisation gives eigenvalues on the diagonal.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Reduce $\\mathbf{A} = \\begin{pmatrix} 2 & 0 & 1 \\\\ 0 & -2 & 0 \\\\ 1 & 0 & 2 \\end{pmatrix}$ to a diagonal matrix. Find the eigenvalues and form the orthogonal matrix $\\mathbf{P}$. (4 steps)", "answer": "- Step 1: Find eigenvalues:\n$$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = \\begin{vmatrix} 2-\\lambda & 0 & 1 \\\\ 0 & -2-\\lambda & 0 \\\\ 1 & 0 & 2-\\lambda \\end{vmatrix}$$\n$$= (2-\\lambda)(-2-\\lambda)(2-\\lambda) + 1(0) = -(\\lambda+2)(\\lambda-1)(\\lambda-3)$$\nEigenvalues: $\\lambda = -2, 1, 3$\n\n- Step 2: Find eigenvectors:\nFor $\\lambda = -2$: $\\begin{pmatrix} 0 \\\\ 1 \\\\ 0 \\end{pmatrix}$ (already normalised)\nFor $\\lambda = 1$: $\\begin{pmatrix} 1 \\\\ 0 \\\\ -1 \\end{pmatrix}$, normalised: $\\begin{pmatrix} \\frac{1}{\\sqrt{2}} \\\\ 0 \\\\ -\\frac{1}{\\sqrt{2}} \\end{pmatrix}$\nFor $\\lambda = 3$: $\\begin{pmatrix} 1 \\\\ 0 \\\\ 1 \\end{pmatrix}$, normalised: $\\begin{pmatrix} \\frac{1}{\\sqrt{2}} \\\\ 0 \\\\ \\frac{1}{\\sqrt{2}} \\end{pmatrix}$\n\n- Step 3: Form $\\mathbf{P}$ using normalised eigenvectors as columns:\n$$\\mathbf{P} = \\begin{pmatrix} 0 & \\frac{1}{\\sqrt{2}} & \\frac{1}{\\sqrt{2}} \\\\ 1 & 0 & 0 \\\\ 0 & -\\frac{1}{\\sqrt{2}} & \\frac{1}{\\sqrt{2}} \\end{pmatrix}$$\n\n- Step 4: Compute $\\mathbf{P}^{\\top}\\mathbf{AP}$:\n$$\\mathbf{P}^{\\top}\\mathbf{AP} = \\begin{pmatrix} -2 & 0 & 0 \\\\ 0 & 1 & 0 \\\\ 0 & 0 & 3 \\end{pmatrix} = \\mathbf{D}$$\n\nThe diagonal matrix contains the eigenvalues in the order corresponding to the columns of $\\mathbf{P}$.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "What is the relationship between the trace of a matrix and its eigenvalues? If a $3 \\times 3$ symmetric matrix has eigenvalues $\\lambda_1, \\lambda_2, \\lambda_3$, what is the trace equal to? (1 step)", "answer": "- The trace of a square matrix (sum of diagonal elements) equals the sum of its eigenvalues.\n\n- For a $3 \\times 3$ symmetric matrix with eigenvalues $\\lambda_1, \\lambda_2, \\lambda_3$:\n$$\\text{tr}(\\mathbf{A}) = \\lambda_1 + \\lambda_2 + \\lambda_3$$\n\nThis is true for any square matrix, not just symmetric ones.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Explain why a singular matrix cannot have an inverse. If $\\det(\\mathbf{A}) = 0$, what can you say about the linear transformation represented by $\\mathbf{A}$? (2 steps)", "answer": "- Step 1: The formula for the inverse is $\\mathbf{A}^{-1} = \\frac{1}{\\det(\\mathbf{A})}\\mathbf{C}^{\\top}$, where $\\mathbf{C}^{\\top}$ is the adjugate matrix. If $\\det(\\mathbf{A}) = 0$, we would be dividing by zero, which is undefined. Hence no inverse exists.\n\n- Step 2: A singular matrix represents a transformation that collapses dimensions - it maps at least one dimension to zero. For example, a $3 \\times 3$ singular matrix might map a plane to a line, or a line to a point. The image has lower dimension than the domain. When you apply such a transformation, you lose information and cannot uniquely reverse it.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "Given that $\\mathbf{A} = \\begin{pmatrix} 2 & 0 & 1 \\\\ 4 & 3 & -2 \\\\ 0 & 3 & -4 \\end{pmatrix}$ is singular, find its matrix of cofactors and verify that $\\mathbf{A}\\mathbf{C}^{\\top} = \\mathbf{0}$. What does this tell you? (3 steps)", "answer": "- Step 1: Since $\\det(\\mathbf{A}) = 0$, find minors then cofactors:\nMatrix of minors $\\mathbf{M} = \\begin{pmatrix} -18 & -16 & 12 \\\\ 3 & -8 & 6 \\\\ -3 & 2 & 0 \\end{pmatrix}$\n\nMatrix of cofactors (with alternating signs):\n$$\\mathbf{C} = \\begin{pmatrix} -18 & 16 & 12 \\\\ -3 & -8 & -6 \\\\ -3 & -2 & 0 \\end{pmatrix}$$\n\n- Step 2: Find $\\mathbf{C}^{\\top}$:\n$$\\mathbf{C}^{\\top} = \\begin{pmatrix} -18 & -3 & -3 \\\\ 16 & -8 & -2 \\\\ 12 & -6 & 0 \\end{pmatrix}$$\n\n- Step 3: Compute $\\mathbf{A}\\mathbf{C}^{\\top}$:\n$$\\mathbf{A}\\mathbf{C}^{\\top} = \\begin{pmatrix} 2 & 0 & 1 \\\\ 4 & 3 & -2 \\\\ 0 & 3 & -4 \\end{pmatrix} \\begin{pmatrix} -18 & -3 & -3 \\\\ 16 & -8 & -2 \\\\ 12 & -6 & 0 \\end{pmatrix} = \\begin{pmatrix} 0 & 0 & 0 \\\\ 0 & 0 & 0 \\\\ 0 & 0 & 0 \\end{pmatrix} = \\mathbf{0}$$\n\nThis confirms that for a singular matrix, $\\mathbf{A}\\mathbf{C}^{\\top} = \\mathbf{0}$. This is always true because $\\mathbf{C}^{\\top}$ gives the directions that collapse to zero under $\\mathbf{A}$.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "What is the relationship between the determinant of a matrix and the determinant of its transpose? If $\\det(\\mathbf{A}) = k$, what is $\\det(\\mathbf{A}^{\\top})$? (1 step)", "answer": "- The determinant of a matrix equals the determinant of its transpose: $\\det(\\mathbf{A}) = \\det(\\mathbf{A}^{\\top})$.\n\n- If $\\det(\\mathbf{A}) = k$, then $\\det(\\mathbf{A}^{\\top}) = k$ as well.\n\nThis is because the determinant measures the \"volume scaling factor\" of the transformation, which is the same whether we view the transformation in the original basis or the transposed basis.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "For the transformation represented by $\\mathbf{T} = \\begin{pmatrix} 2 & -1 & 3 \\\\ -1 & 4 & -2 \\\\ 3 & 2 & 4 \\end{pmatrix}$, the plane $\\Pi$ has equation $2x - y + 3z = -6$. Show that the image of $\\Pi$ under $T$ is a line and find its Cartesian equations. (4 steps)", "answer": "- Step 1: Write plane in parametric form. Let $x = s, z = t$, then $y = 6 + 2s + 3t$.\nGeneral point: $\\begin{pmatrix} s \\\\ 6 + 2s + 3t \\\\ t \\end{pmatrix}$\n\n- Step 2: Apply transformation:\n$$\\mathbf{T}\\begin{pmatrix} s \\\\ 6 + 2s + 3t \\\\ t \\end{pmatrix} = \\begin{pmatrix} -6 \\\\ 24 + 7s + 10t \\\\ 12 + 7s + 10t \\end{pmatrix}$$\n\n- Step 3: Let the image point be $(x, y, z)$. Then:\n$$x = -6$$\n$$y = 24 + 7s + 10t$$\n$$z = 12 + 7s + 10t$$\n\n- Step 4: Eliminate parameters. From first equation $x = -6$. Subtracting third from second:\n$$y - z = 12$$\n\nSo the image is the line: $x = -6$ and $y - z = 12$ (or equivalently $y = z + 12$).\n\nThe plane collapses to a line because $\\mathbf{T}$ is singular (determinant = 0).", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "If $\\mathbf{A}$ is a $3 \\times 3$ matrix with distinct eigenvalues $\\lambda_1, \\lambda_2, \\lambda_3$ and corresponding eigenvectors $\\mathbf{v}_1, \\mathbf{v}_2, \\mathbf{v}_3$, what can you say about the linear independence of these eigenvectors? (1 step)", "answer": "- Eigenvectors corresponding to distinct eigenvalues are always linearly independent.\n\n- For a $3 \\times 3$ matrix with three distinct eigenvalues $\\lambda_1, \\lambda_2, \\lambda_3$, the three eigenvectors $\\mathbf{v}_1, \\mathbf{v}_2, \\mathbf{v}_3$ form a linearly independent set. This means they can serve as a basis for $\\mathbb{R}^3$, which is essential for diagonalising the matrix.\n\n- This is particularly important for symmetric matrices, which always have real eigenvalues and whose eigenvectors corresponding to distinct eigenvalues are orthogonal.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A linear transformation $T$ is represented by $\\mathbf{T} = \\begin{pmatrix} 4 & 1 & -2 \\\\ -2 & 3 & 4 \\\\ -1 & 0 & 2 \\end{pmatrix}$. There is a line through the origin for which every point on the line is mapped onto itself. Find a vector equation of this line. (3 steps)", "answer": "- Step 1: A line through the origin that maps to itself means the direction vector is an invariant direction - i.e., it's an eigenvector of $\\mathbf{T}$.\n\n- Step 2: Find eigenvalues and eigenvectors. The characteristic equation gives eigenvalues, and we need $\\lambda = 1$ for invariant points (not just invariant lines).\n\nActually, for an invariant line, any eigenvector works: if $\\mathbf{v}$ is an eigenvector with eigenvalue $\\lambda$, then $T$ maps the line along $\\mathbf{v}$ to itself (scaled by $\\lambda$).\n\n- Step 3: Solve $(\\mathbf{T} - \\lambda\\mathbf{I})\\mathbf{v} = \\mathbf{0}$ for some $\\lambda$. Testing reveals $\\lambda = 1$ gives eigenvector $\\begin{pmatrix} 1 \\\\ -1 \\\\ 1 \\end{pmatrix}$ (any non-zero multiple works).\n\nThe line is: $\\mathbf{r} = t\\begin{pmatrix} 1 \\\\ -1 \\\\ 1 \\end{pmatrix}$\n\nFor an invariant line, any eigenvalue works - the image stays on the same line but may be scaled. For an invariant point (line of fixed points), we'd need $\\lambda = 1$.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}], "count": 29}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What does it mean to take the transpose of a matrix $$\\mathbf{A}$$, and how does the operation affect a matrix's dimension?", "answer": "- Step 1: The transpose $$\\mathbf{A}^\\top$$ is formed by **interchanging rows and columns** — the first row of $$\\mathbf{A}$$ becomes the first column of $$\\mathbf{A}^\\top$$, the second row becomes the second column, and so on.\n- Step 2: Conceptually, you can think of it as \"reflecting the matrix across its main diagonal\" (top-left to bottom-right).\n- Step 3: If $$\\mathbf{A}$$ has dimension $$n \\times m$$ (n rows, m columns), then $$\\mathbf{A}^\\top$$ has dimension $$m \\times n$$ — the dimensions swap.\n+ A square matrix ($$n \\times n$$) transposes to another matrix of the same dimension.\n+ A row vector ($$1 \\times n$$) transposes to a column vector ($$n \\times 1$$).\n\nThe key insight: transpose is fundamentally a **structural rearrangement**, not a change of values.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "What property must a matrix satisfy to be called \"symmetric,\" and what structural pattern does this force on its entries?", "answer": "- Step 1: A matrix $$\\mathbf{A}$$ is **symmetric** if $$\\mathbf{A} = \\mathbf{A}^\\top$$ — interchanging rows and columns leaves the matrix unchanged.\n- Step 2: This forces a \"mirror\" structure: the entry in row $$i$$, column $$j$$ must equal the entry in row $$j$$, column $$i$$.\n+ For a $$2\\times 2$$: form is $$\\begin{pmatrix} a & b \\\\ b & c \\end{pmatrix}$$ — only 3 independent entries, not 4.\n+ For a $$3\\times 3$$: form is $
