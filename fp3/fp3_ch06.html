<script>
const DATA={"selected": [{"question": "What is an orthogonal matrix, and what are the two equivalent ways to characterise it? (3 steps)", "answer": "- Step 1: An orthogonal matrix $$\\mathbf{M}$$ is a square matrix satisfying $$\\mathbf{M}\\mathbf{M}^\\top = \\mathbf{I}$$ (equivalently $$\\mathbf{M}^\\top \\mathbf{M} = \\mathbf{I}$$).\n- Step 2: This is equivalent to saying $$\\mathbf{M}^{-1} = \\mathbf{M}^\\top$$ — the inverse is just the transpose. This is computationally wonderful: you don't need the 5-step procedure; just transpose.\n- Step 3: Equivalently, the columns of $$\\mathbf{M}$$ are mutually orthogonal unit vectors (pairwise perpendicular, each of length 1). The same is true of the rows. So orthogonal matrices preserve lengths and angles — they represent rotations and reflections.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "What is an **invariant line** under a linear transformation, and how does it relate to eigenvectors?", "answer": "- Step 1: An invariant line through the origin is a line such that any point on the line is mapped to **another point on the same line** under the transformation.\n- Step 2: The direction of an invariant line is exactly the direction of an **eigenvector**: if $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$, then any point on the line spanned by $$\\mathbf{x}$$ maps to $$\\lambda$$ times its position — still on the same line.\n- Step 3: For a $$2\\times 2$$ transformation, the Cartesian equation of an invariant line through the origin can be written down from each eigenvector $$(a, b)$$ as $$y = \\frac{b}{a}x$$ (or $$x = 0$$ if $$a = 0$$).\n\nSo eigenvectors **are** the invariant directions; the eigenvalues tell you the scaling along each.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "A $$3\\times 3$$ matrix has eigenvalues $$\\lambda_1, \\lambda_2, \\lambda_3$$. How can you quickly check whether the matrix is singular without computing the determinant directly?", "answer": "- Step 1: The determinant equals the **product of the eigenvalues**: $$\\det(\\mathbf{A}) = \\lambda_1 \\lambda_2 \\lambda_3$$.\n- Step 2: A matrix is singular if and only if $$\\det(\\mathbf{A}) = 0$$, which happens if and only if **at least one eigenvalue is zero**.\n- Step 3: So just look at the eigenvalues: if any one of them is 0, the matrix is singular. Otherwise, it's non-singular.\n\nGeometric intuition: an eigenvalue of 0 means the transformation crushes the corresponding eigenvector to zero, collapsing a dimension — that's exactly what singular means.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "A non-singular matrix $$\\mathbf{A}$$ has eigenvalue $$\\lambda$$ with eigenvector $$\\mathbf{x}$$. What's the corresponding eigenvalue of $$\\mathbf{A}^{-1}$$? (3 steps)", "answer": "- Step 1: Start from $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$. Multiply both sides on the left by $$\\mathbf{A}^{-1}$$: $$\\mathbf{x} = \\lambda \\mathbf{A}^{-1}\\mathbf{x}$$.\n- Step 2: Divide by $$\\lambda$$ (which is non-zero, since $$\\mathbf{A}$$ is non-singular ⇒ all eigenvalues are non-zero): $$\\dfrac{1}{\\lambda}\\mathbf{x} = \\mathbf{A}^{-1}\\mathbf{x}$$.\n- Step 3: Rewriting: $$\\mathbf{A}^{-1}\\mathbf{x} = \\dfrac{1}{\\lambda}\\mathbf{x}$$. So $$\\dfrac{1}{\\lambda}$$ is an eigenvalue of $$\\mathbf{A}^{-1}$$, with the same eigenvector. Eigenvectors are preserved; eigenvalues invert. Intuitive: if $$\\mathbf{A}$$ stretches by factor $$\\lambda$$, then $$\\mathbf{A}^{-1}$$ undoes that stretch (multiplies by $$1/\\lambda$$).", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "What is the inverse of a product of two non-singular matrices, $$(\\mathbf{A}\\mathbf{B})^{-1}$$? Why does the order reverse? (3 steps)", "answer": "- Step 1: The inverse of a product reverses the order of the factors: $$(\\mathbf{A}\\mathbf{B})^{-1} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$.\n- Step 2: Intuitively, if you put on your socks ($$\\mathbf{A}$$) and then your shoes ($$\\mathbf{B}$$), the combined action is $$\\mathbf{A}\\mathbf{B}$$. To undo this combined action (the inverse), you must first take off your shoes ($$\\mathbf{B}^{-1}$$) and then take off your socks ($$\\mathbf{A}^{-1}$$).\n- Step 3: Algebraically, let $$\\mathbf{P} = (\\mathbf{A}\\mathbf{B})^{-1}$$. Then $$(\\mathbf{A}\\mathbf{B})\\mathbf{P} = \\mathbf{I}$$. Multiply on the left by $$\\mathbf{A}^{-1}$$: $$\\mathbf{B}\\mathbf{P} = \\mathbf{A}^{-1}$$. Multiply on the left by $$\\mathbf{B}^{-1}$$: $$\\mathbf{P} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$.\n\nTo undo a sequence of operations, you must undo them in the reverse order.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "What property does $$(\\mathbf{A}^\\top)^\\top$$ have, and what does this mean about transposing as an operation? (3 steps)", "answer": "- Step 1: $$(\\mathbf{A}^\\top)^\\top = \\mathbf{A}$$ — transposing twice returns the original matrix.\n- Step 2: This makes transposition an \"involution\" — an operation that's its own inverse. (Other examples: negation $$-(-x) = x$$, complex conjugation $$\\overline{\\bar{z}} = z$$.)\n- Step 3: Practically, this means transposition is reversible without information loss. It's also why symmetry ($$\\mathbf{A} = \\mathbf{A}^\\top$$) is well-defined: applying transpose to both sides preserves the equation. Another way to say it: rows and columns are \"the same kind of thing\" up to perspective.", "source": "Opus 4.7 ②", "_id": "opus_2_80"}, {"question": "A matrix $$\\mathbf{A}$$ satisfies $$\\mathbf{A}^2 = \\mathbf{I}$$. What can you conclude about its inverse, and what are the possible eigenvalues? (3 steps)", "answer": "- Step 1: $$\\mathbf{A}\\mathbf{A} = \\mathbf{I}$$ matches the definition $$\\mathbf{A}\\mathbf{A}^{-1} = \\mathbf{I}$$, so $$\\mathbf{A}^{-1} = \\mathbf{A}$$. The matrix is its own inverse — a \"self-inverse\" matrix.\n- Step 2: For eigenvalues: if $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$, then $$\\mathbf{A}^2 \\mathbf{x} = \\lambda^2 \\mathbf{x}$$. But $$\\mathbf{A}^2 = \\mathbf{I}$$, so $$\\mathbf{A}^2 \\mathbf{x} = \\mathbf{x}$$. Therefore $$\\lambda^2 = 1$$, giving $$\\lambda = \\pm 1$$.\n- Step 3: Such matrices represent transformations that \"undo themselves\" — reflections, rotations by 180°, etc. The eigenvalue $$+1$$ corresponds to the axis/plane of fixed points; $$-1$$ corresponds to directions that get flipped.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "How do you find the eigenvalues of a matrix? Why is the characteristic equation $$\\det(\\mathbf{A} - \\lambda \\mathbf{I}) = 0$$ instead of $$\\det(\\mathbf{A} - \\lambda) = 0$$? (4 steps)", "answer": "- Step 1: Start with the definition $$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$$.\n- Step 2: Rearrange to bring all terms to one side: $$\\mathbf{A}\\mathbf{x} - \\lambda\\mathbf{x} = \\mathbf{0}$$.\n- Step 3: You cannot subtract a scalar ($$\\lambda$$) from a matrix ($$\\mathbf{A}$$). To factor out $$\\mathbf{x}$$, you must write $$\\lambda$$ as a matrix of the same size: $$\\lambda\\mathbf{I}$$. This gives $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$.\n- Step 4: Since we want a non-trivial solution for $$\\mathbf{x}$$ (i.e., $$\\mathbf{x} \\neq \\mathbf{0}$$), the matrix $$(\\mathbf{A} - \\lambda\\mathbf{I})$$ must be singular. A singular matrix has a determinant of zero, so we set $$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = 0$$.\n\nThe $$\\mathbf{I}$$ is necessary to make the subtraction dimensionally consistent, allowing us to use the determinant condition for non-trivial solutions.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "What is the defining equation for an eigenvalue $$\\lambda$$ and eigenvector $$\\mathbf{x}$$ of a matrix $$\\mathbf{A}$$? What is the geometric meaning of this equation? (3 steps)", "answer": "- Step 1: The defining equation is $$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$$, where $$\\mathbf{A}$$ is a square matrix, $$\\mathbf{x}$$ is a non-zero column vector, and $$\\lambda$$ is a scalar (number).\n- Step 2: Geometrically, multiplying a vector by a matrix usually rotates and scales it. An eigenvector is a \"special\" vector that does not get rotated by the transformation $$\\mathbf{A}$$.\n- Step 3: The transformation only scales the eigenvector. The eigenvalue $$\\lambda$$ is the scale factor. If $$\\lambda > 0$$, the vector stays pointing the same way; if $$\\lambda < 0$$, it points the opposite way; if $$\\lambda = 0$$, it is squashed to the origin.\n\nEigenvectors are the invariant directions of a transformation; eigenvalues are the stretch factors along those directions.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "Why does the property $$\\det(\\mathbf{A}\\mathbf{B}) = \\det(\\mathbf{A}) \\det(\\mathbf{B})$$ tell us that the product of two non-singular matrices is non-singular? (3 steps)", "answer": "- Step 1: If $$\\mathbf{A}$$ and $$\\mathbf{B}$$ are both non-singular, then $$\\det(\\mathbf{A}) \\neq 0$$ and $$\\det(\\mathbf{B}) \\neq 0$$.\n- Step 2: Therefore $$\\det(\\mathbf{A}\\mathbf{B}) = \\det(\\mathbf{A}) \\det(\\mathbf{B}) \\neq 0$$ (the product of two non-zero numbers is non-zero).\n- Step 3: A non-zero determinant means $$\\mathbf{A}\\mathbf{B}$$ is non-singular, so it has an inverse. Conversely: if either factor is singular, then $$\\det(\\mathbf{A}\\mathbf{B}) = 0$$, meaning the product is also singular — singularity is \"contagious\".", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "A symmetric matrix has eigenvalues $$3, 3, -2$$ (with $$3$$ repeated). What does the repeated eigenvalue suggest about the eigenvectors, and is there still freedom in choosing $$\\mathbf{P}$$? (3 steps)", "answer": "- Step 1: For repeated eigenvalues of a symmetric matrix, the corresponding eigenspace is 2-dimensional — there's an entire plane of eigenvectors with eigenvalue 3.\n- Step 2: Within this plane, you can choose ANY pair of orthogonal unit vectors — there's no canonical choice. So the columns of $$\\mathbf{P}$$ corresponding to the repeated eigenvalue are not unique.\n- Step 3: However, the resulting diagonal matrix $$\\mathbf{D} = \\text{diag}(3, 3, -2)$$ is the same regardless of which orthogonal pair you pick within the eigenplane. The diagonalisation is essentially unique even though $$\\mathbf{P}$$ isn't.", "source": "Opus 4.7 ②", "_id": "opus_2_69"}, {"question": "Why does the inverse formula involve dividing by $$\\det(\\mathbf{A})$$, and why does this make it impossible to invert a singular matrix?", "answer": "- Step 1: The cofactor matrix $$\\mathbf{C}$$ is constructed so that $$\\mathbf{A} \\cdot \\mathbf{C}^\\top = \\det(\\mathbf{A}) \\cdot \\mathbf{I}$$ — this is the heart of why the formula works.\n- Step 2: To get $$\\mathbf{A}^{-1}$$ from this, we need to \"divide\" both sides by $$\\det(\\mathbf{A})$$, giving $$\\mathbf{A}^{-1} = \\frac{1}{\\det(\\mathbf{A})} \\mathbf{C}^\\top$$.\n- Step 3: If $$\\det(\\mathbf{A}) = 0$$, this division is undefined — and it must be, because a singular matrix collapses dimensions, losing information that can't be recovered. There's no transformation that \"undoes\" the collapse.\n\nThe takeaway: the determinant being non-zero is **exactly** the algebraic condition for invertibility, mirroring the geometric requirement of preserving volume.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "What's wrong with this argument: \"A $$3 \\times 3$$ matrix has 3 eigenvalues. Each gives one eigenvector. So there are exactly 3 eigenvectors.\"? (3 steps)", "answer": "- Step 1: The first claim (\"3 eigenvalues\") is correct counting with multiplicity, but the eigenvalues might not all be distinct (e.g., a repeated eigenvalue).\n- Step 2: The claim \"each gives one eigenvector\" is wrong: each eigenvalue gives at least one eigenvector direction, but any non-zero scalar multiple is also an eigenvector. So really, each eigenvalue gives an entire LINE of eigenvectors (or more — a plane for a \"geometric multiplicity 2\" repeated eigenvalue).\n- Step 3: Better statement: there are at most 3 linearly independent eigenvector DIRECTIONS, one per distinct eigenvalue (in general). For repeated eigenvalues, there might be fewer independent directions, OR the eigenspace might be larger (a plane). The right counting is by independent directions, not \"vectors\".", "source": "Opus 4.7 ②", "_id": "opus_2_72"}, {"question": "Suppose a transformation $$T$$ has matrix $$\\mathbf{T}$$ with $$\\det(\\mathbf{T}) = -2$$. What does the negative sign tell you geometrically?", "answer": "- Step 1: The **absolute value** $$|\\det(\\mathbf{T})| = 2$$ tells you that volumes are scaled by a factor of 2.\n- Step 2: The **sign** $$-1$$ tells you that the transformation reverses **orientation** — like a reflection. Think of it as turning a right-handed object into a left-handed mirror image.\n- Step 3: A determinant of $$-1$$ would be a pure orientation-reversal (e.g., reflection); $$-2$$ is reflection combined with a uniform doubling of volume.\n\nThis is why $$\\det$$ is called \"signed\" volume scaling — both magnitude and orientation matter.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "A matrix $$\\mathbf{A}$$ has $$\\det(\\mathbf{A}) = 0$$ and at least one zero eigenvalue. Are the rows/columns of $$\\mathbf{A}$$ linearly independent? Why? (3 steps)", "answer": "- Step 1: $$\\det(\\mathbf{A}) = 0$$ means there exists a non-zero vector $$\\mathbf{v}$$ with $$\\mathbf{A}\\mathbf{v} = \\mathbf{0}$$ (an eigenvector with eigenvalue 0).\n- Step 2: Writing $$\\mathbf{A}\\mathbf{v} = \\mathbf{0}$$ in column form: if $$\\mathbf{v} = (v_1, v_2, v_3)$$, then $$v_1\\mathbf{c}_1 + v_2\\mathbf{c}_2 + v_3\\mathbf{c}_3 = \\mathbf{0}$$ where $$\\mathbf{c}_i$$ are the columns of $$\\mathbf{A}$$. Since not all $$v_i$$ are zero, this is a **non-trivial linear dependence** among the columns.\n- Step 3: So the **columns are linearly dependent**. Similarly (by considering $$\\mathbf{A}^\\top$$ which has the same determinant), the rows are linearly dependent.\n\nThe picture: a singular matrix has redundant rows/columns; the redundancy is what causes information loss and dimensional collapse.", "source": "Opus 4.7 ①", "_id": "opus_1_66"}, {"question": "A symmetric matrix has eigenvalues 1, 3, and 5 with normalised eigenvectors x₁, x₂, x₃. What is the trace of A? How does this relate to the eigenvalues? (2 steps)", "answer": "- Step 1: The trace of a matrix is the sum of its diagonal elements. For a symmetric matrix diagonalised by P^T AP = D, we have tr(D) = tr(P^T AP) = tr(APP^T) = tr(A).\n\n- Step 2: Since D is diagonal with eigenvalues on the diagonal, tr(D) = 1 + 3 + 5 = 9. Therefore tr(A) = 9. In general, the trace equals the sum of eigenvalues (with multiplicities). This is true for ALL matrices, not just symmetric ones.\n\nThis provides a quick check on eigenvalue calculations.", "source": "MiniMax ①", "_id": "minimax_1_21"}, {"question": "A transformation T in 3D is represented by a singular matrix. Can it still map a plane to a line? Explain.", "answer": "YES! A singular matrix has determinant zero, meaning it collapses at least one dimension. This can indeed map a plane to a line. For example, projection onto the xy-plane (matrix with third row all zeros) maps the entire z-axis to the origin, and any plane not parallel to z maps to a line in the xy-plane. More generally: under a singular transformation, the image of an n-dimensional subspace has dimension at most n-1. A plane (2D) can collapse to a line (1D) or point (0D).", "source": "MiniMax ①", "_id": "minimax_1_45"}, {"question": "Suppose I claim that $$\\binom{2}{3}$$ is an eigenvector of some matrix $$\\mathbf{A}$$ with eigenvalue 4. How do you verify this without finding eigenvalues from scratch?", "answer": "- Step 1: Compute $$\\mathbf{A}\\binom{2}{3}$$ and check if the result equals $$4\\binom{2}{3} = \\binom{8}{12}$$.\n- Step 2: If yes, the claim is verified — by definition, $$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$$ is the eigenvector equation.\n- Step 3: This is much faster than computing the characteristic polynomial. It's the \"plug in and check\" method, suitable when an eigenvector candidate is given.\n\nThis is why exam problems often **give** an eigenvector and ask you to verify it — they're testing whether you understand the definition, not the cubic-solving algorithm.", "source": "Opus 4.7 ①", "_id": "opus_1_80"}, {"question": "A $$3 \\times 3$$ matrix has eigenvalues $$2, 3, 5$$. Quickly tell me: $$\\det(\\mathbf{A})$$, $$\\text{tr}(\\mathbf{A})$$, $$\\det(\\mathbf{A}^{-1})$$, eigenvalues of $$\\mathbf{A}^2$$. (4 steps)", "answer": "- Step 1: $$\\det(\\mathbf{A}) = 2 \\cdot 3 \\cdot 5 = 30$$ (product of eigenvalues).\n- Step 2: $$\\text{tr}(\\mathbf{A}) = 2 + 3 + 5 = 10$$ (sum of eigenvalues).\n- Step 3: $$\\det(\\mathbf{A}^{-1}) = \\frac{1}{\\det(\\mathbf{A})} = \\frac{1}{30}$$ (reciprocal of det).\n- Step 4: Eigenvalues of $$\\mathbf{A}^2$$ are $$2^2, 3^2, 5^2 = 4, 9, 25$$ (squaring the eigenvalues).\n\nThese compact relationships between $$\\mathbf{A}$$ and its eigenvalues are why eigen-analysis is so powerful — many quantities about $$\\mathbf{A}$$ reduce to simple operations on its eigenvalues.", "source": "Opus 4.7 ①", "_id": "opus_1_68"}, {"question": "Suppose you find eigenvectors $$\\mathbf{x}_1$$ and $$\\mathbf{x}_2$$ of a symmetric matrix corresponding to different eigenvalues $$\\lambda_1 \\neq \\lambda_2$$. Without computing dot products, why are $$\\mathbf{x}_1$$ and $$\\mathbf{x}_2$$ guaranteed to be orthogonal? (4 steps)", "answer": "- Step 1: Compute $$\\mathbf{x}_1 \\cdot \\mathbf{A}\\mathbf{x}_2$$ two different ways. Method A: $$\\mathbf{A}\\mathbf{x}_2 = \\lambda_2 \\mathbf{x}_2$$, so $$\\mathbf{x}_1 \\cdot \\mathbf{A}\\mathbf{x}_2 = \\lambda_2 (\\mathbf{x}_1 \\cdot \\mathbf{x}_2)$$.\n- Step 2: Method B: $$\\mathbf{x}_1 \\cdot \\mathbf{A}\\mathbf{x}_2 = \\mathbf{x}_1^\\top \\mathbf{A}\\mathbf{x}_2 = (\\mathbf{A}^\\top \\mathbf{x}_1)^\\top \\mathbf{x}_2 = (\\mathbf{A}\\mathbf{x}_1)^\\top \\mathbf{x}_2$$ using $$\\mathbf{A}^\\top = \\mathbf{A}$$ (symmetry). This equals $$\\lambda_1 \\mathbf{x}_1 \\cdot \\mathbf{x}_2$$.\n- Step 3: Equating: $$\\lambda_2 (\\mathbf{x}_1 \\cdot \\mathbf{x}_2) = \\lambda_1 (\\mathbf{x}_1 \\cdot \\mathbf{x}_2)$$, so $$(\\lambda_2 - \\lambda_1)(\\mathbf{x}_1 \\cdot \\mathbf{x}_2) = 0$$.\n- Step 4: Since $$\\lambda_1 \\neq \\lambda_2$$, we must have $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = 0$$. Symmetry was the key — it let us \"transpose\" the matrix into the other vector.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "Why is matrix multiplication generally non-commutative ($$\\mathbf{A}\\mathbf{B} \\neq \\mathbf{B}\\mathbf{A}$$), thinking geometrically about the transformations involved? (3 steps)", "answer": "- Step 1: Each matrix represents a geometric operation (rotation, reflection, scaling, etc.). $$\\mathbf{A}\\mathbf{B}$$ means \"do $$\\mathbf{B}$$ then $$\\mathbf{A}$$\"; $$\\mathbf{B}\\mathbf{A}$$ means \"do $$\\mathbf{A}$$ then $$\\mathbf{B}$$\".\n- Step 2: Order matters for geometric operations. Example: rotate by 90° about the $$z$$-axis, then about the $$x$$-axis — vs doing them in the opposite order. The final orientation of an object is different.\n- Step 3: So matrix multiplication encodes ordered composition, and the non-commutativity reflects the genuine fact that physical operations don't always commute. Some special pairs do commute (like two rotations about the same axis), but in general you must respect the order.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "What is the geometric/intuitive meaning of $$\\det(\\mathbf{A})$$ for a $$3 \\times 3$$ matrix representing a linear transformation? (3 steps)", "answer": "- Step 1: $$|\\det(\\mathbf{A})|$$ is the factor by which volumes scale under the transformation. A unit cube with volume 1 maps to a parallelepiped with volume $$|\\det(\\mathbf{A})|$$.\n- Step 2: The sign of $$\\det(\\mathbf{A})$$ encodes orientation:\n+ $$\\det > 0$$: orientation preserved (right-handed stays right-handed).\n+ $$\\det < 0$$: orientation flipped (like a reflection).\n+ $$\\det = 0$$: volume completely crushed — the transformation is non-invertible.\n- Step 3: This is why $$\\det(\\mathbf{A}\\mathbf{B}) = \\det(\\mathbf{A}) \\det(\\mathbf{B})$$ makes sense: applying $$\\mathbf{B}$$ scales volumes by $$\\det(\\mathbf{B})$$, then $$\\mathbf{A}$$ scales by $$\\det(\\mathbf{A})$$, total scaling is the product.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "A $$2\\times 2$$ matrix has a repeated eigenvalue $$\\lambda = 2$$, and the only eigenvectors are scalar multiples of $$\\binom{1}{0}$$. Can this matrix be diagonalized? What's the geometric obstruction? (3 steps)", "answer": "- Step 1: To diagonalize a $$2\\times 2$$ matrix, we need **two linearly independent eigenvectors** to form $$\\mathbf{P}$$.\n- Step 2: Here, the eigenspace for $$\\lambda = 2$$ is only 1-dimensional (just a line of multiples of $$\\binom{1}{0}$$). There aren't enough independent eigenvectors.\n- Step 3: This matrix is **defective** — the algebraic multiplicity (2) exceeds the geometric multiplicity (1). It can be brought to **Jordan form** $$\\begin{pmatrix} 2 & 1 \\\\ 0 & 2 \\end{pmatrix}$$, but not to a diagonal matrix.\n\nMisconception alert: not every matrix is diagonalizable! Only ones with enough independent eigenvectors. **Symmetric matrices always have enough**, which is part of what makes them special.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "After finding $$\\lambda = 1$$ for some matrix $$\\mathbf{A}$$, you set up $$(\\mathbf{A} - \\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ and get **two equations** that turn out to give the same constraint. Why does this happen, and how does it affect your eigenvector?", "answer": "- Step 1: At an eigenvalue, the matrix $$\\mathbf{A} - \\lambda\\mathbf{I}$$ is **singular** (det = 0), so its rows are linearly dependent. For a $$2\\times 2$$, the two row equations represent the same line — they're not independent.\n- Step 2: This means one of the equations gives no new information; you have **one effective equation in two unknowns**, leaving a one-parameter family of solutions.\n- Step 3: This is exactly what we want: any non-zero solution is an eigenvector, and any non-zero scalar multiple of it is also an eigenvector. You make a **convenient choice** (e.g., set $$y = 1$$) to pick a representative.\n\nThe \"lost equation\" is a feature, not a bug — it reflects the line of eigenvectors.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Prove that for any matrices A and B where AB exists, (AB)^T = B^T A^T. (2 steps)", "answer": "- Step 1: Let A be n×m and B be m×p. Then AB is n×p, so (AB)^T is p×n. Also B^T is p×m and A^T is m×n, so B^T A^T is p×n - both sides have the same dimensions.\n\n- Step 2: Consider element (AB)^T_{ij} = (AB)_{ji} = sum over k of A_{jk} B_{ki}. This equals sum over k of B^T_{ik} A^T_{kj} = (B^T A^T)_{ij}. Since all elements match, (AB)^T = B^T A^T.\n\nThis is true for all matrices where AB exists, unlike the inverse property which requires non-singularity.", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "State the multiplicative property of determinants and explain its geometric meaning.", "answer": "- Step 1: For square matrices of the same size, $$\\det(\\mathbf{AB}) = \\det(\\mathbf{A}) \\det(\\mathbf{B})$$.\n- Step 2: Geometrically, $$\\det(\\mathbf{A})$$ is the volume scaling factor of $$\\mathbf{A}$$, and $$\\det(\\mathbf{B})$$ is the scaling factor of $$\\mathbf{B}$$. Composing transformations means doing one then the other, so the total scaling factor is the **product** of the individual factors.\n- Step 3: Important consequence: if either $$\\mathbf{A}$$ or $$\\mathbf{B}$$ is singular ($$\\det = 0$$), then $$\\mathbf{AB}$$ is singular too. Once volume is destroyed, no further transformation can restore it.\n\nThis is why the determinant is the right notion of \"size\" for matrices — it respects composition.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "What is wrong with this statement: \"For any matrix A, (A^T)^-1 = (A^-1)^T\"? Is it ever false?", "answer": "This statement is actually CORRECT! For any invertible matrix A: (A^T)^-1 = (A^-1)^T. To verify: A^T × (A^-1)^T = (A^-1 A)^T = I^T = I. Both sides multiply to identity, so they're equal. This holds for ALL invertible matrices, not just special cases. It's a fundamental property linking transpose and inverse operations.\n\nThis is useful because if you need (A^T)^-1, you can compute A^-1 and transpose it instead.", "source": "MiniMax ①", "_id": "minimax_1_30"}, {"question": "Describe what $$\\mathbf{A}^\\top \\mathbf{A}$$ does geometrically and why its eigenvalues must be non-negative for any matrix $$\\mathbf{A}$$. (3 steps)", "answer": "- Step 1: $$\\mathbf{A}^\\top \\mathbf{A}$$ is always symmetric (proved earlier), so it has real eigenvalues and orthogonal eigenvectors.\n- Step 2: For any vector $$\\mathbf{x}$$, $$\\mathbf{x} \\cdot (\\mathbf{A}^\\top \\mathbf{A})\\mathbf{x} = (\\mathbf{A}\\mathbf{x}) \\cdot (\\mathbf{A}\\mathbf{x}) = \\|\\mathbf{A}\\mathbf{x}\\|^2 \\geq 0$$. So $$\\mathbf{A}^\\top \\mathbf{A}$$ is \"positive semi-definite\".\n- Step 3: For an eigenvector $$\\mathbf{x}$$ with eigenvalue $$\\mu$$ of $$\\mathbf{A}^\\top \\mathbf{A}$$: $$\\mathbf{x} \\cdot (\\mathbf{A}^\\top \\mathbf{A})\\mathbf{x} = \\mathbf{x} \\cdot \\mu \\mathbf{x} = \\mu \\|\\mathbf{x}\\|^2 \\geq 0$$. Since $$\\|\\mathbf{x}\\|^2 > 0$$, we need $$\\mu \\geq 0$$. This connects $$\\mathbf{A}^\\top \\mathbf{A}$$ to length distortions of $$\\mathbf{A}$$ — a foundational idea in least-squares fitting.", "source": "Opus 4.7 ②", "_id": "opus_2_76"}, {"question": "A matrix $$\\mathbf{A}$$ has determinant 6 and trace 8 (it's $$2 \\times 2$$). What are its eigenvalues? (3 steps)", "answer": "- Step 1: For a $$2 \\times 2$$ matrix, eigenvalues $$\\lambda_1, \\lambda_2$$ satisfy: $$\\lambda_1 + \\lambda_2 = \\text{tr}(\\mathbf{A}) = 8$$ and $$\\lambda_1 \\lambda_2 = \\det(\\mathbf{A}) = 6$$.\n- Step 2: These are the sum and product of the roots of a quadratic — by Vieta's formulas, the eigenvalues are roots of $$\\lambda^2 - 8\\lambda + 6 = 0$$. (Note this matches the characteristic polynomial structure for $$2 \\times 2$$.)\n- Step 3: Solve: $$\\lambda = \\dfrac{8 \\pm \\sqrt{64 - 24}}{2} = \\dfrac{8 \\pm \\sqrt{40}}{2} = 4 \\pm \\sqrt{10}$$. So the eigenvalues are $$4 + \\sqrt{10}$$ and $$4 - \\sqrt{10}$$ (both real since the discriminant is positive). Verify: sum is $$8$$ ✓, product is $$16 - 10 = 6$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_89"}, {"question": "Explain why $$\\det(\\mathbf{A}^\\top) = \\det(\\mathbf{A})$$ holds for any square matrix.", "answer": "- Step 1: The determinant can be computed by expanding along **any row or any column** with the same result.\n- Step 2: When we transpose $$\\mathbf{A}$$, rows become columns and vice versa. Expanding $$\\det(\\mathbf{A}^\\top)$$ along its first row uses the same numerical entries as expanding $$\\det(\\mathbf{A})$$ along its first column.\n- Step 3: The sign pattern $$+, -, +$$ is the same whether we expand by row or column, so the result is identical: $$\\det(\\mathbf{A}^\\top) = \\det(\\mathbf{A})$$.\n\nConceptually: the determinant treats rows and columns symmetrically, reflecting the fact that volume scaling doesn't care about the row/column distinction.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Given $$\\mathbf{P}$$ orthogonal and $$\\mathbf{A}$$ symmetric, prove that $$\\mathbf{P}^\\top \\mathbf{A}\\mathbf{P}$$ is also symmetric. (3 steps)", "answer": "- Step 1: To show a matrix is symmetric, we show it equals its own transpose. Compute $$(\\mathbf{P}^\\top \\mathbf{A}\\mathbf{P})^\\top$$.\n- Step 2: Use $$(\\mathbf{X}\\mathbf{Y}\\mathbf{Z})^\\top = \\mathbf{Z}^\\top \\mathbf{Y}^\\top \\mathbf{X}^\\top$$: $$(\\mathbf{P}^\\top \\mathbf{A}\\mathbf{P})^\\top = \\mathbf{P}^\\top \\mathbf{A}^\\top (\\mathbf{P}^\\top)^\\top = \\mathbf{P}^\\top \\mathbf{A}^\\top \\mathbf{P}$$.\n- Step 3: Since $$\\mathbf{A}$$ is symmetric, $$\\mathbf{A}^\\top = \\mathbf{A}$$. So $$(\\mathbf{P}^\\top \\mathbf{A}\\mathbf{P})^\\top = \\mathbf{P}^\\top \\mathbf{A}\\mathbf{P}$$ — it equals itself, hence symmetric. This confirms that diagonalising preserves the symmetric structure, and indeed $$\\mathbf{D}$$ being diagonal means it's automatically symmetric.", "source": "Opus 4.7 ②", "_id": "opus_2_79"}, {"question": "Compute the determinant of $$\\mathbf{A} = \\begin{pmatrix} 1 & 2 & 3 \\\\ 0 & 4 & 5 \\\\ 0 & 0 & 6 \\end{pmatrix}$$ in two ways. (3 steps)", "answer": "- Step 1: Method 1 (cofactor expansion along column 1): only the $$(1,1)$$ entry is non-zero. So $$\\det = 1 \\cdot \\begin{vmatrix} 4 & 5 \\\\ 0 & 6 \\end{vmatrix} - 0 + 0 = 1 \\cdot (24 - 0) = 24$$.\n- Step 2: Method 2 (triangular shortcut): the matrix is upper triangular, so $$\\det$$ is the product of diagonal entries: $$1 \\cdot 4 \\cdot 6 = 24$$ ✓.\n- Step 3: Both give 24, illustrating a useful pattern: leveraging the triangular structure (or any column with many zeros) saves computation. Always look at the structure before grinding through cofactor expansion.", "source": "Opus 4.7 ②", "_id": "opus_2_63"}, {"question": "How can the **trace** of a matrix help you check eigenvalue computations quickly? Demonstrate with a $$3\\times 3$$ matrix $$\\mathbf{A}$$ where you've computed eigenvalues $$1, 2, 5$$ but the diagonal entries sum to 9.", "answer": "- Step 1: The trace = sum of diagonal entries = sum of eigenvalues. This is an invariant.\n- Step 2: Sum of computed eigenvalues: $$1 + 2 + 5 = 8$$.\n- Step 3: Trace of matrix: $$9$$. These don't match — there must be an **error** in the eigenvalue calculation. Either you've made an arithmetic slip in the characteristic polynomial, missed a root, or computed eigenvalues incorrectly.\n\nUse this as a routine check: it takes 5 seconds and catches many errors. Similarly, the **product** of eigenvalues should equal the determinant.", "source": "Opus 4.7 ①", "_id": "opus_1_71"}, {"question": "Given a $$3\\times 3$$ matrix $$\\mathbf{M}$$, why are the columns of $$\\mathbf{M}$$ exactly the images of the basis vectors $$\\mathbf{i}, \\mathbf{j}, \\mathbf{k}$$?", "answer": "- Step 1: Multiply $$\\mathbf{M}$$ by $$\\mathbf{i} = \\begin{pmatrix} 1 \\\\ 0 \\\\ 0 \\end{pmatrix}$$. The result is $$\\begin{pmatrix} a \\\\ d \\\\ g \\end{pmatrix}$$, which is the **first column** of $$\\mathbf{M}$$.\n- Step 2: Similarly, $$\\mathbf{M}\\mathbf{j}$$ extracts the second column, and $$\\mathbf{M}\\mathbf{k}$$ extracts the third column.\n- Step 3: This is no accident: the columns of any transformation matrix tell you **exactly where the basis vectors go**. Once you know the images of $$\\mathbf{i}, \\mathbf{j}, \\mathbf{k}$$, linearity determines the image of every other vector.\n\nPractical consequence: to find the matrix of a transformation, just compute the images of the basis vectors and stack them as columns.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "A symmetric matrix represents a transformation that includes both stretching and rotation. Why does diagonalizing it \"decompose\" the transformation in a meaningful way?", "answer": "- Step 1: Diagonalization: $$\\mathbf{A} = \\mathbf{P}\\mathbf{D}\\mathbf{P}^\\top$$, where $$\\mathbf{P}$$ is orthogonal and $$\\mathbf{D}$$ is diagonal.\n- Step 2: Reading right to left, $$\\mathbf{A}$$ acts on a vector $$\\mathbf{v}$$ as:\n+ $$\\mathbf{P}^\\top \\mathbf{v}$$: rotate to align with eigenvector axes.\n+ $$\\mathbf{D}(\\mathbf{P}^\\top \\mathbf{v})$$: stretch independently along each axis by the eigenvalues.\n+ $$\\mathbf{P}(\\mathbf{D}\\mathbf{P}^\\top\\mathbf{v})$$: rotate back to original orientation.\n- Step 3: So $$\\mathbf{A}$$ is **rotation, stretch, un-rotation** — a clean decomposition. The \"true\" action of $$\\mathbf{A}$$ is just **independent scaling** along its eigenvector directions, but expressed in the standard basis it looks more complicated.\n\nThis is the foundation of **principal component analysis**, **stress analysis in mechanics**, and **moment of inertia tensors** — all use this decomposition.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "Explain the deep reason why \"the second row equation in finding eigenvectors\" sometimes gives the same information as the first row equation (no extra constraint). (3 steps)", "answer": "- Step 1: At an eigenvalue $$\\lambda$$, the matrix $$(\\mathbf{A} - \\lambda\\mathbf{I})$$ is singular by construction.\n- Step 2: For a $$3 \\times 3$$ singular matrix with one zero eigenvalue (typical for a simple eigenvalue), the rank is 2. This means: among the three row equations of $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$, exactly TWO are independent and one is a linear combination of the others.\n- Step 3: So in practice, two rows give all the constraints, and the third row will automatically be satisfied (or be a linear combination of the first two). This is also why you get a 1-parameter family of solutions — the eigenvector direction. If the eigenvalue is repeated, the rank may be just 1, giving a 2-parameter family (a plane of eigenvectors).", "source": "Opus 4.7 ②", "_id": "opus_2_70"}, {"question": "A matrix has eigenvalues 1 and 2 with eigenvectors (1,0,0) and (0,1,0) respectively. What is one possible eigenvalue and eigenvector for the third dimension? Explain your reasoning.", "answer": "The third eigenvalue could be any λ, and the eigenvector must be orthogonal to both (1,0,0) and (0,1,0), so it must be of form (0,0,1) times any scalar (any vector along the z-axis). However, for a symmetric matrix, the third eigenvector MUST be orthogonal to the first two. If the matrix is NOT specified as symmetric, the third eigenvector could be any vector that is linearly independent of the first two - it doesn't have to be orthogonal. The symmetry condition guarantees orthogonality of eigenvectors.", "source": "MiniMax ①", "_id": "minimax_1_40"}, {"question": "Imagine a transformation $$T$$ in 3D that has eigenvalues $$1, 1, 1$$ (all equal to 1). What are the possibilities for $$T$$, and how does the eigenvector structure tell you which?", "answer": "- Step 1: All eigenvalues equal to 1 means $$\\mathbf{T}\\mathbf{x} = \\mathbf{x}$$ along eigenvector directions — vectors are fixed.\n- Step 2: Possibilities:\n+ **Three independent eigenvectors**: $$\\mathbf{T} = \\mathbf{I}$$ (the identity transformation). Every vector is fixed.\n+ **Two independent eigenvectors**: a \"shear\" — fixes a 2D plane but slides points along it. Defective.\n+ **One independent eigenvector**: a more complex shear, fixing only a line. Highly defective.\n- Step 3: Distinguishing requires examining the **dimension of the eigenspace** for $$\\lambda = 1$$, equivalently the rank of $$\\mathbf{T} - \\mathbf{I}$$.\n\nJust knowing the eigenvalues isn't enough to identify the transformation — eigenvector structure (and possibly higher-order generalized eigenvectors) is needed.", "source": "Opus 4.7 ①", "_id": "opus_1_88"}, {"question": "Why do complex eigenvalues occur in real matrices, and what do they represent geometrically?", "answer": "When solving the characteristic equation, you may get complex roots like 2 ± 3i. These occur in conjugate pairs for real matrices. Geometrically, they represent a rotation in the plane! A real matrix with complex eigenvalues acts as a rotation combined with scaling (a \"rotation-dilation\"). Points don't simply stretch or compress - they spiral around the origin. This is essential in analyzing 2D systems that exhibit rotational behavior (like oscillations).", "source": "MiniMax ①", "_id": "minimax_1_18"}, {"question": "Show that a $$3 \\times 3$$ skew-symmetric matrix (where $$\\mathbf{A}^\\top = -\\mathbf{A}$$) is always singular. (3 steps)", "answer": "- Step 1: Skew-symmetric in $$3 \\times 3$$ has form $$\\begin{pmatrix} 0 & a & -b \\\\ -a & 0 & c \\\\ b & -c & 0 \\end{pmatrix}$$ — diagonal must be zero (entry equals its negative).\n- Step 2: Compute the determinant by cofactor expansion along row 1: $$0 \\cdot (\\ldots) - a \\cdot \\begin{vmatrix} -a & c \\\\ b & 0 \\end{vmatrix} + (-b) \\cdot \\begin{vmatrix} -a & 0 \\\\ b & -c \\end{vmatrix} = -a(0 - bc) - b(ac - 0) = abc - abc = 0$$.\n- Step 3: So the determinant is always zero, meaning every $$3 \\times 3$$ skew-symmetric matrix is singular. This is a parity issue — only true for odd-dimensional skew-symmetric matrices. (For even dimensions like $$2 \\times 2$$ or $$4 \\times 4$$, skew-symmetric matrices are usually non-singular.)", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "Why must we cross out the row and column containing an entry when computing its minor, and why doesn't the formula use entries from those rows/columns?", "answer": "- Step 1: The determinant counts contributions from products that pick one entry from each row **and** each column (a permutation pattern).\n- Step 2: When we factor out a particular entry like $$a$$ from row 1, column 1, the remaining factors must come from rows 2 and 3 **and** columns 2 and 3 — the row and column containing $$a$$ are \"used up.\"\n- Step 3: So the minor is the determinant of what's left after removing row 1 and column 1 — it captures all the ways to complete the product without reusing that row or column.\n\nThis crossing-out is not arbitrary; it's enforced by the no-repeats rule in the determinant's definition.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Transformation $T$ is represented by matrix $\\mathbf{T}$ and transformation $U$ by matrix $\\mathbf{U}$. What transformation does the matrix product $\\mathbf{U}\\mathbf{T}$ represent? (2 steps)", "answer": "- Step 1: Matrix multiplication is applied right-to-left. The vector is multiplied by the rightmost matrix first.\n- Step 2: Therefore, $\\mathbf{U}\\mathbf{T}$ represents the transformation $T$ followed by the transformation $U$.\n\nMisconception probe: It is **not** $U$ followed by $T$. The order of the letters matches the order of application, but the matrices are written in reverse order.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "Why is $$\\mathbf{T}^{-1}$$ the matrix that **reverses** the transformation $$\\mathbf{T}$$? Make the connection to function inverses.", "answer": "- Step 1: A linear transformation $$T$$ takes input $$\\mathbf{x}_1$$ and produces output $$\\mathbf{x}_2 = \\mathbf{T}\\mathbf{x}_1$$. To \"reverse\" means: given the output $$\\mathbf{x}_2$$, recover the input $$\\mathbf{x}_1$$.\n- Step 2: We want a matrix $$\\mathbf{S}$$ such that $$\\mathbf{S}\\mathbf{x}_2 = \\mathbf{x}_1$$. Substituting: $$\\mathbf{S}(\\mathbf{T}\\mathbf{x}_1) = \\mathbf{x}_1$$, i.e., $$\\mathbf{S}\\mathbf{T} = \\mathbf{I}$$ for all $$\\mathbf{x}_1$$.\n- Step 3: This is exactly the definition of $$\\mathbf{S} = \\mathbf{T}^{-1}$$. Just like $$f^{-1}(f(x)) = x$$ for functions, $$\\mathbf{T}^{-1}\\mathbf{T} = \\mathbf{I}$$ means applying $$\\mathbf{T}$$ then $$\\mathbf{T}^{-1}$$ returns the original vector.\n\nThis is why \"to find $$\\mathbf{x}_1$$ given its image $$\\mathbf{x}_2$$, multiply by $$\\mathbf{T}^{-1}$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "Aside from explicitly computing $$\\mathbf{T}^{-1}$$, what's an alternative method to find $$\\mathbf{x}_1$$ given $$\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$$, and when might you prefer it? (3 steps)", "answer": "- Step 1: Write the matrix equation $$\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$$ as a system of three simultaneous equations in three unknowns (the components of $$\\mathbf{x}_1$$).\n- Step 2: Solve the system using elimination, substitution, or any standard method.\n- Step 3: This is often faster than computing $$\\mathbf{T}^{-1}$$ for a single problem (finding $$\\mathbf{T}^{-1}$$ requires 9 minors plus a determinant — a lot of work). But if you need to reverse many vectors with the same $$\\mathbf{T}$$, computing $$\\mathbf{T}^{-1}$$ once and reusing it is efficient.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Two different matrices A and B have the same eigenvalues with the same eigenvectors. What can you conclude about A and B?", "answer": "If A and B share all eigenvalues and the same complete set of eigenvectors, then A = B. More generally, if they share eigenvalues and eigenvectors (forming a basis), they're the same transformation. However, be careful: different matrices can have the same eigenvalues but be different (e.g., $$\\begin{pmatrix}1 & 1 \\\\ 0 & 1\\end{pmatrix}$$ and $$\\begin{pmatrix}1 & 0 \\\\ 0 & 1\\end{pmatrix}$$ both have eigenvalue 1, but aren't equal). They need the SAME eigenvectors to be equal.", "source": "MiniMax ①", "_id": "minimax_1_47"}, {"question": "If $$\\mathbf{M}$$ has dimension $$3 \\times 2$$, what are the dimensions of $$\\mathbf{M}^\\top \\mathbf{M}$$ and $$\\mathbf{M}\\mathbf{M}^\\top$$, and why are they different sizes? (3 steps)", "answer": "- Step 1: $$\\mathbf{M}$$ is $$3 \\times 2$$, so $$\\mathbf{M}^\\top$$ is $$2 \\times 3$$.\n- Step 2: $$\\mathbf{M}^\\top \\mathbf{M}$$: $$(2 \\times 3)(3 \\times 2) = 2 \\times 2$$. The \"inner\" dimensions (3 and 3) match and disappear; the \"outer\" dimensions (2 and 2) survive.\n- Step 3: $$\\mathbf{M}\\mathbf{M}^\\top$$: $$(3 \\times 2)(2 \\times 3) = 3 \\times 3$$. Same logic, but the surviving dimensions are now 3 and 3.\n+ Both products exist (matrix multiplication is well-defined).\n+ Both are symmetric.\n+ But they have different sizes — already showing matrix multiplication is non-commutative in a strong way.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "What is a **diagonal matrix**, and why are diagonal matrices computationally so much simpler to work with than general matrices?", "answer": "- Step 1: A diagonal matrix has all entries **off the leading diagonal** (top-left to bottom-right) equal to zero — only the diagonal entries can be non-zero.\n- Step 2: Why simpler:\n+ **Multiplication**: $$\\text{diag}(a,b,c) \\cdot \\text{diag}(d,e,f) = \\text{diag}(ad, be, cf)$$ — just multiply corresponding diagonal entries.\n+ **Powers**: $$\\text{diag}(a,b,c)^n = \\text{diag}(a^n, b^n, c^n)$$ — no matrix multiplication needed.\n+ **Inverse**: $$\\text{diag}(a,b,c)^{-1} = \\text{diag}(1/a, 1/b, 1/c)$$ when all entries are non-zero.\n+ **Determinant**: just the product of the diagonal.\n- Step 3: A diagonal matrix represents a transformation that **scales independently along the coordinate axes** — no mixing between axes. That's why everything decouples.\n\nThis is why diagonalization is so valuable: it transforms a complicated transformation into independent, simple scalings.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Why must eigenvectors corresponding to **different** eigenvalues be linearly independent (for any matrix, not just symmetric)? (3 steps)", "answer": "- Step 1: Suppose $$\\mathbf{A}\\mathbf{v}_1 = \\lambda_1 \\mathbf{v}_1$$ and $$\\mathbf{A}\\mathbf{v}_2 = \\lambda_2 \\mathbf{v}_2$$ with $$\\lambda_1 \\neq \\lambda_2$$, and assume for contradiction that $$\\mathbf{v}_2 = c\\mathbf{v}_1$$ for some scalar $$c$$.\n- Step 2: Then $$\\mathbf{A}\\mathbf{v}_2 = \\mathbf{A}(c\\mathbf{v}_1) = c\\lambda_1 \\mathbf{v}_1$$. But also $$\\mathbf{A}\\mathbf{v}_2 = \\lambda_2 \\mathbf{v}_2 = \\lambda_2 c \\mathbf{v}_1$$. So $$c\\lambda_1 \\mathbf{v}_1 = c\\lambda_2 \\mathbf{v}_1$$.\n- Step 3: Since $$c \\neq 0$$ (else $$\\mathbf{v}_2 = \\mathbf{0}$$, not allowed) and $$\\mathbf{v}_1 \\neq \\mathbf{0}$$, we'd need $$\\lambda_1 = \\lambda_2$$ — contradicting our assumption. So $$\\mathbf{v}_1$$ and $$\\mathbf{v}_2$$ are linearly independent.\n\nThis is why distinct eigenvalues guarantee an independent set of eigenvectors — we don't need symmetry, just distinctness.", "source": "Opus 4.7 ①", "_id": "opus_1_72"}, {"question": "Why is $$\\mathbf{M}^\\top \\mathbf{M}$$ always a symmetric matrix, regardless of what $$\\mathbf{M}$$ is? (3 steps)", "answer": "- Step 1: Apply the rule $$(\\mathbf{A}\\mathbf{B})^\\top = \\mathbf{B}^\\top \\mathbf{A}^\\top$$ to $$\\mathbf{M}^\\top \\mathbf{M}$$: $$(\\mathbf{M}^\\top \\mathbf{M})^\\top = \\mathbf{M}^\\top (\\mathbf{M}^\\top)^\\top$$.\n- Step 2: Since $$(\\mathbf{M}^\\top)^\\top = \\mathbf{M}$$ (transposing twice returns the original), we get $$(\\mathbf{M}^\\top \\mathbf{M})^\\top = \\mathbf{M}^\\top \\mathbf{M}$$.\n- Step 3: A matrix that equals its own transpose is symmetric — so $$\\mathbf{M}^\\top \\mathbf{M}$$ is symmetric. The same argument shows $$\\mathbf{M}\\mathbf{M}^\\top$$ is symmetric. Useful structural fact: even if $$\\mathbf{M}$$ is rectangular and \"ugly\", you can always build a symmetric square matrix from it.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "A symmetric $$3\\times 3$$ matrix has all positive eigenvalues. What does this tell you about the corresponding quadratic form $$\\mathbf{x}^\\top \\mathbf{A}\\mathbf{x}$$?", "answer": "- Step 1: Diagonalize: $$\\mathbf{A} = \\mathbf{P}\\mathbf{D}\\mathbf{P}^\\top$$. Substitute: $$\\mathbf{x}^\\top \\mathbf{A}\\mathbf{x} = \\mathbf{x}^\\top \\mathbf{P}\\mathbf{D}\\mathbf{P}^\\top \\mathbf{x} = (\\mathbf{P}^\\top \\mathbf{x})^\\top \\mathbf{D} (\\mathbf{P}^\\top \\mathbf{x})$$.\n- Step 2: Let $$\\mathbf{y} = \\mathbf{P}^\\top \\mathbf{x}$$. Then $$\\mathbf{x}^\\top \\mathbf{A}\\mathbf{x} = \\mathbf{y}^\\top \\mathbf{D}\\mathbf{y} = \\lambda_1 y_1^2 + \\lambda_2 y_2^2 + \\lambda_3 y_3^2$$.\n- Step 3: If all $$\\lambda_i > 0$$, this expression is **always positive** for $$\\mathbf{x} \\neq \\mathbf{0}$$ — the matrix is **positive definite**. The quadratic form represents an ellipsoid; all level surfaces are bounded ellipsoids.\n\nThis is the foundation of stability analysis (positive-definite Hessians = local minima) and many statistical methods (covariance matrices).", "source": "Opus 4.7 ①", "_id": "opus_1_86"}, {"question": "What is the Cayley-Hamilton theorem? How could you use it to find A^-1?", "answer": "The Cayley-Hamilton theorem states that every square matrix satisfies its own characteristic equation. For a 2×2 matrix A with characteristic polynomial λ² - tr(A)λ + det(A) = 0, we have A² - tr(A)A + det(A)I = 0. Rearranging: A² - tr(A)A = -det(A)I. If det(A) ≠ 0, multiply by A^-1: A - tr(A)I = -det(A)A^-1, so A^-1 = (tr(A)I - A)/det(A). This gives a formula for inverse without the cofactor matrix method!", "source": "MiniMax ①", "_id": "minimax_1_42"}, {"question": "What does it mean for a matrix $$\\mathbf{T}$$ to represent a linear transformation $$T: \\mathbb{R}^3 \\to \\mathbb{R}^3$$, and what two properties must such a transformation satisfy?", "answer": "- Step 1: $$\\mathbf{T}$$ represents $$T$$ if applying $$\\mathbf{T}$$ to a position vector produces the image of that point under $$T$$ — that is, $$T(\\mathbf{x}) = \\mathbf{T}\\mathbf{x}$$.\n- Step 2: Two defining properties of linearity:\n+ **Scaling**: $$T(k\\mathbf{x}) = kT(\\mathbf{x})$$ — scaling input scales the output by the same factor.\n+ **Additivity**: $$T(\\mathbf{x}_1 + \\mathbf{x}_2) = T(\\mathbf{x}_1) + T(\\mathbf{x}_2)$$ — the image of a sum equals the sum of images.\n- Step 3: Together these mean linear transformations preserve the linear structure of space — straight lines map to straight lines (or points), and the origin maps to the origin.\n\nThese properties are precisely what allows a transformation to be encoded by matrix multiplication.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "Why does a $$3 \\times 3$$ matrix always have at least one real eigenvalue, even though a $$2 \\times 2$$ matrix might have only complex eigenvalues? (3 steps)", "answer": "- Step 1: The characteristic polynomial of a $$3 \\times 3$$ matrix is a cubic in $$\\lambda$$ with real coefficients.\n- Step 2: A cubic with real coefficients always has at least one real root, because: as $$\\lambda \\to \\infty$$, the cubic $$\\to \\pm \\infty$$, and as $$\\lambda \\to -\\infty$$, it goes to the opposite infinity. By the intermediate value theorem, it crosses zero at least once.\n- Step 3: For $$2 \\times 2$$, the characteristic polynomial is quadratic. Quadratics can have negative discriminant (e.g., $$\\lambda^2 + 1$$ has roots $$\\pm i$$), so they can fail to have real roots. The \"always at least one real eigenvalue\" property is special to odd dimensions.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "What is the degree of the characteristic equation for a $$2 \\times 2$$ matrix and for a $$3 \\times 3$$ matrix, and what does this imply about the maximum number of eigenvalues? (3 steps)", "answer": "- Step 1: For a $$2 \\times 2$$ matrix, $$\\det(\\mathbf{A} - \\lambda \\mathbf{I})$$ is a quadratic in $$\\lambda$$ — degree 2. So there are at most 2 (real) eigenvalues.\n- Step 2: For a $$3 \\times 3$$ matrix, the characteristic polynomial has degree 3 (cubic). So there are at most 3 real eigenvalues.\n- Step 3: In general, $$n \\times n$$ matrices have characteristic polynomials of degree $$n$$. Roots can be repeated, and complex roots are possible (though the syllabus only requires real eigenvalues). A cubic always has at least 1 real root, so a $$3 \\times 3$$ matrix always has at least one real eigenvalue.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "A matrix $$\\mathbf{A}$$ is given. Without computing the inverse, when can you immediately conclude $$\\mathbf{A}^{-1}$$ exists? List three quick sufficient conditions.", "answer": "- Step 1: $$\\mathbf{A}$$ is **non-singular**, i.e., $$\\det(\\mathbf{A}) \\neq 0$$. This is the necessary and sufficient condition.\n- Step 2: Three quick sufficient checks:\n+ All **eigenvalues are non-zero** (since $$\\det\\mathbf{A} = \\prod \\lambda_i$$).\n+ The **rows (or columns) are linearly independent** — no row is a linear combination of others.\n+ $$\\mathbf{A}\\mathbf{A}^\\top$$ or $$\\mathbf{A}^\\top \\mathbf{A}$$ is a positive scalar multiple of the identity (then $$\\mathbf{A}$$ is essentially orthogonal).\n- Step 3: Each of these is a different angle on the same idea: $$\\mathbf{A}$$ doesn't collapse any direction.\n\nStrategic insight: in problems, look for whichever condition is easiest to verify given the form of $$\\mathbf{A}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_83"}, {"question": "A reflection matrix $$\\mathbf{M}$$ in the plane has eigenvalues 1 and -1. What's the geometric meaning of each eigenvalue and its corresponding eigenvector?", "answer": "- Step 1: Eigenvalue $$\\lambda = 1$$: the corresponding eigenvector points along the **mirror line** (axis of reflection) — it's fixed by the reflection.\n- Step 2: Eigenvalue $$\\lambda = -1$$: the corresponding eigenvector is **perpendicular to the mirror line** — reflection flips it to the opposite side, multiplying by $$-1$$.\n- Step 3: This decomposition reveals the structure: a reflection is the simplest non-trivial example of a symmetric matrix and beautifully illustrates the eigen-decomposition idea — every direction is a mix of \"stay\" (along mirror) and \"flip\" (perpendicular to mirror).\n\nFor 3D reflection in a plane $$\\Pi$$: eigenvalue 1 has eigenspace = $$\\Pi$$ (2D), eigenvalue $$-1$$ has eigenspace = normal to $$\\Pi$$ (1D).", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "A $$3 \\times 3$$ matrix has its second row equal to twice its first row. Without computing, what can you say about its determinant, and why? (3 steps)", "answer": "- Step 1: When two rows are proportional (one is a scalar multiple of the other), the determinant is zero. The matrix is singular.\n- Step 2: Geometrically, the rows of a matrix span certain directions. If two rows are proportional, they point along the same line — so the three rows together can span at most a 2D plane, not 3D space. The transformation crushes 3D into 2D, giving zero volume.\n- Step 3: This generalises: any time the rows (or columns) are linearly dependent, the determinant vanishes. So you can sometimes spot a singular matrix without doing arithmetic — just check for proportional rows/columns.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "How do you find the power of a matrix using diagonalisation? Explain the process.", "answer": "- If A = PDP^T where D is diagonal with eigenvalues λ₁, λ₂, λ₃ on diagonal, then A² = (PDP^T)(PDP^T) = PD(P^TP)DP^T = PD²P^T.\n\n- In general, A^n = PD^nP^n = PD^nP^T (since orthogonal: P^T = P^-1). D^n is just diagonal with λᵢ^n.\n\nThis is much easier than repeated matrix multiplication! Example: for eigenvalues 2, -1, 3, A¹⁰ has eigenvalues 2¹⁰ = 1024, (-1)¹⁰ = 1, and 3¹⁰ = 59049.", "source": "MiniMax ①", "_id": "minimax_1_48"}, {"question": "Why does the definition of an eigenvector explicitly require $$\\mathbf{x} \\neq \\mathbf{0}$$? What goes wrong if we allow zero? (3 steps)", "answer": "- Step 1: If $$\\mathbf{x} = \\mathbf{0}$$, then $$\\mathbf{A}\\mathbf{x} = \\mathbf{A}\\mathbf{0} = \\mathbf{0}$$, and $$\\lambda \\mathbf{x} = \\lambda \\mathbf{0} = \\mathbf{0}$$ for any $$\\lambda$$.\n- Step 2: So the equation $$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$$ is trivially satisfied by $$\\mathbf{x} = \\mathbf{0}$$ for every value of $$\\lambda$$ — the zero vector would be an \"eigenvector\" with every possible eigenvalue, which is meaningless.\n- Step 3: Excluding $$\\mathbf{x} = \\mathbf{0}$$ ensures eigenvectors actually point in some direction, and that the eigenvalue $$\\lambda$$ is uniquely associated with a non-trivial direction. Note: $$\\lambda = 0$$ IS allowed (it means the transformation crushes that direction to zero).", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "Why does the diagonalisation formula $$\\mathbf{P}^T \\mathbf{A} \\mathbf{P} = \\mathbf{D}$$ work? What is $\\mathbf{P}$ actually doing conceptually? (3 steps)", "answer": "- Step 1: The matrix $\\mathbf{P}$ represents a change of basis from the standard coordinate axes to a new coordinate system aligned with the eigenvectors.\n- Step 2: In the standard basis, the transformation $\\mathbf{A}$ involves a complex mix of scaling and shearing that isn't aligned with the axes, resulting in non-zero off-diagonal elements.\n- Step 3: When viewed from the perspective of the eigenvector basis (which is what multiplying by $$\\mathbf{P}^T$$ and $\\mathbf{P}$ achieves), the transformation simply scales along those new axes by the eigenvalues. This pure scaling along axes is exactly what a diagonal matrix represents.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "When forming an orthogonal matrix $$\\mathbf{P}$$ from normalized eigenvectors, why does the **order of columns** matter for the diagonal matrix $$\\mathbf{D}$$ but not the transformation it represents?", "answer": "- Step 1: Each column of $$\\mathbf{P}$$ corresponds to one eigenvector with its eigenvalue. The position of the column in $$\\mathbf{P}$$ determines where the eigenvalue appears on the diagonal of $$\\mathbf{D}$$.\n- Step 2: Specifically, if the $$i$$-th column is the eigenvector for eigenvalue $$\\lambda_i$$, then $$\\mathbf{D}$$ has $$\\lambda_i$$ in the $$(i,i)$$ position.\n- Step 3: Reordering columns of $$\\mathbf{P}$$ gives a different (but equivalent) diagonalization — the same matrix $$\\mathbf{A}$$ is being diagonalized, just with eigenvalues in a different order on $$\\mathbf{D}$$.\n\nSo the diagonalization is unique up to ordering of eigenvalues (and signs of eigenvectors). The underlying decomposition is the same.", "source": "Opus 4.7 ①", "_id": "opus_1_87"}, {"question": "What deep reason explains the alternating $$+, -, +, -, \\ldots$$ sign pattern that appears in cofactor expansion? (3 steps)", "answer": "- Step 1: The sign for the entry at row $$i$$, column $$j$$ is $$(-1)^{i+j}$$. So $$(1,1)$$ gives $$+$$, $$(1,2)$$ gives $$-$$, $$(1,3)$$ gives $$+$$, etc., creating a checkerboard pattern.\n- Step 2: This pattern arises because the determinant counts signed volumes — orientations matter. Swapping two rows/columns flips orientation (negates the determinant), and the alternating signs are exactly what makes the cofactor expansion respect this anti-symmetry property.\n- Step 3: Practically, the sign pattern $$\\begin{pmatrix} + & - & + \\\\ - & + & - \\\\ + & - & + \\end{pmatrix}$$ governs every cofactor — not just first-row expansion. You can expand along any row or column, and the determinant value is the same.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "Construct a $$2 \\times 2$$ matrix that has $$\\binom{1}{2}$$ as an eigenvector with eigenvalue 5, by reading off the action on basis vectors. (3 steps)", "answer": "- Step 1: We need $$\\mathbf{T}\\binom{1}{2} = 5\\binom{1}{2} = \\binom{5}{10}$$. Many matrices work — one constraint doesn't pin down four matrix entries.\n- Step 2: Pick a complementary direction. Suppose we declare $$\\binom{1}{0}$$ is also an eigenvector with eigenvalue 1: $$\\mathbf{T}\\binom{1}{0} = \\binom{1}{0}$$.\n- Step 3: From the second condition, the first column of $$\\mathbf{T}$$ is $$\\binom{1}{0}$$. Let the second column be $$\\binom{a}{b}$$. Then $$\\mathbf{T}\\binom{1}{2} = \\binom{1}{0} + 2\\binom{a}{b} = \\binom{1+2a}{2b}$$, which must equal $$\\binom{5}{10}$$. So $$a = 2$$, $$b = 5$$. Matrix: $$\\begin{pmatrix} 1 & 2 \\\\ 0 & 5 \\end{pmatrix}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_66"}, {"question": "Compute the eigenvalues of $$\\begin{pmatrix} 4 & -1 \\\\ -1 & 4 \\end{pmatrix}$$ without expanding the full quadratic from scratch — use trace and determinant. (3 steps)", "answer": "- Step 1: For a $$2\\times 2$$ matrix, the characteristic equation is $$\\lambda^2 - (\\text{trace})\\lambda + (\\text{det}) = 0$$.\n- Step 2: Trace $$= 4 + 4 = 8$$, determinant $$= (4)(4) - (-1)(-1) = 16 - 1 = 15$$. So the equation is $$\\lambda^2 - 8\\lambda + 15 = 0$$.\n- Step 3: Factor: $$(\\lambda - 3)(\\lambda - 5) = 0$$, giving eigenvalues $$\\lambda = 3$$ and $$\\lambda = 5$$.\n\nThis shortcut uses the deep facts trace = sum of eigenvalues and det = product of eigenvalues. Sanity check: $$3 + 5 = 8$$ ✓ and $$3 \\times 5 = 15$$ ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "What is the minor of an entry in a $$3 \\times 3$$ matrix, and how is it different from the cofactor of that entry? (3 steps)", "answer": "- Step 1: The minor of the entry at row $$i$$, column $$j$$ is the determinant of the $$2 \\times 2$$ matrix you get by deleting row $$i$$ and column $$j$$.\n- Step 2: The cofactor is the minor multiplied by $$(-1)^{i+j}$$ — it's the minor with the sign attached according to the alternating $$+, -, +$$ pattern.\n- Step 3: So: cofactor = signed minor.\n+ At positions where the sign pattern shows $$+$$, cofactor = minor.\n+ At positions where the sign pattern shows $$-$$, cofactor = $$-1 \\times$$ minor.\n+ Cofactors are what you sum (with row entries) when expanding determinants and what you assemble for the inverse.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "If you know that (AB)^T = B^T A^T, explain why this identity is always true, while (AB)^(-1) = B^(-1)A^(-1) requires non-singularity.", "answer": "The transpose identity (AB)^T = B^T A^T holds for any matrices where AB exists because it's a property of how matrix multiplication works element-wise. It doesn't require any conditions on the matrices.\n\nHowever, the inverse identity (AB)^(-1) = B^(-1)A^(-1) requires A and B to be non-singular (invertible). If either A or B is singular (det = 0), then AB may also be singular, and the inverse doesn't exist. The inverse property fails because division by zero would be needed. In essence, transpose always exists, but inverse only exists for non-singular matrices.", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "The matrix $$\\mathbf{T}$$ has det = 0 and represents a transformation. The line $$l_1$$ passes through the origin. Under what condition is the image of $$l_1$$ a single point rather than a line?", "answer": "- Step 1: The image of $$l_1: \\mathbf{r} = t\\mathbf{d}$$ is $$\\mathbf{r}' = t\\mathbf{T}\\mathbf{d}$$.\n- Step 2: This is a line through the origin if $$\\mathbf{T}\\mathbf{d} \\neq \\mathbf{0}$$.\n- Step 3: It collapses to a single point (the origin) when $$\\mathbf{T}\\mathbf{d} = \\mathbf{0}$$ — that is, when $$\\mathbf{d}$$ is an eigenvector of $$\\mathbf{T}$$ with eigenvalue 0 (in the \"null space\" of $$\\mathbf{T}$$).\n\nGeometric picture: the singular transformation has a \"kernel direction\" along which it crushes everything to zero. Lines along that direction collapse; lines transverse to it remain lines.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "State the rule for the transpose of a matrix product, and explain intuitively why the order reverses.", "answer": "- Step 1: The rule is $$(\\mathbf{AB})^\\top = \\mathbf{B}^\\top \\mathbf{A}^\\top$$ — the transpose of a product equals the product of transposes **in reversed order**.\n- Step 2: Intuitively, think of $$\\mathbf{AB}$$ as \"first apply $$\\mathbf{B}$$, then apply $$\\mathbf{A}$$.\" When you transpose, you're flipping the underlying structure, which reverses the sequence.\n- Step 3: Algebraically: the $$(i,j)$$ entry of $$(\\mathbf{AB})^\\top$$ is the $$(j,i)$$ entry of $$\\mathbf{AB}$$, which is row $$j$$ of $$\\mathbf{A}$$ dotted with column $$i$$ of $$\\mathbf{B}$$. This equals column $$j$$ of $$\\mathbf{A}^\\top$$ dotted with row $$i$$ of $$\\mathbf{B}^\\top$$ — exactly the $$(i,j)$$ entry of $$\\mathbf{B}^\\top \\mathbf{A}^\\top$$.\n\nThis same \"order reversal\" pattern shows up for inverses too: $$(\\mathbf{AB})^{-1} = \\mathbf{B}^{-1} \\mathbf{A}^{-1}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "What's the relationship between **eigenvalues of a triangular matrix** and its **diagonal entries**? Why is this useful?", "answer": "- Step 1: For an upper- or lower-triangular matrix, the **eigenvalues are exactly the diagonal entries**.\n- Step 2: Why: the determinant of a triangular matrix is the product of its diagonal entries. The characteristic polynomial $$\\det(\\mathbf{A} - \\lambda \\mathbf{I})$$ involves $$\\mathbf{A} - \\lambda \\mathbf{I}$$, which is also triangular, with diagonal entries $$a_{ii} - \\lambda$$. So the determinant is $$\\prod_i(a_{ii} - \\lambda)$$.\n- Step 3: Setting this to zero gives $$\\lambda = a_{ii}$$ for each $$i$$ — the diagonal entries are precisely the roots of the characteristic equation.\n\nWhy useful: triangular matrices are easy to work with, and this fact lets you read off eigenvalues without any computation. Diagonal matrices are a special case (they're triangular).", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "When solving $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ for an eigenvector, suppose you find that ALL three equations give \"0 = 0\" (no information). What does this mean and what should you do? (3 steps)", "answer": "- Step 1: All three equations being trivial means $$(\\mathbf{A} - \\lambda\\mathbf{I})$$ is the zero matrix. So $$\\mathbf{A} = \\lambda \\mathbf{I}$$ — the original matrix is a scalar multiple of the identity.\n- Step 2: In that case, every non-zero vector is an eigenvector with eigenvalue $$\\lambda$$. The eigenspace is all of $$\\mathbb{R}^3$$.\n- Step 3: This is rare and only happens for very special matrices ($$\\mathbf{A} = c\\mathbf{I}$$ for some $$c$$). You can pick any three linearly independent vectors as eigenvectors — the standard basis vectors are the simplest choice. The matrix is \"trivially diagonalisable\" because it's already a scaled identity.", "source": "Opus 4.7 ②", "_id": "opus_2_74"}, {"question": "For matrices $$\\mathbf{A}$$ ($$n \\times m$$) and $$\\mathbf{B}$$ ($$m \\times p$$), state the rule connecting $$(\\mathbf{A}\\mathbf{B})^\\top$$ to the transposes of $$\\mathbf{A}$$ and $$\\mathbf{B}$$. (3 steps)", "answer": "- Step 1: The rule is $$(\\mathbf{A}\\mathbf{B})^\\top = \\mathbf{B}^\\top \\mathbf{A}^\\top$$. Notice the order is reversed — this is essential.\n- Step 2: The dimension check makes the order forced: $$\\mathbf{A}\\mathbf{B}$$ is $$n \\times p$$, so $$(\\mathbf{A}\\mathbf{B})^\\top$$ is $$p \\times n$$. We need $$p \\times n$$ on the right too. $$\\mathbf{B}^\\top$$ is $$p \\times m$$ and $$\\mathbf{A}^\\top$$ is $$m \\times n$$, so $$\\mathbf{B}^\\top \\mathbf{A}^\\top$$ is $$p \\times n$$ ✓. The reversed order $$\\mathbf{A}^\\top \\mathbf{B}^\\top$$ wouldn't even multiply ($$m \\times n$$ times $$p \\times m$$ is invalid).\n- Step 3: Conceptually: transposing flips the matrix, so when you transpose a product, the rightmost factor is \"now reached first\" — the order has to flip too.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "What two properties define a linear transformation $$T: \\mathbb{R}^3 \\to \\mathbb{R}^3$$, and why are they enough to fully determine $$T$$ from its action on three special vectors? (3 steps)", "answer": "- Step 1: The two properties are:\n+ $$T(k\\mathbf{v}) = k T(\\mathbf{v})$$ for any scalar $$k$$ (homogeneity).\n+ $$T(\\mathbf{v}_1 + \\mathbf{v}_2) = T(\\mathbf{v}_1) + T(\\mathbf{v}_2)$$ (additivity).\n- Step 2: Together these say $$T$$ \"respects\" linear combinations: $$T(a\\mathbf{v}_1 + b\\mathbf{v}_2) = a T(\\mathbf{v}_1) + b T(\\mathbf{v}_2)$$. Knowing $$T$$ on a set of vectors immediately tells you $$T$$ on every linear combination of them.\n- Step 3: Any vector in $$\\mathbb{R}^3$$ can be written $$\\mathbf{v} = x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$$, so once you know $$T(\\mathbf{i})$$, $$T(\\mathbf{j})$$, $$T(\\mathbf{k})$$, you know $$T(\\mathbf{v}) = x T(\\mathbf{i}) + y T(\\mathbf{j}) + z T(\\mathbf{k})$$ for every $$\\mathbf{v}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "What is meant by \"mutually orthogonal\" for three vectors $$\\mathbf{x}_1, \\mathbf{x}_2, \\mathbf{x}_3$$, and why does the orthogonal matrix property require this? (3 steps)", "answer": "- Step 1: \"Mutually orthogonal\" means each pair is orthogonal: $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = 0$$, $$\\mathbf{x}_2 \\cdot \\mathbf{x}_3 = 0$$, $$\\mathbf{x}_1 \\cdot \\mathbf{x}_3 = 0$$.\n- Step 2: For an orthogonal $$3 \\times 3$$ matrix $$\\mathbf{M}$$ with normalised columns $$\\mathbf{x}_1, \\mathbf{x}_2, \\mathbf{x}_3$$, the entry $$(i,j)$$ of $$\\mathbf{M}^\\top \\mathbf{M}$$ is $$\\mathbf{x}_i \\cdot \\mathbf{x}_j$$.\n- Step 3: For $$\\mathbf{M}^\\top \\mathbf{M} = \\mathbf{I}$$: diagonal entries must be 1 ($$\\mathbf{x}_i \\cdot \\mathbf{x}_i = 1$$, i.e., unit length), and off-diagonal must be 0 ($$\\mathbf{x}_i \\cdot \\mathbf{x}_j = 0$$ for $$i \\neq j$$, i.e., mutually orthogonal). So orthogonal matrices have orthonormal column vectors.", "source": "Opus 4.7 ②", "_id": "opus_2_64"}, {"question": "For a singular $$3\\times 3$$ matrix $$\\mathbf{T}$$, the image of all of $$\\mathbb{R}^3$$ may collapse to a plane, line, or point. What determines which?", "answer": "- Step 1: The image is the column space of $$\\mathbf{T}$$ — the set of all linear combinations of the columns.\n- Step 2: The dimension of the image equals the **rank** of $$\\mathbf{T}$$, which is the number of linearly independent columns.\n+ Rank 3: full image, $$\\mathbf{T}$$ is non-singular.\n+ Rank 2: image is a 2D plane through origin.\n+ Rank 1: image is a 1D line through origin.\n+ Rank 0: only the zero vector (image is the origin) — happens only if $$\\mathbf{T} = \\mathbf{0}$$.\n- Step 3: For singular matrices (rank < 3), the geometry collapses: 3D space gets \"projected\" or \"squashed\" onto a lower-dimensional subspace.\n\nThis connects rank, eigenvalues (number of zero eigenvalues equals rank deficit), and singularity into one geometric story.", "source": "Opus 4.7 ①", "_id": "opus_1_70"}, {"question": "Why does the trace of $$\\mathbf{P}^{-1}\\mathbf{A}\\mathbf{P}$$ equal the trace of $$\\mathbf{A}$$ for any non-singular $$\\mathbf{P}$$? (Use the cyclic property of trace.) (3 steps)", "answer": "- Step 1: The cyclic property of trace says $$\\text{tr}(\\mathbf{X}\\mathbf{Y}) = \\text{tr}(\\mathbf{Y}\\mathbf{X})$$ for any matrices where the products are defined.\n- Step 2: Apply: $$\\text{tr}(\\mathbf{P}^{-1}\\mathbf{A}\\mathbf{P}) = \\text{tr}((\\mathbf{P}^{-1}\\mathbf{A})\\mathbf{P}) = \\text{tr}(\\mathbf{P}(\\mathbf{P}^{-1}\\mathbf{A})) = \\text{tr}(\\mathbf{P}\\mathbf{P}^{-1}\\mathbf{A}) = \\text{tr}(\\mathbf{I}\\mathbf{A}) = \\text{tr}(\\mathbf{A})$$.\n- Step 3: Consequence: when we diagonalize $$\\mathbf{A}$$ via $$\\mathbf{P}^{-1}\\mathbf{A}\\mathbf{P} = \\mathbf{D}$$, the trace of $$\\mathbf{D}$$ (sum of eigenvalues) equals the trace of $$\\mathbf{A}$$ (sum of diagonal entries of $$\\mathbf{A}$$).\n\nSo: **trace = sum of eigenvalues** — a powerful invariant under change of basis.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "A $$3 \\times 3$$ matrix $$\\mathbf{A}$$ has eigenvalues $$\\lambda_1, \\lambda_2, \\lambda_3$$. Explain (without computing) why $$\\det(\\mathbf{A}) = \\lambda_1 \\lambda_2 \\lambda_3$$. (3 steps)", "answer": "- Step 1: The characteristic polynomial of $$\\mathbf{A}$$ factors as $$-(\\lambda - \\lambda_1)(\\lambda - \\lambda_2)(\\lambda - \\lambda_3) = \\det(\\mathbf{A} - \\lambda\\mathbf{I})$$.\n- Step 2: Set $$\\lambda = 0$$: $$\\det(\\mathbf{A} - 0 \\cdot \\mathbf{I}) = \\det(\\mathbf{A})$$. The characteristic polynomial at $$\\lambda = 0$$ gives $$-(0 - \\lambda_1)(0 - \\lambda_2)(0 - \\lambda_3) = -(-\\lambda_1)(-\\lambda_2)(-\\lambda_3) = \\lambda_1 \\lambda_2 \\lambda_3$$ (the negatives cancel).\n- Step 3: So $$\\det(\\mathbf{A}) = \\lambda_1 \\lambda_2 \\lambda_3$$ — the determinant is the product of eigenvalues. This works for any $$n$$. It also explains why singular matrices have at least one zero eigenvalue (the product is zero only if a factor is zero).", "source": "Opus 4.7 ②", "_id": "opus_2_71"}, {"question": "A matrix M satisfies MM^T = kI for some scalar k. What type of matrix is M? What does this mean about its columns?", "answer": "- If MM^T = kI (not necessarily k=1), M is a scaled orthogonal matrix (sometimes called a conformal matrix). If k = 1, M is orthogonal.\n\n- The columns of M are orthogonal to each other, but each has magnitude √k. If you divide M by √k, you get an orthogonal matrix.\n\n- This is useful because M preserves angles but scales lengths by √k. Geometrically, it's a rotation combined with uniform scaling.\n\nThis property appears in problems involving reflections and rotations in higher dimensions.", "source": "MiniMax ①", "_id": "minimax_1_35"}, {"question": "Explain why, for an orthogonal matrix $$\\mathbf{M}$$, $$\\det(\\mathbf{M}) = \\pm 1$$. (3 steps)", "answer": "- Step 1: From the defining property $$\\mathbf{M}\\mathbf{M}^\\top = \\mathbf{I}$$, take determinants of both sides: $$\\det(\\mathbf{M}\\mathbf{M}^\\top) = \\det(\\mathbf{I}) = 1$$.\n- Step 2: Use the rules $$\\det(\\mathbf{A}\\mathbf{B}) = \\det(\\mathbf{A})\\det(\\mathbf{B})$$ and $$\\det(\\mathbf{A}^\\top) = \\det(\\mathbf{A})$$: $$\\det(\\mathbf{M}) \\cdot \\det(\\mathbf{M}) = 1$$, i.e., $$\\det(\\mathbf{M})^2 = 1$$.\n- Step 3: So $$\\det(\\mathbf{M}) = \\pm 1$$. Geometrically: orthogonal matrices represent rotations ($$\\det = +1$$, orientation-preserving) or rotations combined with reflections ($$\\det = -1$$, orientation-reversing). They never scale volume.", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "When you diagonalise a symmetric matrix as $$\\mathbf{D} = \\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$, what guarantees that $$\\mathbf{D}$$ really is diagonal, and what are its diagonal entries? (3 steps)", "answer": "- Step 1: $$\\mathbf{D}$$ being diagonal isn't accidental — it's forced by the structure: $$\\mathbf{P}$$'s columns are eigenvectors $$\\mathbf{x}_1, \\mathbf{x}_2, \\mathbf{x}_3$$, and $$\\mathbf{A}\\mathbf{x}_i = \\lambda_i \\mathbf{x}_i$$.\n- Step 2: So $$\\mathbf{A}\\mathbf{P}$$'s columns are $$\\lambda_1 \\mathbf{x}_1, \\lambda_2 \\mathbf{x}_2, \\lambda_3 \\mathbf{x}_3$$. Then the $$(i,j)$$ entry of $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$ is $$\\mathbf{x}_i \\cdot \\lambda_j \\mathbf{x}_j = \\lambda_j (\\mathbf{x}_i \\cdot \\mathbf{x}_j)$$.\n- Step 3: Since the eigenvectors are orthonormal: $$\\mathbf{x}_i \\cdot \\mathbf{x}_j = 0$$ for $$i \\neq j$$ (off-diagonal vanishes!), and $$\\mathbf{x}_i \\cdot \\mathbf{x}_i = 1$$ (diagonal entry is $$\\lambda_i$$). Result: $$\\mathbf{D} = \\text{diag}(\\lambda_1, \\lambda_2, \\lambda_3)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "What's the difference between an \"invariant line\" and a \"line of invariant points\", and what eigenvalue corresponds to each? (3 steps)", "answer": "- Step 1: An invariant line: every point on it maps to some point on the line (the line as a whole stays put, but individual points might slide along it). This requires the line's direction to be an eigenvector with any non-zero eigenvalue $$\\lambda$$.\n- Step 2: A line of invariant points: every point on it maps to itself — points don't move at all. This requires $$T(\\mathbf{v}) = \\mathbf{v}$$, i.e., $$\\lambda = 1$$.\n+ The eigenvalue $$\\lambda = 1$$ is the special case making points truly fixed, not just constrained to the line.\n- Step 3: So: any eigenvalue gives an invariant line; only eigenvalue $$1$$ gives a line of invariant points. Other eigenvalues stretch ($$|\\lambda| > 1$$), shrink ($$|\\lambda| < 1$$), or reflect through origin ($$\\lambda < 0$$) along the invariant line.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "A symmetric $$3\\times 3$$ matrix is diagonalized as $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P} = \\mathbf{D} = \\text{diag}(2, 5, 8)$$. Without computing $$\\mathbf{A}$$, what are its eigenvalues, eigenvectors (in some sense), determinant, and trace?", "answer": "- Step 1: **Eigenvalues**: directly read off the diagonal of $$\\mathbf{D}$$: $$2, 5, 8$$.\n- Step 2: **Eigenvectors**: the columns of $$\\mathbf{P}$$ are the normalized eigenvectors. The first column corresponds to eigenvalue 2, second to 5, third to 8 (or whatever order matches $$\\mathbf{D}$$).\n- Step 3: **Determinant**: product of eigenvalues = $$2 \\times 5 \\times 8 = 80$$. **Trace**: sum of eigenvalues = $$2 + 5 + 8 = 15$$.\n\nConceptual upshot: diagonalization compresses all the eigen-information into clean form. From $$\\mathbf{D}$$ alone you get eigenvalues; from $$\\mathbf{P}$$ you get eigenvectors; combined they give you everything about $$\\mathbf{A}$$ that matters for spectral analysis.", "source": "Opus 4.7 ①", "_id": "opus_1_74"}, {"question": "If you apply transformation T (matrix T) to a plane, how can you find the image plane's equation? (3 steps)", "answer": "- Step 1: Write the plane in parametric form: r = a + su + tv, where a is a point on the plane, u and v are direction vectors.\n\n- Step 2: Apply T to this: r' = T(a) + sT(u) + tT(v). This is the parametric equation of the image plane.\n\n- Step 3: To find Cartesian form, find a normal vector by crossing the transformed direction vectors: n' = T(u) × T(v). Then the plane equation is n' · (r - T(a)) = 0.\n\nThe transformation preserves (or collapses) planes - it never creates a curved surface!", "source": "MiniMax ①", "_id": "minimax_1_36"}, {"question": "A matrix $$\\mathbf{A}$$ has determinant 5, and matrix $$\\mathbf{B}$$ has determinant -3. What is $$\\det(\\mathbf{AB})$$, and what is $$\\det(\\mathbf{B}^\\top \\mathbf{A}^{-1})$$? Reason without computing matrix products. (3 steps)", "answer": "- Step 1: Use $$\\det(\\mathbf{AB}) = \\det(\\mathbf{A})\\det(\\mathbf{B}) = 5 \\times (-3) = -15$$.\n- Step 2: For $$\\det(\\mathbf{B}^\\top \\mathbf{A}^{-1})$$, apply: $$\\det(\\mathbf{B}^\\top) = \\det(\\mathbf{B}) = -3$$, and $$\\det(\\mathbf{A}^{-1}) = \\frac{1}{\\det(\\mathbf{A})} = \\frac{1}{5}$$.\n- Step 3: Multiply: $$\\det(\\mathbf{B}^\\top \\mathbf{A}^{-1}) = (-3)\\left(\\frac{1}{5}\\right) = -\\frac{3}{5}$$.\n\nThe takeaway: determinants compose multiplicatively across products, transposes, and inverses — so you can chain calculations purely with scalar arithmetic.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "Suppose $$\\mathbf{A}$$ has eigenvalue $$\\lambda$$ and corresponding eigenvector $$\\mathbf{x}$$. What's the geometric meaning of $$|\\lambda| > 1$$, $$|\\lambda| < 1$$, $$\\lambda < 0$$, and $$\\lambda = 0$$?", "answer": "- Step 1: $$|\\lambda| > 1$$: $$\\mathbf{A}$$ **stretches** in the direction of $$\\mathbf{x}$$ — vectors along $$\\mathbf{x}$$ get longer.\n- Step 2: $$|\\lambda| < 1$$ (and $$\\lambda \\neq 0$$): $$\\mathbf{A}$$ **contracts** in this direction — vectors get shorter but keep their direction (or reverse).\n- Step 3: $$\\lambda < 0$$: the eigenvector gets **flipped** to the opposite direction (with stretch/contract by $$|\\lambda|$$).\n- Step 4: $$\\lambda = 0$$: the eigenvector gets **collapsed to the zero vector** — this direction is in the \"kernel\" (null space) of $$\\mathbf{A}$$, and $$\\mathbf{A}$$ is singular.\n\nSo the eigenvalue's sign and magnitude give a complete geometric picture along that direction: stretch/contract/flip/collapse.", "source": "Opus 4.7 ①", "_id": "opus_1_79"}, {"question": "Why is using normalized eigenvectors essential for the diagonalization procedure to give a **diagonal** matrix (not just a \"diagonal-up-to-scaling\" one)?", "answer": "- Step 1: If we use un-normalized eigenvectors $$\\mathbf{y}_i$$ as columns of $$\\mathbf{P}$$, the columns are still orthogonal (for distinct eigenvalues of a symmetric matrix), but not necessarily of unit length.\n- Step 2: When we compute $$\\mathbf{P}^\\top \\mathbf{P}$$, instead of getting $$\\mathbf{I}$$, we get
