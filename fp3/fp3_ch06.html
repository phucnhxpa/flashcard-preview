}$$ is singular would require explicitly multiplying matrices and computing a new determinant. With it: just multiply two scalars.\n- Step 3: It also implies:\n+ If either $$\\mathbf{A}$$ or $$\\mathbf{B}$$ is singular, so is $$\\mathbf{AB}$$ (singularity is contagious).\n+ $$\\det(\\mathbf{A}^{-1}) = \\frac{1}{\\det(\\mathbf{A})}$$, since $$\\det(\\mathbf{A}\\mathbf{A}^{-1}) = \\det(\\mathbf{I}) = 1$$.\n+ $$\\det(\\mathbf{A}^n) = (\\det\\mathbf{A})^n$$.\n\nThese are foundational facts that all rest on the multiplicative property — without it, determinant theory would be a mess.", "source": "Opus 4.7 ①", "_id": "opus_1_81", "judge_pick": true}, {"question": "Write $$\\binom{x}{y}$$ as a linear combination of two non-parallel eigenvectors of a $$2\\times 2$$ matrix. Why is this useful for computing $$\\mathbf{A}^n \\binom{x}{y}$$?", "answer": "- Step 1: Suppose eigenvectors are $$\\mathbf{v}_1$$ (eigenvalue $$\\lambda_1$$) and $$\\mathbf{v}_2$$ (eigenvalue $$\\lambda_2$$), and they are linearly independent. Then any vector can be written as $$\\binom{x}{y} = a\\mathbf{v}_1 + b\\mathbf{v}_2$$ for some scalars $$a, b$$.\n- Step 2: Then $$\\mathbf{A}\\binom{x}{y} = a\\mathbf{A}\\mathbf{v}_1 + b\\mathbf{A}\\mathbf{v}_2 = a\\lambda_1 \\mathbf{v}_1 + b\\lambda_2 \\mathbf{v}_2$$.\n- Step 3: Iterating: $$\\mathbf{A}^n \\binom{x}{y} = a\\lambda_1^n \\mathbf{v}_1 + b\\lambda_2^n \\mathbf{v}_2$$. Computing high powers becomes trivial — just take powers of scalars!\n\nThis is the foundation of solving linear recurrences, modeling population dynamics, and analyzing long-term behavior of dynamical systems. The eigenvector basis is the natural one for understanding the matrix's behavior over many iterations.", "source": "Opus 4.7 ①", "_id": "opus_1_82", "judge_pick": true}, {"question": "A matrix $$\\mathbf{A}$$ is given. Without computing the inverse, when can you immediately conclude $$\\mathbf{A}^{-1}$$ exists? List three quick sufficient conditions.", "answer": "- Step 1: $$\\mathbf{A}$$ is **non-singular**, i.e., $$\\det(\\mathbf{A}) \\neq 0$$. This is the necessary and sufficient condition.\n- Step 2: Three quick sufficient checks:\n+ All **eigenvalues are non-zero** (since $$\\det\\mathbf{A} = \\prod \\lambda_i$$).\n+ The **rows (or columns) are linearly independent** — no row is a linear combination of others.\n+ $$\\mathbf{A}\\mathbf{A}^\\top$$ or $$\\mathbf{A}^\\top \\mathbf{A}$$ is a positive scalar multiple of the identity (then $$\\mathbf{A}$$ is essentially orthogonal).\n- Step 3: Each of these is a different angle on the same idea: $$\\mathbf{A}$$ doesn't collapse any direction.\n\nStrategic insight: in problems, look for whichever condition is easiest to verify given the form of $$\\mathbf{A}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_83", "judge_pick": true}, {"question": "A $$2\\times 2$$ matrix has only **one** invariant line through the origin (just one eigenvalue or coincident eigenvectors). Geometrically, what kinds of transformations have this property?", "answer": "- Step 1: Two cases lead to fewer than two invariant lines:\n+ **Repeated eigenvalue with only one eigenvector direction** (defective matrix): a single invariant line exists. Example: shear $$\\begin{pmatrix} 1 & 1 \\\\ 0 & 1 \\end{pmatrix}$$ — invariant line is the x-axis.\n+ **Complex eigenvalues**: no real eigenvectors at all, so no invariant lines. Example: rotation $$\\begin{pmatrix} \\cos\\theta & -\\sin\\theta \\\\ \\sin\\theta & \\cos\\theta \\end{pmatrix}$$ for $$\\theta \\neq 0, \\pi$$.\n- Step 2: For a matrix with one invariant line: think shears, glide-reflections, or rotations combined with scaling along one direction.\n- Step 3: Two distinct invariant lines = two distinct real eigenvalues = \"decomposable\" stretching transformation. Zero invariant lines = pure rotation.\n\nThis makes the eigenvalue/eigenvector picture a complete classification of $$2\\times 2$$ transformations geometrically.", "source": "Opus 4.7 ①", "_id": "opus_1_84", "judge_pick": true}, {"question": "Why is the determinant of an orthogonal matrix always $$\\pm 1$$? Distinguish between the two cases geometrically.", "answer": "- Step 1: For orthogonal $$\\mathbf{M}$$: $$\\mathbf{M}\\mathbf{M}^\\top = \\mathbf{I}$$. Take determinants: $$\\det(\\mathbf{M})\\det(\\mathbf{M}^\\top) = \\det(\\mathbf{I}) = 1$$.\n- Step 2: Since $$\\det(\\mathbf{M}^\\top) = \\det(\\mathbf{M})$$, we get $$(\\det\\mathbf{M})^2 = 1$$, so $$\\det\\mathbf{M} = \\pm 1$$.\n- Step 3: Geometric meaning:\n+ $$\\det\\mathbf{M} = +1$$: orientation-preserving — a **pure rotation** (no flip).\n+ $$\\det\\mathbf{M} = -1$$: orientation-reversing — a **reflection** or improper rotation.\n\nSo orthogonal matrices preserve lengths and angles, and the sign of $$\\det$$ tells you whether they preserve or reverse handedness.", "source": "Opus 4.7 ①", "_id": "opus_1_85", "judge_pick": false}, {"question": "A symmetric $$3\\times 3$$ matrix has all positive eigenvalues. What does this tell you about the corresponding quadratic form $$\\mathbf{x}^\\top \\mathbf{A}\\mathbf{x}$$?", "answer": "- Step 1: Diagonalize: $$\\mathbf{A} = \\mathbf{P}\\mathbf{D}\\mathbf{P}^\\top$$. Substitute: $$\\mathbf{x}^\\top \\mathbf{A}\\mathbf{x} = \\mathbf{x}^\\top \\mathbf{P}\\mathbf{D}\\mathbf{P}^\\top \\mathbf{x} = (\\mathbf{P}^\\top \\mathbf{x})^\\top \\mathbf{D} (\\mathbf{P}^\\top \\mathbf{x})$$.\n- Step 2: Let $$\\mathbf{y} = \\mathbf{P}^\\top \\mathbf{x}$$. Then $$\\mathbf{x}^\\top \\mathbf{A}\\mathbf{x} = \\mathbf{y}^\\top \\mathbf{D}\\mathbf{y} = \\lambda_1 y_1^2 + \\lambda_2 y_2^2 + \\lambda_3 y_3^2$$.\n- Step 3: If all $$\\lambda_i > 0$$, this expression is **always positive** for $$\\mathbf{x} \\neq \\mathbf{0}$$ — the matrix is **positive definite**. The quadratic form represents an ellipsoid; all level surfaces are bounded ellipsoids.\n\nThis is the foundation of stability analysis (positive-definite Hessians = local minima) and many statistical methods (covariance matrices).", "source": "Opus 4.7 ①", "_id": "opus_1_86", "judge_pick": true}, {"question": "When forming an orthogonal matrix $$\\mathbf{P}$$ from normalized eigenvectors, why does the **order of columns** matter for the diagonal matrix $$\\mathbf{D}$$ but not the transformation it represents?", "answer": "- Step 1: Each column of $$\\mathbf{P}$$ corresponds to one eigenvector with its eigenvalue. The position of the column in $$\\mathbf{P}$$ determines where the eigenvalue appears on the diagonal of $$\\mathbf{D}$$.\n- Step 2: Specifically, if the $$i$$-th column is the eigenvector for eigenvalue $$\\lambda_i$$, then $$\\mathbf{D}$$ has $$\\lambda_i$$ in the $$(i,i)$$ position.\n- Step 3: Reordering columns of $$\\mathbf{P}$$ gives a different (but equivalent) diagonalization — the same matrix $$\\mathbf{A}$$ is being diagonalized, just with eigenvalues in a different order on $$\\mathbf{D}$$.\n\nSo the diagonalization is unique up to ordering of eigenvalues (and signs of eigenvectors). The underlying decomposition is the same.", "source": "Opus 4.7 ①", "_id": "opus_1_87", "judge_pick": true}, {"question": "Imagine a transformation $$T$$ in 3D that has eigenvalues $$1, 1, 1$$ (all equal to 1). What are the possibilities for $$T$$, and how does the eigenvector structure tell you which?", "answer": "- Step 1: All eigenvalues equal to 1 means $$\\mathbf{T}\\mathbf{x} = \\mathbf{x}$$ along eigenvector directions — vectors are fixed.\n- Step 2: Possibilities:\n+ **Three independent eigenvectors**: $$\\mathbf{T} = \\mathbf{I}$$ (the identity transformation). Every vector is fixed.\n+ **Two independent eigenvectors**: a \"shear\" — fixes a 2D plane but slides points along it. Defective.\n+ **One independent eigenvector**: a more complex shear, fixing only a line. Highly defective.\n- Step 3: Distinguishing requires examining the **dimension of the eigenspace** for $$\\lambda = 1$$, equivalently the rank of $$\\mathbf{T} - \\mathbf{I}$$.\n\nJust knowing the eigenvalues isn't enough to identify the transformation — eigenvector structure (and possibly higher-order generalized eigenvectors) is needed.", "source": "Opus 4.7 ①", "_id": "opus_1_88", "judge_pick": true}, {"question": "A $$3\\times 3$$ matrix has all entries equal to $$\\frac{1}{3}$$. What are its eigenvalues? Reason without expanding the characteristic polynomial. (3 steps)", "answer": "- Step 1: The matrix is $$\\mathbf{A} = \\frac{1}{3}\\mathbf{J}$$ where $$\\mathbf{J}$$ is the all-ones matrix. The all-ones vector $$\\mathbf{1} = (1,1,1)^\\top$$ satisfies $$\\mathbf{A}\\mathbf{1} = \\frac{1}{3} \\cdot 3\\mathbf{1} = \\mathbf{1}$$. So $$\\lambda = 1$$ is an eigenvalue with eigenvector $$\\mathbf{1}$$.\n- Step 2: Any vector summing to zero (like $$(1, -1, 0)^\\top$$) has $$\\mathbf{A}\\mathbf{v} = \\mathbf{0}$$, so $$\\lambda = 0$$ is an eigenvalue. The set of such vectors is 2-dimensional (the plane perpendicular to $$\\mathbf{1}$$).\n- Step 3: So eigenvalues are $$1$$ (multiplicity 1) and $$0$$ (multiplicity 2). Total: $$1 + 0 + 0 = 1 = \\text{trace}$$ ✓; product $$= 0 = \\det$$ ✓.\n\nPattern recognition is faster than computation when you can spot eigenvectors directly.", "source": "Opus 4.7 ①", "_id": "opus_1_89", "judge_pick": true}], "count": 90}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What is the transpose $$\\mathbf{A}^\\top$$ of a matrix $$\\mathbf{A}$$, and what happens to its dimensions? (3 steps)", "answer": "- Step 1: The transpose is formed by interchanging rows and columns. The first row of $$\\mathbf{A}$$ becomes the first column of $$\\mathbf{A}^\\top$$, the second row becomes the second column, and so on.\n- Step 2: If $$\\mathbf{A}$$ has dimension $$n \\times m$$ (n rows, m columns), then $$\\mathbf{A}^\\top$$ has dimension $$m \\times n$$.\n+ A square matrix transposes to a square of the same size.\n+ A row vector ($$1 \\times n$$) transposes to a column vector ($$n \\times 1$$).\n- Step 3: The $$(i,j)$$ entry of $$\\mathbf{A}^\\top$$ equals the $$(j,i)$$ entry of $$\\mathbf{A}$$ — geometrically, transposing reflects entries across the main diagonal.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "What condition must a matrix satisfy to be called symmetric, and why does this only make sense for square matrices? (3 steps)", "answer": "- Step 1: A matrix $$\\mathbf{A}$$ is symmetric if $$\\mathbf{A} = \\mathbf{A}^\\top$$ — that is, swapping rows and columns leaves it unchanged.\n- Step 2: This requires the entry at row $$i$$, column $$j$$ to equal the entry at row $$j$$, column $$i$$, so the matrix is mirror-symmetric across the main diagonal.\n- Step 3: Only square matrices can be symmetric — if $$\\mathbf{A}$$ is $$n \\times m$$ with $$n \\neq m$$, then $$\\mathbf{A}^\\top$$ is $$m \\times n$$ — they don't even have the same shape, let alone the same entries.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Write down the general form of (a) a $$2 \\times 2$$ symmetric matrix and (b) a $$3 \\times 3$$ symmetric matrix, explaining what makes them symmetric. (3 steps)", "answer": "- Step 1: For $$2 \\times 2$$: $$\\begin{pmatrix} a & b \\\\ b & c \\end{pmatrix}$$. The off-diagonal entries match because position $$(1,2)$$ must equal position $$(2,1)$$.\n- Step 2: For $$3 \\times 3$$: $$\\begin{pmatrix} a & b & c \\\\ b & d & e \\\\ c & e & f \\end{pmatrix}$$. The three off-diagonal pairs $$(1,2)$$&$$(2,1)$$, $$(1,3)$$&$$(3,1)$$, $$(2,3)$$&$$(3,2)$$ each share a value.\n- Step 3: Diagonal entries can be anything — they're only constrained to equal themselves, which is trivial. So a $$3 \\times 3$$ symmetric matrix has $$6$$ independent entries (3 diagonal + 3 off-diagonal pairs), not 9.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "What is the $$3 \\times 3$$ identity matrix $$\\mathbf{I}$$, and what is special about how it interacts with other matrices and vectors? (3 steps)", "answer": "- Step 1: $$\\mathbf{I} = \\begin{pmatrix} 1 & 0 & 0 \\\\ 0 & 1 & 0 \\\\ 0 & 0 & 1 \\end{pmatrix}$$ — ones along the main diagonal, zeros everywhere else.\n- Step 2: For any compatible matrix $$\\mathbf{A}$$ or vector $$\\mathbf{v}$$: $$\\mathbf{I}\\mathbf{A} = \\mathbf{A}\\mathbf{I} = \\mathbf{A}$$ and $$\\mathbf{I}\\mathbf{v} = \\mathbf{v}$$. It's the multiplicative identity for matrices.\n- Step 3: Geometrically, multiplying by $$\\mathbf{I}$$ is the \"do nothing\" linear transformation — every basis vector maps to itself, so every point is fixed. It's the matrix-equivalent of the number $$1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "For matrices $$\\mathbf{A}$$ ($$n \\times m$$) and $$\\mathbf{B}$$ ($$m \\times p$$), state the rule connecting $$(\\mathbf{A}\\mathbf{B})^\\top$$ to the transposes of $$\\mathbf{A}$$ and $$\\mathbf{B}$$. (3 steps)", "answer": "- Step 1: The rule is $$(\\mathbf{A}\\mathbf{B})^\\top = \\mathbf{B}^\\top \\mathbf{A}^\\top$$. Notice the order is reversed — this is essential.\n- Step 2: The dimension check makes the order forced: $$\\mathbf{A}\\mathbf{B}$$ is $$n \\times p$$, so $$(\\mathbf{A}\\mathbf{B})^\\top$$ is $$p \\times n$$. We need $$p \\times n$$ on the right too. $$\\mathbf{B}^\\top$$ is $$p \\times m$$ and $$\\mathbf{A}^\\top$$ is $$m \\times n$$, so $$\\mathbf{B}^\\top \\mathbf{A}^\\top$$ is $$p \\times n$$ ✓. The reversed order $$\\mathbf{A}^\\top \\mathbf{B}^\\top$$ wouldn't even multiply ($$m \\times n$$ times $$p \\times m$$ is invalid).\n- Step 3: Conceptually: transposing flips the matrix, so when you transpose a product, the rightmost factor is \"now reached first\" — the order has to flip too.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "Why is $$\\mathbf{M}^\\top \\mathbf{M}$$ always a symmetric matrix, regardless of what $$\\mathbf{M}$$ is? (3 steps)", "answer": "- Step 1: Apply the rule $$(\\mathbf{A}\\mathbf{B})^\\top = \\mathbf{B}^\\top \\mathbf{A}^\\top$$ to $$\\mathbf{M}^\\top \\mathbf{M}$$: $$(\\mathbf{M}^\\top \\mathbf{M})^\\top = \\mathbf{M}^\\top (\\mathbf{M}^\\top)^\\top$$.\n- Step 2: Since $$(\\mathbf{M}^\\top)^\\top = \\mathbf{M}$$ (transposing twice returns the original), we get $$(\\mathbf{M}^\\top \\mathbf{M})^\\top = \\mathbf{M}^\\top \\mathbf{M}$$.\n- Step 3: A matrix that equals its own transpose is symmetric — so $$\\mathbf{M}^\\top \\mathbf{M}$$ is symmetric. The same argument shows $$\\mathbf{M}\\mathbf{M}^\\top$$ is symmetric. Useful structural fact: even if $$\\mathbf{M}$$ is rectangular and \"ugly\", you can always build a symmetric square matrix from it.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "If $$\\mathbf{M}$$ has dimension $$3 \\times 2$$, what are the dimensions of $$\\mathbf{M}^\\top \\mathbf{M}$$ and $$\\mathbf{M}\\mathbf{M}^\\top$$, and why are they different sizes? (3 steps)", "answer": "- Step 1: $$\\mathbf{M}$$ is $$3 \\times 2$$, so $$\\mathbf{M}^\\top$$ is $$2 \\times 3$$.\n- Step 2: $$\\mathbf{M}^\\top \\mathbf{M}$$: $$(2 \\times 3)(3 \\times 2) = 2 \\times 2$$. The \"inner\" dimensions (3 and 3) match and disappear; the \"outer\" dimensions (2 and 2) survive.\n- Step 3: $$\\mathbf{M}\\mathbf{M}^\\top$$: $$(3 \\times 2)(2 \\times 3) = 3 \\times 3$$. Same logic, but the surviving dimensions are now 3 and 3.\n+ Both products exist (matrix multiplication is well-defined).\n+ Both are symmetric.\n+ But they have different sizes — already showing matrix multiplication is non-commutative in a strong way.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "State the cofactor expansion formula for the determinant of $$\\mathbf{A} = \\begin{pmatrix} a & b & c \\\\ d & e & f \\\\ g & h & i \\end{pmatrix}$$ along the first row, and explain how each $$2 \\times 2$$ minor is obtained. (3 steps)", "answer": "- Step 1: The formula is $$\\det(\\mathbf{A}) = a\\begin{vmatrix} e & f \\\\ h & i \\end{vmatrix} - b\\begin{vmatrix} d & f \\\\ g & i \\end{vmatrix} + c\\begin{vmatrix} d & e \\\\ g & h \\end{vmatrix}$$.\n- Step 2: For each entry in the first row, you cross out the row and column it lies in, then the leftover $$2 \\times 2$$ block is its minor. For $$a$$ (row 1, col 1), cross out row 1 and col 1, leaving $$\\begin{pmatrix} e & f \\\\ h & i \\end{pmatrix}$$.\n- Step 3: The signs alternate $$+, -, +$$ across the first row. Notice the middle term has a minus — forgetting this is the most common source of error. The final value is a single number even though the input is a 9-entry array.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "What deep reason explains the alternating $$+, -, +, -, \\ldots$$ sign pattern that appears in cofactor expansion? (3 steps)", "answer": "- Step 1: The sign for the entry at row $$i$$, column $$j$$ is $$(-1)^{i+j}$$. So $$(1,1)$$ gives $$+$$, $$(1,2)$$ gives $$-$$, $$(1,3)$$ gives $$+$$, etc., creating a checkerboard pattern.\n- Step 2: This pattern arises because the determinant counts signed volumes — orientations matter. Swapping two rows/columns flips orientation (negates the determinant), and the alternating signs are exactly what makes the cofactor expansion respect this anti-symmetry property.\n- Step 3: Practically, the sign pattern $$\\begin{pmatrix} + & - & + \\\\ - & + & - \\\\ + & - & + \\end{pmatrix}$$ governs every cofactor — not just first-row expansion. You can expand along any row or column, and the determinant value is the same.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "What is a singular matrix, and what is its determinant? Conversely, what is a non-singular matrix? (3 steps)", "answer": "- Step 1: A singular matrix has $$\\det(\\mathbf{A}) = 0$$. A non-singular matrix has $$\\det(\\mathbf{A}) \\neq 0$$.\n- Step 2: Geometrically, singular means the linear transformation collapses volume to zero — it squashes 3D space onto a plane, line, or point. Non-singular means the transformation preserves dimensionality (volumes get scaled but not crushed).\n- Step 3: Practically, singular matrices have no inverse (you can't \"un-collapse\" something), while non-singular matrices have a unique inverse. Whether a matrix is singular determines whether systems $$\\mathbf{A}\\mathbf{x} = \\mathbf{b}$$ have unique solutions.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "What is the geometric/intuitive meaning of $$\\det(\\mathbf{A})$$ for a $$3 \\times 3$$ matrix representing a linear transformation? (3 steps)", "answer": "- Step 1: $$|\\det(\\mathbf{A})|$$ is the factor by which volumes scale under the transformation. A unit cube with volume 1 maps to a parallelepiped with volume $$|\\det(\\mathbf{A})|$$.\n- Step 2: The sign of $$\\det(\\mathbf{A})$$ encodes orientation:\n+ $$\\det > 0$$: orientation preserved (right-handed stays right-handed).\n+ $$\\det < 0$$: orientation flipped (like a reflection).\n+ $$\\det = 0$$: volume completely crushed — the transformation is non-invertible.\n- Step 3: This is why $$\\det(\\mathbf{A}\\mathbf{B}) = \\det(\\mathbf{A}) \\det(\\mathbf{B})$$ makes sense: applying $$\\mathbf{B}$$ scales volumes by $$\\det(\\mathbf{B})$$, then $$\\mathbf{A}$$ scales by $$\\det(\\mathbf{A})$$, total scaling is the product.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Without computing each side fully, explain why $$\\det(\\mathbf{A}^\\top) = \\det(\\mathbf{A})$$ should be expected. (3 steps)", "answer": "- Step 1: Cofactor expansion along the first row of $$\\mathbf{A}^\\top$$ uses the same entries as expansion along the first column of $$\\mathbf{A}$$ (since transposing swaps rows and columns).\n- Step 2: The determinant can be computed by expansion along any row OR any column with the same result. So expansion-along-row-of-$$\\mathbf{A}^\\top$$ equals expansion-along-column-of-$$\\mathbf{A}$$ equals $$\\det(\\mathbf{A})$$.\n- Step 3: Geometrically, transposing doesn't change the volume scaling factor — it changes which directions get sent where, but the overall stretching of volume is preserved.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Why does the property $$\\det(\\mathbf{A}\\mathbf{B}) = \\det(\\mathbf{A}) \\det(\\mathbf{B})$$ tell us that the product of two non-singular matrices is non-singular? (3 steps)", "answer": "- Step 1: If $$\\mathbf{A}$$ and $$\\mathbf{B}$$ are both non-singular, then $$\\det(\\mathbf{A}) \\neq 0$$ and $$\\det(\\mathbf{B}) \\neq 0$$.\n- Step 2: Therefore $$\\det(\\mathbf{A}\\mathbf{B}) = \\det(\\mathbf{A}) \\det(\\mathbf{B}) \\neq 0$$ (the product of two non-zero numbers is non-zero).\n- Step 3: A non-zero determinant means $$\\mathbf{A}\\mathbf{B}$$ is non-singular, so it has an inverse. Conversely: if either factor is singular, then $$\\det(\\mathbf{A}\\mathbf{B}) = 0$$, meaning the product is also singular — singularity is \"contagious\".", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "A $$3 \\times 3$$ matrix has its second row equal to twice its first row. Without computing, what can you say about its determinant, and why? (3 steps)", "answer": "- Step 1: When two rows are proportional (one is a scalar multiple of the other), the determinant is zero. The matrix is singular.\n- Step 2: Geometrically, the rows of a matrix span certain directions. If two rows are proportional, they point along the same line — so the three rows together can span at most a 2D plane, not 3D space. The transformation crushes 3D into 2D, giving zero volume.\n- Step 3: This generalises: any time the rows (or columns) are linearly dependent, the determinant vanishes. So you can sometimes spot a singular matrix without doing arithmetic — just check for proportional rows/columns.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Compute $$\\det\\begin{pmatrix} 2 & 0 & 1 \\\\ 0 & 3 & 0 \\\\ 1 & 0 & 2 \\end{pmatrix}$$ using cofactor expansion. (3 steps)", "answer": "- Step 1: Look for the row or column with the most zeros — row 2 has two zeros. Expand along row 2: $$\\det = -0 \\cdot (\\ldots) + 3 \\cdot \\begin{vmatrix} 2 & 1 \\\\ 1 & 2 \\end{vmatrix} - 0 \\cdot (\\ldots)$$.\n- Step 2: Compute the $$2 \\times 2$$ minor: $$\\begin{vmatrix} 2 & 1 \\\\ 1 & 2 \\end{vmatrix} = (2)(2) - (1)(1) = 3$$.\n- Step 3: So $$\\det = 3 \\cdot 3 = 9$$. Tip: always look for the row or column with the most zeros — you skip many calculations by leveraging zero entries.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "What is the minor of an entry in a $$3 \\times 3$$ matrix, and how is it different from the cofactor of that entry? (3 steps)", "answer": "- Step 1: The minor of the entry at row $$i$$, column $$j$$ is the determinant of the $$2 \\times 2$$ matrix you get by deleting row $$i$$ and column $$j$$.\n- Step 2: The cofactor is the minor multiplied by $$(-1)^{i+j}$$ — it's the minor with the sign attached according to the alternating $$+, -, +$$ pattern.\n- Step 3: So: cofactor = signed minor.\n+ At positions where the sign pattern shows $$+$$, cofactor = minor.\n+ At positions where the sign pattern shows $$-$$, cofactor = $$-1 \\times$$ minor.\n+ Cofactors are what you sum (with row entries) when expanding determinants and what you assemble for the inverse.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "Walk through the 5-step process for finding the inverse $$\\mathbf{A}^{-1}$$ of a non-singular $$3 \\times 3$$ matrix. (5 steps)", "answer": "- Step 1: Find $$\\det(\\mathbf{A})$$. If it's zero, stop — there is no inverse. If non-zero, proceed.\n- Step 2: Form the matrix of minors $$\\mathbf{M}$$ — replace each entry of $$\\mathbf{A}$$ by its $$2 \\times 2$$ minor (the determinant of what remains after crossing out the row and column).\n- Step 3: Form the matrix of cofactors $$\\mathbf{C}$$ by applying the alternating sign pattern $$\\begin{pmatrix} + & - & + \\\\ - & + & - \\\\ + & - & + \\end{pmatrix}$$ to $$\\mathbf{M}$$ (flip sign in the $$-$$ positions).\n- Step 4: Take the transpose $$\\mathbf{C}^\\top$$ of the cofactor matrix. This is sometimes called the adjugate.\n- Step 5: Compute $$\\mathbf{A}^{-1} = \\dfrac{1}{\\det(\\mathbf{A})} \\mathbf{C}^\\top$$. Each entry of $$\\mathbf{C}^\\top$$ gets divided by the determinant.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Why does the formula $$\\mathbf{A}^{-1} = \\dfrac{1}{\\det(\\mathbf{A})}\\mathbf{C}^\\top$$ require $$\\det(\\mathbf{A}) \\neq 0$$, and what does this say geometrically about singular matrices? (3 steps)", "answer": "- Step 1: If $$\\det(\\mathbf{A}) = 0$$, the formula divides by zero — undefined. So singular matrices have no inverse via this formula.\n- Step 2: Geometrically, a singular matrix collapses 3D space to a lower-dimensional set (plane, line, or point). Multiple input vectors get sent to the same output, so there's no way to \"undo\" the transformation — the inverse doesn't exist.\n- Step 3: This matches the algebraic picture: if $$\\mathbf{A}\\mathbf{x}_1 = \\mathbf{A}\\mathbf{x}_2$$ with $$\\mathbf{x}_1 \\neq \\mathbf{x}_2$$, no function can map $$\\mathbf{A}\\mathbf{x}_1$$ back to a unique input. The inverse simply isn't defined.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "State the rule for inverting a product of two non-singular matrices and explain why the order reverses. (3 steps)", "answer": "- Step 1: The rule is $$(\\mathbf{A}\\mathbf{B})^{-1} = \\mathbf{B}^{-1} \\mathbf{A}^{-1}$$. The order reverses, just as it does for transposes.\n- Step 2: Verify: $$(\\mathbf{A}\\mathbf{B})(\\mathbf{B}^{-1} \\mathbf{A}^{-1}) = \\mathbf{A}(\\mathbf{B}\\mathbf{B}^{-1})\\mathbf{A}^{-1} = \\mathbf{A}\\mathbf{I}\\mathbf{A}^{-1} = \\mathbf{A}\\mathbf{A}^{-1} = \\mathbf{I}$$. So $$\\mathbf{B}^{-1}\\mathbf{A}^{-1}$$ is indeed the inverse.\n- Step 3: Intuitive \"socks and shoes\" analogy: $$\\mathbf{A}\\mathbf{B}$$ means \"do $$\\mathbf{B}$$ first, then $$\\mathbf{A}$$\" (like putting on socks then shoes). To undo, reverse the order: take off shoes first, then socks. So undo $$\\mathbf{A}$$ first, then $$\\mathbf{B}$$ — applying $$\\mathbf{A}^{-1}$$ before $$\\mathbf{B}^{-1}$$ from the left, hence $$\\mathbf{B}^{-1}\\mathbf{A}^{-1}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Given a $$3 \\times 3$$ matrix $$\\mathbf{A}$$ with determinant $$\\det(\\mathbf{A}) = 5$$ and cofactor matrix transpose $$\\mathbf{C}^\\top$$, what does $$\\mathbf{A}\\mathbf{C}^\\top$$ equal? (3 steps)", "answer": "- Step 1: From the inverse formula $$\\mathbf{A}^{-1} = \\dfrac{1}{\\det(\\mathbf{A})} \\mathbf{C}^\\top$$, rearranging gives $$\\mathbf{C}^\\top = \\det(\\mathbf{A}) \\mathbf{A}^{-1}$$.\n- Step 2: So $$\\mathbf{A}\\mathbf{C}^\\top = \\mathbf{A}(\\det(\\mathbf{A}) \\mathbf{A}^{-1}) = \\det(\\mathbf{A}) (\\mathbf{A}\\mathbf{A}^{-1}) = \\det(\\mathbf{A})\\mathbf{I}$$.\n- Step 3: Therefore $$\\mathbf{A}\\mathbf{C}^\\top = 5\\mathbf{I}$$ — a diagonal matrix with $$5$$ on the diagonal. Useful identity: even when you don't compute $$\\mathbf{A}^{-1}$$ explicitly, the product of $$\\mathbf{A}$$ with its adjugate is always $$\\det(\\mathbf{A})\\mathbf{I}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "What two properties define a linear transformation $$T: \\mathbb{R}^3 \\to \\mathbb{R}^3$$, and why are they enough to fully determine $$T$$ from its action on three special vectors? (3 steps)", "answer": "- Step 1: The two properties are:\n+ $$T(k\\mathbf{v}) = k T(\\mathbf{v})$$ for any scalar $$k$$ (homogeneity).\n+ $$T(\\mathbf{v}_1 + \\mathbf{v}_2) = T(\\mathbf{v}_1) + T(\\mathbf{v}_2)$$ (additivity).\n- Step 2: Together these say $$T$$ \"respects\" linear combinations: $$T(a\\mathbf{v}_1 + b\\mathbf{v}_2) = a T(\\mathbf{v}_1) + b T(\\mathbf{v}_2)$$. Knowing $$T$$ on a set of vectors immediately tells you $$T$$ on every linear combination of them.\n- Step 3: Any vector in $$\\mathbb{R}^3$$ can be written $$\\mathbf{v} = x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$$, so once you know $$T(\\mathbf{i})$$, $$T(\\mathbf{j})$$, $$T(\\mathbf{k})$$, you know $$T(\\mathbf{v}) = x T(\\mathbf{i}) + y T(\\mathbf{j}) + z T(\\mathbf{k})$$ for every $$\\mathbf{v}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "If a linear transformation $$T$$ is represented by a $$3 \\times 3$$ matrix $$\\mathbf{M}$$, how can you read off the images of $$\\mathbf{i}$$, $$\\mathbf{j}$$, $$\\mathbf{k}$$ directly from $$\\mathbf{M}$$, and why does this work? (3 steps)", "answer": "- Step 1: The image of $$\\mathbf{i} = (1,0,0)^\\top$$ under $$T$$ is the first column of $$\\mathbf{M}$$. The image of $$\\mathbf{j}$$ is the second column. The image of $$\\mathbf{k}$$ is the third column.\n- Step 2: Verify by direct multiplication: $$\\mathbf{M}\\begin{pmatrix} 1 \\\\ 0 \\\\ 0 \\end{pmatrix} = \\begin{pmatrix} a \\\\ d \\\\ g \\end{pmatrix}$$ — picks off the first column of $$\\mathbf{M} = \\begin{pmatrix} a & b & c \\\\ d & e & f \\\\ g & h & i \\end{pmatrix}$$.\n- Step 3: This gives a powerful intuition: each column of $$\\mathbf{M}$$ tells you \"where the corresponding axis goes\". To build the matrix for a transformation, just figure out where each axis lands and write those as columns.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "If transformation $$T$$ is represented by matrix $$\\mathbf{T}$$ and transformation $$U$$ by matrix $$\\mathbf{U}$$, which matrix represents the combined transformation \"do $$T$$ first, then $$U$$\", and why is this order important? (3 steps)", "answer": "- Step 1: The combined transformation \"$$T$$ first, then $$U$$\" is represented by the matrix product $$\\mathbf{U}\\mathbf{T}$$ — note $$\\mathbf{U}$$ on the left even though $$T$$ acts first.\n- Step 2: This is because matrices act on column vectors from the left: $$\\mathbf{U}(\\mathbf{T}\\mathbf{x}) = (\\mathbf{U}\\mathbf{T})\\mathbf{x}$$. Reading right-to-left, $$\\mathbf{T}$$ hits $$\\mathbf{x}$$ first, then $$\\mathbf{U}$$.\n- Step 3: Since matrix multiplication is generally non-commutative, $$\\mathbf{U}\\mathbf{T} \\neq \\mathbf{T}\\mathbf{U}$$. Confusing the order changes the result entirely. A reliable check: write out what the composition does to a specific vector both ways and compare.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Why is matrix multiplication generally non-commutative ($$\\mathbf{A}\\mathbf{B} \\neq \\mathbf{B}\\mathbf{A}$$), thinking geometrically about the transformations involved? (3 steps)", "answer": "- Step 1: Each matrix represents a geometric operation (rotation, reflection, scaling, etc.). $$\\mathbf{A}\\mathbf{B}$$ means \"do $$\\mathbf{B}$$ then $$\\mathbf{A}$$\"; $$\\mathbf{B}\\mathbf{A}$$ means \"do $$\\mathbf{A}$$ then $$\\mathbf{B}$$\".\n- Step 2: Order matters for geometric operations. Example: rotate by 90° about the $$z$$-axis, then about the $$x$$-axis — vs doing them in the opposite order. The final orientation of an object is different.\n- Step 3: So matrix multiplication encodes ordered composition, and the non-commutativity reflects the genuine fact that physical operations don't always commute. Some special pairs do commute (like two rotations about the same axis), but in general you must respect the order.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "A linear transformation maps a line $$\\mathbf{r} = \\mathbf{a} + t\\mathbf{d}$$ via matrix $$\\mathbf{T}$$. What is the equation of the image line? (3 steps)", "answer": "- Step 1: A point on the original line has position $$\\mathbf{a} + t\\mathbf{d}$$ for some parameter $$t$$. Apply $$\\mathbf{T}$$ to get its image.\n- Step 2: By linearity, $$\\mathbf{T}(\\mathbf{a} + t\\mathbf{d}) = \\mathbf{T}\\mathbf{a} + t\\mathbf{T}\\mathbf{d}$$.\n- Step 3: The image is therefore the line $$\\mathbf{r}' = \\mathbf{T}\\mathbf{a} + t(\\mathbf{T}\\mathbf{d})$$ — passing through $$\\mathbf{T}\\mathbf{a}$$ (image of original point) with direction $$\\mathbf{T}\\mathbf{d}$$ (image of direction vector). Lines map to lines under linear transformations (provided the matrix is non-singular; otherwise dimensions can collapse).", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Under what circumstance can a linear transformation map a plane to a line (rather than another plane), and what does this say about the transformation matrix? (3 steps)", "answer": "- Step 1: A plane is a 2D set. If a linear transformation maps it to a 1D line, the transformation has crushed a dimension — it's lost information.\n- Step 2: This happens when the transformation matrix is singular ($$\\det = 0$$). A singular $$3 \\times 3$$ matrix has columns that don't span all of 3D space, so the entire image of $$\\mathbb{R}^3$$ lies in a lower-dimensional subspace.\n- Step 3: In general, a non-singular transformation sends planes to planes and lines to lines (preserves dimensions). Singular transformations can collapse: planes to lines, lines to points, etc. This is the geometric meaning of $$\\det = 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Once you know matrix $$\\mathbf{T}$$ representing a transformation, how do you find the original vector $$\\mathbf{x}_1$$ that mapped to a given image vector $$\\mathbf{x}_2$$? (3 steps)", "answer": "- Step 1: The relationship is $$\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$$ — the transformation acts on $$\\mathbf{x}_1$$ to produce $$\\mathbf{x}_2$$.\n- Step 2: Multiply both sides on the left by $$\\mathbf{T}^{-1}$$: $$\\mathbf{T}^{-1}\\mathbf{T}\\mathbf{x}_1 = \\mathbf{T}^{-1}\\mathbf{x}_2$$, simplifying to $$\\mathbf{x}_1 = \\mathbf{T}^{-1}\\mathbf{x}_2$$.\n- Step 3: So the inverse matrix $$\\mathbf{T}^{-1}$$ \"reverses\" the transformation: it sends each image back to its original. This requires $$\\mathbf{T}$$ to be non-singular (otherwise multiple inputs share an output and reversal is impossible).", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Aside from explicitly computing $$\\mathbf{T}^{-1}$$, what's an alternative method to find $$\\mathbf{x}_1$$ given $$\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$$, and when might you prefer it? (3 steps)", "answer": "- Step 1: Write the matrix equation $$\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$$ as a system of three simultaneous equations in three unknowns (the components of $$\\mathbf{x}_1$$).\n- Step 2: Solve the system using elimination, substitution, or any standard method.\n- Step 3: This is often faster than computing $$\\mathbf{T}^{-1}$$ for a single problem (finding $$\\mathbf{T}^{-1}$$ requires 9 minors plus a determinant — a lot of work). But if you need to reverse many vectors with the same $$\\mathbf{T}$$, computing $$\\mathbf{T}^{-1}$$ once and reusing it is efficient.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "State the defining equation for an eigenvector $$\\mathbf{x}$$ of a matrix $$\\mathbf{A}$$ with eigenvalue $$\\lambda$$, and explain the geometric meaning. (3 steps)", "answer": "- Step 1: The defining equation is $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$, where $$\\mathbf{x} \\neq \\mathbf{0}$$ and $$\\lambda$$ is a scalar (a number).\n- Step 2: Geometrically, this says: when the transformation $$\\mathbf{A}$$ acts on $$\\mathbf{x}$$, the result is just $$\\mathbf{x}$$ scaled by $$\\lambda$$ — same direction (or exactly opposite if $$\\lambda < 0$$), just stretched/compressed.\n- Step 3: So eigenvectors are special directions left invariant by the transformation, and $$\\lambda$$ measures how much they're stretched. This is profound: even a complicated transformation has these \"preferred axes\" along which it acts as simple scaling.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Why does the definition of an eigenvector explicitly require $$\\mathbf{x} \\neq \\mathbf{0}$$? What goes wrong if we allow zero? (3 steps)", "answer": "- Step 1: If $$\\mathbf{x} = \\mathbf{0}$$, then $$\\mathbf{A}\\mathbf{x} = \\mathbf{A}\\mathbf{0} = \\mathbf{0}$$, and $$\\lambda \\mathbf{x} = \\lambda \\mathbf{0} = \\mathbf{0}$$ for any $$\\lambda$$.\n- Step 2: So the equation $$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$$ is trivially satisfied by $$\\mathbf{x} = \\mathbf{0}$$ for every value of $$\\lambda$$ — the zero vector would be an \"eigenvector\" with every possible eigenvalue, which is meaningless.\n- Step 3: Excluding $$\\mathbf{x} = \\mathbf{0}$$ ensures eigenvectors actually point in some direction, and that the eigenvalue $$\\lambda$$ is uniquely associated with a non-trivial direction. Note: $$\\lambda = 0$$ IS allowed (it means the transformation crushes that direction to zero).", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Starting from $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$, derive the characteristic equation $$\\det(\\mathbf{A} - \\lambda \\mathbf{I}) = 0$$. (4 steps)", "answer": "- Step 1: Rewrite the right-hand side using the identity matrix: $$\\lambda \\mathbf{x} = \\lambda \\mathbf{I} \\mathbf{x}$$, so $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{I}\\mathbf{x}$$.\n- Step 2: Move everything to one side: $$\\mathbf{A}\\mathbf{x} - \\lambda \\mathbf{I}\\mathbf{x} = \\mathbf{0}$$, then factor: $$(\\mathbf{A} - \\lambda \\mathbf{I})\\mathbf{x} = \\mathbf{0}$$.\n- Step 3: This is a matrix equation. We need a non-zero $$\\mathbf{x}$$ to solve $$(\\mathbf{A} - \\lambda \\mathbf{I})\\mathbf{x} = \\mathbf{0}$$. If $$(\\mathbf{A} - \\lambda \\mathbf{I})$$ were invertible (non-singular), the only solution would be $$\\mathbf{x} = \\mathbf{0}$$, contradicting our requirement.\n- Step 4: Therefore $$(\\mathbf{A} - \\lambda \\mathbf{I})$$ must be singular, i.e., $$\\det(\\mathbf{A} - \\lambda \\mathbf{I}) = 0$$. This is the characteristic equation, whose solutions are the eigenvalues.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "What is the degree of the characteristic equation for a $$2 \\times 2$$ matrix and for a $$3 \\times 3$$ matrix, and what does this imply about the maximum number of eigenvalues? (3 steps)", "answer": "- Step 1: For a $$2 \\times 2$$ matrix, $$\\det(\\mathbf{A} - \\lambda \\mathbf{I})$$ is a quadratic in $$\\lambda$$ — degree 2. So there are at most 2 (real) eigenvalues.\n- Step 2: For a $$3 \\times 3$$ matrix, the characteristic polynomial has degree 3 (cubic). So there are at most 3 real eigenvalues.\n- Step 3: In general, $$n \\times n$$ matrices have characteristic polynomials of degree $$n$$. Roots can be repeated, and complex roots are possible (though the syllabus only requires real eigenvalues). A cubic always has at least 1 real root, so a $$3 \\times 3$$ matrix always has at least one real eigenvalue.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Once you've found an eigenvalue $$\\lambda$$ of $$\\mathbf{A}$$, walk through how to find a corresponding eigenvector. (3 steps)", "answer": "- Step 1: Substitute $$\\lambda$$ into $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ — this gives a homogeneous system of equations.\n- Step 2: The system has infinitely many solutions because $$(\\mathbf{A} - \\lambda\\mathbf{I})$$ is singular. Solve it by reducing to one or two equations in the components of $$\\mathbf{x}$$, then choose a free parameter.\n+ Pick a convenient value (often $$1$$) for one component, then determine the others.\n+ Avoid setting all components to zero — the eigenvector must be non-zero.\n- Step 3: The result is one eigenvector. Any non-zero scalar multiple of it is also an eigenvector with the same $$\\lambda$$. If a normalised eigenvector is needed, divide by the magnitude.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Why is an eigenvector not unique — what's the freedom you have in choosing one? (3 steps)", "answer": "- Step 1: If $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$, then for any non-zero scalar $$c$$: $$\\mathbf{A}(c\\mathbf{x}) = c \\mathbf{A}\\mathbf{x} = c \\lambda \\mathbf{x} = \\lambda (c\\mathbf{x})$$.\n- Step 2: So $$c\\mathbf{x}$$ is also an eigenvector with the same eigenvalue. The \"direction\" is what matters — you can scale freely.\n- Step 3: This is why eigenvectors describe invariant lines (a whole line through the origin, not a single point), and why we sometimes specify the normalised eigenvector to remove ambiguity. Both $$\\mathbf{x}$$ and $$-\\mathbf{x}$$ are valid normalised eigenvectors.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "What is a normalised eigenvector, and how do you obtain one from a given eigenvector $$(a, b, c)^\\top$$? (3 steps)", "answer": "- Step 1: A normalised eigenvector is an eigenvector with unit magnitude (length 1).\n- Step 2: For $$(a, b, c)^\\top$$, the magnitude is $$\\sqrt{a^2 + b^2 + c^2}$$. Divide each component by this length to get $$\\left(\\dfrac{a}{\\sqrt{a^2+b^2+c^2}}, \\dfrac{b}{\\sqrt{a^2+b^2+c^2}}, \\dfrac{c}{\\sqrt{a^2+b^2+c^2}}\\right)^\\top$$.\n- Step 3: Normalising removes the scaling ambiguity. Note: the sign is still ambiguous — both the normalised eigenvector and its negative work, since both have unit length. So strictly there are two normalised eigenvectors for each eigenvector direction.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "What does it mean for a line through the origin to be an \"invariant line\" of a transformation $$T$$, and how does this connect to eigenvectors? (3 steps)", "answer": "- Step 1: A line through the origin is invariant under $$T$$ if every point on the line maps to a point on the same line (though possibly to a different position on it).\n- Step 2: If $$\\mathbf{v}$$ is the direction of an invariant line, then $$T(\\mathbf{v}) = \\lambda \\mathbf{v}$$ for some scalar $$\\lambda$$ — in matrix form, $$\\mathbf{A}\\mathbf{v} = \\lambda \\mathbf{v}$$. So $$\\mathbf{v}$$ is an eigenvector!\n- Step 3: Therefore: invariant lines through the origin correspond exactly to directions of eigenvectors. The eigenvalue tells you how points on the line are stretched. This unifies an algebraic equation ($$\\mathbf{A}\\mathbf{v} = \\lambda \\mathbf{v}$$) with a geometric concept (invariant line).", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "What's the difference between an \"invariant line\" and a \"line of invariant points\", and what eigenvalue corresponds to each? (3 steps)", "answer": "- Step 1: An invariant line: every point on it maps to some point on the line (the line as a whole stays put, but individual points might slide along it). This requires the line's direction to be an eigenvector with any non-zero eigenvalue $$\\lambda$$.\n- Step 2: A line of invariant points: every point on it maps to itself — points don't move at all. This requires $$T(\\mathbf{v}) = \\mathbf{v}$$, i.e., $$\\lambda = 1$$.\n+ The eigenvalue $$\\lambda = 1$$ is the special case making points truly fixed, not just constrained to the line.\n- Step 3: So: any eigenvalue gives an invariant line; only eigenvalue $$1$$ gives a line of invariant points. Other eigenvalues stretch ($$|\\lambda| > 1$$), shrink ($$|\\lambda| < 1$$), or reflect through origin ($$\\lambda < 0$$) along the invariant line.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Compute the eigenvalues of $$\\mathbf{A} = \\begin{pmatrix} 3 & 0 \\\\ 0 & 5 \\end{pmatrix}$$ and identify the corresponding eigenvectors. What's special about this matrix? (3 steps)", "answer": "- Step 1: Set up $$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = \\begin{vmatrix} 3-\\lambda & 0 \\\\ 0 & 5-\\lambda \\end{vmatrix} = (3-\\lambda)(5-\\lambda) = 0$$, giving $$\\lambda = 3$$ or $$\\lambda = 5$$.\n- Step 2: For $$\\lambda = 3$$: $$(\\mathbf{A} - 3\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ gives $$0 \\cdot x = 0$$ and $$2y = 0$$, so $$y = 0$$ and $$x$$ is free. Eigenvector: $$\\binom{1}{0}$$. For $$\\lambda = 5$$: similar work gives eigenvector $$\\binom{0}{1}$$.\n- Step 3: Special feature: this is a diagonal matrix. For diagonal matrices, the diagonal entries are themselves the eigenvalues, and the standard basis vectors are the eigenvectors. This insight foreshadows why diagonalisation is so useful.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "A $$3 \\times 3$$ matrix $$\\mathbf{A}$$ has characteristic polynomial $$-(\\lambda - 1)^2(\\lambda - 4)$$. Describe the eigenvalues, including any subtlety. (3 steps)", "answer": "- Step 1: Setting the polynomial to zero: $$\\lambda = 1$$ (repeated, \"double root\") or $$\\lambda = 4$$.\n- Step 2: So there are two distinct eigenvalues, but $$\\lambda = 1$$ has algebraic multiplicity 2.\n+ This sometimes (not always) gives extra freedom in choosing eigenvectors for $$\\lambda = 1$$.\n+ Geometrically, repeated eigenvalues sometimes correspond to entire planes of invariant directions.\n- Step 3: When working out the eigenvector for $$\\lambda = 1$$, you may find that the system $$(\\mathbf{A} - \\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ has a 2-parameter family of solutions, meaning you can pick two independent eigenvectors for the same eigenvalue. (For $$\\lambda = 4$$, you typically get a 1-parameter family — a single direction.)", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Why must symmetric matrices always have real eigenvalues, and why is this important for diagonalisation? (3 steps)", "answer": "- Step 1: For a real symmetric matrix, the characteristic polynomial always factors into real linear factors — there are no complex roots. (This is a non-trivial theorem; here we accept it as a fact.)\n- Step 2: This guarantees that we can always find $$n$$ real eigenvalues for an $$n \\times n$$ symmetric matrix (counting multiplicity).\n- Step 3: Importantly, eigenvectors corresponding to different eigenvalues of a symmetric matrix are automatically orthogonal (perpendicular). This means we can build an orthogonal matrix $$\\mathbf{P}$$ from the normalised eigenvectors, which is exactly what makes diagonalisation work for symmetric matrices.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "What is an orthogonal matrix, and what are the two equivalent ways to characterise it? (3 steps)", "answer": "- Step 1: An orthogonal matrix $$\\mathbf{M}$$ is a square matrix satisfying $$\\mathbf{M}\\mathbf{M}^\\top = \\mathbf{I}$$ (equivalently $$\\mathbf{M}^\\top \\mathbf{M} = \\mathbf{I}$$).\n- Step 2: This is equivalent to saying $$\\mathbf{M}^{-1} = \\mathbf{M}^\\top$$ — the inverse is just the transpose. This is computationally wonderful: you don't need the 5-step procedure; just transpose.\n- Step 3: Equivalently, the columns of $$\\mathbf{M}$$ are mutually orthogonal unit vectors (pairwise perpendicular, each of length 1). The same is true of the rows. So orthogonal matrices preserve lengths and angles — they represent rotations and reflections.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "Two non-zero vectors $$\\mathbf{x}_1$$ and $$\\mathbf{x}_2$$ are called orthogonal in the context of eigenvectors. What does this mean and how is it tested? (3 steps)", "answer": "- Step 1: Vectors $$\\mathbf{x}_1$$ and $$\\mathbf{x}_2$$ are orthogonal if their scalar (dot) product is zero: $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = 0$$.\n- Step 2: For non-zero vectors, this is exactly the condition for being perpendicular. The terms \"orthogonal\" and \"perpendicular\" mean the same thing here, but \"orthogonal\" is the standard term in matrix/eigenvector contexts.\n- Step 3: For three vectors to be \"mutually orthogonal\", each pair must satisfy $$\\mathbf{x}_i \\cdot \\mathbf{x}_j = 0$$ for $$i \\neq j$$. Three mutually orthogonal unit vectors in $$\\mathbb{R}^3$$ form a complete orthonormal basis — a \"rotated set of axes\".", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "What is a diagonal matrix, what is the leading diagonal, and why are diagonal matrices computationally pleasant? (3 steps)", "answer": "- Step 1: A diagonal matrix is a square matrix where all entries off the main diagonal are zero. The leading diagonal runs from top-left to bottom-right.\n- Step 2: General forms: $$2 \\times 2$$ is $$\\begin{pmatrix} a & 0 \\\\ 0 & b \\end{pmatrix}$$; $$3 \\times 3$$ is $$\\begin{pmatrix} a & 0 & 0 \\\\ 0 & b & 0 \\\\ 0 & 0 & c \\end{pmatrix}$$.\n- Step 3: Diagonal matrices are easy because:\n+ Their determinant is just the product of diagonal entries.\n+ Their inverse is found by taking $$1/\\text{entry}$$ on the diagonal (if all non-zero).\n+ Powers $$\\mathbf{D}^n$$ just raise each diagonal entry to the power.\n+ Their eigenvalues ARE the diagonal entries.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "Walk through the four-step process for reducing a symmetric matrix $$\\mathbf{A}$$ to a diagonal matrix $$\\mathbf{D}$$. (4 steps)", "answer": "- Step 1: Find the eigenvalues of $$\\mathbf{A}$$ by solving $$\\det(\\mathbf{A} - \\lambda \\mathbf{I}) = 0$$. Find the corresponding eigenvectors and normalise each (divide by its magnitude).\n- Step 2: Form the matrix $$\\mathbf{P}$$ by placing the normalised eigenvectors as the columns of $$\\mathbf{P}$$. Because $$\\mathbf{A}$$ is symmetric, $$\\mathbf{P}$$ will be orthogonal.\n- Step 3: Compute $$\\mathbf{P}^\\top$$ (the transpose). For a symmetric $$\\mathbf{A}$$, $$\\mathbf{P}^\\top = \\mathbf{P}^{-1}$$, so this transpose IS the inverse.\n- Step 4: The diagonal matrix is $$\\mathbf{D} = \\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$. The diagonal entries of $$\\mathbf{D}$$ are the eigenvalues of $$\\mathbf{A}$$, in the same order as the corresponding eigenvectors appeared as columns of $$\\mathbf{P}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "When you diagonalise a symmetric matrix as $$\\mathbf{D} = \\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$, what guarantees that $$\\mathbf{D}$$ really is diagonal, and what are its diagonal entries? (3 steps)", "answer": "- Step 1: $$\\mathbf{D}$$ being diagonal isn't accidental — it's forced by the structure: $$\\mathbf{P}$$'s columns are eigenvectors $$\\mathbf{x}_1, \\mathbf{x}_2, \\mathbf{x}_3$$, and $$\\mathbf{A}\\mathbf{x}_i = \\lambda_i \\mathbf{x}_i$$.\n- Step 2: So $$\\mathbf{A}\\mathbf{P}$$'s columns are $$\\lambda_1 \\mathbf{x}_1, \\lambda_2 \\mathbf{x}_2, \\lambda_3 \\mathbf{x}_3$$. Then the $$(i,j)$$ entry of $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$ is $$\\mathbf{x}_i \\cdot \\lambda_j \\mathbf{x}_j = \\lambda_j (\\mathbf{x}_i \\cdot \\mathbf{x}_j)$$.\n- Step 3: Since the eigenvectors are orthonormal: $$\\mathbf{x}_i \\cdot \\mathbf{x}_j = 0$$ for $$i \\neq j$$ (off-diagonal vanishes!), and $$\\mathbf{x}_i \\cdot \\mathbf{x}_i = 1$$ (diagonal entry is $$\\lambda_i$$). Result: $$\\mathbf{D} = \\text{diag}(\\lambda_1, \\lambda_2, \\lambda_3)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "For a symmetric matrix $$\\mathbf{A}$$, why are $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$ and $$\\mathbf{P}^{-1} \\mathbf{A} \\mathbf{P}$$ identical expressions? (3 steps)", "answer": "- Step 1: For a symmetric $$\\mathbf{A}$$, the matrix $$\\mathbf{P}$$ built from normalised eigenvectors is orthogonal — this is a special property of symmetric matrices.\n- Step 2: Orthogonal matrices satisfy $$\\mathbf{P}^{-1} = \\mathbf{P}^\\top$$. So substituting either form into the diagonalisation equation gives the same result.\n- Step 3: This is convenient because computing $$\\mathbf{P}^\\top$$ is trivial (just swap rows and columns), whereas computing $$\\mathbf{P}^{-1}$$ generally requires the 5-step procedure. For non-symmetric matrices that can still be diagonalised, $$\\mathbf{P}^{-1} \\neq \\mathbf{P}^\\top$$ in general, so you'd need the genuine inverse.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "If you swap the order of the columns in $$\\mathbf{P}$$ when diagonalising a symmetric matrix, what happens to the diagonal matrix $$\\mathbf{D}$$? (3 steps)", "answer": "- Step 1: The diagonal entries of $$\\mathbf{D}$$ correspond directly to the columns of $$\\mathbf{P}$$: the $$i$$-th column being eigenvector for $$\\lambda_i$$ means the $$i$$-th diagonal entry of $$\\mathbf{D}$$ is $$\\lambda_i$$.\n- Step 2: So if you swap columns of $$\\mathbf{P}$$, you swap the corresponding diagonal entries of $$\\mathbf{D}$$.\n- Step 3: This means $$\\mathbf{D}$$ is \"essentially unique\" only up to permutation of the diagonal — there's no canonical order for the eigenvalues. Both $$\\text{diag}(2, 5)$$ and $$\\text{diag}(5, 2)$$ are valid diagonalisations of the same matrix; you pick whichever order you want for $$\\mathbf{P}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Confirm that $$\\mathbf{A} = \\begin{pmatrix} 4 & 1 \\\\ 2 & 3 \\end{pmatrix}$$ has eigenvalues $$\\lambda = 2$$ and $$\\lambda = 5$$ by checking the characteristic equation, and use trace/determinant as a sanity check. (3 steps)", "answer": "- Step 1: Form $$\\mathbf{A} - \\lambda\\mathbf{I} = \\begin{pmatrix} 4-\\lambda & 1 \\\\ 2 & 3-\\lambda \\end{pmatrix}$$.\n- Step 2: Compute $$\\det = (4-\\lambda)(3-\\lambda) - (1)(2) = \\lambda^2 - 7\\lambda + 12 - 2 = \\lambda^2 - 7\\lambda + 10$$. Factor: $$(\\lambda - 2)(\\lambda - 5) = 0$$, so $$\\lambda = 2$$ or $$\\lambda = 5$$ ✓.\n- Step 3: Sanity checks: trace $$= 4 + 3 = 7 = 2 + 5$$ ✓ (sum of eigenvalues equals trace), and $$\\det = 12 - 2 = 10 = 2 \\times 5$$ ✓ (product of eigenvalues equals determinant). Both checks confirm the eigenvalues.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Explain why, if $$(2, 1)^\\top$$ is an eigenvector of $$\\mathbf{A}$$ with eigenvalue $$3$$, then $$(4, 2)^\\top$$ and $$(-2, -1)^\\top$$ must also be eigenvectors with the same eigenvalue. (3 steps)", "answer": "- Step 1: We're told $$\\mathbf{A}\\binom{2}{1} = 3\\binom{2}{1}$$. Multiply both sides by $$2$$: $$2\\mathbf{A}\\binom{2}{1} = 6\\binom{2}{1}$$, i.e., $$\\mathbf{A}\\binom{4}{2} = 3\\binom{4}{2}$$ ✓.\n- Step 2: Multiply by $$-1$$: $$-\\mathbf{A}\\binom{2}{1} = -3\\binom{2}{1}$$, i.e., $$\\mathbf{A}\\binom{-2}{-1} = 3\\binom{-2}{-1}$$ ✓.\n- Step 3: This generalises: any non-zero scalar multiple $$c\\mathbf{x}$$ of an eigenvector $$\\mathbf{x}$$ is also an eigenvector with the same eigenvalue. Eigenvectors come in \"directions\" (lines through the origin), not specific vectors.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "What's the connection between the trace of a $$2 \\times 2$$ matrix (sum of diagonal entries) and its eigenvalues? Why does this help as a quick sanity check? (3 steps)", "answer": "- Step 1: For any $$2 \\times 2$$ matrix $$\\mathbf{A}$$, the sum of eigenvalues equals the trace: $$\\lambda_1 + \\lambda_2 = \\text{tr}(\\mathbf{A})$$.\n- Step 2: Also, the product of eigenvalues equals the determinant: $$\\lambda_1 \\lambda_2 = \\det(\\mathbf{A})$$.\n- Step 3: These two facts give a quick check on your computed eigenvalues: add them and compare to the trace; multiply them and compare to the determinant. If either fails, you have an error. Same idea generalises: for $$n \\times n$$, sum of eigenvalues = trace, product = determinant.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "A matrix has determinant $$0$$. What does this tell you about its eigenvalues, and why? (3 steps)", "answer": "- Step 1: The product of all eigenvalues equals the determinant. If $$\\det(\\mathbf{A}) = 0$$, then $$\\lambda_1 \\lambda_2 \\cdots \\lambda_n = 0$$.\n- Step 2: For a product of numbers to be zero, at least one of them must be zero. So at least one eigenvalue is $$\\lambda = 0$$.\n- Step 3: Geometrically, $$\\lambda = 0$$ means there's a non-zero vector $$\\mathbf{x}$$ with $$\\mathbf{A}\\mathbf{x} = 0\\mathbf{x} = \\mathbf{0}$$ — the matrix completely crushes that direction. This is precisely why singular matrices are non-invertible: they have a non-trivial \"null direction\".", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "Explain why, when finding eigenvectors for a $$2 \\times 2$$ matrix, the two equations from $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ are typically equivalent (give the same information). (3 steps)", "answer": "- Step 1: At an eigenvalue $$\\lambda$$, the matrix $$\\mathbf{A} - \\lambda\\mathbf{I}$$ is singular by construction — that's how we found $$\\lambda$$.\n- Step 2: A singular $$2 \\times 2$$ matrix has rank $$\\leq 1$$: its rows are linearly dependent (one is a multiple of the other). So the two equations from $$(\\mathbf{A} - \\lambda \\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ are proportional — they say the same thing.\n- Step 3: This is why one equation is enough to find the eigenvector: solving one gives a 1-parameter family of solutions (the entire eigenvector direction). For $$3 \\times 3$$ matrices with simple eigenvalues, you typically need two of the three equations; the third is redundant.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "Suppose you find eigenvectors $$\\mathbf{x}_1$$ and $$\\mathbf{x}_2$$ of a symmetric matrix corresponding to different eigenvalues $$\\lambda_1 \\neq \\lambda_2$$. Without computing dot products, why are $$\\mathbf{x}_1$$ and $$\\mathbf{x}_2$$ guaranteed to be orthogonal? (4 steps)", "answer": "- Step 1: Compute $$\\mathbf{x}_1 \\cdot \\mathbf{A}\\mathbf{x}_2$$ two different ways. Method A: $$\\mathbf{A}\\mathbf{x}_2 = \\lambda_2 \\mathbf{x}_2$$, so $$\\mathbf{x}_1 \\cdot \\mathbf{A}\\mathbf{x}_2 = \\lambda_2 (\\mathbf{x}_1 \\cdot \\mathbf{x}_2)$$.\n- Step 2: Method B: $$\\mathbf{x}_1 \\cdot \\mathbf{A}\\mathbf{x}_2 = \\mathbf{x}_1^\\top \\mathbf{A}\\mathbf{x}_2 = (\\mathbf{A}^\\top \\mathbf{x}_1)^\\top \\mathbf{x}_2 = (\\mathbf{A}\\mathbf{x}_1)^\\top \\mathbf{x}_2$$ using $$\\mathbf{A}^\\top = \\mathbf{A}$$ (symmetry). This equals $$\\lambda_1 \\mathbf{x}_1 \\cdot \\mathbf{x}_2$$.\n- Step 3: Equating: $$\\lambda_2 (\\mathbf{x}_1 \\cdot \\mathbf{x}_2) = \\lambda_1 (\\mathbf{x}_1 \\cdot \\mathbf{x}_2)$$, so $$(\\lambda_2 - \\lambda_1)(\\mathbf{x}_1 \\cdot \\mathbf{x}_2) = 0$$.\n- Step 4: Since $$\\lambda_1 \\neq \\lambda_2$$, we must have $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = 0$$. Symmetry was the key — it let us \"transpose\" the matrix into the other vector.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "Show that a $$3 \\times 3$$ skew-symmetric matrix (where $$\\mathbf{A}^\\top = -\\mathbf{A}$$) is always singular. (3 steps)", "answer": "- Step 1: Skew-symmetric in $$3 \\times 3$$ has form $$\\begin{pmatrix} 0 & a & -b \\\\ -a & 0 & c \\\\ b & -c & 0 \\end{pmatrix}$$ — diagonal must be zero (entry equals its negative).\n- Step 2: Compute the determinant by cofactor expansion along row 1: $$0 \\cdot (\\ldots) - a \\cdot \\begin{vmatrix} -a & c \\\\ b & 0 \\end{vmatrix} + (-b) \\cdot \\begin{vmatrix} -a & 0 \\\\ b & -c \\end{vmatrix} = -a(0 - bc) - b(ac - 0) = abc - abc = 0$$.\n- Step 3: So the determinant is always zero, meaning every $$3 \\times 3$$ skew-symmetric matrix is singular. This is a parity issue — only true for odd-dimensional skew-symmetric matrices. (For even dimensions like $$2 \\times 2$$ or $$4 \\times 4$$, skew-symmetric matrices are usually non-singular.)", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "A transformation matrix $$\\mathbf{T}$$ has eigenvalues $$1, 2, 3$$. Without computing $$\\mathbf{T}^{10}$$, what are the eigenvalues of $$\\mathbf{T}^{10}$$? Generalise. (3 steps)", "answer": "- Step 1: If $$\\mathbf{T}\\mathbf{x} = \\lambda \\mathbf{x}$$, then $$\\mathbf{T}^2\\mathbf{x} = \\mathbf{T}(\\mathbf{T}\\mathbf{x}) = \\mathbf{T}(\\lambda \\mathbf{x}) = \\lambda \\mathbf{T}\\mathbf{x} = \\lambda^2 \\mathbf{x}$$.\n- Step 2: By induction, $$\\mathbf{T}^n \\mathbf{x} = \\lambda^n \\mathbf{x}$$. So if $$\\lambda$$ is an eigenvalue of $$\\mathbf{T}$$ with eigenvector $$\\mathbf{x}$$, then $$\\lambda^n$$ is an eigenvalue of $$\\mathbf{T}^n$$ with the same eigenvector.\n- Step 3: For $$\\mathbf{T}^{10}$$: eigenvalues are $$1^{10} = 1$$, $$2^{10} = 1024$$, $$3^{10} = 59049$$. Generally, raising the matrix to a power raises each eigenvalue to that power. Eigenvectors are unchanged.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "A non-singular matrix $$\\mathbf{A}$$ has eigenvalue $$\\lambda$$ with eigenvector $$\\mathbf{x}$$. What's the corresponding eigenvalue of $$\\mathbf{A}^{-1}$$? (3 steps)", "answer": "- Step 1: Start from $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$. Multiply both sides on the left by $$\\mathbf{A}^{-1}$$: $$\\mathbf{x} = \\lambda \\mathbf{A}^{-1}\\mathbf{x}$$.\n- Step 2: Divide by $$\\lambda$$ (which is non-zero, since $$\\mathbf{A}$$ is non-singular ⇒ all eigenvalues are non-zero): $$\\dfrac{1}{\\lambda}\\mathbf{x} = \\mathbf{A}^{-1}\\mathbf{x}$$.\n- Step 3: Rewriting: $$\\mathbf{A}^{-1}\\mathbf{x} = \\dfrac{1}{\\lambda}\\mathbf{x}$$. So $$\\dfrac{1}{\\lambda}$$ is an eigenvalue of $$\\mathbf{A}^{-1}$$, with the same eigenvector. Eigenvectors are preserved; eigenvalues invert. Intuitive: if $$\\mathbf{A}$$ stretches by factor $$\\lambda$$, then $$\\mathbf{A}^{-1}$$ undoes that stretch (multiplies by $$1/\\lambda$$).", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "Why does a $$3 \\times 3$$ matrix always have at least one real eigenvalue, even though a $$2 \\times 2$$ matrix might have only complex eigenvalues? (3 steps)", "answer": "- Step 1: The characteristic polynomial of a $$3 \\times 3$$ matrix is a cubic in $$\\lambda$$ with real coefficients.\n- Step 2: A cubic with real coefficients always has at least one real root, because: as $$\\lambda \\to \\infty$$, the cubic $$\\to \\pm \\infty$$, and as $$\\lambda \\to -\\infty$$, it goes to the opposite infinity. By the intermediate value theorem, it crosses zero at least once.\n- Step 3: For $$2 \\times 2$$, the characteristic polynomial is quadratic. Quadratics can have negative discriminant (e.g., $$\\lambda^2 + 1$$ has roots $$\\pm i$$), so they can fail to have real roots. The \"always at least one real eigenvalue\" property is special to odd dimensions.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "What is the trace of a matrix and how does it relate to eigenvalues? (3 steps)", "answer": "- Step 1: The trace of a square matrix is the sum of its leading diagonal entries: $$\\text{tr}(\\mathbf{A}) = a_{11} + a_{22} + \\cdots + a_{nn}$$.\n- Step 2: A key property: the trace equals the sum of all eigenvalues (counting multiplicity). So $$\\text{tr}(\\mathbf{A}) = \\lambda_1 + \\lambda_2 + \\cdots + \\lambda_n$$.\n- Step 3: This is invariant under similarity: $$\\text{tr}(\\mathbf{P}^{-1}\\mathbf{A}\\mathbf{P}) = \\text{tr}(\\mathbf{A})$$. So the trace doesn't change when you change basis. Together with $$\\det = $$ product of eigenvalues, the trace–determinant pair gives the simplest characterisation of $$2 \\times 2$$ matrices.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "Explain why, for an orthogonal matrix $$\\mathbf{M}$$, $$\\det(\\mathbf{M}) = \\pm 1$$. (3 steps)", "answer": "- Step 1: From the defining property $$\\mathbf{M}\\mathbf{M}^\\top = \\mathbf{I}$$, take determinants of both sides: $$\\det(\\mathbf{M}\\mathbf{M}^\\top) = \\det(\\mathbf{I}) = 1$$.\n- Step 2: Use the rules $$\\det(\\mathbf{A}\\mathbf{B}) = \\det(\\mathbf{A})\\det(\\mathbf{B})$$ and $$\\det(\\mathbf{A}^\\top) = \\det(\\mathbf{A})$$: $$\\det(\\mathbf{M}) \\cdot \\det(\\mathbf{M}) = 1$$, i.e., $$\\det(\\mathbf{M})^2 = 1$$.\n- Step 3: So $$\\det(\\mathbf{M}) = \\pm 1$$. Geometrically: orthogonal matrices represent rotations ($$\\det = +1$$, orientation-preserving) or rotations combined with reflections ($$\\det = -1$$, orientation-reversing). They never scale volume.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": true}, {"question": "A matrix $$\\mathbf{A}$$ satisfies $$\\mathbf{A}^2 = \\mathbf{I}$$. What can you conclude about its inverse, and what are the possible eigenvalues? (3 steps)", "answer": "- Step 1: $$\\mathbf{A}\\mathbf{A} = \\mathbf{I}$$ matches the definition $$\\mathbf{A}\\mathbf{A}^{-1} = \\mathbf{I}$$, so $$\\mathbf{A}^{-1} = \\mathbf{A}$$. The matrix is its own inverse — a \"self-inverse\" matrix.\n- Step 2: For eigenvalues: if $$\\mathbf{A}\\mathbf{x} = \\lambda \\mathbf{x}$$, then $$\\mathbf{A}^2 \\mathbf{x} = \\lambda^2 \\mathbf{x}$$. But $$\\mathbf{A}^2 = \\mathbf{I}$$, so $$\\mathbf{A}^2 \\mathbf{x} = \\mathbf{x}$$. Therefore $$\\lambda^2 = 1$$, giving $$\\lambda = \\pm 1$$.\n- Step 3: Such matrices represent transformations that \"undo themselves\" — reflections, rotations by 180°, etc. The eigenvalue $$+1$$ corresponds to the axis/plane of fixed points; $$-1$$ corresponds to directions that get flipped.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": true}, {"question": "When computing $$(\\mathbf{A}\\mathbf{B})\\mathbf{C}$$, can you compute it as $$\\mathbf{A}(\\mathbf{B}\\mathbf{C})$$ instead? Why? (3 steps)", "answer": "- Step 1: Yes — matrix multiplication is associative: $$(\\mathbf{A}\\mathbf{B})\\mathbf{C} = \\mathbf{A}(\\mathbf{B}\\mathbf{C})$$. The grouping of multiplications doesn't matter, as long as the order is preserved.\n- Step 2: This is different from commutativity: you can't change the order ($$\\mathbf{A}\\mathbf{B} \\neq \\mathbf{B}\\mathbf{A}$$ in general), but you CAN regroup ($$(\\mathbf{A}\\mathbf{B})\\mathbf{C} = \\mathbf{A}(\\mathbf{B}\\mathbf{C})$$).\n- Step 3: Practically, in $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$, you can compute $$\\mathbf{A}\\mathbf{P}$$ first then multiply by $$\\mathbf{P}^\\top$$, OR compute $$\\mathbf{P}^\\top \\mathbf{A}$$ first then multiply by $$\\mathbf{P}$$. Both give the same answer; one might be easier than the other depending on the matrices.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "Find the eigenvalues of the upper-triangular matrix $$\\mathbf{A} = \\begin{pmatrix} 2 & 7 & 5 \\\\ 0 & 3 & 9 \\\\ 0 & 0 & 4 \\end{pmatrix}$$ without computing a cubic, and explain the shortcut. (3 steps)", "answer": "- Step 1: $$\\mathbf{A} - \\lambda\\mathbf{I}$$ remains upper triangular (subtracting $$\\lambda \\mathbf{I}$$ only changes the diagonal): $$\\begin{pmatrix} 2-\\lambda & 7 & 5 \\\\ 0 & 3-\\lambda & 9 \\\\ 0 & 0 & 4-\\lambda \\end{pmatrix}$$.\n- Step 2: The determinant of an upper (or lower) triangular matrix is the product of diagonal entries: $$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = (2-\\lambda)(3-\\lambda)(4-\\lambda)$$.\n- Step 3: Setting this to zero: $$\\lambda = 2, 3, 4$$. So the eigenvalues of any triangular matrix are exactly its diagonal entries — no cubic to solve. The same is true for diagonal matrices.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": false}, {"question": "A common mistake: a student computes the inverse of $$\\mathbf{A}$$ but forgets to take the transpose at step 4 (after forming the cofactor matrix). What goes wrong? (3 steps)", "answer": "- Step 1: Without the transpose, the student computes $$\\dfrac{1}{\\det(\\mathbf{A})} \\mathbf{C}$$ instead of $$\\dfrac{1}{\\det(\\mathbf{A})} \\mathbf{C}^\\top$$.\n- Step 2: This is generally NOT the inverse — multiplying gives $$\\mathbf{A} \\cdot \\dfrac{1}{\\det(\\mathbf{A})}\\mathbf{C}$$, which doesn't simplify to $$\\mathbf{I}$$ except by coincidence (e.g., when $$\\mathbf{A}$$ happens to be symmetric, $$\\mathbf{C}$$ is also symmetric, so $$\\mathbf{C}^\\top = \\mathbf{C}$$).\n- Step 3: Misconception probe: always remember the transpose step. A quick check is to multiply your computed \"inverse\" by $$\\mathbf{A}$$ — if you don't get $$\\mathbf{I}$$, something's wrong (usually a missing transpose or sign error).", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": true}, {"question": "Compute the determinant of $$\\mathbf{A} = \\begin{pmatrix} 1 & 2 & 3 \\\\ 0 & 4 & 5 \\\\ 0 & 0 & 6 \\end{pmatrix}$$ in two ways. (3 steps)", "answer": "- Step 1: Method 1 (cofactor expansion along column 1): only the $$(1,1)$$ entry is non-zero. So $$\\det = 1 \\cdot \\begin{vmatrix} 4 & 5 \\\\ 0 & 6 \\end{vmatrix} - 0 + 0 = 1 \\cdot (24 - 0) = 24$$.\n- Step 2: Method 2 (triangular shortcut): the matrix is upper triangular, so $$\\det$$ is the product of diagonal entries: $$1 \\cdot 4 \\cdot 6 = 24$$ ✓.\n- Step 3: Both give 24, illustrating a useful pattern: leveraging the triangular structure (or any column with many zeros) saves computation. Always look at the structure before grinding through cofactor expansion.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": true}, {"question": "What is meant by \"mutually orthogonal\" for three vectors $$\\mathbf{x}_1, \\mathbf{x}_2, \\mathbf{x}_3$$, and why does the orthogonal matrix property require this? (3 steps)", "answer": "- Step 1: \"Mutually orthogonal\" means each pair is orthogonal: $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = 0$$, $$\\mathbf{x}_2 \\cdot \\mathbf{x}_3 = 0$$, $$\\mathbf{x}_1 \\cdot \\mathbf{x}_3 = 0$$.\n- Step 2: For an orthogonal $$3 \\times 3$$ matrix $$\\mathbf{M}$$ with normalised columns $$\\mathbf{x}_1, \\mathbf{x}_2, \\mathbf{x}_3$$, the entry $$(i,j)$$ of $$\\mathbf{M}^\\top \\mathbf{M}$$ is $$\\mathbf{x}_i \\cdot \\mathbf{x}_j$$.\n- Step 3: For $$\\mathbf{M}^\\top \\mathbf{M} = \\mathbf{I}$$: diagonal entries must be 1 ($$\\mathbf{x}_i \\cdot \\mathbf{x}_i = 1$$, i.e., unit length), and off-diagonal must be 0 ($$\\mathbf{x}_i \\cdot \\mathbf{x}_j = 0$$ for $$i \\neq j$$, i.e., mutually orthogonal). So orthogonal matrices have orthonormal column vectors.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": true}, {"question": "A linear transformation $$T$$ is represented by a matrix with eigenvalues $$1, 1, 4$$ (with $$1$$ repeated). Describe the geometric structure of points/lines/planes invariant under $$T$$. (3 steps)", "answer": "- Step 1: Eigenvalue $$1$$ (repeated) means there's typically a 2D plane of invariant points — points in this plane satisfy $$T(\\mathbf{v}) = \\mathbf{v}$$ exactly. Each direction in this plane is fixed.\n- Step 2: Eigenvalue $$4$$ gives an invariant line (1D direction) along which points get stretched by factor 4. Points on this line slide outward but stay on the line.\n- Step 3: Combined picture: $$T$$ fixes a plane (containing all directions with eigenvalue 1) and stretches perpendicular to it by factor 4. This kind of transformation is sometimes called a \"stretch\" or \"shear\" depending on whether the eigenvectors are orthogonal.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": true}, {"question": "Construct a $$2 \\times 2$$ matrix that has $$\\binom{1}{2}$$ as an eigenvector with eigenvalue 5, by reading off the action on basis vectors. (3 steps)", "answer": "- Step 1: We need $$\\mathbf{T}\\binom{1}{2} = 5\\binom{1}{2} = \\binom{5}{10}$$. Many matrices work — one constraint doesn't pin down four matrix entries.\n- Step 2: Pick a complementary direction. Suppose we declare $$\\binom{1}{0}$$ is also an eigenvector with eigenvalue 1: $$\\mathbf{T}\\binom{1}{0} = \\binom{1}{0}$$.\n- Step 3: From the second condition, the first column of $$\\mathbf{T}$$ is $$\\binom{1}{0}$$. Let the second column be $$\\binom{a}{b}$$. Then $$\\mathbf{T}\\binom{1}{2} = \\binom{1}{0} + 2\\binom{a}{b} = \\binom{1+2a}{2b}$$, which must equal $$\\binom{5}{10}$$. So $$a = 2$$, $$b = 5$$. Matrix: $$\\begin{pmatrix} 1 & 2 \\\\ 0 & 5 \\end{pmatrix}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": true}, {"question": "Given that $$\\det(\\mathbf{A}) \\det(\\mathbf{B}) = \\det(\\mathbf{A}\\mathbf{B})$$, can you conclude that $$\\det(\\mathbf{A} + \\mathbf{B}) = \\det(\\mathbf{A}) + \\det(\\mathbf{B})$$? Justify with reasoning or a counterexample. (3 steps)", "answer": "- Step 1: This is a common misconception — the determinant is NOT linear (additive). $$\\det(\\mathbf{A} + \\mathbf{B}) \\neq \\det(\\mathbf{A}) + \\det(\\mathbf{B})$$ in general.\n- Step 2: Counterexample: $$\\mathbf{A} = \\mathbf{B} = \\mathbf{I}$$ ($$2 \\times 2$$). Then $$\\det(\\mathbf{A}) = \\det(\\mathbf{B}) = 1$$, so the right-hand side is $$2$$. But $$\\mathbf{A} + \\mathbf{B} = 2\\mathbf{I}$$ with $$\\det = 4$$. Clearly $$4 \\neq 2$$.\n- Step 3: The determinant is multiplicative, not additive. This connects to the geometric interpretation: $$\\det$$ measures volume scaling, and adding matrices doesn't have a clean \"scaling\" interpretation. The product rule works because composing transformations multiplies their volume scalings.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": true}, {"question": "When you reduce a symmetric matrix $$\\mathbf{A}$$ to diagonal form via $$\\mathbf{D} = \\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$, the diagonal $$\\mathbf{D}$$ is \"essentially\" the same matrix as $$\\mathbf{A}$$ in some sense — but in what sense? (3 steps)", "answer": "- Step 1: $$\\mathbf{D}$$ and $$\\mathbf{A}$$ represent the same linear transformation, just expressed in different coordinate systems. The change of coordinates is given by $$\\mathbf{P}$$.\n- Step 2: In the original coordinates, $$\\mathbf{A}$$ acts via complicated mixing. But if we choose new axes aligned with the eigenvectors (the columns of $$\\mathbf{P}$$), the transformation becomes \"pure scaling\" along each axis — that's what $$\\mathbf{D}$$ shows: independent stretches by factors $$\\lambda_1, \\lambda_2, \\lambda_3$$.\n- Step 3: This is profound: every symmetric transformation is \"really just scaling along three perpendicular axes\". The complexity of $$\\mathbf{A}$$ is an artefact of being expressed in the wrong coordinates. Diagonalisation reveals the simple structure underneath.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": true}, {"question": "A symmetric matrix has eigenvalues $$3, 3, -2$$ (with $$3$$ repeated). What does the repeated eigenvalue suggest about the eigenvectors, and is there still freedom in choosing $$\\mathbf{P}$$? (3 steps)", "answer": "- Step 1: For repeated eigenvalues of a symmetric matrix, the corresponding eigenspace is 2-dimensional — there's an entire plane of eigenvectors with eigenvalue 3.\n- Step 2: Within this plane, you can choose ANY pair of orthogonal unit vectors — there's no canonical choice. So the columns of $$\\mathbf{P}$$ corresponding to the repeated eigenvalue are not unique.\n- Step 3: However, the resulting diagonal matrix $$\\mathbf{D} = \\text{diag}(3, 3, -2)$$ is the same regardless of which orthogonal pair you pick within the eigenplane. The diagonalisation is essentially unique even though $$\\mathbf{P}$$ isn't.", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": true}, {"question": "Explain the deep reason why \"the second row equation in finding eigenvectors\" sometimes gives the same information as the first row equation (no extra constraint). (3 steps)", "answer": "- Step 1: At an eigenvalue $$\\lambda$$, the matrix $$(\\mathbf{A} - \\lambda\\mathbf{I})$$ is singular by construction.\n- Step 2: For a $$3 \\times 3$$ singular matrix with one zero eigenvalue (typical for a simple eigenvalue), the rank is 2. This means: among the three row equations of $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$, exactly TWO are independent and one is a linear combination of the others.\n- Step 3: So in practice, two rows give all the constraints, and the third row will automatically be satisfied (or be a linear combination of the first two). This is also why you get a 1-parameter family of solutions — the eigenvector direction. If the eigenvalue is repeated, the rank may be just 1, giving a 2-parameter family (a plane of eigenvectors).", "source": "Opus 4.7 ②", "_id": "opus_2_70", "judge_pick": true}, {"question": "A $$3 \\times 3$$ matrix $$\\mathbf{A}$$ has eigenvalues $$\\lambda_1, \\lambda_2, \\lambda_3$$. Explain (without computing) why $$\\det(\\mathbf{A}) = \\lambda_1 \\lambda_2 \\lambda_3$$. (3 steps)", "answer": "- Step 1: The characteristic polynomial of $$\\mathbf{A}$$ factors as $$-(\\lambda - \\lambda_1)(\\lambda - \\lambda_2)(\\lambda - \\lambda_3) = \\det(\\mathbf{A} - \\lambda\\mathbf{I})$$.\n- Step 2: Set $$\\lambda = 0$$: $$\\det(\\mathbf{A} - 0 \\cdot \\mathbf{I}) = \\det(\\mathbf{A})$$. The characteristic polynomial at $$\\lambda = 0$$ gives $$-(0 - \\lambda_1)(0 - \\lambda_2)(0 - \\lambda_3) = -(-\\lambda_1)(-\\lambda_2)(-\\lambda_3) = \\lambda_1 \\lambda_2 \\lambda_3$$ (the negatives cancel).\n- Step 3: So $$\\det(\\mathbf{A}) = \\lambda_1 \\lambda_2 \\lambda_3$$ — the determinant is the product of eigenvalues. This works for any $$n$$. It also explains why singular matrices have at least one zero eigenvalue (the product is zero only if a factor is zero).", "source": "Opus 4.7 ②", "_id": "opus_2_71", "judge_pick": true}, {"question": "What's wrong with this argument: \"A $$3 \\times 3$$ matrix has 3 eigenvalues. Each gives one eigenvector. So there are exactly 3 eigenvectors.\"? (3 steps)", "answer": "- Step 1: The first claim (\"3 eigenvalues\") is correct counting with multiplicity, but the eigenvalues might not all be distinct (e.g., a repeated eigenvalue).\n- Step 2: The claim \"each gives one eigenvector\" is wrong: each eigenvalue gives at least one eigenvector direction, but any non-zero scalar multiple is also an eigenvector. So really, each eigenvalue gives an entire LINE of eigenvectors (or more — a plane for a \"geometric multiplicity 2\" repeated eigenvalue).\n- Step 3: Better statement: there are at most 3 linearly independent eigenvector DIRECTIONS, one per distinct eigenvalue (in general). For repeated eigenvalues, there might be fewer independent directions, OR the eigenspace might be larger (a plane). The right counting is by independent directions, not \"vectors\".", "source": "Opus 4.7 ②", "_id": "opus_2_72", "judge_pick": true}, {"question": "A linear transformation has matrix $$\\mathbf{T}$$ with $$\\det(\\mathbf{T}) = -1$$. What two things does this tell you geometrically? (3 steps)", "answer": "- Step 1: $$|\\det(\\mathbf{T})| = 1$$ means volumes are preserved — the transformation neither expands nor compresses 3D regions.\n- Step 2: The negative sign tells us orientation is reversed. A right-handed coordinate system maps to a left-handed one (or vice versa). This is characteristic of reflections, or odd numbers of reflections.\n- Step 3: Combined: the transformation is volume-preserving but orientation-reversing — it's a reflection (across a plane), or a rotation combined with a single reflection. Pure rotations have $$\\det = +1$$; pure reflections have $$\\det = -1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_73", "judge_pick": true}, {"question": "When solving $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ for an eigenvector, suppose you find that ALL three equations give \"0 = 0\" (no information). What does this mean and what should you do? (3 steps)", "answer": "- Step 1: All three equations being trivial means $$(\\mathbf{A} - \\lambda\\mathbf{I})$$ is the zero matrix. So $$\\mathbf{A} = \\lambda \\mathbf{I}$$ — the original matrix is a scalar multiple of the identity.\n- Step 2: In that case, every non-zero v
