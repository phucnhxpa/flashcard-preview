ector is an eigenvector with eigenvalue $$\\lambda$$. The eigenspace is all of $$\\mathbb{R}^3$$.\n- Step 3: This is rare and only happens for very special matrices ($$\\mathbf{A} = c\\mathbf{I}$$ for some $$c$$). You can pick any three linearly independent vectors as eigenvectors — the standard basis vectors are the simplest choice. The matrix is \"trivially diagonalisable\" because it's already a scaled identity.", "source": "Opus 4.7 ②", "_id": "opus_2_74", "judge_pick": true}, {"question": "A common error: computing the determinant of a $$3 \\times 3$$ matrix by multiplying just the diagonal entries. Why is this wrong, and when (rare) does it accidentally work? (3 steps)", "answer": "- Step 1: For a general $$3 \\times 3$$ matrix, $$\\det \\neq a_{11} a_{22} a_{33}$$. The correct formula involves all 9 entries through cofactor expansion: it's a sum of 6 signed products of entries from different rows and columns.\n- Step 2: The \"just multiply the diagonal\" rule works only for diagonal or triangular matrices, where the off-diagonal terms zero out automatically.\n- Step 3: For a triangular matrix (upper or lower), the off-diagonal entries above/below the diagonal don't enter into any non-zero cofactor, so the determinant reduces to the diagonal product. But for a general matrix with non-zero off-diagonal entries, this shortcut fails.", "source": "Opus 4.7 ②", "_id": "opus_2_75", "judge_pick": true}, {"question": "Describe what $$\\mathbf{A}^\\top \\mathbf{A}$$ does geometrically and why its eigenvalues must be non-negative for any matrix $$\\mathbf{A}$$. (3 steps)", "answer": "- Step 1: $$\\mathbf{A}^\\top \\mathbf{A}$$ is always symmetric (proved earlier), so it has real eigenvalues and orthogonal eigenvectors.\n- Step 2: For any vector $$\\mathbf{x}$$, $$\\mathbf{x} \\cdot (\\mathbf{A}^\\top \\mathbf{A})\\mathbf{x} = (\\mathbf{A}\\mathbf{x}) \\cdot (\\mathbf{A}\\mathbf{x}) = \\|\\mathbf{A}\\mathbf{x}\\|^2 \\geq 0$$. So $$\\mathbf{A}^\\top \\mathbf{A}$$ is \"positive semi-definite\".\n- Step 3: For an eigenvector $$\\mathbf{x}$$ with eigenvalue $$\\mu$$ of $$\\mathbf{A}^\\top \\mathbf{A}$$: $$\\mathbf{x} \\cdot (\\mathbf{A}^\\top \\mathbf{A})\\mathbf{x} = \\mathbf{x} \\cdot \\mu \\mathbf{x} = \\mu \\|\\mathbf{x}\\|^2 \\geq 0$$. Since $$\\|\\mathbf{x}\\|^2 > 0$$, we need $$\\mu \\geq 0$$. This connects $$\\mathbf{A}^\\top \\mathbf{A}$$ to length distortions of $$\\mathbf{A}$$ — a foundational idea in least-squares fitting.", "source": "Opus 4.7 ②", "_id": "opus_2_76", "judge_pick": true}, {"question": "Find the determinant of the $$3 \\times 3$$ matrix $$\\begin{pmatrix} 0 & 0 & a \\\\ 0 & b & 0 \\\\ c & 0 & 0 \\end{pmatrix}$$ and explain the result conceptually. (3 steps)", "answer": "- Step 1: Expand along the first row: $$0 \\cdot (\\ldots) - 0 \\cdot (\\ldots) + a \\cdot \\begin{vmatrix} 0 & b \\\\ c & 0 \\end{vmatrix} = a(0 \\cdot 0 - b \\cdot c) = -abc$$.\n- Step 2: So the determinant is $$-abc$$. Note the sign — it's not $$+abc$$.\n- Step 3: Conceptually, this matrix represents a \"permutation with reflection\": it sends $$\\mathbf{i} \\to c\\mathbf{k}$$, $$\\mathbf{j} \\to b\\mathbf{j}$$, $$\\mathbf{k} \\to a\\mathbf{i}$$. The \"swap\" of $$\\mathbf{i}$$ and $$\\mathbf{k}$$ flips orientation, hence the negative sign. The magnitude $$|abc|$$ is the volume scaling.", "source": "Opus 4.7 ②", "_id": "opus_2_77", "judge_pick": true}, {"question": "When solving the characteristic equation for a $$3 \\times 3$$ matrix, you often get a cubic in $$\\lambda$$. What's a useful technique for factorising it? (3 steps)", "answer": "- Step 1: First, look for \"obvious\" rational roots using the rational root theorem — try integer divisors of the constant term, especially small ones like $$\\pm 1, \\pm 2$$, etc.\n- Step 2: If a root $$\\lambda = r$$ works, then $$(\\lambda - r)$$ is a factor. Use polynomial long division or comparing coefficients to factor out, leaving a quadratic.\n- Step 3: Solve the resulting quadratic with the quadratic formula. If the discriminant is negative, the only real eigenvalue is $$r$$; otherwise you get two more real eigenvalues. Often exam questions hint at one root, making this much easier.", "source": "Opus 4.7 ②", "_id": "opus_2_78", "judge_pick": true}, {"question": "Given $$\\mathbf{P}$$ orthogonal and $$\\mathbf{A}$$ symmetric, prove that $$\\mathbf{P}^\\top \\mathbf{A}\\mathbf{P}$$ is also symmetric. (3 steps)", "answer": "- Step 1: To show a matrix is symmetric, we show it equals its own transpose. Compute $$(\\mathbf{P}^\\top \\mathbf{A}\\mathbf{P})^\\top$$.\n- Step 2: Use $$(\\mathbf{X}\\mathbf{Y}\\mathbf{Z})^\\top = \\mathbf{Z}^\\top \\mathbf{Y}^\\top \\mathbf{X}^\\top$$: $$(\\mathbf{P}^\\top \\mathbf{A}\\mathbf{P})^\\top = \\mathbf{P}^\\top \\mathbf{A}^\\top (\\mathbf{P}^\\top)^\\top = \\mathbf{P}^\\top \\mathbf{A}^\\top \\mathbf{P}$$.\n- Step 3: Since $$\\mathbf{A}$$ is symmetric, $$\\mathbf{A}^\\top = \\mathbf{A}$$. So $$(\\mathbf{P}^\\top \\mathbf{A}\\mathbf{P})^\\top = \\mathbf{P}^\\top \\mathbf{A}\\mathbf{P}$$ — it equals itself, hence symmetric. This confirms that diagonalising preserves the symmetric structure, and indeed $$\\mathbf{D}$$ being diagonal means it's automatically symmetric.", "source": "Opus 4.7 ②", "_id": "opus_2_79", "judge_pick": true}, {"question": "What property does $$(\\mathbf{A}^\\top)^\\top$$ have, and what does this mean about transposing as an operation? (3 steps)", "answer": "- Step 1: $$(\\mathbf{A}^\\top)^\\top = \\mathbf{A}$$ — transposing twice returns the original matrix.\n- Step 2: This makes transposition an \"involution\" — an operation that's its own inverse. (Other examples: negation $$-(-x) = x$$, complex conjugation $$\\overline{\\bar{z}} = z$$.)\n- Step 3: Practically, this means transposition is reversible without information loss. It's also why symmetry ($$\\mathbf{A} = \\mathbf{A}^\\top$$) is well-defined: applying transpose to both sides preserves the equation. Another way to say it: rows and columns are \"the same kind of thing\" up to perspective.", "source": "Opus 4.7 ②", "_id": "opus_2_80", "judge_pick": true}, {"question": "Why is the identity matrix $$\\mathbf{I}$$ orthogonal, symmetric, AND its own inverse? (3 steps)", "answer": "- Step 1: Symmetric: $$\\mathbf{I}^\\top = \\mathbf{I}$$ since interchanging rows and columns of $$\\mathbf{I}$$ gives back $$\\mathbf{I}$$ (the diagonal entries don't move).\n- Step 2: Orthogonal: $$\\mathbf{I}\\mathbf{I}^\\top = \\mathbf{I}\\cdot\\mathbf{I} = \\mathbf{I}$$ ✓. So $$\\mathbf{I}$$ is its own transpose AND satisfies the orthogonal-matrix definition.\n- Step 3: Self-inverse: $$\\mathbf{I}\\mathbf{I} = \\mathbf{I}$$, so $$\\mathbf{I}^{-1} = \\mathbf{I}$$. Big picture: $$\\mathbf{I}$$ is the \"neutral\" matrix — applying it does nothing, so all properties relating a matrix to its transpose/inverse are trivially true. It's the matrix analogue of the number $$1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_81", "judge_pick": false}, {"question": "Walk through diagonalising the symmetric matrix $$\\mathbf{A} = \\begin{pmatrix} 2 & -1 \\\\ -1 & 2 \\end{pmatrix}$$ to a diagonal form $$\\mathbf{D}$$. (5 steps)", "answer": "- Step 1: Find eigenvalues. $$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = (2-\\lambda)^2 - 1 = \\lambda^2 - 4\\lambda + 3 = (\\lambda - 1)(\\lambda - 3)$$. So $$\\lambda = 1, 3$$.\n- Step 2: Find eigenvectors. For $$\\lambda = 1$$: $$(\\mathbf{A} - \\mathbf{I})\\mathbf{x} = 0$$ gives $$x = y$$, so $$\\binom{1}{1}$$ works. For $$\\lambda = 3$$: $$(\\mathbf{A} - 3\\mathbf{I})\\mathbf{x} = 0$$ gives $$x = -y$$, so $$\\binom{1}{-1}$$ works.\n- Step 3: Normalise: $$\\binom{1}{1}/\\sqrt{2}$$ and $$\\binom{1}{-1}/\\sqrt{2}$$.\n- Step 4: Build $$\\mathbf{P} = \\dfrac{1}{\\sqrt{2}}\\begin{pmatrix} 1 & 1 \\\\ 1 & -1 \\end{pmatrix}$$. Note $$\\mathbf{P}^\\top = \\mathbf{P}$$ here (it's symmetric), so $$\\mathbf{P}^\\top = \\mathbf{P}^{-1}$$ — orthogonal.\n- Step 5: $$\\mathbf{D} = \\mathbf{P}^\\top \\mathbf{A} \\mathbf{P} = \\begin{pmatrix} 1 & 0 \\\\ 0 & 3 \\end{pmatrix}$$, with the eigenvalues on the diagonal in the same order as the eigenvectors in $$\\mathbf{P}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_82", "judge_pick": false}, {"question": "A $$3 \\times 3$$ matrix $$\\mathbf{T}$$ is given by $$\\mathbf{T}\\mathbf{i} = \\mathbf{i} + 2\\mathbf{j}$$, $$\\mathbf{T}\\mathbf{j} = -\\mathbf{j} + \\mathbf{k}$$, $$\\mathbf{T}\\mathbf{k} = 3\\mathbf{i} + \\mathbf{k}$$. Write down $$\\mathbf{T}$$. (3 steps)", "answer": "- Step 1: Each column of $$\\mathbf{T}$$ is the image of one basis vector: column 1 is $$\\mathbf{T}\\mathbf{i}$$, column 2 is $$\\mathbf{T}\\mathbf{j}$$, column 3 is $$\\mathbf{T}\\mathbf{k}$$.\n- Step 2: $$\\mathbf{T}\\mathbf{i} = \\mathbf{i} + 2\\mathbf{j} = (1, 2, 0)^\\top$$. $$\\mathbf{T}\\mathbf{j} = -\\mathbf{j} + \\mathbf{k} = (0, -1, 1)^\\top$$. $$\\mathbf{T}\\mathbf{k} = 3\\mathbf{i} + \\mathbf{k} = (3, 0, 1)^\\top$$.\n- Step 3: Assemble: $$\\mathbf{T} = \\begin{pmatrix} 1 & 0 & 3 \\\\ 2 & -1 & 0 \\\\ 0 & 1 & 1 \\end{pmatrix}$$. The \"columns are images of axes\" rule makes this almost mechanical once you've internalised it.", "source": "Opus 4.7 ②", "_id": "opus_2_83", "judge_pick": false}, {"question": "What's the connection between the rank-deficient property of a singular $$3 \\times 3$$ matrix and its eigenvectors? (3 steps)", "answer": "- Step 1: A singular matrix has $$\\det = 0$$, which (by the eigenvalue–determinant connection) means at least one eigenvalue is zero: $$\\lambda = 0$$.\n- Step 2: An eigenvector for $$\\lambda = 0$$ satisfies $$\\mathbf{A}\\mathbf{x} = 0\\mathbf{x} = \\mathbf{0}$$ — it's in the \"kernel\" or \"null space\" of the transformation. The matrix sends this direction to zero.\n- Step 3: The dimension of the null space equals the number of zero eigenvalues (with multiplicity). A rank-2 singular $$3 \\times 3$$ has one zero eigenvalue (a 1D null direction). A rank-1 singular $$3 \\times 3$$ has two zero eigenvalues (a 2D null plane). The \"rank deficiency\" is exactly the geometric multiplicity of zero as an eigenvalue.", "source": "Opus 4.7 ②", "_id": "opus_2_84", "judge_pick": false}, {"question": "Which line through the origin is invariant under the transformation $$\\mathbf{T} = \\begin{pmatrix} 4 & -2 \\\\ -1 & 3 \\end{pmatrix}$$? Find any/all such lines and the eigenvalues. (3 steps)", "answer": "- Step 1: Invariant lines correspond to eigenvectors. Find eigenvalues from $$\\det(\\mathbf{T} - \\lambda \\mathbf{I}) = (4-\\lambda)(3-\\lambda) - 2 = \\lambda^2 - 7\\lambda + 10 = (\\lambda - 2)(\\lambda - 5) = 0$$, giving $$\\lambda = 2, 5$$.\n- Step 2: For $$\\lambda = 2$$: $$(\\mathbf{T} - 2\\mathbf{I})\\mathbf{x} = 0$$ gives $$2x = 2y$$, so direction $$\\binom{1}{1}$$, line $$y = x$$.\n- Step 3: For $$\\lambda = 5$$: gives direction $$\\binom{2}{-1}$$, line $$y = -\\frac{1}{2}x$$. So there are exactly two invariant lines through the origin: $$y = x$$ (eigenvalue 2, points stretch by factor 2) and $$y = -\\frac{1}{2}x$$ (eigenvalue 5, points stretch by factor 5).", "source": "Opus 4.7 ②", "_id": "opus_2_85", "judge_pick": false}, {"question": "Why does an orthogonal matrix preserve lengths and angles, geometrically? (3 steps)", "answer": "- Step 1: For an orthogonal matrix $$\\mathbf{M}$$, $$(\\mathbf{M}\\mathbf{x}) \\cdot (\\mathbf{M}\\mathbf{y}) = (\\mathbf{M}\\mathbf{x})^\\top (\\mathbf{M}\\mathbf{y}) = \\mathbf{x}^\\top \\mathbf{M}^\\top \\mathbf{M} \\mathbf{y} = \\mathbf{x}^\\top \\mathbf{I} \\mathbf{y} = \\mathbf{x} \\cdot \\mathbf{y}$$.\n- Step 2: So dot products are preserved: $$(\\mathbf{M}\\mathbf{x}) \\cdot (\\mathbf{M}\\mathbf{y}) = \\mathbf{x} \\cdot \\mathbf{y}$$. Setting $$\\mathbf{y} = \\mathbf{x}$$ gives $$\\|\\mathbf{M}\\mathbf{x}\\|^2 = \\|\\mathbf{x}\\|^2$$, so lengths are preserved.\n- Step 3: For two vectors, $$\\cos\\theta = \\frac{\\mathbf{x}\\cdot\\mathbf{y}}{\\|\\mathbf{x}\\|\\|\\mathbf{y}\\|}$$ is preserved (numerator and denominator both unchanged). So angles are preserved. This is exactly what rotations and reflections do — they preserve the geometry of $$\\mathbb{R}^n$$, just rearrange directions.", "source": "Opus 4.7 ②", "_id": "opus_2_86", "judge_pick": true}, {"question": "What does it mean to say a transformation matrix is \"the same\" as its transpose, conceptually? (3 steps)", "answer": "- Step 1: A matrix $$\\mathbf{A}$$ equalling $$\\mathbf{A}^\\top$$ means it's symmetric: $$a_{ij} = a_{ji}$$ for all $$i, j$$.\n- Step 2: Symmetric matrices represent very special transformations. Geometrically, they always have orthogonal eigenvectors and act as \"scaling along three perpendicular axes\" (in 3D).\n- Step 3: They appear naturally in physics (stress tensors, moment of inertia), statistics (covariance matrices), and optimisation (Hessians of quadratic forms). Their nice spectral properties — real eigenvalues, orthogonal eigenvectors, diagonalisability — make them computationally and conceptually tractable.", "source": "Opus 4.7 ②", "_id": "opus_2_87", "judge_pick": false}, {"question": "Why is \"applying $$\\mathbf{T}^{-1}$$ then $$\\mathbf{T}$$\" the same as doing nothing, and how does this relate to the formula $$\\mathbf{T}^{-1}\\mathbf{T} = \\mathbf{T}\\mathbf{T}^{-1} = \\mathbf{I}$$? (3 steps)", "answer": "- Step 1: $$\\mathbf{T}$$ and $$\\mathbf{T}^{-1}$$ are designed to undo each other: applying one then the other returns the original. The combined transformation does nothing.\n- Step 2: \"Doing nothing\" as a matrix is the identity $$\\mathbf{I}$$. So the matrix equation is $$\\mathbf{T}\\mathbf{T}^{-1} = \\mathbf{I}$$ (do $$\\mathbf{T}^{-1}$$ first, then $$\\mathbf{T}$$, get nothing) and $$\\mathbf{T}^{-1}\\mathbf{T} = \\mathbf{I}$$ (do $$\\mathbf{T}$$ first, then $$\\mathbf{T}^{-1}$$, get nothing).\n- Step 3: A subtle point: matrix multiplication is non-commutative in general, but for a matrix and its inverse, the order doesn't matter — both products equal $$\\mathbf{I}$$. This is a defining proper const SK='fp3_ch06';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
