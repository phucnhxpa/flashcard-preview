$$\\text{diag}(|\\mathbf{y}_1|^2, |\\mathbf{y}_2|^2, |\\mathbf{y}_3|^2)$$ — a diagonal matrix, but not the identity.\n- Step 3: Then $$\\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$ would give a diagonal matrix whose entries are scaled versions of the eigenvalues, which is messier and doesn't give the clean \"$$\\mathbf{D}$$ has eigenvalues on the diagonal\" result.\n\nNormalization ensures $$\\mathbf{P}^\\top \\mathbf{P} = \\mathbf{I}$$ (i.e., $$\\mathbf{P}$$ is **orthogonal**), which is what makes $$\\mathbf{P}^\\top = \\mathbf{P}^{-1}$$ and gives the clean diagonalization formula.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "Explain why the matrix of cofactors for a singular matrix multiplied by its transpose gives the zero matrix: AC^T = 0.", "answer": "- For any square matrix A, the adjugate (adj(A) = C^T) satisfies A × adj(A) = det(A) × I.\n\n- If A is singular, det(A) = 0, so A × adj(A) = 0. This means every column of adj(A) is in the nullspace of A.\n\n- Since adj(A) = C^T, this means AC^T = 0. The columns of C^T (rows of C) are orthogonal to the row space of A.\n\nThis is a useful check: for singular matrices, AC^T should be zero.", "source": "MiniMax ①", "_id": "minimax_1_44"}, {"question": "When you reduce a symmetric matrix $$\\mathbf{A}$$ to diagonal form via $$\\mathbf{D} = \\mathbf{P}^\\top \\mathbf{A} \\mathbf{P}$$, the diagonal $$\\mathbf{D}$$ is \"essentially\" the same matrix as $$\\mathbf{A}$$ in some sense — but in what sense? (3 steps)", "answer": "- Step 1: $$\\mathbf{D}$$ and $$\\mathbf{A}$$ represent the same linear transformation, just expressed in different coordinate systems. The change of coordinates is given by $$\\mathbf{P}$$.\n- Step 2: In the original coordinates, $$\\mathbf{A}$$ acts via complicated mixing. But if we choose new axes aligned with the eigenvectors (the columns of $$\\mathbf{P}$$), the transformation becomes \"pure scaling\" along each axis — that's what $$\\mathbf{D}$$ shows: independent stretches by factors $$\\lambda_1, \\lambda_2, \\lambda_3$$.\n- Step 3: This is profound: every symmetric transformation is \"really just scaling along three perpendicular axes\". The complexity of $$\\mathbf{A}$$ is an artefact of being expressed in the wrong coordinates. Diagonalisation reveals the simple structure underneath.", "source": "Opus 4.7 ②", "_id": "opus_2_68"}, {"question": "Compare the rules $$(\\mathbf{AB})^\\top = \\mathbf{B}^\\top \\mathbf{A}^\\top$$ and $$(\\mathbf{AB})^{-1} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$. What do they have in common, and what is a key difference?", "answer": "- Step 1: **Common feature**: Both rules **reverse the order** of the matrices when applied to a product. This \"order reversal\" is a recurring structural pattern.\n- Step 2: **Key difference**: The transpose rule holds for **any** matrices (singular or not, even non-square if dimensions allow). The inverse rule only holds when **both** $$\\mathbf{A}$$ and $$\\mathbf{B}$$ are non-singular (so their inverses exist).\n- Step 3: Why the reversal? In both cases, we're \"undoing\" a composition. To reverse a sequence of operations, you must apply the reversals in opposite order — the last thing done must be undone first.\n\nThis reversal pattern reflects the non-commutativity of matrix multiplication: $$\\mathbf{AB} \\neq \\mathbf{BA}$$ in general.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "A $$3\\times 3$$ matrix has all entries equal to $$\\frac{1}{3}$$. What are its eigenvalues? Reason without expanding the characteristic polynomial. (3 steps)", "answer": "- Step 1: The matrix is $$\\mathbf{A} = \\frac{1}{3}\\mathbf{J}$$ where $$\\mathbf{J}$$ is the all-ones matrix. The all-ones vector $$\\mathbf{1} = (1,1,1)^\\top$$ satisfies $$\\mathbf{A}\\mathbf{1} = \\frac{1}{3} \\cdot 3\\mathbf{1} = \\mathbf{1}$$. So $$\\lambda = 1$$ is an eigenvalue with eigenvector $$\\mathbf{1}$$.\n- Step 2: Any vector summing to zero (like $$(1, -1, 0)^\\top$$) has $$\\mathbf{A}\\mathbf{v} = \\mathbf{0}$$, so $$\\lambda = 0$$ is an eigenvalue. The set of such vectors is 2-dimensional (the plane perpendicular to $$\\mathbf{1}$$).\n- Step 3: So eigenvalues are $$1$$ (multiplicity 1) and $$0$$ (multiplicity 2). Total: $$1 + 0 + 0 = 1 = \\text{trace}$$ ✓; product $$= 0 = \\det$$ ✓.\n\nPattern recognition is faster than computation when you can spot eigenvectors directly.", "source": "Opus 4.7 ①", "_id": "opus_1_89"}, {"question": "When solving $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ for an eigenvector, you typically get **infinitely many solutions**. How do you choose a \"nice\" one, and why is any choice valid?", "answer": "- Step 1: At an eigenvalue $$\\lambda$$, the matrix $$\\mathbf{A} - \\lambda\\mathbf{I}$$ is singular, so the system has a continuous family of solutions parameterized by 1 (or more) free variables.\n- Step 2: Any **non-zero** solution is a valid eigenvector. To pick a specific one, you typically:\n+ Set one variable equal to a convenient value like 1 (avoiding fractions if possible).\n+ Or normalize to unit length if the question requires.\n- Step 3: The choice doesn't affect the eigen-direction — only the magnitude. The \"line of eigenvectors\" is what matters; specific representatives are just convenient labels.\n\nStrategy tip: if you spot a particular row giving a clean ratio like $$y = -2x$$, set $$x = 1$$ to get $$y = -2$$, $$z = $$ whatever the third equation says — this avoids fractions.", "source": "Opus 4.7 ①", "_id": "opus_1_73"}, {"question": "Explain why a singular matrix cannot have an inverse. If $\\det(\\mathbf{A}) = 0$, what can you say about the linear transformation represented by $\\mathbf{A}$? (2 steps)", "answer": "- Step 1: The formula for the inverse is $\\mathbf{A}^{-1} = \\frac{1}{\\det(\\mathbf{A})}\\mathbf{C}^{\\top}$, where $\\mathbf{C}^{\\top}$ is the adjugate matrix. If $\\det(\\mathbf{A}) = 0$, we would be dividing by zero, which is undefined. Hence no inverse exists.\n\n- Step 2: A singular matrix represents a transformation that collapses dimensions - it maps at least one dimension to zero. For example, a $3 \\times 3$ singular matrix might map a plane to a line, or a line to a point. The image has lower dimension than the domain. When you apply such a transformation, you lose information and cannot uniquely reverse it.", "source": "MiniMax ②", "_id": "minimax_2_23"}, {"question": "Write $$\\binom{x}{y}$$ as a linear combination of two non-parallel eigenvectors of a $$2\\times 2$$ matrix. Why is this useful for computing $$\\mathbf{A}^n \\binom{x}{y}$$?", "answer": "- Step 1: Suppose eigenvectors are $$\\mathbf{v}_1$$ (eigenvalue $$\\lambda_1$$) and $$\\mathbf{v}_2$$ (eigenvalue $$\\lambda_2$$), and they are linearly independent. Then any vector can be written as $$\\binom{x}{y} = a\\mathbf{v}_1 + b\\mathbf{v}_2$$ for some scalars $$a, b$$.\n- Step 2: Then $$\\mathbf{A}\\binom{x}{y} = a\\mathbf{A}\\mathbf{v}_1 + b\\mathbf{A}\\mathbf{v}_2 = a\\lambda_1 \\mathbf{v}_1 + b\\lambda_2 \\mathbf{v}_2$$.\n- Step 3: Iterating: $$\\mathbf{A}^n \\binom{x}{y} = a\\lambda_1^n \\mathbf{v}_1 + b\\lambda_2^n \\mathbf{v}_2$$. Computing high powers becomes trivial — just take powers of scalars!\n\nThis is the foundation of solving linear recurrences, modeling population dynamics, and analyzing long-term behavior of dynamical systems. The eigenvector basis is the natural one for understanding the matrix's behavior over many iterations.", "source": "Opus 4.7 ①", "_id": "opus_1_82"}, {"question": "Find the determinant of the $$3 \\times 3$$ matrix $$\\begin{pmatrix} 0 & 0 & a \\\\ 0 & b & 0 \\\\ c & 0 & 0 \\end{pmatrix}$$ and explain the result conceptually. (3 steps)", "answer": "- Step 1: Expand along the first row: $$0 \\cdot (\\ldots) - 0 \\cdot (\\ldots) + a \\cdot \\begin{vmatrix} 0 & b \\\\ c & 0 \\end{vmatrix} = a(0 \\cdot 0 - b \\cdot c) = -abc$$.\n- Step 2: So the determinant is $$-abc$$. Note the sign — it's not $$+abc$$.\n- Step 3: Conceptually, this matrix represents a \"permutation with reflection\": it sends $$\\mathbf{i} \\to c\\mathbf{k}$$, $$\\mathbf{j} \\to b\\mathbf{j}$$, $$\\mathbf{k} \\to a\\mathbf{i}$$. The \"swap\" of $$\\mathbf{i}$$ and $$\\mathbf{k}$$ flips orientation, hence the negative sign. The magnitude $$|abc|$$ is the volume scaling.", "source": "Opus 4.7 ②", "_id": "opus_2_77"}, {"question": "Two matrices A and B represent the same linear transformation but in different coordinate systems. What matrix relationship connects them?", "answer": "If P is the change-of-basis matrix (from one coordinate system to another), then B = P⁻¹AP. The matrices A and B are similar - they represent the same transformation viewed from different bases. Key properties (determinant, trace, eigenvalues) are preserved: det(B) = det(A), tr(B) = tr(A), and both have the same eigenvalues. For symmetric matrices, we can diagonalise: D = P^T AP where P is orthogonal (since symmetric matrices can be diagonalised by orthogonal matrices).", "source": "MiniMax ①", "_id": "minimax_1_29"}, {"question": "Given a plane $$\\Pi: \\mathbf{r}\\cdot\\mathbf{n} = d$$ and a transformation $$\\mathbf{T}$$, why does the **inverse-transpose** $$(\\mathbf{T}^{-1})^\\top$$ play a role in finding the image plane?", "answer": "- Step 1: A point $$\\mathbf{x}$$ is on $$\\Pi$$ iff $$\\mathbf{x}\\cdot\\mathbf{n} = d$$. The image point is $$\\mathbf{x}' = \\mathbf{T}\\mathbf{x}$$, so $$\\mathbf{x} = \\mathbf{T}^{-1}\\mathbf{x}'$$.\n- Step 2: Substitute: $$(\\mathbf{T}^{-1}\\mathbf{x}') \\cdot \\mathbf{n} = d$$. Using the identity $$\\mathbf{u}\\cdot\\mathbf{v} = \\mathbf{u}^\\top \\mathbf{v}$$, this becomes $$(\\mathbf{T}^{-1}\\mathbf{x}')^\\top \\mathbf{n} = d$$, or equivalently $$\\mathbf{x}'^\\top (\\mathbf{T}^{-1})^\\top \\mathbf{n} = d$$.\n- Step 3: So the image plane has normal $$(\\mathbf{T}^{-1})^\\top \\mathbf{n}$$ — the original normal transformed by the inverse-transpose.\n\nConceptual point: while points transform by $$\\mathbf{T}$$, **normal vectors transform by the inverse-transpose**. This is why normals don't behave like ordinary vectors under non-orthogonal transformations.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "What does the **dot product** of two normalized eigenvectors $$\\mathbf{x}_1$$ and $$\\mathbf{x}_2$$ tell you, and what condition must hold for them to be \"orthogonal eigenvectors\"?", "answer": "- Step 1: For unit vectors, $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = \\cos\\theta$$ where $$\\theta$$ is the angle between them.\n- Step 2: They are **orthogonal** if $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = 0$$, meaning $$\\theta = 90°$$.\n- Step 3: For symmetric matrices, eigenvectors corresponding to **distinct** eigenvalues are automatically orthogonal — this is the deep theorem that makes diagonalization-by-orthogonal-matrix possible.\n\nFor repeated eigenvalues, you may have to **manually orthogonalize** within an eigenspace (e.g., using Gram-Schmidt) to get an orthogonal set.", "source": "Opus 4.7 ①", "_id": "opus_1_59"}, {"question": "Once an eigenvalue $\\lambda$ is found, how do you find the corresponding eigenvector, and why is the answer not a unique single vector? (2 steps)", "answer": "- Step 1: Substitute the value of $\\lambda$ into the equation $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ and solve the resulting system of simultaneous equations for the components of $\\mathbf{x}$.\n- Step 2: Because the matrix $$(\\mathbf{A} - \\lambda\\mathbf{I})$$ is singular (by definition of the eigenvalue), the system has infinitely many solutions forming a line through the origin. Any scalar multiple of an eigenvector is also an eigenvector (scaling a vector just changes its length, not its direction, so it remains an eigenvector). We typically express the answer in terms of a parameter or choose simple integer values.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "A plane is given parametrically as $$\\mathbf{r} = \\mathbf{a} + s\\mathbf{b} + t\\mathbf{c}$$. Under transformation $$\\mathbf{T}$$, what is the image, and when might the image fail to be a plane?", "answer": "- Step 1: By linearity, $$\\mathbf{T}(\\mathbf{a} + s\\mathbf{b} + t\\mathbf{c}) = \\mathbf{T}\\mathbf{a} + s\\mathbf{T}\\mathbf{b} + t\\mathbf{T}\\mathbf{c}$$. So the image has parametric form $$\\mathbf{r}' = \\mathbf{T}\\mathbf{a} + s(\\mathbf{T}\\mathbf{b}) + t(\\mathbf{T}\\mathbf{c})$$.\n- Step 2: This is a plane only if $$\\mathbf{T}\\mathbf{b}$$ and $$\\mathbf{T}\\mathbf{c}$$ remain linearly independent (non-parallel).\n- Step 3: When this fails:\n+ If $$\\mathbf{T}\\mathbf{b}$$ and $$\\mathbf{T}\\mathbf{c}$$ are parallel (but non-zero), the image is a **line**.\n+ If both are zero, the image is a **single point**.\n\nThis dimension reduction happens when $$\\mathbf{T}$$ is singular — it can drop a 2D plane down to lower dimensions.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "Explain why a $$3\\times 3$$ orthogonal matrix has columns that are **mutually orthogonal unit vectors**. (3 steps)", "answer": "- Step 1: $$\\mathbf{M}$$ orthogonal means $$\\mathbf{M}^\\top \\mathbf{M} = \\mathbf{I}$$.\n- Step 2: The $$(i,j)$$ entry of $$\\mathbf{M}^\\top \\mathbf{M}$$ is the dot product of column $$i$$ of $$\\mathbf{M}$$ with column $$j$$ of $$\\mathbf{M}$$.\n- Step 3: For this to equal $$\\mathbf{I}$$:\n+ $$(i,i)$$ entries = 1 means each column has length 1 (unit vectors).\n+ $$(i,j)$$ entries = 0 for $$i \\neq j$$ means different columns are perpendicular (orthogonal).\n\nSo orthogonality of $$\\mathbf{M}$$ is equivalent to its columns forming an **orthonormal set** — a perfect, well-aligned coordinate frame.", "source": "Opus 4.7 ①", "_id": "opus_1_64"}, {"question": "State the rule for inverting a product of two non-singular matrices and explain why the order reverses. (3 steps)", "answer": "- Step 1: The rule is $$(\\mathbf{A}\\mathbf{B})^{-1} = \\mathbf{B}^{-1} \\mathbf{A}^{-1}$$. The order reverses, just as it does for transposes.\n- Step 2: Verify: $$(\\mathbf{A}\\mathbf{B})(\\mathbf{B}^{-1} \\mathbf{A}^{-1}) = \\mathbf{A}(\\mathbf{B}\\mathbf{B}^{-1})\\mathbf{A}^{-1} = \\mathbf{A}\\mathbf{I}\\mathbf{A}^{-1} = \\mathbf{A}\\mathbf{A}^{-1} = \\mathbf{I}$$. So $$\\mathbf{B}^{-1}\\mathbf{A}^{-1}$$ is indeed the inverse.\n- Step 3: Intuitive \"socks and shoes\" analogy: $$\\mathbf{A}\\mathbf{B}$$ means \"do $$\\mathbf{B}$$ first, then $$\\mathbf{A}$$\" (like putting on socks then shoes). To undo, reverse the order: take off shoes first, then socks. So undo $$\\mathbf{A}$$ first, then $$\\mathbf{B}$$ — applying $$\\mathbf{A}^{-1}$$ before $$\\mathbf{B}^{-1}$$ from the left, hence $$\\mathbf{B}^{-1}\\mathbf{A}^{-1}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "A linear transformation $$T$$ is represented by a matrix with eigenvalues $$1, 1, 4$$ (with $$1$$ repeated). Describe the geometric structure of points/lines/planes invariant under $$T$$. (3 steps)", "answer": "- Step 1: Eigenvalue $$1$$ (repeated) means there's typically a 2D plane of invariant points — points in this plane satisfy $$T(\\mathbf{v}) = \\mathbf{v}$$ exactly. Each direction in this plane is fixed.\n- Step 2: Eigenvalue $$4$$ gives an invariant line (1D direction) along which points get stretched by factor 4. Points on this line slide outward but stay on the line.\n- Step 3: Combined picture: $$T$$ fixes a plane (containing all directions with eigenvalue 1) and stretches perpendicular to it by factor 4. This kind of transformation is sometimes called a \"stretch\" or \"shear\" depending on whether the eigenvectors are orthogonal.", "source": "Opus 4.7 ②", "_id": "opus_2_65"}, {"question": "When reducing a 3×3 symmetric matrix to diagonal form, what should you do if you get repeated eigenvalues? How does this affect the orthogonal matrix P?", "answer": "- With repeated eigenvalues (e.g., λ = 5, 5, 3), you need to find linearly independent eigenvectors for the repeated eigenvalue. There will be a whole plane of eigenvectors for λ = 5.\n\n- You then use any two orthogonal unit vectors from that eigenspace (they must be orthogonal to each other AND to the eigenvector for λ = 3).\n\n- Gram-Schmidt orthogonalisation can be used if your initially found eigenvectors aren't orthogonal. The key is: columns of P must be mutually orthogonal (for the diagonalisation to work with P^T rather than P^-1).\n\nEven with repeated eigenvalues, you can always find three mutually orthogonal eigenvectors for a symmetric matrix.", "source": "MiniMax ①", "_id": "minimax_1_34"}, {"question": "Why is the formula $$\\det(\\mathbf{A}\\mathbf{B}) = \\det(\\mathbf{A})\\det(\\mathbf{B})$$ special — what would break if it didn't hold?", "answer": "- Step 1: This formula links determinants to matrix multiplication. It says $$\\det$$ is a \"homomorphism\" — it converts multiplicative structure (matrix products) into multiplicative structure (number products).\n- Step 2: Without it: deciding whether $$\\mathbf{A}\\mathbf{B}$$ is singular would require explicitly multiplying matrices and computing a new determinant. With it: just multiply two scalars.\n- Step 3: It also implies:\n+ If either $$\\mathbf{A}$$ or $$\\mathbf{B}$$ is singular, so is $$\\mathbf{AB}$$ (singularity is contagious).\n+ $$\\det(\\mathbf{A}^{-1}) = \\frac{1}{\\det(\\mathbf{A})}$$, since $$\\det(\\mathbf{A}\\mathbf{A}^{-1}) = \\det(\\mathbf{I}) = 1$$.\n+ $$\\det(\\mathbf{A}^n) = (\\det\\mathbf{A})^n$$.\n\nThese are foundational facts that all rest on the multiplicative property — without it, determinant theory would be a mess.", "source": "Opus 4.7 ①", "_id": "opus_1_81"}, {"question": "A linear transformation has matrix $$\\mathbf{T}$$ with $$\\det(\\mathbf{T}) = -1$$. What two things does this tell you geometrically? (3 steps)", "answer": "- Step 1: $$|\\det(\\mathbf{T})| = 1$$ means volumes are preserved — the transformation neither expands nor compresses 3D regions.\n- Step 2: The negative sign tells us orientation is reversed. A right-handed coordinate system maps to a left-handed one (or vice versa). This is characteristic of reflections, or odd numbers of reflections.\n- Step 3: Combined: the transformation is volume-preserving but orientation-reversing — it's a reflection (across a plane), or a rotation combined with a single reflection. Pure rotations have $$\\det = +1$$; pure reflections have $$\\det = -1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_73"}, {"question": "For the transformation represented by $\\mathbf{T} = \\begin{pmatrix} 2 & -1 & 3 \\\\ -1 & 4 & -2 \\\\ 3 & 2 & 4 \\end{pmatrix}$, the plane $\\Pi$ has equation $2x - y + 3z = -6$. Show that the image of $\\Pi$ under $T$ is a line and find its Cartesian equations. (4 steps)", "answer": "- Step 1: Write plane in parametric form. Let $x = s, z = t$, then $y = 6 + 2s + 3t$.\nGeneral point: $\\begin{pmatrix} s \\\\ 6 + 2s + 3t \\\\ t \\end{pmatrix}$\n\n- Step 2: Apply transformation:\n$$\\mathbf{T}\\begin{pmatrix} s \\\\ 6 + 2s + 3t \\\\ t \\end{pmatrix} = \\begin{pmatrix} -6 \\\\ 24 + 7s + 10t \\\\ 12 + 7s + 10t \\end{pmatrix}$$\n\n- Step 3: Let the image point be $(x, y, z)$. Then:\n$$x = -6$$\n$$y = 24 + 7s + 10t$$\n$$z = 12 + 7s + 10t$$\n\n- Step 4: Eliminate parameters. From first equation $x = -6$. Subtracting third from second:\n$$y - z = 12$$\n\nSo the image is the line: $x = -6$ and $y - z = 12$ (or equivalently $y = z + 12$).\n\nThe plane collapses to a line because $\\mathbf{T}$ is singular (determinant = 0).", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "A matrix A satisfies A³ = I. What are the possible eigenvalues of A? (2 steps)", "answer": "- Step 1: If λ is an eigenvalue of A with eigenvector v, then A³v = λ³v. But A³v = Iv = v, so λ³ = 1.\n\n- Step 2: The solutions to λ³ = 1 are λ = 1, λ = e^(2πi/3) = -1/2 + i√3/2, or λ = e^(4πi/3) = -1/2 - i√3/2. For real matrices, complex eigenvalues come in conjugate pairs. So the real eigenvalue must be λ = 1. The other two (if present) are complex conjugates.\n\nThis explains why rotation matrices of order 3 (rotate by 120°) have eigenvalues 1, ω, ω².", "source": "MiniMax ①", "_id": "minimax_1_43"}, {"question": "When solving a system like $$\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$$ for $$\\mathbf{x}_1$$ given $$\\mathbf{x}_2$$, when might you prefer **simultaneous equations** over computing $$\\mathbf{T}^{-1}$$?", "answer": "- Step 1: Computing $$\\mathbf{T}^{-1}$$ for a $$3\\times 3$$ matrix involves: determinant, $$3\\times 3$$ matrix of minors (9 sub-determinants), cofactor signs, transpose, division. Long process.\n- Step 2: For a **single** unknown vector $$\\mathbf{x}_1$$, simultaneous equations can be much faster — you write down the three component equations of $$\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$$ and use elimination/substitution.\n- Step 3: When to prefer each:\n+ **Inverse method**: better if you'll reuse $$\\mathbf{T}^{-1}$$ for many different right-hand sides, or if the question explicitly asks for $$\\mathbf{T}^{-1}$$.\n+ **Simultaneous equations**: better for one-off problems where computing the full inverse is overkill.\n\nStrategic thinking is part of efficient problem solving — choose the right tool.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "A $$2\\times 2$$ matrix has only **one** invariant line through the origin (just one eigenvalue or coincident eigenvectors). Geometrically, what kinds of transformations have this property?", "answer": "- Step 1: Two cases lead to fewer than two invariant lines:\n+ **Repeated eigenvalue with only one eigenvector direction** (defective matrix): a single invariant line exists. Example: shear $$\\begin{pmatrix} 1 & 1 \\\\ 0 & 1 \\end{pmatrix}$$ — invariant line is the x-axis.\n+ **Complex eigenvalues**: no real eigenvectors at all, so no invariant lines. Example: rotation $$\\begin{pmatrix} \\cos\\theta & -\\sin\\theta \\\\ \\sin\\theta & \\cos\\theta \\end{pmatrix}$$ for $$\\theta \\neq 0, \\pi$$.\n- Step 2: For a matrix with one invariant line: think shears, glide-reflections, or rotations combined with scaling along one direction.\n- Step 3: Two distinct invariant lines = two distinct real eigenvalues = \"decomposable\" stretching transformation. Zero invariant lines = pure rotation.\n\nThis makes the eigenvalue/eigenvector picture a complete classification of $$2\\times 2$$ transformations geometrically.", "source": "Opus 4.7 ①", "_id": "opus_1_84"}, {"question": "A common error: computing the determinant of a $$3 \\times 3$$ matrix by multiplying just the diagonal entries. Why is this wrong, and when (rare) does it accidentally work? (3 steps)", "answer": "- Step 1: For a general $$3 \\times 3$$ matrix, $$\\det \\neq a_{11} a_{22} a_{33}$$. The correct formula involves all 9 entries through cofactor expansion: it's a sum of 6 signed products of entries from different rows and columns.\n- Step 2: The \"just multiply the diagonal\" rule works only for diagonal or triangular matrices, where the off-diagonal terms zero out automatically.\n- Step 3: For a triangular matrix (upper or lower), the off-diagonal entries above/below the diagonal don't enter into any non-zero cofactor, so the determinant reduces to the diagonal product. But for a general matrix with non-zero off-diagonal entries, this shortcut fails.", "source": "Opus 4.7 ②", "_id": "opus_2_75"}, {"question": "A common mistake: a student computes the inverse of $$\\mathbf{A}$$ but forgets to take the transpose at step 4 (after forming the cofactor matrix). What goes wrong? (3 steps)", "answer": "- Step 1: Without the transpose, the student computes $$\\dfrac{1}{\\det(\\mathbf{A})} \\mathbf{C}$$ instead of $$\\dfrac{1}{\\det(\\mathbf{A})} \\mathbf{C}^\\top$$.\n- Step 2: This is generally NOT the inverse — multiplying gives $$\\mathbf{A} \\cdot \\dfrac{1}{\\det(\\mathbf{A})}\\mathbf{C}$$, which doesn't simplify to $$\\mathbf{I}$$ except by coincidence (e.g., when $$\\mathbf{A}$$ happens to be symmetric, $$\\mathbf{C}$$ is also symmetric, so $$\\mathbf{C}^\\top = \\mathbf{C}$$).\n- Step 3: Misconception probe: always remember the transpose step. A quick check is to multiply your computed \"inverse\" by $$\\mathbf{A}$$ — if you don't get $$\\mathbf{I}$$, something's wrong (usually a missing transpose or sign error).", "source": "Opus 4.7 ②", "_id": "opus_2_62"}, {"question": "Why must an eigenvector be non-zero, but an eigenvalue can be zero? (3 steps)", "answer": "- Step 1: If $$\\mathbf{x} = \\mathbf{0}$$ were allowed, then $$\\mathbf{A}\\mathbf{0} = \\mathbf{0} = \\lambda \\mathbf{0}$$ for **any** $$\\lambda$$ — the equation would be trivially satisfied by every scalar, making the concept useless.\n- Step 2: An eigenvalue of zero is meaningful: $$\\mathbf{A}\\mathbf{x} = 0\\cdot\\mathbf{x} = \\mathbf{0}$$ means $$\\mathbf{x}$$ is a **non-zero vector** that gets crushed to zero by $$\\mathbf{A}$$.\n- Step 3: This happens precisely when $$\\mathbf{A}$$ is singular — there's a non-trivial direction that the transformation collapses. So $$\\lambda = 0$$ is an eigenvalue if and only if $$\\det(\\mathbf{A}) = 0$$.\n\nThe asymmetry is built into the definition to keep the concept meaningful: zero vectors are \"trivially invariant\" and would clutter everything.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "When solving the characteristic equation for a $$3 \\times 3$$ matrix, you often get a cubic in $$\\lambda$$. What's a useful technique for factorising it? (3 steps)", "answer": "- Step 1: First, look for \"obvious\" rational roots using the rational root theorem — try integer divisors of the constant term, especially small ones like $$\\pm 1, \\pm 2$$, etc.\n- Step 2: If a root $$\\lambda = r$$ works, then $$(\\lambda - r)$$ is a factor. Use polynomial long division or comparing coefficients to factor out, leaving a quadratic.\n- Step 3: Solve the resulting quadratic with the quadratic formula. If the discriminant is negative, the only real eigenvalue is $$r$$; otherwise you get two more real eigenvalues. Often exam questions hint at one root, making this much easier.", "source": "Opus 4.7 ②", "_id": "opus_2_78"}, {"question": "If you swap the order of the columns in $$\\mathbf{P}$$ when diagonalising a symmetric matrix, what happens to the diagonal matrix $$\\mathbf{D}$$? (3 steps)", "answer": "- Step 1: The diagonal entries of $$\\mathbf{D}$$ correspond directly to the columns of $$\\mathbf{P}$$: the $$i$$-th column being eigenvector for $$\\lambda_i$$ means the $$i$$-th diagonal entry of $$\\mathbf{D}$$ is $$\\lambda_i$$.\n- Step 2: So if you swap columns of $$\\mathbf{P}$$, you swap the corresponding diagonal entries of $$\\mathbf{D}$$.\n- Step 3: This means $$\\mathbf{D}$$ is \"essentially unique\" only up to permutation of the diagonal — there's no canonical order for the eigenvalues. Both $$\\text{diag}(2, 5)$$ and $$\\text{diag}(5, 2)$$ are valid diagonalisations of the same matrix; you pick whichever order you want for $$\\mathbf{P}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "Given that $$\\det(\\mathbf{A}) \\det(\\mathbf{B}) = \\det(\\mathbf{A}\\mathbf{B})$$, can you conclude that $$\\det(\\mathbf{A} + \\mathbf{B}) = \\det(\\mathbf{A}) + \\det(\\mathbf{B})$$? Justify with reasoning or a counterexample. (3 steps)", "answer": "- Step 1: This is a common misconception — the determinant is NOT linear (additive). $$\\det(\\mathbf{A} + \\mathbf{B}) \\neq \\det(\\mathbf{A}) + \\det(\\mathbf{B})$$ in general.\n- Step 2: Counterexample: $$\\mathbf{A} = \\mathbf{B} = \\mathbf{I}$$ ($$2 \\times 2$$). Then $$\\det(\\mathbf{A}) = \\det(\\mathbf{B}) = 1$$, so the right-hand side is $$2$$. But $$\\mathbf{A} + \\mathbf{B} = 2\\mathbf{I}$$ with $$\\det = 4$$. Clearly $$4 \\neq 2$$.\n- Step 3: The determinant is multiplicative, not additive. This connects to the geometric interpretation: $$\\det$$ measures volume scaling, and adding matrices doesn't have a clean \"scaling\" interpretation. The product rule works because composing transformations multiplies their volume scalings.", "source": "Opus 4.7 ②", "_id": "opus_2_67"}, {"question": "What conditions must be satisfied for a matrix to be diagonalizable by an orthogonal matrix?", "answer": "The matrix must be symmetric (or more generally, normal: AA^T = A^T A). For symmetric matrices: 1) All eigenvalues are real, 2) There exist enough eigenvectors to form a basis (always true for symmetric), 3) Eigenvectors for distinct eigenvalues are automatically orthogonal. Even with repeated eigenvalues, you can always find a full set of mutually orthogonal eigenvectors. Therefore: symmetric ⇨ orthogonally diagonalizable. This is not true for non-symmetric matrices - they may not be diagonalizable at all, or may require non-orthogonal P.", "source": "MiniMax ①", "_id": "minimax_1_46"}, {"question": "Why is it that for a 3×3 transformation matrix $$\\mathbf{T}$$, knowing the images of three linearly independent vectors completely determines $$\\mathbf{T}$$? (3 steps)", "answer": "- Step 1: Linearity means once you know $$\\mathbf{T}$$ on a basis, you know $$\\mathbf{T}$$ everywhere: any vector $$\\mathbf{v} = a\\mathbf{e}_1 + b\\mathbf{e}_2 + c\\mathbf{e}_3$$ has $$\\mathbf{T}\\mathbf{v} = a\\,\\mathbf{T}\\mathbf{e}_1 + b\\,\\mathbf{T}\\mathbf{e}_2 + c\\,\\mathbf{T}\\mathbf{e}_3$$.\n- Step 2: So if we know $$\\mathbf{T}\\mathbf{e}_1, \\mathbf{T}\\mathbf{e}_2, \\mathbf{T}\\mathbf{e}_3$$, we know $$\\mathbf{T}$$ on all of $$\\mathbb{R}^3$$.\n- Step 3: Three **linearly independent** vectors form a basis (possibly different from standard), and we can express standard basis vectors as combinations of them — so knowledge is transferable. If the vectors are NOT linearly independent (e.g., coplanar), they don't span and don't determine $$\\mathbf{T}$$ uniquely.\n\nThis is why textbook problems often give you images of $$\\mathbf{i}, \\mathbf{j}, \\mathbf{k}$$ (already a basis) — it's the most direct way.", "source": "Opus 4.7 ①", "_id": "opus_1_65"}, {"question": "A $$3 \\times 3$$ matrix $$\\mathbf{A}$$ has characteristic polynomial $$-(\\lambda - 1)^2(\\lambda - 4)$$. Describe the eigenvalues, including any subtlety. (3 steps)", "answer": "- Step 1: Setting the polynomial to zero: $$\\lambda = 1$$ (repeated, \"double root\") or $$\\lambda = 4$$.\n- Step 2: So there are two distinct eigenvalues, but $$\\lambda = 1$$ has algebraic multiplicity 2.\n+ This sometimes (not always) gives extra freedom in choosing eigenvectors for $$\\lambda = 1$$.\n+ Geometrically, repeated eigenvalues sometimes correspond to entire planes of invariant directions.\n- Step 3: When working out the eigenvector for $$\\lambda = 1$$, you may find that the system $$(\\mathbf{A} - \\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ has a 2-parameter family of solutions, meaning you can pick two independent eigenvectors for the same eigenvalue. (For $$\\lambda = 4$$, you typically get a 1-parameter family — a single direction.)", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Prove that similar matrices have the same eigenvalues. (2 steps)", "answer": "- Step 1: Let B = P^-1AP, so A and B are similar. Let λ be an eigenvalue of B with eigenvector v: Bv = λv.\n\n- Step 2: Then P^-1AP v = λv, so A(Pv) = λ(Pv). This means λ is also an eigenvalue of A, with eigenvector Pv.\n\nSince similar matrices represent the same linear transformation in different bases, they must have the same intrinsic properties - eigenvalues are intrinsic, not basis-dependent.", "source": "MiniMax ①", "_id": "minimax_1_41"}, {"question": "Why does an orthogonal matrix preserve lengths and angles, geometrically? (3 steps)", "answer": "- Step 1: For an orthogonal matrix $$\\mathbf{M}$$, $$(\\mathbf{M}\\mathbf{x}) \\cdot (\\mathbf{M}\\mathbf{y}) = (\\mathbf{M}\\mathbf{x})^\\top (\\mathbf{M}\\mathbf{y}) = \\mathbf{x}^\\top \\mathbf{M}^\\top \\mathbf{M} \\mathbf{y} = \\mathbf{x}^\\top \\mathbf{I} \\mathbf{y} = \\mathbf{x} \\cdot \\mathbf{y}$$.\n- Step 2: So dot products are preserved: $$(\\mathbf{M}\\mathbf{x}) \\cdot (\\mathbf{M}\\mathbf{y}) = \\mathbf{x} \\cdot \\mathbf{y}$$. Setting $$\\mathbf{y} = \\mathbf{x}$$ gives $$\\|\\mathbf{M}\\mathbf{x}\\|^2 = \\|\\mathbf{x}\\|^2$$, so lengths are preserved.\n- Step 3: For two vectors, $$\\cos\\theta = \\frac{\\mathbf{x}\\cdot\\mathbf{y}}{\\|\\mathbf{x}\\|\\|\\mathbf{y}\\|}$$ is preserved (numerator and denominator both unchanged). So angles are preserved. This is exactly what rotations and reflections do — they preserve the geometry of $$\\mathbb{R}^n$$, just rearrange directions.", "source": "Opus 4.7 ②", "_id": "opus_2_86"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "How is the transpose of a matrix $\\mathbf{A}$, denoted $\\mathbf{A}^T$, formed, and how do its dimensions relate to the original matrix?", "answer": "- Step 1: To form the transpose, you interchange the rows and columns of the matrix. The first row of $\\mathbf{A}$ becomes the first column of $\\mathbf{A}^T$, the second row becomes the second column, and so on.\n- Step 2: This operation flips the matrix over its main diagonal (top-left to bottom-right).\n- Step 3: Consequently, if the original matrix $\\mathbf{A}$ has dimensions $n \\times m$ ($n$ rows, $m$ columns), the transpose $\\mathbf{A}^T$ will have dimensions $m \\times n$ ($m$ rows, $n$ columns).", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "What condition must a square matrix satisfy to be classified as symmetric?", "answer": "A square matrix is symmetric if it is equal to its own transpose, i.e., $$\\mathbf{A} = \\mathbf{A}^T$$. This implies that the matrix is unchanged when flipped over its main diagonal. Element-wise, this means that the element in the $i$-th row and $j$-th column must equal the element in the $j$-th row and $i$-th column ($$a_{ij} = a_{ji}$$). The elements are mirrored across the leading diagonal.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Why does the transpose of a matrix product reverse the order of the matrices: $$(\\mathbf{A}\\mathbf{B})^T = \\mathbf{B}^T \\mathbf{A}^T$$? (3 steps)", "answer": "- Step 1: Consider the definition of matrix multiplication. The element in the $i$-th row and $j$-th column of a product $\\mathbf{A}\\mathbf{B}$ is the dot product of the $i$-th row of $\\mathbf{A}$ and the $j$-th column of $\\mathbf{B}$.\n- Step 2: When we take the transpose of the product, $$(\\mathbf{A}\\mathbf{B})^T$$, the element in the $i$-th row and $j$-th column of the transposed matrix corresponds to the element in the $j$-th row and $i$-th column of the original product. This is the dot product of the $j$-th row of $\\mathbf{A}$ and the $i$-th column of $\\mathbf{B}$.\n- Step 3: This is equivalent to the dot product of the $i$-th row of $$\\mathbf{B}^T$$ (which was the $i$-th column of $\\mathbf{B}$) and the $j$-th column of $$\\mathbf{A}^T$$ (which was the $j$-th row of $\\mathbf{A}$). This matches the definition of the element in the $i$-th row and $j$-th column of the product $$\\mathbf{B}^T \\mathbf{A}^T$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Prove that for any matrix $\\mathbf{M}$, the products $$\\mathbf{M}^T \\mathbf{M}$$ and $$\\mathbf{M} \\mathbf{M}^T$$ are always symmetric matrices. (2 steps)", "answer": "- Step 1: A matrix is symmetric if it equals its own transpose. Let's take the transpose of $$\\mathbf{M}^T \\mathbf{M}$$. Using the rule $$(\\mathbf{A}\\mathbf{B})^T = \\mathbf{B}^T \\mathbf{A}^T$$, we get $$(\\mathbf{M}^T \\mathbf{M})^T = \\mathbf{M}^T (\\mathbf{M}^T)^T$$.\n- Step 2: Transposing a matrix twice returns the original matrix, so $$(\\mathbf{M}^T)^T = \\mathbf{M}$$. Substituting this back gives $$(\\mathbf{M}^T \\mathbf{M})^T = \\mathbf{M}^T \\mathbf{M}$$. Since the matrix equals its transpose, it is symmetric. The same logic applies to $$\\mathbf{M} \\mathbf{M}^T$$.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "How do you calculate the determinant of a $$3 \\times 3$$ matrix using the first row, and why is the sign of the middle term negative? (3 steps)", "answer": "- Step 1: You expand along the first row. For each element in the first row, you multiply it by the determinant of the $$2 \\times 2$$ sub-matrix formed by deleting the row and column containing that element (this sub-determinant is called the minor).\n- Step 2: You apply an alternating sign pattern to the elements: $$+$$, $$-$$, $$+$$. The formula is $$a|\\text{minor}_a| - b|\\text{minor}_b| + c|\\text{minor}_c|$$.\n- Step 3: The negative sign on the middle term comes from the general cofactor formula $$(-1)^{i+j}$$, which determines the sign based on the element's position. For an element in the 1st row and 2nd column, $$(-1)^{1+2} = -1$$, hence the negative sign. This checkerboard pattern ensures the correct geometric scaling and orientation properties of the determinant.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Geometrically, what does it mean if a $$3 \\times 3$$ transformation matrix has a determinant of 0 (is singular)?", "answer": "A determinant of 0 means the linear transformation collapses 3D space into a lower dimension (a plane, a line, or a point). The determinant represents the volume scaling factor of the transformation. If it is 0, all 3D volume is lost. Because multiple original points map to the same image point (information is lost), the transformation cannot be reversed, meaning the matrix has no inverse.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "What are the 5 steps to find the inverse of a non-singular $$3 \\times 3$$ matrix $\\mathbf{A}$?", "answer": "- Step 1: Find the determinant $$\\det(\\mathbf{A})$$. If it is 0, stop (no inverse exists).\n- Step 2: Form the matrix of minors $\\mathbf{M}$. Replace every element in $\\mathbf{A}$ with the determinant of the $$2 \\times 2$$ sub-matrix left after deleting its row and column.\n- Step 3: Form the matrix of cofactors $\\mathbf{C}$. Apply the checkerboard sign pattern $$\\begin{pmatrix} + & - & + \\\\ - & + & - \\\\ + & - & + \\end{pmatrix}$$ to the matrix of minors.\n- Step 4: Form the adjugate (or adjoint) matrix $$\\mathbf{C}^T$$ by transposing the matrix of cofactors.\n- Step 5: Multiply the adjugate by the scalar reciprocal of the determinant: $$\\mathbf{A}^{-1} = \\frac{1}{\\det(\\mathbf{A})} \\mathbf{C}^T$$.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Derive the formula for the inverse of a product of two non-singular matrices: $$(\\mathbf{A}\\mathbf{B})^{-1} = \\mathbf{B}^{-1} \\mathbf{A}^{-1}$$. (3 steps)", "answer": "- Step 1: Start with the definition of an inverse. If $\\mathbf{X}$ is the inverse of $\\mathbf{A}\\mathbf{B}$, then $$(\\mathbf{A}\\mathbf{B})\\mathbf{X} = \\mathbf{I}$$.\n- Step 2: Multiply both sides on the left by $$\\mathbf{A}^{-1}$$. This gives $$\\mathbf{A}^{-1}(\\mathbf{A}\\mathbf{B})\\mathbf{X} = \\mathbf{A}^{-1}\\mathbf{I}$$, which simplifies to $$\\mathbf{I}\\mathbf{B}\\mathbf{X} = \\mathbf{A}^{-1}$$, and further to $$\\mathbf{B}\\mathbf{X} = \\mathbf{A}^{-1}$$.\n- Step 3: Multiply both sides on the left by $$\\mathbf{B}^{-1}$$. This gives $$\\mathbf{B}^{-1}\\mathbf{B}\\mathbf{X} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$, which simplifies to $$\\mathbf{I}\\mathbf{X} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$. Therefore, $$\\mathbf{X} = \\mathbf{B}^{-1} \\mathbf{A}^{-1}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "How do you construct the $$3 \\times 3$$ matrix representing a linear transformation $T$?", "answer": "Apply the transformation $T$ to the three standard basis vectors: $$\\mathbf{i} = \\begin{pmatrix} 1 \\\\ 0 \\\\ 0 \\end{pmatrix}$$, $$\\mathbf{j} = \\begin{pmatrix} 0 \\\\ 1 \\\\ 0 \\end{pmatrix}$$, and $$\\mathbf{k} = \\begin{pmatrix} 0 \\\\ 0 \\\\ 1 \\end{pmatrix}$$. The image of $\\mathbf{i}$ becomes the first column of the matrix, the image of $\\mathbf{j}$ becomes the second column, and the image of $\\mathbf{k}$ becomes the third column. This works because the columns of a transformation matrix describe where the basis vectors land.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "If transformation $T$ is represented by matrix $\\mathbf{T}$ and $U$ by $\\mathbf{U}$, what does the matrix product $\\mathbf{U}\\mathbf{T}$ represent? What is the common misconception regarding the order?", "answer": "$\\mathbf{U}\\mathbf{T}$ represents the combined transformation of $T$ followed by $U$. The common misconception is to read left-to-right and assume it means $U$ then $T$. However, because we apply transformations to position vectors as $$\\mathbf{M}\\mathbf{x}$$, applying $T$ first means computing $$\\mathbf{T}\\mathbf{x}$$. Then applying $U$ to the result means multiplying by $\\mathbf{U}$ on the left: $$\\mathbf{U}(\\mathbf{T}\\mathbf{x}) = (\\mathbf{U}\\mathbf{T})\\mathbf{x}$$. The transformation applied first appears on the right (closest to the vector).", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A line has vector equation $$\\mathbf{r} = \\mathbf{a} + t\\mathbf{b}$$. How do you find its image under a non-singular transformation matrix $\\mathbf{M}$? (2 steps)", "answer": "- Step 1: Apply the matrix to the general position vector on the line. The image is given by $$\\mathbf{M}\\mathbf{r} = \\mathbf{M}(\\mathbf{a} + t\\mathbf{b})$$.\n- Step 2: Use the distributive property of matrix multiplication to separate the terms: $$\\mathbf{M}\\mathbf{a} + t(\\mathbf{M}\\mathbf{b})$$. This is the vector equation of a new line passing through the point $\\mathbf{M}\\mathbf{a}$ (the image of the original point) in the direction of $\\mathbf{M}\\mathbf{b}$ (the image of the original direction vector).", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "A vector $\\mathbf{x}_1$ is transformed to $\\mathbf{x}_2$ by matrix $\\mathbf{T}$, so $$\\mathbf{T}\\mathbf{x}_1 = \\mathbf{x}_2$$. How do you find $\\mathbf{x}_1$ if you know $\\mathbf{T}$ and $\\mathbf{x}_2$? (2 steps)", "answer": "- Step 1: To reverse the transformation, you need to \"undo\" the multiplication by $\\mathbf{T}$. You do this by multiplying both sides of the equation on the left by the inverse matrix $$\\mathbf{T}^{-1}$$.\n- Step 2: This gives $$\\mathbf{T}^{-1}(\\mathbf{T}\\mathbf{x}_1) = \\mathbf{T}^{-1}\\mathbf{x}_2$$. Since $$\\mathbf{T}^{-1}\\mathbf{T} = \\mathbf{I}$$ and $$\\mathbf{I}\\mathbf{x}_1 = \\mathbf{x}_1$$, this simplifies to $$\\mathbf{x}_1 = \\mathbf{T}^{-1}\\mathbf{x}_2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Define an eigenvector and eigenvalue of a matrix $\\mathbf{A}$. What is the geometric intuition behind this definition?", "answer": "An eigenvector $\\mathbf{x}$ is a non-zero column vector that satisfies the equation $$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$$, where $\\lambda$ is a scalar called the eigenvalue. Geometrically, applying the transformation $\\mathbf{A}$ to an eigenvector does not change its direction (or reverses it if $\\lambda < 0$); it only scales the vector by the factor $\\lambda$. The vector remains on its \"span\" (the line passing through the origin and the vector).", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Derive the characteristic equation $$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = 0$$ from the definition of eigenvalues. (3 steps)", "answer": "- Step 1: Start with the definition $$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$$. We want to solve for $\\lambda$ and $\\mathbf{x}$.\n- Step 2: Rewrite the right side using the identity matrix so both terms are matrix-vector products: $$\\mathbf{A}\\mathbf{x} - \\lambda\\mathbf{I}\\mathbf{x} = \\mathbf{0}$$. Factor out the vector $\\mathbf{x}$$: $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$.\n- Step 3: Since $\\mathbf{x}$ is defined as a non-zero vector, the matrix $$(\\mathbf{A} - \\lambda\\mathbf{I})$$ must map a non-zero vector to the zero vector. This means the matrix is singular (it collapses the space). A singular matrix has a determinant of zero, hence $$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Once an eigenvalue $\\lambda$ is found, how do you find the corresponding eigenvector, and why is the answer not a unique single vector? (2 steps)", "answer": "- Step 1: Substitute the value of $\\lambda$ into the equation $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$ and solve the resulting system of simultaneous equations for the components of $\\mathbf{x}$.\n- Step 2: Because the matrix $$(\\mathbf{A} - \\lambda\\mathbf{I})$$ is singular (by definition of the eigenvalue), the system has infinitely many solutions forming a line through the origin. Any scalar multiple of an eigenvector is also an eigenvector (scaling a vector just changes its length, not its direction, so it remains an eigenvector). We typically express the answer in terms of a parameter or choose simple integer values.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "What is a normalised eigenvector, and how is it calculated from a given eigenvector?", "answer": "A normalised eigenvector is a unit vector (magnitude 1) pointing in the same direction as the eigenvector. To calculate it, divide each component of the eigenvector by the magnitude of the vector. For a 3D vector $$\\begin{pmatrix} a \\\\ b \\\\ c \\end{pmatrix}$$, the normalised version is $$\\frac{1}{\\sqrt{a^2+b^2+c^2}} \\begin{pmatrix} a \\\\ b \\\\ c \\end{pmatrix}$$. This is crucial for diagonalisation where we need orthogonal unit vectors.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "What is the difference between an invariant line and a line of invariant points under a transformation?", "answer": "An invariant line is a line where every point on the line maps to another point on the *same* line (though the specific point might move along the line). An eigenvector defines the direction of an invariant line. A line of invariant points is a stricter condition: it is a line where every point maps to *itself*. This occurs specifically when the eigenvalue associated with the line's direction is exactly 1.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "What defines an orthogonal matrix $\\mathbf{M}$, and what is a key consequence for its inverse?", "answer": "An orthogonal matrix satisfies the condition $$\\mathbf{M}\\mathbf{M}^T = \\mathbf{I}$$. The key consequence is that the inverse of an orthogonal matrix is simply its transpose: $$\\mathbf{M}^{-1} = \\mathbf{M}^T$$. Geometrically, orthogonal matrices represent transformations that preserve lengths and angles (rotations and reflections), meaning they don't distort the space.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Why are the eigenvectors of a symmetric matrix with distinct eigenvalues mutually orthogonal? (3 steps)", "answer": "- Step 1: Consider two distinct eigenvalues $$\\lambda_1, \\lambda_2$$ with corresponding eigenvectors $$\\mathbf{x}_1, \\mathbf{x}_2$$ of a symmetric matrix $\\mathbf{A}$. We know $$\\mathbf{A}\\mathbf{x}_1 = \\lambda_1\\mathbf{x}_1$$ and $$\\mathbf{A}\\mathbf{x}_2 = \\lambda_2\\mathbf{x}_2$$.\n- Step 2: Transpose the first equation: $$\\mathbf{x}_1^T \\mathbf{A}^T = \\lambda_1 \\mathbf{x}_1^T$$. Since $\\mathbf{A}$ is symmetric, $$\\mathbf{A}^T = \\mathbf{A}$$, so $$\\mathbf{x}_1^T \\mathbf{A} = \\lambda_1 \\mathbf{x}_1^T$$. Multiply this by $\\mathbf{x}_2$ on the right: $$\\mathbf{x}_1^T \\mathbf{A} \\mathbf{x}_2 = \\lambda_1 \\mathbf{x}_1^T \\mathbf{x}_2$$.\n- Step 3: Substitute $$\\mathbf{A}\\mathbf{x}_2 = \\lambda_2\\mathbf{x}_2$$ into the left side: $$\\mathbf{x}_1^T \\lambda_2 \\mathbf{x}_2 = \\lambda_1 \\mathbf{x}_1^T \\mathbf{x}_2$$. This implies $$(\\lambda_2 - \\lambda_1)\\mathbf{x}_1^T \\mathbf{x}_2 = 0$$. Since the eigenvalues are distinct ($$\\lambda_1 \\neq \\lambda_2$$), the scalar product $$\\mathbf{x}_1 \\cdot \\mathbf{x}_2 = 0$$, meaning they are orthogonal.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Outline the 4-step process to reduce a symmetric matrix $\\mathbf{A}$ to a diagonal matrix $\\mathbf{D}$. (4 steps)", "answer": "- Step 1: Find the normalised eigenvectors of $\\mathbf{A}$.\n- Step 2: Form the matrix $\\mathbf{P}$ by placing these normalised eigenvectors as columns.\n- Step 3: Write down the transpose $$\\mathbf{P}^T$$ (which is also the inverse $$\\mathbf{P}^{-1}$$ for an orthogonal matrix).\n- Step 4: Calculate the product $$\\mathbf{D} = \\mathbf{P}^T \\mathbf{A} \\mathbf{P}$$ (or equivalently $$\\mathbf{P}^{-1} \\mathbf{A} \\mathbf{P}$$). The resulting diagonal matrix $\\mathbf{D}$ will have the eigenvalues corresponding to the columns of $\\mathbf{P}$ on its leading diagonal.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Why does the diagonalisation formula $$\\mathbf{P}^T \\mathbf{A} \\mathbf{P} = \\mathbf{D}$$ work? What is $\\mathbf{P}$ actually doing conceptually? (3 steps)", "answer": "- Step 1: The matrix $\\mathbf{P}$ represents a change of basis from the standard coordinate axes to a new coordinate system aligned with the eigenvectors.\n- Step 2: In the standard basis, the transformation $\\mathbf{A}$ involves a complex mix of scaling and shearing that isn't aligned with the axes, resulting in non-zero off-diagonal elements.\n- Step 3: When viewed from the perspective of the eigenvector basis (which is what multiplying by $$\\mathbf{P}^T$$ and $\\mathbf{P}$ achieves), the transformation simply scales along those new axes by the eigenvalues. This pure scaling along axes is exactly what a diagonal matrix represents.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "Matrices $\\mathbf{A}$ and $\\mathbf{B}$ can be multiplied. If $\\mathbf{A}$ is $$2 \\times 3$$ and $\\mathbf{B}$ is $$3 \\times 4$$, what are the dimensions of $$(\\mathbf{A}\\mathbf{B})^T$$? (2 steps)", "answer": "- Step 1: First determine the dimensions of the product $\\mathbf{A}\\mathbf{B}$. The inner dimensions (3) match, so the product exists and its dimensions are determined by the outer dimensions: $$2 \\times 4$$.\n- Step 2: The transpose of a matrix swaps its rows and columns. Therefore, a $$2 \\times 4$$ matrix transposed becomes a $$4 \\times 2$$ matrix.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "A $$3 \\times 3$$ matrix $\\mathbf{A}$ has a row that is a scalar multiple of another row (e.g., Row 2 = $k \\times$ Row 1). Without performing full calculation, explain why $$\\det(\\mathbf{A}) = 0$$. (2 steps)", "answer": "- Step 1: The determinant measures the volume scaling factor of the transformation represented by the matrix.\n- Step 2: If one row is a multiple of another, the rows are linearly dependent. Linearly dependent rows mean the transformation maps 3D space into a plane (or lower dimension), collapsing the 3D volume to zero. Hence, the determinant must be 0.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "You are told $$\\lambda = 2$$ is an eigenvalue of $$\\mathbf{A} = \\begin{pmatrix} 1 & 0 \\\\ 0 & 2 \\end{pmatrix}$$. Verify this by substituting into the characteristic equation. (2 steps)", "answer": "- Step 1: The characteristic equation is $$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = 0$$. Substitute $$\\lambda = 2$$: $$\\det \\begin{pmatrix} 1-2 & 0 \\\\ 0 & 2-2 \\end{pmatrix} = \\det \\begin{pmatrix} -1 & 0 \\\\ 0 & 0 \\end{pmatrix}$$.\n- Step 2: Calculate the determinant of this resulting matrix: $$(-1)(0) - (0)(0) = 0$$. Since the determinant is 0, $$\\lambda=2$$ satisfies the characteristic equation and is indeed an eigenvalue.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A matrix $\\mathbf{M}$ has columns that are normalised, mutually orthogonal vectors. Is $\\mathbf{M}$ an orthogonal matrix? Justify your answer. (2 steps)", "answer": "Yes.\n- Step 1: The definition of an orthogonal matrix is $$\\mathbf{M}^T \\mathbf{M} = \\mathbf{I}$$. When you multiply $$\\mathbf{M}^T \\mathbf{M}$$, the element in the $i$-th row and $j$-th column is the dot product of the $i$-th column of $\\mathbf{M}$ with the $j$-th column of $\\mathbf{M}$.\n- Step 2: Since the columns are orthogonal, dot products of different columns ($$i \\neq j$$) are 0. Since they are normalised, dot products of a column with itself ($$i = j$$) are 1. This results in the identity matrix $\\mathbf{I}$, satisfying the definition.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}], "count": 25}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "If matrix $$\\mathbf{M}$$ has dimensions $$n \\times m$$, what are the dimensions of its transpose $$\\mathbf{M}^T$$? How is $$\\mathbf{M}^T$$ constructed from $$\\mathbf{M}$$?", "answer": "- Step 1: The transpose of a matrix is formed by interchanging its rows and columns. You take the first row of $$\\mathbf{M}$$ and write it as the first column of $$\\mathbf{M}^T$$, the second row becomes the second column, and so on.\n- Step 2: Because the number of rows in $$\\mathbf{M}$$ (which is $$n$$) becomes the number of columns in $$\\mathbf{M}^T$$, and the number of columns in $$\\mathbf{M}$$ (which is $$m$$) becomes the number of rows in $$\\mathbf{M}^T$$, the dimensions of $$\\mathbf{M}^T$$ are $$m \\times n$$.\n+ For example, if $$\\mathbf{M}$$ is $$2 \\times 3$$, then $$\\mathbf{M}^T$$ is $$3 \\times 2$$.\n- Step 3: The element in the $$i$$-th row and $$j$$-th column of $$\\mathbf{M}$$ (denoted $$m_{ij}$$) becomes the element in the $$j$$-th row and $$i$$-th column of $$\\mathbf{M}^T$$ (so $$m_{ij} \\to m_{ji}$$).\n\nThe dimensions \"flip\" because rows become columns and columns become rows.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "What is the defining property of a symmetric matrix in terms of its transpose? What does this imply about its elements?", "answer": "- Step 1: A matrix $$\\mathbf{A}$$ is defined as symmetric if it is equal to its own transpose, i.e., $$\\mathbf{A} = \\mathbf{A}^T$$.\n- Step 2: This equality implies that the matrix must be square ($$n \\times n$$), because a non-square matrix has different dimensions from its transpose and thus cannot be equal to it.\n- Step 3: For the elements, the condition $$\\mathbf{A} = \\mathbf{A}^T$$ means that $$a_{ij} = a_{ji}$$ for all $$i$$ and $$j$$.\n+ In practical terms, the matrix is a mirror image of itself across its leading diagonal (top-left to bottom-right).\n- Step 4: This symmetry means that the element in the first row, second column is the same as the element in the second row, first column, and so on for all pairs of positions reflected across the diagonal.\n\nA symmetric matrix is unchanged by \"flipping\" it over its main diagonal.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "What is the transpose of a product of two matrices, $$(\\mathbf{A}\\mathbf{B})^T$$? Why does the order of multiplication reverse compared to the original product? (3 steps)", "answer": "- Step 1: The transpose of a product reverses the order of the factors: $$(\\mathbf{A}\\mathbf{B})^T = \\mathbf{B}^T \\mathbf{A}^T$$. This is a common source of error; it is **not** $$\\mathbf{A}^T \\mathbf{B}^T$$.\n- Step 2: To understand why intuitively, consider matrix multiplication as a series of transformations. If you apply transformation $$\\mathbf{A}$$ followed by $$\\mathbf{B}$$, the combined transformation is $$\\mathbf{B}\\mathbf{A}$$. If you \"transpose\" (or reverse) the order of operations, you must reverse the order of the individual operations: first reverse $$\\mathbf{B}$$ (which is $$\\mathbf{B}^T$$), then reverse $$\\mathbf{A}$$ (which is $$\\mathbf{A}^T$$).\n- Step 3: Algebraically, the element in the $$i$$-th row and $$j$$-th column of $$\\mathbf{A}\\mathbf{B}$$ is the dot product of the $$i$$-th row of $$\\mathbf{A}$$ with the $$j$$-th column of $$\\mathbf{B}$$. In the transpose $$(\\mathbf{A}\\mathbf{B})^T$$, this element moves to the $$j$$-th row and $$i$$-th column. This is exactly the dot product of the $$j$$-th row of $$\\mathbf{B}^T$$ with the $$i$$-th column of $$\\mathbf{A}^T$$, which corresponds to the matrix product $$\\mathbf{B}^T \\mathbf{A}^T$$.\n\nThe order reverses because transposing swaps the \"input\" and \"output\" roles of the rows and columns, effectively reversing the sequence of operations.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Why is the product $$\\mathbf{M}\\mathbf{M}^T$$ always a symmetric matrix, regardless of whether $$\\mathbf{M}$$ is square or rectangular? (2 steps)", "answer": "- Step 1: To prove $$\\mathbf{M}\\mathbf{M}^T$$ is symmetric, we must show that it is equal to its own transpose. Let $$\\mathbf{X} = \\mathbf{M}\\mathbf{M}^T$$.\n- Step 2: Take the transpose of $$\\mathbf{X}$$: $$(\\mathbf{M}\\mathbf{M}^T)^T = (\\mathbf{M}^T)^T \\mathbf{M}^T$$ (using the rule $$(\\mathbf{A}\\mathbf{B})^T = \\mathbf{B}^T \\mathbf{A}^T$$).\n- Step 3: Since transposing a transpose returns the original matrix, $$(\\mathbf{M}^T)^T = \\mathbf{M}$$. Substituting this back gives $$\\mathbf{M}\\mathbf{M}^T = \\mathbf{X}$$.\n- Step 4: Because $$\\mathbf{X}^T = \\mathbf{X}$$, the matrix $$\\mathbf{M}\\mathbf{M}^T$$ satisfies the definition of a symmetric matrix. The same logic applies to $$\\mathbf{M}^T\\mathbf{M}$$.\n\nThe double-transpose cancellation $$((\\mathbf{M}^T)^T = \\mathbf{M})$$ forces the product to \"fold back\" on itself, guaranteeing symmetry.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "How do you evaluate the determinant of a $$3 \\times 3$$ matrix using cofactor expansion along the first row? What is the sign pattern (checkerboard pattern) for the cofactors? (3 steps)", "answer": "- Step 1: For a matrix $$\\mathbf{A} = \\begin{pmatrix} a & b & c \\\\ d & e & f \\\\ g & h & i \\end{pmatrix}$$, the determinant is found by taking each element in the first row, multiplying it by the determinant of the $$2 \\times 2$$ sub-matrix that remains after deleting the element's row and column (its \"minor\"), and applying a sign.\n- Step 2: The formula is: $$\\det(\\mathbf{A}) = a\\begin{vmatrix} e & f \\\\ h & i \\end{vmatrix} - b\\begin{vmatrix} d & f \\\\ g & i \\end{vmatrix} + c\\begin{vmatrix} d & e \\\\ g & h \\end{vmatrix}$$. Notice the alternating signs: $$+$$, $$-$$, $$+$$.\n- Step 3: The sign pattern for a $$3 \\times 3$$ matrix is a checkerboard starting with $$+$$ in the top-left corner: $$\\begin{pmatrix} + & - & + \\\\ - & + & - \\\\ + & - & + \\end{pmatrix}$$. You multiply the minor of each element by the sign in its corresponding position.\n\nThe expansion \"picks apart\" the $$3 \\times 3$$ determinant into a linear combination of $$2 \\times 2$$ determinants, weighted by the checkerboard signs.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "What does it mean for a matrix to be singular, and what is the geometric interpretation of this property in terms of linear transformations? (2 steps)", "answer": "- Step 1: A matrix is singular if its determinant is zero ($$\\det(\\mathbf{A}) = 0$$). This means the matrix does not have an inverse.\n- Step 2: Geometrically, the determinant represents the \"scale factor\" of the volume (or area in 2D) of a region transformed by the matrix. If $$\\det(\\mathbf{A}) = 0$$, the transformation squashes the 3D space into a lower dimension (a plane, a line, or a point), reducing the volume to zero.\n- Step 3: Because the transformation collapses space, information is lost (multiple points map to the same point), making it impossible to reverse the transformation uniquely. Hence, no inverse exists.\n\nA singular matrix flattens space, making the transformation irreversible.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "How do determinants behave under matrix multiplication and transposition? Specifically, what is $$\\det(\\mathbf{A}\\mathbf{B})$$ in terms of $$\\det(\\mathbf{A})$$ and $$\\det(\\mathbf{B})$$, and what is $$\\det(\\mathbf{A}^T)$$ compared to $$\\det(\\mathbf{A})$$? (2 steps)", "answer": "- Step 1: For multiplication, the determinant of a product equals the product of the determinants: $$\\det(\\mathbf{A}\\mathbf{B}) = \\det(\\mathbf{A})\\det(\\mathbf{B})$$. Intuitively, if transformation $$\\mathbf{A}$$ scales volumes by a factor of 3, and $$\\mathbf{B}$$ scales volumes by a factor of 2, then applying $$\\mathbf{A}$$ then $$\\mathbf{B}$$ scales volumes by $$3 \\times 2 = 6$$.\n- Step 2: For transposition, the determinant is unchanged: $$\\det(\\mathbf{A}^T) = \\det(\\mathbf{A})$$. This is because the cofactor expansion along the first row of $$\\mathbf{A}$$ yields the exact same calculation as the expansion along the first column of $$\\mathbf{A}^T$$.\n\nDeterminants multiply under composition and are invariant under transposition.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "List the 5 steps to find the inverse of a non-singular $$3 \\times 3$$ matrix $$\\mathbf{A}$$ using the adjugate method. (5 steps)", "answer": "- Step 1: **Find the determinant**, $$\\det(\\mathbf{A})$$. If it is zero, stop; the matrix is singular and has no inverse.\n- Step 2: **Form the matrix of minors**. For each element in $$\\mathbf{A}$$, delete its row and column, and calculate the determinant of the remaining $$2 \\times 2$$ sub-matrix. Place these determinants in a new matrix $$\\mathbf{M}$$.\n- Step 3: **Form the matrix of cofactors**. Apply the checkerboard sign pattern $$\\begin{pmatrix} + & - & + \\\\ - & + & - \\\\ + & - & + \\end{pmatrix}$$ to the matrix of minors $$\\mathbf{M}$$ to get $$\\mathbf{C}$$.\n- Step 4: **Form the adjugate (or adjoint) matrix**. This is the transpose of the cofactor matrix: $$\\text{adj}(\\mathbf{A}) = \\mathbf{C}^T$$.\n- Step 5: **Divide by the determinant**. The inverse is given by $$\\mathbf{A}^{-1} = \\frac{1}{\\det(\\mathbf{A})} \\text{adj}(\\mathbf{A})$$.\n\nThe process calculates the \"reciprocal\" of the transformation by dividing the transposed cofactors by the volume scale factor.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "What is the inverse of a product of two non-singular matrices, $$(\\mathbf{A}\\mathbf{B})^{-1}$$? Why does the order reverse? (3 steps)", "answer": "- Step 1: The inverse of a product reverses the order of the factors: $$(\\mathbf{A}\\mathbf{B})^{-1} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$.\n- Step 2: Intuitively, if you put on your socks ($$\\mathbf{A}$$) and then your shoes ($$\\mathbf{B}$$), the combined action is $$\\mathbf{A}\\mathbf{B}$$. To undo this combined action (the inverse), you must first take off your shoes ($$\\mathbf{B}^{-1}$$) and then take off your socks ($$\\mathbf{A}^{-1}$$).\n- Step 3: Algebraically, let $$\\mathbf{P} = (\\mathbf{A}\\mathbf{B})^{-1}$$. Then $$(\\mathbf{A}\\mathbf{B})\\mathbf{P} = \\mathbf{I}$$. Multiply on the left by $$\\mathbf{A}^{-1}$$: $$\\mathbf{B}\\mathbf{P} = \\mathbf{A}^{-1}$$. Multiply on the left by $$\\mathbf{B}^{-1}$$: $$\\mathbf{P} = \\mathbf{B}^{-1}\\mathbf{A}^{-1}$$.\n\nTo undo a sequence of operations, you must undo them in the reverse order.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "How do you find the $$3 \\times 3$$ matrix representing a linear transformation $$T$$ in 3D space? (2 steps)", "answer": "- Step 1: A linear transformation is completely defined by its effect on the standard basis vectors: $$\\mathbf{e}_1 = \\begin{pmatrix} 1 \\\\ 0 \\\\ 0 \\end{pmatrix}$$, $$\\mathbf{e}_2 = \\begin{pmatrix} 0 \\\\ 1 \\\\ 0 \\end{pmatrix}$$, and $$\\mathbf{e}_3 = \\begin{pmatrix} 0 \\\\ 0 \\\\ 1 \\end{pmatrix}$$.\n- Step 2: Apply the transformation $$T$$ to each basis vector to find their images: $$T(\\mathbf{e}_1)$$, $$T(\\mathbf{e}_2)$$, and $$T(\\mathbf{e}_3)$$.\n- Step 3: The matrix representing $$T$$ is formed by using these images as the columns of the matrix. That is, $$\\mathbf{T} = \\begin{pmatrix} | & | & | \\\\ T(\\mathbf{e}_1) & T(\\mathbf{e}_2) & T(\\mathbf{e}_3) \\\\ | & | & | \\end{pmatrix}$$.\n\nThe columns of the transformation matrix are simply \"where the basis vectors go.\"", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "If transformation $$T$$ is represented by matrix $$\\mathbf{T}$$ and transformation $$U$$ by matrix $$\\mathbf{U}$$, what matrix represents the combined transformation of $$T$$ followed by $$U$$? (2 steps)", "answer": "- Step 1: When applying transformations to a vector $$\\mathbf{x}$$, $$T$$ is applied first, yielding $$\\mathbf{T}\\mathbf{x}$$. Then $$U$$ is applied to the result, yielding $$\\mathbf{U}(\\mathbf{T}\\mathbf{x})$$.\n- Step 2: By associativity of matrix multiplication, $$\\mathbf{U}(\\mathbf{T}\\mathbf{x}) = (\\mathbf{U}\\mathbf{T})\\mathbf{x}$$. Therefore, the matrix representing \"$$T$$ followed by $$U$$\" is the product $$\\mathbf{U}\\mathbf{T}$$.\n+ Misconception alert: The order of multiplication is the reverse of the order of application. $$T$$ then $$U$$ is $$\\mathbf{U}\\mathbf{T}$$, not $$\\mathbf{T}\\mathbf{U}$$.\n\nThe matrix closest to the vector acts first.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "If a vector $$\\mathbf{x}$$ is transformed to $$\\mathbf{y} = \\mathbf{T}\\mathbf{x}$$ by a non-singular matrix $$\\mathbf{T}$$, how do you reverse this transformation to find $$\\mathbf{x}$$? (2 steps)", "answer": "- Step 1: Start with the equation $$\\mathbf{y} = \\mathbf{T}\\mathbf{x}$$. To isolate $$\\mathbf{x}$$, you need to \"undo\" the multiplication by $$\\mathbf{T}$$.\n- Step 2: Multiply both sides on the left by the inverse matrix $$\\mathbf{T}^{-1}$$: $$\\mathbf{T}^{-1}\\mathbf{y} = \\mathbf{T}^{-1}(\\mathbf{T}\\mathbf{x})$$.\n- Step 3: Since $$\\mathbf{T}^{-1}\\mathbf{T} = \\mathbf{I}$$ (the identity matrix), the equation simplifies to $$\\mathbf{x} = \\mathbf{T}^{-1}\\mathbf{y}$$.\n\nTo find the original vector, multiply the image vector by the inverse of the transformation matrix.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "What is the defining equation for an eigenvalue $$\\lambda$$ and eigenvector $$\\mathbf{x}$$ of a matrix $$\\mathbf{A}$$? What is the geometric meaning of this equation? (3 steps)", "answer": "- Step 1: The defining equation is $$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$$, where $$\\mathbf{A}$$ is a square matrix, $$\\mathbf{x}$$ is a non-zero column vector, and $$\\lambda$$ is a scalar (number).\n- Step 2: Geometrically, multiplying a vector by a matrix usually rotates and scales it. An eigenvector is a \"special\" vector that does not get rotated by the transformation $$\\mathbf{A}$$.\n- Step 3: The transformation only scales the eigenvector. The eigenvalue $$\\lambda$$ is the scale factor. If $$\\lambda > 0$$, the vector stays pointing the same way; if $$\\lambda < 0$$, it points the opposite way; if $$\\lambda = 0$$, it is squashed to the origin.\n\nEigenvectors are the invariant directions of a transformation; eigenvalues are the stretch factors along those directions.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "How do you find the eigenvalues of a matrix? Why is the characteristic equation $$\\det(\\mathbf{A} - \\lambda \\mathbf{I}) = 0$$ instead of $$\\det(\\mathbf{A} - \\lambda) = 0$$? (4 steps)", "answer": "- Step 1: Start with the definition $$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x}$$.\n- Step 2: Rearrange to bring all terms to one side: $$\\mathbf{A}\\mathbf{x} - \\lambda\\mathbf{x} = \\mathbf{0}$$.\n- Step 3: You cannot subtract a scalar ($$\\lambda$$) from a matrix ($$\\mathbf{A}$$). To factor out $$\\mathbf{x}$$, you must write $$\\lambda$$ as a matrix of the same size: $$\\lambda\\mathbf{I}$$. This gives $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$.\n- Step 4: Since we want a non-trivial solution for $$\\mathbf{x}$$ (i.e., $$\\mathbf{x} \\neq \\mathbf{0}$$), the matrix $$(\\mathbf{A} - \\lambda\\mathbf{I})$$ must be singular. A singular matrix has a determinant of zero, so we set $$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = 0$$.\n\nThe $$\\mathbf{I}$$ is necessary to make the subtraction dimensionally consistent, allowing us to use the determinant condition for non-trivial solutions.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "Once an eigenvalue $$\\lambda$$ is found for a matrix $$\\mathbf{A}$$, how do you determine the corresponding eigenvector? (3 steps)", "answer": "- Step 1: Substitute the known value of $$\\lambda$$ into the matrix equation $$(\\mathbf{A} - \\lambda\\mathbf{I})\\mathbf{x} = \\mathbf{0}$$.\n- Step 2: This creates a system of linear equations. Because $$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = 0$$, the rows of this matrix are linearly dependent, meaning the system has infinitely many solutions (a null space).\n- Step 3: Solve the system by row reduction or simple substitution. You will typically find that the components of $$\\mathbf{x}$$ depend on one free parameter. Choose a convenient value for this parameter (like 1) to write down a specific eigenvector.\n+ Any non-zero scalar multiple of this eigenvector is also a valid eigenvector for the same eigenvalue.\n\nThe eigenvector is any non-zero vector in the null space of $$(\\mathbf{A} - \\lambda\\mathbf{I})$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "How do you normalise a 3D vector $$\\mathbf{v} = \\begin{pmatrix} a \\\\ b \\\\ c \\end{pmatrix}$$? Why is this necessary in the diagonalisation process? (3 steps)", "answer": "- Step 1: Calculate the magnitude (length) of the vector: $$|\\mathbf{v}| = \\sqrt{a^2 + b^2 + c^2}$$.\n- Step 2: Divide each component of the vector by this magnitude: $$\\hat{\\mathbf{v}} = \\frac{1}{|\\mathbf{v}|}\\begin{pmatrix} a \\\\ b \\\\ c \\end{pmatrix} = \\begin{pmatrix} a/\\sqrt{a^2+b^2+c^2} \\\\ b/\\sqrt{a^2+b^2+c^2} \\\\ c/\\sqrt{a^2+b^2+c^2} \\end{pmatrix}$$.\n- Step 3: This is necessary for diagonalisation because the matrix $$\\mathbf{P}$$ formed from the eigenvectors must be an **orthogonal matrix** ($$\\mathbf{P}^T\\mathbf{P} = \\mathbf{I}$$). For the columns of $$\\mathbf{P}$$ to be orthonormal (orthogonal and normalised), the eigenvectors must be scaled to have a length of 1.\n\nNormalising scales the eigenvector to unit length, ensuring the transformation matrix $$\\mathbf{P}$$ preserves distances (is orthogonal).", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "What is an invariant line under a transformation? What condition on the eigenvalue makes this line a line of invariant points? (3 steps)", "answer": "- Step 1: An invariant line is a line that maps onto itself under the transformation. Any point on the line is mapped to another point on the same line.\n- Step 2: Eigenvectors define invariant lines through the origin. If $$\\mathbf{x}$$ is an eigenvector, the line $$\\mathbf{r} = t\\mathbf{x}$$ is mapped to $$\\mathbf{A}(t\\mathbf{x}) = t(\\lambda\\mathbf{x})$$, which is still on the line $$\\mathbf{r} = (t\\lambda)\\mathbf{x}$$ (the same line).\n- Step 3: A line of **invariant points** is a line where every point maps to itself. For the eigenvector line, this happens if $$\\mathbf{A}\\mathbf{x} = \\lambda\\mathbf{x} = 1\\mathbf{x}$$. Therefore, the eigenvalue must be exactly **1**.\n\nAn invariant line preserves the line's direction; an invariant point preserves the exact location (requires eigenvalue = 1).", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "What defines an orthogonal matrix $$\\mathbf{M}$$? What is the consequence for its inverse? (2 steps)", "answer": "- Step 1: A matrix $$\\mathbf{M}$$ is orthogonal if the product of the matrix and its transpose is the identity matrix: $$\\mathbf{M}\\mathbf{M}^T = \\mathbf{I}$$. This means the columns (and rows) of $$\\mathbf{M}$$ are mutually perpendicular unit vectors (orthonormal).\n- Step 2: By the definition of an inverse ($$\\mathbf{M}\\mathbf{M}^{-1} = \\mathbf{I}$$), comparing this with $$\\mathbf{M}\\mathbf{M}^T = \\mathbf{I}$$ reveals that the inverse of an orthogonal matrix is simply its transpose: $$\\mathbf{M}^{-1} = \\mathbf{M}^T$$.\n\nOrthogonal matrices represent rigid rotations and reflections; their inverses are just their transposes.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "How do you reduce a symmetric matrix $$\\mathbf{A}$$ to a diagonal matrix $$\\mathbf{D}$$? What are the matrices $$\\mathbf{P}$$ and $$\\mathbf{D}$$ composed of? (4 steps)", "answer": "- Step 1: Find the eigenvalues and corresponding **normalised** eigenvectors of the symmetric matrix $$\\mathbf{A}$$.\n- Step 2: Form the matrix $$\\mathbf{P}$$ by using the normalised eigenvectors as its columns.\n- Step 3: Form the diagonal matrix $$\\mathbf{D}$$ by placing the corresponding eigenvalues on the leading diagonal, in the same order as the eigenvectors were placed in $$\\mathbf{P}$$.\n- Step 4: The relationship is $$\\mathbf{P}^T \\mathbf{A} \\mathbf{P} = \\mathbf{D}$$. Because $$\\mathbf{P}$$ is orthogonal, $$\\mathbf{P}^T = \\mathbf{P}^{-1}$$, so this is equivalent to $$\\mathbf{P}^{-1} \\mathbf{A} \\mathbf{P} = \\mathbf{D}$$.\n\nThe columns of $$\\mathbf{P}$$ are the new \"axes\" (eigenvectors), and $$\\mathbf{D}$$ contains the \"scale factors\" (eigenvalues) along those axes.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "In the diagonalisation process $$\\mathbf{P}^T \\mathbf{A} \\mathbf{P} = \\mathbf{D}$$, does the order of eigenvectors placed in the columns of $$\\mathbf{P}$$ affect the result? (2 steps)", "answer": "- Step 1: Yes, the order matters significantly. The matrix $$\\mathbf{P}$$ is constructed by placing the normalised eigenvectors into columns in a specific order, say $$\\mathbf{v}_1, \\mathbf{v}_2, \\mathbf{v}_3$$.\n- Step 2: The diagonal matrix $$\\mathbf{D}$$ will have the corresponding eigenvalues $$\\lambda_1, \\lambda_2, \\lambda_3$$ on its leading diagonal in the **exact same order**.\n+ If you swap the first and second columns of $$\\mathbf{P}$$, you must swap the first and second elements on the diagonal of $$\\mathbf{D}$$.\n\nThe order of columns in $$\\mathbf{P}$$ dictates the order of eigenvalues on the diagonal of $$\\mathbf{D}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Find the transpose of $$\\mathbf{M} = \\begin{pmatrix} 1 & 2 \\\\ 3 & 4 \\\\ 5 & 6 \\end{pmatrix}$$ and state its dimensions. (2 steps)", "answer": "- Step 1: To find the transpose, interchange the rows and columns. The first row $$(1, 2)$$ becomes the first column, the second row $$(3, 4)$$ becomes the second column, and the third row $$(5, 6)$$ becomes the third column.\n- Step 2: $$\\mathbf{M}^T = \\begin{pmatrix} 1 & 3 & 5 \\\\ 2 & 4 & 6 \\end{pmatrix}$$. The original dimensions were $$3 \\times 2$$, so the transposed dimensions are $$2 \\times 3$$.\n\nThe transpose flips a \"tall\" matrix into a \"wide\" one.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Find the determinant of $$\\mathbf{A} = \\begin{pmatrix} 1 & 0 & 0 \\\\ 0 & 2 & 0 \\\\ 0 & 0 & -3 \\end{pmatrix}$$ using mental math. (2 steps)", "answer": "- Step 1: This is a diagonal matrix (all off-diagonal elements are zero). For a diagonal matrix, the determinant is simply the product of the elements on the leading diagonal.\n- Step 2: Multiply the diagonal elements: $$1 \\times 2 \\times (-3) = -6$$. So, $$\\det(\\mathbf{A}) = -6$$.\n\nThe volume scale factor of a diagonal matrix is just the product of its stretches along the axes.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Given $$\\mathbf{A} = \\begin{pmatrix} 2 & 0 \\\\ 0 & 3 \\end{pmatrix}$$ and $$\\mathbf{B} = \\begin{pmatrix} 1/2 & 0 \\\\ 0 & 1/3 \\end{pmatrix}$$, verify that $$\\mathbf{B}$$ is the inverse of $$\\mathbf{A}$$ by checking the definition of an inverse. (2 steps)", "answer": "- Step 1: The definition of an inverse requires that $$\\mathbf{A}\\mathbf{B} = \\mathbf{I}$$ and $$\\mathbf{B}\\mathbf{A} = \\mathbf{I}$$, where $$\\mathbf{I}$$ is the identity matrix.\n- Step 2: Multiply $$\\mathbf{A}$$ and $$\\mathbf{B}$$: $$\\mathbf{A}\\mathbf{B} = \\begin{pmatrix} 2 & 0 \\\\ 0 & 3 \\end{pmatrix} \\begin{pmatrix} 1/2 & 0 \\\\ 0 & 1/3 \\end{pmatrix} = \\begin{pmatrix} 2(1/2) + 0 & 0 + 0 \\\\ 0 + 0 & 0 + 3(1/3) \\end{pmatrix} = \\begin{pmatrix} 1 & 0 \\\\ 0 & 1 \\end{pmatrix} = \\mathbf{I}$$. Since $$\\mathbf{A}\\mathbf{B} = \\mathbf{I}$$, $$\\mathbf{B}$$ is indeed $$\\mathbf{A}^{-1}$$.\n\nMultiplying a matrix by its inverse yields the identity matrix.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Find the eigenvalues of the diagonal matrix $$\\mathbf{A} = \\begin{pmatrix} 4 & 0 \\\\ 0 & -2 \\end{pmatrix}$$. (2 steps)", "answer": "- Step 1: Set up the characteristic equation $$\\det(\\mathbf{A} - \\lambda\\mathbf{I}) = 0$$.\n- Step 2: $$\\det\\begin{pmatrix} 4-\\lambda & 0 \\\\ 0 & -2-\\lambda \\end{pmatrix} = (4-\\lambda)(-2-\\lambda) = 0$$.\n- Step 3: The solutions are $$\\lambda = 4$$ and $$\\lambda = -2$$. Notice that for a diagonal matrix, the eigenvalues are simply the elements on the leading diagonal.\n\nThe eigenvalues of a diagonal matrix are exactly its diagonal entries.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Check if the matrix $$\\mathbf{P} = \\begin{pmatrix} 1 & 0 \\\\ 0 & -1 \\end{pmatrix}$$ is orthogonal. (2 steps)", "answer": "- Step 1: A matrix is orthogonal if $$\\mathbf{P}\\mathbf{P}^T = \\mathbf{I}$$. First, find the transpose: $$\\mathbf{P}^T = \\begin{pmatrix} 1 & 0 \\\\ 0 & -1 \\end{pmatrix}$$ (it is symmetric, so it equals itself).\n- Step 2: Multiply $$\\mathbf{P}$$ by $$\\mathbf{P}^T$$: $$\\begin{pmatrix} 1 & 0 \\\\ 0 & -1 \\end{pmatrix}\\begin{pmatrix} 1 & 0 \\\\ 0 & -1 \\end{pmatrix} = \\begin{pmatrix} 1(1)+0 & 1(0)+0 \\\\ 0+(-1)(0) & 0+(-1)(-1) \\end{pmatrix} = \\begin{pmatrix} 1 & 0 \\\\ 0 & 1 \\end{pmatrix} = \\mathbf{I}$$.\n- Step 3: Since $$\\mathbf{P}\\mathbf{P}^T = \\mathbf{I}$$, the matrix is orthogonal.\n\nThis matrix represents a reflection in the x-axis, which is a rigid transformation (orthogonal).", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}], "count": 25}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "A matrix $\\mathbf{M}$ has dimension $3 \\times 4$. What is the dimension of its transpose, $\\mathbf{M}^T$?", "answer": "The transpose of a matrix is formed by interchanging its rows and columns.\n- Step 1: Identify the dimensions of $\\mathbf{M}$. It has 3 rows and 4 columns, so it is $3 \\times 4$.\n- Step 2: To form $\\mathbf{M}^T$, the first row of $\\mathbf{M}$ becomes the first column of $\\mathbf{M}^T$, the second row becomes the second column, etc.\n- Step 3: This swap means the number of rows becomes the number of columns, and vice versa. So, a $3 \\times 4$ matrix becomes a $4 \\times 3$ matrix.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "A matrix $\\mathbf{A}$ is defined as symmetric. What algebraic relationship must exist between $\\mathbf{A}$ and $\\mathbf{A}^T$? (2 steps)", "answer": "- Step 1: A symmetric matrix is one that is unchanged by the operation of transposing. This means interchanging the rows and columns yields the exact same matrix.\n- Step 2: Therefore, the condition is $$\\mathbf{A} = \\mathbf{A}^T$
