lly. (2 steps)", "answer": "- Step 1: Algebraically, $$\\frac{d}{dx}(\\operatorname{arcosh} x) = \\frac{1}{\\sqrt{x^2-1}}$$. As $$x \\to 1^+$$, $$x^2 - 1 \\to 0^+$$, so the denominator approaches 0 and the derivative approaches $$+\\infty$$.\n- Step 2: Geometrically, the point $$x = 1$$ corresponds to $$y = \\operatorname{arcosh}(1) = 0$$ (since $$\\cosh 0 = 1$$). At this point, the graph of $$y = \\operatorname{arcosh} x$$ has a vertical tangent ŌĆö the curve turns sharply from being nearly vertical to curving rightward. This is because $$\\cosh x$$ has a minimum at $$x = 0$$ (where its derivative is 0), so its inverse has a vertical tangent at the corresponding point.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_51", "judge_pick": true}, {"question": "Edge case: What happens to $$\\frac{d}{dx}(\\operatorname{artanh} x)$$ as $$x \\to 1^-$$? Explain both algebraically and geometrically. (2 steps)", "answer": "- Step 1: Algebraically, $$\\frac{d}{dx}(\\operatorname{artanh} x) = \\frac{1}{1-x^2}$$. As $$x \\to 1^-$$, $$1 - x^2 \\to 0^+$$, so the derivative approaches $$+\\infty$$.\n- Step 2: Geometrically, the graph of $$y = \\operatorname{artanh} x$$ has a vertical asymptote at $$x = 1$$ (since $$\\tanh y \\to 1$$ as $$y \\to \\infty$$). As the curve approaches this asymptote, it becomes nearly vertical, so the derivative grows without bound. Similarly, as $$x \\to -1^+$$, the derivative also approaches $$+\\infty$$ (since $$1 - x^2 \\to 0^+$$).", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_52", "judge_pick": true}, {"question": "Synthesis question: For each of the three inverse trigonometric functions ($$\\arcsin$$, $$\\arccos$$, $$\\arctan$$), state whether the derivative is always positive, always negative, or changes sign. Explain why in each case. (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx}(\\arcsin x) = \\frac{1}{\\sqrt{1-x^2}} > 0$$ always (positive denominator), so $$\\arcsin$$ is strictly increasing. $$\\frac{d}{dx}(\\arccos x) = \\frac{-1}{\\sqrt{1-x^2}} < 0$$ always (negative numerator, positive denominator), so $$\\arccos$$ is strictly decreasing. $$\\frac{d}{dx}(\\arctan x) = \\frac{1}{1+x^2} > 0$$ always, so $$\\arctan$$ is strictly increasing.\n- Step 2: The sign of the derivative is determined by the range of the original function. $$\\arcsin$$ maps $$[-1,1]$$ to $$[-\\pi/2, \\pi/2]$$ (increasing), $$\\arccos$$ maps $$[-1,1]$$ to $$[0, \\pi]$$ (decreasing), and $$\\arctan$$ maps $$\\mathbb{R}$$ to $$(-\\pi/2, \\pi/2)$$ (increasing). The decreasing nature of $$\\arccos$$ is the sole reason its derivative carries a minus sign.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_53", "judge_pick": true}, {"question": "Synthesis: Create a unified table comparing the derivative of each inverse function (trig and hyperbolic) and identify the single structural rule that determines the sign under each square root or in each denominator. (2 steps)", "answer": "- Step 1: $$\\arcsin: \\frac{1}{\\sqrt{1-x^2}}$$, $$\\arccos: \\frac{-1}{\\sqrt{1-x^2}}$$, $$\\arctan: \\frac{1}{1+x^2}$$, $$\\operatorname{arsinh}: \\frac{1}{\\sqrt{1+x^2}}$$, $$\\operatorname{arcosh}: \\frac{1}{\\sqrt{x^2-1}}$$, $$\\operatorname{artanh}: \\frac{1}{1-x^2}$$.\n- Step 2: The structural rule: the sign under the square root (or in the denominator) comes from the Pythagorean identity of the original function. Trig: $$\\cos^2 y + \\sin^2 y = 1$$ gives $$\\cos y = \\sqrt{1 - \\sin^2 y}$$ (minus sign). Hyperbolic: $$\\cosh^2 y - \\sinh^2 y = 1$$ gives $$\\cosh y = \\sqrt{1 + \\sinh^2 y}$$ (plus sign). For tangent/artanh: $$1 + \\tan^2 = \\sec^2$$ (plus) vs $$1 - \\tanh^2 = \\operatorname{sech}^2$$ (minus). The sign in the fundamental identity ($$+$$ for trig, $$-$$ for hyperbolic) propagates everywhere.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_54", "judge_pick": true}, {"question": "Differentiate $$\\operatorname{arsech} x$$ given that $$\\operatorname{sech} y = x$$ for $$y = \\operatorname{arsech} x$$. Walk through the implicit differentiation. (3 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arsech} x$$, so $$\\operatorname{sech} y = x$$. Differentiate: $$-\\tanh y \\operatorname{sech} y \\cdot \\frac{dy}{dx} = 1$$, giving $$\\frac{dy}{dx} = \\frac{-1}{\\tanh y \\operatorname{sech} y} = \\frac{-1}{\\tanh y \\cdot x}$$.\n- Step 2: Express $$\\tanh y$$ in terms of $$x$$: $$\\tanh^2 y = 1 - \\operatorname{sech}^2 y = 1 - x^2$$, so $$\\tanh y = \\sqrt{1-x^2}$$ (taking positive root since $$\\operatorname{arsech} x$$ returns $$y \\geq 0$$ where $$\\tanh y \\geq 0$$).\n- Step 3: Therefore $$\\frac{d}{dx}(\\operatorname{arsech} x) = \\frac{-1}{x\\sqrt{1-x^2}}$$, defined for $$0 < x < 1$$. The derivative is negative because $$\\operatorname{arsech} x$$ is a decreasing function.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_55", "judge_pick": true}, {"question": "Differentiate $$\\operatorname{arccosech} x$$ (also written $$\\operatorname{arcsch} x$$). Walk through the implicit differentiation. (3 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arccosech} x$$, so $$\\operatorname{cosech} y = x$$. Differentiate: $$-\\coth y \\operatorname{cosech} y \\cdot \\frac{dy}{dx} = 1$$, giving $$\\frac{dy}{dx} = \\frac{-1}{\\coth y \\cdot x}$$.\n- Step 2: Express $$\\coth y$$ in terms of $$x$$: $$\\coth^2 y = 1 + \\operatorname{cosech}^2 y = 1 + x^2$$, so $$\\coth y = \\sqrt{1 + x^2}$$ (for the principal branch where $$y > 0$$ and $$\\coth y > 0$$).\n- Step 3: Therefore $$\\frac{d}{dx}(\\operatorname{arccosech} x) = \\frac{-1}{x\\sqrt{1+x^2}}$$, defined for $$x \\neq 0$$. The derivative is negative for $$x > 0$$ (where the function is decreasing) and positive for $$x < 0$$.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_56", "judge_pick": false}, {"question": "Differentiate $$\\operatorname{arccot} x$$. Walk through the implicit differentiation and explain the sign. (3 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arccot} x$$, so $$\\cot y = x$$. Differentiate: $$-\\operatorname{cosec}^2 y \\cdot \\frac{dy}{dx} = 1$$, giving $$\\frac{dy}{dx} = \\frac{-1}{\\operatorname{cosec}^2 y}$$.\n- Step 2: Use $$\\operatorname{cosec}^2 y = 1 + \\cot^2 y = 1 + x^2$$.\n- Step 3: Therefore $$\\frac{d}{dx}(\\operatorname{arccot} x) = \\frac{-1}{1+x^2}$$. The negative sign arises because $$\\operatorname{arccot} x$$ is a decreasing function (as $$x$$ increases, the angle whose cotangent is $$x$$ decreases). Note the magnitude is the same as $$\\frac{d}{dx}(\\arctan x) = \\frac{1}{1+x^2}$$, but with opposite sign.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_57", "judge_pick": false}, {"question": "Differentiate $$\\operatorname{arcsec} x$$. Walk through the implicit differentiation. (3 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arcsec} x$$, so $$\\sec y = x$$. Differentiate: $$\\sec y \\tan y \\cdot \\frac{dy}{dx} = 1$$, giving $$\\frac{dy}{dx} = \\frac{1}{\\sec y \\tan y} = \\frac{1}{x \\tan y}$$.\n- Step 2: Express $$\\tan y$$ in terms of $$x$$: $$\\tan^2 y = \\sec^2 y - 1 = x^2 - 1$$, so $$\\tan y = \\sqrt{x^2 - 1}$$ (taking the appropriate sign based on the range convention for $$\\operatorname{arcsec}$$).\n- Step 3: Therefore $$\\frac{d}{dx}(\\operatorname{arcsec} x) = \\frac{1}{x\\sqrt{x^2 - 1}}$$ for $$|x| > 1$$. The sign is positive because the standard range of $$\\operatorname{arcsec}$$ (usually $$[0, \\pi] \\setminus \\{\\pi/2\\}$$) makes it a function whose derivative is positive for $$x > 1$$ and negative for $$x < -1$$.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_58", "judge_pick": false}, {"question": "Differentiate $$\\operatorname{arccosec} x$$. Walk through the implicit differentiation. (3 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arccosec} x$$, so $$\\operatorname{cosec} y = x$$. Differentiate: $$-\\operatorname{cosec} y \\cot y \\cdot \\frac{dy}{dx} = 1$$, giving $$\\frac{dy}{dx} = \\frac{-1}{\\operatorname{cosec} y \\cot y} = \\frac{-1}{x \\cot y}$$.\n- Step 2: Express $$\\cot y$$ in terms of $$x$$: $$\\cot^2 y = \\operatorname{cosec}^2 y - 1 = x^2 - 1$$, so $$\\cot y = \\sqrt{x^2 - 1}$$ (with appropriate sign).\n- Step 3: Therefore $$\\frac{d}{dx}(\\operatorname{arccosec} x) = \\frac{-1}{x\\sqrt{x^2 - 1}}$$ for $$|x| > 1$$. Compare with $$\\operatorname{arcsec}$$: the derivatives differ only by a sign, analogous to how $$\\frac{d}{dx}(\\arcsin x)$$ and $$\\frac{d}{dx}(\\arccos x)$$ differ by a sign.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_59", "judge_pick": false}, {"question": "Simple exercise: If $$f(x) = \\cosh(3x)$$, is $$f''(0)$$ positive, negative, or zero? Determine this without computing the exact value. (2 steps)", "answer": "- Step 1: $$f'(x) = 3\\sinh(3x)$$, so $$f''(x) = 9\\cosh(3x)$$. Since $$\\cosh$$ is always positive, $$f''(x) > 0$$ for all $$x$$.\n- Step 2: Therefore $$f''(0) = 9\\cosh(0) = 9 > 0$$. The curve is concave up everywhere, which makes sense: $$\\cosh$$ is always concave up (its graph is always above its tangents).", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_60", "judge_pick": true}, {"question": "Simple exercise: For $$g(x) = \\operatorname{artanh}(x)$$, is the second derivative $$g''(x)$$ positive or negative when $$0 < x < 1$$? Determine the sign without computing the exact formula. (2 steps)", "answer": "- Step 1: $$g'(x) = \\frac{1}{1-x^2}$$. As $$x$$ increases from 0 to 1, the denominator $$1-x^2$$ decreases from 1 to 0, so $$g'(x)$$ increases from 1 to $$+\\infty$$.\n- Step 2: Since $$g'(x)$$ is increasing on $$(0,1)$$, the second derivative $$g''(x)$$ is positive there. Geometrically, the curve $$y = \\operatorname{artanh} x$$ curves upward as it approaches the vertical asymptote at $$x = 1$$.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_61", "judge_pick": true}, {"question": "The summary of key points in the textbook states $$\\frac{d}{dx}(\\operatorname{artanh} x) = \\frac{1}{\\sqrt{1-x^2}}$$. Is this correct? If not, what is the correct formula, and what might have caused this error? (2 steps)", "answer": "- Step 1: This is **incorrect**. The correct formula is $$\\frac{d}{dx}(\\operatorname{artanh} x) = \\frac{1}{1-x^2}$$, without any square root. The square root version is the derivative of $$\\arcsin x$$.\n- Step 2: The error likely arose from confusing the derivation of $$\\operatorname{artanh}$$ (which uses $$1 - \\tanh^2 y = \\operatorname{sech}^2 y$$, giving $$1 - x^2$$ directly) with the derivation of $$\\arcsin$$ (which uses $$\\cos^2 y = 1 - \\sin^2 y$$, giving a square root $$\\sqrt{1-x^2}$$). The square root appears in the arcsin/arsinh/arcosh family because you solve for $$\\cos y$$ or $$\\cosh y$$ from a squared identity, but for arctan/artanh you solve for $$\\sec^2 y$$ or $$\\operatorname{sech}^2 y$$, which are already non-squared expressions.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_62", "judge_pick": false}, {"question": "The summary also states $$\\frac{d}{dx}(\\arccos x) = \\frac{1}{\\sqrt{1-x^2}}$$. Is this correct? If not, state the correct formula. (2 steps)", "answer": "- Step 1: This is **incorrect**. The correct formula is $$\\frac{d}{dx}(\\arccos x) = \\frac{-1}{\\sqrt{1-x^2}}$$, with a **negative** sign.\n- Step 2: The missing minus sign is a critical error. Since $$\\arccos x$$ is a decreasing function (its graph slopes downward), the derivative must be negative. The minus sign comes from differentiating $$\\cos y = x$$, which gives $$-\\sin y \\cdot \\frac{dy}{dx} = 1$$. Always verify derivative formulas against the monotonicity of the original function.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_63", "judge_pick": false}, {"question": "Given that $$y = \\operatorname{artanh}\\!\\left(\\frac{e^x}{2}\\right)$$, prove that $$(4 - e^{2x})\\frac{dy}{dx} = 2e^x$$. Walk through the chain rule and algebra. (3 steps)", "answer": "- Step 1: By the chain rule, $$\\frac{dy}{dx} = \\frac{1}{1 - (e^x/2)^2} \\cdot \\frac{d}{dx}\\!\\left(\\frac{e^x}{2}\\right) = \\frac{1}{1 - e^{2x}/4} \\cdot \\frac{e^x}{2}$$.\n- Step 2: Simplify the denominator: $$1 - \\frac{e^{2x}}{4} = \\frac{4 - e^{2x}}{4}$$. So $$\\frac{dy}{dx} = \\frac{4}{4 - e^{2x}} \\cdot \\frac{e^x}{2} = \\frac{2e^x}{4 - e^{2x}}$$.\n- Step 3: Multiply both sides by $$(4 - e^{2x})$$: $$(4 - e^{2x})\\frac{dy}{dx} = 2e^x$$. Ō£ō The domain requires $$|e^x/2| < 1$$, i.e., $$e^x < 2$$, i.e., $$x < \\ln 2$$.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_64", "judge_pick": false}, {"question": "Conceptual synthesis: Why do inverse hyperbolic derivatives (arsinh, arcosh, artanh) all have **positive** derivatives (within their domains), while among inverse trig functions, arccos stands out as having a **negative** derivative? (2 steps)", "answer": "- Step 1: All three inverse hyperbolic functions ($$\\operatorname{arsinh}$$, $$\\operatorname{arcosh}$$, $$\\operatorname{artanh}$$) are increasing on their respective domains (for $$\\operatorname{arcosh}$$, on $$x > 1$$), so their derivatives are positive. Among inverse trig functions, $$\\arcsin$$ and $$\\arctan$$ are increasing (positive derivatives), but $$\\arccos$$ is decreasing (negative derivative).\n- Step 2: The reason $$\\arccos$$ is the outlier: the range convention for $$\\arccos$$ is $$[0, \\pi]$$, which maps $$x$$ from large angles to small angles as $$x$$ increases. This is a choice of the principal branch. For hyperbolic functions, the standard branch choices for $$\\operatorname{arcosh}$$ (non-negative values) and the natural ranges of $$\\operatorname{arsinh}$$ and $$\\operatorname{artanh}$$ all produce increasing functions. If we had chosen a different branch of $$\\operatorname{arcosh}$$ (the negative branch), it would be decreasing and have a negative derivative.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_65", "judge_pick": true}, {"question": "If $$\\tan y = x\\arctan x$$, find $$\\frac{dy}{dx}$$. Walk through the steps. (3 steps)", "answer": "- Step 1: Differentiate both sides with respect to $$x$$: $$\\sec^2 y \\cdot \\frac{dy}{dx} = \\arctan x + x \\cdot \\frac{1}{1+x^2}$$, using the product rule on the right side.\n- Step 2: Solve for $$\\frac{dy}{dx}$$: $$\\frac{dy}{dx} = \\frac{1}{\\sec^2 y}\\!\\left(\\arctan x + \\frac{x}{1+x^2}\\right)$$.\n- Step 3: Since $$\\sec^2 y = 1 + \\tan^2 y = 1 + (x\\arctan x)^2$$, we get $$\\frac{dy}{dx} = \\frac{\\arctan x + \\frac{x}{1+x^2}}{1 + x^2(\\arctan x)^2}$$. The denominator cannot be simplified further without knowing the specific value of $$x$$.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_66", "judge_pick": false}, {"question": "Differentiate $$e^{x^3}\\operatorname{arsinh} x$$ with respect to $$x$$. (2 steps)", "answer": "- Step 1: Use the product rule with $$u = e^{x^3}$$ and $$v = \\operatorname{arsinh} x$$. Then $$u' = 3x^2 e^{x^3}$$ (chain rule) and $$v' = \\frac{1}{\\sqrt{x^2+1}}$$.\n- Step 2: $$\\frac{d}{dx}(e^{x^3}\\operatorname{arsinh} x) = 3x^2 e^{x^3}\\operatorname{arsinh} x + \\frac{e^{x^3}}{\\sqrt{x^2+1}} = e^{x^3}\\!\\left(3x^2\\operatorname{arsinh} x + \\frac{1}{\\sqrt{x^2+1}}\\right)$$.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_67", "judge_pick": false}, {"question": "Differentiate $$\\operatorname{arsinh} x \\cdot \\operatorname{arcosh} x$$ with respect to $$x$$. State the domain. (2 steps)", "answer": "- Step 1: Product rule: $$\\frac{d}{dx}(\\operatorname{arsinh} x \\cdot \\operatorname{arcosh} x) = \\frac{1}{\\sqrt{x^2+1}} \\cdot \\operatorname{arcosh} x + \\operatorname{arsinh} x \\cdot \\frac{1}{\\sqrt{x^2-1}}$$.\n- Step 2: The domain is $$x > 1$$ (the intersection of the domain of $$\\operatorname{arsinh}$$, which is all of $$\\mathbb{R}$$, and the domain of $$\\operatorname{arcosh}$$, which is $$x \\geq 1$$; but the derivative of $$\\operatorname{arcosh}$$ requires $$x > 1$$).", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_68", "judge_pick": false}, {"question": "Differentiate $$e^{\\arctan x}$$ with respect to $$x$$. (2 steps)", "answer": "- Step 1: This is $$e^{f(x)}$$ where $$f(x) = \\arctan x$$. By the chain rule: $$\\frac{d}{dx}(e^{f(x)}) = e^{f(x)} \\cdot f'(x)$$.\n- Step 2: $$f'(x) = \\frac{1}{1+x^2}$$, so the derivative is $$\\frac{e^{\\arctan x}}{1+x^2}$$. The exponential of an arctangent grows very slowly, and the derivative reflects this with the $$\\frac{1}{1+x^2}$$ damping factor.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_69", "judge_pick": false}, {"question": "Differentiate $$\\arcsin\\!\\left(\\frac{x}{x-1}\\right)$$ with respect to $$x$$. Walk through the chain rule and quotient rule. (3 steps)", "answer": "- Step 1: Let $$u = \\frac{x}{x-1}$$. By the chain rule: $$\\frac{d}{dx}(\\arcsin u) = \\frac{1}{\\sqrt{1-u^2}} \\cdot \\frac{du}{dx}$$.\n- Step 2: Compute $$\\frac{du}{dx}$$ using the quotient rule: $$\\frac{(x-1) - x}{(x-1)^2} = \\frac{-1}{(x-1)^2}$$.\n- Step 3: Compute $$1 - u^2 = 1 - \\frac{x^2}{(x-1)^2} = \\frac{(x-1)^2 - x^2}{(x-1)^2} = \\frac{-2x+1}{(x-1)^2}$$. So $$\\frac{d}{dx} = \\frac{|x-1|}{\\sqrt{1-2x}} \\cdot \\frac{-1}{(x-1)^2} = \\frac{-1}{(x-1)\\sqrt{1-2x}}$$ (for appropriate sign conventions). The domain requires $$|u| \\leq 1$$ and $$1 - 2x > 0$$, i.e., $$x < 1/2$$.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_70", "judge_pick": true}, {"question": "Differentiate $$\\operatorname{arcosh} x \\cdot \\operatorname{sech} x$$ with respect to $$x$$. (2 steps)", "answer": "- Step 1: Product rule: $$u = \\operatorname{arcosh} x$$ with $$u' = \\frac{1}{\\sqrt{x^2-1}}$$; $$v = \\operatorname{sech} x$$ with $$v' = -\\tanh x \\operatorname{sech} x$$.\n- Step 2: $$\\frac{d}{dx}(\\operatorname{arcosh} x \\cdot \\operatorname{sech} x) = \\frac{\\operatorname{sech} x}{\\sqrt{x^2-1}} - \\tanh x \\operatorname{sech} x \\operatorname{arcosh} x$$. The domain is $$x > 1$$ (required by $$\\operatorname{arcosh}$$).", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_71", "judge_pick": false}, {"question": "Differentiate $$\\frac{\\sinh x}{3x}$$ with respect to $$x$$. (2 steps)", "answer": "- Step 1: Use the quotient rule: $$\\frac{d}{dx}\\!\\left(\\frac{\\sinh x}{3x}\\right) = \\frac{3x\\cosh x - 3\\sinh x}{9x^2} = \\frac{x\\cosh x - \\sinh x}{3x^2}$$.\n- Step 2: This can also be written as $$\\frac{1}{3}\\!\\left(\\frac{\\cosh x}{x} - \\frac{\\sinh x}{x^2}\\right)$$. The expression is undefined at $$x = 0$$; for small $$x$$, both numerator and denominator approach 0, and L'H├┤pital's rule would give the limit as $$\\frac{1}{3}$$.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_72", "judge_pick": false}, {"question": "Differentiate $$e^{-x}\\sinh x$$ with respect to $$x$$. Simplify the result using hyperbolic identities. (3 steps)", "answer": "- Step 1: Product rule: $$\\frac{d}{dx}(e^{-x}\\sinh x) = -e^{-x}\\sinh x + e^{-x}\\cosh x = e^{-x}(\\cosh x - \\sinh x)$$.\n- Step 2: Use the identity $$\\cosh x - \\sinh x = \\frac{e^x + e^{-x}}{2} - \\frac{e^x - e^{-x}}{2} = e^{-x}$$.\n- Step 3: Therefore $$\\frac{d}{dx}(e^{-x}\\sinh x) = e^{-x} \\cdot e^{-x} = e^{-2x}$$. This elegant simplification shows that $$e^{-x}\\sinh x$$ differentiates to $$e^{-2x}$$, which you could also verify by writing $$e^{-x}\\sinh x = e^{-x} \\cdot \\frac{e^x - e^{-x}}{2} = \\frac{1 - e^{-2x}}{2}$$, whose derivative is $$\\frac{2e^{-2x}}{2} = e^{-2x}$$.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_73", "judge_pick": false}, {"question": "Differentiate $$\\sinh(2x)\\cosh(3x)$$ with respect to $$x$$. (2 steps)", "answer": "- Step 1: Product rule: $$\\frac{d}{dx}(\\sinh 2x \\cosh 3x) = 2\\cosh 2x \\cosh 3x + \\sinh 2x \\cdot 3\\sinh 3x = 2\\cosh 2x \\cosh 3x + 3\\sinh 2x \\sinh 3x$$.\n- Step 2: Using product-to-sum identities, this can be rewritten as $$\\frac{1}{2}[\\sinh 5x + \\sinh(-x)] + \\frac{3}{2}[\\cosh x - \\cosh 5x]$$... but the factored form above is usually sufficient for exam purposes.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_74", "judge_pick": false}, {"question": "Simple exercise: At $$x = 0$$, which is larger: $$\\frac{d}{dx}(\\operatorname{arsinh} x)$$ or $$\\frac{d}{dx}(\\operatorname{arcosh}(x+1))$$? Determine this without computing exact values. (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx}(\\operatorname{arsinh} x)\\Big|_{x=0} = \\frac{1}{\\sqrt{0+1}} = 1$$. $$\\frac{d}{dx}(\\operatorname{arcosh}(x+1)) = \\frac{1}{\\sqrt{(x+1)^2-1}}$$; at $$x = 0$$ this is $$\\frac{1}{\\sqrt{1-1}} = \\frac{1}{0} = +\\infty$$ (undefined/infinite).\n- Step 2: The derivative of $$\\operatorname{arcosh}(x+1)$$ at $$x = 0$$ is infinite (vertical tangent), which is much larger than the finite value of 1 for $$\\operatorname{arsinh} x$$. This happens because at $$x = 0$$, $$x + 1 = 1$$, which is the endpoint of the domain of $$\\operatorname{arcosh}$$, where the derivative blows up.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_75", "judge_pick": true}, {"question": "Conceptual check: For $$f(x) = \\operatorname{arsinh}(x)$$ and $$g(x) = \\arcsin(x)$$, both have derivatives at $$x = 0$$. Which derivative is larger, and why? (2 steps)", "answer": "- Step 1: $$f'(0) = \\frac{1}{\\sqrt{0+1}} = 1$$ and $$g'(0) = \\frac{1}{\\sqrt{1-0}} = 1$$. They are equal!\n- Step 2: Both equal 1 because for small $$x$$, $$\\sinh x \\approx x$$ and $$\\sin x \\approx x$$, so their inverses both behave like the identity function near the origin. The difference between the two functions only becomes apparent away from the origin, where the $$+x^2$$ vs $$-x^2$$ in the denominators causes them to diverge.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_76", "judge_pick": false}, {"question": "Given $$y = \\operatorname{arsinh} x$$, show that $$(1+x^2)\\frac{d^2y}{dx^2} + x\\frac{dy}{dx} = 0$$. Walk through the derivation. (3 steps)", "answer": "- Step 1: $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{1+x^2}} = (1+x^2)^{-1/2}$$. To avoid messy quotient rule, write $$(1+x^2)^{1/2}\\frac{dy}{dx} = 1$$.\n- Step 2: Differentiate both sides: $$\\frac{x}{\\sqrt{1+x^2}}\\frac{dy}{dx} + \\sqrt{1+x^2}\\frac{d^2y}{dx^2} = 0$$. Multiply through by $$\\sqrt{1+x^2}$$: $$x\\frac{dy}{dx} + (1+x^2)\\frac{d^2y}{dx^2} = 0$$.\n- Step 3: Rearrange: $$(1+x^2)\\frac{d^2y}{dx^2} + x\\frac{dy}{dx} = 0$$. Ō£ō The technique of clearing the square root before differentiating is a powerful algebraic trick for inverse function problems.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_77", "judge_pick": true}, {"question": "If $$y = (\\operatorname{arcosh} x)^2$$, find $$\\frac{d^2y}{dx^2}$$. Walk through the steps. (4 steps)", "answer": "- Step 1: First derivative: $$\\frac{dy}{dx} = \\frac{2\\operatorname{arcosh} x}{\\sqrt{x^2-1}}$$.\n- Step 2: For the second derivative, use the quotient rule: $$\\frac{d^2y}{dx^2} = \\frac{\\frac{2}{\\sqrt{x^2-1}} \\cdot \\sqrt{x^2-1} - 2\\operatorname{arcosh} x \\cdot \\frac{x}{\\sqrt{x^2-1}}}{x^2-1}$$.\n- Step 3: Simplify the numerator: $$2 - \\frac{2x\\operatorname{arcosh} x}{\\sqrt{x^2-1}}$$. So $$\\frac{d^2y}{dx^2} = \\frac{2 - \\frac{2x\\operatorname{arcosh} x}{\\sqrt{x^2-1}}}{x^2-1} = \\frac{2}{x^2-1} - \\frac{2x\\operatorname{arcosh} x}{(x^2-1)^{3/2}}$$.\n- Step 4: Alternatively, from the identity $$(x^2-1)\\left(\\frac{dy}{dx}\\right)^2 = 4y$$ (proved earlier), differentiate both sides: $$2x\\left(\\frac{dy}{dx}\\right)^2 + 2(x^2-1)\\frac{dy}{dx}\\frac{d^2y}{dx^2} = 4\\frac{dy}{dx}$$, which gives $$\\frac{d^2y}{dx^2} = \\frac{2 - x\\frac{dy}{dx}}{(x^2-1)\\frac{dy}{dx}} = \\frac{2 - \\frac{2x\\operatorname{arcosh} x}{\\sqrt{x^2-1}}}{(x^2-1) \\cdot \\frac{2\\operatorname{arcosh} x}{\\sqrt{x^2-1}}}$$, confirming the result.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_78", "judge_pick": false}, {"question": "Find the equation of the tangent at the point where $$x = \\frac{12}{13}$$ on the curve $$y = \\operatorname{artanh} x$$. Walk through the steps conceptually. (3 steps)", "answer": "- Step 1: Find the point: $$y = \\operatorname{artanh}\\!\\left(\\frac{12}{13}\\right)$$. Since $$|12/13| < 1$$, this is valid.\n- Step 2: Find the gradient: $$\\frac{dy}{dx} = \\frac{1}{1-x^2}$$, so at $$x = 12/13$$: $$\\frac{dy}{dx} = \\frac{1}{1 - 144/169} = \\frac{1}{25/169} = \\frac{169}{25}$$.\n- Step 3: The tangent line is $$y - \\operatorname{artanh}(12/13) = \\frac{169}{25}\\!\\left(x - \\frac{12}{13}\\right)$$. Note: $$1 - (12/13)^2 = 1 - 144/169 = 25/169$$, giving the clean fraction $$169/25$$ for the gradient.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_79", "judge_pick": false}], "count": 80}, "glm_2": {"label": "GLM 5.1 ŌæĪ", "cards": [{"question": "Starting from the exponential definition of $$\\cosh x$$, how do you derive its derivative, and what is the key difference from the derivative of $$\\cos x$$? (3 steps)", "answer": "- Step 1: Write the definition of $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$.\n- Step 2: Differentiate term by term: $$\\frac{d}{dx}\\left(\\frac{e^x + e^{-x}}{2}\\right) = \\frac{e^x - e^{-x}}{2}$$, which is exactly the definition of $$\\sinh x$$.\n- Step 3: The key difference from trigonometric functions is the sign; $$\\frac{d}{dx}(\\cos x) = -\\sin x$$, but $$\\frac{d}{dx}(\\cosh x) = +\\sinh x$$. The lack of the negative sign comes from the lack of the imaginary unit $$i$$ in the exponential definition.\n\nTakeaway: Hyperbolic derivatives don't have the alternating signs of trig derivatives because they use real exponentials, not imaginary.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_0", "judge_pick": false}, {"question": "Without doing any algebra, explain graphically why the derivative of $$\\cosh x$$ has a positive sign, unlike its trigonometric counterpart. (2 steps)", "answer": "- Step 1: The graph of $$y = \\cosh x$$ (the catenary) has a minimum at $$x=0$$ and increases as you move away from the origin in either direction. Thus, its slope (derivative) is negative for $$x < 0$$, zero at $$x=0$$, and positive for $$x > 0$$.\n- Step 2: The function $$\\sinh x$$ is negative for $$x < 0$$, zero at $$x=0$$, and positive for $$x > 0$$, perfectly matching the slope of $$\\cosh x$$. If the derivative were $$-\\sinh x$$, it would have the wrong sign on both sides of the y-axis.\n\nTakeaway: The sign of the derivative matches the monotonicity of the original function; $$\\cosh x$$ increases for $$x>0$$, so its derivative must be positive there.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_1", "judge_pick": true}, {"question": "Using the quotient rule on $$\\tanh x = \\frac{\\sinh x}{\\cosh x}$$, find its derivative. What identity simplifies the numerator? (3 steps)", "answer": "- Step 1: Apply the quotient rule: $$\\frac{d}{dx}(\\tanh x) = \\frac{\\cosh x \\cdot \\frac{d}{dx}(\\sinh x) - \\sinh x \\cdot \\frac{d}{dx}(\\cosh x)}{\\cosh^2 x}$$.\n- Step 2: Substitute the derivatives: $$\\frac{\\cosh x(\\cosh x) - \\sinh x(\\sinh x)}{\\cosh^2 x} = \\frac{\\cosh^2 x - \\sinh^2 x}{\\cosh^2 x}$$.\n- Step 3: Use the fundamental hyperbolic identity $$\\cosh^2 x - \\sinh^2 x = 1$$ to simplify the numerator to 1, yielding $$\\frac{1}{\\cosh^2 x} = \\text{sech}^2 x$$.\n\nTakeaway: The derivative of $$\\tanh x$$ is $$\\text{sech}^2 x$$, mimicking the $$\\tan x \\to \\sec^2 x$$ rule.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_2", "judge_pick": false}, {"question": "The derivatives of $$\\text{coth} x$$, $$\\text{sech} x$$, and $$\\text{cosech} x$$ all start with a negative sign. Why do they share this negative sign, unlike their non-reciprocal counterparts $$\\cosh x$$ and $$\\sinh x$$? (3 steps)", "answer": "- Step 1: These functions are defined as reciprocals: $$\\text{sech} x = \\frac{1}{\\cosh x}$$, $$\\text{cosech} x = \\frac{1}{\\sinh x}$$, $$\\text{coth} x = \\frac{1}{\\tanh x}$$.\n- Step 2: Differentiating a reciprocal $$\\frac{1}{u}$$ yields $$-\\frac{u'}{u^2}$$, which naturally introduces a negative sign at the front of the derivative.\n- Step 3: In contrast, $$\\sinh x$$ and $$\\cosh x$$ are defined as sums/differences of positive exponentials, so their derivatives do not inherently have a leading negative sign. The negative sign in the reciprocal derivatives mirrors the negative signs in the derivatives of $$\\text{cosec} x$$, $$\\text{sec} x$$, and $$\\text{cot} x$$.\n\nTakeaway: The act of differentiating a reciprocal function introduces a negative sign from the chain rule/quotient rule.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_3", "judge_pick": true}, {"question": "If $$y = A \\cosh 3x + B \\sinh 3x$$, how does the second derivative $$\\frac{d^2y}{dx^2}$$ relate to $$y$$ itself, and why does this relationship hold for any linear combination of $$\\cosh(kx)$$ and $$\\sinh(kx)$$? (3 steps)", "answer": "- Step 1: Differentiate once: $$\\frac{dy}{dx} = 3A \\sinh 3x + 3B \\cosh 3x$$.\n- Step 2: Differentiate again: $$\\frac{d^2y}{dx^2} = 9A \\cosh 3x + 9B \\sinh 3x$$.\n- Step 3: Notice that the expression for the second derivative is exactly $$9$$ times the original expression for $$y$$, so $$\\frac{d^2y}{dx^2} = 9y$$. This happens because differentiating $$\\cosh(kx)$$ gives $$k\\sinh(kx)$$, and differentiating $$\\sinh(kx)$$ gives $$k\\cosh(kx)$$, so two derivatives bring you back to the original function type, multiplied by $$k^2$$.\n\nTakeaway: Hyperbolic functions are eigenfunctions of the second derivative operator, with eigenvalue $$k^2$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_4", "judge_pick": false}, {"question": "Using implicit differentiation, derive the derivative of $$y = \\text{arsinh} x$$. What identity is crucial for simplifying the result? (4 steps)", "answer": "- Step 1: Rewrite the inverse function implicitly: $$\\sinh y = x$$.\n- Step 2: Differentiate both sides with respect to $$x$$: $$\\cosh y \\frac{dy}{dx} = 1$$, so $$\\frac{dy}{dx} = \\frac{1}{\\cosh y}$$.\n- Step 3: We need to express $$\\cosh y$$ in terms of $$x$$. Since $$\\sinh y = x$$, use the identity $$\\cosh^2 y - \\sinh^2 y = 1$$, giving $$\\cosh^2 y = 1 + x^2$$.\n- Step 4: Therefore, $$\\cosh y = \\sqrt{1 + x^2}$$ (we take the positive root because $$\\cosh y \\ge 1$$ for all real $$y$$). Substituting this back gives $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{1 + x^2}}$$.\n\nTakeaway: Implicit differentiation plus the $$\\cosh^2 y - \\sinh^2 y = 1$$ identity yields the inverse hyperbolic sine derivative.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_5", "judge_pick": false}, {"question": "Derive the derivative of $$y = \\text{arcosh} x$$. Why is the domain restricted to $$x > 1$$, and why must we choose the positive square root in the final answer? (4 steps)", "answer": "- Step 1: Rewrite implicitly: $$\\cosh y = x$$, so $$\\sinh y \\frac{dy}{dx} = 1$$, meaning $$\\frac{dy}{dx} = \\frac{1}{\\sinh y}$$.\n- Step 2: Use the identity $$\\cosh^2 y - \\sinh^2 y = 1$$. Since $$\\cosh y = x$$, we have $$\\sinh^2 y = x^2 - 1$$, so $$\\sinh y = \\pm\\sqrt{x^2 - 1}$$.\n- Step 3: The domain of $$\\text{arcosh} x$$ is $$x \\ge 1$$ because the range of $$\\cosh y$$ is $$[1, \\infty)$$. To make $$\\cosh y$$ one-to-one, we restrict its domain to $$y \\ge 0$$.\n- Step 4: Because we restrict $$y \\ge 0$$, and $$\\sinh y$$ is positive for positive $$y$$, we must take the positive square root. Thus, $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{x^2 - 1}}$$ for $$x > 1$$ (the derivative is undefined at $$x=1$$ as the denominator is 0).\n\nTakeaway: The domain restriction of the original hyperbolic function forces the sign choice in the square root of its inverse's derivative.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_6", "judge_pick": false}, {"question": "Derive the derivative of $$y = \\text{artanh} x$$. Why does the domain $$|x| < 1$$ naturally appear in the final expression? (3 steps)", "answer": "- Step 1: Rewrite implicitly: $$\\tanh y = x$$, so $$\\text{sech}^2 y \\frac{dy}{dx} = 1$$, meaning $$\\frac{dy}{dx} = \\frac{1}{\\text{sech}^2 y}$$.\n- Step 2: Use the identity $$1 - \\tanh^2 y = \\text{sech}^2 y$$. Since $$\\tanh y = x$$, we get $$\\text{sech}^2 y = 1 - x^2$$.\n- Step 3: Substituting this in gives $$\\frac{dy}{dx} = \\frac{1}{1 - x^2}$$. The domain must be $$|x| < 1$$ because the range of $$\\tanh y$$ is $$(-1, 1)$$; if $$|x| \\ge 1$$, $$\\text{artanh} x$$ is undefined, and the denominator $$1-x^2$$ would be zero or negative.\n\nTakeaway: The derivative of $$\\text{artanh} x$$ is $$\\frac{1}{1-x^2}$$, with the domain constrained by the range of $$\\tanh x$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_7", "judge_pick": false}, {"question": "Compare the derivatives of $$\\text{arsinh} x$$ and $$\\arcsin x$$. Why does one have a '$$+$$' inside the square root and the other have a '$$-$$'? (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx}(\\text{arsinh} x) = \\frac{1}{\\sqrt{1+x^2}}$$ and $$\\frac{d}{dx}(\\arcsin x) = \\frac{1}{\\sqrt{1-x^2}}$$. The signs inside the square roots differ.\n- Step 2: This traces back to the fundamental identities used in their derivations. For $$\\text{arsinh} x$$, we use $$\\cosh^2 y = 1 + \\sinh^2 y$$, leading to $$1 + x^2$$. For $$\\arcsin x$$, we use $$\\cos^2 y = 1 - \\sin^2 y$$, leading to $$1 - x^2$$. The difference in signs in the identities reflects the geometric vs. hyperbolic nature of the functions.\n\nTakeaway: The '$$+$$' vs '$$-$$' in the denominators comes directly from the $$+$$ in $$\\cosh^2 y - \\sinh^2 y = 1$$ vs the $$-$$ in $$\\cos^2 y + \\sin^2 y = 1$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_8", "judge_pick": false}, {"question": "Using implicit differentiation, derive the derivative of $$y = \\arcsin x$$. How do you resolve the sign of the square root in the final step? (4 steps)", "answer": "- Step 1: Rewrite implicitly: $$\\sin y = x$$. Differentiate both sides with respect to $$x$$: $$\\cos y \\frac{dy}{dx} = 1$$, so $$\\frac{dy}{dx} = \\frac{1}{\\cos y}$$.\n- Step 2: Express $$\\cos y$$ in terms of $$x$$ using the Pythagorean identity: $$\\cos^2 y = 1 - \\sin^2 y = 1 - x^2$$, so $$\\cos y = \\pm\\sqrt{1-x^2}$$.\n- Step 3: Determine the sign of $$\\cos y$$. The range of $$y = \\arcsin x$$ is restricted to $$[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$ to make the function one-to-one.\n- Step 4: In the first and fourth quadrants (where $$y \\in [-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$), $$\\cos y$$ is always positive. Therefore, we take the positive square root, yielding $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{1-x^2}}$$.\n\nTakeaway: The range restriction of the inverse trig function determines the sign of the square root in its derivative.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_9", "judge_pick": true}, {"question": "Given that $$\\arcsin x + \\arccos x = \\frac{\\pi}{2}$$, how can you find the derivative of $$\\arccos x$$ without doing implicit differentiation from scratch? What is the result? (2 steps)", "answer": "- Step 1: Differentiate both sides of the identity $$\\arccos x = \\frac{\\pi}{2} - \\arcsin x$$ with respect to $$x$$.\n- Step 2: The derivative of a constant ($$\\frac{\\pi}{2}$$) is zero, so $$\\frac{d}{dx}(\\arccos x) = -\\frac{d}{dx}(\\arcsin x) = -\\frac{1}{\\sqrt{1-x^2}}$$.\n\nTakeaway: The derivatives of $$\\arcsin x$$ and $$\\arccos x$$ are exact opposites because their graphs are reflections of each other.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_10", "judge_pick": true}, {"question": "What happens to the derivative of $$y = \\arcsin x$$ as $$x$$ approaches $$1$$ from the left, and what does this mean geometrically for the graph of $$y = \\arcsin x$$? (2 steps)", "answer": "- Step 1: The derivative is $$\\frac{1}{\\sqrt{1-x^2}}$$. As $$x \\to 1^-$$, the denominator $$\\sqrt{1-x^2}$$ approaches $$0$$ from the positive side, so the derivative approaches $$+\\infty$$.\n- Step 2: Geometrically, this means the graph of $$y = \\arcsin x$$ has a vertical tangent line at the point $$(1, \\frac{\\pi}{2})$$. The function becomes infinitely steep as it approaches the right endpoint of its domain.\n\nTakeaway: The derivative tending to infinity indicates a vertical tangent at the boundary of the domain.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_11", "judge_pick": true}, {"question": "Derive the derivative of $$y = \\arctan x$$ using implicit differentiation. What identity replaces the Pythagorean identity in the simplification? (3 steps)", "answer": "- Step 1: Rewrite implicitly: $$\\tan y = x$$. Differentiate both sides: $$\\sec^2 y \\frac{dy}{dx} = 1$$, so $$\\frac{dy}{dx} = \\frac{1}{\\sec^2 y}$$.\n- Step 2: Use the trigonometric identity $$\\sec^2 y = 1 + \\tan^2 y$$.\n- Step 3: Substitute $$\\tan y = x$$ to get $$\\frac{dy}{dx} = \\frac{1}{1 + x^2}$$.\n\nTakeaway: The identity $$1 + \\tan^2 y = \\sec^2 y$$ is the key to converting the derivative into a function of $$x$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_12", "judge_pick": true}, {"question": "Compare the denominators of the derivatives of $$\\text{artanh} x$$ and $$\\arctan x$$. Why does one have a '$$-$$' sign and the other a '$$+$$' sign? (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx}(\\text{artanh} x) = \\frac{1}{1-x^2}$$ and $$\\frac{d}{dx}(\\arctan x) = \\frac{1}{1+x^2}$$. The difference is the sign of the $$x^2$$ term.\n- Step 2: This originates from their respective identities. For $$\\text{artanh} x$$, we used $$1 - \\tanh^2 y = \\text{sech}^2 y$$. For $$\\arctan x$$, we used $$1 + \\tan^2 y = \\sec^2 y$$. The difference between the trig ($$+$$) and hyperbolic ($$-$$) identities propagates into the final derivative.\n\nTakeaway: The signs in the denominators of inverse function derivatives reflect the fundamental identity differences between trig and hyperbolic functions.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_13", "judge_pick": true}, {"question": "To differentiate $$y = \\arcsin(x^2)$$, you must use the chain rule. What is the general form of the derivative of $$\\arcsin(f(x))$$, and what condition on $$f(x)$$ must hold for the derivative to be real? (2 steps)", "answer": "- Step 1: Using the chain rule, $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{1-(f(x))^2}} \\times f'(x)$$.\n- Step 2: For the square root to be real and non-zero, we must have $$1 - (f(x))^2 > 0$$, which means $$-1 < f(x) < 1$$. In the case of $$x^2$$, this requires $$-1 < x^2 < 1$$, so $$x \\in (-1, 1)$$.\n\nTakeaway: When composing inverse trig/hyperbolic functions with other functions, the domain constraints of the inverse function still apply to the inner function.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_14", "judge_pick": false}, {"question": "When differentiating $$y = x \\text{ arsinh} x$$, what two rules must be combined, and what does the final expression look like structurally? (2 steps)", "answer": "- Step 1: This is a product of $$u = x$$ and $$v = \\text{arsinh} x$$, so apply the product rule: $$\\frac{dy}{dx} = u \\frac{dv}{dx} + v \\frac{du}{dx}$$.\n- Step 2: The derivative is $$x \\left(\\frac{1}{\\sqrt{x^2+1}}\\right) + \\text{arsinh} x (1) = \\frac{x}{\\sqrt{x^2+1}} + \\text{arsinh} x$$. The result is a sum of an algebraic term and an inverse hyperbolic term.\n\nTakeaway: Differentiating a product with an inverse function yields a sum of an algebraic fraction and the original inverse function.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_15", "judge_pick": false}, {"question": "Given $$y = (\\text{arcosh} x)^2$$, you want to prove $$\\left(x^2-1\\right)\\left(\\frac{dy}{dx}\\right)^2 = 4y$$. What is the first step to find $$\\frac{dy}{dx}$$, and why is isolating the square root useful for this proof? (3 steps)", "answer": "- Step 1: Use the chain rule to find $$\\frac{dy}{dx} = 2(\\text{arcosh} x) \\times \\frac{1}{\\sqrt{x^2-1}}$$.\n- Step 2: To remove the square root (which makes algebraic manipulation difficult), multiply both sides by $$\\sqrt{x^2-1}$$ to get $$\\sqrt{x^2-1} \\frac{dy}{dx} = 2 \\text{arcosh} x$$.\n- Step 3: Now square both sides to eliminate the root entirely: $$\\left(x^2-1\\right)\\left(\\frac{dy}{dx}\\right)^2 = 4(\\text{arcosh} x)^2$$. Since $$y = (\\text{arcosh} x)^2$$, the right side is exactly $$4y$$, completing the proof.\n\nTakeaway: When proving relations involving derivatives of inverse functions, isolating and squaring is the standard trick to eliminate the radical.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_16", "judge_pick": true}, {"question": "What is the derivative of $$y = \\text{arcosh}(\\sinh 2x)$$? Does the chain rule composition $$\\text{arcosh}(\\text{hyperbolic})$$ simplify nicely? (3 steps)", "answer": "- Step 1: Apply the chain rule: $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{(\\sinh 2x)^2 - 1}} \\times \\frac{d}{dx}(\\sinh 2x)$$.\n- Step 2: The derivative of the inner function is $$2 \\cosh 2x$$. So $$\\frac{dy}{dx} = \\frac{2 \\cosh 2x}{\\sqrt{\\sinh^2 2x - 1}}$$.\n- Step 3: Use the identity $$\\cosh^2 2x - \\sinh^2 2x = 1$$, which means $$\\cosh^2 2x = \\sinh^2 2x + 1$$. This does not perfectly match the $$\\sinh^2 2x - 1$$ in the denominator. The expression does not simplify to a neat algebraic function of $$x$$ without the radical, remaining as $$\\frac{2 \\cosh 2x}{\\sqrt{\\sinh^2 2x - 1}}$$ (assuming $$\\sinh 2x > 1$$).\n\nTakeaway: Unlike $$\\arcsin(\\sin x)$$, compositions of inverse hyperbolic and hyperbolic functions don't always trivially simplify because the domain restrictions might keep them from cancelling out.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_17", "judge_pick": false}, {"question": "A hyperbola is parameterized as $$x = a \\cosh q$$, $$y = b \\sinh q$$. How would you find the gradient of the tangent at parameter $$q$$, and what hyperbolic derivative is essential? (2 steps)", "answer": "- Step 1: The gradient is $$\\frac{dy}{dx} = \\frac{dy/dq}{dx/dq}$$. We need the derivatives of the parametric equations with respect to $$q$$.\n- Step 2: The essential derivatives are $$\\frac{dx}{dq} = a \\sinh q$$ and $$\\frac{dy}{dq} = b \\cosh q$$. Thus, the gradient is $$\\frac{b \\cosh q}{a \\sinh q} = \\frac{b}{a} \\coth q$$.\n\nTakeaway: Parametric differentiation of hyperbolas relies directly on the derivatives of $$\\cosh q$$ and $$\\sinh q$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_18", "judge_pick": true}, {"question": "When differentiating $$y = \\cosh(3x)$$, what rule must you apply, and how does the result differ from just replacing $$x$$ with $$3x$$ in the standard derivative? (2 steps)", "answer": "- Step 1: Identify the outer function as $$\\cosh(u)$$ and the inner function as $$u = 3x$$. You must apply the chain rule.\n- Step 2: The chain rule gives $$\\frac{dy}{dx} = \\sinh(u) \\times \\frac{du}{dx} = \\sinh(3x) \\times 3 = 3 \\sinh(3x)$$. The result differs by the factor of 3 (the inner derivative), which would be missing if you just swapped the argument.\n\nTakeaway: The chain rule applies to hyperbolic functions exactly as it does to trigonometric functions.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_19", "judge_pick": false}, {"question": "When differentiating $$y = x \\text{ arsinh} x$$, what two rules must be combined, and what does the final expression look like structurally? (2 steps)", "answer": "- Step 1: Apply the product rule: $$\\frac{dy}{dx} = x \\frac{d}{dx}(\\text{arsinh} x) + \\text{arsinh} x \\frac{d}{dx}(x)$$.\n- Step 2: Substitute the derivative of $$\\text{arsinh} x$$: $$\\frac{dy}{dx} = x \\left(\\frac{1}{\\sqrt{x^2+1}}\\right) + \\text{arsinh} x (1) = \\frac{x}{\\sqrt{x^2+1}} + \\text{arsinh} x$$. The structure is a sum of an algebraic fraction and the original inverse function.\n\nTakeaway: Product rule with inverse hyperbolics yields a combination of algebraic and inverse hyperbolic terms.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_20", "judge_pick": false}, {"question": "To differentiate $$y = \\arctan(2x)$$, you apply the chain rule. What happens to the denominator $$1+x^2$$ of the standard derivative? (2 steps)", "answer": "- Step 1: Let $$u = 2x$$. By the chain rule, $$\\frac{dy}{dx} = \\frac{1}{1+u^2} \\times \\frac{du}{dx}$$.\n- Step 2: Substitute $$u = 2x$$ and $$\\frac{du}{dx} = 2$$ to get $$\\frac{dy}{dx} = \\frac{2}{1+(2x)^2} = \\frac{2}{1+4x^2}$$. The $$x$$ in the denominator becomes the entire inner function $$2x$$, squared.\n\nTakeaway: Chain rule with $$\\arctan$$ requires squaring the inner function in the denominator.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_21", "judge_pick": false}, {"question": "A student writes $$\\frac{d}{dx}(\\text{arcosh} x) = \\frac{1}{\\sqrt{x^2-1}}$$ for all $$x$$. Why is this incorrect regarding the domain? (2 steps)", "answer": "- Step 1: The function $$\\text{arcosh} x$$ is only defined for $$x \\ge 1$$. Therefore, its derivative cannot exist for $$x < 1$$.\n- Step 2: Furthermore, at $$x = 1$$, the denominator $$\\sqrt{1^2 - 1} = 0$$, making the derivative undefined (the curve has a vertical tangent). The correct domain for the derivative is strictly $$x > 1$$.\n\nTakeaway: Always state the domain restriction when giving the derivative of an inverse hyperbolic or trigonometric function.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_22", "judge_pick": false}, {"question": "How would you derive the derivative of $$y = \\text{arsech} x$$, knowing that $$\\text{sech} y = x$$? What sign ambiguity arises and how is it resolved? (4 steps)", "answer": "- Step 1: Differentiate implicitly: $$-\\text{sech} y \\tanh y \\frac{dy}{dx} = 1$$, so $$\\frac{dy}{dx} = -\\frac{1}{\\text{sech} y \\tanh y}$$.\n- Step 2: Substitute $$\\text{sech} y = x$$. We need $$\\tanh y$$ in terms of $$x$$. Use the identity $$1 - \\tanh^2 y = \\text{sech}^2 y$$, so $$\\tanh^2 y = 1 - x^2$$, giving $$\\tanh y = \\pm\\sqrt{1-x^2}$$.\n- Step 3: The domain of $$\\text{arsech} x$$ is $$0 < x \\le 1$$. To make $$\\text{sech} y$$ one-to-one, we restrict its domain to $$y \\ge 0$$.\n- Step 4: For $$y \\ge 0$$, $$\\tanh y$$ is non-negative (since $$\\sinh y \\ge 0$$ and $$\\cosh y > 0$$). Thus we take the positive root: $$\\tanh y = \\sqrt{1-x^2}$$. The derivative is $$\\frac{dy}{dx} = -\\frac{1}{x\\sqrt{1-x^2}}$$.\n\nTakeaway: The derivative of $$\\text{arsech} x$$ is negative because $$\\text{sech} x$$ is a decreasing function for $$x \\ge 0$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_23", "judge_pick": false}, {"question": "Using the identity $$\\text{arsech} x = \\text{arcosh}(1/x)$$, how can you quickly find the derivative of $$\\text{arsech} x$$ using the chain rule? (3 steps)", "answer": "- Step 1: Let $$y = \\text{arcosh}(u)$$ where $$u = 1/x$$.\n- Step 2: By the chain rule, $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{u^2-1}} \\times \\frac{du}{dx}$$.\n- Step 3: We have $$\\frac{du}{dx} = -\\frac{1}{x^2}$$. Substituting $$u = 1/x$$ gives $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{(1/x)^2-1}} \\times \\left(-\\frac{1}{x^2}\\right)$$. This simplifies to $$-\\frac{1}{x^2 \\sqrt{\\frac{1-x^2}{x^2}}} = -\\frac{1}{x \\sqrt{1-x^2}}$$ (for $$x>0$$).\n\nTakeaway: Using known identities and the chain rule can be faster than implicit differentiation from scratch.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_24", "judge_pick": false}, {"question": "When differentiating $$y = \\arctan\\left(\\frac{1-x}{1+x}\\right)$$, what is the derivative of the inner function, and how does expanding the denominator simplify the final answer? (3 steps)", "answer": "- Step 1: The inner function is a quotient, so its derivative is $$\\frac{-(1+x) - 1(1-x)}{(1+x)^2} = \\frac{-2}{(1+x)^2}$$.\n- Step 2: By the chain rule, $$\\frac{dy}{dx} = \\frac{1}{1 + \\left(\\frac{1-x}{1+x}\\right)^2} \\times \\frac{-2}{(1+x)^2}$$.\n- Step 3: To simplify the denominator, multiply the $$1$$ by $$\\frac{(1+x)^2}{(1+x)^2}$$ to get a common denominator: $$\\frac{(1+x)^2 + (1-x)^2}{(1+x)^2}$$. The $$(1+x)^2$$ terms cancel, leaving $$\\frac{-2}{(1+x)^2 + (1-x)^2} = \\frac{-2}{2+2x^2} = -\\frac{1}{1+x^2}$$.\n\nTakeaway: When differentiating complex inverse tangent expressions, expanding the denominator often leads to massive simplifications.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_25", "judge_pick": false}, {"question": "Consider $$y = \\arcsin\\left(\\frac{x}{\\sqrt{1+x^2}}\\right)$$. Based on the structure of the derivative of $$\\arcsin x$$, what will the denominator of $$\\frac{dy}{dx}$$ look like before simplification? (2 steps)", "answer": "- Step 1: The denominator of the derivative of $$\\arcsin(f(x))$$ is always $$\\sqrt{1 - (f(x))^2}$$.\n- Step 2: Here, $$f(x) = \\frac{x}{\\sqrt{1+x^2}}$$, so $$(f(x))^2 = \\frac{x^2}{1+x^2}$$. The denominator will be $$\\sqrt{1 - \\frac{x^2}{1+x^2}}$$.\n\nTakeaway: The structure of the derivative is predictable; the challenge lies in the algebraic simplification of the resulting expression.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_26", "judge_pick": true}, {"question": "Continuing from the previous question, simplify the expression $$\\sqrt{1 - \\frac{x^2}{1+x^2}}$$. What does it become? (2 steps)", "answer": "- Step 1: Find a common denominator inside the square root: $$1 - \\frac{x^2}{1+x^2} = \\frac{1+x^2 - x^2}{1+x^2} = \\frac{1}{1+x^2}$$.\n- Step 2: Taking the square root gives $$\\frac{1}{\\sqrt{1+x^2}}$$. This neat simplification is characteristic of these types of exam questions.\n\nTakeaway: These compositions are deliberately constructed so that the messy algebra simplifies beautifully.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_27", "judge_pick": false}, {"question": "If $$y = \\cos x \\cosh x$$, how do the first and second derivatives combine the trig and hyperbolic parts? What pattern emerges when you take the fourth derivative? (3 steps)", "answer": "- Step 1: First derivative: $$\\frac{dy}{dx} = -\\sin x \\cosh x + \\cos x \\sinh x$$.\n- Step 2: Second derivative: $$\\frac{d^2y}{dx^2} = -\\cos x \\cosh x - \\sin x \\sinh x - \\sin x \\sinh x + \\cos x \\cosh x = -2 \\sin x \\sinh x$$.\n- Step 3: Taking the fourth derivative applies the same operator twice more. Since $$\\frac{d^2}{dx^2}(\\sin x \\sinh x) = 2 \\cos x \\cosh x$$, we get $$\\frac{d^4y}{dx^4} = -2(2 \\cos x \\cosh x) = -4y$$.\n\nTakeaway: Mixed trig-hyperbolic products exhibit beautiful symmetry under repeated differentiation.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_28", "judge_pick": false}, {"question": "A textbook states that if $$y = (\\arctan x)^2$$, then $$(1+x^2)\\frac{d^2y}{dx^2} + x\\frac{dy}{dx} - 2 = 0$$. Show that this equation actually belongs to $$y = (\\arcsin x)^2$$, not $$y = (\\arctan x)^2$$. (3 steps)", "answer": "- Step 1: For $$y = (\\arcsin x)^2$$, the first derivative is $$\\frac{dy}{dx} = \\frac{2\\arcsin x}{\\sqrt{1-x^2}}$$. Squaring both sides gives $$\\left(\\frac{dy}{dx}\\right)^2 (1-x^2) = 4y$$.\n- Step 2: Differentiate this new equation implicitly with respect to $$x$$: $$2\\frac{dy}{dx}\\frac{d^2y}{dx^2}(1-x^2) + \\left(\\frac{dy}{dx}\\right)^2(-2x) = 4\\frac{dy}{dx}$$. Divide by $$2\\frac{dy}{dx}$$ (assuming $$y' \\neq 0$$).\n- Step 3: This simplifies to $$(1-x^2)\\frac{d^2y}{dx^2} - x\\frac{dy}{dx} = 2$$, or $$(1-x^2)\\frac{d^2y}{dx^2} - x\\frac{dy}{dx} - 2 = 0$$. The structure matches the given equation (with $$-x^2$$ instead of $$+x^2$$), confirming it belongs to $$\\arcsin x$$, not $$\\arctan x$$.\n\nTakeaway: Always verify textbook claims; squaring the first derivative is a powerful technique to eliminate inverse functions before differentiating again.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_29", "judge_pick": true}, {"question": "If $$y = (\\arctan x)^2$$, what is the correct second-order differential equation it satisfies? (3 steps)", "answer": "- Step 1: Find the first derivative: $$\\frac{dy}{dx} = \\frac{2\\arctan x}{1+x^2}$$, which rearranges to $$(1+x^2)\\frac{dy}{dx} = 2\\arctan x$$.\n- Step 2: Differentiate both sides using the product rule: $$(1+x^2)\\frac{d^2y}{dx^2} + 2x\\frac{dy}{dx} = \\frac{2}{1+x^2}$$.\n- Step 3: Multiply through by $$(1+x^2)$$ to clear the fraction on the right: $$(1+x^2)^2\\frac{d^2y}{dx^2} + 2x(1+x^2)\\frac{dy}{dx} = 2$$. This is the correct differential equation for $$y = (\\arctan x)^2$$.\n\nTakeaway: To find differential equations for squared inverse functions, isolate the inverse function on one side before differentiating.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_30", "judge_pick": true}, {"question": "Since $$\\text{arcosh} x = \\ln(x + \\sqrt{x^2-1})$$, how can you differentiate $$\\text{arcosh} x$$ using this logarithmic form? (3 steps)", "answer": "- Step 1: Let $$y = \\ln(x + \\sqrt{x^2-1})$$. By the chain rule, $$\\frac{dy}{dx} = \\frac{1}{x + \\sqrt{x^2-1}} \\times \\frac{d}{dx}(x + \\sqrt{x^2-1})$$.\n- Step 2: Differentiate the inner function: $$1 + \\frac{1}{2}(x^2-1)^{-1/2}(2x) = 1 + \\frac{x}{\\sqrt{x^2-1}} = \\frac{\\sqrt{x^2-1} + x}{\\sqrt{x^2-1}}$$.\n- Step 3: Multiply by the outer derivative: $$\\frac{1}{x + \\sqrt{x^2-1}} \\times \\frac{x + \\sqrt{x^2-1}}{\\sqrt{x^2-1}}$$. The numerators and denominators cancel perfectly to give $$\\frac{1}{\\sqrt{x^2-1}}$$.\n\nTakeaway: Differentiating the logarithmic form of inverse hyperbolic functions is a robust alternative to implicit differentiation.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_31", "judge_pick": false}, {"question": "To find the stationary point of $$y = A\\cosh x - B\\sinh x$$, you set $$\\frac{dy}{dx} = 0$$. What does this yield, and how do you know if it's a minimum or maximum? (3 steps)", "answer": "- Step 1: The derivative is $$\\frac{dy}{dx} = A\\sinh x - B\\cosh x$$. Setting this to zero gives $$A\\sinh x = B\\cosh x$$, or $$\\tanh x = \\frac{B}{A}$$.\n- Step 2: Since $$\\tanh x$$ is a strictly increasing function that ranges from $$-1$$ to $$1$$, there is exactly one solution for $$x$$ provided $$|\\frac{B}{A}| < 1$$.\n- Step 3: To classify the stationary point, use the second derivative $$\\frac{d^2y}{dx^2} = A\\cosh x - B\\sinh x$$. At the stationary point, $$A\\sinh x = B\\cosh x$$, so $$\\frac{d^2y}{dx^2} = A\\cosh x - A\\frac{\\sinh^2 x}{\\cosh x} = \\frac{A(\\cosh^2 x - \\sinh^2 x)}{\\cosh x} = \\frac{A}{\\cosh x}$$. Since $$\\cosh x > 0$$, if $$A > 0$$, it's a minimum.\n\nTakeaway: For linear combinations of $$\\cosh$$ and $$\\sinh$$, the second derivative simplifies beautifully using the $$\\cosh^2 - \\sinh^2 = 1$$ identity.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_32", "judge_pick": false}, {"question": "How would you differentiate $$y = \\text{arccosech} x$$ using the identity $$\\text{arcosech} x = \\text{arsinh}(1/x)$$? (3 steps)", "answer": "- Step 1: Let $$u = 1/x$$, so $$y = \\text{arsinh}(u)$$. The derivative is $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{u^2+1}} \\times \\frac{du}{dx}$$.\n- Step 2: The inner derivative is $$\\frac{du}{dx} = -\\frac{1}{x^2}$$. Substitute $$u = 1/x$$ into the main expression: $$\\frac{1}{\\sqrt{(1/x)^2+1}} = \\frac{1}{\\sqrt{\\frac{1+x^2}{x^2}}} = \\frac{|x|}{\\sqrt{1+x^2}}$$.\n- Step 3: Multiply them together: $$\\frac{|x|}{\\sqrt{1+x^2}} \\times \\left(-\\frac{1}{x^2}\\right) = -\\frac{1}{|x|\\sqrt{1+x^2}}$$. (For $$x>0$$, this is $$-\\frac{1}{x\\sqrt{1+x^2}}$$).\n\nTakeaway: The chain rule with logarithmic/inverse function identities often requires careful handling of absolute values for the square roots.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_33", "judge_pick": true}, {"question": "For the function $$y = \\text{arcosh}(\\sinh 2x)$$, the inner function is $$\\sinh 2x$$. What condition must $$\\sinh 2x$$ satisfy for $$\\text{arcosh}$$ to be defined, and what does this imply for $$x$$? (2 steps)", "answer": "- Step 1: The function $$\\text{arcosh}(u)$$ is only defined for $$u \\ge 1$$. Therefore, we must have $$\\sinh 2x \\ge 1$$.\n- Step 2: Since $$\\sinh 0 = 0$$ and $$\\sinh x$$ is strictly increasing, $$\\sinh 2x \\ge 1$$ implies $$2x \\ge \\text{arsinh}(1) = \\ln(1 + \\sqrt{2})$$, meaning $$x$$ must be greater than approximately $$0.44$$.\n\nTakeaway: Compositions of inverse hyperbolic functions require checking the domain of the outer function against the range of the inner function.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_34", "judge_pick": false}, {"question": "The summary of key points in a textbook states that $$\\frac{d}{dx}(\\text{artanh} x) = \\frac{1}{\\sqrt{1-x^2}}$$. Is this correct? If not, what is the correct derivative, and how do you know? (2 steps)", "answer": "- Step 1: This is incorrect. The correct derivative is $$\\frac{d}{dx}(\\text{artanh} x) = \\frac{1}{1-x^2}$$. The square root in the summary is a typo (likely confused with $$\\arcsin x$$ or $$\\arccos x$$).\n- Step 2: We know this because deriving it from $$\\tanh y = x$$ gives $$\\text{sech}^2 y \\frac{dy}{dx} = 1$$, and using the identity $$1 - \\tanh^2 y = \\text{sech}^2 y$$ yields $$1 - x^2$$ in the denominator, with no square root.\n\nTakeaway: Always cross-reference formulas with their derivations; typos in summaries are common.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_35", "judge_pick": false}, {"question": "Show that the curve $$y = \\text{sech} x$$ has a point of inflection where $$x = \\pm \\ln p$$, and state the value of $$p$$. (3 steps)", "answer": "- Step 1: Find the first derivative: $$y' = -\\text{sech} x \\tanh x$$. Find the second derivative using the product rule: $$y'' = -(\\text{sech} x \\text{sech}^2 x + \\tanh x (-\\text{sech} x \\tanh x)) = \\text{sech} x (\\tanh^2 x - \\text{sech}^2 x)$$.\n- Step 2: Set $$y'' = 0$$. Since $$\\text{sech} x \\neq 0$$, we need $$\\tanh^2 x - \\text{sech}^2 x = 0$$. Using the identity $$1 - \\text{sech}^2 x = \\tanh^2 x$$, this becomes $$1 - 2\\text{sech}^2 x = 0$$, so $$\\text{sech}^2 x = \\frac{1}{2}$$.\n- Step 3: This means $$\\cosh^2 x = 2$$, so $$\\cosh x = \\sqrt{2}$$. Using the definition of $$\\cosh x$$, $$\\frac{e^x + e^{-x}}{2} = \\sqrt{2}$$, which solves to $$x = \\ln(\\sqrt{2} \\pm 1)$$. Thus $$p = \\sqrt{2} + 1$$ (or $$\\sqrt{2}-1$$, which corresponds to the negative $$x$$ value).\n\nTakeaway: Points of inflection on hyperbolic curves occur where the curvature changes, found by setting the second derivative to zero.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_36", "judge_pick": false}, {"question": "What is the derivative of $$y = \\ln(\\cosh x)$$, and why is the result always positive for $$x > 0$$? (2 steps)", "answer": "- Step 1: Use the chain rule: $$\\frac{dy}{dx} = \\frac{1}{\\cosh x} \\times \\sinh x = \\frac{\\sinh x}{\\cosh x} = \\tanh x$$.\n- Step 2: The result $$\\tanh x$$ is always positive for $$x > 0$$ because $$\\cosh x$$ is always positive, and $$\\sinh x$$ is positive for $$x > 0$$. This makes sense because $$\\cosh x$$ is strictly increasing for $$x > 0$$, so its logarithm must also be increasing.\n\nTakeaway: The derivative of $$\\ln(\\cosh x)$$ is $$\\tanh x$$, a very neat and useful result in differential equations and physics.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_37", "judge_pick": false}], "count": 38}, "glm_3": {"label": "GLM 5.1 Ōæó", "cards": [{"question": "What is the derivative of $$\\sinh x$$, and how does it compare to the derivative of $$\\sin x$$? Why is this similarity not surprising? (2 steps)", "answer": "- Step 1: The derivative is $$\\frac{d}{dx}(\\sinh x) = \\cosh x$$. This mirrors the circular case $$\\frac{d}{dx}(\\sin x) = \\cos x$$.\n+ The structural reason: both $$\\sinh$$ and $$\\sin$$ are the \"odd\" parts of their respective exponential decompositions. $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$, and differentiating gives $$\\frac{e^x + e^{-x}}{2} = \\cosh x$$. For $$\\sin x = \\frac{e^{ix} - e^{-ix}}{2i}$$, differentiating gives $$\\frac{ie^{ix} + ie^{-ix}}{2i} = \\cos x$$. The same algebraic pattern plays out in both cases.\n- Step 2: The key insight is that the hyperbolic functions are built from real exponentials, and differentiation of $$e^x$$ and $$e^{-x}$$ preserves the same symmetric/antisymmetric structure. Since $$\\sinh$$ is the odd part and $$\\cosh$$ is the even part, differentiating the odd part naturally gives the even part ŌĆö no sign flip needed.\n\nTakeaway: $$\\frac{d}{dx}(\\sinh x) = \\cosh x$$ because differentiating the odd exponential combination yields the even one directly.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_0", "judge_pick": false}, {"question": "What is the derivative of $$\\cosh x$$, and why does it differ in sign from the derivative of $$\\cos x$$? (3 steps)", "answer": "- Step 1: The derivative is $$\\frac{d}{dx}(\\cosh x) = \\sinh x$$ (positive). Compare with $$\\frac{d}{dx}(\\cos x) = -\\sin x$$ (negative). This sign difference is the crucial \"watch out\" point.\n- Step 2: Derive it from the exponential definition. $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$, so $$\\frac{d}{dx}(\\cosh x) = \\frac{e^x - e^{-x}}{2} = \\sinh x$$. The derivative of the $$e^{-x}$$ term contributes $$-e^{-x}$$, which after dividing by 2 gives a minus sign on the second term ŌĆö but the original definition already had a plus sign, so the minus from differentiation turns the $$+e^{-x}$$ into $$-e^{-x}$$, producing the odd combination $$\\sinh x$$.\n- Step 3: For $$\\cos x = \\frac{e^{ix} + e^{-ix}}{2}$$, differentiating gives $$\\frac{ie^{ix} - ie^{-ix}}{2}$$. The factor of $$i$$ from the chain rule introduces a sign flip when we extract it: this becomes $$-\\frac{e^{ix} - e^{-ix}}{2i} = -\\sin x$$. The extra $$i^2 = -1$$ is what creates the sign difference between the hyperbolic and circular cases.\n\nTakeaway: The sign difference comes from the imaginary unit in the circular definitions ŌĆö differentiating $$e^{ix}$$ brings down $$i$$, and extracting that $$i$$ to match the $$\\sin$$ definition introduces a negative sign that doesn't appear in the hyperbolic case.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_1", "judge_pick": false}, {"question": "Given the derivatives of $$\\sinh x$$ and $$\\cosh x$$, how would you derive the derivative of $$\\tanh x = \\frac{\\sinh x}{\\cosh x}$$? State the result. (3 steps)", "answer": "- Step 1: Use the quotient rule. Let $$y = \\frac{\\sinh x}{\\cosh x}$$. Then $$\\frac{dy}{dx} = \\frac{\\cosh x \\cdot \\cosh x - \\sinh x \\cdot \\sinh x}{\\cosh^2 x} = \\frac{\\cosh^2 x - \\sinh^2 x}{\\cosh^2 x}$$.\n- Step 2: Use the fundamental hyperbolic identity $$\\cosh^2 x - \\sinh^2 x = 1$$. This simplifies the numerator to 1, giving $$\\frac{dy}{dx} = \\frac{1}{\\cosh^2 x} = \\text{sech}^2 x$$.\n+ Notice the parallel with the circular case: $$\\frac{d}{dx}(\\tan x) = \\sec^2 x = \\frac{1}{\\cos^2 x}$$. The identity $$\\cosh^2 x - \\sinh^2 x = 1$$ plays the same role as $$\\cos^2 x + \\sin^2 x = 1$$, but the minus sign in the hyperbolic identity is exactly what makes the result come out positive (no negative sign).\n- Step 3: Result: $$\\frac{d}{dx}(\\tanh x) = \\text{sech}^2 x$$.\n\nTakeaway: The quotient rule plus the identity $$\\cosh^2 - \\sinh^2 = 1$$ gives a clean positive result, mirroring $$\\frac{d}{dx}(\\tan x) = \\sec^2 x$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_2", "judge_pick": true}, {"question": "What are the derivatives of $$\\text{coth } x$$, $$\\text{sech } x$$, and $$\\text{cosech } x$$? For each, what is the sign pattern and why? (3 steps)", "answer": "- Step 1: The derivatives are:\n+ $$\\frac{d}{dx}(\\text{coth } x) = -\\text{cosech}^2 x$$\n+ $$\\frac{d}{dx}(\\text{sech } x) = -\\tanh x \\cdot \\text{sech } x$$\n+ $$\\frac{d}{dx}(\\text{cosech } x) = -\\text{coth } x \\cdot \\text{cosech } x$$\n- Step 2: All three derivatives have a negative sign. This mirrors the circular case where $$\\frac{d}{dx}(\\cot x) = -\\text{cosec}^2 x$$, $$\\frac{d}{dx}(\\sec x) = \\sec x \\tan x$$, and $$\\frac{d}{dx}(\\text{cosec } x) = -\\text{cosec } x \\cot x$$. Wait ŌĆö the circular sec derivative is positive! The hyperbolic sech derivative is negative. Why?\n+ For $$\\text{sech } x = \\frac{1}{\\cosh x}$$: using the quotient/chain rule, $$\\frac{d}{dx}(\\text{sech } x) = -\\frac{\\sinh x}{\\cosh^2 x} = -\\tanh x \\cdot \\text{sech } x$$. The negative comes from differentiating the denominator. For circular $$\\sec x = \\frac{1}{\\cos x}$$: $$\\frac{d}{dx}(\\sec x) = -\\frac{-\\sin x}{\\cos^2 x} = \\sec x \\tan x$$ ŌĆö the double negative (from $$\\frac{d}{dx}(\\cos x) = -\\sin x$$) cancels to give a positive result.\n- Step 3: The sign pattern: each \"reciprocal\" hyperbolic function's derivative has a negative sign that, in the circular case, would be cancelled by the negative derivative of cos. Since $$\\frac{d}{dx}(\\cosh x) = +\\sinh x$$ (not $$-\\sinh x$$), there's no double-negative cancellation in the hyperbolic world.\n\nTakeaway: The sign difference in $$\\frac{d}{dx}(\\cosh x)$$ vs $$\\frac{d}{dx}(\\cos x)$$ cascades into all the reciprocal hyperbolic derivatives being negative where the circular ones might be positive.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_3", "judge_pick": true}, {"question": "Differentiate $$\\cosh 3x$$ with respect to $$x$$. What rule is being applied and how does the chain rule factor appear? (2 steps)", "answer": "- Step 1: We apply the chain rule. If $$y = \\cosh u$$ where $$u = 3x$$, then $$\\frac{dy}{dx} = \\frac{dy}{du} \\cdot \\frac{du}{dx}$$.\n+ $$\\frac{dy}{du} = \\sinh u = \\sinh 3x$$, and $$\\frac{du}{dx} = 3$$.\n- Step 2: Therefore $$\\frac{d}{dx}(\\cosh 3x) = 3\\sinh 3x$$. The chain rule factor of 3 appears in front, exactly as it would for $$\\frac{d}{dx}(\\cos 3x) = -3\\sin 3x$$ (but without the negative sign, since the derivative of cosh is positive sinh).\n\nTakeaway: Chain rule with hyperbolic functions works identically to the circular case ŌĆö just substitute the corresponding hyperbolic derivatives and watch the sign on cosh.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_4", "judge_pick": false}, {"question": "Differentiate $$x^2 \\cosh 4x$$ with respect to $$x$$. What rule is needed and how many terms does the result have? (2 steps)", "answer": "- Step 1: Use the product rule since we have a product of $$x^2$$ and $$\\cosh 4x$$. If $$y = uv$$ where $$u = x^2$$ and $$v = \\cosh 4x$$, then $$\\frac{dy}{dx} = u'v + uv'$$.\n+ $$u' = 2x$$ and $$v' = 4\\sinh 4x$$ (chain rule on $$\\cosh 4x$$).\n- Step 2: $$\\frac{dy}{dx} = 2x\\cosh 4x + x^2 \\cdot 4\\sinh 4x = 2x\\cosh 4x + 4x^2\\sinh 4x$$. The result has two terms, one from differentiating each factor.\n\nTakeaway: Product rule with hyperbolic functions is standard ŌĆö just remember to apply the chain rule inside when the argument isn't simply $$x$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_5", "judge_pick": false}, {"question": "If $$y = A\\cosh 3x + B\\sinh 3x$$ where $$A$$ and $$B$$ are constants, what is the relationship between $$\\frac{d^2 y}{dx^2}$$ and $$y$$? Explain why. (3 steps)", "answer": "- Step 1: Differentiate once. $$\\frac{dy}{dx} = 3A\\sinh 3x + 3B\\cosh 3x$$, using the chain rule factor of 3 and the fact that $$\\frac{d}{dx}(\\cosh) = \\sinh$$ and $$\\frac{d}{dx}(\\sinh) = \\cosh$$.\n- Step 2: Differentiate again. $$\\frac{d^2y}{dx^2} = 9A\\cosh 3x + 9B\\sinh 3x = 9(A\\cosh 3x + B\\sinh 3x)$$.\n- Step 3: Therefore $$\\frac{d^2y}{dx^2} = 9y$$. The key reason: each differentiation swaps $$\\cosh \\leftrightarrow \\sinh$$ and introduces another factor of 3 from the chain rule. After two differentiations, we're back to the original functions (since swapping twice returns to the start), with a factor of $$3 \\times 3 = 9$$.\n\n+ This is a second-order ODE where $$n^2 = 9$$, i.e. $$n = 3$$. In general, $$y = A\\cosh nx + B\\sinh nx$$ satisfies $$\\frac{d^2y}{dx^2} = n^2 y$$. Compare with the circular case where $$y = A\\cos nx + B\\sin nx$$ satisfies $$\\frac{d^2y}{dx^2} = -n^2 y$$ ŌĆö the sign difference again traces back to the sign of $$\\frac{d}{dx}(\\cosh)$$ vs $$\\frac{d}{dx}(\\cos)$$.\n\nTakeaway: Two differentiations of $$A\\cosh nx + B\\sinh nx$$ return to $$n^2 y$$ because the double swap $$\\cosh \\to \\sinh \\to \\cosh$$ is an involution, accumulating $$n^2$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_6", "judge_pick": false}, {"question": "Why does $$y = A\\cosh nx + B\\sinh nx$$ satisfy $$\\frac{d^2y}{dx^2} = n^2 y$$ while $$y = A\\cos nx + B\\sin nx$$ satisfies $$\\frac{d^2y}{dx^2} = -n^2 y$$? What is the single root cause of the sign difference? (2 steps)", "answer": "- Step 1: Trace through two differentiations in each case. For hyperbolic: $$\\cosh \\xrightarrow{d/dx} \\sinh \\xrightarrow{d/dx} \\cosh$$ and $$\\sinh \\xrightarrow{d/dx} \\cosh \\xrightarrow{d/dx} \\sinh$$. Both return to themselves with a factor of $$n^2$$. For circular: $$\\cos \\xrightarrow{d/dx} -\\sin \\xrightarrow{d/dx} -\\cos$$ and $$\\sin \\xrightarrow{d/dx} \\cos \\xrightarrow{d/dx} -\\sin$$. Both return to themselves with a factor of $$-n^2$$.\n- Step 2: The single root cause is the sign of $$\\frac{d}{dx}(\\cos x) = -\\sin x$$ vs $$\\frac{d}{dx}(\\cosh x) = +\\sinh x$$. That one negative sign, when you differentiate twice, produces an extra factor of $$(-1)$$ in the circular case. Every subsequent sign difference in the hyperbolic vs circular comparison can be traced back to this.\n\nTakeaway: The fundamental sign difference between $$\\frac{d}{dx}(\\cosh x)$$ and $$\\frac{d}{dx}(\\cos x)$$ is the origin of all other sign discrepancies between hyperbolic and circular calculus.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_7", "judge_pick": false}, {"question": "To find stationary points of $$y = 12\\cosh x - \\sinh x$$, what do you set equal to zero, and what type of stationary point would you expect at the minimum? (3 steps)", "answer": "- Step 1: Set $$\\frac{dy}{dx} = 0$$. We have $$\\frac{dy}{dx} = 12\\sinh x - \\cosh x = 0$$, so $$12\\sinh x = \\cosh x$$.\n- Step 2: Using the exponential definitions: $$12 \\cdot \\frac{e^x - e^{-x}}{2} = \\frac{e^x + e^{-x}}{2}$$, which gives $$12(e^x - e^{-x}) = e^x + e^{-x}$$, so $$11e^x = 13e^{-x}$$, meaning $$e^{2x} = \\frac{13}{11}$$, giving $$x = \\frac{1}{2}\\ln\\frac{13}{11}$$.\n- Step 3: To determine the nature, compute $$\\frac{d^2y}{dx^2} = 12\\cosh x - \\sinh x = y$$ itself. Since $$y = 12\\cosh x - \\sinh x$$, and at the stationary point we know $$12\\sinh x = \\cosh x$$, we can check the sign. At small positive $$x$$, $$\\cosh x > \\sinh x$$, so $$12\\cosh x - \\sinh x > 0$$, confirming a minimum.\n\nTakeaway: The second derivative equals $$y$$ itself for this type of expression, making nature determination straightforward.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_8", "judge_pick": false}, {"question": "What are the derivatives of $$\\text{arsinh } x$$, $$\\text{arcosh } x$$, and $$\\text{artanh } x$$? State each and note the domain restrictions. (3 steps)", "answer": "- Step 1: The derivatives are:\n+ $$\\frac{d}{dx}(\\text{arsinh } x) = \\frac{1}{\\sqrt{x^2 + 1}}$$ ŌĆö valid for all real $$x$$\n+ $$\\frac{d}{dx}(\\text{arcosh } x) = \\frac{1}{\\sqrt{x^2 - 1}}$$, valid for $$x > 1$$\n+ $$\\frac{d}{dx}(\\text{artanh } x) = \\frac{1}{1 - x^2}$$, valid for $$|x| < 1$$\n- Step 2: The domain restrictions come from the domains of the original functions. $$\\text{arcosh } x$$ is only defined for $$x \\geq 1$$, and we take the principal branch where $$\\text{arcosh } x > 0$$ (i.e., $$x > 1$$ for differentiability). $$\\text{artanh } x$$ is only defined for $$|x| < 1$$ because $$\\tanh$$ only takes values in $$(-1, 1)$$.\n- Step 3: Notice the structural patterns. For $$\\text{arsinh } x$$, the denominator has $$x^2 + 1$$ (always positive, no restriction). For $$\\text{arcosh } x$$, it's $$x^2 - 1$$ (requires $$|x| > 1$$, and domain is $$x > 1$$). For $$\\text{artanh } x$$, it's $$1 - x^2$$ (requires $$|x| < 1$$). These match the domains of the original inverse functions.\n\nTakeaway: The square root or denominator under each derivative directly reflects the domain of the original inverse hyperbolic function.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_9", "judge_pick": false}, {"question": "Derive the formula $$\\frac{d}{dx}(\\text{arsinh } x) = \\frac{1}{\\sqrt{x^2 + 1}}$$ using implicit differentiation. (4 steps)", "answer": "- Step 1: Let $$y = \\text{arsinh } x$$, so $$\\sinh y = x$$. Differentiate both sides with respect to $$x$$: $$\\cosh y \\cdot \\frac{dy}{dx} = 1$$.\n- Step 2: Solve for $$\\frac{dy}{dx} = \\frac{1}{\\cosh y}$$. Now we need to express $$\\cosh y$$ in terms of $$x$$.\n- Step 3: Use the identity $$\\cosh^2 y - \\sinh^2 y = 1$$, so $$\\cosh^2 y = 1 + \\sinh^2 y = 1 + x^2$$. Therefore $$\\cosh y = \\sqrt{x^2 + 1}$$.\n+ We take the positive root because $$\\cosh y \\geq 1$$ always, and for the principal branch of arsinh, $$\\cosh y > 0$$.\n- Step 4: Therefore $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{x^2 + 1}}$$.\n\nTakeaway: The implicit differentiation method converts the inverse function problem into a straightforward application of the hyperbolic identity $$\\cosh^2 - \\sinh^2 = 1$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_10", "judge_pick": false}, {"question": "Derive the formula $$\\frac{d}{dx}(\\text{arcosh } x) = \\frac{1}{\\sqrt{x^2 - 1}}$$ for $$x > 1$$. Why must we specify $$x > 1$$? (4 steps)", "answer": "- Step 1: Let $$y = \\text{arcosh } x$$, so $$\\cosh y = x$$. Differentiate both sides: $$\\sinh y \\cdot \\frac{dy}{dx} = 1$$.\n- Step 2: Solve for $$\\frac{dy}{dx} = \\frac{1}{\\sinh y}$$. Now express $$\\sinh y$$ in terms of $$x$$.\n- Step 3: Use $$\\cosh^2 y - \\sinh^2 y = 1$$, so $$\\sinh^2 y = \\cosh^2 y - 1 = x^2 - 1$$. Therefore $$\\sinh y = \\sqrt{x^2 - 1}$$.\n+ We take the positive root because the principal branch of arcosh has $$y > 0$$, and for $$y > 0$$, $$\\sinh y > 0$$.\n- Step 4: Therefore $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{x^2 - 1}}$$. The restriction $$x > 1$$ is needed because arcosh is only defined for $$x \\geq 1$$, and at $$x = 1$$ the derivative is undefined (the denominator vanishes ŌĆö the curve $$y = \\text{arcosh } x$$ has a vertical tangent at $$x = 1$$).\n\nTakeaway: The domain of arcosh ($$x \\geq 1$$) and the square root $$\\sqrt{x^2 - 1}$$ both constrain us to $$x > 1$$ for differentiability.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_11", "judge_pick": false}, {"question": "Derive the formula $$\\frac{d}{dx}(\\text{artanh } x) = \\frac{1}{1 - x^2}$$ for $$|x| < 1$$. Why is the domain $$|x| < 1$$ essential here? (4 steps)", "answer": "- Step 1: Let $$y = \\text{artanh } x$$, so $$\\tanh y = x$$. Differentiate both sides: $$\\text{sech}^2 y \\cdot \\frac{dy}{dx} = 1$$.\n- Step 2: Solve for $$\\frac{dy}{dx} = \\frac{1}{\\text{sech}^2 y} = \\cosh^2 y$$. Now express $$\\cosh^2 y$$ in terms of $$x$$.\n- Step 3: Since $$\\tanh y = x$$, we use the identity $$\\text{sech}^2 y = 1 - \\tanh^2 y = 1 - x^2$$. Therefore $$\\frac{dy}{dx} = \\frac{1}{1 - x^2}$$.\n- Step 4: The domain $$|x| < 1$$ is essential because $$\\tanh$$ only maps to $$(-1, 1)$$, so artanh is only defined for $$|x| < 1$$. Additionally, at $$|x| = 1$$ the denominator $$1 - x^2 = 0$$, making the derivative undefined (the graph has vertical asymptotes at $$x = \\pm 1$$).\n\nTakeaway: Both the domain of artanh and the structure of the denominator $$1 - x^2$$ enforce $$|x| < 1$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_12", "judge_pick": false}, {"question": "Differentiate $$y = x\\,\\text{arcosh } x$$ with respect to $$x$$. How many terms does the result have and why? (2 steps)", "answer": "- Step 1: This is a product of $$x$$ and $$\\text{arcosh } x$$, so use the product rule. $$\\frac{dy}{dx} = 1 \\cdot \\text{arcosh } x + x \\cdot \\frac{1}{\\sqrt{x^2 - 1}}$$.\n- Step 2: $$\\frac{dy}{dx} = \\text{arcosh } x + \\frac{x}{\\sqrt{x^2 - 1}}$$. Two terms: one from differentiating $$x$$ (giving the arcosh term unchanged), and one from differentiating arcosh (giving the algebraic fraction). Both terms coexist because the product rule always produces two terms.\n\nTakeaway: Product rule with inverse hyperbolic functions produces one \"function\" term and one \"algebraic\" term.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_13", "judge_pick": false}, {"question": "Given $$y = (\\text{arcosh } x)^2$$, prove that $$(x^2 - 1)\\left(\\frac{dy}{dx}\\right)^2 = 4y$$. Walk through the key algebraic step that eliminates arcosh from the derivative equation. (3 steps)", "answer": "- Step 1: Differentiate using the chain rule: $$\\frac{dy}{dx} = 2\\,\\text{arcosh } x \\cdot \\frac{1}{\\sqrt{x^2 - 1}}$$.\n- Step 2: Multiply both sides by $$\\sqrt{x^2 - 1}$$ to isolate arcosh: $$\\sqrt{x^2 - 1} \\cdot \\frac{dy}{dx} = 2\\,\\text{arcosh } x$$.\n- Step 3: Square both sides: $$(x^2 - 1)\\left(\\frac{dy}{dx}\\right)^2 = 4(\\text{arcosh } x)^2 = 4y$$. This eliminates arcosh because $$(\\text{arcosh } x)^2 = y$$ by definition. The algebraic manipulation (multiply by $$\\sqrt{x^2 - 1}$$, then square) is the key trick that converts a mixed expression into a pure differential equation.\n\nTakeaway: To eliminate an inverse function from a derivative identity, isolate it on one side and square (or use the original substitution).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_14", "judge_pick": false}, {"question": "If $$y = \\text{artanh}\\left(\\frac{e^x}{2}\\right)$$, what is $$\\frac{dy}{dx}$$, and how would you show that $$(4 - e^{2x})\\frac{dy}{dx} = 2e^x$$? (3 steps)", "answer": "- Step 1: By the chain rule, $$\\frac{dy}{dx} = \\frac{1}{1 - \\left(\\frac{e^x}{2}\\right)^2} \\cdot \\frac{d}{dx}\\left(\\frac{e^x}{2}\\right) = \\frac{1}{1 - \\frac{e^{2x}}{4}} \\cdot \\frac{e^x}{2}$$.\n- Step 2: Simplify: $$\\frac{dy}{dx} = \\frac{e^x/2}{1 - e^{2x}/4} = \\frac{e^x/2}{\\frac{4 - e^{2x}}{4}} = \\frac{e^x}{2} \\cdot \\frac{4}{4 - e^{2x}} = \\frac{2e^x}{4 - e^{2x}}$$.\n- Step 3: Multiply both sides by $$(4 - e^{2x})$$: $$(4 - e^{2x})\\frac{dy}{dx} = 2e^x$$. Note: the domain requires $$\\left|\\frac{e^x}{2}\\right| < 1$$, i.e., $$e^x < 2$$, i.e., $$x < \\ln 2$$, which also ensures $$4 - e^{2x} > 0$$.\n\nTakeaway: Chain rule with artanh produces a rational expression in $$e^x$$; multiply through by the denominator to get the clean identity.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_15", "judge_pick": true}, {"question": "If $$y = \\text{arsinh } x$$, show that $$(1 + x^2)\\frac{d^3y}{dx^3} + 3x\\frac{d^2y}{dx^2} + \\frac{dy}{dx} = 0$$. What pattern does this differential equation exhibit? (4 steps)", "answer": "- Step 1: We know $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{x^2 + 1}} = (x^2 + 1)^{-1/2}$$. Let's call this $$p$$ for convenience.\n- Step 2: Second derivative: $$\\frac{d^2y}{dx^2} = -\\frac{1}{2}(x^2 + 1)^{-3/2} \\cdot 2x = -x(x^2 + 1)^{-3/2}$$.\n- Step 3: Third derivative: $$\\frac{d^3y}{dx^3} = -(x^2 + 1)^{-3/2} - x \\cdot \\left(-\\frac{3}{2}\\right)(x^2 + 1)^{-5/2} \\cdot 2x = -(x^2 + 1)^{-3/2} + 3x^2(x^2 + 1)^{-5/2}$$.\n+ Factor out $$(x^2 + 1)^{-5/2}$$: $$\\frac{d^3y}{dx^3} = (x^2 + 1)^{-5/2}[-(x^2 + 1) + 3x^2] = (x^2+1)^{-5/2}(2x^2 - 1)$$.\n- Step 4: Now substitute into the equation. $$(1+x^2)\\frac{d^3y}{dx^3} = (x^2+1)^{-3/2}(2x^2-1)$$. And $$3x\\frac{d^2y}{dx^2} = 3x \\cdot (-x)(x^2+1)^{-3/2} = -3x^2(x^2+1)^{-3/2}$$. And $$\\frac{dy}{dx} = (x^2+1)^{-1/2} = (x^2+1)^{-3/2}(x^2+1)$$. Sum: $$(x^2+1)^{-3/2}[(2x^2-1) - 3x^2 + (x^2+1)] = (x^2+1)^{-3/2} \\cdot 0 = 0$$.\n\nTakeaway: This is a third-order ODE that $$\\text{arsinh } x$$ satisfies. The pattern involves coefficients $$(1+x^2)$$, $$3x$$, and $$1$$ ŌĆö reminiscent of a Legendre-type structure.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_16", "judge_pick": false}, {"question": "What are the derivatives of $$\\arcsin x$$, $$\\arccos x$$, and $$\\arctan x$$? Note the sign difference between arcsin and arccos. (2 steps)", "answer": "- Step 1: The derivatives are:\n+ $$\\frac{d}{dx}(\\arcsin x) = \\frac{1}{\\sqrt{1 - x^2}}$$ (positive)\n+ $$\\frac{d}{dx}(\\arccos x) = -\\frac{1}{\\sqrt{1 - x^2}}$$ (negative)\n+ $$\\frac{d}{dx}(\\arctan x) = \\frac{1}{1 + x^2}$$ (positive)\n- Step 2: The sign difference between arcsin and arccos derivatives arises because $$\\arccos x = \\frac{\\pi}{2} - \\arcsin x$$, so $$\\frac{d}{dx}(\\arccos x) = -\\frac{d}{dx}(\\arcsin x)$$. They differ by a constant (and therefore by a sign upon differentiation).\n\nTakeaway: arcsin and arccos are complementary angles summing to $$\\pi/2$$, so their derivatives must be negatives of each other.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_17", "judge_pick": false}, {"question": "Derive $$\\frac{d}{dx}(\\arcsin x) = \\frac{1}{\\sqrt{1 - x^2}}$$ using implicit differentiation. Why do we take the positive square root? (4 steps)", "answer": "- Step 1: Let $$y = \\arcsin x$$, so $$\\sin y = x$$. Differentiate both sides with respect to $$x$$: $$\\cos y \\cdot \\frac{dy}{dx} = 1$$.\n- Step 2: Solve for $$\\frac{dy}{dx} = \\frac{1}{\\cos y}$$. Now express $$\\cos y$$ in terms of $$x$$.\n- Step 3: Use $$\\cos^2 y = 1 - \\sin^2 y = 1 - x^2$$, so $$\\cos y = \\sqrt{1 - x^2}$$. We take the positive root because the principal branch of arcsin has $$y \\in [-\\pi/2, \\pi/2]$$, where $$\\cos y \\geq 0$$.\n- Step 4: Therefore $$\\frac{dy}{dx} = \\frac{1}{\\sqrt{1 - x^2}}$$. Valid for $$|x| < 1$$ (where the derivative exists; at $$|x| = 1$$ the denominator is zero, giving vertical tangents).\n\nTakeaway: The positive root choice is forced by the principal branch convention of arcsin, where t
