hbf{b}|}$$. This doesn't distinguish between acute and obtuse angles (sine is positive for both).\n\n**Exam tip:** Dot product is generally preferred for finding angles unless you specifically need sine for some reason.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": true}, {"question": "In the formula for shortest distance between skew lines, what happens if $$\\mathbf{b} \\times \\mathbf{d} = \\mathbf{0}$$? What does this mean geometrically? (2 steps)", "answer": "- Step 1: If $$\\mathbf{b} \\times \\mathbf{d} = \\mathbf{0}$$, the direction vectors b and d are parallel.\n\n- Step 2: This means the \"shortest distance\" formula has division by zero. Geometrically, the lines are either intersecting (distance = 0) or parallel (constant distance). You need to handle these cases separately.\n\n**Important:** Always check if lines are parallel before applying the skew lines formula. If parallel, find distance from any point on one line to the other line.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": true}, {"question": "A tetrahedron has vertices at O(0,0,0), A(1,2,-1), B(-1,1,2), C(2,-1,1). Find its volume. (4 steps)", "answer": "- Step 1: Use vectors from O: $$\\mathbf{a} = \\overrightarrow{OA} = \\mathbf{i} + 2\\mathbf{j} - \\mathbf{k}$$, $$\\mathbf{b} = \\overrightarrow{OB} = -\\mathbf{i} + \\mathbf{j} + 2\\mathbf{k}$$, $$\\mathbf{c} = \\overrightarrow{OC} = 2\\mathbf{i} - \\mathbf{j} + \\mathbf{k}$$\n\n- Step 2: Compute scalar triple product:\n$$\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c}) = \\begin{vmatrix} 1 & 2 & -1 \\\\ -1 & 1 & 2 \\\\ 2 & -1 & 1 \\end{vmatrix}$$\n\n- Step 3: Calculate determinant:\n= 1(1×1 - 2×(-1)) - 2((-1)×1 - 2×2) + (-1)((-1)×(-1) - 1×2)\n= 1(1 + 2) - 2(-1 - 4) + (-1)(1 - 2)\n= 3 - 2(-5) + (-1)(-1)\n= 3 + 10 + 1 = 14\n\n- Step 4: Volume = $$\\frac{1}{6} |14| = \\frac{14}{6} = \\frac{7}{3}$$\n\n**Check:** Make sure to use absolute value - volume must be positive.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "What is the relationship between the volume of a tetrahedron and the volume of the parallelepiped built on the same three edges? Why is there a factor of 1/6? (2 steps)", "answer": "- Step 1: Volume of parallelepiped = $$|\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c})|$$\n\n- Step 2: A tetrahedron (triangular pyramid) occupies exactly 1/6 of the parallelepiped formed by extending its faces. Think of dividing a cuboid into 6 identical tetrahedra using its diagonals.\n\n**Geometric proof:** A tetrahedron can be seen as 1/3 of a pyramid with triangular base. That pyramid is 1/2 of the parallelepiped. So 1/2 × 1/3 = 1/6.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": true}, {"question": "Prove that $$\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c}) = (\\mathbf{a} \\times \\mathbf{b}) . \\mathbf{c}$$. What property does this demonstrate? (3 steps)", "answer": "- Step 1: Let $$\\mathbf{b} \\times \\mathbf{c} = \\mathbf{n}$$. Then left side = $$\\mathbf{a} . \\mathbf{n}$$.\n\n- Step 2: Now $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{m}$$. Then right side = $$\\mathbf{m} . \\mathbf{c}$$.\n\n- Step 3: Both equal the determinant $$\\begin{vmatrix} a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3 \\\\ c_1 & c_2 & c_3 \\end{vmatrix}$$. This is the \"mixed product\" property - you can move the dot inside/outside the cross in this way. This is essentially the cyclic property in disguise.\n\n**Key insight:** This shows the scalar triple product notation is flexible - you can compute cross then dot, or dot then cross (in the special \"cyclic\" arrangement shown).", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "Find the acute angle between the planes $$2x - 2y - z = 2$$ and $$x - 3y + z = 5$$. (3 steps)", "answer": "- Step 1: Normal vectors: $$\\mathbf{n}_1 = (2, -2, -1)$$ and $$\\mathbf{n}_2 = (1, -3, 1)$$\n\n- Step 2: Compute dot product and magnitudes:\n$$\\mathbf{n}_1 . \\mathbf{n}_2 = 2(1) + (-2)(-3) + (-1)(1) = 2 + 6 - 1 = 7$$\n$$|\\mathbf{n}_1| = \\sqrt{4 + 4 + 1} = 3$$\n$$|\\mathbf{n}_2| = \\sqrt{1 + 9 + 1} = \\sqrt{11}$$\n\n- Step 3: $$\\cos \\theta = \\frac{|7|}{3\\sqrt{11}} = \\frac{7}{3\\sqrt{11}}$$\n$$\\theta = \\cos^{-1}\\left(\\frac{7}{3\\sqrt{11}}\\right) \\approx \\cos^{-1}(0.702) \\approx 45.5°$$\n\n**Answer:** Acute angle ≈ 45.5° (or use exact value with surds)", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "A line is given by $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$. Explain why this guarantees the line passes through point a and is parallel to b. (2 steps)", "answer": "- Step 1: If $$\\mathbf{r} = \\mathbf{a}$$, then $$\\mathbf{a} - \\mathbf{a} = \\mathbf{0}$$, and $$\\mathbf{0} \\times \\mathbf{b} = \\mathbf{0}$$. So point a satisfies the equation - the line passes through a.\n\n- Step 2: For any point r on the line, $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$ means $$\\mathbf{r} - \\mathbf{a}$$ is parallel to b (cross product zero implies parallel, unless zero vector). So the line direction is b.\n\n**Key insight:** This form directly encodes both the point and direction without using parameters - elegant and useful for proofs.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "Find the equation of the plane containing the line $$\\mathbf{r} = \\mathbf{i} + \\mathbf{j} - 2\\mathbf{k} + \\lambda(2\\mathbf{i} - \\mathbf{k})$$ and the point (4,3,1). (4 steps)", "answer": "- Step 1: Line direction = $$2\\mathbf{i} - \\mathbf{k}$$. Vector from line point to given point: $$\\mathbf{i} - 2\\mathbf{j} + 3\\mathbf{k}$$.\n\n- Step 2: Normal = cross product of these two vectors:\n$$\\mathbf{n} = (2\\mathbf{i} - \\mathbf{k}) \\times (\\mathbf{i} - 2\\mathbf{j} + 3\\mathbf{k}) = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ 2 & 0 & -1 \\\\ 1 & -2 & 3 \\end{vmatrix} = -2\\mathbf{i} - 7\\mathbf{j} - 4\\mathbf{k}$$\n\n- Step 3: Use point (4,3,1) in plane equation: $$-2x - 7y - 4z = -(2(4) + 7(3) + 4(1)) = -(8 + 21 + 4) = -33$$\n\n- Step 4: Simplify: $$2x + 7y + 4z = 33$$ or in vector form: $$\\mathbf{r} . (2\\mathbf{i} + 7\\mathbf{j} + 4\\mathbf{k}) = 33$$\n\n**Alternative:** Could use any point on the line - should give same result.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "What is the geometric significance of $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$ vs $$\\mathbf{a} . \\mathbf{b} = 0$$? How do you distinguish these cases? (2 steps)", "answer": "- Step 1: $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$ means a and b are **parallel** (or one is zero). The angle between them is 0° or 180°.\n\n- Step 2: $$\\mathbf{a} . \\mathbf{b} = 0$$ means a and b are **perpendicular** (orthogonal). The angle between them is 90°.\n\n**Mnemonic:** Cross = 0 means \"co-linear\" (parallel); dot = 0 means \"orthogonal\" (perpendicular). Think: \"cross\" has zero angle between parallel lines; \"dot\" is like a period - ends the relationship (90°).", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": true}, {"question": "Why can you NOT divide by a vector? What does this mean for solving equations involving cross products? (2 steps)", "answer": "- Step 1: Division is undefined for vectors because there's no unique inverse operation. If $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{c}$$, there's no single vector b that satisfies this for given a and c.\n\n- Step 2: This means you can't \"solve for b\" by dividing. However, if you know a and c, you can use the formula approach or set up component equations.\n\n**Practical implication:** When solving vector equations involving cross products, you typically need to work component-wise or use other algebraic manipulations.", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "If three vectors a, b, c satisfy $$\\mathbf{a} + \\mathbf{b} + \\mathbf{c} = \\mathbf{0}$$, prove that $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{b} \\times \\mathbf{c} = \\mathbf{c} \\times \\mathbf{a}$$. (3 steps)", "answer": "- Step 1: From $$\\mathbf{a} + \\mathbf{b} + \\mathbf{c} = \\mathbf{0}$$, we have $$\\mathbf{a} = -(\\mathbf{b} + \\mathbf{c})$$.\n\n- Step 2: Then $$\\mathbf{a} \\times \\mathbf{b} = -(\\mathbf{b} + \\mathbf{c}) \\times \\mathbf{b} = -\\mathbf{b} \\times \\mathbf{b} - \\mathbf{c} \\times \\mathbf{b} = \\mathbf{b} \\times \\mathbf{c}$$ (since b × b = 0 and -c × b = b × c).\n\n- Step 3: Similarly, $$\\mathbf{b} \\times \\mathbf{c} = \\mathbf{c} \\times \\mathbf{a}$$ by the same reasoning. Thus all three are equal.\n\n**Geometric meaning:** This shows that when vectors sum to zero (forming a triangle), the \"area vectors\" from each pair are equal.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "What is the condition for three points to be collinear? How can you use vectors to check this? (2 steps)", "answer": "- Step 1: Points A, B, C are collinear if vectors AB and AC are parallel, i.e., $$\\overrightarrow{AB} \\times \\overrightarrow{AC} = \\mathbf{0}$$.\n\n- Step 2: In terms of position vectors a, b, c: points are collinear if $$(\\mathbf{b} - \\mathbf{a}) \\times (\\mathbf{c} - \\mathbf{a}) = \\mathbf{0}$$.\n\n**Alternative check:** Can also verify one vector is a scalar multiple of another: $$\\mathbf{b} - \\mathbf{a} = k(\\mathbf{c} - \\mathbf{a})$$ for some scalar k.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "How do you find where two planes intersect? What determines if they don't intersect? (2 steps)", "answer": "- Step 1: Two planes intersect in a line (unless parallel). Find this by solving the two plane equations simultaneously - typically express in parametric form.\n\n- Step 2: If their normal vectors are parallel (cross product = 0) but the planes aren't the same, they are parallel and don't intersect. If they're identical, they intersect everywhere.\n\n**Method:** Subtract one plane equation from another to get a linear equation, then combine with one of the plane equations to get parametric line.", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": false}, {"question": "Find the angle between the line $$\\mathbf{r} = 2\\mathbf{i} + \\mathbf{j} - 5\\mathbf{k} + \\lambda(3\\mathbf{i} + 4\\mathbf{j} - 12\\mathbf{k})$$ and the plane $$2x - 2y - z = 2$$. (3 steps)", "answer": "- Step 1: Direction vector b = (3, 4, -12), plane normal n = (2, -2, -1)\n\n- Step 2: Use formula $$\\sin \\alpha = \\frac{|\\mathbf{b} . \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$\n$$|\\mathbf{b} . \\mathbf{n}| = |3(2) + 4(-2) + (-12)(-1)| = |6 - 8 + 12| = |10| = 10$$\n$$|\\mathbf{b}| = \\sqrt{9 + 16 + 144} = \\sqrt{169} = 13$$\n$$|\\mathbf{n}| = \\sqrt{4 + 4 + 1} = 3$$\n\n- Step 3: $$\\sin \\alpha = \\frac{10}{13 \\times 3} = \\frac{10}{39}$$\n$$\\alpha = \\sin^{-1}\\left(\\frac{10}{39}\\right) \\approx 14.9°$$\n\n**Answer:** Acute angle ≈ 14.9°", "source": "MiniMax ①", "_id": "minimax_1_60", "judge_pick": false}, {"question": "The plane $$\\mathbf{r} . \\mathbf{n} = p$$ has normal n. What is the distance from origin to this plane? What if n is not a unit vector? (2 steps)", "answer": "- Step 1: If n is already a unit vector (|n| = 1), then distance from origin = |p|.\n\n- Step 2: If n is not a unit vector, write the plane as $$\\mathbf{r} . \\hat{\\mathbf{n}} = d$$ where $$\\hat{\\mathbf{n}} = \\frac{\\mathbf{n}}{|\\mathbf{n}|}$$. Then distance = |p|/|n|.\n\n**Key formula:** Distance from origin = $$\\frac{|p|}{\\sqrt{a^2 + b^2 + c^2}}$$ for plane ax + by + cz = p.", "source": "MiniMax ①", "_id": "minimax_1_61", "judge_pick": false}, {"question": "Why is the scalar triple product equal to the determinant of a 3×3 matrix with the vector components? (2 steps)", "answer": "- Step 1: The determinant expansion:\n$$a_1(b_2c_3 - b_3c_2) + a_2(b_3c_1 - b_1c_3) + a_3(b_1c_2 - b_2c_1)$$\n\n- Step 2: This matches exactly the scalar triple product formula:\n$$\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c}) = a_1(b_2c_3 - b_3c_2) + a_2(b_3c_1 - b_1c_3) + a_3(b_1c_2 - b_2c_1)$$\n\n**Why useful:** The determinant form is much easier to compute and remember - just write the three vectors as rows (or columns) of a matrix.", "source": "MiniMax ①", "_id": "minimax_1_62", "judge_pick": false}, {"question": "In a regular tetrahedron with side length a, what is its volume? Verify using the scalar triple product. (4 steps)", "answer": "- Step 1: A regular tetrahedron can be positioned with vertices at:\nO(0,0,0), A(a,0,0), B(a/2, a√3/2, 0), C(a/2, a√3/6, a√(2/3))\n\n- Step 2: Vectors from O: $$\\mathbf{a} = (a,0,0)$$, $$\\mathbf{b} = (a/2, a\\sqrt{3}/2, 0)$$, $$\\mathbf{c} = (a/2, a\\sqrt{3}/6, a\\sqrt{2/3})$$\n\n- Step 3: Compute scalar triple product using determinant:\n$$= a \\cdot \\begin{vmatrix} a\\sqrt{3}/2 & 0 \\\\ a\\sqrt{3}/6 & a\\sqrt{2/3} \\end{vmatrix} = a \\cdot \\frac{a^2\\sqrt{6}}{6} = \\frac{a^3\\sqrt{6}}{6}$$\n\n- Step 4: Volume = $$\\frac{1}{6} \\times \\frac{a^3\\sqrt{6}}{6} = \\frac{a^3\\sqrt{6}}{12} = \\frac{a^3}{6\\sqrt{2}}$$\n\n**Standard result:** Volume of regular tetrahedron side a = $$a^3\\sqrt{2}/12$$", "source": "MiniMax ①", "_id": "minimax_1_63", "judge_pick": false}, {"question": "Explain why the cross product magnitude equals the area of the parallelogram, but the scalar triple product magnitude equals the volume of the parallelepiped. How are these related concepts? (2 steps)", "answer": "- Step 1: Cross product gives a vector perpendicular to two input vectors - its magnitude equals \"area spanned\" by them (like base × height for parallelogram).\n\n- Step 2: Scalar triple product is dot product of one vector with the cross product of two others. The cross product gives base area, the dot product projects the third vector onto the perpendicular direction, giving height. Area × height = volume.\n\n**Unified view:** These are successive generalizations: dot product gives projection, cross product gives perpendicular area, scalar triple product gives 3D volume. Each builds on the previous.", "source": "MiniMax ①", "_id": "minimax_1_64", "judge_pick": true}, {"question": "Given a plane in Cartesian form ax + by + cz + d = 0, how can you quickly find a vector perpendicular to the plane? What about a vector lying in the plane? (2 steps)", "answer": "- Step 1: A vector perpendicular (normal) to the plane is simply $$\\mathbf{n} = a\\mathbf{i} + b\\mathbf{j} + c\\mathbf{k}$$ - the coefficients of x, y, z.\n\n- Step 2: Any vector lying in the plane must be perpendicular to the normal. For example, $$\\mathbf{v}_1 = (-b, a, 0)$$ works (check: a(-b) + b(a) + c(0) = 0). Another independent vector: $$\\mathbf{v}_2 = (-c, 0, a)$$.\n\n**Method:** Take cross product of two vectors in the plane to get the normal - reverse this to go from normal to in-plane vectors.", "source": "MiniMax ①", "_id": "minimax_1_65", "judge_pick": false}, {"question": "A line is parallel to a plane. What condition relates the line's direction vector and the plane's normal vector? (2 steps)", "answer": "- Step 1: If a line is parallel to a plane, its direction vector b is perpendicular to the plane's normal vector n.\n\n- Step 2: Therefore, $$\\mathbf{b} . \\mathbf{n} = 0$$\n\n**Special case:** If b.n = 0 AND a point on the line lies in the plane, then the line lies IN the plane (not just parallel to it).", "source": "MiniMax ①", "_id": "minimax_1_66", "judge_pick": false}, {"question": "How can you determine if two lines are parallel, intersecting, or skew? What calculations do you need? (3 steps)", "answer": "- Step 1: Check if direction vectors are proportional. If yes, lines are parallel (or same line).\n\n- Step 2: If parallel, check if a point from one line satisfies the other line's equation. If yes, they're the same line; if no, they're distinct parallel lines.\n\n- Step 3: If direction vectors are not proportional, solve for intersection. If a solution exists, they intersect; if not, they are skew (non-parallel, non-intersecting).\n\n**Summary table:**\n- Direction vectors proportional → Parallel or coincident\n- Direction vectors not proportional, solution exists → Intersecting\n- Direction vectors not proportional, no solution → Skew", "source": "MiniMax ①", "_id": "minimax_1_67", "judge_pick": false}, {"question": "Find the reflection of point P(1,2,1) in the plane 2x + y + 3z = 21. (4 steps)", "answer": "- Step 1: Find line through P perpendicular to plane. Direction = normal = (2,1,3). Line: $$\\mathbf{r} = \\mathbf{i} + 2\\mathbf{j} + \\mathbf{k} + t(2\\mathbf{i} + \\mathbf{j} + 3\\mathbf{k})$$\n\n- Step 2: Find intersection M with plane:\n(1+2t) + (2+t) + (1+3t) = 21 → 4 + 6t = 21 → t = 17/6\nM = (1 + 17/3, 2 + 17/6, 1 + 17/2) = (20/3, 29/6, 19/2)\n\n- Step 3: P to M vector = (20/3 - 1, 29/6 - 2, 19/2 - 1) = (17/3, 17/6, 17/2) = (17/6)(2, 1, 3)\n\n- Step 4: Reflection Q = M + (P to M) = M + (17/6)(2,1,3):\nQ = (20/3 + 17/3, 29/6 + 17/6, 19/2 + 17/2) = (37/3, 46/6, 36/2) = (37/3, 23/3, 18)\n\n**Check:** Q should be on the other side of plane, same distance as P.", "source": "MiniMax ①", "_id": "minimax_1_68", "judge_pick": false}, {"question": "Why does the formula for distance from point to plane involve absolute value? What does the sign tell you? (2 steps)", "answer": "- Step 1: The formula $$D = \\frac{|ax_0 + by_0 + cz_0 + d|}{\\sqrt{a^2 + b^2 + c^2}}$$ uses absolute value to give positive distance.\n\n- Step 2: The unsigned expression $$ax_0 + by_0 + cz_0 + d$$ tells you which side of the plane the point is on. Positive means one side, negative means the other, zero means on the plane.\n\n**Practical use:** Sometimes you need the signed distance (to determine which side). In that case, omit the absolute value.", "source": "MiniMax ①", "_id": "minimax_1_69", "judge_pick": false}], "count": 70}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Define the vector (cross) product of two vectors a and b, and explain what each component of the definition represents physically. (2 steps)", "answer": "- Step 1: The vector product is defined as $$\\mathbf{a} \\times \\mathbf{b} = |\\mathbf{a}||\\mathbf{b}| \\sin \\theta \\, \\hat{\\mathbf{n}}$$ where θ is the angle between a and b, and $$\\hat{\\mathbf{n}}$$ is a unit vector perpendicular to both a and b.\n- Step 2: The magnitude $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}| \\sin \\theta$$ represents the area of the parallelogram formed by a and b. The direction $$\\hat{\\mathbf{n}}$$ follows the right-hand rule: if you point your first finger in the direction of a and your second finger in the direction of b, your thumb points in the direction of $$\\mathbf{a} \\times \\mathbf{b}$$.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Why is the vector product said to be anti-commutative? That is, why does $$\\mathbf{b} \\times \\mathbf{a} = -\\mathbf{a} \\times \\mathbf{b}$$? (2 steps)", "answer": "- Step 1: When you reverse the order from a to b to b to a, the right-hand rule tells you the perpendicular direction $$\\hat{\\mathbf{n}}$$ points in the opposite direction.\n- Step 2: Mathematically, $$\\mathbf{b} \\times \\mathbf{a} = |\\mathbf{b}||\\mathbf{a}| \\sin \\theta (-\\hat{\\mathbf{n}}) = -|\\mathbf{a}||\\mathbf{b}| \\sin \\theta \\hat{\\mathbf{n}} = -\\mathbf{a} \\times \\mathbf{b}$$. This means swapping the order changes the sign but not the magnitude.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Evaluate the following unit vector products: (i) $$\\mathbf{i} \\times \\mathbf{i}$$, (ii) $$\\mathbf{i} \\times \\mathbf{j}$$, (iii) $$\\mathbf{j} \\times \\mathbf{k}$$, (iv) $$\\mathbf{k} \\times \\mathbf{i}$$. Explain your reasoning using the right-hand rule. (2 steps)", "answer": "- Step 1: (i) $$\\mathbf{i} \\times \\mathbf{i} = \\mathbf{0}$$ because the angle between a vector and itself is 0°, and $$\\sin 0° = 0$$. (ii) $$\\mathbf{i} \\times \\mathbf{j} = \\mathbf{k}$$ because i (first finger) rotated toward j (second finger) makes the thumb point in the k direction.\n- Step 2: (iii) $$\\mathbf{j} \\times \\mathbf{k} = \\mathbf{i}$$ (j toward k gives i direction). (iv) $$\\mathbf{k} \\times \\mathbf{i} = \\mathbf{j}$$ (k toward i gives j direction). Notice the cyclic pattern: i→j→k→i, and reversing the order gives a negative sign.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Given $$\\mathbf{a} = \\begin{pmatrix} a_1 \\\\ a_2 \\\\ a_3 \\end{pmatrix}$$ and $$\\mathbf{b} = \\begin{pmatrix} b_1 \\\\ b_2 \\\\ b_3 \\end{pmatrix}$$, derive the component form of $$\\mathbf{a} \\times \\mathbf{b}$$. (3 steps)", "answer": "- Step 1: Write each vector in unit vector form: $$\\mathbf{a} = a_1\\mathbf{i} + a_2\\mathbf{j} + a_3\\mathbf{k}$$ and $$\\mathbf{b} = b_1\\mathbf{i} + b_2\\mathbf{j} + b_3\\mathbf{k}$$.\n- Step 2: Expand using the distributive property and substitute known unit vector products: $$\\mathbf{i} \\times \\mathbf{i} = \\mathbf{j} \\times \\mathbf{j} = \\mathbf{k} \\times \\mathbf{k} = \\mathbf{0}$$, $$\\mathbf{i} \\times \\mathbf{j} = \\mathbf{k}$$, $$\\mathbf{j} \\times \\mathbf{k} = \\mathbf{i}$$, $$\\mathbf{k} \\times \\mathbf{i} = \\mathbf{j}$$, with signs reversing for reversed orders.\n- Step 3: Collect terms to get $$\\mathbf{a} \\times \\mathbf{b} = (a_2b_3 - a_3b_2)\\mathbf{i} + (a_3b_1 - a_1b_3)\\mathbf{j} + (a_1b_2 - a_2b_1)\\mathbf{k}$$. This can be remembered as the determinant: $$\\mathbf{a} \\times \\mathbf{b} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3 \\end{vmatrix}$$.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "What does it mean when $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$? Does this guarantee that a or b is the zero vector? (2 steps)", "answer": "- Step 1: From the magnitude formula $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}| \\sin \\theta = 0$$, this occurs when: (i) either vector is zero, (ii) $$\\sin \\theta = 0$$ meaning $$\\theta = 0°$$ or $$180°$$.\n- Step 2: Therefore, $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$ implies either $$\\mathbf{a} = \\mathbf{0}$$ or $$\\mathbf{b} = \\mathbf{0}$$, OR a and b are parallel (pointing in the same or opposite directions). The zero vector is not the only possibility.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "How do you find a unit vector perpendicular to two given non-parallel vectors a and b? (2 steps)", "answer": "- Step 1: Compute the cross product $$\\mathbf{a} \\times \\mathbf{b}$$ — this gives a vector perpendicular to both a and b (though possibly not a unit vector).\n- Step 2: Divide by its magnitude to get the unit vector: $$\\hat{\\mathbf{n}} = \\frac{\\mathbf{a} \\times \\mathbf{b}}{|\\mathbf{a} \\times \\mathbf{b}|}$$. This gives one of two possible unit normals (the opposite direction $$-\\hat{\\mathbf{n}}$$ is also valid).", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "If you know $$\\mathbf{a} \\times \\mathbf{b}$$, how can you verify that it is perpendicular to both a and b? (2 steps)", "answer": "- Step 1: Take the dot product of $$\\mathbf{a} \\times \\mathbf{b}$$ with each vector. If the result is zero, they are perpendicular (since $$\\mathbf{p} \\cdot \\mathbf{q} = 0$$ means perpendicular for non-zero vectors).\n- Step 2: Verify that $$(\\mathbf{a} \\times \\mathbf{b}) \\cdot \\mathbf{a} = 0$$ AND $$(\\mathbf{a} \\times \\mathbf{b}) \\cdot \\mathbf{b} = 0$$. Both must equal zero for $$\\mathbf{a} \\times \\mathbf{b}$$ to be perpendicular to both.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Given $$\\mathbf{a} = 2\\mathbf{i} + \\mathbf{j} + 2\\mathbf{k}$$ and $$\\mathbf{b} = -3\\mathbf{j} + 4\\mathbf{k}$$, find $$\\sin \\theta$$ where $$\\theta$$ is the acute angle between them. (4 steps)", "answer": "- Step 1: Use the formula $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}| \\sin \\theta$$, so $$\\sin \\theta = \\frac{|\\mathbf{a} \\times \\mathbf{b}|}{|\\mathbf{a}||\\mathbf{b}|}$$.\n- Step 2: Compute the cross product: $$\\mathbf{a} \\times \\mathbf{b} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ 2 & 1 & 2 \\\\ 0 & -3 & 4 \\end{vmatrix} = \\mathbf{i}(4+6) - \\mathbf{j}(8-0) + \\mathbf{k}(-6-0) = 10\\mathbf{i} - 8\\mathbf{j} - 6\\mathbf{k}$$.\n- Step 3: Find magnitudes: $$|\\mathbf{a} \\times \\mathbf{b}| = \\sqrt{100 + 64 + 36} = \\sqrt{200} = 10\\sqrt{2}$$, $$|\\mathbf{a}| = \\sqrt{4+1+4} = 3$$, $$|\\mathbf{b}| = \\sqrt{0+9+16} = 5$$.\n- Step 4: $$\\sin \\theta = \\frac{10\\sqrt{2}}{3 \\times 5} = \\frac{2\\sqrt{2}}{3}$$.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Explain why the vector product magnitude $$|\\mathbf{a} \\times \\mathbf{b}|$$ represents the area of the parallelogram formed by vectors a and b. (2 steps)", "answer": "- Step 1: The area of a parallelogram is base × height. If we take |a| as the base length, the height is $$|\\mathbf{b}| \\sin \\theta$$ where θ is the angle between them.\n- Step 2: So area = $$|\\mathbf{a}| \\cdot |\\mathbf{b}| \\sin \\theta = |\\mathbf{a} \\times \\mathbf{b}|$$. The cross product magnitude gives exactly this, by definition.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "If O is the origin with position vector 0, and points A and B have position vectors a and b, derive the formula for the area of triangle OAB. (2 steps)", "answer": "- Step 1: The area of triangle OAB is half the area of parallelogram OAB (since a triangle is half a parallelogram).\n- Step 2: Area = $$\\frac{1}{2} \\times |\\mathbf{a} \\times \\mathbf{b}| = \\frac{1}{2}|\\mathbf{a} \\times \\mathbf{b}|$$.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "How do you find the area of triangle ABC when you know the position vectors of A, B, and C? Write both formulas and explain. (2 steps)", "answer": "- Step 1: Method 1: Use two sides from one vertex: $$\\text{Area} = \\frac{1}{2}|(\\mathbf{b} - \\mathbf{a}) \\times (\\mathbf{c} - \\mathbf{a})|$$, where a, b, c are position vectors of A, B, C.\n- Step 2: Method 2 (alternative form): $$\\text{Area} = \\frac{1}{2}|(\\mathbf{a} \\times \\mathbf{b}) + (\\mathbf{b} \\times \\mathbf{c}) + (\\mathbf{c} \\times \\mathbf{a})|$$. This is useful when you have position vectors from origin.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Find the area of triangle ABC where A(1,0,2), B(2,-2,0), C(3,-1,1). (4 steps)", "answer": "- Step 1: Find vectors for two sides: $$\\overrightarrow{AB} = \\begin{pmatrix} 2-1 \\\\ -2-0 \\\\ 0-2 \\end{pmatrix} = \\begin{pmatrix} 1 \\\\ -2 \\\\ -2 \\end{pmatrix}$$, $$\\overrightarrow{AC} = \\begin{pmatrix} 3-1 \\\\ -1-0 \\\\ 1-2 \\end{pmatrix} = \\begin{pmatrix} 2 \\\\ -1 \\\\ -1 \\end{pmatrix}$$.\n- Step 2: Compute cross product: $$\\overrightarrow{AB} \\times \\overrightarrow{AC} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ 1 & -2 & -2 \\\\ 2 & -1 & -1 \\end{vmatrix} = \\mathbf{i}(2-2) - \\mathbf{j}(1+4) + \\mathbf{k}(-1+4) = 0\\mathbf{i} - 5\\mathbf{j} + 3\\mathbf{k}$$.\n- Step 3: Find magnitude: $$|0\\mathbf{i} - 5\\mathbf{j} + 3\\mathbf{k}| = \\sqrt{0 + 25 + 9} = \\sqrt{34}$$.\n- Step 4: Area = $$\\frac{1}{2} \\sqrt{34}$$.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "What is the scalar triple product $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$ and what does it represent geometrically? (2 steps)", "answer": "- Step 1: The scalar triple product is $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\begin{vmatrix} a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3 \\\\ c_1 & c_2 & c_3 \\end{vmatrix}$$. It can be computed as a 3×3 determinant.\n- Step 2: Geometrically, $$|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$ represents the volume of the parallelepiped formed by the three vectors a, b, c as edges meeting at one vertex.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "State two important properties of the scalar triple product: (1) its cyclic property, and (2) what happens when vectors are repeated. Explain why these properties hold. (2 steps)", "answer": "- Step 1: (1) Cyclic property: $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\mathbf{b} \\cdot (\\mathbf{c} \\times \\mathbf{a}) = \\mathbf{c} \\cdot (\\mathbf{a} \\times \\mathbf{b})$$. The order cycles but the result is unchanged.\n- Step 2: (2) If any vector is repeated (e.g., $$\\mathbf{a} \\cdot (\\mathbf{a} \\times \\mathbf{b}) = 0$$), the result is zero because $$\\mathbf{a} \\times \\mathbf{b}$$ is perpendicular to both a and b, so their dot product is zero.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Find the volume of the parallelepiped with edges given by vectors $$\\mathbf{a} = \\mathbf{i} + \\mathbf{j} + \\mathbf{k}$$, $$\\mathbf{b} = \\mathbf{i} - \\mathbf{j}$$, $$\\mathbf{c} = 2\\mathbf{i} + \\mathbf{j} - \\mathbf{k}$$. (3 steps)", "answer": "- Step 1: Compute the scalar triple product: $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\begin{vmatrix} 1 & 1 & 1 \\\\ 1 & -1 & 0 \\\\ 2 & 1 & -1 \\end{vmatrix}$$.\n- Step 2: Evaluate determinant: $$1((-1)(-1) - 0(1)) - 1(1(-1) - 0(2)) + 1(1(1) - (-1)(2)) = 1(1) - 1(-1) + 1(3) = 1 + 1 + 3 = 5$$.\n- Step 3: Volume = $$|5| = 5$$ cubic units.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "If the vertices of a tetrahedron are O, A, B, C with position vectors a, b, c from O, derive the formula for its volume. (2 steps)", "answer": "- Step 1: A tetrahedron is one-sixth of a parallelepiped (imagine dividing a parallelepiped into 6 equal tetrahedra).\n- Step 2: Since the parallelepiped volume is $$|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$, the tetrahedron volume is $$\\frac{1}{6}|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Find the volume of tetrahedron with vertices at (1,1,-1), (2,4,-1), (3,0,-2), (0,4,5). (4 steps)", "answer": "- Step 1: Label vertices A(1,1,-1), B(2,4,-1), C(3,0,-2), D(0,4,5). Use A as reference: $$\\overrightarrow{AB} = \\mathbf{i} + 3\\mathbf{j}$$, $$\\overrightarrow{AC} = 2\\mathbf{i} - \\mathbf{j} - \\mathbf{k}$$, $$\\overrightarrow{AD} = -\\mathbf{i} + 3\\mathbf{j} + 6\\mathbf{k}$$.\n- Step 2: Compute scalar triple product: $$\\overrightarrow{AB} \\cdot (\\overrightarrow{AC} \\times \\overrightarrow{AD}) = \\begin{vmatrix} 1 & 3 & 0 \\\\ 2 & -1 & -1 \\\\ -1 & 3 & 6 \\end{vmatrix}$$.\n- Step 3: Evaluate: $$1((-1)(6) - (-1)(3)) - 3(2(6) - (-1)(-1)) + 0(2(3) - (-1)(-1)) = 1(-6+3) - 3(12-1) = -3 - 33 = -36$$.\n- Step 4: Volume = $$\\frac{1}{6}|-36| = 6$$ cubic units.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Write the vector equation of a line in the form $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$. Explain why this equation works and what it represents. (2 steps)", "answer": "- Step 1: The line passes through point with position vector a and is parallel to vector b. For any point on the line with position vector r, the vector $$\\mathbf{r} - \\mathbf{a}$$ is parallel to b.\n- Step 2: Two parallel vectors have a cross product of zero (since sin(0°) = 0). Therefore $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$ describes the entire line.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Convert the line equation $$(\\mathbf{r} - \\begin{pmatrix} 1 \\\\ 2 \\\\ -1 \\end{pmatrix}) \\times \\begin{pmatrix} 4 \\\\ -3 \\\\ 2 \\end{pmatrix} = \\mathbf{0}$$ into Cartesian form $$\\frac{x-1}{l} = \\frac{y-2}{m} = \\frac{z+1}{n}$$. (3 steps)", "answer": "- Step 1: Since the cross product is zero, $$\\mathbf{r} - \\begin{pmatrix} 1 \\\\ 2 \\\\ -1 \\end{pmatrix}$$ must be a multiple of $$\\begin{pmatrix} 4 \\\\ -3 \\\\ 2 \\end{pmatrix}$$. Let $$\\mathbf{r} = \\begin{pmatrix} x \\\\ y \\\\ z \\end{pmatrix}$$, so $$\\begin{pmatrix} x-1 \\\\ y-2 \\\\ z+1 \\end{pmatrix} = \\lambda \\begin{pmatrix} 4 \\\\ -3 \\\\ 2 \\end{pmatrix}$$.\n- Step 2: Equate components: $$x-1 = 4\\lambda$$, $$y-2 = -3\\lambda$$, $$z+1 = 2\\lambda$$.\n- Step 3: Solve for λ in each: $$\\lambda = \\frac{x-1}{4} = \\frac{y-2}{-3} = \\frac{z+1}{2}$$. So the direction ratios are l=4, m=-3, n=2.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "What are the three equivalent forms for the equation of a plane? Write each form and identify what information each provides. (3 steps)", "answer": "- Step 1: (1) Scalar product form: $$\\mathbf{r} \\cdot \\mathbf{n} = p$$, where n is the normal vector and p = a·n (a is position vector of any point on plane).\n- Step 2: (2) Vector form: $$\\mathbf{r} = \\mathbf{a} + s\\mathbf{b} + t\\mathbf{c}$$, where a is position vector of a point, b and c are non-parallel direction vectors in the plane.\n- Step 3: (3) Cartesian form: $$ax + by + cz + d = 0$$, where (a,b,c) is the normal vector. This is obtained by substituting $$\\mathbf{r} = x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$$ into the scalar form.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": true}, {"question": "A plane has normal vector $$\\mathbf{n} = 3\\mathbf{i} + \\mathbf{j} - \\mathbf{k}$$ and passes through point A with position vector $$2\\mathbf{i} + 3\\mathbf{j} - 5\\mathbf{k}$$. Find its equation in both scalar product form and Cartesian form. (3 steps)", "answer": "- Step 1: Scalar product form: $$(\\mathbf{r} - (2\\mathbf{i} + 3\\mathbf{j} - 5\\mathbf{k})) \\cdot (3\\mathbf{i} + \\mathbf{j} - \\mathbf{k}) = 0$$. So $$\\mathbf{r} \\cdot (3\\mathbf{i} + \\mathbf{j} - \\mathbf{k}) = (2\\mathbf{i} + 3\\mathbf{j} - 5\\mathbf{k}) \\cdot (3\\mathbf{i} + \\mathbf{j} - \\mathbf{k}) = 6 + 3 + 5 = 14$$. Thus $$\\mathbf{r} \\cdot (3\\mathbf{i} + \\mathbf{j} - \\mathbf{k}) = 14$$.\n- Step 2: Substitute $$\\mathbf{r} = x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$$: $$(x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}) \\cdot (3\\mathbf{i} + \\mathbf{j} - \\mathbf{k}) = 14$$.\n- Step 3: This gives $$3x + y - z = 14$$, or in standard form $$3x + y - z - 14 = 0$$.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "How do you find the equation of a plane that passes through three non-collinear points A, B, C? (3 steps)", "answer": "- Step 1: Find two direction vectors in the plane: $$\\overrightarrow{AB} = \\mathbf{b} - \\mathbf{a}$$ and $$\\overrightarrow{AC} = \\mathbf{c} - \\mathbf{a}$$.\n- Step 2: Find the normal vector as their cross product: $$\\mathbf{n} = \\overrightarrow{AB} \\times \\overrightarrow{AC}$$.\n- Step 3: Use point-normal form: $$(\\mathbf{r} - \\mathbf{a}) \\cdot \\mathbf{n} = 0$$, or equivalently $$\\mathbf{r} \\cdot \\mathbf{n} = \\mathbf{a} \\cdot \\mathbf{n}$$.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Find the Cartesian equation of the plane through points A(1,0,-1), B(2,1,0), C(2,16,6). (4 steps)", "answer": "- Step 1: Find direction vectors: $$\\overrightarrow{AB} = \\mathbf{i} + \\mathbf{j} + \\mathbf{k}$$, $$\\overrightarrow{AC} = \\mathbf{i} + 16\\mathbf{j} + 7\\mathbf{k}$$.\n- Step 2: Find normal: $$\\overrightarrow{AB} \\times \\overrightarrow{AC} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ 1 & 1 & 1 \\\\ 1 & 16 & 7 \\end{vmatrix} = \\mathbf{i}(7-16) - \\mathbf{j}(7-1) + \\mathbf{k}(16-1) = -9\\mathbf{i} - 6\\mathbf{j} + 15\\mathbf{k}$$.\n- Step 3: Simplify by dividing by 3 (or keep as is): Use $$\\mathbf{n} = -3\\mathbf{i} - 2\\mathbf{j} + 5\\mathbf{k}$$ (dividing by 3).\n- Step 4: Using point A: $$(x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}) \\cdot (-3\\mathbf{i} - 2\\mathbf{j} + 5\\mathbf{k}) = (1\\mathbf{i} + 0\\mathbf{j} - 1\\mathbf{k}) \\cdot (-3\\mathbf{i} - 2\\mathbf{j} + 5\\mathbf{k}) = -3 + 0 - 5 = -8$$.\n- Final: $$-3x - 2y + 5z = -8$$, or $$3x + 2y - 5z = 8$$.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Two lines are given by $$\\mathbf{r} = \\mathbf{a} + \\lambda \\mathbf{b}$$ and $$\\mathbf{r} = \\mathbf{c} + \\mu \\mathbf{d}$$. Under what conditions do they intersect, and how do you find their intersection point? (3 steps)", "answer": "- Step 1: Lines intersect when there exist values of λ and μ such that $$\\mathbf{a} + \\lambda \\mathbf{b} = \\mathbf{c} + \\mu \\mathbf{d}$$. This gives three component equations.\n- Step 2: Solve two of the equations simultaneously for λ and μ, then verify the third equation is satisfied (if not, lines are skew).\n- Step 3: Substitute the found λ (or μ) back into either line equation to get the intersection point coordinates.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Find the point of intersection of line $$\\mathbf{r} = 3\\mathbf{i} + \\mathbf{j} + \\mathbf{k} + \\lambda(\\mathbf{i} - 2\\mathbf{j} - \\mathbf{k})$$ and plane $$\\mathbf{r} \\cdot (\\mathbf{i} + 2\\mathbf{j} + 3\\mathbf{k}) = 4$$. (3 steps)", "answer": "- Step 1: Write the line in parametric form: $$x = 3 + \\lambda$$, $$y = 1 - 2\\lambda$$, $$z = 1 - \\lambda$$.\n- Step 2: Substitute into plane equation: $$(3 + \\lambda) + 2(1 - 2\\lambda) + 3(1 - \\lambda) = 4$$. Simplify: $$3 + \\lambda + 2 - 4\\lambda + 3 - 3\\lambda = 4$$, so $$8 - 6\\lambda = 4$$, thus $$\\lambda = \\frac{2}{3}$$.\n- Step 3: Substitute λ back: $$x = 3 + \\frac{2}{3} = \\frac{11}{3}$$, $$y = 1 - \\frac{4}{3} = -\\frac{1}{3}$$, $$z = 1 - \\frac{2}{3} = \\frac{1}{3}$$. Intersection point: $$(\\frac{11}{3}, -\\frac{1}{3}, \\frac{1}{3})$$.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "How do you find the acute angle between a line (direction vector b) and a plane (normal vector n)? (2 steps)", "answer": "- Step 1: First find the angle θ between the line direction b and the plane normal n using $$\\cos \\theta = \\frac{|\\mathbf{b} \\cdot \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$.\n- Step 2: The required angle α between line and plane is complementary: $$\\alpha = 90° - \\theta$$. Alternatively, use directly $$\\sin \\alpha = \\frac{|\\mathbf{b} \\cdot \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Find the acute angle between the line $$\\mathbf{r} = 2\\mathbf{i} + \\mathbf{j} - 5\\mathbf{k} + \\lambda(3\\mathbf{i} + 4\\mathbf{j} - 12\\mathbf{k})$$ and the plane $$\\mathbf{r} \\cdot (2\\mathbf{i} - 2\\mathbf{j} - \\mathbf{k}) = 2$$. (3 steps)", "answer": "- Step 1: Line direction: $$\\mathbf{b} = 3\\mathbf{i} + 4\\mathbf{j} - 12\\mathbf{k}$$. Plane normal: $$\\mathbf{n} = 2\\mathbf{i} - 2\\mathbf{j} - \\mathbf{k}$$.\n- Step 2: Compute $$\\sin \\alpha = \\frac{|\\mathbf{b} \\cdot \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|} = \\frac{|3(2) + 4(-2) + (-12)(-1)|}{\\sqrt{9+16+144} \\cdot \\sqrt{4+4+1}} = \\frac{|6 - 8 + 12|}{\\sqrt{169} \\cdot \\sqrt{9}} = \\frac{10}{13 \\times 3} = \\frac{10}{39}$$.\n- Step 3: $$\\alpha = \\arcsin(\\frac{10}{39}) \\approx 14.9°$$.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "How do you find the acute angle between two planes with normals $$\\mathbf{n}_1$$ and $$\\mathbf{n}_2$$? (2 steps)", "answer": "- Step 1: The angle between two planes equals the angle between their normal vectors (or its supplement).\n- Step 2: Use $$\\cos \\theta = \\frac{|\\mathbf{n}_1 \\cdot \\mathbf{n}_2|}{|\\mathbf{n}_1||\\mathbf{n}_2|}$$. This gives the acute angle directly (absolute value ensures we get acute).", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "The plane equation is written as $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = d$$ where $$\\hat{\\mathbf{n}}$$ is a unit normal. What does d represent geometrically? (1 step)", "answer": "- Step 1: The value d is the perpendicular distance from the origin to the plane. This is because for any point R on the plane with position vector r, the projection of r onto the normal direction gives exactly d (the component of r in the $$\\hat{\\mathbf{n}}$$ direction).", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "Find the perpendicular distance from the point (1,3,-2) to the plane $$\\mathbf{r} \\cdot (\\mathbf{i} + 2\\mathbf{j} + 2\\mathbf{k}) = 5$$. (3 steps)", "answer": "- Step 1: Write the plane in the form $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = d$$ where $$\\hat{\\mathbf{n}}$$ is a unit vector. The magnitude of $$\\mathbf{i} + 2\\mathbf{j} + 2\\mathbf{k}$$ is $$\\sqrt{1+4+4} = 3$$, so $$\\hat{\\mathbf{n}} = \\frac{1}{3}(\\mathbf{i} + 2\\mathbf{j} + 2\\mathbf{k})$$ and $$d = \\frac{5}{3}$$.\n- Step 2: For point P(1,3,-2), compute $$\\mathbf{p} \\cdot \\hat{\\mathbf{n}} = (1,3,-2) \\cdot \\frac{1}{3}(1,2,2) = \\frac{1}{3}(1 + 6 - 4) = \\frac{3}{3} = 1$$.\n- Step 3: Distance = $$|d - \\mathbf{p} \\cdot \\hat{\\mathbf{n}}| = |\\frac{5}{3} - 1| = \\frac{2}{3}$$.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "What is the shortest distance between two skew lines $$\\mathbf{r} = \\mathbf{a} + \\lambda \\mathbf{b}$$ and $$\\mathbf{r} = \\mathbf{c} + \\mu \\mathbf{d}$$? Write the formula and explain. (2 steps)", "answer": "- Step 1: The shortest distance is along the common perpendicular, which is in the direction of $$\\mathbf{b} \\times \\mathbf{d}$$. The formula is: $$\\text{distance} = \\frac{|(\\mathbf{a} - \\mathbf{c}) \\cdot (\\mathbf{b} \\times \\mathbf{d})|}{|\\mathbf{b} \\times \\mathbf{d}|}$$.\n- Step 2: The numerator is the absolute value of the scalar triple product, which gives the volume of the parallelepiped formed by the three vectors. Dividing by the base area ($$|\\mathbf{b} \\times \\mathbf{d}|$$) gives the height, which is the shortest distance.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Find the shortest distance between the skew lines $$\\mathbf{r} = \\mathbf{i} + \\lambda(\\mathbf{j} + \\mathbf{k})$$ and $$\\mathbf{r} = -\\mathbf{i} + 3\\mathbf{j} - \\mathbf{k} + \\mu(2\\mathbf{i} - \\mathbf{j} - \\mathbf{k})$$. (4 steps)", "answer": "- Step 1: Identify: $$\\mathbf{a} = \\mathbf{i}$$, $$\\mathbf{b} = \\mathbf{j} + \\mathbf{k}$$, $$\\mathbf{c} = -\\mathbf{i} + 3\\mathbf{j} - \\mathbf{k}$$, $$\\mathbf{d} = 2\\mathbf{i} - \\mathbf{j} - \\mathbf{k}$$. Compute $$\\mathbf{a} - \\mathbf{c} = \\mathbf{i} - (-\\mathbf{i} + 3\\mathbf{j} - \\mathbf{k}) = 2\\mathbf{i} - 3\\mathbf{j} + \\mathbf{k}$$.\n- Step 2: Compute $$\\mathbf{b} \\times \\mathbf{d} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ 0 & 1 & 1 \\\\ 2 & -1 & -1 \\end{vmatrix} = \\mathbf{i}(-1+1) - \\mathbf{j}(0-2) + \\mathbf{k}(0-2) = 0\\mathbf{i} + 2\\mathbf{j} - 2\\mathbf{k} = 2\\mathbf{j} - 2\\mathbf{k}$$.\n- Step 3: Compute magnitude: $$|\\mathbf{b} \\times \\mathbf{d}| = \\sqrt{0 + 4 + 4} = \\sqrt{8} = 2\\sqrt{2}$$.\n- Step 4: Compute scalar triple product: $$(2\\mathbf{i} - 3\\mathbf{j} + \\mathbf{k}) \\cdot (2\\mathbf{j} - 2\\mathbf{k}) = 0(-3) + 2(-3) + 1(-2) = -6 - 2 = -8$$. Distance = $$\\frac{|-8|}{2\\sqrt{2}} = \\frac{8}{2\\sqrt{2}} = 2\\sqrt{2}$$.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "How do you find the shortest distance from a point to a line in 3D? Describe the method. (2 steps)", "answer": "- Step 1: Let the point be P and the line pass through A with direction b. Form the vector $$\\overrightarrow{AP}$$ from A to P.\n- Step 2: The shortest distance is the length of the perpendicular from P to the line, which equals $$\\frac{|\\overrightarrow{AP} \\times \\mathbf{b}|}{|\\mathbf{b}|}$$. This is because the cross product magnitude gives the area of the parallelogram, divided by base length gives height.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "What condition determines whether two lines are parallel, intersect, or are skew? (1 step)", "answer": "- Step 1: Two lines are parallel if their direction vectors are parallel (one is a scalar multiple of the other). They intersect if they are not parallel AND there exist parameter values making them equal. They are skew if they are not parallel AND do not intersect (i.e., no common point exists).", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A plane is given by $$\\mathbf{r} \\cdot \\mathbf{n} = p$$. How can you quickly determine if a line $$\\mathbf{r} = \\mathbf{a} + \\lambda \\mathbf{b}$$ is (i) parallel to the plane, (ii) perpendicular to the plane? (2 steps)", "answer": "- Step 1: (i) Line is parallel to plane if $$\\mathbf{b} \\cdot \\mathbf{n} = 0$$ (direction vector is perpendicular to plane normal).\n- Step 2: (ii) Line is perpendicular to plane if $$\\mathbf{b}$$ is parallel to $$\\mathbf{n}$$ (i.e., $$\\mathbf{b} \\times \\mathbf{n} = \\mathbf{0}$$ or $$\\mathbf{b} = k\\mathbf{n}$$ for some scalar k).", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "When a line lies entirely within a plane, what two conditions must be satisfied? (1 step)", "answer": "- Step 1: Two conditions: (1) A point on the line must satisfy the plane equation (substitute the point into the plane), AND (2) the direction vector of the line must be perpendicular to the plane's normal (i.e., $$\\mathbf{b} \\cdot \\mathbf{n} = 0$$).", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "What is special about a regular tetrahedron that allows you to easily find its volume given only the length of its edges? (2 steps)", "answer": "- Step 1: In a regular tetrahedron, all six edges are equal (say length a). You can use the formula $$V = \\frac{a^3}{6\\sqrt{2}}$$ for the volume.\n- Step 2: This comes from the general formula: if you place four vertices appropriately in 3D space (e.g., three at base forming equilateral triangle and one directly above the centroid), the height becomes $$\\sqrt{\\frac{2}{3}}a$$ and base area is $$\\frac{\\sqrt{3}}{4}a^2$$, giving $$V = \\frac{1}{3} \\times \\frac{\\sqrt{3}}{4}a^2 \\times \\sqrt{\\frac{2}{3}}a = \\frac{a^3}{6\\sqrt{2}}$$.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Explain why the formula for the volume of a tetrahedron uses 1/6 instead of 1/3 like a pyramid. (2 steps)", "answer": "- Step 1: A tetrahedron IS a pyramid with a triangular base. The volume formula for any pyramid is $$V = \\frac{1}{3} \\times (\\text{base area}) \\times (\\text{height})$$.\n- Step 2: For a tetrahedron with edges a, b, c meeting at one vertex, the \"base\" can be the parallelogram formed by b and c, which has area $$|\\mathbf{b} \\times \\mathbf{c}|$$. But a tetrahedron is exactly half of this parallelepiped (the parallelepiped can be divided into 6 tetrahedra of equal volume). Hence $$\\frac{1}{3} \\times \\frac{1}{2} = \\frac{1}{6}$$.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": true}, {"question": "The plane $$\\Pi_1$$ has equation $$\\mathbf{r} \\cdot \\mathbf{n}_1 = p_1$$ and plane $$\\Pi_2$$ has equation $$\\mathbf{r} \\cdot \\mathbf{n}_2 = p_2$$. What condition determines whether these planes are perpendicular? (1 step)", "answer": "- Step 1: Two planes are perpendicular if their normal vectors are perpendicular. The condition is $$\\mathbf{n}_1 \\cdot \\mathbf{n}_2 = 0$$.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "How do you find the line of intersection of two planes? Describe the method. (3 steps)", "answer": "- Step 1: Write both plane equations in Cartesian form (e.g., $$a_1x + b_1y + c_1z = d_1$$ and $$a_2x + b_2y + c_2z = d_2$$).\n- Step 2: Solve the simultaneous equations to express two variables in terms of the third (parameter). This gives the parametric equations of the line.\n- Step 3: Convert to vector form $$\\mathbf{r} = \\mathbf{a} + \\lambda \\mathbf{b}$$ or Cartesian form $$\\frac{x-x_1}{l} = \\frac{y-y_1}{m} = \\frac{z-z_1}{n}$$.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "MISCONCEPTION PROBE: A student says \"Since $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$, the vectors a and b must be perpendicular.\" Explain why this is wrong and give a counterexample. (2 steps)", "answer": "- Step 1: This is completely wrong! The cross product is ZERO when vectors are PARALLEL (or one is zero), not perpendicular.\n- Step 2: Counterexample: Take $$\\mathbf{a} = \\mathbf{i}$$ and $$\\mathbf{b} = 2\\mathbf{i}$$. These are parallel (both point in the x-direction), and $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{i} \\times 2\\mathbf{i} = \\mathbf{0}$$. Another counterexample: any vector crossed with itself gives zero.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": true}, {"question": "MISCONCEPTION PROBE: A student computes $$\\mathbf{i} \\times \\mathbf{j} = \\mathbf{k}$$ and $$\\mathbf{j} \\times \\mathbf{i} = \\mathbf{k}$$, claiming the cross product is commutative. What's wrong with this reasoning? (1 step)", "answer": "- Step 1: The student made an error! Actually, $$\\mathbf{j} \\times \\mathbf{i} = -\\mathbf{k}$$, not $$\\mathbf{k}$$. Using the right-hand rule, rotating from j to i (second finger to first finger) points the thumb in the -k direction. The cross product is definitively NOT commutative: $$\\mathbf{b} \\times \\mathbf{a} = -\\mathbf{a} \\times \\mathbf{b}$$.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "MISCONCEPTION PROBE: When finding the angle between two vectors using $$\\sin \\theta = \\frac{|\\mathbf{a} \\times \\mathbf{b}|}{|\\mathbf{a}||\\mathbf{b}|}$$, why might there be ambiguity about whether θ is acute or obtuse? (1 step)", "answer": "- Step 1: The sine function is positive for both acute angles (0° < θ < 90°) and obtuse angles (90° < θ < 180°). Since $$\\sin \\theta = \\sin(180° - \\theta)$$, the formula alone cannot distinguish between θ and 180° - θ. You need additional context (or use the dot product which gives cosine, unambiguously identifying acute vs obtuse).", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": true}, {"question": "EDGE CASE: What happens to the vector product formula when one or both vectors is the zero vector? What about when they are parallel? (2 steps)", "answer": "- Step 1: If either vector is zero, $$|\\mathbf{a}||\\mathbf{b}| \\sin \\theta = 0$$, so $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$. This is consistent because the zero vector has no defined direction.\n- Step 2: If vectors are parallel (θ = 0° or 180°), $$\\sin \\theta = 0$$, so $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$. This is the ONLY case (besides zero vectors) where non-zero vectors produce a zero cross product.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "EDGE CASE: What does it mean when the scalar triple product $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = 0$$? (1 step)", "answer": "- Step 1: The scalar triple product equals zero when the three vectors are coplanar (lie in the same plane). This includes cases where any two vectors are parallel, or all three are parallel, or they form a degenerate volume (flat parallelepiped with zero height).", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "The direction ratios of a line are given as 2:-3:4. Write two different direction vectors for this line and explain why both are valid. (1 step)", "answer": "- Step 1: Direction vectors could be $$\\mathbf{d} = 2\\mathbf{i} - 3\\mathbf{j} + 4\\mathbf{k}$$ or any scalar multiple like $$\\mathbf{d} = 4\\mathbf{i} - 6\\mathbf{j} + 8\\mathbf{k}$$. Any non-zero scalar multiple gives the same direction (and therefore the same line), because direction ratios describe direction up to scale.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "SIMPLE EXERCISE: Find $$\\mathbf{i} \\times \\mathbf{k}$$. (1 step)", "answer": "- Step 1: Using the cyclic pattern i→j→k→i, or the right-hand rule (first finger on i, second on k, thumb points opposite to j), we get $$\\mathbf{i} \\times \\mathbf{k} = -\\mathbf{j}$$.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "SIMPLE EXERCISE: What is the area of the parallelogram formed by vectors $$\\mathbf{a} = \\mathbf{i} + \\mathbf{j}$$ and $$\\mathbf{b} = \\mathbf{j} + \\mathbf{k}$$? (2 steps)", "answer": "- Step 1: Compute cross product: $$\\mathbf{a} \\times \\mathbf{b} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ 1 & 1 & 0 \\\\ 0 & 1 & 1 \\end{vmatrix} = \\mathbf{i}(1) - \\mathbf{j}(1) + \\mathbf{k}(1) = \\mathbf{i} - \\mathbf{j} + \\mathbf{k}$$.\n- Step 2: Area = magnitude = $$|\\mathbf{i} - \\mathbf{j} + \\mathbf{k}| = \\sqrt{1 + 1 + 1} = \\sqrt{3}$$.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "SIMPLE EXERCISE: Without computing, determine if points A(1,2,3), B(2,4,5), C(3,6,7) are collinear. (1 step)", "answer": "- Step 1: Check if vectors $$\\overrightarrow{AB}$$ and $$\\overrightarrow{AC}$$ are parallel. $$\\overrightarrow{AB} = (1,2,2)$$ and $$\\overrightarrow{AC} = (2,4,4)$$. Since $$\\overrightarrow{AC} = 2 \\times \\overrightarrow{AB}$$, they are parallel, so the three points are collinear.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "SIMPLE EXERCISE: Find the distance from origin to plane $$x + 2y + 2z = 6$$. (2 steps)", "answer": "- Step 1: Write in form $$\\mathbf{r} \\cdot \\mathbf{n} = p$$ with $$\\mathbf{n} = (1,2,2)$$ and p = 6. The unit normal is $$\\hat{\\mathbf{n}} = \\frac{1}{3}(1,2,2)$$.\n- Step 2: Distance = $$\\frac{p}{|\\mathbf{n}|} = \\frac{6}{\\sqrt{1+4+4}} = \\frac{6}{3} = 2$$.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "Find the angle between the planes $$x + y + z = 1$$ and $$x - y + z = 1$$. (3 steps)", "answer": "- Step 1: Normal vectors: $$\\mathbf{n}_1 = (1,1,1)$$, $$\\mathbf{n}_2 = (1,-1,1)$$.\n- Step 2: Compute $$\\mathbf{n}_1 \\cdot \\mathbf{n}_2 = 1(1) + 1(-1) + 1(1) = 1$$. Magnitudes: $$|\\mathbf{n}_1| = \\sqrt{3}$$, $$|\\mathbf{n}_2| = \\sqrt{3}$$.\n- Step 3: $$\\cos \\theta = \\frac{|1|}{\\sqrt{3} \\cdot \\sqrt{3}} = \\frac{1}{3}$$, so $$\\theta = \\arccos(\\frac{1}{3}) \\approx 70.5°$$.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "A line passes through (1,2,-1) and is parallel to the vector $$\\mathbf{i} + \\mathbf{j} + \\mathbf{k}$$. Write its equation in the form $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$. (1 step)", "answer": "- Step 1: Using $$\\mathbf{a} = \\mathbf{i} + 2\\mathbf{j} - \\mathbf{k}$$ and $$\\mathbf{b} = \\mathbf{i} + \\mathbf{j} + \\mathbf{k}$$, the equation is $$(\\mathbf{r} - (\\mathbf{i} + 2\\mathbf{j} - \\mathbf{k})) \\times (\\mathbf{i} + \\mathbf{j} + \\mathbf{k}) = \\mathbf{0}$$.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "What does the equation $$\\mathbf{r} \\times \\mathbf{b} = \\mathbf{c}$$ represent, and how does it relate to the line equation? (2 steps)", "answer": "- Step 1: This is an alternative form of the line equation passing through a point with position vector a, where $$\\mathbf{c} = \\mathbf{a} \\times \\mathbf{b}$$.\n- Step 2: It can be shown that $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{r} \\times \\mathbf{b} - \\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$, so $$\\mathbf{r} \\times \\mathbf{b} = \\mathbf{a} \\times \\mathbf{b}$$.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "Given that $$\\mathbf{a} + \\mathbf{b} + \\mathbf{c} = \\mathbf{0}$$, show that $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{b} \\times \\mathbf{c} = \\mathbf{c} \\times \\mathbf{a}$$. (3 steps)", "answer": "- Step 1: From $$\\mathbf{a} + \\mathbf{b} + \\mathbf{c} = \\mathbf{0}$$, we have $$\\mathbf{a} = -(\\mathbf{b} + \\mathbf{c})$$.\n- Step 2: Then $$\\mathbf{a} \\times \\mathbf{b} = -(\\mathbf{b} + \\mathbf{c}) \\times \\mathbf{b} = -(\\mathbf{b} \\times \\mathbf{b} + \\mathbf{c} \\times \\mathbf{b}) = -(0 - \\mathbf{b} \\times \\mathbf{c}) = \\mathbf{b} \\times \\mathbf{c}$$.\n- Step 3: Similarly, $$\\mathbf{b} \\times \\mathbf{c} = \\mathbf{c} \\times \\mathbf{a}$$ by cyclic permutation. All three cross products are equal.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "Challenge: Given non-zero vector a, and non-parallel vectors b and c, with $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{c} \\times \\mathbf{a}$$, prove that a is parallel to b + c. (4 steps)", "answer": "- Step 1: $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{c} \\times \\mathbf{a} = -\\mathbf{a} \\times \\mathbf{c}$$. So $$\\mathbf{a} \\times \\mathbf{b} + \\mathbf{a} \\times \\mathbf{c} = \\mathbf{0}$$.\n- Step 2: Using distributivity: $$\\mathbf{a} \\times (\\mathbf{b} + \\mathbf{c}) = \\mathbf{0}$$.\n- Step 3: For a cross product to be zero with non-zero a, either a = 0 (given non-zero) or $$(\\mathbf{b} + \\mathbf{c})$$ is parallel to a.\n- Step 4: Therefore, a is parallel to $$\\mathbf{b} + \\mathbf{c}$$.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": true}, {"question": "Two parallel planes have equations $$\\mathbf{r} \\cdot \\mathbf{n} = p_1$$ and $$\\mathbf{r} \\cdot \\mathbf{n} = p_2$$. What is the distance between them? (1 step)", "answer": "- Step 1: Distance = $$\\frac{|p_1 - p_2|}{|\\mathbf{n}|}$$. This comes from the difference in their perpendicular distances from the origin, divided by the magnitude of the normal to get the actual separation.", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "How can you determine whether a point lies on a line or plane by substituting into the equation? (1 step)", "answer": "- Step 1: For a line $$\\mathbf{r} = \\mathbf{a} + \\lambda \\mathbf{b}$$, the point lies on it if there exists a real λ making the equation true (solving for λ in each component). For a plane $$\\mathbf{r} \\cdot \\mathbf{n} = p$$, substitute the coordinates; if the equation is satisfied, the point lies on the plane.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "What is the relationship between the coefficients (a,b,c) in the Cartesian plane equation $$ax + by + cz + d = 0$$ and the normal vector? (1 step)", "answer": "- Step 1: The normal vector to the plane is $$\\mathbf{n} = a\\mathbf{i} + b\\mathbf{j} + c\\mathbf{k}$$. The coefficients directly give the direction perpendicular to the plane.", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "When solving problems with vectors, why is it often easier to use position vectors from a common origin rather than arbitrary displacement vectors? (1 step)", "answer": "- Step 1: Using a common origin allows you to easily compute displacement vectors between points by subtraction (e.g., $$\\overrightarrow{AB} = \\mathbf{b} - \\mathbf{a}$$), and enables the use of scalar triple product formulas for volume that rely on vectors emanating from a single point.", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": false}, {"question": "In the formula for shortest distance between skew lines, what does it mean if $$(\\mathbf{a} - \\mathbf{c}) \\cdot (\\mathbf{b} \\times \\mathbf{d}) = 0$$? (1 step)", "answer": "- Step 1: This means the scalar triple product is zero, which indicates that the volume of the parallelepiped formed by the three vectors is zero. In other words, the three vectors are coplanar. This occurs when the lines intersect OR when the vector connecting points on the lines lies in the same plane as the two direction vectors (which happens when lines intersect).", "source": "MiniMax ②", "_id": "minimax_2_59", "judge_pick": true}, {"question": "The coordinates of a triangle's vertices are A(2,0,0), B(0,3,0), C(0,0,6). Find its area. (3 steps)", "answer": "- Step 1: Vectors from A: $$\\overrightarrow{AB} = (-2, 3, 0)$$ and $$\\overrightarrow{AC} = (-2, 0, 6)$$.\n- Step 2: Cross product: $$\\overrightarrow{AB} \\times \\overrightarrow{AC} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ -2 & 3 & 0 \\\\ -2 & 0 & 6 \\end{vmatrix} = 18\\mathbf{i} + 12\\mathbf{j} + 6\\mathbf{k}$$.\n- Step 3: Area = $$\\frac{1}{2}|\\overrightarrow{AB} \\times \\overrightarrow{AC}| = \\frac{1}{2}\\sqrt{18^2 + 12^2 + 6^2} = \\frac{1}{2}\\sqrt{324 + 144 + 36} = \\frac{1}{2}\\sqrt{504} = \\frac{1}{2}(6\\sqrt{14}) = 3\\sqrt{14}$$.", "source": "MiniMax ②", "_id": "minimax_2_60", "judge_pick": false}, {"question": "Find the equation of the plane in vector form that passes through points (1,0,0), (0,1,0), (0,0,1). (3 steps)", "answer": "- Step 1: Direction vectors: $$\\overrightarrow{AB} = -\\mathbf{i} + \\mathbf{j}$$, $$\\overrightarrow{AC} = -\\mathbf{i} + \\mathbf{k}$$.\n- Step 2: Normal = $$\\overrightarrow{AB} \\times \\overrightarrow{AC} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ -1 & 1 & 0 \\\\ -1 & 0 & 1 \\end{vmatrix} = \\mathbf{i} + \\mathbf{j} + \\mathbf{k}$$.\n- Step 3: Plane equation: $$\\mathbf{r} \\cdot (\\mathbf{i} + \\mathbf{j} + \\mathbf{k}) = 1$$ (since point (1,0,0) gives 1), or in vector form: $$\\mathbf{r} = \\mathbf{i} + s(-\\mathbf{i} + \\mathbf{j}) + t(-\\mathbf{i} + \\mathbf{k})$$.", "source": "MiniMax ②", "_id": "minimax_2_61", "judge_pick": false}, {"question": "Explain why you cannot find a unique plane given only a single point and a direction vector parallel to the plane. What additional information is needed? (1 step)", "answer": "- Step 1: A single direction vector only tells you one direction lying IN the plane. You need either: (a) a second non-parallel direction vector in the plane, OR (b) the normal vector to the plane. With just one direction vector, there are infinitely many planes containing that direction.", "source": "MiniMax ②", "_id": "minimax_2_62", "judge_pick": true}, {"question": "A tetrahedron has vertices at O(0,0,0), A(1,0,0), B(0,1,0), C(0,0,1). Find its volume. (2 steps)", "answer": "- Step 1: Using O as reference: vectors $$\\mathbf{a} = \\mathbf{i}$$, $$\\mathbf{b} = \\mathbf{j}$$, $$\\mathbf{c} = \\mathbf{k}$$. Compute scalar triple product: $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\mathbf{i} \\cdot (\\mathbf{j} \\times \\mathbf{k}) = \\mathbf{i} \\cdot \\mathbf{i} = 1$$.\n- Step 2: Volume = $$\\frac{1}{6}|1| = \\frac{1}{6}$$. This is the standard unit tetrahedron in the first octant.", "source": "MiniMax ②", "_id": "minimax_2_63", "judge_pick": false}, {"question": "What is the relationship between the line direction ratios and the plane normal for a line lying IN a plane? (1 step)", "answer": "- Step 1: For a line to lie in a plane, its direction vector must be perpendicular to the plane's normal vector. If the line has direction (l,m,n) and plane has normal (a,b,c), then $$al + bm + cn = 0$$.", "source": "MiniMax ②", "_id": "minimax_2_64", "judge_pick": false}, {"question": "SIMPLE EXERCISE: Find a unit vector perpendicular to both $$\\mathbf{a} = \\mathbf{i} + \\mathbf{j}$$ and $$\\mathbf{b} = \\mathbf{j} + \\mathbf{k}$$. (2 steps)", "answer": "- Step 1: Compute cross product: $$\\mathbf{a} \\times \\mathbf{b} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ 1 & 1 & 0 \\\\ 0 & 1 & 1 \\end{vmatrix} = \\mathbf{i}(1) - \\mathbf{j}(1) + \\mathbf{k}(1) = \\mathbf{i} - \\mathbf{j} + \\mathbf{k}$$.\n- Step 2: Magnitude = $$\\sqrt{1+1+1} = \\sqrt{3}$$. Unit vector = $$\\frac{1}{\\sqrt{3}}(\\mathbf{i} - \\mathbf{j} + \\mathbf{k})$$.", "source": "MiniMax ②", "_id": "minimax_2_65", "judge_pick": false}, {"question": "The plane has equation $$2x + 3y - z = 6$$. Find the perpendicular distance from point (2,1,-1) to this plane. (3 steps)", "answer": "- Step 1: The plane is in form $$\\mathbf{r} \\cdot \\mathbf{n} = 6$$ with $$\\mathbf{n} = (2,3,-1)$$. The unit normal is $$\\hat{\\mathbf{n}} = \\frac{1}{\\sqrt{4+9+1}}(2,3,-1) = \\frac{1}{\\sqrt{14}}(2,3,-1)$$.\n- Step 2: For point P(2,1,-1), compute $$\\mathbf{p} \\cdot \\hat{\\mathbf{n}} = \\frac{1}{\\sqrt{14}}(4 + 3 + 1) = \\frac{8}{\\sqrt{14}}$$.\n- Step 3: Distance from origin to plane = $$\\frac{6}{\\sqrt{14}}$$. Distance from point to plane = $$|\\frac{6}{\\sqrt{14}} - \\frac{8}{\\sqrt{14}}| = \\frac{2}{\\sqrt{14}} = \\frac{\\sqrt{14}}{7}$$.", "source": "MiniMax ②", "_id": "minimax_2_66", "judge_pick": false}, {"question": "Why is the determinant form of the cross product more reliable than the component-by-component expansion when computing by hand? (1 step)", "answer": "- Step 1: The determinant form $$\\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3 \\end{vmatrix}$$ follows a clear pattern: \"i times (a₂b₃ - a₃b₂) minus j times (a₁b₃ - a₃b₁) plus k times (a₁b₂ - a₂b₁)\". This systematic approach reduces sign errors that commonly occur when expanding manually.", "source": "MiniMax ②", "_id": "minimax_2_67", "judge_pick": false}, {"question": "If two lines are given in symmetric form (Cartesian), how can you quickly check if they are parallel? (1 step)", "answer": "- Step 1: In Cartesian form $$\\frac{x-x_1}{l_1} = \\frac{y-y_1}{m_1} = \\frac{z-z_1}{n_1}$$ and $$\\frac{x-x_2}{l_2} = \\frac{y-y_2}{m_2} = \\frac{z-z_2}{n_2}$$, the lines are parallel if the direction ratios are proportional: $$l_1 : m_1 : n_1 = l_2 : m_2 : n_2$$.", "source": "MiniMax ②", "_id": "minimax_2_68", "judge_pick": false}, {"question": "A line passes through the origin and has direction vector $$\\mathbf{d}$$. What is special about its equation in the form $$\\mathbf{r} \\times \\mathbf{d} = \\mathbf{0}$$? (1 step)", "answer": "- Step 1: Since the line passes through the origin (a = 0), the equation simplifies to $$\\mathbf{r} \\times \\mathbf{d} = \\mathbf{0}$$. This represents all position vectors r that are parallel to d.", "source": "MiniMax ②", "_id": "minimax_2_69", "judge_pick": false}], "count": 70}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "Why do mathematicians introduce the vector (cross) product when the dot product already exists?", "answer": "- Step 1: The dot product $$\\mathbf{a}\\cdot\\mathbf{b}=|\\mathbf{a}||\\mathbf{b}|\\cos\\theta$$ produces a *scalar* (a single number). It tells us about alignment between vectors but does not give us a direction.\n- Step 2: Many geometric problems require a *vector* output: finding a vector perpendicular to two others, computing oriented areas, defining the normal direction to a plane.\n- Step 3: The cross product fills exactly this gap — it produces a vector whose magnitude encodes area information and whose direction is perpendicular to both input vectors.\n\nThe two products are complementary tools: dot for \"alignment,\" cross for \"perpendicularity and rotation.\"", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "State the geometric definition of $$\\mathbf{a}\\times\\mathbf{b}$$ and explain each ingredient.", "answer": "- Step 1: The definition is $$\\mathbf{a}\\times\\mathbf{b}=|\\mathbf{a}||\\mathbf{b}|\\sin\\theta\\,\\hat{\\mathbf{n}}$$\n- Step 2: The factor $$|\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$ is a non-negative scalar (since $$0\\le\\theta\\le 180°$$) — it is the *magnitude* of the cross product.\n- Step 3: The vector $$\\hat{\\mathbf{n}}$$ is the *unit vector perpendicular to both* $$\\mathbf{a}$$ and $$\\mathbf{b}$$. Of the two possible perpendicular directions, the correct one is given by the right-hand rule (or right-handed screw rule turning from $$\\mathbf{a}$$ to $$\\mathbf{b}$$).\n\nSo the cross product packages \"size of parallelogram\" with \"perpendicular orientation\" into one vector.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why is $$\\sin\\theta$$ used in the cross product formula rather than $$\\cos\\theta$$? (3 steps)", "answer": "- Step 1: The cross product measures *perpendicularity* — when two vectors are parallel, no parallelogram is formed, and the result should be zero.\n- Step 2: $$\\sin 0°=0$$ (parallel) and $$\\sin 90°=1$$ (perpendicular). This matches: collapsed parallelogram → zero, full parallelogram → maximum.\n- Step 3: Compare with the dot product, which uses $$\\cos\\theta$$ to measure *alignment*: $$\\cos 0°=1$$ (parallel, max alignment) and $$\\cos 90°=0$$ (perpendicular, no alignment).\n\nThe two trig functions reflect the complementary nature of the two products.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "Why does $$|\\mathbf{a}\\times\\mathbf{b}|$$ equal the area of the parallelogram with sides $$\\mathbf{a}$$ and $$\\mathbf{b}$$? (3 steps)", "answer": "- Step 1: A parallelogram with sides $$\\mathbf{a}$$ and $$\\mathbf{b}$$ has base of length $$|\\mathbf{a}|$$.\n- Step 2: The perpendicular height equals $$|\\mathbf{b}|\\sin\\theta$$ — this is the component of $$\\mathbf{b}$$ perpendicular to $$\\mathbf{a}$$ (the part contributing to height, not just sliding along the base).\n- Step 3: Area $$=$$ base $$\\times$$ height $$=|\\mathbf{a}|\\cdot|\\mathbf{b}|\\sin\\theta=|\\mathbf{a}\\times\\mathbf{b}|$$.\n\nThis is the geometric soul of the cross product: its magnitude *is* a parallelogram area.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Prove and explain why $$\\mathbf{a}\\times\\mathbf{b}=-(\\mathbf{b}\\times\\mathbf{a})$$ (anti-commutativity). (3 steps)", "answer": "- Step 1: When you turn from $$\\mathbf{a}$$ to $$\\mathbf{b}$$, the right-hand rule sends your thumb in some direction $$\\hat{\\mathbf{n}}$$.\n- Step 2: When you turn from $$\\mathbf{b}$$ to $$\\mathbf{a}$$ (the *opposite* rotation), your thumb points in the opposite direction $$-\\hat{\\mathbf{n}}$$. The magnitudes $$|\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$ are identical.\n- Step 3: So $$\\mathbf{b}\\times\\mathbf{a}=|\\mathbf{a}||\\mathbf{b}|\\sin\\theta\\,(-\\hat{\\mathbf{n}})=-\\mathbf{a}\\times\\mathbf{b}$$.\n\nThis is the most important difference from the dot product (which is commutative): **order matters in cross products.**", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "What is $$\\mathbf{a}\\times\\mathbf{a}$$, and what does this say geometrically?", "answer": "- Step 1: The angle between a vector and itself is $$0°$$, so $$\\sin 0°=0$$.\n- Step 2: Therefore $$\\mathbf{a}\\times\\mathbf{a}=|\\mathbf{a}||\\mathbf{a}|\\cdot 0\\cdot\\hat{\\mathbf{n}}=\\mathbf{0}$$.\n- Step 3: Geometrically: a \"parallelogram\" with both sides parallel collapses into a line segment with zero area.\n\nThis identity is crucial when expanding cross products of sums.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "Without computing, fill in: $$\\mathbf{i}\\times\\mathbf{j}=?$$, $$\\mathbf{j}\\times\\mathbf{k}=?$$, $$\\mathbf{k}\\times\\mathbf{i}=?$$. What pattern is at work?", "answer": "- Step 1: The results are $$\\mathbf{i}\\times\\mathbf{j}=\\mathbf{k}$$, $$\\mathbf{j}\\times\\mathbf{k}=\\mathbf{i}$$, $$\\mathbf{k}\\times\\mathbf{i}=\\mathbf{j}$$.\n- Step 2: Pattern: cyclic order $$\\mathbf{i}\\to\\mathbf{j}\\to\\mathbf{k}\\to\\mathbf{i}$$ — moving forward in the cycle gives a positive result.\n- Step 3: Reverse order gives a minus sign: $$\\mathbf{j}\\times\\mathbf{i}=-\\mathbf{k}$$, $$\\mathbf{k}\\times\\mathbf{j}=-\\mathbf{i}$$, $$\\mathbf{i}\\times\\mathbf{k}=-\\mathbf{j}$$.\n\nThe cycle is the algebraic encoding of the right-hand rule on a standard $$xyz$$ axis system.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "State all three ways for $$\\mathbf{a}\\times\\mathbf{b}=\\mathbf{0}$$ to occur, and contrast this with the meaning of $$\\mathbf{a}\\cdot\\mathbf{b}=0$$.", "answer": "- Step 1: $$\\mathbf{a}\\times\\mathbf{b}=\\mathbf{0}$$ requires $$|\\mathbf{a}||\\mathbf{b}|\\sin\\theta=0$$, which gives three possibilities:\n+ $$\\mathbf{a}=\\mathbf{0}$$ (zero magnitude)\n+ $$\\mathbf{b}=\\mathbf{0}$$ (zero magnitude)\n+ $$\\sin\\theta=0$$, i.e. $$\\theta=0°$$ or $$180°$$ — the vectors are *parallel*.\n- Step 2: In contrast, $$\\mathbf{a}\\cdot\\mathbf{b}=0$$ (with both non-zero) means the vectors are *perpendicular*.\n- Step 3: Memory hook: cross product zero = parallel; dot product zero = perpendicular. They detect opposite geometric relationships.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Derive the component formula for $$\\mathbf{a}\\times\\mathbf{b}$$ from the basis-vector cross products. (4 steps)", "answer": "- Step 1: Write $$\\mathbf{a}=a_1\\mathbf{i}+a_2\\mathbf{j}+a_3\\mathbf{k}$$ and $$\\mathbf{b}=b_1\\mathbf{i}+b_2\\mathbf{j}+b_3\\mathbf{k}$$, then use distributivity to expand the cross product term by term.\n- Step 2: Replace each basis-vector cross product:\n+ Diagonal terms ($$\\mathbf{i}\\times\\mathbf{i}$$, etc.) give $$\\mathbf{0}$$ and vanish.\n+ Off-diagonal terms produce $$\\pm\\mathbf{i},\\pm\\mathbf{j},\\pm\\mathbf{k}$$ via the cyclic rule.\n- Step 3: Collect by basis vector. The $$\\mathbf{i}$$ component gathers $$a_2b_3-a_3b_2$$; $$\\mathbf{j}$$ gathers $$a_3b_1-a_1b_3$$; $$\\mathbf{k}$$ gathers $$a_1b_2-a_2b_1$$.\n- Step 4: Final result: $$\\mathbf{a}\\times\\mathbf{b}=(a_2b_3-a_3b_2)\\mathbf{i}+(a_3b_1-a_1b_3)\\mathbf{j}+(a_1b_2-a_2b_1)\\mathbf{k}$$.\n\nThe minus sign on the $$\\mathbf{j}$$ component traces back to the cyclic order ($$\\mathbf{i}\\to\\mathbf{j}\\to\\mathbf{k}$$ skips backwards through $$\\mathbf{j}$$).", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "Why is the determinant form $$\\mathbf{a}\\times\\mathbf{b}=\\begin{vmatrix}\\mathbf{i}&\\mathbf{j}&\\mathbf{k}\\\\a_1&a_2&a_3\\\\b_1&b_2&b_3\\end{vmatrix}$$ correct, and why is it useful?", "answer": "- Step 1: Expanding along the first row gives $$\\mathbf{i}(a_2b_3-a_3b_2)-\\mathbf{j}(a_1b_3-a_3b_1)+\\mathbf{k}(a_1b_2-a_2b_1)$$, which matches the component formula exactly.\n- Step 2: The alternating $$+,-,+$$ pattern of cofactor expansion produces precisely the cyclic structure of the cross product.\n- Step 3: It's useful because:\n+ It's faster and less error-prone than expanding term by term.\n+ It connects cross product to determinant theory (e.g., scalar triple product).\n+ The structure makes the antisymmetry obvious: swap rows 2 and 3 (i.e., $$\\mathbf{a}$$ and $$\\mathbf{b}$$) and the determinant changes sign.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "How would you verify that a candidate vector $$\\mathbf{v}=\\mathbf{a}\\times\\mathbf{b}$$ is genuinely perpendicular to both $$\\mathbf{a}$$ and $$\\mathbf{b}$$? (3 steps)", "answer": "- Step 1: Compute $$\\mathbf{v}\\cdot\\mathbf{a}$$. If this is zero, $$\\mathbf{v}\\perp\\mathbf{a}$$.\n- Step 2: Compute $$\\mathbf{v}\\cdot\\mathbf{b}$$. If this is zero, $$\\mathbf{v}\\perp\\mathbf{b}$$.\n- Step 3: Both being zero confirms the cross product produced a vector perpendicular to both inputs (which it should, by definition).\n\nThis is a useful sanity check after a long calculation — also a quick way to spot arithmetic errors.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "How do you find a unit vector perpendicular to two given (non-parallel) vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$? (3 steps)", "answer": "- Step 1: Compute the cross product $$\\mathbf{a}\\times\\mathbf{b}$$ — by definition, this is perpendicular to both.\n- Step 2: Find its magnitude $$|\\mathbf{a}\\times\\mathbf{b}|$$.\n- Step 3: Normalise: $$\\hat{\\mathbf{n}}=\\dfrac{\\mathbf{a}\\times\\mathbf{b}}{|\\mathbf{a}\\times\\mathbf{b}|}$$.\n\nSubtle point: there are *two* unit vectors perpendicular to a given pair, namely $$\\pm\\hat{\\mathbf{n}}$$. The cross product picks one (via right-hand rule); the other is obtained by negation.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "How can you obtain $$\\sin\\theta$$ between two vectors using the cross product, and why is this less convenient than using the dot product? (3 steps)", "answer": "- Step 1: From $$|\\mathbf{a}\\times\\mathbf{b}|=|\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$, rearrange: $$\\sin\\theta=\\dfrac{|\\mathbf{a}\\times\\mathbf{b}|}{|\\mathbf{a}||\\mathbf{b}|}$$.\n- Step 2: This always yields a non-negative value because $$\\sin\\theta\\ge 0$$ on $$[0°,180°]$$.\n- Step 3: The catch: $$\\sin\\theta$$ alone cannot distinguish acute from obtuse, since e.g. $$\\sin 60°=\\sin 120°$$. Using $$\\cos\\theta$$ (from the dot product) reveals the sign of the cosine, immediately telling us if the angle is acute (positive cosine) or obtuse (negative).\n\nIn practice: prefer the dot-product approach for angles unless you also need the perpendicular vector.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "A common student mistake is to write $$\\mathbf{a}\\times\\mathbf{b}=\\mathbf{b}\\times\\mathbf{a}$$. Why is this wrong, and what is the correct relation?", "answer": "- Step 1: This mimics the (true) identity $$\\mathbf{a}\\cdot\\mathbf{b}=\\mathbf{b}\\cdot\\mathbf{a}$$ for the dot product, but cross product behaves differently.\n- Step 2: The correct identity is $$\\mathbf{a}\\times\\mathbf{b}=-(\\mathbf{b}\\times\\mathbf{a})$$ — anti-commutativity.\n- Step 3: This is built into the geometry: the right-hand rule reverses direction when you swap inputs, even though the magnitude is unchanged.\n\nAlways preserve the order when manipulating cross products.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Compute $$(2\\mathbf{i}+3\\mathbf{j})\\times\\mathbf{k}$$ mentally using basis-vector identities. (3 steps)", "answer": "- Step 1: Distribute: $$(2\\mathbf{i}+3\\mathbf{j})\\times\\mathbf{k}=2(\\mathbf{i}\\times\\mathbf{k})+3(\\mathbf{j}\\times\\mathbf{k})$$.\n- Step 2: Recall $$\\mathbf{i}\\times\\mathbf{k}=-\\mathbf{j}$$ (reverse cyclic) and $$\\mathbf{j}\\times\\mathbf{k}=\\mathbf{i}$$ (forward cyclic).\n- Step 3: Combine: $$2(-\\mathbf{j})+3(\\mathbf{i})=3\\mathbf{i}-2\\mathbf{j}$$.\n\nThis kind of mental drill reinforces the cyclic memory and the anti-commutative behavior.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Derive the formula $$\\text{Area of }\\triangle OAB=\\tfrac{1}{2}|\\mathbf{a}\\times\\mathbf{b}|$$ where $$A,B$$ have position vectors $$\\mathbf{a},\\mathbf{b}$$. (3 steps)", "answer": "- Step 1: Using the standard triangle area formula with two sides and included angle: $$\\text{Area}=\\tfrac{1}{2}|OA||OB|\\sin\\theta=\\tfrac{1}{2}|\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$.\n- Step 2: From the cross product definition, $$|\\mathbf{a}\\times\\mathbf{b}|=|\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$.\n- Step 3: Substitute to get $$\\text{Area}=\\tfrac{1}{2}|\\mathbf{a}\\times\\mathbf{b}|$$.\n\nThe \"$$\\tfrac{1}{2}$$\" reflects that a triangle is half of a parallelogram.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Why is the area of triangle $$ABC$$ given by $$\\tfrac{1}{2}|\\overrightarrow{AB}\\times\\overrightarrow{AC}|$$ and *not* by $$\\tfrac{1}{2}|\\mathbf{a}\\times\\mathbf{b}|$$ where $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$ are position vectors of $$A,B,C$$?", "answer": "- Step 1: The formula $$\\tfrac{1}{2}|\\mathbf{a}\\times\\mathbf{b}|$$ assumes the triangle has vertex at the origin with sides $$\\mathbf{a}$$ and $$\\mathbf{b}$$ — but in general $$A$$ is *not* the origin.\n- Step 2: The actual sides emanating from $$A$$ are $$\\overrightarrow{AB}=\\mathbf{b}-\\mathbf{a}$$ and $$\\overrightar
