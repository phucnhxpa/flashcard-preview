row{AC}=\\mathbf{c}-\\mathbf{a}$$, not $$\\mathbf{b}$$ and $$\\mathbf{c}$$ themselves.\n- Step 3: So $$\\text{Area}=\\tfrac{1}{2}|\\overrightarrow{AB}\\times\\overrightarrow{AC}|=\\tfrac{1}{2}|(\\mathbf{b}-\\mathbf{a})\\times(\\mathbf{c}-\\mathbf{a})|$$ — this works regardless of where the triangle is placed.\n\nThe formula $$\\tfrac{1}{2}|\\mathbf{a}\\times\\mathbf{b}|$$ is a special case of the general formula with $$\\mathbf{a}=\\mathbf{0}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "Show that $$(\\mathbf{b}-\\mathbf{a})\\times(\\mathbf{c}-\\mathbf{a})=(\\mathbf{a}\\times\\mathbf{b})+(\\mathbf{b}\\times\\mathbf{c})+(\\mathbf{c}\\times\\mathbf{a})$$. (4 steps)", "answer": "- Step 1: Expand using distributivity: $$(\\mathbf{b}-\\mathbf{a})\\times(\\mathbf{c}-\\mathbf{a})=\\mathbf{b}\\times\\mathbf{c}-\\mathbf{b}\\times\\mathbf{a}-\\mathbf{a}\\times\\mathbf{c}+\\mathbf{a}\\times\\mathbf{a}$$.\n- Step 2: Use $$\\mathbf{a}\\times\\mathbf{a}=\\mathbf{0}$$ to drop the last term: $$=\\mathbf{b}\\times\\mathbf{c}-\\mathbf{b}\\times\\mathbf{a}-\\mathbf{a}\\times\\mathbf{c}$$.\n- Step 3: Apply anti-commutativity: $$-\\mathbf{b}\\times\\mathbf{a}=\\mathbf{a}\\times\\mathbf{b}$$ and $$-\\mathbf{a}\\times\\mathbf{c}=\\mathbf{c}\\times\\mathbf{a}$$.\n- Step 4: Combine: $$=(\\mathbf{a}\\times\\mathbf{b})+(\\mathbf{b}\\times\\mathbf{c})+(\\mathbf{c}\\times\\mathbf{a})$$.\n\nThe symmetric form is elegant: it doesn't favour any vertex of the triangle.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Why is the area of parallelogram $$OABC$$ exactly $$|\\mathbf{a}\\times\\mathbf{b}|$$ (not half), where $$A$$ has position vector $$\\mathbf{a}$$ and $$C$$ has position vector $$\\mathbf{b}$$?", "answer": "- Step 1: A parallelogram is composed of two congruent triangles split by a diagonal.\n- Step 2: Each triangle has area $$\\tfrac{1}{2}|\\mathbf{a}\\times\\mathbf{b}|$$.\n- Step 3: Doubling gives parallelogram area $$=|\\mathbf{a}\\times\\mathbf{b}|$$ — the $$\\tfrac{1}{2}$$ disappears.\n\nMnemonic: triangle has $$\\tfrac{1}{2}$$, parallelogram has none.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Find the area of the triangle with vertices $$O=(0,0,0)$$, $$A=(2,0,0)$$, $$B=(0,3,0)$$ — without doing the cross product determinant in full. (2 steps)", "answer": "- Step 1: Both $$\\mathbf{a}=2\\mathbf{i}$$ and $$\\mathbf{b}=3\\mathbf{j}$$ lie in the $$xy$$-plane and are perpendicular. The cross product points along $$\\mathbf{k}$$ with magnitude $$|2||3|\\sin 90°=6$$.\n- Step 2: Area $$=\\tfrac{1}{2}\\cdot 6=3$$.\n\nSanity check: this is a right triangle with legs $$2$$ and $$3$$, so area $$=\\tfrac{1}{2}\\cdot 2\\cdot 3=3$$. ✓ The cross-product method generalises this to any two vectors.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "What is the *scalar triple product* $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})$$, and what kind of object does it produce?", "answer": "- Step 1: It's the dot product of $$\\mathbf{a}$$ with the cross product of $$\\mathbf{b}$$ and $$\\mathbf{c}$$ — a chained operation: cross first, then dot.\n- Step 2: The result is a *scalar* (single number), not a vector — that's why it's called \"scalar\" triple product.\n- Step 3: Its determinant form is $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=\\begin{vmatrix}a_1&a_2&a_3\\\\b_1&b_2&b_3\\\\c_1&c_2&c_3\\end{vmatrix}$$ — the rows are the three vectors in order.\n\nGeometrically, this scalar (with sign) represents the *signed volume* of the parallelepiped with edges $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Why is the scalar triple product *cyclic*: $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=\\mathbf{b}\\cdot(\\mathbf{c}\\times\\mathbf{a})=\\mathbf{c}\\cdot(\\mathbf{a}\\times\\mathbf{b})$$? (3 steps)", "answer": "- Step 1: Geometric viewpoint: all three expressions compute the (signed) volume of the *same* parallelepiped — the volume doesn't depend on which edge you call $$\\mathbf{a}$$, $$\\mathbf{b}$$, or $$\\mathbf{c}$$.\n- Step 2: Algebraic viewpoint: in the determinant form, cyclic permutation of the rows $$(a,b,c)\\to(b,c,a)\\to(c,a,b)$$ is two row-swaps, each negating the sign — net effect: unchanged.\n- Step 3: Warning: a single swap (like $$\\mathbf{a}\\cdot(\\mathbf{c}\\times\\mathbf{b})$$) negates the result, since $$\\mathbf{c}\\times\\mathbf{b}=-\\mathbf{b}\\times\\mathbf{c}$$.\n\nCyclic preserves; non-cyclic (single swap) negates.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "Give two distinct proofs that $$\\mathbf{a}\\cdot(\\mathbf{a}\\times\\mathbf{p})=0$$ for any vector $$\\mathbf{p}$$. (3 steps)", "answer": "- Step 1: Proof 1 (direct geometric): The vector $$\\mathbf{a}\\times\\mathbf{p}$$ is, by the very definition of cross product, perpendicular to $$\\mathbf{a}$$. The dot product of any vector with something perpendicular to it is zero.\n- Step 2: Proof 2 (using cyclic property): $$\\mathbf{a}\\cdot(\\mathbf{a}\\times\\mathbf{p})=\\mathbf{p}\\cdot(\\mathbf{a}\\times\\mathbf{a})$$ by cyclic shift, $$=\\mathbf{p}\\cdot\\mathbf{0}=0$$.\n- Step 3: Both proofs reveal the same underlying fact — a determinant with two equal rows is zero (since $$\\mathbf{a}$$ appears twice in $$\\mathbf{a}\\cdot(\\mathbf{a}\\times\\mathbf{p})$$).\n\nThis is why repeating any vector in a scalar triple product gives zero.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "What is the geometric meaning of the condition $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=0$$, and why?", "answer": "- Step 1: The vector $$\\mathbf{b}\\times\\mathbf{c}$$ is perpendicular to the plane spanned by $$\\mathbf{b}$$ and $$\\mathbf{c}$$.\n- Step 2: $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=0$$ means $$\\mathbf{a}$$ is perpendicular to that perpendicular — i.e., $$\\mathbf{a}$$ lies *in* the plane of $$\\mathbf{b}$$ and $$\\mathbf{c}$$.\n- Step 3: Equivalently: the three vectors $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$ are *coplanar*. The parallelepiped collapses to a flat figure with zero volume.\n\nThis is the standard test for coplanarity of three vectors.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Derive the formula for the volume of a parallelepiped with edges $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$. (5 steps)", "answer": "- Step 1: Volume $$=$$ (area of base) $$\\times$$ (perpendicular height).\n- Step 2: Take the base as the parallelogram with sides $$\\mathbf{b},\\mathbf{c}$$. Its area is $$|\\mathbf{b}\\times\\mathbf{c}|$$.\n- Step 3: The perpendicular direction (normal to the base) is along $$\\mathbf{b}\\times\\mathbf{c}$$. The height $$h$$ is the projection of the third edge $$\\mathbf{a}$$ onto this normal direction: $$h=|\\mathbf{a}|\\cos\\phi$$, where $$\\phi$$ is the angle between $$\\mathbf{a}$$ and $$\\mathbf{b}\\times\\mathbf{c}$$.\n- Step 4: Combine: $$V=|\\mathbf{b}\\times\\mathbf{c}|\\cdot|\\mathbf{a}|\\cos\\phi=\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})$$ — by the dot product definition.\n- Step 5: Take absolute value to ensure positive volume regardless of orientation: $$V=|\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})|$$.\n\nThe sign of $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})$$ encodes whether the edge ordering is right-handed or left-handed.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "Why does the volume of a tetrahedron with edges $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$ from one vertex equal $$\\tfrac{1}{6}|\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})|$$? (3 steps)", "answer": "- Step 1: Volume of any pyramid = $$\\tfrac{1}{3}\\times$$ (area of base) $$\\times$$ height.\n- Step 2: The base of the tetrahedron is the *triangle* with sides $$\\mathbf{b},\\mathbf{c}$$, whose area is $$\\tfrac{1}{2}|\\mathbf{b}\\times\\mathbf{c}|$$ (half a parallelogram).\n- Step 3: Combining: $$V=\\tfrac{1}{3}\\cdot\\tfrac{1}{2}|\\mathbf{b}\\times\\mathbf{c}|\\cdot|\\mathbf{a}|\\cos\\phi=\\tfrac{1}{6}|\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})|$$.\n\nThe factor $$\\tfrac{1}{6}=\\tfrac{1}{3}\\cdot\\tfrac{1}{2}$$ reflects (pyramid factor) $$\\times$$ (triangle factor): a tetrahedron is one-sixth of a parallelepiped.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Find the volume of the tetrahedron with vertices $$(0,0,0)$$, $$(1,0,0)$$, $$(0,1,0)$$, $$(0,0,1)$$ — without computing a determinant from scratch. (3 steps)", "answer": "- Step 1: From the origin, the three edges are simply $$\\mathbf{i},\\mathbf{j},\\mathbf{k}$$.\n- Step 2: $$\\mathbf{i}\\cdot(\\mathbf{j}\\times\\mathbf{k})=\\mathbf{i}\\cdot\\mathbf{i}=1$$ (using $$\\mathbf{j}\\times\\mathbf{k}=\\mathbf{i}$$).\n- Step 3: Volume $$=\\tfrac{1}{6}|1|=\\tfrac{1}{6}$$.\n\nThis is the canonical \"unit tetrahedron\" — knowing its volume is $$\\tfrac{1}{6}$$ helps sanity-check formulas. (The corresponding unit cube has volume $$1$$, six times bigger.)", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "What's the difference between $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})$$ being negative versus positive — does volume become negative?", "answer": "- Step 1: The scalar triple product encodes a *signed* volume. The sign depends on whether the ordering $$(\\mathbf{a},\\mathbf{b},\\mathbf{c})$$ is right-handed (positive) or left-handed (negative).\n- Step 2: Physical volume is always non-negative — so when we report a volume, we take the absolute value.\n- Step 3: A negative sign isn't a calculation error; it's geometric information about orientation. If you swap any two of $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$, the sign flips.\n\nSo: don't panic if the scalar triple product comes out negative; just take its modulus.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "Explain why the cross-product form of the line equation $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$ describes a line through point $$A$$ (with position $$\\mathbf{a}$$) parallel to $$\\mathbf{b}$$. (3 steps)", "answer": "- Step 1: A point $$R$$ with position $$\\mathbf{r}$$ is on the line iff the displacement $$\\overrightarrow{AR}=\\mathbf{r}-\\mathbf{a}$$ points in the same direction as the line's direction vector $$\\mathbf{b}$$ — i.e., $$\\overrightarrow{AR}$$ is parallel to $$\\mathbf{b}$$.\n- Step 2: Two parallel vectors have zero cross product (recall: $$\\mathbf{u}\\times\\mathbf{v}=\\mathbf{0}$$ when $$\\mathbf{u}\\parallel\\mathbf{v}$$).\n- Step 3: So the parallelism condition translates exactly to $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$.\n\nThis is an elegant *parameter-free* equation — no need to introduce $$\\lambda$$.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Show that the cross-product form of the line $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$ is equivalent to $$\\mathbf{r}\\times\\mathbf{b}=\\mathbf{a}\\times\\mathbf{b}$$.", "answer": "- Step 1: Expand using distributivity: $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{r}\\times\\mathbf{b}-\\mathbf{a}\\times\\mathbf{b}$$.\n- Step 2: Setting this equal to $$\\mathbf{0}$$: $$\\mathbf{r}\\times\\mathbf{b}-\\mathbf{a}\\times\\mathbf{b}=\\mathbf{0}$$.\n- Step 3: Rearranging: $$\\mathbf{r}\\times\\mathbf{b}=\\mathbf{a}\\times\\mathbf{b}$$.\n\nThe right-hand side is a *fixed vector* once $$\\mathbf{a}$$ and $$\\mathbf{b}$$ are known, so this is a constraint on $$\\mathbf{r}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "How do you convert the line equation $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$ to the standard Cartesian symmetric form? (4 steps)", "answer": "- Step 1: $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$ tells us $$\\mathbf{r}-\\mathbf{a}$$ is parallel to $$\\mathbf{b}$$, so $$\\mathbf{r}-\\mathbf{a}=\\lambda\\mathbf{b}$$ for some scalar $$\\lambda$$.\n- Step 2: Write component-wise with $$\\mathbf{r}=(x,y,z)$$, $$\\mathbf{a}=(x_1,y_1,z_1)$$, $$\\mathbf{b}=(l,m,n)$$: $$x-x_1=\\lambda l$$, $$y-y_1=\\lambda m$$, $$z-z_1=\\lambda n$$.\n- Step 3: Solve each for $$\\lambda$$: $$\\lambda=\\dfrac{x-x_1}{l}=\\dfrac{y-y_1}{m}=\\dfrac{z-z_1}{n}$$.\n- Step 4: This is the standard Cartesian form, where the denominators are the direction ratios of the line.\n\nThe Cartesian form is just a re-expression of the parallelism condition.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Derive and explain the scalar product equation of a plane: $$\\mathbf{r}\\cdot\\mathbf{n}=p$$. (4 steps)", "answer": "- Step 1: Let $$A$$ be a known point on the plane (position vector $$\\mathbf{a}$$) and $$\\mathbf{n}$$ a vector normal to the plane.\n- Step 2: For any point $$R$$ on the plane, the displacement $$\\overrightarrow{AR}=\\mathbf{r}-\\mathbf{a}$$ lies *in* the plane.\n- Step 3: Since $$\\mathbf{n}$$ is perpendicular to everything in the plane, $$(\\mathbf{r}-\\mathbf{a})\\cdot\\mathbf{n}=0$$.\n- Step 4: Expanding: $$\\mathbf{r}\\cdot\\mathbf{n}=\\mathbf{a}\\cdot\\mathbf{n}$$. Define $$p=\\mathbf{a}\\cdot\\mathbf{n}$$ (a fixed scalar): $$\\mathbf{r}\\cdot\\mathbf{n}=p$$.\n\nThe form is parameter-free; the key insight is \"in-plane vector ⊥ normal.\"", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "Why does the vector parametric form of a plane $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}+\\mu\\mathbf{c}$$ require *two* parameters (not one or three)? (3 steps)", "answer": "- Step 1: A line is 1D; reaching any point on it requires a single scalar parameter (one degree of freedom).\n- Step 2: A plane is 2D; reaching any point on it requires two scalar parameters because you need two independent directions of motion.\n- Step 3: Three parameters would let you reach any point in 3D space — too much freedom; you'd be describing all of space, not just a plane. Hence exactly two non-parallel direction vectors $$\\mathbf{b},\\mathbf{c}$$ (and two parameters $$\\lambda,\\mu$$) are needed.\n\nThe number of parameters tells you the dimension of the geometric object.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "How do you find the equation of a plane through three non-collinear points $$A,B,C$$? (4 steps)", "answer": "- Step 1: Compute two vectors lying in the plane: $$\\overrightarrow{AB}=\\mathbf{b}-\\mathbf{a}$$ and $$\\overrightarrow{AC}=\\mathbf{c}-\\mathbf{a}$$.\n- Step 2: For *vector parametric form*: $$\\mathbf{r}=\\mathbf{a}+\\lambda\\overrightarrow{AB}+\\mu\\overrightarrow{AC}$$.\n- Step 3: For *scalar product form*: take the cross product to get a normal $$\\mathbf{n}=\\overrightarrow{AB}\\times\\overrightarrow{AC}$$. Then $$\\mathbf{r}\\cdot\\mathbf{n}=\\mathbf{a}\\cdot\\mathbf{n}$$.\n- Step 4: For *Cartesian form*: write $$\\mathbf{r}\\cdot\\mathbf{n}=p$$ component-wise as $$n_1x+n_2y+n_3z=p$$.\n\nAll three forms describe the same plane; pick whichever the problem demands.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Convert the plane equation $$\\mathbf{r}\\cdot\\mathbf{n}=p$$ to Cartesian form $$ax+by+cz+d=0$$.", "answer": "- Step 1: Substitute $$\\mathbf{r}=x\\mathbf{i}+y\\mathbf{j}+z\\mathbf{k}$$ and $$\\mathbf{n}=n_1\\mathbf{i}+n_2\\mathbf{j}+n_3\\mathbf{k}$$.\n- Step 2: Compute: $$(x\\mathbf{i}+y\\mathbf{j}+z\\mathbf{k})\\cdot(n_1\\mathbf{i}+n_2\\mathbf{j}+n_3\\mathbf{k})=n_1x+n_2y+n_3z$$.\n- Step 3: Set equal to $$p$$ and rearrange: $$n_1x+n_2y+n_3z-p=0$$, which has the form $$ax+by+cz+d=0$$ with $$a=n_1$$, $$b=n_2$$, $$c=n_3$$, $$d=-p$$.\n\nReading off Cartesian: the *coefficients of $$x,y,z$$ are the components of the normal vector*.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "A plane has Cartesian equation $$3x-2y+z=7$$. What is a normal vector to this plane, and how do you spot it instantly?", "answer": "- Step 1: From the conversion $$\\mathbf{r}\\cdot\\mathbf{n}=p\\to ax+by+cz=p$$, the coefficients $$(a,b,c)$$ are exactly the components of the normal vector.\n- Step 2: So $$\\mathbf{n}=3\\mathbf{i}-2\\mathbf{j}+\\mathbf{k}$$.\n- Step 3: Reading the normal directly off the Cartesian equation is one of the most useful shortcuts in vector geometry.\n\n(Caveat: any non-zero scalar multiple of $$\\mathbf{n}$$ is also a valid normal.)", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "How do you find the line of intersection of two planes? (4 steps)", "answer": "- Step 1: Approach 1 (algebraic): write both planes in Cartesian form, treat them as two equations in three unknowns $$x,y,z$$. Eliminate one variable, parameterise another (e.g., set $$y=\\lambda$$), express remaining variables in terms of the parameter. Then write the answer in vector form $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$.\n- Step 2: Approach 2 (geometric): the *direction* of the intersection line is $$\\mathbf{n}_1\\times\\mathbf{n}_2$$ (perpendicular to both normals, hence parallel to both planes).\n- Step 3: For a *point* on the line, find any solution to both plane equations (e.g., set $$z=0$$ and solve the two-variable system).\n- Step 4: Combine: $$\\mathbf{r}=\\text{point}+\\lambda(\\mathbf{n}_1\\times\\mathbf{n}_2)$$.\n\nApproach 2 is faster once you understand why the direction is the cross product of normals.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Why is the direction of the line of intersection of two planes equal to $$\\mathbf{n}_1\\times\\mathbf{n}_2$$? (3 steps)", "answer": "- Step 1: The line of intersection lies in *both* planes simultaneously.\n- Step 2: A vector lying in plane 1 is perpendicular to its normal $$\\mathbf{n}_1$$; a vector lying in plane 2 is perpendicular to $$\\mathbf{n}_2$$. The intersection line's direction must therefore be perpendicular to both normals.\n- Step 3: The cross product $$\\mathbf{n}_1\\times\\mathbf{n}_2$$ is, by definition, perpendicular to both $$\\mathbf{n}_1$$ and $$\\mathbf{n}_2$$, so it gives the line's direction.\n\nEdge case: if $$\\mathbf{n}_1\\parallel\\mathbf{n}_2$$, the planes are parallel and either don't intersect or are identical.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Derive the formula for the angle between a line $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$ and a plane $$\\mathbf{r}\\cdot\\mathbf{n}=p$$. (4 steps)", "answer": "- Step 1: Let $$\\theta$$ be the desired angle between line and plane (acute, by convention).\n- Step 2: Let $$\\phi$$ be the angle between the line's direction $$\\mathbf{b}$$ and the plane's normal $$\\mathbf{n}$$. Geometrically, $$\\theta$$ and $$\\phi$$ are complementary: $$\\theta+\\phi=90°$$.\n- Step 3: From the dot product: $$\\cos\\phi=\\dfrac{|\\mathbf{b}\\cdot\\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$ (absolute value to take the acute angle).\n- Step 4: Since $$\\sin\\theta=\\cos\\phi$$: $$\\sin\\theta=\\dfrac{|\\mathbf{b}\\cdot\\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$.\n\nThe \"switch from cos to sin\" is the key step — the line-plane angle isn't the line-normal angle.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "Why is the angle between two planes equal to the angle between their normal vectors?", "answer": "- Step 1: Imagine the two planes meeting along a line. Take a cross-section perpendicular to that line — you see two perpendicular lines (one in each plane), and the angle between them is the dihedral angle.\n- Step 2: Both normal vectors are also perpendicular to the line of intersection. The angle between them equals the dihedral angle (up to supplement).\n- Step 3: Hence $$\\cos\\theta=\\dfrac{|\\mathbf{n}_1\\cdot\\mathbf{n}_2|}{|\\mathbf{n}_1||\\mathbf{n}_2|}$$, with absolute value to capture the acute angle.\n\nIn short: the normals \"carry\" the orientation information of their planes.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "Explain why the formula $$\\mathbf{r}\\cdot\\hat{\\mathbf{n}}=d$$ gives $$d$$ as the perpendicular distance from the origin to the plane. (4 steps)", "answer": "- Step 1: The unit normal $$\\hat{\\mathbf{n}}$$ has $$|\\hat{\\mathbf{n}}|=1$$. Let $$F$$ be the foot of the perpendicular from origin $$O$$ to the plane.\n- Step 2: For any point $$R$$ on the plane with position $$\\mathbf{r}$$, the dot product $$\\mathbf{r}\\cdot\\hat{\\mathbf{n}}=|\\mathbf{r}|\\cos\\alpha$$, where $$\\alpha$$ is the angle between $$\\overrightarrow{OR}$$ and $$\\hat{\\mathbf{n}}$$.\n- Step 3: But $$|\\mathbf{r}|\\cos\\alpha$$ is exactly the *projection* of $$\\overrightarrow{OR}$$ onto $$\\hat{\\mathbf{n}}$$, and this projection is the same for *every* point on the plane — namely $$|\\overrightarrow{OF}|=d$$.\n- Step 4: So $$\\mathbf{r}\\cdot\\hat{\\mathbf{n}}=d$$, the perpendicular distance from $$O$$ to the plane.\n\nCrucial: this only works when the normal is normalised (unit length).", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "A plane is given as $$\\mathbf{r}\\cdot(2\\mathbf{i}+\\mathbf{j}+2\\mathbf{k})=6$$. How do you find its perpendicular distance from the origin? (3 steps)", "answer": "- Step 1: The given normal $$\\mathbf{n}=2\\mathbf{i}+\\mathbf{j}+2\\mathbf{k}$$ has magnitude $$|\\mathbf{n}|=\\sqrt{4+1+4}=3$$ — not a unit vector.\n- Step 2: Divide both sides of the equation by $$|\\mathbf{n}|=3$$: $$\\mathbf{r}\\cdot\\tfrac{1}{3}(2\\mathbf{i}+\\mathbf{j}+2\\mathbf{k})=2$$. Now $$\\hat{\\mathbf{n}}$$ is a unit vector.\n- Step 3: Read off: distance from origin to plane = $$2$$.\n\nThe general rule: for $$\\mathbf{r}\\cdot\\mathbf{n}=p$$, the distance from origin is $$|p|/|\\mathbf{n}|$$.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "How do you find the perpendicular distance from a *point* (not the origin) to a plane? (4 steps)", "answer": "- Step 1: Construct a parallel plane $$\\Pi'$$ passing through the point $$P$$, with the same normal $$\\mathbf{n}$$ as the original plane $$\\Pi$$.\n- Step 2: Find each plane's perpendicular distance from the origin: $$d_1=|p|/|\\mathbf{n}|$$ for $$\\Pi$$, and $$d_2=|\\mathbf{p}\\cdot\\mathbf{n}|/|\\mathbf{n}|$$ for $$\\Pi'$$ (where $$\\mathbf{p}$$ is the position vector of $$P$$).\n- Step 3: The distance between $$\\Pi$$ and $$\\Pi'$$ is $$|d_1-d_2|$$ if both are on the same side of origin, or $$d_1+d_2$$ if on opposite sides.\n- Step 4: Equivalent compact formula: $$\\text{distance}=\\dfrac{|\\mathbf{p}\\cdot\\mathbf{n}-p|}{|\\mathbf{n}|}$$, where $$\\mathbf{r}\\cdot\\mathbf{n}=p$$ is the plane's equation.\n\nThe compact formula handles signs automatically via the absolute value.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Derive the formula for the shortest distance between two skew lines $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$ and $$\\mathbf{r}=\\mathbf{c}+\\mu\\mathbf{d}$$. (5 steps)", "answer": "- Step 1: The shortest segment joining the two lines is perpendicular to *both* — i.e., parallel to a direction perpendicular to both $$\\mathbf{b}$$ and $$\\mathbf{d}$$.\n- Step 2: That common perpendicular direction is given by $$\\mathbf{b}\\times\\mathbf{d}$$ (perpendicular to both by definition of cross product).\n- Step 3: The unit vector along this direction is $$\\dfrac{\\mathbf{b}\\times\\mathbf{d}}{|\\mathbf{b}\\times\\mathbf{d}|}$$.\n- Step 4: Pick any point $$P$$ on line 1 (say $$\\mathbf{a}$$) and $$Q$$ on line 2 (say $$\\mathbf{c}$$). The shortest distance is the projection of $$\\overrightarrow{QP}=\\mathbf{a}-\\mathbf{c}$$ onto the unit common-perpendicular direction.\n- Step 5: $$\\text{distance}=\\left|(\\mathbf{a}-\\mathbf{c})\\cdot\\dfrac{\\mathbf{b}\\times\\mathbf{d}}{|\\mathbf{b}\\times\\mathbf{d}|}\\right|=\\dfrac{|(\\mathbf{a}-\\mathbf{c})\\cdot(\\mathbf{b}\\times\\mathbf{d})|}{|\\mathbf{b}\\times\\mathbf{d}|}$$.\n\nThe numerator is a scalar triple product — geometrically, the volume of a parallelepiped divided by the parallelogram base area gives the height.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "What goes wrong with the skew-line distance formula when the two lines are parallel?", "answer": "- Step 1: If the two lines are parallel, then $$\\mathbf{b}\\parallel\\mathbf{d}$$, so $$\\mathbf{b}\\times\\mathbf{d}=\\mathbf{0}$$.\n- Step 2: The denominator $$|\\mathbf{b}\\times\\mathbf{d}|=0$$, making the formula undefined (division by zero).\n- Step 3: Geometrically: parallel lines don't have a *unique* common perpendicular direction (any direction perpendicular to the shared direction works), so the formula's reasoning fails.\n\nFor parallel lines, use a different approach: pick any vector connecting them, and project out the component along the common direction. The remaining perpendicular component's magnitude is the distance.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "What is the condition that two lines $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$ and $$\\mathbf{r}=\\mathbf{c}+\\mu\\mathbf{d}$$ actually meet (intersect)?", "answer": "- Step 1: Write the simultaneous condition: there exist values of $$\\lambda$$ and $$\\mu$$ such that $$\\mathbf{a}+\\lambda\\mathbf{b}=\\mathbf{c}+\\mu\\mathbf{d}$$.\n- Step 2: This gives three scalar equations (one per coordinate) in two unknowns ($$\\lambda,\\mu$$). Solve any two equations for $$\\lambda,\\mu$$.\n- Step 3: Crucial check: substitute these values into the *third* equation. If consistent → lines meet; if inconsistent → lines are skew (assuming non-parallel).\n\nIn 3D, two non-parallel lines almost never meet — skew is the generic case. Always do the consistency check.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "When can three vectors $$\\mathbf{a}, \\mathbf{b}, \\mathbf{c}$$ be linked by $$\\mathbf{a}+\\mathbf{b}+\\mathbf{c}=\\mathbf{0}$$, what does this say about $$\\mathbf{a}\\times\\mathbf{b}, \\mathbf{b}\\times\\mathbf{c}, \\mathbf{c}\\times\\mathbf{a}$$? (4 steps)", "answer": "- Step 1: From $$\\mathbf{a}+\\mathbf{b}+\\mathbf{c}=\\mathbf{0}$$, we get $$\\mathbf{c}=-(\\mathbf{a}+\\mathbf{b})$$.\n- Step 2: Take cross product with $$\\mathbf{a}$$ from the left: $$\\mathbf{a}\\times\\mathbf{c}=-\\mathbf{a}\\times\\mathbf{a}-\\mathbf{a}\\times\\mathbf{b}=-\\mathbf{a}\\times\\mathbf{b}$$. Hence $$\\mathbf{a}\\times\\mathbf{b}=\\mathbf{c}\\times\\mathbf{a}$$ (using anti-commutativity).\n- Step 3: Similarly, take cross product with $$\\mathbf{b}$$: $$\\mathbf{b}\\times\\mathbf{c}=-\\mathbf{b}\\times\\mathbf{a}-\\mathbf{b}\\times\\mathbf{b}=\\mathbf{a}\\times\\mathbf{b}$$.\n- Step 4: All three are equal: $$\\mathbf{a}\\times\\mathbf{b}=\\mathbf{b}\\times\\mathbf{c}=\\mathbf{c}\\times\\mathbf{a}$$. Geometrically, this is twice the area of any triangle with sides $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$ as edges (in head-to-tail closure).", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "Why does $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=(\\mathbf{a}\\times\\mathbf{b})\\cdot\\mathbf{c}$$? (3 steps)", "answer": "- Step 1: Both sides represent the (signed) volume of the same parallelepiped with edges $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$.\n- Step 2: Algebraically, both expand to the same determinant: $$\\begin{vmatrix}a_1&a_2&a_3\\\\b_1&b_2&b_3\\\\c_1&c_2&c_3\\end{vmatrix}$$.\n- Step 3: This identity allows us to \"shift the cross product\" between the two factors of a triple product — useful in proofs (e.g., $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=\\mathbf{c}\\cdot(\\mathbf{a}\\times\\mathbf{b})$$ via cyclic shift, then identity above).", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "How can you use the scalar triple product identity $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=(\\mathbf{a}\\times\\mathbf{b})\\cdot\\mathbf{c}$$ to prove distributivity of cross product over addition? (4 steps)", "answer": "- Step 1: Goal: show $$\\mathbf{a}\\times(\\mathbf{b}+\\mathbf{c})=\\mathbf{a}\\times\\mathbf{b}+\\mathbf{a}\\times\\mathbf{c}$$.\n- Step 2: Take any test vector $$\\mathbf{d}$$ and compute $$\\mathbf{d}\\cdot(\\mathbf{a}\\times\\mathbf{b}+\\mathbf{a}\\times\\mathbf{c})$$. Using linearity of dot product and the scalar triple product identity: $$=\\mathbf{d}\\cdot(\\mathbf{a}\\times\\mathbf{b})+\\mathbf{d}\\cdot(\\mathbf{a}\\times\\mathbf{c})=(\\mathbf{d}\\times\\mathbf{a})\\cdot\\mathbf{b}+(\\mathbf{d}\\times\\mathbf{a})\\cdot\\mathbf{c}=(\\mathbf{d}\\times\\mathbf{a})\\cdot(\\mathbf{b}+\\mathbf{c})=\\mathbf{d}\\cdot(\\mathbf{a}\\times(\\mathbf{b}+\\mathbf{c}))$$.\n- Step 3: Since $$\\mathbf{d}\\cdot(\\mathbf{a}\\times(\\mathbf{b}+\\mathbf{c})-\\mathbf{a}\\times\\mathbf{b}-\\mathbf{a}\\times\\mathbf{c})=0$$ for *any* $$\\mathbf{d}$$, the bracketed vector must be $$\\mathbf{0}$$.\n- Step 4: Therefore $$\\mathbf{a}\\times(\\mathbf{b}+\\mathbf{c})=\\mathbf{a}\\times\\mathbf{b}+\\mathbf{a}\\times\\mathbf{c}$$.\n\nThis is a clever proof: the scalar triple product becomes a \"test functional\" that pins down vector identities.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "What does it mean geometrically when $$\\overrightarrow{AB}\\times\\overrightarrow{CD}=\\mathbf{0}$$, given $$A\\ne B$$ and $$C\\ne D$$?", "answer": "- Step 1: Two non-zero vectors have zero cross product if and only if they are parallel.\n- Step 2: So $$\\overrightarrow{AB}\\parallel\\overrightarrow{CD}$$ — the line segments $$AB$$ and $$CD$$ are parallel (or anti-parallel).\n- Step 3: This is the standard test for parallel sides — useful, for instance, in showing a quadrilateral is a parallelogram (when both pairs of opposite sides have zero cross product).", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Lines $$l_1$$ and $$l_2$$ are checked: $$\\lambda=2, \\mu=-3$$ solve two of three coordinate equations, but the third fails. What does this tell you about the lines, and why?", "answer": "- Step 1: Three coordinate equations from setting positions equal must *all* be satisfied for the lines to share a point.\n- Step 2: Two equations being satisfied means parameter values exist that make the $$x$$ and $$y$$ coordinates (say) match — but the $$z$$ coordinates differ.\n- Step 3: So the lines pass \"above and below\" each other — they are skew (assuming directions aren't parallel).\n\nThe third-equation check is essential. Without it, you'd falsely conclude the lines meet.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "A line lies in a plane. What does this mean for the line's direction $$\\mathbf{b}$$ and the plane's normal $$\\mathbf{n}$$? (2 steps)", "answer": "- Step 1: If the line lies entirely in the plane, every point of the line satisfies the plane equation; the line's direction doesn't \"leave\" the plane.\n- Step 2: Equivalently, $$\\mathbf{b}\\cdot\\mathbf{n}=0$$ — the direction is perpendicular to the normal. Additionally, *one* point of the line must lie in the plane (i.e., satisfy $$\\mathbf{r}\\cdot\\mathbf{n}=p$$).\n\nIf $$\\mathbf{b}\\cdot\\mathbf{n}=0$$ but the line's anchor point isn't in the plane, the line is parallel to the plane (never intersecting).", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "What's the difference between a line being *parallel to* a plane vs *lying in* the plane? (3 steps)", "answer": "- Step 1: Both require $$\\mathbf{b}\\cdot\\mathbf{n}=0$$ (line direction perpendicular to plane normal) — the line never \"tilts\" toward or away from the plane.\n- Step 2: Lying in the plane: additionally, every point of the line satisfies the plane equation (in particular, the anchor point $$\\mathbf{a}$$ does: $$\\mathbf{a}\\cdot\\mathbf{n}=p$$).\n- Step 3: Parallel but not lying in: $$\\mathbf{a}\\cdot\\mathbf{n}\\ne p$$ — line maintains constant distance from the plane and never meets it.\n\nSo: $$\\mathbf{b}\\cdot\\mathbf{n}=0$$ separates \"intersects in one point\" from \"parallel/contained\"; checking the anchor point distinguishes the latter two.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Why must the angle between line and plane use the *absolute value* in $$\\sin\\theta=|\\mathbf{b}\\cdot\\mathbf{n}|/(|\\mathbf{b}||\\mathbf{n}|)$$?", "answer": "- Step 1: Without absolute value, $$\\mathbf{b}\\cdot\\mathbf{n}/(|\\mathbf{b}||\\mathbf{n}|)$$ could be negative, depending on the orientation of $$\\mathbf{b}$$ relative to $$\\mathbf{n}$$.\n- Step 2: But the *angle between line and plane* is conventionally taken to be the acute (positive) angle in $$[0°, 90°]$$, where sine is non-negative.\n- Step 3: Taking absolute value forces the answer into the correct range automatically — irrespective of which direction was chosen for $$\\mathbf{b}$$ (since $$\\mathbf{b}$$ and $$-\\mathbf{b}$$ describe the same line).\n\nThis is a recurring theme: when geometric angles need to be acute, throw in absolute values.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "Find the equation of the line through $$(1,2,3)$$ parallel to $$\\mathbf{i}+\\mathbf{j}+\\mathbf{k}$$ in cross-product form. (2 steps)", "answer": "- Step 1: Use $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$ with $$\\mathbf{a}=\\mathbf{i}+2\\mathbf{j}+3\\mathbf{k}$$ and $$\\mathbf{b}=\\mathbf{i}+\\mathbf{j}+\\mathbf{k}$$.\n- Step 2: Equation: $$(\\mathbf{r}-(\\mathbf{i}+2\\mathbf{j}+3\\mathbf{k}))\\times(\\mathbf{i}+\\mathbf{j}+\\mathbf{k})=\\mathbf{0}$$, or equivalently $$\\mathbf{r}\\times(\\mathbf{i}+\\mathbf{j}+\\mathbf{k})=(\\mathbf{i}+2\\mathbf{j}+3\\mathbf{k})\\times(\\mathbf{i}+\\mathbf{j}+\\mathbf{k})$$.\n\nThe right-hand side is a fixed vector you'd compute once; no parameter appears.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "Mental check: Is the angle between two planes the same as the angle between their normals?", "answer": "- Step 1: Strictly: the angle between the planes equals the angle between the normals — *or* its supplement (since reversing a normal changes the angle by 180°).\n- Step 2: Conventionally, we always report the acute angle for both.\n- Step 3: Using $$\\cos\\theta=|\\mathbf{n}_1\\cdot\\mathbf{n}_2|/(|\\mathbf{n}_1||\\mathbf{n}_2|)$$ with absolute value gives the acute version automatically.\n\nSo yes — with the absolute value convention, plane-angle equals normal-angle.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "Two planes have normals $$\\mathbf{n}_1=\\mathbf{i}+\\mathbf{j}$$ and $$\\mathbf{n}_2=\\mathbf{i}-\\mathbf{j}$$. What is the angle between the planes? (3 steps)", "answer": "- Step 1: $$\\mathbf{n}_1\\cdot\\mathbf{n}_2=(1)(1)+(1)(-1)=0$$.\n- Step 2: $$\\cos\\theta=|0|/(\\sqrt{2}\\cdot\\sqrt{2})=0$$.\n- Step 3: $$\\theta=90°$$ — the planes are perpendicular.\n\nThis is a quick sanity check: when normals are perpendicular, planes meet at a right angle.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "A line lies on a plane $$\\Pi$$. Show that $$\\mathbf{b}\\cdot\\mathbf{n}=0$$ where $$\\mathbf{b}$$ is the line direction and $$\\mathbf{n}$$ is the plane normal, and explain its meaning. (3 steps)", "answer": "- Step 1: Take two points $$P$$ and $$Q$$ on the line. Since both lie in the plane: $$\\mathbf{p}\\cdot\\mathbf{n}=p$$ and $$\\mathbf{q}\\cdot\\mathbf{n}=p$$.\n- Step 2: Subtract: $$(\\mathbf{q}-\\mathbf{p})\\cdot\\mathbf{n}=0$$. But $$\\mathbf{q}-\\mathbf{p}$$ is parallel to the line direction $$\\mathbf{b}$$.\n- Step 3: So $$\\mathbf{b}\\cdot\\mathbf{n}=0$$ — the line direction is perpendicular to the plane's normal, which is the geometric statement that \"$$\\mathbf{b}$$ lies parallel to the plane.\"\n\nThis is the test for line containment / parallelism.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "A plane has normal $$\\mathbf{n}=2\\mathbf{i}-\\mathbf{j}+2\\mathbf{k}$$ and passes through $$(1,0,1)$$. Quickly find its scalar product equation and Cartesian form. (3 steps)", "answer": "- Step 1: Scalar product form uses $$\\mathbf{r}\\cdot\\mathbf{n}=\\mathbf{a}\\cdot\\mathbf{n}$$. Compute $$\\mathbf{a}\\cdot\\mathbf{n}=(1)(2)+(0)(-1)+(1)(2)=4$$.\n- Step 2: So $$\\mathbf{r}\\cdot(2\\mathbf{i}-\\mathbf{j}+2\\mathbf{k})=4$$.\n- Step 3: Cartesian form (read off coefficients of $$\\mathbf{r}=(x,y,z)$$ component): $$2x-y+2z=4$$.\n\nThis conversion takes seconds once the pattern is internalised.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "A point $$P(1,1,1)$$ and a plane $$\\mathbf{r}\\cdot(2\\mathbf{i}-\\mathbf{j}+2\\mathbf{k})=6$$. What is the perpendicular distance? (3 steps)", "answer": "- Step 1: Compute $$\\mathbf{p}\\cdot\\mathbf{n}=2-1+2=3$$. The plane has $$p=6$$. Numerator: $$|\\mathbf{p}\\cdot\\mathbf{n}-p|=|3-6|=3$$.\n- Step 2: $$|\\mathbf{n}|=\\sqrt{4+1+4}=3$$.\n- Step 3: Distance = $$3/3=1$$.\n\nThe compact formula avoids the parallel-plane construction — simply: $$\\dfrac{|\\mathbf{p}\\cdot\\mathbf{n}-p|}{|\\mathbf{n}|}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "Why is the volume of the tetrahedron *one-sixth* of the parallelepiped (and *not* one-quarter, say)?", "answer": "- Step 1: A parallelepiped, like a box, has six \"trihedral corners.\" But the tetrahedron isn't carved out from one corner of the parallelepiped directly.\n- Step 2: A parallelepiped can be decomposed into *three* equal-volume tetrahedra (or six tetrahedra, depending on choice of cuts) along its diagonals — a classical result.\n- Step 3: The factor $$\\tfrac{1}{6}$$ comes more cleanly from the formula derivation: $$V_{\\text{tet}}=\\tfrac{1}{3}\\cdot\\tfrac{1}{2}|\\mathbf{b}\\times\\mathbf{c}|\\cdot h=\\tfrac{1}{6}|\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})|$$, where $$\\tfrac{1}{3}$$ is the pyramid factor and $$\\tfrac{1}{2}$$ is the triangle vs parallelogram factor.\n\nSo $$\\tfrac{1}{6}=\\tfrac{1}{3}\\cdot\\tfrac{1}{2}$$ — pyramid times triangle.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "If three vectors satisfy $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=0$$, must one of them be zero? (3 steps)", "answer": "- Step 1: No — the condition only forces them to be *coplanar*, not zero.\n- Step 2: For example: $$\\mathbf{a}=\\mathbf{i},\\mathbf{b}=\\mathbf{j},\\mathbf{c}=\\mathbf{i}+\\mathbf{j}$$ are all non-zero, but all lie in the $$xy$$-plane, so the parallelepiped is flat with zero volume.\n- Step 3: The correct interpretation: $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=0$$ ⟺ $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$ are linearly dependent (coplanar) — but each individually can be non-zero.\n\nThis is the standard test for coplanarity in 3D.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "Synthesis: A plane passes through three points $$A,B,C$$. How would you find the perpendicular distance from a fourth point $$D$$ to that plane? (5 steps)", "answer": "- Step 1: Find two vectors in the plane: $$\\overrightarrow{AB}=\\mathbf{b}-\\mathbf{a}$$, $$\\overrightarrow{AC}=\\mathbf{c}-\\mathbf{a}$$.\n- Step 2: Compute the normal $$\\mathbf{n}=\\overrightarrow{AB}\\times\\overrightarrow{AC}$$.\n- Step 3: Form the plane equation $$\\mathbf{r}\\cdot\\mathbf{n}=\\mathbf{a}\\cdot\\mathbf{n}$$.\n- Step 4: Compute distance from $$D$$ (position $$\\mathbf{d}$$) to the plane: $$\\dfrac{|\\mathbf{d}\\cdot\\mathbf{n}-\\mathbf{a}\\cdot\\mathbf{n}|}{|\\mathbf{n}|}=\\dfrac{|(\\mathbf{d}-\\mathbf{a})\\cdot\\mathbf{n}|}{|\\mathbf{n}|}$$.\n- Step 5: Equivalently, this is $$\\dfrac{|(\\mathbf{d}-\\mathbf{a})\\cdot(\\overrightarrow{AB}\\times\\overrightarrow{AC})|}{|\\overrightarrow{AB}\\times\\overrightarrow{AC}|}$$ — a nice unified formula.\n\nThe numerator is a scalar triple product (six times the tetrahedron volume); the denominator is twice the triangle area; their ratio is \"3 × (volume / area) = height.\"", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": true}, {"question": "Why does the formula \"distance from $$D$$ to plane $$ABC$$\" connect to tetrahedron volume? (3 steps)", "answer": "- Step 1: The tetrahedron $$ABCD$$ has volume $$V=\\tfrac{1}{6}|(\\mathbf{d}-\\mathbf{a})\\cdot(\\overrightarrow{AB}\\times\\overrightarrow{AC})|$$.\n- Step 2: Alternatively, $$V=\\tfrac{1}{3}\\cdot\\text{(area of base }ABC)\\cdot h=\\tfrac{1}{3}\\cdot\\tfrac{1}{2}|\\overrightarrow{AB}\\times\\overrightarrow{AC}|\\cdot h$$.\n- Step 3: Equating: $$h=\\dfrac{|(\\mathbf{d}-\\mathbf{a})\\cdot(\\overrightarrow{AB}\\times\\overrightarrow{AC})|}{|\\overrightarrow{AB}\\times\\overrightarrow{AC}|}$$ — exactly the perpendicular distance from $$D$$ to plane $$ABC$$.\n\nVolume formulas and distance formulas are two sides of the same coin.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": true}, {"question": "Without computing, why must any tetrahedron with three mutually perpendicular edges of equal length $$a$$ from one vertex have volume $$a^3/6$$? (3 steps)", "answer": "- Step 1: Choose the vertex as origin and edges along $$\\mathbf{i}, \\mathbf{j}, \\mathbf{k}$$ scaled by $$a$$.\n- Step 2: Scalar triple product: $$(a\\mathbf{i})\\cdot((a\\mathbf{j})\\times(a\\mathbf{k}))=a\\mathbf{i}\\cdot(a^2\\mathbf{i})=a^3$$.\n- Step 3: Volume = $$\\tfrac{1}{6}|a^3|=a^3/6$$.\n\nThis is the \"corner-cut\" tetrahedron — useful as a mental benchmark.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": true}, {"question": "What is a \"skew\" pair of lines, intuitively, and why are they only possible in three or more dimensions?", "answer": "- Step 1: Skew lines are pairs that are *not parallel* and *do not intersect*.\n- Step 2: In 2D (a plane), any two non-parallel lines must meet (no third dimension to \"miss\" each other).\n- Step 3: In 3D, two non-parallel lines can pass over and under each other — they aim in different directions but never share a point.\n\nSkew lines are a signature 3D phenomenon. Recognising them is essential before applying the cross-product distance formula.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "Why does the line equation form $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$ work for any choice of point $$\\mathbf{a}$$ on the line, and any non-zero scalar multiple of $$\\mathbf{b}$$?", "answer": "- Step 1: Any point on the line could be chosen as the \"anchor\" — the equation $$(\\mathbf{r}-\\mathbf{a}')\\times\\mathbf{b}=\\mathbf{0}$$ for a different anchor $$\\mathbf{a}'$$ describes the same set of points, since the parallelism condition is unchanged.\n- Step 2: Replacing $$\\mathbf{b}$$ with $$k\\mathbf{b}$$ ($$k\\ne 0$$): $$(\\mathbf{r}-\\mathbf{a})\\times(k\\mathbf{b})=k\\,(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}$$. Setting equal to $$\\mathbf{0}$$ gives the same equation (since $$k\\ne 0$$).\n- Step 3: So multiple \"valid\" forms exist for the same line — geometrically a single object, algebraically a family of equivalent equations.\n\nThis non-uniqueness is similar to how a line has infinite parametric forms.", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": true}, {"question": "Misconception probe: A student writes \"since cross product is distributive, $$(a\\mathbf{u})\\times(b\\mathbf{v})=ab(\\mathbf{u}\\times\\mathbf{v})$$.\" Is this correct?", "answer": "- Step 1: Yes, this is correct, but it relies on more than just distributivity — it uses *bilinearity*.\n- Step 2: Specifically: $$(a\\mathbf{u})\\times\\mathbf{v}=a(\\mathbf{u}\\times\\mathbf{v})$$ (scalar pulls out of the first slot), and similarly the second slot. Combining: $$(a\\mathbf{u})\\times(b\\mathbf{v})=a(\\mathbf{u}\\times(b\\mathbf{v}))=ab(\\mathbf{u}\\times\\mathbf{v})$$.\n- Step 3: This is why, for example, $$(2\\mathbf{i})\\times(3\\mathbf{j})=6\\mathbf{k}$$ — direct calculation gives the same answer as factoring out scalars.\n\nBoth distributivity (over addition) and scalar-extraction (over multiplication) are crucial properties to use freely.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": true}, {"question": "A common confusion: which of $$\\mathbf{a}\\cdot\\mathbf{b}, \\mathbf{a}\\times\\mathbf{b}, |\\mathbf{a}\\times\\mathbf{b}|, |\\mathbf{a}|\\cdot|\\mathbf{b}|$$ are scalars? Which are vectors? (3 steps)", "answer": "- Step 1: $$\\mathbf{a}\\cdot\\mathbf{b}$$ — scalar (dot product). Numerical value, can be negative or zero.\n- Step 2: $$\\mathbf{a}\\times\\mathbf{b}$$ — vector. Has direction and magnitude.\n- Step 3: $$|\\mathbf{a}\\times\\mathbf{b}|$$ — scalar (magnitude of a vector). Always non-negative.\n+ $$|\\mathbf{a}|\\cdot|\\mathbf{b}|$$ — scalar (product of two scalars). Always non-negative.\n\nDon't write expressions like \"$$\\mathbf{a}\\times\\mathbf{b}+\\mathbf{a}\\cdot\\mathbf{b}$$\" — that adds a vector to a scalar (nonsense).", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": true}, {"question": "Two parallel lines $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$ and $$\\mathbf{r}=\\mathbf{c}+\\mu\\mathbf{b}$$ (same direction $$\\mathbf{b}$$). Why doesn't the skew-line formula work, and how do you find the distance between them? (4 steps)", "answer": "- Step 1: The skew formula uses $$\\mathbf{b}\\times\\mathbf{d}$$ in the denominator — but here both lines share $$\\mathbf{b}$$, so $$\\mathbf{b}\\times\\mathbf{b}=\\mathbf{0}$$ (division by zero).\n- Step 2: Instead, use the connecting vector $$\\overrightarrow{PQ}=\\mathbf{c}-\\mathbf{a}$$ between any two points (one on each line).\n- Step 3: Project out the component of $$\\overrightarrow{PQ}$$ along the shared direction $$\\mathbf{b}$$ (parallel component); the remaining perpendicular component's length is the distance.\n- Step 4: Compactly: distance $$=\\dfrac{|(\\mathbf{c}-\\mathbf{a})\\times\\mathbf{b}|}{|\\mathbf{b}|}$$ — geometrically, the area of the parallelogram with sides $$(\\mathbf{c}-\\mathbf{a})$$ and $$\\mathbf{b}$$, divided by the base length.\n\nThe \"area / base = height\" trick.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": true}, {"question": "Synthesis: How are the formulas for \"area of triangle ABC,\" \"volume of tetrahedron ABCD,\" and \"shortest distance between skew lines\" all related?", "answer": "- Step 1: All three involve cross products and/or scalar triple products — they're all built from area/volume principles.\n- Step 2: Triangle area $$=\\tfrac{1}{2}|\\overrightarrow{AB}\\times\\overrightarrow{AC}|$$ — half of a parallelogram area (cross product magnitude).\n- Step 3: Tetrahedron volume $$=\\tfrac{1}{6}|\\overrightarrow{AB}\\cdot(\\overrightarrow{AC}\\times\\overrightarrow{AD})|$$ — sixth of a parallelepiped volume (scalar triple product magnitude).\n+ Skew distance $$=\\dfrac{|(\\mathbf{a}-\\mathbf{c})\\cdot(\\mathbf{b}\\times\\mathbf{d})|}{|\\mathbf{b}\\times\\mathbf{d}|}$$ — this is volume / parallelogram-area = height.\n\nThe recurring theme: **scalar triple product gives volume; cross-product magnitude gives area; their ratio gives height/distance.**", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": true}, {"question": "Mental drill: Compute $$(\\mathbf{i}+\\mathbf{j})\\times(\\mathbf{i}-\\mathbf{j})$$ without a determinant. (3 steps)", "answer": "- Step 1: Distribute: $$(\\mathbf{i}+\\mathbf{j})\\times(\\mathbf{i}-\\mathbf{j})=\\mathbf{i}\\times\\mathbf{i}-\\mathbf{i}\\times\\mathbf{j}+\\mathbf{j}\\times\\mathbf{i}-\\mathbf{j}\\times\\mathbf{j}$$.\n- Step 2: Replace: $$\\mathbf{i}\\times\\mathbf{i}=\\mathbf{0}$$, $$\\mathbf{j}\\times\\mathbf{j}=\\mathbf{0}$$, $$\\mathbf{i}\\times\\mathbf{j}=\\mathbf{k}$$, $$\\mathbf{j}\\times\\mathbf{i}=-\\mathbf{k}$$.\n- Step 3: Combine: $$\\mathbf{0}-\\mathbf{k}+(-\\mathbf{k})-\\mathbf{0}=-2\\mathbf{k}$$.\n\nThe result $$-2\\mathbf{k}$$ matches the parallelogram area: vectors $$(1,1,0)$$ and $$(1,-1,0)$$ span a square of area 2 in the $$xy$$-plane; cross product points in $$-\\mathbf{k}$$ direction.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": true}, {"question": "Three planes meet at a common point. What conditions distinguish \"they meet at a single point\" from \"their intersection is a line\" from \"no common intersection\"?", "answer": "- Step 1: Three plane equations form a $$3\\times 3$$ linear system in $$x,y,z$$.\n- Step 2: \n+ Unique point: the three normals $$\\mathbf{n}_1,\\mathbf{n}_2,\\mathbf{n}_3$$ are linearly independent (i.e., $$\\mathbf{n}_1\\cdot(\\mathbf{n}_2\\times\\mathbf{n}_3)\\ne 0$$).\n+ Line of intersection: two of the normals are independent, but the third lies in their span — and the system is consistent.\n+ No common point: the normals are dependent but the system is inconsistent (parallel planes that don't coincide).\n- Step 3: The scalar triple product $$\\mathbf{n}_1\\cdot(\\mathbf{n}_2\\times\\mathbf{n}_3)$$ controls the type of solution — non-zero ⇒ unique point.\n\nThis is precisely the determinant condition for solvability of $$3\\times 3$$ systems.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": true}, {"question": "A plane $$\\Pi$$ contains the line $$l: \\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$ and a separate point $$P$$ (with position $$\\mathbf{p}$$). How do you find the equation of $$\\Pi$$? (4 steps)", "answer": "- Step 1: $$\\Pi$$ contains the line, so $$\\mathbf{b}$$ is one direction in $$\\Pi$$.\n- Step 2: The vector from any point on the line to $$P$$, namely $$\\mathbf{p}-\\mathbf{a}$$, lies in $$\\Pi$$ (it connects two points of the plane).\n- Step 3: A n e $$l$$ meets a plane $$\\Pi$$ at exactly one point $$P$$. How do you find:\n(i) the angle between $$l$$ and $$\\Pi$$,\n(ii) the coordinates of $$P$$? (Outline both procedures, 4 steps total)", "answer": "- Step 1: For the angle: identify the line direction $$\\mathbf{b}$$ and plane normal $$\\mathbf{n}$$. Compute $$\\sin\\theta=|\\mathbf{b}\\cdot\\mathbf{n}|/(|\\mathbf{b}||\\mathbf{n}|)$$ — this gives the line-plane angle.\n- Step 2: The \"$$\\sin$$ not $$\\cos$$\" detail: since $$\\mathbf{b}\\cdot\\mathbf{n}$$ relates to the line-normal angle, the line-plane angle (its complement) uses sine.\n- Step 3: For the point of intersection: parameterise the line as $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$ and substitute into the plane equation $$\\mathbf{r}\\cdot\\mathbf{n}=p$$.\n- Step 4: Solve for the single value of $$\\lambda$$, then plug back into the line to get $$P$$'s coordinates.\n\nThe two computations are independent — angle and intersection point answer different questions about the same configuration.", "source": "Opus 4.7 ①", "_id": "opus_1_79", "judge_pick": false}, {"question": "Volume mental check: A box has edges $$\\mathbf{i}, 2\\mathbf{j}, 3\\mathbf{k}$$ — what is its volume by scalar triple product?", "answer": "- Step 1: $$\\mathbf{i}\\cdot(2\\mathbf{j}\\times 3\\mathbf{k})=\\mathbf{i}\\cdot(6(\\mathbf{j}\\times\\mathbf{k}))=\\mathbf{i}\\cdot 6\\mathbf{i}=6$$.\n- Step 2: Volume $$=|6|=6$$.\n- Step 3: Sanity check: this is a rectangular box with sides $$1,2,3$$ — volume $$=1\\cdot 2\\cdot 3=6$$. ✓\n\nThe scalar triple product reduces to ordinary multiplication when edges are along coordinate axes.", "source": "Opus 4.7 ①", "_id": "opus_1_80", "judge_pick": true}, {"question": "Misconception probe: A student says \"since $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=\\mathbf{b}\\cdot(\\mathbf{c}\\times\\mathbf{a})$$, the cross product is commutative.\" What's wrong?", "answer": "- Step 1: The cyclic identity $$\\mathbf{a}\\cdot(\\mathbf{b}\ const SK='fp3_ch05';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}
