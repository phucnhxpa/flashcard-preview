 Three plane equations form a $$3\\times 3$$ linear system in $$x,y,z$$.\n- Step 2: \n+ Unique point: the three normals $$\\mathbf{n}_1,\\mathbf{n}_2,\\mathbf{n}_3$$ are linearly independent (i.e., $$\\mathbf{n}_1\\cdot(\\mathbf{n}_2\\times\\mathbf{n}_3)\\ne 0$$).\n+ Line of intersection: two of the normals are independent, but the third lies in their span — and the system is consistent.\n+ No common point: the normals are dependent but the system is inconsistent (parallel planes that don't coincide).\n- Step 3: The scalar triple product $$\\mathbf{n}_1\\cdot(\\mathbf{n}_2\\times\\mathbf{n}_3)$$ controls the type of solution — non-zero ⇒ unique point.\n\nThis is precisely the determinant condition for solvability of $$3\\times 3$$ systems.", "source": "Opus 4.7 ①", "_id": "opus_1_72"}, {"question": "For parallel lines $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$ and $$\\mathbf{r} = \\mathbf{c} + \\mu\\mathbf{b}$$, why does the skew lines distance formula fail, and what is the conceptual method to find the shortest distance instead? (3 steps)", "answer": "- Step 1: The formula fails because $$\\mathbf{b} \\times \\mathbf{b} = \\mathbf{0}$$, leading to division by zero. Since the lines are parallel, there isn't a unique common perpendicular *direction* in the same sense—any direction perpendicular to $\\mathbf{b}$ works.\n- Step 2: Pick a point on one line, say $\\mathbf{a}$. The shortest distance is the perpendicular distance from point $\\mathbf{a}$ to the second line.\n- Step 3: The vector from the second line's point $\\mathbf{c}$ to $\\mathbf{a}$ is $$\\mathbf{a} - \\mathbf{c}$$. The component of this vector parallel to $\\mathbf{b}$ is $$\\frac{(\\mathbf{a}-\\mathbf{c})\\cdot\\mathbf{b}}{|\\mathbf{b}|^2}\\mathbf{b}$$. The perpendicular component (which is the shortest distance) can be found using Pythagoras: $$\\sqrt{|\\mathbf{a}-\\mathbf{c}|^2 - \\left(\\frac{(\\mathbf{a}-\\mathbf{c})\\cdot\\mathbf{b}}{|\\mathbf{b}|}\\right)^2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "A parallelepiped is formed by three vectors $$\\mathbf{a}$$, $$\\mathbf{b}$$, and $$\\mathbf{c}$$ originating from the same vertex. How does the scalar triple product $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$ represent the volume of this solid? Walk through the geometric reasoning using base area and height. (4 steps)", "answer": "- Step 1: Consider the face formed by vectors $$\\mathbf{b}$$ and $$\\mathbf{c}$$ as the base of the parallelepiped. The area of this base is the magnitude of their cross product: Area $$= |\\mathbf{b} \\times \\mathbf{c}|$$.\n- Step 2: The vector $$\\mathbf{b} \\times \\mathbf{c}$$ is perpendicular to the base. The height $$h$$ of the parallelepiped is the component of vector $$\\mathbf{a}$$ in the direction of this perpendicular.\n- Step 3: The volume is Base Area $$\\times$$ Height. The height is given by $$h = |\\mathbf{a}|\\cos\\phi$$, where $$\\phi$$ is the angle between $$\\mathbf{a}$$ and $$\\mathbf{b} \\times \\mathbf{c}$$.\n- Step 4: Therefore, Volume $$= |\\mathbf{b} \\times \\mathbf{c}| \\times |\\mathbf{a}|\\cos\\phi = \\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$. We take the absolute value $$|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$ to ensure the volume is positive, as the dot product can be negative if the angle $$\\phi$$ is obtuse.", "source": "GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "How do you find the line of intersection of two planes? (4 steps)", "answer": "- Step 1: Approach 1 (algebraic): write both planes in Cartesian form, treat them as two equations in three unknowns $$x,y,z$$. Eliminate one variable, parameterise another (e.g., set $$y=\\lambda$$), express remaining variables in terms of the parameter. Then write the answer in vector form $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$.\n- Step 2: Approach 2 (geometric): the *direction* of the intersection line is $$\\mathbf{n}_1\\times\\mathbf{n}_2$$ (perpendicular to both normals, hence parallel to both planes).\n- Step 3: For a *point* on the line, find any solution to both plane equations (e.g., set $$z=0$$ and solve the two-variable system).\n- Step 4: Combine: $$\\mathbf{r}=\\text{point}+\\lambda(\\mathbf{n}_1\\times\\mathbf{n}_2)$$.\n\nApproach 2 is faster once you understand why the direction is the cross product of normals.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "State all three ways for $$\\mathbf{a}\\times\\mathbf{b}=\\mathbf{0}$$ to occur, and contrast this with the meaning of $$\\mathbf{a}\\cdot\\mathbf{b}=0$$.", "answer": "- Step 1: $$\\mathbf{a}\\times\\mathbf{b}=\\mathbf{0}$$ requires $$|\\mathbf{a}||\\mathbf{b}|\\sin\\theta=0$$, which gives three possibilities:\n+ $$\\mathbf{a}=\\mathbf{0}$$ (zero magnitude)\n+ $$\\mathbf{b}=\\mathbf{0}$$ (zero magnitude)\n+ $$\\sin\\theta=0$$, i.e. $$\\theta=0°$$ or $$180°$$ — the vectors are *parallel*.\n- Step 2: In contrast, $$\\mathbf{a}\\cdot\\mathbf{b}=0$$ (with both non-zero) means the vectors are *perpendicular*.\n- Step 3: Memory hook: cross product zero = parallel; dot product zero = perpendicular. They detect opposite geometric relationships.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Edge case probe: What if you try to apply $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$ with $$\\mathbf{b}=\\mathbf{0}$$? What does the equation describe?", "answer": "- Step 1: With $$\\mathbf{b}=\\mathbf{0}$$, every cross product $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{0}=\\mathbf{0}$$ regardless of $$\\mathbf{r}$$ — the equation is trivially satisfied for all points in space.\n- Step 2: This isn't a line — it's all of $$\\mathbb{R}^3$$ (no constraint).\n- Step 3: The form $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$ requires $$\\mathbf{b}\\ne\\mathbf{0}$$ to specify a direction. A line *needs* a non-zero direction vector.\n\nAlways check that the direction vector is non-zero when setting up line equations.", "source": "Opus 4.7 ①", "_id": "opus_1_74"}, {"question": "If a vector is repeated in a scalar triple product, for instance $$\\mathbf{a} \\cdot (\\mathbf{a} \\times \\mathbf{b})$$, the result is always zero. Explain this result from two different perspectives: one using the properties of the cross product, and one using the geometric meaning of the scalar triple product. (3 steps)", "answer": "- Step 1: **Algebraic perspective:** The cross product $$\\mathbf{a} \\times \\mathbf{b}$$ produces a vector that is perpendicular to both $$\\mathbf{a}$$ and $$\\mathbf{b}$$. When you take the dot product of $$\\mathbf{a}$$ with $$\\mathbf{a} \\times \\mathbf{b}$$, you are taking the dot product of two perpendicular vectors, which is always zero.\n- Step 2: **Geometric perspective:** The scalar triple product represents the volume of a parallelepiped. If two of the defining vectors are the same, the parallelepiped collapses into a flat parallelogram (it has no height).\n- Step 3: A flat shape has zero volume, so the scalar triple product must be zero. This applies to any repeated vector, e.g., $$\\mathbf{b} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_12"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "The scalar product of two vectors yields a scalar based on the cosine of the angle between them. What type of quantity does the vector (cross) product yield, and how does its magnitude relate to the angle between the vectors? What determines the direction of the resulting vector? (3 steps)", "answer": "- Step 1: Unlike the scalar product which yields a scalar, the vector product yields a **vector**. This vector has both magnitude and direction, making it a directed quantity in 3D space.\n- Step 2: The magnitude of the vector product $$\\mathbf{a} \\times \\mathbf{b}$$ is given by $$|\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$, where $$\\theta$$ is the angle between $$\\mathbf{a}$$ and $$\\mathbf{b}$$. Notice that this involves the sine of the angle, not the cosine. This magnitude corresponds to the area of the parallelogram formed by the two vectors.\n- Step 3: The direction of the resulting vector is perpendicular to both $$\\mathbf{a}$$ and $$\\mathbf{b}$$, pointing in the direction of the unit vector $$\\hat{\\mathbf{n}}$$. The specific orientation of $$\\hat{\\mathbf{n}}$$ is determined by the right-hand rule: if you curl the fingers of your right hand from $$\\mathbf{a}$$ to $$\\mathbf{b}$$, your thumb points in the direction of $$\\mathbf{a} \\times \\mathbf{b}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Two vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$ have an angle $$\\theta$$ between them. The vector product $$\\mathbf{a} \\times \\mathbf{b}$$ produces a vector in the direction of the unit vector $$\\hat{\\mathbf{n}}$$. What is the direction of $$\\mathbf{b} \\times \\mathbf{a}$$, and why does this make the vector product anti-commutative? (3 steps)", "answer": "- Step 1: The direction of $$\\mathbf{b} \\times \\mathbf{a}$$ is found by applying the right-hand rule from $$\\mathbf{b}$$ to $$\\mathbf{a}$$. This is the opposite rotational sense compared to going from $$\\mathbf{a}$$ to $$\\mathbf{b}$$, so the resulting vector points in the opposite direction, which is $$-\\hat{\\mathbf{n}}$$.\n- Step 2: The magnitude remains the same because $$|\\mathbf{b}||\\mathbf{a}|\\sin\\theta = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$. Therefore, $$\\mathbf{b} \\times \\mathbf{a} = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta (-\\hat{\\mathbf{n}}) = -(|\\mathbf{a}||\\mathbf{b}|\\sin\\theta \\hat{\\mathbf{n}})$$.\n- Step 3: This leads directly to the anti-commutative property: $$\\mathbf{b} \\times \\mathbf{a} = -\\mathbf{a} \\times \\mathbf{b}$$. The order of multiplication strictly matters for the vector product, unlike the scalar product where $$\\mathbf{a} \\cdot \\mathbf{b} = \\mathbf{b} \\cdot \\mathbf{a}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Consider the standard unit vectors $$\\mathbf{i}$$, $$\\mathbf{j}$$, $$\\mathbf{k}$$. What is the result of $$\\mathbf{i} \\times \\mathbf{j}$$, and geometrically, why is $$\\mathbf{i} \\times \\mathbf{i}$$ equal to the zero vector? (2 steps)", "answer": "- Step 1: The vectors $$\\mathbf{i}$$ and $$\\mathbf{j}$$ are perpendicular unit vectors. The magnitude of their cross product is $$1 \\times 1 \\times \\sin 90^\\circ = 1$$. By the right-hand rule, curling from $$\\mathbf{i}$$ (x-axis) towards $$\\mathbf{j}$$ (y-axis) makes the thumb point along the z-axis. Thus, $$\\mathbf{i} \\times \\mathbf{j} = \\mathbf{k}$$. Similarly, $$\\mathbf{j} \\times \\mathbf{k} = \\mathbf{i}$$ and $$\\mathbf{k} \\times \\mathbf{i} = \\mathbf{j}$$.\n- Step 2: For $$\\mathbf{i} \\times \\mathbf{i}$$, the angle between the vector and itself is $$0^\\circ$$. Since $$\\sin 0^\\circ = 0$$, the magnitude of the cross product is 0. A vector with zero magnitude is the zero vector, so $$\\mathbf{i} \\times \\mathbf{i} = \\mathbf{0}$$. The same logic applies to $$\\mathbf{j} \\times \\mathbf{j} = \\mathbf{0}$$ and $$\\mathbf{k} \\times \\mathbf{k} = \\mathbf{0}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Given two vectors $$\\mathbf{a} = a_1\\mathbf{i} + a_2\\mathbf{j} + a_3\\mathbf{k}$$ and $$\\mathbf{b} = b_1\\mathbf{i} + b_2\\mathbf{j} + b_3\\mathbf{k}$$, the vector product can be computed using a 3x3 determinant. What is the structure of this determinant, and why does the middle term (the $$\\mathbf{j}$$-component) have a negative sign in the expansion? (3 steps)", "answer": "- Step 1: The determinant is structured with the unit vectors in the top row, the components of the first vector $$\\mathbf{a}$$ in the middle row, and the components of the second vector $$\\mathbf{b}$$ in the bottom row:\n$$\\mathbf{a} \\times \\mathbf{b} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3 \\end{vmatrix}$$\n- Step 2: Expanding along the top row using cofactors, we get:\n$$\\mathbf{i}(a_2b_3 - a_3b_2) - \\mathbf{j}(a_1b_3 - a_3b_1) + \\mathbf{k}(a_1b_2 - a_2b_1)$$\n- Step 3: The negative sign before the $$\\mathbf{j}$$ term comes from the standard rules of determinant expansion (cofactor expansion). The element $$\\mathbf{j}$$ is in the first row and second column. The sign associated with this position is $$(-1)^{1+2} = -1$$. This negative sign is crucial; omitting it is a common error that completely changes the resulting vector's direction.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "If the vector product of two non-zero vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$ is the zero vector, what geometric relationship must $$\\mathbf{a}$$ and $$\\mathbf{b}$$ share, and why? (2 steps)", "answer": "- Step 1: The magnitude of the cross product is $$|\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$. If the vectors are non-zero, their magnitudes are positive. For the cross product to be the zero vector, its magnitude must be zero, meaning $$|\\mathbf{a}||\\mathbf{b}|\\sin\\theta = 0$$.\n- Step 2: Since $$|\\mathbf{a}|$$ and $$|\\mathbf{b}|$$ are non-zero, it must be that $$\\sin\\theta = 0$$. This implies that the angle $$\\theta$$ between them is either $$0^\\circ$$ or $$180^\\circ$$. Therefore, the two vectors must be **parallel** (they could be pointing in the same or opposite directions). This is a useful test for parallelism.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "You are given two non-parallel vectors in 3D space. How can you construct a vector that is guaranteed to be perpendicular to both, and how would you convert this into a unit vector? (3 steps)", "answer": "- Step 1: The vector product of the two vectors, $$\\mathbf{a} \\times \\mathbf{b}$$, is defined as being perpendicular to both $$\\mathbf{a}$$ and $$\\mathbf{b}$$ by the right-hand rule. Thus, computing the cross product immediately gives a perpendicular vector.\n- Step 2: To verify, you can check that the dot product of the resulting vector with both $$\\mathbf{a}$$ and $$\\mathbf{b}$$ is zero.\n- Step 3: To convert this into a unit vector, divide the cross product vector by its magnitude. The formula is $$\\hat{\\mathbf{n}} = \\frac{\\mathbf{a} \\times \\mathbf{b}}{|\\mathbf{a} \\times \\mathbf{b}|}$$. This ensures the resulting vector has a magnitude of 1 while maintaining the perpendicular direction.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "The dot product gives $$\\mathbf{a} \\cdot \\mathbf{b} = |\\mathbf{a}||\\mathbf{b}|\\cos\\theta$$. How can you use the magnitude of the vector product, $$|\\mathbf{a} \\times \\mathbf{b}|$$, to find $$\\sin\\theta$$ for the angle between $$\\mathbf{a}$$ and $$\\mathbf{b}$$? What is a potential ambiguity when using this method compared to the dot product? (3 steps)", "answer": "- Step 1: From the definition of the vector product, $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$. Rearranging this gives the formula for the sine of the angle: $$\\sin\\theta = \\frac{|\\mathbf{a} \\times \\mathbf{b}|}{|\\mathbf{a}||\\mathbf{b}|}$$.\n- Step 2: A potential ambiguity arises because $$\\sin\\theta = \\sin(180^\\circ - \\theta)$$. If you find $$\\sin\\theta = 0.5$$, the angle could be $$30^\\circ$$ (acute) or $$150^\\circ$$ (obtuse). The vector product magnitude alone cannot distinguish between these two cases.\n- Step 3: In contrast, the dot product gives $$\\cos\\theta$$. Since $$\\cos\\theta$$ is positive for acute angles and negative for obtuse angles, it immediately reveals whether the angle is acute or obtuse without ambiguity. Therefore, the dot product is usually preferred for finding angles unless specifically asked for $$\\sin\\theta$$.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Triangle $$OAB$$ has vertices at the origin $$O$$, and points $$A$$ and $$B$$ with position vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$. How does the definition of the vector product directly give you the area of this triangle? (2 steps)", "answer": "- Step 1: The standard formula for the area of a triangle is $$\\frac{1}{2}ab\\sin C$$, where $$a$$ and $$b$$ are the lengths of two sides and $$C$$ is the included angle. Here, the side lengths are $$|\\mathbf{a}|$$ and $$|\\mathbf{b}|$$, and the included angle is $$\\theta$$.\n- Step 2: Substituting these into the formula gives Area $$= \\frac{1}{2}|\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$. The magnitude of the vector product is $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$. Therefore, the area of the triangle is exactly half the magnitude of the cross product: Area $$= \\frac{1}{2}|\\mathbf{a} \\times \\mathbf{b}|$$.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Triangle $$ABC$$ has vertices with position vectors $$\\mathbf{a}$$, $$\\mathbf{b}$$, and $$\\mathbf{c}$$. How do you adapt the area formula using the vector product to find the area of this triangle, which is not at the origin? (3 steps)", "answer": "- Step 1: Shift the triangle so that one vertex, say $$A$$, acts as the local origin. The vectors representing the sides emanating from $$A$$ are $$\\overrightarrow{AB} = \\mathbf{b} - \\mathbf{a}$$ and $$\\overrightarrow{AC} = \\mathbf{c} - \\mathbf{a}$$.\n- Step 2: The area of the triangle is half the magnitude of the cross product of these two side vectors: Area $$= \\frac{1}{2}|\\overrightarrow{AB} \\times \\overrightarrow{AC}| = \\frac{1}{2}|(\\mathbf{b} - \\mathbf{a}) \\times (\\mathbf{c} - \\mathbf{a})|$$.\n- Step 3: If you expand the cross product using distributivity and the anti-commutative rule, you get an elegant symmetric form: Area $$= \\frac{1}{2}|(\\mathbf{a} \\times \\mathbf{b}) + (\\mathbf{b} \\times \\mathbf{c}) + (\\mathbf{c} \\times \\mathbf{a})|$$. This form is cyclic and does not favor any specific vertex as the \"origin\".", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "A parallelogram is made up of two congruent triangles. How does this geometric fact relate the area of a parallelogram $$OABC$$ (with adjacent sides given by vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$) to the vector product? (2 steps)", "answer": "- Step 1: A parallelogram can be split along its diagonal into two congruent triangles. The area of the parallelogram is therefore twice the area of one of these triangles.\n- Step 2: Since the area of the triangle formed by vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$ is $$\\frac{1}{2}|\\mathbf{a} \\times \\mathbf{b}|$$, the area of the parallelogram is simply the full magnitude of the cross product: Area $$= |\\mathbf{a} \\times \\mathbf{b}|$$. For a parallelogram $$ABCD$$ with vertices at general positions, the area is $$|\\overrightarrow{AB} \\times \\overrightarrow{AD}|$$.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "The scalar triple product $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$ involves both a dot product and a cross product. What type of quantity is the result, and how can it be computed using a single 3x3 determinant? (2 steps)", "answer": "- Step 1: The result of a scalar triple product is a **scalar** (a single number). The cross product $$\\mathbf{b} \\times \\mathbf{c}$$ yields a vector, but the subsequent dot product with $$\\mathbf{a}$$ reduces it to a scalar.\n- Step 2: It can be computed directly as the determinant of a 3x3 matrix whose rows are the components of $$\\mathbf{a}$$, $$\\mathbf{b}$$, and $$\\mathbf{c}$$:\n$$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\begin{vmatrix} a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3 \\\\ c_1 & c_2 & c_3 \\end{vmatrix}$$\nThis provides a very efficient way to calculate the scalar triple product without computing intermediate vector components.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "The scalar triple product has a cyclic property: $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\mathbf{b} \\cdot (\\mathbf{c} \\times \\mathbf{a}) = \\mathbf{c} \\cdot (\\mathbf{a} \\times \\mathbf{b})$$. Explain the geometric intuition behind why swapping the vectors in this cyclic manner does not change the value. (3 steps)", "answer": "- Step 1: Geometrically, the absolute value of the scalar triple product represents the volume of the parallelepiped formed by the three vectors $$\\mathbf{a}$$, $$\\mathbf{b}$$, and $$\\mathbf{c}$$.\n- Step 2: The volume of a parallelepiped depends only on the base area and the height, not on which face you choose as the base. Choosing different vectors to form the base (e.g., using $$\\mathbf{b}$$ and $$\\mathbf{c}$$ vs. $$\\mathbf{c}$$ and $$\\mathbf{a}$$) simply selects a different face of the same solid.\n- Step 3: As long as the cyclic order (a->b->c) is maintained, the orientation (right-hand rule) remains consistent, so the sign stays the same. Therefore, the value remains identical. However, swapping two adjacent vectors (breaking the cycle) reverses the orientation and negates the result.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "If a vector is repeated in a scalar triple product, for instance $$\\mathbf{a} \\cdot (\\mathbf{a} \\times \\mathbf{b})$$, the result is always zero. Explain this result from two different perspectives: one using the properties of the cross product, and one using the geometric meaning of the scalar triple product. (3 steps)", "answer": "- Step 1: **Algebraic perspective:** The cross product $$\\mathbf{a} \\times \\mathbf{b}$$ produces a vector that is perpendicular to both $$\\mathbf{a}$$ and $$\\mathbf{b}$$. When you take the dot product of $$\\mathbf{a}$$ with $$\\mathbf{a} \\times \\mathbf{b}$$, you are taking the dot product of two perpendicular vectors, which is always zero.\n- Step 2: **Geometric perspective:** The scalar triple product represents the volume of a parallelepiped. If two of the defining vectors are the same, the parallelepiped collapses into a flat parallelogram (it has no height).\n- Step 3: A flat shape has zero volume, so the scalar triple product must be zero. This applies to any repeated vector, e.g., $$\\mathbf{b} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "A parallelepiped is formed by three vectors $$\\mathbf{a}$$, $$\\mathbf{b}$$, and $$\\mathbf{c}$$ originating from the same vertex. How does the scalar triple product $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$ represent the volume of this solid? Walk through the geometric reasoning using base area and height. (4 steps)", "answer": "- Step 1: Consider the face formed by vectors $$\\mathbf{b}$$ and $$\\mathbf{c}$$ as the base of the parallelepiped. The area of this base is the magnitude of their cross product: Area $$= |\\mathbf{b} \\times \\mathbf{c}|$$.\n- Step 2: The vector $$\\mathbf{b} \\times \\mathbf{c}$$ is perpendicular to the base. The height $$h$$ of the parallelepiped is the component of vector $$\\mathbf{a}$$ in the direction of this perpendicular.\n- Step 3: The volume is Base Area $$\\times$$ Height. The height is given by $$h = |\\mathbf{a}|\\cos\\phi$$, where $$\\phi$$ is the angle between $$\\mathbf{a}$$ and $$\\mathbf{b} \\times \\mathbf{c}$$.\n- Step 4: Therefore, Volume $$= |\\mathbf{b} \\times \\mathbf{c}| \\times |\\mathbf{a}|\\cos\\phi = \\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$. We take the absolute value $$|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$ to ensure the volume is positive, as the dot product can be negative if the angle $$\\phi$$ is obtuse.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "A tetrahedron is a pyramid with a triangular base. How does the volume of a tetrahedron $$OABC$$ relate to the volume of the parallelepiped formed by the same vectors $$\\mathbf{a}$$, $$\\mathbf{b}$$, and $$\\mathbf{c}$$? What is the formula for the tetrahedron's volume? (3 steps)", "answer": "- Step 1: A parallelepiped can be decomposed into 6 tetrahedra of equal volume. You can visualize this by looking at the main space diagonal; it splits the solid into two triangular prisms, and each prism splits into three tetrahedra.\n- Step 2: Alternatively, the volume of a pyramid is $$\\frac{1}{3} \\times \\text{Base Area} \\times \\text{Height}$$. For the tetrahedron, the base area is $$\\frac{1}{2}|\\mathbf{b} \\times \\mathbf{c}|$$ and the height is the same as the parallelepiped's.\n- Step 3: Comparing the pyramid formula ($$\\frac{1}{3} \\times \\frac{1}{2} \\times |\\mathbf{b} \\times \\mathbf{c}| \\times h$$) to the parallelepiped formula ($$1 \\times 1 \\times |\\mathbf{b} \\times \\mathbf{c}| \\times h$$), the tetrahedron's volume is exactly $$\\frac{1}{6}$$ of the parallelepiped's volume. Thus, Volume $$= \\frac{1}{6}|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Three vectors $$\\mathbf{a}$$, $$\\mathbf{b}$$, and $$\\mathbf{c}$$ all originate from the same point. What is the condition on the scalar triple product $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$ for these three vectors to be coplanar, and why does this make geometric sense? (3 steps)", "answer": "- Step 1: The condition for the vectors to be coplanar is that the scalar triple product equals zero: $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = 0$$.\n- Step 2: Geometrically, the scalar triple product represents the volume of the parallelepiped formed by the three vectors. If the vectors are coplanar, they all lie in the same flat plane.\n- Step 3: A flat shape has zero volume. Therefore, if the vectors are coplanar, the \"parallelepiped\" collapses into a flat parallelogram with zero height, resulting in a volume of zero. This is a crucial test for coplanarity.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "A line passes through point $$A$$ with position vector $$\\mathbf{a}$$ and is parallel to vector $$\\mathbf{b}$$. The position vector of a general point on the line is $$\\mathbf{r}$$. Explain why the vector $$(\\mathbf{r} - \\mathbf{a})$$ must be parallel to $$\\mathbf{b}$$, and how this leads to the cross product equation of the line: $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$. (3 steps)", "answer": "- Step 1: The vector from $$A$$ to the general point $$R$$ is $$\\overrightarrow{AR} = \\mathbf{r} - \\mathbf{a}$$. Since both $$A$$ and $$R$$ lie on the line, the vector $$\\overrightarrow{AR}$$ lies along the line.\n- Step 2: Because the line is parallel to $$\\mathbf{b}$$, any vector lying along the line must be a scalar multiple of $$\\mathbf{b}$$. Therefore, $$(\\mathbf{r} - \\mathbf{a})$$ is parallel to $$\\mathbf{b}$$.\n- Step 3: A key property of the cross product is that the cross product of two parallel vectors is the zero vector. Since $$(\\mathbf{r} - \\mathbf{a})$$ and $$\\mathbf{b}$$ are parallel, their cross product must be zero: $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$. This equation holds for any point $$\\mathbf{r}$$ on the line.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Starting from the equation $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$ for a line, show how this can be rearranged into the form $$\\mathbf{r} \\times \\mathbf{b} = \\mathbf{a} \\times \\mathbf{b}$$. What is the geometric significance of the vector $$\\mathbf{a} \\times \\mathbf{b}$$ in this equation? (3 steps)", "answer": "- Step 1: Expand the brackets using the distributive property of the cross product: $$\\mathbf{r} \\times \\mathbf{b} - \\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$.\n- Step 2: Rearrange the equation to isolate the term with $$\\mathbf{r}$$: $$\\mathbf{r} \\times \\mathbf{b} = \\mathbf{a} \\times \\mathbf{b}$$. This is an alternative, parameter-free vector equation of a line.\n- Step 3: The vector $$\\mathbf{a} \\times \\mathbf{b}$$ is a constant vector for the line. It is perpendicular to both the direction vector $$\\mathbf{b}$$ and the position vector $$\\mathbf{a}$$ of a point on the line. It encodes information about the line's distance and orientation relative to the origin.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "A line is given by $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$, where $$\\mathbf{a}$$ is a point on the line and $$\\mathbf{b}$$ is the direction vector. How do you convert this into the Cartesian form $$\\frac{x-x_1}{l} = \\frac{y-y_1}{m} = \\frac{z-z_1}{n}$$? (3 steps)", "answer": "- Step 1: If the cross product of two non-zero vectors is zero, one must be a scalar multiple of the other. Thus, $$(\\mathbf{r} - \\mathbf{a}) = \\lambda\\mathbf{b}$$, which is the parametric form of the line.\n- Step 2: Let $$\\mathbf{r} = x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$$, $$\\mathbf{a} = x_1\\mathbf{i} + y_1\\mathbf{j} + z_1\\mathbf{k}$$, and $$\\mathbf{b} = l\\mathbf{i} + m\\mathbf{j} + n\\mathbf{k}$$. Equating components gives: $$x - x_1 = \\lambda l$$, $$y - y_1 = \\lambda m$$, $$z - z_1 = \\lambda n$$.\n- Step 3: Make $$\\lambda$$ the subject in all three equations: $$\\lambda = \\frac{x-x_1}{l} = \\frac{y-y_1}{m} = \\frac{z-z_1}{n}$$. This is the Cartesian equation. It directly relates the coordinates $$x, y, z$$ of any point on the line without the parameter $$\\lambda$$.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A plane passes through point $$A$$ with position vector $$\\mathbf{a}$$, and has normal vector $$\\mathbf{n}$$. Let $$\\mathbf{r}$$ be the position vector of a general point on the plane. Explain why $$(\\mathbf{r} - \\mathbf{a})$$ is perpendicular to $$\\mathbf{n}$$, and how this leads to the scalar product equation $$\\mathbf{r} \\cdot \\mathbf{n} = p$$. (3 steps)", "answer": "- Step 1: The vector $$(\\mathbf{r} - \\mathbf{a})$$ represents a displacement within the plane (from point $$A$$ to point $$R$$). Since the normal vector $$\\mathbf{n}$$ is perpendicular to the plane, it must be perpendicular to every vector lying in the plane.\n- Step 2: When two vectors are perpendicular, their scalar product is zero. Therefore, $$(\\mathbf{r} - \\mathbf{a}) \\cdot \\mathbf{n} = 0$$.\n- Step 3: Expanding this gives $$\\mathbf{r} \\cdot \\mathbf{n} - \\mathbf{a} \\cdot \\mathbf{n} = 0$$, so $$\\mathbf{r} \\cdot \\mathbf{n} = \\mathbf{a} \\cdot \\mathbf{n}$$. Letting the scalar constant $$\\mathbf{a} \\cdot \\mathbf{n} = p$$, we get the standard scalar product form of a plane: $$\\mathbf{r} \\cdot \\mathbf{n} = p$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "Given the scalar product form of a plane $$\\mathbf{r} \\cdot \\mathbf{n} = p$$, where $$\\mathbf{n} = n_1\\mathbf{i} + n_2\\mathbf{j} + n_3\\mathbf{k}$$, how do you derive the general Cartesian equation of a plane $$ax + by + cz + d = 0$$? What is the relationship between the coefficients $$a, b, c$$ and the normal vector? (3 steps)", "answer": "- Step 1: Substitute $$\\mathbf{r} = x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$$ into the scalar product form: $$(x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}) \\cdot (n_1\\mathbf{i} + n_2\\mathbf{j} + n_3\\mathbf{k}) = p$$.\n- Step 2: Compute the dot product to get: $$n_1x + n_2y + n_3z = p$$, or equivalently $$n_1x + n_2y + n_3z - p = 0$$.\n- Step 3: This is in the form $$ax + by + cz + d = 0$$ where $$a = n_1$$, $$b = n_2$$, $$c = n_3$$, and $$d = -p$$. The crucial relationship is that the coefficients of $$x, y, z$$ in the Cartesian equation directly give the components of the normal vector to the plane: $$\\mathbf{n} = a\\mathbf{i} + b\\mathbf{j} + c\\mathbf{k}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "A plane passes through point $$A$$ with position vector $$\\mathbf{a}$$, and contains two non-parallel vectors $$\\mathbf{b}$$ and $$\\mathbf{c}$$. Explain how any point $$R$$ on the plane can be reached from $$A$$, leading to the vector equation $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b} + \\mu\\mathbf{c}$$. (3 steps)", "answer": "- Step 1: To get from the origin to point $$R$$, you can go via point $$A$$: $$\\overrightarrow{OR} = \\overrightarrow{OA} + \\overrightarrow{AR}$$, so $$\\mathbf{r} = \\mathbf{a} + \\overrightarrow{AR}$$.\n- Step 2: The vector $$\\overrightarrow{AR}$$ lies entirely within the plane. Since $$\\mathbf{b}$$ and $$\\mathbf{c}$$ are non-parallel vectors in the plane, they form a basis for the plane. Any vector in the plane can be expressed as a linear combination of $$\\mathbf{b}$$ and $$\\mathbf{c}$$.\n- Step 3: Therefore, $$\\overrightarrow{AR} = \\lambda\\mathbf{b} + \\mu\\mathbf{c}$$ for some scalars $$\\lambda$$ and $$\\mu$$. Substituting this back gives the vector equation of the plane: $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b} + \\mu\\mathbf{c}$$. This requires two parameters, reflecting the 2-dimensional nature of a plane.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "To find the Cartesian equation of a plane passing through three non-collinear points $$A$$, $$B$$, and $$C$$, what vectors do you need to construct first, and how do you use them to find the normal vector $$\\mathbf{n}$$? (3 steps)", "answer": "- Step 1: First, construct two vectors that lie in the plane. The easiest choices are the vectors connecting one of the points to the other two, e.g., $$\\overrightarrow{AB} = \\mathbf{b} - \\mathbf{a}$$ and $$\\overrightarrow{AC} = \\mathbf{c} - \\mathbf{a}$$.\n- Step 2: The normal vector $$\\mathbf{n}$$ is perpendicular to the plane, and therefore perpendicular to both $$\\overrightarrow{AB}$$ and $$\\overrightarrow{AC}$$. To find a vector perpendicular to two given vectors, use the cross product.\n- Step 3: Calculate $$\\mathbf{n} = \\overrightarrow{AB} \\times \\overrightarrow{AC}$$. Once you have $$\\mathbf{n}$$, you can use any of the three points (say $$A$$) to find the constant $$p$$ in the equation $$\\mathbf{r} \\cdot \\mathbf{n} = p$$ by computing $$\\mathbf{a} \\cdot \\mathbf{n}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A line has equation $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$ and a plane has equation $$\\mathbf{r} \\cdot \\mathbf{n} = p$$. Describe the process to find the coordinates of their point of intersection. (3 steps)", "answer": "- Step 1: Substitute the equation of the line directly into the equation of the plane. Since $$\\mathbf{r}$$ represents the position vector of any point on the line, replace $$\\mathbf{r}$$ in the plane equation with $$\\mathbf{a} + \\lambda\\mathbf{b}$$.\n- Step 2: This gives the equation $$(\\mathbf{a} + \\lambda\\mathbf{b}) \\cdot \\mathbf{n} = p$$. Expand the dot product to get $$\\mathbf{a} \\cdot \\mathbf{n} + \\lambda(\\mathbf{b} \\cdot \\mathbf{n}) = p$$.\n- Step 3: Solve this scalar equation for the parameter $$\\lambda$$. Once you find $$\\lambda$$, substitute it back into the line equation $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$ to find the position vector (and thus the coordinates) of the intersection point. If $$\\mathbf{b} \\cdot \\mathbf{n} = 0$$, the line is parallel to the plane.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "When finding the angle between a line and a plane, you first find the angle $$\\theta$$ between the line's direction vector $$\\mathbf{b}$$ and the plane's normal vector $$\\mathbf{n}$$. Why does the final formula use $$\\sin\\alpha$$ (where $$\\alpha$$ is the angle between the line and the plane) instead of $$\\cos\\alpha$$? (3 steps)", "answer": "- Step 1: The angle $$\\theta$$ between the direction vector $$\\mathbf{b}$$ and the normal $$\\mathbf{n}$$ is found using $$\\cos\\theta = \\frac{|\\mathbf{b} \\cdot \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$. This is the angle between the line and the *perpendicular* to the plane.\n- Step 2: The angle $$\\alpha$$ between the line and the *plane itself* is the complement to $$\\theta$$. Visualizing the right triangle formed, the normal is the \"height\" and the line is the \"hypotenuse\", so $$\\alpha + \\theta = 90^\\circ$$.\n- Step 3: Therefore, $$\\alpha = 90^\\circ - \\theta$$. Using trigonometric identities, $$\\sin\\alpha = \\sin(90^\\circ - \\theta) = \\cos\\theta$$. This is why the formula for the angle between a line and a plane is $$\\sin\\alpha = \\frac{|\\mathbf{b} \\cdot \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$; the cosine of the angle with the normal becomes the sine of the angle with the plane.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "To find the acute angle between two planes, you consider their normal vectors $$\\mathbf{n}_1$$ and $$\\mathbf{n}_2$$. Why does the formula use the absolute value $$\\cos\\theta = \\frac{|\\mathbf{n}_1 \\cdot \\mathbf{n}_2|}{|\\mathbf{n}_1||\\mathbf{n}_2|}$$, and what do you do if the calculated angle is obtuse? (3 steps)", "answer": "- Step 1: The angle between two planes is defined as the acute angle between them. The angle $$\\theta$$ between their normal vectors can be acute or obtuse depending on the direction the normals point (which is arbitrary).\n- Step 2: If the normals point \"outward\" in a way that the angle between them is obtuse, the actual acute angle between the planes is the supplement of $$\\theta$$ (i.e., $$180^\\circ - \\theta$$).\n- Step 3: Taking the absolute value $$|\\mathbf{n}_1 \\cdot \\mathbf{n}_2|$$ ensures that we calculate $$\\cos\\theta$$ as if the angle between normals were acute. If the resulting angle is obtuse (which shouldn't happen if we use the absolute value correctly), we subtract it from $$180^\\circ$$ to get the acute angle between the planes.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "The equation of a plane is given as $$\\mathbf{r} \\cdot \\mathbf{n} = p$$. How do you convert this into the form $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = d$$, and why is the value $$d$$ equal to the perpendicular distance from the origin to the plane? (3 steps)", "answer": "- Step 1: To convert to the new form, divide both sides of the equation $$\\mathbf{r} \\cdot \\mathbf{n} = p$$ by the magnitude $$|\\mathbf{n}|$$. This gives $$\\mathbf{r} \\cdot \\left(\\frac{\\mathbf{n}}{|\\mathbf{n}|}\\right) = \\frac{p}{|\\mathbf{n}|}$$.\n- Step 2: The term $$\\frac{\\mathbf{n}}{|\\mathbf{n}|}$$ is the unit normal vector $$\\hat{\\mathbf{n}}$$. The equation becomes $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = d$$, where $$d = \\frac{p}{|\\mathbf{n}|}$$.\n- Step 3: For any point $$\\mathbf{r}$$ on the plane, $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}}$$ is the projection of the position vector $$\\mathbf{r}$$ onto the unit normal direction. Since the plane is flat and perpendicular to $$\\hat{\\mathbf{n}}$$, this projection length is constant for all points on the plane. It represents the distance from the origin straight along the normal to the plane, which is exactly the perpendicular distance $$d$$.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "Given a point $$P$$ not on a plane, how can you use the concept of parallel planes to find the perpendicular distance from $$P$$ to the plane? (4 steps)", "answer": "- Step 1: Let the original plane be $$\\Pi$$ with equation $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = d_1$$, where $$\\hat{\\mathbf{n}}$$ is the unit normal vector. The distance from the origin to $$\\Pi$$ is $$d_1$$.\n- Step 2: Construct a new plane $$\\Pi'$$ that passes through point $$P$$ and is parallel to $$\\Pi$$. Since it is parallel, it shares the same unit normal vector $$\\hat{\\mathbf{n}}$$.\n- Step 3: Find the distance from the origin to this new plane $$\\Pi'$$, call it $$d_2$$. You can find $$d_2$$ by substituting the position vector of $$P$$ into the equation: $$d_2 = \\mathbf{p} \\cdot \\hat{\\mathbf{n}}$$. (Note: $$d_2$$ can be negative if $$P$$ is on the opposite side of the origin relative to $$\\hat{\\mathbf{n}}$$).\n- Step 4: The distance between the two parallel planes is the perpendicular distance from $$P$$ to $$\\Pi$$. This is simply the difference in their distances from the origin: Distance $$= |d_1 - d_2|$$. The absolute value ensures a positive distance.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Two skew lines have equations $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$ and $$\\mathbf{r} = \\mathbf{c} + \\mu\\mathbf{d}$$. The shortest distance between them is along a vector perpendicular to both lines. Explain how the formula $$\\frac{|(\\mathbf{a}-\\mathbf{c}) \\cdot (\\mathbf{b} \\times \\mathbf{d})|}{|\\mathbf{b} \\times \\mathbf{d}|}$$ is derived using the projection of the connecting vector onto the common perpendicular. (4 steps)", "answer": "- Step 1: The common perpendicular direction is given by the cross product of the direction vectors, $$\\mathbf{b} \\times \\mathbf{d}$$. A unit vector in this direction is $$\\hat{\\mathbf{n}} = \\frac{\\mathbf{b} \\times \\mathbf{d}}{|\\mathbf{b} \\times \\mathbf{d}|}$$.\n- Step 2: Consider a vector connecting a point on the first line to a point on the second line, e.g., $$(\\mathbf{a} - \\mathbf{c})$$.\n- Step 3: The shortest distance is the projection of this connecting vector onto the common perpendicular direction. The projection is given by the scalar product: $$(\\mathbf{a} - \\mathbf{c}) \\cdot \\hat{\\mathbf{n}}$$.\n- Step 4: Substituting the expression for $$\\hat{\\mathbf{n}}$$ gives Distance $$= \\left|(\\mathbf{a} - \\mathbf{c}) \\cdot \\frac{\\mathbf{b} \\times \\mathbf{d}}{|\\mathbf{b} \\times \\mathbf{d}|}\\right| = \\frac{|(\\mathbf{a} - \\mathbf{c}) \\cdot (\\mathbf{b} \\times \\mathbf{d})|}{|\\mathbf{b} \\times \\mathbf{d}|}$$. The absolute value ensures the distance is positive.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "A point $$A$$ has position vector $$\\mathbf{a}$$, and a line passes through point $$B$$ with position vector $$\\mathbf{b}$$ and has direction vector $$\\mathbf{d}$$. Explain how you can use the cross product to find the shortest distance from $$A$$ to the line. (3 steps)", "answer": "- Step 1: Form the vector from the point on the line to the external point: $$\\overrightarrow{BA} = \\mathbf{a} - \\mathbf{b}$$.\n- Step 2: The magnitude of the cross product $$|\\overrightarrow{BA} \\times \\mathbf{d}|$$ gives the area of the parallelogram formed by $$\\overrightarrow{BA}$$ and the direction vector $$\\mathbf{d}$$.\n- Step 3: The shortest distance from $$A$$ to the line is the height of this parallelogram, where the base is the direction vector $$\\mathbf{d}$$. Therefore, Distance $$= \\frac{\\text{Area}}{\\text{Base}} = \\frac{|(\\mathbf{a} - \\mathbf{b}) \\times \\mathbf{d}|}{|\\mathbf{d}|}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "Calculate the vector product $$(2\\mathbf{i}) \\times (3\\mathbf{k})$$. (2 steps)", "answer": "- Step 1: Use the anti-commutative property and the standard unit vector results. We know $$\\mathbf{i} \\times \\mathbf{k} = -\\mathbf{j}$$.\n- Step 2: Therefore, $$(2\\mathbf{i}) \\times (3\\mathbf{k}) = 2 \\times 3 (\\mathbf{i} \\times \\mathbf{k}) = 6(-\\mathbf{j}) = -6\\mathbf{j}$$. The resulting vector points in the negative y-direction with magnitude 6.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A triangle has vertices at the origin $$O$$, point $$A(2,0,0)$$, and point $$B(0,3,0)$$. Use the vector product to find the area of this triangle. (2 steps)", "answer": "- Step 1: The position vectors are $$\\mathbf{a} = 2\\mathbf{i}$$ and $$\\mathbf{b} = 3\\mathbf{j}$$. The cross product is $$\\mathbf{a} \\times \\mathbf{b} = (2\\mathbf{i}) \\times (3\\mathbf{j}) = 6(\\mathbf{i} \\times \\mathbf{j}) = 6\\mathbf{k}$$. The magnitude is $$|6\\mathbf{k}| = 6$$.\n- Step 2: The area of the triangle is half the magnitude of the cross product: Area $$= \\frac{1}{2} \\times 6 = 3$$. This matches the standard formula $$\\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2} \\times 2 \\times 3 = 3$$.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "A parallelepiped is formed by the vectors $$2\\mathbf{i}$$, $$3\\mathbf{j}$$, and $$4\\mathbf{k}$$. Find its volume using the scalar triple product. (2 steps)", "answer": "- Step 1: The volume is the absolute value of the scalar triple product: $$V = |\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$. First find the cross product $$\\mathbf{b} \\times \\mathbf{c} = (3\\mathbf{j}) \\times (4\\mathbf{k}) = 12(\\mathbf{j} \\times \\mathbf{k}) = 12\\mathbf{i}$$.\n- Step 2: Now find the dot product with $$\\mathbf{a}$$: $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = (2\\mathbf{i}) \\cdot (12\\mathbf{i}) = 24$$. The volume is $$|24| = 24$$. This is simply length $$\\times$$ width $$\\times$$ height $$= 2 \\times 3 \\times 4 = 24$$, confirming the geometric meaning.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "A line has direction vector $$\\mathbf{i}$$ and a plane has normal vector $$\\mathbf{j}$$. Find the acute angle between the line and the plane. (3 steps)", "answer": "- Step 1: The angle $$\\theta$$ between the line and the normal to the plane is found using the dot product: $$\\cos\\theta = \\frac{|\\mathbf{i} \\cdot \\mathbf{j}|}{|\\mathbf{i}||\\mathbf{j}|} = \\frac{0}{1} = 0$$. So $$\\theta = 90^\\circ$$.\n- Step 2: The angle $$\\alpha$$ between the line and the plane is the complement to this: $$\\alpha = 90^\\circ - \\theta$$.\n- Step 3: Therefore, $$\\alpha = 90^\\circ - 90^\\circ = 0^\\circ$$. The line is parallel to the plane (it lies within the plane or is parallel to it), so the angle between them is zero. This makes sense as the line direction $$\\mathbf{i}$$ is perpendicular to the plane normal $$\\mathbf{j}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}], "count": 34}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "What is the definition of the vector (cross) product $$\\mathbf{a} \\times \\mathbf{b}$$ in terms of magnitudes, the angle between them, and the unit vector $$\\hat{\\mathbf{n}}$$? (2 steps)", "answer": "- Step 1: The magnitude of the vector product is the area of the parallelogram formed by $$\\mathbf{a}$$ and $$\\mathbf{b}$$, which is $$|\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$, where $$\\theta$$ is the angle between them.\n- Step 2: The direction is perpendicular to both $$\\mathbf{a}$$ and $$\\mathbf{b}$$, given by the unit vector $$\\hat{\\mathbf{n}}$$. Combining these, the definition is $$\\mathbf{a} \\times \\mathbf{b} = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta \\hat{\\mathbf{n}}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "How do you determine the direction of the unit vector $$\\hat{\\mathbf{n}}$$ in the vector product $$\\mathbf{a} \\times \\mathbf{b}$$ using the right-hand rule? (2 steps)", "answer": "- Step 1: Point the index finger of your right hand in the direction of the first vector $$\\mathbf{a}$$, and the second finger in the direction of the second vector $$\\mathbf{b}$$.\n- Step 2: Your thumb will then point in the direction of $$\\mathbf{a} \\times \\mathbf{b}$$, which is the direction of $$\\hat{\\mathbf{n}}$$. Alternatively, imagine a right-handed screw turning from $$\\mathbf{a}$$ to $$\\mathbf{b}$$; it moves in the direction of $$\\hat{\\mathbf{n}}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "What is the relationship between $$\\mathbf{a} \\times \\mathbf{b}$$ and $$\\mathbf{b} \\times \\mathbf{a}$$, and why does this relationship exist geometrically? (3 steps)", "answer": "- Step 1: The relationship is $$\\mathbf{b} \\times \\mathbf{a} = -\\mathbf{a} \\times \\mathbf{b}$$. This means the vector product is anti-commutative.\n- Step 2: Geometrically, the magnitudes are the same because $$|\\mathbf{a}||\\mathbf{b}|\\sin\\theta = |\\mathbf{b}||\\mathbf{a}|\\sin\\theta$$.\n- Step 3: However, turning from $$\\mathbf{b}$$ to $$\\mathbf{a}$$ is the opposite rotational sense to turning from $$\\mathbf{a}$$ to $$\\mathbf{b}$$. A right-handed screw would move in the opposite direction, so the direction of the resulting vector is reversed.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "If $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$, what does this imply about the vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$ (assuming neither is the zero vector)? (2 steps)", "answer": "- Step 1: Since $$\\mathbf{a} \\times \\mathbf{b} = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta \\hat{\\mathbf{n}} = \\mathbf{0}$$, and we are given $$|\\mathbf{a}| \\neq 0$$ and $$|\\mathbf{b}| \\neq 0$$, the factor $$\\sin\\theta$$ must be zero.\n- Step 2: This implies that $$\\theta = 0^\\circ$$ or $$\\theta = 180^\\circ$$, meaning the vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$ are parallel.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Evaluate the following cross products of unit vectors: $$\\mathbf{i} \\times \\mathbf{j}$$, $$\\mathbf{j} \\times \\mathbf{i}$$, and $$\\mathbf{i} \\times \\mathbf{i}$$.", "answer": "- $$\\mathbf{i} \\times \\mathbf{j} = \\mathbf{k}$$ (using the right-hand rule, turning from x-axis to y-axis gives z-axis).\n- $$\\mathbf{j} \\times \\mathbf{i} = -\\mathbf{k}$$ (anti-commutative property reverses the direction).\n- $$\\mathbf{i} \\times \\mathbf{i} = \\mathbf{0}$$ (the cross product of any vector with itself is zero because the angle is $$0^\\circ$$ and $$\\sin 0^\\circ = 0$$).", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "How can you compute the vector product $$\\mathbf{a} \\times \\mathbf{b}$$ using a determinant, given $$\\mathbf{a} = a_1\\mathbf{i} + a_2\\mathbf{j} + a_3\\mathbf{k}$$ and $$\\mathbf{b} = b_1\\mathbf{i} + b_2\\mathbf{j} + b_3\\mathbf{k}$$? (2 steps)", "answer": "- Step 1: Set up the $$3 \\times 3$$ determinant with the top row as the unit vectors $$\\mathbf{i}, \\mathbf{j}, \\mathbf{k}$$, the middle row as the components of $$\\mathbf{a}$$, and the bottom row as the components of $$\\mathbf{b}$$: $$\\left|\\begin{array}{ccc}\\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3\\end{array}\\right|$$.\n- Step 2: Expand this determinant to get the vector: $$(a_2b_3 - a_3b_2)\\mathbf{i} - (a_1b_3 - a_3b_1)\\mathbf{j} + (a_1b_2 - a_2b_1)\\mathbf{k}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Why is the vector product useful for finding a vector perpendicular to two given vectors? How would you find a *unit* vector perpendicular to both $$\\mathbf{a}$$ and $$\\mathbf{b}$$? (2 steps)", "answer": "- Step 1: By definition, the vector product $$\\mathbf{a} \\times \\mathbf{b}$$ is directed along $$\\hat{\\mathbf{n}}$$, which is perpendicular to the plane containing both $$\\mathbf{a}$$ and $$\\mathbf{b}$$.\n- Step 2: To find a unit vector, first calculate $$\\mathbf{a} \\times \\mathbf{b}$$, then divide the result by its own magnitude to normalize it: $$\\hat{\\mathbf{n}} = \\frac{\\mathbf{a} \\times \\mathbf{b}}{|\\mathbf{a} \\times \\mathbf{b}|}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "How can you find the sine of the angle $$\\theta$$ between two vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$ using the vector product? (2 steps)", "answer": "- Step 1: From the definition, the magnitude of the cross product is $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$.\n- Step 2: Rearrange this formula to make $$\\sin\\theta$$ the subject: $$\\sin\\theta = \\frac{|\\mathbf{a} \\times \\mathbf{b}|}{|\\mathbf{a}||\\mathbf{b}|}$$. Note that unlike the scalar product which gives $$\\cos\\theta$$, this gives $$\\sin\\theta$$, but does not distinguish between acute and obtuse angles since $$\\sin\\theta$$ is positive for both.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "How do you find the area of a triangle with vertices at the origin $$O$$, and points $$A$$ and $$B$$ with position vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$? (2 steps)", "answer": "- Step 1: The standard formula for the area of a triangle is $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$, which translates to $$\\frac{1}{2}|\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$ in vector terms.\n- Step 2: Since $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$, the area of triangle $$OAB$$ can be written simply as $$\\frac{1}{2}|\\mathbf{a} \\times \\mathbf{b}|$$.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "What is the formula for the area of a parallelogram defined by two vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$ emanating from the same point? How does this relate to the area of a triangle? (2 steps)", "answer": "- Step 1: The area of the parallelogram is the magnitude of the vector product: $$|\\mathbf{a} \\times \\mathbf{b}|$$.\n- Step 2: A parallelogram can be split into two congruent triangles by a diagonal, so its area is exactly twice the area of the triangle formed by the same vectors ($$2 \\times \\frac{1}{2}|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a} \\times \\mathbf{b}|$$).", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "If a triangle has vertices $$A, B, C$$ with position vectors $$\\mathbf{a}, \\mathbf{b}, \\mathbf{c}$$, what is the formula for its area using vector products? (2 steps)", "answer": "- Step 1: Instead of position vectors from the origin, use side vectors originating from the same vertex. For example, $$\\overrightarrow{AB} = \\mathbf{b} - \\mathbf{a}$$ and $$\\overrightarrow{AC} = \\mathbf{c} - \\mathbf{a}$$.\n- Step 2: The area is then half the magnitude of their cross product: $$\\frac{1}{2}|\\overrightarrow{AB} \\times \\overrightarrow{AC}| = \\frac{1}{2}|(\\mathbf{b} - \\mathbf{a}) \\times (\\mathbf{c} - \\mathbf{a})|$$.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "A parallelogram has vertices $$A, B, C, D$$ with position vectors $$\\mathbf{a}, \\mathbf{b}, \\mathbf{c}, \\mathbf{d}$$. How do you find its area using a cross product? (2 steps)", "answer": "- Step 1: Identify two adjacent sides as vectors, for instance $$\\overrightarrow{AB} = \\mathbf{b} - \\mathbf{a}$$ and $$\\overrightarrow{AD} = \\mathbf{d} - \\mathbf{a}$$.\n- Step 2: The area is the magnitude of their cross product: $$|(\\mathbf{b} - \\mathbf{a}) \\times (\\mathbf{d} - \\mathbf{a})|$$.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "What is the scalar triple product of three vectors $$\\mathbf{a}, \\mathbf{b}, \\mathbf{c}$$, and how can it be calculated using a determinant? (2 steps)", "answer": "- Step 1: The scalar triple product is defined as $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$. It results in a scalar because the dot product of $$\\mathbf{a}$$ with the vector $$\\mathbf{b} \\times \\mathbf{c}$$ is taken.\n- Step 2: It can be calculated as the determinant of a $$3 \\times 3$$ matrix with the components of $$\\mathbf{a}, \\mathbf{b}, \\mathbf{c}$$ as its rows: $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\left|\\begin{array}{ccc}a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3 \\\\ c_1 & c_2 & c_3\\end{array}\\right|$$.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "How does the scalar triple product change under a cyclic permutation of the vectors (e.g., shifting from $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$ to $$\\mathbf{b} \\cdot (\\mathbf{c} \\times \\mathbf{a})$$)? (2 steps)", "answer": "- Step 1: The value of the scalar triple product remains completely unchanged under a cyclic permutation.\n- Step 2: Therefore, $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\mathbf{b} \\cdot (\\mathbf{c} \\times \\mathbf{a}) = \\mathbf{c} \\cdot (\\mathbf{a} \\times \\mathbf{b})$$. This is because swapping rows twice in the determinant doesn't change its sign, and a cyclic shift is equivalent to two row swaps.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "What is the value of the scalar triple product $$\\mathbf{a} \\cdot (\\mathbf{a} \\times \\mathbf{b})$$, and why? (2 steps)", "answer": "- Step 1: The value is zero.\n- Step 2: The vector product $$\\mathbf{a} \\times \\mathbf{b}$$ produces a vector that is perpendicular to both $$\\mathbf{a}$$ and $$\\mathbf{b}$$. When you take the dot product of $$\\mathbf{a}$$ with a vector perpendicular to itself, the cosine of the $$90^\\circ$$ angle is zero, so the result is zero.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "How does the scalar triple product relate to the volume of a parallelepiped formed by vectors $$\\mathbf{a}, \\mathbf{b}, \\mathbf{c}$$? (3 steps)", "answer": "- Step 1: The volume of any prism is (Area of base) $$\\times$$ (Perpendicular height).\n- Step 2: The area of the base formed by $$\\mathbf{b}$$ and $$\\mathbf{c}$$ is $$|\\mathbf{b} \\times \\mathbf{c}|$$. The perpendicular height is the component of $$\\mathbf{a}$$ in the direction of the normal to the base, which is $$|\\mathbf{a}|\\cos\\phi$$ (where $$\\phi$$ is the angle between $$\\mathbf{a}$$ and $$\\mathbf{b} \\times \\mathbf{c}$$).\n- Step 3: So, Volume $$= |\\mathbf{b} \\times \\mathbf{c}| \\times |\\mathbf{a}|\\cos\\phi = \\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$. To ensure the volume is positive regardless of orientation, we take the absolute value: Volume $$= |\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "What is the volume of a tetrahedron formed by three vectors $$\\mathbf{a}, \\mathbf{b}, \\mathbf{c}$$ in terms of the scalar triple product? (2 steps)", "answer": "- Step 1: The volume of any pyramid is $$\\frac{1}{3} \\times \\text{base area} \\times \\text{height}$$.\n- Step 2: The base is a triangle with area $$\\frac{1}{2}|\\mathbf{b} \\times \\mathbf{c}|$$, and the height is the projection of $$\\mathbf{a}$$ onto the normal, giving volume $$= \\frac{1}{3} \\times \\frac{1}{2}|\\mathbf{b} \\times \\mathbf{c}| \\times |\\mathbf{a}|\\cos\\phi = \\frac{1}{6}|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "If three vectors $$\\mathbf{a}, \\mathbf{b}, \\mathbf{c}$$ are coplanar, what is the value of their scalar triple product $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$, and why? (2 steps)", "answer": "- Step 1: The scalar triple product will be zero.\n- Step 2: If the vectors are coplanar, the vector $$\\mathbf{b} \\times \\mathbf{c}$$ (which is normal to the plane containing $$\\mathbf{b}$$ and $$\\mathbf{c}$$) will be perpendicular to $$\\mathbf{a}$$ (since $$\\mathbf{a}$$ also lies entirely in that plane). The dot product of perpendicular vectors is zero, meaning the volume of the parallelepiped they form is zero.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "How can you write the vector equation of a line passing through point $$A$$ (position vector $$\\mathbf{a}$$) and parallel to vector $$\\mathbf{b}$$, using the cross product? (2 steps)", "answer": "- Step 1: Let $$\\mathbf{r}$$ be the position vector of a general point on the line. The vector from $$A$$ to this point is $$\\mathbf{r} - \\mathbf{a}$$.\n- Step 2: Since this vector lies along the line, it is parallel to $$\\mathbf{b}$$. The cross product of parallel vectors is zero, so the equation of the line is $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Given the line equation $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$, how do you convert it to Cartesian form? (3 steps)", "answer": "- Step 1: If the cross product of two non-zero vectors is zero, one must be a scalar multiple of the other. Thus, $$(\\mathbf{r} - \\mathbf{a}) = \\lambda\\mathbf{b}$$.\n- Step 2: Substitute $$\\mathbf{r} = x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$$ and equate components: $$x - a_1 = \\lambda b_1$$, $$y - a_2 = \\lambda b_2$$, $$z - a_3 = \\lambda b_3$$.\n- Step 3: Rearranging to make $$\\lambda$$ the subject of each equation gives the Cartesian form: $$\\frac{x - a_1}{b_1} = \\frac{y - a_2}{b_2} = \\frac{z - a_3}{b_3} = \\lambda$$.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "What is the alternative vector equation of a line using cross products, written as $$\\mathbf{r} \\times \\mathbf{b} = \\mathbf{c}$$? How is $$\\mathbf{c}$$ determined? (2 steps)", "answer": "- Step 1: Starting from $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$, we can distribute the cross product to get $$\\mathbf{r} \\times \\mathbf{b} - \\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$.\n- Step 2: Rearranging gives $$\\mathbf{r} \\times \\mathbf{b} = \\mathbf{a} \\times \\mathbf{b}$$. Here, the constant vector $$\\mathbf{c}$$ is the vector product of the position vector of a point on the line and the direction vector of the line ($$\\mathbf{c} = \\mathbf{a} \\times \\mathbf{b}$$).", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "What is the scalar product form of the equation of a plane, given that $$\\mathbf{n}$$ is normal to the plane and $$\\mathbf{a}$$ is the position vector of a point on the plane? (3 steps)", "answer": "- Step 1: Let $$\\mathbf{r}$$ be the position vector of a general point on the plane. The vector $$\\mathbf{r} - \\mathbf{a}$$ lies within the plane.\n- Step 2: Since $$\\mathbf{n}$$ is perpendicular to the plane, it must be perpendicular to every vector in the plane, so their scalar product is zero: $$(\\mathbf{r} - \\mathbf{a}) \\cdot \\mathbf{n} = 0$$.\n- Step 3: Distributing the dot product gives $$\\mathbf{r} \\cdot \\mathbf{n} - \\mathbf{a} \\cdot \\mathbf{n} = 0$$, or $$\\mathbf{r} \\cdot \\mathbf{n} = \\mathbf{a} \\cdot \\mathbf{n}$$. Setting the scalar $$p = \\mathbf{a} \\cdot \\mathbf{n}$$, we get the standard form $$\\mathbf{r} \\cdot \\mathbf{n} = p$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "How do you convert the scalar product equation of a plane $$\\mathbf{r} \\cdot \\mathbf{n} = p$$ into Cartesian form? (2 steps)", "answer": "- Step 1: Substitute $$\\mathbf{r} = x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$$ and $$\\mathbf{n} = n_1\\mathbf{i} + n_2\\mathbf{j} + n_3\\mathbf{k}$$ into the equation.\n- Step 2: Perform the dot product to get $$x n_1 + y n_2 + z n_3 = p$$, which can be rearranged into the general Cartesian form $$a x + b y + c z + d = 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "What is the vector equation of a plane passing through point $$A$$ (position vector $$\\mathbf{a}$$) and containing two non-parallel vectors $$\\mathbf{b}$$ and $$\\mathbf{c}$$? (2 steps)", "answer": "- Step 1: Any point $$R$$ on the plane can be reached by going from the origin to $$A$$, and then moving along some combination of the directions $$\\mathbf{b}$$ and $$\\mathbf{c}$$.\n- Step 2: This gives the equation $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b} + \\mu\\mathbf{c}$$, where $$\\lambda$$ and $$\\mu$$ are scalar parameters.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Given two non-parallel vectors $$\\mathbf{b}$$ and $$\\mathbf{c}$$ that lie in a plane, how do you find a normal vector $$\\mathbf{n}$$ to the plane? (2 steps)", "answer": "- Step 1: A vector perpendicular to two vectors in the plane will be perpendicular to the plane itself, acting as the normal.\n- Step 2: The vector product provides exactly this: a vector perpendicular to both operands. So, the normal is $$\\mathbf{n} = \\mathbf{b} \\times \\mathbf{c}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "How do you find if two lines $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$ and $$\\mathbf{r} = \\mathbf{c} + \\mu\\mathbf{d}$$ intersect? (3 steps)", "answer": "- Step 1: Set the position vectors equal to each other: $$\\mathbf{a} + \\lambda\\mathbf{b} = \\mathbf{c} + \\mu\\mathbf{d}$$.\n- Step 2: This gives three simultaneous equations (one for each component) with two unknowns, $$\\lambda$$ and $$\\mu$$. Solve two of them to find the values of $$\\lambda$$ and $$\\mu$$.\n- Step 3: Check if these values satisfy the third equation. If they do, the lines intersect; if not, the lines are skew (they do not intersect).", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "How do you find the intersection of a line $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$ and a plane $$\\mathbf{r} \\cdot \\mathbf{n} = p$$? (2 steps)", "answer": "- Step 1: Substitute the equation of the line directly into the equation of the plane: $$(\\mathbf{a} + \\lambda\\mathbf{b}) \\cdot \\mathbf{n} = p$$.\n- Step 2: Expand and solve for $$\\lambda$$: $$\\mathbf{a} \\cdot \\mathbf{n} + \\lambda(\\mathbf{b} \\cdot \\mathbf{n}) = p \\implies \\lambda = \\frac{p - \\mathbf{a} \\cdot \\mathbf{n}}{\\mathbf{b} \\cdot \\mathbf{n}}$$. Substitute this $$\\lambda$$ back into the line equation to find the position vector of the intersection point.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "How do you find the direction vector of the line of intersection of two planes with normals $$\\mathbf{n}_1$$ and $$\\mathbf{n}_2$$? (2 steps)", "answer": "- Step 1: The line of intersection lies in both planes, so its direction vector must be parallel to both planes.\n- Step 2: Therefore, the direction vector must be perpendicular to the normals of both planes. You find this by taking the cross product of the normals: direction vector $$\\mathbf{b} = \\mathbf{n}_1 \\times \\mathbf{n}_2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "What is the formula for the acute angle $$\\theta$$ between a line with direction vector $$\\mathbf{b}$$ and a plane with normal vector $$\\mathbf{n}$$? Why does it involve sine instead of cosine? (3 steps)", "answer": "- Step 1: First, find the angle $$\\alpha$$ between the line's direction vector $$\\mathbf{b}$$ and the plane's normal $$\\mathbf{n}$$ using the dot product: $$\\cos\\alpha = \\frac{|\\mathbf{b} \\cdot \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$.\n- Step 2: The angle $$\\theta$$ between the line and the plane itself is the complement of $$\\alpha$$ (i.e., $$\\theta = 90^\\circ - \\alpha$$), because the normal is perpendicular to the plane.\n- Step 3: Therefore, $$\\sin\\theta = \\cos\\alpha$$, which gives the formula $$\\sin\\theta = \\frac{|\\mathbf{b} \\cdot \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$. The sine arises because the angle to the plane is $$90^\\circ$$ minus the angle to the normal.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "What is the formula for the acute angle $$\\theta$$ between two planes with normal vectors $$\\mathbf{n}_1$$ and $$\\mathbf{n}_2$$? Why is the absolute value used? (3 steps)", "answer": "- Step 1: The angle between two planes is the same as the angle between their normal vectors.\n- Step 2: Use the scalar product to find the angle $$\\alpha$$ between the normals: $$\\cos\\alpha = \\frac{\\mathbf{n}_1 \\cdot \\mathbf{n}_2}{|\\mathbf{n}_1||\\mathbf{n}_2|}$$.\n- Step 3: If $$\\alpha$$ is obtuse, the acute angle between the planes is $$180^\\circ - \\alpha$$. Taking the absolute value of the dot product ensures we calculate the acute angle directly: $$\\cos\\theta = \\frac{|\\mathbf{n}_1 \\cdot \\mathbf{n}_2|}{|\\mathbf{n}_1||\\mathbf{n}_2|}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "If the equation of a plane is written as $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = d$$, what does the scalar $$d$$ represent geometrically? (2 steps)", "answer": "- Step 1: Let $$R$$ be a point on the plane and $$F$$ be the foot of the perpendicular from the origin $$O$$ to the plane. The vector $$\\overrightarrow{OF}$$ is in the direction of the unit normal $$\\hat{\\mathbf{n}}$$.\n- Step 2: The distance $$d = |\\overrightarrow{OF}|$$. Since $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = |\\mathbf{r}||\\hat{\\mathbf{n}}|\\cos\\theta = |\\mathbf{r}|\\cos\\theta$$, and by trigonometry $$|\\mathbf{r}|\\cos\\theta$$ is the projection of $$\\mathbf{r}$$ onto the normal direction, this equals the perpendicular distance from the origin to the plane.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "How do you find the perpendicular distance from a point $$A$$ with position vector $$\\mathbf{a}$$ to a plane $$\\mathbf{r} \\cdot \\mathbf{n} = p$$? (3 steps)", "answer": "- Step 1: Construct a parallel plane $$\\Pi'$$ that passes through point $$A$$. The equation of this plane is $$\\mathbf{r} \\cdot \\mathbf{n} = \\mathbf{a} \\cdot \\mathbf{n}$$.\n- Step 2: The distance from the origin to the original plane is $$\\frac{|p|}{|\\mathbf{n}|}$$, and the distance from the origin to the new plane is $$\\frac{|\\mathbf{a} \\cdot \\mathbf{n}|}{|\\mathbf{n}|}$$.\n- Step 3: The distance from point $$A$$ to the original plane is the distance between these two parallel planes, which is the absolute difference of their distances from the origin: $$\\frac{|p - \\mathbf{a} \\cdot \\mathbf{n}|}{|\\mathbf{n}|}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "What is the formula for the shortest distance between two skew lines $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$ and $$\\mathbf{r} = \\mathbf{c} + \\mu\\mathbf{d}$$? (3 steps)", "answer": "- Step 1: The shortest distance is the length of the perpendicular segment connecting the two lines. The direction of this segment is perpendicular to both lines, given by the vector $$\\mathbf{b} \\times \\mathbf{d}$$.\n- Step 2: A unit vector in this common perpendicular direction is $$\\frac{\\mathbf{b} \\times \\mathbf{d}}{|\\mathbf{b} \\times \\mathbf{d}|}$$.\n- Step 3: The distance is the projection of any vector connecting a point on one line to a point on the other (like $$\\mathbf{a} - \\mathbf{c}$$) onto this unit normal. Thus, the shortest distance is $$\\frac{|(\\mathbf{a} - \\mathbf{c}) \\cdot (\\mathbf{b} \\times \\mathbf{d})|}{|\\mathbf{b} \\times \\mathbf{d}|}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "How can you find the shortest distance from a point $$P$$ with position vector $$\\mathbf{p}$$ to a line $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$? (2 steps)", "answer": "- Step 1: Let $$\\overrightarrow{AP} = \\mathbf{p} - \\mathbf{a}$$. The shortest distance is the perpendicular distance from $$P$$ to the line.\n- Step 2: You can use the cross product: the area of the parallelogram formed by $$\\overrightarrow{AP}$$ and $$\\mathbf{b}$$ is $$|(\\mathbf{p} - \\mathbf{a}) \\times \\mathbf{b}|$$. Dividing this area by the base length $$|\\mathbf{b}|$$ gives the perpendicular height, so distance $$= \\frac{|(\\mathbf{p} - \\mathbf{a}) \\times \\mathbf{b}|}{|\\mathbf{b}|}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "Find the vector product $$\\mathbf{i} \\times (\\mathbf{j} + \\mathbf{k})$$. (2 steps)", "answer": "- Step 1: Use the distributive property to expand: $$\\mathbf{i} \\times \\mathbf{j} + \\mathbf{i} \\times \\mathbf{k}$$.\n- Step 2: Recall the standard unit vector products: $$\\mathbf{i} \\times \\mathbf{j} = \\mathbf{k}$$ and $$\\mathbf{i} \\times \\mathbf{k} = -\\mathbf{j}$$. Adding these results gives $$\\mathbf{k} - \\mathbf{j}$$, or $$-\\mathbf{j} + \\mathbf{k}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "Two sides of a parallelogram are given by vectors $$2\\mathbf{i}$$ and $$3\\mathbf{j}$$. What is the area of this parallelogram? (2 steps)", "answer": "- Step 1: The area is the magnitude of the cross product of the two side vectors: $$|2\\mathbf{i} \\times 3\\mathbf{j}|$$.\n- Step 2: Calculate the cross product: $$2 \\times 3 (\\mathbf{i} \\times \\mathbf{j}) = 6\\mathbf{k}$$. The magnitude is $$|6\\mathbf{k}| = 6$$. The area is 6 square units.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "Are the vectors $$\\mathbf{a} = \\mathbf{i} + \\mathbf{j} + \\mathbf{k}$$, $$\\mathbf{b} = 2\\mathbf{i} + 3\\mathbf{j} + 4\\mathbf{k}$$, and $$\\mathbf{c} = 3\\mathbf{i} + 4\\mathbf{j} + 5\\mathbf{k}$$ coplanar? (3 steps)", "answer": "- Step 1: To check coplanarity, calculate the scalar triple product $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$, which is the determinant $$\\left|\\begin{array}{ccc}1 & 1 & 1 \\\\ 2 & 3 & 4 \\\\ 3 & 4 & 5\\end{array}\\right|$$.\n- Step 2: Expand the determinant: $$1(15 - 16) - 1(10 - 12) + 1(8 - 9) = 1(-1) - 1(-2) + 1(-1) = -1 + 2 - 1 = 0$$.\n- Step 3: Since the scalar triple product is zero, the volume of the parallelepiped they form is zero, meaning the three vectors are coplanar.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "A line has direction vector $$\\mathbf{b} = \\mathbf{i} + \\mathbf{j}$$ and a plane has normal vector $$\\mathbf{n} = \\mathbf{k}$$. What is the acute angle between the line and the plane? (3 steps)", "answer": "- Step 1: The angle $$\\theta$$ between the line and the plane is found using $$\\sin\\theta = \\frac{|\\mathbf{b} \\cdot \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$.\n- Step 2: Calculate the dot product: $$\\mathbf{b} \\cdot \\mathbf{n} = (\\mathbf{i} + \\mathbf{j}) \\cdot \\mathbf{k} = 0$$. The magnitudes are $$|\\mathbf{b}| = \\sqrt{2}$$ and $$|\\mathbf{n}| = 1$$.\n- Step 3: So $$\\sin\\theta = \\frac{0}{\\sqrt{2}} = 0$$, which means $$\\theta = 0^\\circ$$. The line is parallel to the plane (it lies entirely within the plane or is parallel to it), so the angle between them is zero.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}], "count": 38}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "The vector product $\\mathbf{a} \\times \\mathbf{b}$ is defined as $|\\mathbf{a}||\\mathbf{b}|\\sin\\theta\\hat{\\mathbf{n}}$. What determines the direction of $\\hat{\\mathbf{n}}$, and how does it relate to the vectors $\\mathbf{a}$ and $\\mathbf{b}$? (3 steps)", "answer": "- Step 1: The direction of $\\hat{\\mathbf{n}}$ is perpendicular to both $\\mathbf{a}$ and $\\mathbf{b}$. However, there are two possible directions perpendicular to a plane. The specific direction is determined by the right-hand rule.\n- Step 2: If you point the fingers of your right hand in the direction of $\\mathbf{a}$ (the first vector) and curl them towards $\\mathbf{b}$ (the second vector) through the smaller angle $\\theta$, your thumb points in the direction of $\\hat{\\mathbf{n}}$.\n+ This means the cross product creates a vector that \"screws\" out of the plane formed by $\\mathbf{a}$ and $\\mathbf{b}$ if you rotate from $\\mathbf{a}$ to $\\mathbf{b}$.\n- Step 3: Because of this directional convention, the cross product is highly sensitive to order. If you reverse the order to $\\mathbf{b} \\times \\mathbf{a}$, you are curling from $\\mathbf{b}$ to $\\mathbf{a}$, so your thumb points in the exact opposite direction ($$-\\hat{\\mathbf{n}}$$).\n\nThe right-hand rule is the universal convention for orienting cross products in 3D space.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "Why is $$\\mathbf{b} \\times \\mathbf{a} = -(\\mathbf{a} \\times \\mathbf{b})$$? Explain using the definition of the vector product. (2 steps)", "answer": "- Step 1: By definition, $$\\mathbf{a} \\times \\mathbf{b} = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta\\hat{\\mathbf{n}}$$, where $$\\hat{\\mathbf{n}}$$ is the unit vector determined by the right-hand rule going from $\\mathbf{a}$ to $\\mathbf{b}$.\n- Step 2: For $$\\mathbf{b} \\times \\mathbf{a}$$, the magnitudes are the same, and $$\\sin\\theta$$ is the same (since $$0 \\le \\theta \\le 180^\\circ$$). However, applying the right-hand rule from $\\mathbf{b}$ to $\\mathbf{a}$ means your thumb points in the opposite direction, $$-\\hat{\\mathbf{n}}$$. So $$\\mathbf{b} \\times \\mathbf{a} = |\\mathbf{b}||\\mathbf{a}|\\sin\\theta(-\\hat{\\mathbf{n}}) = -(\\mathbf{a} \\times \\mathbf{b})$$.\n+ Unlike the scalar product which is commutative ($$\\mathbf{a}\\cdot\\mathbf{b} = \\mathbf{b}\\cdot\\mathbf{a}$$), the vector product is anti-commutative. The order of multiplication matters!", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "If $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$ (and neither $\\mathbf{a}$ nor $\\mathbf{b}$ is the zero vector), what must be true about the geometric relationship between $\\mathbf{a}$ and $\\mathbf{b}$? Explain why. (2 steps)", "answer": "- Step 1: Since $$\\mathbf{a} \\times \\mathbf{b} = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta\\hat{\\mathbf{n}} = \\mathbf{0}$$, and we are given $$|\\mathbf{a}| \\neq 0$$, $$|\\mathbf{b}| \\neq 0$$, and $$\\hat{\\mathbf{n}}$$ is a unit vector (magnitude 1), the only remaining factor that can be zero is $$\\sin\\theta$$.\n- Step 2: For $$\\sin\\theta = 0$$ in the range $$0 \\le \\theta \\le 180^\\circ$$, $\\theta$ must be $$0^\\circ$$ or $$180^\\circ$$. This means $\\mathbf{a}$ and $\\mathbf{b}$ must be parallel (or anti-parallel).\n+ This is a crucial test for parallelism: two non-zero vectors are parallel if and only if their cross product is the zero vector.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Without memorizing a table, how can you deduce $$\\mathbf{i} \\times \\mathbf{j} = \\mathbf{k}$$ and $$\\mathbf{j} \\times \\mathbf{i} = -\\mathbf{k}$$? (3 steps)", "answer": "- Step 1: The vectors $\\mathbf{i}$, $\\mathbf{j}$, and $\\mathbf{k}$ are mutually perpendicular, so the angle between any two is $$90^\\circ$$, meaning $$\\sin 90^\\circ = 1$$. They are also unit vectors, so their magnitudes are 1.\n- Step 2: For $$\\mathbf{i} \\times \\mathbf{j}$$, apply the right-hand rule: point fingers along the x-axis ($\\mathbf{i}$), curl towards the y-axis ($\\mathbf{j}$). Your thumb points along the z-axis ($\\mathbf{k}$). So $$\\mathbf{i} \\times \\mathbf{j} = 1 \\cdot 1 \\cdot 1 \\cdot \\mathbf{k} = \\mathbf{k}$$.\n- Step 3: For $$\\mathbf{j} \\times \\mathbf{i}$$, the anti-commutative property applies, so $$\\mathbf{j} \\times \\mathbf{i} = -(\\mathbf{i} \\times \\mathbf{j}) = -\\mathbf{k}$$.\n+ Any cross product of a vector with itself (e.g., $$\\mathbf{i} \\times \\mathbf{i}$$) is $\\mathbf{0}$ because the angle is $$0^\\circ$$.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "How does the determinant form $$\\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3 \\end{vmatrix}$$ relate to the component expansion of $$\\mathbf{a} \\times \\mathbf{b}$$? (3 steps)", "answer": "- Step 1: Expanding the determinant along the top row gives: $$\\mathbf{i}\\begin{vmatrix} a_2 & a_3 \\\\ b_2 & b_3 \\end{vmatrix} - \\mathbf{j}\\begin{vmatrix} a_1 & a_3 \\\\ b_1 & b_3 \\end{vmatrix} + \\mathbf{k}\\begin{vmatrix} a_1 & a_2 \\\\ b_1 & b_2 \\end{vmatrix}$$.\n- Step 2: Evaluating the $$2 \\times 2$$ determinants yields the components: $$\\mathbf{i}(a_2 b_3 - a_3 b_2) - \\mathbf{j}(a_1 b_3 - a_3 b_1) + \\mathbf{k}(a_1 b_2 - a_2 b_1)$$.\n- Step 3: This simplifies to $$(a_2 b_3 - a_
