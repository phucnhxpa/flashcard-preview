<script>
const DATA={"selected": [{"question": "To find the angle $\\theta$ between a line with direction $\\mathbf{b}$ and a plane with normal $\\mathbf{n}$, the formula is $$\\sin\\theta = \\frac{|\\mathbf{b} \\cdot \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$. Why is it $$\\sin\\theta$$ and not $$\\cos\\theta$$? (3 steps)", "answer": "- Step 1: If you use the dot product formula directly on $\\mathbf{b}$ and $\\mathbf{n}$, you get $$\\cos\\alpha = \\frac{\\mathbf{b} \\cdot \\mathbf{n}}{|\\mathbf{b}||\\mathbf{n}|}$$, where $\\alpha$ is the angle between the line's direction and the plane's normal.\n- Step 2: The angle $\\theta$ between the line and the plane itself is defined as the complement to $\\alpha$ (i.e., the angle between the line and its projection onto the plane).\n- Step 3: Therefore, $$\\theta = 90^\\circ - \\alpha$$. Since $$\\sin(90^\\circ - \\alpha) = \\cos\\alpha$$, we have $$\\sin\\theta = \\frac{|\\mathbf{b} \\cdot \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$. The absolute value ensures we get the acute angle $\\theta$.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "To find the perpendicular distance from a point $A$ (position vector $\\mathbf{a}$) to a plane $\\Pi$: $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = d$$, you can construct a parallel plane $\\Pi'$ through $A$. How does this help find the distance? (3 steps)", "answer": "- Step 1: The plane $\\Pi'$ passing through $A$ has equation $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = \\mathbf{a} \\cdot \\hat{\\mathbf{n}}$$. Let this constant be $d'$.\n- Step 2: Since $\\Pi$ and $\\Pi'$ are parallel (same normal $$\\hat{\\mathbf{n}}$$), the distance from $A$ to $\\Pi$ is simply the distance between the two planes.\n- Step 3: The distance from the origin to $\\Pi$ is $d$, and to $\\Pi'$ is $d'$. If $A$ is on the same side of the origin as $\\Pi$, the distance is $$|d' - d|$$. If on the opposite side, it's $$|d'| + |d|$$. In general, it is $$|d' - d| = |\\mathbf{a} \\cdot \\hat{\\mathbf{n}} - d|$$.\n+ The standard formula is Distance = $$\\frac{|\\mathbf{a} \\cdot \\mathbf{n} - p|}{|\\mathbf{n}|}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "Why is the area of parallelogram $$OABC$$ exactly $$|\\mathbf{a}\\times\\mathbf{b}|$$ (not half), where $$A$$ has position vector $$\\mathbf{a}$$ and $$C$$ has position vector $$\\mathbf{b}$$?", "answer": "- Step 1: A parallelogram is composed of two congruent triangles split by a diagonal.\n- Step 2: Each triangle has area $$\\tfrac{1}{2}|\\mathbf{a}\\times\\mathbf{b}|$$.\n- Step 3: Doubling gives parallelogram area $$=|\\mathbf{a}\\times\\mathbf{b}|$$ — the $$\\tfrac{1}{2}$$ disappears.\n\nMnemonic: triangle has $$\\tfrac{1}{2}$$, parallelogram has none.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "What is the formula for the shortest distance between two skew lines $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$ and $$\\mathbf{r} = \\mathbf{c} + \\mu\\mathbf{d}$$? (3 steps)", "answer": "- Step 1: The shortest distance is the length of the perpendicular segment connecting the two lines. The direction of this segment is perpendicular to both lines, given by the vector $$\\mathbf{b} \\times \\mathbf{d}$$.\n- Step 2: A unit vector in this common perpendicular direction is $$\\frac{\\mathbf{b} \\times \\mathbf{d}}{|\\mathbf{b} \\times \\mathbf{d}|}$$.\n- Step 3: The distance is the projection of any vector connecting a point on one line to a point on the other (like $$\\mathbf{a} - \\mathbf{c}$$) onto this unit normal. Thus, the shortest distance is $$\\frac{|(\\mathbf{a} - \\mathbf{c}) \\cdot (\\mathbf{b} \\times \\mathbf{d})|}{|\\mathbf{b} \\times \\mathbf{d}|}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "Why is the angle between two skew lines well-defined even though they don't intersect?", "answer": "- Step 1: Although skew lines don't share a point, each has a well-defined *direction vector*.\n- Step 2: We define the angle between skew lines as the angle between their direction vectors.\n- Step 3: Equivalently, you can imagine translating one line to pass through a point on the other (preserving direction); the angle they make there is the \"skew angle.\"\n\nBecause direction is independent of position, the angle between skew lines is unambiguous even without an intersection.", "source": "Opus 4.7 ①", "_id": "opus_1_76"}, {"question": "What is a \"skew\" pair of lines, intuitively, and why are they only possible in three or more dimensions?", "answer": "- Step 1: Skew lines are pairs that are *not parallel* and *do not intersect*.\n- Step 2: In 2D (a plane), any two non-parallel lines must meet (no third dimension to \"miss\" each other).\n- Step 3: In 3D, two non-parallel lines can pass over and under each other — they aim in different directions but never share a point.\n\nSkew lines are a signature 3D phenomenon. Recognising them is essential before applying the cross-product distance formula.", "source": "Opus 4.7 ①", "_id": "opus_1_65"}, {"question": "What is $$\\mathbf{a}\\times\\mathbf{a}$$, and what does this say geometrically?", "answer": "- Step 1: The angle between a vector and itself is $$0°$$, so $$\\sin 0°=0$$.\n- Step 2: Therefore $$\\mathbf{a}\\times\\mathbf{a}=|\\mathbf{a}||\\mathbf{a}|\\cdot 0\\cdot\\hat{\\mathbf{n}}=\\mathbf{0}$$.\n- Step 3: Geometrically: a \"parallelogram\" with both sides parallel collapses into a line segment with zero area.\n\nThis identity is crucial when expanding cross products of sums.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "In the formula for shortest distance between skew lines, what happens if $$\\mathbf{b} \\times \\mathbf{d} = \\mathbf{0}$$? What does this mean geometrically? (2 steps)", "answer": "- Step 1: If $$\\mathbf{b} \\times \\mathbf{d} = \\mathbf{0}$$, the direction vectors b and d are parallel.\n\n- Step 2: This means the \"shortest distance\" formula has division by zero. Geometrically, the lines are either intersecting (distance = 0) or parallel (constant distance). You need to handle these cases separately.\n\n**Important:** Always check if lines are parallel before applying the skew lines formula. If parallel, find distance from any point on one line to the other line.", "source": "MiniMax ①", "_id": "minimax_1_48"}, {"question": "A common student mistake is to write $$\\mathbf{a}\\times\\mathbf{b}=\\mathbf{b}\\times\\mathbf{a}$$. Why is this wrong, and what is the correct relation?", "answer": "- Step 1: This mimics the (true) identity $$\\mathbf{a}\\cdot\\mathbf{b}=\\mathbf{b}\\cdot\\mathbf{a}$$ for the dot product, but cross product behaves differently.\n- Step 2: The correct identity is $$\\mathbf{a}\\times\\mathbf{b}=-(\\mathbf{b}\\times\\mathbf{a})$$ — anti-commutativity.\n- Step 3: This is built into the geometry: the right-hand rule reverses direction when you swap inputs, even though the magnitude is unchanged.\n\nAlways preserve the order when manipulating cross products.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "Derive the formula for the angle between a line $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$ and a plane $$\\mathbf{r}\\cdot\\mathbf{n}=p$$. (4 steps)", "answer": "- Step 1: Let $$\\theta$$ be the desired angle between line and plane (acute, by convention).\n- Step 2: Let $$\\phi$$ be the angle between the line's direction $$\\mathbf{b}$$ and the plane's normal $$\\mathbf{n}$$. Geometrically, $$\\theta$$ and $$\\phi$$ are complementary: $$\\theta+\\phi=90°$$.\n- Step 3: From the dot product: $$\\cos\\phi=\\dfrac{|\\mathbf{b}\\cdot\\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$ (absolute value to take the acute angle).\n- Step 4: Since $$\\sin\\theta=\\cos\\phi$$: $$\\sin\\theta=\\dfrac{|\\mathbf{b}\\cdot\\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$.\n\nThe \"switch from cos to sin\" is the key step — the line-plane angle isn't the line-normal angle.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "Derive and explain the scalar product equation of a plane: $$\\mathbf{r}\\cdot\\mathbf{n}=p$$. (4 steps)", "answer": "- Step 1: Let $$A$$ be a known point on the plane (position vector $$\\mathbf{a}$$) and $$\\mathbf{n}$$ a vector normal to the plane.\n- Step 2: For any point $$R$$ on the plane, the displacement $$\\overrightarrow{AR}=\\mathbf{r}-\\mathbf{a}$$ lies *in* the plane.\n- Step 3: Since $$\\mathbf{n}$$ is perpendicular to everything in the plane, $$(\\mathbf{r}-\\mathbf{a})\\cdot\\mathbf{n}=0$$.\n- Step 4: Expanding: $$\\mathbf{r}\\cdot\\mathbf{n}=\\mathbf{a}\\cdot\\mathbf{n}$$. Define $$p=\\mathbf{a}\\cdot\\mathbf{n}$$ (a fixed scalar): $$\\mathbf{r}\\cdot\\mathbf{n}=p$$.\n\nThe form is parameter-free; the key insight is \"in-plane vector ⊥ normal.\"", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Two skew lines are $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$ and $$\\mathbf{r} = \\mathbf{c} + \\mu\\mathbf{d}$$. The shortest distance between them is $$\\frac{|(\\mathbf{a}-\\mathbf{c}) \\cdot (\\mathbf{b} \\times \\mathbf{d})|}{|\\mathbf{b} \\times \\mathbf{d}|}$$. Explain the geometric intuition behind the numerator and the denominator. (3 steps)", "answer": "- Step 1: The shortest distance is the length of the segment perpendicular to *both* lines. The vector $$\\mathbf{b} \\times \\mathbf{d}$$ gives the direction of this common perpendicular.\n- Step 2: The denominator $$|\\mathbf{b} \\times \\mathbf{d}|$$ is the magnitude of this perpendicular direction vector.\n- Step 3: The numerator $$|(\\mathbf{a}-\\mathbf{c}) \\cdot (\\mathbf{b} \\times \\mathbf{d})|$$ is the scalar projection of the vector connecting a point on line 1 ($\\mathbf{a}$) to a point on line 2 ($\\mathbf{c}$) onto the common perpendicular direction. This projection length is exactly the shortest distance.\n+ If $$\\mathbf{b} \\times \\mathbf{d} = \\mathbf{0}$$, the lines are parallel (not skew), and this formula fails (division by zero). A different method is needed for parallel lines.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "What is the relationship between the volume of a tetrahedron and the volume of the parallelepiped built on the same three edges? Why is there a factor of 1/6? (2 steps)", "answer": "- Step 1: Volume of parallelepiped = $$|\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c})|$$\n\n- Step 2: A tetrahedron (triangular pyramid) occupies exactly 1/6 of the parallelepiped formed by extending its faces. Think of dividing a cuboid into 6 identical tetrahedra using its diagonals.\n\n**Geometric proof:** A tetrahedron can be seen as 1/3 of a pyramid with triangular base. That pyramid is 1/2 of the parallelepiped. So 1/2 × 1/3 = 1/6.", "source": "MiniMax ①", "_id": "minimax_1_50"}, {"question": "Challenge: Given non-zero vector a, and non-parallel vectors b and c, with $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{c} \\times \\mathbf{a}$$, prove that a is parallel to b + c. (4 steps)", "answer": "- Step 1: $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{c} \\times \\mathbf{a} = -\\mathbf{a} \\times \\mathbf{c}$$. So $$\\mathbf{a} \\times \\mathbf{b} + \\mathbf{a} \\times \\mathbf{c} = \\mathbf{0}$$.\n- Step 2: Using distributivity: $$\\mathbf{a} \\times (\\mathbf{b} + \\mathbf{c}) = \\mathbf{0}$$.\n- Step 3: For a cross product to be zero with non-zero a, either a = 0 (given non-zero) or $$(\\mathbf{b} + \\mathbf{c})$$ is parallel to a.\n- Step 4: Therefore, a is parallel to $$\\mathbf{b} + \\mathbf{c}$$.", "source": "MiniMax ②", "_id": "minimax_2_54"}, {"question": "To find the acute angle between two planes, you consider their normal vectors $$\\mathbf{n}_1$$ and $$\\mathbf{n}_2$$. Why does the formula use the absolute value $$\\cos\\theta = \\frac{|\\mathbf{n}_1 \\cdot \\mathbf{n}_2|}{|\\mathbf{n}_1||\\mathbf{n}_2|}$$, and what do you do if the calculated angle is obtuse? (3 steps)", "answer": "- Step 1: The angle between two planes is defined as the acute angle between them. The angle $$\\theta$$ between their normal vectors can be acute or obtuse depending on the direction the normals point (which is arbitrary).\n- Step 2: If the normals point \"outward\" in a way that the angle between them is obtuse, the actual acute angle between the planes is the supplement of $$\\theta$$ (i.e., $$180^\\circ - \\theta$$).\n- Step 3: Taking the absolute value $$|\\mathbf{n}_1 \\cdot \\mathbf{n}_2|$$ ensures that we calculate $$\\cos\\theta$$ as if the angle between normals were acute. If the resulting angle is obtuse (which shouldn't happen if we use the absolute value correctly), we subtract it from $$180^\\circ$$ to get the acute angle between the planes.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "Find the area of the triangle with vertices $$O=(0,0,0)$$, $$A=(2,0,0)$$, $$B=(0,3,0)$$ — without doing the cross product determinant in full. (2 steps)", "answer": "- Step 1: Both $$\\mathbf{a}=2\\mathbf{i}$$ and $$\\mathbf{b}=3\\mathbf{j}$$ lie in the $$xy$$-plane and are perpendicular. The cross product points along $$\\mathbf{k}$$ with magnitude $$|2||3|\\sin 90°=6$$.\n- Step 2: Area $$=\\tfrac{1}{2}\\cdot 6=3$$.\n\nSanity check: this is a right triangle with legs $$2$$ and $$3$$, so area $$=\\tfrac{1}{2}\\cdot 2\\cdot 3=3$$. ✓ The cross-product method generalises this to any two vectors.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "A plane $$\\Pi$$ contains the line $$l: \\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$ and a separate point $$P$$ (with position $$\\mathbf{p}$$). How do you find the equation of $$\\Pi$$? (4 steps)", "answer": "- Step 1: $$\\Pi$$ contains the line, so $$\\mathbf{b}$$ is one direction in $$\\Pi$$.\n- Step 2: The vector from any point on the line to $$P$$, namely $$\\mathbf{p}-\\mathbf{a}$$, lies in $$\\Pi$$ (it connects two points of the plane).\n- Step 3: A normal to $$\\Pi$$ is therefore $$\\mathbf{n}=\\mathbf{b}\\times(\\mathbf{p}-\\mathbf{a})$$.\n- Step 4: Write the equation as $$\\mathbf{r}\\cdot\\mathbf{n}=\\mathbf{a}\\cdot\\mathbf{n}$$ (using the line's anchor point as a reference point on the plane).\n\nThe recipe: combine \"direction in plane\" with \"second direction in plane\" → cross product gives normal.", "source": "Opus 4.7 ①", "_id": "opus_1_73"}, {"question": "Why is the volume of a parallelepiped formed by vectors $\\mathbf{a}, \\mathbf{b}, \\mathbf{c}$ given by $$|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$? (3 steps)", "answer": "- Step 1: Volume of any prism is (Area of base) $\\times$ perpendicular height.\n- Step 2: The base parallelogram is formed by $\\mathbf{b}$ and $\\mathbf{c}$, so its area is $$|\\mathbf{b} \\times \\mathbf{c}|$$. The direction of $$\\mathbf{b} \\times \\mathbf{c}$$ is perpendicular to the base.\n- Step 3: The height is the component of $\\mathbf{a}$ in the direction perpendicular to the base, which is $$|\\mathbf{a}|\\cos\\phi$$ where $\\phi$ is the angle between $\\mathbf{a}$ and $$\\mathbf{b} \\times \\mathbf{c}$$. So Volume = $$|\\mathbf{b} \\times \\mathbf{c}| \\times |\\mathbf{a}|\\cos\\phi = |\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$. The absolute value ensures volume is positive regardless of the \"handedness\" of the vectors.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "Derive the formula for the volume of a parallelepiped with edges $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$. (5 steps)", "answer": "- Step 1: Volume $$=$$ (area of base) $$\\times$$ (perpendicular height).\n- Step 2: Take the base as the parallelogram with sides $$\\mathbf{b},\\mathbf{c}$$. Its area is $$|\\mathbf{b}\\times\\mathbf{c}|$$.\n- Step 3: The perpendicular direction (normal to the base) is along $$\\mathbf{b}\\times\\mathbf{c}$$. The height $$h$$ is the projection of the third edge $$\\mathbf{a}$$ onto this normal direction: $$h=|\\mathbf{a}|\\cos\\phi$$, where $$\\phi$$ is the angle between $$\\mathbf{a}$$ and $$\\mathbf{b}\\times\\mathbf{c}$$.\n- Step 4: Combine: $$V=|\\mathbf{b}\\times\\mathbf{c}|\\cdot|\\mathbf{a}|\\cos\\phi=\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})$$ — by the dot product definition.\n- Step 5: Take absolute value to ensure positive volume regardless of orientation: $$V=|\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})|$$.\n\nThe sign of $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})$$ encodes whether the edge ordering is right-handed or left-handed.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "Synthesis: A plane passes through three points $$A,B,C$$. How would you find the perpendicular distance from a fourth point $$D$$ to that plane? (5 steps)", "answer": "- Step 1: Find two vectors in the plane: $$\\overrightarrow{AB}=\\mathbf{b}-\\mathbf{a}$$, $$\\overrightarrow{AC}=\\mathbf{c}-\\mathbf{a}$$.\n- Step 2: Compute the normal $$\\mathbf{n}=\\overrightarrow{AB}\\times\\overrightarrow{AC}$$.\n- Step 3: Form the plane equation $$\\mathbf{r}\\cdot\\mathbf{n}=\\mathbf{a}\\cdot\\mathbf{n}$$.\n- Step 4: Compute distance from $$D$$ (position $$\\mathbf{d}$$) to the plane: $$\\dfrac{|\\mathbf{d}\\cdot\\mathbf{n}-\\mathbf{a}\\cdot\\mathbf{n}|}{|\\mathbf{n}|}=\\dfrac{|(\\mathbf{d}-\\mathbf{a})\\cdot\\mathbf{n}|}{|\\mathbf{n}|}$$.\n- Step 5: Equivalently, this is $$\\dfrac{|(\\mathbf{d}-\\mathbf{a})\\cdot(\\overrightarrow{AB}\\times\\overrightarrow{AC})|}{|\\overrightarrow{AB}\\times\\overrightarrow{AC}|}$$ — a nice unified formula.\n\nThe numerator is a scalar triple product (six times the tetrahedron volume); the denominator is twice the triangle area; their ratio is \"3 × (volume / area) = height.\"", "source": "Opus 4.7 ①", "_id": "opus_1_62"}, {"question": "How do you find the perpendicular distance from a *point* (not the origin) to a plane? (4 steps)", "answer": "- Step 1: Construct a parallel plane $$\\Pi'$$ passing through the point $$P$$, with the same normal $$\\mathbf{n}$$ as the original plane $$\\Pi$$.\n- Step 2: Find each plane's perpendicular distance from the origin: $$d_1=|p|/|\\mathbf{n}|$$ for $$\\Pi$$, and $$d_2=|\\mathbf{p}\\cdot\\mathbf{n}|/|\\mathbf{n}|$$ for $$\\Pi'$$ (where $$\\mathbf{p}$$ is the position vector of $$P$$).\n- Step 3: The distance between $$\\Pi$$ and $$\\Pi'$$ is $$|d_1-d_2|$$ if both are on the same side of origin, or $$d_1+d_2$$ if on opposite sides.\n- Step 4: Equivalent compact formula: $$\\text{distance}=\\dfrac{|\\mathbf{p}\\cdot\\mathbf{n}-p|}{|\\mathbf{n}|}$$, where $$\\mathbf{r}\\cdot\\mathbf{n}=p$$ is the plane's equation.\n\nThe compact formula handles signs automatically via the absolute value.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "What is a common misconception about the direction of $$\\mathbf{a} \\times \\mathbf{b}$$? How does the right-hand rule resolve this? (2 steps)", "answer": "- Step 1: Common misconception: Students think the cross product direction is simply \"perpendicular to both vectors\" without considering the order. But \"perpendicular\" has TWO possible directions (up or down).\n\n- Step 2: The right-hand rule resolves this ambiguity: point first finger in direction of a, second finger in direction of b, thumb gives the correct direction. Swapping a and b reverses the thumb direction.\n\n**Mnemonic:** Think of a right-handed screw - turning from a to b drives it in the direction of $$\\mathbf{a} \\times \\mathbf{b}$$.", "source": "MiniMax ①", "_id": "minimax_1_45"}, {"question": "What is the condition that two lines $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$ and $$\\mathbf{r}=\\mathbf{c}+\\mu\\mathbf{d}$$ actually meet (intersect)?", "answer": "- Step 1: Write the simultaneous condition: there exist values of $$\\lambda$$ and $$\\mu$$ such that $$\\mathbf{a}+\\lambda\\mathbf{b}=\\mathbf{c}+\\mu\\mathbf{d}$$.\n- Step 2: This gives three scalar equations (one per coordinate) in two unknowns ($$\\lambda,\\mu$$). Solve any two equations for $$\\lambda,\\mu$$.\n- Step 3: Crucial check: substitute these values into the *third* equation. If consistent → lines meet; if inconsistent → lines are skew (assuming non-parallel).\n\nIn 3D, two non-parallel lines almost never meet — skew is the generic case. Always do the consistency check.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "If you know $$\\mathbf{a} \\times \\mathbf{b}$$, how can you find $$\\sin\\theta$$ where $\\theta$ is the angle between $\\mathbf{a}$ and $\\mathbf{b}$? Why might using the dot product to find the angle be preferable? (3 steps)", "answer": "- Step 1: From the definition, $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$. Rearranging gives $$\\sin\\theta = \\frac{|\\mathbf{a} \\times \\mathbf{b}|}{|\\mathbf{a}||\\mathbf{b}|}$$.\n- Step 2: This formula only gives $$\\sin\\theta$$. However, $$\\sin\\theta = \\sin(180^\\circ - \\theta)$$, so this formula cannot distinguish between an acute angle and an obtuse angle (the ambiguous case of the sine rule).\n- Step 3: The dot product gives $$\\cos\\theta = \\frac{\\mathbf{a}\\cdot\\mathbf{b}}{|\\mathbf{a}||\\mathbf{b}|}$$. Since $$\\cos\\theta$$ is positive for acute angles and negative for obtuse angles, the dot product immediately tells you whether the angle is acute or obtuse, resolving the ambiguity.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "A plane passes through point $$A$$ with position vector $$\\mathbf{a}$$, and has normal vector $$\\mathbf{n}$$. Let $$\\mathbf{r}$$ be the position vector of a general point on the plane. Explain why $$(\\mathbf{r} - \\mathbf{a})$$ is perpendicular to $$\\mathbf{n}$$, and how this leads to the scalar product equation $$\\mathbf{r} \\cdot \\mathbf{n} = p$$. (3 steps)", "answer": "- Step 1: The vector $$(\\mathbf{r} - \\mathbf{a})$$ represents a displacement within the plane (from point $$A$$ to point $$R$$). Since the normal vector $$\\mathbf{n}$$ is perpendicular to the plane, it must be perpendicular to every vector lying in the plane.\n- Step 2: When two vectors are perpendicular, their scalar product is zero. Therefore, $$(\\mathbf{r} - \\mathbf{a}) \\cdot \\mathbf{n} = 0$$.\n- Step 3: Expanding this gives $$\\mathbf{r} \\cdot \\mathbf{n} - \\mathbf{a} \\cdot \\mathbf{n} = 0$$, so $$\\mathbf{r} \\cdot \\mathbf{n} = \\mathbf{a} \\cdot \\mathbf{n}$$. Letting the scalar constant $$\\mathbf{a} \\cdot \\mathbf{n} = p$$, we get the standard scalar product form of a plane: $$\\mathbf{r} \\cdot \\mathbf{n} = p$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "Why must the angle between line and plane use the *absolute value* in $$\\sin\\theta=|\\mathbf{b}\\cdot\\mathbf{n}|/(|\\mathbf{b}||\\mathbf{n}|)$$?", "answer": "- Step 1: Without absolute value, $$\\mathbf{b}\\cdot\\mathbf{n}/(|\\mathbf{b}||\\mathbf{n}|)$$ could be negative, depending on the orientation of $$\\mathbf{b}$$ relative to $$\\mathbf{n}$$.\n- Step 2: But the *angle between line and plane* is conventionally taken to be the acute (positive) angle in $$[0°, 90°]$$, where sine is non-negative.\n- Step 3: Taking absolute value forces the answer into the correct range automatically — irrespective of which direction was chosen for $$\\mathbf{b}$$ (since $$\\mathbf{b}$$ and $$-\\mathbf{b}$$ describe the same line).\n\nThis is a recurring theme: when geometric angles need to be acute, throw in absolute values.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "Why can the cross product magnitude $$|\\mathbf{a} \\times \\mathbf{b}|$$ be interpreted as the area of the parallelogram spanned by a and b? Provide geometric reasoning. (3 steps)", "answer": "- Step 1: Consider parallelogram with adjacent sides a and b. Base = |a|. Height = |b| sin θ where θ is angle between them.\n\n- Step 2: Area = base × height = |a| × |b| sin θ\n\n- Step 3: But this equals $$|\\mathbf{a} \\times \\mathbf{b}|$$ by definition. This is not a coincidence - it's precisely why the cross product magnitude was defined this way!\n\n**Visual:** Imagine a and b as two arrows from the same point. The parallelogram they span has area equal to the cross product magnitude.", "source": "MiniMax ①", "_id": "minimax_1_41"}, {"question": "Derive the formula for the shortest distance between two skew lines $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$ and $$\\mathbf{r}=\\mathbf{c}+\\mu\\mathbf{d}$$. (5 steps)", "answer": "- Step 1: The shortest segment joining the two lines is perpendicular to *both* — i.e., parallel to a direction perpendicular to both $$\\mathbf{b}$$ and $$\\mathbf{d}$$.\n- Step 2: That common perpendicular direction is given by $$\\mathbf{b}\\times\\mathbf{d}$$ (perpendicular to both by definition of cross product).\n- Step 3: The unit vector along this direction is $$\\dfrac{\\mathbf{b}\\times\\mathbf{d}}{|\\mathbf{b}\\times\\mathbf{d}|}$$.\n- Step 4: Pick any point $$P$$ on line 1 (say $$\\mathbf{a}$$) and $$Q$$ on line 2 (say $$\\mathbf{c}$$). The shortest distance is the projection of $$\\overrightarrow{QP}=\\mathbf{a}-\\mathbf{c}$$ onto the unit common-perpendicular direction.\n- Step 5: $$\\text{distance}=\\left|(\\mathbf{a}-\\mathbf{c})\\cdot\\dfrac{\\mathbf{b}\\times\\mathbf{d}}{|\\mathbf{b}\\times\\mathbf{d}|}\\right|=\\dfrac{|(\\mathbf{a}-\\mathbf{c})\\cdot(\\mathbf{b}\\times\\mathbf{d})|}{|\\mathbf{b}\\times\\mathbf{d}|}$$.\n\nThe numerator is a scalar triple product — geometrically, the volume of a parallelepiped divided by the parallelogram base area gives the height.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Why does the formula \"distance from $$D$$ to plane $$ABC$$\" connect to tetrahedron volume? (3 steps)", "answer": "- Step 1: The tetrahedron $$ABCD$$ has volume $$V=\\tfrac{1}{6}|(\\mathbf{d}-\\mathbf{a})\\cdot(\\overrightarrow{AB}\\times\\overrightarrow{AC})|$$.\n- Step 2: Alternatively, $$V=\\tfrac{1}{3}\\cdot\\text{(area of base }ABC)\\cdot h=\\tfrac{1}{3}\\cdot\\tfrac{1}{2}|\\overrightarrow{AB}\\times\\overrightarrow{AC}|\\cdot h$$.\n- Step 3: Equating: $$h=\\dfrac{|(\\mathbf{d}-\\mathbf{a})\\cdot(\\overrightarrow{AB}\\times\\overrightarrow{AC})|}{|\\overrightarrow{AB}\\times\\overrightarrow{AC}|}$$ — exactly the perpendicular distance from $$D$$ to plane $$ABC$$.\n\nVolume formulas and distance formulas are two sides of the same coin.", "source": "Opus 4.7 ①", "_id": "opus_1_63"}, {"question": "A line passes through point $A$ (position vector $\\mathbf{a}$) with direction vector $\\mathbf{b}$. Why is the equation of this line given by $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$? (3 steps)", "answer": "- Step 1: Let $\\mathbf{r}$ be the position vector of any point $R$ on the line. The vector from $A$ to $R$ is $$\\overrightarrow{AR} = \\mathbf{r} - \\mathbf{a}$$.\n- Step 2: Since both $A$ and $R$ lie on the line, the vector $$\\mathbf{r} - \\mathbf{a}$$ must be parallel to the direction vector $\\mathbf{b}$.\n- Step 3: The cross product of two parallel vectors is the zero vector. Therefore, $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$.\n+ This form eliminates the parameter $\\lambda$ used in $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$, expressing the line purely in terms of position vectors and directions.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "Why do mathematicians introduce the vector (cross) product when the dot product already exists?", "answer": "- Step 1: The dot product $$\\mathbf{a}\\cdot\\mathbf{b}=|\\mathbf{a}||\\mathbf{b}|\\cos\\theta$$ produces a *scalar* (a single number). It tells us about alignment between vectors but does not give us a direction.\n- Step 2: Many geometric problems require a *vector* output: finding a vector perpendicular to two others, computing oriented areas, defining the normal direction to a plane.\n- Step 3: The cross product fills exactly this gap — it produces a vector whose magnitude encodes area information and whose direction is perpendicular to both input vectors.\n\nThe two products are complementary tools: dot for \"alignment,\" cross for \"perpendicularity and rotation.\"", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "When finding the angle between two vectors, when would you use the dot product vs. the cross product? (2 steps)", "answer": "- Step 1: Use **dot product** when you want cosine: $$\\cos \\theta = \\frac{\\mathbf{a} . \\mathbf{b}}{|\\mathbf{a}||\\mathbf{b}|}$$. This directly gives the angle and tells you whether it's acute (positive) or obtuse (negative).\n\n- Step 2: Use **cross product** when you want sine: $$\\sin \\theta = \\frac{|\\mathbf{a} \\times \\mathbf{b}|}{|\\mathbf{a}||\\mathbf{b}|}$$. This doesn't distinguish between acute and obtuse angles (sine is positive for both).\n\n**Exam tip:** Dot product is generally preferred for finding angles unless you specifically need sine for some reason.", "source": "MiniMax ①", "_id": "minimax_1_47"}, {"question": "The scalar triple product has a cyclic property: $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\mathbf{b} \\cdot (\\mathbf{c} \\times \\mathbf{a}) = \\mathbf{c} \\cdot (\\mathbf{a} \\times \\mathbf{b})$$. Explain the geometric intuition behind why swapping the vectors in this cyclic manner does not change the value. (3 steps)", "answer": "- Step 1: Geometrically, the absolute value of the scalar triple product represents the volume of the parallelepiped formed by the three vectors $$\\mathbf{a}$$, $$\\mathbf{b}$$, and $$\\mathbf{c}$$.\n- Step 2: The volume of a parallelepiped depends only on the base area and the height, not on which face you choose as the base. Choosing different vectors to form the base (e.g., using $$\\mathbf{b}$$ and $$\\mathbf{c}$$ vs. $$\\mathbf{c}$$ and $$\\mathbf{a}$$) simply selects a different face of the same solid.\n- Step 3: As long as the cyclic order (a->b->c) is maintained, the orientation (right-hand rule) remains consistent, so the sign stays the same. Therefore, the value remains identical. However, swapping two adjacent vectors (breaking the cycle) reverses the orientation and negates the result.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "A parallelogram is made up of two congruent triangles. How does this geometric fact relate the area of a parallelogram $$OABC$$ (with adjacent sides given by vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$) to the vector product? (2 steps)", "answer": "- Step 1: A parallelogram can be split along its diagonal into two congruent triangles. The area of the parallelogram is therefore twice the area of one of these triangles.\n- Step 2: Since the area of the triangle formed by vectors $$\\mathbf{a}$$ and $$\\mathbf{b}$$ is $$\\frac{1}{2}|\\mathbf{a} \\times \\mathbf{b}|$$, the area of the parallelogram is simply the full magnitude of the cross product: Area $$= |\\mathbf{a} \\times \\mathbf{b}|$$. For a parallelogram $$ABCD$$ with vertices at general positions, the area is $$|\\overrightarrow{AB} \\times \\overrightarrow{AD}|$$.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "Without computing, why must any tetrahedron with three mutually perpendicular edges of equal length $$a$$ from one vertex have volume $$a^3/6$$? (3 steps)", "answer": "- Step 1: Choose the vertex as origin and edges along $$\\mathbf{i}, \\mathbf{j}, \\mathbf{k}$$ scaled by $$a$$.\n- Step 2: Scalar triple product: $$(a\\mathbf{i})\\cdot((a\\mathbf{j})\\times(a\\mathbf{k}))=a\\mathbf{i}\\cdot(a^2\\mathbf{i})=a^3$$.\n- Step 3: Volume = $$\\tfrac{1}{6}|a^3|=a^3/6$$.\n\nThis is the \"corner-cut\" tetrahedron — useful as a mental benchmark.", "source": "Opus 4.7 ①", "_id": "opus_1_64"}, {"question": "How do you determine the direction of $$\\mathbf{a} \\times \\mathbf{b}$$ using the right-hand rule? Why is the order of multiplication important? (3 steps)", "answer": "- Step 1: Point your first finger in the direction of vector a, and your second finger in the direction of vector b.\n\n- Step 2: Your thumb will point in the direction of $$\\mathbf{a} \\times \\mathbf{b}$$. This is the direction a right-handed screw would move when turned from a to b.\n\n- Step 3: The order matters because $$\\mathbf{b} \\times \\mathbf{a} = -\\mathbf{a} \\times \\mathbf{b}$$. If you swap the order, the direction reverses. This is why the cross product is **anti-commutative**.\n\n**Misconception alert:** Many students think $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{b} \\times \\mathbf{a}$$. This is FALSE - they give opposite directions!", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "What is the geometric significance of $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$ vs $$\\mathbf{a} . \\mathbf{b} = 0$$? How do you distinguish these cases? (2 steps)", "answer": "- Step 1: $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$ means a and b are **parallel** (or one is zero). The angle between them is 0° or 180°.\n\n- Step 2: $$\\mathbf{a} . \\mathbf{b} = 0$$ means a and b are **perpendicular** (orthogonal). The angle between them is 90°.\n\n**Mnemonic:** Cross = 0 means \"co-linear\" (parallel); dot = 0 means \"orthogonal\" (perpendicular). Think: \"cross\" has zero angle between parallel lines; \"dot\" is like a period - ends the relationship (90°).", "source": "MiniMax ①", "_id": "minimax_1_55"}, {"question": "If three vectors satisfy $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=0$$, must one of them be zero? (3 steps)", "answer": "- Step 1: No — the condition only forces them to be *coplanar*, not zero.\n- Step 2: For example: $$\\mathbf{a}=\\mathbf{i},\\mathbf{b}=\\mathbf{j},\\mathbf{c}=\\mathbf{i}+\\mathbf{j}$$ are all non-zero, but all lie in the $$xy$$-plane, so the parallelepiped is flat with zero volume.\n- Step 3: The correct interpretation: $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=0$$ ⟺ $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$ are linearly dependent (coplanar) — but each individually can be non-zero.\n\nThis is the standard test for coplanarity in 3D.", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "The vector equation of a plane is $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b} + \\mu\\mathbf{c}$$. Why must $\\mathbf{b}$ and $\\mathbf{c}$ be non-parallel? (2 steps)", "answer": "- Step 1: The term $$\\lambda\\mathbf{b} + \\mu\\mathbf{c}$$ represents all possible displacements *within* the plane starting from point $\\mathbf{a}$. By varying $\\lambda$ and $\\mu$, you can reach any point on the 2D plane.\n- Step 2: If $\\mathbf{b}$ and $\\mathbf{c}$ were parallel, then $$\\mathbf{c} = k\\mathbf{b}$$ for some scalar $k$. The equation would become $$\\mathbf{r} = \\mathbf{a} + (\\lambda + k\\mu)\\mathbf{b}$$, which is the equation of a *straight line*, not a plane. You need two independent directions to span a 2D surface.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "What's the difference between a line being *parallel to* a plane vs *lying in* the plane? (3 steps)", "answer": "- Step 1: Both require $$\\mathbf{b}\\cdot\\mathbf{n}=0$$ (line direction perpendicular to plane normal) — the line never \"tilts\" toward or away from the plane.\n- Step 2: Lying in the plane: additionally, every point of the line satisfies the plane equation (in particular, the anchor point $$\\mathbf{a}$$ does: $$\\mathbf{a}\\cdot\\mathbf{n}=p$$).\n- Step 3: Parallel but not lying in: $$\\mathbf{a}\\cdot\\mathbf{n}\\ne p$$ — line maintains constant distance from the plane and never meets it.\n\nSo: $$\\mathbf{b}\\cdot\\mathbf{n}=0$$ separates \"intersects in one point\" from \"parallel/contained\"; checking the anchor point distinguishes the latter two.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "MISCONCEPTION PROBE: When finding the angle between two vectors using $$\\sin \\theta = \\frac{|\\mathbf{a} \\times \\mathbf{b}|}{|\\mathbf{a}||\\mathbf{b}|}$$, why might there be ambiguity about whether θ is acute or obtuse? (1 step)", "answer": "- Step 1: The sine function is positive for both acute angles (0° < θ < 90°) and obtuse angles (90° < θ < 180°). Since $$\\sin \\theta = \\sin(180° - \\theta)$$, the formula alone cannot distinguish between θ and 180° - θ. You need additional context (or use the dot product which gives cosine, unambiguously identifying acute vs obtuse).", "source": "MiniMax ②", "_id": "minimax_2_42"}, {"question": "Why does the line equation form $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$ work for any choice of point $$\\mathbf{a}$$ on the line, and any non-zero scalar multiple of $$\\mathbf{b}$$?", "answer": "- Step 1: Any point on the line could be chosen as the \"anchor\" — the equation $$(\\mathbf{r}-\\mathbf{a}')\\times\\mathbf{b}=\\mathbf{0}$$ for a different anchor $$\\mathbf{a}'$$ describes the same set of points, since the parallelism condition is unchanged.\n- Step 2: Replacing $$\\mathbf{b}$$ with $$k\\mathbf{b}$$ ($$k\\ne 0$$): $$(\\mathbf{r}-\\mathbf{a})\\times(k\\mathbf{b})=k\\,(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}$$. Setting equal to $$\\mathbf{0}$$ gives the same equation (since $$k\\ne 0$$).\n- Step 3: So multiple \"valid\" forms exist for the same line — geometrically a single object, algebraically a family of equivalent equations.\n\nThis non-uniqueness is similar to how a line has infinite parametric forms.", "source": "Opus 4.7 ①", "_id": "opus_1_66"}, {"question": "Why is the shortest distance from a point P to a line AB given by |(p - a) × b̂|, where b̂ is the unit direction vector of AB?", "answer": "- Step 1: The vector (p - a) connects A to P.  \n- Step 2: The cross product (p - a) × b̂ gives an area (|p - a||b̂|sinθ).  \n- Step 3: |(p - a) × b̂| = |p - a|sinθ, which is the perpendicular distance.  \n+ Geometric intuition: Distance = \"height\" of parallelogram formed by (p - a) and b̂.", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "Three vectors $\\mathbf{a}, \\mathbf{b}, \\mathbf{c}$ are given. If $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = 0$$, and none of the vectors are parallel or zero, what geometric configuration must they have? (2 steps)", "answer": "- Step 1: The scalar triple product represents the volume of the parallelepiped formed by the three vectors.\n- Step 2: If the volume is zero, the 3D solid has \"collapsed\" — the vectors must all lie in the same 2D plane. Thus, $\\mathbf{a}, \\mathbf{b}$, and $\\mathbf{c}$ are coplanar.\n+ Also, $$\\mathbf{b} \\times \\mathbf{c}$$ gives a vector perpendicular to the plane of $\\mathbf{b}$ and $\\mathbf{c}$. If $\\mathbf{a}$ dotted with this is 0, then $\\mathbf{a}$ is perpendicular to the normal, meaning $\\mathbf{a}$ lies in the same plane as $\\mathbf{b}$ and $\\mathbf{c}$.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "What are the three equivalent forms for the equation of a plane? Write each form and identify what information each provides. (3 steps)", "answer": "- Step 1: (1) Scalar product form: $$\\mathbf{r} \\cdot \\mathbf{n} = p$$, where n is the normal vector and p = a·n (a is position vector of any point on plane).\n- Step 2: (2) Vector form: $$\\mathbf{r} = \\mathbf{a} + s\\mathbf{b} + t\\mathbf{c}$$, where a is position vector of a point, b and c are non-parallel direction vectors in the plane.\n- Step 3: (3) Cartesian form: $$ax + by + cz + d = 0$$, where (a,b,c) is the normal vector. This is obtained by substituting $$\\mathbf{r} = x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$$ into the scalar form.", "source": "MiniMax ②", "_id": "minimax_2_19"}, {"question": "Synthesis: How are the formulas for \"area of triangle ABC,\" \"volume of tetrahedron ABCD,\" and \"shortest distance between skew lines\" all related?", "answer": "- Step 1: All three involve cross products and/or scalar triple products — they're all built from area/volume principles.\n- Step 2: Triangle area $$=\\tfrac{1}{2}|\\overrightarrow{AB}\\times\\overrightarrow{AC}|$$ — half of a parallelogram area (cross product magnitude).\n- Step 3: Tetrahedron volume $$=\\tfrac{1}{6}|\\overrightarrow{AB}\\cdot(\\overrightarrow{AC}\\times\\overrightarrow{AD})|$$ — sixth of a parallelepiped volume (scalar triple product magnitude).\n+ Skew distance $$=\\dfrac{|(\\mathbf{a}-\\mathbf{c})\\cdot(\\mathbf{b}\\times\\mathbf{d})|}{|\\mathbf{b}\\times\\mathbf{d}|}$$ — this is volume / parallelogram-area = height.\n\nThe recurring theme: **scalar triple product gives volume; cross-product magnitude gives area; their ratio gives height/distance.**", "source": "Opus 4.7 ①", "_id": "opus_1_70"}, {"question": "How does the volume of a tetrahedron relate to the volume of a parallelepiped? Why is the formula for the tetrahedron's volume $$\\frac{1}{6}|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$? (3 steps)", "answer": "- Step 1: A parallelepiped can be divided into 6 tetrahedra of equal volume. (Imagine slicing it diagonally across parallel faces).\n- Step 2: The volume of the parallelepiped is $$|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$.\n- Step 3: Therefore, the volume of one such tetrahedron is $$\\frac{1}{6}|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$.\n+ Alternatively, Volume of pyramid = $$\\frac{1}{3} \\times \\text{Base Area} \\times \\text{Height} = \\frac{1}{3} \\times \\frac{1}{2}|\\mathbf{b} \\times \\mathbf{c}| \\times (|\\mathbf{a}|\\cos\\phi) = \\frac{1}{6}|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "In the formula for shortest distance between skew lines, what does it mean if $$(\\mathbf{a} - \\mathbf{c}) \\cdot (\\mathbf{b} \\times \\mathbf{d}) = 0$$? (1 step)", "answer": "- Step 1: This means the scalar triple product is zero, which indicates that the volume of the parallelepiped formed by the three vectors is zero. In other words, the three vectors are coplanar. This occurs when the lines intersect OR when the vector connecting points on the lines lies in the same plane as the two direction vectors (which happens when lines intersect).", "source": "MiniMax ②", "_id": "minimax_2_59"}, {"question": "Synthesis: Why might a question ask you to find the same line in *both* the form $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$ and the form $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$?", "answer": "- Step 1: Each form has different strengths.\n+ The cross-product form is **parameter-free**: useful for direct geometric statements (intersection conditions without a parameter).\n+ The parametric form is **operation-friendly**: easy to substitute into other equations (e.g., a plane equation) and solve for the parameter.\n- Step 2: For instance: substituting $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$ into a plane $$\\mathbf{r}\\cdot\\mathbf{n}=p$$ yields a single equation in $$\\lambda$$ — straightforward to solve.\n- Step 3: Whereas working with $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$ requires algebraic manipulation, but is cleaner for proving identities or relating to Cartesian forms.\n\nChoose the form that matches the operation you need to perform.", "source": "Opus 4.7 ①", "_id": "opus_1_83"}, {"question": "A plane has Cartesian equation $$3x-2y+z=7$$. What is a normal vector to this plane, and how do you spot it instantly?", "answer": "- Step 1: From the conversion $$\\mathbf{r}\\cdot\\mathbf{n}=p\\to ax+by+cz=p$$, the coefficients $$(a,b,c)$$ are exactly the components of the normal vector.\n- Step 2: So $$\\mathbf{n}=3\\mathbf{i}-2\\mathbf{j}+\\mathbf{k}$$.\n- Step 3: Reading the normal directly off the Cartesian equation is one of the most useful shortcuts in vector geometry.\n\n(Caveat: any non-zero scalar multiple of $$\\mathbf{n}$$ is also a valid normal.)", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "What does it mean geometrically when $$\\overrightarrow{AB}\\times\\overrightarrow{CD}=\\mathbf{0}$$, given $$A\\ne B$$ and $$C\\ne D$$?", "answer": "- Step 1: Two non-zero vectors have zero cross product if and only if they are parallel.\n- Step 2: So $$\\overrightarrow{AB}\\parallel\\overrightarrow{CD}$$ — the line segments $$AB$$ and $$CD$$ are parallel (or anti-parallel).\n- Step 3: This is the standard test for parallel sides — useful, for instance, in showing a quadrilateral is a parallelogram (when both pairs of opposite sides have zero cross product).", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Why is the scalar triple product *cyclic*: $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=\\mathbf{b}\\cdot(\\mathbf{c}\\times\\mathbf{a})=\\mathbf{c}\\cdot(\\mathbf{a}\\times\\mathbf{b})$$? (3 steps)", "answer": "- Step 1: Geometric viewpoint: all three expressions compute the (signed) volume of the *same* parallelepiped — the volume doesn't depend on which edge you call $$\\mathbf{a}$$, $$\\mathbf{b}$$, or $$\\mathbf{c}$$.\n- Step 2: Algebraic viewpoint: in the determinant form, cyclic permutation of the rows $$(a,b,c)\\to(b,c,a)\\to(c,a,b)$$ is two row-swaps, each negating the sign — net effect: unchanged.\n- Step 3: Warning: a single swap (like $$\\mathbf{a}\\cdot(\\mathbf{c}\\times\\mathbf{b})$$) negates the result, since $$\\mathbf{c}\\times\\mathbf{b}=-\\mathbf{b}\\times\\mathbf{c}$$.\n\nCyclic preserves; non-cyclic (single swap) negates.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "Without computing, fill in: $$\\mathbf{i}\\times\\mathbf{j}=?$$, $$\\mathbf{j}\\times\\mathbf{k}=?$$, $$\\mathbf{k}\\times\\mathbf{i}=?$$. What pattern is at work?", "answer": "- Step 1: The results are $$\\mathbf{i}\\times\\mathbf{j}=\\mathbf{k}$$, $$\\mathbf{j}\\times\\mathbf{k}=\\mathbf{i}$$, $$\\mathbf{k}\\times\\mathbf{i}=\\mathbf{j}$$.\n- Step 2: Pattern: cyclic order $$\\mathbf{i}\\to\\mathbf{j}\\to\\mathbf{k}\\to\\mathbf{i}$$ — moving forward in the cycle gives a positive result.\n- Step 3: Reverse order gives a minus sign: $$\\mathbf{j}\\times\\mathbf{i}=-\\mathbf{k}$$, $$\\mathbf{k}\\times\\mathbf{j}=-\\mathbf{i}$$, $$\\mathbf{i}\\times\\mathbf{k}=-\\mathbf{j}$$.\n\nThe cycle is the algebraic encoding of the right-hand rule on a standard $$xyz$$ axis system.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Misconception probe: A student says \"since $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=\\mathbf{b}\\cdot(\\mathbf{c}\\times\\mathbf{a})$$, the cross product is commutative.\" What's wrong?", "answer": "- Step 1: The cyclic identity $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=\\mathbf{b}\\cdot(\\mathbf{c}\\times\\mathbf{a})$$ involves changing *all three* vectors at once (cyclic shift), not just swapping two.\n- Step 2: It does NOT say $$\\mathbf{b}\\times\\mathbf{c}=\\mathbf{c}\\times\\mathbf{b}$$ — the cross product itself is still anti-commutative.\n- Step 3: Indeed $$\\mathbf{a}\\cdot(\\mathbf{c}\\times\\mathbf{b})=-\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})$$, showing that *any single swap* changes sign.\n\nCyclic rearrangement preserves; transpositions negate. Don't confuse the two.", "source": "Opus 4.7 ①", "_id": "opus_1_81"}, {"question": "Why does $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=(\\mathbf{a}\\times\\mathbf{b})\\cdot\\mathbf{c}$$? (3 steps)", "answer": "- Step 1: Both sides represent the (signed) volume of the same parallelepiped with edges $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$.\n- Step 2: Algebraically, both expand to the same determinant: $$\\begin{vmatrix}a_1&a_2&a_3\\\\b_1&b_2&b_3\\\\c_1&c_2&c_3\\end{vmatrix}$$.\n- Step 3: This identity allows us to \"shift the cross product\" between the two factors of a triple product — useful in proofs (e.g., $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=\\mathbf{c}\\cdot(\\mathbf{a}\\times\\mathbf{b})$$ via cyclic shift, then identity above).", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "How can you obtain $$\\sin\\theta$$ between two vectors using the cross product, and why is this less convenient than using the dot product? (3 steps)", "answer": "- Step 1: From $$|\\mathbf{a}\\times\\mathbf{b}|=|\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$, rearrange: $$\\sin\\theta=\\dfrac{|\\mathbf{a}\\times\\mathbf{b}|}{|\\mathbf{a}||\\mathbf{b}|}$$.\n- Step 2: This always yields a non-negative value because $$\\sin\\theta\\ge 0$$ on $$[0°,180°]$$.\n- Step 3: The catch: $$\\sin\\theta$$ alone cannot distinguish acute from obtuse, since e.g. $$\\sin 60°=\\sin 120°$$. Using $$\\cos\\theta$$ (from the dot product) reveals the sign of the cosine, immediately telling us if the angle is acute (positive cosine) or obtuse (negative).\n\nIn practice: prefer the dot-product approach for angles unless you also need the perpendicular vector.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "A plane passes through point $$A$$ with position vector $$\\mathbf{a}$$, and contains two non-parallel vectors $$\\mathbf{b}$$ and $$\\mathbf{c}$$. Explain how any point $$R$$ on the plane can be reached from $$A$$, leading to the vector equation $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b} + \\mu\\mathbf{c}$$. (3 steps)", "answer": "- Step 1: To get from the origin to point $$R$$, you can go via point $$A$$: $$\\overrightarrow{OR} = \\overrightarrow{OA} + \\overrightarrow{AR}$$, so $$\\mathbf{r} = \\mathbf{a} + \\overrightarrow{AR}$$.\n- Step 2: The vector $$\\overrightarrow{AR}$$ lies entirely within the plane. Since $$\\mathbf{b}$$ and $$\\mathbf{c}$$ are non-parallel vectors in the plane, they form a basis for the plane. Any vector in the plane can be expressed as a linear combination of $$\\mathbf{b}$$ and $$\\mathbf{c}$$.\n- Step 3: Therefore, $$\\overrightarrow{AR} = \\lambda\\mathbf{b} + \\mu\\mathbf{c}$$ for some scalars $$\\lambda$$ and $$\\mu$$. Substituting this back gives the vector equation of the plane: $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b} + \\mu\\mathbf{c}$$. This requires two parameters, reflecting the 2-dimensional nature of a plane.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "Compute $$(2\\mathbf{i}+3\\mathbf{j})\\times\\mathbf{k}$$ mentally using basis-vector identities. (3 steps)", "answer": "- Step 1: Distribute: $$(2\\mathbf{i}+3\\mathbf{j})\\times\\mathbf{k}=2(\\mathbf{i}\\times\\mathbf{k})+3(\\mathbf{j}\\times\\mathbf{k})$$.\n- Step 2: Recall $$\\mathbf{i}\\times\\mathbf{k}=-\\mathbf{j}$$ (reverse cyclic) and $$\\mathbf{j}\\times\\mathbf{k}=\\mathbf{i}$$ (forward cyclic).\n- Step 3: Combine: $$2(-\\mathbf{j})+3(\\mathbf{i})=3\\mathbf{i}-2\\mathbf{j}$$.\n\nThis kind of mental drill reinforces the cyclic memory and the anti-commutative behavior.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "Derive the component formula for $$\\mathbf{a}\\times\\mathbf{b}$$ from the basis-vector cross products. (4 steps)", "answer": "- Step 1: Write $$\\mathbf{a}=a_1\\mathbf{i}+a_2\\mathbf{j}+a_3\\mathbf{k}$$ and $$\\mathbf{b}=b_1\\mathbf{i}+b_2\\mathbf{j}+b_3\\mathbf{k}$$, then use distributivity to expand the cross product term by term.\n- Step 2: Replace each basis-vector cross product:\n+ Diagonal terms ($$\\mathbf{i}\\times\\mathbf{i}$$, etc.) give $$\\mathbf{0}$$ and vanish.\n+ Off-diagonal terms produce $$\\pm\\mathbf{i},\\pm\\mathbf{j},\\pm\\mathbf{k}$$ via the cyclic rule.\n- Step 3: Collect by basis vector. The $$\\mathbf{i}$$ component gathers $$a_2b_3-a_3b_2$$; $$\\mathbf{j}$$ gathers $$a_3b_1-a_1b_3$$; $$\\mathbf{k}$$ gathers $$a_1b_2-a_2b_1$$.\n- Step 4: Final result: $$\\mathbf{a}\\times\\mathbf{b}=(a_2b_3-a_3b_2)\\mathbf{i}+(a_3b_1-a_1b_3)\\mathbf{j}+(a_1b_2-a_2b_1)\\mathbf{k}$$.\n\nThe minus sign on the $$\\mathbf{j}$$ component traces back to the cyclic order ($$\\mathbf{i}\\to\\mathbf{j}\\to\\mathbf{k}$$ skips backwards through $$\\mathbf{j}$$).", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "How does the cyclic property $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\mathbf{b} \\cdot (\\mathbf{c} \\times \\mathbf{a}) = \\mathbf{c} \\cdot (\\mathbf{a} \\times \\mathbf{b})$$ relate to the determinant form of the scalar triple product? (2 steps)", "answer": "- Step 1: The scalar triple product can be evaluated as a $$3 \\times 3$$ determinant with rows corresponding to the components of $\\mathbf{a}$, $\\mathbf{b}$, and $\\mathbf{c}$.\n- Step 2: In linear algebra, swapping two rows of a determinant changes its sign. However, the cyclic permutations $$\\mathbf{a} \\to \\mathbf{b} \\to \\mathbf{c} \\to \\mathbf{a}$$ involve two swaps (e.g., moving $\\mathbf{a}$ to the bottom involves swapping row 1 with row 2, then with row 3). Two sign changes cancel out, leaving the value of the determinant unchanged.\n+ Swapping adjacent vectors (e.g., $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$ to $$\\mathbf{b} \\cdot (\\mathbf{a} \\times \\mathbf{c})$$) reverses the sign, just like swapping two rows in a determinant.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "Explain why the formula for the volume of a tetrahedron uses 1/6 instead of 1/3 like a pyramid. (2 steps)", "answer": "- Step 1: A tetrahedron IS a pyramid with a triangular base. The volume formula for any pyramid is $$V = \\frac{1}{3} \\times (\\text{base area}) \\times (\\text{height})$$.\n- Step 2: For a tetrahedron with edges a, b, c meeting at one vertex, the \"base\" can be the parallelogram formed by b and c, which has area $$|\\mathbf{b} \\times \\mathbf{c}|$$. But a tetrahedron is exactly half of this parallelepiped (the parallelepiped can be divided into 6 tetrahedra of equal volume). Hence $$\\frac{1}{3} \\times \\frac{1}{2} = \\frac{1}{6}$$.", "source": "MiniMax ②", "_id": "minimax_2_37"}, {"question": "A common confusion: which of $$\\mathbf{a}\\cdot\\mathbf{b}, \\mathbf{a}\\times\\mathbf{b}, |\\mathbf{a}\\times\\mathbf{b}|, |\\mathbf{a}|\\cdot|\\mathbf{b}|$$ are scalars? Which are vectors? (3 steps)", "answer": "- Step 1: $$\\mathbf{a}\\cdot\\mathbf{b}$$ — scalar (dot product). Numerical value, can be negative or zero.\n- Step 2: $$\\mathbf{a}\\times\\mathbf{b}$$ — vector. Has direction and magnitude.\n- Step 3: $$|\\mathbf{a}\\times\\mathbf{b}|$$ — scalar (magnitude of a vector). Always non-negative.\n+ $$|\\mathbf{a}|\\cdot|\\mathbf{b}|$$ — scalar (product of two scalars). Always non-negative.\n\nDon't write expressions like \"$$\\mathbf{a}\\times\\mathbf{b}+\\mathbf{a}\\cdot\\mathbf{b}$$\" — that adds a vector to a scalar (nonsense).", "source": "Opus 4.7 ①", "_id": "opus_1_68"}, {"question": "Without memorizing a table, how can you deduce $$\\mathbf{i} \\times \\mathbf{j} = \\mathbf{k}$$ and $$\\mathbf{j} \\times \\mathbf{i} = -\\mathbf{k}$$? (3 steps)", "answer": "- Step 1: The vectors $\\mathbf{i}$, $\\mathbf{j}$, and $\\mathbf{k}$ are mutually perpendicular, so the angle between any two is $$90^\\circ$$, meaning $$\\sin 90^\\circ = 1$$. They are also unit vectors, so their magnitudes are 1.\n- Step 2: For $$\\mathbf{i} \\times \\mathbf{j}$$, apply the right-hand rule: point fingers along the x-axis ($\\mathbf{i}$), curl towards the y-axis ($\\mathbf{j}$). Your thumb points along the z-axis ($\\mathbf{k}$). So $$\\mathbf{i} \\times \\mathbf{j} = 1 \\cdot 1 \\cdot 1 \\cdot \\mathbf{k} = \\mathbf{k}$$.\n- Step 3: For $$\\mathbf{j} \\times \\mathbf{i}$$, the anti-commutative property applies, so $$\\mathbf{j} \\times \\mathbf{i} = -(\\mathbf{i} \\times \\mathbf{j}) = -\\mathbf{k}$$.\n+ Any cross product of a vector with itself (e.g., $$\\mathbf{i} \\times \\mathbf{i}$$) is $\\mathbf{0}$ because the angle is $$0^\\circ$$.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "MISCONCEPTION PROBE: A student says \"Since $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$, the vectors a and b must be perpendicular.\" Explain why this is wrong and give a counterexample. (2 steps)", "answer": "- Step 1: This is completely wrong! The cross product is ZERO when vectors are PARALLEL (or one is zero), not perpendicular.\n- Step 2: Counterexample: Take $$\\mathbf{a} = \\mathbf{i}$$ and $$\\mathbf{b} = 2\\mathbf{i}$$. These are parallel (both point in the x-direction), and $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{i} \\times 2\\mathbf{i} = \\mathbf{0}$$. Another counterexample: any vector crossed with itself gives zero.", "source": "MiniMax ②", "_id": "minimax_2_40"}, {"question": "Why does the vector parametric form of a plane $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}+\\mu\\mathbf{c}$$ require *two* parameters (not one or three)? (3 steps)", "answer": "- Step 1: A line is 1D; reaching any point on it requires a single scalar parameter (one degree of freedom).\n- Step 2: A plane is 2D; reaching any point on it requires two scalar parameters because you need two independent directions of motion.\n- Step 3: Three parameters would let you reach any point in 3D space — too much freedom; you'd be describing all of space, not just a plane. Hence exactly two non-parallel direction vectors $$\\mathbf{b},\\mathbf{c}$$ (and two parameters $$\\lambda,\\mu$$) are needed.\n\nThe number of parameters tells you the dimension of the geometric object.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Explain why the cross product magnitude equals the area of the parallelogram, but the scalar triple product magnitude equals the volume of the parallelepiped. How are these related concepts? (2 steps)", "answer": "- Step 1: Cross product gives a vector perpendicular to two input vectors - its magnitude equals \"area spanned\" by them (like base × height for parallelogram).\n\n- Step 2: Scalar triple product is dot product of one vector with the cross product of two others. The cross product gives base area, the dot product projects the third vector onto the perpendicular direction, giving height. Area × height = volume.\n\n**Unified view:** These are successive generalizations: dot product gives projection, cross product gives perpendicular area, scalar triple product gives 3D volume. Each builds on the previous.", "source": "MiniMax ①", "_id": "minimax_1_64"}, {"question": "Give two distinct proofs that $$\\mathbf{a}\\cdot(\\mathbf{a}\\times\\mathbf{p})=0$$ for any vector $$\\mathbf{p}$$. (3 steps)", "answer": "- Step 1: Proof 1 (direct geometric): The vector $$\\mathbf{a}\\times\\mathbf{p}$$ is, by the very definition of cross product, perpendicular to $$\\mathbf{a}$$. The dot product of any vector with something perpendicular to it is zero.\n- Step 2: Proof 2 (using cyclic property): $$\\mathbf{a}\\cdot(\\mathbf{a}\\times\\mathbf{p})=\\mathbf{p}\\cdot(\\mathbf{a}\\times\\mathbf{a})$$ by cyclic shift, $$=\\mathbf{p}\\cdot\\mathbf{0}=0$$.\n- Step 3: Both proofs reveal the same underlying fact — a determinant with two equal rows is zero (since $$\\mathbf{a}$$ appears twice in $$\\mathbf{a}\\cdot(\\mathbf{a}\\times\\mathbf{p})$$).\n\nThis is why repeating any vector in a scalar triple product gives zero.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "Explain why the formula $$\\mathbf{r}\\cdot\\hat{\\mathbf{n}}=d$$ gives $$d$$ as the perpendicular distance from the origin to the plane. (4 steps)", "answer": "- Step 1: The unit normal $$\\hat{\\mathbf{n}}$$ has $$|\\hat{\\mathbf{n}}|=1$$. Let $$F$$ be the foot of the perpendicular from origin $$O$$ to the plane.\n- Step 2: For any point $$R$$ on the plane with position $$\\mathbf{r}$$, the dot product $$\\mathbf{r}\\cdot\\hat{\\mathbf{n}}=|\\mathbf{r}|\\cos\\alpha$$, where $$\\alpha$$ is the angle between $$\\overrightarrow{OR}$$ and $$\\hat{\\mathbf{n}}$$.\n- Step 3: But $$|\\mathbf{r}|\\cos\\alpha$$ is exactly the *projection* of $$\\overrightarrow{OR}$$ onto $$\\hat{\\mathbf{n}}$$, and this projection is the same for *every* point on the plane — namely $$|\\overrightarrow{OF}|=d$$.\n- Step 4: So $$\\mathbf{r}\\cdot\\hat{\\mathbf{n}}=d$$, the perpendicular distance from $$O$$ to the plane.\n\nCrucial: this only works when the normal is normalised (unit length).", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "Explain why the cross-product form of the line equation $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$ describes a line through point $$A$$ (with position $$\\mathbf{a}$$) parallel to $$\\mathbf{b}$$. (3 steps)", "answer": "- Step 1: A point $$R$$ with position $$\\mathbf{r}$$ is on the line iff the displacement $$\\overrightarrow{AR}=\\mathbf{r}-\\mathbf{a}$$ points in the same direction as the line's direction vector $$\\mathbf{b}$$ — i.e., $$\\overrightarrow{AR}$$ is parallel to $$\\mathbf{b}$$.\n- Step 2: Two parallel vectors have zero cross product (recall: $$\\mathbf{u}\\times\\mathbf{v}=\\mathbf{0}$$ when $$\\mathbf{u}\\parallel\\mathbf{v}$$).\n- Step 3: So the parallelism condition translates exactly to $$(\\mathbf{r}-\\mathbf{a})\\times\\mathbf{b}=\\mathbf{0}$$.\n\nThis is an elegant *parameter-free* equation — no need to introduce $$\\lambda$$.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "Explain why you cannot find a unique plane given only a single point and a direction vector parallel to the plane. What additional information is needed? (1 step)", "answer": "- Step 1: A single direction vector only tells you one direction lying IN the plane. You need either: (a) a second non-parallel direction vector in the plane, OR (b) the normal vector to the plane. With just one direction vector, there are infinitely many planes containing that direction.", "source": "MiniMax ②", "_id": "minimax_2_62"}, {"question": "Why is the determinant form $$\\mathbf{a}\\times\\mathbf{b}=\\begin{vmatrix}\\mathbf{i}&\\mathbf{j}&\\mathbf{k}\\\\a_1&a_2&a_3\\\\b_1&b_2&b_3\\end{vmatrix}$$ correct, and why is it useful?", "answer": "- Step 1: Expanding along the first row gives $$\\mathbf{i}(a_2b_3-a_3b_2)-\\mathbf{j}(a_1b_3-a_3b_1)+\\mathbf{k}(a_1b_2-a_2b_1)$$, which matches the component formula exactly.\n- Step 2: The alternating $$+,-,+$$ pattern of cofactor expansion produces precisely the cyclic structure of the cross product.\n- Step 3: It's useful because:\n+ It's faster and less error-prone than expanding term by term.\n+ It connects cross product to determinant theory (e.g., scalar triple product).\n+ The structure makes the antisymmetry obvious: swap rows 2 and 3 (i.e., $$\\mathbf{a}$$ and $$\\mathbf{b}$$) and the determinant changes sign.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "Explain why the equation of the plane through three coplanar (collinear) points is *not* well-defined.", "answer": "- Step 1: For the cross product method, we compute $$\\mathbf{n}=\\overrightarrow{AB}\\times\\overrightarrow{AC}$$. If $$A,B,C$$ are collinear, $$\\overrightarrow{AB}$$ and $$\\overrightarrow{AC}$$ are parallel.\n- Step 2: Cross product of parallel vectors is $$\\mathbf{0}$$ — there's no normal direction.\n- Step 3: Geometrically: three collinear points lie on infinitely many planes (any plane containing the line). Three points determine a unique plane only if they're *non-collinear*.\n\nAlways check for non-collinearity before applying the \"three-point plane\" formula.", "source": "Opus 4.7 ①", "_id": "opus_1_82"}, {"question": "What's the difference between $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})$$ being negative versus positive — does volume become negative?", "answer": "- Step 1: The scalar triple product encodes a *signed* volume. The sign depends on whether the ordering $$(\\mathbf{a},\\mathbf{b},\\mathbf{c})$$ is right-handed (positive) or left-handed (negative).\n- Step 2: Physical volume is always non-negative — so when we report a volume, we take the absolute value.\n- Step 3: A negative sign isn't a calculation error; it's geometric information about orientation. If you swap any two of $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$, the sign flips.\n\nSo: don't panic if the scalar triple product comes out negative; just take its modulus.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "A line lies on a plane $$\\Pi$$. Show that $$\\mathbf{b}\\cdot\\mathbf{n}=0$$ where $$\\mathbf{b}$$ is the line direction and $$\\mathbf{n}$$ is the plane normal, and explain its meaning. (3 steps)", "answer": "- Step 1: Take two points $$P$$ and $$Q$$ on the line. Since both lie in the plane: $$\\mathbf{p}\\cdot\\mathbf{n}=p$$ and $$\\mathbf{q}\\cdot\\mathbf{n}=p$$.\n- Step 2: Subtract: $$(\\mathbf{q}-\\mathbf{p})\\cdot\\mathbf{n}=0$$. But $$\\mathbf{q}-\\mathbf{p}$$ is parallel to the line direction $$\\mathbf{b}$$.\n- Step 3: So $$\\mathbf{b}\\cdot\\mathbf{n}=0$$ — the line direction is perpendicular to the plane's normal, which is the geometric statement that \"$$\\mathbf{b}$$ lies parallel to the plane.\"\n\nThis is the test for line containment / parallelism.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "Why is the angle between two planes equal to the angle between their normal vectors?", "answer": "- Step 1: Imagine the two planes meeting along a line. Take a cross-section perpendicular to that line — you see two perpendicular lines (one in each plane), and the angle between them is the dihedral angle.\n- Step 2: Both normal vectors are also perpendicular to the line of intersection. The angle between them equals the dihedral angle (up to supplement).\n- Step 3: Hence $$\\cos\\theta=\\dfrac{|\\mathbf{n}_1\\cdot\\mathbf{n}_2|}{|\\mathbf{n}_1||\\mathbf{n}_2|}$$, with absolute value to capture the acute angle.\n\nIn short: the normals \"carry\" the orientation information of their planes.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "Mental drill: Compute $$(\\mathbf{i}+\\mathbf{j})\\times(\\mathbf{i}-\\mathbf{j})$$ without a determinant. (3 steps)", "answer": "- Step 1: Distribute: $$(\\mathbf{i}+\\mathbf{j})\\times(\\mathbf{i}-\\mathbf{j})=\\mathbf{i}\\times\\mathbf{i}-\\mathbf{i}\\times\\mathbf{j}+\\mathbf{j}\\times\\mathbf{i}-\\mathbf{j}\\times\\mathbf{j}$$.\n- Step 2: Replace: $$\\mathbf{i}\\times\\mathbf{i}=\\mathbf{0}$$, $$\\mathbf{j}\\times\\mathbf{j}=\\mathbf{0}$$, $$\\mathbf{i}\\times\\mathbf{j}=\\mathbf{k}$$, $$\\mathbf{j}\\times\\mathbf{i}=-\\mathbf{k}$$.\n- Step 3: Combine: $$\\mathbf{0}-\\mathbf{k}+(-\\mathbf{k})-\\mathbf{0}=-2\\mathbf{k}$$.\n\nThe result $$-2\\mathbf{k}$$ matches the parallelogram area: vectors $$(1,1,0)$$ and $$(1,-1,0)$$ span a square of area 2 in the $$xy$$-plane; cross product points in $$-\\mathbf{k}$$ direction.", "source": "Opus 4.7 ①", "_id": "opus_1_71"}, {"question": "Why is the area of triangle $$ABC$$ given by $$\\tfrac{1}{2}|\\overrightarrow{AB}\\times\\overrightarrow{AC}|$$ and *not* by $$\\tfrac{1}{2}|\\mathbf{a}\\times\\mathbf{b}|$$ where $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$ are position vectors of $$A,B,C$$?", "answer": "- Step 1: The formula $$\\tfrac{1}{2}|\\mathbf{a}\\times\\mathbf{b}|$$ assumes the triangle has vertex at the origin with sides $$\\mathbf{a}$$ and $$\\mathbf{b}$$ — but in general $$A$$ is *not* the origin.\n- Step 2: The actual sides emanating from $$A$$ are $$\\overrightarrow{AB}=\\mathbf{b}-\\mathbf{a}$$ and $$\\overrightarrow{AC}=\\mathbf{c}-\\mathbf{a}$$, not $$\\mathbf{b}$$ and $$\\mathbf{c}$$ themselves.\n- Step 3: So $$\\text{Area}=\\tfrac{1}{2}|\\overrightarrow{AB}\\times\\overrightarrow{AC}|=\\tfrac{1}{2}|(\\mathbf{b}-\\mathbf{a})\\times(\\mathbf{c}-\\mathbf{a})|$$ — this works regardless of where the triangle is placed.\n\nThe formula $$\\tfrac{1}{2}|\\mathbf{a}\\times\\mathbf{b}|$$ is a special case of the general formula with $$\\mathbf{a}=\\mathbf{0}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "Volume mental check: A box has edges $$\\mathbf{i}, 2\\mathbf{j}, 3\\mathbf{k}$$ — what is its volume by scalar triple product?", "answer": "- Step 1: $$\\mathbf{i}\\cdot(2\\mathbf{j}\\times 3\\mathbf{k})=\\mathbf{i}\\cdot(6(\\mathbf{j}\\times\\mathbf{k}))=\\mathbf{i}\\cdot 6\\mathbf{i}=6$$.\n- Step 2: Volume $$=|6|=6$$.\n- Step 3: Sanity check: this is a rectangular box with sides $$1,2,3$$ — volume $$=1\\cdot 2\\cdot 3=6$$. ✓\n\nThe scalar triple product reduces to ordinary multiplication when edges are along coordinate axes.", "source": "Opus 4.7 ①", "_id": "opus_1_80"}, {"question": "Why is the scalar triple product $$\\mathbf{a} \\cdot (\\mathbf{a} \\times \\mathbf{c})$$ always equal to zero for any vector $\\mathbf{c}$? Give both an algebraic and a geometric reason. (3 steps)", "answer": "- Step 1: Algebraically, using the cyclic property, $$\\mathbf{a} \\cdot (\\mathbf{a} \\times \\mathbf{c}) = \\mathbf{c} \\cdot (\\mathbf{a} \\times \\mathbf{a})$$. Since the cross product of any vector with itself is $\\mathbf{0}$, this becomes $$\\mathbf{c} \\cdot \\mathbf{0} = 0$$.\n- Step 2: Geometrically, the vector $$\\mathbf{a} \\times \\mathbf{c}$$ is perpendicular to the plane containing $\\mathbf{a}$ and $\\mathbf{c}$.\n- Step 3: Therefore, $\\mathbf{a}$ must be perpendicular to $$\\mathbf{a} \\times \\mathbf{c}$$. The dot product of two perpendicular vectors is zero.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "Lines $$l_1$$ and $$l_2$$ are checked: $$\\lambda=2, \\mu=-3$$ solve two of three coordinate equations, but the third fails. What does this tell you about the lines, and why?", "answer": "- Step 1: Three coordinate equations from setting positions equal must *all* be satisfied for the lines to share a point.\n- Step 2: Two equations being satisfied means parameter values exist that make the $$x$$ and $$y$$ coordinates (say) match — but the $$z$$ coordinates differ.\n- Step 3: So the lines pass \"above and below\" each other — they are skew (assuming directions aren't parallel).\n\nThe third-equation check is essential. Without it, you'd falsely conclude the lines meet.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "What goes wrong with the skew-line distance formula when the two lines are parallel?", "answer": "- Step 1: If the two lines are parallel, then $$\\mathbf{b}\\parallel\\mathbf{d}$$, so $$\\mathbf{b}\\times\\mathbf{d}=\\mathbf{0}$$.\n- Step 2: The denominator $$|\\mathbf{b}\\times\\mathbf{d}|=0$$, making the formula undefined (division by zero).\n- Step 3: Geometrically: parallel lines don't have a *unique* common perpendicular direction (any direction perpendicular to the shared direction works), so the formula's reasoning fails.\n\nFor parallel lines, use a different approach: pick any vector connecting them, and project out the component along the common direction. The remaining perpendicular component's magnitude is the distance.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Misconception probe: A student writes \"since cross product is distributive, $$(a\\mathbf{u})\\times(b\\mathbf{v})=ab(\\mathbf{u}\\times\\mathbf{v})$$.\" Is this correct?", "answer": "- Step 1: Yes, this is correct, but it relies on more than just distributivity — it uses *bilinearity*.\n- Step 2: Specifically: $$(a\\mathbf{u})\\times\\mathbf{v}=a(\\mathbf{u}\\times\\mathbf{v})$$ (scalar pulls out of the first slot), and similarly the second slot. Combining: $$(a\\mathbf{u})\\times(b\\mathbf{v})=a(\\mathbf{u}\\times(b\\mathbf{v}))=ab(\\mathbf{u}\\times\\mathbf{v})$$.\n- Step 3: This is why, for example, $$(2\\mathbf{i})\\times(3\\mathbf{j})=6\\mathbf{k}$$ — direct calculation gives the same answer as factoring out scalars.\n\nBoth distributivity (over addition) and scalar-extraction (over multiplication) are crucial properties to use freely.", "source": "Opus 4.7 ①", "_id": "opus_1_67"}, {"question": "What is the geometric meaning of the condition $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=0$$, and why?", "answer": "- Step 1: The vector $$\\mathbf{b}\\times\\mathbf{c}$$ is perpendicular to the plane spanned by $$\\mathbf{b}$$ and $$\\mathbf{c}$$.\n- Step 2: $$\\mathbf{a}\\cdot(\\mathbf{b}\\times\\mathbf{c})=0$$ means $$\\mathbf{a}$$ is perpendicular to that perpendicular — i.e., $$\\mathbf{a}$$ lies *in* the plane of $$\\mathbf{b}$$ and $$\\mathbf{c}$$.\n- Step 3: Equivalently: the three vectors $$\\mathbf{a},\\mathbf{b},\\mathbf{c}$$ are *coplanar*. The parallelepiped collapses to a flat figure with zero volume.\n\nThis is the standard test for coplanarity of three vectors.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "Why is $$\\sin\\theta$$ used in the cross product formula rather than $$\\cos\\theta$$? (3 steps)", "answer": "- Step 1: The cross product measures *perpendicularity* — when two vectors are parallel, no parallelogram is formed, and the result should be zero.\n- Step 2: $$\\sin 0°=0$$ (parallel) and $$\\sin 90°=1$$ (perpendicular). This matches: collapsed parallelogram → zero, full parallelogram → maximum.\n- Step 3: Compare with the dot product, which uses $$\\cos\\theta$$ to measure *alignment*: $$\\cos 0°=1$$ (parallel, max alignment) and $$\\cos 90°=0$$ (perpendicular, no alignment).\n\nThe two trig functions reflect the complementary nature of the two products.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Why is the direction of the line of intersection of two planes equal to $$\\mathbf{n}_1\\times\\mathbf{n}_2$$? (3 steps)", "answer": "- Step 1: The line of intersection lies in *both* planes simultaneously.\n- Step 2: A vector lying in plane 1 is perpendicular to its normal $$\\mathbf{n}_1$$; a vector lying in plane 2 is perpendicular to $$\\mathbf{n}_2$$. The intersection line's direction must therefore be perpendicular to both normals.\n- Step 3: The cross product $$\\mathbf{n}_1\\times\\mathbf{n}_2$$ is, by definition, perpendicular to both $$\\mathbf{n}_1$$ and $$\\mathbf{n}_2$$, so it gives the line's direction.\n\nEdge case: if $$\\mathbf{n}_1\\parallel\\mathbf{n}_2$$, the planes are parallel and either don't intersect or are identical.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "Two parallel lines $$\\mathbf{r}=\\mathbf{a}+\\lambda\\mathbf{b}$$ and $$\\mathbf{r}=\\mathbf{c}+\\mu\\mathbf{b}$$ (same direction $$\\mathbf{b}$$). Why doesn't the skew-line formula work, and how do you find the distance between them? (4 steps)", "answer": "- Step 1: The skew formula uses $$\\mathbf{b}\\times\\mathbf{d}$$ in the denominator — but here both lines share $$\\mathbf{b}$$, so $$\\mathbf{b}\\times\\mathbf{b}=\\mathbf{0}$$ (division by zero).\n- Step 2: Instead, use the connecting vector $$\\overrightarrow{PQ}=\\mathbf{c}-\\mathbf{a}$$ between any two points (one on each line).\n- Step 3: Project out the component of $$\\overrightarrow{PQ}$$ along the shared direction $$\\mathbf{b}$$ (parallel component); the remaining perpendicular component's length is the distance.\n- Step 4: Compactly: distance $$=\\dfrac{|(\\mathbf{c}-\\mathbf{a})\\times\\mathbf{b}|}{|\\mathbf{b}|}$$ — geometrically, the area of the parallelogram with sides $$(\\mathbf{c}-\\mathbf{a})$$ and $$\\mathbf{b}$$, divided by the base length.\n\nThe \"area / base = height\" trick.", "source": "Opus 4.7 ①", "_id": "opus_1_69"}, {"question": "Conceptual probe: Why does the Cartesian equation $$ax+by+cz+d=0$$ describe a plane (not a curved surface)?", "answer": "- Step 1: $$ax+by+cz+d=0$$ is *linear* in $$x,y,z$$ — only first powers, no products or squares.\n- Step 2: Linear equations describe flat objects: in 1D a point on a number line, in 2D a line, in 3D a plane.\n- Step 3: Geometrically: the equation $$\\mathbf{r}\\cdot\\mathbf{n}=p$$ (which is the same equation) says \"all points whose projection onto $$\\mathbf{n}$$ is constant\" — these form a flat slice perpendicular to $$\\mathbf{n}$$.\n\nCurvature would require non-linear terms (like $$x^2+y^2+z^2=1$$, a sphere).", "source": "Opus 4.7 ①", "_id": "opus_1_77"}, {"question": "Why is the shortest distance from a point to a line calculated using the cross product?", "answer": "- Step 1: For a point **p** and line **r** = **a** + λ**b**, the vector **p** - **a** forms a parallelogram with **b**.  \n- Step 2: The area of this parallelogram is |(**p** - **a**) × **b**|, and height (distance) = area / |**b**|.  \n- Step 3: Thus, distance $ d = \\frac{|(\\mathbf{p} - \\mathbf{a}) \\times \\mathbf{b}|}{|\\mathbf{b}|} $.  \n+ Misconception: Using the dot product here would project **p** onto **b**, which gives the wrong direction.", "source": "Qwen 3 ①", "_id": "qwen_1_8"}, {"question": "For a parallelogram $ABCD$ with position vectors $\\mathbf{a}, \\mathbf{b}, \\mathbf{c}, \\mathbf{d}$ for its vertices, the area is $$|\\overrightarrow{AB} \\times \\overrightarrow{AD}|$$. Why do we use two *adjacent* side vectors, and what happens if we use two *opposite* side vectors like $$\\overrightarrow{AB}$$ and $$\\overrightarrow{CD}$$? (2 steps)", "answer": "- Step 1: We use adjacent sides because the area of a parallelogram is base $\\times$ height, which translates to $$|\\mathbf{u}||\\mathbf{v}|\\sin\\theta$$ where $\\theta$ is the angle between adjacent sides.\n- Step 2: If we use opposite sides like $$\\overrightarrow{AB}$$ and $$\\overrightarrow{CD}$$, since $$\\overrightarrow{CD}$$ is parallel to $$\\overrightarrow{AB}$$, their cross product is $\\mathbf{0}$, giving an area of 0. This makes geometric sense: two parallel vectors don't span a 2D area.\n+ Always ensure the vectors used for the area formula emanate from the same vertex (are adjacent).", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "Conceptual capstone: Why are vectors so powerful for 3D geometry compared to coordinate-based methods?", "answer": "- Step 1: Vector operations (dot, cross, scalar triple) directly encode geometric quantities — angles, areas, volumes, perpendicularity — without picking a coordinate system.\n- Step 2: This means proofs and formulas are coordinate-free and can be applied in any orientation. For example, $$|\\mathbf{a}\\times\\mathbf{b}|$$ gives an area no matter how you rotate the figure.\n- Step 3: Vectors also unify many disparate concepts:\n+ Lines and planes — described by anchor points and directions/normals.\n+ Distances — projections of one vector onto another.\n+ Angles — ratios of dot/cross products.\n\nCartesian methods often require setting up multiple equations and solving them; vector methods work geometrically and arrive at answers more directly. This is why vector calculus and 3D geometry rely heavily on cross and triple products.", "source": "Opus 4.7 ①", "_id": "opus_1_84"}, {"question": "Three planes meet at a common point. What conditions distinguish \"they meet at a single point\" from \"their intersection is a line\" from \"no common intersection\"?", "answer": "- Step 1:
