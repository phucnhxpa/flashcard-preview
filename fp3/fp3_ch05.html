3 b_2)\\mathbf{i} + (a_3 b_1 - a_1 b_3)\\mathbf{j} + (a_1 b_2 - a_2 b_1)\\mathbf{k}$$, which perfectly matches the component form of $$\\mathbf{a} \\times \\mathbf{b}$$.\n+ The determinant method is a systematic way to avoid sign errors that often occur when distributing the cross product manually.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "If you know $$\\mathbf{a} \\times \\mathbf{b}$$, how can you find $$\\sin\\theta$$ where $\\theta$ is the angle between $\\mathbf{a}$ and $\\mathbf{b}$? Why might using the dot product to find the angle be preferable? (3 steps)", "answer": "- Step 1: From the definition, $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$. Rearranging gives $$\\sin\\theta = \\frac{|\\mathbf{a} \\times \\mathbf{b}|}{|\\mathbf{a}||\\mathbf{b}|}$$.\n- Step 2: This formula only gives $$\\sin\\theta$$. However, $$\\sin\\theta = \\sin(180^\\circ - \\theta)$$, so this formula cannot distinguish between an acute angle and an obtuse angle (the ambiguous case of the sine rule).\n- Step 3: The dot product gives $$\\cos\\theta = \\frac{\\mathbf{a}\\cdot\\mathbf{b}}{|\\mathbf{a}||\\mathbf{b}|}$$. Since $$\\cos\\theta$$ is positive for acute angles and negative for obtuse angles, the dot product immediately tells you whether the angle is acute or obtuse, resolving the ambiguity.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Why is the area of triangle $OAB$, where $O$ is the origin, given by $$\\frac{1}{2}|\\mathbf{a} \\times \\mathbf{b}|$$? (2 steps)", "answer": "- Step 1: The standard formula for the area of a triangle is $$\\frac{1}{2}ab\\sin C$$. Here, sides $OA$ and $OB$ have lengths $$|\\mathbf{a}|$$ and $$|\\mathbf{b}|$$, and the included angle is $\\theta$.\n- Step 2: So Area = $$\\frac{1}{2}|\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$. Since $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}|\\sin\\theta$$, substituting this in gives Area = $$\\frac{1}{2}|\\mathbf{a} \\times \\mathbf{b}|$$.\n+ The cross product magnitude is literally the \"area of the parallelogram\" formed by the two vectors, so the triangle is exactly half of that.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "For a parallelogram $ABCD$ with position vectors $\\mathbf{a}, \\mathbf{b}, \\mathbf{c}, \\mathbf{d}$ for its vertices, the area is $$|\\overrightarrow{AB} \\times \\overrightarrow{AD}|$$. Why do we use two *adjacent* side vectors, and what happens if we use two *opposite* side vectors like $$\\overrightarrow{AB}$$ and $$\\overrightarrow{CD}$$? (2 steps)", "answer": "- Step 1: We use adjacent sides because the area of a parallelogram is base $\\times$ height, which translates to $$|\\mathbf{u}||\\mathbf{v}|\\sin\\theta$$ where $\\theta$ is the angle between adjacent sides.\n- Step 2: If we use opposite sides like $$\\overrightarrow{AB}$$ and $$\\overrightarrow{CD}$$, since $$\\overrightarrow{CD}$$ is parallel to $$\\overrightarrow{AB}$$, their cross product is $\\mathbf{0}$, giving an area of 0. This makes geometric sense: two parallel vectors don't span a 2D area.\n+ Always ensure the vectors used for the area formula emanate from the same vertex (are adjacent).", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "A triangle has vertices at $O(0,0,0)$, $A(1,0,0)$, and $B(0,1,0)$. Conceptually, what is the area of this triangle, and how does the cross product confirm this? (2 steps)", "answer": "- Step 1: This is a right-angled triangle in the xy-plane with legs of length 1. Its area is simply $$\\frac{1}{2} \\times 1 \\times 1 = 0.5$$.\n- Step 2: Using the formula: $$\\mathbf{a} = \\mathbf{i}$$ and $$\\mathbf{b} = \\mathbf{j}$$. The cross product is $$\\mathbf{i} \\times \\mathbf{j} = \\mathbf{k}$$. The magnitude is $$|\\mathbf{k}| = 1$$. So the area is $$\\frac{1}{2} \\times 1 = 0.5$$, which matches perfectly.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "The scalar triple product $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$ gives a scalar. Geometrically, what does the *sign* (positive or negative) of this result tell you about the vectors $\\mathbf{a}, \\mathbf{b}, \\mathbf{c}$? (3 steps)", "answer": "- Step 1: The vector $$\\mathbf{b} \\times \\mathbf{c}$$ points in a direction according to the right-hand rule applied to $\\mathbf{b}$ and $\\mathbf{c}$. Let's call this direction \"upwards\" relative to the plane of $\\mathbf{b}$ and $\\mathbf{c}$.\n- Step 2: The dot product $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = |\\mathbf{a}||\\mathbf{b} \\times \\mathbf{c}|\\cos\\phi$$ will be positive if $$\\phi < 90^\\circ$$, meaning vector $\\mathbf{a}$ points generally in the same \"upwards\" direction as $$\\mathbf{b} \\times \\mathbf{c}$$.\n- Step 3: A positive scalar triple product means the set of vectors $$\\{\\mathbf{a}, \\mathbf{b}, \\mathbf{c}\\}$$ forms a \"right-handed set\" (you can map them to your right-hand thumb, index, and middle fingers). A negative result means they form a \"left-handed set\".", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "How does the cyclic property $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\mathbf{b} \\cdot (\\mathbf{c} \\times \\mathbf{a}) = \\mathbf{c} \\cdot (\\mathbf{a} \\times \\mathbf{b})$$ relate to the determinant form of the scalar triple product? (2 steps)", "answer": "- Step 1: The scalar triple product can be evaluated as a $$3 \\times 3$$ determinant with rows corresponding to the components of $\\mathbf{a}$, $\\mathbf{b}$, and $\\mathbf{c}$.\n- Step 2: In linear algebra, swapping two rows of a determinant changes its sign. However, the cyclic permutations $$\\mathbf{a} \\to \\mathbf{b} \\to \\mathbf{c} \\to \\mathbf{a}$$ involve two swaps (e.g., moving $\\mathbf{a}$ to the bottom involves swapping row 1 with row 2, then with row 3). Two sign changes cancel out, leaving the value of the determinant unchanged.\n+ Swapping adjacent vectors (e.g., $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})$$ to $$\\mathbf{b} \\cdot (\\mathbf{a} \\times \\mathbf{c})$$) reverses the sign, just like swapping two rows in a determinant.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "Why is the scalar triple product $$\\mathbf{a} \\cdot (\\mathbf{a} \\times \\mathbf{c})$$ always equal to zero for any vector $\\mathbf{c}$? Give both an algebraic and a geometric reason. (3 steps)", "answer": "- Step 1: Algebraically, using the cyclic property, $$\\mathbf{a} \\cdot (\\mathbf{a} \\times \\mathbf{c}) = \\mathbf{c} \\cdot (\\mathbf{a} \\times \\mathbf{a})$$. Since the cross product of any vector with itself is $\\mathbf{0}$, this becomes $$\\mathbf{c} \\cdot \\mathbf{0} = 0$$.\n- Step 2: Geometrically, the vector $$\\mathbf{a} \\times \\mathbf{c}$$ is perpendicular to the plane containing $\\mathbf{a}$ and $\\mathbf{c}$.\n- Step 3: Therefore, $\\mathbf{a}$ must be perpendicular to $$\\mathbf{a} \\times \\mathbf{c}$$. The dot product of two perpendicular vectors is zero.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "Three vectors $\\mathbf{a}, \\mathbf{b}, \\mathbf{c}$ are given. If $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = 0$$, and none of the vectors are parallel or zero, what geometric configuration must they have? (2 steps)", "answer": "- Step 1: The scalar triple product represents the volume of the parallelepiped formed by the three vectors.\n- Step 2: If the volume is zero, the 3D solid has \"collapsed\" — the vectors must all lie in the same 2D plane. Thus, $\\mathbf{a}, \\mathbf{b}$, and $\\mathbf{c}$ are coplanar.\n+ Also, $$\\mathbf{b} \\times \\mathbf{c}$$ gives a vector perpendicular to the plane of $\\mathbf{b}$ and $\\mathbf{c}$. If $\\mathbf{a}$ dotted with this is 0, then $\\mathbf{a}$ is perpendicular to the normal, meaning $\\mathbf{a}$ lies in the same plane as $\\mathbf{b}$ and $\\mathbf{c}$.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "Why is the volume of a parallelepiped formed by vectors $\\mathbf{a}, \\mathbf{b}, \\mathbf{c}$ given by $$|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$? (3 steps)", "answer": "- Step 1: Volume of any prism is (Area of base) $\\times$ perpendicular height.\n- Step 2: The base parallelogram is formed by $\\mathbf{b}$ and $\\mathbf{c}$, so its area is $$|\\mathbf{b} \\times \\mathbf{c}|$$. The direction of $$\\mathbf{b} \\times \\mathbf{c}$$ is perpendicular to the base.\n- Step 3: The height is the component of $\\mathbf{a}$ in the direction perpendicular to the base, which is $$|\\mathbf{a}|\\cos\\phi$$ where $\\phi$ is the angle between $\\mathbf{a}$ and $$\\mathbf{b} \\times \\mathbf{c}$$. So Volume = $$|\\mathbf{b} \\times \\mathbf{c}| \\times |\\mathbf{a}|\\cos\\phi = |\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$. The absolute value ensures volume is positive regardless of the \"handedness\" of the vectors.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "How does the volume of a tetrahedron relate to the volume of a parallelepiped? Why is the formula for the tetrahedron's volume $$\\frac{1}{6}|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$? (3 steps)", "answer": "- Step 1: A parallelepiped can be divided into 6 tetrahedra of equal volume. (Imagine slicing it diagonally across parallel faces).\n- Step 2: The volume of the parallelepiped is $$|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$.\n- Step 3: Therefore, the volume of one such tetrahedron is $$\\frac{1}{6}|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$.\n+ Alternatively, Volume of pyramid = $$\\frac{1}{3} \\times \\text{Base Area} \\times \\text{Height} = \\frac{1}{3} \\times \\frac{1}{2}|\\mathbf{b} \\times \\mathbf{c}| \\times (|\\mathbf{a}|\\cos\\phi) = \\frac{1}{6}|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})|$$.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "A parallelepiped is formed by vectors $$\\mathbf{a} = \\mathbf{i}$$, $$\\mathbf{b} = \\mathbf{j}$$, and $$\\mathbf{c} = \\mathbf{k}$$. What is its volume? (2 steps)", "answer": "- Step 1: Calculate the scalar triple product: $$\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\mathbf{i} \\cdot (\\mathbf{j} \\times \\mathbf{k}) = \\mathbf{i} \\cdot \\mathbf{i} = 1$$.\n- Step 2: The volume is the absolute value, which is $$|1| = 1$$. This makes sense, as these vectors form a unit cube, which is a special case of a parallelepiped.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "A line passes through point $A$ (position vector $\\mathbf{a}$) with direction vector $\\mathbf{b}$. Why is the equation of this line given by $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$? (3 steps)", "answer": "- Step 1: Let $\\mathbf{r}$ be the position vector of any point $R$ on the line. The vector from $A$ to $R$ is $$\\overrightarrow{AR} = \\mathbf{r} - \\mathbf{a}$$.\n- Step 2: Since both $A$ and $R$ lie on the line, the vector $$\\mathbf{r} - \\mathbf{a}$$ must be parallel to the direction vector $\\mathbf{b}$.\n- Step 3: The cross product of two parallel vectors is the zero vector. Therefore, $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$.\n+ This form eliminates the parameter $\\lambda$ used in $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$, expressing the line purely in terms of position vectors and directions.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "Starting from $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$, how do you derive the Cartesian equation of the line $$\\frac{x-x_1}{b_1} = \\frac{y-y_1}{b_2} = \\frac{z-z_1}{b_3}$$? (3 steps)", "answer": "- Step 1: The equation $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$ implies that $$\\mathbf{r} - \\mathbf{a}$$ is a scalar multiple of $\\mathbf{b}$. Let this scalar be $\\lambda$. So $$\\mathbf{r} - \\mathbf{a} = \\lambda\\mathbf{b}$$.\n- Step 2: Substitute the components: $$(x-x_1)\\mathbf{i} + (y-y_1)\\mathbf{j} + (z-z_1)\\mathbf{k} = \\lambda(b_1\\mathbf{i} + b_2\\mathbf{j} + b_3\\mathbf{k})$$.\n- Step 3: Equating components gives $$x-x_1 = \\lambda b_1$$, $$y-y_1 = \\lambda b_2$$, and $$z-z_1 = \\lambda b_3$$. Dividing each by $$b_1, b_2, b_3$$ respectively and setting them equal to $\\lambda$ yields the Cartesian form.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "If a line is given by $$\\mathbf{r} \\times \\mathbf{b} = \\mathbf{a} \\times \\mathbf{b}$$, what does the vector $\\mathbf{a}$ represent in this context? (2 steps)", "answer": "- Step 1: This equation is just a rearrangement of $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$. Using the distributive property of the cross product, we get $$\\mathbf{r} \\times \\mathbf{b} - \\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$.\n- Step 2: Rearranging gives $$\\mathbf{r} \\times \\mathbf{b} = \\mathbf{a} \\times \\mathbf{b}$$. Here, $\\mathbf{a}$ is the position vector of a specific known point on the line.\n+ Note that any point on the line could be used for $\\mathbf{a}$. If you pick a different point on the line $$\\mathbf{a}'$$, then $$\\mathbf{a}' \\times \\mathbf{b}$$ will still equal $$\\mathbf{a} \\times \\mathbf{b}$$ because $$(\\mathbf{a}' - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "The scalar product form of a plane is $$\\mathbf{r} \\cdot \\mathbf{n} = p$$. What do the terms $\\mathbf{r}, \\mathbf{n}$, and $p$ represent, and why does this equation describe a plane? (3 steps)", "answer": "- Step 1: $\\mathbf{r}$ is the position vector of a general point on the plane, and $\\mathbf{n}$ is a vector normal (perpendicular) to the plane.\n- Step 2: If $\\mathbf{a}$ is the position vector of a known point on the plane, then $$\\mathbf{r} - \\mathbf{a}$$ is a vector lying *in* the plane. Since $\\mathbf{n}$ is perpendicular to the plane, $\\mathbf{n}$ must be perpendicular to $$\\mathbf{r} - \\mathbf{a}$$.\n- Step 3: Therefore, $$(\\mathbf{r} - \\mathbf{a}) \\cdot \\mathbf{n} = 0$$, which rearranges to $$\\mathbf{r} \\cdot \\mathbf{n} = \\mathbf{a} \\cdot \\mathbf{n}$$. The scalar $p$ is simply the constant $$\\mathbf{a} \\cdot \\mathbf{n}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Given the scalar product form $$\\mathbf{r} \\cdot \\mathbf{n} = p$$ where $$\\mathbf{n} = n_1\\mathbf{i} + n_2\\mathbf{j} + n_3\\mathbf{k}$$, how do you convert it to the Cartesian form $$ax + by + cz + d = 0$$? (2 steps)", "answer": "- Step 1: Substitute $$\\mathbf{r} = x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$$ into the equation: $$(x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}) \\cdot (n_1\\mathbf{i} + n_2\\mathbf{j} + n_3\\mathbf{k}) = p$$.\n- Step 2: Perform the dot product to get $$n_1 x + n_2 y + n_3 z = p$$, which can be rewritten as $$n_1 x + n_2 y + n_3 z - p = 0$$. This is the Cartesian form $$ax + by + cz + d = 0$$ where $$a=n_1, b=n_2, c=n_3, d=-p$$.\n+ The coefficients of $x, y, z$ in the Cartesian equation directly give you the components of the normal vector $\\mathbf{n}$!", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "The vector equation of a plane is $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b} + \\mu\\mathbf{c}$$. Why must $\\mathbf{b}$ and $\\mathbf{c}$ be non-parallel? (2 steps)", "answer": "- Step 1: The term $$\\lambda\\mathbf{b} + \\mu\\mathbf{c}$$ represents all possible displacements *within* the plane starting from point $\\mathbf{a}$. By varying $\\lambda$ and $\\mu$, you can reach any point on the 2D plane.\n- Step 2: If $\\mathbf{b}$ and $\\mathbf{c}$ were parallel, then $$\\mathbf{c} = k\\mathbf{b}$$ for some scalar $k$. The equation would become $$\\mathbf{r} = \\mathbf{a} + (\\lambda + k\\mu)\\mathbf{b}$$, which is the equation of a *straight line*, not a plane. You need two independent directions to span a 2D surface.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "A plane contains vectors $\\mathbf{b}$ and $\\mathbf{c}$. How do you find a normal vector $\\mathbf{n}$ to this plane? (2 steps)", "answer": "- Step 1: A normal vector must be perpendicular to every vector lying in the plane. Therefore, $\\mathbf{n}$ must be perpendicular to both $\\mathbf{b}$ and $\\mathbf{c}$.\n- Step 2: The vector product of two vectors yields a vector perpendicular to both. Therefore, $$\\mathbf{n} = \\mathbf{b} \\times \\mathbf{c}$$ (or any scalar multiple of it).\n+ This is the standard method to find the normal vector when you have the vector equation of the plane $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b} + \\mu\\mathbf{c}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "A line $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$ intersects a plane $$\\mathbf{r} \\cdot \\mathbf{n} = p$$. Conceptually, how do you find the position vector of the intersection point? (3 steps)", "answer": "- Step 1: At the point of intersection, the position vector $\\mathbf{r}$ must satisfy *both* equations simultaneously.\n- Step 2: Substitute the equation of the line into the equation of the plane: $$(\\mathbf{a} + \\lambda\\mathbf{b}) \\cdot \\mathbf{n} = p$$.\n- Step 3: Use the distributive property of the dot product to get $$\\mathbf{a} \\cdot \\mathbf{n} + \\lambda(\\mathbf{b} \\cdot \\mathbf{n}) = p$$. Solve this scalar equation for the parameter $\\lambda$, then substitute $\\lambda$ back into the line equation to find $\\mathbf{r}$.\n+ If $$\\mathbf{b} \\cdot \\mathbf{n} = 0$$, the line is parallel to the plane. If also $$\\mathbf{a} \\cdot \\mathbf{n} = p$$, the line lies *in* the plane. Otherwise, there is no intersection.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "To find the angle $\\theta$ between a line with direction $\\mathbf{b}$ and a plane with normal $\\mathbf{n}$, the formula is $$\\sin\\theta = \\frac{|\\mathbf{b} \\cdot \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$. Why is it $$\\sin\\theta$$ and not $$\\cos\\theta$$? (3 steps)", "answer": "- Step 1: If you use the dot product formula directly on $\\mathbf{b}$ and $\\mathbf{n}$, you get $$\\cos\\alpha = \\frac{\\mathbf{b} \\cdot \\mathbf{n}}{|\\mathbf{b}||\\mathbf{n}|}$$, where $\\alpha$ is the angle between the line's direction and the plane's normal.\n- Step 2: The angle $\\theta$ between the line and the plane itself is defined as the complement to $\\alpha$ (i.e., the angle between the line and its projection onto the plane).\n- Step 3: Therefore, $$\\theta = 90^\\circ - \\alpha$$. Since $$\\sin(90^\\circ - \\alpha) = \\cos\\alpha$$, we have $$\\sin\\theta = \\frac{|\\mathbf{b} \\cdot \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$. The absolute value ensures we get the acute angle $\\theta$.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "The angle between two planes is found using $$\\cos\\theta = \\frac{|\\mathbf{n}_1 \\cdot \\mathbf{n}_2|}{|\\mathbf{n}_1||\\mathbf{n}_2|}$$. Why is the absolute value necessary here? (2 steps)", "answer": "- Step 1: The angle between two planes is defined as the acute angle between them. The dot product of the normals $$\\mathbf{n}_1 \\cdot \\mathbf{n}_2$$ can be negative if the normals point \"inwards\" towards each other, resulting in an obtuse angle $$\\alpha > 90^\\circ$$.\n- Step 2: Since the angle between the planes $\\theta$ is the supplement of $\\alpha$ (i.e., $$\\theta = 180^\\circ - \\alpha$$) in that case, taking $$\\cos(180^\\circ - \\alpha) = -\\cos\\alpha$$ means the absolute value $$|\\cos\\alpha|$$ gives the cosine of the acute angle $\\theta$.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "If a plane is given by $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = d$$, where $$\\hat{\\mathbf{n}}$$ is a unit normal vector, what does $d$ represent geometrically? (2 steps)", "answer": "- Step 1: Let $R$ be the point on the plane closest to the origin $O$, so $$\\overrightarrow{OR} = \\mathbf{r}$$ is perpendicular to the plane. The distance is $$|\\mathbf{r}|$$.\n- Step 2: Since $$\\overrightarrow{OR}$$ is parallel to $$\\hat{\\mathbf{n}}$$, we have $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = |\\mathbf{r}||\\hat{\\mathbf{n}}|\\cos(0^\\circ) = |\\mathbf{r}|(1)(1) = |\\mathbf{r}|$$. Thus $d = |\\mathbf{r}|$, which is the perpendicular distance from the origin to the plane.\n+ If the equation is $$\\mathbf{r} \\cdot \\mathbf{n} = p$$ where $\\mathbf{n}$ is not a unit vector, you must divide by $$|\\mathbf{n}|$$ to find the distance: distance = $$\\frac{|p|}{|\\mathbf{n}|}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "To find the perpendicular distance from a point $A$ (position vector $\\mathbf{a}$) to a plane $\\Pi$: $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = d$$, you can construct a parallel plane $\\Pi'$ through $A$. How does this help find the distance? (3 steps)", "answer": "- Step 1: The plane $\\Pi'$ passing through $A$ has equation $$\\mathbf{r} \\cdot \\hat{\\mathbf{n}} = \\mathbf{a} \\cdot \\hat{\\mathbf{n}}$$. Let this constant be $d'$.\n- Step 2: Since $\\Pi$ and $\\Pi'$ are parallel (same normal $$\\hat{\\mathbf{n}}$$), the distance from $A$ to $\\Pi$ is simply the distance between the two planes.\n- Step 3: The distance from the origin to $\\Pi$ is $d$, and to $\\Pi'$ is $d'$. If $A$ is on the same side of the origin as $\\Pi$, the distance is $$|d' - d|$$. If on the opposite side, it's $$|d'| + |d|$$. In general, it is $$|d' - d| = |\\mathbf{a} \\cdot \\hat{\\mathbf{n}} - d|$$.\n+ The standard formula is Distance = $$\\frac{|\\mathbf{a} \\cdot \\mathbf{n} - p|}{|\\mathbf{n}|}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "Two skew lines are $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$ and $$\\mathbf{r} = \\mathbf{c} + \\mu\\mathbf{d}$$. The shortest distance between them is $$\\frac{|(\\mathbf{a}-\\mathbf{c}) \\cdot (\\mathbf{b} \\times \\mathbf{d})|}{|\\mathbf{b} \\times \\mathbf{d}|}$$. Explain the geometric intuition behind the numerator and the denominator. (3 steps)", "answer": "- Step 1: The shortest distance is the length of the segment perpendicular to *both* lines. The vector $$\\mathbf{b} \\times \\mathbf{d}$$ gives the direction of this common perpendicular.\n- Step 2: The denominator $$|\\mathbf{b} \\times \\mathbf{d}|$$ is the magnitude of this perpendicular direction vector.\n- Step 3: The numerator $$|(\\mathbf{a}-\\mathbf{c}) \\cdot (\\mathbf{b} \\times \\mathbf{d})|$$ is the scalar projection of the vector connecting a point on line 1 ($\\mathbf{a}$) to a point on line 2 ($\\mathbf{c}$) onto the common perpendicular direction. This projection length is exactly the shortest distance.\n+ If $$\\mathbf{b} \\times \\mathbf{d} = \\mathbf{0}$$, the lines are parallel (not skew), and this formula fails (division by zero). A different method is needed for parallel lines.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "For parallel lines $$\\mathbf{r} = \\mathbf{a} + \\lambda\\mathbf{b}$$ and $$\\mathbf{r} = \\mathbf{c} + \\mu\\mathbf{b}$$, why does the skew lines distance formula fail, and what is the conceptual method to find the shortest distance instead? (3 steps)", "answer": "- Step 1: The formula fails because $$\\mathbf{b} \\times \\mathbf{b} = \\mathbf{0}$$, leading to division by zero. Since the lines are parallel, there isn't a unique common perpendicular *direction* in the same sense—any direction perpendicular to $\\mathbf{b}$ works.\n- Step 2: Pick a point on one line, say $\\mathbf{a}$. The shortest distance is the perpendicular distance from point $\\mathbf{a}$ to the second line.\n- Step 3: The vector from the second line's point $\\mathbf{c}$ to $\\mathbf{a}$ is $$\\mathbf{a} - \\mathbf{c}$$. The component of this vector parallel to $\\mathbf{b}$ is $$\\frac{(\\mathbf{a}-\\mathbf{c})\\cdot\\mathbf{b}}{|\\mathbf{b}|^2}\\mathbf{b}$$. The perpendicular component (which is the shortest distance) can be found using Pythagoras: $$\\sqrt{|\\mathbf{a}-\\mathbf{c}|^2 - \\left(\\frac{(\\mathbf{a}-\\mathbf{c})\\cdot\\mathbf{b}}{|\\mathbf{b}|}\\right)^2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}], "count": 30}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Define the vector (cross) product of two vectors **a** and **b**, and explain why its magnitude equals the area of the parallelogram formed by **a** and **b**. (3 steps)", "answer": "- Step 1: The vector product is defined as **a** × **b** = |**a**||**b**|sinθ $\\hat{n}$, where θ is the angle between them and $\\hat{n}$ is the unit vector perpendicular to both **a** and **b**.  \n- Step 2: The magnitude |**a** × **b**| = |**a**||**b**|sinθ equals the area of the parallelogram because base length is |**a**| and height is |**b**|sinθ.  \n- Step 3: The direction of $\\hat{n}$ follows the right-hand rule, ensuring the cross product's orientation aligns with the parallelogram's normal.  \n+ Example: If **a** and **b** are in the xy-plane, **a** × **b** points along the z-axis.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is the vector product **anti-commutative** (i.e., **a** × **b** = -**b** × **a**)? (2 steps)", "answer": "- Step 1: The right-hand rule gives **a** × **b** a direction $\\hat{n}$, while **b** × **a** requires turning from **b** to **a**, reversing the screw direction to -$\\hat{n}$.  \n- Step 2: Since sinθ is the same, the magnitude is identical, but direction flips: **a** × **b** = -**b** × **a**.  \n+ This explains why **a** × **a** = 0 (parallel vectors).", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How do you compute **a** × **b** when **a** = $a_1\\mathbf{i} + a_2\\mathbf{j} + a_3\\mathbf{k}$ and **b** = $b_1\\mathbf{i} + b_2\\mathbf{j} + b_3\\mathbf{k}$? (3 steps)", "answer": "- Step 1: Use the determinant formula:  \n  $$\n  \\mathbf{a} \\times \\mathbf{b} = \\begin{vmatrix}\\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3\\end{vmatrix}\n  $$  \n- Step 2: Expand the determinant:  \n  $\\mathbf{i}(a_2b_3 - a_3b_2) - \\mathbf{j}(a_1b_3 - a_3b_1) + \\mathbf{k}(a_1b_2 - a_2b_1)$.  \n- Step 3: The result is a vector with components $(a_2b_3 - a_3b_2, a_3b_1 - a_1b_3, a_1b_2 - a_2b_1)$.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why is **a** × **b** = 0 if **a** and **b** are parallel vectors?", "answer": "- Step 1: If **a** and **b** are parallel, θ = 0° or 180°, so sinθ = 0.  \n- Step 2: This makes |**a** × **b**| = |**a**||**b**|·0 = 0.  \n- Step 3: Hence, the cross product is the zero vector because the parallelogram collapses into a line.  \n+ Example: **i** × **i** = 0 since they’re parallel.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "What is the geometric interpretation of the scalar triple product **a** · (**b** × **c**)?", "answer": "- Step 1: The scalar triple product represents the **signed volume** of the parallelepiped formed by **a**, **b**, and **c**.  \n- Step 2: Volume = |**a** · (**b** × **c**)| because (**b** × **c**) gives a vector perpendicular to the base with magnitude |**b** × **c**| (base area), and **a** · (**b** × **c**) projects **a** onto this normal vector.  \n- Step 3: The sign indicates orientation: positive if **a** follows the right-hand rule relative to **b** and **c**.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How does the scalar triple product become zero, and what does this imply about the vectors? (3 steps)", "answer": "- Step 1: **a** · (**b** × **c**) = 0 implies the volume of the parallelepiped is zero.  \n- Step 2: This occurs when **a**, **b**, and **c** are **coplanar** (lie in the same plane).  \n- Step 3: If **a** is in the plane of **b** and **c**, its projection onto the normal vector (**b** × **c**) is zero.  \n+ Example: If **a** = **b**, then **a** · (**b** × **c**) = **b** · (**b** × **c**) = 0 (since **b** is parallel to **b** × **c**).", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why is the scalar triple product **cyclic** (e.g., **a** · (**b** × **c**) = **b** · (**c** × **a**) = **c** · (**a** × **b**))? (2 steps)", "answer": "- Step 1: The scalar triple product is invariant under cyclic permutations because the parallelepiped's volume doesn't depend on the order of vectors.  \n- Step 2: Algebraically, determinant properties ensure $ \\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\det[\\mathbf{a} \\mathbf{b} \\mathbf{c}] = \\det[\\mathbf{b} \\mathbf{c} \\mathbf{a}] = \\mathbf{b} \\cdot (\\mathbf{c} \\times \\mathbf{a}) $.  \n+ Non-cyclic permutations like **a** · (**c** × **b**) reverse the sign: **a** · (-(**b** × **c**)) = -**a** · (**b** × **c**).", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How do you find the **area of a triangle** with vertices at points **0**, **a**, and **b** using the cross product? (2 steps)", "answer": "- Step 1: The area of triangle **0AB** is half the area of the parallelogram formed by **a** and **b**:  \n  $$\n  \\text{Area} = \\frac{1}{2}|\\mathbf{a} \\times \\mathbf{b}|\n  $$  \n- Step 2: This works because |**a** × **b**| represents the base × height (parallelogram area), and a triangle is half that.  \n+ Example: For **a** = 3**i** + 4**j**, **b** = 5**i** + 6**j**, compute **a** × **b** and halve its magnitude.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is the shortest distance from a point to a line calculated using the cross product?", "answer": "- Step 1: For a point **p** and line **r** = **a** + λ**b**, the vector **p** - **a** forms a parallelogram with **b**.  \n- Step 2: The area of this parallelogram is |(**p** - **a**) × **b**|, and height (distance) = area / |**b**|.  \n- Step 3: Thus, distance $ d = \\frac{|(\\mathbf{p} - \\mathbf{a}) \\times \\mathbf{b}|}{|\\mathbf{b}|} $.  \n+ Misconception: Using the dot product here would project **p** onto **b**, which gives the wrong direction.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "How do you find the **volume of a tetrahedron** with edges **a**, **b**, **c**?", "answer": "- Step 1: The volume is $ \\frac{1}{6}|\\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c})| $.  \n- Step 2: This is 1/6 of the parallelepiped volume because a tetrahedron fills 1/6 of the parallelepiped.  \n+ Example: A tetrahedron with **a** = **i**, **b** = **j**, **c** = **k** has volume $ \\frac{1}{6}|1·(1×1)| = \\frac{1}{6} $.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Explain why the cross product **a** × **b** is perpendicular to both **a** and **b**.", "answer": "- Step 1: By definition, **a** × **b** has direction $\\hat{n}$, which is perpendicular to the plane containing **a** and **b**.  \n- Step 2: Algebraically, (**a** × **b**) · **a** = 0 and (**a** × **b**) · **b** = 0 because the cross product is orthogonal to its factors.  \n- Step 3: Example: For **a** = **i** and **b** = **j**, **a** × **b** = **k**, which has dot products **k** · **i** = 0 and **k** · **j** = 0.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "How do you find the **equation of a plane** given a point **a** and normal vector **n**?", "answer": "- Step 1: The scalar product form is **r** · **n** = **a** · **n**.  \n- Step 2: This simplifies to $ n_1x + n_2y + n_3z = d $, where $ d = \\mathbf{a} \\cdot \\mathbf{n} $.  \n- Step 3: Example: If **a** = 2**i** + 3**j** - 5**k** and **n** = 3**i** + **j** - **k**, compute **a** · **n** = 6 + 3 + 5 = 14 ⇒ **r** · (3**i** + **j** - **k**) = 14.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Why is the scalar triple product **a** · (**b** × **c**) important for testing coplanarity?", "answer": "- Step 1: If **a** · (**b** × **c**) = 0, the parallelepiped volume is zero ⇒ vectors are coplanar.  \n- Step 2: Geometrically, **a** lies in the plane of **b** and **c**, so its projection onto **b** × **c** (which is perpendicular to the plane) is zero.  \n- Step 3: Algebraically, the determinant of the components becomes zero, indicating linear dependence.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How do you convert the vector equation of a line (r - **a**) × **b** = 0 to Cartesian form?", "answer": "- Step 1: Let **r** = $x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$ and **a** = $a_1\\mathbf{i} + a_2\\mathbf{j} + a_3\\mathbf{k}$.  \n- Step 2: Compute (**r** - **a**) = $(x - a_1)\\mathbf{i} + (y - a_2)\\mathbf{j} + (z - a_3)\\mathbf{k}$.  \n- Step 3: The cross product (**r** - **a**) × **b** = 0 implies (**r** - **a**) is parallel to **b**, leading to:  \n  $$\n  \\frac{x - a_1}{b_1} = \\frac{y - a_2}{b_2} = \\frac{z - a_3}{b_3}\n  $$", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "What is the **shortest distance between two skew lines** with direction vectors **b** and **d**, and connecting vector (**a** - **c**)? (2 steps)", "answer": "- Step 1: The distance is the absolute value of the scalar projection of (**a** - **c**) onto (**b** × **d**):  \n  $$\n  d = \\frac{|(\\mathbf{a} - \\mathbf{c}) \\cdot (\\mathbf{b} \\times \\mathbf{d})|}{|\\mathbf{b} \\times \\mathbf{d}|}\n  $$  \n- Step 2: (**b** × **d**) is perpendicular to both lines, so the projection gives the length of the common perpendicular.  \n+ Edge case: If lines are parallel, the distance simplifies to |(**a** - **c**) × **b**| / |**b**|.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "Why does the scalar triple product cyclic property hold?", "answer": "- Step 1: The scalar triple product **a** · (**b** × **c**) equals the determinant of the 3×3 matrix with **a**, **b**, **c** as rows/columns.  \n- Step 2: Determinant properties: Swapping rows twice (cyclic permutation) doesn’t change its value.  \n- Step 3: This reflects the geometric invariance of the parallelepiped volume under cyclic permutation of edges.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "How do you find the **angle between two planes** given their normal vectors **n₁** and **n₂**?", "answer": "- Step 1: The angle θ between planes equals the angle between their normals.  \n- Step 2: Use the dot product:  \n  $$\n  \\cos\\theta = \\frac{|\\mathbf{n}_1 \\cdot \\mathbf{n}_2|}{|\\mathbf{n}_1||\\mathbf{n}_2|}\n  $$  \n- Step 3: Take the acute angle if the dot product is negative (since cosθ is positive in [0°, 180°]).", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "Explain why **a** · (**a** × **b**) = 0.", "answer": "- Step 1: **a** × **b** is perpendicular to **a** and **b**.  \n- Step 2: The dot product of **a** with a vector perpendicular to it is zero.  \n- Step 3: This implies **a** · (**a** × **b**) = 0, a special case of **a** · (**b** × **c**) = 0 when **a** is in the plane of **b** and **c**.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "How do you find the **equation of a plane** given three points A, B, and C?", "answer": "- Step 1: Compute vectors **AB** and **AC** in the plane.  \n- Step 2: Find the normal vector **n** = **AB** × **AC**.  \n- Step 3: Use the scalar product form: (**r** - **a**) · **n** = 0, where **a** is A’s position vector.  \n+ Example: For A(1,0,0), B(0,1,0), C(0,0,1), **n** = **i** + **j** + **k**, and the plane is x + y + z = 1.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "Why does the scalar triple product **a** · (**b** × **c**) equal the determinant of the 3×3 matrix with columns **a**, **b**, **c**?", "answer": "- Step 1: The scalar triple product computes the volume of the parallelepiped, which is the determinant.  \n- Step 2: The determinant’s absolute value equals the volume, and its sign indicates orientation.  \n- Step 3: Both operations extract the same geometric information:  \n  $$\n  \\mathbf{a} \\cdot (\\mathbf{b} \\times \\mathbf{c}) = \\det[\\mathbf{a} \\mathbf{b} \\mathbf{c}]\n  $$  \n+ The determinant’s expansion matches the scalar triple product formula.  \n+ If columns are linearly dependent, determinant = 0 ⇒ vectors are coplanar.  \n+ This unifies algebraic and geometric interpretations of volume.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is the vector product of two parallel vectors zero? (3 steps)", "answer": "- Step 1: Recall the definition of vector product: a × b = |a||b|sinθ n̂.  \n- Step 2: For parallel vectors, the angle θ between them is 0° or 180°.  \n- Step 3: sin(0°) = sin(180°) = 0, so the entire expression becomes zero vector.  \n+ Example: i × i = 0 because sin(0°) = 0.\n\n[Takeaway: Parallel vectors create no perpendicular component, hence zero cross product.]", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How does |a × b| relate to the area of a parallelogram formed by vectors a and b?", "answer": "- Step 1: The vector product a × b has magnitude |a||b|sinθ.  \n- Step 2: In a parallelogram, |b|sinθ is the height when a is the base.  \n- Step 3: Area = base × height = |a||b|sinθ = |a × b|.  \n+ For a triangle: Area is half this value.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "What is the scalar triple product a.(b × c), and why is it a scalar? (3 steps)", "answer": "- Step 1: b × c is a vector perpendicular to both with magnitude |b||c|sinθ.  \n- Step 2: The dot product a.(b × c) projects a onto b × c, yielding a scalar.  \n- Step 3: Geometrically, this scalar's absolute value equals the volume of the parallelepiped formed by a, b, c.  \n+ Volume = |a.(b × c)| because it measures \"signed\" volume.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why does the scalar triple product remain unchanged under cyclic permutation: a.(b × c) = b.(c × a)? (2 steps)", "answer": "- Step 1: The scalar triple product measures the volume of the same parallelepiped regardless of cyclic order.  \n- Step 2: Using properties of determinants: swapping rows twice retains the value.  \n+ Example: |a (b × c)| = |b (c × a)| because the determinant is cyclically symmetric.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How to find the vector equation of a line perpendicular to a given vector n and passing through point A with position vector a?", "answer": "- Step 1: For any point R on the line, vector (r - a) is parallel to the line.  \n- Step 2: The direction of the line is perpendicular to n, so (r - a) × b = 0, where b is direction vector.  \n- Step 3: Use scalar triple product: (r - a) · (b × n) = 0 to derive the equation.  \n+ Final form: r × b = a × b (cross product with direction vector).", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why is the scalar triple product zero if any two vectors in a.(b × c) are parallel? (2 steps)", "answer": "- Step 1: If two vectors (e.g., b and c) are parallel, b × c = 0 (Q1).  \n- Step 2: Dot product of a with the zero vector is zero.  \n+ Example: a.(b × b) = a.0 = 0.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How to compute the area of triangle ABC given position vectors a, b, c?", "answer": "- Step 1: Find vectors AB = b - a and AC = c - a.  \n- Step 2: Compute AB × AC = (b - a) × (c - a).  \n- Step 3: Take half the magnitude of this product: Area = ½|AB × AC|.  \n+ Expanded: ½|a × b + b × c + c × a|.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "What is the vector equation of a plane given a point A (position vector a) and normal vector n?", "answer": "- Step 1: For any point R on the plane, AR = r - a lies in the plane.  \n- Step 2: Normal vector n is perpendicular to AR ⇒ (r - a) · n = 0.  \n- Step 3: Rearrange to scalar form: r · n = a · n = p (scalar constant).  \n+ Example: If a = 2i + 3j - 5k and n = 3i + j - k, equation is r · (3i + j - k) = 14.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How to find the acute angle between two planes with normal vectors n₁ and n₂? (2 steps)", "answer": "- Step 1: The angle θ between planes equals the angle between their normals.  \n- Step 2: Use the dot product: cosθ = |n₁ · n₂| / (|n₁||n₂|).  \n+ Acute angle is the smaller between θ and 180° - θ.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why is the shortest distance from a point P to a line AB given by |(p - a) × b̂|, where b̂ is the unit direction vector of AB?", "answer": "- Step 1: The vector (p - a) connects A to P.  \n- Step 2: The cross product (p - a) × b̂ gives an area (|p - a||b̂|sinθ).  \n- Step 3: |(p - a) × b̂| = |p - a|sinθ, which is the perpendicular distance.  \n+ Geometric intuition: Distance = \"height\" of parallelogram formed by (p - a) and b̂.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Define the vector (cross) product of two vectors a and b. What type of quantity does it produce - scalar or vector? (2 steps)", "answer": "- Step 1: The vector product is defined as $$\\mathbf{a} \\times \\mathbf{b} = |\\mathbf{a}||\\mathbf{b}| \\sin \\theta \\, \\hat{\\mathbf{n}}$$ where θ is the angle between a and b, and $$\\hat{\\mathbf{n}}$$ is a unit vector perpendicular to both a and b.\n\n- Step 2: The result is a **vector** quantity (not a scalar). Its magnitude is $$|\\mathbf{a}||\\mathbf{b}| \\sin \\theta$$ and its direction is given by $$\\hat{\\mathbf{n}}$$, determined by the right-hand rule.\n\n**Key insight:** This contrasts with the scalar (dot) product which produces a scalar. The cross product is specifically designed to give a perpendicular vector.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "How do you determine the direction of $$\\mathbf{a} \\times \\mathbf{b}$$ using the right-hand rule? Why is the order of multiplication important? (3 steps)", "answer": "- Step 1: Point your first finger in the direction of vector a, and your second finger in the direction of vector b.\n\n- Step 2: Your thumb will point in the direction of $$\\mathbf{a} \\times \\mathbf{b}$$. This is the direction a right-handed screw would move when turned from a to b.\n\n- Step 3: The order matters because $$\\mathbf{b} \\times \\mathbf{a} = -\\mathbf{a} \\times \\mathbf{b}$$. If you swap the order, the direction reverses. This is why the cross product is **anti-commutative**.\n\n**Misconception alert:** Many students think $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{b} \\times \\mathbf{a}$$. This is FALSE - they give opposite directions!", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "Evaluate the following cross products involving unit vectors: (i) $$\\mathbf{i} \\times \\mathbf{j}$$, (ii) $$\\mathbf{j} \\times \\mathbf{k}$$, (iii) $$\\mathbf{k} \\times \\mathbf{i}$$, (iv) $$\\mathbf{i} \\times \\mathbf{i}$$. Explain your reasoning. (3 steps)", "answer": "- Step 1: For $$\\mathbf{i} \\times \\mathbf{j}$$, the angle between them is 90°, both are unit vectors, and using the right-hand rule (first finger on i, second on j), thumb points to k. So $$\\mathbf{i} \\times \\mathbf{j} = \\mathbf{k}$$.\n\n- Step 2: Similarly, $$\\mathbf{j} \\times \\mathbf{k} = \\mathbf{i}$$ and $$\\mathbf{k} \\times \\mathbf{i} = \\mathbf{j}$$. Notice the cyclic pattern: i→j→k→i.\n\n- Step 3: For $$\\mathbf{i} \\times \\mathbf{i}$$, the angle is 0°, so $$\\sin 0° = 0$$, giving the zero vector $$\\mathbf{0}$$. The same applies to $$\\mathbf{j} \\times \\mathbf{j}$$ and $$\\mathbf{k} \\times \\mathbf{k}$$.\n\n**Key pattern:** Equal unit vectors cross to zero; cross product cycles forward through i→j→k, backward gives negatives.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Given $$\\mathbf{a} = (a_1, a_2, a_3)$$ and $$\\mathbf{b} = (b_1, b_2, b_3)$$, write down the component formula for $$\\mathbf{a} \\times \\mathbf{b}$$. In what format can this be written? (2 steps)", "answer": "- Step 1: The component formula is:\n$$\\mathbf{a} \\times \\mathbf{b} = (a_2 b_3 - a_3 b_2)\\mathbf{i} + (a_3 b_1 - a_1 b_3)\\mathbf{j} + (a_1 b_2 - a_2 b_1)\\mathbf{k}$$\n\n- Step 2: This can be written as a 3×3 determinant:\n$$\\mathbf{a} \\times \\mathbf{b} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3 \\end{vmatrix}$$\n\n**Why this matters:** The determinant method is much faster computationally and reduces errors from component-wise calculation.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "If $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{0}$$, what can you conclude about vectors a and b? List all possibilities. (2 steps)", "answer": "- Step 1: From the magnitude formula $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}| \\sin \\theta = 0$$, this occurs when:\n- $$\\mathbf{a} = \\mathbf{0}$$ (zero vector), OR\n- $$\\mathbf{b} = \\mathbf{0}$$ (zero vector), OR\n- $$\\sin \\theta = 0$$, meaning θ = 0° or 180° (i.e., a and b are parallel or anti-parallel)\n\n- Step 2: So the cross product being zero tells you either one of the vectors is zero, OR they are parallel/anti-parallel.\n\n**Misconception alert:** Students often think cross product zero always means parallel - but you must also consider zero vectors!", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Find a unit vector perpendicular to both $$\\mathbf{a} = 4\\mathbf{i} + 3\\mathbf{j} + 2\\mathbf{k}$$ and $$\\mathbf{b} = 8\\mathbf{i} + 3\\mathbf{j} + 3\\mathbf{k}$$. Explain the steps. (3 steps)", "answer": "- Step 1: The cross product $$\\mathbf{a} \\times \\mathbf{b}$$ gives a vector perpendicular to both. Compute:\n$$\\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ 4 & 3 & 2 \\\\ 8 & 3 & 3 \\end{vmatrix} = \\mathbf{i}(3\\cdot3 - 2\\cdot3) - \\mathbf{j}(4\\cdot3 - 2\\cdot8) + \\mathbf{k}(4\\cdot3 - 3\\cdot8)$$\n$$= 3\\mathbf{i} + 4\\mathbf{j} - 12\\mathbf{k}$$\n\n- Step 2: Find its magnitude: $$|3\\mathbf{i} + 4\\mathbf{j} - 12\\mathbf{k}| = \\sqrt{3^2 + 4^2 + (-12)^2} = \\sqrt{9 + 16 + 144} = \\sqrt{169} = 13$$\n\n- Step 3: Divide by magnitude to get unit vector: $$\\frac{1}{13}(3\\mathbf{i} + 4\\mathbf{j} - 12\\mathbf{k})$$\n\n**Note:** There are TWO unit vectors (positive and negative) perpendicular to both - you can choose either.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "How can you verify that $$\\mathbf{a} \\times \\mathbf{b}$$ is indeed perpendicular to both a and b? (2 steps)", "answer": "- Step 1: Compute the scalar product of $$\\mathbf{a} \\times \\mathbf{b}$$ with a, and separately with b.\n\n- Step 2: If both scalar products equal zero, i.e., $$(\\mathbf{a} \\times \\mathbf{b}) \\cdot \\mathbf{a} = 0$$ and $$(\\mathbf{a} \\times \\mathbf{b}) \\cdot \\mathbf{b} = 0$$, then $$\\mathbf{a} \\times \\mathbf{b}$$ is perpendicular to both (since dot product of perpendicular vectors is zero).\n\n**Why verify?** This is a good check that your cross product calculation is correct. It also confirms the geometric interpretation.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Two non-zero vectors a and b have magnitudes 3 and 4 respectively, and the angle between them is 60°. Find the magnitude of $$\\mathbf{a} \\times \\mathbf{b}$$. Does the direction matter? (2 steps)", "answer": "- Step 1: Use the magnitude formula: $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}| \\sin \\theta = 3 \\times 4 \\times \\sin 60° = 12 \\times \\frac{\\sqrt{3}}{2} = 6\\sqrt{3}$$\n\n- Step 2: The magnitude alone doesn't tell you direction. The direction is given by the right-hand rule - it depends on the order of a and b (swapping gives the negative direction).\n\n**Concept check:** Notice this is similar to the area formula - more on this next!", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Why is $$|\\mathbf{a} \\times \\mathbf{b}|$$ interpreted as the area of a parallelogram with sides given by vectors a and b? (3 steps)", "answer": "- Step 1: For a parallelogram with sides of lengths |a| and |b|, and angle θ between them, the area = base × height = $$|\\mathbf{a}| \\times |\\mathbf{b}| \\sin \\theta$$.\n\n- Step 2: But this is exactly the magnitude of the cross product: $$|\\mathbf{a} \\times \\mathbf{b}| = |\\mathbf{a}||\\mathbf{b}| \\sin \\theta$$.\n\n- Step 3: Therefore, the area of parallelogram = $$|\\mathbf{a} \\times \\mathbf{b}|$$.\n\n**Visual intuition:** Imagine a and b as two adjacent sides. The cross product's magnitude equals the \"area\" spanned by these two vectors.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Find the area of triangle OAB, where O is the origin, A has position vector $$\\mathbf{a} = \\mathbf{i} - \\mathbf{j}$$, and B has position vector $$\\mathbf{b} = 3\\mathbf{i} + 4\\mathbf{j} - 6\\mathbf{k}$$. (3 steps)", "answer": "- Step 1: Area of triangle OAB = $$\\frac{1}{2} |\\mathbf{a} \\times \\mathbf{b}|$$\n\n- Step 2: Compute the cross product:\n$$\\mathbf{a} \\times \\mathbf{b} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ 1 & -1 & 0 \\\\ 3 & 4 & -6 \\end{vmatrix} = 6\\mathbf{i} + 6\\mathbf{j} + 7\\mathbf{k}$$\n\n- Step 3: Magnitude = $$\\frac{1}{2} \\sqrt{6^2 + 6^2 + 7^2} = \\frac{1}{2} \\sqrt{36 + 36 + 49} = \\frac{1}{2} \\sqrt{121} = \\frac{11}{2} = 5.5$$\n\n**Key formula:** Triangle area = $$\\frac{1}{2}|\\mathbf{a} \\times \\mathbf{b}|$$ when vectors emanate from the origin.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Given three points A, B, C with position vectors a, b, c, write down THREE equivalent formulas for the area of triangle ABC. (2 steps)", "answer": "- Step 1: The main formula is: $$\\text{Area} = \\frac{1}{2} |\\overrightarrow{AB} \\times \\overrightarrow{AC}| = \\frac{1}{2} |(\\mathbf{b} - \\mathbf{a}) \\times (\\mathbf{c} - \\mathbf{a})|$$\n\n- Step 2: This expands to two other useful forms:\n$$\\text{Area} = \\frac{1}{2} |(\\mathbf{a} \\times \\mathbf{b}) + (\\mathbf{b} \\times \\mathbf{c}) + (\\mathbf{c} \\times \\mathbf{a})|$$\n\n**Why multiple forms?** Different situations call for different approaches - sometimes you know the vectors directly, sometimes you need to work with position vectors.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "What is the area of a parallelogram ABCD with adjacent sides given by vectors $$\\mathbf{b} - \\mathbf{a}$$ and $$\\mathbf{d} - \\mathbf{a}$$? Write the formula. (2 steps)", "answer": "- Step 1: The area of parallelogram = magnitude of cross product of adjacent sides:\n$$|\\overrightarrow{AB} \\times \\overrightarrow{AD}| = |(\\mathbf{b} - \\mathbf{a}) \\times (\\mathbf{d} - \\mathbf{a})|$$\n\n- Step 2: This expands to: $$|(\\mathbf{a} \\times \\mathbf{b}) + (\\mathbf{b} \\times \\mathbf{d}) + (\\mathbf{d} \\times \\mathbf{a})|$$\n\n**Comparison:** Note it's NOT divided by 2 (unlike triangle). Double the triangle area gives parallelogram area.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Define the scalar triple product $$\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c})$$. What type of quantity is it? (2 steps)", "answer": "- Step 1: The scalar triple product is defined as $$\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c})$$. First compute the cross product $$\\mathbf{b} \\times \\mathbf{c}$$, then take the dot product with a.\n\n- Step 2: It produces a **scalar** (single number), hence the name \"scalar triple product\".\n\n**Computational form:** It can be written as a 3×3 determinant:\n$$\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c}) = \\begin{vmatrix} a_1 & a_2 & a_3 \\\\ b_1 & b_2 & b_3 \\\\ c_1 & c_2 & c_3 \\end{vmatrix}$$", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "State the cyclic property of the scalar triple product. What does this imply about the sign when you swap two vectors? (2 steps)", "answer": "- Step 1: The scalar triple product is cyclic:\n$$\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c}) = \\mathbf{b} . (\\mathbf{c} \\times \\mathbf{a}) = \\mathbf{c} . (\\mathbf{a} \\times \\mathbf{b})$$\n\n- Step 2: Swapping any two vectors changes the sign (negates the result). For example:\n$$\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c}) = -\\mathbf{b} . (\\mathbf{a} \\times \\mathbf{c})$$\n\n**Key insight:** This cyclic property is useful for rearranging expressions to simplify calculations.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "If $$\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c}) = 0$$, what does this tell you about vectors a, b, and c? (2 steps)", "answer": "- Step 1: Zero scalar triple product means the three vectors are **coplanar** (they lie in the same plane).\n\n- Step 2: This includes the special case where any two vectors are parallel (since parallel vectors are also coplanar with any third vector).\n\n**Geometric interpretation:** The volume of the parallelepiped formed by these three vectors would be zero - they don't span 3D space.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "What is the volume of a parallelepiped with three adjacent edges given by vectors a, b, and c? How is this related to the scalar triple product? (2 steps)", "answer": "- Step 1: Volume = |base area| × height. The base (formed by b and c) has area $$|\\mathbf{b} \\times \\mathbf{c}|$$, and the height is the component of a perpendicular to the base.\n\n- Step 2: This gives: $$\\text{Volume} = |\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c})|$$\n\n**Takeaway:** The absolute value ensures volume is positive. The sign indicates orientation (right-handed vs left-handed system).", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "What is the volume of a tetrahedron with three edges from a vertex given by vectors a, b, and c? How does it compare to the parallelepiped volume? (2 steps)", "answer": "- Step 1: A tetrahedron (triangular pyramid) is 1/6 of the parallelepiped formed by the same three vectors.\n\n- Step 2: $$\\text{Volume of tetrahedron} = \\frac{1}{6} |\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c})|$$\n\n**Reasoning:** The parallelepiped can be divided into 6 congruent tetrahedra. This is a crucial formula for 3D geometry problems.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Find the volume of a tetrahedron with vertices at (1,1,-1), (2,4,-1), (3,0,-2), and (0,4,5). (3 steps)", "answer": "- Step 1: Label vertices A, B, C, D. Compute vectors from A to the other vertices:\n$$\\overrightarrow{AB} = \\mathbf{i} + 3\\mathbf{j}$$\n$$\\overrightarrow{AC} = 2\\mathbf{i} - \\mathbf{j} - \\mathbf{k}$$\n$$\\overrightarrow{AD} = -\\mathbf{i} + 3\\mathbf{j} + 6\\mathbf{k}$$\n\n- Step 2: Compute scalar triple product:\n$$\\overrightarrow{AB} . (\\overrightarrow{AC} \\times \\overrightarrow{AD}) = \\begin{vmatrix} 1 & 3 & 0 \\\\ 2 & -1 & -1 \\\\ -1 & 3 & 6 \\end{vmatrix} = -36$$\n\n- Step 3: Volume = $$\\frac{1}{6} |-36| = 6$$\n\n**Check:** You could use any vertex as reference - the result should be the same (possibly with sign change).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "How can you write the vector equation of a line in the form $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$? What does this equation represent geometrically? (3 steps)", "answer": "- Step 1: If a line passes through point A (position vector a) and is parallel to vector b, then for any point R on the line with position vector r, the vector $$\\mathbf{r} - \\mathbf{a}$$ is parallel to b.\n\n- Step 2: Two parallel vectors have cross product zero: $$(\\mathbf{r} - \\mathbf{a}) \\times \\mathbf{b} = \\mathbf{0}$$\n\n- Step 3: This is a **parameter-free** form of the line equation. It says \"the vector from a to r is parallel to b.\"\n\n**Alternative form:** Can also be written as $$\\mathbf{r} \\times \\mathbf{b} = \\mathbf{a} \\times \\mathbf{b}$$", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Convert the line equation $$(\\mathbf{r} - (\\mathbf{i} + 2\\mathbf{j} - \\mathbf{k})) \\times (4\\mathbf{i} - 3\\mathbf{j} + 2\\mathbf{k}) = \\mathbf{0}$$ into Cartesian form $$\\frac{x-x_1}{l} = \\frac{y-y_1}{m} = \\frac{z-z_1}{n}$$. (3 steps)", "answer": "- Step 1: Since cross product is zero, $$\\mathbf{r} - \\mathbf{a}$$ is parallel to b, so:\n$$\\mathbf{r} - \\mathbf{a} = \\lambda \\mathbf{b}$$\n$$\\mathbf{i}(x-1) + \\mathbf{j}(y-2) + \\mathbf{k}(z+1) = \\lambda(4\\mathbf{i} - 3\\mathbf{j} + 2\\mathbf{k})$$\n\n- Step 2: Equate components:\n$$x - 1 = 4\\lambda, \\quad y - 2 = -3\\lambda, \\quad z + 1 = 2\\lambda$$\n\n- Step 3: Solve for λ in each case:\n$$\\frac{x-1}{4} = \\frac{y-2}{-3} = \\frac{z+1}{2} = \\lambda$$\n\n**Note:** l = 4, m = -3, n = 2 are the direction ratios of the line.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Write the equation of a plane in scalar product form $$\\mathbf{r} . \\mathbf{n} = p$$. What do n and p represent? (2 steps)", "answer": "- Step 1: If a plane has normal vector n and passes through point with position vector a, then for any point R in the plane (position vector r), the vector $$\\mathbf{r} - \\mathbf{a}$$ is perpendicular to n.\n\n- Step 2: So $$(\\mathbf{r} - \\mathbf{a}) . \\mathbf{n} = 0$$, which gives $$\\mathbf{r} . \\mathbf{n} = \\mathbf{a} . \\mathbf{n} = p$$\n\n**Interpretation:** n is the normal (perpendicular) vector to the plane; p is the scalar product of n with any point on the plane.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A plane passes through point (2,3,-5) and has normal vector $$3\\mathbf{i} + \\mathbf{j} - \\mathbf{k}$$. Write its equation in (a) scalar product form, (b) Cartesian form. (3 steps)", "answer": "- Step 1: (a) Using $$\\mathbf{r} . \\mathbf{n} = p$$:\n$$\\mathbf{r} . (3\\mathbf{i} + \\mathbf{j} - \\mathbf{k}) = (2\\mathbf{i} + 3\\mathbf{j} - 5\\mathbf{k}) . (3\\mathbf{i} + \\mathbf{j} - \\mathbf{k}) = 6 + 3 + 5 = 14$$\nSo: $$\\mathbf{r} . (3\\mathbf{i} + \\mathbf{j} - \\mathbf{k}) = 14$$\n\n- Step 2: (b) Replace r with $$x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$$:\n$$3x + y - z = 14$$\n\n- Step 3: This is of the general form $$ax + by + cz + d = 0$$ where a = 3, b = 1, c = -1, d = -14.\n\n**Key insight:** The Cartesian form directly gives you the normal vector (a, b, c) from the coefficients.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Write the vector equation of a plane passing through point A (position vector a) and containing two non-parallel vectors b and c. What is this form called? (2 steps)", "answer": "- Step 1: The equation is $$\\mathbf{r} = \\mathbf{a} + s\\mathbf{b} + t\\mathbf{c}$$, where s and t are scalar parameters.\n\n- Step 2: This is called the **parametric (or vector) form** of a plane. It describes any point on the plane as a linear combination of two direction vectors from a reference point.\n\n**Note:** b and c must be non-parallel (linearly independent) to define a plane, not just a line.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Find the Cartesian equation of the plane passing through points A(1,0,-1), B(2,1,0), and C(2,16,6). (4 steps)", "answer": "- Step 1: Find two direction vectors in the plane:\n$$\\overrightarrow{AB} = \\mathbf{i} + \\mathbf{j} + \\mathbf{k}$$\n$$\\overrightarrow{AC} = \\mathbf{i} + 16\\mathbf{j} + 7\\mathbf{k}$$\n\n- Step 2: Find normal vector = cross product:\n$$\\overrightarrow{AB} \\times \\overrightarrow{AC} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ 1 & 1 & 1 \\\\ 1 & 16 & 7 \\end{vmatrix} = -9\\mathbf{i} - 6\\mathbf{j} + 15\\mathbf{k}$$\n\n- Step 3: Simplify (divide by 3): $$-3\\mathbf{i} - 2\\mathbf{j} + 5\\mathbf{k}$$ (or multiply by -1: $$3\\mathbf{i} + 2\\mathbf{j} - 5\\mathbf{k}$$)\n\n- Step 4: Using point A(1,0,-1): $$3(x-1) + 2(y-0) - 5(z+1) = 0$$\nSimplify: $$3x + 2y - 5z = 8$$\n\n**Alternative:** Could use n = (-9, -6, 15) and get same result after simplifying.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "How do you find the acute angle between a line with direction vector b and a plane with normal vector n? Write the formula. (2 steps)", "answer": "- Step 1: Let θ be the angle between the line direction b and the plane normal n. The angle between the line and plane (let's call it α) satisfies: α + θ = 90°.\n\n- Step 2: Using $$\\cos \\theta = \\frac{|\\mathbf{b} . \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$, we get:\n$$\\sin \\alpha = \\frac{|\\mathbf{b} . \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$\n\n**Alternative view:** sin(angle line-plane) = |b.n| / (|b||n|). The cosine gives angle with the normal.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "How do you find the acute angle between two planes with normals n₁ and n₂? (2 steps)", "answer": "- Step 1: The angle between two planes equals the angle between their normal vectors.\n\n- Step 2: The formula is:\n$$\\cos \\theta = \\frac{|\\mathbf{n}_1 . \\mathbf{n}_2|}{|\\mathbf{n}_1||\\mathbf{n}_2|}$$\nwhere θ is the acute angle between the planes.\n\n**Key point:** Use absolute value to get acute angle (0° to 90°). Without absolute, you might get obtuse.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A plane has equation $$\\mathbf{r} . (10\\mathbf{i} + 10\\mathbf{j} + 23\\mathbf{k}) = 81$$. Find the perpendicular distance from the origin to this plane. (3 steps)", "answer": "- Step 1: First find the unit normal:\n$$|\\mathbf{n}| = \\sqrt{10^2 + 10^2 + 23^2} = \\sqrt{100 + 100 + 529} = \\sqrt{729} = 27$$\n$$\\hat{\\mathbf{n}} = \\frac{1}{27}(10\\mathbf{i} + 10\\mathbf{j} + 23\\mathbf{k})$$\n\n- Step 2: Write plane in form $$\\mathbf{r} . \\hat{\\mathbf{n}} = d$$:\nDivide equation by 27: $$\\mathbf{r} . \\frac{1}{27}(10\\mathbf{i} + 10\\mathbf{j} + 23\\mathbf{k}) = \\frac{81}{27} = 3$$\n\n- Step 3: The distance from origin = d = 3.\n\n**General rule:** When plane is written as $$\\mathbf{r} . \\hat{\\mathbf{n}} = d$$ with unit normal, d is the distance from origin.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Find the perpendicular distance from point P(1,3,-2) to the plane $$\\mathbf{r} . (\\mathbf{i} + 2\\mathbf{j} + 2\\mathbf{k}) = \\frac{5}{3}$$. (3 steps)", "answer": "- Step 1: The given equation is already in form $$\\mathbf{r} . \\hat{\\mathbf{n}} = d$$ with unit normal, since $$\\frac{1}{3}(\\mathbf{i} + 2\\mathbf{j} + 2\\mathbf{k})$$ is unit.\n\n- Step 2: Find distance from origin to plane through P (parallel plane):\n$$d_P = \\mathbf{OP} . \\hat{\\mathbf{n}} = (1,3,-2) . \\frac{1}{3}(1,2,2) = \\frac{1}{3}(1 + 6 - 4) = \\frac{3}{3} = 1$$\n\n- Step 3: Distance between planes = |d - d_P| = |5/3 - 1| = |5/3 - 3/3| = 2/3\n\n**Method:** Construct a parallel plane through the point, find its d-value, subtract.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "What is the shortest distance between two skew lines $$\\mathbf{r} = \\mathbf{a} + \\lambda \\mathbf{b}$$ and $$\\mathbf{r} = \\mathbf{c} + \\mu \\mathbf{d}$$? Write the formula and explain intuitively. (2 steps)", "answer": "- Step 1: The formula is:\n$$D = \\frac{|(\\mathbf{a} - \\mathbf{c}) . (\\mathbf{b} \\times \\mathbf{d})|}{|\\mathbf{b} \\times \\mathbf{d}|}$$\n\n- Step 2: Intuition: $$\\mathbf{b} \\times \\mathbf{d}$$ gives the direction of the common perpendicular (perpendicular to both lines). The scalar triple product $$(\\mathbf{a} - \\mathbf{c}) . (\\mathbf{b} \\times \\mathbf{d})$$ gives the volume of the parallelepiped formed by the direction vectors and the vector connecting the lines. Dividing by the base area $$|\\mathbf{b} \\times \\mathbf{d}|$$ gives the height = shortest distance.\n\n**Key insight:** The numerator is the (absolute) scalar triple product; denominator is the cross product magnitude.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Find the shortest distance between the skew lines $$\\mathbf{r} = \\mathbf{i} + \\lambda(\\mathbf{j} + \\mathbf{k})$$ and $$\\mathbf{r} = -\\mathbf{i} + 3\\mathbf{j} - \\mathbf{k} + \\mu(2\\mathbf{i} - \\mathbf{j} - \\mathbf{k})$$. (3 steps)", "answer": "- Step 1: Identify vectors: a = i, c = -i + 3j - k, b = j + k, d = 2i - j - k\n$$\\mathbf{a} - \\mathbf{c} = 2\\mathbf{i} - 3\\mathbf{j} + \\mathbf{k}$$\n\n- Step 2: Compute $$\\mathbf{b} \\times \\mathbf{d}$$:\n$$\\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ 0 & 1 & 1 \\\\ 2 & -1 & -1 \\end{vmatrix} = 2\\mathbf{j} - 2\\mathbf{k}$$\n\n- Step 3: Apply formula:\n$$D = \\frac{|(2\\mathbf{i} - 3\\mathbf{j} + \\mathbf{k}) . (2\\mathbf{j} - 2\\mathbf{k})|}{|2\\mathbf{j} - 2\\mathbf{k}|} = \\frac{|0 - 6 + (-2)|}{\\sqrt{4 + 4}} = \\frac{|-8|}{\\sqrt{8}} = \\frac{8}{2\\sqrt{2}} = 2\\sqrt{2}$$\n\n**Answer:** $$2\\sqrt{2}$$", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Two lines are given by $$\\mathbf{r} = \\mathbf{i} + 3\\mathbf{j} + \\lambda(\\mathbf{i} - \\mathbf{j} + 5\\mathbf{k})$$ and $$\\mathbf{r} = -\\mathbf{i} - 3\\mathbf{j} + 2\\mathbf{k} + \\mu(\\mathbf{i} + \\mathbf{j} + 2\\mathbf{k})$$. Do they intersect? If so, find the intersection point. (4 steps)", "answer": "- Step 1: Write in parametric form:\nLine 1: (3+λ, 1-2λ, 1-λ)\nLine 2: (-1+μ, -3+μ, 2+2μ)\n\n- Step 2: Equate components:\nx: 3 + λ = -1 + μ  →  λ - μ = -4  (1)\ny: 1 - 2λ = -3 + μ  →  -2λ - μ = -4  (2)\nz: 1 - λ = 2 + 2μ  →  -λ - 2μ = 1  (3)\n\n- Step 3: Solve (1) and (2): μ = -1, λ = -5\nCheck with (3): -(-5) - 2(-1) = 5 + 2 = 7 ≠ 1. No solution!\n\n- Step 4: The lines do NOT intersect. Since they are not parallel (direction vectors not proportional), they are skew lines.\n\n**Conclusion:** These are skew lines - non-intersecting and non-parallel.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "Find the point of intersection of line $$\\mathbf{r} = -\\mathbf{i} + \\mathbf{j} - 5\\mathbf{k} + \\lambda(\\mathbf{i} + \\mathbf{j} + 2\\mathbf{k})$$ and plane $$\\mathbf{r} . (\\mathbf{i} + 2\\mathbf{j} + 3\\mathbf{k}) = 4$$. (3 steps)", "answer": "- Step 1: Write line parametrically: x = -1 + λ, y = 1 + λ, z = -5 + 2λ\n\n- Step 2: Substitute into plane equation:\n(-1 + λ)(1) + (1 + λ)(2) + (-5 + 2λ)(3) = 4\n-1 + λ + 2 + 2λ - 15 + 6λ = 4\n9λ - 14 = 4\n9λ = 18\nλ = 2\n\n- Step 3: Substitute λ = 2 back into line:\nx = -1 + 2 = 1, y = 1 + 2 = 3, z = -5 + 4 = -1\nPoint = (1, 3, -1)\n\n**Key method:** Substitute parametric line into plane equation, solve for λ, then find coordinates.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "What condition determines whether a line lies within a plane? How would you verify this? (2 steps)", "answer": "- Step 1: A line lies in a plane if every point on the line satisfies the plane's equation.\n\n- Step 2: Method: Take the parametric equation of the line, substitute x, y, z into the plane equation. If the resulting equation is satisfied for ALL values of the parameter (i.e., it's an identity like 0 = 0), then the line lies in the plane.\n\n**Alternative check:** Verify that a point on the line lies in the plane, AND the direction vector of the line is perpendicular to the plane's normal (i.e., b.n = 0).", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A plane is given by $$\\mathbf{r} = \\mathbf{a} + s\\mathbf{b} + t\\mathbf{c}$$. How can you convert this to Cartesian form? What is the role of b × c? (3 steps)", "answer": "- Step 1: The normal vector to the plane is $$\\mathbf{n} = \\mathbf{b} \\times \\mathbf{c}$$ (perpendicular to both direction vectors).\n\n- Step 2: Write the plane in scalar form: $$\\mathbf{r} . \\mathbf{n} = \\mathbf{a} . \\mathbf{n}$$\n\n- Step 3: Substitute $$\\mathbf{r} = x\\mathbf{i} + y\\mathbf{j} + z\\mathbf{k}$$ to get Cartesian form: $$n_1 x + n_2 y + n_3 z = \\mathbf{a} . \\mathbf{n}$$\n\n**Key insight:** The cross product of the two direction vectors gives the normal - this is essential for converting parametric to Cartesian form.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "What is the relationship between the line of intersection of two planes and the cross product of their normal vectors? Explain. (2 steps)", "answer": "- Step 1: The line of intersection of two planes is perpendicular to BOTH normal vectors of the planes.\n\n- Step 2: Therefore, the direction vector of the line of intersection is given by $$\\mathbf{n}_1 \\times \\mathbf{n}_2$$ (the cross product of the two plane normals).\n\n**Geometric intuition:** If you have two planes, their intersection is a line. That line must be perpendicular to each plane's normal - which is exactly what the cross product gives.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "A line has direction vector b. How do you find the angle between this line and a plane with normal n? Explain why your formula works. (2 steps)", "answer": "- Step 1: The angle α between a line and plane satisfies:\n$$\\sin \\alpha = \\frac{|\\mathbf{b} . \\mathbf{n}|}{|\\mathbf{b}||\\mathbf{n}|}$$\n\n- Step 2: Why? Let θ be angle between b and n. Since α + θ = 90°, we have sin α = cos θ = |b.n|/(|b||n|).\n\n**Alternative formula:** Could also use cos α = |(b × n)|/(|b||n|), but sin formula is more direct.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "If you have a plane with equation $$ax + by + cz + d = 0$$ and a point $$(x_0, y_0, z_0)$$, what is the shortest distance from the point to the plane? (2 steps)", "answer": "- Step 1: The distance is given by:\n$$D = \\frac{|ax_0 + by_0 + cz_0 + d|}{\\sqrt{a^2 + b^2 + c^2}}$$\n\n- Step 2: The numerator is the plane equation evaluated at the point (gives zero if point lies in plane). The denominator normalizes by the length of the normal vector.\n\n**Key insight:** This is the 3D equivalent of the point-to-line distance formula in 2D.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "Two planes are parallel with equations $$\\mathbf{r} . \\mathbf{n} = p_1$$ and $$\\mathbf{r} . \\mathbf{n} = p_2$$. What is the distance between them? (2 steps)", "answer": "- Step 1: The distance between two parallel planes is simply the difference in their constant terms when written with the same unit normal.\n\n- Step 2: If both are in form $$\\mathbf{r} . \\hat{\\mathbf{n}} = d$$, then distance = $$|p_1 - p_2|$$.\n\n**Important:** The normal vectors must be identical (or proportional). If not parallel, they intersect along a line.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Prove that $$\\mathbf{a} \\times \\mathbf{b} = -\\mathbf{b} \\times \\mathbf{a}$$ using the definition of cross product. Why is this property called \"anti-commutative\"? (2 steps)", "answer": "- Step 1: From definition, $$\\mathbf{a} \\times \\mathbf{b} = |\\mathbf{a}||\\mathbf{b}| \\sin \\theta \\, \\hat{\\mathbf{n}}$$ where $$\\hat{\\mathbf{n}}$$ is perpendicular to both, following right-hand rule from a to b.\n\n- Step 2: For $$\\mathbf{b} \\times \\mathbf{a}$$, we turn from b to a, so $$\\hat{\\mathbf{n}}$$ reverses direction (to -$$\\hat{\\mathbf{n}}$$). Thus:\n$$\\mathbf{b} \\times \\mathbf{a} = |\\mathbf{b}||\\mathbf{a}| \\sin \\theta (-\\hat{\\mathbf{n}}) = -|\\mathbf{a}||\\mathbf{b}| \\sin \\theta \\hat{\\mathbf{n}} = -\\mathbf{a} \\times \\mathbf{b}$$\n\n**Terminology:** \"Anti-commutative\" means swapping the order changes the sign: a × b = -(b × a).", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Is the vector product distributive over addition? That is, is $$\\mathbf{a} \\times (\\mathbf{b} + \\mathbf{c}) = \\mathbf{a} \\times \\mathbf{b} + \\mathbf{a} \\times \\mathbf{c}$$? (2 steps)", "answer": "- Step 1: YES, the cross product IS distributive over addition:\n$$\\mathbf{a} \\times (\\mathbf{b} + \\mathbf{c}) = \\mathbf{a} \\times \\mathbf{b} + \\mathbf{a} \\times \\mathbf{c}$$\n\n- Step 2: This property (along with anti-commativity and associativity with scalar multiplication) makes the cross product a linear operation, which is why we can expand determinant expressions component-wise.\n\n**Note:** This is similar to differentiation rules - crucial for expanding cross products of vector expressions.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Find the sine of the acute angle between $$\\mathbf{a} = 2\\mathbf{i} + \\mathbf{j} + 2\\mathbf{k}$$ and $$\\mathbf{b} = -3\\mathbf{j} + 4\\mathbf{k}$$. Leave answer as simplified surd. (3 steps)", "answer": "- Step 1: Use formula $$\\sin \\theta = \\frac{|\\mathbf{a} \\times \\mathbf{b}|}{|\\mathbf{a}||\\mathbf{b}|}$$\n\n- Step 2: Compute cross product:\n$$\\mathbf{a} \\times \\mathbf{b} = \\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ 2 & 1 & 2 \\\\ 0 & -3 & 4 \\end{vmatrix} = 10\\mathbf{i} - 8\\mathbf{j} - 6\\mathbf{k}$$\n$$|\\mathbf{a} \\times \\mathbf{b}| = \\sqrt{100 + 64 + 36} = \\sqrt{200} = 10\\sqrt{2}$$\n\n- Step 3: $$|\\mathbf{a}| = \\sqrt{4+1+4} = 3$$, $$|\\mathbf{b}| = \\sqrt{9+16} = 5$$\n$$\\sin \\theta = \\frac{10\\sqrt{2}}{3 \\times 5} = \\frac{2\\sqrt{2}}{3}$$\n\n**Note:** We use sin (not cos) because we want to find the angle between the vectors themselves, not their direction. The sin formula directly gives magnitude of cross product relationship.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Why can the cross product magnitude $$|\\mathbf{a} \\times \\mathbf{b}|$$ be interpreted as the area of the parallelogram spanned by a and b? Provide geometric reasoning. (3 steps)", "answer": "- Step 1: Consider parallelogram with adjacent sides a and b. Base = |a|. Height = |b| sin θ where θ is angle between them.\n\n- Step 2: Area = base × height = |a| × |b| sin θ\n\n- Step 3: But this equals $$|\\mathbf{a} \\times \\mathbf{b}|$$ by definition. This is not a coincidence - it's precisely why the cross product magnitude was defined this way!\n\n**Visual:** Imagine a and b as two arrows from the same point. The parallelogram they span has area equal to the cross product magnitude.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": true}, {"question": "What does the sign of the scalar triple product $$\\mathbf{a} . (\\mathbf{b} \\times \\mathbf{c})$$ tell you about the orientation of the three vectors? (2 steps)", "answer": "- Step 1: The sign indicates whether the three vectors form a right-handed or left-handed system.\n\n- Step 2: If positive, (a, b, c) forms a right-handed set (like i, j, k). If negative, it's left-handed. This relates to the \"handedness\" of the coordinate system.\n\n**Practical use:** When finding volumes, we take absolute value to get positive volume. The sign tells you about orientation, which matters in some contexts (e.g., when the order of vectors matters).", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "Given that $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{c} \\times \\mathbf{a}$$, where a is non-zero and b, c are non-parallel, show that a is parallel to b + c. (3 steps)", "answer": "- Step 1: From $$\\mathbf{a} \\times \\mathbf{b} = \\mathbf{c} \\times \\mathbf{a}$$, rewrite right side: $$\\mathbf{c} \\times \\mathbf{a} = -\\mathbf{a} \\times \\mathbf{c}$$\n\n- Step 2: So $$\\mathbf{a} \\times \\mathbf{b} + \\mathbf{a} \\times \\mathbf{c} = \\mathbf{0}$$\nUsing distributivity: $$\\mathbf{a} \\times (\\mathbf{b} + \\mathbf{c}) = \\mathbf{0}$$\n\n- Step 3: Since a is non-zero and b, c are non-parallel (so b + c ≠ 0), the only way cross product is zero is if a is parallel to (b + c).\n\n**Key insight:** Setting cross product to zero means the vectors are parallel. This is a common technique in vector proofs.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "The plane ax + by + cz + d = 0 intercepts the axes at (p, 0, 0), (0, q, 0), and (0, 0, r). Express p, q, r in terms of a, b, c, d. Then prove that $$\\frac{1}{p^2} + \\frac{1}{q^2} + \\frac{1}{r^2} = \\frac{1}{d^2}(\\frac{a^2+b^2+c^2}{a^2b^2c^2})$$. (4 steps)", "answer": "- Step 1: On x-axis, y = z = 0: ap + d = 0 → p = -d/a\nSimilarly, q = -d/b, r = -d/c\n\n- Step 2: Left side: $$\\frac{1}{p^2} + \\frac{1}{q^2} + \\frac{1}{r^2} = \\frac{a^2}{d^2} + \\frac{b^2}{d^2} + \\frac{c^2}{d^2} = \\frac{a^2+b^2+c^2}{d^2}$$\n\n- Step 3: Wait, the question asks about the distance from origin. For plane ax + by + cz = 1 (passing through intercepts), distance d₀ = 1/√(a² + b² + c²)\n\n- Step 4: The intercept form: x/p + y/q + z/r = 1. Multiply both sides, compare with ax + by + cz + d = 0 to verify relationship.\n\n**Note:** This confirms the intercept form and distance relationship for planes.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "What is a common misconception about the direction of $$\\mathbf{a} \\times \\mathbf{b}$$? How does the right-hand rule resolve this? (2 steps)", "answer": "- Step 1: Common misconception: Students think the cross product direction is simply \"perpendicular to both vectors\" without considering the order. But \"perpendicular\" has TWO possible directions (up or down).\n\n- Step 2: The right-hand rule resolves this ambiguity: point first finger in direction of a, second finger in direction of b, thumb gives the correct direction. Swapping a and b reverses the thumb direction.\n\n**Mnemonic:** Think of a right-handed screw - turning from a to b drives it in the direction of $$\\mathbf{a} \\times \\mathbf{b}$$.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": true}, {"question": "Why is the vector product NOT commutative? Give a specific numerical example to illustrate. (2 steps)", "answer": "- Step 1: The vector product is anti-commutative: $$\\mathbf{a} \\times \\mathbf{b} = -\\mathbf{b} \\times \\mathbf{a}$$. This is because the right-hand rule gives opposite directions when you swap the order.\n\n- Step 2: Example: $$\\mathbf{i} \\times \\mathbf{j} = \\mathbf{k}$$, but $$\\mathbf{j} \\times \\mathbf{i} = -\\mathbf{k}$$. These are opposite vectors!\n\n**Why important:** This property means you must be very careful about the order when computing cross products. Many exam errors stem from ignoring this.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "When finding the angle between two vectors, when would you use the dot product vs. the cross product? (2 steps)", "answer": "- Step 1: Use **dot product** when you want cosine: $$\\cos \\theta = \\frac{\\mathbf{a} . \\mathbf{b}}{|\\mathbf{a}||\\mathbf{b}|}$$. This directly gives the angle and tells you whether it's acute (positive) or obtuse (negative).\n\n- Step 2: Use **cross product** when you want sine: $$\\sin \\theta = \\frac{|\\mathbf{a} \\times \\mathbf{b}|}{|\\mathbf{a}||\\mat
