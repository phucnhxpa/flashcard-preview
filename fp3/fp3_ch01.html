 $$\\tan x$$ has *vertical asymptotes* at $$x = \\pi/2 + n\\pi$$ (where $$\\cos x = 0$$). Between asymptotes, it ranges from $$-\\infty$$ to $$+\\infty$$. Periodic, unbounded.\n- Step 2: $$\\tanh x$$ has *horizontal asymptotes* at $$y = \\pm 1$$. The denominator $$\\cosh x \\geq 1$$ never zeros. Bounded, monotonic.\n- Step 3: Underlying cause: $$\\cos$$ oscillates and crosses zero (causing tan's blow-ups), while $$\\cosh$$ stays $$\\geq 1$$ (so tanh is always tame). Periodicity vs. monotonic growth is the fundamental distinction between circular and hyperbolic worlds.", "source": "Opus 4.7 ②", "_id": "opus_2_75", "judge_pick": false}, {"question": "If $$\\operatorname{artanh} x + \\operatorname{artanh} y = \\ln\\sqrt{3}$$, derive an expression for $$y$$ in terms of $$x$$. (4 steps)", "answer": "- Step 1: Write each artanh as a log: $$\\frac{1}{2}\\ln\\frac{1+x}{1-x} + \\frac{1}{2}\\ln\\frac{1+y}{1-y} = \\ln\\sqrt{3} = \\frac{1}{2}\\ln 3$$.\n- Step 2: Multiply by $$2$$ and combine: $$\\ln\\frac{(1+x)(1+y)}{(1-x)(1-y)} = \\ln 3$$, so $$(1+x)(1+y) = 3(1-x)(1-y)$$.\n- Step 3: Expand: $$1 + x + y + xy = 3 - 3x - 3y + 3xy$$. Collect $$y$$ terms: $$4y - 2xy = 2 - 4x$$.\n- Step 4: Factor: $$2y(2 - x) = 2(1 - 2x)$$, giving $$y = \\frac{1 - 2x}{2 - x} = \\frac{2x - 1}{x - 2}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_76", "judge_pick": false}, {"question": "Solve $$13\\sinh x - 7\\cosh x + 1 = 0$$, giving the answer as a natural logarithm. (4 steps)", "answer": "- Step 1: Substitute exponentials: $$\\frac{13(e^x - e^{-x})}{2} - \\frac{7(e^x + e^{-x})}{2} + 1 = 0$$.\n- Step 2: Combine: $$3e^x - 10e^{-x} + 1 = 0$$. Multiply by $$e^x$$: $$3e^{2x} + e^x - 10 = 0$$.\n- Step 3: Factor: $$(3e^x - 5)(e^x + 2) = 0$$, so $$e^x = 5/3$$ or $$e^x = -2$$.\n- Step 4: Reject $$e^x = -2$$ (impossible for real $$x$$). So $$x = \\ln(5/3)$$. Single solution.", "source": "Opus 4.7 ②", "_id": "opus_2_77", "judge_pick": true}, {"question": "Where do $$y = \\operatorname{sech} x$$ and $$y = \\sinh x$$ intersect? (4 steps)", "answer": "- Step 1: $$\\operatorname{sech} x = \\sinh x$$ means $$1/\\cosh x = \\sinh x$$, i.e. $$\\sinh x \\cosh x = 1$$.\n- Step 2: Use double-angle: $$\\sinh x \\cosh x = \\frac{1}{2}\\sinh 2x$$, so $$\\sinh 2x = 2$$.\n- Step 3: $$2x = \\operatorname{arsinh} 2 = \\ln(2 + \\sqrt{5})$$.\n- Step 4: $$x = \\frac{1}{2}\\ln(2 + \\sqrt{5})$$. Single solution because $$\\sinh 2x$$ is one-to-one.", "source": "Opus 4.7 ②", "_id": "opus_2_78", "judge_pick": false}, {"question": "Why is the inverse of $$\\cosh$$ multi-branched (i.e. why does $$\\cosh y = x$$ have two $$y$$-solutions for $$x > 1$$)? Use parity. (3 steps)", "answer": "- Step 1: $$\\cosh$$ is even, so if $$\\cosh y_0 = x$$, then $$\\cosh(-y_0) = x$$ also. Both $$y_0$$ and $$-y_0$$ are valid.\n- Step 2: From log form, the two solutions are $$\\ln(x + \\sqrt{x^2-1})$$ and $$\\ln(x - \\sqrt{x^2-1})$$. Their product inside the log is $$1$$, so the two logs sum to zero — they're negatives of each other.\n- Step 3: By convention, $$\\operatorname{arcosh}$$ returns the non-negative one ($$\\ln(x + \\sqrt{x^2-1}) \\geq 0$$). When solving a $$\\cosh$$ equation, you must explicitly include both signs: $$x = \\pm \\operatorname{arcosh}(k)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_79", "judge_pick": true}, {"question": "Express $$\\operatorname{arcosh}(3/2)$$ as a single natural logarithm. (2 steps)", "answer": "- Step 1: $$\\operatorname{arcosh}(3/2) = \\ln\\left(\\frac{3}{2} + \\sqrt{(3/2)^2 - 1}\\right) = \\ln\\left(\\frac{3}{2} + \\sqrt{\\frac{5}{4}}\\right)$$.\n- Step 2: Simplify: $$= \\ln\\left(\\frac{3}{2} + \\frac{\\sqrt{5}}{2}\\right) = \\ln\\left(\\frac{3 + \\sqrt{5}}{2}\\right)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_80", "judge_pick": false}, {"question": "Express $$3\\cosh x + 5\\sinh x$$ in the form $$R\\sinh(x + \\alpha)$$ with $$R > 0$$. (3 steps)", "answer": "- Step 1: Use $$R\\sinh(x + \\alpha) = R(\\sinh x \\cosh\\alpha + \\cosh x \\sinh\\alpha)$$. Match: $$R\\cosh\\alpha = 5$$ (coeff of $$\\sinh x$$), $$R\\sinh\\alpha = 3$$ (coeff of $$\\cosh x$$).\n- Step 2: $$R^2 = R^2(\\cosh^2\\alpha - \\sinh^2\\alpha) = 25 - 9 = 16$$, so $$R = 4$$.\n- Step 3: $$\\tanh\\alpha = 3/5$$, so $$\\alpha = \\operatorname{artanh}(3/5)$$. Result: $$4\\sinh(x + \\alpha)$$.\n\nThis works because $$|5| > |3|$$ (sinh coefficient dominates) — a necessary condition for $$R\\sinh$$ form.", "source": "Opus 4.7 ②", "_id": "opus_2_81", "judge_pick": false}, {"question": "Outline how to solve $$3\\cosh x + 5\\sinh x = 8$$ using the $$R\\sinh(x+\\alpha)$$ form. (3 steps)", "answer": "- Step 1: From the $$R\\sinh$$ decomposition: $$3\\cosh x + 5\\sinh x = 4\\sinh(x + \\alpha)$$ where $$\\alpha = \\operatorname{artanh}(3/5)$$.\n- Step 2: Equation becomes $$4\\sinh(x + \\alpha) = 8$$, so $$\\sinh(x + \\alpha) = 2$$. Then $$x + \\alpha = \\operatorname{arsinh} 2 = \\ln(2 + \\sqrt{5})$$.\n- Step 3: $$x = \\ln(2 + \\sqrt{5}) - \\operatorname{artanh}(3/5)$$ — a single solution (sinh is one-to-one).\n\nThe R-form gives a slick way to solve such equations cleanly.", "source": "Opus 4.7 ②", "_id": "opus_2_82", "judge_pick": false}, {"question": "Show explicitly that $$\\sinh^2 A = (e^{2A} - 2 + e^{-2A})/4$$ and use this to verify the fundamental identity by direct expansion. (3 steps)", "answer": "- Step 1: $$\\sinh^2 A = \\left(\\frac{e^A - e^{-A}}{2}\\right)^2 = \\frac{(e^A)^2 - 2(e^A)(e^{-A}) + (e^{-A})^2}{4} = \\frac{e^{2A} - 2 + e^{-2A}}{4}$$.\n- Step 2: Similarly, $$\\cosh^2 A = \\frac{e^{2A} + 2 + e^{-2A}}{4}$$.\n- Step 3: Subtract: $$\\cosh^2 A - \\sinh^2 A = \\frac{(e^{2A} + 2 + e^{-2A}) - (e^{2A} - 2 + e^{-2A})}{4} = \\frac{4}{4} = 1$$ ✓.\n\nThe \"$$+2$$\" and \"$$-2$$\" survive because of the cross-term $$\\pm 2 e^A e^{-A} = \\pm 2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_83", "judge_pick": true}, {"question": "When you solve a hyperbolic equation and get $$\\sinh x = -1/2$$, how many real solutions does this give? Why? (2 steps)", "answer": "- Step 1: $$\\sinh$$ is strictly increasing with range $$\\mathbb{R}$$, so every real value is hit exactly once. $$\\sinh x = -1/2$$ has exactly one solution.\n- Step 2: Solution: $$x = \\operatorname{arsinh}(-1/2) = \\ln(-1/2 + \\sqrt{1/4 + 1}) = \\ln\\left(\\frac{-1 + \\sqrt{5}}{2}\\right)$$.\n\nNote: even though $$\\sinh x$$ is negative, the log is well-defined because $$-1/2 + \\sqrt{5}/2 > 0$$ (since $$\\sqrt{5} > 1$$).", "source": "Opus 4.7 ②", "_id": "opus_2_84", "judge_pick": false}, {"question": "When solving $$\\cosh 2x - 5\\sinh x = 13$$, which form of $$\\cosh 2x$$ should you use? (3 steps)", "answer": "- Step 1: The other term is $$\\sinh x$$ (not cosh), so use $$\\cosh 2x = 1 + 2\\sinh^2 x$$ to express everything in $$\\sinh x$$.\n- Step 2: Substitute: $$1 + 2\\sinh^2 x - 5\\sinh x = 13 \\Rightarrow 2\\sinh^2 x - 5\\sinh x - 12 = 0$$.\n- Step 3: A quadratic in $$\\sinh x$$ — solve normally. Using $$\\cosh 2x = 2\\cosh^2 x - 1$$ would be wrong direction: you'd be left with both $$\\cosh^2 x$$ and $$\\sinh x$$ — not consolidated.\n\nStrategy: pick the form of $$\\cosh 2x$$ that matches the *other* term in the equation.", "source": "Opus 4.7 ②", "_id": "opus_2_85", "judge_pick": false}, {"question": "Why does $$R\\cosh(x+\\alpha)$$ have a minimum but no maximum, while $$R\\sinh(x+\\alpha)$$ has neither? (3 steps)", "answer": "- Step 1: $$\\cosh$$ ranges over $$[1, \\infty)$$, so $$R\\cosh(x+\\alpha)$$ ranges over $$[R, \\infty)$$ — minimum $$R$$, no maximum.\n- Step 2: $$\\sinh$$ ranges over $$\\mathbb{R}$$ (unbounded both ways), so $$R\\sinh(x+\\alpha)$$ also ranges over $$\\mathbb{R}$$ — neither min nor max.\n- Step 3: Practical use: for inequalities like \"$$\\geq c$$\" with $$c < R$$ and $$R\\cosh$$ form, the equation has no solution. For $$R\\sinh$$ form, every value of $$c$$ has a unique solution. Knowing this changes how you analyze problems.", "source": "Opus 4.7 ②", "_id": "opus_2_86", "judge_pick": false}, {"question": "Suppose $$\\sinh x = -1$$. Find $$\\cosh x$$ and $$\\sinh 2x$$. (3 steps)", "answer": "- Step 1: $$\\cosh^2 x = 1 + \\sinh^2 x = 1 + 1 = 2$$, so $$\\cosh x = \\sqrt{2}$$ (positive root, since cosh ≥ 1 > 0).\n- Step 2: Even though $$\\sinh x < 0$$ (so $$x < 0$$), $$\\cosh x > 0$$ — cosh is even, doesn't track the sign of $$x$$.\n- Step 3: $$\\sinh 2x = 2\\sinh x \\cosh x = 2(-1)(\\sqrt{2}) = -2\\sqrt{2}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_87", "judge_pick": false}, {"question": "Find the asymptotes of $$y = 1 + \\coth x$$ for $$x \\neq 0$$. (3 steps)", "answer": "- Step 1: $$\\coth x$$ has horizontal asymptotes $$y = \\pm 1$$ (from $$\\tanh x \\to \\pm 1$$) and a vertical asymptote at $$x = 0$$ (since $$\\tanh 0 = 0$$).\n- Step 2: Adding $$1$$ shifts the graph up by $$1$$. Horizontal asymptotes shift to $$y = 0$$ (from $$-1$$) and $$y = 2$$ (from $$+1$$).\n- Step 3: Vertical asymptote at $$x = 0$$ unchanged. Three asymptotes: $$x = 0$$, $$y = 0$$, $$y = 2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_88", "judge_pick": false}, {"question": "Solve $$4\\cosh x + 13e^{-x} = 11$$. (3 steps)", "answer": "- Step 1: Substitute $$\\cosh x = (e^x + e^{-x})/2$$: $$2e^x + 2e^{-x} + 13e^{-x} = 11$$, so $$2e^x + 15e^{-x} = 11$$.\n- Step 2: Multiply by $$e^x$$: $$2e^{2x} - 11e^x + 15 = 0$$. Factor: $$(2e^x - 5)(e^x - 3) = 0$$.\n- Step 3: $$e^x = 5/2$$ or $$e^x = 3$$ (both positive, both valid). So $$x = \\ln(5/2)$$ or $$x = \\ln 3$$.\n\nThe trick: even with the extra $$e^{-x}$$ term, the strategy is the same — multiply through by $$e^x$$ to get a polynomial.", "source": "Opus 4.7 ②", "_id": "opus_2_89", "judge_pick": false}, {"question": "Apply Osborn's rule to $$\\cos 3A \\equiv 4\\cos^3 A - 3\\cos A$$. Does any sign change? (2 steps)", "answer": "- Step 1: There are no $$\\sin$$ terms — only $$\\cos$$. So no Osborn sign flip is needed anywhere.\n- Step 2: Direct replacement: $$\\cosh 3A \\equiv 4\\cosh^3 A - 3\\cosh A$$. Same form as the trig identity.\n\nThis shows that Osborn's rule has no effect on identities containing only cosines.", "source": "Opus 4.7 ②", "_id": "opus_2_90", "judge_pick": true}, {"question": "Decide between using definitions vs. known identities when proving a hyperbolic identity. (3 steps)", "answer": "- Step 1: If the question explicitly says \"starting from the definitions of $$\\sinh x$$ and $$\\cosh x$$,\" you must use the exponential forms — typically expand both sides to exponentials and simplify until they match.\n- Step 2: If no specific instruction, use any known identity. E.g. derive $$\\cosh 2A = 1 + 2\\sinh^2 A$$ from $$\\cosh 2A = \\cosh^2 A + \\sinh^2 A$$ by substituting $$\\cosh^2 = 1 + \\sinh^2$$.\n- Step 3: For exam efficiency: from definitions is more rigorous but longer; from known identities is faster if available. Always read the question carefully.", "source": "Opus 4.7 ②", "_id": "opus_2_91", "judge_pick": false}, {"question": "Show how to derive $$\\cosh 2A = 1 + 2\\sinh^2 A$$ starting from the definitions of $$\\sinh x$$ and $$\\cosh x$$. (4 steps)", "answer": "- Step 1: $$\\cosh 2A = \\frac{e^{2A} + e^{-2A}}{2}$$ by definition.\n- Step 2: $$2\\sinh^2 A = 2 \\cdot \\frac{(e^A - e^{-A})^2}{4} = \\frac{e^{2A} - 2 + e^{-2A}}{2}$$.\n- Step 3: Compute RHS: $$1 + 2\\sinh^2 A = 1 + \\frac{e^{2A} - 2 + e^{-2A}}{2} = \\frac{2 + e^{2A} - 2 + e^{-2A}}{2} = \\frac{e^{2A} + e^{-2A}}{2}$$.\n- Step 4: This equals LHS $$\\cosh 2A$$ ✓. Identity verified directly from definitions.", "source": "Opus 4.7 ②", "_id": "opus_2_92", "judge_pick": true}, {"question": "What's the formula for $$\\cosh(A-B)$$, and contrast with $$\\cos(A-B)$$. (2 steps)", "answer": "- Step 1: $$\\cosh(A-B) \\equiv \\cosh A \\cosh B - \\sinh A \\sinh B$$ — *minus* sign on the sinh-sinh term.\n- Step 2: Trig: $$\\cos(A-B) = \\cos A \\cos B + \\sin A \\sin B$$ — *plus* sign. The Osborn flip on $$\\sin A \\sin B$$ explains the difference.\n\nPattern: for cosh, the second-term sign is the *same* as the sign of $$\\pm B$$ in the argument. For trig cos, it's the *opposite*.", "source": "Opus 4.7 ②", "_id": "opus_2_93", "judge_pick": false}, {"question": "Sketch (describe) the graph of $$y = \\operatorname{arsech} x$$ on its domain. (4 steps)", "answer": "- Step 1: Domain: $$0 < x \\leq 1$$ (matches range of $$\\operatorname{sech}$$ on $$x \\geq 0$$).\n- Step 2: Reflect the right half of $$\\operatorname{sech} x$$ in line $$y = x$$.\n- Step 3: Passes through $$(1, 0)$$ since $$\\operatorname{sech} 0 = 1$$, hence $$\\operatorname{arsech} 1 = 0$$.\n- Step 4: Vertical asymptote as $$x \\to 0^+$$ (because $$\\operatorname{sech} x \\to 0$$ as $$|x| \\to \\infty$$ — reflection swaps horizontal asymptote into vertical).", "source": "Opus 4.7 ②", "_id": "opus_2_94", "judge_pick": true}, {"question": "Show that for any function $$f$$, the formula $$g(x) = (f(x) - f(-x))/2$$ extracts its \"odd part.\" Apply to $$f(x) = e^x$$. (3 steps)", "answer": "- Step 1: Check $$g$$ is odd: $$g(-x) = (f(-x) - f(x))/2 = -(f(x) - f(-x))/2 = -g(x)$$ ✓.\n- Step 2: Define $$h(x) = (f(x) + f(-x))/2$$ — the \"even part.\" Then $$g(x) + h(x) = f(x)$$ — every function decomposes uniquely into even + odd parts.\n- Step 3: For $$f(x) = e^x$$: odd part is $$g(x) = (e^x - e^{-x})/2 = \\sinh x$$; even part is $$h(x) = (e^x + e^{-x})/2 = \\cosh x$$. So sinh and cosh ARE the odd and even parts of $$e^x$$ — that's literally their definition.", "source": "Opus 4.7 ②", "_id": "opus_2_95", "judge_pick": true}, {"question": "True or false: $$\\cosh x \\leq e^{|x|}$$ for all real $$x$$. Justify. (3 steps)", "answer": "- Step 1: $$\\cosh x = (e^x + e^{-x})/2$$. WLOG suppose $$x \\geq 0$$, so $$|x| = x$$ and $$e^{|x|} = e^x$$.\n- Step 2: Need $$(e^x + e^{-x})/2 \\leq e^x$$, equivalently $$e^x + e^{-x} \\leq 2e^x$$, i.e. $$e^{-x} \\leq e^x$$. True since $$x \\geq 0$$ implies $$e^{-x} \\leq 1 \\leq e^x$$.\n- Step 3: True ✓. Conceptually: $$\\cosh x$$ is the *average* of two positive numbers, so it can't exceed the larger one. So $$\\cosh$$ is squeezed: $$\\frac{1}{2}e^{|x|} \\leq \\cosh x \\leq e^{|x|}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_96", "judge_pick": true}, {"question": "Apply Osborn's rule to $$\\cos A + \\cos B = 2\\cos\\left(\\frac{A+B}{2}\\right)\\cos\\left(\\frac{A-B}{2}\\right)$$. (2 steps)", "answer": "- Step 1: All terms are cosines — no products of two sines anywhere. So no sign flip.\n- Step 2: Direct replacement: $$\\cosh A + \\cosh B \\equiv 2\\cosh\\left(\\frac{A+B}{2}\\right)\\cosh\\left(\\frac{A-B}{2}\\right)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_97", "judge_pick": false}, {"question": "Apply Osborn's rule to $$\\cos 2A \\equiv \\frac{1 - \\tan^2 A}{1 + \\tan^2 A}$$. (3 steps)", "answer": "- Step 1: $$\\tan^2 A$$ contains a product of two sines: $$\\tan^2 A \\to -\\tanh^2 A$$. $$\\cos 2A \\to \\cosh 2A$$.\n- Step 2: Substitute: $$\\cosh 2A \\equiv \\frac{1 - (-\\tanh^2 A)}{1 + (-\\tanh^2 A)} = \\frac{1 + \\tanh^2 A}{1 - \\tanh^2 A}$$.\n- Step 3: Note both signs in the original flipped. The trig \"$$1 - \\tan^2$$\" became \"$$1 + \\tanh^2$$\", and the trig \"$$1 + \\tan^2$$\" became \"$$1 - \\tanh^2$$\".", "source": "Opus 4.7 ②", "_id": "opus_2_98", "judge_pick": true}, {"question": "Why are hyperbolic functions less commonly encountered than trigonometric ones in elementary geometry, despite their similar structure? (3 steps)", "answer": "- Step 1: Trigonometric functions arise naturally from circles, triangles, and rotations — basic geometric objects with intuitive physical interpretations (angles, periodic motion).\n- Step 2: Hyperbolic functions arise from hyperbolas and exponential growth/decay — more advanced contexts. Their natural habitat is calculus, differential equations, and special relativity (Lorentz boosts use hyperbolic angles).\n- Step 3: Once you encounter exponentials, hyperbolic functions become essential — solutions to many second-order linear ODEs involve them, and they appear in physical systems with exponential rather than oscillatory behavior (e.g. catenary, soliton waves, RC circuits).", "source": "Opus 4.7 ②", "_id": "opus_2_99", "judge_pick": true}, {"question": "A student finds $$\\cosh^2 x = 4$$ and concludes $$\\cosh x = \\pm 2$$. What's the issue? (2 steps)", "answer": "- Step 1: Algebraically, $$(\\cosh x)^2 = 4$$ permits $$\\cosh x = \\pm 2$$.\n- Step 2: But $$\\cosh x \\geq 1$$ for all real $$x$$ — never negative. So only $$\\cosh x = +2$$ is valid; the negative root is extraneous and must be rejected.\n\nLesson: always check candidate values against the *range* of the function. Sinh can be any real number; cosh is always $$\\geq 1$$; tanh is in $$(-1, 1)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_100", "judge_pick": true}, {"question": "When solving $$\\cosh 2x - 3\\cosh x = 8$$, find all real solutions exactly. (4 steps)", "answer": "- Step 1: Use $$\\cosh 2x = 2\\cosh^2 x - 1$$: $$2\\cosh^2 x - 1 - 3\\cosh x = 8 \\Rightarrow 2\\cosh^2 x - 3\\cosh x - 9 = 0$$.\n- Step 2: Factor: $$(2\\cosh x + 3)(\\cosh x - 3) = 0$$, so $$\\cosh x = -3/2$$ or $$\\cosh x = 3$$.\n- Step 3: Reject $$\\cosh x = -3/2$$ (impossible since $$\\cosh \\geq 1$$).\n- Step 4: $$\\cosh x = 3$$ gives $$x = \\pm \\operatorname{arcosh} 3 = \\pm \\ln(3 + 2\\sqrt{2})$$. Two real solutions.", "source": "Opus 4.7 ②", "_id": "opus_2_101", "judge_pick": false}, {"question": "Sketch the graph of $$y = 3\\tanh x$$ and state the asymptotes. (2 steps)", "answer": "- Step 1: $$\\tanh x$$ has horizontal asymptotes $$y = \\pm 1$$. Multiplying by $$3$$ stretches vertically by factor $$3$$ — asymptotes scale to $$y = \\pm 3$$.\n- Step 2: Shape preserved: S-curve, monotonic, passes through origin, range $$(-3, 3)$$. Asymptotes: $$y = 3$$ and $$y = -3$$.", "source": "Opus 4.7 ②", "_id": "opus_2_102", "judge_pick": false}], "count": 103}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 10354, "out_tokens": 11954, "reasoning_chars": 13902, "cost_eur": 0.0485, "elapsed_s": 303, "content_chars": 31198}, "glm_2": { const SK='fp3_ch01';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
