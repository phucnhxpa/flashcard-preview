\cos^2 + \\sin^2 = 1$$ giving $$R^2 = 13^2 + 5^2$$.)\n- Step 3: To find $$\\alpha$$: $$\\tanh\\alpha = \\frac{5}{13}$$, so $$\\alpha = \\operatorname{artanh}\\frac{5}{13} = \\frac{1}{2}\\ln\\frac{1+5/13}{1-5/13} = \\frac{1}{2}\\ln\\frac{18}{8} = \\frac{1}{2}\\ln\\frac{9}{4} = \\ln\\frac{3}{2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_46"}, {"question": "The graph of $$y = \\sinh x$$ passes through the origin. Is it true that the gradient at the origin is 1? Prove this using the definition. (3 steps)", "answer": "- Step 1: The gradient at the origin is given by $$\\frac{d}{dx}(\\sinh x)\\big|_{x=0}$$. Using the definition:\n$$\\sinh x = \\frac{e^x - e^{-x}}{2}$$\n\n- Step 2: Expand using Maclaurin series (or differentiate the exponential form):\n$$\\frac{d}{dx}(\\sinh x) = \\frac{e^x + e^{-x}}{2} = \\cosh x$$\n\n- Step 3: At $$x = 0$$:\n$$\\cosh 0 = \\frac{e^0 + e^0}{2} = \\frac{1 + 1}{2} = 1$$\n\n+ Yes, the gradient at the origin is 1. This matches the graph: at $$x = 0$$, the curve passes through the origin with slope 1, making a 45° angle with the x-axis.\n\n+ Similarly, $$\\frac{d}{dx}(\\cosh x)\\big|_{x=0} = \\sinh 0 = 0$$ — the graph of $$y = \\cosh x$$ has a horizontal tangent at the minimum point $$(0, 1)$$.", "source": "MiniMax ②", "_id": "minimax_2_19"}, {"question": "For an expression $$a\\cosh x + b\\sinh x$$, when can it be written as $$R\\cosh(x+\\alpha)$$ vs. $$R\\sinh(x+\\alpha)$$? (3 steps)", "answer": "- Step 1: For $$R\\cosh(x+\\alpha)$$: matching gives $$R^2 = a^2 - b^2$$. Need $$|a| > |b|$$ for $$R$$ to be real and positive.\n- Step 2: For $$R\\sinh(x+\\alpha)$$: matching gives $$R^2 = b^2 - a^2$$. Need $$|b| > |a|$$.\n- Step 3: If $$|a| = |b|$$: the expression collapses to a single exponential $$\\frac{a+b}{2}e^x$$ or $$\\frac{a-b}{2}e^{-x}$$ (no oscillation possible).\n\nCompare with trig: $$a\\cos + b\\sin$$ always works as $$R\\cos(x-\\alpha)$$ with $$R^2 = a^2 + b^2$$. Hyperbolic uses *minus* — Osborn-style sign reversal again.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "A student sees the identity $$\\sinh 3x \\equiv 3\\sinh x + 4\\sinh^3 x$$ and is surprised it looks exactly like the trig identity $$\\sin 3\\theta = 3\\sin\\theta - 4\\sin^3\\theta$$ but with a sign change. Explain why using Osborn's rule. (2 steps)", "answer": "- Step 1: The trig identity is $$\\sin 3\\theta = 3\\sin\\theta - 4\\sin^3\\theta$$. The term $$\\sin^3\\theta$$ is an implied product of three sine terms. But Osborn's rule says to negate **products of two** sine terms.\n- Step 2: $$\\sin^3\\theta = \\sin\\theta \\cdot \\sin^2\\theta$$. The $$\\sin^2\\theta$$ part is a product of two sine terms, which becomes $$-\\sinh^2 x$$. So $$\\sin^3\\theta \\to \\sinh x \\cdot (-\\sinh^2 x) = -\\sinh^3 x$$. Therefore $$-4\\sin^3\\theta \\to -4(-\\sinh^3 x) = +4\\sinh^3 x$$. The double negation gives us a plus sign: $$\\sinh 3x = 3\\sinh x + 4\\sinh^3 x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_55"}, {"question": "Why is $$\\sinh 0 = 0$$ but $$\\cosh 0 = 1$$ — the same starting values as $$\\sin 0$$ and $$\\cos 0$$? (3 steps)", "answer": "- Step 1: $$\\sinh 0 = (e^0 - e^0)/2 = 0$$ — sinh has a root at the origin, just like sin.\n- Step 2: $$\\cosh 0 = (1 + 1)/2 = 1$$ — cosh equals 1 at 0, just like cos.\n- Step 3: Not a coincidence: the parametrization $$(\\cosh t, \\sinh t)$$ at $$t = 0$$ gives $$(1, 0)$$ on the unit hyperbola — the natural \"start point\" — analogous to $$(\\cos 0, \\sin 0) = (1, 0)$$ on the unit circle.", "source": "Opus 4.7 ①", "_id": "opus_1_80"}, {"question": "Joshua claims $$\\sinh^2 x \\equiv 1 - \\cosh^2 x$$ by analogy with $$\\sin^2 x \\equiv 1 - \\cos^2 x$$. What's wrong? (3 steps)", "answer": "- Step 1: The analogy fails. Osborn's rule: $$\\sin^2 x$$ is a product of two sin terms, so converting gets a sign flip: $$\\sin^2 x \\equiv 1 - \\cos^2 x \\to -\\sinh^2 x \\equiv 1 - \\cosh^2 x$$, i.e. $$\\sinh^2 x \\equiv \\cosh^2 x - 1$$.\n- Step 2: The correct hyperbolic identity is $$\\cosh^2 x - \\sinh^2 x = 1$$, equivalently $$\\sinh^2 x = \\cosh^2 x - 1$$.\n- Step 3: Joshua's incorrect form would imply $$\\sinh^2 x$$ is negative (since $$\\cosh^2 x \\geq 1$$), but $$\\sinh^2 x \\geq 0$$ always — a contradiction.\n\nThis shows the danger of blindly transferring trig identities without applying Osborn's sign rule.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "What sanity checks should you do after solving a hyperbolic equation by substituting exponentials? (3 steps)", "answer": "- Step 1: Check that any root $$u = e^x$$ from the quadratic is positive — discard $$u \\leq 0$$ since $$e^x > 0$$ always.\n- Step 2: Verify by substituting back: compute $$\\sinh x$$ or $$\\cosh x$$ from $$e^x$$ and $$e^{-x} = 1/e^x$$ and check the original equation.\n- Step 3: Mind the solution structure:\n+ $$\\sinh x = c$$: exactly one real root.\n+ $$\\cosh x = c$$: two roots if $$c > 1$$, one if $$c = 1$$, none if $$c < 1$$.\n+ $$\\tanh x = c$$: one root iff $$|c| < 1$$, else none.", "source": "Opus 4.7 ①", "_id": "opus_1_63"}, {"question": "Why does sinh x ≈ ½e^x for large positive x, but ≈ -½e^{-x} for large negative x?", "answer": "For large positive x:  \n  - e^{-x} ≈ 0 ⇒ sinh x ≈ (e^x)/2  \nFor large negative x:  \n  - e^x ≈ 0 ⇒ sinh x ≈ (-e^{-x})/2  \nThis reflects sinh's odd symmetry about the origin.", "source": "Qwen 3 ②", "_id": "qwen_2_1"}, {"question": "The function $$y = \\operatorname{cosech} x$$ has both the x-axis and y-axis as asymptotes. Explain why both axes are asymptotes, unlike most functions which only have one type. (2 steps)", "answer": "- Step 1: As $$x \\to \\pm\\infty$$: $$\\sinh x \\to \\pm\\infty$$, so $$\\operatorname{cosech} x = \\frac{1}{\\sinh x} \\to 0$$. The x-axis ($$y = 0$$) is a horizontal asymptote.\n\n- Step 2: As $$x \\to 0^+$$: $$\\sinh x \\to 0^+$$, so $$\\operatorname{cosech} x \\to +\\infty$$. As $$x \\to 0^-$$: $$\\sinh x \\to 0^-$$, so $$\\operatorname{cosech} x \\to -\\infty$$. The y-axis ($$x = 0$$) is a vertical asymptote.\n\n+ This happens because $$\\sinh x$$ itself has a zero at $$x = 0$$ with slope 1. Its reciprocal $$\\operatorname{cosech} x$$ therefore has a vertical asymptote at that zero.\n\n+ Compare: $$\\tanh x$$ has zeros at $$x = 0$$ (with slope 1), but its reciprocal $$\\operatorname{coth} x$$ has a vertical asymptote at $$x = 0$$ — same reasoning.", "source": "MiniMax ②", "_id": "minimax_2_22"}, {"question": "Apply Osborn's rule to the trig identity $$\\sin(A-B) \\equiv \\sin A \\cos B - \\cos A \\sin B$$. What's the hyperbolic version? (2 steps)", "answer": "- Step 1: Each term has only one sine factor — no product of two sines anywhere. So no sign flip needed.\n- Step 2: Direct replacement: $$\\sinh(A-B) \\equiv \\sinh A \\cosh B - \\cosh A \\sinh B$$. Same form as the trig version.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "Using Osborn's rule, write down the hyperbolic identity corresponding to $\\cos(A - B) \\equiv \\cos A \\cos B + \\sin A \\sin B$. (2 steps)", "answer": "- Step 1: Osborn's rule: replace $\\cos \\to \\cosh$ and $\\sin \\to \\sinh$.\n\n- Step 2: The corresponding hyperbolic identity is:\n$$\\cosh(A - B) \\equiv \\cosh A \\cosh B - \\sinh A \\sinh B$$\n\nNote: The sign changes because $\\sin A \\sin B$ (product of two sines) becomes $-\\sinh A \\sinh B$ according to Osborn's rule.", "source": "MiniMax ①", "_id": "minimax_1_10"}, {"question": "Why is $$\\tanh x$$ bounded between $$-1$$ and $$1$$, while $$\\tan x$$ is unbounded? (3 steps)", "answer": "- Step 1: $$\\tanh x = \\frac{e^{2x} - 1}{e^{2x} + 1}$$. As $$x \\to \\infty$$, $$e^{2x}$$ dominates the constants, so $$\\tanh x \\to 1$$. As $$x \\to -\\infty$$, $$e^{2x} \\to 0$$ so $$\\tanh x \\to -1$$.\n- Step 2: For finite $$x$$: numerator magnitude is strictly less than denominator (denominator has $$+1$$ vs numerator's $$-1$$), so $$|\\tanh x| < 1$$ always.\n- Step 3: Underlying reason: $$\\tanh = \\sinh/\\cosh$$, and $$\\cosh \\geq 1$$ never zeros — so $$\\tanh$$ never explodes. Compare $$\\tan = \\sin/\\cos$$ where $$\\cos$$ regularly hits zero, causing vertical asymptotes. The boundedness of $$\\tanh$$ is a direct consequence of $$\\cosh$$ never vanishing.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "Derive $$\\sinh(A-B) = \\sinh A \\cosh B - \\cosh A \\sinh B$$ from the formula for $$\\sinh(A+B)$$. (2 steps)", "answer": "- Step 1: Replace $$B$$ with $$-B$$ in $$\\sinh(A+B) = \\sinh A \\cosh B + \\cosh A \\sinh B$$.\n- Step 2: Use parity: $$\\cosh(-B) = \\cosh B$$ (even), $$\\sinh(-B) = -\\sinh B$$ (odd). So we get $$\\sinh(A-B) = \\sinh A \\cosh B + \\cosh A (-\\sinh B) = \\sinh A \\cosh B - \\cosh A \\sinh B$$ ✓.\n\nThis is the same trick used in trig: parity of cos and sin lets you derive minus formulas from plus formulas.", "source": "Opus 4.7 ②", "_id": "opus_2_66"}, {"question": "Compare the catenary $$y = \\cosh x$$ with the parabola $$y = 1 + x^2/2$$. How are they similar near $$x = 0$$? How do they differ for large $$|x|$$? (3 steps)", "answer": "- Step 1: Taylor: $$\\cosh x = 1 + \\dfrac{x^2}{2} + \\dfrac{x^4}{24} + \\cdots$$. The first two terms exactly match $$1 + x^2/2$$.\n- Step 2: For small $$|x|$$, the higher-order terms are tiny, so the catenary looks essentially parabolic.\n- Step 3: For large $$|x|$$, $$\\cosh x \\approx \\tfrac{1}{2}e^{|x|}$$, growing much **faster** than any polynomial. A real catenary diverges from a parabola of the same low-curvature; the parabola flattens too quickly.\n\nThis is why a \"looks like a parabola\" eyeball test fails for hanging chains at scale.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Provide a correct proof that $$\\frac{1+\\tanh^2 x}{1-\\tanh^2 x} \\equiv 2\\cosh^2 x - 1$$. (4 steps)", "answer": "- Step 1: From the correct identity $$\\operatorname{sech}^2 x = 1 - \\tanh^2 x$$, we get $$\\tanh^2 x = 1 - \\operatorname{sech}^2 x$$. Also, $$1 - \\tanh^2 x = \\operatorname{sech}^2 x$$.\n- Step 2: Substitute into the LHS: $$\\frac{1 + \\tanh^2 x}{1 - \\tanh^2 x} = \\frac{1 + (1 - \\operatorname{sech}^2 x)}{\\operatorname{sech}^2 x} = \\frac{2 - \\operatorname{sech}^2 x}{\\operatorname{sech}^2 x}$$.\n- Step 3: Split the fraction properly: $$\\frac{2}{\\operatorname{sech}^2 x} - \\frac{\\operatorname{sech}^2 x}{\\operatorname{sech}^2 x} = 2\\cosh^2 x - 1$$.\n- Step 4: This matches the RHS. The key steps were: (a) using the correct Osborn-converted identity, and (b) splitting the fraction as a sum of two fractions with the *same* denominator, not splitting the denominator.", "source": "GLM 5.1 ③", "_id": "glm_3_51"}, {"question": "Apply Osborn's rule to $$\\cos 3A \\equiv 4\\cos^3 A - 3\\cos A$$. Does any sign change? (2 steps)", "answer": "- Step 1: There are no $$\\sin$$ terms — only $$\\cos$$. So no Osborn sign flip is needed anywhere.\n- Step 2: Direct replacement: $$\\cosh 3A \\equiv 4\\cosh^3 A - 3\\cosh A$$. Same form as the trig identity.\n\nThis shows that Osborn's rule has no effect on identities containing only cosines.", "source": "Opus 4.7 ②", "_id": "opus_2_90"}, {"question": "Prove $$\\sinh 2A \\equiv 2\\sinh A\\cosh A$$ from definitions. (3 steps)", "answer": "- Step 1: RHS: $$2\\sinh A\\cosh A = 2\\cdot\\dfrac{e^A - e^{-A}}{2}\\cdot\\dfrac{e^A + e^{-A}}{2} = \\dfrac{(e^A - e^{-A})(e^A + e^{-A})}{2}$$.\n- Step 2: This is a difference of squares: $$\\dfrac{e^{2A} - e^{-2A}}{2}$$.\n- Step 3: But that's exactly $$\\sinh(2A)$$ by definition. QED.\n\nThe proof is structurally identical to the trig version, reflecting the deep parallel between the two families.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "State the range of each hyperbolic function: sinh, cosh, tanh, sech, cosech, coth. Why do these ranges directly determine the domains of the inverses? (3 steps)", "answer": "- Step 1: Ranges:\n+ $$\\sinh: \\mathbb{R}$$\n+ $$\\cosh: [1, \\infty)$$\n+ $$\\tanh: (-1, 1)$$\n+ $$\\operatorname{sech}: (0, 1]$$\n+ $$\\operatorname{cosech}: \\mathbb{R}\\setminus\\{0\\}$$\n+ $$\\coth: \\{|y| > 1\\}$$\n- Step 2: Reasoning by structure: bounded ones (tanh, sech) come from quotients where the denominator dominates; unbounded ones (sinh, cosech, coth) inherit unboundedness from sinh.\n- Step 3: For any inverse, **domain of $$f^{-1}$$ = range of $$f$$**. So $$\\operatorname{artanh}$$ has domain $$|x| < 1$$, $$\\operatorname{arcosh}$$ has domain $$x \\geq 1$$, etc. — these aren't arbitrary; they're forced by what values the original function actually outputs.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Why are hyperbolic functions less commonly encountered than trigonometric ones in elementary geometry, despite their similar structure? (3 steps)", "answer": "- Step 1: Trigonometric functions arise naturally from circles, triangles, and rotations — basic geometric objects with intuitive physical interpretations (angles, periodic motion).\n- Step 2: Hyperbolic functions arise from hyperbolas and exponential growth/decay — more advanced contexts. Their natural habitat is calculus, differential equations, and special relativity (Lorentz boosts use hyperbolic angles).\n- Step 3: Once you encounter exponentials, hyperbolic functions become essential — solutions to many second-order linear ODEs involve them, and they appear in physical systems with exponential rather than oscillatory behavior (e.g. catenary, soliton waves, RC circuits).", "source": "Opus 4.7 ②", "_id": "opus_2_99"}, {"question": "Where do the graphs of $$y = \\cosh 2x$$ and $$y = 2\\cosh x$$ intersect? (4 steps)", "answer": "- Step 1: At $$x = 0$$: $$\\cosh 0 = 1$$ and $$2\\cosh 0 = 2$$, so $$2\\cosh x$$ starts above. For large $$|x|$$, $$\\cosh 2x \\approx \\tfrac{1}{2}e^{2|x|}$$ dominates over $$2\\cosh x \\approx e^{|x|}$$.\n- Step 2: Set $$\\cosh 2x = 2\\cosh x$$, use $$\\cosh 2x = 2\\cosh^2 x - 1$$: $$2\\cosh^2 x - 1 = 2\\cosh x$$.\n- Step 3: $$2\\cosh^2 x - 2\\cosh x - 1 = 0$$. By quadratic formula: $$\\cosh x = \\dfrac{2 \\pm\\sqrt{4 + 8}}{4} = \\dfrac{1 \\pm\\sqrt{3}}{2}$$.\n- Step 4: Only $$\\dfrac{1 + \\sqrt{3}}{2} > 1$$ is valid (need cosh $$\\geq 1$$). So intersection at $$x = \\pm\\operatorname{arcosh}\\left(\\dfrac{1+\\sqrt{3}}{2}\\right)$$ — two symmetric points.", "source": "Opus 4.7 ①", "_id": "opus_1_69"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "Trigonometric functions are defined geometrically (via the unit circle), but hyperbolic functions are defined algebraically using exponentials. Why does swapping \"circle\" for \"hyperbola\" lead to exponentials rather than angles? (3 steps)", "answer": "- Step 1: On the unit circle $$x^2 + y^2 = 1$$, a point at angle $$\\theta$$ has coordinates $$($$cos $$\\theta$$, sin $$\\theta)$$, and the arc length from (1,0) equals $$\\theta$$. The parameter is an angle because circular arc length is proportional to angle.\n- Step 2: On the unit hyperbola $$x^2 - y^2 = 1$$ (right branch, $$x \\geq 1$$), a natural parameter is not an angle but the *area* of the hyperbolic sector bounded by the curve, the origin, and the point. This area turns out to be exactly half the natural parameter $$t$$ used in the exponential definitions.\n- Step 3: The coordinates of the point corresponding to sector area $$t/2$$ are $$($$cosh $$t$$, sinh $$t)$$, where cosh and sinh are defined as $$\\frac{e^t + e^{-t}}{2}$$ and $$\\frac{e^t - e^{-t}}{2}$$ respectively. The exponential form arises because the hyperbola's geometry naturally produces the parameterization $$x + y = e^t$$ and $$x - y = e^{-t}$$, which solve to give the hyperbolic function definitions.\n\nThe \"hyperbolic\" name comes from this geometric relationship to the hyperbola, mirroring how \"trigonometric\" relates to the circle.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "What is the definition of $$\\sinh x$$ in terms of exponentials, and why is the factor of $$\\frac{1}{2}$$ necessary? (2 steps)", "answer": "- Step 1: $$\\sinh x \\equiv \\frac{e^x - e^{-x}}{2}$$ for all $$x \\in \\mathbb{R}$$. The factor of $$\\frac{1}{2}$$ ensures that $$\\sinh x$$ satisfies the hyperbolic identity $$\\cosh^2 x - \\sinh^2 x = 1$$ (analogous to $$\\cos^2 x + \\sin^2 x = 1$$), and gives the clean geometric interpretation on the hyperbola.\n- Step 2: Without the $$\\frac{1}{2}$$, the expression $$e^x - e^{-x}$$ would be twice sinh. The halving makes the definition symmetric with cosh and produces the correct normalization so that, for example, $$\\sinh 0 = 0$$ and the derivative at zero is exactly 1 (not 2).\n\nThe $$\\frac{1}{2}$$ is the same normalization principle that gives us $$\\sin x$$ rather than $$2\\sin x$$ in trigonometry.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "What is the definition of $$\\cosh x$$ in terms of exponentials, and what is its minimum value? Explain why. (2 steps)", "answer": "- Step 1: $$\\cosh x \\equiv \\frac{e^x + e^{-x}}{2}$$ for all $$x \\in \\mathbb{R}$$. This is the *average* (arithmetic mean) of $$e^x$$ and $$e^{-x}$$.\n- Step 2: Since $$e^x$$ and $$e^{-x}$$ are both positive for all real $$x$$, and their product is $$e^x \\cdot e^{-x} = 1$$, the AM–GM inequality gives $$\\frac{e^x + e^{-x}}{2} \\geq \\sqrt{e^x \\cdot e^{-x}} = 1$$, with equality when $$e^x = e^{-x}$$, i.e., $$x = 0$$. So the minimum value of $$\\cosh x$$ is 1, attained at $$x = 0$$.\n\nThis is why the range of cosh is $$[1, \\infty)$$ and why the graph has its lowest point at (0, 1).", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "$$\\tanh x$$ can be written as $$\\frac{\\sinh x}{\\cosh x}$$, but also as two other exponential forms. What are they, and how do you derive the form $$\\frac{e^{2x}-1}{e^{2x}+1}$$? (3 steps)", "answer": "- Step 1: Starting from the ratio definition: $$\\tanh x = \\frac{\\sinh x}{\\cosh x} = \\frac{e^x - e^{-x}}{e^x + e^{-x}}$$ (the factors of 2 cancel).\n- Step 2: To get the alternative form, multiply numerator and denominator by $$e^x$$: $$\\frac{e^x(e^x - e^{-x})}{e^x(e^x + e^{-x})} = \\frac{e^{2x} - 1}{e^{2x} + 1}$$.\n- Step 3: This form is useful because it immediately shows the limiting behavior: as $$x \\to +\\infty$$, $$e^{2x}$$ dominates, so $$\\tanh x \\to \\frac{e^{2x}}{e^{2x}} = 1$$; as $$x \\to -\\infty$$, $$e^{2x} \\to 0$$, so $$\\tanh x \\to \\frac{-1}{1} = -1$$.\n\nThe third equivalent form is $$\\frac{1 - e^{-2x}}{1 + e^{-2x}}$$ (obtained by multiplying by $$e^{-x}$$ instead), useful for analyzing behavior as $$x \\to -\\infty$$.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "State the exponential definitions of the three reciprocal hyperbolic functions (cosech, sech, coth), and explain why coth has a different structure from cosech and sech. (2 steps)", "answer": "- Step 1: The definitions are:\n+ $$\\operatorname{cosech} x = \\frac{1}{\\sinh x} = \\frac{2}{e^x - e^{-x}}$$\n+ $$\\operatorname{sech} x = \\frac{1}{\\cosh x} = \\frac{2}{e^x + e^{-x}}$$\n+ $$\\operatorname{coth} x = \\frac{1}{\\tanh x} = \\frac{e^{2x} + 1}{e^{2x} - 1}$$\n- Step 2: Cosech and sech simply invert sinh and cosh, keeping the $$\\frac{2}{\\cdots}$$ structure. But coth inverts tanh, which already had the simplified form $$\\frac{e^{2x}-1}{e^{2x}+1}$$; flipping this fraction gives $$\\frac{e^{2x}+1}{e^{2x}-1}$$, which involves $$e^{2x}$$ rather than separate $$e^x$$ and $$e^{-x}$$ terms. This also reveals why coth is undefined at $$x = 0$$: the denominator $$e^0 - 1 = 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Without doing a full calculation, what is the general formula for $$\\sinh(\\ln k)$$ where $$k > 0$$, and why does it always simplify to a rational expression in $$k$$? (2 steps)", "answer": "- Step 1: Substitute into the definition: $$\\sinh(\\ln k) = \\frac{e^{\\ln k} - e^{-\\ln k}}{2} = \\frac{k - \\frac{1}{k}}{2} = \\frac{k^2 - 1}{2k}$$.\n- Step 2: The result is always rational in $$k$$ because $$e^{\\ln k} = k$$ and $$e^{-\\ln k} = \\frac{1}{k}$$ are both rational functions of $$k$$, and taking their difference and halving preserves this. For example, $$\\sinh(\\ln 2) = \\frac{4-1}{4} = \\frac{3}{4}$$ and $$\\sinh(\\ln 3) = \\frac{9-1}{6} = \\frac{8}{6} = \\frac{4}{3}$$.\n\nThis pattern — hyperbolic functions at logarithmic arguments yielding algebraic results — is the reverse of inverse hyperbolic functions yielding logarithms.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "What is the general formula for $$\\cosh(\\ln k)$$ where $$k > 0$$, and why is it always greater than or equal to 1? (2 steps)", "answer": "- Step 1: $$\\cosh(\\ln k) = \\frac{e^{\\ln k} + e^{-\\ln k}}{2} = \\frac{k + \\frac{1}{k}}{2} = \\frac{k^2 + 1}{2k}$$.\n- Step 2: This equals $$\\frac{k^2 + 1}{2k}$$, which by AM–GM is always $$\\geq \\sqrt{k \\cdot \\frac{1}{k}} = 1$$, with equality only when $$k = 1$$ (i.e., $$\\cosh(\\ln 1) = \\cosh(0) = 1$$). For instance, $$\\cosh(\\ln 3) = \\frac{9+1}{6} = \\frac{10}{6} = \\frac{5}{3}$$.\n\nThis confirms that cosh's range is $$[1, \\infty)$$, even when restricted to these special inputs.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "Derive the general formula for $$\\tanh(\\ln k)$$ where $$k > 0$$, and explain why it always lies strictly between -1 and 1. (3 steps)", "answer": "- Step 1: Using the form $$\\tanh x = \\frac{e^{2x}-1}{e^{2x}+1}$$, substitute $$x = \\ln k$$: $$\\tanh(\\ln k) = \\frac{e^{2\\ln k}-1}{e^{2\\ln k}+1} = \\frac{k^2-1}{k^2+1}$$.\n- Step 2: Since $$k^2 > 0$$, we have $$k^2 + 1 > k^2 - 1$$ when $$k > 1$$ (giving a positive fraction less than 1), and when $$0 < k < 1$$, $$k^2 - 1 < 0$$ while $$k^2 + 1 > 0$$ (giving a negative fraction greater than -1). At $$k = 1$$, the result is 0.\n- Step 3: The key insight: $$\\frac{k^2-1}{k^2+1} = 1 - \\frac{2}{k^2+1}$$, which is always less than 1 (since $$\\frac{2}{k^2+1} > 0$$) and greater than -1 (since $$\\frac{2}{k^2+1} < 2$$). This algebraically confirms tanh's range is $$(-1, 1)$$.\n\nFor example, $$\\tanh(\\ln 4) = \\frac{16-1}{16+1} = \\frac{15}{17}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Prove that $$\\sinh x$$ is an odd function, i.e., $$\\sinh(-a) = -\\sinh(a)$$ for all $$a$$. What does this tell you about the graph's symmetry? (2 steps)", "answer": "- Step 1: $$\\sinh(-a) = \\frac{e^{-a} - e^{a}}{2} = -\\frac{e^{a} - e^{-a}}{2} = -\\sinh(a)$$. The sign flips because swapping $$a$$ to $$-a$$ swaps the roles of $$e^a$$ and $$e^{-a}$$ in the subtraction.\n- Step 2: An odd function has rotational symmetry of order 2 about the origin — the graph of $$y = \\sinh x$$ looks the same after a 180° rotation around (0,0). This means $$\\sinh 0 = 0$$ (every odd function passes through the origin), and the graph has no reflection symmetry in the y-axis.\n\nThis contrasts with cosh, which is even: the subtraction in sinh causes the sign change, while the addition in cosh does not.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Prove that $$\\cosh x$$ is an even function, i.e., $$\\cosh(-a) = \\cosh(a)$$ for all $$a$$. Why does this mean cosh cannot have a one-to-one inverse over all of $$\\mathbb{R}$$? (2 steps)", "answer": "- Step 1: $$\\cosh(-a) = \\frac{e^{-a} + e^{a}}{2} = \\frac{e^{a} + e^{-a}}{2} = \\cosh(a)$$. Addition is commutative, so swapping $$a$$ with $$-a$$ doesn't change the sum.\n- Step 2: Because cosh is even, for any $$y > 1$$ there exist *two* values of $$x$$ (one positive, one negative) with $$\\cosh x = y$$: namely $$x$$ and $$-x$$. A function must be one-to-one to have an inverse, so we must restrict the domain of cosh to $$x \\geq 0$$ before defining $$\\operatorname{arcosh}$$.\n\nThis is the same reason we restrict $$\\cos x$$ to $$[0, \\pi]$$ before defining $$\\arccos x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Describe the asymptotic behavior of $$y = \\sinh x$$ as $$x \\to +\\infty$$ and $$x \\to -\\infty$$. Why does sinh approximate a pure exponential in each direction? (2 steps)", "answer": "- Step 1: As $$x \\to +\\infty$$, $$e^{-x} \\to 0$$, so $$\\sinh x = \\frac{e^x - e^{-x}}{2} \\approx \\frac{e^x}{2}$$, and the graph hugs the curve $$y = \\frac{1}{2}e^x$$. As $$x \\to -\\infty$$, $$e^x \\to 0$$, so $$\\sinh x \\approx \\frac{-e^{-x}}{2}$$, hugging $$y = -\\frac{1}{2}e^{-x}$$.\n- Step 2: In each direction, one exponential dominates and the other becomes negligible. The dominant term provides the asymptotic shape, while the $$\\frac{1}{2}$$ factor means sinh grows at half the rate of $$e^x$$ for large positive $$x$$. There are no horizontal asymptotes — sinh grows without bound in both directions.\n\nThe graph passes through the origin with slope 1 (since $$\\frac{d}{dx}\\sinh x = \\cosh x$$ and $$\\cosh 0 = 1$$), transitioning smoothly between the two exponential regimes.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "The graph of $$y = \\cosh x$$ is often called a \"catenary.\" Where is its minimum point, and what are its asymptotes (if any)? Explain the shape. (2 steps)", "answer": "- Step 1: The minimum is at $$x = 0$$, $$y = \\cosh 0 = 1$$. This is because $$\\cosh x = \\frac{e^x + e^{-x}}{2} \\geq 1$$ by AM–GM, with equality at $$x = 0$$. There are no horizontal asymptotes — cosh grows without bound.\n- Step 2: As $$x \\to +\\infty$$, $$\\cosh x \\approx \\frac{1}{2}e^x$$; as $$x \\to -\\infty$$, $$\\cosh x \\approx \\frac{1}{2}e^{-x}$$ (by symmetry, since cosh is even). The graph is symmetric about the y-axis, opening upward like a U-shape with exponential growth on both sides. The \"catenary\" is the shape of a hanging chain — the inverted catenary is used in architecture for stable arches.\n\nThe curve resembles a parabola near the minimum but diverges from parabolic behavior for large $$|x|$$, growing much faster.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "What are the horizontal asymptotes and the range of $$y = \\tanh x$$? Explain why tanh is bounded between -1 and 1, unlike sinh and cosh which grow without bound. (3 steps)", "answer": "- Step 1: The asymptotes are $$y = 1$$ (as $$x \\to +\\infty$$) and $$y = -1$$ (as $$x \\to -\\infty$$). The range is $$(-1, 1)$$ — tanh never actually reaches ±1.\n- Step 2: From the form $$\\tanh x = \\frac{e^{2x}-1}{e^{2x}+1}$$: as $$x \\to +\\infty$$, $$e^{2x}$$ dominates, giving $$\\tanh x \\to \\frac{e^{2x}}{e^{2x}} = 1$$ from below. As $$x \\to -\\infty$$, $$e^{2x} \\to 0$$, giving $$\\tanh x \\to \\frac{-1}{1} = -1$$ from above.\n- Step 3: Tanh is bounded because it is a *ratio* of sinh to cosh. Both sinh and cosh grow like $$\\frac{1}{2}e^x$$ for large $$x$$, so their ratio approaches 1. The numerator and denominator grow at the same rate, preventing unbounded growth — unlike sinh or cosh alone, which are sums/differences of exponentials.\n\nThis boundedness is analogous to how $$\\tan x$$ has vertical asymptotes (blowing up) while $$\\tanh x$$ has horizontal asymptotes (saturating).", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Describe the key features of the graph of $$y = \\operatorname{sech} x$$: its maximum, its asymptote, and its symmetry. Why does it have this shape? (2 steps)", "answer": "- Step 1: $$\\operatorname{sech} x = \\frac{1}{\\cosh x}$$, so it inherits cosh's even symmetry. The maximum is at $$x = 0$$ where $$\\operatorname{sech} 0 = \\frac{1}{1} = 1$$ (since cosh has its minimum of 1 there, sech has its maximum). The range is $$0 < \\operatorname{sech} x \\leq 1$$.\n- Step 2: As $$|x| \\to \\infty$$, $$\\cosh x \\to \\infty$$, so $$\\operatorname{sech} x \\to 0$$. The x-axis ($$y = 0$$) is a horizontal asymptote on both sides. The graph looks like an upside-down U (a \"bell\" shape), symmetric about the y-axis, always positive, decaying exponentially toward zero.\n\nSech is the reciprocal of cosh: wherever cosh is large, sech is small; wherever cosh is at its minimum, sech is at its maximum.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "The graph of $$y = \\operatorname{cosech} x$$ has both a vertical and a horizontal asymptote. Where are they, and why does the graph have a discontinuity at $$x = 0$$? (2 steps)", "answer": "- Step 1: $$\\operatorname{cosech} x = \\frac{1}{\\sinh x}$$, and $$\\sinh 0 = 0$$, so cosech is undefined at $$x = 0$$ — the y-axis is a vertical asymptote. As $$x \\to 0^+$$, $$\\sinh x \\to 0^+$$, so $$\\operatorname{cosech} x \\to +\\infty$$; as $$x \\to 0^-$$, $$\\sinh x \\to 0^-$$, so $$\\operatorname{cosech} x \\to -\\infty$$.\n- Step 2: As $$|x| \\to \\infty$$, $$|\\sinh x| \\to \\infty$$, so $$\\operatorname{cosech} x \\to 0$$ — the x-axis is a horizontal asymptote on both sides. Since sinh is odd, cosech is also odd (reciprocal of an odd function is odd), so the graph has rotational symmetry about the origin, with the positive branch in quadrant I and the negative branch in quadrant III.\n\nThe discontinuity at $$x = 0$$ is the same type as $$y = \\frac{1}{x}$$: an infinite discontinuity where the function jumps from $$-\\infty$$ to $$+\\infty$$.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "The graph of $$y = \\operatorname{coth} x$$ has three asymptotes. Identify them all and explain why coth approaches ±1 as $$|x| \\to \\infty$$ but blows up near $$x = 0$$. (3 steps)", "answer": "- Step 1: The vertical asymptote is $$x = 0$$ (the y-axis), because $$\\tanh 0 = 0$$, making $$\\operatorname{coth} 0 = \\frac{1}{0}$$ undefined. As $$x \\to 0^+$$, $$\\tanh x \\to 0^+$$, so $$\\operatorname{coth} x \\to +\\infty$$; as $$x \\to 0^-$$, $$\\tanh x \\to 0^-$$, so $$\\operatorname{coth} x \\to -\\infty$$.\n- Step 2: The horizontal asymptotes are $$y = 1$$ (as $$x \\to +\\infty$$) and $$y = -1$$ (as $$x \\to -\\infty$$), because $$\\tanh x \\to \\pm 1$$, so $$\\operatorname{coth} x \\to \\frac{1}{\\pm 1} = \\pm 1$$.\n- Step 3: Coth is odd (reciprocal of the odd function tanh). Its range is $$(-\\infty, -1) \\cup (1, \\infty)$$ — it never takes values between -1 and 1. This is because $$|\\tanh x| < 1$$ for all real $$x$$, so $$|\\operatorname{coth} x| = \\frac{1}{|\\tanh x|} > 1$$.\n\nCoth's graph lies entirely outside the strip $$-1 \\leq y \\leq 1$$, with two separate branches — one above $$y = 1$$ for $$x > 0$$ and one below $$y = -1$$ for $$x < 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "To define an inverse for $$\\cosh x$$, the domain must be restricted to $$x \\geq 0$$. Explain why this restriction is necessary and what would go wrong without it. (2 steps)", "answer": "- Step 1: $$\\cosh x$$ is even, so $$\\cosh(-a) = \\cosh(a)$$ for all $$a > 0$$. This means every output value $$y > 1$$ corresponds to *two* inputs (one positive, one negative), violating the one-to-one requirement for an inverse function.\n- Step 2: Restricting to $$x \\geq 0$$ selects only the right half of the catenary, which *is* one-to-one: each $$y \\geq 1$$ now corresponds to exactly one $$x \\geq 0$$. The inverse function $$\\operatorname{arcosh}$$ then has domain $$x \\geq 1$$ (the range of the restricted cosh) and range $$x \\geq 0$$ (the restricted domain of cosh, now serving as the range of the inverse).\n\nWithout this restriction, $$\\operatorname{arcosh} 2$$ would be ambiguous — it could mean both $$x \\approx 1.317$$ and $$x \\approx -1.317$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Complete this table of domain and range for the three main inverse hyperbolic functions: arsinh, arcosh, artanh. Why does artanh have the strictest domain restriction? (3 steps)", "answer": "- Step 1:\n+ $$\\operatorname{arsinh} x$$: domain $$\\mathbb{R}$$ (all real numbers), range $$\\mathbb{R}$$ — because sinh is one-to-one on all of $$\\mathbb{R}$$ with range $$\\mathbb{R}$$.\n+ $$\\operatorname{arcosh} x$$: domain $$x \\geq 1$$, range $$x \\geq 0$$ — because the restricted cosh (domain $$x \\geq 0$$) has range $$[1, \\infty)$$.\n+ $$\\operatorname{artanh} x$$: domain $$|x| < 1$$, range $$\\mathbb{R}$$ — because tanh has range $$(-1, 1)$$.\n- Step 2: Artanh has the strictest domain restriction because tanh's range is the most constrained: it only outputs values in $$(-1, 1)$$, so its inverse can only accept inputs in that interval. Attempting $$\\operatorname{artanh} 2$$ is meaningless — no real $$x$$ satisfies $$\\tanh x = 2$$.\n- Step 3: The pattern is: domain of inverse = range of original; range of inverse = (restricted) domain of original. For arsinh, no restriction is needed (sinh is already one-to-one). For arcosh, both the original's domain and the inverse's range get restricted to $$\\geq 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Derive the logarithmic form $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2 + 1})$$ from the definition of sinh. Why is the other root of the quadratic rejected? (4 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arsinh} x$$, so $$x = \\sinh y = \\frac{e^y - e^{-y}}{2}$$. Multiply through by 2: $$2x = e^y - e^{-y}$$.\n- Step 2: Multiply by $$e^y$$ to clear the negative exponent: $$2xe^y = e^{2y} - 1$$, giving the quadratic $$e^{2y} - 2xe^y - 1 = 0$$ in the variable $$e^y$$.\n- Step 3: Complete the square (or use the quadratic formula): $$e^y = x \\pm \\sqrt{x^2 + 1}$$. Now $$\\sqrt{x^2+1} > |x|$$ for all real $$x$$, so $$x - \\sqrt{x^2+1} < 0$$ always. Since $$e^y > 0$$ for all real $$y$$, the negative root is impossible and must be rejected.\n- Step 4: Therefore $$e^y = x + \\sqrt{x^2+1}$$, giving $$y = \\ln(x + \\sqrt{x^2+1})$$, i.e., $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2+1})$$.\n\nThe rejection of the negative root is not a choice — it's forced by the physical impossibility of $$e^y$$ being negative for real $$y$$.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "In deriving $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2-1})$$, the quadratic gives two positive roots: $$e^y = x + \\sqrt{x^2-1}$$ and $$e^y = x - \\sqrt{x^2-1}$$, both valid for $$x \\geq 1$$. Why do we still choose only the \"+\" root? (3 steps)", "answer": "- Step 1: Starting from $$x = \\cosh y = \\frac{e^y + e^{-y}}{2}$$, multiplying by $$e^y$$ gives $$e^{2y} - 2xe^y + 1 = 0$$, yielding $$e^y = x \\pm \\sqrt{x^2-1}$$.\n- Step 2: Both roots are positive for $$x > 1$$: $$x + \\sqrt{x^2-1} > 0$$ obviously, and $$x - \\sqrt{x^2-1} = \\frac{1}{x+\\sqrt{x^2-1}} > 0$$ as well (since the product of the roots is 1). So both *could* give valid real $$y$$ values.\n- Step 3: However, $$\\operatorname{arcosh}$$ is defined with range $$y \\geq 0$$ (because we restricted cosh to $$x \\geq 0$$). The root $$e^y = x - \\sqrt{x^2-1}$$ gives $$y = \\ln(x - \\sqrt{x^2-1})$$, which is *negative* for all $$x > 1$$ (since $$x - \\sqrt{x^2-1} < 1$$). This falls outside the range of arcosh, so we take only $$e^y = x + \\sqrt{x^2-1}$$, giving the positive $$y$$.\n\nThe two roots correspond to the two solutions of $$\\cosh y = x$$ (one positive, one negative), but arcosh picks the non-negative one by definition.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Derive the logarithmic form $$\\operatorname{artanh} x = \\frac{1}{2}\\ln\\left(\\frac{1+x}{1-x}\\right)$$ for $$|x| < 1$$. Why does this formula break down at $$|x| = 1$$? (4 steps)", "answer": "- Step 1: Let $$y = \\operatorname{artanh} x$$, so $$x = \\tanh y = \\frac{e^y - e^{-y}}{e^y + e^{-y}}$$.\n- Step 2: Cross-multiply: $$x(e^y + e^{-y}) = e^y - e^{-y}$$, giving $$xe^y + xe^{-y} = e^y - e^{-y}$$. Collect terms: $$e^y(1-x) = e^{-y}(1+x)$$, so $$e^{2y} = \\frac{1+x}{1-x}$$.\n- Step 3: Take natural logs: $$2y = \\ln\\left(\\frac{1+x}{1-x}\\right)$$, so $$y = \\frac{1}{2}\\ln\\left(\\frac{1+x}{1-x}\\right)$$.\n- Step 4: At $$|x| = 1$$, the denominator $$1-x$$ or $$1+x$$ becomes zero, making the fraction undefined (or infinite). This reflects the fact that $$\\tanh y$$ never equals exactly ±1 for any finite real $$y$$, so $$\\operatorname{artanh}(\\pm 1)$$ doesn't exist in the reals.\n\nThe formula is valid precisely for $$|x| < 1$$, matching the domain of artanh.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Prove the identity $$\\cosh^2 A - \\sinh^2 A = 1$$ using exponential definitions. Why is this analogous to $$\\cos^2 A + \\sin^2 A = 1$$, and why does the sign differ? (3 steps)", "answer": "- Step 1: Substitute the definitions:\n$$\\cosh^2 A - \\sinh^2 A = \\left(\\frac{e^A+e^{-A}}{2}\\right)^2 - \\left(\\frac{e^A-e^{-A}}{2}\\right)^2 = \\frac{e^{2A}+2+e^{-2A}}{4} - \\frac{e^{2A}-2+e^{-2A}}{4}$$\n- Step 2: The cross terms differ: in $$\\cosh^2$$, the middle term is $$+2$$ (from $$2 \\cdot e^A \\cdot e^{-A} = 2$$); in $$\\sinh^2$$, the middle term is $$-2$$ (from $$-2 \\cdot e^A \\cdot e^{-A} = -2$$). Subtracting: $$\\frac{4}{4} = 1$$.\n- Step 3: The sign difference from the trig identity ($$+$$ becomes $$-$$) arises because $$\\sinh$$ involves a *difference* of exponentials (introducing a minus sign when squared), whereas $$\\sin$$ involves a *difference* of complex exponentials whose cross terms cancel differently. The key: $$\\cosh^2 - \\sinh^2 = 1$$ corresponds to the hyperbola $$x^2 - y^2 = 1$$, while $$\\cos^2 + \\sin^2 = 1$$ corresponds to the circle $$x^2 + y^2 = 1$$.\n\nThe identity confirms that the point (cosh A, sinh A) always lies on the unit hyperbola.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "State Osborn's rule for converting trigonometric identities to hyperbolic identities. What is the crucial exception that catches many students out? (2 steps)", "answer": "- Step 1: Osborn's rule: replace $$\\cos$$ with $$\\cosh$$ and $$\\sin$$ with $$\\sinh$$ in any trig identity to get the corresponding hyperbolic identity. For example, $$\\cos 2A = 2\\cos^2 A - 1$$ becomes $$\\cosh 2A = 2\\cosh^2 A - 1$$.\n- Step 2: The crucial exception: wherever there is a *product* (explicit or implied) of *two* sine terms, replace it with the *negative* of the product of two sinh terms. For example:\n+ $$\\sin A \\sin B$$ becomes $$-\\sinh A \\sinh B$$ (explicit product)\n+ $$\\tan^2 A = \\frac{\\sin^2 A}{\\cos^2 A}$$ contains the implied product $$\\sin^2 A$$, so $$\\tan^2 A$$ becomes $$-\\tanh^2 A$$\n+ This is why $$\\sec^2 A = 1 + \\tan^2 A$$ becomes $$\\operatorname{sech}^2 A = 1 - \\tanh^2 A$$ (the $$+$$ flips to $$-$$)\n\nThe rule exists because squaring sinh introduces a minus sign (since sinh is a difference of exponentials), so every product of two sinh terms picks up a factor of $$-1$$ relative to the corresponding sin product.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Using Osborn's rule, convert the trig identity $$\\cos 2A \\equiv \\cos^2 A - \\sin^2 A$$ to its hyperbolic counterpart. Then verify it independently using $$\\cosh^2 A - \\sinh^2 A = 1$$. (3 steps)", "answer": "- Step 1: By Osborn's rule: $$\\cos \\to \\cosh$$, $$\\sin \\to \\sinh$$, but $$\\sin^2 A$$ is an implied product of two sin terms, so it becomes $$-\\sinh^2 A$$. Result: $$\\cosh 2A = \\cosh^2 A - (-\\sinh^2 A) = \\cosh^2 A + \\sinh^2 A$$.\n- Step 2: Verify: we know $$\\cosh^2 A - \\sinh^2 A = 1$$, so $$\\cosh^2 A = 1 + \\sinh^2 A$$. Also, from the double-angle formula $$\\cosh 2A = 2\\cosh^2 A - 1 = 2(1+\\sinh^2 A) - 1 = 1 + 2\\sinh^2 A$$, and alternatively $$\\cosh 2A = \\cosh^2 A + \\sinh^2 A = (1+\\sinh^2 A) + \\sinh^2 A = 1 + 2\\sinh^2 A$$. Consistent!\n- Step 3: Note the contrast with trig: $$\\cos 2A = \\cos^2 A - \\sin^2 A$$ has a *minus*, but $$\\cosh 2A = \\cosh^2 A + \\sinh^2 A$$ has a *plus*. The sign flip on $$\\sin^2 \\to -\\sinh^2$$ effectively turns the subtraction into an addition.\n\nThis is the most common application of Osborn's rule and illustrates why blindly replacing sin→sinh without the product rule gives wrong results.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Derive the identity $$\\operatorname{sech}^2 A = 1 - \\tanh^2 A$$ from the fundamental identity $$\\cosh^2 A - \\sinh^2 A = 1$$. Why is the sign *minus* rather than *plus* (unlike $$\\sec^2 A = 1 + \\tan^2 A$$)? (2 steps)", "answer": "- Step 1: Divide $$\\cosh^2 A - \\sinh^2 A = 1$$ by $$\\cosh^2 A$$: $$1 - \\frac{\\sinh^2 A}{\\cosh^2 A} = \\frac{1}{\\cosh^2 A}$$, which gives $$1 - \\tanh^2 A = \\operatorname{sech}^2 A$$.\n- Step 2: The sign is minus because dividing the identity $$\\cosh^2 - \\sinh^2 = 1$$ by $$\\cosh^2$$ preserves the subtraction. In trig, dividing $$\\cos^2 + \\sin^2 = 1$$ by $$\\cos^2$$ gives $$1 + \\tan^2 = \\sec^2$$, preserving the addition. The sign difference originates from the fundamental identity having $$-$$ for hyperbolic and $$+$$ for trig.\n\nThis is a direct consequence of Osborn's rule: $$\\tan^2 A$$ (implied product of two sins) becomes $$-\\tanh^2 A$$, flipping the $$+$$ to $$-$$.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Derive the identity $$\\operatorname{cosech}^2 A = \\operatorname{coth}^2 A - 1$$ from $$\\cosh^2 A - \\sinh^2 A = 1$$. Why is the 1 *subtracted* from coth² rather than *added*? (2 steps)", "answer": "- Step 1: Divide $$\\cosh^2 A - \\sinh^2 A = 1$$ by $$\\sinh^2 A$$: $$\\frac{\\cosh^2 A}{\\sinh^2 A} - 1 = \\frac{1}{\\sinh^2 A}$$, giving $$\\operatorname{coth}^2 A - 1 = \\operatorname{cosech}^2 A$$.\n- Step 2: The 1 is subtracted because the original identity has $$\\cosh^2 - \\sinh^2$$ (a difference). Dividing by $$\\sinh^2$$ gives $$\\operatorname{coth}^2 - 1$$, not $$\\operatorname{coth}^2 + 1$$. The trig analogue $$\\csc^2 A = 1 + \\cot^2 A$$ has a *plus* because it comes from $$\\cos^2 + \\sin^2 = 1$$ (a sum).\n\nAgain, Osborn's rule predicts this: $$\\cot^2 A = \\frac{\\cos^2 A}{\\sin^2 A}$$ contains an implied product $$\\sin^2 A$$ in the denominator, so the sign flips.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "Prove the addition formula $$\\sinh(A+B) = \\sinh A \\cosh B + \\cosh A \\sinh B$$ using exponential definitions. Compare the sign pattern with $$\\sin(A+B) = \\sin A \\cos B + \\cos A \\sin B$$. (3 steps)", "answer": "- Step 1: Expand the RHS using definitions:\n$$\\sinh A \\cosh B + \\cosh A \\sinh B = \\frac{(e^A-e^{-A})(e^B+e^{-B})}{4} + \\frac{(e^A+e^{-A})(e^B-e^{-B})}{4}$$\n- Step 2: Expand both products:\n+ First term: $$\\frac{e^{A+B}+e^{A-B}-e^{-A+B}-e^{-A-B}}{4}$$\n+ Second term: $$\\frac{e^{A+B}-e^{A-B}+e^{-A+B}-e^{-A-B}}{4}$$\n+ Adding: the $$e^{A-B}$$ and $$e^{-A+B}$$ terms cancel, leaving $$\\frac{2e^{A+B}-2e^{-A-B}}{4} = \\frac{e^{A+B}-e^{-(A+B)}}{2}$$\n- Step 3: This equals $$\\sinh(A+B)$$ by definition. The sign pattern is identical to the trig formula — no sign flips occur because there is no *product of two sinh terms* (each term in the sum is a product of one sinh and one cosh).\n\nOsborn's rule confirms: $$\\sin A \\cos B + \\cos A \\sin B$$ has no product of two sins, so it converts directly to $$\\sinh A \\cosh B + \\cosh A \\sinh B$$ with no sign changes.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "The addition formula for cosh is $$\\cosh(A+B) = \\cosh A \\cosh B + \\sinh A \\sinh B$$. Compare this with $$\\cos(A+B) = \\cos A \\cos B - \\sin A \\sin B$$. Why does the sign differ, and how does Osborn's rule explain it? (2 steps)", "answer": "- Step 1: In the trig formula, the second term is $$-\\sin A \\sin B$$, a product of two sin terms. Osborn's rule says: replace a product of two sin terms with the *negative* of the product of two sinh terms. So $$-\\sin A \\sin B$$ becomes $$-(-\\sinh A \\sinh B) = +\\sinh A \\sinh B$$, giving $$\\cosh(A+B) = \\cosh A \\cosh B + \\sinh A \\sinh B$$.\n- Step 2: The double negative cancels: the original trig identity already has a minus sign on the sin-product term, and Osborn's rule introduces another minus when converting that product. Two minuses make a plus. This is why $$\\cosh(A+B)$$ has a *plus* where $$\\cos(A+B)$$ has a *minus*.\n\nThis is the most subtle case of Osborn's rule — you must check whether the trig identity already has a negative sign on the sin-product, because that negative interacts with the rule's negative.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "When solving an equation like $$a\\sinh x + b\\cosh x = c$$, there are two main strategies. What are they, and when is each preferable? (3 steps)", "answer": "- Step 1: **Strategy 1 — Exponential substitution**: Replace $$\\sinh x$$ and $$\\cosh x$$ with their exponential definitions, multiply through by $$e^x$$ to get a quadratic in $$e^x$$, then solve. This always works for linear combinations of sinh and cosh.\n- Step 2: **Strategy 2 — Identity substitution**: Use identities like $$\\cosh^2 x - \\sinh^2 x = 1$$ to eliminate one function, reducing to a quadratic in the other. This works when the equation involves *squares* of hyperbolic functions (e.g., $$2\\cosh^2 x - 5\\sinh x = 5$$).\n- Step 3: Strategy 1 is preferable for *linear* equations (no squares) because it directly produces a clean quadratic in $$e^x$$. Strategy 2 is preferable for *quadratic* equations because substituting exponentials into squares produces a quartic in $$e^x$$, which is harder to solve, while identity substitution keeps it quadratic.\n\nExample: $$6\\sinh x - 2\\cosh x = 7$$ → Strategy 1 gives $$2e^{2x} - 7e^x - 4 = 0$$. Example: $$2\\cosh^2 x - 5\\sinh x = 5$$ → Strategy 2 gives $$2\\sinh^2 x - 5\\sinh x - 3 = 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "When solving $$\\cosh x = k$$ for $$k > 1$$, you always get *two* real solutions. Explain why, both geometrically and algebraically. What happens when $$k = 1$$? (3 steps)", "answer": "- Step 1: Geometrically, the horizontal line $$y = k$$ (for $$k > 1$$) intersects the catenary $$y = \\cosh x$$ at two points — one with $$x > 0$$ and one with $$x < 0$$ — because cosh is even and U-shaped with minimum at (0,1).\n- Step 2: Algebraically, using $$\\operatorname{arcosh}$$: the two solutions are $$x = \\ln(k + \\sqrt{k^2-1})$$ (positive) and $$x = \\ln(k - \\sqrt{k^2-1})$$ (negative, since $$k - \\sqrt{k^2-1} < 1$$). Note $$x = -\\ln(k + \\sqrt{k^2-1})$$ is equivalent to the second form because $$\\ln(k - \\sqrt{k^2-1}) = -\\ln(k + \\sqrt{k^2-1})$$.\n- Step 3: When $$k = 1$$: the line $$y = 1$$ just touches the catenary at its minimum point $$x = 0$$, giving a single (repeated) solution. For $$k < 1$$: no real solutions exist since cosh's range is $$[1, \\infty)$$.\n\nThis two-solution behavior is the direct algebraic consequence of cosh being even, and it's why we must specify \"the positive solution\" when using arcosh.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "Express $$a\\cosh x + b\\sinh x$$ in the form $$R\\cosh(x + \\alpha)$$ where $$R > 0$$. Derive the formulas for $$R$$ and $$\\alpha$$, and explain why $$R = \\sqrt{a^2 - b^2}$$ (not $$\\sqrt{a^2+b^2}$$ as in the trig analogue). (4 steps)", "answer": "- Step 1: Expand $$R\\cosh(x+\\alpha) = R[\\cosh x \\cosh \\alpha + \\sinh x \\sinh \\alpha]$$ using the addition formula. Comparing with $$a\\cosh x + b\\sinh x$$, we need $$R\\cosh\\alpha = a$$ and $$R\\sinh\\alpha = b$$.\n- Step 2: To find $$R$$, use the identity $$\\cosh^2\\alpha - \\sinh^2\\alpha = 1$$: $$\\frac{a^2}{R^2} - \\frac{b^2}{R^2} = 1$$, so $$R^2 = a^2 - b^2$$, giving $$R = \\sqrt{a^2 - b^2}$$ (assuming $$a^2 > b^2$$).\n- Step 3: The sign difference from the trig case ($$R = \\sqrt{a^2+b^2}$$ for $$a\\cos x + b\\sin x$$) comes from the fundamental identity: trig uses $$\\cos^2 + \\sin^2 = 1$$ (sum), hyperbolic uses $$\\cosh^2 - \\sinh^2 = 1$$ (difference).\n- Step 4: To find $$\\alpha$$: $$\\tanh\\alpha = \\frac{\\sinh\\alpha}{\\cosh\\alpha} = \\frac{b}{a}$$, so $$\\alpha = \\operatorname{artanh}\\left(\\frac{b}{a}\\right)$$ (provided $$|b/a| < 1$$, i.e., $$a^2 > b^2$$). The minimum value of $$a\\cosh x + b\\sinh x$$ is then $$R$$ (since the minimum of $$\\cosh$$ is 1).\n\nThis method requires $$a^2 > b^2$$; if $$a^2 < b^2$$, you would instead use the form", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}], "count": 31}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "Define the hyperbolic sine function, $$\\sinh x$$, in terms of exponentials. How does its structure differ fundamentally from the trigonometric sine?", "answer": "The hyperbolic sine function is defined as $$\\sinh x \\equiv \\frac{e^x - e^{-x}}{2}$$. Unlike the trigonometric sine, which is defined using circles and oscillates, $$\\sinh x$$ is built from exponential growth and decay. The definition takes the difference of $$e^x$$ and $$e^{-x}$$ and halves it, which conceptually extracts the \"odd\" part of the exponential function's behavior, resulting in a function that grows without bound rather than oscillating.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Define the hyperbolic cosine function, $$\\cosh x$$, in terms of exponentials. Why is it always greater than or equal to 1? (2 steps)", "answer": "- Step 1: The hyperbolic cosine function is defined as $$\\cosh x \\equiv \\frac{e^x + e^{-x}}{2}$$. This takes the sum of $$e^x$$ and $$e^{-x}$$ and halves it, capturing the \"even\" part of the exponential behavior.\n- Step 2: It is always $$\\geqslant 1$$ because of the AM-GM inequality. For any real $$x$$, the arithmetic mean of $$e^x$$ and $$e^{-x}$$ is $$\\frac{e^x + e^{-x}}{2}$$, and the geometric mean is $$\\sqrt{e^x \\cdot e^{-x}} = 1$$. Since the arithmetic mean is always greater than or equal to the geometric mean, $$\\cosh x \\geqslant 1$$. Equality occurs only at $$x = 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "Starting from the definitions of $$\\sinh x$$ and $$\\cosh x$$, derive the exponential form of $$\\tanh x$$. (3 steps)", "answer": "- Step 1: Begin with the ratio definition $$\\tanh x \\equiv \\frac{\\sinh x}{\\cosh x} \\equiv \\frac{\\frac{e^x - e^{-x}}{2}}{\\frac{e^x + e^{-x}}{2}}$$.\n- Step 2: The factors of $$\\frac{1}{2}$$ cancel out, giving $$\\tanh x \\equiv \\frac{e^x - e^{-x}}{e^x + e^{-x}}$$. To consolidate the negative exponents, multiply the numerator and denominator by $$e^x$$.\n- Step 3: This yields $$\\tanh x \\equiv \\frac{e^{2x} - 1}{e^{2x} + 1}$$. This form is incredibly useful for evaluating $$\\tanh x$$ at logarithmic values, as it directly creates a rational function in terms of $$e^{2x}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Conceptually, how is the graph of $$y = \\sinh x$$ formed from the graphs of $$y = e^x$$ and $$y = e^{-x}$$? Describe its symmetry. (2 steps)", "answer": "- Step 1: Since $$\\sinh x = \\frac{e^x - e^{-x}}{2} = \\frac{e^x + (-e^{-x})}{2}$$, the graph of $$y = \\sinh x$$ is the average of the graph of $$y = e^x$$ and the graph of $$y = -e^{-x}$$. As $$x \\to \\infty$$, $$e^{-x} \\to 0$$, so $$\\sinh x \\approx \\frac{1}{2}e^x$$. As $$x \\to -\\infty$$, $$e^x \\to 0$$, so $$\\sinh x \\approx -\\frac{1}{2}e^{-x}$$.\n- Step 2: Because of this construction, $$\\sinh(-a) = -\\sinh(a)$$, meaning $$\\sinh x$$ is an **odd function**. Its graph has rotational symmetry of order 2 about the origin, passing through $$(0,0)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "Conceptually, how is the graph of $$y = \\cosh x$$ formed from the graphs of $$y = e^x$$ and $$y = e^{-x}$$? Describe its symmetry. (2 steps)", "answer": "- Step 1: Since $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$, the graph of $$y = \\cosh x$$ is the average of the graph of $$y = e^x$$ and the graph of $$y = e^{-x}$$. As $$x \\to \\infty$$, $$e^{-x} \\to 0$$, so $$\\cosh x \\approx \\frac{1}{2}e^x$$. As $$x \\to -\\infty$$, $$e^x \\to 0$$, so $$\\cosh x \\approx \\frac{1}{2}e^{-x}$$.\n- Step 2: Because of this construction, $$\\cosh(-a) = \\cosh(a)$$, meaning $$\\cosh x$$ is an **even function**. Its graph is symmetric about the y-axis, forming a U-shape (catenary) with a minimum point at $$(0,1)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Describe the behavior of $$y = \\tanh x$$ as $$x \\to \\infty$$ and $$x \\to -\\infty$$, and state the equations of its asymptotes. (2 steps)", "answer": "- Step 1: As $$x \\to \\infty$$, $$\\sinh x \\approx \\frac{1}{2}e^x$$ and $$\\cosh x \\approx \\frac{1}{2}e^x$$, so their ratio $$\\tanh x \\to 1$$. As $$x \\to -\\infty$$, $$\\sinh x \\approx -\\frac{1}{2}e^{-x}$$ and $$\\cosh x \\approx \\frac{1}{2}e^{-x}$$, so $$\\tanh x \\to -1$$.\n- Step 2: Therefore, the graph of $$y = \\tanh x$$ has horizontal asymptotes at $$y = 1$$ and $$y = -1$$. The function is bounded, with a range of $$-1 < \\tanh x < 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Describe the key features of the graph of $$y = \\operatorname{sech} x$$, including its maximum point and asymptotes. (2 steps)", "answer": "- Step 1: Since $$\\operatorname{sech} x = \\frac{1}{\\cosh x}$$, it is the reciprocal of the U-shaped $$\\cosh x$$ graph. At $$x = 0$$, $$\\cosh x = 1$$, so $$\\operatorname{sech} x$$ has a maximum point at $$(0, 1)$$.\n- Step 2: As $$x \\to \\infty$$ and $$x \\to -\\infty$$, $$\\cosh x \\to \\infty$$, so $$\\operatorname{sech} x \\to 0$$. The x-axis ($$y = 0$$) is a horizontal asymptote in both directions. The graph is an even function, symmetric about the y-axis, resembling a bell curve.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "Describe the key features of the graph of $$y = \\operatorname{cosech} x$$, including its asymptotes and behavior near $$x = 0$$. (2 steps)", "answer": "- Step 1: Since $$\\operatorname{cosech} x = \\frac{1}{\\sinh x}$$, it is the reciprocal of the S-shaped $$\\sinh x$$ graph. As $$x \\to \\infty$$, $$\\operatorname{cosech} x \\to 0$$, and as $$x \\to -\\infty$$, $$\\operatorname{cosech} x \\to 0$$. The x-axis is a horizontal asymptote.\n- Step 2: Near $$x = 0$$, $$\\sinh x$$ approaches 0. For positive $$x \\to 0$$, $$\\operatorname{cosech} x \\to \\infty$$. For negative $$x \\to 0$$, $$\\operatorname{cosech} x \\to -\\infty$$. The y-axis ($$x = 0$$) is a vertical asymptote. The function is odd, with two separate branches in the 1st and 3rd quadrants.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Describe the key features of the graph of $$y = \\operatorname{coth} x$$, including its asymptotes. (2 steps)", "answer": "- Step 1: Since $$\\operatorname{coth} x = \\frac{1}{\\tanh x}$$, it is the reciprocal of the S-shaped $$\\tanh x$$ graph. As $$x \\to 0^+$$, $$\\tanh x \\to 0^+$$, so $$\\operatorname{coth} x \\to \\infty$$. As $$x \\to 0^-$$, $$\\tanh x \\to 0^-$$, so $$\\operatorname{coth} x \\to -\\infty$$. The y-axis is a vertical asymptote.\n- Step 2: As $$x \\to \\infty$$, $$\\tanh x \\to 1$$, so $$\\operatorname{coth} x \\to 1$$. As $$x \\to -\\infty$$, $$\\tanh x \\to -1$$, so $$\\operatorname{coth} x \\to -1$$. The lines $$y = 1$$ and $$y = -1$$ are horizontal asymptotes. The graph has two branches, one above $$y=1$$ and one below $$y=-1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "What domain restriction must be applied to $$\\cosh x$$ to define its inverse function $$\\operatorname{arcosh} x$$, and why is this restriction necessary? (2 steps)", "answer": "- Step 1: The function $$y = \\cosh x$$ for all real $$x$$ is a many-to-one function (it fails the horizontal line test because $$\\cosh(-a) = \\cosh(a)$$). An inverse function can only be defined for a one-to-one function.\n- Step 2: To make $$\\cosh x$$ one-to-one, we restrict its domain to $$x \\geqslant 0$$. This restricts the graph to its right-hand branch. Consequently, the inverse function $$y = \\operatorname{arcosh} x$$ has a domain of $$x \\geqslant 1$$ (matching the range of the restricted $$\\cosh x$$) and a range of $$y \\geqslant 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "State the domains for the inverse hyperbolic functions $$y = \\operatorname{arsinh} x$$ and $$y = \\operatorname{artanh} x$$, and explain why these domains exist based on the original functions. (2 steps)", "answer": "- Step 1: The domain of $$y = \\operatorname{arsinh} x$$ is $$x \\in \\mathbb{R}$$. This is because the original function $$y = \\sinh x$$ has a range of all real numbers and is already one-to-one, so its inverse can accept any real input.\n- Step 2: The domain of $$y = \\operatorname{artanh} x$$ is $$|x| < 1$$ (or $$-1 < x < 1$$). This is because the original function $$y = \\tanh x$$ is bounded, with a range of $$-1 < \\tanh x < 1$$. Therefore, the inverse function can only accept inputs that fall within this range.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "Derive the logarithmic form of $$\\operatorname{arsinh} x$$, showing that $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2 + 1})$$. (4 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arsinh} x$$, which means $$x = \\sinh y = \\frac{e^y - e^{-y}}{2}$$. Multiply by 2 to get $$2x = e^y - e^{-y}$$.\n- Step 2: Multiply through by $$e^y$$ to form a quadratic in $$e^y$$: $$e^{2y} - 1 = 2xe^y$$, which rearranges to $$e^{2y} - 2xe^y - 1 = 0$$.\n- Step 3: Complete the square for $$e^y$$: $$(e^y - x)^2 - x^2 - 1 = 0 \\implies e^y = x \\pm \\sqrt{x^2 + 1}$$.\n- Step 4: Since $$\\sqrt{x^2 + 1} > x$$ for all real $$x$$, the expression $$x - \\sqrt{x^2 + 1}$$ is always negative. Since $$e^y > 0$$, we must discard the negative root. Thus $$e^y = x + \\sqrt{x^2 + 1}$$, giving $$y = \\ln(x + \\sqrt{x^2 + 1})$$.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "In the derivation of $$\\operatorname{arcosh} x$$, we arrive at $$e^y = x \\pm \\sqrt{x^2 - 1}$$. Why do we choose $$e^y = x + \\sqrt{x^2 - 1}$$ to define $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2 - 1})$$, even though both roots are positive? (3 steps)", "answer": "- Step 1: For $$x \\geqslant 1$$, both $$x + \\sqrt{x^2 - 1}$$ and $$x - \\sqrt{x^2 - 1}$$ are indeed positive, so both could mathematically yield a valid $$e^y$$.\n- Step 2: However, recall that to define $$\\operatorname{arcosh} x$$, we restricted the domain of $$\\cosh x$$ to $$x \\geqslant 0$$. This means the range of $$\\operatorname{arcosh} x$$ must be $$y \\geqslant 0$$.\n- Step 3: For all $$x > 1$$, the value $$x - \\sqrt{x^2 - 1}$$ is less than 1, which means $$y = \\ln(x - \\sqrt{x^2 - 1})$$ would be negative. To satisfy the range $$y \\geqslant 0$$, we must take the positive branch where $$e^y \\geqslant 1$$, hence $$e^y = x + \\sqrt{x^2 - 1}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "Derive the logarithmic form of $$\\operatorname{artanh} x$$, showing that $$\\operatorname{artanh} x = \\frac{1}{2} \\ln\\left(\\frac{1+x}{1-x}\\right)$$. (3 steps)", "answer": "- Step 1: Let $$y = \\operatorname{artanh} x$$, so $$x = \\tanh y = \\frac{e^y - e^{-y}}{e^y + e^{-y}}$$. Multiply numerator and denominator by $$e^y$$ to get $$x = \\frac{e^{2y} - 1}{e^{2y} + 1}$$.\n- Step 2: Solve for $$e^{2y}$$: $$x(e^{2y} + 1) = e^{2y} - 1 \\implies xe^{2y} + x = e^{2y} - 1 \\implies e^{2y}(1 - x) = 1 + x$$.\n- Step 3: Isolate $$e^{2y}$$ to get $$e^{2y} = \\frac{1+x}{1-x}$$. Take natural logs of both sides: $$2y = \\ln\\left(\\frac{1+x}{1-x}\\right)$$, so $$y = \\frac{1}{2} \\ln\\left(\\frac{1+x}{1-x}\\right)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Prove the fundamental hyperbolic identity $$\\cosh^2 A - \\sinh^2 A \\equiv 1$$ using exponential definitions. (3 steps)", "answer": "- Step 1: Substitute the definitions: $$\\cosh^2 A - \\sinh^2 A \\equiv \\left(\\frac{e^A + e^{-A}}{2}\\right)^2 - \\left(\\frac{e^A - e^{-A}}{2}\\right)^2$$.\n- Step 2: Expand both squares. The first gives $$\\frac{e^{2A} + 2 + e^{-2A}}{4}$$ and the second gives $$\\frac{e^{2A} - 2 + e^{-2A}}{4}$$.\n- Step 3: Subtracting them, the $$e^{2A}$$ and $$e^{-2A}$$ terms cancel, leaving $$\\frac{2 - (-2)}{4} = \\frac{4}{4} = 1$$. This is the hyperbolic equivalent of $$\\cos^2 A + \\sin^2 A = 1$$, with the crucial minus sign difference arising from the $$\\sinh$$ definition.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "State Osborn's rule for converting trigonometric identities to hyperbolic identities. What is the specific condition regarding sine terms? (2 steps)", "answer": "- Step 1: Osborn's rule states that you can convert a trigonometric identity to a hyperbolic identity by replacing $$\\cos$$ with $$\\cosh$$ and $$\\sin$$ with $$\\sinh$$.\n- Step 2: The crucial condition is that any product (or implied product) of two sine terms must be replaced by the negative of the product of two $$\\sinh$$ terms. For example, $$\\sin A \\sin B$$ becomes $$-\\sinh A \\sinh B$$. An \"implied product\" occurs in terms like $$\\tan^2 A$$, which contains $$\\sin^2 A$$ in the numerator, so $$\\tan^2 A$$ becomes $$-\\tanh^2 A$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Apply Osborn's rule to the trigonometric identity $$\\cos 2A \\equiv 1 - 2\\sin^2 A$$ to find the corresponding hyperbolic identity. (2 steps)", "answer": "- Step 1: Replace $$\\cos$$ with $$\\cosh$$ and $$\\sin$$ with $$\\sinh$$. The term $$\\sin^2 A$$ is an implied product of two sine terms ($$\\sin A \\times \\sin A$$), so according to Osborn's rule, it must become $$-\\sinh^2 A$$.\n- Step 2: Substituting this in gives $$\\cosh 2A \\equiv 1 - 2(-\\sinh^2 A)$$, which simplifies to $$\\cosh 2A \\equiv 1 + 2\\sinh^2 A$$. This matches the identity derived from exponentials.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Apply Osborn's rule to the trigonometric identity $$\\tan(A - B) \\equiv \\frac{\\tan A - \\tan B}{1 + \\tan A \\tan B}$$ to find the corresponding hyperbolic identity. (2 steps)", "answer": "- Step 1: Replace $$\\tan$$ with $$\\tanh$$. The term $$\\tan A \\tan B$$ in the denominator is an implied product of two sine terms (since $$\\tan \\equiv \\sin/\\cos$$), so it must be replaced by the negative of the product of two sinh terms.\n- Step 2: Therefore, the $$+\\tan A \\tan B$$ becomes $$-\\tanh A \\tanh B$$. The hyperbolic identity is $$\\tanh(A - B) \\equiv \\frac{\\tanh A - \\tanh B}{1 - \\tanh A \\tanh B}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "Given that $$\\sinh x = \\frac{3}{4}$$, explain how to find the exact value of $$\\cosh x$$. Why is only one sign accepted? (2 steps)", "answer": "- Step 1: Use the identity $$\\cosh^2 x - \\sinh^2 x \\equiv 1$$. Rearrange to get $$\\cosh^2 x = 1 + \\sinh^2 x$$. Substituting $$\\sinh x = \\frac{3}{4}$$ gives $$\\cosh^2 x = 1 + \\frac{9}{16} = \\frac{25}{16}$$.\n- Step 2: Taking the square root gives $$\\cosh x = \\pm\\frac{5}{4}$$. However, by definition, $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$, which is always positive (since both $$e^x$$ and $$e^{-x}$$ are positive). Therefore, we must discard the negative root and conclude $$\\cosh x = \\frac{5}{4}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "When solving an equation like $$6\\sinh x - 2\\cosh x = 7$$, what is the most direct algebraic strategy, and why? (2 steps)", "answer": "- Step 1: The most direct strategy is to substitute the exponential definitions: $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$ and $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$. This converts the equation into an exponential form.\n- Step 2: After substitution and simplification, multiplying through by $$e^x$$ will transform the equation into a quadratic in $$e^x$$, which can be solved easily. This is preferred here because no simple hyperbolic identity cleanly eliminates one of the functions to leave a solvable equation in the other.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "When solving an equation like $$2\\cosh^2 x - 5\\sinh x = 5$$, what is the most direct algebraic strategy, and why? (2 steps)", "answer": "- Step 1: The most direct strategy is to use the identity $$\\cosh^2 x \\equiv 1 + \\sinh^2 x$$ to replace the $$\\cosh^2 x$$ term. This transforms the equation entirely into terms of $$\\sinh x$$.\n- Step 2: The equation becomes $$2(1 + \\sinh^2 x) - 5\\sinh x = 5$$, which simplifies to the quadratic $$2\\sinh^2 x - 5\\sinh x - 3 = 0$$. This allows you to solve for $$\\sinh x$$ and then find $$x$$ using $$\\operatorname{arsinh}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Conceptually, how do you solve an equation like $$\\cosh 2x - 5\\cosh x + 4 = 0$$? (3 steps)", "answer": "- Step 1: Recognize that the arguments are different ($$2x$$ and $$x$$). Use a double angle identity to make them match. The identity $$\\cosh 2x \\equiv 2\\cosh^2 x - 1$$ is ideal here because it expresses $$\\cosh 2x$$ purely in terms of $$\\cosh x$$.\n- Step 2: Substitute to get $$(2\\cosh^2 x - 1) - 5\\cosh x + 4 = 0$$, which simplifies to $$2\\cosh^2 x - 5\\cosh x + 3 = 0$$. Factor this quadratic to find the possible values for $$\\cosh x$$.\n- Step 3: Remember that $$\\cosh x = k$$ (for $$k > 1$$) yields **two** real solutions for $$x$$: one positive and one negative, corresponding to $$x = \\pm \\operatorname{arcosh} k$$. You must use the logarithmic form $$x = \\ln(k \\pm \\sqrt{k^2 - 1})$$ to express both.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "How do you express a linear combination like $$13\\cosh x + 5\\sinh x$$ in the form $$R\\cosh(x + \\alpha)$$? (3 steps)", "answer": "- Step 1: Expand $$R\\cosh(x + \\alpha)$$ using the addition formula: $$R(\\cosh x \\cosh \\alpha + \\sinh x \\sinh \\alpha) = R\\cosh\\alpha\\cosh x + R\\sinh\\alpha\\sinh x$$.\n- Step 2: Equate coefficients with the original expression: $$R\\cosh\\alpha = 13$$ and $$R\\sinh\\alpha = 5$$.\n- Step 3: To find $$R$$, use the identity $$\\cosh^2\\alpha - \\sinh^2\\alpha = 1$$. Square and subtract the equations: $$R^2\\cosh^2\\alpha - R^2\\sinh^2\\alpha = 13^2 - 5^2 \\implies R^2 = 169 - 25 = 144 \\implies R = 12$$. To find $$\\alpha$$, divide them: $$\\tanh\\alpha = \\frac{5}{13}$$. (Note: $$R$$ is always positive).", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Find the exact value of $$\\sinh(\\ln 2)$$. (3 steps)", "answer": "- Step 1: Use the exponential definition of $$\\sinh x$$: $$\\sinh(\\ln 2) = \\frac{e^{\\ln 2} - e^{-\\ln 2}}{2}$$.\n- Step 2: Simplify the exponents using logarithm rules. $$e^{\\ln 2} = 2$$ and $$e^{-\\ln 2} = e^{\\ln(2^{-1})} = \\frac{1}{2}$$.\n- Step 3: Substitute back: $$\\sinh(\\ln 2) = \\frac{2 - \\frac{1}{2}}{2} = \\frac{\\frac{3}{2}}{2} = \\frac{3}{4}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Find the exact value of $$\\tanh(\\ln 4)$$ using the exponential form of $$\\tanh x$$. (2 steps)", "answer": "- Step 1: Use the form $$\\tanh x = \\frac{e^{2x} - 1}{e^{2x} + 1}$$. Substituting $$x = \\ln 4$$ gives $$\\tanh(\\ln 4) = \\frac{e^{2\\ln 4} - 1}{e^{2\\ln 4} + 1} = \\frac{e^{\\ln 4^2} - 1}{e^{\\ln 4^2} + 1} = \\frac{16 - 1}{16 + 1}$$.\n- Step 2: Simplify the fraction: $$\\tanh(\\ln 4) = \\frac{15}{17}$$. This demonstrates how the exponential form makes evaluating hyperbolic functions at logarithms straightforward.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "Express $$\\operatorname{arsinh} 1$$ as a natural logarithm. (2 steps)", "answer": "- Step 1: Use the logarithmic form of $$\\operatorname{arsinh} x$$, which is $$\\ln(x + \\sqrt{x^2 + 1})$$.\n- Step 2: Substitute $$x = 1$$ into the formula: $$\\operatorname{arsinh} 1 = \\ln(1 + \\sqrt{1^2 + 1}) = \\ln(1 + \\sqrt{2})$$.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "Express $$\\operatorname{artanh} \\frac{1}{3}$$ as a natural logarithm. (2 steps)", "answer": "- Step 1: Use the logarithmic form of $$\\operatorname{artanh} x$$, which is $$\\frac{1}{2}\\ln\\left(\\frac{1+x}{1-x}\\right)$$.\n- Step 2: Substitute $$x = \\frac{1}{3}$$: $$\\frac{1}{2}\\ln\\left(\\frac{1 + \\frac{1}{3}}{1 - \\frac{1}{3}}\\right) = \\frac{1}{2}\\ln\\left(\\frac{\\frac{4}{3}}{\\frac{2}{3}}\\right) = \\frac{1}{2}\\ln(2) = \\ln(2^{1/2}) = \\ln\\sqrt{2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "Given that $$\\sinh x = \\frac{3}{4}$$, find the exact value of $$\\tanh x$$. (2 steps)", "answer": "- Step 1: First, find $$\\cosh x$$ using the identity $$\\cosh^2 x - \\sinh^2 x = 1$$. $$\\cosh^2 x - \\left(\\frac{3}{4}\\right)^2 = 1 \\implies \\cosh^2 x = 1 + \\frac{9}{16} = \\frac{25}{16}$$. Since $$\\cosh x > 0$$, we have $$\\cosh x = \\frac{5}{4}$$.\n- Step 2: Use the definition $$\\tanh x = \\frac{\\sinh x}{\\cosh x}$$. $$\\tanh x = \\frac{\\frac{3}{4}}{\\frac{5}{4}} = \\frac{3}{5}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "A student solves $$\\cosh x = 2$$ and writes the single answer $$x = \\ln(2 + \\sqrt{3})$$. Why is this solution incomplete? (2 steps)", "answer": "- Step 1: The equation $$\\cosh x = k$$ (for $$k > 1$$) represents a horizontal line intersecting the U-shaped $$\\cosh x$$ graph. Because $$\\cosh x$$ is an even function, it is symmetric about the y-axis, so there must be two intersection points: one positive and one negative.\n- Step 2: The logarithmic form $$x = \\ln(k \\pm \\sqrt{k^2 - 1})$$ gives both solutions. The $$+$$ gives the positive $$x$$, and the $$-$$ gives the negative $$x$$ (since $$k - \\sqrt{k^2 - 1} < 1$$, its log is negative). The student missed the negative solution $$x = \\ln(2 - \\sqrt{3})$$.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "When solving a quadratic in $$\\sinh x$$, like $$2\\sinh^2 x - 5\\sinh x - 3 = 0$$, how many real solutions for $$x$$ should you expect to find in total, and why? (2 steps)", "answer": "- Step 1: The quadratic factors to $$(2\\sinh x + 1)(\\sinh x - 3) = 0$$, giving two possible values for $$\\sinh x$$: $$\\sinh x = -\\frac{1}{2}$$ and $$\\sinh x = 3$$.\n- Step 2: Because $$\\sinh x$$ is a one-to-one function with a range of all real numbers, every horizontal line $$y = k$$ intersects the graph of $$y = \\sinh x$$ exactly once. Therefore, each valid value of $$\\sinh x$$ yields exactly one real solution for $$x$$, resulting in **two** real solutions in total.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}], "count": 30}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "Write the exponential definition of $$\\sinh x$$. Why is it called the \"hyperbolic sine\" — what structural feature of the definition mirrors the ordinary sine function? (2 steps)", "answer": "- Step 1: The definition is $$\\sinh x \\equiv \\frac{e^x - e^{-x}}{2}$$. Notice the structure: a *difference* of two terms divided by 2. This mirrors Euler's formula for sine: $$\\sin x = \\frac{e^{ix} - e^{-ix}}{2i}$$. The only differences are: (a) no imaginary unit $$i$$, and (b) no division by $$i$$. So $$\\sinh x$$ is essentially the \"real analogue\" of $$\\sin x$$ — obtained by replacing $$ix$$ with $$x$$ in the exponential form.\n- Step 2: The word \"hyperbolic\" comes from the fundamental identity $$\\cosh^2 x - \\sinh^2 x = 1$$, which is the equation of a hyperbola — just as $$\\cos^2 x + \\sin^2 x = 1$$ is the equation of a circle. The trig functions parametrise a circle; the hyperbolic functions parametrise a hyperbola.\n\nThis structural mirroring between circular and hyperbolic functions is the deep reason for all the parallel identities.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "Write the exponential definition of $$\\cosh x$$. What key structural difference from $$\\sinh x$$ determines whether the function is odd or even? (2 steps)", "answer": "- Step 1: $$\\cosh x \\equiv \\frac{e^x + e^{-x}}{2}$$. The crucial difference from $$\\sinh x$$ is the **plus sign** between the two exponential terms, versus the **minus sign** in $$\\sinh x$$.\n- Step 2: Because of the plus sign, swapping $$x \\to -x$$ gives $$\\cosh(-x) = \\frac{e^{-x} + e^x}{2} = \\cosh x$$, so $$\\cosh x$$ is **even**. For $$\\sinh x$$, the minus sign means $$\\sinh(-x) = \\frac{e^{-x} - e^{x}}{2} = -\\sinh x$$, so $$\\sinh x$$ is **odd**. The sign in the definition directly dictates the symmetry.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "Starting from $$\\tanh x \\equiv \\frac{\\sinh x}{\\cosh x}$$, derive the two equivalent exponential forms: $$\\frac{e^x - e^{-x}}{e^x + e^{-x}}$$ and $$\\frac{e^{2x} - 1}{e^{2x} + 1}$$. Show the algebraic steps clearly. (3 steps)", "answer": "- Step 1: Substitute the definitions: $$\\tanh x = \\frac{\\sinh x}{\\cosh x} = \\frac{e^x - e^{-x}}{2} \\times \\frac{2}{e^x + e^{-x}} = \\frac{e^x - e^{-x}}{e^x + e^{-x}}$$. The factors of 2 cancel.\n- Step 2: To get the second form, multiply numerator and denominator by $$e^x$$: $$\\frac{e^x(e^x - e^{-x})}{e^x(e^x + e^{-x})} = \\frac{e^{2x} - 1}{e^{2x} + 1}$$.\n- Step 3: The second form is often more convenient. As $$x \\to +\\infty$$, $$e^{2x}$$ dominates, so both numerator and denominator approach $$e^{2x}$$, giving $$\\tanh x \\to 1$$. As $$x \\to -\\infty$$, $$e^{2x} \\to 0$$, so $$\\tanh x \\to \\frac{-1}{+1} = -1$$. This immediately reveals the two horizontal asymptotes.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "For $$\\tanh x = \\frac{e^{2x}-1}{e^{2x}+1}$$, explain why the range of $$\\tanh x$$ is strictly $$(-1, 1)$$, not $$[-1, 1]$$. Why can $$\\tanh x$$ never actually equal $$\\pm 1$$? (2 steps)", "answer": "- Step 1: $$\\tanh x = 1$$ would require $$\\frac{e^{2x}-1}{e^{2x}+1} = 1$$, i.e., $$e^{2x} - 1 = e^{2x} + 1$$, giving $$-1 = 1$$, a contradiction. Similarly, $$\\tanh x = -1$$ would require $$e^{2x} - 1 = -(e^{2x} + 1)$$, giving $$2e^{2x} = 0$$, impossible since $$e^{2x} > 0$$.\n- Step 2: The values $$\\pm 1$$ are approached only as limits: as $$x \\to +\\infty$$, $$\\tanh x \\to 1$$; as $$x \\to -\\infty$$, $$\\tanh x \\to -1$$. But for any finite real $$x$$, $$e^{2x}$$ is a finite positive number, so the fraction is strictly between $$-1$$ and $$1$$. The asymptotes $$y = \\pm 1$$ are never touched.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "Write the definitions of the three reciprocal hyperbolic functions: $$\\operatorname{sech} x$$, $$\\operatorname{cosech} x$$, and $$\\operatorname{coth} x$$, in terms of the primary hyperbolic functions, and also in exponential form. (3 steps)", "answer": "- Step 1: $$\\operatorname{sech} x = \\frac{1}{\\cosh x} = \\frac{2}{e^x + e^{-x}}$$. The \"sec\" analogy: just as secant is the reciprocal of cosine, sech is the reciprocal of cosh.\n- Step 2: $$\\operatorname{cosech} x = \\frac{1}{\\sinh x} = \\frac{2}{e^x - e^{-x}}$$. Note: $$\\operatorname{cosech} x$$ is undefined at $$x = 0$$ because $$\\sinh 0 = 0$$.\n- Step 3: $$\\operatorname{coth} x = \\frac{1}{\\tanh x} = \\frac{e^{2x} + 1}{e^{2x} - 1}$$. Also undefined at $$x = 0$$ because $$\\tanh 0 = 0$$. As $$x \\to 0^+$$, $$e^{2x} \\approx 1$$, so the numerator → 2 and denominator → 0⁺, giving $$\\operatorname{coth} x \\to +\\infty$$.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "Find the exact value of $$\\tanh(\\ln 4)$$ without a calculator. Walk through the reasoning. (3 steps)", "answer": "- Step 1: Use the form $$\\tanh x = \\frac{e^{2x}-1}{e^{2x}+1}$$. With $$x = \\ln 4$$, we need $$e^{2\\ln 4}$$.\n- Step 2: $$e^{2\\ln 4} = e^{\\ln 4^2} = e^{\\ln 16} = 16$$, using $$a\\ln b = \\ln b^a$$ and $$e^{\\ln k} = k$$.\n- Step 3: $$\\tanh(\\ln 4) = \\frac{16-1}{16+1} = \\frac{15}{17}$$. This is a clean exact answer — no decimals needed.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "Find the exact value of $$\\sinh(\\ln 2)$$. (2 steps)", "answer": "- Step 1: $$\\sinh(\\ln 2) = \\frac{e^{\\ln 2} - e^{-\\ln 2}}{2} = \\frac{2 - e^{\\ln(1/2)}}{2} = \\frac{2 - \\frac{1}{2}}{2}$$, using $$e^{-\\ln 2} = e^{\\ln(2^{-1})} = \\frac{1}{2}$$.\n- Step 2: $$\\sinh(\\ln 2) = \\frac{2 - 0.5}{2} = \\frac{1.5}{2} = \\frac{3}{4}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Find the exact value of $$\\cosh(\\ln 3)$$. (2 steps)", "answer": "- Step 1: $$\\cosh(\\ln 3) = \\frac{e^{\\ln 3} + e^{-\\ln 3}}{2} = \\frac{3 + \\frac{1}{3}}{2}$$, since $$e^{-\\ln 3} = \\frac{1}{3}$$.\n- Step 2: $$\\cosh(\\ln 3) = \\frac{\\frac{10}{3}}{2} = \\frac{10}{6} = \\frac{5}{3}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Describe the graph of $$y = \\sinh x$$: its symmetry, its behaviour as $$x \\to \\pm\\infty$$, and whether it passes through the origin. Why does it pass through the origin? (3 steps)", "answer": "- Step 1: **Symmetry**: $$\\sinh x$$ is an **odd** function ($$\\sinh(-x) = -\\sinh x$$), so the graph has rotational symmetry of order 2 about the origin — it looks like a stretched, smoother version of $$y = x^3$$.\n- Step 2: **Behaviour at extremes**: As $$x \\to +\\infty$$, $$e^{-x} \\to 0$$, so $$\\sinh x \\approx \\frac{1}{2}e^x$$ (exponential growth). As $$x \\to -\\infty$$, $$e^x \\to 0$$, so $$\\sinh x \\approx -\\frac{1}{2}e^{-x}$$ (exponential decay towards $$-\\infty$$). There are no horizontal asymptotes.\n- Step 3: **Origin**: $$\\sinh 0 = \\frac{e^0 - e^0}{2} = \\frac{1-1}{2} = 0$$. The graph passes through the origin because the two exponentials are equal at $$x=0$$ and their difference vanishes. The range of $$\\sinh x$$ is all of $$\\mathbb{R}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Describe the graph of $$y = \\cosh x$$: its symmetry, its minimum point, and its behaviour as $$x \\to \\pm\\infty$$. Why is the minimum at $$(0,1)$$? (3 steps)", "answer": "- Step 1: **Symmetry**: $$\\cosh x$$ is **even** ($$\\cosh(-x) = \\cosh x$$), so the graph is symmetric about the $$y$$-axis. This is the famous \"catenary\" shape — the curve of a hanging chain.\n- Step 2: **Minimum**: At $$x = 0$$, $$\\cosh 0 = \\frac{e^0 + e^0}{2} = 1$$. Since both $$e^x$$ and $$e^{-x}$$ are positive, and by AM-GM inequality $$\\frac{e^x + e^{-x}}{2} \\geq \\sqrt{e^x \\cdot e^{-x}} = 1$$, with equality when $$e^x = e^{-x}$$, i.e., $$x = 0$$. So the minimum value is exactly 1.\n- Step 3: **Behaviour at extremes**: As $$x \\to \\pm\\infty$$, one exponential dominates and $$\\cosh x \\approx \\frac{1}{2}e^{|x|}$$, growing without bound. No horizontal asymptotes. The range is $$[1, \\infty)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Describe the graph of $$y = \\tanh x$$: its symmetry, its value at the origin, and its asymptotes. Why does it have two horizontal asymptotes? (3 steps)", "answer": "- Step 1: **Symmetry**: $$\\tanh x$$ is **odd** (ratio of odd to even), so $$\\tanh(-x) = -\\tanh x$$. The graph has point symmetry about the origin.\n- Step 2: **Origin**: $$\\tanh 0 = \\frac{\\sinh 0}{\\cosh 0} = \\frac{0}{1} = 0$$. The curve passes through the origin with a positive slope (it's increasing everywhere).\n- Step 3: **Asymptotes**: As $$x \\to +\\infty$$, $$\\tanh x \\to 1$$; as $$x \\to -\\infty$$, $$\\tanh x \\to -1$$. These are the lines $$y = 1$$ and $$y = -1$$. They arise because for large $$|x|$$, $$\\sinh x \\approx \\cosh x \\approx \\frac{1}{2}e^{|x|}$$, so their ratio approaches $$\\pm 1$$. The range is the open interval $$(-1, 1)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Sketch the graph of $$y = \\operatorname{sech} x$$. What is its maximum value, where does it occur, and
