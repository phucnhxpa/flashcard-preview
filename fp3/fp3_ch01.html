<script>
const DATA={"selected": [{"question": "Describe the key features of the graph of $$y = \\operatorname{sech} x$$, including its maximum point and asymptotes. (2 steps)", "answer": "- Step 1: Since $$\\operatorname{sech} x = \\frac{1}{\\cosh x}$$, it is the reciprocal of the U-shaped $$\\cosh x$$ graph. At $$x = 0$$, $$\\cosh x = 1$$, so $$\\operatorname{sech} x$$ has a maximum point at $$(0, 1)$$.\n- Step 2: As $$x \\to \\infty$$ and $$x \\to -\\infty$$, $$\\cosh x \\to \\infty$$, so $$\\operatorname{sech} x \\to 0$$. The x-axis ($$y = 0$$) is a horizontal asymptote in both directions. The graph is an even function, symmetric about the y-axis, resembling a bell curve.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "State the domains for the inverse hyperbolic functions $$y = \\operatorname{arsinh} x$$ and $$y = \\operatorname{artanh} x$$, and explain why these domains exist based on the original functions. (2 steps)", "answer": "- Step 1: The domain of $$y = \\operatorname{arsinh} x$$ is $$x \\in \\mathbb{R}$$. This is because the original function $$y = \\sinh x$$ has a range of all real numbers and is already one-to-one, so its inverse can accept any real input.\n- Step 2: The domain of $$y = \\operatorname{artanh} x$$ is $$|x| < 1$$ (or $$-1 < x < 1$$). This is because the original function $$y = \\tanh x$$ is bounded, with a range of $$-1 < \\tanh x < 1$$. Therefore, the inverse function can only accept inputs that fall within this range.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Starting from $$\\cosh^2 x - \\sinh^2 x = 1$$, derive the two related identities involving $$\\operatorname{sech}$$ and $$\\operatorname{cosech}$$. (3 steps)", "answer": "- Step 1: Divide both sides by $$\\cosh^2 x$$: $$1 - \\tanh^2 x = \\operatorname{sech}^2 x$$, i.e. $$\\operatorname{sech}^2 x \\equiv 1 - \\tanh^2 x$$.\n- Step 2: Divide both sides by $$\\sinh^2 x$$: $$\\coth^2 x - 1 = \\operatorname{cosech}^2 x$$, i.e. $$\\operatorname{cosech}^2 x \\equiv \\coth^2 x - 1$$.\n- Step 3: Compare with trig: $$\\sec^2 x = 1 + \\tan^2 x$$ and $$\\operatorname{cosec}^2 x = 1 + \\cot^2 x$$. The signs differ — Osborn's rule predicts this (every product of two sin terms picks up a minus).", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "Describe the shape of $$y = \\cosh x$$ and explain why it's \"the average\" of $$e^x$$ and $$e^{-x}$$. Why is a hanging chain (catenary) modelled by cosh? (3 steps)", "answer": "- Step 1: $$\\cosh x = \\tfrac{1}{2}(e^x + e^{-x})$$ literally averages the two exponential curves at every point. Minimum at $$(0, 1)$$; for large $$|x|$$ grows like $$\\tfrac{1}{2}e^{|x|}$$.\n- Step 2: Symmetric about the y-axis (even). U-shaped, smooth, range $$[1, \\infty)$$.\n- Step 3: A flexible chain hangs in the shape $$y = a\\cosh(x/a)$$ because the balance of gravity and tension yields a differential equation whose solution is cosh. Looks parabolic but isn't — a real catenary grows exponentially fast at large $$|x|$$, while a parabola grows only quadratically.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "What is the general formula for $$\\cosh(\\ln k)$$ where $$k > 0$$, and why is it always greater than or equal to 1? (2 steps)", "answer": "- Step 1: $$\\cosh(\\ln k) = \\frac{e^{\\ln k} + e^{-\\ln k}}{2} = \\frac{k + \\frac{1}{k}}{2} = \\frac{k^2 + 1}{2k}$$.\n- Step 2: This equals $$\\frac{k^2 + 1}{2k}$$, which by AM–GM is always $$\\geq \\sqrt{k \\cdot \\frac{1}{k}} = 1$$, with equality only when $$k = 1$$ (i.e., $$\\cosh(\\ln 1) = \\cosh(0) = 1$$). For instance, $$\\cosh(\\ln 3) = \\frac{9+1}{6} = \\frac{10}{6} = \\frac{5}{3}$$.\n\nThis confirms that cosh's range is $$[1, \\infty)$$, even when restricted to these special inputs.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "Explain why, when solving $$\\cosh x = k$$, you should never write $$x = \\operatorname{arcosh} k$$ and stop there if you want all real solutions. What should you write instead? (2 steps)", "answer": "- Step 1: $$\\operatorname{arcosh} k$$ gives only the non-negative solution (by definition, the range of $$\\operatorname{arcosh}$$ is $$[0,\\infty)$$). But since $$\\cosh x$$ is even, if $$x = a$$ is a solution, then $$x = -a$$ is also a solution.\n- Step 2: For $$k > 1$$, the complete solution set is $$x = \\pm\\operatorname{arcosh} k = \\pm\\ln(k + \\sqrt{k^2-1})$$. For $$k = 1$$, the only solution is $$x = 0$$. For $$k < 1$$, there are no real solutions. Always check which case applies and give all solutions.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "Prove that $\\operatorname{artanh} x = \\frac{1}{2}\\ln\\left(\\frac{1+x}{1-x}\\right)$ for $|x| < 1$. (3 steps)", "answer": "- Step 1: Let $y = \\operatorname{artanh} x$, so $x = \\tanh y = \\frac{e^{2y} - 1}{e^{2y} + 1}$. Cross-multiply:\n$$x(e^{2y} + 1) = e^{2y} - 1$$\n$$xe^{2y} + x = e^{2y} - 1$$\n\n- Step 2: Rearrange:\n$$e^{2y} - xe^{2y} = x + 1$$\n$$e^{2y}(1 - x) = 1 + x$$\n\n- Step 3: Solve:\n$$e^{2y} = \\frac{1+x}{1-x}$$\n$$2y = \\ln\\left(\\frac{1+x}{1-x}\\right)$$\n$$y = \\frac{1}{2}\\ln\\left(\\frac{1+x}{1-x}\\right)$$\n\nThe restriction $|x| < 1$ ensures the argument of the log is positive.", "source": "MiniMax ①", "_id": "minimax_1_9"}, {"question": "Prove the identity $$\\operatorname{sech}^2 x \\equiv 1 - \\tanh^2 x$$ starting from the definitions. (3 steps)", "answer": "- Step 1: Start with the right-hand side:\n$$1 - \\tanh^2 x = 1 - \\left(\\frac{\\sinh x}{\\cosh x}\\right)^2 = 1 - \\frac{\\sinh^2 x}{\\cosh^2 x} = \\frac{\\cosh^2 x - \\sinh^2 x}{\\cosh^2 x}$$\n\n- Step 2: Use the fundamental identity $$\\cosh^2 x - \\sinh^2 x = 1$$:\n$$= \\frac{1}{\\cosh^2 x}$$\n\n- Step 3: Since $$\\operatorname{sech} x = \\frac{1}{\\cosh x}$$, we have:\n$$\\operatorname{sech}^2 x = \\frac{1}{\\cosh^2 x} \\equiv 1 - \\tanh^2 x$$\n\n+ This is analogous to the trigonometric identity $$\\sec^2 x \\equiv 1 + \\tan^2 x$$ — note the sign difference due to Osborn's rule.", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "Solve $$\\cosh 2x - 5\\cosh x + 4 = 0$$, giving exact answers in log form where appropriate. (4 steps)", "answer": "- Step 1: Substitute $$\\cosh 2x = 2\\cosh^2 x - 1$$: equation becomes $$2\\cosh^2 x - 5\\cosh x + 3 = 0$$.\n- Step 2: Factor: $$(2\\cosh x - 3)(\\cosh x - 1) = 0$$. So $$\\cosh x = 3/2$$ or $$\\cosh x = 1$$.\n- Step 3: For $$\\cosh x = 1$$: only $$x = 0$$ (the unique minimum of cosh).\n- Step 4: For $$\\cosh x = 3/2$$: two solutions $$x = \\pm\\ln(3/2 + \\sqrt{9/4 - 1}) = \\pm\\ln\\left(\\dfrac{3 + \\sqrt{5}}{2}\\right)$$.\n\nThree real solutions in total.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "Derive the logarithmic form of $\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2 + 1})$. (4 steps)", "answer": "- Step 1: Let $y = \\operatorname{arsinh} x$, so $x = \\sinh y = \\frac{e^y - e^{-y}}{2}$.  \n- Step 2: Multiply both sides by $2e^y$: $e^{2y} - 1 = 2xe^y$.  \n- Step 3: Rearrange into a quadratic in $e^y$: $e^{2y} - 2xe^y - 1 = 0$.  \n- Step 4: Solve using the quadratic formula:  \n  $e^y = x \\pm \\sqrt{x^2 + 1}$. Discard the negative root since $e^y > 0$, so $y = \\ln(x + \\sqrt{x^2 + 1})$.  \n\n**Misconception**: Why not $x - \\sqrt{x^2 + 1}$? Because $x - \\sqrt{x^2 + 1}$ is negative for all x, violating $e^y > 0$.", "source": "Qwen 3 ①", "_id": "qwen_1_4"}, {"question": "Show explicitly that $$\\sinh^2 A = (e^{2A} - 2 + e^{-2A})/4$$ and use this to verify the fundamental identity by direct expansion. (3 steps)", "answer": "- Step 1: $$\\sinh^2 A = \\left(\\frac{e^A - e^{-A}}{2}\\right)^2 = \\frac{(e^A)^2 - 2(e^A)(e^{-A}) + (e^{-A})^2}{4} = \\frac{e^{2A} - 2 + e^{-2A}}{4}$$.\n- Step 2: Similarly, $$\\cosh^2 A = \\frac{e^{2A} + 2 + e^{-2A}}{4}$$.\n- Step 3: Subtract: $$\\cosh^2 A - \\sinh^2 A = \\frac{(e^{2A} + 2 + e^{-2A}) - (e^{2A} - 2 + e^{-2A})}{4} = \\frac{4}{4} = 1$$ ✓.\n\nThe \"$$+2$$\" and \"$$-2$$\" survive because of the cross-term $$\\pm 2 e^A e^{-A} = \\pm 2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_83"}, {"question": "Conceptually, how is the graph of $$y = \\sinh x$$ formed from the graphs of $$y = e^x$$ and $$y = e^{-x}$$? Describe its symmetry. (2 steps)", "answer": "- Step 1: Since $$\\sinh x = \\frac{e^x - e^{-x}}{2} = \\frac{e^x + (-e^{-x})}{2}$$, the graph of $$y = \\sinh x$$ is the average of the graph of $$y = e^x$$ and the graph of $$y = -e^{-x}$$. As $$x \\to \\infty$$, $$e^{-x} \\to 0$$, so $$\\sinh x \\approx \\frac{1}{2}e^x$$. As $$x \\to -\\infty$$, $$e^x \\to 0$$, so $$\\sinh x \\approx -\\frac{1}{2}e^{-x}$$.\n- Step 2: Because of this construction, $$\\sinh(-a) = -\\sinh(a)$$, meaning $$\\sinh x$$ is an **odd function**. Its graph has rotational symmetry of order 2 about the origin, passing through $$(0,0)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "A student applies Osborn's rule to $$\\cos 2A \\equiv \\cos^2 A - \\sin^2 A$$ and writes $$\\cosh 2A \\equiv \\cosh^2 A - \\sinh^2 A$$. What's wrong? (2 steps)", "answer": "- Step 1: The term $$\\sin^2 A$$ is a product of two sine terms (i.e., $$\\sin A \\times \\sin A$$). By Osborn's rule, this must become **$$-\\sinh^2 A$$**, not $$+\\sinh^2 A$$.\n- Step 2: The correct hyperbolic identity is $$\\cosh 2A \\equiv \\cosh^2 A + \\sinh^2 A$$ (the minus becomes plus). This is consistent with the fundamental identity: since $$\\cosh^2 A - \\sinh^2 A = 1$$, we get $$\\cosh^2 A = 1 + \\sinh^2 A$$, so $$\\cosh 2A = (1 + \\sinh^2 A) + \\sinh^2 A = 1 + 2\\sinh^2 A$$, or equivalently $$\\cosh^2 A + \\sinh^2 A$$.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "Show that $$\\cosh$$ is even, and state the most important practical consequence of this. (3 steps)", "answer": "- Step 1: $$\\cosh(-x) = \\frac{e^{-x} + e^x}{2} = \\frac{e^x + e^{-x}}{2} = \\cosh x$$ ✓.\n- Step 2: Graphical consequence: symmetric about the $$y$$-axis (U-shape with minimum at $$x=0$$).\n- Step 3: Most practical consequence: equations involving only $$\\cosh x$$ tell you the *absolute value* of $$x$$, not its sign. So $$\\cosh x = k$$ (with $$k > 1$$) has *two* solutions $$\\pm x_0$$, while $$\\sinh x = k$$ has *one*. This is a key thing to remember when solving.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "What happens if you naively try to compute $$\\operatorname{arcosh}(0.5)$$? (3 steps)", "answer": "- Step 1: $$\\operatorname{arcosh}(0.5)$$ would solve $$\\cosh y = 0.5$$ for $$y$$.\n- Step 2: But $$\\cosh y \\geq 1$$ for all real $$y$$, so no real solution exists.\n- Step 3: Trying the formula: $$\\ln(0.5 + \\sqrt{0.25 - 1}) = \\ln(0.5 + \\sqrt{-0.75})$$ — the square root of a negative number, no real value. Confirms no real arcosh exists for $$|x| < 1$$. (In complex analysis it does exist but takes complex values.)", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "Test the identity $$\\frac{1+\\tanh^2 x}{1-\\tanh^2 x} \\equiv 2\\cosh^2 x - 1$$ at a specific point to verify it's correct. (3 steps)", "answer": "- Step 1: Try $$x = 0$$: LHS $$= (1+0)/(1-0) = 1$$. RHS $$= 2(1) - 1 = 1$$ ✓.\n- Step 2: Try $$x = \\ln 2$$: $$\\tanh(\\ln 2) = (4-1)/(4+1) = 3/5$$, so $$\\tanh^2 = 9/25$$. LHS $$= (1 + 9/25)/(1 - 9/25) = (34/25)/(16/25) = 34/16 = 17/8$$.\n- Step 3: RHS at $$x = \\ln 2$$: $$\\cosh(\\ln 2) = 5/4$$, so $$\\cosh^2 = 25/16$$, RHS $$= 2(25/16) - 1 = 50/16 - 16/16 = 34/16 = 17/8$$ ✓.\n\nBoth checks match — high confidence the identity is correct.", "source": "Opus 4.7 ②", "_id": "opus_2_73"}, {"question": "Compare sinh x and tanh x for large positive x. Which grows faster and why?", "answer": "- sinh x ≈ ½e^x ⇒ exponential growth  \n- tanh x ≈ 1 ⇒ approaches asymptote  \nGrowth rate: sinh x grows exponentially faster than tanh x's convergence.  \nReason: tanh x = sinh x / cosh x ≈ (½e^x)/(½e^x) = 1.", "source": "Qwen 3 ②", "_id": "qwen_2_14"}, {"question": "Compare the structures of $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2+1})$$ and $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2-1})$$. Why the sign difference inside the square root? (3 steps)", "answer": "- Step 1: arsinh has \"$$+1$$\"; arcosh has \"$$-1$$\". The sign comes directly from the fundamental identity: $$\\cosh^2 = 1 + \\sinh^2$$ vs $$\\sinh^2 = \\cosh^2 - 1$$.\n- Step 2: For arsinh derivation, the algebra leads to $$\\sqrt{x^2 + 1}$$ — always defined for any real $$x$$. Hence arsinh has full domain $$\\mathbb{R}$$.\n- Step 3: For arcosh, $$\\sqrt{x^2 - 1}$$ requires $$|x| \\geq 1$$, but combined with arcosh being defined only on cosh's range, the domain is $$x \\geq 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Explain why the domain of $\\cosh x$ must be restricted to define its inverse function, and what restriction is used. (2 steps)", "answer": "- Step 1: A function must be one-to-one (pass the horizontal line test) to have an inverse.\n\n- Step 2: $\\cosh x$ is not one-to-one on its entire domain $\\mathbb{R}$ because it's an even function — for any $x > 0$, $\\cosh x = \\cosh(-x)$. To make it one-to-one, we restrict the domain to $x \\geq 0$. Then the inverse $\\operatorname{arcosh} x$ exists for $x \\geq 1$.\n\nThis is exactly analogous to restricting $\\cos x$ to $[0, \\pi]$ to define $\\arccos x$.", "source": "MiniMax ①", "_id": "minimax_1_6"}, {"question": "How does the graph of $$y = \\tanh x$$ differ structurally from $$y = \\tan x$$, and why? (3 steps)", "answer": "- Step 1: $$\\tan x$$ is periodic with vertical asymptotes at $$x = \\pi/2 + k\\pi$$, because $$\\cos x$$ has zeros there.\n- Step 2: $$\\tanh x$$ has **no** vertical asymptotes because $$\\cosh x \\geq 1 > 0$$ — the denominator never vanishes.\n- Step 3: Instead, tanh has **horizontal** asymptotes at $$y = \\pm 1$$, is bounded, and is strictly increasing — totally unlike the periodic, unbounded tan.\n\nThe takeaway: hyperbolic functions live smoothly on $$\\mathbb{R}$$ because they're built from exponentials, not from a circle.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Why is $$\\sinh 3A = 3\\sinh A + 4\\sinh^3 A$$, but $$\\sin 3A = 3\\sin A - 4\\sin^3 A$$? Use Osborn's rule. (3 steps)", "answer": "- Step 1: The trig identity has $$-4\\sin^3 A$$. Treat $$\\sin^3 A$$ as $$\\sin A \\cdot \\sin^2 A$$ — the $$\\sin^2 A$$ factor is a product of two sins.\n- Step 2: By Osborn: $$\\sin^2 A \\to -\\sinh^2 A$$. So $$-4\\sin A\\cdot\\sin^2 A \\to -4\\sinh A\\cdot(-\\sinh^2 A) = +4\\sinh^3 A$$.\n- Step 3: Hence $$\\sinh 3A = 3\\sinh A + 4\\sinh^3 A$$. The sign on the cubic term flipped exactly because of the implied $$\\sin\\cdot\\sin$$ product.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "Solve $$4\\cosh x + 13e^{-x} = 11$$ by converting to a quadratic in $$e^x$$. (5 steps)", "answer": "- Step 1: Write $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$: $$4 \\cdot \\frac{e^x+e^{-x}}{2} + 13e^{-x} = 11$$, so $$2e^x + 2e^{-x} + 13e^{-x} = 11$$.\n- Step 2: Simplify: $$2e^x + 15e^{-x} = 11$$. Multiply by $$e^x$$: $$2e^{2x} + 15 = 11e^x$$, i.e., $$2e^{2x} - 11e^x + 15 = 0$$.\n- Step 3: Factor the quadratic in $$e^x$$: $$(2e^x - 5)(e^x - 3) = 0$$, so $$e^x = \\frac{5}{2}$$ or $$e^x = 3$$.\n- Step 4: Both are positive (valid). So $$x = \\ln\\frac{5}{2}$$ or $$x = \\ln 3$$.\n- Step 5: Quick verification: For $$x = \\ln 3$$, $$\\cosh(\\ln 3) = \\frac{5}{3}$$, so $$4 \\cdot \\frac{5}{3} + 13 \\cdot \\frac{1}{3} = \\frac{20+13}{3} = 11$$. ✓", "source": "GLM 5.1 ③", "_id": "glm_3_66"}, {"question": "Why are the functions $$\\sinh$$ and $$\\cosh$$ called \"hyperbolic\"? Connect to the trig analogue. (3 steps)", "answer": "- Step 1: Trigonometric functions are \"circular\" because $$(\\cos t, \\sin t)$$ traces the unit circle $$x^2 + y^2 = 1$$.\n- Step 2: For hyperbolic, $$(\\cosh t, \\sinh t)$$ satisfies $$\\cosh^2 t - \\sinh^2 t = 1$$, the equation of the unit hyperbola $$x^2 - y^2 = 1$$.\n- Step 3: So $$(\\cosh t, \\sinh t)$$ traces (one branch of) this hyperbola as $$t$$ varies over $$\\mathbb{R}$$. Hence \"hyperbolic.\" This is the geometric reason for the name and the source of all the structural similarity to trigonometry.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "Derive $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2-1})$$ for $$x \\geq 1$$, and explain why we choose \"+\" over \"−\". (4 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arcosh} x$$, so $$x = \\cosh y = \\frac{e^y + e^{-y}}{2}$$. Same algebra: $$e^{2y} - 2xe^y + 1 = 0$$.\n- Step 2: Quadratic in $$e^y$$: $$e^y = x \\pm \\sqrt{x^2 - 1}$$. Both roots are positive for $$x \\geq 1$$ (since $$x - \\sqrt{x^2-1} > 0$$).\n- Step 3: The two roots correspond to $$\\pm y$$ — both satisfy $$\\cosh(\\pm y) = x$$ (cosh is even). Note their product is $$(x+\\sqrt{x^2-1})(x-\\sqrt{x^2-1}) = x^2 - (x^2-1) = 1$$, so $$\\ln(x-\\sqrt{x^2-1}) = -\\ln(x+\\sqrt{x^2-1})$$.\n- Step 4: Convention: $$\\operatorname{arcosh}$$ returns the non-negative value. Since $$x + \\sqrt{x^2-1} \\geq 1$$, $$\\ln(x + \\sqrt{x^2-1}) \\geq 0$$. So we pick the \"+\" branch.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "Define sinh x and cosh x in terms of exponentials. Explain why sinh is an odd function and cosh is an even function (3 steps).", "answer": "- Step 1: sinh x is defined as $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$.  \n- Step 2: cosh x is defined as $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$.  \n- Step 3: For sinh(-x):  \n  $$\\sinh(-x) = \\frac{e^{-x} - e^x}{2} = -\\sinh x$$ (odd function).  \n  For cosh(-x):  \n  $$\\cosh(-x) = \\frac{e^{-x} + e^x}{2} = \\cosh x$$ (even function).\n\nKey takeaway: Exponential definitions directly lead to symmetry properties.", "source": "Qwen 3 ②", "_id": "qwen_2_0"}, {"question": "Why are *inverted* catenary curves used as arches in architecture? (3 steps)", "answer": "- Step 1: A catenary $$y = a\\cosh(x/a)$$ describes a hanging chain — the forces along the chain are pure *tension*, with no bending stress.\n- Step 2: Flipping it upside down: the same shape now describes a structure under pure *compression* — every part pushes against its neighbors, with no bending.\n- Step 3: Stone, brick, and concrete are strong in compression but weak in tension/bending. So inverted-catenary arches transmit forces in exactly the way these materials handle best — making them maximally stable. Famous examples: Gaudí's architecture and the St. Louis Gateway Arch.", "source": "Opus 4.7 ②", "_id": "opus_2_62"}, {"question": "How many real solutions does $$\\cosh 2x + 2\\cosh x - 5 = 0$$ have? (4 steps)", "answer": "- Step 1: Use $$\\cosh 2x = 2\\cosh^2 x - 1$$: equation becomes $$2\\cosh^2 x + 2\\cosh x - 6 = 0$$, simplifying to $$\\cosh^2 x + \\cosh x - 3 = 0$$.\n- Step 2: Set $$u = \\cosh x$$, $$u \\geq 1$$: $$u^2 + u - 3 = 0$$, roots $$u = \\dfrac{-1\\pm\\sqrt{13}}{2}$$.\n- Step 3: $$\\dfrac{-1+\\sqrt{13}}{2} \\approx 1.30 \\geq 1$$ ✓ valid. $$\\dfrac{-1-\\sqrt{13}}{2} < 0$$ rejected.\n- Step 4: $$\\cosh x = \\dfrac{-1+\\sqrt{13}}{2}$$ has **two** real solutions $$x = \\pm\\operatorname{arcosh}\\left(\\dfrac{-1+\\sqrt{13}}{2}\\right)$$ (since cosh is even and $$u > 1$$).", "source": "Opus 4.7 ①", "_id": "opus_1_84"}, {"question": "Describe the graph of $$y = \\operatorname{arcosh} x$$ for $$x \\geq 1$$. (4 steps)", "answer": "- Step 1: Reflection of the right half ($$x \\geq 0$$ branch) of $$\\cosh x$$ in the line $$y = x$$.\n- Step 2: Domain $$[1, \\infty)$$; range $$[0, \\infty)$$.\n- Step 3: Starts at $$(1, 0)$$ since $$\\operatorname{arcosh} 1 = 0$$ ($$\\cosh 0 = 1$$).\n- Step 4: Vertical tangent at $$x = 1$$ (because $$\\cosh$$ has zero gradient at origin, so its inverse has infinite gradient there). Increases logarithmically.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Derive $$\\cosh 3A = 4\\cosh^3 A - 3\\cosh A$$ using the addition formula. (4 steps)", "answer": "- Step 1: $$\\cosh 3A = \\cosh(A + 2A) = \\cosh A\\cosh 2A + \\sinh A\\sinh 2A$$.\n- Step 2: Substitute $$\\cosh 2A = 2\\cosh^2 A - 1$$ and $$\\sinh 2A = 2\\sinh A\\cosh A$$: $$\\cosh 3A = \\cosh A(2\\cosh^2 A - 1) + \\sinh A\\cdot 2\\sinh A\\cosh A$$.\n- Step 3: Expand: $$= 2\\cosh^3 A - \\cosh A + 2\\sinh^2 A\\cosh A$$. Use $$\\sinh^2 A = \\cosh^2 A - 1$$: $$= 2\\cosh^3 A - \\cosh A + 2(\\cosh^2 A - 1)\\cosh A = 4\\cosh^3 A - 3\\cosh A$$.\n- Step 4: Same structure as $$\\cos 3A = 4\\cos^3 A - 3\\cos A$$ — Osborn predicts no sign change here because the implied products are all $$\\cos\\cdot\\cos$$, not $$\\sin\\cdot\\sin$$.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "Solve the equation $$6\\sinh x - 2\\cosh x = 7$$ for real values of $$x$$. Show the method of converting to an exponential equation. (4 steps)", "answer": "- Step 1: Substitute the exponential definitions:\n$$6\\left(\\frac{e^x - e^{-x}}{2}\\right) - 2\\left(\\frac{e^x + e^{-x}}{2}\\right) = 7$$\n\n- Step 2: Simplify:\n$$3e^x - 3e^{-x} - e^x - e^{-x} = 7$$\n$$2e^x - 4e^{-x} = 7$$\n\n- Step 3: Multiply by $$e^x$$ to get a quadratic:\n$$2e^{2x} - 7e^x - 4 = 0$$\n\n- Step 4: Factor and solve:\n$$(2e^x + 1)(e^x - 4) = 0$$\n$$e^x = -\\frac{1}{2}$$ or $$e^x = 4$$\n\nSince $$e^x > 0$$ for all real $$x$$, reject $$e^x = -\\frac{1}{2}$$.\n$$x = \\ln 4$$\n\n+ Alternative: Write in terms of a single hyperbolic function using identities, but the exponential method works directly.", "source": "MiniMax ②", "_id": "minimax_2_12"}, {"question": "Why is $$\\operatorname{arcosh}(-2)$$ undefined in the real numbers? (2 steps)", "answer": "- Step 1: $$\\operatorname{arcosh}$$ has domain $$x \\geq 1$$ because the range of cosh (restricted to $$x \\geq 0$$) is $$[1, \\infty)$$. There's no real $$y$$ with $$\\cosh y = -2$$ since $$\\cosh y \\geq 1$$ always.\n- Step 2: Even formally: $$\\ln(-2 + \\sqrt{4 - 1}) = \\ln(\\sqrt{3} - 2)$$, and $$\\sqrt{3} \\approx 1.73 < 2$$, so the argument is negative — log undefined in reals.\n\nAlways check the domain before applying inverse formulas.", "source": "Opus 4.7 ①", "_id": "opus_1_65"}, {"question": "When solving an equation like $$6\\sinh x - 2\\cosh x = 7$$, what is the most direct algebraic strategy, and why? (2 steps)", "answer": "- Step 1: The most direct strategy is to substitute the exponential definitions: $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$ and $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$. This converts the equation into an exponential form.\n- Step 2: After substitution and simplification, multiplying through by $$e^x$$ will transform the equation into a quadratic in $$e^x$$, which can be solved easily. This is preferred here because no simple hyperbolic identity cleanly eliminates one of the functions to leave a solvable equation in the other.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "Show how to derive $$\\cosh 2A = 1 + 2\\sinh^2 A$$ starting from the definitions of $$\\sinh x$$ and $$\\cosh x$$. (4 steps)", "answer": "- Step 1: $$\\cosh 2A = \\frac{e^{2A} + e^{-2A}}{2}$$ by definition.\n- Step 2: $$2\\sinh^2 A = 2 \\cdot \\frac{(e^A - e^{-A})^2}{4} = \\frac{e^{2A} - 2 + e^{-2A}}{2}$$.\n- Step 3: Compute RHS: $$1 + 2\\sinh^2 A = 1 + \\frac{e^{2A} - 2 + e^{-2A}}{2} = \\frac{2 + e^{2A} - 2 + e^{-2A}}{2} = \\frac{e^{2A} + e^{-2A}}{2}$$.\n- Step 4: This equals LHS $$\\cosh 2A$$ ✓. Identity verified directly from definitions.", "source": "Opus 4.7 ②", "_id": "opus_2_92"}, {"question": "Prove the addition formula $$\\sinh(A+B) = \\sinh A \\cosh B + \\cosh A \\sinh B$$ using exponential definitions. Compare the sign pattern with $$\\sin(A+B) = \\sin A \\cos B + \\cos A \\sin B$$. (3 steps)", "answer": "- Step 1: Expand the RHS using definitions:\n$$\\sinh A \\cosh B + \\cosh A \\sinh B = \\frac{(e^A-e^{-A})(e^B+e^{-B})}{4} + \\frac{(e^A+e^{-A})(e^B-e^{-B})}{4}$$\n- Step 2: Expand both products:\n+ First term: $$\\frac{e^{A+B}+e^{A-B}-e^{-A+B}-e^{-A-B}}{4}$$\n+ Second term: $$\\frac{e^{A+B}-e^{A-B}+e^{-A+B}-e^{-A-B}}{4}$$\n+ Adding: the $$e^{A-B}$$ and $$e^{-A+B}$$ terms cancel, leaving $$\\frac{2e^{A+B}-2e^{-A-B}}{4} = \\frac{e^{A+B}-e^{-(A+B)}}{2}$$\n- Step 3: This equals $$\\sinh(A+B)$$ by definition. The sign pattern is identical to the trig formula — no sign flips occur because there is no *product of two sinh terms* (each term in the sum is a product of one sinh and one cosh).\n\nOsborn's rule confirms: $$\\sin A \\cos B + \\cos A \\sin B$$ has no product of two sins, so it converts directly to $$\\sinh A \\cosh B + \\cosh A \\sinh B$$ with no sign changes.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "Joshua claims that $\\frac{1+\\tanh^2 x}{1-\\tanh^2 x} \\equiv \\frac{\\operatorname{sech}^2 x}{2} - 1$. Explain why this is incorrect and provide the correct identity. (3 steps)", "answer": "- Step 1: Joshua's first error is treating $\\frac{1+\\tanh^2 x}{1-\\tanh^2 x}$ as if it equals $\\frac{\\operatorname{sech}^2 x}{2-\\operatorname{sech}^2 x}$. The correct relationship is $\\operatorname{sech}^2 x = 1 - \\tanh^2 x$, not $1 + \\tanh^2 x$ (which would be for secant in trigonometry).\n\n- Step 2: His second error is algebraically incorrect: $\\frac{\\operatorname{sech}^2 x}{2-\\operatorname{sech}^2 x} \\neq \\frac{\\operatorname{sech}^2 x}{2} - 1$.\n\n- Step 3: Correct solution:\n$$\\frac{1+\\tanh^2 x}{1-\\tanh^2 x} = \\frac{1 + \\tanh^2 x}{\\operatorname{sech}^2 x} = \\frac{1}{\\operatorname{sech}^2 x} + \\frac{\\tanh^2 x}{\\operatorname{sech}^2 x} = \\cosh^2 x + \\sinh^2 x = (\\cosh^2 x - \\sinh^2 x) + 2\\sinh^2 x = 1 + 2\\sinh^2 x = 2\\cosh^2 x - 1$$\n\nSo the correct identity is $\\frac{1+\\tanh^2 x}{1-\\tanh^2 x} \\equiv 2\\cosh^2 x - 1$.", "source": "MiniMax ①", "_id": "minimax_1_48"}, {"question": "Apply Osborn's rule to the trig identity $$\\sec^2 A - \\tan^2 A = 1$$. (3 steps)", "answer": "- Step 1: $$\\tan^2 A$$ contains an implied product of two sines (since $$\\tan = \\sin/\\cos$$), so $$\\tan^2 A \\to -\\tanh^2 A$$.\n- Step 2: $$\\sec^2 A \\to \\operatorname{sech}^2 A$$ (no change — no sines).\n- Step 3: Result: $$\\operatorname{sech}^2 A - (-\\tanh^2 A) = 1$$, i.e. $$\\operatorname{sech}^2 A + \\tanh^2 A = 1$$, or equivalently $$\\operatorname{sech}^2 A = 1 - \\tanh^2 A$$. Note the sign on $$\\tanh^2$$ flipped — this is the Osborn footprint.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Explain the difference between the notation $$\\sinh^{-1} x$$ and $$\\operatorname{arsinh} x$$. Are they the same thing? (1 step)", "answer": "- They represent the same function: the inverse hyperbolic sine function. However, $$\\operatorname{arsinh} x$$ (read as \"ar-sinh\") is the preferred notation because $$\\sinh^{-1} x$$ can be confused with $$\\frac{1}{\\sinh x}$$ (the reciprocal).\n\n+ Similarly: $$\\cosh^{-1} x$$ vs $$\\operatorname{arcosh} x$$; $$\\tanh^{-1} x$$ vs $$\\operatorname{artanh} x$$.\n\n+ The \"ar\" prefix stands for \"area\" — these functions give the area (hyperbolic area) corresponding to the hyperbolic angle, analogous to how $$\\arcsin x$$ gives the angle whose sine is $$x$$.", "source": "MiniMax ②", "_id": "minimax_2_18"}, {"question": "Why does the equation $$\\operatorname{sech} x = 2$$ have no real solutions, while $$\\operatorname{sech} x = \\frac{1}{2}$$ does? (2 steps)", "answer": "- Step 1: Recall that $$\\operatorname{sech} x = \\frac{1}{\\cosh x}$$, and the range of $$\\cosh x$$ is $$\\cosh x \\geq 1$$.\n\n- Step 2: Therefore:\n- If $$\\operatorname{sech} x = 2$$, then $$\\cosh x = \\frac{1}{2}$$, but $$\\cosh x$$ can never be less than 1. No solution.\n- If $$\\operatorname{sech} x = \\frac{1}{2}$$, then $$\\cosh x = 2$$, which is possible (solve $$\\frac{e^x + e^{-x}}{2} = 2 \\Rightarrow e^{2x} - 4e^x + 1 = 0$$ gives $$e^x = 2 \\pm \\sqrt{3}$$).\n\n+ More generally: $$0 < \\operatorname{sech} x \\leq 1$$ for all real $$x$$. Values greater than 1 are impossible.", "source": "MiniMax ②", "_id": "minimax_2_34"}, {"question": "Why are hyperbolic functions defined using $$e^x$$ and $$e^{-x}$$? What's the deeper connection to trigonometry? (3 steps)", "answer": "- Step 1: Trigonometric functions can be written using *imaginary* exponentials (Euler): $$\\cos x = \\frac{e^{ix}+e^{-ix}}{2}$$, $$\\sin x = \\frac{e^{ix}-e^{-ix}}{2i}$$.\n- Step 2: Hyperbolic functions are the *real-argument* analogues — drop the $$i$$: $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$, $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$.\n- Step 3: Consequence: every trig identity has a hyperbolic counterpart (sometimes with sign flips on products of sines — Osborn's rule). Trig parametrises a circle; hyperbolic parametrises a hyperbola — same algebraic role, different curves.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "The graph of $$y = \\sinh x + \\cosh x$$ is equivalent to the graph of $$y = e^x$$. Is this true or false? Prove your answer. (2 steps)", "answer": "- Step 1: Using the definitions:\n$$\\sinh x + \\cosh x = \\frac{e^x - e^{-x}}{2} + \\frac{e^x + e^{-x}}{2} = \\frac{2e^x}{2} = e^x$$\n\n- Step 2: Yes, it's true! The $$-e^{-x}$$ and $$+e^{-x}$$ terms cancel, leaving just $$e^x$$.\n\n+ Similarly: $$\\cosh x - \\sinh x = e^{-x}$$.\n\n+ This provides a simple way to remember the forms: $$e^x = \\cosh x + \\sinh x$$ and $$e^{-x} = \\cosh x - \\sinh x$$.\n\n+ Graphically, $$y = \\sinh x + \\cosh x$$ is an exponential growth curve through $$(0, 1)$$, exactly like $$y = e^x$$.", "source": "MiniMax ②", "_id": "minimax_2_41"}, {"question": "A student claims: \"$$\\cosh(A+B) = \\cosh A \\cosh B - \\sinh A \\sinh B$$ by analogy with $$\\cos(A+B)$$.\" Identify the error. (3 steps)", "answer": "- Step 1: The error is forgetting Osborn's rule. The trig identity is $$\\cos(A+B) = \\cos A \\cos B - \\sin A \\sin B$$, with a \"$$-\\sin A \\sin B$$\" term.\n- Step 2: $$\\sin A \\sin B$$ is a product of two sines, so converting to hyperbolic flips the sign: $$\\sin A \\sin B \\to -\\sinh A \\sinh B$$. So the trig \"$$-\\sin A \\sin B$$\" becomes \"$$+\\sinh A \\sinh B$$\".\n- Step 3: Correct identity: $$\\cosh(A+B) \\equiv \\cosh A \\cosh B + \\sinh A \\sinh B$$ — *plus* sign. This is one of the most common Osborn-related exam errors.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "Why does the equation $$\\sinh x = k$$ have exactly one real solution for any $$k \\in \\mathbb{R}$$, but $$\\cosh x = k$$ has two solutions when $$k > 1$$ and none when $$k < 1$$? (3 steps)", "answer": "- Step 1: $$\\sinh x$$ is strictly increasing on $$\\mathbb{R}$$ (since its derivative $$\\cosh x > 0$$ always), so it's a bijection $$\\mathbb{R} \\to \\mathbb{R}$$. Each horizontal line $$y = k$$ hits the curve exactly once.\n- Step 2: $$\\cosh x$$ has minimum $$1$$ at $$x = 0$$ and is even (symmetric about y-axis). For $$k > 1$$: line $$y = k$$ crosses twice (at $$x = \\pm a$$).\n+ For $$k = 1$$: only $$x = 0$$.\n+ For $$k < 1$$: never crosses (curve never goes below $$1$$).\n- Step 3: Consequence: $$\\operatorname{arsinh}$$ exists naturally on all of $$\\mathbb{R}$$, but $$\\operatorname{arcosh}$$ requires restricting cosh to $$x \\geq 0$$ to make it one-to-one.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "A horizontal line $$y = k$$ with $$0 < k < 1$$ intersects $$y = \\tanh x$$ how many times? What about $$y = \\coth x$$? (3 steps)", "answer": "- Step 1: $$y = \\tanh x$$ is strictly increasing with range $$(-1, 1)$$. So $$y = k$$ for any $$k \\in (-1, 1)$$ hits the curve exactly **once**.\n- Step 2: $$y = \\coth x$$ has range $$|y| > 1$$. The line $$y = k$$ with $$|k| < 1$$ does **not** intersect coth at all — it sits in the gap between the two branches.\n- Step 3: Different ranges → totally different intersection patterns. This matters when solving $$\\tanh x = c$$ vs $$\\coth x = c$$.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Why must we choose the right form of $$\\cosh 2x$$ when solving an equation? Use $$\\cosh 2x - 5\\cosh x + 4 = 0$$ as the example. (3 steps)", "answer": "- Step 1: Three equivalent forms: $$\\cosh 2x = 2\\cosh^2 x - 1 = 1 + 2\\sinh^2 x = \\cosh^2 x + \\sinh^2 x$$.\n- Step 2: The equation has only cosh terms (and a constant). To stay in one variable, choose the form expressed purely in cosh: $$2\\cosh^2 x - 1$$.\n- Step 3: Other forms would introduce sinh, requiring further substitution. Pattern-match: equation in cosh → use $$2\\cosh^2 x - 1$$; equation in sinh → use $$1 + 2\\sinh^2 x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_77"}, {"question": "Compare the ranges of sinh x and cosh x. Why does sinh have range ℝ while cosh ≥ 1?", "answer": "- sinh x:  \n  As x → ∞, sinh x → ∞; as x → -∞, sinh x → -∞. Continuous and strictly increasing ⇒ full ℝ range.  \n- cosh x:  \n  Minimum at x=0: cosh 0 = 1. Exponential terms always positive and symmetric ⇒ cosh x ≥ 1.  \nVisual intuition: sinh x is \"S-shaped\" while cosh x is \"U-shaped\".", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "Explain why artanh x = ½ln[(1+x)/(1-x)] is only defined for |x| < 1.", "answer": "- For |x| < 1: (1+x) > 0 and (1-x) > 0 ⇒ ln positive numbers  \n- For |x| ≥ 1: Denominator or numerator becomes ≤ 0 ⇒ ln undefined  \nGraph connection: tanh x has horizontal asymptotes at ±1, so its inverse must have domain (-1,1).", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "Why does Osborn's rule actually work? What's the deep reason for the sign flip on products of sines? (3 steps)", "answer": "- Step 1: Complex relations via Euler: $$\\cos x = \\cosh(ix)$$ and $$\\sin x = -i\\sinh(ix)$$ (real-imaginary translation).\n- Step 2: Therefore $$\\sin^2 x = (-i)^2 \\sinh^2(ix) = -\\sinh^2(ix)$$. Each pair of sines absorbs a factor of $$(-i)^2 = -1$$. Products of cosines, or one cos × one sin, do not pick up this factor.\n- Step 3: When you transform a trig identity to its hyperbolic counterpart, every \"$$\\sin \\cdot \\sin$$\" term contributes an extra $$-1$$ — precisely Osborn's rule. So Osborn isn't a magical heuristic; it's a direct consequence of $$i^2 = -1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "Why does $$10\\cosh x + 6\\sinh x$$ have a positive minimum, but $$6\\cosh x + 10\\sinh x$$ has no minimum (goes to $$-\\infty$$)? (3 steps)", "answer": "- Step 1: For $$a\\cosh x + b\\sinh x$$ to be writable as $$R\\cosh(x + \\alpha)$$, we need $$|a| > |b|$$ so that $$R = \\sqrt{a^2 - b^2}$$ is real. Then the function is bounded below by $$R$$ (since cosh's minimum is 1).\n- Step 2: With $$a = 10, b = 6$$: $$|a| > |b|$$, so $$R = \\sqrt{64} = 8$$ — function is at least 8 everywhere.\n- Step 3: With $$a = 6, b = 10$$: $$|b| > |a|$$, the form is instead $$R\\sinh(x + \\alpha)$$ with $$R = \\sqrt{b^2 - a^2}$$, and sinh is unbounded both ways. So the function goes to $$-\\infty$$ as $$x \\to -\\infty$$.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Why is sign care important when computing cosh from sinh, but both signs are possible when computing sinh from cosh? (3 steps)", "answer": "- Step 1: Given $$\\sinh x = s$$: from $$\\cosh^2 x - \\sinh^2 x = 1$$, $$\\cosh^2 x = 1 + s^2$$. Since $$\\cosh x \\geq 1 > 0$$, we **must** take $$\\cosh x = +\\sqrt{1 + s^2}$$.\n- Step 2: Given $$\\cosh x = c \\geq 1$$: $$\\sinh^2 x = c^2 - 1$$, so $$\\sinh x = \\pm\\sqrt{c^2 - 1}$$. **Both signs are valid** because sinh can be positive or negative depending on whether $$x$$ is positive or negative.\n- Step 3: The asymmetry comes from the function shapes: cosh has fixed sign (always positive), but sinh changes sign.", "source": "Opus 4.7 ①", "_id": "opus_1_70"}, {"question": "When solving equations like $$2\\cosh^2 x - 5\\sinh x = 5$$, why is it better to use the identity $$\\cosh^2 x = 1 + \\sinh^2 x$$ rather than converting to exponentials? (2 steps)", "answer": "- Step 1: The equation already contains $$\\cosh^2 x$$ and $$\\sinh x$$. Using $$\\cosh^2 x = 1 + \\sinh^2 x$$ converts everything to a single variable $$\\sinh x$$, yielding a quadratic: $$2\\sinh^2 x - 5\\sinh x - 3 = 0$$. This is clean and direct.\n- Step 2: If we instead converted to exponentials, we'd get $$2\\left(\\frac{e^x+e^{-x}}{2}\\right)^2 - 5\\cdot\\frac{e^x-e^{-x}}{2} = 5$$, which involves terms like $$e^{2x}$$, $$e^{-2x}$$, and $$e^x$$, $$e^{-x}$$ — much messier to rearrange into a solvable polynomial. The identity approach exploits the structure of the equation.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "State the range of all six hyperbolic functions on their natural domains, with brief justification. (6 steps)", "answer": "- Step 1: $$\\sinh x$$: range $$\\mathbb{R}$$ (unbounded both ways, monotonic).\n- Step 2: $$\\cosh x$$: range $$[1, \\infty)$$ (min $$1$$ at $$x=0$$, unbounded above).\n- Step 3: $$\\tanh x$$: range $$(-1, 1)$$ (asymptotes at $$\\pm 1$$, never attained).\n- Step 4: $$\\operatorname{sech} x = 1/\\cosh x$$: range $$(0, 1]$$ (max $$1$$ at $$x=0$$).\n- Step 5: $$\\operatorname{cosech} x = 1/\\sinh x$$ ($$x \\neq 0$$): range $$\\mathbb{R} \\setminus \\{0\\}$$.\n- Step 6: $$\\coth x = 1/\\tanh x$$ ($$x \\neq 0$$): range $$|y| > 1$$, since $$\\tanh \\in (-1,1)$$ inverts to outside $$[-1,1]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "When solving a polynomial in $$e^x$$, which roots must you reject? Why? (2 steps)", "answer": "- Step 1: $$e^x > 0$$ for all real $$x$$ — the exponential function never returns negative or zero values for real input.\n- Step 2: So any root $$e^x = c$$ with $$c \\leq 0$$ has no real solution. Reject these *before* taking $$\\ln$$. This is the most common pitfall in hyperbolic equation-solving.", "source": "Opus 4.7 ②", "_id": "opus_2_72"}, {"question": "State the domain of each inverse hyperbolic function. (6 steps)", "answer": "- Step 1: $$\\operatorname{arsinh} x$$: $$x \\in \\mathbb{R}$$ (sinh is bijective).\n- Step 2: $$\\operatorname{arcosh} x$$: $$x \\geq 1$$ (range of cosh on $$[0, \\infty)$$).\n- Step 3: $$\\operatorname{artanh} x$$: $$|x| < 1$$ (range of tanh).\n- Step 4: $$\\operatorname{arsech} x$$: $$0 < x \\leq 1$$.\n- Step 5: $$\\operatorname{arcosech} x$$: $$x \\neq 0$$.\n- Step 6: $$\\operatorname{arcoth} x$$: $$|x| > 1$$.\n\nThe pattern: the domain of each inverse equals the range of the corresponding (possibly restricted) hyperbolic function.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "A student finds $$\\cosh^2 x = 4$$ and concludes $$\\cosh x = \\pm 2$$. What's the issue? (2 steps)", "answer": "- Step 1: Algebraically, $$(\\cosh x)^2 = 4$$ permits $$\\cosh x = \\pm 2$$.\n- Step 2: But $$\\cosh x \\geq 1$$ for all real $$x$$ — never negative. So only $$\\cosh x = +2$$ is valid; the negative root is extraneous and must be rejected.\n\nLesson: always check candidate values against the *range* of the function. Sinh can be any real number; cosh is always $$\\geq 1$$; tanh is in $$(-1, 1)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_100"}, {"question": "Apply Osborn's rule to $$\\cos 2A \\equiv \\frac{1 - \\tan^2 A}{1 + \\tan^2 A}$$. (3 steps)", "answer": "- Step 1: $$\\tan^2 A$$ contains a product of two sines: $$\\tan^2 A \\to -\\tanh^2 A$$. $$\\cos 2A \\to \\cosh 2A$$.\n- Step 2: Substitute: $$\\cosh 2A \\equiv \\frac{1 - (-\\tanh^2 A)}{1 + (-\\tanh^2 A)} = \\frac{1 + \\tanh^2 A}{1 - \\tanh^2 A}$$.\n- Step 3: Note both signs in the original flipped. The trig \"$$1 - \\tan^2$$\" became \"$$1 + \\tanh^2$$\", and the trig \"$$1 + \\tan^2$$\" became \"$$1 - \\tanh^2$$\".", "source": "Opus 4.7 ②", "_id": "opus_2_98"}, {"question": "Show how $$\\sinh x \\equiv \\dfrac{2\\tanh(x/2)}{1 - \\tanh^2(x/2)}$$ comes from the identity $$\\sinh 2A = 2\\sinh A\\cosh A$$. (4 steps)", "answer": "- Step 1: Set $$A = x/2$$ in $$\\sinh 2A = 2\\sinh A\\cosh A$$: $$\\sinh x = 2\\sinh(x/2)\\cosh(x/2)$$.\n- Step 2: Use $$\\cosh^2(x/2) - \\sinh^2(x/2) = 1$$ as the denominator (= 1 doesn't change anything): $$\\sinh x = \\dfrac{2\\sinh(x/2)\\cosh(x/2)}{\\cosh^2(x/2) - \\sinh^2(x/2)}$$.\n- Step 3: Divide every term in numerator and denominator by $$\\cosh^2(x/2)$$: $$\\sinh x = \\dfrac{2\\tanh(x/2)}{1 - \\tanh^2(x/2)}$$.\n- Step 4: This is the hyperbolic Weierstrass-style half-angle. Trig analogue: $$\\sin x = \\dfrac{2\\tan(x/2)}{1 + \\tan^2(x/2)}$$ — note the sign flip predicted by Osborn's rule.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "Express $$\\tanh x$$ in two equivalent exponential forms: as a quotient of two two-term expressions, and as a single rational expression in $$e^{2x}$$. (3 steps)", "answer": "- Step 1: From the basic definition: $$\\tanh x \\equiv \\dfrac{\\sinh x}{\\cosh x} = \\dfrac{e^x - e^{-x}}{e^x + e^{-x}}$$.\n- Step 2: Multiply numerator and denominator by $$e^x$$: $$\\tanh x = \\dfrac{e^{2x} - 1}{e^{2x} + 1}$$.\n- Step 3: This second form is often more convenient for log-argument problems because it's a single expression in $$e^{2x}$$ rather than two separate exponentials.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "True or false: $$\\cosh x \\leq e^{|x|}$$ for all real $$x$$. Justify. (3 steps)", "answer": "- Step 1: $$\\cosh x = (e^x + e^{-x})/2$$. WLOG suppose $$x \\geq 0$$, so $$|x| = x$$ and $$e^{|x|} = e^x$$.\n- Step 2: Need $$(e^x + e^{-x})/2 \\leq e^x$$, equivalently $$e^x + e^{-x} \\leq 2e^x$$, i.e. $$e^{-x} \\leq e^x$$. True since $$x \\geq 0$$ implies $$e^{-x} \\leq 1 \\leq e^x$$.\n- Step 3: True ✓. Conceptually: $$\\cosh x$$ is the *average* of two positive numbers, so it can't exceed the larger one. So $$\\cosh$$ is squeezed: $$\\frac{1}{2}e^{|x|} \\leq \\cosh x \\leq e^{|x|}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_96"}, {"question": "Sketch (describe) the graph of $$y = \\operatorname{arsech} x$$ on its domain. (4 steps)", "answer": "- Step 1: Domain: $$0 < x \\leq 1$$ (matches range of $$\\operatorname{sech}$$ on $$x \\geq 0$$).\n- Step 2: Reflect the right half of $$\\operatorname{sech} x$$ in line $$y = x$$.\n- Step 3: Passes through $$(1, 0)$$ since $$\\operatorname{sech} 0 = 1$$, hence $$\\operatorname{arsech} 1 = 0$$.\n- Step 4: Vertical asymptote as $$x \\to 0^+$$ (because $$\\operatorname{sech} x \\to 0$$ as $$|x| \\to \\infty$$ — reflection swaps horizontal asymptote into vertical).", "source": "Opus 4.7 ②", "_id": "opus_2_94"}, {"question": "Show that $$\\sinh$$ is an odd function directly from its definition, and explain why this is structurally inevitable. (3 steps)", "answer": "- Step 1: $$\\sinh(-x) = \\frac{e^{-x} - e^{x}}{2}$$.\n- Step 2: Factor out $$-1$$: $$\\frac{e^{-x} - e^x}{2} = -\\frac{e^x - e^{-x}}{2} = -\\sinh x$$. So $$\\sinh(-x) = -\\sinh x$$ ✓.\n- Step 3: Why inevitable: $$\\sinh$$ was *constructed* as the odd part of $$e^x$$. The \"$$-$$\" in the numerator engineers this symmetry. Graphically: $$180°$$ rotational symmetry about the origin.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "Why is the inverse of $$\\cosh$$ multi-branched (i.e. why does $$\\cosh y = x$$ have two $$y$$-solutions for $$x > 1$$)? Use parity. (3 steps)", "answer": "- Step 1: $$\\cosh$$ is even, so if $$\\cosh y_0 = x$$, then $$\\cosh(-y_0) = x$$ also. Both $$y_0$$ and $$-y_0$$ are valid.\n- Step 2: From log form, the two solutions are $$\\ln(x + \\sqrt{x^2-1})$$ and $$\\ln(x - \\sqrt{x^2-1})$$. Their product inside the log is $$1$$, so the two logs sum to zero — they're negatives of each other.\n- Step 3: By convention, $$\\operatorname{arcosh}$$ returns the non-negative one ($$\\ln(x + \\sqrt{x^2-1}) \\geq 0$$). When solving a $$\\cosh$$ equation, you must explicitly include both signs: $$x = \\pm \\operatorname{arcosh}(k)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_79"}, {"question": "Show that $$\\operatorname{arsinh}(-3)$$ can be written as either $$\\ln(\\sqrt{10} - 3)$$ or $$-\\ln(3 + \\sqrt{10})$$, and verify these are equal. (3 steps)", "answer": "- Step 1: Direct: $$\\operatorname{arsinh}(-3) = \\ln(-3 + \\sqrt{9+1}) = \\ln(\\sqrt{10} - 3)$$.\n- Step 2: But arsinh is odd, so $$\\operatorname{arsinh}(-3) = -\\operatorname{arsinh}(3) = -\\ln(3 + \\sqrt{10})$$.\n- Step 3: Verify equivalence: $$(\\sqrt{10} - 3)(\\sqrt{10} + 3) = 10 - 9 = 1$$, so $$\\sqrt{10} - 3 = \\dfrac{1}{3 + \\sqrt{10}}$$, and $$\\ln(\\sqrt{10} - 3) = -\\ln(3 + \\sqrt{10})$$. ✓\n\nBoth forms are valid; you can use either depending on which is cleaner.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "What is the domain and range of $$\\operatorname{arsech} x$$? Explain why the domain of $$\\operatorname{arsech} x$$ is $$(0, 1]$$, not $$[0, 1]$$. (3 steps)", "answer": "- Step 1: $$\\operatorname{sech} x$$ has range $$(0, 1]$$ (it takes values from just above 0 up to 1, achieving 1 at $$x = 0$$). So the domain of $$\\operatorname{arsech} x$$ is $$(0, 1]$$.\n- Step 2: The value 0 is excluded from the domain because $$\\operatorname{sech} x$$ never equals 0 (it approaches 0 as $$x \\to \\pm\\infty$$ but never reaches it). So there's no real $$x$$ with $$\\operatorname{sech} x = 0$$, meaning $$\\operatorname{arsech} 0$$ is undefined.\n- Step 3: The range of $$\\operatorname{arsech} x$$ is $$[0, \\infty)$$, since we restrict $$\\operatorname{sech} x$$ to $$x \\geq 0$$ to make it one-to-one (it's even, so we take the right half).", "source": "GLM 5.1 ③", "_id": "glm_3_60"}, {"question": "Quick conceptual check: if $$\\cosh x = \\frac{5}{4}$$, what is $$\\sinh x$$? (Assume $$x > 0$$.) (2 steps)", "answer": "- Step 1: Use $$\\cosh^2 x - \\sinh^2 x = 1$$: $$\\sinh^2 x = \\cosh^2 x - 1 = \\frac{25}{16} - 1 = \\frac{9}{16}$$, so $$\\sinh x = \\pm\\frac{3}{4}$$.\n- Step 2: Since $$x > 0$$, $$\\sinh x > 0$$ (because $$\\sinh$$ is strictly increasing and $$\\sinh 0 = 0$$). So $$\\sinh x = \\frac{3}{4}$$. Note: if $$x < 0$$, then $$\\sinh x = -\\frac{3}{4}$$. The sign of $$\\sinh x$$ matches the sign of $$x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_63"}, {"question": "When solving a quadratic in $$\\sinh x$$, like $$2\\sinh^2 x - 5\\sinh x - 3 = 0$$, how many real solutions for $$x$$ should you expect to find in total, and why? (2 steps)", "answer": "- Step 1: The quadratic factors to $$(2\\sinh x + 1)(\\sinh x - 3) = 0$$, giving two possible values for $$\\sinh x$$: $$\\sinh x = -\\frac{1}{2}$$ and $$\\sinh x = 3$$.\n- Step 2: Because $$\\sinh x$$ is a one-to-one function with a range of all real numbers, every horizontal line $$y = k$$ intersects the graph of $$y = \\sinh x$$ exactly once. Therefore, each valid value of $$\\sinh x$$ yields exactly one real solution for $$x$$, resulting in **two** real solutions in total.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "Why does $$\\dfrac{1}{\\cos^2 x} - \\tan^2 x \\equiv 1$$, and what's its hyperbolic counterpart? (3 steps)", "answer": "- Step 1: Trig: $$\\sec^2 x - \\tan^2 x = \\dfrac{1 - \\sin^2 x}{\\cos^2 x} = \\dfrac{\\cos^2 x}{\\cos^2 x} = 1$$.\n- Step 2: By Osborn: $$\\sec \\to \\operatorname{sech}$$, and $$\\tan^2 x$$ (implied $$\\sin\\cdot\\sin$$) becomes $$-\\tanh^2 x$$.\n- Step 3: Hyperbolic identity: $$\\operatorname{sech}^2 x - (-\\tanh^2 x) = 1$$, i.e. $$\\operatorname{sech}^2 x + \\tanh^2 x = 1$$, equivalently $$\\operatorname{sech}^2 x = 1 - \\tanh^2 x$$.\n\nThis is consistent with dividing $$\\cosh^2 - \\sinh^2 = 1$$ by $$\\cosh^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_76"}, {"question": "When solving $$\\cosh x = c$$ via the log formula, why must we be careful about sign? (3 steps)", "answer": "- Step 1: The formula $$\\operatorname{arcosh} c = \\ln(c + \\sqrt{c^2 - 1})$$ gives only the **non-negative** principal value $$y \\geq 0$$.\n- Step 2: But cosh is even, so any $$c > 1$$ has BOTH $$x = +\\operatorname{arcosh} c$$ AND $$x = -\\operatorname{arcosh} c$$ as solutions to $$\\cosh x = c$$.\n- Step 3: When solving an equation (rather than evaluating arcosh), **always include both signs**: $$x = \\pm\\ln(c + \\sqrt{c^2 - 1})$$.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "Explain how the three forms $$\\cosh 2x = 2\\cosh^2 x - 1 = 1 + 2\\sinh^2 x = \\cosh^2 x + \\sinh^2 x$$ are all true, and how to convert between them. (3 steps)", "answer": "- Step 1: All three come from the addition formula $$\\cosh 2x = \\cosh^2 x + \\sinh^2 x$$ combined with $$\\cosh^2 x - \\sinh^2 x = 1$$.\n- Step 2: Eliminate $$\\sinh^2 x$$ using $$\\sinh^2 x = \\cosh^2 x - 1$$: $$\\cosh 2x = \\cosh^2 x + (\\cosh^2 x - 1) = 2\\cosh^2 x - 1$$.\n- Step 3: Eliminate $$\\cosh^2 x$$ using $$\\cosh^2 x = 1 + \\sinh^2 x$$: $$\\cosh 2x = (1 + \\sinh^2 x) + \\sinh^2 x = 1 + 2\\sinh^2 x$$.\n\nAll three are equivalent — choose whichever form leaves you with one type of hyperbolic function for the problem at hand.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "A student claims: \"since $$\\cosh x \\geq 1$$, the equation $$\\cosh x = 0.5$$ has no real solutions.\" Is this correct? Explain. (3 steps)", "answer": "- Step 1: Yes — the student is correct. $$\\cosh x = \\dfrac{e^x + e^{-x}}{2}$$ is always at least $$1$$ (by AM-GM, or from $$\\cosh^2 = 1 + \\sinh^2 \\geq 1$$).\n- Step 2: So $$\\cosh x = 0.5 < 1$$ has no real solutions.\n- Step 3: This contrasts with trig: $$\\cos x = 0.5$$ has infinitely many solutions because $$\\cos$$ ranges over $$[-1, 1]$$. Hyperbolic cosine is bounded **below** by 1, but unbounded above.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Identify the substitution that turns $$3\\sinh^2 x - 13\\cosh x + 7 = 0$$ into a quadratic in cosh. Solve it. (3 steps)", "answer": "- Step 1: Use $$\\sinh^2 x = \\cosh^2 x - 1$$ to eliminate sinh: $$3(\\cosh^2 x - 1) - 13\\cosh x + 7 = 0$$, simplifying to $$3\\cosh^2 x - 13\\cosh x + 4 = 0$$.\n- Step 2: Factor: $$(3\\cosh x - 1)(\\cosh x - 4) = 0$$, so $$\\cosh x = 1/3$$ or $$\\cosh x = 4$$.\n- Step 3: $$\\cosh x = 1/3$$ rejected (cosh $$\\geq 1$$); $$\\cosh x = 4$$ gives $$x = \\pm\\ln(4 + \\sqrt{15})$$.\n\nThe key insight: pick the identity that lets you convert everything into a single hyperbolic function.", "source": "Opus 4.7 ①", "_id": "opus_1_83"}, {"question": "Solve $$2\\tanh x = \\cosh x$$. (4 steps)", "answer": "- Step 1: Multiply both sides by $$\\cosh x$$ (positive, no sign issues): $$2\\sinh x = \\cosh^2 x$$.\n- Step 2: Use $$\\cosh^2 x = 1 + \\sinh^2 x$$: $$2\\sinh x = 1 + \\sinh^2 x$$, i.e. $$\\sinh^2 x - 2\\sinh x + 1 = 0$$.\n- Step 3: This factors as $$(\\sinh x - 1)^2 = 0$$, so $$\\sinh x = 1$$ (double root).\n- Step 4: $$x = \\operatorname{arsinh} 1 = \\ln(1 + \\sqrt{2})$$. Single solution — geometrically, the two graphs are tangent here.", "source": "Opus 4.7 ②", "_id": "opus_2_69"}, {"question": "Estimate $$\\sinh 3$$ to one significant figure without a calculator. (3 steps)", "answer": "- Step 1: $$\\sinh 3 = (e^3 - e^{-3})/2$$. For $$x = 3$$, $$e^{-3} \\approx 0.05$$ — negligible compared to $$e^3$$.\n- Step 2: $$e^3 \\approx 20$$ (since $$e \\approx 2.7$$, $$e^2 \\approx 7.4$$, $$e^3 \\approx 7.4 \\times 2.7 \\approx 20$$).\n- Step 3: $$\\sinh 3 \\approx 20/2 = 10$$. (Actual: $$10.02$$ — excellent estimate.)\n\nFor large $$x$$: $$\\sinh x \\approx \\cosh x \\approx e^x/2$$ — a fast and useful approximation.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "Solve the equation $$\\cosh 2x - 5\\sinh x = 13$$. Give answers as natural logarithms. (4 steps)", "answer": "- Step 1: Use the identity $$\\cosh 2x \\equiv 2\\cosh^2 x - 1$$:\n$$2\\cosh^2 x - 1 - 5\\sinh x = 13$$\n$$2\\cosh^2 x - 5\\sinh x - 14 = 0$$\n\n- Step 2: Use $$\\cosh^2 x = 1 + \\sinh^2 x$$:\n$$2(1 + \\sinh^2 x) - 5\\sinh x - 14 = 0$$\n$$2\\sinh^2 x - 5\\sinh x - 12 = 0$$\n\n- Step 3: Factor:\n$$(2\\sinh x + 3)(\\sinh x - 4) = 0$$\n$$\\sinh x = -\\frac{3}{2}$$ or $$\\sinh x = 4$$\n\n- Step 4: Solve each using $$\\operatorname{arsinh} x = \\ln\\left(x + \\sqrt{x^2 + 1}\\right)$$:\n- $$\\sinh x = -\\frac{3}{2}$$: $$x = \\ln\\left(-\\frac{3}{2} + \\sqrt{\\frac{9}{4} + 1}\\right) = \\ln\\left(-\\frac{3}{2} + \\frac{\\sqrt{13}}{2}\\right)$$\n- $$\\sinh x = 4$$: $$x = \\ln(4 + \\sqrt{17})$$\n\n+ Note: Both values are valid as the equation is in terms of $$\\sinh x$$ (not restricted to positive).", "source": "MiniMax ②", "_id": "minimax_2_17"}, {"question": "Show that the argument of $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2 + 1})$$ is always positive, even for negative $$x$$. (3 steps)", "answer": "- Step 1: Need $$x + \\sqrt{x^2 + 1} > 0$$ for the log to be defined.\n- Step 2: If $$x \\geq 0$$: clearly positive (sum of non-negatives, with $$\\sqrt{x^2+1} \\geq 1$$).\n- Step 3: If $$x < 0$$: write $$|x| = -x > 0$$. Then $$\\sqrt{x^2+1} = \\sqrt{|x|^2 + 1} > \\sqrt{|x|^2} = |x| = -x$$. So $$\\sqrt{x^2+1} > -x$$, giving $$x + \\sqrt{x^2+1} > 0$$ ✓.\n\nConclusion: arsinh's log is always defined — domain is all of $$\\mathbb{R}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "State the double-angle formula for $$\\sinh 2A$$ and explain its practical use. (2 steps)", "answer": "- Step 1: From the addition formula with $$B = A$$: $$\\sinh 2A = 2\\sinh A \\cosh A$$. Identical to trig $$\\sin 2A$$.\n- Step 2: Practical use: if you know $$\\sinh x$$, you can find $$\\sinh 2x$$ — but you need $$\\cosh x$$ too. Get $$\\cosh x$$ from the fundamental identity $$\\cosh^2 x = 1 + \\sinh^2 x$$ (taking the positive root, since $$\\cosh \\geq 1$$).", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "Why does the hyperbolic identity $$\\cosh^2 - \\sinh^2 = 1$$ have a *minus*, while the trig identity $$\\cos^2 + \\sin^2 = 1$$ has a *plus*? (3 steps)", "answer": "- Step 1: For trig: $$(\\cos t, \\sin t)$$ lies on circle $$x^2 + y^2 = 1$$ → identity has \"+\".\n- Step 2: For hyperbolic: $$(\\cosh t, \\sinh t)$$ lies on hyperbola $$x^2 - y^2 = 1$$ → identity has \"−\". The sign in the conic equation matches the sign in the identity.\n- Step 3: Algebraic origin: trig uses $$e^{ix}, e^{-ix}$$ (with imaginary $$i$$), hyperbolic uses real $$e^x, e^{-x}$$. The $$i^2 = -1$$ produces the sign flip when expanding squares — this is the deep cause of the sign difference.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Explain why $$\\operatorname{arsinh} x$$ is defined for all real numbers, while $$\\operatorname{arcosh} x$$ is only defined for $$x \\geq 1$$. (2 steps)", "answer": "- Step 1: For $$\\operatorname{arsinh} x$$: We need to solve $$x = \\sinh y = \\frac{e^y - e^{-y}}{2}$$. This equation always has a solution because $$\\sinh y$$ ranges over all real numbers (as $$y \\to \\infty$$, $$\\sinh y \\to \\infty$$; as $$y \\to -\\infty$$, $$\\sinh y \\to -\\infty$$). By the Intermediate Value Theorem, every real $$x$$ is achieved.\n\n- Step 2: For $$\\operatorname{arcosh} x$$: We need to solve $$x = \\cosh y = \\frac{e^y + e^{-y}}{2}$$. Since $$\\cosh y \\geq 1$$ for all real $$y$$ (the minimum is at $$y = 0$$ where $$\\cosh 0 = 1$$), only values $$x \\geq 1$$ are attainable. Values $$x < 1$$ have no real solution.\n\n+ The ranges of the original functions determine the domains of their inverses.", "source": "MiniMax ②", "_id": "minimax_2_30"}, {"question": "In the derivation of $$\\operatorname{arcosh} x$$, we arrive at $$e^y = x \\pm \\sqrt{x^2 - 1}$$. Why do we choose $$e^y = x + \\sqrt{x^2 - 1}$$ to define $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2 - 1})$$, even though both roots are positive? (3 steps)", "answer": "- Step 1: For $$x \\geqslant 1$$, both $$x + \\sqrt{x^2 - 1}$$ and $$x - \\sqrt{x^2 - 1}$$ are indeed positive, so both could mathematically yield a valid $$e^y$$.\n- Step 2: However, recall that to define $$\\operatorname{arcosh} x$$, we restricted the domain of $$\\cosh x$$ to $$x \\geqslant 0$$. This means the range of $$\\operatorname{arcosh} x$$ must be $$y \\geqslant 0$$.\n- Step 3: For all $$x > 1$$, the value $$x - \\sqrt{x^2 - 1}$$ is less than 1, which means $$y = \\ln(x - \\sqrt{x^2 - 1})$$ would be negative. To satisfy the range $$y \\geqslant 0$$, we must take the positive branch where $$e^y \\geqslant 1$$, hence $$e^y = x + \\sqrt{x^2 - 1}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "Solve $$\\sinh x = 5$$ using only the exponential definition (no $$\\operatorname{arsinh}$$ formula). (4 steps)", "answer": "- Step 1: $$\\sinh x = 5 \\Rightarrow \\dfrac{e^x - e^{-x}}{2} = 5$$, so $$e^x - e^{-x} = 10$$.\n- Step 2: Multiply by $$e^x$$: $$e^{2x} - 1 = 10 e^x$$, i.e. $$e^{2x} - 10 e^x - 1 = 0$$.\n- Step 3: Quadratic with $$u = e^x$$: $$u = \\dfrac{10 \\pm\\sqrt{100 + 4}}{2} = 5 \\pm\\sqrt{26}$$.\n- Step 4: We need $$e^x > 0$$. Since $$\\sqrt{26} > 5$$, the negative root is rejected. So $$e^x = 5 + \\sqrt{26}$$, and $$x = \\ln(5 + \\sqrt{26})$$.\n\nThis matches $$\\operatorname{arsinh} 5 = \\ln(5 + \\sqrt{26})$$ — the formula is just a shortcut.", "source": "Opus 4.7 ①", "_id": "opus_1_59"}, {"question": "Why is the form $$R\\cosh(x + \\alpha) = a\\cosh x + b\\sinh x$$ valid? Find $$R$$ and $$\\alpha$$ in terms of $$a, b$$. (4 steps)", "answer": "- Step 1: Expand using addition formula: $$R\\cosh(x + \\alpha) = R\\cosh x\\cosh\\alpha + R\\sinh x\\sinh\\alpha$$.\n- Step 2: Match coefficients: $$R\\cosh\\alpha = a$$ and $$R\\sinh\\alpha = b$$.\n- Step 3: Use $$\\cosh^2\\alpha - \\sinh^2\\alpha = 1$$: $$\\dfrac{a^2 - b^2}{R^2} = 1$$, so $$R = \\sqrt{a^2 - b^2}$$ (requires $$|a| > |b|$$ for $$R$$ real).\n- Step 4: $$\\tanh\\alpha = b/a$$, so $$\\alpha = \\operatorname{artanh}(b/a) = \\tfrac{1}{2}\\ln\\left(\\dfrac{a+b}{a-b}\\right)$$.\n\nThis is the hyperbolic analogue of writing $$a\\cos x + b\\sin x = R\\cos(x - \\alpha)$$ in trigonometry.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "A student says that since $$\\sin x$$ and $$\\cos x$$ have maximum and minimum values of 1 and -1, the hyperbolic functions $$\\sinh x$$ and $$\\cosh x$$ should also be bounded. Explain why this is incorrect. (2 steps)", "answer": "- Step 1: This is a fundamental misconception. Trigonometric functions are periodic and bounded because they are defined using the unit circle — angles are cyclic and repeat.\n\n- Step 2: Hyperbolic functions are defined using exponentials: $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$ and $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$. As $$x \\to \\infty$$, both $$e^x$$ terms dominate, and the functions grow without bound.\n\n+ Only $$\\tanh x$$ and $$\\operatorname{sech} x$$ are bounded (between -1 and 1, and between 0 and 1 respectively) because they are ratios or reciprocals of functions that both grow at the same exponential rate.\n\n+ Visual intuition: $$\\sinh x$$ looks like an \"S\" curve going up to infinity; $$\\cosh x$$ looks like a \"U\" curve going up to infinity. Neither repeats nor oscillates.", "source": "MiniMax ②", "_id": "minimax_2_37"}, {"question": "Derive the logarithmic form $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2 - 1})$$ for $$x \\geq 1$$. Why is the principal value the \"+\" root? (5 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arcosh} x$$ with $$y \\geq 0$$, so $$x = \\cosh y = \\dfrac{e^y + e^{-y}}{2}$$.\n- Step 2: Rearranging: $$e^{2y} - 2x e^y + 1 = 0$$, a quadratic in $$e^y$$.\n- Step 3: Roots: $$e^y = x \\pm \\sqrt{x^2 - 1}$$. **Both** are positive (their product is $$1$$ by Vieta's, sum is $$2x > 0$$).\n- Step 4: But we required $$y \\geq 0$$, i.e. $$e^y \\geq 1$$. The two roots are reciprocals (product $$1$$). Only $$x + \\sqrt{x^2 - 1} \\geq 1$$ for $$x \\geq 1$$; the other root lies in $$(0, 1)$$.\n- Step 5: Hence $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2 - 1})$$. The other root corresponds to the negative branch we excluded.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Solve $$13\\sinh x - 7\\cosh x + 1 = 0$$, giving the answer as a natural logarithm. (4 steps)", "answer": "- Step 1: Substitute exponentials: $$\\frac{13(e^x - e^{-x})}{2} - \\frac{7(e^x + e^{-x})}{2} + 1 = 0$$.\n- Step 2: Combine: $$3e^x - 10e^{-x} + 1 = 0$$. Multiply by $$e^x$$: $$3e^{2x} + e^x - 10 = 0$$.\n- Step 3: Factor: $$(3e^x - 5)(e^x + 2) = 0$$, so $$e^x = 5/3$$ or $$e^x = -2$$.\n- Step 4: Reject $$e^x = -2$$ (impossible for real $$x$$). So $$x = \\ln(5/3)$$. Single solution.", "source": "Opus 4.7 ②", "_id": "opus_2_77"}, {"question": "State Osborn's rule for converting trig identities to hyperbolic identities, including the special exception. (3 steps)", "answer": "- Step 1: Replace $$\\cos$$ with $$\\cosh$$ and $$\\sin$$ with $$\\sinh$$.\n- Step 2: *However*: any product (or implied product) of two $$\\sin$$ terms picks up an extra negative sign: $$\\sin A \\sin B \\to -\\sinh A \\sinh B$$.\n- Step 3: \"Implied product\" means anywhere two sines appear multiplied — even if hidden in compound expressions. Examples:\n+ $$\\tan^2 A = \\sin^2 A / \\cos^2 A$$ contains $$\\sin \\cdot \\sin$$, so $$\\tan^2 A \\to -\\tanh^2 A$$.\n+ $$\\tan A \\tan B = (\\sin A \\sin B)/(\\cos A \\cos B)$$ contains $$\\sin \\cdot \\sin$$, so $$\\to -\\tanh A \\tanh B$$.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "A student writes $$\\frac{\\operatorname{sech}^2 x}{2 - \\operatorname{sech}^2 x} = \\frac{\\operatorname{sech}^2 x}{2} - 1$$ \"by splitting the fraction.\" Identify the error. (2 steps)", "answer": "- Step 1: You cannot split $$\\frac{a}{b - c} = \\frac{a}{b} - \\frac{a}{c}$$ — this is invalid. Splitting only works when the *numerator* is a sum: $$\\frac{a + b}{c} = \\frac{a}{c} + \\frac{b}{c}$$.\n- Step 2: For this expression, a correct approach is to divide top and bottom by $$\\operatorname{sech}^2 x$$: $$\\frac{1}{2/\\operatorname{sech}^2 x - 1} = \\frac{1}{2\\cosh^2 x - 1}$$.\n\nLesson: fractional algebra allows numerator splitting only — denominator splitting is one of the most common manipulation errors.", "source": "Opus 4.7 ②", "_id": "opus_2_60"}, {"question": "Without doing a full calculation, what is the general formula for $$\\sinh(\\ln k)$$ where $$k > 0$$, and why does it always simplify to a rational expression in $$k$$? (2 steps)", "answer": "- Step 1: Substitute into the definition: $$\\sinh(\\ln k) = \\frac{e^{\\ln k} - e^{-\\ln k}}{2} = \\frac{k - \\frac{1}{k}}{2} = \\frac{k^2 - 1}{2k}$$.\n- Step 2: The result is always rational in $$k$$ because $$e^{\\ln k} = k$$ and $$e^{-\\ln k} = \\frac{1}{k}$$ are both rational functions of $$k$$, and taking their difference and halving preserves this. For example, $$\\sinh(\\ln 2) = \\frac{4-1}{4} = \\frac{3}{4}$$ and $$\\sinh(\\ln 3) = \\frac{9-1}{6} = \\frac{8}{6} = \\frac{4}{3}$$.\n\nThis pattern — hyperbolic functions at logarithmic arguments yielding algebraic results — is the reverse of inverse hyperbolic functions yielding logarithms.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "State Osborn's rule for converting trigonometric identities to hyperbolic ones. Why does the rule involve a sign change for products of sin terms? (3 steps)", "answer": "- Step 1: **Osborn's rule**: replace $$\\cos \\to \\cosh$$ and $$\\sin \\to \\sinh$$ — but every **product (or implied product) of two sin terms** picks up a minus sign.\n+ e.g. $$\\sin A\\sin B \\to -\\sinh A \\sinh B$$\n+ $$\\tan^2 A \\to -\\tanh^2 A$$ (because $$\\tan^2 A = \\sin^2 A / \\cos^2 A$$ has an implied $$\\sin \\cdot \\sin$$).\n- Step 2: Underlying reason: $$\\sin x = \\dfrac{e^{ix} - e^{-ix}}{2i}$$ vs $$\\sinh x = \\dfrac{e^x - e^{-x}}{2}$$. Substituting $$x \\to ix$$: $$\\sin(ix) = i\\sinh x$$. Each sin contributes a factor of $$i$$; two sins give $$i^2 = -1$$.\n- Step 3: An even number of sins flips sign; an odd number gives an $$i$$ factor (which is why no real-valued trig identity has a single isolated sin causing a problem).", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Why does $$\\cosh(\\ln k) = \\tfrac{1}{2}(k + 1/k)$$ for any $$k > 0$$? Use this to give fast formulas for $$\\sinh(\\ln k)$$ and $$\\tanh(\\ln k)$$. (3 steps)", "answer": "- Step 1: $$e^{\\ln k} = k$$ and $$e^{-\\ln k} = 1/k$$ for $$k > 0$$.\n- Step 2: $$\\cosh(\\ln k) = \\dfrac{k + 1/k}{2}$$ (sum of $$k$$ and its reciprocal, halved).\n- Step 3: Similarly $$\\sinh(\\ln k) = \\dfrac{k - 1/k}{2}$$ and $$\\tanh(\\ln k) = \\dfrac{k^2 - 1}{k^2 + 1}$$.\n\nThese formulas turn any \"hyperbolic of log\" question into simple arithmetic — no exponentials needed.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "Give intuition for why a hanging chain forms a $$\\cosh$$ curve (catenary), not a parabola. (3 steps)", "answer": "- Step 1: Setup: each tiny piece of chain has weight proportional to its *arc length* (not horizontal length). Horizontal tension is uniform; vertical tension increases with weight hanging below.\n- Step 2: This leads to the differential equation $$y'' = \\frac{1}{a}\\sqrt{1 + (y')^2}$$ — the curvature is proportional to a \"stretch factor\" depending on the slope. Solving gives $$y = a\\cosh(x/a) + C$$.\n- Step 3: A parabola arises from a *different* setup: a suspension bridge where the load (e.g. the road below) is uniform per *horizontal* length, not per arc length. Both curves look similar near the bottom but diverge at extremes — catenary grows exponentially, parabola polynomially.", "source": "Opus 4.7 ②", "_id": "opus_2_61"}, {"question": "Why is $$\\sinh x \\cosh y$$ NOT equal to $$\\tfrac{1}{2}[\\sinh(x+y) + \\sinh(x-y)]$$ — wait, actually it IS. Show this. (3 steps)", "answer": "- Step 1: Use addition formulae: $$\\sinh(x+y) = \\sinh x\\cosh y + \\cosh x\\sinh y$$ and $$\\sinh(x-y) = \\sinh x\\cosh y - \\cosh x\\sinh y$$.\n- Step 2: Add the two: $$\\sinh(x+y) + \\sinh(x-y) = 2\\sinh x\\cosh y$$.\n- Step 3: Divide by 2: $$\\sinh x\\cosh y = \\tfrac{1}{2}[\\sinh(x+y) + \\sinh(x-y)]$$. This is the hyperbolic product-to-sum identity.\n\nThe structure is identical to the trig version $$\\sin x\\cos y = \\tfrac{1}{2}[\\sin(x+y) + \\sin(x-y)]$$ — no Osborn sign change because there's no implied $$\\sin\\cdot\\sin$$ in this combination.", "source": "Opus 4.7 ①", "_id": "opus_1_87"}, {"question": "Why is it called \"arsinh\" rather than \"arcsinh\"? What does the prefix \"ar-\" actually stand for? (3 steps)", "answer": "- Step 1: For inverse trig functions like $$\\arccos$$, the name comes from **arc length** on the unit circle (the arc subtending a given angle).\n- Step 2: For hyperbolic functions, the natural geometric parameter isn't an arc but an **area** in the unit hyperbola $$x^2 - y^2 = 1$$ — twice the area of the hyperbolic sector between origin, $$(\\cosh t, \\sinh t)$$, and the x-axis equals the parameter $$t$$.\n- Step 3: So \"ar-\" is short for \"area\", giving names like *arsinh = area sinh*. Many texts also use $$\\sinh^{-1}$$, but careful — that means inverse function, **not reciprocal**.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "A common confusion: students sometimes write $$\\sinh^{-1} x = \\dfrac{1}{\\sinh x}$$. Why is this wrong? (2 steps)", "answer": "- Step 1: $$\\sinh^{-1} x$$ is **functional inverse notation** — the \"$$-1$$\" denotes inversion of the function, not a power. So $$\\sinh^{-1} x \\equiv \\operatorname{arsinh} x$$, the function whose sinh equals $$x$$.\n- Step 2: The reciprocal $$1/\\sinh x$$ is the entirely different function $$\\operatorname{cosech} x$$ (hyperbolic cosecant).\n\nTo avoid confusion, exam-board notation now prefers writing $$\\operatorname{arsinh}, \\operatorname{arcosh}, \\operatorname{artanh}$$ explicitly.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Show that for any function $$f$$, the formula $$g(x) = (f(x) - f(-x))/2$$ extracts its \"odd part.\" Apply to $$f(x) = e^x$$. (3 steps)", "answer": "- Step 1: Check $$g$$ is odd: $$g(-x) = (f(-x) - f(x))/2 = -(f(x) - f(-x))/2 = -g(x)$$ ✓.\n- Step 2: Define $$h(x) = (f(x) + f(-x))/2$$ — the \"even part.\" Then $$g(x) + h(x) = f(x)$$ — every function decomposes uniquely into even + odd parts.\n- Step 3: For $$f(x) = e^x$$: odd part is $$g(x) = (e^x - e^{-x})/2 = \\sinh x$$; even part is $$h(x) = (e^x + e^{-x})/2 = \\cosh x$$. So sinh and cosh ARE the odd and even parts of $$e^x$$ — that's literally their definition.", "source": "Opus 4.7 ②", "_id": "opus_2_95"}, {"question": "What's the strategic value of the half-angle identity $$\\cosh x = \\dfrac{1 + \\tanh^2(x/2)}{1 - \\tanh^2(x/2)}$$ (and its sinh and tanh siblings)? (3 steps)", "answer": "- Step 1: It expresses cosh in terms of $$t = \\tanh(x/2)$$ alone — so any equation in sinh/cosh/tanh can be turned into a polynomial/rational equation in $$t$$.\n- Step 2: Companion identities: $$\\sinh x = \\dfrac{2t}{1 - t^2}$$ and $$\\tanh x = \\dfrac{2t}{1 + t^2}$$.\n- Step 3: This substitution is useful for definite integrals and equation-solving — it standardizes a \"mixed\" hyperbolic equation into a single-variable rational equation.\n\nThese are the hyperbolic analogues of the Weierstrass $$t = \\tan(x/2)$$ substitution.", "source": "Opus 4.7 ①", "_id": "opus_1_71"}, {"question": "Why does $$\\sinh x \\approx x$$ for small $$x$$, and what's the next correction term? (3 steps)", "answer": "- Step 1: Taylor series of $$e^x$$: $$e^x = 1 + x + \\dfrac{x^2}{2} + \\dfrac{x^3}{6} + \\cdots$$. Subtract $$e^{-x}$$ and divide by 2: $$\\sinh x = x + \\dfrac{x^3}{6} + \\dfrac{x^5}{120} + \\cdots$$ (only odd powers — confirms sinh is odd).\n- Step 2: For small $$x$$: $$\\sinh x \\approx x$$ to leading order, with first correction $$+x^3/6$$.\n- Step 3: Compare with $$\\sin x = x - x^3/6 + \\cdots$$: same leading term, but signs alternate for sin and stay positive for sinh. So locally identical, globally radically different.", "source": "Opus 4.7 ①", "_id": "opus_1_78"}, {"question": "In the $$R\\cosh(x+\\alpha)$$ method for hyperbolic functions, we get $$R^2 = a^2 - b^2$$ (where the expression is $$a\\cosh x + b\\sinh x$$), whereas in the trig $$R\\cos(\\theta+\\alpha)$$ method we get $$R^2 = a^2 + b^2$$. Explain why the sign differs. (2 steps)", "answer": "- Step 1: For $$a\\cosh x + b\\sinh x = R\\cosh(x+\\alpha)$$, expanding gives $$R\\cosh\\alpha\\cosh x + R\\sinh\\alpha\\sinh x$$. So $$a = R\\cosh\\alpha$$ and $$b = R\\sinh\\alpha$$. Then $$a^2 - b^2 = R^2(\\cosh^2\\alpha - \\sinh^2\\alpha) = R^2 \\cdot 1 = R^2$$.\n- Step 2: For trig, $$a\\cos\\theta + b\\sin\\theta = R\\cos(\\theta-\\alpha)$$, expanding gives $$R\\cos\\alpha\\cos\\theta + R\\sin\\alpha\\sin\\theta$$. So $$a = R\\cos\\alpha$$ and $$b = R\\sin\\alpha$$. Then $$a^2 + b^2 = R^2(\\cos^2\\alpha + \\sin^2\\alpha) = R^2 \\cdot 1 = R^2$$. The difference is entirely due to the fundamental identity: $$\\cosh^2 - \\sinh^2 = 1$$ (minus) vs. $$\\cos^2 + \\sin^2 = 1$$ (plus).", "source": "GLM 5.1 ③", "_id": "glm_3_47"}, {"question": "When solving an equation like $$a\\sinh x + b\\cosh x = c$$, there are two main strategies. What are they, and when is each preferable? (3 steps)", "answer": "- Step 1: **Strategy 1 — Exponential substitution**: Replace $$\\sinh x$$ and $$\\cosh x$$ with their exponential definitions, multiply through by $$e^x$$ to get a quadratic in $$e^x$$, then solve. This always works for linear combinations of sinh and cosh.\n- Step 2: **Strategy 2 — Identity substitution**: Use identities like $$\\cosh^2 x - \\sinh^2 x = 1$$ to eliminate one function, reducing to a quadratic in the other. This works when the equation involves *squares* of hyperbolic functions (e.g., $$2\\cosh^2 x - 5\\sinh x = 5$$).\n- Step 3: Strategy 1 is preferable for *linear* equations (no squares) because it directly produces a clean quadratic in $$e^x$$. Strategy 2 is preferable for *quadratic* equations because substituting exponentials into squares produces a quartic in $$e^x$$, which is harder to solve, while identity substitution keeps it quadratic.\n\nExample: $$6\\sinh x - 2\\cosh x = 7$$ → Strategy 1 gives $$2e^{2x} - 7e^x - 4 = 0$$. Example: $$2\\cosh^2 x - 5\\sinh x = 5$$ → Strategy 2 gives $$2\\sinh^2 x - 5\\sinh x - 3 = 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "Summarize the three main strategies for solving hyperbolic equations and when each applies. (3 steps)", "answer": "- Step 1: **Use the fundamental identity** ($$\\cosh^2 - \\sinh^2 = 1$$): if the equation has powers like $$\\sinh^2 x$$ or $$\\cosh^2 x$$ alongside the linear term, convert to one function and solve as a quadratic.\n- Step 2: **Use a double-angle identity**: if the equation has $$\\cosh 2x$$ or $$\\sinh 2x$$, use the appropriate form of the double-angle formula to reduce to one function. Pick the form that matches the other terms.\n- Step 3: **Substitute exponentials directly**: if there's a mix like $$a\\sinh x + b\\cosh x = c$$ with no easy identity, substitute the exp definitions to get a polynomial in $$e^x$$. Multiply by $$e^x$$, solve as a quadratic, reject negative roots.\n\nThe choice is dictated by which terms appear — pick the path that consolidates everything into a single hyperbolic function (or a single $$e^x$$).", "source": "Opus 4.7 ②", "_id": "opus_2_71"}, {"question": "A student says: \"$$\\cosh x$$ is always positive, so $$a\\cosh x + b\\sinh x$$ is always positive for any constants $$a, b$$.\" Give a counterexample. (2 steps)", "answer": "- Step 1: Consider $$a = 1, b = 3$$: $$\\cosh x + 3\\sinh x$$. Express as $$R\\sinh(x+\\alpha)$$ where $$R\\cosh\\alpha = 3$$, $$R\\sinh\\alpha = 1$$. Then $$R^2 = 9 - 1 = 8$$, so $$R = 2\\sqrt{2}$$.\n- Step 2: Since $$\\sinh(x+\\alpha)$$ ranges over all of $$\\mathbb{R}$$, the expression $$2\\sqrt{2}\\sinh(x+\\alpha)$$ also ranges over all of $$\\mathbb{R}$$ — it can be negative. For instance, when $$x$$ is a very large negative number, $$\\sinh x \\approx -\\frac{1}{2}e^{-x}$$ which is very negative, and $$3\\sinh x$$ dominates $$\\cosh x$$, making the whole expression negative. The claim is only true when the expression can be written as $$R\\cosh(x+\\alpha)$$ (which requires $$|a| > |b|$$).", "source": "GLM 5.1 ③", "_id": "glm_3_77"}, {"question": "Prove that $$\\cosh(A - B) \\equiv \\cosh A \\cosh B - \\sinh A \\sinh B$$ using the exponential definitions. (3 steps)", "answer": "- Step 1: Start with the right-hand side:\n$$\\cosh A \\cosh B - \\sinh A \\sinh B = \\frac{e^A + e^{-A}}{2} \\cdot \\frac{e^B + e^{-B}}{2} - \\frac{e^A - e^{-A}}{2} \\cdot \\frac{e^B - e^{-B}}{2}$$\n\n- Step 2: Expand both products:\n$$= \\frac{e^{A+B} + e^{A-B} + e^{-A+B} + e^{-A-B}}{4} - \\frac{e^{A+B} - e^{A-B} - e^{-A+B} + e^{-A-B}}{4}$$\n\n- Step 3: Subtract term by term:\n$$= \\frac{e^{A+B} + e^{A-B} + e^{-A+B} + e^{-A-B} - e^{A+B} + e^{A-B} + e^{-A+B} - e^{-A-B}}{4}$$\n$$= \\frac{2e^{A-B} + 2e^{-A+B}}{4} = \\frac{e^{A-B} + e^{-(A-B)}}{2} = \\cosh(A - B)$$\n\n+ Notice the minus sign in the identity (unlike the plus sign in $$\\cosh(A + B)$$), which comes from the product of the negative terms in the second expansion.", "source": "MiniMax ②", "_id": "minimax_2_23"}, {"question": "A hanging chain has shape $$y = a\\cosh(x/a)$$. What's the physical meaning of $$a$$, and how does increasing $$a$$ change the shape? (3 steps)", "answer": "- Step 1: $$a$$ has units of length (since $$x/a$$ must be dimensionless inside cosh). Physically $$a = T_0/(\\rho g)$$ where $$T_0$$ is horizontal tension, $$\\rho$$ is mass per length, $$g$$ is gravity.\n- Step 2: At $$x = 0$$: $$y = a\\cosh 0 = a$$. So $$a$$ is the height of the lowest point above the chosen origin.\n- Step 3: Increasing $$a$$ flattens the chain (larger characteristic length). As $$a \\to \\infty$$ the chain looks straight; as $$a \\to 0$$ it droops sharply. Curvature at the bottom is $$1/a$$.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "Are hyperbolic functions periodic on $$\\mathbb{R}$$? Compare with their trig counterparts. (2 steps)", "answer": "- Step 1: Trigonometric: $$\\cos$$ and $$\\sin$$ are periodic with period $$2\\pi$$ (oscillatory on the real line).\n- Step 2: Hyperbolic: $$\\cosh$$ and $$\\sinh$$ are *not* periodic on $$\\mathbb{R}$$ — they grow exponentially. They become periodic only if extended to *imaginary* arguments: $$\\cosh(it) = \\cos t$$, $$\\sinh(it) = i\\sin t$$. So periodicity reappears in the imaginary direction, but on $$\\mathbb{R}$$, no periodicity.", "source": "Opus 4.7 ②", "_id": "opus_2_74"}, {"question": "If you sketch $$y = \\cosh 2x$$ and $$y = 2\\cosh x$$ on the same diagram, which curve is \"narrower\" (i.e., reaches its minimum faster) and which is \"taller\" for large $$|x|$$? Explain qualitatively. (2 steps)", "answer": "- Step 1: **Narrower**: $$y = \\cosh 2x$$ is narrower. The argument $$2x$$ means the exponential growth kicks in twice as fast: $$\\cosh 2x \\approx \\frac{1}{2}e^{2|x|}$$ vs. $$2\\cosh x \\approx e^{|x|}$$. For moderate $$|x|$$, the $$e^{2|x|}$$ grows much faster, so the curve rises more steeply from the minimum.\n- Step 2: **At the minimum**: Both pass through $$(0,1)$$ since $$\\cosh 0 = 1$$ and $$2\\cosh 0 = 2$$... wait, $$\\cosh 2(0) = 1$$ but $$2\\cosh 0 = 2$$. So at the origin, $$2\\cosh x$$ is **higher** ($$y = 2$$ vs. $$y = 1$$). But for large $$|x|$$, $$\\cosh 2x \\approx \\frac{1}{2}e^{2|x|}$$ dominates $$2\\cosh x \\approx e^{|x|}$$ since $$e^{2|x|} \\gg e^{|x|}$$. So the curves cross, with $$\\cosh 2x$$ eventually being much taller.", "source": "GLM 5.1 ③", "_id": "glm_3_75"}, {"question": "Why is $$\\operatorname{arcosh} 1 = 0$$, and is this an exception to \"$$\\cosh x = c$$ has two solutions\"? (2 steps)", "answer": "- Step 1: $$\\operatorname{arcosh}(c)$$ is the unique non-negative $$x$$ with $$\\cosh x = c$$. Since $$\\cosh 0 = 1$$, indeed $$\\operatorname{arcosh} 1 = 0$$.\n- Step 2: At $$c = 1$$, the two roots usually expected from $$\\cosh x = c$$ collapse together at $$x = 0$$ — exactly where cosh achieves its minimum. This is a degenerate boundary case: $$c = 1$$ gives one (double) solution; $$c > 1$$ gives two distinct ones; $$c < 1$$ gives none.", "source": "Opus 4.7 ①", "_id": "opus_1_85"}, {"question": "Given that $$13\\cosh x + 5\\sinh x = R\\cosh(x+\\alpha)$$, explain the method to find $$R$$ and $$\\alpha$$. What identity do you use, and how does it compare to the trig $$R\\cos(\\theta+\\alpha)$$ method? (3 steps)", "answer": "- Step 1: Expand the RHS using the addition formula: $$R\\cosh(x+\\alpha) = R[\\cosh x \\cosh \\alpha + \\sinh x \\sinh \\alpha]$$. Compare coefficients of $$\\cosh x$$ and $$\\sinh x$$ with the LHS: $$R\\cosh\\alpha = 13$$ and $$R\\sinh\\alpha = 5$$.\n- Step 2: To find $$R$$: $$R^2(\\cosh^2\\alpha - \\sinh^2\\alpha) = R^2(1) = 13^2 - 5^2 = 169 - 25 = 144$$, so $$R = 12$$. (Note: we use $$\\cosh^2 - \\sinh^2 = 1$$, whereas in trig we'd use $$\
