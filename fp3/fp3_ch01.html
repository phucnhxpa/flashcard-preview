 what are its asymptotes? (3 steps)", "answer": "- Step 1: Since $$\\operatorname{sech} x = \\frac{1}{\\cosh x}$$, and $$\\cosh x$$ has its minimum at $$x=0$$ where $$\\cosh 0 = 1$$, the reciprocal $$\\operatorname{sech} x$$ has its **maximum** at $$x = 0$$ with value $$\\operatorname{sech} 0 = 1$$.\n- Step 2: $$\\operatorname{sech} x$$ is **even** (reciprocal of an even function), so symmetric about the $$y$$-axis. The graph looks like a bell-shaped curve peaking at $$(0,1)$$.\n- Step 3: As $$x \\to \\pm\\infty$$, $$\\cosh x \\to \\infty$$, so $$\\operatorname{sech} x \\to 0$$. The $$x$$-axis ($$y = 0$$) is an asymptote. The range is $$(0, 1]$$ — note: 0 is never reached (only approached), but 1 is attained.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Sketch the graph of $$y = \\operatorname{cosech} x$$ for $$x \\neq 0$$. What are the asymptotes, and why is $$x = 0$$ excluded? (3 steps)", "answer": "- Step 1: $$\\operatorname{cosech} x = \\frac{1}{\\sinh x}$$. Since $$\\sinh 0 = 0$$, the function is **undefined at $$x = 0$$**. As $$x \\to 0^+$$, $$\\sinh x \\to 0^+$$, so $$\\operatorname{cosech} x \\to +\\infty$$. As $$x \\to 0^-$$, $$\\sinh x \\to 0^-$$, so $$\\operatorname{cosech} x \\to -\\infty$$.\n- Step 2: **Symmetry**: $$\\sinh x$$ is odd, so its reciprocal is also odd. The graph has rotational symmetry about the origin. The $$y$$-axis ($$x = 0$$) is a vertical asymptote.\n- Step 3: As $$x \\to \\pm\\infty$$, $$\\sinh x \\to \\pm\\infty$$, so $$\\operatorname{cosech} x \\to 0$$. The $$x$$-axis is a horizontal asymptote. The graph looks like two curves, one in the first quadrant (decreasing from $$+\\infty$$ to 0) and one in the third quadrant (increasing from $$-\\infty$$ to 0).", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Sketch the graph of $$y = \\operatorname{coth} x$$ for $$x \\neq 0$$. What are all three asymptotes, and what is the range? (3 steps)", "answer": "- Step 1: $$\\operatorname{coth} x = \\frac{1}{\\tanh x}$$. Since $$\\tanh 0 = 0$$, the function is undefined at $$x = 0$$. As $$x \\to 0^+$$, $$\\tanh x \\to 0^+$$, so $$\\operatorname{coth} x \\to +\\infty$$. As $$x \\to 0^-$$, $$\\tanh x \\to 0^-$$, so $$\\operatorname{coth} x \\to -\\infty$$. The $$y$$-axis is a vertical asymptote.\n- Step 2: As $$x \\to +\\infty$$, $$\\tanh x \\to 1^-$$, so $$\\operatorname{coth} x \\to 1^+$$. As $$x \\to -\\infty$$, $$\\tanh x \\to -1^+$$, so $$\\operatorname{coth} x \\to -1^-$$. The horizontal asymptotes are $$y = 1$$ and $$y = -1$$.\n- Step 3: The range is $$(-\\infty, -1) \\cup (1, \\infty)$$. Notice this is the **complement** of the range of $$\\tanh x$$ (which is $$(-1,1)$$). The graph never enters the band $$-1 < y < 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "What is the range of $$\\sinh x$$, $$\\cosh x$$, and $$\\tanh x$$? State each and briefly justify. (3 steps)", "answer": "- Step 1: **$$\\sinh x$$**: Range is $$\\mathbb{R}$$ (all real numbers). As $$x \\to +\\infty$$, $$\\sinh x \\to +\\infty$$; as $$x \\to -\\infty$$, $$\\sinh x \\to -\\infty$$; and $$\\sinh x$$ is continuous and strictly increasing, so it hits every value in between.\n- Step 2: **$$\\cosh x$$**: Range is $$[1, \\infty)$$. The minimum is at $$x=0$$ where $$\\cosh 0 = 1$$, and it grows without bound in both directions.\n- Step 3: **$$\\tanh x$$**: Range is $$(-1, 1)$$, an open interval. It approaches but never reaches $$\\pm 1$$. These bounds come from the fact that $$|\\sinh x| < \\cosh x$$ for all finite $$x$$ (since $$\\cosh^2 x - \\sinh^2 x = 1 > 0$$ implies $$\\cosh x > |\\sinh x|$$).", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "To define an inverse for $$\\cosh x$$, the domain must be restricted. Why, and to what domain? What is the resulting domain and range of $$\\operatorname{arcosh} x$$? (3 steps)", "answer": "- Step 1: $$\\cosh x$$ is **not one-to-one** on its full domain because it's even — both $$x$$ and $$-x$$ give the same value. A function must be one-to-one to have an inverse.\n- Step 2: We restrict to $$x \\geq 0$$, the right branch of the catenary. On this restricted domain, $$\\cosh x$$ is strictly increasing from 1 to $$\\infty$$, so it's one-to-one.\n- Step 3: The inverse function $$\\operatorname{arcosh} x$$ therefore has domain $$x \\geq 1$$ (the range of the restricted $$\\cosh x$$) and range $$x \\geq 0$$ (the domain we restricted to). This is why $$\\operatorname{arcosh} x$$ is always **non-negative**.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Why does $$\\sinh x$$ not need a domain restriction to define its inverse $$\\operatorname{arsinh} x$$? What are the domain and range of $$\\operatorname{arsinh} x$$? (2 steps)", "answer": "- Step 1: $$\\sinh x$$ is **strictly increasing** on all of $$\\mathbb{R}$$ (its derivative $$\\cosh x > 0$$ for all $$x$$), and it's already one-to-one. No restriction is needed.\n- Step 2: Since the range of $$\\sinh x$$ is all of $$\\mathbb{R}$$, the domain of $$\\operatorname{arsinh} x$$ is $$\\mathbb{R}$$. Since the domain of $$\\sinh x$$ is $$\\mathbb{R}$$, the range of $$\\operatorname{arsinh} x$$ is also $$\\mathbb{R}$$. The graph of $$y = \\operatorname{arsinh} x$$ is the reflection of $$y = \\sinh x$$ in $$y = x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "What is the domain restriction for $$\\operatorname{artanh} x$$, and why? (2 steps)", "answer": "- Step 1: The range of $$\\tanh x$$ is $$(-1, 1)$$, so $$\\tanh x$$ only takes values strictly between $$-1$$ and $$1$$. Therefore the domain of its inverse $$\\operatorname{artanh} x$$ is $$|x| < 1$$.\n- Step 2: $$\\tanh x$$ is strictly increasing and one-to-one on $$\\mathbb{R}$$, so no domain restriction is needed on the original function — but the inverse only makes sense for inputs in the range of the original. At $$x = \\pm 1$$, the logarithmic form $$\\frac{1}{2}\\ln\\frac{1+x}{1-x}$$ would involve $$\\ln 0$$ or $$\\ln(\\infty)$$, confirming the boundary.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "Derive the logarithmic form $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2 + 1})$$. Walk through the full derivation. (5 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arsinh} x$$, so $$x = \\sinh y = \\frac{e^y - e^{-y}}{2}$$. Multiply through by 2: $$e^y - e^{-y} = 2x$$.\n- Step 2: Multiply both sides by $$e^y$$: $$e^{2y} - 1 = 2xe^y$$, i.e., $$e^{2y} - 2xe^y - 1 = 0$$. This is a quadratic in $$e^y$$.\n- Step 3: Complete the square: $$(e^y - x)^2 - x^2 - 1 = 0$$, so $$(e^y - x)^2 = x^2 + 1$$, giving $$e^y = x \\pm \\sqrt{x^2 + 1}$$.\n- Step 4: Reject the negative root: $$x - \\sqrt{x^2+1}$$ is always negative (since $$\\sqrt{x^2+1} > |x| \\geq x$$), and $$e^y > 0$$. So $$e^y = x + \\sqrt{x^2 + 1}$$.\n- Step 5: Take natural logs: $$y = \\ln(x + \\sqrt{x^2 + 1})$$. Therefore $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2 + 1})$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "Derive the logarithmic form $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2 - 1})$$ for $$x \\geq 1$$. Walk through the full derivation. (5 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arcosh} x$$, so $$x = \\cosh y = \\frac{e^y + e^{-y}}{2}$$. Multiply by 2: $$e^y + e^{-y} = 2x$$.\n- Step 2: Multiply by $$e^y$$: $$e^{2y} + 1 = 2xe^y$$, i.e., $$e^{2y} - 2xe^y + 1 = 0$$. This is a quadratic in $$e^y$$.\n- Step 3: Complete the square: $$(e^y - x)^2 - x^2 + 1 = 0$$, so $$(e^y - x)^2 = x^2 - 1$$, giving $$e^y = x \\pm \\sqrt{x^2 - 1}$$.\n- Step 4: Both roots are positive (for $$x \\geq 1$$), but we choose the $$+$$ sign because $$\\operatorname{arcosh} x \\geq 0$$ by convention. The root $$x - \\sqrt{x^2-1}$$ gives a value of $$y$$ that is negative (since $$x - \\sqrt{x^2-1} < 1$$ for $$x > 1$$, meaning $$y < 0$$), which is outside the range of $$\\operatorname{arcosh} x$$.\n- Step 5: So $$e^y = x + \\sqrt{x^2 - 1}$$, and $$y = \\ln(x + \\sqrt{x^2 - 1})$$. Therefore $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2 - 1})$$.\n\nNote: The other root gives $$\\ln(x - \\sqrt{x^2-1})$$, which is the negative value of $$y$$ corresponding to the left branch of $$\\cosh x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Derive the logarithmic form $$\\operatorname{artanh} x = \\frac{1}{2}\\ln\\frac{1+x}{1-x}$$ for $$|x| < 1$$. (4 steps)", "answer": "- Step 1: Let $$y = \\operatorname{artanh} x$$, so $$x = \\tanh y = \\frac{e^y - e^{-y}}{e^y + e^{-y}}$$. Multiply top and bottom by $$e^y$$: $$x = \\frac{e^{2y} - 1}{e^{2y} + 1}$$.\n- Step 2: Cross-multiply: $$x(e^{2y} + 1) = e^{2y} - 1$$, so $$xe^{2y} + x = e^{2y} - 1$$.\n- Step 3: Collect terms: $$e^{2y} - xe^{2y} = x + 1$$, so $$e^{2y}(1 - x) = 1 + x$$, giving $$e^{2y} = \\frac{1+x}{1-x}$$.\n- Step 4: Take logs: $$2y = \\ln\\frac{1+x}{1-x}$$, so $$y = \\frac{1}{2}\\ln\\frac{1+x}{1-x}$$. Therefore $$\\operatorname{artanh} x = \\frac{1}{2}\\ln\\frac{1+x}{1-x}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "A common misconception: people think $$\\operatorname{arcosh} x$$ should give two values since $$\\cosh x = k$$ has two solutions ($$x$$ and $$-x$$). Why does $$\\operatorname{arcosh} x$$ give only one value? (2 steps)", "answer": "- Step 1: By definition, $$\\operatorname{arcosh} x$$ is the inverse of the **restricted** function $$\\cosh x$$ with domain $$x \\geq 0$$. On this restricted domain, $$\\cosh x$$ is one-to-one, so its inverse is a proper function returning a single value.\n- Step 2: The convention is that $$\\operatorname{arcosh} x$$ returns the **non-negative** value. If you solve $$\\cosh y = k$$ without the restriction, you get $$y = \\pm \\ln(x + \\sqrt{x^2-1})$$ — but only the positive one is $$\\operatorname{arcosh} x$$. This is analogous to how $$\\arccos x$$ returns values in $$[0,\\pi]$$ even though $$\\cos \\theta = k$$ has infinitely many solutions.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "In the derivation of $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2+1})$$, we rejected $$e^y = x - \\sqrt{x^2+1}$$. In the derivation of $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2-1})$$, we also rejected a root. Explain the *different* reasons for rejection in each case. (2 steps)", "answer": "- Step 1: For $$\\operatorname{arsinh} x$$: $$x - \\sqrt{x^2+1} < 0$$ for all real $$x$$ (since $$\\sqrt{x^2+1} > |x|$$). But $$e^y$$ must be positive, so this root is **mathematically impossible** — it's rejected because it would give a negative value for an exponential.\n- Step 2: For $$\\operatorname{arcosh} x$$: Both $$x + \\sqrt{x^2-1}$$ and $$x - \\sqrt{x^2-1}$$ are positive (for $$x \\geq 1$$), so both give valid positive values of $$e^y$$. The root $$x - \\sqrt{x^2-1}$$ is rejected **by convention** because it yields $$y < 0$$, which is outside the range $$y \\geq 0$$ of $$\\operatorname{arcosh} x$$ (defined as the inverse of $$\\cosh x, x \\geq 0$$).", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "Prove the fundamental identity $$\\cosh^2 A - \\sinh^2 A \\equiv 1$$ directly from the exponential definitions. (3 steps)", "answer": "- Step 1: Write out both squares: $$\\cosh^2 A = \\left(\\frac{e^A + e^{-A}}{2}\\right)^2 = \\frac{e^{2A} + 2 + e^{-2A}}{4}$$ and $$\\sinh^2 A = \\left(\\frac{e^A - e^{-A}}{2}\\right)^2 = \\frac{e^{2A} - 2 + e^{-2A}}{4}$$.\n- Step 2: Subtract: $$\\cosh^2 A - \\sinh^2 A = \\frac{e^{2A} + 2 + e^{-2A}}{4} - \\frac{e^{2A} - 2 + e^{-2A}}{4} = \\frac{(e^{2A} + 2 + e^{-2A}) - (e^{2A} - 2 + e^{-2A})}{4}$$.\n- Step 3: The $$e^{2A}$$ and $$e^{-2A}$$ terms cancel, leaving $$\\frac{4}{4} = 1$$. The key insight: the cross terms $$\\pm 2e^A \\cdot e^{-A} = \\pm 2$$ are what create the difference. Compare with the trig identity $$\\cos^2 A + \\sin^2 A = 1$$ where the signs are different.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "The trig identity is $$\\cos^2 A + \\sin^2 A = 1$$ but the hyperbolic identity is $$\\cosh^2 A - \\sinh^2 A = 1$$ — a minus sign instead of plus. Intuitively, *why* does the sign flip? (2 steps)", "answer": "- Step 1: In the trig case, expanding $$(\\cos A + i\\sin A)^2$$ using Euler's formula gives $$\\cos^2 A - \\sin^2 A + 2i\\sin A\\cos A$$. The identity $$\\cos^2 + \\sin^2 = 1$$ comes from the real part of $$|e^{iA}|^2 = 1$$. The squared magnitudes **add** because the imaginary unit $$i$$ introduces a sign flip in the cross terms that makes them cancel constructively.\n- Step 2: For hyperbolic functions, there's no $$i$$. Expanding $$\\cosh^2 A = \\frac{(e^A+e^{-A})^2}{4}$$ gives a $$+2$$ cross term, while $$\\sinh^2 A = \\frac{(e^A-e^{-A})^2}{4}$$ gives a $$-2$$ cross term. Without the imaginary unit, the cross terms have the *same* structure as the squared terms, so they subtract rather than add. The sign flip is a direct consequence of removing $$i$$ from the exponential definitions.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "Prove the addition formula $$\\sinh(A+B) \\equiv \\sinh A \\cosh B + \\cosh A \\sinh B$$ from the exponential definitions. (4 steps)", "answer": "- Step 1: Start from the RHS: $$\\sinh A \\cosh B + \\cosh A \\sinh B = \\frac{e^A - e^{-A}}{2} \\cdot \\frac{e^B + e^{-B}}{2} + \\frac{e^A + e^{-A}}{2} \\cdot \\frac{e^B - e^{-B}}{2}$$.\n- Step 2: Expand both products. First: $$\\frac{e^{A+B} + e^{A-B} - e^{-A+B} - e^{-A-B}}{4}$$. Second: $$\\frac{e^{A+B} - e^{A-B} + e^{-A+B} - e^{-A-B}}{4}$$.\n- Step 3: Add them: $$\\frac{2e^{A+B} - 2e^{-(A+B)}}{4}$$ (the $$e^{A-B}$$ and $$e^{-A+B}$$ terms cancel: $$+1-1$$ and $$-1+1$$).\n- Step 4: This simplifies to $$\\frac{e^{A+B} - e^{-(A+B)}}{2} = \\sinh(A+B)$$. The structure is identical to the trig addition formula, with no sign changes — this is because $$\\sinh$$ addition has no \"product of two sin terms.\"", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "State the addition formula for $$\\cosh(A+B)$$. How does the sign pattern compare to the trigonometric formula $$\\cos(A+B) = \\cos A \\cos B - \\sin A \\sin B$$? (2 steps)", "answer": "- Step 1: $$\\cosh(A+B) \\equiv \\cosh A \\cosh B + \\sinh A \\sinh B$$. The sign between the two terms is **plus**, whereas in the trig formula it's **minus**.\n- Step 2: This sign flip is explained by Osborn's rule: the term $$\\sin A \\sin B$$ is a product of two sine terms, so when converting to hyperbolic, it becomes $$-\\sinh A \\sinh B$$. But the original trig formula has a **minus** sign: $$\\cos A \\cos B - \\sin A \\sin B$$. So: $$\\cosh A \\cosh B - (-\\sinh A \\sinh B) = \\cosh A \\cosh B + \\sinh A \\sinh B$$. Two negatives make a plus!", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "What is Osborn's rule? State it precisely and give a concrete example of its application. (3 steps)", "answer": "- Step 1: **Osborn's rule**: To convert a trigonometric identity to the corresponding hyperbolic identity, replace $$\\cos$$ with $$\\cosh$$ and $$\\sin$$ with $$\\sinh$$. However, any **product (or implied product) of two sine terms** must be replaced by **minus** the product of the corresponding two $$\\sinh$$ terms.\n- Step 2: Example: The trig identity $$\\cos 2A \\equiv 1 - 2\\sin^2 A$$. The term $$\\sin^2 A$$ is an implied product of two sine terms ($$\\sin A \\times \\sin A$$). Applying Osborn's rule: $$\\cosh 2A \\equiv 1 - 2(-\\sinh^2 A) = 1 + 2\\sinh^2 A$$.\n- Step 3: Another example: $$\\tan(A-B) \\equiv \\frac{\\tan A - \\tan B}{1 + \\tan A \\tan B}$$. The term $$\\tan A \\tan B = \\frac{\\sin A \\sin B}{\\cos A \\cos B}$$ contains a product of two sine terms. So: $$\\tanh(A-B) \\equiv \\frac{\\tanh A - \\tanh B}{1 - \\tanh A \\tanh B}$$ (the $$+$$ becomes $$-$$).", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "A student applies Osborn's rule to $$\\cos 2A \\equiv \\cos^2 A - \\sin^2 A$$ and writes $$\\cosh 2A \\equiv \\cosh^2 A - \\sinh^2 A$$. What's wrong? (2 steps)", "answer": "- Step 1: The term $$\\sin^2 A$$ is a product of two sine terms (i.e., $$\\sin A \\times \\sin A$$). By Osborn's rule, this must become **$$-\\sinh^2 A$$**, not $$+\\sinh^2 A$$.\n- Step 2: The correct hyperbolic identity is $$\\cosh 2A \\equiv \\cosh^2 A + \\sinh^2 A$$ (the minus becomes plus). This is consistent with the fundamental identity: since $$\\cosh^2 A - \\sinh^2 A = 1$$, we get $$\\cosh^2 A = 1 + \\sinh^2 A$$, so $$\\cosh 2A = (1 + \\sinh^2 A) + \\sinh^2 A = 1 + 2\\sinh^2 A$$, or equivalently $$\\cosh^2 A + \\sinh^2 A$$.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "Use Osborn's rule to convert the trig identity $$\\cos 2A \\equiv \\frac{1-\\tan^2 A}{1+\\tan^2 A}$$ to its hyperbolic form. (3 steps)", "answer": "- Step 1: Identify products of two sine terms. Since $$\\tan^2 A = \\frac{\\sin^2 A}{\\cos^2 A}$$, each occurrence of $$\\tan^2 A$$ is an implied product of two sine terms.\n- Step 2: Replace $$\\cos \\to \\cosh$$, $$\\sin \\to \\sinh$$, and negate each $$\\tan^2 A$$: $$\\cosh 2A \\equiv \\frac{1 - (-\\tanh^2 A)}{1 + (-\\tanh^2 A)}$$.\n- Step 3: Simplify: $$\\cosh 2A \\equiv \\frac{1 + \\tanh^2 A}{1 - \\tanh^2 A}$$. This can be verified: using $$\\tanh^2 A = 1 - \\operatorname{sech}^2 A$$ and $$\\cosh 2A = 2\\cosh^2 A - 1$$, the algebra checks out.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "State the three double-angle identities for $$\\cosh 2A$$ (analogous to the three forms of $$\\cos 2A$$). (1 step)", "answer": "- Step 1: The three forms are:\n+ $$\\cosh 2A \\equiv \\cosh^2 A + \\sinh^2 A$$ (analogous to $$\\cos 2A = \\cos^2 A - \\sin^2 A$$, with the sign of $$\\sinh^2$$ flipped by Osborn's rule)\n+ $$\\cosh 2A \\equiv 2\\cosh^2 A - 1$$ (obtained by substituting $$\\cosh^2 A - \\sinh^2 A = 1$$, i.e., replacing $$+\\sinh^2 A$$ with $$\\cosh^2 A - 1$$)\n+ $$\\cosh 2A \\equiv 1 + 2\\sinh^2 A$$ (obtained by replacing $$\\cosh^2 A$$ with $$1 + \\sinh^2 A$$)\n\nNote the key difference from trig: in the trig case, $$\\cos 2A = 1 - 2\\sin^2 A$$, but here $$\\cosh 2A = 1 + 2\\sinh^2 A$$. The sign of the $$\\sinh^2$$ term is always flipped relative to the trig version.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "Given $$\\sinh x = \\frac{3}{4}$$, find the exact value of $$\\cosh x$$. Why must you choose the positive root? (3 steps)", "answer": "- Step 1: Use the identity $$\\cosh^2 x - \\sinh^2 x = 1$$, so $$\\cosh^2 x = 1 + \\sinh^2 x = 1 + \\frac{9}{16} = \\frac{25}{16}$$.\n- Step 2: This gives $$\\cosh x = \\pm\\frac{5}{4}$$. But we must choose $$\\cosh x = \\frac{5}{4}$$.\n- Step 3: The reason: $$\\cosh x \\geq 1$$ for all real $$x$$ (the minimum of $$\\cosh x$$ is 1 at $$x = 0$$). The negative value is impossible. This is a key difference from trigonometry, where $$\\cos x$$ can be negative.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "Given $$\\sinh x = \\frac{3}{4}$$, find the exact values of $$\\tanh x$$ and $$\\sinh 2x$$. (3 steps)", "answer": "- Step 1: From the previous question, $$\\cosh x = \\frac{5}{4}$$. So $$\\tanh x = \\frac{\\sinh x}{\\cosh x} = \\frac{3/4}{5/4} = \\frac{3}{5}$$.\n- Step 2: Use the double angle formula: $$\\sinh 2x = 2\\sinh x \\cosh x = 2 \\times \\frac{3}{4} \\times \\frac{5}{4} = \\frac{30}{16} = \\frac{15}{8}$$.\n- Step 3: Quick sanity check: since $$\\sinh x = 0.75 > 0$$, we expect $$x > 0$$, so $$\\tanh x$$ should be positive (✓) and $$\\sinh 2x$$ should be positive (✓ since $$2x > 0$$).", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "Solve the equation $$6\\sinh x - 2\\cosh x = 7$$ for real $$x$$. Give the answer as a natural logarithm. (5 steps)", "answer": "- Step 1: There's no single identity that reduces this to one hyperbolic function, so use exponential definitions: $$6 \\cdot \\frac{e^x - e^{-x}}{2} - 2 \\cdot \\frac{e^x + e^{-x}}{2} = 7$$.\n- Step 2: Simplify: $$3(e^x - e^{-x}) - (e^x + e^{-x}) = 7$$, giving $$3e^x - 3e^{-x} - e^x - e^{-x} = 7$$, so $$2e^x - 4e^{-x} = 7$$.\n- Step 3: Multiply through by $$e^x$$: $$2e^{2x} - 4 = 7e^x$$, i.e., $$2e^{2x} - 7e^x - 4 = 0$$.\n- Step 4: Factor: this is a quadratic in $$e^x$$: $$(2e^x + 1)(e^x - 4) = 0$$, so $$e^x = -\\frac{1}{2}$$ or $$e^x = 4$$.\n- Step 5: $$e^x = -\\frac{1}{2}$$ is impossible (exponential is always positive). So $$e^x = 4$$, giving $$x = \\ln 4$$.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "Solve $$2\\cosh^2 x - 5\\sinh x = 5$$, giving answers as natural logarithms. (5 steps)", "answer": "- Step 1: Use the identity $$\\cosh^2 x = 1 + \\sinh^2 x$$ to convert to a single variable: $$2(1 + \\sinh^2 x) - 5\\sinh x = 5$$.\n- Step 2: Expand: $$2 + 2\\sinh^2 x - 5\\sinh x = 5$$, so $$2\\sinh^2 x - 5\\sinh x - 3 = 0$$.\n- Step 3: Factor: $$(2\\sinh x + 1)(\\sinh x - 3) = 0$$, giving $$\\sinh x = -\\frac{1}{2}$$ or $$\\sinh x = 3$$.\n- Step 4: Using $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2+1})$$:\n+ $$\\sinh x = -\\frac{1}{2}$$: $$x = \\ln\\left(-\\frac{1}{2} + \\sqrt{\\frac{1}{4}+1}\\right) = \\ln\\left(-\\frac{1}{2} + \\frac{\\sqrt{5}}{2}\\right) = \\ln\\frac{\\sqrt{5}-1}{2}$$.\n+ $$\\sinh x = 3$$: $$x = \\ln(3 + \\sqrt{10})$$.\n- Step 5: Both solutions are valid since $$\\sinh x$$ has range $$\\mathbb{R}$$ (any real value is achievable). The first answer is valid because $$\\frac{\\sqrt{5}-1}{2} > 0$$ (since $$\\sqrt{5} > 1$$).", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "Solve $$\\cosh 2x - 5\\cosh x + 4 = 0$$, giving answers as natural logarithms where appropriate. (5 steps)", "answer": "- Step 1: Use the double-angle identity $$\\cosh 2x = 2\\cosh^2 x - 1$$: $$2\\cosh^2 x - 1 - 5\\cosh x + 4 = 0$$.\n- Step 2: Simplify: $$2\\cosh^2 x - 5\\cosh x + 3 = 0$$. Factor: $$(2\\cosh x - 3)(\\cosh x - 1) = 0$$.\n- Step 3: So $$\\cosh x = \\frac{3}{2}$$ or $$\\cosh x = 1$$.\n- Step 4: For $$\\cosh x = \\frac{3}{2}$$: Using $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2-1})$$, we get $$x = \\ln\\left(\\frac{3}{2} + \\sqrt{\\frac{9}{4}-1}\\right) = \\ln\\left(\\frac{3}{2} + \\frac{\\sqrt{5}}{2}\\right)$$ or $$x = \\ln\\left(\\frac{3}{2} - \\frac{\\sqrt{5}}{2}\\right)$$. Both are valid since $$\\cosh x = k > 1$$ gives two solutions ($$\\pm$$).\n- Step 5: For $$\\cosh x = 1$$: Since $$\\cosh 0 = 1$$, the solution is $$x = 0$$. (This is the minimum of $$\\cosh x$$, so there's only one solution, not two.)", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "When solving $$\\cosh x = k$$ for $$k > 1$$, why do you get two solutions, but for $$\\cosh x = 1$$ you get only one? (2 steps)", "answer": "- Step 1: The graph of $$y = \\cosh x$$ is a U-shape (catenary) with minimum at $$(0,1)$$. A horizontal line $$y = k$$ for $$k > 1$$ intersects this U in **two points**: one with $$x > 0$$ and one with $$x < 0$$, by symmetry.\n- Step 2: When $$k = 1$$, the horizontal line is **tangent** to the minimum point. It touches the curve at exactly one point: $$x = 0$$. There's no \"second\" intersection because the line just grazes the bottom. For $$k < 1$$, there are no real solutions at all (the line misses the curve entirely).", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "When solving equations like $$a\\sinh x + b\\cosh x = c$$, why is it sometimes better to convert to exponentials rather than use identities? (2 steps)", "answer": "- Step 1: If the equation involves a linear combination of $$\\sinh x$$ and $$\\cosh x$$ (like $$6\\sinh x - 2\\cosh x = 7$$), there's no simple identity that converts this to a single hyperbolic function. The identity $$\\cosh^2 - \\sinh^2 = 1$$ would introduce squares and make things more complicated.\n- Step 2: Converting to exponentials turns the equation into a quadratic in $$e^x$$ (after multiplying by $$e^x$$), which can be solved by factoring or the quadratic formula. The exponential approach is the \"universal solver\" for linear hyperbolic equations — it always works and gives clean logarithmic answers.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "When solving equations like $$2\\cosh^2 x - 5\\sinh x = 5$$, why is it better to use the identity $$\\cosh^2 x = 1 + \\sinh^2 x$$ rather than converting to exponentials? (2 steps)", "answer": "- Step 1: The equation already contains $$\\cosh^2 x$$ and $$\\sinh x$$. Using $$\\cosh^2 x = 1 + \\sinh^2 x$$ converts everything to a single variable $$\\sinh x$$, yielding a quadratic: $$2\\sinh^2 x - 5\\sinh x - 3 = 0$$. This is clean and direct.\n- Step 2: If we instead converted to exponentials, we'd get $$2\\left(\\frac{e^x+e^{-x}}{2}\\right)^2 - 5\\cdot\\frac{e^x-e^{-x}}{2} = 5$$, which involves terms like $$e^{2x}$$, $$e^{-2x}$$, and $$e^x$$, $$e^{-x}$$ — much messier to rearrange into a solvable polynomial. The identity approach exploits the structure of the equation.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "Express $$\\operatorname{arsinh} 1$$ as a natural logarithm. (2 steps)", "answer": "- Step 1: Use the formula $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2+1})$$. With $$x = 1$$: $$\\operatorname{arsinh} 1 = \\ln(1 + \\sqrt{1+1}) = \\ln(1 + \\sqrt{2})$$.\n- Step 2: This cannot be simplified further. The value is approximately $$\\ln(2.414) \\approx 0.881$$, which makes sense: $$\\sinh 0.881 \\approx 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "Express $$\\operatorname{arcosh} 2$$ as a natural logarithm. (2 steps)", "answer": "- Step 1: Use the formula $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2-1})$$. With $$x = 2$$: $$\\operatorname{arcosh} 2 = \\ln(2 + \\sqrt{4-1}) = \\ln(2 + \\sqrt{3})$$.\n- Step 2: This is approximately $$\\ln(3.732) \\approx 1.317$$, consistent with $$\\cosh 1.317 \\approx 2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "Express $$\\operatorname{artanh}\\frac{1}{3}$$ as a natural logarithm. (3 steps)", "answer": "- Step 1: Use the formula $$\\operatorname{artanh} x = \\frac{1}{2}\\ln\\frac{1+x}{1-x}$$. With $$x = \\frac{1}{3}$$: $$\\operatorname{artanh}\\frac{1}{3} = \\frac{1}{2}\\ln\\frac{1+\\frac{1}{3}}{1-\\frac{1}{3}}$$.\n- Step 2: Simplify the fraction: $$\\frac{1+\\frac{1}{3}}{1-\\frac{1}{3}} = \\frac{\\frac{4}{3}}{\\frac{2}{3}} = 2$$.\n- Step 3: So $$\\operatorname{artanh}\\frac{1}{3} = \\frac{1}{2}\\ln 2 = \\ln\\sqrt{2}$$, using the rule $$a\\ln x = \\ln x^a$$.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "Express $$\\operatorname{arsinh}(-3)$$ as a natural logarithm. Does the formula still work for negative arguments? (3 steps)", "answer": "- Step 1: Yes, the formula works for all real $$x$$: $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2+1})$$. With $$x = -3$$: $$\\operatorname{arsinh}(-3) = \\ln(-3 + \\sqrt{9+1}) = \\ln(-3 + \\sqrt{10})$$.\n- Step 2: Is the argument positive? $$\\sqrt{10} \\approx 3.162 > 3$$, so $$-3 + \\sqrt{10} > 0$$. The logarithm is well-defined.\n- Step 3: The result is $$\\ln(\\sqrt{10}-3)$$, which is negative (since $$\\sqrt{10}-3 < 1$$). This makes sense: $$\\operatorname{arsinh}(-3)$$ should be negative because we're asking \"what $$x$$ gives $$\\sinh x = -3$$?\", and since $$\\sinh$$ is odd and increasing, the answer must be negative.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "A student claims that $$\\operatorname{arcosh} x$$ and $$\\operatorname{arsinh} x$$ have the same domain. Is this correct? Explain. (2 steps)", "answer": "- Step 1: No, this is incorrect. $$\\operatorname{arsinh} x$$ has domain $$\\mathbb{R}$$ (all real numbers) because $$\\sinh x$$ has range $$\\mathbb{R}$$. Any real number can be the output of $$\\sinh$$, so any real number can be the input to $$\\operatorname{arsinh}$$.\n- Step 2: $$\\operatorname{arcosh} x$$ has domain $$[1, \\infty)$$ because $$\\cosh x$$ has range $$[1, \\infty)$$. Only values $$\\geq 1$$ can be outputs of $$\\cosh x$$, so only these values can be inputs to $$\\operatorname{arcosh}$$. For $$x < 1$$, $$\\sqrt{x^2-1}$$ would involve the square root of a negative number (in reals), and the equation $$\\cosh y = x$$ has no solution.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "The identity $$\\operatorname{sech}^2 A = 1 - \\tanh^2 A$$ is analogous to the trig identity $$\\sec^2 A = 1 + \\tan^2 A$$. Explain why the sign changes using Osborn's rule. (2 steps)", "answer": "- Step 1: The trig identity $$\\sec^2 A = 1 + \\tan^2 A$$ can be written as $$\\frac{1}{\\cos^2 A} = 1 + \\frac{\\sin^2 A}{\\cos^2 A}$$. The term $$\\tan^2 A = \\frac{\\sin^2 A}{\\cos^2 A}$$ contains a product of two sine terms ($$\\sin A \\times \\sin A$$).\n- Step 2: By Osborn's rule, $$\\tan^2 A \\to -\\tanh^2 A$$ (negate the product of two sine terms). So: $$\\operatorname{sech}^2 A = 1 + (-\\tanh^2 A) = 1 - \\tanh^2 A$$. The plus becomes minus. Similarly, $$\\operatorname{cosech}^2 A = \\coth^2 A - 1$$ (from $$\\csc^2 A = 1 + \\cot^2 A$$, with $$\\cot^2 A = \\frac{\\cos^2 A}{\\sin^2 A}$$ containing $$\\sin^2 A$$ in the denominator — wait, that's the denominator. Actually, $$\\cot^2 A$$ has $$\\cos^2 A$$ on top and $$\\sin^2 A$$ on bottom. The $$\\sin^2 A$$ in the denominator means $$\\coth^2 A$$ has $$\\sinh^2 A$$ in the denominator, which gives a factor of $$-1$$, making it $$-\\coth^2 A$$ in the identity. The correct result is $$\\operatorname{cosech}^2 A = \\coth^2 A - 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "State the two identities involving reciprocal hyperbolic functions: $$\\operatorname{sech}^2 A$$ and $$\\operatorname{cosech}^2 A$$. How do they differ from their trig counterparts? (2 steps)", "answer": "- Step 1: The identities are:\n+ $$\\operatorname{sech}^2 A = 1 - \\tanh^2 A$$ (compare: trig has $$\\sec^2 A = 1 + \\tan^2 A$$, sign flipped)\n+ $$\\operatorname{cosech}^2 A = \\coth^2 A - 1$$ (compare: trig has $$\\csc^2 A = 1 + \\cot^2 A$$, sign flipped and terms swapped)\n- Step 2: In both cases, the trig identity has $$+$$ but the hyperbolic has the equivalent of $$-$$. The rearrangement in the second identity ($$\\coth^2 A - 1$$ instead of $$1 - \\coth^2 A$$) ensures the expression is always positive, since $$\\coth^2 A > 1$$ for all $$x \\neq 0$$ (because $$|\\coth x| > 1$$).", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "Given that $$13\\cosh x + 5\\sinh x = R\\cosh(x+\\alpha)$$, explain the method to find $$R$$ and $$\\alpha$$. What identity do you use, and how does it compare to the trig $$R\\cos(\\theta+\\alpha)$$ method? (3 steps)", "answer": "- Step 1: Expand the RHS using the addition formula: $$R\\cosh(x+\\alpha) = R[\\cosh x \\cosh \\alpha + \\sinh x \\sinh \\alpha]$$. Compare coefficients of $$\\cosh x$$ and $$\\sinh x$$ with the LHS: $$R\\cosh\\alpha = 13$$ and $$R\\sinh\\alpha = 5$$.\n- Step 2: To find $$R$$: $$R^2(\\cosh^2\\alpha - \\sinh^2\\alpha) = R^2(1) = 13^2 - 5^2 = 169 - 25 = 144$$, so $$R = 12$$. (Note: we use $$\\cosh^2 - \\sinh^2 = 1$$, whereas in trig we'd use $$\\cos^2 + \\sin^2 = 1$$ giving $$R^2 = 13^2 + 5^2$$.)\n- Step 3: To find $$\\alpha$$: $$\\tanh\\alpha = \\frac{5}{13}$$, so $$\\alpha = \\operatorname{artanh}\\frac{5}{13} = \\frac{1}{2}\\ln\\frac{1+5/13}{1-5/13} = \\frac{1}{2}\\ln\\frac{18}{8} = \\frac{1}{2}\\ln\\frac{9}{4} = \\ln\\frac{3}{2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": true}, {"question": "In the $$R\\cosh(x+\\alpha)$$ method for hyperbolic functions, we get $$R^2 = a^2 - b^2$$ (where the expression is $$a\\cosh x + b\\sinh x$$), whereas in the trig $$R\\cos(\\theta+\\alpha)$$ method we get $$R^2 = a^2 + b^2$$. Explain why the sign differs. (2 steps)", "answer": "- Step 1: For $$a\\cosh x + b\\sinh x = R\\cosh(x+\\alpha)$$, expanding gives $$R\\cosh\\alpha\\cosh x + R\\sinh\\alpha\\sinh x$$. So $$a = R\\cosh\\alpha$$ and $$b = R\\sinh\\alpha$$. Then $$a^2 - b^2 = R^2(\\cosh^2\\alpha - \\sinh^2\\alpha) = R^2 \\cdot 1 = R^2$$.\n- Step 2: For trig, $$a\\cos\\theta + b\\sin\\theta = R\\cos(\\theta-\\alpha)$$, expanding gives $$R\\cos\\alpha\\cos\\theta + R\\sin\\alpha\\sin\\theta$$. So $$a = R\\cos\\alpha$$ and $$b = R\\sin\\alpha$$. Then $$a^2 + b^2 = R^2(\\cos^2\\alpha + \\sin^2\\alpha) = R^2 \\cdot 1 = R^2$$. The difference is entirely due to the fundamental identity: $$\\cosh^2 - \\sinh^2 = 1$$ (minus) vs. $$\\cos^2 + \\sin^2 = 1$$ (plus).", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "What is the minimum value of $$13\\cosh x + 5\\sinh x$$? Explain why it exists and how you find it. (2 steps)", "answer": "- Step 1: We showed $$13\\cosh x + 5\\sinh x = 12\\cosh(x + \\alpha)$$ where $$R = 12$$. Since $$\\cosh$$ of any real number is $$\\geq 1$$, the minimum value of $$12\\cosh(x+\\alpha)$$ is $$12 \\times 1 = 12$$.\n- Step 2: This minimum occurs when $$\\cosh(x+\\alpha) = 1$$, i.e., when $$x + \\alpha = 0$$, so $$x = -\\alpha = -\\operatorname{artanh}\\frac{5}{13}$$. Note: unlike trigonometric expressions of the form $$R\\cos(\\theta+\\alpha)$$ which can be negative, the expression $$R\\cosh(x+\\alpha)$$ is always positive (since $$\\cosh \\geq 1$$ and $$R > 0$$), so the minimum is always positive.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "A student writes: \"Since $$\\cosh x \\geq 1$$ for all $$x$$, any expression of the form $$a\\cosh x + b\\sinh x$$ has a minimum value.\" Is this always true? Consider $$3\\cosh x + 5\\sinh x$$. (3 steps)", "answer": "- Step 1: Not necessarily — it depends on the relative sizes of $$a$$ and $$b$$. If we express $$3\\cosh x + 5\\sinh x$$ as $$R\\sinh(x + \\alpha)$$ (using the $$\\sinh$$ addition formula), the analysis changes.\n- Step 2: $$3\\cosh x + 5\\sinh x = R\\sinh(x+\\alpha)$$ where $$R\\cosh\\alpha = 5$$ and $$R\\sinh\\alpha = 3$$. Then $$R^2 = 5^2 - 3^2 = 16$$, so $$R = 4$$. Since $$\\sinh$$ takes all real values, $$R\\sinh(x+\\alpha)$$ takes all real values — there is **no minimum**.\n- Step 3: The key distinction: $$R\\cosh(x+\\alpha)$$ always has a minimum (since $$\\cosh \\geq 1$$), but $$R\\sinh(x+\\alpha)$$ has no minimum or maximum (since $$\\sinh$$ ranges over all of $$\\mathbb{R}$$). The form you choose matters. In this case, since $$b > a$$ (i.e., $$5 > 3$$), the $$\\sinh$$ form is natural and the expression has no minimum.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "In Joshua's proof of $$\\frac{1+\\tanh^2 x}{1-\\tanh^2 x} \\equiv 2\\cosh^2 x - 1$$, he writes $$\\operatorname{sech}^2 x \\equiv 1 + \\tanh^2 x$$. What's wrong with this, and what is the correct identity? (2 steps)", "answer": "- Step 1: Joshua used the **tr** identity $$\\sec^2 A = 1 + \\tan^2 A$$ and directly replaced with hyperbolic. But by Osborn's rule, since $$\\tan^2 A$$ is an implied product of two sine terms, it should become $$-\\tanh^2 A$$. The correct hyperbolic identity is $$\\operatorname{sech}^2 A = 1 - \\tanh^2 A$$.\n- Step 2: This error propagates. Joshua then splits the fraction incorrectly and takes the reciprocal of individual terms (another algebra error: $$\\frac{a}{b+c} \\neq \\frac{a}{b} + \\frac{a}{c}$$, and $$\\frac{1}{a+b} \\neq \\frac{1}{a} + \\frac{1}{b}$$). A correct proof would use: $$\\frac{1+\\tanh^2 x}{1-\\tanh^2 x}$$, then substitute $$\\tanh^2 x = 1 - \\operatorname{sech}^2 x$$, simplify, and convert to $$\\cosh$$.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "Provide a correct proof that $$\\frac{1+\\tanh^2 x}{1-\\tanh^2 x} \\equiv 2\\cosh^2 x - 1$$. (4 steps)", "answer": "- Step 1: From the correct identity $$\\operatorname{sech}^2 x = 1 - \\tanh^2 x$$, we get $$\\tanh^2 x = 1 - \\operatorname{sech}^2 x$$. Also, $$1 - \\tanh^2 x = \\operatorname{sech}^2 x$$.\n- Step 2: Substitute into the LHS: $$\\frac{1 + \\tanh^2 x}{1 - \\tanh^2 x} = \\frac{1 + (1 - \\operatorname{sech}^2 x)}{\\operatorname{sech}^2 x} = \\frac{2 - \\operatorname{sech}^2 x}{\\operatorname{sech}^2 x}$$.\n- Step 3: Split the fraction properly: $$\\frac{2}{\\operatorname{sech}^2 x} - \\frac{\\operatorname{sech}^2 x}{\\operatorname{sech}^2 x} = 2\\cosh^2 x - 1$$.\n- Step 4: This matches the RHS. The key steps were: (a) using the correct Osborn-converted identity, and (b) splitting the fraction as a sum of two fractions with the *same* denominator, not splitting the denominator.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": true}, {"question": "Express $$\\operatorname{artanh}\\frac{1}{\\sqrt{3}}$$ as a natural logarithm. (3 steps)", "answer": "- Step 1: Use $$\\operatorname{artanh} x = \\frac{1}{2}\\ln\\frac{1+x}{1-x}$$. With $$x = \\frac{1}{\\sqrt{3}}$$: $$\\operatorname{artanh}\\frac{1}{\\sqrt{3}} = \\frac{1}{2}\\ln\\frac{1+\\frac{1}{\\sqrt{3}}}{1-\\frac{1}{\\sqrt{3}}}$$.\n- Step 2: Simplify: $$\\frac{1+\\frac{1}{\\sqrt{3}}}{1-\\frac{1}{\\sqrt{3}}} = \\frac{\\frac{\\sqrt{3}+1}{\\sqrt{3}}}{\\frac{\\sqrt{3}-1}{\\sqrt{3}}} = \\frac{\\sqrt{3}+1}{\\sqrt{3}-1}$$. Rationalize: multiply by $$\\frac{\\sqrt{3}+1}{\\sqrt{3}+1}$$: $$\\frac{(\\sqrt{3}+1)^2}{3-1} = \\frac{3+2\\sqrt{3}+1}{2} = \\frac{4+2\\sqrt{3}}{2} = 2+\\sqrt{3}$$.\n- Step 3: So $$\\operatorname{artanh}\\frac{1}{\\sqrt{3}} = \\frac{1}{2}\\ln(2+\\sqrt{3}) = \\ln\\sqrt{2+\\sqrt{3}}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "Given $$\\operatorname{artanh} x + \\operatorname{artanh} y = \\ln\\sqrt{3}$$, find $$y$$ in terms of $$x$$. (4 steps)", "answer": "- Step 1: Use the logarithmic form: $$\\frac{1}{2}\\ln\\frac{1+x}{1-x} + \\frac{1}{2}\\ln\\frac{1+y}{1-y} = \\ln\\sqrt{3}$$.\n- Step 2: Combine the logs: $$\\frac{1}{2}\\ln\\left(\\frac{1+x}{1-x} \\cdot \\frac{1+y}{1-y}\\right) = \\frac{1}{2}\\ln 3$$ (since $$\\ln\\sqrt{3} = \\frac{1}{2}\\ln 3$$).\n- Step 3: So $$\\frac{(1+x)(1+y)}{(1-x)(1-y)} = 3$$. Expand: $$\\frac{1+x+y+xy}{1-x-y+xy} = 3$$, so $$1+x+y+xy = 3(1-x-y+xy) = 3-3x-3y+3xy$$.\n- Step 4: Collect terms: $$1+x+y+xy = 3-3x-3y+3xy$$, so $$-2+4x+4y-2xy = 0$$, i.e., $$4y-2xy = 2-4x$$, so $$y(4-2x) = 2-4x$$, giving $$y = \\frac{2-4x}{4-2x} = \\frac{2(1-2x)}{2(2-x)} = \\frac{1-2x}{2-x}$$. Alternatively written as $$y = \\frac{2x-1}{x-2}$$ (multiplying numerator and denominator by $$-1$$).", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "What is the value of $$\\sinh x + \\cosh x$$ in its simplest form? Prove it. (2 steps)", "answer": "- Step 1: $$\\sinh x + \\cosh x = \\frac{e^x - e^{-x}}{2} + \\frac{e^x + e^{-x}}{2} = \\frac{2e^x}{2} = e^x$$.\n- Step 2: This is a remarkably simple result: the sum of sinh and cosh is just $$e^x$$. Similarly, $$\\cosh x - \\sinh x = e^{-x}$$. These two facts are essentially the *inverse* of the definitions — the definitions express $$e^x$$ and $$e^{-x}$$ in terms of $$\\sinh$$ and $$\\cosh$$, and these identities recover the exponentials. The graph of $$y = \\sinh x + \\cosh x$$ is simply the graph of $$y = e^x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "A student sees the identity $$\\sinh 3x \\equiv 3\\sinh x + 4\\sinh^3 x$$ and is surprised it looks exactly like the trig identity $$\\sin 3\\theta = 3\\sin\\theta - 4\\sin^3\\theta$$ but with a sign change. Explain why using Osborn's rule. (2 steps)", "answer": "- Step 1: The trig identity is $$\\sin 3\\theta = 3\\sin\\theta - 4\\sin^3\\theta$$. The term $$\\sin^3\\theta$$ is an implied product of three sine terms. But Osborn's rule says to negate **products of two** sine terms.\n- Step 2: $$\\sin^3\\theta = \\sin\\theta \\cdot \\sin^2\\theta$$. The $$\\sin^2\\theta$$ part is a product of two sine terms, which becomes $$-\\sinh^2 x$$. So $$\\sin^3\\theta \\to \\sinh x \\cdot (-\\sinh^2 x) = -\\sinh^3 x$$. Therefore $$-4\\sin^3\\theta \\to -4(-\\sinh^3 x) = +4\\sinh^3 x$$. The double negation gives us a plus sign: $$\\sinh 3x = 3\\sinh x + 4\\sinh^3 x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": true}, {"question": "Solve $$9\\cosh x - 5\\sinh x = 15$$, giving answers as natural logarithms. Walk through the strategy choice. (5 steps)", "answer": "- Step 1: This is a linear combination of $$\\cosh x$$ and $$\\sinh x$$, so convert to exponentials: $$9\\cdot\\frac{e^x+e^{-x}}{2} - 5\\cdot\\frac{e^x-e^{-x}}{2} = 15$$.\n- Step 2: Multiply by 2: $$9e^x + 9e^{-x} - 5e^x + 5e^{-x} = 30$$, so $$4e^x + 14e^{-x} = 30$$.\n- Step 3: Divide by 2: $$2e^x + 7e^{-x} = 15$$. Multiply by $$e^x$$: $$2e^{2x} + 7 = 15e^x$$, i.e., $$2e^{2x} - 15e^x + 7 = 0$$.\n- Step 4: Factor the quadratic in $$e^x$$: $$(2e^x - 1)(e^x - 7) = 0$$, so $$e^x = \\frac{1}{2}$$ or $$e^x = 7$$.\n- Step 5: Both are positive (valid). So $$x = \\ln\\frac{1}{2} = -\\ln 2$$ or $$x = \\ln 7$$.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": false}, {"question": "Solve $$3\\cosh^2 x + 11\\sinh x = 17$$, giving answers as natural logarithms. (5 steps)", "answer": "- Step 1: Use the identity to convert to one variable. Since $$\\cosh^2 x = 1 + \\sinh^2 x$$: $$3(1 + \\sinh^2 x) + 11\\sinh x = 17$$.\n- Step 2: Expand: $$3 + 3\\sinh^2 x + 11\\sinh x = 17$$, so $$3\\sinh^2 x + 11\\sinh x - 14 = 0$$.\n- Step 3: Factor: $$(3\\sinh x + 14)(\\sinh x - 1) = 0$$, giving $$\\sinh x = -\\frac{14}{3}$$ or $$\\sinh x = 1$$.\n- Step 4: For $$\\sinh x = 1$$: $$x = \\operatorname{arsinh} 1 = \\ln(1+\\sqrt{2})$$. For $$\\sinh x = -\\frac{14}{3}$$: $$x = \\operatorname{arsinh}(-\\frac{14}{3}) = \\ln(-\\frac{14}{3} + \\sqrt{\\frac{196}{9}+1}) = \\ln(-\\frac{14}{3} + \\sqrt{\\frac{205}{9}}) = \\ln(-\\frac{14}{3} + \\frac{\\sqrt{205}}{3})$$.\n- Step 5: Since $$\\sqrt{205} \\approx 14.32 > 14$$, the argument is positive, so this is valid. Both solutions are real since $$\\sinh x$$ can take any real value.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "Solve $$\\sinh 2x - 7\\sinh x = 0$$. (4 steps)", "answer": "- Step 1: Use the identity $$\\sinh 2x = 2\\sinh x \\cosh x$$: $$2\\sinh x \\cosh x - 7\\sinh x = 0$$.\n- Step 2: Factor: $$\\sinh x(2\\cosh x - 7) = 0$$.\n- Step 3: Case 1: $$\\sinh x = 0$$ gives $$x = 0$$ (since $$\\sinh 0 = 0$$ and $$\\sinh$$ is one-to-one). Case 2: $$\\cosh x = \\frac{7}{2}$$.\n- Step 4: For $$\\cosh x = \\frac{7}{2}$$: $$x = \\operatorname{arcosh}\\frac{7}{2} = \\ln\\left(\\frac{7}{2} + \\sqrt{\\frac{49}{4}-1}\\right) = \\ln\\left(\\frac{7}{2} + \\frac{\\sqrt{45}}{2}\\right) = \\ln\\frac{7+3\\sqrt{5}}{2}$$. Since $$\\cosh x = \\frac{7}{2} > 1$$, there are two solutions: $$x = \\pm\\ln\\frac{7+3\\sqrt{5}}{2}$$. Combined with $$x = 0$$, there are three solutions.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "Explain why, when solving $$\\cosh x = k$$, you should never write $$x = \\operatorname{arcosh} k$$ and stop there if you want all real solutions. What should you write instead? (2 steps)", "answer": "- Step 1: $$\\operatorname{arcosh} k$$ gives only the non-negative solution (by definition, the range of $$\\operatorname{arcosh}$$ is $$[0,\\infty)$$). But since $$\\cosh x$$ is even, if $$x = a$$ is a solution, then $$x = -a$$ is also a solution.\n- Step 2: For $$k > 1$$, the complete solution set is $$x = \\pm\\operatorname{arcosh} k = \\pm\\ln(k + \\sqrt{k^2-1})$$. For $$k = 1$$, the only solution is $$x = 0$$. For $$k < 1$$, there are no real solutions. Always check which case applies and give all solutions.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": true}, {"question": "What is the domain and range of $$\\operatorname{arsech} x$$? Explain why the domain of $$\\operatorname{arsech} x$$ is $$(0, 1]$$, not $$[0, 1]$$. (3 steps)", "answer": "- Step 1: $$\\operatorname{sech} x$$ has range $$(0, 1]$$ (it takes values from just above 0 up to 1, achieving 1 at $$x = 0$$). So the domain of $$\\operatorname{arsech} x$$ is $$(0, 1]$$.\n- Step 2: The value 0 is excluded from the domain because $$\\operatorname{sech} x$$ never equals 0 (it approaches 0 as $$x \\to \\pm\\infty$$ but never reaches it). So there's no real $$x$$ with $$\\operatorname{sech} x = 0$$, meaning $$\\operatorname{arsech} 0$$ is undefined.\n- Step 3: The range of $$\\operatorname{arsech} x$$ is $$[0, \\infty)$$, since we restrict $$\\operatorname{sech} x$$ to $$x \\geq 0$$ to make it one-to-one (it's even, so we take the right half).", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": true}, {"question": "What is the domain and range of $$\\operatorname{arcoth} x$$? Explain why the domain is $$|x| > 1$$. (2 steps)", "answer": "- Step 1: $$\\operatorname{coth} x$$ has range $$(-\\infty, -1) \\cup (1, \\infty)$$ — it never takes values in $$[-1, 1]$$. So the domain of $$\\operatorname{arcoth} x$$ is $$|x| > 1$$.\n- Step 2: The range of $$\\operatorname{arcoth} x$$ is $$\\mathbb{R} \\setminus \\{0\\}$$ (all nonzero reals), since $$\\operatorname{coth} x$$ is defined for all $$x \\neq 0$$ and we don't need to restrict the domain of $$\\operatorname{coth} x$$ — it's already one-to-one on $$(-\\infty, 0)$$ and $$(0, \\infty)$$ separately, but we need to choose one branch. By convention, we typically use the branch for $$x > 0$$, giving range $$(0, \\infty)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "A student claims that since $$\\sinh x$$ and $$\\sin x$$ share similar addition formulas, they are essentially the same function. What is fundamentally different about them geometrically and in terms of periodicity? (2 steps)", "answer": "- Step 1: **Periodicity**: $$\\sin x$$ is periodic with period $$2\\pi$$ — it repeats forever. $$\\sinh x$$ is **not periodic** — it grows without bound as $$x \\to +\\infty$$ and decreases without bound as $$x \\to -\\infty$$. This is because the exponentials $$e^x$$ and $$e^{-x}$$ are not periodic.\n- Step 2: **Geometric meaning**: $$\\sin\\theta$$ and $$\\cos\\theta$$ parametrize the unit circle ($$x = \\cos\\theta, y = \\sin\\theta$$ gives $$x^2 + y^2 = 1$$). $$\\sinh t$$ and $$\\cosh t$$ parametrize the unit hyperbola ($$x = \\cosh t, y = \\sinh t$$ gives $$x^2 - y^2 = 1$$). The circle is closed; the hyperbola is open. This is why hyperbolic functions lack periodicity — you can't go \"around\" a hyperbola.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": false}, {"question": "Quick conceptual check: if $$\\cosh x = \\frac{5}{4}$$, what is $$\\sinh x$$? (Assume $$x > 0$$.) (2 steps)", "answer": "- Step 1: Use $$\\cosh^2 x - \\sinh^2 x = 1$$: $$\\sinh^2 x = \\cosh^2 x - 1 = \\frac{25}{16} - 1 = \\frac{9}{16}$$, so $$\\sinh x = \\pm\\frac{3}{4}$$.\n- Step 2: Since $$x > 0$$, $$\\sinh x > 0$$ (because $$\\sinh$$ is strictly increasing and $$\\sinh 0 = 0$$). So $$\\sinh x = \\frac{3}{4}$$. Note: if $$x < 0$$, then $$\\sinh x = -\\frac{3}{4}$$. The sign of $$\\sinh x$$ matches the sign of $$x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": true}, {"question": "Express $$\\operatorname{arsinh} \\sqrt{2}$$ as a natural logarithm. (2 steps)", "answer": "- Step 1: $$\\operatorname{arsinh}\\sqrt{2} = \\ln(\\sqrt{2} + \\sqrt{(\\sqrt{2})^2 + 1}) = \\ln(\\sqrt{2} + \\sqrt{2+1}) = \\ln(\\sqrt{2} + \\sqrt{3})$$.\n- Step 2: This cannot be simplified further. The argument is positive (both terms are positive), so the logarithm is well-defined.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": false}, {"question": "Express $$\\operatorname{arcosh}\\frac{3}{2}$$ as a natural logarithm. (2 steps)", "answer": "- Step 1: $$\\operatorname{arcosh}\\frac{3}{2} = \\ln\\left(\\frac{3}{2} + \\sqrt{\\left(\\frac{3}{2}\\right)^2 - 1}\\right) = \\ln\\left(\\frac{3}{2} + \\sqrt{\\frac{9}{4}-1}\\right) = \\ln\\left(\\frac{3}{2} + \\sqrt{\\frac{5}{4}}\\right)$$.\n- Step 2: $$= \\ln\\left(\\frac{3}{2} + \\frac{\\sqrt{5}}{2}\\right) = \\ln\\frac{3+\\sqrt{5}}{2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "Solve $$4\\cosh x + 13e^{-x} = 11$$ by converting to a quadratic in $$e^x$$. (5 steps)", "answer": "- Step 1: Write $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$: $$4 \\cdot \\frac{e^x+e^{-x}}{2} + 13e^{-x} = 11$$, so $$2e^x + 2e^{-x} + 13e^{-x} = 11$$.\n- Step 2: Simplify: $$2e^x + 15e^{-x} = 11$$. Multiply by $$e^x$$: $$2e^{2x} + 15 = 11e^x$$, i.e., $$2e^{2x} - 11e^x + 15 = 0$$.\n- Step 3: Factor the quadratic in $$e^x$$: $$(2e^x - 5)(e^x - 3) = 0$$, so $$e^x = \\frac{5}{2}$$ or $$e^x = 3$$.\n- Step 4: Both are positive (valid). So $$x = \\ln\\frac{5}{2}$$ or $$x = \\ln 3$$.\n- Step 5: Quick verification: For $$x = \\ln 3$$, $$\\cosh(\\ln 3) = \\frac{5}{3}$$, so $$4 \\cdot \\frac{5}{3} + 13 \\cdot \\frac{1}{3} = \\frac{20+13}{3} = 11$$. ✓", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": true}, {"question": "Sketch the graph of $$y = \\operatorname{artanh} x$$ for $$|x| < 1$$. Describe its shape, asymptotes, and symmetry. (3 steps)", "answer": "- Step 1: The graph of $$y = \\operatorname{artanh} x$$ is the reflection of $$y = \\tanh x$$ in the line $$y = x$$. Since $$\\tanh x$$ has horizontal asymptotes at $$y = \\pm 1$$, the reflection gives **vertical asymptotes** at $$x = \\pm 1$$.\n- Step 2: The function is **odd** (since $$\\tanh$$ is odd, its inverse is also odd). The graph passes through the origin. As $$x \\to 1^-$$, $$\\operatorname{artanh} x \\to +\\infty$$; as $$x \\to -1^+$$, $$\\operatorname{artanh} x \\to -\\infty$$.\n- Step 3: The curve looks like an elongated S-shape, steeper near the asymptotes and gentler near the origin. The domain is the open interval $$(-1,1)$$ and the range is all of $$\\mathbb{R}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": false}, {"question": "Why is it that $$\\operatorname{arcosh} x = \\ln(x - \\sqrt{x^2-1})$$ gives a valid (but negative) value for $$x > 1$$, yet we define $$\\operatorname{arcosh} x$$ as $$\\ln(x + \\sqrt{x^2-1})$$ only? Connect this to the geometric meaning. (2 steps)", "answer": "- Step 1: Both $$\\ln(x + \\sqrt{x^2-1})$$ and $$\\ln(x - \\sqrt{x^2-1})$$ give valid solutions to $$\\cosh y = x$$. The first gives $$y > 0$$ (right branch of the catenary) and the second gives $$y < 0$$ (left branch). They are negatives of each other: $$\\ln(x-\\sqrt{x^2-1}) = -\\ln(x+\\sqrt{x^2-1})$$ because $$(x+\\sqrt{x^2-1})(x-\\sqrt{x^2-1}) = x^2-(x^2-1) = 1$$.\n- Step 2: By convention, $$\\operatorname{arcosh} x$$ is defined as the inverse of $$\\cosh x$$ restricted to $$x \\geq 0$$, so it returns the **non-negative** value. This is analogous to how $$\\arccos x$$ is defined to return values in $$[0,\\pi]$$, even though $$\\cos\\theta = k$$ has infinitely many solutions.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "The graph of $$y = \\operatorname{arcoth} x$$ for $$|x| > 1$$ has two branches. Describe the shape and asymptotes of each branch. (3 steps)", "answer": "- Step 1: The graph is the reflection of $$y = \\operatorname{coth} x$$ in $$y = x$$. Since $$\\operatorname{coth} x$$ has vertical asymptote at $$x = 0$$ and horizontal asymptotes at $$y = \\pm 1$$, the reflection gives horizontal asymptotes at $$y = 0$$ and vertical asymptotes at $$x = \\pm 1$$.\n- Step 2: For $$x > 1$$ (right branch): As $$x \\to 1^+$$, $$\\operatorname{arcoth} x \\to +\\infty$$ (approaching the vertical asymptote). As $$x \\to +\\infty$$, $$\\operatorname{arcoth} x \\to 0^+$$ (approaching the horizontal asymptote from above). The curve is decreasing.\n- Step 3: For $$x < -1$$ (left branch): As $$x \\to -1^-$$, $$\\operatorname{arcoth} x \\to -\\infty$$. As $$x \\to -\\infty$$, $$\\operatorname{arcoth} x \\to 0^-$$ (approaching the horizontal asymptote from below). The curve is also decreasing. The function is odd.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}, {"question": "A student claims: \"Since $$\\cosh^2 x - \\sinh^2 x = 1$$ and $$\\cos^2 x + \\sin^2 x = 1$$, you can get the hyperbolic identity from the trig one just by replacing all $$+$$ with $$-$$.\" Give a counterexample showing this naive rule fails. (2 steps)", "answer": "- Step 1: Consider the addition formula $$\\cos(A+B) = \\cos A\\cos B - \\sin A\\sin B$$. If we naively change all $$+$$ to $$-$$, we'd get $$\\cosh(A+B) = \\cosh A\\cosh B + \\sinh A\\sinh B$$. Wait — that's actually correct! But now consider $$\\cos(A-B) = \\cos A\\cos B + \\sin A\\sin B$$. Naively changing signs: $$\\cosh(A-B) = \\cosh A\\cosh B - \\sinh A\\sinh B$$. That's also correct!\n- Step 2: The naive rule actually gives the right answer here by coincidence. A better counterexample: $$\\sin^2 A = 1 - \\cos^2 A$$. Naively changing signs: $$\\sinh^2 A = 1 + \\cosh^2 A$$, which is **wrong** (the correct identity is $$\\sinh^2 A = \\cosh^2 A - 1$$). The correct rule is Osborn's rule: only products of two sine terms get a sign flip, not every $$+$$ or $$-$$.", "source": "GLM 5.1 ③", "_id": "glm_3_70", "judge_pick": false}, {"question": "Prove that $$\\cosh 2A \\equiv 1 + 2\\sinh^2 A$$ starting from the exponential definitions. (4 steps)", "answer": "- Step 1: $$\\cosh 2A = \\frac{e^{2A} + e^{-2A}}{2}$$. We need to show this equals $$1 + 2\\sinh^2 A$$.\n- Step 2: Compute $$2\\sinh^2 A = 2\\left(\\frac{e^A - e^{-A}}{2}\\right)^2 = 2 \\cdot \\frac{e^{2A} - 2 + e^{-2A}}{4} = \\frac{e^{2A} - 2 + e^{-2A}}{2}$$.\n- Step 3: Add 1: $$1 + 2\\sinh^2 A = 1 + \\frac{e^{2A} - 2 + e^{-2A}}{2} = \\frac{2 + e^{2A} - 2 + e^{-2A}}{2} = \\frac{e^{2A} + e^{-2A}}{2}$$.\n- Step 4: This equals $$\\cosh 2A$$. ✓ Notice how the $$-2$$ from the expansion of $$\\sinh^2$$ cancels with the $$+2$$ from adding 1, leaving just the exponential terms. This is the same mechanism as in the fundamental identity proof.", "source": "GLM 5.1 ③", "_id": "glm_3_71", "judge_pick": false}, {"question": "Express $$10\\cosh x + 6\\sinh x$$ in the form $$R\\cosh(x+\\alpha)$$ and find $$R$$. (3 steps)", "answer": "- Step 1: Expand: $$R\\cosh(x+\\alpha) = R\\cosh x\\cosh\\alpha + R\\sinh x\\sinh\\alpha$$. Comparing coefficients: $$R\\cosh\\alpha = 10$$ and $$R\\sinh\\alpha = 6$$.\n- Step 2: Use $$\\cosh^2\\alpha - \\sinh^2\\alpha = 1$$: $$\\left(\\frac{10}{R}\\right)^2 - \\left(\\frac{6}{R}\\right)^2 = 1$$, so $$\\frac{100 - 36}{R^2} = 1$$, giving $$R^2 = 64$$, so $$R = 8$$.\n- Step 3: Then $$\\tanh\\alpha = \\frac{6}{10} = \\frac{3}{5}$$, so $$\\alpha = \\operatorname{artanh}\\frac{3}{5} = \\frac{1}{2}\\ln\\frac{1+3/5}{1-3/5} = \\frac{1}{2}\\ln\\frac{8/5}{2/5} = \\frac{1}{2}\\ln 4 = \\ln 2 \\approx 0.693$$.", "source": "GLM 5.1 ③", "_id": "glm_3_72", "judge_pick": false}, {"question": "Using the result $$10\\cosh x + 6\\sinh x = 8\\cosh(x + \\ln 2)$$, solve $$10\\cosh x + 6\\sinh x = 11$$. (3 steps)", "answer": "- Step 1: Set $$8\\cosh(x + \\ln 2) = 11$$, so $$\\cosh(x + \\ln 2) = \\frac{11}{8}$$.\n- Step 2: Since $$\\frac{11}{8} > 1$$, there are two solutions: $$x + \\ln 2 = \\pm\\operatorname{arcosh}\\frac{11}{8}$$.\n- Step 3: So $$x = -\\ln 2 \\pm \\operatorname{arcosh}\\frac{11}{8} = -\\ln 2 \\pm \\ln\\left(\\frac{11}{8} + \\sqrt{\\frac{121}{64}-1}\\right) = -\\ln 2 \\pm \\ln\\left(\\frac{11}{8} + \\frac{\\sqrt{57}}{8}\\right) = -\\ln 2 \\pm \\ln\\frac{11+\\sqrt{57}}{8}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_73", "judge_pick": false}, {"question": "The range of $$\\operatorname{cosech} x$$ (for $$x \\neq 0$$) is $$\\mathbb{R} \\setminus \\{0\\}$$, i.e., all nonzero reals. Explain why 0 is excluded. (2 steps)", "answer": "- Step 1: $$\\operatorname{cosech} x = \\frac{1}{\\sinh x}$$. For $$\\operatorname{cosech} x$$ to equal 0, we'd need $$\\frac{1}{\\sinh x} = 0$$, which would require $$\\sinh x \\to \\infty$$ — but $$\\sinh x$$ is finite for all finite $$x$$.\n- Step 2: As $$x \\to \\pm\\infty$$, $$\\sinh x \\to \\pm\\infty$$, so $$\\operatorname{cosech} x \\to 0$$, but it never reaches 0. The value 0 is an asymptote, not an attained value. For any nonzero real value $$k$$, the equation $$\\operatorname{cosech} x = k$$ has a solution because $$\\sinh x = \\frac{1}{k}$$ always has a solution (range of $$\\sinh$$ is all of $$\\mathbb{R}$$).", "source": "GLM 5.1 ③", "_id": "glm_3_74", "judge_pick": false}, {"question": "If you sketch $$y = \\cosh 2x$$ and $$y = 2\\cosh x$$ on the same diagram, which curve is \"narrower\" (i.e., reaches its minimum faster) and which is \"taller\" for large $$|x|$$? Explain qualitatively. (2 steps)", "answer": "- Step 1: **Narrower**: $$y = \\cosh 2x$$ is narrower. The argument $$2x$$ means the exponential growth kicks in twice as fast: $$\\cosh 2x \\approx \\frac{1}{2}e^{2|x|}$$ vs. $$2\\cosh x \\approx e^{|x|}$$. For moderate $$|x|$$, the $$e^{2|x|}$$ grows much faster, so the curve rises more steeply from the minimum.\n- Step 2: **At the minimum**: Both pass through $$(0,1)$$ since $$\\cosh 0 = 1$$ and $$2\\cosh 0 = 2$$... wait, $$\\cosh 2(0) = 1$$ but $$2\\cosh 0 = 2$$. So at the origin, $$2\\cosh x$$ is **higher** ($$y = 2$$ vs. $$y = 1$$). But for large $$|x|$$, $$\\cosh 2x \\approx \\frac{1}{2}e^{2|x|}$$ dominates $$2\\cosh x \\approx e^{|x|}$$ since $$e^{2|x|} \\gg e^{|x|}$$. So the curves cross, with $$\\cosh 2x$$ eventually being much taller.", "source": "GLM 5.1 ③", "_id": "glm_3_75", "judge_pick": true}, {"question": "Solve $$2\\tanh x = \\cosh x$$. (Hint: express both sides using exponentials or use the identity linking $$\\operatorname{sech}$$ and $$\\tanh$$.) (4 steps)", "answer": "- Step 1: Using $$\\operatorname{sech}^2 x = 1 - \\tanh^2 x$$ and $$\\operatorname{sech} x = \\frac{1}{\\cosh x}$$: we can write $$\\frac{1}{\\cosh^2 x} = 1 - \\tanh^2 x$$.\n- Step 2: From $$2\\tanh x = \\cosh x$$, square both sides: $$4\\tanh^2 x = \\cosh^2 x$$. Using $$\\cosh^2 x = \\frac{1}{1-\\tanh^2 x}$$ (from $$\\operatorname{sech}^2 x = 1-\\tanh^2 x$$): $$4\\tanh^2 x = \\frac{1}{1-\\tanh^2 x}$$.\n- Step 3: Let $$t = \\tanh^2 x$$: $$4t(1-t) = 1$$, so $$4t - 4t^2 = 1$$, i.e., $$4t^2 - 4t + 1 = 0$$, giving $$(2t-1)^2 = 0$$, so $$t = \\frac{1}{2}$$, meaning $$\\tanh^2 x = \\frac{1}{2}$$.\n- Step 4: Since $$2\\tanh x = \\cosh x > 0$$, we need $$\\tanh x > 0$$, so $$\\tanh x = \\frac{1}{\\sqrt{2}}$$. Then $$x = \\operatorname{artanh}\\frac{1}{\\sqrt{2}} = \\frac{1}{2}\\ln\\frac{1+1/\\sqrt{2}}{1-1/\\sqrt{2}} = \\frac{1}{2}\\ln\\frac{\\sqrt{2}+1}{\\sqrt{2}-1}$$. Rationalizing: $$\\frac{\\sqrt{2}+1}{\\sqrt{2}-1} = \\frac{(\\sqrt{2}+1)^2}{1} = 3+2\\sqrt{2}$$. So $$x = \\frac{1}{2}\\ln(3+2\\sqrt{2}) = \\ln\\sqrt{3+2\\sqrt{2}}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_76", "judge_pick": false}, {"question": "A student says: \"$$\\cosh x$$ is always positive, so $$a\\cosh x + b\\sinh x$$ is always positive for any constants $$a, b$$.\" Give a counterexample. (2 steps)", "answer": "- Step 1: Consider $$a = 1, b = 3$$: $$\\cosh x + 3\\sinh x$$. Express as $$R\\sinh(x+\\alpha)$$ where $$R\\cosh\\alpha = 3$$, $$R\\sinh\\alpha = 1$$. Then $$R^2 = 9 - 1 = 8$$, so $$R = 2\\sqrt{2}$$.\n- Step 2: Since $$\\sinh(x+\\alpha)$$ ranges over all of $$\\mathbb{R}$$, the expression $$2\\sqrt{2}\\sinh(x+\\alpha)$$ also ranges over all of $$\\mathbb{R}$$ — it can be negative. For instance, when $$x$$ is a very large negative number, $$\\sinh x \\approx -\\frac{1}{2}e^{-x}$$ which is very negative, and $$3\\sinh x$$ dominates $$\\cosh x$$, making the whole expression negative. The claim is only true when the expression can be written as $$R\\cosh(x+\\alpha)$$ (which requires $$|a| > |b|$$).", "source": "GLM 5.1 ③", "_id": "glm_3_77", "judge_pick": true}], "count": 78}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Define sinh x, cosh x, and tanh x in terms of exponential functions. (3 steps)", "answer": "- Step 1: **sinh x** is defined as $\\sinh x = \\frac{e^x - e^{-x}}{2}$, the odd function counterpart to sine.  \n- Step 2: **cosh x** is defined as $\\cosh x = \\frac{e^x + e^{-x}}{2}$, the even function counterpart to cosine.  \n- Step 3: **tanh x** is the ratio of sinh and cosh: $\\tanh x = \\frac{\\sinh x}{\\cosh x} = \\frac{e^x - e^{-x}}{e^x + e^{-x}}$.  \n\n**Why this works**: These definitions mirror trigonometric functions but are based on hyperbolas, not circles. The exponential forms reveal their behavior at extremes: sinh(x) approximates $\\frac{1}{2}e^x$ for large positive x, and cosh(x) approximates $\\frac{1}{2}e^x$ for large positive x.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is the graph of y = sinh x odd, and y = cosh x even?", "answer": "- **sinh x** is odd because $\\sinh(-x) = \\frac{e^{-x} - e^x}{2} = -\\frac{e^x - e^{-x}}{2} = -\\sinh x$.  \n- **cosh x** is even because $\\cosh(-x) = \\frac{e^{-x} + e^x}{2} = \\frac{e^x + e^{-x}}{2} = \\cosh x$.  \n\n**Why this matters**: Odd functions (sinh) are symmetric about the origin, while even functions (cosh) are symmetric about the y-axis. This mirrors trigonometric identities but with exponential growth instead of periodicity.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Prove the identity $\\cosh^2 x - \\sinh^2 x \\equiv 1$. (3 steps)", "answer": "- Step 1: Substitute definitions:  \n  $\\cosh^2 x - \\sinh^2 x = \\left(\\frac{e^x + e^{-x}}{2}\\right)^2 - \\left(\\frac{e^x - e^{-x}}{2}\\right)^2$.  \n- Step 2: Expand both squares:  \n  $\\frac{e^{2x} + 2 + e^{-2x}}{4} - \\frac{e^{2x} - 2 + e^{-2x}}{4}$.  \n- Step 3: Subtract terms:  \n  $\\frac{(e^{2x} + 2 + e^{-2x}) - (e^{2x} - 2 + e^{-2x})}{4} = \\frac{4}{4} = 1$.  \n\n**Why this works**: This identity is the hyperbolic analog of $\\cos^2 x + \\sin^2 x = 1$, but with a minus sign due to the difference in exponential definitions.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How does the graph of y = tanh x behave as x → ∞ and x → -∞?", "answer": "- As $x \\to \\infty$, $\\sinh x \\approx \\frac{1}{2}e^x$ and $\\cosh x \\approx \\frac{1}{2}e^x$, so $\\tanh x \\approx \\frac{\\frac{1}{2}e^x}{\\frac{1}{2}e^x} = 1$.  \n- As $x \\to -\\infty$, $\\sinh x \\approx -\\frac{1}{2}e^{-x}$ and $\\cosh x \\approx \\frac{1}{2}e^{-x}$, so $\\tanh x \\approx \\frac{-\\frac{1}{2}e^{-x}}{\\frac{1}{2}e^{-x}} = -1$.  \n\n**Edge case**: At x = 0, $\\tanh 0 = 0$, and the function is strictly increasing with horizontal asymptotes at y = ±1.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Derive the logarithmic form of $\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2 + 1})$. (4 steps)", "answer": "- Step 1: Let $y = \\operatorname{arsinh} x$, so $x = \\sinh y = \\frac{e^y - e^{-y}}{2}$.  \n- Step 2: Multiply both sides by $2e^y$: $e^{2y} - 1 = 2xe^y$.  \n- Step 3: Rearrange into a quadratic in $e^y$: $e^{2y} - 2xe^y - 1 = 0$.  \n- Step 4: Solve using the quadratic formula:  \n  $e^y = x \\pm \\sqrt{x^2 + 1}$. Discard the negative root since $e^y > 0$, so $y = \\ln(x + \\sqrt{x^2 + 1})$.  \n\n**Misconception**: Why not $x - \\sqrt{x^2 + 1}$? Because $x - \\sqrt{x^2 + 1}$ is negative for all x, violating $e^y > 0$.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": true}, {"question": "Explain why $\\operatorname{arcosh} x$ requires domain restriction to $x \\geq 1$.", "answer": "- **cosh x** is not one-to-one over all real numbers because it's symmetric about the y-axis (even function). To define an inverse, restrict the domain to $x \\geq 0$, where cosh x is strictly increasing.  \n- The range of cosh x for $x \\geq 0$ is $[1, \\infty)$, so the inverse $\\operatorname{arcosh} x$ has domain $x \\geq 1$.  \n\n**Why this matters**: Without domain restriction, the inverse wouldn't exist. This mirrors the need to restrict $\\cos x$ to $[0, \\pi]$ for $\\arccos x$.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Use Osborn’s rule to convert $\\sin 3A = 3\\sin A - 4\\sin^3 A$ to a hyperbolic identity.", "answer": "- Replace $\\sin$ with $\\sinh$ and apply a sign flip to terms with implied products of two sines:  \n  $\\sin 3A \\to \\sinh 3A$, $\\sin^3 A \\to -\\sinh^3 A$.  \n- Result: $\\sinh 3A = 3\\sinh A + 4\\sinh^3 A$.  \n\n**Why this works**: Osborn’s rule adjusts for differences in hyperbolic identities arising from their exponential definitions.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Solve $6\\sinh x - 2\\cosh x = 7$ using exponential definitions. (4 steps)", "answer": "- Step 1: Substitute $\\sinh x = \\frac{e^x - e^{-x}}{2}$ and $\\cosh x = \\frac{e^x + e^{-x}}{2}$:  \n  $6\\left(\\frac{e^x - e^{-x}}{2}\\right) - 2\\left(\\frac{e^x + e^{-x}}{2}\\right) = 7$.  \n- Step 2: Simplify: $3e^x - 3e^{-x} - e^x - e^{-x} = 7 \\Rightarrow 2e^x - 4e^{-x} = 7$.  \n- Step 3: Multiply through by $e^x$: $2e^{2x} - 7e^x - 4 = 0$.  \n- Step 4: Let $u = e^x$, solve quadratic $2u^2 -7u -4 = 0$:  \n  $u = 4$ (valid) or $u = -\\frac{1}{2}$ (invalid). Thus, $x = \\ln 4$.  \n\n**Edge case**: Exponential equations often discard negative roots since $e^x > 0$.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Sketch y = sech x. Identify its range and asymptotes.", "answer": "- **Graph**: Start with cosh x (U-shaped, min at x=0, y=1). Take reciprocal: sech x has a maximum at x=0 (sech 0 = 1) and asymptotes at y=0 as $x \\to \\pm\\infty$.  \n- **Range**: $0 < \\operatorname{sech} x \\leq 1$.  \n- **Asymptotes**: Horizontal asymptote at y=0.  \n\n**Visual intuition**: The graph of sech x is bell-shaped, decaying to zero at extremes.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Prove $\\sinh(A + B) \\equiv \\sinh A \\cosh B + \\cosh A \\sinh B$ using exponential definitions. (3 steps)", "answer": "- Step 1: Expand RHS:  \n  $\\left(\\frac{e^A - e^{-A}}{2}\\right)\\left(\\frac{e^B + e^{-B}}{2}\\right) + \\left(\\frac{e^A + e^{-A}}{2}\\right)\\left(\\frac{e^B - e^{-B}}{2}\\right)$.  \n- Step 2: Multiply terms:  \n  $\\frac{e^{A+B} + e^{A-B} - e^{-A+B} - e^{-A-B}}{4} + \\frac{e^{A+B} - e^{A-B} + e^{-A+B} - e^{-A-B}}{4}$.  \n- Step 3: Combine fractions:  \n  $\\frac{2e^{A+B} - 2e^{-A-B}}{4} = \\frac{e^{A+B} - e^{-(A+B)}}{2} = \\sinh(A + B)$.  \n\n**Why this works**: The addition formula mirrors the trigonometric sine addition identity but with sinh and cosh.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Define sinh x and cosh x in terms of exponentials. Explain why sinh is an odd function and cosh is an even function (3 steps).", "answer": "- Step 1: sinh x is defined as $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$.  \n- Step 2: cosh x is defined as $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$.  \n- Step 3: For sinh(-x):  \n  $$\\sinh(-x) = \\frac{e^{-x} - e^x}{2} = -\\sinh x$$ (odd function).  \n  For cosh(-x):  \n  $$\\cosh(-x) = \\frac{e^{-x} + e^x}{2} = \\cosh x$$ (even function).\n\nKey takeaway: Exponential definitions directly lead to symmetry properties.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": true}, {"question": "Why does sinh x ≈ ½e^x for large positive x, but ≈ -½e^{-x} for large negative x?", "answer": "For large positive x:  \n  - e^{-x} ≈ 0 ⇒ sinh x ≈ (e^x)/2  \nFor large negative x:  \n  - e^x ≈ 0 ⇒ sinh x ≈ (-e^{-x})/2  \nThis reflects sinh's odd symmetry about the origin.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": true}, {"question": "Sketch y = tanh x. Explain its asymptotes and why it approaches ±1 as x → ±∞.", "answer": "- As x → ∞:  \n  $$\\sinh x ≈ \\cosh x ⇒ \\tanh x = \\frac{\\sinh x}{\\cosh x} ≈ 1$$  \n- As x → -∞:  \n  $$\\sinh x ≈ -\\cosh x ⇒ \\tanh x ≈ -1$$  \n- Asymptotes at y = ±1  \nThe function is bounded because sinh x grows slower than cosh x for large |x|.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Prove cosh²x - sinh²x ≡ 1 using exponential definitions (3 steps).", "answer": "- Step 1: Expand both definitions:  \n  $$\\left(\\frac{e^x + e^{-x}}{2}\\right)^2 - \\left(\\frac{e^x - e^{-x}}{2}\\right)^2$$  \n- Step 2: Expand squares:  \n  $$\\frac{e^{2x} + 2 + e^{-2x}}{4} - \\frac{e^{2x} - 2 + e^{-2x}}{4}$$  \n- Step 3: Subtract numerators:  \n  $$\\frac{4}{4} = 1$$  \nThis identity mirrors the trigonometric Pythagorean identity.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why is arsinh x = ln(x + √(x²+1))? Explain each step of the derivation.", "answer": "- Step 1: Let y = arsinh x ⇒ x = sinh y = (e^y - e^{-y})/2  \n- Step 2: Multiply by 2e^y:  \n  e^{2y} - 2xe^y - 1 = 0  \n- Step 3: Solve quadratic in e^y:  \n  e^y = x ± √(x²+1)  \n  Discard negative root since e^y > 0  \n- Step 4: Take ln:  \n  y = ln(x + √(x²+1))\n\nKey insight: The √(x²+1) ensures positivity for all real x.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Compare the ranges of sinh x and cosh x. Why does sinh have range ℝ while cosh ≥ 1?", "answer": "- sinh x:  \n  As x → ∞, sinh x → ∞; as x → -∞, sinh x → -∞. Continuous and strictly increasing ⇒ full ℝ range.  \n- cosh x:  \n  Minimum at x=0: cosh 0 = 1. Exponential terms always positive and symmetric ⇒ cosh x ≥ 1.  \nVisual intuition: sinh x is \"S-shaped\" while cosh x is \"U-shaped\".", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "How does the graph of y = sech x relate to y = cosh x? Explain its asymptotic behavior.", "answer": "- sech x = 1/cosh x  \n- At x=0: sech 0 = 1/cosh 0 = 1  \n- As x → ±∞: cosh x → ∞ ⇒ sech x → 0  \n- No x-intercepts  \nAsymptotes: x-axis is horizontal asymptote on both sides.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Apply Osborn's rule to convert sin²A + cos²A = 1 to hyperbolic identity. Why does the sign change?", "answer": "- Replace sin → sinh, cos → cosh  \n- Product of sines becomes negative: sin²A → -sinh²A  \n- Result: cosh²x - sinh²x = 1  \nKey reason: Hyperbolic identities arise from complex trigonometry where hyperbolic functions relate to imaginary angles.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Solve 6 sinh x - 2 cosh x = 7 using exponential definitions (3 steps).", "answer": "- Step 1: Substitute definitions:  \n  6[(e^x - e^{-x})/2] - 2[(e^x + e^{-x})/2] = 7  \n- Step 2: Simplify:  \n  3e^x - 3e^{-x} - e^x - e^{-x} = 7 ⇒ 2e^x - 4e^{-x} = 7  \n- Step 3: Multiply by e^x:  \n  2e^{2x} - 7e^x - 4 = 0 ⇒ Let u = e^x: 2u² -7u -4 = 0  \n  Solve: u = 4 ⇒ x = ln 4\n\nValid since e^x > 0 for all real x.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Explain why artanh x = ½ln[(1+x)/(1-x)] is only defined for |x| < 1.", "answer": "- For |x| < 1: (1+x) > 0 and (1-x) > 0 ⇒ ln positive numbers  \n- For |x| ≥ 1: Denominator or numerator becomes ≤ 0 ⇒ ln undefined  \nGraph connection: tanh x has horizontal asymptotes at ±1, so its inverse must have domain (-1,1).", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}, {"question": "Compare the graphs of y = sinh x and y = arsinh x. How do their domains/ranges relate?", "answer": "- sinh x: Domain ℝ, range ℝ  \n- arsinh x: Domain ℝ, range ℝ  \n- Reflection over y=x line  \nUnlike cosh and arcosh, sinh is bijective over ℝ ⇒ no domain restrictions needed for inverse.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Prove sinh(A+B) ≡ sinh A cosh B + cosh A sinh B (3 steps).", "answer": "- Step 1: Expand right-hand side:  \n  [(e^A - e^{-A})/2][(e^B + e^{-B})/2] + [(e^A + e^{-A})/2][(e^B - e^{-B})/2]  \n- Step 2: Multiply terms:  \n  [e^{A+B} + e^{A-B} - e^{-A+B} - e^{-A-B} + e^{A+B} + e^{B-A} - e^{-B+A} - e^{-A-B}]/4  \n- Step 3: Combine like terms:  \n  [2e^{A+B} - 2e^{-A-B}]/4 = (e^{A+B} - e^{-A-B})/2 = sinh(A+B)\n\nThis mirrors the sine addition formula but without sign changes.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Why does the inverse of cosh x require domain restriction to x ≥ 0?", "answer": "- cosh x is not injective over ℝ: cosh(-x) = cosh x  \n- Restrict to x ≥ 0 to make it one-to-one  \n- arcosh x then gives principal value ≥ 0  \nVisual clue: cosh x's \"U-shape\" has left/right symmetry.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Express 10 cosh x + 6 sinh x as R cosh(x+a) (2 steps). What is the minimum value?", "answer": "- Step 1: Use identity:  \n  R cosh(x+a) = R cosh x cosh a + R sinh x sinh a  \n  Match coefficients:  \n  R cosh a = 10, R sinh a = 6 ⇒ tanh a = 6/10 = 0.6 ⇒ a = arctanh(0.6) ≈ 0.693  \n- Step 2: Calculate R:  \n  R = √(10² - 6²) = 8 (since cosh²a - sinh²a = 1)  \nMinimum value: R cosh(x+a) ≥ R = 8 (since cosh ≥ 1)", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "Compare sinh x and tanh x for large positive x. Which grows faster and why?", "answer": "- sinh x ≈ ½e^x ⇒ exponential growth  \n- tanh x ≈ 1 ⇒ approaches asymptote  \nGrowth rate: sinh x grows exponentially faster than tanh x's convergence.  \nReason: tanh x = sinh x / cosh x ≈ (½e^x)/(½e^x) = 1.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": true}], "count": 15}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Is $\\sinh x$ an odd function, even function, or neither? Explain using its definition. (2 steps)", "answer": "- Step 1: Recall the definition: $\\sinh x = \\frac{e^x - e^{-x}}{2}$\n\n- Step 2: Compute $\\sinh(-x)$:\n$$\\sinh(-x) = \\frac{e^{-x} - e^x}{2} = -\\frac{e^x - e^{-x}}{2} = -\\sinh x$$\n\nSince $\\sinh(-x) = -\\sinh x$, the function is **odd**. Graphically, this means it's symmetric about the origin (rotational symmetry of 180°).", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Is $\\cosh x$ an odd function, even function, or neither? Explain using its definition. (2 steps)", "answer": "- Step 1: Recall the definition: $\\cosh x = \\frac{e^x + e^{-x}}{2}$\n\n- Step 2: Compute $\\cosh(-x)$:\n$$\\cosh(-x) = \\frac{e^{-x} + e^x}{2} = \\frac{e^x + e^{-x}}{2} = \\cosh x$$\n\nSince $\\cosh(-x) = \\cosh x$, the function is **even**. Graphically, this means it's symmetric about the y-axis.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Using the exponential definitions, prove that $\\tanh x \\equiv \\frac{e^{2x} - 1}{e^{2x} + 1}$. (2 steps)", "answer": "- Step 1: Start from $\\tanh x = \\frac{\\sinh x}{\\cosh x}$:\n$$\\tanh x = \\frac{\\frac{e^x - e^{-x}}{2}}{\\frac{e^x + e^{-x}}{2}} = \\frac{e^x - e^{-x}}{e^x + e^{-x}}$$\n\n- Step 2: Multiply numerator and denominator by $e^x$:\n$$\\tanh x = \\frac{e^{2x} - 1}{e^{2x} + 1}$$\n\nThis form is often useful when solving equations or analyzing behavior as $x \\to \\pm\\infty$.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "As $x \\to \\infty$, what does $\\tanh x$ approach? As $x \\to -\\infty$? Explain using the exponential form. (2 steps)", "answer": "- Step 1: Using $\\tanh x = \\frac{e^{2x} - 1}{e^{2x} + 1}$\n\n- Step 2: As $x \\to \\infty$, $e^{2x} \\to \\infty$, so:\n$$\\tanh x \\to \\frac{e^{2x}}{e^{2x}} = 1$$\nAs $x \\to -\\infty$, $e^{2x} \\to 0$, so:\n$$\\tanh x \\to \\frac{-1}{1} = -1$$\n\nThus $y = 1$ and $y = -1$ are horizontal asymptotes.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Explain why $\\cosh x \\geq 1$ for all real $x$, and determine when equality holds. (2 steps)", "answer": "- Step 1: From the fundamental identity $\\cosh^2 x - \\sinh^2 x = 1$, we have $\\cosh^2 x = 1 + \\sinh^2 x$\n\n- Step 2: Since $\\sinh^2 x \\geq 0$ for all $x$, we get $\\cosh^2 x \\geq 1$, so $\\cosh x \\geq 1$ (taking positive square root since $\\cosh x > 0$).\n\nEquality holds when $\\sinh^2 x = 0$, i.e., when $x = 0$, where $\\cosh 0 = 1$. This explains why the graph of $y = \\cosh x$ has a minimum point at $(0, 1)$.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "What is the range of each function: (a) $\\sinh x$, (b) $\\cosh x$, (c) $\\tanh x$, (d) $\\operatorname{sech} x$? (2 steps)", "answer": "- Step 1: Using properties and graphs:\n\n(a) $\\sinh x$: Since $\\sinh x = \\frac{e^x - e^{-x}}{2}$, as $x \\to \\infty$, $\\sinh x \\to \\infty$; as $x \\to -\\infty$, $\\sinh x \\to -\\infty$. Range: **all real numbers** $(-\\infty, \\infty)$\n\n(b) $\\cosh x$: As shown in Q6, $\\cosh x \\geq 1$. Range: **[1, ∞)**\n\n(c) $\\tanh x$: Approaches $\\pm 1$ asymptotically but never reaches them. Range: **(-1, 1)**\n\n(d) $\\operatorname{sech} x = \\frac{1}{\\cosh x}$: Since $\\cosh x \\geq 1$, we have $\\operatorname{sech} x \\leq 1$, and as $x \\to \\pm\\infty$, $\\operatorname{sech} x \\to 0$. Range: **(0, 1]**", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Explain why the domain of $\\cosh x$ must be restricted to define its inverse function, and what restriction is used. (2 steps)", "answer": "- Step 1: A function must be one-to-one (pass the horizontal line test) to have an inverse.\n\n- Step 2: $\\cosh x$ is not one-to-one on its entire domain $\\mathbb{R}$ because it's an even function — for any $x > 0$, $\\cosh x = \\cosh(-x)$. To make it one-to-one, we restrict the domain to $x \\geq 0$. Then the inverse $\\operatorname{arcosh} x$ exists for $x \\geq 1$.\n\nThis is exactly analogous to restricting $\\cos x$ to $[0, \\pi]$ to define $\\arccos x$.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": true}, {"question": "Prove that $\\operatorname{arsinh} x = \\ln\\left(x + \\sqrt{x^2 + 1}\\right)$. (3 steps)", "answer": "- Step 1: Let $y = \\operatorname{arsinh} x$, so $x = \\sinh y = \\frac{e^y - e^{-y}}{2}$. Multiply by $e^y$:\n$$e^{2y} - 2xe^y - 1 = 0$$\n\n- Step 2: This is a quadratic in $e^y$. Using the quadratic formula:\n$$e^y = \\frac{2x \\pm \\sqrt{4x^2 + 4}}{2} = x \\pm \\sqrt{x^2 + 1}$$\n\n- Step 3: The solution $e^y = x - \\sqrt{x^2 + 1}$ is always negative (since $\\sqrt{x^2 + 1} > |x|$), so we discard it. Thus $e^y = x + \\sqrt{x^2 + 1}$, and taking natural logs:\n$$y = \\ln\\left(x + \\sqrt{x^2 + 1}\\right)$$", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Prove that $\\operatorname{arcosh} x = \\ln\\left(x + \\sqrt{x^2 - 1}\\right)$ for $x \\geq 1$. (3 steps)", "answer": "- Step 1: Let $y = \\operatorname{arcosh} x$, so $x = \\cosh y = \\frac{e^y + e^{-y}}{2}$. Multiply by $e^y$:\n$$e^{2y} - 2xe^y + 1 = 0$$\n\n- Step 2: Quadratic in $e^y$:\n$$e^y = \\frac{2x \\pm \\sqrt{4x^2 - 4}}{2} = x \\pm \\sqrt{x^2 - 1}$$\n\n- Step 3: Both solutions are positive for $x > 1$. However, $\\operatorname{arcosh} x \\geq 0$, and since $x - \\sqrt{x^2 - 1} < 1$ (giving negative log), we choose $e^y = x + \\sqrt{x^2 - 1}$:\n$$y = \\ln\\left(x + \\sqrt{x^2 - 1}\\right)$$\n\nNote: $x = 1$ gives $y = \\ln(1 + 0) = 0$.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Prove that $\\operatorname{artanh} x = \\frac{1}{2}\\ln\\left(\\frac{1+x}{1-x}\\right)$ for $|x| < 1$. (3 steps)", "answer": "- Step 1: Let $y = \\operatorname{artanh} x$, so $x = \\tanh y = \\frac{e^{2y} - 1}{e^{2y} + 1}$. Cross-multiply:\n$$x(e^{2y} + 1) = e^{2y} - 1$$\n$$xe^{2y} + x = e^{2y} - 1$$\n\n- Step 2: Rearrange:\n$$e^{2y} - xe^{2y} = x + 1$$\n$$e^{2y}(1 - x) = 1 + x$$\n\n- Step 3: Solve:\n$$e^{2y} = \\frac{1+x}{1-x}$$\n$$2y = \\ln\\left(\\frac{1+x}{1-x}\\right)$$\n$$y = \\frac{1}{2}\\ln\\left(\\frac{1+x}{1-x}\\right)$$\n\nThe restriction $|x| < 1$ ensures the argument of the log is positive.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": true}, {"question": "Using Osborn's rule, write down the hyperbolic identity corresponding to $\\cos(A - B) \\equiv \\cos A \\cos B + \\sin A \\sin B$. (2 steps)", "answer": "- Step 1: Osborn's rule: replace $\\cos \\to \\cosh$ and $\\sin \\to \\sinh$.\n\n- Step 2: The corresponding hyperbolic identity is:\n$$\\cosh(A - B) \\equiv \\cosh A \\cosh B - \\sinh A \\sinh B$$\n\nNote: The sign changes because $\\sin A \\sin B$ (product of two sines) becomes $
