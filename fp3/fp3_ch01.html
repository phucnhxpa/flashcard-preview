graph of $$y = 3\\tanh x$$ bounded between $$y = -3$$ and $$y = 3$$? What does the factor \"3\" do geometrically? (2 steps)", "answer": "- Step 1: $$\\tanh x$$ has range $$(-1, 1)$$ with horizontal asymptotes at $$y = \\pm 1$$. Multiplying by 3 stretches everything vertically by factor 3.\n- Step 2: New range: $$(-3, 3)$$, asymptotes at $$y = \\pm 3$$. The slope at the origin (originally 1) gets multiplied by 3 too. The shape is the same S-curve, just stretched vertically.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "Prove $$\\sinh 2A \\equiv 2\\sinh A\\cosh A$$ from definitions. (3 steps)", "answer": "- Step 1: RHS: $$2\\sinh A\\cosh A = 2\\cdot\\dfrac{e^A - e^{-A}}{2}\\cdot\\dfrac{e^A + e^{-A}}{2} = \\dfrac{(e^A - e^{-A})(e^A + e^{-A})}{2}$$.\n- Step 2: This is a difference of squares: $$\\dfrac{e^{2A} - e^{-2A}}{2}$$.\n- Step 3: But that's exactly $$\\sinh(2A)$$ by definition. QED.\n\nThe proof is structurally identical to the trig version, reflecting the deep parallel between the two families.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "Solve $$\\sinh 2x - 7\\sinh x = 0$$ exactly. (3 steps)", "answer": "- Step 1: Use $$\\sinh 2x = 2\\sinh x\\cosh x$$: $$2\\sinh x\\cosh x - 7\\sinh x = 0$$, factoring $$\\sinh x(2\\cosh x - 7) = 0$$.\n- Step 2: Either $$\\sinh x = 0 \\Rightarrow x = 0$$, or $$\\cosh x = 7/2$$.\n- Step 3: For $$\\cosh x = 7/2$$: $$x = \\pm\\ln(7/2 + \\sqrt{49/4 - 1}) = \\pm\\ln\\left(\\dfrac{7 + 3\\sqrt{5}}{2}\\right)$$. Three solutions total.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "When solving $$\\cosh x = c$$ via the log formula, why must we be careful about sign? (3 steps)", "answer": "- Step 1: The formula $$\\operatorname{arcosh} c = \\ln(c + \\sqrt{c^2 - 1})$$ gives only the **non-negative** principal value $$y \\geq 0$$.\n- Step 2: But cosh is even, so any $$c > 1$$ has BOTH $$x = +\\operatorname{arcosh} c$$ AND $$x = -\\operatorname{arcosh} c$$ as solutions to $$\\cosh x = c$$.\n- Step 3: When solving an equation (rather than evaluating arcosh), **always include both signs**: $$x = \\pm\\ln(c + \\sqrt{c^2 - 1})$$.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "A hanging chain has shape $$y = a\\cosh(x/a)$$. What's the physical meaning of $$a$$, and how does increasing $$a$$ change the shape? (3 steps)", "answer": "- Step 1: $$a$$ has units of length (since $$x/a$$ must be dimensionless inside cosh). Physically $$a = T_0/(\\rho g)$$ where $$T_0$$ is horizontal tension, $$\\rho$$ is mass per length, $$g$$ is gravity.\n- Step 2: At $$x = 0$$: $$y = a\\cosh 0 = a$$. So $$a$$ is the height of the lowest point above the chosen origin.\n- Step 3: Increasing $$a$$ flattens the chain (larger characteristic length). As $$a \\to \\infty$$ the chain looks straight; as $$a \\to 0$$ it droops sharply. Curvature at the bottom is $$1/a$$.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "Show how $$\\sinh x \\equiv \\dfrac{2\\tanh(x/2)}{1 - \\tanh^2(x/2)}$$ comes from the identity $$\\sinh 2A = 2\\sinh A\\cosh A$$. (4 steps)", "answer": "- Step 1: Set $$A = x/2$$ in $$\\sinh 2A = 2\\sinh A\\cosh A$$: $$\\sinh x = 2\\sinh(x/2)\\cosh(x/2)$$.\n- Step 2: Use $$\\cosh^2(x/2) - \\sinh^2(x/2) = 1$$ as the denominator (= 1 doesn't change anything): $$\\sinh x = \\dfrac{2\\sinh(x/2)\\cosh(x/2)}{\\cosh^2(x/2) - \\sinh^2(x/2)}$$.\n- Step 3: Divide every term in numerator and denominator by $$\\cosh^2(x/2)$$: $$\\sinh x = \\dfrac{2\\tanh(x/2)}{1 - \\tanh^2(x/2)}$$.\n- Step 4: This is the hyperbolic Weierstrass-style half-angle. Trig analogue: $$\\sin x = \\dfrac{2\\tan(x/2)}{1 + \\tan^2(x/2)}$$ — note the sign flip predicted by Osborn's rule.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "Find the x-coordinate of the intersection of $$y = \\sinh x$$ and $$y = \\operatorname{sech} x$$. (4 steps)", "answer": "- Step 1: Setting $$\\sinh x = \\operatorname{sech} x$$ gives $$\\sinh x \\cosh x = 1$$.\n- Step 2: Use double-angle: $$\\sinh x\\cosh x = \\tfrac{1}{2}\\sinh 2x$$. So $$\\sinh 2x = 2$$.\n- Step 3: $$2x = \\operatorname{arsinh} 2 = \\ln(2 + \\sqrt{5})$$, so $$x = \\tfrac{1}{2}\\ln(2 + \\sqrt{5})$$.\n- Step 4: Geometrically: sinh increases through 0; sech decreases from 1; they cross exactly once for $$x > 0$$.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "Derive $$\\cosh 3A = 4\\cosh^3 A - 3\\cosh A$$ using the addition formula. (4 steps)", "answer": "- Step 1: $$\\cosh 3A = \\cosh(A + 2A) = \\cosh A\\cosh 2A + \\sinh A\\sinh 2A$$.\n- Step 2: Substitute $$\\cosh 2A = 2\\cosh^2 A - 1$$ and $$\\sinh 2A = 2\\sinh A\\cosh A$$: $$\\cosh 3A = \\cosh A(2\\cosh^2 A - 1) + \\sinh A\\cdot 2\\sinh A\\cosh A$$.\n- Step 3: Expand: $$= 2\\cosh^3 A - \\cosh A + 2\\sinh^2 A\\cosh A$$. Use $$\\sinh^2 A = \\cosh^2 A - 1$$: $$= 2\\cosh^3 A - \\cosh A + 2(\\cosh^2 A - 1)\\cosh A = 4\\cosh^3 A - 3\\cosh A$$.\n- Step 4: Same structure as $$\\cos 3A = 4\\cos^3 A - 3\\cos A$$ — Osborn predicts no sign change here because the implied products are all $$\\cos\\cdot\\cos$$, not $$\\sin\\cdot\\sin$$.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "Why is $$\\sinh 3A = 3\\sinh A + 4\\sinh^3 A$$, but $$\\sin 3A = 3\\sin A - 4\\sin^3 A$$? Use Osborn's rule. (3 steps)", "answer": "- Step 1: The trig identity has $$-4\\sin^3 A$$. Treat $$\\sin^3 A$$ as $$\\sin A \\cdot \\sin^2 A$$ — the $$\\sin^2 A$$ factor is a product of two sins.\n- Step 2: By Osborn: $$\\sin^2 A \\to -\\sinh^2 A$$. So $$-4\\sin A\\cdot\\sin^2 A \\to -4\\sinh A\\cdot(-\\sinh^2 A) = +4\\sinh^3 A$$.\n- Step 3: Hence $$\\sinh 3A = 3\\sinh A + 4\\sinh^3 A$$. The sign on the cubic term flipped exactly because of the implied $$\\sin\\cdot\\sin$$ product.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "Joshua claims $$\\sinh^2 x \\equiv 1 - \\cosh^2 x$$ by analogy with $$\\sin^2 x \\equiv 1 - \\cos^2 x$$. What's wrong? (3 steps)", "answer": "- Step 1: The analogy fails. Osborn's rule: $$\\sin^2 x$$ is a product of two sin terms, so converting gets a sign flip: $$\\sin^2 x \\equiv 1 - \\cos^2 x \\to -\\sinh^2 x \\equiv 1 - \\cosh^2 x$$, i.e. $$\\sinh^2 x \\equiv \\cosh^2 x - 1$$.\n- Step 2: The correct hyperbolic identity is $$\\cosh^2 x - \\sinh^2 x = 1$$, equivalently $$\\sinh^2 x = \\cosh^2 x - 1$$.\n- Step 3: Joshua's incorrect form would imply $$\\sinh^2 x$$ is negative (since $$\\cosh^2 x \\geq 1$$), but $$\\sinh^2 x \\geq 0$$ always — a contradiction.\n\nThis shows the danger of blindly transferring trig identities without applying Osborn's sign rule.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "Solve $$\\sinh x = 5$$ using only the exponential definition (no $$\\operatorname{arsinh}$$ formula). (4 steps)", "answer": "- Step 1: $$\\sinh x = 5 \\Rightarrow \\dfrac{e^x - e^{-x}}{2} = 5$$, so $$e^x - e^{-x} = 10$$.\n- Step 2: Multiply by $$e^x$$: $$e^{2x} - 1 = 10 e^x$$, i.e. $$e^{2x} - 10 e^x - 1 = 0$$.\n- Step 3: Quadratic with $$u = e^x$$: $$u = \\dfrac{10 \\pm\\sqrt{100 + 4}}{2} = 5 \\pm\\sqrt{26}$$.\n- Step 4: We need $$e^x > 0$$. Since $$\\sqrt{26} > 5$$, the negative root is rejected. So $$e^x = 5 + \\sqrt{26}$$, and $$x = \\ln(5 + \\sqrt{26})$$.\n\nThis matches $$\\operatorname{arsinh} 5 = \\ln(5 + \\sqrt{26})$$ — the formula is just a shortcut.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": true}, {"question": "Show that $$\\operatorname{arsinh}(-3)$$ can be written as either $$\\ln(\\sqrt{10} - 3)$$ or $$-\\ln(3 + \\sqrt{10})$$, and verify these are equal. (3 steps)", "answer": "- Step 1: Direct: $$\\operatorname{arsinh}(-3) = \\ln(-3 + \\sqrt{9+1}) = \\ln(\\sqrt{10} - 3)$$.\n- Step 2: But arsinh is odd, so $$\\operatorname{arsinh}(-3) = -\\operatorname{arsinh}(3) = -\\ln(3 + \\sqrt{10})$$.\n- Step 3: Verify equivalence: $$(\\sqrt{10} - 3)(\\sqrt{10} + 3) = 10 - 9 = 1$$, so $$\\sqrt{10} - 3 = \\dfrac{1}{3 + \\sqrt{10}}$$, and $$\\ln(\\sqrt{10} - 3) = -\\ln(3 + \\sqrt{10})$$. ✓\n\nBoth forms are valid; you can use either depending on which is cleaner.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "Express $$10\\cosh x + 6\\sinh x$$ in the form $$R\\cosh(x + \\alpha)$$ with $$R > 0$$. (4 steps)", "answer": "- Step 1: Expand $$R\\cosh(x + \\alpha) = R\\cosh x\\cosh\\alpha + R\\sinh x\\sinh\\alpha$$. Match: $$R\\cosh\\alpha = 10$$, $$R\\sinh\\alpha = 6$$.\n- Step 2: Use $$\\cosh^2\\alpha - \\sinh^2\\alpha = 1$$: $$\\dfrac{100 - 36}{R^2} = 1$$, so $$R^2 = 64$$, $$R = 8$$.\n- Step 3: $$\\tanh\\alpha = 6/10 = 0.6$$, so $$\\alpha = \\operatorname{artanh}(0.6) = \\tfrac{1}{2}\\ln\\dfrac{1.6}{0.4} = \\tfrac{1}{2}\\ln 4 = \\ln 2$$.\n- Step 4: $$10\\cosh x + 6\\sinh x = 8\\cosh(x + \\ln 2)$$. **Minimum value: $$8$$ at $$x = -\\ln 2$$.**", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": false}, {"question": "Why is the R-form an efficient way to solve $$10\\cosh x + 6\\sinh x = 11$$? (3 steps)", "answer": "- Step 1: From the previous result: $$10\\cosh x + 6\\sinh x = 8\\cosh(x + \\ln 2)$$. Equation becomes $$\\cosh(x + \\ln 2) = 11/8$$.\n- Step 2: Then $$x + \\ln 2 = \\pm\\operatorname{arcosh}(11/8) = \\pm\\ln\\left(\\dfrac{11 + \\sqrt{57}}{8}\\right)$$ (using $$\\sqrt{(11/8)^2 - 1} = \\sqrt{57}/8$$).\n- Step 3: $$x = -\\ln 2 \\pm\\ln\\left(\\dfrac{11 + \\sqrt{57}}{8}\\right)$$.\n\nThis is much cleaner than substituting exponentials and solving a quadratic — the R-form gives both solutions in one step.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "What sanity checks should you do after solving a hyperbolic equation by substituting exponentials? (3 steps)", "answer": "- Step 1: Check that any root $$u = e^x$$ from the quadratic is positive — discard $$u \\leq 0$$ since $$e^x > 0$$ always.\n- Step 2: Verify by substituting back: compute $$\\sinh x$$ or $$\\cosh x$$ from $$e^x$$ and $$e^{-x} = 1/e^x$$ and check the original equation.\n- Step 3: Mind the solution structure:\n+ $$\\sinh x = c$$: exactly one real root.\n+ $$\\cosh x = c$$: two roots if $$c > 1$$, one if $$c = 1$$, none if $$c < 1$$.\n+ $$\\tanh x = c$$: one root iff $$|c| < 1$$, else none.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": true}, {"question": "What familiar function is $$y = \\sinh x + \\cosh x$$? (3 steps)", "answer": "- Step 1: $$\\sinh x + \\cosh x = \\dfrac{e^x - e^{-x}}{2} + \\dfrac{e^x + e^{-x}}{2} = \\dfrac{2e^x}{2} = e^x$$.\n- Step 2: So the graph is just $$y = e^x$$ — passes through $$(0, 1)$$, increasing, asymptotic to the x-axis as $$x \\to -\\infty$$.\n- Step 3: This makes sense from the \"even + odd\" decomposition: cosh is the even part of $$e^x$$, sinh is the odd part, and recombining gives back the original. Similarly, $$\\cosh x - \\sinh x = e^{-x}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "Why is $$\\operatorname{arcosh}(-2)$$ undefined in the real numbers? (2 steps)", "answer": "- Step 1: $$\\operatorname{arcosh}$$ has domain $$x \\geq 1$$ because the range of cosh (restricted to $$x \\geq 0$$) is $$[1, \\infty)$$. There's no real $$y$$ with $$\\cosh y = -2$$ since $$\\cosh y \\geq 1$$ always.\n- Step 2: Even formally: $$\\ln(-2 + \\sqrt{4 - 1}) = \\ln(\\sqrt{3} - 2)$$, and $$\\sqrt{3} \\approx 1.73 < 2$$, so the argument is negative — log undefined in reals.\n\nAlways check the domain before applying inverse formulas.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "What is the geometric meaning of the parameter $$t$$ in the parametrization $$(\\cosh t, \\sinh t)$$ of the unit hyperbola? (3 steps)", "answer": "- Step 1: For the unit circle, the parameter in $$(\\cos t, \\sin t)$$ equals the **angle** in radians — equivalently, twice the area of the circular sector swept from the positive x-axis.\n- Step 2: For the unit hyperbola $$x^2 - y^2 = 1$$, the parameter in $$(\\cosh t, \\sinh t)$$ equals **twice the area** of the hyperbolic sector between the curve, the x-axis, and the line from origin to $$(\\cosh t, \\sinh t)$$.\n- Step 3: This is why the inverse function is called \"ar-\" (for area), not \"arc\": there's no natural arc length on the hyperbola, but the area-parameter interpretation comes out cleanly. The identity $$\\cosh^2 t - \\sinh^2 t = 1$$ is just the equation of the hyperbola.", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": false}, {"question": "Given $$\\operatorname{artanh} x + \\operatorname{artanh} y = \\ln\\sqrt{3}$$, find $$y$$ in terms of $$x$$. (4 steps)", "answer": "- Step 1: Use $$\\operatorname{artanh} x = \\tfrac{1}{2}\\ln\\left(\\dfrac{1+x}{1-x}\\right)$$. Sum: $$\\tfrac{1}{2}\\ln\\left(\\dfrac{1+x}{1-x}\\right) + \\tfrac{1}{2}\\ln\\left(\\dfrac{1+y}{1-y}\\right) = \\tfrac{1}{2}\\ln 3$$.\n- Step 2: Multiply by 2 and combine logs: $$\\dfrac{(1+x)(1+y)}{(1-x)(1-y)} = 3$$.\n- Step 3: Cross-multiply: $$(1+x)(1+y) = 3(1-x)(1-y)$$. Expand: $$1 + x + y + xy = 3 - 3x - 3y + 3xy$$.\n- Step 4: Rearrange: $$4x + 4y - 2xy - 2 = 0$$, then $$y(2 - x) = 1 - 2x$$, giving $$y = \\dfrac{1 - 2x}{2 - x} = \\dfrac{2x - 1}{x - 2}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": false}, {"question": "When is the equation $$\\tanh x = c$$ solvable for real $$x$$, and what's the formula? (3 steps)", "answer": "- Step 1: Range of tanh is $$(-1, 1)$$, so $$\\tanh x = c$$ has a real solution iff $$|c| < 1$$.\n- Step 2: For such $$c$$, there's a **unique** real $$x = \\operatorname{artanh} c$$.\n- Step 3: Log form: $$x = \\tfrac{1}{2}\\ln\\left(\\dfrac{1+c}{1-c}\\right)$$. As $$c \\to 1^-$$, $$x \\to +\\infty$$; as $$c \\to -1^+$$, $$x \\to -\\infty$$ — the argument of $$\\ln$$ stays positive iff $$|c| < 1$$.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": false}, {"question": "Where do the graphs of $$y = \\cosh 2x$$ and $$y = 2\\cosh x$$ intersect? (4 steps)", "answer": "- Step 1: At $$x = 0$$: $$\\cosh 0 = 1$$ and $$2\\cosh 0 = 2$$, so $$2\\cosh x$$ starts above. For large $$|x|$$, $$\\cosh 2x \\approx \\tfrac{1}{2}e^{2|x|}$$ dominates over $$2\\cosh x \\approx e^{|x|}$$.\n- Step 2: Set $$\\cosh 2x = 2\\cosh x$$, use $$\\cosh 2x = 2\\cosh^2 x - 1$$: $$2\\cosh^2 x - 1 = 2\\cosh x$$.\n- Step 3: $$2\\cosh^2 x - 2\\cosh x - 1 = 0$$. By quadratic formula: $$\\cosh x = \\dfrac{2 \\pm\\sqrt{4 + 8}}{4} = \\dfrac{1 \\pm\\sqrt{3}}{2}$$.\n- Step 4: Only $$\\dfrac{1 + \\sqrt{3}}{2} > 1$$ is valid (need cosh $$\\geq 1$$). So intersection at $$x = \\pm\\operatorname{arcosh}\\left(\\dfrac{1+\\sqrt{3}}{2}\\right)$$ — two symmetric points.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": true}, {"question": "Why is sign care important when computing cosh from sinh, but both signs are possible when computing sinh from cosh? (3 steps)", "answer": "- Step 1: Given $$\\sinh x = s$$: from $$\\cosh^2 x - \\sinh^2 x = 1$$, $$\\cosh^2 x = 1 + s^2$$. Since $$\\cosh x \\geq 1 > 0$$, we **must** take $$\\cosh x = +\\sqrt{1 + s^2}$$.\n- Step 2: Given $$\\cosh x = c \\geq 1$$: $$\\sinh^2 x = c^2 - 1$$, so $$\\sinh x = \\pm\\sqrt{c^2 - 1}$$. **Both signs are valid** because sinh can be positive or negative depending on whether $$x$$ is positive or negative.\n- Step 3: The asymmetry comes from the function shapes: cosh has fixed sign (always positive), but sinh changes sign.", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": true}, {"question": "What's the strategic value of the half-angle identity $$\\cosh x = \\dfrac{1 + \\tanh^2(x/2)}{1 - \\tanh^2(x/2)}$$ (and its sinh and tanh siblings)? (3 steps)", "answer": "- Step 1: It expresses cosh in terms of $$t = \\tanh(x/2)$$ alone — so any equation in sinh/cosh/tanh can be turned into a polynomial/rational equation in $$t$$.\n- Step 2: Companion identities: $$\\sinh x = \\dfrac{2t}{1 - t^2}$$ and $$\\tanh x = \\dfrac{2t}{1 + t^2}$$.\n- Step 3: This substitution is useful for definite integrals and equation-solving — it standardizes a \"mixed\" hyperbolic equation into a single-variable rational equation.\n\nThese are the hyperbolic analogues of the Weierstrass $$t = \\tan(x/2)$$ substitution.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": true}, {"question": "Why is $$f(x) = \\sinh x$$ a bijection from $$\\mathbb{R}$$ to $$\\mathbb{R}$$, while cosh is not? (2 steps)", "answer": "- Step 1: $$f'(x) = \\cosh x \\geq 1 > 0$$ for all real $$x$$. So sinh is strictly increasing — hence injective.\n- Step 2: Limits: $$\\sinh x \\to -\\infty$$ as $$x \\to -\\infty$$, $$\\sinh x \\to +\\infty$$ as $$x \\to +\\infty$$. By the IVT, every real value is attained — exactly once. Hence $$\\operatorname{arsinh}: \\mathbb{R} \\to \\mathbb{R}$$ is a bijection. Cosh, being even and U-shaped, fails injectivity.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": false}, {"question": "Express $$\\operatorname{artanh}(1/2)$$ as a single natural logarithm. (3 steps)", "answer": "- Step 1: Use $$\\operatorname{artanh} x = \\tfrac{1}{2}\\ln\\left(\\dfrac{1+x}{1-x}\\right)$$ with $$x = 1/2$$.\n- Step 2: $$\\dfrac{1 + 1/2}{1 - 1/2} = \\dfrac{3/2}{1/2} = 3$$.\n- Step 3: So $$\\operatorname{artanh}(1/2) = \\tfrac{1}{2}\\ln 3 = \\ln\\sqrt{3}$$.\n\nThe fraction $$(1+x)/(1-x)$$ usually simplifies to a clean rational when $$x$$ is a simple fraction.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": false}, {"question": "Solve $$2\\tanh x = \\cosh x$$ exactly. (4 steps)", "answer": "- Step 1: $$\\dfrac{2\\sinh x}{\\cosh x} = \\cosh x$$, so $$2\\sinh x = \\cosh^2 x$$.\n- Step 2: Use $$\\cosh^2 x = 1 + \\sinh^2 x$$: $$2\\sinh x = 1 + \\sinh^2 x$$, i.e. $$\\sinh^2 x - 2\\sinh x + 1 = 0$$.\n- Step 3: Factor: $$(\\sinh x - 1)^2 = 0$$, so $$\\sinh x = 1$$.\n- Step 4: Hence $$x = \\operatorname{arsinh}(1) = \\ln(1 + \\sqrt{2})$$.\n\nA nice example where a perfect-square factorization gives a unique solution.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": false}, {"question": "Express $$3\\cosh x + 5\\sinh x$$ in the form $$R\\sinh(x + \\alpha)$$. Why is $$R\\sinh$$ the right choice (rather than $$R\\cosh$$) here? (4 steps)", "answer": "- Step 1: Choice of form depends on which coefficient is larger: $$|5| > |3|$$, so the sinh coefficient dominates — try $$R\\sinh(x + \\alpha) = R\\sinh x\\cosh\\alpha + R\\cosh x\\sinh\\alpha$$. Match: $$R\\cosh\\alpha = 5$$, $$R\\sinh\\alpha = 3$$.\n- Step 2: $$R^2 = 25 - 9 = 16$$, so $$R = 4$$.\n- Step 3: $$\\tanh\\alpha = 3/5$$, so $$\\alpha = \\tfrac{1}{2}\\ln(8/2) = \\tfrac{1}{2}\\ln 4 = \\ln 2$$.\n- Step 4: Result: $$3\\cosh x + 5\\sinh x = 4\\sinh(x + \\ln 2)$$. If we'd tried $$R\\cosh$$, we'd get $$R^2 = 9 - 25 < 0$$ — impossible. The form must respect the dominant coefficient.", "source": "Opus 4.7 ①", "_id": "opus_1_75", "judge_pick": false}, {"question": "Why does $$\\dfrac{1}{\\cos^2 x} - \\tan^2 x \\equiv 1$$, and what's its hyperbolic counterpart? (3 steps)", "answer": "- Step 1: Trig: $$\\sec^2 x - \\tan^2 x = \\dfrac{1 - \\sin^2 x}{\\cos^2 x} = \\dfrac{\\cos^2 x}{\\cos^2 x} = 1$$.\n- Step 2: By Osborn: $$\\sec \\to \\operatorname{sech}$$, and $$\\tan^2 x$$ (implied $$\\sin\\cdot\\sin$$) becomes $$-\\tanh^2 x$$.\n- Step 3: Hyperbolic identity: $$\\operatorname{sech}^2 x - (-\\tanh^2 x) = 1$$, i.e. $$\\operatorname{sech}^2 x + \\tanh^2 x = 1$$, equivalently $$\\operatorname{sech}^2 x = 1 - \\tanh^2 x$$.\n\nThis is consistent with dividing $$\\cosh^2 - \\sinh^2 = 1$$ by $$\\cosh^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_76", "judge_pick": true}, {"question": "Why must we choose the right form of $$\\cosh 2x$$ when solving an equation? Use $$\\cosh 2x - 5\\cosh x + 4 = 0$$ as the example. (3 steps)", "answer": "- Step 1: Three equivalent forms: $$\\cosh 2x = 2\\cosh^2 x - 1 = 1 + 2\\sinh^2 x = \\cosh^2 x + \\sinh^2 x$$.\n- Step 2: The equation has only cosh terms (and a constant). To stay in one variable, choose the form expressed purely in cosh: $$2\\cosh^2 x - 1$$.\n- Step 3: Other forms would introduce sinh, requiring further substitution. Pattern-match: equation in cosh → use $$2\\cosh^2 x - 1$$; equation in sinh → use $$1 + 2\\sinh^2 x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_77", "judge_pick": true}, {"question": "Why does $$\\sinh x \\approx x$$ for small $$x$$, and what's the next correction term? (3 steps)", "answer": "- Step 1: Taylor series of $$e^x$$: $$e^x = 1 + x + \\dfrac{x^2}{2} + \\dfrac{x^3}{6} + \\cdots$$. Subtract $$e^{-x}$$ and divide by 2: $$\\sinh x = x + \\dfrac{x^3}{6} + \\dfrac{x^5}{120} + \\cdots$$ (only odd powers — confirms sinh is odd).\n- Step 2: For small $$x$$: $$\\sinh x \\approx x$$ to leading order, with first correction $$+x^3/6$$.\n- Step 3: Compare with $$\\sin x = x - x^3/6 + \\cdots$$: same leading term, but signs alternate for sin and stay positive for sinh. So locally identical, globally radically different.", "source": "Opus 4.7 ①", "_id": "opus_1_78", "judge_pick": true}, {"question": "Given $$\\sinh x = -1$$, find the exact values of $$\\cosh x$$, $$\\sinh 2x$$, $$\\cosh 2x$$, and $$\\tanh 2x$$. (5 steps)", "answer": "- Step 1: $$\\cosh^2 x = 1 + \\sinh^2 x = 2$$, and $$\\cosh x \\geq 1$$, so $$\\cosh x = \\sqrt{2}$$.\n- Step 2: $$\\sinh 2x = 2\\sinh x\\cosh x = 2(-1)(\\sqrt{2}) = -2\\sqrt{2}$$.\n- Step 3: $$\\cosh 2x = 1 + 2\\sinh^2 x = 1 + 2 = 3$$ (using the form purely in sinh — most direct).\n- Step 4: $$\\tanh 2x = \\dfrac{\\sinh 2x}{\\cosh 2x} = \\dfrac{-2\\sqrt{2}}{3}$$.\n- Step 5: Sanity check: $$\\left|\\dfrac{-2\\sqrt{2}}{3}\\right| = \\dfrac{2\\sqrt{2}}{3} \\approx 0.94 < 1$$ ✓ (within tanh's range).", "source": "Opus 4.7 ①", "_id": "opus_1_79", "judge_pick": false}, {"question": "Why is $$\\sinh 0 = 0$$ but $$\\cosh 0 = 1$$ — the same starting values as $$\\sin 0$$ and $$\\cos 0$$? (3 steps)", "answer": "- Step 1: $$\\sinh 0 = (e^0 - e^0)/2 = 0$$ — sinh has a root at the origin, just like sin.\n- Step 2: $$\\cosh 0 = (1 + 1)/2 = 1$$ — cosh equals 1 at 0, just like cos.\n- Step 3: Not a coincidence: the parametrization $$(\\cosh t, \\sinh t)$$ at $$t = 0$$ gives $$(1, 0)$$ on the unit hyperbola — the natural \"start point\" — analogous to $$(\\cos 0, \\sin 0) = (1, 0)$$ on the unit circle.", "source": "Opus 4.7 ①", "_id": "opus_1_80", "judge_pick": true}, {"question": "Why must $$\\operatorname{arsech} x$$ have domain $$0 < x \\leq 1$$? (3 steps)", "answer": "- Step 1: $$\\operatorname{sech} x$$ has range $$(0, 1]$$ on its restricted domain $$x \\geq 0$$ (equals 1 at $$x = 0$$, decays to 0 as $$x \\to \\infty$$, never quite reaching 0).\n- Step 2: For an inverse: domain of $$f^{-1}$$ = range of $$f$$.\n- Step 3: So $$\\operatorname{arsech}$$ takes inputs from $$(0, 1]$$ — lower bound open (sech never reaches 0), upper bound closed (sech achieves 1 at $$x = 0$$).", "source": "Opus 4.7 ①", "_id": "opus_1_81", "judge_pick": false}, {"question": "Solve $$4\\cosh x + 13e^{-x} = 11$$ for real $$x$$, exactly. (4 steps)", "answer": "- Step 1: Substitute $$\\cosh x = (e^x + e^{-x})/2$$: $$4\\cdot\\dfrac{e^x + e^{-x}}{2} + 13e^{-x} = 11$$, giving $$2e^x + 2e^{-x} + 13e^{-x} = 11$$, i.e. $$2e^x + 15e^{-x} = 11$$.\n- Step 2: Multiply by $$e^x$$: $$2e^{2x} - 11e^x + 15 = 0$$.\n- Step 3: Factor: $$(2e^x - 5)(e^x - 3) = 0$$, so $$e^x = 5/2$$ or $$e^x = 3$$.\n- Step 4: Hence $$x = \\ln(5/2)$$ or $$x = \\ln 3$$.\n\nThe general lesson: when an equation mixes hyperbolic and exponential terms, going to pure exponentials is usually cleanest.", "source": "Opus 4.7 ①", "_id": "opus_1_82", "judge_pick": false}, {"question": "Identify the substitution that turns $$3\\sinh^2 x - 13\\cosh x + 7 = 0$$ into a quadratic in cosh. Solve it. (3 steps)", "answer": "- Step 1: Use $$\\sinh^2 x = \\cosh^2 x - 1$$ to eliminate sinh: $$3(\\cosh^2 x - 1) - 13\\cosh x + 7 = 0$$, simplifying to $$3\\cosh^2 x - 13\\cosh x + 4 = 0$$.\n- Step 2: Factor: $$(3\\cosh x - 1)(\\cosh x - 4) = 0$$, so $$\\cosh x = 1/3$$ or $$\\cosh x = 4$$.\n- Step 3: $$\\cosh x = 1/3$$ rejected (cosh $$\\geq 1$$); $$\\cosh x = 4$$ gives $$x = \\pm\\ln(4 + \\sqrt{15})$$.\n\nThe key insight: pick the identity that lets you convert everything into a single hyperbolic function.", "source": "Opus 4.7 ①", "_id": "opus_1_83", "judge_pick": true}, {"question": "How many real solutions does $$\\cosh 2x + 2\\cosh x - 5 = 0$$ have? (4 steps)", "answer": "- Step 1: Use $$\\cosh 2x = 2\\cosh^2 x - 1$$: equation becomes $$2\\cosh^2 x + 2\\cosh x - 6 = 0$$, simplifying to $$\\cosh^2 x + \\cosh x - 3 = 0$$.\n- Step 2: Set $$u = \\cosh x$$, $$u \\geq 1$$: $$u^2 + u - 3 = 0$$, roots $$u = \\dfrac{-1\\pm\\sqrt{13}}{2}$$.\n- Step 3: $$\\dfrac{-1+\\sqrt{13}}{2} \\approx 1.30 \\geq 1$$ ✓ valid. $$\\dfrac{-1-\\sqrt{13}}{2} < 0$$ rejected.\n- Step 4: $$\\cosh x = \\dfrac{-1+\\sqrt{13}}{2}$$ has **two** real solutions $$x = \\pm\\operatorname{arcosh}\\left(\\dfrac{-1+\\sqrt{13}}{2}\\right)$$ (since cosh is even and $$u > 1$$).", "source": "Opus 4.7 ①", "_id": "opus_1_84", "judge_pick": true}, {"question": "Why is $$\\operatorname{arcosh} 1 = 0$$, and is this an exception to \"$$\\cosh x = c$$ has two solutions\"? (2 steps)", "answer": "- Step 1: $$\\operatorname{arcosh}(c)$$ is the unique non-negative $$x$$ with $$\\cosh x = c$$. Since $$\\cosh 0 = 1$$, indeed $$\\operatorname{arcosh} 1 = 0$$.\n- Step 2: At $$c = 1$$, the two roots usually expected from $$\\cosh x = c$$ collapse together at $$x = 0$$ — exactly where cosh achieves its minimum. This is a degenerate boundary case: $$c = 1$$ gives one (double) solution; $$c > 1$$ gives two distinct ones; $$c < 1$$ gives none.", "source": "Opus 4.7 ①", "_id": "opus_1_85", "judge_pick": true}, {"question": "Find $$\\tanh(\\ln(1/4))$$ exactly. (3 steps)", "answer": "- Step 1: Use $$\\tanh x = \\dfrac{e^{2x} - 1}{e^{2x} + 1}$$ with $$x = \\ln(1/4)$$.\n- Step 2: $$e^{2\\ln(1/4)} = e^{\\ln(1/16)} = 1/16$$.\n- Step 3: $$\\tanh(\\ln(1/4)) = \\dfrac{1/16 - 1}{1/16 + 1} = \\dfrac{-15/16}{17/16} = -\\dfrac{15}{17}$$.\n\nThis is the negative of $$\\tanh(\\ln 4) = 15/17$$ — consistent with tanh being odd: $$\\tanh(\\ln(1/k)) = \\tanh(-\\ln k) = -\\tanh(\\ln k)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_86", "judge_pick": false}, {"question": "Why is $$\\sinh x \\cosh y$$ NOT equal to $$\\tfrac{1}{2}[\\sinh(x+y) + \\sinh(x-y)]$$ — wait, actually it IS. Show this. (3 steps)", "answer": "- Step 1: Use addition formulae: $$\\sinh(x+y) = \\sinh x\\cosh y + \\cosh x\\sinh y$$ and $$\\sinh(x-y) = \\sinh x\\cosh y - \\cosh x\\sinh y$$.\n- Step 2: Add the two: $$\\sinh(x+y) + \\sinh(x-y) = 2\\sinh x\\cosh y$$.\n- Step 3: Divide by 2: $$\\sinh x\\cosh y = \\tfrac{1}{2}[\\sinh(x+y) + \\sinh(x-y)]$$. This is the hyperbolic product-to-sum identity.\n\nThe structure is identical to the trig version $$\\sin x\\cos y = \\tfrac{1}{2}[\\sin(x+y) + \\sin(x-y)]$$ — no Osborn sign change because there's no implied $$\\sin\\cdot\\sin$$ in this combination.", "source": "Opus 4.7 ①", "_id": "opus_1_87", "judge_pick": true}, {"question": "A line of equation $$y = mx$$ with $$m > 0$$ intersects $$y = \\sinh x$$ how many times for various $$m$$? (4 steps)", "answer": "- Step 1: At $$x = 0$$: both sides are 0, so origin is always an intersection.\n- Step 2: Derivative of sinh at $$x = 0$$ is $$\\cosh 0 = 1$$. So the tangent at origin has slope 1.\n+ If $$m > 1$$: line rises faster than sinh near origin. But sinh's slope (cosh x) is unbounded, so eventually catches up; they intersect at some $$x_0 > 0$$. By odd symmetry, also at $$-x_0$$. Total: 3 intersections (origin + 2 symmetric).\n+ If $$0 < m < 1$$: line below sinh's tangent locally, but sinh grows convexly above any line. Line lies below sinh for small positive $$x$$ but... actually need more care. Line meets sinh only at origin since sinh's slope $$\\cosh x \\geq 1 > m$$ everywhere — sinh stays above the line for $$x > 0$$ and below for $$x < 0$$. Total: 1 intersection.\n- Step 3: If $$m = 1$$: line is tangent at origin — single touching intersection. (Sinh stays above line for $$x > 0$$ and below for $$x < 0$$.)\n- Step 4: Summary: $$0 < m \\leq 1$$ → 1 intersection; $$m > 1$$ → 3 intersections.", "source": "Opus 4.7 ①", "_id": "opus_1_88", "judge_pick": false}, {"question": "Solve $$30\\cosh x = 15 + 26\\sinh x$$ exactly using exponential form. (4 steps)", "answer": "- Step 1: Substitute: $$30\\cdot\\dfrac{e^x + e^{-x}}{2} = 15 + 26\\cdot\\dfrac{e^x - e^{-x}}{2}$$, i.e. $$15(e^x + e^{-x}) = 15 + 13(e^x - e^{-x})$$.\n- Step 2: $$15e^x + 15e^{-x} - 13e^x + 13e^{-x} = 15$$, simplifying to $$2e^x + 28e^{-x} = 15$$.\n- Step 3: Multiply by $$e^x$$: $$2e^{2x} - 15e^x + 28 = 0$$. Factor: $$(2e^x - 7)(e^x - 4) = 0$$, so $$e^x = 7/2$$ or $$e^x = 4$$.\n- Step 4: Hence $$x = \\ln(7/2)$$ or $$x = \\ln 4$$.", "source": "Opus 4.7 ①", "_id": "opus_1_89", "judge_pick": false}], "count": 90}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Define $$\\sinh x$$ in terms of exponential functions, and explain why this construction is structurally natural. (3 steps)", "answer": "- Step 1: By definition, $$\\sinh x \\equiv \\frac{e^x - e^{-x}}{2}$$ for $$x \\in \\mathbb{R}$$.\n- Step 2: This is the *odd part* of $$e^x$$. Any function $$f(x)$$ splits uniquely into an even part $$\\frac{f(x)+f(-x)}{2}$$ and odd part $$\\frac{f(x)-f(-x)}{2}$$. For $$f(x)=e^x$$, the odd part is exactly $$\\sinh x$$.\n- Step 3: This makes $$\\sinh$$ analogous to $$\\sin$$: vanishes at $$0$$, odd, monotonic. The minus sign in the numerator is what enforces the odd symmetry — flipping $$x \\to -x$$ flips the whole expression.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Define $$\\cosh x$$ in terms of exponentials and identify the structural role this definition plays. (3 steps)", "answer": "- Step 1: $$\\cosh x \\equiv \\frac{e^x + e^{-x}}{2}$$ for $$x \\in \\mathbb{R}$$.\n- Step 2: This is the *even part* of $$e^x$$ — the plus sign forces $$\\cosh(-x) = \\cosh(x)$$.\n- Step 3: Key consequences:\n+ $$\\cosh 0 = 1$$ (minimum).\n+ $$\\cosh x \\geq 1$$ always (by AM-GM: $$e^x + e^{-x} \\geq 2\\sqrt{e^x \\cdot e^{-x}} = 2$$).\n+ Symmetric about the $$y$$-axis.\n+ Together with $$\\sinh$$: $$\\cosh^2 - \\sinh^2 = 1$$ (parametrises the unit hyperbola).", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Why are hyperbolic functions defined using $$e^x$$ and $$e^{-x}$$? What's the deeper connection to trigonometry? (3 steps)", "answer": "- Step 1: Trigonometric functions can be written using *imaginary* exponentials (Euler): $$\\cos x = \\frac{e^{ix}+e^{-ix}}{2}$$, $$\\sin x = \\frac{e^{ix}-e^{-ix}}{2i}$$.\n- Step 2: Hyperbolic functions are the *real-argument* analogues — drop the $$i$$: $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$, $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$.\n- Step 3: Consequence: every trig identity has a hyperbolic counterpart (sometimes with sign flips on products of sines — Osborn's rule). Trig parametrises a circle; hyperbolic parametrises a hyperbola — same algebraic role, different curves.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "Define $$\\tanh x$$ in two equivalent forms, and show how to derive one from the other. (3 steps)", "answer": "- Step 1: As a ratio: $$\\tanh x \\equiv \\frac{\\sinh x}{\\cosh x} = \\frac{e^x - e^{-x}}{e^x + e^{-x}}$$.\n- Step 2: Multiply top and bottom by $$e^x$$ to clean up: $$\\tanh x = \\frac{e^{2x} - 1}{e^{2x} + 1}$$.\n- Step 3: This second form is especially handy for $$\\tanh(\\ln k)$$ since $$e^{2\\ln k} = k^2$$, giving $$\\tanh(\\ln k) = \\frac{k^2-1}{k^2+1}$$ — a useful mental shortcut.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "State the definitions of the three reciprocal hyperbolic functions $$\\operatorname{sech} x$$, $$\\operatorname{cosech} x$$, and $$\\coth x$$ in exponential form. (3 steps)", "answer": "- Step 1: $$\\operatorname{sech} x \\equiv \\frac{1}{\\cosh x} = \\frac{2}{e^x + e^{-x}}$$.\n- Step 2: $$\\operatorname{cosech} x \\equiv \\frac{1}{\\sinh x} = \\frac{2}{e^x - e^{-x}}$$ (defined for $$x \\neq 0$$).\n- Step 3: $$\\coth x \\equiv \\frac{1}{\\tanh x} = \\frac{e^{2x}+1}{e^{2x}-1}$$ (defined for $$x \\neq 0$$).\n\nThese mirror the trig reciprocals (sec, cosec, cot) but built from real exponentials.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Show that $$\\sinh$$ is an odd function directly from its definition, and explain why this is structurally inevitable. (3 steps)", "answer": "- Step 1: $$\\sinh(-x) = \\frac{e^{-x} - e^{x}}{2}$$.\n- Step 2: Factor out $$-1$$: $$\\frac{e^{-x} - e^x}{2} = -\\frac{e^x - e^{-x}}{2} = -\\sinh x$$. So $$\\sinh(-x) = -\\sinh x$$ ✓.\n- Step 3: Why inevitable: $$\\sinh$$ was *constructed* as the odd part of $$e^x$$. The \"$$-$$\" in the numerator engineers this symmetry. Graphically: $$180°$$ rotational symmetry about the origin.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Show that $$\\cosh$$ is even, and state the most important practical consequence of this. (3 steps)", "answer": "- Step 1: $$\\cosh(-x) = \\frac{e^{-x} + e^x}{2} = \\frac{e^x + e^{-x}}{2} = \\cosh x$$ ✓.\n- Step 2: Graphical consequence: symmetric about the $$y$$-axis (U-shape with minimum at $$x=0$$).\n- Step 3: Most practical consequence: equations involving only $$\\cosh x$$ tell you the *absolute value* of $$x$$, not its sign. So $$\\cosh x = k$$ (with $$k > 1$$) has *two* solutions $$\\pm x_0$$, while $$\\sinh x = k$$ has *one*. This is a key thing to remember when solving.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "How does $$\\sinh x$$ behave as $$x \\to \\infty$$ and $$x \\to -\\infty$$? (3 steps)", "answer": "- Step 1: $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$. As $$x \\to \\infty$$, $$e^{-x} \\to 0$$, so $$\\sinh x \\approx \\frac{1}{2}e^x$$ — exponential growth.\n- Step 2: As $$x \\to -\\infty$$, $$e^x \\to 0$$, so $$\\sinh x \\approx -\\frac{1}{2}e^{-x}$$ — exponential decrease (going to $$-\\infty$$).\n- Step 3: Therefore unbounded both above and below, no horizontal asymptotes. Range: $$\\mathbb{R}$$. The graph is \"the average\" of $$\\frac{1}{2}e^x$$ on the right and $$-\\frac{1}{2}e^{-x}$$ on the left.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Why does $$\\cosh x \\geq 1$$ for all real $$x$$? Use a clean argument. (3 steps)", "answer": "- Step 1: By AM-GM inequality: for positive numbers $$a, b$$, $$\\frac{a+b}{2} \\geq \\sqrt{ab}$$, with equality iff $$a = b$$.\n- Step 2: Apply with $$a = e^x$$, $$b = e^{-x}$$: $$\\cosh x = \\frac{e^x + e^{-x}}{2} \\geq \\sqrt{e^x \\cdot e^{-x}} = \\sqrt{1} = 1$$.\n- Step 3: Equality $$\\cosh x = 1$$ iff $$e^x = e^{-x}$$, i.e. $$x = 0$$. So minimum is exactly $$1$$, attained at the origin.\n\nThis is why cosh, unlike cos, never crosses zero — and consequently why tanh (which has cosh in the denominator) never blows up.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Why is $$\\tanh x$$ bounded between $$-1$$ and $$1$$, while $$\\tan x$$ is unbounded? (3 steps)", "answer": "- Step 1: $$\\tanh x = \\frac{e^{2x} - 1}{e^{2x} + 1}$$. As $$x \\to \\infty$$, $$e^{2x}$$ dominates the constants, so $$\\tanh x \\to 1$$. As $$x \\to -\\infty$$, $$e^{2x} \\to 0$$ so $$\\tanh x \\to -1$$.\n- Step 2: For finite $$x$$: numerator magnitude is strictly less than denominator (denominator has $$+1$$ vs numerator's $$-1$$), so $$|\\tanh x| < 1$$ always.\n- Step 3: Underlying reason: $$\\tanh = \\sinh/\\cosh$$, and $$\\cosh \\geq 1$$ never zeros — so $$\\tanh$$ never explodes. Compare $$\\tan = \\sin/\\cos$$ where $$\\cos$$ regularly hits zero, causing vertical asymptotes. The boundedness of $$\\tanh$$ is a direct consequence of $$\\cosh$$ never vanishing.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "State the range of all six hyperbolic functions on their natural domains, with brief justification. (6 steps)", "answer": "- Step 1: $$\\sinh x$$: range $$\\mathbb{R}$$ (unbounded both ways, monotonic).\n- Step 2: $$\\cosh x$$: range $$[1, \\infty)$$ (min $$1$$ at $$x=0$$, unbounded above).\n- Step 3: $$\\tanh x$$: range $$(-1, 1)$$ (asymptotes at $$\\pm 1$$, never attained).\n- Step 4: $$\\operatorname{sech} x = 1/\\cosh x$$: range $$(0, 1]$$ (max $$1$$ at $$x=0$$).\n- Step 5: $$\\operatorname{cosech} x = 1/\\sinh x$$ ($$x \\neq 0$$): range $$\\mathbb{R} \\setminus \\{0\\}$$.\n- Step 6: $$\\coth x = 1/\\tanh x$$ ($$x \\neq 0$$): range $$|y| > 1$$, since $$\\tanh \\in (-1,1)$$ inverts to outside $$[-1,1]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Describe the key features needed to sketch $$y = \\sinh x$$. (5 steps)", "answer": "- Step 1: Passes through origin: $$\\sinh 0 = 0$$.\n- Step 2: Odd symmetry — rotational symmetry about origin.\n- Step 3: Strictly increasing; gradient at origin is $$1$$ (since $$\\sinh x \\approx x$$ for small $$x$$).\n- Step 4: Asymptotic to $$y = \\frac{1}{2}e^x$$ on the right (above $$x$$-axis, growing fast); asymptotic to $$y = -\\frac{1}{2}e^{-x}$$ on the left.\n- Step 5: No horizontal asymptotes; range $$\\mathbb{R}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Describe the key features needed to sketch $$y = \\cosh x$$. (5 steps)", "answer": "- Step 1: Minimum at $$(0, 1)$$ — never goes below $$1$$.\n- Step 2: Even (symmetric about $$y$$-axis).\n- Step 3: Decreasing on $$(-\\infty, 0)$$, increasing on $$(0, \\infty)$$ — U-shape.\n- Step 4: Asymptotic to $$y = \\frac{1}{2}e^x$$ on right and $$y = \\frac{1}{2}e^{-x}$$ on left.\n- Step 5: Range $$[1, \\infty)$$. This curve is the *catenary* — the natural shape of a hanging chain.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Describe the key features needed to sketch $$y = \\tanh x$$. (5 steps)", "answer": "- Step 1: Passes through origin.\n- Step 2: Odd function (rotational symmetry about origin).\n- Step 3: Strictly increasing; S-shaped (sigmoid).\n- Step 4: Two horizontal asymptotes: $$y = 1$$ as $$x \\to \\infty$$, $$y = -1$$ as $$x \\to -\\infty$$.\n- Step 5: Range $$(-1, 1)$$ — bounded, qualitatively unlike $$\\tan$$. Always include the asymptotes in the sketch.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Describe the key features of the graph of $$y = \\operatorname{sech} x$$. (4 steps)", "answer": "- Step 1: Maximum at $$(0, 1)$$ since $$\\operatorname{sech} 0 = 1/\\cosh 0 = 1$$ (and cosh has its minimum there).\n- Step 2: Even function (mirrors cosh's symmetry through reciprocal).\n- Step 3: As $$|x| \\to \\infty$$, $$\\cosh x \\to \\infty$$, so $$\\operatorname{sech} x \\to 0^+$$. The $$x$$-axis is a horizontal asymptote.\n- Step 4: Bell-shaped curve, always positive, range $$(0, 1]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Describe the key features of the graph of $$y = \\operatorname{cosech} x$$ for $$x \\neq 0$$. (4 steps)", "answer": "- Step 1: Vertical asymptote at $$x = 0$$ (since $$\\sinh 0 = 0$$): $$\\operatorname{cosech} x \\to +\\infty$$ as $$x \\to 0^+$$, $$\\to -\\infty$$ as $$x \\to 0^-$$.\n- Step 2: Odd function (reciprocal of odd function).\n- Step 3: As $$|x| \\to \\infty$$, $$\\sinh x \\to \\pm\\infty$$, so $$\\operatorname{cosech} x \\to 0$$. The $$x$$-axis is a horizontal asymptote.\n- Step 4: Two-branch hyperbola-like graph; both axes are asymptotes.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Describe the key features of the graph of $$y = \\coth x$$ for $$x \\neq 0$$. (4 steps)", "answer": "- Step 1: Vertical asymptote at $$x = 0$$ (since $$\\tanh 0 = 0$$).\n- Step 2: As $$x \\to \\infty$$, $$\\tanh x \\to 1$$, so $$\\coth x \\to 1$$. Symmetrically, as $$x \\to -\\infty$$, $$\\coth x \\to -1$$.\n- Step 3: Odd function.\n- Step 4: Two branches: for $$x > 0$$, $$\\coth x > 1$$ approaching $$1$$ from above; for $$x < 0$$, $$\\coth x < -1$$ approaching $$-1$$ from below. Three asymptotes total: $$x = 0$$, $$y = \\pm 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Why are the functions $$\\sinh$$ and $$\\cosh$$ called \"hyperbolic\"? Connect to the trig analogue. (3 steps)", "answer": "- Step 1: Trigonometric functions are \"circular\" because $$(\\cos t, \\sin t)$$ traces the unit circle $$x^2 + y^2 = 1$$.\n- Step 2: For hyperbolic, $$(\\cosh t, \\sinh t)$$ satisfies $$\\cosh^2 t - \\sinh^2 t = 1$$, the equation of the unit hyperbola $$x^2 - y^2 = 1$$.\n- Step 3: So $$(\\cosh t, \\sinh t)$$ traces (one branch of) this hyperbola as $$t$$ varies over $$\\mathbb{R}$$. Hence \"hyperbolic.\" This is the geometric reason for the name and the source of all the structural similarity to trigonometry.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "Prove the fundamental identity $$\\cosh^2 A - \\sinh^2 A \\equiv 1$$ from the exponential definitions. (3 steps)", "answer": "- Step 1: Substitute definitions:\n$$\\cosh^2 A - \\sinh^2 A = \\left(\\frac{e^A + e^{-A}}{2}\\right)^2 - \\left(\\frac{e^A - e^{-A}}{2}\\right)^2$$\n- Step 2: Expand each square: $$\\frac{e^{2A} + 2 + e^{-2A}}{4} - \\frac{e^{2A} - 2 + e^{-2A}}{4}$$. The $$e^{\\pm 2A}$$ terms cancel pairwise, leaving $$\\frac{2 - (-2)}{4} = 1$$.\n- Step 3: Structural reason: $$(a+b)^2 - (a-b)^2 = 4ab$$ with $$a = e^A/2, b = e^{-A}/2$$ gives $$4 \\cdot \\frac{e^A}{2} \\cdot \\frac{e^{-A}}{2} = e^A e^{-A} = 1$$. The $$\\pm$$ structure of cosh/sinh is engineered to make this cancellation happen.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Why does the hyperbolic identity $$\\cosh^2 - \\sinh^2 = 1$$ have a *minus*, while the trig identity $$\\cos^2 + \\sin^2 = 1$$ has a *plus*? (3 steps)", "answer": "- Step 1: For trig: $$(\\cos t, \\sin t)$$ lies on circle $$x^2 + y^2 = 1$$ → identity has \"+\".\n- Step 2: For hyperbolic: $$(\\cosh t, \\sinh t)$$ lies on hyperbola $$x^2 - y^2 = 1$$ → identity has \"−\". The sign in the conic equation matches the sign in the identity.\n- Step 3: Algebraic origin: trig uses $$e^{ix}, e^{-ix}$$ (with imaginary $$i$$), hyperbolic uses real $$e^x, e^{-x}$$. The $$i^2 = -1$$ produces the sign flip when expanding squares — this is the deep cause of the sign difference.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "State and explain the three equivalent forms of $$\\cosh 2A$$. When is each form most useful? (3 steps)", "answer": "- Step 1: Basic form (from addition formula with $$B = A$$): $$\\cosh 2A = \\cosh^2 A + \\sinh^2 A$$.\n- Step 2: Substitute $$\\sinh^2 A = \\cosh^2 A - 1$$ to get $$\\cosh 2A = 2\\cosh^2 A - 1$$. Useful when an equation mixes $$\\cosh 2x$$ with $$\\cosh x$$ (consolidates to a quadratic in $$\\cosh x$$).\n- Step 3: Substitute $$\\cosh^2 A = 1 + \\sinh^2 A$$ to get $$\\cosh 2A = 1 + 2\\sinh^2 A$$. Useful when an equation mixes $$\\cosh 2x$$ with $$\\sinh x$$ (consolidates to a quadratic in $$\\sinh x$$).\n\nCompare trig: $$\\cos 2A = 1 - 2\\sin^2 A$$ → hyperbolic $$1 + 2\\sinh^2 A$$ (sign flip on $$\\sin^2$$, exactly as Osborn's rule predicts).", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "State Osborn's rule for converting trig identities to hyperbolic identities, including the special exception. (3 steps)", "answer": "- Step 1: Replace $$\\cos$$ with $$\\cosh$$ and $$\\sin$$ with $$\\sinh$$.\n- Step 2: *However*: any product (or implied product) of two $$\\sin$$ terms picks up an extra negative sign: $$\\sin A \\sin B \\to -\\sinh A \\sinh B$$.\n- Step 3: \"Implied product\" means anywhere two sines appear multiplied — even if hidden in compound expressions. Examples:\n+ $$\\tan^2 A = \\sin^2 A / \\cos^2 A$$ contains $$\\sin \\cdot \\sin$$, so $$\\tan^2 A \\to -\\tanh^2 A$$.\n+ $$\\tan A \\tan B = (\\sin A \\sin B)/(\\cos A \\cos B)$$ contains $$\\sin \\cdot \\sin$$, so $$\\to -\\tanh A \\tanh B$$.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "Why does Osborn's rule actually work? What's the deep reason for the sign flip on products of sines? (3 steps)", "answer": "- Step 1: Complex relations via Euler: $$\\cos x = \\cosh(ix)$$ and $$\\sin x = -i\\sinh(ix)$$ (real-imaginary translation).\n- Step 2: Therefore $$\\sin^2 x = (-i)^2 \\sinh^2(ix) = -\\sinh^2(ix)$$. Each pair of sines absorbs a factor of $$(-i)^2 = -1$$. Products of cosines, or one cos × one sin, do not pick up this factor.\n- Step 3: When you transform a trig identity to its hyperbolic counterpart, every \"$$\\sin \\cdot \\sin$$\" term contributes an extra $$-1$$ — precisely Osborn's rule. So Osborn isn't a magical heuristic; it's a direct consequence of $$i^2 = -1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "State the addition formulas for $$\\sinh(A \\pm B)$$ and $$\\cosh(A \\pm B)$$, contrasting with their trig counterparts. (3 steps)", "answer": "- Step 1: $$\\sinh(A \\pm B) \\equiv \\sinh A \\cosh B \\pm \\cosh A \\sinh B$$. Identical in form to trig $$\\sin(A \\pm B)$$ — no Osborn flip (no product of two sines).\n- Step 2: $$\\cosh(A \\pm B) \\equiv \\cosh A \\cosh B \\pm \\sinh A \\sinh B$$. Compare trig $$\\cos(A \\pm B) = \\cos A \\cos B \\mp \\sin A \\sin B$$ — opposite sign on the second term.\n- Step 3: The hyperbolic cosh formula uses *the same sign as the argument* (\"+\" with $$+B$$, \"−\" with $$-B$$). The trig version uses the *opposite* sign. The Osborn flip on $$\\sin A \\sin B$$ explains the discrepancy.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "State the double-angle formula for $$\\sinh 2A$$ and explain its practical use. (2 steps)", "answer": "- Step 1: From the addition formula with $$B = A$$: $$\\sinh 2A = 2\\sinh A \\cosh A$$. Identical to trig $$\\sin 2A$$.\n- Step 2: Practical use: if you know $$\\sinh x$$, you can find $$\\sinh 2x$$ — but you need $$\\cosh x$$ too. Get $$\\cosh x$$ from the fundamental identity $$\\cosh^2 x = 1 + \\sinh^2 x$$ (taking the positive root, since $$\\cosh \\geq 1$$).", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Apply Osborn's rule to the trig identity $$\\sin(A-B) \\equiv \\sin A \\cos B - \\cos A \\sin B$$. What's the hyperbolic version? (2 steps)", "answer": "- Step 1: Each term has only one sine factor — no product of two sines anywhere. So no sign flip needed.\n- Step 2: Direct replacement: $$\\sinh(A-B) \\equiv \\sinh A \\cosh B - \\cosh A \\sinh B$$. Same form as the trig version.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Apply Osborn's rule to the trig identity $$\\cos 2A \\equiv 1 - 2\\sin^2 A$$. (2 steps)", "answer": "- Step 1: $$\\sin^2 A$$ is a product of two sines, so its sign flips: $$\\sin^2 A \\to -\\sinh^2 A$$.\n- Step 2: Result: $$\\cosh 2A \\equiv 1 - 2(-\\sinh^2 A) = 1 + 2\\sinh^2 A$$. The \"$$-$$\" became \"$$+$$\" — exactly one of the standard forms of $$\\cosh 2A$$.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Apply Osborn's rule to the trig identity $$\\sec^2 A - \\tan^2 A = 1$$. (3 steps)", "answer": "- Step 1: $$\\tan^2 A$$ contains an implied product of two sines (since $$\\tan = \\sin/\\cos$$), so $$\\tan^2 A \\to -\\tanh^2 A$$.\n- Step 2: $$\\sec^2 A \\to \\operatorname{sech}^2 A$$ (no change — no sines).\n- Step 3: Result: $$\\operatorname{sech}^2 A - (-\\tanh^2 A) = 1$$, i.e. $$\\operatorname{sech}^2 A + \\tanh^2 A = 1$$, or equivalently $$\\operatorname{sech}^2 A = 1 - \\tanh^2 A$$. Note the sign on $$\\tanh^2$$ flipped — this is the Osborn footprint.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Derive $$\\operatorname{cosech}^2 A \\equiv \\coth^2 A - 1$$ from the fundamental identity directly. (3 steps)", "answer": "- Step 1: Start with $$\\cosh^2 A - \\sinh^2 A = 1$$.\n- Step 2: Divide every term by $$\\sinh^2 A$$ (assuming $$A \\neq 0$$): $$\\frac{\\cosh^2 A}{\\sinh^2 A} - 1 = \\frac{1}{\\sinh^2 A}$$.\n- Step 3: Recognize: $$\\cosh A / \\sinh A = \\coth A$$ and $$1/\\sinh A = \\operatorname{cosech} A$$. So $$\\coth^2 A - 1 = \\operatorname{cosech}^2 A$$.\n\nThis parallels trig $$\\cot^2 + 1 = \\csc^2$$, but with the sign flip on $$\\cot^2$$ (Osborn's rule).", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Why must the domain of $$\\cosh$$ be restricted before defining its inverse? (3 steps)", "answer": "- Step 1: A function has an inverse only if it's *one-to-one*. But $$\\cosh$$ is even: $$\\cosh a = \\cosh(-a)$$, so it's not one-to-one over $$\\mathbb{R}$$ — multiple inputs map to one output.\n- Step 2: We restrict to $$x \\geq 0$$ (the right half), where $$\\cosh$$ is strictly increasing and one-to-one with range $$[1, \\infty)$$.\n- Step 3: With this restriction, $$\\operatorname{arcosh}: [1, \\infty) \\to [0, \\infty)$$ is well-defined. By convention, $$\\operatorname{arcosh}$$ returns only the *non-negative* value. This exactly parallels restricting $$\\cos$$ to $$[0, \\pi]$$ before defining $$\\arccos$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "State the domain of each inverse hyperbolic function. (6 steps)", "answer": "- Step 1: $$\\operatorname{arsinh} x$$: $$x \\in \\mathbb{R}$$ (sinh is bijective).\n- Step 2: $$\\operatorname{arcosh} x$$: $$x \\geq 1$$ (range of cosh on $$[0, \\infty)$$).\n- Step 3: $$\\operatorname{artanh} x$$: $$|x| < 1$$ (range of tanh).\n- Step 4: $$\\operatorname{arsech} x$$: $$0 < x \\leq 1$$.\n- Step 5: $$\\operatorname{arcosech} x$$: $$x \\neq 0$$.\n- Step 6: $$\\operatorname{arcoth} x$$: $$|x| > 1$$.\n\nThe pattern: the domain of each inverse equals the range of the corresponding (possibly restricted) hyperbolic function.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "Derive the formula $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2+1})$$ from the definition of sinh. (5 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arsinh} x$$, so $$x = \\sinh y = \\frac{e^y - e^{-y}}{2}$$. Multiply by $$2$$: $$2x = e^y - e^{-y}$$.\n- Step 2: Multiply by $$e^y$$ to clear the negative exponent: $$2xe^y = e^{2y} - 1$$, so $$e^{2y} - 2xe^y - 1 = 0$$.\n- Step 3: This is a quadratic in $$e^y$$. Solve: $$e^y = \\frac{2x \\pm \\sqrt{4x^2 + 4}}{2} = x \\pm \\sqrt{x^2 + 1}$$.\n- Step 4: Reject the \"−\" branch: $$\\sqrt{x^2+1} > |x| \\geq x$$, so $$x - \\sqrt{x^2+1} < 0$$, but $$e^y > 0$$ always. Take \"+\": $$e^y = x + \\sqrt{x^2+1}$$.\n- Step 5: Take logarithm: $$y = \\ln(x + \\sqrt{x^2+1})$$. Hence $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2+1})$$.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Derive $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2-1})$$ for $$x \\geq 1$$, and explain why we choose \"+\" over \"−\". (4 steps)", "answer": "- Step 1: Let $$y = \\operatorname{arcosh} x$$, so $$x = \\cosh y = \\frac{e^y + e^{-y}}{2}$$. Same algebra: $$e^{2y} - 2xe^y + 1 = 0$$.\n- Step 2: Quadratic in $$e^y$$: $$e^y = x \\pm \\sqrt{x^2 - 1}$$. Both roots are positive for $$x \\geq 1$$ (since $$x - \\sqrt{x^2-1} > 0$$).\n- Step 3: The two roots correspond to $$\\pm y$$ — both satisfy $$\\cosh(\\pm y) = x$$ (cosh is even). Note their product is $$(x+\\sqrt{x^2-1})(x-\\sqrt{x^2-1}) = x^2 - (x^2-1) = 1$$, so $$\\ln(x-\\sqrt{x^2-1}) = -\\ln(x+\\sqrt{x^2-1})$$.\n- Step 4: Convention: $$\\operatorname{arcosh}$$ returns the non-negative value. Since $$x + \\sqrt{x^2-1} \\geq 1$$, $$\\ln(x + \\sqrt{x^2-1}) \\geq 0$$. So we pick the \"+\" branch.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "Derive the formula $$\\operatorname{artanh} x = \\frac{1}{2}\\ln\\left(\\frac{1+x}{1-x}\\right)$$ for $$|x| < 1$$. (4 steps)", "answer": "- Step 1: Let $$y = \\operatorname{artanh} x$$, so $$x = \\tanh y = \\frac{e^{2y} - 1}{e^{2y}+1}$$.\n- Step 2: Cross-multiply: $$x(e^{2y}+1) = e^{2y} - 1$$. Rearrange: $$e^{2y}(1-x) = 1+x$$.\n- Step 3: Solve for $$e^{2y}$$: $$e^{2y} = \\frac{1+x}{1-x}$$. This is positive only when $$|x| < 1$$ — matching the domain.\n- Step 4: Take ln: $$2y = \\ln\\left(\\frac{1+x}{1-x}\\right)$$, so $$y = \\frac{1}{2}\\ln\\left(\\frac{1+x}{1-x}\\right)$$.\n\nThe factor of $$\\frac{1}{2}$$ is critical — comes from solving for $$2y$$ rather than $$y$$ directly.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Compare the structures of $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2+1})$$ and $$\\operatorname{arcosh} x = \\ln(x + \\sqrt{x^2-1})$$. Why the sign difference inside the square root? (3 steps)", "answer": "- Step 1: arsinh has \"$$+1$$\"; arcosh has \"$$-1$$\". The sign comes directly from the fundamental identity: $$\\cosh^2 = 1 + \\sinh^2$$ vs $$\\sinh^2 = \\cosh^2 - 1$$.\n- Step 2: For arsinh derivation, the algebra leads to $$\\sqrt{x^2 + 1}$$ — always defined for any real $$x$$. Hence arsinh has full domain $$\\mathbb{R}$$.\n- Step 3: For arcosh, $$\\sqrt{x^2 - 1}$$ requires $$|x| \\geq 1$$, but combined with arcosh being defined only on cosh's range, the domain is $$x \\geq 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Express $$\\operatorname{arsinh} 1$$, $$\\operatorname{arcosh} 2$$, and $$\\operatorname{artanh}(1/3)$$ as exact natural logarithms. (3 steps)", "answer": "- Step 1: $$\\operatorname{arsinh} 1 = \\ln(1 + \\sqrt{1^2+1}) = \\ln(1 + \\sqrt{2})$$.\n- Step 2: $$\\operatorname{arcosh} 2 = \\ln(2 + \\sqrt{4-1}) = \\ln(2 + \\sqrt{3})$$.\n- Step 3: $$\\operatorname{artanh}(1/3) = \\frac{1}{2}\\ln\\frac{1+1/3}{1-1/3} = \\frac{1}{2}\\ln\\frac{4/3}{2/3} = \\frac{1}{2}\\ln 2 = \\ln\\sqrt{2}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Show that the argument of $$\\operatorname{arsinh} x = \\ln(x + \\sqrt{x^2 + 1})$$ is always positive, even for negative $$x$$. (3 steps)", "answer": "- Step 1: Need $$x + \\sqrt{x^2 + 1} > 0$$ for the log to be defined.\n- Step 2: If $$x \\geq 0$$: clearly positive (sum of non-negatives, with $$\\sqrt{x^2+1} \\geq 1$$).\n- Step 3: If $$x < 0$$: write $$|x| = -x > 0$$. Then $$\\sqrt{x^2+1} = \\sqrt{|x|^2 + 1} > \\sqrt{|x|^2} = |x| = -x$$. So $$\\sqrt{x^2+1} > -x$$, giving $$x + \\sqrt{x^2+1} > 0$$ ✓.\n\nConclusion: arsinh's log is always defined — domain is all of $$\\mathbb{R}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Verify that $$\\operatorname{arsinh}(-3) = -\\operatorname{arsinh}(3)$$ using the log form. (3 steps)", "answer": "- Step 1: $$\\operatorname{arsinh}(-3) = \\ln(-3 + \\sqrt{9+1}) = \\ln(\\sqrt{10} - 3)$$.\n- Step 2: Note that $$(\\sqrt{10}-3)(\\sqrt{10}+3) = 10 - 9 = 1$$, so $$\\sqrt{10}-3 = \\frac{1}{\\sqrt{10}+3}$$.\n- Step 3: Therefore $$\\ln(\\sqrt{10}-3) = \\ln\\frac{1}{\\sqrt{10}+3} = -\\ln(\\sqrt{10}+3) = -\\operatorname{arsinh} 3$$ ✓.\n\nThis confirms arsinh is odd (inherited from sinh's oddness).", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Describe the graph of $$y = \\operatorname{arsinh} x$$. (4 steps)", "answer": "- Step 1: Reflection of $$y = \\sinh x$$ in the line $$y = x$$. Domain $$\\mathbb{R}$$, range $$\\mathbb{R}$$.\n- Step 2: Passes through origin: $$\\operatorname{arsinh} 0 = 0$$.\n- Step 3: Odd function (inherits sinh's symmetry).\n- Step 4: Strictly increasing, with logarithmic-like growth on tails (grows like $$\\ln(2x)$$ for large $$x$$).", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Describe the graph of $$y = \\operatorname{arcosh} x$$ for $$x \\geq 1$$. (4 steps)", "answer": "- Step 1: Reflection of the right half ($$x \\geq 0$$ branch) of $$\\cosh x$$ in the line $$y = x$$.\n- Step 2: Domain $$[1, \\infty)$$; range $$[0, \\infty)$$.\n- Step 3: Starts at $$(1, 0)$$ since $$\\operatorname{arcosh} 1 = 0$$ ($$\\cosh 0 = 1$$).\n- Step 4: Vertical tangent at $$x = 1$$ (because $$\\cosh$$ has zero gradient at origin, so its inverse has infinite gradient there). Increases logarithmically.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "Describe the graph of $$y = \\operatorname{artanh} x$$ for $$|x| < 1$$. (4 steps)", "answer": "- Step 1: Reflection of $$\\tanh x$$ in $$y = x$$. Domain $$(-1, 1)$$, range $$\\mathbb{R}$$.\n- Step 2: Passes through origin; odd symmetry.\n- Step 3: Strictly increasing.\n- Step 4: Vertical asymptotes at $$x = \\pm 1$$ — because $$\\tanh$$ had horizontal asymptotes at $$y = \\pm 1$$, the reflection swaps them into vertical asymptotes.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "When solving $$6\\sinh x - 2\\cosh x = 7$$, what strategy works, and why? (3 steps)", "answer": "- Step 1: There's no clean identity to combine $$\\sinh x$$ and $$\\cosh x$$ into a single hyperbolic function. So substitute the exponential definitions: $$\\sinh x = (e^x - e^{-x})/2$$, $$\\cosh x = (e^x + e^{-x})/2$$.\n- Step 2: After simplification, you get a polynomial in $$e^x$$. Multiply through by $$e^x$$ to clear $$e^{-x}$$: typically a quadratic like $$2e^{2x} - 7e^x - 4 = 0$$.\n- Step 3: Solve as quadratic in $$e^x$$. *Reject* any non-positive root (since $$e^x > 0$$ always), then take $$\\ln$$ to recover $$x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "When solving $$2\\cosh^2 x - 5\\sinh x = 5$$, what's the cleanest strategy? (3 steps)", "answer": "- Step 1: The equation has $$\\cosh^2 x$$ and $$\\sinh x$$. Use $$\\cosh^2 x = 1 + \\sinh^2 x$$ to eliminate cosh.\n- Step 2: Substitute: $$2(1 + \\sinh^2 x) - 5\\sinh x = 5 \\Rightarrow 2\\sinh^2 x - 5\\sinh x - 3 = 0$$.\n- Step 3: This factors as $$(2\\sinh x + 1)(\\sinh x - 3) = 0$$, so $$\\sinh x = -1/2$$ or $$\\sinh x = 3$$. Each value of $$\\sinh x$$ gives exactly one real $$x$$ via the arsinh log form.\n\nThe trick: pick the identity that consolidates everything into one hyperbolic function (here, sinh).", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "When solving $$\\cosh 2x - 5\\cosh x + 4 = 0$$, which form of $$\\cosh 2x$$ should you use? (3 steps)", "answer": "- Step 1: The equation has $$\\cosh x$$ (no sinh), so use $$\\cosh 2x = 2\\cosh^2 x - 1$$ to keep everything in $$\\cosh x$$.\n- Step 2: Substitute: $$2\\cosh^2 x - 1 - 5\\cosh x + 4 = 0 \\Rightarrow 2\\cosh^2 x - 5\\cosh x + 3 = 0$$.\n- Step 3: Factor: $$(2\\cosh x - 3)(\\cosh x - 1) = 0$$. So $$\\cosh x = 3/2$$ (gives two values $$\\pm \\ln(3/2 + \\sqrt{5}/2)$$) or $$\\cosh x = 1$$ (gives $$x = 0$$). Total: three real solutions.\n\nStrategy: pick the form of $$\\cosh 2x$$ that matches the *other* terms in the equation.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Why does the equation $$\\cosh x = k$$ (with $$k > 1$$) yield *two* real solutions? (3 steps)", "answer": "- Step 1: $$\\cosh$$ is even: $$\\cosh(-a) = \\cosh(a)$$. So if $$\\cosh a = k$$, then $$\\cosh(-a) = k$$ as well.\n- Step 2: The graph $$y = \\cosh x$$ is U-shaped, taking each value $$> 1$$ exactly twice — once for some positive $$x$$, once for the negative.\n- Step 3: From the log form: $$x = \\pm \\ln(k + \\sqrt{k^2-1})$$. Special cases:\n+ $$k = 1$$: single solution $$x = 0$$.\n+ $$k < 1$$: no real solution (since $$\\cosh \\geq 1$$).\n+ $$k > 1$$: two solutions.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "Why does $$\\sinh x = k$$ have *exactly one* real solution for any real $$k$$? (3 steps)", "answer": "- Step 1: $$\\sinh$$ is strictly increasing on $$\\mathbb{R}$$ (its derivative is $$\\cosh x \\geq 1 > 0$$).\n- Step 2: Strictly increasing functions are one-to-one — each output value is hit at most once. Combined with range = $$\\mathbb{R}$$, every real $$k$$ is hit *exactly* once.\n- Step 3: The unique solution: $$x = \\operatorname{arsinh} k = \\ln(k + \\sqrt{k^2+1})$$. The argument is always positive, so the log is always defined for any real $$k$$.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "Given $$\\sinh x = 3/4$$, find $$\\cosh x$$ exactly. Which sign do you take and why? (3 steps)", "answer": "- Step 1: Use fundamental identity: $$\\cosh^2 x = 1 + \\sinh^2 x = 1 + 9/16 = 25/16$$.\n- Step 2: Take square root: $$\\cosh x = \\pm 5/4$$ algebraically.\n- Step 3: But $$\\cosh x \\geq 1 > 0$$ always — never negative. So $$\\cosh x = +5/4$$. Always check candidate values against the function's range.\n\nThis is a common pitfall: $$\\cosh^2 x = (\\text{anything})$$ permits $$\\pm$$ algebraically, but $$\\cosh$$ itself is always $$\\geq 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Given $$\\sinh x = 3/4$$, find $$\\sinh 2x$$ and $$\\tanh x$$ exactly. (3 steps)", "answer": "- Step 1: From above (or fundamental identity): $$\\cosh x = 5/4$$.\n- Step 2: $$\\sinh 2x = 2\\sinh x \\cosh x = 2 \\cdot (3/4)(5/4) = 30/16 = 15/8$$.\n- Step 3: $$\\tanh x = \\sinh x / \\cosh x = (3/4)/(5/4) = 3/5$$.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Show that $$\\cosh(\\ln k) = \\frac{1}{2}(k + 1/k)$$ for $$k > 0$$. Use this to compute $$\\cosh(\\ln 3)$$ mentally. (2 steps)", "answer": "- Step 1: $$\\cosh(\\ln k) = \\frac{e^{\\ln k} + e^{-\\ln k}}{2} = \\frac{k + 1/k}{2}$$ (since $$e^{\\ln k} = k$$ and $$e^{-\\ln k} = 1/k$$).\n- Step 2: For $$k = 3$$: $$\\cosh(\\ln 3) = (3 + 1/3)/2 = (10/3)/2 = 5/3$$.\n\nSymmetric shortcut: $$\\sinh(\\ln k) = (k - 1/k)/2$$, so $$\\sinh(\\ln 2) = (2 - 1/2)/2 = 3/4$$.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Show that $$\\tanh(\\ln k) = \\frac{k^2 - 1}{k^2 + 1}$$ and use it to compute $$\\tanh(\\ln 4)$$ mentally. (2 steps)", "answer": "- Step 1: Use the form $$\\tanh x = \\frac{e^{2x}-1}{e^{2x}+1}$$ with $$x = \\ln k$$. Then $$e^{2\\ln k} = e^{\\ln k^2} = k^2$$.\n- Step 2: So $$\\tanh(\\ln k) = \\frac{k^2-1}{k^2+1}$$. For $$k=4$$: $$\\tanh(\\ln 4) = \\frac{16-1}{16+1} = \\frac{15}{17}$$.\n\nMemorize this shortcut: $$\\tanh(\\ln k) = (k^2-1)/(k^2+1)$$ — bypasses explicit exponentiation.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "Express $$10\\cosh x + 6\\sinh x$$ in the form $$R\\cosh(x + \\alpha)$$ with $$R > 0$$. (4 steps)", "answer": "- Step 1: Use the addition formula: $$R\\cosh(x+\\alpha) = R(\\cosh x \\cosh\\alpha + \\sinh x \\sinh\\alpha)$$.\n- Step 2: Match coefficients: $$R\\cosh\\alpha = 10$$ and $$R\\sinh\\alpha = 6$$.\n- Step 3: Use $$\\cosh^2\\alpha - \\sinh^2\\alpha = 1$$: $$R^2 = R^2(\\cosh^2\\alpha - \\sinh^2\\alpha) = 100 - 36 = 64$$, so $$R = 8$$.\n- Step 4: $$\\tanh\\alpha = 6/10 = 3/5$$, so $$\\alpha = \\operatorname{artanh}(3/5)$$. Result: $$10\\cosh x + 6\\sinh x = 8\\cosh(x + \\alpha)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "What is the minimum value of $$R\\cosh(x + \\alpha)$$ where $$R > 0$$, and at what $$x$$ is it attained? (2 steps)", "answer": "- Step 1: $$\\cosh(\\cdot)$$ has minimum value $$1$$, attained when its argument is $$0$$. So $$\\cosh(x + \\alpha) \\geq 1$$ with equality at $$x = -\\alpha$$.\n- Step 2: Therefore minimum of $$R\\cosh(x + \\alpha)$$ is $$R$$, achieved at $$x = -\\alpha$$.\n\nSo the minimum of $$10\\cosh x + 6\\sinh x$$ is $$R = 8$$, occurring at $$x = -\\operatorname{artanh}(3/5)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "For an expression $$a\\cosh x + b\\sinh x$$, when can it be written as $$R\\cosh(x+\\alpha)$$ vs. $$R\\sinh(x+\\alpha)$$? (3 steps)", "answer": "- Step 1: For $$R\\cosh(x+\\alpha)$$: matching gives $$R^2 = a^2 - b^2$$. Need $$|a| > |b|$$ for $$R$$ to be real and positive.\n- Step 2: For $$R\\sinh(x+\\alpha)$$: matching gives $$R^2 = b^2 - a^2$$. Need $$|b| > |a|$$.\n- Step 3: If $$|a| = |b|$$: the expression collapses to a single exponential $$\\frac{a+b}{2}e^x$$ or $$\\frac{a-b}{2}e^{-x}$$ (no oscillation possible).\n\nCompare with trig: $$a\\cos + b\\sin$$ always works as $$R\\cos(x-\\alpha)$$ with $$R^2 = a^2 + b^2$$. Hyperbolic uses *minus* — Osborn-style sign reversal again.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "A student claims: \"$$\\cosh(A+B) = \\cosh A \\cosh B - \\sinh A \\sinh B$$ by analogy with $$\\cos(A+B)$$.\" Identify the error. (3 steps)", "answer": "- Step 1: The error is forgetting Osborn's rule. The trig identity is $$\\cos(A+B) = \\cos A \\cos B - \\sin A \\sin B$$, with a \"$$-\\sin A \\sin B$$\" term.\n- Step 2: $$\\sin A \\sin B$$ is a product of two sines, so converting to hyperbolic flips the sign: $$\\sin A \\sin B \\to -\\sinh A \\sinh B$$. So the trig \"$$-\\sin A \\sin B$$\" becomes \"$$+\\sinh A \\sinh B$$\".\n- Step 3: Correct identity: $$\\cosh(A+B) \\equiv \\cosh A \\cosh B + \\sinh A \\sinh B$$ — *plus* sign. This is one of the most common Osborn-related exam errors.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "What happens if you naively try to compute $$\\operatorname{arcosh}(0.5)$$? (3 steps)", "answer": "- Step 1: $$\\operatorname{arcosh}(0.5)$$ would solve $$\\cosh y = 0.5$$ for $$y$$.\n- Step 2: But $$\\cosh y \\geq 1$$ for all real $$y$$, so no real solution exists.\n- Step 3: Trying the formula: $$\\ln(0.5 + \\sqrt{0.25 - 1}) = \\ln(0.5 + \\sqrt{-0.75})$$ — the square root of a negative number, no real value. Confirms no real arcosh exists for $$|x| < 1$$. (In complex analysis it does exist but takes complex values.)", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "True or false: $$\\operatorname{arsinh} x$$ is defined for all real $$x$$, but $$\\operatorname{artanh} x$$ requires $$|x| < 1$$. Justify. (3 steps)", "answer": "- Step 1: True. $$\\operatorname{arsinh}$$ takes any real input because $$\\sinh$$ has range $$\\mathbb{R}$$.\n- Step 2: $$\\operatorname{artanh} x$$ is restricted to $$|x| < 1$$ because $$\\tanh$$ has range $$(-1, 1)$$ — values $$\\pm 1$$ and beyond are never attained.\n- Step 3: From log form: $$\\operatorname{artanh} x = \\frac{1}{2}\\ln\\frac{1+x}{1-x}$$ requires $$\\frac{1+x}{1-x} > 0$$, i.e. $$|x| < 1$$. At $$x = \\pm 1$$ the argument is $$0$$ or $$\\infty$$ — boundary failures.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "Estimate $$\\sinh 3$$ to one significant figure without a calculator. (3 steps)", "answer": "- Step 1: $$\\sinh 3 = (e^3 - e^{-3})/2$$. For $$x = 3$$, $$e^{-3} \\approx 0.05$$ — negligible compared to $$e^3$$.\n- Step 2: $$e^3 \\approx 20$$ (since $$e \\approx 2.7$$, $$e^2 \\approx 7.4$$, $$e^3 \\approx 7.4 \\times 2.7 \\approx 20$$).\n- Step 3: $$\\sinh 3 \\approx 20/2 = 10$$. (Actual: $$10.02$$ — excellent estimate.)\n\nFor large $$x$$: $$\\sinh x \\approx \\cosh x \\approx e^x/2$$ — a fast and useful approximation.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "For small $$x$$, give linear and quadratic Taylor approximations to $$\\sinh x$$ and $$\\cosh x$$. (3 steps)", "answer": "- Step 1: Taylor expand: $$e^x \\approx 1 + x + x^2/2 + x^3/6 + \\cdots$$ and $$e^{-x} \\approx 1 - x + x^2/2 - x^3/6 + \\cdots$$.\n- Step 2: $$\\sinh x = (e^x - e^{-x})/2 \\approx x + x^3/6 + \\cdots$$ — to first order, $$\\sinh x \\approx x$$.\n- Step 3: $$\\cosh x = (e^x + e^{-x})/2 \\approx 1 + x^2/2 + \\cdots$$ — quadratic.\n\nMnemonic: near $$x=0$$, hyperbolic functions are *indistinguishable* from circular ones at low order ($$\\sin x \\approx x$$, $$\\cos x \\approx 1 - x^2/2$$ vs. $$\\sinh x \\approx x$$, $$\\cosh x \\approx 1 + x^2/2$$ — note the sign flip on the $$x^2$$ term, courtesy of Osborn).", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "Why is the hyperbolic identity $$\\operatorname{sech}^2 x + \\tanh^2 x = 1$$ structurally similar to $$\\sin^2 + \\cos^2 = 1$$? (3 steps)", "answer": "- Step 1: From fundamental identity, divide by $$\\cosh^2 x$$: $$1 - \\tanh^2 x = \\operatorname{sech}^2 x$$, equivalently $$\\operatorname{sech}^2 x + \\tanh^2 x = 1$$.\n- Step 2: This says: in the $$(\\operatorname{sech}, \\tanh)$$ \"coordinate,\" every point lies on a unit circle. Fascinating — even though $$(\\cosh, \\sinh)$$ is on a *hyperbola*, the rescaled pair $$(\\operatorname{sech}, \\tanh) = (1/\\cosh, \\sinh/\\cosh)$$ traces a circle (specifically, the upper half).\n- Step 3: This is one of many places where hyperbolic functions, when manipulated correctly, reproduce circle-like algebraic identities. Useful for substitutions in integration.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "Why does $$\\cosh x = 1$$ have only one solution while $$\\cosh x = 2$$ has two? (2 steps)", "answer": "- Step 1: $$\\cosh x = 1$$ is the *minimum value*, attained only at $$x = 0$$. Tangent point — single solution.\n- Step 2: $$\\cosh x = 2$$ is above the minimum. By the U-shape and even symmetry, the graph crosses $$y = 2$$ at two symmetric points: $$x = \\pm \\operatorname{arcosh}(2) = \\pm \\ln(2 + \\sqrt{3})$$.\n\nGeneral rule: $$\\cosh x = k$$ has 0 / 1 / 2 solutions for $$k < 1$$ / $$k = 1$$ / $$k > 1$$ respectively.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": false}, {"question": "A student writes $$\\frac{\\operatorname{sech}^2 x}{2 - \\operatorname{sech}^2 x} = \\frac{\\operatorname{sech}^2 x}{2} - 1$$ \"by splitting the fraction.\" Identify the error. (2 steps)", "answer": "- Step 1: You cannot split $$\\frac{a}{b - c} = \\frac{a}{b} - \\frac{a}{c}$$ — this is invalid. Splitting only works when the *numerator* is a sum: $$\\frac{a + b}{c} = \\frac{a}{c} + \\frac{b}{c}$$.\n- Step 2: For this expression, a correct approach is to divide top and bottom by $$\\operatorname{sech}^2 x$$: $$\\frac{1}{2/\\operatorname{sech}^2 x - 1} = \\frac{1}{2\\cosh^2 x - 1}$$.\n\nLesson: fractional algebra allows numerator splitting only — denominator splitting is one of the most common manipulation errors.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": true}, {"question": "Give intuition for why a hanging chain forms a $$\\cosh$$ curve (catenary), not a parabola. (3 steps)", "answer": "- Step 1: Setup: each tiny piece of chain has weight proportional to its *arc length* (not horizontal length). Horizontal tension is uniform; vertical tension increases with weight hanging below.\n- Step 2: This leads to the differential equation $$y'' = \\frac{1}{a}\\sqrt{1 + (y')^2}$$ — the curvature is proportional to a \"stretch factor\" depending on the slope. Solving gives $$y = a\\cosh(x/a) + C$$.\n- Step 3: A parabola arises from a *different* setup: a suspension bridge where the load (e.g. the road below) is uniform per *horizontal* length, not per arc length. Both curves look similar near the bottom but diverge at extremes — catenary grows exponentially, parabola polynomially.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": true}, {"question": "Why are *inverted* catenary curves used as arches in architecture? (3 steps)", "answer": "- Step 1: A catenary $$y = a\\cosh(x/a)$$ describes a hanging chain — the forces along the chain are pure *tension*, with no bending stress.\n- Step 2: Flipping it upside down: the same shape now describes a structure under pure *compression* — every part pushes against its neighbors, with no bending.\n- Step 3: Stone, brick, and concrete are strong in compression but weak in tension/bending. So inverted-catenary arches transmit forces in exactly the way these materials handle best — making them maximally stable. Famous examples: Gaudí's architecture and the St. Louis Gateway Arch.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": true}, {"question": "Show that $$\\sinh x + \\cosh x = e^x$$. What is the geometric interpretation? (3 steps)", "answer": "- Step 1: Add the definitions: $$\\sinh x + \\cosh x = \\frac{e^x - e^{-x}}{2} + \\frac{e^x + e^{-x}}{2} = \\frac{2e^x}{2} = e^x$$ ✓.\n- Step 2: Symmetrically: $$\\cosh x - \\sinh x = e^{-x}$$.\n- Step 3: Geometric interpretation: $$(\\sinh, \\cosh)$$ is a \"rotation\" of the basis $$(e^x, e^{-x})$$ — a change of coordinates from one basis to another. Concretely, $$\\sinh + \\cosh$$ \"reassembles\" $$e^x$$ from its odd and even parts.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": false}, {"question": "Sketch (describe) the graph of $$y = \\sinh x + \\cosh x$$. (3 steps)", "answer": "- Step 1: Use the identity $$\\sinh x + \\cosh x = e^x$$ (just derived).\n- Step 2: So the graph is exactly $$y = e^x$$ — exponential curve through $$(0, 1)$$, increasing, asymptotic to $$y = 0$$ as $$x \\to -\\infty$$.\n- Step 3: Insight: the negative-exponent pieces from sinh and cosh cancel exactly, leaving only the positive-exponent part. (Symmetrically, $$\\cosh x - \\sinh x = e^{-x}$$ — only the negative-exponent part remains.)", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": false}, {"question": "Outline how to prove $$\\sinh(A+B) \\equiv \\sinh A \\cosh B + \\cosh A \\sinh B$$ from definitions. (3 steps)", "answer": "- Step 1: Expand the RHS using definitions. Each term is a product of two binomials: $$\\sinh A \\cosh B = \\frac{(e^A - e^{-A})(e^B + e^{-B})}{4}$$, similarly for the other.\n- Step 2: Multiply out: each gives 4 terms. Adding all 8: the $$e^{A-B}$$ and $$e^{-A+B}$$ terms cancel pairwise (one from each product, with opposite signs).\n- Step 3: Survivors: $$\\frac{2e^{A+B} - 2e^{-(A+B)}}{4} = \\frac{e^{A+B} - e^{-(A+B)}}{2} = \\sinh(A+B)$$ ✓.\n\nThe cancellation works because of the precise $$\\pm$$ structure in the definitions.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": false}, {"question": "Derive $$\\sinh(A-B) = \\sinh A \\cosh B - \\cosh A \\sinh B$$ from the formula for $$\\sinh(A+B)$$. (2 steps)", "answer": "- Step 1: Replace $$B$$ with $$-B$$ in $$\\sinh(A+B) = \\sinh A \\cosh B + \\cosh A \\sinh B$$.\n- Step 2: Use parity: $$\\cosh(-B) = \\cosh B$$ (even), $$\\sinh(-B) = -\\sinh B$$ (odd). So we get $$\\sinh(A-B) = \\sinh A \\cosh B + \\cosh A (-\\sinh B) = \\sinh A \\cosh B - \\cosh A \\sinh B$$ ✓.\n\nThis is the same trick used in trig: parity of cos and sin lets you derive minus formulas from plus formulas.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": true}, {"question": "Apply Osborn's rule to $$\\sin 3A \\equiv 3\\sin A - 4\\sin^3 A$$ to find the hyperbolic version. (2 steps)", "answer": "- Step 1: $$\\sin A$$ is a single sine — translates directly to $$\\sinh A$$. But $$\\sin^3 A = \\sin A \\cdot \\sin^2 A$$ contains $$\\sin^2 A$$ — a product of two sines — so it picks up a sign flip: $$\\sin^3 A \\to -\\sinh^3 A$$.\n- Step 2: Result: $$\\sinh 3A \\equiv 3\\sinh A - 4(-\\sinh^3 A) = 3\\sinh A + 4\\sinh^3 A$$. Note the \"$$-$$\" became \"$$+$$\".", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": false}, {"question": "Solve $$9\\cosh x - 5\\sinh x = 15$$, expressing answers as natural logs. (3 steps)", "answer": "- Step 1: Substitute exponentials and simplify: $$\\frac{(9-5)e^x + (9+5)e^{-x}}{2} = 15$$ becomes $$2e^x + 7e^{-x} = 15$$.\n- Step 2: Multiply by $$e^x$$: $$2e^{2x} - 15e^x + 7 = 0$$. Factor: $$(2e^x - 1)(e^x - 7) = 0$$.\n- Step 3: $$e^x = 1/2$$ or $$e^x = 7$$ (both positive, both valid). So $$x = -\\ln 2$$ or $$x = \\ln 7$$. Two solutions.\n\nTwo solutions are typical for $$a\\cosh + b\\sinh = c$$ when $$|a| > |b|$$ and the equation is feasible.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": false}, {"question": "Solve $$2\\tanh x = \\cosh x$$. (4 steps)", "answer": "- Step 1: Multiply both sides by $$\\cosh x$$ (positive, no sign issues): $$2\\sinh x = \\cosh^2 x$$.\n- Step 2: Use $$\\cosh^2 x = 1 + \\sinh^2 x$$: $$2\\sinh x = 1 + \\sinh^2 x$$, i.e. $$\\sinh^2 x - 2\\sinh x + 1 = 0$$.\n- Step 3: This factors as $$(\\sinh x - 1)^2 = 0$$, so $$\\sinh x = 1$$ (double root).\n- Step 4: $$x = \\operatorname{arsinh} 1 = \\ln(1 + \\sqrt{2})$$. Single solution — geometrically, the two graphs are tangent here.", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": true}, {"question": "Find the intersection of $$y = 6 + \\sinh x$$ and $$y = \\sinh 3x$$ using $$\\sinh 3x = 3\\sinh x + 4\\sinh^3 x$$. (4 steps)", "answer": "- Step 1: Set equal: $$6 + \\sinh x = 3\\sinh x + 4\\sinh^3 x$$. Rearrange: $$4\\sinh^3 x + 2\\sinh x - 6 = 0 \\Rightarrow 2\\sinh^3 x + \\sinh x - 3 = 0$$.\n- Step 2: Try $$\\sinh x = 1$$: $$2 + 1 - 3 = 0$$ ✓.\n- Step 3: Factor: $$2\\sinh^3 x + \\sinh x - 3 = (\\sinh x - 1)(2\\sinh^2 x + 2\\sinh x + 3)$$. The quadratic has discriminant $$4 - 24 < 0$$ — no real roots.\n- Step 4: Single real solution: $$\\sinh x = 1$$, so $$x = \\ln(1 + \\sqrt{2})$$, $$y = 6 + 1 = 7$$. Intersection: $$(\\ln(1+\\sqrt{2}), 7)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_70", "judge_pick": false}, {"question": "Summarize the three main strategies for solving hyperbolic equations and when each applies. (3 steps)", "answer": "- Step 1: **Use the fundamental identity** ($$\\cosh^2 - \\sinh^2 = 1$$): if the equation has powers like $$\\sinh^2 x$$ or $$\\cosh^2 x$$ alongside the linear term, convert to one function and solve as a quadratic.\n- Step 2: **Use a double-angle identity**: if the equation has $$\\cosh 2x$$ or $$\\sinh 2x$$, use the appropriate form of the double-angle formula to reduce to one function. Pick the form that matches the other terms.\n- Step 3: **Substitute exponentials directly**: if there's a mix like $$a\\sinh x + b\\cosh x = c$$ with no easy identity, substitute the exp definitions to get a polynomial in $$e^x$$. Multiply by $$e^x$$, solve as a quadratic, reject negative roots.\n\nThe choice is dictated by which terms appear — pick the path that consolidates everything into a single hyperbolic function (or a single $$e^x$$).", "source": "Opus 4.7 ②", "_id": "opus_2_71", "judge_pick": true}, {"question": "When solving a polynomial in $$e^x$$, which roots must you reject? Why? (2 steps)", "answer": "- Step 1: $$e^x > 0$$ for all real $$x$$ — the exponential function never returns negative or zero values for real input.\n- Step 2: So any root $$e^x = c$$ with $$c \\leq 0$$ has no real solution. Reject these *before* taking $$\\ln$$. This is the most common pitfall in hyperbolic equation-solving.", "source": "Opus 4.7 ②", "_id": "opus_2_72", "judge_pick": true}, {"question": "Test the identity $$\\frac{1+\\tanh^2 x}{1-\\tanh^2 x} \\equiv 2\\cosh^2 x - 1$$ at a specific point to verify it's correct. (3 steps)", "answer": "- Step 1: Try $$x = 0$$: LHS $$= (1+0)/(1-0) = 1$$. RHS $$= 2(1) - 1 = 1$$ ✓.\n- Step 2: Try $$x = \\ln 2$$: $$\\tanh(\\ln 2) = (4-1)/(4+1) = 3/5$$, so $$\\tanh^2 = 9/25$$. LHS $$= (1 + 9/25)/(1 - 9/25) = (34/25)/(16/25) = 34/16 = 17/8$$.\n- Step 3: RHS at $$x = \\ln 2$$: $$\\cosh(\\ln 2) = 5/4$$, so $$\\cosh^2 = 25/16$$, RHS $$= 2(25/16) - 1 = 50/16 - 16/16 = 34/16 = 17/8$$ ✓.\n\nBoth checks match — high confidence the identity is correct.", "source": "Opus 4.7 ②", "_id": "opus_2_73", "judge_pick": true}, {"question": "Are hyperbolic functions periodic on $$\\mathbb{R}$$? Compare with their trig counterparts. (2 steps)", "answer": "- Step 1: Trigonometric: $$\\cos$$ and $$\\sin$$ are periodic with period $$2\\pi$$ (oscillatory on the real line).\n- Step 2: Hyperbolic: $$\\cosh$$ and $$\\sinh$$ are *not* periodic on $$\\mathbb{R}$$ — they grow exponentially. They become periodic only if extended to *imaginary* arguments: $$\\cosh(it) = \\cos t$$, $$\\sinh(it) = i\\sin t$$. So periodicity reappears in the imaginary direction, but on $$\\mathbb{R}$$, no periodicity.", "source": "Opus 4.7 ②", "_id": "opus_2_74", "judge_pick": true}, {"question": "Compare the long-term behavior of $$\\tan x$$ and $$\\tanh x$$. Why are they so structurally different despite the suggestive name? (3 steps)", "answer": "- Step 1:
