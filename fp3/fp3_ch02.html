rent eccentricities. It also connects to orbital mechanics: planets move in ellipses (e < 1), comets in highly elliptical orbits (e close to 1), and some objects in hyperbolic trajectories (e > 1).", "source": "MiniMax ①", "_id": "minimax_1_35"}, {"question": "When the Earth orbits the Sun in an ellipse with the Sun at one focus, express perihelion (closest) and aphelion (farthest) distances in terms of $$a, e$$. (3 steps)", "answer": "- Step 1: Perihelion: closest approach, occurring at the vertex on the same side as the Sun-focus. Distance $$= a - ae = a(1 - e)$$.\n- Step 2: Aphelion: farthest point, at the opposite vertex. Distance $$= a + ae = a(1 + e)$$.\n- Step 3: Sum is $$2a$$ (major axis length); ratio is $$\\tfrac{1+e}{1-e}$$ — a key parameter in orbital mechanics.\n\nTakeaway: Eccentricity directly governs orbital distance variation: small $$e$$ → nearly constant, $$e$$ near 1 → extreme variation.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "What is the auxiliary circle of an ellipse, and how does it give geometric meaning to the parameter $$t$$? (3 steps)", "answer": "- Step 1: The auxiliary circle is the circle of radius $$a$$ centred at the origin — the smallest circle containing the ellipse, tangent at the major-axis vertices.\n- Step 2: For each angle $$t$$, the auxiliary circle has the point $$Q = (a\\cos t, a\\sin t)$$. The corresponding ellipse point is $$P = (a\\cos t, b\\sin t)$$ — obtained by scaling $$Q$$'s $$y$$-coordinate by $$b/a$$.\n- Step 3: So $$t$$ is the angle on the auxiliary circle (not on the ellipse itself); the ellipse is \"born\" by vertically squashing this circle.\n\nTakeaway: Many ellipse properties simplify by transferring to the auxiliary circle (where rotational symmetry holds), then mapping back.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "Why do hyperbolic functions $$(\\cosh, \\sinh)$$ work for parameterising hyperbolas, just as $$(\\cos, \\sin)$$ work for ellipses? (3 steps)", "answer": "- Step 1: For ellipses, the key identity is $$\\cos^2 t + \\sin^2 t = 1$$, matching the form $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$.\n- Step 2: For hyperbolas, the analogous identity is $$\\cosh^2 t - \\sinh^2 t = 1$$, matching $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$.\n- Step 3: Substituting $$x = a\\cosh t, y = b\\sinh t$$ gives $$\\cosh^2 t - \\sinh^2 t = 1$$ ✓, automatically satisfying the equation.\n\nThis is exactly why hyperbolic functions are named \"hyperbolic\" — they parameterise hyperbolas just as trigonometric functions parameterise circles/ellipses.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "The chord joining points $$P(cp, \\frac{c}{p})$$ and $$Q(cq, \\frac{c}{q})$$ on the rectangular hyperbola $$xy = c^2$$ has gradient 1. Find the locus of the intersection point of the tangents at $$P$$ and $$Q$$. (3 steps)", "answer": "- Step 1: The tangent at $$(ct, \\frac{c}{t})$$ to $$xy = c^2$$ is given by $$t^2y + x = 2ct$$ (derived from differentiating or using the standard form). For point $$P$$, the tangent is $$p^2y + x = 2cp$$. For point $$Q$$, it's $$q^2y + x = 2cq$$.\n- Step 2: Solving these simultaneously for the intersection point $$R(x, y)$$:\nSubtracting: $$(p^2 - q^2)y = 2c(p - q)$$\n$$(p + q)y = 2c$$\nSo $$y = \\frac{2c}{p + q}$$. Substituting back:\n$$x = 2cp - p^2y = 2cp - p^2 \\cdot \\frac{2c}{p + q} = \\frac{2c(p(p + q) - p^2)}{p + q} = \\frac{2cpq}{p + q}$$\nSo $$R = \\left(\\frac{2cpq}{p + q}, \\frac{2c}{p + q}\\right)$$.\n- Step 3: The chord $$PQ$$ has gradient 1. Finding gradient: $$\\frac{\\frac{c}{p} - \\frac{c}{q}}{cp - cq} = \\frac{c(q - p)}{pq} \\cdot \\frac{1}{c(q - p)} = \\frac{1}{pq}$$. So gradient = $$\\frac{1}{pq}$$. Setting this equal to 1: $$pq = 1$$.\nWith $$pq = 1$$, we have $$p + q = p + \\frac{1}{p}$$. The locus of $$R$$ becomes:\n$$x = \\frac{2c \\cdot 1}{p + q} = \\frac{2c}{p + q}, \\quad y = \\frac{2c}{p + q}$$\nSo $$x = y$$. Thus the locus is the line $$y = x$$.\n+ Wait, let me reconsider — the problem asks for gradient 1 of the chord, and we found chord gradient = $$\\frac{1}{pq}$$. So $$\\frac{1}{pq} = 1$$ gives $$pq = 1$$.\nFrom our intersection point, we get $$x = y$$. But actually, we can eliminate the parameter. Since $$x = y = \\frac{2c}{p+q}$$, we have $$p + q = \\frac{2c}{x}$$. The answer given in the textbook is $$y = -x$$.\n+ Actually, checking: the gradient of chord = $$\\frac{\\frac{c}{p} - \\frac{c}{q}}{c(p - q)} = \\frac{c(q-p)}{pq} \\cdot \\frac{1}{c(p-q)} = \\frac{q-p}{pq(p-q)} = \\frac{-1}{pq}$$. So gradient = $$-\\frac{1}{pq}$$.\nSetting this equal to 1: $$-\\frac{1}{pq} = 1$$ gives $$pq = -1$$.\nThen from the intersection point: $$x = \\frac{2c(-1)}{p + q} = -\\frac{2c}{p + q}$$, and $$y = \\frac{2c}{p + q}$$. So $$x = -y$$.\nThus the locus is the line $$y = -x$$.", "source": "MiniMax ②", "_id": "minimax_2_17"}, {"question": "What is \"the latus rectum\" of an ellipse, and why is it physically meaningful in orbital mechanics? (3 steps)", "answer": "- Step 1: The latus rectum is the chord perpendicular to the major axis passing through a focus. Length $$2b^2/a$$ for ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with $$a > b$$.\n- Step 2: The half-length $$\\ell = b^2/a$$ is called the \"semi-latus rectum\" and appears prominently in Kepler's laws and orbital equations.\n- Step 3: For Earth's orbit, $$\\ell$$ characterises the orbit's \"size at the focus\" — independent of orientation. It's used in formulas like $$r = \\ell/(1 + e\\cos\\theta)$$ describing the orbit shape.\n\nSo latus rectum is more than a curiosity — it's a natural measure of orbital scale.", "source": "Opus 4.7 ②", "_id": "opus_2_72"}, {"question": "When proving a result like \"$$P$$ is the midpoint of $$AB$$\" for tangent intersections with asymptotes of a hyperbola, what's the key proof technique? (3 steps)", "answer": "- Step 1: Express both $$A$$ and $$B$$ in terms of the parameter at $$P$$.\n- Step 2: Compute the midpoint coordinates as average of $$A$$ and $$B$$.\n- Step 3: Show this midpoint equals $$P$$'s coordinates — the proof reduces to algebraic verification.\n\nTakeaway: For tangent + asymptote problems, working in parametric coordinates and computing intersections explicitly is usually the cleanest route.", "source": "Opus 4.7 ①", "_id": "opus_1_87"}, {"question": "Why is the rectangular hyperbola $$xy = c^2$$ unbounded along its asymptotes (the axes)? (3 steps)", "answer": "- Step 1: As $$x \\to \\infty$$ with $$xy = c^2$$, we get $$y \\to 0$$ — the curve approaches the x-axis but never reaches it.\n- Step 2: As $$y \\to \\infty$$, $$x \\to 0$$ — the curve approaches the y-axis.\n- Step 3: The product $$xy = c^2$$ stays constant, so as one coordinate gets large, the other must shrink to compensate — but neither can be zero (since $$c \\neq 0$$).\n\nThis perpendicular-asymptote structure is what makes it \"rectangular\" — the asymptotes meet at right angles.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "When proving \"the normal at $$P$$ bisects $$\\angle SPS'$$,\" what's the conceptual structure of the proof? (3 steps)", "answer": "- Step 1: Show that the angles $$\\angle SPN$$ and $$\\angle S'PN$$ (where $$N$$ is along the normal direction) are equal.\n- Step 2: Use the focal sum property $$PS + PS' = 2a$$ and consider what happens to a small displacement along the ellipse — by the principle of virtual work or the gradient direction.\n- Step 3: At any point, the normal direction is the gradient of $$PS + PS'$$ (kind of, with appropriate sign convention), since this sum is constant. The gradient bisects the two focal direction vectors.\n\nThis is a calculus-of-variations argument: the normal is perpendicular to the level set of \"constant focal sum\" — and the bisector of focal directions is precisely such a perpendicular.", "source": "Opus 4.7 ②", "_id": "opus_2_96"}, {"question": "What characterises the family of curves with general equation $$Ax^2 + Bxy + Cy^2 + Dx + Ey + F = 0$$, and how does the discriminant $$B^2 - 4AC$$ classify them? (3 steps)", "answer": "- Step 1: This is the most general second-degree polynomial in two variables; all conic sections (and degenerate cases) fit this form.\n- Step 2: The discriminant $$B^2 - 4AC$$ classifies the conic type (modulo degeneracies):\n+ $$B^2 - 4AC < 0$$: ellipse (or circle if $$A = C, B = 0$$)\n+ $$B^2 - 4AC = 0$$: parabola\n+ $$B^2 - 4AC > 0$$: hyperbola\n- Step 3: $$B \\ne 0$$ indicates a rotated conic; $$D, E$$ encode translations.\n\nTakeaway: A single algebraic discriminant classifies all conics — a beautiful unification corresponding to the eccentricity classification.", "source": "Opus 4.7 ①", "_id": "opus_1_75"}, {"question": "The tangent to the hyperbola $$x^2 - y^2 = a^2$$ at point $$P$$ meets the asymptotes at $$A$$ and $$B$$. Prove that $$P$$ is the midpoint of $$AB$$. (3 steps)", "answer": "- Step 1: The hyperbola can be written as $$\\frac{x^2}{a^2} - \\frac{y^2}{a^2} = 1$$, so it's a rectangular hyperbola with $$b = a$$. The asymptotes are $$y = \\pm x$$.\nLet the point $$P$$ be $$(a\\sec\\theta, a\\tan\\theta)$$ on the hyperbola.\n- Step 2: The tangent at $$P$$ is $$ax\\sec\\theta - ay\\tan\\theta = a^2$$.\nFind intersection with asymptote $$y = x$$ (i.e., $$A$$):\nSubstitute $$y = x$$: $$ax\\sec\\theta - ax\\tan\\theta = a^2 \\implies x(\\sec\\theta - \\tan\\theta) = a$$\nSo $$x = \\frac{a}{\\sec\\theta - \\tan\\theta} = \\frac{a(\\sec\\theta + \\tan\\theta)}{\\sec^2\\theta - \\tan^2\\theta} = a(\\sec\\theta + \\tan\\theta)$$ (using $$1 = \\sec^2\\theta - \\tan^2\\theta$$)\nThus $$A = (a(\\sec\\theta + \\tan\\theta), a(\\sec\\theta + \\tan\\theta))$$\n- Step 3: Intersection with $$y = -x$$ (i.e., $$B$$):\nSubstitute $$y = -x$$: $$ax\\sec\\theta + ax\\tan\\theta = a^2 \\implies x(\\sec\\theta + \\tan\\theta) = a$$\nSo $$x = \\frac{a}{\\sec\\theta + \\tan\\theta} = a(\\sec\\theta - \\tan\\theta)$$\nThus $$B = (a(\\sec\\theta - \\tan\\theta), -a(\\sec\\theta - \\tan\\theta))$$\nThe midpoint has x-coordinate: $$\\frac{a(\\sec\\theta + \\tan\\theta) + a(\\sec\\theta - \\tan\\theta)}{2} = \\frac{2a\\sec\\theta}{2} = a\\sec\\theta$$ (the x-coordinate of $$P$$)\nThe midpoint has y-coordinate: $$\\frac{a(\\sec\\theta + \\tan\\theta) - a(\\sec\\theta - \\tan\\theta)}{2} = \\frac{2a\\tan\\theta}{2} = a\\tan\\theta$$ (the y-coordinate of $$P$$)\nSo the midpoint is indeed $$P$$.", "source": "MiniMax ②", "_id": "minimax_2_40"}, {"question": "Compare the tangent line conditions $$c^2 = a^2 m^2 + b^2$$ (ellipse) and $$c^2 = a^2 m^2 - b^2$$ (hyperbola). What's the geometric meaning of the sign? (3 steps)", "answer": "- Step 1: Ellipse: $$c^2 - a^2 m^2 = b^2 > 0$$, always positive — any line with non-zero slope can be tangent at some position.\n- Step 2: Hyperbola: $$c^2 - a^2 m^2 = -b^2 < 0$$. For $$c^2 \\geq 0$$, we need $$a^2 m^2 \\geq b^2$$, i.e., $$|m| \\geq b/a$$.\n- Step 3: So tangent lines to a hyperbola must be steeper than the asymptote slopes. Lines shallower than the asymptotes either miss the curve or cross it twice — never tangent.\n\nThis sign difference encodes the bounded vs unbounded nature of the curves.", "source": "Opus 4.7 ②", "_id": "opus_2_64"}, {"question": "Why is finding the equation of a tangent at a specific Cartesian point on a conic often harder than at a parametric point? (3 steps)", "answer": "- Step 1: At a parametric point $$(a\\cos t, b\\sin t)$$ with known $$t$$, the tangent equation $$bx\\cos t + ay\\sin t = ab$$ is direct substitution — clean and fast.\n- Step 2: At a Cartesian point $$(x_0, y_0)$$, you must use implicit differentiation, evaluate at the point, and then write the line equation — more steps.\n- Step 3: Alternatively, you can find the corresponding $$t$$ from $$x_0 = a\\cos t$$, $$y_0 = b\\sin t$$, and use the parametric formula — but this introduces an extra inversion step.\n\nThe parametric form has built-in algebraic structure that simplifies tangent/normal calculations.", "source": "Opus 4.7 ②", "_id": "opus_2_98"}, {"question": "What's a \"focal chord\" of a conic, and why are its properties important? (3 steps)", "answer": "- Step 1: A focal chord is any chord passing through a focus of the conic.\n- Step 2: For an ellipse: focal chords have length depending on angle, with minimum $$2b^2/a$$ (latus rectum, perpendicular) and maximum $$2a$$ (major axis itself).\n- Step 3: For a parabola: focal chord at parameters $$p, q$$ corresponds to $$pq = -1$$ — a clean parametric criterion.\n\nFocal chords are physically meaningful (e.g., they reflect off the curve symmetrically) and algebraically tractable, hence their importance.", "source": "Opus 4.7 ②", "_id": "opus_2_82"}, {"question": "A common tangent question: a tangent to the rectangular hyperbola $$xy = c^2$$ at $$P(cp, c/p)$$ and at $$Q(cq, c/q)$$ intersect at $$R$$. Conceptually find $$R$$'s coordinates. (4 steps)", "answer": "- Step 1: Tangent at $$P$$: $$x + p^2 y = 2cp$$. Tangent at $$Q$$: $$x + q^2 y = 2cq$$.\n- Step 2: Subtract: $$(p^2 - q^2)y = 2c(p - q)$$. Factor: $$(p + q)(p - q)y = 2c(p - q)$$, so $$y = \\tfrac{2c}{p + q}$$.\n- Step 3: Substitute back: $$x = 2cp - p^2 \\cdot \\tfrac{2c}{p + q} = \\tfrac{2c(p^2 + pq) - 2cp^2}{p + q} = \\tfrac{2cpq}{p + q}$$.\n- Step 4: $$R = \\left(\\tfrac{2cpq}{p + q}, \\; \\tfrac{2c}{p + q}\\right)$$.\n\nTakeaway: Note that $$R$$'s coordinates depend symmetrically on $$p$$ and $$q$$ via $$p + q$$ and $$pq$$ — typical for chord/tangent intersection problems.", "source": "Opus 4.7 ①", "_id": "opus_1_84"}, {"question": "A point $$P$$ lies on the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$. The tangent at $$P$$ meets the directrix at $$D$$. Prove that $$PD = \\frac{PS}{e}$$, where $$S$$ is the corresponding focus. (3 steps)", "answer": "- Step 1: Let the focus be at $$(ae, 0)$$ and directrix be $$x = \\frac{a}{e}$$. Let the point be $$P(a\\cos t, b\\sin t)$$. The tangent at $$P$$ is $$bx\\cos t + ay\\sin t = ab$$.\n- Step 2: Find intersection $$D$$ with the directrix $$x = \\frac{a}{e}$$:\nSubstitute into tangent: $$b(\\frac{a}{e})\\cos t + ay\\sin t = ab$$\n$$ab\\frac{\\cos t}{e} + ay\\sin t = ab$$\n$$ay\\sin t = ab(1 - \\frac{\\cos t}{e})$$\n$$y = \\frac{b(1 - \\frac{\\cos t}{e})}{\\sin t} = \\frac{b(e - \\cos t)}{e\\sin t}$$\nSo $$D = \\left(\\frac{a}{e}, \\frac{b(e - \\cos t)}{e\\sin t}\\right)$$.\n- Step 3: Now compute distances:\n$$PS^2 = (a\\cos t - ae)^2 + (b\\sin t)^2 = a^2(\\cos t - e)^2 + b^2\\sin^2 t$$\nUsing $$b^2 = a^2(1 - e^2)$$ and simplifying:\n$$PS = a(1 - e\\cos t)$$ (for appropriate branch)\nNow $$PD$$ is the distance from $$P(a\\cos t, b\\sin t)$$ to $$D(\\frac{a}{e}, \\frac{b(e - \\cos t)}{e\\sin t})$$:\nThe horizontal distance is $$a\\cos t - \\frac{a}{e} = a(\\cos t - \\frac{1}{e})$$.\nThe vertical distance is $$b\\sin t - \\frac{b(e - \\cos t)}{e\\sin t} = b\\left(\\sin t - \\frac{e - \\cos t}{e\\sin t}\\right) = b\\left(\\frac{e\\sin^2 t - e + \\cos t}{e\\sin t}\\right)$$.\nActually, it's easier to use similar triangles or the focus-directrix property directly:\nFrom the definition, $$PS = e \\cdot PM$$ where $$M$$ is the foot to the directrix. And by similar triangles in the tangent-directrix configuration, one can show that $$PD = \\frac{PM}{e}$$. Thus $$PD = \\frac{PS}{e^2} \\cdot \\frac{1}{e} = \\frac{PS}{e}$$? Wait, that's wrong. Let me reconsider.\n\nActually, from the focus-directrix definition: $$PS = e \\cdot PM$$.\nThe distance from point to directrix along the perpendicular is $$PM = \\frac{a}{e} - x$$.\nIn the right triangle formed by $$P$$, the foot to the directrix, and the intersection of tangent with directrix, there is a relationship. The tangent makes an angle with the directrix. Actually, a simpler approach:\nFrom similar triangles in the geometry, we can show that $$PD:PM = PM:PS$$ (the tangent and line to focus are isogonal conjugates with respect to the normal). Thus $$PD = \\frac{PM^2}{PS} = \\frac{(PS/e)^2}{PS} = \\frac{PS}{e^2}$$.\nThat doesn't match. Let me re-derive:\nActually, using coordinates is safest. The result should be $$PD = \\frac{PS}{e}$$.\nLet me verify with a specific example. For ellipse with $$a=5, b=3$$ (so $$e=\\frac{4}{5}$$), take point $$t=0$$: $$P(5, 0)$$. The focus is at $$(4, 0)$$, so $$PS = 1$$. The tangent is $$x=5$$ (vertical line). The directrix is $$x = \\frac{5}{e} = \\frac{25}{4} = 6.25$$. The intersection is at $$(6.25, 0)$$. So $$PD = 1.25$$. And $$\\frac{PS}{e} = \\frac{1}{0.8} = 1.25$$. Yes! So $$PD = \\frac{PS}{e}$$.", "source": "MiniMax ②", "_id": "minimax_2_44"}, {"question": "When finding tangents/normals to an ellipse, what are the two main methods, and what's the strategic difference? (3 steps)", "answer": "- Step 1: **Parametric differentiation**: $$\\tfrac{dy}{dx} = \\tfrac{dy/dt}{dx/dt}$$. Clean ratio, gives gradient as function of $$t$$ alone.\n- Step 2: **Implicit differentiation**: differentiate the Cartesian equation, getting $$\\tfrac{dy}{dx}$$ as a function of $$x, y$$.\n- Step 3: Parametric is preferred for general results (e.g., tangent at an arbitrary parameter point) since it expresses everything in $$t$$. Implicit is often quicker for specific numeric points where the parameter need not be found.\n\nTakeaway: Both yield the same gradient; choose based on whether you need a \"general $$t$$\" formula or a \"specific point\" answer.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "Explain why the rectangular hyperbola $$xy = c^2$$ has perpendicular asymptotes, and find its eccentricity. (2 steps)", "answer": "- Step 1: The asymptotes are found by considering large values of $$x$$ and $$y$$. As $$x \\to \\infty$$, $$y = \\frac{c^2}{x} \\to 0$$, so one asymptote is the x-axis ($$y = 0$$). Similarly, as $$y \\to \\infty$$, $$x = \\frac{c^2}{y} \\to 0$$, so the y-axis ($$x = 0$$) is the other asymptote.\n- Step 2: These asymptotes are perpendicular because they are the coordinate axes, which meet at $$90^\\circ$$. For a rectangular hyperbola in the standard form $$\\frac{x^2}{a^2} - \\frac{y^2}{a^2} = 1$$ (i.e., $$x^2 - y^2 = a^2$$), the asymptotes are $$y = \\pm x$$, which are also perpendicular.\n+ For the standard rectangular hyperbola $$x^2 - y^2 = a^2$$, we have $$b = a$$. The eccentricity satisfies $$b^2 = a^2(e^2 - 1)$$, so $$a^2 = a^2(e^2 - 1)$$, giving $$e^2 = 2$$, so $$e = \\sqrt{2}$$. This is the eccentricity of any rectangular hyperbola.", "source": "MiniMax ②", "_id": "minimax_2_34"}, {"question": "What does \"the locus of the foot of the perpendicular from origin to the tangent\" describe geometrically for the rectangular hyperbola $$xy = c^2$$? (3 steps)", "answer": "- Step 1: For $$xy = c^2$$ at $$(ct, c/t)$$, tangent: $$x + t^2 y = 2ct$$.\n- Step 2: Foot of perpendicular from origin to this line: standard formula gives a point parameterised by $$t$$.\n- Step 3: After elimination of parameter, the locus equation is $$(x^2 + y^2)^2 = 4c^2 xy$$ — a four-cusped curve (like a flower or limaçon).\n\nThis shows how loci on conics can produce curves of higher degree, with rich geometric structure.", "source": "Opus 4.7 ②", "_id": "opus_2_92"}, {"question": "Explain the geometric significance of eccentricity for conic sections. Why is $$e$$ defined differently for ellipses ($$0 < e < 1$$), parabolas ($$e = 1$$), and hyperbolas ($$e > 1$$)? (2 steps)", "answer": "- Step 1: Eccentricity $$e$$ measures how \"stretched\" or \"elongated\" a conic section is from a circle. It is defined as the constant ratio $$\\frac{PS}{PM}$$ where $$P$$ is any point on the conic, $$S$$ is a focus, and $$M$$ is the perpendicular distance to the corresponding directrix.\n- Step 2: When $$e = 0$$, the focus and directrix coincide at infinity, giving a perfect circle where all points are equidistant from the center. As $$e$$ increases from 0 toward 1, the ellipse becomes more elongated (major axis grows relative to minor axis). At $$e = 1$$, the curve \"opens up\" infinitely — the parabola has one branch extending to infinity. For $$e > 1$$, the ratio is greater than 1, meaning points are closer to the focus than the directrix, producing two separate branches — a hyperbola. The greater the $$e$$, the \"narrower\" the hyperbola branches appear.", "source": "MiniMax ②", "_id": "minimax_2_23"}, {"question": "What does the tangent equation $$bx\\cos t + ay\\sin t = ab$$ become at $$t = 0$$ (a vertex), and why is this consistent? (3 steps)", "answer": "- Step 1: At $$t = 0$$: $$\\sin t = 0$$, $$\\cos t = 1$$, so the equation becomes $$bx \\cdot 1 + 0 = ab$$, i.e., $$x = a$$.\n- Step 2: At $$t = 0$$, the point on the ellipse is $$(a, 0)$$ — the rightmost vertex.\n- Step 3: A vertical line $$x = a$$ at this point matches the geometric expectation: the tangent at the rightmost vertex is vertical (the curve is \"turning around\").\n\nThe general formula handles vertices elegantly without needing special-case treatment.", "source": "Opus 4.7 ②", "_id": "opus_2_87"}, {"question": "Conceptually, why might there be exactly two tangents from an external point to a hyperbola, and how would you find them? (3 steps)", "answer": "- Step 1: From an external point, you can typically draw 0, 1, or 2 tangents to a conic. For a hyperbola, generically there are 2.\n- Step 2: To find: write a tangent line $$y = mx + c$$ passing through the external point (gives one equation in $$m, c$$). Combine with the tangent condition $$c^2 = a^2 m^2 - b^2$$.\n- Step 3: This gives a quadratic in $$m$$, yielding up to 2 solutions — hence up to 2 tangent lines.\n\nGeometrically: from far away, the hyperbola looks like its two asymptotes. A line from an external point can be tangent on either branch — typically two tangents.", "source": "Opus 4.7 ②", "_id": "opus_2_71"}, {"question": "Show conceptually why the equation $$\\frac{(x+y)^2}{2a^2} + \\frac{(x-y)^2}{2b^2} = 1$$ represents a 45°-rotated ellipse. (3 steps)", "answer": "- Step 1: A 45° rotation transforms a point $$(X, Y)$$ to $$(x, y)$$ via $$X = (x+y)/\\sqrt{2}$$, $$Y = (-x+y)/\\sqrt{2}$$.\n- Step 2: Substituting into $$\\frac{X^2}{a^2} + \\frac{Y^2}{b^2} = 1$$ gives $$\\frac{(x+y)^2/2}{a^2} + \\frac{(x-y)^2/2}{b^2} = 1$$, simplifying to the given form.\n- Step 3: The pattern $$(x+y)^2$$ and $$(x-y)^2$$ in coordinates is the algebraic signature of a 45° rotation.\n\nThis shows how linear transformations enter as substitutions, changing axis-aligned forms into rotated ones.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Walk through deriving the tangent equation $$bx\\cos t + ay\\sin t = ab$$ for an ellipse using IMPLICIT differentiation. (4 steps)", "answer": "- Step 1: Differentiate $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ implicitly: $$\\tfrac{2x}{a^2} + \\tfrac{2y}{b^2}\\tfrac{dy}{dx} = 0 \\Rightarrow \\tfrac{dy}{dx} = -\\tfrac{b^2 x}{a^2 y}$$.\n- Step 2: At $$(a\\cos t, b\\sin t)$$: $$\\tfrac{dy}{dx} = -\\tfrac{b^2 \\cdot a\\cos t}{a^2 \\cdot b\\sin t} = -\\tfrac{b\\cos t}{a\\sin t}$$ — same as parametric.\n- Step 3: Tangent: $$y - b\\sin t = -\\tfrac{b\\cos t}{a\\sin t}(x - a\\cos t)$$.\n- Step 4: Multiply by $$a\\sin t$$ and simplify with $$\\sin^2 t + \\cos^2 t = 1$$ to get $$bx\\cos t + ay\\sin t = ab$$.\n\nTakeaway: Implicit and parametric methods give identical results; choose by convenience.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "State the focus-directrix definition of a conic, and explain how the value of $$e$$ classifies the curve. (3 steps)", "answer": "- Step 1: A conic is the locus of points $$P$$ such that $$\\frac{PS}{PM} = e$$, where $$S$$ is the focus and $$PM$$ is the perpendicular distance to a fixed line (the directrix).\n- Step 2: Classification by eccentricity:\n+ $$0 < e < 1$$: ellipse (P closer to focus than to directrix)\n+ $$e = 1$$: parabola (equidistant)\n+ $$e > 1$$: hyperbola (P farther from focus than from directrix)\n- Step 3: Edge cases: $$e = 0$$ degenerates to a circle (focus collapses to center, directrix at infinity); $$e \\to \\infty$$ degenerates to a straight line.\n\nThe eccentricity measures \"how far from circular\" the curve is — small $$e$$ → near-circular; $$e$$ near 1 → highly eccentric.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "Mentally verify that $$P = (0, b)$$ on the ellipse satisfies $$PS + PS' = 2a$$ using the foci $$(\\pm ae, 0)$$. (3 steps)", "answer": "- Step 1: Distance from $$(0, b)$$ to focus $$(ae, 0)$$: $$\\sqrt{a^2 e^2 + b^2}$$.\n- Step 2: Using $$b^2 = a^2(1 - e^2)$$: $$a^2 e^2 + b^2 = a^2 e^2 + a^2(1 - e^2) = a^2$$. So distance $$= \\sqrt{a^2} = a$$.\n- Step 3: By symmetry, distance to other focus is also $$a$$. Sum $$= a + a = 2a$$ ✓.\n\nTakeaway: At the top of the minor axis, the two focal distances are EQUAL (both $$a$$) — confirming the symmetric geometry.", "source": "Opus 4.7 ①", "_id": "opus_1_81"}, {"question": "For the ellipse $$x^2 + 4y^2 = 36$$, prove $$PA + PB = 12$$ where $$A = (-3\\sqrt{3}, 0)$$, $$B = (3\\sqrt{3}, 0)$$ are given points. (4 steps)", "answer": "- Step 1: Rewrite: $$\\frac{x^2}{36} + \\frac{y^2}{9} = 1$$, so $$a = 6, b = 3$$.\n- Step 2: Find eccentricity: $$b^2 = a^2(1 - e^2)$$ gives $$9 = 36(1 - e^2)$$, so $$e^2 = 3/4$$, $$e = \\sqrt{3}/2$$.\n- Step 3: Foci at $$(\\pm ae, 0) = (\\pm 6 \\cdot \\sqrt{3}/2, 0) = (\\pm 3\\sqrt{3}, 0)$$. So $$A, B$$ are precisely the foci.\n- Step 4: By the focal sum property, $$PA + PB = 2a = 12$$ for any $$P$$ on the ellipse.\n\nThe recognition that $$A, B$$ are foci is the key step — then the standard property gives the answer immediately.", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "Why does an ellipse have a \"chord-tangent limit\" that yields the tangent equation? (3 steps)", "answer": "- Step 1: A chord through two points $$P(\\alpha), Q(\\beta)$$ on an ellipse has a definite equation, parameterised by $$\\alpha, \\beta$$.\n- Step 2: As $$\\beta \\to \\alpha$$, the two points coalesce into a single point, and the chord becomes the tangent at that point.\n- Step 3: Algebraically, setting $$\\beta = \\alpha$$ in the chord equation directly gives the tangent equation — a useful technique for deriving tangent formulas.\n\nThis \"chord-to-tangent\" limiting procedure is general for smooth curves and provides intuition for what \"tangent\" means: a chord with infinitesimally close endpoints.", "source": "Opus 4.7 ②", "_id": "opus_2_91"}, {"question": "What is the equation of the tangent to the ellipse $$\\frac{x^{2}}{a^{2}}+\\frac{y^{2}}{b^{2}}=1$$ at the point $$(a \\cos t, b \\sin t)$$? How is the Pythagorean identity $$\\cos^{2} t+\\sin^{2} t=1$$ used in the derivation? (3 steps)", "answer": "- Step 1: Find the gradient using parametric differentiation: $$\\frac{dy}{dx}=\\frac{dy/dt}{dx/dt}=\\frac{b \\cos t}{-a \\sin t}$$. Use the point-slope form: $$y-b \\sin t = \\frac{b \\cos t}{-a \\sin t}(x - a \\cos t)$$.\n- Step 2: Multiply by $$-a \\sin t$$ to clear the fraction: $$-a y \\sin t + a b \\sin^{2} t = b x \\cos t - a b \\cos^{2} t$$. Rearrange to group the $$x$$ and $$y$$ terms on one side: $$b x \\cos t + a y \\sin t = a b \\cos^{2} t + a b \\sin^{2} t$$.\n- Step 3: Factor out $$ab$$ on the right side: $$b x \\cos t + a y \\sin t = a b(\\cos^{2} t + \\sin^{2} t)$$. Using the identity $$\\cos^{2} t + \\sin^{2} t = 1$$, the equation simplifies to $$b x \\cos t + a y \\sin t = a b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "Consider the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$. If we take the limit as $$e \\to \\infty$$, what does the curve look like, and what do its directrices approach? (2 steps)", "answer": "- Step 1: As $$e \\to \\infty$$, the term $$e^2 - 1 \\approx e^2$$, so $$b^2 \\approx a^2e^2$$, meaning $$b \\approx ae$$.\n+ The asymptotes are $$y = \\pm \\frac{b}{a}x \\approx \\pm \\frac{ae}{a}x = \\pm ex$$.\n+ As $$e$$ gets huge, the asymptotes become nearly vertical, and the hyperbola opens extremely wide, resembling a pair of vertical lines.\n- Step 2: The directrices are $$x = \\pm \\frac{a}{e}$$.\n+ As $$e \\to \\infty$$, $$\\frac{a}{e} \\to 0$$, so the directrices approach the y-axis (the conjugate axis).", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "Why is the factorisation $$p^3 - q^3 = (p-q)(p^2 + pq + q^2)$$ particularly useful in parametric problems on parabolas? (2 steps)", "answer": "- Step 1: Normal equations on a parabola involve $$p^3$$ and $$q^3$$. Subtracting two normal equations gives $$(p-q)\\cdot$$ (symmetric expression in $$p, q$$).\n- Step 2: The common factor $$(p-q)$$ can be cancelled (assuming distinct points $$p \\neq q$$), greatly simplifying the algebra.\n\nThis technique cleanly separates the \"single tangent\" case ($$p = q$$) from the \"chord\" case ($$p \\neq q$$), and reveals the symmetric structure in the simplified expressions.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}], "models": {"glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A closed curve is formed by slicing a cone. The standard Cartesian equation for this curve is $$\\frac{x^{2}}{a^{2}}+\\frac{y^{2}}{b^{2}}=1$$. What is this curve called, and what are the coordinates of its intersections with the coordinate axes?", "answer": "- Step 1: This curve is called an **ellipse**. It is a type of conic section formed by a closed slice through a cone.\n- Step 2: To find the intersections with the axes, set the other variable to 0.\n+ For the y-axis intersection, set $$x=0$$: $$\\frac{0}{a^{2}}+\\frac{y^{2}}{b^{2}}=1 \\implies y^{2}=b^{2} \\implies y=\\pm b$$. The points are $$(0, \\pm b)$$.\n+ For the x-axis intersection, set $$y=0$$: $$\\frac{x^{2}}{a^{2}}+\\frac{0}{b^{2}}=1 \\implies x^{2}=a^{2} \\implies x=\\pm a$$. The points are $$(\\pm a, 0)$$.\n- Step 3: The values $$a$$ and $$b$$ determine the extent of the ellipse along the x and y axes respectively. The longer axis is the major axis, and the shorter is the minor axis.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Why are the parametric equations $$x=a \\cos t$$ and $$y=b \\sin t$$ valid for the ellipse $$\\frac{x^{2}}{a^{2}}+\\frac{y^{2}}{b^{2}}=1$$? What fundamental identity guarantees this? (2 steps)", "answer": "- Step 1: Substitute the parametric equations into the left-hand side of the Cartesian equation: $$\\frac{(a \\cos t)^{2}}{a^{2}}+\\frac{(b \\sin t)^{2}}{b^{2}}$$.\n- Step 2: Simplify the expression: $$\\frac{a^{2} \\cos^{2} t}{a^{2}}+\\frac{b^{2} \\sin^{2} t}{b^{2}}=\\cos^{2} t+\\sin^{2} t$$. The fundamental trigonometric identity $$\\cos^{2} t+\\sin^{2} t \\equiv 1$$ guarantees that the parametric equations satisfy the Cartesian equation for all values of $$t$$.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "An ellipse has the equation $$4x^{2}+9y^{2}=36$$. How do you convert this into the standard form $$\\frac{x^{2}}{a^{2}}+\\frac{y^{2}}{b^{2}}=1$$ to identify $$a$$ and $$b$$? (2 steps)", "answer": "- Step 1: Divide the entire equation by 36 to make the right-hand side equal to 1: $$\\frac{4x^{2}}{36}+\\frac{9y^{2}}{36}=1$$.\n- Step 2: Simplify the fractions so the denominators are squares: $$\\frac{x^{2}}{9}+\\frac{y^{2}}{4}=1$$. Now it matches the standard form, revealing $$a^{2}=9 \\implies a=3$$ and $$b^{2}=4 \\implies b=2$$. Since $$a>b$$, the major axis is along the x-axis.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "The standard hyperbola has the Cartesian equation $$\\frac{x^{2}}{a^{2}}-\\frac{y^{2}}{b^{2}}=1$$. How do we determine the equations of its asymptotes, and what happens to the curve's equation as $$x$$ and $$y$$ tend to infinity? (2 steps)", "answer": "- Step 1: As $$x$$ and $$y$$ become very large, the constant \"1\" on the right-hand side becomes negligible compared to the terms on the left. The equation approaches $$\\frac{x^{2}}{a^{2}}-\\frac{y^{2}}{b^{2}} \\approx 0$$, or $$\\frac{x^{2}}{a^{2}} \\approx \\frac{y^{2}}{b^{2}}$$.\n- Step 2: Taking the square root of both sides gives the equations of the asymptotes as $$y=\\pm \\frac{b}{a}x$$. These are the straight lines that the hyperbola approaches but never touches as it extends to infinity.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "A hyperbola can be parameterized using two different sets of equations: $$x=\\pm a \\cosh t, y=b \\sinh t$$ OR $$x=a \\sec \\theta, y=b \\tan \\theta$$. What hyperbolic and trigonometric identities make these valid respectively? (2 steps)", "answer": "- Step 1: For the first set, substitute into the Cartesian equation: $$\\frac{a^{2} \\cosh^{2} t}{a^{2}}-\\frac{b^{2} \\sinh^{2} t}{b^{2}}=\\cosh^{2} t-\\sinh^{2} t$$. The hyperbolic identity $$\\cosh^{2} t-\\sinh^{2} t \\equiv 1$$ guarantees this is valid.\n- Step 2: For the second set, substitute into the Cartesian equation: $$\\frac{a^{2} \\sec^{2} \\theta}{a^{2}}-\\frac{b^{2} \\tan^{2} \\theta}{b^{2}}=\\sec^{2} \\theta-\\tan^{2} \\theta$$. The trigonometric identity $$\\sec^{2} \\theta-\\tan^{2} \\theta \\equiv 1$$ guarantees this is valid.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "The hyperbola $$x^{2}-y^{2}=a^{2}$$ has perpendicular asymptotes ($$y=x$$ and $$y=-x$$), making it a \"rectangular hyperbola\". However, it is not the same as the rectangular hyperbola $$xy=c^{2}$$ from FP1. What is the geometric relationship between these two curves? (2 steps)", "answer": "- Step 1: The curve $$x^{2}-y^{2}=a^{2}$$ is a standard hyperbola with asymptotes at 45° and 135° to the x-axis. The curve $$xy=c^{2}$$ is a rectangular hyperbola with asymptotes along the x and y axes.\n- Step 2: The relationship is a rotation. If you rotate the curve $$xy=c^{2}$$ anticlockwise by $$45^{\\circ}$$ about the origin, its asymptotes rotate to become $$y=x$$ and $$y=-x$$, and its equation becomes $$x^{2}-y^{2}=a^{2}$$ (where $$a^{2}=2c^{2}$$). They belong to the same family of shapes but are oriented differently.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Eccentricity $$e$$ is defined by the ratio $$\\frac{PS}{PM}=e$$, where $$P$$ is a point on a conic, $$S$$ is a focus, and $$M$$ is a point on the directrix. How does the value of $$e$$ distinguish between an ellipse, a parabola, and a hyperbola?", "answer": "- Step 1: The ratio $$e = \\frac{\\text{distance from focus}}{\\text{distance from directrix}}$$ dictates the shape of the conic section.\n+ If $$0 < e < 1$$, the distance to the focus is always smaller than the distance to the directrix, pulling the curve inward to form a closed shape: an **ellipse**.\n+ If $$e = 1$$, the distances are equal, forming a **parabola**.\n+ If $$e > 1$$, the distance to the focus is greater, pushing the curve outward to form an open shape: a **hyperbola**.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "Starting from the focus-directrix definition $$PS = e \\cdot PM$$ with focus $$S(ae, 0)$$ and directrix $$x = a/e$$, walk through the algebraic steps to derive the standard ellipse equation $$\\frac{x^{2}}{a^{2}}+\\frac{y^{2}}{b^{2}}=1$$. Where does the $$b^2$$ come from? (3 steps)", "answer": "- Step 1: Let $$P(x,y)$$. Calculate the squared distances: $$PS^{2}=(x-ae)^{2}+y^{2}$$ and $$PM^{2}=(\\frac{a}{e}-x)^{2}=\\frac{(a-ex)^{2}}{e^{2}}$$. Set up the equation $$PS^{2}=e^{2}PM^{2}$$.\n- Step 2: Expand and simplify: $$(x-ae)^{2}+y^{2}=(a-ex)^{2}$$. Expanding both gives $$x^{2}-2aex+a^{2}e^{2}+y^{2}=a^{2}-2aex+e^{2}x^{2}$$. The $$-2aex$$ terms cancel out.\n- Step 3: Rearrange to group $$x$$ and $$y$$: $$x^{2}(1-e^{2})+y^{2}=a^{2}(1-e^{2})$$. Divide by $$a^{2}(1-e^{2})$$ to get $$\\frac{x^{2}}{a^{2}}+\\frac{y^{2}}{a^{2}(1-e^{2})}=1$$. Since $$0<e<1$$, the term $$a^{2}(1-e^{2})$$ is positive, so we define $$b^{2}=a^{2}(1-e^{2})$$ to get the standard form.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Deriving the hyperbola equation from focus-directrix uses the same setup as the ellipse ($$S=(ae,0)$$, directrix $$x=a/e$$), but results in $$\\frac{x^{2}}{a^{2}}-\\frac{y^{2}}{b^{2}}=1$$. What is the crucial algebraic step that leads to the minus sign and the definition $$b^2 = a^2(e^2-1)$$? (3 steps)", "answer": "- Step 1: Following the same derivation as the ellipse, we arrive at the intermediate equation: $$x^{2}(1-e^{2})+y^{2}=a^{2}(1-e^{2})$$.\n- Step 2: Unlike the ellipse, for a hyperbola, $$e>1$$. This means that $$1-e^{2}$$ is a negative number. To make the denominators positive and match standard form, we multiply the entire equation by $$-1$$: $$x^{2}(e^{2}-1)-y^{2}=a^{2}(e^{2}-1)$$.\n- Step 3: Divide by $$a^{2}(e^{2}-1)$$ to get $$\\frac{x^{2}}{a^{2}}-\\frac{y^{2}}{a^{2}(e^{2}-1)}=1$$. Since $$e>1$$, the term $$a^{2}(e^{2}-1)$$ is positive, so we define $$b^{2}=a^{2}(e^{2}-1)$$, resulting in the standard hyperbola equation with a minus sign.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "For the ellipse $$\\frac{x^{2}}{a^{2}}+\\frac{y^{2}}{b^{2}}=1$$, how do you determine whether the foci lie on the x-axis or the y-axis? How do the formulas for foci and directrices change?", "answer": "- Step 1: Compare the values of $$a$$ and $$b$$. The foci always lie on the **major axis** (the longer axis).\n+ If $$a>b$$, the major axis is the x-axis. The foci are at $$(\\pm ae, 0)$$ and the directrices are $$x=\\pm \\frac{a}{e}$$. The eccentricity is found using $$b^{2}=a^{2}(1-e^{2})$$.\n+ If $$b>a$$, the major axis is the y-axis. The foci are at $$(0, \\pm be)$$ and the directrices are $$y=\\pm \\frac{b}{e}$$. The eccentricity is found using $$a^{2}=b^{2}(1-e^{2})$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "For the hyperbola $$\\frac{x^{2}}{9}-\\frac{y^{2}}{25}=1$$, $$b=5$$ and $$a=3$$. Since $$b>a$$, a student reasons that the foci must be on the y-axis at $$(0, \\pm be)$$, just like in ellipses. Why is this incorrect?", "answer": "- Step 1: The standard hyperbola equation $$\\frac{x^{2}}{a^{2}}-\\frac{y^{2}}{b^{2}}=1$$ always opens left and right, crossing the x-axis at $$(\\pm a, 0)$$.\n- Step 2: If you set $$x=0$$ in the equation, you get $$-\\frac{y^{2}}{b^{2}}=1$$, which implies $$y^{2}=-b^{2}$$. This has no real solutions, meaning the hyperbola never crosses the y-axis.\n- Step 3: The foci must lie on the transverse axis (the axis the curve actually crosses). Therefore, regardless of whether $$a>b$$ or $$b>a$$, the foci of this standard hyperbola are always on the x-axis at $$(\\pm ae, 0)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "For any point $$P$$ on an ellipse with foci $$S$$ and $$S'$$, the sum of distances $$PS + PS'$$ is constant. What is this constant equal to, and how does the focus-directrix definition quickly prove this? (3 steps)", "answer": "- Step 1: Use the focus-directrix definition for both foci. Let $$M$$ and $$M'$$ be the feet of the perpendiculars from $$P$$ to the directrices $$x=a/e$$ and $$x=-a/e$$ respectively. Thus, $$PS = e \\cdot PM$$ and $$PS' = e \\cdot PM'$$.\n- Step 2: The distances from $$P(x,y)$$ to the directrices are $$PM = \\frac{a}{e}-x$$ and $$PM' = x - (-\\frac{a}{e}) = x + \\frac{a}{e}$$. Notice that $$PM$$ and $$PM'$$ are parallel to the x-axis.\n- Step 3: Add the distances: $$PS + PS' = e(PM + PM') = e\\left((\\frac{a}{e}-x) + (x + \\frac{a}{e})\\right) = e\\left(\\frac{2a}{e}\\right) = 2a$$. The constant sum is $$2a$$, the length of the major axis.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "What is the equation of the tangent to the ellipse $$\\frac{x^{2}}{a^{2}}+\\frac{y^{2}}{b^{2}}=1$$ at the point $$(a \\cos t, b \\sin t)$$? How is the Pythagorean identity $$\\cos^{2} t+\\sin^{2} t=1$$ used in the derivation? (3 steps)", "answer": "- Step 1: Find the gradient using parametric differentiation: $$\\frac{dy}{dx}=\\frac{dy/dt}{dx/dt}=\\frac{b \\cos t}{-a \\sin t}$$. Use the point-slope form: $$y-b \\sin t = \\frac{b \\cos t}{-a \\sin t}(x - a \\cos t)$$.\n- Step 2: Multiply by $$-a \\sin t$$ to clear the fraction: $$-a y \\sin t + a b \\sin^{2} t = b x \\cos t - a b \\cos^{2} t$$. Rearrange to group the $$x$$ and $$y$$ terms on one side: $$b x \\cos t + a y \\sin t = a b \\cos^{2} t + a b \\sin^{2} t$$.\n- Step 3: Factor out $$ab$$ on the right side: $$b x \\cos t + a y \\sin t = a b(\\cos^{2} t + \\sin^{2} t)$$. Using the identity $$\\cos^{2} t + \\sin^{2} t = 1$$, the equation simplifies to $$b x \\cos t + a y \\sin t = a b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "What is the equation of the normal to the ellipse $$\\frac{x^{2}}{a^{2}}+\\frac{y^{2}}{b^{2}}=1$$ at $$(a \\cos t, b \\sin t)$$? How does the expression $$(a^{2}-b^{2})$$ arise in this equation? (3 steps)", "answer": "- Step 1: The gradient of the tangent is $$\\frac{-b \\cos t}{a \\sin t}$$, so the gradient of the normal is the negative reciprocal: $$\\frac{a \\sin t}{b \\cos t}$$. The equation is $$y - b \\sin t = \\frac{a \\sin t}{b \\cos t}(x - a \\cos t)$$.\n- Step 2: Multiply by $$b \\cos t$$: $$b y \\cos t - b^{2} \\sin t \\cos t = a x \\sin t - a^{2} \\sin t \\cos t$$. Rearrange to get the $$x$$ and $$y$$ terms on one side: $$a x \\sin t - b y \\cos t = a^{2} \\sin t \\cos t - b^{2} \\sin t \\cos t$$.\n- Step 3: Factor out $$\\sin t \\cos t$$ on the right side: $$a x \\sin t - b y \\cos t = (a^{2} - b^{2}) \\sin t \\cos t$$. The $$(a^{2}-b^{2})$$ arises from moving the $$b^2$$ term to the other side to join the $$a^2$$ term, effectively calculating the difference of the squares of the semi-axes.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "What is the condition for the line $$y = mx + c$$ to be a tangent to the ellipse $$\\frac{x^{2}}{a^{2}}+\\frac{y^{2}}{b^{2}}=1$$? Conceptually, what property of the resulting quadratic equation ensures tangency? (3 steps)", "answer": "- Step 1: Substitute $$y = mx + c$$ into the ellipse equation: $$\\frac{x^{2}}{a^{2}}+\\frac{(mx+c)^{2}}{b^{2}}=1$$. Multiply by $$a^{2}b^{2}$$ to get $$b^{2}x^{2}+a^{2}(m^{2}x^{2}+2mcx+c^{2})=a^{2}b^{2}$$.\n- Step 2: Rearrange into a quadratic in $$x$$: $$(b^{2}+a^{2}m^{2})x^{2}+2a^{2}mcx+a^{2}(c^{2}-b^{2})=0$$.\n- Step 3: For the line to be a tangent, it must touch the ellipse exactly once, meaning the quadratic has exactly one real root. This requires the discriminant to be zero ($$B^{2}-4AC=0$$). Setting the discriminant to zero and simplifying yields the condition $$c^{2}=a^{2}m^{2}+b^{2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "What is the equation of the tangent to the hyperbola $$\\frac{x^{2}}{a^{2}}-\\frac{y^{2}}{b^{2}}=1$$ at the point $$(a \\sec \\theta, b \\tan \\theta)$$? What identity is crucial for simplification? (3 steps)", "answer": "- Step 1: Find the gradient using parametric differentiation: $$\\frac{dy}{dx}=\\frac{b \\sec^{2} \\theta}{a \\sec \\theta \\tan \\theta}=\\frac{b}{a \\sin \\theta}$$. The equation is $$y - b \\tan \\theta = \\frac{b}{a \\sin \\theta}(x - a \\sec \\theta)$$.\n- Step 2: Multiply by $$a \\sin \\theta$$: $$a y \\sin \\theta - a b \\frac{\\sin^{2} \\theta}{\\cos \\theta} = b x - a b \\frac{1}{\\cos \\theta}$$. (Rewriting $$\\tan \\theta = \\sin \\theta / \\cos \\theta$$ and $$\\sec \\theta = 1 / \\cos \\theta$$).\n- Step 3: Rearrange and factor: $$b x - a y \\sin \\theta = a b \\frac{1}{\\cos \\theta} - a b \\frac{\\sin^{2} \\theta}{\\cos \\theta} = a b \\frac{1-\\sin^{2} \\theta}{\\cos \\theta}$$. Using the identity $$1-\\sin^{2} \\theta=\\cos^{2} \\theta$$, the right side becomes $$a b \\cos \\theta$$. Multiply by $$\\sec \\theta$$ to get the final form: $$b x \\sec \\theta - a y \\tan \\theta = a b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "What is the equation of the tangent to the hyperbola $$\\frac{x^{2}}{a^{2}}-\\frac{y^{2}}{b^{2}}=1$$ at the point $$(a \\cosh t, b \\sinh t)$$? What identity is crucial for simplification? (3 steps)", "answer": "- Step 1: Find the gradient: $$\\frac{dy}{dx}=\\frac{b \\cosh t}{a \\sinh t}$$. The equation is $$y - b \\sinh t = \\frac{b \\cosh t}{a \\sinh t}(x - a \\cosh t)$$.\n- Step 2: Multiply by $$a \\sinh t$$: $$a y \\sinh t - a b \\sinh^{2} t = b x \\cosh t - a b \\cosh^{2} t$$. Rearrange: $$b x \\cosh t - a y \\sinh t = a b \\cosh^{2} t - a b \\sinh^{2} t$$.\n- Step 3: Factor out $$ab$$: $$b x \\cosh t - a y \\sinh t = a b(\\cosh^{2} t - \\sinh^{2} t)$$. Using the hyperbolic identity $$\\cosh^{2} t - \\sinh^{2} t \\equiv 1$$, the equation simplifies to $$b x \\cosh t - a y \\sinh t = a b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "What is the condition for the line $$y = mx + c$$ to be a tangent to the hyperbola $$\\frac{x^{2}}{a^{2}}-\\frac{y^{2}}{b^{2}}=1$$? How does this differ structurally from the condition for an ellipse?", "answer": "- Step 1: Substitute $$y = mx + c$$ into the hyperbola equation and rearrange into a quadratic in $$x$$: $$(b^{2}-a^{2}m^{2})x^{2}-2a^{2}mcx-a^{2}(c^{2}+b^{2})=0$$.\n- Step 2: For tangency, the discriminant must be zero. Setting $$B^{2}-4AC=0$$ and simplifying (cancelling terms) yields the condition $$a^{2}m^{2}=b^{2}+c^{2}$$.\n- Step 3: This differs from the ellipse condition ($$c^{2}=a^{2}m^{2}+b^{2}$$). Note how the $$c^2$$ and $$b^2$$ effectively swap places relative to the $$a^2m^2$$ term. This difference stems from the minus sign in the hyperbola's equation, which changes the signs in the discriminant calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "When finding the locus of a point (like the midpoint of a chord or the intersection of tangents) on a conic section, what is the general 3-step algebraic strategy?", "answer": "- Step 1: **Parameterize the moving point.** Express the coordinates of the point (say $$X, Y$$) in terms of the parameter(s) of the curve (e.g., $$t, \\theta$$, or $$p, q$$).\n- Step 2: **Express parameter functions in terms of coordinates.** Rearrange the parametric equations from Step 1 so that trigonometric or hyperbolic functions of the parameter are isolated on one side, expressed in terms of $$X$$ and $$Y$$.\n- Step 3: **Eliminate the parameter.** Use a known identity (like $$\\cos^{2} t+\\sin^{2} t=1$$ or $$\\cosh^{2} t-\\sinh^{2} t=1$$) to combine the expressions from Step 2. This eliminates the parameter and leaves a Cartesian equation in $$X$$ and $$Y$$, which is the locus.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "The tangent to the ellipse $$\\frac{x^{2}}{a^{2}}+\\frac{y^{2}}{b^{2}}=1$$ at $$(a \\cos t, b \\sin t)$$ cuts the x-axis at $$A$$ and the y-axis at $$B$$. What are the coordinates of $$A$$ and $$B$$, and what type of curve is formed by the locus of the midpoint of $$AB$$? (3 steps)", "answer": "- Step 1: The tangent equation is $$b x \\cos t + a y \\sin t = a b$$. Find $$A$$ by setting $$y=0$$: $$b x \\cos t = a b \\implies x = \\frac{a}{\\cos t} = a \\sec t$$. So $$A = (a \\sec t, 0)$$.\n- Step 2: Find $$B$$ by setting $$x=0$$: $$a y \\sin t = a b \\implies y = \\frac{b}{\\sin t} = b \\cosec t$$. So $$B = (0, b \\cosec t)$$.\n- Step 3: The midpoint $$(X, Y)$$ is $$X = \\frac{a \\sec t}{2}$$ and $$Y = \\frac{b \\cosec t}{2}$$. Rearranging gives $$\\cos t = \\frac{a}{2X}$$ and $$\\sin t = \\frac{b}{2Y}$$. Squaring and adding using $$\\cos^{2} t+\\sin^{2} t=1$$ gives $$(\\frac{a}{2X})^{2}+(\\frac{b}{2Y})^{2}=1$$. This is the equation of another ellipse (in terms of $$1/X^2$$ and $$1/Y^2$$).", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "For the parabola $$y^{2}=4ax$$ with parametric point $$P(at^{2}, 2at)$$, what are the standard equations for the tangent and the normal at $$P$$?", "answer": "- Step 1: The gradient of the tangent is found by differentiating: $$2y \\frac{dy}{dx} = 4a \\implies \\frac{dy}{dx}=\\frac{2a}{y}=\\frac{2a}{2at}=\\frac{1}{t}$$.\n- Step 2: Using point-slope form for the tangent: $$y - 2at = \\frac{1}{t}(x - at^{2})$$. Multiplying by $$t$$ gives $$ty = x + at^{2}$$, or $$x - ty + at^{2} = 0$$.\n- Step 3: The gradient of the normal is $$-t$$. Using point-slope form: $$y - 2at = -t(x - at^{2})$$. Rearranging gives $$y + tx = 2at + at^{3}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "For the rectangular hyperbola $$xy=c^{2}$$ with parametric point $$P(ct, \\frac{c}{t})$$, what are the standard equations for the tangent and the normal at $$P$$?", "answer": "- Step 1: The gradient is found by differentiating $$y = c^{2}x^{-1}$$: $$\\frac{dy}{dx} = -\\frac{c^{2}}{x^{2}} = -\\frac{c^{2}}{(ct)^{2}} = -\\frac{1}{t^{2}}$$.\n- Step 2: For the tangent: $$y - \\frac{c}{t} = -\\frac{1}{t^{2}}(x - ct)$$. Multiplying by $$t^{2}$$ gives $$t^{2}y - ct = -x + ct$$, which rearranges to $$x + t^{2}y = 2ct$$.\n- Step 3: For the normal, the gradient is $$t^{2}$$. $$y - \\frac{c}{t} = t^{2}(x - ct)$$. Multiplying by $$t$$ gives $$ty - c = t^{3}x - ct^{4}$$, which rearranges to $$t^{3}x - ty = c(t^{4}-1)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "An ellipse has equation $$\\frac{x^{2}}{25}+\\frac{y^{2}}{9}=1$$. Without full calculation, is the eccentricity closer to 0 or closer to 1? What are the coordinates of the foci? (2 steps)", "answer": "- Step 1: Here $$a=5$$ and $$b=3$$. Since $$a$$ and $$b$$ are reasonably different (it's not close to a circle where $$a \\approx b$$), the ellipse is somewhat flattened, meaning the eccentricity is not close to 0. Using $$b^{2}=a^{2}(1-e^{2}) \\implies 9=25(1-e^{2}) \\implies 1-e^{2}=9/25 \\implies e^{2}=16/25 \\implies e=4/5=0.8$$. It is closer to 1.\n- Step 2: The foci are on the x-axis because $$a>b$$. Their coordinates are $$(\\pm ae, 0)$$. Since $$e=4/5$$ and $$a=5$$, $$ae = 4$$. The foci are at $$(\\pm 4, 0)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "A hyperbola has equation $$\\frac{x^{2}}{16}-\\frac{y^{2}}{9}=1$$. What are the equations of its asymptotes and where does it cross the x-axis? (2 steps)", "answer": "- Step 1: The hyperbola crosses the x-axis when $$y=0$$. Substituting gives $$\\frac{x^{2}}{16}=1 \\implies x^{2}=16 \\implies x=\\pm 4$$. It crosses at $$(\\pm 4, 0)$$.\n- Step 2: The asymptotes are given by $$y=\\pm \\frac{b}{a}x$$. Here $$a=4$$ and $$b=3$$, so the asymptotes are $$y=\\pm \\frac{3}{4}x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "What happens to the shape of an ellipse as the eccentricity $$e$$ approaches 0? What happens as it approaches 1?", "answer": "- Step 1: As $$e \\to 0$$, the relationship $$b^{2}=a^{2}(1-e^{2})$$ becomes $$b^{2} \\approx a^{2}(1-0) \\implies b \\approx a$$. The ellipse becomes more circular.\n- Step 2: As $$e \\to 1$$, the relationship becomes $$b^{2} \\approx a^{2}(1-1) = 0 \\implies b \\approx 0$$. The minor axis shrinks to zero, and the ellipse flattens into a line segment along the major axis between the vertices $$(\\pm a, 0)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "The latus rectum of an ellipse is a chord through a focus perpendicular to the major axis. Conceptually, why is the length of the latus rectum $$\\frac{2b^{2}}{a}$$? (2 steps)", "answer": "- Step 1: The focus is located at $$(ae, 0)$$. The latus rectum is a vertical line passing through this focus, so its equation is $$x=ae$$. We substitute $$x=ae$$ into the ellipse equation to find the y-coordinates of the endpoints.\n- Step 2: $$\\frac{(ae)^{2}}{a^{2}}+\\frac{y^{2}}{b^{2}}=1 \\implies e^{2}+\\frac{y^{2}}{b^{2}}=1 \\implies \\frac{y^{2}}{b^{2}}=1-e^{2}$$. Since $$b^{2}=a^{2}(1-e^{2})$$, we have $$1-e^{2}=\\frac{b^{2}}{a^{2}}$$. Thus $$\\frac{y^{2}}{b^{2}}=\\frac{b^{2}}{a^{2}} \\implies y^{2}=\\frac{b^{4}}{a^{2}} \\implies y=\\pm \\frac{b^{2}}{a}$$. The total length is the difference in y-values: $$\\frac{b^{2}}{a} - (-\\frac{b^{2}}{a}) = \\frac{2b^{2}}{a}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "The chord $$PQ$$ of a parabola $$y^{2}=4ax$$ passes through the focus $$(a,0)$$. The tangents at $$P$$ and $$Q$$ (parameters $$p$$ and $$q$$) meet at $$R$$. It can be shown that the condition for the chord to pass through the focus is $$pq=-1$$. How does this condition simplify finding the locus of $$R$$? (3 steps)", "answer": "- Step 1: The intersection of tangents $$R$$ has coordinates involving $$p^{2}+q^{2}$$ and $$p+q$$. Specifically, $$x_R = a + a(p^{2}+pq+q^{2})$$ and $$y_R = -apq(p+q)$$. These mixed terms make eliminating $$p$$ and $$q$$ difficult.\n- Step 2: The condition $$pq=-1$$ allows us to simplify $$p^{2}+q^{2}$$ using the algebraic identity $$(p+q)^{2}=p^{2}+2pq+q^{2}$$. Rearranging gives $$p^{2}+q^{2}=(p+q)^{2}-2pq$$. Substituting $$pq=-1$$ gives $$p^{2}+q^{2}=(p+q)^{2}+2$$.\n- Step 3: Now the coordinates of $$R$$ can be written purely in terms of $$(p+q)$$: $$x_R = a + a((p+q)^{2}+2+(-1)) = 3a + a(p+q)^{2}$$, and $$y_R = a(p+q)$$. Letting $$X=x_R$$ and $$Y=y_R$$, we can substitute $$(p+q)=Y/a$$ into the first equation to eliminate the parameter, yielding the locus $$Y^{2}=a(X-3a)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "The line $$l_1$$ is normal to the hyperbola $$\\frac{x^{2}}{a^{2}}-\\frac{y^{2}}{b^{2}}=1$$ at $$(a \\sec \\theta, b \\tan \\theta)$$, and cuts the axes at $$A$$ and $$B$$. If the locus of the midpoint of $$AB$$ is sought, what is the equation of the normal line? (2 steps)", "answer": "- Step 1: Find the gradient of the tangent: $$\\frac{dy}{dx}=\\frac{b \\sec^{2} \\theta}{a \\sec \\theta \\tan \\theta}=\\frac{b}{a \\sin \\theta}$$. The gradient of the normal is $$-\\frac{a \\sin \\theta}{b}$$.\n- Step 2: Using point-slope form: $$y - b \\tan \\theta = -\\frac{a \\sin \\theta}{b}(x - a \\sec \\theta)$$. Multiplying by $$b$$ and expanding: $$by - b^{2} \\tan \\theta = -ax \\sin \\theta + a^{2} \\tan \\theta$$. Rearranging gives the normal equation: $$by + ax \\sin \\theta = (a^{2}+b^{2}) \\tan \\theta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}], "count": 28}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What is the standard Cartesian equation of an ellipse, and what do the constants $$a$$ and $$b$$ represent visually on its graph? (2 steps)", "answer": "- Step 1: The standard Cartesian equation is $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$. Visually, $$a$$ and $$b$$ represent the semi-axes of the ellipse.\n+ If $$a > b$$, the major axis is horizontal, and the ellipse crosses the x-axis at $$(\\pm a, 0)$$.\n+ If $$b > a$$, the major axis is vertical, and the ellipse crosses the y-axis at $$(0, \\pm b)$$.\n- Step 2: The endpoints of the minor axis are at $$(0, \\pm b)$$ if $$a>b$$, or $$(\\pm a, 0)$$ if $$b>a$$. The shape is a stretched circle, symmetric about both axes.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "What are the standard parametric equations for an ellipse with Cartesian equation $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$, and what trigonometric identity guarantees that any point generated by these parameters lies on the ellipse? (2 steps)", "answer": "- Step 1: The parametric equations are $$x = a\\cos t$$ and $$y = b\\sin t$$, where $$0 \\le t < 2\\pi$$.\n- Step 2: Substituting these into the left side of the Cartesian equation gives $$\\frac{(a\\cos t)^2}{a^2} + \\frac{(b\\sin t)^2}{b^2} = \\cos^2 t + \\sin^2 t$$.\n+ By the fundamental trigonometric identity, $$\\cos^2 t + \\sin^2 t \\equiv 1$$, which matches the right side of the Cartesian equation, confirming the point lies on the curve.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "A curve has the equation $$4x^2 + 9y^2 = 36$$. To sketch this ellipse, you first convert it to standard form. What are the values of $$a$$ and $$b$$, and on which axis does the ellipse have its longest extent? (2 steps)", "answer": "- Step 1: Divide the entire equation by 36 to get $$\\frac{4x^2}{36} + \\frac{9y^2}{36} = 1$$, which simplifies to $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$.\n- Step 2: Here, $$a^2 = 9$$ so $$a = 3$$, and $$b^2 = 4$$ so $$b = 2$$.\n+ Since $$a > b$$, the major axis is along the x-axis, and the ellipse has its longest extent horizontally, crossing the x-axis at $$x = \\pm 3$$.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "What is the standard Cartesian equation of a hyperbola, and what are the equations of its asymptotes? (2 steps)", "answer": "- Step 1: The standard Cartesian equation is $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$.\n- Step 2: As $$x$$ and $$y$$ tend to infinity, the 1 on the right side becomes negligible, so $$\\frac{x^2}{a^2} \\approx \\frac{y^2}{b^2}$$.\n+ Taking square roots gives the asymptote equations: $$y = \\frac{b}{a}x$$ and $$y = -\\frac{b}{a}x$$.\nThese are straight lines passing through the origin that the hyperbola approaches but never touches.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "A standard hyperbola has Cartesian equation $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$. Where does it cross the x-axis, and why does it not cross the y-axis? (2 steps)", "answer": "- Step 1: To find x-axis crossings, set $$y=0$$, yielding $$\\frac{x^2}{a^2} = 1$$, so the curve crosses the x-axis at $$(\\pm a, 0)$$.\n- Step 2: To find y-axis crossings, set $$x=0$$, yielding $$-\\frac{y^2}{b^2} = 1$$, or $$y^2 = -b^2$$.\n+ Since $$b^2$$ is positive, $$-b^2$$ is negative, and a squared real number cannot be negative. Thus, there are no real y-intercepts, and the curve does not cross the y-axis.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "What are the two common sets of parametric equations for a standard hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, and what identities connect each set to the Cartesian equation? (2 steps)", "answer": "- Step 1: The first set uses hyperbolic functions: $$x = \\pm a\\cosh t$$, $$y = b\\sinh t$$.\n+ Substitution gives $$\\cosh^2 t - \\sinh^2 t \\equiv 1$$, which satisfies the equation.\n+ The $$\\pm$$ is needed because $$\\cosh t \\ge 1$$, so $$x$$ can be positive or negative, covering both branches.\n- Step 2: The second set uses trigonometric functions: $$x = a\\sec\\theta$$, $$y = b\\tan\\theta$$, where $$\\theta \\neq \\pm \\frac{\\pi}{2}$$.\n+ Substitution gives $$\\sec^2\\theta - \\tan^2\\theta \\equiv 1$$, which satisfies the equation.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "How does the rectangular hyperbola $$x^2 - y^2 = a^2$$ differ from the rectangular hyperbola $$xy = c^2$$ in terms of their orientation and asymptotes? (2 steps)", "answer": "- Step 1: The hyperbola $$x^2 - y^2 = a^2$$ has asymptotes $$y = x$$ and $$y = -x$$, which are perpendicular (hence \"rectangular\"), and its branches are oriented along the lines $$y = \\pm x$$ (opening left and right).\n- Step 2: The hyperbola $$xy = c^2$$ also has perpendicular asymptotes (the coordinate axes $$x=0$$ and $$y=0$$), but its branches are oriented along the lines $$y = \\pm x$$ (opening up-right and down-left).\n+ Although both have perpendicular asymptotes, they are rotated versions of each other by 45 degrees, so they belong to different families of equations.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "What is the definition of the eccentricity $$e$$ of a conic section in terms of its focus and directrix?", "answer": "- Step 1: For any point $$P$$ on a conic section, the eccentricity $$e$$ is the constant ratio of the distance of $$P$$ from a fixed point (the focus, $$S$$) to the distance of $$P$$ from a fixed straight line (the directrix).\n+ Mathematically, this is expressed as $$\\frac{PS}{PM} = e$$, where $$M$$ is the point on the directrix closest to $$P$$.\n+ This ratio determines the shape: how \"stretched\" the conic is compared to a circle.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "How does the value of the eccentricity $$e$$ classify the type of conic section?", "answer": "- Step 1: The value of $$e$$ determines the curve's shape:\n+ If $$0 < e < 1$$, the curve is an ellipse (the distance to the focus is less than the distance to the directrix, so the curve closes).\n+ If $$e = 1$$, the curve is a parabola (distances are equal).\n+ If $$e > 1$$, the curve is a hyperbola (the distance to the focus exceeds the distance to the directrix, so the curve opens up).\n+ (Note: $$e = 0$$ is the special case of a circle, and infinite $$e$$ corresponds to a straight line).", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "For an ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with $$a > b$$, where are the foci located, and what are the equations of the directrices? (2 steps)", "answer": "- Step 1: The foci are points on the major axis (the x-axis, since $$a>b$$). Their coordinates are $$(\\pm ae, 0)$$, where $$e$$ is the eccentricity.\n+ They are located inside the ellipse, between the center and the vertices $$(\\pm a, 0)$$ because $$0 < e < 1$$ means $$ae < a$$.\n- Step 2: The directrices are vertical lines perpendicular to the major axis, located outside the ellipse. Their equations are $$x = \\pm \\frac{a}{e}$$.\n+ Since $$e < 1$$, $$\\frac{1}{e} > 1$$, so $$\\frac{a}{e} > a$$, placing the directrices beyond the vertices.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "What is the relationship between $$a$$, $$b$$, and $$e$$ for an ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with $$a > b$$, and why is $$1-e^2$$ guaranteed to be positive? (2 steps)", "answer": "- Step 1: The relationship is $$b^2 = a^2(1 - e^2)$$.\n- Step 2: For an ellipse, the eccentricity $$e$$ must be between 0 and 1 ($$0 < e < 1$$).\n+ Therefore, $$e^2 < 1$$, which means $$1 - e^2$$ is a positive number.\n+ This ensures that $$b^2$$ is positive, as required for a real length $$b$$.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "If an ellipse has the equation $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ but with $$b > a$$ (major axis on the y-axis), how do the formulas for eccentricity, foci, and directrices change? (2 steps)", "answer": "- Step 1: The roles of $$a$$ and $$b$$ swap in the eccentricity formula to reflect that $$b$$ is now the semi-major axis. The formula becomes $$a^2 = b^2(1 - e^2)$$.\n- Step 2: Because the major axis is now the y-axis, the foci move to the y-axis at $$(0, \\pm be)$$, and the directrices become horizontal lines with equations $$y = \\pm \\frac{b}{e}$$.\n+ The foci are always on the major axis, and the directrices are always perpendicular to the major axis.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "For a hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, where are the foci located, and what is the relationship between $$a$$, $$b$$, and $$e$$? (2 steps)", "answer": "- Step 1: The relationship is $$b^2 = a^2(e^2 - 1)$$.\n+ Since the eccentricity of a hyperbola is $$e > 1$$, the term $$e^2 - 1$$ is positive, ensuring $$b^2$$ is positive.\n- Step 2: The foci are located on the x-axis at $$(\\pm ae, 0)$$.\n+ Since $$e > 1$$, $$ae > a$$, meaning the foci are located outside the vertices $$(\\pm a, 0)$$, further away from the center than the curve itself.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "A hyperbola has the equation $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ with $$b > a$$. Does the focus shift to the y-axis like it does for an ellipse with $$b > a$$? Why or why not? (2 steps)", "answer": "- Step 1: No, the foci remain on the x-axis at $$(\\pm ae, 0)$$, and the directrices remain $$x = \\pm \\frac{a}{e}$$.\n- Step 2: Setting $$x=0$$ in the hyperbola equation yields $$-\\frac{y^2}{b^2} = 1$$, which has no real solutions for $$y$$.\n+ Therefore, the hyperbola never crosses the y-axis, and its \"branches\" open left and right along the x-axis. The foci must be on the x-axis to be \"inside\" the branches.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "What is the sum of the distances from any point $$P$$ on an ellipse to its two foci, $$S$$ and $$S'$$? Explain the derivation conceptually. (3 steps)", "answer": "- Step 1: By the focus-directrix property, $$PS = e \\cdot PM$$ and $$PS' = e \\cdot PM'$$, where $$M$$ and $$M'$$ are points on the directrices $$x = \\frac{a}{e}$$ and $$x = -\\frac{a}{e}$$.\n- Step 2: The distances to the directrices from a point $$P(x,y)$$ are $$PM = \\frac{a}{e} - x$$ and $$PM' = x + \\frac{a}{e}$$.\n- Step 3: Adding the distances to the foci: $$PS + PS' = e(PM + PM') = e\\left(\\left(\\frac{a}{e} - x\\right) + \\left(x + \\frac{a}{e}\\right)\\right)$$.\n+ The $$x$$ terms cancel out, leaving $$e\\left(\\frac{2a}{e}\\right) = 2a$$.\n+ This means the sum of distances to the foci is always the length of the major axis, $$2a$$.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "What is the general equation of the tangent to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at the point $$(a\\cos t, b\\sin t)$$?", "answer": "- Step 1: The equation is $$bx\\cos t + ay\\sin t = ab$$.\n+ Notice the pattern: replace $$x^2$$ with $$x(a\\cos t)$$ and $$y^2$$ with $$y(b\\sin t)$$, then divide by $$ab$$.\n+ This is derived by finding the gradient using parametric differentiation ($$\\frac{-b\\cos t}{a\\sin t}$$) and applying the point-slope formula, simplifying with $$\\cos^2 t + \\sin^2 t = 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "What is the general equation of the normal to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at the point $$(a\\cos t, b\\sin t)$$?", "answer": "- Step 1: The equation is $$ax\\sin t - by\\cos t = (a^2 - b^2)\\cos t\\sin t$$.\n+ The gradient of the tangent is $$-\\frac{b\\cos t}{a\\sin t}$$, so the gradient of the normal is $$\\frac{a\\sin t}{b\\cos t}$$.\n+ Applying point-slope and rearranging yields this formula. The right side involves $$a^2 - b^2$$ because we multiply through by $$a$$ and $$b$$ from the point coordinates.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "What is the condition for the line $$y = mx + c$$ to be a tangent to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$? Explain why this condition holds. (2 steps)", "answer": "- Step 1: The condition is $$b^2 + a^2m^2 = c^2$$.\n- Step 2: Substitute $$y = mx + c$$ into the ellipse equation to get a quadratic in $$x$$.\n+ For the line to be a tangent, it must intersect the ellipse at exactly one point, so the quadratic must have exactly one real root.\n+ This means the discriminant of the quadratic must be zero. Setting the discriminant to zero and simplifying yields the condition.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "What is the general equation of the tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at the point $$(a\\cosh t, b\\sinh t)$$?", "answer": "- Step 1: The equation is $$bx\\cosh t - ay\\sinh t = ab$$.\n+ Similar to the ellipse, this is derived by substituting the parametric gradient ($$\\frac{b\\cosh t}{a\\sinh t}$$) into the point-slope form.\n+ The simplification uses the identity $$\\cosh^2 t - \\sinh^2 t = 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "What is the general equation of the tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at the point $$(a\\sec\\theta, b\\tan\\theta)$$?", "answer": "- Step 1: The equation is $$bx\\sec\\theta - ay\\tan\\theta = ab$$.\n+ This is the trigonometric parametric equivalent of the hyperbolic form.\n+ It uses the identity $$\\sec^2\\theta - \\tan^2\\theta = 1$$ during simplification.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "What is the general equation of the normal to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at the point $$(a\\sec\\theta, b\\tan\\theta)$$?", "answer": "- Step 1: The equation is $$by + ax\\sin\\theta = (a^2 + b^2)\\tan\\theta$$.\n+ The gradient of the tangent at this point is $$\\frac{b}{a\\sin\\theta}$$, so the normal gradient is $$-\\frac{a\\sin\\theta}{b}$$.\n+ Using point-slope form and rearranging leads to this result. Note the $$a^2 + b^2$$ on the right side, which differs from the ellipse's $$a^2 - b^2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "What is the condition for the line $$y = mx + c$$ to be a tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$?", "answer": "- Step 1: The condition is $$b^2 + c^2 = a^2m^2$$.\n+ This is derived by substituting $$y = mx + c$$ into the hyperbola equation, setting the discriminant of the resulting quadratic to zero, and simplifying.\n+ Compare this to the ellipse condition $$b^2 + a^2m^2 = c^2$$; the terms $$a^2m^2$$ and $$c^2$$ have swapped sides.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "When solving a locus problem involving a conic section, what is the general strategy for eliminating the parameter? (2 steps)", "answer": "- Step 1: Express the coordinates of the moving point (say, $$X$$ and $$Y$$) in terms of the parameter (say, $$t$$ or $$\\theta$$).\n- Step 2: Use trigonometric or hyperbolic identities (like $$\\cos^2 t + \\sin^2 t = 1$$ or $$\\cosh^2 t - \\sinh^2 t = 1$$) to eliminate the parameter.\n+ For example, if $$X = a\\sec t$$ and $$Y = b\\tan t$$, you can find $$\\cos t = \\frac{a}{X}$$ and $$\\sin t = \\frac{Y}{b} \\cos t = \\frac{aY}{bX}$$, then use $$\\cos^2 t + \\sin^2 t = 1$$ to find an equation in $$X$$ and $$Y$$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "The tangent to an ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at point $$P$$ cuts the x-axis at $$A$$ and the y-axis at $$B$$. What is the locus of the midpoint of $$AB$$ as $$P$$ moves around the ellipse? (3 steps)", "answer": "- Step 1: The tangent equation is $$bx\\cos t + ay\\sin t = ab$$. Set $$y=0$$ to find $$A = (a\\sec t, 0)$$ and $$x=0$$ to find $$B = (0, b\\csc t)$$.\n- Step 2: The midpoint $$M$$ has coordinates $$X = \\frac{a\\sec t}{2}$$ and $$Y = \\frac{b\\csc t}{2}$$.\n+ Rearranging gives $$\\cos t = \\frac{a}{2X}$$ and $$\\sin t = \\frac{b}{2Y}$$.\n- Step 3: Use the identity $$\\cos^2 t + \\sin^2 t = 1$$ to eliminate $$t$$:\n$$\\left(\\frac{a}{2X}\\right)^2 + \\left(\\frac{b}{2Y}\\right)^2 = 1$$.\n+ This equation represents the locus of the midpoint, which is another curve resembling the original ellipse but in the variables $$X$$ and $$Y$$.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "For the parabola with equation $$y^2 = 4ax$$, what are the parametric equations, and what is the equation of the tangent at the point with parameter $$t$$?", "answer": "- Step 1: The parametric equations are $$x = at^2$$ and $$y = 2at$$.\n+ The equation of the tangent at parameter $$t$$ is $$ty = x + at^2$$.\n+ This is a standard result often used in locus problems involving parabolas.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "For the rectangular hyperbola with equation $$xy = c^2$$, what are the parametric equations, and what is the equation of the tangent at the point with parameter $$t$$?", "answer": "- Step 1: The parametric equations are $$x = ct$$ and $$y = \\frac{c}{t}$$.\n+ The equation of the tangent at parameter $$t$$ is $$x + t^2y = 2ct$$.\n+ Note that setting the parameter $$t$$ to different values gives tangents at different points on the curve, and their intersection can be found by solving the tangent equations simultaneously.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A curve has the equation $$\\frac{x^2}{25} - \\frac{y^2}{16} = 1$$. Without full calculation, determine whether the foci are closer to or further from the center than the vertices, and explain why. (2 steps)", "answer": "- Step 1: The vertices are at $$(\\pm a, 0) = (\\pm 5, 0)$$, so they are 5 units from the center.\n- Step 2: The foci are at $$(\\pm ae, 0)$$. Since the eccentricity of a hyperbola is always $$e > 1$$, the distance $$ae = 5e$$ must be greater than 5.\n+ Therefore, the foci are further from the center than the vertices.\n+ Misconception check: Don't confuse this with an ellipse, where $$0 < e < 1$$ means $$ae < a$$, so the foci are closer to the center than the vertices.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "An ellipse and a hyperbola both share the same values of $$a=5$$ and $$b=3$$. How do their eccentricities relate to each other? Specifically, what are the expressions for $$e^2$$ in each case? (2 steps)", "answer": "- Step 1: For the ellipse, $$b^2 = a^2(1 - e^2)$$, so $$9 = 25(1 - e^2)$$, giving $$e^2 = 1 - \\frac{9}{25} = \\frac{16}{25}$$.\n- Step 2: For the hyperbola, $$b^2 = a^2(e^2 - 1)$$, so $$9 = 25(e^2 - 1)$$, giving $$e^2 = 1 + \\frac{9}{25} = \\frac{34}{25}$$.\n+ Synthesis: The ellipse eccentricity formula uses $$1 - e^2$$ (subtracting), while the hyperbola uses $$e^2 - 1$$ (adding). This reflects that $$e < 1$$ for an ellipse and $$e > 1$$ for a hyperbola.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "A line passes through the point $$(a, b)$$ and has gradient $$m$$. Is it necessarily a tangent to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$? Why or why not? (2 steps)", "answer": "- Step 1: No, it is not necessarily a tangent. The point $$(a, b)$$ does not even lie on the ellipse.\n+ Substituting $$(a, b)$$ into the equation gives $$\\frac{a^2}{a^2} + \\frac{b^2}{b^2} = 1 + 1 = 2 \\neq 1$$.\n- Step 2: A tangent must touch the curve at exactly one point. Just because a line has a certain gradient and passes through a specific point in the plane doesn't mean it grazes the ellipse.\n+ The point $$(a, b)$$ is actually outside the ellipse, as the sum of the squared ratios is greater than 1.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "Consider the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$. If we take the limit as $$e \\to \\infty$$, what does the curve look like, and what do its directrices approach? (2 steps)", "answer": "- Step 1: As $$e \\to \\infty$$, the term $$e^2 - 1 \\approx e^2$$, so $$b^2 \\approx a^2e^2$$, meaning $$b \\approx ae$$.\n+ The asymptotes are $$y = \\pm \\frac{b}{a}x \\approx \\pm \\frac{ae}{a}x = \\pm ex$$.\n+ As $$e$$ gets huge, the asymptotes become nearly vertical, and the hyperbola opens extremely wide, resembling a pair of vertical lines.\n- Step 2: The directrices are $$x = \\pm \\frac{a}{e}$$.\n+ As $$e \\to \\infty$$, $$\\frac{a}{e} \\to 0$$, so the directrices approach the y-axis (the conjugate axis).", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "Simple Exercise: An ellipse has the equation $$\\frac{x^2}{16} + \\frac{y^2}{9} = 1$$. A point $$P$$ on the ellipse has an x-coordinate of 0. What is the y-coordinate of $$P$$, and what is the value of the parameter $$t$$ at this point? (2 steps)", "answer": "- Step 1: If $$x = 0$$, substitute into the equation: $$\\frac{0}{16} + \\frac{y^2}{9} = 1 \\implies y^2 = 9 \\implies y = \\pm 3$$.\n+ So the points are $$(0, 3)$$ and $$(0, -3)$$.\n- Step 2: Using parametric equations $$x = 4\\cos t$$ and $$y = 3\\sin t$$:\n+ If $$x = 0$$, then $$4\\cos t = 0 \\implies \\cos t = 0$$, so $$t = \\frac{\\pi}{2}$$ or $$\\frac{3\\pi}{2}$$.\n+ If $$t = \\frac{\\pi}{2}$$, $$y = 3\\sin(\\frac{\\pi}{2}) = 3$$.\n+ If $$t = \\frac{3\\pi}{2}$$, $$y = 3\\sin(\\frac{3\\pi}{2}) = -3$$.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "Simple Exercise: A hyperbola has the equation $$\\frac{x^2}{9} - \\frac{y^2}{4} = 1$$. Find the equation of the tangent at the point where the hyperbola crosses the positive x-axis. (2 steps)", "answer": "- Step 1: The hyperbola crosses the positive x-axis where $$y=0$$. Substituting $$y=0$$ gives $$\\frac{x^2}{9} = 1 \\implies x = 3$$.\n+ So the point of intersection is $$(3, 0)$$.\n- Step 2: Using the general tangent formula for a hyperbola, we need the parameter. Since $$x = a\\sec\\theta = 3\\sec\\theta$$ and $$y = b\\tan\\theta = 2\\tan\\theta$$, at $$(3,0)$$ we have $$\\sec\\theta = 1 \\implies \\theta = 0$$ and $$\\tan\\theta = 0$$.\n+ Substitute $$\\theta = 0$$ into the tangent equation $$bx\\sec\\theta - ay\\tan\\theta = ab$$:\n$$2x(1) - 3y(0) = 3(2) \\implies 2x = 6 \\implies x = 3$$.\n+ This makes sense: the tangent at the vertex is a vertical line.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "A common mistake is to confuse the tangent and normal equations for a hyperbola with those of an ellipse. What is a key structural difference in the formulas for the tangent to an ellipse vs. the tangent to a hyperbola (using sec/tan parameters)? (2 steps)", "answer": "- Step 1: The tangent to an ellipse is $$bx\\cos t + ay\\sin t = ab$$, where all terms on the left are added together.\n- Step 2: The tangent to a hyperbola is $$bx\\sec\\theta - ay\\tan\\theta = ab$$, where the $$y$$-term is subtracted.\n+ This difference mirrors the Cartesian equations: the ellipse has a plus sign $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$, while the hyperbola has a minus sign $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": true}], "count": 33}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why does the parametric equation of an ellipse use $ x = a \\cos t $ and $ y = b \\sin t $? (3 steps)", "answer": "- Step 1: Recall the Pythagorean identity $ \\cos^2 t + \\sin^2 t = 1 $.  \n- Step 2: Substitute $ x = a \\cos t $ and $ y = b \\sin t $ into the Cartesian equation:  \n  $$\n  \\frac{x^2}{a^2} + \\frac{y^2}{b^2} = \\cos^2 t + \\sin^2 t = 1\n  $$\n- Step 3: This ensures the parametric equations satisfy the ellipse equation by construction.\n\n[The parametric form directly incorporates the trigonometric identity to maintain the ellipse constraint.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How do you determine the orientation of an ellipse's major axis from its equation $ \\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1 $?", "answer": "Compare $ a $ and $ b $:  \n- If $ a > b $, the major axis is along the **x-axis** (horizontal).  \n- If $ b > a $, the major axis is along the **y-axis** (vertical).  \nExample: $ \\frac{x^2}{9} + \\frac{y^2}{16} = 1 $ has $ b = 4 > a = 3 $, so vertical major axis.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why does the parametric form $ x = \\pm a \\cosh t, y = b \\sinh t $ trace a hyperbola? (3 steps)", "answer": "- Step 1: Use the hyperbolic identity $ \\cosh^2 t - \\sinh^2 t = 1 $.  \n- Step 2: Substitute into the hyperbola equation:  \n  $$\n  \\frac{x^2}{a^2} - \\frac{y^2}{b^2} = \\cosh^2 t - \\sinh^2 t = 1\n  $$\n- Step 3: The $ \\pm $ in $ x $ accounts for both branches of the hyperbola.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why is the eccentricity $ e < 1 $ for ellipses and $ e > 1 $ for hyperbolas? (4 steps)", "answer": "- Step 1: For ellipses, $ b^2 = a^2(1 - e^2) $. Since $ b^2 > 0 $, $ 1 - e^2 > 0 \\Rightarrow e < 1 $.  \n- Step 2: For hyperbolas, $ b^2 = a^2(e^2 - 1) $. Since $ b^2 > 0 $, $ e^2 - 1 > 0 \\Rightarrow e > 1 $.  \n- Step 3: Eccentricity measures deviation from circularity:  \n  + $ e = 0 $: circle  \n  + $ 0 < e < 1 $: stretched circle (ellipse)  \n  + $ e > 1 $: open curve (hyperbola)  \n\n[This distinction ensures the focus-directrix ratio defines the correct conic section type.]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": true}, {"question": "How do you find the equati
