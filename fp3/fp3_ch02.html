ons of a hyperbola's asymptotes from its Cartesian equation? (2 steps)", "answer": "- Step 1: Start with $ \\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1 $.  \n- Step 2: As $ x, y \\to \\infty $, the 1 becomes negligible:  \n  $$\n  \\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 0 \\Rightarrow y = \\pm \\frac{b}{a}x\n  $$\nExample: $ \\frac{x^2}{4} - \\frac{y^2}{9} = 1 $ has asymptotes $ y = \\pm \\frac{3}{2}x $.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why is the product of gradients of a tangent and normal to an ellipse at a point equal to $-1$? (2 steps)", "answer": "- Step 1: The normal is perpendicular to the tangent by definition.  \n- Step 2: For two perpendicular lines, $ m_1 \\cdot m_2 = -1 $.  \nExample: If tangent slope is $ m = -\\frac{b \\cos t}{a \\sin t} $, normal slope is $ \\frac{a \\sin t}{b \\cos t} $, so product = $-1$.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How does rotating an ellipse by $45^\\circ$ affect its equation? (3 steps)", "answer": "- Step 1: Apply rotation transformation:  \n  $$\n  x = \\frac{X - Y}{\\sqrt{2}}, \\quad y = \\frac{X + Y}{\\sqrt{2}}\n  $$\n- Step 2: Substitute into $ \\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1 $:  \n  $$\n  \\frac{(X - Y)^2}{2a^2} + \\frac{(X + Y)^2}{2b^2} = 1\n  $$\n- Step 3: The rotated ellipse retains a quadratic form but mixes $ X $ and $ Y $ terms.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why does the sum of distances from two foci define an ellipse? (3 steps)", "answer": "- Step 1: By definition, an ellipse is the locus of points where $ PS + PS' = 2a $ (constant).  \n- Step 2: For foci at $ (\\pm ae, 0) $, this geometric constraint leads to the standard ellipse equation.  \n- Step 3: This generalizes the circle's constant-radius definition to two foci.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How do you derive the condition $ c^2 = a^2m^2 + b^2 $ for a line $ y = mx + c $ to be tangent to an ellipse? (4 steps)", "answer": "- Step 1: Substitute $ y = mx + c $ into $ \\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1 $.  \n- Step 2: Form quadratic in $ x $:  \n  $$\n  (b^2 + a^2m^2)x^2 + 2a^2mcx + a^2(c^2 - b^2) = 0\n  $$\n- Step 3: For tangency, discriminant $ D = 0 $:  \n  $$\n  (2a^2mc)^2 - 4(b^2 + a^2m^2)(a^2(c^2 - b^2)) = 0\n  $$\n- Step 4: Simplify to $ c^2 = a^2m^2 + b^2 $.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why does the normal to a hyperbola at $ (a \\sec \\theta, b \\tan \\theta) $ have equation $ bx \\sec \\theta - ay \\tan \\theta = ab $? (3 steps)", "answer": "- Step 1: Differentiate parametric equations to find gradient $ \\frac{dy}{dx} = \\frac{b \\sec^2 \\theta}{a \\sec \\theta \\tan \\theta} = \\frac{b}{a \\sin \\theta} $.  \n- Step 2: Use point-slope form with negative reciprocal slope for normal.  \n- Step 3: Substitute $ \\sec \\theta = \\frac{1}{\\cos \\theta} $, $ \\tan \\theta = \\frac{\\sin \\theta}{\\cos \\theta} $, and simplify algebraically.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "How does the eccentricity relate to the foci and directrices of a hyperbola? (2 steps)", "answer": "- Step 1: For a hyperbola $ \\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1 $, $ e = \\sqrt{1 + \\frac{b^2}{a^2}} $.  \n- Step 2: Foci at $ (\\pm ae, 0) $, directrices at $ x = \\pm \\frac{a}{e} $.  \nExample: If $ a = 3, b = 4 $, $ e = \\sqrt{1 + 16/9} = \\frac{5}{3} $, foci at $ (\\pm 5, 0) $.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "Why does the locus of midpoints of AB (tangent intercepts) for the ellipse $ \\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1 $ form another ellipse? (3 steps)", "answer": "- Step 1: Tangent equation at $ (a \\cos t, b \\sin t) $: $ \\frac{x \\cos t}{a} + \\frac{y \\sin t}{b} = 1 $.  \n- Step 2: Intercepts at $ A = \\left(\\frac{a}{\\cos t}, 0\\right) $, $ B = \\left(0, \\frac{b}{\\sin t}\\right) $.  \n- Step 3: Midpoint $ (X, Y) = \\left(\\frac{a}{2 \\cos t}, \\frac{b}{2 \\sin t}\\right) \\Rightarrow \\left(\\frac{a}{2X}\\right)^2 + \\left(\\frac{b}{2Y}\\right)^2 = 1 $.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": true}, {"question": "How do you derive the equation of a rectangular hyperbola rotated by $45^\\circ$? (3 steps)", "answer": "- Step 1: Start with $ xy = c^2 $.  \n- Step 2: Apply rotation transformation $ x = \\frac{X - Y}{\\sqrt{2}}, y = \\frac{X + Y}{\\sqrt{2}} $.  \n- Step 3: Substitute and simplify to $ \\frac{(X - Y)(X + Y)}{2} = c^2 \\Rightarrow \\frac{X^2 - Y^2}{2} = c^2 \\Rightarrow X^2 - Y^2 = 2c^2 $.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Why is the condition for a line to be tangent to a hyperbola $ c^2 = a^2m^2 - b^2 $? (2 steps)", "answer": "- Step 1: Substitute $ y = mx + c $ into $ \\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1 $.  \n- Step 2: For tangency, discriminant of the resulting quadratic must be zero, leading to $ c^2 = a^2m^2 - b^2 $.  \nMisconception probe: Unlike ellipses, hyperbola tangents require the discriminant to be negative for non-intersecting lines, but tangents require $ D = 0 $.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "How does the parametric form $ x = a \\sec \\theta, y = b \\tan \\theta $ differ from $ x = \\pm a \\cosh t, y = b \\sinh t $? (2 steps)", "answer": "- Step 1: $ \\sec \\theta, \\tan \\theta $ are periodic and only cover half the hyperbola (requires $ \\theta \\ne \\pm \\pi/2 $).  \n- Step 2: $ \\cosh t, \\sinh t $ cover the entire hyperbola branch (non-periodic).  \nExample: $ x = a \\sec \\theta $ cannot represent points with $ |x| < a $.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "Why is the latus rectum length $ 2b^2/a $ for an ellipse with $ a > b $? (3 steps)", "answer": "- Step 1: Latus rectum is the chord through a focus perpendicular to the major axis.  \n- Step 2: Substitute $ x = ae $ into $ \\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1 $:  \n  $$\n  \\frac{a^2e^2}{a^2} + \\frac{y^2}{b^2} = 1 \\Rightarrow y^2 = b^2(1 - e^2)\n  $$\n- Step 3: Length is $ 2y = 2b\\sqrt{1 - e^2} $. Use $ b^2 = a^2(1 - e^2) \\Rightarrow 2b^2/a $.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "How do you derive the parametric equations of a hyperbola's tangent? (3 steps)", "answer": "- Step 1: Use parametric derivatives $ \\frac{dx}{dt} = a \\sec \\theta \\tan \\theta $, $ \\frac{dy}{dt} = b \\sec^2 \\theta $.  \n- Step 2: Compute $ \\frac{dy}{dx} = \\frac{b}{a} \\csc \\theta $.  \n- Step 3: Apply point-slope form to get $ bx \\sec \\theta - ay \\tan \\theta = ab $.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "Why do the foci of a hyperbola lie on the transverse axis? (2 steps)", "answer": "- Step 1: The transverse axis connects the two vertices.  \n- Step 2: Foci must lie along this axis to maintain symmetry and satisfy the hyperbola's definition: difference of distances to foci is constant.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "How does the eccentricity of a hyperbola compare to that of its conjugate hyperbola? (2 steps)", "answer": "- Step 1: For $ \\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1 $, $ e = \\sqrt{1 + b^2/a^2} $.  \n- Step 2: Conjugate hyperbola $ \\frac{y^2}{b^2} - \\frac{x^2}{a^2} = 1 $ has $ e' = \\sqrt{1 + a^2/b^2} $.  \nThey are distinct unless $ a = b $.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "Why does the normal to an ellipse at a point intersect the major/minor axis? (2 steps)", "answer": "- Step 1: The normal line's equation $ ax \\sin t - by \\cos t = (a^2 - b^2)\\cos t \\sin t $ has intercepts when $ y = 0 $ or $ x = 0 $.  \n- Step 2: These intercepts define the points where the normal crosses the axes, crucial for locus problems.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "How do the parametric equations of an ellipse $ x = a \\cos t, y = b \\sin t $ relate to its Cartesian equation $ \\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1 $? (3 steps)", "answer": "- Step 1: Substitute $ x = a \\cos t $ into $ \\frac{x^2}{a^2} $:  \n  $$\n  \\frac{(a \\cos t)^2}{a^2} = \\cos^2 t\n  $$\n- Step 2: Substitute $ y = b \\sin t $ into $ \\frac{y^2}{b^2} $:  \n  $$\n  \\frac{(b \\sin t)^2}{b^2} = \\sin^2 t\n  $$\n- Step 3: Add the two results:  \n  $$\n  \\cos^2 t + \\sin^2 t = 1 \\quad \\Rightarrow \\quad \\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1\n  $$\n  This shows the parametric equations satisfy the Cartesian equation by leveraging the Pythagorean identity.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why does the parametric form $ x = a \\sec \\theta, y = b \\tan \\theta $ work for a hyperbola $ \\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1 $? (3 steps)", "answer": "- Step 1: Substitute $ x = a \\sec \\theta $ into $ \\frac{x^2}{a^2} $:  \n  $$\n  \\frac{(a \\sec \\theta)^2}{a^2} = \\sec^2 \\theta\n  $$\n- Step 2: Substitute $ y = b \\tan \\theta $ into $ \\frac{y^2}{b^2} $:  \n  $$\n  \\frac{(b \\tan \\theta)^2}{b^2} = \\tan^2 \\theta\n  $$\n- Step 3: Use the identity $ \\sec^2 \\theta - \\tan^2 \\theta = 1 $:  \n  $$\n  \\frac{x^2}{a^2} - \\frac{y^2}{b^2} = \\sec^2 \\theta - \\tan^2 \\theta = 1\n  $$\n  This demonstrates how the parametric form satisfies the hyperbola equation via trigonometric identities.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Compare the parametric equations of a hyperbola using hyperbolic functions $ x = a \\cosh t, y = b \\sinh t $ vs. trigonometric functions $ x = a \\sec \\theta, y = b \\tan \\theta $. Why are both valid? (3 steps)", "answer": "- Step 1: Hyperbolic parametrization uses $ \\cosh^2 t - \\sinh^2 t = 1 $:  \n  $$\n  \\frac{(a \\cosh t)^2}{a^2} - \\frac{(b \\sinh t)^2}{b^2} = \\cosh^2 t - \\sinh^2 t = 1\n  $$\n- Step 2: Trigonometric parametrization uses $ \\sec^2 \\theta - \\tan^2 \\theta = 1 $:  \n  $$\n  \\frac{(a \\sec \\theta)^2}{a^2} - \\frac{(b \\tan \\theta)^2}{b^2} = \\sec^2 \\theta - \\tan^2 \\theta = 1\n  $$\n- Step 3: Both forms exploit identities that match the hyperbola equation structure $ \\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1 $, but hyperbolic functions cover the entire hyperbola, while trigonometric functions only cover one branch due to domain restrictions.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why is the eccentricity $ e $ of an ellipse defined by $ b^2 = a^2(1 - e^2) $, and what does it imply about the shape when $ e \\to 0 $? (2 steps)", "answer": "- Step 1: Solve $ b^2 = a^2(1 - e^2) $ for $ e $:  \n  $$\n  e = \\sqrt{1 - \\frac{b^2}{a^2}}\n  $$\n  Since $ a > b $, $ 0 < e < 1 $.  \n- Step 2: If $ e \\to 0 $, then $ b^2 = a^2(1 - 0) \\Rightarrow b = a $, making the ellipse a circle. This shows eccentricity quantifies deviation from a circular shape.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "For a hyperbola $ \\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1 $, why are the asymptotes $ y = \\pm \\frac{b}{a}x $? (2 steps)", "answer": "- Step 1: At large $ x $, the $ 1 $ in the equation becomes negligible:  \n  $$\n  \\frac{x^2}{a^2} - \\frac{y^2}{b^2} \\approx 0 \\Rightarrow \\frac{y^2}{b^2} \\approx \\frac{x^2}{a^2}\n  $$\n- Step 2: Solving gives $ y \\approx \\pm \\frac{b}{a}x $, which are the asymptotes. These lines represent the hyperbola's behavior at infinity.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "How does the eccentricity $ e $ of a hyperbola ($ e > 1 $) relate to its foci and directrices? (2 steps)", "answer": "- Step 1: For a hyperbola, $ b^2 = a^2(e^2 - 1) \\Rightarrow e = \\sqrt{1 + \\frac{b^2}{a^2}} $. Since $ b^2 > 0 $, $ e > 1 $.  \n- Step 2: Foci are at $ (\\pm ae, 0) $, and directrices are at $ x = \\pm \\frac{a}{e} $. As $ e $ increases, foci move farther apart, and directrices move closer to the center.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Derive the condition $ c^2 = a^2m^2 + b^2 $ for a line $ y = mx + c $ to be tangent to the ellipse $ \\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1 $. (4 steps)", "answer": "- Step 1: Substitute $ y = mx + c $ into the ellipse equation:  \n  $$\n  \\frac{x^2}{a^2} + \\frac{(mx + c)^2}{b^2} = 1\n  $$\n- Step 2: Multiply through by $ a^2b^2 $ to eliminate denominators:  \n  $$\n  b^2x^2 + a^2(mx + c)^2 = a^2b^2\n  $$\n- Step 3: Expand and collect terms to form a quadratic in $ x $:  \n  $$\n  (b^2 + a^2m^2)x^2 + 2a^2mc x + a^2(c^2 - b^2) = 0\n  $$\n- Step 4: For tangency, discriminant $ D = 0 $:  \n  $$\n  (2a^2mc)^2 - 4(b^2 + a^2m^2)(a^2(c^2 - b^2)) = 0\n  \\Rightarrow c^2 = a^2m^2 + b^2\n  $$\n  This ensures only one intersection point.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why is the sum of distances from any point on an ellipse to its two foci constant? (3 steps)", "answer": "- Step 1: From the ellipse definition using focus-directrix properties:  \n  $$\n  \\frac{\\text{Distance to focus}}{\\text{Distance to directrix}} = e < 1\n  $$\n- Step 2: For two foci $ S $ and $ S' $, and a point $ P $, derive $ PS + PS' = 2a $:  \n  $$\n  PS = e \\cdot PM, \\quad PS' = e \\cdot PM' \\Rightarrow PS + PS' = e(PM + PM')\n  $$\n- Step 3: The total distance $ PM + PM' $ between directrices is $ \\frac{2a}{e} $, so $ PS + PS' = e \\cdot \\frac{2a}{e} = 2a $. This shows the constant sum relates to the major axis length.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How does rotating an ellipse $ \\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1 $ by 45° affect its equation? (3 steps)", "answer": "- Step 1: Apply rotation transformation $ x = \\frac{X - Y}{\\sqrt{2}}, y = \\frac{X + Y}{\\sqrt{2}} $ (45° rotation).  \n- Step 2: Substitute into the ellipse equation:  \n  $$\n  \\frac{\\left(\\frac{X - Y}{\\sqrt{2}}\\right)^2}{a^2} + \\frac{\\left(\\frac{X + Y}{\\sqrt{2}}\\right)^2}{b^2} = 1\n  $$\n- Step 3: Simplify:  \n  $$\n  \\frac{(X - Y)^2}{2a^2} + \\frac{(X + Y)^2}{2b^2} = 1 \\Rightarrow \\frac{(x + y)^2}{2a^2} + \\frac{(x - y)^2}{2b^2} = 1\n  $$\n  The rotated ellipse retains a quadratic form but mixes $ x $ and $ y $ terms.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "What is the geometric significance of the latus rectum of an ellipse, and how long is it? (2 steps)", "answer": "- Step 1: The latus rectum is the chord through a focus perpendicular to the major axis. It measures the width of the ellipse at the focus.  \n- Step 2: For $ \\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1 $, substitute $ x = \\pm ae $ into the equation:  \n  $$\n  \\frac{(ae)^2}{a^2} + \\frac{y^2}{b^2} = 1 \\Rightarrow y^2 = b^2(1 - e^2) = \\frac{b^4}{a^2}\n  \\Rightarrow y = \\pm \\frac{b^2}{a}\n  $$\n  Length = $ 2 \\cdot \\frac{b^2}{a} = \\frac{2b^2}{a} $.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Write the parametric equations for the standard ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ and explain why these equations satisfy the Cartesian form. (2 steps)", "answer": "- Step 1: The parametric equations are $$x = a \\cos t, \\quad y = b \\sin t, \\quad 0 \\leq t < 2\\pi$$\n- Step 2: Substituting into the Cartesian form: $$\\frac{(a \\cos t)^2}{a^2} + \\frac{(b \\sin t)^2}{b^2} = \\cos^2 t + \\sin^2 t = 1$$ This works because of the Pythagorean identity $$\\cos^2 t + \\sin^2 t \\equiv 1$$", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "How can you identify whether a given Cartesian equation represents an ellipse or a hyperbola just by looking at the equation? (1 step)", "answer": "- Look at the signs of the squared terms. If both squared terms have the same sign (both positive in $$\\frac{x^2}{a^2} \\pm \\frac{y^2}{b^2} = 1$$), it's an ellipse. If they have opposite signs (one positive, one negative), it's a hyperbola. This is the key distinguishing feature.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What is the standard Cartesian equation of a hyperbola, and what are its key features? (3 steps)", "answer": "- Step 1: The standard Cartesian equation is $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$\n- Step 2: When y = 0, x = ±a, so the hyperbola crosses the x-axis at (±a, 0). There are no real points where x = 0 (setting x = 0 gives -y²/b² = 1, which has no real solutions).\n- Step 3: As x and y tend to infinity, $$\\frac{x^2}{a^2} \\approx \\frac{y^2}{b^2}$$, so the asymptotes are $$y = \\pm \\frac{b}{a}x$$", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Write down two different parametric representations for the standard hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ and explain the key identity that makes each work. (2 steps)", "answer": "- Step 1: Using hyperbolic functions: $$x = \\pm a \\cosh t, \\quad y = b \\sinh t, \\quad t \\in \\mathbb{R}$$\n  Using trigonometric functions: $$x = a \\sec \\theta, \\quad y = b \\tan \\theta, \\quad -\\pi \\leq \\theta < \\pi, \\quad \\theta \\neq \\pm\\frac{\\pi}{2}$$\n- Step 2: The first uses $$\\cosh^2 t - \\sinh^2 t \\equiv 1$$, giving $$\\frac{a^2 \\cosh^2 t}{a^2} - \\frac{b^2 \\sinh^2 t}{b^2} = 1$$. The second uses $$\\sec^2 \\theta - \\tan^2 \\theta \\equiv 1$$.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "What is a rectangular hyperbola, and what is its special property? (1 step)", "answer": "A rectangular hyperbola occurs when a = b in $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, giving the equation $$x^2 - y^2 = a^2$$. Its asymptotes are $$y = \\pm x$$, which are perpendicular to each other (they intersect at 90°). This is why it's called \"rectangular\" — the asymptotes form a rectangle (right angle).", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Define eccentricity for a conic section in terms of focus and directrix. What are the eccentricity ranges for an ellipse, parabola, and hyperbola? (2 steps)", "answer": "- Step 1: For any point P on a conic section, the ratio $$\\frac{PS}{PM} = e$$ is constant, where S is the focus (a fixed point) and M is the perpendicular distance to the directrix (a fixed line). This ratio e is the eccentricity.\n- Step 2: For an ellipse: $$0 < e < 1$$. For a parabola: $$e = 1$$. For a hyperbola: $$e > 1$$. The special case e = 0 gives a circle, and e → ∞ gives a straight line.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "For an ellipse with equation $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ where a > b, state the formulas for: (i) eccentricity e, (ii) coordinates of foci, (iii) equations of directrices. (3 steps)", "answer": "- Step 1: Eccentricity: Given by $$b^2 = a^2(1 - e^2)$$, so $$e = \\sqrt{1 - \\frac{b^2}{a^2}}$$\n- Step 2: Foci are at $$(ae, 0)$$ and $$(-ae, 0)$$ — they lie on the major axis (the x-axis since a > b)\n- Step 3: Directrices are vertical lines $$x = \\frac{a}{e}$$ and $$x = -\\frac{a}{e}$$", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "If an ellipse has its major axis along the y-axis (i.e., b > a), how do the positions of the foci and directrices change? (2 steps)", "answer": "- Step 1: When b > a (major axis on y-axis), the foci are at $$(0, \\pm be)$$ instead of $$(\\pm ae, 0)$$\n- Step 2: The directrices become horizontal lines $$y = \\pm \\frac{b}{e}$$ instead of $$x = \\pm \\frac{a}{e}$$. The eccentricity formula also changes to $$a^2 = b^2(1 - e^2)$$", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "For a hyperbola with equation $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, state the formulas for: (i) eccentricity e, (ii) coordinates of foci, (iii) equations of directrices. (3 steps)", "answer": "- Step 1: Eccentricity: Given by $$b^2 = a^2(e^2 - 1)$$, so $$e = \\sqrt{1 + \\frac{b^2}{a^2}}$$ (e > 1 for a hyperbola)\n- Step 2: Foci are at $$(ae, 0)$$ and $$(-ae, 0)$$ — still on the x-axis (the transverse axis)\n- Step 3: Directrices are vertical lines $$x = \\frac{a}{e}$$ and $$x = -\\frac{a}{e}$$", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A student says that for a hyperbola with equation $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, if b > a then the foci move to the y-axis, just like with ellipses. Why is this wrong? (1 step)", "answer": "This is incorrect. For a hyperbola, setting x = 0 in $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ gives $$-\\frac{y^2}{b^2} = 1$$, which has no real solutions. The hyperbola never crosses the y-axis, so the foci always lie on the x-axis (the transverse axis). This is different from ellipses where the major axis can be either x-axis or y-axis depending on which parameter is larger.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Prove that for any point P on an ellipse with foci S and S', we have PS + PS' = 2a. (3 steps)", "answer": "- Step 1: Let the directrix be $$x = \\frac{a}{e}$$. For point P with coordinates (x, y), the distances are $$PS = e \\cdot PM$$ and $$PS' = e \\cdot PM'$$, where M and M' are projections onto the two directrices.\n- Step 2: Since M is at $$(\\frac{a}{e} - x, 0)$$ and M' is at $$(x + \\frac{a}{e}, 0)$$ (both measured along the x-axis), we have $$PM = \\frac{a}{e} - x$$ and $$PM' = x + \\frac{a}{e}$$\n- Step 3: Therefore $$PS + PS' = e(\\frac{a}{e} - x) + e(x + \\frac{a}{e}) = a - ex + ex + a = 2a$$. This is constant regardless of where P is on the ellipse.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Find the eccentricity and foci of the ellipse $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$. (2 steps)", "answer": "- Step 1: Here a = 3 and b = 2. Since a > b, use $$b^2 = a^2(1 - e^2)$$. So $$4 = 9(1 - e^2)$$, giving $$e^2 = \\frac{5}{9}$$, thus $$e = \\frac{\\sqrt{5}}{3}$$\n- Step 2: Foci are at $$(\\pm ae, 0) = (\\pm 3 \\cdot \\frac{\\sqrt{5}}{3}, 0) = (\\pm \\sqrt{5}, 0)$$. The directrices are at $$x = \\pm \\frac{a}{e} = \\pm \\frac{3}{\\frac{\\sqrt{5}}{3}} = \\pm \\frac{9}{\\sqrt{5}}$$", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Find the eccentricity and directrices of the hyperbola $$\\frac{x^2}{16} - \\frac{y^2}{9} = 1$$. (2 steps)", "answer": "- Step 1: Here a = 4 and b = 3. Use $$b^2 = a^2(e^2 - 1)$$, so $$9 = 16(e^2 - 1)$$, giving $$e^2 = \\frac{25}{16}$$, thus $$e = \\frac{5}{4}$$\n- Step 2: Foci are at $$(\\pm ae, 0) = (\\pm 4 \\cdot \\frac{5}{4}, 0) = (\\pm 5, 0)$$. Directrices are at $$x = \\pm \\frac{a}{e} = \\pm \\frac{4}{\\frac{5}{4}} = \\pm \\frac{16}{5}$$. Asymptotes are $$y = \\pm \\frac{b}{a}x = \\pm \\frac{3}{4}x$$", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "How do you find the gradient of a tangent to an ellipse at a point given in parametric form? Derive the gradient formula. (2 steps)", "answer": "- Step 1: For ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with parametric point $$P(a \\cos t, b \\sin t)$$, use the chain rule: $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt} = \\frac{b \\cos t}{-a \\sin t} = -\\frac{b}{a} \\cot t$$\n- Step 2: Alternatively, use implicit differentiation on the Cartesian equation: $$\\frac{2x}{a^2} + \\frac{2y}{b^2}\\frac{dy}{dx} = 0$$, giving $$\\frac{dy}{dx} = -\\frac{b^2 x}{a^2 y}$$. At the parametric point, substitute x = a cos t, y = b sin t to get the same result.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Write down the general equation of the tangent to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at the point $$P(a \\cos t, b \\sin t)$$. (2 steps)", "answer": "- Step 1: Using point-slope form with gradient $$-\\frac{b}{a}\\cot t$$:\n$$y - b \\sin t = -\\frac{b \\cos t}{a \\sin t}(x - a \\cos t)$$\n- Step 2: Simplifying, we get the standard form: $$\\boxed{bx \\cos t + ay \\sin t = ab}$$\nThis is the equation of the tangent at $$P(a \\cos t, b \\sin t)$$.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Write down the general equation of the normal to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at the point $$P(a \\cos t, b \\sin t)$$. (2 steps)", "answer": "- Step 1: The gradient of the tangent is $$-\\frac{b}{a}\\cot t$$, so the gradient of the normal (perpendicular) is $$\\frac{a}{b}\\tan t$$\n- Step 2: Using point-slope form and simplifying gives: $$\\boxed{ax \\sin t - by \\cos t = (a^2 - b^2)\\cos t \\sin t}$$", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "What is the condition for the line y = mx + c to be a tangent to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$? (2 steps)", "answer": "- Step 1: Substitute y = mx + c into the ellipse equation, giving a quadratic in x. For tangency, the discriminant must equal zero.\n- Step 2: After simplification, the condition is: $$\\boxed{b^2 + a^2 m^2 = c^2}$$ This is a useful result for checking if a given line is tangent to an ellipse without finding the point of contact.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "How do you find the gradient of a tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at a point? (2 steps)", "answer": "- Step 1: For the parametric form using hyperbolic functions at $$P(a \\cosh t, b \\sinh t)$$:\n$$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt} = \\frac{b \\cosh t}{a \\sinh t} = \\frac{b}{a} \\coth t$$\n- Step 2: Using the alternative parametric form $$P(a \\sec \\theta, b \\tan \\theta)$$:\n$$\\frac{dy}{dx} = \\frac{b \\sec^2 \\theta}{a \\sec \\theta \\tan \\theta} = \\frac{b}{a \\sin \\theta}$$", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Write down the general equation of the tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at the point $$P(a \\cosh t, b \\sinh t)$$. (2 steps)", "answer": "- Step 1: Using the gradient $$\\frac{b}{a} \\coth t$$ and point-slope form:\n$$y - b \\sinh t = \\frac{b \\cosh t}{a \\sinh t}(x - a \\cosh t)$$\n- Step 2: Simplifying and using $$\\cosh^2 t - \\sinh^2 t = 1$$ gives: $$\\boxed{bx \\cosh t - ay \\sinh t = ab}$$\n  This can also be written as $$ay \\sinh t + ab = bx \\cosh t$$", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Write down the general equation of the tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at the point $$P(a \\sec \\theta, b \\tan \\theta)$$. (1 step)", "answer": "Using a similar derivation as for the cosh/sinh form, the tangent equation is: $$\\boxed{bx \\sec \\theta - ay \\tan \\theta = ab}$$\nThis is the alternative form of the tangent equation using trigonometric parameters.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Write down the general equation of the normal to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at the point $$P(a \\sec \\theta, b \\tan \\theta)$$. (2 steps)", "answer": "- Step 1: The gradient of the tangent is $$\\frac{b}{a \\sin \\theta}$$, so the gradient of the normal is $$-\\frac{a \\sin \\theta}{b}$$\n- Step 2: Using point-slope form and simplifying: $$\\boxed{by + ax \\sin \\theta = (a^2 + b^2)\\tan \\theta}$$\n  Similarly, at $$P(a \\cosh t, b \\sinh t)$$, the normal is: $$ax \\sinh t + by \\cosh t = (a^2 + b^2)\\sinh t \\cosh t$$", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "What is the condition for the line y = mx + c to be a tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$? (2 steps)", "answer": "- Step 1: Substitute y = mx + c into the hyperbola equation, giving a quadratic in x. For tangency, the discriminant must equal zero.\n- Step 2: After simplification, the condition is: $$\\boxed{b^2 + c^2 = a^2 m^2}$$ This is the hyperbola equivalent of the ellipse tangency condition.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A student tries to find the tangent to the ellipse at the point (3, 2) by substituting into the formula $$bx \\cos t + ay \\sin t = ab$$. Why might this approach fail? (1 step)", "answer": "This approach will fail because the point (3, 2) may not lie on the ellipse, or if it does, we need to find the correct parameter t such that $$a \\cos t = x$$ and $$b \\sin t = y$$. You must first verify the point lies on the curve and find the corresponding parameter value before using the tangent formula.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "For the ellipse with equation $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ (with a > b), what is the length of the latus rectum (the chord through a focus perpendicular to the major axis)? (2 steps)", "answer": "- Step 1: A focus is at (ae, 0). The latus rectum passes through this focus and is perpendicular to the major axis (the x-axis), so it's a vertical line x = ae.\n- Step 2: Substitute x = ae into the ellipse equation: $$\\frac{a^2 e^2}{a^2} + \\frac{y^2}{b^2} = 1$$ → $$e^2 + \\frac{y^2}{b^2} = 1$$ → $$\\frac{y^2}{b^2} = 1 - e^2 = \\frac{b^2}{a^2}$$ → $$y = \\pm \\frac{b^2}{a}$$. So the length is $$\\frac{2b^2}{a}$$", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "The ellipse with equation $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$ has a focus at (3e, 0) and a directrix at x = 12. Find the eccentricity e and verify this matches the ellipse properties. (3 steps)", "answer": "- Step 1: For an ellipse with focus at (ae, 0), we have ae = 3. So 3e = 3, giving e = 1. But wait — for an ellipse, e < 1. Let me reconsider.\n- Step 2: If one focus is at (3, 0) and one directrix is at x = 12, then ae = 3 and a/e = 12. Dividing: $$a^2 = 36$$, so a = 6. Then e = 3/6 = 1/2.\n- Step 3: Check: b² = a²(1 - e²) = 36(1 - 1/4) = 36 × 3/4 = 27, so b = √27 ≈ 5.2. But the given equation has b² = 4, which doesn't match! Actually, the focus is at (ae, 0) = (3e, 0), so if focus is (3, 0), then 3e = 3 and e = 1 — but that's impossible for an ellipse. The focus must be at (3, 0) itself, so ae = 3. With directrix x = a/e = 12, we get a/e = 12. Solving: a² = 36, a = 6, e = 3/6 = 1/2. Then b² = a²(1 - e²) = 36(1 - 1/4) = 27, giving b = √27. This doesn't match the given equation b² = 4, so the focus cannot be at (3, 0). Let me check the given information: if focus is (3, 0) and directrix is x = 12, then ae = 3 and a/e = 12, giving a² = 36, a = 6, e = 1/2, b² = 27. The given equation b² = 4 is inconsistent. Therefore the focus must be (c, 0) where c = ae. If c = 3, a/e = 12 gives a² = 36, a = 6, e = 1/2, but b² doesn't match. Actually wait — I need to use the correct logic. If focus is at (3, 0), then ae = 3. If directrix is x = 12, then a/e = 12. From these: a² = 36, a = 6, e = 1/2. Then b² = a²(1 - e²) = 36(1 - 1/4) = 27. But the ellipse has b² = 4, so this is inconsistent. The problem must mean that one focus is at (3, 0) and one directrix is x = 12, but these don't correspond to the same focus-directrix pair. Actually, for an ellipse, the focus and corresponding directrix are on the same side. If focus is (3, 0) (positive x), the directrix should be x = a/e > a > 0. If this equals 12, we get inconsistent b. So the focus must actually be at (c, 0) where c = ae, and the problem is checking whether you understand which focus corresponds to which directrix.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "For the prior knowledge question: Find the gradient of the curve C with equation $$x^2 - 9y^2 = 20$$ at the point $$(6, \\frac{4}{3})$$. (2 steps)", "answer": "- Step 1: Differentiate implicitly: $$2x - 18y \\frac{dy}{dx} = 0$$, so $$\\frac{dy}{dx} = \\frac{x}{9y}$$\n- Step 2: At the point $$(6, \\frac{4}{3})$$: $$\\frac{dy}{dx} = \\frac{6}{9 \\times \\frac{4}{3}} = \\frac{6}{12} = \\frac{1}{2}$$", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "For the prior knowledge question: Find the x-coordinates of the intersection points of the circle $$x^2 + y^2 = a^2$$ and the line y = kx. (2 steps)", "answer": "- Step 1: Substitute y = kx into the circle equation: $$x^2 + k^2 x^2 = a^2$$, so $$x^2(1 + k^2) = a^2$$\n- Step 2: Therefore $$x = \\pm \\frac{a}{\\sqrt{1 + k^2}}$$. These are the x-coordinates of the two intersection points.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "For the prior knowledge question: A curve has parametric equations $$x = at^2, y = 2at$$ (a > 0). Find its Cartesian equation. (1 step)", "answer": "From x = at², we have t² = x/a. Substitute into y = 2at: $$y = 2a\\sqrt{x/a} = 2\\sqrt{ax}$$. Squaring: $$y^2 = 4ax$$, which is the equation of a parabola with focus at (a, 0) and directrix x = -a.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Describe the locus of a point R defined as follows: R has the same y-coordinate as point P on the circle $$x^2 + y^2 = a^2$$ and the same x-coordinate as point Q on the circle $$x^2 + y^2 = b^2$$, where both P and Q lie on the same ray from the origin at angle θ. (3 steps)", "answer": "- Step 1: For point P on the smaller circle: P = (a cos θ, a sin θ). For point Q on the larger circle: Q = (b cos θ, b sin θ).\n- Step 2: Point R has x-coordinate from Q and y-coordinate from P: R = (b cos θ, a sin θ)\n- Step 3: The locus satisfies $$\\frac{x^2}{b^2} + \\frac{y^2}{a^2} = \\cos^2 θ + \\sin^2 θ = 1$$, so it's an ellipse $$\\frac{x^2}{b^2} + \\frac{y^2}{a^2} = 1$$ with semi-axes b and a.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "The rectangular hyperbola xy = c² is rotated 45° anticlockwise about the origin. Show that the resulting curve satisfies the equation of the form $$y^2 - x^2 = a^2$$ and find the relationship between a and c. (3 steps)", "answer": "- Step 1: For a 45° rotation, the transformation is: $$X = \\frac{x+y}{\\sqrt{2}}, \\quad Y = \\frac{y-x}{\\sqrt{2}}$$ where (X, Y) are coordinates before rotation and (x, y) are after.\n- Step 2: In original coordinates: XY = c². Substituting: $$\\frac{x+y}{\\sqrt{2}} \\cdot \\frac{y-x}{\\sqrt{2}} = c^2$$ → $$\\frac{y^2 - x^2}{2} = c^2$$\n- Step 3: So $$y^2 - x^2 = 2c^2$$, which is of the form $$y^2 - x^2 = a^2$$ with $$a^2 = 2c^2$$, so $$a = \\sqrt{2}c$$", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A line is drawn tangent to an ellipse at a point P. This tangent intersects the x-axis at A and the y-axis at B. Find the coordinates of A and B in terms of the parameter t for the point P. (2 steps)", "answer": "- Step 1: The tangent at $$P(a \\cos t, b \\sin t)$$ is $$bx \\cos t + ay \\sin t = ab$$\n- Step 2: For A (intersection with x-axis, y = 0): $$bx \\cos t = ab$$ → $$x = \\frac{a}{\\cos t} = a \\sec t$$, so $$A = (a \\sec t, 0)$$\n  For B (intersection with y-axis, x = 0): $$ay \\sin t = ab$$ → $$y = \\frac{b}{\\sin t} = b \\csc t$$, so $$B = (0, b \\csc t)$$", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "For the ellipse tangent problem, find the locus of the midpoint of AB as P moves around the ellipse. (3 steps)", "answer": "- Step 1: From the previous question, A = (a sec t, 0) and B = (0, b csc t). The midpoint M has coordinates: $$X = \\frac{a \\sec t}{2}, \\quad Y = \\frac{b \\csc t}{2}$$\n- Step 2: Rearranging: $$\\cos t = \\frac{a}{2X}, \\quad \\sin t = \\frac{b}{2Y}$$\n- Step 3: Using $$\\cos^2 t + \\sin^2 t = 1$$: $$\\left(\\frac{a}{2X}\\right)^2 + \\left(\\frac{b}{2Y}\\right)^2 = 1$$ → $$\\frac{a^2}{4X^2} + \\frac{b^2}{4Y^2} = 1$$ → $$\\frac{a^2}{X^2} + \\frac{b^2}{Y^2} = 4$$", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "What is the relationship between the eccentricity e of an ellipse and the distance from the center to each focus versus the distance to each directrix? (2 steps)", "answer": "- Step 1: For an ellipse with semi-major axis a and eccentricity e: the foci are at distance ae from the center, and the directrices are at distance a/e from the center.\n- Step 2: Since 0 < e < 1 for an ellipse, we have ae < a and a/e > a. This means the foci are closer to the center than the vertices, while the directrices are farther out than the vertices. The ratio of these distances is e: (distance to focus)/(distance to directrix) = (ae)/(a/e) = e².", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A conic has eccentricity 0.5, one focus at (3, 0), and one directrix at x = 12. What type of conic is this and find its Cartesian equation. (3 steps)", "answer": "- Step 1: Since e = 0.5 which is between 0 and 1, this is an ellipse. The focus is at (ae, 0) = (3, 0), so ae = 3, giving a = 3/e = 6.\n- Step 2: The directrix is at x = a/e = 12. With a = 6 and e = 0.5, we have a/e = 6/0.5 = 12, which checks out.\n- Step 3: Then b² = a²(1 - e²) = 36(1 - 0.25) = 36 × 0.75 = 27. So the equation is $$\\frac{x^2}{36} + \\frac{y^2}{27} = 1$$", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "If you know the eccentricity e and one directrix of a hyperbola, how can you find the value of a? If the directrix is x = 8 and e = 2, what is a? (2 steps)", "answer": "- Step 1: For a hyperbola, the directrix is given by x = ±a/e. If we know the directrix and e, we can find a by: a = (directrix distance) × e\n- Step 2: Here, directrix is x = 8 (positive side), so a/e = 8. With e = 2, we get a = 8 × 2 = 16. Then b² = a²(e² - 1) = 256(4 - 1) = 768, so b = √768 = 16√3.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Why does the definition of eccentricity using focus-directrix ratio work? Why does this definition produce different conic sections for different values of e? (2 steps)", "answer": "- Step 1: The definition $$\\frac{PS}{PM} = e$$ (distance to focus divided by distance to directrix) creates different geometric situations. When e < 1, the point P must be closer to the directrix relative to the focus, which forces P to stay in a bounded region — forming a closed ellipse. When e = 1, P is equidistant from focus and directrix, creating the open parabola. When e > 1, P can be closer to the focus than the directrix in certain regions, allowing the curve to extend infinitely in two branches — a hyperbola.\n- Step 2: This unifying definition was historically significant because it showed that parabolas, ellipses, and hyperbolas are all \"slices\" of a cone, just with different eccentricities. It also connects to orbital mechanics: planets move in ellipses (e < 1), comets in highly elliptical orbits (e close to 1), and some objects in hyperbolic trajectories (e > 1).", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": true}, {"question": "Find the equation of the tangent to the hyperbola $$\\frac{x^2}{9} - \\frac{y^2}{4} = 1$$ at the point (6, 2√3). (2 steps)", "answer": "- Step 1: First verify the point lies on the hyperbola: $$\\frac{36}{9} - \\frac{12}{4} = 4 - 3 = 1$$. Yes, it lies on the curve.\n- Step 2: Using implicit differentiation: $$\\frac{2x}{9} - \\frac{2y}{4}\\frac{dy}{dx} = 0$$ → $$\\frac{dy}{dx} = \\frac{4x}{9y}$$. At (6, 2√3): $$\\frac{dy}{dx} = \\frac{24}{18\\sqrt{3}} = \\frac{4}{3\\sqrt{3}} = \\frac{4\\sqrt{3}}{9}$$. Equation: $$y - 2\\sqrt{3} = \\frac{4\\sqrt{3}}{9}(x - 6)$$", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "The tangent to the hyperbola $$\\frac{x^2}{9} - \\frac{y^2}{4} = 1$$ at the point $$(3 \\cosh t, 2 \\sinh t)$$ crosses the y-axis at (0, -1). Find the value of t. (3 steps)", "answer": "- Step 1: The tangent at $$(a \\cosh t, b \\sinh t)$$ is $$bx \\cosh t - ay \\sinh t = ab$$. Here a = 3, b = 2: $$2x \\cosh t - 3y \\sinh t = 6$$\n- Step 2: Substitute x = 0, y = -1: $$2(0)\\cosh t - 3(-1)\\sinh t = 6$$ → $$3 \\sinh t = 6$$ → $$\\sinh t = 2$$\n- Step 3: So t = arcsinh(2) = ln(2 + √5). This is the exact value.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A chord of the parabola y² = 4ax passes through the focus. If the chord joins points with parameters p and q, show that pq = -1. (2 steps)", "answer": "- Step 1: Points are P(at², 2at) and Q(aq², 2aq). The chord equation is: $$y - 2ap = \\frac{2a(p - q)}{a(p^2 - q^2)}(x - ap^2)$$ = $$\\frac{2}{p+q}(x - ap^2)$$ (using p² - q² = (p - q)(p + q))\n- Step 2: Simplifying: $$(p+q)y = 2x + 2apq$$. Since the focus (a, 0) lies on this chord: $$(p+q)(0) = 2a + 2apq$$ → $$0 = 2a + 2apq$$ → $$pq = -1$$", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": true}, {"question": "For the parabola y² = 4ax, the normals at points with parameters p and q intersect. Find their intersection point R in terms of p and q. (3 steps)", "answer": "- Step 1: Normal at P(at², 2at) is: $$y + tx = 2at + at^3$$ (using the standard form)\n- Step 2: So normal at P: $$y + px = 2ap + ap^3$$\n  Normal at Q: $$y + qx = 2aq + aq^3$$\n- Step 3: Subtracting: $$(p - q)x = 2a(p - q) + a(p^3 - q^3)$$ = $$2a(p - q) + a(p - q)(p^2 + pq + q^2)$$ = $$(p - q)[2a + a(p^2 + pq + q^2)]$$\n  So $$x = 2a + a(p^2 + pq + q^2)$$. Substituting back: $$y = -px + 2ap + ap^3$$ = $$-apq(p + q)$$. So R = $$(a(2 + p^2 + pq + q^2), -apq(p + q))$$", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Using the result from the previous question, if the chord PQ passes through the focus (so pq = -1), show that the locus of R is y² = a(x - 3a). (2 steps)", "answer": "- Step 1: With pq = -1, the coordinates of R become: $$x = a(2 + p^2 + q^2), \\quad y = a(p + q)$$\n- Step 2: Since pq = -1, we have $$(p + q)^2 = p^2 + q^2 + 2pq = p^2 + q^2 - 2$$, so $$p^2 + q^2 = (p + q)^2 + 2$$\n- Step 3: Substituting: $$x = a(2 + (p + q)^2 + 2) = a(4 + (p + q)^2)$$ = $$4a + a(p + q)^2$$ = $$4a + a(\\frac{y}{a})^2$$ = $$4a + \\frac{y^2}{a}$$\n- Step 4: Rearranging: $$y^2 = a(x - 4a)$$. Wait, let me recalculate: x = a(2 + p² + q²) with pq = -1. Using p² + q² = (p+q)² - 2(-1) = (p+q)² + 2, we get x = a(2 + (p+q)² + 2) = a(4 + (p+q)²). With y = a(p+q), we have (p+q) = y/a, so x = a(4 + y²/a²) = 4a + y²/a. Therefore y² = a(x - 4a).", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "What is the geometric significance of the asymptotes of a hyperbola? Why are they important for sketching? (1 step)", "answer": "The asymptotes of a hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ are the lines $$y = \\pm \\frac{b}{a}x$$ that the hyperbola approaches infinitely closely but never reaches. They are crucial for sketching because they define the \"shape\" of the hyperbola — the two branches approach these lines as x and y get large. Drawing the asymptotes first helps you sketch the hyperbola accurately, showing the directions the branches take.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "Compare the parametric equations of an ellipse and a hyperbola. Why do they look similar but represent different curves? What trigonometric/hyperbolic identity makes each work? (2 steps)", "answer": "- Step 1: Ellipse: $$x = a \\cos t, y = b \\sin t$$. Hyperbola (trig form): $$x = a \\sec t, y = b \\tan t$$. The key difference is that the ellipse uses cos and sin (which stay bounded between -1 and 1), while the hyperbola uses sec and tan (which can go to infinity).\n- Step 2: For the ellipse: $$\\cos^2 t + \\sin^2 t = 1$$ gives $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$. For the hyperbola: $$\\sec^2 t - \\tan^2 t = 1$$ gives $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$. The hyperbolic versions use cosh and sinh with the identity $$\\cosh^2 t - \\sinh^2 t = 1$$.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "A conic has focus at (4, 0) and directrix at x = 2. Is this an ellipse, parabola, or hyperbola? Find its eccentricity and equation. (3 steps)", "answer": "- Step 1: The distance from the focus to the directrix is 2 units. For any point P, the ratio PS/PM = e. The focus is to the right of the directrix.\n- Step 2: Using the focus at (ae, 0) = (4, 0), we have ae = 4. The directrix at x = a/e = 2 gives a/e = 2. Solving: a² = 8, a = 2√2, e = 4/(2√2) = √2 ≈ 1.414.\n- Step 3: Since e > 1, this is a hyperbola. With a = 2√2, b² = a²(e² - 1) = 8(2 - 1) = 8, so b = 2√2. The equation is $$\\frac{x^2}{8} - \\frac{y^2}{8} = 1$$ or $$x^2 - y^2 = 8$$.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "If an ellipse has eccentricity e = 0.8 and a focus at (4, 0), find: (i) the value of a, (ii) the directrix equation, (iii) the other focus. (3 steps)", "answer": "- Step 1: (i) Since focus is at (ae, 0) = (4, 0), we have ae = 4, so a = 4/e = 4/0.8 = 5\n- Step 2: (ii) The directrix is at x = a/e = 5/0.8 = 6.25 = 25/4. There's also the other directrix at x = -25/4\n- Step 3: (iii) The other focus is at (-ae, 0) = (-4, 0). We can also find b: b² = a²(1 - e²) = 25(1 - 0.64) = 25 × 0.36 = 9, so b = 3. The full equation is $$\\frac{x^2}{25} + \\frac{y^2}{9} = 1$$", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "For the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with a > b, prove that the distance from the center to each focus is ae, and the distance to each directrix is a/e. (2 steps)", "answer": "- Step 1: From the definition using focus (ae, 0) and directrix x = a/e, the ratio PS/PM = e for any point P. At the vertex (a, 0), we have PS = a - ae = a(1 - e) and PM = a/e - a = a(1 - e)/e. So PS/PM = (a(1 - e))/(a(1 - e)/e) = e, which checks out.\n- Step 2: More directly, by definition, the focus is at (ae, 0), so its distance from the center (0, 0) is ae. The directrix is the line x = a/e, so its distance from the center is a/e. These follow directly from the definitions given in the standard form.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "What is the difference between the major and minor axes of an ellipse, and how do you determine which is which from the equation? (1 step)", "answer": "The major axis is the longer axis of the ellipse, and the minor axis is the shorter one. From the equation $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$, if a > b, then the major axis lies along the x-axis (horizontal) with length 2a, and the minor axis is along the y-axis with length 2b. If b > a, then the major axis is vertical (along the y-axis) with length 2b, and the minor axis is horizontal with length 2a. The larger denominator always corresponds to the major axis.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "Find the equations of the asymptotes of the hyperbola $$\\frac{x^2}{8} - \\frac{y^2}{2} = 1$$. (1 step)", "answer": "Here a² = 8, so a = 2√2, and b² = 2, so b = √2. The asymptotes are given by $$y = \\pm \\frac{b}{a}x = \\pm \\frac{\\sqrt{2}}{2\\sqrt{2}}x = \\pm \\frac{1}{2}x$$. So the asymptotes are y = x/2 and y = -x/2.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "The ellipse with foci at (±c, 0) has eccentricity e. Express c in terms of a and e. (1 step)", "answer": "From the definition, the focus is at (ae, 0), so c = ae. Also, from b² = a²(1 - e²), we have c² = a²e² = a² - b². So c = √(a² - b²) = ae.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "A hyperbola has asymptotes with equations y = ±2x and passes through (a, 0). Find its equation. (2 steps)", "answer": "- Step 1: The asymptotes of $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ are y = ±(b/a)x. Given these are y = ±2x, we have b/a = 2, so b = 2a.\n- Step 2: The hyperbola passes through (a, 0), which is the vertex. Substituting: $$\\frac{a^2}{a^2} - \\frac{0}{b^2} = 1$$, which is satisfied for any a. So the equation is $$\\frac{x^2}{a^2} - \\frac{y^2}{4a^2} = 1$$ or equivalently $$4x^2 - y^2 = 4a^2$$. Without additional information, a remains a parameter.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "Why can't a hyperbola have its major axis along the y-axis in the same way an ellipse can? (1 step)", "answer": "For an ellipse, both x²/a² and y²/b² are positive, so setting either x = 0 or y = 0 can give real intercepts. For a hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, setting x = 0 gives -y²/b² = 1, which has no real solutions — the hyperbola never crosses the y-axis. This means the \"major axis\" (the axis containing the vertices and foci) is always the x-axis (the axis where the positive term is). The hyperbola has a transverse axis (x-direction) but not a conjugate axis in the same sense as ellipses.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "Find the coordinates of the point where the tangent to the ellipse $$\\frac{x^2}{16} + \\frac{y^2}{9} = 1$$ at the point where θ = π/6 meets the coordinate axes. (3 steps)", "answer": "- Step 1: The point has coordinates (a cos θ, b sin θ) = (4 cos(π/6), 3 sin(π/6)) = (4 × √3/2, 3 × 1/2) = (2√3, 3/2)\n- Step 2: The tangent equation is bx cos θ + ay sin θ = ab: $$3x \\cos(π/6) + 4y \\sin(π/6) = 12$$ → $$3x(√3/2) + 4y(1/2) = 12$$ → $$(3√3/2)x + 2y = 12$$ → Multiply by 2: $$3√3 x + 4y = 24$$\n- Step 3: When y = 0 (x-intercept): 3√3 x = 24 → x = 8/√3 = (8√3)/3. When x = 0 (y-intercept): 4y = 24 → y = 6", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "The line y = mx + c is tangent to both the ellipse $$\\frac{x^2}{a_1^2} + \\frac{y^2}{b_1^2} = 1$$ and $$\\frac{x^2}{a_2^2} + \\frac{y^2}{b_2^2} = 1$$. What condition must m and c satisfy? (1 step)", "answer": "For tangency to the first ellipse: $$b_1^2 + a_1^2 m^2 = c^2$$. For tangency to the second: $$b_2^2 + a_2^2 m^2 = c^2$$. Therefore both must hold simultaneously: $$b_1^2 + a_1^2 m^2 = b_2^2 + a_2^2 m^2$$, giving $$(a_1^2 - a_2^2)m^2 = b_2^2 - b_1^2$$. Once m is found, c² can be found from either equation.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "What is special about the normal at a vertex of an ellipse? (1 step)", "answer": "At a vertex, say at (a, 0) where θ = 0, we have cos θ = 1, sin θ = 0. The normal equation is $$ax \\sin θ - by \\cos θ = (a^2 - b^2) cos θ sin θ$$. At θ = 0: $$0 - by(1) = 0$$, so y = 0. The normal is the x-axis itself! Similarly at (-a, 0), the normal is also the x-axis. At the other vertices (0, ±b), the normal is the y-axis.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": true}, {"question": "A conic section is obtained by slicing a cone. What determines whether the slice produces an ellipse, parabola, or hyperbola? (1 step)", "answer": "The type of conic depends on the angle of the slice relative to the cone's axis. If the slice is perpendicular to the axis, you get a circle (special ellipse). If the slice is at an angle less steep than the cone's side (but not parallel to it), you get an ellipse. If the slice is parallel to the cone's side, you get a parabola. If the slice is steeper than the cone's side (cutting through both nappes), you get a hyperbola. This geometric interpretation explains why eccentricity relates to the angle — it's essentially the ratio of the slice angle to the cone angle.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": true}, {"question": "Find the distance between the two foci of the ellipse $$\\frac{x^2}{25} + \\frac{y^2}{9} = 1$$. (2 steps)", "answer": "- Step 1: Here a = 5, b = 3. Since a > b, the major axis is along x-axis. First find e: b² = a²(1 - e²) → 9 = 25(1 - e²) → e² = 1 - 9/25 = 16/25 → e = 4/5\n- Step 2: The foci are at (±ae, 0) = (±5 × 4/5, 0) = (±4, 0). The distance between them is 8 units.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "Find the distance between the two directrices of the hyperbola $$\\frac{x^2}{9} - \\frac{y^2}{16} = 1$$. (2 steps)", "answer": "- Step 1: Here a = 3, b = 4. Find e: b² = a²(e² - 1) → 16 = 9(e² - 1) → e² = 16/9 + 1 = 25/9 → e = 5/3\n- Step 2: The directrices are at x = ±a/e = ±3/(5/3) = ±9/5 = ±1.8. The distance between them is 18/5 = 3.6 units.", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "A chord of an ellipse passes through a focus. What property does this chord have? (1 step)", "answer": "For an ellipse with focus at (ae, 0), any chord passing through this focus has a constant sum of distances to the two foci. Specifically, if the chord passes through one focus, the distances from the endpoints to the other focus have a particular relationship — this is the reflective property of ellipses: any ray from one focus reflects to the other focus. This means angles of incidence equal angles of reflection at any point on the ellipse.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}], "count": 58}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "For a hyperbola with equation $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, state the positions of the foci and directrices, and give the formula relating eccentricity $$e$$ to $$a$$ and $$b$$. (3 steps)", "answer": "- Step 1: The hyperbola has eccentricity $$e > 1$$, given by $$b^2 = a^2(e^2 - 1)$$. This comes from the focus-directrix definition where for any point $$P$$ on the hyperbola, $$\\frac{PS}{PM} = e > 1$$.\n- Step 2: The foci lie on the transverse axis (the x-axis), at coordinates $$(\\pm ae, 0)$$. Unlike ellipses, the foci always lie on the x-axis for this standard form, regardless of the relative sizes of $$a$$ and $$b$$.\n+ This is because setting $$x = 0$$ in the equation gives $$-\\frac{y^2}{b^2} = 1$$, which has no real solutions — the hyperbola never crosses the y-axis.\n- Step 3: The directrices are vertical lines with equations $$x = \\pm \\frac{a}{e}$$. These lie between the origin and the vertices.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Explain why the ellipse is classified as a \"closed\" curve while the hyperbola is \"open,\" and describe how their asymptotic behaviors differ. (2 steps)", "answer": "- Step 1: The ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ is a closed curve because setting $$y = 0$$ gives $$x = \\pm a$$, and setting $$x = 0$$ gives $$y = \\pm b$$ — the curve has definite boundaries in all directions. The hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ is open: it crosses the x-axis at $$x = \\pm a$$ but extends infinitely in the y-direction.\n- Step 2: As $$x$$ and $$y$$ tend to infinity, for the hyperbola we have $$\\frac{x^2}{a^2} \\approx \\frac{y^2}{b^2}$$, so $$y \\approx \\pm\\frac{b}{a}x$$. These are the asymptotes — straight lines that the hyperbola approaches but never reaches. The ellipse has no asymptotes; it stays within its bounding box $$-a \\leq x \\leq a$$ and $$-b \\leq y \\leq b$$.\n+ A special case is the rectangular hyperbola where $$a = b$$, giving asymptotes $$y = \\pm x$$ which are perpendicular.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A conic section satisfies $$\\frac{PS}{PM} = e$$ where $$PS$$ is distance from a point $$P$$ to a focus, $$PM$$ is distance to a directrix, and $$e$$ is eccentricity. Classify the conic for each case: (i) $$e = 0$$, (ii) $$0 < e < 1$$, (iii) $$e = 1$$, (iv) $$e > 1$$.", "answer": "- Step 1: $$e = 0$$ gives a circle. When $$e = 0$$, the ratio $$\\frac{PS}{PM} = 0$$ means $$PS = 0$$, so $$P$$ must coincide with the focus. The directrix is at infinity, and all points are equidistant from the (single) focus — this is a circle.\n- Step 2: $$0 < e < 1$$ gives an ellipse. The constant ratio is less than 1, meaning points are closer to the focus than to the directrix, forming a closed bounded curve.\n- Step 3: $$e = 1$$ gives a parabola. The distances are equal, producing the classic parabola definition: locus of points equidistant from focus and directrix.\n+ Step 4: $$e > 1$$ gives a hyperbola. Points are closer to the focus than the directrix (ratio > 1), producing an open curve with two branches.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Given the ellipse $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$, find its eccentricity, foci, and directrices. (3 steps)", "answer": "- Step 1: Identify $$a$$ and $$b$$. Comparing with $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$, we have $$a^2 = 9$$ so $$a = 3$$, and $$b^2 = 4$$ so $$b = 2$$. Since $$a > b$$, the major axis is along the x-axis.\n- Step 2: Find eccentricity using $$b^2 = a^2(1 - e^2)$$. Substituting: $$4 = 9(1 - e^2)$$, so $$1 - e^2 = \\frac{4}{9}$$, giving $$e^2 = \\frac{5}{9}$$, hence $$e = \\frac{\\sqrt{5}}{3}$$.\n+ Step 3: The foci are at $$(\\pm ae, 0) = (\\pm 3 \\times \\frac{\\sqrt{5}}{3}, 0) = (\\pm \\sqrt{5}, 0)$$. The directrices are at $$x = \\pm \\frac{a}{e} = \\pm \\frac{3}{\\sqrt{5}} = \\pm \\frac{9}{\\sqrt{5}}$$ after rationalizing.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Find the equation of the tangent to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at the point $$P(a\\cos t, b\\sin t)$$. (3 steps)", "answer": "- Step 1: First find the gradient $$\\frac{dy}{dx}$$ using parametric differentiation. Since $$x = a\\cos t$$ and $$y = b\\sin t$$, we have $$\\frac{dx}{dt} = -a\\sin t$$ and $$\\frac{dy}{dt} = b\\cos t$$. Thus $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt} = \\frac{b\\cos t}{-a\\sin t} = -\\frac{b}{a}\\cot t$$.\n- Step 2: Using point-slope form: $$y - b\\sin t = -\\frac{b\\cos t}{a\\sin t}(x - a\\cos t)$$.\n- Step 3: Multiply through and simplify:\n$$ay\\sin t - ab\\sin^2 t = -bx\\cos t + ab\\cos^2 t$$\n$$bx\\cos t + ay\\sin t = ab(\\cos^2 t + \\sin^2 t)$$\n$$bx\\cos t + ay\\sin t = ab$$\nThis is the standard form of the tangent equation.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Find the equation of the normal to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at the point $$P(a\\cos t, b\\sin t)$$. (3 steps)", "answer": "- Step 1: From the previous result, the gradient of the tangent is $$-\\frac{b}{a}\\cot t$$. The normal is perpendicular to the tangent, so its gradient is the negative reciprocal: $$\\frac{a}{b}\\tan t$$.\n- Step 2: Using point-slope form: $$y - b\\sin t = \\frac{a\\sin t}{b\\cos t}(x - a\\cos t)$$.\n- Step 3: Multiply through and simplify:\n$$by\\cos t - b^2\\sin t\\cos t = ax\\sin t - a^2\\sin t\\cos t$$\n$$ax\\sin t - by\\cos t = (a^2 - b^2)\\sin t\\cos t$$\nThis is the standard form of the normal equation.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Find the equation of the tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at the point $$P(a\\cosh t, b\\sinh t)$$. (3 steps)", "answer": "- Step 1: Find the gradient using parametric differentiation. Since $$x = a\\cosh t$$ and $$y = b\\sinh t$$, we have $$\\frac{dx}{dt} = a\\sinh t$$ and $$\\frac{dy}{dt} = b\\cosh t$$. Thus $$\\frac{dy}{dx} = \\frac{b\\cosh t}{a\\sinh t} = \\frac{b}{a}\\coth t$$.\n- Step 2: Using point-slope form: $$y - b\\sinh t = \\frac{b\\cosh t}{a\\sinh t}(x - a\\cosh t)$$.\n- Step 3: Multiply through and simplify, using $$\\cosh^2 t - \\sinh^2 t = 1$$:\n$$ay\\sinh t - ab\\sinh^2 t = bx\\cosh t - ab\\cosh^2 t$$\n$$bx\\cosh t - ay\\sinh t = ab(\\cosh^2 t - \\sinh^2 t)$$\n$$bx\\cosh t - ay\\sinh t = ab$$\nRearranging: $$ay\\sinh t + ab = bx\\cosh t$$.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Find the equation of the normal to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at the point $$P(a\\cosh t, b\\sinh t)$$. (3 steps)", "answer": "- Step 1: From the previous result, the gradient of the tangent is $$\\frac{b}{a}\\coth t$$. The normal is perpendicular, so its gradient is $$-\\frac{a}{b}\\tanh t$$.\n- Step 2: Using point-slope form: $$y - b\\sinh t = -\\frac{a\\sinh t}{b\\cosh t}(x - a\\cosh t)$$.\n- Step 3: Multiply through and simplify:\n$$by\\cosh t - b^2\\sinh t\\cosh t = -ax\\sinh t + a^2\\sinh t\\cosh t$$\n$$ax\\sinh t + by\\cosh t = (a^2 + b^2)\\sinh t\\cosh t$$\nThis is the standard form of the normal equation.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Show that for any point $$P$$ on the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with foci $$S(ae, 0)$$ and $$S'(-ae, 0)$$, we have $$PS + PS' = 2a$$. (3 steps)", "answer": "- Step 1: Let the directrix corresponding to focus $$S$$ be $$x = \\frac{a}{e}$$, and for $$S'$$ be $$x = -\\frac{a}{e}$$. For any point $$P(x, y)$$ on the ellipse, by the focus-directrix property: $$PS = e \\cdot PM$$ and $$PS' = e \\cdot PM'$$, where $$M$$ and $$M'$$ are the perpendicular foot distances to the respective directrices.\n- Step 2: Compute the distances: $$PM = \\frac{a}{e} - x$$ (distance from point to vertical line $$x = \\frac{a}{e}$$), and $$PM' = x + \\frac{a}{e}$$ (distance to $$x = -\\frac{a}{e}$$).\n- Step 3: Therefore:\n$$PS + PS' = e\\left(\\frac{a}{e} - x\\right) + e\\left(\\frac{a}{e} + x\\right) = (a - ex) + (a + ex) = 2a$$\nThis proves the sum of distances from any point on the ellipse to the two foci is constant $$= 2a$$.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "The tangent at point $$P(a\\cos t, b\\sin t)$$ to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ meets the x-axis at $$A$$ and the y-axis at $$B$$. Find the coordinates of the midpoint of $$AB$$ in terms of $$t$$, and hence find its locus as $$P$$ moves around the ellipse. (3 steps)", "answer": "- Step 1: The tangent equation is $$bx\\cos t + ay\\sin t = ab$$. Setting $$y = 0$$ gives $$x = \\frac{a}{\\cos t} = a\\sec t$$, so $$A = (a\\sec t, 0)$$. Setting $$x = 0$$ gives $$y = \\frac{b}{\\sin t} = b\\csc t$$, so $$B = (0, b\\csc t)$$.\n- Step 2: The midpoint $$M$$ has coordinates $$(\\frac{a\\sec t}{2}, \\frac{b\\csc t}{2})$$. Let $$X = \\frac{a\\sec t}{2}$$ and $$Y = \\frac{b\\csc t}{2}$$, so $$\\sec t = \\frac{2X}{a}$$ and $$\\csc t = \\frac{2Y}{b}$$.\n- Step 3: Using $$\\sec^2 t + \\csc^2 t = \\tan^2 t + 1 + \\cot^2 t + 1$$ is messy. Instead use $$\\cos t = \\frac{a}{2X}$$ and $$\\sin t = \\frac{b}{2Y}$$. Since $$\\cos^2 t + \\sin^2 t = 1$$:\n$$\\left(\\frac{a}{2X}\\right)^2 + \\left(\\frac{b}{2Y}\\right)^2 = 1$$\n$$\\frac{a^2}{4X^2} + \\frac{b^2}{4Y^2} = 1$$\n$$\\frac{a^2}{X^2} + \\frac{b^2}{Y^2} = 4$$\nThis is the locus equation.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A line $$y = mx + c$$ is a tangent to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$. Show that the condition for tangency is $$b^2 + a^2m^2 = c^2$$. (3 steps)", "answer": "- Step 1: Substitute $$y = mx + c$$ into the ellipse equation:\n$$\\frac{x^2}{a^2} + \\frac{(mx + c)^2}{b^2} = 1$$\n$$\\frac{b^2x^2 + a^2(mx + c)^2}{a^2b^2} = 1$$\n$$b^2x^2 + a^2(m^2x^2 + 2mcx + c^2) = a^2b^2$$\n- Step 2: Rearrange as a quadratic in $$x$$:\n$$(b^2 + a^2m^2)x^2 + 2a^2mcx + a^2(c^2 - b^2) = 0$$\n- Step 3: For the line to be a tangent, this quadratic must have exactly one real root, so its discriminant must be zero:\n$$(2a^2mc)^2 - 4(b^2 + a^2m^2)(a^2)(c^2 - b^2) = 0$$\n$$4a^4m^2c^2 = 4a^2(b^2 + a^2m^2)(c^2 - b^2)$$\nDividing by $$4a^2$$ and expanding:\n$$a^2m^2c^2 = b^2c^2 - b^4 + a^2m^2c^2 - a^2b^2m^2$$\nCancelling $$a^2m^2c^2$$ from both sides:\n$$b^2c^2 - b^4 = a^2b^2m^2$$\n$$b^2(c^2 - b^2) = a^2b^2m^2$$\nDividing by $$b^2$$ (assuming $$b \\neq 0$$):\n$$c^2 - b^2 = a^2m^2$$\n$$b^2 + a^2m^2 = c^2$$", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A line $$y = mx + c$$ is a tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$. Show that the condition for tangency is $$b^2 + c^2 = a^2m^2$$. (3 steps)", "answer": "- Step 1: Substitute $$y = mx + c$$ into the hyperbola equation:\n$$\\frac{x^2}{a^2} - \\frac{(mx + c)^2}{b^2} = 1$$\n$$\\frac{b^2x^2 - a^2(mx + c)^2}{a^2b^2} = 1$$\n$$b^2x^2 - a^2(m^2x^2 + 2mcx + c^2) = a^2b^2$$\n- Step 2: Rearrange as a quadratic in $$x$$:\n$$(b^2 - a^2m^2)x^2 - 2a^2mcx - a^2(c^2 + b^2) = 0$$\n- Step 3: For tangency, discriminant = 0:\n$$(-2a^2mc)^2 - 4(b^2 - a^2m^2)(-a^2)(c^2 + b^2) = 0$$\n$$4a^4m^2c^2 + 4a^2(b^2 - a^2m^2)(c^2 + b^2) = 0$$\nDividing by $$4a^2$$:\n$$a^2m^2c^2 + (b^2 - a^2m^2)(c^2 + b^2) = 0$$\nExpanding:\n$$a^2m^2c^2 + b^2c^2 + b^4 - a^2m^2c^2 - a^2b^2m^2 = 0$$\nThe $$a^2m^2c^2$$ terms cancel:\n$$b^2c^2 + b^4 = a^2b^2m^2$$\nDividing by $$b^2$$:\n$$c^2 + b^2 = a^2m^2$$\n$$b^2 + c^2 = a^2m^2$$", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "What is the length of the latus rectum of the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ (where $$a > b$$), and how is it defined? (2 steps)", "answer": "- Step 1: The latus rectum is the chord through a focus that is perpendicular to the major axis. Let the focus be at $$(ae, 0)$$. A line through this focus with equation $$x = ae$$ intersects the ellipse where $$\\frac{a^2e^2}{a^2} + \\frac{y^2}{b^2} = 1$$, so $$\\frac{y^2}{b^2} = 1 - e^2$$.\n- Step 2: Using $$b^2 = a^2(1 - e^2)$$, we get $$\\frac{y^2}{b^2} = \\frac{b^2}{a^2}$$, so $$y^2 = \\frac{b^4}{a^2}$$. The full chord length (both segments either side of the focus) is $$2|y| = \\frac{2b^2}{a}$$.\n+ This is the length of the latus rectum. For a circle ($$a = b$$), this gives $$\\frac{2a^2}{a} = 2a$$, which is the diameter — consistent since a circle can be considered an ellipse with $$e = 0$$.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "For the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, state the equations of the asymptotes and expla r": "- Step 1: First write the ellipse in standard form: $$4x^2 + 9y^2 = 36$$ becomes $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$, so $$a = 3, b = 2$$. With $$\\theta = \\frac{\\pi}{6}$$, the point is:\n$$x = 3\\cos(\\frac{\\pi}{6}) = 3 \\cdot \\frac{\\sqrt{3}}{2} = \\frac{3\\sqrt{3}}{2}$$\n$$y = 2\\sin(\\frac{\\pi}{6}) = 2 \\cdot \\frac{1}{2} = 1$$\nSo $$P = (\\frac{3\\sqrt{3}}{2}, 1)$$.\n- Step 2: The tangent equation is $$bx\\cos t + ay\\sin t = ab$$. Substituting: $$2x\\cos(\\frac{\\pi}{6}) + 3y\\sin(\\frac{\\pi}{6}) = 2 \\cdot 3$$\n$$2x \\cdot \\frac{\\sqrt{3}}{2} + 3y \\cdot \\frac{1}{2} = 6$$\n$$\\sqrt{3}x + \\frac{3}{2}y = 6$$\nMultiplying by 2: $$2\\sqrt{3}x + 3y = 12$$\n- Step 3: The normal equation is $$ax\\sin t - by\\cos t = (a^2 - b^2)\\sin t\\cos t$$:\n$$3x\\sin(\\frac{\\pi}{6}) - 2y\\cos(\\frac{\\pi}{6}) = (9 - 4)\\sin(\\frac{\\pi}{6})\\cos(\\frac{\\pi}{6})$$\n$$3x \\cdot \\frac{1}{2} - 2y \\cdot \\frac{\\sqrt{3}}{2} = 5 \\cdot \\frac{1}{2} \\cdot \\frac{\\sqrt{3}}{2}$$\n$$\\frac{3}{2}x - \\sqrt{3}y = \\frac{5\\sqrt{3}}{4}$$\nMultiplying by 4: $$6x - 4\\sqrt{3}y = 5\\sqrt{3}$$", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Find the point of intersection of the tangents to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at points $$P(a\\sec\\theta_1, b\\tan\\theta_1)$$ and $$Q(a\\sec\\theta_2, b\\tan\\theta_2)$$. (3 steps)", "answer": "- Step 1: The tangent at $$P$$ is $$bx\\sec\\theta_1 - ay\\tan\\theta_1 = ab$$. The tangent at $$Q$$ is $$bx\\sec\\theta_2 - ay\\tan\\theta_2 = ab$$.\n- Step 2: Solve these simultaneously. Write as:\n$$b x \\sec\\theta_1 - a y \\tan\\theta_1 = ab \\quad\\text{(1)}$$\n$$b x \\sec\\theta_2 - a y \\tan\\theta_2 = ab \\quad\\text{(2)}$$\nMultiply (1) by $$\\tan\\theta_2$$ and (2) by $$\\tan\\theta_1$$ and subtract:\n$$b x \\sec\\theta_1 \\tan\\theta_2 - b x \\sec\\theta_2 \\tan\\theta_1 = ab(\\tan\\theta_2 - \\tan\\theta_1)$$\n$$b x (\\sec\\theta_1 \\tan\\theta_2 - \\sec\\theta_2 \\tan\\theta_1) = ab(\\tan\\theta_2 - \\tan\\theta_1)$$\n- Step 3: Using $$\\sec\\theta\\tan\\theta = \\frac{\\sin\\theta}{\\cos^2\\theta}$$ and simplifying, we can solve for $$x$$ and $$y$$. The result is:\n$$x = \\frac{a(\\tan\\theta_2 - \\tan\\theta_1)}{\\sec\\theta_1\\tan\\theta_2 - \\sec\\theta_2\\tan\\theta_1}$$\n$$y = \\frac{b(\\sec\\theta_1 - \\sec\\theta_2)}{\\sec\\theta_1\\tan\\theta_2 - \\sec\\theta_2\\tan\\theta_1}$$\n+ This simplifies to: $$x = \\frac{a \\sin(\\theta_2 - \\theta_1)}{\\sin\\theta_2 \\cos\\theta_1 - \\sin\\theta_1 \\cos\\theta_2} \\cdot \\frac{1}{\\cos\\theta_1 \\cos\\theta_2}$$, and after simplification the intersection point can be expressed in terms of $$\\theta_1$$ and $$\\theta_2$$.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Explain the geometric significance of eccentricity for conic sections. Why is $$e$$ defined differently for ellipses ($$0 < e < 1$$), parabolas ($$e = 1$$), and hyperbolas ($$e > 1$$)? (2 steps)", "answer": "- Step 1: Eccentricity $$e$$ measures how \"stretched\" or \"elongated\" a conic section is from a circle. It is defined as the constant ratio $$\\frac{PS}{PM}$$ where $$P$$ is any point on the conic, $$S$$ is a focus, and $$M$$ is the perpendicular distance to the corresponding directrix.\n- Step 2: When $$e = 0$$, the focus and directrix coincide at infinity, giving a perfect circle where all points are equidistant from the center. As $$e$$ increases from 0 toward 1, the ellipse becomes more elongated (major axis grows relative to minor axis). At $$e = 1$$, the curve \"opens up\" infinitely — the parabola has one branch extending to infinity. For $$e > 1$$, the ratio is greater than 1, meaning points are closer to the focus than the directrix, producing two separate branches — a hyperbola. The greater the $$e$$, the \"narrower\" the hyperbola branches appear.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "The ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ has a focus at $$(3, 0)$$ and a directrix at $$x = 12$$. Find the values of $$a, b$$ and the eccentricity $$e$$. (3 steps)", "answer": "- Step 1: For an ellipse with focus at $$(ae, 0)$$, we have $$ae = 3$$. The directrix is at $$x = \\frac{a}{e}$$, so $$\\frac{a}{e} = 12$$.\n- Step 2: From these two equations: $$ae = 3$$ and $$\\frac{a}{e} = 12$$. Multiply them: $$a^2 = 36$$, so $$a = 6$$ (taking positive since we're in standard orientation).\nThen $$e = \\frac{3}{a} = \\frac{3}{6} = \\frac{1}{2}$$.\n- Step 3: Since $$a > b$$ (given that focus is on x-axis), we use $$b^2 = a^2(1 - e^2) = 36(1 - \\frac{1}{4}) = 36 \\cdot \\frac{3}{4} = 27$$. So $$b = \\sqrt{27} = 3\\sqrt{3}$$.\n+ Check: The other focus is at $$(-3, 0)$$ and the other directrix at $$x = -12$$.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Show that the point $$Q\\left(\\frac{9}{5}, -\\frac{8}{5}\\right)$$ lies on the ellipse $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$, and find the gradient of the tangent at $$Q$$. (3 steps)", "answer": "- Step 1: Substitute $$x = \\frac{9}{5}, y = -\\frac{8}{5}$$ into the ellipse equation:\n$$\\frac{(9/5)^2}{9} + \\frac{(-8/5)^2}{4} = \\frac{81/25}{9} + \\frac{64/25}{4} = \\frac{81}{225} + \\frac{64}{100} = \\frac{9}{25} + \\frac{16}{25} = \\frac{25}{25} = 1$$\nSo $$Q$$ lies on the ellipse.\n- Step 2: We can use implicit differentiation on the Cartesian form. Differentiating $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$:\n$$\\frac{2x}{9} + \\frac{2y}{4}\\frac{dy}{dx} = 0$$\n$$\\frac{x}{9} + \\frac{y}{2}\\frac{dy}{dx} = 0$$\n$$\\frac{dy}{dx} = -\\frac{2x}{9y}$$\n- Step 3: At $$Q\\left(\\frac{9}{5}, -\\frac{8}{5}\\right)$$:\n$$\\frac{dy}{dx} = -\\frac{2 \\cdot \\frac{9}{5}}{9 \\cdot (-\\frac{8}{5})} = -\\frac{\\frac{18}{5}}{-\\frac{72}{5}} = -\\frac{18}{5} \\cdot -\\frac{5}{72} = \\frac{18}{72} = \\frac{1}{4}$$\nAlternatively, using the parametric form: find $$\\theta$$ such that $$3\\cos\\theta = \\frac{9}{5}$$ and $$2\\sin\\theta = -\\frac{8}{5}$$. This gives $$\\cos\\theta = \\frac{3}{5}, \\sin\\theta = -\\frac{4}{5}$$, so gradient $$= -\\frac{b}{a}\\cot\\theta = -\\frac{2}{3} \\cdot \\frac{\\cos\\theta}{\\sin\\theta} = -\\frac{2}{3} \\cdot \\frac{3/5}{-4/5} = -\\frac{2}{3} \\cdot (-\\frac{3}{4}) = \\frac{1}{4}$$.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "The normal at point $$P(a\\cos t, b\\sin t)$$ to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ passes through the point $$(0, b)$$. Find the value of $$\\tan t$$. (3 steps)", "answer": "- Step 1: The normal equation is $$ax\\sin t - by\\cos t = (a^2 - b^2)\\sin t\\cos t$$. The point $$(0, b)$$ lies on this normal, so substitute $$x = 0, y = b$$:\n$$a(0)\\sin t - b(b)\\cos t = (a^2 - b^2)\\sin t\\cos t$$\n$$-b^2\\cos t = (a^2 - b^2)\\sin t\\cos t$$\n- Step 2: If $$\\cos t = 0$$ (i.e., $$t = \\frac{\\pi}{2}$$ or $$\\frac{3\\pi}{2}$$), the left side is 0, but then we can't proceed normally. Assuming $$\\cos t \\neq 0$$, divide both sides by $$\\cos t$$:\n$$-b^2 = (a^2 - b^2)\\sin t$$\n- Step 3: So $$\\sin t = -\\frac{b^2}{a^2 - b^2}$$. Then using $$\\sin^2 t + \\cos^2 t = 1$$:\n$$\\cos^2 t = 1 - \\sin^2 t = 1 - \\frac{b^4}{(a^2 - b^2)^2} = \\frac{(a^2 - b^2)^2 - b^4}{(a^2 - b^2)^2} = \\frac{a^4 - 2a^2b^2 + b^4 - b^4}{(a^2 - b^2)^2} = \\frac{a^2(a^2 - 2b^2)}{(a^2 - b^2)^2}$$\n$$\\cos t = \\pm\\frac{a\\sqrt{a^2 - 2b^2}}{a^2 - b^2}$$\nTherefore $$\\tan t = \\frac{\\sin t}{\\cos t} = \\frac{-b^2}{a^2 - b^2} \\cdot \\frac{a^2 - b^2}{\\pm a\\sqrt{a^2 - 2b^2}} = \\mp\\frac{b^2}{a\\sqrt{a^2 - 2b^2}}$$", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Two tangents are drawn from the point $$(-3, 3)$$ to the rectangular hyperbola $$xy = 16$$. Find the coordinates of the points of contact. (3 steps)", "answer": "- Step 1: For the rectangular hyperbola $$xy = c^2$$ with $$c^2 = 16$$ (so $$c = 4$$), the tangent at point $$(ct, \\frac{c}{t})$$ is $$t^2 y + x = 2ct$$.\n- Step 2: This tangent must pass through $$(-3, 3)$$, so substitute:\n$$t^2(3) + (-3) = 2 \\cdot 4 \\cdot t$$\n$$3t^2 - 3 = 8t$$\n$$3t^2 - 8t - 3 = 0$$\n- Step 3: Solve the quadratic: $$t = \\frac{8 \\pm \\sqrt{64 + 36}}{6} = \\frac{8 \\pm \\sqrt{100}}{6} = \\frac{8 \\pm 10}{6}$$\nSo $$t = \\frac{18}{6} = 3$$ or $$t = \\frac{-2}{6} = -\\frac{1}{3}$$.\n+ For $$t = 3$$: contact point is $$(4 \\cdot 3, \\frac{4}{3}) = (12, \\frac{4}{3})$$\n+ For $$t = -\\frac{1}{3}$$: contact point is $$(4 \\cdot (-\\frac{1}{3}), \\frac{4}{-1/3}) = (-\\frac{4}{3}, -12)$$", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "The ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ is rotated through $$45^\\circ$$ anticlockwise about the origin. Show that the resulting curve has equation $$\\frac{(x+y)^2}{2a^2} + \\frac{(x-y)^2}{2b^2} = 1$$. (3 steps)", "answer": "- Step 1: Let the original point be $$P(x', y')$$ on the ellipse, with parametric form $$x' = a\\cos t, y' = b\\sin t$$. After rotating anticlockwise by $$45^\\circ$$, the new coordinates $$(x, y)$$ are given by:\n$$x = x'\\cos 45^\\circ - y'\\sin 45^\\circ = \\frac{x' - y'}{\\sqrt{2}}$$\n$$y = x'\\sin 45^\\circ + y'\\cos 45^\\circ = \\frac{x' + y'}{\\sqrt{2}}$$\n- Step 2: Solve for $$x'$$ and $$y'$$ in terms of $$x$$ and $$y$$:\nAdding: $$x + y = \\frac{x' - y' + x' + y'}{\\sqrt{2}} = \\frac{2x'}{\\sqrt{2}} = \\sqrt{2}x'$$\nSo $$x' = \\frac{x+y}{\\sqrt{2}}$$\nSubtracting: $$y - x = \\frac{x' + y' - x' + y'}{\\sqrt{2}} = \\frac{2y'}{\\sqrt{2}} = \\sqrt{2}y'$$\nSo $$y' = \\frac{y-x}{\\sqrt{2}}$$\n- Step 3: Substitute into the original ellipse equation:\n$$\\frac{(x+y)^2}{2a^2} + \\frac{(y-x)^2}{2b^2} = 1$$\nOr equivalently: $$\\frac{(x+y)^2}{2a^2} + \\frac{(x-y)^2}{2b^2} = 1$$ (since $$(y-x)^2 = (x-y)^2$$)", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "The chord of the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ has gradient $$k$$. Show that the locus of midpoints of all such chords is given by $$ka^2y + b^2x = 0$$. (3 steps)", "answer": "- Step 1: Let the endpoints of the chord be $$P(a\\cos\\theta_1, b\\sin\\theta_1)$$ and $$Q(a\\cos\\theta_2, b\\sin\\theta_2)$$. The midpoint $$M(x, y)$$ has coordinates:\n$$x = \\frac{a(\\cos\\theta_1 + \\cos\\theta_2)}{2}, \\quad y = \\frac{b(\\sin\\theta_1 + \\sin\\theta_2)}{2}$$\n- Step 2: The gradient of chord $$PQ$$ is:\n$$\\frac{b(\\sin\\theta_1 - \\sin\\theta_2)}{a(\\cos\\theta_1 - \\cos\\theta_2)} = \\frac{b \\cdot 2\\cos(\\frac{\\theta_1+\\theta}{2})\\sin(\\frac{\\theta_1-\\theta}{2})}{a \\cdot (-2\\sin(\\frac{\\theta_1+\\theta}{2})\\sin(\\frac{\\theta_1-\\theta}{2}))} = -\\frac{b}{a} \\cot\\left(\\frac{\\theta_1+\\theta_2}{2}\\right)$$\nSetting this equal to $$k$$:\n$$k = -\\frac{b}{a} \\cot\\left(\\frac{\\theta_1+\\theta_2}{2}\\right)$$\nSo $$\\cot\\left(\\frac{\\theta_1+\\theta_2}{2}\\right) = -\\frac{ak}{b}$$\n- Step 3: Using sum-to-product formulas:\n$$\\cos\\theta_1 + \\cos\\theta_2 = 2\\cos\\left(\\frac{\\theta_1+\\theta_2}{2}\\right)\\cos\\left(\\frac{\\theta_1-\\theta_2}{2}\\right)$$\n$$\\sin\\theta_1 + \\sin\\theta_2 = 2\\sin\\left(\\frac{\\theta_1+\\theta_2}{2}\\right)\\cos\\left(\\frac{\\theta_1-\\theta_2}{2}\\right)$$\nDividing: $$\\frac{\\sin\\theta_1 + \\sin\\theta_2}{\\cos\\theta_1 + \\cos\\theta_2} = \\tan\\left(\\frac{\\theta_1+\\theta_2}{2}\\right)$$\nSo $$y/x = \\frac{b}{a} \\tan\\left(\\frac{\\theta_1+\\theta_2}{2}\\right)$$. Since $$\\tan = \\frac{1}{\\cot}$$, we have $$\\tan\\left(\\frac{\\theta_1+\\theta_2}{2}\\right) = -\\frac{b}{ak}$$.\nThus $$\\frac{y}{x} = \\frac{b}{a} \\cdot (-\\frac{b}{ak}) = -\\frac{b^2}{ak}$$\nCross-multiplying: $$aky = -b^2x$$\nOr: $$ka^2y + b^2x = 0$$", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Find the equations of the tangents from the origin to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$. (2 steps)", "answer": "- Step 1: Let the tangent from the origin be $$y = mx$$. Since it passes through the origin ($$c = 0$$ in $$y = mx + c$$), the tangency condition from earlier is $$b^2 + 0^2 = a^2m^2$$, so $$m^2 = \\frac{b^2}{a^2}$$, giving $$m = \\pm\\frac{b}{a}$$.\n- Step 2: The two tangents from the origin are therefore $$y = \\frac{b}{a}x$$ and $$y = -\\frac{b}{a}x$$. These are exactly the asymptotes of the hyperbola.\n+ This makes geometric sense: the asymptotes can be thought of as \"tangents at infinity\" — lines that the hyperbola approaches but never meets. From the origin, which lies inside the hyperbola (actually outside the hyperbola for standard form), you can draw exactly two real tangents, which happen to coincide with the asymptotes.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": true}, {"question": "For the ellipse with equation $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ where $$a > b$$, prove that the focus-directrix property gives the relationship $$b^2 = a^2(1 - e^2)$$. (3 steps)", "answer": "- Step 1: Let the focus be at $$(ae, 0)$$ and the directrix be $$x = \\frac{a}{e}$$. For a point $$P(x, y)$$ on the ellipse, by definition $$\\frac{PS}{PM} = e$$, so $$PS^2 = e^2 \\cdot PM^2$$.\n- Step 2: Compute distances:\n$$PS^2 = (x - ae)^2 + y^2$$\n$$PM^2 = \\left(\\frac{a}{e} - x\\right)^2 = \\frac{(a - ex)^2}{e^2}$$\nSo: $$(x - ae)^2 + y^2 = e^2 \\cdot \\frac{(a - ex)^2}{e^2} = (a - ex)^2$$\n- Step 3: Expanding and simplifying:\n$$x^2 - 2aex + a^2e^2 + y^2 = a^2 - 2aex + e^2x^2$$\n$$x^2(1 - e^2) + y^2 = a^2(1 - e^2)$$\n$$\\frac{x^2}{a^2} + \\frac{y^2}{a^2(1 - e^2)} = 1$$\nComparing with the standard form $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$, we see that:\n$$b^2 = a^2(1 - e^2)$$\n+ This derivation also shows why we need $$0 < e < 1$$ for an ellipse — if $$e \\geq 1$$, the RHS would be non-positive, giving a hyperbola instead.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": true}, {"question": "A conic has focus $$(4, 0)$$ and directrix $$x = 2$$. Find its equation and i
