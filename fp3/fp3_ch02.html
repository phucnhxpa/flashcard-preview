dentify the type of conic. (3 steps)", "answer": "- Step 1: The focus is at $$(ae, 0) = (4, 0)$$, so $$ae = 4$$. The directrix is at $$x = \\frac{a}{e} = 2$$.\n- Step 2: From these: $$ae = 4$$ and $$\\frac{a}{e} = 2$$. Multiply: $$a^2 = 8$$, so $$a = \\sqrt{8} = 2\\sqrt{2}$$. Then $$e = \\frac{4}{a} = \\frac{4}{2\\sqrt{2}} = \\sqrt{2}$$.\n- Step 3: Since $$e = \\sqrt{2} > 1$$, this is a hyperbola. Using the focus-directrix derivation with these values:\n$$b^2 = a^2(e^2 - 1) = 8(2 - 1) = 8$$\nThe equation is $$\\frac{x^2}{8} - \\frac{y^2}{8} = 1$$, or $$x^2 - y^2 = 8$$.\n+ Alternatively, we could derive it directly from the definition: for any point $$(x, y)$$, $$\\frac{\\sqrt{(x-4)^2 + y^2}}{|x-2|} = \\sqrt{2}$$. Squaring and simplifying leads to the same result.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Find the locus of points $$P$$ such that the difference of distances from $$P$$ to two fixed points $$S$$ and $$S'$$ is constant (equal to $$2a$$). What type of curve is this? (2 steps)", "answer": "- Step 1: Let the two fixed points be $$S(c, 0)$$ and $$S'(-c, 0)$$. For any point $$P(x, y)$$, the condition is $$|PS - PS'| = 2a$$, where $$0 < 2a < 2c$$ (the constant must be less than the distance between the foci).\n- Step 2: Squaring and simplifying (or recognizing the standard form):\n$$PS - PS' = \\pm 2a$$\nThis leads to the equation $$\\frac{x^2}{a^2} - \\frac{y^2}{c^2 - a^2} = 1$$.\nThis is a hyperbola with transverse axis along the x-axis. The distance between the foci is $$2c$$, and the distance between the vertices is $$2a$$.\n+ For the special case where the constant equals the distance between foci ($$2a = 2c$$), we get a degenerate hyperbola — two intersecting lines. For $$2a > 2c$$, there would be no points satisfying the condition.\n+ For ellipses, the sum of distances is constant; for hyperbolas, the difference is constant.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "Explain why the rectangular hyperbola $$xy = c^2$$ has perpendicular asymptotes, and find its eccentricity. (2 steps)", "answer": "- Step 1: The asymptotes are found by considering large values of $$x$$ and $$y$$. As $$x \\to \\infty$$, $$y = \\frac{c^2}{x} \\to 0$$, so one asymptote is the x-axis ($$y = 0$$). Similarly, as $$y \\to \\infty$$, $$x = \\frac{c^2}{y} \\to 0$$, so the y-axis ($$x = 0$$) is the other asymptote.\n- Step 2: These asymptotes are perpendicular because they are the coordinate axes, which meet at $$90^\\circ$$. For a rectangular hyperbola in the standard form $$\\frac{x^2}{a^2} - \\frac{y^2}{a^2} = 1$$ (i.e., $$x^2 - y^2 = a^2$$), the asymptotes are $$y = \\pm x$$, which are also perpendicular.\n+ For the standard rectangular hyperbola $$x^2 - y^2 = a^2$$, we have $$b = a$$. The eccentricity satisfies $$b^2 = a^2(e^2 - 1)$$, so $$a^2 = a^2(e^2 - 1)$$, giving $$e^2 = 2$$, so $$e = \\sqrt{2}$$. This is the eccentricity of any rectangular hyperbola.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": true}, {"question": "The point $$P$$ lies on the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$. The foot of the perpendicular from $$P$$ to the line $$y = k$$ is $$N$$, and $$M$$ is the midpoint of $$PN$$. Find the locus of $$M$$ as $$P$$ moves on the ellipse. (3 steps)", "answer": "- Step 1: Let $$P = (a\\cos t, b\\sin t)$$. The foot of the perpendicular from $$P$$ to $$y = k$$ is $$N = (a\\cos t, k)$$.\n- Step 2: The midpoint $$M(x, y)$$ has coordinates:\n$$x = \\frac{a\\cos t + a\\cos t}{2} = a\\cos t$$\n$$y = \\frac{b\\sin t + k}{2}$$\n- Step 3: We need to eliminate the parameter $$t$$. From the x-coordinate: $$\\cos t = \\frac{x}{a}$$. From the ellipse equation, $$\\sin t = \\frac{b}{a}\\sqrt{a^2 - x^2}$$ (taking appropriate sign). Alternatively:\n$$\\sin t = \\frac{2y - k}{b}$$\nUsing $$\\cos^2 t + \\sin^2 t = 1$$:\n$$\\left(\\frac{x}{a}\\right)^2 + \\left(\\frac{2y - k}{b}\\right)^2 = 1$$\n$$\\frac{x^2}{a^2} + \\frac{(2y - k)^2}{b^2} = 1$$\nThis is the locus of $$M$$ — another ellipse, shifted vertically by $$\\frac{k}{2}$$.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "The normal at $$P(ap^2, 2ap)$$ to the parabola $$y^2 = 4ax$$ meets the normal at $$Q(aq^2, 2aq)$$ at $$R$$. Given that the chord $$PQ$$ passes through the focus $$(a, 0)$$, show that the locus of $$R$$ is $$y^2 = a(x - 3a)$$. (3 steps)", "answer": "- Step 1: The equation of the normal at $$(at^2, 2at)$$ is $$y + tx = 2at + at^3$$. For $$P(p)$$ and $$Q(q)$$:\nNormal at $$P$$: $$y + px = 2ap + ap^3$$\nNormal at $$Q$$: $$y + qx = 2aq + aq^3$$\nSubtracting: $$(p - q)x = 2a(p - q) + a(p^3 - q^3)$$\n$$(p - q)x = 2a(p - q) + a(p - q)(p^2 + pq + q^2)$$\nDividing by $$(p - q)$$ (assuming $$p \\neq q$$):\n$$x = 2a + a(p^2 + pq + q^2)$$\n- Step 2: The chord $$PQ$$ passes through focus $$(a, 0)$$. Equation of chord:\n$$y - 2ap = \\frac{2ap - 2aq}{ap^2 - aq^2}(x - ap^2) = \\frac{2a(p - q)}{a(p^2 - q^2)}(x - ap^2)$$\n$$= \\frac{2}{p + q}(x - ap^2)$$\nSince $$(a, 0)$$ lies on this:\n$$0 - 2ap = \\frac{2}{p + q}(a - ap^2)$$\n$$-ap(p + q) = a - ap^2$$\n$$-ap^2 - apq = a - ap^2$$\n$$-apq = a$$\n$$pq = -1$$\n- Step 3: With $$pq = -1$$, the x-coordinate of $$R$$ becomes:\n$$x = 2a + a(p^2 + q^2) = 2a + a((p + q)^2 - 2pq) = 2a + a((p + q)^2 + 2)$$\nSo $$x - 3a = a(p + q)^2$$\nFor the y-coordinate, substitute back:\nFrom the normal equations: $$y = 2ap + ap^3 - px = 2ap + ap^3 - p(2a + a(p^2 + q^2 + 1))$$ (using the x expression)\nAfter simplification: $$y = -apq(p + q) = a(p + q)$$ (using $$pq = -1$$)\nSo $$y^2 = a^2(p + q)^2 = a(x - 3a)$$ (substituting from above)\nThus the locus is $$y^2 = a(x - 3a)$$.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "For the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with $$a > b$$, show that the point $$(0, b)$$ on the ellipse and the focus $$S(ae, 0)$$ satisfy $$\\cos(\\angle PSO) = e$$, where $$O$$ is the origin. (3 steps)", "answer": "- Step 1: The point $$(0, b)$$ corresponds to $$t = \\frac{\\pi}{2}$$ in parametric form, so $$P = (0, b)$$. The focus is $$S = (ae, 0)$$ and the other focus is $$S' = (-ae, 0)$$. The origin is $$O = (0, 0)$$.\n- Step 2: We need to find $$\\angle PSO$$, the angle at $$S$$ between lines to $$P$$ and to $$O$$. Actually, wait — the notation $$\\cos(\\angle PSS')$$ would make more sense. Let me reconsider: perhaps it's $$\\angle PSO$$ where we consider triangle $$POS$$? Let me check: if it's $$\\angle PSS'$$, that's the angle at focus between lines to point $$P$$ and to other focus.\n+ Actually looking at the problem statement: \"Show that $$\\cos(\\angle P S S') = e$$\". This is angle at focus $$S$$ in triangle $$PSS'$$. Let me work with that.\n- Step 3: In triangle $$PSS'$$, we have $$P = (0, b)$$, $$S = (ae, 0)$$, $$S' = (-ae, 0)$$.\nThe side lengths: $$PS = \\sqrt{(ae - 0)^2 + (0 - b)^2} = \\sqrt{a^2e^2 + b^2}$$\nUsing $$b^2 = a^2(1 - e^2)$$: $$PS = \\sqrt{a^2e^2 + a^2(1 - e^2)} = \\sqrt{a^2} = a$$\nSimilarly, $$PS' = \\sqrt{(-ae - 0)^2 + b^2} = \\sqrt{a^2e^2 + b^2} = a$$ as well.\nAnd $$SS' = 2ae$$.\nBy the cosine rule in triangle $$PSS'$$:\n$$\\cos(\\angle PSS') = \\frac{PS^2 + SS'^2 - PS'^2}{2 \\cdot PS \\cdot SS'} = \\frac{a^2 + (2ae)^2 - a^2}{2 \\cdot a \\cdot 2ae} = \\frac{4a^2e^2}{4a^2e} = e$$\n+ So indeed, $$\\cos(\\angle PSS') = e$$.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "Find the equations of the asymptotes of the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ and explain why the hyperbola does not intersect the y-axis. (2 steps)", "answer": "- Step 1: To find asymptotes, consider the hyperbola equation for large values of $$x$$ and $$y$$:\n$$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1 \\implies \\frac{x^2}{a^2} \\approx \\frac{y^2}{b^2}$$\nTaking square roots (considering both positive and negative):\n$$y \\approx \\pm\\frac{b}{a}x$$\nThese are the equations of the asymptotes: $$y = \\frac{b}{a}x$$ and $$y = -\\frac{b}{a}x$$.\n- Step 2: The hyperbola does not intersect the y-axis because setting $$x = 0$$ in the equation gives:\n$$-\\frac{y^2}{b^2} = 1 \\implies y^2 = -b^2$$\nThis has no real solutions (since $$b^2 > 0$$). The hyperbola's branches lie entirely to the left and right of the y-axis.\n+ The vertices (where the hyperbola crosses the x-axis) are at $$(\\pm a, 0)$$. The closest the hyperbola gets to the y-axis is at these vertex points, at a distance of $$a$$ from the origin.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "A tangent to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ makes equal intercepts on the coordinate axes. Find the equation of this tangent in terms of $$a$$ and $$b$$. (2 steps)", "answer": "- Step 1: A line making equal intercepts on the axes has equation $$x + y = c$$ (or more generally $$x + y = c$$, where the intercepts are both $$c$$).\n+ Actually, a line with x-intercept $$k$$ and y-intercept $$k$$ has equation $$\\frac{x}{k} + \\frac{y}{k} = 1$$ or $$x + y = k$$.\n- Step 2: For this to be a tangent to the ellipse, use the condition from earlier: $$b^2 + a^2m^2 = c^2$$.\nHere $$m = -1$$ (since $$y = -x + c$$, or equivalently $$y = mx + c$$ with $$m = -1$$).\nSo: $$b^2 + a^2(-1)^2 = c^2 \\implies b^2 + a^2 = c^2 \\implies c = \\sqrt{a^2 + b^2}$$\nThe tangent equation is $$x + y = \\sqrt{a^2 + b^2}$$.\n+ Alternatively, using the point form: for a tangent making equal intercepts, it touches the ellipse at a point where $$\\cos t = \\sin t$$ (i.e., $$t = \\frac{\\pi}{4}$$), giving point $$(\\frac{a}{\\sqrt{2}}, \\frac{b}{\\sqrt{2}})$$. The tangent there is $$\\frac{x}{a\\sqrt{2}} + \\frac{y}{b\\sqrt{2}} = 1$$ or $$bx + ay = ab\\sqrt{2}$$. This is equivalent to $$x + y = \\sqrt{a^2 + b^2}$$ only when $$a = b$$. I made an error — let's re-examine.\n\nActually, the general line with equal intercepts is $$x + y = c$$. Using condition $$b^2 + a^2 = c^2$$ gives the result above. But wait, this assumes the line is $$y = -x + c$$ which has gradient $$-1$$. Let me verify:\nThe line is $$x + y = c \\implies y = -x + c$$, so $$m = -1$$. The intercepts are both $$c$$.\nCondition: $$b^2 + a^2m^2 = c^2 \\implies b^2 + a^2 = c^2$$.\nSo the tangent is $$x + y = \\sqrt{a^2 + b^2}$$. Correct!", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "The tangent to the hyperbola $$x^2 - y^2 = a^2$$ at point $$P$$ meets the asymptotes at $$A$$ and $$B$$. Prove that $$P$$ is the midpoint of $$AB$$. (3 steps)", "answer": "- Step 1: The hyperbola can be written as $$\\frac{x^2}{a^2} - \\frac{y^2}{a^2} = 1$$, so it's a rectangular hyperbola with $$b = a$$. The asymptotes are $$y = \\pm x$$.\nLet the point $$P$$ be $$(a\\sec\\theta, a\\tan\\theta)$$ on the hyperbola.\n- Step 2: The tangent at $$P$$ is $$ax\\sec\\theta - ay\\tan\\theta = a^2$$.\nFind intersection with asymptote $$y = x$$ (i.e., $$A$$):\nSubstitute $$y = x$$: $$ax\\sec\\theta - ax\\tan\\theta = a^2 \\implies x(\\sec\\theta - \\tan\\theta) = a$$\nSo $$x = \\frac{a}{\\sec\\theta - \\tan\\theta} = \\frac{a(\\sec\\theta + \\tan\\theta)}{\\sec^2\\theta - \\tan^2\\theta} = a(\\sec\\theta + \\tan\\theta)$$ (using $$1 = \\sec^2\\theta - \\tan^2\\theta$$)\nThus $$A = (a(\\sec\\theta + \\tan\\theta), a(\\sec\\theta + \\tan\\theta))$$\n- Step 3: Intersection with $$y = -x$$ (i.e., $$B$$):\nSubstitute $$y = -x$$: $$ax\\sec\\theta + ax\\tan\\theta = a^2 \\implies x(\\sec\\theta + \\tan\\theta) = a$$\nSo $$x = \\frac{a}{\\sec\\theta + \\tan\\theta} = a(\\sec\\theta - \\tan\\theta)$$\nThus $$B = (a(\\sec\\theta - \\tan\\theta), -a(\\sec\\theta - \\tan\\theta))$$\nThe midpoint has x-coordinate: $$\\frac{a(\\sec\\theta + \\tan\\theta) + a(\\sec\\theta - \\tan\\theta)}{2} = \\frac{2a\\sec\\theta}{2} = a\\sec\\theta$$ (the x-coordinate of $$P$$)\nThe midpoint has y-coordinate: $$\\frac{a(\\sec\\theta + \\tan\\theta) - a(\\sec\\theta - \\tan\\theta)}{2} = \\frac{2a\\tan\\theta}{2} = a\\tan\\theta$$ (the y-coordinate of $$P$$)\nSo the midpoint is indeed $$P$$.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": true}, {"question": "The ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ has its major axis along the y-axis (i.e., $$b > a$$). State the positions of the foci, directrices, and write the eccentricity formula for this case. (2 steps)", "answer": "- Step 1: When the major axis is vertical ($$b > a$$), the roles of $$a$$ and $$b$$ swap. The foci are now on the y-axis at $$(0, \\pm be)$$, and the directrices are horizontal lines $$y = \\pm\\frac{b}{e}$$.\n- Step 2: The eccentricity relationship becomes $$a^2 = b^2(1 - e^2)$$ instead of $$b^2 = a^2(1 - e^2)$$.\n+ This comes from the same derivation but with the focus at $$(0, be)$$ and directrix $$y = \\frac{b}{e}$$.\n+ For example, for $$\\frac{x^2}{16} + \\frac{y^2}{25} = 1$$, we have $$a = 4, b = 5$$. Then $$a^2 = b^2(1 - e^2)$$ gives $$16 = 25(1 - e^2)$$, so $$e^2 = \\frac{9}{25}$$, $$e = \\frac{3}{5}$$. The foci are at $$(0, \\pm 5 \\cdot \\frac{3}{5}) = (0, \\pm 3)$$, and directrices at $$y = \\pm\\frac{5}{3}$$.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "Prove that the chord joining the points $$P(ct, \\frac{c}{t})$$ and $$Q(cs, \\frac{c}{s})$$ on the rectangular hyperbola $$xy = c^2$$ has equation $$yts + x = c(t + s)$$. (2 steps)", "answer": "- Step 1: The two-point form of a line through $$(x_1, y_1)$$ and $$(x_2, y_2)$$ is:\n$$\\frac{y - y_1}{y_2 - y_1} = \\frac{x - x_1}{x_2 - x_1}$$\nSubstituting $$P(ct, \\frac{c}{t})$$ and $$Q(cs, \\frac{c}{s})$$:\n$$\\frac{y - \\frac{c}{t}}{\\frac{c}{s} - \\frac{c}{t}} = \\frac{x - ct}{cs - ct}$$\n- Step 2: Simplify:\n$$\\frac{y - \\frac{c}{t}}{c(\\frac{1}{s} - \\frac{1}{t})} = \\frac{x - ct}{c(s - t)}$$\n$$\\frac{y - \\frac{c}{t}}{\\frac{c(t - s)}{st}} = \\frac{x - ct}{c(s - t)}$$\n$$\\frac{y - \\frac{c}{t}}{-\\frac{c(s - t)}{st}} = \\frac{x - ct}{c(s - t)}$$\n$$(y - \\frac{c}{t})(-\\frac{st}{c}) = \\frac{x - ct}{c}$$\nMultiply by $$c$$:\n$$-sty + s = x - ct$$\nRearrange:\n$$x + sty = c(t + s)$$\nOr equivalently:\n$$yts + x = c(t + s)$$", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "Find the condition for the line $$y = mx + c$$ to be a normal to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$. (3 steps)", "answer": "- Step 1: A line is a normal if it is perpendicular to the tangent at the point of contact. The tangent at $$(a\\cos t, b\\sin t)$$ has gradient $$-\\frac{b}{a}\\cot t$$.\n- Step 2: Therefore, the normal at this point has gradient $$\\frac{a}{b}\\tan t$$.\nThe equation of the normal is $$y - b\\sin t = \\frac{a}{b}\\tan t (x - a\\cos t)$$.\nRewrite in the form $$y = mx + c$$:\n$$y - b\\sin t = \\frac{a\\sin t}{b\\cos t}(x - a\\cos t)$$\nMultiply by $$b\\cos t$$:\n$$b y \\cos t - b^2 \\sin t \\cos t = a x \\sin t - a^2 \\sin t \\cos t$$\n$$a x \\sin t - b y \\cos t = (a^2 - b^2)\\sin t \\cos t$$\n- Step 3: For this to be in the form $$y = mx + c$$, solve for $$y$$:\n$$-b y \\cos t = (a^2 - b^2)\\sin t \\cos t - a x \\sin t$$\n$$y = \\frac{a}{b}x\\tan t - \\frac{(a^2 - b^2)}{b}\\sin t$$\nSo the gradient is $$m = \\frac{a}{b}\\tan t$$.\nThe condition for a line to be a normal is that there exists a parameter $$t$$ such that this relationship holds.\n+ More directly: the condition for $$y = mx + c$$ to be a normal to the ellipse is obtained by comparing coefficients. From the normal equation: $$ax\\sin t - by\\cos t = (a^2 - b^2)\\sin t\\cos t$$, we can rewrite as:\n$$y = \\frac{a}{b}x\\tan t - \\frac{(a^2 - b^2)}{b}\\sin t$$\nSo we need $$m = \\frac{a}{b}\\tan t$$ for some real $$t$$. This requires that $$\\frac{bm}{a}$$ lies in the range of $$\\tan t$$, i.e., $$|\\frac{bm}{a}| \\geq 1$$ (since $$\\tan t$$ can take any real value).\nActually wait: $$\\tan t$$ can take any real value from $$-\\infty$$ to $$\\infty$$. So the condition is simply that there exists $$t$$ with $$\\tan t = \\frac{bm}{a}$$. That's always possible. But we also need the intercept to match:\n$$c = -\\frac{(a^2 - b^2)}{b}\\sin t = -\\frac{(a^2 - b^2)}{b} \\cdot \\frac{m}{\\sqrt{a^2 + b^2m^2}}$$ (using $$\\sin t = \\frac{\\tan t}{\\sqrt{1 + \\tan^2 t}} = \\frac{bm/a}{\\sqrt{1 + b^2m^2/a^2}}$$).\nThis is the required condition.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "A point $$P$$ lies on the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$. The tangent at $$P$$ meets the directrix at $$D$$. Prove that $$PD = \\frac{PS}{e}$$, where $$S$$ is the corresponding focus. (3 steps)", "answer": "- Step 1: Let the focus be at $$(ae, 0)$$ and directrix be $$x = \\frac{a}{e}$$. Let the point be $$P(a\\cos t, b\\sin t)$$. The tangent at $$P$$ is $$bx\\cos t + ay\\sin t = ab$$.\n- Step 2: Find intersection $$D$$ with the directrix $$x = \\frac{a}{e}$$:\nSubstitute into tangent: $$b(\\frac{a}{e})\\cos t + ay\\sin t = ab$$\n$$ab\\frac{\\cos t}{e} + ay\\sin t = ab$$\n$$ay\\sin t = ab(1 - \\frac{\\cos t}{e})$$\n$$y = \\frac{b(1 - \\frac{\\cos t}{e})}{\\sin t} = \\frac{b(e - \\cos t)}{e\\sin t}$$\nSo $$D = \\left(\\frac{a}{e}, \\frac{b(e - \\cos t)}{e\\sin t}\\right)$$.\n- Step 3: Now compute distances:\n$$PS^2 = (a\\cos t - ae)^2 + (b\\sin t)^2 = a^2(\\cos t - e)^2 + b^2\\sin^2 t$$\nUsing $$b^2 = a^2(1 - e^2)$$ and simplifying:\n$$PS = a(1 - e\\cos t)$$ (for appropriate branch)\nNow $$PD$$ is the distance from $$P(a\\cos t, b\\sin t)$$ to $$D(\\frac{a}{e}, \\frac{b(e - \\cos t)}{e\\sin t})$$:\nThe horizontal distance is $$a\\cos t - \\frac{a}{e} = a(\\cos t - \\frac{1}{e})$$.\nThe vertical distance is $$b\\sin t - \\frac{b(e - \\cos t)}{e\\sin t} = b\\left(\\sin t - \\frac{e - \\cos t}{e\\sin t}\\right) = b\\left(\\frac{e\\sin^2 t - e + \\cos t}{e\\sin t}\\right)$$.\nActually, it's easier to use similar triangles or the focus-directrix property directly:\nFrom the definition, $$PS = e \\cdot PM$$ where $$M$$ is the foot to the directrix. And by similar triangles in the tangent-directrix configuration, one can show that $$PD = \\frac{PM}{e}$$. Thus $$PD = \\frac{PS}{e^2} \\cdot \\frac{1}{e} = \\frac{PS}{e}$$? Wait, that's wrong. Let me reconsider.\n\nActually, from the focus-directrix definition: $$PS = e \\cdot PM$$.\nThe distance from point to directrix along the perpendicular is $$PM = \\frac{a}{e} - x$$.\nIn the right triangle formed by $$P$$, the foot to the directrix, and the intersection of tangent with directrix, there is a relationship. The tangent makes an angle with the directrix. Actually, a simpler approach:\nFrom similar triangles in the geometry, we can show that $$PD:PM = PM:PS$$ (the tangent and line to focus are isogonal conjugates with respect to the normal). Thus $$PD = \\frac{PM^2}{PS} = \\frac{(PS/e)^2}{PS} = \\frac{PS}{e^2}$$.\nThat doesn't match. Let me re-derive:\nActually, using coordinates is safest. The result should be $$PD = \\frac{PS}{e}$$.\nLet me verify with a specific example. For ellipse with $$a=5, b=3$$ (so $$e=\\frac{4}{5}$$), take point $$t=0$$: $$P(5, 0)$$. The focus is at $$(4, 0)$$, so $$PS = 1$$. The tangent is $$x=5$$ (vertical line). The directrix is $$x = \\frac{5}{e} = \\frac{25}{4} = 6.25$$. The intersection is at $$(6.25, 0)$$. So $$PD = 1.25$$. And $$\\frac{PS}{e} = \\frac{1}{0.8} = 1.25$$. Yes! So $$PD = \\frac{PS}{e}$$.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": true}, {"question": "Find the coordinates of the center of the circle passing through the origin $$O$$, a point $$P(at^2, 2at)$$ on the parabola $$y^2 = 4ax$$, and the point $$T$$ where the tangent at $$P$$ meets the y-axis. (3 steps)", "answer": "- Step 1: The point on the parabola is $$P(at^2, 2at)$$. The tangent at $$P$$ is given by $$ty = x + at^2$$. Setting $$x = 0$$ (y-axis), we get $$ty = at^2$$, so $$y = at$$. Thus $$T = (0, at)$$.\n- Step 2: Let the circumcenter be $$C(h, k)$$. Since it's equidistant from $$O, P, T$$:\n$$OC^2 = PC^2 = TC^2$$\nFrom $$OC^2 = TC^2$$:\n$$h^2 + k^2 = h^2 + (k - at)^2$$\n$$k^2 = k^2 - 2ak t + a^2t^2$$\n$$2ak t = a^2t^2$$\nIf $$t \\neq 0$$, then $$k = \\frac{at}{2}$$.\n- Step 3: From $$OC^2 = PC^2$$:\n$$h^2 + k^2 = (h - at^2)^2 + (k - 2at)^2$$\nSubstituting $$k = \\frac{at}{2}$$:\n$$h^2 + \\frac{a^2t^2}{4} = h^2 - 2ah t^2 + a^2t^4 + \\frac{a^2t^2}{4} - 2ak t + 4a^2t^2$$\nWait, let's do this carefully:\n$$(k - 2at)^2 = (\\frac{at}{2} - 2at)^2 = (-\\frac{3at}{2})^2 = \\frac{9a^2t^2}{4}$$\nSo: $$h^2 + \\frac{a^2t^2}{4} = (h - at^2)^2 + \\frac{9a^2t^2}{4}$$\n$$h^2 + \\frac{a^2t^2}{4} = h^2 - 2ah t^2 + a^2t^4 + \\frac{9a^2t^2}{4}$$\nCancelling $$h^2$$ and multiplying by 4:\n$$a^2t^2 = -8ah t^2 + 4a^2t^4 + 9a^2t^2$$\n$$0 = -8ah t^2 + 4a^2t^2 + 4a^2t^4$$\nDividing by $$4a t^2$$ (assuming $$t \\neq 0$$):\n$$0 = -2h + at + at^3$$\n$$2h = at + at^3$$\n$$h = \\frac{at}{2} + \\frac{at^3}{2} = \\frac{a}{2}(t + t^3)$$\nSo the center is $$\\left(\\frac{a}{2}(t + t^3), \\frac{at}{2}\\right)$$ or $$\\left(\\frac{at^2}{2} + a, \\frac{at}{2}\\right)$$.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "The ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ is rotated clockwise through an angle $$\\alpha$$ about the origin. Find the equation of the rotated ellipse. (2 steps)", "answer": "- Step 1: A rotation clockwise by angle $$\\alpha$$ corresponds to the transformation:\n$$x = X\\cos\\alpha + Y\\sin\\alpha$$\n$$y = -X\\sin\\alpha + Y\\cos\\alpha$$\nwhere $$(X, Y)$$ are the coordinates in the original (unrotated) system, and $$(x, y)$$ are the rotated coordinates.\nAlternatively, to express the original coordinates in terms of the new:\n$$X = x\\cos\\alpha - y\\sin\\alpha$$\n$$Y = x\\sin\\alpha + y\\cos\\alpha$$\n- Step 2: Substituting into the original equation:\n$$\\frac{(x\\cos\\alpha - y\\sin\\alpha)^2}{a^2} + \\frac{(x\\sin\\alpha + y\\cos\\alpha)^2}{b^2} = 1$$\nExpanding:\n$$\\frac{x^2\\cos^2\\alpha - 2xy\\sin\\alpha\\cos\\alpha + y^2\\sin^2\\alpha}{a^2} + \\frac{x^2\\sin^2\\alpha + 2xy\\sin\\alpha\\cos\\alpha + y^2\\cos^2\\alpha}{b^2} = 1$$\nGrouping terms:\n$$x^2\\left(\\frac{\\cos^2\\alpha}{a^2} + \\frac{\\sin^2\\alpha}{b^2}\\right) + y^2\\left(\\frac{\\sin^2\\alpha}{a^2} + \\frac{\\cos^2\\alpha}{b^2}\\right) + xy\\left(-\\frac{2\\sin\\alpha\\cos\\alpha}{a^2} + \\frac{2\\sin\\alpha\\cos\\alpha}{b^2}\\right) = 1$$\n$$x^2\\left(\\frac{\\cos^2\\alpha}{a^2} + \\frac{\\sin^2\\alpha}{b^2}\\right) + y^2\\left(\\frac{\\sin^2\\alpha}{a^2} + \\frac{\\cos^2\\alpha}{b^2}\\right) + 2xy\\sin\\alpha\\cos\\alpha\\left(\\frac{1}{b^2} - \\frac{1}{a^2}\\right) = 1$$", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "For the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, prove that the distance from any point on the hyperbola to either focus is always greater than $$a$$. (2 steps)", "answer": "- Step 1: For a point on the hyperbola, the difference in distances to the two foci is constant and equals $$2a$$. Let the distances be $$d_1$$ and $$d_2$$, with $$d_1 - d_2 = 2a$$ (for the right branch).\n- Step 2: Since both distances are positive, we have $$d_1 = d_2 + 2a > 2a > a$$ (since $$a > 0$$).\nThus any point on the hyperbola is at a distance greater than $$a$$ from either focus.\n+ This is analogous to the ellipse, where the sum of distances to foci is always greater than $$2a$$ (actually exactly equal to $$2a$$), and for the hyperbola, the difference is exactly $$2a$$.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "A hyperbola has asymptotes with equations $$y = \\pm mx$$ and passes through the point $$(a, 0)$$. Find its equation in terms of $$a$$ and $$m$$. (2 steps)", "answer": "- Step 1: The asymptotes of $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ are $$y = \\pm\\frac{b}{a}x$$. Given that these are $$y = \\pm mx$$, we have $$\\frac{b}{a} = m$$, so $$b = am$$.\n- Step 2: The hyperbola passes through $$(a, 0)$$. Substituting:\n$$\\frac{a^2}{a^2} - \\frac{0^2}{b^2} = 1 \\implies 1 = 1$$ ✓\nThis is always satisfied (any hyperbola of this form passes through $$(\\pm a, 0)$$).\nSo the equation is $$\\frac{x^2}{a^2} - \\frac{y^2}{a^2m^2} = 1$$, or equivalently $$m^2x^2 - y^2 = a^2m^2$$.\n+ Alternatively, $$x^2 - \\frac{y^2}{m^2} = a^2$$.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}], "count": 49}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What is a conic section, and how do the four major types (circle, ellipse, parabola, hyperbola) arise geometrically? (4 steps)", "answer": "- Step 1: A conic section is a curve obtained by slicing a double cone with a plane.\n- Step 2: The slicing angle determines the type:\n+ Plane perpendicular to the cone's axis → **circle**\n+ Plane tilted but still cutting through one cone fully → **ellipse** (closed)\n+ Plane parallel to the cone's slant edge → **parabola**\n+ Plane steep enough to cut both nappes → **hyperbola** (two branches)\n- Step 3: All conics share a unified algebraic structure (general second-degree equation $$Ax^2 + Bxy + Cy^2 + Dx + Ey + F = 0$$).\n- Step 4: They also share a unified focus-directrix definition with eccentricity $$e$$, classified by $$e < 1, e = 1, e > 1$$.\n\nTakeaway: One geometric idea (cone + plane) generates an entire family of curves, parameterised by a single intrinsic shape number.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Write down the standard Cartesian equation of an ellipse and explain what $$a$$ and $$b$$ represent geometrically. (3 steps)", "answer": "- Step 1: Standard equation: $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$.\n- Step 2: Setting $$y = 0$$ gives $$x = \\pm a$$, so the curve crosses the $$x$$-axis at $$(\\pm a, 0)$$ — meaning $$a$$ is the semi-axis length along the $$x$$-direction.\n- Step 3: Setting $$x = 0$$ gives $$y = \\pm b$$, so $$b$$ is the semi-axis length along the $$y$$-direction.\n\nTakeaway: $$a, b$$ are the half-lengths of the two principal axes; the larger one defines the **major axis**.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why does $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ produce a closed bounded curve, while $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ produces two unbounded branches? (3 steps)", "answer": "- Step 1: For the ellipse, both terms are non-negative and sum to 1, forcing $$|x| \\le a$$ and $$|y| \\le b$$ — both coordinates bounded.\n- Step 2: For the hyperbola, the minus sign allows rearrangement to $$\\frac{x^2}{a^2} = 1 + \\frac{y^2}{b^2} \\ge 1$$, so $$|x| \\ge a$$ but $$|y|$$ has no upper bound.\n- Step 3: A single sign flip in the equation transforms a closed \"stretched circle\" into two infinite branches stretching outward.\n\nTakeaway: The sign between the squared terms is what fundamentally distinguishes an ellipse from a hyperbola.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "State the parametric equations of a standard ellipse and explain why they correctly parameterise the curve. (3 steps)", "answer": "- Step 1: $$x = a\\cos t, \\; y = b\\sin t, \\; 0 \\le t < 2\\pi$$.\n- Step 2: Substitute into the Cartesian form: $$\\frac{(a\\cos t)^2}{a^2} + \\frac{(b\\sin t)^2}{b^2} = \\cos^2 t + \\sin^2 t = 1$$ — the Pythagorean identity guarantees every point lies on the ellipse.\n- Step 3: Geometrically, $$t$$ is NOT the angle from the centre to the point on the ellipse; it's the **eccentric angle** — the angle on a circle of radius $$a$$ (the auxiliary circle) from which the ellipse point is constructed by vertical scaling.\n\nTakeaway: The ellipse is a vertically-squashed circle, and the parametric form encodes this construction.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "What is the auxiliary circle of an ellipse, and how does it give geometric meaning to the parameter $$t$$? (3 steps)", "answer": "- Step 1: The auxiliary circle is the circle of radius $$a$$ centred at the origin — the smallest circle containing the ellipse, tangent at the major-axis vertices.\n- Step 2: For each angle $$t$$, the auxiliary circle has the point $$Q = (a\\cos t, a\\sin t)$$. The corresponding ellipse point is $$P = (a\\cos t, b\\sin t)$$ — obtained by scaling $$Q$$'s $$y$$-coordinate by $$b/a$$.\n- Step 3: So $$t$$ is the angle on the auxiliary circle (not on the ellipse itself); the ellipse is \"born\" by vertically squashing this circle.\n\nTakeaway: Many ellipse properties simplify by transferring to the auxiliary circle (where rotational symmetry holds), then mapping back.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "A common misconception: students think $$t$$ in $$x = a\\cos t, y = b\\sin t$$ represents the angle from the centre to the ellipse point. Why is this wrong? (3 steps)", "answer": "- Step 1: For a circle, the parameter does equal the central angle. Students extrapolate this incorrectly to ellipses.\n- Step 2: For an ellipse, the actual angle from the centre to point $$P(a\\cos t, b\\sin t)$$ is $$\\arctan\\left(\\tfrac{b\\sin t}{a\\cos t}\\right) = \\arctan\\left(\\tfrac{b}{a}\\tan t\\right)$$, which differs from $$t$$ unless $$a = b$$.\n- Step 3: $$t$$ is the eccentric angle — the angle on the auxiliary circle that gets vertically projected onto the ellipse.\n\nTakeaway: For non-circular conics, \"the parameter\" is a constructive device, not a direct geometric angle on the curve.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "An ellipse has equation $$4x^2 + 9y^2 = 36$$. Mentally find $$a$$, $$b$$, and write down parametric equations. (3 steps)", "answer": "- Step 1: Divide by 36 to standardise: $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$.\n- Step 2: Read off $$a^2 = 9 \\Rightarrow a = 3$$ and $$b^2 = 4 \\Rightarrow b = 2$$.\n- Step 3: Parametric form: $$x = 3\\cos t, \\; y = 2\\sin t, \\; 0 \\le t < 2\\pi$$.\n\nTakeaway: Always normalise to the form $$\\frac{x^2}{(\\cdot)} + \\frac{y^2}{(\\cdot)} = 1$$ first, then identify semi-axes.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "When the major axis of an ellipse is along the $$y$$-axis (i.e., $$b > a$$), what changes about the equation and the geometry?", "answer": "- Step 1: The equation form $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ is unchanged, but now $$b > a$$.\n- Step 2: The ellipse is \"tall and thin\" — extending to $$\\pm b$$ vertically (longer) and $$\\pm a$$ horizontally (shorter).\n- Step 3: The roles of major/minor axis swap, and consequently formulas for foci/directrices use $$b$$ in place of $$a$$ where the larger semi-axis is needed.\n\nTakeaway: The equation form is symmetric in $$a, b$$; whichever value is larger determines the major axis orientation.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "What is the standard Cartesian equation of a hyperbola, and how is it structurally related to the ellipse? (3 steps)", "answer": "- Step 1: $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$.\n- Step 2: It differs from the ellipse only by the sign of the second term — a single sign flip transforms a closed curve into two open branches.\n- Step 3: This algebraic kinship reflects geometric reality: ellipses and hyperbolas are both conic sections, with the sign capturing whether the cutting plane stays within one cone (ellipse) or breaks through both nappes (hyperbola).\n\nTakeaway: The hyperbola is the ellipse's \"mirror twin\" — same algebraic skeleton, opposite topological behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "For the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, where does it cross the axes, and why doesn't it cross one of them? (3 steps)", "answer": "- Step 1: Setting $$y = 0$$: $$x^2 = a^2 \\Rightarrow x = \\pm a$$ — two $$x$$-intercepts at $$(\\pm a, 0)$$, the vertices.\n- Step 2: Setting $$x = 0$$: $$-\\tfrac{y^2}{b^2} = 1 \\Rightarrow y^2 = -b^2$$, with no real solution.\n- Step 3: The curve has NO $$y$$-intercepts — it lives entirely in the regions $$|x| \\ge a$$, hence two disconnected branches.\n\nTakeaway: $$a$$ is the \"innermost reach\" of each branch; the curve never enters $$|x| < a$$.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Derive the equations of the asymptotes of $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ from intuition. (3 steps)", "answer": "- Step 1: For very large $$|x|, |y|$$, the constant 1 is negligible: $$\\frac{x^2}{a^2} \\approx \\frac{y^2}{b^2}$$.\n- Step 2: This gives $$\\frac{y}{x} \\approx \\pm \\frac{b}{a}$$, so the curve approaches the lines $$y = \\pm\\frac{b}{a}x$$ at infinity.\n- Step 3: These lines through the origin are the asymptotes — guides showing the slope of the branches as they extend.\n\nTakeaway: The slope ratio $$\\pm b/a$$ encodes how \"wide\" the hyperbola opens — small $$b/a$$ means tight branches close to the $$x$$-axis.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Why does the rectangular hyperbola $$x^2 - y^2 = a^2$$ have perpendicular asymptotes, and is it equivalent to $$xy = c^2$$? (3 steps)", "answer": "- Step 1: For $$x^2 - y^2 = a^2$$, asymptotes are $$y = \\pm x$$ (slopes $$+1, -1$$). Their gradient product is $$-1$$, so they are perpendicular — that's what \"rectangular\" means.\n- Step 2: $$xy = c^2$$ also has perpendicular asymptotes, namely $$x = 0$$ (the $$y$$-axis) and $$y = 0$$ (the $$x$$-axis).\n- Step 3: They are the same geometric shape but rotated by $$45°$$ relative to each other; the relationship is $$a^2 = 2c^2$$ (or $$a = c\\sqrt{2}$$).\n\nTakeaway: \"Rectangular hyperbola\" describes the shape (perpendicular asymptotes), not a unique equation form.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "State the two parametric forms for a standard hyperbola and the identity each is built from. (3 steps)", "answer": "- Step 1: Form 1 (hyperbolic): $$x = \\pm a\\cosh t, \\; y = b\\sinh t$$, $$t \\in \\mathbb{R}$$, built on $$\\cosh^2 t - \\sinh^2 t \\equiv 1$$.\n- Step 2: Form 2 (trigonometric): $$x = a\\sec\\theta, \\; y = b\\tan\\theta$$, with $$\\theta \\ne \\pm\\tfrac{\\pi}{2}$$, built on $$\\sec^2\\theta - \\tan^2\\theta \\equiv 1$$.\n- Step 3: Both identities have the form $$(\\cdot)^2 - (\\cdot)^2 = 1$$, exactly matching the Cartesian equation's structure.\n\nTakeaway: A \"minus identity\" is needed because the hyperbola has a minus in its equation; the two parameterisations are different but both satisfy this requirement.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Why must we write $$x = \\pm a\\cosh t$$ (with the $$\\pm$$) for a hyperbola, rather than just $$x = a\\cosh t$$? (3 steps)", "answer": "- Step 1: $$\\cosh t = \\tfrac{1}{2}(e^t + e^{-t}) \\ge 1 > 0$$ for all real $$t$$.\n- Step 2: So $$a\\cosh t \\ge a > 0$$, meaning a single parameterisation only covers the right branch ($$x \\ge a$$).\n- Step 3: To cover the left branch ($$x \\le -a$$), we need $$x = -a\\cosh t$$. The $$\\pm$$ notation indicates we use both versions for full coverage.\n\nTakeaway: Unlike $$\\sec\\theta$$ (which naturally takes both signs), $$\\cosh t$$ is always positive, so explicit branch selection is required.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "What is the strategic difference between using $$(\\pm a\\cosh t, b\\sinh t)$$ versus $$(a\\sec\\theta, b\\tan\\theta)$$ as the parameterisation for a hyperbola? (3 steps)", "answer": "- Step 1: cosh/sinh form has $$t \\in \\mathbb{R}$$ (no exclusions), but needs the $$\\pm$$ for both branches.\n- Step 2: sec/tan form needs $$\\theta \\ne \\pm\\pi/2$$ (excluding asymptotic directions), but a single parameter $$\\theta$$ covers both branches automatically.\n- Step 3: Use cosh/sinh when integrating or differentiating frequently (cleaner derivative structure); use sec/tan when leveraging trig identities or relating to circular trigonometry.\n\nTakeaway: Both are equivalent; choose the form aligned with the algebraic structure of your problem.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "A hyperbola has equation $$9x^2 - 4y^2 = 36$$. Mentally identify $$a, b$$, the asymptotes, and a parametric form. (3 steps)", "answer": "- Step 1: Divide by 36: $$\\frac{x^2}{4} - \\frac{y^2}{9} = 1$$, so $$a = 2, \\; b = 3$$.\n- Step 2: Asymptotes: $$y = \\pm\\frac{b}{a}x = \\pm\\frac{3}{2}x$$.\n- Step 3: Parametric form: $$x = \\pm 2\\cosh t, \\; y = 3\\sinh t$$ (or equivalently $$x = 2\\sec\\theta, \\; y = 3\\tan\\theta$$).\n\nTakeaway: Even though $$b > a$$ here, the foci stay on the $$x$$-axis (transverse axis) — unlike with an ellipse.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "How is a general conic section defined using a focus and directrix, and what role does eccentricity play? (3 steps)", "answer": "- Step 1: A conic is the locus of all points $$P$$ such that the ratio $$\\frac{PS}{PM}$$ is constant, where $$S$$ is a fixed point (the **focus**) and $$PM$$ is the perpendicular distance from $$P$$ to a fixed line (the **directrix**).\n- Step 2: This constant ratio is the **eccentricity** $$e$$, so $$PS = e \\cdot PM$$ for every point on the curve.\n- Step 3: The value of $$e$$ uniquely classifies the curve type:\n+ $$0 < e < 1$$: ellipse\n+ $$e = 1$$: parabola\n+ $$e > 1$$: hyperbola\n\nTakeaway: Eccentricity unifies all conics under a single geometric definition; the algebraic differences are encoded in this single number.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Why does $$0 < e < 1$$ produce a closed bounded curve while $$e > 1$$ produces an unbounded one? (3 steps)", "answer": "- Step 1: $$PS = e \\cdot PM$$ says the distance to the focus is $$e$$ times the distance to the directrix.\n- Step 2: For $$e < 1$$: as $$P$$ moves away, $$PS$$ grows only $$e$$ times as fast as $$PM$$. Geometric constraints eventually close the curve into an ellipse.\n- Step 3: For $$e > 1$$: $$PS$$ grows faster than $$PM$$, allowing $$P$$ to escape to infinity in two branches.\n\nTakeaway: $$e$$ measures how \"elongated\" the curve is; small $$e$$ means nearly circular, $$e$$ near 1 means very stretched ellipse or shallow parabola, large $$e$$ means wide-opening hyperbola.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Why does a circle correspond to $$e = 0$$ in the conic-section framework? (3 steps)", "answer": "- Step 1: For a circle, every point is equidistant from the centre. The \"focus\" coincides with the centre, and the directrix retreats to infinity.\n- Step 2: As $$e \\to 0$$, the directrix $$x = a/e$$ recedes to infinity, and $$PS = e \\cdot PM$$ becomes a degenerate $$0 \\cdot \\infty$$ form.\n- Step 3: Algebraically, $$b^2 = a^2(1 - 0) = a^2$$, giving $$a = b$$ and the equation reduces to $$x^2 + y^2 = a^2$$ — a circle.\n\nTakeaway: The circle is the limit of ellipses as $$e \\to 0$$; eccentricity is a continuous shape parameter unifying the family.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "For an ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with $$a > b$$, give the formulas for eccentricity, foci, and directrices. (3 steps)", "answer": "- Step 1: Eccentricity: $$b^2 = a^2(1 - e^2)$$, equivalently $$e = \\sqrt{1 - \\tfrac{b^2}{a^2}}$$, with $$0 < e < 1$$.\n- Step 2: Foci: $$(\\pm ae, 0)$$ — both on the major axis ($$x$$-axis here), INSIDE the ellipse.\n- Step 3: Directrices: $$x = \\pm\\tfrac{a}{e}$$ — vertical lines OUTSIDE the ellipse since $$\\tfrac{a}{e} > a$$ when $$e < 1$$.\n\nTakeaway: $$ae < a < a/e$$, so foci are between centre and vertex; directrices are beyond the curve.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Give an intuitive explanation of why $$b^2 = a^2(1 - e^2)$$ for an ellipse. (3 steps)", "answer": "- Step 1: When $$e = 0$$ (circle): $$b^2 = a^2(1 - 0) = a^2$$, giving $$b = a$$. ✓ (the ellipse is a circle).\n- Step 2: When $$e \\to 1$$ (very elongated): $$b^2 \\to 0$$, so $$b \\to 0$$. ✓ (the ellipse degenerates to a line segment).\n- Step 3: The formula smoothly interpolates: increasing $$e$$ from 0 to 1 progressively flattens the ellipse, shrinking $$b$$.\n\nTakeaway: $$e$$ literally measures \"how non-circular\" the ellipse is — its physical meaning is geometric flattening.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Walk through the derivation that the focus-directrix definition (with $$0 < e < 1$$, focus $$(ae, 0)$$, directrix $$x = a/e$$) produces the standard ellipse equation. (5 steps)", "answer": "- Step 1: Let $$P = (x, y)$$. Compute $$PS^2 = (x - ae)^2 + y^2$$.\n- Step 2: Compute $$PM = \\tfrac{a}{e} - x$$ (perpendicular distance to vertical directrix), so $$PM^2 = \\frac{(a - ex)^2}{e^2}$$.\n- Step 3: Apply $$PS^2 = e^2 PM^2$$: $$(x - ae)^2 + y^2 = (a - ex)^2$$.\n- Step 4: Expand: $$x^2 - 2aex + a^2 e^2 + y^2 = a^2 - 2aex + e^2 x^2$$. The $$2aex$$ terms cancel, giving $$x^2(1 - e^2) + y^2 = a^2(1 - e^2)$$.\n- Step 5: Divide by $$a^2(1 - e^2)$$: $$\\frac{x^2}{a^2} + \\frac{y^2}{a^2(1-e^2)} = 1$$. Setting $$b^2 = a^2(1 - e^2)$$ recovers the standard form.\n\nTakeaway: The cancellation of cross terms is what makes the standard form emerge so cleanly — a hallmark of focus-directrix derivations.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "Find (mentally) the eccentricity of the ellipse $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$. (3 steps)", "answer": "- Step 1: $$a^2 = 9, \\; b^2 = 4$$, with $$a > b$$, so use $$b^2 = a^2(1 - e^2)$$.\n- Step 2: $$4 = 9(1 - e^2) \\Rightarrow 1 - e^2 = \\tfrac{4}{9} \\Rightarrow e^2 = \\tfrac{5}{9}$$.\n- Step 3: $$e = \\tfrac{\\sqrt{5}}{3} \\approx 0.745$$, confirming $$0 < e < 1$$.\n\nTakeaway: Shortcut: $$e^2 = 1 - \\frac{b^2}{a^2}$$ when $$a > b$$.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "For the ellipse $$\\frac{x^2}{16} + \\frac{y^2}{25} = 1$$, where are the foci and directrices? (3 steps)", "answer": "- Step 1: Here $$b^2 = 25 > 16 = a^2$$, so the major axis is along $$y$$. Roles of $$a, b$$ swap in formulas.\n- Step 2: Use $$a^2 = b^2(1 - e^2)$$: $$16 = 25(1 - e^2) \\Rightarrow e^2 = \\tfrac{9}{25} \\Rightarrow e = \\tfrac{3}{5}$$.\n- Step 3: Foci on the $$y$$-axis at $$(0, \\pm be) = (0, \\pm 3)$$; directrices are horizontal lines $$y = \\pm\\tfrac{b}{e} = \\pm\\tfrac{25}{3}$$.\n\nTakeaway: Always identify the major axis FIRST — formulas use (semi-major)² and (semi-minor)² in specific roles.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "A common mistake: applying $$b^2 = a^2(1 - e^2)$$ to $$\\frac{x^2}{4} + \\frac{y^2}{9} = 1$$ gives $$e^2 = -\\tfrac{5}{4}$$. What went wrong? (3 steps)", "answer": "- Step 1: The formula $$b^2 = a^2(1 - e^2)$$ assumes $$a > b$$; here $$b = 3 > 2 = a$$, so it's the wrong formula.\n- Step 2: A negative $$e^2$$ is the diagnostic flag — geometrically impossible, indicating the formula was misapplied.\n- Step 3: The correct formula with $$b > a$$ is $$a^2 = b^2(1 - e^2)$$: $$4 = 9(1 - e^2) \\Rightarrow e^2 = \\tfrac{5}{9} \\Rightarrow e = \\tfrac{\\sqrt{5}}{3}$$.\n\nTakeaway: A negative $$e^2$$ result is a signal you've got the major/minor axes confused.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "Prove that for any point $$P$$ on an ellipse with foci $$S$$ and $$S'$$, the sum $$PS + PS' = 2a$$. (4 steps)", "answer": "- Step 1: Foci $$S(ae, 0)$$ and $$S'(-ae, 0)$$, with corresponding directrices $$x = a/e$$ and $$x = -a/e$$.\n- Step 2: Drop perpendiculars from $$P(x, y)$$ to both directrices: $$PM = \\tfrac{a}{e} - x$$ and $$PM' = x + \\tfrac{a}{e}$$.\n- Step 3: By the focus-directrix property: $$PS = e \\cdot PM = a - ex$$ and $$PS' = e \\cdot PM' = a + ex$$.\n- Step 4: Adding: $$PS + PS' = (a - ex) + (a + ex) = 2a$$, independent of where $$P$$ is on the ellipse.\n\nTakeaway: This is the famous \"string\" definition — pin both foci, attach a string of length $$2a$$, and trace out the ellipse with a taut pencil.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Why does the ellipse have TWO foci and TWO directrices, and why do they all describe the same ellipse? (3 steps)", "answer": "- Step 1: The standard ellipse is symmetric about both axes, so the focus-directrix construction works equally well from either side.\n- Step 2: Reflecting focus $$(ae, 0)$$ across the $$y$$-axis gives $$(-ae, 0)$$, and similarly for directrices. The same ellipse satisfies $$PS = e \\cdot PM$$ for either focus-directrix pair.\n- Step 3: The two foci are essential to the elegant \"string definition\" $$PS + PS' = 2a$$.\n\nTakeaway: The duplication arises from bilateral symmetry; this is also why a parabola has only ONE focus (asymmetry — only one axis of symmetry).", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "What is the latus rectum of an ellipse, and conceptually why is its length $$\\frac{2b^2}{a}$$? (3 steps)", "answer": "- Step 1: The **latus rectum** is the chord through a focus, perpendicular to the major axis.\n- Step 2: At the focus $$x = ae$$, plug into $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$: $$y^2 = b^2(1 - e^2) = b^2 \\cdot \\tfrac{b^2}{a^2} = \\tfrac{b^4}{a^2}$$, giving $$y = \\pm\\tfrac{b^2}{a}$$.\n- Step 3: Full chord length is $$\\tfrac{2b^2}{a}$$.\n\nTakeaway: The latus rectum measures how \"wide\" the ellipse is at the focus — small when $$b \\ll a$$ (very elongated), large when $$a \\approx b$$ (near-circle).", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "For a hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, give the formulas for eccentricity, foci, and directrices. (3 steps)", "answer": "- Step 1: Eccentricity: $$b^2 = a^2(e^2 - 1)$$, equivalently $$e = \\sqrt{1 + \\tfrac{b^2}{a^2}}$$, with $$e > 1$$.\n- Step 2: Foci: $$(\\pm ae, 0)$$ — on the transverse ($$x$$) axis, OUTSIDE the curve since $$ae > a$$.\n- Step 3: Directrices: $$x = \\pm\\tfrac{a}{e}$$ — vertical lines BETWEEN the two branches, since $$a/e < a$$.\n\nTakeaway: Foci/directrices arrangement INVERTS compared to ellipse: foci outside, directrices between branches.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Why does $$b^2 = a^2(e^2 - 1)$$ have a plus sign instead of a minus (compared to the ellipse formula)? (3 steps)", "answer": "- Step 1: For the ellipse, $$b^2 = a^2(1 - e^2)$$ requires $$e < 1$$ for $$b^2 > 0$$.\n- Step 2: For the hyperbola, the focus-directrix derivation produces $$a^2(e^2 - 1)$$ — needing $$e > 1$$ for positivity, perfectly aligning with the eccentricity classification.\n- Step 3: Geometrically, this sign flip mirrors the focus position: for an ellipse the focus lies INSIDE ($$ae < a$$), for a hyperbola it lies OUTSIDE ($$ae > a$$).\n\nTakeaway: The formula is forced by the geometry; algebra and geometry tell the same story.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "Misconception probe: For the hyperbola $$\\frac{x^2}{16} - \\frac{y^2}{25} = 1$$, why are the foci NOT on the $$y$$-axis even though $$b > a$$? (3 steps)", "answer": "- Step 1: Setting $$x = 0$$: $$-\\tfrac{y^2}{25} = 1$$, no real solution. The curve does NOT cross the $$y$$-axis.\n- Step 2: The transverse axis (axis the curve crosses) is set by which variable has the positive sign in the equation — here $$x$$, regardless of size of $$a$$ vs $$b$$.\n- Step 3: Foci sit on the transverse axis: $$(\\pm ae, 0)$$ where $$e = \\sqrt{1 + 25/16} = \\sqrt{41}/4$$, giving foci at $$(\\pm\\sqrt{41}, 0)$$.\n\nTakeaway: For ellipses, foci move to the longer axis. For hyperbolas, foci stay on the transverse axis (positive-sign axis), regardless of $$a$$ vs $$b$$.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "Find (mentally) the eccentricity of the hyperbola $$\\frac{x^2}{9} - \\frac{y^2}{16} = 1$$. (3 steps)", "answer": "- Step 1: $$a^2 = 9, b^2 = 16$$, so $$a = 3, b = 4$$.\n- Step 2: Use $$b^2 = a^2(e^2 - 1)$$: $$16 = 9(e^2 - 1) \\Rightarrow e^2 - 1 = \\tfrac{16}{9} \\Rightarrow e^2 = \\tfrac{25}{9}$$.\n- Step 3: $$e = \\tfrac{5}{3}$$, confirming $$e > 1$$.\n\nTakeaway: Shortcut: $$e^2 = 1 + \\frac{b^2}{a^2}$$ for a hyperbola.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "For a hyperbola, where exactly are the directrices located, and why? (3 steps)", "answer": "- Step 1: Directrices are at $$x = \\pm a/e$$. Since $$e > 1$$, $$|a/e| < a$$.\n- Step 2: But the curve only exists for $$|x| \\ge a$$ (vertices are at $$\\pm a$$). So $$|x| = a/e < a$$ places the directrices in the gap between the two branches.\n- Step 3: Geometrically: directrices sit between the centre and each vertex, in the \"forbidden zone\" between the branches.\n\nTakeaway: For an ellipse, directrices are outside the closed curve. For a hyperbola, they're between the branches — opposite to where the foci are.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Walk through the derivation that the focus-directrix definition with $$e > 1$$, focus $$(ae, 0)$$, directrix $$x = a/e$$ produces the standard hyperbola equation. (5 steps)", "answer": "- Step 1: $$P = (x, y)$$. $$PS^2 = (x - ae)^2 + y^2$$ and $$PM^2 = \\frac{(ex - a)^2}{e^2}$$.\n- Step 2: From $$PS^2 = e^2 PM^2$$: $$(x - ae)^2 + y^2 = (ex - a)^2$$.\n- Step 3: Expand: $$x^2 - 2aex + a^2 e^2 + y^2 = e^2 x^2 - 2aex + a^2$$. The $$2aex$$ terms cancel.\n- Step 4: Rearrange: $$x^2(1 - e^2) + y^2 = a^2(1 - e^2)$$. Since $$e > 1$$, $$1 - e^2 < 0$$, so flip signs: $$x^2(e^2 - 1) - y^2 = a^2(e^2 - 1)$$.\n- Step 5: Divide by $$a^2(e^2 - 1)$$: $$\\frac{x^2}{a^2} - \\frac{y^2}{a^2(e^2-1)} = 1$$. Setting $$b^2 = a^2(e^2 - 1)$$ gives the standard hyperbola.\n\nTakeaway: Same algebraic process as the ellipse; the sign of $$1 - e^2$$ being negative for $$e > 1$$ automatically produces the minus sign in the hyperbola equation.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "For the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ ($$a > b$$) with foci $$S, S'$$ and the point $$P = (0, b)$$, conceptually why does $$\\cos(\\angle PSS') = e$$? (4 steps)", "answer": "- Step 1: $$P = (0, b)$$ is on the ellipse and equidistant from both foci by symmetry, with $$PS = PS'$$. From $$PS + PS' = 2a$$, we get $$PS = a$$.\n- Step 2: $$SS' = 2ae$$ (the two foci are at $$\\pm ae$$).\n- Step 3: Triangle $$PSS'$$ is isosceles. Drop perpendicular from $$P$$ to midpoint $$O$$ of $$SS'$$ (the centre).\n- Step 4: $$\\cos(\\angle PSS') = \\tfrac{\\text{adjacent}}{\\text{hypotenuse}} = \\tfrac{ae}{a} = e$$.\n\nTakeaway: Eccentricity has a direct angular interpretation: $$\\arccos(e)$$ is the angle from a focus to the top of the minor axis.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Conceptually, what does the eccentricity of an ellipse mean physically (e.g., for planetary orbits)? (3 steps)", "answer": "- Step 1: $$e = 0$$ → circular orbit; $$e$$ near 1 → highly elongated orbit.\n- Step 2: Earth's orbit has $$e \\approx 0.0167$$ (nearly circular). Comets often have $$e$$ near 1, giving long, looping paths.\n- Step 3: The Sun sits at one FOCUS, not the centre — so even small-$$e$$ orbits have a slight off-centre sun, causing seasonal distance variations (perihelion vs aphelion).\n\nTakeaway: Eccentricity captures the entire orbital \"shape\" with a single number; it directly governs how distance varies through a complete orbit.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "When the Earth orbits the Sun in an ellipse with the Sun at one focus, express perihelion (closest) and aphelion (farthest) distances in terms of $$a, e$$. (3 steps)", "answer": "- Step 1: Perihelion: closest approach, occurring at the vertex on the same side as the Sun-focus. Distance $$= a - ae = a(1 - e)$$.\n- Step 2: Aphelion: farthest point, at the opposite vertex. Distance $$= a + ae = a(1 + e)$$.\n- Step 3: Sum is $$2a$$ (major axis length); ratio is $$\\tfrac{1+e}{1-e}$$ — a key parameter in orbital mechanics.\n\nTakeaway: Eccentricity directly governs orbital distance variation: small $$e$$ → nearly constant, $$e$$ near 1 → extreme variation.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "When finding tangents/normals to an ellipse, what are the two main methods, and what's the strategic difference? (3 steps)", "answer": "- Step 1: **Parametric differentiation**: $$\\tfrac{dy}{dx} = \\tfrac{dy/dt}{dx/dt}$$. Clean ratio, gives gradient as function of $$t$$ alone.\n- Step 2: **Implicit differentiation**: differentiate the Cartesian equation, getting $$\\tfrac{dy}{dx}$$ as a function of $$x, y$$.\n- Step 3: Parametric is preferred for general results (e.g., tangent at an arbitrary parameter point) since it expresses everything in $$t$$. Implicit is often quicker for specific numeric points where the parameter need not be found.\n\nTakeaway: Both yield the same gradient; choose based on whether you need a \"general $$t$$\" formula or a \"specific point\" answer.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Derive the equation of the tangent to $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at the parametric point $$P(a\\cos t, b\\sin t)$$. (5 steps)", "answer": "- Step 1: Differentiate: $$\\tfrac{dx}{dt} = -a\\sin t, \\; \\tfrac{dy}{dt} = b\\cos t$$.\n- Step 2: Gradient: $$\\tfrac{dy}{dx} = -\\tfrac{b\\cos t}{a\\sin t}$$.\n- Step 3: Point-slope form: $$y - b\\sin t = -\\tfrac{b\\cos t}{a\\sin t}(x - a\\cos t)$$.\n- Step 4: Multiply both sides by $$a\\sin t$$: $$ay\\sin t - ab\\sin^2 t = -bx\\cos t + ab\\cos^2 t$$.\n- Step 5: Rearrange and use $$\\cos^2 t + \\sin^2 t = 1$$: $$bx\\cos t + ay\\sin t = ab(\\cos^2 t + \\sin^2 t) = ab$$.\n\nFinal form: $$bx\\cos t + ay\\sin t = ab$$.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Derive the equation of the normal to $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at $$P(a\\cos t, b\\sin t)$$. (4 steps)", "answer": "- Step 1: From the tangent derivation, gradient is $$-\\tfrac{b\\cos t}{a\\sin t}$$.\n- Step 2: Normal gradient (perpendicular): $$\\tfrac{a\\sin t}{b\\cos t}$$.\n- Step 3: Point-slope form: $$y - b\\sin t = \\tfrac{a\\sin t}{b\\cos t}(x - a\\cos t)$$.\n- Step 4: Multiply by $$b\\cos t$$ and rearrange: $$ax\\sin t - by\\cos t = (a^2 - b^2)\\cos t \\sin t$$.\n\nTakeaway: The constant on the right ($$a^2 - b^2 = a^2 e^2$$) signals the deep connection between normals and the focal structure.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "State the condition for $$y = mx + c$$ to be tangent to $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ and explain WHY this condition arises. (3 steps)", "answer": "- Step 1: Condition: $$c^2 = b^2 + a^2 m^2$$.\n- Step 2: A line is tangent if it meets the curve at exactly ONE point. Substituting $$y = mx + c$$ into the ellipse gives a quadratic in $$x$$.\n- Step 3: For exactly one solution, set the discriminant to zero. Computing and simplifying yields exactly $$c^2 = b^2 + a^2 m^2$$.\n\nTakeaway: Equivalently, valid tangent lines have form $$y = mx \\pm \\sqrt{b^2 + a^2 m^2}$$ for any slope $$m$$.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Why is \"discriminant = 0\" a powerful general technique for finding tangent conditions to any conic? (3 steps)", "answer": "- Step 1: Substituting a line into a conic produces a quadratic in $$x$$ (or $$y$$).\n- Step 2: The discriminant tells you the number of intersection points: positive → secant (two crossings), zero → tangent (one), negative → no intersection.\n- Step 3: This works for ALL conics — a unified algebraic interpretation of the geometric \"touches but doesn't cross\" condition.\n\nTakeaway: Discriminant = 0 is the algebraic translation of geometric tangency; it works universally across conic types.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Mentally find $$c$$ such that $$y = 2x + c$$ is tangent to the ellipse $$x^2 + \\tfrac{y^2}{4} = 1$$. (3 steps)", "answer": "- Step 1: Standard form: $$\\frac{x^2}{1} + \\frac{y^2}{4} = 1$$, so $$a^2 = 1, b^2 = 4$$.\n- Step 2: Apply tangent condition $$c^2 = a^2 m^2 + b^2 = 1 \\cdot 4 + 4 = 8$$.\n- Step 3: $$c = \\pm 2\\sqrt{2}$$ — two values because two parallel tangents (one on each side of the ellipse).\n\nTakeaway: Memorising the tangent condition saves a full discriminant derivation each time.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "State the equation of the tangent to $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at $$P(a\\cosh t, b\\sinh t)$$ and at $$P(a\\sec\\theta, b\\tan\\theta)$$. (3 steps)", "answer": "- Step 1: At $$(a\\cosh t, b\\sinh t)$$: $$bx\\cosh t - ay\\sinh t = ab$$ (often rearranged as $$ay\\sinh t + ab = bx\\cosh t$$).\n- Step 2: At $$(a\\sec\\theta, b\\tan\\theta)$$: $$bx\\sec\\theta - ay\\tan\\theta = ab$$.\n- Step 3: Notice the structural parallel with the ellipse tangent $$bx\\cos t + ay\\sin t = ab$$ — same coefficient pattern, with $$\\sin \\to \\sinh$$ or $$\\sin \\to \\tan$$ (and a sign flip).\n\nTakeaway: The \"minus\" structure of the hyperbola's Cartesian equation propagates into a sign change in tangent equations.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "State the equation of the normal to $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at $$P(a\\cosh t, b\\sinh t)$$ and at $$P(a\\sec\\theta, b\\tan\\theta)$$. (3 steps)", "answer": "- Step 1: At $$(a\\cosh t, b\\sinh t)$$: $$ax\\sinh t + by\\cosh t = (a^2 + b^2)\\sinh t \\cosh t$$.\n- Step 2: At $$(a\\sec\\theta, b\\tan\\theta)$$: $$by + ax\\sin\\theta = (a^2 + b^2)\\tan\\theta$$.\n- Step 3: The constant $$a^2 + b^2$$ appears (compare ellipse's $$a^2 - b^2$$) — matching the focal distance pattern: $$ae$$ involves $$\\sqrt{a^2 + b^2}$$ for hyperbola, $$\\sqrt{a^2 - b^2}$$ for ellipse.\n\nTakeaway: Constants in normal equations always link to the focal structure — a deep consequence of the focus-directrix definition.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "State the condition for $$y = mx + c$$ to be tangent to a hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, and contrast with the ellipse condition. (3 steps)", "answer": "- Step 1: Hyperbola: $$c^2 = a^2 m^2 - b^2$$.\n- Step 2: Ellipse: $$c^2 = a^2 m^2 + b^2$$ — sign on $$b^2$$ flips.\n- Step 3: For the hyperbola, real $$c$$ requires $$a^2 m^2 \\ge b^2$$, i.e., $$|m| \\ge b/a$$ — slope must equal or exceed asymptote slope.\n\nTakeaway: The hyperbola's asymptotes form a forbidden zone for tangent slopes — a striking geometric constraint absent in ellipses.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Why can a line with slope between $$-b/a$$ and $$b/a$$ never be tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$? (3 steps)", "answer": "- Step 1: The asymptotes have slopes $$\\pm b/a$$ — the limiting tangent directions at infinity.\n- Step 2: A line with slope between these (flatter than asymptotes) would, when shifted up or down, either miss both branches entirely or cross both branches twice — never just touch one tangentially.\n- Step 3: Algebraically: $$c^2 = a^2 m^2 - b^2$$ requires $$|m| \\ge b/a$$; otherwise $$c^2 < 0$$, impossible for real $$c$$.\n\nTakeaway: Geometry (asymptotes block shallow tangents) and algebra (discriminant negative for shallow slopes) tell the same story.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "A common tangent line $$y = mx + c$$ is tangent to BOTH the ellipse $$\\frac{x^2}{9} + \\frac{y^2}{46} = 1$$ and $$\\frac{x^2}{25} + \\frac{y^2}{14} = 1$$. Conceptually find $$m$$ and $$c$$. (3 steps)", "answer": "- Step 1: For each ellipse, write the tangent condition $$c^2 = a_i^2 m^2 + b_i^2$$:\n+ Ellipse 1: $$c^2 = 9m^2 + 46$$\n+ Ellipse 2: $$c^2 = 25m^2 + 14$$\n- Step 2: Equate the right-hand sides: $$9m^2 + 46 = 25m^2 + 14 \\Rightarrow 16m^2 = 32 \\Rightarrow m^2 = 2$$.\n- Step 3: Substitute back: $$c^2 = 9(2) + 46 = 64 \\Rightarrow c = \\pm 8$$. So $$m = \\pm\\sqrt{2}, c = \\pm 8$$.\n\nTakeaway: Common tangent to two conics: equate the two tangent conditions — a single neat algebraic step.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "When working with the parametric form $$x = a\\sec\\theta, y = b\\tan\\theta$$, what does the parameter $$\\theta$$ represent geometrically, and what range covers the full hyperbola? (3 steps)", "answer": "- Step 1: $$\\sec\\theta$$ takes all real values with $$|\\sec\\theta| \\ge 1$$. On $$(-\\pi/2, \\pi/2)$$: $$\\sec\\theta \\ge 1$$ → right branch. On $$(\\pi/2, 3\\pi/2)$$ or equivalently $$(-\\pi, -\\pi/2)$$: $$\\sec\\theta \\le -1$$ → left branch.\n- Step 2: Standard range $$-\\pi \\le \\theta < \\pi$$ with $$\\theta \\ne \\pm\\pi/2$$ covers both branches.\n- Step 3: Excluding $$\\theta = \\pm\\pi/2$$ avoids singularities where $$\\sec\\theta$$ blows up — these correspond to asymptotic limits, not real points on the curve.\n\nTakeaway: The forbidden $$\\theta$$ values are exactly the asymptotic directions — a natural exclusion, not arbitrary.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "What is a locus problem in the context of conic sections, and what is the general approach? (4 steps)", "answer": "- Step 1: A locus is the set of all points satisfying a given geometric condition (e.g., midpoint of tangent intercepts as the tangent point varies).\n- Step 2: General approach: parameterise the moving point's coordinates $$(X, Y)$$ in terms of the parameter $$t$$ controlling the original construction.\n- Step 3: Solve for $$\\sin t, \\cos t, \\cosh t,$$ etc., in terms of $$X, Y$$.\n- Step 4: Use the appropriate identity ($$\\sin^2 t + \\cos^2 t = 1$$, $$\\cosh^2 t - \\sinh^2 t = 1$$, etc.) to eliminate $$t$$ and obtain a relation purely in $$X, Y$$.\n\nTakeaway: The key technique is \"parameterise → eliminate\" — a fully general approach for any locus problem on a parametric curve.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "The tangent to an ellipse at $$P(a\\cos t, b\\sin t)$$ crosses the $$x$$-axis at $$A$$ and $$y$$-axis at $$B$$. Conceptually find the locus of midpoint $$M$$ of $$AB$$. (4 steps)", "answer": "- Step 1: Tangent equation: $$bx\\cos t + ay\\sin t = ab$$. Find $$A$$ by setting $$y = 0$$: $$x = a\\sec t$$. Find $$B$$ by setting $$x = 0$$: $$y = b\\csc t$$.\n- Step 2: Midpoint coordinates: $$X = \\tfrac{a\\sec t}{2}, \\; Y = \\tfrac{b\\csc t}{2}$$.\n- Step 3: Solve: $$\\cos t = \\tfrac{a}{2X}, \\; \\sin t = \\tfrac{b}{2Y}$$.\n- Step 4: Apply identity $$\\cos^2 t + \\sin^2 t = 1$$: $$\\tfrac{a^2}{4X^2} + \\tfrac{b^2}{4Y^2} = 1$$ — this is the locus equation.\n\nTakeaway: The locus is a \"reciprocal\" form of an ellipse-like equation, illustrating how loci can produce surprising new curves.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Why does the locus of the midpoint of tangent intercepts NOT lie on the original ellipse? (3 steps)", "answer": "- Step 1: As $$P$$ moves around the ellipse, the tangent direction changes; intercepts $$A$$ and $$B$$ shift accordingly.\n- Step 2: As $$P$$ approaches a vertex on the $$x$$-axis, tangent becomes vertical: $$A$$ approaches the vertex while $$B$$ → infinity. The midpoint thus moves towards infinity.\n- Step 3: So the locus is unbounded, but the original ellipse is bounded. Therefore the locus is a different curve.\n\nTakeaway: Locus problems often produce surprising shapes — even unbounded curves from bounded originals.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "When solving locus problems involving intersection of normals/tangents from two parametric points $$P(p)$$ and $$Q(q)$$, why are factorisations like $$p^3 - q^3 = (p - q)(p^2 + pq + q^2)$$ so useful? (3 steps)", "answer": "- Step 1: Intersecting two equations involving parameters $$p, q$$ and subtracting often produces a difference like $$p^3 - q^3$$ or $$p - q$$.\n- Step 2: Factoring out $$(p - q)$$ allows cancellation (since $$p \\ne q$$ for distinct points), leaving a symmetric expression in $$p, q$$.\n- Step 3: Symmetric expressions reduce to combinations of $$p + q$$ and $$pq$$, which then can be expressed in terms of the locus coordinates $$X, Y$$.\n\nTakeaway: This factorisation reduces a two-parameter problem to a single-variable elimination — central technique for locus-via-parameters.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "For the parabola $$y^2 = 4ax$$, summarise the parametric form, tangent equation, and normal equation at $$P(at^2, 2at)$$. (3 steps)", "answer": "- Step 1: Parametric: $$x = at^2, \\; y = 2at$$. General point: $$P(at^2, 2at)$$.\n- Step 2: Tangent: $$ty = x + at^2$$.\n- Step 3: Normal: $$y + tx = 2at + at^3$$.\n\nTakeaway: The parabola has a single parameter form (no $$\\pm$$), reflecting its single connected branch.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "A chord through two parametric points $$P(at_1^2, 2at_1)$$ and $$Q(at_2^2, 2at_2)$$ on a parabola passes through the focus. What constraint does this place on $$t_1, t_2$$, and why is it useful? (3 steps)", "answer": "- Step 1: The chord equation derives as $$y(t_1 + t_2) = 2x + 2a t_1 t_2$$.\n- Step 2: For the chord to pass through focus $$(a, 0)$$: $$0 = 2a + 2a t_1 t_2 \\Rightarrow t_1 t_2 = -1$$.\n- Step 3: This single algebraic relation becomes a powerful tool in deriving loci involving normals/tangents from focal-chord endpoints.\n\nTakeaway: \"Focal chord ⟺ product of parameters $$= -1$$\" is a memorable, recurrent identity in parabola problems.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "For the rectangular hyperbola $$xy = c^2$$, give the parametric form, tangent at $$P(ct, c/t)$$, and normal at $$P$$. (3 steps)", "answer": "- Step 1: Parametric: $$x = ct, \\; y = c/t$$, $$t \\ne 0$$. General point: $$(ct, c/t)$$.\n- Step 2: Tangent: $$x + t^2 y = 2ct$$.\n- Step 3: Normal: $$t^3 x - ty = c(t^4 - 1)$$.\n\nTakeaway: Cleanest derivation comes from $$\\tfrac{dy}{dx} = \\tfrac{-c/t^2}{c} = -\\tfrac{1}{t^2}$$ — much simpler than standard hyperbola because of clean rational parameterisation.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "When the chord $$PQ$$ of a rectangular hyperbola $$xy = c^2$$ has gradient $$m$$ (with $$P = (cp, c/p), Q = (cq, c/q)$$), conceptually find the relationship between $$p, q$$ and $$m$$. (3 steps)", "answer": "- Step 1: Gradient $$= \\tfrac{c/p - c/q}{cp - cq} = \\tfrac{c(q - p)/(pq)}{c(p - q)} = \\tfrac{-1}{pq}$$.\n- Step 2: So $$m = -\\tfrac{1}{pq}$$, equivalently $$pq = -\\tfrac{1}{m}$$.\n- Step 3: Beautifully clean: the product of parameters of chord endpoints equals $$-1/(\\text{gradient})$$.\n\nTakeaway: The reciprocal nature of $$xy = c^2$$ makes parameter products particularly elegant — analogous to $$t_1 t_2 = -1$$ for parabola focal chords.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "State and explain the reflection property of ellipses (used in whispering galleries and elliptical reflectors). (3 steps)", "answer": "- Step 1: At any point $$P$$ on an ellipse, the normal bisects the angle $$\\angle SPS'$$ between the lines from $$P$$ to the two foci. Equivalently, the tangent makes equal angles with $$PS$$ and $$PS'$$.\n- Step 2: Physical consequence: a ray (light/sound) from one focus, after reflecting off the ellipse, passes through the other focus.\n- Step 3: This is why whispering galleries work — sound from one focus converges to the other; also used in lithotripsy (medical kidney-stone treatment).\n\nTakeaway: This reflection property follows from the focus-directrix property and constant sum $$PS + PS' = 2a$$ — a beautiful geometric consequence with practical applications.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "What is the analogous reflection property for the hyperbola, and how does it differ from the ellipse? (3 steps)", "answer": "- Step 1: At any point on a hyperbola, the **tangent** bisects the angle $$\\angle SPS'$$ between the lines to the two foci (note: tangent, not normal — opposite to the ellipse).\n- Step 2: Physical consequence: light from one focus, after reflecting off the hyperbola, appears to come from the OTHER focus (a virtual image, since rays diverge).\n- Step 3: Used in Cassegrain telescopes — a hyperbolic secondary mirror redirects light from a parabolic primary's focus to a more accessible eyepiece location.\n\nTakeaway: Roles of tangent/normal swap between ellipse and hyperbola in their reflection properties — reflecting their fundamentally different topological natures (closed vs open).", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "Conceptually, what does the eccentricity affect visually for an ellipse? (3 steps)", "answer": "- Step 1: $$e = 0$$: perfect circle.\n- Step 2: $$e \\approx 0.5$$: visibly elongated, like a typical \"egg\" shape.\n- Step 3: $$e \\approx 0.9$$: very flat, nearly a line segment, with foci near the ends of the major axis. As $$e \\to 1$$: degenerates to a line segment.\n\nTakeaway: Eccentricity acts as a \"morphing parameter\" — visualising several values builds intuition for how $$e$$ controls shape.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "Walk through deriving the tangent equation $$bx\\cos t + ay\\sin t = ab$$ for an ellipse using IMPLICIT differentiation. (4 steps)", "answer": "- Step 1: Differentiate $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ implicitly: $$\\tfrac{2x}{a^2} + \\tfrac{2y}{b^2}\\tfrac{dy}{dx} = 0 \\Rightarrow \\tfrac{dy}{dx} = -\\tfrac{b^2 x}{a^2 y}$$.\n- Step 2: At $$(a\\cos t, b\\sin t)$$: $$\\tfrac{dy}{dx} = -\\tfrac{b^2 \\cdot a\\cos t}{a^2 \\cdot b\\sin t} = -\\tfrac{b\\cos t}{a\\sin t}$$ — same as parametric.\n- Step 3: Tangent: $$y - b\\sin t = -\\tfrac{b\\cos t}{a\\sin t}(x - a\\cos t)$$.\n- Step 4: Multiply by $$a\\sin t$$ and simplify with $$\\sin^2 t + \\cos^2 t = 1$$ to get $$bx\\cos t + ay\\sin t = ab$$.\n\nTakeaway: Implicit and parametric methods give identical results; choose by convenience.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "Why is the formula $$ax\\sin t - by\\cos t = (a^2 - b^2)\\cos t \\sin t$$ for the normal of an ellipse meaningful in terms of the focus structure? (3 steps)", "answer": "- Step 1: Recall $$b^2 = a^2(1 - e^2) \\Rightarrow a^2 - b^2 = a^2 e^2 = (ae)^2$$.\n- Step 2: So the constant on the right is $$(ae)^2 \\cos t \\sin t$$ — directly involving the focal distance $$ae$$.\n- Step 3: At specific points (e.g., vertices where $$\\cos t \\sin t = 0$$), the constant vanishes, meaning the normal passes through the origin.\n\nTakeaway: The constants in tangent/normal equations of conics are not arbitrary — they encode focal-distance information.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": false}, {"question": "Conceptually walk through using the discriminant condition to derive the tangent condition $$c^2 = a^2 m^2 - b^2$$ for $$y = mx + c$$ on a hyperbola. (4 steps)", "answer": "- Step 1: Substitute into $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$: $$\\frac{x^2}{a^2} - \\frac{(mx + c)^2}{b^2} = 1$$.\n- Step 2: Multiply by $$a^2 b^2$$ and rearrange as a quadratic in $$x$$: $$x^2(b^2 - a^2 m^2) - 2a^2 mc x - a^2(c^2 + b^2) = 0$$.\n- Step 3: Set discriminant $$= 0$$: $$(2a^2 mc)^2 + 4(b^2 - a^2 m^2) \\cdot a^2(c^2 + b^2) = 0$$.\n- Step 4: Expand, cancel, and simplify: $$c^2 = a^2 m^2 - b^2$$.\n\nTakeaway: Same approach as the ellipse; only the sign of one term differs, propagating to the final condition.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "When rotating the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ by $$45°$$ counterclockwise about the origin, conceptually what equation results? (3 steps)", "answer": "- Step 1: Rotation by $$45°$$ replaces $$\\binom{x}{y}$$ with $$\\frac{1}{\\sqrt{2}}\\binom{x - y}{x + y}$$ in the original equation (using inverse rotation).\n- Step 2: New $$x$$-coordinate becomes $$\\tfrac{x + y}{\\sqrt{2}}$$ and new $$y$$ becomes $$\\tfrac{-x + y}{\\sqrt{2}}$$.\n- Step 3: Substituting: $$\\frac{(x + y)^2}{2a^2} + \\frac{(x - y)^2}{2b^2} = 1$$ — a rotated ellipse with $$xy$$ cross terms when expanded.\n\nTakeaway: Rotations introduce $$xy$$ cross terms; this is why general second-degree equations are needed for rotated conics.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "When rotating $$xy = c^2$$ by $$45°$$ about the origin, what curve results, and what is the relationship between the original $$c$$ and the new constant? (3 steps)", "answer": "- Step 1: Rotation by $$45°$$: substitute $$x \\to \\tfrac{x + y}{\\sqrt{2}}, y \\to \\tfrac{-x + y}{\\sqrt{2}}$$.\n- Step 2: $$xy = \\tfrac{(x+y)(-x+y)}{2} = \\tfrac{y^2 - x^2}{2}$$. Setting equal to $$c^2$$: $$\\tfrac{y^2 - x^2}{2} = c^2$$, i.e., $$y^2 - x^2 = 2c^2$$.\n- Step 3: This has the form $$y^2 - x^2 = a^2$$ with $$a^2 = 2c^2$$, i.e., $$a = c\\sqrt{2}$$.\n\nTakeaway: Rectangular hyperbolas in different orientations belong to the same family up to rotation; $$xy = c^2$$ and $$y^2 - x^2 = 2c^2$$ are rotational equivalents.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": true}, {"question": "A point $$P$$ lies on $$\\frac{x^2}{4} + \\frac{y^2}{16} = 1$$. Point $$N$$ is the foot of perpendicular from $$P$$ to the line $$y = 6$$. $$M$$ is the midpoint of $$PN$$. Find the locus of $$M$$. (3 steps)", "answer": "- Step 1: Parameterise $$P = (2\\cos t, 4\\sin t)$$. Then $$N = (2\\cos t, 6)$$ (same $$x$$, $$y = 6$$).\n- Step 2: Midpoint: $$M = (2\\cos t, \\tfrac{4\\sin t + 6}{2}) = (2\\cos t, 2\\sin t + 3)$$.\n- Step 3: Let $$M = (X, Y)$$. Then $$\\cos t = X/2$$, $$\\sin t = (Y - 3)/2$$. Identity: $$\\tfrac{X^2}{4} + \\tfrac{(Y - 3)^2}{4} = 1$$, i.e., $$X^2 + (Y - 3)^2 = 4$$ — a CIRCLE of radius 2 centred at $$(0, 3)$$.\n\nTakeaway: Midpoint constructions can transform an ellipse into a circle — averaging \"absorbs\" the directional stretching.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "For the parabola $$y^2 = 4ax$$, the normals at $$P(ap^2, 2ap)$$ and $$Q(aq^2, 2aq)$$ meet at $$R$$. Conceptually outline the strategy to find $$R$$'s coordinates. (4 steps)", "answer": "- Step 1: Write both normal equations: $$y + px = 2ap + ap^3$$ and $$y + qx = 2aq + aq^3$$.\n- Step 2: Subtract to eliminate $$y$$: $$(p - q)x = 2a(p - q) + a(p^3 - q^3)$$.\n- Step 3: Factor: $$(p - q)x = (p - q)[2a + a(p^2 + pq + q^2)]$$. Cancel $$(p - q)$$: $$x = 2a + a(p^2 + pq + q^2)$$.\n- Step 4: Back-substitute: $$y = -apq(p + q)$$. So $$R = (2a + a(p^2 + pq + q^2), \\; -apq(p + q))$$.\n\nTakeaway: Always factor differences to cancel $$(p - q)$$ — the central algebraic trick for two-parameter problems.", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": true}, {"question": "Why do parametric and implicit differentiation give identical tangent gradients on an ellipse? (3 steps)", "answer": "- Step 1: Implicit gives $$\\tfrac{dy}{dx} = -\\tfrac{b^2 x}{a^2 y}$$ — a function of position $$(x, y)$$.\n- Step 2: Parametric gives $$\\tfrac{dy}{dx} = -\\tfrac{b\\cos t}{a\\sin t}$$ — a function of parameter $$t$$.\n- Step 3: At any point $$(a\\cos t, b\\sin t)$$, substituting into the implicit gradient: $$-\\tfrac{b^2 a\\cos t}{a^2 b\\sin t} = -\\tfrac{b\\cos t}{a\\sin t}$$ ✓ — they agree.\n\nTakeaway: Both methods describe the same geometric quantity; the difference is parameterisation choice.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": true}, {"question": "A point $$P$$ in the first quadrant on an ellipse has tangent meeting the axes at $$A, B$$. Why does the locus of midpoint $$M$$ of $$AB$$ become unbounded as $$P$$ approaches a vertex? (3 steps)", "answer": "- Step 1: Approaching the right vertex $$(a, 0)$$: tangent becomes vertical (slope $$\\to \\infty$$).\n- Step 2: Vertical tangent: meets $$y$$-axis at infinity, so $$B \\to \\infty$$. $$A$$ stays at the vertex.\n- Step 3: Midpoint of $$A$$ (finite) and $$B$$ (infinite) goes to infinity.\n\nTakeaway: Boundary behaviour reveals that midpoint loci can be unbounded even when the original curve is bounded — extending well beyond the ellipse.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": true}, {"question": "For the rectangular hyperbola $$xy = c^2$$ at $$P(ct, c/t)$$, derive the tangent equation. (4 steps)", "answer": "- Step 1: From $$y = \\tfrac{c^2}{x}$$, differentiate: $$\\tfrac{dy}{dx} = -\\tfrac{c^2}{x^2}$$.\n- Step 2: At $$P(ct, c/t)$$: $$\\tfrac{dy}{dx} = -\\tfrac{c^2}{(ct)^2} = -\\tfrac{1}{t^2}$$.\n- Step 3: Point-slope form: $$y - c/t = -\\tfrac{1}{t^2}(x - ct)$$.\n- Step 4: Multiply by $$t^2$$ and simplify: $$t^2 y - ct = -x + ct$$, i.e., $$x + t^2 y = 2ct$$.\n\nTakeaway: The clean rational derivative $$-1/t^2$$ makes rectangular-hyperbola tangents particularly tidy.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": true}, {"question": "Mentally find the eccentricity of an ellipse with semi-axes $$a = 5, b = 3$$. (3 steps)", "answer": "- Step 1: $$a > b$$, so use $$b^2 = a^2(1 - e^2)$$: $$9 = 25(1 - e^2)$$.\n- Step 2: $$1 - e^2 = 9/25 \\Rightarrow e^2 = 16/25$$.\n- Step 3: $$e = 4/5 = 0.8$$ — quite elongated.\n\nTakeaway: Pythagorean-friendly values often give clean fractional eccentricities.", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": false}, {"question": "Why is the eccentricity an INTRINSIC property of a conic (invariant under translation/rotation), unlike e.g., focus position? (3 steps)", "answer": "- Step 1: Eccentricity is a ratio of distances ($$PS/PM$$), which doesn't change when you translate or rotate the entire figure together.\n- Step 2: Focus position changes with translation; directrix orientation changes with rotation. But the ratio between them remains the same.\n- Step 3: This makes $$e$$ a \"shape parameter\" — a single dimensionless number capturing the conic's intrinsic geometric form.\n\nTakeaway: $$e$$ is to conics what curvature is to surfaces — an intrinsic shape descriptor that doesn't depend on positioning.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": true}, {"question": "When deriving a tangent equation parametrically, what should you watch out for at $$t = 0, \\pi/2, \\pi$$? (4 steps)", "answer": "- Step 1: At these special $$t$$ values, $$\\sin t$$ or $$\\cos t$$ may be zero, causing the gradient $$-\\tfrac{b\\cos t}{a\\sin t}$$ to be undefined or zero.\n- Step 2: At $$t = 0$$ or $$\\pi$$ (rightmost/leftmost vertex), $$\\sin t = 0$$, gradient → ∞: tangent is vertical, can't write as $$y = \\cdots$$.\n- Step 3: At $$t = \\pi/2, 3\\pi/2$$ (top/bottom), $$\\cos t = 0$$, gradient = 0: tangent is horizontal.\n- Step 4: The implicit form $$bx\\cos t + ay\\sin t = ab$$ handles all cases without breaking — it doesn't divide by anything.\n\nTakeaway: The implicit/symmetric tangent equation is more robust than the explicit $$y = mx + c$$ form near vertical tangents.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": true}, {"question": "A tangent to a hyperbola at $$P(a\\cosh t, b\\sinh t)$$ crosses the $$y$$-axis at $$(0, -1)$$ for the hyperbola $$\\tfrac{x^2}{9} - \\tfrac{y^2}{4} = 1$$. Concep
