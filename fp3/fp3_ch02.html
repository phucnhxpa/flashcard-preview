ue}, {"question": "Why might we want both forms of hyperbola parameterisation ($$\\cosh, \\sinh$$ AND $$\\sec, \\tan$$)? (3 steps)", "answer": "- Step 1: $$\\cosh, \\sinh$$ form: $$x = \\pm a\\cosh t, y = b\\sinh t$$ — needs $$\\pm$$ for both branches but uses pure hyperbolic functions.\n- Step 2: $$\\sec, \\tan$$ form: $$x = a\\sec\\theta, y = b\\tan\\theta$$ — covers both branches with one parameter sweep, but has excluded values $$\\theta = \\pm\\pi/2$$.\n- Step 3: Choice depends on context:\n+ Hyperbolic identity needed → cosh/sinh form\n+ Trigonometric integration or comparison with circular formulas → sec/tan form\n+ Both branches naturally → sec/tan form\n\nDifferent contexts favour different parameterisations — having both gives flexibility.", "source": "Opus 4.7 ②", "_id": "opus_2_89", "judge_pick": false}, {"question": "A line $$y = mx + c$$ is tangent to BOTH the hyperbola $$\\frac{x^2}{4} - \\frac{y^2}{15} = 1$$ and $$\\frac{x^2}{9} - \\frac{y^2}{95} = 1$$. What are $$m$$ and $$c$$? (3 steps)", "answer": "- Step 1: Apply the tangent condition $$c^2 = a^2 m^2 - b^2$$ to each: $$c^2 = 4m^2 - 15$$ and $$c^2 = 9m^2 - 95$$.\n- Step 2: Set equal: $$4m^2 - 15 = 9m^2 - 95$$, so $$5m^2 = 80$$, giving $$m^2 = 16$$, $$m = \\pm 4$$.\n- Step 3: Substitute back: $$c^2 = 4 \\cdot 16 - 15 = 49$$, so $$c = \\pm 7$$.\n\nSame approach as the ellipse case but with hyperbola tangent condition. Up to four common tangents possible.", "source": "Opus 4.7 ②", "_id": "opus_2_90", "judge_pick": false}, {"question": "Why does an ellipse have a \"chord-tangent limit\" that yields the tangent equation? (3 steps)", "answer": "- Step 1: A chord through two points $$P(\\alpha), Q(\\beta)$$ on an ellipse has a definite equation, parameterised by $$\\alpha, \\beta$$.\n- Step 2: As $$\\beta \\to \\alpha$$, the two points coalesce into a single point, and the chord becomes the tangent at that point.\n- Step 3: Algebraically, setting $$\\beta = \\alpha$$ in the chord equation directly gives the tangent equation — a useful technique for deriving tangent formulas.\n\nThis \"chord-to-tangent\" limiting procedure is general for smooth curves and provides intuition for what \"tangent\" means: a chord with infinitesimally close endpoints.", "source": "Opus 4.7 ②", "_id": "opus_2_91", "judge_pick": true}, {"question": "What does \"the locus of the foot of the perpendicular from origin to the tangent\" describe geometrically for the rectangular hyperbola $$xy = c^2$$? (3 steps)", "answer": "- Step 1: For $$xy = c^2$$ at $$(ct, c/t)$$, tangent: $$x + t^2 y = 2ct$$.\n- Step 2: Foot of perpendicular from origin to this line: standard formula gives a point parameterised by $$t$$.\n- Step 3: After elimination of parameter, the locus equation is $$(x^2 + y^2)^2 = 4c^2 xy$$ — a four-cusped curve (like a flower or limaçon).\n\nThis shows how loci on conics can produce curves of higher degree, with rich geometric structure.", "source": "Opus 4.7 ②", "_id": "opus_2_92", "judge_pick": true}, {"question": "Conceptually, what do we mean when we say \"an ellipse has TWO foci, BUT the focus-directrix definition uses only ONE\"? (3 steps)", "answer": "- Step 1: The focus-directrix definition uses one focus and its associated directrix to define the curve via $$PS/PM = e$$.\n- Step 2: But because the ellipse has reflection symmetry, there's another focus and another directrix on the other side, also satisfying the same property.\n- Step 3: So the ellipse has two foci and two directrices — but you only need one pair to define it. The other pair is a consequence of symmetry.\n\nThis redundancy gives rise to elegant properties like the focal sum theorem ($$PS + PS' = 2a$$).", "source": "Opus 4.7 ②", "_id": "opus_2_93", "judge_pick": true}, {"question": "What's the relationship between the eccentricity of an ellipse and its focal chord lengths? (3 steps)", "answer": "- Step 1: Focal chord at angle $$\\theta$$ to major axis has length $$\\frac{2b^2/a}{1 - e^2\\cos^2\\theta}$$.\n- Step 2: Range of lengths:\n+ Minimum (at $$\\theta = \\pi/2$$, perpendicular): $$2b^2/a$$ (the latus rectum)\n+ Maximum (at $$\\theta = 0$$, along major axis): $$\\frac{2b^2/a}{1 - e^2} = 2a$$\n- Step 3: So focal chord lengths span $$[2b^2/a, 2a]$$. The ratio of max to min is $$a^2/b^2 = 1/(1-e^2)$$ — directly tied to eccentricity.\n\nHigher eccentricity → larger ratio between maximum and minimum focal chords, reflecting more \"elongated\" geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_94", "judge_pick": false}, {"question": "A hyperbola has equation $$x^2 - 4y^2 = 16$$. Find its asymptote slopes and foci (mental). (3 steps)", "answer": "- Step 1: Standardise: $$\\frac{x^2}{16} - \\frac{y^2}{4} = 1$$, so $$a = 4, b = 2$$.\n- Step 2: Asymptotes: $$y = \\pm(b/a)x = \\pm x/2$$.\n- Step 3: $$b^2 = a^2(e^2 - 1)$$ gives $$4 = 16(e^2 - 1)$$, so $$e^2 = 5/4$$, $$e = \\sqrt{5}/2$$. Foci at $$(\\pm ae, 0) = (\\pm 2\\sqrt{5}, 0)$$.\n\nQuick check: $$\\sqrt{a^2 + b^2} = \\sqrt{20} = 2\\sqrt{5}$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_95", "judge_pick": false}, {"question": "When proving \"the normal at $$P$$ bisects $$\\angle SPS'$$,\" what's the conceptual structure of the proof? (3 steps)", "answer": "- Step 1: Show that the angles $$\\angle SPN$$ and $$\\angle S'PN$$ (where $$N$$ is along the normal direction) are equal.\n- Step 2: Use the focal sum property $$PS + PS' = 2a$$ and consider what happens to a small displacement along the ellipse — by the principle of virtual work or the gradient direction.\n- Step 3: At any point, the normal direction is the gradient of $$PS + PS'$$ (kind of, with appropriate sign convention), since this sum is constant. The gradient bisects the two focal direction vectors.\n\nThis is a calculus-of-variations argument: the normal is perpendicular to the level set of \"constant focal sum\" — and the bisector of focal directions is precisely such a perpendicular.", "source": "Opus 4.7 ②", "_id": "opus_2_96", "judge_pick": true}, {"question": "What does it mean for a hyperbola to have a \"transverse axis\" vs a \"conjugate axis\"? (3 steps)", "answer": "- Step 1: For $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$: the transverse axis is along the x-axis (direction the curve opens). It's the segment from $$(-a, 0)$$ to $$(a, 0)$$, length $$2a$$.\n- Step 2: The conjugate axis is along the y-axis, of length $$2b$$ — but the curve doesn't actually intersect this axis. It's the \"implicit\" perpendicular axis.\n- Step 3: The conjugate axis defines the rectangle (with corners $$(\\pm a, \\pm b)$$) through which the asymptotes pass.\n\nSo \"transverse\" = direction of opening; \"conjugate\" = perpendicular axis defining the asymptote rectangle.", "source": "Opus 4.7 ②", "_id": "opus_2_97", "judge_pick": true}, {"question": "Why is finding the equation of a tangent at a specific Cartesian point on a conic often harder than at a parametric point? (3 steps)", "answer": "- Step 1: At a parametric point $$(a\\cos t, b\\sin t)$$ with known $$t$$, the tangent equation $$bx\\cos t + ay\\sin t = ab$$ is direct substitution — clean and fast.\n- Step 2: At a Cartesian point $$(x_0, y_0)$$, you must use implicit differentiation, evaluate at the point, and then write the line equation — more steps.\n- Step 3: Alternatively, you can find the corresponding $$t$$ from $$x_0 = a\\cos t$$, $$y_0 = b\\sin t$$, and use the parametric formula — but this introduces an extra inversion step.\n\nThe parametric form has built-in algebraic structure that simplifies tangent/normal calculations.", "source": "Opus 4.7 ②", "_id": "opus_2_98", "judge_pick": true}, {"question": "Given the focus-directrix definition, qualitatively explain why an ellipse is bounded but a hyperbola is unbounded. (3 steps)", "answer": "- Step 1: For an ellipse, $$PS = e \\cdot PM$$ with $$e < 1$$. So $$PS < PM$$ — the point is always closer to the focus than to the directrix.\n- Step 2: As $$P$$ moves, $$PM$$ stays bounded by the geometry (perpendicular distance to a fixed line, which is finite for points within reasonable distance), so $$PS$$ is bounded. Hence the ellipse is closed and bounded.\n- Step 3: For a hyperbola, $$PS > PM$$ ($$e > 1$$). $$PS$$ can grow without bound as $$P$$ moves away — no constraint preventing this. Hence the curve extends to infinity, unbounded.\n\nSo eccentricity directly governs the topological nature (closed vs open) of the conic.", "source": "Opus 4.7 ②", "_id": "opus_2_99", "judge_pick": true}, {"question": "Show that if a line $$y = mx + c$$ is tangent to an ellipse, the lines $$y = mx \\pm \\sqrt{a^2 m^2 + b^2}$$ are both valid tangents. (3 steps)", "answer": "- Step 1: Tangent condition: $$c^2 = a^2 m^2 + b^2$$. Solving for $$c$$: $$c = \\pm\\sqrt{a^2 m^2 + b^2}$$.\n- Step 2: Both values of $$c$$ satisfy the condition. These correspond to two parallel tangent lines — one on each \"side\" of the ellipse.\n- Step 3: Geometrically: for a given slope $$m$$, there are two tangent positions where the line just touches the ellipse — one \"above\" and one \"below\" (with respect to the slope direction).\n\nSo tangents to an ellipse with given slope come in pairs, separated by a distance proportional to $$2\\sqrt{a^2 m^2 + b^2}/\\sqrt{1+m^2}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_100", "judge_pick": true}, {"question": "What is the converse of the focus-directrix property — given a curve, how would you verify it's a conic? (3 steps)", "answer": "- Step 1: Identify a candidate focus $$S$$ and directrix line. Compute, for several points $$P$$ on the curve, the ratio $$PS/PM$$ where $$M$$ is the foot of perpendicular from $$P$$ to the directrix.\n- Step 2: If this ratio is constant (call it $$e$$) for all points, then the curve IS a conic, with that focus, that directrix, and that eccentricity.\n- Step 3: The constancy of the ratio is both necessary (by definition) and sufficient (any curve satisfying it is a conic).\n\nThis is how the focus-directrix property characterises the conic family — an \"if and only if\" statement.", "source": "Opus 4.7 ②", "_id": "opus_2_101", "judge_pick": true}], "count": 102}}, "meta": {"glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 26708, "out_tokens": 17286, "reasoning_chars": 19266, "cost_eur": 0.0815, "elapsed_s": 254, "content_chars": 27914}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 26708, "out_tokens": 17311, "reasoning_chars": 25302, "cost_eur": 0.0815, "elapsed_s": 442, "content_chars": 26086}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 24144, "out_tokens": 14306, "reasoning_chars": 2055, "cost_eur": 0.0189, "elapsed_s": 119, "content_chars": 39336}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 24144, "out_tokens": 23333, "reasoning_chars": 1785, "cost_eur": 0.0281, "elapsed_s": 175, "content_chars": 60993}, "opus_1": {"run": 1, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 38843, "out_tokens": 71198, "reasoning_chars": 0, "cost_eur": 5.4487, "elapsed_s": 813, "content_chars": 68828}, "opus_2": {"run": 2, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 38843, "out_tokens": 79021, "reasoning_chars": 0, "cost_eur": 5.9885, "elapsed_s": 887, "content_chars": 76605}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 27264, "out_tokens": 4934, "reasoning_chars": 4546, "cost_eur": 0.0105, "elapsed_s": 74, "content_chars": 10301}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 27264, "out_tokens": 3881 const SK='fp3_ch02';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
