<script>
const DATA={"selected": [{"question": "As $$e \\to 1$$ for both an ellipse and a hyperbola, what shape does each curve approach? (3 steps)", "answer": "- Step 1: For ellipse with $$e \\to 1^-$$: $$b^2 = a^2(1 - e^2) \\to 0$$, so $$b \\to 0$$. The ellipse becomes infinitely thin (degenerate to a line segment).\n- Step 2: For hyperbola with $$e \\to 1^+$$: $$b^2 = a^2(e^2 - 1) \\to 0$$, so $$b \\to 0$$ — branches collapse onto the x-axis.\n- Step 3: At exactly $$e = 1$$, the focus-directrix definition gives a parabola — the limiting case between ellipse and hyperbola.\n\nBoth curves \"degenerate\" as $$e \\to 1$$ — they meet at the parabola, the borderline case between bounded and unbounded conics.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "Why does the locus of midpoints of AB (tangent intercepts) for the ellipse $ \\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1 $ form another ellipse? (3 steps)", "answer": "- Step 1: Tangent equation at $ (a \\cos t, b \\sin t) $: $ \\frac{x \\cos t}{a} + \\frac{y \\sin t}{b} = 1 $.  \n- Step 2: Intercepts at $ A = \\left(\\frac{a}{\\cos t}, 0\\right) $, $ B = \\left(0, \\frac{b}{\\sin t}\\right) $.  \n- Step 3: Midpoint $ (X, Y) = \\left(\\frac{a}{2 \\cos t}, \\frac{b}{2 \\sin t}\\right) \\Rightarrow \\left(\\frac{a}{2X}\\right)^2 + \\left(\\frac{b}{2Y}\\right)^2 = 1 $.", "source": "Qwen 3 ①", "_id": "qwen_1_11"}, {"question": "Conceptually, what do we mean when we say \"an ellipse has TWO foci, BUT the focus-directrix definition uses only ONE\"? (3 steps)", "answer": "- Step 1: The focus-directrix definition uses one focus and its associated directrix to define the curve via $$PS/PM = e$$.\n- Step 2: But because the ellipse has reflection symmetry, there's another focus and another directrix on the other side, also satisfying the same property.\n- Step 3: So the ellipse has two foci and two directrices — but you only need one pair to define it. The other pair is a consequence of symmetry.\n\nThis redundancy gives rise to elegant properties like the focal sum theorem ($$PS + PS' = 2a$$).", "source": "Opus 4.7 ②", "_id": "opus_2_93"}, {"question": "State the reflection property of the ellipse and how it relates to the normal. (3 steps)", "answer": "- Step 1: Reflection property: a ray from one focus reflects off the ellipse and travels to the other focus.\n- Step 2: This requires that the normal at any point $$P$$ on the ellipse bisects the angle $$\\angle SPS'$$ between the lines from $$P$$ to the two foci.\n- Step 3: This is the basis of the \"whispering gallery\" effect — sound from one focus, after one reflection off the elliptical surface, focuses precisely at the other focus.\n\nSo the geometric normal-bisector property gives the ellipse its acoustic and optical properties.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "For a hyperbola $ \\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1 $, why are the asymptotes $ y = \\pm \\frac{b}{a}x $? (2 steps)", "answer": "- Step 1: At large $ x $, the $ 1 $ in the equation becomes negligible:  \n  $$\n  \\frac{x^2}{a^2} - \\frac{y^2}{b^2} \\approx 0 \\Rightarrow \\frac{y^2}{b^2} \\approx \\frac{x^2}{a^2}\n  $$\n- Step 2: Solving gives $ y \\approx \\pm \\frac{b}{a}x $, which are the asymptotes. These lines represent the hyperbola's behavior at infinity.", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "A common tangent line $$y = mx + c$$ is tangent to BOTH the ellipse $$\\frac{x^2}{9} + \\frac{y^2}{46} = 1$$ and $$\\frac{x^2}{25} + \\frac{y^2}{14} = 1$$. Conceptually find $$m$$ and $$c$$. (3 steps)", "answer": "- Step 1: For each ellipse, write the tangent condition $$c^2 = a_i^2 m^2 + b_i^2$$:\n+ Ellipse 1: $$c^2 = 9m^2 + 46$$\n+ Ellipse 2: $$c^2 = 25m^2 + 14$$\n- Step 2: Equate the right-hand sides: $$9m^2 + 46 = 25m^2 + 14 \\Rightarrow 16m^2 = 32 \\Rightarrow m^2 = 2$$.\n- Step 3: Substitute back: $$c^2 = 9(2) + 46 = 64 \\Rightarrow c = \\pm 8$$. So $$m = \\pm\\sqrt{2}, c = \\pm 8$$.\n\nTakeaway: Common tangent to two conics: equate the two tangent conditions — a single neat algebraic step.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "How does the rectangular hyperbola $$x^2 - y^2 = a^2$$ differ from the rectangular hyperbola $$xy = c^2$$ in terms of their orientation and asymptotes? (2 steps)", "answer": "- Step 1: The hyperbola $$x^2 - y^2 = a^2$$ has asymptotes $$y = x$$ and $$y = -x$$, which are perpendicular (hence \"rectangular\"), and its branches are oriented along the lines $$y = \\pm x$$ (opening left and right).\n- Step 2: The hyperbola $$xy = c^2$$ also has perpendicular asymptotes (the coordinate axes $$x=0$$ and $$y=0$$), but its branches are oriented along the lines $$y = \\pm x$$ (opening up-right and down-left).\n+ Although both have perpendicular asymptotes, they are rotated versions of each other by 45 degrees, so they belong to different families of equations.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "Why does the line $$y = mx \\pm \\sqrt{b^2 + a^2 m^2}$$ represent ALL tangents to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$? (3 steps)", "answer": "- Step 1: For any slope $$m$$, the tangent condition $$c^2 = b^2 + a^2 m^2$$ gives valid $$c = \\pm\\sqrt{b^2 + a^2 m^2}$$.\n- Step 2: Two values of $$c$$: one positive, one negative — corresponding to the two parallel tangents on opposite sides of the ellipse.\n- Step 3: This covers EVERY non-vertical tangent. Vertical tangents (at vertices on $$x$$-axis) are handled separately.\n\nTakeaway: Every slope produces exactly two tangents — one above and one below the centre — encoded compactly by the $$\\pm$$.", "source": "Opus 4.7 ①", "_id": "opus_1_88"}, {"question": "State the condition for $$y = mx + c$$ to be tangent to $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ and explain WHY this condition arises. (3 steps)", "answer": "- Step 1: Condition: $$c^2 = b^2 + a^2 m^2$$.\n- Step 2: A line is tangent if it meets the curve at exactly ONE point. Substituting $$y = mx + c$$ into the ellipse gives a quadratic in $$x$$.\n- Step 3: For exactly one solution, set the discriminant to zero. Computing and simplifying yields exactly $$c^2 = b^2 + a^2 m^2$$.\n\nTakeaway: Equivalently, valid tangent lines have form $$y = mx \\pm \\sqrt{b^2 + a^2 m^2}$$ for any slope $$m$$.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "What's the analogous \"two-focus\" property for a hyperbola, and how does it differ from the ellipse property? (3 steps)", "answer": "- Step 1: For a hyperbola with foci $$S, S'$$, any point $$P$$ on the curve satisfies $$|PS - PS'| = 2a$$ (the absolute difference is constant).\n- Step 2: On the right branch, $$PS' - PS = 2a$$; on the left branch, $$PS - PS' = 2a$$. The absolute value handles both.\n- Step 3: Compare with ellipse: ellipse has $$PS + PS' = 2a$$ (sum); hyperbola has $$|PS - PS'| = 2a$$ (difference).\n\nThe two-focus characterisation reflects the geometric difference: the ellipse \"wraps around\" both foci (sum), while each hyperbola branch is \"near\" one focus (difference). Both expressions equal the major-axis length $$2a$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "An ellipse and a hyperbola both share the same values of $$a=5$$ and $$b=3$$. How do their eccentricities relate to each other? Specifically, what are the expressions for $$e^2$$ in each case? (2 steps)", "answer": "- Step 1: For the ellipse, $$b^2 = a^2(1 - e^2)$$, so $$9 = 25(1 - e^2)$$, giving $$e^2 = 1 - \\frac{9}{25} = \\frac{16}{25}$$.\n- Step 2: For the hyperbola, $$b^2 = a^2(e^2 - 1)$$, so $$9 = 25(e^2 - 1)$$, giving $$e^2 = 1 + \\frac{9}{25} = \\frac{34}{25}$$.\n+ Synthesis: The ellipse eccentricity formula uses $$1 - e^2$$ (subtracting), while the hyperbola uses $$e^2 - 1$$ (adding). This reflects that $$e < 1$$ for an ellipse and $$e > 1$$ for a hyperbola.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "For a hyperbola, where exactly are the directrices located, and why? (3 steps)", "answer": "- Step 1: Directrices are at $$x = \\pm a/e$$. Since $$e > 1$$, $$|a/e| < a$$.\n- Step 2: But the curve only exists for $$|x| \\ge a$$ (vertices are at $$\\pm a$$). So $$|x| = a/e < a$$ places the directrices in the gap between the two branches.\n- Step 3: Geometrically: directrices sit between the centre and each vertex, in the \"forbidden zone\" between the branches.\n\nTakeaway: For an ellipse, directrices are outside the closed curve. For a hyperbola, they're between the branches — opposite to where the foci are.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "What geometric construction produces an ellipse from a cone, and how does this relate to other conic sections? (3 steps)", "answer": "- Step 1: Conic sections are obtained by intersecting a plane with a double cone. The angle of the slicing plane determines which curve emerges.\n- Step 2: An ellipse is produced when the plane cuts through only one nappe (half) of the cone, tilted just enough to produce a closed curve.\n+ Circle: plane perpendicular to the cone's axis (special case of ellipse)\n+ Parabola: plane parallel to a slant edge of the cone\n+ Hyperbola: plane steep enough to cut both nappes (gives two branches)\n- Step 3: The ellipse is the only bounded conic. The \"tilt\" of the plane controls eccentricity: more tilt → more elongated → larger eccentricity, until eventually it becomes a parabola.\n\nThis unification is why all four curves share the focus-directrix definition — they're all \"slices of the same cone.\"", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Derive the equation of the normal to $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at $$P(a\\cos t, b\\sin t)$$. (4 steps)", "answer": "- Step 1: From the tangent derivation, gradient is $$-\\tfrac{b\\cos t}{a\\sin t}$$.\n- Step 2: Normal gradient (perpendicular): $$\\tfrac{a\\sin t}{b\\cos t}$$.\n- Step 3: Point-slope form: $$y - b\\sin t = \\tfrac{a\\sin t}{b\\cos t}(x - a\\cos t)$$.\n- Step 4: Multiply by $$b\\cos t$$ and rearrange: $$ax\\sin t - by\\cos t = (a^2 - b^2)\\cos t \\sin t$$.\n\nTakeaway: The constant on the right ($$a^2 - b^2 = a^2 e^2$$) signals the deep connection between normals and the focal structure.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "Prove that for any point $$P$$ on an ellipse with foci $$S$$ and $$S'$$, the sum $$PS + PS' = 2a$$. (4 steps)", "answer": "- Step 1: Foci $$S(ae, 0)$$ and $$S'(-ae, 0)$$, with corresponding directrices $$x = a/e$$ and $$x = -a/e$$.\n- Step 2: Drop perpendiculars from $$P(x, y)$$ to both directrices: $$PM = \\tfrac{a}{e} - x$$ and $$PM' = x + \\tfrac{a}{e}$$.\n- Step 3: By the focus-directrix property: $$PS = e \\cdot PM = a - ex$$ and $$PS' = e \\cdot PM' = a + ex$$.\n- Step 4: Adding: $$PS + PS' = (a - ex) + (a + ex) = 2a$$, independent of where $$P$$ is on the ellipse.\n\nTakeaway: This is the famous \"string\" definition — pin both foci, attach a string of length $$2a$$, and trace out the ellipse with a taut pencil.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "For the parabola $$y^2 = 4ax$$, the normals at $$P(ap^2, 2ap)$$ and $$Q(aq^2, 2aq)$$ meet at $$R$$. Conceptually outline the strategy to find $$R$$'s coordinates. (4 steps)", "answer": "- Step 1: Write both normal equations: $$y + px = 2ap + ap^3$$ and $$y + qx = 2aq + aq^3$$.\n- Step 2: Subtract to eliminate $$y$$: $$(p - q)x = 2a(p - q) + a(p^3 - q^3)$$.\n- Step 3: Factor: $$(p - q)x = (p - q)[2a + a(p^2 + pq + q^2)]$$. Cancel $$(p - q)$$: $$x = 2a + a(p^2 + pq + q^2)$$.\n- Step 4: Back-substitute: $$y = -apq(p + q)$$. So $$R = (2a + a(p^2 + pq + q^2), \\; -apq(p + q))$$.\n\nTakeaway: Always factor differences to cancel $$(p - q)$$ — the central algebraic trick for two-parameter problems.", "source": "Opus 4.7 ①", "_id": "opus_1_66"}, {"question": "What's the conceptual approach to finding the locus of a tangent line's \"pivot point\" as the source point moves on a conic? (3 steps)", "answer": "- Step 1: Express the tangent line in parametric form (function of curve parameter $$t$$).\n- Step 2: Identify the geometric construction defining the \"pivot\" (e.g., midpoint, intersection with axis, intersection with a fixed line).\n- Step 3: Compute that pivot's coordinates as functions of $$t$$, then eliminate $$t$$ via the appropriate identity to get a Cartesian equation in the pivot's coordinates.\n\nThis is the universal \"parametric elimination\" recipe for loci on conics.", "source": "Opus 4.7 ②", "_id": "opus_2_78"}, {"question": "What happens to the formula $$b^2 = a^2(e^2 - 1)$$ for a hyperbola in the special case $$a = b$$ (rectangular hyperbola)? (3 steps)", "answer": "- Step 1: $$a = b \\Rightarrow a^2 = a^2(e^2 - 1) \\Rightarrow e^2 - 1 = 1 \\Rightarrow e^2 = 2$$.\n- Step 2: $$e = \\sqrt{2}$$ — the eccentricity of a rectangular hyperbola.\n- Step 3: This is the ONLY eccentricity at which the asymptotes are perpendicular ($$\\pm b/a = \\pm 1$$, slopes giving $$45°$$).\n\nTakeaway: $$e = \\sqrt{2}$$ is the \"fingerprint\" of a rectangular hyperbola — a distinctive value worth remembering.", "source": "Opus 4.7 ①", "_id": "opus_1_83"}, {"question": "Why does the equation $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ produce an ellipse, and what do $$a$$ and $$b$$ represent geometrically? (3 steps)", "answer": "- Step 1: Set $$y = 0$$: $$\\frac{x^2}{a^2} = 1$$, giving $$x = \\pm a$$. The curve crosses the x-axis at $$(\\pm a, 0)$$.\n- Step 2: Set $$x = 0$$: $$\\frac{y^2}{b^2} = 1$$, giving $$y = \\pm b$$. The curve crosses the y-axis at $$(0, \\pm b)$$.\n- Step 3: Geometrically, $$a$$ is the semi-axis length along the x-axis and $$b$$ is the semi-axis length along the y-axis. The longer of the two is the semi-major axis; the shorter is the semi-minor axis.\n\nThe equation reads \"for each point, the sum of squared scaled distances along x and y equals 1\" — both terms must be ≤ 1, which bounds the curve.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "Why is the latus rectum length $$\\frac{2b^2}{a}$$ for an ellipse with $$a > b$$, and why is this the SHORTEST focal chord? (4 steps)", "answer": "- Step 1: Latus rectum is perpendicular to major axis through the focus. Substitute $$x = ae$$ into the ellipse: $$e^2 + \\frac{y^2}{b^2} = 1$$, so $$y^2 = b^2(1 - e^2) = \\frac{b^4}{a^2}$$.\n- Step 2: So $$y = \\pm \\frac{b^2}{a}$$, and the chord length is $$\\frac{2b^2}{a}$$.\n- Step 3: Focal chord length at angle $$\\theta$$ to major axis is $$\\frac{2b^2/a}{1 - e^2 \\cos^2\\theta}$$. Minimum when $$\\cos^2\\theta = 0$$ (i.e., $$\\theta = \\pi/2$$, perpendicular).\n- Step 4: So latus rectum (perpendicular) = $$2b^2/a$$ is the minimum; major axis ($$\\theta = 0$$) gives the maximum length $$2a$$.\n\nThe latus rectum is the \"thinnest\" focal chord — a useful invariant in orbital mechanics.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "What's the conceptual significance of the focus-directrix definition over the two-focus definition of an ellipse? (3 steps)", "answer": "- Step 1: The two-focus definition ($$PS + PS' = 2a$$) is geometric and intuitive but specific to ellipses. It doesn't extend to parabolas (which have only one focus).\n- Step 2: The focus-directrix definition unifies all conic sections under one framework — different values of $$e$$ give different curve types from a single principle.\n- Step 3: The focus-directrix is also tied more closely to the projective-geometric origin of conics, allowing easy generalisation (e.g., to higher dimensions, projective conics).\n\nThe two-focus property is a theorem (consequence) when applied to ellipses — beautiful, but not the foundational definition.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "What's the tangent condition for a line $$y = mx + c$$ to be tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, and how does it differ from the ellipse case? (3 steps)", "answer": "- Step 1: For an ellipse: $$c^2 = a^2 m^2 + b^2$$.\n- Step 2: For a hyperbola: $$c^2 = a^2 m^2 - b^2$$ — sign flip on $$b^2$$, derived analogously via discriminant = 0.\n- Step 3: For real $$c$$, need $$a^2 m^2 - b^2 \\geq 0$$, i.e., $$|m| \\geq b/a$$. So tangent lines must be steeper than the asymptotes.\n\nIf $$|m| < b/a$$ (shallower than asymptotes), the line either misses the hyperbola or crosses both branches — never tangent.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Why do the parametric equations for a standard hyperbola have the form $$x = \\pm a\\cosh t, y = b\\sinh t$$ (with the $$\\pm$$), but the ellipse equations don't?", "answer": "- Step 1: $$\\cosh t \\geq 1$$ for all real $$t$$, so $$a\\cosh t \\geq a > 0$$ — this only covers the right branch ($$x \\geq a$$).\n- Step 2: To cover the left branch ($$x \\leq -a$$), we need $$x = -a\\cosh t$$. Hence the $$\\pm$$.\n- Step 3: For an ellipse, $$\\cos t$$ ranges over $$[-1, 1]$$, taking both signs, so a single parameter sweep covers the entire (connected) ellipse.\n\nThe $$\\pm$$ reminds us the hyperbola has two disconnected branches needing two parameter sweeps.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "For the ellipse with equation $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ where $$a > b$$, prove that the focus-directrix property gives the relationship $$b^2 = a^2(1 - e^2)$$. (3 steps)", "answer": "- Step 1: Let the focus be at $$(ae, 0)$$ and the directrix be $$x = \\frac{a}{e}$$. For a point $$P(x, y)$$ on the ellipse, by definition $$\\frac{PS}{PM} = e$$, so $$PS^2 = e^2 \\cdot PM^2$$.\n- Step 2: Compute distances:\n$$PS^2 = (x - ae)^2 + y^2$$\n$$PM^2 = \\left(\\frac{a}{e} - x\\right)^2 = \\frac{(a - ex)^2}{e^2}$$\nSo: $$(x - ae)^2 + y^2 = e^2 \\cdot \\frac{(a - ex)^2}{e^2} = (a - ex)^2$$\n- Step 3: Expanding and simplifying:\n$$x^2 - 2aex + a^2e^2 + y^2 = a^2 - 2aex + e^2x^2$$\n$$x^2(1 - e^2) + y^2 = a^2(1 - e^2)$$\n$$\\frac{x^2}{a^2} + \\frac{y^2}{a^2(1 - e^2)} = 1$$\nComparing with the standard form $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$, we see that:\n$$b^2 = a^2(1 - e^2)$$\n+ This derivation also shows why we need $$0 < e < 1$$ for an ellipse — if $$e \\geq 1$$, the RHS would be non-positive, giving a hyperbola instead.", "source": "MiniMax ②", "_id": "minimax_2_31"}, {"question": "Conceptually, why is the constant $$a^2 + b^2$$ on the right of the hyperbola normal equation, while $$a^2 - b^2$$ appears for the ellipse? (3 steps)", "answer": "- Step 1: For an ellipse: $$b^2 = a^2(1 - e^2) \\Rightarrow a^2 - b^2 = a^2 e^2 = (ae)^2$$ — the squared focal half-distance.\n- Step 2: For a hyperbola: $$b^2 = a^2(e^2 - 1) \\Rightarrow a^2 + b^2 = a^2 e^2 = (ae)^2$$ — also the squared focal half-distance.\n- Step 3: In BOTH cases, the constant equals $$(ae)^2$$ — the squared distance from centre to focus. The \"$$+$$\" vs \"$$-$$\" depends only on the algebraic relation between $$a, b, e$$.\n\nTakeaway: Both normal equations encode the same geometric quantity — the squared focal distance — just written differently due to the sign in the eccentricity formula.", "source": "Opus 4.7 ①", "_id": "opus_1_82"}, {"question": "A point $$P$$ in the first quadrant on an ellipse has tangent meeting the axes at $$A, B$$. Why does the locus of midpoint $$M$$ of $$AB$$ become unbounded as $$P$$ approaches a vertex? (3 steps)", "answer": "- Step 1: Approaching the right vertex $$(a, 0)$$: tangent becomes vertical (slope $$\\to \\infty$$).\n- Step 2: Vertical tangent: meets $$y$$-axis at infinity, so $$B \\to \\infty$$. $$A$$ stays at the vertex.\n- Step 3: Midpoint of $$A$$ (finite) and $$B$$ (infinite) goes to infinity.\n\nTakeaway: Boundary behaviour reveals that midpoint loci can be unbounded even when the original curve is bounded — extending well beyond the ellipse.", "source": "Opus 4.7 ①", "_id": "opus_1_68"}, {"question": "Why is the eccentricity $ e < 1 $ for ellipses and $ e > 1 $ for hyperbolas? (4 steps)", "answer": "- Step 1: For ellipses, $ b^2 = a^2(1 - e^2) $. Since $ b^2 > 0 $, $ 1 - e^2 > 0 \\Rightarrow e < 1 $.  \n- Step 2: For hyperbolas, $ b^2 = a^2(e^2 - 1) $. Since $ b^2 > 0 $, $ e^2 - 1 > 0 \\Rightarrow e > 1 $.  \n- Step 3: Eccentricity measures deviation from circularity:  \n  + $ e = 0 $: circle  \n  + $ 0 < e < 1 $: stretched circle (ellipse)  \n  + $ e > 1 $: open curve (hyperbola)  \n\n[This distinction ensures the focus-directrix ratio defines the correct conic section type.]", "source": "Qwen 3 ①", "_id": "qwen_1_3"}, {"question": "Why is the eccentricity an INTRINSIC property of a conic (invariant under translation/rotation), unlike e.g., focus position? (3 steps)", "answer": "- Step 1: Eccentricity is a ratio of distances ($$PS/PM$$), which doesn't change when you translate or rotate the entire figure together.\n- Step 2: Focus position changes with translation; directrix orientation changes with rotation. But the ratio between them remains the same.\n- Step 3: This makes $$e$$ a \"shape parameter\" — a single dimensionless number capturing the conic's intrinsic geometric form.\n\nTakeaway: $$e$$ is to conics what curvature is to surfaces — an intrinsic shape descriptor that doesn't depend on positioning.", "source": "Opus 4.7 ①", "_id": "opus_1_71"}, {"question": "What's the standard strategy to find the locus of a point defined by some construction on a conic? (4 steps)", "answer": "- Step 1: Express the tracked point's coordinates parametrically using the conic's parameter $$t$$ — get $$(X(t), Y(t))$$.\n- Step 2: Solve these for the parameter functions, e.g., $$\\cos t = f(X)$$, $$\\sin t = g(Y)$$ (or analogous).\n- Step 3: Apply the appropriate identity ($$\\cos^2 t + \\sin^2 t = 1$$, $$\\cosh^2 t - \\sinh^2 t = 1$$, etc.) to eliminate the parameter.\n- Step 4: The resulting equation in $$X, Y$$ describes the locus.\n\nThis \"parametric elimination\" approach reduces locus problems to (a) parameterise, (b) invert, (c) eliminate via identity. Renaming $$X, Y$$ back to $$x, y$$ at the end gives the final equation.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "When solving locus problems involving intersection of normals/tangents from two parametric points $$P(p)$$ and $$Q(q)$$, why are factorisations like $$p^3 - q^3 = (p - q)(p^2 + pq + q^2)$$ so useful? (3 steps)", "answer": "- Step 1: Intersecting two equations involving parameters $$p, q$$ and subtracting often produces a difference like $$p^3 - q^3$$ or $$p - q$$.\n- Step 2: Factoring out $$(p - q)$$ allows cancellation (since $$p \\ne q$$ for distinct points), leaving a symmetric expression in $$p, q$$.\n- Step 3: Symmetric expressions reduce to combinations of $$p + q$$ and $$pq$$, which then can be expressed in terms of the locus coordinates $$X, Y$$.\n\nTakeaway: This factorisation reduces a two-parameter problem to a single-variable elimination — central technique for locus-via-parameters.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "What is special about the normal at a vertex of an ellipse? (1 step)", "answer": "At a vertex, say at (a, 0) where θ = 0, we have cos θ = 1, sin θ = 0. The normal equation is $$ax \\sin θ - by \\cos θ = (a^2 - b^2) cos θ sin θ$$. At θ = 0: $$0 - by(1) = 0$$, so y = 0. The normal is the x-axis itself! Similarly at (-a, 0), the normal is also the x-axis. At the other vertices (0, ±b), the normal is the y-axis.", "source": "MiniMax ①", "_id": "minimax_1_53"}, {"question": "A tangent to $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at $$P(a\\cos t, b\\sin t)$$ crosses the x-axis at $$A$$ and y-axis at $$B$$. Find the locus of the midpoint of $$AB$$. (5 steps)", "answer": "- Step 1: Tangent equation: $$bx\\cos t + ay\\sin t = ab$$. Set $$y = 0$$: $$x = \\frac{a}{\\cos t} = a\\sec t$$, so $$A = (a\\sec t, 0)$$.\n- Step 2: Set $$x = 0$$: $$y = \\frac{b}{\\sin t} = b\\csc t$$, so $$B = (0, b\\csc t)$$.\n- Step 3: Midpoint coordinates: $$X = \\frac{a\\sec t}{2}$$, $$Y = \\frac{b\\csc t}{2}$$.\n- Step 4: Solve for parameter: $$\\cos t = \\frac{a}{2X}$$, $$\\sin t = \\frac{b}{2Y}$$.\n- Step 5: Apply $$\\cos^2 t + \\sin^2 t = 1$$: $$\\frac{a^2}{4X^2} + \\frac{b^2}{4Y^2} = 1$$, or equivalently $$\\frac{a^2}{4x^2} + \\frac{b^2}{4y^2} = 1$$.\n\nThe locus has the same \"additive\" structure as the ellipse but in $$1/x^2, 1/y^2$$ — it's not a standard conic but a related curve.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Why does the locus of the midpoint of tangent intercepts NOT lie on the original ellipse? (3 steps)", "answer": "- Step 1: As $$P$$ moves around the ellipse, the tangent direction changes; intercepts $$A$$ and $$B$$ shift accordingly.\n- Step 2: As $$P$$ approaches a vertex on the $$x$$-axis, tangent becomes vertical: $$A$$ approaches the vertex while $$B$$ → infinity. The midpoint thus moves towards infinity.\n- Step 3: So the locus is unbounded, but the original ellipse is bounded. Therefore the locus is a different curve.\n\nTakeaway: Locus problems often produce surprising shapes — even unbounded curves from bounded originals.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "Walk through the derivation that the focus-directrix definition with $$e > 1$$, focus $$(ae, 0)$$, directrix $$x = a/e$$ produces the standard hyperbola equation. (5 steps)", "answer": "- Step 1: $$P = (x, y)$$. $$PS^2 = (x - ae)^2 + y^2$$ and $$PM^2 = \\frac{(ex - a)^2}{e^2}$$.\n- Step 2: From $$PS^2 = e^2 PM^2$$: $$(x - ae)^2 + y^2 = (ex - a)^2$$.\n- Step 3: Expand: $$x^2 - 2aex + a^2 e^2 + y^2 = e^2 x^2 - 2aex + a^2$$. The $$2aex$$ terms cancel.\n- Step 4: Rearrange: $$x^2(1 - e^2) + y^2 = a^2(1 - e^2)$$. Since $$e > 1$$, $$1 - e^2 < 0$$, so flip signs: $$x^2(e^2 - 1) - y^2 = a^2(e^2 - 1)$$.\n- Step 5: Divide by $$a^2(e^2 - 1)$$: $$\\frac{x^2}{a^2} - \\frac{y^2}{a^2(e^2-1)} = 1$$. Setting $$b^2 = a^2(e^2 - 1)$$ gives the standard hyperbola.\n\nTakeaway: Same algebraic process as the ellipse; the sign of $$1 - e^2$$ being negative for $$e > 1$$ automatically produces the minus sign in the hyperbola equation.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "A circle has eccentricity $$e = 0$$. What happens to the focus-directrix definition in this limit? (3 steps)", "answer": "- Step 1: $$e = 0$$ in the ratio $$PS/PM = e$$ would force $$PS = 0$$ — every point coincides with the focus. Degenerate.\n- Step 2: A better view: take the limit of $$b^2 = a^2(1 - e^2)$$ as $$e \\to 0$$: $$b \\to a$$, so the ellipse becomes a circle.\n- Step 3: Simultaneously, the foci $$(\\pm ae, 0)$$ collapse to the center, and the directrices $$x = \\pm a/e$$ go to infinity.\n\nSo a circle is the \"limit\" of ellipses with directrix at infinity and a single (degenerate) focus at the center. This is why the standard focus-directrix definition technically excludes circles.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Misconception probe: For the hyperbola $$\\frac{x^2}{16} - \\frac{y^2}{25} = 1$$, why are the foci NOT on the $$y$$-axis even though $$b > a$$? (3 steps)", "answer": "- Step 1: Setting $$x = 0$$: $$-\\tfrac{y^2}{25} = 1$$, no real solution. The curve does NOT cross the $$y$$-axis.\n- Step 2: The transverse axis (axis the curve crosses) is set by which variable has the positive sign in the equation — here $$x$$, regardless of size of $$a$$ vs $$b$$.\n- Step 3: Foci sit on the transverse axis: $$(\\pm ae, 0)$$ where $$e = \\sqrt{1 + 25/16} = \\sqrt{41}/4$$, giving foci at $$(\\pm\\sqrt{41}, 0)$$.\n\nTakeaway: For ellipses, foci move to the longer axis. For hyperbolas, foci stay on the transverse axis (positive-sign axis), regardless of $$a$$ vs $$b$$.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "Why are conic sections so important in physics and mathematics — what unifies their broad applicability? (3 steps)", "answer": "- Step 1: Physics: planetary orbits (ellipses), projectile trajectories (parabolas), unbound comet paths (hyperbolas), light reflection in parabolic mirrors, refraction.\n- Step 2: All conic sections share the focus-directrix definition (one parameter, $$e$$), forming a continuous family. They're also related by the geometry of cone-slicing.\n- Step 3: Mathematically, conics are the only curves of degree 2 in the plane (every quadratic in $$x, y$$ describes a conic, possibly degenerate).\n\nThe unifying theme: conics are the simplest non-trivial planar curves, and their algebraic and geometric structures match a vast range of physical phenomena.", "source": "Opus 4.7 ②", "_id": "opus_2_73"}, {"question": "Find the equations of the tangents from the origin to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$. (2 steps)", "answer": "- Step 1: Let the tangent from the origin be $$y = mx$$. Since it passes through the origin ($$c = 0$$ in $$y = mx + c$$), the tangency condition from earlier is $$b^2 + 0^2 = a^2m^2$$, so $$m^2 = \\frac{b^2}{a^2}$$, giving $$m = \\pm\\frac{b}{a}$$.\n- Step 2: The two tangents from the origin are therefore $$y = \\frac{b}{a}x$$ and $$y = -\\frac{b}{a}x$$. These are exactly the asymptotes of the hyperbola.\n+ This makes geometric sense: the asymptotes can be thought of as \"tangents at infinity\" — lines that the hyperbola approaches but never meets. From the origin, which lies inside the hyperbola (actually outside the hyperbola for standard form), you can draw exactly two real tangents, which happen to coincide with the asymptotes.", "source": "MiniMax ②", "_id": "minimax_2_30"}, {"question": "Eccentricity $$e$$ is defined by the ratio $$\\frac{PS}{PM}=e$$, where $$P$$ is a point on a conic, $$S$$ is a focus, and $$M$$ is a point on the directrix. How does the value of $$e$$ distinguish between an ellipse, a parabola, and a hyperbola?", "answer": "- Step 1: The ratio $$e = \\frac{\\text{distance from focus}}{\\text{distance from directrix}}$$ dictates the shape of the conic section.\n+ If $$0 < e < 1$$, the distance to the focus is always smaller than the distance to the directrix, pulling the curve inward to form a closed shape: an **ellipse**.\n+ If $$e = 1$$, the distances are equal, forming a **parabola**.\n+ If $$e > 1$$, the distance to the focus is greater, pushing the curve outward to form an open shape: a **hyperbola**.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "Given the focus-directrix definition, qualitatively explain why an ellipse is bounded but a hyperbola is unbounded. (3 steps)", "answer": "- Step 1: For an ellipse, $$PS = e \\cdot PM$$ with $$e < 1$$. So $$PS < PM$$ — the point is always closer to the focus than to the directrix.\n- Step 2: As $$P$$ moves, $$PM$$ stays bounded by the geometry (perpendicular distance to a fixed line, which is finite for points within reasonable distance), so $$PS$$ is bounded. Hence the ellipse is closed and bounded.\n- Step 3: For a hyperbola, $$PS > PM$$ ($$e > 1$$). $$PS$$ can grow without bound as $$P$$ moves away — no constraint preventing this. Hence the curve extends to infinity, unbounded.\n\nSo eccentricity directly governs the topological nature (closed vs open) of the conic.", "source": "Opus 4.7 ②", "_id": "opus_2_99"}, {"question": "When solving a tangent problem and given a point in Cartesian form $$(x_0, y_0)$$, is parametric or implicit differentiation usually faster? (3 steps)", "answer": "- Step 1: If the point is given as $$(x_0, y_0)$$ in Cartesian form, **implicit differentiation** is faster: directly differentiate $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ to get $$\\frac{dy}{dx} = -\\frac{b^2 x}{a^2 y}$$, then substitute.\n- Step 2: If the point is given as $$(a\\cos t, b\\sin t)$$ for known $$t$$, **parametric** is faster — compute $$dy/dx$$ in terms of $$t$$ and substitute.\n- Step 3: For deriving general formulas in terms of a parameter, parametric is cleaner. For numerical values, both work — use what matches the data.\n\nMatch method to data type for efficiency.", "source": "Opus 4.7 ②", "_id": "opus_2_74"}, {"question": "What's the meaning of confocal conics, and why are they geometrically interesting? (3 steps)", "answer": "- Step 1: \"Confocal\" means sharing the same foci. A family of confocal conics has different shapes (different eccentricities) but identical foci.\n- Step 2: For example, all hyperbolas $$\\frac{x^2}{p} - \\frac{y^2}{q} = 1$$ with $$p + q = 25$$ share foci $$(\\pm 5, 0)$$.\n- Step 3: Geometric interest: confocal ellipses and hyperbolas form an orthogonal grid — at every intersection point, the ellipse and hyperbola tangents are perpendicular. This is used in physics (e.g., orthogonal coordinates for solving PDEs).\n\nConfocal conics reveal a beautiful underlying structure connecting different conic types.", "source": "Opus 4.7 ②", "_id": "opus_2_83"}, {"question": "What is a locus problem in the context of conic sections, and what is the general approach? (4 steps)", "answer": "- Step 1: A locus is the set of all points satisfying a given geometric condition (e.g., midpoint of tangent intercepts as the tangent point varies).\n- Step 2: General approach: parameterise the moving point's coordinates $$(X, Y)$$ in terms of the parameter $$t$$ controlling the original construction.\n- Step 3: Solve for $$\\sin t, \\cos t, \\cosh t,$$ etc., in terms of $$X, Y$$.\n- Step 4: Use the appropriate identity ($$\\sin^2 t + \\cos^2 t = 1$$, $$\\cosh^2 t - \\sinh^2 t = 1$$, etc.) to eliminate $$t$$ and obtain a relation purely in $$X, Y$$.\n\nTakeaway: The key technique is \"parameterise → eliminate\" — a fully general approach for any locus problem on a parametric curve.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "What does it mean geometrically for two points on a parabola at parameters $$p, q$$ to satisfy $$pq = -1$$? (3 steps)", "answer": "- Step 1: For points $$P(ap^2, 2ap)$$ and $$Q(aq^2, 2aq)$$ on $$y^2 = 4ax$$, the chord $$PQ$$ has gradient $$\\frac{2}{p+q}$$.\n- Step 2: The chord equation can be written as $$y(p+q) = 2x + 2apq$$. For it to pass through the focus $$(a, 0)$$: $$0 = 2a + 2apq$$, so $$pq = -1$$.\n- Step 3: So $$pq = -1$$ characterises focal chords of a parabola.\n\nThis is a fundamental parametric identity to memorise. Similarly, $$pq = -4$$ corresponds to chords subtending a right angle at the origin.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "What is the converse of the focus-directrix property — given a curve, how would you verify it's a conic? (3 steps)", "answer": "- Step 1: Identify a candidate focus $$S$$ and directrix line. Compute, for several points $$P$$ on the curve, the ratio $$PS/PM$$ where $$M$$ is the foot of perpendicular from $$P$$ to the directrix.\n- Step 2: If this ratio is constant (call it $$e$$) for all points, then the curve IS a conic, with that focus, that directrix, and that eccentricity.\n- Step 3: The constancy of the ratio is both necessary (by definition) and sufficient (any curve satisfying it is a conic).\n\nThis is how the focus-directrix property characterises the conic family — an \"if and only if\" statement.", "source": "Opus 4.7 ②", "_id": "opus_2_101"}, {"question": "What's the difference between the directrix property for an ellipse vs a hyperbola in terms of where the directrix sits relative to the curve? (3 steps)", "answer": "- Step 1: For both, the focus-directrix property gives $$PS/PM = e$$.\n- Step 2: For ellipse ($$e < 1$$): points are CLOSER to focus than to directrix. So the directrix is OUTSIDE the ellipse — it doesn't touch the curve.\n- Step 3: For hyperbola ($$e > 1$$): points are FARTHER from focus than from directrix. The directrix lies BETWEEN the two branches (between center and a vertex).\n\nPosition of directrix relative to the curve geometrically encodes whether $$e < 1$$ or $$e > 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "State the equation of the normal to $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at $$P(a\\cosh t, b\\sinh t)$$ and at $$P(a\\sec\\theta, b\\tan\\theta)$$. (3 steps)", "answer": "- Step 1: At $$(a\\cosh t, b\\sinh t)$$: $$ax\\sinh t + by\\cosh t = (a^2 + b^2)\\sinh t \\cosh t$$.\n- Step 2: At $$(a\\sec\\theta, b\\tan\\theta)$$: $$by + ax\\sin\\theta = (a^2 + b^2)\\tan\\theta$$.\n- Step 3: The constant $$a^2 + b^2$$ appears (compare ellipse's $$a^2 - b^2$$) — matching the focal distance pattern: $$ae$$ involves $$\\sqrt{a^2 + b^2}$$ for hyperbola, $$\\sqrt{a^2 - b^2}$$ for ellipse.\n\nTakeaway: Constants in normal equations always link to the focal structure — a deep consequence of the focus-directrix definition.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "A point $$P$$ lies on the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with $$a > b$$. The normal at $$P$$ meets the major axis at $$Q$$. Prove that $$QS = e \\cdot PS$$, where $$S$$ is the focus $$(ae, 0)$$ and $$e$$ is the eccentricity. (3 steps)", "answer": "- Step 1: Let $$P = (a\\cos t, b\\sin t)$$. The equation of the normal is $$ax\\sin t - by\\cos t = (a^2 - b^2)\\sin t\\cos t$$. Setting $$y = 0$$ (the major axis), we find the x-coordinate of $$Q$$:\n$$ax\\sin t = (a^2 - b^2)\\sin t\\cos t$$\n$$x = \\frac{(a^2 - b^2)\\cos t}{a} = a(1 - \\frac{b^2}{a^2})\\cos t = a(1 - (1-e^2))\\cos t = ae^2\\cos t$$\nSo $$Q = (ae^2\\cos t, 0)$$.\n- Step 2: The focus is $$S = (ae, 0)$$. The distance $$QS = |ae^2\\cos t - ae| = ae|1 - e\\cos t|$$.\n- Step 3: The distance $$PS$$ can be found. Using coordinates: $$PS^2 = (a\\cos t - ae)^2 + (b\\sin t)^2$$. After simplification (using $$b^2 = a^2(1-e^2)$$), one finds $$PS = a(1 - e\\cos t)$$ (taking the positive root for points on the right side). Therefore:\n$$\\frac{QS}{PS} = \\frac{ae|1 - e\\cos t|}{a|1 - e\\cos t|} = e$$\nSo $$QS = e \\cdot PS$$ as required.", "source": "MiniMax ②", "_id": "minimax_2_16"}, {"question": "A line tangent to a hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ has slope $$m$$. What's the geometric significance of the boundary case $$|m| = b/a$$? (3 steps)", "answer": "- Step 1: $$m = b/a$$ is the slope of the asymptote $$y = (b/a)x$$.\n- Step 2: At this slope, the tangent condition $$c^2 = a^2 m^2 - b^2 = b^2 - b^2 = 0$$, giving $$c = 0$$ — the line passes through the origin.\n- Step 3: But $$y = (b/a)x$$ is precisely an asymptote, which approaches but never touches the hyperbola — so it's not actually a tangent in the usual sense.\n\nSo $$|m| = b/a$$ is the borderline: lines with slope strictly less than $$b/a$$ can never be tangent; slopes exactly equal to $$b/a$$ give asymptotes; slopes strictly greater can be genuine tangents.", "source": "Opus 4.7 ②", "_id": "opus_2_79"}, {"question": "Why is the sum $$PS + PS' = 2a$$ a CONSEQUENCE of the focus-directrix definition for an ellipse, not an additional axiom? (3 steps)", "answer": "- Step 1: From focus-directrix: $$PS = e \\cdot PM$$, $$PS' = e \\cdot PM'$$, where $$PM, PM'$$ are perpendicular distances to the two directrices.\n- Step 2: Distance between directrices is $$2a/e$$, so $$PM + PM' = 2a/e$$ (if $$P$$ is between them).\n- Step 3: Therefore $$PS + PS' = e(PM + PM') = e \\cdot 2a/e = 2a$$ — a fixed constant, derived from the focus-directrix property.\n\nThe two-focus property is thus a theorem, not an axiom. The single focus-directrix definition is more fundamental and unifies all conics.", "source": "Opus 4.7 ②", "_id": "opus_2_62"}, {"question": "Why is the implicit/symmetric tangent equation $$bx\\cos t + ay\\sin t = ab$$ for an ellipse considered more elegant than the slope form? (3 steps)", "answer": "- Step 1: The slope form $$y = mx + c$$ requires solving for $$y$$, which fails at vertical tangents.\n- Step 2: The symmetric form treats $$x$$ and $$y$$ on equal footing — it's well-defined for ALL points on the ellipse, including vertices.\n- Step 3: It also reveals the deep coefficient structure: $$\\cos t$$ and $$\\sin t$$ are the \"directional cosines\" of the parameter, and $$ab$$ is the cleanest possible constant — a hallmark of trigonometric beauty.\n\nTakeaway: Symmetric forms preserve the curve's natural symmetry and avoid degeneracies — they're worth memorising.", "source": "Opus 4.7 ①", "_id": "opus_1_74"}, {"question": "Why does $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ produce a closed bounded curve, while $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ produces two unbounded branches? (3 steps)", "answer": "- Step 1: For the ellipse, both terms are non-negative and sum to 1, forcing $$|x| \\le a$$ and $$|y| \\le b$$ — both coordinates bounded.\n- Step 2: For the hyperbola, the minus sign allows rearrangement to $$\\frac{x^2}{a^2} = 1 + \\frac{y^2}{b^2} \\ge 1$$, so $$|x| \\ge a$$ but $$|y|$$ has no upper bound.\n- Step 3: A single sign flip in the equation transforms a closed \"stretched circle\" into two infinite branches stretching outward.\n\nTakeaway: The sign between the squared terms is what fundamentally distinguishes an ellipse from a hyperbola.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Why does the equation $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ produce a curve with two disconnected branches? (3 steps)", "answer": "- Step 1: Set $$y = 0$$: $$x^2 = a^2$$, so $$x = \\pm a$$. The curve crosses the x-axis at two vertices.\n- Step 2: Set $$x = 0$$: $$-\\frac{y^2}{b^2} = 1$$ — no real solution. The curve never crosses the y-axis.\n- Step 3: For $$|x| < a$$, $$\\frac{x^2}{a^2} < 1$$, so $$\\frac{y^2}{b^2}$$ would need to be negative — impossible. The curve only exists for $$|x| \\geq a$$, giving two branches: one for $$x \\geq a$$ and one for $$x \\leq -a$$.\n\nThe hyperbola \"skips over\" the strip $$-a < x < a$$ — that's the gap between branches.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "Why does the rectangular hyperbola $$x^2 - y^2 = a^2$$ have perpendicular asymptotes, and is it equivalent to $$xy = c^2$$? (3 steps)", "answer": "- Step 1: For $$x^2 - y^2 = a^2$$, asymptotes are $$y = \\pm x$$ (slopes $$+1, -1$$). Their gradient product is $$-1$$, so they are perpendicular — that's what \"rectangular\" means.\n- Step 2: $$xy = c^2$$ also has perpendicular asymptotes, namely $$x = 0$$ (the $$y$$-axis) and $$y = 0$$ (the $$x$$-axis).\n- Step 3: They are the same geometric shape but rotated by $$45°$$ relative to each other; the relationship is $$a^2 = 2c^2$$ (or $$a = c\\sqrt{2}$$).\n\nTakeaway: \"Rectangular hyperbola\" describes the shape (perpendicular asymptotes), not a unique equation form.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Why does the parabola occupy a \"boundary\" position between ellipses and hyperbolas in the family of conics? (3 steps)", "answer": "- Step 1: Parabola has $$e = 1$$, exactly between ellipse ($$e < 1$$) and hyperbola ($$e > 1$$).\n- Step 2: Geometrically, it's the critical case where the cutting plane is parallel to the slant edge of the cone — neither closing into an ellipse nor breaking through both nappes.\n- Step 3: As a limit: a parabola is an \"infinitely stretched ellipse\" (one focus has gone to infinity) or an \"infinitely opened hyperbola\" — it sits at the boundary as both limits.\n\nTakeaway: The parabola is the unique conic with a single focus and infinite asymptotic behaviour — the boundary case of the conic family.", "source": "Opus 4.7 ①", "_id": "opus_1_86"}, {"question": "A common mistake is to confuse the tangent and normal equations for a hyperbola with those of an ellipse. What is a key structural difference in the formulas for the tangent to an ellipse vs. the tangent to a hyperbola (using sec/tan parameters)? (2 steps)", "answer": "- Step 1: The tangent to an ellipse is $$bx\\cos t + ay\\sin t = ab$$, where all terms on the left are added together.\n- Step 2: The tangent to a hyperbola is $$bx\\sec\\theta - ay\\tan\\theta = ab$$, where the $$y$$-term is subtracted.\n+ This difference mirrors the Cartesian equations: the ellipse has a plus sign $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$, while the hyperbola has a minus sign $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_32"}, {"question": "Deriving the hyperbola equation from focus-directrix uses the same setup as the ellipse ($$S=(ae,0)$$, directrix $$x=a/e$$), but results in $$\\frac{x^{2}}{a^{2}}-\\frac{y^{2}}{b^{2}}=1$$. What is the crucial algebraic step that leads to the minus sign and the definition $$b^2 = a^2(e^2-1)$$? (3 steps)", "answer": "- Step 1: Following the same derivation as the ellipse, we arrive at the intermediate equation: $$x^{2}(1-e^{2})+y^{2}=a^{2}(1-e^{2})$$.\n- Step 2: Unlike the ellipse, for a hyperbola, $$e>1$$. This means that $$1-e^{2}$$ is a negative number. To make the denominators positive and match standard form, we multiply the entire equation by $$-1$$: $$x^{2}(e^{2}-1)-y^{2}=a^{2}(e^{2}-1)$$.\n- Step 3: Divide by $$a^{2}(e^{2}-1)$$ to get $$\\frac{x^{2}}{a^{2}}-\\frac{y^{2}}{a^{2}(e^{2}-1)}=1$$. Since $$e>1$$, the term $$a^{2}(e^{2}-1)$$ is positive, so we define $$b^{2}=a^{2}(e^{2}-1)$$, resulting in the standard hyperbola equation with a minus sign.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "Why are normals to a parabola particularly simple in form $$y + tx = 2at + at^3$$, and what's the underlying geometric reason? (3 steps)", "answer": "- Step 1: At $$P(at^2, 2at)$$: $$\\tfrac{dy}{dx} = \\tfrac{1}{t}$$ (gradient of tangent).\n- Step 2: Normal gradient: $$-t$$. Equation: $$y - 2at = -t(x - at^2) \\Rightarrow y + tx = 2at + at^3$$.\n- Step 3: Cubic dependence on $$t$$ reflects the parabola's \"wider gap between intersections\" as $$t$$ grows — three normals can pass through a generic point (compared to ellipse's complications).\n\nTakeaway: The cubic in $$t$$ embodies the rich geometry of parabolic normals — useful for locus problems involving multiple normals from a single external point.", "source": "Opus 4.7 ①", "_id": "opus_1_80"}, {"question": "Why does the equation of the chord of an ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ joining $$P(a\\cos\\alpha, b\\sin\\alpha)$$ and $$Q(a\\cos\\beta, b\\sin\\beta)$$ simplify nicely? (3 steps)", "answer": "- Step 1: The chord can be derived using the slope formula and point-slope. After simplification, it's $$\\frac{x}{a}\\cos\\frac{\\alpha+\\beta}{2} + \\frac{y}{b}\\sin\\frac{\\alpha+\\beta}{2} = \\cos\\frac{\\alpha-\\beta}{2}$$.\n- Step 2: When $$\\alpha = \\beta$$: this becomes the tangent equation at parameter $$\\alpha$$ (the chord degenerates to a tangent).\n- Step 3: The simplification arises from sum-to-product identities, which give a symmetric form involving the average and difference of parameters.\n\nThis \"chord-becomes-tangent\" limit is a powerful technique: derive a chord formula, then specialise to get the tangent.", "source": "Opus 4.7 ②", "_id": "opus_2_85"}, {"question": "A common misconception: is the parameter $$t$$ in $$x = a\\cos t, y = b\\sin t$$ equal to the polar angle of the point on the ellipse? (3 steps)", "answer": "- Step 1: NO — this is a misconception. For a circle ($$a = b$$), $$t$$ IS the polar angle. For an ellipse, generally not.\n- Step 2: The actual angle $$\\phi$$ from the origin to the point satisfies $$\\tan\\phi = \\frac{b\\sin t}{a\\cos t} = \\frac{b}{a}\\tan t$$, so $$\\phi \\neq t$$ unless $$a = b$$.\n- Step 3: Geometrically, $$t$$ is the angle of the corresponding point on the auxiliary circle of radius $$a$$, projected vertically onto the ellipse. It's called the \"eccentric anomaly\" in orbital mechanics.\n\nThe takeaway: $$t$$ is a parameter, not a geometric angle — distinguish algebraic parameterisation from geometric angle.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "When rotating $$xy = c^2$$ by $$45°$$ about the origin, what curve results, and what is the relationship between the original $$c$$ and the new constant? (3 steps)", "answer": "- Step 1: Rotation by $$45°$$: substitute $$x \\to \\tfrac{x + y}{\\sqrt{2}}, y \\to \\tfrac{-x + y}{\\sqrt{2}}$$.\n- Step 2: $$xy = \\tfrac{(x+y)(-x+y)}{2} = \\tfrac{y^2 - x^2}{2}$$. Setting equal to $$c^2$$: $$\\tfrac{y^2 - x^2}{2} = c^2$$, i.e., $$y^2 - x^2 = 2c^2$$.\n- Step 3: This has the form $$y^2 - x^2 = a^2$$ with $$a^2 = 2c^2$$, i.e., $$a = c\\sqrt{2}$$.\n\nTakeaway: Rectangular hyperbolas in different orientations belong to the same family up to rotation; $$xy = c^2$$ and $$y^2 - x^2 = 2c^2$$ are rotational equivalents.", "source": "Opus 4.7 ①", "_id": "opus_1_64"}, {"question": "Conceptually, why does the same \"parametric elimination\" strategy work for finding loci on different conic sections? (3 steps)", "answer": "- Step 1: Each conic has a one-parameter family of points (a parameterisation), so any geometric construction yields coordinates that are functions of the parameter.\n- Step 2: Each conic comes with a fundamental identity ($$\\cos^2 + \\sin^2 = 1$$, $$\\cosh^2 - \\sinh^2 = 1$$, $$\\sec^2 - \\tan^2 = 1$$, etc.) relating the trig/hyperbolic functions used.\n- Step 3: To get a Cartesian equation, we express the parameter through $$X$$ and $$Y$$ and combine via the identity to eliminate.\n\nThe strategy is uniform — only the specific identity changes. This is the power of parametric methods.", "source": "Opus 4.7 ②", "_id": "opus_2_81"}, {"question": "Show that $$\\cos(\\angle PSS') = e$$ for an ellipse, where $$P = (0, b)$$ is the top of the ellipse and $$S, S'$$ are the foci. (3 steps)", "answer": "- Step 1: Foci are at $$S = (ae, 0)$$ and $$S' = (-ae, 0)$$, with $$|SS'| = 2ae$$. Point $$P = (0, b)$$.\n- Step 2: $$PS = \\sqrt{(ae)^2 + b^2} = \\sqrt{a^2 e^2 + b^2}$$. Use $$b^2 = a^2(1 - e^2)$$: $$PS = \\sqrt{a^2 e^2 + a^2 - a^2 e^2} = \\sqrt{a^2} = a$$.\n- Step 3: In triangle $$PSS'$$, the angle at $$S$$ has adjacent $$ae$$ (horizontal leg) and hypotenuse $$a$$, so $$\\cos(\\angle PSS') = ae/a = e$$.\n\nA beautiful geometric interpretation of eccentricity: $$e$$ is literally a cosine in this configuration!", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "What does the formula $$PS = a - ex$$ for distance from a point on the ellipse to a focus tell us geometrically? (3 steps)", "answer": "- Step 1: $$PS = a - ex$$ is a LINEAR function of the $$x$$-coordinate of $$P$$. As $$x$$ increases (moves right), $$PS$$ to the right focus decreases linearly.\n- Step 2: At $$x = a$$ (right vertex): $$PS = a - ea = a(1 - e)$$ — closest approach to right focus.\n- Step 3: At $$x = -a$$ (left vertex): $$PS = a + ea = a(1 + e)$$ — farthest from right focus.\n\nTakeaway: The linear formula encodes orbital perihelion/aphelion in a simple way; eccentricity directly controls the variation.", "source": "Opus 4.7 ①", "_id": "opus_1_79"}, {"question": "What's the structural similarity between the tangent equations for an ellipse and a hyperbola at their parametric points? (3 steps)", "answer": "- Step 1: Ellipse tangent at $$(a\\cos t, b\\sin t)$$: $$bx\\cos t + ay\\sin t = ab$$.\n- Step 2: Hyperbola tangent at $$(a\\cosh t, b\\sinh t)$$: $$bx\\cosh t - ay\\sinh t = ab$$.\n- Step 3: Hyperbola tangent at $$(a\\sec\\theta, b\\tan\\theta)$$: $$bx\\sec\\theta - ay\\tan\\theta = ab$$.\n\nPattern: the coefficients of $$x$$ and $$y$$ involve the parameter through the same functions used in the parameterisation; the sign matches the curve's equation; right-hand side is always $$ab$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "What's the tangent equation to a parabola $$y^2 = 4ax$$ at $$(at^2, 2at)$$, and what's the corresponding tangent line condition? (3 steps)", "answer": "- Step 1: Parametric tangent: $$ty = x + at^2$$ (memorise from FP1).\n- Step 2: For a line $$y = mx + c$$ to be tangent: substitute into $$y^2 = 4ax$$ and impose discriminant = 0.\n- Step 3: This yields the condition $$c = a/m$$ — much simpler than the corresponding ellipse/hyperbola conditions.\n\nSo tangent parabola: $$y = mx + a/m$$ with $$m \\neq 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_63"}, {"question": "Find the locus of points $$P$$ such that the difference of distances from $$P$$ to two fixed points $$S$$ and $$S'$$ is constant (equal to $$2a$$). What type of curve is this? (2 steps)", "answer": "- Step 1: Let the two fixed points be $$S(c, 0)$$ and $$S'(-c, 0)$$. For any point $$P(x, y)$$, the condition is $$|PS - PS'| = 2a$$, where $$0 < 2a < 2c$$ (the constant must be less than the distance between the foci).\n- Step 2: Squaring and simplifying (or recognizing the standard form):\n$$PS - PS' = \\pm 2a$$\nThis leads to the equation $$\\frac{x^2}{a^2} - \\frac{y^2}{c^2 - a^2} = 1$$.\nThis is a hyperbola with transverse axis along the x-axis. The distance between the foci is $$2c$$, and the distance between the vertices is $$2a$$.\n+ For the special case where the constant equals the distance between foci ($$2a = 2c$$), we get a degenerate hyperbola — two intersecting lines. For $$2a > 2c$$, there would be no points satisfying the condition.\n+ For ellipses, the sum of distances is constant; for hyperbolas, the difference is constant.", "source": "MiniMax ②", "_id": "minimax_2_33"}, {"question": "What does the gradient $$-\\frac{b^2 x}{a^2 y}$$ (from implicit differentiation of an ellipse) tell us about tangent slopes at specific points? (3 steps)", "answer": "- Step 1: At the rightmost vertex $$(a, 0)$$: gradient = $$-\\frac{b^2 \\cdot a}{a^2 \\cdot 0}$$ → undefined → vertical tangent ✓.\n- Step 2: At the top vertex $$(0, b)$$: gradient = $$-\\frac{b^2 \\cdot 0}{a^2 \\cdot b} = 0$$ → horizontal tangent ✓.\n- Step 3: At a general point with $$x, y > 0$$: gradient is negative — tangent slopes downward, consistent with the upper-right arc going from $$(a, 0)$$ up to $$(0, b)$$.\n\nThe implicit form gives consistent results at both regular and \"boundary\" points (vertices).", "source": "Opus 4.7 ②", "_id": "opus_2_76"}, {"question": "Why does the eccentricity of a hyperbola relate to the slope of its asymptotes? (3 steps)", "answer": "- Step 1: Asymptote slopes are $$\\pm b/a$$, and eccentricity satisfies $$b^2 = a^2(e^2 - 1)$$.\n- Step 2: So $$b/a = \\sqrt{e^2 - 1}$$, i.e., asymptote slope $$= \\sqrt{e^2 - 1}$$.\n- Step 3: Implications:\n+ $$e \\to 1$$: slope $$\\to 0$$ (very narrow hyperbola, asymptotes near horizontal)\n+ $$e = \\sqrt{2}$$: slope $$= 1$$ (rectangular hyperbola, perpendicular asymptotes)\n+ $$e \\to \\infty$$: slope $$\\to \\infty$$ (very fat hyperbola, near vertical asymptotes)\n\nSo eccentricity geometrically encodes the \"openness angle\" of the hyperbola.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "Does $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ describe the entire interior region of the ellipse, or just the curve? (2 steps)", "answer": "- Step 1: The equation $$=$$ 1 describes only the curve (the boundary). Points satisfying $$<$$ 1 are interior; $$>$$ 1 are exterior.\n- Step 2: So the full ellipse \"shape\" (closed disc) is $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} \\leq 1$$. The curve alone is the equality.\n\nThis distinction matters for problems involving \"inside\" vs \"on\" the ellipse — common in optimisation problems.", "source": "Opus 4.7 ②", "_id": "opus_2_75"}, {"question": "A curve has the equation $$\\frac{x^2}{25} - \\frac{y^2}{16} = 1$$. Without full calculation, determine whether the foci are closer to or further from the center than the vertices, and explain why. (2 steps)", "answer": "- Step 1: The vertices are at $$(\\pm a, 0) = (\\pm 5, 0)$$, so they are 5 units from the center.\n- Step 2: The foci are at $$(\\pm ae, 0)$$. Since the eccentricity of a hyperbola is always $$e > 1$$, the distance $$ae = 5e$$ must be greater than 5.\n+ Therefore, the foci are further from the center than the vertices.\n+ Misconception check: Don't confuse this with an ellipse, where $$0 < e < 1$$ means $$ae < a$$, so the foci are closer to the center than the vertices.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "Why does the normal at any point $$P$$ on an ellipse hit the major axis between the focus and the center? (3 steps)", "answer": "- Step 1: For ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with $$a > b$$, normal at $$(a\\cos t, b\\sin t)$$ is $$ax\\sin t - by\\cos t = (a^2 - b^2)\\cos t \\sin t$$.\n- Step 2: Set $$y = 0$$ to find x-axis intersection: $$x = \\frac{(a^2 - b^2)\\cos t}{a}$$.\n- Step 3: Since $$a^2 - b^2 < a^2$$, we have $$|x| < |a\\cos t|$$ — the foot of the normal is closer to the center than $$P$$ itself.\n\nThis is a special property of the ellipse: the normal \"leans inward\" toward the center. It's also key to the ellipse's reflection property (normal bisects $$\\angle SPS'$$).", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "Why does $$b^2 = a^2(e^2 - 1)$$ have a plus sign instead of a minus (compared to the ellipse formula)? (3 steps)", "answer": "- Step 1: For the ellipse, $$b^2 = a^2(1 - e^2)$$ requires $$e < 1$$ for $$b^2 > 0$$.\n- Step 2: For the hyperbola, the focus-directrix derivation produces $$a^2(e^2 - 1)$$ — needing $$e > 1$$ for positivity, perfectly aligning with the eccentricity classification.\n- Step 3: Geometrically, this sign flip mirrors the focus position: for an ellipse the focus lies INSIDE ($$ae < a$$), for a hyperbola it lies OUTSIDE ($$ae > a$$).\n\nTakeaway: The formula is forced by the geometry; algebra and geometry tell the same story.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "What does it mean for a hyperbola to have a \"transverse axis\" vs a \"conjugate axis\"? (3 steps)", "answer": "- Step 1: For $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$: the transverse axis is along the x-axis (direction the curve opens). It's the segment from $$(-a, 0)$$ to $$(a, 0)$$, length $$2a$$.\n- Step 2: The conjugate axis is along the y-axis, of length $$2b$$ — but the curve doesn't actually intersect this axis. It's the \"implicit\" perpendicular axis.\n- Step 3: The conjugate axis defines the rectangle (with corners $$(\\pm a, \\pm b)$$) through which the asymptotes pass.\n\nSo \"transverse\" = direction of opening; \"conjugate\" = perpendicular axis defining the asymptote rectangle.", "source": "Opus 4.7 ②", "_id": "opus_2_97"}, {"question": "For the rectangular hyperbola $$xy = c^2$$ at $$P(ct, c/t)$$, derive the tangent equation. (4 steps)", "answer": "- Step 1: From $$y = \\tfrac{c^2}{x}$$, differentiate: $$\\tfrac{dy}{dx} = -\\tfrac{c^2}{x^2}$$.\n- Step 2: At $$P(ct, c/t)$$: $$\\tfrac{dy}{dx} = -\\tfrac{c^2}{(ct)^2} = -\\tfrac{1}{t^2}$$.\n- Step 3: Point-slope form: $$y - c/t = -\\tfrac{1}{t^2}(x - ct)$$.\n- Step 4: Multiply by $$t^2$$ and simplify: $$t^2 y - ct = -x + ct$$, i.e., $$x + t^2 y = 2ct$$.\n\nTakeaway: The clean rational derivative $$-1/t^2$$ makes rectangular-hyperbola tangents particularly tidy.", "source": "Opus 4.7 ①", "_id": "opus_1_69"}, {"question": "Derive the equations of the asymptotes of $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ from intuition. (3 steps)", "answer": "- Step 1: For very large $$|x|, |y|$$, the constant 1 is negligible: $$\\frac{x^2}{a^2} \\approx \\frac{y^2}{b^2}$$.\n- Step 2: This gives $$\\frac{y}{x} \\approx \\pm \\frac{b}{a}$$, so the curve approaches the lines $$y = \\pm\\frac{b}{a}x$$ at infinity.\n- Step 3: These lines through the origin are the asymptotes — guides showing the slope of the branches as they extend.\n\nTakeaway: The slope ratio $$\\pm b/a$$ encodes how \"wide\" the hyperbola opens — small $$b/a$$ means tight branches close to the $$x$$-axis.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "A conic section is obtained by slicing a cone. What determines whether the slice produces an ellipse, parabola, or hyperbola? (1 step)", "answer": "The type of conic depends on the angle of the slice relative to the cone's axis. If the slice is perpendicular to the axis, you get a circle (special ellipse). If the slice is at an angle less steep than the cone's side (but not parallel to it), you get an ellipse. If the slice is parallel to the cone's side, you get a parabola. If the slice is steeper than the cone's side (cutting through both nappes), you get a hyperbola. This geometric interpretation explains why eccentricity relates to the angle — it's essentially the ratio of the slice angle to the cone angle.", "source": "MiniMax ①", "_id": "minimax_1_54"}, {"question": "When deriving a tangent equation parametrically, what should you watch out for at $$t = 0, \\pi/2, \\pi$$? (4 steps)", "answer": "- Step 1: At these special $$t$$ values, $$\\sin t$$ or $$\\cos t$$ may be zero, causing the gradient $$-\\tfrac{b\\cos t}{a\\sin t}$$ to be undefined or zero.\n- Step 2: At $$t = 0$$ or $$\\pi$$ (rightmost/leftmost vertex), $$\\sin t = 0$$, gradient → ∞: tangent is vertical, can't write as $$y = \\cdots$$.\n- Step 3: At $$t = \\pi/2, 3\\pi/2$$ (top/bottom), $$\\cos t = 0$$, gradient = 0: tangent is horizontal.\n- Step 4: The implicit form $$bx\\cos t + ay\\sin t = ab$$ handles all cases without breaking — it doesn't divide by anything.\n\nTakeaway: The implicit/symmetric tangent equation is more robust than the explicit $$y = mx + c$$ form near vertical tangents.", "source": "Opus 4.7 ①", "_id": "opus_1_72"}, {"question": "What is the standard Cartesian equation of a hyperbola, and how is it structurally related to the ellipse? (3 steps)", "answer": "- Step 1: $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$.\n- Step 2: It differs from the ellipse only by the sign of the second term — a single sign flip transforms a closed curve into two open branches.\n- Step 3: This algebraic kinship reflects geometric reality: ellipses and hyperbolas are both conic sections, with the sign capturing whether the cutting plane stays within one cone (ellipse) or breaks through both nappes (hyperbola).\n\nTakeaway: The hyperbola is the ellipse's \"mirror twin\" — same algebraic skeleton, opposite topological behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "What is the strategic difference between using $$(\\pm a\\cosh t, b\\sinh t)$$ versus $$(a\\sec\\theta, b\\tan\\theta)$$ as the parameterisation for a hyperbola? (3 steps)", "answer": "- Step 1: cosh/sinh form has $$t \\in \\mathbb{R}$$ (no exclusions), but needs the $$\\pm$$ for both branches.\n- Step 2: sec/tan form needs $$\\theta \\ne \\pm\\pi/2$$ (excluding asymptotic directions), but a single parameter $$\\theta$$ covers both branches automatically.\n- Step 3: Use cosh/sinh when integrating or differentiating frequently (cleaner derivative structure); use sec/tan when leveraging trig identities or relating to circular trigonometry.\n\nTakeaway: Both are equivalent; choose the form aligned with the algebraic structure of your problem.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "Show that rotating $$x^2 - y^2 = a^2$$ by 45° gives a curve of the form $$XY = $$ const. (3 steps)", "answer": "- Step 1: A 45° rotation transforms coordinates: $$x = (X+Y)/\\sqrt{2}$$, $$y = (-X+Y)/\\sqrt{2}$$ (or similar).\n- Step 2: Compute: $$x^2 - y^2 = \\frac{(X+Y)^2 - (-X+Y)^2}{2} = \\frac{4XY}{2} = 2XY$$.\n- Step 3: So $$x^2 - y^2 = a^2$$ becomes $$2XY = a^2$$, i.e., $$XY = a^2/2$$. With $$c^2 = a^2/2$$, we recover $$XY = c^2$$.\n\nThis algebraic relationship confirms the geometric rotation: the two forms describe the same underlying curve in different coordinates.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Why is the eccentricity of an ellipse restricted to $$0 < e < 1$$, and what happens as $$e$$ varies? (3 steps)", "answer": "- Step 1: From $$b^2 = a^2(1 - e^2)$$: for $$b^2 > 0$$, we need $$1 - e^2 > 0$$, i.e., $$|e| < 1$$. Combined with $$e \\geq 0$$, this gives $$0 \\leq e < 1$$.\n- Step 2: When $$e = 0$$: $$b = a$$, so the ellipse is a circle. When $$e \\to 1$$: $$b \\to 0$$, the ellipse becomes infinitely thin (degenerate to a line segment).\n- Step 3: So $$e$$ controls \"elongation\": small $$e$$ → nearly circular; $$e$$ near 1 → very stretched.\n\nReal-world examples: Earth's orbit has $$e \\approx 0.017$$ (nearly circular); Halley's comet has $$e \\approx 0.97$$ (very elongated).", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "A hyperbola has the equation $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ with $$b > a$$. Does the focus shift to the y-axis like it does for an ellipse with $$b > a$$? Why or why not? (2 steps)", "answer": "- Step 1: No, the foci remain on the x-axis at $$(\\pm ae, 0)$$, and the directrices remain $$x = \\pm \\frac{a}{e}$$.\n- Step 2: Setting $$x=0$$ in the hyperbola equation yields $$-\\frac{y^2}{b^2} = 1$$, which has no real solutions for $$y$$.\n+ Therefore, the hyperbola never crosses the y-axis, and its \"branches\" open left and right along the x-axis. The foci must be on the x-axis to be \"inside\" the branches.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "What is the analogous reflection property for the hyperbola, and how does it differ from the ellipse? (3 steps)", "answer": "- Step 1: At any point on a hyperbola, the **tangent** bisects the angle $$\\angle SPS'$$ between the lines to the two foci (note: tangent, not normal — opposite to the ellipse).\n- Step 2: Physical consequence: light from one focus, after reflecting off the hyperbola, appears to come from the OTHER focus (a virtual image, since rays diverge).\n- Step 3: Used in Cassegrain telescopes — a hyperbolic secondary mirror redirects light from a parabolic primary's focus to a more accessible eyepiece location.\n\nTakeaway: Roles of tangent/normal swap between ellipse and hyperbola in their reflection properties — reflecting their fundamentally different topological natures (closed vs open).", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "A chord of the parabola y² = 4ax passes through the focus. If the chord joins points with parameters p and q, show that pq = -1. (2 steps)", "answer": "- Step 1: Points are P(at², 2at) and Q(aq², 2aq). The chord equation is: $$y - 2ap = \\frac{2a(p - q)}{a(p^2 - q^2)}(x - ap^2)$$ = $$\\frac{2}{p+q}(x - ap^2)$$ (using p² - q² = (p - q)(p + q))\n- Step 2: Simplifying: $$(p+q)y = 2x + 2apq$$. Since the focus (a, 0) lies on this chord: $$(p+q)(0) = 2a + 2apq$$ → $$0 = 2a + 2apq$$ → $$pq = -1$$", "source": "MiniMax ①", "_id": "minimax_1_38"}, {"question": "Why do parametric and implicit differentiation give identical tangent gradients on an ellipse? (3 steps)", "answer": "- Step 1: Implicit gives $$\\tfrac{dy}{dx} = -\\tfrac{b^2 x}{a^2 y}$$ — a function of position $$(x, y)$$.\n- Step 2: Parametric gives $$\\tfrac{dy}{dx} = -\\tfrac{b\\cos t}{a\\sin t}$$ — a function of parameter $$t$$.\n- Step 3: At any point $$(a\\cos t, b\\sin t)$$, substituting into the implicit gradient: $$-\\tfrac{b^2 a\\cos t}{a^2 b\\sin t} = -\\tfrac{b\\cos t}{a\\sin t}$$ ✓ — they agree.\n\nTakeaway: Both methods describe the same geometric quantity; the difference is parameterisation choice.", "source": "Opus 4.7 ①", "_id": "opus_1_67"}, {"question": "A point $$P$$ lies on $$\\frac{x^2}{4} + \\frac{y^2}{16} = 1$$. Point $$N$$ is the foot of perpendicular from $$P$$ to the line $$y = 6$$. $$M$$ is the midpoint of $$PN$$. Find the locus of $$M$$. (3 steps)", "answer": "- Step 1: Parameterise $$P = (2\\cos t, 4\\sin t)$$. Then $$N = (2\\cos t, 6)$$ (same $$x$$, $$y = 6$$).\n- Step 2: Midpoint: $$M = (2\\cos t, \\tfrac{4\\sin t + 6}{2}) = (2\\cos t, 2\\sin t + 3)$$.\n- Step 3: Let $$M = (X, Y)$$. Then $$\\cos t = X/2$$, $$\\sin t = (Y - 3)/2$$. Identity: $$\\tfrac{X^2}{4} + \\tfrac{(Y - 3)^2}{4} = 1$$, i.e., $$X^2 + (Y - 3)^2 = 4$$ — a CIRCLE of radius 2 centred at $$(0, 3)$$.\n\nTakeaway: Midpoint constructions can transform an ellipse into a circle — averaging \"absorbs\" the directional stretching.", "source": "Opus 4.7 ①", "_id": "opus_1_65"}, {"question": "Why does the ellipse have TWO foci and TWO directrices, and why do they all describe the same ellipse? (3 steps)", "answer": "- Step 1: The standard ellipse is symmetric about both axes, so the focus-directrix construction works equally well from either side.\n- Step 2: Reflecting focus $$(ae, 0)$$ across the $$y$$-axis gives $$(-ae, 0)$$, and similarly for directrices. The same ellipse satisfies $$PS = e \\cdot PM$$ for either focus-directrix pair.\n- Step 3: The two foci are essential to the elegant \"string definition\" $$PS + PS' = 2a$$.\n\nTakeaway: The duplication arises from bilateral symmetry; this is also why a parabola has only ONE focus (asymmetry — only one axis of symmetry).", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "Why can a line with slope between $$-b/a$$ and $$b/a$$ never be tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$? (3 steps)", "answer": "- Step 1: The asymptotes have slopes $$\\pm b/a$$ — the limiting tangent directions at infinity.\n- Step 2: A line with slope between these (flatter than asymptotes) would, when shifted up or down, either miss both branches entirely or cross both branches twice — never just touch one tangentially.\n- Step 3: Algebraically: $$c^2 = a^2 m^2 - b^2$$ requires $$|m| \\ge b/a$$; otherwise $$c^2 < 0$$, impossible for real $$c$$.\n\nTakeaway: Geometry (asymptotes block shallow tangents) and algebra (discriminant negative for shallow slopes) tell the same story.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "A common mistake: applying $$b^2 = a^2(1 - e^2)$$ to $$\\frac{x^2}{4} + \\frac{y^2}{9} = 1$$ gives $$e^2 = -\\tfrac{5}{4}$$. What went wrong? (3 steps)", "answer": "- Step 1: The formula $$b^2 = a^2(1 - e^2)$$ assumes $$a > b$$; here $$b = 3 > 2 = a$$, so it's the wrong formula.\n- Step 2: A negative $$e^2$$ is the diagnostic flag — geometrically impossible, indicating the formula was misapplied.\n- Step 3: The correct formula with $$b > a$$ is $$a^2 = b^2(1 - e^2)$$: $$4 = 9(1 - e^2) \\Rightarrow e^2 = \\tfrac{5}{9} \\Rightarrow e = \\tfrac{\\sqrt{5}}{3}$$.\n\nTakeaway: A negative $$e^2$$ result is a signal you've got the major/minor axes confused.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "Show that if a line $$y = mx + c$$ is tangent to an ellipse, the lines $$y = mx \\pm \\sqrt{a^2 m^2 + b^2}$$ are both valid tangents. (3 steps)", "answer": "- Step 1: Tangent condition: $$c^2 = a^2 m^2 + b^2$$. Solving for $$c$$: $$c = \\pm\\sqrt{a^2 m^2 + b^2}$$.\n- Step 2: Both values of $$c$$ satisfy the condition. These correspond to two parallel tangent lines — one on each \"side\" of the ellipse.\n- Step 3: Geometrically: for a given slope $$m$$, there are two tangent positions where the line just touches the ellipse — one \"above\" and one \"below\" (with respect to the slope direction).\n\nSo tangents to an ellipse with given slope come in pairs, separated by a distance proportional to $$2\\sqrt{a^2 m^2 + b^2}/\\sqrt{1+m^2}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_100"}, {"question": "Why is \"discriminant = 0\" a powerful general technique for finding tangent conditions to any conic? (3 steps)", "answer": "- Step 1: Substituting a line into a conic produces a quadratic in $$x$$ (or $$y$$).\n- Step 2: The discriminant tells you the number of intersection points: positive → secant (two crossings), zero → tangent (one), negative → no intersection.\n- Step 3: This works for ALL conics — a unified algebraic interpretation of the geometric \"touches but doesn't cross\" condition.\n\nTakeaway: Discriminant = 0 is the algebraic translation of geometric tangency; it works universally across conic types.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Sketch the curve $$x = 4\\cos t, y = \\sin t$$ for $$\\pi/2 \\leq t \\leq 3\\pi/2$$. What part of the ellipse is traced? (3 steps)", "answer": "- Step 1: The full curve is the ellipse $$\\frac{x^2}{16} + y^2 = 1$$ (semi-axes 4 and 1).\n- Step 2: Evaluate at endpoints/midpoint:\n+ $$t = \\pi/2$$: $$(0, 1)$$ — top\n+ $$t = \\pi$$: $$(-4, 0)$$ — leftmost\n+ $$t = 3\\pi/2$$: $$(0, -1)$$ — bottom\n- Step 3: As $$t$$ increases over $$[\\pi/2, 3\\pi/2]$$, the point traces the LEFT HALF of the ellipse, from top to bottom passing through the leftmost vertex.\n\nParametric plotting gives elegant control over which arc to draw — useful in physics (e.g., partial orbits).", "source": "Opus 4.7 ②", "_id": "opus_2_66"}, {"question": "A line passes through the point $$(a, b)$$ and has gradient $$m$$. Is it necessarily a tangent to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$? Why or why not? (2 steps)", "answer": "- Step 1: No, it is not necessarily a tangent. The point $$(a, b)$$ does not even lie on the ellipse.\n+ Substituting $$(a, b)$$ into the equation gives $$\\frac{a^2}{a^2} + \\frac{b^2}{b^2} = 1 + 1 = 2 \\neq 1$$.\n- Step 2: A tangent must touch the curve at exactly one point. Just because a line has a certain gradient and passes through a specific point in the plane doesn't mean it grazes the ellipse.\n+ The point $$(a, b)$$ is actually outside the ellipse, as the sum of the squared ratios is greater than 1.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "What happens to the shape of an ellipse as the eccentricity $$e$$ approaches 0? What happens as it approaches 1?", "answer": "- Step 1: As $$e \\to 0$$, the relationship $$b^{2}=a^{2}(1-e^{2})$$ becomes $$b^{2} \\approx a^{2}(1-0) \\implies b \\approx a$$. The ellipse becomes more circular.\n- Step 2: As $$e \\to 1$$, the relationship becomes $$b^{2} \\approx a^{2}(1-1) = 0 \\implies b \\approx 0$$. The minor axis shrinks to zero, and the ellipse flattens into a line segment along the major axis between the vertices $$(\\pm a, 0)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "A chord through two parametric points $$P(at_1^2, 2at_1)$$ and $$Q(at_2^2, 2at_2)$$ on a parabola passes through the focus. What constraint does this place on $$t_1, t_2$$, and why is it useful? (3 steps)", "answer": "- Step 1: The chord equation derives as $$y(t_1 + t_2) = 2x + 2a t_1 t_2$$.\n- Step 2: For the chord to pass through focus $$(a, 0)$$: $$0 = 2a + 2a t_1 t_2 \\Rightarrow t_1 t_2 = -1$$.\n- Step 3: This single algebraic relation becomes a powerful tool in deriving loci involving normals/tangents from focal-chord endpoints.\n\nTakeaway: \"Focal chord ⟺ product of parameters $$= -1$$\" is a memorable, recurrent identity in parabola problems.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "What's the strategic value of the identity $$(p+q)^2 = p^2 + q^2 + 2pq$$ in parametric chord problems? (3 steps)", "answer": "- Step 1: Many chord problems involve symmetric expressions in parameters $$p, q$$ — like $$p^2 + q^2$$ or $$p + q$$.\n- Step 2: When you know $$p + q$$ and $$pq$$ separately, the identity lets you compute $$p^2 + q^2 = (p+q)^2 - 2pq$$ without needing $$p, q$$ individually.\n- Step 3: This is especially useful when constraints like $$pq = -1$$ (focal chord) reduce sum of squares to $$(p+q)^2 + 2$$ — turning the problem into one variable.\n\nThese elementary symmetric polynomial identities make parametric algebra much cleaner.", "source": "Opus 4.7 ②", "_id": "opus_2_88"}, {"question": "For an ellipse with $$a > b$$, why are the foci inside the curve, not on it? (3 steps)", "answer": "- Step 1: Foci are at $$(\\pm ae, 0)$$ with $$0 < e < 1$$, so $$|ae| < a$$.\n- Step 2: Points $$(\\pm a, 0)$$ are vertices on the ellipse. Points $$(\\pm ae, 0)$$ have smaller $$|x|$$, so they lie between the center and the vertices.\n- Step 3: Since the ellipse is a closed convex curve enclosing the center, any point with $$|x| < a$$ at $$y = 0$$ is inside the ellipse.\n\nThis makes physical sense: in planetary orbits, the Sun (at a focus) is inside the orbit, not on it.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Walk through the derivation that the focus-directrix definition (with $$0 < e < 1$$, focus $$(ae, 0)$$, directrix $$x = a/e$$) produces the standard ellipse equation. (5 steps)", "answer": "- Step 1: Let $$P = (x, y)$$. Compute $$PS^2 = (x - ae)^2 + y^2$$.\n- Step 2: Compute $$PM = \\tfrac{a}{e} - x$$ (perpendicular distance to vertical directrix), so $$PM^2 = \\frac{(a - ex)^2}{e^2}$$.\n- Step 3: Apply $$PS^2 = e^2 PM^2$$: $$(x - ae)^2 + y^2 = (a - ex)^2$$.\n- Step 4: Expand: $$x^2 - 2aex + a^2 e^2 + y^2 = a^2 - 2aex + e^2 x^2$$. The $$2aex$$ terms cancel, giving $$x^2(1 - e^2) + y^2 = a^2(1 - e^2)$$.\n- Step 5: Divide by $$a^2(1 - e^2)$$: $$\\frac{x^2}{a^2} + \\frac{y^2}{a^2(1-e^2)} = 1$$. Setting $$b^2 = a^2(1 - e^2)$$ recovers the standard form.\n\nTakeaway: The cancellation of cross terms is what makes the standard form emerge so cleanly — a hallmark of focus-directrix derivations.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "What is the \"director circle\" of an ellipse, and why does it emerge naturally? (3 steps)", "answer": "- Step 1: The director circle is the locus of intersection points of all PERPENDICULAR pairs of tangents to the ellipse.\n- Step 2: For $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$, the director circle has equation $$x^2 + y^2 = a^2 + b^2$$ — a circle of radius $$\\sqrt{a^2 + b^2}$$ centred at the origin.\n- Step 3: Even though the original curve is elliptical, the perpendicularity constraint produces circular symmetry — a remarkable hidden structure.\n\nTakeaway: Geometric constraints can reveal hidden symmetries that aren't apparent in the original conic.", "source": "Opus 4.7 ①", "_id": "opus_1_77"}, {"question": "Why does the definition of eccentricity using focus-directrix ratio work? Why does this definition produce different conic sections for different values of e? (2 steps)", "answer": "- Step 1: The definition $$\\frac{PS}{PM} = e$$ (distance to focus divided by distance to directrix) creates different geometric situations. When e < 1, the point P must be closer to the directrix relative to the focus, which forces P to stay in a bounded region — forming a closed ellipse. When e = 1, P is equidistant from focus and directrix, creating the open parabola. When e > 1, P can be closer to the focus than the directrix in certain regions, allowing the curve to extend infinitely in two branches — a hyperbola.\n- Step 2: This unifying definition was historically significant because it showed that parabolas, ellipses, and hyperbolas are all \"slices\" of a cone, just with diffe
