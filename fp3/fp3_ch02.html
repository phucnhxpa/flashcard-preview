tually find $$t$$. (4 steps)", "answer": "- Step 1: $$a = 3, b = 2$$. Tangent equation: $$ay\\sinh t + ab = bx\\cosh t$$, i.e., $$3y\\sinh t + 6 = 2x\\cosh t$$.\n- Step 2: Substitute $$x = 0, y = -1$$: $$-3\\sinh t + 6 = 0$$, giving $$\\sinh t = 2$$.\n- Step 3: $$t = \\text{arsinh}(2) = \\ln(2 + \\sqrt{5})$$ using the inverse hyperbolic formula.\n- Step 4: This is the only solution (since $$\\sinh$$ is monotonic).\n\nTakeaway: Substitute the given point into the tangent equation to extract the parameter — a direct algebraic strategy.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": false}, {"question": "Why is the implicit/symmetric tangent equation $$bx\\cos t + ay\\sin t = ab$$ for an ellipse considered more elegant than the slope form? (3 steps)", "answer": "- Step 1: The slope form $$y = mx + c$$ requires solving for $$y$$, which fails at vertical tangents.\n- Step 2: The symmetric form treats $$x$$ and $$y$$ on equal footing — it's well-defined for ALL points on the ellipse, including vertices.\n- Step 3: It also reveals the deep coefficient structure: $$\\cos t$$ and $$\\sin t$$ are the \"directional cosines\" of the parameter, and $$ab$$ is the cleanest possible constant — a hallmark of trigonometric beauty.\n\nTakeaway: Symmetric forms preserve the curve's natural symmetry and avoid degeneracies — they're worth memorising.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": true}, {"question": "What characterises the family of curves with general equation $$Ax^2 + Bxy + Cy^2 + Dx + Ey + F = 0$$, and how does the discriminant $$B^2 - 4AC$$ classify them? (3 steps)", "answer": "- Step 1: This is the most general second-degree polynomial in two variables; all conic sections (and degenerate cases) fit this form.\n- Step 2: The discriminant $$B^2 - 4AC$$ classifies the conic type (modulo degeneracies):\n+ $$B^2 - 4AC < 0$$: ellipse (or circle if $$A = C, B = 0$$)\n+ $$B^2 - 4AC = 0$$: parabola\n+ $$B^2 - 4AC > 0$$: hyperbola\n- Step 3: $$B \\ne 0$$ indicates a rotated conic; $$D, E$$ encode translations.\n\nTakeaway: A single algebraic discriminant classifies all conics — a beautiful unification corresponding to the eccentricity classification.", "source": "Opus 4.7 ①", "_id": "opus_1_75", "judge_pick": true}, {"question": "A line $$y = mx + c$$ is tangent to BOTH a hyperbola $$\\frac{x^2}{4} - \\frac{y^2}{15} = 1$$ AND $$\\frac{x^2}{9} - \\frac{y^2}{95} = 1$$. Conceptually outline the approach. (3 steps)", "answer": "- Step 1: For each hyperbola, write $$c^2 = a_i^2 m^2 - b_i^2$$:\n+ Hyperbola 1: $$c^2 = 4m^2 - 15$$\n+ Hyperbola 2: $$c^2 = 9m^2 - 95$$\n- Step 2: Equate: $$4m^2 - 15 = 9m^2 - 95 \\Rightarrow 5m^2 = 80 \\Rightarrow m^2 = 16$$, so $$m = \\pm 4$$.\n- Step 3: Substitute back: $$c^2 = 4(16) - 15 = 49 \\Rightarrow c = \\pm 7$$.\n\nTakeaway: Common tangent to two conics: equate the two tangent conditions; works identically whether ellipses or hyperbolas.", "source": "Opus 4.7 ①", "_id": "opus_1_76", "judge_pick": false}, {"question": "What is the \"director circle\" of an ellipse, and why does it emerge naturally? (3 steps)", "answer": "- Step 1: The director circle is the locus of intersection points of all PERPENDICULAR pairs of tangents to the ellipse.\n- Step 2: For $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$, the director circle has equation $$x^2 + y^2 = a^2 + b^2$$ — a circle of radius $$\\sqrt{a^2 + b^2}$$ centred at the origin.\n- Step 3: Even though the original curve is elliptical, the perpendicularity constraint produces circular symmetry — a remarkable hidden structure.\n\nTakeaway: Geometric constraints can reveal hidden symmetries that aren't apparent in the original conic.", "source": "Opus 4.7 ①", "_id": "opus_1_77", "judge_pick": true}, {"question": "Conceptually, what's the reflection property of a parabola, and how does it differ from an ellipse's? (3 steps)", "answer": "- Step 1: For a parabola, rays from the focus reflect off the curve and emerge PARALLEL to the axis (and vice versa: parallel rays converge at the focus).\n- Step 2: For an ellipse, rays between the two foci reflect off the curve from one focus to the other.\n- Step 3: The parabola's behaviour is the limit of the ellipse's as one focus moves to infinity — parallel rays = \"rays from a focus at infinity\".\n\nTakeaway: Used in satellite dishes (parabolic) and headlight reflectors — the family of conics gives a continuum of reflection patterns.", "source": "Opus 4.7 ①", "_id": "opus_1_78", "judge_pick": false}, {"question": "What does the formula $$PS = a - ex$$ for distance from a point on the ellipse to a focus tell us geometrically? (3 steps)", "answer": "- Step 1: $$PS = a - ex$$ is a LINEAR function of the $$x$$-coordinate of $$P$$. As $$x$$ increases (moves right), $$PS$$ to the right focus decreases linearly.\n- Step 2: At $$x = a$$ (right vertex): $$PS = a - ea = a(1 - e)$$ — closest approach to right focus.\n- Step 3: At $$x = -a$$ (left vertex): $$PS = a + ea = a(1 + e)$$ — farthest from right focus.\n\nTakeaway: The linear formula encodes orbital perihelion/aphelion in a simple way; eccentricity directly controls the variation.", "source": "Opus 4.7 ①", "_id": "opus_1_79", "judge_pick": true}, {"question": "Why are normals to a parabola particularly simple in form $$y + tx = 2at + at^3$$, and what's the underlying geometric reason? (3 steps)", "answer": "- Step 1: At $$P(at^2, 2at)$$: $$\\tfrac{dy}{dx} = \\tfrac{1}{t}$$ (gradient of tangent).\n- Step 2: Normal gradient: $$-t$$. Equation: $$y - 2at = -t(x - at^2) \\Rightarrow y + tx = 2at + at^3$$.\n- Step 3: Cubic dependence on $$t$$ reflects the parabola's \"wider gap between intersections\" as $$t$$ grows — three normals can pass through a generic point (compared to ellipse's complications).\n\nTakeaway: The cubic in $$t$$ embodies the rich geometry of parabolic normals — useful for locus problems involving multiple normals from a single external point.", "source": "Opus 4.7 ①", "_id": "opus_1_80", "judge_pick": true}, {"question": "Mentally verify that $$P = (0, b)$$ on the ellipse satisfies $$PS + PS' = 2a$$ using the foci $$(\\pm ae, 0)$$. (3 steps)", "answer": "- Step 1: Distance from $$(0, b)$$ to focus $$(ae, 0)$$: $$\\sqrt{a^2 e^2 + b^2}$$.\n- Step 2: Using $$b^2 = a^2(1 - e^2)$$: $$a^2 e^2 + b^2 = a^2 e^2 + a^2(1 - e^2) = a^2$$. So distance $$= \\sqrt{a^2} = a$$.\n- Step 3: By symmetry, distance to other focus is also $$a$$. Sum $$= a + a = 2a$$ ✓.\n\nTakeaway: At the top of the minor axis, the two focal distances are EQUAL (both $$a$$) — confirming the symmetric geometry.", "source": "Opus 4.7 ①", "_id": "opus_1_81", "judge_pick": true}, {"question": "Conceptually, why is the constant $$a^2 + b^2$$ on the right of the hyperbola normal equation, while $$a^2 - b^2$$ appears for the ellipse? (3 steps)", "answer": "- Step 1: For an ellipse: $$b^2 = a^2(1 - e^2) \\Rightarrow a^2 - b^2 = a^2 e^2 = (ae)^2$$ — the squared focal half-distance.\n- Step 2: For a hyperbola: $$b^2 = a^2(e^2 - 1) \\Rightarrow a^2 + b^2 = a^2 e^2 = (ae)^2$$ — also the squared focal half-distance.\n- Step 3: In BOTH cases, the constant equals $$(ae)^2$$ — the squared distance from centre to focus. The \"$$+$$\" vs \"$$-$$\" depends only on the algebraic relation between $$a, b, e$$.\n\nTakeaway: Both normal equations encode the same geometric quantity — the squared focal distance — just written differently due to the sign in the eccentricity formula.", "source": "Opus 4.7 ①", "_id": "opus_1_82", "judge_pick": true}, {"question": "What happens to the formula $$b^2 = a^2(e^2 - 1)$$ for a hyperbola in the special case $$a = b$$ (rectangular hyperbola)? (3 steps)", "answer": "- Step 1: $$a = b \\Rightarrow a^2 = a^2(e^2 - 1) \\Rightarrow e^2 - 1 = 1 \\Rightarrow e^2 = 2$$.\n- Step 2: $$e = \\sqrt{2}$$ — the eccentricity of a rectangular hyperbola.\n- Step 3: This is the ONLY eccentricity at which the asymptotes are perpendicular ($$\\pm b/a = \\pm 1$$, slopes giving $$45°$$).\n\nTakeaway: $$e = \\sqrt{2}$$ is the \"fingerprint\" of a rectangular hyperbola — a distinctive value worth remembering.", "source": "Opus 4.7 ①", "_id": "opus_1_83", "judge_pick": true}, {"question": "A common tangent question: a tangent to the rectangular hyperbola $$xy = c^2$$ at $$P(cp, c/p)$$ and at $$Q(cq, c/q)$$ intersect at $$R$$. Conceptually find $$R$$'s coordinates. (4 steps)", "answer": "- Step 1: Tangent at $$P$$: $$x + p^2 y = 2cp$$. Tangent at $$Q$$: $$x + q^2 y = 2cq$$.\n- Step 2: Subtract: $$(p^2 - q^2)y = 2c(p - q)$$. Factor: $$(p + q)(p - q)y = 2c(p - q)$$, so $$y = \\tfrac{2c}{p + q}$$.\n- Step 3: Substitute back: $$x = 2cp - p^2 \\cdot \\tfrac{2c}{p + q} = \\tfrac{2c(p^2 + pq) - 2cp^2}{p + q} = \\tfrac{2cpq}{p + q}$$.\n- Step 4: $$R = \\left(\\tfrac{2cpq}{p + q}, \\; \\tfrac{2c}{p + q}\\right)$$.\n\nTakeaway: Note that $$R$$'s coordinates depend symmetrically on $$p$$ and $$q$$ via $$p + q$$ and $$pq$$ — typical for chord/tangent intersection problems.", "source": "Opus 4.7 ①", "_id": "opus_1_84", "judge_pick": true}, {"question": "A chord of the rectangular hyperbola $$xy = c^2$$ has gradient 1 (i.e., $$pq = -1$$). Where does the locus of intersection of tangents from chord endpoints lie? (3 steps)", "answer": "- Step 1: From the previous result: $$R = \\left(\\tfrac{2cpq}{p + q}, \\tfrac{2c}{p + q}\\right)$$.\n- Step 2: With $$pq = -1$$: $$R = \\left(\\tfrac{-2c}{p + q}, \\tfrac{2c}{p + q}\\right)$$.\n- Step 3: Notice $$X$$-coordinate $$= -Y$$-coordinate. So the locus is the line $$y = -x$$.\n\nTakeaway: A \"perpendicular line\" emerges as the locus — beautiful geometric simplification driven by $$pq = -1$$.", "source": "Opus 4.7 ①", "_id": "opus_1_85", "judge_pick": false}, {"question": "Why does the parabola occupy a \"boundary\" position between ellipses and hyperbolas in the family of conics? (3 steps)", "answer": "- Step 1: Parabola has $$e = 1$$, exactly between ellipse ($$e < 1$$) and hyperbola ($$e > 1$$).\n- Step 2: Geometrically, it's the critical case where the cutting plane is parallel to the slant edge of the cone — neither closing into an ellipse nor breaking through both nappes.\n- Step 3: As a limit: a parabola is an \"infinitely stretched ellipse\" (one focus has gone to infinity) or an \"infinitely opened hyperbola\" — it sits at the boundary as both limits.\n\nTakeaway: The parabola is the unique conic with a single focus and infinite asymptotic behaviour — the boundary case of the conic family.", "source": "Opus 4.7 ①", "_id": "opus_1_86", "judge_pick": true}, {"question": "When proving a result like \"$$P$$ is the midpoint of $$AB$$\" for tangent intersections with asymptotes of a hyperbola, what's the key proof technique? (3 steps)", "answer": "- Step 1: Express both $$A$$ and $$B$$ in terms of the parameter at $$P$$.\n- Step 2: Compute the midpoint coordinates as average of $$A$$ and $$B$$.\n- Step 3: Show this midpoint equals $$P$$'s coordinates — the proof reduces to algebraic verification.\n\nTakeaway: For tangent + asymptote problems, working in parametric coordinates and computing intersections explicitly is usually the cleanest route.", "source": "Opus 4.7 ①", "_id": "opus_1_87", "judge_pick": true}, {"question": "Why does the line $$y = mx \\pm \\sqrt{b^2 + a^2 m^2}$$ represent ALL tangents to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$? (3 steps)", "answer": "- Step 1: For any slope $$m$$, the tangent condition $$c^2 = b^2 + a^2 m^2$$ gives valid $$c = \\pm\\sqrt{b^2 + a^2 m^2}$$.\n- Step 2: Two values of $$c$$: one positive, one negative — corresponding to the two parallel tangents on opposite sides of the ellipse.\n- Step 3: This covers EVERY non-vertical tangent. Vertical tangents (at vertices on $$x$$-axis) are handled separately.\n\nTakeaway: Every slope produces exactly two tangents — one above and one below the centre — encoded compactly by the $$\\pm$$.", "source": "Opus 4.7 ①", "_id": "opus_1_88", "judge_pick": true}, {"question": "What's the mental shortcut to recognise an equation as belonging to an ellipse, parabola, or hyperbola at a glance? (4 steps)", "answer": "- Step 1: Equation has both $$x^2$$ and $$y^2$$ terms with the SAME sign and different denominators → ellipse.\n- Step 2: Equation has both $$x^2$$ and $$y^2$$ with the same sign and EQUAL denominators → circle.\n- Step 3: Equation has $$x^2$$ and $$y^2$$ with OPPOSITE signs → hyperbola.\n- Step 4: Equation has only ONE squared term ($$y^2 = 4ax$$ or $$x^2 = 4ay$$) → parabola.\n\nTakeaway: The pattern of squared terms and their signs determines the conic type instantly — no calculation needed.", "source": "Opus 4.7 ①", "_id": "opus_1_89", "judge_pick": false}], "count": 90}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What geometric construction produces an ellipse from a cone, and how does this relate to other conic sections? (3 steps)", "answer": "- Step 1: Conic sections are obtained by intersecting a plane with a double cone. The angle of the slicing plane determines which curve emerges.\n- Step 2: An ellipse is produced when the plane cuts through only one nappe (half) of the cone, tilted just enough to produce a closed curve.\n+ Circle: plane perpendicular to the cone's axis (special case of ellipse)\n+ Parabola: plane parallel to a slant edge of the cone\n+ Hyperbola: plane steep enough to cut both nappes (gives two branches)\n- Step 3: The ellipse is the only bounded conic. The \"tilt\" of the plane controls eccentricity: more tilt → more elongated → larger eccentricity, until eventually it becomes a parabola.\n\nThis unification is why all four curves share the focus-directrix definition — they're all \"slices of the same cone.\"", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Why does the equation $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ produce an ellipse, and what do $$a$$ and $$b$$ represent geometrically? (3 steps)", "answer": "- Step 1: Set $$y = 0$$: $$\\frac{x^2}{a^2} = 1$$, giving $$x = \\pm a$$. The curve crosses the x-axis at $$(\\pm a, 0)$$.\n- Step 2: Set $$x = 0$$: $$\\frac{y^2}{b^2} = 1$$, giving $$y = \\pm b$$. The curve crosses the y-axis at $$(0, \\pm b)$$.\n- Step 3: Geometrically, $$a$$ is the semi-axis length along the x-axis and $$b$$ is the semi-axis length along the y-axis. The longer of the two is the semi-major axis; the shorter is the semi-minor axis.\n\nThe equation reads \"for each point, the sum of squared scaled distances along x and y equals 1\" — both terms must be ≤ 1, which bounds the curve.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "How do the parametric equations $$x = a\\cos t, y = b\\sin t$$ arise from the Cartesian ellipse equation, and what is the conceptual link?", "answer": "- Step 1: Substitute into $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2}$$: this becomes $$\\cos^2 t + \\sin^2 t = 1$$ ✓, automatically satisfying the equation.\n- Step 2: The conceptual link: an ellipse is a stretched circle. A unit circle has parameterisation $$(\\cos t, \\sin t)$$. Stretching by factor $$a$$ in the x-direction and $$b$$ in the y-direction gives $$(a\\cos t, b\\sin t)$$ — exactly the ellipse parameterisation.\n- Step 3: So an ellipse can be thought of as an \"affine transformation of a circle.\" This stretching intuition is powerful for visualising ellipse properties (e.g., area = $$\\pi a b$$, scaled from $$\\pi r^2$$).", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "A common misconception: is the parameter $$t$$ in $$x = a\\cos t, y = b\\sin t$$ equal to the polar angle of the point on the ellipse? (3 steps)", "answer": "- Step 1: NO — this is a misconception. For a circle ($$a = b$$), $$t$$ IS the polar angle. For an ellipse, generally not.\n- Step 2: The actual angle $$\\phi$$ from the origin to the point satisfies $$\\tan\\phi = \\frac{b\\sin t}{a\\cos t} = \\frac{b}{a}\\tan t$$, so $$\\phi \\neq t$$ unless $$a = b$$.\n- Step 3: Geometrically, $$t$$ is the angle of the corresponding point on the auxiliary circle of radius $$a$$, projected vertically onto the ellipse. It's called the \"eccentric anomaly\" in orbital mechanics.\n\nThe takeaway: $$t$$ is a parameter, not a geometric angle — distinguish algebraic parameterisation from geometric angle.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "For the ellipse $$4x^2 + 9y^2 = 36$$, identify $$a$$, $$b$$, and which axis is the major axis. (2 steps)", "answer": "- Step 1: Divide both sides by $$36$$: $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$. So $$a^2 = 9, b^2 = 4$$, giving $$a = 3, b = 2$$.\n- Step 2: Since $$a > b$$, the major axis is along the x-axis (the curve extends $$\\pm 3$$ horizontally vs $$\\pm 2$$ vertically).\n\nKey technique: always normalise to \"$$= 1$$\" form before identifying $$a, b$$.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Why is the parameter range for the standard ellipse $$0 \\leq t < 2\\pi$$? What goes wrong with other ranges? (3 steps)", "answer": "- Step 1: Over $$[0, 2\\pi)$$, the point $$(a\\cos t, b\\sin t)$$ traces the entire ellipse exactly once (counterclockwise from $$(a,0)$$).\n- Step 2: Including $$t = 2\\pi$$ would duplicate the starting point, so the half-open interval is preferred.\n- Step 3: Smaller ranges trace partial arcs only; larger ranges retrace the curve multiple times.\n\nFor instance, $$t \\in [\\pi/2, 3\\pi/2]$$ traces only the left half of the ellipse.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Why does the equation $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ produce a curve with two disconnected branches? (3 steps)", "answer": "- Step 1: Set $$y = 0$$: $$x^2 = a^2$$, so $$x = \\pm a$$. The curve crosses the x-axis at two vertices.\n- Step 2: Set $$x = 0$$: $$-\\frac{y^2}{b^2} = 1$$ — no real solution. The curve never crosses the y-axis.\n- Step 3: For $$|x| < a$$, $$\\frac{x^2}{a^2} < 1$$, so $$\\frac{y^2}{b^2}$$ would need to be negative — impossible. The curve only exists for $$|x| \\geq a$$, giving two branches: one for $$x \\geq a$$ and one for $$x \\leq -a$$.\n\nThe hyperbola \"skips over\" the strip $$-a < x < a$$ — that's the gap between branches.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "Derive the equations of the asymptotes of the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ from first principles. (3 steps)", "answer": "- Step 1: Rearrange: $$\\frac{y^2}{b^2} = \\frac{x^2}{a^2} - 1$$, so $$y^2 = \\frac{b^2}{a^2}(x^2 - a^2)$$.\n- Step 2: As $$|x| \\to \\infty$$, the term $$-a^2$$ becomes negligible compared to $$x^2$$, so $$y^2 \\approx \\frac{b^2}{a^2}x^2$$.\n- Step 3: Taking square roots: $$y \\approx \\pm\\frac{b}{a}x$$. These are the two asymptotes.\n\nThe intuition: for large $$|x|$$, the \"$$-1$$\" matters less and less, so the equation effectively becomes $$\\frac{x^2}{a^2} = \\frac{y^2}{b^2}$$, which factors into two straight lines.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Why do the parametric equations for a standard hyperbola have the form $$x = \\pm a\\cosh t, y = b\\sinh t$$ (with the $$\\pm$$), but the ellipse equations don't?", "answer": "- Step 1: $$\\cosh t \\geq 1$$ for all real $$t$$, so $$a\\cosh t \\geq a > 0$$ — this only covers the right branch ($$x \\geq a$$).\n- Step 2: To cover the left branch ($$x \\leq -a$$), we need $$x = -a\\cosh t$$. Hence the $$\\pm$$.\n- Step 3: For an ellipse, $$\\cos t$$ ranges over $$[-1, 1]$$, taking both signs, so a single parameter sweep covers the entire (connected) ellipse.\n\nThe $$\\pm$$ reminds us the hyperbola has two disconnected branches needing two parameter sweeps.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "Why do hyperbolic functions $$(\\cosh, \\sinh)$$ work for parameterising hyperbolas, just as $$(\\cos, \\sin)$$ work for ellipses? (3 steps)", "answer": "- Step 1: For ellipses, the key identity is $$\\cos^2 t + \\sin^2 t = 1$$, matching the form $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$.\n- Step 2: For hyperbolas, the analogous identity is $$\\cosh^2 t - \\sinh^2 t = 1$$, matching $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$.\n- Step 3: Substituting $$x = a\\cosh t, y = b\\sinh t$$ gives $$\\cosh^2 t - \\sinh^2 t = 1$$ ✓, automatically satisfying the equation.\n\nThis is exactly why hyperbolic functions are named \"hyperbolic\" — they parameterise hyperbolas just as trigonometric functions parameterise circles/ellipses.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "What's the alternative parametric form of the hyperbola using $$\\sec$$ and $$\\tan$$, and what's its advantage? (3 steps)", "answer": "- Step 1: The form is $$x = a\\sec\\theta, y = b\\tan\\theta$$ for $$-\\pi \\leq \\theta < \\pi$$, $$\\theta \\neq \\pm\\pi/2$$.\n- Step 2: It works because $$\\sec^2\\theta - \\tan^2\\theta = 1$$ (rearranging $$1 + \\tan^2\\theta = \\sec^2\\theta$$). Substituting satisfies the hyperbola equation.\n- Step 3: Advantage: $$\\sec\\theta$$ takes both positive and negative values across the parameter range, so a single sweep covers BOTH branches — no $$\\pm$$ needed.\n\nThe exclusions $$\\theta \\neq \\pm\\pi/2$$ correspond to \"points at infinity\" along the asymptotes, where $$\\sec\\theta$$ blows up.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Why are the rectangular hyperbolas $$xy = c^2$$ and $$x^2 - y^2 = a^2$$ both called \"rectangular,\" but they're considered different families? (3 steps)", "answer": "- Step 1: \"Rectangular\" means the asymptotes are perpendicular. For $$xy = c^2$$, asymptotes are the x- and y-axes (perpendicular). For $$x^2 - y^2 = a^2$$ (the special case $$a = b$$ in standard form), asymptotes are $$y = \\pm x$$ (also perpendicular).\n- Step 2: Both have eccentricity $$e = \\sqrt{2}$$ (the unique eccentricity for rectangular hyperbolas).\n- Step 3: Geometrically, $$xy = c^2$$ is essentially $$x^2 - y^2 = 2c^2$$ rotated by 45°. They're the same shape, just oriented differently.\n\nSo the distinction is one of orientation, not fundamental type — both are valid rectangular hyperbolas in different coordinate alignments.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Show that rotating $$x^2 - y^2 = a^2$$ by 45° gives a curve of the form $$XY = $$ const. (3 steps)", "answer": "- Step 1: A 45° rotation transforms coordinates: $$x = (X+Y)/\\sqrt{2}$$, $$y = (-X+Y)/\\sqrt{2}$$ (or similar).\n- Step 2: Compute: $$x^2 - y^2 = \\frac{(X+Y)^2 - (-X+Y)^2}{2} = \\frac{4XY}{2} = 2XY$$.\n- Step 3: So $$x^2 - y^2 = a^2$$ becomes $$2XY = a^2$$, i.e., $$XY = a^2/2$$. With $$c^2 = a^2/2$$, we recover $$XY = c^2$$.\n\nThis algebraic relationship confirms the geometric rotation: the two forms describe the same underlying curve in different coordinates.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "For the hyperbola $$9x^2 - 4y^2 = 36$$, find $$a$$, $$b$$, and the asymptotes (mental). (2 steps)", "answer": "- Step 1: Divide by $$36$$: $$\\frac{x^2}{4} - \\frac{y^2}{9} = 1$$, so $$a^2 = 4, b^2 = 9$$, giving $$a = 2, b = 3$$.\n- Step 2: Asymptotes: $$y = \\pm(b/a)x = \\pm\\frac{3}{2}x$$. The hyperbola crosses the x-axis at $$(\\pm 2, 0)$$.\n\nThe slope $$3/2 > 1$$ means the hyperbola opens \"more vertically\" — branches are relatively narrow.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "State the focus-directrix definition of a conic, and explain how the value of $$e$$ classifies the curve. (3 steps)", "answer": "- Step 1: A conic is the locus of points $$P$$ such that $$\\frac{PS}{PM} = e$$, where $$S$$ is the focus and $$PM$$ is the perpendicular distance to a fixed line (the directrix).\n- Step 2: Classification by eccentricity:\n+ $$0 < e < 1$$: ellipse (P closer to focus than to directrix)\n+ $$e = 1$$: parabola (equidistant)\n+ $$e > 1$$: hyperbola (P farther from focus than from directrix)\n- Step 3: Edge cases: $$e = 0$$ degenerates to a circle (focus collapses to center, directrix at infinity); $$e \\to \\infty$$ degenerates to a straight line.\n\nThe eccentricity measures \"how far from circular\" the curve is — small $$e$$ → near-circular; $$e$$ near 1 → highly eccentric.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "Why is the eccentricity of an ellipse restricted to $$0 < e < 1$$, and what happens as $$e$$ varies? (3 steps)", "answer": "- Step 1: From $$b^2 = a^2(1 - e^2)$$: for $$b^2 > 0$$, we need $$1 - e^2 > 0$$, i.e., $$|e| < 1$$. Combined with $$e \\geq 0$$, this gives $$0 \\leq e < 1$$.\n- Step 2: When $$e = 0$$: $$b = a$$, so the ellipse is a circle. When $$e \\to 1$$: $$b \\to 0$$, the ellipse becomes infinitely thin (degenerate to a line segment).\n- Step 3: So $$e$$ controls \"elongation\": small $$e$$ → nearly circular; $$e$$ near 1 → very stretched.\n\nReal-world examples: Earth's orbit has $$e \\approx 0.017$$ (nearly circular); Halley's comet has $$e \\approx 0.97$$ (very elongated).", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "Derive the relation $$b^2 = a^2(1-e^2)$$ for an ellipse from the focus-directrix definition with focus $$(ae, 0)$$ and directrix $$x = a/e$$. (5 steps)", "answer": "- Step 1: Let $$P(x, y)$$ be on the ellipse. The focus-directrix property gives $$PS = e \\cdot PM$$, so $$PS^2 = e^2 PM^2$$.\n+ $$PS^2 = (x - ae)^2 + y^2$$\n+ $$PM^2 = (a/e - x)^2 = (a - ex)^2/e^2$$\n- Step 2: Substitute: $$(x - ae)^2 + y^2 = e^2 \\cdot \\frac{(a-ex)^2}{e^2} = (a - ex)^2$$.\n- Step 3: Expand both sides: $$x^2 - 2aex + a^2 e^2 + y^2 = a^2 - 2aex + e^2 x^2$$.\n- Step 4: Simplify (cancel $$2aex$$): $$x^2(1 - e^2) + y^2 = a^2(1 - e^2)$$, giving $$\\frac{x^2}{a^2} + \\frac{y^2}{a^2(1-e^2)} = 1$$.\n- Step 5: Comparing with the standard form $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$, we identify $$b^2 = a^2(1 - e^2)$$.\n\nThis derivation also explains the range $$0 < e < 1$$: only then is $$1 - e^2 > 0$$, giving real $$b$$.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Why does the eccentricity formula change to $$b^2 = a^2(e^2 - 1)$$ for a hyperbola? (3 steps)", "answer": "- Step 1: The same focus-directrix derivation applies, but now $$e > 1$$.\n- Step 2: After simplification, we get $$x^2(1 - e^2) + y^2 = a^2(1 - e^2)$$ — but $$(1 - e^2)$$ is now negative.\n- Step 3: Multiply through by $$-1$$: $$x^2(e^2 - 1) - y^2 = a^2(e^2 - 1)$$, giving $$\\frac{x^2}{a^2} - \\frac{y^2}{a^2(e^2 - 1)} = 1$$. Hence $$b^2 = a^2(e^2 - 1)$$.\n\nThe minus sign in the hyperbola's equation is naturally produced by $$e > 1$$ — it's a consequence, not arbitrary.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "For the ellipse $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$, find the foci and directrices. (3 steps)", "answer": "- Step 1: $$a^2 = 9, b^2 = 4$$, so $$a = 3, b = 2$$. Since $$a > b$$, major axis is along the x-axis.\n- Step 2: Use $$b^2 = a^2(1-e^2)$$: $$4 = 9(1 - e^2)$$, so $$e^2 = 5/9$$ and $$e = \\sqrt{5}/3$$.\n- Step 3: Foci at $$(\\pm ae, 0) = (\\pm \\sqrt{5}, 0)$$. Directrices at $$x = \\pm a/e = \\pm 9/\\sqrt{5}$$.\n\nQuick check: $$ae = 3 \\cdot \\frac{\\sqrt{5}}{3} = \\sqrt{5}$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "When an ellipse has $$b > a$$ (taller than wide), where do the foci go and what equations apply? (3 steps)", "answer": "- Step 1: When $$b > a$$, the major axis is along the y-axis (the longer direction).\n- Step 2: The foci move to $$(0, \\pm be)$$ — on the y-axis. Directrices become horizontal: $$y = \\pm b/e$$.\n- Step 3: The eccentricity formula becomes $$a^2 = b^2(1 - e^2)$$ (swap roles of $$a$$ and $$b$$).\n\nKey principle: foci always lie on the major axis; directrices are perpendicular to it. The \"smaller\" semi-axis is determined by the larger via the eccentricity.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Why, for a hyperbola, do the foci stay on the x-axis even when $$b > a$$ — unlike an ellipse?", "answer": "- Step 1: For an ellipse, the curve crosses both axes; the foci lie on whichever axis is longer (major axis).\n- Step 2: For a hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, setting $$x = 0$$ gives $$-\\frac{y^2}{b^2} = 1$$ — impossible. The curve never crosses the y-axis regardless of $$a$$ vs $$b$$.\n- Step 3: The hyperbola's \"transverse axis\" (line through the two vertices) is always along the x-axis when written this way, so foci must lie at $$(\\pm ae, 0)$$.\n\nThe relative size of $$a, b$$ doesn't change which axis the curve opens along — that's fixed by the sign pattern in the equation.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Prove that for any point $$P$$ on the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with foci $$S, S'$$, the sum $$PS + PS' = 2a$$. (4 steps)", "answer": "- Step 1: Apply the focus-directrix property at both foci: $$PS = e \\cdot PM$$ and $$PS' = e \\cdot PM'$$, where $$M, M'$$ are projections onto each directrix.\n- Step 2: Let $$P = (x, y)$$. Directrices are $$x = a/e$$ and $$x = -a/e$$. So $$PM = a/e - x$$ and $$PM' = x + a/e$$.\n- Step 3: Add: $$PS + PS' = e(a/e - x) + e(x + a/e) = a - ex + a + ex = 2a$$.\n- Step 4: This is constant — independent of where $$P$$ is on the ellipse!\n\nThis is the famous \"string definition\": fix two pins at the foci, attach a taut string of length $$2a$$, and trace — you get the ellipse. The whispering gallery and reflection properties all flow from this.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "What's the analogous \"two-focus\" property for a hyperbola, and how does it differ from the ellipse property? (3 steps)", "answer": "- Step 1: For a hyperbola with foci $$S, S'$$, any point $$P$$ on the curve satisfies $$|PS - PS'| = 2a$$ (the absolute difference is constant).\n- Step 2: On the right branch, $$PS' - PS = 2a$$; on the left branch, $$PS - PS' = 2a$$. The absolute value handles both.\n- Step 3: Compare with ellipse: ellipse has $$PS + PS' = 2a$$ (sum); hyperbola has $$|PS - PS'| = 2a$$ (difference).\n\nThe two-focus characterisation reflects the geometric difference: the ellipse \"wraps around\" both foci (sum), while each hyperbola branch is \"near\" one focus (difference). Both expressions equal the major-axis length $$2a$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "A circle has eccentricity $$e = 0$$. What happens to the focus-directrix definition in this limit? (3 steps)", "answer": "- Step 1: $$e = 0$$ in the ratio $$PS/PM = e$$ would force $$PS = 0$$ — every point coincides with the focus. Degenerate.\n- Step 2: A better view: take the limit of $$b^2 = a^2(1 - e^2)$$ as $$e \\to 0$$: $$b \\to a$$, so the ellipse becomes a circle.\n- Step 3: Simultaneously, the foci $$(\\pm ae, 0)$$ collapse to the center, and the directrices $$x = \\pm a/e$$ go to infinity.\n\nSo a circle is the \"limit\" of ellipses with directrix at infinity and a single (degenerate) focus at the center. This is why the standard focus-directrix definition technically excludes circles.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "What are the two main methods to find tangent/normal equations to an ellipse, and when is each more convenient? (3 steps)", "answer": "- Step 1: **Implicit differentiation**: differentiate $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ to get $$\\frac{2x}{a^2} + \\frac{2y}{b^2}\\frac{dy}{dx} = 0$$, so $$\\frac{dy}{dx} = -\\frac{b^2 x}{a^2 y}$$. Convenient when given Cartesian coordinates.\n- Step 2: **Parametric differentiation**: with $$x = a\\cos t, y = b\\sin t$$, use chain rule $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt} = -\\frac{b\\cos t}{a\\sin t}$$. Convenient when given parametric coordinates.\n- Step 3: Both yield the same answer when applied correctly. For deriving general formulas in terms of $$t$$, parametric is usually cleaner.\n\nThe choice depends on what form the question gives — match the method to the data.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Derive the equation of the tangent to $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at point $$P(a\\cos t, b\\sin t)$$. (4 steps)", "answer": "- Step 1: Find the gradient: $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt} = \\frac{b\\cos t}{-a\\sin t}$$.\n- Step 2: Use point-slope: $$y - b\\sin t = -\\frac{b\\cos t}{a\\sin t}(x - a\\cos t)$$.\n- Step 3: Multiply through by $$a\\sin t$$: $$ay\\sin t - ab\\sin^2 t = -bx\\cos t + ab\\cos^2 t$$.\n- Step 4: Rearrange: $$bx\\cos t + ay\\sin t = ab(\\cos^2 t + \\sin^2 t) = ab$$.\n\nSo the standard tangent equation: $$bx\\cos t + ay\\sin t = ab$$. Notice the symmetry — $$x$$-coefficient has $$\\cos t$$, $$y$$-coefficient has $$\\sin t$$, matching the parametric form.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Derive the normal equation to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at $$P(a\\cos t, b\\sin t)$$. (4 steps)", "answer": "- Step 1: Tangent slope is $$-\\frac{b\\cos t}{a\\sin t}$$, so normal slope (negative reciprocal) is $$\\frac{a\\sin t}{b\\cos t}$$.\n- Step 2: Point-slope: $$y - b\\sin t = \\frac{a\\sin t}{b\\cos t}(x - a\\cos t)$$.\n- Step 3: Multiply by $$b\\cos t$$: $$by\\cos t - b^2\\sin t \\cos t = ax\\sin t - a^2 \\sin t \\cos t$$.\n- Step 4: Rearrange: $$ax\\sin t - by\\cos t = (a^2 - b^2)\\cos t \\sin t$$.\n\nThe factor $$(a^2 - b^2)$$ vanishes for a circle ($$a = b$$), where every radial line is a normal — algebraic confirmation of geometric intuition.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Derive the condition for the line $$y = mx + c$$ to be tangent to the ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$. (4 steps)", "answer": "- Step 1: Substitute: $$\\frac{x^2}{a^2} + \\frac{(mx+c)^2}{b^2} = 1$$.\n- Step 2: Multiply by $$a^2 b^2$$: $$b^2 x^2 + a^2(mx+c)^2 = a^2 b^2$$, expanding to $$x^2(b^2 + a^2 m^2) + 2a^2 mc x + a^2(c^2 - b^2) = 0$$.\n- Step 3: For tangency, the quadratic has a double root: discriminant = 0. So $$(2a^2 mc)^2 = 4(b^2 + a^2 m^2) a^2 (c^2 - b^2)$$.\n- Step 4: Simplify: $$a^2 m^2 c^2 = (b^2 + a^2 m^2)(c^2 - b^2)$$. Expand and cancel: $$c^2 = a^2 m^2 + b^2$$.\n\nSo the tangent condition: $$c^2 = a^2 m^2 + b^2$$. A useful general result for any \"tangent line\" problem on an ellipse.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "What's the geometric meaning of the discriminant condition for tangency to a conic? (3 steps)", "answer": "- Step 1: A line meets a conic at 0, 1, or 2 points. Substituting the line into the conic gives a quadratic in $$x$$, whose discriminant tells which.\n- Step 2: Two intersections (secant) → discriminant > 0; one intersection with multiplicity 2 (tangent) → discriminant = 0; no intersections → discriminant < 0.\n- Step 3: Tangency is the limiting case where two intersection points merge into one — the line \"just touches\" the curve.\n\nThis makes algebraic sense of the geometric tangent condition.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Derive the tangent equation to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at $$P(a\\cosh t, b\\sinh t)$$. (4 steps)", "answer": "- Step 1: Gradient: $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt} = \\frac{b\\cosh t}{a\\sinh t}$$ (using $$\\frac{d}{dt}\\cosh t = \\sinh t$$ and $$\\frac{d}{dt}\\sinh t = \\cosh t$$).\n- Step 2: Point-slope: $$y - b\\sinh t = \\frac{b\\cosh t}{a\\sinh t}(x - a\\cosh t)$$.\n- Step 3: Multiply by $$a\\sinh t$$: $$ay\\sinh t - ab\\sinh^2 t = bx\\cosh t - ab\\cosh^2 t$$.\n- Step 4: Rearrange using $$\\cosh^2 t - \\sinh^2 t = 1$$: $$bx\\cosh t - ay\\sinh t = ab(\\cosh^2 t - \\sinh^2 t) = ab$$.\n\nCompare with the ellipse tangent ($$bx\\cos t + ay\\sin t = ab$$) — same structure, hyperbolic functions and a sign flip from the curve's \"−\" sign.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "What's the structural similarity between the tangent equations for an ellipse and a hyperbola at their parametric points? (3 steps)", "answer": "- Step 1: Ellipse tangent at $$(a\\cos t, b\\sin t)$$: $$bx\\cos t + ay\\sin t = ab$$.\n- Step 2: Hyperbola tangent at $$(a\\cosh t, b\\sinh t)$$: $$bx\\cosh t - ay\\sinh t = ab$$.\n- Step 3: Hyperbola tangent at $$(a\\sec\\theta, b\\tan\\theta)$$: $$bx\\sec\\theta - ay\\tan\\theta = ab$$.\n\nPattern: the coefficients of $$x$$ and $$y$$ involve the parameter through the same functions used in the parameterisation; the sign matches the curve's equation; right-hand side is always $$ab$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "What's the tangent condition for a line $$y = mx + c$$ to be tangent to the hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$, and how does it differ from the ellipse case? (3 steps)", "answer": "- Step 1: For an ellipse: $$c^2 = a^2 m^2 + b^2$$.\n- Step 2: For a hyperbola: $$c^2 = a^2 m^2 - b^2$$ — sign flip on $$b^2$$, derived analogously via discriminant = 0.\n- Step 3: For real $$c$$, need $$a^2 m^2 - b^2 \\geq 0$$, i.e., $$|m| \\geq b/a$$. So tangent lines must be steeper than the asymptotes.\n\nIf $$|m| < b/a$$ (shallower than asymptotes), the line either misses the hyperbola or crosses both branches — never tangent.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Derive the normal equation to $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ at $$(a\\sec\\theta, b\\tan\\theta)$$. (4 steps)", "answer": "- Step 1: Gradient: $$\\frac{dy}{dx} = \\frac{b\\sec^2\\theta}{a\\sec\\theta\\tan\\theta} = \\frac{b}{a\\sin\\theta}$$ (after simplification).\n- Step 2: Normal slope (negative reciprocal): $$-\\frac{a\\sin\\theta}{b}$$.\n- Step 3: Point-slope: $$y - b\\tan\\theta = -\\frac{a\\sin\\theta}{b}(x - a\\sec\\theta)$$. Multiply by $$b$$: $$by - b^2\\tan\\theta = -ax\\sin\\theta + a^2\\sin\\theta\\sec\\theta = -ax\\sin\\theta + a^2\\tan\\theta$$.\n- Step 4: Rearrange: $$by + ax\\sin\\theta = (a^2 + b^2)\\tan\\theta$$.\n\nNote the $$(a^2 + b^2)$$ factor — for a hyperbola — versus $$(a^2 - b^2)$$ for the ellipse.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Why does the constant in the normal equation involve $$(a^2 - b^2)$$ for an ellipse but $$(a^2 + b^2)$$ for a hyperbola — and what's the deeper unifying interpretation? (3 steps)", "answer": "- Step 1: For an ellipse: $$b^2 = a^2(1 - e^2)$$, so $$a^2 - b^2 = a^2 e^2 = (ae)^2$$ — squared focal distance.\n- Step 2: For a hyperbola: $$b^2 = a^2(e^2 - 1)$$, so $$a^2 + b^2 = a^2 e^2 = (ae)^2$$ — also squared focal distance.\n- Step 3: So in BOTH cases, the constant $$\\propto (ae)^2$$. The signs differ but algebraically both express the same thing — the squared distance from center to focus.\n\nThis unification reveals deeper structure: the normal equation is fundamentally tied to the focal distance.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Derive the tangent equation $$bx\\sec\\theta - ay\\tan\\theta = ab$$ for the hyperbola at $$(a\\sec\\theta, b\\tan\\theta)$$. (4 steps)", "answer": "- Step 1: Differentiate parametrically: $$\\frac{dx}{d\\theta} = a\\sec\\theta\\tan\\theta$$, $$\\frac{dy}{d\\theta} = b\\sec^2\\theta$$.\n- Step 2: Gradient: $$\\frac{dy}{dx} = \\frac{b\\sec^2\\theta}{a\\sec\\theta\\tan\\theta} = \\frac{b\\sec\\theta}{a\\tan\\theta} = \\frac{b}{a\\sin\\theta}$$.\n- Step 3: Point-slope: $$y - b\\tan\\theta = \\frac{b}{a\\sin\\theta}(x - a\\sec\\theta)$$. Multiply by $$a\\sin\\theta$$: $$ay\\sin\\theta - ab\\sin\\theta\\tan\\theta = bx - ab\\sin\\theta\\sec\\theta$$.\n- Step 4: Use $$\\sin\\theta\\sec\\theta = \\tan\\theta$$ and $$\\sin\\theta\\tan\\theta = \\sin^2\\theta/\\cos\\theta$$, simplify, and divide by $$\\cos\\theta$$ to get $$bx\\sec\\theta - ay\\tan\\theta = ab(\\sec^2\\theta - \\tan^2\\theta) = ab$$.\n\nSo the tangent at $$(a\\sec\\theta, b\\tan\\theta)$$ is $$bx\\sec\\theta - ay\\tan\\theta = ab$$.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "What's the standard strategy to find the locus of a point defined by some construction on a conic? (4 steps)", "answer": "- Step 1: Express the tracked point's coordinates parametrically using the conic's parameter $$t$$ — get $$(X(t), Y(t))$$.\n- Step 2: Solve these for the parameter functions, e.g., $$\\cos t = f(X)$$, $$\\sin t = g(Y)$$ (or analogous).\n- Step 3: Apply the appropriate identity ($$\\cos^2 t + \\sin^2 t = 1$$, $$\\cosh^2 t - \\sinh^2 t = 1$$, etc.) to eliminate the parameter.\n- Step 4: The resulting equation in $$X, Y$$ describes the locus.\n\nThis \"parametric elimination\" approach reduces locus problems to (a) parameterise, (b) invert, (c) eliminate via identity. Renaming $$X, Y$$ back to $$x, y$$ at the end gives the final equation.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "A tangent to $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ at $$P(a\\cos t, b\\sin t)$$ crosses the x-axis at $$A$$ and y-axis at $$B$$. Find the locus of the midpoint of $$AB$$. (5 steps)", "answer": "- Step 1: Tangent equation: $$bx\\cos t + ay\\sin t = ab$$. Set $$y = 0$$: $$x = \\frac{a}{\\cos t} = a\\sec t$$, so $$A = (a\\sec t, 0)$$.\n- Step 2: Set $$x = 0$$: $$y = \\frac{b}{\\sin t} = b\\csc t$$, so $$B = (0, b\\csc t)$$.\n- Step 3: Midpoint coordinates: $$X = \\frac{a\\sec t}{2}$$, $$Y = \\frac{b\\csc t}{2}$$.\n- Step 4: Solve for parameter: $$\\cos t = \\frac{a}{2X}$$, $$\\sin t = \\frac{b}{2Y}$$.\n- Step 5: Apply $$\\cos^2 t + \\sin^2 t = 1$$: $$\\frac{a^2}{4X^2} + \\frac{b^2}{4Y^2} = 1$$, or equivalently $$\\frac{a^2}{4x^2} + \\frac{b^2}{4y^2} = 1$$.\n\nThe locus has the same \"additive\" structure as the ellipse but in $$1/x^2, 1/y^2$$ — it's not a standard conic but a related curve.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "When deriving a locus, why use uppercase $$X, Y$$ for the moving point's coordinates rather than $$x, y$$? (2 steps)", "answer": "- Step 1: Lowercase $$x, y$$ typically refer to coordinates on the original curve (e.g., on the ellipse). Using uppercase $$X, Y$$ for the moving point clearly distinguishes them from the source.\n- Step 2: After eliminating the parameter, we can rename $$X, Y$$ back to $$x, y$$ since the final equation describes the locus in standard coordinates.\n\nThe convention prevents algebraic confusion during the derivation; it's a matter of clarity, not mathematical necessity.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "What does it mean geometrically for two points on a parabola at parameters $$p, q$$ to satisfy $$pq = -1$$? (3 steps)", "answer": "- Step 1: For points $$P(ap^2, 2ap)$$ and $$Q(aq^2, 2aq)$$ on $$y^2 = 4ax$$, the chord $$PQ$$ has gradient $$\\frac{2}{p+q}$$.\n- Step 2: The chord equation can be written as $$y(p+q) = 2x + 2apq$$. For it to pass through the focus $$(a, 0)$$: $$0 = 2a + 2apq$$, so $$pq = -1$$.\n- Step 3: So $$pq = -1$$ characterises focal chords of a parabola.\n\nThis is a fundamental parametric identity to memorise. Similarly, $$pq = -4$$ corresponds to chords subtending a right angle at the origin.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Why is the factorisation $$p^3 - q^3 = (p-q)(p^2 + pq + q^2)$$ particularly useful in parametric problems on parabolas? (2 steps)", "answer": "- Step 1: Normal equations on a parabola involve $$p^3$$ and $$q^3$$. Subtracting two normal equations gives $$(p-q)\\cdot$$ (symmetric expression in $$p, q$$).\n- Step 2: The common factor $$(p-q)$$ can be cancelled (assuming distinct points $$p \\neq q$$), greatly simplifying the algebra.\n\nThis technique cleanly separates the \"single tangent\" case ($$p = q$$) from the \"chord\" case ($$p \\neq q$$), and reveals the symmetric structure in the simplified expressions.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "Find the eccentricity of the ellipse $$\\frac{x^2}{16} + \\frac{y^2}{9} = 1$$ (mental). (2 steps)", "answer": "- Step 1: $$a^2 = 16, b^2 = 9$$, $$a > b$$. Use $$b^2 = a^2(1 - e^2)$$: $$9 = 16(1 - e^2)$$, so $$1 - e^2 = 9/16$$, $$e^2 = 7/16$$.\n- Step 2: $$e = \\sqrt{7}/4$$.\n\nThe key skill: identify $$a, b$$, plug into the eccentricity formula, simplify mentally.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "For the hyperbola $$\\frac{x^2}{4} - y^2 = 1$$, find the foci (mental). (3 steps)", "answer": "- Step 1: $$a^2 = 4, b^2 = 1$$, so $$a = 2, b = 1$$.\n- Step 2: Use $$b^2 = a^2(e^2 - 1)$$: $$1 = 4(e^2 - 1)$$, so $$e^2 = 5/4$$, $$e = \\sqrt{5}/2$$.\n- Step 3: Foci at $$(\\pm ae, 0) = (\\pm \\sqrt{5}, 0)$$.\n\nQuick check: $$ae = 2 \\cdot \\frac{\\sqrt{5}}{2} = \\sqrt{5}$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "For an ellipse with $$a > b$$, why are the foci inside the curve, not on it? (3 steps)", "answer": "- Step 1: Foci are at $$(\\pm ae, 0)$$ with $$0 < e < 1$$, so $$|ae| < a$$.\n- Step 2: Points $$(\\pm a, 0)$$ are vertices on the ellipse. Points $$(\\pm ae, 0)$$ have smaller $$|x|$$, so they lie between the center and the vertices.\n- Step 3: Since the ellipse is a closed convex curve enclosing the center, any point with $$|x| < a$$ at $$y = 0$$ is inside the ellipse.\n\nThis makes physical sense: in planetary orbits, the Sun (at a focus) is inside the orbit, not on it.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Why is the rectangular hyperbola $$xy = c^2$$ unbounded along its asymptotes (the axes)? (3 steps)", "answer": "- Step 1: As $$x \\to \\infty$$ with $$xy = c^2$$, we get $$y \\to 0$$ — the curve approaches the x-axis but never reaches it.\n- Step 2: As $$y \\to \\infty$$, $$x \\to 0$$ — the curve approaches the y-axis.\n- Step 3: The product $$xy = c^2$$ stays constant, so as one coordinate gets large, the other must shrink to compensate — but neither can be zero (since $$c \\neq 0$$).\n\nThis perpendicular-asymptote structure is what makes it \"rectangular\" — the asymptotes meet at right angles.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Show conceptually why the equation $$\\frac{(x+y)^2}{2a^2} + \\frac{(x-y)^2}{2b^2} = 1$$ represents a 45°-rotated ellipse. (3 steps)", "answer": "- Step 1: A 45° rotation transforms a point $$(X, Y)$$ to $$(x, y)$$ via $$X = (x+y)/\\sqrt{2}$$, $$Y = (-x+y)/\\sqrt{2}$$.\n- Step 2: Substituting into $$\\frac{X^2}{a^2} + \\frac{Y^2}{b^2} = 1$$ gives $$\\frac{(x+y)^2/2}{a^2} + \\frac{(x-y)^2/2}{b^2} = 1$$, simplifying to the given form.\n- Step 3: The pattern $$(x+y)^2$$ and $$(x-y)^2$$ in coordinates is the algebraic signature of a 45° rotation.\n\nThis shows how linear transformations enter as substitutions, changing axis-aligned forms into rotated ones.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "How would you find $$m, c$$ for a line $$y = mx + c$$ tangent to BOTH the ellipses $$\\frac{x^2}{9} + \\frac{y^2}{46} = 1$$ and $$\\frac{x^2}{25} + \\frac{y^2}{14} = 1$$? (3 steps)", "answer": "- Step 1: Apply the tangent condition $$c^2 = a^2 m^2 + b^2$$ to each: $$c^2 = 9m^2 + 46$$ and $$c^2 = 25m^2 + 14$$.\n- Step 2: Set equal: $$9m^2 + 46 = 25m^2 + 14$$, so $$16m^2 = 32$$, giving $$m^2 = 2$$, $$m = \\pm\\sqrt{2}$$.\n- Step 3: Substitute back: $$c^2 = 9 \\cdot 2 + 46 = 64$$, so $$c = \\pm 8$$.\n\nThe key insight: the same tangent condition applied to two curves gives two equations in $$m, c$$ — solvable simultaneously.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "A common misconception: A student claims $$\\frac{x^2}{4} - \\frac{y^2}{16} = 1$$ has foci on the y-axis because $$b > a$$. Is this correct? (2 steps)", "answer": "- Step 1: NO — this is a misconception. For a hyperbola, foci location is determined by the SIGN structure of the equation, not the relative sizes of $$a, b$$.\n- Step 2: The \"+\" term is on $$x^2$$, so the curve opens left-right. Foci lie on the x-axis at $$(\\pm ae, 0)$$, regardless of whether $$a > b$$ or $$b > a$$.\n\nFor ellipses: major axis follows the larger denominator. For hyperbolas: focus location follows the \"+\" term — the \"transverse axis.\"", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Compute the eccentricity of the rectangular hyperbola where asymptotes are perpendicular. (3 steps)", "answer": "- Step 1: A rectangular hyperbola has $$a = b$$ (asymptotes have slopes $$\\pm 1$$, perpendicular).\n- Step 2: From $$b^2 = a^2(e^2 - 1)$$: $$a^2 = a^2(e^2 - 1)$$, so $$1 = e^2 - 1$$, giving $$e^2 = 2$$.\n- Step 3: $$e = \\sqrt{2}$$ — a clean number, characteristic of the most symmetric hyperbola.\n\nSame value $$\\sqrt{2}$$ regardless of $$a$$. This is the unique eccentricity at which the hyperbola is rectangular.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Show that all four hyperbolas $$\\frac{x^2}{24} - y^2 = 1$$, $$x^2 - \\frac{y^2}{24} = 1$$, $$\\frac{x^2}{16} - \\frac{y^2}{9} = 1$$, $$\\frac{x^2}{9} - \\frac{y^2}{16} = 1$$ have the same foci. (3 steps)", "answer": "- Step 1: For any hyperbola, foci are at $$(\\pm ae, 0)$$ with $$(ae)^2 = a^2 + b^2$$ (from $$b^2 = a^2(e^2-1)$$).\n- Step 2: Compute $$a^2 + b^2$$ for each: $$24 + 1 = 25$$; $$1 + 24 = 25$$; $$16 + 9 = 25$$; $$9 + 16 = 25$$. All equal 25.\n- Step 3: So $$ae = 5$$ for all, meaning all four share foci $$(\\pm 5, 0)$$ — they are \"confocal hyperbolas\" with different shapes (eccentricities) but the same foci.\n\nConfocal conics are a beautiful family — orthogonal trajectories of each other in many configurations.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Show that $$\\cos(\\angle PSS') = e$$ for an ellipse, where $$P = (0, b)$$ is the top of the ellipse and $$S, S'$$ are the foci. (3 steps)", "answer": "- Step 1: Foci are at $$S = (ae, 0)$$ and $$S' = (-ae, 0)$$, with $$|SS'| = 2ae$$. Point $$P = (0, b)$$.\n- Step 2: $$PS = \\sqrt{(ae)^2 + b^2} = \\sqrt{a^2 e^2 + b^2}$$. Use $$b^2 = a^2(1 - e^2)$$: $$PS = \\sqrt{a^2 e^2 + a^2 - a^2 e^2} = \\sqrt{a^2} = a$$.\n- Step 3: In triangle $$PSS'$$, the angle at $$S$$ has adjacent $$ae$$ (horizontal leg) and hypotenuse $$a$$, so $$\\cos(\\angle PSS') = ae/a = e$$.\n\nA beautiful geometric interpretation of eccentricity: $$e$$ is literally a cosine in this configuration!", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Why is the tangent slope of an ellipse $$-\\frac{b}{a}\\cot t$$, and what does this become at $$t = \\pi/2$$ (top of the ellipse)? (3 steps)", "answer": "- Step 1: $$\\frac{dy}{dx} = \\frac{dy/dt}{dx/dt} = \\frac{b\\cos t}{-a\\sin t} = -\\frac{b\\cos t}{a\\sin t} = -\\frac{b}{a}\\cot t$$.\n- Step 2: At $$t = \\pi/2$$: $$\\cot(\\pi/2) = 0$$, so the gradient is $$0$$ — a horizontal tangent.\n- Step 3: The point at $$t = \\pi/2$$ is $$(0, b)$$ — the top of the ellipse. Geometrically, the tangent at the top is horizontal, matching our intuition.\n\nThe parametric formula correctly captures geometric extremes: vertical tangents at major-axis vertices ($$t = 0, \\pi$$); horizontal at minor-axis vertices ($$t = \\pi/2, 3\\pi/2$$).", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "Why does the normal at any point $$P$$ on an ellipse hit the major axis between the focus and the center? (3 steps)", "answer": "- Step 1: For ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with $$a > b$$, normal at $$(a\\cos t, b\\sin t)$$ is $$ax\\sin t - by\\cos t = (a^2 - b^2)\\cos t \\sin t$$.\n- Step 2: Set $$y = 0$$ to find x-axis intersection: $$x = \\frac{(a^2 - b^2)\\cos t}{a}$$.\n- Step 3: Since $$a^2 - b^2 < a^2$$, we have $$|x| < |a\\cos t|$$ — the foot of the normal is closer to the center than $$P$$ itself.\n\nThis is a special property of the ellipse: the normal \"leans inward\" toward the center. It's also key to the ellipse's reflection property (normal bisects $$\\angle SPS'$$).", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "State the reflection property of the ellipse and how it relates to the normal. (3 steps)", "answer": "- Step 1: Reflection property: a ray from one focus reflects off the ellipse and travels to the other focus.\n- Step 2: This requires that the normal at any point $$P$$ on the ellipse bisects the angle $$\\angle SPS'$$ between the lines from $$P$$ to the two foci.\n- Step 3: This is the basis of the \"whispering gallery\" effect — sound from one focus, after one reflection off the elliptical surface, focuses precisely at the other focus.\n\nSo the geometric normal-bisector property gives the ellipse its acoustic and optical properties.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "Find the gradient of the chord joining $$P(cp, c/p)$$ and $$Q(cq, c/q)$$ on the rectangular hyperbola $$xy = c^2$$. (3 steps)", "answer": "- Step 1: Use the slope formula: $$\\frac{c/p - c/q}{cp - cq}$$.\n- Step 2: Numerator: $$\\frac{c(q - p)}{pq}$$. Denominator: $$c(p - q)$$.\n- Step 3: Gradient: $$\\frac{c(q-p)/pq}{c(p-q)} = -\\frac{1}{pq}$$.\n\nSo chord gradient is $$-1/(pq)$$ — depends only on the product of parameters. A useful identity for rectangular hyperbola problems (e.g., $$pq = -1$$ gives a chord with slope 1).", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "Why is the latus rectum length $$\\frac{2b^2}{a}$$ for an ellipse with $$a > b$$, and why is this the SHORTEST focal chord? (4 steps)", "answer": "- Step 1: Latus rectum is perpendicular to major axis through the focus. Substitute $$x = ae$$ into the ellipse: $$e^2 + \\frac{y^2}{b^2} = 1$$, so $$y^2 = b^2(1 - e^2) = \\frac{b^4}{a^2}$$.\n- Step 2: So $$y = \\pm \\frac{b^2}{a}$$, and the chord length is $$\\frac{2b^2}{a}$$.\n- Step 3: Focal chord length at angle $$\\theta$$ to major axis is $$\\frac{2b^2/a}{1 - e^2 \\cos^2\\theta}$$. Minimum when $$\\cos^2\\theta = 0$$ (i.e., $$\\theta = \\pi/2$$, perpendicular).\n- Step 4: So latus rectum (perpendicular) = $$2b^2/a$$ is the minimum; major axis ($$\\theta = 0$$) gives the maximum length $$2a$$.\n\nThe latus rectum is the \"thinnest\" focal chord — a useful invariant in orbital mechanics.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "Why does the eccentricity of a hyperbola relate to the slope of its asymptotes? (3 steps)", "answer": "- Step 1: Asymptote slopes are $$\\pm b/a$$, and eccentricity satisfies $$b^2 = a^2(e^2 - 1)$$.\n- Step 2: So $$b/a = \\sqrt{e^2 - 1}$$, i.e., asymptote slope $$= \\sqrt{e^2 - 1}$$.\n- Step 3: Implications:\n+ $$e \\to 1$$: slope $$\\to 0$$ (very narrow hyperbola, asymptotes near horizontal)\n+ $$e = \\sqrt{2}$$: slope $$= 1$$ (rectangular hyperbola, perpendicular asymptotes)\n+ $$e \\to \\infty$$: slope $$\\to \\infty$$ (very fat hyperbola, near vertical asymptotes)\n\nSo eccentricity geometrically encodes the \"openness angle\" of the hyperbola.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "As $$e \\to 1$$ for both an ellipse and a hyperbola, what shape does each curve approach? (3 steps)", "answer": "- Step 1: For ellipse with $$e \\to 1^-$$: $$b^2 = a^2(1 - e^2) \\to 0$$, so $$b \\to 0$$. The ellipse becomes infinitely thin (degenerate to a line segment).\n- Step 2: For hyperbola with $$e \\to 1^+$$: $$b^2 = a^2(e^2 - 1) \\to 0$$, so $$b \\to 0$$ — branches collapse onto the x-axis.\n- Step 3: At exactly $$e = 1$$, the focus-directrix definition gives a parabola — the limiting case between ellipse and hyperbola.\n\nBoth curves \"degenerate\" as $$e \\to 1$$ — they meet at the parabola, the borderline case between bounded and unbounded conics.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "What's the difference between the directrix property for an ellipse vs a hyperbola in terms of where the directrix sits relative to the curve? (3 steps)", "answer": "- Step 1: For both, the focus-directrix property gives $$PS/PM = e$$.\n- Step 2: For ellipse ($$e < 1$$): points are CLOSER to focus than to directrix. So the directrix is OUTSIDE the ellipse — it doesn't touch the curve.\n- Step 3: For hyperbola ($$e > 1$$): points are FARTHER from focus than from directrix. The directrix lies BETWEEN the two branches (between center and a vertex).\n\nPosition of directrix relative to the curve geometrically encodes whether $$e < 1$$ or $$e > 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": true}, {"question": "For the ellipse $$x^2 + 4y^2 = 36$$, prove $$PA + PB = 12$$ where $$A = (-3\\sqrt{3}, 0)$$, $$B = (3\\sqrt{3}, 0)$$ are given points. (4 steps)", "answer": "- Step 1: Rewrite: $$\\frac{x^2}{36} + \\frac{y^2}{9} = 1$$, so $$a = 6, b = 3$$.\n- Step 2: Find eccentricity: $$b^2 = a^2(1 - e^2)$$ gives $$9 = 36(1 - e^2)$$, so $$e^2 = 3/4$$, $$e = \\sqrt{3}/2$$.\n- Step 3: Foci at $$(\\pm ae, 0) = (\\pm 6 \\cdot \\sqrt{3}/2, 0) = (\\pm 3\\sqrt{3}, 0)$$. So $$A, B$$ are precisely the foci.\n- Step 4: By the focal sum property, $$PA + PB = 2a = 12$$ for any $$P$$ on the ellipse.\n\nThe recognition that $$A, B$$ are foci is the key step — then the standard property gives the answer immediately.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": true}, {"question": "What's the conceptual significance of the focus-directrix definition over the two-focus definition of an ellipse? (3 steps)", "answer": "- Step 1: The two-focus definition ($$PS + PS' = 2a$$) is geometric and intuitive but specific to ellipses. It doesn't extend to parabolas (which have only one focus).\n- Step 2: The focus-directrix definition unifies all conic sections under one framework — different values of $$e$$ give different curve types from a single principle.\n- Step 3: The focus-directrix is also tied more closely to the projective-geometric origin of conics, allowing easy generalisation (e.g., to higher dimensions, projective conics).\n\nThe two-focus property is a theorem (consequence) when applied to ellipses — beautiful, but not the foundational definition.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": true}, {"question": "Find the value of $$\\sinh t$$ if the tangent to the hyperbola $$\\frac{x^2}{9} - \\frac{y^2}{4} = 1$$ at $$(3\\cosh t, 2\\sinh t)$$ passes through $$(0, -1)$$. (3 steps)", "answer": "- Step 1: Tangent equation: $$bx\\cosh t - ay\\sinh t = ab$$, with $$a = 3, b = 2$$: $$2x\\cosh t - 3y\\sinh t = 6$$.\n- Step 2: Substitute $$(0, -1)$$: $$0 - 3(-1)\\sinh t = 6$$, i.e., $$3\\sinh t = 6$$, so $$\\sinh t = 2$$.\n- Step 3: To find $$t$$ explicitly: $$t = \\text{arsinh}(2) = \\ln(2 + \\sqrt{5})$$.\n\nTechnique: known points on the tangent give equations in the unknown parameter; substituting solves for $$t$$.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "A chord of the rectangular hyperbola $$xy = c^2$$ has gradient 2. The chord meets the curve at $$P(cp, c/p)$$ and $$Q(cq, c/q)$$. What's the constraint on $$p, q$$? (3 steps)", "answer": "- Step 1: Chord gradient is $$-\\frac{1}{pq}$$ (general result).\n- Step 2: Setting equal to $$2$$: $$-\\frac{1}{pq} = 2$$, so $$pq = -\\frac{1}{2}$$.\n- Step 3: This is a fixed product condition. As the chord slides while keeping slope $$= 2$$, $$p$$ and $$q$$ vary, but $$pq$$ stays at $$-1/2$$.\n\nThe trick: gradient conditions translate into algebraic constraints on parameters — useful for finding loci.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": false}, {"question": "Why is the sum $$PS + PS' = 2a$$ a CONSEQUENCE of the focus-directrix definition for an ellipse, not an additional axiom? (3 steps)", "answer": "- Step 1: From focus-directrix: $$PS = e \\cdot PM$$, $$PS' = e \\cdot PM'$$, where $$PM, PM'$$ are perpendicular distances to the two directrices.\n- Step 2: Distance between directrices is $$2a/e$$, so $$PM + PM' = 2a/e$$ (if $$P$$ is between them).\n- Step 3: Therefore $$PS + PS' = e(PM + PM') = e \\cdot 2a/e = 2a$$ — a fixed constant, derived from the focus-directrix property.\n\nThe two-focus property is thus a theorem, not an axiom. The single focus-directrix definition is more fundamental and unifies all conics.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": true}, {"question": "What's the tangent equation to a parabola $$y^2 = 4ax$$ at $$(at^2, 2at)$$, and what's the corresponding tangent line condition? (3 steps)", "answer": "- Step 1: Parametric tangent: $$ty = x + at^2$$ (memorise from FP1).\n- Step 2: For a line $$y = mx + c$$ to be tangent: substitute into $$y^2 = 4ax$$ and impose discriminant = 0.\n- Step 3: This yields the condition $$c = a/m$$ — much simpler than the corresponding ellipse/hyperbola conditions.\n\nSo tangent parabola: $$y = mx + a/m$$ with $$m \\neq 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": true}, {"question": "Compare the tangent line conditions $$c^2 = a^2 m^2 + b^2$$ (ellipse) and $$c^2 = a^2 m^2 - b^2$$ (hyperbola). What's the geometric meaning of the sign? (3 steps)", "answer": "- Step 1: Ellipse: $$c^2 - a^2 m^2 = b^2 > 0$$, always positive — any line with non-zero slope can be tangent at some position.\n- Step 2: Hyperbola: $$c^2 - a^2 m^2 = -b^2 < 0$$. For $$c^2 \\geq 0$$, we need $$a^2 m^2 \\geq b^2$$, i.e., $$|m| \\geq b/a$$.\n- Step 3: So tangent lines to a hyperbola must be steeper than the asymptote slopes. Lines shallower than the asymptotes either miss the curve or cross it twice — never tangent.\n\nThis sign difference encodes the bounded vs unbounded nature of the curves.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": true}, {"question": "What does the focus-directrix definition tell us about the shape of an ellipse vs the shape of a hyperbola? (3 steps)", "answer": "- Step 1: Ellipse ($$e < 1$$): $$PS = e \\cdot PM < PM$$. Distance to focus is bounded by distance to (fixed) directrix, so $$PS$$ is bounded — the ellipse is a closed bounded curve.\n- Step 2: Hyperbola ($$e > 1$$): $$PS > PM$$. As $$P$$ moves away from the directrix, $$PS$$ grows without bound — points can be arbitrarily far. Curve is unbounded.\n- Step 3: Parabola ($$e = 1$$): $$PS = PM$$. Distance to focus equals distance to directrix — also unbounded but in a \"balanced\" way.\n\nThis shows directly how eccentricity governs whether the curve is finite or infinite.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": false}, {"question": "Sketch the curve $$x = 4\\cos t, y = \\sin t$$ for $$\\pi/2 \\leq t \\leq 3\\pi/2$$. What part of the ellipse is traced? (3 steps)", "answer": "- Step 1: The full curve is the ellipse $$\\frac{x^2}{16} + y^2 = 1$$ (semi-axes 4 and 1).\n- Step 2: Evaluate at endpoints/midpoint:\n+ $$t = \\pi/2$$: $$(0, 1)$$ — top\n+ $$t = \\pi$$: $$(-4, 0)$$ — leftmost\n+ $$t = 3\\pi/2$$: $$(0, -1)$$ — bottom\n- Step 3: As $$t$$ increases over $$[\\pi/2, 3\\pi/2]$$, the point traces the LEFT HALF of the ellipse, from top to bottom passing through the leftmost vertex.\n\nParametric plotting gives elegant control over which arc to draw — useful in physics (e.g., partial orbits).", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": true}, {"question": "Why is the eccentricity of an ellipse a useful \"shape parameter\" — what does it directly tell you about the appearance of the curve? (3 steps)", "answer": "- Step 1: The eccentricity $$e$$ uniquely determines the ratio $$b/a$$ via $$b/a = \\sqrt{1 - e^2}$$ (for $$a > b$$).\n- Step 2: This ratio is the \"aspect ratio\" of the ellipse — how flat or round it appears.\n+ $$e = 0$$: $$b/a = 1$$, perfectly round (circle)\n+ $$e = 0.6$$: $$b/a = 0.8$$, moderately oval\n+ $$e = 0.99$$: $$b/a \\approx 0.14$$, very flat\n- Step 3: So $$e$$ is a single number that fully captures the ellipse's \"elongation\" independent of size.\n\nTwo ellipses with the same eccentricity look identical when scaled — they're geometrically similar.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": false}, {"question": "Find the eccentricity of the ellipse $$\\frac{x^2}{25} + \\frac{y^2}{16} = 1$$ (mental). (2 steps)", "answer": "- Step 1: $$a^2 = 25, b^2 = 16$$, $$a > b$$. Use $$b^2 = a^2(1 - e^2)$$: $$16 = 25(1 - e^2)$$, so $$1 - e^2 = 16/25$$, $$e^2 = 9/25$$.\n- Step 2: $$e = 3/5$$.\n\nQuick check: $$\\sqrt{a^2 - b^2} = \\sqrt{9} = 3 = ae$$ ✓. Pythagorean triple (3, 4, 5) appearing.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": false}, {"question": "Find the eccentricity of the hyperbola $$\\frac{x^2}{9} - \\frac{y^2}{16} = 1$$ (mental). (2 steps)", "answer": "- Step 1: $$a^2 = 9, b^2 = 16$$. Use $$b^2 = a^2(e^2 - 1)$$: $$16 = 9(e^2 - 1)$$, so $$e^2 = 25/9$$, $$e = 5/3$$.\n- Step 2: Foci at $$(\\pm ae, 0) = (\\pm 3 \\cdot 5/3, 0) = (\\pm 5, 0)$$.\n\nSame Pythagorean triple (3, 4, 5) appears: $$\\sqrt{a^2 + b^2} = 5$$ for the hyperbola.", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": false}, {"question": "Show that the gradient of the tangent to the ellipse $$\\frac{x^2}{9} + \\frac{y^2}{4} = 1$$ at $$P(3\\cos\\theta, 2\\sin\\theta)$$ is $$-\\frac{2}{3}\\cot\\theta$$. (3 steps)", "answer": "- Step 1: Differentiate parametrically: $$\\frac{dx}{d\\theta} = -3\\sin\\theta$$, $$\\frac{dy}{d\\theta} = 2\\cos\\theta$$.\n- Step 2: Gradient: $$\\frac{dy}{dx} = \\frac{dy/d\\theta}{dx/d\\theta} = \\frac{2\\cos\\theta}{-3\\sin\\theta} = -\\frac{2}{3} \\cdot \\frac{\\cos\\theta}{\\sin\\theta}$$.\n- Step 3: Recognise $$\\frac{\\cos\\theta}{\\sin\\theta} = \\cot\\theta$$, so gradient $$= -\\frac{2}{3}\\cot\\theta$$.\n\nIn general, ellipse tangent slope is $$-\\frac{b}{a}\\cot t$$ — a clean parametric form.", "source": "Opus 4.7 ②", "_id": "opus_2_70", "judge_pick": false}, {"question": "Conceptually, why might there be exactly two tangents from an external point to a hyperbola, and how would you find them? (3 steps)", "answer": "- Step 1: From an external point, you can typically draw 0, 1, or 2 tangents to a conic. For a hyperbola, generically there are 2.\n- Step 2: To find: write a tangent line $$y = mx + c$$ passing through the external point (gives one equation in $$m, c$$). Combine with the tangent condition $$c^2 = a^2 m^2 - b^2$$.\n- Step 3: This gives a quadratic in $$m$$, yielding up to 2 solutions — hence up to 2 tangent lines.\n\nGeometrically: from far away, the hyperbola looks like its two asymptotes. A line from an external point can be tangent on either branch — typically two tangents.", "source": "Opus 4.7 ②", "_id": "opus_2_71", "judge_pick": true}, {"question": "What is \"the latus rectum\" of an ellipse, and why is it physically meaningful in orbital mechanics? (3 steps)", "answer": "- Step 1: The latus rectum is the chord perpendicular to the major axis passing through a focus. Length $$2b^2/a$$ for ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ with $$a > b$$.\n- Step 2: The half-length $$\\ell = b^2/a$$ is called the \"semi-latus rectum\" and appears prominently in Kepler's laws and orbital equations.\n- Step 3: For Earth's orbit, $$\\ell$$ characterises the orbit's \"size at the focus\" — independent of orientation. It's used in formulas like $$r = \\ell/(1 + e\\cos\\theta)$$ describing the orbit shape.\n\nSo latus rectum is more than a curiosity — it's a natural measure of orbital scale.", "source": "Opus 4.7 ②", "_id": "opus_2_72", "judge_pick": true}, {"question": "Why are conic sections so important in physics and mathematics — what unifies their broad applicability? (3 steps)", "answer": "- Step 1: Physics: planetary orbits (ellipses), projectile trajectories (parabolas), unbound comet paths (hyperbolas), light reflection in parabolic mirrors, refraction.\n- Step 2: All conic sections share the focus-directrix definition (one parameter, $$e$$), forming a continuous family. They're also related by the geometry of cone-slicing.\n- Step 3: Mathematically, conics are the only curves of degree 2 in the plane (every quadratic in $$x, y$$ describes a conic, possibly degenerate).\n\nThe unifying theme: conics are the simplest non-trivial planar curves, and their algebraic and geometric structures match a vast range of physical phenomena.", "source": "Opus 4.7 ②", "_id": "opus_2_73", "judge_pick": true}, {"question": "When solving a tangent problem and given a point in Cartesian form $$(x_0, y_0)$$, is parametric or implicit differentiation usually faster? (3 steps)", "answer": "- Step 1: If the point is given as $$(x_0, y_0)$$ in Cartesian form, **implicit differentiation** is faster: directly differentiate $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ to get $$\\frac{dy}{dx} = -\\frac{b^2 x}{a^2 y}$$, then substitute.\n- Step 2: If the point is given as $$(a\\cos t, b\\sin t)$$ for known $$t$$, **parametric** is faster — compute $$dy/dx$$ in terms of $$t$$ and substitute.\n- Step 3: For deriving general formulas in terms of a parameter, parametric is cleaner. For numerical values, both work — use what matches the data.\n\nMatch method to data type for efficiency.", "source": "Opus 4.7 ②", "_id": "opus_2_74", "judge_pick": true}, {"question": "Does $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ describe the entire interior region of the ellipse, or just the curve? (2 steps)", "answer": "- Step 1: The equation $$=$$ 1 describes only the curve (the boundary). Points satisfying $$<$$ 1 are interior; $$>$$ 1 are exterior.\n- Step 2: So the full ellipse \"shape\" (closed disc) is $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} \\leq 1$$. The curve alone is the equality.\n\nThis distinction matters for problems involving \"inside\" vs \"on\" the ellipse — common in optimisation problems.", "source": "Opus 4.7 ②", "_id": "opus_2_75", "judge_pick": true}, {"question": "What does the gradient $$-\\frac{b^2 x}{a^2 y}$$ (from implicit differentiation of an ellipse) tell us about tangent slopes at specific points? (3 steps)", "answer": "- Step 1: At the rightmost vertex $$(a, 0)$$: gradient = $$-\\frac{b^2 \\cdot a}{a^2 \\cdot 0}$$ → undefined → vertical tangent ✓.\n- Step 2: At the top vertex $$(0, b)$$: gradient = $$-\\frac{b^2 \\cdot 0}{a^2 \\cdot b} = 0$$ → horizontal tangent ✓.\n- Step 3: At a general point with $$x, y > 0$$: gradient is negative — tangent slopes downward, consistent with the upper-right arc going from $$(a, 0)$$ up to $$(0, b)$$.\n\nThe implicit form gives consistent results at both regular and \"boundary\" points (vertices).", "source": "Opus 4.7 ②", "_id": "opus_2_76", "judge_pick": true}, {"question": "A line is tangent to the ellipse $$\\frac{x^2}{4} + y^2 = 1$$. Show that $$y = x + \\sqrt{5}$$ is tangent and find the point of contact. (3 steps)", "answer": "- Step 1: Tangent condition: $$c^2 = a^2 m^2 + b^2$$, with $$a^2 = 4, b^2 = 1, m = 1$$: $$c^2 = 4 + 1 = 5$$, so $$c = \\pm\\sqrt{5}$$. Yes, $$c = \\sqrt{5}$$ satisfies, so the line IS tangent.\n- Step 2: To find the point of contact: substitute $$y = x + \\sqrt{5}$$ into the ellipse: $$\\frac{x^2}{4} + (x + \\sqrt{5})^2 = 1$$, leading to $$5x^2 + 8\\sqrt{5}x + 16 = 0$$.\n- Step 3: For tangent, this has a double root: $$x = -\\frac{4\\sqrt{5}}{5} = -\\frac{4}{\\sqrt{5}}$$. Then $$y = -\\frac{4}{\\sqrt{5}} + \\sqrt{5} = \\frac{1}{\\sqrt{5}}$$.\n\nSo point of contact is $$\\left(-\\frac{4}{\\sqrt{5}}, \\frac{1}{\\sqrt{5}}\\right)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_77", "judge_pick": false}, {"question": "What's the conceptual approach to finding the locus of a tangent line's \"pivot point\" as the source point moves on a conic? (3 steps)", "answer": "- Step 1: Express the tangent line in parametric form (function of curve parameter $$t$$).\n- Step 2: Identify the geometric construction defining the \"pivot\" (e.g., midpoint, intersection with axis, intersection with a fixed line).\n- Step 3: Compute that pivot's coordinates as functions of $$t$$, then eliminate $$t$$ via the appropriate identity to get a Cartesian equation in the pivot's coordinates.\n\nThis is the universal \"parametric elimination\" recipe for loci on conics.", "source": "Opus 4.7 ②", "_id": "opus_2_78", "judge_pick": true}, {"question": "A line tangent to a hyperbola $$\\frac{x^2}{a^2} - \\frac{y^2}{b^2} = 1$$ has slope $$m$$. What's the geometric significance of the boundary case $$|m| = b/a$$? (3 steps)", "answer": "- Step 1: $$m = b/a$$ is the slope of the asymptote $$y = (b/a)x$$.\n- Step 2: At this slope, the tangent condition $$c^2 = a^2 m^2 - b^2 = b^2 - b^2 = 0$$, giving $$c = 0$$ — the line passes through the origin.\n- Step 3: But $$y = (b/a)x$$ is precisely an asymptote, which approaches but never touches the hyperbola — so it's not actually a tangent in the usual sense.\n\nSo $$|m| = b/a$$ is the borderline: lines with slope strictly less than $$b/a$$ can never be tangent; slopes exactly equal to $$b/a$$ give asymptotes; slopes strictly greater can be genuine tangents.", "source": "Opus 4.7 ②", "_id": "opus_2_79", "judge_pick": true}, {"question": "Why do we typically express loci using \"uppercase $$X, Y$$\" during derivation but rename to \"lowercase $$x, y$$\" at the end? (2 steps)", "answer": "- Step 1: During derivation, lowercase $$x, y$$ refer to the source curve (e.g., the ellipse being tracked). Uppercase $$X, Y$$ denote the moving point's coordinates — distinguishing them avoids confusion.\n- Step 2: After eliminating the parameter, the final equation in $$X, Y$$ describes the locus. Renaming to standard $$x, y$$ at the end yields the Cartesian equation in conventional form.\n\nThis convention is for clarity, not necessity. Some texts skip it; both approaches are valid.", "source": "Opus 4.7 ②", "_id": "opus_2_80", "judge_pick": false}, {"question": "Conceptually, why does the same \"parametric elimination\" strategy work for finding loci on different conic sections? (3 steps)", "answer": "- Step 1: Each conic has a one-parameter family of points (a parameterisation), so any geometric construction yields coordinates that are functions of the parameter.\n- Step 2: Each conic comes with a fundamental identity ($$\\cos^2 + \\sin^2 = 1$$, $$\\cosh^2 - \\sinh^2 = 1$$, $$\\sec^2 - \\tan^2 = 1$$, etc.) relating the trig/hyperbolic functions used.\n- Step 3: To get a Cartesian equation, we express the parameter through $$X$$ and $$Y$$ and combine via the identity to eliminate.\n\nThe strategy is uniform — only the specific identity changes. This is the power of parametric methods.", "source": "Opus 4.7 ②", "_id": "opus_2_81", "judge_pick": true}, {"question": "What's a \"focal chord\" of a conic, and why are its properties important? (3 steps)", "answer": "- Step 1: A focal chord is any chord passing through a focus of the conic.\n- Step 2: For an ellipse: focal chords have length depending on angle, with minimum $$2b^2/a$$ (latus rectum, perpendicular) and maximum $$2a$$ (major axis itself).\n- Step 3: For a parabola: focal chord at parameters $$p, q$$ corresponds to $$pq = -1$$ — a clean parametric criterion.\n\nFocal chords are physically meaningful (e.g., they reflect off the curve symmetrically) and algebraically tractable, hence their importance.", "source": "Opus 4.7 ②", "_id": "opus_2_82", "judge_pick": true}, {"question": "What's the meaning of confocal conics, and why are they geometrically interesting? (3 steps)", "answer": "- Step 1: \"Confocal\" means sharing the same foci. A family of confocal conics has different shapes (different eccentricities) but identical foci.\n- Step 2: For example, all hyperbolas $$\\frac{x^2}{p} - \\frac{y^2}{q} = 1$$ with $$p + q = 25$$ share foci $$(\\pm 5, 0)$$.\n- Step 3: Geometric interest: confocal ellipses and hyperbolas form an orthogonal grid — at every intersection point, the ellipse and hyperbola tangents are perpendicular. This is used in physics (e.g., orthogonal coordinates for solving PDEs).\n\nConfocal conics reveal a beautiful underlying structure connecting different conic types.", "source": "Opus 4.7 ②", "_id": "opus_2_83", "judge_pick": true}, {"question": "Find the value of $$\\theta$$ on the ellipse $$x = 4\\cos\\theta, y = 3\\sin\\theta$$ ($$0 \\leq \\theta < 2\\pi$$) for the point $$P\\left(2, \\frac{3\\sqrt{3}}{2}\\right)$$. (3 steps)", "answer": "- Step 1: From $$4\\cos\\theta = 2$$: $$\\cos\\theta = 1/2$$, so $$\\theta = \\pi/3$$ or $$5\\pi/3$$.\n- Step 2: From $$3\\sin\\theta = 3\\sqrt{3}/2$$: $$\\sin\\theta = \\sqrt{3}/2$$, so $$\\theta = \\pi/3$$ or $$2\\pi/3$$.\n- Step 3: The intersection of the two solution sets is $$\\theta = \\pi/3$$ (only common value).\n\nBoth equations must be satisfied simultaneously — the unique intersection determines $$\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_84", "judge_pick": false}, {"question": "Why does the equation of the chord of an ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ joining $$P(a\\cos\\alpha, b\\sin\\alpha)$$ and $$Q(a\\cos\\beta, b\\sin\\beta)$$ simplify nicely? (3 steps)", "answer": "- Step 1: The chord can be derived using the slope formula and point-slope. After simplification, it's $$\\frac{x}{a}\\cos\\frac{\\alpha+\\beta}{2} + \\frac{y}{b}\\sin\\frac{\\alpha+\\beta}{2} = \\cos\\frac{\\alpha-\\beta}{2}$$.\n- Step 2: When $$\\alpha = \\beta$$: this becomes the tangent equation at parameter $$\\alpha$$ (the chord degenerates to a tangent).\n- Step 3: The simplification arises from sum-to-product identities, which give a symmetric form involving the average and difference of parameters.\n\nThis \"chord-becomes-tangent\" limit is a powerful technique: derive a chord formula, then specialise to get the tangent.", "source": "Opus 4.7 ②", "_id": "opus_2_85", "judge_pick": true}, {"question": "Show that the line $$y = 2x + c$$ tangent to $$x^2 + \\frac{y^2}{4} = 1$$ has $$c = \\pm 2\\sqrt{2}$$. (3 steps)", "answer": "- Step 1: Standardise: $$\\frac{x^2}{1} + \\frac{y^2}{4} = 1$$, so $$a^2 = 1, b^2 = 4$$.\n- Step 2: Apply tangent condition $$c^2 = a^2 m^2 + b^2$$: $$c^2 = 1 \\cdot 4 + 4 = 8$$.\n- Step 3: $$c = \\pm\\sqrt{8} = \\pm 2\\sqrt{2}$$.\n\nTwo values because the line of given slope can be tangent on either side of the ellipse (above or below).", "source": "Opus 4.7 ②", "_id": "opus_2_86", "judge_pick": false}, {"question": "What does the tangent equation $$bx\\cos t + ay\\sin t = ab$$ become at $$t = 0$$ (a vertex), and why is this consistent? (3 steps)", "answer": "- Step 1: At $$t = 0$$: $$\\sin t = 0$$, $$\\cos t = 1$$, so the equation becomes $$bx \\cdot 1 + 0 = ab$$, i.e., $$x = a$$.\n- Step 2: At $$t = 0$$, the point on the ellipse is $$(a, 0)$$ — the rightmost vertex.\n- Step 3: A vertical line $$x = a$$ at this point matches the geometric expectation: the tangent at the rightmost vertex is vertical (the curve is \"turning around\").\n\nThe general formula handles vertices elegantly without needing special-case treatment.", "source": "Opus 4.7 ②", "_id": "opus_2_87", "judge_pick": true}, {"question": "What's the strategic value of the identity $$(p+q)^2 = p^2 + q^2 + 2pq$$ in parametric chord problems? (3 steps)", "answer": "- Step 1: Many chord problems involve symmetric expressions in parameters $$p, q$$ — like $$p^2 + q^2$$ or $$p + q$$.\n- Step 2: When you know $$p + q$$ and $$pq$$ separately, the identity lets you compute $$p^2 + q^2 = (p+q)^2 - 2pq$$ without needing $$p, q$$ individually.\n- Step 3: This is especially useful when constraints like $$pq = -1$$ (focal chord) reduce sum of squares to $$(p+q)^2 + 2$$ — turning the problem into one variable.\n\nThese elementary symmetric polynomial identities make parametric algebra much cleaner.", "source": "Opus 4.7 ②", "_id": "opus_2_88", "judge_pick": tr
