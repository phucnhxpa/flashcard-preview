 -\\frac{1}{2}\\ln|1-x^2| + C$$. Final result: $$x\\operatorname{artanh} x + \\frac{1}{2}\\ln|1-x^2| + C$$.\n\nThe strategy is identical to integrating $$\\ln x$$: set the \"awkward\" function (the inverse function) as $$u$$, and multiply by 1 to create $$\\frac{dv}{dx}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "To find $$\\int \\arcsin x \\, dx$$, you again use integration by parts with $$u = \\arcsin x$$. Walk through the key steps and give the final result. (3 steps)", "answer": "- Step 1: Let $$u = \\arcsin x$$, $$\\frac{dv}{dx} = 1$$, so $$\\frac{du}{dx} = \\frac{1}{\\sqrt{1-x^2}}$$ and $$v = x$$. Integration by parts gives: $$x\\arcsin x - \\int \\frac{x}{\\sqrt{1-x^2}}dx$$.\n- Step 2: The remaining integral: $$\\int \\frac{x}{\\sqrt{1-x^2}}dx = -\\frac{1}{2}\\int (-2x)(1-x^2)^{-1/2}dx = -\\frac{1}{2} \\cdot \\frac{(1-x^2)^{1/2}}{1/2} = -\\sqrt{1-x^2}$$.\n- Step 3: So: $$\\int \\arcsin x \\, dx = x\\arcsin x + \\sqrt{1-x^2} + C$$.\n\nThe derivative $$\\frac{1}{\\sqrt{1-x^2}}$$ combines with $$v=x$$ to give an integral of the form $$\\int f'(x)[f(x)]^n dx$$, which is straightforward.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A reduction formula relates $$I_n$$ to $$I_{n-1}$$ (or $$I_{n-2}$$). For $$I_n = \\int x^n e^x dx$$, derive the reduction formula and explain the stopping condition. (3 steps)", "answer": "- Step 1: Use integration by parts with $$u = x^n$$ and $$\\frac{dv}{dx} = e^x$$, so $$\\frac{du}{dx} = nx^{n-1}$$ and $$v = e^x$$.\n- Step 2: $$I_n = x^n e^x - \\int nx^{n-1}e^x dx = x^n e^x - nI_{n-1}$$.\n- Step 3: The stopping condition: when you reach $$I_0 = \\int e^x dx = e^x + C$$, which is a standard integral. By repeatedly applying the formula, any $$I_n$$ can be reduced to $$I_0$$ plus a polynomial times $$e^x$$.\n\nFor example, $$I_4 = x^4e^x - 4I_3 = x^4e^x - 4(x^3e^x - 3I_2) = \\ldots = e^x(x^4 - 4x^3 + 12x^2 - 24x + 24) + C$$.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "For $$I_n = \\int_0^1 x^n\\sqrt{1-x} \\, dx$$, the reduction formula is $$I_n = \\frac{2n}{2n+3}I_{n-1}$$. After integration by parts, an algebraic manipulation is needed to isolate $$I_n$$. Explain the key trick. (3 steps)", "answer": "- Step 1: Integration by parts with $$u = x^n$$, $$\\frac{dv}{dx} = \\sqrt{1-x}$$ gives $$v = -\\frac{2}{3}(1-x)^{3/2}$$. The boundary term vanishes at both limits (0 and 1) since $$n \\geq 1$$.\n- Step 2: The integral becomes $$I_n = \\frac{2n}{3}\\int_0^1 x^{n-1}(1-x)^{3/2}dx$$. Now rewrite $$(1-x)^{3/2} = (1-x)\\sqrt{1-x}$$ and expand: $$I_n = \\frac{2n}{3}\\int_0^1 x^{n-1}\\sqrt{1-x} \\, dx - \\frac{2n}{3}\\int_0^1 x^n\\sqrt{1-x} \\, dx = \\frac{2n}{3}I_{n-1} - \\frac{2n}{3}I_n$$.\n- Step 3: Now $$I_n$$ appears on both sides. Collect terms: $$I_n + \\frac{2n}{3}I_n = \\frac{2n}{3}I_{n-1}$$, so $$\\left(1+\\frac{2n}{3}\\right)I_n = \\frac{2n}{3}I_{n-1}$$, giving $$I_n = \\frac{2n}{2n+3}I_{n-1}$$.\n\nThe key trick: when $$I_n$$ appears on both sides after expansion, collect and solve for $$I_n$$ algebraically.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "For $$I_n = \\int_0^{\\pi/2} \\sin^n x \\, dx$$, the reduction formula reduces $$n$$ by 2 each step: $$nI_n = (n-1)I_{n-2}$$. Explain why the formula skips by 2 instead of 1, and state the two different stopping conditions. (3 steps)", "answer": "- Step 1: After integration by parts and using $$\\cos^2 x = 1-\\sin^2 x$$, the integral splits into $$I_{n-2}$$ and $$I_n$$ (not $$I_{n-1}$$). This is because replacing $$\\cos^2 x$$ with $$1-\\sin^2 x$$ introduces $$\\sin^{n-2}x$$ and $$\\sin^n x$$, both with the same parity difference of 2 from each other.\n- Step 2: If $$n$$ is odd, repeated application reduces to $$I_1 = \\int_0^{\\pi/2}\\sin x \\, dx = 1$$. The result is a product of fractions: $$I_n = \\frac{n-1}{n} \\cdot \\frac{n-3}{n-2} \\cdots \\frac{2}{3} \\cdot 1$$.\n- Step 3: If $$n$$ is even, repeated application reduces to $$I_0 = \\int_0^{\\pi/2}1 \\, dx = \\frac{\\pi}{2}$$. The result includes the factor $$\\frac{\\pi}{2}$$: $$I_n = \\frac{n-1}{n} \\cdot \\frac{n-3}{n-2} \\cdots \\frac{3}{4} \\cdot \\frac{1}{2} \\cdot \\frac{\\pi}{2}$$.\n\nThe skip-by-2 structure means odd and even $$n$$ follow separate chains, each landing on a different base case.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "The reduction formula for $$I_n = \\int \\tan^n x \\, dx$$ does NOT require integration by parts. What identity and algebraic trick is used instead? (3 steps)", "answer": "- Step 1: Write $$\\tan^n x = \\tan^{n-2}x \\cdot \\tan^2 x$$ and use the identity $$\\tan^2 x = \\sec^2 x - 1$$.\n- Step 2: Split: $$I_n = \\int \\tan^{n-2}x \\sec^2 x \\, dx - \\int \\tan^{n-2}x \\, dx$$. The first integral is of the form $$\\int [f(x)]^m f'(x) dx$$ with $$f(x) = \\tan x$$ and $$f'(x) = \\sec^2 x$$, giving $$\\frac{\\tan^{n-1}x}{n-1}$$.\n- Step 3: So: $$I_n = \\frac{1}{n-1}\\tan^{n-1}x - I_{n-2}$$, for $$n \\geq 2$$.\n\nThe identity-based method works whenever you can express the integrand using an identity that introduces $$\\sec^2 x$$ (whose integral is $$\\tan x$$) or a similar \"derivative\" form.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Using the reduction formula $$I_n = \\frac{1}{n-1}\\tan^{n-1}x - I_{n-2}$$, find $$\\int \\tan^4 x \\, dx$$. You will need the base cases $$I_0$$ and $$I_1$$. (3 steps)", "answer": "- Step 1: $$I_4 = \\frac{1}{3}\\tan^3 x - I_2$$. Now apply the formula to $$I_2$$: $$I_2 = \\frac{1}{1}\\tan^1 x - I_0 = \\tan x - I_0$$.\n- Step 2: The base cases: $$I_0 = \\int \\tan^0 x \\, dx = \\int 1 \\, dx = x + C$$, and $$I_1 = \\int \\tan x \\, dx = \\int \\frac{\\sin x}{\\cos x}dx = -\\ln|\\cos x| + C = \\ln|\\sec x| + C$$.\n- Step 3: Combining: $$I_4 = \\frac{1}{3}\\tan^3 x - (\\tan x - x) + C = \\frac{1}{3}\\tan^3 x - \\tan x + x + C$$.\n\nThe reduction alternates between even and odd, so $$I_4$$ depends on $$I_2$$ which depends on $$I_0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "The arc length formula $$s = \\int_{x_A}^{x_B} \\sqrt{1+\\left(\\frac{dy}{dx}\\right)^2} dx$$ is derived from the approximation $$(\\delta s)^2 \\approx (\\delta x)^2 + (\\delta y)^2$$. Explain the geometric reasoning behind this approximation and the limiting process. (3 steps)", "answer": "- Step 1: For two nearby points $$P(x,y)$$ and $$Q(x+\\delta x, y+\\delta y)$$ on a curve, the arc length $$\\delta s$$ between them is approximately equal to the straight-line distance (chord) $$PQ$$. By Pythagoras: $$(PQ)^2 = (\\delta x)^2 + (\\delta y)^2$$, so $$(\\delta s)^2 \\approx (\\delta x)^2 + (\\delta y)^2$$.\n- Step 2: Divide by $$(\\delta x)^2$$: $$\\left(\\frac{\\delta s}{\\delta x}\\right)^2 \\approx 1 + \\left(\\frac{\\delta y}{\\delta x}\\right)^2$$. As $$\\delta x \\to 0$$, the chord length approaches the arc length (the curve looks locally straight), and the difference quotient becomes a derivative: $$\\left(\\frac{ds}{dx}\\right)^2 = 1 + \\left(\\frac{dy}{dx}\\right)^2$$.\n- Step 3: Taking the positive square root (since arc length increases with $$x$$): $$\\frac{ds}{dx} = \\sqrt{1+\\left(\\frac{dy}{dx}\\right)^2}$$, and integrating gives the arc length formula.\n\nThe fundamental idea: a smooth curve is locally a straight line, so Pythagoras applies in the infinitesimal limit.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "The arc length can also be computed as $$s = \\int_{y_A}^{y_B} \\sqrt{1+\\left(\\frac{dx}{dy}\\right)^2} dy$$. When is this form more convenient than the $$x$$-form? (2 steps)", "answer": "- Step 1: This form is more convenient when the curve is easier to differentiate with respect to $$y$$, or when the curve is expressed as $$x = f(y)$$ rather than $$y = f(x)$$. For example, for the curve $$x = y^3$$, finding $$\\frac{dx}{dy} = 3y^2$$ is more natural than inverting to get $$y = x^{1/3}$$ and finding $$\\frac{dy}{dx}$$.\n- Step 2: It is also useful when the limits of integration are more naturally expressed in terms of $$y$$-coordinates. If you know $$y_A$$ and $$y_B$$ but would need extra work to find the corresponding $$x$$-values, the $$y$$-form avoids this.\n\nChoose whichever variable gives a simpler derivative and more convenient limits.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "For a parametric curve $$x = f(t)$$, $$y = g(t)$$, the arc length formula is $$s = \\int_{t_A}^{t_B}\\sqrt{\\left(\\frac{dx}{dt}\\right)^2+\\left(\\frac{dy}{dt}\\right)^2} dt$$. Derive this from the Cartesian form. (2 steps)", "answer": "- Step 1: From the fundamental relation $$(ds)^2 = (dx)^2 + (dy)^2$$, divide both sides by $$(dt)^2$$: $$\\left(\\frac{ds}{dt}\\right)^2 = \\left(\\frac{dx}{dt}\\right)^2 + \\left(\\frac{dy}{dt}\\right)^2$$.\n- Step 2: Taking the positive square root and integrating: $$s = \\int_{t_A}^{t_B}\\sqrt{\\left(\\frac{dx}{dt}\\right)^2+\\left(\\frac{dy}{dt}\\right)^2} \\, dt$$.\n\nThe parametric form is the most general — it unifies the $$x$$-form (where $$t=x$$) and the $$y$$-form (where $$t=y$$) as special cases.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "Find the exact length of the arc on $$y = \\frac{1}{2}x^2$$ from the origin to $$P(4,8)$$. The integral you need is $$\\int_0^4 \\sqrt{1+x^2} \\, dx$$. What substitution makes this tractable, and what is the result? (3 steps)", "answer": "- Step 1: Use $$x = \\sinh u$$, so $$dx = \\cosh u \\, du$$ and $$\\sqrt{1+x^2} = \\cosh u$$. The integral becomes $$\\int_0^{\\operatorname{arsinh} 4} \\cosh^2 u \\, du$$.\n- Step 2: Use $$\\cosh^2 u = \\frac{1+\\cosh 2u}{2}$$: $$\\int \\frac{1+\\cosh 2u}{2}du = \\frac{1}{2}u + \\frac{1}{4}\\sinh 2u + C = \\frac{1}{2}u + \\frac{1}{2}\\sinh u \\cosh u + C$$.\n- Step 3: Evaluate at limits. When $$u = \\operatorname{arsinh} 4$$: $$\\sinh u = 4$$, $$\\cosh u = \\sqrt{1+16} = \\sqrt{17}$$. So: $$\\frac{1}{2}\\operatorname{arsinh} 4 + \\frac{1}{2}(4)(\\sqrt{17}) = \\frac{1}{2}\\operatorname{arsinh} 4 + 2\\sqrt{17}$$. Using $$\\operatorname{arsinh} x = \\ln(x+\\sqrt{1+x^2})$$: $$\\frac{1}{2}\\ln(4+\\sqrt{17}) + 2\\sqrt{17}$$.\n\nThis is a classic example where the hyperbolic substitution naturally arises from the $$\\sqrt{1+x^2}$$ form.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "For the parametric curve $$x = t + \\frac{1}{t}$$, $$y = 2\\ln t$$ ($$t > 0$$), find the arc length from $$t=1$$ to $$t=2$$. The key is simplifying $$\\left(\\frac{dx}{dt}\\right)^2 + \\left(\\frac{dy}{dt}\\right)^2$$. (3 steps)", "answer": "- Step 1: Compute derivatives: $$\\frac{dx}{dt} = 1 - \\frac{1}{t^2}$$ and $$\\frac{dy}{dt} = \\frac{2}{t}$$.\n- Step 2: Sum of squares: $$\\left(1-\\frac{1}{t^2}\\right)^2 + \\frac{4}{t^2} = 1 - \\frac{2}{t^2} + \\frac{1}{t^4} + \\frac{4}{t^2} = 1 + \\frac{2}{t^2} + \\frac{1}{t^4} = \\left(1+\\frac{1}{t^2}\\right)^2$$.\n- Step 3: The square root is $$1+\\frac{1}{t^2}$$ (positive since $$t>0$$). Integrate: $$\\int_1^2 \\left(1+\\frac{1}{t^2}\\right)dt = \\left[t - \\frac{1}{t}\\right]_1^2 = (2-\\frac{1}{2})-(1-1) = 1.5$$.\n\nThe \"magic\" cancellation to a perfect square is not accidental — it's a feature of many well-designed exam problems. Always expand and check for factorisation.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "The surface area formula for revolution about the $$x$$-axis is $$S = 2\\pi \\int y \\, ds$$. This is derived by approximating the surface as a frustum of a cone. Explain the key steps of this derivation. (3 steps)", "answer": "- Step 1: When a small arc $$PQ$$ (length $$\\delta s$$) is rotated about the $$x$$-axis, it generates a surface approximately equal to a frustum of a cone. The surface area of a cone is $$\\pi r l$$ (base radius × slant height), so the frustum area is $$\\pi(y+\\delta y)l_2 - \\pi y l_1$$.\n- Step 2: Using similar triangles, this simplifies to $$\\pi(2y+\\delta y)(l_2-l_1)$$. Since $$l_2-l_1 \\approx \\delta s$$ (the arc approximates the slant height difference), we get $$\\delta S \\approx \\pi(2y+\\delta y)\\delta s$$.\n- Step 3: As $$\\delta x \\to 0$$: $$\\frac{dS}{dx} = 2\\pi y \\frac{ds}{dx}$$, and integrating: $$S = \\int 2\\pi y \\frac{ds}{dx}dx = \\int 2\\pi y \\, ds = 2\\pi\\int y\\sqrt{1+\\left(\\frac{dy}{dx}\\right)^2}dx$$.\n\nThe factor $$2\\pi y$$ is the circumference at height $$y$$, and $$ds$$ is the \"width\" of the infinitesimal band.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "For rotation about the $$y$$-axis, the surface area formula is $$S = 2\\pi\\int x \\, ds$$. Give the two Cartesian forms of this formula (one integrating with respect to $$x$$, one with respect to $$y$$) and state which is often more convenient. (2 steps)", "answer": "- Step 1: The two forms are: $$S = 2\\pi\\int_{y_A}^{y_B} x\\sqrt{1+\\left(\\frac{dx}{dy}\\right)^2}dy$$ and $$S = 2\\pi\\int_{x_A}^{x_B} x\\sqrt{1+\\left(\\frac{dy}{dx}\\right)^2}dx$$.\n- Step 2: The second form (integrating with respect to $$x$$) is often more convenient because it avoids having to find $$\\frac{dx}{dy}$$, which may require inverting the function. If $$y = f(x)$$ is given, you already have $$\\frac{dy}{dx}$$, so the $$x$$-form is direct.\n\nThe textbook notes: \"This form is often the more convenient\" for the $$x$$-integration version when rotating about the $$y$$-axis.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "The curve $$y = \\frac{1}{3}\\sqrt{x}(3-x)$$ is rotated about the $$x$$-axis between $$x=1$$ and $$x=3$$. A key step is simplifying $$1+\\left(\\frac{dy}{dx}\\right)^2$$. Show that this equals $$\\frac{1}{4}(x^{-1/2}+x^{1/2})^2$$. (3 steps)", "answer": "- Step 1: Expand $$y = x^{1/2} - \\frac{1}{3}x^{3/2}$$, so $$\\frac{dy}{dx} = \\frac{1}{2}x^{-1/2} - \\frac{1}{2}x^{1/2} = \\frac{1}{2}(x^{-1/2}-x^{1/2})$$.\n- Step 2: Square it: $$\\left(\\frac{dy}{dx}\\right)^2 = \\frac{1}{4}(x^{-1}-2+x) = \\frac{1}{4}x^{-1} - \\frac{1}{2} + \\frac{1}{4}x$$.\n- Step 3: Add 1: $$1+\\left(\\frac{dy}{dx}\\right)^2 = 1 + \\frac{1}{4}x^{-1} - \\frac{1}{2} + \\frac{1}{4}x = \\frac{1}{4}x^{-1} + \\frac{1}{2} + \\frac{1}{4}x = \\frac{1}{4}(x^{-1/2}+x^{1/2})^2$$.\n\nThe perfect square factorisation is crucial — it means the square root simplifies to $$\\frac{1}{2}(x^{-1/2}+x^{1/2})$$, making the integral tractable.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "The curve $$y = \\cosh x$$ from $$(0,1)$$ to $$(\\ln 2, \\frac{5}{4})$$ is rotated about the $$y$$-axis. The surface area integral is $$2\\pi\\int_0^{\\ln 2} x\\cosh x \\, dx$$. How do you evaluate this, and what is the result? (3 steps)", "answer": "- Step 1: The integral $$\\int x\\cosh x \\, dx$$ requires integration by parts. Let $$u = x$$, $$\\frac{dv}{dx} = \\cosh x$$, so $$\\frac{du}{dx} = 1$$, $$v = \\sinh x$$.\n- Step 2: $$\\int x\\cosh x \\, dx = x\\sinh x - \\int \\sinh x \\, dx = x\\sinh x - \\cosh x + C$$.\n- Step 3: Evaluate at limits. At $$x = \\ln 2$$: $$\\sinh(\\ln 2) = \\frac{3}{4}$$, $$\\cosh(\\ln 2) = \\frac{5}{4}$$. So: $$2\\pi[(\\ln 2)\\cdot\\frac{3}{4} - \\frac{5}{4} - (0 - 1)] = 2\\pi[\\frac{3}{4}\\ln 2 - \\frac{1}{4}] = \\frac{\\pi}{2}(3\\ln 2 - 1)$$.\n\nThe values $$\\sinh(\\ln 2) = \\frac{e^{\\ln 2}-e^{-\\ln 2}}{2} = \\frac{2-\\frac{1}{2}}{2} = \\frac{3}{4}$$ and $$\\cosh(\\ln 2) = \\frac{5}{4}$$ come from the exponential definitions.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "The cycloid $$x = t - \\sin t$$, $$y = 1-\\cos t$$ from $$t=0$$ to $$t=2\\pi$$ is rotated about the $$x$$-axis. A key simplification is $$\\left(\\frac{dx}{dt}\\right)^2+\\left(\\frac{dy}{dt}\\right)^2 = 4\\sin^2\\frac{t}{2}$$. Show how this arises. (3 steps)", "answer": "- Step 1: Compute derivatives: $$\\frac{dx}{dt} = 1-\\cos t$$, $$\\frac{dy}{dt} = \\sin t$$.\n- Step 2: Sum of squares: $$(1-\\cos t)^2 + \\sin^2 t = 1-2\\cos t+\\cos^2 t+\\sin^2 t = 2-2\\cos t$$.\n- Step 3: Use the identity $$1-\\cos t = 2\\sin^2\\frac{t}{2}$$: $$2-2\\cos t = 2(1-\\cos t) = 4\\sin^2\\frac{t}{2}$$. So $$\\sqrt{\\left(\\frac{dx}{dt}\\right)^2+\\left(\\frac{dy}{dt}\\right)^2} = 2\\sin\\frac{t}{2}$$ (positive for $$0 < t < 2\\pi$$).\n\nThis half-angle identity is essential for simplifying cycloid arc length and surface area integrals.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "A common misconception: students think $$\\int \\frac{1}{\\sqrt{1-x^2}}dx = \\arccos x + C$$ is equally valid as $$\\arcsin x + C$$. Are both correct? Explain the relationship between the two answers. (2 steps)", "answer": "- Step 1: Both are technically correct as antiderivatives, since $$\\frac{d}{dx}(\\arcsin x) = \\frac{1}{\\sqrt{1-x^2}}$$ and $$\\frac{d}{dx}(-\\arccos x) = \\frac{1}{\\sqrt{1-x^2}}$$. So $$\\int \\frac{1}{\\sqrt{1-x^2}}dx = \\arcsin x + C$$ or $$-\\arccos x + C$$.\n- Step 2: The two differ by a constant: $$\\arcsin x + \\arccos x = \\frac{\\pi}{2}$$, so $$\\arcsin x = -\\arccos x + \\frac{\\pi}{2}$$. The \"$$\\frac{\\pi}{2}$$\" is absorbed into the constant of integration $$C$$. By convention, the standard result is given as $$\\arcsin x + C$$.\n\nBoth are valid antiderivatives; the difference is just a constant. The formula booklet uses the $$\\arcsin$$ convention.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "When using the substitution $$x = a\\cosh u$$ for $$\\int \\frac{1}{\\sqrt{x^2-a^2}}dx$$, why must we choose $$u \\geq 0$$ (i.e., the principal value of $$\\operatorname{arcosh}$$)? (2 steps)", "answer": "- Step 1: The function $$\\cosh u$$ is even ($$\\cosh(-u) = \\cosh u$$), so both $$u$$ and $$-u$$ give the same $$x$$. To have a one-to-one substitution, we restrict to $$u \\geq 0$$, which is the principal branch of $$\\operatorname{arcosh}$$.\n- Step 2: This ensures $$\\sinh u \\geq 0$$ (since $$\\sinh$$ is increasing and $$\\sinh 0 = 0$$), so $$\\sqrt{\\sinh^2 u} = \\sinh u$$ without sign ambiguity. If we allowed $$u < 0$$, we'd need $$\\sqrt{\\sinh^2 u} = |\\sinh u| = -\\sinh u$$, introducing sign complications.\n\nThe domain restriction $$u \\geq 0$$ keeps the substitution clean and matches the standard definition of $$\\operatorname{arcosh}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": true}, {"question": "The integral $$\\int \\frac{1}{a^2-x^2}dx$$ (for $$|x|<a$$) can be found by partial fractions OR by the substitution $$x = a\\tanh\\theta$$. Show that both methods give equivalent results. (3 steps)", "answer": "- Step 1: Partial fractions: $$\\frac{1}{a^2-x^2} = \\frac{1}{(a-x)(a+x)} = \\frac{1}{2a}\\left(\\frac{1}{a+x}+\\frac{1}{a-x}\\right)$$. Integrating: $$\\frac{1}{2a}[\\ln|a+x|-\\ln|a-x|] = \\frac{1}{2a}\\ln\\left|\\frac{a+x}{a-x}\\right| + C$$.\n- Step 2: Substitution $$x = a\\tanh\\theta$$: $$dx = a\\operatorname{sech}^2\\theta \\, d\\theta$$ and $$a^2-x^2 = a^2(1-\\tanh^2\\theta) = a^2\\operatorname{sech}^2\\theta$$. The integral becomes $$\\int \\frac{a\\operatorname{sech}^2\\theta}{a^2\\operatorname{sech}^2\\theta}d\\theta = \\frac{1}{a}\\int 1 \\, d\\theta = \\frac{\\theta}{a} + C = \\frac{1}{a}\\operatorname{artanh}\\left(\\frac{x}{a}\\right) + C$$.\n- Step 3: These are equivalent because $$\\operatorname{artanh}\\left(\\frac{x}{a}\\right) = \\frac{1}{2}\\ln\\left(\\frac{1+x/a}{1-x/a}\\right) = \\frac{1}{2}\\ln\\left(\\frac{a+x}{a-x}\\right)$$, so $$\\frac{1}{a}\\operatorname{artanh}\\left(\\frac{x}{a}\\right) = \\frac{1}{2a}\\ln\\left|\\frac{a+x}{a-x}\\right|$$.\n\nThe logarithmic form (result 16) and the $$\\operatorname{artanh}$$ form are two representations of the same function.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "Exercise: Use the substitution $$x = \\sec\\theta$$ to find $$\\int \\frac{1}{x\\sqrt{x^2-1}}dx$$. Walk through the key steps. (3 steps)", "answer": "- Step 1: Let $$x = \\sec\\theta$$, so $$dx = \\sec\\theta\\tan\\theta \\, d\\theta$$ and $$\\sqrt{x^2-1} = \\sqrt{\\sec^2\\theta-1} = \\tan\\theta$$ (positive for appropriate $$\\theta$$).\n- Step 2: Substitute: $$\\int \\frac{1}{\\sec\\theta \\cdot \\tan\\theta} \\cdot \\sec\\theta\\tan\\theta \\, d\\theta = \\int 1 \\, d\\theta = \\theta + C$$.\n- Step 3: Since $$x = \\sec\\theta$$, we have $$\\theta = \\operatorname{arcsec} x$$ (or equivalently $$\\theta = \\arccos\\frac{1}{x}$$). Result: $$\\operatorname{arcsec} x + C$$.\n\nThe substitution elegantly cancels both the $$\\sec\\theta$$ in the denominator and the $$\\tan\\theta$$ from the square root.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "Exercise: Find $$\\int \\frac{\\sqrt{x^2-1}}{x}dx$$ using $$x = \\sec\\theta$$. This is harder than the previous question — explain why and give the result. (3 steps)", "answer": "- Step 1: With $$x = \\sec\\theta$$: $$\\sqrt{x^2-1} = \\tan\\theta$$, $$dx = \\sec\\theta\\tan\\theta \\, d\\theta$$. The integral becomes $$\\int \\frac{\\tan\\theta}{\\sec\\theta}\\sec\\theta\\tan\\theta \\, d\\theta = \\int \\tan^2\\theta \\, d\\theta$$.\n- Step 2: Use $$\\tan^2\\theta = \\sec^2\\theta - 1$$: $$\\int (\\sec^2\\theta - 1)d\\theta = \\tan\\theta - \\theta + C$$.\n- Step 3: Back-substitute: $$\\tan\\theta = \\sqrt{x^2-1}$$ and $$\\theta = \\operatorname{arcsec} x$$. Result: $$\\sqrt{x^2-1} - \\operatorname{arcsec} x + C$$.\n\nThis is harder because the $$\\sec\\theta$$ in the denominator only partially cancels with the $$dx$$ factor, leaving $$\\tan^2\\theta$$ which requires an identity to integrate.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "For the reduction formula $$I_n = \\int x^n\\cosh x \\, dx$$, two applications of integration by parts are needed to relate $$I_n$$ to $$I_{n-2}$$. Explain why two steps are needed and give the formula. (3 steps)", "answer": "- Step 1: First integration by parts: $$u = x^n$$, $$\\frac{dv}{dx} = \\cosh x$$ gives $$I_n = x^n\\sinh x - n\\int x^{n-1}\\sinh x \\, dx$$.\n- Step 2: The remaining integral $$\\int x^{n-1}\\sinh x \\, dx$$ is NOT $$I_{n-1}$$ (which would be $$\\int x^{n-1}\\cosh x \\, dx$$). Apply parts again: $$u = x^{n-1}$$, $$\\frac{dv}{dx} = \\sinh x$$ gives $$\\int x^{n-1}\\sinh x \\, dx = x^{n-1}\\cosh x - (n-1)\\int x^{n-2}\\cosh x \\, dx = x^{n-1}\\cosh x - (n-1)I_{n-2}$$.\n- Step 3: Combining: $$I_n = x^n\\sinh x - n[x^{n-1}\\cosh x - (n-1)I_{n-2}] = x^n\\sinh x - nx^{n-1}\\cosh x + n(n-1)I_{n-2}$$.\n\nTwo steps are needed because $$\\cosh$$ and $$\\sinh$$ alternate under differentiation/integration, so one step produces the \"other\" hyperbolic function, requiring a second step to return to the original type.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": true}, {"question": "A curve has equation $$y = \\frac{1}{4}(2x^2 - \\ln x)$$ for $$x > 0$$. Show that the arc length from $$x=1$$ to $$x=2$$ is $$\\frac{1}{4}(6+\\ln 2)$$. Find $$\\frac{dy}{dx}$$ and simplify $$1+\\left(\\frac{dy}{dx}\\right)^2$$. (3 steps)", "answer": "- Step 1: $$\\frac{dy}{dx} = \\frac{1}{4}(4x - \\frac{1}{x}) = x - \\frac{1}{4x}$$.\n- Step 2: $$1+\\left(\\frac{dy}{dx}\\right)^2 = 1 + x^2 - \\frac{1}{2} + \\frac{1}{16x^2} = x^2 + \\frac{1}{2} + \\frac{1}{16x^2} = \\left(x+\\frac{1}{4x}\\right)^2$$.\n- Step 3: So $$\\sqrt{1+\\left(\\frac{dy}{dx}\\right)^2} = x + \\frac{1}{4x}$$ (positive since $$x>0$$). Arc length: $$\\int_1^2 \\left(x+\\frac{1}{4x}\\right)dx = \\left[\\frac{x^2}{2}+\\frac{1}{4}\\ln x\\right]_1^2 = (2+\\frac{1}{4}\\ln 2)-( \\frac{1}{2}+0) = \\frac{3}{2}+\\frac{1}{4}\\ln 2 = \\frac{1}{4}(6+\\ln 2)$$.\n\nThe perfect-square trick again: $$\\left(x+\\frac{1}{4x}\\right)^2$$ expands to exactly $$1+\\left(\\frac{dy}{dx}\\right)^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "The surface area of a sphere of radius $$R$$ can be derived by rotating the semicircle $$y = \\sqrt{R^2-x^2}$$ about the $$x$$-axis. Set up and evaluate the integral to show $$S = 4\\pi R^2$$. (3 steps)", "answer": "- Step 1: $$\\frac{dy}{dx} = \\frac{-x}{\\sqrt{R^2-x^2}}$$, so $$1+\\left(\\frac{dy}{dx}\\right)^2 = 1+\\frac{x^2}{R^2-x^2} = \\frac{R^2}{R^2-x^2}$$, giving $$\\sqrt{1+\\left(\\frac{dy}{dx}\\right)^2} = \\frac{R}{\\sqrt{R^2-x^2}}$$.\n- Step 2: Surface area: $$S = 2\\pi\\int_{-R}^{R} \\sqrt{R^2-x^2} \\cdot \\frac{R}{\\sqrt{R^2-x^2}}dx = 2\\pi\\int_{-R}^{R} R \\, dx = 2\\pi R \\cdot 2R = 4\\pi R^2$$.\n- Step 3: The beautiful cancellation: the $$\\sqrt{R^2-x^2}$$ from $$y$$ and the $$\\frac{1}{\\sqrt{R^2-x^2}}$$ from the arc length element cancel perfectly, leaving a trivial integral.\n\nThis is one of the most elegant results in calculus — the surface area formula simplifies dramatically for a sphere.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "Misconception check: A student claims that for $$\\int \\frac{1}{\\sqrt{x^2-1}}dx$$, the answer is $$\\operatorname{arsinh} x + C$$ because \"the denominator has a square root of a sum.\" What is wrong with this reasoning? (2 steps)", "answer": "- Step 1: The denominator is $$\\sqrt{x^2-1}$$, which involves a DIFFERENCE ($$x^2$$ minus 1), not a sum. The $$\\operatorname{arsinh}$$ form applies to $$\\sqrt{x^2+1}$$ (or more generally $$\\sqrt{a^2+x^2}$$), where there is a PLUS sign.\n- Step 2: The correct identification: $$\\sqrt{x^2-1}$$ matches the form for $$\\operatorname{arcosh}$$ (result 11/15), since it's of the form $$\\sqrt{x^2-a^2}$$. The answer is $$\\operatorname{arcosh} x + C$$ (for $$x > 1$$).\n\nThe sign inside the square root is the decisive feature: plus → $$\\operatorname{arsinh}$$, minus → $$\\operatorname{arcosh}$$, and $$1-x^2$$ → $$\\arcsin$$.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": true}, {"question": "For the integral $$\\int \\frac{3x-1}{\\sqrt{x^2-2x+10}}dx$$, you need to split the numerator strategically. If you write $$3x-1 = \\frac{3}{2}(2x-2)+2$$, explain why each part integrates to a different type of result. (3 steps)", "answer": "- Step 1: Note that $$\\frac{d}{dx}(x^2-2x+10) = 2x-2$$. So writing $$3x-1 = \\frac{3}{2}(2x-2)+2$$ separates the numerator into a part proportional to the derivative of the quadratic, and a constant.\n- Step 2: The first part: $$\\int \\frac{\\frac{3}{2}(2x-2)}{\\sqrt{x^2-2x+10}}dx = \\frac{3}{2}\\int \\frac{f'(x)}{[f(x)]^{1/2}}dx = \\frac{3}{2} \\cdot 2\\sqrt{x^2-2x+10} = 3\\sqrt{x^2-2x+10}$$.\n- Step 3: The second part: $$\\int \\frac{2}{\\sqrt{x^2-2x+10}}dx$$. Complete the square: $$x^2-2x+10 = (x-1)^2+9$$. This gives the $$\\operatorname{arsinh}$$ form: $$2\\operatorname{arsinh}\\left(\\frac{x-1}{3}\\right)$$.\n\nThe strategy: express the linear numerator as $$k \\cdot f'(x) + c$$ where $$f(x)$$ is the quadratic under the square root.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": true}, {"question": "Exercise: Given $$I_n = \\int_0^1 x^n(1-x)^{1/3}dx$$, show that $$I_n = \\frac{3n}{3n+4}I_{n-1}$$. State the base case $$I_0$$ and use the formula to find $$I_1$$. (3 steps)", "answer": "- Step 1: Integration by parts with $$u = x^n$$, $$\\frac{dv}{dx} = (1-x)^{1/3}$$ gives $$v = -\\frac{3}{4}(1-x)^{4/3}$$. The boundary term vanishes. Then $$I_n = \\frac{3n}{4}\\int_0^1 x^{n-1}(1-x)^{4/3}dx = \\frac{3n}{4}\\int_0^1 x^{n-1}(1-x)^{1/3}(1-x)dx = \\frac{3n}{4}I_{n-1} - \\frac{3n}{4}I_n$$. Solving: $$(1+\\frac{3n}{4})I_n = \\frac{3n}{4}I_{n-1}$$, so $$I_n = \\frac{3n}{3n+4}I_{n-1}$$.\n- Step 2: Base case: $$I_0 = \\int_0^1 (1-x)^{1/3}dx = \\left[-\\frac{3}{4}(1-x)^{4/3}\\right]_0^1 = 0 - (-\\frac{3}{4}) = \\frac{3}{4}$$.\n- Step 3: $$I_1 = \\frac{3(1)}{3(1)+4}I_0 = \\frac{3}{7} \\cdot \\frac{3}{4} = \\frac{9}{28}$$.\n\nThe reduction formula involves the same \"collect $$I_n$$ on both sides\" trick seen in Q26.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "For the Wallis-type integral $$I_n = \\int_0^{\\pi/2}\\sin^n x \\, dx$$, evaluate $$I_5$$ and $$I_6$$ using the reduction formula $$nI_n = (n-1)I_{n-2}$$. (3 steps)", "answer": "- Step 1: For $$I_5$$ (odd): $$I_5 = \\frac{4}{5}I_3 = \\frac{4}{5}\\cdot\\frac{2}{3}I_1 = \\frac{4}{5}\\cdot\\frac{2}{3}\\cdot 1 = \\frac{8}{15}$$.\n- Step 2: For $$I_6$$ (even): $$I_6 = \\frac{5}{6}I_4 = \\frac{5}{6}\\cdot\\frac{3}{4}I_2 = \\frac{5}{6}\\cdot\\frac{3}{4}\\cdot\\frac{1}{2}I_0 = \\frac{5}{6}\\cdot\\frac{3}{4}\\cdot\\frac{1}{2}\\cdot\\frac{\\pi}{2} = \\frac{5\\pi}{32}$$.\n- Step 3: The pattern: odd $$n$$ terminates at $$I_1 = 1$$ (rational answer), even $$n$$ terminates at $$I_0 = \\frac{\\pi}{2}$$ (answer involves $$\\pi$$).\n\nThis is the Wallis integral — a beautiful result with deep connections to probability and the gamma function.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "The Cornu spiral has parametric equations $$x = \\int_0^t \\cos\\left(\\frac{\\pi u^2}{2}\\right)du$$, $$y = \\int_0^t \\sin\\left(\\frac{\\pi u^2}{2}\\right)du$$. Find the length of this spiral from $$t=0$$ to $$t=a$$. (2 steps)", "answer": "- Step 1: By the Fundamental Theorem of Calculus, $$\\frac{dx}{dt} = \\cos\\left(\\frac{\\pi t^2}{2}\\right)$$ and $$\\frac{dy}{dt} = \\sin\\left(\\frac{\\pi t^2}{2}\\right)$$.\n- Step 2: $$\\left(\\frac{dx}{dt}\\right)^2+\\left(\\frac{dy}{dt}\\right)^2 = \\cos^2\\left(\\frac{\\pi t^2}{2}\\right)+\\sin^2\\left(\\frac{\\pi t^2}{2}\\right) = 1$$. So arc length $$= \\int_0^a \\sqrt{1} \\, dt = a$$.\n\nThe Cornu spiral has the remarkable property that its arc length equals the parameter $$t$$ — the speed along the curve is always 1.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": true}, {"question": "Edge case: What happens to the arc length integral $$s = \\int_{x_A}^{x_B}\\sqrt{1+\\left(\\frac{dy}{dx}\\right)^2}dx$$ when the curve is a straight line $$y = mx + c$$? Verify the result geometrically. (2 steps)", "answer": "- Step 1: For $$y = mx+c$$: $$\\frac{dy}{dx} = m$$, so $$\\sqrt{1+m^2}$$ is a constant. The arc length is $$\\int_{x_A}^{x_B}\\sqrt{1+m^2}dx = \\sqrt{1+m^2}(x_B-x_A)$$.\n- Step 2: Geometrically, for a straight line from $$(x_A, y_A)$$ to $$(x_B, y_B)$$, the length is $$\\sqrt{(\\Delta x)^2+(\\Delta y)^2} = \\sqrt{(x_B-x_A)^2 + m^2(x_B-x_A)^2} = (x_B-x_A)\\sqrt{1+m^2}$$. The results match.\n\nThe arc length formula correctly reduces to the Pythagorean distance for straight lines — a good sanity check.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": true}, {"question": "Torricelli's Trumpet is the solid formed by rotating $$y = \\frac{1}{x}$$ (for $$x \\geq 1$$) about the $$x$$-axis. The volume is finite ($$\\pi$$), but the surface area is infinite. Explain intuitively why the surface area diverges. (2 steps)", "answer": "- Step 1: The surface area integral is $$2\\pi\\int_1^{\\infty} \\frac{1}{x}\\sqrt{1+\\frac{1}{x^4}}dx$$. For large $$x$$, $$\\sqrt{1+\\frac{1}{x^4}} \\approx 1$$, so the integrand behaves like $$\\frac{1}{x}$$.\n- Step 2: The integral $$\\int_1^{\\infty}\\frac{1}{x}dx$$ diverges (it's the harmonic series equivalent). More precisely, for all $$x > 0$$: $$\\frac{1}{x}\\sqrt{1+\\frac{1}{x^4}} > \\frac{1}{x}$$, so the surface area integral is bounded below by a divergent integral, hence it also diverges.\n\nThis is the famous \"painter's paradox\": you can fill the trumpet with a finite amount of paint, but you can't paint its surface with a finite amount.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": true}, {"question": "Exercise: Show that $$\\int \\frac{1}{2\\cosh x - \\sinh x}dx$$ can be rewritten as $$\\int \\frac{2e^x}{e^{2x}+3}dx$$. Then use $$u = e^x$$ to find the integral. (3 steps)", "answer": "- Step 1: Express in exponentials: $$2\\cosh x - \\sinh x = 2\\cdot\\frac{e^x+e^{-x}}{2} - \\frac{e^x-e^{-x}}{2} = \\frac{2e^x+2e^{-x}-e^x+e^{-x}}{2} = \\frac{e^x+3e^{-x}}{2}$$. So $$\\frac{1}{2\\cosh x - \\sinh x} = \\frac{2}{e^x+3e^{-x}} = \\frac{2e^x}{e^{2x}+3}$$.\n- Step 2: Let $$u = e^x$$, $$du = e^x dx$$: $$\\int \\frac{2}{u^2+3}du = \\frac{2}{3}\\int \\frac{1}{(u/\\sqrt{3})^2+1}du = \\frac{2}{3}\\cdot\\frac{1}{1/\\sqrt{3}}\\arctan\\left(\\frac{u}{\\sqrt{3}}\\right) + C = \\frac{2}{\\sqrt{3}}\\arctan\\left(\\frac{e^x}{\\sqrt{3}}\\right) + C$$.\n- Step 3: Back-substitute: $$\\frac{2}{\\sqrt{3}}\\arctan\\left(\\frac{e^x}{\\sqrt{3}}\\right) + C$$.\n\nConverting hyperbolic expressions to exponentials often reveals arctan-type integrals after substitution.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "When deriving the reduction formula for $$I_n = \\int \\frac{\\sin^{2n}x}{\\cos x}dx$$, the relation $$I_n - I_{n+1} = \\frac{\\sin^{2n+1}x}{2n+1}$$ is obtained. Explain the strategy: why relate $$I_n$$ to $$I_{n+1}$$ (going UP) instead of $$I_{n-1}$$ (going DOWN)? (2 steps)", "answer": "- Step 1: The relation $$I_n - I_{n+1} = \\frac{\\sin^{2n+1}x}{2n+1}$$ allows us to express $$I_n = I_{n+1} + \\frac{\\sin^{2n+1}x}{2n+1}$$. Since $$I_{n+1}$$ has a HIGHER power of $$\\sin$$ in the numerator (and thus the denominator $$\\cos x$$ is \"less cancelled\"), we work downward from a known starting point.\n- Step 2: The base case is $$I_0 = \\int \\frac{1}{\\cos x}dx = \\int \\sec x \\, dx = \\ln|\\sec x + \\tan x| + C$$. Then $$I_1 = I_0 - \\sin x$$, $$I_2 = I_1 - \\frac{\\sin^3 x}{3}$$, etc. We telescope downward from $$I_0$$.\n\nGoing \"up\" in the recurrence and then telescoping down from a known base case is an alternative strategy to the usual \"reduce $$n$$\" approach.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": true}, {"question": "For $$I_n = \\int_0^a (a^2-x^2)^n dx$$ with $$a > 0$$, the reduction formula is $$I_n = \\frac{2na^2}{2n+1}I_{n-1}$$. Use this to evaluate $$\\int_0^2\\sqrt{4-x^2}dx$$ and verify by another method. (3 steps)", "answer": "- Step 1: Here $$a = 2$$, $$n = 1$$: $$I_1 = \\frac{2(1)(4)}{2(1)+1}I_0 = \\frac{8}{3}I_0$$. And $$I_0 = \\int_0^2 1 \\, dx = 2$$. So $$I_1 = \\frac{16}{3}$$.\n- Step 2: Verification by geometry: $$\\int_0^2\\sqrt{4-x^2}dx$$ is the area of a quarter-circle of radius 2, which is $$\\frac{1}{4}\\pi(4) = \\pi$$. But wait — $$\\frac{16}{3} \\neq \\pi$$!\n- Step 3: The discrepancy arises because the reduction formula gives the INDEFINITE-like result, but let me recheck. Actually $$I_1 = \\int_0^2 (4-x^2)dx = [4x-\\frac{x^3}{3}]_0^2 = 8-\\frac{8}{3} = \\frac{16}{3}$$. But $$\\sqrt{4-x^2} \\neq (4-x^2)$$! For $$n = \\frac{1}{2}$$: the formula gives $$I_{1/2} = \\frac{2(\\frac{1}{2})(4)}{2(\\frac{1}{2})+1}I_{-1/2} = \\frac{4}{2}I_{-1/2} = 2I_{-1/2}$$, which doesn't terminate cleanly. The formula requires integer $$n$$. For the quarter-circle, use the direct substitution $$x = 2\\sin\\theta$$ instead, giving $$\\pi$$.\n\nThe reduction formula only works for INTEGER $$n$$. For half-integer powers (like square roots), use a trigonometric substitution directly.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": false}, {"question": "Show that the area of an ellipse $$\\frac{x^2}{a^2}+\\frac{y^2}{b^2}=1$$ is $$\\pi ab$$ by using the integral $$\\int_{-a}^a \\sqrt{a^2-x^2}dx$$ and a suitable substitution. (3 steps)", "answer": "- Step 1: By symmetry, the area is $$4\\int_0^a b\\sqrt{1-\\frac{x^2}{a^2}}dx = 4b\\int_0^a \\sqrt{\\frac{a^2-x^2}{a^2}}dx = \\frac{4b}{a}\\int_0^a\\sqrt{a^2-x^2}dx$$.\n- Step 2: Let $$x = a\\sin\\theta$$: $$\\sqrt{a^2-x^2} = a\\cos\\theta$$, $$dx = a\\cos\\theta \\, d\\theta$$, limits $$0$$ to $$\\frac{\\pi}{2}$$. The integral: $$\\frac{4b}{a}\\int_0^{\\pi/2} a\\cos\\theta \\cdot a\\cos\\theta \\, d\\theta = 4ab\\int_0^{\\pi/2}\\cos^2\\theta \\, d\\theta = 4ab \\cdot \\frac{\\pi}{4} = \\pi ab$$.\n- Step 3: Using the Wallis result $$\\int_0^{\\pi/2}\\cos^2\\theta \\, d\\theta = \\frac{\\pi}{4}$$ (from $$I_2$$ with the cos version of the reduction formula).\n\nWhen $$a = b = r$$, this reduces to $$\\pi r^2$$ — the circle area, as expected.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}], "count": 58}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When integrating hyperbolic functions, what is $\\int \\operatorname{sech}^2 x \\mathrm{~d} x$, and how does it contrast with $\\int \\tanh x \\mathrm{~d} x$?", "answer": "- Step 1: Recognize that $\\frac{\\mathrm{d}}{\\mathrm{d}x}(\\tanh x) = \\operatorname{sech}^2 x$. Reversing this gives $$\\int \\operatorname{sech}^2 x \\mathrm{~d} x = \\tanh x + C$$.\n- Step 2: For $\\int \\tanh x \\mathrm{~d} x$, express it as $\\int \\frac{\\sinh x}{\\cosh x} \\mathrm{~d} x$.\n- Step 3: This is of the form $\\int \\frac{\\mathrm{f}'(x)}{\\mathrm{f}(x)} \\mathrm{d} x$, yielding $\\ln|\\cosh x| + C$. Since $\\cosh x > 0$ for all $x$, this simplifies to $\\ln(\\cosh x) + C$.\n+ The contrast: $\\operatorname{sech}^2 x$ integrates to a hyperbolic function ($\\tanh x$), whereas $\\tanh x$ integrates to a logarithmic form ($\\ln \\cosh x$).", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Why do the integrals of $\\operatorname{sech} x \\tanh x$ and $\\operatorname{cosech} x \\operatorname{coth} x$ yield negative results, unlike their trigonometric counterparts $\\sec x \\tan x$ and $\\operatorname{cosec} x \\cot x$? (2 steps)", "answer": "- Step 1: Look at the derivatives. Differentiating $\\operatorname{sech} x$ involves the chain rule on $$(\\cosh x)^{-1}$$, giving $$-1(\\cosh x)^{-2}(\\sinh x) = -\\operatorname{sech} x \\tanh x$$. The negative sign comes from the power rule on a reciprocal.\n- Step 2: Similarly, $$\\frac{\\mathrm{d}}{\\mathrm{d}x}(\\operatorname{cosech} x) = -1(\\sinh x)^{-2}(\\cosh x) = -\\operatorname{cosech} x \\operatorname{coth} x$$. Because the derivatives are negative, integrating the positive products must yield negative results to be consistent (e.g., $$\\int \\operatorname{sech} x \\tanh x \\mathrm{~d} x = -\\operatorname{sech} x + C$$). Trigonometric counterparts lack this specific negative sign in their derivatives.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "When faced with $$\\int \\frac{x}{1+x^{2}} \\mathrm{~d} x$$, a common mistake is to jump to $\\arctan x$. Why is this incorrect, and what is the correct conceptual approach? (2 steps)", "answer": "- Step 1: The $\\arctan x$ standard form requires the numerator to be a constant (1), as in $$\\int \\frac{1}{1+x^{2}} \\mathrm{~d} x$$. The presence of $x$ in the numerator changes the structure entirely.\n- Step 2: Notice that the numerator $x$ is proportional to the derivative of the denominator $$1+x^2$$ (whose derivative is $2x$). This perfectly matches the reverse chain rule form $$\\int \\frac{\\mathrm{f}'(x)}{\\mathrm{f}(x)} \\mathrm{d} x = \\ln|\\mathrm{f}(x)| + C$$.\n+ Correct result: $$\\frac{1}{2} \\ln(1+x^2) + C$$.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "How do you integrate $$\\int \\cosh^{5} 2x \\sinh 2x \\mathrm{~d} x$$ using the reverse chain rule? (2 steps)", "answer": "- Step 1: Identify the structure. The integral is of the form $$\\int [\\mathrm{f}(x)]^n \\mathrm{f}'(x) \\mathrm{d} x$$, where $$\\mathrm{f}(x) = \\cosh 2x$$ (so $$\\mathrm{f}'(x) = 2\\sinh 2x$$) and $n=5$. Adjust the constant to match the derivative exactly: $$\\int \\cosh^{5} 2x \\sinh 2x \\mathrm{~d} x = \\frac{1}{2} \\int (\\cosh 2x)^5 (2\\sinh 2x) \\mathrm{d} x$$.\n- Step 2: Apply the standard reverse chain rule result $$\\int [\\mathrm{f}(x)]^n \\mathrm{f}'(x) \\mathrm{d} x = \\frac{[\\mathrm{f}(x)]^{n+1}}{n+1} + C$$.\n+ Result: $$\\frac{1}{2} \\frac{\\cosh^6 2x}{6} + C = \\frac{1}{12} \\cosh^6 2x + C$$.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "To integrate $\\int \\cosh^2 3x \\mathrm{~d} x$, what identity must you use, and why is it analogous to integrating $\\cos^2 3x$? (3 steps)", "answer": "- Step 1: You cannot integrate $\\cosh^2 3x$ directly. Just as $\\cos^2 A$ requires the double angle identity, $\\cosh^2 A$ requires its hyperbolic counterpart.\n- Step 2: Use the identity $$\\cosh 2A = 2\\cosh^2 A - 1$$, rearranged to $$\\cosh^2 A = \\frac{1 + \\cosh 2A}{2}$$. Substitute $A = 3x$ to get $$\\cosh^2 3x = \\frac{1 + \\cosh 6x}{2}$$.\n- Step 3: The integral becomes $$\\frac{1}{2} \\int (1 + \\cosh 6x) \\mathrm{d} x = \\frac{1}{2}x + \\frac{1}{12}\\sinh 6x + C$$. The analogy holds because the double angle identities for cos/cosh share the same structural relationship, just with a sign change for $\\cos$.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "When integrating $$\\int \\mathrm{e}^{ax} \\sinh ax \\mathrm{~d} x$$, why does the standard integration by parts method break down, and what alternative approach succeeds? (3 steps)", "answer": "- Step 1: If you use integration by parts twice, the second application brings back the original integral. You get $$I = \\text{expression} - a^2 I$$. If $a=1$, this yields $$I = \\text{expression} - I$$, which simplifies to $$2I = \\text{expression}$$. However, if you check the algebra, the \"expression\" actually evaluates to a constant (e.g., $-1$), giving a tautology like $0 = -1$ rather than solving for $I$. The method fails to isolate $I$.\n- Step 2: The breakdown occurs because $e^{ax}$ and the exponential components of $\\sinh ax$ combine in a way that IBP cannot disentangle.\n- Step 3: Instead, convert $\\sinh ax$ to its exponential definition: $$\\sinh ax = \\frac{e^{ax} - e^{-ax}}{2}$$. The integral becomes $$\\int e^{ax} \\left(\\frac{e^{ax} - e^{-ax}}{2}\\right) \\mathrm{d} x = \\frac{1}{2} \\int (e^{2ax} - 1) \\mathrm{d} x$$, which is trivial to integrate.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "How do you integrate $\\int \\operatorname{sech} x \\mathrm{~d} x$ using an exponential substitution? (4 steps)", "answer": "- Step 1: Multiply the numerator and denominator by $e^x$ to create an exponential-heavy denominator: $$\\int \\frac{2}{e^x + e^{-x}} \\mathrm{~d} x = \\int \\frac{2e^x}{e^{2x} + 1} \\mathrm{~d} x$$.\n- Step 2: Use the substitution $u = e^x$, so $$\\mathrm{d}u = e^x \\mathrm{d} x$$. The integral transforms to $$\\int \\frac{2}{u^2 + 1} \\mathrm{d} u$$.\n- Step 3: Recognize this as the standard $\\arctan$ form (Result 9): $$\\int \\frac{1}{u^2+1} \\mathrm{d}u = \\arctan u + C$$.\n- Step 4: Apply the constant and substitute back: $$2 \\arctan u + C = 2 \\arctan(e^x) + C$$.\n+ Note: Do not confuse this with $\\int \\sec x \\mathrm{~d} x = \\ln|\\sec x + \\tan x| + C$; the hyperbolic version requires a different approach.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "What substitution simplifies an integral involving $\\sqrt{1-x^2}$, and what identity makes it work? (2 steps)", "answer": "- Step 1: Use the substitution $$x = \\sin \\theta$$ (or $x = \\tanh u$). For the trigonometric route, this implies $$\\mathrm{d}x = \\cos \\theta \\mathrm{d}\\theta$$.\n- Step 2: The expression under the square root becomes $$1 - \\sin^2 \\theta = \\cos^2 \\theta$$. Taking the square root yields $\\cos \\theta$, collapsing the two-term square root into a single term. This dramatically simplifies the integral, often reducing it to a basic trigonometric integral.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "If an integral contains $\\sqrt{x^2-1}$, what two substitutions could you use, and which is generally preferred? (2 steps)", "answer": "- Step 1: You could use $x = \\sec \\theta$ (since $$\\sec^2 \\theta - 1 = \\tan^2 \\theta$$) or $x = \\cosh u$ (since $$\\cosh^2 u - 1 = \\sinh^2 u$$).\n- Step 2: The hyperbolic substitution $x = \\cosh u$ is generally preferred. While both collapse the square root into a single term, hyperbolic identities often avoid the absolute value ambiguities (like $|\\tan \\theta|$) that arise with trigonometric substitutions in different quadrants, making the integration smoother.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "Derive the general result $$\\int \\frac{1}{\\sqrt{x^2-a^2}} \\mathrm{~d} x = \\operatorname{arcosh}\\left(\\frac{x}{a}\\right) + C$$ for $x > a$ using a hyperbolic substitution. (4 steps)", "answer": "- Step 1: Choose the substitution $$x = a \\cosh u$$, which implies $$\\frac{\\mathrm{d}x}{\\mathrm{d}u} = a \\sinh u$$, so $$\\mathrm{d}x = a \\sinh u \\mathrm{d}u$$.\n- Step 2: Substitute into the denominator: $$\\sqrt{x^2 - a^2} = \\sqrt{a^2 \\cosh^2 u - a^2} = \\sqrt{a^2 \\sinh^2 u} = a \\sinh u$$ (since $\\sinh u > 0$ for $u > 0$).\n- Step 3: The integral simplifies beautifully: $$\\int \\frac{1}{a \\sinh u} (a \\sinh u) \\mathrm{d}u = \\int 1 \\mathrm{d}u = u + C$$.\n- Step 4: Reverse the substitution. Since $$x = a \\cosh u$$, we have $$\\cosh u = \\frac{x}{a}$$, which means $$u = \\operatorname{arcosh}\\left(\\frac{x}{a}\\right)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "What is the essential first algebraic step when integrating $$\\int \\frac{1}{px^2+qx+r} \\mathrm{~d} x$$ before matching it to a standard form like $\\arctan$ or $\\ln$? (2 steps)", "answer": "- Step 1: You must complete the square on the quadratic denominator. Factor out $p$ to get $$p(x^2 + \\frac{q}{p}x + \\frac{r}{p})$$, then complete the square inside the brackets.\n- Step 2: This transforms the denominator into the form $$p((x+\\alpha)^2 \\pm \\beta^2)$$, allowing a simple linear substitution (like $u = x+\\alpha$) to reduce it to one of the standard forms (Results 12-17).", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "Given $$\\int \\frac{1}{\\sqrt{-x^2+4x}} \\mathrm{~d} x$$, how does completing the square reveal the correct standard form? (3 steps)", "answer": "- Step 1: Factor out the negative sign: $$-x^2 + 4x = -(x^2 - 4x)$$.\n- Step 2: Complete the square inside: $$-( (x-2)^2 - 4 ) = 4 - (x-2)^2$$.\n- Step 3: The integral becomes $$\\int \\frac{1}{\\sqrt{4 - (x-2)^2}} \\mathrm{~d} x$$. With the substitution $u = x-2$, this perfectly matches the standard form $$\\int \\frac{1}{\\sqrt{a^2 - u^2}} \\mathrm{~d} u = \\arcsin(\\frac{u}{a}) + C$$ (with $a=2$).", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "To integrate a single inverse function like $\\int \\operatorname{arsinh} x \\mathrm{~d} x$, what algebraic trick do you use to set up integration by parts? (2 steps)", "answer": "- Step 1: Write the integral as $$\\int \\operatorname{arsinh} x \\times 1 \\mathrm{~d} x$$. This allows you to use integration by parts.\n- Step 2: Choose $u = \\operatorname{arsinh} x$ and $$\\frac{\\mathrm{d}v}{\\mathrm{d}x} = 1$$. This works because the derivative of an inverse function yields a simple algebraic fraction ($$\\frac{1}{\\sqrt{1+x^2}}$$), while integrating 1 just gives $x$, making the remaining integral tractable.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "When setting up integration by parts for $\\int \\arctan x \\mathrm{~d} x$, what are the correct choices for $u$ and $\\frac{\\mathrm{d}v}{\\mathrm{d}x}$, and why? (2 steps)", "answer": "- Step 1: Let $u = \\arctan x$ and $$\\frac{\\mathrm{d}v}{\\mathrm{d}x} = 1$$.\n- Step 2: This choice is mandatory because differentiating $u$ gives $$\\frac{\\mathrm{d}u}{\\mathrm{d}x} = \\frac{1}{1+x^2}$$, which simplifies the problem. If you tried $u=1$ and $v=\\arctan x$, you would have to integrate $\\arctan x$ to find $v$, which is the very problem you are trying to solve.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "What is the fundamental purpose of a reduction formula in integration? (2 steps)", "answer": "- Step 1: A reduction formula relates an integral involving a power $n$ (denoted $I_n$) to the same integral with a lower power (usually $I_{n-1}$ or $I_{n-2}$).\n- Step 2: By repeatedly applying this recursive relationship, the original complex integral $I_n$ is \"reduced\" step-by-step until it reaches a base case (like $I_0$ or $I_1$) that is a simple, directly solvable standard integral.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "Derive the reduction formula for $$I_n = \\int x^n \\mathrm{e}^{x} \\mathrm{~d} x$$. (4 steps)", "answer": "- Step 1: Set up integration by parts. Let $u = x^n$ and $$\\frac{\\mathrm{d}v}{\\mathrm{d}x} = \\mathrm{e}^x$$.\n- Step 2: Compute derivatives and integrals: $$\\frac{\\mathrm{d}u}{\\mathrm{d}x} = nx^{n-1}$$ and $v = \\mathrm{e}^x$.\n- Step 3: Apply the IBP formula: $$I_n = x^n \\mathrm{e}^x - \\int \\mathrm{e}^x (nx^{n-1}) \\mathrm{d}x$$.\n- Step 4: Factor out the constant $n$ and recognize the remaining integral as $I_{n-1}$: $$I_n = x^n \\mathrm{e}^x - n I_{n-1}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "For $$I_n = \\int \\tan^n x \\mathrm{~d} x$$, how can you derive a reduction formula without using integration by parts? (3 steps)", "answer": "- Step 1: Split off two powers of $\\tan x$ by writing $$\\tan^n x = \\tan^{n-2} x \\tan^2 x$$.\n- Step 2: Use the identity $$\\tan^2 x = \\sec^2 x - 1$$ to rewrite the integral as $$\\int \\tan^{n-2} x (\\sec^2 x - 1) \\mathrm{d} x = \\int \\tan^{n-2} x \\sec^2 x \\mathrm{d} x - \\int \\tan^{n-2} x \\mathrm{d} x$$.\n- Step 3: The first integral is of the form $$\\int [\\mathrm{f}(x)]^m \\mathrm{f}'(x) \\mathrm{d} x$$ (with $\\mathrm{f}(x) = \\tan x$), giving $$\\frac{\\tan^{n-1} x}{n-1}$$. The second integral is simply $I_{n-2}$. So, $$I_n = \\frac{1}{n-1} \\tan^{n-1} x - I_{n-2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "For the Wallis integral $$I_n = \\int_{0}^{\\frac{\\pi}{2}} \\sin^n x \\mathrm{~d} x$$, the reduction formula is $$n I_n = (n-1) I_{n-2}$$. How does the parity (odd/even) of $n$ determine the final base case? (3 steps)", "answer": "- Step 1: The formula reduces $n$ by 2 each time, meaning odd $n$ will eventually reach $I_1$, and even $n$ will reach $I_0$.\n- Step 2: If $n$ is odd, the chain terminates at $$I_1 = \\int_{0}^{\\frac{\\pi}{2}} \\sin x \\mathrm{~d} x = 1$$.\n- Step 3: If $n$ is even, the chain terminates at $$I_0 = \\int_{0}^{\\frac{\\pi}{2}} 1 \\mathrm{~d} x = \\frac{\\pi}{2}$$. The final answer will contain $\\pi$ if and only if $n$ is even.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "Derive the Cartesian arc length formula $$s = \\int \\sqrt{1 + \\left(\\frac{\\mathrm{d}y}{\\mathrm{d}x}\\right)^2} \\mathrm{~d} x$$ from first principles. (4 steps)", "answer": "- Step 1: Approximate a small arc length $\\delta s$ by a straight chord. By Pythagoras, $$(\\delta s)^2 \\approx (\\delta x)^2 + (\\delta y)^2$$.\n- Step 2: Divide by $$(\\delta x)^2$$ to get $$\\left(\\frac{\\delta s}{\\delta x}\\right)^2 \\approx 1 + \\left(\\frac{\\delta y}{\\delta x}\\right)^2$$.\n- Step 3: Take the limit as $\\delta x \\to 0$. The approximations become exact derivatives: $$\\left(\\frac{\\mathrm{d}s}{\\mathrm{d}x}\\right)^2 = 1 + \\left(\\frac{\\mathrm{d}y}{\\mathrm{d}x}\\right)^2$$.\n- Step 4: Take the positive square root (since arc length increases with $x$) and integrate with respect to $x$ to find the total length $s$.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "How is the arc length formula modified for a curve defined by parametric equations $x = \\mathrm{f}(t), y = \\mathrm{g}(t)$? (2 steps)", "answer": "- Step 1: Start from the differential relationship $$(\\mathrm{d}s)^2 = (\\mathrm{d}x)^2 + (\\mathrm{d}y)^2$$. Divide by $$(\\mathrm{d}t)^2$$ to get $$\\left(\\frac{\\mathrm{d}s}{\\mathrm{d}t}\\right)^2 = \\left(\\frac{\\mathrm{d}x}{\\mathrm{d}t}\\right)^2 + \\left(\\frac{\\mathrm{d}y}{\\mathrm{d}t}\\right)^2$$.\n- Step 2: Take the square root and integrate with respect to the parameter $t$: $$s = \\int_{t_A}^{t_B} \\sqrt{\\left(\\frac{\\mathrm{d}x}{\\mathrm{d}t}\\right)^2 + \\left(\\frac{\\mathrm{d}y}{\\mathrm{d}t}\\right)^2} \\mathrm{~d} t$$.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "Derive the surface area of revolution formula $S = \\int 2\\pi y \\mathrm{~d}s$ for rotation about the x-axis, starting from the surface area of a frustum. (4 steps)", "answer": "- Step 1: A small arc $\\delta s$ rotated about the x-axis generates a frustum of a cone. The surface area of a frustum is $$\\pi(r_1 + r_2) \\times \\text{slant height}$$. Here, radii are $y$ and $y+\\delta y$, and slant height is $\\delta s$.\n- Step 2: The area is $$\\delta S \\approx \\pi(y + y + \\delta y)\\delta s = \\pi(2y + \\delta y)\\delta s$$.\n- Step 3: As $\\delta y \\to 0$, the $\\delta y$ term becomes negligible, so $$\\delta S \\approx 2\\pi y \\delta s$$.\n- Step 4: Summing these infinitesimal areas gives the integral $$S = \\int 2\\pi y \\mathrm{~d} s$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "If a curve is rotated about the y-axis, what is the surface area formula in terms of $\\mathrm{d}s$, and what is its Cartesian equivalent? (2 steps)", "answer": "- Step 1: By symmetry, rotating about the y-axis means the radius of the frustum is $x$ instead of $y$. Therefore, the formula in terms of arc length is $$S = \\int 2\\pi x \\mathrm{~d} s$$.\n- Step 2: Substituting $$\\mathrm{d}s = \\sqrt{1 + \\left(\\frac{\\mathrm{d}y}{\\mathrm{d}x}\\right)^2} \\mathrm{d} x$$ gives the Cartesian form: $$S = 2\\pi \\int_{x_A}^{x_B} x \\sqrt{1 + \\left(\\frac{\\mathrm{d}y}{\\mathrm{d}x}\\right)^2} \\mathrm{~d} x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "(Exercise 4.1) Evaluate $$\\int \\frac{2x}{1+x^2} \\mathrm{~d} x$$ mentally.", "answer": "- Step 1: Observe that the numerator $2x$ is exactly the derivative of the denominator $$1+x^2$$.\n- Step 2: Apply the standard logarithm rule $$\\int \\frac{\\mathrm{f}'(x)}{\\mathrm{f}(x)} \\mathrm{d} x = \\ln|\\mathrm{f}(x)| + C$$.\n- Step 3: The result is $$\\ln(1+x^2) + C$$ (no absolute value needed as $$1+x^2 > 0$$).", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "(Exercise 4.3) Identify the correct substitution for $$\\int \\frac{1}{\\sqrt{4-x^2}} \\mathrm{~d} x$$.", "answer": "- Step 1: The integral is of the form $$\\int \\frac{1}{\\sqrt{a^2 - x^2}} \\mathrm{~d} x$$ with $a=2$.\n- Step 2: The appropriate substitution to collapse the square root is $x = a \\sin \\theta$.\n- Step 3: Therefore, use $x = 2 \\sin \\theta$.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "(Exercise 4.4) Complete the square for the expression $$x^2 - 6x + 10$$.", "answer": "- Step 1: Group the $x$ terms: $$(x^2 - 6x) + 10$$.\n- Step 2: To complete the square, take half of the coefficient of $x$ (-6), square it (9), and add/subtract it inside the bracket: $$((x-3)^2 - 9) + 10$$.\n- Step 3: Simplify the constants to get the final form: $$(x-3)^2 + 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "(Exercise 4.5) Set up the integration by parts for $\\int \\arctan x \\mathrm{~d} x$ by writing down the choices for $u$ and $\\frac{\\mathrm{d}v}{\\mathrm{d}x}$.", "answer": "- Step 1: To integrate an inverse function, rewrite the integral as $$\\int \\arctan x \\times 1 \\mathrm{~d} x$$.\n- Step 2: Choose the inverse function as the part to differentiate: $u = \\arctan x$.\n- Step 3: Choose the constant 1 as the part to integrate: $$\\frac{\\mathrm{d}v}{\\mathrm{d}x} = 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "(Exercise 4.6) Given the reduction formula $$I_n = \\frac{n-1}{n} I_{n-2}$$ and that $$I_0 = \\frac{\\pi}{2}$$, find $I_4$.", "answer": "- Step 1: Apply the formula for $n=4$: $$I_4 = \\frac{3}{4} I_2$$.\n- Step 2: Apply the formula for $n=2$: $$I_2 = \\frac{1}{2} I_0$$.\n- Step 3: Substitute the base case: $$I_2 = \\frac{1}{2} \\left(\\frac{\\pi}{2}\\right) = \\frac{\\pi}{4}$$.\n- Step 4: Find $I_4$: $$I_4 = \\frac{3}{4} \\left(\\frac{\\pi}{4}\\right) = \\frac{3\\pi}{16}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "(Exercise 4.7) Set up the arc length integral for the curve $y = x^2$ from $x=0$ to $x=1$.", "answer": "- Step 1: Calculate the derivative: $$\\frac{\\mathrm{d}y}{\\mathrm{d}x} = 2x$$.\n- Step 2: Substitute into the arc length formula $$s = \\int_{0}^{1} \\sqrt{1 + \\left(\\frac{\\mathrm{d}y}{\\mathrm{d}x}\\right)^2} \\mathrm{~d} x$$.\n- Step 3: The integral to evaluate is $$\\int_{0}^{1} \\sqrt{1 + 4x^2} \\mathrm{~d} x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "(Exercise 4.8) Set up the surface area integral for the curve $y = x$ from $x=0$ to $x=1$ rotated completely about the x-axis.", "answer": "- Step 1: Calculate the derivative: $$\\frac{\\mathrm{d}y}{\\mathrm{d}x} = 1$$.\n- Step 2: Substitute into the surface area formula $$S = 2\\pi \\int_{0}^{1} y \\sqrt{1 + \\left(\\frac{\\mathrm{d}y}{\\mathrm{d}x}\\right)^2} \\mathrm{~d} x$$.\n- Step 3: The integral is $$2\\pi \\int_{0}^{1} x \\sqrt{1 + 1} \\mathrm{~d} x = 2\\sqrt{2}\\pi \\int_{0}^{1} x \\mathrm{~d} x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}], "count": 29}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why does ∫sechx dx require a substitution (like x = tanθ or u = e^x) instead of direct analogy to ∫secx dx? Derive ∫sechx dx using u = e^x. (3 steps)", "answer": "- Step 1: Recognize that ∫sechx dx = ∫2/(e^x + e^{-x}) dx, which doesn't directly correspond to standard forms.\n- Step 2: Substitute u = e^x → du = e^x dx → dx = du/u.\n- Step 3: Integral becomes ∫2/(u² + 1) du = 2 arctan(e^x) + C.  \n**Derivation Insight:** Unlike ∫secx dx, which uses secx(secx + tanx), hyperbolic identities don't simplify sechx as neatly, necessitating substitution.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Compare integrating √(x² + a²)dx using hyperbolic vs trigonometric substitution. Why is hyperbolic substitution often preferred? (3 steps)", "answer": "- Step 1: Trig substitution x = atanθ → √(x² + a²) = asecθ → integral becomes a²∫sec³θ dθ (requires integration by parts).\n- Step 2: Hyperbolic substitution x = asinhu → √(x² + a²) = acoshu → integral simplifies to a²∫cosh²u du.\n- Step 3: Hyperbolic identity cosh²u = (cosh2u + 1)/2 makes integration straightforward, avoiding sec³θ complexity.  \n**Key Insight:** Hyperbolic functions often simplify integrands more elegantly for √(x² ± a²).", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "Derive ∫√(x² - a²)dx = (x/2)√(x² - a²) - (a²/2)arcosh(x/a) + C using substitution. (4 steps)", "answer": "- Step 1: Let x = acoshu → dx = asinhu du → √(x² - a²) = asinhu.\n- Step 2: Integral becomes ∫(asinh u)(asinh u du) = a²∫sinh²u du.\n- Step 3: Use identity sinh²u = (cosh2u - 1)/2 → a²/2 ∫(cosh2u - 1) du = a²/4 sinh2u - a²u/2 + C.\n- Step 4: Substitute back u = arcosh(x/a), sinh2u = 2sinhucoshu = 2(x/a)√(x² - a²)/a → Final expression.  \n**Derivation Insight:** The hyperbolic substitution leverages sinh²u identity to linearize the integrand.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why can ∫tanhⁿx dx use a reduction formula involving tanh^{n-1}x? Derive the formula for n ≥ 2. (3 steps)", "answer": "- Step 1: Write tanhⁿx = tanh^{n-2}x · tanh²x = tanh^{n-2}x(1 - sech²x).\n- Step 2: Split integral: ∫tanh^{n-2}x dx - ∫tanh^{n-2}x sech²x dx.\n- Step 3: Second integral uses substitution u = tanhx → du = -sech²x dx → ∫u^{n-2}(-du) = -u^{n-1}/(n-1) + C.  \n**Final Formula:** Iₙ = Iₙ₋₂ - tanh^{n-1}x/(n-1)  \n**Key Insight:** tanh²x + sech²x = 1 allows expressing tanhⁿx in terms of lower powers.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "For arc length of y = coshx from x=0 to x=ln2, why does the result involve sinh(ln2) but not cosh(ln2)? Calculate the arc length. (3 steps)", "answer": "- Step 1: dy/dx = sinhx → √(1 + sinh²x) = coshx.\n- Step 2: Integral ∫coshx dx from 0 to ln2 = sinhx evaluated at bounds.\n- Step 3: sinh(ln2) = (e^{ln2} - e^{-ln2})/2 = (2 - 1/2)/2 = 3/4. At x=0, sinh0=0.  \n**Answer:** 3/4 - 0 = 3/4  \n**Conceptual Insight:** The derivative of coshx is sinhx, so arc length becomes ∫coshx dx = sinhx, not relying on cosh at upper bound.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Compare ∫1/√(a² - x²) dx and ∫1/√(x² - a²) dx. Why do the results use arcsinx and arcoshx respectively? (2 steps)", "answer": "- Step 1: ∫1/√(a² - x²) dx uses x = asinθ → sinθ = x/a → θ = arcsin(x/a).\n- Step 2: ∫1/√(x² - a²) dx uses x = acoshu → coshu = x/a → u = arcosh(x/a).  \n**Key Insight:** Domain differences: arcsin(x/a) requires |x| < a, arcosh(x/a) requires x > a, matching the functions' domains.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Derive ∫xⁿeˣ dx = xⁿeˣ - n∫xⁿ⁻¹eˣ dx using integration by parts. Why does this lead to a factorial coefficient when applying the reduction formula? (4 steps)", "answer": "- Step 1: Let u = xⁿ, dv = eˣ dx → du = nxⁿ⁻¹dx, v = eˣ.\n- Step 2: ∫xⁿeˣ dx = xⁿeˣ - n∫xⁿ⁻¹eˣ dx.\n- Step 3: Apply recursively: Each step reduces power by 1, multiplying by n, n-1, etc.\n- Step 4: Final term n!∫eˣ dx leads to n!eˣ.  \n**Factorial Insight:** Repeated application n times gives coefficient n! due to factorial multiplication.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why does ∫1/(a² + x²) dx = (1/a)arctan(x/a) + C? Derive using substitution x = atanθ. (3 steps)", "answer": "- Step 1: Let x = atanθ → dx = asec²θ dθ → a² + x² = a²(1 + tan²θ) = a²sec²θ.\n- Step 2: Integral becomes ∫(1/a²sec²θ)(asec²θ dθ) = (1/a)∫dθ = (1/a)θ + C.\n- Step 3: θ = arctan(x/a).  \n**Geometric Insight:** Substitution transforms the integral into a constant over a right triangle's hypotenuse squared.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "For ∫(x - 2)/√(x² - 4) dx, why does splitting the numerator help? Solve and explain each part. (3 steps)", "answer": "- Step 1: Split into ∫x/√(x² - 4) dx - 2∫1/√(x² - 4) dx.\n- Step 2: First integral uses u = x² - 4 → du = 2x dx → (1/2)∫u^{-1/2}du = √(x² - 4).\n- Step 3: Second integral is 2arcosh(x/2) + C.  \n**Answer:** √(x² - 4) - 2arcosh(x/2) + C  \n**Strategy Insight:** Splitting separates into a direct substitution case and a standard inverse hyperbolic integral.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why does ∫√(x² + 1)dx involve sinh2u in its derivation? Compute ∫₀¹√(x² + 1)dx. (4 steps)", "answer": "- Step 1: Let x = sinhu → dx = coshu du → √(x² + 1) = coshu.\n- Step 2: Integral becomes ∫cosh²u du = (u/2 + sinh2u/4) + C.\n- Step 3: Substitute back u = arsinhx, sinh2u = 2sinhucoshu = 2x√(x² + 1).\n- Step 4: Definite integral from 0 to 1: [ (arsinh1)/2 + (2√2)/4 ] - 0 = (ln(1 + √2))/2 + √2/2.  \n**Key Insight:** The sinh2u term arises naturally from cosh²u's identity, tying back to original variable x.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": true}, {"question": "For ∫xⁿ√(1 - x²)dx (n ≥ 0), why use x = sinθ? Compute ∫₀¹x√(1 - x²)dx. (3 steps)", "answer": "- Step 1: Substitution x = sinθ simplifies √(1 - x²) to cosθ, dx = cosθ dθ.\n- Step 2: Integral becomes ∫sinθ · cosθ · cosθ dθ = ∫sinθ cos²θ dθ.\n- Step 3: Let u = cosθ → du = -sinθ dθ → -∫u² du = -u³/3 + C. Evaluate from θ=0 to π/2: 1/3.  \n**Answer:** 1/3  \n**Domain Insight:** x = sinθ works for |x| ≤ a (here a=1), matching the integrand's domain.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": true}, {"question": "Derive the surface area when y = coshx from x=0 to x=ln2 rotates about the x-axis. Why does the result simplify to π(1 - 1/e²)? (4 steps)", "answer": "- Step 1: Surface area = 2π∫y√(1 + (dy/dx)²) dx. Here dy/dx = sinhx → √(1 + sinh²x) = coshx.\n- Step 2: Integral becomes 2π∫cosh²x dx from 0 to ln2.\n- Step 3: Use identity cosh²x = (cosh2x + 1)/2 → π∫(cosh2x + 1)dx = π[(sinh2x)/2 + x] from 0 to ln2.\n- Step 4: sinh(2ln2) = (e^{2ln2} - e^{-2ln2})/2 = (4 - 1/4)/2 = 15/8. Final expression: π[(15/16 + ln2) - (0 + 0)] = π(15/16 + ln2).  \n**Correction:** The original assertion was incorrect. The correct simplification uses sinh(2ln2) = 15/8, leading to π(15/16 + ln2).  \n**Common Mistake:** Assuming sinh(2ln2) simplifies to (2x√(x² + 1)) at x=2, but must compute via definitions.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Why does ∫tanhⁿx dx reduce to a recursion with Iₙ₋₂, unlike ∫tanⁿx dx which uses Iₙ₋₂ with a positive term? (2 steps)", "answer": "- Step 1: For tanhⁿx, use tanhⁿx = tanhⁿ⁻²x(1 - sech²x) → Iₙ = Iₙ₋₂ - ∫tanhⁿ⁻²x sech²x dx.\n- Step 2: ∫tanhⁿ⁻²x sech²x dx = tanhⁿ⁻¹x/(n - 1) (via u = tanhx).  \n**Contrast:** ∫tanⁿx dx uses tan²x = sec²x - 1 → Iₙ = Iₙ₋₂ - ∫Iₙ₋₂ dx (no negative). The structure of hyperbolic identity (1 - tanh²x = sech²x) introduces a negative term.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": true}, {"question": "For ∫(3x + 5)/√(x² + 2x + 2) dx, why complete the square first? Solve the integral. (4 steps)", "answer": "- Step 1: Complete square: x² + 2x + 2 = (x + 1)² + 1.\n- Step 2: Substitute u = x + 1 → du = dx. Integral becomes ∫(3u + 5 - 3)/√(u² + 1) du = 3∫u/√(u² + 1) du + 2∫1/√(u² + 1) du.\n- Step 3: First term: 3√(u² + 1). Second term: 2arsinhu + C.\n- Step 4: Substitute back u = x + 1.  \n**Answer:** 3√(x² + 2x + 2) + 2arsinh(x + 1) + C  \n**Completion Necessity:** Completing the square aligns with standard integrals ∫u/√(u² + a²) du and ∫1/√(u² + a²) du.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Compare ∫√(x² + 1)dx and ∫x√(x² + 1)dx. Why does the latter not require reduction? (2 steps)", "answer": "- Step 1: ∫x√(x² + 1)dx uses substitution u = x² + 1 → du = 2x dx → (1/2)∫√u du = (1/3)(x² + 1)^{3/2} + C.\n- Step 2: ∫√(x² + 1)dx requires hyperbolic substitution or integration by parts, as it lacks the x multiplier for simple substitution.  \n**Key Contrast:** The presence of x allows direct substitution in the latter, while the former needs advanced techniques due to the square root structure.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": true}, {"question": "Why does ∫artanhx dx = x artanhx + (1/2)ln(1 - x²) + C? Derive using integration by parts. (3 steps)", "answer": "- Step 1: Let u = artanhx, dv = dx → du = 1/(1 - x²) dx, v = x.\n- Step 2: uv - ∫v du = x artanhx - ∫x/(1 - x²) dx.\n- Step 3: ∫x/(1 - x²) dx = -1/2 ∫(-2x)/(1 - x²) dx = -1/2 ln(1 - x²) + C.  \n**Answer:** x artanhx + (1/2)ln(1 - x²) + C  \n**Common Mistake:** Forgetting the chain rule in du/dx = 1/(1 - x²), leading to sign errors.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "For the reduction formula Iₙ = ∫xⁿe^{x/2}dx, why does differentiation reduce the exponential term? Derive Iₙ in terms of Iₙ₋₁. (3 steps)", "answer": "- Step 1: Integration by parts: u = xⁿ, dv = e^{x/2} dx → du = nxⁿ⁻¹ dx, v = 2e^{x/2}.\n- Step 2: Iₙ = 2xⁿe^{x/2} - 2n∫xⁿ⁻¹e^{x/2} dx = 2xⁿe^{x/2} - 2nIₙ₋₁.\n- Step 3: The exponential term \"absorbs\" the xⁿ factor through v', allowing recursive application.  \n**Reduction Insight:** The exponential's derivative (scaled) is itself, making it ideal for recursive integration.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "Why does ∫√(a² - x²)dx require a trigonometric substitution x = asinθ? Derive ∫√(a² - x²)dx. (4 steps)", "answer": "- Step 1: x = asinθ → dx = acosh dθ → √(a² - x²) = acosh.\n- Step 2: Integral becomes ∫a²cos²θ dθ.\n- Step 3: Use identity cos²θ = (1 + cos2θ)/2 → (a²/2)(θ + (sin2θ)/2) + C.\n- Step 4: Substitute back θ = arcsin(x/a) and sin2θ = 2x√(a² - x²)/a².  \n**Final Formula:** (a²/2)arcsin(x/a) + (x/2)√(a² - x²) + C  \n**Geometric Insight:** The substitution maps the semicircle to a circular angle θ, simplifying the integral via trigonometric identities.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "For ∫xⁿarcoshx dx, why use u = arcoshx? Derive ∫x arcoshx dx. (3 steps)", "answer": "- Step 1: Let u = arcoshx, dv = x dx → du = 1/√(x² - 1) dx, v = x²/2.\n- Step 2: uv - ∫v du = (x²/2)arcoshx - (1/2)∫x²/√(x² - 1) dx.\n- Step 3: Simplify remaining integral by splitting x² = (x² - 1) + 1. First part: ∫√(x² - 1) dx, second part: ∫1/√(x² - 1) dx = arcoshx + C.  \n**Answer:** (x²/2)arcoshx - [ (1/2)( (x/2)√(x² - 1) + (1/2)ln(x + √(x² - 1)) ) ] + C  \n**Conceptual Link:** Integration by parts reduces the inverse hyperbolic function to a rational function integral.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "For ∫x^{n}e^{-x}dx (n ≥ 0), why does the reduction formula alternate signs? Derive Iₙ = -xⁿe^{-x} + nIₙ₋₁. (3 steps)", "answer": "- Step 1: Let u = xⁿ, dv = e^{-x}dx → du = nxⁿ⁻¹dx, v = -e^{-x}.\n- Step 2: Iₙ = -xⁿe^{-x} + n∫xⁿ⁻¹e^{-x}dx.\n- Step 3: The negative sign from v persists, creating an alternating pattern when applied recursively.  \n**Factorial Insight:** Repeated application gives Iₙ = (-xⁿ + nxⁿ⁻¹ - n(n-1)xⁿ⁻² + ... + (-1)^n n!)e^{-x} + C.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": true}, {"question": "Why does ∫tanhx dx = ln(coshx) + C? Explain using derivative identity. (1 step)", "answer": "The derivative of ln(coshx) is (sinhx)/coshx = tanhx.  \n**Common Confusion:** Differentiating ln(coshx) vs ln(sechx) for ∫tanhx dx. The derivative of sechx is -sechxtanhx, not directly applicable.", "source": "Qwen 3 ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "For ∫(x + 1)/√(x² + 2x + 2)dx, why does substitution u = x + 1 work? Solve the integral. (3 steps)", "answer": "- Step 1: u = x + 1 → x = u - 1 → numerator u. Denominator becomes √(u² + 1).\n- Step 2: Split into ∫u/√(u² + 1) du + ∫1/√(u² + 1) du.\n- Step 3: First part: √(u² + 1). Second part: arsinhu.  \n**Answer:** √(x² + 2x + 2) + arsinh(x + 1) + C  \n**Substitution Strategy:** Completing the square simplifies to standard forms ∫u/√(u² + a²) du = √(u² + a²).", "source": "Qwen 3 ①", "_id": "qwen_1_21", "judge_pick": false}, {"question": "Why does ∫x²e^{x}dx require two applications of integration by parts? Derive the general form. (4 steps)", "answer": "- Step 1: Let u = x², dv = eˣdx → du = 2xdx, v = eˣ.\n- Step 2: x²eˣ - 2∫xeˣdx. Now ∫xeˣdx needs u = x, dv = eˣdx.\n- Step 3: x²eˣ - 2[xeˣ - ∫eˣdx] = x²eˣ - 2xeˣ + 2eˣ + C.\n- Step 4: Factor: eˣ(x² - 2x + 2) + C.  \n**Recursive Insight:** Each application reduces polynomial degree by 1, requiring n steps for xⁿ.", "source": "Qwen 3 ①", "_id": "qwen_1_22", "judge_pick": false}, {"question": "For ∫(x + 3)/√(x² + 6x + 10)dx, why complete the square? Compute the integral. (3 steps)", "answer": "- Step 1: x² + 6x + 10 = (x + 3)² + 1.\n- Step 2: Let u = x + 3 → Integral ∫(u)/(√(u² + 1) du + 0 (since 3 - 3 = 0).\n- Step 3: ∫u/√(u² + 1) du = √(u² + 1) + C.  \n**Answer:** √(x² + 6x + 10) + C  \n**Structure Insight:** Completing the square reveals a derivative of the denominator, simplifying the integral.", "source": "Qwen 3 ①", "_id": "qwen_1_23", "judge_pick": false}, {"question": "Why does ∫x artanhx dx = (x² artanhx - x + arctanhx)/2 + C? Derive using integration by parts. (3 steps)", "answer": "- Step 1: Let u = artanhx, dv = x dx → du = 1/(1 - x²) dx, v = x²/2.\n- Step 2: uv - ∫v du = (x²/2)artanhx - (1/2)∫x²/(1 - x²) dx.\n- Step 3: Simplify integrand: -1/2∫[ -1 + 1/(1 - x²) ]dx = (x²/2)artanhx + x/2 - (1/2)artanhx + C.  \n**Answer:** (x² artanhx - x + artanhx)/2 + C  \n**Common Error:** Misapplying partial fractions or missing the split to handle x²/(1 - x²).", "source": "Qwen 3 ①", "_id": "qwen_1_24", "judge_pick": false}, {"question": "Why does ∫√(x² + a²)dx involve sinh2u in its derivation? Compute ∫√(x² + 1)dx. (4 steps)", "answer": "- Step 1: x = sinhu → √(x² + 1) = coshu, dx = coshu du.\n- Step 2: ∫cosh²u du = (u/2 + sinh2u/4) + C.\n- Step 3: Substitute u = arsinhx, sinh2u = 2x√(x² + 1).\n- Step 4: (arsinhx)/2 + (x√(x² + 1))/2 + C.  \n**Geometric Link:** The sinh2u term connects back to original variable through double angle identity.", "source": "Qwen 3 ①", "_id": "qwen_1_25", "judge_pick": false}, {"question": "For ∫xⁿcoshx dx, derive Iₙ = xⁿsinhx - n∫xⁿ⁻¹sinhx dx. How would you evaluate I₄? (3 steps)", "answer": "- Step 1: Integration by parts (u = xⁿ, dv = coshx dx) → Iₙ = xⁿsinhx - nIₙ₋₁.\n- Step 2: Apply recurrence: I₄ = x⁴sinhx - 4I₃.\n- Step 3: Recursively compute I₃ = x³coshx - 3I₂, etc., until I₀ = sinhx.  \n**Final Form:** x⁴sinhx - 4x³coshx + 12x²sinhx - 24xcoshx + 24sinhx + C  \n**Complexity Insight:** Each application introduces a new term, creating a polynomial in x multiplied by hyperbolic functions.", "source": "Qwen 3 ①", "_id": "qwen_1_26", "judge_pick": false}, {"question": "Why does ∫1/(x√(lnx)) dx converge/diverge between 0 and e? Analyze without computing. (2 steps)", "answer": "- Step 1: Sub u = lnx → du = 1/x dx → ∫u^{-1/2} du from -∞ to 1.\n- Step 2: ∫u^{-1/2} du = 2√u evaluated from -∞ to 1 → Diverges due to lower limit.  \n**Comparison:** The integrand behaves like x^{-1}(lnx)^{-1/2}, which diverges at x=0.", "source": "Qwen 3 ①", "_id": "qwen_1_27", "judge_pick": true}, {"question": "For ∫x artanx dx, derive the integral using integration by parts. (3 steps)", "answer": "- Step 1: u = arctanx, dv = x dx → du = 1/(1 + x²) dx, v = x²/2.\n- Step 2: uv - ∫v du = (x²/2)arctanx - (1/2)∫x²/(1 + x²) dx.\n- Step 3: Simplify integrand as 1 - 1/(1 + x²), leading to (x²/2)arctanx - (x/2) + (1/2)arctanx + C.  \n**Answer:** (x² + 1)²arctanx - x/2 + C  \n**Subtle Point:** Recognizing x²/(1 + x²) = 1 - 1/(1 + x²) is crucial for simplification.", "source": "Qwen 3 ①", "_id": "qwen_1_28", "judge_pick": false}, {"question": "Why does the surface area of y = coshx rotated about x-axis from 0 to A equal π(sinh2A - 2A)? Derive. (4 steps)", "answer": "- Step 1: Surface area = 2π∫y√(1 + (dy/dx)²) dx = 2π∫cosh²x dx.\n- Step 2: Use identity cosh²x = (cosh2x + 1)/2 → π∫(cosh2x + 1) dx.\n- Step 3: Integrate: π[ (sinh2x)/2 + x ] from 0 to A.\n- Step 4: sinh2A/2 - sinh0/2 + A - 0 = π( (sinh2A)/2 + A ).  \n**Correction:** The initial assertion was incorrect. The correct expression is π( (sinh2A)/2 + A ).  \n**Common Mistake:** Forgetting the 1/2 factor in ∫coshax dx = (sinhax)/a + C.", "source": "Qwen 3 ①", "_id": "qwen_1_29", "judge_pick": false}], "count": 30}, "qwen_2": {"label": "Qwen 3 ②", "cards": [], "count": 0}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Evaluate: (a) ∫ cosh(4x-1) dx (b) ∫ cosech 3x coth 3x dx. Explain the general pattern when integrating hyperbolic functions with linear arguments. (2 steps)", "answer": "- Step 1: Use the pattern ∫ f'(ax+b) dx = (1/a)f(ax+b) + C\n- (a) ∫ cosh(4x-1) dx = (1/4)sinh(4x-1) + C\n- (b) ∫ cosech 3x coth 3x dx = -(1/3)cosech 3x + C\n\n- Step 2: The general rule: When the argument is a linear function ax + b, the integral is (1/a) times the original function evaluated at (ax+b), plus constant. This comes from chain rule in reverse.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "For integrals of the form ∫ f'(x)[f(x)]^n dx and ∫ f'(x)/f(x) dx, what are the standard results? Give one example of each. (2 steps)", "answer": "- Step 1: Two key patterns:\n- (1) ∫ f'(x)[f(x)]^n dx = [f(x)]^(n+1)/(n+1) + C, for n ≠ -1\n- (2) ∫ f'(x)/f(x) dx = ln|f(x)| + C\n\n- Step 2: Example (1): ∫ x(1+x²)^(-1/2) dx → let f(x) = 1+x², then f'(x) = 2x. So x dx = (1/2)f'(x)dx → = (1/2)∫ f'(x)[f(x)]^(-1/2) dx = (1/2) × 2 × (1+x²)^(1/2) + C = √(1+x²) + C\n- Example (2): ∫ 2x/(1+x²) dx → let f(x) = 1+x², f'(x) = 2x → = ln(1+x²) + C", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Evaluate ∫ (2+5x)/√(x²+1) dx by splitting into two recognizable integrals. What is the key insight? (3 steps)", "answer": "- Step 1: Split the integral: ∫ (2+5x)/√(x²+1) dx = ∫ 5x/√(x²+1) dx + ∫ 2/√(x²+1) dx\n\n- Step 2: First integral uses the power rule pattern: ∫ x( x²+1)^(-1/2) dx → let f(x) = x²+1, f'(x) = 2x → = (5/2) × 2 × (x²+1)^(1/2) = 5√(x²+1)\n\n- Step 3: Second integral matches standard form 10: ∫ 1/√(x²+1) dx = arsinh x + C\n- Final answer: 5√(x²+1) + 2arsinh x + C\n\n- Key insight: Always look for whether the numerator contains the derivative of the expression under a root or denominator.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Using the identity tanh²x + sech²x = 1, evaluate ∫ tanh²x dx. What is the method? (2 steps)", "answer": "- Step 1: Rewrite tanh²x using the identity: tanh²x = 1 - sech²x\n\n- Step 2: Integrate: ∫ tanh²x dx = ∫ (1 - sech²x) dx = ∫ 1 dx - ∫ sech²x dx = x - tanh x + C\n\n- This uses the same technique as integrating sin²x in trigonometry — reduce the power using identities.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Evaluate ∫ cosh²3x dx using hyperbolic identities. Explain the method. (3 steps)", "answer": "- Step 1: Use the identity cosh 2A = 2cosh²A - 1, rearranged: cosh²A = (1 + cosh 2A)/2\n\n- Step 2: With A = 3x: cosh²(3x) = (1 + cosh 6x)/2\n\n- Step 3: Integrate: ∫ cosh²(3x) dx = ∫ (1 + cosh 6x)/2 dx = (1/2)∫ dx + (1/2)∫ cosh 6x dx = (1/2)x + (1/2)(1/6)sinh 6x + C = (1/2)x + (1/12)sinh 6x + C", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Evaluate ∫ e^(2x) sinh x dx using the exponential definition of sinh x. Why might integration by parts fail here? (3 steps)", "answer": "- Step 1: Write sinh x in exponential form: sinh x = (e^x - e^(-x))/2\n\n- Step 2: Substitute: ∫ e^(2x) × (e^x - e^(-x))/2 dx = (1/2)∫ (e^(3x) - e^x) dx\n\n- Step 3: Integrate: = (1/2)[e^(3x)/3 - e^x] + C = (1/6)e^(3x) - (1/2)e^x + C\n\n- Why integration by parts fails: When you try IBP on e^(2x)sinh x, you get a循环 that doesn't simplify. Using exponentials converts it to simple exponential integrals.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": true}, {"question": "Evaluate ∫ sech x dx. Describe the substitution used and why. (3 steps)", "answer": "- Step 1: Multiply numerator and denominator by e^x: sech x = 2/(e^x + e^(-x))\n\n- Step 2: Let u = e^x, then du/dx = e^x, so e^x dx = du, giving dx = du/u\n\n- Step 3: Substitute: ∫ sech x dx = ∫ 2/(u + 1/u) × (du/u) = ∫ 2/(u²+1) du = 2 arctan u + C = 2 arctan(e^x) + C\n\n- This works because the substitution converts the hyperbolic function into a rational function.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "For integrals involving √(1-x²), what substitution should you try and why? Give the resulting identity that simplifies the integral. (2 steps)", "answer": "- Step 1: Try x = sin θ (or x = tanh u for hyperbolic approach)\n\n- Step 2: Using x = sin θ: 1 - x² = 1 - sin²θ = cos²θ, and dx = cos θ dθ\n- Then √(1-x²) dx becomes √(cos²θ) × cos θ dθ = |cos θ|cos θ dθ\n- For the range where |x| < 1 (i.e., -π/2 < θ < π/2), cos θ > 0, so this simplifies to cos²θ dθ\n\n- Alternatively with x = tanh u: 1 - x² = 1 - tanh²u = sech²u, giving √(1-x²) = sech u", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "For integrals involving 1+x², what two substitutions are suggested and what identities result? (2 steps)", "answer": "- Step 1: Two options:\n- (a) x = tan θ → 1 + x² = 1 + tan²θ = sec²θ, dx = sec²θ dθ\n- (b) x = sinh u → 1 + x² = 1 + sinh²u = cosh²u, dx = cosh u du\n\n- Step 2: Both substitutions convert the quadratic into a single term squared, allowing the integral to simplify. The hyperbolic substitution often leads to sech u, while trigonometric leads to sec θ.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "For integrals involving √(x² - a²), what substitution is suggested and what identity is used? (2 steps)", "answer": "- Step 1: Try x = a cosh u (or x = a sec θ for trigonometric approach)\n\n- Step 2: Using x = a cosh u: x² - a² = a²cosh²u - a² = a²sinh²u, so √(x² - a²) = a sinh u, and dx = a sinh u du\n- This converts the
