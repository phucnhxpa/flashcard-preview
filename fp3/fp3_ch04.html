 u$$ and $$dx = a\\cosh u \\, du$$, so $$\\frac{dx}{\\sqrt{a^2+x^2}} = du$$ — extremely clean.\n+ With $$x = a\\tan\\theta$$: get $$\\sec\\theta \\, d\\theta$$, which integrates to $$\\ln|\\sec\\theta + \\tan\\theta|$$ — possible but messier.\n- Step 3: General principle: when the inverse-function answer is hyperbolic (arsinh, arcosh), hyperbolic substitution gives the cleanest path; when the answer is trig (arcsin, arctan), trig substitution wins.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Derive $$\\int \\frac{1}{1+x^2} dx = \\arctan x + C$$ using the substitution $$x = \\tan A$$. (3 steps)", "answer": "- Step 1: Set $$x = \\tan A$$, so $$\\frac{dx}{dA} = \\sec^2 A$$, meaning $$dx = \\sec^2 A \\, dA$$. Also $$1 + x^2 = 1 + \\tan^2 A = \\sec^2 A$$.\n- Step 2: Substitute: $$\\int \\frac{1}{1+x^2} dx = \\int \\frac{1}{\\sec^2 A} \\cdot \\sec^2 A \\, dA = \\int 1 \\, dA = A + C$$.\n- Step 3: Convert back: since $$x = \\tan A$$, we have $$A = \\arctan x$$. So the integral equals $$\\arctan x + C$$.\n\nBeautiful insight: the substitution made the integrand identically 1, because $$\\sec^2 A$$ in numerator (from $$dx$$) cancels $$\\sec^2 A$$ in denominator. This perfect cancellation is the signature of a well-chosen substitution.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "State the four generalized standard integrals (results 12–15) and explain why only one carries a $$1/a$$ factor. (4 steps)", "answer": "- Step 1: $$\\int \\frac{1}{\\sqrt{a^2 - x^2}} dx = \\arcsin\\left(\\frac{x}{a}\\right) + C$$, $$|x| < a$$\n- Step 2: $$\\int \\frac{1}{a^2 + x^2} dx = \\frac{1}{a}\\arctan\\left(\\frac{x}{a}\\right) + C$$ ← **this one has $$1/a$$**\n- Step 3: $$\\int \\frac{1}{\\sqrt{a^2 + x^2}} dx = \\text{arsinh}\\left(\\frac{x}{a}\\right) + C$$ and $$\\int \\frac{1}{\\sqrt{x^2 - a^2}} dx = \\text{arcosh}\\left(\\frac{x}{a}\\right) + C$$, $$x > a$$.\n- Step 4: The arctan one has the extra $$1/a$$ because the denominator is $$a^2$$ (not $$\\sqrt{a^2}=a$$). Factoring gives an extra $$a$$ surplus that survives the substitution. The other three have $$\\sqrt{a^2}$$, so factors of $$a$$ from denominator and $$dx$$ cancel exactly.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "Walk through $$\\int \\frac{1}{25 + 9x^2} dx$$, identifying the form match and the value of \"a\". (4 steps)", "answer": "- Step 1: Not immediately in the form $$\\frac{1}{a^2 + x^2}$$ because of the 9 attached to $$x^2$$. Factor: $$25 + 9x^2 = 9\\left(\\frac{25}{9} + x^2\\right)$$.\n- Step 2: Integral becomes $$\\frac{1}{9} \\int \\frac{1}{\\left(\\frac{5}{3}\\right)^2 + x^2} dx$$. We've matched $$a = \\frac{5}{3}$$.\n- Step 3: Apply $$\\int \\frac{1}{a^2 + x^2} dx = \\frac{1}{a}\\arctan(x/a)$$ with $$a = 5/3$$: result is $$\\frac{1}{9} \\cdot \\frac{3}{5} \\arctan\\left(\\frac{3x}{5}\\right) = \\frac{1}{15}\\arctan\\left(\\frac{3x}{5}\\right) + C$$.\n- Step 4: Sanity check the structure: outer factor $$1/15$$, inner $$3x/5$$ — both involve the 3/5 ratio coming from $$1/a = 3/5$$.\n\nLesson: when the coefficient on $$x^2$$ isn't 1, factor it out FIRST before pattern-matching.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Show how $$\\int \\frac{1}{\\sqrt{3 - 4x^2}} dx$$ reduces to a standard form. (3 steps)", "answer": "- Step 1: Factor inside the surd: $$3 - 4x^2 = 4\\left(\\frac{3}{4} - x^2\\right)$$. So $$\\sqrt{3 - 4x^2} = 2\\sqrt{\\frac{3}{4} - x^2}$$.\n- Step 2: The integral becomes $$\\frac{1}{2} \\int \\frac{1}{\\sqrt{a^2 - x^2}} dx$$ with $$a = \\sqrt{3}/2$$.\n- Step 3: Apply the arcsin formula: $$\\frac{1}{2} \\arcsin\\left(\\frac{2x}{\\sqrt{3}}\\right) + C$$.\n\nPattern: any \"$$a^2 - b^2 x^2$$\" or \"$$\\sqrt{a^2 - b^2 x^2}$$\" form is handled by factoring out the $$b^2$$ to expose a clean \"$$a'^2 - x^2$$\" with $$a' = a/b$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Use the substitution $$x = \\sinh u$$ to derive $$\\int \\sqrt{1+x^2} \\, dx$$, and explain why this leads to integrating $$\\cosh^2 u$$. (4 steps)", "answer": "- Step 1: Set $$x = \\sinh u$$, so $$dx = \\cosh u \\, du$$ and $$1 + x^2 = 1 + \\sinh^2 u = \\cosh^2 u$$, giving $$\\sqrt{1+x^2} = \\cosh u$$.\n- Step 2: Substitute: $$\\int \\sqrt{1+x^2} \\, dx = \\int \\cosh u \\cdot \\cosh u \\, du = \\int \\cosh^2 u \\, du$$.\n- Step 3: Use $$\\cosh^2 u = \\frac{1 + \\cosh 2u}{2}$$: integral becomes $$\\frac{u}{2} + \\frac{\\sinh 2u}{4} + C = \\frac{u}{2} + \\frac{\\sinh u \\cosh u}{2} + C$$.\n- Step 4: Convert back via $$u = \\text{arsinh } x$$, $$\\sinh u = x$$, $$\\cosh u = \\sqrt{1+x^2}$$: result is $$\\frac{1}{2}\\text{arsinh } x + \\frac{1}{2} x \\sqrt{1+x^2} + C$$.\n\nConceptual takeaway: surds with \"$$1 + x^2$$\" become $$\\cosh u$$ under sinh-substitution; squaring gives $$\\cosh^2 u$$ handled by double-angle reduction.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "What's the general strategy for integrals like $$\\int \\frac{1}{px^2 + qx + r} dx$$, and how does it differ when the quadratic factors versus doesn't? (3 steps)", "answer": "- Step 1: First check if the quadratic factors over the reals (discriminant ≥ 0). If yes, use **partial fractions** to split into linear-denominator pieces, each integrating to a logarithm.\n- Step 2: If the quadratic does NOT factor (discriminant < 0), use **completing the square** to get $$(x+b)^2 \\pm c$$, then match to standard integrals 12–17.\n+ $$(x+b)^2 + c^2$$ → arctan or arsinh form.\n+ $$(x+b)^2 - c^2$$ (positive surd) → arcosh or log form.\n+ $$c^2 - (x+b)^2$$ → arcsin or log form (16, 17).\n- Step 3: After completing the square, perform $$u = x + b$$ to translate the variable into clean standard form.\n\nFor $$\\int \\frac{1}{\\sqrt{\\text{quadratic}}} dx$$, partial fractions don't apply at all — always complete the square.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Walk through $$\\int \\frac{1}{x^2 - 8x + 8} dx$$ by completing the square. (4 steps)", "answer": "- Step 1: Complete the square: $$x^2 - 8x + 8 = (x-4)^2 - 16 + 8 = (x-4)^2 - 8$$. This is $$u^2 - a^2$$ form with $$a = 2\\sqrt{2}$$.\n- Step 2: Substitute $$u = x - 4$$, so $$du = dx$$: integral becomes $$\\int \\frac{1}{u^2 - 8} du$$.\n- Step 3: This matches standard form 17: $$\\int \\frac{1}{u^2 - a^2} du = \\frac{1}{2a} \\ln\\left|\\frac{u-a}{u+a}\\right|$$. With $$a = 2\\sqrt{2}$$: $$\\frac{1}{4\\sqrt{2}} \\ln\\left|\\frac{u - 2\\sqrt{2}}{u + 2\\sqrt{2}}\\right| + C$$.\n- Step 4: Replace $$u = x - 4$$: $$\\frac{\\sqrt{2}}{8} \\ln\\left|\\frac{x - 4 - 2\\sqrt{2}}{x - 4 + 2\\sqrt{2}}\\right| + C$$.\n\nThe lesson: after completing the square, the SIGN of the constant tells you which standard form applies.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "When completing the square in $$\\int \\frac{1}{\\sqrt{4 - 2x - x^2}} dx$$, why must you flip the sign and what's the resulting form? (3 steps)", "answer": "- Step 1: First handle the leading negative coefficient: $$4 - 2x - x^2 = -(x^2 + 2x - 4)$$. Now complete inside: $$x^2 + 2x - 4 = (x+1)^2 - 5$$.\n- Step 2: Substitute back: $$4 - 2x - x^2 = -[(x+1)^2 - 5] = 5 - (x+1)^2$$. This is \"$$a^2 - u^2$$\" form with $$a = \\sqrt{5}$$, $$u = x+1$$.\n- Step 3: Matches arcsin standard form: $$\\arcsin\\left(\\frac{x+1}{\\sqrt{5}}\\right) + C$$.\n\nCrucial insight: a negative leading coefficient means the quadratic opens downward — the surd is real only on a bounded interval, and after factoring out the negative, you get the \"$$a^2 - u^2$$\" structure (→ arcsin).", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "State the two log-form standard integrals (results 16 and 17) and explain when they appear instead of arcsin or arcosh. (3 steps)", "answer": "- Step 1: $$\\int \\frac{1}{a^2 - x^2} dx = \\frac{1}{2a} \\ln\\left|\\frac{a+x}{a-x}\\right| + C$$, $$|x| < a$$.\n+ $$\\int \\frac{1}{x^2 - a^2} dx = \\frac{1}{2a} \\ln\\left|\\frac{x-a}{x+a}\\right| + C$$.\n- Step 2: These appear when the **denominator is the quadratic itself, not its square root**:\n+ $$\\sqrt{a^2 - x^2}$$ → arcsin (no logs)\n+ $$a^2 - x^2$$ → log form 16\n+ $$\\sqrt{x^2 - a^2}$$ → arcosh\n+ $$x^2 - a^2$$ → log form 17\n- Step 3: The reason: results 16, 17 come from partial fractions decomposition. The square-root cases involve a different antiderivative structure (the inverse hyperbolic/trig function).", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "What's the relationship between $$\\text{arcosh } x$$ and $$\\ln(x + \\sqrt{x^2-1})$$? Why does this matter for evaluating definite integrals? (3 steps)", "answer": "- Step 1: They are equal: $$\\text{arcosh } x = \\ln(x + \\sqrt{x^2 - 1})$$ for $$x \\geq 1$$. This logarithmic form is in the formula booklet.\n- Step 2: It matters for definite integrals because evaluating arcosh at specific limits often produces a single natural log answer that's much cleaner than leaving \"arcosh\" notation.\n+ Example: $$\\text{arcosh}(2) - \\text{arcosh}(5/4) = \\ln(2 + \\sqrt{3}) - \\ln(2) = \\ln\\left(\\frac{2+\\sqrt{3}}{2}\\right)$$.\n- Step 3: Deeper story: every inverse hyperbolic function has a logarithmic form because hyperbolic functions are exponential. Always have log forms ready to combine answers cleanly.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "Explain the general technique for integrating inverse functions like arcsin x, arctan x, etc. Why does it work? (3 steps)", "answer": "- Step 1: The trick is to **multiply by 1**: write $$\\int \\arcsin x \\, dx = \\int (\\arcsin x) \\cdot 1 \\, dx$$. This sets up integration by parts.\n- Step 2: Apply IBP with $$u = \\arcsin x$$ (the inverse function) and $$\\frac{dv}{dx} = 1$$. Then $$\\frac{du}{dx} = \\frac{1}{\\sqrt{1-x^2}}$$ and $$v = x$$. IBP gives $$x \\arcsin x - \\int \\frac{x}{\\sqrt{1-x^2}} dx$$.\n- Step 3: The remaining integral is now manageable — the $$x$$ in the numerator is essentially the derivative of $$1-x^2$$, so it's an $$f'(x)[f(x)]^n$$ form.\n\nWhy this works: inverse functions are hard to integrate but **easy to differentiate**. Making them \"u\" in IBP transforms the difficulty into something tractable. The \"1\" as $$dv$$ keeps things simple.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Walk through $$\\int \\arctan x \\, dx$$ in detail, finishing with the final answer. (4 steps)", "answer": "- Step 1: Set up IBP: $$u = \\arctan x$$, $$\\frac{dv}{dx} = 1$$, giving $$\\frac{du}{dx} = \\frac{1}{1+x^2}$$ and $$v = x$$.\n- Step 2: $$\\int \\arctan x \\, dx = x \\arctan x - \\int \\frac{x}{1+x^2} dx$$.\n- Step 3: For the remaining integral: $$x = \\frac{1}{2}(2x) = \\frac{1}{2}(1+x^2)'$$, so $$\\int \\frac{x}{1+x^2} dx = \\frac{1}{2}\\ln(1+x^2)$$.\n- Step 4: Combine: $$\\int \\arctan x \\, dx = x \\arctan x - \\frac{1}{2}\\ln(1 + x^2) + C$$.\n\nPattern: the answer is (x times the inverse function) minus (something involving the integral of x/[derivative-related expression]).", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Compare the structure of the answers for $$\\int \\arcsin x \\, dx$$ vs $$\\int \\arctan x \\, dx$$ and explain the difference. (3 steps)", "answer": "- Step 1: Both follow the same IBP setup, but residual integrals differ:\n+ $$\\int \\arcsin x \\, dx = x \\arcsin x + \\sqrt{1-x^2} + C$$ (residual integrates to a square root)\n+ $$\\int \\arctan x \\, dx = x \\arctan x - \\frac{1}{2}\\ln(1+x^2) + C$$ (residual integrates to a log)\n- Step 2: The reason is in the derivatives:\n+ $$\\frac{d}{dx}\\arcsin x = \\frac{1}{\\sqrt{1-x^2}}$$ → residual has $$\\frac{x}{\\sqrt{1-x^2}}$$, which is $$f'(x)[f(x)]^{-1/2}$$ form → square root.\n+ $$\\frac{d}{dx}\\arctan x = \\frac{1}{1+x^2}$$ → residual has $$\\frac{x}{1+x^2}$$, which is $$\\frac{f'(x)}{f(x)}$$ form → log.\n- Step 3: So the **shape of the derivative** determines the **shape of the residual antiderivative**. Both inverse hyperbolics (arsinh, arcosh) follow the same pattern — square-root antiderivatives.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "What is a reduction formula and why are they essential for integrals like $$\\int \\sin^n x \\, dx$$ with large n? (3 steps)", "answer": "- Step 1: A reduction formula expresses $$I_n$$ (an integral involving a parameter $$n$$, usually a power) in terms of $$I_{n-1}$$, $$I_{n-2}$$, etc. — a \"lower\" version of itself. The notation $$I_n$$ avoids repeated integral signs.\n- Step 2: Essential because direct methods scale terribly with $$n$$:\n+ $$\\int \\sin^2 x$$: easy with $$\\sin^2 x = \\frac{1-\\cos 2x}{2}$$.\n+ $$\\int \\sin^3 x$$: easy with peel-off-one trick.\n+ $$\\int \\sin^{10} x$$: chain of intermediate steps becomes error-prone.\n- Step 3: A reduction formula systematizes this: derive $$nI_n = (n-1)I_{n-2}$$ once, apply repeatedly to reduce $$I_{10}$$ → $$I_8$$ → ... → $$I_0$$, where $$I_0$$ is trivial.\n\nThe deeper insight: reduction formulae trade one hard problem for many copies of an easier related problem.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "Derive the reduction formula for $$I_n = \\int x^n e^x \\, dx$$ using integration by parts. (4 steps)", "answer": "- Step 1: Set up IBP: $$u = x^n$$, $$\\frac{dv}{dx} = e^x$$, giving $$\\frac{du}{dx} = n x^{n-1}$$ and $$v = e^x$$.\n- Step 2: Apply $$\\int u \\frac{dv}{dx} dx = uv - \\int v \\frac{du}{dx} dx$$: $$I_n = x^n e^x - n \\int x^{n-1} e^x \\, dx$$.\n- Step 3: Recognize that the remaining integral is just $$I_{n-1}$$.\n- Step 4: Therefore $$I_n = x^n e^x - n I_{n-1}$$, valid for $$n \\geq 1$$.\n\nTo use it: $$I_4 = x^4 e^x - 4I_3$$, then $$I_3 = x^3 e^x - 3I_2$$, etc., down to $$I_0 = e^x$$. Each step costs one IBP, but the structure is mechanical.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Derive the Wallis-type reduction $$nI_n = (n-1)I_{n-2}$$ for $$I_n = \\int_0^{\\pi/2} \\sin^n x \\, dx$$. What identity is doing the heavy lifting? (5 steps)", "answer": "- Step 1: Write $$\\sin^n x = \\sin^{n-1}x \\cdot \\sin x$$. Apply IBP with $$u = \\sin^{n-1} x$$ and $$dv/dx = \\sin x$$ (so $$v = -\\cos x$$, $$du/dx = (n-1)\\sin^{n-2} x \\cos x$$).\n- Step 2: $$I_n = [-\\sin^{n-1} x \\cos x]_0^{\\pi/2} + (n-1) \\int_0^{\\pi/2} \\sin^{n-2} x \\cos^2 x \\, dx$$. The boundary term vanishes.\n- Step 3: Use $$\\cos^2 x = 1 - \\sin^2 x$$: $$\\int \\sin^{n-2} x (1 - \\sin^2 x) dx = I_{n-2} - I_n$$.\n- Step 4: So $$I_n = (n-1)(I_{n-2} - I_n) = (n-1)I_{n-2} - (n-1)I_n$$. Rearrange: $$nI_n = (n-1)I_{n-2}$$.\n- Step 5: The identity $$\\sin^2 + \\cos^2 = 1$$ does the heavy lifting — it lets us re-express the residual back into the same family, creating the self-referential equation.\n\nThis is one of the most elegant derivations: IBP creates a recursion, and the Pythagorean identity closes it into a usable formula.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Derive the reduction formula for $$\\int \\tan^n x \\, dx$$ WITHOUT using integration by parts. (4 steps)", "answer": "- Step 1: Write $$\\tan^n x = \\tan^{n-2} x \\cdot \\tan^2 x$$, then use the identity $$\\tan^2 x = \\sec^2 x - 1$$.\n- Step 2: $$I_n = \\int \\tan^{n-2} x \\sec^2 x \\, dx - \\int \\tan^{n-2} x \\, dx$$.\n- Step 3: First integral has form $$\\int [f(x)]^{n-2} f'(x) dx$$ with $$f(x) = \\tan x$$ (since $$(\\tan x)' = \\sec^2 x$$). It evaluates to $$\\frac{\\tan^{n-1} x}{n-1}$$.\n- Step 4: The second integral is $$I_{n-2}$$, so $$I_n = \\frac{\\tan^{n-1} x}{n-1} - I_{n-2}$$, valid for $$n \\geq 2$$.\n\nKey insight: for tan-power integrals, the algebraic identity $$\\tan^2 = \\sec^2 - 1$$ converts one factor of $$\\tan^2$$ into a \"derivative-companion + remainder,\" producing the recursion for free. No IBP needed.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Why does the Wallis sin-power reduction formula $$nI_n = (n-1)I_{n-2}$$ jump by 2 instead of 1? (3 steps)", "answer": "- Step 1: The IBP step naturally pulls off TWO factors at once when working with $$\\sin^n x = \\sin^{n-1} x \\sin x$$. After IBP and rewriting via $$\\cos^2 = 1 - \\sin^2$$, the $$\\sin^2$$ in the residual recombines into the next $$I_n$$ term, leaving $$\\sin^{n-2}$$.\n- Step 2: A jump-by-1 attempt would face a parity issue: the IBP residual would still have $$\\cos x$$ not fitting the sin-power family.\n- Step 3: The factor of 2 reflects parity-class dependence:\n+ Even $$n$$: chain reduces $$I_n \\to I_{n-2} \\to ... \\to I_0 = \\pi/2$$.\n+ Odd $$n$$: chain reduces $$I_n \\to I_{n-2} \\to ... \\to I_1 = 1$$.\n\nSo the parity of the starting $$n$$ determines the eventual base case, and the formula bridges within each parity class only.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Once you have the Wallis reduction $$nI_n = (n-1)I_{n-2}$$, what's the closed-form result for $$I_n$$ in terms of n? (3 steps)", "answer": "- Step 1: For odd $$n$$: $$I_n = \\frac{n-1}{n} \\cdot \\frac{n-3}{n-2} \\cdots \\frac{2}{3} \\cdot I_1$$, where $$I_1 = \\int_0^{\\pi/2} \\sin x \\, dx = 1$$.\n- Step 2: For even $$n$$: $$I_n = \\frac{n-1}{n} \\cdot \\frac{n-3}{n-2} \\cdots \\frac{1}{2} \\cdot I_0$$, where $$I_0 = \\pi/2$$.\n- Step 3: Simple checks:\n+ $$I_5 = \\frac{4}{5} \\cdot \\frac{2}{3} \\cdot 1 = \\frac{8}{15}$$.\n+ $$I_6 = \\frac{5}{6} \\cdot \\frac{3}{4} \\cdot \\frac{1}{2} \\cdot \\frac{\\pi}{2} = \\frac{5\\pi}{32}$$.\n\nThe pattern: numerator and denominator factors decrease by 2 each step. Even $$n$$ carries a $$\\pi/2$$ factor from the $$I_0$$ base case.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Derive the arc length formula $$s = \\int \\sqrt{1 + (dy/dx)^2} \\, dx$$ from first principles using infinitesimal triangles. (5 steps)", "answer": "- Step 1: Take a curve $$y = f(x)$$ and consider close points $$P(x, y)$$ and $$Q(x + \\delta x, y + \\delta y)$$. Let arc length from $$P$$ to $$Q$$ be $$\\delta s$$.\n- Step 2: Approximate the small arc by the straight chord $$PQ$$. By Pythagoras: $$(\\delta s)^2 \\approx (\\delta x)^2 + (\\delta y)^2$$.\n- Step 3: Divide by $$(\\delta x)^2$$: $$\\left(\\frac{\\delta s}{\\delta x}\\right)^2 \\approx 1 + \\left(\\frac{\\delta y}{\\delta x}\\right)^2$$.\n- Step 4: Take the limit: $$\\frac{ds}{dx} = \\sqrt{1 + (dy/dx)^2}$$ (positive root, since $$s$$ increases with $$x$$).\n- Step 5: Integrate over $$[x_A, x_B]$$: $$s = \\int_{x_A}^{x_B} \\sqrt{1 + (dy/dx)^2} \\, dx$$.\n\nDeep insight: arc length is the **geometric integral of the chord-length differential**; Pythagoras tells us that differential is $$\\sqrt{(dx)^2 + (dy)^2}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "State the parametric form of the arc length formula and explain how it generalizes the Cartesian form. (3 steps)", "answer": "- Step 1: For $$x = f(t)$$, $$y = g(t)$$ with $$t \\in [t_A, t_B]$$: $$s = \\int_{t_A}^{t_B} \\sqrt{(dx/dt)^2 + (dy/dt)^2} \\, dt$$.\n- Step 2: Derivation: starting from $$(\\delta s)^2 \\approx (\\delta x)^2 + (\\delta y)^2$$, divide by $$(\\delta t)^2$$ instead of $$(\\delta x)^2$$: $$\\left(\\frac{ds}{dt}\\right)^2 = (dx/dt)^2 + (dy/dt)^2$$.\n- Step 3: This generalizes the Cartesian form: setting $$t = x$$ gives $$dx/dt = 1$$ and recovers $$\\int \\sqrt{1 + (dy/dx)^2} dx$$.\n\nThe parametric form is most fundamental: it treats $$x$$ and $$y$$ symmetrically, essential for curves like circles where neither $$y(x)$$ nor $$x(y)$$ is single-valued.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Why must we take the positive square root in the arc length formula? (3 steps)", "answer": "- Step 1: Arc length is a **distance** — defined to be non-negative and to **increase** as we move along the curve.\n- Step 2: $$\\left(\\frac{ds}{dx}\\right)^2 = 1 + (dy/dx)^2$$ has two square-root solutions, but only the positive one corresponds to \"$$s$$ increasing as $$x$$ increases.\"\n- Step 3: If you used the negative root, you'd get a result that decreases over the integration interval, contradicting the geometric meaning. The positive root is enforced by convention to match intuition: walking from A to B accumulates positive distance.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "A curve has equation $$y = \\frac{1}{2}x^2$$. Walk through finding the arc length from origin to (4, 8). (4 steps)", "answer": "- Step 1: Compute $$dy/dx = x$$. So $$1 + (dy/dx)^2 = 1 + x^2$$.\n- Step 2: Set up: $$s = \\int_0^4 \\sqrt{1 + x^2} \\, dx$$.\n- Step 3: This is a hyperbolic-substitution integral. Use $$x = \\sinh u$$: $$\\sqrt{1+x^2} = \\cosh u$$, $$dx = \\cosh u \\, du$$. Integral becomes $$\\int \\cosh^2 u \\, du$$, which by double-angle reduces to $$\\frac{u}{2} + \\frac{\\sinh u \\cosh u}{2}$$.\n- Step 4: Convert limits: $$x = 0 \\to u = 0$$; $$x = 4 \\to u = \\text{arsinh}(4)$$, with $$\\sinh u = 4$$, $$\\cosh u = \\sqrt{17}$$. Final: $$s = \\frac{1}{2}\\ln(4+\\sqrt{17}) + 2\\sqrt{17}$$.\n\nThe structure: parabola arc-lengths always involve $$\\sqrt{1 + x^2}$$-type integrals, reducing via hyperbolic substitution to a combo of inverse hyperbolic + square root.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Derive the formula $$S = 2\\pi \\int y \\, ds$$ for the surface area generated by rotating an arc about the x-axis. (5 steps)", "answer": "- Step 1: A small arc $$PQ$$ rotated about the x-axis sweeps out a thin band shaped like a frustum of a cone.\n- Step 2: Lateral surface of frustum: $$\\pi(r_1 + r_2) l$$, where $$l$$ is slant. Here $$r_1 = y$$, $$r_2 = y + \\delta y$$, $$l \\approx \\delta s$$.\n- Step 3: $$\\delta S \\approx \\pi(2y + \\delta y) \\delta s \\approx 2\\pi y \\, \\delta s$$ in the limit (the $$\\delta y$$ becomes negligible).\n- Step 4: Integrate: $$S = \\int 2\\pi y \\, ds$$.\n- Step 5: Substitute the appropriate form of $$ds$$:\n+ Cartesian: $$ds = \\sqrt{1 + (dy/dx)^2} dx$$\n+ Parametric: $$ds = \\sqrt{(dx/dt)^2 + (dy/dt)^2} dt$$\n\nThe factor $$2\\pi y$$ is the **circumference** of the circle traced by the point at height $$y$$; multiplying by $$ds$$ gives \"circumference × small slant\" = small frustum strip area.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Why is the formula $$2\\pi \\int y \\, ds$$ (about x-axis) different from $$2\\pi \\int x \\, ds$$ (about y-axis)? When does it matter? (3 steps)", "answer": "- Step 1: The factor in front of $$ds$$ is always the **distance from the axis of rotation to the curve point** (the lever arm/radius).\n- Step 2: Rotating about x-axis: every point is at perpendicular distance $$y$$ from the axis, so swept circle has circumference $$2\\pi y$$.\n+ Rotating about y-axis: the perpendicular distance is $$x$$, giving circumference $$2\\pi x$$.\n- Step 3: Matters whenever the curve isn't symmetric: example for $$y = \\cosh x$$ from $$(0,1)$$ to $$(\\ln 2, 5/4)$$:\n+ About x-axis: integrand involves $$y = \\cosh x$$ → integral of $$\\cosh^2 x$$.\n+ About y-axis: integrand involves $$x$$ → integral of $$x \\cosh x$$ (different technique).\n\nConceptual takeaway: this is Pappus's theorem in disguise — surface area = perimeter × distance traveled by centroid.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "State all four versions of the surface-of-revolution formula (Cartesian and parametric, x-axis and y-axis rotations). (4 steps)", "answer": "- Step 1: **About x-axis, Cartesian**: $$S = 2\\pi \\int_{x_A}^{x_B} y \\sqrt{1 + (dy/dx)^2} \\, dx$$.\n- Step 2: **About x-axis, parametric**: $$S = 2\\pi \\int_{t_A}^{t_B} y \\sqrt{(dx/dt)^2 + (dy/dt)^2} \\, dt$$.\n- Step 3: **About y-axis, Cartesian**: $$S = 2\\pi \\int_{x_A}^{x_B} x \\sqrt{1 + (dy/dx)^2} \\, dx$$ (using $$dx$$, often more convenient) OR $$S = 2\\pi \\int_{y_A}^{y_B} x \\sqrt{1 + (dx/dy)^2} \\, dy$$ (using $$dy$$).\n- Step 4: **About y-axis, parametric**: $$S = 2\\pi \\int_{t_A}^{t_B} x \\sqrt{(dx/dt)^2 + (dy/dt)^2} \\, dt$$.\n\nMemory aid: always $$2\\pi \\cdot (\\text{distance from axis}) \\cdot ds$$. The radical part $$ds$$ is the same as in arc length; only the lever-arm factor ($$y$$ or $$x$$) changes.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "Compare strategies for these three: $$\\int \\frac{1}{x^2+9} dx$$, $$\\int \\frac{1}{\\sqrt{x^2+9}} dx$$, $$\\int \\frac{1}{\\sqrt{9-x^2}} dx$$. What single distinction guides your choice? (4 steps)", "answer": "- Step 1: $$\\int \\frac{1}{x^2 + 9} dx$$: standard form 13 with $$a = 3$$, gives $$\\frac{1}{3}\\arctan(x/3) + C$$ (note 1/a factor).\n- Step 2: $$\\int \\frac{1}{\\sqrt{x^2 + 9}} dx$$: standard form 14 with $$a = 3$$, gives $$\\text{arsinh}(x/3) + C$$ (no 1/a factor).\n- Step 3: $$\\int \\frac{1}{\\sqrt{9 - x^2}} dx$$: standard form 12 with $$a = 3$$, gives $$\\arcsin(x/3) + C$$.\n- Step 4: The single distinction is the **shape of the denominator**:\n+ Squared denominator (no surd) → arctan with 1/a factor.\n+ Squared root with addition → arsinh, no factor.\n+ Square root with $$x^2$$ subtracted → arcsin.\n+ Square root with $$a^2$$ subtracted → arcosh.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "A definite integral evaluates to $$\\text{arsinh}(2) - \\text{arsinh}(1)$$. How do you simplify this to a single expression? (3 steps)", "answer": "- Step 1: Use the logarithmic form $$\\text{arsinh } x = \\ln(x + \\sqrt{1 + x^2})$$. So $$\\text{arsinh } 2 = \\ln(2 + \\sqrt{5})$$ and $$\\text{arsinh } 1 = \\ln(1 + \\sqrt{2})$$.\n- Step 2: The difference: $$\\ln(2 + \\sqrt{5}) - \\ln(1 + \\sqrt{2}) = \\ln\\left(\\frac{2 + \\sqrt{5}}{1 + \\sqrt{2}}\\right)$$ using log laws.\n- Step 3: This single-log form is the cleanest answer; sometimes you can rationalize the fraction further.\n\nGeneral principle: combining inverse hyperbolic differences uses (i) the log form, then (ii) $$\\ln a - \\ln b = \\ln(a/b)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "What are the two main strategies for handling integrands like $$\\int \\frac{1}{\\text{quadratic}} dx$$, and how do you decide between them? (3 steps)", "answer": "- Step 1: **Partial fractions**: works when the quadratic factors over reals (positive discriminant). Split into linear-denominator pieces, each → log.\n+ **Completing the square**: works always, and especially when the quadratic doesn't factor (negative discriminant) — gives $$(x+b)^2 + c^2$$ form → arctan.\n- Step 2: How to decide: check the discriminant. If $$q^2 - 4pr > 0$$, factor and use partial fractions. If $$< 0$$, complete the square. If $$= 0$$, the quadratic is a perfect square → reduces to $$1/(x+b)^2$$.\n- Step 3: For $$\\int \\frac{1}{\\sqrt{\\text{quadratic}}} dx$$, partial fractions don't apply — always complete the square to match arcsin/arsinh/arcosh.\n\nEven when both methods work for the unsurd case, the choice is mostly cosmetic; partial fractions are more \"algebraic,\" completing the square is more \"geometric.\"", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "Why does the substitution $$u = \\sin x$$ or $$u = \\cos x$$ work for $$\\int \\sin^n x \\cos^m x \\, dx$$ when at least one of n, m is odd, but fail when both are even? (3 steps)", "answer": "- Step 1: If $$m$$ is odd, write $$\\cos^m x = \\cos^{m-1} x \\cdot \\cos x$$. The $$\\cos^{m-1} x$$ has even power, expressible via $$\\cos^2 = 1 - \\sin^2$$ in terms of $$\\sin x$$. The lone $$\\cos x \\, dx$$ becomes $$d(\\sin x)$$ — perfect for $$u = \\sin x$$.\n- Step 2: Symmetrically for $$n$$ odd: peel off one $$\\sin x$$ to get $$d(\\cos x) = -\\sin x \\, dx$$, use $$u = \\cos x$$.\n- Step 3: When both are even, no factor peels off cleanly. You must use power-reduction identities ($$\\sin^2 x = (1 - \\cos 2x)/2$$, $$\\cos^2 x = (1 + \\cos 2x)/2$$) to convert to lower-frequency cosines.\n\nThis pattern carries over directly to hyperbolic powers — same parity rules.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Why is the formula $$2\\pi \\int y \\, ds$$ NOT directly applicable if the curve crosses the axis of rotation? What goes wrong? (3 steps)", "answer": "- Step 1: The formula assumes $$y \\geq 0$$ throughout, so all points stay on one side of the axis and the swept-out frustum band has circumference $$2\\pi y$$.\n- Step 2: If the curve crosses the x-axis (i.e., $$y$$ changes sign), problems arise:\n+ **Cancellation**: where $$y < 0$$, the formula treats \"$$2\\pi y \\, ds$$\" as negative, but physical surface area is always positive.\n+ **Self-intersection**: the surface from negative-$$y$$ part overlaps with positive-$$y$$ part, double-counting.\n- Step 3: Fix: split the integral at zero-crossings and use $$|y|$$, or compute the surfaces separately. So $$S = 2\\pi \\int |y| \\, ds$$ in general.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Compare $$\\int \\frac{1}{1-x^2} dx$$ vs $$\\int \\frac{1}{\\sqrt{1-x^2}} dx$$. Same expression under root or not — but completely different answers. Explain. (3 steps)", "answer": "- Step 1: $$\\int \\frac{1}{1-x^2} dx$$: standard form 16 with $$a = 1$$. Result: $$\\frac{1}{2}\\ln\\left|\\frac{1+x}{1-x}\\right| + C$$. Equivalent to $$\\text{artanh } x$$ for $$|x| < 1$$.\n- Step 2: $$\\int \\frac{1}{\\sqrt{1-x^2}} dx$$: standard form 8. Result: $$\\arcsin x + C$$.\n- Step 3: Fundamental difference:\n+ The first has quadratic in denominator; partial fractions $$\\frac{1}{1-x^2} = \\frac{1/2}{1-x} + \\frac{1/2}{1+x}$$ → both pieces become logs.\n+ The second has square root in denominator; not separable by partial fractions; antiderivative is arcsin.\n\nPedagogical note: presence/absence of the square root completely changes the antiderivative class. **Square root → trig inverse; no root → log/artanh.**", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "Walk through systematic approach for $$\\int \\frac{2x+3}{x^2+4} dx$$. (4 steps)", "answer": "- Step 1: Inspect structure: numerator has both \"$$2x$$\" (looks like derivative of $$x^2 + 4$$) and \"$$3$$\" (constant). Suggests **splitting**.\n- Step 2: Split: $$\\int \\frac{2x+3}{x^2+4} dx = \\int \\frac{2x}{x^2+4} dx + \\int \\frac{3}{x^2+4} dx$$.\n- Step 3: First piece: $$2x = (x^2+4)'$$, so $$\\int \\frac{2x}{x^2+4} dx = \\ln(x^2+4)$$ (no modulus, since $$x^2+4 > 0$$).\n- Step 4: Second piece: standard form 13 with $$a = 2$$: $$\\int \\frac{3}{x^2+4} dx = \\frac{3}{2}\\arctan(x/2)$$.\n+ Combined: $$\\ln(x^2+4) + \\frac{3}{2}\\arctan(x/2) + C$$.\n\nSystematic approach: (i) check numerator = derivative-of-denominator → log/power. (ii) Check denominator standard form → arctan/arcsin. (iii) Split mixed numerators.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "When deriving a reduction formula via integration by parts, how do you choose what to make \"u\" and what to make \"dv/dx\"? (3 steps)", "answer": "- Step 1: General principle: choose **\"u\" to be something whose derivative simplifies** (or relates to a lower-index version). Choose **\"dv/dx\" to be something easy to integrate**.\n- Step 2: For $$I_n = \\int x^n e^x \\, dx$$: pick $$u = x^n$$ (derivative drops power to $$n-1$$) and $$dv/dx = e^x$$ (integrates trivially).\n+ For $$I_n = \\int \\sin^n x \\, dx$$: pick $$u = \\sin^{n-1} x$$ (derivative gives $$\\sin^{n-2} x$$) and $$dv/dx = \\sin x$$ (integrates to $$-\\cos x$$).\n- Step 3: Philosophy: **\"u\" should be the part you wish would go away; \"dv\" should be the part you can handle**. For powers, \"u = power\" works; the derivative reduces the power.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "Test the reduction formula $$nI_n = (n-1)I_{n-2}$$ for $$I_n = \\int_0^{\\pi/2} \\sin^n x \\, dx$$ by computing $$I_2$$ both ways. (3 steps)", "answer": "- Step 1: From the formula: $$2 I_2 = (2-1) I_0$$, where $$I_0 = \\int_0^{\\pi/2} 1 \\, dx = \\pi/2$$. So $$I_2 = \\pi/4$$.\n- Step 2: Direct computation: $$I_2 = \\int_0^{\\pi/2} \\sin^2 x \\, dx = \\int_0^{\\pi/2} \\frac{1 - \\cos 2x}{2} dx = \\frac{1}{2}\\left[x - \\frac{\\sin 2x}{2}\\right]_0^{\\pi/2} = \\frac{\\pi}{4}$$.\n- Step 3: Both match ✓. This provides a sanity check for the reduction formula.\n\nThe takeaway: $$I_2 = \\pi/4$$ is a useful benchmark for memorization and verification.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "For the curve $$y = 2\\cosh(x/2)$$, what's special about the arc length integrand that makes it especially clean? (3 steps)", "answer": "- Step 1: Compute $$dy/dx = \\sinh(x/2)$$. Then $$1 + (dy/dx)^2 = 1 + \\sinh^2(x/2) = \\cosh^2(x/2)$$ (Pythagorean hyperbolic identity).\n- Step 2: Arc length integrand: $$\\sqrt{\\cosh^2(x/2)} = \\cosh(x/2)$$ (positive square root, since cosh > 0). The surd vanishes!\n- Step 3: Arc length is $$\\int \\cosh(x/2) dx = 2\\sinh(x/2) + C$$ — trivial.\n\nThis is a deep property of the catenary $$y = a\\cosh(x/a)$$: arc length is naturally expressible via sinh, with no surds. This makes catenaries appear in physics (hanging chains, suspension bridges) — they have \"self-similar\" geometric properties.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "Why might one prefer the parametric arc-length formula over Cartesian for circles? (3 steps)", "answer": "- Step 1: A circle $$x^2 + y^2 = r^2$$ in Cartesian form requires $$y = \\pm\\sqrt{r^2 - x^2}$$ — multi-valued. Each branch must be integrated separately, with vertical-tangent issues at $$x = \\pm r$$ (where $$dy/dx \\to \\infty$$).\n- Step 2: In parametric form $$x = r\\cos\\theta$$, $$y = r\\sin\\theta$$: the integrand $$\\sqrt{(-r\\sin\\theta)^2 + (r\\cos\\theta)^2} = r$$ — constant! Then $$s = \\int_0^{2\\pi} r \\, d\\theta = 2\\pi r$$. Clean and singularity-free.\n- Step 3: Lesson: for curves with multi-valuedness or vertical tangents, parametric forms tame the geometry. The parameter \"lifts\" the curve into a single-valued representation.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "A region bounded by $$y = \\sinh x$$, $$x = 1$$, and the x-axis is rotated about the x-axis. What's the conceptual setup for finding the volume? (3 steps)", "answer": "- Step 1: Volume by disk method: $$V = \\pi \\int_a^b y^2 \\, dx$$. Here $$y^2 = \\sinh^2 x$$, so $$V = \\pi \\int_0^1 \\sinh^2 x \\, dx$$.\n- Step 2: Use the identity $$\\sinh^2 x = \\frac{\\cosh 2x - 1}{2}$$ to make integrable: $$V = \\frac{\\pi}{2} \\int_0^1 (\\cosh 2x - 1) dx = \\frac{\\pi}{2}\\left[\\frac{\\sinh 2x}{2} - x\\right]_0^1 = \\frac{\\pi}{4}(\\sinh 2 - 2)$$.\n- Step 3: In exponential form: $$\\sinh 2 = (e^2 - e^{-2})/2$$, giving $$\\frac{\\pi}{8e^2}(e^4 - 4e^2 - 1)$$.\n\nThe general technique: convert powers of sinh, cosh via double-angle identities, then evaluate. Same Pythagorean-trick philosophy applies to volumes too.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "Why does $$\\int \\sec^3 x \\, dx$$ require integration by parts that \"loops\"? (4 steps)", "answer": "- Step 1: Direct spotting fails — the integrand isn't of obvious $$f'(x)[f(x)]^n$$ or $$f'(x)/f(x)$$ form.\n- Step 2: Try IBP with $$u = \\sec x$$, $$dv/dx = \\sec^2 x$$: $$du/dx = \\sec x \\tan x$$, $$v = \\tan x$$. Result: $$\\int \\sec^3 x = \\sec x \\tan x - \\int \\sec x \\tan^2 x \\, dx$$.\n- Step 3: Use $$\\tan^2 x = \\sec^2 x - 1$$: residual becomes $$\\int (\\sec^3 x - \\sec x) dx$$. So $$\\int \\sec^3 x = \\sec x \\tan x - \\int \\sec^3 x + \\int \\sec x$$.\n- Step 4: The integral $$\\int \\sec^3 x$$ appears on both sides! Solve algebraically: $$2\\int \\sec^3 x = \\sec x \\tan x + \\ln|\\sec x + \\tan x|$$, giving $$\\int \\sec^3 x = \\frac{1}{2}(\\sec x \\tan x + \\ln|\\sec x + \\tan x|) + C$$.\n\nThis is a **looping IBP**: you solve for the integral via algebra. The reduction formula $$(n-1)I_n = \\sec^{n-2} x \\tan x + (n-2) I_{n-2}$$ generalizes this exact loop.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": true}, {"question": "Why is rotating $$\\int \\sqrt{1+x^2} dx$$ via $$x = \\sinh u$$ a \"good\" substitution? (3 steps)", "answer": "- Step 1: **The surd vanishes**: $$\\sqrt{1 + x^2}$$ becomes $$\\sqrt{\\cosh^2 u} = \\cosh u$$ — the awkward part is now a single function.\n- Step 2: **The differential is clean**: $$dx = \\cosh u \\, du$$. So $$\\sqrt{1+x^2} \\, dx$$ becomes $$\\cosh^2 u \\, du$$ — clean polynomial in $$\\cosh u$$.\n- Step 3: **The new integrand is integrable**: $$\\cosh^2 u = (1 + \\cosh 2u)/2$$, immediate integration.\n\nContrast: $$x = \\tan\\theta$$ would also kill the surd but lead to $$\\sec^3 \\theta$$, requiring its own elaborate IBP. The hyperbolic substitution wins because $$\\cosh^2$$ is more tractable than $$\\sec^3$$.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "Compare these two integrals: $$\\int \\frac{1}{\\sqrt{x^2+4}} dx$$ vs $$\\int \\frac{x}{\\sqrt{x^2+4}} dx$$. (3 steps)", "answer": "- Step 1: $$\\int \\frac{1}{\\sqrt{x^2 + 4}} dx$$: constant numerator, form 14 with $$a = 2$$: $$\\text{arsinh}(x/2) + C$$.\n- Step 2: $$\\int \\frac{x}{\\sqrt{x^2+4}} dx$$: numerator $$x = \\frac{1}{2}(x^2+4)'$$, so this is $$\\frac{1}{2} \\int f'(x) [f(x)]^{-1/2} dx = \\sqrt{x^2 + 4} + C$$.\n- Step 3: Same denominator, totally different antiderivative families:\n+ Constant numerator → inverse hyperbolic (arsinh) — involves a logarithm-like function.\n+ Derivative-companion numerator → square root — algebraic, no logs.\n\nThe takeaway: never pattern-match on the denominator alone; always check what the numerator is doing.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": true}, {"question": "Quick recall: integrate $$\\int \\text{sech}^2(2x-1) dx$$ mentally.", "answer": "Recognize $$\\int \\text{sech}^2 u \\, du = \\tanh u + C$$. With linear argument $$2x - 1$$, apply the $$1/a$$ correction from the chain rule reversal: $$\\int \\text{sech}^2(2x-1) dx = \\frac{1}{2}\\tanh(2x-1) + C$$. The $$\\frac{1}{2}$$ comes from the fact that $$\\frac{d}{dx}[\\tanh(2x-1)] = 2 \\, \\text{sech}^2(2x-1)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "Quickly: $$\\int \\frac{1}{\\sqrt{4 - x^2}} dx$$ — match the standard form.", "answer": "This is form 12 with $$a = 2$$, giving $$\\arcsin(x/2) + C$$. Mental check: $$\\frac{d}{dx}\\arcsin(x/2) = \\frac{1/2}{\\sqrt{1 - (x/2)^2}} = \\frac{1/2}{\\sqrt{1 - x^2/4}} = \\frac{1}{\\sqrt{4-x^2}}$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": false}, {"question": "$$\\int \\frac{x}{\\sqrt{x^2 - 9}} dx$$ — quick conceptual workthrough. (2 steps)", "answer": "- Step 1: Recognize $$x = \\frac{1}{2} \\cdot 2x$$, where $$2x = (x^2-9)'$$. So this is $$\\frac{1}{2}\\int (x^2-9)^{-1/2} \\cdot 2x \\, dx = \\frac{1}{2} \\cdot 2\\sqrt{x^2-9}$$.\n- Step 2: Result: $$\\sqrt{x^2-9} + C$$. Don't confuse with arcosh — that requires constant numerator.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": false}, {"question": "$$\\int \\arctan x \\, dx$$ for ABLE: walk through $$I_3$$ for the reduction $$I_n = x^n e^x - n I_{n-1}$$. Find $$\\int x^3 e^x \\, dx$$. (3 steps)", "answer": "- Step 1: We have $$I_3 = x^3 e^x - 3 I_2$$.\n- Step 2: Cascade down: $$I_2 = x^2 e^x - 2 I_1$$, $$I_1 = xe^x - I_0$$, $$I_0 = e^x$$.\n+ So $$I_1 = (x-1)e^x$$, $$I_2 = (x^2 - 2x + 2)e^x$$.\n- Step 3: Substitute back: $$I_3 = x^3 e^x - 3(x^2 - 2x + 2)e^x = (x^3 - 3x^2 + 6x - 6)e^x + C$$.\n\nNotice the polynomial coefficients $$1, -3, 6, -6$$ — the alternating signs from successive applications of the formula, with magnitudes growing factorially.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": false}, {"question": "What's the astroid (asteroid) curve, and what makes its parametric arc length particularly elegant? (3 steps)", "answer": "- Step 1: Astroid: $$x = a\\cos^3 t$$, $$y = a\\sin^3 t$$ for $$t \\in [0, 2\\pi]$$. A four-cusped star-shaped curve.\n- Step 2: Compute: $$dx/dt = -3a\\cos^2 t \\sin t$$, $$dy/dt = 3a\\sin^2 t \\cos t$$. Squaring and adding: $$(dx/dt)^2 + (dy/dt)^2 = 9a^2 \\sin^2 t \\cos^2 t (\\cos^2 t + \\sin^2 t) = 9a^2 \\sin^2 t \\cos^2 t$$.\n- Step 3: The Pythagorean identity collapses everything! So $$\\sqrt{(dx/dt)^2 + (dy/dt)^2} = 3a|\\sin t \\cos t| = \\frac{3a}{2}|\\sin 2t|$$. Total perimeter: $$\\int_0^{2\\pi} \\frac{3a}{2}|\\sin 2t| dt = 6a$$.\n\nThe conceptual point: parametric curves with trigonometric-power coordinates often have arc-length integrands that reduce to elementary trig integrals because of the Pythagorean identity at the core.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": true}, {"question": "When rotating $$y = \\cosh x$$ about the y-axis, why is integration by parts needed? (4 steps)", "answer": "- Step 1: For rotation about y-axis: $$S = 2\\pi \\int x \\, ds$$. With $$ds = \\sqrt{1 + \\sinh^2 x} dx = \\cosh x \\, dx$$.\n- Step 2: $$S = 2\\pi \\int x \\cosh x \\, dx$$. Notice the $$x$$ in the integrand (not $$y$$) — the lever-arm distance from the y-axis.\n- Step 3: Integration by parts: $$u = x$$, $$dv/dx = \\cosh x$$, giving $$v = \\sinh x$$. So $$\\int x \\cosh x \\, dx = x \\sinh x - \\int \\sinh x \\, dx = x \\sinh x - \\cosh x$$.\n- Step 4: Apply with limits to get specific values.\n\nThis differs from rotation about x-axis (where integrand would be $$\\cosh^2 x$$, requiring a double-angle reduction). The choice of axis changes the integration technique entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": true}, {"question": "What's the geometric meaning of $$S = 2\\pi \\int y \\, ds$$ via Pappus's theorem? (3 steps)", "answer": "- Step 1: Pappus's theorem: **the surface area of a body of revolution equals the perimeter of the rotating curve times the distance traveled by its centroid**. In symbols: $$S = L \\times 2\\pi\\bar{y}$$.\n- Step 2: The integral form: writing $$\\bar{y} = \\frac{\\int y \\, ds}{L}$$, we get $$S = L \\cdot 2\\pi \\cdot \\frac{\\int y \\, ds}{L} = 2\\pi \\int y \\, ds$$.\n- Step 3: Conceptually:\n+ Each point at height $$y$$ traces a circle of circumference $$2\\pi y$$ when rotated.\n+ A small arc element $$ds$$ at height $$y$$ contributes a band of area $$2\\pi y \\cdot ds$$.\n+ Sum (integrate) all contributions.\n\nThe deep insight: each \"$$2\\pi y$$\" is a circumference, each \"$$ds$$\" is a slant — multiplying gives a strip area, integrating sums all strips.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": true}, {"question": "The catenary $$y = a\\cosh(x/a)$$ has a fascinating property tying together its shape, slope, and arc length. State and explain. (3 steps)", "answer": "- Step 1: For the catenary, $$dy/dx = \\sinh(x/a)$$. So $$1 + (dy/dx)^2 = \\cosh^2(x/a) = (y/a)^2$$. The arc length differential $$ds = (y/a) \\, dx$$.\n- Step 2: This means $$ds/dx = y/a$$ — the rate of arc length growth equals the height divided by $$a$$. Equivalently: $$y \\cdot dx = a \\cdot ds$$.\n- Step 3: Geometric consequence: integrating, $$\\int y \\, dx = a \\cdot s$$ — the area under the curve is $$a$$ times the arc length! This is unique to the catenary.\n\nWhy this is physical: a hanging chain forms a catenary because tension at each point balances the weight hanging below. The weight is proportional to arc length ($$s$$), and the equilibrium expresses tension in terms of $$y$$.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": true}, {"question": "Compare $$\\int \\text{sech}^2 x \\, dx$$ (gives tanh x) with $$\\int \\sec^2 x \\, dx$$ (gives tan x). Why is the parallel so clean here but messier for $$\\int \\text{sech } x$$ vs $$\\int \\sec x$$? (3 steps)", "answer": "- Step 1: For sech² ↔ sec²: both are direct standard integrals because $$\\frac{d}{dx}\\tanh x = \\text{sech}^2 x$$ exactly mirrors $$\\frac{d}{dx}\\tan x = \\sec^2 x$$. Clean parallel.\n- Step 2: For sech vs sec: the trick for $$\\int \\sec x \\, dx$$ relies on $$\\frac{d}{dx}(\\sec x + \\tan x) = \\sec x(\\sec x + \\tan x)$$. This algebraic miracle gives $$\\ln|\\sec x + \\tan x|$$.\n+ The hyperbolic analogue $$\\text{sech } x + \\tanh x$$ doesn't have the same magic — derivative of sech has a minus sign, breaking cancellation.\n- Step 3: Lesson: trig identities have specific sign patterns allowing \"self-amplifying\" tricks; hyperbolic identities have different signs. So sech requires the exponential-form detour.\n\n**Don't assume hyperbolic methods perfectly mirror trig methods** — they mostly do for direct results, but tricky integrals diverge.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": true}, {"question": "When can you derive a reduction formula WITHOUT integration by parts? (3 steps)", "answer": "- Step 1: When you have a polynomial identity that splits the integrand into one piece that becomes $$I_n$$ multiplied by a constant, and another piece that's $$I_{n-2}$$ (or $$I_{n-1}$$).\n- Step 2: Examples:\n+ $$\\int \\tan^n x \\, dx$$: use $$\\tan^2 x = \\sec^2 x - 1$$ to split $$\\tan^n = \\tan^{n-2}\\sec^2 - \\tan^{n-2}$$. First term integrates via $$f'f^{n-2}$$; second is $$I_{n-2}$$.\n+ $$\\int \\tanh^n x \\, dx$$: use $$\\tanh^2 x = 1 - \\text{sech}^2 x$$ analogously.\n- Step 3: General principle: any \"Pythagorean-style\" identity that converts a power-of-function to (lower-power) plus (its derivative) gives a reduction without IBP.\n\nWhen IBP IS needed: when the integrand has a polynomial factor (like $$x^n$$) needing differentiation, with no algebraic-identity shortcut.", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": true}, {"question": "Walk through $$\\int_0^6 \\frac{x^3}{\\sqrt{x^2+9}} dx$$ using $$x = 3\\sinh u$$ — conceptual steps. (4 steps)", "answer": "- Step 1: Recognize the form: $$\\sqrt{x^2 + 9}$$ suggests $$x = 3\\sinh u$$. Then $$x^2 + 9 = 9\\cosh^2 u$$, $$\\sqrt{x^2+9} = 3\\cosh u$$, $$dx = 3\\cosh u \\, du$$.\n- Step 2: Substitute: numerator $$x^3 = 27\\sinh^3 u$$, dividing by $$3\\cosh u$$ gives $$9\\sinh^3 u/\\cosh u$$, then multiply by $$dx$$ → $$27\\sinh^3 u \\, du$$. The $$\\cosh$$ factors cancel completely!\n- Step 3: New integral: $$27 \\int \\sinh^3 u \\, du$$. Use the odd-power technique: $$\\sinh^3 u = (\\cosh^2 u - 1)\\sinh u$$, then $$v = \\cosh u$$ substitution.\n- Step 4: Convert limits: $$x=0 \\to u=0$$; $$x=6 \\to \\sinh u = 2$$, $$\\cosh u = \\sqrt{5}$$. Evaluate the polynomial in $$\\cosh u$$.\n\nCubic-on-surd integrals reduce to polynomial-in-cosh integrals via hyperbolic substitution, which then reduce via odd-power tricks.", "source": "Opus 4.7 ②", "_id": "opus_2_70", "judge_pick": false}, {"question": "What kind of curves are NOT rectifiable in elementary terms? (3 steps)", "answer": "- Step 1: **Rectifiable in elementary terms** = arc length expressible via finite combination of polynomials, exponentials, logs, trig, inverse trig, hyperbolic, inverse hyperbolic.\n- Step 2: Non-elementary cases:\n+ **Ellipse** $$x = a\\cos t$$, $$y = b\\sin t$$ with $$a \\neq b$$: arc length involves the famous **elliptic integral** $$\\int \\sqrt{a^2\\sin^2 t + b^2 \\cos^2 t} dt$$ — not expressible in elementary functions.\n+ **General sin curve** $$y = \\sin x$$: arc length per period also requires elliptic integrals.\n+ Most polynomial curves $$y = x^n$$ for arbitrary $$n$$.\n- Step 3: Elementary cases (exceptions): parabolas, catenaries, $$y = ax^{3/2}$$, semicircles, and parametric curves designed so $$(dx/dt)^2 + (dy/dt)^2$$ is a perfect square.\n\nMost \"real-world\" curves have non-elementary arc lengths, requiring numerical integration. Textbook examples are usually constructed to be rectifiable.", "source": "Opus 4.7 ②", "_id": "opus_2_71", "judge_pick": true}, {"question": "Why do arc length integrals often involve hyperbolic functions (arsinh, arcosh)? (3 steps)", "answer": "- Step 1: Arc length integrands have the form $$\\sqrt{1 + (dy/dx)^2}$$ — square root of \"1 plus something squared\".\n- Step 2: This pairs naturally with hyperbolic substitutions because $$\\cosh^2 u - \\sinh^2 u = 1$$ rearranges to $$1 + \\sinh^2 u = \\cosh^2 u$$. So if $$dy/dx$$ matches $$\\sinh u$$, the surd becomes $$\\cosh u$$ cleanly.\n- Step 3: Examples:\n+ Parabola $$y = x^2/2$$: $$dy/dx = x$$, integrand $$\\sqrt{1+x^2}$$ → arsinh.\n+ Catenary $$y = a\\cosh(x/a)$$: integrand simplifies to $$\\cosh(x/a)$$ via $$1+\\sinh^2 = \\cosh^2$$.\n\nThe deeper structure: the unit hyperbola $$X^2 - Y^2 = 1$$ is the natural geometric setting for \"$$1$$ + square\" expressions; hyperbolic functions parameterize it. Arc length, being Pythagorean, naturally lives in this geometric universe.", "source": "Opus 4.7 ②", "_id": "opus_2_72", "judge_pick": true}, {"question": "Why is $$\\int \\frac{1}{\\sinh x + \\cosh x} dx$$ so simple? (3 steps)", "answer": "- Step 1: Use exponential form: $$\\sinh x + \\cosh x = \\frac{e^x - e^{-x}}{2} + \\frac{e^x + e^{-x}}{2} = e^x$$. The combination collapses to a single exponential!\n- Step 2: So the integral becomes $$\\int \\frac{1}{e^x} dx = \\int e^{-x} dx = -e^{-x} + C$$.\n- Step 3: This is the cleanest example of the principle: hyperbolic combinations often simplify dramatically when written in exponential form.\n\nBonus identities: $$\\cosh x + \\sinh x = e^x$$, $$\\cosh x - \\sinh x = e^{-x}$$. These are foundational for hyperbolic manipulation.", "source": "Opus 4.7 ②", "_id": "opus_2_73", "judge_pick": true}, {"question": "Use IBP to find $$\\int \\arcosh x \\, dx$$. Why is the residual integral simpler? (3 steps)", "answer": "- Step 1: IBP setup: $$u = \\text{arcosh } x$$, $$dv/dx = 1$$, giving $$du/dx = \\frac{1}{\\sqrt{x^2-1}}$$, $$v = x$$.\n- Step 2: $$\\int \\text{arcosh } x \\, dx = x \\, \\text{arcosh } x - \\int \\frac{x}{\\sqrt{x^2-1}} dx$$. The residual has numerator $$x = \\frac{1}{2}(x^2-1)'$$ — the $$f'f^{-1/2}$$ pattern.\n- Step 3: $$\\int \\frac{x}{\\sqrt{x^2-1}} dx = \\sqrt{x^2-1}$$. So $$\\int \\text{arcosh } x \\, dx = x \\, \\text{arcosh } x - \\sqrt{x^2-1} + C$$.\n\nWhy simpler: the residual is structurally a power-of-function integral, not another arcosh integral. IBP-on-inverse-function trades the hard inverse function for an easier polynomial-in-radical residual.", "source": "Opus 4.7 ②", "_id": "opus_2_74", "judge_pick": false}, {"question": "Why is integration by parts for $$\\int x^n \\sin x \\, dx$$ more elaborate than for $$\\int x^n e^x \\, dx$$? (3 steps)", "answer": "- Step 1: With $$\\int x^n e^x \\, dx$$: IBP gives $$I_n = x^n e^x - n I_{n-1}$$ — one step, perfect reduction. Why? Because $$e^x$$ is the eigenfunction of differentiation: it integrates back to itself.\n- Step 2: With $$\\int x^n \\sin x \\, dx$$: IBP gives $$-x^n \\cos x + n \\int x^{n-1} \\cos x \\, dx$$. The residual now has $$\\cos x$$ — different family. Need ANOTHER IBP to return to a sin-power integral.\n- Step 3: The two-IBP pattern: $$\\int x^n \\sin x \\to \\int x^{n-1} \\cos x \\to \\int x^{n-2} \\sin x$$ — jump of 2 in power.\n\nThe deep reason: **trig functions cycle every two derivatives** ($$\\sin \\to \\cos \\to -\\sin \\to ...$$), while exponentials are eigenfunctions. The cycle length determines how many IBPs are needed.", "source": "Opus 4.7 ②", "_id": "opus_2_75", "judge_pick": true}, {"question": "Quick conceptual: $$\\int \\frac{2x}{\\sqrt{1 + x^2}} dx$$ — what's the recognition? (3 steps)", "answer": "- Step 1: Set $$f(x) = 1 + x^2$$, so $$f'(x) = 2x$$ — exactly the numerator. The integrand is $$f'(x)[f(x)]^{-1/2}$$.\n- Step 2: Apply $$\\int f'(x)[f(x)]^n dx = \\frac{[f(x)]^{n+1}}{n+1}$$ with $$n = -1/2$$: result is $$\\frac{(1+x^2)^{1/2}}{1/2} = 2\\sqrt{1+x^2}$$.\n- Step 3: So $$\\int \\frac{2x}{\\sqrt{1+x^2}} dx = 2\\sqrt{1+x^2} + C$$.\n\nAnti-pattern: do NOT confuse with arsinh — that requires CONSTANT numerator, not numerator proportional to derivative.", "source": "Opus 4.7 ②", "_id": "opus_2_76", "judge_pick": false}, {"question": "Choosing axis form: rotating about the y-axis, when use $$dx$$ vs $$dy$$ form? (3 steps)", "answer": "- Step 1: Both forms give the same answer:\n+ $$S = 2\\pi \\int_{x_A}^{x_B} x \\sqrt{1 + (dy/dx)^2} \\, dx$$\n+ $$S = 2\\pi \\int_{y_A}^{y_B} x \\sqrt{1 + (dx/dy)^2} \\, dy$$\n- Step 2: Choose based on:\n+ Which derivative is easier (depends on whether $$y = f(x)$$ or $$x = g(y)$$ is given).\n+ Which integration limits are simpler.\n+ Whether the curve has vertical tangents (use $$dy$$ if so).\n- Step 3: For most textbook examples, integrating with $$dx$$ is more convenient since $$y = f(x)$$ is the typical starting form.", "source": "Opus 4.7 ②", "_id": "opus_2_77", "judge_pick": false}, {"question": "Arrange these techniques in order to try when faced with an unfamiliar integrand: standard form, $$f'/f$$, $$f' \\cdot f^n$$, partial fractions, completing the square, trig/hyp substitution, IBP, exponential form, reduction formula. Why this order? (4 steps)", "answer": "- Step 1: **Try direct first**: is it a standard integral or a linear-argument generalization? Zero effort if yes.\n- Step 2: **Pattern-match next**: $$f'(x)/f(x)$$ → log; $$f'(x)[f(x)]^n$$ → power. Usually obvious once checked.\n- Step 3: **Algebraic manipulation**: partial fractions for factorable rational integrands; completing the square for non-factorable quadratics; splitting numerators for \"mixed\" cases.\n- Step 4: **Substitutions and tools**: trig/hyp substitution for surds of quadratics; IBP for products like $$x \\cdot \\text{(function)}$$ or for inverse functions; exponential form when hyperbolic identities don't help; reduction formulae for parameterized families.\n\nReasoning: simplest tools first. Standard forms are zero-effort; algebraic moves are next-cheapest; substitutions and IBP need more setup; reduction is the heavy machinery.", "source": "Opus 4.7 ②", "_id": "opus_2_78", "judge_pick": true}, {"question": "A curve has equation $$y = \\frac{1}{3}x^{3/2}$$ from origin to $$x = 12$$. Why does this arc length integral come out clean? (3 steps)", "answer": "- Step 1: $$dy/dx = \\frac{1}{2}x^{1/2}$$, so $$(dy/dx)^2 = x/4$$.\n- Step 2: $$1 + (dy/dx)^2 = 1 + x/4$$. Integrand is $$\\sqrt{1 + x/4}$$ — a simple **power function**, no surd of a quadratic.\n- Step 3: Substitute $$u = 1 + x/4$$: integral reduces to $$\\int \\sqrt{u} \\cdot 4 du = \\frac{8}{3}u^{3/2}$$. Clean elementary integral.\n\nThe cleanness comes from the curve being designed so $$(dy/dx)^2$$ is linear in $$x$$. Generally, $$y = ax^{3/2}$$ produces arc lengths reducible to elementary power integrals — a special \"rectifiable by elementary means\" case.", "source": "Opus 4.7 ②", "_id": "opus_2_79", "judge_pick": true}, {"question": "Why does $$\\int 1/(1-x^2) dx$$ give a logarithm but $$\\int 1/\\sqrt{1-x^2} dx$$ give arcsin? Geometric distinction. (3 steps)", "answer": "- Step 1: **arcsin and friends** parameterize the **unit circle** $$X^2 + Y^2 = 1$$. The integral $$\\int 1/\\sqrt{1-x^2} dx$$ measures the angle subtended — the **arc length parameter** on the circle.\n- Step 2: **Logarithms** arise from the **rectangular hyperbola** $$X^2 - Y^2 = 1$$ (or $$X \\cdot Y = 1$$). The integral $$\\int 1/(1-x^2) dx$$ is related to the **rapidity** parameter (artanh).\n- Step 3: The square root marks **circular vs hyperbolic geometry**: with the root, you measure circular angles (arcsin/arctan); without, you measure hyperbolic-angle-like quantities (artanh = log form).\n\nBoth are inverse functions of geometric coordinates, just on different conic sections.", "source": "Opus 4.7 ②", "_id": "opus_2_80", "judge_pick": true}, {"question": "Show the parallel between cos-power and sin-power reductions, and explain why definite integrals from 0 to π/2 give the same value. (3 steps)", "answer": "- Step 1: Same reduction formula structure: $$nI_n = (n-1)I_{n-2}$$ for both $$\\int_0^{\\pi/2} \\cos^n x \\, dx$$ and $$\\int_0^{\\pi/2} \\sin^n x \\, dx$$. Same derivation method (IBP + Pythagorean identity).\n- Step 2: The definite integrals are EQUAL: $$\\int_0^{\\pi/2} \\sin^n x \\, dx = \\int_0^{\\pi/2} \\cos^n x \\, dx$$ via the substitution $$u = \\pi/2 - x$$ (which converts sin to cos over this symmetric interval).\n- Step 3: For indefinite integrals, however, the antiderivatives DIFFER. Cos-reduction (indefinite): $$nI_n = \\cos^{n-1} x \\sin x + (n-1) I_{n-2}$$ (note boundary term doesn't vanish for indefinite).\n\nThe lesson: same recursion structure ↔ same definite values over symmetric intervals; but the antiderivatives are different functions.", "source": "Opus 4.7 ②", "_id": "opus_2_81", "judge_pick": true}, {"question": "Derive the formula $$2I_n = n!$$-like polynomial identity for the IBP reduction $$I_n = x^n e^x - nI_{n-1}$$ at $$x = 0$$. (3 steps)", "answer": "(Conceptual exploration)\n- Step 1: $$I_0 = \\int e^x dx = e^x + C$$. Setting the constant so $$I_0(0) = 0$$ for clean evaluation: $$I_0 = e^x - 1$$.\n- Step 2: $$I_n = x^n e^x - n I_{n-1}$$. At $$x = 0$$ (with appropriate constants): pattern emerges from the recursion.\n- Step 3: Without specific limits, the indefinite $$I_n$$ produces a polynomial-times-$$e^x$$ form: $$I_n = (x^n - nx^{n-1} + n(n-1)x^{n-2} - ... \\pm n!)e^x + C$$.\n\nNotice the alternating signs and factorial growth — they emerge directly from the reduction formula's structure. The constant term $$\\pm n!$$ comes from the fully reduced $$I_0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_82", "judge_pick": false}, {"question": "A region between $$y = \\text{arsinh } x$$ and the y-axis from $$x=0$$ to $$x=1$$ is rotated about the y-axis. Two methods, two integrals — which is easier? (3 steps)", "answer": "- Step 1: Two methods:\n+ **Disk method (integrate over y)**: $$V = \\pi \\int x^2 \\, dy$$, with $$x = \\sinh y$$ (inverse). Limits: $$y$$ from $$0$$ to $$\\text{arsinh }(1) = \\ln(1+\\sqrt{2})$$.\n+ **Shell method (integrate over x)**: $$V = 2\\pi \\int_0^1 x \\cdot \\text{arsinh } x \\, dx$$.\n- Step 2: Disk method: $$\\pi \\int_0^{\\ln(1+\\sqrt{2})} \\sinh^2 y \\, dy$$ — handled by $$\\sinh^2 = (\\cosh 2y - 1)/2$$, easy.\n- Step 3: Shell method: requires IBP on $$x \\, \\text{arsinh } x$$ — possible but more elaborate.\n\nTakeaway: for \"inverse function\" curves, often the **disk method (integrating where the function is \"natural\")** is simpler.", "source": "Opus 4.7 ②", "_id": "opus_2_83", "judge_pick": true}, {"question": "When can definite integrals avoid back-substitution after a substitution? (3 steps)", "answer": "- Step 1: When you change limits along with the variable: if $$x = g(t)$$ and the original limits are $$x_A, x_B$$, replace them with $$t_A, t_B$$ where $$g(t_A) = x_A$$ and $$g(t_B) = x_B$$.\n- Step 2: For example, $$\\int_0^6 \\frac{x^3}{\\sqrt{x^2+9}} dx$$ with $$x = 3\\sinh u$$:\n+ When $$x = 0$$, $$u = 0$$.\n+ When $$x = 6$$, $$\\sinh u = 2$$, so $$u = \\text{arsinh }(2)$$.\n+ The integral becomes $$\\int_0^{\\text{arsinh }(2)} \\dots du$$ in terms of $$u$$.\n- Step 3: After integrating in $$u$$, evaluate at the new limits — no need to convert back to $$x$$.\n\nThis streamlines computation for definite integrals: change variable AND change limits together.", "source": "Opus 4.7 ②", "_id": "opus_2_84", "judge_pick": false}, {"question": "Compare $$\\int \\cosh x \\, dx$$ vs $$\\int \\cos x \\, dx$$. Same look, but what's subtly different? (3 steps)", "answer": "- Step 1: $$\\int \\cosh x \\, dx = \\sinh x + C$$ — no sign issues, since $$\\frac{d}{dx}\\sinh x = \\cosh x$$ directly.\n- Step 2: $$\\int \\cos x \\, dx = \\sin x + C$$ — also clean, but note $$\\frac{d}{dx}\\sin x = \\cos x$$ (no sign flip), while $$\\frac{d}{dx}\\cos x = -\\sin x$$ (sign flip).\n- Step 3: Subtle difference:\n+ **Hyperbolic**: derivatives of cosh and sinh are each other (no signs).\n+ **Trig**: derivatives of cos and sin are each other up to a SIGN.\n\nSo while these specific integrals look identical, integrals like $$\\int \\sinh x$$ vs $$\\int \\sin x$$ start to show the sign divergence: $$\\int \\sinh x = \\cosh x$$ (positive) but $$\\int \\sin x = -\\cos x$$ (negative).", "source": "Opus 4.7 ②", "_id": "opus_2_85", "judge_pick": true}, {"question": "What's the key insight for choosing the appropriate reduction technique for $$\\int \\tanh^n x \\, dx$$? (3 steps)", "answer": "- Step 1: Use the algebraic identity $$\\tanh^2 x = 1 - \\text{sech}^2 x$$ — analogous to the tan reduction's use of $$\\tan^2 = \\sec^2 - 1$$.\n- Step 2: Write $$\\tanh^n x = \\tanh^{n-2} x \\cdot \\tanh^2 x = \\tanh^{n-2} x (1 - \\text{sech}^2 x) = \\tanh^{n-2} x - \\tanh^{n-2} x \\, \\text{sech}^2 x$$.\n- Step 3: First piece is $$I_{n-2}$$. Second piece: since $$\\text{sech}^2 x = (\\tanh x)'$$, this is $$f'(x)[f(x)]^{n-2}$$, integrating to $$\\frac{\\tanh^{n-1} x}{n-1}$$. So $$I_n = I_{n-2} - \\frac{\\tanh^{n-1} x}{n-1}$$.\n\nNote the SIGN: $$I_n = I_{n-2} - \\frac{\\tanh^{n-1} x}{n-1}$$ for hyperbolic, vs $$I_n = \\frac{\\tan^{n-1} x}{n-1} - I_{n-2}$$ for trig — sign flips because of identity sign differences.", "source": "Opus 4.7 ②", "_id": "opus_2_86", "judge_pick": true}, {"question": "Identify the form: $$\\int \\frac{1}{x \\sqrt{x^2-1}} dx$$. What substitution works? (3 steps)", "answer": "- Step 1: This isn't one of the standard forms 12–15 directly, but it has $$\\sqrt{x^2-1}$$, suggesting the substitution $$x = \\sec \\theta$$ or $$x = \\cosh u$$.\n- Step 2: With $$x = \\sec\\theta$$: $$dx = \\sec\\theta\\tan\\theta \\, d\\theta$$, and $$\\sqrt{x^2-1} = \\tan\\theta$$. So $$\\frac{dx}{x\\sqrt{x^2-1}} = \\frac{\\sec\\theta\\tan\\theta \\, d\\theta}{\\sec\\theta \\cdot \\tan\\theta} = d\\theta$$. \n- Step 3: Result: $$\\int 1 \\, d\\theta = \\theta + C = \\text{arcsec } x + C$$ (or equivalently $$\\arccos(1/x)$$).\n\nBeautiful cancellation: $$\\sec\\theta\\tan\\theta$$ in numerator (from $$dx$$ × $$1/\\sqrt{x^2-1}$$ factor) vs $$\\sec\\theta\\tan\\theta$$ in denominator (from $$x\\sqrt{x^2-1}$$). Perfect substitution match.", "source": "Opus 4.7 ②", "_id": "opus_2_87", "judge_pick": true}, {"question": "What's the conceptual setup for the volume of revolution $$\\frac{\\pi}{8e^2}(e^4 - 4e^2 - 1)$$ from the curve $$y = \\sinh x$$ between $$x = 0$$ and $$x = 1$$? Describe the path. (3 steps)", "answer": "- Step 1: Volume = $$\\pi \\int_0^1 \\sinh^2 x \\, dx$$ (disk method about x-axis).\n- Step 2: Use $$\\sinh^2 x = (\\cosh 2x - 1)/2$$ to make integrable. Antiderivative: $$\\frac{1}{2}(\\frac{\\sinh 2x}{2} - x) = \\frac{\\sinh 2x}{4} - \\frac{x}{2}$$.\n- Step 3: Evaluate $$[0, 1]$$: $$\\frac{\\sinh 2}{4} - \\frac{1}{2}$$. Convert $$\\sinh 2 = (e^2 - e^{-2})/2$$ and simplify with common denominator $$8e^2$$: $$\\frac{\\pi}{8e^2}(e^4 - 4e^2 - 1)$$.\n\nThe journey: identity → integrate → exponential form → algebraic simplification. Clean conceptual chain.", "source": "Opus 4.7 ②", "_id": "opus_2_88", "judge_pick": false}, {"question": "Explain why $$\\int 1 \\, du$$ keeps appearing as the \"simplest possible\" answer after a substitution. (3 steps)", "answer": "- Step 1: When a substitution exactly matches the integrand structure, the Jacobian factor $$dx/du$$ in the differential cancels with the integrand's complicated piece, leaving just $$du$$.\n- Step 2: Examples:\n+ $$\\int \\frac{1}{1+x^2} dx$$ with $$x = \\tan A$$: $$dx = \\sec^2 A \\, dA$$, denominator $$\\sec^2 A$$ — cancellation gives $$\\int 1 \\, dA$$.\n+ $$\\int \\frac{1}{\\sqrt{x^2-1}} dx$$ with $$x = \\cosh u$$: $$dx = \\sinh u \\, du$$, denominator $$\\sinh u$$ — gives $$\\int 1 \\, du$$.\n+ $$\\int \\frac{dx}{x\\sqrt{x^2-1}}$$ with $$x = \\sec\\theta$$: similar cancellation.\n- Step 3: This is the **signature of the perfect substitution**: the new integrand reduces to \"1,\" meaning the substitution exactly captures the integral's geometric structure.\n\nThe takeaway: this is why standard inverse functions (arcsin, arctan, arsinh, arcosh) are the \"natural\" antiderivatives of these surd-fractions.", "source": "Opus 4.7 ②", "_id": "opus_2_89", "judge_pick": true}, {"question": "What's the deeper structure behind the formula $$\\int \\arctan x \\, dx = x \\arctan x - \\frac{1}{2}\\ln(1 + x^2) + C$$? (3 steps)", "answer": "- Step 1: The result has the form (function value times $$x$$) minus (correction term involving the antiderivative of the derivative-paired piece).\n- Step 2: Geometrically: the integral $$\\int \\arctan x \\, dx$$ represents the area under the arctan curve from 0 to $$x$$. The first term $$x \\arctan x$$ is the area of the rectangle (height $$\\arctan x$$, width $$x$$). The correction subtracts the part NOT covered by the curve: $$\\int_0^x t \\cdot \\frac{1}{1+t^2} dt = \\frac{1}{2}\\ln(1+x^2)$$.\n- Step 3: This is **integration by parts as area decomposition**: total area under $$\\arctan x$$ = full rectangle minus the wedge above the curve. The wedge integrates the derivative-companion structure $$x/(1+x^2)$$.\n\nThe deeper structure: every IBP-on-inverse-function follows the same pattern: $$\\int f^{-1}(x) dx = x f^{-1}(x) - \\int x \\cdot (f^{-1})'(x) dx$$, where the residual integrates the \"inverse\" derivative against $$x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_90", "judge_pick": true}], "count": 91}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 43810, "out_tokens": 23766, "reasoning_chars": 2426, "cost_eur": 0.1188, "elapsed_s": 221, "content_chars": 61074}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 43810, "out_tokens": 14976, "reasoning_chars": 18201, "cost_eur": 0.0905, "elapsed_s": 145, "content_chars": 24446}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 39330, "out_tokens": 13742, "reasoning_chars": 2347, "cost_eur": 0.0211, "elapsed_s": 115, "content_chars": 29095}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 39330, "out_tokens": 18799, "reasoning_chars": 1433, "cost_eur": 0.0263, "elapsed_s": 149, "content_chars": 46445}, "opus_1": {"run": 1, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 63621, "out_tokens": 88742, "reasoning_chars": 0, "cost_eur": 7.0012, "elapsed_s": 1038, "content_chars": 77954}, "opus_2": {"run": 2, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 63621, "out_tokens": 100911, "reasoning_chars": 0, "cost_eur": 7.8408, "elapsed_s": 1233, "content_chars": 84513}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 44352, "out_tokens": 7859, "reasoning_chars": 4856, "cost_eur": 0.0168, "elapsed_s": 160, "content_chars": 16857}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 44352, "out_tokens": 4029, "reasoning_chars": 4043, "cost_eur": 0.0126, "elapsed_s": 88, "content_chars": 7653}}};
const SK='fp3_ch04';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
