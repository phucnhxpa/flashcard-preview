<script>
const DATA={"selected": [{"question": "What is the geometric interpretation of the formula for surface area of revolution about the x-axis? Why does it involve 2π times the distance from the axis times the arc length element? (2 steps)", "answer": "- Step 1: When a small arc element of length ds rotates about the x-axis, it traces out a narrow band. This band is approximately a cylindrical strip with radius y and width ds.\n- Step 2: The surface area of this strip is approximately 2πy · ds (circumference times width).\n+ Integrating gives the total surface area: S = ∫2πy ds.\n\nThis is a direct application of the concept of \"surface of revolution\" — sweeping out an area by rotation.", "source": "MiniMax ②", "_id": "minimax_2_49"}, {"question": "Why can we integrate $$\\int \\sinh^3 x \\, dx$$ using $$\\sinh^2 x = \\cosh^2 x - 1$$? (3 steps)", "answer": "- Step 1: Direct integration of $$\\sinh^3 x$$ has no obvious antiderivative. Strategy: peel off one factor of $$\\sinh x$$, which can act as the differential of $$\\cosh x$$.\n- Step 2: Rewrite: $$\\sinh^3 x = (\\cosh^2 x - 1)\\sinh x$$. Now the integrand is $$\\cosh^2 x \\cdot \\sinh x - \\sinh x$$.\n- Step 3: First piece fits power rule with $$f = \\cosh x$$, $$f' = \\sinh x$$: gives $$\\frac{\\cosh^3 x}{3}$$. Second piece is standard. Result: $$\\frac{1}{3}\\cosh^3 x - \\cosh x + C$$.\n\nThe key insight: any **odd** power of $$\\sinh$$ (or $$\\cosh$$) leaves one factor to act as the differential of the other after using the Pythagorean-like identity. Even powers don't have this freedom — use double-angle instead.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "Why does $$\\int \\sec^3 x \\, dx$$ require integration by parts that \"loops\"? (4 steps)", "answer": "- Step 1: Direct spotting fails — the integrand isn't of obvious $$f'(x)[f(x)]^n$$ or $$f'(x)/f(x)$$ form.\n- Step 2: Try IBP with $$u = \\sec x$$, $$dv/dx = \\sec^2 x$$: $$du/dx = \\sec x \\tan x$$, $$v = \\tan x$$. Result: $$\\int \\sec^3 x = \\sec x \\tan x - \\int \\sec x \\tan^2 x \\, dx$$.\n- Step 3: Use $$\\tan^2 x = \\sec^2 x - 1$$: residual becomes $$\\int (\\sec^3 x - \\sec x) dx$$. So $$\\int \\sec^3 x = \\sec x \\tan x - \\int \\sec^3 x + \\int \\sec x$$.\n- Step 4: The integral $$\\int \\sec^3 x$$ appears on both sides! Solve algebraically: $$2\\int \\sec^3 x = \\sec x \\tan x + \\ln|\\sec x + \\tan x|$$, giving $$\\int \\sec^3 x = \\frac{1}{2}(\\sec x \\tan x + \\ln|\\sec x + \\tan x|) + C$$.\n\nThis is a **looping IBP**: you solve for the integral via algebra. The reduction formula $$(n-1)I_n = \\sec^{n-2} x \\tan x + (n-2) I_{n-2}$$ generalizes this exact loop.", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "Similarly, an integral has denominator $$\\sqrt{1+x^2}$$. A student immediately writes $$\\operatorname{arsinh} x + C$$. Give a specific example where this is wrong, and state the correct method and result. (2 steps)", "answer": "- Step 1: Consider $$\\int \\frac{5x}{\\sqrt{1+x^2}} dx$$. Here the numerator contains an $$x$$, which is related to the derivative of $$(1+x^2)$$. Specifically, $$\\frac{d}{dx}(1+x^2) = 2x$$. This matches the form $$\\int f'(x)[f(x)]^n dx$$ with $$f(x) = 1+x^2$$ and $$n = -\\frac{1}{2}$$.\n- Step 2: Rewriting: $$\\int 5x(1+x^2)^{-1/2}dx = \\frac{5}{2}\\int 2x(1+x^2)^{-1/2}dx = \\frac{5}{2} \\cdot \\frac{(1+x^2)^{1/2}}{1/2} + C = 5\\sqrt{1+x^2} + C$$.\n\nThe $$\\operatorname{arsinh}$$ form applies only when the numerator is a constant. When the numerator contains $$x$$ (the derivative of the inside of the square root), use the power-rule/log form instead.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "What's the astroid (asteroid) curve, and what makes its parametric arc length particularly elegant? (3 steps)", "answer": "- Step 1: Astroid: $$x = a\\cos^3 t$$, $$y = a\\sin^3 t$$ for $$t \\in [0, 2\\pi]$$. A four-cusped star-shaped curve.\n- Step 2: Compute: $$dx/dt = -3a\\cos^2 t \\sin t$$, $$dy/dt = 3a\\sin^2 t \\cos t$$. Squaring and adding: $$(dx/dt)^2 + (dy/dt)^2 = 9a^2 \\sin^2 t \\cos^2 t (\\cos^2 t + \\sin^2 t) = 9a^2 \\sin^2 t \\cos^2 t$$.\n- Step 3: The Pythagorean identity collapses everything! So $$\\sqrt{(dx/dt)^2 + (dy/dt)^2} = 3a|\\sin t \\cos t| = \\frac{3a}{2}|\\sin 2t|$$. Total perimeter: $$\\int_0^{2\\pi} \\frac{3a}{2}|\\sin 2t| dt = 6a$$.\n\nThe conceptual point: parametric curves with trigonometric-power coordinates often have arc-length integrands that reduce to elementary trig integrals because of the Pythagorean identity at the core.", "source": "Opus 4.7 ②", "_id": "opus_2_64"}, {"question": "For an integral involving $$\\sqrt{1+x^2}$$, the substitution $$x = \\sinh u$$ is preferred over $$x = \\tan\\theta$$. Explain what happens with each substitution and why $$\\sinh u$$ is better. (2 steps)", "answer": "- Step 1: With $$x = \\sinh u$$: $$\\sqrt{1+x^2} = \\sqrt{1+\\sinh^2 u} = \\cosh u$$, and $$dx = \\cosh u \\, du$$. The $$\\cosh u$$ from the square root and the $$\\cosh u$$ from $$dx$$ multiply to give $$\\cosh^2 u$$, which can be integrated using the identity $$\\cosh^2 u = \\frac{1+\\cosh 2u}{2}$$.\n- Step 2: With $$x = \\tan\\theta$$: $$\\sqrt{1+x^2} = \\sqrt{1+\\tan^2\\theta} = \\sec\\theta$$, and $$dx = \\sec^2\\theta \\, d\\theta$$. The product gives $$\\sec^3\\theta$$, which requires a difficult reduction formula to integrate. The hyperbolic substitution keeps things in terms of $$\\cosh$$, which is much easier to handle.\n\nThe hyperbolic substitution is the natural choice for $$\\sqrt{1+x^2}$$ because the fundamental identity $$1+\\sinh^2 u = \\cosh^2 u$$ eliminates the square root cleanly.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "State the relationship between $$\\int \\frac{1}{a^2 - x^2}\\, dx$$ and $$\\int \\frac{1}{x^2 - a^2}\\, dx$$. (3 steps)", "answer": "- Step 1: $$\\int \\frac{1}{a^2 - x^2}\\, dx = \\frac{1}{2a}\\ln\\left|\\frac{a+x}{a-x}\\right| + C$$ (for $$|x| < a$$).\n- Step 2: $$\\int \\frac{1}{x^2 - a^2}\\, dx = \\frac{1}{2a}\\ln\\left|\\frac{x-a}{x+a}\\right| + C$$. They differ because $$x^2 - a^2 = -(a^2-x^2)$$, flipping signs and rearranging the log argument.\n- Step 3: Both arise from partial fractions on a difference of squares. Memory aid: the larger of $$x$$ and $$a$$ tends to sit in the **numerator** of the log argument (depends on which case applies).\n\nThese two log forms are sometimes called the \"logarithmic forms\" of $$\\text{artanh}$$ and $$\\text{arcoth}$$ respectively.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "A curve has equation $$y = \\frac{1}{4}(2x^2 - \\ln x)$$ for $$x > 0$$. Show that the arc length from $$x=1$$ to $$x=2$$ is $$\\frac{1}{4}(6+\\ln 2)$$. Find $$\\frac{dy}{dx}$$ and simplify $$1+\\left(\\frac{dy}{dx}\\right)^2$$. (3 steps)", "answer": "- Step 1: $$\\frac{dy}{dx} = \\frac{1}{4}(4x - \\frac{1}{x}) = x - \\frac{1}{4x}$$.\n- Step 2: $$1+\\left(\\frac{dy}{dx}\\right)^2 = 1 + x^2 - \\frac{1}{2} + \\frac{1}{16x^2} = x^2 + \\frac{1}{2} + \\frac{1}{16x^2} = \\left(x+\\frac{1}{4x}\\right)^2$$.\n- Step 3: So $$\\sqrt{1+\\left(\\frac{dy}{dx}\\right)^2} = x + \\frac{1}{4x}$$ (positive since $$x>0$$). Arc length: $$\\int_1^2 \\left(x+\\frac{1}{4x}\\right)dx = \\left[\\frac{x^2}{2}+\\frac{1}{4}\\ln x\\right]_1^2 = (2+\\frac{1}{4}\\ln 2)-( \\frac{1}{2}+0) = \\frac{3}{2}+\\frac{1}{4}\\ln 2 = \\frac{1}{4}(6+\\ln 2)$$.\n\nThe perfect-square trick again: $$\\left(x+\\frac{1}{4x}\\right)^2$$ expands to exactly $$1+\\left(\\frac{dy}{dx}\\right)^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "A student sees $$\\int \\frac{2x}{1+x^2}\\, dx$$ and writes $$\\arctan(x^2)$$. Diagnose the error and give the correct answer. (3 steps)", "answer": "- Step 1: The $$\\arctan$$ form arises only when the integrand is exactly $$\\frac{1}{1+x^2}$$ — numerator must be $$1$$ (or a constant). Here the numerator is $$2x$$, which is **not constant**.\n- Step 2: Correct recognition: this fits the $$\\frac{f'(x)}{f(x)}$$ pattern with $$f(x) = 1+x^2$$, $$f'(x) = 2x$$.\n- Step 3: Apply the log rule: $$\\int \\frac{2x}{1+x^2}\\, dx = \\ln(1+x^2) + C$$ (no modulus since $$1+x^2 > 0$$).\n\nMisconception trap: the denominator alone doesn't determine the antiderivative form. **Always check the numerator** to choose between $$\\arctan$$ (constant numerator), log rule ($$f'$$ in numerator), or power rule ($$f'$$ multiplying a power of $$f$$).", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "A definite integral evaluates to $$\\text{arsinh}(2) - \\text{arsinh}(1)$$. How do you simplify this to a single expression? (3 steps)", "answer": "- Step 1: Use the logarithmic form $$\\text{arsinh } x = \\ln(x + \\sqrt{1 + x^2})$$. So $$\\text{arsinh } 2 = \\ln(2 + \\sqrt{5})$$ and $$\\text{arsinh } 1 = \\ln(1 + \\sqrt{2})$$.\n- Step 2: The difference: $$\\ln(2 + \\sqrt{5}) - \\ln(1 + \\sqrt{2}) = \\ln\\left(\\frac{2 + \\sqrt{5}}{1 + \\sqrt{2}}\\right)$$ using log laws.\n- Step 3: This single-log form is the cleanest answer; sometimes you can rationalize the fraction further.\n\nGeneral principle: combining inverse hyperbolic differences uses (i) the log form, then (ii) $$\\ln a - \\ln b = \\ln(a/b)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "The cycloid $$x = t - \\sin t$$, $$y = 1-\\cos t$$ from $$t=0$$ to $$t=2\\pi$$ is rotated about the $$x$$-axis. A key simplification is $$\\left(\\frac{dx}{dt}\\right)^2+\\left(\\frac{dy}{dt}\\right)^2 = 4\\sin^2\\frac{t}{2}$$. Show how this arises. (3 steps)", "answer": "- Step 1: Compute derivatives: $$\\frac{dx}{dt} = 1-\\cos t$$, $$\\frac{dy}{dt} = \\sin t$$.\n- Step 2: Sum of squares: $$(1-\\cos t)^2 + \\sin^2 t = 1-2\\cos t+\\cos^2 t+\\sin^2 t = 2-2\\cos t$$.\n- Step 3: Use the identity $$1-\\cos t = 2\\sin^2\\frac{t}{2}$$: $$2-2\\cos t = 2(1-\\cos t) = 4\\sin^2\\frac{t}{2}$$. So $$\\sqrt{\\left(\\frac{dx}{dt}\\right)^2+\\left(\\frac{dy}{dt}\\right)^2} = 2\\sin\\frac{t}{2}$$ (positive for $$0 < t < 2\\pi$$).\n\nThis half-angle identity is essential for simplifying cycloid arc length and surface area integrals.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "For the Wallis integral $$I_n = \\int_{0}^{\\frac{\\pi}{2}} \\sin^n x \\mathrm{~d} x$$, the reduction formula is $$n I_n = (n-1) I_{n-2}$$. How does the parity (odd/even) of $n$ determine the final base case? (3 steps)", "answer": "- Step 1: The formula reduces $n$ by 2 each time, meaning odd $n$ will eventually reach $I_1$, and even $n$ will reach $I_0$.\n- Step 2: If $n$ is odd, the chain terminates at $$I_1 = \\int_{0}^{\\frac{\\pi}{2}} \\sin x \\mathrm{~d} x = 1$$.\n- Step 3: If $n$ is even, the chain terminates at $$I_0 = \\int_{0}^{\\frac{\\pi}{2}} 1 \\mathrm{~d} x = \\frac{\\pi}{2}$$. The final answer will contain $\\pi$ if and only if $n$ is even.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "When can you derive a reduction formula WITHOUT integration by parts? (3 steps)", "answer": "- Step 1: When you have a polynomial identity that splits the integrand into one piece that becomes $$I_n$$ multiplied by a constant, and another piece that's $$I_{n-2}$$ (or $$I_{n-1}$$).\n- Step 2: Examples:\n+ $$\\int \\tan^n x \\, dx$$: use $$\\tan^2 x = \\sec^2 x - 1$$ to split $$\\tan^n = \\tan^{n-2}\\sec^2 - \\tan^{n-2}$$. First term integrates via $$f'f^{n-2}$$; second is $$I_{n-2}$$.\n+ $$\\int \\tanh^n x \\, dx$$: use $$\\tanh^2 x = 1 - \\text{sech}^2 x$$ analogously.\n- Step 3: General principle: any \"Pythagorean-style\" identity that converts a power-of-function to (lower-power) plus (its derivative) gives a reduction without IBP.\n\nWhen IBP IS needed: when the integrand has a polynomial factor (like $$x^n$$) needing differentiation, with no algebraic-identity shortcut.", "source": "Opus 4.7 ②", "_id": "opus_2_69"}, {"question": "What's the conceptual reason we use trigonometric or hyperbolic substitutions for integrals like $$\\int \\frac{1}{\\sqrt{1-x^2}} dx$$? Why doesn't $$u = 1-x^2$$ work? (3 steps)", "answer": "- Step 1: An algebraic substitution $$u = 1-x^2$$ gives $$du = -2x \\, dx$$ — it requires a factor of $$x$$ in the numerator that we don't have. So this substitution doesn't simplify the integrand.\n- Step 2: The point of trig/hyp substitutions is to **collapse a two-term expression into one term** via a Pythagorean-style identity. For $$\\sqrt{1-x^2}$$, set $$x = \\sin\\theta$$: then $$1-x^2 = \\cos^2\\theta$$, so $$\\sqrt{1-x^2} = \\cos\\theta$$ — surd vanishes!\n- Step 3: The integrand becomes a clean trig expression that's easily integrable. The substitution embeds the problem into a geometric setting where the constraint $$\\sin^2 + \\cos^2 = 1$$ does the work for you.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "Why does $$\\int \\frac{1}{\\sqrt{1-x^2}}\\, dx = \\arcsin x$$ but $$\\int \\frac{1}{\\sqrt{x^2-1}}\\, dx = \\text{arcosh}\\, x$$, with the difference of just signs in $$1-x^2$$ vs $$x^2-1$$? (3 steps)", "answer": "- Step 1: $$\\sin\\theta$$ has range $$[-1, 1]$$; its inverse takes $$|x| < 1$$. The identity $$\\sin^2 + \\cos^2 = 1$$ gives $$\\cos\\theta = \\sqrt{1 - x^2}$$, appearing in $$\\frac{d}{dx}\\arcsin x$$.\n- Step 2: $$\\cosh u$$ has range $$[1, \\infty)$$; its inverse takes $$x \\geq 1$$. The identity $$\\cosh^2 - \\sinh^2 = 1$$ gives $$\\sinh u = \\sqrt{x^2 - 1}$$ (for $$u > 0$$), appearing in $$\\frac{d}{dx}\\text{arcosh}\\, x$$.\n- Step 3: The sign flip $$1-x^2$$ vs $$x^2-1$$ is the algebraic reflection of $$\\sin^2+\\cos^2 = 1$$ vs $$\\cosh^2 - \\sinh^2 = 1$$. It's the literal manifestation of the difference between Euclidean rotations (trig) and Lorentzian boosts (hyperbolic).\n\nBeautiful structural connection: trig and hyperbolic functions split because of one sign in their fundamental identity, propagating into derivatives, integrals, and inverses.", "source": "Opus 4.7 ①", "_id": "opus_1_71"}, {"question": "Compare integrating √(x² + a²)dx using hyperbolic vs trigonometric substitution. Why is hyperbolic substitution often preferred? (3 steps)", "answer": "- Step 1: Trig substitution x = atanθ → √(x² + a²) = asecθ → integral becomes a²∫sec³θ dθ (requires integration by parts).\n- Step 2: Hyperbolic substitution x = asinhu → √(x² + a²) = acoshu → integral simplifies to a²∫cosh²u du.\n- Step 3: Hyperbolic identity cosh²u = (cosh2u + 1)/2 makes integration straightforward, avoiding sec³θ complexity.  \n**Key Insight:** Hyperbolic functions often simplify integrands more elegantly for √(x² ± a²).", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "Why does the integrand contain $$y$$ (not $$y^2$$) when computing surface area about the $$x$$-axis?", "answer": "The $$y$$ in the surface area formula $$S = 2\\pi\\int y\\, ds$$ encodes the **circumference** $$2\\pi y$$ of the circle traced at height $$y$$. Common confusion: students sometimes write $$y^2$$, but that's the formula for **disk area** in volume calculations: $$V = \\pi\\int y^2\\, dx$$ uses $$\\pi y^2$$ for cross-sectional disks. For surfaces, we have **rings** (circumferences = $$2\\pi y$$), not disks (areas = $$\\pi y^2$$). The dimensional check confirms: surface area should be $$L^2$$ (matches $$y \\cdot ds$$); volume should be $$L^3$$ (matches $$y^2 \\cdot dx$$).", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "State the arc length formula for a curve y = f(x) from x = a to x = b. How is it derived? (2 steps)", "answer": "- Step 1: Arc length s = ∫ₐᵇ √(1 + (dy/dx)²) dx\n\n- Step 2: Derivation: For nearby points P(x,y) and Q(x+δx, y+δy), the chord length ≈ √(δx² + δy²). Dividing by δx and taking the limit as δx → 0: ds/dx = √(1 + (dy/dx)²). Integrating gives the arc length.\n\n- Also available: s = ∫ √(1 + (dx/dy)²) dy when integrating with respect to y, or s = ∫ √((dx/dt)² + (dy/dt)²) dt for parametric forms.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "What kind of curves are NOT rectifiable in elementary terms? (3 steps)", "answer": "- Step 1: **Rectifiable in elementary terms** = arc length expressible via finite combination of polynomials, exponentials, logs, trig, inverse trig, hyperbolic, inverse hyperbolic.\n- Step 2: Non-elementary cases:\n+ **Ellipse** $$x = a\\cos t$$, $$y = b\\sin t$$ with $$a \\neq b$$: arc length involves the famous **elliptic integral** $$\\int \\sqrt{a^2\\sin^2 t + b^2 \\cos^2 t} dt$$ — not expressible in elementary functions.\n+ **General sin curve** $$y = \\sin x$$: arc length per period also requires elliptic integrals.\n+ Most polynomial curves $$y = x^n$$ for arbitrary $$n$$.\n- Step 3: Elementary cases (exceptions): parabolas, catenaries, $$y = ax^{3/2}$$, semicircles, and parametric curves designed so $$(dx/dt)^2 + (dy/dt)^2$$ is a perfect square.\n\nMost \"real-world\" curves have non-elementary arc lengths, requiring numerical integration. Textbook examples are usually constructed to be rectifiable.", "source": "Opus 4.7 ②", "_id": "opus_2_71"}, {"question": "Why do the integrals of $\\operatorname{sech} x \\tanh x$ and $\\operatorname{cosech} x \\operatorname{coth} x$ yield negative results, unlike their trigonometric counterparts $\\sec x \\tan x$ and $\\operatorname{cosec} x \\cot x$? (2 steps)", "answer": "- Step 1: Look at the derivatives. Differentiating $\\operatorname{sech} x$ involves the chain rule on $$(\\cosh x)^{-1}$$, giving $$-1(\\cosh x)^{-2}(\\sinh x) = -\\operatorname{sech} x \\tanh x$$. The negative sign comes from the power rule on a reciprocal.\n- Step 2: Similarly, $$\\frac{\\mathrm{d}}{\\mathrm{d}x}(\\operatorname{cosech} x) = -1(\\sinh x)^{-2}(\\cosh x) = -\\operatorname{cosech} x \\operatorname{coth} x$$. Because the derivatives are negative, integrating the positive products must yield negative results to be consistent (e.g., $$\\int \\operatorname{sech} x \\tanh x \\mathrm{~d} x = -\\operatorname{sech} x + C$$). Trigonometric counterparts lack this specific negative sign in their derivatives.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "A curve has equation $$y = \\frac{1}{3}x^{3/2}$$ from origin to $$x = 12$$. Why does this arc length integral come out clean? (3 steps)", "answer": "- Step 1: $$dy/dx = \\frac{1}{2}x^{1/2}$$, so $$(dy/dx)^2 = x/4$$.\n- Step 2: $$1 + (dy/dx)^2 = 1 + x/4$$. Integrand is $$\\sqrt{1 + x/4}$$ — a simple **power function**, no surd of a quadratic.\n- Step 3: Substitute $$u = 1 + x/4$$: integral reduces to $$\\int \\sqrt{u} \\cdot 4 du = \\frac{8}{3}u^{3/2}$$. Clean elementary integral.\n\nThe cleanness comes from the curve being designed so $$(dy/dx)^2$$ is linear in $$x$$. Generally, $$y = ax^{3/2}$$ produces arc lengths reducible to elementary power integrals — a special \"rectifiable by elementary means\" case.", "source": "Opus 4.7 ②", "_id": "opus_2_79"}, {"question": "Distinguish the patterns $$\\int f'(x)[f(x)]^n\\, dx$$ and $$\\int \\frac{f'(x)}{f(x)}\\, dx$$. (3 steps)", "answer": "- Step 1: Power rule reverse: $$\\int f'(x)[f(x)]^n\\, dx = \\frac{[f(x)]^{n+1}}{n+1} + C$$ for $$n \\neq -1$$. Use when the integrand is $$f'$$ times a power of $$f$$.\n- Step 2: Log rule: $$\\int \\frac{f'(x)}{f(x)}\\, dx = \\ln|f(x)| + C$$. This is the special case $$n = -1$$ where the power rule fails (would give division by zero), replaced by the natural logarithm.\n- Step 3: Strategy: identify $$f$$ such that $$f'$$ appears in the numerator (perhaps up to a constant). If the rest is $$f^n$$ (with $$n \\neq -1$$), use power rule; if the rest is $$1/f$$, use log rule.\n\nExample contrast: $$\\int \\frac{5x}{\\sqrt{1+x^2}}\\, dx$$ has $$f = 1+x^2$$ and integrand $$\\frac{1}{2}f^{-1/2}\\cdot 2x$$, so power rule gives $$5\\sqrt{1+x^2}$$. Whereas $$\\int \\frac{2x}{1+x^2}\\, dx$$ is exactly $$\\frac{f'}{f}$$, so log rule gives $$\\ln(1+x^2)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Derive the arc length formula $$\\frac{ds}{dx} = \\sqrt{1 + (dy/dx)^2}$$ from first principles. (4 steps)", "answer": "- Step 1: Consider nearby points $$P(x, y)$$ and $$Q(x+\\delta x, y + \\delta y)$$ on the curve. The chord $$PQ$$ approximates the arc $$\\delta s$$.\n- Step 2: Pythagoras: $$(\\delta s)^2 \\approx (\\delta x)^2 + (\\delta y)^2$$. Divide by $$(\\delta x)^2$$: $$\\left(\\frac{\\delta s}{\\delta x}\\right)^2 \\approx 1 + \\left(\\frac{\\delta y}{\\delta x}\\right)^2$$.\n- Step 3: Take limit $$\\delta x \\to 0$$: $$\\left(\\frac{ds}{dx}\\right)^2 = 1 + \\left(\\frac{dy}{dx}\\right)^2$$. Take positive square root (so $$s$$ increases with $$x$$).\n- Step 4: Integrate to get total arc length: $$s = \\int_a^b \\sqrt{1 + (dy/dx)^2}\\, dx$$.\n\nIntuition: every tiny piece of curve looks locally like a straight line. Pythagoras gives that line's length; integration sums infinitely many. The \"1\" inside the radical is the horizontal contribution; $$(dy/dx)^2$$ is the vertical-to-horizontal slope contribution.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "What is $$\\int \\tanh x \\, dx$$, and why don't we need modulus signs in the answer? (3 steps)", "answer": "- Step 1: The result is $$\\int \\tanh x \\, dx = \\ln \\cosh x + C$$.\n- Step 2: To see why, write $$\\tanh x = \\frac{\\sinh x}{\\cosh x}$$, which is exactly of the form $$\\frac{f'(x)}{f(x)}$$ since $$\\frac{d}{dx}(\\cosh x) = \\sinh x$$. The general rule gives $$\\ln |\\cosh x| + C$$.\n- Step 3: We drop the modulus because $$\\cosh x \\geq 1 > 0$$ for all real $$x$$ — the function never reaches zero or goes negative. Contrast with $$\\int \\tan x \\, dx = \\ln |\\sec x| + C$$, where the modulus is essential because $$\\sec x$$ can be negative.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "How is the arc length formula modified for a curve defined by parametric equations $x = \\mathrm{f}(t), y = \\mathrm{g}(t)$? (2 steps)", "answer": "- Step 1: Start from the differential relationship $$(\\mathrm{d}s)^2 = (\\mathrm{d}x)^2 + (\\mathrm{d}y)^2$$. Divide by $$(\\mathrm{d}t)^2$$ to get $$\\left(\\frac{\\mathrm{d}s}{\\mathrm{d}t}\\right)^2 = \\left(\\frac{\\mathrm{d}x}{\\mathrm{d}t}\\right)^2 + \\left(\\frac{\\mathrm{d}y}{\\mathrm{d}t}\\right)^2$$.\n- Step 2: Take the square root and integrate with respect to the parameter $t$: $$s = \\int_{t_A}^{t_B} \\sqrt{\\left(\\frac{\\mathrm{d}x}{\\mathrm{d}t}\\right)^2 + \\left(\\frac{\\mathrm{d}y}{\\mathrm{d}t}\\right)^2} \\mathrm{~d} t$$.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "The surface area formula for revolution about the $$x$$-axis is $$S = 2\\pi \\int y \\, ds$$. This is derived by approximating the surface as a frustum of a cone. Explain the key steps of this derivation. (3 steps)", "answer": "- Step 1: When a small arc $$PQ$$ (length $$\\delta s$$) is rotated about the $$x$$-axis, it generates a surface approximately equal to a frustum of a cone. The surface area of a cone is $$\\pi r l$$ (base radius × slant height), so the frustum area is $$\\pi(y+\\delta y)l_2 - \\pi y l_1$$.\n- Step 2: Using similar triangles, this simplifies to $$\\pi(2y+\\delta y)(l_2-l_1)$$. Since $$l_2-l_1 \\approx \\delta s$$ (the arc approximates the slant height difference), we get $$\\delta S \\approx \\pi(2y+\\delta y)\\delta s$$.\n- Step 3: As $$\\delta x \\to 0$$: $$\\frac{dS}{dx} = 2\\pi y \\frac{ds}{dx}$$, and integrating: $$S = \\int 2\\pi y \\frac{ds}{dx}dx = \\int 2\\pi y \\, ds = 2\\pi\\int y\\sqrt{1+\\left(\\frac{dy}{dx}\\right)^2}dx$$.\n\nThe factor $$2\\pi y$$ is the circumference at height $$y$$, and $$ds$$ is the \"width\" of the infinitesimal band.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "When deriving the reduction formula for $$I_n = \\int \\frac{\\sin^{2n}x}{\\cos x}dx$$, the relation $$I_n - I_{n+1} = \\frac{\\sin^{2n+1}x}{2n+1}$$ is obtained. Explain the strategy: why relate $$I_n$$ to $$I_{n+1}$$ (going UP) instead of $$I_{n-1}$$ (going DOWN)? (2 steps)", "answer": "- Step 1: The relation $$I_n - I_{n+1} = \\frac{\\sin^{2n+1}x}{2n+1}$$ allows us to express $$I_n = I_{n+1} + \\frac{\\sin^{2n+1}x}{2n+1}$$. Since $$I_{n+1}$$ has a HIGHER power of $$\\sin$$ in the numerator (and thus the denominator $$\\cos x$$ is \"less cancelled\"), we work downward from a known starting point.\n- Step 2: The base case is $$I_0 = \\int \\frac{1}{\\cos x}dx = \\int \\sec x \\, dx = \\ln|\\sec x + \\tan x| + C$$. Then $$I_1 = I_0 - \\sin x$$, $$I_2 = I_1 - \\frac{\\sin^3 x}{3}$$, etc. We telescope downward from $$I_0$$.\n\nGoing \"up\" in the recurrence and then telescoping down from a known base case is an alternative strategy to the usual \"reduce $$n$$\" approach.", "source": "GLM 5.1 ①", "_id": "glm_1_55"}, {"question": "State the linear substitution rule and explain why the $$\\frac{1}{a}$$ factor appears. (3 steps)", "answer": "- Step 1: If $$F(x)$$ is an antiderivative of $$f(x)$$, then $$\\int f(ax+b)\\, dx = \\frac{1}{a}F(ax+b) + C$$.\n- Step 2: Verify by differentiating: $$\\frac{d}{dx}\\left[\\frac{1}{a}F(ax+b)\\right] = \\frac{1}{a}\\cdot a \\cdot f(ax+b) = f(ax+b)$$. The $$\\frac{1}{a}$$ exactly cancels the chain-rule factor of $$a$$.\n- Step 3: This works for **linear** inner functions only. For non-linear inners (e.g., $$x^2$$), you need a proper substitution, because the chain-rule factor isn't constant.\n\nThis shortcut applies directly to hyperbolic, trig, exponential, and inverse forms.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "A common misconception: students think $$\\int \\frac{1}{\\sqrt{1-x^2}}dx = \\arccos x + C$$ is equally valid as $$\\arcsin x + C$$. Are both correct? Explain the relationship between the two answers. (2 steps)", "answer": "- Step 1: Both are technically correct as antiderivatives, since $$\\frac{d}{dx}(\\arcsin x) = \\frac{1}{\\sqrt{1-x^2}}$$ and $$\\frac{d}{dx}(-\\arccos x) = \\frac{1}{\\sqrt{1-x^2}}$$. So $$\\int \\frac{1}{\\sqrt{1-x^2}}dx = \\arcsin x + C$$ or $$-\\arccos x + C$$.\n- Step 2: The two differ by a constant: $$\\arcsin x + \\arccos x = \\frac{\\pi}{2}$$, so $$\\arcsin x = -\\arccos x + \\frac{\\pi}{2}$$. The \"$$\\frac{\\pi}{2}$$\" is absorbed into the constant of integration $$C$$. By convention, the standard result is given as $$\\arcsin x + C$$.\n\nBoth are valid antiderivatives; the difference is just a constant. The formula booklet uses the $$\\arcsin$$ convention.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "When should you suspect that an integrand of the form (numerator)/$$\\sqrt{1+x^2}$$ is NOT going to give arsinh? (3 steps)", "answer": "- Step 1: The arsinh result $$\\int \\frac{1}{\\sqrt{1+x^2}} dx = \\text{arsinh } x + C$$ requires the numerator to be a CONSTANT.\n- Step 2: If the numerator contains an $$x$$-piece resembling $$\\frac{d}{dx}(1+x^2) = 2x$$, the form is $$k \\cdot f'(x)[f(x)]^{-1/2}$$, which integrates to a multiple of $$\\sqrt{1+x^2}$$ — NOT arsinh.\n+ Example: $$\\int \\frac{5x}{\\sqrt{1+x^2}} dx = 5\\sqrt{1+x^2} + C$$.\n+ Counter-example: $$\\int \\frac{5}{\\sqrt{1+x^2}} dx = 5 \\,\\text{arsinh } x + C$$.\n- Step 3: Strategy: if the numerator contains $$x$$ matching the derivative pattern, use the power rule. If the numerator is constant, use the inverse-function result. If mixed, split the integrand.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "The arc length formula $$s = \\int_{x_A}^{x_B} \\sqrt{1+\\left(\\frac{dy}{dx}\\right)^2} dx$$ is derived from the approximation $$(\\delta s)^2 \\approx (\\delta x)^2 + (\\delta y)^2$$. Explain the geometric reasoning behind this approximation and the limiting process. (3 steps)", "answer": "- Step 1: For two nearby points $$P(x,y)$$ and $$Q(x+\\delta x, y+\\delta y)$$ on a curve, the arc length $$\\delta s$$ between them is approximately equal to the straight-line distance (chord) $$PQ$$. By Pythagoras: $$(PQ)^2 = (\\delta x)^2 + (\\delta y)^2$$, so $$(\\delta s)^2 \\approx (\\delta x)^2 + (\\delta y)^2$$.\n- Step 2: Divide by $$(\\delta x)^2$$: $$\\left(\\frac{\\delta s}{\\delta x}\\right)^2 \\approx 1 + \\left(\\frac{\\delta y}{\\delta x}\\right)^2$$. As $$\\delta x \\to 0$$, the chord length approaches the arc length (the curve looks locally straight), and the difference quotient becomes a derivative: $$\\left(\\frac{ds}{dx}\\right)^2 = 1 + \\left(\\frac{dy}{dx}\\right)^2$$.\n- Step 3: Taking the positive square root (since arc length increases with $$x$$): $$\\frac{ds}{dx} = \\sqrt{1+\\left(\\frac{dy}{dx}\\right)^2}$$, and integrating gives the arc length formula.\n\nThe fundamental idea: a smooth curve is locally a straight line, so Pythagoras applies in the infinitesimal limit.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "The integral $$\\int \\frac{1}{a^2-x^2}dx$$ (for $$|x|<a$$) can be found by partial fractions OR by the substitution $$x = a\\tanh\\theta$$. Show that both methods give equivalent results. (3 steps)", "answer": "- Step 1: Partial fractions: $$\\frac{1}{a^2-x^2} = \\frac{1}{(a-x)(a+x)} = \\frac{1}{2a}\\left(\\frac{1}{a+x}+\\frac{1}{a-x}\\right)$$. Integrating: $$\\frac{1}{2a}[\\ln|a+x|-\\ln|a-x|] = \\frac{1}{2a}\\ln\\left|\\frac{a+x}{a-x}\\right| + C$$.\n- Step 2: Substitution $$x = a\\tanh\\theta$$: $$dx = a\\operatorname{sech}^2\\theta \\, d\\theta$$ and $$a^2-x^2 = a^2(1-\\tanh^2\\theta) = a^2\\operatorname{sech}^2\\theta$$. The integral becomes $$\\int \\frac{a\\operatorname{sech}^2\\theta}{a^2\\operatorname{sech}^2\\theta}d\\theta = \\frac{1}{a}\\int 1 \\, d\\theta = \\frac{\\theta}{a} + C = \\frac{1}{a}\\operatorname{artanh}\\left(\\frac{x}{a}\\right) + C$$.\n- Step 3: These are equivalent because $$\\operatorname{artanh}\\left(\\frac{x}{a}\\right) = \\frac{1}{2}\\ln\\left(\\frac{1+x/a}{1-x/a}\\right) = \\frac{1}{2}\\ln\\left(\\frac{a+x}{a-x}\\right)$$, so $$\\frac{1}{a}\\operatorname{artanh}\\left(\\frac{x}{a}\\right) = \\frac{1}{2a}\\ln\\left|\\frac{a+x}{a-x}\\right|$$.\n\nThe logarithmic form (result 16) and the $$\\operatorname{artanh}$$ form are two representations of the same function.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "For the Wallis-type integral $$I_n = \\int_0^{\\pi/2}\\sin^n x \\, dx$$, evaluate $$I_5$$ and $$I_6$$ using the reduction formula $$nI_n = (n-1)I_{n-2}$$. (3 steps)", "answer": "- Step 1: For $$I_5$$ (odd): $$I_5 = \\frac{4}{5}I_3 = \\frac{4}{5}\\cdot\\frac{2}{3}I_1 = \\frac{4}{5}\\cdot\\frac{2}{3}\\cdot 1 = \\frac{8}{15}$$.\n- Step 2: For $$I_6$$ (even): $$I_6 = \\frac{5}{6}I_4 = \\frac{5}{6}\\cdot\\frac{3}{4}I_2 = \\frac{5}{6}\\cdot\\frac{3}{4}\\cdot\\frac{1}{2}I_0 = \\frac{5}{6}\\cdot\\frac{3}{4}\\cdot\\frac{1}{2}\\cdot\\frac{\\pi}{2} = \\frac{5\\pi}{32}$$.\n- Step 3: The pattern: odd $$n$$ terminates at $$I_1 = 1$$ (rational answer), even $$n$$ terminates at $$I_0 = \\frac{\\pi}{2}$$ (answer involves $$\\pi$$).\n\nThis is the Wallis integral — a beautiful result with deep connections to probability and the gamma function.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "What is the essential first algebraic step when integrating $$\\int \\frac{1}{px^2+qx+r} \\mathrm{~d} x$$ before matching it to a standard form like $\\arctan$ or $\\ln$? (2 steps)", "answer": "- Step 1: You must complete the square on the quadratic denominator. Factor out $p$ to get $$p(x^2 + \\frac{q}{p}x + \\frac{r}{p})$$, then complete the square inside the brackets.\n- Step 2: This transforms the denominator into the form $$p((x+\\alpha)^2 \\pm \\beta^2)$$, allowing a simple linear substitution (like $u = x+\\alpha$) to reduce it to one of the standard forms (Results 12-17).", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "What's the deeper structure behind the formula $$\\int \\arctan x \\, dx = x \\arctan x - \\frac{1}{2}\\ln(1 + x^2) + C$$? (3 steps)", "answer": "- Step 1: The result has the form (function value times $$x$$) minus (correction term involving the antiderivative of the derivative-paired piece).\n- Step 2: Geometrically: the integral $$\\int \\arctan x \\, dx$$ represents the area under the arctan curve from 0 to $$x$$. The first term $$x \\arctan x$$ is the area of the rectangle (height $$\\arctan x$$, width $$x$$). The correction subtracts the part NOT covered by the curve: $$\\int_0^x t \\cdot \\frac{1}{1+t^2} dt = \\frac{1}{2}\\ln(1+x^2)$$.\n- Step 3: This is **integration by parts as area decomposition**: total area under $$\\arctan x$$ = full rectangle minus the wedge above the curve. The wedge integrates the derivative-companion structure $$x/(1+x^2)$$.\n\nThe deeper structure: every IBP-on-inverse-function follows the same pattern: $$\\int f^{-1}(x) dx = x f^{-1}(x) - \\int x \\cdot (f^{-1})'(x) dx$$, where the residual integrates the \"inverse\" derivative against $$x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_90"}, {"question": "For ∫xⁿ√(1 - x²)dx (n ≥ 0), why use x = sinθ? Compute ∫₀¹x√(1 - x²)dx. (3 steps)", "answer": "- Step 1: Substitution x = sinθ simplifies √(1 - x²) to cosθ, dx = cosθ dθ.\n- Step 2: Integral becomes ∫sinθ · cosθ · cosθ dθ = ∫sinθ cos²θ dθ.\n- Step 3: Let u = cosθ → du = -sinθ dθ → -∫u² du = -u³/3 + C. Evaluate from θ=0 to π/2: 1/3.  \n**Answer:** 1/3  \n**Domain Insight:** x = sinθ works for |x| ≤ a (here a=1), matching the integrand's domain.", "source": "Qwen 3 ①", "_id": "qwen_1_10"}, {"question": "For $$I_n = \\int_0^{\\pi/2} \\sin^n x \\, dx$$, the reduction formula reduces $$n$$ by 2 each step: $$nI_n = (n-1)I_{n-2}$$. Explain why the formula skips by 2 instead of 1, and state the two different stopping conditions. (3 steps)", "answer": "- Step 1: After integration by parts and using $$\\cos^2 x = 1-\\sin^2 x$$, the integral splits into $$I_{n-2}$$ and $$I_n$$ (not $$I_{n-1}$$). This is because replacing $$\\cos^2 x$$ with $$1-\\sin^2 x$$ introduces $$\\sin^{n-2}x$$ and $$\\sin^n x$$, both with the same parity difference of 2 from each other.\n- Step 2: If $$n$$ is odd, repeated application reduces to $$I_1 = \\int_0^{\\pi/2}\\sin x \\, dx = 1$$. The result is a product of fractions: $$I_n = \\frac{n-1}{n} \\cdot \\frac{n-3}{n-2} \\cdots \\frac{2}{3} \\cdot 1$$.\n- Step 3: If $$n$$ is even, repeated application reduces to $$I_0 = \\int_0^{\\pi/2}1 \\, dx = \\frac{\\pi}{2}$$. The result includes the factor $$\\frac{\\pi}{2}$$: $$I_n = \\frac{n-1}{n} \\cdot \\frac{n-3}{n-2} \\cdots \\frac{3}{4} \\cdot \\frac{1}{2} \\cdot \\frac{\\pi}{2}$$.\n\nThe skip-by-2 structure means odd and even $$n$$ follow separate chains, each landing on a different base case.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "When completing the square in $$\\int \\frac{1}{\\sqrt{4 - 2x - x^2}} dx$$, why must you flip the sign and what's the resulting form? (3 steps)", "answer": "- Step 1: First handle the leading negative coefficient: $$4 - 2x - x^2 = -(x^2 + 2x - 4)$$. Now complete inside: $$x^2 + 2x - 4 = (x+1)^2 - 5$$.\n- Step 2: Substitute back: $$4 - 2x - x^2 = -[(x+1)^2 - 5] = 5 - (x+1)^2$$. This is \"$$a^2 - u^2$$\" form with $$a = \\sqrt{5}$$, $$u = x+1$$.\n- Step 3: Matches arcsin standard form: $$\\arcsin\\left(\\frac{x+1}{\\sqrt{5}}\\right) + C$$.\n\nCrucial insight: a negative leading coefficient means the quadratic opens downward — the surd is real only on a bounded interval, and after factoring out the negative, you get the \"$$a^2 - u^2$$\" structure (→ arcsin).", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "If an integral contains $\\sqrt{x^2-1}$, what two substitutions could you use, and which is generally preferred? (2 steps)", "answer": "- Step 1: You could use $x = \\sec \\theta$ (since $$\\sec^2 \\theta - 1 = \\tan^2 \\theta$$) or $x = \\cosh u$ (since $$\\cosh^2 u - 1 = \\sinh^2 u$$).\n- Step 2: The hyperbolic substitution $x = \\cosh u$ is generally preferred. While both collapse the square root into a single term, hyperbolic identities often avoid the absolute value ambiguities (like $|\\tan \\theta|$) that arise with trigonometric substitutions in different quadrants, making the integration smoother.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "Torricelli's Trumpet is the solid formed by rotating $$y = \\frac{1}{x}$$ (for $$x \\geq 1$$) about the $$x$$-axis. The volume is finite ($$\\pi$$), but the surface area is infinite. Explain intuitively why the surface area diverges. (2 steps)", "answer": "- Step 1: The surface area integral is $$2\\pi\\int_1^{\\infty} \\frac{1}{x}\\sqrt{1+\\frac{1}{x^4}}dx$$. For large $$x$$, $$\\sqrt{1+\\frac{1}{x^4}} \\approx 1$$, so the integrand behaves like $$\\frac{1}{x}$$.\n- Step 2: The integral $$\\int_1^{\\infty}\\frac{1}{x}dx$$ diverges (it's the harmonic series equivalent). More precisely, for all $$x > 0$$: $$\\frac{1}{x}\\sqrt{1+\\frac{1}{x^4}} > \\frac{1}{x}$$, so the surface area integral is bounded below by a divergent integral, hence it also diverges.\n\nThis is the famous \"painter's paradox\": you can fill the trumpet with a finite amount of paint, but you can't paint its surface with a finite amount.", "source": "GLM 5.1 ①", "_id": "glm_1_53"}, {"question": "Walk through finding $$\\int \\text{sech}^6 x \\tanh x \\, dx$$ by recognizing a pattern. (3 steps)", "answer": "- Step 1: Recall $$\\frac{d}{dx}(\\text{sech } x) = -\\text{sech } x \\tanh x$$. So $$\\text{sech } x \\tanh x = -\\frac{d}{dx}(\\text{sech } x)$$.\n- Step 2: Rewrite the integrand: $$\\text{sech}^6 x \\tanh x \\, dx = \\text{sech}^5 x \\cdot (\\text{sech } x \\tanh x) \\, dx = -\\text{sech}^5 x \\cdot \\frac{d}{dx}(\\text{sech } x) dx$$. This is $$-[f(x)]^5 f'(x) \\, dx$$ with $$f = \\text{sech } x$$.\n- Step 3: Apply $$\\int [f(x)]^n f'(x) \\, dx = \\frac{[f(x)]^{n+1}}{n+1}$$: result is $$-\\frac{\\text{sech}^6 x}{6} + C$$.\n\nThe key skill: spot the \"derivative companion\" already present. The $$\\tanh x$$ piece signals that sech is the function being raised to a power.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "For ∫x^{n}e^{-x}dx (n ≥ 0), why does the reduction formula alternate signs? Derive Iₙ = -xⁿe^{-x} + nIₙ₋₁. (3 steps)", "answer": "- Step 1: Let u = xⁿ, dv = e^{-x}dx → du = nxⁿ⁻¹dx, v = -e^{-x}.\n- Step 2: Iₙ = -xⁿe^{-x} + n∫xⁿ⁻¹e^{-x}dx.\n- Step 3: The negative sign from v persists, creating an alternating pattern when applied recursively.  \n**Factorial Insight:** Repeated application gives Iₙ = (-xⁿ + nxⁿ⁻¹ - n(n-1)xⁿ⁻² + ... + (-1)^n n!)e^{-x} + C.", "source": "Qwen 3 ①", "_id": "qwen_1_19"}, {"question": "For a parametric curve $$x = f(t)$$, $$y = g(t)$$, the arc length formula is $$s = \\int_{t_A}^{t_B}\\sqrt{\\left(\\frac{dx}{dt}\\right)^2+\\left(\\frac{dy}{dt}\\right)^2} dt$$. Derive this from the Cartesian form. (2 steps)", "answer": "- Step 1: From the fundamental relation $$(ds)^2 = (dx)^2 + (dy)^2$$, divide both sides by $$(dt)^2$$: $$\\left(\\frac{ds}{dt}\\right)^2 = \\left(\\frac{dx}{dt}\\right)^2 + \\left(\\frac{dy}{dt}\\right)^2$$.\n- Step 2: Taking the positive square root and integrating: $$s = \\int_{t_A}^{t_B}\\sqrt{\\left(\\frac{dx}{dt}\\right)^2+\\left(\\frac{dy}{dt}\\right)^2} \\, dt$$.\n\nThe parametric form is the most general — it unifies the $$x$$-form (where $$t=x$$) and the $$y$$-form (where $$t=y$$) as special cases.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "What is the fundamental purpose of a reduction formula in integration? (2 steps)", "answer": "- Step 1: A reduction formula relates an integral involving a power $n$ (denoted $I_n$) to the same integral with a lower power (usually $I_{n-1}$ or $I_{n-2}$).\n- Step 2: By repeatedly applying this recursive relationship, the original complex integral $I_n$ is \"reduced\" step-by-step until it reaches a base case (like $I_0$ or $I_1$) that is a simple, directly solvable standard integral.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "A curve has a vertical tangent at some point. What might happen to the arc length integral, and how do we handle it? (3 steps)", "answer": "- Step 1: At a vertical tangent, $$dy/dx \\to \\infty$$, so $$\\sqrt{1 + (dy/dx)^2}$$ is unbounded. The integral $$\\int \\sqrt{1+(dy/dx)^2}\\, dx$$ may converge as an improper integral or may diverge.\n- Step 2: Workaround: switch to $$\\int\\sqrt{1 + (dx/dy)^2}\\, dy$$. At a vertical tangent, $$dx/dy = 0$$, so the integrand is finite there.\n- Step 3: Even better: parametric form $$\\sqrt{(dx/dt)^2 + (dy/dt)^2}$$, with a parameter $$t$$ well-behaved everywhere on the curve.\n\nPractical lesson: the \"right\" form of arc length depends on the curve's geometry. Vertical tangents call for $$dx/dy$$ or parametric form.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "Use $$I_n = x^n e^x - nI_{n-1}$$ to find $$\\int x^4 e^x\\, dx$$ conceptually (describe the unwinding pattern, no need for explicit arithmetic). (3 steps)", "answer": "- Step 1: $$I_4 = x^4 e^x - 4I_3 = x^4 e^x - 4(x^3 e^x - 3I_2)$$. Expand: $$x^4 e^x - 4x^3 e^x + 12 I_2$$.\n- Step 2: Continue unwinding: $$I_2 = x^2 e^x - 2I_1$$, $$I_1 = xe^x - I_0$$, $$I_0 = e^x$$. Each substitution introduces a new $$x^k e^x$$ term with coefficient from a falling factorial.\n- Step 3: Final structure: $$e^x \\times$$ (polynomial of degree 4 with alternating-sign coefficients): $$x^4 e^x - 4x^3 e^x + 12x^2 e^x - 24xe^x + 24e^x + C$$. The coefficients $$1, 4, 12, 24, 24$$ are $$\\frac{4!}{(4-k)!}$$.\n\nPattern: each level produces $$x^k e^x$$ with falling-factorial coefficients and alternating signs. This is essentially the Taylor-like structure of the antiderivative.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "Strategically, when should you reduce by 1 vs by 2 in a reduction formula? (3 steps)", "answer": "- Step 1: **Reduce by 1** when IBP naturally produces the same form with the power dropped — e.g., $$\\int x^n e^x\\, dx$$. Differentiating $$x^n$$ drops one power; no identity needed; the reduction is \"self-similar\" in shape.\n- Step 2: **Reduce by 2** when IBP produces a Pythagorean-style identity yielding both the original $$I_n$$ and a 2-step-lower $$I_{n-2}$$. E.g., $$\\int \\sin^n x\\, dx$$: IBP introduces $$\\cos^2 x = 1 - \\sin^2 x$$, splitting into $$I_{n-2}$$ and $$I_n$$.\n- Step 3: Reduction by 2 also occurs when an identity directly converts the $$n$$-th power without IBP — e.g., $$\\tan^n x = \\tan^{n-2}x(\\sec^2 x - 1)$$ gives an immediate $$I_{n-2}$$ relation.\n\nSummary: by-1 with simple polynomial multipliers (like $$x^n$$); by-2 with trig/hyperbolic powers where Pythagorean identities create the gap.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "What's the general strategy for integrating products of hyperbolic functions, and how does it parallel trigonometric integration? (3 steps)", "answer": "- Step 1: The same techniques used for trigonometric expressions usually transfer directly, because hyperbolic functions obey similar (sign-modified) identities.\n- Step 2: Most products fit either $$\\int f'(x)[f(x)]^n\\, dx$$ (use power rule) or $$\\int \\frac{f'(x)}{f(x)}\\, dx$$ (use log rule). Look for one factor whose derivative is the other (up to a constant or sign).\n- Step 3: When identities are needed, key replacements include $$1 - \\tanh^2 x = \\text{sech}^2 x$$, $$\\cosh^2 x - \\sinh^2 x = 1$$, $$\\cosh 2x = 2\\cosh^2 x - 1$$. These mirror trig identities, with sign differences from $$\\cosh^2 - \\sinh^2 = 1$$ replacing $$\\cos^2 + \\sin^2 = 1$$.\n\nBig-picture rule: anything you'd do for $$\\sin/\\cos$$ usually works for $$\\sinh/\\cosh$$, with attention to sign differences in the Pythagorean identity.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "For an integral involving $$\\sqrt{1-x^2}$$, two substitutions are suggested: $$x = \\sin\\theta$$ or $$x = \\tanh u$$. Which is generally preferred and why? (2 steps)", "answer": "- Step 1: The substitution $$x = \\sin\\theta$$ is generally preferred. When you substitute, $$\\sqrt{1-x^2} = \\sqrt{1-\\sin^2\\theta} = \\cos\\theta$$, and $$dx = \\cos\\theta \\, d\\theta$$. The $$\\cos\\theta$$ from the square root and the $$\\cos\\theta$$ from $$dx$$ combine naturally, and the resulting integral in $$\\theta$$ is typically straightforward.\n- Step 2: The substitution $$x = \\tanh u$$ gives $$\\sqrt{1-x^2} = \\sqrt{1-\\tanh^2 u} = \\operatorname{sech} u$$, and $$dx = \\operatorname{sech}^2 u \\, du$$. The resulting integral involves $$\\operatorname{sech}^3 u$$, which is harder to integrate than a simple trigonometric expression. The trigonometric substitution leads to simpler integrals in most cases.\n\nThe textbook states: \"The first substitution in each suggested pair is the one more likely to prove the better choice.\"", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "Find $$\\int \\frac{2 + 5x}{\\sqrt{x^2 + 1}}\\, dx$$ by splitting into recognizable parts. (3 steps)", "answer": "- Step 1: Split: $$\\int \\frac{2}{\\sqrt{x^2+1}}\\, dx + \\int \\frac{5x}{\\sqrt{x^2+1}}\\, dx$$. The first piece is a standard inverse-hyperbolic; the second is a power-rule integrand.\n- Step 2: First piece: $$\\int \\frac{2}{\\sqrt{x^2+1}}\\, dx = 2\\,\\text{arsinh}\\, x$$.\n- Step 3: Second piece: with $$f = 1+x^2$$, $$f' = 2x$$, the integrand is $$\\frac{5}{2}f^{-1/2}\\cdot f'$$, integrating to $$5\\sqrt{1+x^2}$$.\n\nTotal: $$2\\,\\text{arsinh}\\, x + 5\\sqrt{1+x^2} + C$$. Whenever you see $$a + bx$$ in the numerator, **split**: the constant part wants the inverse function, and the $$bx$$ part wants the power rule.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "What is a reduction formula and why are they essential for integrals like $$\\int \\sin^n x \\, dx$$ with large n? (3 steps)", "answer": "- Step 1: A reduction formula expresses $$I_n$$ (an integral involving a parameter $$n$$, usually a power) in terms of $$I_{n-1}$$, $$I_{n-2}$$, etc. — a \"lower\" version of itself. The notation $$I_n$$ avoids repeated integral signs.\n- Step 2: Essential because direct methods scale terribly with $$n$$:\n+ $$\\int \\sin^2 x$$: easy with $$\\sin^2 x = \\frac{1-\\cos 2x}{2}$$.\n+ $$\\int \\sin^3 x$$: easy with peel-off-one trick.\n+ $$\\int \\sin^{10} x$$: chain of intermediate steps becomes error-prone.\n- Step 3: A reduction formula systematizes this: derive $$nI_n = (n-1)I_{n-2}$$ once, apply repeatedly to reduce $$I_{10}$$ → $$I_8$$ → ... → $$I_0$$, where $$I_0$$ is trivial.\n\nThe deeper insight: reduction formulae trade one hard problem for many copies of an easier related problem.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "How do you integrate $\\int \\operatorname{sech} x \\mathrm{~d} x$ using an exponential substitution? (4 steps)", "answer": "- Step 1: Multiply the numerator and denominator by $e^x$ to create an exponential-heavy denominator: $$\\int \\frac{2}{e^x + e^{-x}} \\mathrm{~d} x = \\int \\frac{2e^x}{e^{2x} + 1} \\mathrm{~d} x$$.\n- Step 2: Use the substitution $u = e^x$, so $$\\mathrm{d}u = e^x \\mathrm{d} x$$. The integral transforms to $$\\int \\frac{2}{u^2 + 1} \\mathrm{d} u$$.\n- Step 3: Recognize this as the standard $\\arctan$ form (Result 9): $$\\int \\frac{1}{u^2+1} \\mathrm{d}u = \\arctan u + C$$.\n- Step 4: Apply the constant and substitute back: $$2 \\arctan u + C = 2 \\arctan(e^x) + C$$.\n+ Note: Do not confuse this with $\\int \\sec x \\mathrm{~d} x = \\ln|\\sec x + \\tan x| + C$; the hyperbolic version requires a different approach.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "Why does ∫tanhⁿx dx reduce to a recursion with Iₙ₋₂, unlike ∫tanⁿx dx which uses Iₙ₋₂ with a positive term? (2 steps)", "answer": "- Step 1: For tanhⁿx, use tanhⁿx = tanhⁿ⁻²x(1 - sech²x) → Iₙ = Iₙ₋₂ - ∫tanhⁿ⁻²x sech²x dx.\n- Step 2: ∫tanhⁿ⁻²x sech²x dx = tanhⁿ⁻¹x/(n - 1) (via u = tanhx).  \n**Contrast:** ∫tanⁿx dx uses tan²x = sec²x - 1 → Iₙ = Iₙ₋₂ - ∫Iₙ₋₂ dx (no negative). The structure of hyperbolic identity (1 - tanh²x = sech²x) introduces a negative term.", "source": "Qwen 3 ①", "_id": "qwen_1_12"}, {"question": "When integrating $$\\int \\cosh^2 3x \\, dx$$, you cannot simply write $$\\frac{\\cosh^3 3x}{3}$$. Why not, and what identity do you use instead? Give the result. (3 steps)", "answer": "- Step 1: You cannot use reverse chain rule because the derivative of $$\\cosh 3x$$ is $$3\\sinh 3x$$, and there is no $$\\sinh 3x$$ factor present in the integrand. The \"missing derivative\" prevents direct integration.\n- Step 2: Use the double-angle identity $$\\cosh 2A = 2\\cosh^2 A - 1$$, rearranged as $$\\cosh^2 A = \\frac{1 + \\cosh 2A}{2}$$. With $$A = 3x$$: $$\\cosh^2 3x = \\frac{1 + \\cosh 6x}{2}$$.\n- Step 3: Now integrate: $$\\int \\frac{1+\\cosh 6x}{2} dx = \\frac{1}{2}x + \\frac{1}{2} \\cdot \\frac{\\sinh 6x}{6} + C = \\frac{1}{2}x + \\frac{1}{12}\\sinh 6x + C$$.\n\nThis mirrors the trigonometric technique: just as $$\\int \\cos^2 3x \\, dx$$ uses $$\\cos^2 A = \\frac{1+\\cos 2A}{2}$$, the hyperbolic version uses the analogous identity.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "Why does ∫√(x² + 1)dx involve sinh2u in its derivation? Compute ∫₀¹√(x² + 1)dx. (4 steps)", "answer": "- Step 1: Let x = sinhu → dx = coshu du → √(x² + 1) = coshu.\n- Step 2: Integral becomes ∫cosh²u du = (u/2 + sinh2u/4) + C.\n- Step 3: Substitute back u = arsinhx, sinh2u = 2sinhucoshu = 2x√(x² + 1).\n- Step 4: Definite integral from 0 to 1: [ (arsinh1)/2 + (2√2)/4 ] - 0 = (ln(1 + √2))/2 + √2/2.  \n**Key Insight:** The sinh2u term arises naturally from cosh²u's identity, tying back to original variable x.", "source": "Qwen 3 ①", "_id": "qwen_1_9"}, {"question": "State the four generalized standard integrals (results 12–15) and explain why only one carries a $$1/a$$ factor. (4 steps)", "answer": "- Step 1: $$\\int \\frac{1}{\\sqrt{a^2 - x^2}} dx = \\arcsin\\left(\\frac{x}{a}\\right) + C$$, $$|x| < a$$\n- Step 2: $$\\int \\frac{1}{a^2 + x^2} dx = \\frac{1}{a}\\arctan\\left(\\frac{x}{a}\\right) + C$$ ← **this one has $$1/a$$**\n- Step 3: $$\\int \\frac{1}{\\sqrt{a^2 + x^2}} dx = \\text{arsinh}\\left(\\frac{x}{a}\\right) + C$$ and $$\\int \\frac{1}{\\sqrt{x^2 - a^2}} dx = \\text{arcosh}\\left(\\frac{x}{a}\\right) + C$$, $$x > a$$.\n- Step 4: The arctan one has the extra $$1/a$$ because the denominator is $$a^2$$ (not $$\\sqrt{a^2}=a$$). Factoring gives an extra $$a$$ surplus that survives the substitution. The other three have $$\\sqrt{a^2}$$, so factors of $$a$$ from denominator and $$dx$$ cancel exactly.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "For $$I_n = \\int \\tan^n x \\mathrm{~d} x$$, how can you derive a reduction formula without using integration by parts? (3 steps)", "answer": "- Step 1: Split off two powers of $\\tan x$ by writing $$\\tan^n x = \\tan^{n-2} x \\tan^2 x$$.\n- Step 2: Use the identity $$\\tan^2 x = \\sec^2 x - 1$$ to rewrite the integral as $$\\int \\tan^{n-2} x (\\sec^2 x - 1) \\mathrm{d} x = \\int \\tan^{n-2} x \\sec^2 x \\mathrm{d} x - \\int \\tan^{n-2} x \\mathrm{d} x$$.\n- Step 3: The first integral is of the form $$\\int [\\mathrm{f}(x)]^m \\mathrm{f}'(x) \\mathrm{d} x$$ (with $\\mathrm{f}(x) = \\tan x$), giving $$\\frac{\\tan^{n-1} x}{n-1}$$. The second integral is simply $I_{n-2}$. So, $$I_n = \\frac{1}{n-1} \\tan^{n-1} x - I_{n-2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "Evaluate ∫ e^(2x) sinh x dx using the exponential definition of sinh x. Why might integration by parts fail here? (3 steps)", "answer": "- Step 1: Write sinh x in exponential form: sinh x = (e^x - e^(-x))/2\n\n- Step 2: Substitute: ∫ e^(2x) × (e^x - e^(-x))/2 dx = (1/2)∫ (e^(3x) - e^x) dx\n\n- Step 3: Integrate: = (1/2)[e^(3x)/3 - e^x] + C = (1/6)e^(3x) - (1/2)e^x + C\n\n- Why integration by parts fails: When you try IBP on e^(2x)sinh x, you get a循环 that doesn't simplify. Using exponentials converts it to simple exponential integrals.", "source": "MiniMax ①", "_id": "minimax_1_5"}, {"question": "What error occurs if you forget to change the limits when doing a substitution in a definite integral? (3 steps)", "answer": "- Step 1: After substituting $$u = g(x)$$, the integrand is in terms of $$u$$, but the limits should also become $$g(a)$$ and $$g(b)$$, not the original $$a$$ and $$b$$.\n- Step 2: Forgetting to change limits means evaluating the new integrand at the **wrong values** — a numerically meaningless result.\n- Step 3: Two consistent strategies:\n+ Change limits to match $$u$$, evaluate without substituting back.\n+ Do the indefinite integral, substitute back to $$x$$, then evaluate at original $$a, b$$.\n\nThe trap is mixing: using $$x$$-limits with a $$u$$-integrand. Pick one strategy and commit.", "source": "Opus 4.7 ①", "_id": "opus_1_62"}, {"question": "Outline the strategy for integrating $$\\int \\frac{1}{\\sqrt{px^2 + qx + r}}\\, dx$$, and how the sign of $$p$$ matters. (3 steps)", "answer": "- Step 1: Complete the square inside the radical. The result will be one of:\n+ $$\\sqrt{a^2 - (x+b)^2}$$ (when $$p < 0$$) → $$\\arcsin$$\n+ $$\\sqrt{(x+b)^2 + a^2}$$ (when $$p > 0$$, irreducible) → $$\\text{arsinh}$$\n+ $$\\sqrt{(x+b)^2 - a^2}$$ (when $$p > 0$$, real roots) → $$\\text{arcosh}$$\n- Step 2: Substitute $$u = x + b$$ to shift to standard form.\n- Step 3: Apply the matching standard result and back-substitute.\n\nSign of the $$x^2$$ coefficient determines whether you head toward $$\\arcsin$$ (negative) or $$\\text{arsinh}$$/$$\\text{arcosh}$$ (positive).", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Explain the linear-argument rule $$\\int f'(ax+b) \\, dx = \\frac{1}{a} f(ax+b) + C$$ and give one practical example. (2 steps)", "answer": "- Step 1: The rule comes from the chain rule reversed. If $$F'(x) = f(x)$$, then $$\\frac{d}{dx}[F(ax+b)] = a \\cdot f(ax+b)$$. Integrating $$f(ax+b)$$ gives $$\\frac{1}{a}F(ax+b) + C$$ — the \"$$1/a$$\" compensates for the chain-rule factor.\n- Step 2: Practical example: $$\\int \\cosh(4x-1) dx = \\frac{1}{4}\\sinh(4x-1) + C$$.\n+ Another: $$\\int \\text{cosech}(3x)\\coth(3x) dx = -\\frac{1}{3}\\text{cosech}(3x) + C$$.\n\nThe takeaway: this rule generalizes results 1, 2, 4–7 to any linear inner argument — no substitution machinery needed.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Using the reduction formula nIₙ = (n-1)Iₙ₋₂ for Iₙ = ∫₀^π/₂ sinⁿx dx, prove that for even n = 2m, I₂m = ((2m-1)!!/(2m)!!)(π/2). Explain what the double factorial notation means. (2 steps)", "answer": "- Step 1: The double factorial (2m)!! = 2m × (2m-2) × ... × 2 and (2m-1)!! = (2m-1) × (2m-3) × ... × 1.\n- Step 2: Starting from I₀ = π/2 and applying the reduction formula repeatedly for even n:\n+ I₂ = (1/2)(π/2) = (1×π)/(2×2)\n+ I₄ = (3/4)I₂ = (3×1)/(4×2) × (π/2)\n+ In general, I₂m = [(2m-1)/(2m)] × [(2m-3)/(2m-2)] × ... × (1/2) × (π/2) = ((2m-1)!!/(2m)!!)(π/2).\n\nThis compact notation elegantly expresses the product of alternating terms.", "source": "MiniMax ②", "_id": "minimax_2_54"}, {"question": "What is the key insight for integrating expressions like ∫x/√(x² + 1) dx? How do you recognise this pattern? (2 steps)", "answer": "- Step 1: This is of the form ∫f'(x)/√(f(x)) dx or ∫f'(x)[f(x)]^n dx with n = -1/2.\n- Step 2: Recognise it by seeing x in the numerator and a function of x under the square root. The derivative of the inside function (x² + 1) is 2x, which is proportional to the numerator.\n+ The answer is simply √(x² + 1) + C.\n\nThe general pattern is: if you see (derivative of something) times (that something to a power), you can integrate directly.", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "Why does ∫ 1/(1+x²) dx give arctan x but ∫ x/(1+x²) dx gives (1/2)ln(1+x²)? They look similar. Explain the key distinction. (2 steps)", "answer": "- Step 1: The key is whether the numerator is the derivative of the denominator.\n- For ∫ 1/(1+x²) dx: denominator is 1+x², numerator is 1, which is NOT the derivative of 1+x² (which is 2x). So this doesn't fit the log pattern — it's a standard form giving arctan x.\n\n- Step 2: For ∫ x/(1+x²) dx: numerator x is exactly (1/2) times the derivative of (1+x²) (which is 2x). So this fits the ∫ f'(x)/f(x) dx pattern, giving (1/2)ln(1+x²).\n\n- Watch out: A denominator of 1+x² does NOT automatically imply arctan — you must check if the numerator is (proportional to) the derivative of what appears in the denominator.", "source": "MiniMax ①", "_id": "minimax_1_32"}, {"question": "What are the two main strategies for handling integrands like $$\\int \\frac{1}{\\text{quadratic}} dx$$, and how do you decide between them? (3 steps)", "answer": "- Step 1: **Partial fractions**: works when the quadratic factors over reals (positive discriminant). Split into linear-denominator pieces, each → log.\n+ **Completing the square**: works always, and especially when the quadratic doesn't factor (negative discriminant) — gives $$(x+b)^2 + c^2$$ form → arctan.\n- Step 2: How to decide: check the discriminant. If $$q^2 - 4pr > 0$$, factor and use partial fractions. If $$< 0$$, complete the square. If $$= 0$$, the quadratic is a perfect square → reduces to $$1/(x+b)^2$$.\n- Step 3: For $$\\int \\frac{1}{\\sqrt{\\text{quadratic}}} dx$$, partial fractions don't apply — always complete the square to match arcsin/arsinh/arcosh.\n\nEven when both methods work for the unsurd case, the choice is mostly cosmetic; partial fractions are more \"algebraic,\" completing the square is more \"geometric.\"", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "State three different techniques for integrating ∫x/√(1+x²) dx and show that they all give the same answer. (3 techniques)", "answer": "- Method 1 (substitution): Let u = 1+x², du = 2x dx, so ∫x/√u · (du/2) = (1/2)∫u^(-1/2) du = √u + C = √(1+x²) + C.\n- Method 2 (recognise derivative): The derivative of √(1+x²) is x/√(1+x²), so the answer is √(1+x²) + C.\n- Method 3 (hyperbolic): Let x = sinh u, then dx = cosh u du, √(1+x²) = cosh u, so ∫sinh u · cosh u/cosh u du = ∫sinh u du = cosh u + C = √(1+x²) + C.\n\nAll methods lead to √(1+x²) + C, demonstrating consistency in calculus.", "source": "MiniMax ②", "_id": "minimax_2_51"}, {"question": "Why might one prefer the parametric arc-length formula over Cartesian for circles? (3 steps)", "answer": "- Step 1: A circle $$x^2 + y^2 = r^2$$ in Cartesian form requires $$y = \\pm\\sqrt{r^2 - x^2}$$ — multi-valued. Each branch must be integrated separately, with vertical-tangent issues at $$x = \\pm r$$ (where $$dy/dx \\to \\infty$$).\n- Step 2: In parametric form $$x = r\\cos\\theta$$, $$y = r\\sin\\theta$$: the integrand $$\\sqrt{(-r\\sin\\theta)^2 + (r\\cos\\theta)^2} = r$$ — constant! Then $$s = \\int_0^{2\\pi} r \\, d\\theta = 2\\pi r$$. Clean and singularity-free.\n- Step 3: Lesson: for curves with multi-valuedness or vertical tangents, parametric forms tame the geometry. The parameter \"lifts\" the curve into a single-valued representation.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "Derive $$\\int \\text{arsinh}\\, x\\, dx = x\\,\\text{arsinh}\\, x - \\sqrt{1+x^2} + C$$. (4 steps)", "answer": "- Step 1: IBP with $$u = \\text{arsinh}\\, x$$, $$dv = dx$$, so $$du = \\frac{1}{\\sqrt{1+x^2}}\\, dx$$, $$v = x$$.\n- Step 2: $$\\int \\text{arsinh}\\, x\\, dx = x\\,\\text{arsinh}\\, x - \\int \\frac{x}{\\sqrt{1+x^2}}\\, dx$$.\n- Step 3: For $$\\int x(1+x^2)^{-1/2}\\, dx$$: with $$f = 1+x^2$$, $$f' = 2x$$, this is $$\\frac{1}{2}f^{-1/2}f'$$, integrating to $$\\sqrt{1+x^2}$$.\n- Step 4: Combine: $$x\\,\\text{arsinh}\\, x - \\sqrt{1+x^2} + C$$.\n\nStructural symmetry with $$\\int \\arctan x\\, dx$$: both produce [variable × inverse function] minus [a function involving the radical/quadratic from the inverse's derivative].", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Explain why ∫ 1/√(1-x²) dx = arcsin x + C but ∫ x/√(1-x²) dx has a different form. What determines which standard result to use? (2 steps)", "answer": "- Step 1: In ∫ 1/√(1-x²) dx, the integrand is exactly the derivative of arcsin x (which is 1/√(1-x²)), so the result is directly arcsin x.\n\n- Step 2: In ∫ x/√(1-x²) dx, the numerator x is proportional to the derivative of the expression under the root (which is 1-x², derivative is -2x). This matches the pattern ∫ f'(x)/√f(x) dx = 2√f(x) + C, giving -√(1-x²) + C.\n\n- The determining factor: Check whether the numerator is (proportional to) the derivative of the \"inside\" function. If yes → power rule or log rule. If the integrand exactly matches the derivative of the inverse trig/hyperbolic function → use that form.", "source": "MiniMax ①", "_id": "minimax_1_40"}, {"question": "Why does $$\\int 1/(1-x^2) dx$$ give a logarithm but $$\\int 1/\\sqrt{1-x^2} dx$$ give arcsin? Geometric distinction. (3 steps)", "answer": "- Step 1: **arcsin and friends** parameterize the **unit circle** $$X^2 + Y^2 = 1$$. The integral $$\\int 1/\\sqrt{1-x^2} dx$$ measures the angle subtended — the **arc length parameter** on the circle.\n- Step 2: **Logarithms** arise from the **rectangular hyperbola** $$X^2 - Y^2 = 1$$ (or $$X \\cdot Y = 1$$). The integral $$\\int 1/(1-x^2) dx$$ is related to the **rapidity** parameter (artanh).\n- Step 3: The square root marks **circular vs hyperbolic geometry**: with the root, you measure circular angles (arcsin/arctan); without, you measure hyperbolic-angle-like quantities (artanh = log form).\n\nBoth are inverse functions of geometric coordinates, just on different conic sections.", "source": "Opus 4.7 ②", "_id": "opus_2_80"}, {"question": "When deriving a reduction formula via IBP, why do we sometimes need an algebraic identity at the end? (3 steps)", "answer": "- Step 1: IBP often produces an integral that's \"almost\" the original $$I_{n-k}$$ form but has an extra factor (like $$\\cos^2 x$$ or $$(1-x)$$) introduced by integrating the chosen $$dv$$.\n- Step 2: That extra factor doesn't naturally fit the $$I_n$$ family. We use a Pythagorean-style identity (like $$\\cos^2 x = 1 - \\sin^2 x$$) to split it: one piece gives $$I_{n-2}$$, the other gives $$I_n$$ back.\n- Step 3: This produces an equation $$I_n = \\text{(stuff)} - kI_n + cI_{n-2}$$, which we solve algebraically for $$I_n$$. Routine \"linear equation\" step.\n\nIf after IBP the remaining integral isn't immediately $$I_{n-1}$$ or $$I_{n-2}$$, try a Pythagorean identity to split it.", "source": "Opus 4.7 ①", "_id": "opus_1_74"}, {"question": "Why is the formula $$2\\pi \\int y \\, ds$$ (about x-axis) different from $$2\\pi \\int x \\, ds$$ (about y-axis)? When does it matter? (3 steps)", "answer": "- Step 1: The factor in front of $$ds$$ is always the **distance from the axis of rotation to the curve point** (the lever arm/radius).\n- Step 2: Rotating about x-axis: every point is at perpendicular distance $$y$$ from the axis, so swept circle has circumference $$2\\pi y$$.\n+ Rotating about y-axis: the perpendicular distance is $$x$$, giving circumference $$2\\pi x$$.\n- Step 3: Matters whenever the curve isn't symmetric: example for $$y = \\cosh x$$ from $$(0,1)$$ to $$(\\ln 2, 5/4)$$:\n+ About x-axis: integrand involves $$y = \\cosh x$$ → integral of $$\\cosh^2 x$$.\n+ About y-axis: integrand involves $$x$$ → integral of $$x \\cosh x$$ (different technique).\n\nConceptual takeaway: this is Pappus's theorem in disguise — surface area = perimeter × distance traveled by centroid.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "Compare $$\\int \\text{sech}^2 x\\, dx$$ and $$\\int \\text{cosech}^2 x\\, dx$$ — note signs carefully. (3 steps)", "answer": "- Step 1: $$\\int \\text{sech}^2 x \\, dx = \\tanh x + C$$ (no sign flip), because $$\\frac{d}{dx}\\tanh x = \\text{sech}^2 x$$.\n- Step 2: $$\\int \\text{cosech}^2 x \\, dx = -\\coth x + C$$ (sign flip), because $$\\frac{d}{dx}\\coth x = -\\text{cosech}^2 x$$.\n- Step 3: This mirrors the trig pattern: $$\\int \\sec^2 x\\, dx = \\tan x + C$$ (no flip), $$\\int \\csc^2 x\\, dx = -\\cot x + C$$ (flip). The \"co-\" prefixed function in each pair carries the negative sign — same pattern in trig and hyperbolic.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "For $$I_n = \\int_0^1 x^n\\sqrt{1-x} \\, dx$$, the reduction formula is $$I_n = \\frac{2n}{2n+3}I_{n-1}$$. After integration by parts, an algebraic manipulation is needed to isolate $$I_n$$. Explain the key trick. (3 steps)", "answer": "- Step 1: Integration by parts with $$u = x^n$$, $$\\frac{dv}{dx} = \\sqrt{1-x}$$ gives $$v = -\\frac{2}{3}(1-x)^{3/2}$$. The boundary term vanishes at both limits (0 and 1) since $$n \\geq 1$$.\n- Step 2: The integral becomes $$I_n = \\frac{2n}{3}\\int_0^1 x^{n-1}(1-x)^{3/2}dx$$. Now rewrite $$(1-x)^{3/2} = (1-x)\\sqrt{1-x}$$ and expand: $$I_n = \\frac{2n}{3}\\int_0^1 x^{n-1}\\sqrt{1-x} \\, dx - \\frac{2n}{3}\\int_0^1 x^n\\sqrt{1-x} \\, dx = \\frac{2n}{3}I_{n-1} - \\frac{2n}{3}I_n$$.\n- Step 3: Now $$I_n$$ appears on both sides. Collect terms: $$I_n + \\frac{2n}{3}I_n = \\frac{2n}{3}I_{n-1}$$, so $$\\left(1+\\frac{2n}{3}\\right)I_n = \\frac{2n}{3}I_{n-1}$$, giving $$I_n = \\frac{2n}{2n+3}I_{n-1}$$.\n\nThe key trick: when $$I_n$$ appears on both sides after expansion, collect and solve for $$I_n$$ algebraically.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "The catenary $$y = a\\cosh(x/a)$$ has a fascinating property tying together its shape, slope, and arc length. State and explain. (3 steps)", "answer": "- Step 1: For the catenary, $$dy/dx = \\sinh(x/a)$$. So $$1 + (dy/dx)^2 = \\cosh^2(x/a) = (y/a)^2$$. The arc length differential $$ds = (y/a) \\, dx$$.\n- Step 2: This means $$ds/dx = y/a$$ — the rate of arc length growth equals the height divided by $$a$$. Equivalently: $$y \\cdot dx = a \\cdot ds$$.\n- Step 3: Geometric consequence: integrating, $$\\int y \\, dx = a \\cdot s$$ — the area under the curve is $$a$$ times the arc length! This is unique to the catenary.\n\nWhy this is physical: a hanging chain forms a catenary because tension at each point balances the weight hanging below. The weight is proportional to arc length ($$s$$), and the equilibrium expresses tension in terms of $$y$$.", "source": "Opus 4.7 ②", "_id": "opus_2_67"}, {"question": "Why does the substitution $$u = \\sin x$$ or $$u = \\cos x$$ work for $$\\int \\sin^n x \\cos^m x \\, dx$$ when at least one of n, m is odd, but fail when both are even? (3 steps)", "answer": "- Step 1: If $$m$$ is odd, write $$\\cos^m x = \\cos^{m-1} x \\cdot \\cos x$$. The $$\\cos^{m-1} x$$ has even power, expressible via $$\\cos^2 = 1 - \\sin^2$$ in terms of $$\\sin x$$. The lone $$\\cos x \\, dx$$ becomes $$d(\\sin x)$$ — perfect for $$u = \\sin x$$.\n- Step 2: Symmetrically for $$n$$ odd: peel off one $$\\sin x$$ to get $$d(\\cos x) = -\\sin x \\, dx$$, use $$u = \\cos x$$.\n- Step 3: When both are even, no factor peels off cleanly. You must use power-reduction identities ($$\\sin^2 x = (1 - \\cos 2x)/2$$, $$\\cos^2 x = (1 + \\cos 2x)/2$$) to convert to lower-frequency cosines.\n\nThis pattern carries over directly to hyperbolic powers — same parity rules.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Derive the formula $$S = 2\\pi \\int y \\, ds$$ for the surface area generated by rotating an arc about the x-axis. (5 steps)", "answer": "- Step 1: A small arc $$PQ$$ rotated about the x-axis sweeps out a thin band shaped like a frustum of a cone.\n- Step 2: Lateral surface of frustum: $$\\pi(r_1 + r_2) l$$, where $$l$$ is slant. Here $$r_1 = y$$, $$r_2 = y + \\delta y$$, $$l \\approx \\delta s$$.\n- Step 3: $$\\delta S \\approx \\pi(2y + \\delta y) \\delta s \\approx 2\\pi y \\, \\delta s$$ in the limit (the $$\\delta y$$ becomes negligible).\n- Step 4: Integrate: $$S = \\int 2\\pi y \\, ds$$.\n- Step 5: Substitute the appropriate form of $$ds$$:\n+ Cartesian: $$ds = \\sqrt{1 + (dy/dx)^2} dx$$\n+ Parametric: $$ds = \\sqrt{(dx/dt)^2 + (dy/dt)^2} dt$$\n\nThe factor $$2\\pi y$$ is the **circumference** of the circle traced by the point at height $$y$$; multiplying by $$ds$$ gives \"circumference × small slant\" = small frustum strip area.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "A curve has $$\\sqrt{(dx/dt)^2 + (dy/dt)^2}$$ that simplifies to a perfect square. Why is this the **ideal** scenario for arc length? (3 steps)", "answer": "- Step 1: If $$(dx/dt)^2 + (dy/dt)^2 = [g(t)]^2$$, then the radical collapses: $$\\sqrt{...} = |g(t)|$$ — no troublesome radical in the integrand.\n- Step 2: The arc length integral becomes $$s = \\int_{t_A}^{t_B}|g(t)|\\, dt$$ — a \"pure\" integral with no radicals.\n- Step 3: Examples of nice curves: $$y = \\cosh x$$ (catenary) gives $$1 + \\sinh^2 x = \\cosh^2 x$$. The cycloid $$x = a(\\theta - \\sin\\theta), y = a(1-\\cos\\theta)$$ gives $$2a^2(1 - \\cos\\theta) = 4a^2\\sin^2(\\theta/2)$$. Both are perfect squares.\n\nMost curves give $$\\sqrt{\\text{quadratic}}$$ requiring trig/hyperbolic substitution. The \"nice\" curves where the radical collapses are special and historically significant.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "For the integral $$\\int \\frac{3x-1}{\\sqrt{x^2-2x+10}}dx$$, you need to split the numerator strategically. If you write $$3x-1 = \\frac{3}{2}(2x-2)+2$$, explain why each part integrates to a different type of result. (3 steps)", "answer": "- Step 1: Note that $$\\frac{d}{dx}(x^2-2x+10) = 2x-2$$. So writing $$3x-1 = \\frac{3}{2}(2x-2)+2$$ separates the numerator into a part proportional to the derivative of the quadratic, and a constant.\n- Step 2: The first part: $$\\int \\frac{\\frac{3}{2}(2x-2)}{\\sqrt{x^2-2x+10}}dx = \\frac{3}{2}\\int \\frac{f'(x)}{[f(x)]^{1/2}}dx = \\frac{3}{2} \\cdot 2\\sqrt{x^2-2x+10} = 3\\sqrt{x^2-2x+10}$$.\n- Step 3: The second part: $$\\int \\frac{2}{\\sqrt{x^2-2x+10}}dx$$. Complete the square: $$x^2-2x+10 = (x-1)^2+9$$. This gives the $$\\operatorname{arsinh}$$ form: $$2\\operatorname{arsinh}\\left(\\frac{x-1}{3}\\right)$$.\n\nThe strategy: express the linear numerator as $$k \\cdot f'(x) + c$$ where $$f(x)$$ is the quadratic under the square root.", "source": "GLM 5.1 ①", "_id": "glm_1_48"}, {"question": "The cycloid $$x = a(\\theta - \\sin\\theta), y = a(1 - \\cos\\theta)$$ has a remarkably clean arc length integrand. Why? (4 steps)", "answer": "- Step 1: Compute $$\\frac{dx}{d\\theta} = a(1-\\cos\\theta)$$, $$\\frac{dy}{d\\theta} = a\\sin\\theta$$.\n- Step 2: $$(dx/d\\theta)^2 + (dy/d\\theta)^2 = a^2(1-\\cos\\theta)^2 + a^2\\sin^2\\theta = a^2(1 - 2\\cos\\theta + \\cos^2\\theta + \\sin^2\\theta) = a^2(2 - 2\\cos\\theta)$$.\n- Step 3: Use $$1 - \\cos\\theta = 2\\sin^2(\\theta/2)$$: this becomes $$4a^2\\sin^2(\\theta/2)$$.\n- Step 4: $$\\sqrt{...} = 2a|\\sin(\\theta/2)|$$ — a perfect square root with no radical complications.\n\nArc length over one arch ($$0$$ to $$2\\pi$$): $$\\int_0^{2\\pi} 2a\\sin(\\theta/2)\\, d\\theta = 8a$$. The perfect-square structure is what makes the cycloid a \"nice\" curve historically.", "source": "Opus 4.7 ①", "_id": "opus_1_67"}, {"question": "Verify the surface-of-revolution formula by computing the surface area of a sphere. (4 steps)", "answer": "- Step 1: Parameterize the upper semicircle: $$x = R\\cos\\theta$$, $$y = R\\sin\\theta$$, $$\\theta \\in [0, \\pi]$$. Rotating about $$x$$-axis sweeps the full sphere.\n- Step 2: Compute $$\\sqrt{(dx/d\\theta)^2 + (dy/d\\theta)^2} = \\sqrt{R^2\\sin^2\\theta + R^2\\cos^2\\theta} = R$$.\n- Step 3: Integrand: $$y\\sqrt{...} = R\\sin\\theta \\cdot R = R^2\\sin\\theta$$.\n- Step 4: $$S = 2\\pi\\int_0^\\pi R^2\\sin\\theta\\, d\\theta = 2\\pi R^2 \\cdot 2 = 4\\pi R^2$$. ✓\n\nThe Pythagorean identity makes the radical constant — a hallmark of nice rotational surfaces. This sanity check should always work for spheres, cones, cylinders.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "Why must we take the positive square root in the arc length formula? (3 steps)", "answer": "- Step 1: Arc length is a **distance** — defined to be non-negative and to **increase** as we move along the curve.\n- Step 2: $$\\left(\\frac{ds}{dx}\\right)^2 = 1 + (dy/dx)^2$$ has two square-root solutions, but only the positive one corresponds to \"$$s$$ increasing as $$x$$ increases.\"\n- Step 3: If you used the negative root, you'd get a result that decreases over the integration interval, contradicting the geometric meaning. The positive root is enforced by convention to match intuition: walking from A to B accumulates positive distance.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "Derive the cosine reduction formula: for $$I_n = \\int \\cos^n x\\, dx$$, show $$nI_n = \\cos^{n-1} x \\sin x + (n-1)I_{n-2}$$. (4 steps)", "answer": "- Step 1: Write $$\\cos^n x = \\cos^{n-1}x \\cdot \\cos x$$. IBP: $$u = \\cos^{n-1}x$$, $$dv = \\cos x\\, dx$$, so $$du = -(n-1)\\cos^{n-2}x\\sin x\\, dx$$, $$v = \\sin x$$.\n- Step 2: $$I_n = \\cos^{n-1}x \\sin x + (n-1)\\int \\cos^{n-2}x\\sin^2 x\\, dx$$.\n- Step 3: Use $$\\sin^2 x = 1 - \\cos^2 x$$: $$I_n = \\cos^{n-1}x\\sin x + (n-1)I_{n-2} - (n-1)I_n$$.\n- Step 4: Rearrange: $$I_n + (n-1)I_n = \\cos^{n-1}x\\sin x + (n-1)I_{n-2}$$, i.e., $$nI_n = \\cos^{n-1}x\\sin x + (n-1)I_{n-2}$$.\n\nIdentical structure to the sine reduction — just with a non-vanishing boundary term in the indefinite case (the $$\\cos^{n-1}x\\sin x$$ term).", "source": "Opus 4.7 ①", "_id": "opus_1_63"}, {"question": "Why does the integrand for surface area about the $$x$$-axis use $$y$$ but the integrand for arc length doesn't? (3 steps)", "answer": "- Step 1: Arc length measures the **length** of the curve — purely 1-dimensional. Each tiny piece has length $$ds$$, summed straight: $$L = \\int ds$$.\n- Step 2: Surface area of revolution measures a 2D surface. Each tiny arc piece sweeps a circle of circumference $$2\\pi y$$ when rotated about the $$x$$-axis. The strip has area $$2\\pi y \\cdot ds$$.\n- Step 3: So the $$y$$ factor accounts for **rotational sweep** — the curve's distance from the axis determines how big a circle each point traces. Arc length doesn't involve rotation, so no $$y$$ factor.\n\nThe $$y$$ in surface formulas is a **circumference factor**, geometric, encoding \"how far from the axis am I?\"", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "To find $$\\int e^{2x}\\sinh x \\, dx$$, integration by parts twice seems natural but actually fails when the coefficient of $$x$$ in the exponent matches the hyperbolic argument (e.g., $$e^{ax}\\sinh ax$$). What alternative method works, and why? (3 steps)", "answer": "- Step 1: Use the exponential definition: $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$. Substitute this in: $$\\int e^{2x} \\cdot \\frac{e^x - e^{-x}}{2} dx = \\frac{1}{2}\\int (e^{3x} - e^{x}) dx$$.\n- Step 2: Now integrate each term directly: $$\\frac{1}{2}\\left(\\frac{e^{3x}}{3} - e^x\\right) + C = \\frac{1}{6}e^{3x} - \\frac{1}{2}e^x + C = \\frac{1}{6}(e^{3x} - 3e^x) + C$$.\n- Step 3: The reason integration by parts fails for $$\\int e^{ax}\\sinh ax \\, dx$$: after two rounds of parts, you get back to the original integral but with the same sign (unlike $$\\int e^{ax}\\sin bx \\, dx$$ where signs alternate). This means you cannot solve for the integral algebraically. The exponential method always works cleanly for products of exponentials with hyperbolic functions.\n\nRule of thumb: when you see $$e^{ax}$$ times a hyperbolic function, try converting the hyperbolic function to exponentials first.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "Why is $$\\int \\frac{1}{\\sinh x + \\cosh x} dx$$ so simple? (3 steps)", "answer": "- Step 1: Use exponential form: $$\\sinh x + \\cosh x = \\frac{e^x - e^{-x}}{2} + \\frac{e^x + e^{-x}}{2} = e^x$$. The combination collapses to a single exponential!\n- Step 2: So the integral becomes $$\\int \\frac{1}{e^x} dx = \\int e^{-x} dx = -e^{-x} + C$$.\n- Step 3: This is the cleanest example of the principle: hyperbolic combinations often simplify dramatically when written in exponential form.\n\nBonus identities: $$\\cosh x + \\sinh x = e^x$$, $$\\cosh x - \\sinh x = e^{-x}$$. These are foundational for hyperbolic manipulation.", "source": "Opus 4.7 ②", "_id": "opus_2_73"}, {"question": "What's the key insight in $$\\int e^x\\sinh x\\, dx$$ via exponential expansion, and why is it faster than IBP? (3 steps)", "answer": "- Step 1: $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$, so $$e^x \\sinh x = \\frac{e^{2x} - 1}{2}$$. The exponential structure collapses immediately.\n- Step 2: Both terms are elementary: $$\\int \\frac{e^{2x}}{2}\\, dx = \\frac{e^{2x}}{4}$$, $$\\int -\\frac{1}{2}\\, dx = -\\frac{x}{2}$$. Total: $$\\frac{e^{2x}}{4} - \\frac{x}{2} + C$$.\n- Step 3: With IBP, you'd integrate twice and end up with the original integral on the right side. The equation gives the answer, but it's slower and more error-prone.\n\nRule of thumb: $$e^{ax}$$ multiplying a hyperbolic function with the same coefficient $$a$$ → **always** use exponential expansion. Coefficients align to produce simple exponentials.", "source": "Opus 4.7 ①", "_id": "opus_1_70"}, {"question": "Why does $$\\int \\text{sech } x \\, dx$$ require a special technique, unlike $$\\int \\text{sech}^2 x \\, dx$$? Outline the trick. (3 steps)", "answer": "- Step 1: $$\\int \\text{sech}^2 x \\, dx = \\tanh x + C$$ is direct — sech-squared is exactly the derivative of tanh. But $$\\int \\text{sech } x \\, dx$$ has no immediate antiderivative.\n- Step 2: The trick: multiply numerator and denominator by $$e^x$$. Since $$\\text{sech } x = \\frac{2}{e^x + e^{-x}}$$, this gives $$\\frac{2e^x}{e^{2x} + 1}$$.\n- Step 3: Substitute $$u = e^x$$, so $$du = e^x dx$$: integral becomes $$\\int \\frac{2}{u^2 + 1} du = 2\\arctan u + C = 2\\arctan(e^x) + C$$.\n\nThe deep reason: sech in exponential form is a rational function of $$e^x$$, so the right substitution converts it to standard arctan-shape.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "Why does the substitution $$x = a\\cosh u$$ for $$\\sqrt{x^2 - a^2}$$ require $$x \\geq a$$? (3 steps)", "answer": "- Step 1: $$\\cosh u$$ has range $$[1, \\infty)$$. So $$x = a\\cosh u$$ produces values $$x \\geq a$$ (for $$a > 0$$). The substitution simply cannot reach $$|x| < a$$.\n- Step 2: For $$x < -a$$, you'd need $$\\cosh u < 0$$, which is impossible — so this substitution doesn't cover that region either.\n- Step 3: Practical consequence: $$\\int \\frac{1}{\\sqrt{x^2-a^2}}\\, dx = \\text{arcosh}(x/a)$$ is valid only for $$x > a$$. For $$x < -a$$, you'
