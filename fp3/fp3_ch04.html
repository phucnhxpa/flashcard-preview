d need a different approach (e.g., a sign-adjusted form involving $$-\\text{arcosh}(-x/a)$$).\n\nThe principal-branch restriction of $$\\text{arcosh}$$ ($$x \\geq 1$$) propagates to the integral. Always note the domain restriction when using arcosh-based antiderivatives.", "source": "Opus 4.7 ①", "_id": "opus_1_82"}, {"question": "Why is $$\\int \\frac{1}{a^2 - x^2}\\, dx = \\frac{1}{2a}\\ln\\left|\\frac{a+x}{a-x}\\right| + C$$ derivable by partial fractions, but $$\\int \\frac{1}{a^2 + x^2}\\, dx$$ is not? (3 steps)", "answer": "- Step 1: $$a^2 - x^2 = (a-x)(a+x)$$ factors over the reals (real roots exist). Partial fractions: $$\\frac{1}{a^2 - x^2} = \\frac{1}{2a}\\left(\\frac{1}{a-x} + \\frac{1}{a+x}\\right)$$.\n- Step 2: Each piece integrates to a logarithm: $$\\frac{1}{2a}(-\\ln|a-x| + \\ln|a+x|) = \\frac{1}{2a}\\ln\\left|\\frac{a+x}{a-x}\\right|$$.\n- Step 3: $$a^2 + x^2$$ has **no real factorization** — only over complex numbers as $$(a-ix)(a+ix)$$. So partial fractions over reals don't help; instead, $$x = a\\tan\\theta$$ leads to $$\\arctan$$.\n\nFundamental algebraic distinction: the sign of the constant term in $$x^2 \\pm a^2$$ determines whether real factorization (and hence partial fractions) is possible — and that determines log vs. inverse-trig antiderivative.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "Derive the reduction formula $$nI_n = (n-1)I_{n-2}$$ for $$I_n = \\int_0^{\\pi/2}\\sin^n x\\, dx$$, $$n \\geq 2$$. (5 steps)", "answer": "- Step 1: Write $$\\sin^n x = \\sin^{n-1} x \\cdot \\sin x$$. Use IBP with $$u = \\sin^{n-1} x$$, $$dv = \\sin x\\, dx$$: $$du = (n-1)\\sin^{n-2}x\\cos x\\, dx$$, $$v = -\\cos x$$.\n- Step 2: $$I_n = [-\\sin^{n-1}x\\cos x]_0^{\\pi/2} + \\int_0^{\\pi/2}(n-1)\\sin^{n-2}x\\cos^2 x\\, dx$$. Boundary terms vanish at both ends.\n- Step 3: Use $$\\cos^2 x = 1 - \\sin^2 x$$ to rewrite: $$I_n = (n-1)\\int_0^{\\pi/2}\\sin^{n-2}x\\, dx - (n-1)\\int_0^{\\pi/2}\\sin^n x\\, dx$$.\n- Step 4: That's $$I_n = (n-1)I_{n-2} - (n-1)I_n$$.\n- Step 5: Rearrange: $$I_n + (n-1)I_n = (n-1)I_{n-2}$$, i.e., $$nI_n = (n-1)I_{n-2}$$.\n\nThe Pythagorean identity creates both $$I_n$$ (back to original) and $$I_{n-2}$$ in the algebra. Solving the resulting linear equation in $$I_n$$ gives the reduction.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "What's the geometric meaning of \"$$ds$$\" in the surface-of-revolution formula $$S = 2\\pi\\int y\\, ds$$? (3 steps)", "answer": "- Step 1: $$ds$$ is the **arc element** — an infinitesimal length along the curve being rotated. Same $$ds$$ as in arc length: $$L = \\int ds$$.\n- Step 2: Mathematically: $$ds = \\sqrt{dx^2 + dy^2}$$, or in different parameterizations, $$\\sqrt{1 + (dy/dx)^2}\\, dx$$, $$\\sqrt{(dx/dt)^2 + (dy/dt)^2}\\, dt$$, etc.\n- Step 3: When this small piece of curve is rotated about the $$x$$-axis, it sweeps a thin band of width $$ds$$ (slant) and length around $$2\\pi y$$ (circumference). Total band area: $$2\\pi y \\cdot ds$$.\n\nSo $$ds$$ encodes local arc length, $$2\\pi y$$ encodes circumference at that point. Their product is the area swept by an infinitesimal arc element under rotation.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "What's the difference in approach between integrating $$\\int \\cosh^2 x\\, dx$$ via identities versus via exponential definition? (3 steps)", "answer": "- Step 1: Via identity: $$\\cosh^2 x = \\frac{1 + \\cosh 2x}{2}$$, so $$\\int \\cosh^2 x\\, dx = \\frac{x}{2} + \\frac{\\sinh 2x}{4} + C$$.\n- Step 2: Via exponential: $$\\cosh^2 x = \\left(\\frac{e^x + e^{-x}}{2}\\right)^2 = \\frac{e^{2x} + 2 + e^{-2x}}{4}$$. Integrate: $$\\frac{e^{2x}}{8} + \\frac{x}{2} - \\frac{e^{-2x}}{8} + C$$.\n- Step 3: These agree because $$\\frac{e^{2x} - e^{-2x}}{8} = \\frac{\\sinh 2x}{4}$$ and the $$\\frac{x}{2}$$ matches. Both are valid; the identity form is usually more compact.\n\nChoice of method: identity is faster for symbolic answers; exponential is more reliable when identities don't directly apply or when you need to verify.", "source": "Opus 4.7 ①", "_id": "opus_1_77"}, {"question": "The arc length can also be computed as $$s = \\int_{y_A}^{y_B} \\sqrt{1+\\left(\\frac{dx}{dy}\\right)^2} dy$$. When is this form more convenient than the $$x$$-form? (2 steps)", "answer": "- Step 1: This form is more convenient when the curve is easier to differentiate with respect to $$y$$, or when the curve is expressed as $$x = f(y)$$ rather than $$y = f(x)$$. For example, for the curve $$x = y^3$$, finding $$\\frac{dx}{dy} = 3y^2$$ is more natural than inverting to get $$y = x^{1/3}$$ and finding $$\\frac{dy}{dx}$$.\n- Step 2: It is also useful when the limits of integration are more naturally expressed in terms of $$y$$-coordinates. If you know $$y_A$$ and $$y_B$$ but would need extra work to find the corresponding $$x$$-values, the $$y$$-form avoids this.\n\nChoose whichever variable gives a simpler derivative and more convenient limits.", "source": "GLM 5.1 ①", "_id": "glm_1_30"}, {"question": "State the four standard surface-of-revolution formulae (Cartesian and parametric, for rotation about $$x$$- and $$y$$-axes). (4 steps)", "answer": "- Step 1: Rotation about $$x$$-axis, Cartesian: $$S = 2\\pi\\int_{x_A}^{x_B} y\\sqrt{1 + (dy/dx)^2}\\, dx$$.\n- Step 2: Rotation about $$x$$-axis, parametric: $$S = 2\\pi\\int_{t_A}^{t_B} y\\sqrt{(dx/dt)^2 + (dy/dt)^2}\\, dt$$.\n- Step 3: Rotation about $$y$$-axis, Cartesian: $$S = 2\\pi\\int x\\sqrt{1 + (dy/dx)^2}\\, dx$$ (often more convenient than the $$dy$$-version).\n- Step 4: Rotation about $$y$$-axis, parametric: $$S = 2\\pi\\int_{t_A}^{t_B} x\\sqrt{(dx/dt)^2 + (dy/dt)^2}\\, dt$$.\n\nMemory rule: the radius factor ($$y$$ or $$x$$) corresponds to the **distance from the axis of rotation**. The \"$$ds$$\" term (radical) is the same as in arc length — it's the arc element.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "Explain the general technique for integrating inverse functions like arcsin x, arctan x, etc. Why does it work? (3 steps)", "answer": "- Step 1: The trick is to **multiply by 1**: write $$\\int \\arcsin x \\, dx = \\int (\\arcsin x) \\cdot 1 \\, dx$$. This sets up integration by parts.\n- Step 2: Apply IBP with $$u = \\arcsin x$$ (the inverse function) and $$\\frac{dv}{dx} = 1$$. Then $$\\frac{du}{dx} = \\frac{1}{\\sqrt{1-x^2}}$$ and $$v = x$$. IBP gives $$x \\arcsin x - \\int \\frac{x}{\\sqrt{1-x^2}} dx$$.\n- Step 3: The remaining integral is now manageable — the $$x$$ in the numerator is essentially the derivative of $$1-x^2$$, so it's an $$f'(x)[f(x)]^n$$ form.\n\nWhy this works: inverse functions are hard to integrate but **easy to differentiate**. Making them \"u\" in IBP transforms the difficulty into something tractable. The \"1\" as $$dv$$ keeps things simple.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "How do you integrate ∫tanh x dx? Show the steps and explain why the result is ln(cosh x) rather than ln|cosh x|. (2 steps)", "answer": "- Step 1: Write tanh x = sinh x/cosh x, so ∫tanh x dx = ∫sinh x/cosh x dx.\n- Step 2: This is of the form ∫f'(x)/f(x) dx with f(x) = cosh x, giving ln|f(x)| + C = ln|cosh x| + C.\n+ However, cosh x > 0 for all real x (cosh x = (eˣ + e⁻ˣ)/2 ≥ 1), so the absolute value is unnecessary.\n+ Therefore, ∫tanh x dx = ln(cosh x) + C.\n\nThis is one of the few cases where we can drop the absolute value because the argument is always positive.", "source": "MiniMax ②", "_id": "minimax_2_5"}, {"question": "Why is the formula $$2\\pi \\int y \\, ds$$ NOT directly applicable if the curve crosses the axis of rotation? What goes wrong? (3 steps)", "answer": "- Step 1: The formula assumes $$y \\geq 0$$ throughout, so all points stay on one side of the axis and the swept-out frustum band has circumference $$2\\pi y$$.\n- Step 2: If the curve crosses the x-axis (i.e., $$y$$ changes sign), problems arise:\n+ **Cancellation**: where $$y < 0$$, the formula treats \"$$2\\pi y \\, ds$$\" as negative, but physical surface area is always positive.\n+ **Self-intersection**: the surface from negative-$$y$$ part overlaps with positive-$$y$$ part, double-counting.\n- Step 3: Fix: split the integral at zero-crossings and use $$|y|$$, or compute the surfaces separately. So $$S = 2\\pi \\int |y| \\, ds$$ in general.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Why is the first substitution in each suggested pair (e.g., $$x = a\\sinh u$$ for $$\\sqrt{a^2+x^2}$$) usually the better choice? (3 steps)", "answer": "- Step 1: Both substitutions WORK — they both collapse the surd. But the resulting integrand differs in difficulty.\n- Step 2: For $$\\sqrt{a^2 + x^2}$$ with $$x = a\\sinh u$$: $$\\sqrt{a^2 + a^2\\sinh^2 u} = a\\cosh u$$ and $$dx = a\\cosh u \\, du$$, so $$\\frac{dx}{\\sqrt{a^2+x^2}} = du$$ — extremely clean.\n+ With $$x = a\\tan\\theta$$: get $$\\sec\\theta \\, d\\theta$$, which integrates to $$\\ln|\\sec\\theta + \\tan\\theta|$$ — possible but messier.\n- Step 3: General principle: when the inverse-function answer is hyperbolic (arsinh, arcosh), hyperbolic substitution gives the cleanest path; when the answer is trig (arcsin, arctan), trig substitution wins.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "A curve has equation $$y = \\frac{1}{2}x^2$$. Walk through finding the arc length from origin to (4, 8). (4 steps)", "answer": "- Step 1: Compute $$dy/dx = x$$. So $$1 + (dy/dx)^2 = 1 + x^2$$.\n- Step 2: Set up: $$s = \\int_0^4 \\sqrt{1 + x^2} \\, dx$$.\n- Step 3: This is a hyperbolic-substitution integral. Use $$x = \\sinh u$$: $$\\sqrt{1+x^2} = \\cosh u$$, $$dx = \\cosh u \\, du$$. Integral becomes $$\\int \\cosh^2 u \\, du$$, which by double-angle reduces to $$\\frac{u}{2} + \\frac{\\sinh u \\cosh u}{2}$$.\n- Step 4: Convert limits: $$x = 0 \\to u = 0$$; $$x = 4 \\to u = \\text{arsinh}(4)$$, with $$\\sinh u = 4$$, $$\\cosh u = \\sqrt{17}$$. Final: $$s = \\frac{1}{2}\\ln(4+\\sqrt{17}) + 2\\sqrt{17}$$.\n\nThe structure: parabola arc-lengths always involve $$\\sqrt{1 + x^2}$$-type integrals, reducing via hyperbolic substitution to a combo of inverse hyperbolic + square root.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "When integrating $$\\int (\\text{sech}\\, x - \\tanh x)^2\\, dx$$, what identity simplifies it dramatically? (3 steps)", "answer": "- Step 1: Expand: $$(\\text{sech}\\, x - \\tanh x)^2 = \\text{sech}^2 x - 2\\,\\text{sech}\\, x \\tanh x + \\tanh^2 x$$.\n- Step 2: Apply $$\\tanh^2 x = 1 - \\text{sech}^2 x$$. The integrand becomes $$\\text{sech}^2 x - 2\\,\\text{sech}\\, x\\tanh x + 1 - \\text{sech}^2 x = 1 - 2\\,\\text{sech}\\, x\\tanh x$$ — the $$\\text{sech}^2$$ terms cancel!\n- Step 3: Each remaining term has a known antiderivative: $$\\int 1\\, dx = x$$, $$\\int \\text{sech}\\, x \\tanh x\\, dx = -\\text{sech}\\, x$$. Result: $$x + 2\\,\\text{sech}\\, x + C$$.\n\nLesson: when faced with powers/products of hyperbolic functions, look for cancellations after applying $$\\cosh^2 - \\sinh^2 = 1$$ or $$1 - \\tanh^2 = \\text{sech}^2$$. Algebra often simplifies dramatically.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "A common confusion: a student computes $$\\int \\frac{1}{\\sqrt{1+x^2}}\\, dx$$ but writes $$\\arctan x$$ as the answer. Diagnose. (3 steps)", "answer": "- Step 1: The student is confusing two different standard forms:\n+ $$\\int \\frac{1}{1+x^2}\\, dx = \\arctan x + C$$ (no square root).\n+ $$\\int \\frac{1}{\\sqrt{1+x^2}}\\, dx = \\text{arsinh}\\, x + C$$ (with square root).\n- Step 2: The square root changes everything: it requires $$x = \\sinh u$$ (so $$\\sqrt{1+x^2} = \\cosh u$$), leading to $$\\text{arsinh}\\, x$$, not $$\\arctan$$.\n- Step 3: Memory aid: the **square root** in the denominator transforms $$\\arctan$$ → $$\\text{arsinh}$$ (analogous to how the square root in $$\\sqrt{1-x^2}$$ gives $$\\arcsin$$ instead of nothing standard).\n\nAlways check carefully: is there a square root or not? It dictates whether you get an inverse trig/hyperbolic function or a logarithm-type answer.", "source": "Opus 4.7 ①", "_id": "opus_1_69"}, {"question": "Explain the strategy difference between integrating $$\\sinh^n x$$ for odd $$n$$ versus even $$n$$. (3 steps)", "answer": "- Step 1: For **odd** $$n$$: peel off one $$\\sinh x$$, convert the remaining even power $$\\sinh^{n-1} x$$ using $$\\sinh^2 x = \\cosh^2 x - 1$$, expand, and integrate term by term. Each term becomes $$\\cosh^k x \\cdot \\sinh x$$ — perfect power-rule pattern.\n- Step 2: For **even** $$n$$: use the double-angle identity $$\\sinh^2 x = \\frac{\\cosh 2x - 1}{2}$$, then square if needed. This converts the even power into linear combinations of $$\\cosh(kx)$$.\n- Step 3: Why? For odd $$n$$, the extra $$\\sinh x$$ acts as $$d(\\cosh x)$$. For even $$n$$, no factor is \"left over,\" so we lower the power degree by half via the double-angle identity.\n\nThis odd/even split is universal in trig and hyperbolic integration. Same strategy works for $$\\cos^n x, \\sin^n x, \\cosh^n x, \\sinh^n x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "What's the key insight for choosing the appropriate reduction technique for $$\\int \\tanh^n x \\, dx$$? (3 steps)", "answer": "- Step 1: Use the algebraic identity $$\\tanh^2 x = 1 - \\text{sech}^2 x$$ — analogous to the tan reduction's use of $$\\tan^2 = \\sec^2 - 1$$.\n- Step 2: Write $$\\tanh^n x = \\tanh^{n-2} x \\cdot \\tanh^2 x = \\tanh^{n-2} x (1 - \\text{sech}^2 x) = \\tanh^{n-2} x - \\tanh^{n-2} x \\, \\text{sech}^2 x$$.\n- Step 3: First piece is $$I_{n-2}$$. Second piece: since $$\\text{sech}^2 x = (\\tanh x)'$$, this is $$f'(x)[f(x)]^{n-2}$$, integrating to $$\\frac{\\tanh^{n-1} x}{n-1}$$. So $$I_n = I_{n-2} - \\frac{\\tanh^{n-1} x}{n-1}$$.\n\nNote the SIGN: $$I_n = I_{n-2} - \\frac{\\tanh^{n-1} x}{n-1}$$ for hyperbolic, vs $$I_n = \\frac{\\tan^{n-1} x}{n-1} - I_{n-2}$$ for trig — sign flips because of identity sign differences.", "source": "Opus 4.7 ②", "_id": "opus_2_86"}, {"question": "Without referring to the formula booklet, state the four standard inverse trigonometric/hyperbolic integrals: ∫1/√(1-x²) dx, ∫1/(1+x²) dx, ∫1/√(1+x²) dx, and ∫1/√(x²-1) dx. For each one, name the inverse function whose derivative gives the integrand. (4 facts)", "answer": "- Step 1: ∫1/√(1-x²) dx = arcsin x + C, since d/dx(arcsin x) = 1/√(1-x²).\n- Step 2: ∫1/(1+x²) dx = arctan x + C, since d/dx(arctan x) = 1/(1+x²).\n- Step 3: ∫1/√(1+x²) dx = arsinh x + C, since d/dx(arsinh x) = 1/√(1+x²).\n- Step 4: ∫1/√(x²-1) dx = arcosh x + C (x > 1), since d/dx(arcosh x) = 1/√(x²-1).\n\nThese four are essential building blocks for more complex integrals involving quadratic expressions.", "source": "MiniMax ②", "_id": "minimax_2_2"}, {"question": "Compute the area of an ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ using a substitution. Why does the answer come out simply $$\\pi ab$$? (4 steps)", "answer": "- Step 1: By symmetry, area $$= 4\\int_0^a y\\, dx$$ where $$y = b\\sqrt{1 - x^2/a^2}$$. So area $$= \\frac{4b}{a}\\int_0^a \\sqrt{a^2 - x^2}\\, dx$$.\n- Step 2: Substitute $$x = a\\sin\\theta$$, $$dx = a\\cos\\theta\\, d\\theta$$. Then $$\\sqrt{a^2-x^2} = a\\cos\\theta$$.\n- Step 3: Area $$= \\frac{4b}{a}\\int_0^{\\pi/2} a\\cos\\theta \\cdot a\\cos\\theta\\, d\\theta = 4ab\\int_0^{\\pi/2}\\cos^2\\theta\\, d\\theta = 4ab \\cdot \\frac{\\pi}{4} = \\pi ab$$.\n- Step 4: The factor $$\\pi$$ comes from $$\\int_0^{\\pi/2}\\cos^2\\theta\\, d\\theta = \\pi/4$$ (Wallis-style).\n\nThe simplicity $$\\pi ab$$ is **deeply geometric**: the ellipse is just a stretched circle. A circle of radius $$1$$ has area $$\\pi$$. Stretching by $$a$$ in $$x$$ and $$b$$ in $$y$$ multiplies the area by $$ab$$, giving $$\\pi ab$$.", "source": "Opus 4.7 ①", "_id": "opus_1_84"}, {"question": "To evaluate $$\\int_0^6 \\frac{x^3}{\\sqrt{x^2+9}} dx$$ using the substitution $$x = 3\\sinh u$$, what are the new limits, and why does the $$\\cosh u$$ factor cancel? (3 steps)", "answer": "- Step 1: When $$x=0$$: $$\\sinh u = 0 \\Rightarrow u = 0$$. When $$x=6$$: $$\\sinh u = 2 \\Rightarrow u = \\operatorname{arsinh} 2$$. So new limits are $$0$$ to $$\\operatorname{arsinh} 2$$.\n- Step 2: The denominator: $$\\sqrt{x^2+9} = \\sqrt{9\\sinh^2 u + 9} = \\sqrt{9\\cosh^2 u} = 3\\cosh u$$. The $$dx$$ factor: $$dx = 3\\cosh u \\, du$$. So the integrand becomes $$\\frac{27\\sinh^3 u}{3\\cosh u} \\cdot 3\\cosh u = 27\\sinh^3 u$$.\n- Step 3: The $$\\cosh u$$ from the denominator and the $$\\cosh u$$ from $$dx$$ cancel completely. This is the beauty of the hyperbolic substitution for $$\\sqrt{x^2+a^2}$$ forms — the square root and the differential work together to simplify.\n\nThe remaining integral $$27\\int_0^{\\operatorname{arsinh} 2} \\sinh^3 u \\, du$$ is evaluated using the method from Q8.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "Among the four generalised standard results (12–15), only result 13 ($$\\int \\frac{1}{a^2+x^2}dx$$) has a factor of $$\\frac{1}{a}$$ in front. The others (12, 14, 15) do not. Explain intuitively why this factor appears for the arctan case but not the others. (2 steps)", "answer": "- Step 1: When we substitute $$x = a\\tan\\theta$$, the denominator becomes $$a^2\\sec^2\\theta$$ and $$dx = a\\sec^2\\theta \\, d\\theta$$. The $$\\sec^2\\theta$$ cancels, but the factor of $$a$$ in the numerator (from $$dx$$) and $$a^2$$ in the denominator leave a $$\\frac{1}{a}$$ after cancellation. This factor survives all the way to the final answer.\n- Step 2: For results 12, 14, and 15, the square root in the denominator means the substitution produces a factor like $$a\\cos\\theta$$ or $$a\\cosh u$$ or $$a\\sinh u$$, and the corresponding $$dx$$ also contains such a factor. The square root and the $$dx$$ factor combine so that the $$a$$'s cancel completely, leaving no extra factor in the result.\n\nThe arctan case is special because there is no square root — just a sum of squares — so the scaling factor $$a$$ doesn't get \"absorbed\" the same way.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "What is the difference between ∫1/(x²-a²) dx and ∫1/(a²-x²) dx? Write down both results and explain when each applies. (2 steps)", "answer": "- Step 1: ∫1/(x² - a²) dx = (1/(2a))ln|(x-a)/(x+a)| + C (for x > a).\n- Step 2: ∫1/(a² - x²) dx = (1/(2a))ln|(a+x)/(a-x)| + C (for |x| < a).\n+ The sign difference in the denominator determines whether we get a positive or negative result inside the log.\n+ These come from partial fractions: 1/(x²-a²) = 1/(2a)[1/(x-a) - 1/(x+a)] and 1/(a²-x²) = 1/(2a)[1/(a-x) + 1/(a+x)].\n\nThe key is remembering that the log result flips sign depending on which form you have.", "source": "MiniMax ②", "_id": "minimax_2_46"}, {"question": "When deriving a reduction formula like $$I_n = (n-1)\\sin^{n-2}x\\cos x + (n-1)I_{n-2} - (n-1)I_n$$ (for $$\\int \\sin^n x\\, dx$$ indefinite), why does the boundary term not vanish? (3 steps)", "answer": "- Step 1: For **definite** integrals on $$[0, \\pi/2]$$: the boundary term $$[-\\sin^{n-1}x\\cos x]_0^{\\pi/2}$$ vanishes because either $$\\sin x = 0$$ (at $$0$$) or $$\\cos x = 0$$ (at $$\\pi/2$$).\n- Step 2: For **indefinite** integrals: there are no specific limits to make the boundary term vanish. The expression $$-\\sin^{n-1}x\\cos x$$ remains as a piece of the antiderivative.\n- Step 3: So the indefinite reduction formula is $$nI_n = -\\sin^{n-1}x\\cos x + (n-1)I_{n-2}$$, where the boundary-like term is now part of the antiderivative.\n\nThis is why definite-integral reduction formulae are often cleaner — they kill the boundary terms. Always check whether the formula is for definite or indefinite integrals; the boundary contribution differs.", "source": "Opus 4.7 ①", "_id": "opus_1_79"}, {"question": "Find $$\\int \\frac{x^2}{1+x^2}\\, dx$$ using a clever rewrite. (3 steps)", "answer": "- Step 1: The integrand has numerator and denominator of the same degree. This signals **polynomial division**.\n- Step 2: $$\\frac{x^2}{1+x^2} = \\frac{(1+x^2) - 1}{1+x^2} = 1 - \\frac{1}{1+x^2}$$.\n- Step 3: Integrate: $$\\int 1\\, dx - \\int \\frac{1}{1+x^2}\\, dx = x - \\arctan x + C$$.\n\nTrick generalizes: when you see $$\\frac{\\text{polynomial}}{\\text{polynomial of same or higher degree}}$$, do polynomial division first; the remainder is usually one of the standard forms.", "source": "Opus 4.7 ①", "_id": "opus_1_68"}, {"question": "Why does the trick $$\\int \\sec x\\, dx = \\ln|\\sec x + \\tan x| + C$$ work for trig but not for $$\\text{sech}\\, x$$? (4 steps)", "answer": "- Step 1: For $$\\sec x$$: differentiate $$\\ln|\\sec x + \\tan x|$$. Chain rule gives $$\\frac{\\sec x\\tan x + \\sec^2 x}{\\sec x + \\tan x} = \\frac{\\sec x(\\tan x + \\sec x)}{\\sec x + \\tan x} = \\sec x$$. The numerator factors out the denominator!\n- Step 2: For $$\\text{sech}\\, x$$: try $$\\ln|\\text{sech}\\, x + \\tanh x|$$. Differentiate: $$\\frac{-\\text{sech}\\, x\\tanh x + \\text{sech}^2 x}{\\text{sech}\\, x + \\tanh x}$$. The signs in the numerator (minus from $$d/dx(\\text{sech})$$) prevent the same factoring.\n- Step 3: The numerator does NOT simplify to a multiple of the denominator.\n- Step 4: Instead, use $$u = e^x$$: $$\\int \\text{sech}\\, x\\, dx = 2\\arctan(e^x) + C$$.\n\nThe asymmetry between $$\\sec$$ and $$\\text{sech}$$ stems from the sign differences in their derivative formulas. The \"clever multiplication\" trick is brittle and doesn't transfer.", "source": "Opus 4.7 ①", "_id": "opus_1_64"}, {"question": "A teacher claims \"every integral with $$\\sqrt{1-x^2}$$ in the denominator gives $$\\arcsin x$$.\" Find a counterexample. (3 steps)", "answer": "- Step 1: Consider $$\\int \\frac{x}{\\sqrt{1-x^2}}\\, dx$$. The numerator is $$x$$, **not** a constant.\n- Step 2: Recognize this as $$\\int x(1-x^2)^{-1/2}\\, dx$$. With $$f = 1-x^2$$, $$f' = -2x$$, this is $$-\\frac{1}{2}\\int f'\\cdot f^{-1/2}\\, dx$$, which gives $$-\\frac{1}{2}\\cdot\\frac{f^{1/2}}{1/2} = -\\sqrt{1-x^2}$$.\n- Step 3: So $$\\int \\frac{x}{\\sqrt{1-x^2}}\\, dx = -\\sqrt{1-x^2} + C$$ — **not** $$\\arcsin$$.\n\nMisconception: the denominator alone never determines the antiderivative. The numerator must be checked. Constant numerator → $$\\arcsin$$; numerator like $$f'$$ → power rule on $$f$$.", "source": "Opus 4.7 ①", "_id": "opus_1_83"}, {"question": "State the three forms of the arc length formula and when each is preferable. (3 steps)", "answer": "- Step 1: Cartesian in $$x$$: $$s = \\int_{x_A}^{x_B}\\sqrt{1 + (dy/dx)^2}\\, dx$$ — preferred when $$y = f(x)$$ explicitly and $$dy/dx$$ is simple.\n- Step 2: Cartesian in $$y$$: $$s = \\int_{y_A}^{y_B}\\sqrt{1 + (dx/dy)^2}\\, dy$$ — preferred for vertical tangents (where $$dy/dx \\to \\infty$$ but $$dx/dy = 0$$).\n- Step 3: Parametric: $$s = \\int_{t_A}^{t_B}\\sqrt{(dx/dt)^2 + (dy/dt)^2}\\, dt$$ — preferred for parametric curves; symmetric, doesn't favor one variable.\n\nAll three are equivalent when applicable. Choose based on which gives an integrable expression after squaring and adding.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "When rotating $$y = \\cosh x$$ about the y-axis, why is integration by parts needed? (4 steps)", "answer": "- Step 1: For rotation about y-axis: $$S = 2\\pi \\int x \\, ds$$. With $$ds = \\sqrt{1 + \\sinh^2 x} dx = \\cosh x \\, dx$$.\n- Step 2: $$S = 2\\pi \\int x \\cosh x \\, dx$$. Notice the $$x$$ in the integrand (not $$y$$) — the lever-arm distance from the y-axis.\n- Step 3: Integration by parts: $$u = x$$, $$dv/dx = \\cosh x$$, giving $$v = \\sinh x$$. So $$\\int x \\cosh x \\, dx = x \\sinh x - \\int \\sinh x \\, dx = x \\sinh x - \\cosh x$$.\n- Step 4: Apply with limits to get specific values.\n\nThis differs from rotation about x-axis (where integrand would be $$\\cosh^2 x$$, requiring a double-angle reduction). The choice of axis changes the integration technique entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_65"}, {"question": "State the two log-form standard integrals (results 16 and 17) and explain when they appear instead of arcsin or arcosh. (3 steps)", "answer": "- Step 1: $$\\int \\frac{1}{a^2 - x^2} dx = \\frac{1}{2a} \\ln\\left|\\frac{a+x}{a-x}\\right| + C$$, $$|x| < a$$.\n+ $$\\int \\frac{1}{x^2 - a^2} dx = \\frac{1}{2a} \\ln\\left|\\frac{x-a}{x+a}\\right| + C$$.\n- Step 2: These appear when the **denominator is the quadratic itself, not its square root**:\n+ $$\\sqrt{a^2 - x^2}$$ → arcsin (no logs)\n+ $$a^2 - x^2$$ → log form 16\n+ $$\\sqrt{x^2 - a^2}$$ → arcosh\n+ $$x^2 - a^2$$ → log form 17\n- Step 3: The reason: results 16, 17 come from partial fractions decomposition. The square-root cases involve a different antiderivative structure (the inverse hyperbolic/trig function).", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Compare the structure of the answers for $$\\int \\arcsin x \\, dx$$ vs $$\\int \\arctan x \\, dx$$ and explain the difference. (3 steps)", "answer": "- Step 1: Both follow the same IBP setup, but residual integrals differ:\n+ $$\\int \\arcsin x \\, dx = x \\arcsin x + \\sqrt{1-x^2} + C$$ (residual integrates to a square root)\n+ $$\\int \\arctan x \\, dx = x \\arctan x - \\frac{1}{2}\\ln(1+x^2) + C$$ (residual integrates to a log)\n- Step 2: The reason is in the derivatives:\n+ $$\\frac{d}{dx}\\arcsin x = \\frac{1}{\\sqrt{1-x^2}}$$ → residual has $$\\frac{x}{\\sqrt{1-x^2}}$$, which is $$f'(x)[f(x)]^{-1/2}$$ form → square root.\n+ $$\\frac{d}{dx}\\arctan x = \\frac{1}{1+x^2}$$ → residual has $$\\frac{x}{1+x^2}$$, which is $$\\frac{f'(x)}{f(x)}$$ form → log.\n- Step 3: So the **shape of the derivative** determines the **shape of the residual antiderivative**. Both inverse hyperbolics (arsinh, arcosh) follow the same pattern — square-root antiderivatives.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Explain why $$\\int 1 \\, du$$ keeps appearing as the \"simplest possible\" answer after a substitution. (3 steps)", "answer": "- Step 1: When a substitution exactly matches the integrand structure, the Jacobian factor $$dx/du$$ in the differential cancels with the integrand's complicated piece, leaving just $$du$$.\n- Step 2: Examples:\n+ $$\\int \\frac{1}{1+x^2} dx$$ with $$x = \\tan A$$: $$dx = \\sec^2 A \\, dA$$, denominator $$\\sec^2 A$$ — cancellation gives $$\\int 1 \\, dA$$.\n+ $$\\int \\frac{1}{\\sqrt{x^2-1}} dx$$ with $$x = \\cosh u$$: $$dx = \\sinh u \\, du$$, denominator $$\\sinh u$$ — gives $$\\int 1 \\, du$$.\n+ $$\\int \\frac{dx}{x\\sqrt{x^2-1}}$$ with $$x = \\sec\\theta$$: similar cancellation.\n- Step 3: This is the **signature of the perfect substitution**: the new integrand reduces to \"1,\" meaning the substitution exactly captures the integral's geometric structure.\n\nThe takeaway: this is why standard inverse functions (arcsin, arctan, arsinh, arcosh) are the \"natural\" antiderivatives of these surd-fractions.", "source": "Opus 4.7 ②", "_id": "opus_2_89"}, {"question": "Walk through systematic approach for $$\\int \\frac{2x+3}{x^2+4} dx$$. (4 steps)", "answer": "- Step 1: Inspect structure: numerator has both \"$$2x$$\" (looks like derivative of $$x^2 + 4$$) and \"$$3$$\" (constant). Suggests **splitting**.\n- Step 2: Split: $$\\int \\frac{2x+3}{x^2+4} dx = \\int \\frac{2x}{x^2+4} dx + \\int \\frac{3}{x^2+4} dx$$.\n- Step 3: First piece: $$2x = (x^2+4)'$$, so $$\\int \\frac{2x}{x^2+4} dx = \\ln(x^2+4)$$ (no modulus, since $$x^2+4 > 0$$).\n- Step 4: Second piece: standard form 13 with $$a = 2$$: $$\\int \\frac{3}{x^2+4} dx = \\frac{3}{2}\\arctan(x/2)$$.\n+ Combined: $$\\ln(x^2+4) + \\frac{3}{2}\\arctan(x/2) + C$$.\n\nSystematic approach: (i) check numerator = derivative-of-denominator → log/power. (ii) Check denominator standard form → arctan/arcsin. (iii) Split mixed numerators.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "Why does the \"× 1\" trick (rewriting $$\\int f(x)\\, dx$$ as $$\\int f(x)\\cdot 1\\, dx$$ for integration by parts) work for inverse functions like $$\\arcsin x$$, $$\\arctan x$$, $$\\text{arsinh}\\, x$$? (3 steps)", "answer": "- Step 1: Inverse functions have no obvious antiderivative, but their **derivatives** are simple algebraic expressions (e.g., $$\\frac{d}{dx}\\arcsin x = \\frac{1}{\\sqrt{1-x^2}}$$).\n- Step 2: IBP uses $$\\int u\\, dv = uv - \\int v\\, du$$. Choose $$u$$ = inverse function (which differentiates to something nice) and $$dv = 1\\, dx$$ (so $$v = x$$).\n- Step 3: The resulting integral $$\\int v\\, du = \\int x \\cdot (\\text{inverse's derivative})\\, dx$$ has a tractable algebraic form, often solvable by power-rule or log-rule recognition.\n\nSame trick as $$\\int \\ln x\\, dx = x\\ln x - x + C$$. Works for **any** function whose derivative is a tractable algebraic expression.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "When deriving a reduction formula via integration by parts, how do you choose what to make \"u\" and what to make \"dv/dx\"? (3 steps)", "answer": "- Step 1: General principle: choose **\"u\" to be something whose derivative simplifies** (or relates to a lower-index version). Choose **\"dv/dx\" to be something easy to integrate**.\n- Step 2: For $$I_n = \\int x^n e^x \\, dx$$: pick $$u = x^n$$ (derivative drops power to $$n-1$$) and $$dv/dx = e^x$$ (integrates trivially).\n+ For $$I_n = \\int \\sin^n x \\, dx$$: pick $$u = \\sin^{n-1} x$$ (derivative gives $$\\sin^{n-2} x$$) and $$dv/dx = \\sin x$$ (integrates to $$-\\cos x$$).\n- Step 3: Philosophy: **\"u\" should be the part you wish would go away; \"dv\" should be the part you can handle**. For powers, \"u = power\" works; the derivative reduces the power.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "The antiderivatives $$\\arctan(x)$$ and $$\\frac{1}{2}\\ln\\left|\\frac{1+x}{1-x}\\right|$$ both arise from quadratic-denominator integrals. What identity connects these? (3 steps)", "answer": "- Step 1: $$\\arctan x$$ comes from $$\\int \\frac{dx}{1+x^2}$$ (irreducible); the log form comes from $$\\int \\frac{dx}{1-x^2}$$ (reducible via partial fractions).\n- Step 2: The log form is also $$\\text{artanh}\\, x$$ via the identity $$\\text{artanh}\\, x = \\frac{1}{2}\\ln\\left(\\frac{1+x}{1-x}\\right)$$ for $$|x| < 1$$.\n- Step 3: There's a deep connection: $$\\arctan x = \\frac{1}{2i}\\ln\\left(\\frac{1+ix}{1-ix}\\right)$$ — this is the **complex** version of the log form. Real arctan corresponds to \"imaginary boost\"; real artanh corresponds to \"real boost.\" This is the same reason hyperbolic and trig functions are related via $$\\sinh(ix) = i\\sin x$$ etc.\n\nTrigonometric and hyperbolic inverses are different real branches of the same complex function. The sign in $$1 \\pm x^2$$ flips between them.", "source": "Opus 4.7 ①", "_id": "opus_1_81"}, {"question": "What's the relationship between $$\\text{arcosh } x$$ and $$\\ln(x + \\sqrt{x^2-1})$$? Why does this matter for evaluating definite integrals? (3 steps)", "answer": "- Step 1: They are equal: $$\\text{arcosh } x = \\ln(x + \\sqrt{x^2 - 1})$$ for $$x \\geq 1$$. This logarithmic form is in the formula booklet.\n- Step 2: It matters for definite integrals because evaluating arcosh at specific limits often produces a single natural log answer that's much cleaner than leaving \"arcosh\" notation.\n+ Example: $$\\text{arcosh}(2) - \\text{arcosh}(5/4) = \\ln(2 + \\sqrt{3}) - \\ln(2) = \\ln\\left(\\frac{2+\\sqrt{3}}{2}\\right)$$.\n- Step 3: Deeper story: every inverse hyperbolic function has a logarithmic form because hyperbolic functions are exponential. Always have log forms ready to combine answers cleanly.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "What's the geometric meaning of $$S = 2\\pi \\int y \\, ds$$ via Pappus's theorem? (3 steps)", "answer": "- Step 1: Pappus's theorem: **the surface area of a body of revolution equals the perimeter of the rotating curve times the distance traveled by its centroid**. In symbols: $$S = L \\times 2\\pi\\bar{y}$$.\n- Step 2: The integral form: writing $$\\bar{y} = \\frac{\\int y \\, ds}{L}$$, we get $$S = L \\cdot 2\\pi \\cdot \\frac{\\int y \\, ds}{L} = 2\\pi \\int y \\, ds$$.\n- Step 3: Conceptually:\n+ Each point at height $$y$$ traces a circle of circumference $$2\\pi y$$ when rotated.\n+ A small arc element $$ds$$ at height $$y$$ contributes a band of area $$2\\pi y \\cdot ds$$.\n+ Sum (integrate) all contributions.\n\nThe deep insight: each \"$$2\\pi y$$\" is a circumference, each \"$$ds$$\" is a slant — multiplying gives a strip area, integrating sums all strips.", "source": "Opus 4.7 ②", "_id": "opus_2_66"}, {"question": "A region between $$y = \\text{arsinh } x$$ and the y-axis from $$x=0$$ to $$x=1$$ is rotated about the y-axis. Two methods, two integrals — which is easier? (3 steps)", "answer": "- Step 1: Two methods:\n+ **Disk method (integrate over y)**: $$V = \\pi \\int x^2 \\, dy$$, with $$x = \\sinh y$$ (inverse). Limits: $$y$$ from $$0$$ to $$\\text{arsinh }(1) = \\ln(1+\\sqrt{2})$$.\n+ **Shell method (integrate over x)**: $$V = 2\\pi \\int_0^1 x \\cdot \\text{arsinh } x \\, dx$$.\n- Step 2: Disk method: $$\\pi \\int_0^{\\ln(1+\\sqrt{2})} \\sinh^2 y \\, dy$$ — handled by $$\\sinh^2 = (\\cosh 2y - 1)/2$$, easy.\n- Step 3: Shell method: requires IBP on $$x \\, \\text{arsinh } x$$ — possible but more elaborate.\n\nTakeaway: for \"inverse function\" curves, often the **disk method (integrating where the function is \"natural\")** is simpler.", "source": "Opus 4.7 ②", "_id": "opus_2_83"}, {"question": "Compare $$\\int \\text{sech}^2 x \\, dx$$ (gives tanh x) with $$\\int \\sec^2 x \\, dx$$ (gives tan x). Why is the parallel so clean here but messier for $$\\int \\text{sech } x$$ vs $$\\int \\sec x$$? (3 steps)", "answer": "- Step 1: For sech² ↔ sec²: both are direct standard integrals because $$\\frac{d}{dx}\\tanh x = \\text{sech}^2 x$$ exactly mirrors $$\\frac{d}{dx}\\tan x = \\sec^2 x$$. Clean parallel.\n- Step 2: For sech vs sec: the trick for $$\\int \\sec x \\, dx$$ relies on $$\\frac{d}{dx}(\\sec x + \\tan x) = \\sec x(\\sec x + \\tan x)$$. This algebraic miracle gives $$\\ln|\\sec x + \\tan x|$$.\n+ The hyperbolic analogue $$\\text{sech } x + \\tanh x$$ doesn't have the same magic — derivative of sech has a minus sign, breaking cancellation.\n- Step 3: Lesson: trig identities have specific sign patterns allowing \"self-amplifying\" tricks; hyperbolic identities have different signs. So sech requires the exponential-form detour.\n\n**Don't assume hyperbolic methods perfectly mirror trig methods** — they mostly do for direct results, but tricky integrals diverge.", "source": "Opus 4.7 ②", "_id": "opus_2_68"}, {"question": "State the key identities used in hyperbolic integration. (4 steps)", "answer": "- Step 1: Pythagorean: $$\\cosh^2 x - \\sinh^2 x = 1$$. Variants: $$\\cosh^2 x = 1 + \\sinh^2 x$$, $$\\sinh^2 x = \\cosh^2 x - 1$$.\n- Step 2: $$1 - \\tanh^2 x = \\text{sech}^2 x$$ and $$\\coth^2 x - 1 = \\text{cosech}^2 x$$.\n- Step 3: Double-angle (used for $$\\cosh^2, \\sinh^2$$ integration): $$\\cosh 2x = 2\\cosh^2 x - 1 = 1 + 2\\sinh^2 x = \\cosh^2 x + \\sinh^2 x$$, $$\\sinh 2x = 2\\sinh x\\cosh x$$.\n- Step 4: Solving for squares: $$\\cosh^2 x = \\frac{1 + \\cosh 2x}{2}$$, $$\\sinh^2 x = \\frac{\\cosh 2x - 1}{2}$$.\n\nThese identities are the \"Swiss Army knife\" of hyperbolic integration. Most problems reduce to applying one or two.", "source": "Opus 4.7 ①", "_id": "opus_1_76"}, {"question": "For the parametric curve $$x = t + \\frac{1}{t}$$, $$y = 2\\ln t$$ ($$t > 0$$), find the arc length from $$t=1$$ to $$t=2$$. The key is simplifying $$\\left(\\frac{dx}{dt}\\right)^2 + \\left(\\frac{dy}{dt}\\right)^2$$. (3 steps)", "answer": "- Step 1: Compute derivatives: $$\\frac{dx}{dt} = 1 - \\frac{1}{t^2}$$ and $$\\frac{dy}{dt} = \\frac{2}{t}$$.\n- Step 2: Sum of squares: $$\\left(1-\\frac{1}{t^2}\\right)^2 + \\frac{4}{t^2} = 1 - \\frac{2}{t^2} + \\frac{1}{t^4} + \\frac{4}{t^2} = 1 + \\frac{2}{t^2} + \\frac{1}{t^4} = \\left(1+\\frac{1}{t^2}\\right)^2$$.\n- Step 3: The square root is $$1+\\frac{1}{t^2}$$ (positive since $$t>0$$). Integrate: $$\\int_1^2 \\left(1+\\frac{1}{t^2}\\right)dt = \\left[t - \\frac{1}{t}\\right]_1^2 = (2-\\frac{1}{2})-(1-1) = 1.5$$.\n\nThe \"magic\" cancellation to a perfect square is not accidental — it's a feature of many well-designed exam problems. Always expand and check for factorisation.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "Compare these two integrals: $$\\int \\frac{1}{\\sqrt{x^2+4}} dx$$ vs $$\\int \\frac{x}{\\sqrt{x^2+4}} dx$$. (3 steps)", "answer": "- Step 1: $$\\int \\frac{1}{\\sqrt{x^2 + 4}} dx$$: constant numerator, form 14 with $$a = 2$$: $$\\text{arsinh}(x/2) + C$$.\n- Step 2: $$\\int \\frac{x}{\\sqrt{x^2+4}} dx$$: numerator $$x = \\frac{1}{2}(x^2+4)'$$, so this is $$\\frac{1}{2} \\int f'(x) [f(x)]^{-1/2} dx = \\sqrt{x^2 + 4} + C$$.\n- Step 3: Same denominator, totally different antiderivative families:\n+ Constant numerator → inverse hyperbolic (arsinh) — involves a logarithm-like function.\n+ Derivative-companion numerator → square root — algebraic, no logs.\n\nThe takeaway: never pattern-match on the denominator alone; always check what the numerator is doing.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "Why is the squaring of $$dy/dx$$ in the arc length formula significant — does the curve direction matter?", "answer": "No, the curve's direction (slope sign) doesn't affect arc length. The expression $$(dy/dx)^2$$ depends only on the **magnitude** of the slope. A curve going up at slope $$+m$$ and one going down at slope $$-m$$ contribute the same arc element, because squaring removes sign. Geometrically, this is correct: arc length is an unsigned positive quantity measuring distance along the path. Whether you walk up a hill or down it, the path length is the same. Contrast with signed integrals like $$\\int (dy/dx)\\, dx = y(b) - y(a)$$, which depend on direction.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Why is $$\\int \\sinh x \\, dx = \\cosh x + C$$ (no minus sign), in contrast to $$\\int \\sin x \\, dx = -\\cos x + C$$? (3 steps)", "answer": "- Step 1: Recall $$\\frac{d}{dx}(\\cosh x) = \\sinh x$$, so reversing gives $$\\int \\sinh x\\, dx = \\cosh x + C$$.\n- Step 2: For trig: $$\\frac{d}{dx}(\\cos x) = -\\sin x$$, hence the minus appears when reversing — $$\\int \\sin x \\, dx = -\\cos x + C$$.\n- Step 3: The structural reason: $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$ differentiates to $$\\frac{e^x - e^{-x}}{2} = \\sinh x$$ with no sign flip, because both exponentials' derivatives align positively. Trig functions inherit signs from $$d/dx(e^{ix}) = ie^{ix}$$, which produces alternating signs.\n\nThe lack of sign flips between $$\\sinh \\leftrightarrow \\cosh$$ derivative pairs is the \"cleaner\" feature of hyperbolic functions versus trig.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "Compare $$\\int \\cosh x \\, dx$$ vs $$\\int \\cos x \\, dx$$. Same look, but what's subtly different? (3 steps)", "answer": "- Step 1: $$\\int \\cosh x \\, dx = \\sinh x + C$$ — no sign issues, since $$\\frac{d}{dx}\\sinh x = \\cosh x$$ directly.\n- Step 2: $$\\int \\cos x \\, dx = \\sin x + C$$ — also clean, but note $$\\frac{d}{dx}\\sin x = \\cos x$$ (no sign flip), while $$\\frac{d}{dx}\\cos x = -\\sin x$$ (sign flip).\n- Step 3: Subtle difference:\n+ **Hyperbolic**: derivatives of cosh and sinh are each other (no signs).\n+ **Trig**: derivatives of cos and sin are each other up to a SIGN.\n\nSo while these specific integrals look identical, integrals like $$\\int \\sinh x$$ vs $$\\int \\sin x$$ start to show the sign divergence: $$\\int \\sinh x = \\cosh x$$ (positive) but $$\\int \\sin x = -\\cos x$$ (negative).", "source": "Opus 4.7 ②", "_id": "opus_2_85"}, {"question": "Compare $$\\int \\frac{1}{1-x^2} dx$$ vs $$\\int \\frac{1}{\\sqrt{1-x^2}} dx$$. Same expression under root or not — but completely different answers. Explain. (3 steps)", "answer": "- Step 1: $$\\int \\frac{1}{1-x^2} dx$$: standard form 16 with $$a = 1$$. Result: $$\\frac{1}{2}\\ln\\left|\\frac{1+x}{1-x}\\right| + C$$. Equivalent to $$\\text{artanh } x$$ for $$|x| < 1$$.\n- Step 2: $$\\int \\frac{1}{\\sqrt{1-x^2}} dx$$: standard form 8. Result: $$\\arcsin x + C$$.\n- Step 3: Fundamental difference:\n+ The first has quadratic in denominator; partial fractions $$\\frac{1}{1-x^2} = \\frac{1/2}{1-x} + \\frac{1/2}{1+x}$$ → both pieces become logs.\n+ The second has square root in denominator; not separable by partial fractions; antiderivative is arcsin.\n\nPedagogical note: presence/absence of the square root completely changes the antiderivative class. **Square root → trig inverse; no root → log/artanh.**", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "The Cornu spiral has parametric equations $$x = \\int_0^t \\cos\\left(\\frac{\\pi u^2}{2}\\right)du$$, $$y = \\int_0^t \\sin\\left(\\frac{\\pi u^2}{2}\\right)du$$. Find the length of this spiral from $$t=0$$ to $$t=a$$. (2 steps)", "answer": "- Step 1: By the Fundamental Theorem of Calculus, $$\\frac{dx}{dt} = \\cos\\left(\\frac{\\pi t^2}{2}\\right)$$ and $$\\frac{dy}{dt} = \\sin\\left(\\frac{\\pi t^2}{2}\\right)$$.\n- Step 2: $$\\left(\\frac{dx}{dt}\\right)^2+\\left(\\frac{dy}{dt}\\right)^2 = \\cos^2\\left(\\frac{\\pi t^2}{2}\\right)+\\sin^2\\left(\\frac{\\pi t^2}{2}\\right) = 1$$. So arc length $$= \\int_0^a \\sqrt{1} \\, dt = a$$.\n\nThe Cornu spiral has the remarkable property that its arc length equals the parameter $$t$$ — the speed along the curve is always 1.", "source": "GLM 5.1 ①", "_id": "glm_1_51"}, {"question": "What's the connection between the volume of revolution formula $$V = \\pi\\int y^2\\, dx$$ and the surface area formula $$S = 2\\pi\\int y\\, ds$$? (3 steps)", "answer": "- Step 1: Volume: each thin slice (disk/washer) has area $$\\pi y^2$$ and volume $$\\pi y^2 \\cdot dx$$. Sum: $$V = \\pi\\int y^2\\, dx$$.\n- Step 2: Surface: each thin band (frustum side) has area $$2\\pi y \\cdot ds$$ (circumference × slant). Sum: $$S = 2\\pi\\int y\\, ds$$.\n- Step 3: Volume measures bulk filled (uses disk **area** $$\\pi r^2$$); surface measures the skin (uses ring **circumference** $$2\\pi r$$). Different geometric quantities, different formulas.\n\nCommon mistake: mixing $$y$$ vs $$y^2$$. Dimensional check: volume is $$L^3$$, surface is $$L^2$$ — formulas reflect this.", "source": "Opus 4.7 ①", "_id": "opus_1_59"}, {"question": "What's the role of the factor $$2\\pi$$ in surface-of-revolution formulas?", "answer": "The factor $$2\\pi$$ comes from the **circumference** of a circle: $$2\\pi r$$, where the radius $$r$$ is the distance from the axis of rotation. When a small arc element $$ds$$ is rotated, every point on it traces a circle of circumference $$2\\pi y$$ (or $$2\\pi x$$, depending on the axis). The thin band swept out has area $$\\approx 2\\pi y \\cdot ds$$. The integral $$\\int 2\\pi y\\, ds$$ adds up all these bands. The $$2\\pi$$ is dimensionally an angle (in radians for full rotation) — if you only rotate through angle $$\\alpha$$, you'd use $$\\alpha$$ instead of $$2\\pi$$. The factor encodes \"fraction of full rotation.\"", "source": "Opus 4.7 ①", "_id": "opus_1_80"}, {"question": "When using the substitution $$x = a\\cosh u$$ for $$\\int \\frac{1}{\\sqrt{x^2-a^2}}dx$$, why must we choose $$u \\geq 0$$ (i.e., the principal value of $$\\operatorname{arcosh}$$)? (2 steps)", "answer": "- Step 1: The function $$\\cosh u$$ is even ($$\\cosh(-u) = \\cosh u$$), so both $$u$$ and $$-u$$ give the same $$x$$. To have a one-to-one substitution, we restrict to $$u \\geq 0$$, which is the principal branch of $$\\operatorname{arcosh}$$.\n- Step 2: This ensures $$\\sinh u \\geq 0$$ (since $$\\sinh$$ is increasing and $$\\sinh 0 = 0$$), so $$\\sqrt{\\sinh^2 u} = \\sinh u$$ without sign ambiguity. If we allowed $$u < 0$$, we'd need $$\\sqrt{\\sinh^2 u} = |\\sinh u| = -\\sinh u$$, introducing sign complications.\n\nThe domain restriction $$u \\geq 0$$ keeps the substitution clean and matches the standard definition of $$\\operatorname{arcosh}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_40"}, {"question": "Why do arc length integrals often involve hyperbolic functions (arsinh, arcosh)? (3 steps)", "answer": "- Step 1: Arc length integrands have the form $$\\sqrt{1 + (dy/dx)^2}$$ — square root of \"1 plus something squared\".\n- Step 2: This pairs naturally with hyperbolic substitutions because $$\\cosh^2 u - \\sinh^2 u = 1$$ rearranges to $$1 + \\sinh^2 u = \\cosh^2 u$$. So if $$dy/dx$$ matches $$\\sinh u$$, the surd becomes $$\\cosh u$$ cleanly.\n- Step 3: Examples:\n+ Parabola $$y = x^2/2$$: $$dy/dx = x$$, integrand $$\\sqrt{1+x^2}$$ → arsinh.\n+ Catenary $$y = a\\cosh(x/a)$$: integrand simplifies to $$\\cosh(x/a)$$ via $$1+\\sinh^2 = \\cosh^2$$.\n\nThe deeper structure: the unit hyperbola $$X^2 - Y^2 = 1$$ is the natural geometric setting for \"$$1$$ + square\" expressions; hyperbolic functions parameterize it. Arc length, being Pythagorean, naturally lives in this geometric universe.", "source": "Opus 4.7 ②", "_id": "opus_2_72"}, {"question": "Show the parallel between cos-power and sin-power reductions, and explain why definite integrals from 0 to π/2 give the same value. (3 steps)", "answer": "- Step 1: Same reduction formula structure: $$nI_n = (n-1)I_{n-2}$$ for both $$\\int_0^{\\pi/2} \\cos^n x \\, dx$$ and $$\\int_0^{\\pi/2} \\sin^n x \\, dx$$. Same derivation method (IBP + Pythagorean identity).\n- Step 2: The definite integrals are EQUAL: $$\\int_0^{\\pi/2} \\sin^n x \\, dx = \\int_0^{\\pi/2} \\cos^n x \\, dx$$ via the substitution $$u = \\pi/2 - x$$ (which converts sin to cos over this symmetric interval).\n- Step 3: For indefinite integrals, however, the antiderivatives DIFFER. Cos-reduction (indefinite): $$nI_n = \\cos^{n-1} x \\sin x + (n-1) I_{n-2}$$ (note boundary term doesn't vanish for indefinite).\n\nThe lesson: same recursion structure ↔ same definite values over symmetric intervals; but the antiderivatives are different functions.", "source": "Opus 4.7 ②", "_id": "opus_2_81"}, {"question": "Why is integration by parts for $$\\int x^n \\sin x \\, dx$$ more elaborate than for $$\\int x^n e^x \\, dx$$? (3 steps)", "answer": "- Step 1: With $$\\int x^n e^x \\, dx$$: IBP gives $$I_n = x^n e^x - n I_{n-1}$$ — one step, perfect reduction. Why? Because $$e^x$$ is the eigenfunction of differentiation: it integrates back to itself.\n- Step 2: With $$\\int x^n \\sin x \\, dx$$: IBP gives $$-x^n \\cos x + n \\int x^{n-1} \\cos x \\, dx$$. The residual now has $$\\cos x$$ — different family. Need ANOTHER IBP to return to a sin-power integral.\n- Step 3: The two-IBP pattern: $$\\int x^n \\sin x \\to \\int x^{n-1} \\cos x \\to \\int x^{n-2} \\sin x$$ — jump of 2 in power.\n\nThe deep reason: **trig functions cycle every two derivatives** ($$\\sin \\to \\cos \\to -\\sin \\to ...$$), while exponentials are eigenfunctions. The cycle length determines how many IBPs are needed.", "source": "Opus 4.7 ②", "_id": "opus_2_75"}, {"question": "Why does the Wallis sin-power reduction formula $$nI_n = (n-1)I_{n-2}$$ jump by 2 instead of 1? (3 steps)", "answer": "- Step 1: The IBP step naturally pulls off TWO factors at once when working with $$\\sin^n x = \\sin^{n-1} x \\sin x$$. After IBP and rewriting via $$\\cos^2 = 1 - \\sin^2$$, the $$\\sin^2$$ in the residual recombines into the next $$I_n$$ term, leaving $$\\sin^{n-2}$$.\n- Step 2: A jump-by-1 attempt would face a parity issue: the IBP residual would still have $$\\cos x$$ not fitting the sin-power family.\n- Step 3: The factor of 2 reflects parity-class dependence:\n+ Even $$n$$: chain reduces $$I_n \\to I_{n-2} \\to ... \\to I_0 = \\pi/2$$.\n+ Odd $$n$$: chain reduces $$I_n \\to I_{n-2} \\to ... \\to I_1 = 1$$.\n\nSo the parity of the starting $$n$$ determines the eventual base case, and the formula bridges within each parity class only.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Walk through $$\\int \\cosh^5 x\\, dx$$ conceptually using the odd-power strategy. (4 steps)", "answer": "- Step 1: Power 5 is odd. Peel off one $$\\cosh x$$: $$\\cosh^5 x = \\cosh^4 x \\cdot \\cosh x$$.\n- Step 2: Convert $$\\cosh^4 x = (\\cosh^2 x)^2 = (1 + \\sinh^2 x)^2 = 1 + 2\\sinh^2 x + \\sinh^4 x$$.\n- Step 3: So integrand is $$(1 + 2\\sinh^2 x + \\sinh^4 x)\\cosh x$$. Each term is a power of $$\\sinh x$$ times $$\\cosh x = (\\sinh x)'$$ — perfect power-rule pattern.\n- Step 4: Term by term: $$\\sinh x + \\frac{2}{3}\\sinh^3 x + \\frac{1}{5}\\sinh^5 x + C$$.\n\nStrategy works for any odd power of $$\\cosh$$ or $$\\sinh$$: peel off one factor (becomes the differential), convert remaining even power via Pythagorean identity, expand, use power rule on each term.", "source": "Opus 4.7 ①", "_id": "opus_1_65"}, {"question": "Arrange these techniques in order to try when faced with an unfamiliar integrand: standard form, $$f'/f$$, $$f' \\cdot f^n$$, partial fractions, completing the square, trig/hyp substitution, IBP, exponential form, reduction formula. Why this order? (4 steps)", "answer": "- Step 1: **Try direct first**: is it a standard integral or a linear-argument generalization? Zero effort if yes.\n- Step 2: **Pattern-match next**: $$f'(x)/f(x)$$ → log; $$f'(x)[f(x)]^n$$ → power. Usually obvious once checked.\n- Step 3: **Algebraic manipulation**: partial fractions for factorable rational integrands; completing the square for non-factorable quadratics; splitting numerators for \"mixed\" cases.\n- Step 4: **Substitutions and tools**: trig/hyp substitution for surds of quadratics; IBP for products like $$x \\cdot \\text{(function)}$$ or for inverse functions; exponential form when hyperbolic identities don't help; reduction formulae for parameterized families.\n\nReasoning: simplest tools first. Standard forms are zero-effort; algebraic moves are next-cheapest; substitutions and IBP need more setup; reduction is the heavy machinery.", "source": "Opus 4.7 ②", "_id": "opus_2_78"}, {"question": "Compare strategies for these three: $$\\int \\frac{1}{x^2+9} dx$$, $$\\int \\frac{1}{\\sqrt{x^2+9}} dx$$, $$\\int \\frac{1}{\\sqrt{9-x^2}} dx$$. What single distinction guides your choice? (4 steps)", "answer": "- Step 1: $$\\int \\frac{1}{x^2 + 9} dx$$: standard form 13 with $$a = 3$$, gives $$\\frac{1}{3}\\arctan(x/3) + C$$ (note 1/a factor).\n- Step 2: $$\\int \\frac{1}{\\sqrt{x^2 + 9}} dx$$: standard form 14 with $$a = 3$$, gives $$\\text{arsinh}(x/3) + C$$ (no 1/a factor).\n- Step 3: $$\\int \\frac{1}{\\sqrt{9 - x^2}} dx$$: standard form 12 with $$a = 3$$, gives $$\\arcsin(x/3) + C$$.\n- Step 4: The single distinction is the **shape of the denominator**:\n+ Squared denominator (no surd) → arctan with 1/a factor.\n+ Squared root with addition → arsinh, no factor.\n+ Square root with $$x^2$$ subtracted → arcsin.\n+ Square root with $$a^2$$ subtracted → arcosh.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "Compare ∫√(x² + 1)dx and ∫x√(x² + 1)dx. Why does the latter not require reduction? (2 steps)", "answer": "- Step 1: ∫x√(x² + 1)dx uses substitution u = x² + 1 → du = 2x dx → (1/2)∫√u du = (1/3)(x² + 1)^{3/2} + C.\n- Step 2: ∫√(x² + 1)dx requires hyperbolic substitution or integration by parts, as it lacks the x multiplier for simple substitution.  \n**Key Contrast:** The presence of x allows direct substitution in the latter, while the former needs advanced techniques due to the square root structure.", "source": "Qwen 3 ①", "_id": "qwen_1_14"}, {"question": "Misconception check: A student claims that for $$\\int \\frac{1}{\\sqrt{x^2-1}}dx$$, the answer is $$\\operatorname{arsinh} x + C$$ because \"the denominator has a square root of a sum.\" What is wrong with this reasoning? (2 steps)", "answer": "- Step 1: The denominator is $$\\sqrt{x^2-1}$$, which involves a DIFFERENCE ($$x^2$$ minus 1), not a sum. The $$\\operatorname{arsinh}$$ form applies to $$\\sqrt{x^2+1}$$ (or more generally $$\\sqrt{a^2+x^2}$$), where there is a PLUS sign.\n- Step 2: The correct identification: $$\\sqrt{x^2-1}$$ matches the form for $$\\operatorname{arcosh}$$ (result 11/15), since it's of the form $$\\sqrt{x^2-a^2}$$. The answer is $$\\operatorname{arcosh} x + C$$ (for $$x > 1$$).\n\nThe sign inside the square root is the decisive feature: plus → $$\\operatorname{arsinh}$$, minus → $$\\operatorname{arcosh}$$, and $$1-x^2$$ → $$\\arcsin$$.", "source": "GLM 5.1 ①", "_id": "glm_1_47"}, {"question": "Why does $$u = e^x$$ work cleanly for integrals involving $$\\frac{1}{\\cosh x}$$ or $$\\frac{1}{2\\cosh x - \\sinh x}$$? (3 steps)", "answer": "- Step 1: All hyperbolic functions are linear combinations of $$e^x$$ and $$e^{-x}$$. Multiplying numerator and denominator by $$e^x$$ converts $$e^{-x}$$ to $$1/e^x = 1/u$$.\n- Step 2: With $$u = e^x$$, $$du = e^x\\, dx$$, the integral becomes a rational function of $$u$$. E.g., $$\\frac{1}{\\cosh x} = \\frac{2e^x}{e^{2x}+1}$$ becomes $$\\frac{2}{u^2+1}\\, du$$.\n- Step 3: Rational functions of $$u$$ can be tackled with partial fractions, $$\\arctan$$, or log forms.\n\nHyperbolic functions are **really** rational functions of $$e^x$$, and $$u = e^x$$ makes this explicit. Universal technique for tricky hyperbolic combinations.", "source": "Opus 4.7 ①", "_id": "opus_1_66"}, {"question": "For the reduction formula $$I_n = \\int x^n\\cosh x \\, dx$$, two applications of integration by parts are needed to relate $$I_n$$ to $$I_{n-2}$$. Explain why two steps are needed and give the formula. (3 steps)", "answer": "- Step 1: First integration by parts: $$u = x^n$$, $$\\frac{dv}{dx} = \\cosh x$$ gives $$I_n = x^n\\sinh x - n\\int x^{n-1}\\sinh x \\, dx$$.\n- Step 2: The remaining integral $$\\int x^{n-1}\\sinh x \\, dx$$ is NOT $$I_{n-1}$$ (which would be $$\\int x^{n-1}\\cosh x \\, dx$$). Apply parts again: $$u = x^{n-1}$$, $$\\frac{dv}{dx} = \\sinh x$$ gives $$\\int x^{n-1}\\sinh x \\, dx = x^{n-1}\\cosh x - (n-1)\\int x^{n-2}\\cosh x \\, dx = x^{n-1}\\cosh x - (n-1)I_{n-2}$$.\n- Step 3: Combining: $$I_n = x^n\\sinh x - n[x^{n-1}\\cosh x - (n-1)I_{n-2}] = x^n\\sinh x - nx^{n-1}\\cosh x + n(n-1)I_{n-2}$$.\n\nTwo steps are needed because $$\\cosh$$ and $$\\sinh$$ alternate under differentiation/integration, so one step produces the \"other\" hyperbolic function, requiring a second step to return to the original type.", "source": "GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "Identify the form: $$\\int \\frac{1}{x \\sqrt{x^2-1}} dx$$. What substitution works? (3 steps)", "answer": "- Step 1: This isn't one of the standard forms 12–15 directly, but it has $$\\sqrt{x^2-1}$$, suggesting the substitution $$x = \\sec \\theta$$ or $$x = \\cosh u$$.\n- Step 2: With $$x = \\sec\\theta$$: $$dx = \\sec\\theta\\tan\\theta \\, d\\theta$$, and $$\\sqrt{x^2-1} = \\tan\\theta$$. So $$\\frac{dx}{x\\sqrt{x^2-1}} = \\frac{\\sec\\theta\\tan\\theta \\, d\\theta}{\\sec\\theta \\cdot \\tan\\theta} = d\\theta$$. \n- Step 3: Result: $$\\int 1 \\, d\\theta = \\theta + C = \\text{arcsec } x + C$$ (or equivalently $$\\arccos(1/x)$$).\n\nBeautiful cancellation: $$\\sec\\theta\\tan\\theta$$ in numerator (from $$dx$$ × $$1/\\sqrt{x^2-1}$$ factor) vs $$\\sec\\theta\\tan\\theta$$ in denominator (from $$x\\sqrt{x^2-1}$$). Perfect substitution match.", "source": "Opus 4.7 ②", "_id": "opus_2_87"}, {"question": "Edge case: What happens to the arc length integral $$s = \\int_{x_A}^{x_B}\\sqrt{1+\\left(\\frac{dy}{dx}\\right)^2}dx$$ when the curve is a straight line $$y = mx + c$$? Verify the result geometrically. (2 steps)", "answer": "- Step 1: For $$y = mx+c$$: $$\\frac{dy}{dx} = m$$, so $$\\sqrt{1+m^2}$$ is a constant. The arc length is $$\\int_{x_A}^{x_B}\\sqrt{1+m^2}dx = \\sqrt{1+m^2}(x_B-x_A)$$.\n- Step 2: Geometrically, for a straight line from $$(x_A, y_A)$$ to $$(x_B, y_B)$$, the length is $$\\sqrt{(\\Delta x)^2+(\\Delta y)^2} = \\sqrt{(x_B-x_A)^2 + m^2(x_B-x_A)^2} = (x_B-x_A)\\sqrt{1+m^2}$$. The results match.\n\nThe arc length formula correctly reduces to the Pythagorean distance for straight lines — a good sanity check.", "source": "GLM 5.1 ①", "_id": "glm_1_52"}, {"question": "Why does ∫1/(x√(lnx)) dx converge/diverge between 0 and e? Analyze without computing. (2 steps)", "answer": "- Step 1: Sub u = lnx → du = 1/x dx → ∫u^{-1/2} du from -∞ to 1.\n- Step 2: ∫u^{-1/2} du = 2√u evaluated from -∞ to 1 → Diverges due to lower limit.  \n**Comparison:** The integrand behaves like x^{-1}(lnx)^{-1/2}, which diverges at x=0.", "source": "Qwen 3 ①", "_id": "qwen_1_27"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "When integrating $$\\operatorname{sech} x \\tanh x$$, the result has a negative sign: $$-\\operatorname{sech} x + C$$. Why does this negative sign appear, unlike the integral of $$\\cosh x$$ which gives $$+\\sinh x$$? (2 steps)", "answer": "- Step 1: The negative sign comes directly from the differentiation chain. We know that $$\\frac{d}{dx}(\\operatorname{sech} x) = -\\operatorname{sech} x \\tanh x$$. So when we reverse the process to integrate, we get $$\\int \\operatorname{sech} x \\tanh x \\, dx = -\\operatorname{sech} x + C$$.\n- Step 2: The underlying reason is that $$\\operatorname{sech} x = \\frac{2}{e^x + e^{-x}}$$, and differentiating this quotient produces a negative leading term because the denominator grows faster than the numerator for positive $$x$$. The same logic explains why $$\\int \\operatorname{cosech} x \\operatorname{coth} x \\, dx = -\\operatorname{cosech} x + C$$ and $$\\int \\operatorname{cosech}^2 x \\, dx = -\\operatorname{coth} x + C$$ — all three \"co-\" hyperbolic functions have derivatives with negative signs.\n\nThe mnemonic: all \"co-\" hyperbolic derivatives (coth, cosech, sech) carry negative signs, just as all \"co-\" trigonometric derivatives do (cot, cosec, sec with appropriate signs).", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "An integral has denominator $$1+x^2$$. A student immediately writes the answer as $$\\arctan x + C$$. Give a specific example where this would be WRONG, and explain what the correct approach would be instead. (2 steps)", "answer": "- Step 1: Consider $$\\int \\frac{2x}{1+x^2} dx$$. Here the numerator $$2x$$ is the derivative of the denominator $$1+x^2$$. This matches the form $$\\int \\frac{f'(x)}{f(x)} dx = \\ln|f(x)| + C$$, so the answer is $$\\ln(1+x^2) + C$$, NOT $$\\arctan x$$.\n- Step 2: The $$\\arctan x$$ form only applies when the numerator is a constant (or can be made constant by factoring). The key test: if the numerator is the derivative of the denominator (or a multiple of it), use the logarithmic form. If the numerator is independent of $$x$$ (a constant), use the arctan form.\n\nThe critical distinction: $$\\int \\frac{1}{1+x^2}dx = \\arctan x + C$$ but $$\\int \\frac{x}{1+x^2}dx = \\frac{1}{2}\\ln(1+x^2) + C$$.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Similarly, an integral has denominator $$\\sqrt{1+x^2}$$. A student immediately writes $$\\operatorname{arsinh} x + C$$. Give a specific example where this is wrong, and state the correct method and result. (2 steps)", "answer": "- Step 1: Consider $$\\int \\frac{5x}{\\sqrt{1+x^2}} dx$$. Here the numerator contains an $$x$$, which is related to the derivative of $$(1+x^2)$$. Specifically, $$\\frac{d}{dx}(1+x^2) = 2x$$. This matches the form $$\\int f'(x)[f(x)]^n dx$$ with $$f(x) = 1+x^2$$ and $$n = -\\frac{1}{2}$$.\n- Step 2: Rewriting: $$\\int 5x(1+x^2)^{-1/2}dx = \\frac{5}{2}\\int 2x(1+x^2)^{-1/2}dx = \\frac{5}{2} \\cdot \\frac{(1+x^2)^{1/2}}{1/2} + C = 5\\sqrt{1+x^2} + C$$.\n\nThe $$\\operatorname{arsinh}$$ form applies only when the numerator is a constant. When the numerator contains $$x$$ (the derivative of the inside of the square root), use the power-rule/log form instead.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "To integrate $$\\int \\frac{2+5x}{\\sqrt{x^2+1}} dx$$, you split the numerator into two parts. Explain the strategy and the two standard forms that result. (3 steps)", "answer": "- Step 1: Split the integral: $$\\int \\frac{2+5x}{\\sqrt{x^2+1}} dx = \\int \\frac{5x}{\\sqrt{x^2+1}} dx + \\int \\frac{2}{\\sqrt{x^2+1}} dx$$.\n- Step 2: The first integral has $$x$$ in the numerator, which is half the derivative of $$x^2+1$$. This is the form $$\\int f'(x)[f(x)]^n dx$$, giving $$5\\sqrt{x^2+1}$$.\n+ Sub-case: More explicitly, $$\\int 5x(x^2+1)^{-1/2}dx = \\frac{5}{2}\\int 2x(x^2+1)^{-1/2}dx = \\frac{5}{2} \\cdot \\frac{(x^2+1)^{1/2}}{1/2} = 5\\sqrt{x^2+1}$$.\n- Step 3: The second integral has a constant numerator, matching the standard form $$\\int \\frac{1}{\\sqrt{1+x^2}}dx = \\operatorname{arsinh} x + C$$, giving $$2\\operatorname{arsinh} x$$. Combined: $$5\\sqrt{x^2+1} + 2\\operatorname{arsinh} x + C$$.\n\nSplitting the numerator separates the \"derivative-of-denominator\" part from the \"constant\" part, each yielding a different standard form.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "To find $$\\int \\tanh x \\, dx$$, you can rewrite $$\\tanh x$$ as $$\\frac{\\sinh x}{\\cosh x}$$. Walk through why this works and give the result. (2 steps)", "answer": "- Step 1: Since $$\\tanh x = \\frac{\\sinh x}{\\cosh x}$$, we have $$\\int \\tanh x \\, dx = \\int \\frac{\\sinh x}{\\cosh x} dx$$. Notice that the numerator $$\\sinh x$$ is exactly the derivative of the denominator $$\\cosh x$$.\n- Step 2: This matches the form $$\\int \\frac{f'(x)}{f(x)} dx = \\ln|f(x)| + C$$. Since $$\\cosh x > 0$$ for all $$x$$, we can drop the absolute value: $$\\int \\tanh x \\, dx = \\ln(\\cosh x) + C$$.\n\nThis is a standard result marked (*) in the formula booklet. The same technique applies to $$\\int \\coth x \\, dx = \\ln|\\sinh x| + C$$ (here absolute value IS needed since $$\\sinh x$$ can be negative).", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "To integrate $$\\int \\operatorname{sech}^6 x \\tanh x \\, dx$$, you need to recognise a specific pattern. What substitution-like pattern is being used, and what is the result? (2 steps)", "answer": "- Step 1: Rewrite as $$\\int \\operatorname{sech}^5 x \\cdot (\\operatorname{sech} x \\tanh x) \\, dx$$. The factor $$\\operatorname{sech} x \\tanh x$$ is (up to sign) the derivative of $$\\operatorname{sech} x$$: specifically $$\\frac{d}{dx}(\\operatorname{sech} x) = -\\operatorname{sech} x \\tanh x$$.\n- Step 2: This is the form $$\\int [f(x)]^n f'(x) dx$$ with $$f(x) = \\operatorname{sech} x$$, $$n=5$$, and $$f'(x) = -\\operatorname{sech} x \\tanh x$$. So: $$\\int \\operatorname{sech}^5 x (-\\operatorname{sech} x \\tanh x) dx = -\\frac{(\\operatorname{sech} x)^6}{6} + C = -\\frac{1}{6}\\operatorname{sech}^6 x + C$$.\n\nThe pattern: when you see $$\\tanh x$$ alongside a power of $$\\operatorname{sech} x$$, the $$\\operatorname{sech} x \\tanh x$$ piece acts as the \"derivative\" part for a reverse-chain-rule integration.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "When integrating $$\\int \\cosh^2 3x \\, dx$$, you cannot simply write $$\\frac{\\cosh^3 3x}{3}$$. Why not, and what identity do you use instead? Give the result. (3 steps)", "answer": "- Step 1: You cannot use reverse chain rule because the derivative of $$\\cosh 3x$$ is $$3\\sinh 3x$$, and there is no $$\\sinh 3x$$ factor present in the integrand. The \"missing derivative\" prevents direct integration.\n- Step 2: Use the double-angle identity $$\\cosh 2A = 2\\cosh^2 A - 1$$, rearranged as $$\\cosh^2 A = \\frac{1 + \\cosh 2A}{2}$$. With $$A = 3x$$: $$\\cosh^2 3x = \\frac{1 + \\cosh 6x}{2}$$.\n- Step 3: Now integrate: $$\\int \\frac{1+\\cosh 6x}{2} dx = \\frac{1}{2}x + \\frac{1}{2} \\cdot \\frac{\\sinh 6x}{6} + C = \\frac{1}{2}x + \\frac{1}{12}\\sinh 6x + C$$.\n\nThis mirrors the trigonometric technique: just as $$\\int \\cos^2 3x \\, dx$$ uses $$\\cos^2 A = \\frac{1+\\cos 2A}{2}$$, the hyperbolic version uses the analogous identity.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "To find $$\\int \\sinh^3 x \\, dx$$, you rewrite $$\\sinh^3 x$$ as $$\\sinh^2 x \\cdot \\sinh x$$ and then use an identity. Walk through the steps and give the final result. (3 steps)", "answer": "- Step 1: Write $$\\int \\sinh^3 x \\, dx = \\int \\sinh^2 x \\cdot \\sinh x \\, dx$$. Now use the identity $$\\sinh^2 x = \\cosh^2 x - 1$$ to replace the even power.\n- Step 2: This gives $$\\int (\\cosh^2 x - 1)\\sinh x \\, dx = \\int \\cosh^2 x \\sinh x \\, dx - \\int \\sinh x \\, dx$$.\n- Step 3: In the first integral, $$\\sinh x$$ is the derivative of $$\\cosh x$$, so use reverse chain rule: $$\\int \\cosh^2 x \\sinh x \\, dx = \\frac{\\cosh^3 x}{3}$$. The second integral is standard: $$\\int \\sinh x \\, dx = \\cosh x$$. Result: $$\\frac{1}{3}\\cosh^3 x - \\cosh x + C$$.\n\nStrategy: for odd powers of $$\\sinh$$ or $$\\cosh$$, keep one factor as the \"derivative\" and convert the remaining even power using the fundamental identity.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "To find $$\\int e^{2x}\\sinh x \\, dx$$, integration by parts twice seems natural but actually fails when the coefficient of $$x$$ in the exponent matches the hyperbolic argument (e.g., $$e^{ax}\\sinh ax$$). What alternative method works, and why? (3 steps)", "answer": "- Step 1: Use the exponential definition: $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$. Substitute this in: $$\\int e^{2x} \\cdot \\frac{e^x - e^{-x}}{2} dx = \\frac{1}{2}\\int (e^{3x} - e^{x}) dx$$.\n- Step 2: Now integrate each term directly: $$\\frac{1}{2}\\left(\\frac{e^{3x}}{3} - e^x\\right) + C = \\frac{1}{6}e^{3x} - \\frac{1}{2}e^x + C = \\frac{1}{6}(e^{3x} - 3e^x) + C$$.\n- Step 3: The reason integration by parts fails for $$\\int e^{ax}\\sinh ax \\, dx$$: after two rounds of parts, you get back to the original integral but with the same sign (unlike $$\\int e^{ax}\\sin bx \\, dx$$ where signs alternate). This means you cannot solve for the integral algebraically. The exponential method always works cleanly for products of exponentials with hyperbolic functions.\n\nRule of thumb: when you see $$e^{ax}$$ times a hyperbolic function, try converting the hyperbolic function to exponentials first.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "The integral $$\\int \\operatorname{sech} x \\, dx$$ cannot be found the same way as $$\\int \\sec x \\, dx = \\ln|\\sec x + \\tan x| + C$$. What method is used instead, and what is the result? (3 steps)", "answer": "- Step 1: Multiply numerator and denominator by $$e^x$$: $$\\int \\operatorname{sech} x \\, dx = \\int \\frac{2}{e^x + e^{-x}} dx = \\int \\frac{2e^x}{e^{2x} + 1} dx$$.\n- Step 2: Substitute $$u = e^x$$, so $$du = e^x dx$$, meaning $$e^x dx = du$$: $$\\int \\frac{2}{u^2 + 1} du = 2\\arctan u + C$$.\n- Step 3: Back-substitute: $$2\\arctan(e^x) + C$$.\n\nThe key insight: multiplying top and bottom by $$e^x$$ transforms the integrand into a form with $$e^{2x}+1$$ in the denominator, which after the substitution $$u=e^x$$ becomes the standard $$\\frac{1}{u^2+1}$$ arctan form.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "For an integral involving $$\\sqrt{1-x^2}$$, two substitutions are suggested: $$x = \\sin\\theta$$ or $$x = \\tanh u$$. Which is generally preferred and why? (2 steps)", "answer": "- Step 1: The substitution $$x = \\sin\\theta$$ is generally preferred. When you substitute, $$\\sqrt{1-x^2} = \\sqrt{1-\\sin^2\\theta} = \\cos\\theta$$, and $$dx = \\cos\\theta \\, d\\theta$$. The $$\\cos\\theta$$ from the square root and the $$\\cos\\theta$$ from $$dx$$ combine naturally, and the resulting integral in $$\\theta$$ is typically straightforward.\n- Step 2: The substitution $$x = \\tanh u$$ gives $$\\sqrt{1-x^2} = \\sqrt{1-\\tanh^2 u} = \\operatorname{sech} u$$, and $$dx = \\operatorname{sech}^2 u \\, du$$. The resulting integral involves $$\\operatorname{sech}^3 u$$, which is harder to integrate than a simple trigonometric expression. The trigonometric substitution leads to simpler integrals in most cases.\n\nThe textbook states: \"The first substitution in each suggested pair is the one more likely to prove the better choice.\"", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "For an integral involving $$\\sqrt{1+x^2}$$, the substitution $$x = \\sinh u$$ is preferred over $$x = \\tan\\theta$$. Explain what happens with each substitution and why $$\\sinh u$$ is better. (2 steps)", "answer": "- Step 1: With $$x = \\sinh u$$: $$\\sqrt{1+x^2} = \\sqrt{1+\\sinh^2 u} = \\cosh u$$, and $$dx = \\cosh u \\, du$$. The $$\\cosh u$$ from the square root and the $$\\cosh u$$ from $$dx$$ multiply to give $$\\cosh^2 u$$, which can be integrated using the identity $$\\cosh^2 u = \\frac{1+\\cosh 2u}{2}$$.\n- Step 2: With $$x = \\tan\\theta$$: $$\\sqrt{1+x^2} = \\sqrt{1+\\tan^2\\theta} = \\sec\\theta$$, and $$dx = \\sec^2\\theta \\, d\\theta$$. The product gives $$\\sec^3\\theta$$, which requires a difficult reduction formula to integrate. The hyperbolic substitution keeps things in terms of $$\\cosh$$, which is much easier to handle.\n\nThe hyperbolic substitution is the natural choice for $$\\sqrt{1+x^2}$$ because the fundamental identity $$1+\\sinh^2 u = \\cosh^2 u$$ eliminates the square root cleanly.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "For an integral involving $$\\sqrt{x^2-1}$$, the substitution $$x = \\cosh u$$ is preferred. What identity makes this work, and what condition on $$x$$ is required? (2 steps)", "answer": "- Step 1: The identity $$\\cosh^2 u - 1 = \\sinh^2 u$$ means $$\\sqrt{x^2-1} = \\sqrt{\\cosh^2 u - 1} = \\sinh u$$ (taking the positive root since $$\\sinh u \\geq 0$$ when $$u \\geq 0$$). Also $$dx = \\sinh u \\, du$$, so the product gives $$\\sinh^2 u$$, which integrates easily.\n- Step 2: The condition is $$x > 1$$ (or $$x \\geq 1$$). This is because $$\\cosh u \\geq 1$$ for all real $$u$$, so the substitution $$x = \\cosh u$$ can only represent values $$x \\geq 1$$. This matches the domain of $$\\operatorname{arcosh} x$$ and the condition for $$\\sqrt{x^2-1}$$ to be real.\n\nThe alternative $$x = \\sec\\theta$$ also works (using $$\\sec^2\\theta - 1 = \\tan^2\\theta$$), but the hyperbolic substitution is cleaner.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Derive the result $$\\int \\frac{1}{a^2+x^2} dx = \\frac{1}{a}\\arctan\\left(\\frac{x}{a}\\right) + C$$ using the substitution $$x = a\\tan\\theta$$. (3 steps)", "answer": "- Step 1: Let $$x = a\\tan\\theta$$, so $$dx = a\\sec^2\\theta \\, d\\theta$$, and $$a^2+x^2 = a^2+a^2\\tan^2\\theta = a^2(1+\\tan^2\\theta) = a^2\\sec^2\\theta$$.\n- Step 2: Substitute: $$\\int \\frac{1}{a^2\\sec^2\\theta} \\cdot a\\sec^2\\theta \\, d\\theta = \\int \\frac{1}{a} d\\theta = \\frac{\\theta}{a} + C$$.\n- Step 3: Since $$x = a\\tan\\theta$$, we have $$\\tan\\theta = \\frac{x}{a}$$, so $$\\theta = \\arctan\\left(\\frac{x}{a}\\right)$$. Therefore: $$\\frac{1}{a}\\arctan\\left(\\frac{x}{a}\\right) + C$$.\n\nNote the factor $$\\frac{1}{a}$$ in the result — this is the only one of results 12–15 that has such a factor, and it arises from the substitution scaling.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Among the four generalised standard results (12–15), only result 13 ($$\\int \\frac{1}{a^2+x^2}dx$$) has a factor of $$\\frac{1}{a}$$ in front. The others (12, 14, 15) do not. Explain intuitively why this factor appears for the arctan case but not the others. (2 steps)", "answer": "- Step 1: When we substitute $$x = a\\tan\\theta$$, the denominator becomes $$a^2\\sec^2\\theta$$ and $$dx = a\\sec^2\\theta \\, d\\theta$$. The $$\\sec^2\\theta$$ cancels, but the factor of $$a$$ in the numerator (from $$dx$$) and $$a^2$$ in the denominator leave a $$\\frac{1}{a}$$ after cancellation. This factor survives all the way to the final answer.\n- Step 2: For results 12, 14, and 15, the square root in the denominator means the substitution produces a factor like $$a\\cos\\theta$$ or $$a\\cosh u$$ or $$a\\sinh u$$, and the corresponding $$dx$$ also contains such a factor. The square root and the $$dx$$ factor combine so that the $$a$$'s cancel completely, leaving no extra factor in the result.\n\nThe arctan case is special because there is no square root — just a sum of squares — so the scaling factor $$a$$ doesn't get \"absorbed\" the same way.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "To evaluate $$\\int \\frac{1}{25+9x^2} dx$$, you must rewrite the denominator in the form $$k(a^2+x^2)$$ before applying the standard result. Show the key algebraic step and give the final answer. (3 steps)", "answer": "- Step 1: Factor out the coefficient of $$x^2$$: $$25+9x^2 = 9\\left(\\frac{25}{9}+x^2\\right) = 9\\left(\\left(\\frac{5}{3}\\right)^2+x^2\\right)$$.\n- Step 2: Now the integral becomes $$\\int \\frac{1}{9\\left(\\left(\\frac{5}{3}\\right)^2+x^2\\right)} dx = \\frac{1}{9}\\int \\frac{1}{\\left(\\frac{5}{3}\\right)^2+x^2} dx$$.\n- Step 3: Apply result 13 with $$a = \\frac{5}{3}$$: $$\\frac{1}{9} \\cdot \\frac{1}{5/3}\\arctan\\left(\\frac{x}{5/3}\\right) + C = \\frac{1}{9} \\cdot \\frac{3}{5}\\arctan\\left(\\frac{3x}{5}\\right) + C = \\frac{1}{15}\\arctan\\left(\\frac{3x}{5}\\right) + C$$.\n\nThe crucial step is always factoring out the coefficient of $$x^2$$ to expose the standard $$a^2+x^2$$ form.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Show that $$\\int \\sqrt{1+x^2} \\, dx = \\frac{1}{2}\\operatorname{arsinh} x + \\frac{1}{2}x\\sqrt{1+x^2} + C$$ using the substitution $$x = \\sinh u$$. (4 steps)", "answer": "- Step 1: Let $$x = \\sinh u$$, so $$dx = \\cosh u \\, du$$ and $$\\sqrt{1+x^2} = \\sqrt{1+\\sinh^2 u} = \\cosh u$$.\n- Step 2: The integral becomes $$\\int \\cosh u \\cdot \\cosh u \\, du = \\int \\cosh^2 u \\, du$$.\n- Step 3: Use the identity $$\\cosh^2 u = \\frac{1+\\cosh 2u}{2}$$: $$\\int \\frac{1+\\cosh 2u}{2} du = \\frac{1}{2}u + \\frac{1}{4}\\sinh 2u + C = \\frac{1}{2}u + \\frac{1}{2}\\sinh u \\cosh u + C$$.\n- Step 4: Back-substitute: $$u = \\operatorname{arsinh} x$$, $$\\sinh u = x$$, $$\\cosh u = \\sqrt{1+x^2}$$. Result: $$\\frac{1}{2}\\operatorname{arsinh} x + \\frac{1}{2}x\\sqrt{1+x^2} + C$$.\n\nThis is a key result that appears frequently in arc length and surface area problems.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "To evaluate $$\\int_0^6 \\frac{x^3}{\\sqrt{x^2+9}} dx$$ using the substitution $$x = 3\\sinh u$$, what are the new limits, and why does the $$\\cosh u$$ factor cancel? (3 steps)", "answer": "- Step 1: When $$x=0$$: $$\\sinh u = 0 \\Rightarrow u = 0$$. When $$x=6$$: $$\\sinh u = 2 \\Rightarrow u = \\operatorname{arsinh} 2$$. So new limits are $$0$$ to $$\\operatorname{arsinh} 2$$.\n- Step 2: The denominator: $$\\sqrt{x^2+9} = \\sqrt{9\\sinh^2 u + 9} = \\sqrt{9\\cosh^2 u} = 3\\cosh u$$. The $$dx$$ factor: $$dx = 3\\cosh u \\, du$$. So the integrand becomes $$\\frac{27\\sinh^3 u}{3\\cosh u} \\cdot 3\\cosh u = 27\\sinh^3 u$$.\n- Step 3: The $$\\cosh u$$ from the denominator and the $$\\cosh u$$ from $$dx$$ cancel completely. This is the beauty of the hyperbolic substitution for $$\\sqrt{x^2+a^2}$$ forms — the square root and the differential work together to simplify.\n\nThe remaining integral $$27\\int_0^{\\operatorname{arsinh} 2} \\sinh^3 u \\, du$$ is evaluated using the method from Q8.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "When completing the square on $$x^2 - 8x + 8$$, you get $$(x-4)^2 - 8$$. This leads to which standard integral form, and what substitution do you use? (2 steps)", "answer": "- Step 1: The completed-square form $$(x-4)^2 - 8$$ matches the pattern $$u^2 - a^2$$ with $$u = x-4$$ and $$a = \\sqrt{8} = 2\\sqrt{2}$$. This corresponds to result 17: $$\\int \\frac{1}{x^2-a^2}dx = \\frac{1}{2a}\\ln\\left|\\frac{x-a}{x+a}\\right| + C$$.\n- Step 2: The substitution is simply $$u = x-4$$ (a linear shift), giving $$\\int \\frac{1}{u^2-8}du$$. With $$a = 2\\sqrt{2}$$: $$\\frac{1}{4\\sqrt{2}}\\ln\\left|\\frac{u-2\\sqrt{2}}{u+2\\sqrt{2}}\\right| + C = \\frac{\\sqrt{2}}{8}\\ln\\left|\\frac{x-4-2\\sqrt{2}}{x-4+2\\sqrt{2}}\\right| + C$$.\n\nThe key: completing the square converts a general quadratic into a shifted standard form, then a simple linear substitution reduces it to a known result.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "When completing the square on $$2x^2+4x+11$$, you first factor out the leading coefficient. Show the completed-square form and identify which standard result applies. (3 steps)", "answer": "- Step 1: Factor out 2: $$2x^2+4x+11 = 2\\left(x^2+2x+\\frac{11}{2}\\right)$$.\n- Step 2: Complete the square inside: $$x^2+2x+\\frac{11}{2} = (x+1)^2 - 1 + \\frac{11}{2} = (x+1)^2 + \\frac{9}{2}$$.\n- Step 3: So $$2x^2+4x+11 = 2\\left[(x+1)^2 + \\frac{9}{2}\\right]$$. The form $$(x+1)^2 + \\frac{9}{2}$$ matches $$u^2 + a^2$$ with $$u = x+1$$ and $$a = \\frac{3}{\\sqrt{2}}$$. This gives the arctan result (result 13).\n\nThe integral becomes $$\\frac{1}{2}\\int \\frac{1}{u^2+\\frac{9}{2}}du = \\frac{1}{2} \\cdot \\frac{\\sqrt{2}}{3}\\arctan\\left(\\frac{u\\sqrt{2}}{3}\\right) + C = \\frac{1}{3\\sqrt{2}}\\arctan\\left(\\frac{\\sqrt{2}(x+1)}{3}\\right) + C$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "To find $$\\int \\frac{1}{\\sqrt{12x+2x^2}} dx$$, you complete the square on $$12x+2x^2$$. Note that the $$x^2$$ coefficient is NOT the leading term when written in standard order. Show the completed-square form and the final result. (3 steps)", "answer": "- Step 1: Rewrite as $$2x^2+12x = 2(x^2+6x)$$. Complete the square: $$x^2+6x = (x+3)^2 - 9$$. So $$12x+2x^2 = 2[(x+3)^2-9]$$.\n- Step 2: The integral becomes $$\\int \\frac{1}{\\sqrt{2[(x+3)^2-9]}} dx = \\frac{1}{\\sqrt{2}}\\int \\frac{1}{\\sqrt{(x+3)^2-9}} dx$$.\n- Step 3: With $$u = x+3$$, this is result 15 with $$a=3$$: $$\\frac{1}{\\sqrt{2}}\\operatorname{arcosh}\\left(\\frac{x+3}{3}\\right) + C$$.\n\nNote: the form $$(x+3)^2 - 9$$ (something squared MINUS a constant) signals the $$\\operatorname{arcosh}$$ form, not $$\\operatorname{arsinh}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "To find $$\\int \\frac{1}{\\sqrt{4-2x-x^2}} dx$$ using a trigonometric substitution, you first complete the square. Show that the form becomes $$5-(x+1)^2$$ and state the appropriate substitution. (3 steps)", "answer": "- Step 1: Rewrite: $$4-2x-x^2 = -(x^2+2x-4) = -[(x+1)^2-5] = 5-(x+1)^2$$.\n- Step 2: The form $$5-(x+1)^2$$ is $$a^2 - u^2$$ with $$a = \\sqrt{5}$$ and $$u = x+1$$. This signals the arcsin form (result 12).\n- Step 3: The appropriate substitution is $$x+1 = \\sqrt{5}\\sin\\theta$$, so $$dx = \\sqrt{5}\\cos\\theta \\, d\\theta$$ and $$\\sqrt{5-(x+1)^2} = \\sqrt{5}\\cos\\theta$$. The integral becomes $$\\int \\frac{\\sqrt{5}\\cos\\theta}{\\sqrt{5}\\cos\\theta}d\\theta = \\theta + C = \\arcsin\\left(\\frac{x+1}{\\sqrt{5}}\\right) + C$$.\n\nThe pattern $$a^2 - u^2$$ under a square root always suggests $$x = a\\sin\\theta$$ (trig) or $$\\arcsin$$ (direct formula).", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "To integrate $$\\int \\operatorname{artanh} x \\, dx$$, you use integration by parts. What do you choose as $$u$$ and $$\\frac{dv}{dx}$$, and why? Give the result. (3 steps)", "answer": "- Step 1: Write $$\\int \\operatorname{artanh} x \\, dx = \\int \\operatorname{artanh} x \\cdot 1 \\, dx$$. Choose $$u = \\operatorname{artanh} x$$ and $$\\frac{dv}{dx} = 1$$, so $$v = x$$ and $$\\frac{du}{dx} = \\frac{1}{1-x^2}$$.\n- Step 2: Apply integration by parts: $$\\int u\\frac{dv}{dx}dx = uv - \\int v\\frac{du}{dx}dx = x\\operatorname{artanh} x - \\int \\frac{x}{1-x^2}dx$$.\n- Step 3: The remaining integral: $$\\int \\frac{x}{1-x^2}dx = -\\frac{1}{2}\\int \\frac{-2x}{1-x^2}dx =
