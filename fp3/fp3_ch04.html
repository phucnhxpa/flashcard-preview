expression to a single term times du.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Using the substitution x = a tan θ, derive the formula ∫ 1/(a²+x²) dx = (1/a) arctan(x/a) + C (3 steps)", "answer": "- Step 1: Let x = a tan θ, then dx/dθ = a sec²θ, so dx = a sec²θ dθ\n\n- Step 2: Substitute: ∫ 1/(a² + a²tan²θ) × a sec²θ dθ = ∫ 1/(a²sec²θ) × a sec²θ dθ = ∫ 1/a dθ = (1/a)θ + C\n\n- Step 3: Since tan θ = x/a, we have θ = arctan(x/a), giving (1/a)arctan(x/a) + C", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Write down the four general integration results (12-15) for integrals involving square roots of quadratics, and state when each applies. (2 steps)", "answer": "- Step 1: The four results:\n- (12) ∫ 1/√(a² - x²) dx = arcsin(x/a), |x| < a\n- (13) ∫ 1/(a² + x²) dx = (1/a) arctan(x/a)\n- (14) ∫ 1/√(a² + x²) dx = arsinh(x/a)\n- (15) ∫ 1/√(x² - a²) dx = arcosh(x/a), x > a\n\n- Step 2: Apply based on the form of the quadratic under the square root: subtract for sin, add for arsinh, subtract with x² leading for arcosh. Note that (13) has the 1/a factor while others don't.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Evaluate ∫ 4/(5+x²) dx using the standard result. What is the process? (2 steps)", "answer": "- Step 1: Write in standard form: 5 + x² = (√5)² + x², so a = √5\n\n- Step 2: Using result 13: ∫ 1/(a²+x²) dx = (1/a)arctan(x/a)\n- ∫ 4/(5+x²) dx = 4 × (1/√5) arctan(x/√5) + C = (4/√5) arctan(x/√5) + C", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Evaluate ∫(0 to 6) x³/√(x²+9) dx using the substitution x = 3 sinh u. Show the key steps. (4 steps)", "answer": "- Step 1: Substitute x = 3 sinh u, then dx = 3 cosh u du, and √(x²+9) = √(9sinh²u + 9) = 3 cosh u\n\n- Step 2: The integral becomes: ∫ (27 sinh³u)/(3 cosh u) × 3 cosh u du = 27 ∫ sinh³u du\n\n- Step 3: Using ∫ sinh³u du = (1/3)cosh³u - cosh u (from reduction formula), evaluate from u = 0 (x = 0) to u = arsinh 2 (x = 6, sinh u = 2)\n\n- Step 4: At u = arsinh 2: cosh u = √(1+4) = √5. So result = 27[(1/3)coshu³ - cosh u] from 0 to arsinh 2 = 27[(5√5/3 - √5) - (1/3 - 1)] = 27[(2√5/3) + (2/3)] = 18√5 + 18 = 18(√5 + 1)", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Show that ∫ √(1+x²) dx = (1/2)arsinh x + (1/2)x√(1+x²) + C using x = sinh u. (4 steps)", "answer": "- Step 1: Let x = sinh u, then dx = cosh u du, and √(1+x²) = √(1+sinh²u) = cosh u\n\n- Step 2: Integral becomes ∫ cosh²u du = ∫ (1 + cosh 2u)/2 du = (1/2)∫ du + (1/2)∫ cosh 2u du\n\n- Step 3: = (1/2)u + (1/4)sinh 2u + C = (1/2)u + (1/2)sinh u cosh u + C\n\n- Step 4: Substitute back: u = arsinh x, sinh u = x, cosh u = √(1+x²), giving (1/2)arsinh x + (1/2)x√(1+x²) + C", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Find ∫ 1/(x² - 8x + 8) dx by completing the square. What type of result do you expect? (3 steps)", "answer": "- Step 1: Complete the square: x² - 8x + 8 = (x-4)² - 8 = (x-4)² - (2√2)²\n\n- Step 2: Let u = x-4, then integral = ∫ 1/(u² - 8) du\n\n- Step 3: This matches result 17: ∫ 1/(x² - a²) dx = (1/2a)ln|(x-a)/(x+a)| + C with a = 2√2\n- = (1/(4√2))ln|(u-2√2)/(u+2√2)| + C = (√2/8)ln|(x-4-2√2)/(x-4+2√2)| + C", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Find ∫ 1/√(12x + 2x²) dx by completing the square and selecting an appropriate substitution. (3 steps)", "answer": "- Step 1: Complete the square: 12x + 2x² = 2(x² + 6x) = 2[(x+3)² - 9] = 2[(x+3)² - 3²]\n\n- Step 2: Let u = x+3, giving ∫ 1/√(2(u²-9)) du = (1/√2)∫ 1/√(u²-9) du\n\n- Step 3: Using result 15: ∫ 1/√(u²-a²) du = arcosh(u/a), with a = 3\n- = (1/√2)arcosh(u/3) + C = (1/√2)arcosh((x+3)/3) + C", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Using the substitution x+1 = √5 sin θ, find ∫ 1/√(4-2x-x²) dx. (3 steps)", "answer": "- Step 1: Complete the square: 4-2x-x² = 5-(x+1)²\n\n- Step 2: Let x+1 = √5 sin θ, then dx = √5 cos θ dθ, and √(5-5sin²θ) = √(5cos²θ) = √5 cos θ\n\n- Step 3: Integral becomes ∫ (√5 cos θ)/(√5 cos θ) dθ = ∫ dθ = θ + C = arcsin((x+1)/√5) + C", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Evaluate ∫ artanh x dx using integration by parts. What pattern emerges for integrating inverse functions? (3 steps)", "answer": "- Step 1: Write as ∫ artanh x × 1 dx, let u = artanh x, dv/dx = 1\n- Then du/dx = 1/(1-x²), v = x\n\n- Step 2: Using IBP: = x artanh x - ∫ x/(1-x²) dx\n\n- Step 3: The remaining integral uses ∫ f'(x)/f(x) dx pattern: = x artanh x + (1/2)ln|1-x²| + C\n\n- Pattern: To integrate inverse functions, treat them as the \"u\" in integration by parts with dv/dx = 1.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Evaluate ∫ arcsin x dx from x = -1/2 to x = √3/2 using integration by parts. (4 steps)", "answer": "- Step 1: Let u = arcsin x, dv/dx = 1, then du/dx = 1/√(1-x²), v = x\n\n- Step 2: ∫ arcsin x dx = x arcsin x - ∫ x/√(1-x²) dx\n\n- Step 3: For ∫ x/√(1-x²) dx, use substitution w = 1-x², giving = -(1/2)∫ w^(-1/2) dw = -√w = -√(1-x²)\n\n- Step 4: So ∫ arcsin x dx = x arcsin x + √(1-x²) + C\n- Evaluate from -1/2 to √3/2: = [x arcsin x + √(1-x²)] = (√3/2 × π/6 + 1/2) - (-1/2 × (-π/6) + √3/2) = (π√3/12 + 1/2) - (-π/12 + √3/2) = π(√3+1)/12 + (1-√3)/2 ≈ 0.279", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "What is a reduction formula in integration? Given In = ∫ xⁿ eˣ dx, derive the reduction formula. (3 steps)", "answer": "- Step 1: A reduction formula relates an integral involving a parameter n to an integral with n-1 (or n-2), making higher powers manageable.\n\n- Step 2: For In = ∫ xⁿeˣ dx, use integration by parts with u = xⁿ, dv/dx = eˣ\n- Then du/dx = nxⁿ⁻¹, v = eˣ\n\n- Step 3: In = xⁿeˣ - ∫ nxⁿ⁻¹eˣ dx = xⁿeˣ - nIn-₁\n\n- This reduces n by 1 each application, eventually reaching I₀ = ∫ eˣ dx = eˣ", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Using the reduction formula In = xⁿeˣ - nIn-₁, find ∫ x⁴eˣ dx. Show the repeated application. (4 steps)", "answer": "- Step 1: Let I₄ = ∫ x⁴eˣ dx = x⁴eˣ - 4I₃\n\n- Step 2: I₃ = x³eˣ - 3I₂, so I₄ = x⁴eˣ - 4[x³eˣ - 3I₂] = x⁴eˣ - 4x³eˣ + 12I₂\n\n- Step 3: I₂ = x²eˣ - 2I₁, so I₄ = x⁴eˣ - 4x³eˣ + 12[x²eˣ - 2I₁] = x⁴eˣ - 4x³eˣ + 12x²eˣ - 24I₁\n\n- Step 4: I₁ = ∫ xeˣ dx = xeˣ - ∫ eˣ dx = xeˣ - eˣ\n- So final: I₄ = eˣ(x⁴ - 4x³ + 12x² - 24x + 24) + C", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "For In = ∫₀¹ xⁿ√(1-x) dx, derive the reduction formula In = (2n)/(2n+3) In-₁. (4 steps)", "answer": "- Step 1: Use integration by parts with u = xⁿ, dv/dx = √(1-x)\n- Then du/dx = nxⁿ⁻¹, v = -(2/3)(1-x)^(3/2)\n\n- Step 2: In = [-2/3 xⁿ(1-x)^(3/2)]₀¹ + ∫₀¹ (2/3)nxⁿ⁻¹(1-x)^(3/2) dx\n\n- Step 3: At bounds x=0,1: both terms = 0 (for x=1, (1-x)^(3/2) = 0; for x=0, xⁿ = 0 for n≥1)\n\n- Step 4: Rewrite (1-x)^(3/2) = (1-x)√(1-x): = (2n/3)[∫ xⁿ⁻¹(1-x)√(1-x) dx] = (2n/3)[In-₁ - In]\n- So In + (2n/3)In = (2n/3)In-₁ → In(1 + 2n/3) = (2n/3)In-₁ → In = (2n)/(2n+3) × In-₁", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Using the reduction formula for sinⁿx, find ∫₀^(π/2) sin⁵x dx. (3 steps)", "answer": "- Step 1: For In = ∫₀^(π/2) sinⁿx dx, the reduction formula is nIn = (n-1)In-₂\n\n- Step 2: For odd n: In = [(n-1)/n] × [(n-3)/(n-2)] × ... × (2/3) × I₁, where I₁ = ∫₀^(π/2) sin x dx = 1\n\n- Step 3: For n = 5: I₅ = (4/5) × (2/3) × 1 = 8/15\n\n- For even n, use In = [(n-1)/n] × [(n-3)/(n-2)] × ... × (1/2) × (π/2)", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Derive the reduction formula for ∫ tanⁿx dx: In = (1/(n-1))tanⁿ⁻¹x - In-₂, for n ≥ 2. (3 steps)", "answer": "- Step 1: Write tanⁿx = tanⁿ⁻²x × tan²x = tanⁿ⁻²x × (sec²x - 1)\n\n- Step 2: In = ∫ tanⁿ⁻²x sec²x dx - ∫ tanⁿ⁻²x dx\n\n- Step 3: First integral: let u = tan x, du = sec²x dx → ∫ uⁿ⁻² du = uⁿ⁻¹/(n-1) = tanⁿ⁻¹x/(n-1)\n- Second integral is In-₂\n- Therefore: In = (1/(n-1))tanⁿ⁻¹x - In-₂", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Using the reduction formula for tanⁿx, evaluate ∫₀^(π/4) tan⁵x dx. (3 steps)", "answer": "- Step 1: Using In = (1/(n-1))tanⁿ⁻¹x - In-₂, with n = 5\n- I₅ = (1/4)tan⁴x - I₃\n\n- Step 2: For I₃ = (1/2)tan²x - I₁\n- For I₁ = ∫ tan x dx = -ln|cos x|\n\n- Step 3: Combine: I₅ = (1/4)tan⁴x - (1/2)tan²x + ln|cos x|\n- Evaluate from 0 to π/4: at π/4, tan = 1 → (1/4)(1) - (1/2)(1) + ln(1/√2) = 1/4 - 1/2 - (1/2)ln 2 = -1/4 - (1/2)ln 2\n- at 0: 0 - 0 + ln(1) = 0\n- So ∫₀^(π/4) tan⁵x dx = -1/4 - (1/2)ln 2", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "State the arc length formula for a curve y = f(x) from x = a to x = b. How is it derived? (2 steps)", "answer": "- Step 1: Arc length s = ∫ₐᵇ √(1 + (dy/dx)²) dx\n\n- Step 2: Derivation: For nearby points P(x,y) and Q(x+δx, y+δy), the chord length ≈ √(δx² + δy²). Dividing by δx and taking the limit as δx → 0: ds/dx = √(1 + (dy/dx)²). Integrating gives the arc length.\n\n- Also available: s = ∫ √(1 + (dx/dy)²) dy when integrating with respect to y, or s = ∫ √((dx/dt)² + (dy/dt)²) dt for parametric forms.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "Find the arc length of y = (1/2)x² from x = 0 to x = 4. What substitution is used? (4 steps)", "answer": "- Step 1: dy/dx = x, so 1 + (dy/dx)² = 1 + x²\n\n- Step 2: Arc length = ∫₀⁴ √(1+x²) dx\n\n- Step 3: Use substitution x = sinh u, then dx = cosh u du, √(1+x²) = cosh u\n- When x = 0, u = 0; when x = 4, u = arsinh 4 = ln(4 + √17)\n- Integral = ∫₀^(arsinh 4) cosh²u du = ∫₀^(arsinh 4) (1 + cosh 2u)/2 du\n\n- Step 4: = (1/2)[u + (1/2)sinh 2u]₀^(arsinh 4) = (1/2)arsinh 4 + (1/2)(4√17) = (1/2)ln(4+√17) + 2√17", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A curve is given parametrically by x = t + 1/t, y = 2 ln t, for t from 1 to 2. Find the arc length. (3 steps)", "answer": "- Step 1: Compute derivatives: dx/dt = 1 - 1/t², dy/dt = 2/t\n\n- Step 2: (dx/dt)² + (dy/dt)² = (1 - 1/t²)² + (2/t)² = 1 - 2/t² + 1/t⁴ + 4/t² = 1 + 2/t² + 1/t⁴ = (1 + 1/t²)²\n\n- Step 3: Arc length = ∫₁² √((1 + 1/t²)²) dt = ∫₁² (1 + 1/t²) dt = [t - 1/t]₁² = (2 - 1/2) - (1 - 1) = 3/2 = 1.5", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "State the formula for surface area when rotating a curve about the x-axis, both in Cartesian and parametric forms. (2 steps)", "answer": "- Step 1: About x-axis: S = 2π ∫ y ds = 2π ∫ₐᵇ y√(1 + (dy/dx)²) dx\n- Parametric: S = 2π ∫ₜ₁ᵗ² y √((dx/dt)² + (dy/dt)²) dt\n\n- Step 2: About y-axis: S = 2π ∫ x ds = 2π ∫ₐᵇ x√(1 + (dy/dx)²) dx (or integrate with respect to y if easier)", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "The curve y = (1/3)√x(3-x) from x = 1 to x = 3 is rotated about the x-axis. Find the surface area. (4 steps)", "answer": "- Step 1: y = x^(1/2) - (1/3)x^(3/2), so dy/dx = (1/2)x^(-1/2) - (1/2)x^(1/2) = (1/2)(x^(-1/2) - x^(1/2))\n\n- Step 2: 1 + (dy/dx)² = 1 + (1/4)(x^(-1) - 2 + x) = (1/4)(x^(-1) + 2 + x) = (1/4)(x^(-1/2) + x^(1/2))²\n\n- Step 3: √(1 + (dy/dx)²) = (1/2)(x^(-1/2) + x^(1/2))\n\n- Step 4: S = 2π ∫₁³ y √(1 + (dy/dx)²) dx = 2π ∫₁³ (x^(1/2) - (1/3)x^(3/2)) × (1/2)(x^(-1/2) + x^(1/2)) dx\n- = π ∫₁³ (1 + (2/3)x - (1/3)x²) dx = π[x + (1/3)x² - (1/9)x³]₁³ = π[(3 + 3 - 3) - (1 + 1/3 - 1/9)] = (16/9)π", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "The curve y = cosh x from (0,1) to (ln 2, 5/4) is rotated about the y-axis. Find the surface area. (3 steps)", "answer": "- Step 1: Using S = 2π ∫ x ds = 2π ∫₀^(ln 2) x √(1 + sinh²x) dx = 2π ∫₀^(ln 2) x cosh x dx\n\n- Step 2: Use integration by parts: let u = x, dv/dx = cosh x\n- Then du/dx = 1, v = sinh x\n- ∫ x cosh x dx = x sinh x - ∫ sinh x dx = x sinh x - cosh x\n\n- Step 3: Evaluate from 0 to ln 2: = [x sinh x - cosh x]₀^(ln 2)\n- At x = ln 2: sinh(ln 2) = (e^(ln 2) - e^(-ln 2))/2 = (2 - 1/2)/2 = 3/4; cosh(ln 2) = (2 + 1/2)/2 = 5/4\n- So = ln 2 × (3/4) - 5/4 - (0 - 1) = (3/4)ln 2 - 5/4 + 1 = (3/4)ln 2 - 1/4\n- Multiply by 2π: S = (π/2)(3 ln 2 - 1)", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Why does ∫ 1/(1+x²) dx give arctan x but ∫ x/(1+x²) dx gives (1/2)ln(1+x²)? They look similar. Explain the key distinction. (2 steps)", "answer": "- Step 1: The key is whether the numerator is the derivative of the denominator.\n- For ∫ 1/(1+x²) dx: denominator is 1+x², numerator is 1, which is NOT the derivative of 1+x² (which is 2x). So this doesn't fit the log pattern — it's a standard form giving arctan x.\n\n- Step 2: For ∫ x/(1+x²) dx: numerator x is exactly (1/2) times the derivative of (1+x²) (which is 2x). So this fits the ∫ f'(x)/f(x) dx pattern, giving (1/2)ln(1+x²).\n\n- Watch out: A denominator of 1+x² does NOT automatically imply arctan — you must check if the numerator is (proportional to) the derivative of what appears in the denominator.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": true}, {"question": "When completing the square for ∫ dx/(2x² + 4x + 11), what is the correct approach? Walk through. (3 steps)", "answer": "- Step 1: Factor out the coefficient of x²: 2x² + 4x + 11 = 2(x² + 2x + 11/2)\n\n- Step 2: Complete square inside: x² + 2x + 11/2 = (x+1)² + 11/2 - 1 = (x+1)² + 9/2\n\n- Step 3: So integral = ∫ 2 dx/[2((x+1)² + 9/2)] = (1/2)∫ dx/[(x+1)² + (3/√2)²]\n- Using ∫ 1/(a² + u²) du = (1/a)arctan(u/a) with a = 3/√2: = (1/2) × (√2/3) arctan(√2(x+1)/3) + C = (√2/6)arctan(√2(x+1)/3) + C", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Evaluate ∫ (x-2)/√(x²-4) dx by splitting into two integrals. What are they? (3 steps)", "answer": "- Step 1: Split: ∫ x/√(x²-4) dx - ∫ 2/√(x²-4) dx\n\n- Step 2: First integral: uses the form ∫ f'(x)/√f(x) with f(x) = x²-4, f'(x) = 2x\n- ∫ x/√(x²-4) dx = (1/2) ∫ 2x/√(x²-4) dx = (1/2) × 2√(x²-4) = √(x²-4)\n\n- Step 3: Second integral: matches result 15 with a = 2: ∫ 2/√(x²-4) dx = 2 arcosh(x/2) = 2 ln|x + √(x²-4)|\n- So overall: √(x²-4) - 2 arcosh(x/2) + C", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "For ∫ sech⁶x tanh x dx, identify the pattern and integrate. What is the general approach? (2 steps)", "answer": "- Step 1: This is of the form ∫ [f(x)]ⁿ f'(x) dx with f(x) = sech x, f'(x) = -sech x tanh x, and n = 5\n- Note: sech⁶x tanh x = -sech⁵x × (-sech x tanh x) = -sech⁵x × f'(x) with f(x) = sech x\n\n- Step 2: ∫ sech⁶x tanh x dx = ∫ -sech⁵x × (-sech x tanh x) dx = -(1/6)sech⁶x + C (using ∫ uⁿ du = uⁿ⁺¹/(n+1) with n = 5)\n\n- General approach: Look for the derivative of some function appearing as a factor — if found, use the power rule or log rule accordingly.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "Using the reduction formula for sinⁿx, find ∫₀^(π/2) sin⁶x dx. Show the pattern for even powers. (3 steps)", "answer": "- Step 1: For even n, In = [(n-1)/n] × [(n-3)/(n-2)] × ... × (1/2) × (π/2)\n\n- Step 2: For n = 6: I₆ = (5/6) × (3/4) × (1/2) × (π/2)\n\n- Step 3: Calculate: (5/6) × (3/4) = 15/24 = 5/8; (5/8) × (1/2) = 5/16; (5/16) × (π/2) = 5π/32\n\n- This can also be derived using the identity sin⁶x = (10 - 15 cos 2x + 6 cos 4x - cos 6x)/32", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "Find the length of the arc of y = (1/3)x^(3/2) from x = 0 to x = 12. (3 steps)", "answer": "- Step 1: y = (1/3)x^(3/2) = (1/3)x^(3/2), so dy/dx = (1/3) × (3/2)x^(1/2) = (1/2)x^(1/2)\n\n- Step 2: 1 + (dy/dx)² = 1 + (1/4)x = (4 + x)/4\n\n- Step 3: s = ∫₀¹² √((4+x)/4) dx = (1/2)∫₀¹² √(4+x) dx\n- Let u = 4+x, du = dx: = (1/2)∫₄¹⁶ u^(1/2) du = (1/2) × (2/3)[u^(3/2)]₄¹⁶ = (1/3)[16^(3/2) - 4^(3/2)] = (1/3)[64 - 8] = 56/3", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Evaluate ∫₀¹ x⁵√(1-x²) dx using the substitution x = sin θ. What reduction formula does this relate to? (3 steps)", "answer": "- Step 1: Let x = sin θ, dx = cos θ dθ, when x = 0, θ = 0; x = 1, θ = π/2\n- √(1-x²) = √(1-sin²θ) = cos θ\n\n- Step 2: Integral becomes ∫₀^(π/2) sin⁵θ × cos θ × cos θ dθ = ∫₀^(π/2) sin⁵θ cos²θ dθ\n\n- Step 3: This relates to the reduction formula for ∫ sinⁿx cosᵐx dx, or we can use sin²θ = 1-cos²θ to write as ∫ sin⁵θ(1-cos²θ) dθ = ∫ sin⁵θ dθ - ∫ sin⁵θ cos²θ dθ, and use the standard sinⁿ results.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "The region bounded by y = sinh x, x = 1, the x-axis is rotated about the x-axis. Find the volume. (3 steps)", "answer": "- Step 1: Volume using disc method: V = π ∫₀¹ y² dx = π ∫₀¹ sinh²x dx\n\n- Step 2: Use identity sinh²x = (cosh 2x - 1)/2: V = π ∫₀¹ (cosh 2x - 1)/2 dx = (π/2)[(1/2)sinh 2x - x]₀¹\n\n- Step 3: = (π/2)[(1/2)sinh 2 - 1] = (π/4)sinh 2 - (π/2)\n- Note: This can also be written as (π/8e²)(e⁴ - 4e² - 1)", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Explain why ∫ 1/√(1-x²) dx = arcsin x + C but ∫ x/√(1-x²) dx has a different form. What determines which standard result to use? (2 steps)", "answer": "- Step 1: In ∫ 1/√(1-x²) dx, the integrand is exactly the derivative of arcsin x (which is 1/√(1-x²)), so the result is directly arcsin x.\n\n- Step 2: In ∫ x/√(1-x²) dx, the numerator x is proportional to the derivative of the expression under the root (which is 1-x², derivative is -2x). This matches the pattern ∫ f'(x)/√f(x) dx = 2√f(x) + C, giving -√(1-x²) + C.\n\n- The determining factor: Check whether the numerator is (proportional to) the derivative of the \"inside\" function. If yes → power rule or log rule. If the integrand exactly matches the derivative of the inverse trig/hyperbolic function → use that form.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": true}, {"question": "For ∫ 1/(a² - x²) dx with |x| < a, derive the result using partial fractions. What is the connection to artanh? (3 steps)", "answer": "- Step 1: Using partial fractions: 1/(a²-x²) = (1/2a)[1/(a+x) + 1/(a-x)]\n- ∫ = (1/2a)[ln|a+x| - ln|a-x|] + C = (1/2a)ln|(a+x)/(a-x)| + C\n\n- Step 2: This is the logarithmic form of artanh(x/a), since artanh(u) = (1/2)ln((1+u)/(1-u))\n\n- Step 3: So ∫ 1/(a²-x²) dx = (1/a) artanh(x/a) + C for |x| < a, or equivalently (1/2a)ln|(a+x)/(a-x)| + C", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "When rotating y = x³ from x = 0 to x = 1 about the x-axis, find the surface area. (3 steps)", "answer": "- Step 1: y = x³, dy/dx = 3x², so 1 + (dy/dx)² = 1 + 9x⁴\n\n- Step 2: Surface area = 2π ∫₀¹ x³√(1 + 9x⁴) dx\n\n- Step 3: Use substitution u = 1 + 9x⁴, du = 36x³ dx, so x³ dx = du/36\n- = 2π ∫_{u=1}^{10} √u × (du/36) = (π/18) ∫₁¹⁰ u^(1/2) du = (π/18) × (2/3)[u^(3/2)]₁¹⁰ = (π/27)[10^(3/2) - 1] = (π/27)(10√10 - 1)", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "Evaluate ∫₀^(ln 2) tanh⁴x dx using the reduction formula for tanhⁿx. (4 steps)", "answer": "- Step 1: Reduction formula: In = ∫ tanhⁿx dx = In-₂ - (1/(n-1))tanhⁿ⁻¹x for n ≥ 2\n- For n = 4: I₄ = I₂ - (1/3)tanh³x\n\n- Step 2: For I₂ = ∫ tanh²x dx = ∫ (1 - sech²x) dx = x - tanh x\n\n- Step 3: So I₄ = x - tanh x - (1/3)tanh³x\n\n- Step 4: Evaluate from 0 to ln 2: At x = ln 2, tanh x = (e^x - e^(-x))/(e^x + e^(-x)) = (2 - 1/2)/(2 + 1/2) = (3/2)/(5/2) = 3/5\n- At x = 0: tanh 0 = 0\n- I₄ = [ln 2 - 3/5 - (1/3)(27/125)] - [0 - 0 - 0] = ln 2 - 3/5 - 9/125 = ln 2 - (75/125 + 9/125) = ln 2 - 84/125", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "What is the surface area when y = e^x from x = 0 to x = ln 2 is rotated about the x-axis? Show it equals π(arsinh 2 - arsinh 1 + 2√5 - √2). (3 steps)", "answer": "- Step 1: dy/dx = e^x, so 1 + (dy/dx)² = 1 + e^(2x)\n- S = 2π ∫₀^(ln 2) e^x √(1+e^(2x)) dx\n\n- Step 2: Let u = e^x, du = e^x dx, when x = 0, u = 1; x = ln 2, u = 2\n- S = 2π ∫₁² √(1+u²) du\n\n- Step 3: Using ∫ √(1+u²) du = (1/2)arsinh u + (1/2)u√(1+u²)\n- Evaluate from 1 to 2: = 2π × [(1/2)arsinh u + (1/2)u√(1+u²)]₁² = π[arsinh 2 + 2√5 - (arsinh 1 + 1√2)] = π(arsinh 2 - arsinh 1 + 2√5 - √2)", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "A curve is given by x = t², y = t - t³/3 from t = 0 to t = 1. Find the surface area when rotated about the x-axis. (3 steps)", "answer": "- Step 1: dx/dt = 2t, dy/dt = 1 - t²\n- (dx/dt)² + (dy/dt)² = 4t² + (1 - t²)² = 4t² + 1 - 2t² + t⁴ = 1 + 2t² + t⁴ = (1 + t²)²\n\n- Step 2: √((dx/dt)² + (dy/dt)²) = 1 + t²\n\n- Step 3: S = 2π ∫₀¹ y √((dx/dt)² + (dy/dt)²) dt = 2π ∫₀¹ (t - t³/3)(1 + t²) dt = 2π ∫₀¹ (t + t³ - t³/3 - t⁵/3) dt = 2π ∫₀¹ (t + (2/3)t³ - (1/3)t⁵) dt\n- = 2π[(1/2)t² + (2/3)(1/4)t⁴ - (1/3)(1/6)t⁶]₀¹ = 2π[1/2 + 1/6 - 1/18] = 2π[(9/18 + 3/18 - 1/18)] = 2π(11/18) = 11π/9", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "In deriving the reduction formula for ∫ xⁿe^(x/2) dx, what choice of u and dv/dx gives the formula In = 2xⁿe^(x/2) - 2nIn-₁? (2 steps)", "answer": "- Step 1: Let u = xⁿ, so that du/dx = nxⁿ⁻¹\n- Let dv/dx = e^(x/2), so v = 2e^(x/2) (since derivative of 2e^(x/2) is e^(x/2))\n\n- Step 2: Using IBP: ∫ u dv = uv - ∫ v du\n- In = 2xⁿe^(x/2) - ∫ 2e^(x/2) × nxⁿ⁻¹ dx = 2xⁿe^(x/2) - 2n ∫ xⁿ⁻¹e^(x/2) dx = 2xⁿe^(x/2) - 2nIn-₁", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "The integral ∫ x⁴√(1-x²) dx can be evaluated using x = sin θ. Explain how this transforms the integral and what reduction formula it relates to. (3 steps)", "answer": "- Step 1: Let x = sin θ, dx = cos θ dθ, √(1-x²) = cos θ\n- ∫ x⁴√(1-x²) dx = ∫ sin⁴θ × cos θ × cos θ dθ = ∫ sin⁴θ cos²θ dθ\n\n- Step 2: This relates to the reduction formula for ∫ sinⁿθ cosᵐθ dθ, or we can use sin²θ = 1-cos²θ to express in terms of powers of sin or cos alone.\n\n- Step 3: Write as ∫ sin⁴θ(1 - sin²θ) dθ = ∫ sin⁴θ dθ - ∫ sin⁶θ dθ, then apply the standard sinⁿ reduction formula from 0 to π/2 or evaluate indefinitely.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "For what type of integrals are hyperbolic substitutions generally preferred over trigonometric substitutions, and why? (2 steps)", "answer": "- Step 1: Hyperbolic substitutions are generally preferred when the result needs to be expressed in logarithmic form (as inverse hyperbolic functions) or when the resulting integral simplifies more elegantly.\n\n- Step 2: For example, ∫ 1/√(x²+a²) dx: using x = a sinh u gives arsinh(x/a) directly, while using x = a tan θ gives (a)∫ sec θ dθ which leads to ln|sec θ + tan θ| = ln|x/a + √(1+(x/a)²)|. Both are valid but arsinh is often cleaner. Also, hyperbolic substitutions avoid the domain restrictions of trigonometric substitutions (e.g., sin and cos are bounded).", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}], "count": 49}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Write down the standard integrals for: (a) ∫sinh x dx, (b) ∫cosh x dx, (c) ∫tanh x dx, (d) ∫sech²x dx, and explain why each derivative relationship holds. (4 facts)", "answer": "- Step 1: For ∫sinh x dx = cosh x + C, this is the reverse of differentiation since d/dx(cosh x) = sinh x.\n- Step 2: For ∫cosh x dx = sinh x + C, this reverses d/dx(sinh x) = cosh x.\n- Step 3: For ∫tanh x dx = ln|cosh x| + C, we use ∫sinh x/cosh x dx = ∫f'(x)/f(x) dx = ln|f(x)|, with f(x) = cosh x.\n+ For ∫sech²x dx = tanh x + C, this reverses d/dx(tanh x) = sech²x.\n\nThese four are fundamental hyperbolic integrals that you should memorise as they appear frequently in FP3.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Given that d/dx(coth x) = -cosech²x, write down the standard integral for ∫cosech²x dx. Then derive the integrals for ∫sech x tanh x dx and ∫cosech x coth x dx. (3-step)", "answer": "- Step 1: Since d/dx(coth x) = -cosech²x, then ∫cosech²x dx = -coth x + C.\n- Step 2: Since d/dx(sech x) = -sech x tanh x, then ∫sech x tanh x dx = -sech x + C.\n- Step 3: Since d/dx(cosech x) = -cosech x coth x, then ∫cosech x coth x dx = -cosech x + C.\n\nThese three results follow directly from differentiating the respective hyperbolic functions. The negative signs appear because each derivative produces a negative.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Without referring to the formula booklet, state the four standard inverse trigonometric/hyperbolic integrals: ∫1/√(1-x²) dx, ∫1/(1+x²) dx, ∫1/√(1+x²) dx, and ∫1/√(x²-1) dx. For each one, name the inverse function whose derivative gives the integrand. (4 facts)", "answer": "- Step 1: ∫1/√(1-x²) dx = arcsin x + C, since d/dx(arcsin x) = 1/√(1-x²).\n- Step 2: ∫1/(1+x²) dx = arctan x + C, since d/dx(arctan x) = 1/(1+x²).\n- Step 3: ∫1/√(1+x²) dx = arsinh x + C, since d/dx(arsinh x) = 1/√(1+x²).\n- Step 4: ∫1/√(x²-1) dx = arcosh x + C (x > 1), since d/dx(arcosh x) = 1/√(x²-1).\n\nThese four are essential building blocks for more complex integrals involving quadratic expressions.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "Generalise the result ∫1/(a²+x²) dx and explain how to derive it from ∫1/(1+x²) dx. (2 steps)", "answer": "- Step 1: Using the substitution x = a tan θ (or by inspection), we get ∫1/(a²+x²) dx = (1/a) arctan(x/a) + C.\n- Step 2: This comes from scaling: let u = x/a, then dx = a du, giving ∫1/(a² + a²u²) · a du = (1/a) ∫1/(1+u²) du = (1/a) arctan(u) + C = (1/a) arctan(x/a) + C.\n\nThe factor 1/a appears because when we scale x, we must account for the change in the differential.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "For integrals of the form ∫f'(x)[f(x)]^n dx, what is the general result? Apply it to find ∫sinh x cosh⁵x dx. (2 steps)", "answer": "- Step 1: The general result is ∫f'(x)[f(x)]^n dx = [f(x)]^(n+1)/(n+1) + C, provided n ≠ -1. This is the reverse of the chain rule.\n- Step 2: For ∫sinh x cosh⁵x dx, recognise that d/dx(cosh x) = sinh x, so f(x) = cosh x, f'(x) = sinh x, n = 5.\n+ Therefore, ∫sinh x cosh⁵x dx = cosh⁶x/6 + C.\n\nThis method works whenever you see a function multiplied by its derivative raised to a power.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "How do you integrate ∫tanh x dx? Show the steps and explain why the result is ln(cosh x) rather than ln|cosh x|. (2 steps)", "answer": "- Step 1: Write tanh x = sinh x/cosh x, so ∫tanh x dx = ∫sinh x/cosh x dx.\n- Step 2: This is of the form ∫f'(x)/f(x) dx with f(x) = cosh x, giving ln|f(x)| + C = ln|cosh x| + C.\n+ However, cosh x > 0 for all real x (cosh x = (eˣ + e⁻ˣ)/2 ≥ 1), so the absolute value is unnecessary.\n+ Therefore, ∫tanh x dx = ln(cosh x) + C.\n\nThis is one of the few cases where we can drop the absolute value because the argument is always positive.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": true}, {"question": "By using the identity tanh²x + sech²x = 1, find ∫tanh²x dx. Then use the identity cosh 2x = 2cosh²x - 1 to find ∫cosh²3x dx. (2 separate integrals)", "answer": "- Step 1: Since tanh²x = 1 - sech²x, ∫tanh²x dx = ∫(1 - sech²x) dx = x - tanh x + C.\n- Step 2: For ∫cosh²3x dx, use cosh²A = (1 + cosh 2A)/2 with A = 3x:\n+ cosh²3x = (1 + cosh 6x)/2\n+ ∫cosh²3x dx = ∫(1 + cosh 6x)/2 dx = x/2 + (1/12)sinh 6x + C.\n\nThese techniques of using hyperbolic identities parallel those used for trigonometric integrals.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Explain how to integrate ∫sech x dx. What substitution is used and why does it work? (3 steps)", "answer": "- Step 1: Write sech x = 2/(eˣ + e⁻ˣ). Multiply numerator and denominator by eˣ to get sech x = 2eˣ/(e²ˣ + 1).\n- Step 2: Let u = eˣ, then du/dx = eˣ, so du = eˣ dx. The integral becomes ∫2/(u² + 1) du.\n- Step 3: This is now a standard form: = 2 arctan u + C = 2 arctan(eˣ) + C.\n\nThe key insight is to use the exponential definition of hyperbolic functions to transform the integral into a rational function that we can integrate using arctan.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "For integrals involving √(a² - x²), what trigonometric substitution should you try, and why does it simplify the expression? What identity is used? (2 steps)", "answer": "- Step 1: Use the substitution x = a sin θ (or x = a cos θ). This transforms √(a² - x²) into √(a² - a²sin²θ) = √(a²cos²θ) = a|cos θ|.\n- Step 2: The identity used is 1 - sin²θ = cos²θ (or 1 - cos²θ = sin²θ for the cos substitution).\n+ With x = a sin θ, dx = a cos θ dθ, simplifying many integrals involving √(a² - x²).\n\nThis substitution exploits the Pythagorean identity to eliminate the square root.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "For integrals involving √(a² + x²), should you use a trigonometric or hyperbolic substitution? Explain why the hyperbolic substitution x = a sinh u is often preferred, and state what identity simplifies the radical. (2 steps)", "answer": "- Step 1: Use x = a sinh u (hyperbolic) or x = a tan θ (trigonometric). The hyperbolic substitution is often preferred because 1 + sinh²u = cosh²u.\n- Step 2: The identity is 1 + sinh²u = cosh²u, giving √(a² + a²sinh²u) = a cosh u (always positive).\n+ With x = a sinh u, dx = a cosh u du, which cancels neatly with the cosh in the numerator.\n\nThis is cleaner than the trigonometric approach because cosh u is always positive, avoiding absolute value considerations.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "For integrals involving √(x² - a²), what substitution is appropriate? Write down the resulting simplified radical and the identity used. (2 steps)", "answer": "- Step 1: Use x = a cosh u (for x > a) or x = a sec θ (for trigonometric approach).\n- Step 2: Using x = a cosh u: √(x² - a²) = √(a²cosh²u - a²) = √(a²sinh²u) = a|sinh u| = a sinh u (since we take u ≥ 0 for x ≥ a).\n+ The identity used is cosh²u - sinh²u = 1.\n\nThis is the natural counterpart to the √(a² + x²) case, using the other branch of the hyperbolic identity.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Using the substitution x = a tan θ, derive the formula ∫1/(a² + x²) dx = (1/a) arctan(x/a) + C. Show all steps. (4 steps)", "answer": "- Step 1: Let x = a tan θ, so dx/dθ = a sec²θ, meaning dx = a sec²θ dθ.\n- Step 2: Substitute: ∫1/(a² + x²) dx = ∫1/(a² + a²tan²θ) · a sec²θ dθ = ∫a sec²θ/(a²sec²θ) dθ.\n- Step 3: This simplifies to ∫1 dθ = θ + C.\n- Step 4: Since tan θ = x/a, then θ = arctan(x/a), giving the result (1/a) arctan(x/a) + C.\n\nThe key is recognizing that 1 + tan²θ = sec²θ, which cancels nicely with the sec²θ from dx.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Find ∫1/√(x² - 4) dx using the substitution x = 2 cosh u. Show the complete working. (4 steps)", "answer": "- Step 1: Let x = 2 cosh u, so dx/du = 2 sinh u, giving dx = 2 sinh u du.\n- Step 2: Substituting: √(x² - 4) = √(4cosh²u - 4) = √(4sinh²u) = 2 sinh u.\n- Step 3: The integral becomes ∫1/(2 sinh u) · 2 sinh u du = ∫1 du = u + C.\n- Step 4: Since x/2 = cosh u, u = arcosh(x/2), so ∫1/√(x² - 4) dx = arcosh(x/2) + C.\n\nThis demonstrates how the hyperbolic substitution converts the radical into a simple form.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "How do you integrate expressions of the form ∫1/(px² + qx + r) dx when the quadratic doesn't factor? Describe the method and apply it to find ∫1/(x² + 4x + 5) dx. (3 steps)", "answer": "- Step 1: Complete the square on the quadratic: x² + 4x + 5 = (x + 2)² + 1.\n- Step 2: Let u = x + 2, so du = dx. The integral becomes ∫1/(u² + 1) du = arctan u + C.\n- Step 3: Substituting back: = arctan(x + 2) + C.\n\nThis method reduces any quadratic in the denominator to one of the standard forms.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Find ∫1/√(x² + 4x + 5) dx by completing the square and using an appropriate substitution. What is the final answer? (3 steps)", "answer": "- Step 1: Complete the square: x² + 4x + 5 = (x + 2)² + 1.\n- Step 2: Use the substitution x + 2 = sinh u (or simply use the standard form for √(a² + x²)):\n+ ∫1/√((x+2)² + 1) dx = arsinh(x + 2) + C.\n- Step 3: Alternatively, using x + 2 = tan θ gives arctan(x + 2) + C, but the hyperbolic form is simpler.\n\nThe result is arsinh(x + 2) + C, or equivalently ln|x + 2 + √((x+2)² + 1)| + C.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Evaluate ∫1/(x² - 4x + 3) dx. What method do you use and why? Find the exact answer. (3 steps)", "answer": "- Step 1: First complete the square: x² - 4x + 3 = (x - 2)² - 1.\n- Step 2: This is of the form u² - a², which suggests partial fractions or the logarithmic form ∫1/(u² - a²) du = (1/2a)ln|(u-a)/(u+a)| + C.\n- Step 3: With u = x - 2, a = 1: = (1/2)ln|(x-3)/(x-1)| + C.\n\nSince the quadratic factors as (x-1)(x-3), partial fractions would also work, giving the same result.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Using integration by parts, derive the formula for ∫arcsin x dx. What are the choices for u and dv, and what is the final result? (4 steps)", "answer": "- Step 1: Write ∫arcsin x dx = ∫arcsin x · 1 dx. Use integration by parts with u = arcsin x, dv/dx = 1.\n- Step 2: Then du/dx = 1/√(1-x²), and v = x.\n- Step 3: ∫arcsin x dx = x arcsin x - ∫x/√(1-x²) dx.\n- Step 4: The remaining integral uses the substitution w = 1 - x², giving x arcsin x + √(1-x²) + C.\n\nThis is a standard technique for integrating inverse functions — treat the inverse function as u and 1 as dv/dx.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Find ∫artanh x dx using integration by parts. Show that the result can be written as x artanh x + (1/2)ln|1-x²| + C. (4 steps)", "answer": "- Step 1: Write ∫artanh x dx = ∫artanh x · 1 dx. Let u = artanh x, dv/dx = 1.\n- Step 2: Then du/dx = 1/(1-x²), and v = x.\n- Step 3: ∫artanh x dx = x artanh x - ∫x/(1-x²) dx.\n- Step 4: The integral ∫x/(1-x²) dx = -(1/2)ln|1-x²| + C, giving x artanh x + (1/2)ln|1-x²| + C.\n\nNote that artanh x can be written as (1/2)ln((1+x)/(1-x)), so the answer can be expressed in logarithmic form.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Explain what a reduction formula is in the context of integration. Why are reduction formulas useful, and give an example of the type of integral for which they are needed. (3 steps)", "answer": "- Step 1: A reduction formula relates an integral involving a parameter n to a similar integral with a lower value of that parameter.\n- Step 2: They are useful when integrating powers of functions (like sinⁿx, xⁿeˣ) where repeated integration by parts would become increasingly tedious.\n- Step 3: For example, to find ∫x⁴eˣ dx, you could apply integration by parts four times. A reduction formula would relate I₄ to I₃, I₃ to I₂, etc., making the process systematic.\n\nThe key idea is to reduce a complex-looking integral into simpler ones by repeatedly lowering the power.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Given Iₙ = ∫xⁿeˣ dx, derive the reduction formula Iₙ = xⁿeˣ - nIₙ₋₁. Then use it to find ∫x³eˣ dx. (4 steps)", "answer": "- Step 1: Use integration by parts with u = xⁿ, dv/dx = eˣ. Then du/dx = nxⁿ⁻¹, v = eˣ.\n- Step 2: Iₙ = ∫xⁿeˣ dx = xⁿeˣ - ∫nxⁿ⁻¹eˣ dx = xⁿeˣ - nIₙ₋₁.\n- Step 3: Apply the formula repeatedly:\n+ I₃ = x³eˣ - 3I₂\n+ I₂ = x²eˣ - 2I₁\n+ I₁ = xeˣ - I₀, where I₀ = ∫eˣ dx = eˣ\n- Step 4: Substituting back: I₃ = x³eˣ - 3[x²eˣ - 2(xeˣ - eˣ)] = x³eˣ - 3x²eˣ + 6xeˣ - 6eˣ + C.\n\nThis demonstrates how reduction formulas systematically break down complex integrals.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "The integral Iₙ = ∫sinⁿx dx for n ≥ 2 satisfies a reduction formula. Derive it using integration by parts, and state the final formula. (4 steps)", "answer": "- Step 1: Write sinⁿx = sinⁿ⁻¹x · sin x, and use integration by parts with u = sinⁿ⁻¹x, dv/dx = sin x.\n- Step 2: Then du/dx = (n-1)sinⁿ⁻²x cos x, and v = -cos x.\n- Step 3: Iₙ = ∫sinⁿx dx = [-sinⁿ⁻¹x cos x]₀^π/₂ + ∫(n-1)sinⁿ⁻²x cos²x dx.\n- Step 4: The boundary term is zero, and using cos²x = 1 - sin²x:\n+ Iₙ = (n-1)∫sinⁿ⁻²x dx - (n-1)∫sinⁿx dx = (n-1)Iₙ₋₂ - (n-1)Iₙ\n+ Therefore, nIₙ = (n-1)Iₙ₋₂, so Iₙ = ((n-1)/n)Iₙ₋₂.\n\nThis reduction formula reduces the power by 2 each time, eventually reaching I₀ or I₁.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Using the reduction formula for ∫sinⁿx dx, evaluate ∫₀^π/₂ sin⁵x dx. Show all steps. (3 steps)", "answer": "- Step 1: The reduction formula nIₙ = (n-1)Iₙ₋₂ gives Iₙ = ((n-1)/n)Iₙ₋₂ for definite integrals from 0 to π/2.\n- Step 2: For n = 5: I₅ = (4/5)I₃\n+ I₃ = (2/3)I₁\n+ I₁ = ∫₀^π/₂ sin x dx = 1\n- Step 3: Therefore, I₅ = (4/5) × (2/3) × 1 = 8/15.\n\nThe pattern for odd powers is Iₙ = (n-1)/n × (n-3)/(n-2) × ... × 2/3 × 1.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Evaluate ∫₀^π/₂ sin⁶x dx using the reduction formula. What is the final answer in terms of π? (3 steps)", "answer": "- Step 1: For even n, we reduce to I₀ = ∫₀^π/₂ 1 dx = π/2.\n- Step 2: Using nIₙ = (n-1)Iₙ₋₂:\n+ I₆ = (5/6)I₄\n+ I₄ = (3/4)I₂\n+ I₂ = (1/2)I₀ = (1/2)(π/2) = π/4\n- Step 3: Therefore, I₆ = (5/6) × (3/4) × π/4 = (5π)/32.\n\nFor even powers, the product includes a factor of π/2 at the end.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "For Iₙ = ∫tanⁿx dx, derive the reduction formula Iₙ = (1/(n-1))tanⁿ⁻¹x - Iₙ₋₂ for n ≥ 2. (3 steps)", "answer": "- Step 1: Write tanⁿx = tanⁿ⁻²x · tan²x = tanⁿ⁻²x(sec²x - 1).\n- Step 2: Then Iₙ = ∫tanⁿ⁻²x sec²x dx - ∫tanⁿ⁻²x dx.\n- Step 3: The first integral uses ∫f'(x)[f(x)]ⁿdx with f(x) = tan x, giving tanⁿ⁻¹x/(n-1).\n+ Therefore, Iₙ = tanⁿ⁻¹x/(n-1) - Iₙ₋₂.\n\nThis is an example of a reduction formula derived without explicit integration by parts.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Using the reduction formula for tanⁿx, find ∫tan⁴x dx. (3 steps)", "answer": "- Step 1: From the formula Iₙ = tanⁿ⁻¹x/(n-1) - Iₙ₋₂:\n+ I₄ = tan³x/3 - I₂\n- Step 2: Now find I₂ = ∫tan²x dx = ∫(sec²x - 1) dx = tan x - x + C.\n- Step 3: Therefore, I₄ = (tan³x)/3 - tan x + x + C.\n\nThe constant of integration is absorbed in the final answer.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "State the formula for the arc length of a curve y = f(x) between x = a and x = b. Explain how this formula is derived from the geometry of a small line segment. (3 steps)", "answer": "- Step 1: The arc length formula is s = ∫ₐᵇ√(1 + (dy/dx)²) dx.\n- Step 2: Consider a small segment PQ where P = (x, y) and Q = (x + δx, y + δy). The chord length is √(δx² + δy²).\n- Step 3: Dividing by δx and taking the limit as δx → 0: ds/dx = √(1 + (dy/dx)²). Integrating gives the total arc length.\n\nThis is derived from the Pythagorean theorem applied to an infinitesimal element of the curve.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A curve is given parametrically by x = f(t), y = g(t). Write down the formula for arc length between t = t₁ and t = t₂. Explain each component. (2 steps)", "answer": "- Step 1: The formula is s = ∫ₜ₁ᵗ₂√((dx/dt)² + (dy/dt)²) dt.\n- Step 2: This comes from ds/dt = √((dx/dt)² + (dy/dt)²), which is the magnitude of the velocity vector in the t-parameter.\n+ When t = x (i.e., y as a function of x), this reduces to the standard form with dy/dx.\n\nThis parametric form is essential when the curve is not conveniently expressed as y = f(x).", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Find the arc length of the parabola y = x² from x = 0 to x = 1. Show the integration and simplify. (4 steps)", "answer": "- Step 1: dy/dx = 2x, so (dy/dx)² = 4x².\n- Step 2: Arc length = ∫₀¹√(1 + 4x²) dx.\n- Step 3: Use the substitution x = (1/2)sinh u, dx = (1/2)cosh u du:\n+ √(1 + 4x²) = √(1 + sinh²u) = cosh u\n+ The integral becomes ∫cosh²u · (1/2) du = (1/2)∫(1 + cosh 2u)/2 du\n- Step 4: Evaluating from x = 0 (u = 0) to x = 1 (sinh u = 2, u = arsinh 2):\n+ s = (1/2)[u + (1/2)sinh 2u]₀^arsinh 2 = (1/2)arsinh 2 + (1/4)(2sinh u cosh u)\n+ = (1/2)arsinh 2 + (1/2)sinh u cosh u = (1/2)arsinh 2 + (1/2)(2)(√5) = (1/2)arsinh 2 + √5.\n\nThe exact form is (1/2)ln(2 + √5) + √5.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Write down the formula for the surface area generated when a curve is rotated about the x-axis. If the curve is given by y = f(x) from x = a to b, what is the formula? (2 steps)", "answer": "- Step 1: The surface area S = ∫₂πy ds = ∫₂πy√(1 + (dy/dx)²) dx from x = a to b.\n- Step 2: This comes from considering a small element of the curve generating a frustum of a cone when rotated.\n\nThe factor 2πy is the circumference of the circular path traced by the element, and ds is the element of arc length.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "When rotating a curve about the y-axis instead of the x-axis, what is the formula for surface area? If the curve is given parametrically, what is the general formula? (2 steps)", "answer": "- Step 1: For rotation about the y-axis: S = ∫₂πx ds = ∫₂πx√(1 + (dy/dx)²) dx (with x as function of y, or alternatively expressed in terms of x).\n- Step 2: For parametric form x = f(t), y = g(t), rotation about x-axis gives S = ∫₂πy√((dx/dt)² + (dy/dt)²) dt.\n+ Rotation about y-axis gives S = ∫₂πx√((dx/dt)² + (dy/dt)²) dt.\n\nThe key is to multiply 2π times the distance from the axis of rotation times the element of arc length.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "The curve y = √x from x = 0 to 1 is rotated about the x-axis. Find the surface area generated. (4 steps)", "answer": "- Step 1: y = √x = x^(1/2), so dy/dx = (1/2)x^(-1/2) = 1/(2√x).\n- Step 2: (dy/dx)² = 1/(4x), so 1 + (dy/dx)² = 1 + 1/(4x) = (4x + 1)/(4x).\n- Step 3: Surface area = ∫₀¹ 2πy√(1 + (dy/dx)²) dx = 2π∫₀¹ √x · √((4x+1)/(4x)) dx = 2π∫₀¹ √(x + 1/4) dx.\n- Step 4: = 2π[ (2/3)(x + 1/4)^(3/2) ]₀¹ = (2π)(2/3)[(5/4)^(3/2) - (1/4)^(3/2)] = (4π/3)[(5√5/8) - (1/8)] = (4π/3)( (5√5 - 1)/8 ) = π(5√5 - 1)/6.\n\nThis simplifies to π(5√5 - 1)/6.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A curve is given parametrically by x = t - sin t, y = 1 - cos t (a cycloid from t = 0 to 2π). This curve is rotated about the x-axis. Find the surface area. (4 steps)", "answer": "- Step 1: dx/dt = 1 - cos t, dy/dt = sin t.\n- Step 2: (dx/dt)² + (dy/dt)² = (1 - cos t)² + sin²t = 1 - 2cos t + cos²t + sin²t = 2 - 2cos t = 4sin²(t/2).\n- Step 3: √((dx/dt)² + (dy/dt)²) = 2|sin(t/2)| = 2 sin(t/2) for t ∈ [0, 2π].\n- Step 4: Surface area = ∫₀^2π 2πy · 2 sin(t/2) dt = 4π ∫₀^2π (1 - cos t) sin(t/2) dt.\n+ Using trig identities and evaluating gives 64π/3.\n\nThis is a classic result — the surface area of a cycloid rotated about its base.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "What is the key insight for integrating expressions like ∫x/√(x² + 1) dx? How do you recognise this pattern? (2 steps)", "answer": "- Step 1: This is of the form ∫f'(x)/√(f(x)) dx or ∫f'(x)[f(x)]^n dx with n = -1/2.\n- Step 2: Recognise it by seeing x in the numerator and a function of x under the square root. The derivative of the inside function (x² + 1) is 2x, which is proportional to the numerator.\n+ The answer is simply √(x² + 1) + C.\n\nThe general pattern is: if you see (derivative of something) times (that something to a power), you can integrate directly.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "Without using trigonometric substitution, evaluate ∫(2x + 1)/√(x² + 4) dx. Explain your method. (3 steps)", "answer": "- Step 1: Split the integral: ∫2x/√(x²+4) dx + ∫1/√(x²+4) dx.\n- Step 2: The first term: Let u = x² + 4, du = 2x dx, giving ∫du/√u = 2√u = 2√(x²+4).\n- Step 3: The second term is the standard form ∫1/√(x²+4) dx = arsinh(x/2) or ln|x + √(x²+4)|.\n+ Total: 2√(x²+4) + arsinh(x/2) + C.\n\nThis \"split and recognise\" method is often quicker than substitution for sums of recognisable patterns.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "Using the substitution u = eˣ, find ∫1/(sinh x + cosh x) dx. What is the result? (3 steps)", "answer": "- Step 1: sinh x + cosh x = (eˣ - e⁻ˣ)/2 + (eˣ + e⁻ˣ)/2 = eˣ.\n- Step 2: With u = eˣ, du = eˣ dx = u dx, so dx = du/u.\n- Step 3: ∫1/(sinh x + cosh x) dx = ∫1/u · (du/u) = ∫u^(-2) du = -1/u + C = -e^(-x) + C.\n\nSince eˣ > 0, we can also write this as -e^(-x) + C.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Find ∫cosh⁴x dx using hyperbolic identities. (3 steps)", "answer": "- Step 1: Use the identity cosh²x = (cosh 2x + 1)/2, applied twice:\n+ cosh⁴x = (cosh²x)² = ((cosh 2x + 1)/2)² = (cosh² 2x + 2cosh 2x + 1)/4.\n- Step 2: Now use cosh² 2x = (cosh 4x + 1)/2:\n+ cosh⁴x = ((cosh 4x + 1)/2 + 2cosh 2x + 1)/4 = (cosh 4x + 1 + 4cosh 2x + 2)/4 = (cosh 4x + 4cosh 2x + 3)/4.\n- Step 3: Integrate term by term: ∫cosh⁴x dx = (1/4)(∫cosh 4x dx + 4∫cosh 2x dx + 3∫dx) = (1/4)(sinh 4x/4 + 4sinh 2x/2 + 3x) + C = sinh 4x/16 + sinh 2x/2 + 3x/4 + C.\n\nThis method systematically reduces powers of hyperbolic functions.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "Evaluate the definite integral ∫₀¹ 1/√(1 - x²) dx. What is the result and what does it represent geometrically? (2 steps)", "answer": "- Step 1: ∫₀¹ 1/√(1 - x²) dx = [arcsin x]₀¹ = arcsin(1) - arcsin(0) = π/2 - 0 = π/2.\n- Step 2: Geometrically, this represents the area under the curve y = 1/√(1 - x²) from 0 to 1, which is a quarter of the unit circle (the first quadrant).\n+ This is consistent with the fact that ∫₋₁¹ √(1 - x²) dx = π/2 (area of quarter circle).\n\nThis is the standard result that connects arcsin to the geometry of the circle.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Using the result ∫1/(1+x²) dx = arctan x, evaluate ∫₀^∞ 1/(1+x²) dx. What does this tell you? (2 steps)", "answer": "- Step 1: ∫₀^∞ 1/(1+x²) dx = [arctan x]₀^∞ = π/2 - 0 = π/2.\n- Step 2: This is a convergent improper integral — the area under the curve approaches π/2 as x → ∞.\n+ The function 1/(1+x²) decays as 1/x², which is fast enough for convergence.\n\nThis is a fundamental result showing that the area under the reciprocal of a quadratic can be finite even over an infinite interval.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "Find ∫x²/(x²+1) dx by splitting into simpler integrals. What is the result? (3 steps)", "answer": "- Step 1: Note that x²/(x²+1) = 1 - 1/(x²+1).\n- Step 2: Therefore, ∫x²/(x²+1) dx = ∫1 dx - ∫1/(x²+1) dx = x - arctan x + C.\n- Step 3: This technique of algebraic manipulation before integrating is essential for many rational functions.\n\nThis simple trick of subtracting and adding 1 converts an awkward fraction into integrable pieces.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "Derive the reduction formula for Iₙ = ∫xⁿ√(1-x) dx from 0 to 1. Show that Iₙ = (2n/(2n+3))Iₙ₋₁. (4 steps)", "answer": "- Step 1: Use integration by parts with u = xⁿ, dv/dx = √(1-x).\n- Step 2: Then du/dx = nxⁿ⁻¹, v = -(2/3)(1-x)^(3/2).\n- Step 3: Iₙ = [-(2/3)xⁿ(1-x)^(3/2)]₀¹ + ∫₀¹ (2/3)nxⁿ⁻¹(1-x)^(3/2) dx.\n+ The boundary term is 0 (at x = 1, (1-x)^(3/2) = 0; at x = 0, xⁿ = 0 for n ≥ 1).\n- Step 4: The integral becomes (2n/3)∫xⁿ⁻¹(1-x)^(3/2) dx = (2n/3)[∫xⁿ⁻¹(1-x)^(1/2) dx - ∫xⁿ(1-x)^(1/2) dx]\n+ This gives Iₙ = (2n/3)Iₙ₋₁ - (2n/3)Iₙ\n+ Solving: Iₙ(1 + 2n/3) = (2n/3)Iₙ₋₁, so Iₙ = (2n/(2n+3))Iₙ₋₁.\n\nThis reduction formula allows evaluation of integrals involving fractional powers.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "Using the reduction formula Iₙ = (2n/(2n+3))Iₙ₋₁ for ∫₀¹ xⁿ√(1-x) dx, evaluate ∫₀¹ x³√(1-x) dx. (3 steps)", "answer": "- Step 1: We need I₃, which requires I₂, I₁, and I₀.\n- Step 2: I₀ = ∫₀¹ √(1-x) dx = [-2/3(1-x)^(3/2)]₀¹ = 2/3.\n+ I₁ = (2/(2+3))I₀ = (2/5)(2/3) = 4/15\n+ I₂ = (4/(4+3))I₁ = (4/7)(4/15) = 16/105\n+ I₃ = (6/(6+3))I₂ = (6/9)(16/105) = (2/3)(16/105) = 32/315\n- Step 3: Therefore, ∫₀¹ x³√(1-x) dx = 32/315.\n\nThis demonstrates how reduction formulas systematically build the answer from known values.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "What substitution would you use to evaluate ∫√(a² - x²) dx? Derive the result. (4 steps)", "answer": "- Step 1: Use x = a sin θ (or x = a cos θ). Let x = a sin θ.\n- Step 2: Then dx = a cos θ dθ, and √(a² - x²) = √(a² - a²sin²θ) = a cos θ.\n- Step 3: ∫√(a² - x²) dx = ∫a cos θ · a cos θ dθ = a²∫cos²θ dθ = a²∫(1 + cos 2θ)/2 dθ.\n- Step 4: = a²[θ/2 + sin 2θ/4] + C = (a²/2)θ + (a²/2)sin θ cos θ + C = (a²/2)arcsin(x/a) + (x/2)√(a² - x²) + C.\n\nThis is the standard formula for the area under a semicircle, which when rotated gives the volume of a sphere.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "The ellipse x²/a² + y²/b² = 1 is rotated about the x-axis. Using the method of slicing, derive the formula for its volume. What is the final result? (3 steps)", "answer": "- Step 1: At a given x, the cross-section is a circle with radius y = b√(1 - x²/a²).\n- Step 2: The area of this cross-section is πy² = πb²(1 - x²/a²).\n- Step 3: Volume = ∫₋ₐᵃ πb²(1 - x²/a²) dx = πb²[x - x³/(3a²)]₋ₐᵃ = πb²[2a - 2a³/(3a²)] = πb²(2a - 2a/3) = (4/3)πab².\n\nThis is the well-known formula for the volume of an ellipsoid: V = (4/3)πab² (prolate spheroid when a > b).", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "When integrating hyperbolic functions with exponential methods, what is the key idea? Apply it to find ∫eˣsinh x dx. (3 steps)", "answer": "- Step 1: Use the definitions: sinh x = (eˣ - e⁻ˣ)/2, cosh x = (eˣ + e⁻ˣ)/2.\n- Step 2: ∫eˣsinh x dx = ∫eˣ · (eˣ - e⁻ˣ)/2 dx = ∫(e²ˣ - 1)/2 dx = (1/2)∫e²ˣ dx - (1/2)∫1 dx.\n- Step 3: = (1/2)(e²ˣ/2) - x/2 + C = e²ˣ/4 - x/2 + C.\n\nAlternatively, this could be done by parts, but the exponential method is usually faster.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "Find ∫sech⁴x dx. What technique do you use? (3 steps)", "answer": "- Step 1: Use the identity sech²x = 1 - tanh²x, so sech⁴x = sech²x · sech²x = sech²x(1 - tanh²x).\n- Step 2: Let u = tanh x, then du = sech²x dx.\n- Step 3: ∫sech⁴x dx = ∫(1 - u²) du = u - u³/3 + C = tanh x - tanh³x/3 + C.\n\nThis uses the same technique as for tanⁿx, leveraging the derivative relationship between tanh and sech.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "Evaluate the integral ∫₀¹ x⁵√(1-x²) dx using a trigonometric substitution. Show the complete method. (4 steps)", "answer": "- Step 1: Use x = sin θ, so dx = cos θ dθ, √(1-x²) = √(1-sin²θ) = cos θ.\n- Step 2: When x = 0, θ = 0; when x = 1, θ = π/2.\n- Step 3: ∫₀¹ x⁵√(1-x²) dx = ∫₀^π/² sin⁵θ · cos θ · cos θ dθ = ∫₀^π/² sin⁵θ cos²θ dθ.\n- Step 4: Write cos²θ = 1 - sin²θ and use the reduction formula for ∫sinⁿθ dθ, or expand and integrate term by term:\n+ = ∫(sin⁵θ - sin⁷θ) dθ = [(-cos⁵θ/5 + cos⁷θ/7)]₀^π/2 = (0 - 0) - (-1/5 + 1/7) = 1/5 - 1/7 = 2/35.\n\nThis substitution elegantly converts the radical into a trigonometric form.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "What is the difference between ∫1/(x²-a²) dx and ∫1/(a²-x²) dx? Write down both results and explain when each applies. (2 steps)", "answer": "- Step 1: ∫1/(x² - a²) dx = (1/(2a))ln|(x-a)/(x+a)| + C (for x > a).\n- Step 2: ∫1/(a² - x²) dx = (1/(2a))ln|(a+x)/(a-x)| + C (for |x| < a).\n+ The sign difference in the denominator determines whether we get a positive or negative result inside the log.\n+ These come from partial fractions: 1/(x²-a²) = 1/(2a)[1/(x-a) - 1/(x+a)] and 1/(a²-x²) = 1/(2a)[1/(a-x) + 1/(a+x)].\n\nThe key is remembering that the log result flips sign depending on which form you have.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": true}, {"question": "Using integration by parts twice, derive the formula for ∫eᵃˣ sin(bx) dx. What is the final result? (4 steps)", "answer": "- Step 1: Let I = ∫eᵃˣ sin(bx) dx. First, use u = sin(bx), dv/dx = eᵃˣ.\n- Step 2: Then du/dx = b cos(bx), v = eᵃˣ/a. I = eᵃˣ sin(bx)/a - ∫(b/a)eᵃˣ cos(bx) dx.\n- Step 3: For J = ∫eᵃˣ cos(bx) dx, integrate by parts again: J = eᵃˣ cos(bx)/a + (b/a)∫eᵃˣ sin(bx) dx = eᵃˣ cos(bx)/a + (b/a)I.\n- Step 4: Substitute back: I = eᵃˣ sin(bx)/a - (b/a)[eᵃˣ cos(bx)/a + (b/a)I] = eᵃˣ/a[sin(bx) - (b/a)cos(bx)] - (b²/a²)I.\n+ Therefore, I(1 + b²/a²) = eᵃˣ/a²[a sin(bx) - b cos(bx)].\n+ So I = eᵃˣ/(a²+b²)[a sin(bx) - b cos(bx)] + C.\n\nThis is a classic result for integrals of exponential times trigonometric functions.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "Evaluate ∫₁ᵉ (ln x)² dx. Use integration by parts, showing the working. (3 steps)", "answer": "- Step 1: Let I = ∫(ln x)² dx. Use u = (ln x)², dv/dx = 1.\n- Step 2: Then du/dx = 2(ln x)/x, v = x.\n+ I = x(ln x)² - ∫x · 2(ln x)/x dx = x(ln x)² - 2∫ln x dx.\n- Step 3: For ∫ln x dx, use parts again: = x ln x - x.\n+ So I = x(ln x)² - 2[x ln x - x] + C = x(ln x)² - 2x ln x + 2x + C.\n+ Evaluating from 1 to e: [e(1)² - 2e(1) + 2e] - [1(0)² - 2(1)(0) + 2(1)] = (e - 2e + 2e) - 2 = e - 2.\n\nThis is a common type of integral that appears in many contexts.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "What is the geometric interpretation of the formula for surface area of revolution about the x-axis? Why does it involve 2π times the distance from the axis times the arc length element? (2 steps)", "answer": "- Step 1: When a small arc element of length ds rotates about the x-axis, it traces out a narrow band. This band is approximately a cylindrical strip with radius y and width ds.\n- Step 2: The surface area of this strip is approximately 2πy · ds (circumference times width).\n+ Integrating gives the total surface area: S = ∫2πy ds.\n\nThis is a direct application of the concept of \"surface of revolution\" — sweeping out an area by rotation.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": true}, {"question": "For the curve y = eˣ from x = 0 to 1, rotated about the x-axis, find the surface area. Leave your answer in terms of standard functions. (4 steps)", "answer": "- Step 1: dy/dx = eˣ, so (dy/dx)² = e²ˣ.\n- Step 2: √(1 + (dy/dx)²) = √(1 + e²ˣ).\n- Step 3: Surface area = ∫₀¹ 2πeˣ√(1 + e²ˣ) dx.\n- Step 4: Let u = eˣ, then du = eˣ dx, so dx = du/u, and when x = 0, u = 1; when x = 1, u = e.\n+ S = ∫₁ᵉ 2πu√(1 + u²) · (du/u) = 2π∫₁ᵉ √(1 + u²) du.\n+ This is 2π[(u/2)√(1+u²) + (1/2)arsinh u]₁ᵉ = π[e√(1+e²) + arsinh e - (1·√2 + arsinh 1)].\n\nThis involves standard results for ∫√(1+u²) du.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "State three different techniques for integrating ∫x/√(1+x²) dx and show that they all give the same answer. (3 techniques)", "answer": "- Method 1 (substitution): Let u = 1+x², du = 2x dx, so ∫x/√u · (du/2) = (1/2)∫u^(-1/2) du = √u + C = √(1+x²) + C.\n- Method 2 (recognise derivative): The derivative of √(1+x²) is x/√(1+x²), so the answer is √(1+x²) + C.\n- Method 3 (hyperbolic): Let x = sinh u, then dx = cosh u du, √(1+x²) = cosh u, so ∫sinh u · cosh u/cosh u du = ∫sinh u du = cosh u + C = √(1+x²) + C.\n\nAll methods lead to √(1+x²) + C, demonstrating consistency in calculus.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": true}, {"question": "Find the exact length of the curve y = (1/3)x^(3/2) from x = 0 to x = 12. (4 steps)", "answer": "- Step 1: y = (1/3)x^(3/2), so dy/dx = (1/3)·(3/2)x^(1/2) = (1/2)√x.\n- Step 2: (dy/dx)² = x/4, so 1 + (dy/dx)² = 1 + x/4 = (4 + x)/4.\n- Step 3: Arc length = ∫₀¹² √((4+x)/4) dx = (1/2)∫₀¹² √(4+x) dx.\n- Step 4: Let u = 4+x, du = dx: = (1/2)[(2/3)u^(3/2)]₄¹⁶ = (1/3)[16^(3/2) - 4^(3/2)] = (1/3)[64 - 8] = 56/3.\n\nThe exact length is 56/3 units.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "What is the integral that gives the length of one complete cycle of the cycloid x = r(t - sin t), y = r(1 - cos t)? Evaluate it from t = 0 to 2π. (3 steps)", "answer": "- Step 1: dx/dt = r(1 - cos t), dy/dt = r sin t.\n- Step 2: (dx/dt)² + (dy/dt)² = r²[(1-cos t)² + sin²t] = r²[1 - 2cos t + cos²t + sin²t] = r²[2 - 2cos t] = 2r²(1 - cos t) = 4r² sin²(t/2).\n- Step 3: Length = ∫₀^2π 2r sin(t/2) dt = 2r[-2 cos(t/2)]₀^2π = 4r[cos(0) - cos(π)] = 4r[1 - (-1)] = 8r.\n\nThis is a classic result: one arch of a cycloid has length 8r, equal to four times the radius of the generating circle.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "Using the reduction formula nIₙ = (n-1)Iₙ₋₂ for Iₙ = ∫₀^π/₂ sinⁿx dx, prove that for even n = 2m, I₂m = ((2m-1)!!/(2m)!!)(π/2). Explain what the double factorial notation means. (2 steps)", "answer": "- Step 1: The double factorial (2m)!! = 2m × (2m-2) × ... × 2 and (2m-1)!! = (2m-1) × (2m-3) × ... × 1.\n- Step 2: Starting from I₀ = π/2 and applying the reduction formula repeatedly for even n:\n+ I₂ = (1/2)(π/2) = (1×π)/(2×2)\n+ I₄ = (3/4)I₂ = (3×1)/(4×2) × (π/2)\n+ In general, I₂m = [(2m-1)/(2m)] × [(2m-3)/(2m-2)] × ... × (1/2) × (π/2) = ((2m-1)!!/(2m)!!)(π/2).\n\nThis compact notation elegantly expresses the product of alternating terms.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": true}, {"question": "The region bounded by y = sin x, x = 0, x = π/2, and the x-axis is rotated about the x-axis. Find the volume of the solid generated. (2 steps)", "answer": "- Step 1: Volume = ∫₀^π/² π y² dx = π∫₀^π/² sin²x dx.\n- Step 2: Using sin²x = (1 - cos 2x)/2: = π∫₀^π/2 (1 - cos 2x)/2 dx = π[x/2 - sin 2x/4]₀^π/2 = π[(π/4) - 0] = π²/4.\n\nThis is another example of the \"disk method\" for volumes of revolution.", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "Find ∫x³/(x²+1) dx by splitting the integrand into simpler parts. What is the result? (3 steps)", "answer": "- Step 1: Perform polynomial long division: x³/(x²+1) = x - x/(x²+1).\n- Step 2: Check: x(x²+1) - x = x³ + x - x = x³ ✓\n- Step 3: So ∫x³/(x²+1) dx = ∫x dx - ∫x/(x²+1) dx = x²/2 - (1/2)ln(x²+1) + C.\n\nThis decomposition technique is essential for rational functions where the numerator's degree exceeds the denominator's.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "Evaluate ∫₁² x√(x-1) dx using a simple substitution. (3 steps)", "answer": "- Step 1: Let u = x - 1, so x = u + 1, dx = du. When x = 1, u = 0; when x = 2, u = 1.\n- Step 2: The integral becomes ∫₀¹ (u + 1)√u du = ∫₀¹ (u^(3/2) + u^(1/2)) du.\n- Step 3: = [u^(5/2)/(5/2) + u^(3/2)/(3/2)]₀¹ = (2/5) + (2/3) = (6/15 + 10/15) = 16/15.\n\nThis type of substitution (u = x - constant) is one of the first techniques learned and is surprisingly effective.", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "What is the key insight behind integrating using partial fractions? For ∫(x+1)/(x²(x-1)) dx, what partial fraction decomposition would you use? (2 steps)", "answer": "- Step 1: Partial fractions work when you can express a rational function as a sum of simpler fractions that are easier to integrate.\n- Step 2: For (x+1)/(x²(x-1)), decompose as: (x+1)/(x²(x-1)) = A/x + B/x² + C/(x-1).\n+ Find A, B, C by equating coefficients or substituting values.\n+ This gives A = -2, B = -1, C = 2, so integral = ∫(-2/x - 1/x² + 2/(x-1)) dx = -2ln|x| + 1/x + 2ln|x-1| + C.\n\nPartial fractions break down complex rational functions into integrable pieces.", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": false}, {"question": "The arc of y = cosh x from x = 0 to x = ln 2 is rotated about the x-axis. Find the surface area generated, leaving your answer in exact form. (4 steps)", "answer": "- Step 1: y = cosh x, dy/dx = sinh x, so (dy/dx)² = sinh²x.\n- Step 2: √(1 + sinh²x) = √(cosh²x) = cosh x (positive).\n- Step 3: Surface area = ∫₀^ln² 2π cosh x · cosh x dx = 2π∫₀^ln² cosh²x dx.\n- Step 4: Using cosh²x = (cosh 2x + 1)/2: = 2π∫₀^ln² (cosh 2x + 1)/2 dx = π[sinh 2x/2 + x]₀^ln² = π[(sinh(2ln 2))/2 + ln 2].\n+ Since sinh(2ln 2) = (e^(2ln2) - e^(-2ln2))/2 = (4 - 1/4)/2 = (15/4)/2 = 15/8, the area is π(15/16 + ln 2).\n\nThis simplifies to π(15/16 + ln 2).", "source": "MiniMax ②", "_id": "minimax_2_59", "judge_pick": false}, {"question": "A curve is given implicitly by x² + y² = 1 (the unit circle). Using the arc length formula in terms of y, find the length of the first quadrant arc from y = 0 to y = 1. (3 steps)", "answer": "- Step 1: From x² + y² = 1, x = √(1 - y²) for the first quadrant.\n- Step 2: dx/dy = -y/√(1-y²), so (dx/dy)² = y²/(1-y²).\n- Step 3: Arc length = ∫₀¹ √(1 + y²/(1-y²)) dy = ∫₀¹ √((1-y²+y²)/(1-y²)) dy = ∫₀¹ 1/√(1-y²) dy = [arcsin y]₀¹ = π/2.\n\nThis is the quarter circumference of the unit circle, confirming that the full circumference is 2π.", "source": "MiniMax ②", "_id": "minimax_2_60", "judge_pick": false}, {"question": "Using the substitution x = a sin²θ, evaluate ∫₀ᵃ √(x/(a-x)) dx. What is the result? (4 steps)", "answer": "- Step 1: Let x = a sin²θ, then dx = 2a sin θ cos θ dθ = a sin 2θ dθ.\n- Step 2: √(x/(a-x)) = √(a sin²θ/(a - a sin²θ)) = √(sin²θ/cos²θ) = tan θ.\n- Step 3: The integral becomes ∫ a tan θ · sin 2θ dθ = ∫ a tan θ · 2 sin θ cos θ dθ = 2a ∫ sin²θ dθ.\n- Step 4: = 2a ∫ (1 - cos 2θ)/2 dθ = a[θ - sin 2θ/2] + C = a(θ - sin θ cos θ) + C.\n+ Converting back: sin θ = √(x/a), cos θ = √((a-x)/a), so the result is a(arcsin(√(x/a)) - √(x(a-x))/a).\n\nThis substitution elegantly handles integrals involving √(x/(a-x)).", "source": "MiniMax ②", "_id": "minimax_2_61", "judge_pick": false}, {"question": "Explain why ∫sech x dx = 2 arctan(eˣ) + C is equivalent to the result from Example 7 in the notes. Verify by differentiating. (2 steps)", "answer": "- Step 1: From Example 7, using u = eˣ, we got 2 arctan u + C = 2 arctan(eˣ) + C.\n- Step 2: To verify: d/dx[2 arctan(eˣ)] = 2 · [1/(1 + e^(2x))] · eˣ = 2eˣ/(1 + e^(2x)).\n+ Now note: sech x = 2/(eˣ + e⁻ˣ) = 2eˣ/(e^(2x) + 1). These are identical.\n\nThis confirms the result is correct, showing how the exponential substitution leads to the arctan form.", "source": "MiniMax ②", "_id": "minimax_2_62", "judge_pick": false}, {"question": "Find ∫ from 0 to π/4 of tan⁵x dx using the reduction formula for tanⁿx. (3 steps)", "answer": "- Step 1: Using Iₙ = tanⁿ⁻¹x/(n-1) - Iₙ₋₂, with I₁ = ∫tan x dx = -ln|cos x|.\n- Step 2: I₅ = tan⁴x/4 - I₃\n+ I₃ = tan²x/2 - I₁ = tan²x/2 + ln|cos x|\n- Step 3: So I₅ = tan⁴x/4 - tan²x/2 - ln|cos x|, evaluated from 0 to π/4.\n+ At π/4: tan(π/4) = 1, so (1/4) - (1/2) - ln(1/√2) = -1/4 + (1/2)ln 2\n+ At 0: 0 - 0 - ln(1) = 0\n+ Therefore, ∫₀^π/4 tan⁵x dx = -1/4 + (1/2)ln 2.\n\nThis demonstrates the practical use of reduction formulas for definite integrals.", "source": "MiniMax ②", "_id": "minimax_2_63", "judge_pick": false}, {"question": "The curve y = 1/x for x ≥ 1 is rotated about the x-axis from x = 1 to ∞. What is the surface area? Why does this result illustrate an important concept? (4 steps)", "answer": "- Step 1: dy/dx = -1/x², so (dy/dx)² = 1/x⁴.\n- Step 2: Surface area = ∫₁^∞ 2πy√(1 + 1/x⁴) dx = 2π∫₁^∞ (1/x)√(1 + 1/x⁴) dx.\n- Step 3: Let u = 1/x, then du = -dx/x², and when x = 1, u = 1; x → ∞, u → 0.\n+ The integral becomes 2π∫₀¹ √(1 + u⁴) du.\n- Step 4: This integral is finite, giving a finite surface area for an infinite solid (Torricelli's trumpet).\n+ This is a famous paradox: you can have a solid with infinite length but finite volume, yet its surface area can also be finite or infinite depending on the exact form.\n\nThis is one of Gabriel's Horn paradox variations, illustrating counterintuitive results in calculus.", "source": "MiniMax ②", "_id": "minimax_2_64", "judge_pick": false}, {"question": "What is the reduction formula for Iₙ = ∫cosⁿx dx? Derive it and state both the reduction formula and how it differs from the sinⁿx case. (3 steps)", "answer": "- Step 1: Write cosⁿx = cosⁿ⁻¹x · cos x, use integration by parts with u = cosⁿ⁻¹x, dv/dx = cos x.\n- Step 2: Then du/dx = -(n-1)cosⁿ⁻²x sin x, v = sin x.\n+ Iₙ = cosⁿ⁻¹x sin x + (n-1)∫cosⁿ⁻²x sin²x dx = cosⁿ⁻¹x sin x + (n-1)∫cosⁿ⁻²x(1-cos²x) dx.\n- Step 3: So Iₙ = cosⁿ⁻¹x sin x + (n-1)Iₙ₋₂ - (n-1)Iₙ.\n+ Rearranging: nIₙ = cosⁿ⁻¹x sin x + (n-1)Iₙ₋₂.\n+ This is essentially the same formula as for sinⁿx but with the boundary term involving sin x instead of having the negative sign.\n\nThe structural similarity reflects the symmetry between sin and cos in trigonometric integrals.", "source": "MiniMax ②", "_id": "minimax_2_65", "judge_pick": false}, {"question": "Using integration by parts, derive the reduction formula for Jₙ = ∫xⁿ sin x dx. How does this compare with the reduction formula for ∫xⁿeˣ dx? (2 steps)", "answer": "- Step 1: Using integration by parts with u = xⁿ, dv/dx = sin x:\n+ Jₙ = -xⁿ cos x + n∫xⁿ⁻¹ cos x dx.\n+ Now integrate the remaining integral by parts again with u = xⁿ⁻¹, dv/dx = cos x:\n+ ∫xⁿ⁻¹ cos x dx = xⁿ⁻¹ sin x - (n-1)∫xⁿ⁻² sin x dx = xⁿ⁻¹ sin x - (n-1)Jₙ₋₂.\n- Step 2: Combining: Jₙ = -xⁿ cos x + n[xⁿ⁻¹ sin x - (n-1)Jₙ₋₂] = -xⁿ cos x + nxⁿ⁻¹ sin x - n(n-1)Jₙ₋₂.\n+ This is similar in structure to the ∫xⁿeˣ dx case but with trigonometric functions and alternating signs.\n\nBoth involve reducing the power of x systematically through repeated integration by parts.", "source": "MiniMax ②", "_id": "minimax_2_66", "judge_pick": false}, {"question": "Evaluate the integral ∫₀¹ x⁴(1-x)⁵ dx using the beta function concept (or reduction formula). (3 steps)", "answer": "- Step 1: This is a standard form ∫₀¹ xᵐ(1-x)ⁿ dx = m!n!/((m+n+1)!) for integers.\n- Step 2: Here m = 4, n = 5, so m + n + 1 = 10.\n- Step 3: The value is 4! × 5! / 10! = (24 × 120) / 3628800 = 2880 / 3628800 = 1/1260.\n\nThis can be verified using the reduction formula approach with Iₙ = (n/(m+n+1))Iₙ₋₁.", "source": "MiniMax ②", "_id": "minimax_2_67", "judge_pick": false}, {"question": "What is the key principle behind choosing between trigonometric and hyperbolic substitutions? Give an example where one is clearly better than the other. (2 steps)", "answer": "- Step 1: Trigonometric substitutions work well for expressions like √(a²-x²) (use x = a sin θ), while hyperbolic substitutions work better for √(a²+x²) (use x = a sinh u) and √(x²-a²) (use x = a cosh u).\n- Step 2: For √(x²+1), hyperbolic is better because 1 + sinh²u = cosh²u is always positive, whereas with x = tan θ, you'd need to handle sec θ which can be negative.\n+ Conversely, for √(1-x²), trigonometric is more natural.\n\nThe choice often depends on which identity gives a simpler resulting integrand.", "source": "MiniMax ②", "_id": "minimax_2_68", "judge_pick": false}, {"question": "Using the parametric formulas, find the surface area when the curve x = t², y = t (from t = 0 to 1) is rotated about the y-axis. (3 steps)", "answer": "- Step 1: dx/dt = 2t, dy/dt = 1, so √((dx/dt)² + (dy/dt)²) = √(4t² + 1).\n- Step 2: Surface area about y-axis = ∫₂πx ds = ∫₀¹ 2π(t²)√(4t² + 1) dt.\n- Step 3: Let u = 4t² + 1, then du = 8t dt, t² = (u-1)/4, and when t = 0, u = 1; t = 1, u = 5.\n+ = 2π∫₁⁵ (u-1)/4 · √u · (du/8) = (π/16)∫₁⁵ (u-1)u^(1/2) du = (π/16)[∫u^(3/2) du - ∫u^(1/2) du] = (π/16)[(2/5)u^(5/2) - (2/3)u^(3/2)]₁⁵.\n+ This evaluates to (π/16)[(2/5)(5^(5/2) - 1) - (2/3)(5^(3/2) - 1)].\n\nThis demonstrates the parametric approach for surface area calculations.", "source": "MiniMax ②", "_id": "minimax_2_69", "judge_pick": false}], "count": 70}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "Why is $$\\int \\sinh x \\, dx = \\cosh x + C$$ (no minus sign), in contrast to $$\\int \\sin x \\, dx = -\\cos x + C$$? (3 steps)", "answer": "- Step 1: Recall $$\\frac{d}{dx}(\\cosh x) = \\sinh x$$, so reversing gives $$\\int \\sinh x\\, dx = \\cosh x + C$$.\n- Step 2: For trig: $$\\frac{d}{dx}(\\cos x) = -\\sin x$$, hence the minus appears when reversing — $$\\int \\sin x \\, dx = -\\cos x + C$$.\n- Step 3: The structural reason: $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$ differentiates to $$\\frac{e^x - e^{-x}}{2} = \\sinh x$$ with no sign flip, because both exponentials' derivatives align positively. Trig functions inherit signs from $$d/dx(e^{ix}) = ie^{ix}$$, which produces alternating signs.\n\nThe lack of sign flips between $$\\sinh \\leftrightarrow \\cosh$$ derivative pairs is the \"cleaner\" feature of hyperbolic functions versus trig.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Show that $$\\int \\tanh x \\, dx = \\ln(\\cosh x) + C$$, and explain why no modulus is needed around $$\\cosh x$$. (3 steps)", "answer": "- Step 1: Write $$\\tanh x = \\frac{\\sinh x}{\\cosh x}$$. The integral becomes $$\\int \\frac{\\sinh x}{\\cosh x}\\, dx$$.\n- Step 2: Recognize the form $$\\int \\frac{f'(x)}{f(x)}\\, dx = \\ln|f(x)| + C$$ with $$f(x) = \\cosh x$$ (since $$f'(x) = \\sinh x$$).\n- Step 3: Drop the modulus because $$\\cosh x = \\frac{e^x + e^{-x}}{2} > 0$$ for **all** real $$x$$. Compare $$\\int \\tan x\\, dx = \\ln|\\sec x| + C$$, where $$\\sec x$$ can be negative, so modulus is essential.\n\nThe positivity of $$\\cosh$$ is what makes the answer cleaner than its trig counterpart.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Compare $$\\int \\text{sech}^2 x\\, dx$$ and $$\\int \\text{cosech}^2 x\\, dx$$ — note signs carefully. (3 steps)", "answer": "- Step 1: $$\\int \\text{sech}^2 x \\, dx = \\tanh x + C$$ (no sign flip), because $$\\frac{d}{dx}\\tanh x = \\text{sech}^2 x$$.\n- Step 2: $$\\int \\text{cosech}^2 x \\, dx = -\\coth x + C$$ (sign flip), because $$\\frac{d}{dx}\\coth x = -\\text{cosech}^2 x$$.\n- Step 3: This mirrors the trig pattern: $$\\int \\sec^2 x\\, dx = \\tan x + C$$ (no flip), $$\\int \\csc^2 x\\, dx = -\\cot x + C$$ (flip). The \"co-\" prefixed function in each pair carries the negative sign — same pattern in trig and hyperbolic.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "Why is $$\\int \\text{sech}\\, x\\tanh x\\, dx = -\\text{sech}\\, x + C$$ (with the minus sign)?", "answer": "Differentiating $$\\text{sech}\\, x = (\\cosh x)^{-1}$$ via the chain rule gives $$-(\\cosh x)^{-2}\\sinh x = -\\text{sech}\\, x \\tanh x$$. So the antiderivative of $$+\\text{sech}\\, x\\tanh x$$ is $$-\\text{sech}\\, x$$. This contrasts with $$\\int \\sec x\\tan x\\, dx = +\\sec x + C$$ — the trig form has no minus because $$\\frac{d}{dx}\\sec x = +\\sec x\\tan x$$. The asymmetry traces back to $$\\cosh' = \\sinh$$ (positive) versus $$\\cos' = -\\sin$$ (negative).", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "State the four standard \"inverse\" integrals and the domain restrictions. (4 steps)", "answer": "- Step 1: $$\\int \\frac{1}{\\sqrt{1-x^2}}\\, dx = \\arcsin x + C$$, valid for $$|x| < 1$$ (radicand must be positive, and $$\\arcsin$$'s range matches).\n- Step 2: $$\\int \\frac{1}{1+x^2}\\, dx = \\arctan x + C$$, valid for all real $$x$$ (denominator always positive).\n- Step 3: $$\\int \\frac{1}{\\sqrt{1+x^2}}\\, dx = \\text{arsinh}\\, x + C$$, valid for all real $$x$$.\n- Step 4: $$\\int \\frac{1}{\\sqrt{x^2-1}}\\, dx = \\text{arcosh}\\, x + C$$, valid only for $$x > 1$$ (since $$\\text{arcosh}$$ is the principal-branch inverse of $$\\cosh$$ on $$[1,\\infty)$$).\n\nPattern: a \"$$1\\pm x^2$$\" or \"$$x^2 - 1$$\" structure under or with a square root signals which inverse function is the antiderivative.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "State the linear substitution rule and explain why the $$\\frac{1}{a}$$ factor appears. (3 steps)", "answer": "- Step 1: If $$F(x)$$ is an antiderivative of $$f(x)$$, then $$\\int f(ax+b)\\, dx = \\frac{1}{a}F(ax+b) + C$$.\n- Step 2: Verify by differentiating: $$\\frac{d}{dx}\\left[\\frac{1}{a}F(ax+b)\\right] = \\frac{1}{a}\\cdot a \\cdot f(ax+b) = f(ax+b)$$. The $$\\frac{1}{a}$$ exactly cancels the chain-rule factor of $$a$$.\n- Step 3: This works for **linear** inner functions only. For non-linear inners (e.g., $$x^2$$), you need a proper substitution, because the chain-rule factor isn't constant.\n\nThis shortcut applies directly to hyperbolic, trig, exponential, and inverse forms.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "A student sees $$\\int \\frac{2x}{1+x^2}\\, dx$$ and writes $$\\arctan(x^2)$$. Diagnose the error and give the correct answer. (3 steps)", "answer": "- Step 1: The $$\\arctan$$ form arises only when the integrand is exactly $$\\frac{1}{1+x^2}$$ — numerator must be $$1$$ (or a constant). Here the numerator is $$2x$$, which is **not constant**.\n- Step 2: Correct recognition: this fits the $$\\frac{f'(x)}{f(x)}$$ pattern with $$f(x) = 1+x^2$$, $$f'(x) = 2x$$.\n- Step 3: Apply the log rule: $$\\int \\frac{2x}{1+x^2}\\, dx = \\ln(1+x^2) + C$$ (no modulus since $$1+x^2 > 0$$).\n\nMisconception trap: the denominator alone doesn't determine the antiderivative form. **Always check the numerator** to choose between $$\\arctan$$ (constant numerator), log rule ($$f'$$ in numerator), or power rule ($$f'$$ multiplying a power of $$f$$).", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "Distinguish the patterns $$\\int f'(x)[f(x)]^n\\, dx$$ and $$\\int \\frac{f'(x)}{f(x)}\\, dx$$. (3 steps)", "answer": "- Step 1: Power rule reverse: $$\\int f'(x)[f(x)]^n\\, dx = \\frac{[f(x)]^{n+1}}{n+1} + C$$ for $$n \\neq -1$$. Use when the integrand is $$f'$$ times a power of $$f$$.\n- Step 2: Log rule: $$\\int \\frac{f'(x)}{f(x)}\\, dx = \\ln|f(x)| + C$$. This is the special case $$n = -1$$ where the power rule fails (would give division by zero), replaced by the natural logarithm.\n- Step 3: Strategy: identify $$f$$ such that $$f'$$ appears in the numerator (perhaps up to a constant). If the rest is $$f^n$$ (with $$n \\neq -1$$), use power rule; if the rest is $$1/f$$, use log rule.\n\nExample contrast: $$\\int \\frac{5x}{\\sqrt{1+x^2}}\\, dx$$ has $$f = 1+x^2$$ and integrand $$\\frac{1}{2}f^{-1/2}\\cdot 2x$$, so power rule gives $$5\\sqrt{1+x^2}$$. Whereas $$\\int \\frac{2x}{1+x^2}\\, dx$$ is exactly $$\\frac{f'}{f}$$, so log rule gives $$\\ln(1+x^2)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Find $$\\int \\cosh(4x - 1)\\, dx$$ and explain the $$\\frac{1}{4}$$ factor. (2 steps)", "answer": "- Step 1: Apply linear substitution: $$\\int \\cosh u\\, du = \\sinh u + C$$, with $$u = 4x - 1$$.\n- Step 2: Divide by the coefficient of $$x$$ (which is 4): $$\\int \\cosh(4x - 1)\\, dx = \\frac{1}{4}\\sinh(4x - 1) + C$$.\n\nThe $$\\frac{1}{4}$$ corrects for the chain rule: differentiating $$\\sinh(4x-1)$$ gives $$4\\cosh(4x-1)$$, so we divide by 4 to recover just $$\\cosh(4x-1)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Find $$\\int \\frac{2 + 5x}{\\sqrt{x^2 + 1}}\\, dx$$ by splitting into recognizable parts. (3 steps)", "answer": "- Step 1: Split: $$\\int \\frac{2}{\\sqrt{x^2+1}}\\, dx + \\int \\frac{5x}{\\sqrt{x^2+1}}\\, dx$$. The first piece is a standard inverse-hyperbolic; the second is a power-rule integrand.\n- Step 2: First piece: $$\\int \\frac{2}{\\sqrt{x^2+1}}\\, dx = 2\\,\\text{arsinh}\\, x$$.\n- Step 3: Second piece: with $$f = 1+x^2$$, $$f' = 2x$$, the integrand is $$\\frac{5}{2}f^{-1/2}\\cdot f'$$, integrating to $$5\\sqrt{1+x^2}$$.\n\nTotal: $$2\\,\\text{arsinh}\\, x + 5\\sqrt{1+x^2} + C$$. Whenever you see $$a + bx$$ in the numerator, **split**: the constant part wants the inverse function, and the $$bx$$ part wants the power rule.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "What's the general strategy for integrating products of hyperbolic functions, and how does it parallel trigonometric integration? (3 steps)", "answer": "- Step 1: The same techniques used for trigonometric expressions usually transfer directly, because hyperbolic functions obey similar (sign-modified) identities.\n- Step 2: Most products fit either $$\\int f'(x)[f(x)]^n\\, dx$$ (use power rule) or $$\\int \\frac{f'(x)}{f(x)}\\, dx$$ (use log rule). Look for one factor whose derivative is the other (up to a constant or sign).\n- Step 3: When identities are needed, key replacements include $$1 - \\tanh^2 x = \\text{sech}^2 x$$, $$\\cosh^2 x - \\sinh^2 x = 1$$, $$\\cosh 2x = 2\\cosh^2 x - 1$$. These mirror trig identities, with sign differences from $$\\cosh^2 - \\sinh^2 = 1$$ replacing $$\\cos^2 + \\sin^2 = 1$$.\n\nBig-picture rule: anything you'd do for $$\\sin/\\cos$$ usually works for $$\\sinh/\\cosh$$, with attention to sign differences in the Pythagorean identity.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Find $$\\int \\text{sech}^6 x \\tanh x \\, dx$$ by recognizing the pattern. (3 steps)", "answer": "- Step 1: Recall $$\\frac{d}{dx}(\\text{sech}\\, x) = -\\text{sech}\\, x \\tanh x$$. So $$\\text{sech}\\, x \\tanh x = -\\frac{d}{dx}(\\text{sech}\\, x)$$.\n- Step 2: Rewrite: $$\\text{sech}^6 x \\tanh x = -\\text{sech}^5 x \\cdot (-\\text{sech}\\, x \\tanh x)$$. This is $$-f^5 f'$$ form with $$f = \\text{sech}\\, x$$.\n- Step 3: Apply the power rule reverse: $$\\int -f^5 f'\\, dx = -\\frac{f^6}{6}$$, so the integral equals $$-\\frac{1}{6}\\text{sech}^6 x + C$$.\n\nWhenever $$\\text{sech}^n x \\tanh x$$ appears, peel off one $$\\text{sech}\\, x \\tanh x$$ pair to engineer a perfect $$f^n f'$$ structure (with a minus sign).", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Why does the double-angle identity $$\\cosh^2 A = \\frac{1 + \\cosh 2A}{2}$$ help integrate $$\\int \\cosh^2(3x)\\, dx$$? (3 steps)", "answer": "- Step 1: The integrand $$\\cosh^2(3x)$$ is an even power of a hyperbolic function — there's no factor whose derivative is the other, so neither power-rule nor log-rule recognition works directly.\n- Step 2: The double-angle identity converts the **square** into a **linear combination** of constants and $$\\cosh(6x)$$: $$\\cosh^2(3x) = \\frac{1 + \\cosh(6x)}{2}$$.\n- Step 3: Both terms now have trivial antiderivatives: $$\\int \\frac{1}{2}\\, dx = \\frac{x}{2}$$ and $$\\int \\frac{\\cosh 6x}{2}\\, dx = \\frac{\\sinh 6x}{12}$$. Result: $$\\frac{x}{2} + \\frac{\\sinh 6x}{12} + C$$.\n\nThe deep idea: even powers of $$\\sinh, \\cosh, \\sin, \\cos$$ have no easy form **directly**, but the double-angle identity converts them to linear expressions, which integrate trivially.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Why can we integrate $$\\int \\sinh^3 x \\, dx$$ using $$\\sinh^2 x = \\cosh^2 x - 1$$? (3 steps)", "answer": "- Step 1: Direct integration of $$\\sinh^3 x$$ has no obvious antiderivative. Strategy: peel off one factor of $$\\sinh x$$, which can act as the differential of $$\\cosh x$$.\n- Step 2: Rewrite: $$\\sinh^3 x = (\\cosh^2 x - 1)\\sinh x$$. Now the integrand is $$\\cosh^2 x \\cdot \\sinh x - \\sinh x$$.\n- Step 3: First piece fits power rule with $$f = \\cosh x$$, $$f' = \\sinh x$$: gives $$\\fr
