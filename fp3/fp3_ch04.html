ac{\\cosh^3 x}{3}$$. Second piece is standard. Result: $$\\frac{1}{3}\\cosh^3 x - \\cosh x + C$$.\n\nThe key insight: any **odd** power of $$\\sinh$$ (or $$\\cosh$$) leaves one factor to act as the differential of the other after using the Pythagorean-like identity. Even powers don't have this freedom — use double-angle instead.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Explain the strategy difference between integrating $$\\sinh^n x$$ for odd $$n$$ versus even $$n$$. (3 steps)", "answer": "- Step 1: For **odd** $$n$$: peel off one $$\\sinh x$$, convert the remaining even power $$\\sinh^{n-1} x$$ using $$\\sinh^2 x = \\cosh^2 x - 1$$, expand, and integrate term by term. Each term becomes $$\\cosh^k x \\cdot \\sinh x$$ — perfect power-rule pattern.\n- Step 2: For **even** $$n$$: use the double-angle identity $$\\sinh^2 x = \\frac{\\cosh 2x - 1}{2}$$, then square if needed. This converts the even power into linear combinations of $$\\cosh(kx)$$.\n- Step 3: Why? For odd $$n$$, the extra $$\\sinh x$$ acts as $$d(\\cosh x)$$. For even $$n$$, no factor is \"left over,\" so we lower the power degree by half via the double-angle identity.\n\nThis odd/even split is universal in trig and hyperbolic integration. Same strategy works for $$\\cos^n x, \\sin^n x, \\cosh^n x, \\sinh^n x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Why does integration by parts fail for $$\\int e^{ax}\\sinh(ax)\\, dx$$, and what should we do instead? (3 steps)", "answer": "- Step 1: IBP on $$\\int e^{ax}\\sinh(ax)\\, dx$$ generates, after two iterations, the same integral on the right-hand side multiplied by a coefficient that gives no useful equation (the $$a^2$$ terms cancel, yielding $$0 = $$ something inconsistent).\n- Step 2: Instead, use the exponential definition: $$\\sinh(ax) = \\frac{e^{ax} - e^{-ax}}{2}$$, so $$e^{ax}\\sinh(ax) = \\frac{e^{2ax} - 1}{2}$$.\n- Step 3: Both terms are now elementary: integrate to $$\\frac{e^{2ax}}{4a} - \\frac{x}{2} + C$$.\n\nWhen $$e^{ax}$$ multiplies $$\\sinh(ax)$$ or $$\\cosh(ax)$$ with **matching coefficients**, exponential expansion always wins over IBP.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Derive $$\\int \\text{sech}\\, x \\, dx$$ using a substitution. (4 steps)", "answer": "- Step 1: Multiply numerator and denominator by $$e^x$$: $$\\text{sech}\\, x = \\frac{2}{e^x + e^{-x}} = \\frac{2e^x}{e^{2x} + 1}$$.\n- Step 2: Substitute $$u = e^x$$, so $$du = e^x\\, dx$$. The integral becomes $$\\int \\frac{2}{u^2 + 1}\\, du$$.\n- Step 3: This is the standard $$\\arctan$$ form: $$2\\arctan u + C$$.\n- Step 4: Substitute back: $$\\int \\text{sech}\\, x \\, dx = 2\\arctan(e^x) + C$$.\n\nCompare with $$\\int \\sec x \\, dx = \\ln|\\sec x + \\tan x| + C$$, which uses a clever multiplication trick. The hyperbolic case is structurally cleaner because $$e^x$$ is a natural change of variable for any hyperbolic combination.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Find $$\\int \\frac{1}{\\sinh x + \\cosh x}\\, dx$$ using the exponential definition. (3 steps)", "answer": "- Step 1: Recognize $$\\sinh x + \\cosh x = \\frac{e^x - e^{-x}}{2} + \\frac{e^x + e^{-x}}{2} = e^x$$. The two functions add to a single exponential.\n- Step 2: So $$\\int \\frac{1}{\\sinh x + \\cosh x}\\, dx = \\int e^{-x}\\, dx$$.\n- Step 3: Integrate: $$-e^{-x} + C$$.\n\nCombinations like $$\\sinh x + \\cosh x$$ or $$\\cosh x - \\sinh x$$ collapse to single exponentials. The exponential definition trivializes such problems.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "When integrating $$\\int (\\text{sech}\\, x - \\tanh x)^2\\, dx$$, what identity simplifies it dramatically? (3 steps)", "answer": "- Step 1: Expand: $$(\\text{sech}\\, x - \\tanh x)^2 = \\text{sech}^2 x - 2\\,\\text{sech}\\, x \\tanh x + \\tanh^2 x$$.\n- Step 2: Apply $$\\tanh^2 x = 1 - \\text{sech}^2 x$$. The integrand becomes $$\\text{sech}^2 x - 2\\,\\text{sech}\\, x\\tanh x + 1 - \\text{sech}^2 x = 1 - 2\\,\\text{sech}\\, x\\tanh x$$ — the $$\\text{sech}^2$$ terms cancel!\n- Step 3: Each remaining term has a known antiderivative: $$\\int 1\\, dx = x$$, $$\\int \\text{sech}\\, x \\tanh x\\, dx = -\\text{sech}\\, x$$. Result: $$x + 2\\,\\text{sech}\\, x + C$$.\n\nLesson: when faced with powers/products of hyperbolic functions, look for cancellations after applying $$\\cosh^2 - \\sinh^2 = 1$$ or $$1 - \\tanh^2 = \\text{sech}^2$$. Algebra often simplifies dramatically.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Why is a substitution like $$x = \\sin\\theta$$ effective for integrals containing $$\\sqrt{1-x^2}$$? (3 steps)", "answer": "- Step 1: With $$x = \\sin\\theta$$: $$1 - x^2 = 1 - \\sin^2\\theta = \\cos^2\\theta$$. So $$\\sqrt{1-x^2} = |\\cos\\theta|$$, which is always positive on the principal branch.\n- Step 2: The two-term radicand has been collapsed to a **single term** via the Pythagorean identity. This is the universal mechanism: identities reduce $$\\sqrt{a^2 \\pm x^2}$$ or $$\\sqrt{x^2 \\pm a^2}$$ to a single function of the new variable.\n- Step 3: Hyperbolic alternative: $$x = \\tanh u$$ gives $$1 - \\tanh^2 u = \\text{sech}^2 u$$. Either substitution achieves the same goal; choice depends on which produces a cleaner subsequent integral.\n\nThe recipe: for any expression $$\\sqrt{a^2 \\pm x^2}$$ or $$\\sqrt{x^2 - a^2}$$, find a substitution that uses an identity to collapse two terms into one.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Match each integrand structure to its standard substitution and the identity used: (a) $$\\sqrt{1 - x^2}$$ (b) $$1 + x^2$$ (c) $$\\sqrt{1 + x^2}$$ (d) $$\\sqrt{x^2 - 1}$$. (4 steps)", "answer": "- Step 1: For $$\\sqrt{1-x^2}$$: use $$x = \\sin\\theta$$, applies $$1 - \\sin^2\\theta = \\cos^2\\theta$$. Alternative: $$x = \\tanh u$$ uses $$1 - \\tanh^2 u = \\text{sech}^2 u$$.\n- Step 2: For $$1+x^2$$: use $$x = \\tan\\theta$$, applies $$1 + \\tan^2\\theta = \\sec^2\\theta$$. Alternative: $$x = \\sinh u$$ uses $$1 + \\sinh^2 u = \\cosh^2 u$$.\n- Step 3: For $$\\sqrt{1+x^2}$$: use $$x = \\sinh u$$ (preferred), applies $$1 + \\sinh^2 u = \\cosh^2 u$$. Alternative: $$x = \\tan\\theta$$.\n- Step 4: For $$\\sqrt{x^2 - 1}$$: use $$x = \\cosh u$$ (preferred), applies $$\\cosh^2 u - 1 = \\sinh^2 u$$. Alternative: $$x = \\sec\\theta$$.\n\nThe **first** substitution in each pair is usually preferred — it leads to a simpler integrand after the conversion.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Why is $$x = a\\sinh u$$ often preferred over $$x = a\\tan\\theta$$ for integrals with $$\\sqrt{a^2 + x^2}$$? (3 steps)", "answer": "- Step 1: With $$x = a\\sinh u$$: $$\\sqrt{a^2 + x^2} = a\\cosh u$$, always positive — no absolute value issues.\n- Step 2: With $$x = a\\tan\\theta$$: $$\\sqrt{a^2 + x^2} = a|\\sec\\theta|$$. The modulus can require case analysis, and subsequent integrations often produce $$\\sec^n\\theta$$ terms (e.g., $$\\int\\sec^3\\theta\\, d\\theta$$ is famously tricky).\n- Step 3: Furthermore, hyperbolic substitution gives $$\\int \\cosh^2 u\\, du$$ for $$\\int \\sqrt{a^2+x^2}\\, dx$$, which uses a simple double-angle identity. Trig version gives $$\\int \\sec^3\\theta\\, d\\theta$$, requiring a non-trivial reduction formula.\n\nFor most calculus problems, hyperbolic substitutions outperform trig ones for $$\\sqrt{a^2 + x^2}$$: cleaner, sign-positive, and avoid the $$\\sec^3$$ family.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Derive $$\\int \\frac{1}{1+x^2}\\, dx = \\arctan x + C$$ via $$x = \\tan\\theta$$. (4 steps)", "answer": "- Step 1: Set $$x = \\tan\\theta$$. Then $$\\frac{dx}{d\\theta} = \\sec^2\\theta$$, so $$dx = \\sec^2\\theta\\, d\\theta$$.\n- Step 2: Substitute: $$1 + x^2 = 1 + \\tan^2\\theta = \\sec^2\\theta$$.\n- Step 3: The integral becomes $$\\int \\frac{1}{\\sec^2\\theta} \\cdot \\sec^2\\theta \\, d\\theta = \\int 1 \\, d\\theta = \\theta + C$$ — perfect cancellation.\n- Step 4: Convert back: $$\\theta = \\arctan x$$, giving $$\\arctan x + C$$.\n\nThe derivation reveals **why** the antiderivative is $$\\arctan$$: the substitution exploits the perfect cancellation between $$1 + \\tan^2 = \\sec^2$$ and the $$\\sec^2$$ from $$dx$$.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Why does $$\\int \\frac{1}{a^2 + x^2}\\, dx = \\frac{1}{a}\\arctan(x/a) + C$$ contain a $$\\frac{1}{a}$$ factor, while $$\\int \\frac{1}{\\sqrt{a^2 + x^2}}\\, dx = \\text{arsinh}(x/a) + C$$ does not? (3 steps)", "answer": "- Step 1: Substitute $$x = a\\tan\\theta$$, $$dx = a\\sec^2\\theta\\, d\\theta$$, $$a^2 + x^2 = a^2\\sec^2\\theta$$.\n- Step 2: For $$1/(a^2+x^2)$$: $$\\int \\frac{1}{a^2\\sec^2\\theta} \\cdot a\\sec^2\\theta\\, d\\theta = \\int \\frac{1}{a}\\, d\\theta$$. The $$a^2$$ in denominator cancels only one $$a$$ from $$dx$$, leaving residual $$\\frac{1}{a}$$.\n- Step 3: For $$1/\\sqrt{a^2+x^2}$$ via $$x = a\\sinh u$$: $$\\int \\frac{a\\cosh u}{a\\cosh u}\\, du = \\int 1\\, du$$ — the $$a$$'s cancel exactly!\n\nMemory aid: only the $$\\arctan$$ form (and the two log forms 16, 17) carry the $$\\frac{1}{a}$$ factor. The square-root inverse-hyperbolic forms don't.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "State the four standard integrals (results 12–15) for integrals with $$a^2$$. (4 steps)", "answer": "- Step 1: $$\\int \\frac{1}{\\sqrt{a^2 - x^2}}\\, dx = \\arcsin(x/a) + C$$ for $$|x| < a$$.\n- Step 2: $$\\int \\frac{1}{a^2 + x^2}\\, dx = \\frac{1}{a}\\arctan(x/a) + C$$ for all real $$x$$.\n- Step 3: $$\\int \\frac{1}{\\sqrt{a^2 + x^2}}\\, dx = \\text{arsinh}(x/a) + C$$.\n- Step 4: $$\\int \\frac{1}{\\sqrt{x^2 - a^2}}\\, dx = \\text{arcosh}(x/a) + C$$ for $$x > a$$.\n\nThese generalize results 8–11 by allowing any positive $$a$$. When $$a = 1$$, they reduce to those original forms.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Show how to handle $$\\int \\frac{1}{25 + 9x^2}\\, dx$$ — the strategy for $$a^2 + b^2 x^2$$ forms. (3 steps)", "answer": "- Step 1: Factor out the coefficient of $$x^2$$: $$25 + 9x^2 = 9\\left(\\frac{25}{9} + x^2\\right)$$.\n- Step 2: Now in standard form $$A^2 + x^2$$ with $$A^2 = 25/9$$, so $$A = 5/3$$. The integral becomes $$\\frac{1}{9}\\int \\frac{1}{(5/3)^2 + x^2}\\, dx$$.\n- Step 3: Apply standard result: $$\\frac{1}{9} \\cdot \\frac{1}{5/3}\\arctan\\left(\\frac{x}{5/3}\\right) = \\frac{1}{9}\\cdot\\frac{3}{5}\\arctan(3x/5) = \\frac{1}{15}\\arctan(3x/5) + C$$.\n\nGeneral technique: factor out the coefficient of $$x^2$$ to get standard form $$A^2 \\pm x^2$$ (or $$x^2 - A^2$$). The factored constant becomes a multiplier outside.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Use $$x = \\sinh u$$ to derive $$\\int \\sqrt{1 + x^2}\\, dx = \\frac{1}{2}\\text{arsinh}\\, x + \\frac{1}{2}x\\sqrt{1+x^2} + C$$. (5 steps)", "answer": "- Step 1: Let $$x = \\sinh u$$, so $$dx = \\cosh u\\, du$$ and $$\\sqrt{1+x^2} = \\cosh u$$. Integral becomes $$\\int \\cosh^2 u\\, du$$.\n- Step 2: Apply $$\\cosh^2 u = \\frac{1 + \\cosh 2u}{2}$$: $$\\int \\cosh^2 u\\, du = \\frac{1}{2}u + \\frac{\\sinh 2u}{4} + C$$.\n- Step 3: Use $$\\sinh 2u = 2\\sinh u\\cosh u$$: result becomes $$\\frac{1}{2}u + \\frac{1}{2}\\sinh u \\cosh u + C$$.\n- Step 4: Convert back: $$u = \\text{arsinh}\\, x$$, $$\\sinh u = x$$, $$\\cosh u = \\sqrt{1+x^2}$$.\n- Step 5: Final answer: $$\\frac{1}{2}\\text{arsinh}\\, x + \\frac{1}{2}x\\sqrt{1+x^2} + C$$.\n\nThis is a model derivation: hyperbolic substitution transforms an awkward radical into tractable $$\\cosh^2$$, and the double-angle identity unwinds the rest.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "When using a substitution like $$x = 3\\sinh u$$ for a definite integral, how do you handle the limits? (4 steps)", "answer": "- Step 1: Choose the substitution to collapse the radicand: $$x^2 + 9 = 9(\\sinh^2 u + 1) = 9\\cosh^2 u$$ (single term).\n- Step 2: Transform limits: e.g., when $$x = 0$$, $$\\sinh u = 0$$, so $$u = 0$$. When $$x = 6$$, $$\\sinh u = 2$$, so $$u = \\text{arsinh}\\, 2$$.\n- Step 3: Substitute $$dx = 3\\cosh u\\, du$$ and the radical, then simplify the integrand entirely in $$u$$.\n- Step 4: Evaluate at the new limits using identities (e.g., $$\\cosh(\\text{arsinh}\\, 2) = \\sqrt{5}$$, since $$\\cosh u = \\sqrt{1+\\sinh^2 u}$$).\n\nKey principle: with definite integrals, **always change the limits** to the new variable. This avoids substituting back. For inverse-function limits, use the identity to find related quantities (like $$\\cosh u$$ when only $$\\sinh u$$ is known).", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why is $$\\int \\frac{1}{a^2 - x^2}\\, dx = \\frac{1}{2a}\\ln\\left|\\frac{a+x}{a-x}\\right| + C$$ derivable by partial fractions, but $$\\int \\frac{1}{a^2 + x^2}\\, dx$$ is not? (3 steps)", "answer": "- Step 1: $$a^2 - x^2 = (a-x)(a+x)$$ factors over the reals (real roots exist). Partial fractions: $$\\frac{1}{a^2 - x^2} = \\frac{1}{2a}\\left(\\frac{1}{a-x} + \\frac{1}{a+x}\\right)$$.\n- Step 2: Each piece integrates to a logarithm: $$\\frac{1}{2a}(-\\ln|a-x| + \\ln|a+x|) = \\frac{1}{2a}\\ln\\left|\\frac{a+x}{a-x}\\right|$$.\n- Step 3: $$a^2 + x^2$$ has **no real factorization** — only over complex numbers as $$(a-ix)(a+ix)$$. So partial fractions over reals don't help; instead, $$x = a\\tan\\theta$$ leads to $$\\arctan$$.\n\nFundamental algebraic distinction: the sign of the constant term in $$x^2 \\pm a^2$$ determines whether real factorization (and hence partial fractions) is possible — and that determines log vs. inverse-trig antiderivative.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "State the relationship between $$\\int \\frac{1}{a^2 - x^2}\\, dx$$ and $$\\int \\frac{1}{x^2 - a^2}\\, dx$$. (3 steps)", "answer": "- Step 1: $$\\int \\frac{1}{a^2 - x^2}\\, dx = \\frac{1}{2a}\\ln\\left|\\frac{a+x}{a-x}\\right| + C$$ (for $$|x| < a$$).\n- Step 2: $$\\int \\frac{1}{x^2 - a^2}\\, dx = \\frac{1}{2a}\\ln\\left|\\frac{x-a}{x+a}\\right| + C$$. They differ because $$x^2 - a^2 = -(a^2-x^2)$$, flipping signs and rearranging the log argument.\n- Step 3: Both arise from partial fractions on a difference of squares. Memory aid: the larger of $$x$$ and $$a$$ tends to sit in the **numerator** of the log argument (depends on which case applies).\n\nThese two log forms are sometimes called the \"logarithmic forms\" of $$\\text{artanh}$$ and $$\\text{arcoth}$$ respectively.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "Outline the strategy for integrating $$\\int \\frac{1}{px^2 + qx + r}\\, dx$$ when the quadratic is irreducible. (3 steps)", "answer": "- Step 1: Complete the square: $$px^2 + qx + r = p[(x+b)^2 + c]$$ for appropriate $$b$$ and $$c > 0$$ (irreducibility ensures $$c > 0$$).\n- Step 2: Substitute $$u = x + b$$ to shift: $$\\int \\frac{1}{p(u^2 + c)}\\, du = \\frac{1}{p}\\int \\frac{1}{u^2 + c}\\, du$$.\n- Step 3: Apply standard form $$\\int \\frac{1}{u^2 + a^2}\\, du = \\frac{1}{a}\\arctan(u/a)$$ with $$a = \\sqrt{c}$$. Convert back to $$x$$.\n\nIf the quadratic **has** real roots, use partial fractions instead. Completing the square is for irreducible quadratics; partial fractions for reducible ones.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Outline the strategy for integrating $$\\int \\frac{1}{\\sqrt{px^2 + qx + r}}\\, dx$$, and how the sign of $$p$$ matters. (3 steps)", "answer": "- Step 1: Complete the square inside the radical. The result will be one of:\n+ $$\\sqrt{a^2 - (x+b)^2}$$ (when $$p < 0$$) → $$\\arcsin$$\n+ $$\\sqrt{(x+b)^2 + a^2}$$ (when $$p > 0$$, irreducible) → $$\\text{arsinh}$$\n+ $$\\sqrt{(x+b)^2 - a^2}$$ (when $$p > 0$$, real roots) → $$\\text{arcosh}$$\n- Step 2: Substitute $$u = x + b$$ to shift to standard form.\n- Step 3: Apply the matching standard result and back-substitute.\n\nSign of the $$x^2$$ coefficient determines whether you head toward $$\\arcsin$$ (negative) or $$\\text{arsinh}$$/$$\\text{arcosh}$$ (positive).", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "For $$\\int \\frac{1}{\\sqrt{4 - 2x - x^2}}\\, dx$$, complete the square and identify the standard form. (3 steps)", "answer": "- Step 1: Factor out negative: $$4 - 2x - x^2 = -(x^2 + 2x - 4)$$. Complete inside: $$x^2 + 2x - 4 = (x+1)^2 - 5$$.\n- Step 2: So $$4 - 2x - x^2 = 5 - (x+1)^2$$. This is $$a^2 - u^2$$ form with $$a = \\sqrt{5}$$ and $$u = x+1$$.\n- Step 3: Apply $$\\int \\frac{1}{\\sqrt{a^2 - u^2}}\\, du = \\arcsin(u/a) + C$$, giving $$\\arcsin\\left(\\frac{x+1}{\\sqrt{5}}\\right) + C$$.\n\nA negative coefficient on $$x^2$$ inside a square root strongly hints at $$\\arcsin$$. Always factor out the sign before completing the square.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "For $$\\int \\frac{1}{x^2 - 8x + 8}\\, dx$$, complete the square and identify the standard form. (4 steps)", "answer": "- Step 1: Complete the square: $$x^2 - 8x + 8 = (x-4)^2 - 8$$.\n- Step 2: This is $$u^2 - a^2$$ form with $$u = x-4$$ and $$a = \\sqrt{8} = 2\\sqrt{2}$$.\n- Step 3: Use the log form: $$\\int \\frac{1}{u^2 - a^2}\\, du = \\frac{1}{2a}\\ln\\left|\\frac{u-a}{u+a}\\right| + C$$.\n- Step 4: Substituting: $$\\frac{1}{4\\sqrt{2}}\\ln\\left|\\frac{x-4-2\\sqrt{2}}{x-4+2\\sqrt{2}}\\right| + C$$ (or equivalently $$\\frac{\\sqrt{2}}{8}\\ln|\\cdots|$$).\n\nThe decision between $$\\arctan$$ form and log form depends on whether the constant after completing the square is positive (irreducible — $$\\arctan$$) or negative (reducible — log).", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Why does the \"× 1\" trick (rewriting $$\\int f(x)\\, dx$$ as $$\\int f(x)\\cdot 1\\, dx$$ for integration by parts) work for inverse functions like $$\\arcsin x$$, $$\\arctan x$$, $$\\text{arsinh}\\, x$$? (3 steps)", "answer": "- Step 1: Inverse functions have no obvious antiderivative, but their **derivatives** are simple algebraic expressions (e.g., $$\\frac{d}{dx}\\arcsin x = \\frac{1}{\\sqrt{1-x^2}}$$).\n- Step 2: IBP uses $$\\int u\\, dv = uv - \\int v\\, du$$. Choose $$u$$ = inverse function (which differentiates to something nice) and $$dv = 1\\, dx$$ (so $$v = x$$).\n- Step 3: The resulting integral $$\\int v\\, du = \\int x \\cdot (\\text{inverse's derivative})\\, dx$$ has a tractable algebraic form, often solvable by power-rule or log-rule recognition.\n\nSame trick as $$\\int \\ln x\\, dx = x\\ln x - x + C$$. Works for **any** function whose derivative is a tractable algebraic expression.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "Derive $$\\int \\arctan x\\, dx = x\\arctan x - \\frac{1}{2}\\ln(1+x^2) + C$$. (4 steps)", "answer": "- Step 1: Write as $$\\int \\arctan x \\cdot 1\\, dx$$. Use IBP with $$u = \\arctan x$$, $$dv = dx$$.\n- Step 2: Then $$du = \\frac{1}{1+x^2}\\, dx$$, $$v = x$$. So $$\\int \\arctan x\\, dx = x\\arctan x - \\int \\frac{x}{1+x^2}\\, dx$$.\n- Step 3: Recognize $$\\frac{x}{1+x^2} = \\frac{1}{2}\\cdot\\frac{2x}{1+x^2}$$, which is $$\\frac{1}{2}\\cdot\\frac{f'(x)}{f(x)}$$ with $$f = 1+x^2$$. Integrates to $$\\frac{1}{2}\\ln(1+x^2)$$ (no modulus since $$1+x^2 > 0$$).\n- Step 4: Combine: $$x\\arctan x - \\frac{1}{2}\\ln(1+x^2) + C$$.\n\nFor $$\\int \\arctan(kx)\\, dx$$, the same procedure yields $$x\\arctan(kx) - \\frac{1}{2k}\\ln(1 + k^2 x^2) + C$$.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Derive $$\\int \\text{arsinh}\\, x\\, dx = x\\,\\text{arsinh}\\, x - \\sqrt{1+x^2} + C$$. (4 steps)", "answer": "- Step 1: IBP with $$u = \\text{arsinh}\\, x$$, $$dv = dx$$, so $$du = \\frac{1}{\\sqrt{1+x^2}}\\, dx$$, $$v = x$$.\n- Step 2: $$\\int \\text{arsinh}\\, x\\, dx = x\\,\\text{arsinh}\\, x - \\int \\frac{x}{\\sqrt{1+x^2}}\\, dx$$.\n- Step 3: For $$\\int x(1+x^2)^{-1/2}\\, dx$$: with $$f = 1+x^2$$, $$f' = 2x$$, this is $$\\frac{1}{2}f^{-1/2}f'$$, integrating to $$\\sqrt{1+x^2}$$.\n- Step 4: Combine: $$x\\,\\text{arsinh}\\, x - \\sqrt{1+x^2} + C$$.\n\nStructural symmetry with $$\\int \\arctan x\\, dx$$: both produce [variable × inverse function] minus [a function involving the radical/quadratic from the inverse's derivative].", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Derive $$\\int \\text{artanh}\\, x\\, dx = x\\,\\text{artanh}\\, x + \\frac{1}{2}\\ln|1-x^2| + C$$. (4 steps)", "answer": "- Step 1: IBP with $$u = \\text{artanh}\\, x$$, $$dv = dx$$, so $$du = \\frac{1}{1-x^2}\\, dx$$, $$v = x$$.\n- Step 2: $$\\int \\text{artanh}\\, x\\, dx = x\\,\\text{artanh}\\, x - \\int \\frac{x}{1-x^2}\\, dx$$.\n- Step 3: Notice $$\\frac{x}{1-x^2} = -\\frac{1}{2}\\cdot\\frac{-2x}{1-x^2}$$. With $$f = 1-x^2$$, $$f' = -2x$$, this is $$-\\frac{1}{2}\\cdot\\frac{f'}{f}$$, integrating to $$-\\frac{1}{2}\\ln|1-x^2|$$.\n- Step 4: With the sign of the IBP minus: $$x\\,\\text{artanh}\\, x + \\frac{1}{2}\\ln|1-x^2| + C$$.\n\nSign care: track the minus from IBP and the minus from rewriting $$\\frac{x}{1-x^2}$$. They combine to a plus.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "What is a reduction formula and why is it useful? (3 steps)", "answer": "- Step 1: A reduction formula relates an integral $$I_n$$ (involving an integer parameter $$n$$, usually a power) to a similar integral with a smaller index, like $$I_{n-1}$$ or $$I_{n-2}$$.\n- Step 2: It's useful when direct methods become unwieldy as $$n$$ grows. E.g., $$\\int \\sin^2 x\\, dx$$ uses double-angle, $$\\int \\sin^3 x\\, dx$$ peels a factor, but $$\\int \\sin^{10} x\\, dx$$ would chain many such manipulations.\n- Step 3: With a reduction formula like $$nI_n = (n-1)I_{n-2}$$, you mechanically step down: $$I_{10} \\to I_8 \\to \\dots \\to I_0$$, evaluating only the base case.\n\nBig picture: reduction formulas replace many ad-hoc manipulations with a single recursive rule. Set up once, then apply repeatedly.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Derive the reduction formula $$I_n = x^n e^x - n I_{n-1}$$ for $$I_n = \\int x^n e^x\\, dx$$ where $$n \\geq 1$$. (3 steps)", "answer": "- Step 1: Apply IBP with $$u = x^n$$, $$dv = e^x\\, dx$$. Then $$du = nx^{n-1}\\, dx$$, $$v = e^x$$.\n- Step 2: $$I_n = x^n e^x - \\int nx^{n-1}e^x\\, dx = x^n e^x - n\\int x^{n-1}e^x\\, dx$$.\n- Step 3: The remaining integral is $$I_{n-1}$$ by definition, so $$I_n = x^n e^x - nI_{n-1}$$.\n\nMechanism: differentiating $$x^n$$ reduces the power to $$n-1$$, while $$e^x$$ is unchanged by integration. Each IBP step lowers the power by 1, eventually reaching $$I_0 = e^x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Use $$I_n = x^n e^x - nI_{n-1}$$ to find $$\\int x^4 e^x\\, dx$$ conceptually (describe the unwinding pattern, no need for explicit arithmetic). (3 steps)", "answer": "- Step 1: $$I_4 = x^4 e^x - 4I_3 = x^4 e^x - 4(x^3 e^x - 3I_2)$$. Expand: $$x^4 e^x - 4x^3 e^x + 12 I_2$$.\n- Step 2: Continue unwinding: $$I_2 = x^2 e^x - 2I_1$$, $$I_1 = xe^x - I_0$$, $$I_0 = e^x$$. Each substitution introduces a new $$x^k e^x$$ term with coefficient from a falling factorial.\n- Step 3: Final structure: $$e^x \\times$$ (polynomial of degree 4 with alternating-sign coefficients): $$x^4 e^x - 4x^3 e^x + 12x^2 e^x - 24xe^x + 24e^x + C$$. The coefficients $$1, 4, 12, 24, 24$$ are $$\\frac{4!}{(4-k)!}$$.\n\nPattern: each level produces $$x^k e^x$$ with falling-factorial coefficients and alternating signs. This is essentially the Taylor-like structure of the antiderivative.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Derive the reduction formula $$nI_n = (n-1)I_{n-2}$$ for $$I_n = \\int_0^{\\pi/2}\\sin^n x\\, dx$$, $$n \\geq 2$$. (5 steps)", "answer": "- Step 1: Write $$\\sin^n x = \\sin^{n-1} x \\cdot \\sin x$$. Use IBP with $$u = \\sin^{n-1} x$$, $$dv = \\sin x\\, dx$$: $$du = (n-1)\\sin^{n-2}x\\cos x\\, dx$$, $$v = -\\cos x$$.\n- Step 2: $$I_n = [-\\sin^{n-1}x\\cos x]_0^{\\pi/2} + \\int_0^{\\pi/2}(n-1)\\sin^{n-2}x\\cos^2 x\\, dx$$. Boundary terms vanish at both ends.\n- Step 3: Use $$\\cos^2 x = 1 - \\sin^2 x$$ to rewrite: $$I_n = (n-1)\\int_0^{\\pi/2}\\sin^{n-2}x\\, dx - (n-1)\\int_0^{\\pi/2}\\sin^n x\\, dx$$.\n- Step 4: That's $$I_n = (n-1)I_{n-2} - (n-1)I_n$$.\n- Step 5: Rearrange: $$I_n + (n-1)I_n = (n-1)I_{n-2}$$, i.e., $$nI_n = (n-1)I_{n-2}$$.\n\nThe Pythagorean identity creates both $$I_n$$ (back to original) and $$I_{n-2}$$ in the algebra. Solving the resulting linear equation in $$I_n$$ gives the reduction.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "For $$I_n = \\int_0^{\\pi/2}\\sin^n x\\, dx$$, what's different between odd and even $$n$$, and what are the base cases? (3 steps)", "answer": "- Step 1: $$I_n = \\frac{n-1}{n}I_{n-2}$$ steps down by 2. Odd $$n$$ reduces to $$I_1$$; even $$n$$ reduces to $$I_0$$.\n- Step 2: Odd: $$I_1 = \\int_0^{\\pi/2}\\sin x\\, dx = 1$$. So $$I_n = \\left(\\frac{n-1}{n}\\right)\\left(\\frac{n-3}{n-2}\\right)\\cdots\\left(\\frac{2}{3}\\right)\\cdot 1$$ — purely rational.\n- Step 3: Even: $$I_0 = \\int_0^{\\pi/2} 1\\, dx = \\pi/2$$. So $$I_n = \\left(\\frac{n-1}{n}\\right)\\cdots\\left(\\frac{1}{2}\\right)\\cdot\\frac{\\pi}{2}$$ — always carries a factor of $$\\pi$$.\n\nThis is the **Wallis product** structure. Even cases produce $$\\pi$$ from $$I_0 = \\pi/2$$; odd cases give rational answers. So $$I_5 = \\frac{4\\cdot 2}{5\\cdot 3} = \\frac{8}{15}$$ and $$I_6 = \\frac{5\\cdot 3\\cdot 1}{6\\cdot 4\\cdot 2}\\cdot\\frac{\\pi}{2} = \\frac{5\\pi}{32}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "Derive $$I_n = \\frac{1}{n-1}\\tan^{n-1}x - I_{n-2}$$ for $$I_n = \\int \\tan^n x\\, dx$$ **without** using IBP. (4 steps)", "answer": "- Step 1: Write $$\\tan^n x = \\tan^{n-2}x \\cdot \\tan^2 x$$. Use $$\\tan^2 x = \\sec^2 x - 1$$.\n- Step 2: $$\\int \\tan^n x\\, dx = \\int \\tan^{n-2}x\\sec^2 x\\, dx - \\int \\tan^{n-2}x\\, dx$$.\n- Step 3: First integral: $$f = \\tan x$$, $$f' = \\sec^2 x$$, so it's $$\\frac{f^{n-1}}{n-1} = \\frac{\\tan^{n-1}x}{n-1}$$ via the power rule.\n- Step 4: Second integral is $$I_{n-2}$$. So $$I_n = \\frac{\\tan^{n-1}x}{n-1} - I_{n-2}$$.\n\nMore elegant than IBP for tangent powers. The Pythagorean identity does the heavy lifting. Same trick applies to $$\\tanh^n$$ via $$\\tanh^2 = 1 - \\text{sech}^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Strategically, when should you reduce by 1 vs by 2 in a reduction formula? (3 steps)", "answer": "- Step 1: **Reduce by 1** when IBP naturally produces the same form with the power dropped — e.g., $$\\int x^n e^x\\, dx$$. Differentiating $$x^n$$ drops one power; no identity needed; the reduction is \"self-similar\" in shape.\n- Step 2: **Reduce by 2** when IBP produces a Pythagorean-style identity yielding both the original $$I_n$$ and a 2-step-lower $$I_{n-2}$$. E.g., $$\\int \\sin^n x\\, dx$$: IBP introduces $$\\cos^2 x = 1 - \\sin^2 x$$, splitting into $$I_{n-2}$$ and $$I_n$$.\n- Step 3: Reduction by 2 also occurs when an identity directly converts the $$n$$-th power without IBP — e.g., $$\\tan^n x = \\tan^{n-2}x(\\sec^2 x - 1)$$ gives an immediate $$I_{n-2}$$ relation.\n\nSummary: by-1 with simple polynomial multipliers (like $$x^n$$); by-2 with trig/hyperbolic powers where Pythagorean identities create the gap.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Why does the reduction formula for $$\\int_0^1 x^n\\sqrt{1-x}\\, dx$$ require an algebraic identity in addition to IBP? (3 steps)", "answer": "- Step 1: IBP with $$u = x^n$$, $$dv = \\sqrt{1-x}\\, dx$$ gives $$v = -\\frac{2}{3}(1-x)^{3/2}$$. The result has $$(1-x)^{3/2}$$, **not** $$(1-x)^{1/2}$$ — out of the original $$I_n$$ family.\n- Step 2: Use identity $$(1-x)^{3/2} = (1-x)\\sqrt{1-x} = \\sqrt{1-x} - x\\sqrt{1-x}$$ to rewrite. Now both pieces have $$\\sqrt{1-x}$$ in the standard form.\n- Step 3: This produces $$I_{n-1}$$ and $$I_n$$. Solving for $$I_n$$: $$I_n = \\frac{2n}{2n+3}I_{n-1}$$.\n\nThe mechanism: IBP changes the radical's exponent, taking us out of the family. An identity brings us back, and the resulting linear equation in $$I_n$$ closes the recursion.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Use the reduction formula $$I_n = \\frac{n-1}{n}I_{n-2}$$ to find $$\\int_0^{\\pi/2}\\sin^7 x\\, dx$$ conceptually. (3 steps)", "answer": "- Step 1: $$n = 7$$ is odd, so step down to $$I_1$$: $$I_7 = \\frac{6}{7}I_5 = \\frac{6}{7}\\cdot\\frac{4}{5}I_3 = \\frac{6}{7}\\cdot\\frac{4}{5}\\cdot\\frac{2}{3}I_1$$.\n- Step 2: $$I_1 = \\int_0^{\\pi/2}\\sin x\\, dx = 1$$.\n- Step 3: Multiply: $$I_7 = \\frac{6\\cdot 4\\cdot 2}{7\\cdot 5\\cdot 3} = \\frac{48}{105} = \\frac{16}{35}$$.\n\nFor odd $$n$$, the answer is purely rational (no $$\\pi$$). For even $$n$$, $$\\pi/2$$ enters from $$I_0$$. This is a structural feature of the Wallis-style reduction.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "Derive the arc length formula $$\\frac{ds}{dx} = \\sqrt{1 + (dy/dx)^2}$$ from first principles. (4 steps)", "answer": "- Step 1: Consider nearby points $$P(x, y)$$ and $$Q(x+\\delta x, y + \\delta y)$$ on the curve. The chord $$PQ$$ approximates the arc $$\\delta s$$.\n- Step 2: Pythagoras: $$(\\delta s)^2 \\approx (\\delta x)^2 + (\\delta y)^2$$. Divide by $$(\\delta x)^2$$: $$\\left(\\frac{\\delta s}{\\delta x}\\right)^2 \\approx 1 + \\left(\\frac{\\delta y}{\\delta x}\\right)^2$$.\n- Step 3: Take limit $$\\delta x \\to 0$$: $$\\left(\\frac{ds}{dx}\\right)^2 = 1 + \\left(\\frac{dy}{dx}\\right)^2$$. Take positive square root (so $$s$$ increases with $$x$$).\n- Step 4: Integrate to get total arc length: $$s = \\int_a^b \\sqrt{1 + (dy/dx)^2}\\, dx$$.\n\nIntuition: every tiny piece of curve looks locally like a straight line. Pythagoras gives that line's length; integration sums infinitely many. The \"1\" inside the radical is the horizontal contribution; $$(dy/dx)^2$$ is the vertical-to-horizontal slope contribution.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "State the three forms of the arc length formula and when each is preferable. (3 steps)", "answer": "- Step 1: Cartesian in $$x$$: $$s = \\int_{x_A}^{x_B}\\sqrt{1 + (dy/dx)^2}\\, dx$$ — preferred when $$y = f(x)$$ explicitly and $$dy/dx$$ is simple.\n- Step 2: Cartesian in $$y$$: $$s = \\int_{y_A}^{y_B}\\sqrt{1 + (dx/dy)^2}\\, dy$$ — preferred for vertical tangents (where $$dy/dx \\to \\infty$$ but $$dx/dy = 0$$).\n- Step 3: Parametric: $$s = \\int_{t_A}^{t_B}\\sqrt{(dx/dt)^2 + (dy/dt)^2}\\, dt$$ — preferred for parametric curves; symmetric, doesn't favor one variable.\n\nAll three are equivalent when applicable. Choose based on which gives an integrable expression after squaring and adding.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Why is the squaring of $$dy/dx$$ in the arc length formula significant — does the curve direction matter?", "answer": "No, the curve's direction (slope sign) doesn't affect arc length. The expression $$(dy/dx)^2$$ depends only on the **magnitude** of the slope. A curve going up at slope $$+m$$ and one going down at slope $$-m$$ contribute the same arc element, because squaring removes sign. Geometrically, this is correct: arc length is an unsigned positive quantity measuring distance along the path. Whether you walk up a hill or down it, the path length is the same. Contrast with signed integrals like $$\\int (dy/dx)\\, dx = y(b) - y(a)$$, which depend on direction.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "A curve has $$\\sqrt{(dx/dt)^2 + (dy/dt)^2}$$ that simplifies to a perfect square. Why is this the **ideal** scenario for arc length? (3 steps)", "answer": "- Step 1: If $$(dx/dt)^2 + (dy/dt)^2 = [g(t)]^2$$, then the radical collapses: $$\\sqrt{...} = |g(t)|$$ — no troublesome radical in the integrand.\n- Step 2: The arc length integral becomes $$s = \\int_{t_A}^{t_B}|g(t)|\\, dt$$ — a \"pure\" integral with no radicals.\n- Step 3: Examples of nice curves: $$y = \\cosh x$$ (catenary) gives $$1 + \\sinh^2 x = \\cosh^2 x$$. The cycloid $$x = a(\\theta - \\sin\\theta), y = a(1-\\cos\\theta)$$ gives $$2a^2(1 - \\cos\\theta) = 4a^2\\sin^2(\\theta/2)$$. Both are perfect squares.\n\nMost curves give $$\\sqrt{\\text{quadratic}}$$ requiring trig/hyperbolic substitution. The \"nice\" curves where the radical collapses are special and historically significant.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "Find the arc length of $$y = \\frac{1}{2}x^2$$ from origin to $$x = 4$$ conceptually. What technique handles the integral? (4 steps)", "answer": "- Step 1: $$\\frac{dy}{dx} = x$$, so the integrand is $$\\sqrt{1 + x^2}$$.\n- Step 2: Arc length $$= \\int_0^4 \\sqrt{1+x^2}\\, dx$$. Use $$x = \\sinh u$$, giving $$dx = \\cosh u\\, du$$, $$\\sqrt{1+x^2} = \\cosh u$$.\n- Step 3: Integral becomes $$\\int_0^{\\text{arsinh}\\, 4}\\cosh^2 u\\, du$$, which uses $$\\cosh^2 u = (1 + \\cosh 2u)/2$$.\n- Step 4: Final closed form: $$\\frac{1}{2}\\text{arsinh}\\, 4 + 2\\sqrt{17} = \\frac{1}{2}\\ln(4 + \\sqrt{17}) + 2\\sqrt{17}$$.\n\nPattern: any time arc length gives $$\\sqrt{1 + (\\text{linear})^2}$$ (parabolas, lines), the natural technique is the $$\\sinh$$ substitution. Result usually involves an inverse hyperbolic plus a polynomial-like term.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "Verify the arc length formula gives the circumference of a circle $$x = r\\cos\\theta, y = r\\sin\\theta$$. (3 steps)", "answer": "- Step 1: Compute derivatives: $$\\frac{dx}{d\\theta} = -r\\sin\\theta$$, $$\\frac{dy}{d\\theta} = r\\cos\\theta$$.\n- Step 2: Radicand: $$\\sqrt{r^2\\sin^2\\theta + r^2\\cos^2\\theta} = r$$ — a constant! Pythagorean identity collapses everything.\n- Step 3: Total circumference: $$\\int_0^{2\\pi} r\\, d\\theta = 2\\pi r$$. ✓\n\nSanity check: parametric arc length reproduces the well-known $$2\\pi r$$. The constant integrand reflects that parametric speed is uniform on a circle when parameterized by angle.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "A curve has a vertical tangent at some point. What might happen to the arc length integral, and how do we handle it? (3 steps)", "answer": "- Step 1: At a vertical tangent, $$dy/dx \\to \\infty$$, so $$\\sqrt{1 + (dy/dx)^2}$$ is unbounded. The integral $$\\int \\sqrt{1+(dy/dx)^2}\\, dx$$ may converge as an improper integral or may diverge.\n- Step 2: Workaround: switch to $$\\int\\sqrt{1 + (dx/dy)^2}\\, dy$$. At a vertical tangent, $$dx/dy = 0$$, so the integrand is finite there.\n- Step 3: Even better: parametric form $$\\sqrt{(dx/dt)^2 + (dy/dt)^2}$$, with a parameter $$t$$ well-behaved everywhere on the curve.\n\nPractical lesson: the \"right\" form of arc length depends on the curve's geometry. Vertical tangents call for $$dx/dy$$ or parametric form.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "Derive the surface area formula $$S = 2\\pi \\int y\\, ds$$ for rotation about the $$x$$-axis. (5 steps)", "answer": "- Step 1: Rotate a small arc $$\\delta s$$ about the $$x$$-axis. The arc traces a thin band, approximated by a frustum of a cone with radii $$y$$ and $$y + \\delta y$$ and slant height $$\\delta s$$.\n- Step 2: Surface area of a frustum (cone minus cone): $$\\pi(r_1 + r_2)l$$. With $$r_1 = y$$, $$r_2 = y + \\delta y$$, $$l = \\delta s$$: $$\\delta S \\approx \\pi(2y + \\delta y)\\delta s$$.\n- Step 3: As $$\\delta y \\to 0$$: $$dS = 2\\pi y\\, ds$$.\n- Step 4: Integrate: $$S = \\int 2\\pi y\\, ds$$.\n- Step 5: Geometric meaning: $$2\\pi y$$ is the **circumference** of the circle traced at height $$y$$; $$ds$$ is the arc element being swept around. Their product is the band's area.\n\nEach tiny arc sweeps a thin band; band area = (length around) × (length along) = $$2\\pi y \\times ds$$. The integral sums these bands.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "State the four standard surface-of-revolution formulae (Cartesian and parametric, for rotation about $$x$$- and $$y$$-axes). (4 steps)", "answer": "- Step 1: Rotation about $$x$$-axis, Cartesian: $$S = 2\\pi\\int_{x_A}^{x_B} y\\sqrt{1 + (dy/dx)^2}\\, dx$$.\n- Step 2: Rotation about $$x$$-axis, parametric: $$S = 2\\pi\\int_{t_A}^{t_B} y\\sqrt{(dx/dt)^2 + (dy/dt)^2}\\, dt$$.\n- Step 3: Rotation about $$y$$-axis, Cartesian: $$S = 2\\pi\\int x\\sqrt{1 + (dy/dx)^2}\\, dx$$ (often more convenient than the $$dy$$-version).\n- Step 4: Rotation about $$y$$-axis, parametric: $$S = 2\\pi\\int_{t_A}^{t_B} x\\sqrt{(dx/dt)^2 + (dy/dt)^2}\\, dt$$.\n\nMemory rule: the radius factor ($$y$$ or $$x$$) corresponds to the **distance from the axis of rotation**. The \"$$ds$$\" term (radical) is the same as in arc length — it's the arc element.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "Why does the integrand for surface area about the $$x$$-axis use $$y$$ but the integrand for arc length doesn't? (3 steps)", "answer": "- Step 1: Arc length measures the **length** of the curve — purely 1-dimensional. Each tiny piece has length $$ds$$, summed straight: $$L = \\int ds$$.\n- Step 2: Surface area of revolution measures a 2D surface. Each tiny arc piece sweeps a circle of circumference $$2\\pi y$$ when rotated about the $$x$$-axis. The strip has area $$2\\pi y \\cdot ds$$.\n- Step 3: So the $$y$$ factor accounts for **rotational sweep** — the curve's distance from the axis determines how big a circle each point traces. Arc length doesn't involve rotation, so no $$y$$ factor.\n\nThe $$y$$ in surface formulas is a **circumference factor**, geometric, encoding \"how far from the axis am I?\"", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "Why does the integrand contain $$y$$ (not $$y^2$$) when computing surface area about the $$x$$-axis?", "answer": "The $$y$$ in the surface area formula $$S = 2\\pi\\int y\\, ds$$ encodes the **circumference** $$2\\pi y$$ of the circle traced at height $$y$$. Common confusion: students sometimes write $$y^2$$, but that's the formula for **disk area** in volume calculations: $$V = \\pi\\int y^2\\, dx$$ uses $$\\pi y^2$$ for cross-sectional disks. For surfaces, we have **rings** (circumferences = $$2\\pi y$$), not disks (areas = $$\\pi y^2$$). The dimensional check confirms: surface area should be $$L^2$$ (matches $$y \\cdot ds$$); volume should be $$L^3$$ (matches $$y^2 \\cdot dx$$).", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "Verify the surface-of-revolution formula by computing the surface area of a sphere. (4 steps)", "answer": "- Step 1: Parameterize the upper semicircle: $$x = R\\cos\\theta$$, $$y = R\\sin\\theta$$, $$\\theta \\in [0, \\pi]$$. Rotating about $$x$$-axis sweeps the full sphere.\n- Step 2: Compute $$\\sqrt{(dx/d\\theta)^2 + (dy/d\\theta)^2} = \\sqrt{R^2\\sin^2\\theta + R^2\\cos^2\\theta} = R$$.\n- Step 3: Integrand: $$y\\sqrt{...} = R\\sin\\theta \\cdot R = R^2\\sin\\theta$$.\n- Step 4: $$S = 2\\pi\\int_0^\\pi R^2\\sin\\theta\\, d\\theta = 2\\pi R^2 \\cdot 2 = 4\\pi R^2$$. ✓\n\nThe Pythagorean identity makes the radical constant — a hallmark of nice rotational surfaces. This sanity check should always work for spheres, cones, cylinders.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "What's the connection between the volume of revolution formula $$V = \\pi\\int y^2\\, dx$$ and the surface area formula $$S = 2\\pi\\int y\\, ds$$? (3 steps)", "answer": "- Step 1: Volume: each thin slice (disk/washer) has area $$\\pi y^2$$ and volume $$\\pi y^2 \\cdot dx$$. Sum: $$V = \\pi\\int y^2\\, dx$$.\n- Step 2: Surface: each thin band (frustum side) has area $$2\\pi y \\cdot ds$$ (circumference × slant). Sum: $$S = 2\\pi\\int y\\, ds$$.\n- Step 3: Volume measures bulk filled (uses disk **area** $$\\pi r^2$$); surface measures the skin (uses ring **circumference** $$2\\pi r$$). Different geometric quantities, different formulas.\n\nCommon mistake: mixing $$y$$ vs $$y^2$$. Dimensional check: volume is $$L^3$$, surface is $$L^2$$ — formulas reflect this.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": true}, {"question": "What's the geometric meaning of \"$$ds$$\" in the surface-of-revolution formula $$S = 2\\pi\\int y\\, ds$$? (3 steps)", "answer": "- Step 1: $$ds$$ is the **arc element** — an infinitesimal length along the curve being rotated. Same $$ds$$ as in arc length: $$L = \\int ds$$.\n- Step 2: Mathematically: $$ds = \\sqrt{dx^2 + dy^2}$$, or in different parameterizations, $$\\sqrt{1 + (dy/dx)^2}\\, dx$$, $$\\sqrt{(dx/dt)^2 + (dy/dt)^2}\\, dt$$, etc.\n- Step 3: When this small piece of curve is rotated about the $$x$$-axis, it sweeps a thin band of width $$ds$$ (slant) and length around $$2\\pi y$$ (circumference). Total band area: $$2\\pi y \\cdot ds$$.\n\nSo $$ds$$ encodes local arc length, $$2\\pi y$$ encodes circumference at that point. Their product is the area swept by an infinitesimal arc element under rotation.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "A region under $$y = \\sinh x$$ from $$0$$ to $$1$$ is rotated about the $$x$$-axis. Why does using $$\\sinh^2 x = \\frac{\\cosh 2x - 1}{2}$$ give a clean volume calculation? (3 steps)", "answer": "- Step 1: Volume: $$V = \\pi\\int_0^1 \\sinh^2 x\\, dx$$. Direct integration of $$\\sinh^2 x$$ has no obvious antiderivative.\n- Step 2: Identity converts it: $$\\sinh^2 x = \\frac{\\cosh 2x - 1}{2}$$, splitting into elementary terms.\n- Step 3: Both terms integrate trivially: $$\\int \\cosh 2x\\, dx = \\frac{\\sinh 2x}{2}$$, $$\\int 1\\, dx = x$$. Result is a closed-form expression.\n\nLesson: any time you see $$\\sinh^2, \\cosh^2, \\sin^2, \\cos^2$$ in a definite integral, the double-angle identity is your fastest tool. It converts an unintegrable square into a linear combination of trivial integrals.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": false}, {"question": "What error occurs if you forget to change the limits when doing a substitution in a definite integral? (3 steps)", "answer": "- Step 1: After substituting $$u = g(x)$$, the integrand is in terms of $$u$$, but the limits should also become $$g(a)$$ and $$g(b)$$, not the original $$a$$ and $$b$$.\n- Step 2: Forgetting to change limits means evaluating the new integrand at the **wrong values** — a numerically meaningless result.\n- Step 3: Two consistent strategies:\n+ Change limits to match $$u$$, evaluate without substituting back.\n+ Do the indefinite integral, substitute back to $$x$$, then evaluate at original $$a, b$$.\n\nThe trap is mixing: using $$x$$-limits with a $$u$$-integrand. Pick one strategy and commit.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": true}, {"question": "Derive the cosine reduction formula: for $$I_n = \\int \\cos^n x\\, dx$$, show $$nI_n = \\cos^{n-1} x \\sin x + (n-1)I_{n-2}$$. (4 steps)", "answer": "- Step 1: Write $$\\cos^n x = \\cos^{n-1}x \\cdot \\cos x$$. IBP: $$u = \\cos^{n-1}x$$, $$dv = \\cos x\\, dx$$, so $$du = -(n-1)\\cos^{n-2}x\\sin x\\, dx$$, $$v = \\sin x$$.\n- Step 2: $$I_n = \\cos^{n-1}x \\sin x + (n-1)\\int \\cos^{n-2}x\\sin^2 x\\, dx$$.\n- Step 3: Use $$\\sin^2 x = 1 - \\cos^2 x$$: $$I_n = \\cos^{n-1}x\\sin x + (n-1)I_{n-2} - (n-1)I_n$$.\n- Step 4: Rearrange: $$I_n + (n-1)I_n = \\cos^{n-1}x\\sin x + (n-1)I_{n-2}$$, i.e., $$nI_n = \\cos^{n-1}x\\sin x + (n-1)I_{n-2}$$.\n\nIdentical structure to the sine reduction — just with a non-vanishing boundary term in the indefinite case (the $$\\cos^{n-1}x\\sin x$$ term).", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": true}, {"question": "Why does the trick $$\\int \\sec x\\, dx = \\ln|\\sec x + \\tan x| + C$$ work for trig but not for $$\\text{sech}\\, x$$? (4 steps)", "answer": "- Step 1: For $$\\sec x$$: differentiate $$\\ln|\\sec x + \\tan x|$$. Chain rule gives $$\\frac{\\sec x\\tan x + \\sec^2 x}{\\sec x + \\tan x} = \\frac{\\sec x(\\tan x + \\sec x)}{\\sec x + \\tan x} = \\sec x$$. The numerator factors out the denominator!\n- Step 2: For $$\\text{sech}\\, x$$: try $$\\ln|\\text{sech}\\, x + \\tanh x|$$. Differentiate: $$\\frac{-\\text{sech}\\, x\\tanh x + \\text{sech}^2 x}{\\text{sech}\\, x + \\tanh x}$$. The signs in the numerator (minus from $$d/dx(\\text{sech})$$) prevent the same factoring.\n- Step 3: The numerator does NOT simplify to a multiple of the denominator.\n- Step 4: Instead, use $$u = e^x$$: $$\\int \\text{sech}\\, x\\, dx = 2\\arctan(e^x) + C$$.\n\nThe asymmetry between $$\\sec$$ and $$\\text{sech}$$ stems from the sign differences in their derivative formulas. The \"clever multiplication\" trick is brittle and doesn't transfer.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": true}, {"question": "Walk through $$\\int \\cosh^5 x\\, dx$$ conceptually using the odd-power strategy. (4 steps)", "answer": "- Step 1: Power 5 is odd. Peel off one $$\\cosh x$$: $$\\cosh^5 x = \\cosh^4 x \\cdot \\cosh x$$.\n- Step 2: Convert $$\\cosh^4 x = (\\cosh^2 x)^2 = (1 + \\sinh^2 x)^2 = 1 + 2\\sinh^2 x + \\sinh^4 x$$.\n- Step 3: So integrand is $$(1 + 2\\sinh^2 x + \\sinh^4 x)\\cosh x$$. Each term is a power of $$\\sinh x$$ times $$\\cosh x = (\\sinh x)'$$ — perfect power-rule pattern.\n- Step 4: Term by term: $$\\sinh x + \\frac{2}{3}\\sinh^3 x + \\frac{1}{5}\\sinh^5 x + C$$.\n\nStrategy works for any odd power of $$\\cosh$$ or $$\\sinh$$: peel off one factor (becomes the differential), convert remaining even power via Pythagorean identity, expand, use power rule on each term.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "Why does $$u = e^x$$ work cleanly for integrals involving $$\\frac{1}{\\cosh x}$$ or $$\\frac{1}{2\\cosh x - \\sinh x}$$? (3 steps)", "answer": "- Step 1: All hyperbolic functions are linear combinations of $$e^x$$ and $$e^{-x}$$. Multiplying numerator and denominator by $$e^x$$ converts $$e^{-x}$$ to $$1/e^x = 1/u$$.\n- Step 2: With $$u = e^x$$, $$du = e^x\\, dx$$, the integral becomes a rational function of $$u$$. E.g., $$\\frac{1}{\\cosh x} = \\frac{2e^x}{e^{2x}+1}$$ becomes $$\\frac{2}{u^2+1}\\, du$$.\n- Step 3: Rational functions of $$u$$ can be tackled with partial fractions, $$\\arctan$$, or log forms.\n\nHyperbolic functions are **really** rational functions of $$e^x$$, and $$u = e^x$$ makes this explicit. Universal technique for tricky hyperbolic combinations.", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": true}, {"question": "The cycloid $$x = a(\\theta - \\sin\\theta), y = a(1 - \\cos\\theta)$$ has a remarkably clean arc length integrand. Why? (4 steps)", "answer": "- Step 1: Compute $$\\frac{dx}{d\\theta} = a(1-\\cos\\theta)$$, $$\\frac{dy}{d\\theta} = a\\sin\\theta$$.\n- Step 2: $$(dx/d\\theta)^2 + (dy/d\\theta)^2 = a^2(1-\\cos\\theta)^2 + a^2\\sin^2\\theta = a^2(1 - 2\\cos\\theta + \\cos^2\\theta + \\sin^2\\theta) = a^2(2 - 2\\cos\\theta)$$.\n- Step 3: Use $$1 - \\cos\\theta = 2\\sin^2(\\theta/2)$$: this becomes $$4a^2\\sin^2(\\theta/2)$$.\n- Step 4: $$\\sqrt{...} = 2a|\\sin(\\theta/2)|$$ — a perfect square root with no radical complications.\n\nArc length over one arch ($$0$$ to $$2\\pi$$): $$\\int_0^{2\\pi} 2a\\sin(\\theta/2)\\, d\\theta = 8a$$. The perfect-square structure is what makes the cycloid a \"nice\" curve historically.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": true}, {"question": "Find $$\\int \\frac{x^2}{1+x^2}\\, dx$$ using a clever rewrite. (3 steps)", "answer": "- Step 1: The integrand has numerator and denominator of the same degree. This signals **polynomial division**.\n- Step 2: $$\\frac{x^2}{1+x^2} = \\frac{(1+x^2) - 1}{1+x^2} = 1 - \\frac{1}{1+x^2}$$.\n- Step 3: Integrate: $$\\int 1\\, dx - \\int \\frac{1}{1+x^2}\\, dx = x - \\arctan x + C$$.\n\nTrick generalizes: when you see $$\\frac{\\text{polynomial}}{\\text{polynomial of same or higher degree}}$$, do polynomial division first; the remainder is usually one of the standard forms.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": true}, {"question": "A common confusion: a student computes $$\\int \\frac{1}{\\sqrt{1+x^2}}\\, dx$$ but writes $$\\arctan x$$ as the answer. Diagnose. (3 steps)", "answer": "- Step 1: The student is confusing two different standard forms:\n+ $$\\int \\frac{1}{1+x^2}\\, dx = \\arctan x + C$$ (no square root).\n+ $$\\int \\frac{1}{\\sqrt{1+x^2}}\\, dx = \\text{arsinh}\\, x + C$$ (with square root).\n- Step 2: The square root changes everything: it requires $$x = \\sinh u$$ (so $$\\sqrt{1+x^2} = \\cosh u$$), leading to $$\\text{arsinh}\\, x$$, not $$\\arctan$$.\n- Step 3: Memory aid: the **square root** in the denominator transforms $$\\arctan$$ → $$\\text{arsinh}$$ (analogous to how the square root in $$\\sqrt{1-x^2}$$ gives $$\\arcsin$$ instead of nothing standard).\n\nAlways check carefully: is there a square root or not? It dictates whether you get an inverse trig/hyperbolic function or a logarithm-type answer.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": true}, {"question": "What's the key insight in $$\\int e^x\\sinh x\\, dx$$ via exponential expansion, and why is it faster than IBP? (3 steps)", "answer": "- Step 1: $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$, so $$e^x \\sinh x = \\frac{e^{2x} - 1}{2}$$. The exponential structure collapses immediately.\n- Step 2: Both terms are elementary: $$\\int \\frac{e^{2x}}{2}\\, dx = \\frac{e^{2x}}{4}$$, $$\\int -\\frac{1}{2}\\, dx = -\\frac{x}{2}$$. Total: $$\\frac{e^{2x}}{4} - \\frac{x}{2} + C$$.\n- Step 3: With IBP, you'd integrate twice and end up with the original integral on the right side. The equation gives the answer, but it's slower and more error-prone.\n\nRule of thumb: $$e^{ax}$$ multiplying a hyperbolic function with the same coefficient $$a$$ → **always** use exponential expansion. Coefficients align to produce simple exponentials.", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": true}, {"question": "Why does $$\\int \\frac{1}{\\sqrt{1-x^2}}\\, dx = \\arcsin x$$ but $$\\int \\frac{1}{\\sqrt{x^2-1}}\\, dx = \\text{arcosh}\\, x$$, with the difference of just signs in $$1-x^2$$ vs $$x^2-1$$? (3 steps)", "answer": "- Step 1: $$\\sin\\theta$$ has range $$[-1, 1]$$; its inverse takes $$|x| < 1$$. The identity $$\\sin^2 + \\cos^2 = 1$$ gives $$\\cos\\theta = \\sqrt{1 - x^2}$$, appearing in $$\\frac{d}{dx}\\arcsin x$$.\n- Step 2: $$\\cosh u$$ has range $$[1, \\infty)$$; its inverse takes $$x \\geq 1$$. The identity $$\\cosh^2 - \\sinh^2 = 1$$ gives $$\\sinh u = \\sqrt{x^2 - 1}$$ (for $$u > 0$$), appearing in $$\\frac{d}{dx}\\text{arcosh}\\, x$$.\n- Step 3: The sign flip $$1-x^2$$ vs $$x^2-1$$ is the algebraic reflection of $$\\sin^2+\\cos^2 = 1$$ vs $$\\cosh^2 - \\sinh^2 = 1$$. It's the literal manifestation of the difference between Euclidean rotations (trig) and Lorentzian boosts (hyperbolic).\n\nBeautiful structural connection: trig and hyperbolic functions split because of one sign in their fundamental identity, propagating into derivatives, integrals, and inverses.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": true}, {"question": "Strategically, when integrating $$\\int \\sin^a x \\cos^b x\\, dx$$ on $$[0, \\pi/2]$$, what do you do if both $$a$$ and $$b$$ are even? (3 steps)", "answer": "- Step 1: Convert to a function of one variable using $$\\cos^2 x = 1 - \\sin^2 x$$. So $$\\sin^a x \\cos^b x = \\sin^a x (1-\\sin^2 x)^{b/2}$$.\n- Step 2: Expand the binomial; the integrand becomes a sum of pure powers $$\\sin^k x$$ for various $$k$$.\n- Step 3: Use the Wallis-type reduction values $$I_k = \\int_0^{\\pi/2}\\sin^k x\\, dx$$ for each term.\n\nFor odd powers of either $$\\sin$$ or $$\\cos$$, peel off one factor and use the $$\\sin^2 + \\cos^2 = 1$$ identity to reduce to power-rule form. The strategy depends on the parity of the powers.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": false}, {"question": "Why does the problem of integrating $$\\int \\frac{1}{2\\cosh x - \\sinh x}\\, dx$$ benefit from the substitution $$u = e^x$$? (3 steps)", "answer": "- Step 1: Convert to exponential form: $$2\\cosh x - \\sinh x = (e^x + e^{-x}) - \\frac{e^x - e^{-x}}{2} = \\frac{2e^x + 2e^{-x} - e^x + e^{-x}}{2} = \\frac{e^x + 3e^{-x}}{2}$$.\n- Step 2: Multiply numerator and denominator by $$2e^x$$: $$\\frac{2e^x}{e^{2x} + 3}$$. So the integral is $$\\int \\frac{2e^x}{e^{2x} + 3}\\, dx$$.\n- Step 3: With $$u = e^x$$, $$du = e^x\\, dx$$, this becomes $$\\int \\frac{2}{u^2 + 3}\\, du = \\frac{2}{\\sqrt{3}}\\arctan(u/\\sqrt{3}) + C = \\frac{2}{\\sqrt{3}}\\arctan(e^x/\\sqrt{3}) + C$$.\n\nThe substitution $$u = e^x$$ universally converts hyperbolic combinations to rational functions of $$u$$.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": false}, {"question": "When deriving a reduction formula via IBP, why do we sometimes need an algebraic identity at the end? (3 steps)", "answer": "- Step 1: IBP often produces an integral that's \"almost\" the original $$I_{n-k}$$ form but has an extra factor (like $$\\cos^2 x$$ or $$(1-x)$$) introduced by integrating the chosen $$dv$$.\n- Step 2: That extra factor doesn't naturally fit the $$I_n$$ family. We use a Pythagorean-style identity (like $$\\cos^2 x = 1 - \\sin^2 x$$) to split it: one piece gives $$I_{n-2}$$, the other gives $$I_n$$ back.\n- Step 3: This produces an equation $$I_n = \\text{(stuff)} - kI_n + cI_{n-2}$$, which we solve algebraically for $$I_n$$. Routine \"linear equation\" step.\n\nIf after IBP the remaining integral isn't immediately $$I_{n-1}$$ or $$I_{n-2}$$, try a Pythagorean identity to split it.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": true}, {"question": "A region bounded by $$y = \\arctan x$$, $$y = \\pi/2$$, and $$x = 3$$ is to be found. Why is the \"× 1\" trick essential, and what's the complete strategy? (4 steps)", "answer": "- Step 1: Area requires integrating $$\\arctan x$$, but $$\\arctan x$$ has no elementary direct antiderivative.\n- Step 2: Use the \"× 1\" trick: $$\\int \\arctan x\\, dx = \\int \\arctan x \\cdot 1\\, dx$$. IBP with $$u = \\arctan x$$, $$dv = dx$$ gives $$\\int \\arctan x\\, dx = x\\arctan x - \\frac{1}{2}\\ln(1+x^2) + C$$.\n- Step 3: For the area between $$y = \\arctan x$$ and $$y = \\pi/2$$, write the area as $$\\int_0^3 (\\pi/2 - \\arctan x)\\, dx = \\frac{3\\pi}{2} - \\int_0^3 \\arctan x\\, dx$$.\n- Step 4: Evaluate using the antiderivative.\n\nThe \"× 1\" trick is essential whenever the integrand is an inverse function (or a logarithm). It transforms a hard integral into a tractable IBP problem.", "source": "Opus 4.7 ①", "_id": "opus_1_75", "judge_pick": false}, {"question": "State the key identities used in hyperbolic integration. (4 steps)", "answer": "- Step 1: Pythagorean: $$\\cosh^2 x - \\sinh^2 x = 1$$. Variants: $$\\cosh^2 x = 1 + \\sinh^2 x$$, $$\\sinh^2 x = \\cosh^2 x - 1$$.\n- Step 2: $$1 - \\tanh^2 x = \\text{sech}^2 x$$ and $$\\coth^2 x - 1 = \\text{cosech}^2 x$$.\n- Step 3: Double-angle (used for $$\\cosh^2, \\sinh^2$$ integration): $$\\cosh 2x = 2\\cosh^2 x - 1 = 1 + 2\\sinh^2 x = \\cosh^2 x + \\sinh^2 x$$, $$\\sinh 2x = 2\\sinh x\\cosh x$$.\n- Step 4: Solving for squares: $$\\cosh^2 x = \\frac{1 + \\cosh 2x}{2}$$, $$\\sinh^2 x = \\frac{\\cosh 2x - 1}{2}$$.\n\nThese identities are the \"Swiss Army knife\" of hyperbolic integration. Most problems reduce to applying one or two.", "source": "Opus 4.7 ①", "_id": "opus_1_76", "judge_pick": true}, {"question": "What's the difference in approach between integrating $$\\int \\cosh^2 x\\, dx$$ via identities versus via exponential definition? (3 steps)", "answer": "- Step 1: Via identity: $$\\cosh^2 x = \\frac{1 + \\cosh 2x}{2}$$, so $$\\int \\cosh^2 x\\, dx = \\frac{x}{2} + \\frac{\\sinh 2x}{4} + C$$.\n- Step 2: Via exponential: $$\\cosh^2 x = \\left(\\frac{e^x + e^{-x}}{2}\\right)^2 = \\frac{e^{2x} + 2 + e^{-2x}}{4}$$. Integrate: $$\\frac{e^{2x}}{8} + \\frac{x}{2} - \\frac{e^{-2x}}{8} + C$$.\n- Step 3: These agree because $$\\frac{e^{2x} - e^{-2x}}{8} = \\frac{\\sinh 2x}{4}$$ and the $$\\frac{x}{2}$$ matches. Both are valid; the identity form is usually more compact.\n\nChoice of method: identity is faster for symbolic answers; exponential is more reliable when identities don't directly apply or when you need to verify.", "source": "Opus 4.7 ①", "_id": "opus_1_77", "judge_pick": true}, {"question": "What is the surface area generated when $$y = \\frac{1}{3}\\sqrt{x}(3-x)$$ from $$x=1$$ to $$x=3$$ is rotated about the $$x$$-axis? Outline the conceptual steps. (4 steps)", "answer": "- Step 1: Compute $$\\frac{dy}{dx} = \\frac{1}{2}(x^{-1/2} - x^{1/2})$$. Form $$1 + (dy/dx)^2 = 1 + \\frac{1}{4}(x^{-1} - 2 + x) = \\frac{1}{4}(x^{-1} + 2 + x) = \\frac{1}{4}(x^{-1/2} + x^{1/2})^2$$ — a perfect square!\n- Step 2: So $$\\sqrt{1 + (dy/dx)^2} = \\frac{1}{2}(x^{-1/2} + x^{1/2})$$.\n- Step 3: Surface area: $$S = 2\\pi\\int_1^3 y \\cdot \\frac{1}{2}(x^{-1/2} + x^{1/2})\\, dx$$. Substituting $$y = x^{1/2} - \\frac{1}{3}x^{3/2}$$ and simplifying gives an integrable polynomial.\n- Step 4: Final answer (after term-by-term integration): $$\\frac{16\\pi}{9}$$.\n\nLesson: surfaces often have radicands that are perfect squares **only** for specific curves designed for nice rotational properties. Always check if the radicand factors before reaching for substitution.", "source": "Opus 4.7 ①", "_id": "opus_1_78", "judge_pick": false}, {"question": "When deriving a reduction formula like $$I_n = (n-1)\\sin^{n-2}x\\cos x + (n-1)I_{n-2} - (n-1)I_n$$ (for $$\\int \\sin^n x\\, dx$$ indefinite), why does the boundary term not vanish? (3 steps)", "answer": "- Step 1: For **definite** integrals on $$[0, \\pi/2]$$: the boundary term $$[-\\sin^{n-1}x\\cos x]_0^{\\pi/2}$$ vanishes because either $$\\sin x = 0$$ (at $$0$$) or $$\\cos x = 0$$ (at $$\\pi/2$$).\n- Step 2: For **indefinite** integrals: there are no specific limits to make the boundary term vanish. The expression $$-\\sin^{n-1}x\\cos x$$ remains as a piece of the antiderivative.\n- Step 3: So the indefinite reduction formula is $$nI_n = -\\sin^{n-1}x\\cos x + (n-1)I_{n-2}$$, where the boundary-like term is now part of the antiderivative.\n\nThis is why definite-integral reduction formulae are often cleaner — they kill the boundary terms. Always check whether the formula is for definite or indefinite integrals; the boundary contribution differs.", "source": "Opus 4.7 ①", "_id": "opus_1_79", "judge_pick": true}, {"question": "What's the role of the factor $$2\\pi$$ in surface-of-revolution formulas?", "answer": "The factor $$2\\pi$$ comes from the **circumference** of a circle: $$2\\pi r$$, where the radius $$r$$ is the distance from the axis of rotation. When a small arc element $$ds$$ is rotated, every point on it traces a circle of circumference $$2\\pi y$$ (or $$2\\pi x$$, depending on the axis). The thin band swept out has area $$\\approx 2\\pi y \\cdot ds$$. The integral $$\\int 2\\pi y\\, ds$$ adds up all these bands. The $$2\\pi$$ is dimensionally an angle (in radians for full rotation) — if you only rotate through angle $$\\alpha$$, you'd use $$\\alpha$$ instead of $$2\\pi$$. The factor encodes \"fraction of full rotation.\"", "source": "Opus 4.7 ①", "_id": "opus_1_80", "judge_pick": true}, {"question": "The antiderivatives $$\\arctan(x)$$ and $$\\frac{1}{2}\\ln\\left|\\frac{1+x}{1-x}\\right|$$ both arise from quadratic-denominator integrals. What identity connects these? (3 steps)", "answer": "- Step 1: $$\\arctan x$$ comes from $$\\int \\frac{dx}{1+x^2}$$ (irreducible); the log form comes from $$\\int \\frac{dx}{1-x^2}$$ (reducible via partial fractions).\n- Step 2: The log form is also $$\\text{artanh}\\, x$$ via the identity $$\\text{artanh}\\, x = \\frac{1}{2}\\ln\\left(\\frac{1+x}{1-x}\\right)$$ for $$|x| < 1$$.\n- Step 3: There's a deep connection: $$\\arctan x = \\frac{1}{2i}\\ln\\left(\\frac{1+ix}{1-ix}\\right)$$ — this is the **complex** version of the log form. Real arctan corresponds to \"imaginary boost\"; real artanh corresponds to \"real boost.\" This is the same reason hyperbolic and trig functions are related via $$\\sinh(ix) = i\\sin x$$ etc.\n\nTrigonometric and hyperbolic inverses are different real branches of the same complex function. The sign in $$1 \\pm x^2$$ flips between them.", "source": "Opus 4.7 ①", "_id": "opus_1_81", "judge_pick": true}, {"question": "Why does the substitution $$x = a\\cosh u$$ for $$\\sqrt{x^2 - a^2}$$ require $$x \\geq a$$? (3 steps)", "answer": "- Step 1: $$\\cosh u$$ has range $$[1, \\infty)$$. So $$x = a\\cosh u$$ produces values $$x \\geq a$$ (for $$a > 0$$). The substitution simply cannot reach $$|x| < a$$.\n- Step 2: For $$x < -a$$, you'd need $$\\cosh u < 0$$, which is impossible — so this substitution doesn't cover that region either.\n- Step 3: Practical consequence: $$\\int \\frac{1}{\\sqrt{x^2-a^2}}\\, dx = \\text{arcosh}(x/a)$$ is valid only for $$x > a$$. For $$x < -a$$, you'd need a different approach (e.g., a sign-adjusted form involving $$-\\text{arcosh}(-x/a)$$).\n\nThe principal-branch restriction of $$\\text{arcosh}$$ ($$x \\geq 1$$) propagates to the integral. Always note the domain restriction when using arcosh-based antiderivatives.", "source": "Opus 4.7 ①", "_id": "opus_1_82", "judge_pick": true}, {"question": "A teacher claims \"every integral with $$\\sqrt{1-x^2}$$ in the denominator gives $$\\arcsin x$$.\" Find a counterexample. (3 steps)", "answer": "- Step 1: Consider $$\\int \\frac{x}{\\sqrt{1-x^2}}\\, dx$$. The numerator is $$x$$, **not** a constant.\n- Step 2: Recognize this as $$\\int x(1-x^2)^{-1/2}\\, dx$$. With $$f = 1-x^2$$, $$f' = -2x$$, this is $$-\\frac{1}{2}\\int f'\\cdot f^{-1/2}\\, dx$$, which gives $$-\\frac{1}{2}\\cdot\\frac{f^{1/2}}{1/2} = -\\sqrt{1-x^2}$$.\n- Step 3: So $$\\int \\frac{x}{\\sqrt{1-x^2}}\\, dx = -\\sqrt{1-x^2} + C$$ — **not** $$\\arcsin$$.\n\nMisconception: the denominator alone never determines the antiderivative. The numerator must be checked. Constant numerator → $$\\arcsin$$; numerator like $$f'$$ → power rule on $$f$$.", "source": "Opus 4.7 ①", "_id": "opus_1_83", "judge_pick": true}, {"question": "Compute the area of an ellipse $$\\frac{x^2}{a^2} + \\frac{y^2}{b^2} = 1$$ using a substitution. Why does the answer come out simply $$\\pi ab$$? (4 steps)", "answer": "- Step 1: By symmetry, area $$= 4\\int_0^a y\\, dx$$ where $$y = b\\sqrt{1 - x^2/a^2}$$. So area $$= \\frac{4b}{a}\\int_0^a \\sqrt{a^2 - x^2}\\, dx$$.\n- Step 2: Substitute $$x = a\\sin\\theta$$, $$dx = a\\cos\\theta\\, d\\theta$$. Then $$\\sqrt{a^2-x^2} = a\\cos\\theta$$.\n- Step 3: Area $$= \\frac{4b}{a}\\int_0^{\\pi/2} a\\cos\\theta \\cdot a\\cos\\theta\\, d\\theta = 4ab\\int_0^{\\pi/2}\\cos^2\\theta\\, d\\theta = 4ab \\cdot \\frac{\\pi}{4} = \\pi ab$$.\n- Step 4: The factor $$\\pi$$ comes from $$\\int_0^{\\pi/2}\\cos^2\\theta\\, d\\theta = \\pi/4$$ (Wallis-style).\n\nThe simplicity $$\\pi ab$$ is **deeply geometric**: the ellipse is just a stretched circle. A circle of radius $$1$$ has area $$\\pi$$. Stretching by $$a$$ in $$x$$ and $$b$$ in $$y$$ multiplies the area by $$ab$$, giving $$\\pi ab$$.", "source": "Opus 4.7 ①", "_id": "opus_1_84", "judge_pick": true}], "count": 85}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Why is $$\\int \\sinh x \\, dx = \\cosh x + C$$, and what general principle does this illustrate? (3 steps)", "answer": "- Step 1: Integration is the reverse of differentiation. Since $$\\frac{d}{dx}(\\cosh x) = \\sinh x$$, by the Fundamental Theorem of Calculus, the integral of $$\\sinh x$$ must give back $$\\cosh x$$ (up to a constant).\n- Step 2: This is the symmetric pairing for hyperbolics: differentiating $$\\cosh x$$ gives $$\\sinh x$$, and differentiating $$\\sinh x$$ gives $$\\cosh x$$ — note: no sign flip, unlike trig where $$\\frac{d}{dx}(\\cos x) = -\\sin x$$.\n- Step 3: General principle: every hyperbolic differentiation result becomes an integration result by reading it backwards. The \"nicer\" sign behavior of hyperbolics means no minus signs creep in between sinh and cosh.\n\nThe takeaway: always derive the standard hyperbolic integrals from the corresponding derivatives — they're more reliable than memorizing the integrals separately.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "What is $$\\int \\tanh x \\, dx$$, and why don't we need modulus signs in the answer? (3 steps)", "answer": "- Step 1: The result is $$\\int \\tanh x \\, dx = \\ln \\cosh x + C$$.\n- Step 2: To see why, write $$\\tanh x = \\frac{\\sinh x}{\\cosh x}$$, which is exactly of the form $$\\frac{f'(x)}{f(x)}$$ since $$\\frac{d}{dx}(\\cosh x) = \\sinh x$$. The general rule gives $$\\ln |\\cosh x| + C$$.\n- Step 3: We drop the modulus because $$\\cosh x \\geq 1 > 0$$ for all real $$x$$ — the function never reaches zero or goes negative. Contrast with $$\\int \\tan x \\, dx = \\ln |\\sec x| + C$$, where the modulus is essential because $$\\sec x$$ can be negative.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "State the result for $$\\int \\text{cosech}^2 x \\, dx$$, and contrast it with $$\\int \\sec^2 x \\, dx$$. (3 steps)", "answer": "- Step 1: The result is $$\\int \\text{cosech}^2 x \\, dx = -\\coth x + C$$. The minus sign comes from $$\\frac{d}{dx}(\\coth x) = -\\text{cosech}^2 x$$.\n- Step 2: Compare $$\\int \\sec^2 x \\, dx = \\tan x + C$$ (no minus sign), because $$\\frac{d}{dx}(\\tan x) = \\sec^2 x$$.\n+ Pattern: derivatives of \"co-\" functions ($$\\cot$$, $$\\coth$$) carry a minus sign.\n+ Derivatives of non-\"co-\" functions ($$\\tan$$, $$\\tanh$$) don't.\n- Step 3: When integrating, the minus sign carries over: $$\\int (\\text{co-})^2 x \\, dx$$ produces $$-(\\text{co-function})$$, while $$\\int (\\text{non-co-})^2 \\, dx$$ gives the plain non-co-function.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "State the four \"named\" inverse-function standard integrals (results 8–11) and their domain restrictions. (4 steps)", "answer": "- Step 1: $$\\int \\frac{1}{\\sqrt{1-x^2}} \\, dx = \\arcsin x + C$$, valid for $$|x| < 1$$ — the integrand blows up at $$x = \\pm 1$$.\n- Step 2: $$\\int \\frac{1}{1+x^2} \\, dx = \\arctan x + C$$, valid for all $$x$$ — denominator never zero.\n- Step 3: $$\\int \\frac{1}{\\sqrt{1+x^2}} \\, dx = \\text{arsinh } x + C$$, valid for all $$x$$.\n- Step 4: $$\\int \\frac{1}{\\sqrt{x^2-1}} \\, dx = \\text{arcosh } x + C$$, valid for $$x > 1$$ — both because $$\\sqrt{x^2-1}$$ requires $$|x| \\geq 1$$, and because arcosh is conventionally defined only on $$[1, \\infty)$$.\n\nThe pattern: each comes directly from differentiating the inverse function on the right.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "A student sees $$\\int \\frac{1}{1+x^2} dx$$ and writes \"$$= \\arctan x + C$$\". Then sees $$\\int \\frac{4x}{1+x^2} dx$$ and writes \"$$= 4\\arctan x + C$$\". What's the conceptual error? (3 steps)", "answer": "- Step 1: The error is treating denominator-shape as the sole guide. The presence of $$1+x^2$$ in the denominator does NOT automatically mean arctan.\n- Step 2: For $$\\int \\frac{4x}{1+x^2} dx$$, examine the numerator: $$4x = 2 \\cdot \\frac{d}{dx}(1+x^2)$$. This puts the integrand in $$\\frac{f'(x)}{f(x)}$$ form (up to constants), which integrates to a logarithm: $$2\\ln(1+x^2) + C$$.\n- Step 3: The arctan rule applies only when the numerator is essentially constant (unrelated to the denominator's derivative). Always pattern-match on the WHOLE integrand.\n\nThe takeaway: same denominator, different numerator types, totally different antiderivatives.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "When should you suspect that an integrand of the form (numerator)/$$\\sqrt{1+x^2}$$ is NOT going to give arsinh? (3 steps)", "answer": "- Step 1: The arsinh result $$\\int \\frac{1}{\\sqrt{1+x^2}} dx = \\text{arsinh } x + C$$ requires the numerator to be a CONSTANT.\n- Step 2: If the numerator contains an $$x$$-piece resembling $$\\frac{d}{dx}(1+x^2) = 2x$$, the form is $$k \\cdot f'(x)[f(x)]^{-1/2}$$, which integrates to a multiple of $$\\sqrt{1+x^2}$$ — NOT arsinh.\n+ Example: $$\\int \\frac{5x}{\\sqrt{1+x^2}} dx = 5\\sqrt{1+x^2} + C$$.\n+ Counter-example: $$\\int \\frac{5}{\\sqrt{1+x^2}} dx = 5 \\,\\text{arsinh } x + C$$.\n- Step 3: Strategy: if the numerator contains $$x$$ matching the derivative pattern, use the power rule. If the numerator is constant, use the inverse-function result. If mixed, split the integrand.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "How do you handle integrals like $$\\int \\frac{2+5x}{\\sqrt{x^2+1}} dx$$ that have a \"mixed\" numerator? (3 steps)", "answer": "- Step 1: Split the fraction into pieces: $$\\int \\frac{2+5x}{\\sqrt{x^2+1}} dx = \\int \\frac{2}{\\sqrt{x^2+1}} dx + \\int \\frac{5x}{\\sqrt{x^2+1}} dx$$.\n- Step 2: First integral has constant numerator → arsinh form: $$2\\,\\text{arsinh } x$$.\n+ Second integral has numerator proportional to $$\\frac{d}{dx}(x^2+1) = 2x$$, so it's $$\\int f'(x)[f(x)]^{-1/2} dx$$ → $$5\\sqrt{x^2+1}$$.\n- Step 3: Combine: $$\\int \\frac{2+5x}{\\sqrt{x^2+1}} dx = 2\\,\\text{arsinh } x + 5\\sqrt{x^2+1} + C$$.\n\nThe trick: mixed numerators yield to splitting into \"constant\" + \"derivative-companion\" pieces.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Explain the linear-argument rule $$\\int f'(ax+b) \\, dx = \\frac{1}{a} f(ax+b) + C$$ and give one practical example. (2 steps)", "answer": "- Step 1: The rule comes from the chain rule reversed. If $$F'(x) = f(x)$$, then $$\\frac{d}{dx}[F(ax+b)] = a \\cdot f(ax+b)$$. Integrating $$f(ax+b)$$ gives $$\\frac{1}{a}F(ax+b) + C$$ — the \"$$1/a$$\" compensates for the chain-rule factor.\n- Step 2: Practical example: $$\\int \\cosh(4x-1) dx = \\frac{1}{4}\\sinh(4x-1) + C$$.\n+ Another: $$\\int \\text{cosech}(3x)\\coth(3x) dx = -\\frac{1}{3}\\text{cosech}(3x) + C$$.\n\nThe takeaway: this rule generalizes results 1, 2, 4–7 to any linear inner argument — no substitution machinery needed.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "What's the general philosophy for integrating hyperbolic functions, and when does it break down? (3 steps)", "answer": "- Step 1: General philosophy: **mirror what you do for trig**. Most hyperbolic integrals work the same as their trig analogues — same identities, same patterns, same substitution structures.\n+ For example, $$\\int \\tanh^2 x \\, dx$$ uses $$1 - \\tanh^2 x = \\text{sech}^2 x$$ exactly as $$\\int \\tan^2 x \\, dx$$ uses $$\\sec^2 x - 1 = \\tan^2 x$$.\n- Step 2: It breaks down when the trig method relies on something with different signs or structure that doesn't carry over. Classic failure: $$\\int e^{ax} \\sinh(ax) \\, dx$$ — IBP loops without resolving.\n- Step 3: In such cases, switch to the **exponential definitions**: $$\\sinh x = \\frac{e^x - e^{-x}}{2}$$, $$\\cosh x = \\frac{e^x + e^{-x}}{2}$$. Reduce to elementary exponential integrals.\n\nThe takeaway: trig-style methods are first attempt; exponential form is the universal fallback for hyperbolics.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Walk through finding $$\\int \\text{sech}^6 x \\tanh x \\, dx$$ by recognizing a pattern. (3 steps)", "answer": "- Step 1: Recall $$\\frac{d}{dx}(\\text{sech } x) = -\\text{sech } x \\tanh x$$. So $$\\text{sech } x \\tanh x = -\\frac{d}{dx}(\\text{sech } x)$$.\n- Step 2: Rewrite the integrand: $$\\text{sech}^6 x \\tanh x \\, dx = \\text{sech}^5 x \\cdot (\\text{sech } x \\tanh x) \\, dx = -\\text{sech}^5 x \\cdot \\frac{d}{dx}(\\text{sech } x) dx$$. This is $$-[f(x)]^5 f'(x) \\, dx$$ with $$f = \\text{sech } x$$.\n- Step 3: Apply $$\\int [f(x)]^n f'(x) \\, dx = \\frac{[f(x)]^{n+1}}{n+1}$$: result is $$-\\frac{\\text{sech}^6 x}{6} + C$$.\n\nThe key skill: spot the \"derivative companion\" already present. The $$\\tanh x$$ piece signals that sech is the function being raised to a power.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Why does $$\\int \\text{sech } x \\, dx$$ require a special technique, unlike $$\\int \\text{sech}^2 x \\, dx$$? Outline the trick. (3 steps)", "answer": "- Step 1: $$\\int \\text{sech}^2 x \\, dx = \\tanh x + C$$ is direct — sech-squared is exactly the derivative of tanh. But $$\\int \\text{sech } x \\, dx$$ has no immediate antiderivative.\n- Step 2: The trick: multiply numerator and denominator by $$e^x$$. Since $$\\text{sech } x = \\frac{2}{e^x + e^{-x}}$$, this gives $$\\frac{2e^x}{e^{2x} + 1}$$.\n- Step 3: Substitute $$u = e^x$$, so $$du = e^x dx$$: integral becomes $$\\int \\frac{2}{u^2 + 1} du = 2\\arctan u + C = 2\\arctan(e^x) + C$$.\n\nThe deep reason: sech in exponential form is a rational function of $$e^x$$, so the right substitution converts it to standard arctan-shape.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Why does integration by parts fail for $$\\int e^{ax} \\sinh(ax) \\, dx$$, and what's the fix? (3 steps)", "answer": "- Step 1: For $$\\int e^{2x} \\sinh x \\, dx$$ (different coefficients inside), IBP twice closes algebraically. For matching coefficients $$\\int e^{ax} \\sinh(ax) \\, dx$$, the derivative of $$\\sinh(ax)$$ is $$a\\cosh(ax)$$, generating same-shaped integrals that don't reduce.\n- Step 2: The fix: convert sinh to exponential form. $$\\sinh(ax) = \\frac{e^{ax} - e^{-ax}}{2}$$, so $$e^{ax} \\sinh(ax) = \\frac{e^{2ax} - 1}{2}$$ — now elementary.\n- Step 3: Integrate directly: $$\\int \\frac{e^{2ax} - 1}{2} dx = \\frac{e^{2ax}}{4a} - \\frac{x}{2} + C$$.\n\nThe lesson: when IBP loops without closing, the exponential definition is your escape hatch.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "How do you handle $$\\int \\sinh^3 x \\, dx$$? Why does this odd-power technique fail for $$\\sinh^4 x$$? (3 steps)", "answer": "- Step 1: For odd powers, write $$\\sinh^3 x = \\sinh^2 x \\cdot \\sinh x = (\\cosh^2 x - 1) \\sinh x$$. The lone $$\\sinh x$$ is exactly $$\\frac{d}{dx}(\\cosh x)$$ — perfect for substitution.\n- Step 2: Substitute $$u = \\cosh x$$: $$\\int (u^2 - 1) du = \\frac{u^3}{3} - u + C = \\frac{\\cosh^3 x}{3} - \\cosh x + C$$.\n- Step 3: For even powers like $$\\sinh^4 x$$, the trick fails — there's no leftover $$\\sinh x$$ for substitution. Use the identity $$\\sinh^2 x = \\frac{\\cosh 2x - 1}{2}$$ to reduce powers.\n\nThe pattern: odd powers peel off one factor for substitution; even powers need double-angle reduction.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Walk through $$\\int \\cosh^2(3x) \\, dx$$ using a hyperbolic identity. (3 steps)", "answer": "- Step 1: Direct integration is impossible. Use the double-angle identity $$\\cosh 2A = 2\\cosh^2 A - 1$$, rearranged: $$\\cosh^2 A = \\frac{1 + \\cosh 2A}{2}$$.\n- Step 2: With $$A = 3x$$: $$\\cosh^2(3x) = \\frac{1 + \\cosh(6x)}{2}$$. So $$\\int \\cosh^2(3x) \\, dx = \\int \\frac{1 + \\cosh(6x)}{2} dx$$.\n- Step 3: Integrate term by term: $$\\frac{x}{2} + \\frac{\\sinh(6x)}{12} + C$$.\n\nThe key insight: powers ≥ 2 of cosh/sinh need identity-driven reduction to lower-degree terms.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "How do you integrate $$\\int \\tanh^2 x \\, dx$$ and what general identity is the workhorse? (3 steps)", "answer": "- Step 1: From the hyperbolic Pythagorean identity $$\\cosh^2 x - \\sinh^2 x = 1$$, divide by $$\\cosh^2 x$$: $$1 - \\tanh^2 x = \\text{sech}^2 x$$.\n- Step 2: Rearrange: $$\\tanh^2 x = 1 - \\text{sech}^2 x$$. Now $$\\int \\tanh^2 x \\, dx = \\int (1 - \\text{sech}^2 x) dx$$.\n- Step 3: Both pieces are standard: $$x - \\tanh x + C$$.\n\nThe deeper takeaway: this is the hyperbolic analogue of $$\\tan^2 x = \\sec^2 x - 1$$, but with a sign flip. The result $$x - \\tanh x$$ mirrors $$\\tan x - x$$ for the trig version.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Compare the strategies for $$\\int \\sec x \\, dx$$ (trig) and $$\\int \\text{sech } x \\, dx$$ (hyperbolic). Why are they so different? (3 steps)", "answer": "- Step 1: For $$\\int \\sec x \\, dx$$: multiply by $$\\frac{\\sec x + \\tan x}{\\sec x + \\tan x}$$. The numerator becomes the derivative of the denominator, giving $$\\ln|\\sec x + \\tan x| + C$$.\n- Step 2: For $$\\int \\text{sech } x \\, dx$$: the same trick fails because $$\\text{sech } x + \\tanh x$$ doesn't have the right derivative structure (different signs from trig). Instead, use exponential form to get $$2\\arctan(e^x) + C$$.\n- Step 3: Deeper reason: trig and hyperbolic identities have different sign patterns. The \"self-amplifying\" trick works for sec because of specific cancellations that don't reproduce for sech. The exponential form is the universal hyperbolic tool.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "What's the conceptual reason we use trigonometric or hyperbolic substitutions for integrals like $$\\int \\frac{1}{\\sqrt{1-x^2}} dx$$? Why doesn't $$u = 1-x^2$$ work? (3 steps)", "answer": "- Step 1: An algebraic substitution $$u = 1-x^2$$ gives $$du = -2x \\, dx$$ — it requires a factor of $$x$$ in the numerator that we don't have. So this substitution doesn't simplify the integrand.\n- Step 2: The point of trig/hyp substitutions is to **collapse a two-term expression into one term** via a Pythagorean-style identity. For $$\\sqrt{1-x^2}$$, set $$x = \\sin\\theta$$: then $$1-x^2 = \\cos^2\\theta$$, so $$\\sqrt{1-x^2} = \\cos\\theta$$ — surd vanishes!\n- Step 3: The integrand becomes a clean trig expression that's easily integrable. The substitution embeds the problem into a geometric setting where the constraint $$\\sin^2 + \\cos^2 = 1$$ does the work for you.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "Match each integrand structure to suggested substitutions and the identity that \"collapses\" it. (4 steps)", "answer": "- Step 1: For $$\\sqrt{a^2 - x^2}$$ try $$x = a\\sin\\theta$$ (or $$x = a\\tanh u$$). Identity: $$1 - \\sin^2\\theta = \\cos^2\\theta$$ (or $$1 - \\tanh^2 u = \\text{sech}^2 u$$).\n- Step 2: For $$a^2 + x^2$$ try $$x = a\\tan\\theta$$ (or $$x = a\\sinh u$$). Identity: $$1 + \\tan^2\\theta = \\sec^2\\theta$$ (or $$1 + \\sinh^2 u = \\cosh^2 u$$).\n- Step 3: For $$\\sqrt{a^2 + x^2}$$ try $$x = a\\sinh u$$ (or $$x = a\\tan\\theta$$). Same identity; hyperbolic usually preferred.\n- Step 4: For $$\\sqrt{x^2 - a^2}$$ try $$x = a\\cosh u$$ (or $$x = a\\sec\\theta$$). Identity: $$\\cosh^2 u - 1 = \\sinh^2 u$$ (or $$\\sec^2\\theta - 1 = \\tan^2\\theta$$).\n\nMemory aid: each substitution kills a \"$$\\pm 1$$\" term in the surd by exploiting a Pythagorean identity.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Why is the first substitution in each suggested pair (e.g., $$x = a\\sinh u$$ for $$\\sqrt{a^2+x^2}$$) usually the better choice? (3 steps)", "answer": "- Step 1: Both substitutions WORK — they both collapse the surd. But the resulting integrand differs in difficulty.\n- Step 2: For $$\\sqrt{a^2 + x^2}$$ with $$x = a\\sinh u$$: $$\\sqrt{a^2 + a^2\\sinh^2 u} = a\\cosh
