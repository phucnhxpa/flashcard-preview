<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2214%22 fill=%22%23006edc%22/><text x=%2232%22 y=%2243%22 text-anchor=%22middle%22 font-size=%2234%22 fill=%22white%22>ƒ</text></svg>"><title>Statistics 1 (WST01/01) + ESAT warm-up · Maths S1 (WST01/01) + ESAT warm-up — Maths lesson 29 June 2026; official WST01/01 evidence — Multi-model flashcards</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;max-width:100%;overflow-x:hidden}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.5}.wrap{width:100%;max-width:980px;margin:auto;padding:26px 16px 70px;overflow-x:clip}header{text-align:center;margin:7px 0 18px}h1{font-size:30px;line-height:1.18;margin:0}.sub{color:#68686d;margin:6px 0}.tabs{display:flex;gap:7px;overflow-x:auto;padding:5px 1px 11px;scrollbar-width:thin}.tab{white-space:nowrap;border:1px solid #d2d2d7;background:#fff;border-radius:999px;padding:8px 12px;font:650 12px inherit;cursor:pointer}.tab.active{background:#006edc;color:#fff;border-color:#006edc}.tools{position:sticky;top:7px;z-index:5;display:flex;gap:7px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid #e2e2e7;border-radius:14px;padding:10px;margin-bottom:13px;box-shadow:0 2px 8px #0000000d}.tools button{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:6px 9px;font:600 12px inherit;cursor:pointer}.count{margin-left:auto;color:#68686d;font-size:12px;font-weight:650}.list{display:flex;flex-direction:column;gap:10px}.card{min-width:0;max-width:100%;background:#fff;border:1px solid #e1e1e6;border-radius:14px;padding:15px 16px;box-shadow:0 1px 4px #0000000a}.row{display:flex;gap:10px;align-items:flex-start;min-width:0}.pick{width:18px;height:18px;margin-top:3px;flex:0 0 auto}.qwrap{min-width:0;max-width:100%;flex:1}.q{font-weight:650;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;cursor:pointer;overflow-x:auto}.answer{display:none;white-space:pre-wrap;margin-top:10px;padding-top:10px;border-top:1px solid #ececf0;color:#3e3e43;overflow-wrap:anywhere;word-break:break-word;overflow-x:auto}.card.open .answer{display:block}.foot{display:flex;justify-content:flex-end;margin-top:8px}.copy{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:3px 8px;cursor:pointer}.notice{font-size:12px;color:#68686d;text-align:center;margin:12px 0}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#1d1d1f;color:#fff;border-radius:8px;padding:8px 14px;opacity:0;pointer-events:none}.toast.show{opacity:1}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}@media(max-width:430px){.wrap{padding:16px 10px 55px}h1{font-size:24px}.tools{top:4px}.count{width:100%;margin-left:0}.card{padding:13px 12px}}</style><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true},options:{skipHtmlTags:["script","noscript","style","textarea","pre","code"]}};</script><script defer src="assets/mathjax/es5/tex-mml-chtml.js"></script></head><body><main class="wrap"><header><h1>Statistics 1 (WST01/01) + ESAT warm-up · Maths S1 (WST01/01) + ESAT warm-up — Maths lesson 29 June 2026; official WST01/01 evidence</h1><p class="sub">Direct model-output flashcards</p></header><nav id="tabs" class="tabs" aria-label="Models"></nav><nav class="tools"><button id="sel">Select all</button><button id="desel">Deselect all</button><button id="reveal">Reveal all</button><button id="hide">Hide all</button><button id="table">Copy table</button><span id="count" class="count"></span></nav><section id="list" class="list"></section><p class="notice">Model outputs are displayed directly as generated.</p></main><div id="toast" class="toast"></div><script>const DATA={"glm_1":{"label":"GLM 5.1 · Run 1","returned_model":"z-ai/glm-5.1","cards":[{"question":"On WST01/01, if a question asks for an inexact decimal answer and does not specify accuracy, what precision is required? What common rounding error cost a mark in Q1(b)? [Lesson evidence]","answer":"1. Inexact decimal answers must be given to **3 significant figures** unless otherwise stated `[QP]`.\n2. 2 s.f. is not enough — rounding $$r = 0.948$$ to 2 s.f. lost the final accuracy mark in Q1(b) `[L 07:50–08:40]`."},{"question":"When finding the overall proportional change in a formula like $$M = \\frac{(x+y)^2 \\cdot z}{P}$$ given percentage changes in variables, what is the most efficient strategy to avoid messy binomial expansions? [NSAA] [Completed with prompting]","answer":"1. Substitute each variable with its **scale factor** (e.g., +50% → 1.5, -20% → 0.8 = 4/5).\n2. **Factorise before squaring**: e.g. $$1.5x + 1.5y = 1.5(x+y)$$, so the bracket multiplier becomes $$(1.5)^2$$.\n3. Keep fractions (like 4/5 instead of 0.8) to make cancellation visible.\n4. Multiply all scale factors for the overall multiplier `[L 02:17–06:13]`."},{"question":"When interpreting a regression line slope (e.g., $$w = 46.0 + 3.27h$$) in context, what specific elements must be included to secure the mark? [Completed with prompting] [MS]","answer":"1. State the direction (\"increases\").\n2. State the **numeric rate** in context (\"by 3.27 kg\").\n3. State the variable pair (\"for each 1 cm increase in height\").\n4. A generic \"positive correlation\" statement is insufficient `[L 08:49–11:16]`."},{"question":"When using a regression line to make predictions, how do you classify and compare the reliability of estimates within vs. outside the data range? [Completed with prompting] [MS]","answer":"1. **Interpolation**: predicting within the observed data range (more reliable).\n2. **Extrapolation**: predicting outside the observed data range (less reliable).\n3. Use these explicit terms to guarantee the mark, rather than just describing the idea `[L Q1(f)]`."},{"question":"In WST01/01, how should you determine which outlier rule to apply (e.g., in Q2), and what specific wording trap must you avoid when stating the result? [Completed with prompting] [QP] [MS]","answer":"1. **Always use the rule supplied in the question** (e.g., 1.5×IQR); do not substitute a mean ± 2s rule `[L 13:11–14:06]`.\n2. If the question asks to show there is \"only one\" outlier, you must explicitly state the word **\"only\"** (e.g., \"139 is the only outlier\") to match the mark scheme."},{"question":"How do you determine positive skew from a box plot, and what contextual interpretation must you add beyond just stating \"positively skewed\"? [Completed with prompting] [MS]","answer":"1. Positive skew occurs when $$Q3 - Q2 \u003e Q2 - Q1$$.\n2. Contextual interpretation: the data is **more varied (or more spread out) above the median than below it**.\n3. Stating \"positively skewed\" alone describes but does not interpret `[L 14:06–16:07]`."},{"question":"For a discrete uniform distribution on $$y = 1, 2, ..., 6$$, how do you efficiently find $$E(4Y + 3)$$ without calculating $$E(Y)$$ from a long sum? [Lesson evidence] [MS]","answer":"1. Know or calculate $$E(Y) = 3.5$$.\n2. Use the linear expectation identity: $$E(aX + b) = aE(X) + b$$ `[SPEC]`.\n3. So, $$E(4Y + 3) = 4E(Y) + 3 = 4(3.5) + 3 = 17$$."},{"question":"When calculating variance for a discrete probability distribution, what is the correct identity for $$Var(X)$$, and what are the two common traps when finding $$Var(aX + b)$$? [Completed with prompting] [MS] [FB]","answer":"1. Identity: $$Var(X) = E(X^2) - \\mu^2 = \\Sigma x^2 P(X=x) - \\mu^2$$ `[FB]`.\n2. **Trap 1**: Do NOT divide $$\\Sigma x^2 P$$ by $$n$$; it is not an average of squares.\n3. **Trap 2**: Subtract $$\\mu^2$$, NOT $$\\mu$$.\n4. For linear transformations: $$Var(aX + b) = a^2 Var(X)$$ `[L 18:43–21:36]`."},{"question":"When a discrete random variable $$X$$ has a cumulative distribution function $$F(x) = P(X \\le x)$$, how do you evaluate an inequality like $$P(2X \u003c 1)$$? [MS]","answer":"1. Solve the inequality for $$X$$: $$2X \u003c 1 \\iff X \u003c 0.5$$.\n2. Since $$X$$ is discrete, $$X \u003c 0.5$$ is equivalent to $$X \\le 0$$.\n3. Read the answer directly from the CDF: $$P(X \\le 0) = F(0)$$ `[Q4(c)]`."},{"question":"When testing or using independence of events A and B on a Venn diagram, what is the algebraic condition, and what is a time-saving arithmetic tip? [Completed with prompting] [MS]","answer":"1. Condition: $$P(A \\cap B) = P(A)P(B)$$ `[SPEC]`.\n2. If finding an unknown region (like B-only), express $$P(B)$$ including the unknown, then set up the equation.\n3. **Tip**: Divide both sides by the known $$P(A)$$ early rather than expanding, to reduce steps `[L 24:27–25:03]`."},{"question":"When setting up a conditional probability like $$P(B|C')$$ on a Venn diagram, what is the critical denominator trap? [Completed with prompting] [QP] [MS]","answer":"1. The denominator must include **all** regions not in $$C$$, including the outside region (z) `[L 27:51–28:52]`.\n2. Formula: $$P(B|C') = \\frac{P(B \\cap C')}{P(C')}$$.\n3. $$P(C')$$ is everything outside circle C, so sum all non-C regions plus z."},{"question":"When constructing a reversed tree diagram (e.g., conditioning on \"Late\" vs \"Not Late\"), what is the essential self-check, and what does it verify? [Completed with prompting] [MS]","answer":"1. **Self-check**: Each fan (set of branches from a single node) in the reversed tree must sum to 1.\n2. For example, $$P(\\text{car}|L) + P(\\text{bike}|L) + P(\\text{walk}|L) = 1$$.\n3. If a fan does not sum to 1, a conditional probability calculation is wrong `[L 46:56–54:08]`."}]},"glm_2":{"label":"GLM 5.1 · Run 2","returned_model":"z-ai/glm-5.1","cards":[{"question":"On WST01/01, what precision is required for inexact decimal answers (unless otherwise stated), and what trap caught the student in Q1(b)?","answer":"1. Inexact decimals must be given to **3 significant figures** (paper-wide convention `[QP]`). 2. The student rounded the correlation coefficient to 2 s.f., losing the final accuracy mark. 3. \"3 s.f.\" is the required precision, not a minimum — giving more digits is acceptable but 2 s.f. is not enough."},{"question":"How do you find the overall proportional change when several variables in a formula change by given percentages (ESAT-style)?","answer":"1. Replace each variable with its **scale factor** (e.g. +50% → ×1.5, −20% → ×0.8, doubled → ×2 in denominator). 2. Keep factors as **fractions** (3/2, 4/5) so cancellation is visible. 3. **Factorise before squaring**: e.g. 1.5x + 1.5y = (3/2)(x+y), then square the bracket → (3/2)² = 9/4. This avoids a messy binomial expansion. 4. Multiply all scale factors; read the result as a multiplier (e.g. 9/10 = 90% = 10% decrease)."},{"question":"For a discrete probability distribution, what is the correct way to compute $$\\text{Var}(X)$$, and what two errors did the student make in Q4(d)?","answer":"1. $$\\text{Var}(X) = E(X^2) - \\mu^2$$, where $$E(X^2) = \\sum x_i^2 P(X=x_i)$$ **directly** — no division by $$n$$. 2. The student's two errors: (a) divided $$\\sum x^2 P$$ by 5, as if averaging squares for a data set; (b) subtracted $$E(X)$$ instead of $$[E(X)]^2$$. 3. Key check: a probability distribution already incorporates the weighting — there is never a \"÷n\" step."},{"question":"State the identity for $$\\text{Var}(aX + b)$$ and identify the common slip.","answer":"1. $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. 2. The constant $$b$$ **vanishes** (shifting does not affect spread), and the sign of $$a$$ is squared away. 3. Common slip: writing $$a\\text{Var}(X)$$ or $$|a|\\text{Var}(X)$$ instead of $$a^2\\text{Var}(X)$$. E.g. $$\\text{Var}(5-3X) = (-3)^2\\text{Var}(X) = 9\\text{Var}(X)$$."},{"question":"The CDF of a discrete RV is $$F(x) = P(X \\leq x)$$. How do you evaluate $$P(2X \u003c 1)$$ using the CDF?","answer":"1. Rewrite the inequality in terms of $$X$$: $$2X \u003c 1 \\iff X \u003c 0.5$$. 2. For a **discrete** RV, $$X \u003c 0.5 \\iff X \\leq 0$$ (since $$X$$ takes only integer values). 3. Therefore $$P(2X \u003c 1) = F(0)$$. 4. Trap: do not look for a value \"0.5\" in the table — use the CDF at the largest integer strictly below 0.5."},{"question":"When checking for outliers, should you use the 1.5×IQR rule or a mean ± 2s rule?","answer":"1. Use **whichever rule the question gives** — the specification says the outlier rule will always be supplied. 2. In Q2 the question stated the 1.5×IQR rule, so use that; do not switch to mean ± 2s. 3. Also, the mark scheme may require you to state \"the **only** outlier is …\" — the word \"only\" can be required for the mark."},{"question":"On a Venn diagram, how do you test whether events A and B are independent?","answer":"1. Independence ⇔ $$P(A \\cap B) = P(A) \\cdot P(B)$$. 2. Read $$P(A)$$ as the sum of **all regions inside A** (not just A-only). 3. Read $$P(B)$$ similarly. 4. Compare the product with the overlap region $$P(A \\cap B)$$. 5. Efficiency tip: if you already know $$P(A)$$ and $$P(A \\cap B)$$, solve $$P(B) = P(A \\cap B)/P(A)$$ directly rather than expanding."},{"question":"When computing $$P(B|C')$$ on a Venn diagram, what region must appear in the denominator, and what was the lesson trap?","answer":"1. $$P(B|C') = P(B \\cap C') / P(C')$$. 2. $$C'$$ includes **everything outside C** — that is all regions not inside C **plus the outside region $$z$$**. 3. The lesson trap: omitting $$z$$ from the denominator, so $$P(C')$$ was too small. 4. Always list every region in the complement explicitly before forming the fraction."},{"question":"How do you construct a reversed (Bayes-style) tree diagram, and what is the essential self-check?","answer":"1. The first-stage branches become the **outcomes** (late / not late); the second-stage branches become the **events** (car / bike / walk). 2. Compute each branch: e.g. $$P(\\text{car}|\\text{late}) = P(\\text{car})P(\\text{late}|\\text{car}) / P(\\text{late})$$. 3. **Self-check**: each fan of the reversed tree must sum to 1. If \"given late\" branches or \"given not late\" branches do not add to 1, a conditional probability is wrong."},{"question":"What two terms must you use to distinguish between a prediction within the data range and one outside it, and why does it matter?","answer":"1. **Interpolation** — the $$x$$-value lies within the observed data range; the estimate is more reliable. 2. **Extrapolation** — the $$x$$-value lies outside the observed data range; the estimate is less reliable. 3. Use these exact words to guarantee the mark; a vague \"within/outside the range\" may not score."},{"question":"What must a regression slope interpretation include to score the mark (as exposed in Q1(d))?","answer":"1. It must state the **numeric rate of change in context**: \"On average, for each 1 cm increase in height, the weight increases by 3.27 kg.\" 2. A generic \"positive correlation\" statement is **not** sufficient. 3. Required elements: (a) \"on average\" or equivalent, (b) the unit increase in the explanatory variable, (c) the numeric change in the response variable, (d) both variables named in context."},{"question":"In Venn diagram probability questions, what is the practical difference between $$\\cap$$ and $$\\cup$$ when identifying shaded regions?","answer":"1. $$\\cap$$ (intersection) = the region shaded in **both** colours — only the overlap. 2. $$\\cup$$ (union) = the region shaded in **either** colour — all of both circles combined. 3. E.g. $$P((B \\cup C)' \\cap A)$$: first negate the union (everything outside B∪C), then intersect with A → this gives A-only. 4. Trap: confusing union with intersection when reading the set expression leads to selecting the wrong region."}]},"glm_3":{"label":"GLM 5.1 · Run 3","returned_model":"z-ai/glm-5.1","cards":[{"question":"On WST01/01, what is the required precision for inexact (decimal) answers, and what was the specific trap in Q1(b)?","answer":"1. Inexact decimal answers must be given to **three significant figures** unless otherwise stated `[QP]`.\n2. Two significant figures is not enough — this cost a mark in Q1(b) where the correlation coefficient was rounded to 2 s.f. instead of 3 s.f. `[Lesson evidence] [Completed with prompting]`"},{"question":"When calculating the overall proportional change of a compound expression (e.g., $$M = \\frac{(x+y)^2 \\cdot z}{P}$$) where variables change by percentages, what is the most efficient method to avoid messy binomial expansions?","answer":"1. Substitute each variable with its scale factor directly into the unchanged expression.\n2. **Factorise before squaring**: e.g., $$x+y \\to 1.5x+1.5y = 1.5(x+y)$$, so $$(x+y)^2 \\to (1.5)^2(x+y)^2$$.\n3. Keep multipliers as fractions (e.g., $$0.8 = 4/5$$) to make cancelling visible. `[NSAA] [Lesson evidence] [Completed with prompting]`"},{"question":"For S1 outlier questions, what rule must you use to identify outliers, and what is the common trap?","answer":"1. You must use the **outlier rule supplied in the question** (e.g., the 1.5×IQR rule in Q2).\n2. **Trap**: Do *not* default to a mean ± 2s rule unless the question explicitly states it. `[QP] [MS] [Lesson evidence] [Completed with prompting]`"},{"question":"What is the formula for $$Var(X)$$, and what are the two common traps when calculating it?","answer":"Formula: $$Var(X) = E(X^2) - \\mu^2 = \\Sigma x^2 P(X=x) - [E(X)]^2$$.\nTraps:\n1. **No division by n**: For a probability distribution, $$E(X^2) = \\Sigma x^2 P(X=x)$$ directly. Do not divide by n as if averaging squares.\n2. **Subtract $$\\mu^2$$, not $$\\mu$$**: The variance subtracts the *square* of the mean, not the mean itself. `[FB] [Lesson evidence] [Completed with prompting]`"},{"question":"What is the formula for $$Var(aX + b)$$, and how does the constant $$b$$ affect the variance?","answer":"Formula: $$Var(aX + b) = a^2 \\cdot Var(X)$$ `[SPEC]`.\nThe constant $$b$$ has **no effect** on the variance; only the scalar $$a$$ squares and multiplies. `[Lesson evidence] [Completed with prompting]`"},{"question":"To find $$P(2X \u003c 1)$$ for a discrete random variable $$X$$, why must you rewrite the inequality, and how do you use the CDF $$F(x)$$?","answer":"1. Since $$X$$ is discrete, $$2X \u003c 1 \\iff X \u003c 0.5 \\iff X \\le 0$$.\n2. Read the probability directly from the cumulative distribution function: $$P(X \\le 0) = F(0)$$. `[MS] [Lesson evidence]`"},{"question":"When setting up a conditional probability like $$P(B|C')$$ in a Venn diagram, what is the common trap regarding the denominator?","answer":"The denominator must include **all** of the complement region $$C'$$.\n**Trap**: Omitting the outside region (e.g., $$z$$). If $$C'$$ includes the outside region, the denominator must add both the relevant circle regions and $$z$$, not just the regions inside the circles. `[QP] [MS] [Lesson evidence] [Completed with prompting]`"},{"question":"In a regression context (e.g., $$w = 46.0 + 3.27h$$), what is the specific interpretation required for the slope, and what generic statement is insufficient?","answer":"1. You must state the numeric rate **in context**: e.g., \"On average, for each 1 cm increase in height, the weight increases by 3.27 kg.\"\n2. A generic \"positive correlation\" statement is not specific enough to score the mark. `[MS] [Lesson evidence] [Completed with prompting]`"},{"question":"When using a regression line to make predictions, what terms must you use to explain the reliability of an estimate, and how do they differ?","answer":"1. **Interpolation**: The estimate is within the data range and is **more reliable**.\n2. **Extrapolation**: The estimate is outside the data range and is **less reliable**.\nUse these explicit terms to guarantee the mark. `[MS] [Lesson evidence] [Completed with prompting]`"},{"question":"After constructing a reversed tree diagram (e.g., conditioning on \"Late\" vs \"Not Late\" first), what is the essential self-check?","answer":"Each fan (set of branches) of the reversed tree must **sum to 1**. If the \"given late\" or \"given not late\" branches do not add to 1, a conditional probability calculation is wrong. `[MS] [Lesson evidence] [Completed with prompting]`"},{"question":"How do you determine skewness from a box plot, and what contextual statement is required alongside it?","answer":"1. Compare the spreads: If $$Q_3 - Q_2 \u003e Q_2 - Q_1$$, the data has **positive skew**.\n2. You must also add a contextual spread statement, e.g., \"The weights are more varied above the median than below it.\" Simply stating \"positively skewed\" is not enough. `[MS] [Lesson evidence] [Completed with prompting]`"},{"question":"What is the status of $$Var(X) = \\Sigma x^2 P - \\mu^2$$ and $$Var(aX + b) = a^2 \\cdot Var(X)$$ in the exam formula booklet `[FB]` vs expected knowledge `[SPEC]`?","answer":"1. **$$Var(X) = \\Sigma x^2 P - \\mu^2$$**: It *is* printed in the formula booklet (S1 p.14), despite potential in-lesson uncertainty.\n2. **$$Var(aX + b) = a^2 \\cdot Var(X)$$**: It is *not* printed; it is expected knowledge you must memorise. `[FB] [SPEC] [Lesson evidence]`"}]},"qwen_1":{"label":"Qwen 3.7 Max","returned_model":"qwen/qwen3.7-max","cards":[{"question":"When evaluating proportional changes in an expression like $$M = \\frac{(x+y)^2 z}{P}$$, what algebraic strategy prevents messy binomial expansions when $$x$$ and $$y$$ both increase by 50%?","answer":"1. Substitute the scale factors directly into the unchanged expression: $$1.5x + 1.5y$$.\n2. Factorise *before* squaring: $$1.5(x+y) = \\frac{3}{2}(x+y)$$.\n3. Square the factorised bracket: $$\\left(\\frac{3}{2}\\right)^2 = \\frac{9}{4}$$."},{"question":"What is the strict precision requirement for inexact (decimal) answers on the Pearson Edexcel IAL WST01/01 paper, and what common rounding error costs a mark?","answer":"1. Inexact answers must be given to exactly **three significant figures** (unless otherwise stated).\n2. Rounding to two significant figures is insufficient and will lose the final accuracy mark."},{"question":"When interpreting the slope $$b$$ of a regression line $$w = a + bh$$ in context, what specific elements must be included to secure the mark, rather than just stating \"positive correlation\"?","answer":"1. State the numeric rate of change (the value of $$b$$).\n2. Specify the units and context of both variables (e.g., \"for each 1 cm increase in height, the weight increases by $$b$$ kg\")."},{"question":"Why is a regression estimate within the data range (interpolation) considered more reliable than an estimate outside the data range (extrapolation)?","answer":"1. **Interpolation** assumes the linear relationship holds within the observed data bounds.\n2. **Extrapolation** assumes the linear relationship continues unchanged beyond the observed data, which may not be true."},{"question":"In S1, if a question provides a specific outlier rule (e.g., more than $$1.5 \\times \\text{IQR}$$ beyond a quartile), why must you avoid using the mean $$\\pm 2s$$ rule?","answer":"1. The specification dictates that any outlier rule will be explicitly given in the question.\n2. You must strictly apply the provided rule (e.g., $$1.5 \\times \\text{IQR}$$) to secure the method marks; using an unrequested rule loses marks."},{"question":"When a box plot shows positive skew ($$Q_3 - Q_2 \u003e Q_2 - Q_1$$), what contextual interpretation is required beyond simply stating \"positively skewed\"?","answer":"1. State that the data values are **more varied (or more spread out) above the median than below it**.\n2. Merely describing the shape without interpreting the spread in context is insufficient for the interpretation mark."},{"question":"When calculating $$E(X^2)$$ and $$\\text{Var}(X)$$ for a discrete probability distribution, what two common calculation errors must be avoided?","answer":"1. Do **not** divide $$\\sum x^2 P(X=x)$$ by $$n$$ (there is no division by $$n$$ for a probability distribution).\n2. Subtract $$\\mu^2$$ (the square of the mean), **not** $$\\mu$$ (the mean itself), when calculating $$\\text{Var}(X) = E(X^2) - \\mu^2$$."},{"question":"What is the correct variance identity for a linear transformation $$aX + b$$, and why does the constant $$b$$ not affect the result?","answer":"1. The identity is $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$.\n2. The constant $$b$$ represents a shift in location (adding/subtracting a fixed value), which does not change the spread or variance of the distribution."},{"question":"In a \"chain\" Venn diagram where A overlaps B, and B overlaps C, what is the critical geometric constraint regarding regions A and C?","answer":"1. Regions A and C **do not overlap**.\n2. There is **no triple-overlap region** ($$A \\cap B \\cap C = \\emptyset$$); the diagram consists only of A-only, A∩B, B-only, B∩C, C-only, and the outside region."},{"question":"When calculating a conditional probability like $$P(B \\mid C')$$ from a Venn diagram, what must be included in the denominator?","answer":"1. The denominator must represent the **entirety** of the condition $$C'$$.\n2. This includes all regions outside C, explicitly including the \"outside all circles\" region (often labelled $$z$$), not just the other overlapping circles."},{"question":"When shading or identifying regions for set notation in a Venn diagram, what is the precise visual meaning of the intersection symbol $$\\cap$$ compared to the union symbol $$\\cup$$?","answer":"1. **Intersection ($$\\cap$$)**: The region must be shaded in **both** colours (the exact overlap).\n2. **Union ($$\\cup$$)**: The region is shaded if it is in **either or both** sets (the combined total area)."},{"question":"What is the essential self-check to verify that the conditional probabilities on a reversed (Bayes-style) tree diagram are calculated correctly?","answer":"1. Check that each \"fan\" of branches originating from a single conditional node (e.g., \"Given Late\" or \"Given Not Late\") **sums exactly to 1**.\n2. If the branches do not sum to 1, a conditional probability calculation is incorrect."}]},"minimax_1":{"label":"MiniMax M3 · Run 1","returned_model":"minimax/minimax-m3","cards":[{"question":"On WST01/01, what is the required precision for an inexact (decimal) answer, and what specific slip in Q1(b) cost an accuracy mark?","answer":"**3 significant figures** is required, not a minimum to exceed. In Q1(b) the correlation was rounded to **2 s.f.** instead of 3 s.f. (r = 0.948176… must be given as **0.948**), which cost the final accuracy mark."},{"question":"Given the NSAA specimen Q17 quantity M = ((x+y)² · z / P) · Q, with x and y each up 50%, z down 20%, P doubled, Q unchanged, what is the overall change in M?","answer":"Replace each variable by its scale factor and factorise *before* squaring:\n1. x + y → 1.5(x + y), so (x + y)² → (3/2)² = 9/4.\n2. z → 4/5; P → 2 (so divide by 2); Q → 1.\n3. Multiplier = (9/4) × (4/5) × (1/2) = **9/10**.\nM becomes 90% of its original value: a **10% decrease** (option C)."},{"question":"For S1 Q1, with Σh = 1160, Σw = 4160, Σhw = 604135, Σw² = 2166600, n = 8 and the printed S_hh = 286, what is the correlation coefficient r, and which two separate slips lost the final accuracy mark?","answer":"1. S_hw = 604135 − (1160×4160)/8 = 604135 − 603200 = 935.\n2. S_ww = 2166600 − 4160²/8 = 2166600 − 2163200 = 3400.\n3. r = 935 / √(286 × 3400) = 935 / √972400 = 0.948176… ≈ **0.948** (3 s.f.).\n4. The two slips were: miscopying 286 (writing the final 6 as a 9), and giving r to **2 s.f.** instead of 3 s.f."},{"question":"For S1 Q1(c)–(d), what is the regression line w = a + bh, and what does its slope mean *in context* (a generic \"positive correlation\" is not enough)?","answer":"1. b = S_hw / S_hh = 935 / 286 = 3.2692… ≈ **3.27**.\n2. h̄ = 145, w̄ = 520, so a = 520 − 3.27(145) = 45.96… ≈ **46.0**.\n3. Line: **w = 46.0 + 3.27h**.\n4. Interpretation: **on average, for each 1 cm increase in height, the weight increases by 3.27 kg** — the rate must be numeric and in context."},{"question":"For S1 Q1(e)–(f), using the printed line w = 46.0 + 3.27h, estimate the weight for a 153 cm horse and a 170 cm horse, and classify each estimate as interpolation or extrapolation.","answer":"1. h = 153: w = 46.0 + 3.27(153) = 546.31 → **546 kg**.\n2. h = 170: w = 46.0 + 3.27(170) = 601.9 → **602 kg** (3 s.f.).\n3. **153 cm is interpolation** (within the data range) and more reliable; **170 cm is extrapolation** (outside the range) and less reliable. Use those exact words."},{"question":"For S1 Q2(b), with Q1 = 95, Q3 = 112, why must you use the 1.5×IQR rule (not a mean ± 2s rule), and what is the only outlier?","answer":"1. The specification says any outlier rule will be **supplied in the question**; this question gives the 1.5×IQR rule, so use it.\n2. IQR = 112 − 95 = 17; 1.5×17 = 25.5.\n3. Lower fence = 95 − 25.5 = **69.5**; upper fence = 112 + 25.5 = **137.5**.\n4. Since 139 \u003e 137.5, state unambiguously: **139 is the only outlier** (the word \"only\" is required by the mark scheme)."},{"question":"For S1 Q4(d), with μ = 1.8 and probabilities (−1: 0.05, 0: 0.10, 1: 0.2, 2: 0.3, 3: 0.35), find Var(5 − 3X). What is the exact identity to use, and which two common errors must be avoided?","answer":"1. E(X²) = Σx²P = 0.05 + 0 + 0.2 + 1.2 + 3.15 = **4.6** (no division by n for a probability distribution).\n2. Var(X) = E(X²) − μ² = 4.6 − 1.8² = 4.6 − 3.24 = **1.36** (subtract μ², not μ).\n3. Var(5 − 3X) = (−3)²·Var(X) = 9 × 1.36 = 12.24 → **12.2** (3 s.f.).\n4. Avoid: dividing Σx²P by 5; and subtracting μ (instead of μ²)."},{"question":"In the S1 Q6 chain Venn (A overlaps B, B overlaps C, A and C do not overlap, no triple overlap), with A-only = 0.36, A∩B = 0.24, B∩C = 0.09, and P(B|C′) = 31/75, find x, z and y.","answer":"1. P(A) = 0.60. Independence gives 0.24 = 0.60 × (0.33 + x), so 0.40 = 0.33 + x → **x = 0.07**.\n2. B∩C′ = 0.24 + 0.07 = 0.31. C′ = 0.36 + 0.24 + 0.07 + z = 0.67 + z. So 0.31 / (0.67 + z) = 31/75 → 0.67 + z = 0.75 → **z = 0.08**.\n3. y = 1 − 0.36 − 0.24 − 0.07 − 0.09 − 0.08 = **0.16** (show the subtraction line explicitly for the method mark)."},{"question":"For S1 Q6(d), with the same Venn, evaluate (i) P((B∪C)′ ∩ A) and (ii) P((A∪B) ∩ C′). What notation trap must be avoided?","answer":"1. (i) A outside both B and C = A only = **0.36**.\n2. (ii) All of A∪B lies outside C (A and C do not overlap), so 0.36 + 0.24 + 0.07 = **0.67**.\n3. Trap: \"∩\" shades the region in *both* colours (intersection), not \"union\". Misreading ∪ as ∩ is a common live error here."},{"question":"For S1 Q8(a)–(b), with P(car) = 1/2, P(bike) = 1/6, P(walk) = 1/3 and P(late|car) = 1/5, P(late|bike) = 1/10, P(late|walk) = 1/20, find P(late) and P(car|late).","answer":"1. Add complete path products: P(L) = (1/2)(1/5) + (1/6)(1/10) + (1/3)(1/20) = 1/10 + 1/60 + 1/60 = **2/15**.\n2. P(car|L) = P(car)P(L|car) / P(L) = (1/10) / (2/15) = (1/10)·(15/2) = **3/4**.\n3. This is a Bayes-style quotient, **not** an independence product P(car)·P(L|car)."},{"question":"For S1 Q8(c), how do you build the reversed tree (condition on late / not late, then on transport), and what self-check guarantees no conditional probability is wrong?","answer":"1. P(L) = 2/15, P(L′) = 13/15.\n2. **Given late:** car = (1/10)/(2/15) = 3/4; bike = (1/60)/(2/15) = 1/8; walk = (1/60)/(2/15) = 1/8.\n3. **Given not late:** car = (2/5)/(13/15) = 6/13; bike = (3/20)/(13/15) = 9/52; walk = (19/60)/(13/15) = 19/52.\n4. **Self-check:** each fan of the reversed tree must sum to 1 (3/4 + 1/8 + 1/8 = 1; 24/52 + 9/52 + 19/52 = 1). If a fan doesn't sum to 1, a conditional probability is wrong."},{"question":"For S1 Q3, with Y uniformly distributed on {1, 2, 3, 4, 5, 6}, find E(4Y + 3). Which linearity identity lets you avoid a full table recomputation?","answer":"1. Y is **discrete uniform** with P(Y = y) = 1/6, so E(Y) = 3.5.\n2. Use linearity: E(4Y + 3) = 4E(Y) + 3 = 4(3.5) + 3 = **17**.\n3. You do not rebuild ΣyP; linearity of expectation means only E(Y) is needed, not a full re-tabulation."}]},"minimax_2":{"label":"MiniMax M3 · Run 2","returned_model":"minimax/minimax-m3","cards":[{"question":"On WST01/01, what is the required precision for inexact (decimal) answers unless told otherwise, and what trap did the lesson record this precision causing?","answer":"Three significant figures (3 s.f.) is required — not a minimum to exceed. Trap `[L 07:50–08:40]`: rounding the correlation to 2 s.f. in Q1(b) cost the final accuracy mark, on top of miscopying S_hh."},{"question":"In the NSAA/ESAT warm-up, M = ((x+y)²·z/P)·Q, with x,y each +50%, z −20%, P doubled, Q unchanged. Give the overall multiplier and the percentage change in M.","answer":"Substitute scale factors then factorise: 1.5(x+y) squared is (9/4)(x+y)²; z → 4/5; P → ×2 in denominator. Multiplier = (9/4)·(4/5)·(1/2) = 9/10. M is 90% of its original value — a **10% decrease** (option C). Trap: sending the 2 to the wrong side when computing (9/5)/2."},{"question":"Given Σh=1160, Σw=4160, Σhw=604135, Σw²=2166600, n=8, and printed S_hh=286, find S_hw, S_ww and the correlation r. State the precision rule that bit you here.","answer":"1. S_hw = 604135 − (1160·4160)/8 = 604135 − 603200 = 935.\n2. S_ww = 2166600 − 4160²/8 = 2166600 − 2163200 = 3400.\n3. r = 935/√(286·3400) = 935/√972400 = 0.948176… = **0.948 (awrt)**.\nPrecision rule: 3 s.f. required on WST01/01; miscopying 286 as 290 and rounding to 2 s.f. both lost marks in the lesson."},{"question":"The regression line w = 46.0 + 3.27h came from b = 935/286 and w̄ − b·h̄. (i) Give the contextual interpretation of b. (ii) Estimate w at h=153 and h=170 and label which is interpolation vs extrapolation.","answer":"1. Interpretation: on average, for each 1 cm increase in height, weight increases by 3.27 kg (numeric rate *in context* — a generic \"positive correlation\" loses the mark).\n2. h=153: w = 46.0 + 3.27(153) = **546 kg** — **interpolation** (inside the data range), more reliable.\n3. h=170: w = 46.0 + 3.27(170) = **602 kg** (3 s.f.) — **extrapolation** (outside the range), less reliable."},{"question":"A box plot has Q1=95, median=105, Q3=112. Using the 1.5×IQR rule supplied in the question, find the fences and state the outlier status of the value 139. What single word does the mark scheme insist on?","answer":"1. IQR = 112 − 95 = 17; 1.5×IQR = 25.5.\n2. Lower fence = 95 − 25.5 = 69.5; upper fence = 112 + 25.5 = 137.5.\n3. Since 139 \u003e 137.5, it is an outlier. The mark scheme requires the word **\"only\"** — say \"139 is the **only** outlier.\"\nMethod trap: do **not** use a mean ± 2s rule; the spec says the outlier rule is given in the question."},{"question":"For the discrete uniform Y on {1,2,3,4,5,6} find E(Y) and E(4Y+3), and state the linearity identity that lets you skip recomputing the distribution.","answer":"1. E(Y) = (1+2+3+4+5+6)/6 = 3.5.\n2. Use E(aY+b) = a·E(Y) + b: E(4Y+3) = 4(3.5) + 3 = **17**.\n3. Trap: do not rebuild the table; linearity of expectation lets you scale and shift without re-summing."},{"question":"X takes values −1,0,1,2,3 with P = 0.05, 0.10, a, b, 0.35 and E(X)=1.8. Find a and b, then write F(x)=P(X≤x) and compute P(2X\u003c1).","answer":"1. Sum: 0.05+0.10+a+b+0.35=1 ⟹ a+b=0.5.\n2. Mean: −0.05+0+ a + 2b + 1.05 = 1.8 ⟹ a+2b=0.8.\n3. Subtract: b=0.3, then **a=0.20, b=0.30**.\n4. CDF: F(−1)=0.05, F(0)=0.15, F(1)=0.35, F(2)=0.65, F(3)=1.\n5. 2X\u003c1 ⟺ X\u003c0.5 ⟺ X≤0, so P(2X\u003c1)=F(0)=**0.15**."},{"question":"With the X in Q7, compute Var(X) and Var(5−3X). State the two identities and the trap from the lesson.","answer":"1. E(X²) = 1(0.05) + 0 + 1(0.2) + 4(0.3) + 9(0.35) = 4.6. (No division by n — E(X²)=Σx²P directly.)\n2. Var(X) = E(X²) − μ² = 4.6 − 1.8² = **1.36**.\n3. Var(5−3X) = (−3)²·Var(X) = 9·1.36 = 12.24 ≈ **12.2 (3 s.f.)**.\nIdentities: Var(X)=Σx²P−μ² and Var(aX+b)=a²·Var(X). Lesson trap: dividing Σx²P by 5 and subtracting μ (not μ²) gave 1.2 then 10.8."},{"question":"A *chain* Venn has A-only 0.36, A∩B 0.24, B-only x, B∩C 0.09, C-only y, outside z, with A and B independent. Find x using P(A∩B)=P(A)P(B). State the efficiency tip.","answer":"1. P(A)=0.36+0.24=0.60; P(B)=0.24+x+0.09=0.33+x.\n2. Independence: 0.24 = 0.60(0.33+x) ⟹ divide by 0.6: 0.4 = 0.33+x ⟹ **x=0.07**, so P(B)=0.40.\nEfficiency tip: divide by 0.6 rather than expanding brackets — fewer steps, less sign error."},{"question":"Given P(B|C′)=31/75 from the same chain Venn, find z and then y. Which region must be in the denominator of the conditional, and why?","answer":"1. B∩C′ = parts of B outside C = 0.24 + 0.07 = 0.31.\n2. C′ = everything outside C = 0.36 + 0.24 + 0.07 + z = 0.67 + z. The outside region z is included — that was the lesson correction.\n3. 0.31/(0.67+z) = 31/75 ⟹ 0.67+z = 0.75 ⟹ **z=0.08**.\n4. All regions sum to 1: y = 1 − 0.36 − 0.24 − 0.07 − 0.09 − 0.08 = **0.16**. Show the subtraction line explicitly for the M1 A1ft."},{"question":"In the same Venn, evaluate (i) P((B∪C)′ ∩ A) and (ii) P((A∪B) ∩ C′). Which symbol caused live confusion and what does it mean?","answer":"1. \"∩\" means *both* — shade only the region in both sets.\n2. (i) (B∪C)′ ∩ A = the part of A outside both B and C = A-only = **0.36**.\n3. (ii) (A∪B) ∩ C′ = all of A∪B, which lies outside C (chain geometry) = 0.36+0.24+0.07 = **0.67**.\nTrap: union vs intersection when shading — \"∩\" is the overlap of colours, not \"either\"."},{"question":"Forward tree: P(car)=1/2, P(bike)=1/6, P(walk)=1/3; P(late|car)=1/5, P(late|bike)=1/10, P(late|walk)=1/20. Find P(late) and P(car|late), then state the self-check for any reversed tree.","answer":"1. P(L) = (1/2)(1/5) + (1/6)(1/10) + (1/3)(1/20) = 1/10 + 1/60 + 1/60 = **2/15**.\n2. Bayes: P(car|L) = P(car)P(L|car)/P(L) = (1/10)/(2/15) = (1/10)(15/2) = **3/4**. (Not an independence product.)\n3. Self-check for a reversed tree: each fan of branches under a given condition must **sum to 1** — e.g. given L: 3/4 + 1/8 + 1/8 = 1; given L′: 6/13 + 9/52 + 19/52 = 1. If a fan doesn't sum to 1, a conditional is wrong."}]},"deepseek_1":{"label":"DeepSeek V4 Pro","returned_model":"deepseek/deepseek-v4-pro","cards":[{"question":"The regression line for weight \\(w\\) (kg) on height \\(h\\) (cm) is \\(w = 46.0 + 3.27h\\). Explain what the slope 3.27 means in the context of the data. What common vague statement loses the mark?","answer":"On average, for each **1 cm increase in height**, the weight increases by **3.27 kg**. Saying only “there is a positive correlation” does not use the numeric rate and loses the interpretation mark. Always state the direction, the unit change in the explanatory variable, and the associated average change in the response variable."},{"question":"For inexact (decimal) answers on the WST01/01 paper, what rounding precision is required? What error occurred in Q1(b) where \\(r = 0.948176\\dots\\)?","answer":"Answers must be given to **three significant figures** unless stated otherwise. In Q1(b) the correlation was rounded to **2 s.f.** as 0.95 instead of **0.948**, which lost the accuracy mark. Always round to 3 s.f.; 2 s.f. is not enough."},{"question":"A question supplies the rule: “a value is an outlier if it is more than \\(1.5 \\times \\mathrm{IQR}\\) beyond a quartile”. With \\(\\mathrm{Q1}=95\\), \\(\\mathrm{Q3}=112\\), and the largest data value 139, show there is only one outlier. What precise wording is needed in the conclusion?","answer":"1. \\(\\mathrm{IQR}=112-95=17\\)  \n2. \\(1.5\\times\\mathrm{IQR}=25.5\\)  \n3. Lower fence \\(=95-25.5=69.5\\); upper fence \\(=112+25.5=137.5\\)  \n4. 139 \u003e 137.5 → it is an outlier. No value is below 69.5.  \n5. Conclude: “**Only** the value 139 is an outlier.” Using the word “only” directly matches the “show that there is only one outlier” instruction and secures the mark."},{"question":"From a box plot you find \\(\\mathrm{Q3}-\\mathrm{median} \u003e \\mathrm{median}-\\mathrm{Q1}\\). What type of skew does this indicate, and what does that mean *in context* (e.g., weights of club members)?","answer":"It indicates **positive skew**. In context, the weights are **more varied (more spread out) above the median than below it**. A bare “positively skewed” statement does not give the contextual interpretation needed for the mark; explicitly describe the spread relative to the median."},{"question":"\\(Y\\) has a discrete uniform distribution on \\(\\{1,2,3,4,5,6\\}\\). Find \\(\\mathrm{E}(4Y+3)\\). Which formula is *expected knowledge* (not in the formula booklet)?","answer":"\\(\\mathrm{E}(Y)=\\frac{1+6}{2}=3.5\\). Then \\(\\mathrm{E}(4Y+3)=4\\mathrm{E}(Y)+3 = 4(3.5)+3 = 17\\).  \nThe linear transformation \\(\\mathrm{E}(aX+b)=a\\mathrm{E}(X)+b\\) is **expected knowledge** and is **not given** in the formula booklet. (The booklet gives \\(\\mathrm{E}(X)=\\sum xP\\), but not the linear rule.)"},{"question":"For a discrete random variable \\(X\\) with values \\(-1,0,1,2,3\\) and \\(\\mathrm{P}(X=-1)=0.05,\\ \\mathrm{P}(0)=0.10,\\ \\mathrm{P}(1)=0.20,\\ \\mathrm{P}(2)=0.30,\\ \\mathrm{P}(3)=0.35\\), \\(\\mathrm{E}(X)=1.8\\). Compute \\(\\mathrm{Var}(X) = \\sum x^2P - \\mu^2\\). What **two** common errors must you avoid?","answer":"1. **Do not divide by \\(n\\)**: \\(\\mathrm{E}(X^2)=\\sum x^2P(X=x)\\) directly. Here \\(\\mathrm{E}(X^2)=(-1)^2(0.05)+0+(1^2)(0.20)+(2^2)(0.30)+(3^2)(0.35)=4.6\\).  \n2. **Subtract \\(\\mu^2\\), not \\(\\mu\\)**: \\(\\mathrm{Var}(X)=4.6-(1.8)^2=4.6-3.24=1.36\\).  \nThe mistake seen in the lesson was dividing by 5 as if it were a sample, and subtracting 1.8 instead of \\(1.8^2\\). Also remember \\(\\mathrm{Var}(aX+b)=a^2\\mathrm{Var}(X)\\)."},{"question":"How do you present the cumulative distribution function \\(F(x)=\\mathrm{P}(X\\le x)\\) for a discrete random variable? Use the distribution from Q6.","answer":"Present it as a **table of \\(x\\) and \\(F(x)\\)**, starting with the smallest \\(x\\) and accumulating probabilities:\n| \\(x\\) | \\(-1\\) | \\(0\\) | \\(1\\) | \\(2\\) | \\(3\\) |\n|------|-------|-----|-----|-----|-----|\n| \\(F(x)\\) | \\(0.05\\) | \\(0.05+0.10=0.15\\) | \\(0.15+0.20=0.35\\) | \\(0.35+0.30=0.65\\) | \\(0.65+0.35=1\\) |\n\nNever present the original probability mass function as the CDF; the table must show cumulative sums."},{"question":"In a Venn diagram with independent events \\(A\\) and \\(B\\), \\(\\mathrm{P}(A)=0.60\\), \\(\\mathrm{P}(A\\cap B)=0.24\\), and \\(\\mathrm{P}(B)=0.33+x\\). Find \\(x\\). What algebraic shortcut avoids expanding brackets?","answer":"Independence gives \\(\\mathrm{P}(A\\cap B)=\\mathrm{P}(A)\\mathrm{P}(B)\\) \\(\\Longrightarrow 0.24 = 0.60(0.33+x)\\).  \n**Divide both sides by 0.60** (\\(=0.24/0.60 = 0.4\\)): \\(0.4 = 0.33+x\\) \\(\\Rightarrow x=0.07\\).  \nThis avoids expanding \\(0.60(0.33+x)\\) and simplifies the arithmetic."},{"question":"\\(A\\), \\(B\\), \\(C\\) are events in a Venn diagram with \\(A\\) and \\(C\\) disjoint. The outside region is \\(z\\). Given \\(\\mathrm{P}(B|C') = 31/75\\), write the equation to find \\(z\\) and identify the trap that caused an initial lesson error.","answer":"\\(C'\\) includes everything not in \\(C\\), including the outside region \\(z\\).  \n\\(\\mathrm{P}(B\\cap C')\\) is the sum of the \\(B\\)-only and \\(A\\cap B\\) regions that are not in \\(C\\) (e.g., 0.31).  \n\\(\\mathrm{P}(C') = (0.67+z)\\). So \\(\\dfrac{0.31}{0.67+z} = \\dfrac{31}{75}\\).  \n**Trap:** omitting \\(z\\) from the denominator (using \\(0.67\\) instead of \\(0.67+z\\)) gives a wrong answer. Always include the “outside” region when it belongs to the complement."},{"question":"Interpret the notation \\(\\mathrm{P}\\big((B \\cup C)' \\cap A\\big)\\) in a Venn diagram with events \\(A,B,C\\). How do you distinguish \\(\\cup\\) from \\(\\cap\\) when shading the required region?","answer":"\\((B\\cup C)'\\) means everything **outside** both \\(B\\) and \\(C\\). The intersection with \\(A\\) takes the part of \\(A\\) that is outside \\(B\\) and outside \\(C\\) — i.e., **the \\(A\\)-only region**.  \nWhen shading: \\(\\cup\\) (union) shades all areas that belong to **either** event; \\(\\cap\\) (intersection) shades only the **overlap** where both events hold. Misreading ∪ as ∩ (or vice‑versa) is a common cause of errors in set‑notation questions."},{"question":"After finding \\(\\mathrm{P}(L)=2/15\\) and \\(\\mathrm{P}(\\text{car}|L)=3/4\\), you need the reversed‑tree branch probabilities for car, bike, walk given \\(L\\) and given \\(L'\\). What calculation gives \\(\\mathrm{P}(\\text{bike}|L)\\)? What self‑check ensures the tree is correct?","answer":"1. \\(\\displaystyle \\mathrm{P}(\\text{bike}|L)=\\frac{\\mathrm{P}(\\text{bike})\\mathrm{P}(L|\\text{bike})}{\\mathrm{P}(L)} = \\frac{(1/6)(1/10)}{2/15}= \\frac{1/60}{2/15}=\\frac{1}{60}\\cdot\\frac{15}{2}=\\frac{1}{8}\\).  \n2. Compute the remaining branches analogously.  \n**Self‑check:** Each **fan** of the reversed tree (the branches given \\(L\\) and the branches given \\(L'\\)) must **sum to 1**. If a set of conditional probabilities does not add to 1, at least one branch is incorrect."},{"question":"A quantity \\(M = \\dfrac{(x+y)^2 z}{P} Q\\). If \\(x\\) and \\(y\\) each increase by 50%, \\(z\\) decreases by 20%, \\(P\\) is doubled, and \\(Q\\) is unchanged, find the percentage change in \\(M\\). What is the key strategy that avoids a messy binomial expansion?","answer":"1. Replace each variable by its **scale factor**: \\(x+y \\to 1.5(x+y)\\), \\(z \\to 0.8=\\frac{4}{5}\\), \\(P \\to 2P\\), \\(Q\\) unchanged.  \n2. Overall multiplier: \\(\\displaystyle \\left(\\frac{3}{2}\\right)^2 \\cdot \\frac{4}{5} \\cdot \\frac{1}{2} = \\frac{9}{4}\\cdot\\frac{4}{5}\\cdot\\frac{1}{2} = \\frac{9}{10}\\).  \n3. \\(M\\) becomes 90% of its original value → a **10% decrease**.  \n**Key strategy:** factorise \\(x+y\\) **before squaring** and use fractional scale factors; this avoids expanding \\((1.5x+1.5y)^2\\) term‑by‑term and makes cancellation obvious."}]},"kimi_1":{"label":"Kimi K3","returned_model":"moonshotai/kimi-k3","cards":[{"question":"ESAT-style warm-up (official Cambridge NSAA Section 1 specimen, Part A Q17, not a current ESAT question): for $$M=\\frac{(x+y)^2\\,z}{P}\\cdot Q$$, $x$ and $y$ each increase by $50\\%$, $z$ decreases by $20\\%$, $P$ is doubled, $Q$ unchanged. What is the overall change in $M$, and what strategy avoids the common slips?","answer":"1. Substitute scale factors into the unchanged expression: $$x+y\\to 1.5x+1.5y=\\tfrac32(x+y)$$ — factorise *before* squaring to avoid a binomial expansion.\n2. Square: $$\\left(\\tfrac32\\right)^2=\\tfrac94$$; keep $$z\\to\\tfrac45$$ as a fraction so cancelling is visible; $P$ doubled gives $\\times\\tfrac12$.\n3. Multiplier: $$\\tfrac94\\times\\tfrac45\\times\\tfrac12=\\tfrac9{10}$$ — the 4s cancel, and the 2 goes to the *denominator* (a common slip).\nResult: $M$ becomes $90\\%$ of its original value — a **10% decrease**, option C `[NSAA]`. [Completed with prompting] `[L 02:17–06:13]`"},{"question":"On WST01/01 Q1, with $$S_{hw}=935,\\ S_{hh}=286,\\ S_{ww}=3400$$, compute $r$, state the required answer precision, and name the two slips that lost the accuracy mark in the lesson.","answer":"1. $$r=\\frac{S_{hw}}{\\sqrt{S_{hh}S_{ww}}}=\\frac{935}{\\sqrt{286\\times3400}}=\\frac{935}{\\sqrt{972400}}=0.948176\\ldots=\\mathbf{0.948}\\ \\text{(awrt)}$$ `[MS]`.\n2. Inexact answers must be given to **3 significant figures unless otherwise stated** — 2 s.f. is not enough `[QP]`.\n3. Lesson slips `[L 07:50–08:40]`: the printed $$S_{hh}=286$$ was miscopied (final 6 written as a 9), and $r$ was rounded to 2 s.f. instead of 3. [Completed with prompting]"},{"question":"For the regression line $$w=46.0+3.27h$$ ($h$ = height in cm, $w$ = weight in kg): (i) give the mark-scoring interpretation of the gradient $3.27$; (ii) using the explicit required terms, state which estimate — $h=153$ or $h=170$ — is more reliable and why.","answer":"1. (i) On average, for each **1 cm increase in height, weight increases by 3.27 kg** — the mark needs this numeric rate in context; a generic \"positive correlation\" statement is not specific enough `[MS]`.\n2. (ii) $h=153$ is **interpolation** (within the data range) and more reliable; $h=170$ is **extrapolation** (outside the range) and less reliable — use the explicit terms to guarantee the mark `[MS]`.\nBoth [Completed with prompting] `[L 08:49–11:16]`."},{"question":"A question *supplies* the rule: a value is an outlier if it is more than $$1.5\\times\\text{IQR}$$ beyond a quartile. With $$Q_1=95,\\ Q_3=112$$, test the value 139, state the required wording of the conclusion, and say where outlier rules come from on S1.","answer":"1. $$\\text{IQR}=112-95=17,\\quad 1.5\\times17=25.5$$; fences: $$95-25.5=69.5,\\quad 112+25.5=137.5$$.\n2. Since $$139\u003e137.5$$, state unambiguously: **139 is the *only* outlier** — the mark scheme requires the word *only* `[MS]`.\n3. Any outlier rule will be **given in the question** `[SPEC]`; do *not* substitute a mean $\\pm\\,2s$ rule `[L 13:11–14:06]`. [Completed with prompting]"},{"question":"What quartile inequality diagnoses positive skew on a box plot, and what contextual interpretation did S1 Q2(d) require beyond naming the skew?","answer":"1. Positive skew when $$Q_3-Q_2\u003eQ_2-Q_1$$ (wider spread above the median) `[MS]`.\n2. Required interpretation in context: **Club B's weights are more varied above the median than below it** — \"positively skewed\" alone describes but does not interpret `[MS]`. [Completed with prompting] `[L 14:06–16:07]`"},{"question":"$Y$ is discrete uniform on $\\{1,2,3,4,5,6\\}$. State $$P(Y=y),\\ E(Y),\\ E(4Y+3)$$, and the linearity rule used — is that rule printed in the formula booklet?","answer":"1. $$P(Y=y)=\\tfrac16,\\ y=1,\\ldots,6$$; $$E(Y)=3.5$$.\n2. $$E(4Y+3)=4E(Y)+3=4(3.5)+3=\\mathbf{17}$$ using $$E(aY+b)=aE(Y)+b$$ `[MS]`.\n3. $E(aX+b)=aE(X)+b$ is **expected knowledge, not printed** in the booklet `[SPEC]` `[FB]`. Reviewed as fully correct `[L 16:07–16:21]`."},{"question":"A discrete random variable $X$ takes values $-1,0,1,2,3$ with cumulative probabilities $$F(x)=0.05,\\ 0.15,\\ 0.35,\\ 0.65,\\ 1$$. Find $$P(2X\u003c1)$$, and state how a discrete CDF should be presented.","answer":"1. Rewrite the inequality in terms of $X$: $$2X\u003c1\\iff X\u003c0.5\\iff X\\le 0$$.\n2. Read off the CDF: $$P(2X\u003c1)=F(0)=\\mathbf{0.15}$$ `[MS]`.\n3. Present the CDF **as a table** of cumulative probabilities $$F(x)=P(X\\le x)$$ (definition is expected knowledge `[SPEC]`; table tip `[L 16:21]`). [Completed with prompting]"},{"question":"For $X$ with $$E(X)=1.8,\\ E(X^2)=\\sum x^2P(X=x)=4.6$$, find $$Var(X)$$ and $$Var(5-3X)$$, and identify the two errors made in the lesson.","answer":"1. $$Var(X)=E(X^2)-[E(X)]^2=4.6-1.8^2=4.6-3.24=\\mathbf{1.36}$$ `[MS]` `[FB]`.\n2. $$Var(5-3X)=(-3)^2\\,Var(X)=9(1.36)=12.24\\to\\mathbf{12.2}\\ (3\\ \\text{s.f.})$$ `[MS]`, using $$Var(aX+b)=a^2Var(X)$$ (expected knowledge `[SPEC]`).\n3. Lesson errors `[L 18:43–21:36]`: dividing $\\sum x^2p$ by 5 (there is **no division by $n$** for a probability distribution) and subtracting $E(X)$ instead of $[E(X)]^2$. Note: $Var(X)=\\sum x^2P-\\mu^2$ **is** printed in the booklet (S1 p.14) despite in-lesson uncertainty. [Completed with prompting]"},{"question":"In a *chain* Venn diagram ($A$ and $C$ do not overlap): $$P(A\\text{ only})=0.36,\\ P(A\\cap B)=0.24,\\ P(B\\cap C)=0.09,\\ P(B\\text{ only})=x$$, and $A$ and $B$ are independent. Find $x$, including the efficient algebraic move.","answer":"1. Independence condition: $$P(A\\cap B)=P(A)P(B)$$ (expected knowledge, not printed `[SPEC]`), with $$P(A)=0.36+0.24=0.60,\\quad P(B)=0.24+x+0.09=0.33+x$$.\n2. $$0.24=0.60(0.33+x)$$ — **divide both sides by 0.6 rather than expanding** (fewer steps `[L 24:27–25:03]`): $$0.4=0.33+x\\implies \\mathbf{x=0.07}$$, so $P(B)=0.40$ `[MS]`."},{"question":"Same chain Venn: given $$P(B\\mid C')=\\frac{31}{75}$$ and $$B\\cap C'=0.24+0.07=0.31$$, find the outside region $z$. What is the denominator trap?","answer":"1. $C'$ is *everything not in* $C$, **including the outside region** $z$: $$C'=0.36+0.24+0.07+z=0.67+z$$.\n2. Solve: $$\\frac{0.31}{0.67+z}=\\frac{31}{75}\\implies 0.67+z=\\frac{0.31\\times75}{31}=0.75\\implies \\mathbf{z=0.08}$$ `[MS]`.\n3. Trap `[L 27:51–28:52]`: $\\tfrac{31}{75}$ is **given** — use it, don't try to derive it — and $z$ must appear in the denominator. [Completed with prompting]"},{"question":"Tree: $$P(\\text{car})=\\tfrac12,\\ P(\\text{bike})=\\tfrac16,\\ P(\\text{walk})=\\tfrac13$$; $$P(\\text{late}\\mid\\text{mode})=\\tfrac15,\\ \\tfrac1{10},\\ \\tfrac1{20}$$. Find $P(\\text{late})$ and $P(\\text{car}\\mid\\text{late})$, and give the self-check for the reversed tree.","answer":"1. Add **complete path products** (not branch labels): $$P(L)=\\tfrac12\\cdot\\tfrac15+\\tfrac16\\cdot\\tfrac1{10}+\\tfrac13\\cdot\\tfrac1{20}=\\tfrac1{10}+\\tfrac1{60}+\\tfrac1{60}=\\mathbf{\\tfrac2{15}}$$ `[MS]`.\n2. Bayes-style quotient — *not* an independence product: $$P(\\text{car}\\mid L)=\\frac{\\tfrac12\\cdot\\tfrac15}{2/15}=\\frac{1/10}{2/15}=\\tfrac1{10}\\cdot\\tfrac{15}{2}=\\mathbf{\\tfrac34}$$ `[MS]`.\n3. Reversed-tree check `[L 46:56–54:08]`: **each fan must sum to 1** — given late: $\\tfrac34,\\tfrac18,\\tfrac18$; given not late: $\\tfrac6{13},\\tfrac9{52},\\tfrac{19}{52}$; if a fan fails to sum to 1, a conditional probability is wrong `[MS]`. [Completed with prompting]"},{"question":"After the lesson of 29 June 2026, which parts of the assigned WST01/01 paper must **not** be treated as complete, and what is the required action before the planned revisit?","answer":"1. **[Deferred]** — not discussed or shown this lesson: **Q5** (apple data: histogram / interpolation / coding) and **Q7** (normal distribution, butterfly wingspans); the paper was **left unfinished**, and any other unattempted pages have unknown status — do not assume complete.\n2. The tutor **deliberately withheld the mark scheme** so the remaining work is attempted unaided `[L 54:56–55:38]`.\n3. Action: attempt Q5, Q7 and finish the paper unaided, then submit the **full** paper for marking at the revisit; also work through the emailed Pure 2 papers."}]}},ROLES=Object.keys(DATA);let active=ROLES[0],selected={};for(const r of ROLES)selected[r]=new Set(DATA[r].cards.map((_,i)=>i));
function typeset(){const x=document.getElementById('list');if(window.MathJax&&MathJax.typesetPromise){if(MathJax.typesetClear)MathJax.typesetClear([x]);MathJax.typesetPromise([x]).catch(()=>{})}}
function tabs(){const t=document.getElementById('tabs');t.replaceChildren();for(const r of ROLES){const b=document.createElement('button');b.className='tab'+(r===active?' active':'');b.textContent=DATA[r].label+' ('+DATA[r].cards.length+')';b.onclick=()=>{active=r;tabs();render()};t.append(b)}}
function render(){const l=document.getElementById('list');l.replaceChildren();DATA[active].cards.forEach((c,i)=>{const article=document.createElement('article');article.className='card';const row=document.createElement('div');row.className='row';const pick=document.createElement('input');pick.className='pick';pick.type='checkbox';pick.checked=selected[active].has(i);pick.setAttribute('aria-label',`Select card ${i+1}`);const qw=document.createElement('div');qw.className='qwrap';const q=document.createElement('div');q.className='q';q.tabIndex=0;q.textContent=c.question;const ans=document.createElement('div');ans.className='answer';const txt=document.createElement('div');txt.textContent=c.answer;const foot=document.createElement('div');foot.className='foot';const cp=document.createElement('button');cp.className='copy';cp.textContent='Copy';cp.onclick=()=>copyText(c.question+'\t'+c.answer);foot.append(cp);ans.append(txt,foot);qw.append(q,ans);row.append(pick,qw);article.append(row);l.append(article);pick.onchange=()=>{pick.checked?selected[active].add(i):selected[active].delete(i);count()};const toggle=()=>{article.classList.toggle('open');typeset()};q.onclick=toggle;q.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle()}}});count();typeset()}
function count(){document.getElementById('count').textContent=`${selected[active].size} / ${DATA[active].cards.length} selected`}
function setall(v){selected[active]=v?new Set(DATA[active].cards.map((_,i)=>i)):new Set();render()}
function reveal(v){document.querySelectorAll('.card').forEach(x=>x.classList.toggle('open',v));typeset()}
function copyText(s){navigator.clipboard.writeText(s).then(()=>toast('Copied')).catch(()=>toast('Copy failed'))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)}
function table(){const c=DATA[active].cards.filter((_,i)=>selected[active].has(i));let s='| Question | Answer |\n| --- | --- |\n';for(const x of c)s+='| '+x.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+x.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n';copyText(s)}
addEventListener('DOMContentLoaded',()=>{tabs();render();document.getElementById('sel').onclick=()=>setall(true);document.getElementById('desel').onclick=()=>setall(false);document.getElementById('reveal').onclick=()=>reveal(true);document.getElementById('hide').onclick=()=>reveal(false);document.getElementById('table').onclick=table});</script></body></html>
