<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2214%22 fill=%22%23006edc%22/><text x=%2232%22 y=%2243%22 text-anchor=%22middle%22 font-size=%2234%22 fill=%22white%22>ƒ</text></svg>"><title>Pearson Edexcel IAL P2 WMA12/01 October 2025 + historical ECAA practice · 21 June 2026 Maths P2 and historical predecessor practice — Multi-model flashcards</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;max-width:100%;overflow-x:hidden}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.5}.wrap{width:100%;max-width:980px;margin:auto;padding:26px 16px 70px;overflow-x:clip}header{text-align:center;margin:7px 0 18px}h1{font-size:30px;line-height:1.18;margin:0}.sub{color:#68686d;margin:6px 0}.tabs{display:flex;gap:7px;overflow-x:auto;padding:5px 1px 11px;scrollbar-width:thin}.tab{white-space:nowrap;border:1px solid #d2d2d7;background:#fff;border-radius:999px;padding:8px 12px;font:650 12px inherit;cursor:pointer}.tab.active{background:#006edc;color:#fff;border-color:#006edc}.tools{position:sticky;top:7px;z-index:5;display:flex;gap:7px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid #e2e2e7;border-radius:14px;padding:10px;margin-bottom:13px;box-shadow:0 2px 8px #0000000d}.tools button{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:6px 9px;font:600 12px inherit;cursor:pointer}.count{margin-left:auto;color:#68686d;font-size:12px;font-weight:650}.list{display:flex;flex-direction:column;gap:10px}.card{min-width:0;max-width:100%;background:#fff;border:1px solid #e1e1e6;border-radius:14px;padding:15px 16px;box-shadow:0 1px 4px #0000000a}.row{display:flex;gap:10px;align-items:flex-start;min-width:0}.pick{width:18px;height:18px;margin-top:3px;flex:0 0 auto}.qwrap{min-width:0;max-width:100%;flex:1}.q{font-weight:650;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;cursor:pointer;overflow-x:auto}.answer{display:none;white-space:pre-wrap;margin-top:10px;padding-top:10px;border-top:1px solid #ececf0;color:#3e3e43;overflow-wrap:anywhere;word-break:break-word;overflow-x:auto}.card.open .answer{display:block}.foot{display:flex;justify-content:flex-end;margin-top:8px}.copy{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:3px 8px;cursor:pointer}.notice{font-size:12px;color:#68686d;text-align:center;margin:12px 0}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#1d1d1f;color:#fff;border-radius:8px;padding:8px 14px;opacity:0;pointer-events:none}.toast.show{opacity:1}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}@media(max-width:430px){.wrap{padding:16px 10px 55px}h1{font-size:24px}.tools{top:4px}.count{width:100%;margin-left:0}.card{padding:13px 12px}}</style><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true},options:{skipHtmlTags:["script","noscript","style","textarea","pre","code"]}};</script><script defer src="assets/mathjax/es5/tex-mml-chtml.js"></script></head><body><main class="wrap"><header><h1>Pearson Edexcel IAL P2 WMA12/01 October 2025 + historical ECAA practice · 21 June 2026 Maths P2 and historical predecessor practice</h1><p class="sub">Direct model-output flashcards</p></header><nav id="tabs" class="tabs" aria-label="Models"></nav><nav class="tools"><button id="sel">Select all</button><button id="desel">Deselect all</button><button id="reveal">Reveal all</button><button id="hide">Hide all</button><button id="table">Copy table</button><span id="count" class="count"></span></nav><section id="list" class="list"></section><p class="notice">Model outputs are displayed directly as generated.</p></main><div id="toast" class="toast"></div><script>const DATA={"glm_1":{"label":"GLM 5.1 · Run 1","returned_model":"z-ai/glm-5.1","cards":[{"question":"In a historical ECAA 2020 specimen question (ESAT-style practice, NOT a current ESAT question), a square with vertices at $$(\\pm 1, \\pm 1)$$ is rotated 90° clockwise about the origin, then reflected in the line $$y = x$$. What is the reliable lesson method to find the combined effect, and what is the derived verification check?","answer":"1. Lesson method: Labelled-vertex tracking. Label the vertices (e.g., $$P(1,1)$$), apply each transformation to the coordinates, and compare final positions to the original. 2. Derived verification check (not a recorded lesson method): Matrix composition. Multiplying the rotation and reflection matrices yields the reflection-in-the-y-axis matrix. Both show the combined effect is reflection in the y-axis (its own inverse), matching official option B."},{"question":"In a historical ECAA 2020 specimen question (ESAT-style practice, NOT current ESAT), $$P(\\text{bus on time}) = 0.6$$, $$P(\\text{catch} \\mid \\text{on time}) = 0.8$$, and $$P(\\text{catch} \\mid \\text{late}) = 0.6$$. How do you find $$P(\\text{on time} \\mid \\text{catch})$$, and what is the common trap?","answer":"1. Build a tree: paths are $$0.6 \\times 0.8 = 0.48$$ and $$0.4 \\times 0.6 = 0.24$$. 2. $$P(\\text{catch}) = 0.48 + 0.24 = 0.72$$. 3. Apply conditional formula: $$P(\\text{on time} \\mid \\text{catch}) = 0.48 / 0.72 = 2/3$$ (Option E). Trap: Do not assume independence; you cannot multiply $$P(\\text{on time}) \\times P(\\text{catch})$$."},{"question":"For the binomial expansion $$(1+px)^{10}$$, the first four terms are given as $$1 + 15x + qx^2 + rx^3$$. What is the trap that led to a score of 0/6 (live repair), and how is it correctly solved?","answer":"Trap: Stopping the expansion because $$10px$$ \"does not look like\" $$15x$$. The mark scheme requires full simplification before awarding the first mark. Fix (live repair): Expand completely to $$1 + 10px + 45p^2x^2 + 120p^3x^3 + \\dots$$, then compare coefficients. $$10p = 15 \\Rightarrow p = 3/2$$; $$q = 45(3/2)^2 = 101.25$$; $$r = 120(3/2)^3 = 405$$."},{"question":"When applying the trapezium rule with six ordinates from $$x = -0.5$$ to $$x = 7$$, what strip count $$n$$ and strip width $$h$$ must be used, and what was the status of this error?","answer":"Status: partial. Trap: Counting ordinates instead of gaps. Six ordinates create five strips ($$n = 5$$), not six. Therefore, $$h = \\frac{7 - (-0.5)}{5} = 1.5$$. Using $$n = 6$$ propagates an incorrect $$h$$, costing multiple marks across subsequent parts."},{"question":"Given $$f(x) = 4x^3 + 13x^2 - 10x + 8$$, after dividing by $$(x-2)$$ the remainder is 72. What copy-slip lost an accuracy mark (partial), and what conclusion-slip lost a mark when showing $$(x+4)$$ is a factor?","answer":"1. Copy-slip: The remainder 72 was mis-copied as 32. 2. Conclusion-slip: Showing $$f(-4) = 0$$ is insufficient alone; you must explicitly write \"therefore $$(x+4)$$ is a factor\" to earn the conclusion mark. To prove only one real solution (live repair), factorise as $$(x+4)(4x^2-3x+2)$$, show discriminant is $$-23 \u003c 0$$, and state $$x=-4$$ is the only real root."},{"question":"Solving $$4\\tan\\theta + 5\\sin\\theta = 0$$ for $$0 \u003c \\theta \\le 360^\\circ$$ requires $$\\cos\\theta \\neq 0$$ and yields $$\\sin\\theta(4 + 5\\cos\\theta) = 0$$. What roots are found, and what second-solution rule was missed (partial)?","answer":"$$\\sin\\theta = 0$$ gives $$\\theta = 180^\\circ, 360^\\circ$$ ($$0^\\circ$$ excluded by strict inequality). $$\\cos\\theta = -4/5$$ gives $$\\theta = 143.1^\\circ$$. Missed root (partial): For cosine, the second solution is $$360^\\circ - \\alpha$$, so $$360^\\circ - 143.1^\\circ = 216.9^\\circ$$. Do not apply the sine rule $$180^\\circ - \\alpha$$ to a cosine equation."},{"question":"When solving $$\\frac{\\sin x}{\\cos x} + \\frac{\\cos x}{\\sin x} = \\frac{5}{\\cos x}$$ for $$0 \u003c x \u003c \\pi$$, what domain checks and algebraic steps are required (live repair)?","answer":"1. Domain: $$\\sin x \\neq 0$$ and $$\\cos x \\neq 0$$; range is radians. 2. Algebra: Multiply through by $$\\sin x \\cos x$$ (valid since neither is zero). 3. Identity: $$\\sin^2 x + \\cos^2 x = 1$$, so $$1 = 5\\sin x \\Rightarrow \\sin x = 0.2$$. 4. Rounding: Calculate second solution $$\\pi - \\arcsin(0.2)$$ using the unrounded intermediate value, then round to 3 s.f. ($$x = 0.201, 2.94$$)."},{"question":"Circle $$C_1$$ has diameter endpoints $$A(-2,18)$$ and $$B(14,6)$$, giving $$(x-6)^2 + (y-12)^2 = 100$$ (original correct). Circle $$C_2$$ is centred at the origin and touches $$C_1$$. What strategy finds $$C_2$$'s equations (live repair)?","answer":"Strategy: Draw a diagram first (algebra alone stalls). The distance from the origin to $$C_1$$'s centre is $$\\sqrt{6^2 + 12^2} = \\sqrt{180}$$. Since the question implies multiple solutions (\"possible equations\"), there are two touching circles: 1. Inner: radius $$= \\sqrt{180} - 10$$, equation $$x^2 + y^2 = 280 - 120\\sqrt{5}$$. 2. Outer: radius $$= \\sqrt{180} + 10$$, equation $$x^2 + y^2 = 280 + 120\\sqrt{5}$$."},{"question":"When finding a shaded area between a curve and a line where the curve is above the line, a sign slip yielded a negative area (partial). What sense-check catches this, and what is the correct integrand order?","answer":"Sense-check: An area must be positive; a negative area signals a sign slip. Correct integrand: Use \"curve minus line\" when the curve is above the line, ensuring a positive result. Do not write \"line minus curve\". The exact area $$6939/28 \\approx 248$$ must be positive."},{"question":"For P2 Q8 (finite geometric sum proof and evaporation model), which is DEFERRED, what are the official reference results?","answer":"Status: DEFERRED. Official reference only (not taught in this lesson): (i) Proof: $$S_n = a + ar + \\dots + ar^{n-1}$$; subtract $$rS_n$$ to obtain $$S_n = \\frac{a(1-r^n)}{1-r}$$. (ii)(a) $$U_6 = 150(0.92)^6 \\approx 91$$ L. (ii)(b) 40-barrel total: $$\\frac{138(1-0.92^{40})}{1-0.92} = 1664$$ L (3 s.f.)."},{"question":"For P2 Q9(i) and Q9(ii)(a), which are NOT DISCUSSED, and Q9(ii)(b), which is DEFERRED, what are the official reference results?","answer":"Q9(i) and Q9(ii)(a) are NOT DISCUSSED; Q9(ii)(b) is DEFERRED. Official reference only (not taught completion): (i) $$2\\log_3(4x+5) - \\log_3(x+3) = 2$$ gives $$x = 1/16$$ only; $$x = -2$$ is rejected because log arguments require $$x \u003e -5/4$$. (ii)(a) $$\\log a + \\log b = \\log(a+b)$$ derives $$a = \\frac{b}{b-1}$$. (ii)(b) Full restriction is $$b \u003e 1$$."},{"question":"What is the current ESAT format, and what P2 formulae are supplied versus memorised?","answer":"Current ESAT format: 27 multiple-choice questions in 40 minutes per module ($$\\approx 89$$ seconds/question), on-screen, calculator-free. (Formula booklet availability not independently verified; ECAA 2020 is a historical predecessor, not current ESAT). Supplied: AP sums, binomial theorem, change-of-base, trapezium rule, geometric sums. Memorised: Log laws, trig identities, factor/remainder theorem, circle equation, discriminant, power-rule calculus."}]},"glm_2":{"label":"GLM 5.1 · Run 2","returned_model":"z-ai/glm-5.1","cards":[{"question":"A square with vertices at $$(\\pm 1, \\pm 1)$$ is rotated 90° clockwise about the origin, then reflected in the line $$y = x$$. What reliable method finds the combined effect, and what is it? (Historical ECAA 2020 specimen, ESAT-style practice, not current ESAT.)","answer":"Lesson method — labelled-vertex tracking:\n1. Fix a labelling, e.g. P(1,1), Q(−1,1), R(−1,−1), S(1,−1).\n2. Apply each operation using coordinate rules: rotate 90° cw maps $$(x,y) \\to (y,-x)$$; reflect in $$y = x$$ maps $$(x,y) \\to (y,x)$$.\n3. Track every vertex through both steps in a table.\n4. Compare final positions with originals: every point has $$x \\to -x$$ with $$y$$ unchanged → combined effect is reflection in the y-axis (self-inverse).\nTrap: the square looks unchanged after each move, so visual reasoning alone is unreliable. Derived matrix verification gives the same result but is NOT a recorded lesson method. Always label and track."},{"question":"A bus is on time with probability 0.6 (late 0.4). If on time, the train is caught with probability 0.8; if late, with probability 0.6. Find P(bus on time | catches train). (Historical ECAA 2020 specimen, ESAT-style practice, not current ESAT.)","answer":"1. Build a full two-stage tree; each fork is exhaustive (sums to 1).\n2. Multiply along paths: P(on time ∩ catches) $$= 0.6 \\times 0.8 = 0.48$$; P(late ∩ catches) $$= 0.4 \\times 0.6 = 0.24$$.\n3. P(catches train) $$= 0.48 + 0.24 = 0.72$$.\n4. Conditional formula: P(on time | catches) $$= 0.48 / 0.72 = 2/3$$.\nTwo traps: (i) do NOT assume independence — P(A∩B) ≠ P(A)P(B) here; read conditionals off the tree. (ii) Paths multiply because they represent a fraction of a fraction."},{"question":"The first four terms of $$(1+px)^{10}$$ are $$1 + 15x + qx^2 + rx^3$$. What strategy finds p, q, r, and what completion trap scored 0/6? (Pearson WMA12/01 P2, live repair.)","answer":"1. Expand: $$(1+px)^{10} = 1 + 10px + 45p^2x^2 + 120p^3x^3 + \\cdots$$\n2. Simplify fully, then compare coefficients:\n   - $$10p = 15 \\Rightarrow p = 3/2$$\n   - $$q = 45p^2 = 45 \\times 9/4 = 405/4 = 101.25$$\n   - $$r = 120p^3 = 120 \\times 27/8 = 405$$\nTrap: the submitted attempt stopped because $$10px$$ \"did not look like\" $$15x$$, but no error existed. The mark scheme requires full simplification before awarding even the first mark, so the unfinished state scored 0/6. Finish the manipulation before judging it."},{"question":"Six y-values are tabulated from $$x = -0.5$$ to $$x = 7$$ for the trapezium rule. How many strips are used, and what is h? What counting error cost three marks? (Pearson WMA12/01 P2, partial.)","answer":"1. Count the gaps between ordinates, not the ordinates: 6 values ⇒ 5 strips (gaps), not 6.\n2. $$h = \\frac{7 - (-0.5)}{5} = \\frac{7.5}{5} = 1.5$$.\n3. Estimate $$= \\frac{h}{2}[y_0 + y_5 + 2(y_1 + y_2 + y_3 + y_4)] \\approx 6.63$$.\nTrap: counting 6 ordinates as 6 strips gives the wrong h, propagating through both part (i) and the follow-through part (ii). Rule: n strips need n+1 ordinates — always count the gaps."},{"question":"Given $$f(x) = 4x^3 + 13x^2 - 10x + 8$$ and $$f(-4) = 0$$, how do you prove $$f(x) = 0$$ has exactly one real solution? What two conclusion marks are easily lost? (Pearson WMA12/01 P2, partial / live repair.)","answer":"1. Since $$f(-4) = 0$$, write \"therefore $$(x+4)$$ is a factor\" — the mark scheme awards a mark specifically for this statement.\n2. Build the quadratic by matching coefficients in $$(x+4)(4x^2 + bx + c) = f(x)$$: $$16 + b = 13 \\Rightarrow b = -3$$; $$4c = 8 \\Rightarrow c = 2$$; check: $$4(-3) + 2 = -10$$ ✓.\n3. $$f(x) = (x+4)(4x^2 - 3x + 2)$$. Discriminant: $$(-3)^2 - 4(4)(2) = -23 \u003c 0$$, so the quadratic has no real roots.\n4. State precisely: \"the quadratic factor has no real roots, therefore the only real solution is $$x = -4$$.\"\nTwo traps: (i) omitting \"therefore $$(x+4)$$ is a factor\" after $$f(-4)=0$$; (ii) writing \"f(x) has no real roots\" instead of specifying the quadratic factor only."},{"question":"Solve $$4\\tan\\theta + 5\\sin\\theta = 0$$ for $$0 \u003c \\theta \\leq 360°$$. What domain-qualified second-solution rules apply, and which root is easily missed? (Pearson WMA12/01 P2, partial.)","answer":"1. Since $$\\cos\\theta \\neq 0$$, write $$\\tan\\theta = \\sin\\theta / \\cos\\theta$$ and factor: $$\\frac{\\sin\\theta(4 + 5\\cos\\theta)}{\\cos\\theta} = 0$$, so $$\\sin\\theta = 0$$ or $$\\cos\\theta = -4/5$$.\n2. Second-solution rules for $$0 \u003c \\theta \\leq 360°$$:\n   - $$\\sin\\theta = \\sin\\alpha$$: $$\\theta = \\alpha$$, $$180° - \\alpha$$\n   - $$\\cos\\theta = \\cos\\alpha$$: $$\\theta = \\alpha$$, $$360° - \\alpha$$\n   - $$\\tan\\theta = \\tan\\alpha$$: $$\\theta = \\alpha$$, $$\\alpha + 180°$$\n3. $$\\sin\\theta = 0$$: $$\\theta = 180°, 360°$$ (0° excluded by strict inequality).\n4. $$\\cos\\theta = -4/5$$: $$\\theta = 143.1°$$ and $$360° - 143.1° = 216.9°$$.\nMissed root trap: applying the sine rule $$(180° - \\alpha)$$ to a cosine equation instead of $$(360° - \\alpha)$$. Sketch the cosine graph and read off the symmetric partner."},{"question":"Solve $$\\frac{\\sin x}{\\cos x} + \\frac{\\cos x}{\\sin x} = \\frac{5}{\\cos x}$$ for $$0 \u003c x \u003c \\pi$$, giving answers to 3 s.f. What three slips does this question expose? (Pearson WMA12/01 P2, live repair.)","answer":"1. Requires $$\\sin x \\neq 0$$ and $$\\cos x \\neq 0$$, so multiply through by $$\\sin x \\cos x$$: $$\\sin^2 x + \\cos^2 x = 5\\sin x \\Rightarrow 1 = 5\\sin x \\Rightarrow \\sin x = 0.2$$.\n2. In radians: $$x = \\arcsin(0.2) = 0.2014\\ldots$$ and $$x = \\pi - 0.2014\\ldots = 2.940\\ldots$$\n3. $$x = 0.201, 2.94$$ (3 s.f.)\nThree slips: (i) Invalid first-line algebra — the clean move is \"multiply through by $$\\sin x \\cos x$$\". (ii) The range $$0 \u003c x \u003c \\pi$$ is in radians — check units before solving. (iii) For the second solution $$\\pi - x$$, use the unrounded stored value then round only at the end; 0.201 is already 3 s.f. (the leading zero is not significant)."},{"question":"Circle $$C_1$$ has equation $$(x-6)^2 + (y-12)^2 = 100$$. A second circle $$C_2$$ centred at the origin touches $$C_1$$. How do you find both possible equations of $$C_2$$? (Pearson WMA12/01 P2, live repair.)","answer":"1. Draw a diagram first — \"possible equations\" (plural) signals two cases.\n2. Distance from origin to centre of $$C_1$$: $$\\sqrt{6^2 + 12^2} = \\sqrt{180} = 6\\sqrt{5}$$.\n3. Two touching cases via centre-distance ∓ radius of $$C_1$$:\n   - Inner: $$r_2 = 6\\sqrt{5} - 10 \\Rightarrow x^2 + y^2 = (6\\sqrt{5} - 10)^2 = 280 - 120\\sqrt{5}$$\n   - Outer: $$r_2 = 6\\sqrt{5} + 10 \\Rightarrow x^2 + y^2 = (6\\sqrt{5} + 10)^2 = 280 + 120\\sqrt{5}$$\nTrap: setting two circle equations equal leads to an algebra dead end. Diagram first, then each radius is simply centre-distance ∓ radius of $$C_1$$."},{"question":"When computing a shaded area between a curve and a line where the curve is above the line, the integral came out negative. What sense-check catches this, and what was the exact area? (Pearson WMA12/01 P2, partial.)","answer":"1. The integrand is \"curve − line\" with the curve above the line, so the integral must be positive.\n2. An area can never be negative — a negative result signals a sign error.\n3. Here a \"+\" was written as \"−\", producing a negative value; the correct exact area is $$6939/28 \\approx 248$$ (3 s.f.).\nFix: always sense-check the sign. Even when the region lies below the x-axis, the integrand \"curve − line\" (curve on top) guarantees positivity. A negative area is always wrong."},{"question":"For the geometric series proof and evaporation model (Pearson WMA12/01 P2, Q8): what is the status, and what are the official reference results? This question is DEFERRED.","answer":"This question is DEFERRED — not worked in the lesson; results are official reference only, not a taught solution.\n(i) Proof: set $$S_n = a + ar + \\cdots + ar^{n-1}$$ and $$rS_n = ar + \\cdots + ar^n$$; subtract to get $$(1-r)S_n = a(1-r^n)$$, hence $$S_n = \\frac{a(1-r^n)}{1-r}$$. The formula is supplied on p.3 but the proof is required knowledge.\n(ii)(a) $$U_6 = 150(0.92)^6 = 90.9532\\ldots \\approx 91$$ L. Write the exact power — do not state the approximation as an exact equality.\n(ii)(b) Total in 40 barrels: $$\\frac{138(1-0.92^{40})}{1-0.92} = 1663.58\\ldots \\Rightarrow 1664$$ L (3 s.f.)."},{"question":"For the logarithm question (Pearson WMA12/01 P2, Q9): parts (i) and (ii)(a) are NOT DISCUSSED; part (ii)(b) is DEFERRED. Solve $$2\\log_3(4x+5) - \\log_3(x+3) = 2$$ and state why one root is rejected. For part (ii)(b), given $$a = b/(b-1)$$ derived from $$\\log_{10} a + \\log_{10} b = \\log_{10}(a+b)$$, what is the full restriction on b? These parts are NOT DISCUSSED / DEFERRED.","answer":"Parts (i) and (ii)(a) are NOT DISCUSSED; part (ii)(b) is DEFERRED — official reference only, not taught solutions.\n(i) Combine: $$\\log_3\\frac{(4x+5)^2}{x+3} = 2 \\Rightarrow (4x+5)^2 = 9(x+3) \\Rightarrow 16x^2 + 31x - 2 = 0 \\Rightarrow (16x-1)(x+2) = 0$$. Domain requires $$4x+5 \u003e 0$$ and $$x+3 \u003e 0$$, i.e. $$x \u003e -5/4$$. So $$x = -2$$ is rejected; $$x = 1/16$$ only.\n(ii)(a) NOT DISCUSSED — official reference: $$\\log(ab) = \\log(a+b) \\Rightarrow ab = a+b \\Rightarrow a(b-1) = b \\Rightarrow a = b/(b-1)$$.\n(ii)(b) DEFERRED — official reference: $$b \u003e 1$$. One mark for denominator logic ($$b-1 \\neq 0$$, and with $$a,b \u003e 0$$ the sign forces $$b-1 \u003e 0$$); one mark for log positivity ($$a, b \u003e 0$$)."},{"question":"What is the format of the current ESAT, and how does it differ from the historical ECAA 2020 specimen used for practice? Is current-ESAT formula-booklet availability independently verified?","answer":"Current ESAT: 27 multiple-choice questions per module in 40 minutes (≈ 89 seconds per question), delivered on-screen and calculator-free. Candidates take the compulsory Mathematics 1 module plus chosen subject modules.\nHistorical ECAA 2020 specimen: Section 1 had two 20-question parts in 60 minutes (≈ 1.5 min per question) — a predecessor paper used as ESAT-style practice, not a current ESAT paper.\nCurrent-ESAT formula-booklet availability was NOT independently verified — do not claim it as confirmed. Scope practice to the modules you will take; calculus-heavy material sits in Mathematics 2, not Mathematics 1."}]},"glm_3":{"label":"GLM 5.1 · Run 3","returned_model":"z-ai/glm-5.1","cards":[{"question":"A square has vertices at $P(1,1)$, $Q(-1,1)$, $R(-1,-1)$, $S(1,-1)$. It is rotated $90°$ clockwise about the origin, then reflected in the line $y=x$. What single transformation returns the labelled square to its original position? (Historical ECAA 2020 specimen, ESAT-style practice — not current ESAT.) What is the reliable lesson method, and what is the derived verification check that is NOT a recorded lesson method?","answer":"1. **Lesson method — labelled-vertex tracking:** Apply each operation to every vertex using coordinate rules: rotate $90°$ cw maps $(x,y)\\to(y,-x)$; reflect in $y=x$ maps $(x,y)\\to(y,x)$. Track all four labelled vertices through both steps. Final positions show every $x\\to -x$ with $y$ unchanged, so the combined effect is reflection in the $y$-axis. Its own inverse returns the square: answer B. 2. **Derived verification check (NOT a recorded lesson method):** Matrix composition $\\begin{pmatrix}0\u00261\\\\1\u00260\\end{pmatrix}\\begin{pmatrix}0\u00261\\\\-1\u00260\\end{pmatrix}=\\begin{pmatrix}-1\u00260\\\\0\u00261\\end{pmatrix}$ confirms reflection in the $y$-axis in one line, but is not the exam-condition method. Trap: the square's symmetry makes mental pictures unreliable — always label and track."},{"question":"A bus is on time with probability $0.6$ (late $0.4$). If on time, she catches the train with probability $0.8$; if late, with probability $0.6$. Find $P(\\text{bus on time}\\mid\\text{catches train})$. (Historical ECAA 2020 specimen, ESAT-style practice — not current ESAT.) What two critical errors must be avoided?","answer":"Using $P(A\\mid B)=\\frac{P(A\\cap B)}{P(B)}$ with $A=\\{\\text{on time}\\}$, $B=\\{\\text{catches}\\}$: 1. Build the full tree — each fork is exhaustive (pairs sum to 1). Path probabilities multiply: $P(A\\cap B)=0.6\\times0.8=0.48$; $P(\\text{late}\\cap\\text{catches})=0.4\\times0.6=0.24$. 2. $P(B)=0.48+0.24=0.72$. 3. $P(A\\mid B)=\\frac{0.48}{0.72}=\\frac{2}{3}$ (answer E). **Two errors to avoid:** (1) Do NOT assume independence — $P(A\\cap B)\\neq P(A)P(B)$; the conditional $0.8/0.6$ must come from the tree. (2) Paths multiply because each is \"a fraction of a fraction\" — $0.48$ is $80\\%$ of the $60\\%$."},{"question":"The first four terms of the binomial expansion of $(1+px)^{10}$ are $1+15x+qx^2+rx^3$. Find $p$, $q$, and $r$. What specific mistake caused a score of $0/6$ on this question in the P2 paper (WMA12/01)?","answer":"Expand using the supplied binomial theorem: $(1+px)^{10}=1+10px+45p^2x^2+120p^3x^3+\\cdots$ Compare coefficients: $10p=15\\Rightarrow p=\\frac{3}{2}$; $q=45p^2=45\\cdot\\frac{9}{4}=\\frac{405}{4}=101.25$; $r=120p^3=120\\cdot\\frac{27}{8}=405$. **The $0/6$ mistake:** the expansion was started but abandoned because $10px$ \"did not look like\" $15x$. The mark scheme requires full simplification before the first mark is awarded. Fix: simplify first, then compare coefficients — $10p=15$ is exactly the comparison step. No error existed; the work just needed finishing."},{"question":"The trapezium rule is applied to estimate an integral using six tabulated $y$-values over the interval $x=-0.5$ to $x=7$. How many strips are there, what is $h$, and what is the recurring trap that cost three marks? State the formula for the estimate.","answer":"Six ordinates $\\Rightarrow$ **five** strips (count the gaps, not the $y$-values). $h=\\frac{7-(-0.5)}{5}=1.5$. The trap: mis-counting 6 ordinates as 6 strips gives the wrong $h$ and propagates through all parts. Formula (supplied on p.3): $$\\text{Estimate}=\\frac{h}{2}\\bigl[y_0+y_n+2(y_1+y_2+\\cdots+y_{n-1})\\bigr]$$ with $n=5$. Here the estimate $\\approx6.63$. Rule: $n$ strips need $n+1$ ordinates — always count gaps."},{"question":"Given $f(x)=4x^3+13x^2-10x+8$ with $f(-4)=0$. Two marks were lost: (a) one for a missing conclusion statement after showing $f(-4)=0$; (b) one for mis-copying the remainder $72$ as $32$. When proving $f(x)=0$ has only one real solution using the factor $(x+4)$, what conclusion must be written, and how is the quadratic factor obtained?","answer":"(a) After computing $f(-4)=0$, you **must** write \"∴ $(x+4)$ is a factor\" — the mark scheme awards a mark for this sentence. (b) Copy figures once, carefully; $72\\neq32$. To prove exactly one real root: 1. Factorise by matching coefficients: $(x+4)(4x^2+bx+c)$ gives $16+b=13\\Rightarrow b=-3$ and $4c=8\\Rightarrow c=2$, so $f(x)=(x+4)(4x^2-3x+2)$. 2. Discriminant $\\Delta=(-3)^2-4(4)(2)=9-32=-23\u003c0$, so the quadratic has no real roots. 3. **State precisely:** \"the quadratic factor has no real roots, therefore the only real solution is $x=-4$.\" Do NOT write \"$f(x)$ has no real roots.\""},{"question":"Solve $4\\tan\\theta+5\\sin\\theta=0$ for $0\u003c\\theta\\leq360°$. What restriction must be stated before factoring, and what is the rule for second solutions of $\\cos\\theta=\\cos\\alpha$ within this interval?","answer":"1. The equation requires $\\cos\\theta\\neq0$ (stated restriction). 2. Rewrite using $\\tan\\theta=\\frac{\\sin\\theta}{\\cos\\theta}$: $\\frac{\\sin\\theta(4+5\\cos\\theta)}{\\cos\\theta}=0$, so $\\sin\\theta=0$ or $\\cos\\theta=-\\frac{4}{5}$. 3. $\\sin\\theta=0$ gives $\\theta=180°,360°$ ($0°$ excluded by $0\u003c\\theta$). 4. $\\cos\\theta=-\\frac{4}{5}$ gives principal value $\\alpha=143.1°$. **Second cosine solution rule:** $\\cos\\theta=\\cos\\alpha\\Rightarrow\\theta=360°-\\alpha$, so $\\theta=360°-143.1°=216.9°$. Full answer: $\\theta=143.1°,180°,216.9°,360°$. Trap: do NOT apply the sine rule $180°-\\alpha$ to a cosine equation; sketch the graph and read the symmetric partner."},{"question":"Solve $\\frac{\\sin x}{\\cos x}+\\frac{\\cos x}{\\sin x}=\\frac{5}{\\cos x}$ for $0\u003cx\u003c\\pi$, giving answers to 3 s.f. What are the three separate slips that occurred on this question?","answer":"1. State restrictions: $\\sin x\\neq0$, $\\cos x\\neq0$. 2. Multiply through by $\\sin x\\cos x$ (valid since both are nonzero): $\\sin^2 x+\\cos^2 x=5\\sin x\\Rightarrow1=5\\sin x\\Rightarrow\\sin x=0.2$. 3. Radians (check units — $0\u003cx\u003c\\pi$ is radians): $x=\\arcsin(0.2)=0.2014\\ldots$ and $x=\\pi-0.2014\\ldots=2.940\\ldots$ 4. Answer: $x=0.201,2.94$ (3 s.f.). **Three slips:** (1) Invalid first-line algebra — the clean move is \"multiply through by $\\sin x\\cos x$.\" (2) Treating the range as degrees — always check units. (3) For the second solution $\\pi-x$, use the **unrounded** stored value, then round at the end; $0.201$ is already 3 s.f. (leading zero not significant)."},{"question":"A circle $C_1$ has equation $(x-6)^2+(y-12)^2=100$. A second circle $C_2$ centred at the origin touches $C_1$. Find the possible equations of $C_2$. What habit resolves the algebraic dead-end, and why does the question signal two answers?","answer":"1. Distance from origin to centre of $C_1$: $\\sqrt{6^2+12^2}=\\sqrt{180}=6\\sqrt{5}$. 2. $C_2$ touches $C_1$ when its radius is $6\\sqrt{5}-10$ (inner) or $6\\sqrt{5}+10$ (outer). 3. Equations: $$x^2+y^2=(6\\sqrt{5}-10)^2=280-120\\sqrt{5}$$ $$x^2+y^2=(6\\sqrt{5}+10)^2=280+120\\sqrt{5}$$ **Habit:** draw the diagram first — sketch $C_1$ and both touching circles; then each radius is simply centre-distance $\\mp$ radius of $C_1$. **Signal:** \"possible equations\" (plural) means more than one circle exists. Setting two circle equations equal hits a dead end with too many unknowns; the geometric approach via centre-distance $\\pm$ radius avoids this."},{"question":"A shaded region is bounded by a curve and a line, with the curve above the line. When computing the area by integration, a negative result was obtained. What is the sense-check that catches this error, and what integrand ordering guarantees a positive result?","answer":"**Sense-check:** an area cannot be negative — a negative result immediately signals a sign error. **Correct ordering:** when the curve is above the line, integrate $(\\text{curve}-\\text{line})$ over the interval; this is positive by construction. If the entire region is below the $x$-axis, \"curve minus line\" is still positive provided the curve is above the line within the region. The slip was writing a \"$+$\" as a \"$-$\", giving a negative area. The exact area in the P2 Q7 case was $\\frac{6939}{28}\\approx248$ (3 s.f.)."},{"question":"P2 Q8 (DEFERRED — not taught in this lesson, official reference only): State the standard proof of the finite geometric-sum formula $S_n=\\frac{a(1-r^n)}{1-r}$, and give the official-reference answers for: (a) $U_6$ when the initial amount is $150$ L and the annual factor is $0.92$; (b) the total in $40$ barrels over $40$ years with initial $138$ L and factor $0.92$.","answer":"**DEFERRED — official reference only, not a taught solution.** Proof: set $S_n=a+ar+\\cdots+ar^{n-1}$; then $rS_n=ar+\\cdots+ar^n$. Subtract: $(1-r)S_n=a(1-r^n)$, hence $S_n=\\frac{a(1-r^n)}{1-r}$. (a) $U_6=150(0.92)^6=90.9532\\ldots\\approx91$ L — show the exact power; do not write $150(0.92)^6=91$ as an exact equality. (b) $S_{40}=\\frac{138(1-0.92^{40})}{1-0.92}=1663.58\\ldots\\Rightarrow1664$ L (3 s.f.). Status: DEFERRED."},{"question":"P2 Q9(i) and Q9(ii)(a) are NOT DISCUSSED; Q9(ii)(b) is DEFERRED. (All official reference only, not taught.) (i) Solve $2\\log_3(4x+5)-\\log_3(x+3)=2$. What domain restriction eliminates one root? (ii)(a) From $\\log_{10}a+\\log_{10}b=\\log_{10}(a+b)$, derive $a=\\frac{b}{b-1}$. (ii)(b) State the full restriction on $b$ with reason.","answer":"**NOT DISCUSSED (parts i, ii(a)) / DEFERRED (part ii(b)) — official reference only.** (i) Combine: $\\log_3\\frac{(4x+5)^2}{x+3}=2\\Rightarrow(4x+5)^2=9(x+3)\\Rightarrow16x^2+31x-2=0\\Rightarrow(16x-1)(x+2)=0$. Domain: $4x+5\u003e0$ and $x+3\u003e0$, i.e. $x\u003e-\\frac{5}{4}$, so $x=-2$ is rejected. Answer: $x=\\frac{1}{16}$ only. (ii)(a) $\\log(ab)=\\log(a+b)\\Rightarrow ab=a+b\\Rightarrow a(b-1)=b\\Rightarrow a=\\frac{b}{b-1}$. (ii)(b) $b\u003e1$. Reasons: denominator $b-1\\neq0$; with $a,b\u003e0$ (logarithm arguments must be positive), the sign forces $b-1\u003e0$. Status: NOT DISCUSSED / DEFERRED."},{"question":"What is the format of the current ESAT (per question timing, delivery, and calculator policy)? How does the historical ECAA 2020 predecessor differ? What two habits from legacy advice must be corrected?","answer":"**Current ESAT:** 27 multiple-choice questions per module in 40 minutes ≈ 89 seconds per question; on-screen; calculator-free. (Formula-booklet availability was NOT independently verified — do not claim it.) **Historical ECAA 2020:** Section 1 had two 20-question parts in 60 minutes (≈1.5 min/question) — this is a predecessor used as ESAT-style practice, NOT a current ESAT paper. **Two corrections:** (1) Pace: the old \"∼2 min per question\" is wrong for ESAT — use ≈89 s. (2) Method: \"estimate, exact work wastes time\" is unsafe — Q16 required the exact fraction $\\frac{2}{3}$, and the test is non-calculator. Use exact arithmetic when it is required or simplifies; estimate only to eliminate options or sanity-check."}]},"qwen_1":{"label":"Qwen 3.7 Max","returned_model":"qwen/qwen3.7-max","cards":[{"question":"In the historical ECAA 2020 specimen (used as ESAT-style practice, NOT current ESAT), a labelled square with vertices $$(\\pm 1, \\pm 1)$$ is rotated $$90^\\circ$$ clockwise about the origin, then reflected in the line $$y = x$$. What is the combined effect and its inverse, what is the official option, and what is the recommended lesson method versus the derived verification check?","answer":"1. Combined effect and inverse: Reflection in the $$y$$-axis.\n2. Official option: B.\n3. Recommended lesson method: Labelled-vertex tracking (tracking coordinates step-by-step).\n4. Derived verification check: Matrix composition (this is a derived check, NOT a recorded lesson method)."},{"question":"In the historical ECAA 2020 specimen (used as ESAT-style practice, NOT current ESAT), given $$P(\\text{bus on time}) = 0.6$$, $$P(\\text{catch} \\mid \\text{on time}) = 0.8$$, and $$P(\\text{catch} \\mid \\text{late}) = 0.6$$, what is $$P(\\text{on time} \\mid \\text{catch})$$, what is the official option, and what is the key tree diagram trap?","answer":"1. $$P(\\text{on time} \\mid \\text{catch}) = \\frac{0.48}{0.48 + 0.24} = \\frac{0.48}{0.72} = \\frac{2}{3}$$.\n2. Official option: E.\n3. Key trap: Assuming independence. You must read conditional probabilities off a completed tree and multiply along paths (e.g., $$0.6 \\times 0.8 = 0.48$$), rather than assuming $$P(A \\cap B) = P(A)P(B)$$."},{"question":"For the arithmetic progression $$78, 75, 72, \\dots$$ in Pearson Edexcel IAL P2 (WMA12/01), what are the values of $$a$$ and $$d$$, the 18th term $$u_{18}$$, and the sum of the first 100 terms $$S_{100}$$, what is the status of this question, and are the AP formulae supplied?","answer":"1. $$a = 78$$, $$d = -3$$.\n2. $$u_{18} = 78 + 17(-3) = 27$$.\n3. $$S_{100} = \\frac{100}{2}(2(78) + 99(-3)) = -7050$$.\n4. Status: original correct.\n5. The AP formulae ($$u_n = a + (n-1)d$$ and $$S_n = \\frac{1}{2}n(2a + (n-1)d)$$) are supplied in the formula booklet."},{"question":"In Pearson Edexcel IAL P2, the first four terms of $$(1+px)^{10}$$ are $$1+15x+qx^2+rx^3$$. What are the values of $$p$$, $$q$$, and $$r$$, what was the status of the submitted attempt, and what is the key strategy trigger for comparing coefficients?","answer":"1. $$p = \\frac{3}{2}$$, $$q = \\frac{405}{4} = 101.25$$, $$r = 405$$.\n2. Status: live repair (the submitted attempt was unfinished and scored 0/6).\n3. Strategy trigger: Finish the full binomial expansion and simplify completely before comparing coefficients; do not stop just because initial terms look unlike the target."},{"question":"In Pearson Edexcel IAL P2, for $$y = 3 \\times 2^{-x}$$ passing through $$(k, 300000)$$, what is $$k$$? For the trapezium rule estimate using six ordinates over $$x = -0.5$$ to $$7$$, what are the number of strips, $$h$$, the estimate, and the follow-through sum? What is the status and the key lesson correction?","answer":"1. $$k = -\\frac{\\log(100000)}{\\log(2)} \\approx -16.61$$ (status: original correct).\n2. Six ordinates mean five strips (count gaps, not ordinates), so $$h = 1.5$$.\n3. Trapezium estimate $$\\approx 6.6255 \\to 6.63$$; follow-through sum $$\\approx 4.417 \\to 4.42$$.\n4. Status for trapezium: partial.\n5. Lesson correction: Count the gaps, not the ordinates ($$n$$ strips require $$n+1$$ ordinates). Miscounting cost three marks."},{"question":"For $$f(x) = 4x^3 + 13x^2 - 10x + 8$$ in Pearson Edexcel IAL P2, what are the quotient and remainder when divided by $$x-2$$, what is the factorisation and proof of the only real root, what is the decreasing interval, and what are the statuses and common traps?","answer":"1. Division by $$x-2$$: quotient $$4x^2 + 21x + 32$$, remainder $$72$$ (status: partial; trap: mis-copying $$72 \\to 32$$).\n2. $$f(-4) = 0$$, therefore $$x+4$$ is a factor. $$f(x) = (x+4)(4x^2 - 3x + 2)$$. Discriminant is $$-23 \u003c 0$$, so the only real root is $$x = -4$$ (status: live repair; trap: failing to state the conclusion explicitly).\n3. Decreasing interval: $$-\\frac{5}{2} \u003c x \u003c \\frac{1}{3}$$ (status: original correct)."},{"question":"In Pearson Edexcel IAL P2, solve $$4\\tan\\theta + 5\\sin\\theta = 0$$ for $$0 \u003c \\theta \\le 360^\\circ$$ and $$\\frac{\\sin x}{\\cos x} + \\frac{\\cos x}{\\sin x} = \\frac{5}{\\cos x}$$ for $$0 \u003c x \u003c \\pi$$. What are the roots, statuses, and key domain/unit traps?","answer":"1. $$4\\tan\\theta + 5\\sin\\theta = 0$$: requires $$\\cos\\theta \\neq 0$$. Roots are $$143.1^\\circ, 180^\\circ, 216.9^\\circ, 360^\\circ$$. Status: partial (trap: missing the second cosine solution $$216.9^\\circ$$).\n2. $$\\frac{\\sin x}{\\cos x} + \\frac{\\cos x}{\\sin x} = \\frac{5}{\\cos x}$$: requires $$\\sin x, \\cos x \\neq 0$$. Simplifies to $$\\sin x = 0.2$$. Roots are $$x = 0.201, 2.94$$ radians to 3 s.f. Status: live repair (trap: using degrees instead of radians, and rounding intermediate values instead of using unrounded stored values)."},{"question":"In Pearson Edexcel IAL P2, points $$A(-2,18)$$ and $$B(14,6)$$ form a diameter of circle $$C_1$$. What is the equation of $$C_1$$? If $$C_2$$ is centred at the origin and touches $$C_1$$, what are the possible equations of $$C_2$$, what are the statuses, and what is the key geometry strategy?","answer":"1. $$C_1$$: $$(x-6)^2 + (y-12)^2 = 100$$ (status: original correct).\n2. $$C_2$$: $$x^2 + y^2 = 280 \\pm 120\\sqrt{5}$$ (status: live repair).\n3. Key strategy: Draw a diagram showing the two possible touching circles (inner and outer) before doing algebra. The radius of $$C_2$$ is the centre-distance $$\\pm$$ the radius of $$C_1$$."},{"question":"In Pearson Edexcel IAL P2, a curve has a stationary point at $$x=9$$ yielding $$k=6$$. What is the exact and rounded shaded area, what is the status, and what is the key sense-check for integration area questions?","answer":"1. Stationary point gives $$k=6$$ (status: original correct).\n2. Shaded area is exactly $$\\frac{6939}{28} \\approx 248$$ to 3 s.f. (status: partial).\n3. Key sense-check: Area must be positive. When the curve is above the line, use curve minus line. A negative result is a warning flag that a sign slip has occurred."},{"question":"What is the status of Pearson Edexcel IAL P2 Q8 (finite geometric proof and evaporation model), and what are the official-reference-only results for the proof, $$U_6$$, and the 40-barrel total?","answer":"1. Status: DEFERRED (not worked in the session; official-reference-only, not a taught method).\n2. Proof: Let $$S_n = a + ar + \\dots + ar^{n-1}$$; subtract $$rS_n$$ to obtain $$S_n = \\frac{a(1-r^n)}{1-r}$$.\n3. $$U_6 = 150(0.92)^6 \\approx 91$$ L.\n4. 40-barrel total: $$\\frac{138(1-0.92^{40})}{1-0.92} = 1664$$ L (3 s.f.)."},{"question":"What are the statuses of Pearson Edexcel IAL P2 Q9(i), Q9(ii)(a), and Q9(ii)(b), and what are the official-reference-only results for the log equation, the derivation, and the restriction?","answer":"1. Statuses: Q9(i) and Q9(ii)(a) are NOT DISCUSSED; Q9(ii)(b) is DEFERRED. (All are official-reference-only; do not claim taught completion).\n2. Q9(i): $$2\\log_3(4x+5) - \\log_3(x+3) = 2$$ gives $$x = \\frac{1}{16}$$ only; $$x = -2$$ is rejected because log arguments require $$x \u003e -\\frac{5}{4}$$.\n3. Q9(ii)(a): From $$\\log_{10} a + \\log_{10} b = \\log_{10}(a+b)$$, derive $$a = \\frac{b}{b-1}$$.\n4. Q9(ii)(b): Full restriction is $$b \u003e 1$$ (due to denominator logic and positivity of log arguments)."},{"question":"What is the format of the current ESAT, how does it differ from the historical ECAA 2020 specimen used for practice, and what is the status of the current-ESAT formula booklet?","answer":"1. Current ESAT format: 27 multiple-choice questions in 40 minutes per module, on-screen and calculator-free ($$\\approx 89$$ seconds/question).\n2. Difference: ECAA 2020 had different timing and is a historical predecessor used as ESAT-style practice, NOT a current ESAT question.\n3. Formula booklet status: Do not claim a current-ESAT formula booklet is provided; its availability was not independently verified."}]},"minimax_1":{"label":"MiniMax M3 · Run 1","returned_model":"minimax/minimax-m3","cards":[{"question":"Historical ECAA 2020 specimen, Section 1 Part A Q15 (ESAT-style practice, NOT current ESAT). A square PQRS has labelled vertices $P(1,1)$, $Q(-1,1)$, $R(-1,-1)$, $S(1,-1)$. The square is rotated $90°$ clockwise about the origin, then reflected in the line $y=x$. The lesson's recorded method is labelled-vertex tracking. Apply that method: track every vertex through both steps and state the single transformation that returns the labelled square to its original position, and the official option letter.","answer":"Use the rules: rotate $90°$ cw: $(x,y)\\to(y,-x)$; reflect in $y=x$: $(x,y)\\to(y,x)$.\n\n| Vertex | Start | After $90°$ cw | After $y=x$ |\n|---|---|---|---|\n| $P$ | $(1,1)$ | $(1,-1)$ | $(-1,1)$ |\n| $Q$ | $(-1,1)$ | $(1,1)$ | $(1,1)$ |\n| $R$ | $(-1,-1)$ | $(-1,1)$ | $(1,-1)$ |\n| $S$ | $(1,-1)$ | $(-1,-1)$ | $(-1,-1)$ |\n\n1. Final column equals original with $x\\to -x$ and $y$ unchanged, so the combined effect is reflection in the $y$-axis.\n2. It is self-inverse, so the undoing transformation is also reflection in the $y$-axis. Answer B.\n3. (A matrix composition $\\begin{pmatrix}0\u00261\\\\1\u00260\\end{pmatrix}\\begin{pmatrix}0\u00261\\\\-1\u00260\\end{pmatrix}=\\begin{pmatrix}-1\u00260\\\\0\u00261\\end{pmatrix}$ gives the same result, but matrix composition is a derived verification check — not a recorded lesson method.)"},{"question":"Historical ECAA 2020 specimen, Section 1 Part A Q16 (ESAT-style practice, NOT current ESAT). $P(\\text{bus on time})=0.6$, $P(\\text{catch}\\mid\\text{on time})=0.8$, $P(\\text{catch}\\mid\\text{late})=0.6$. Find $P(\\text{on time}\\mid\\text{catch train})$. Give the official option letter.","answer":"1. Build the tree; the two branches at each fork sum to 1:\n   - on time \u0026 catch: $0.6\\times 0.8=0.48$\n   - on time \u0026 miss: $0.12$\n   - late \u0026 catch: $0.4\\times 0.6=0.24$\n   - late \u0026 miss: $0.16$\n2. $P(\\text{catch})=0.48+0.24=0.72$, and $P(\\text{on time}\\cap\\text{catch})=0.48$.\n3. $P(\\text{on time}\\mid\\text{catch})=\\dfrac{0.48}{0.72}=\\dfrac{2}{3}$. Answer E.\n4. Trap: do not assume independence; conditional probabilities must be read off the tree and paths multiply because a probability of a probability is a fraction of a fraction."},{"question":"P2 Q1 (status: original correct). Arithmetic progression $78,75,72,\\ldots$ (supplied formulae $u_n=a+(n-1)d$ and $S_n=\\tfrac{n}{2}[2a+(n-1)d]$). Find (a) the 18th term, (b) the sum of the first 100 terms.","answer":"1. Identify $a=78$, $d=75-78=-3$.\n2. $u_{18}=78+17(-3)=78-51=27$.\n3. $S_{100}=\\tfrac{100}{2}[2(78)+99(-3)]=50[156-297]=50(-141)=-7050$.\n4. (Tutor: \"absolutely great\"; writing $a=78$, $d=-3$ straight down without extra justification is acceptable.)"},{"question":"P2 Q2 (status: live repair). The first four terms of $(1+px)^{10}$ are $1+15x+qx^{2}+rx^{3}$ (supplied binomial theorem). Find $p$, $q$, $r$. The original submitted work stopped early and scored 0/6 even though no algebraic error had been made.","answer":"1. Expand fully using the supplied binomial theorem: $(1+px)^{10}=1+10px+45p^{2}x^{2}+120p^{3}x^{3}+\\cdots$\n2. Compare coefficients: $10p=15\\Rightarrow p=\\tfrac{3}{2}$.\n3. $q=45p^{2}=45\\cdot\\tfrac{9}{4}=\\tfrac{405}{4}=101.25$.\n4. $r=120p^{3}=120\\cdot\\tfrac{27}{8}=405$.\n5. Fix for next time: finish simplifying the expansion first, then match coefficients — \"looking unlike\" is not an error; comparing coefficients is exactly the method."},{"question":"P2 Q3 (status: original correct / partial). (a) $y=3\\times 2^{-x}$ passes through $(k,300000)$; find $k$ using logs. (b)(i) The trapezium rule is applied using six tabulated $y$-values over $x=-0.5$ to $x=7$. State $h$ and the number of strips $n$, and compute the estimate to 3 s.f. (b)(ii) The follow-through scaling is $\\tfrac{1}{3}+\\tfrac{1}{3}\\times(\\text{estimate})$; state its value to 3 s.f.","answer":"(a) $300000=3\\times 2^{-k}\\Rightarrow 2^{-k}=100000\\Rightarrow k=-\\dfrac{\\log 100000}{\\log 2}\\approx -16.61$.\n(b)(i) 1. Count gaps, not ordinates: 6 values give $n=5$ strips, $h=\\dfrac{7-(-0.5)}{5}=1.5$.\n2. Estimate $=\\tfrac{h}{2}\\left[y_0+y_5+2(y_1+y_2+y_3+y_4)\\right]\\approx 6.6255\\to 6.63$.\n(b)(ii) $\\tfrac{1}{3}+\\tfrac{1}{3}\\times 6.6255=4.417\\to 4.42$ (partial — inherited the wrong strip count; the single mis-count cost three marks).\nTrap: $n$ strips need $n+1$ ordinates, so $h=\\dfrac{b-a}{n}$, not $\\dfrac{b-a}{(\\text{number of values})}$."},{"question":"P2 Q4 (status: partial / live repair). $f(x)=4x^{3}+13x^{2}-10x+8$. (a)(i) Divide by $x-2$ and state the quotient; (ii) state the remainder. (b)(i) Show $(x+4)$ is a factor; (ii) hence prove $f(x)=0$ has only one real solution. (c) State the interval on which $f$ is decreasing.","answer":"(a) Quotient $4x^{2}+21x+32$; remainder $72$ (the remainder was mis-copied $72\\to 32$ on the paper, losing an accuracy mark).\n(b)(i) $f(-4)=-256+208+40+8=0$, therefore $(x+4)$ is a factor (state the conclusion explicitly — a mark is awarded for the sentence).\n(b)(ii) 1. Match coefficients in $(x+4)(4x^{2}+bx+c)$: $16+b=13\\Rightarrow b=-3$; $4c=8\\Rightarrow c=2$; $x$-check $4b+c=-10$ ✓.\n2. $f(x)=(x+4)(4x^{2}-3x+2)$, discriminant $\\Delta=9-32=-23\u003c0$, so the quadratic has no real roots.\n3. Conclusion: the cubic has exactly one real solution, $x=-4$ (do not write \"f(x) has no real roots\").\n(c) $f'(x)=12x^{2}+26x-10=2(3x-1)(2x+5)$, so $f$ is decreasing on $-\\tfrac{5}{2}\u003cx\u003c\\tfrac{1}{3}$."},{"question":"P2 Q5 (status: partial / live repair). (i) Solve $4\\tan\\theta+5\\sin\\theta=0$ for $0\u003c\\theta\\leq 360°$; state the domain restriction. (ii) Solve $\\dfrac{\\sin x}{\\cos x}+\\dfrac{\\cos x}{\\sin x}=\\dfrac{5}{\\cos x}$ for $0\u003cx\u003c\\pi$, in radians to 3 s.f.","answer":"(i) 1. The fraction requires $\\cos\\theta\\neq 0$.\n2. $\\dfrac{\\sin\\theta(4+5\\cos\\theta)}{\\cos\\theta}=0\\Rightarrow \\sin\\theta=0$ or $\\cos\\theta=-\\tfrac{4}{5}$.\n3. $\\sin\\theta=0$ gives $\\theta=180°,360°$ ($0°$ excluded by the strict inequality).\n4. $\\cos\\theta=-\\tfrac{4}{5}$: principal value $143.1°$; cosine second solution $360°-143.1°=216.9°$.\n5. $\\theta=143.1°,180°,216.9°,360°$ (the missing $216.9°$ is the symmetric partner obtained via $360°-\\alpha$ for cosine).\n(ii) 1. Requires $\\sin x\\neq 0$ and $\\cos x\\neq 0$; multiply through by $\\sin x\\cos x$: $\\sin^{2}x+\\cos^{2}x=5\\sin x$.\n2. $1=5\\sin x\\Rightarrow \\sin x=0.2$.\n3. In radians with $0\u003cx\u003c\\pi$: $x=\\arcsin(0.2)=0.2014\\ldots$ and $x=\\pi-0.2014\\ldots=2.940\\ldots$\n4. $x=0.201, 2.94$ (3 s.f., radians; use the unrounded stored value for the second solution, then round once at the end)."},{"question":"P2 Q6 (status: original correct / live repair). (a) $A(-2,18)$ and $B(14,6)$ are endpoints of a diameter of circle $C_{1}$; find its equation. (b) $C_{2}$ is centred at the origin and touches $C_{1}$. State both possible equations of $C_{2}$ (the question says \"possible equations\", plural — a diagram-first habit is required to see both cases before algebra).","answer":"(a) 1. Centre $=\\left(\\tfrac{-2+14}{2},\\tfrac{18+6}{2}\\right)=(6,12)$.\n2. Radius $=\\tfrac{1}{2}\\sqrt{16^{2}+(-12)^{2}}=\\tfrac{1}{2}\\sqrt{400}=10$.\n3. $C_{1}:(x-6)^{2}+(y-12)^{2}=100$.\n(b) 1. Distance from origin to centre of $C_{1}$: $\\sqrt{6^{2}+12^{2}}=\\sqrt{180}=6\\sqrt{5}$.\n2. Two touching circles at the origin: inner radius $6\\sqrt{5}-10$, outer radius $6\\sqrt{5}+10$.\n3. Inner: $x^{2}+y^{2}=(6\\sqrt{5}-10)^{2}=280-120\\sqrt{5}$.\n4. Outer: $x^{2}+y^{2}=(6\\sqrt{5}+10)^{2}=280+120\\sqrt{5}$.\nTrap: do not set the two circle equations equal and solve — draw both touching circles first, then each radius is just (centre-distance) ∓ (radius of $C_{1}$)."},{"question":"P2 Q7 (status: original correct / partial). (a),(b) The mark scheme gives $\\dfrac{dy}{dx}=3x^{2}-10x^{3/2}-k^{2}x^{-1/2}+28$; at the stationary point $x=9$ the derivative is $0$, and the value of $k$ is required. (c) The shaded area between the curve and a line evaluates exactly to $\\tfrac{6939}{28}$; the original work wrote \"+\" as \"−\" and produced a negative area. State $k$ and the area to 3 s.f., and name the sense-check that would have caught the sign error.","answer":"(a),(b) 1. Substitute $x=9$ into the derivative and set to $0$: $3(81)-10(27)-k^{2}\\cdot\\tfrac{1}{3}+28=0$.\n2. $243-270-\\tfrac{k^{2}}{3}+28=0\\Rightarrow 1=\\tfrac{k^{2}}{3}\\Rightarrow k^{2}=6$, but the mark scheme gives $k=6$ directly; checking shows $k=6$.\n(c) 1. $\\tfrac{6939}{28}\\approx 247.821\\to 248$ (3 s.f.).\n2. Sense-check: an area cannot be negative. Even though the region lies below the $x$-axis, the integrand here is \"curve − line\" with the curve above the line, so the integral must come out positive; a negative answer is the warning that a sign has gone wrong."},{"question":"P2 Q8 — status DEFERRED in both question and answer. The lesson did not work this question live; the official-reference-only results are reproduced below. (i) Prove the finite geometric-sum formula $S_n=\\dfrac{a(1-r^{n})}{1-r}$ (3 marks). (ii)(a) A barrel starts at $150$ L and each year $8\\%$ evaporates; show the end-of-year-6 amount is approximately $91$ L (2). (ii)(b) Each of 40 barrels starts at $138$ L under the same $8\\%$ annual evaporation; find the total in the 40 barrels after 40 years, to 3 s.f. (3).","answer":"These are official-reference-only (not taught in this lesson). (i) Let $S_n=a+ar+\\cdots+ar^{n-1}$, then $rS_n=ar+\\cdots+ar^{n}$; subtracting gives $(1-r)S_n=a(1-r^{n})$, so $S_n=\\dfrac{a(1-r^{n})}{1-r}$ (the formula itself is supplied on formula booklet p. 3, but the derivation is required knowledge). (ii)(a) $U_6=150(0.92)^{6}\\approx 90.9532\\to 91$ L. (ii)(b) $40\\times \\dfrac{138(1-0.92^{40})}{1-0.92}=40\\times \\tfrac{138(1-0.92^{40})}{0.08}\\approx 40\\times 41.5895\\approx 1663.58\\to 1664$ L (3 s.f.). Tutor's advice: in (ii) write out the early terms first to control the powers; in (i) learn the standard proof by heart."},{"question":"P2 Q9 (i) and (ii)(a) — status NOT DISCUSSED in both question and answer; (ii)(b) — status DEFERRED. Official-reference-only (not taught in this lesson). (i) Solve $2\\log_{3}(4x+5)-\\log_{3}(x+3)=2$ (5 marks). (ii)(a) From $\\log_{10}a+\\log_{10}b=\\log_{10}(a+b)$ prove $a=\\dfrac{b}{b-1}$ (3). (ii)(b) State the full restriction on $b$, with reason (2).","answer":"(i) 1. Combine: $\\log_{3}\\dfrac{(4x+5)^{2}}{x+3}=2\\Rightarrow (4x+5)^{2}=9(x+3)\\Rightarrow 16x^{2}+31x-2=0$.\n2. Factor: $(16x-1)(x+2)=0$, so $x=\\tfrac{1}{16}$ or $x=-2$.\n3. Domain: $4x+5\u003e0$ and $x+3\u003e0$ require $x\u003e-\\tfrac{5}{4}$, so $x=-2$ is rejected; only $x=\\tfrac{1}{16}$.\n(ii)(a) $\\log(ab)=\\log(a+b)\\Rightarrow ab=a+b\\Rightarrow a(b-1)=b\\Rightarrow a=\\dfrac{b}{b-1}$.\n(ii)(b) $b\u003e1$ (one mark for $b-1\\neq 0$ with $a,b\u003e0$ forcing $b-1\u003e0$; one mark for the positivity that logarithms require)."},{"question":"The current ESAT format is separately sourced and was not independently verified for formula-booklet status. State the format facts for current ESAT (separate modules, number of questions per module, total time, average time per question, on-screen or paper, calculator or not) and contrast them with the historical ECAA 2020 specimen used as the two warm-ups in this lesson. Also state the per-question trap from the old \"$\\sim 2$ min\" pacing figure.","answer":"Current ESAT: separate modules, $27$ multiple-choice questions per module, $40$ minutes per module, on-screen, calculator-free, average $\\tfrac{40}{27}\\approx 1.48$ min ($\\approx 89$ s) per question. Calculus-heavy material sits in the optional Mathematics 2 extension, not in the compulsory Mathematics 1 module — scope practice to the modules actually being taken. Historical ECAA 2020 specimen: Section 1, two $20$-question parts in $60$ minutes ($\\approx 1.5$ min per question); this is a predecessor admissions paper used here as ESAT-style practice, not a current ESAT paper, and its section timing is not the ESAT's. Trap: the legacy \"$\\sim 2$ min per question\" pacing figure is wrong for both formats — use $\\approx 89$ s as the working target. Use exact arithmetic (e.g. cancel $\\tfrac{48}{72}\\to\\tfrac{2}{3}$) when required or when it simplifies, not just estimation."}]},"minimax_2":{"label":"MiniMax M3 · Run 2","returned_model":"minimax/minimax-m3","cards":[{"question":"Historical ECAA 2020 specimen Section 1 Part A Q15 (used as ESAT-style practice, not current ESAT). A labelled square PQRS with vertices at $(\\pm 1, \\pm 1)$ is rotated 90° clockwise about the origin, then reflected in the line $y=x$. Using the lesson method of labelled-vertex tracking (label $P(1,1)$, $Q(-1,1)$, $R(-1,-1)$, $S(1,-1)$ anticlockwise from top-right), find the single transformation that returns the square to its original position. State the official option and the lesson's reliable method.","answer":"1. Apply the coordinate rules in order: rotate 90° clockwise $(x,y)\\to(y,-x)$; then reflect in $y=x$, $(x,y)\\to(y,x)$. 2. Tracking all four vertices: $P(1,1)\\to(1,-1)\\to(-1,1)$; $Q(-1,1)\\to(1,1)\\to(1,1)$; $R(-1,-1)\\to(-1,1)\\to(1,-1)$; $S(1,-1)\\to(-1,-1)\\to(-1,-1)$. 3. Every point satisfies $x\\to -x$ with $y$ unchanged — the combined effect is a reflection in the $y$-axis, which is self-inverse. 4. Official answer: **B, reflection in the $y$-axis**. A derived matrix check confirms this, but matrix composition was not the recorded lesson method."},{"question":"Historical ECAA 2020 specimen Section 1 Part A Q16 (ESAT-style practice, not current ESAT). $P(\\text{bus on time})=0.6$, $P(\\text{catch}\\mid\\text{on time})=0.8$, $P(\\text{catch}\\mid\\text{late})=0.6$. Find $P(\\text{on time}\\mid\\text{catch})$ and identify the official option letter.","answer":"1. Use the conditional formula $P(A\\mid B)=P(A\\cap B)/P(B)$ with $A=\\{\\text{on time}\\}$, $B=\\{\\text{catch}\\}$. 2. Build the tree; the two branches at each fork are exhaustive: $P(\\text{on time}\\cap\\text{catch})=0.6\\times 0.8=0.48$; $P(\\text{late}\\cap\\text{catch})=0.4\\times 0.6=0.24$. 3. $P(B)=0.48+0.24=0.72$. 4. $P(A\\mid B)=0.48/0.72=2/3$. Official answer: **E**. Non-calculator tip: scale $48/72$ by 100 then cancel to $2/3$. Do not assume independence."},{"question":"P2 Q1 (WMA12/01, 15 Oct 2025). The arithmetic progression is $78, 75, 72, \\ldots$ with first term $a=78$ and common difference $d=-3$. (a) Find the 18th term $u_{18}$. (b) Find the sum of the first 100 terms $S_{100}$. Status: original correct.","answer":"1. Use the supplied IAL P2 formula $u_n=a+(n-1)d$: $u_{18}=78+17(-3)=78-51=27$. 2. Use the supplied sum formula $S_n=\\tfrac{1}{2}n[2a+(n-1)d]$: $S_{100}=\\tfrac{1}{2}\\cdot 100\\cdot[2(78)+99(-3)]=50\\cdot(156-297)=50\\cdot(-141)=-7050$. 3. Answers: $u_{18}=27$; $S_{100}=-7050$."},{"question":"P2 Q2 (WMA12/01, 15 Oct 2025). The first four terms of $(1+px)^{10}$ are $1+15x+qx^2+rx^3$. Find $p$, $q$, and $r$. Status: live repair (submitted as 0/6 because the expansion was abandoned before simplification).","answer":"1. Expand using the supplied binomial theorem: $(1+px)^{10}=1+10px+45p^2x^2+120p^3x^3+\\cdots$. 2. Compare the $x$ coefficient: $10p=15\\Rightarrow p=\\tfrac{3}{2}$. 3. $q=45p^2=45\\cdot\\tfrac{9}{4}=\\tfrac{405}{4}=101.25$. 4. $r=120p^3=120\\cdot\\tfrac{27}{8}=405$. 5. The lesson lesson: fully simplify the expansion first, then equate coefficients — a \"looks unlike\" check is not an error."},{"question":"P2 Q3 (WMA12/01, 15 Oct 2025). (a) $y=3\\times 2^{-x}$ passes through $P(k,\\,300000)$; find $k$ to 2 d.p. (b) Six tabulated $y$-values at $x=-0.5,0.5,1.5,2.5,3.5,4.5,5.5$ with $x$ running from $-0.5$ to $7$ form a trapezium-rule estimate of $\\int_{-0.5}^{7} y\\,dx$. State the strip count, the strip width $h$, and the lesson correction rule. Status: (a) original correct; (b)(i) partial.","answer":"1. (a) $300000=3\\times 2^{-k}\\Rightarrow 2^{-k}=100000\\Rightarrow k=-\\log 100000/\\log 2\\approx -16.61$. 2. (b) The lesson rule: **count the gaps, not the ordinates**; $n+1$ values give $n$ strips. Here 6 values $\\Rightarrow n=5$ strips. 3. $h=(7-(-0.5))/5=7.5/5=1.5$. 4. The miscounting rule (treating 6 values as 6 strips) cost three marks across Q3(b); the lesson emphasised this rule explicitly."},{"question":"P2 Q4 (WMA12/01, 15 Oct 2025). $f(x)=4x^3+13x^2-10x+8$. (a)(i) Divide $f(x)$ by $x-2$; state the quotient. (a)(ii) State the remainder. (b)(i) Show $(x+4)$ is a factor. (b)(ii) Hence prove $f(x)=0$ has only one real solution, and state it. Status: (a) partial (remainder mis-copied $72\\to 32$); (b)(i) partial; (b)(ii) live repair.","answer":"1. (a)(i) Quotient $4x^2+21x+32$. 2. (a)(ii) Remainder $72$ — copy digits carefully; $72\\to 32$ lost the accuracy mark. 3. (b)(i) $f(-4)=-256+208+40+8=0$, therefore $(x+4)$ is a factor (state the conclusion explicitly for the mark). 4. (b)(ii) Factor: $f(x)=(x+4)(4x^2-3x+2)$. Discriminant $\\Delta=(-3)^2-4(4)(2)=9-32=-23\u003c0$, so the quadratic has no real roots. 5. Therefore the only real solution is $x=-4$. Do not write \"$f(x)$ has no real roots\"."},{"question":"P2 Q5 (WMA12/01, 15 Oct 2025). (i) Solve $4\\tan\\theta+5\\sin\\theta=0$ for $0\u003c\\theta\\le 360°$. (ii) Solve $\\dfrac{\\sin x}{\\cos x}+\\dfrac{\\cos x}{\\sin x}=\\dfrac{5}{\\cos x}$ for $0\u003cx\u003c\\pi$, giving answers to 3 s.f. Status: (i) partial (missed 216.9°); (ii) live repair.","answer":"1. (i) Requires $\\cos\\theta\\neq 0$. Rewrite as $\\sin\\theta(4+5\\cos\\theta)/\\cos\\theta=0$, so $\\sin\\theta=0$ or $\\cos\\theta=-4/5$. 2. $\\sin\\theta=0$ on the interval gives $\\theta=180°,\\,360°$ (strict $\u003e0$ excludes $0°$); $\\cos\\theta=-4/5$ gives $\\theta=143.1°$ and $360°-143.1°=216.9°$. 3. (ii) Requires $\\sin x\\neq 0$ and $\\cos x\\neq 0$. Multiply by $\\sin x\\cos x$: $\\sin^2 x+\\cos^2 x=5\\sin x\\Rightarrow 1=5\\sin x\\Rightarrow \\sin x=0.2$. 4. With $0\u003cx\u003c\\pi$ (radians): $x=\\arcsin 0.2=0.2014\\ldots$ and $x=\\pi-0.2014\\ldots=2.940\\ldots$, i.e. $x=0.201,\\,2.94$ (3 s.f.). 5. Use the **unrounded** stored value for the second solution; round only at the end."},{"question":"P2 Q6 (WMA12/01, 15 Oct 2025). (a) $A(-2,18)$ and $B(14,6)$ are the ends of a diameter of circle $C_1$. Find the equation of $C_1$. (b) Circle $C_2$ is centred at the origin and touches $C_1$. Find the possible equations of $C_2$ (plural). Status: (a) original correct; (b) live repair.","answer":"1. (a) Centre $=\\bigl(\\tfrac{-2+14}{2},\\tfrac{18+6}{2}\\bigr)=(6,12)$. Radius $=\\tfrac{1}{2}\\sqrt{16^2+(-12)^2}=\\tfrac{1}{2}\\sqrt{400}=10$. Equation: $(x-6)^2+(y-12)^2=100$. 2. (b) Distance from origin to centre of $C_1$ is $\\sqrt{6^2+12^2}=\\sqrt{180}=6\\sqrt{5}$. 3. Diagram first: two circles at the origin touch $C_1$ — an **inner** one (between centres) and an **outer** one (on the far side). 4. Inner radius $=6\\sqrt{5}-10$, outer radius $=6\\sqrt{5}+10$. 5. Squaring: $x^2+y^2=(6\\sqrt{5}-10)^2=280-120\\sqrt{5}$ or $x^2+y^2=(6\\sqrt{5}+10)^2=280+120\\sqrt{5}$."},{"question":"P2 Q7 (WMA12/01, 15 Oct 2025). (a) At the stationary point with $x=9$, the derivative equals zero and gives $k=6$. (b) Using this $k$, the curve lies above the line on a stated interval and the exact shaded area is $6939/28$. Give the area to 3 s.f. and state the lesson's sense-check rule. Status: (a),(b) original correct; (c) partial (sign slip).","answer":"1. $6939/28\\approx 247.821$, which rounds to $248$ (3 s.f.). 2. The lesson sense-check: **an area must be positive**. With \"curve minus line\" and the curve above the line, the integral must come out positive; a negative answer is the warning flag that a sign has gone wrong. 3. A \"$+$\" written as \"$-$\" produced a negative area; method and concept were correct, this was a care-with-signs slip."},{"question":"P2 Q8 (WMA12/01, 15 Oct 2025) — DEFERRED. (i) Prove the finite geometric sum formula $S_n=\\dfrac{a(1-r^n)}{1-r}$ starting from $S_n=a+ar+\\cdots+ar^{n-1}$. (ii)(a) A barrel starts with 150 L and loses 8% each year; show the amount at the end of year 6 is approximately 91 L. (ii)(b) After 40 such annual transfers of 138 L each into a chain of 40 barrels (each losing 8% per transfer), give the total in litres to 3 s.f. Status: DEFERRED (not worked live); official reference only.","answer":"1. (i) Let $S_n=a+ar+\\cdots+ar^{n-1}$. Then $rS_n=ar+ar^2+\\cdots+ar^n$. Subtract: $S_n-rS_n=a-ar^n$, so $(1-r)S_n=a(1-r^n)$, giving $S_n=\\dfrac{a(1-r^n)}{1-r}$ (the formula itself is supplied on p. 3; the derivation must be memorised). 2. (ii)(a) $U_6=150(0.92)^6\\approx 90.9532\\approx 91$ L. 3. (ii)(b) $S_{40}=\\dfrac{138(1-0.92^{40})}{1-0.92}\\approx 1663.58\\approx 1664$ L (3 s.f.). These are official mark-scheme results, not a taught worked solution in this lesson."},{"question":"P2 Q9 (WMA12/01, 15 Oct 2025). (i) Solve $2\\log_3(4x+5)-\\log_3(x+3)=2$. (ii)(a) From $\\log_{10}a+\\log_{10}b=\\log_{10}(a+b)$ prove $a=\\dfrac{b}{b-1}$. (ii)(b) State the full restriction on $b$ with reason. Status: (i) NOT DISCUSSED; (ii)(a) NOT DISCUSSED; (ii)(b) DEFERRED. Official reference only.","answer":"1. (i) Combine: $\\log_3\\dfrac{(4x+5)^2}{x+3}=2\\Rightarrow (4x+5)^2=9(x+3)\\Rightarrow 16x^2+31x-2=0\\Rightarrow (16x-1)(x+2)=0$. 2. Domain: $4x+5\u003e0$ and $x+3\u003e0$, so $x\u003e-5/4$; reject $x=-2$. Hence $x=1/16$ only. 3. (ii)(a) $\\log(ab)=\\log(a+b)\\Rightarrow ab=a+b\\Rightarrow a(b-1)=b\\Rightarrow a=\\dfrac{b}{b-1}$. 4. (ii)(b) Restriction: $b\u003e1$. Denominator $b-1\\neq 0$ rules out $b=1$; with $a,b\u003e0$ required by the logs, $a=b/(b-1)\u003e0$ forces $b-1\u003e0$, i.e. $b\u003e1$. These results are official mark-scheme answers, not a taught worked solution."},{"question":"Current ESAT vs. historical ECAA 2020 (status-safe boundary). State the format of the **current** ESAT (timing, number of questions, delivery mode, calculator rule) and contrast it with the **historical** ECAA 2020 specimen Section 1 from which the two warm-up items came. The current-ESAT formula-booklet availability is not independently verified — do not claim it.","answer":"1. Current ESAT: 27 multiple-choice questions per module in 40 minutes (≈ 89 s per question), on-screen, calculator-free. Candidates take compulsory Mathematics 1 plus chosen subject modules; scope practice to the modules actually taken. 2. The two warm-ups (transformations, conditional probability) come from the UCLES ECAA 2020 specimen Section 1, which had different timing (two 20-question parts in 60 minutes, ≈ 1.5 min per question) and is a **historical** predecessor paper used here only as ESAT-style practice, never as a current ESAT question. 3. Do not state a current-ESAT formula-booklet status — it was not independently verified from the cited source set."}]},"deepseek_1":{"label":"DeepSeek V4 Pro","returned_model":"deepseek/deepseek-v4-pro","cards":[{"question":"Historical ECAA 2020 specimen (used as ESAT‑style practice, not a current ESAT question).  \nA square has vertices \\(P(1,1),\\;Q(-1,1),\\;R(-1,-1),\\;S(1,-1)\\). It is rotated \\(90^{\\circ}\\) clockwise about the origin then reflected in the line \\(y=x\\).  \nBy tracking the labelled vertices, find the single rigid transformation that returns the square to its starting position.","answer":"Track each vertex through both moves using the coordinate rules  \nrotate \\(90^{\\circ}\\) clockwise: \\((x,y)\\to (y,-x)\\); reflect in \\(y=x\\): \\((x,y)\\to (y,x)\\).\n\n| Vertex | Original | after \\(90^{\\circ}\\) cw | after reflect in \\(y=x\\) |\n|--------|----------|------------------------|--------------------------|\n| \\(P\\) | \\((1,1)\\) | \\((1,-1)\\) | \\((-1,1)\\) |\n| \\(Q\\) | \\((-1,1)\\) | \\((1,1)\\) | \\((1,1)\\) |\n| \\(R\\) | \\((-1,-1)\\) | \\((-1,1)\\) | \\((1,-1)\\) |\n| \\(S\\) | \\((1,-1)\\) | \\((-1,-1)\\) | \\((-1,-1)\\) |\n\nEvery final point has \\(x\\to -x\\) with \\(y\\) unchanged, which is a **reflection in the \\(y\\)-axis**.  \nIts inverse is itself, so **reflection in the \\(y\\)-axis** returns the square to its start.  \n\n*(A matrix‑composition check gives the same result but is not the recorded lesson method.)*"},{"question":"Historical ECAA 2020 specimen (ESAT‑style practice, not current ESAT).  \nThe bus is on time with probability \\(0.6\\), otherwise late (\\(0.4\\)).  \nIf on time, she catches the train with probability \\(0.8\\); if late, she catches it with probability \\(0.6\\).  \nUsing a probability tree, calculate \\(P(\\text{bus on time} \\mid \\text{catches train})\\). Give the exact fraction.","answer":"Complete the tree with exhaustive branches:\n\n- Bus on time (\\(0.6\\)): catches (\\(0.8\\)) → path \\(0.6\\times0.8 = 0.48\\)  \n  misses (\\(0.2\\)) → \\(0.12\\)  \n- Bus late (\\(0.4\\)): catches (\\(0.6\\)) → \\(0.4\\times0.6 = 0.24\\)  \n  misses (\\(0.4\\)) → \\(0.16\\)\n\n\\[\nP(\\text{catches}) = 0.48 + 0.24 = 0.72, \\quad\nP(\\text{on time} \\cap \\text{catches}) = 0.48\n\\]\n\n\\[\nP(\\text{on time} \\mid \\text{catches}) = \\frac{0.48}{0.72} = \\frac{2}{3}\n\\]\n\nNon‑calculator: scale to \\(\\frac{48}{72}\\) and cancel."},{"question":"An arithmetic progression starts \\(78,\\;75,\\;72,\\ldots\\)  \n(a) Find the 18th term.  \n(b) Find the sum of the first 100 terms.","answer":"First term \\(a = 78\\), common difference \\(d = -3\\) (since \\(75 - 78 = -3\\)).  \n\n(a) Using \\(u_n = a + (n-1)d\\):  \n\\(u_{18} = 78 + 17(-3) = 78 - 51 = 27\\).\n\n(b) Using \\(S_n = \\frac{1}{2}n[2a + (n-1)d]\\):  \n\\(S_{100} = \\frac{100}{2}[2(78) + 99(-3)] = 50[156 - 297] = 50(-141) = -7050\\)."},{"question":"The first four terms of \\((1+px)^{10}\\) are \\(1 + 15x + qx^2 + rx^3\\).  \nFind the values of \\(p\\), \\(q\\) and \\(r\\).  \n*(This was repaired live: finish the expansion and compare coefficients.)*","answer":"Expand with the binomial theorem:  \n\\((1+px)^{10} = 1 + \\binom{10}{1}px + \\binom{10}{2}p^2 x^2 + \\binom{10}{3}p^3 x^3 + \\cdots\\)  \n\\(= 1 + 10p\\,x + 45p^2 x^2 + 120p^3 x^3 + \\cdots\\)\n\nCompare with \\(1 + 15x + qx^2 + rx^3\\):\n\\[\n10p = 15 \\;\\Rightarrow\\; p = \\frac{3}{2}\n\\]\n\\[\nq = 45p^2 = 45\\!\\left(\\frac{9}{4}\\right) = \\frac{405}{4} = 101.25\n\\]\n\\[\nr = 120p^3 = 120\\!\\left(\\frac{27}{8}\\right) = 405\n\\]"},{"question":"The function \\(y = 3\\cdot 2^{-x}\\) is tabulated at six equally spaced \\(x\\)-values from \\(x = -0.5\\) to \\(x = 7\\).  \nThe six ordinates are at \\(x = -0.5,\\;1,\\;2.5,\\;4,\\;5.5,\\;7\\).  \nUse the trapezium rule to estimate \\(\\int_{-0.5}^{7} 3\\cdot 2^{-x}\\,dx\\).  \nTrap: **count the gaps, not the ordinates**.","answer":"Six ordinates \\(\\Rightarrow\\) 5 strips.  \nStrip width \\(h = \\frac{7 - (-0.5)}{5} = \\frac{7.5}{5} = 1.5\\).\n\nTrapezium estimate:  \n\\(\\displaystyle \\frac{h}{2}\\bigl[y_0 + y_5 + 2(y_1+y_2+y_3+y_4)\\bigr]\\).\n\nThe \\(y\\)-values (to enough decimals) are:  \n\\(y_0 = 3\\cdot 2^{0.5} \\approx 4.2426\\)  \n\\(y_1 = 3\\cdot 2^{-1} = 1.5\\)  \n\\(y_2 = 3\\cdot 2^{-2.5} \\approx 0.5303\\)  \n\\(y_3 = 3\\cdot 2^{-4} = 0.1875\\)  \n\\(y_4 = 3\\cdot 2^{-5.5} \\approx 0.0663\\)  \n\\(y_5 = 3\\cdot 2^{-7} \\approx 0.0234\\)\n\nSum = \\(4.2426 + 0.0234 + 2(1.5+0.5303+0.1875+0.0663) \\approx 4.2660 + 2(2.2841) = 4.2660 + 4.5682 = 8.8342\\).\n\nEstimate = \\(\\frac{1.5}{2} \\times 8.8342 = 0.75 \\times 8.8342 \\approx 6.62565\\).  \nRounded to 2 d.p.: \\(6.63\\) (or 3 s.f. as appropriate)."},{"question":"\\(f(x) = 4x^3 + 13x^2 - 10x + 8\\).  \n(a) Show that \\((x+4)\\) is a factor of \\(f(x)\\).  \n(b) Hence prove that the equation \\(f(x) = 0\\) has exactly one real solution, stating what it is.  \n*(Live repair: factorise fully and use the discriminant; remember to write the concluding statement.)*","answer":"(a) \\(f(-4) = 4(-64) + 13(16) -10(-4) + 8 = -256 + 208 + 40 + 8 = 0\\).  \nTherefore \\((x+4)\\) is a factor.\n\n(b) Factorise by matching coefficients with \\((x+4)(4x^2 + bx + c)\\):\n\\(4x^3 + (16+b)x^2 + (4b+c)x + 4c \\equiv 4x^3 + 13x^2 - 10x + 8\\).  \n\\(16 + b = 13 \\Rightarrow b = -3\\); \\(4c = 8 \\Rightarrow c = 2\\); check \\(4b+c = -12+2 = -10\\) ✓.  \nSo \\(f(x) = (x+4)(4x^2 - 3x + 2)\\).\n\nDiscriminant of the quadratic: \\(\\Delta = (-3)^2 - 4(4)(2) = 9 - 32 = -23 \u003c 0\\).  \nThus the quadratic has no real roots. The only real solution of \\(f(x)=0\\) is \\(x = -4\\)."},{"question":"Solve \\(4\\tan\\theta + 5\\sin\\theta = 0\\) for \\(0^{\\circ} \u003c \\theta \\leq 360^{\\circ}\\).  \n*(The lesson missed a second cosine solution; ensure you find all.)*","answer":"Use \\(\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta}\\) (valid only when \\(\\cos\\theta \\neq 0\\)).  \n\\(\\displaystyle \\frac{4\\sin\\theta}{\\cos\\theta} + 5\\sin\\theta = 0 \\;\\Rightarrow\\; \\sin\\theta\\left(\\frac{4}{\\cos\\theta} + 5\\right) = 0\\).\n\nThe fraction is zero when the numerator \\(\\sin\\theta\\,(4 + 5\\cos\\theta) = 0\\) and \\(\\cos\\theta \\neq 0\\).\n\n1. \\(\\sin\\theta = 0 \\;\\Rightarrow\\; \\theta = 180^{\\circ},\\;360^{\\circ}\\) ( \\(0^{\\circ}\\) is excluded by \\(0\u003c\\theta\\) ).\n2. \\(4 + 5\\cos\\theta = 0 \\;\\Rightarrow\\; \\cos\\theta = -\\frac{4}{5}\\).  \n   Principal value \\(\\approx 143.1^{\\circ}\\); the second solution in \\(0\u003c\\theta\\leq360^{\\circ}\\) is \\(360^{\\circ} - 143.1^{\\circ} = 216.9^{\\circ}\\).\n\nAll solutions: \\(\\theta = 143.1^{\\circ},\\;180^{\\circ},\\;216.9^{\\circ},\\;360^{\\circ}\\)."},{"question":"Solve \\(\\displaystyle \\frac{\\sin x}{\\cos x} + \\frac{\\cos x}{\\sin x} = \\frac{5}{\\cos x}\\) for \\(0 \u003c x \u003c \\pi\\) radians, giving answers to 3 significant figures.  \n*(Live repair: multiply by \\(\\sin x\\cos x\\), use radians, keep unrounded intermediate.)*","answer":"Multiply through by \\(\\sin x\\cos x\\) (neither is zero in the interval):  \n\\(\\sin^2 x + \\cos^2 x = 5\\sin x\\).\n\nUsing \\(\\sin^2 x + \\cos^2 x = 1\\):  \n\\(1 = 5\\sin x \\;\\Rightarrow\\; \\sin x = 0.2\\).\n\nIn radians, with \\(0 \u003c x \u003c \\pi\\):  \n\\(x = \\arcsin(0.2) = 0.20135\\ldots \\approx 0.201\\) (3 s.f.).  \nSecond solution: \\(x = \\pi - 0.20135\\ldots = 2.9402\\ldots \\approx 2.94\\) (3 s.f.).\n\nAnswers: \\(x = 0.201,\\; 2.94\\) (radians, 3 s.f.)."},{"question":"The points \\(A(-2,18)\\) and \\(B(14,6)\\) are the ends of a diameter of a circle \\(C_1\\).  \n(a) Find the equation of \\(C_1\\).  \n(b) A second circle \\(C_2\\) is centred at the origin and touches \\(C_1\\) externally. Find the possible equations of \\(C_2\\).  \n*(Live repair: draw first; there are two possible touching circles.)*","answer":"(a) Centre = midpoint of \\(AB\\): \\(\\left(\\frac{-2+14}{2},\\frac{18+6}{2}\\right) = (6,12)\\).  \nRadius = half the length of \\(AB\\): \\(\\frac12\\sqrt{(14-(-2))^2 + (6-18)^2} = \\frac12\\sqrt{16^2 + (-12)^2} = \\frac12\\sqrt{400} = 10\\).  \nEquation of \\(C_1\\): \\((x-6)^2 + (y-12)^2 = 100\\).\n\n(b) Distance from origin to centre of \\(C_1\\): \\(\\sqrt{6^2 + 12^2} = \\sqrt{180} = 6\\sqrt{5}\\).  \nFor \\(C_2\\) to touch \\(C_1\\) externally, its radius \\(r\\) must satisfy  \n\\(r = 6\\sqrt{5} - 10\\) (inner, \\(C_2\\) inside \\(C_1\\)) or \\(r = 6\\sqrt{5} + 10\\) (outer, \\(C_2\\) surrounds \\(C_1\\)).\n\nSo the possible equations are  \n\\(x^2 + y^2 = (6\\sqrt{5} - 10)^2 = 280 - 120\\sqrt{5}\\)  \nand  \n\\(x^2 + y^2 = (6\\sqrt{5} + 10)^2 = 280 + 120\\sqrt{5}\\)."},{"question":"A curve and a line define a shaded region. The curve is above the line over the relevant interval.  \nWhen you compute the area as \\(\\int (\\text{curve} - \\text{line})\\,dx\\) you obtain a **negative** value.  \nExplain the sign check and why the correct area is positive.  \n*(From a lesson slip: a minus sign was mis‑copied, giving \\(\\approx -248\\).)*","answer":"An area must be positive. If “curve − line” is integrated and the curve lies **above** the line, the integrand is positive over the interval, so the integral must be positive.  \nA negative result signals a sign error — likely a copying mistake or a sign lost during algebra. The correct value (e.g. \\(6939/28 \\approx 248\\)) is obtained by ensuring the positive difference is used. Always sense‑check the sign and magnitude of an area answer."},{"question":"(DEFERRED – not worked in the lesson; official reference only)  \nProve the formula for the sum of the first \\(n\\) terms of a geometric series with first term \\(a\\) and common ratio \\(r\\):  \n\\[ S_n = \\frac{a(1-r^n)}{1-r}. \\]","answer":"(DEFERRED – official reference from mark scheme)  \nLet \\(S_n = a + ar + ar^2 + \\cdots + ar^{n-1}\\).  \nMultiply by \\(r\\): \\(rS_n = ar + ar^2 + \\cdots + ar^{n-1} + ar^n\\).  \nSubtract: \\(S_n - rS_n = a - ar^n\\) ⇒ \\(S_n(1-r) = a(1-r^n)\\).  \nHence \\(S_n = \\dfrac{a(1-r^n)}{1-r}\\)."},{"question":"(DEFERRED – not fully discussed in the lesson; official reference only)  \nGiven \\(\\log_{10} a + \\log_{10} b = \\log_{10}(a+b)\\) and the derived result \\(a = \\dfrac{b}{b-1}\\), state the full restriction on \\(b\\) with a reason.","answer":"(DEFERRED – official reference from mark scheme)  \n\\(b \u003e 1\\).  \nReason: The original logarithms require \\(a \u003e 0\\) and \\(b \u003e 0\\). From \\(a = \\dfrac{b}{b-1}\\), positivity of \\(a\\) forces \\(b-1 \u003e 0\\), hence \\(b \u003e 1\\). (Also \\(b \\neq 1\\) to avoid division by zero.)"}]},"kimi_1":{"label":"Kimi K3","returned_model":"moonshotai/kimi-k3","cards":[{"question":"Historical ECAA 2020 specimen, Section 1 Part A Q15 (used as ESAT-style practice — NOT a current ESAT question): a labelled square with vertices at $(\\pm1,\\pm1)$ is rotated $90^\\circ$ clockwise about the origin, then reflected in the line $y=x$. Which single transformation returns the labelled square to its original position (official answer option B), which method is the recorded lesson method, and what is the status of the matrix composition?","answer":"Reflection in the $y$-axis (option B).\n1. Recorded lesson method — labelled-vertex tracking: label e.g. $P(1,1)$, $Q(-1,1)$, $R(-1,-1)$, $S(1,-1)$; apply rotation $90^\\circ$ clockwise, $(x,y)\\mapsto(y,-x)$, then reflection in $y=x$, $(x,y)\\mapsto(y,x)$.\n2. Net effect is $(x,y)\\mapsto(-x,y)$: reflection in the $y$-axis, which is self-inverse, so the same reflection undoes it.\n3. The product $$\\begin{pmatrix}0\u00261\\\\1\u00260\\end{pmatrix}\\begin{pmatrix}0\u00261\\\\-1\u00260\\end{pmatrix}=\\begin{pmatrix}-1\u00260\\\\0\u00261\\end{pmatrix}$$ is only a Derived verification check — NOT a recorded lesson method. Trap: the square looks unchanged after each move, so track labelled vertices, not the picture."},{"question":"Historical ECAA 2020 specimen, Section 1 Part A Q16 (ESAT-style practice — NOT current ESAT): $P(\\text{bus on time})=0.6$; $P(\\text{catch train}\\mid\\text{on time})=0.8$; $P(\\text{catch train}\\mid\\text{late})=0.6$. Find $P(\\text{on time}\\mid\\text{catch train})$ (official answer option E).","answer":"$P(\\text{on time}\\mid\\text{catch})=\\dfrac{2}{3}$ (option E).\n1. Complete the tree using complements: $P(\\text{on time}\\cap\\text{catch})=0.6\\times0.8=0.48$; $P(\\text{late}\\cap\\text{catch})=0.4\\times0.6=0.24$.\n2. $P(\\text{catch})=0.48+0.24=0.72$.\n3. $P(\\text{on time}\\mid\\text{catch})=\\dfrac{0.48}{0.72}=\\dfrac{48}{72}=\\dfrac{2}{3}$ — scale by 100, then cancel (no calculator).\nTraps: never assume independence (read the conditional $0.8/0.6$ off the tree); path probabilities multiply because each is a fraction of a fraction."},{"question":"For the arithmetic series $78+75+72+\\cdots$ (IAL P2 WMA12/01 Q1; status: original correct), use the supplied formulae $u_n=a+(n-1)d$ and $S_n=\\tfrac12 n\\left[2a+(n-1)d\\right]$ to find the 18th term and the sum of the first 100 terms.","answer":"Write down $a=78$, $d=-3$ directly.\n1. $u_{18}=78+17(-3)=27$.\n2. $S_{100}=50\\left[2(78)+99(-3)\\right]=50(156-297)=50(-141)=-7050$."},{"question":"The first four terms of $(1+px)^{10}$ are $1+15x+qx^2+rx^3$ (IAL P2 Q2; status: live repair — the unfinished submitted expansion scored 0/6). Using the supplied binomial theorem, find $p$, $q$ and $r$, and state the method fix.","answer":"1. Finish the expansion first: $$(1+px)^{10}=1+10px+45p^2x^2+120p^3x^3+\\cdots$$\n2. Compare coefficients: $10p=15\\Rightarrow p=\\dfrac{3}{2}$.\n3. $q=45p^2=45\\cdot\\dfrac{9}{4}=\\dfrac{405}{4}=101.25$; $\\quad r=120p^3=120\\cdot\\dfrac{27}{8}=405$.\nFix: simplify fully before judging the work — $10px$ \"not looking like\" $15x$ is not an error; setting $10p=15$ is exactly comparing coefficients. The mark scheme requires full simplification before the first mark."},{"question":"(IAL P2 Q3) (a) The curve $y=3\\times2^{-x}$ passes through $(k,\\,300000)$; find $k$ using logarithms (status: original correct). (b) A trapezium-rule estimate $\\tfrac{h}{2}\\{y_0+y_5+2(y_1+y_2+y_3+y_4)\\}$ uses six tabulated ordinates over $x=-0.5$ to $7$ (status: partial): state the strip count, $h$, the estimate, the follow-through stated sum, and the corrected counting rule.","answer":"(a) $300000=3\\times2^{-k}\\Rightarrow 2^{-k}=100000\\Rightarrow k=-\\dfrac{\\log 100000}{\\log 2}\\approx-16.61$.\n(b) 1. Six ordinates $\\Rightarrow$ five strips — count the gaps, not the ordinates ($n$ strips need $n+1$ ordinates; the mis-count cost three marks across Q3(b)).\n2. $h=\\dfrac{7-(-0.5)}{5}=1.5$; estimate $\\approx6.6255\\rightarrow6.63$.\n3. Follow-through stated sum: $4.417\\rightarrow4.42$ — the method was right but inherited the wrong $h$."},{"question":"For $f(x)=4x^3+13x^2-10x+8$ (IAL P2 Q4; statuses: division/remainder partial — remainder mis-copied $72\\to32$; factor conclusion partial; one-real-root proof live repair; decreasing interval original correct): (i) give the quotient and remainder on division by $x-2$; (ii) show $(x+4)$ is a factor and prove $f(x)=0$ has exactly one real solution; (iii) state where $f$ is decreasing.","answer":"1. Quotient $4x^2+21x+32$, remainder $72$ — copy figures carefully; the $72\\to32$ slip lost the accuracy mark.\n2. $f(-4)=-256+208+40+8=0$, therefore $(x+4)$ is a factor — writing the conclusion itself earns a mark.\n3. $f(x)=(x+4)(4x^2-3x+2)$ (match coefficients: $16+b=13$, $4c=8$); discriminant $\\Delta=(-3)^2-4(4)(2)=-23\u003c0$, so the quadratic has no real roots. State precisely: the only real solution is $x=-4$ — never \"$f(x)$ has no real roots\".\n4. $f'(x)=12x^2+26x-10=2(3x-1)(2x+5)\u003c0$ for $-\\dfrac{5}{2}\u003cx\u003c\\dfrac{1}{3}$."},{"question":"(IAL P2 Q5; statuses: (i) partial — second cosine solution missed; (ii) live repair) (i) Solve $4\\tan\\theta+5\\sin\\theta=0$ for $0\u003c\\theta\\le360^\\circ$ (the equation requires $\\cos\\t
