heta\\neq0$). (ii) Solve $\\dfrac{\\sin x}{\\cos x}+\\dfrac{\\cos x}{\\sin x}=\\dfrac{5}{\\cos x}$ for $0\u003cx\u003c\\pi$ (radians), to 3 s.f.","answer":"(i) 1. Using $\\tan\\theta=\\frac{\\sin\\theta}{\\cos\\theta}$: $\\dfrac{\\sin\\theta(4+5\\cos\\theta)}{\\cos\\theta}=0\\Rightarrow\\sin\\theta=0$ or $\\cos\\theta=-\\tfrac45$.\n2. $\\sin\\theta=0$: $\\theta=180^\\circ,\\ 360^\\circ$ ($0^\\circ$ excluded by the strict inequality).\n3. $\\cos\\theta=-\\tfrac45$: $\\theta=143.1^\\circ$ and its cosine partner $360^\\circ-143.1^\\circ=216.9^\\circ$ (do not use the sine rule $180^\\circ-\\alpha$). Roots: $143.1^\\circ,\\ 180^\\circ,\\ 216.9^\\circ,\\ 360^\\circ$.\n(ii) 1. Multiply through by $\\sin x\\cos x$ (valid since $\\sin x,\\cos x\\neq0$): $\\sin^2x+\\cos^2x=5\\sin x\\Rightarrow\\sin x=0.2$.\n2. Interval is radians: $x=\\arcsin(0.2)=0.201$; second solution $\\pi-0.2014\\ldots=2.94$ — use the unrounded stored value and round only at the end. $x=0.201,\\ 2.94$ (3 s.f.)."},{"question":"$A(-2,18)$ and $B(14,6)$ are endpoints of a diameter of circle $C_1$; circle $C_2$ is centred at the origin and touches $C_1$ (IAL P2 Q6; statuses: $C_1$ original correct; $C_2$ live repair). Find the equation of $C_1$, both possible equations of $C_2$, and the strategy that unblocked the second part.","answer":"1. Centre $=\\left(\\tfrac{-2+14}{2},\\tfrac{18+6}{2}\\right)=(6,12)$; radius $=\\tfrac12\\sqrt{16^2+(-12)^2}=\\tfrac12\\sqrt{400}=10$: $$(x-6)^2+(y-12)^2=100$$\n2. Strategy: draw the diagram before any algebra — \"possible equations\" is plural, so expect two touching circles; use centre distance $\\pm$ radius rather than setting the two circle equations equal (a dead end).\n3. Origin-to-centre distance $=\\sqrt{6^2+12^2}=\\sqrt{180}=6\\sqrt5$.\n4. Inner: $x^2+y^2=(6\\sqrt5-10)^2=280-120\\sqrt5$; outer: $x^2+y^2=(6\\sqrt5+10)^2=280+120\\sqrt5$."},{"question":"(IAL P2 Q7; statuses: differentiation and $k$ original correct; shaded area partial) Substituting the stationary point $x=9$ into $\\dfrac{dy}{dx}=3x^2-10x^{3/2}-k^2x^{-1/2}+28$ and setting it to zero yields $k=6$; the shaded region (with $y=-53$ at $T$) has exact area $\\dfrac{6939}{28}$. A \"$+$\" was written as \"$-$\", producing a negative area. What sense-check catches this, and what is the correct area to 3 s.f.?","answer":"1. Sense-check: an area must be positive — a negative value is the warning flag that a sign has gone wrong.\n2. Here the integrand is curve $-$ line with the curve above the line (even though the region lies below the $x$-axis), so the integral must come out positive.\n3. Correct area: $\\dfrac{6939}{28}\\approx247.821\\approx248$ (3 s.f.)."},{"question":"(IAL P2 Q8 — literal status DEFERRED to the paper revisit; results below are official reference from the mark scheme only, NOT a taught solution.) (i) Prove the finite geometric-sum formula $S_n=\\dfrac{a(1-r^n)}{1-r}$. (ii) Evaporation model with $U_n=150(0.92)^n$ litres: show the end-of-year-6 amount $\\approx91$ L, and evaluate the 40-barrel total $\\dfrac{138(1-0.92^{40})}{1-0.92}$.","answer":"(DEFERRED — official reference only, not taught in the lesson.)\n(i) 1. Write $S_n=a+ar+\\cdots+ar^{n-1}$ and $rS_n=ar+\\cdots+ar^n$.\n2. Subtract: $(1-r)S_n=a(1-r^n)$, hence $S_n=\\dfrac{a(1-r^n)}{1-r}$ (the formula is supplied, but the proof must be known).\n(ii)(a) $U_6=150(0.92)^6=90.9532\\ldots\\approx91$ L — show the exact power; do not write $150(0.92)^6=91$ as an exact equality.\n(ii)(b) $\\dfrac{138(1-0.92^{40})}{1-0.92}=1663.58\\ldots\\approx1664$ L (3 s.f. as stated)."},{"question":"(IAL P2 Q9 — literal statuses: parts (i) and (ii)(a) NOT DISCUSSED in the lesson; part (ii)(b) DEFERRED; results below are official reference from the mark scheme only, NOT a taught method.) (i) Solve $2\\log_3(4x+5)-\\log_3(x+3)=2$. (ii)(a) From $\\log_{10}a+\\log_{10}b=\\log_{10}(a+b)$, derive $a=\\dfrac{b}{b-1}$. (ii)(b) State the full restriction on $b$, with reason.","answer":"(Official reference only: (i) and (ii)(a) NOT DISCUSSED; (ii)(b) DEFERRED.)\n(i) 1. Combine: $\\log_3\\dfrac{(4x+5)^2}{x+3}=2\\Rightarrow(4x+5)^2=9(x+3)\\Rightarrow16x^2+31x-2=0\\Rightarrow(16x-1)(x+2)=0$.\n2. Log arguments require $4x+5\u003e0$ and $x+3\u003e0$, i.e. $x\u003e-\\tfrac54$, so $x=-2$ is rejected: $x=\\dfrac{1}{16}$ only.\n(ii)(a) $\\log_{10}(ab)=\\log_{10}(a+b)\\Rightarrow ab=a+b\\Rightarrow a(b-1)=b\\Rightarrow a=\\dfrac{b}{b-1}$.\n(ii)(b) $b\u003e1$: logarithms require $a,b\u003e0$; the denominator needs $b-1\\neq0$, and $a=\\dfrac{b}{b-1}\u003e0$ with $b\u003e0$ forces $b-1\u003e0$."},{"question":"State the separately sourced current ESAT module format, how the ECAA 2020 specimen warm-up material differs from it, the formula-booklet verification boundary, and the resulting pacing/method implications.","answer":"1. Current ESAT (separately sourced): 27 multiple-choice questions in 40 minutes per module — $\\tfrac{40}{27}\\approx1.48$ min $\\approx89$ s per question; on-screen; calculator-free.\n2. Formula-booklet availability for current ESAT was not independently verified — make no claim about it either way.\n3. The ECAA 2020 specimen (Section 1: 60 minutes, two 20-question parts, $\\approx1.5$ min/question) is a historical predecessor used as ESAT-style practice — NOT current ESAT, and its timing is not the ESAT's.\n4. Implications: pace at $\\approx89$ s/question (the \"$\\sim2$ min\" figure is wrong for both formats); with no calculator, use exact arithmetic where required (e.g. cancel $\\frac{48}{72}\\to\\frac{2}{3}$) and estimate only to eliminate options or sanity-check."}]}},ROLES=Object.keys(DATA);let active=ROLES[0],selected={};for(const r of ROLES)selected[r]=new Set(DATA[r].cards.map((_,i)=>i));
function typeset(){const x=document.getElementById('list');if(window.MathJax&&MathJax.typesetPromise){if(MathJax.typesetClear)MathJax.typesetClear([x]);MathJax.typesetPromise([x]).catch(()=>{})}}
function tabs(){const t=document.getElementById('tabs');t.replaceChildren();for(const r of ROLES){const b=document.createElement('button');b.className='tab'+(r===active?' active':'');b.textContent=DATA[r].label+' ('+DATA[r].cards.length+')';b.onclick=()=>{active=r;tabs();render()};t.append(b)}}
function render(){const l=document.getElementById('list');l.replaceChildren();DATA[active].cards.forEach((c,i)=>{const article=document.createElement('article');article.className='card';const row=document.createElement('div');row.className='row';const pick=document.createElement('input');pick.className='pick';pick.type='checkbox';pick.checked=selected[active].has(i);pick.setAttribute('aria-label',`Select card ${i+1}`);const qw=document.createElement('div');qw.className='qwrap';const q=document.createElement('div');q.className='q';q.tabIndex=0;q.textContent=c.question;const ans=document.createElement('div');ans.className='answer';const txt=document.createElement('div');txt.textContent=c.answer;const foot=document.createElement('div');foot.className='foot';const cp=document.createElement('button');cp.className='copy';cp.textContent='Copy';cp.onclick=()=>copyText(c.question+'\t'+c.answer);foot.append(cp);ans.append(txt,foot);qw.append(q,ans);row.append(pick,qw);article.append(row);l.append(article);pick.onchange=()=>{pick.checked?selected[active].add(i):selected[active].delete(i);count()};const toggle=()=>{article.classList.toggle('open');typeset()};q.onclick=toggle;q.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle()}}});count();typeset()}
function count(){document.getElementById('count').textContent=`${selected[active].size} / ${DATA[active].cards.length} selected`}
function setall(v){selected[active]=v?new Set(DATA[active].cards.map((_,i)=>i)):new Set();render()}
function reveal(v){document.querySelectorAll('.card').forEach(x=>x.classList.toggle('open',v));typeset()}
function copyText(s){navigator.clipboard.writeText(s).then(()=>toast('Copied')).catch(()=>toast('Copy failed'))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)}
function table(){const c=DATA[active].cards.filter((_,i)=>selected[active].has(i));let s='| Question | Answer |\n| --- | --- |\n';for(const x of c)s+='| '+x.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+x.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n';copyText(s)}
addEventListener('DOMContentLoaded',()=>{tabs();render();document.getElementById('sel').onclick=()=>setall(true);document.getElementById('desel').onclick=()=>setall(false);document.getElementById('reveal').onclick=()=>reveal(true);document.getElementById('hide').onclick=()=>reveal(false);document.getElementById('table').onclick=table});</script></body></html>
