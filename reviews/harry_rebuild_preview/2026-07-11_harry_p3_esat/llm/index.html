<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2214%22 fill=%22%23006edc%22/><text x=%2232%22 y=%2243%22 text-anchor=%22middle%22 font-size=%2234%22 fill=%22white%22>ƒ</text></svg>"><title>Pearson Edexcel IAL Pure Mathematics P3 WMA13/01 October 2025 + ESAT-style warm-up · 11 July 2026 Maths P3 and ESAT-style review — Multi-model flashcards</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;max-width:100%;overflow-x:hidden}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.5}.wrap{width:100%;max-width:980px;margin:auto;padding:26px 16px 70px;overflow-x:clip}header{text-align:center;margin:7px 0 18px}h1{font-size:30px;line-height:1.18;margin:0}.sub{color:#68686d;margin:6px 0}.tabs{display:flex;gap:7px;overflow-x:auto;padding:5px 1px 11px;scrollbar-width:thin}.tab{white-space:nowrap;border:1px solid #d2d2d7;background:#fff;border-radius:999px;padding:8px 12px;font:650 12px inherit;cursor:pointer}.tab.active{background:#006edc;color:#fff;border-color:#006edc}.tools{position:sticky;top:7px;z-index:5;display:flex;gap:7px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid #e2e2e7;border-radius:14px;padding:10px;margin-bottom:13px;box-shadow:0 2px 8px #0000000d}.tools button{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:6px 9px;font:600 12px inherit;cursor:pointer}.count{margin-left:auto;color:#68686d;font-size:12px;font-weight:650}.list{display:flex;flex-direction:column;gap:10px}.card{min-width:0;max-width:100%;background:#fff;border:1px solid #e1e1e6;border-radius:14px;padding:15px 16px;box-shadow:0 1px 4px #0000000a}.row{display:flex;gap:10px;align-items:flex-start;min-width:0}.pick{width:18px;height:18px;margin-top:3px;flex:0 0 auto}.qwrap{min-width:0;max-width:100%;flex:1}.q{font-weight:650;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;cursor:pointer;overflow-x:auto}.answer{display:none;white-space:pre-wrap;margin-top:10px;padding-top:10px;border-top:1px solid #ececf0;color:#3e3e43;overflow-wrap:anywhere;word-break:break-word;overflow-x:auto}.card.open .answer{display:block}.foot{display:flex;justify-content:flex-end;margin-top:8px}.copy{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:3px 8px;cursor:pointer}.notice{font-size:12px;color:#68686d;text-align:center;margin:12px 0}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#1d1d1f;color:#fff;border-radius:8px;padding:8px 14px;opacity:0;pointer-events:none}.toast.show{opacity:1}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}@media(max-width:430px){.wrap{padding:16px 10px 55px}h1{font-size:24px}.tools{top:4px}.count{width:100%;margin-left:0}.card{padding:13px 12px}}</style><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true},options:{skipHtmlTags:["script","noscript","style","textarea","pre","code"]}};</script><script defer src="assets/mathjax/es5/tex-mml-chtml.js"></script></head><body><main class="wrap"><header><h1>Pearson Edexcel IAL Pure Mathematics P3 WMA13/01 October 2025 + ESAT-style warm-up · 11 July 2026 Maths P3 and ESAT-style review</h1><p class="sub">Direct model-output flashcards</p></header><nav id="tabs" class="tabs" aria-label="Models"></nav><nav class="tools"><button id="sel">Select all</button><button id="desel">Deselect all</button><button id="reveal">Reveal all</button><button id="hide">Hide all</button><button id="table">Copy table</button><span id="count" class="count"></span></nav><section id="list" class="list"></section><p class="notice">Model outputs are displayed directly as generated.</p></main><div id="toast" class="toast"></div><script>const DATA={"glm_1":{"label":"GLM 5.1 · Run 1","returned_model":"z-ai/glm-5.1","cards":[{"question":"When calculating the surface area of a closed cylinder, what is the correct formula, and what is the common trap involving $$\\pi r^2 h$$?","answer":"The surface area of a closed cylinder is $$2\\pi r^2 + 2\\pi r h$$ (two circular ends + curved side). Trap: $$\\pi r^2 h$$ is the *volume*, not the surface area."},{"question":"What is the formula for the surface area of a sphere, and what is the common exponent trap?","answer":"$$4\\pi R^2$$. Trap: Do not forget the square; writing $$4\\pi R$$ is incorrect."},{"question":"To show that $$f(x)=0$$ has a root in the interval $$[1,2]$$ using the Intermediate Value Theorem, what two things must you explicitly state to earn full marks?","answer":"1. Sign change: substitute the endpoints to show $$f(1)$$ and $$f(2)$$ have opposite signs. 2. Continuity: state that $$f(x)$$ is continuous on $$[1,2]$$. Trap: Omitting continuity loses a mark."},{"question":"In Q2(b), what strategy helps rearrange $$f(x)=0$$ into the target iteration form $$x=\\sqrt[3]{\\frac{e^x+4x^2}{2x+3}}$$, and what is the evidence status of this part?","answer":"1. Look at the target: a cube root means cube-root both sides at the end. 2. The $$(2x+3)$$ denominator tells you to factor $$x^3(2x+3)$$ from the other side. Status: **completed with prompting (transcript/ledger status conflict)** — the transcript confirms the target was reached, but the video ledger calls it partial."},{"question":"If a graph plots $$\\log_{10} V$$ *against* $$t$$, what are the vertical and horizontal axes, and what is the common variable-naming trap?","answer":"The y-axis is $$\\log_{10} V$$ and the x-axis is $$t$$. Trap: Do not write $$V$$ (or $$y$$) as the vertical variable; it is the log of the variable."},{"question":"What is the rule for differentiating $$y = a^{kx}$$, and what is the common trap when applying it (e.g., for $$3^{6x}$$)?","answer":"$$\\frac{d}{dx} a^{kx} = a^{kx} \\cdot k \\ln a$$. Trap: The factor is $$k \\ln a$$, never $$\\ln(kx)$$. For $$3^{6x}$$, the derivative is $$3^{6x} \\cdot 6 \\ln 3$$."},{"question":"When expressing $$\\sqrt{3}\\sin 2x - 3\\cos 2x$$ as $$R\\sin(2x-\\alpha)$$, what method guarantees exact values, and what transcription error must be ignored?","answer":"1. Divide coefficients for $$\\tan\\alpha = \\frac{3}{\\sqrt{3}} = \\sqrt{3}$$. 2. Square-and-add for $$R = \\sqrt{3+9} = 2\\sqrt{3}$$. Trap: Do not substitute a decimal $$\\alpha$$ to find $$R$$ (\"your method could be quite dangerous\"). Ignore the transcription error recording $$3\\sin 2x - 4\\cos 2x$$ ($$R=5$$); the official paper is authoritative."},{"question":"To find the minimum of a function like $$g(x) = \\frac{18}{f(3x) + 4\\sqrt{3}}$$ where the numerator is a fixed positive number, what is the strategy?","answer":"The fraction is smallest when its denominator is *largest*. Set the trigonometric part of the denominator to its maximum value (e.g., $$\\sin(\\dots) = 1$$) to find the maximum denominator, then divide the numerator by it."},{"question":"When evaluating the squirrel model $$N = \\frac{4000e^{0.1t}}{19+e^{0.2t}}$$ at $$t=0$$, what is the common trap, and what denominator transcription error must be rejected?","answer":"Trap: $$e^0 = 1$$, so the denominator is $$19+1=20$$ (\"be careful not to lose the one\"). Reject the analysis error that mis-copies the denominator as $$19+e^{0.1t}$$; the official model is authoritative."},{"question":"When applying the quotient rule $$\\left(\\frac{u}{v}\\right)' = \\frac{v u' - u v'}{v^2}$$, what is the common sign trap?","answer":"Trap: Dropping the minus sign in the numerator. The $$-u v'$$ term must retain its negative sign; read the formula directly from the formula book to avoid this."},{"question":"If a question asks you to \"show that\" $$e^{0.2T} = 19$$, what must you do and what must you avoid?","answer":"You must manipulate the algebra to reach exactly the given equation and then *stop*. Trap: Do not solve for $$T$$ (e.g., by taking $$\\ln$$) unless the next part of the question explicitly asks you to."},{"question":"When calculating the maximum number of squirrels in Q5(d), what is the rounding rule, and what flagged analysis error must be corrected?","answer":"Rule: Round only at the very final answer; substitute the *stored* unrounded value of $$T$$. Error: One analysis segment records the maximum as \"959\"; the spoken transcript confirms **459** squirrels is the correct answer ($$4000\\sqrt{19}/38 = 458.83\\dots \\to 459$$)."}]},"glm_2":{"label":"GLM 5.1 · Run 2","returned_model":"z-ai/glm-5.1","cards":[{"question":"When using the Intermediate Value Theorem to show a root exists in an interval, what two things must you state to earn full marks?","answer":"1. **Sign change**: substitute both endpoints, write down both values, show one is positive and one is negative. 2. **Continuity**: state that $$f$$ is continuous on the interval. Missing either costs a mark — \"sign change and continuity, otherwise you'll only score one.\""},{"question":"State the surface-area formulae for (i) a sphere of radius $$R$$, (ii) a closed cylinder of radius $$r$$ and height $$h$$. What common mistake swaps surface area for volume?","answer":"(i) Sphere: $$4\\pi R^{2}$$. (ii) Closed cylinder: $$2\\pi r^{2}+2\\pi r h$$ (two circular ends + curved side). Trap: writing $$\\pi r^{2}h$$ — that is the **volume**, not the surface area."},{"question":"What is the derivative of $$a^{kx}$$ with respect to $$x$$, and what is the common error involving the logarithm?","answer":"$$\\frac{d}{dx}a^{kx}=a^{kx}\\cdot k\\ln a$$. The chain rule brings down the factor $$k$$. Trap: writing $$\\ln(kx)$$ instead of $$k\\ln a$$ — the logarithm acts on the base only, not on the whole exponent."},{"question":"To express $$a\\sin\\theta - b\\cos\\theta$$ as $$R\\sin(\\theta-\\alpha)$$ with exact values, how do you find $$R$$ and $$\\alpha$$, and why should you avoid substituting a decimal?","answer":"1. **Divide** the two matched equations: $$\\tan\\alpha=\\frac{b}{a}$$, giving exact $$\\alpha$$. 2. **Square and add**: $$R=\\sqrt{a^{2}+b^{2}}$$, giving exact $$R$$. Trap: substituting a rounded decimal for $$\\alpha$$ to compute $$R$$ introduces rounding errors — \"your method could be quite dangerous.\""},{"question":"To find the minimum of a fraction $$g(x)=\\frac{k}{f(x)+c}$$ where $$k\u003e0$$ and $$c\u003e0$$, what strategy do you use, and what trig value maximises the denominator when $$f(x)=R\\sin(\\cdots)$$?","answer":"A positive fraction is minimised when its denominator is **maximised**. Set $$\\sin(\\cdots)=1$$ to maximise the denominator, then compute $$\\min g=\\frac{k}{R+c}$$. Rationalise if required."},{"question":"When applying the quotient rule $$\\left(\\frac{u}{v}\\right)'=\\frac{vu'-uv'}{v^{2}}$$, what sign error did the student make, and what was the tutor's advice?","answer":"The student dropped the **minus sign** in the numerator (the $$-uv'$$ term). Advice: read the quotient rule directly from the formula book — the minus sign is printed there; do not rewrite as $$uv^{-1}$$ with the product rule."},{"question":"Given a straight-line log relation $$\\log_{10}V=mt+c$$, how do you convert it into the form $$V=ab^{t}$$ with exact $$a$$ and $$b$$?","answer":"1. Raise 10 to both sides: $$V=10^{mt+c}$$. 2. Split the index: $$V=10^{c}\\cdot(10^{m})^{t}$$. 3. Read off: $$a=10^{c}$$ (exact), $$b=10^{m}$$ (exact). Round $$b$$ only if the question asks for a numerical approximation; keep the exact base for any subsequent differentiation."},{"question":"In a modelling question, the \"rate of increase\" of a quantity at time $$T$$ equals a positive value. What does \"rate\" tell you to do, and what sign should the result carry?","answer":"\"Rate\" means **differentiate** — compute $$\\frac{dV}{dt}$$. \"Increase\" means the rate is **positive**, so set the derivative equal to $$+$$ (the given value), not $$-$$."},{"question":"When evaluating an exponential model at $$t=0$$, what is the value of $$e^{0}$$, and what denominator trap did the student fall into?","answer":"$$e^{0}=1$$. Trap: in a denominator like $$19+e^{0}$$, the student forgot the \"$$+1$$\", writing just 19 instead of $$19+1=20$$. Always substitute $$e^{0}=1$$ explicitly before simplifying."},{"question":"Why must you round only at the final answer and use the stored calculator value of $$T$$ when substituting back, rather than a rounded $$T$$?","answer":"Rounding $$T$$ before substitution compounds the error and can change the final answer. Use the unrounded/stored value of $$T$$ throughout the calculation and round only the very last result. \"We only round at the very final answer.\""},{"question":"A question says \"show that $$e^{0.2T}=19$$\". What two mistakes should you avoid?","answer":"1. **Do not solve for $$T$$** — \"show that\" means stop once you have reached the given line. 2. **Use $$\\ln$$, not $$\\log_{10}$$** — the base is $$e$$, so the natural logarithm is correct. Solving for $$T$$ is reserved for a later part that explicitly asks."},{"question":"When rearranging $$f(x)=0$$ into an iteration form $$x=\\sqrt[3]{\\cdots}$$, what two strategic cues from the target should guide your algebra?","answer":"1. A **cube root** in the target tells you to cube-root both sides at the final step. 2. The **denominator** in the target (e.g. $$2x+3$$) tells you to factor that expression out of one side before dividing. Always look at the target form first and work backwards."}]},"glm_3":{"label":"GLM 5.1 · Run 3","returned_model":"z-ai/glm-5.1","cards":[{"question":"To prove that $$f(x)=0$$ has a root $$\\alpha$$ in the interval $$[a,b]$$ using the Intermediate Value Theorem, what two things must you state alongside your endpoint substitutions?","answer":"1. A **sign change**: substitute the exact endpoints to show $$f(a)$$ and $$f(b)$$ have opposite signs. 2. **Continuity**: state that $$f(x)$$ is continuous on $$[a,b]$$. [Trap: Omitting continuity will lose a mark; both are required.]"},{"question":"What is the surface area of a closed cylinder of radius $$r$$ and height $$h$$, and what is the common trap when recalling this formula?","answer":"Surface area = $$2\\pi r^2 + 2\\pi rh$$ (two circular ends + the curved side). [Traps: Writing $$\\pi r^2 h$$ is the *volume*, not surface area; writing $$\\pi r$$ for a circle's area misses the square.]"},{"question":"What is the rule for differentiating $$y = a^{kx}$$, and what is a common error when applying the chain rule factor?","answer":"$$\\frac{d}{dx}a^{kx} = a^{kx} \\cdot k \\ln a$$. [Trap: The factor is $$k \\ln a$$, never $$\\ln(kx)$$.]"},{"question":"When expressing $$a\\sin\\theta - b\\cos\\theta$$ as $$R\\sin(\\theta - \\alpha)$$ with exact values, what method should you use to find $$R$$ and $$\\alpha$$, and what is the trap?","answer":"1. Find $$\\alpha$$ by **dividing** the matched equations: $$\\tan\\alpha = \\frac{b}{a}$$. 2. Find $$R$$ by **squaring and adding**: $$R = \\sqrt{a^2 + b^2}$$. [Trap: Do not substitute a rounded decimal $$\\alpha$$ to find $$R$$; this is dangerous and loses exactness.]"},{"question":"When applying the quotient rule $$\\left(\\frac{u}{v}\\right)' = \\frac{v u' - u v'}{v^2}$$, what sign error must you carefully avoid?","answer":"Do not drop the **minus sign** in the numerator. The term $$-u v'$$ must remain negative. It is safer to read the quotient rule directly from the formula book rather than rewriting as $$uv^{-1}$$."},{"question":"If a graph plots $$\\log_{10} V$$ against $$t$$, what variable goes on the vertical axis, and what is the common trap?","answer":"The vertical axis is $$\\log_{10} V$$ and the horizontal axis is $$t$$. [Trap: Writing $$V$$ (or $$y$$) as the vertical variable instead of $$\\log_{10} V$$.]"},{"question":"When a question asks you to \"show that\" an equation equals a specific form (e.g., show $$e^{0.2T} = 19$$), what must you do once you reach that form?","answer":"**Stop there.** Do not solve for the variable (e.g., do not find $$T$$) unless a later part asks you to. [Trap: Pushing on to solve for the variable goes beyond the command word.]"},{"question":"When solving for a maximum value in a model (e.g., finding maximum $$N$$ after calculating $$T$$), what is the rule for rounding?","answer":"Round **only at the very final answer**. Substitute the unrounded (stored calculator) value of any intermediate variables back into the model. Never round a value before substituting it into the next step."},{"question":"When evaluating an exponential model at the start of a study (e.g., $$t=0$$), what arithmetic trap often occurs in the denominator?","answer":"The trap is losing the \"+1\". Since $$e^0 = 1$$, a denominator like $$19 + e^0$$ becomes $$19 + 1 = 20$$, not just 19."},{"question":"When rearranging $$f(x)=0$$ into an iteration form $$x = g(x)$$ (e.g., containing a cube root), what strategy helps guide the algebra?","answer":"Look at the target form for clues. 1. A cube root in the target means you will cube root both sides at the end. 2. A linear factor like $$(2x+3)$$ in the target's denominator tells you to factor it out of the left side before dividing."},{"question":"To find the minimum value of a function of the form $$g(x) = \\frac{k}{h(x)}$$ where $$k \u003e 0$$, what condition must $$h(x)$$ satisfy, and why?","answer":"$$h(x)$$ must be at its **maximum**. Since the numerator $$k$$ is a fixed positive number, the overall fraction is smallest when its denominator is largest."},{"question":"In the 11 July 2026 session, what is the status of Q2(b) (rearranging to cube-root form) versus Q2(c) (iteration), and what evidence conflict exists for Q2(b)?","answer":"Q2(b) is **completed with prompting** (transcript/ledger status conflict: the transcript confirms the target was reached, but the video ledger calls it partial). Q2(c) is **skipped / deferred** (explicitly left and not reached in the session)."}]},"qwen_1":{"label":"Qwen 3.7 Max","returned_model":"qwen/qwen3.7-max","cards":[{"question":"When using the Intermediate Value Theorem to show $$f(x)=0$$ has a root in $$[a,b]$$, what two conditions must be explicitly stated to secure full marks?","answer":"1. A sign change between $$f(a)$$ and $$f(b)$$.\n2. The function $$f(x)$$ is continuous on the interval $$[a,b]$$."},{"question":"When rearranging $$f(x)=0$$ into an iteration form $$x = g(x)$$, what is the primary strategy trigger if you get stuck algebraically?","answer":"Look at the target form for structural clues (e.g., if the target has a cube root, aim to isolate $$x^3$$; if it has a specific denominator like $$2x+3$$, aim to factor it out)."},{"question":"In a linearisation problem where a graph of $$\\log_{10}V$$ against $$t$$ is a straight line, what is the common variable trap when finding the equation of the line?","answer":"Using $$V$$ (or $$y$$) as the vertical variable instead of $$\\log_{10}V$$. The $$y$$-axis represents $$\\log_{10}V$$."},{"question":"What is the exact derivative of $$a^{kx}$$ with respect to $$x$$, and what is the common logarithmic trap to avoid?","answer":"The derivative is $$a^{kx} \\cdot k \\ln a$$. The trap is writing $$\\ln(kx)$$ instead of $$k \\ln a$$."},{"question":"When differentiating an exponential model $$V = a(b)^t$$ where $$b$$ was rounded to 3 significant figures in a previous part, what base should be used for differentiation?","answer":"The exact base (e.g., $$10^{0.05}$$) must be used for differentiation, not the rounded value (e.g., $$1.12$$), to maintain appropriate exactness."},{"question":"When expressing $$a\\sin x + b\\cos x$$ in the form $$R\\sin(x-\\alpha)$$ and exact values are required, what method should be used to find $$R$$ and why?","answer":"Use the square-and-add method ($$R = \\sqrt{a^2+b^2}$$) rather than substituting a decimal $$\\alpha$$ into $$R\\cos\\alpha=a$$, because substituting decimals introduces rounding errors and loses exactness."},{"question":"To find the exact minimum of a function in the form $$g(x) = \\frac{k}{A\\sin(\\theta) + B}$$ (where $$k, A, B \u003e 0$$), what is the strategy?","answer":"Minimise the fraction by maximising the denominator. Set $$\\sin(\\theta) = 1$$ to find the maximum denominator, then divide $$k$$ by this maximum value."},{"question":"When evaluating an exponential model like $$N = \\frac{C e^{kt}}{D + e^{mt}}$$ at the start of the study ($$t=0$$), what is the most common arithmetic trap?","answer":"Forgetting that $$e^0 = 1$$, which leads to dropping the $$+1$$ in the denominator (e.g., writing $$D$$ instead of $$D+1$$)."},{"question":"When applying the quotient rule $$\\frac{v u' - u v'}{v^2}$$ to differentiate a function, what specific sign trap must be carefully managed in the numerator?","answer":"Dropping the minus sign between the two terms. The subtraction $$v u' - u v'$$ must be strictly maintained."},{"question":"In a multi-part calculus question, if part (c) says \"show that $$e^{kT} = A$$\" and part (d) asks for the maximum value, what is the strategic boundary for part (c)?","answer":"Stop exactly at the shown line ($$e^{kT} = A$$). Do not solve for $$T$$ in part (c); save the logarithm and solving for part (d)."},{"question":"When a multi-step modelling question requires finding a maximum value to the nearest whole number, what is the strict rule for rounding intermediate values like time $$T$$?","answer":"Never round intermediate values like $$T$$. Use the exact stored calculator value for subsequent substitutions, and round only at the very final answer."},{"question":"What is the formula for the total surface area of a closed cylinder, and what is the common geometric trap when recalling it?","answer":"The surface area is $$2\\pi r^2 + 2\\pi rh$$ (two circular ends plus the curved side). The trap is confusing it with the volume formula, $$\\pi r^2 h$$."}]},"minimax_1":{"label":"MiniMax M3 · Run 1","returned_model":"minimax/minimax-m3","cards":[{"question":"the learner wants to show $f(x)=0$ has a root in $[1,2]$. He has written \"$f(1)$ and $f(2)$ have opposite signs, so a root exists.\" What's missing, and what is the precise mark-winning justification?","answer":"Both conditions are required by the Intermediate Value Theorem:\n1. **Continuity:** state that $f$ is continuous on the closed interval $[1,2]$ (here it is, because $x\\neq 0$ is the only excluded point and $0\\notin[1,2]$).\n2. **Sign change:** evaluate $f(1)$ and $f(2)$ at the *endpoints themselves* and show one value is positive and the other negative.\n3. **Conclude:** by sign change plus continuity, a root $\\alpha\\in[1,2]$ exists.\nTrap: mentioning only the sign change scores at most one mark. (the tutor: \"sign change *and* continuity.\")"},{"question":"State the closed-cylinder surface area formula and explain where each piece comes from, calling out the trap between surface area and volume.","answer":"Total surface area $=2\\pi r^{2}+2\\pi r h$.\n- Two flat circular ends, each $\\pi r^{2}$: total $2\\pi r^{2}$.\n- Curved side: unroll into a rectangle; one edge is the height $h$, the other is the *circumference* $2\\pi r$ (not the diameter), giving area $2\\pi r h$.\nTrap: $\\pi r^{2}h$ is the **volume** of the cylinder (cross-section × height), not its surface area."},{"question":"Differentiate $3^{6x}$. the learner wrote $3^{6x}\\cdot \\ln(6x)$. What is the correct rule and the correct answer?","answer":"The chain rule gives\n$$\\frac{d}{dx}\\,a^{kx}=a^{kx}\\cdot k\\ln a,$$\nso the factor is $k\\ln a$ (a constant), not $\\ln(kx)$.\nFor $a=3,\\ k=6$:\n$$\\frac{d}{dx}\\,3^{6x}=3^{6x}\\cdot 6\\ln 3.$$\nTrap: never write $\\ln(kx)$ — the chain rule brings down $k$ as a *multiplier* of $\\ln a$."},{"question":"In a \"rate\" question the value of a quantity increases at £50/yr. the learner set $\\frac{dV}{dt}=-50$. What is wrong and what should the equation be?","answer":"\"Rate\" means derivative, and \"increase\" forces the sign to be **positive**. The equation is\n$$\\frac{dV}{dt}=+50.$$\nTrap: a *decrease* would give $-50$; \"increase\" pairs with $+50$."},{"question":"Express $\\sqrt3\\sin 2x-3\\cos 2x$ in the form $R\\sin(2x-\\alpha)$ with **exact** $R$ and $\\alpha$. the learner plans to compute a decimal $\\alpha$ and substitute to get $R$. What's the safer two-step method?","answer":"Expand $R\\sin(2x-\\alpha)=R\\cos\\alpha\\,\\sin 2x-R\\sin\\alpha\\,\\cos 2x$ and match:\n$$R\\cos\\alpha=\\sqrt3,\\qquad R\\sin\\alpha=3.$$\n1. **Divide** to get $\\tan\\alpha$ exactly: $\\tan\\alpha=\\dfrac{3}{\\sqrt3}=\\sqrt3\\Rightarrow\\alpha=\\dfrac{\\pi}{3}$.\n2. **Square-and-add** to get $R$ exactly: $R^{2}(\\cos^{2}\\alpha+\\sin^{2}\\alpha)=3+9=12\\Rightarrow R=2\\sqrt3$.\nTrap: plugging a rounded $\\alpha$ into $R=\\sqrt{a^{2}+b^{2}}/\\ldots$ is \"quite dangerous\"; also use $\\tan^{-1}$ (not $\\sin^{-1}$) in radian mode."},{"question":"Sketch the strategy for rearranging\n$$\\frac{2x^{2}+3x-4}{e^{x}}-\\frac{1}{x^{2}}=0$$\ninto the cube-root form $x=\\sqrt[3]{\\dfrac{e^{x}+4x^{2}}{2x+3}}$. What two algebraic cues tell you the next line?","answer":"Move $\\frac{1}{x^{2}}$ across, multiply by $e^{x}x^{2}$, expand to $2x^{4}+3x^{3}-4x^{2}=e^{x}$, then take $+4x^{2}$ across to get $2x^{4}+3x^{3}=e^{x}+4x^{2}$. Two cues:\n1. The denominator $2x+3$ in the target ⇒ factor the left side as $x^{3}(2x+3)$ so you can divide by $2x+3$.\n2. The cube root on $x$ in the target ⇒ cube-root both sides last.\nResult: $x^{3}=\\dfrac{e^{x}+4x^{2}}{2x+3}$, then $x=\\sqrt[3]{\\dfrac{e^{x}+4x^{2}}{2x+3}}$."},{"question":"A log graph has $y$-axis $\\log_{10}V$ and $x$-axis $t$, and is a straight line through $(0,2)$ and $(5,2.25)$. the learner wrote $V=0.05t+2$. What's wrong, and what is the correct line?","answer":"The vertical axis is $\\log_{10}V$, not $V$. The line is in log-space:\n$$\\log_{10}V=mt+c,\\quad m=\\frac{2.25-2}{5-0}=0.05,\\quad c=2.$$\nSo $\\log_{10}V=0.05t+2$ (exponentiate later if you need $V$). Trap: read the axis label before you write the equation."},{"question":"From $\\log_{10}V=0.05t+2$ you need $V=ab^{t}$ with **exact** $a$ and $b$ (to 3 s.f.). Give the conversion and the trap when differentiating.","answer":"Raise 10 to both sides and split the index:\n$$V=10^{0.05t+2}=10^{2}\\cdot 10^{0.05t}=100\\,(10^{0.05})^{t}.$$\nSo $a=100$ (exact) and $b=10^{0.05}=1.12$ (3 s.f.).\nTrap: when differentiating, use the **exact** $b=10^{0.05}$, not the rounded $1.12$ — round only the final answer."},{"question":"$N=\\dfrac{4000e^{0.1t}}{19+e^{0.2t}}$. Evaluate $N$ at $t=0$ and state the trap with $e^{0}$.","answer":"$e^{0}=1$, so\n$$N=\\frac{4000\\cdot 1}{19+1}=\\frac{4000}{20}=200.$$\nTrap: do not drop the \"1\" in the denominator; the $+1$ comes from $e^{0}$ and gives $20$, not $19$."},{"question":"For the same $N$, find $\\frac{dN}{dt}$ using the quotient rule. the learner wrote $\\frac{v\\,u'+u\\,v'}{v^{2}}$ (lost the minus). What's the correct formula and the differentiated answer?","answer":"Quotient rule:\n$$\\left(\\frac{u}{v}\\right)'=\\frac{v\\,u'-u\\,v'}{v^{2}}.$$\nWith $u=4000e^{0.1t}$, $v=19+e^{0.2t}$, so $u'=400e^{0.1t}$, $v'=0.2e^{0.2t}$:\n$$\\frac{dN}{dt}=\\frac{(19+e^{0.2t})(400e^{0.1t})-(4000e^{0.1t})(0.2e^{0.2t})}{(19+e^{0.2t})^{2}}=\\frac{7600e^{0.1t}-400e^{0.3t}}{(19+e^{0.2t})^{2}}.$$\nTrap: the minus sign is non-negotiable; the quotient rule is in the formula book."},{"question":"At the maximum $t=T$, setting $\\frac{dN}{dt}=0$ gave $e^{0.1T}(7600-400e^{0.2T})=0$. Why can you reject $e^{0.1T}=0$, and what value of $A$ are you asked to *show* in $e^{0.2T}=A$?","answer":"$e^{x}\u003e0$ for all real $x$ (sketch $y=e^{x}$: it never touches the axis), so $e^{0.1T}=0$ has no solution. The other factor gives\n$$7600-400e^{0.2T}=0\\Rightarrow e^{0.2T}=\\frac{7600}{400}=19,$$\nso $A=19$. Trap: \"show that\" means **stop at the shown line** — do not solve for $T$ in this part."},{"question":"In the squirrels question, the learner rounded $T=\\tfrac{\\ln 19}{0.2}$ to $14.7$ *before* substituting back into $N$. What is the correct procedure, and what final $N$ (nearest whole) do you obtain?","answer":"Keep the **stored (unrounded)** value of $T$ in the calculator; round **only at the very last step**. Use $e^{0.1T}=\\sqrt{e^{0.2T}}=\\sqrt{19}$ and the denominator $19+19=38$:\n$$N=\\frac{4000\\sqrt{19}}{38}=458.83\\ldots\\Rightarrow N=459\\text{ squirrels}.$$\nTrap: never substitute a rounded $T$; the guide confirms 459 (one mis-recorded analysis segment said \"959\" — that is a flagged transcription error, not the answer)."}]},"minimax_2":{"label":"MiniMax M3 · Run 2","returned_model":"minimax/minimax-m3","cards":[{"question":"State the closed-cylinder surface-area formula in terms of radius $r$ and height $h$, and identify the trap when a student offers $\\pi r^{2}h$ instead.","answer":"1. Closed cylinder = two circular ends + curved side.\n2. Two ends: $2(\\pi r^{2})=2\\pi r^{2}$.\n3. Curved side (unrolled rectangle, length = circumference $2\\pi r$, height $h$): $2\\pi r h$.\n4. Total: $A=2\\pi r^{2}+2\\pi r h$.\n5. **Trap:** $\\pi r^{2}h$ is the **volume** of a cylinder (cross-section $\\times$ height), **not** its surface area."},{"question":"Why does the Intermediate Value Theorem (IVT) argument for a root $\\alpha\\in[1,2]$ require **two** distinct statements, and what mark is lost if one is omitted?","answer":"1. The two required statements are: (i) a **sign change** between $f(1)$ and $f(2)$ (evaluate the actual endpoints and show one value is positive, the other negative), and (ii) **continuity** of $f$ on $[1,2]$ (it is defined and continuous throughout, since $x\\neq0$ is no issue on $[1,2]$).\n2. Sign change alone is not enough — without continuity, the conclusion $\\alpha\\in[1,2]$ does not follow.\n3. **Trap:** stating only the sign change earns only **one mark**; both sign change *and* continuity are needed for full marks."},{"question":"On a graph labelled \"$\\log_{10}V$ against $t$\", which quantity goes on the $y$-axis and which on the $x$-axis, and what is the trap?","answer":"1. \"$A$ against $B$\" means $A$ is the $y$-axis, $B$ is the $x$-axis.\n2. So $y=\\log_{10}V$, $x=t$.\n3. **Trap:** writing $V$ (or $y$) as the vertical variable — the vertical axis is the **logarithm** of $V$, not $V$ itself."},{"question":"Rewrite $10^{0.05t}$ in the form $b^{t}$, and state the exact value of $b$ together with its 3 s.f. value.","answer":"1. Use $a^{pq}=(a^{p})^{q}$: $10^{0.05t}=(10^{0.05})^{t}$.\n2. Exact base: $b=10^{0.05}$.\n3. To 3 s.f.: $10^{0.05}=1.12201\\ldots=1.12$.\n4. **Trap:** report $1.12$ for the \"to 3 s.f.\" part, but **keep the exact $10^{0.05}$** when differentiating — do not differentiate the rounded value."},{"question":"Give the derivative rule for $a^{kx}$ with respect to $x$, and identify the common wrong answer for $3^{6x}$.","answer":"1. Rule: $\\dfrac{d}{dx}\\,a^{kx}=a^{kx}\\cdot k\\ln a$ (the chain rule brings down the $k$).\n2. So $\\dfrac{d}{dx}\\,3^{6x}=3^{6x}\\cdot 6\\ln 3$.\n3. **Trap:** writing $\\ln(6x)$ (treating the exponent as a single variable) — the factor is $k\\ln a=6\\ln 3$, **never** $\\ln(kx)$."},{"question":"Express $\\sqrt{3}\\sin 2x-3\\cos 2x$ in the form $R\\sin(2x-\\alpha)$ with exact $R$ and $\\alpha\\in(0,\\pi/2)$. Show the strategy that avoids rounding.","answer":"1. Expand $R\\sin(2x-\\alpha)=(R\\cos\\alpha)\\sin 2x-(R\\sin\\alpha)\\cos 2x$.\n2. Match coefficients: $R\\cos\\alpha=\\sqrt{3}$, $R\\sin\\alpha=3$.\n3. **Find $\\alpha$ by dividing:** $\\tan\\alpha=\\dfrac{R\\sin\\alpha}{R\\cos\\alpha}=\\dfrac{3}{\\sqrt{3}}=\\sqrt{3}\\Rightarrow\\alpha=\\dfrac{\\pi}{3}$.\n4. **Find $R$ by squaring and adding:** $R^{2}(\\cos^{2}\\alpha+\\sin^{2}\\alpha)=3+9=12\\Rightarrow R=2\\sqrt{3}$.\n5. **Trap:** do not substitute a decimal $\\alpha$ to compute $R$ — that \"method could be quite dangerous.\" Use $\\tan^{-1}$ (not $\\sin^{-1}$) and keep the calculator in radians."},{"question":"For $g(x)=\\dfrac{18}{f(3x)+4\\sqrt{3}}$ where $f(x)=2\\sqrt{3}\\sin(2x-\\pi/3)$, what is the minimum value of $g(x)$, and why?","answer":"1. Substitute $f(3x)=2\\sqrt{3}\\sin(6x-\\pi/3)$, so denominator $=2\\sqrt{3}\\sin(6x-\\pi/3)+4\\sqrt{3}$.\n2. Numerator $18$ is fixed and positive, so $g$ is **smallest when the denominator is largest**.\n3. Denominator is maximised when $\\sin(6x-\\pi/3)=1$, giving max denominator $=2\\sqrt{3}+4\\sqrt{3}=6\\sqrt{3}$.\n4. $\\min g=\\dfrac{18}{6\\sqrt{3}}=\\dfrac{3}{\\sqrt{3}}=\\sqrt{3}$ (after rationalising).\n5. **Trap:** trying to minimise $g$ directly via calculus — flip the reasoning: maximise the denominator."},{"question":"For $N=\\dfrac{4000e^{0.1t}}{19+e^{0.2t}}$, state $N$ at $t=0$ and identify the trap in the denominator.","answer":"1. At $t=0$: $e^{0}=1$, so $N=\\dfrac{4000\\cdot 1}{19+1}=\\dfrac{4000}{20}=200$.\n2. **Trap:** \"losing the one\" — the denominator is $19+e^{0}=19+1=20$, not $19$. Forgetting $e^{0}=1$ gives the wrong initial value."},{"question":"State the quotient rule, and identify the sign trap when differentiating $N=\\dfrac{u}{v}$.","answer":"1. Quotient rule: $\\left(\\dfrac{u}{v}\\right)'=\\dfrac{v\\,u'-u\\,v'}{v^{2}}$.\n2. The numerator is $v\\cdot u'$ **minus** $u\\cdot v'$.\n3. **Trap:** dropping the minus sign — it is in the formula book; the $-$ matters and changes the sign of the whole numerator."},{"question":"For the model $N=\\dfrac{4000e^{0.1t}}{19+e^{0.2t}}$, at the maximum $t=T$ the derivative is zero. Show that this gives $e^{0.2T}=19$, and state the value of $A$.","answer":"1. Set $\\dfrac{dN}{dt}=0$; the denominator $(19+e^{0.2T})^{2}\u003e0$, so only the numerator vanishes.\n2. Numerator factors as $e^{0.1T}(7600-400e^{0.2T})=0$.\n3. $e^{0.1T}\u003e0$ for all $T$ (since $e^{x}\u003e0$), so reject $e^{0.1T}=0$.\n4. Therefore $7600-400e^{0.2T}=0\\Rightarrow e^{0.2T}=\\dfrac{7600}{400}=19$.\n5. $A=19$.\n6. **Trap:** the command word is \"show that $e^{0.2T}=A$\" — **stop there**; do not solve for $T$ yet (that comes in the next part)."},{"question":"Using $e^{0.2T}=19$ from the previous step, find the maximum value of $N$ to the nearest whole number, and identify the rounding trap.","answer":"1. Note $e^{0.1T}=(e^{0.2T})^{1/2}=\\sqrt{19}$, and the denominator $19+e^{0.2T}=19+19=38$.\n2. Substitute: $N=\\dfrac{4000\\sqrt{19}}{38}=458.83\\ldots$\n3. Round only at the end: $N=459$ squirrels.\n4. **Trap:** rounding $T$ before substituting back — only round at the **very final answer**; substitute the **stored** (unrounded) calculator value."},{"question":"Starting from $f(x)=\\dfrac{2x^{2}+3x-4}{e^{x}}-\\dfrac{1}{x^{2}}=0$, derive the cube-root iteration form $x=\\sqrt[3]{\\dfrac{e^{x}+4x^{2}}{2x+3}}$. State the two key cues.","answer":"1. Move $\\dfrac{1}{x^{2}}$ across: $\\dfrac{2x^{2}+3x-4}{e^{x}}=\\dfrac{1}{x^{2}}$.\n2. Multiply by $e^{x}x^{2}$: $x^{2}(2x^{2}+3x-4)=e^{x}$.\n3. Expand and rearrange: $2x^{4}+3x^{3}-4x^{2}=e^{x}\\Rightarrow 2x^{4}+3x^{3}=e^{x}+4x^{2}$.\n4. **Cue 1:** the $2x+3$ in the target denominator tells you to factor $x^{3}(2x+3)$ from the left.\n5. Divide by $(2x+3)$: $x^{3}=\\dfrac{e^{x}+4x^{2}}{2x+3}$.\n6. **Cue 2:** a cube root in the answer means cube-root both sides: $x=\\sqrt[3]{\\dfrac{e^{x}+4x^{2}}{2x+3}}$.\n7. **Trap:** not reading the target form first — the target's structure (cube root, $2x+3$ in denominator) directly dictates the factorisation step."}]},"deepseek_1":{"label":"DeepSeek V4 Pro","returned_model":"deepseek/deepseek-v4-pro","cards":[{"question":"A student recalls the surface area of a closed cylinder as \\(\\pi r^{2}h\\). Why is that wrong, and what is the correct formula for the *total surface area*?","answer":"\\(\\pi r^{2}h\\) is the **volume**, not the surface area.  \nThe total surface area of a closed cylinder is:  \n1. Two circular ends: \\(2\\times \\pi r^{2}=2\\pi r^{2}\\)  \n2. Curved side unrolled into a rectangle of length \\(2\\pi r\\) and height \\(h\\): area \\(2\\pi r h\\)  \nSum: \\(2\\pi r^{2}+2\\pi r h\\).  \nCommon error: using diameter instead of circumference for the rectangle’s length, or forgetting one end."},{"question":"In the ESAT warm-up, “surface area of a sphere = total surface area of 10 closed cylinders” with \\(h=4R\\). A student writes the cylinder side as \\(10(\\pi r^{2} + 2\\pi r h)\\). Why is this incorrect?","answer":"A **closed** cylinder has **two** circular ends, so the total end area is \\(2\\pi r^{2}\\), not \\(\\pi r^{2}\\). Using \\(\\pi r^{2}\\) counts only one end. The correct term is \\(10(2\\pi r^{2} + 2\\pi r h)\\)."},{"question":"A student shows \\(f(1)\\) and \\(f(2)\\) have opposite signs and claims a root exists in \\([1,2]\\), but only scores one mark. What essential statement is missing?","answer":"The student must **also state that \\(f\\) is continuous** on \\([1,2]\\). The Intermediate Value Theorem requires both:  \n1. Sign change (\\(f(a)\\) and \\(f(b)\\) have opposite signs)  \n2. Continuity of \\(f\\) on \\([a,b]\\)  \nForgetting to mention continuity will lose a mark."},{"question":"Starting from \\(f(x)=\\frac{2x^{2}+3x-4}{e^{x}}-\\frac{1}{x^{2}}=0\\), the target is \\(x=\\sqrt[3]{\\frac{e^{x}+4x^{2}}{2x+3}}\\). How does the presence of “\\(2x+3\\)” in the denominator guide the factorisation step?","answer":"The \\((2x+3)\\) in the target suggests that after moving terms and simplifying, a factor \\(x^{3}(2x+3)\\) will appear on one side.  \nReason: the expression \\(2x^{4}+3x^{3}\\) can be factored as \\(x^{3}(2x+3)\\). Then dividing both sides by \\((2x+3)\\) yields the cube-root form.  \nStrategy: **look at the target to decide what to factorise**."},{"question":"A graph of \\(\\log_{10}V\\) against \\(t\\) passes through \\((0,2)\\) and \\((5,2.25)\\). A student labels the vertical axis as \\(V\\) or \\(y\\). Why is that a serious marking trap?","answer":"“\\(\\log_{10}V\\) against \\(t\\)” means the plotted vertical variable is \\(\\log_{10}V\\), **not** \\(V\\) or \\(y\\).  \nThe slope \\(m=\\frac{\\Delta(\\log_{10}V)}{\\Delta t}\\) must use the logged values, not the raw \\(V\\). Misidentifying the axis leads to an entirely wrong equation, even if the arithmetic looks correct."},{"question":"After obtaining \\(V=100(10^{0.05})^{t}\\), the base rounds to \\(1.12\\). In part (c) the question asks for the rate \\(\\frac{dV}{dt}\\). Why is it risky to differentiate using the rounded \\(1.12\\)?","answer":"Differentiating with the rounded base changes the coefficient: \\(\\frac{d}{dt}100(1.12)^{t} = 100(1.12)^{t}\\ln(1.12)\\), whereas the exact derivative is \\(100\\cdot 10^{0.05t}\\cdot 0.05\\ln 10\\).  \nAlthough the final answer may still round the same, the method is not “appropriately exact”. Edexcel expects the exact base \\(10^{0.05}\\) (or the equivalent \\(a^{kx}\\) form) to be carried through; rounding before differentiation is a common trap that can cost marks if the tolerance is tight."},{"question":"State the derivative rule for \\(a^{kx}\\) and find \\(\\frac{d}{dx}3^{6x}\\). Identify the most common mistake.","answer":"Rule: \\(\\frac{d}{dx}a^{kx}=a^{kx}\\cdot k\\ln a\\).  \nFor \\(3^{6x}\\): \\(\\frac{d}{dx}3^{6x}=3^{6x}\\cdot 6\\ln 3\\).  \nCommon mistake: writing \\(3^{6x}\\ln(6x)\\) — the factor \\(k\\) must multiply \\(\\ln a\\), not go inside the logarithm."},{"question":"To express \\(\\sqrt{3}\\sin 2x-3\\cos 2x\\) as \\(R\\sin(2x-\\alpha)\\) with exact \\(R\\) and \\(\\alpha\\), a student substitutes a decimal approximation for \\(\\alpha\\) to find \\(R\\). Why is this “dangerous”, and what exact method should be used?","answer":"Using a rounded decimal for \\(\\alpha\\) introduces error into \\(R\\). Instead, use the **exact** method:  \n1. Equate coefficients: \\(R\\cos\\alpha=\\sqrt{3},\\; R\\sin\\alpha=3\\).  \n2. Square and add: \\(R^{2}=(\\sqrt{3})^{2}+3^{2}=12\\) → \\(R=2\\sqrt{3}\\).  \n3. Divide: \\(\\tan\\alpha=\\frac{3}{\\sqrt{3}}=\\sqrt{3}\\) → \\(\\alpha=\\frac{\\pi}{3}\\).  \nThis avoids all rounding and gives exact values."},{"question":"For \\(g(x)=\\frac{18}{2\\sqrt{3}\\sin(6x-\\pi/3)+4\\sqrt{3}}\\) with \\(x\u003e0\\), explain why the **minimum** of \\(g(x)\\) occurs when the denominator is **largest**, and state the condition that achieves that.","answer":"The numerator \\(18\\) is a fixed positive constant. For a positive numerator, the whole fraction is **minimised** when the denominator is **maximised** (because dividing a constant by a larger number gives a smaller result).  \nThe denominator is \\(2\\sqrt{3}\\sin(6x-\\pi/3)+4\\sqrt{3}\\). Since \\(2\\sqrt{3}\u003e0\\), the denominator is largest when \\(\\sin(6x-\\pi/3)=1\\). This condition gives the minimum of \\(g(x)\\)."},{"question":"When using the quotient rule on \\(N=\\frac{4000e^{0.1t}}{19+e^{0.2t}}\\), a student obtains a numerator of \\(7600e^{0.1t}+800e^{0.3t}\\). What single sign error caused this?","answer":"The quotient rule is \\(\\frac{vu'-uv'}{v^{2}}\\). The student likely forgot the **minus sign** and wrote \\(vu'+uv'\\) instead of \\(vu'-uv'\\).  \nWith \\(u=4000e^{0.1t},\\; v=19+e^{0.2t}\\):\n\\(vu'=(19+e^{0.2t})(400e^{0.1t})\\),  \n\\(uv'=(4000e^{0.1t})(0.2e^{0.2t})=800e^{0.3t}\\).  \nThe correct numerator is \\(vu' - uv'\\) which yields \\(-800e^{0.3t}\\) and after simplification \\(-400e^{0.3t}\\), not \\(+800e^{0.3t}\\)."},{"question":"In Q5(c), setting \\(\\frac{dN}{dt}=0\\) leads to \\(e^{0.1T}(7600-400e^{0.2T})=0\\). The question says “show that \\(e^{0.2T}=19\\)”. Why must you **stop** after reaching \\(e^{0.2T}=19\\) and not solve for \\(T\\)?","answer":"The command word “**show that**” only requires deriving the relationship. Solving \\(0.2T=\\ln 19\\) and giving \\(T=\\frac{\\ln 19}{0.2}\\) exceeds the part’s scope and risks algebraic errors. The subsequent part (d) asks for the maximum number of squirrels; solving for \\(T\\) is meant for that later step. Over‑answering ignores the precise instruction and wastes time."},{"question":"For Q5(d), a student finds \\(T=\\frac{\\ln 19}{0.2}\\approx 14.72\\), rounds it to \\(14.7\\), substitutes back and gets \\(458\\) squirrels. The tutor insisted: “we only round at the very final answer.” Why does rounding intermediate \\(T\\) cause an incorrect maximum, and how should the calculation be done?","answer":"Rounding intermediate values introduces a rounding error that can propagate and shift the final integer off by one. The safest method is to store the full‑precision \\(T\\) (or use exact identities: \\(e^{0.2T}=19 \\Rightarrow e^{0.1T}=\\sqrt{19}\\)) and substitute directly into \\(N=\\frac{4000e^{0.1T}}{19+e^{0.2T}}\\) without any rounding. Simplify to \\(\\frac{4000\\sqrt{19}}{38}\\) and then compute the numerical value (\\(458.83\\ldots\\)), rounding only the final answer to the nearest whole number (\\(459\\)). This guarantees full marks and avoids precision traps."}]},"kimi_1":{"label":"Kimi K3","returned_model":"moonshotai/kimi-k3","cards":[{"question":"For $$f(x)=\\frac{2x^{2}+3x-4}{e^{x}}-\\frac{1}{x^{2}},\\ x\\neq0$$, what must **both** appear to earn full marks when showing a root $$\\alpha\\in[1,2]$$ by the Intermediate Value Theorem, and what is the penalty for omitting one?","answer":"1. Substitute the **actual endpoints**: write down both $$f(1)$$ and $$f(2)$$, showing one positive and one negative — a **sign change**.\n2. **State continuity**: $$f$$ is continuous on $$[1,2]$$ (the $$x\\neq0$$ restriction causes no problem inside $$[1,2]$$).\n3. Conclude a root exists by sign change **and** continuity.\nthe tutor's warning: forgetting continuity loses a mark — \"you must remember sign change *and* continuity. Otherwise you'll only score one mark.\""},{"question":"What is the tutor's target-led strategy for showing $$\\frac{2x^{2}+3x-4}{e^{x}}-\\frac{1}{x^{2}}=0 \\iff x=\\sqrt[3]{\\frac{e^{x}+4x^{2}}{2x+3}}$$, and what is its recorded status?","answer":"Read the target form for clues:\n1. Move $$\\frac{1}{x^{2}}$$ across, multiply by $$e^{x}x^{2}$$: $$2x^{4}+3x^{3}-4x^{2}=e^{x}$$.\n2. Move $$4x^{2}$$ across: $$2x^{4}+3x^{3}=e^{x}+4x^{2}$$.\n3. The denominator $$2x+3$$ tells you to factor $$x^{3}(2x+3)$$ on the left.\n4. Divide by $$(2x+3)$$; a cube root in the target means **cube-root both sides**.\n**Status:** completed with prompting (transcript/ledger status conflict — transcript: \"we're there\"; ledger: partial). Part (c), the iteration, was explicitly skipped/deferred (\"we'll leave that one\")."},{"question":"State the surface area of a sphere of radius $$R$$ and of a **closed** cylinder (radius $$r$$, height $$h$$), plus the two formula traps the tutor flagged.","answer":"- Sphere: $$4\\pi R^{2}$$ (the whole outside of the 3-D shape — keep the square, not $$4\\pi R$$).\n- Closed cylinder: $$2\\pi r^{2}+2\\pi r h$$ — **two** circular ends plus the curved side, which unrolls to a rectangle $$2\\pi r \\times h$$ (the long side is the *circumference*, not the diameter).\n**Traps:** circle area is $$\\pi r^{2}$$, not $$\\pi r$$; and $$\\pi r^{2}h$$ is the cylinder's **volume** (cross-section × height), *not* its surface area."},{"question":"A sphere's surface area equals the total surface area of 10 closed cylinders (radius $$r$$, height $$h=4R$$). Outline the derivation of $$R$$ in terms of $$r$$, including the root choice and evidence caveat.","answer":"1. Set up with **two** ends per cylinder: $$4\\pi R^{2}=10\\left(2\\pi r^{2}+2\\pi r h\\right)$$.\n2. Substitute $$h=4R$$: $$4\\pi R^{2}=20\\pi r^{2}+80\\pi rR$$.\n3. Divide by $$4\\pi$$ and collect as a quadratic in $$R$$: $$R^{2}-20rR-5r^{2}=0$$.\n4. Quadratic formula: $$R=\\frac{20r\\pm\\sqrt{420r^{2}}}{2}=r\\left(10\\pm\\sqrt{105}\\right)$$; a radius must be positive, so $$R=r\\left(10+\\sqrt{105}\\right)$$.\n**Evidence note:** the multiple-choice option letters were not reliably captured — match this value to whichever lettered option carries it on the day."},{"question":"State the rule for differentiating $$a^{kx}$$, apply it to $$3^{6x}$$, and name the error the tutor corrected.","answer":"1. Base rule: $$\\frac{d}{dx}a^{x}=a^{x}\\ln a$$.\n2. With a multiple of $$x$$: $$\\frac{d}{dx}a^{kx}=a^{kx}\\cdot k\\ln a$$ (the chain rule brings down the $$k$$).\n3. So $$\\frac{d}{dx}3^{6x}=3^{6x}\\cdot 6\\ln 3$$.\n**Trap:** the factor is $$k\\ln a$$, **never** $$\\ln(kx)$$ — writing $$\\ldots\\ln(6x)$$ was the learner's error. the tutor's drills: $$3^{x}\\to3^{x}\\ln3$$, $$5^{2x}\\to5^{2x}\\cdot2\\ln5$$, $$1.12^{\\,t}\\to1.12^{\\,t}\\ln(1.12)$$. (He set this as the 19 July starter topic.)"},{"question":"A graph of $$\\log_{10}V$$ against $$t$$ is a straight line through $$(0,2)$$ and $$(5,2.25)$$. What are the axis variables, and what is the equation of the line?","answer":"1. \"$$\\log_{10}V$$ against $$t$$\" means the $$y$$-axis is $$\\log_{10}V$$ and the $$x$$-axis is $$t$$ — the tutor's correction: \"It's not $$V$$. Be careful.\"\n2. Gradient: $$m=\\frac{2.25-2}{5-0}=0.05$$; intercept $$c=2$$.\n3. Line: $$\\log_{10}V=0.05t+2$$.\n**Trap:** do not use $$V$$ (or $$y$$) as the vertical variable."},{"question":"Convert $$\\log_{10}V=0.05t+2$$ into the form $$V=ab^{t}$$, giving exact $$a$$, exact $$b$$ and $$b$$ to 3 s.f. Which index law is the key step?","answer":"1. Raise 10 to each side and split the index: $$V=10^{0.05t+2}=10^{2}\\cdot10^{0.05t}$$.\n2. Key restructuring law: $$10^{0.05t}=\\left(10^{0.05}\\right)^{t}$$, so $$V=100\\left(10^{0.05}\\right)^{t}$$.\n3. $$a=100$$ (exact); exact base $$b=10^{0.05}=1.12201\\ldots=1.12$$ (3 s.f.).\nReport $$1.12$$ for this part but carry the exact $$10^{0.05}$$ into any later differentiation."},{"question":"Given $$V=100\\cdot10^{0.05t}$$ (share price), how is \"the rate of increase is £50/yr when $$t=T$$\" turned into an equation, why must the exact base be differentiated, and what is $$T$$?","answer":"1. \"Rate\" $$\\Rightarrow$$ **differentiate**: $$\\frac{dV}{dt}$$; \"increase\" $$\\Rightarrow$$ set it equal to $$+50$$, not $$-50$$. (Guessing \"arithmetic series\" was the learner's trap.)\n2. $$\\frac{dV}{dt}=100\\cdot10^{0.05t}\\cdot0.05\\ln10$$ — differentiate the **exact** base $$10^{0.05}$$, not the rounded $$1.12$$; rounding the base before differentiating is not appropriately exact (here it luckily still rounds to the same answer).\n3. Solve showing algebra (calculator-only barred): $$10^{0.05T}=\\frac{10}{\\ln10}$$, so $$T=\\frac{\\log_{10}\\left(10/\\ln10\\right)}{0.05}=12.7557\\ldots\\Rightarrow T=13$$ (nearest integer)."},{"question":"Express $$\\sqrt3\\sin2x-3\\cos2x$$ in the form $$R\\sin(2x-\\alpha)$$ with **exact** $$R$$ and $$\\alpha$$. What method does the tutor insist on for exact values, and what evidence conflict is flagged?","answer":"1. Expand and match: $$R\\cos\\alpha=\\sqrt3$$, $$R\\sin\\alpha=3$$.\n2. **Divide** for the angle: $$\\tan\\alpha=\\frac{3}{\\sqrt3}=\\sqrt3\\Rightarrow\\alpha=\\frac{\\pi}{3}$$ — calculator in **radians**, use $$\\tan^{-1}$$, not $$\\sin^{-1}$$.\n3. **Square-and-add** for $$R$$: $$R^{2}=3+9=12\\Rightarrow R=2\\sqrt3$$. Do *not* substitute a decimal $$\\alpha$$ to get $$R$$ — \"your method could be quite dangerous.\"\nResult: $$2\\sqrt3\\sin\\left(2x-\\frac{\\pi}{3}\\right)$$.\n**Evidence conflict:** one analysis segment's $$3\\sin2x-4\\cos2x$$ (giving $$R=5$$) is a transcription error; the official paper is authoritative."},{"question":"For $$g(x)=\\frac{18}{f(3x)+4\\sqrt3}$$ with $$f(x)=2\\sqrt3\\sin\\left(2x-\\frac{\\pi}{3}\\right)$$, how is the exact minimum of $$g$$ found, and at what smallest positive $$x$$ does it occur?","answer":"1. The numerator is fixed and positive, so **minimise $$g$$ by maximising the denominator**.\n2. The denominator is largest when $$\\sin\\left(6x-\\frac{\\pi}{3}\\right)=1$$: max denominator $$=2\\sqrt3+4\\sqrt3=6\\sqrt3$$, so $$\\min g=\\frac{18}{6\\sqrt3}=\\frac{3}{\\sqrt3}=\\sqrt3$$ (rationalise).\n3. Solve $$6x-\\frac{\\pi}{3}=\\frac{\\pi}{2}$$: $$6x=\\frac{5\\pi}{6}\\Rightarrow x=\\frac{5\\pi}{36}$$. The next solution $$\\frac{17\\pi}{36}$$ is larger, so this is the smallest."},{"question":"For $$N=\\frac{4000e^{0.1t}}{19+e^{0.2t}}$$, find $$\\frac{dN}{dt}$$ and state the two slips the tutor corrected (the sign, and the $$t=0$$ evaluation).","answer":"1. Quotient rule $$\\left(\\frac{u}{v}\\right)'=\\frac{vu'-uv'}{v^{2}}$$ (from the formula book — the tutor advised *not* converting to a product-rule form) with $$u=4000e^{0.1t}$$, $$u'=400e^{0.1t}$$, $$v=19+e^{0.2t}$$, $$v'=0.2e^{0.2t}$$.\n2. Using $$e^{0.1t}\\cdot e^{0.2t}=e^{0.3t}$$: $$\\frac{dN}{dt}=\\frac{7600e^{0.1t}-400e^{0.3t}}{\\left(19+e^{0.2t}\\right)^{2}}$$.\n**Traps:** keep the **minus** sign in the numerator; at $$t=0$$, $$e^{0}=1$$ so the denominator is $$19+1=20$$ giving $$N=200$$ — \"be careful not to lose the one.\""},{"question":"At the maximum of $$N=\\frac{4000e^{0.1t}}{19+e^{0.2t}}$$ (at $$t=T$$), how do the \"show that\" and \"find the maximum\" parts proceed, what command-word/rounding traps apply, and what is the accepted maximum?","answer":"1. Set the derivative's numerator to zero: $$e^{0.1T}\\left(7600-400e^{0.2T}\\right)=0$$. Since $$e^{0.1T}\u003e0$$ for all $$T$$, reject it; hence $$e^{0.2T}=\\frac{7600}{400}=19$$, so $$A=19$$. **Stop there** — the command is only \"show that.\"\n2. Solve only when asked, using $$\\ln$$ (base is $$e$$, not $$\\log_{10}$$): $$T=\\frac{\\ln19}{0.2}$$; keep the **stored/unrounded** value — round only at the very final answer.\n3. Substitute back ($$e^{0.1T}=\\sqrt{19}$$, denominator $$=19+19=38$$): $$N=\\frac{4000\\sqrt{19}}{38}=458.83\\ldots\\Rightarrow 459$$ squirrels.\n**Evidence note:** one segment's \"959\" (and mis-copied denominator $$19+e^{0.1t}$$) are flagged transcription errors; the transcript confirms \"459 is fine.\""}]}},ROLES=Object.keys(DATA);let active=ROLES[0],selected={};for(const r of ROLES)selected[r]=new Set(DATA[r].cards.map((_,i)=>i));
function typeset(){const x=document.getElementById('list');if(window.MathJax&&MathJax.typesetPromise){if(MathJax.typesetClear)MathJax.typesetClear([x]);MathJax.typesetPromise([x]).catch(()=>{})}}
function tabs(){const t=document.getElementById('tabs');t.replaceChildren();for(const r of ROLES){const b=document.createElement('button');b.className='tab'+(r===active?' active':'');b.textContent=DATA[r].label+' ('+DATA[r].cards.length+')';b.onclick=()=>{active=r;tabs();render()};t.append(b)}}
function render(){const l=document.getElementById('list');l.replaceChildren();DATA[active].cards.forEach((c,i)=>{const article=document.createElement('article');article.className='card';const row=document.createElement('div');row.className='row';const pick=document.createElement('input');pick.className='pick';pick.type='checkbox';pick.checked=selected[active].has(i);pick.setAttribute('aria-label',`Select card ${i+1}`);const qw=document.createElement('div');qw.className='qwrap';const q=document.createElement('div');q.className='q';q.tabIndex=0;q.textContent=c.question;const ans=document.createElement('div');ans.className='answer';const txt=document.createElement('div');txt.textContent=c.answer;const foot=document.createElement('div');foot.className='foot';const cp=document.createElement('button');cp.className='copy';cp.textContent='Copy';cp.onclick=()=>copyText(c.question+'\t'+c.answer);foot.append(cp);ans.append(txt,foot);qw.append(q,ans);row.append(pick,qw);article.append(row);l.append(article);pick.onchange=()=>{pick.checked?selected[active].add(i):selected[active].delete(i);count()};const toggle=()=>{article.classList.toggle('open');typeset()};q.onclick=toggle;q.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle()}}});count();typeset()}
function count(){document.getElementById('count').textContent=`${selected[active].size} / ${DATA[active].cards.length} selected`}
function setall(v){selected[active]=v?new Set(DATA[active].cards.map((_,i)=>i)):new Set();render()}
function reveal(v){document.querySelectorAll('.card').forEach(x=>x.classList.toggle('open',v));typeset()}
function copyText(s){navigator.clipboard.writeText(s).then(()=>toast('Copied')).catch(()=>toast('Copy failed'))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)}
function table(){const c=DATA[active].cards.filter((_,i)=>selected[active].has(i));let s='| Question | Answer |\n| --- | --- |\n';for(const x of c)s+='| '+x.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+x.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n';copyText(s)}
addEventListener('DOMContentLoaded',()=>{tabs();render();document.getElementById('sel').onclick=()=>setall(true);document.getElementById('desel').onclick=()=>setall(false);document.getElementById('reveal').onclick=()=>reveal(true);document.getElementById('hide').onclick=()=>reveal(false);document.getElementById('table').onclick=table});</script></body></html>
