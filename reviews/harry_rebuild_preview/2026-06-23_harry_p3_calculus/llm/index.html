ard{min-width:0;max-width:100%;background:#fff;border:1px solid #e1e1e6;border-radius:14px;padding:15px 16px;box-shadow:0 1px 4px #0000000a}.row{display:flex;gap:10px;align-items:flex-start;min-width:0}.pick{width:18px;height:18px;margin-top:3px;flex:0 0 auto}.qwrap{min-width:0;max-width:100%;flex:1}.q{font-weight:650;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;cursor:pointer;overflow-x:auto}.answer{display:none;white-space:pre-wrap;margin-top:10px;padding-top:10px;border-top:1px solid #ececf0;color:#3e3e43;overflow-wrap:anywhere;word-break:break-word;overflow-x:auto}.card.open .answer{display:block}.foot{display:flex;justify-content:flex-end;margin-top:8px}.copy{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:3px 8px;cursor:pointer}.notice{font-size:12px;color:#68686d;text-align:center;margin:12px 0}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#1d1d1f;color:#fff;border-radius:8px;padding:8px 14px;opacity:0;pointer-events:none}.toast.show{opacity:1}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}@media(max-width:430px){.wrap{padding:16px 10px 55px}h1{font-size:24px}.tools{top:4px}.count{width:100%;margin-left:0}.card{padding:13px 12px}}</style><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true},options:{skipHtmlTags:["script","noscript","style","textarea","pre","code"]}};</script><script defer src="assets/mathjax/es5/tex-mml-chtml.js"></script></head><body><main class="wrap"><header><h1>Pearson Edexcel IAL P3 WMA13/01 October 2025 + calculus lesson evidence · 23 June 2026 Maths P3 and calculus review</h1><p class="sub">Direct model-output flashcards</p></header><nav id="tabs" class="tabs" aria-label="Models"></nav><nav class="tools"><button id="sel">Select all</button><button id="desel">Deselect all</button><button id="reveal">Reveal all</button><button id="hide">Hide all</button><button id="table">Copy table</button><span id="count" class="count"></span></nav><section id="list" class="list"></section><p class="notice">Model outputs are displayed directly as generated.</p></main><div id="toast" class="toast"></div><script>const DATA={"glm_1":{"label":"GLM 5.1 · Run 1","returned_model":"z-ai/glm-5.1","cards":[{"question":"Given the curve $$y = x^2 + ax + b$$ meets the line $$y = x + 1$$ at $$x = 2$$ and $$x = 4$$, how do you find $$a$$ and $$b$$? (Lesson evidence — paper unresolved, no official marks)","answer":"1. At the meeting points the $$y$$-values are equal, so set them equal: $$x^2 + ax + b = x + 1$$. 2. Substitute the two known $$x$$-values into the equality: for $$x = 2$$, $$4 + 2a + b = 3 \\Rightarrow 2a + b = -1$$; for $$x = 4$$, $$16 + 4a + b = 5 \\Rightarrow 4a + b = -11$$. 3. Subtract the equations: $$2a = -10 \\Rightarrow a = -5$$. 4. Substitute back: $$b = 9$$. Trap: copy the quadratic exactly and substitute the same $$x$$ on both sides. Status: Completed with prompting."},{"question":"For $$f(x) = \\ln(x^2 + 3)$$, $$x \\in \\mathbb{R}$$, how do you state the range of $$f$$? (Official WMA13/01 Oct 2025, 1 mark B1)","answer":"1. The domain is already given as $$x \\in \\mathbb{R}$$; the question asks for the range (output values). 2. Since $$x^2 \\geq 0$$, the smallest value of $$x^2 + 3$$ is 3. 3. Therefore, the smallest output is $$\\ln 3$$. 4. Range: $$f(x) \\geq \\ln 3$$. Trap: finding the domain ($$x^2 \u003e -3$$) or incorrectly writing $$f(x) \\in \\mathbb{R}$$ instead of the range. Status: Completed with prompting."},{"question":"For $$g(x) = \\frac{5x+3}{x+2}$$, $$x \u003e -2$$, how do you find the inverse $$g^{-1}(x)$$ and its domain? (Official WMA13/01 Oct 2025, 3 marks M1 A1 B1)","answer":"1. Let $$y = \\frac{5x+3}{x+2}$$, rearrange for $$x$$: $$y(x+2) = 5x+3 \\Rightarrow xy - 5x = 3 - 2y \\Rightarrow x(y-5) = 3-2y \\Rightarrow x = \\frac{3-2y}{y-5}$$. 2. Swap to $$x$$-notation: $$g^{-1}(x) = \\frac{3-2x}{x-5}$$. 3. Find the domain of $$g^{-1}$$ by finding the range of $$g$$: write $$g(x) = 5 - \\frac{7}{x+2}$$. With $$x \u003e -2$$, $$g(x) \u003c 5$$. 4. Inverse domain: $$x \u003c 5$$. Trap: omitting the domain of the inverse. Status: Completed with prompting."},{"question":"Given $$f(x) = \\ln(x^2 + 3)$$ and $$g(x) = \\frac{5x+3}{x+2}$$, how do you evaluate $$fg(0)$$? (Official WMA13/01 Oct 2025, 2 marks M1 A1)","answer":"1. Evaluate the inner function first: $$g(0) = \\frac{3}{2}$$. 2. Substitute into $$f$$: $$f\\left(\\frac{3}{2}\\right) = \\ln\\left(\\left(\\frac{3}{2}\\right)^2 + 3\\right)$$. 3. Simplify inside the bracket: $$\\frac{9}{4} + 3 = \\frac{21}{4}$$. 4. Result: $$fg(0) = \\ln\\left(\\frac{21}{4}\\right)$$. Status: Completed with prompting."},{"question":"Given $$f(x) = \\ln(x^2 + 3)$$ and $$g(x) = \\frac{5x+3}{x+2}$$, what is the exact value of $$a$$ for which $$g(e^{2a}) = f(\\sqrt{e^4 - 3})$$? (Official WMA13/01 Oct 2025, 3 marks M1 dM1 A1; Status: DEFERRED / UNFINISHED)","answer":"1. Evaluate the right side: $$f(\\sqrt{e^4 - 3}) = \\ln((\\sqrt{e^4 - 3})^2 + 3) = \\ln(e^4 - 3 + 3) = \\ln(e^4) = 4$$. 2. Set the left side equal to 4: $$\\frac{5e^{2a} + 3}{e^{2a} + 2} = 4$$. 3. Solve: $$5e^{2a} + 3 = 4e^{2a} + 8 \\Rightarrow e^{2a} = 5 \\Rightarrow a = \\frac{1}{2}\\ln 5$$. Trap: treating the compositions as directly equal rather than applying the functions. Status: DEFERRED / UNFINISHED. Official answer $$a = \\frac{1}{2}\\ln 5$$ is Official reference only — not completed live."},{"question":"To prove a function has a root in the interval $$[3, 4]$$, what two conditions must be checked and stated? (Lesson evidence — paper unresolved, no official marks)","answer":"1. Evaluate at each end and observe a sign change between $$x = 3$$ and $$x = 4$$. 2. State that the function is continuous on $$[3, 4]$$. 3. Conclude: therefore there exists a root $$\\alpha$$ in the interval. Trap: omitting the continuity statement loses the mark. Status: Completed with prompting."},{"question":"When using iteration $$x_{n+1} = F(x_n)$$ starting from $$x_1 = 3$$ to find a root to 4 decimal places, what is the calculator strategy? (Lesson evidence — paper unresolved, no official marks)","answer":"1. Show the working for the first step. 2. Quote subsequent values using ANS repetition (ANS = 3, then press = repeatedly) until the value repeats to 4 d.p. 3. The root converges to $$\\alpha \\approx 3.1589$$. Status: Completed with prompting."},{"question":"For $$f(x) = \\frac{12}{x+1}$$, $$x \u003e 0$$, how do you find fixed points where $$f(x) = f^{-1}(x)$$? (Lesson evidence — paper unresolved, no official marks)","answer":"1. A graph and its inverse are reflections in $$y = x$$; where $$f = f^{-1}$$, the curves meet $$y = x$$. 2. Therefore, solve $$f(x) = x$$ rather than finding the full inverse. 3. $$\\frac{12}{x+1} = x \\Rightarrow x^2 + x - 12 = 0 \\Rightarrow x = 3, -4$$. 4. Reject $$x = -4$$ because the domain requires $$x \u003e 0$$. Final solution: $$x = 3$$. Trap: forgetting to check candidates against the domain. Status: Completed with prompting."},{"question":"For $$f(x) = \\frac{12}{x+1}$$, $$x \u003e 0$$, how do you find the domain of the inverse function? (Lesson evidence — paper unresolved, no official marks)","answer":"1. The domain of the inverse is the range of the original function. 2. Sketch the restricted graph: asymptotes at $$x = -1$$, $$y = 0$$; passing through $$(0, 12)$$. 3. With $$x \u003e 0$$, the range is $$0 \u003c y \u003c 12$$. 4. Therefore, the inverse domain is $$0 \u003c x \u003c 12$$. Rule: range uses $$y$$; domain uses $$x$$. Status: Completed with prompting."},{"question":"How do you prove $$\\sin 3x = 3\\sin x - 4\\sin^3 x$$ using compound-angle identities? (Lesson evidence — paper unresolved, no official marks)","answer":"1. Write $$\\sin 3x = \\sin(2x + x) = \\sin 2x \\cos x + \\cos 2x \\sin x$$. 2. Substitute $$\\sin 2x = 2\\sin x \\cos x$$ and the all-sine form $$\\cos 2x = 1 - 2\\sin^2 x$$. 3. Expand: $$2\\sin x \\cos^2 x + (1 - 2\\sin^2 x)\\sin x$$. 4. Use $$\\cos^2 x = 1 - \\sin^2 x$$: $$2\\sin x(1 - \\sin^2 x) + \\sin x - 2\\sin^3 x = 2\\sin x - 2\\sin^3 x + \\sin x - 2\\sin^3 x = 3\\sin x - 4\\sin^3 x$$. Trap: missing the coefficient 2 in $$\\sin 2x$$ or not recalling the correct $$\\cos 2x$$ form. Status: Completed with prompting."},{"question":"A \"hence\" integral requires integrating $$\\sin^3 x$$ using the identity $$\\sin 3x = 3\\sin x - 4\\sin^3 x$$. What is the correct rearrangement to prepare for integration? (Lesson evidence — paper unresolved, no official marks; Status: DEFERRED / UNFINISHED)","answer":"1. The word \"hence\" signals reuse of the proof. 2. Make $$\\sin^3 x$$ the subject of the identity: $$4\\sin^3 x = 3\\sin x - \\sin 3x \\Rightarrow \\sin^3 x = \\frac{1}{4}(3\\sin x - \\sin 3x)$$. 3. Take the factor $$\\frac{1}{4}$$ outside before integrating: $$\\int \\sin^3 x \\, dx = \\frac{1}{4}\\int (3\\sin x - \\sin 3x) \\, dx$$. Status: DEFERRED / UNFINISHED. Do not reconstruct or provide a completed antiderivative."},{"question":"For P3, which trig identities are supplied in the formula booklet, and which must be recalled from memory? (Lesson evidence — paper unresolved, no official marks)","answer":"1. Supplied in the booklet: Compound-angle identities ($$\\sin(A \\pm B)$$, $$\\cos(A \\pm B)$$). 2. Must be recalled (not listed, but derivable and in scope): Double-angle identities ($$\\sin 2A = 2\\sin A \\cos A$$) and all three forms of $$\\cos 2A$$ ($$\\cos^2 A - \\sin^2 A$$, $$2\\cos^2 A - 1$$, $$1 - 2\\sin^2 A$$). 3. Fundamental identity: $$\\sin^2 x + \\cos^2 x = 1$$. Status: Completed with prompting."}]},"glm_2":{"label":"GLM 5.1 · Run 2","returned_model":"z-ai/glm-5.1","cards":[{"question":"The curve $$y = x^2 + ax + b$$ meets the line $$y = x + 1$$ when $$x = 2$$ and $$x = 4$$ (lesson evidence, paper unresolved). What two common traps occur when finding $$a$$ and $$b$$, and what is the correct method?","answer":"1. Trap: Mis-copying the quadratic or substituting $$x$$ on only one side of the equality. 2. Method: Set the $$y$$-values equal: $$x^2 + ax + b = x + 1$$. Substitute each $$x$$ to get two simultaneous equations: $$x=2 \\Rightarrow 2a+b=-1$$, $$x=4 \\Rightarrow 4a+b=-11$$. Subtract to find $$a=-5$$, then $$b=9$$. Status: COMPLETED W/ PROMPTING."},{"question":"For $$f(x) = \\ln(x^2 + 3)$$, $$x \\in \\mathbb{R}$$ (official WMA13/01 Oct 2025, 1 mark B1), what is the range of $$f$$ and what is the common trap?","answer":"Range: $$f(x) \\ge \\ln 3$$. 1. Trap: Confusing the given domain ($$x \\in \\mathbb{R}$$) with the range, or sketching $$e^x$$ instead of $$\\ln$$. 2. Reason: Since $$x^2 \\ge 0$$, the minimum input to $$\\ln$$ is 3, so the minimum output is $$\\ln 3$$. Status: COMPLETED W/ PROMPTING."},{"question":"For $$g(x) = \\frac{5x+3}{x+2}$$, $$x \u003e -2$$ (official WMA13/01 Oct 2025, 3 marks M1 A1 B1), what is the inverse $$g^{-1}(x)$$ and its domain, and what trap must be avoided?","answer":"1. Inverse: $$g^{-1}(x) = \\frac{3-2x}{x-5}$$, domain $$x \u003c 5$$. 2. Trap: Leaving the inverse in terms of $$y$$, or omitting the inverse domain entirely. 3. Check: The inverse domain equals the range of $$g$$; since $$g(x) = 5 - \\frac{7}{x+2}$$ with $$x\u003e-2$$, the range is $$g(x)\u003c5$$, so inverse domain is $$x\u003c5$$. Status: COMPLETED W/ PROMPTING."},{"question":"Given $$f(x) = \\ln(x^2+3)$$ and $$g(x) = \\frac{5x+3}{x+2}$$ (official WMA13/01 Oct 2025, 2 marks M1 A1), what is $$fg(0)$$ and what simplification trap occurs?","answer":"1. $$g(0) = \\frac{3}{2}$$, so $$fg(0) = f\\left(\\frac{3}{2}\\right) = \\ln\\left(\\left(\\frac{3}{2}\\right)^2 + 3\\right) = \\ln\\left(\\frac{9}{4}+3\\right) = \\ln\\left(\\frac{21}{4}\\right)$$. 2. Trap: Failing to simplify the bracket $$\\frac{9}{4}+3$$ into a single fraction $$\\frac{21}{4}$$ before applying $$\\ln$$. Status: COMPLETED W/ PROMPTING."},{"question":"Find the exact value of $$a$$ for which $$g(e^{2a}) = f(\\sqrt{e^4 - 3})$$ where $$f(x) = \\ln(x^2+3)$$ and $$g(x) = \\frac{5x+3}{x+2}$$ (official WMA13/01 Oct 2025, 3 marks M1 dM1 A1). Status: DEFERRED / UNFINISHED. What is the primary conceptual trap, and what is the official reference answer?","answer":"1. Trap: Treating the inner expressions as directly equal (i.e. $$e^{2a} = \\sqrt{e^4 - 3}$$) rather than evaluating each function separately. 2. Method trigger: Compute the right side first: $$f(\\sqrt{e^4 - 3}) = \\ln(e^4 - 3 + 3) = \\ln(e^4) = 4$$, then solve $$g(e^{2a}) = 4$$. 3. Official reference only — not completed live: $$a = \\frac{1}{2}\\ln 5$$. Status: DEFERRED / UNFINISHED."},{"question":"To prove a root $$\\alpha$$ exists in an interval [3, 4] (lesson evidence, paper unresolved), what two conditions must be stated, and what is the common trap?","answer":"1. A sign change between $$f(3)$$ and $$f(4)$$. 2. The function is continuous on [3, 4]. 3. Trap: Stating the sign change but omitting the continuity condition, which loses the mark. Conclude: \"Therefore a root $$\\alpha$$ exists in (3, 4).\" Status: COMPLETED W/ PROMPTING."},{"question":"When using an iteration formula starting at $$x_1 = 3$$ to find a root to 4 decimal places (lesson evidence, paper unresolved), what calculator technique is used, and what is the converged value?","answer":"1. Technique: Enter the initial value (3), store in ANS, then repeatedly press '=' to generate subsequent iterates until the value repeats to 4 d.p. 2. Converged value: 3.1589 (4 d.p.). 3. Check: Always show the first step manually, then quote subsequent values. Status: COMPLETED W/ PROMPTING."},{"question":"For $$f(x) = \\frac{12}{x+1}$$, $$x \u003e 0$$ (lesson evidence, paper unresolved), solving $$f(x) = f^{-1}(x)$$ gives candidates $$x = 3$$ and $$x = -4$$. What geometric principle allows solving as $$f(x) = x$$, and which candidate is rejected?","answer":"1. Principle: A function and its inverse are reflections in $$y = x$$; intersections must lie on $$y = x$$, so $$f(x) = f^{-1}(x)$$ reduces to $$f(x) = x$$. 2. Reject: $$x = -4$$ because the domain is $$x \u003e 0$$. 3. Trap: Accepting a fixed point outside the domain. Status: COMPLETED W/ PROMPTING."},{"question":"For $$f(x) = \\frac{12}{x+1}$$, $$x \u003e 0$$ (lesson evidence, paper unresolved), the range is $$0 \u003c y \u003c 12$$. What is the domain of $$f^{-1}(x)$$, and what general variable rule prevents confusion?","answer":"1. Domain of inverse: $$0 \u003c x \u003c 12$$. 2. Rule: Range always uses $$y$$; domain always uses $$x$$. The range of the original function ($$0 \u003c y \u003c 12$$) becomes the domain of the inverse ($$0 \u003c x \u003c 12$$). 3. Trap: Using $$y$$ in the domain statement. Status: COMPLETED W/ PROMPTING."},{"question":"Prove $$\\sin 3x = 3\\sin x - 4\\sin^3 x$$ (lesson evidence, paper unresolved). What compound-angle split is used, and which specific double-angle form of $$\\cos 2x$$ is chosen and why?","answer":"1. Split: Write $$\\sin 3x = \\sin(2x + x)$$ and apply the compound-angle identity. 2. Choose: $$\\cos 2x = 1 - 2\\sin^2 x$$. 3. Reason: The target identity contains only $$\\sin$$ terms, so this form eliminates $$\\cos$$ via $$\\cos^2 x = 1 - \\sin^2 x$$. 4. Trap: Missing the factor 2 in $$\\sin 2x = 2\\sin x \\cos x$$. Status: COMPLETED W/ PROMPTING."},{"question":"A \"hence\" integral requires rewriting $$\\sin^3 x$$ using the identity $$\\sin 3x = 3\\sin x - 4\\sin^3 x$$ (lesson evidence, paper unresolved). Status: DEFERRED / UNFINISHED. What is the correct rearrangement for $$\\sin^3 x$$ and the suggested pre-integration step?","answer":"1. Rearrangement: Make $$\\sin^3 x$$ the subject: $$\\sin^3 x = \\frac{1}{4}(3\\sin x - \\sin 3x)$$. 2. Step: Take the factor $$\\frac{1}{4}$$ outside the integral before integrating. 3. Constraint: No complete antiderivative, limits, or official marks are available; do not reconstruct a final result. Status: DEFERRED / UNFINISHED."},{"question":"For P3 trig identities (lesson evidence, paper unresolved), which are supplied in the formula booklet and which must be recalled or derived?","answer":"1. Supplied: Compound-angle identities ($$\\sin(A \\pm B)$$, $$\\cos(A \\pm B)$$). 2. Must recall/derive: Double-angle identities ($$\\sin 2A = 2\\sin A \\cos A$$, and all three forms of $$\\cos 2A$$). 3. Trap: Assuming double-angle forms are in the booklet and missing the factor 2 in $$\\sin 2A$$ or failing to select the correct $$\\cos 2A$$ form for a specific proof."}]},"glm_3":{"label":"GLM 5.1 · Run 3","returned_model":"z-ai/glm-5.1","cards":[{"question":"The curve $$y = x^2 + ax + b$$ meets the line $$y = x + 1$$ when $$x = 2$$ and $$x = 4$$. What is the first algebraic step to find $$a$$ and $$b$$, and what common copying trap must be avoided? (LESSON EVIDENCE — PAPER UNRESOLVED — no official marks are attached, COMPLETED W/ PROMPTING)","answer":"1. Set the $$y$$-values equal: $$x^2 + ax + b = x + 1$$. 2. Substitute each known $$x$$-value into both sides simultaneously (e.g., for $$x=2$$: $$4 + 2a + b = 3$$). 3. Trap: Mis-copying terms under time pressure (e.g. writing $$2x^2$$ instead of $$x^2$$, or $$4 \\times 1$$ instead of $$4 + 1$$)."},{"question":"For $$f(x) = \\ln(x^2 + 3)$$, $$x \\in \\mathbb{R}$$ (OFFICIAL WMA13/01 OCT 2025, 1 mark B1, COMPLETED W/ PROMPTING), what is the range of $$f$$ and why is writing $$f(x) \\in \\mathbb{R}$$ a common trap?","answer":"1. Range: $$f(x) \\ge \\ln 3$$. 2. Since $$x^2 \\ge 0$$, the minimum of $$x^2 + 3$$ is 3, so the minimum output is $$\\ln 3$$. 3. Trap: Writing $$f(x) \\in \\mathbb{R}$$ happens if you mistakenly solve the domain inequality $$x^2 + 3 \u003e 0$$ instead of finding the minimum output value of the composite function."},{"question":"For $$g(x) = \\frac{5x+3}{x+2}$$, $$x \u003e -2$$ (OFFICIAL WMA13/01 OCT 2025, 3 marks M1 A1 B1, COMPLETED W/ PROMPTING), what is the domain of $$g^{-1}$$ and how is it determined?","answer":"1. Domain of $$g^{-1}$$: $$x \u003c 5$$. 2. The domain of an inverse equals the range of the original function. 3. Rewrite $$g(x) = 5 - \\frac{7}{x+2}$$; since $$x \u003e -2$$, the fraction is positive, making $$g(x) \u003c 5$$. 4. Trap: Omitting the inverse domain is a frequent exam error (\"everyone forgets in the exam\")."},{"question":"Given $$g(x) = \\frac{5x+3}{x+2}$$, $$x \u003e -2$$ (OFFICIAL WMA13/01 OCT 2025, 3 marks M1 A1 B1, COMPLETED W/ PROMPTING), state the algebraic steps to find $$g^{-1}(x)$$ and the notation trap.","answer":"1. Set $$y = \\frac{5x+3}{x+2}$$ and cross-multiply: $$y(x+2) = 5x+3$$. 2. Collect $$x$$-terms: $$xy - 5x = 3 - 2y \\Rightarrow x(y-5) = 3-2y$$. 3. Make $$x$$ the subject: $$x = \\frac{3-2y}{y-5}$. 4. Swap variables: $$g^{-1}(x) = \\frac{3-2x}{x-5}$. 5. Trap: Leaving the inverse expressed in terms of $$y$$."},{"question":"For $$f(x) = \\ln(x^2+3)$$ and $$g(x) = \\frac{5x+3}{x+2}$$ (OFFICIAL WMA13/01 OCT 2025, 2 marks M1 A1, COMPLETED W/ PROMPTING), what is the evaluation order and simplification trap for $$fg(0)$$?","answer":"1. Work inside-out: evaluate $$g(0) = \\frac{3}{2}$$ first, then apply $$f$$ to that output. 2. $$fg(0) = f(\\frac{3}{2}) = \\ln\\!\\left(\\left(\\frac{3}{2}\\right)^2 + 3\\right) = \\ln\\!\\left(\\frac{9}{4} + 3\\right) = \\ln\\!\\left(\\frac{21}{4}\\right)$. 3. Trap: Failing to combine $$\\left(\\frac{3}{2}\\right)^2 + 3$$ into a single fraction $$\\frac{21}{4}$$ before applying the logarithm."},{"question":"In the equation $$g(e^{2a}) = f(\\sqrt{e^4 - 3})$$ (OFFICIAL WMA13/01 OCT 2025, 3 marks M1 dM1 A1, DEFERRED / UNFINISHED), what composition trap caused the live attempt to fail, and what is the correct first step?","answer":"1. Trap: Treating the two arguments as directly equal (e.g. $$e^{2a} = \\sqrt{e^4 - 3}$$) rather than recognising it as $$g(\\text{input}) = f(\\text{input})$$. 2. Correct step: Evaluate the right side independently: $$f(\\sqrt{e^4 - 3}) = \\ln((\\sqrt{e^4 - 3})^2 + 3) = \\ln(e^4) = 4$$. 3. Then solve $$g(e^{2a}) = 4$$ for $$a$$. 4. The result $$a = \\frac{1}{2}\\ln 5$$ is Official reference only — not completed live. DEFERRED / UNFINISHED."},{"question":"To prove a root $$\\alpha$$ exists in the interval $$[3, 4]$$ (LESSON EVIDENCE — PAPER UNRESOLVED — no official marks are attached, COMPLETED W/ PROMPTING), what two conditions must be explicitly stated alongside a sign change?","answer":"1. $$f(3)$$ and $$f(4)$$ have opposite signs (sign change). 2. $$f(x)$$ is continuous on the interval $$[3, 4]$$. 3. Trap: Omitting the continuity statement — \"the thing that everyone misses, and it loses them the mark.\" 4. Conclude: therefore a root $$\\alpha$$ exists in $$(3, 4)$$."},{"question":"When using an iteration formula starting from $$x_1 = 3$$ to find a root to 4 decimal places (LESSON EVIDENCE — PAPER UNRESOLVED — no official marks are attached, COMPLETED W/ PROMPTING), what calculator strategy and presentation steps are required?","answer":"1. Show manual working for the first iteration step ($$x_2$$). 2. Use calculator ANS repetition (store ANS = 3, then press = repeatedly) until the value stabilises at 4 d.p. ($$\\approx 3.1589$$). 3. Quote the subsequent values; do not just write the final answer without evidence of the sequence. The exact iteration formula is unresolved."},{"question":"For $$f(x) = \\frac{12}{x+1}$$, $$x \u003e 0$$ (LESSON EVIDENCE — PAPER UNRESOLVED — no official marks are attached, COMPLETED W/ PROMPTING), how do you find fixed points where $$f(x) = f^{-1}(x)$$, and what domain trap must be checked?","answer":"1. Because a function and its inverse are reflections in $$y = x$$, any intersection/fixed point satisfies $$f(x) = x$$. 2. Solve $$\\frac{12}{x+1} = x \\Rightarrow x^2 + x - 12 = 0 \\Rightarrow x = 3, -4$$. 3. Trap: Reject $$x = -4$$ because the domain is $$x \u003e 0$$; always label the rejection reason explicitly for the examiner."},{"question":"For $$f(x) = \\frac{12}{x+1}$$, $$x \u003e 0$$ (LESSON EVIDENCE — PAPER UNRESOLVED — no official marks are attached, COMPLETED W/ PROMPTING), how is the domain of $$f^{-1}$$ determined from the original graph?","answer":"1. Domain of $$f^{-1}$$ = Range of $$f$$. 2. Identify asymptotes: vertical at $$x = -1$$, horizontal at $$y = 0$$. 3. Evaluate boundary: $$f(0) = 12$$. 4. Since $$x \u003e 0$$, the curve lies between $$y = 0$$ and $$y = 12$$, so the range is $$0 \u003c y \u003c 12$$. 5. Therefore, inverse domain is $$0 \u003c x \u003c 12$$. 6. Rule: Range uses $$y$$; domain uses $$x$$."},{"question":"To prove $$\\sin 3x = 3\\sin x - 4\\sin^3 x$$ (LESSON EVIDENCE — PAPER UNRESOLVED — no official marks are attached, COMPLETED W/ PROMPTING), which compound/double-angle identities are used, and which form of $$\\cos 2x$$ is strategically chosen?","answer":"1. Open with compound angle: $$\\sin(2x + x) = \\sin 2x \\cos x + \\cos 2x \\sin x$$. 2. Apply double angles: $$\\sin 2x = 2\\sin x \\cos x$$ (trap: missing the factor 2), and $$\\cos 2x = 1 - 2\\sin^2 x$$. 3. Strategy: Choose the $$1 - 2\\sin^2 x$$ form of $$\\cos 2x$$ to eliminate cosines, leaving only $$\\sin x$$ terms. 4. Replace $$\\cos^2 x$$ with $$1 - \\sin^2 x$$ and simplify."},{"question":"When an integration question signals \"hence\" to integrate $$\\sin^3 x$$ using the identity $$\\sin 3x = 3\\sin x - 4\\sin^3 x$$ (LESSON EVIDENCE — PAPER UNRESOLVED — no official marks are attached, DEFERRED / UNFINISHED), what algebraic rearrangement is required before integrating, and what presentation strategy is advised?","answer":"1. \"Hence\" mandates reusing the prior identity. Make $$\\sin^3 x$$ the subject: $$4\\sin^3 x = 3\\sin x - \\sin 3x \\Rightarrow \\sin^3 x = \\frac{1}{4}(3\\sin x - \\sin 3x)$. 2. Strategy: Factor out the $$\\frac{1}{4}$$ before integrating the remaining terms. 3. The exact integrand, limits and completed antiderivative are unavailable and must not be reconstructed. DEFERRED / UNFINISHED."}]},"qwen_1":{"label":"Qwen 3.7 Max","returned_model":"qwen/qwen3.7-max","cards":[{"question":"In a warm-up exercise (lesson evidence, no official marks), the curve $$y = x^2 + ax + b$$ meets the line $$y = x + 1$$ at $$x = 2$$ and $$x = 4$$. What are the values of $$a$$ and $$b$$, and what is the key algebraic step to find them?","answer":"$$a = -5$$, $$b = 9$$.\n1. Equate the $$y$$-values at the intersection points: $$x^2 + ax + b = x + 1$$.\n2. Substitute $$x = 2$$ to get $$4 + 2a + b = 3 \\implies 2a + b = -1$$.\n3. Substitute $$x = 4$$ to get $$16 + 4a + b = 5 \\implies 4a + b = -11$$.\n4. Subtract the first equation from the second to get $$2a = -10 \\implies a = -5$$, then substitute back to find $$b = 9$$.\nStatus: COMPLETED W/ PROMPTING."},{"question":"For the official WMA13/01 Oct 2025 question (1 B1 mark, COMPLETED W/ PROMPTING), what is the range of $$f(x) = \\ln(x^2 + 3)$$ for $$x \\in \\mathbb{R}$$, and what is the common trap to avoid?","answer":"Range: $$f(x) \\ge \\ln 3$$.\n1. Recognize that the question asks for the range (output values), not the domain.\n2. Since $$x^2 \\ge 0$$ for all real $$x$$, the minimum value of $$x^2 + 3$$ is $$3$$.\n3. Therefore, the minimum output is $$\\ln 3$$, giving $$f(x) \\ge \\ln 3$$.\nTrap: Do not solve $$x^2 + 3 \u003e 0$$ (which finds the domain) or state $$f(x) \\in \\mathbb{R}$$."},{"question":"For the official WMA13/01 Oct 2025 question (3 M1 A1 B1 marks, COMPLETED W/ PROMPTING), find the inverse function $$g^{-1}(x)$$ and its domain for $$g(x) = \\frac{5x + 3}{x + 2}$$ where $$x \u003e -2$$.","answer":"$$g^{-1}(x) = \\frac{3 - 2x}{x - 5}$$, domain $$x \u003c 5$$.\n1. Set $$y = \\frac{5x + 3}{x + 2}$$ and rearrange for $$x$$: $$y(x + 2) = 5x + 3 \\implies x(y - 5) = 3 - 2y \\implies x = \\frac{3 - 2y}{y - 5}$$.\n2. Swap variables to get $$g^{-1}(x) = \\frac{3 - 2x}{x - 5}$$.\n3. Find the domain of $$g^{-1}$$ by finding the range of $$g$$: rewrite $$g(x) = 5 - \\frac{7}{x + 2}$$. Since $$x \u003e -2$$, $$g(x) \u003c 5$$, so the inverse domain is $$x \u003c 5$$."},{"question":"For the official WMA13/01 Oct 2025 question (2 M1 A1 marks, COMPLETED W/ PROMPTING), what is the exact value of the composite function $$fg(0)$$ given $$f(x) = \\ln(x^2 + 3)$$ and $$g(x) = \\frac{5x + 3}{x + 2}$$?","answer":"$$fg(0) = \\ln\\left(\\frac{21}{4}\\right)$$.\n1. Evaluate the inner function first: $$g(0) = \\frac{5(0) + 3}{0 + 2} = \\frac{3}{2}$$.\n2. Substitute this into $$f$$: $$f\\left(\\frac{3}{2}\\right) = \\ln\\left(\\left(\\frac{3}{2}\\right)^2 + 3\\right)$$.\n3. Simplify the argument: $$\\frac{9}{4} + 3 = \\frac{9}{4} + \\frac{12}{4} = \\frac{21}{4}$$.\n4. Final result: $$\\ln\\left(\\frac{21}{4}\\right)$$."},{"question":"For the official WMA13/01 Oct 2025 question (3 M1 dM1 A1 marks), solve $$g(e^{2a}) = f(\\sqrt{e^4 - 3})$$ for $$a$$, given $$f(x) = \\ln(x^2 + 3)$$ and $$g(x) = \\frac{5x + 3}{x + 2}$$. What is the lesson status of this question, which is DEFERRED / UNFINISHED?","answer":"Official reference only — not completed live. Status: DEFERRED / UNFINISHED.\n1. Evaluate the right side: $$f(\\sqrt{e^4 - 3}) = \\ln((\\sqrt{e^4 - 3})^2 + 3) = \\ln(e^4 - 3 + 3) = \\ln(e^4) = 4$$.\n2. Set the left side equal to $$4$$: $$\\frac{5e^{2a} + 3}{e^{2a} + 2} = 4$$.\n3. Solve for $$e^{2a}$$: $$5e^{2a} + 3 = 4e^{2a} + 8 \\implies e^{2a} = 5$$.\n4. Solve for $$a$$: $$2a = \\ln 5 \\implies a = \\frac{1}{2}\\ln 5$$.\n(Note: The student did not reach this live; it is OFFICIAL REFERENCE ONLY)."},{"question":"In a numerical methods lesson exercise (lesson evidence, no official marks), what two conditions must be explicitly stated to prove a root exists in the interval $$[3, 4]$$, and what calculator method is used for the iteration?","answer":"1. Condition 1: Evaluate the function at $$x = 3$$ and $$x = 4$$ to show a sign change.\n2. Condition 2: State that the function is continuous on $$[3, 4]$$ (a commonly missed requirement).\n3. Calculator method: Use ANS repetition (set ANS = $$3$$, then press $$= = =$$) until the value converges to $$3.1589$$.\nStatus: COMPLETED W/ PROMPTING."},{"question":"In a lesson exercise (lesson evidence, no official marks) for $$f(x) = \\frac{12}{x + 1}$$ with domain $$x \u003e 0$$, how are the fixed points of $$f$$ and $$f^{-1}$$ found, and why is one candidate rejected?","answer":"Fixed point $$x = 3$$ ($$x = -4$$ is rejected).\n1. Graphs of $$f$$ and $$f^{-1}$$ are reflections in $$y = x$$, so their intersections with each other lie on $$y = x$$.\n2. Solve $$f(x) = x \\implies \\frac{12}{x + 1} = x \\implies x^2 + x - 12 = 0$$.\n3. Factor to get $$(x - 3)(x + 4) = 0$$, giving candidates $$x = 3$$ and $$x = -4$$.\n4. Reject $$x = -4$$ because the domain is restricted to $$x \u003e 0$$."},{"question":"For the function $$f(x) = \\frac{12}{x + 1}$$ with domain $$x \u003e 0$$ (lesson evidence, no official marks), what is the domain of the inverse function $$f^{-1}(x)$$, and what general rule applies to domains and ranges?","answer":"Inverse domain: $$0 \u003c x \u003c 12$$.\n1. Find the range of $$f(x)$$ to determine the domain of $$f^{-1}(x)$$.\n2. As $$x \\to 0$$, $$f(x) \\to 12$$. As $$x \\to \\infty$$, $$f(x) \\to 0$$. Thus, the range of $$f$$ is $$0 \u003c y \u003c 12$$.\n3. Therefore, the domain of $$f^{-1}$$ is $$0 \u003c x \u003c 12$$.\n4. General rule: Range always uses $$y$$ (or $$f(x)$$), and domain always uses $$x$$."},{"question":"In a lesson exercise (lesson evidence, no official marks), prove that $$\\sin 3x = 3\\sin x - 4\\sin^3 x$$. What specific double-angle identity for $$\\cos 2x$$ should be chosen to complete the proof efficiently?","answer":"Choose $$\\cos 2x = 1 - 2\\sin^2 x$$.\n1. Write $$\\sin 3x = \\sin(2x + x) = \\sin 2x \\cos x + \\cos 2x \\sin x$$.\n2. Substitute $$\\sin 2x = 2\\sin x \\cos x$$ and $$\\cos 2x = 1 - 2\\sin^2 x$$.\n3. Expand: $$2\\sin x \\cos^2 x + (1 - 2\\sin^2 x)\\sin x$$.\n4. Use $$\\cos^2 x = 1 - \\sin^2 x$$ to get $$2\\sin x(1 - \\sin^2 x) + \\sin x - 2\\sin^3 x$$.\n5. Simplify: $$2\\sin x - 2\\sin^3 x + \\sin x - 2\\sin^3 x = 3\\sin x - 4\\sin^3 x$$."},{"question":"In a lesson exercise (lesson evidence, no official marks), the identity $$\\sin 3x = 3\\sin x - 4\\sin^3 x$$ is used to integrate $$\\sin^3 x$$. What is the required rearrangement of this identity, and what is the lesson status of this integral, which is DEFERRED / UNFINISHED?","answer":"Rearrangement: $$\\sin^3 x = \\frac{1}{4}(3\\sin x - \\sin 3x)$$. Status: DEFERRED / UNFINISHED.\n1. Make $$\\sin^3 x$$ the subject of $$\\sin 3x = 3\\sin x - 4\\sin^3 x$$.\n2. Rearrange to $$4\\sin^3 x = 3\\sin x - \\sin 3x$$, then divide by $$4$$.\n3. The integral is set up as $$\\int \\sin^3 x \\, dx = \\frac{1}{4} \\int (3\\sin x - \\sin 3x) \\, dx$$.\n4. Status: DEFERRED / UNFINISHED — the antiderivative bracket was left empty and no completed integral exists in the evidence."},{"question":"According to the P3 formula-book vs specification boundary (lesson evidence), which trigonometric identities are supplied in the booklet, and which must be memorized or derived?","answer":"1. Supplied in booklet: Compound-angle identities ($$\\sin(A \\pm B)$$, $$\\cos(A \\pm B)$$).\n2. Must be memorized/derived (not listed): Double-angle identities ($$\\sin 2A = 2\\sin A \\cos A$$ and the three forms of $$\\cos 2A$$).\n3. Fundamental identity: $$\\sin^2 x + \\cos^2 x = 1$$ is assumed knowledge."},{"question":"What common domain/range trap did the tutor highlight during the inverse function lesson exercises, and when was the missing inverse domain for $$g(x) = \\frac{5x + 3}{x + 2}$$ ($$x \u003e -2$$) finally corrected in the lesson?","answer":"1. Trap: Omitting the domain of the inverse function. The domain of $$f^{-1}$$ is the range of $$f$$.\n2. The missing domain for the inverse of $$g(x)$$ ($$x \u003c 5$$) was not fixed until much later in the lesson (at 00:39:43) while working on a reciprocal function question.\n3. The tutor flagged this as something \"everyone forgets in the exam\" and reinforced that range always uses $$y$$ and domain always uses $$x$$."}]},"minimax_1":{"label":"MiniMax M3 · Run 1","returned_model":"minimax/minimax-m3","cards":[{"question":"A lesson warm-up (not an official P3 paper; status COMPLETED W/ PROMPTING, paper unresolved) gives the curve $y = x^2 + ax + b$ meeting the line $y = x + 1$ at $x = 2$ and $x = 4$. Find $a$ and $b$ using simultaneous equations on $x^2+ax+b = x+1$, and state one copy-error trap to avoid.","answer":"1. At meeting points, set $x^2+ax+b = x+1$.\n2. Substitute $x=2$: $4+2a+b = 3 \\Rightarrow 2a+b = -1$.\n3. Substitute $x=4$: $16+4a+b = 5 \\Rightarrow 4a+b = -11$.\n4. Subtract: $2a = -10 \\Rightarrow a = -5$, then $b = 9$.\n5. Copy-error trap: mis-copying the quadratic (e.g. $2x^2$) or arithmetic ($4\\times1$ instead of $4+1$); substitute the same $x$ into both sides each time."},{"question":"Official WMA13/01 Oct 2025 Q1(a) (1 mark B1; COMPLETED W/ PROMPTING): given $f(x) = \\ln(x^2+3)$ with domain $x \\in \\mathbb{R}$, state the range of $f$. Why is the answer not $f(x) \\in \\mathbb{R}$?","answer":"1. Domain $x \\in \\mathbb{R}$ is given; the question asks for output values, not input.\n2. $x^2 \\ge 0 \\Rightarrow x^2+3 \\ge 3$.\n3. $\\ln$ is increasing, so the smallest output is $\\ln 3$.\n4. Range: $f(x) \\ge \\ln 3$.\n5. Writing $f(x) \\in \\mathbb{R}$ confuses range with domain; a sketch shaped like $e^x$ also signals this mix-up."},{"question":"Official WMA13/01 Oct 2025 Q1(b) (3 marks M1 A1 B1; COMPLETED W/ PROMPTING): for $g(x) = \\dfrac{5x+3}{x+2}$, $x \u003e -2$, find $g^{-1}(x)$ in $x$-notation and state its domain. Which mark is most often lost?","answer":"1. Let $y = \\dfrac{5x+3}{x+2}$, cross-multiply: $y(x+2) = 5x+3 \\Rightarrow x(y-5) = 3-2y$.\n2. Swap $y \\to x$: $g^{-1}(x) = \\dfrac{3-2x}{x-5}$.\n3. Find range of $g$ (it equals domain of $g^{-1}$): rewrite $g(x) = 5 - \\dfrac{7}{x+2}$ with $x \u003e -2$ gives $g(x) \u003c 5$.\n4. Domain of $g^{-1}$: $x \u003c 5$.\n5. Most-lost mark is the domain B1: forgetting the range/domain swap is the universal exam trap."},{"question":"Official WMA13/01 Oct 2025 Q1(c) (2 marks M1 A1; COMPLETED W/ PROMPTING): with $f(x) = \\ln(x^2+3)$ and $g(x) = \\dfrac{5x+3}{x+2}$, evaluate $fg(0)$. Show the inner value and the final simplified log.","answer":"1. Inner first: $g(0) = \\dfrac{5(0)+3}{0+2} = \\dfrac{3}{2}$.\n2. Outer: $fg(0) = f\\!\\left(\\tfrac{3}{2}\\right) = \\ln\\!\\left(\\left(\\tfrac{3}{2}\\right)^2 + 3\\right)$.\n3. Simplify inside: $\\tfrac{9}{4} + 3 = \\tfrac{9}{4} + \\tfrac{12}{4} = \\tfrac{21}{4}$.\n4. Result: $fg(0) = \\ln\\!\\left(\\dfrac{21}{4}\\right)$.\n5. Order matters: $g$ then $f$; the simplification step is where prompting was given."},{"question":"Official WMA13/01 Oct 2025 Q1(d) (3 marks M1 dM1 A1) — status DEFERRED / UNFINISHED in the lesson. Official reference only — not completed live. Prompt: find the exact $a$ such that $g(e^{2a}) = f(\\sqrt{e^4-3})$ with $g(x) = \\dfrac{5x+3}{x+2}$ and $f(x) = \\ln(x^2+3)$. State the official reference answer and the two lesson errors that prevented a live solve.","answer":"Official reference only — not completed live:\n1. Simplify $f(\\sqrt{e^4-3}) = \\ln((e^4-3)+3) = \\ln(e^4) = 4$.\n2. Set $g(e^{2a}) = 4$: $\\dfrac{5e^{2a}+3}{e^{2a}+2} = 4 \\Rightarrow 5e^{2a}+3 = 4e^{2a}+8 \\Rightarrow e^{2a} = 5$.\n3. Take $\\ln$: $2a = \\ln 5 \\Rightarrow a = \\tfrac{1}{2}\\ln 5$.\n4. Lesson error 1: writing the two expressions as directly equal instead of $g(\\cdot) = f(\\cdot)$.\n5. Lesson error 2: tangling $f(g(x))$ and $g^{-1}$ forms, then drifting to derivatives ($f'(x) = 2x/(x^2+1)$) — wrong material.\nStatus: DEFERRED / UNFINISHED."},{"question":"Lesson evidence NM1 — paper unresolved, no official marks (COMPLETED W/ PROMPTING). A function has a root in $[3,4]$. (i) State the two-part condition examiners require to justify a root in $[3,4]$. (ii) An iteration starting from $x_1 = 3$ produces $x_2 \\approx 3.1591$, then $x_3 \\approx 3.1589$. What value should be quoted to 4 d.p., and what calculator habit reproduces the iteration?","answer":"1. Two-part condition: (a) sign change across the endpoints, (b) continuity on $[3,4]$; only then does a root exist.\n2. Continuity is the mark \"everyone misses\" — it must be stated explicitly.\n3. Iterates converge to $\\alpha \\approx 3.1589$ (4 d.p.); show the first step, then quote subsequent values.\n4. Calculator habit: enter $x_1 = 3$, press = (= = =) using ANS so each step reuses the previous answer.\n5. No official formula, marks or paper wording are attached (paper unresolved)."},{"question":"Lesson evidence F2 — paper unresolved, no official marks (inverse + fixed-point discussion COMPLETED W/ PROMPTING, part (a) REVIEWED ONLY/skipped). Given $f(x) = \\dfrac{12}{x+1}$ with domain $x \u003e 0$ (asymptotes $x = -1$, $y = 0$; passes through $(0,12)$): (i) state the range of $f$ and the domain of $f^{-1}$; (ii) the fixed-point equation $f(x) = x$ gives candidates $x = 3$ and $x = -4$ — which is valid and why?","answer":"1. Inverses are reflections in $y = x$; where $f = f^{-1}$ the curves also meet $y = x$, so fixed points solve $f(x) = x$.\n2. Sketch: $x \u003e 0$ with horizontal asymptote $y = 0$ and $f(0) = 12$ gives range $0 \u003c y \u003c 12$.\n3. Therefore the domain of $f^{-1}$ is $0 \u003c x \u003c 12$ (range uses $y$; domain uses $x$).\n4. Candidates from $f(x) = x$ are $x = 3$ and $x = -4$.\n5. Reject $x = -4$: the original domain requires $x \u003e 0$. Valid fixed point: $x = 3$."},{"question":"Lesson evidence T1 — paper unresolved, no official marks (COMPLETED W/ PROMPTING). Prove $\\sin 3x = 3\\sin x - 4\\sin^3 x$ using $\\sin(2x+x)$, $\\sin 2x = 2\\sin x\\cos x$, $\\cos 2x = 1 - 2\\sin^2 x$, and $\\sin^2 x + \\cos^2 x = 1$. Which identity is supplied in the P3 formula booklet and which must be recalled?","answer":"1. Compound-angle $\\sin(A\\pm B)$ is supplied in the booklet; the double-angle forms are not listed and must be recalled.\n2. Expand: $\\sin 3x = \\sin(2x+x) = \\sin 2x \\cos x + \\cos 2x \\sin x$.\n3. Use $\\sin 2x = 2\\sin x \\cos x$ and choose $\\cos 2x = 1 - 2\\sin^2 x$ (the form that leaves only sines).\n4. $= 2\\sin x \\cos^2 x + (1 - 2\\sin^2 x)\\sin x = 2\\sin x(1 - \\sin^2 x) + \\sin x - 2\\sin^3 x$ (using $\\sin^2 x + \\cos^2 x = 1$).\n5. Simplify: $2\\sin x - 2\\sin^3 x + \\sin x - 2\\sin^3 x = 3\\sin x - 4\\sin^3 x$. $\\blacksquare$"},{"question":"Lesson evidence T2 — paper unresolved, no official marks, status DEFERRED / UNFINISHED. Using the T1 identity, state only the rearrangement the tutor introduced and the single structural suggestion given (taking a constant outside). Do NOT supply a completed antiderivative, integrand, limits, or invented source details.","answer":"1. From $\\sin 3x = 3\\sin x - 4\\sin^3 x$, rearrange to isolate $\\sin^3 x$: $\\sin^3 x = \\tfrac{1}{4}(3\\sin x - \\sin 3x)$.\n2. Tutor's structural suggestion: take the factor $\\tfrac{1}{4}$ outside the integral.\n3. The lesson released the student before any integration was performed; the antiderivative bracket was left empty on the whiteboard.\n4. No completed antiderivative, no integrand, no limits, and no source identity are supplied here.\nStatus: DEFERRED / UNFINISHED."},{"question":"Strategy check: across the P3 items in this guide, what is the single most common mark-losing trap the tutor repeatedly flagged, and which official parts did it directly affect?","answer":"1. Forgetting the domain/range swap on inverse-function questions.\n2. Directly affected: Q1(b) (B1 for domain $x \u003c 5$ — not added until 00:39:43, repaired while working on F2).\n3. Reinforced by F2: range uses $y$, domain uses $x$ — the inverse domain $0 \u003c x \u003c 12$ comes from the range $0 \u003c y \u003c 12$.\n4. Tutor's verdict: \"everyone forgets it in the exam.\"\n5. Generalise: whenever you find an inverse, immediately compute the range of the original to write the new domain."},{"question":"Strategy check: the P3 formula booklet supplies compound-angle identities but NOT the double-angle forms. In T1 the student lost a mark for missing the factor 2 in $\\sin 2A = 2\\sin A\\cos A$ and for not recalling all three forms of $\\cos 2A$. (i) Write the three forms of $\\cos 2A$. (ii) State which form was chosen in T1 and why.","answer":"1. (i) $\\cos 2A = \\cos^2 A - \\sin^2 A = 2\\cos^2 A - 1 = 1 - 2\\sin^2 A$.\n2. (ii) T1 uses $1 - 2\\sin^2 A$ because the T1 target contains only sines, so eliminating $\\cos^2 A$ via $\\sin^2 A + \\cos^2 A = 1$ keeps everything in $\\sin A$.\n3. If the $2\\cos^2 A - 1$ form had been used, a stray $\\cos^2 A$ would have to be converted, giving the same result but with extra steps.\n4. Double-angle identities are not in the booklet; flashcards/Anki recall is prescribed.\n5. Compound-angle $\\sin(A \\pm B)$ is supplied and need not be memorised."},{"question":"Status-safe boundary: which items in this guide may be cited as official WMA13/01 Oct 2025 with marks, which must stay as LESSON EVIDENCE — PAPER UNRESOLVED with no marks, and which carry DEFERRED / UNFINISHED status? List each item and its status.","answer":"1. Official WMA13/01 Oct 2025 with marks: Q1(a) 1 mark B1; Q1(b) 3 marks M1 A1 B1; Q1(c) 2 marks M1 A1; Q1(d) 3 marks M1 dM1 A1.\n2. Q1(d) additionally carries lesson status DEFERRED / UNFINISHED; its official answer $a = \\tfrac{1}{2}\\ln 5$ is reference only — not completed live.\n3. LESSON EVIDENCE — PAPER UNRESOLVED, no official marks: W0 warm-up, NM1, F2, T1.\n4. LESSON EVIDENCE — PAPER UNRESOLVED, no official marks, and DEFERRED / UNFINISHED: T2.\n5. Boundary rule: only Q1(a)–(d) may be attached to WMA13/01 wording and marks; all other items must remain lesson evidence with paper unresolved."}]},"minimax_2":{"label":"MiniMax M3 · Run 2","returned_model":"minimax/minimax-m3","cards":[{"question":"(W0 warm-up, lesson evidence, paper unresolved, no official marks) The curve $y = x^2 + ax + b$ meets the line $y = x + 1$ at $x = 2$ and $x = 4$. Find $a$ and $b$. State the common learner trap and the safe substitution check that prevents it.","answer":"1. At meeting points equate: $x^2 + ax + b = x + 1$.\n2. Substitute the SAME $x$ on both sides: at $x=2$: $4+2a+b = 3 \\Rightarrow 2a+b = -1$.\n3. At $x=4$: $16+4a+b = 5 \\Rightarrow 4a+b = -11$.\n4. Subtract: $2a = -10 \\Rightarrow a = -5$, then $b = 9$.\n5. Trap: mis-copying $x^2$ as $2x^2$, or writing $4\\times 1$ instead of $4+1$ when forming the right side. Always write the line value $x+1$ first, then substitute."},{"question":"(Q1(a) official WMA13/01 Oct 2025, 1 mark B1) Given $f(x) = \\ln(x^2+3)$, $x \\in \\mathbb{R}$, state the range of $f$. What range did the student first write, and why was it wrong?","answer":"1. Domain is already $x \\in \\mathbb{R}$ (given), so do NOT solve $x^2+3\u003e0$ — that is the domain, not the range.\n2. Since $x^2 \\ge 0$, $x^2+3 \\ge 3$, so the minimum output is $\\ln 3$.\n3. Range: $f(x) \\ge \\ln 3$.\n4. Wrong first attempt: $f(x) \\in \\mathbb{R}$ (treated domain as range and sketched an $e^x$ curve). Range = set of OUTPUTS, not inputs."},{"question":"(Q1(b) official WMA13/01 Oct 2025, 3 marks M1 A1 B1) For $g(x) = \\dfrac{5x+3}{x+2}$, $x \u003e -2$, find $g^{-1}(x)$ and state its domain. State the universal trap the tutor flagged.","answer":"1. Let $y = \\dfrac{5x+3}{x+2}$, then $y(x+2) = 5x+3 \\Rightarrow x(y-5) = 3-2y \\Rightarrow x = \\dfrac{3-2y}{y-5}$.\n2. Swap to $x$-notation: $g^{-1}(x) = \\dfrac{3-2x}{x-5}$.\n3. Inverse domain = range of $g$. Write $g(x) = 5 - \\dfrac{7}{x+2}$; with $x\u003e-2$, the fraction is positive so $g(x) \u003c 5$.\n4. Domain: $x \u003c 5$.\n5. Universal trap: omitting the domain of the inverse entirely — the tutor said \"everyone forgets this in the exam.\""},{"question":"(Q1(c) official WMA13/01 Oct 2025, 2 marks M1 A1) With $f(x) = \\ln(x^2+3)$ and $g(x) = \\dfrac{5x+3}{x+2}$, find $fg(0)$. Show the working inside the ln.","answer":"1. Inner first: $g(0) = \\dfrac{5(0)+3}{0+2} = \\dfrac{3}{2}$.\n2. Then $fg(0) = f\\!\\left(\\tfrac{3}{2}\\right) = \\ln\\!\\left(\\left(\\tfrac{3}{2}\\right)^2 + 3\\right) = \\ln\\!\\left(\\tfrac{9}{4} + 3\\right) = \\ln\\!\\left(\\tfrac{21}{4}\\right)$.\n3. Lesson note: this part was inserted out of order (tutor had skipped it), so always work parts in the printed order first."},{"question":"(Q1(d) official WMA13/01 Oct 2025, 3 marks M1 dM1 A1) — status DEFERRED / UNFINISHED in the lesson. The official answer $a = \\tfrac{1}{2}\\ln 5$ is OFFICIAL REFERENCE ONLY — not completed live. Given $g(e^{2a}) = f(\\sqrt{e^4-3})$ with $f(x)=\\ln(x^2+3)$ and $g(x)=\\dfrac{5x+3}{x+2}$, show the clean official derivation. What live error blocked the student?","answer":"1. Simplify the right side: $f(\\sqrt{e^4-3}) = \\ln\\!\\left((\\sqrt{e^4-3})^2+3\\right) = \\ln(e^4) = 4$.\n2. Set left side equal: $\\dfrac{5e^{2a}+3}{e^{2a}+2} = 4 \\Rightarrow 5e^{2a}+3 = 4e^{2a}+8 \\Rightarrow e^{2a} = 5$.\n3. Hence $2a = \\ln 5 \\Rightarrow a = \\tfrac{1}{2}\\ln 5$. (Official reference only — not completed live.)\n4. Live error: student treated the two expressions as directly equal instead of $g(\\cdot) = f(\\cdot)$, then tangled a different composition $f(g(x))$ and $g^{-1}(\\sqrt{x^2-3})$.\n5. Status DEFERRED / UNFINISHED — to be revisited; do not record as completed."},{"question":"(NM1 lesson evidence, paper unresolved, no official marks) For a function with a root in $[3,4]$, give the full examiner conclusion that earns the mark, and describe the iteration that converges to $\\alpha \\approx 3.1589$ starting from $x_1 = 3$ without writing an invented formula.","answer":"1. Evaluate at the endpoints and observe a sign change between $x=3$ and $x=4$.\n2. State explicitly that the function is continuous on $[3,4]$ — \"the thing everyone misses, and it loses them the mark.\"\n3. Conclude: therefore a root $\\alpha$ exists in the interval.\n4. For the iteration: show the working for the first step ($x_2 \\approx 3.1591$), then quote subsequent values; on the calculator use ANS repetition (enter 3, then press $=$ repeatedly) until the value repeats at $3.1589$ (4 d.p.).\n5. No official iteration formula is given here because the source paper is unresolved."},{"question":"(F2 lesson evidence, paper unresolved, no official marks) For $f(x) = \\dfrac{12}{x+1}$ with domain $x \u003e 0$: (i) give the range, (ii) give the domain of $f^{-1}$, (iii) state the fixed-point equation, and (iv) the candidates $x=3$ and $x=-4$ — which is accepted and why?","answer":"1. Vertical asymptote $x=-1$, horizontal asymptote $y=0$, passes through $(0,12)$; range (and hence inverse domain) is $0 \u003c x \u003c 12$.\n2. Rule: range uses $y$, domain uses $x$.\n3. Inverse graph is the reflection of $f$ in $y=x$. Fixed points occur where $f(x)=f^{-1}(x)$, equivalently $f(x)=x$: $\\dfrac{12}{x+1}=x \\Rightarrow x^2+x-12=0 \\Rightarrow (x+4)(x-3)=0$.\n4. Candidates $x=3$ and $x=-4$. Reject $x=-4$ because the domain requires $x\u003e0$.\n5. Accept $x=3$; always label the rejection with a reason for the examiner."},{"question":"(T1 lesson evidence, paper unresolved, no official marks) Prove $\\sin 3x = 3\\sin x - 4\\sin^3 x$ using only $\\sin(2x+x)$, $\\sin 2x = 2\\sin x\\cos x$, $\\cos 2x = 1-2\\sin^2 x$, and $\\sin^2 x + \\cos^2 x = 1$. Identify the form of $\\cos 2x$ you must pick and the mistake the student first made.","answer":"1. Open: $\\sin 3x = \\sin(2x+x) = \\sin 2x \\cos x + \\cos 2x \\sin x$.\n2. Substitute: $= (2\\sin x\\cos x)\\cos x + (1-2\\sin^2 x)\\sin x = 2\\sin x\\cos^2 x + \\sin x - 2\\sin^3 x$.\n3. Replace $\\cos^2 x = 1-\\sin^2 x$: $= 2\\sin x(1-\\sin^2 x) + \\sin x - 2\\sin^3 x = 3\\sin x - 4\\sin^3 x$.\n4. Must pick $\\cos 2x = 1-2\\sin^2 x$ to avoid leaving $\\cos x$ in the final answer.\n5. Student errors: dropped the factor 2 in $\\sin 2x = 2\\sin x\\cos x$, and did not recall all three forms of $\\cos 2x$."},{"question":"(T1 follow-up, lesson evidence, paper unresolved) From T1, make $\\sin^3 x$ the subject. Write the rearrangement exactly as set up in the lesson, and give the one-step integration hint the tutor suggested without performing the integral.","answer":"1. From $\\sin 3x = 3\\sin x - 4\\sin^3 x$, isolate: $4\\sin^3 x = 3\\sin x - \\sin 3x$, so $\\sin^3 x = \\tfrac{1}{4}(3\\sin x - \\sin 3x)$.\n2. Tutor's integration hint: take the factor $\\tfrac{1}{4}$ outside the integral before integrating — do not distribute it through the bracket.\n3. The \"hence\" signal means reuse the T1 result directly; do not re-prove the identity."},{"question":"(Q1(b) trap + F2 connection, lesson evidence for F2, official WMA13/01 for Q1(b)) State the one rule the tutor used to repair the missing Q1(b) inverse domain while working on F2, and apply it to verify the inverse domain of $g(x) = \\dfrac{5x+3}{x+2}$, $x\u003e-2$.","answer":"1. Rule: domain of $f^{-1}$ = range of $f$; range of $f^{-1}$ = domain of $f$. Range uses $y$, domain uses $x$.\n2. Apply to $g$: write $g(x) = 5 - \\dfrac{7}{x+2}$. With $x\u003e-2$, $\\dfrac{7}{x+2}\u003e0$, so $g(x) \u003c 5$.\n3. Range of $g$ is $y\u003c5$, therefore inverse domain is $x\u003c5$.\n4. This is the same rule used for F2 to get the inverse domain $0\u003cx\u003c12$ for $f(x)=\\dfrac{12}{x+1}$, $x\u003e0$."},{"question":"(W0 + Q1(a) conceptual link) Why does solving $x^2+3\u003e0$ NOT answer Q1(a), and what is the correct one-line inequality chain from $x^2 \\ge 0$ to the range of $f(x)=\\ln(x^2+3)$?","answer":"1. Solving $x^2+3\u003e0$ determines where $f$ is defined — that is the domain, not the range. The domain is already given as $x \\in \\mathbb{R}$.\n2. The range is the set of OUTPUTS. Since $x^2 \\ge 0$ for all real $x$, add 3: $x^2+3 \\ge 3$.\n3. Apply the increasing function $\\ln$: $f(x) = \\ln(x^2+3) \\ge \\ln 3$.\n4. Range: $f(x) \\ge \\ln 3$. This is why \"range = outputs\" is the check that prevents the common $f(x) \\in \\mathbb{R}$ error."},{"question":"(T2 lesson evidence, paper unresolved, status DEFERRED / UNFINISHED) What does the lesson actually record about T2, and what are you explicitly NOT allowed to reconstruct?","answer":"1. Status: DEFERRED / UNFINISHED — started only; the tutor asked the student to carry out the integration but released them before any antiderivative was produced.\n2. What is on record: from the T1 identity, $\\sin^3 x = \\tfrac{1}{4}(3\\sin x - \\sin 3x)$, and the tutor's suggestion to take the factor $\\tfrac{1}{4}$ outside the integral.\n3. Video at lesson end (≈55:00) shows the setup $\\int \\sin^3 x\\,dx = \\tfrac{1}{4}\\int(\\sin 3x + 3\\sin x)\\,dx = \\tfrac{1}{4}[\\,]$ with the antiderivative bracket empty.\n4. NOT allowed: the exact integrand, the limits, the completed antiderivative, or any invented source/marks — the exact paper is unresolved and no completed integral is supplied."}]},"deepseek_1":{"label":"DeepSeek V4 Pro","returned_model":"deepseek/deepseek-v4-pro","cards":[{"question":"Given the curve \\(y=x^{2}+ax+b\\) and the line \\(y=x+1\\) intersect when \\(x=2\\) and \\(x=4\\), find the values of \\(a\\) and \\(b\\).","answer":"1. Equate the \\(y\\)-values: \\(x^{2}+ax+b = x+1\\).  \n2. Substitute \\(x=2\\): \\(4+2a+b = 3 \\Rightarrow 2a+b = -1\\).  \n3. Substitute \\(x=4\\): \\(16+4a+b = 5 \\Rightarrow 4a+b = -11\\).  \n4. Subtract the first equation from the second: \\((4a+b)-(2a+b) = -11-(-1) \\Rightarrow 2a = -10 \\Rightarrow a = -5\\).  \n5. Substitute \\(a=-5\\) into \\(2a+b=-1\\): \\(-10+b=-1 \\Rightarrow b=9\\).  \n(Status: LESSON EVIDENCE — PAPER UNRESOLVED; COMPLETED W/ PROMPTING)"},{"question":"For \\(f(x)=\\ln(x^{2}+3)\\) with domain \\(x \\in \\mathbb{R}\\), what is the range of \\(f\\)?","answer":"Since \\(x^{2} \\ge 0\\) for all real \\(x\\), the minimum value of \\(x^{2}+3\\) is \\(3\\). Because \\(\\ln\\) is an increasing function, the smallest output is \\(\\ln 3\\). As \\(x \\to \\pm\\infty\\), \\(x^{2}+3 \\to \\infty\\) so \\(\\ln(x^{2}+3) \\to \\infty\\). Therefore the range is \\(f(x) \\ge \\ln 3\\).  \n(OFFICIAL WMA13/01 OCT 2025, B1; COMPLETED W/ PROMPTING)"},{"question":"For \\(g(x) = \\frac{5x+3}{x+2}\\) with domain \\(x \u003e -2\\), find the inverse function \\(g^{-1}(x)\\) and state its domain.","answer":"1. Write \\(y = \\frac{5x+3}{x+2}\\).  \n2. Multiply by \\((x+2)\\): \\(y(x+2) = 5x+3\\).  \n3. Expand and collect \\(x\\) terms: \\(yx + 2y = 5x + 3 \\Rightarrow yx - 5x = 3 - 2y \\Rightarrow x(y-5) = 3-2y\\).  \n4. Solve for \\(x\\): \\(x = \\frac{3-2y}{y-5}\\).  \n5. Swap variables: \\(g^{-1}(x) = \\frac{3-2x}{x-5}\\).  \n6. Domain of \\(g^{-1}\\) is the range of \\(g\\). Rewrite \\(g(x) = 5 - \\frac{7}{x+2}\\). Since \\(x\u003e-2\\), \\(x+2\u003e0\\) so \\(\\frac{7}{x+2}\u003e0\\). Thus \\(g(x) \u003c 5\\). Also as \\(x\\to\\infty\\), \\(g(x)\\to 5\\) from below, and as \\(x\\to -2^{+}\\), \\(g(x)\\to -\\infty\\). Hence the range of \\(g\\) is \\(g(x)\u003c5\\), so the domain of \\(g^{-1}\\) is \\(x\u003c5\\).  \n(OFFICIAL WMA13/01 OCT 2025, M1 A1 B1; COMPLETED W/ PROMPTING)"},{"question":"For \\(f(x)=\\ln(x^{2}+3)\\) and \\(g(x)=\\frac{5x+3}{x+2}\\) with \\(x\u003e-2\\), find the exact value of \\(fg(0)\\).","answer":"1. First find \\(g(0)\\): \\(g(0) = \\frac{5(0)+3}{0+2} = \\frac{3}{2}\\).  \n2. Then evaluate \\(f\\) at \\(\\frac{3}{2}\\): \\(f\\left(\\frac{3}{2}\\right) = \\ln\\left(\\left(\\frac{3}{2}\\right)^{2} + 3\\right) = \\ln\\left(\\frac{9}{4} + 3\\right) = \\ln\\left(\\frac{9}{4} + \\frac{12}{4}\\right) = \\ln\\left(\\frac{21}{4}\\right)\\).  \n(OFFICIAL WMA13/01 OCT 2025, M1 A1; COMPLETED W/ PROMPTING)"},{"question":"(DEFERRED / UNFINISHED) For \\(g(x)=\\frac{5x+3}{x+2}\\) and \\(f(x)=\\ln(x^{2}+3)\\), the equation \\(g(e^{2a}) = f(\\sqrt{e^{4}-3})\\) is to be solved for \\(a\\). The official reference answer is \\(a = \\frac{1}{2}\\ln 5\\). What is the first step in evaluating the right-hand side?","answer":"(DEFERRED / UNFINISHED; Official reference only — not completed live) Official reference: \\(f(\\sqrt{e^{4}-3}) = \\ln((\\sqrt{e^{4}-3})^{2}+3) = \\ln(e^{4}-3+3) = \\ln(e^{4}) = 4\\). The full solution is deferred.  \n(OFFICIAL WMA13/01 OCT 2025, M1 dM1 A1; DEFERRED / UNFINISHED)"},{"question":"To prove that a continuous function \\(h(x)\\) has a root in the interval \\([3,4]\\), what two conditions must be checked and stated?","answer":"1. Evaluate \\(h(3)\\) and \\(h(4)\\) and show that there is a sign change (one is positive, the other negative).  \n2. State that the function is continuous on the closed interval \\([3,4]\\).  \nIf both hold, then by the Intermediate Value Theorem there exists at least one root in \\([3,4]\\). Missing the continuity statement is a common reason for losing the mark.  \n(LESSON EVIDENCE — PAPER UNRESOLVED; COMPLETED W/ PROMPTING)"},{"question":"An iterative formula converges to a root near \\(3.1589\\) starting from \\(x_{1}=3\\). On a calculator, what is the efficient way to generate the sequence of approximations without retyping the formula?","answer":"1. Type the starting value \\(3\\) and press `=`.  \n2. Type the iteration formula using `ANS` in place of \\(x_n\\).  \n3. Press `=` repeatedly. Each press replaces `ANS` with the previous output, generating \\(x_2, x_3, \\dots\\).  \n4. Stop when the display value stabilises (stops changing at the required decimal places). For this problem, the sequence converges to \\(\\approx 3.1589\\) (to 4 d.p.).  \n(LESSON EVIDENCE — PAPER UNRESOLVED; COMPLETED W/ PROMPTING)"},{"question":"For a function \\(f(x)=\\frac{12}{x+1}\\) with domain \\(x\u003e0\\), its graph and the graph of \\(f^{-1}\\) are drawn. What geometric relationship must they have, and how does this help solve \\(f(x)=f^{-1}(x)\\)?","answer":"1. The graph of \\(f^{-1}\\) is the reflection of the graph of \\(f\\) in the line \\(y=x\\).  \n2. Points where \\(f(x)=f^{-1}(x)\\) lie on both graphs, so they must also lie on the line of symmetry \\(y=x\\).  \n3. Therefore, the equation \\(f(x)=f^{-1}(x)\\) can be replaced by the simpler equation \\(f(x)=x\\) (provided solutions are checked against the domain).  \n(LESSON EVIDENCE — PAPER UNRESOLVED; COMPLETED W/ PROMPTING)"},{"question":"Solving \\(f(x)=x\\) for \\(f(x)=\\frac{12}{x+1}\\) with \\(x\u003e0\\) gives the fixed-point candidates \\(x=3\\) and \\(x=-4\\). Why is \\(x=-4\\) rejected, and what is the final solution?","answer":"The original domain of \\(f\\) is \\(x\u003e0\\). Since \\(x=-4\\) is not in the domain, it is not a valid input and must be rejected with a stated reason. The only valid solution is \\(x=3\\).  \n(LESSON EVIDENCE — PAPER UNRESOLVED; COMPLETED W/ PROMPTING)"},{"question":"For \\(f(x)=\\frac{12}{x+1}\\) with domain \\(x\u003e0\\), find the domain of the inverse function \\(f^{-1}\\).","answer":"1. The domain of \\(f^{-1}\\) is the range of \\(f\\).  \n2. For \\(x\u003e0\\), \\(x+1\u003e1\\) so \\(0 \u003c \\frac{12}{x+1} \u003c 12\\). The horizontal asymptote is \\(y=0\\) and \\(f(0)=12\\).  \n3. Hence the range of \\(f\\) is \\(0 \u003c y \u003c 12\\).  \n4. Therefore the domain of \\(f^{-1}\\) is \\(0 \u003c x \u003c 12\\).  \n(Remember: range uses \\(y\\), domain uses \\(x\\).)  \n(LESSON EVIDENCE — PAPER UNRESOLVED; COMPLETED W/ PROMPTING)"},{"question":"Prove the identity \\(\\sin 3x = 3\\sin x - 4\\sin^{3}x\\).","answer":"1. Write \\(3x = 2x + x\\) and apply the compound-angle formula: \\(\\sin(2x+x) = \\sin 2x \\cos x + \\cos 2x \\sin x\\).  \n2. Use double-angle identities: \\(\\sin 2x = 2\\sin x \\cos x\\) and choose the form \\(\\cos 2x = 1 - 2\\sin^{2}x\\) to keep everything in terms of \\(\\sin x\\).  \n3. Substitute: \\(\\sin 3x = (2\\sin x \\cos x)\\cos x + (1-2\\sin^{2}x)\\sin x = 2\\sin x \\cos^{2}x + \\sin x - 2\\sin^{3}x\\).  \n4. Replace \\(\\cos^{2}x\\) with \\(1-\\sin^{2}x\\): \\(2\\sin x(1-\\sin^{2}x) + \\sin x - 2\\sin^{3}x\\).  \n5. Expand and simplify: \\(2\\sin x - 2\\sin^{3}x + \\sin x - 2\\sin^{3}x = 3\\sin x - 4\\sin^{3}x\\).  \n(LESSON EVIDENCE — PAPER UNRESOLVED; COMPLETED W/ PROMPTING)"},{"question":"(DEFERRED / UNFINISHED) A \"hence\" question requires integrating \\(\\sin^{3}x\\) using the identity \\(\\sin 3x = 3\\sin x - 4\\sin^{3}x\\). What rearrangement of the identity is needed before integrating?","answer":"(DEFERRED / UNFINISHED) Rearrange to make \\(\\sin^{3}x\\) the subject: \\(4\\sin^{3}x = 3\\sin x - \\sin 3x \\Rightarrow \\sin^{3}x = \\frac{1}{4}(3\\sin x - \\sin 3x)\\). The factor \\(\\frac{1}{4}\\) can be taken outside the integral. The complete antiderivative was not finished in the lesson and is not supplied.  \n(LESSON EVIDENCE — PAPER UNRESOLVED; DEFERRED / UNFINISHED)"}]},"kimi_1":{"label":"Kimi K3","returned_model":"moonshotai/kimi-k3","cards":[{"question":"Lesson evidence — paper unresolved, no official marks; status COMPLETED W/ PROMPTING. The curve $$y = x^2 + ax + b$$ meets the line $$y = x + 1$$ when $$x = 2$$ and $$x = 4$$. Find $$a$$ and $$b$$, and name the error type that must be avoided under time pressure.","answer":"1. At meeting points the $$y$$-values are equal: $$x^2 + ax + b = x + 1$$.\n2. Substitute $$x = 2$$: $$4 + 2a + b = 3 \\Rightarrow 2a + b = -1$$.\n3. Substitute $$x = 4$$: $$16 + 4a + b = 5 \\Rightarrow 4a + b = -11$$.\n4. Subtract: $$2a = -10 \\Rightarrow a = -5$$, then $$b = 9$$.\n5. Trap: copy every term exactly — the live attempt mis-copied $$x^2$$ as $$2x^2$$ and wrote $$4 \\times 1$$ where $$4 + 1$$ was meant; substitute the same $$x$$ on both sides."},{"question":"Official WMA13/01 Oct 2025, 1 mark (B1); status COMPLETED W/ PROMPTING. Given $$f(x) = \\ln(x^2 + 3)$$, $$x \\in \\mathbb{R}$$, state the range of $$f$$, and explain why working from $$x^2 + 3 \u003e 0$$ and answering $$f(x) \\in \\mathbb{R}$$ is wrong.","answer":"1. The domain $$x \\in \\mathbb{R}$$ is already given; the question asks for the range — the output values — so solving $$x^2 + 3 \u003e 0$$ answers the wrong question.\n2. Since $$x^2 \\geq 0$$, the smallest value of $$x^2 + 3$$ is $$3$$.\n3. $$\\ln$$ is increasing, so the smallest output is $$\\ln 3$$.\n4. Range: $$f(x) \\geq \\ln 3$$.\n5. Trap: do not sketch an $$e^x$$-type curve for an $$\\ln$$ function."},{"question":"Official WMA13/01 Oct 2025, 3 marks (M1 A1 B1); status COMPLETED W/ PROMPTING. Given $$g(x) = \\dfrac{5x + 3}{x + 2}$$, $$x \u003e -2$$, find $$g^{-1}(x)$$ and state the domain of $$g^{-1}$$, identifying the mark most often forgotten.","answer":"1. Set $$y = \\dfrac{5x + 3}{x + 2}$$, then $$y(x + 2) = 5x + 3$$.\n2. Collect $$x$$: $$x(y - 5) = 3 - 2y$$, so $$x = \\dfrac{3 - 2y}{y - 5}$$.\n3. Swap to $$x$$-notation at the end: $$g^{-1}(x) = \\dfrac{3 - 2x}{x - 5}$$ — never leave the answer in terms of $$y$$.\n4. Domain of $$g^{-1}$$ = range of $$g$$: write $$g(x) = 5 - \\dfrac{7}{x + 2}$$; for $$x \u003e -2$$, $$\\dfrac{7}{x + 2} \u003e 0$$, so $$g(x) \u003c 5$$, giving inverse domain $$x \u003c 5$$.\n5. Trap: stating the inverse domain is the B1 mark \"everyone forgets in the exam\"."},{"question":"Official WMA13/01 Oct 2025, 2 marks (M1 A1); status COMPLETED W/ PROMPTING. Given $$f(x) = \\ln(x^2 + 3)$$, $$x \\in \\mathbb{R}$$, and $$g(x) = \\dfrac{5x + 3}{x + 2}$$, $$x \u003e -2$$, find $$fg(0)$$.","answer":"1. Work inside-out — apply $$g$$ first: $$g(0) = \\dfrac{5(0) + 3}{0 + 2} = \\dfrac{3}{2}$$.\n2. Then $$fg(0) = f\\left(\\dfrac{3}{2}\\right) = \\ln\\left(\\left(\\dfrac{3}{2}\\right)^2 + 3\\right) = \\ln\\left(\\dfrac{9}{4} + 3\\right)$$.\n3. Simplify inside the bracket: $$fg(0) = \\ln\\dfrac{21}{4}$$."},{"question":"Official WMA13/01 Oct 2025, 3 marks (M1 dM1 A1); lesson status DEFERRED / UNFINISHED. Given $$f(x) = \\ln(x^2 + 3)$$ and $$g(x) = \\dfrac{5x + 3}{x + 2}$$, find the exact value of $$a$$ for which $$g\\left(e^{2a}\\right) = f\\left(\\sqrt{e^4 - 3}\\right)$$. State the official mark-scheme result and the opening error that must be avoided.","answer":"1. Simplify the right side first: $$f\\left(\\sqrt{e^4 - 3}\\right) = \\ln\\left(e^4 - 3 + 3\\right) = \\ln e^4 = 4$$.\n2. Then $$\\dfrac{5e^{2a} + 3}{e^{2a} + 2} = 4 \\Rightarrow 5e^{2a} + 3 = 4e^{2a} + 8 \\Rightarrow e^{2a} = 5$$.\n3. $$a = \\dfrac{1}{2}\\ln 5$$ — Official reference only — not completed live (OFFICIAL REFERENCE ONLY from the mark scheme).\n4. Error to avoid: do not treat the two expressions as directly equal — it is \"$$g$$ of this equals $$f$$ of this\"; mishandling the composition tangled the live attempt, which was abandoned. Status: DEFERRED / UNFINISHED — to be revisited; never claim it was completed live."},{"question":"Lesson evidence — paper unresolved, no official marks; status COMPLETED W/ PROMPTING. A function is to be shown to have a root $$\\alpha$$ in the interval $$[3, 4]$$. State the complete two-part conclusion examiners require for a sign-change proof, and name the element that is most often missed.","answer":"1. Evaluate the function at each endpoint and observe a sign change between $$x = 3$$ and $$x = 4$$.\n2. State explicitly that the function is continuous on $$[3, 4]$$ — \"the thing that everyone misses, and it loses them the mark\".\n3. Conclude in words: therefore there exists a root $$\\alpha$$ in the interval $$[3, 4]$$.\n4. A sign change alone is insufficient — continuity plus sign change together justify the conclusion."},{"question":"Lesson evidence — paper unresolved, no official marks, and the iteration formula itself is unresolved in the source; status COMPLETED W/ PROMPTING. An iteration starting from $$x_1 = 3$$ is used to find a root to 4 decimal places. Describe the required written and calculator technique, and state the converged value recorded.","answer":"1. In the write-up, show the full working for the first iteration step, then quote the subsequent values.\n2. On the calculator use ANS repetition: set ANS $$= 3$$, then press $$=$$ repeatedly until the displayed value stops changing.\n3. Recorded values: $$x_2 \\approx 3.1591$$, then convergence to $$\\alpha \\approx 3.1589$$ (4 d.p.).\n4. Do not invent or reconstruct an iteration formula — the exact formula is unresolved in the evidence."},{"question":"Lesson evidence — paper unresolved, no official marks; status COMPLETED W/ PROMPTING (an easy introductory sketch sub-part was REVIEWED ONLY / skipped). For $$f(x) = \\dfrac{12}{x + 1}$$, $$x \u003e 0$$, explain how the reflection property of an inverse turns solving $$f(x) = f^{-1}(x)$$ into a simpler equation, give the candidate solutions, and state which is rejected and why.","answer":"1. A function and its inverse are reflections in the line $$y = x$$; where $$f = f^{-1}$$, the curves also meet $$y = x$$, so solve $$f(x) = x$$ instead.\n2. $$\\dfrac{12}{x + 1} = x \\Rightarrow x^2 + x - 12 = 0$$, giving candidates $$x = 3$$ and $$x = -4$$.\n3. Reject $$x = -4$$ because the domain requires $$x \u003e 0$$ — label the rejection with its reason.\n4. State the final solution clearly for the examiner: $$x = 3$$."},{"question":"Lesson evidence — paper unresolved, no official marks; status COMPLETED W/ PROMPTING. The function $$f(x) = \\dfrac{12}{x + 1}$$ has domain $$x \u003e 0$$, with asymptotes $$x = -1$$ and $$y = 0$$ and $$f(0) = 12$$. State the range of $$f$$, the domain of $$f^{-1}$$, and the general labelling rule this reinforces.","answer":"1. For $$x \u003e 0$$: $$x + 1 \u003e 1$$, so $$0 \u003c \\dfrac{12}{x + 1} \u003c 12$$; the range is $$0 \u003c y \u003c 12$$.\n2. The domain of $$f^{-1}$$ equals the range of $$f$$, so the inverse domain is $$0 \u003c x \u003c 12$$.\n3. Rule reinforced: range always uses $$y$$; domain always uses $$x$$."},{"question":"Lesson evidence — paper unresolved, no official marks; status COMPLETED W/ PROMPTING. Prove that $$\\sin 3x = 3\\sin x - 4\\sin^3 x$$, giving the opening step, the correct choice of $$\\cos 2x$$ form, and the reason for that choice.","answer":"1. Open with the compound-angle identity on $$3x = 2x + x$$: $$\\sin 3x = \\sin 2x \\cos x + \\cos 2x \\sin x$$.\n2. Use $$\\sin 2x = 2\\sin x \\cos x$$ (do not drop the factor 2) and choose $$\\cos 2x = 1 - 2\\sin^2 x$$ so that only sines remain.\n3. $$\\sin 3x = 2\\sin x \\cos^2 x + (1 - 2\\sin^2 x)\\sin x$$.\n4. Replace $$\\cos^2 x = 1 - \\sin^2 x$$: $$2\\sin x(1 - \\sin^2 x) + \\sin x - 2\\sin^3 x = 3\\sin x - 4\\sin^3 x$$, as required.\n5. Notational caution: shorthand $$S, C$$ for $$\\sin x, \\cos x$$ is only safe once no $$2x$$ remains to confuse with $$x$$."},{"question":"Lesson evidence — paper unresolved, no official marks; recall of these identities was prescribed as spaced-repetition flashcard work. State $$\\sin 2A$$ in terms of $$\\sin A$$ and $$\\cos A$$, all three forms of $$\\cos 2A$$, the form to pick when a result must contain only sines, and the formula-book status of these identities.","answer":"1. $$\\sin 2A = 2\\sin A \\cos A$$ — the coefficient 2 is commonly missed.\n2. $$\\cos 2A = \\cos^2 A - \\sin^2 A = 2\\cos^2 A - 1 = 1 - 2\\sin^2 A$$ — all three forms should be recallable.\n3. For a sines-only target, pick $$\\cos 2A = 1 - 2\\sin^2 A$$; finish with $$\\sin^2 x + \\cos^2 x = 1$$ where needed.\n4. Boundary: compound-angle identities are supplied in the formula booklet; the double-angle forms are not listed — they are derivable P3 content that must be recalled."},{"question":"Lesson evidence — paper unresolved, no official marks; status DEFERRED / UNFINISHED. A \"hence\" part follows the proof of $$\\sin 3x = 3\\sin x - 4\\sin^3 x$$ and requires rewriting $$\\sin^3 x$$ before integrating. What does the word \"hence\" signal, what rearrangement and first move were actually made, and what must not be claimed about this item?","answer":"1. \"Hence\" signals reuse of the result just proved — the identity stated in the question.\n2. Make $$\\sin^3 x$$ the subject: $$\\sin^3 x = \\dfrac{1}{4}\\left(3\\sin x - \\sin 3x\\right)$$.\n3. Suggested first move: take the factor $$\\dfrac{1}{4}$$ outside before integrating.\n4. Status DEFERRED / UNFINISHED: the exact integrand, limits and any completed antiderivative are unavailable — the work stopped with an empty bracket, so no completed integral may be reconstructed, supplied, or claimed as done."}]}},ROLES=Object.keys(DATA);let active=ROLES[0],selected={};for(const r of ROLES)selected[r]=new Set(DATA[r].cards.map((_,i)=>i));
function typeset(){const x=document.getElementById('list');if(window.MathJax&&MathJax.typesetPromise){if(MathJax.typesetClear)MathJax.typesetClear([x]);MathJax.typesetPromise([x]).catch(()=>{})}}
function tabs(){const t=document.getElementById('tabs');t.replaceChildren();for(const r of ROLES){const b=document.createElement('button');b.className='tab'+(r===active?' active':'');b.textContent=DATA[r].label+' ('+DATA[r].cards.length+')';b.onclick=()=>{active=r;tabs();render()};t.append(b)}}
function render(){const l=document.getElementById('list');l.replaceChildren();DATA[active].cards.forEach((c,i)=>{const article=document.createElement('article');article.className='card';const row=document.createElement('div');row.className='row';const pick=document.createElement('input');pick.className='pick';pick.type='checkbox';pick.checked=selected[active].has(i);pick.setAttribute('aria-label',`Select card ${i+1}`);const qw=document.createElement('div');qw.className='qwrap';const q=document.createElement('div');q.className='q';q.tabIndex=0;q.textContent=c.question;const ans=document.createElement('div');ans.className='answer';const txt=document.createElement('div');txt.textContent=c.answer;const foot=document.createElement('div');foot.className='foot';const cp=document.createElement('button');cp.className='copy';cp.textContent='Copy';cp.onclick=()=>copyText(c.question+'\t'+c.answer);foot.append(cp);ans.append(txt,foot);qw.append(q,ans);row.append(pick,qw);article.append(row);l.append(article);pick.onchange=()=>{pick.checked?selected[active].add(i):selected[active].delete(i);count()};const toggle=()=>{article.classList.toggle('open');typeset()};q.onclick=toggle;q.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle()}}});count();typeset()}
function count(){document.getElementById('count').textContent=`${selected[active].size} / ${DATA[active].cards.length} selected`}
function setall(v){selected[active]=v?new Set(DATA[active].cards.map((_,i)=>i)):new Set();render()}
function reveal(v){document.querySelectorAll('.card').forEach(x=>x.classList.toggle('open',v));typeset()}
function copyText(s){navigator.clipboard.writeText(s).then(()=>toast('Copied')).catch(()=>toast('Copy failed'))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)}
function table(){const c=DATA[active].cards.filter((_,i)=>selected[active].has(i));let s='| Question | Answer |\n| --- | --- |\n';for(const x of c)s+='| '+x.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+x.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n';copyText(s)}
addEventListener('DOMContentLoaded',()=>{tabs();render();document.getElementById('sel').onclick=()=>setall(true);document.getElementById('desel').onclick=()=>setall(false);document.getElementById('reveal').onclick=()=>reveal(true);document.getElementById('hide').onclick=()=>reveal(false);document.getElementById('table').onclick=table});</script></body></html>
