on:column;gap:10px}.card{min-width:0;max-width:100%;background:#fff;border:1px solid #e1e1e6;border-radius:14px;padding:15px 16px;box-shadow:0 1px 4px #0000000a}.row{display:flex;gap:10px;align-items:flex-start;min-width:0}.pick{width:18px;height:18px;margin-top:3px;flex:0 0 auto}.qwrap{min-width:0;max-width:100%;flex:1}.q{font-weight:650;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;cursor:pointer;overflow-x:auto}.answer{display:none;white-space:pre-wrap;margin-top:10px;padding-top:10px;border-top:1px solid #ececf0;color:#3e3e43;overflow-wrap:anywhere;word-break:break-word;overflow-x:auto}.card.open .answer{display:block}.foot{display:flex;justify-content:flex-end;margin-top:8px}.copy{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:3px 8px;cursor:pointer}.notice{font-size:12px;color:#68686d;text-align:center;margin:12px 0}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#1d1d1f;color:#fff;border-radius:8px;padding:8px 14px;opacity:0;pointer-events:none}.toast.show{opacity:1}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}@media(max-width:430px){.wrap{padding:16px 10px 55px}h1{font-size:24px}.tools{top:4px}.count{width:100%;margin-left:0}.card{padding:13px 12px}}</style><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true},options:{skipHtmlTags:["script","noscript","style","textarea","pre","code"]}};</script><script defer src="assets/mathjax/es5/tex-mml-chtml.js"></script></head><body><main class="wrap"><header><h1>Pearson Edexcel IAL Pure Mathematics P1 WMA11/01 Summer 2022 · 16 June 2026 Maths P1 May 2022 mistake review — passed evidence-led guide</h1><p class="sub">Direct model-output flashcards</p></header><nav id="tabs" class="tabs" aria-label="Models"></nav><nav class="tools"><button id="sel">Select all</button><button id="desel">Deselect all</button><button id="reveal">Reveal all</button><button id="hide">Hide all</button><button id="table">Copy table</button><span id="count" class="count"></span></nav><section id="list" class="list"></section><p class="notice">Model outputs are displayed directly as generated.</p></main><div id="toast" class="toast"></div><script>const DATA={"glm_1":{"label":"GLM 5.1 · Run 1","returned_model":"z-ai/glm-5.1","cards":[{"question":"In Q1 (integration), the student applied the differentiation rule instead. What is the core integration rule for powers, and what specific sign trap must you watch for when the new power is negative?","answer":"1. Add one to the power, then divide by the new power. 2. When the new power is negative, the sign flips: e.g., integrating $$-3x^{-2}$$ gives $$\\frac{-3}{-1}x^{-1} = +3x^{-1} = \\frac{3}{x}$$."},{"question":"Before integrating $$\\frac{3}{x^2}$$, what algebraic rewrite is required, and why?","answer":"Rewrite $$\\frac{3}{x^2}$$ as $$3x^{-2}$$ so the power rule can be applied. Leaving it as a fraction over $$x^2$$ blocks the standard integration formula."},{"question":"In Q2 (sine rule), the student rounded $$0.6827$$ to $$0.6830$$ early and lost an accuracy mark. What is the rule for carrying intermediate values in trig calculations?","answer":"Carry full accuracy (at least 4 decimal places) through all intermediate steps. Only round at the final answer stage; early rounding steals accuracy marks."},{"question":"The sine rule always yields two possible angles for a given sine value. How do you determine whether to use the acute angle $$\\theta$$ or the obtuse angle $$180^\\circ - \\theta$$?","answer":"Check the given triangle configuration. If the geometric context (e.g., side lengths, other angles) forces the required angle to exceed $$90^\\circ$$, use the obtuse solution $$180^\\circ - \\theta$$."},{"question":"When sketching $$y = f(-x)$$ (a reflection in the y-axis), what happens to a horizontal asymptote such as $$y = 1$$, and why?","answer":"It stays unchanged at $$y = 1$$. A reflection in the y-axis is a horizontal transformation ($$x \\to -x$$); it does not alter any y-values, including horizontal asymptotes."},{"question":"To solve the quartic $$2x^4 - 15x^2 - 50 = 0$$, what substitution turns it into a quadratic, and what algebraic check must you apply before square-rooting?","answer":"1. Substitute $$u = x^2$$ to get a quadratic in $$u$$. 2. Before taking $$x = \\pm\\sqrt{u}$$, reject any $$u \u003c 0$$ because a real square cannot be negative."},{"question":"In Q6 (simultaneous equations reducing to a quartic), what presentation rule bars you from just writing down the final surd pairs?","answer":"You must show all working stages. Calculator-only solutions are not accepted; every algebraic step (substitution, factorisation, rejection, back-substitution) must be explicit."},{"question":"In Q7, the student reached the correct value $$A = -4$$ but via invalid working. What is the marking consequence?","answer":"A correct answer obtained from invalid working scores 0 marks. The method must justify the answer; you cannot rely on a lucky number."},{"question":"How does the transformation from $$y = \\sin x$$ to $$y = \\sin 2x$$ affect the graph's horizontal scale and its period?","answer":"Multiplying $$x$$ by 2 inside the function compresses the graph horizontally by a factor of $$\\frac{1}{2}$$, halving the period from $$360^\\circ$$ to $$180^\\circ$$."},{"question":"If one solution to $$\\sin 2x = p$$ is $$x = \\frac{\\alpha}{2}$$, how do you use the graph's symmetry to find the partner root in the same period?","answer":"The symmetry of the sine wave gives equal distances about a line of symmetry. The partner root is $$x = 90^\\circ - \\frac{\\alpha}{2}$$."},{"question":"Which three questions were NOT reviewed live in the lesson, and what is their scored state classified as?","answer":"Q5, Q8, and Q10 were not reviewed live. Their scored state is classified as [UNAVAILABLE] — unknown, and not assumed to be blank or full."},{"question":"The legacy guide claimed a total of \"29/75\". Is this a reconciled fact? What is the honest position on the total score?","answer":"No, \"29/75\" is a [GUIDE-CLAIM] figure only; it is not spoken in the audio, not confirmed from frames, and arithmetically inconsistent with the per-question breakdown. The honest position is approximately 32/75 with a declared ≥3-mark unresolved delta."}]},"glm_2":{"label":"GLM 5.1 · Run 2","returned_model":"z-ai/glm-5.1","cards":[{"question":"When integrating a polynomial, what is the core rule for powers, and what is the common trap identified in the Q1 review [AUDIO]?","answer":"1. Rule: Add one to the power, then divide by the new power. 2. Trap: Accidentally applying the differentiation rule (multiply by the new power) instead of the integration rule [AUDIO]."},{"question":"How must you rewrite $$\\frac{3}{x^2}$$ before integrating, and what sign trap occurs with the resulting negative power [OFFICIAL]?","answer":"1. Rewrite $$\\frac{3}{x^2}$$ as $$3x^{-2}$$ to apply the power rule. 2. Trap: When integrating $$-3x^{-2}$$, adding 1 to the power gives $$-1$$, and dividing by $$-1$$ flips the sign to positive $$+3x^{-1}$$ (or $$\\frac{3}{x}$$) [OFFICIAL]."},{"question":"In the sine rule, if you find an acute angle $$\\theta$$, how do you determine the obtuse angle, and what condition decides which to use [AUDIO]?","answer":"1. The obtuse angle is $$180^\\circ - \\theta$$ [AUDIO]. 2. Condition: Check the given triangle configuration; if the geometry forces the angle to exceed $$90^\\circ$$, select the obtuse partner."},{"question":"Why did the Q2 attempt lose an accuracy mark, despite the method being sound [VISUAL-LEAD]/[GUIDE-CLAIM]?","answer":"1. Trap: Rounding the intermediate sine value too early ($$0.6827 \\to 0.6830$$). 2. Check: Carry full 4-decimal-place accuracy through sine rule calculations before rounding the final answer."},{"question":"When sketching $$y = f(-x)$$, what happens to a horizontal asymptote $$y = 1$$, and why is moving it a critical trap [GUIDE-CLAIM]/[OFFICIAL]?","answer":"1. The horizontal asymptote stays at $$y = 1$$ [OFFICIAL]. 2. Trap: $$y = f(-x)$$ is a horizontal reflection (x-coordinates negate); it does not affect y-coordinates, so vertical shifts or horizontal asymptotes remain unchanged [GUIDE-CLAIM]."},{"question":"What substitution reduces a quartic like $$2x^4 - 15x^2 - 50 = 0$$ to a quadratic, and what rejection check is required [OFFICIAL]?","answer":"1. Substitution: Let $$u = x^2$$ to transform it to $$2u^2 - 15u - 50 = 0$$ [OFFICIAL]. 2. Check: Reject any solution where $$u \u003c 0$$ (or $$x^2 \u003c 0$$) because a real square cannot be negative; then take square roots for exact surd x-values."},{"question":"If you arrive at the correct numerical answer for a value like $$A = -4$$, but used invalid working, what is the mark outcome and principle [GUIDE-CLAIM]/[AUDIO]?","answer":"1. Outcome: 0 marks [GUIDE-CLAIM]. 2. Principle: The method must justify the answer; a correct number from wrong working scores nothing [AUDIO]. Check: Keep fractional/negative indices exact throughout."},{"question":"How does the graph $$y = \\sin 2x$$ transform $$y = \\sin x$$, and what is the resulting period [OFFICIAL]/[AUDIO]?","answer":"1. Transformation: Multiplying x by 2 inside the function compresses it, resulting in a horizontal stretch by factor $$\\frac{1}{2}$$ [AUDIO]. 2. Period: Halved to $$180^\\circ$$ [OFFICIAL]."},{"question":"If one solution to $$\\sin 2x = p$$ is $$x = \\frac{\\alpha}{2}$$, what is the symmetry method to find the partner root in range [OFFICIAL]/[AUDIO]?","answer":"1. Use the symmetry principle: roots sit at equal distances about a line of symmetry [AUDIO]. 2. The partner root is $$90^\\circ - \\frac{\\alpha}{2}$$ [OFFICIAL]."},{"question":"Which three questions were NOT reviewed live, and what is their scored state status?","answer":"1. Questions: Q5, Q8, and Q10. 2. Status: Their scored state is treated as unknown (not assumed blank or full) [UNAVAILABLE]."},{"question":"What is the evidence status of the legacy total \"29/75\", and why is it not presented as a reconciled fact?","answer":"1. Status: [GUIDE-CLAIM] only. 2. Reason: It is not spoken in the audio, not confirmed from any frame, and arithmetically inconsistent with the best-available per-question breakdown (which sums to $$\\approx 32$$). It must not be published as reconciled."},{"question":"How did the automated visual read mislabel the official Q2 and Q9, and what authority governs the correct ordering?","answer":"1. Mislabel: The visual read labeled official Q2 (sine rule) and official Q9 (trig) both as \"Q8\" [VISUAL-LEAD]. 2. Authority: The audio timeline governs over the visual pass; the visual pass's back-half timestamps and \"Q\" headings were not imported as facts."}]},"glm_3":{"label":"GLM 5.1 · Run 3","returned_model":"z-ai/glm-5.1","cards":[{"question":"In IAL P1 WMA11/01 Summer 2022 Q1, what common mistake did the Student make when attempting indefinite integration, and what is the correct rule? [AUDIO]","answer":"The Student applied the differentiation rule instead of the integration rule. [AUDIO] Correct rule: when integrating, add one to the power and then divide by the new power."},{"question":"When integrating a term like $$-3x^{-2}$$, what sign trap must you watch for, as seen in WMA11/01 Summer 2022 Q1? [OFFICIAL]","answer":"Rewrite $$\\frac{3}{x^2}$$ as $$3x^{-2}$$ first. When integrating, adding 1 to the power gives $$-1$$, and dividing by $$-1$$ flips the sign: $$\\frac{-3x^{-1}}{-1} = +3x^{-1} = +\\frac{3}{x}$$. [OFFICIAL]"},{"question":"When using the sine rule to find an angle in a triangle, how do you decide between the acute solution $$\\theta$$ and the obtuse solution $$180^\\circ - \\theta$$, as discussed for WMA11/01 Summer 2022 Q2? [OFFICIAL], [AUDIO]","answer":"The sine rule always offers two angles ($$\\theta$$ and $$180^\\circ - \\theta$$). You must check the given configuration: if the triangle forces the angle to exceed $$90^\\circ$$, use the obtuse solution $$180^\\circ - \\theta$$. [OFFICIAL], [AUDIO]"},{"question":"Why did the Student lose an accuracy mark in WMA11/01 Summer 2022 Q2 when using the sine rule? [VISUAL-LEAD]/[GUIDE-CLAIM]","answer":"The Student rounded $$\\sin x$$ too early (from 0.6827 to 0.6830), which propagated an error to the final angle ($$136.93^\\circ$$ instead of $$136.95^\\circ$$). Carry full 4-d.p. accuracy through intermediate steps. [OFFICIAL], [VISUAL-LEAD]/[GUIDE-CLAIM]"},{"question":"Under the transformation $$y = f(-x)$$, what happens to a horizontal asymptote, and what common trap caught the Student in WMA11/01 Summer 2022 Q4? [OFFICIAL], [GUIDE-CLAIM]","answer":"A reflection in the y-axis is horizontal only, so a horizontal asymptote (e.g., $$y = 1$$) stays completely unchanged. The trap is incorrectly moving the horizontal asymptote (e.g., to $$y = -1$$), which loses marks. [OFFICIAL], [GUIDE-CLAIM]"},{"question":"For the transformation $$y = f(-x)$$, how do the coordinates of key points change, as required in WMA11/01 Summer 2022 Q4? [OFFICIAL]","answer":"The x-coordinates change sign (reflect in the y-axis) while the y-coordinates remain unchanged. E.g., a minimum at $$(-1, 0)$$ becomes $$(1, 0)$$, and a maximum at $$(\\frac{2}{3}, 2)$$ becomes $$(-\\frac{2}{3}, 2)$$. [OFFICIAL]"},{"question":"What strategy solves a quartic equation like $$2x^4 - 15x^2 - 50 = 0$$ when calculator-only solutions are rejected, as in WMA11/01 Summer 2022 Q6? [OFFICIAL], [AUDIO]","answer":"Use a hidden-quadratic substitution: let $$u = x^2$$ to turn the quartic into a quadratic ($$2u^2 - 15u - 50 = 0$$). Factorise, solve for $$u$$, then back-substitute to find $$x$$. Show every stage. [OFFICIAL], [AUDIO]"},{"question":"After factorising the hidden quadratic $$(2x^2 + 5)(x^2 - 10) = 0$$ in WMA11/01 Summer 2022 Q6, why must you reject $$2x^2 + 5 = 0$$? [OFFICIAL]","answer":"Solving $$2x^2 = -5$$ gives $$x^2 = -\\frac{5}{2}$$. A real square cannot be negative, so this yields no real roots. Reject it and proceed with $$x^2 = 10$$ to give exact surd answers. [OFFICIAL]"},{"question":"In WMA11/01 Summer 2022 Q7, the Student reached the correct value $$A = -4$$ but scored zero for that part. Why? [GUIDE-CLAIM], [AUDIO]","answer":"The correct answer was obtained via invalid working. The method must justify the answer; a right number from wrong working scores nothing. [GUIDE-CLAIM], [AUDIO]"},{"question":"How does the graph of $$y = \\sin 2x$$ relate to $$y = \\sin x$$, and what is its period, as re-taught for WMA11/01 Summer 2022 Q9? [OFFICIAL], [AUDIO]","answer":"Multiplying $$x$$ by 2 inside the function causes a horizontal stretch by factor $$\\frac{1}{2}$$ (\"sweep every x-coordinate by a half\"). This halves the period from $$360^\\circ$$ to $$180^\\circ$$. [OFFICIAL], [AUDIO]"},{"question":"If one solution to $$\\sin 2x = p$$ is $$x = \\frac{\\alpha}{2}$$, how do you use symmetry to find the second solution in range, as taught for WMA11/01 Summer 2022 Q9? [OFFICIAL], [AUDIO]","answer":"Use the graph's symmetry about its peak. The second root is at $$x = 90^\\circ - \\frac{\\alpha}{2}$$ (equal distances from the line of symmetry at $$x = 45^\\circ$$). [OFFICIAL], [AUDIO]"},{"question":"What is the scored state of Q5, Q8, and Q10 from the WMA11/01 Summer 2022 paper in this lesson, and what is the status of the legacy \"29/75\" total? [UNAVAILABLE], [GUIDE-CLAIM]","answer":"Q5, Q8, and Q10 were not reviewed live; their scored state is unknown and not assumed blank [UNAVAILABLE]. The legacy \"29/75\" total is a [GUIDE-CLAIM] figure only; it is not confirmed from audio or frames and does not reconcile with the per-question breakdown (which sums to ≈ 32/75)."}]},"qwen_1":{"label":"Qwen 3.7 Max","returned_model":"qwen/qwen3.7-max","cards":[{"question":"When integrating an expression containing a term like $$\\frac{3}{x^2}$$, what is the crucial first algebraic step and the specific sign trap to avoid?","answer":"1. Rewrite the fraction as a negative power first (e.g., as $$-3x^{-2}$$ if the term is subtracted).\n2. Add one to the power and divide by the new power.\n3. Sign trap: Watch the sign when the new power is negative; dividing by the new negative power flips the sign (e.g., $$-3x^{-2} \\rightarrow +3x^{-1} = +\\frac{3}{x}$$)."},{"question":"What common cognitive trap did the student identify when attempting indefinite integration of polynomial terms, and what is the correct rule to apply?","answer":"Trap: Accidentally applying the differentiation rule (multiply by the power, subtract one from the power) instead of integrating.\nCorrect rule: To integrate $$x^n$$, add one to the power and divide by the new power ($$\\frac{x^{n+1}}{n+1}$$)."},{"question":"When using the sine rule to find an obtuse angle, what are the two critical checks to prevent losing accuracy and method marks?","answer":"1. Carry full calculator accuracy (e.g., 4 d.p.) for the intermediate sine value to avoid early rounding errors.\n2. The sine rule yields both an acute angle ($$\\theta$$) and an obtuse angle ($$180^\\circ - \\theta$$); explicitly check the triangle's configuration to select the correct obtuse solution if required."},{"question":"When sketching $$y = f(-x)$$ from $$y = f(x)$$, how does the transformation affect the $$x$$-coordinates, $$y$$-coordinates, and horizontal asymptotes?","answer":"1. $$x$$-coordinates: Multiply by $$-1$$ (reflection in the $$y$$-axis).\n2. $$y$$-coordinates: Remain unchanged.\n3. Horizontal asymptotes: Remain completely unchanged (e.g., $$y = 1$$ stays $$y = 1$$), as the transformation is strictly horizontal."},{"question":"When solving a hidden-quadratic quartic equation like $$2x^4 - 15x^2 - 50 = 0$$, what is the step-by-step strategy and the critical rejection condition?","answer":"1. Substitute $$u = x^2$$ to form a quadratic in $$u$$.\n2. Factorise and solve for $$u$$.\n3. Rejection condition: Reject any $$u \u003c 0$$ because a real square ($$x^2$$) cannot be negative.\n4. Take the square root of valid positive $$u$$ values to find exact surd answers for $$x$$."},{"question":"In Edexcel IAL Pure Mathematics, what is the marking consequence if a student arrives at the correct numerical value for a constant but uses invalid or mathematically incorrect working to get there?","answer":"The student scores zero marks for that part. A correct answer obtained from invalid working is not awarded marks; the method must fully justify the answer."},{"question":"When finding a function $$f(x)$$ by integrating a derivative with fractional and negative indices, what format must the final constant of integration be kept in to secure accuracy marks?","answer":"The constant must be kept as an exact fraction (e.g., $$-\\frac{109}{3}$$). Converting it to a rounded decimal will lose accuracy marks."},{"question":"How does the coefficient $$2$$ inside the argument of $$y = \\sin 2x$$ transform the graph of $$y = \\sin x$$, and what is the new period?","answer":"1. It applies a horizontal stretch by a scale factor of $$\\frac{1}{2}$$ (compressing the graph horizontally).\n2. The period is halved from $$360^\\circ$$ to $$180^\\circ$$."},{"question":"When solving $$\\sin 2x = p$$ and one solution is known to be $$x = \\frac{\\alpha}{2}$$, how can the graph's symmetry be used to find the second solution in the first period?","answer":"Use the symmetry of the sine wave about its maximum. The partner solution for the argument $$2x$$ is $$180^\\circ - \\alpha$$, making the second root for $$x$$ equal to $$90^\\circ - \\frac{\\alpha}{2}$$."},{"question":"What is the most robust strategy for simplifying an indices expression with mixed bases, such as $$\\frac{9^{2n+1} \\cdot 3^{4-3n}}{27^{n-1}}$$?","answer":"1. Convert all bases to a single common prime base (e.g., base 3: $$9=3^2$$, $$27=3^3$$).\n2. Apply power rules to multiply the outer exponents by the inner terms.\n3. Combine the exponents using addition for multiplication and subtraction for division."},{"question":"According to the evidence-led rebuild of the Summer 2022 P1 mistake review, what is the exact lesson status of questions Q5, Q8, and Q10?","answer":"They were not reviewed live in the lesson. Their scored state is treated as strictly unknown (not assumed blank or full), and they are included in the guide for reference only."},{"question":"Why is the legacy \"29/75\" total score not presented as a reconciled fact in the evidence-led rebuild of the P1 Summer 2022 review?","answer":"1. It is a [GUIDE-CLAIM] not spoken in the audio or confirmed from any frame.\n2. It is arithmetically inconsistent with the per-question breakdown, which sums to $$\\approx 32/75$$.\n3. Reaching 29 would require assuming $$\\ge 3$$ further unverified mark losses in questions deemed \"essentially full\", for which there is no evidence."}]},"minimax_1":{"label":"MiniMax M3 · Run 1","returned_model":"minimax/minimax-m3","cards":[{"question":"In the P1 WMA11/01 Summer 2022 Q1 (integration), what is the corrected result of $$\\int\\left(10x^5+6x^3-\\frac{3}{x^2}\\right)dx$$, and what is the one rule the student was caught breaking? [OFFICIAL]/[AUDIO]","answer":"$$\\frac{5}{3}x^6+\\frac{3}{2}x^4+\\frac{3}{x}+c$$. Rule broken: the student applied differentiation instead of integration, and mishandled the sign on the $$-3x^{-2}$$ term. Procedure: (1) rewrite $$3/x^2$$ as $$3x^{-2}$$; (2) add 1 to each power; (3) divide by the new power, watching the sign when that new power is negative ($$-3x^{-2}\\to +3x^{-1}=+\\frac{3}{x}$$); (4) include $$+c$$."},{"question":"P1 WMA11/01 Summer 2022 Q2: triangle with $$AB=21$$, $$BC=13$$, $$\\angle BAC=25°$$. Show the sine-rule working that gives the obtuse angle, and state the trap that lost the accuracy mark. [OFFICIAL]/[AUDIO]/[VISUAL-LEAD]/[GUIDE-CLAIM]","answer":"(1) $$\\sin x=\\dfrac{21\\sin 25°}{13}=0.6827$$ (keep 4 d.p.). (2) Acute value: $$\\arcsin(0.6827)\\approx 43.05°$$. (3) Obtuse value the triangle requires: $$x=180°-43.05°=136.95°$$. Trap: rounding $$\\sin x$$ to 0.6830 too early carried through to $$x\\approx 136.93°$$ and cost the accuracy mark. General rule — the sine rule always offers two angles, $$\\theta$$ and $$180°-\\theta$$; pick the one the diagram forces."},{"question":"What is the official Q5 completed-square form, and what authoring error in the legacy guide must NOT be repeated? [OFFICIAL]/[GUIDE-CLAIM]","answer":"Official form: $$12-\\tfrac{3}{4}(x+2)^2$$. Legacy guide error: it printed $$12-(x+2)^2$$, which expands to $$-x^2-4x+8$$ and does not equal the other members of its own chain (e.g. at $$x=1$$: 3 vs 0). Condition check: the coefficient $$\\tfrac{3}{4}$$ must be retained for the equality $$12-\\tfrac{3}{4}(x+2)^2=-\\tfrac{3}{4}(x-1)(x+5)=-\\tfrac{3}{4}x^2-\\tfrac{16}{3}x+\\tfrac{20}{3}$$ to hold."},{"question":"P1 Summer 2022 Q4(b): given minimum $$P(-1,0)$$, maximum $$Q(\\tfrac{2}{3},2)$$, asymptote $$y=1$$, describe the transformation $$y=f(-x)$$. What was the fatal error in the student's sketch? [OFFICIAL]/[AUDIO]/[GUIDE-CLAIM]","answer":"$$y=f(-x)$$ is a reflection in the $$y$$-axis: $$x\\to -x$$, $$y$$ unchanged. New key points: minimum $$(1,0)$$, maximum $$(-\\tfrac{2}{3},2)$$, asymptote still $$y=1$$ (unchanged). Fatal error: the student moved the horizontal asymptote from $$y=1$$ to $$y=-1$$. A horizontal reflection cannot shift a horizontal asymptote. Coordinates alone are insufficient — the sketched shape and asymptote must both be correct."},{"question":"P1 Summer 2022 Q6 reduces to the quartic $$2x^4-15x^2-50=0$$. Give the exact solution pairs and state the rules that prevent marking penalties. [OFFICIAL]/[AUDIO]","answer":"(1) Substitute $$u=x^2$$ to get $$2u^2-15u-50=0$$. (2) Factor: $$(2u+5)(u-10)=0$$ giving $$u=-\\tfrac{5}{2}$$ or $$u=10$$. (3) Reject $$u\u003c0$$ (a square cannot be negative). (4) Take square roots of $$u=10$$ to get $$x=\\pm\\sqrt{10}$$. (5) Back-substitute into the other equation for the $$y$$-pair $$\\pm 4\\sqrt{10}$$. Solutions: $$(\\sqrt{10},4\\sqrt{10})$$ and $$(-\\sqrt{10},-4\\sqrt{10})$$. Rules: reject negative-$$u$$ roots before square-rooting, give exact surd answers, and show every stage — calculator-only solutions are not accepted."},{"question":"P1 Summer 2022 Q7(a): given $$f'(x)=2x^{-1/2}+Ax^{-2}+3$$ and $$f''(4)=0$$, find $$A$$ and justify why the student's original answer was awarded 0. [OFFICIAL]/[AUDIO]/[GUIDE-CLAIM]","answer":"(1) Differentiate: $$f''(x)=-x^{-3/2}-2Ax^{-3}$$. (2) Substitute $$x=4$$: $$f''(4)=-4^{-3/2}-2A\\cdot 4^{-3}=0$$. (3) Simplify with $$4^{-3/2}=\\tfrac{1}{8}$$: $$-\\tfrac{1}{8}-\\tfrac{2A}{64}=0\\Rightarrow -\\tfrac{1}{8}-\\tfrac{A}{32}=0\\Rightarrow A=-4$$. Justification rule: a correct numerical answer obtained from invalid working earns 0 marks — the method itself must justify the answer. Keep fractional and negative indices exact throughout (do not collapse $$x^{-1/2}$$ or $$x^{-2}$$ to decimals mid-working)."},{"question":"P1 Summer 2022 Q9(b): what is the period of $$y=\\sin 2x$$, and what is the precise transformation description the student gave? [OFFICIAL]/[AUDIO]","answer":"Period of $$y=\\sin 2x$$ is $$180°$$. Transformation: a horizontal stretch of $$y=\\sin x$$ by scale factor $$\\tfrac{1}{2}$$ (multiplying the $$x$$-coordinate by 2 inside the function halves the period). Student's phrase: \"a one-half x… sweep every x-coordinate by a half.\" Common trap: writing period $$360°$$ (forgetting the factor 2), or describing it as a vertical rather than horizontal stretch."},{"question":"P1 Summer 2022 Q9(c): once one solution of $$\\sin 2x=p$$ is found, what is the partner solution in range, and which symmetry justifies it? [OFFICIAL]/[AUDIO]","answer":"Partner solution: $$x=90°-\\tfrac{\\alpha}{2}$$ (where $$\\alpha$$ satisfies $$\\sin\\alpha=p$$). Justification: the $$-\\sin\\alpha$$ symmetry about the peak at $$90°$$; equal horizontal distances of $$2k$$ about the line of symmetry place the second root. Check: $$\\sin 2\\left(90°-\\tfrac{\\alpha}{2}\\right)=\\sin(180°-\\alpha)=\\sin\\alpha=p$$. Trap: giving only the acute root or using $$\\tfrac{\\alpha}{2}$$ twice instead of the symmetry partner."},{"question":"The ESAT indices warm-up simplifies $$\\dfrac{9^{2n+1}\\cdot 3^{4-3n}}{27^{n-1}}$$. What is the result in terms of $$n$$, and why must it never be called a WMA11 question? [AUDIO]/[OFFICIAL]","answer":"Result: $$3^{9-2n}$$ (i.e. $$3^9\\cdot 3^{-2n}$$). Working: convert all bases to 3 — $$9=3^2$$, $$27=3^3$$ — so the exponent is $$(2n+1)\\cdot 2+(4-3n)-(n-1)\\cdot 3 = (4n+2)+(4-3n)-(3n-3)=9-2n$$. Status rule: this item is a supplementary ESAT warm-up only; it is not a WMA11/01 Summer 2022 question and must never be presented as part of this exam paper. Any $$u=\\sqrt{x}$$ or cubic drills from the same session are likewise supplementary, not paper content."},{"question":"What is the honest, evidence-led position on the lesson's reconciled total for P1 WMA11/01 Summer 2022, and what must NOT be published as fact? [GUIDE-CLAIM]/[UNAVAILABLE]","answer":"The reconciled total is $$\\approx 32/75$$ with a declared $$\\geq 3$$-mark unresolved delta. Worked review losses: $$Q1(-3)+Q2(-1)+Q4(-3)+Q7(-6)+Q9(-8)=-21$$; blanking Q8 and Q10 adds at most $$-22$$, giving $$75-21-22=32$$. Do NOT publish the legacy \"29/75\": it is a [GUIDE-CLAIM] only — not spoken in audio, not confirmed in any frame, and arithmetically inconsistent with the per-question breakdown. Q5, Q8 and Q10 were not reviewed live; their scored state is [UNAVAILABLE] and must remain unknown, not assumed blank."},{"question":"Give the official Q3 and Q8 reference answers, and the lesson status that must be preserved when citing them. [OFFICIAL]/[UNAVAILABLE]","answer":"Q3: (i) $$\\sqrt{180}-\\sqrt{80}/\\sqrt{5}=2$$; (ii) rationalisation gives $$\\tfrac{25}{4}+\\tfrac{13}{4}\\sqrt{5}$$. Status: Q3 was \"touched briefly\" — not a logged lost-mark review; retained exact mark state is [UNAVAILABLE]. Q8 (sector/arc): (a) $$\\theta=53°$$, arc $$CD=35.9$$ cm; (b) perimeter $$=603$$ cm; (c) area $$\\approx 4730\\text{ cm}^2=0.473\\text{ m}^2$$. Status: Q8 was NOT reviewed live; its scored state is [UNAVAILABLE] and must not be assumed blank. The automated visual pass's \"Q8\" labels are mislabels (for official Q2 and Q9) and must not be imported."},{"question":"P1 Summer 2022 Q10: a normal-to-a-curve problem. State only the four official reference answers and the lesson status. [OFFICIAL]/[UNAVAILABLE]","answer":"Reference answers [OFFICIAL]: (a) $$\\dfrac{dy}{dx}=\\dfrac{6}{7}x^2+\\dfrac{2}{7}x-\\dfrac{5}{2}$$; (b) $$12x^2+4x-33=0$$; (c) $$x=\\tfrac{3}{2}$$; (d) $$k=54$$. Status: [UNAVAILABLE] — Q10 was NOT reviewed live. No audio segment references a normal, a curve, or \"k\", and it was not worked on screen. Its scored state is unknown; it must not be assumed blank. With Q8, it forms the largest unresolved block behind any score gap."}]},"minimax_2":{"label":"MiniMax M3 · Run 2","returned_model":"minimax/minimax-m3","cards":[{"question":"For a power $$\\frac{3}{x^2}$$ written as $$3x^{-2}$$, what is the indefinite integral, and what sign trap applies specifically because the new power is negative? [OFFICIAL — Q1]","answer":"Use the power rule: add 1 to the exponent then divide by the new exponent.\n1. Rewrite: $$3x^{-2}$$.\n2. New power: $$-2+1=-1$$.\n3. Integral: $$\\int 3x^{-2}\\,dx = \\frac{3x^{-1}}{-1}+c = -3x^{-1}+c = -\\frac{3}{x}+c$$.\n4. Sign trap: dividing by a negative new power flips the sign — easy to write $$+\\frac{3}{x}$$ instead of $$-\\frac{3}{x}$$. The lesson's slip was exactly this sign plus using the differentiation rule (multiply by the power) instead of the integration rule (add 1, then divide). [AUDIO 22:51, 23:31–24:10]"},{"question":"State the rule for integrating a power $$ax^n$$ with $$n\\ne -1$$, and give the two-part sequence of operations in the correct order.","answer":"Integrate, don't differentiate. Sequence:\n1. Add 1 to the power: $$n \\to n+1$$.\n2. Divide the whole term by the new power: $$ax^{n+1}/(n+1)$$.\nCommon trap: doing the differentiation sequence (multiply by the power, then subtract 1) — that is the reverse, and produces a derivative, not an integral. The Student named this exact slip on Q1. [AUDIO 22:51]"},{"question":"In a sine-rule triangle, side $$AB=21$$, side $$BC=13$$, $$\\angle BAC=25^\\circ$$ and the unknown angle is the obtuse one. What is the correct two-stage method, and why does carrying only 3 d.p. matter? [OFFICIAL — Q2]","answer":"Stage 1 — sine rule with full accuracy: $$\\sin x=\\frac{21\\sin 25^\\circ}{13}=0.6827$$ (4 d.p.). Stage 2 — obtuse case: since the configuration forces the obtuse angle, $$x=180^\\circ-\\arcsin(0.6827)=136.95^\\circ$$.\nWhy 4 d.p. matters: the lesson's recorded slip was rounding $$0.6827\\to 0.6830$$ early and carrying it to $$x\\approx 136.93^\\circ$$, losing the accuracy mark on part (a) (−1). Method and obtuse-case recognition were correct; the lost mark was a rounding slip. [VISUAL-LEAD]/[GUIDE-CLAIM]"},{"question":"The sine rule can give two candidate angles. What is the decision rule for choosing between the acute solution and its supplement, and the unit-circle reasoning that was used in the lesson? [AUDIO 25:40–30:04, 26:12]","answer":"Rule: the sine rule always yields two candidates, $$\\theta$$ and $$180^\\circ-\\theta$$.\n1. Compute the acute value first (e.g. $$43^\\circ$$ from the data).\n2. Use the triangle's configuration — given angles and opposite-side layout — to decide whether the required angle is acute or obtuse.\n3. If obtuse is forced, take $$180^\\circ - \\text{acute}$$; the lesson's working phrase was \"180 minus 43 minus 25\" to confirm the geometry leaves only the obtuse slot.\nTrap: defaulting to the acute answer without checking the configuration."},{"question":"Given $$y=f(x)$$ with minimum $$P(-1,0)$$, maximum $$Q\\!\\left(\\tfrac{3}{2},2\\right)$$ and horizontal asymptote $$y=1$$, state the transformation, the new key points and the new asymptote for (i) $$y=f(x)-2$$ and (ii) $$y=f(-x)$$. [OFFICIAL — Q4]","answer":"(i) Vertical shift down 2: min $$(-1,-2)$$, max $$\\!\\left(\\tfrac{3}{2},0\\right)$$, asymptote $$y=1-2=-1$$.\n(ii) Reflection in the $$y$$-axis: $$x\\to -x$$, $$y$$ unchanged, so min $$(1,0)$$, max $$\\!\\left(-\\tfrac{3}{2},2\\right)$$, asymptote $$y=1$$ unchanged.\nTrap recorded: the Student's coordinates were right but the shape was wrong and the asymptote was moved to $$y=-1$$ — impossible for a horizontal-only reflection. Correct coordinates alone do not score; the sketch and asymptote must be right. [GUIDE-CLAIM]/[AUDIO 33:41]"},{"question":"Reduce $$2x^4-15x^2-50=0$$ to its solution pairs. Show the substitution, factorisation, rejection step and final surd answers. [OFFICIAL — Q6]","answer":"1. Substitute $$u=x^2$$: $$2u^2-15u-50=0$$.\n2. Factor: $$(2u+5)(u-10)=0$$.\n3. Reject $$u=-\\tfrac{5}{2}$$ because a square cannot be negative.\n4. Accept $$u=10\\Rightarrow x^2=10\\Rightarrow x=\\pm\\sqrt{10}$$, then back-substitute for the paired $$y$$: solution pairs $$(\\sqrt{10},\\,4\\sqrt{10})$$ and $$(-\\sqrt{10},\\,-4\\sqrt{10})$$.\nConditions: give exact surds, show every stage (calculator-only is barred), and use the substitution even though the quartic \"looks\" unfactorisable. [AUDIO 39:47–48:48]"},{"question":"A learner reaches the right numerical value $$A=-4$$ for a constant but via algebraically invalid working. What mark does this earn under the lesson's stated principle, and why? [AUDIO — Q7 re-teach]","answer":"It earns 0 marks. The governing principle stated in the lesson: the method must justify the answer; a correct number from invalid working scores nothing. In Q7 part (a) the Student reached $$A=-4$$ this way and lost the marks; in part (b) a dropped power then produced the wrong constant. Keep fractional and negative powers exact (e.g. $$x^{-1/2}$$, $$x^{-2}$$) and do not round mid-working. [GUIDE-CLAIM]"},{"question":"For $$y=\\sin 2x$$, give the transformation of $$y=\\sin x$$, the new period, and — given one solution $$x=\\alpha/2$$ in range — the partner solution produced by the graph's symmetry. [OFFICIAL — Q9]","answer":"Transformation: inside the function $$x\\to 2x$$ is a horizontal stretch by scale factor $$\\tfrac{1}{2}$$ (the lesson phrasing: \"sweep every x-coordinate by a half\"). Period: $$\\tfrac{360^\\circ}{2}=180^\\circ$$. Partner root: with one solution $$x=\\alpha/2$$, the line of symmetry at $$x=45^\\circ$$ gives the partner $$x=90^\\circ-\\alpha/2$$ (lesson phrase: \"equal to negative sine alpha\" using the $$-\\sin\\alpha$$ symmetry and equal distance $$2k$$ about the symmetry line). [AUDIO 56:55, 57:45]"},{"question":"The legacy guide printed a completed-square form as $$12-(x+2)^2$$ and chained it with other forms. State the correct first form and the principle this illustrates. [OFFICIAL — Q5, authoring correction]","answer":"Correct first form: $$12-\\tfrac{3}{4}(x+2)^2$$. Test at $$x=1$$: the legacy form gave $$3$$ while the other members of its \"$$=$$\" chain gave $$0$$ — proof the legacy form is internally inconsistent.\nPrinciple: never trust a chained equality across completed-square / factorised / expanded forms without checking a test value; one coefficient typo (missing the $$\\tfrac{3}{4}$$) breaks the whole chain. [GUIDE-CLAIM correction, not a lesson event]"},{"question":"For the hidden-quadratic technique on a quartic in $$x$$, state the substitution, the quadratic obtained from $$2x^4-15x^2-50=0$$, the two roots in $$u$$, and the rejection step before taking square roots. [OFFICIAL — Q6]","answer":"1. Substitute $$u=x^2$$ to lower the degree.\n2. Quadratic in $$u$$: $$2u^2-15u-50=0$$.\n3. Factor / solve: $$(2u+5)(u-10)=0\\Rightarrow u=-\\tfrac{5}{2}$$ or $$u=10$$.\n4. Reject any root with $$u\u003c0$$ because $$u=x^2\\ge 0$$; only $$u=10$$ survives, then $$x=\\pm\\sqrt{10}$$. Lesson's strategic point: pick the variable that makes the substitution \"clean\" first (\"I should take a step back to see which one to choose first\", 47:19). [AUDIO 39:47–48:48]"},{"question":"In the lesson's score reconciliation, the legacy guide claims a \"29/75\" total. Why is that figure not treated as a reconciled fact here, and what honest figure replaces it? [§5]","answer":"The \"29/75\" is a [GUIDE-CLAIM] only: not spoken in the audio, not confirmed from any frame, and arithmetically inconsistent with the per-question breakdown (which sums to ≈32/75 assuming Q8 and Q10 are entirely blank and Q3/Q5/Q6 full). Reaching 29 would require ≥3 further lost marks inside the very questions called \"essentially full\", for which there is no evidence.\nHonest position: present the total as ≈32/75 with a declared ≥3-mark unresolved delta, and keep Q8/Q10 scored state as [UNAVAILABLE] — not reviewed live, not assumed blank. Do not publish \"29/75\" as reconciled."},{"question":"State the evidence-tier governing order of authority used in this guide, and the two declared limits that prevent upgrading visual-read or legacy claims into facts.","answer":"Governing order (highest first):\n1. **[OFFICIAL]** — Pearson QP/MS controls wording, marks, final answers.\n2. **[AUDIO]** — confirmed in the timestamped transcript; governs chronology and the Student's own admissions.\n3. **[VISUAL-LEAD]** — automated read of the on-screen board; lead only, never source authority.\n4. **[GUIDE-CLAIM]** — legacy study-guide assertion, not independently confirmable.\n5. **[UNAVAILABLE]** — genuinely absent; preserved as a declared gap, never inferred away.\nDeclared limits:\n- Frame-extraction tooling was unavailable, so exact red-pen mark profiles, the cover total and Q8/Q10 blank-vs-attempted status are [VISUAL-LEAD] or [UNAVAILABLE], never upgraded to fact.\n- The Tutor's microphone is largely inaudible, so no verbatim Tutor quote is confirmable from audio; only the on-screen Q1 annotation is presented, and only as a written board annotation, not a spoken quote."}]},"deepseek_1":{"label":"DeepSeek V4 Pro","returned_model":"deepseek/deepseek-v4-pro","cards":[{"question":"When integrating a power of \\(x\\), what is the correct rule, and how does it differ from differentiation?","answer":"For integration: add 1 to the power, then divide by the new power. For differentiation: multiply by the power, then subtract 1 from the power. A common exam slip is to differentiate instead of integrate — always check which operation is required before starting."},{"question":"Integrate \\(\\frac{3}{x^2}\\) with respect to \\(x\\), showing all steps and highlighting the sign.","answer":"1. Rewrite as \\(3x^{-2}\\).  \n2. Add 1 to the power: \\(-2+1 = -1\\).  \n3. Divide by the new power: \\(\\frac{3x^{-1}}{-1} = -3x^{-1} = -\\frac{3}{x}\\).  \nA common error is to mishandle the sign, writing \\(+\\frac{3}{x}\\). Check by differentiating: \\(\\frac{d}{dx}\\!\\left(-\\frac{3}{x}\\right) = \\frac{3}{x^2}\\)."},{"question":"After using the sine rule to find an angle, you obtain an acute angle from \\(\\arcsin\\). How do you decide whether the actual angle is the acute one or its supplement (\\(180^\\circ - \\text{acute}\\))?","answer":"The sine rule always offers two possible angles: \\(\\theta\\) and \\(180^\\circ - \\theta\\). Choose the one that fits the triangle configuration:\n- If the side opposite the unknown angle is the longest side, the angle must be obtuse.\n- Check that the three angles sum to \\(180^\\circ\\).\n- Use a sketch to see which angle is geometrically possible.\nA mistake is to automatically take the acute angle without checking."},{"question":"In a sine rule calculation you need \\(\\sin x = \\frac{21\\sin 25^\\circ}{13}\\). Why might writing \\(\\sin x = 0.6830\\) instead of \\(0.6827\\) lose an accuracy mark?","answer":"The accuracy mark requires using a sufficiently precise intermediate value. Rounding to 4 decimal places too early (e.g. \\(0.6830\\) instead of \\(0.6827\\)) can change the final angle enough to fall outside the allowed tolerance. Carry full calculator precision or at least 4 d.p. throughout, and only round the final answer as instructed."},{"question":"The curve \\(y = f(x)\\) has a horizontal asymptote \\(y = 1\\). What happens to this asymptote when you sketch \\(y = f(-x)\\)?","answer":"The transformation \\(y = f(-x)\\) reflects the graph in the \\(y\\)-axis. This changes \\(x\\) to \\(-x\\) but leaves \\(y\\) unchanged. Therefore a horizontal asymptote \\(y = 1\\) stays at \\(y = 1\\). A common mistake is to also reflect the asymptote vertically, moving it to \\(y = -1\\)."},{"question":"The curve \\(y = f(x)\\) has a horizontal asymptote \\(y = 1\\). What is the new asymptote for \\(y = f(x) - 2\\)?","answer":"The transformation \\(y = f(x) - 2\\) shifts the graph down by 2 units. All \\(y\\)-values, including the asymptote, are shifted. The new asymptote is \\(y = 1 - 2 = -1\\)."},{"question":"When solving \\(2x^4 - 15x^2 - 50 = 0\\), what substitution turns it into a quadratic, and what vital step must follow after solving for the substituted variable?","answer":"Let \\(u = x^2\\). The equation becomes \\(2u^2 - 15u - 50 = 0\\). After solving for \\(u\\), **reject any negative \\(u\\)** because \\(u = x^2 \\ge 0\\). Then solve \\(x = \\pm\\sqrt{u}\\) for the valid positive \\(u\\). Finally, back-substitute to find corresponding \\(y\\)-values if solving simultaneous equations."},{"question":"When solving simultaneous equations where one is linear and the other is non‑linear, how do you decide which variable to make the subject?","answer":"Choose the variable that leads to simpler algebra — typically the one that appears to the lower power or without a coefficient that would complicate substitution. For example, from \\(y = 4x\\), making \\(y\\) the subject is straightforward. Picking the wrong variable can create a more complicated quartic; take a moment to assess which substitution minimises the degree and complexity."},{"question":"Given \\(f'(x) = 2x^{-1/2} + Ax^{-2} + 3\\), differentiate to find \\(f''(x)\\) correctly.","answer":"Use the power rule: multiply by the power and subtract 1 from the exponent.\n1. \\(2x^{-1/2}\\): derivative = \\(2 \\times (-\\tfrac12)\\,x^{-3/2} = -x^{-3/2}\\).\n2. \\(Ax^{-2}\\): derivative = \\(A \\times (-2)\\,x^{-3} = -2Ax^{-3}\\).\n3. Constant \\(3\\): derivative = \\(0\\).\nSo \\(f''(x) = -x^{-3/2} - 2Ax^{-3}\\). Common errors include mishandling the negative signs or the fractional arithmetic."},{"question":"If you obtain the correct value for \\(A\\) in a problem but your working contains a mathematical error, what mark might you receive?","answer":"You could receive **zero marks**. A correct answer obtained from invalid or incorrect working is not credited. The method must be fully correct and clearly shown to earn method marks. An answer alone, even if right, does not guarantee marks if the working is flawed."},{"question":"What is the period of \\(y = \\sin 2x\\), and how does the transformation from \\(y = \\sin x\\) affect the \\(x\\)-coordinates?","answer":"The period of \\(y = \\sin x\\) is \\(360^\\circ\\). For \\(y = \\sin 2x\\), the graph undergoes a horizontal compression by a factor of \\(\\frac12\\) (since \\(x\\) is multiplied by 2). This halves the period to \\(180^\\circ\\). Every \\(x\\)-coordinate of key points is halved; for example, the maximum at \\((90^\\circ, 1)\\) moves to \\((45^\\circ, 1)\\)."},{"question":"Given one solution \\(x = \\frac{\\alpha}{2}\\) for \\(\\sin 2x = p\\) in the range \\(0^\\circ \\le x \\le 180^\\circ\\), how do you find the second solution using symmetry?","answer":"The graph of \\(y = \\sin 2x\\) has symmetry about \\(x = 45^\\circ\\) and \\(x = 135^\\circ\\) within one period. Using \\(\\sin\\theta = \\sin(180^\\circ - \\theta)\\): if \\(2x = \\alpha\\) gives \\(x = \\frac{\\alpha}{2}\\), then also \\(2x = 180^\\circ - \\alpha\\) gives \\(x = \\frac{180^\\circ - \\alpha}{2} = 90^\\circ - \\frac{\\alpha}{2}\\). This is the second solution in the required interval."}]},"kimi_1":{"label":"Kimi K3","returned_model":"moonshotai/kimi-k3","cards":[{"question":"In Summer-2022 WMA11/01 Q1 (reviewed and corrected live [AUDIO]), evaluate $$\\int\\left(10x^5+6x^3-\\frac{3}{x^2}\\right)dx$$ and name the slip the review warns against.","answer":"1. Rewrite first: $$-\\frac{3}{x^2}=-3x^{-2}$$.\n2. Integrate powers: add one to the power, divide by the new power — the recorded slip was applying the differentiation rule instead (Student [AUDIO]: \"I know how to do this one, but for some reason I just do the differentiation rule\"). The board note stating this rule is [VISUAL-LEAD], pending frame verification.\n3. Sign trap: $$-3x^{-2}\\rightarrow\\frac{-3x^{-1}}{-1}=+\\frac{3}{x}$$.\n4. Result [OFFICIAL]: $$\\frac{5}{3}x^6+\\frac{3}{2}x^4+\\frac{3}{x}+c$$."},{"question":"In Q2 (reviewed [AUDIO]), triangle ABC has $$AB=21$$, $$BC=13$$, $$\\angle BAC=25^\\circ$$, and the required angle $$x$$ is obtuse. What two disciplines does the review teach for full marks?","answer":"1. Accuracy: carry full 4-d.p. through the sine rule — $$\\sin x=\\frac{21\\sin25^\\circ}{13}=0.6827$$; the rounding slip to $$0.6830$$ cost the accuracy mark ([VISUAL-LEAD]/[GUIDE-CLAIM]).\n2. Ambiguous case: the sine rule always offers $$\\theta$$ and $$180^\\circ-\\theta$$; check (unit-circle sketch, [AUDIO]) whether the configuration forces the obtuse angle, and if so take $$x=180^\\circ-\\arcsin(0.6827)$$.\n3. Official answer [OFFICIAL]: $$x=136.95^\\circ$$."},{"question":"Q3 was only touched briefly (not a logged lost-mark review; exact mark state [UNAVAILABLE]). How is $$\\frac{4\\sqrt5-5}{7-3\\sqrt5}$$ rationalised, and what are the official Q3 answers?","answer":"1. Multiply numerator and denominator by the conjugate $$7+3\\sqrt5$$.\n2. Denominator: $$49-9(5)=4$$; numerator expands to $$25+13\\sqrt5$$.\n3. Result [OFFICIAL]: $$\\frac{25}{4}+\\frac{13}{4}\\sqrt5$$; part (i) simplifies to $$2$$."},{"question":"Q4 (reviewed [AUDIO]): $$y=f(x)$$ has minimum $$P(-1,0)$$, maximum $$Q\\left(\\frac32,2\\right)$$ and asymptote $$y=1$$. State the images under (i) $$y=f(x)-2$$ and (ii) $$y=f(-x)$$, plus the trap that lost marks.","answer":"1. (i) Shift down 2: min $$(-1,-2)$$, max $$\\left(\\frac32,0\\right)$$, asymptote $$y=-1$$ [OFFICIAL].\n2. (ii) Reflect in the y-axis ($$x\\rightarrow-x$$, y unchanged): min $$(1,0)$$, max $$\\left(-\\frac32,2\\right)$$; the horizontal asymptote stays at $$y=1$$ [OFFICIAL].\n3. Trap [GUIDE-CLAIM]: correct coordinates alone do not score — the original attempt moved the asymptote to $$y=-1$$ and drew the wrong shape; a reflection in the y-axis is horizontal only and cannot move a horizontal asymptote."},{"question":"Q5 was NOT reviewed live (scored state [UNAVAILABLE]). What authoring error in the legacy completed-square form does the guide correct, and what self-check catches such an error?","answer":"1. The legacy guide printed $$12-(x+2)^2=-x^2-4x+8$$, dropping the coefficient; the correct first form keeps it: $$12-\\frac34(x+2)^2$$ [OFFICIAL].\n2. Self-check by substitution: at $$x=1$$ the wrong form gives $$3$$ while the chain's other members give $$0$$ — testing one convenient value exposes a broken \"=\" chain.\n3. Boundary: this is an authoring correction, not a lesson event; nothing about Q5's lesson scoring is evidenced."},{"question":"Q6 (re-solved live as extra teaching [AUDIO]): solve the simultaneous equations reducing to $$2x^4-15x^2-50=0$$. Give the decision chain and the conditions for full credit.","answer":"1. Substitute $$u=x^2$$: $$2u^2-15u-50=0$$.\n2. Factorise: $$(2u+5)(u-10)=0$$.\n3. Reject $$u=-\\frac52$$ — a square cannot be negative — so $$x^2=10$$.\n4. Exact pairs [OFFICIAL]: $$(\\sqrt{10},\\,4\\sqrt{10})$$ and $$(-\\sqrt{10},\\,-4\\sqrt{10})$$.\n5. Conditions/strategy: calculator-only solutions are barred — show every stage; and pick the more convenient variable to make the subject first (Student [AUDIO]: \"I choose the wrong one… take a step back\")."},{"question":"Q7 (reviewed; the heaviest loss of the reviewed set [GUIDE-CLAIM]): $$f'(x)=2x^{-1/2}+Ax^{-2}+3$$ with $$f''(4)=0$$, then $$f(12)=8\\sqrt3$$. Why did the original part (a) score zero, and what is the valid route?","answer":"1. Lesson principle [AUDIO]: a correct answer obtained from invalid working earns 0 marks — the method must justify the answer.\n2. Differentiate again: $$f''(x)=-x^{-3/2}-2Ax^{-3}$$; solve $$f''(4)=0$$ to get $$A=-4$$ [OFFICIAL].\n3. Integrate term by term, keeping fractional/negative indices exact: $$f(x)=4\\sqrt{x}+\\frac{4}{x}+3x+c$$, then fix $$c$$ using $$f(12)=8\\sqrt3$$.\n4. Keep constants exact [OFFICIAL]: $$f(x)=4\\sqrt{x}+\\frac{4}{x}+3x-\\frac{109}{3}$$ — a dropped power had corrupted the constant; never round to a decimal."},{"question":"Q9 (re-taught live [AUDIO]): how is $$y=\\sin2x$$ obtained from $$y=\\sin x$$, and how are both solutions of $$\\sin2x=p$$ found when $$\\sin\\alpha=p$$?","answer":"1. Doubling $$x$$ inside ⇒ horizontal stretch by factor $$\\frac12$$ — \"sweep every x-coordinate by a half\" [AUDIO] — so the period is $$180^\\circ$$ [OFFICIAL].\n2. First root: $$2x=\\alpha\\Rightarrow x=\\frac{\\alpha}{2}$$.\n3. Partner root via sine symmetry about the line of symmetry (the \"equal to negative sine alpha\" / equal-distances reasoning [AUDIO]): $$2x=180^\\circ-\\alpha\\Rightarrow x=90^\\circ-\\frac{\\alpha}{2}$$ [OFFICIAL].\n4. Part (a) official values: $$2p$$, $$-p$$, $$3-p$$."},{"question":"Simplify $$\\frac{9^{2n+1}\\cdot3^{4-3n}}{27^{\\,n-1}}$$ and state this item's status relative to the Summer-2022 paper.","answer":"1. Convert everything to base 3: $$9=3^2$$, $$27=3^3$$.\n2. Combine exponents: $$(4n+2)+(4-3n)-(3n-3)=9-2n$$.\n3. Result: $$3^{\\,9-2n}$$.\n4. Status: supplementary ESAT indices warm-up ([AUDIO]/[VISUAL-LEAD]) — NOT a WMA11 Summer-2022 question; it must never be presented as part of this exam paper."},{"question":"For the 16 June 2026 lesson, which Summer-2022 questions were reviewed, which was only touched, and how must Q5, Q8 and Q10 be described?","answer":"1. Reviewed live [AUDIO]: Q1, Q2, Q4, Q6 (as extra teaching), Q7, Q9; Q3 was touched briefly.\n2. Q5, Q8 and Q10 were NOT reviewed live — their scored state is unknown, never assumed blank or full (Q8/Q10 were visible on the shared worksheet, but no audio segment or verified frame shows them worked).\n3. Audio overrides the automated visual read: there is no ~19-minute idle tail, and several of its \"Q\" labels are mislabels (its \"Q5\" integration is official Q1; its \"Q8\" sine rule is official Q2; its \"Q8\" trig is official Q9)."},{"question":"Why does the guide refuse to present the legacy \"29/75\" as fact, and what is the honest score position?","answer":"1. \"29/75\" is [GUIDE-CLAIM] only: not spoken in the audio and not confirmed from any frame.\n2. The best-available per-question breakdown sums to $$\\approx 32/75$$ (review losses $$-21$$; blanking Q8 and Q10 adds at most $$-22$$).\n3. Reaching 29 would require $$\\geq 3$$ further lost marks inside Q3/Q5/Q6 — the very questions called \"essentially full\" — for which there is no evidence.\n4. Honest position: report $$\\approx 32/75$$ with a declared $$\\geq 3$$-mark unresolved delta, pending the cover-total frame and the Q3/Q5/Q6/Q8/Q10 script states [UNAVAILABLE]; do not publish \"29/75\" as reconciled."},{"question":"What is the guide's order of evidence authority, and what limits follow from the one-sided audio and the unavailable frame extraction?","answer":"1. Authority order: [OFFICIAL] question paper/mark scheme ▶ [AUDIO] timestamped transcript ▶ [VISUAL-LEAD] automated board read (lead only, never source authority); [GUIDE-CLAIM] = legacy assertions not independently confirmable; [UNAVAILABLE] = declared gaps, never inferred away.\n2. The audio is one-sided (Student's microphone): the Tutor's speech is largely inaudible, so no verbatim Tutor quote is confirmable; the Q1 annotation is a [VISUAL-LEAD] written board note, not a spoken quote.\n3. Frame extraction was unavailable: exact mark profiles, the cover total, and blank-vs-attempted states remain [VISUAL-LEAD]/[UNAVAILABLE] and are never upgraded to fact."}]}},ROLES=Object.keys(DATA);let active=ROLES[0],selected={};for(const r of ROLES)selected[r]=new Set(DATA[r].cards.map((_,i)=>i));
function typeset(){const x=document.getElementById('list');if(window.MathJax&&MathJax.typesetPromise){if(MathJax.typesetClear)MathJax.typesetClear([x]);MathJax.typesetPromise([x]).catch(()=>{})}}
