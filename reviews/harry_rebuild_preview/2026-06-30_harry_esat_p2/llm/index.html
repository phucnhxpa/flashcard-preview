<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2214%22 fill=%22%23006edc%22/><text x=%2232%22 y=%2243%22 text-anchor=%22middle%22 font-size=%2234%22 fill=%22white%22>ƒ</text></svg>"><title>Pure Mathematics 2 (WMA12/01) + ESAT warm-up · Maths ESAT warm-up + P2 (WMA12/01) — Maths lesson 30 June 2026; official WMA12/01 evidence — Multi-model flashcards</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;max-width:100%;overflow-x:hidden}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.5}.wrap{width:100%;max-width:980px;margin:auto;padding:26px 16px 70px;overflow-x:clip}header{text-align:center;margin:7px 0 18px}h1{font-size:30px;line-height:1.18;margin:0}.sub{color:#68686d;margin:6px 0}.tabs{display:flex;gap:7px;overflow-x:auto;padding:5px 1px 11px;scrollbar-width:thin}.tab{white-space:nowrap;border:1px solid #d2d2d7;background:#fff;border-radius:999px;padding:8px 12px;font:650 12px inherit;cursor:pointer}.tab.active{background:#006edc;color:#fff;border-color:#006edc}.tools{position:sticky;top:7px;z-index:5;display:flex;gap:7px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid #e2e2e7;border-radius:14px;padding:10px;margin-bottom:13px;box-shadow:0 2px 8px #0000000d}.tools button{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:6px 9px;font:600 12px inherit;cursor:pointer}.count{margin-left:auto;color:#68686d;font-size:12px;font-weight:650}.list{display:flex;flex-direction:column;gap:10px}.card{min-width:0;max-width:100%;background:#fff;border:1px solid #e1e1e6;border-radius:14px;padding:15px 16px;box-shadow:0 1px 4px #0000000a}.row{display:flex;gap:10px;align-items:flex-start;min-width:0}.pick{width:18px;height:18px;margin-top:3px;flex:0 0 auto}.qwrap{min-width:0;max-width:100%;flex:1}.q{font-weight:650;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;cursor:pointer;overflow-x:auto}.answer{display:none;white-space:pre-wrap;margin-top:10px;padding-top:10px;border-top:1px solid #ececf0;color:#3e3e43;overflow-wrap:anywhere;word-break:break-word;overflow-x:auto}.card.open .answer{display:block}.foot{display:flex;justify-content:flex-end;margin-top:8px}.copy{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:3px 8px;cursor:pointer}.notice{font-size:12px;color:#68686d;text-align:center;margin:12px 0}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#1d1d1f;color:#fff;border-radius:8px;padding:8px 14px;opacity:0;pointer-events:none}.toast.show{opacity:1}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}@media(max-width:430px){.wrap{padding:16px 10px 55px}h1{font-size:24px}.tools{top:4px}.count{width:100%;margin-left:0}.card{padding:13px 12px}}</style><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true},options:{skipHtmlTags:["script","noscript","style","textarea","pre","code"]}};</script><script defer src="assets/mathjax/es5/tex-mml-chtml.js"></script></head><body><main class="wrap"><header><h1>Pure Mathematics 2 (WMA12/01) + ESAT warm-up · Maths ESAT warm-up + P2 (WMA12/01) — Maths lesson 30 June 2026; official WMA12/01 evidence</h1><p class="sub">Direct model-output flashcards</p></header><nav id="tabs" class="tabs" aria-label="Models"></nav><nav class="tools"><button id="sel">Select all</button><button id="desel">Deselect all</button><button id="reveal">Reveal all</button><button id="hide">Hide all</button><button id="table">Copy table</button><span id="count" class="count"></span></nav><section id="list" class="list"></section><p class="notice">Model outputs are displayed directly as generated.</p></main><div id="toast" class="toast"></div><script>const DATA={"glm_1":{"label":"GLM 5.1 · Run 1","returned_model":"z-ai/glm-5.1","cards":[{"question":"When calculating the probability of a total of 12 from a fair die and a biased die, the student added the single-die probabilities. What is the correct rule for independent events, and what was the official-reference target answer?","answer":"\"And\" means multiply: Pr(total 12) = Pr(6_fair) × Pr(6_biased). The official-reference target was 1/45 (option B). [Deferred; target 1/45 official-reference only]"},{"question":"To find the bearing of the first leg of a clockwise regular pentagon track given the third leg bearing, what two conceptual steps are required, and what was the official-reference target answer?","answer":"1. Calculate the exterior angle: $$360°/5 = 72°$$. 2. Subtract two exterior turns from the third leg bearing: $$110° − 2(72°) = −34° ≡ 326°$$ (mod $$360°$$). The official-reference target was 326° (option H). [Deferred; bearing 326° official-reference only]"},{"question":"When approximating $$2.05^8$$ using the expansion of $$(2-5x)^8$$, what is the value of x to state, and what transcription slip caused mark loss in part (a)?","answer":"State $$x = −0.01$$ (from $$2 − 5x = 2.05$$). The slip was copying the exponent 8 as 2 on the first line, costing two marks. [Lesson evidence: corrected in review]"},{"question":"Given a geometric series with $$S_3 = 70.2$$ and $$S_\\infty = 75$$, what misreading caused a block, and what direct substitution route avoids the difference-of-cubes identity?","answer":"The misreading was treating 70.2 as the third term $$ar^2$$ rather than the sum $$S_3$$. The direct route substitutes $$a = 75(1-r)$$ into $$S_3$$: $$75(1-r^3) = 70.2$$, yielding $$r = 2/5$$ and $$a = 45$$. [Completed with prompting: r = 2/5, a = 45]"},{"question":"For $$f(x) = 3x^3 + ax^2 - 10x + b$$, dividing by $$(x-2)$$ leaves remainder b. What is the common trap when applying the Remainder Theorem, and how is it resolved?","answer":"The trap is misreading the condition \"remainder = b\" as \"remainder = 8\". Apply the Remainder Theorem directly: $$f(2) = b$$, which gives $$4a = -4$$, so $$a = -1$$. [Completed with prompting: a = −1, b = 8]"},{"question":"During polynomial long division, what sign-error trap occurs when subtracting rows, and what is the defensive strategy?","answer":"The trap is failing to subtract negative terms correctly (e.g., writing $$-x^2 - (-4x^2)$$ as $$-5x^2$$ instead of $$+3x^2$$). The strategy is to use brackets around the subtracted row to force correct signs. [Completed with prompting]"},{"question":"When finding the perpendicular bisector of AB where M = (5,4) and the gradient is −3, what point-slope transcription slip occurred, and what is the correct equation?","answer":"The slip was writing $$y - 5$$ (the x-coordinate of M) instead of $$y - 4$$ (the y-coordinate). The correct equation is $$y - 4 = -3(x - 5)$$, giving $$y = -3x + 19$$. [Completed live (slip corrected)]"},{"question":"After finding the centre P of a circle passing through B, what is the method to find the radius, and what is the correct circle equation for P(7,−2) and B(11,6)?","answer":"Draw a radius from P to B. The radius squared is $$r^2 = (11-7)^2 + (6+2)^2 = 80$$. The equation is $$(x-7)^2 + (y+2)^2 = 80$$. [Completed live (slip corrected)]"},{"question":"When solving a log equation, how must rejected solutions be justified, and what domain condition applies to $$2\\log_5(5-a) - \\log_5(a+25) = 1$$?","answer":"Write \"reject\" together with the violated positivity condition, not just a cross. The domain requires both arguments positive: $$-25 \u003c a \u003c 5$$, so reject a = 20 and accept a = −5. [Completed live (refined): a = −5]"},{"question":"To disprove \"if x and y are irrational and $$x \\neq y$$, then xy is irrational\", what rescaling strategy provides a valid counter-example?","answer":"Take one irrational number and multiply it by a rational factor (e.g., $$x = \\sqrt{2}$$ and $$y = 3\\sqrt{2}$$). Both are irrational and unequal, but $$xy = \\sqrt{2} \\cdot 3\\sqrt{2} = 6$$, which is rational. [Completed with prompting]"},{"question":"When proving that $$n^3 + 3n + 2$$ is always even but never a multiple of 4 for odd n, what common expansion error must be avoided, and what is the resulting mod 4 structure?","answer":"The error is squaring instead of cubing the odd integer substitution $$n = 2k+1$$. Expanding the cube yields $$8k^3 + 12k^2 + 12k + 6 = 4(2k^3 + 3k^2 + 3k + 1) + 2$$, which is ≡ 2 (mod 4). [Deferred / not completed live]"},{"question":"In the trapezium rule for $$\\int_{-1}^{4} \\log_{10}(x+5) \\, dx$$, how does the leading $$1/2$$ interact with the log expression to find k?","answer":"The leading $$1/2$$ becomes a square root inside the log: $$\\frac{1}{2} \\log[4 \\cdot 9 \\cdot (5 \\cdot 6 \\cdot 7 \\cdot 8)^2] = \\log_{10} \\sqrt{36 \\cdot 1680^2} = \\log_{10} (6 \\cdot 1680)$$, giving k = 10080. [Completed live (refined)]"}]},"glm_2":{"label":"GLM 5.1 · Run 2","returned_model":"z-ai/glm-5.1","cards":[{"question":"For independent events like rolling two dice to get a specific total (e.g., NSAA Q19), what is the common trap when combining single-die probabilities, and what is the correct method?","answer":"1. Trap: Adding the probabilities (treating \"and\" as \"or\").\n2. Correct method: \"And\" means multiply. For example, Pr(total 12) = Pr(6 on die 1) × Pr(6 on die 2).\n*Lesson evidence:* The student added independent probabilities; the tutor corrected this to multiply."},{"question":"To find the bearing of a leg of a regular polygon track given the bearing of another leg (e.g., NSAA Q20), what geometric principle and bearing definition must you use?","answer":"1. Definition: A bearing is the clockwise angle from north at the point in question.\n2. Principle: Walking once around any polygon turns through 360°, so each exterior turn of a regular $$n$$-sided polygon is $$360°/n$$.\n3. Method: Add or subtract multiples of the exterior angle to move between leg bearings.\n*Lesson evidence:* Student mislabelled 360/5 as the interior angle and answered 0°; target bearing 326° was official-reference only."},{"question":"When using a binomial expansion like $$(2-5x)^8$$ to approximate a number like $$2.05^8$$ (P2 Q2), what two traps must you avoid regarding the setup and command words?","answer":"1. Copy errors: Ensure the exponent is copied correctly (the student copied 8 as 2).\n2. Over-reading the demand: Match the representation $$2-5x = 2.05$$ to find $$x = -0.01$$. If the command word is \"state\", only state $$x$$; do not calculate the full numerical approximation.\n*Lesson evidence:* Student copied exponent 8 as 2 and over-read the demand."},{"question":"In a geometric series problem (P2 Q4), what is the critical distinction between $$S_3$$ and $$ar^2$$, and what is the efficient strategy when both $$S_\\infty$$ and $$S_3$$ are given?","answer":"1. Trap: Misreading the sum of the first three terms as the third term. $$S_3 = a + ar + ar^2$$, NOT just $$ar^2$$.\n2. Strategy: Substitute $$S_\\infty = a/(1-r)$$ directly into the $$S_3$$ formula to eliminate $$a$$ first, rather than using difference-of-cubes identities.\n*Lesson evidence:* Student misread 70.2 as $$ar^2$$; tutor pivoted to the simpler direct substitution route."},{"question":"When applying the Remainder Theorem (P2 Q5) to $$f(x)$$ divided by $$(x-2)$$, how should you interpret the condition \"the remainder is $$b$$\" (where $$b$$ is a constant in $$f(x)$$)?","answer":"Trap: Do not substitute a specific numerical value for the remainder unless one is given.\nSet $$f(2) = b$$ exactly as written. For $$f(x) = 3x^3 + ax^2 - 10x + b$$, this gives $$24 + 4a - 20 + b = b$$, which simplifies to $$4a = -4$$.\n*Lesson evidence:* Completed with prompting; the remainder wording is a key trap."},{"question":"When performing polynomial long division (P2 Q5), what is a common sign error and how do you prevent it?","answer":"1. Trap: Subtracting a negative term incorrectly (e.g., $$-x^2 - (-4x^2)$$ evaluated wrongly).\n2. Prevention: Use brackets around the entire row being subtracted. For example, writing $$-x^2 - (-4x^2)$$ makes it clear the result is $$+3x^2$$.\n*Lesson evidence:* Student had a sign slip in long division; tutor emphasised using brackets when subtracting rows."},{"question":"When finding the perpendicular bisector of a line segment (P2 Q6) using the point-slope form $$y - y_1 = m(x - x_1)$$ at the midpoint, what is a common transposition slip?","answer":"Trap: Substituting the $$x$$-coordinate of the midpoint for $$y_1$$.\nFor a midpoint $$(5, 4)$$, the correct substitution is $$y - 4 = m(x - 5)$$, NOT $$y - 5 = m(x - 4)$$.\n*Lesson evidence:* Student wrote $$y-5$$ (the $$x$$-coordinate) instead of $$y-4$$, propagating the constant to $$+20$$ instead of $$+19$$."},{"question":"If you know the centre $$P$$ of a circle and a point $$B$$ on the circumference (P2 Q6), but the radius is not immediately obvious, how do you find the radius squared ($$r^2$$) for the circle equation?","answer":"Strategy: The radius is simply the distance from the centre to any point on the circumference. Calculate $$r^2 = (x_B - x_P)^2 + (y_B - y_P)^2$$ using the coordinates of $$P$$ and $$B$$.\n*Lesson evidence:* Student was stuck on the unknown radius; tutor's \"draw a radius\" prompt from $$P$$ to $$B$$ unlocked it."},{"question":"When using the trapezium rule to approximate $$\\int \\log_{10} f(x) \\, dx$$ (P2 Q7) and the result must be written as $$\\log_{10} k$$, how does the leading $$\\frac{1}{2}$$ in the formula interact with the log product law?","answer":"1. The trapezium rule sums terms inside a $$\\frac{1}{2}\\{...\\}$$ bracket, which yields a product under a single log.\n2. The leading $$\\frac{1}{2}$$ becomes a square root via the log power law: $$\\frac{1}{2} \\log_{10}(M) = \\log_{10}(\\sqrt{M})$$.\n3. Therefore, $$k = \\sqrt{\\text{product of all table values}}$$.\n*Lesson evidence:* Student did not absorb the leading $$\\frac{1}{2}$$; tutor refined the final form live."},{"question":"After solving a logarithmic equation (P2 Q7) and finding two algebraic solutions, how must you justify rejecting an invalid solution?","answer":"Trap: Simply crossing out the invalid solution is insufficient.\nJustification: Write \"reject\" alongside the specific violated positivity condition of the log arguments. For example, if the domain requires $$-25 \u003c a \u003c 5$$, reject $$a = 20$$ because it violates the positivity of the arguments.\n*Lesson evidence:* Student's rejection was thin; tutor required writing \"reject\" plus the violated condition."},{"question":"To disprove the claim \"if $$x$$ and $$y$$ are irrational and $$x \\neq y$$, then $$xy$$ is irrational\" (P2 Q8), what strategy quickly generates a valid counter-example?","answer":"Strategy: Rescale one irrational factor by a rational multiplier.\nTake $$x = \\sqrt{2}$$ and $$y = 3\\sqrt{2}$$. Both are irrational and unequal, but their product is $$x \\cdot y = \\sqrt{2} \\cdot 3\\sqrt{2} = 3 \\times 2 = 6$$, which is rational. One valid counter-example is sufficient.\n*Lesson evidence:* Completed with prompting; tutor prompted to rescale one factor after student tried $$\\sqrt{2}\\cdot\\sqrt{5}$$."},{"question":"When proving that $$n^3 + 3n + 2$$ is always even but never a multiple of 4 for every odd integer $$n$$ (P2 Q8), what is the correct algebraic setup and what common trap must be avoided?","answer":"1. Setup: Substitute $$n = 2k + 1$$ (where $$k$$ is an integer) for an odd integer.\n2. Trap: Expanding the square $$n^2$$ instead of the required cube $$n^3$$. You must expand $$(2k+1)^3$$, not $$(2k+1)^2$$, to correctly prove the statement.\n*Lesson evidence:* Deferred / not completed live. Student squared instead of cubing; tutor wrote clean first line $$n=2k+1$$ only."}]},"glm_3":{"label":"GLM 5.1 · Run 3","returned_model":"z-ai/glm-5.1","cards":[{"question":"For two independent dice rolled together, a total of 12 requires a six on *both* dice. What probability operation links the two single-die probabilities, and what is the common trap?","answer":"1. **\"And\" means multiply:** for independent events, $$\\Pr(\\text{total 12}) = \\Pr(6_{\\text{fair}}) \\times \\Pr(6_{\\text{biased}})$$. 2. **Trap:** adding the probabilities instead of multiplying — addition is for \"or\" (mutually exclusive), not \"and\". *[Lesson evidence: NSAA Q19 — student added where multiplication was required. Deferred; target 1/45 official-reference only.]*"},{"question":"A regular pentagon track is traversed clockwise. The third leg is on bearing 110°. What is the exterior angle, and how do you find the first-leg bearing?","answer":"1. **Exterior angle first:** one full circuit turns 360°, so each exterior turn = $$360°/5 = 72°$$. 2. The interior angle $$180° - 72° = 108°$$ is an intermediate fact, not the answer. 3. **Working backwards:** each clockwise turn adds 72° to the heading, so the first leg is two turns *before* the third: $$110° - 2(72°) = -34° \\equiv 326° \\pmod{360°}$$. *[Lesson evidence: NSAA Q20 — student mislabelled 360/5 as interior and used page axis not true north. Deferred; bearing 326° official-reference only.]*"},{"question":"In a geometric-series question, $$S_\\infty = 75$$ and $$S_3 = 70.2$$. Why must you read \"70.2\" as the *sum* of the first three terms, and what is the efficient route to find $$r$$?","answer":"1. **Trap:** misreading 70.2 as the third term $$ar^2$$ instead of $$S_3 = a(1-r^3)/(1-r)$$. 2. **Efficient route (direct substitution):** substitute $$a = 75(1-r)$$ from $$S_\\infty$$ directly into $$S_3$$: $$75(1-r^3) = 70.2$$, so $$1-r^3 = 70.2/75 = 117/125$$, giving $$r^3 = 8/125$$, hence $$r = 2/5$$ and $$a = 45$$. 3. A cubes-factorisation route works but is harder. *[Lesson evidence: P2 Q4 — student misread 70.2 as ar²; completed with prompting.]*"},{"question":"When a question states \"dividing $$f(x)$$ by $$(x-2)$$ leaves remainder $$b$$\" (where $$b$$ is a constant already in the expression), what is the trap and how do you proceed?","answer":"1. **Trap:** substituting and getting a numerical remainder, then setting it equal to some separate value. The condition is literally $$f(2) = b$$ — the remainder equals the *symbol* $$b$$ already present in $$f(x)$$. 2. Write $$f(2) = b$$, expand, and the $$b$$-terms cancel on both sides, yielding an equation purely in $$a$$. 3. Then back-substitute into the earlier relation to find $$b$$. *[Lesson evidence: P2 Q5 — remainder = b condition correctly applied after prompting; a = −1, b = 8.]*"},{"question":"When writing the equation of a perpendicular bisector through midpoint $$M = (5, 4)$$ with gradient −3, what is the common substitution slip and how do you guard against it?","answer":"1. **Trap:** writing $$y - \\mathbf{5}$$ (the x-coordinate) instead of $$y - \\mathbf{4}$$ (the y-coordinate) in the point-slope form $$y - y_1 = m(x - x_1)$$. 2. This propagates: $$y - 5 = -3(x-5)$$ gives $$y = -3x + 20$$ (wrong), but the correct $$y - 4 = -3(x-5)$$ gives $$y = -3x + 19$$. 3. **Check:** always label which number is the y-coordinate of M before substituting. *[Lesson evidence: P2 Q6 — slip y−5 corrected to y−4; completed live.]*"},{"question":"After solving a logarithmic equation and obtaining two candidate values, what must the rejection step explicitly state — and what is the domain condition for $$\\log_b(g(a))$$?","answer":"1. **Domain condition:** the argument must be strictly positive, i.e. $$g(a) \u003e 0$$ for every logarithm in the original equation. 2. **Rejection format:** write \"reject\" alongside the *specific violated condition* (e.g. \"reject $$a = 20$$: then $$5 - a = -15 \u003c 0$$\"), not merely a cross. 3. For $$2\\log_5(5-a) - \\log_5(a+25) = 1$$, the domain is $$-25 \u003c a \u003c 5$$, so reject $$a = 20$$, accept $$a = -5$$. *[Lesson evidence: P2 Q7(ii) — rejection was thinly justified; refined live.]*"},{"question":"To disprove \"if $$x$$ and $$y$$ are irrational and $$x \\neq y$$, then $$xy$$ is irrational,\" what rescaling strategy reliably produces a counter-example?","answer":"1. Pick one known irrational, e.g. $$\\sqrt{2}$$. 2. **Rescale** it by a rational factor ≠ 1: set $$y = 3\\sqrt{2}$$. Both $$\\sqrt{2}$$ and $$3\\sqrt{2}$$ are irrational and unequal. 3. Their product $$xy = \\sqrt{2} \\cdot 3\\sqrt{2} = 3 \\times 2 = 6$$ is rational. 4. One valid counter-example suffices; no need for further cases. *[Lesson evidence: P2 Q8(i) — student tried √2·√5 (still irrational); completed with prompting after rescaling hint.]*"},{"question":"To prove that for every odd integer $$n$$, $$n^3 + 3n + 2$$ is always even but never a multiple of 4, what substitution opens the proof and what is the critical \"cube not square\" trap?","answer":"1. **Substitution:** let $$n = 2k + 1$$ (every odd integer has this form). 2. **Trap:** expanding $$n^2$$ instead of $$n^3$$ — the expression contains a *cube*, and the square version does not yield the required result. 3. Expand the cube: $$(2k+1)^3 + 3(2k+1) + 2 = 8k^3 + 12k^2 + 12k + 6 = 4(2k^3 + 3k^2 + 3k + 1) + 2$$. 4. This is $$\\equiv 2 \\pmod{4}$$ for all integer $$k$$: even, but never divisible by 4. *[Lesson evidence: P2 Q8(ii) — student squared instead of cubing; \"cube not square!\" noted on board. Deferred after first line.]*"},{"question":"In a binomial-expansion question asking for \"the first four terms, in ascending powers of $$x$$, in simplest form,\" what exam-technique steps prevent mark loss?","answer":"1. **Underline each command word** before writing: \"first four terms,\" \"ascending powers,\" \"simplest form,\" \"state.\" 2. **Copy the exponent correctly** — a transcription slip (e.g. 8 → 2) costs the first-term method mark and the final accuracy mark. 3. Use $${n \\choose r}$$ and descending powers of the constant term. 4. For part (b), match $$(2 - 5x)^8$$ to the target number by solving $$2 - 5x = 2.05$$, giving $$x = -0.01$$; \"state\" means write the value, not a full approximation. *[Lesson evidence: P2 Q2 — exponent 8 copied as 2; demand over-read.]*"},{"question":"For Pearson IAL P2, which key items are *supplied* in the formula booklet and which must be memorised or derived?","answer":"**Supplied:** arithmetic-series nth term and sum; geometric-series nth term, finite sum, and sum to infinity (for $$|r| \u003c 1$$); change-of-base rule for logarithms; binomial theorem (positive integer index); trapezium rule. **Not supplied (must learn/derive):** difference of two cubes; Factor and Remainder Theorems; circle equation $$(x-a)^2 + (y-b)^2 = r^2$$; perpendicular-gradient rule $$m_1 m_2 = -1$$; log product/quotient/power laws; proof structures. *[Formula-booklet boundary, Section 6.]*"},{"question":"When applying the trapezium rule to $$\\int_{-1}^{4} \\log_{10}(x+5)\\,dx$$ with strip width 1, how does the leading $$\\frac{1}{2}$$ factor convert into the required $$\\log_{10} k$$ form?","answer":"1. The trapezium rule gives $$\\frac{1}{2}\\{\\log 4 + \\log 9 + 2(\\log 5 + \\log 6 + \\log 7 + \\log 8)\\}$$. 2. Combine all logs into one: the sum of logs = $$\\log$$ of the product, so you get $$\\frac{1}{2}\\log[\\text{product}]$$. 3. **The leading $$\\frac{1}{2}$$ becomes a square root:** $$\\frac{1}{2}\\log P = \\log P^{1/2} = \\log\\sqrt{P}$$. 4. Compute: $$\\sqrt{36 \\times 1680^2} = 6 \\times 1680 = 10080$$, so $$k = 10080$$. *[Lesson evidence: P2 Q7(i) — leading ½ not absorbed; completed live after refinement.]*"},{"question":"After finding the centre $$P(7, -2)$$ of a circle passing through $$B(11, 6)$$, how do you determine the radius without a diagram, and what is the circle equation?","answer":"1. **Radius = distance from centre to any known point on the circle.** Use $$B$$: $$r^2 = (11-7)^2 + (6-(-2))^2 = 4^2 + 8^2 = 16 + 64 = 80$$. 2. **Trap:** being stuck on the unknown radius when you already have the centre and a point — \"draw a radius\" from centre to a known point. 3. Circle equation: $$(x - 7)^2 + (y + 2)^2 = 80$$. *[Lesson evidence: P2 Q6(c) — stuck on radius; unlocked by tutor's \"draw a radius\" prompt. Completed live.]*"}]},"qwen_1":{"label":"Qwen 3.7 Max","returned_model":"qwen/qwen3.7-max","cards":[{"question":"In a probability question involving two independent dice (one fair, one biased), what is the fundamental operational trap when finding the probability of a specific combined outcome, and how should the biased die's probability mass be consistently allocated?","answer":"1. **Operational trap:** Adding the probabilities of the single-die outcomes instead of multiplying them (\"AND\" means multiply for independent events).\n2. **Mass allocation:** Assign a consistent variable (e.g., $$P$$) to the equal outcomes (1 to 5), making the probability of the biased outcome (6) equal to $$1 - 5P$$, ensuring all six probabilities sum to 1."},{"question":"When calculating the bearing of a subsequent leg of a regular polygon track (e.g., a regular pentagon run clockwise), what are the two common conceptual traps regarding the reference direction and the angle used for turning?","answer":"1. **Reference direction trap:** Measuring the angle from the page's vertical axis instead of true north (bearings are strictly clockwise from north).\n2. **Angle trap:** Using the interior angle instead of the exterior angle. The heading changes by the exterior angle (e.g., $$360^\\circ / 5 = 72^\\circ$$ for a pentagon) at each vertex."},{"question":"When a binomial expansion question asks to approximate a value like $$2.05^8$$ using the expansion of $$(2 - 5x)^8$$, what is the most reliable algebraic strategy to find the required value of $$x$$, and which command words must be checked before writing the final expansion?","answer":"1. **Strategy:** Equate the algebraic base to the numerical base (i.e., set $$2 - 5x = 2.05$$), then solve for $$x$$ (yielding $$-5x = 0.05 \\implies x = -0.01$$).\n2. **Command words to check:** \"first [number] terms\", \"ascending powers\", \"simplest form\", and \"state\" (if no calculation of the final approximation is required)."},{"question":"When given both the sum of the first three terms ($$S_3$$) and the sum to infinity ($$S_\\infty$$) of a geometric series, why is the direct substitution route preferred over the difference-of-cubes identity, and what is the key substitution step?","answer":"1. **Reason:** The difference-of-cubes route ($$1 - r^3 = (1 - r)(1 + r + r^2)$$) makes the algebra unnecessarily complex and prone to copying slips.\n2. **Key step:** Substitute the expression for $$S_\\infty = \\frac{a}{1 - r}$$ directly into the $$S_3 = \\frac{a(1 - r^3)}{1 - r}$$ formula, replacing $$\\frac{a}{1 - r}$$ with the given $$S_\\infty$$ value to solve directly for $$r^3$$."},{"question":"In a Remainder Theorem question stating \"dividing $$f(x)$$ by $$(x - 2)$$ leaves remainder $$b$$\" (where $$b$$ is a constant in the original polynomial), what is the critical reading trap, and how should polynomial long division subtraction be formatted to avoid sign errors?","answer":"1. **Reading trap:** Assuming the remainder is a specific numerical value (like 8) rather than the algebraic variable $$b$$ itself. You must set $$f(2) = b$$.\n2. **Formatting trap:** Failing to use brackets when subtracting rows in long division (e.g., writing $$-x^2 - -4x^2$$ instead of $$-x^2 - (-4x^2)$$), which leads to sign slips."},{"question":"When finding the equation of a perpendicular bisector passing through a midpoint $$M(x_1, y_1)$$, what specific transposition slip commonly occurs in the point-slope form, and how can geometry diagram annotation prevent it?","answer":"1. **Transposition slip:** Substituting the $$x$$-coordinate into the $$y$$-position (e.g., writing $$y - 5$$ instead of $$y - 4$$ when the midpoint is $$(5, 4)$$), which propagates an error into the $$y$$-intercept.\n2. **Prevention:** Annotate the geometry diagram explicitly with the recovered midpoint coordinates, the centre, and a usable radius segment before writing the equation."},{"question":"When applying the trapezium rule to a logarithmic function (e.g., $$y = \\log_{10}(x + 5)$$) and the result must be expressed in the form $$\\log_{10} k$$, how is the leading $$\\frac{1}{2}$$ from the trapezium rule formula absorbed into the logarithmic expression?","answer":"1. Combine the summed log terms into a single logarithm using log laws (e.g., $$\\log(A) + 2\\log(B) = \\log(A \\cdot B^2)$$).\n2. The leading $$\\frac{1}{2}$$ is absorbed by applying the power rule of logarithms in reverse: $$\\frac{1}{2} \\log(X) = \\log(X^{1/2}) = \\log(\\sqrt{X})$$, meaning the argument $$k$$ is the square root of the combined product."},{"question":"When solving a logarithmic equation that yields a quadratic with two roots (e.g., $$a = 20$$ and $$a = -5$$), what is the strict requirement for rejecting an extraneous root, and what specific condition must be written alongside the rejection?","answer":"1. **Requirement:** You must explicitly write the word \"reject\" rather than merely drawing a cross through the value.\n2. **Condition:** You must state the violated positivity condition (the natural domain where all original log arguments are strictly positive, e.g., $$-25 \u003c a \u003c 5$$), proving why the specific root is invalid."},{"question":"To disprove the claim \"if $$x$$ and $$y$$ are distinct irrational numbers, then $$xy$$ is irrational\", what is the most reliable strategy for constructing a counter-example, and why does simply picking two random surds (like $$\\sqrt{2}$$ and $$\\sqrt{5}$$) fail?","answer":"1. **Strategy:** Rescale one irrational factor by a rational number (e.g., let $$x = \\sqrt{2}$$ and $$y = 3\\sqrt{2}$$). They are distinct and irrational, but their product ($$3 \\times 2 = 6$$) is rational.\n2. **Why random surds fail:** Picking unrelated surds (like $$\\sqrt{2} \\times \\sqrt{5} = \\sqrt{10}$$) typically results in another irrational number, failing to disprove the claim."},{"question":"When proving a property for \"every odd integer $$n$$\" involving the expression $$n^3 + 3n + 2$$, what are the two critical algebraic traps to avoid regarding the definition of $$n$$ and the expansion of the leading term?","answer":"1. **Definition trap:** Using $$n = 2n + 1$$ (reusing the variable) instead of defining $$n = 2k + 1$$ where $$k$$ is an integer.\n2. **Expansion trap:** Squaring the leading term ($$n^2$$) instead of cubing it ($$n^3$$) during the algebraic expansion, which completely invalidates the parity proof."},{"question":"In the Pearson IAL Pure Mathematics 2 (WMA12/01) formula booklet, which three specific mathematical tools or identities are **not** provided and must therefore be memorised or derived, despite being heavily tested?","answer":"1. The difference of two cubes identity (e.g., $$1 - r^3 = (1 - r)(1 + r + r^2)$$).\n2. The Factor and Remainder Theorems.\n3. The standard equation of a circle $$(x - a)^2 + (y - b)^2 = r^2$$ (and the perpendicular-gradient rule $$m_1 m_2 = -1$$)."},{"question":"When performing polynomial long division to fully factorise a cubic, what specific formatting rule must be applied when subtracting the multiplied rows to prevent sign errors, and what should be done if a \"show that\" part yields a remainder?","answer":"1. **Formatting rule:** Always use brackets when subtracting rows containing negative terms (e.g., write $$-x^2 - (-4x^2)$$ rather than $$-x^2 - -4x^2$$) to ensure the double negative is correctly resolved to a positive.\n2. **Remainder check:** If a \"show that\" part (e.g., showing a linear expression is a factor) leaves a non-zero remainder due to a sign slip, re-evaluate the subtraction steps immediately, as the remainder must be exactly zero."}]},"minimax_1":{"label":"MiniMax M3 · Run 1","returned_model":"minimax/minimax-m3","cards":[{"question":"A six-sided fair die and a biased die are rolled. The biased die lands on 1–5 with equal probability and on 6 with a different probability. Given Pr(total = 12) = 1/18, find Pr(total = 2). Which modelling traps must be avoided?","answer":"1. \"Total = 12\" means **both** dice show 6 — independent events, so **multiply**, do not add.  \n2. Let Pr(6 on biased) = q. Then (1/6)·q = 1/18 ⇒ q = 1/3.  \n3. Each of 1–5 on the biased die has probability (1 − 1/3)/5 = 2/15.  \n4. \"Total = 2\" needs a 1 on both dice: (1/6)·(2/15) = 2/90 = **1/45**.  \nTrap: do not label the biased mass inconsistently; \"and\" ⇒ multiply."},{"question":"A cross-country track is a regular pentagon; runners go clockwise. On the third leg the bearing is 110°. What is the bearing on the first leg? State the two reasoning traps to avoid.","answer":"1. Bearing is the **clockwise angle from north**, not from the page axis.  \n2. Exterior angle of any regular polygon = 360°/n; for n = 5, exterior = **72°** (interior = 108° is not the answer).  \n3. Each clockwise leg changes the heading by the exterior angle. The first leg is **two turns before** the third.  \n4. 110° − 2(72°) = −34° ≡ **326°** (option H).  \nTraps: do not use the interior angle as the turn; do not measure from the page."},{"question":"In the binomial expansion of (2 − 5x)^8, what are the first four terms in ascending powers of x, in simplest form, and what value of x should be stated to approximate 2.05^8?","answer":"1. Use C(8, r) with descending powers of 2 and ascending powers of x:  \n   (2 − 5x)^8 = **256 − 5120x + 44800x² − 224000x³ + ⋯**  \n2. To approximate 2.05^8, match 2 − 5x = 2.05, so −5x = 0.05 ⇒ **x = −0.01**.  \n3. Underline command words \"first four terms\", \"ascending\", \"simplest form\", \"state\" before writing.  \nTrap: do not copy the exponent 8 as 2 (transcription slip); \"state\" means no numerical evaluation."},{"question":"A geometric series has S₃ = 70.2 and S∞ = 75. Find the common ratio r and the first term a. Which misreading must be avoided?","answer":"1. Do **not** read 70.2 as the third term ar²; it is the **sum of the first three terms** S₃.  \n2. From S∞ = a/(1 − r) = 75, substitute a = 75(1 − r) into S₃ = a(1 − r³)/(1 − r) = 70.2.  \n3. Simplifies to 75(1 − r³) = 70.2 ⇒ 1 − r³ = 70.2/75 = 117/125 ⇒ r³ = 8/125 ⇒ **r = 2/5**.  \n4. Back-substitute: a = 75(1 − 2/5) = **45**."},{"question":"f(x) = 3x³ + ax² − 10x + b, with (3x − 4) a factor and f(x) ÷ (x − 2) leaves remainder b. Find a and b, then factorise f(x) fully. What wording trap must be watched?","answer":"1. Factor Theorem: 3x − 4 = 0 ⇒ x = 4/3, so f(4/3) = 0, giving 16a + 9b = 56.  \n2. Remainder Theorem: remainder = **b** (not \"b = 8\" — that would be a misread). So f(2) = b.  \n3. f(2) = 24 + 4a − 20 + b = b ⇒ 4a = −4 ⇒ **a = −1**; then 16(−1) + 9b = 56 ⇒ **b = 8**.  \n4. f(x) = 3x³ − x² − 10x + 8 = (3x − 4)(x² + x − 2) = **(3x − 4)(x + 2)(x − 1)**.  \nTrap: use brackets when subtracting rows in long division to avoid sign slips."},{"question":"A(−1, 2) and B(11, 6) lie on a circle with centre P. M is the midpoint of AB and l passes through M and P perpendicular to AB. Find l in the form y = mx + c, then k given P = (7, k), then the circle equation. Which coordinate trap must be avoided?","answer":"1. M = ((−1+11)/2, (2+6)/2) = **(5, 4)**. Gradient AB = (6−2)/(11−(−1)) = 1/3, so perpendicular gradient = −3.  \n2. Use M's **y-coordinate** in the point-slope form: y − 4 = −3(x − 5) ⇒ **y = −3x + 19**.  \n3. Trap: do not write y − 5 (the x-coordinate) instead of y − 4; it propagates the constant to +20.  \n4. P(7, k) on l: k = −3(7) + 19 = **−2**.  \n5. Radius² = (11−7)² + (6−(−2))² = 16 + 64 = 80, so **(x − 7)² + (y + 2)² = 80**."},{"question":"Using the trapezium rule with strip width 1 on y = log₁₀(x + 5) at x = −1, 0, 1, 2, 3, 4, show the integral ≈ log₁₀ k and find the integer k. What form trap must be avoided?","answer":"1. Trapezium rule: ½{log 4 + log 9 + 2(log 5 + log 6 + log 7 + log 8)}.  \n2. Combine using log laws: ½ log[4 · 9 · (5·6·7·8)²] = log₁₀ √(36 · 1680²).  \n3. The leading ½ becomes a **square root**, not a separate factor.  \n4. k = √(36 · 1680²) = 6 · 1680 = **10 080**."},{"question":"Solve 2 log₅(5 − a) − log₅(a + 25) = 1. What domain trap must be handled explicitly?","answer":"1. Combine: log₅[(5 − a)²/(a + 25)] = 1 ⇒ (5 − a)² = 5(a + 25).  \n2. Expand: a² − 10a + 25 = 5a + 125 ⇒ a² − 15a − 100 = 0 ⇒ (a − 20)(a + 5) = 0.  \n3. Strict domain: both arguments positive ⇒ 5 − a \u003e 0 and a + 25 \u003e 0, so **−25 \u003c a \u003c 5**.  \n4. **Reject a = 20**; accept **a = −5**.  \n5. Write \"reject\" together with the violated positivity condition, not just a cross."},{"question":"Disprove by counter-example: \"if x and y are irrational and x ≠ y, then xy is irrational.\" Give one valid pair and state the misconception to avoid.","answer":"1. Misconception: \"decimal goes forever\" ≠ irrational — 0.3̄ = 1/3 is rational.  \n2. Take x = √2 and y = 3√2. Both irrational and unequal.  \n3. xy = √2 · 3√2 = 3 · 2 = **6**, which is rational. One counter-example suffices."},{"question":"Prove that for every odd integer n, n³ + 3n + 2 is always even but never a multiple of 4. State the substitution and the key algebraic identity.","answer":"1. Write every odd integer as n = 2k + 1 with k ∈ ℤ.  \n2. Expand the **cube**: n³ + 3n + 2 = (2k + 1)³ + 3(2k + 1) + 2 = 8k³ + 12k² + 6k + 1 + 6k + 3 + 2 = 8k³ + 12k² + 12k + 6.  \n3. Factor out 4: = 4(2k³ + 3k² + 3k + 1) + 2.  \n4. So n³ + 3n + 2 ≡ 2 (mod 4): always even, never divisible by 4.  \nTrap: do not expand (2k + 1)² — the target is a cube, not a square."},{"question":"An open-topped cuboid has base 3x by x, height y, volume 120 m³. Show A = Px² + Q/x, find the stationary x to 3 s.f., and confirm it is a minimum. State P and Q.","answer":"1. Volume: 3x²y = 120 ⇒ y = 40/x².  \n2. Sheet-metal area: A = 3x² + 2(3x)y + 2xy = 3x² + 8xy = 3x² + 320/x, so **P = 3, Q = 320**.  \n3. A′ = 6x − 320/x² = 0 ⇒ x³ = 160/3 ⇒ **x ≈ 3.76** (3 s.f.).  \n4. A″ = 6 + 640/x³ \u003e 0 for x \u003e 0, confirming a minimum."},{"question":"Which items from this lesson are *not* safe to claim as \"completed live\", and what is their correct status label?","answer":"Four items were **not completed live** and appear only as official-reference study:  \n1. **NSAA Q19** (biased dice) — target 1/45 is official-reference only.  \n2. **NSAA Q20** (pentagon bearing) — bearing 326° is official-reference only.  \n3. **P2 Q3** (cuboid optimisation) — left blank, no time.  \n4. **P2 Q8(ii)** (parity proof) — only the first clean line n = 2k + 1 was written; the rest is deferred.  \nAdditionally, P2 Q1 was only reviewed (pre-lesson correct), and Q9/Q10 were not taught at all."}]},"minimax_2":{"label":"MiniMax M3 · Run 2","returned_model":"minimax/minimax-m3","cards":[{"question":"(NSAA Q19 warm-up) A fair die and a biased die are rolled; the biased die shows 1–5 with equal probability and shows 6 with some other probability. Given that Pr(total = 12) = 1/18, find Pr(total = 2). Why must independent probabilities be multiplied, not added, here?","answer":"1. Let Pr(6 on biased) = q. Total 12 needs a 6 on *each* die, so Pr = (1/6)q = 1/18 ⇒ q = 1/3.\n2. Then each of 1–5 on the biased die has probability (1 − 1/3)/5 = 2/15.\n3. Total 2 needs a 1 on *each* die (independent AND): Pr = (1/6)(2/15) = 2/90 = **1/45** (option B).\n4. Trap: events like \"fair die shows 6 *and* biased die shows 6\" are independent, so **multiply**; adding would double-count the joint outcome.\n5. Trap: don't use a P/5 parameterisation without first declaring P as the *total* mass on 1–5, else 1 − 5P = q is misapplied."},{"question":"(NSAA Q20 warm-up) On a regular-pentagon cross-country track run clockwise, the third leg has bearing 110°. What is the bearing of the first leg? State two rules the lesson recovered.","answer":"1. **Bearing = clockwise angle from north** at the starting point of the leg (not from the page's vertical axis).\n2. Total turning walking round any polygon = 360°, so the **exterior angle of a regular pentagon = 360°/5 = 72°**; interior = 180° − 72° = 108° (intermediate, not the answer).\n3. Each clockwise leg changes heading by 72°; the first leg is two turns *before* the third.\n4. 110° − 2(72°) = 110° − 144° = −34° ≡ **326°** (option H).\n5. Trap: a bearing of 0° is north, not \"up the page\"; ignore 0°/360° aliases only after explicit modular reduction."},{"question":"(P2 Q1) For the arithmetic series 2 + 5 + 8 + 11 + ⋯ + 254, give the two standard formula checks you apply for (a) number of terms and (b) the sum, with the correct values.","answer":"1. Identify a, d, and the last term ℓ: a = 2, d = 3, ℓ = 254.\n2. (a) Number of terms n = (ℓ − a)/d + 1 = (254 − 2)/3 + 1 = **85**.\n3. (b) Sum S = (n/2)(a + ℓ) = (85/2)(2 + 254) = 85 × 128 = **10 880**.\n4. Sanity: S₈₅ ≈ 85 × 128, so ~10⁴ magnitude — consistent with a three-digit average and ~10² terms.\n5. Trap: don't use the (ℓ − a)/d step without the +1; the last term itself counts as one term."},{"question":"(P2 Q2) State the choice of x that lets (2 − 5x)⁸ ≈ 2.05⁸, and the first four ascending terms. What command words should be underlined before writing?","answer":"1. Match by representation: 2 − 5x = 2.05 ⇒ −5x = 0.05 ⇒ **x = −0.01**.\n2. Expand with C(8, r)(2)^(8−r)(−5x)^r, descending powers of 2 then ascending powers of x.\n3. First four ascending terms: **256 − 5120x + 44800x² − 224000x³**.\n4. Underline the command words: \"first four terms\", \"ascending powers\", \"simplest form\", \"state\".\n5. Trap: copying the index 8 as 2 costs the first-term B mark and the final accuracy mark in one stroke."},{"question":"(P2 Q3, official reference) For an open-topped cuboid with base 3x by x, height y, and volume 120 m³, derive A = Px² + Q/x and the stationary x to 3 s.f. State P, Q, and x.","answer":"1. Volume: 3x²y = 120 ⇒ y = 40/x².\n2. Sheet-metal area: base + 4 sides = 3x² + 2(3x)y + 2xy = 3x² + 8xy = 3x² + 320/x.\n3. So **P = 3, Q = 320**.\n4. A′ = 6x − 320/x² = 0 ⇒ x³ = 160/3 ⇒ **x ≈ 3.76 m** (3 s.f.).\n5. A″ = 6 + 640/x³ \u003e 0, confirming a minimum.\n6. Trap: don't forget the open top — there is no top face, but there are still four side faces; the \"4 sides\" total 8xy, not 6xy."},{"question":"(P2 Q4) A geometric series has S₃ = 70.2 and S∞ = 75. State the preferred tutor route and give r and a.","answer":"1. Use S∞ = a/(1 − r) = 75 *inside* S₃ = a(1 − r³)/(1 − r) = 70.2, giving 75(1 − r³) = 70.2.\n2. So 1 − r³ = 70.2/75 = 117/125 ⇒ r³ = 8/125 ⇒ **r = 2/5**.\n3. Back-substitute: a = 75(1 − 2/5) = 75 × 3/5 = **45**.\n4. Trap: reading 70.2 as the *third term* ar² (not the *sum* S₃) sets up a harder system; the direct substitution route collapses the algebra.\n5. Trap: any cubic r should be checked against |r| \u003c 1 for S∞ to be valid; 2/5 passes."},{"question":"(P2 Q5) f(x) = 3x³ + ax² − 10x + b with (3x − 4) a factor. Given the remainder on division by (x − 2) equals b (not a fixed number), find a and b, then factorise f(x) fully.","answer":"1. Factor Theorem: 3x − 4 = 0 ⇒ f(4/3) = 0, which rearranges to 16a + 9b = 56 (the \"show that\").\n2. **Watch the wording:** \"remainder is b\" means f(2) = b (not f(2) = 8). So 24 + 4a − 20 + b = b ⇒ 4a = −4 ⇒ **a = −1**.\n3. Substitute: 16(−1) + 9b = 56 ⇒ 9b = 72 ⇒ **b = 8**.\n4. f(x) = 3x³ − x² − 10x + 8; factor out (3x − 4): quotient is x² + x − 2.\n5. Full factorisation: **f(x) = (3x − 4)(x + 2)(x − 1)**.\n6. Trap: in long division, use brackets when subtracting rows so signs stay visible, e.g. −x² − (−4x²) = +3x²."},{"question":"(P2 Q6) A(−1, 2) and B(11, 6) lie on a circle with centre P; M is the midpoint of AB and l is the perpendicular bisector. State the equation of l, the value of k if P = (7, k), and the circle's equation. Identify the one-step slip the lesson recovered.","answer":"1. Midpoint M = ((−1 + 11)/2, (2 + 6)/2) = (5, 4); gradient AB = 4/12 = 1/3, so perpendicular gradient = −3.\n2. Line l: y − 4 = −3(x − 5) ⇒ **y = −3x + 19**.\n3. **The slip recovered:** writing y − 5 (the x-coordinate) instead of y − 4 (the y-coordinate), which propagated to a constant of +20 instead of +19.\n4. P on l: k = −3(7) + 19 = **−2**.\n5. Radius PB: r² = (11 − 7)² + (6 − (−2))² = 16 + 64 = 80.\n6. Circle: **(x − 7)² + (y + 2)² = 80**.\n7. Trap: when stuck on an unknown radius, draw a radius to a *known* point on the circle (here B), not to an arbitrary point."},{"question":"(P2 Q7) (i) For y = log₁₀(x + 5) at x = −1, 0, 1, 2, 3, 4, the trapezium rule with strip width 1 gives an approximation in the form log₁₀ k. Find the integer k. (ii) Solve 2 log₅(5 − a) − log₅(a + 25) = 1, stating the domain rejection rule.","answer":"1. (i) T = ½{log 4 + log 9 + 2(log 5 + log 6 + log 7 + log 8)} = ½ log[4 · 9 · (5·6·7·8)²].\n2. The leading ½ becomes a square root: k = √(4 · 9 · 1680²) = 6 · 1680 = **10 080**.\n3. (ii) Combine: log₅[(5 − a)²/(a + 25)] = 1 ⇒ (5 − a)² = 5(a + 25) ⇒ a² − 15a − 100 = 0 = (a − 20)(a + 5).\n4. **Domain (both logs defined):** 5 − a \u003e 0 and a + 25 \u003e 0 ⇒ **−25 \u003c a \u003c 5**.\n5. So a = 20 is outside the domain — **reject 20**; accept **a = −5**.\n6. Trap (i): the leading ½ must be absorbed into a square root, not left as a stray factor. Trap (ii): write \"reject\" **plus the violated positivity condition**, not just a cross."},{"question":"(P2 Q8(i)) Disprove by counter-example: \"if x and y are irrational and x ≠ y, then xy is irrational.\" Give one valid pair and one trap pair the lesson rejected.","answer":"1. Need two irrational, unequal numbers whose product is rational.\n2. Take **x = √2, y = 3√2**; both irrational, x ≠ y, and xy = √2 · 3√2 = 3 · 2 = **6** (rational). One counter-example suffices.\n3. Rejected pair √2 · √5 = √10 — still irrational, so it does *not* disprove the claim.\n4. Rejected pair 3/7 — rational, fails the hypothesis.\n5. Trap: \"decimal goes forever\" is *not* the definition of irrational; 0.3̄ = 1/3 is a counter-example to that misconception."},{"question":"(P2 Q8(ii), official reference proof) Prove that for every odd integer n, n³ + 3n + 2 is always even but never a multiple of 4. Give the clean first-line substitution and the modular conclusion.","answer":"1. Every odd integer has the form **n = 2k + 1** with k an integer.\n2. Expand the *cube*: n³ = (2k + 1)³ = 8k³ + 12k² + 6k + 1.\n3. Then n³ + 3n + 2 = 8k³ + 12k² + 6k + 1 + 6k + 3 + 2 = 8k³ + 12k² + 12k + 6.\n4. Factor out 4: = 4(2k³ + 3k² + 3k + 1) + 2.\n5. So n³ + 3n + 2 ≡ 2 (mod 4) for every integer k: **even, never divisible by 4**.\n6. Trap: the target is the *cube* n³ + 3n + 2, not n² + 3n + 2; squaring instead of cubing derails the whole proof."},{"question":"(Exam-technique \u0026 formula-booklet boundary) List four process traps and one boundary point the lesson marked as *not* in the Edexcel P2 formula booklet.","answer":"1. Copy the index/exponent exactly: 8 is not 2 (Q2 trap) — work in a quiet, focused environment.\n2. Underline command words (\"first four terms\", \"ascending powers\", \"simplest form\", \"state\") before writing.\n3. In polynomial long division, **bracket the row being subtracted** so sign changes stay visible.\n4. For log-domain rejections, write \"reject\" **plus the violated positivity condition**, not just a cross.\n5. For log/trig equations, declare the domain (e.g. −25 \u003c a \u003c 5) *before* solving.\n6. **Not on the IAL P2 formula page** (must be learnt/derived): Factor and Remainder Theorems; difference of two cubes; circle equation; perpendicular-gradient rule m₁m₂ = −1; log product/quotient/power laws (only *change of base* is supplied); proof structures. Regular-polygon bearings are ESAT/predecessor content, not Edexcel P2."}]},"deepseek_1":{"label":"DeepSeek V4 Pro","returned_model":"deepseek/deepseek-v4-pro","cards":[{"question":"One fair six‑sided die and one biased six‑sided die are rolled. The biased die shows 1–5 with equal probability, and 6 with a different probability. The probability of a total of 12 is 1/18. Find the probability of a total of 2.","answer":"1. Let Pr(6 on biased) = $$q$$. For independent events, “AND” means multiply: Pr(total 12) = Pr(6 on fair) × Pr(6 on biased) = $$\\frac{1}{6}q = \\frac{1}{18}$$, so $$q = \\frac{1}{3}$$.  \n2. The remaining probability $$1 - \\frac{1}{3} = \\frac{2}{3}$$ is shared equally by numbers 1–5, so each is $$\\frac{2/3}{5} = \\frac{2}{15}$$.  \n3. A total of 2 needs a 1 on both dice: Pr(total 2) = Pr(1 on fair) × Pr(1 on biased) = $$\\frac{1}{6} \\times \\frac{2}{15} = \\frac{2}{90} = \\frac{1}{45}$$.  \n4. The trap is adding instead of multiplying; independent events require multiplication."},{"question":"A regular pentagon is run clockwise. On the third leg the bearing is 110°. Find the bearing on the first leg. (Bearings are measured clockwise from north; a regular pentagon’s exterior angle is 72°.)","answer":"1. Each clockwise turn changes the heading by the exterior angle, 72°.  \n2. The first leg is two turns before the third leg, so its heading is $$110^\\circ - 2 \\times 72^\\circ = 110^\\circ - 144^\\circ = -34^\\circ$$.  \n3. A negative bearing is adjusted by adding 360°: $$-34^\\circ \\equiv 326^\\circ$$.  \n4. The common misunderstanding is using interior angles (108°) or measuring from the page axis instead of north."},{"question":"In an arithmetic series, the formula for the number of terms is $$n = \\frac{\\text{last} - \\text{first}}{d} + 1$$. Explain why the “$$+1$$” is necessary and what common mistake it prevents.","answer":"1. The difference $$\\frac{\\text{last} - \\text{first}}{d}$$ gives the number of equal steps (gaps) between the first and last terms.  \n2. For example, from 2 to 254 in steps of 3 there are 84 steps, but the terms include both the starting and ending terms, so there are $$84 + 1 = 85$$ terms.  \n3. Forgetting the $$+1$$ counts only the steps and loses one term – a frequent slip when using $$n = \\frac{l-a}{d}$$."},{"question":"A student expands $$(2 - 5x)^8$$ to approximate $$2.05^8$$. What value of $$x$$ should be used, and why must you avoid calculating the full numerical approximation when the question only says “state”?","answer":"1. Match the form: set $$2 - 5x = 2.05 \\Rightarrow -5x = 0.05 \\Rightarrow x = -0.01$$.  \n2. The command word “state” means only the value is required; computing the approximation wastes time and risks arithmetic errors.  \n3. Always underline the command words (“state”, “first four terms”, “ascending powers”, “simplest form”) before writing."},{"question":"A geometric series has sum to infinity 75 and sum of the first three terms 70.2. Without expanding $$1-r^3$$, use a direct substitution to find the common ratio $$r$$ and the first term $$a$$.","answer":"1. Write the two given formulas: $$S_\\infty = \\frac{a}{1-r} = 75$$ and $$S_3 = a\\frac{1-r^3}{1-r} = 70.2$$.  \n2. Substitute $$a/(1-r)$$ from the first into the second: $$75(1-r^3) = 70.2$$.  \n3. Solve: $$1-r^3 = \\frac{70.2}{75} = \\frac{117}{125} \\Rightarrow r^3 = \\frac{8}{125} \\Rightarrow r = \\frac{2}{5}$$.  \n4. Back‑substitute: $$a = 75(1 - \\tfrac{2}{5}) = 45$$.  \n5. The common trap is misreading $$S_3$$ as the third term $$ar^2$$; always check whether a sum or a term is given."},{"question":"$$f(x) = 3x^3 + ax^2 - 10x + b$$. It is given that $$(3x-4)$$ is a factor and that dividing $$f(x)$$ by $$(x-2)$$ leaves a remainder equal to $$b$$ (not a specific number). Find $$a$$ and $$b$$, and explain why the wording “remainder $$b$$” is critical.","answer":"1. Factor Theorem: $$f\\!\\left(\\frac{4}{3}\\right) = 0$$ $$\\Rightarrow$$ $$3\\left(\\frac{64}{27}\\right) + a\\left(\\frac{16}{9}\\right) - 10\\left(\\frac{4}{3}\\right) + b = 0$$. Multiply by 9: $$64 + 16a - 120 + 9b = 0 \\Rightarrow 16a + 9b = 56$$.  \n2. Remainder Theorem: $$f(2) = b$$. Compute $$f(2) = 24 + 4a - 20 + b = 4a + 4 + b$$. Set equal to $$b$$: $$4a + 4 + b = b \\Rightarrow 4a = -4 \\Rightarrow a = -1$$.  \n3. Substitute $$a = -1$$ into the factor condition: $$-16 + 9b = 56 \\Rightarrow b = 8$$.  \n4. If the remainder were misread as a constant (e.g., 8), the equation would become $$f(2)=8$$, leading to a different (wrong) $$a$$. Always read the remainder value literally."},{"question":"$$A(-1,2)$$ and $$B(11,6)$$. The perpendicular bisector of $$AB$$ passes through the midpoint $$M$$. A student writes the equation as $$y - 5 = -3(x - 5)$$. Identify the error and give the correct equation.","answer":"1. Midpoint $$M = \\left(\\frac{-1+11}{2}, \\frac{2+6}{2}\\right) = (5, 4)$$. The gradient of $$AB$$ is $$\\frac{6-2}{11-(-1)} = \\frac{1}{3}$$, so the perpendicular gradient is $$-3$$.  \n2. The point‑slope form should use the correct $$y$$‑coordinate of $$M$$: $$y - 4 = -3(x - 5)$$.  \n3. The student mistakenly used the $$x$$‑coordinate 5 for the $$y$$‑shift; this is a common transposition slip. The correct line is $$y = -3x + 19$$."},{"question":"$$\\int_{-1}^{4} \\log_{10}(x+5)\\,dx$$ is approximated by the trapezium rule with strip width 1, using all table values. Show that the approximation simplifies to $$\\log_{10} k$$ for some integer $$k$$, and find $$k$$.","answer":"1. $$x$$-values: $$-1,0,1,2,3,4$$; $$y = \\log_{10}(x+5)$$ gives $$\\log_{10}4, \\log_{10}5, \\log_{10}6, \\log_{10}7, \\log_{10}8, \\log_{10}9$$.  \n2. Trapezium rule: $$I \\approx \\frac{1}{2} \\times 1 \\times \\Bigl( \\log_{10}4 + \\log_{10}9 + 2(\\log_{10}5 + \\log_{10}6 + \\log_{10}7 + \\log_{10}8) \\Bigr)$$.  \n3. The factor $$\\frac{1}{2}$$ outside must become a square root inside the logarithm:  \n   $$I \\approx \\frac{1}{2} \\log_{10}\\!\\bigl(4 \\cdot 9 \\cdot (5 \\cdot 6 \\cdot 7 \\cdot 8)^2\\bigr) = \\log_{10}\\!\\sqrt{36 \\cdot 1680^2} = \\log_{10}(6 \\cdot 1680) = \\log_{10} 10080$$.  \n4. Hence $$k = 10080$$. The trap is forgetting to absorb the leading $$\\frac{1}{2}$$, leaving the expression incorrectly as $$\\frac{1}{2}\\log_{10}(\\cdots)$$ instead of $$\\log_{10} k$$."},{"question":"Solve $$2\\log_5(5-a) - \\log_5(a+25) = 1$$. Explain why one solution must be rejected and state the final answer.","answer":"1. Combine logs: $$\\log_5\\!\\left(\\frac{(5-a)^2}{a+25}\\right) = 1 \\Rightarrow \\frac{(5-a)^2}{a+25} = 5^1 = 5$$.  \n2. Expand: $$(5-a)^2 = 5(a+25) \\Rightarrow 25 - 10a + a^2 = 5a + 125 \\Rightarrow a^2 - 15a - 100 = 0$$.  \n3. Factorise: $$(a-20)(a+5) = 0 \\Rightarrow a = 20,\\; a = -5$$.  \n4. Domain restrictions: from original logs, $$5-a \u003e 0 \\Rightarrow a \u003c 5$$ and $$a+25 \u003e 0 \\Rightarrow a \u003e -25$$, so $$-25 \u003c a \u003c 5$$.  \n5. $$a=20$$ violates $$a\u003c5$$, so it is rejected. Accepted solution: $$a = -5$$. Always state the exact violated condition when rejecting a solution, not merely a cross."},{"question":"A student claims: “If $$x$$ and $$y$$ are irrational and $$x \\neq y$$, then $$xy$$ is irrational.” Provide a simple counterexample and explain the principle behind it.","answer":"1. Example: let $$x = \\sqrt{2}$$, $$y = 3\\sqrt{2}$$. Both are irrational and unequal.  \n2. Their product is $$xy = \\sqrt{2} \\cdot 3\\sqrt{2} = 3 \\cdot 2 = 6$$, which is rational.  \n3. The principle: scaling one irrational by a rational multiple can yield a rational product. One valid counterexample is enough to disprove the statement.  \n4. A common error is choosing both factors that remain irrational (e.g., $$\\sqrt{2}\\cdot\\sqrt{5} = \\sqrt{10}$$); the trick is to make the irrational parts cancel."},{"question":"Prove that for every odd integer $$n$$, $$n^3 + 3n + 2$$ is always even but never a multiple of 4. What expansion error must be avoided when using $$n = 2k+1$$?","answer":"1. Write an arbitrary odd integer as $$n = 2k + 1$$ with $$k \\in \\mathbb{Z}$$.  \n2. Substitute and expand the **cube**, not the square:  \n   $$(2k+1)^3 = 8k^3 + 12k^2 + 6k + 1$$.  \n   Then $$n^3 + 3n + 2 = (8k^3+12k^2+6k+1) + 3(2k+1) + 2$$.  \n3. Simplify: $$8k^3 + 12k^2 + 6k + 1 + 6k + 3 + 2 = 8k^3 + 12k^2 + 12k + 6$$.  \n4. Factor out 4: $$= 4(2k^3 + 3k^2 + 3k + 1) + 2$$.  \n5. The expression is $$2 \\pmod{4}$$, so it is even (divisible by 2) but never divisible by 4.  \n6. Expanding $$(2k+1)^2$$ by mistake would give a completely wrong expression; always confirm you are using the correct power."},{"question":"When performing polynomial long division, what common sign error arises during subtraction of rows, and how can enclosing the product in brackets prevent it?","answer":"1. After multiplying the divisor by a term of the quotient, you must subtract the resulting product from the current dividend.  \n2. If you write the product without brackets, you may forget to distribute the minus sign to every term, e.g., subtracting $$(-4x^2)$$ incorrectly becomes subtracting $$+4x^2$$.  \n3. Prevent this by writing the subtraction step as:  \n   $$\\text{dividend} - (\\text{divisor} \\times \\text{quotient term})$$,  \n   then remove brackets carefully, changing all signs inside.  \n4. This bracket habit avoids the classic “sign slip” that destroys the rest of the division."}]},"kimi_1":{"label":"Kimi K3","returned_model":"moonshotai/kimi-k3","cards":[{"question":"NSAA 2020 Specimen S1 Q19: two dice are rolled, one fair and one biased (lands 1–5 with equal probability, 6 with a different probability), with Pr(total 12) = 1/18. What two principles did the tutor stress, and what is Pr(total 2)?","answer":"1. **Allocate the mass consistently:** call each of outcomes 1–5 probability $$P$$, so $$\\Pr(6) = 1 - 5P$$ (the six probabilities sum to 1). 2. **\"And\" means multiply:** independent events, so $$\\Pr(12) = \\Pr(6_{\\text{fair}}) \\times \\Pr(6_{\\text{biased}})$$ — never add. **Official-reference completion (not solved live):** $$\\tfrac{1}{6}q = \\tfrac{1}{18} \\Rightarrow q = \\tfrac{1}{3}$$; each of 1–5 has probability $$(1-\\tfrac13)/5 = \\tfrac{2}{15}$$; total 2 needs a one on both: $$\\tfrac{1}{6} \\cdot \\tfrac{2}{15} = \\tfrac{1}{45}$$ (option B). Status: deferred live; target answer official-reference only."},{"question":"NSAA 2020 Specimen S1 Q20: on a clockwise regular-pentagon track the third leg has bearing $$110°$$. What bearing strategy did the tutor teach, and what is the first-leg bearing?","answer":"1. **Bearing = clockwise angle from north** at that point — not from the page's vertical axis (the student's $$0°$$ error). 2. **Exterior angle first:** one circuit turns $$360°$$ in total, so each turn is $$360°/5 = 72°$$ (mental route: $$360 \\div 10 \\times 2$$). Interior $$180° - 72° = 108°$$ is only an intermediate fact, not the answer (the student mislabelled $$360/5$$ as interior). 3. First leg is two turns *before* the third: $$110° - 2(72°) = -34° \\equiv 326° \\pmod{360°}$$ (option H). Status: deferred; final bearing official-reference only — not given live."},{"question":"P2 Q2: the first four terms of $$(2 - 5x)^8$$ are used to approximate $$2.05^8$$. How do you choose $$x$$, and what guards prevent the lesson's two errors?","answer":"1. **Choose the representation:** set $$2 - 5x = 2.05$$, so $$-5x = 0.05$$ and $$x = -0.01$$; the command word \"state\" means no approximation calculation is required. 2. **Underline command words** before writing: \"first four terms\", \"ascending powers\", \"simplest form\", \"state\". 3. **Guard transcription:** the exponent 8 was copied as 2 (attributed to a distracting room), costing two marks — work in a quiet, focused environment. Expansion: $$256 - 5120x + 44800x^2 - 224000x^3 + \\cdots$$. Status: lesson evidence — slip corrected in review."},{"question":"P2 Q4: a geometric series has $$S_3 = 70.2$$ and $$S_\\infty = 75$$. What is the tutor's preferred route to $$r$$ and $$a$$, and what misread must be avoided?","answer":"1. **Avoid the misread:** 70.2 is the *sum* of the first three terms, not the third term $$ar^2$$ — that was the lesson error. 2. **Direct substitution:** use $$S_\\infty = \\dfrac{a}{1-r} = 75$$ inside $$S_3 = \\dfrac{a(1-r^3)}{1-r}$$, giving $$75(1 - r^3) = 70.2$$. 3. $$1 - r^3 = \\dfrac{70.2}{75} = \\dfrac{117}{125} \\Rightarrow r^3 = \\dfrac{8}{125} \\Rightarrow r = \\dfrac{2}{5}$$. 4. Back-substitute: $$a = 75\\left(1 - \\tfrac{2}{5}\\right) = 45$$. The difference-of-cubes route works but makes the question harder — the tutor pivoted away from it. Status: completed with prompting."},{"question":"P2 Q5: $$f(x) = 3x^3 + ax^2 - 10x + b$$ has factor $$(3x-4)$$, and division by $$(x-2)$$ leaves remainder $$b$$. What triggers and wording traps yield $$a$$ and $$b$$?","answer":"1. **Trigger:** the word \"factor\" ⇒ Factor Theorem: solve $$3x - 4 = 0$$ and set $$f\\left(\\tfrac{4}{3}\\right) = 0$$, which rearranges to $$16a + 9b = 56$$. 2. **Wording trap:** the remainder is *$$b$$*, not a fixed number — Remainder Theorem gives $$f(2) = b$$, i.e. $$24 + 4a - 20 + b = b$$, so the $$b$$'s cancel: $$4a = -4$$, $$a = -1$$; then $$16(-1) + 9b = 56 \\Rightarrow b = 8$$. 3. **Division trap:** use brackets when subtracting rows — $$-x^2 - (-4x^2) = +3x^2$$ (the lesson's sign slip). Full factorisation: $$(3x-4)(x+2)(x-1)$$. Status: (b), (c) completed with prompting; the (a) \"show that\" was not fully derived independently."},{"question":"P2 Q6(a),(b): $$A(-1,2)$$ and $$B(11,6)$$ lie on a circle whose centre $$P$$ lies on line $$l$$ through the midpoint $$M$$. How is $$l$$ found, and what transposition slip must be checked?","answer":"1. Midpoint: $$M = \\left(\\tfrac{-1+11}{2}, \\tfrac{2+6}{2}\\right) = (5,4)$$. 2. Gradient $$AB = \\dfrac{6-2}{11-(-1)} = \\dfrac{1}{3}$$, so the perpendicular bisector has gradient $$-3$$ ($$m_1 m_2 = -1$$). 3. $$y - 4 = -3(x - 5) \\Rightarrow y = -3x + 19$$. **Slip to check:** the student wrote $$y - 5$$ (the *x*-coordinate) where $$y - 4$$ (the *y*-coordinate) belongs, propagating to $$+20$$ instead of $$+19$$ — always pair the y-coordinate in $$y - y_1$$. Then $$P = (7,k)$$ on $$l$$: $$k = -3(7) + 19 = -2$$. Status: completed live (slip corrected); board frame-verified."},{"question":"P2 Q6(c): with centre $$P(7,-2)$$ and $$B(11,6)$$ on the circle, how do you construct the circle's equation when stuck on the unknown radius?","answer":"1. **Tutor's prompt:** \"draw a radius\" — annotate the diagram with the centre and a usable radius segment. 2. Radius = distance from $$P$$ to any known point on the circle, e.g. $$B$$: $$r^2 = (11-7)^2 + (6-(-2))^2 = 16 + 64 = 80$$. 3. Equation: $$(x-7)^2 + (y+2)^2 = 80$$. Note the circle equation $$(x-a)^2 + (y-b)^2 = r^2$$ is **not** on the P2 formula page — it must be learnt. Status: completed live, unlocked by the radius prompt."},{"question":"P2 Q7(i): applying the trapezium rule (strip width 1) to $$y = \\log_{10}(x+5)$$ for $$x = -1, 0, \\dots, 4$$, how is the result forced into the form $$\\log_{10} k$$, and what is $$k$$?","answer":"1. Trapezium rule (supplied on the formula page): $$\\tfrac{1}{2}\\{\\log 4 + \\log 9 + 2(\\log 5 + \\log 6 + \\log 7 + \\log 8)\\}$$. 2. Combine via log laws: $$= \\tfrac{1}{2}\\log_{10}\\left[4 \\cdot 9 \\cdot (5 \\cdot 6 \\cdot 7 \\cdot 8)^2\\right]$$. 3. **Key move:** absorb the leading $$\\tfrac{1}{2}$$ as a square root — this was the lesson's missed step — giving $$\\log_{10}\\sqrt{4 \\cdot 9 \\cdot 1680^2}$$, so $$k = \\sqrt{36 \\cdot 1680^2} = 6 \\times 1680 = 10\\,080$$. Status: completed live (final-form correction)."},{"question":"P2 Q7(ii): solve $$2\\log_5(5-a) - \\log_5(a+25) = 1$$, including how the rejection of a root must be presented.","answer":"1. Combine: $$\\log_5\\dfrac{(5-a)^2}{a+25} = 1 \\Rightarrow (5-a)^2 = 5(a+25)$$. 2. Expand: $$a^2 - 15a - 100 = 0 = (a-20)(a+5)$$, so $$a = 20$$ or $$a = -5$$. 3. **Domain check:** both log arguments positive requires $$-25 \u003c a \u003c 5$$, so **reject $$a = 20$$** and accept $$a = -5$$. 4. **Presentation:** write \"reject\" *together with the violated positivity condition*, not merely a cross — the lesson's rejection was too thin. Status: completed live (refined), with the strict domain made explicit."},{"question":"P2 Q8(i): disprove \"if $$x$$ and $$y$$ are irrational and $$x \\neq y$$, then $$xy$$ is irrational.\" What counter-example strategy works, and why did the earlier attempts fail?","answer":"1. **Failed starts (lesson evidence):** \"the decimal goes forever\" is not the definition of irrational ($$0.\\overline{3} = \\tfrac{1}{3}$$ is rational); $$\\sqrt{2} \\cdot \\sqrt{5} = \\sqrt{10}$$ stays irrational. 2. **Tutor's strategy — rescale one factor** so the surd cancels: take $$x = \\sqrt{2}$$, $$y = 3\\sqrt{2}$$. 3. Both are irrational and unequal, yet $$xy = \\sqrt{2} \\cdot 3\\sqrt{2} = 3 \\cdot 2 = 6$$, which is rational. One valid counter-example is enough to disprove a claim. Status: completed with prompting."},{"question":"P2 Q8(ii): prove that for every odd integer $$n$$, $$n^3 + 3n + 2$$ is even but never a multiple of 4. What is the proof structure, and what was the lesson's status and error?","answer":"Status first: **deferred / not completed live** — only the clean first line was written before the student had to leave; the proof below is official-reference study, not taught live. 1. Write $$n = 2k + 1$$ with $$k$$ an integer (the tutor corrected $$n = 2n+1$$ — rename the parameter). 2. **Expand the cube** — the transient board error squared instead (\"cube not square!\"): $$(2k+1)^3 + 3(2k+1) + 2 = 8k^3 + 12k^2 + 12k + 6$$. 3. Factor out 4: $$= 4(2k^3 + 3k^2 + 3k + 1) + 2 \\equiv 2 \\pmod{4}$$ — divisible by 2 but never by 4. The proposition is sound; the raw visual-model claim that the target was $$n^2 + 3n + 2$$ or that the paper was \"flawed\" is explicitly refuted."},{"question":"For Pearson IAL P2, which formulae does the official formulae booklet supply, and which must be learnt or derived?","answer":"**Supplied:** arithmetic series (nth term and sum); geometric series (nth term, finite sum, *and* sum to infinity for $$|r| \u003c 1$$ — so do not treat these as memorise-only); change-of-base rule for logarithms; binomial theorem for positive integer index; the trapezium rule. **Not supplied (learn/derive):** difference of two cubes; Factor and Remainder Theorems; the circle equation $$(x-a)^2 + (y-b)^2 = r^2$$; the perpendicular-gradient rule $$m_1 m_2 = -1$$ (with the vertical/horizontal caveat); the log product/quotient/power laws (only *change of base* is given); proof structures. Regular-polygon bearings are ESAT/predecessor content, not an Edexcel P2 topic."}]}},ROLES=Object.keys(DATA);let active=ROLES[0],selected={};for(const r of ROLES)selected[r]=new Set(DATA[r].cards.map((_,i)=>i));
function typeset(){const x=document.getElementById('list');if(window.MathJax&&MathJax.typesetPromise){if(MathJax.typesetClear)MathJax.typesetClear([x]);MathJax.typesetPromise([x]).catch(()=>{})}}
function tabs(){const t=document.getElementById('tabs');t.replaceChildren();for(const r of ROLES){const b=document.createElement('button');b.className='tab'+(r===active?' active':'');b.textContent=DATA[r].label+' ('+DATA[r].cards.length+')';b.onclick=()=>{active=r;tabs();render()};t.append(b)}}
function render(){const l=document.getElementById('list');l.replaceChildren();DATA[active].cards.forEach((c,i)=>{const article=document.createElement('article');article.className='card';const row=document.createElement('div');row.className='row';const pick=document.createElement('input');pick.className='pick';pick.type='checkbox';pick.checked=selected[active].has(i);pick.setAttribute('aria-label',`Select card ${i+1}`);const qw=document.createElement('div');qw.className='qwrap';const q=document.createElement('div');q.className='q';q.tabIndex=0;q.textContent=c.question;const ans=document.createElement('div');ans.className='answer';const txt=document.createElement('div');txt.textContent=c.answer;const foot=document.createElement('div');foot.className='foot';const cp=document.createElement('button');cp.className='copy';cp.textContent='Copy';cp.onclick=()=>copyText(c.question+'\t'+c.answer);foot.append(cp);ans.append(txt,foot);qw.append(q,ans);row.append(pick,qw);article.append(row);l.append(article);pick.onchange=()=>{pick.checked?selected[active].add(i):selected[active].delete(i);count()};const toggle=()=>{article.classList.toggle('open');typeset()};q.onclick=toggle;q.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle()}}});count();typeset()}
function count(){document.getElementById('count').textContent=`${selected[active].size} / ${DATA[active].cards.length} selected`}
function setall(v){selected[active]=v?new Set(DATA[active].cards.map((_,i)=>i)):new Set();render()}
function reveal(v){document.querySelectorAll('.card').forEach(x=>x.classList.toggle('open',v));typeset()}
function copyText(s){navigator.clipboard.writeText(s).then(()=>toast('Copied')).catch(()=>toast('Copy failed'))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)}
function table(){const c=DATA[active].cards.filter((_,i)=>selected[active].has(i));let s='| Question | Answer |\n| --- | --- |\n';for(const x of c)s+='| '+x.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+x.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n';copyText(s)}
addEventListener('DOMContentLoaded',()=>{tabs();render();document.getElementById('sel').onclick=()=>setall(true);document.getElementById('desel').onclick=()=>setall(false);document.getElementById('reveal').onclick=()=>reveal(true);document.getElementById('hide').onclick=()=>reveal(false);document.getElementById('table').onclick=table});</script></body></html>
