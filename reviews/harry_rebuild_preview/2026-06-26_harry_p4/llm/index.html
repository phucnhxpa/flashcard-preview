<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2214%22 fill=%22%23006edc%22/><text x=%2232%22 y=%2243%22 text-anchor=%22middle%22 font-size=%2234%22 fill=%22white%22>ƒ</text></svg>"><title>Pure Mathematics 4 (WMA14/01) · Maths P4 October 2025 review (WMA14/01) — Maths lesson 26 June 2026; official October 2025 evidence — Multi-model flashcards</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;max-width:100%;overflow-x:hidden}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.5}.wrap{width:100%;max-width:980px;margin:auto;padding:26px 16px 70px;overflow-x:clip}header{text-align:center;margin:7px 0 18px}h1{font-size:30px;line-height:1.18;margin:0}.sub{color:#68686d;margin:6px 0}.tabs{display:flex;gap:7px;overflow-x:auto;padding:5px 1px 11px;scrollbar-width:thin}.tab{white-space:nowrap;border:1px solid #d2d2d7;background:#fff;border-radius:999px;padding:8px 12px;font:650 12px inherit;cursor:pointer}.tab.active{background:#006edc;color:#fff;border-color:#006edc}.tools{position:sticky;top:7px;z-index:5;display:flex;gap:7px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid #e2e2e7;border-radius:14px;padding:10px;margin-bottom:13px;box-shadow:0 2px 8px #0000000d}.tools button{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:6px 9px;font:600 12px inherit;cursor:pointer}.count{margin-left:auto;color:#68686d;font-size:12px;font-weight:650}.list{display:flex;flex-direction:column;gap:10px}.card{min-width:0;max-width:100%;background:#fff;border:1px solid #e1e1e6;border-radius:14px;padding:15px 16px;box-shadow:0 1px 4px #0000000a}.row{display:flex;gap:10px;align-items:flex-start;min-width:0}.pick{width:18px;height:18px;margin-top:3px;flex:0 0 auto}.qwrap{min-width:0;max-width:100%;flex:1}.q{font-weight:650;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;cursor:pointer;overflow-x:auto}.answer{display:none;white-space:pre-wrap;margin-top:10px;padding-top:10px;border-top:1px solid #ececf0;color:#3e3e43;overflow-wrap:anywhere;word-break:break-word;overflow-x:auto}.card.open .answer{display:block}.foot{display:flex;justify-content:flex-end;margin-top:8px}.copy{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:3px 8px;cursor:pointer}.notice{font-size:12px;color:#68686d;text-align:center;margin:12px 0}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#1d1d1f;color:#fff;border-radius:8px;padding:8px 14px;opacity:0;pointer-events:none}.toast.show{opacity:1}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}@media(max-width:430px){.wrap{padding:16px 10px 55px}h1{font-size:24px}.tools{top:4px}.count{width:100%;margin-left:0}.card{padding:13px 12px}}</style><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true},options:{skipHtmlTags:["script","noscript","style","textarea","pre","code"]}};</script><script defer src="assets/mathjax/es5/tex-mml-chtml.js"></script></head><body><main class="wrap"><header><h1>Pure Mathematics 4 (WMA14/01) · Maths P4 October 2025 review (WMA14/01) — Maths lesson 26 June 2026; official October 2025 evidence</h1><p class="sub">Direct model-output flashcards</p></header><nav id="tabs" class="tabs" aria-label="Models"></nav><nav class="tools"><button id="sel">Select all</button><button id="desel">Deselect all</button><button id="reveal">Reveal all</button><button id="hide">Hide all</button><button id="table">Copy table</button><span id="count" class="count"></span></nav><section id="list" class="list"></section><p class="notice">Model outputs are displayed directly as generated.</p></main><div id="toast" class="toast"></div><script>const DATA={"glm_1":{"label":"GLM 5.1 · Run 1","returned_model":"z-ai/glm-5.1","cards":[{"question":"In an ESAT-style nested squares problem where a new square is formed by joining points one third of the way along the sides of the previous square, what strategy simplifies finding the area ratio of the fourth square to the original?","answer":"[Learner attempt — direct lesson evidence] [the tutor prompt/correction — direct lesson evidence]\n1. Observe that scaling the original square does not change a fractional answer, so choose convenient side lengths (e.g., pieces 1 and 2).\n2. Use Pythagoras to find the inner side: $$\\sqrt{2^2+1^2} = \\sqrt{5}$$.\n3. Compute the one-step area ratio: inner area 5, outer area 9, so ratio is $$5/9$$.\n4. Count exactly three iterations from the first to the fourth square: ratio is $$5^3/9^3$$.\n5. Trap: In a timed MCQ, stop once the correct option ($$125/729$$) is secure rather than over-calculating or simplifying unnecessarily."},{"question":"For $$f(x) = \\ln(x^2+3)$$, $$x \\in \\mathbb{R}$$, what is the range, and what is the common trap in finding it?","answer":"[Prior P3 review — NOT a P4 question] [the tutor prompt/correction]\n- Trap: Stating the range is merely \"real\".\n- Reason: Since $$x^2 \\ge 0$$, we have $$x^2+3 \\ge 3$$. Because ln is an increasing function, $$f(x) \\ge \\ln 3$$.\n- Result: The range is $$f(x) \\ge \\ln 3$$."},{"question":"To find the range and inverse domain of $$g(x) = \\frac{3+5x}{x+2}$$ for $$x \u003e -2$$, how should you rewrite it, and what must an inverse answer include?","answer":"[Prior P3 review — NOT a P4 question] [the tutor prompt/correction / method]\n1. Rewrite by algebraic division: $$g(x) = 5 - \\frac{7}{x+2}$$ (quotient plus remainder over divisor). Trap: Keep the whole reconstructed numerator over $$x+2$$ before splitting.\n2. Build the graph from $$h(x) = -1/x$$ as $$g(x) = 7 \\cdot h(x+2) + 5$$.\n3. Trap: Assuming vertical/horizontal asymptotes are unchanged; they shift to $$x=-2$$ and $$y=5$$.\n4. Using $$x \u003e -2$$ keeps the right-hand branch only, giving range $$y \u003c 5$$ and inverse domain $$x \u003c 5$$.\n5. Condition: An inverse answer must include both an equation and a domain; range is stated in $$y$$ and domain in $$x$$."},{"question":"When composing two functions $$f$$ and $$g$$, what common trap leads to an unsolvable equation like logarithms on both sides?","answer":"[Prior P3 review — NOT a P4 question] [the tutor prompt/correction]\n- Trap: Substituting $$f$$ and $$g$$ in the wrong order.\n- Reason: You must check which expression belongs inside each function. For $$fg(x)$$, the output of $$g(x)$$ becomes the input of $$f$$."},{"question":"When implicitly differentiating a curve equation containing a product of $$x$$ and $$y$$ (e.g., $$-2xy$$ in $$4x^2 + y^2 - 2xy = 24x$$), what bracketing trap causes a missing term in the denominator?","answer":"[Learner attempt — direct lesson evidence] [the tutor prompt/correction — direct lesson evidence]\n- Trap: Expanding the product rule derivative without bracketing the whole result, causing the $$-x$$ term to drop from the denominator.\n- Check: Bracket the entire product-rule derivative first: $$-2(x \\cdot \\frac{dy}{dx} + y)$$, then expand to $$-2x\\frac{dy}{dx} - 2y$$.\n- Result: Isolating $$\\frac{dy}{dx}$$ yields $$\\frac{dy}{dx} = \\frac{12-4x+y}{y-x}$$, preserving the $$-x$$ in the denominator."},{"question":"Given a point $$P(a, b)$$ on an implicitly defined curve with a specific gradient, how do you find $$a$$ and $$b$$, and what is the trap regarding rejecting values?","answer":"[Learner attempt — direct lesson evidence] [the tutor prompt/correction — direct lesson evidence] [Deferred to the learner] [Official mark-scheme reference — NOT completed in the lesson]\n1. Strategy: Two unknowns require two equations. Use the gradient condition for Equation 1, e.g., $$\\frac{12-4a+b}{b-a} = 2 \\implies 2a+b=12$$.\n2. Use the fact that P lies on the curve for Equation 2, e.g., $$4a^2 + b^2 - 2ab = 24a$$.\n3. Substitute to find candidates: $$a=2, b=8$$ and $$a=6, b=0$$.\n4. Trap: A tutor slip suggested rejecting a negative $$b$$; however, the official algebra gives $$b=0$$ or $$b=8$$, and it is the condition $$b\u003e0$$ that excludes $$b=0$$, not a negative value."},{"question":"To find the intersection of two vector lines $$l_1$$ and $$l_2$$ with an unknown parameter $$\\beta$$ in $$l_2$$'s position vector, what is the solving strategy?","answer":"[Learner attempt — direct lesson evidence] [the tutor prompt/correction — direct lesson evidence] [Deferred to the learner] [Official mark-scheme reference — NOT completed in the lesson]\n1. Set $$r_1 = r_2$$ and write three separate component equations.\n2. Strategy: Use the two equations that do not contain $$\\beta$$ to solve for $$\\lambda$$ and $$\\mu$$.\n3. Substitute $$\\lambda$$ and $$\\mu$$ into the remaining equation to find $$\\beta$$, and into either line to find the coordinates of P.\n4. Condition: This question carried no calculator-prohibition sentence, so calculator solving is allowed.\n5. Presentation: Writing final coordinates as a row vector is advised, but a column vector is also officially accepted and does not lose the mark."},{"question":"When using the substitution $$u = 3 + \\cos\\theta$$ to integrate $$\\int_0^{\\pi/2} \\frac{\\sin 2\\theta}{\\sqrt{3+\\cos\\theta}} d\\theta$$, what three specific traps must be avoided?","answer":"[Learner attempt — direct lesson evidence] [the tutor prompt/correction — direct lesson evidence] [Reached in the lesson] [Official mark-scheme reference — NOT completed in the lesson]\n1. Trap: Misremembering $$\\cos(\\pi/2)$$ as $$1/2$$; correct value is 0.\n2. Trap: Taking $$\\cos\\theta$$ outside the integral as a constant; it varies and must be replaced using $$\\cos\\theta = u - 3$$.\n3. Trap: Assuming the remaining integral yields a logarithm; use the power rule for $$u^{1/2}$$ and $$u^{-1/2}$$.\n4. Check: Transform limits correctly: $$\\theta=0 \\implies u=4$$, and $$\\theta=\\pi/2 \\implies u=3$$ (integral runs from 4 to 3).\n5. Result: The final constants are $$a=8, b=-40/3$$; the outside $$-2$$ is an intermediate factor, not the requested coefficient."},{"question":"To expand $$(2+5x)^{-2}$$ using the binomial series, what initial normalisation step is required, and why?","answer":"[Learner attempt — direct lesson evidence] [the tutor prompt/correction — direct lesson evidence] [Deferred to the learner] [Official mark-scheme reference — NOT completed in the lesson]\n1. Strategy: Choose the general binomial series because the index is negative.\n2. Condition: The series requires a bracket beginning with 1, so factor out the leading constant: $$2^{-2}(1 + \\frac{5}{2}x)^{-2}$$.\n3. Trap: Failing to extract the $$2^{-2}$$ factor before applying the general binomial expansion formula.\n4. Official reference: The expansion yields $$1/4 - 5x/4 + 75x^2/16 - 125x^3/8 + \\dots$$"},{"question":"Why is a blanket \"formulas not given in the exam\" label wrong for P4, and what key formula must you remember unaided?","answer":"1. Reason: The general binomial series, integration by parts, and P3 quotient rule are printed or available in the formula booklet.\n2. Trap: Merging formula-booklet availability with P4 assessment scope; they are two independent axes.\n3. Condition: The scalar (dot) product is **not printed** but is **required** for P4, so it must be remembered unaided."},{"question":"Which volume of revolution formula is required unaided for P4, and what is the status of the alternative formula?","answer":"1. Condition: $$\\pi \\int y^2 dx$$ is not printed as such in the formula booklet but is **required** for P4.\n2. Status: $$\\pi \\int x^2 dy$$ is mathematically valid but **not required** for P4 core scope."},{"question":"What is the trap in the learner's self-assessment note for Q6, and what status labels apply to Q3, Q7, Q9(b), and Q10?","answer":"[Self-assessed gap]\n1. Trap: the learner's note against Q6 said \"using cosine rule\". That is not how Q6 is solved; Q6 requires the double-angle identity and the substitution $$u = 3 + \\cos\\theta$$. The mistaken self-note is not preserved as a method.\n2. Status: Q3, Q7, Q9(b), and Q10 carry **No lesson status**; they were not discussed, and no mastery or deliberate omission is implied."}]},"glm_2":{"label":"GLM 5.1 · Run 2","returned_model":"z-ai/glm-5.1","cards":[{"question":"In a nested-squares problem where joining points one third of the way along the sides creates an inner square, what is a useful strategy for finding the fractional area ratio, and how many iterations are needed to find the fourth square's area relative to the first?","answer":"1. Choose convenient side lengths (e.g., pieces 1 and 2) because scaling does not change a fractional answer. 2. Use Pythagoras to find the inner square's side length ($$\\sqrt{1^2+2^2} = \\sqrt{5}$$) and compare areas to get the one-step ratio ($$5/9$$). 3. Count iterations carefully: going from the 1st to the 4th square requires 3 applications of the ratio, not 4. [Status: Reached in the lesson]"},{"question":"How do you find the range of $$f(x) = \\ln(x^2 + 3)$$ for $$x \\in \\mathbb{R}$$, and what is a common trap?","answer":"1. Establish the minimum of the inner expression: since $$x^2 \\ge 0$$, $$x^2 + 3 \\ge 3$$. 2. Apply the increasing nature of $$\\ln$$: $$f(x) \\ge \\ln 3$$. 3. Trap: stating the range is merely \"real\" rather than specifying the exact lower bound $$\\ln 3$$. [Status: the tutor correction / Prior P3 review]"},{"question":"For $$g(x) = \\frac{3+5x}{x+2}$$ with $$x \u003e -2$$, how do you find the range and inverse domain, and what is a common transformation trap?","answer":"1. Rewrite as $$g(x) = 5 - \\frac{7}{x+2}$$. 2. Identify the horizontal asymptote from the outside constant: $$y = 5$$. 3. Since $$x \u003e -2$$ (right-hand branch only), the range is $$y \u003c 5$$. 4. The inverse domain is stated in $$x$$: $$x \u003c 5$$. 5. Trap: Forgetting the outside +5 and incorrectly stating the horizontal asymptote is unchanged from the base reciprocal graph. [Status: the tutor correction / Prior P3 review]"},{"question":"When evaluating a composition of functions (e.g., $$fg(x)$$ or $$gf(x)$$), what is a common error diagnosed in prior P3 work?","answer":"1. Trap: Substituting the functions in the wrong order, which can produce invalid expressions like logarithms on both sides. 2. Check: Carefully verify which expression belongs inside each function before substituting. [Status: the tutor correction / Prior P3 review]"},{"question":"When implicitly differentiating an equation like $$4x^2 + y^2 - 2xy = 24x$$, what is the critical algebraic trap involving the product rule?","answer":"1. The product rule on $$-2xy$$ yields $$-2(x \\frac{dy}{dx} + y)$$. 2. Trap: Failing to bracket the *whole* product-rule derivative before expanding. 3. If unbracketed, the $$-x$$ term is easily lost from the denominator, resulting in the wrong answer $$\\frac{dy}{dx} = \\frac{12-4x+y}{y}$$ instead of the correct $$\\frac{12-4x+y}{y-x}$$. [Status: the tutor prompt / correction]"},{"question":"Given a point $$P(a,b)$$ on a curve and the gradient at $$P$$, how do you solve for $$a$$ and $$b$$ when you initially seem to have two unknowns but only one equation from the gradient?","answer":"1. Use the fact that $$P(a,b)$$ lies on the curve as your *second* equation. 2. Substitute the linear relation from the gradient (e.g., $$b = 12 - 2a$$) into the curve equation. 3. Solve the resulting quadratic and apply given conditions (e.g., $$b \u003e 0$$) to reject invalid candidates. 4. Trap: The official algebra gives candidates like $$b = 0$$ or $$b = 8$$; it is the condition $$b \u003e 0$$ that excludes 0, not the rejection of a negative value. [Status: Deferred to the learner / Official mark-scheme reference]"},{"question":"To find where two vector lines $$l_1$$ and $$l_2$$ intersect, you set their position vectors equal. What is the strategic next step, and which equations do you use?","answer":"1. Equate components to form three separate simultaneous equations. 2. Use the two equations that do *not* contain the unknown parameter (like $$\\beta$$) to solve for the scalar parameters $$\\lambda$$ and $$\\mu$$. 3. Substitute $$\\lambda$$ and $$\\mu$$ into the remaining equation to find the unknown parameter. 4. Substitute back into either line for the coordinates (row or column format accepted). [Status: Deferred to the learner / Official mark-scheme reference]"},{"question":"When using the substitution $$u = 3 + \\cos\\theta$$ for $$\\int_0^{\\pi/2} \\dots d\\theta$$, what are the transformed limits and a common trigonometric trap?","answer":"1. Lower limit: $$u(0) = 3 + \\cos(0) = 4$$. 2. Upper limit: $$u(\\pi/2) = 3 + \\cos(\\pi/2) = 3 + 0 = 3$$. 3. Trap: Incorrectly evaluating $$\\cos(\\pi/2)$$ as $$1/2$$ instead of 0. [Status: the tutor correction]"},{"question":"When substituting $$u = 3 + \\cos\\theta$$ into an integral containing $$\\sin 2\\theta$$ and $$\\cos\\theta$$, what is the trap regarding $$\\cos\\theta$$, and how must it be handled?","answer":"1. Trap: Treating $$\\cos\\theta$$ as a constant and trying to take it outside the integral. 2. Correct method: Since $$u = 3 + \\cos\\theta$$, $$\\cos\\theta$$ varies and must be replaced by $$u - 3$$ before integrating. 3. Also remember to use the double-angle identity $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$ to cancel the $$\\sin\\theta$$ from the $$du$$ substitution. [Status: the tutor correction]"},{"question":"To expand $$(2 + 5x)^{-2}$$ using the general binomial series, what initial algebraic step is required, and why?","answer":"1. Factor out the constant term to make the bracket start with 1: $$(2 + 5x)^{-2} = 2^{-2}(1 + \\frac{5}{2}x)^{-2}$$. 2. Reason: The general binomial series $$(1+x)^n$$ requires the leading term to be 1. 3. Trap: Forgetting to choose the general series because the index is negative. [Status: the tutor prompt / Deferred to the learner]"},{"question":"Which two formulas required for P4 assessment are NOT printed in the exam formula booklet and must be remembered unaided?","answer":"1. The scalar (dot) product formula. 2. The volume of revolution formula $$\\pi \\int y^2 dx$$. Note: A blanket \"formulas not given\" label is wrong; the general binomial series and integration by parts ARE printed. [Status: Formula register]"},{"question":"For the October 2025 P4 Q6 (trigonometric substitution integral), what was the learner's mistaken self-note about the method, and what is the actual method required?","answer":"1. Mistaken self-note: \"using cosine rule\". 2. Actual method required: The double-angle identity ($$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$) and the substitution $$u = 3 + \\cos\\theta$$ (using the power rule for integration, not logarithms). [Status: Self-assessed gap]"}]},"glm_3":{"label":"GLM 5.1 · Run 3","returned_model":"z-ai/glm-5.1","cards":[{"question":"When implicitly differentiating an equation containing a product of $$x$$ and $$y$$, such as $$-2xy$$, what is the critical trap to avoid after applying the product rule?","answer":"1. Apply the product rule to get $$-2\\left(x \\frac{dy}{dx} + y\\right)$$. 2. **Trap:** You must bracket the *whole* product-rule derivative before expanding and isolating $$\\frac{dy}{dx}$$; otherwise, the $$-x$$ term will be lost from the final denominator. [the tutor prompt / correction]"},{"question":"When finding a point $$P(a,b)$$ on an implicitly defined curve where you are given the gradient, you will have two unknowns but only one equation from the gradient. What strategy provides the second equation?","answer":"Use the fact that $$P$$ lies on the curve. Substitute $$x = a$$ and $$y = b$$ into the original curve equation to get the second relation. Solve simultaneously, then apply any given conditions (e.g. $$b \u003e 0$$) to select the valid point. [Reached in the lesson]"},{"question":"When solving for the intersection of two vector lines, one of which contains an unknown parameter $$\\beta$$, what is the strategic order for using the three component equations?","answer":"1. Set the position vectors equal to get three component equations. 2. Use the *two equations that do not contain $$\\beta$$* to solve for the parameters $$\\lambda$$ and $$\\mu$$. 3. Substitute $$\\lambda$$ and $$\\mu$$ into the remaining equation to find $$\\beta$$. [Learner attempt / the tutor prompt]"},{"question":"How do you determine if calculator solving is permitted for intersecting vector lines, and does writing the final intersection point as a column vector lose marks?","answer":"1. Check the question for a printed \"solutions relying entirely on calculator technology are not acceptable\" sentence; if absent, calculator solving is allowed. 2. No: the official mark scheme accepts the final coordinates written as either a row or a column vector. [the tutor prompt / Official MS reference]"},{"question":"In a trigonometric substitution using $$u = 3 + \\cos\\theta$$, once $$\\sin\\theta$$ is cancelled from the numerator and the $$d\\theta$$ replacement, what must you do with the remaining $$\\cos\\theta$$ term, and why?","answer":"You must replace $$\\cos\\theta$$ with $$u - 3$$. **Trap:** $$\\cos\\theta$$ is *not* a constant; it varies with $$\\theta$$, so it cannot be pulled outside the integral as a constant coefficient. [the tutor prompt / correction]"},{"question":"When evaluating a transformed integral like $$\\int (u^{1/2} - 3u^{-1/2}) \\, du$$ arising from a trig substitution, what is the integration method, and what are two common errors in the setup phase?","answer":"1. Use the *power rule* for integration (not the natural log). 2. **Common errors:** Evaluating $$\\cos(\\pi/2)$$ as $$1/2$$ instead of $$0$$ when transforming limits; forgetting the negative sign from $$d\\theta = -du/\\sin\\theta$$ which flips the order of the integration limits. [the tutor prompt / correction]"},{"question":"To expand $$(2 + 5x)^{-2}$$ using the general binomial series, how must you first rewrite the expression, and why?","answer":"Rewrite as $$2^{-2}\\left(1 + \\frac{5}{2}x\\right)^{-2}$$. **Reason:** The general binomial series requires a bracket beginning with $$1$$. You must factor out the leading constant raised to the negative index. [the tutor prompt / correction]"},{"question":"A design is formed by joining points one-third of the way along a square's sides to form an inner square, repeated multiple times. How do you efficiently find the area of the $$n$$-th inner square as a fraction of the original?","answer":"1. Find the one-step area ratio (e.g., inner area 5 to outer area 9 gives ratio $$5/9$$). 2. Raise this invariant ratio to the power of the number of iterations (e.g., to the 3rd power for the 4th square). 3. **Trap:** Count iterations carefully (1st to 4th square is 3 applications, not 4). [Learner attempt / the tutor prompt]"},{"question":"How do you find the range of a logarithmic function like $$f(x) = \\ln(x^2 + 3)$$ for $$x \\in \\mathbb{R}$$?","answer":"1. Find the minimum value of the bracket: $$x^2 \\ge 0 \\implies x^2 + 3 \\ge 3$$. 2. Apply the fact that $$\\ln$$ is an increasing function: $$f(x) \\ge \\ln 3$$. 3. **Trap:** Do not just state the range is \"real\" numbers. [Prior P3 review / the tutor correction]"},{"question":"For a transformed reciprocal function like $$g(x) = 5 - \\frac{7}{x+2}$$ with domain $$x \u003e -2$$, how do you determine the range and the domain of the inverse?","answer":"1. Identify the horizontal asymptote (here $$y = 5$$) to find the boundary of the range. 2. Use the domain $$x \u003e -2$$ (right-hand branch only) to determine the inequality direction: range is $$y \u003c 5$$. 3. The domain of the inverse equals the range of the original function (so inverse domain is $$x \u003c 5$$). 4. **Trap:** State range in terms of $$y$$ and domain in terms of $$x$$. [Prior P3 review / the tutor correction]"},{"question":"When evaluating a function composition like $$gf(x)$$, what is the common trap regarding substitution order?","answer":"Substituting the functions in the wrong order. **Check:** Ensure the *inner* function is evaluated first; the output of $$f(x)$$ becomes the input of $$g$$. Mixing this produces an incorrect equation (e.g., logarithms on both sides). [Prior P3 review / the tutor correction]"},{"question":"Which two required P4 formulae are NOT printed in the exam formula booklet and must be memorised, and which two common P4 formulae ARE printed?","answer":"1. **Not printed but required:** Scalar (dot) product; Volume of revolution ($$\\pi \\int y^2 dx$$). 2. **Printed:** General binomial series $$(1+x)^n$$; Integration by parts. 3. **Trap:** A blanket \"formulas not given in the exam\" label is wrong; you must check the booklet. [Formula register]"}]},"qwen_1":{"label":"Qwen 3.7 Max","returned_model":"qwen/qwen3.7-max","cards":[{"question":"In the ESAT nested-squares warm-up, what is the strategic advantage of observing that scaling the original square does not change a fractional area answer, and how many iterations are needed to reach the fourth square? [Status: Reached in the lesson]","answer":"1. Scaling invariance allows choosing convenient side lengths (e.g., splitting sides into pieces $$1$$ and $$2$$) to easily calculate the one-step area ratio via Pythagoras. 2. Going from the first to the fourth square requires exactly *three* applications of the ratio, not four."},{"question":"When finding the range of $$f(x) = \\ln(x^2 + 3)$$ for $$x \\in \\mathbb{R}$$, what is the common learner trap regarding the lower bound, and what is the correct range? [Status: Prior P3 review (NOT a P4 question)]","answer":"1. Trap: Stating the range is merely \"all real numbers\" because $$x^2 \\ge 0$$. 2. Correction: Since $$x^2 \\ge 0$$, $$x^2 + 3 \\ge 3$$. Because $$\\ln$$ is an increasing function, the minimum value is $$\\ln 3$$. 3. Correct range: $$f(x) \\ge \\ln 3$$."},{"question":"For $$g(x) = \\frac{3+5x}{x+2}$$ with $$x \u003e -2$$, what algebraic step reveals the horizontal asymptote to determine the range and the inverse function's domain? [Status: Prior P3 review (NOT a P4 question)]","answer":"1. Perform algebraic division to rewrite the function as $$g(x) = 5 - \\frac{7}{x+2}$$. 2. This reveals the horizontal asymptote at $$y = 5$$. 3. Since $$x \u003e -2$$ restricts the graph to one branch, the range is $$y \u003c 5$$. 4. The domain of the inverse function is therefore $$x \u003c 5$$."},{"question":"When implicitly differentiating $$4x^2 + y^2 - 2xy = 24x$$, what specific bracketing step prevents the loss of the $$-x$$ term in the final denominator for $$\\frac{dy}{dx}$$? [Status: Reached in the lesson]","answer":"1. When differentiating $$-2xy$$ using the product rule, you must bracket the *whole* derivative as $$-2\\left(x\\frac{dy}{dx} + y\\right)$$ before expanding. 2. Expanding prematurely or forgetting the outer $$-2$$ distribution causes the $$-x$$ term to vanish when isolating $$\\frac{dy}{dx}$$. 3. Correct isolated form: $$\\frac{dy}{dx} = \\frac{12 - 4x + y}{y - x}$$."},{"question":"If a point $$P(a,b)$$ lies on a curve and the gradient at $$P$$ is given, what strategy provides the necessary second equation to solve for $$a$$ and $$b$$? [Status: Official mark-scheme reference (NOT completed in the lesson)]","answer":"1. The gradient condition (e.g., $$\\frac{dy}{dx} = 2$$) provides the first equation relating $$a$$ and $$b$$. 2. The strategy trigger is to use the fact that \"$$P$$ lies on the curve\" to substitute $$x=a$$ and $$y=b$$ into the *original curve equation* for the second relation. 3. Solve the resulting simultaneous equations."},{"question":"When solving for point $$P(a,b)$$ on $$4x^2 + y^2 - 2xy = 24x$$ with gradient $$2$$, $$a\u003e0$$ and $$b\u003e0$$, the algebra yields $$b=0$$ or $$b=8$$. What is the precise reason for rejecting $$b=0$$? [Status: Official mark-scheme reference (NOT completed in the lesson)]","answer":"1. The condition given in the question is $$b \u003e 0$$. 2. Trap: Assuming $$b=0$$ is rejected because it is negative. 3. Correction: $$b=0$$ is rejected strictly because it is not strictly greater than zero ($$0 \\ngtr 0$$), leaving $$b=8$$ and $$P=(2,8)$$."},{"question":"When finding the intersection of $$\\mathbf{r}_1 = \\begin{pmatrix} 2 \\\\ -1 \\\\ 3 \\end{pmatrix} + \\lambda \\begin{pmatrix} 1 \\\\ 4 \\\\ 2 \\end{pmatrix}$$ and $$\\mathbf{r}_2 = \\begin{pmatrix} -1 \\\\ \\beta \\\\ 6 \\end{pmatrix} + \\mu \\begin{pmatrix} 2 \\\\ -1 \\\\ 7 \\end{pmatrix}$$, which component equations should be used first to find $$\\lambda$$ and $$\\mu$$, and why? [Status: the tutor prompt / correction]","answer":"1. Equate components to form three equations. 2. Use the $$x$$ and $$z$$ component equations (which only contain $$\\lambda$$ and $$\\mu$$) to solve for the parameters. 3. Reason: The $$y$$ component equation contains the unknown constant $$\\beta$$, so it cannot be used until $$\\lambda$$ and $$\\mu$$ are known."},{"question":"When evaluating $$\\int_0^{\\pi/2} \\frac{\\sin 2\\theta}{\\sqrt{3 + \\cos \\theta}} d\\theta$$ using $$u = 3 + \\cos \\theta$$, what are the three specific learner traps to avoid regarding the limits, the numerator, and the integration rule? [Status: the tutor prompt / correction]","answer":"1. Limits trap: $$\\cos(\\pi/2) = 0$$, not $$1/2$$. The upper limit maps to $$u=3$$. 2. Numerator trap: $$\\cos \\theta$$ varies and cannot be taken outside as a constant; it must be replaced by $$u - 3$$. 3. Integration rule trap: The resulting integral $$\\int u^{-1/2} du$$ requires the power rule, not the natural logarithm ($$\\ln$$) rule."},{"question":"To find the first four terms of $$(2 + 5x)^{-2}$$ in ascending powers of $$x$$, what normalization step must be performed before applying the general binomial series, and why? [Status: the tutor prompt / correction]","answer":"1. The general binomial series formula $$(1+x)^n$$ requires the bracket to begin with $$1$$. 2. Factor out $$2^{-2}$$ to rewrite the expression as $$2^{-2}\\left(1 + \\frac{5}{2}x\\right)^{-2}$$. 3. This allows the valid application of the series expansion for a negative index."},{"question":"According to the P4 formula register, what is the status of the scalar (dot) product formula regarding its availability in the exam formula booklet and its assessment scope? [Status: Reached in the lesson]","answer":"1. Booklet availability: It is **not printed** in the formula booklet and must be remembered unaided. 2. Assessment scope: It is **required** for P4 (specifically §7.7)."},{"question":"How does the P4 formula register classify the general binomial series $$(1+x)^n$$ in terms of formula-booklet availability versus P4 assessment scope? [Status: Reached in the lesson]","answer":"1. Booklet availability: It is **printed** in the formula booklet (stating $$n \\in \\mathbb{R}, |x| \u003c 1$$). 2. Assessment scope: It is in scope, but P4 specifically assesses **rational** values of $$n$$, not just integers."},{"question":"A learner's self-assessed gap note for evaluating $$\\int_0^{\\pi/2} \\frac{\\sin 2\\theta}{\\sqrt{3 + \\cos \\theta}} d\\theta$$ suggests \"using cosine rule\". What is the actual required method, and what is the status of the learner's note? [Status: Self-assessed gap]","answer":"1. Actual method: Use the double-angle identity $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$ followed by the substitution $$u = 3 + \\cos \\theta$$. 2. Status of note: The \"cosine rule\" note is a mistaken self-assessment and is explicitly *not* preserved as a valid method."}]},"minimax_1":{"label":"MiniMax M3 · Run 1","returned_model":"minimax/minimax-m3","cards":[{"question":"A square design is formed by joining points one third along each side, repeating. The area of the fourth square is what fraction of the original? State the invariant strategy and the iteration count.","answer":"1. Choose convenient side lengths (e.g. split 1 and 2); fractional answers are scale-invariant, so picking numbers is legitimate. 2. Inner side by Pythagoras: √(1²+2²)=√5. 3. Area ratio one step: 5/9. 4. From square 1 to square 4 is **three** applications (not four). 5. (5/9)³ = 125/729. Trap: miscounting iterations; trap: oversimplifying the denominator."},{"question":"For f(x) = ln(x² + 3), x ∈ ℝ, state the range and justify it using monotonicity of ln.","answer":"1. x² ≥ 0 ⇒ x² + 3 ≥ 3. 2. ln is strictly increasing, so ln(x²+3) ≥ ln 3. 3. Range: f(x) ≥ ln 3. Trap: answering \"all real numbers\" by forgetting that ln has a finite lower bound on its domain."},{"question":"For g(x) = (3+5x)/(x+2), x \u003e −2, rewrite in the form A + B/(x+2) and use the x-domain to determine the range and the inverse's domain.","answer":"1. Long division: (3+5x)/(x+2) = 5 − 7/(x+2). 2. Horizontal asymptote y = 5; vertical asymptote x = −2. 3. x \u003e −2 keeps only the right-hand branch, so y \u003c 5. 4. Range: y \u003c 5; inverse domain: x \u003c 5. Traps: forgetting to keep the whole reconstructed numerator over x+2 before splitting; stating range in x or domain in y."},{"question":"For C: 4x² + y² − 2xy = 24x, find dy/dx in simplest form. Identify the bracketing step that prevents dropping a term.","answer":"1. Differentiate implicitly: 8x + 2y(dy/dx) − 2[(dy/dx)·x + y] = 24. 2. Bracket the **whole** product-rule result so the −x survives. 3. Collect dy/dx: (2y − 2x)(dy/dx) = 24 − 8x + 2y. 4. dy/dx = (12 − 4x + y)/(y − x). Trap: omitting −2x from the denominator by failing to bracket the entire derivative of xy."},{"question":"For C: 4x² + y² − 2xy = 24x, with gradient 2 at P(a, b), a, b \u003e 0, outline the two-equation strategy to find P (do not solve).","answer":"1. First relation from gradient: (12 − 4a + b)/(b − a) = 2 ⇒ 2a + b = 12. 2. Second relation: P lies on C, so 4a² + b² − 2ab = 24a. 3. Substitute b = 12 − 2a into the curve equation and solve; choose the candidate with b \u003e 0. Trap: treating the gradient equation alone as sufficient; trap: rejecting by sign of b rather than by b \u003e 0 (a valid candidate has b = 0, not negative)."},{"question":"Two lines l₁ = (2, −1, 3) + λ(1, 4, 2) and l₂ = (−1, β, 6) + μ(2, −1, 7) intersect at P. Give the system-setup strategy (do not solve).","answer":"1. Equate components to get **three** equations in λ, μ, β. 2. Use equations (1) 2+λ = −1+2μ and (3) 3+2λ = 6+7μ to solve λ, μ (no β involved). 3. Substitute λ, μ into equation (2) to obtain β. 4. Substitute λ into l₁ (or μ into l₂) for P. Traps: trying to eliminate β first; mixing λ and μ across components; Q5 has **no** calculator-prohibition, so simultaneous-equation solving is permitted."},{"question":"Show ∫₀^{π/2} sin 2θ/√(3 + cos θ) dθ = a√3 + b using u = 3 + cos θ. Give the substitution setup, transformed limits, and the integrand ready for power-rule integration (do not finish).","answer":"1. sin 2θ = 2 sin θ cos θ. 2. du = −sin θ dθ, so dθ = −du/sin θ. 3. θ = 0 ⇒ u = 4; θ = π/2 ⇒ u = 3 (order 4 → 3). 4. Replace cos θ by u − 3, not by a constant. 5. Integral becomes −2 ∫₄³ (u − 3)/√u du = −2 ∫₄³ (u^{1/2} − 3u^{−1/2}) du. 6. Apply the power rule to u^{3/2} and u^{1/2}. Traps: cos(π/2) = 1/2 (it is 0); treating cos θ as constant; the leading −2 is an intermediate factor, not the requested coefficient a."},{"question":"To expand (2 + 5x)⁻² in ascending powers of x, state (i) why the general binomial series is used and (ii) the rewriting that puts a \"1 +\" bracket first.","answer":"1. The index −2 is negative, so the general series (1+x)ⁿ is required. 2. Factor to expose a leading 1: (2+5x)⁻² = 2⁻² (1 + (5/2)x)⁻² = (1/4)(1 + (5/2)x)⁻². 3. Apply (1+x)ⁿ with n = −2, x replaced by (5/2)x. Trap: using the positive-integer expansion when the index is negative."},{"question":"For (2 + 5x)⁻², state the validity interval for the expansion, in terms of |x|.","answer":"The general binomial series (booklet) requires |argument| \u003c 1. Here the argument is (5/2)x, so |5x/2| \u003c 1 ⇒ |x| \u003c 2/5. Trap: stating |x| \u003c 1 from the booklet without substituting the actual argument."},{"question":"A self-assessed note against Q6 suggested \"use the cosine rule\". Is this a valid method for Q6, and what is the correct approach?","answer":"The cosine-rule method is **not** how Q6 is solved. Q6 requires the double-angle identity sin 2θ = 2 sin θ cos θ together with the substitution u = 3 + cos θ, then a power-rule integration. Always check that a proposed method actually targets the integrand's structure (here, a trigonometric integral, not a triangle-side problem). Trap: trusting a self-note that misidentifies the technique."},{"question":"Classify the scalar (dot) product on two axes: (i) is it printed in the exam formula booklet, and (ii) is it within P4 assessment scope?","answer":"(i) **Not printed** — must be memorised. (ii) **Required** for P4 (specification §7.7). A blanket \"formulas not given\" label is wrong: the general binomial series, integration by parts and quotient rule are supplied or available; the scalar product is the genuinely-unaided P4 formula. Trap: conflating \"booklet\" and \"scope\" — they are independent axes."},{"question":"For the curve 4x² + y² − 2xy = 24x, the gradient at P(a,b) is 2 with a, b \u003e 0. Carry out the deferred substitution to find P (final step).","answer":"1. From gradient: b = 12 − 2a. 2. Substitute into 4a² + b² − 2ab = 24a: 4a² + (12−2a)² − 2a(12−2a) = 24a ⇒ 12a² − 96a + 144 = 0 ⇒ a² − 8a + 12 = 0. 3. Factor: (a−2)(a−6) = 0 ⇒ a = 2 or a = 6. 4. Candidates: (a,b) = (2, 8) and (6, 0). 5. Apply b \u003e 0: choose **P = (2, 8)**. Trap: rejecting by \"b must be positive, so discard the negative-b candidate\" — the rejected candidate has b = 0, not negative."}]},"minimax_2":{"label":"MiniMax M3 · Run 2","returned_model":"minimax/minimax-m3","cards":[{"question":"In the ESAT nested-squares warm-up, with outer square of side 3 and inner side formed by joining points one-third along each side, what is the area of the fourth square as a fraction of the original?","answer":"Each new square has area ratio (5/9) of the previous. From the 1st to the 4th square is 3 applications, so the fraction is (5/9)³ = 125/729. Stop once the matching multiple-choice option is found; don't over-simplify."},{"question":"For f(x) = ln(x²+3), x ∈ ℝ, state the range and justify it in one step.","answer":"Since x² ≥ 0, x²+3 ≥ 3, and ln is increasing, f(x) ≥ ln 3. Range is [ln 3, ∞). Trap: \"range is all real numbers\" — false, ln cannot be negative of the minimum of its argument here."},{"question":"For g(x) = (3+5x)/(x+2) with domain x \u003e −2, write g in the form 5 − 7/(x+2), state the range, and state the domain of g⁻¹.","answer":"By division, g(x) = 5 − 7/(x+2). On x \u003e −2 the right-hand branch of the hyperbola gives y \u003c 5, so range is (−∞, 5). The inverse domain equals the range of g, so inverse domain is x \u003c 5. Always quote the range using y and the inverse domain using x."},{"question":"Differentiate 4x² + y² − 2xy = 24x implicitly. What bracket must be kept intact to avoid losing a term in the denominator?","answer":"Bracket the whole product-rule derivative: 8x + 2y(dy/dx) − 2(x(dy/dx) + y) = 24. Then (2y − 2x)(dy/dx) = 24 − 8x + 2y, giving dy/dx = (12 − 4x + y)/(y − x). Trap: expanding −2(xy)' as −2x(dy/dx) − y drops the y."},{"question":"For curve C: 4x² + y² − 2xy = 24x, point P(a,b) lies on C with gradient 2, a\u003e0, b\u003e0. What two equations must be solved, and which root is valid?","answer":"1. (12 − 4a + b)/(b − a) = 2 ⇒ b = 12 − 2a. 2. 4a² + b² − 2ab = 24a. Substitute to get a² − 8a + 12 = 0 ⇒ a = 2 or a = 6, giving (a,b) = (2,8) or (6,0). b \u003e 0 selects (2, 8). Trap: b is not negative; it is 0, so the rejection uses b \u003e 0 not b \u003e 0 vs b \u003c 0."},{"question":"l₁: r = (2,−1,3) + λ(1,4,2), l₂: r = (−1,β,6) + μ(2,−1,7) intersect at P. Which two component equations should be solved first, and why?","answer":"Equations (1) and (3): 2+λ = −1+2μ and 3+2λ = 6+7μ contain only λ and μ, not β. Solving gives λ = −9, μ = −3; then equation (2) gives β = −1+4(−9)+(−3) = −40, and P = (−7,−37,−15). A calculator simultaneous-equation solver is permitted because Q5 has no \"no calculator\" sentence."},{"question":"In the Q6 integral ∫₀^{π/2} sin 2θ / √(3+cos θ) dθ, why must cos θ be replaced rather than taken outside the integral?","answer":"cos θ is a variable, not a constant, so it must be rewritten as u − 3. After sin 2θ = 2 sin θ cos θ and dθ = −du/sin θ, the integral becomes −2∫₄³ (u−3)/√u du = −2∫₄³ (u^{1/2} − 3u^{−1/2}) du. Use the power rule, not ln. Final: 8√3 − 40/3, so a = 8, b = −40/3. Limits map 0→π/2 as 4→3."},{"question":"For (2+5x)⁻² in Q1(a), what rearrangement is required before applying the general binomial series, and what is the validity interval in Q1(b)?","answer":"Factor so the bracket begins with 1: (2+5x)⁻² = 2⁻²(1 + (5/2)x)⁻². The booklet version of the general binomial series requires |x| \u003c 1, so validity is |(5/2)x| \u003c 1, i.e. |x| \u003c 2/5. First four terms: 1/4 − 5x/4 + 75x²/16 − 125x³/8."},{"question":"Q1(c) asks for a, b, c with (4/(2+5x))² ≈ a + bx + cx². Which coefficients match the expansion in Q1(a)?","answer":"(4/(2+5x))² = 16(2+5x)⁻² = 16·(2⁻²(1+(5/2)x)⁻²) = 4(1+(5/2)x)⁻². So a = 4, b = −20, c = 75. The factor 4 comes from 16/4; b and c are 4 times the corresponding Q1(a) coefficients (4·(−5/4) and 4·(75/16))."},{"question":"State one P4 formula or tool that is printed in the exam formula booklet and one that must be memorised. Justify the distinction.","answer":"Printed: the general binomial series (1+x)ⁿ with n ∈ ℝ, |x| \u003c 1, or integration by parts. Must be memorised: the scalar (dot) product a·b = |a||b|cos θ. Trap: do not lump all of P4 under \"formulas not given\" — booklet coverage and P4 scope are independent axes."},{"question":"the learner's self-note against Q6 said \"using cosine rule\". Why is that not the right method, and what is?","answer":"Q6 has no triangle or side-length geometry to which a cosine rule could be applied. The official method is the double-angle identity sin 2θ = 2 sin θ cos θ followed by the substitution u = 3 + cos θ. the learner's note is a mistaken self-assessment, not a valid approach."},{"question":"Name the four October 2025 P4 questions that carry no lesson status in this 26 June 2026 lesson, and state what should be done about them.","answer":"Q3, Q7, Q9(b) and Q10 carry no lesson status — they were not discussed and no mastery or deliberate omission is implied. Treat them as not yet covered; do not infer \"skipped because easy\" or \"skipped because hard\". The explicit self-assessed gaps requiring future work are Q2, Q8 and Q9(a)."}]},"deepseek_1":{"label":"DeepSeek V4 Pro","returned_model":"deepseek/deepseek-v4-pro","cards":[{"question":"When finding \\(\\frac{dy}{dx}\\) for \\(4x^2 + y^2 - 2xy = 24x\\), a common mistake gives the denominator as \\(y\\) instead of \\(y-x\\). What step is missed?","answer":"The product‑rule derivative of \\(-2xy\\) is \\(-2(x\\frac{dy}{dx} + y)\\). Collecting \\(\\frac{dy}{dx}\\) terms gives \\(2y\\frac{dy}{dx} - 2x\\frac{dy}{dx} = (2y - 2x)\\frac{dy}{dx}\\). Forgetting the \\(-2x\\) term leaves only \\(2y\\) in the factor."},{"question":"A point \\(P(a,b)\\) lies on a curve and the gradient at \\(P\\) is given. You have one equation from setting \\(\\frac{dy}{dx}\\) equal to that gradient. How do you obtain a second equation to find \\(a\\) and \\(b\\)?","answer":"Use the fact that \\(P\\) lies on the curve: substitute \\(x = a, y = b\\) into the original curve equation. Then solve the two simultaneous equations."},{"question":"Two vector lines \\(\\mathbf{r}_1 = \\mathbf{a} + \\lambda \\mathbf{d}_1\\) and \\(\\mathbf{r}_2 = \\mathbf{b} + \\mu \\mathbf{d}_2\\) intersect. Outline the strategy to find the intersection point.","answer":"Set \\(\\mathbf{a} + \\lambda \\mathbf{d}_1 = \\mathbf{b} + \\mu \\mathbf{d}_2\\). Equate components to form three equations. Use two of them to solve for \\(\\lambda\\) and \\(\\mu\\). Substitute back into either line to get the coordinates. Use the third equation to find any unknown parameter (e.g., \\(\\beta\\)) if required."},{"question":"In the substitution \\(u = 3 + \\cos\\theta\\) for \\(\\displaystyle \\int_0^{\\pi/2} \\frac{\\sin 2\\theta}{\\sqrt{3+\\cos\\theta}}\\,d\\theta\\), what three key steps prevent common errors?","answer":"1. Rewrite \\(\\sin 2\\theta = 2\\sin\\theta\\cos\\theta\\).  \n2. From \\(du = -\\sin\\theta\\,d\\theta\\), cancel \\(\\sin\\theta\\) and replace the remaining \\(\\cos\\theta\\) with \\(u-3\\) (not a constant).  \n3. Change limits: \\(\\theta = 0 \\to u = 4\\), \\(\\theta = \\pi/2 \\to u = 3\\). The integral becomes \\(-2\\int_4^3 \\frac{u-3}{\\sqrt{u}}\\,du\\); use the power rule, not \\(\\ln\\)."},{"question":"To expand \\((2+5x)^{-2}\\) with the binomial series, what must you do first and why?","answer":"Factor out \\(2^{-2}\\) to write \\(\\frac{1}{4}\\left(1+\\frac{5}{2}x\\right)^{-2}\\). The general binomial series for \\((1+ax)^n\\) requires the bracket to start with 1; the factor ensures the correct form."},{"question":"Give the formula for the volume of revolution when \\(y=f(x)\\) is rotated \\(2\\pi\\) about the \\(x\\)-axis from \\(x=a\\) to \\(x=b\\), and evaluate it for \\(y=\\sqrt{x}\\) from \\(0\\) to \\(4\\).","answer":"\\(V = \\pi \\int_a^b y^2 \\, dx\\). For \\(y=\\sqrt{x}\\), \\(V = \\pi \\int_0^4 x \\, dx = \\pi\\left[\\frac{x^2}{2}\\right]_0^4 = 8\\pi\\)."},{"question":"Find the range of \\(f(x) = \\ln(x^2+3)\\), \\(x \\in \\mathbb{R}\\).","answer":"\\(x^2 \\ge 0 \\implies x^2+3 \\ge 3\\). Since \\(\\ln\\) is increasing, \\(f(x) \\ge \\ln 3\\). Range: \\([\\ln 3, \\infty)\\)."},{"question":"\\(g(x) = \\frac{3+5x}{x+2},\\; x \u003e -2\\) can be written as \\(5 - \\frac{7}{x+2}\\). How does this form help find the range of \\(g\\) and the domain of \\(g^{-1}\\)?","answer":"The graph is a transformation of \\(-\\frac{1}{x}\\): shift left 2, vertical stretch by 7, shift up 5. For \\(x \u003e -2\\) we have the right branch only. Horizontal asymptote is \\(y=5\\); as \\(x\\to -2^+,\\; g(x)\\to -\\infty\\); as \\(x\\to\\infty,\\; g(x)\\to 5^-\\). Hence range is \\(y \u003c 5\\). The domain of \\(g^{-1}\\) equals the range of \\(g\\): \\(x \u003c 5\\)."},{"question":"When composing a logarithmic function and a rational function, how can an unexpected “log of a log” alert you to a composition order error?","answer":"If you intended to put the rational function inside the log, you should get a single logarithm. Getting a logarithm inside another logarithm (or a log inside a rational expression) suggests you substituted the log into the rational function by mistake. Check which function is supposed to be the inner one."},{"question":"In the nested‑squares problem, points are joined one third of the way along each side of a square to form an inner square. By what factor does the area reduce at each step? Hence find the area of the fourth square as a fraction of the original.","answer":"Choose a side length of 3; the segments are 1 and 2. Inner side length by Pythagoras: \\(\\sqrt{1^2+2^2} = \\sqrt{5}\\). Area ratio = \\(\\frac{5}{9}\\). This ratio is invariant. For the fourth square apply it three times: \\(\\left(\\frac{5}{9}\\right)^3 = \\frac{125}{729}\\)."},{"question":"Which vector formula is **not** provided in the Edexcel IAL formula booklet and must be memorised for P4?","answer":"The scalar (dot) product: \\(\\mathbf{a}\\cdot\\mathbf{b} = |\\mathbf{a}||\\mathbf{b}|\\cos\\theta\\) or \\(a_1b_1 + a_2b_2 + a_3b_3\\). It is required for P4 but not printed in the booklet."},{"question":"After writing \\((2+5x)^{-2} = \\frac{1}{4}\\left(1+\\frac{5}{2}x\\right)^{-2}\\) for binomial expansion, state the range of \\(x\\) for which the expansion is valid.","answer":"The expansion of \\((1+ax)^n\\) is valid for \\(|ax| \u003c 1\\). Here \\(a = \\frac{5}{2}\\), so \\(\\left|\\frac{5}{2}x\\right| \u003c 1 \\implies |x| \u003c \\frac{2}{5}\\)."}]},"kimi_1":{"label":"Kimi K3","returned_model":"moonshotai/kimi-k3","cards":[{"question":"In the lesson's recording-derived ESAT warm-up (exact official ESAT paper not established; not a Pearson P4 item), points one third of the way along a square's sides are joined to form an inner square, repeated. Why may convenient side lengths be chosen, and how is the fourth square's area found?","answer":"1. The answer is a *fraction*, invariant under scaling, so choose side pieces $$1$$ and $$2$$ (side $$3$$).\n2. Inner side by Pythagoras: $$\\sqrt{2^2+1^2}=\\sqrt{5}$$; areas $$5$$ vs $$9$$, so one-step ratio $$\\frac{5}{9}$$.\n3. First → fourth square is *three* applications: $$\\left(\\frac{5}{9}\\right)^3=\\frac{125}{729}$$ (status: completed live, learner-led).\nTraps: miscounting the three iterations; ESAT timing advice — stop once the correct option is secure."},{"question":"Prior P3 review (recording/board-derived; exact sitting not established; NOT a P4 question): find the range of $$f(x)=\\ln(x^2+3)$$, $$x\\in\\mathbb{R}$$, and justify it.","answer":"1. $$x^2\\ge 0 \\Rightarrow x^2+3\\ge 3$$.\n2. Since $$\\ln$$ is increasing, $$f(x)\\ge \\ln 3$$.\nCommon trap: answering \"all real numbers\" (or $$y\\ge 3$$) — the corrected lower bound is $$\\ln 3$$, the starting value of the range."},{"question":"Prior P3 review (NOT a P4 question): for $$g(x)=\\dfrac{3+5x}{x+2}$$, $$x\u003e-2$$, how are the range and inverse domain obtained, and what checks apply?","answer":"1. Divide: $$g(x)=5-\\frac{7}{x+2}$$ (quotient plus remainder over divisor). Reconstructing as $$5(x+2)-7$$ is valid *only* if the whole numerator stays over $$x+2$$ before splitting.\n2. From $$h(x)=-\\frac1x$$, $$g(x)=7h(x+2)+5$$: vertical asymptote $$x=-2$$, horizontal asymptote $$y=5$$ (learner traps: claiming either is unchanged); $$x\u003e-2$$ keeps the right-hand branch.\n3. Range $$y\u003c5$$, stated in $$y$$; inverse domain $$x\u003c5$$, stated in $$x$$. An inverse answer needs *both* an equation and a domain."},{"question":"Prior P3 review (later part of P3 Q3): what error did the tutor diagnose in the composition work, and what is that part's lesson status?","answer":"1. Diagnosis: $$f$$ and $$g$$ were substituted in the *wrong order*, producing logarithms on both sides; the tutor pointed to which expression belongs inside each function.\n2. Check to apply: always confirm which function is inner and which is outer before composing.\nStatus boundary: this was a **correction/explanation only** — no complete solution was worked; the tutor advised more time on the P3 paper and a full review next week."},{"question":"October 2025 P4 (WMA14/01) Q4(a) *[5 marks]*: differentiate $$4x^2+y^2-2xy=24x$$ implicitly. What was the learner's error, and what is the correct result (reached live)?","answer":"1. Differentiate: $$8x+2y\\frac{dy}{dx}-2\\left(x\\frac{dy}{dx}+y\\right)=24$$ — bracket the *whole* product-rule derivative before expanding.\n2. Collect: $$(2y-2x)\\frac{dy}{dx}=24-8x+2y$$.\n3. $$\\frac{dy}{dx}=\\frac{12-4x+y}{y-x}$$.\nTrap (the actual learner slip): without the bracket, the $$-x$$ term is lost from the denominator, giving the wrong $$\\frac{12-4x+y}{y}$$."},{"question":"October 2025 P4 Q4(b) *[5 marks]*: $$P(a,b)$$ lies on $$4x^2+y^2-2xy=24x$$ with gradient $$2$$, $$a\u003e0$$, $$b\u003e0$$. What is the strategy when stuck with two unknowns and one equation, and how is $$P$$ selected?","answer":"1. Gradient condition: $$\\frac{12-4a+b}{b-a}=2 \\Rightarrow 2a+b=12$$.\n2. Second relation: $$P$$ lies on the curve, $$4a^2+b^2-2ab=24a$$. (Substitution deferred to the learner — sticky \"the learner to finish this one off.\")\n3. Official MS reference (NOT completed in lesson): substituting $$b=12-2a$$ gives $$a^2-8a+12=0$$, candidates $$(6,0)$$ and $$(2,8)$$; the condition $$b\u003e0$$ selects $$P=(2,8)$$.\nCheck/tutor slip (recorded honestly): the lesson suggested rejecting a negative $$b$$; the official algebra actually gives $$b=0$$ or $$b=8$$ — it is $$b\u003e0$$ that excludes $$0$$."},{"question":"October 2025 P4 Q5 (6 marks): $$l_1:\\ \\mathbf{r}=(2,-1,3)+\\lambda(1,4,2)$$, $$l_2:\\ \\mathbf{r}=(-1,\\beta,6)+\\mu(2,-1,7)$$ intersect at $$P$$. What is the solving strategy, and what is permitted here?","answer":"1. Set $$\\mathbf{r}_1=\\mathbf{r}_2$$ → three component equations; use (1) $$2+\\lambda=-1+2\\mu$$ and (3) $$3+2\\lambda=6+7\\mu$$ (no $$\\beta$$) to get $$\\lambda=-9$$, $$\\mu=-3$$ (values supplied by the tutor; $$\\beta$$ and $$P$$ deferred to the learner).\n2. Official MS reference: $$\\beta=-1+4\\lambda+\\mu=-40$$; $$P=(-7,-37,-15)$$.\n3. Q5 carries *no* calculator-prohibition sentence, so calculator solving is allowed. Presentation: the tutor advised a row; the mark scheme also accepts a column/position vector."},{"question":"October 2025 P4 Q6 (7 marks): for $$\\int_0^{\\pi/2}\\frac{\\sin 2\\theta}{\\sqrt{3+\\cos\\theta}}\\,d\\theta$$ with $$u=3+\\cos\\theta$$, what is the correct setup (reached live) and which three slips were corrected?","answer":"1. $$\\sin 2\\theta=2\\sin\\theta\\cos\\theta$$; $$\\frac{du}{d\\theta}=-\\sin\\theta$$, so $$d\\theta=-\\frac{du}{\\sin\\theta}$$ and $$\\sin\\theta$$ cancels.\n2. Limits: $$\\theta:0\\to\\frac{\\pi}{2}$$ maps to $$u:4\\to 3$$ in that order (slip: $$\\cos\\frac{\\pi}{2}=0$$, not $$\\tfrac12$$).\n3. Replace $$\\cos\\theta=u-3$$ (slip: $$\\cos\\theta$$ varies — it cannot be taken outside as a constant).\n4. Integral: $$-2\\int_4^3\\left(u^{1/2}-3u^{-1/2}\\right)du$$ via the power rule (slip: not $$\\ln$$). Lesson stopped here — \"I'll leave the rest to you.\""},{"question":"October 2025 P4 Q6 (official MS reference, NOT completed in the lesson): what are the requested constants in $$\\int_0^{\\pi/2}\\frac{\\sin 2\\theta}{\\sqrt{3+\\cos\\theta}}\\,d\\theta=a\\sqrt3+b$$, and which two interpretation traps apply?","answer":"1. Completing the integration: $$-2\\left[\\frac{2}{3}u^{3/2}-6u^{1/2}\\right]_4^3=8\\sqrt3-\\frac{40}{3}$$, so $$a=8$$, $$b=-\\frac{40}{3}$$.\n2. Trap: the outside factor $$-2$$ is an intermediate factor of the transformed integral, *not* the requested coefficient.\n3. Trap: the learner's self-note \"using cosine rule\" is wrong — Q6 needs the double-angle identity plus $$u=3+\\cos\\theta$$; the mistaken self-note is not preserved as a method."},{"question":"October 2025 P4 Q1: why must $$(2+5x)^{-2}$$ be rewritten as $$2^{-2}\\left(1+\\frac{5}{2}x\\right)^{-2}$$ before expanding, what is the validity condition, and what is the lesson status?","answer":"1. The index is negative → the *general* binomial series is required, and that series needs a bracket beginning with $$1$$ — hence factor out $$2^{-2}$$ (the learner recognised the $$\\frac52$$ factor after prompting).\n2. Validity (official MS reference): require $$\\left|\\frac52 x\\right|\u003c1$$, i.e. $$|x|\u003c\\frac25$$.\nStatus boundary: hints only — \"That should get you started\"; no expansion, and Q1(b), Q1(c) untouched. Official references only: (a) $$\\frac14-\\frac{5x}{4}+\\frac{75x^2}{16}-\\frac{125x^3}{8}+\\dots$$; (c) $$a=4,\\ b=-20,\\ c=75$$. Supported learner gap: the negative index / choosing the general series."},{"question":"From the guide's formula register, classify these on the two independent axes (formula-booklet availability vs P4 assessment scope): scalar product, general binomial series, $$\\pi\\int y^2\\,dx$$, integrating factors.","answer":"1. Scalar (dot) product: **not printed** — must be remembered unaided; **required** for P4 (§7.7).\n2. General binomial series $$(1+x)^n$$: **printed** ($$n\\in\\mathbb{R}$$, $$|x|\u003c1$$); in scope, P4 assesses rational $$n$$.\n3. Volume of revolution $$\\pi\\int y^2\\,dx$$: not printed as such; **required** P4 formula (§6.1).\n4. Integrating factors: **outside P4 core** — not needed.\nKey trap: never merge the axes under a blanket \"formulas not given\" heading — binomial series, integration by parts and P3 quotient/trig material *are* supplied or available."},{"question":"In this guide, which October 2025 P4 questions carry no lesson status, which are self-assessed gaps, and what distinguishes \"Deferred to the learner\" from \"Official MS reference\"?","answer":"1. **No lesson status** (not discussed; no mastery or deliberate omission implied): Q3, Q7, Q9(b), Q10.\n2. **Self-assessed gaps** (flagged by the learner, not taught; official answers reference only): Q2, Q8, Q9(a).\n3. **Deferred to the learner** = explicitly left for the learner to finish (Q4(b) substitution, Q5's $$\\beta$$ and $$P$$, Q6's final integration). **Official MS reference** = paper answer *not* worked in the lesson.\nBoundary rule: neither label may ever be presented as \"worked live\" in the lesson."}]}},ROLES=Object.keys(DATA);let active=ROLES[0],selected={};for(const r of ROLES)selected[r]=new Set(DATA[r].cards.map((_,i)=>i));
function typeset(){const x=document.getElementById('list');if(window.MathJax&&MathJax.typesetPromise){if(MathJax.typesetClear)MathJax.typesetClear([x]);MathJax.typesetPromise([x]).catch(()=>{})}}
function tabs(){const t=document.getElementById('tabs');t.replaceChildren();for(const r of ROLES){const b=document.createElement('button');b.className='tab'+(r===active?' active':'');b.textContent=DATA[r].label+' ('+DATA[r].cards.length+')';b.onclick=()=>{active=r;tabs();render()};t.append(b)}}
function render(){const l=document.getElementById('list');l.replaceChildren();DATA[active].cards.forEach((c,i)=>{const article=document.createElement('article');article.className='card';const row=document.createElement('div');row.className='row';const pick=document.createElement('input');pick.className='pick';pick.type='checkbox';pick.checked=selected[active].has(i);pick.setAttribute('aria-label',`Select card ${i+1}`);const qw=document.createElement('div');qw.className='qwrap';const q=document.createElement('div');q.className='q';q.tabIndex=0;q.textContent=c.question;const ans=document.createElement('div');ans.className='answer';const txt=document.createElement('div');txt.textContent=c.answer;const foot=document.createElement('div');foot.className='foot';const cp=document.createElement('button');cp.className='copy';cp.textContent='Copy';cp.onclick=()=>copyText(c.question+'\t'+c.answer);foot.append(cp);ans.append(txt,foot);qw.append(q,ans);row.append(pick,qw);article.append(row);l.append(article);pick.onchange=()=>{pick.checked?selected[active].add(i):selected[active].delete(i);count()};const toggle=()=>{article.classList.toggle('open');typeset()};q.onclick=toggle;q.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle()}}});count();typeset()}
function count(){document.getElementById('count').textContent=`${selected[active].size} / ${DATA[active].cards.length} selected`}
function setall(v){selected[active]=v?new Set(DATA[active].cards.map((_,i)=>i)):new Set();render()}
function reveal(v){document.querySelectorAll('.card').forEach(x=>x.classList.toggle('open',v));typeset()}
function copyText(s){navigator.clipboard.writeText(s).then(()=>toast('Copied')).catch(()=>toast('Copy failed'))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)}
function table(){const c=DATA[active].cards.filter((_,i)=>selected[active].has(i));let s='| Question | Answer |\n| --- | --- |\n';for(const x of c)s+='| '+x.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+x.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n';copyText(s)}
addEventListener('DOMContentLoaded',()=>{tabs();render();document.getElementById('sel').onclick=()=>setall(true);document.getElementById('desel').onclick=()=>setall(false);document.getElementById('reveal').onclick=()=>reveal(true);document.getElementById('hide').onclick=()=>reveal(false);document.getElementById('table').onclick=table});</script></body></html>
