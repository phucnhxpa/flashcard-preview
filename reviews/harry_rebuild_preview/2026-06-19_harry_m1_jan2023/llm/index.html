<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2214%22 fill=%22%23006edc%22/><text x=%2232%22 y=%2243%22 text-anchor=%22middle%22 font-size=%2234%22 fill=%22white%22>ƒ</text></svg>"><title>Edexcel IAL Mechanics M1 WME01/01 January 2023 + ESAT-style warm-up · 19 June 2026 M1 practice tutorial — frozen evidence-led revision guide — Multi-model flashcards</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;max-width:100%;overflow-x:hidden}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.5}.wrap{width:100%;max-width:980px;margin:auto;padding:26px 16px 70px;overflow-x:clip}header{text-align:center;margin:7px 0 18px}h1{font-size:30px;line-height:1.18;margin:0}.sub{color:#68686d;margin:6px 0}.tabs{display:flex;gap:7px;overflow-x:auto;padding:5px 1px 11px;scrollbar-width:thin}.tab{white-space:nowrap;border:1px solid #d2d2d7;background:#fff;border-radius:999px;padding:8px 12px;font:650 12px inherit;cursor:pointer}.tab.active{background:#006edc;color:#fff;border-color:#006edc}.tools{position:sticky;top:7px;z-index:5;display:flex;gap:7px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid #e2e2e7;border-radius:14px;padding:10px;margin-bottom:13px;box-shadow:0 2px 8px #0000000d}.tools button{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:6px 9px;font:600 12px inherit;cursor:pointer}.count{margin-left:auto;color:#68686d;font-size:12px;font-weight:650}.list{display:flex;flex-direction:column;gap:10px}.card{min-width:0;max-width:100%;background:#fff;border:1px solid #e1e1e6;border-radius:14px;padding:15px 16px;box-shadow:0 1px 4px #0000000a}.row{display:flex;gap:10px;align-items:flex-start;min-width:0}.pick{width:18px;height:18px;margin-top:3px;flex:0 0 auto}.qwrap{min-width:0;max-width:100%;flex:1}.q{font-weight:650;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;cursor:pointer;overflow-x:auto}.answer{display:none;white-space:pre-wrap;margin-top:10px;padding-top:10px;border-top:1px solid #ececf0;color:#3e3e43;overflow-wrap:anywhere;word-break:break-word;overflow-x:auto}.card.open .answer{display:block}.foot{display:flex;justify-content:flex-end;margin-top:8px}.copy{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:3px 8px;cursor:pointer}.notice{font-size:12px;color:#68686d;text-align:center;margin:12px 0}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#1d1d1f;color:#fff;border-radius:8px;padding:8px 14px;opacity:0;pointer-events:none}.toast.show{opacity:1}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}@media(max-width:430px){.wrap{padding:16px 10px 55px}h1{font-size:24px}.tools{top:4px}.count{width:100%;margin-left:0}.card{padding:13px 12px}}</style><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true},options:{skipHtmlTags:["script","noscript","style","textarea","pre","code"]}};</script><script defer src="assets/mathjax/es5/tex-mml-chtml.js"></script></head><body><main class="wrap"><header><h1>Edexcel IAL Mechanics M1 WME01/01 January 2023 + ESAT-style warm-up · 19 June 2026 M1 practice tutorial — frozen evidence-led revision guide</h1><p class="sub">Direct model-output flashcards</p></header><nav id="tabs" class="tabs" aria-label="Models"></nav><nav class="tools"><button id="sel">Select all</button><button id="desel">Deselect all</button><button id="reveal">Reveal all</button><button id="hide">Hide all</button><button id="table">Copy table</button><span id="count" class="count"></span></nav><section id="list" class="list"></section><p class="notice">Model outputs are displayed directly as generated.</p></main><div id="toast" class="toast"></div><script>const DATA={"glm_1":{"label":"GLM 5.1 · Run 1","returned_model":"z-ai/glm-5.1","cards":[{"question":"When solving an ESAT-style inequality where \"the difference between $$2\\sqrt{n}$$ and 7 is less than 1\", what single modulus statement should you write, and what is the trap at the endpoints?","answer":"1. Write $$|2\\sqrt{n} - 7| \u003c 1$$ and unfold to $$-1 \u003c 2\\sqrt{n} - 7 \u003c 1$$.\n2. Trap: strict inequalities mean endpoints are excluded (e.g., $$n=9$$ and $$n=16$$ are not allowed).\n3. Count inclusive integers between the strict bounds using $$+1$$.\nStatus: ESAT-STYLE WARM-UP — NOT WME01."},{"question":"In a direct collision question (COMPLETED WITH PROMPTING), when asked for the \"magnitude of the impulse\" on a particle, how must the final answer be presented, and what labelling is required?","answer":"1. Magnitude means the final answer must be a positive quantity written without modulus bars (e.g., $$3m$$ N s, not $$|3m|$$).\n2. You must explicitly state which speed belongs to which particle; two unlabelled numbers may not fully answer the question.\n3. Ensure the impulse calculated is the one exerted on the requested particle."},{"question":"When applying conservation of linear momentum to a direct collision where particles approach each other, what is the essential sign convention check?","answer":"1. Choose one direction as positive.\n2. The velocity of the particle moving in the opposite direction before impact must be entered as negative (e.g., $$m(-1.5)$$).\n3. Define post-collision speeds clearly (e.g., if they move in the same direction, one might be $$x$$ and the other $$x+1$$)."},{"question":"When calculating distance from a speed–time graph (COMPLETED WITH PROMPTING), what formula and unit trap must you watch for?","answer":"1. Use the trapezium-area formula $$A = \\frac{1}{2}(a+b)h$$ rather than always splitting into triangles and a rectangle.\n2. Unit trap: Convert all distances to metres (e.g., $$4.8$$ km $$= 4800$$ m) before equating to the metre-based area under the graph."},{"question":"When labelling time markers on a speed–time graph where a train accelerates for time $$T$$, runs at constant speed for 180 s, then decelerates for time $$2T$$, what is the common trap when writing the end times?","answer":"1. Measure each duration from the correct transition.\n2. The constant phase ends at $$T + 180$$, not just 180 from the origin.\n3. The deceleration phase ends at $$3T + 180$$."},{"question":"In a moments and tilting question (COMPLETED WITH PROMPTING), what is the key condition when a rod is \"on the point of tilting about a support\"?","answer":"1. The reaction force at the *other* support becomes zero (e.g., tilting about C means $$R_D = 0$$).\n2. A force acting through the pivot (and the zero reaction) has no moment about that pivot, so it need not be written in the moments equation."},{"question":"When solving a moments problem with two tilting scenarios yielding two equations with a common unknown (e.g., weight $$W$$), what is the most efficient algebraic strategy?","answer":"1. Put clockwise moments on one side and anticlockwise on the other to avoid sign errors, rather than a single long signed sum.\n2. Box and label the key equations (e.g., (A) and (B)).\n3. Divide the two equations to cancel the common unknown ($$W$$), which is more efficient than substitution."},{"question":"When resolving forces perpendicular to a rough inclined plane (LIVE SET-UP ONLY), what language trap must you avoid when describing the normal reaction and weight components?","answer":"1. Do not say forces are \"balanced vertically\" — \"vertically\" means up/down, which is not the resolving direction here.\n2. Say forces are \"balanced perpendicular to the plane\".\n3. The parallel forces are *not* balanced; Newton's second law applies along the plane."},{"question":"In the rough inclined plane set-up (LIVE SET-UP ONLY), the tutor made a corrected remark about friction and acceleration direction. What general rule is invalid, and what is the correct method?","answer":"1. Invalid general rule: Friction \"only exists because\" of an applied pull and can never exceed it, so acceleration must be up the slope.\n2. Correct method: The direction of acceleration must be decided from the net resolved force along the plane, including gravity.\n3. For these numbers the net force is up the slope only because the resolved equation says so, not because of the general claim."},{"question":"To decide whether a parcel remains at rest on a rough inclined plane after an applied force is removed (OFFICIAL MS REFERENCE ONLY), what two quantities must you compare?","answer":"1. The weight component down the plane (e.g., $$2g \\sin 30^\\circ$$).\n2. The maximum available friction $$\\mu R$$ (where $$R$$ is the normal reaction without the applied force, e.g., $$2g \\cos 30^\\circ$$).\n3. If the weight component exceeds maximum friction, the parcel does not remain at rest."},{"question":"According to the formula and result availability for M1, which core mechanics formulae are NOT additionally printed in the M1 formula section and must be known by heart?","answer":"1. Momentum = $$mv$$; Impulse = $$mv - mu$$.\n2. The five constant-acceleration (SUVAT) formulae.\n3. Newton's laws; Friction law $$F = \\mu R$$ (and $$F \\leq \\mu R$$); Principle of moments.\n(Note: P1/P2 prerequisites like the trapezium area formula may also be needed)."},{"question":"What was the lesson status of Packet Q6 (official Q6) and Packet Q7 (official Q7), and what homework was NOT set at the end of the lesson?","answer":"1. Status: NOT DISCUSSED. They were not opened or discussed in this lesson.\n2. Homework NOT set: The lesson did not assign \"keep practising moments and inclined-plane resolving\" or any drill set as homework. The genuine closing actions prioritised completing Pure 2 and Pure 3 baseline papers."}]},"glm_2":{"label":"GLM 5.1 · Run 2","returned_model":"z-ai/glm-5.1","cards":[{"question":"When solving an ESAT-style word problem asking for the number of integers where the \"difference between $$2\\sqrt{n}$$ and 7 is less than 1\", what is the correct modulus statement and what must be checked at the endpoints?","answer":"1. Write the condition as $$|2\\sqrt{n} - 7| \u003c 1$$, then unfold to $$-1 \u003c 2\\sqrt{n} - 7 \u003c 1$$. 2. Solve for $$n$$ to get an inequality like $$9 \u003c n \u003c 16$$. 3. Check strict endpoints: 9 and 16 are excluded. 4. Count the inclusive integers using $$(max - min + 1)$$, so $$15 - 10 + 1 = 6$$. (Status: ESAT-STYLE WARM-UP — NOT WME01)"},{"question":"In a direct collision momentum problem, what are two critical labelling and setup steps before equating momenta?","answer":"1. Choose and state a positive direction; assign opposite signs to velocities approaching each other. 2. After calculating, clearly label each final speed (e.g., \"speed of A\", \"speed of B\") because two unlabelled numbers may not fully answer the question."},{"question":"When asked to find the \"magnitude of the impulse on B\" after a collision, what is the calculation method and the final formatting trap?","answer":"1. Calculate impulse as the change in momentum of B: $$I_B = m(v_B - u_B)$$. 2. Trap: \"Magnitude\" means the final answer must be a positive quantity written without modulus bars (e.g., $$3m$$ N s, not $$|3m|$$)."},{"question":"When a speed–time graph shows acceleration for time $$T$$, constant speed for 180 s, and deceleration for $$2T$$, what is the common trap when writing the time markers along the base?","answer":"The constant phase runs to $$T + 180$$, not to 180 from the origin. The deceleration phase ends at $$3T + 180$$. Measure each duration from the correct transition point."},{"question":"When calculating the distance from a speed–time graph shaped as a trapezium, what is the advised area strategy and unit trap?","answer":"1. Strategy: Use the trapezium area formula $$A = \\frac{1}{2}(a + b)h$$ rather than always splitting into triangles and a rectangle. 2. Unit trap: Convert distances to consistent SI units (e.g., $$4.8$$ km $$= 4800$$ m) before equating to the metre-based area."},{"question":"In a moments problem, if a rod is \"on the point of tilting about C\", what critical condition simplifies the equations?","answer":"The reaction at the other support (e.g., $$R_D$$) becomes zero. A force through the pivot and a zero reaction have no moment about that pivot, so they need not be written in the moments equation."},{"question":"When you have two simultaneous moments equations from two tilting scenarios, both containing the weight $$W$$ and an unknown distance $$x$$, what is the most efficient solving strategy?","answer":"Divide the two equations to cancel the common unknown ($$W$$). This is more efficient than substitution. Also, box and label the key equations so you can combine them cleanly, and put clockwise moments on one side and anticlockwise on the other to avoid sign errors."},{"question":"When resolving forces on an inclined plane, a common trap is to say forces are \"balanced vertically\". What is the correct resolving direction, and why?","answer":"Say forces are balanced perpendicular to the plane. \"Vertically\" means up/down, which is not the resolving direction here. The parallel forces are not balanced; Newton's second law applies along the plane."},{"question":"On a rough inclined plane with an applied pull, can you assume the direction of acceleration based on the claim that friction \"only exists because of the applied pull\"?","answer":"No. The direction of acceleration must be decided from the net resolved force along the plane (including gravity and friction). The general claim that friction cannot exceed the applied component is invalid; rely on the resolved Newton's 2nd law equation."},{"question":"In the live set-up for the parcel on a rough inclined plane (Packet Q8 / official Q8), the perpendicular equation written on the board was $$R - 2g\\sin 30^\\circ + 18\\sin 40^\\circ = 0$$. What is the corrected perpendicular equation?","answer":"The correct equation is $$R + 18\\sin 40^\\circ = 2g\\cos 30^\\circ$$. (Status: LIVE SET-UP ONLY; board line corrected post-lesson)."},{"question":"According to the M1 formula booklet and specification, which key mechanics formulae are NOT additionally printed and must be known by heart?","answer":"Momentum $$= mv$$; impulse $$= mv - mu$$; the five constant-acceleration (SUVAT) formulae; Newton's laws; friction law $$F = \\mu R$$ (and $$F \\le \\mu R$$); principle of moments. (P1/P2 prerequisites like trapezium area are also assumed)."},{"question":"What were the closing study actions set at the end of the lesson, and what was explicitly NOT set as homework?","answer":"1. Priority: complete the Pure 2 baseline paper, then the Pure 3 baseline paper. 2. Look over an already-completed M1 homework paper if time allows. 3. Revisit the earlier M1 paper together in mid-July. NOT set: author-created drills or a \"recurring weakness\" drill set for moments/inclined planes."}]},"glm_3":{"label":"GLM 5.1 · Run 3","returned_model":"z-ai/glm-5.1","cards":[{"question":"When a problem states \"the difference between $$A$$ and $$B$$ is less than 1\", how should you write this as a modulus inequality, and what is the resulting chain?","answer":"Write it as $$|A - B| \u003c 1$$. This unfolds to the chain $$-1 \u003c A - B \u003c 1$$. (Status: ESAT-STYLE WARM-UP — NOT WME01)"},{"question":"When counting the integers $$n$$ strictly between two values (e.g., $$9 \u003c n \u003c 16$$), what is the common trap, and how do you calculate the correct count?","answer":"The trap is forgetting that the endpoints are excluded (strict inequality) but the integers between are inclusive. The count is $$(\\text{highest} - \\text{lowest}) + 1$$, e.g., $$(15 - 10) + 1 = 6$$. (Status: ESAT-STYLE WARM-UP — NOT WME01)"},{"question":"When applying conservation of momentum for a direct collision, what two labelling steps prevent sign and identity errors?","answer":"1. Choose one direction as positive and assign signs to initial velocities accordingly (e.g., opposing approach means one is negative). 2. Explicitly label which final speed belongs to which particle; two unlabelled numbers may not fully answer the question. (Status: COMPLETED WITH PROMPTING)"},{"question":"If a question asks for the \"magnitude of the impulse\" on a particle, how should you format the final answer, and why?","answer":"The final answer must be a positive quantity written without modulus bars (e.g., $$3m$$ N s). \"Magnitude\" means the positive size of the impulse, so do not leave modulus bars in the final stated answer. (Status: COMPLETED WITH PROMPTING)"},{"question":"In a speed–time graph where a train accelerates for time $$T$$, runs at constant speed, then decelerates, and the magnitude of acceleration is twice the magnitude of deceleration, what is the duration of the deceleration phase?","answer":"Since $$|a| = 2|d|$$ and $$\\Delta v$$ is the same for both phases, the deceleration phase lasts $$2T$$. The time markers along the base are $$T$$, $$T + 180$$, and $$3T + 180$$. (Status: COMPLETED WITH PROMPTING)"},{"question":"When finding the total distance from a speed–time graph, what is the strategic advantage of using the trapezium area formula $$A = \\frac{1}{2}(a+b)h$$ instead of splitting into triangles and a rectangle?","answer":"It is more efficient and reduces arithmetic steps. The parallel sides are the total time intervals (e.g., $$180$$ and $$3T+180$$) and the height is the top speed (e.g., $$20$$). (Status: COMPLETED WITH PROMPTING)"},{"question":"In a moments problem, if a rod is \"on the point of tilting about a support C\", what does this imply for the reaction at the other support D, and what is the strategic consequence for taking moments?","answer":"It implies the reaction at D is zero ($$R_D = 0$$). Strategically, a force through the pivot (and a zero reaction) has no moment about that pivot, so you only equate clockwise and anticlockwise moments of the remaining forces about C. (Status: COMPLETED WITH PROMPTING)"},{"question":"When you have two simultaneous moment equations from two tilting scenarios, both containing a common unknown weight $$W$$, what is the most efficient algebraic strategy?","answer":"Divide one equation by the other. This cancels $$W$$ immediately, leaving a simple equation for the other unknown (e.g., distance $$x$$). Box and label the key equations first so you can combine them cleanly. (Status: COMPLETED WITH PROMPTING)"},{"question":"When resolving forces on an inclined plane, why is it a trap to say the perpendicular forces are \"balanced vertically\", and what should you say instead?","answer":"\"Vertically\" means up/down, which is not the resolving direction on a slope. You must say the forces are \"balanced perpendicular to the plane\". The parallel forces are not balanced; Newton's second law applies along the plane. (Status: LIVE SET-UP ONLY)"},{"question":"On a rough inclined plane with an applied pull, is it a valid general rule that friction \"only exists because of the applied pull\" and therefore can never exceed it?","answer":"No, this is not a valid general rule. The direction of acceleration must be decided from the net resolved force along the plane (including the weight component), not from an assumption about the friction's origin. (Status: LIVE SET-UP ONLY)"},{"question":"According to the official M1 formula booklet, are the constant-acceleration (SUVAT) formulae, impulse formula, and friction law $$F = \\mu R$$ provided for you?","answer":"No. The booklet states \"There are no formulae given for M1 in addition to those candidates are expected to know.\" You must know SUVAT, $$I = mv - mu$$, $$F = \\mu R$$, and the principle of moments by heart. (Status: M1 required — not additionally printed)"},{"question":"For the WME01/01 January 2023 paper, what were the lesson statuses of Packet Q3 (vectors), Packet Q4 (vehicle SUVAT), Packet Q6 (boat), and Packet Q7 (lift)?","answer":"Packet Q3 and Q4: REVIEWED ONLY / DEFERRED (looked at but not re-worked). Packet Q6 and Q7: NOT DISCUSSED (not opened). Any answers for these are OFFICIAL MS REFERENCE ONLY. (Status: REVIEWED ONLY / DEFERRED / NOT DISCUSSED / OFFICIAL MS REFERENCE ONLY)"}]},"qwen_1":{"label":"Qwen 3.7 Max","returned_model":"qwen/qwen3.7-max","cards":[{"question":"In the ESAT-style warm-up (not WME01), how do you correctly translate \"the difference between $$2\\sqrt{n}$$ and 7 is less than 1\" into a solvable inequality chain, and what is the trap when counting the integer solutions?","answer":"1. Translate to a single modulus statement: $$|2\\sqrt{n} - 7| \u003c 1$$.\n2. Unfold to $$-1 \u003c 2\\sqrt{n} - 7 \u003c 1$$.\n3. Add 7 and divide by 2: $$3 \u003c \\sqrt{n} \u003c 4$$.\n4. Square all parts: $$9 \u003c n \u003c 16$$.\n5. Trap: Strict inequalities exclude 9 and 16. Inclusive counting of the integers between 10 and 15 requires adding 1 ($$15 - 10 + 1 = 6$$)."},{"question":"When finding the magnitude of the impulse on particle B after a direct collision, what are the two critical labeling and formatting requirements to secure all marks?","answer":"1. Explicitly label which calculated speed belongs to which particle (e.g., \"speed of A\" and \"speed of B\"), as two unlabelled numbers may not fully answer the question.\n2. \"Magnitude\" means the final impulse answer must be a positive quantity; write it without modulus bars (e.g., $$3m$$, not $$|3m|$$)."},{"question":"In a speed–time graph where a train accelerates for time $$T$$, runs at constant speed for 180 s, and then decelerates, what is the common trap when marking the time axis for the constant speed phase?","answer":"The trap is measuring the constant phase duration from the origin instead of the transition point. The constant phase ends at $$T + 180$$ on the time axis, not at 180. The deceleration phase then starts at $$T + 180$$."},{"question":"When calculating the total distance from a trapezoidal speed–time graph, what pure mathematics formula is classified as a P1/P2 prerequisite rather than an M1 required formula, and what unit check is essential before equating it to distance?","answer":"1. The area of a trapezium: $$A = \\frac{1}{2}(a + b)h$$.\n2. Unit check: Ensure the distance is in metres if the speed is in $$\\text{m s}^{-1}$$ (e.g., convert $$4.8 \\text{ km}$$ to $$4800 \\text{ m}$$ before equating to the area)."},{"question":"In a moments problem involving a rod on two supports C and D, what is the precise mathematical condition when the rod is \"on the point of tilting about C\", and how does this simplify the moment equation?","answer":"1. Condition: The reaction at the other support is zero ($$R_D = 0$$).\n2. Simplification: A force through the pivot (and a zero reaction) has no moment about that pivot, so $$R_D$$ does not appear in the moment equation taken about C."},{"question":"When solving two tilting scenarios for a non-uniform rod to find its weight $$W$$ and centre of mass distance $$x$$, what algebraic strategy is more efficient than substitution, and why?","answer":"1. Strategy: Divide the two moment equations by each other.\n2. Reason: The common unknown weight $$W$$ cancels out immediately, leaving a simple linear equation in $$x$$ (e.g., $$\\frac{Wx}{W(0.9 - x)} = \\frac{189}{81}$$)."},{"question":"When setting up the force diagram for a parcel on a rough inclined plane, what specific terminology trap did the tutor correct regarding the normal reaction and perpendicular forces?","answer":"The trap is saying the perpendicular forces are \"balanced vertically\". The tutor corrected this to \"balanced perpendicular to the plane\", because \"vertically\" strictly means up/down relative to gravity, which is not the resolving direction for the normal reaction."},{"question":"Why is the tutor's live remark that \"friction only exists because of the applied pull and therefore can never exceed the applied component\" considered an invalid general rule for inclined plane problems?","answer":"The direction of acceleration must be decided from the net resolved force along the plane, which includes the gravity component. Friction can exceed the applied pull component if the gravity component down the slope is large enough; the net force equation dictates the motion, not a general rule about the applied pull."},{"question":"According to the M1 formula availability guide, how are the five constant-acceleration (SUVAT) formulae and the friction law $$F \\le \\mu R$$ classified compared to the area of a trapezium?","answer":"1. SUVAT and $$F \\le \\mu R$$ are classified as \"M1 required — not additionally printed\" (candidates must know them by heart).\n2. The area of a trapezium is classified as a \"P1/P2 prerequisite formula\"."},{"question":"In the revision guide's status legend, what is the strict difference between \"LIVE SET-UP ONLY\" and \"OFFICIAL MS REFERENCE ONLY\"?","answer":"1. \"LIVE SET-UP ONLY\": Only the diagram and governing equations were reached live in the lesson; the arithmetic was not finished.\n2. \"OFFICIAL MS REFERENCE ONLY\": The answer was supplied after the lesson directly from the official mark scheme and was not produced live at all."},{"question":"Why does the revision guide use a dual-numbering system (e.g., \"Packet Q1 / official WME01 Q2\") instead of just the official paper numbering?","answer":"The printed practice packet used in the lesson was re-ordered relative to the official paper (e.g., the collision was printed as packet Q1 but is official Q2). Using only official numbering would contradict the physical packet the student actually worked from, so both labels are required to match the lesson chronology and board images."},{"question":"What were the actual agreed closing study actions at the end of the lesson, and what specific type of homework was explicitly NOT set?","answer":"1. Actual actions: Complete the Pure 2 baseline paper, then the Pure 3 baseline paper, to build a full course diagnostic ahead of extra M1 work.\n2. Not set: The tutor did not assign \"keep practising moments and inclined-plane resolving\" or any author-created drill sets; earlier guide versions falsely presented these as tutor-assigned work."}]},"minimax_1":{"label":"MiniMax M3 · Run 1","returned_model":"minimax/minimax-m3","cards":[{"question":"The lesson opened with a counting exercise. How many different integers n satisfy \"the difference between √(2n) and 7 is less than 1\"? (Status: ESAT-style warm-up — NOT WME01.)","answer":"Write the difference as a single modulus and unfold on a number line:\n1. |√(2n) − 7| \u003c 1  ⇒  −1 \u003c √(2n) − 7 \u003c 1\n2. Add 7:  6 \u003c √(2n) \u003c 8\n3. Divide by 2 (all positive, so safe):  3 \u003c √n \u003c 4\n4. Square:  9 \u003c n \u003c 16  (strict, so 9 and 16 excluded)\n5. Integers: {10, 11, 12, 13, 14, 15} → count = 15 − 10 + 1 = **6**."},{"question":"Two particles collide directly. A (mass 3m) and B (mass m) approach each other, each at 1.5 m s⁻¹. After impact, A has speed x and B has speed x + 1. Set up the conservation-of-momentum equation (taking A's initial direction as positive) and state the post-impact speeds. (Packet Q1 / official WME01 Q2, 8 marks, completed with prompting.)","answer":"1. Write 3m(1.5) + m(−1.5) = 3m·x + m·(x+1).\n2. Simplify: 4.5m − 1.5m = 3mx + mx + m  →  3m = (4x + 1)m.\n3. Divide by m: 4x + 1 = 3  →  x = ½.\n4. So v_A = ½ m s⁻¹ and v_B = x + 1 = 3/2 m s⁻¹. Label which is which."},{"question":"For the collision in Q2 above, state the magnitude of the impulse on B and explain why the answer must be given as a positive number.","answer":"Impulse on B = change in momentum of B:\n1. I_B = m(3/2) − m(−3/2) = (3/2)m + (3/2)m = 3m.\n2. Magnitude is a positive quantity, so the final answer is **|I_B| = 3m N s**, written without modulus bars.\n3. The question asked for the impulse on B specifically (not on A, which would be equal and opposite by Newton's third law)."},{"question":"A train accelerates from rest to 20 m s⁻¹, runs at that top speed for 180 s, then decelerates to rest. The magnitude of the acceleration is twice the magnitude of the deceleration. The total distance is 4.8 km. Use the trapezium-area formula to find the acceleration duration T. (Packet Q2 / official WME01 Q1, part (b).)","answer":"1. If acceleration phase = T, then deceleration phase = 2T (acceleration is twice the deceleration in magnitude, so the slower phase lasts longer).\n2. Trapezium: parallel sides a = 180, b = 3T + 180; height h = 20.\n3. Area = ½(a+b)h = ½(180 + 3T + 180)(20) = (3T + 360)(10) = 4800 m (convert 4.8 km first).\n4. 3T + 360 = 480  →  3T = 120  →  **T = 40 s**."},{"question":"For the train in Q4, find the magnitude of the initial acceleration.","answer":"1. The initial acceleration is the gradient of the first straight section of the speed–time graph.\n2. a = 20 / T = 20 / 40 = **0.5 m s⁻²**.\n3. Trap to avoid: do not measure the constant-speed phase from the origin; it runs to T + 180, not to 180."},{"question":"A non-uniform branch of length 1.5 m rests on two supports C and D, placed 0.24 m and 0.36 m from its ends. State the two key principles used to convert \"on the point of tilting about X\" into a single-equation moments problem.","answer":"1. \"On the point of tilting about C\" ⇒ the reaction at D, R_D, is zero (the branch is just lifting off D).\n2. \"On the point of tilting about D\" ⇒ the reaction at C, R_C, is zero.\n3. A force whose line of action passes through the pivot has zero moment about that pivot, so it can be dropped from the equation.\n4. With the zero reaction removed, only the remaining forces appear, and you take moments about the pivot (C or D)."},{"question":"For the branch in Q6, two tilting scenarios give moment equations (A) Wx = 150(1.26) = 189 and (B) (0.9 − x)W = 81. Solve for x and W. (Packet Q5 / official WME01 Q4, 8 marks.)","answer":"1. Divide (A) by (B) to cancel the common unknown W:  Wx / [W(0.9 − x)] = 189/81.\n2. Reduce the right side: 189/81 = 7/3, so x / (0.9 − x) = 7/3.\n3. Cross-multiply: 3x = 7(0.9 − x) = 6.3 − 7x  →  10x = 6.3  →  **x = 0.63 m**.\n4. Back-substitute into (A): W = 189 / 0.63 = **300 N**."},{"question":"Why is dividing the two moment equations more efficient than substitution in Q7, and what writing habit reduces sign errors in moments problems?","answer":"1. Dividing cancels the common unknown (W) immediately, avoiding a substitution step and a second solve.\n2. Write clockwise moments on one side of the equals sign and anticlockwise on the other, rather than a single long signed sum — this keeps signs explicit and balanced.\n3. Box and label key equations (A), (B) so the combination step is auditable."},{"question":"A 2 kg parcel P lies on a rough plane inclined at 30°. A force of 18 N acts on P at 40° to the plane; µ = 0.3. Write the resolved Newton's-second-law equation along the plane and the friction law, using the correct resolving directions. (Packet Q8 / official WME01 Q8, set-up only.)","answer":"1. Resolve the 18 N: 18 cos 40° up the plane (parallel), 18 sin 40° away from the plane (perpendicular).\n2. Resolve weight 2g: 2g sin 30° down the plane (parallel), 2g cos 30° into the plane (perpendicular).\n3. Parallel (Newton's 2nd law, taking up-the-slope as positive): **18 cos 40° − F_R − 2g sin 30° = 2a**.\n4. Friction: **F_R = µR = 0.3R** (limiting friction assumed for the moving parcel).\n5. Perpendicular (no acceleration): R + 18 sin 40° = 2g cos 30°."},{"question":"A common tutor remark during the Q8 set-up was that friction \"only exists because of the applied pull\" and therefore can never exceed the applied component, so the acceleration must be up the slope. Is this a valid general rule, and how should you instead decide the direction of motion?","answer":"1. No — it is not a valid general rule. Friction also exists because of the weight pressing into the plane, even without the applied pull (this matters in part (c)).\n2. The correct method: write the parallel equation with an assumed direction, then check the sign of the resulting a.\n3. For these particular numbers the net force does come out up the slope — but only because equation (1) gives a positive a, not because of the general claim.\n4. Do not carry the general statement into other questions."},{"question":"Using the official mark-scheme values, complete Q8(a): with g = 9.8 m s⁻², find R, the friction force F_R, and the acceleration a of the parcel. (Official MS reference only — not worked live.)","answer":"1. Perpendicular: R = 2g cos 30° − 18 sin 40° ≈ 19.6(0.86603) − 18(0.64279) ≈ **5.404 N**.\n2. Friction: F_R = 0.3R ≈ 0.3(5.404) ≈ **1.621 N**.\n3. Parallel: 2a = 18 cos 40° − F_R − 2g sin 30° ≈ 13.789 − 1.621 − 9.8 ≈ 2.368.\n4. a ≈ 1.184 m s⁻² ≈ **1.18 m s⁻²** (or 1.2 m s⁻²). Keep the unrounded value for onward use; give \"≈\" not \"=\"."},{"question":"The M1 formula booklet states \"There are no formulae given for M1 in addition to those candidates are expected to know.\" Give three examples of results used in this lesson that you must therefore know from memory (not look up), and one P1/P2 prerequisite result that was also used.","answer":"1. Momentum = mv and impulse = mv − mu (used in the collision / impulse question).\n2. The five SUVAT equations, Newton's laws, friction F = µR (and F ≤ µR), and the principle of moments (moments; inclined plane).\n3. P1/P2 prerequisite used: **area of a trapezium, A = ½(a + b)h** (used for the train speed–time graph).\n4. A technique (not a formula) worth remembering: divide two simultaneous equations to cancel a common unknown — used in the moments question."}]},"minimax_2":{"label":"MiniMax M3 · Run 2","returned_model":"minimax/minimax-m3","cards":[{"question":"The guide opened with an inequality warm-up. How many integers n satisfy $|\\sqrt{2n} - 7| \u003c 1$, and why does the guide insist this must never be labelled an M1 question?","answer":"1. Unpack the modulus: $-1 \u003c \\sqrt{2n} - 7 \u003c 1$.\n2. Add 7: $6 \u003c \\sqrt{2n} \u003c 8$.\n3. Square (all terms positive): $36 \u003c 2n \u003c 64 \\Rightarrow 18 \u003c n \u003c 32$.\n4. Integers: $n \\in \\{19,20,\\dots,31\\}$, giving $31-19+1 = 13$.\n\nStatus trap: the guide explicitly flags this as an \"ESAT-style warm-up — not WME01\"; carrying it as M1 evidence is a source error. (Note: the guide's own worked chain ends at $9\u003cn\u003c16$ with count 6 — preserve that evidence if quoting the source; the clean 18\u003cn\u003c32 re-derivation is the safer standalone method.)"},{"question":"Particle A (mass 3m) and particle B (mass m) move directly towards each other, each at 1.5 m s⁻¹. After impact B moves 1 m s⁻¹ faster than A. Find the post-impact speeds and the magnitude of the impulse on B.","answer":"1. Take A's initial direction as positive; before: A is +1.5, B is −1.5. After: A is x, B is x+1.\n2. Conserve momentum: $3m(1.5) + m(-1.5) = 3mx + m(x+1) \\Rightarrow 3 = 4x+1 \\Rightarrow x = 0.5$.\n3. So $v_A = 0.5$ m s⁻¹ and $v_B = 1.5$ m s⁻¹.\n4. Impulse on B: $I_B = m(1.5) - m(-1.5) = 3m$ N s; magnitude = $3m$ (no modulus bars needed for a positive answer)."},{"question":"For the collision in Q2, what is the live-evidence rule about labels, the requested particle, and \"magnitude\"?","answer":"1. State which speed belongs to A and which to B; two unlabelled numbers may not earn full credit.\n2. The question asks for the impulse on B, not on A — read the wording.\n3. \"Magnitude\" means give a positive number; drop the modulus bars on the final line.\n4. An earlier guide version claimed a live slip producing x = 2.75; the recording and final board show no such slip — that narrative is removed and should not be repeated."},{"question":"A train accelerates from rest to 20 m s⁻¹, runs at that speed for 180 s, then decelerates to rest. Acceleration magnitude is twice the deceleration magnitude; total distance 4.8 km. Sketch the graph and find T (acceleration duration).","answer":"1. If acceleration lasts T and is twice the deceleration, deceleration lasts 2T. Time markers: T, T+180, 3T+180.\n2. Use the trapezium area (Pure prerequisite): $A = \\tfrac{1}{2}(a+b)h$ with $a=180$, $b=3T+180$, $h=20$.\n3. Convert units first: 4.8 km = 4800 m.\n4. $4800 = \\tfrac{1}{2}(180 + 3T+180)(20) = (3T+360)(10) \\Rightarrow 480 = 3T+360 \\Rightarrow T=40$ s."},{"question":"On the train graph, where are the common time-axis traps, and how is the initial acceleration found from the sketch?","answer":"1. Trap: the constant-speed phase ends at T+180, not at 180 from the origin — measure each duration from the correct transition.\n2. Trap: keep units consistent (km ↔ m) before equating area to distance.\n3. The initial acceleration is the gradient of the first segment: $a = 20/T = 20/40 = 0.5$ m s⁻².\n4. Memorise $A=\\tfrac{1}{2}(a+b)h$ rather than always splitting into triangles + rectangle."},{"question":"In the guide, packet Q3 (official Q3, vectors) and packet Q4 (official Q5, SUVAT) share what single status, and what is the rule about quoting any answer from them?","answer":"1. Both are labelled \"Reviewed only / deferred\" — looked at and commented on, not re-worked.\n2. No subpart was produced live; the lesson had judged the Student's prior work \"pretty good\" / \"okay\" and skipped them.\n3. Any numerical answers for these items live only in the official-reference appendix and must keep the \"OFFICIAL MS REFERENCE ONLY\" label.\n4. Do not promote reference-appendix values to the status of worked lesson work."},{"question":"A non-uniform branch of length 1.5 m rests on supports C and D, placed 0.24 m and 0.36 m from the ends. Tilting about C with a 150 N load and tilting about D with a 225 N load give two moment equations. Find W and x.","answer":"1. Tilting about C ⇒ reaction at D is zero; moment about C: $Wx = 150(1.5-0.24) = 150(1.26) = 189$ — equation (A).\n2. Tilting about D ⇒ reaction at C is zero; moment about D: $225(0.36) = (1.5-0.36-0.24-x)W$, i.e. $81 = (0.9-x)W$ — equation (B).\n3. Divide (A) by (B) to cancel W: $\\dfrac{x}{0.9-x} = \\dfrac{189}{81} = \\dfrac{7}{3} \\Rightarrow 3x = 7(0.9-x) \\Rightarrow 10x = 6.3 \\Rightarrow x = 0.63$ m.\n4. Back-substitute into (A): $W = 189/0.63 = 300$ N."},{"question":"What are the four tutor-strategy lessons for the moments/tilting question, and what live repair happened?","answer":"1. Box and label key equations (A) and (B) so combining them stays clean.\n2. Put clockwise moments on one side, anticlockwise on the other — avoid one long signed sum.\n3. Dividing the two equations is more efficient than substitution when a common unknown cancels.\n4. Use the calculator for intermediate products; on back-substitution the Student started from a wrong W and it was repaired live to 300 N (\"be careful\")."},{"question":"A 2 kg parcel P rests on a rough plane inclined at 30°; a force of 18 N acts on P at 40° to the plane; μ = 0.3. Write the live governing equations and the correct perpendicular equation.","answer":"1. Resolve the 18 N force: 18 cos 40° up the plane, 18 sin 40° away from the plane.\n2. Resolve the weight: 2g sin 30° down the plane, 2g cos 30° into the plane.\n3. Parallel (Newton's 2nd law, taking up-slope positive): $18\\cos 40° - F_R - 2g\\sin 30° = 2a$ — equation (1).\n4. Friction at the limit: $F_R = \\mu R = 0.3R$ — equation (2).\n5. Correct perpendicular: $R + 18\\sin 40° = 2g\\cos 30°$ (the live board line had $-2g\\sin 30°$ and was not audibly repaired — use the corrected form, not the board line)."},{"question":"For Q9, what \"valid general rule\" correction does the guide flag about friction and direction of acceleration?","answer":"1. The tutor said friction \"only exists because\" of the applied pull and so can never exceed the applied component, using it to infer acceleration is up the slope.\n2. This is not a valid general rule — do not carry it into other questions.\n3. Acceleration direction must be decided from the net resolved force along the plane, including gravity.\n4. For these numbers the net force does come out up the slope, but only because equation (1) says so, not because of the general claim."},{"question":"According to the guide's \"Formula and result availability (M1)\" table, which results are M1-required (not printed), which is a P1/P2 prerequisite, and which is a tutor strategy?","answer":"1. M1 required, not additionally printed: momentum = mv; impulse = mv − mu; the five SUVAT formulae; Newton's laws; friction law F = μR (and F ≤ μR); principle of moments.\n2. P1/P2 prerequisite used in the lesson: area of a trapezium, $A = \\tfrac{1}{2}(a+b)h$ (train graph).\n3. Tutor strategy (not formulae): clockwise = anticlockwise moments; divide two equations to cancel a common unknown; box/label key equations; take magnitudes only when asked.\n4. The official M1 formula booklet states no additional formulae are given for M1."},{"question":"What are the three genuine closing study actions from the lesson, and what must NOT be presented as tutor-assigned homework?","answer":"1. Priority this week: complete the Pure 2 baseline paper, then the Pure 3 baseline paper, to build a full course diagnostic — ahead of extra M1 work.\n2. A separate, already-completed M1 homework paper (marked) is available to look over if time allows.\n3. That earlier M1 paper will be revisited together in mid-July, with more homework time allowed first.\n4. Must not be presented as homework: \"keep practising moments and inclined-plane resolving\", any author-created drill set, or a \"recurring weakness\" story as tutor-assigned work — the guide explicitly removes those earlier versions."}]},"deepseek_1":{"label":"DeepSeek V4 Pro","returned_model":"deepseek/deepseek-v4-pro","cards":[{"question":"In M1, which mechanics results are you expected to know by heart and are not printed in the formula booklet?","answer":"The following are M1 required knowledge and are not additionally printed in the formula section:\n1. Momentum = mv\n2. Impulse = mv − mu\n3. The five constant-acceleration (SUVAT) formulae\n4. Newton's laws of motion\n5. Friction law: F = μR (and F ≤ μR)\n6. Principle of moments\nThe specification expects these to be known; the formula booklet explicitly states \"There are no formulae given for M1 in addition to those candidates are expected to know.\""},{"question":"In a direct collision problem where two particles approach each other, what is the crucial first step before applying conservation of momentum?","answer":"Define a clear positive direction and draw before/after diagrams labelling all velocities with signs consistent with that direction. For example, if particle A's initial direction is taken as positive, then particle B approaching from the opposite direction must be assigned a negative initial velocity. Label the unknown post-collision velocities (e.g., vA = x, vB = x + 1) and state which unknown belongs to which particle. Two unlabelled numbers may not fully answer the question."},{"question":"When a question asks for the magnitude of an impulse, what must you remember about the final answer?","answer":"\"Magnitude\" means the final answer is a positive quantity. After calculating the impulse (which may be positive or negative depending on your chosen positive direction), take the absolute value and give the answer as a positive number written without modulus bars. For example, if IB = −3m N s, give the magnitude as 3m N s. Keep signed quantities during working until the magnitude is requested."},{"question":"In a speed–time graph problem where the magnitude of acceleration is twice the magnitude of deceleration, how do you relate the time intervals?","answer":"If the acceleration phase lasts T, then because acceleration is twice the deceleration, the deceleration phase lasts 2T. This follows from a = Δv/Δt: for the same speed change Δv, if |a_acc| = 2|a_dec|, then Δt_dec = 2Δt_acc. Be careful to measure each duration from the correct transition point — the constant-speed phase runs from T to T + 180, not from the origin."},{"question":"What is the area-of-a-trapezium formula, and why is it useful in speed–time graph distance calculations?","answer":"A = ½(a + b)h, where a and b are the lengths of the parallel sides and h is the perpendicular height between them. In a speed–time graph, the parallel sides are the horizontal segments (time intervals at different speeds) and h is the maximum speed. Using this formula is often more efficient than splitting the area into separate triangles and a rectangle. This is a P1/P2 prerequisite formula, not an M1 formula."},{"question":"When a rod is \"on the point of tilting\" about a support, what does this tell you about the reaction force at the other support?","answer":"\"On the point of tilting about C\" means the reaction at the other support D becomes zero: RD = 0. Similarly, \"on the point of tilting about D\" means RC = 0. This is the critical condition that allows you to take moments about the pivot without needing to know the reaction there. A force that acts through the pivot has zero moment about that pivot, so it need not be included in the moment equation."},{"question":"In a moments problem with two tilting scenarios giving two equations, what is an efficient strategy when both equations contain a common unknown factor?","answer":"Divide the two equations to cancel the common unknown. For example, if you have:\n(1) Wx = 189\n(2) W(0.9 − x) = 81\nDividing (1) by (2) eliminates W, giving x/(0.9 − x) = 189/81 = 7/3. This is more efficient than substitution when the common unknown (W) cancels. Box and label the important equations so you can combine them cleanly. After finding x, back-substitute into either equation to find W."},{"question":"When resolving forces on an inclined plane, what is a common trap with the word \"vertically\"?","answer":"The trap is saying forces are \"balanced vertically\" when resolving perpendicular to the inclined plane. \"Vertically\" means up/down relative to the ground, which is not the resolving direction on an incline. The correct language is \"balanced perpendicular to the plane\" or \"resolved perpendicular to the plane.\" The weight mg acts vertically downwards, but it must be resolved into components parallel (mg sin θ) and perpendicular (mg cos θ) to the plane."},{"question":"What is the correct perpendicular resolution equation for a parcel on a rough inclined plane with an applied force at an angle to the plane?","answer":"If a force F acts at angle α to the plane (pulling away from the plane), the perpendicular equation is:\nR + F sin α = mg cos θ\nwhere R is the normal reaction, mg cos θ is the weight component into the plane, and F sin α is the component of the applied force away from the plane. The parallel forces are not balanced, so Newton's second law applies along the plane: F cos α − FR − mg sin θ = ma."},{"question":"In the ESAT-style inequality warm-up, how do you count the number of integers satisfying |2√n − 7| \u003c 1?","answer":"1. Write as a single modulus statement and unfold: −1 \u003c 2√n − 7 \u003c 1\n2. Add 7 to all three parts: 6 \u003c 2√n \u003c 8\n3. Divide all three by 2 (safe since all terms positive): 3 \u003c √n \u003c 4\n4. Square all parts (safe since all positive): 9 \u003c n \u003c 16\n5. Count integers strictly between 9 and 16: n ∈ {10, 11, 12, 13, 14, 15}\n6. Count = 15 − 10 + 1 = 6. The \"+1\" is essential for inclusive counting of integers between bounds."},{"question":"When using the speed–time graph trapezium area to find an unknown time T, what unit conversion trap must you check?","answer":"Keep units consistent before equating. If the distance is given in kilometres (e.g., 4.8 km) and the speed axis is in m s⁻¹, convert the distance to metres first: 4.8 km = 4800 m. Then equate the area (which will be in metres, since speed × time = m s⁻¹ × s = m) to 4800. Failing to convert leads to an answer that is wrong by a factor of 1000."},{"question":"In an inclined-plane friction problem, how do you determine the direction of acceleration — and what invalid shortcut should you avoid?","answer":"The direction of acceleration must be decided from the net resolved force along the plane, including gravity. Calculate F_net = (applied force component up plane) − (friction) − (weight component down plane). If F_net \u003e 0, acceleration is up the slope; if F_net \u003c 0, acceleration is down the slope. Do not assume friction \"only exists because of\" the applied pull or that the acceleration direction follows the applied force. Gravity's component along the plane (mg sin θ) is always present and must be included in the net force calculation."}]},"kimi_1":{"label":"Kimi K3","returned_model":"moonshotai/kimi-k3","cards":[{"question":"In the ESAT-style warm-up (labelled NOT WME01), how many different integers $$n$$ make the difference between $$2\\sqrt{n}$$ and $$7$$ less than $$1$$? Give the clean method and the two endpoint/counting checks.","answer":"1. \"Difference less than 1\" is one modulus statement: $$\\left|2\\sqrt{n}-7\\right|\u003c1 \\iff -1\u003c2\\sqrt{n}-7\u003c1$$.\n2. Add 7, divide by 2 (all terms positive, so safe), then square: $$6\u003c2\\sqrt{n}\u003c8 \\implies 3\u003c\\sqrt{n}\u003c4 \\implies 9\u003cn\u003c16$$.\n3. Strict inequalities exclude the endpoints $$9$$ and $$16$$, so $$n\\in\\{10,11,12,13,14,15\\}$$.\n4. Inclusive counting needs the \"+1\": $$15-10+1=6$$. Answer: $$6$$.\nTraps: use the single modulus chain on a number line; don't rearrange so that $$\\sqrt{n}$$ re-appears. Status: ESAT-style warm-up — must never be labelled an M1/WME01 question."},{"question":"Packet Q1 / official WME01 Q2(a) (COMPLETED WITH PROMPTING): particle A has mass $$3m$$, particle B mass $$m$$, each approaches the other at $$1.5\\text{ m s}^{-1}$$; after the direct collision B's speed is $$1\\text{ m s}^{-1}$$ more than A's. Set up conservation of momentum and find both speeds.","answer":"1. Take A's initial direction as positive, so B's before-velocity is $$-1.5$$; draw separate before/after diagrams.\n2. Label the after-speeds A: $$x$$ and B: $$x+1$$.\n3. Momentum: $$(3m)(1.5)+m(-1.5)=3mx+m(x+1)$$.\n4. $$4.5-1.5=4x+1 \\implies 3=4x+1 \\implies x=\\tfrac12$$.\n5. $$v_A=\\tfrac12=0.5\\text{ m s}^{-1}$$, $$v_B=x+1=\\tfrac32=1.5\\text{ m s}^{-1}$$.\nCheck: state which speed is which — two unlabelled numbers may not fully answer the question. (Official marks: 8; a: 5, b: 3.)"},{"question":"In the same WME01 collision (packet Q1 / official Q2(b)), particle B of mass $$m$$ has velocity $$-1.5\\text{ m s}^{-1}$$ before impact and $$\\tfrac32\\text{ m s}^{-1}$$ after. Find the magnitude of the impulse on B and state the wording traps.","answer":"1. Impulse on B = change of momentum of B: $$I_B=m\\left(\\tfrac32\\right)-m(-1.5)=\\tfrac32m+\\tfrac32m=3m$$.\n2. \"Magnitude\" means the final answer is the positive quantity $$|I_B|=3m\\text{ N s}$$, written without modulus bars.\n3. The impulse asked for is the one exerted on B specifically — not on A, not a total.\n4. Impulse $$=mv-mu$$ must be known by heart: the M1 formula booklet prints no additional M1 formulae."},{"question":"Packet Q2 / official WME01 Q1 (COMPLETED WITH PROMPTING): a train accelerates from rest to $$20\\text{ m s}^{-1}$$, holds that speed for $$180\\text{ s}$$, then decelerates to rest, with the acceleration magnitude twice the deceleration magnitude. Derive the three time markers on the speed–time graph and name the duration trap.","answer":"1. Both sloping phases change speed by $$20\\text{ m s}^{-1}$$; with acceleration twice the deceleration, deceleration takes twice as long: acceleration phase $$T$$, deceleration phase $$2T$$.\n2. Markers along the base: $$T$$ (top speed reached), $$T+180$$ (constant phase ends), $$3T+180$$ (train stops).\n3. Graph shape: a trapezium peaking at the printed $$20\\text{ m s}^{-1}$$.\nTrap: measure each duration from the correct transition — the constant phase runs to $$T+180$$, not to $$180$$ from the origin. (Official marks: 10; a: 3, b: 5, c: 2.)"},{"question":"For that train graph (peak $$20\\text{ m s}^{-1}$$, base $$3T+180$$, top $$180$$, total distance $$4.8\\text{ km}$$), find $$T$$ and the initial acceleration, naming the area tool and the unit check.","answer":"1. Convert units first: $$4.8\\text{ km}=4800\\text{ m}$$.\n2. Distance = area of trapezium $$A=\\tfrac12(a+b)h$$ (a P1/P2 prerequisite formula) with $$a=180$$, $$b=3T+180$$, $$h=20$$: $$4800=\\tfrac12\\bigl(180+(3T+180)\\bigr)(20)=10(3T+360)$$.\n3. $$480=3T+360 \\implies 3T=120 \\implies T=40\\text{ s}$$.\n4. Initial acceleration = gradient of the first phase: $$a=\\dfrac{20}{T}=\\dfrac{20}{40}=0.5\\text{ m s}^{-2}$$.\nAdvice: learn the trapezium-area formula rather than always splitting into triangles and a rectangle."},{"question":"Packet Q5 / official WME01 Q4 (COMPLETED WITH PROMPTING): a non-uniform branch of length $$1.5\\text{ m}$$ rests on supports C and D placed $$0.24\\text{ m}$$ and $$0.36\\text{ m}$$ from its ends. What do the two \"on the point of tilting\" conditions tell you, and which forces may be omitted from each moments equation?","answer":"1. \"On the point of tilting about C\" $$\\implies R_D=0$$; \"on the point of tilting about D\" $$\\implies R_C=0$$.\n2. A force acting through the chosen pivot — and any zero reaction — has no moment about that pivot, so it need not be written.\n3. Draw the two tilting scenarios as separate diagrams, marking the weight $$W$$ at distance $$x$$ from C and the support reactions $$R_C, R_D$$.\n(Official marks: 8, for both values, not split by the paper.)"},{"question":"For the branch question, the tilting equations are (A) $$Wx=150(1.5-0.24)=189$$ about C and (B) $$225(0.36)=(1.5-0.36-0.24-x)W$$ about D. Solve for $$W$$ and $$x$$ efficiently and list the strategy checks.","answer":"1. Divide (A) by (B) so the common unknown $$W$$ cancels: $$\\dfrac{x}{0.9-x}=\\dfrac{189}{81}=\\dfrac73$$.\n2. $$3x=7(0.9-x) \\implies 10x=6.3 \\implies x=0.63\\text{ m}$$.\n3. Back-substitute into (A): $$W=\\dfrac{189}{0.63}=300\\text{ N}$$.\n4. Checks: box and label (A) and (B) so they combine cleanly; put clockwise moments on one side and anticlockwise on the other rather than one long signed sum; dividing beats substitution when $$W$$ cancels; use the calculator for intermediate products and verify the back-substitution — a wrong starting value for $$W$$ was repaired live to $$300\\text{ N}$$."},{"question":"Packet Q8 / official WME01 Q8 (LIVE SET-UP ONLY): a $$2\\text{ kg}$$ parcel on a rough plane inclined at $$30^\\circ$$, an $$18\\text{ N}$$ force at $$40^\\circ$$ to the plane, $$\\mu=0.3$$. State the governing equations reached live and the corrected perpendicular equation.","answer":"1. Resolve: applied force $$18\\cos40^\\circ$$ up the plane and $$18\\sin40^\\circ$$ away from the plane; weight $$2g\\sin30^\\circ$$ down the plane and $$2g\\cos30^\\circ$$ into the plane.\n2. Parallel to the plane (Newton's 2nd law): $$18\\cos40^\\circ-F_R-2g\\sin30^\\circ=2a$$.\n3. Friction relation: $$F_R=F_{\\max}=\\mu R=0.3R$$.\n4. Perpendicular, corrected form: $$R+18\\sin40^\\circ=2g\\cos30^\\circ$$ — not the live board line $$R-2g\\sin30^\\circ+18\\sin40^\\circ=0$$, which was wrong and not repaired before time ran out.\nStatus: only the diagram and equations were reached live; all arithmetic is OFFICIAL MS REFERENCE ONLY. (Official marks: 15; a: 8, b: 3, c: 4.)"},{"question":"Which two conceptual corrections from the Q8 inclined-plane set-up should you carry into other questions?","answer":"1. Direction language: say the perpendicular forces are \"balanced perpendicular to the plane\", never \"balanced vertically\" — \"vertically\" means up/down, which is not the resolving direction here. The parallel forces are not balanced, so Newton's second law applies along the plane.\n2. Reject the general claim that friction \"only exists because\" of the applied pull and so can never exceed the applied component: the direction of acceleration must be decided from the net resolved force along the plane, including gravity. For these numbers the net force is up the slope only because the resolved parallel equation says so — do not carry the general statement into other questions."},{"question":"For Q8 ($$2\\text{ kg}$$, $$30^\\circ$$ plane, $$\\mu=0.3$$, $$18\\text{ N}$$ at $$40^\\circ$$), the numerical work is OFFICIAL MS REFERENCE ONLY (not produced live). State the (a) completion and the (c) test for whether P remains at rest once the $$18\\text{ N}$$ force is removed.","answer":"1. (a) Using $$g=9.8$$: $$R=2g\\cos30^\\circ-18\\sin40^\\circ\\approx5.4039\\text{ N}$$, $$F_R=0.3R\\approx1.6212\\text{ N}$$, then $$2a=18\\cos40^\\circ-F_R-2g\\sin30^\\circ\\approx2.3676 \\implies a\\approx1.18$$ (or $$1.2$$) $$\\text{m s}^{-2}$$.\n2. (c) Technique — compare the driving force with maximum available friction: with the force removed, $$R=2g\\cos30^\\circ\\approx16.974\\text{ N}$$, so $$\\mu R\\approx5.09\\text{ N}$$; the weight component $$2g\\sin30^\\circ=9.8\\text{ N}$$ exceeds $$5.09\\text{ N}$$, so friction cannot hold the parcel: P does not remain at rest.\n(Reference also gives (b): $$v^2=2^2+2(1.1838)(5)\\approx15.838$$, $$v\\approx3.98$$ or $$4.0\\text{ m s}^{-1}$$.)"},{"question":"For the remaining WME01/01 January 2023 items in this guide, what are the exact lesson statuses, the numbering rule, and the genuine closing actions?","answer":"1. REVIEWED ONLY / DEFERRED (looked at, not re-worked): packet Q3 / official Q3 constant-acceleration vectors (10 marks) and packet Q4 / official Q5 vehicle SUVAT P–Q–R (9 marks); their answers sit only in the official-reference appendix.\n2. NOT DISCUSSED: packet Q6 / official Q6 boat pulled by two ropes (8 marks) and packet Q7 / official Q7 lift and two boxes (7 marks) — never opened; any answers are official-reference only, not produced live.\n3. Dual numbering: only two swaps — packet Q1↔official Q2 and packet Q4↔official Q5; Q3, Q6, Q7, Q8 carry the same number in both systems; always quote both labels.\n4. Closing actions genuinely set: complete the Pure 2 baseline paper, then the Pure 3 baseline paper, ahead of extra M1 work; a separate marked M1 homework paper is available to look over; that earlier M1 paper will be revisited together in mid-July. No moments/inclined-plane drill set was assigned as homework."},{"question":"What does the M1 formula booklet provide for WME01, which results used in this lesson must be known by heart, and what rounding/units discipline is required?","answer":"1. The booklet states there are no formulae given for M1 in addition to those candidates are expected to know, and notes P1/P2 formulae may also be needed.\n2. Know by heart: momentum $$mv$$; impulse $$mv-mu$$; the five constant-acceleration (SUVAT) formulae; Newton's laws; friction law $$F=\\mu R$$ with $$F\\le\\mu R$$; the principle of moments.\n3. Trapezium area $$A=\\tfrac12(a+b)h$$ is a P1/P2 prerequisite (used for the train graph).\n4. Discipline: keep signed quantities until a requested magnitude is taken; carry an unrounded value (e.g. $$a=1.1838\\ldots$$) into onward substitution and only then write $$a\\approx1.18\\text{ m s}^{-2}$$; use \"$$=$$\" for exact/calculated expressions and \"$$\\approx$$\" for rounded ones; give SI units on final mechanics answers."}]}},ROLES=Object.keys(DATA);let active=ROLES[0],selected={};for(const r of ROLES)selected[r]=new Set(DATA[r].cards.map((_,i)=>i));
function typeset(){const x=document.getElementById('list');if(window.MathJax&&MathJax.typesetPromise){if(MathJax.typesetClear)MathJax.typesetClear([x]);MathJax.typesetPromise([x]).catch(()=>{})}}
function tabs(){const t=document.getElementById('tabs');t.replaceChildren();for(const r of ROLES){const b=document.createElement('button');b.className='tab'+(r===active?' active':'');b.textContent=DATA[r].label+' ('+DATA[r].cards.length+')';b.onclick=()=>{active=r;tabs();render()};t.append(b)}}
function render(){const l=document.getElementById('list');l.replaceChildren();DATA[active].cards.forEach((c,i)=>{const article=document.createElement('article');article.className='card';const row=document.createElement('div');row.className='row';const pick=document.createElement('input');pick.className='pick';pick.type='checkbox';pick.checked=selected[active].has(i);pick.setAttribute('aria-label',`Select card ${i+1}`);const qw=document.createElement('div');qw.className='qwrap';const q=document.createElement('div');q.className='q';q.tabIndex=0;q.textContent=c.question;const ans=document.createElement('div');ans.className='answer';const txt=document.createElement('div');txt.textContent=c.answer;const foot=document.createElement('div');foot.className='foot';const cp=document.createElement('button');cp.className='copy';cp.textContent='Copy';cp.onclick=()=>copyText(c.question+'\t'+c.answer);foot.append(cp);ans.append(txt,foot);qw.append(q,ans);row.append(pick,qw);article.append(row);l.append(article);pick.onchange=()=>{pick.checked?selected[active].add(i):selected[active].delete(i);count()};const toggle=()=>{article.classList.toggle('open');typeset()};q.onclick=toggle;q.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle()}}});count();typeset()}
function count(){document.getElementById('count').textContent=`${selected[active].size} / ${DATA[active].cards.length} selected`}
function setall(v){selected[active]=v?new Set(DATA[active].cards.map((_,i)=>i)):new Set();render()}
function reveal(v){document.querySelectorAll('.card').forEach(x=>x.classList.toggle('open',v));typeset()}
function copyText(s){navigator.clipboard.writeText(s).then(()=>toast('Copied')).catch(()=>toast('Copy failed'))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)}
function table(){const c=DATA[active].cards.filter((_,i)=>selected[active].has(i));let s='| Question | Answer |\n| --- | --- |\n';for(const x of c)s+='| '+x.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+x.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n';copyText(s)}
addEventListener('DOMContentLoaded',()=>{tabs();render();document.getElementById('sel').onclick=()=>setall(true);document.getElementById('desel').onclick=()=>setall(false);document.getElementById('reveal').onclick=()=>reveal(true);document.getElementById('hide').onclick=()=>reveal(false);document.getElementById('table').onclick=table});</script></body></html>
