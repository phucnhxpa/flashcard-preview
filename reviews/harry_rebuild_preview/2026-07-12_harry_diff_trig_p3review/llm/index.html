weight:650}.list{display:flex;flex-direction:column;gap:10px}.card{min-width:0;max-width:100%;background:#fff;border:1px solid #e1e1e6;border-radius:14px;padding:15px 16px;box-shadow:0 1px 4px #0000000a}.row{display:flex;gap:10px;align-items:flex-start;min-width:0}.pick{width:18px;height:18px;margin-top:3px;flex:0 0 auto}.qwrap{min-width:0;max-width:100%;flex:1}.q{font-weight:650;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;cursor:pointer;overflow-x:auto}.answer{display:none;white-space:pre-wrap;margin-top:10px;padding-top:10px;border-top:1px solid #ececf0;color:#3e3e43;overflow-wrap:anywhere;word-break:break-word;overflow-x:auto}.card.open .answer{display:block}.foot{display:flex;justify-content:flex-end;margin-top:8px}.copy{border:1px solid #d2d2d7;background:#fff;border-radius:8px;padding:3px 8px;cursor:pointer}.notice{font-size:12px;color:#68686d;text-align:center;margin:12px 0}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#1d1d1f;color:#fff;border-radius:8px;padding:8px 14px;opacity:0;pointer-events:none}.toast.show{opacity:1}mjx-container{max-width:100%;overflow-x:auto;overflow-y:hidden}@media(max-width:430px){.wrap{padding:16px 10px 55px}h1{font-size:24px}.tools{top:4px}.count{width:100%;margin-left:0}.card{padding:13px 12px}}</style><script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]],displayMath:[["$$","$$"],["\\[","\\]"]],processEscapes:true},options:{skipHtmlTags:["script","noscript","style","textarea","pre","code"]}};</script><script defer src="assets/mathjax/es5/tex-mml-chtml.js"></script></head><body><main class="wrap"><header><h1>Pure Mathematics 3 (WMA13) - Differentiation and Trigonometry · Maths differentiation and trig lesson - Maths lesson - 12 July 2026; official P3 specification and lesson evidence</h1><p class="sub">Direct model-output flashcards</p></header><nav id="tabs" class="tabs" aria-label="Models"></nav><nav class="tools"><button id="sel">Select all</button><button id="desel">Deselect all</button><button id="reveal">Reveal all</button><button id="hide">Hide all</button><button id="table">Copy table</button><span id="count" class="count"></span></nav><section id="list" class="list"></section><p class="notice">Model outputs are displayed directly as generated.</p></main><div id="toast" class="toast"></div><script>const DATA={"glm_1":{"label":"GLM 5.1 · Run 1","returned_model":"z-ai/glm-5.1","cards":[{"question":"When differentiating, how do you decide between using the power rule $$\\frac{d}{dx}(x^n) = nx^{n-1}$$ and the exponential rule $$\\frac{d}{dx}(a^x) = a^x \\ln a$$?","answer":"Check where the variable is:\n1. Variable in the base (e.g., $$x^3$$) ⇒ use the power rule.\n2. Variable in the power (e.g., $$3^x$$) ⇒ use the exponential rule $$a^x \\ln a$$.\nTrap: Applying the power rule to $$a^x$$ gives the incorrect $$xa^{x-1}$$. [Status: S]"},{"question":"What is the derivative of $$\\ln f(x)$$, what condition is required, and what common simplification occurs for $$\\ln(kx)$$?","answer":"1. Derivative: $$\\frac{f'(x)}{f(x)}$$ (\"differentiate the argument, put it on top\").\n2. Condition: $$f(x) \u003e 0$$ so the log is real.\n3. Simplification: For $$\\ln(kx)$$, the derivative is $$\\frac{k}{kx} = \\frac{1}{x}$$; the constant $$k$$ cancels. [Status: S]"},{"question":"What is the derivative of $$a^{kx}$$, and how is the chain rule applied here?","answer":"1. Derivative: $$k a^{kx} \\ln a$$.\n2. Method: Differentiate the outer exponential to get $$a^{kx} \\ln a$$, then multiply by the derivative of the inner power $$kx$$, which is $$k$$. [Status: S]"},{"question":"What memory pattern helps recall the signs of the derivatives of the six trig functions listed in order: sin, cos, tan, cosec, sec, cot?","answer":"The signs alternate in the pattern +, −, +, −, +, −:\n1. $$\\frac{d}{dx}(\\sin x) = +\\cos x$$\n2. $$\\frac{d}{dx}(\\cos x) = -\\sin x$$\n3. $$\\frac{d}{dx}(\\tan x) = +\\sec^2 x$$\n4. $$\\frac{d}{dx}(\\cosec x) = -\\cosec x \\cot x$$\n5. $$\\frac{d}{dx}(\\sec x) = +\\sec x \\tan x$$\n6. $$\\frac{d}{dx}(\\cot x) = -\\cosec^2 x$$ [Status: S]"},{"question":"How can the derivatives of $$\\tan x$$ and $$\\cot x$$ help you recall their associated Pythagorean identities?","answer":"The derivatives directly mirror the identities:\n1. $$\\frac{d}{dx}(\\tan x) = \\sec^2 x$$ links to $$1 + \\tan^2 x = \\sec^2 x$$.\n2. $$\\frac{d}{dx}(\\cot x) = -\\cosec^2 x$$ links to $$1 + \\cot^2 x = \\cosec^2 x$$. [Status: S]"},{"question":"What memory hook helps recall which standard trig function pairs with cosec and sec in their reciprocal identities?","answer":"Match the third letter:\n1. cosec pairs with sin ($$\\cosec A = \\frac{1}{\\sin A}$$).\n2. sec pairs with cos ($$\\sec A = \\frac{1}{\\cos A}$$). [Status: S]"},{"question":"In the Pythagorean identities, what is the common error when recalling $$1 + \\tan^2 A$$, and what is the correct identity?","answer":"1. Trap: Writing $$1 + \\tan^2 A = \\cot^2 A$$.\n2. Correct: $$1 + \\tan^2 A = \\sec^2 A$$.\n(This can be derived by dividing the master identity $$\\sin^2 A + \\cos^2 A = 1$$ by $$\\cos^2 A$$). [Status: S]"},{"question":"What are the three forms of $$\\cos 2A$$, and what ordering trap must be avoided?","answer":"1. $$\\cos 2A = \\cos^2 A - \\sin^2 A$$ (Trap: cosine must come first; it is not $$\\sin^2 A - \\cos^2 A$$).\n2. $$\\cos 2A = 1 - 2\\sin^2 A$$ (substitute $$\\cos^2 A = 1 - \\sin^2 A$$).\n3. $$\\cos 2A = 2\\cos^2 A - 1$$ (substitute $$\\sin^2 A = 1 - \\cos^2 A$$).\nNote: Memorise these rather than deriving them in the exam. [Status: S]"},{"question":"When integrating $$\\int \\frac{k}{x-2} dx$$, what form must the answer take, and when can the modulus signs be removed?","answer":"1. Form: $$k \\ln|x-2| + c$$. Keep the modulus signs from the general rule $$\\int \\frac{f'(x)}{f(x)} dx = \\ln|f(x)| + c$$.\n2. Removal: Drop the modulus bars only once the argument is known to be positive (e.g., if evaluating definite integrals with positive limits). [Status: S]"},{"question":"When finding the value of $$R$$ in the R-formula $$R \\sin(\\theta + \\alpha)$$, what exactness trap must be avoided?","answer":"Trap: Giving $$R$$ as a decimal (e.g., 4.472).\nFix: $$R$$ must be given as an exact surd (e.g., $$\\sqrt{20} = 2\\sqrt{5}$$). A decimal loses the mark when an exact value is required. [Status: S]"},{"question":"When solving a rearranged trig equation like $$\\sin(2x + \\alpha) = 1$$, what is the trap regarding adding $$2\\pi$$ for subsequent solutions?","answer":"Trap: Finding the first $$x$$ and then adding $$2\\pi$$ to that $$x$$.\nFix: Add $$2\\pi$$ to the *whole angle* ($$2x + \\alpha$$) first, then rearrange to solve for $$x$$. The periodicity belongs to the angle before dividing by the coefficient of $$x$$. [Status: S]"},{"question":"In polynomial long division, what sign error commonly occurs during subtraction, and how is it prevented?","answer":"1. Trap: e.g., computing $$-5x - (-4x)$$ as $$-9x$$ instead of $$-x$$.\n2. Fix: Always bracket the term you are subtracting to manage the signs correctly: $$-5x - (-4x) = -5x + 4x = -x$$. [Status: S]"}]},"glm_2":{"label":"GLM 5.1 · Run 2","returned_model":"z-ai/glm-5.1","cards":[{"question":"When differentiating $$a^x$$, why must you not apply the power rule $$\\frac{d}{dx} x^n = n x^{n-1}$$, and what is the correct derivative?","answer":"1. The power rule applies only when the variable is in the base ($$x^n$$). 2. In $$a^x$$, the variable is in the power. 3. The correct derivative is $$\\frac{d}{dx} a^x = a^x \\ln a$$ (Status: Solved trap)."},{"question":"What is the derivative of $$a^{kx}$$, and how is the chain rule applied to achieve it?","answer":"1. Differentiate the outer exponential to get $$a^{kx} \\ln a$$. 2. Multiply by the derivative of the inner power $$kx$$, which is $$k$$. 3. Result: $$\\frac{d}{dx} a^{kx} = k a^{kx} \\ln a$$ (Status: Solved)."},{"question":"What is the derivative of $$\\ln f(x)$$, what validity condition is required, and what common trap occurs with constants inside the log?","answer":"1. Derivative: $$\\frac{d}{dx} \\ln f(x) = \\frac{f'(x)}{f(x)}$$. 2. Condition: $$f(x) \u003e 0$$ so the log is real. 3. Trap: Forgetting the $$f'(x)$$ numerator. For $$\\ln(kx)$$, the $$k$$ cancels: $$\\frac{k}{kx} = \\frac{1}{x}$$, so do not leave it as $$\\frac{1}{kx}$$ (Status: Solved trap)."},{"question":"What is the sign pattern for the derivatives of the six trig functions when listed in the order sin, cos, tan, cosec, sec, cot?","answer":"The signs alternate: +, −, +, −, +, −. \n1. $$\\frac{d}{dx} \\sin x = +\\cos x$$\n2. $$\\frac{d}{dx} \\cos x = -\\sin x$$\n3. $$\\frac{d}{dx} \\tan x = +\\sec^2 x$$\n4. $$\\frac{d}{dx} \\text{cosec } x = -\\text{cosec } x \\cot x$$\n5. $$\\frac{d}{dx} \\sec x = +\\sec x \\tan x$$\n6. $$\\frac{d}{dx} \\cot x = -\\text{cosec}^2 x$$ (Status: Solved)."},{"question":"How does the derivative of $$\\tan x$$ and $$\\cot x$$ link directly to their respective Pythagorean identities?","answer":"1. $$\\frac{d}{dx} \\tan x = \\sec^2 x$$ links to $$1 + \\tan^2 x = \\sec^2 x$$. 2. $$\\frac{d}{dx} \\cot x = -\\text{cosec}^2 x$$ links to $$1 + \\cot^2 x = \\text{cosec}^2 x$$. Memorising one helps recall the other (Status: Solved)."},{"question":"What is the memory hook for pairing the reciprocal trig functions (cosec, sec, cot) with their standard partners (sin, cos, tan)?","answer":"Match the third letter of the reciprocal to its partner: cOsec → sin, sEc → cos, cOt → tan. Thus: $$\\text{cosec } A = \\frac{1}{\\sin A}$$, $$\\sec A = \\frac{1}{\\cos A}$$, $$\\cot A = \\frac{1}{\\tan A}$$ (Status: Solved)."},{"question":"When recalling the Pythagorean identity starting with $$1 + \\tan^2 A$$, what is the common trap, and what is the correct identity?","answer":"1. Trap: Writing $$1 + \\tan^2 A = \\cot^2 A$$ (Status: Solved trap). 2. Correct identity: $$1 + \\tan^2 A = \\sec^2 A$$."},{"question":"What are the three forms of the double angle identity for $$\\cos 2A$$, and what order trap must be avoided in the primary form?","answer":"1. Primary form: $$\\cos 2A = \\cos^2 A - \\sin^2 A$$ (Trap: order matters, cosine first, not $$\\sin^2 A - \\cos^2 A$$). 2. Substitute $$\\cos^2 A = 1 - \\sin^2 A$$: $$\\cos 2A = 1 - 2\\sin^2 A$$. 3. Substitute $$\\sin^2 A = 1 - \\cos^2 A$$: $$\\cos 2A = 2\\cos^2 A - 1$$ (Status: Solved trap)."},{"question":"When performing polynomial long division, what common sign error occurs during subtraction, and what is the tutor's fix?","answer":"1. Trap: Subtracting a negative and making the sign worse, e.g., $$-5x - (-4x)$$ incorrectly computed as $$-9x$$ instead of $$-x$$ (Status: Solved trap). 2. Fix: Always bracket the term you subtract to manage the signs correctly."},{"question":"When finding $$R$$ in the form $$a \\sin \\theta + b \\cos \\theta = R \\sin(\\theta + \\alpha)$$, what format trap must be avoided for $$R$$, and how should it be stated?","answer":"1. Trap: Writing $$R$$ as a decimal (e.g., $$R = 4.472$$). 2. Fix: $$R$$ must be given in exact surd form (e.g., $$R = \\sqrt{20} = 2\\sqrt{5}$$). Decimals are not acceptable for exact values (Status: Solved trap)."},{"question":"When solving a trig equation like $$\\sin(2x + \\alpha) = 1$$, at what stage do you add $$2\\pi$$ to find subsequent solutions, and why?","answer":"1. Add $$2\\pi$$ to the whole angle $$(2x + \\alpha)$$ first, then rearrange for $$x$$. 2. Trap: Adding $$2\\pi$$ to $$x$$ after rearranging. The $$2\\pi$$ periodicity belongs to the whole angle before division by 2 (Status: Solved trap)."},{"question":"For a modulus function $$f(x) = a|x - h| + k$$, what is the shortcut to state the coordinates of the vertex $$P$$?","answer":"The vertex $$P$$ is simply $$(h, k)$$. For example, for $$f(x) = 2|x - 5| + 10$$, the vertex is $$(5, 10)$$ (Status: Solved)."}]},"glm_3":{"label":"GLM 5.1 · Run 3","returned_model":"z-ai/glm-5.1","cards":[{"question":"When differentiating, how do you decide whether to use the power rule or the exponential rule?","answer":"1. Check where the variable is. 2. Variable in the base (e.g., $$x^3$$) $$\\Rightarrow$$ power rule. 3. Variable in the power (e.g., $$3^x$$) $$\\Rightarrow$$ exponential rule $$a^x \\ln a$$. Trap: misapplying the power rule to $$a^x$$ to get $$x a^{x-1}$$."},{"question":"What is the derivative of $$a^{kx}$$, and why does the chain rule produce the factor $$k$$?","answer":"$$\\frac{d}{dx}(a^{kx}) = k a^{kx} \\ln a$$. 1. Differentiate the outer exponential to get $$a^{kx} \\ln a$$. 2. Multiply by the derivative of the inner power $$kx$$, which is $$k$$."},{"question":"State the rule for differentiating $$\\ln(f(x))$$. Why does differentiating $$\\ln(3x)$$ simplify to $$\\frac{1}{x}$$?","answer":"Rule: $$\\frac{d}{dx}(\\ln f(x)) = \\frac{f'(x)}{f(x)}$$ for $$f(x) \u003e 0$$. For $$\\ln(3x)$$, the numerator is $$f'(x) = 3$$, so it becomes $$\\frac{3}{3x}$$, and the constant $$3$$ cancels to give $$\\frac{1}{x}$$. Trap: omitting the $$f'(x)$$ in the numerator."},{"question":"What is the sign pattern for the derivatives of the six trig functions listed in order: sin, cos, tan, cosec, sec, cot?","answer":"The signs alternate: +, −, +, −, +, −. Specifically: $$\\frac{d}{dx}(\\sin x) = +\\cos x$$; $$\\frac{d}{dx}(\\cos x) = -\\sin x$$; $$\\frac{d}{dx}(\\tan x) = +\\sec^2 x$$; $$\\frac{d}{dx}(\\text{cosec } x) = -\\text{cosec } x \\cot x$$; $$\\frac{d}{dx}(\\sec x) = +\\sec x \\tan x$$; $$\\frac{d}{dx}(\\cot x) = -\\text{cosec}^2 x$$."},{"question":"How can the Pythagorean identities help you recall the derivatives of $$\\tan x$$ and $$\\cot x$$?","answer":"The derivatives mirror the identities. 1. $$1 + \\tan^2 x = \\sec^2 x$$ links to $$\\frac{d}{dx}(\\tan x) = \\sec^2 x$$. 2. $$1 + \\cot^2 x = \\text{cosec}^2 x$$ links to $$\\frac{d}{dx}(\\cot x) = -\\text{cosec}^2 x$$."},{"question":"What memory hook helps you pair the reciprocal trig functions (cosec, sec, cot) with their standard partners (sin, cos, tan)?","answer":"Match the third letter of the reciprocal function to its partner: cosec $$\\rightarrow$$ sin; sec $$\\rightarrow$$ cos; cot $$\\rightarrow$$ tan. Thus, $$\\text{cosec } A = \\frac{1}{\\sin A}$$, $$\\sec A = \\frac{1}{\\cos A}$$, $$\\cot A = \\frac{1}{\\tan A}$$."},{"question":"For the Pythagorean identity $$1 + \\tan^2 A = ?$$, what is the common error, and what is the correct right-hand side?","answer":"Common error: writing $$\\cot^2 A$$. Correct right-hand side: $$\\sec^2 A$$."},{"question":"What are the three forms of the double angle identity for $$\\cos 2A$$, and what is the common order trap?","answer":"1. $$\\cos 2A = \\cos^2 A - \\sin^2 A$$ (trap: cosine must come first, not $$\\sin^2 A - \\cos^2 A$$). 2. $$\\cos 2A = 1 - 2\\sin^2 A$$ (replace $$\\cos^2 A$$). 3. $$\\cos 2A = 2\\cos^2 A - 1$$ (replace $$\\sin^2 A$$). Tutor advice: memorise all three rather than deriving them in the exam."},{"question":"When performing polynomial long division, what sign error frequently occurs during subtraction, and how do you prevent it?","answer":"Error: failing to handle the negative signs correctly (e.g., $$-5x - (-4x)$$ computed as $$-9x$$ instead of $$-x$$). Prevention: always bracket the term you are subtracting so you distribute the negative properly."},{"question":"When finding $$R$$ in the R-formula $$a \\sin \\theta + b \\cos \\theta = R \\sin(\\theta + \\alpha)$$, what trap must you avoid when writing your final answer?","answer":"Trap: writing $$R$$ as a decimal (e.g., $$4.472$$). Rule: $$R$$ must be given as an exact surd (e.g., $$\\sqrt{20} = 2\\sqrt{5}$$). Exact means no decimals allowed."},{"question":"When solving a rearranged trig equation like $$2x + \\alpha = \\frac{\\pi}{2}$$ to find further solutions, at what stage do you add $$2\\pi$$?","answer":"Add $$2\\pi$$ to the whole angle $$2x + \\alpha$$ first, then rearrange for $$x$$. Trap: finding $$x$$ and then adding $$2\\pi$$ to $$x$$, which is incorrect because the $$2\\pi$$ periodicity belongs to the angle before division by 2."},{"question":"How do you integrate $$\\int \\frac{f'(x)}{f(x)} dx$$, and what condition/trap applies to the result?","answer":"$$\\int \\frac{f'(x)}{f(x)} dx = \\ln|f(x)| + c$$. Condition/trap: you must keep the modulus signs around $$f(x)$$ in the general result; drop them only once you know the argument is positive for your specific limits."}]},"qwen_1":{"label":"Qwen 3.7 Max","returned_model":"qwen/qwen3.7-max","cards":[{"question":"When differentiating expressions with a constant $$a$$ and variable $$x$$, how do you decide whether to use the power rule or the exponential rule for $$a^x$$ and $$x^n$$?","answer":"1. Check where the variable $$x$$ is located.\n2. If $$x$$ is in the base ($$x^n$$), use the power rule: $$\\frac{d}{dx}(x^n) = nx^{n-1}$$.\n3. If $$x$$ is in the power ($$a^x$$), use the exponential rule: $$\\frac{d}{dx}(a^x) = a^x \\ln a$$.\n(Common trap: misapplying the power rule to $$a^x$$ to get $$x a^{x-1}$$)."},{"question":"What is the general rule for differentiating $$\\ln(f(x))$$, and how does it simplify for $$\\ln(kx)$$ where $$k$$ is a constant?","answer":"1. General rule: $$\\frac{d}{dx}(\\ln(f(x))) = \\frac{f'(x)}{f(x)}$$ (requires $$f(x) \u003e 0$$). \"Differentiate the argument and put it on top.\"\n2. For $$\\ln(kx)$$, $$f'(x) = k$$, so the derivative is $$\\frac{k}{kx}$$.\n3. The constant $$k$$ cancels, simplifying to $$\\frac{1}{x}$$."},{"question":"What is the sign pattern for the derivatives of the six trigonometric functions when listed in the order: $$\\sin x$$, $$\\cos x$$, $$\\tan x$$, $$\\text{cosec } x$$, $$\\sec x$$, $$\\cot x$$?","answer":"1. The signs follow the alternating pattern: $$+$$, $$-$$, $$+$$, $$-$$, $$+$$, $$-$$.\n2. $$\\frac{d}{dx}(\\sin x) = +\\cos x$$\n3. $$\\frac{d}{dx}(\\cos x) = -\\sin x$$ (a common trap is forgetting this minus sign)\n4. $$\\frac{d}{dx}(\\tan x) = +\\sec^2 x$$\n5. $$\\frac{d}{dx}(\\text{cosec } x) = -\\text{cosec } x \\cot x$$\n6. $$\\frac{d}{dx}(\\sec x) = +\\sec x \\tan x$$\n7. $$\\frac{d}{dx}(\\cot x) = -\\text{cosec}^2 x$$"},{"question":"Which two Pythagorean identities are directly linked to the derivatives of $$\\tan x$$ and $$\\cot x$$, and what are those derivatives?","answer":"1. $$\\frac{d}{dx}(\\tan x) = \\sec^2 x$$, which links to the identity $$1 + \\tan^2 x = \\sec^2 x$$.\n2. $$\\frac{d}{dx}(\\cot x) = -\\text{cosec}^2 x$$, which links to the identity $$1 + \\cot^2 x = \\text{cosec}^2 x$$.\n(Memory strategy: write each identity beside its matching derivative to bind them in memory)."},{"question":"What is the \"third letter\" memory hook for recalling the reciprocal trigonometric identities for $$\\text{cosec } A$$, $$\\sec A$$, and $$\\cot A$$?","answer":"1. Match the third letter of the reciprocal function to its base function.\n2. $$\\text{cosec } A = \\frac{1}{\\sin A}$$ (third letter 's' matches $$\\sin$$).\n3. $$\\sec A = \\frac{1}{\\cos A}$$ (third letter 'c' matches $$\\cos$$).\n4. $$\\cot A = \\frac{1}{\\tan A}$$ (third letter 't' matches $$\\tan$$)."},{"question":"What are the three forms of the double-angle identity for $$\\cos 2A$$, and what is the common order trap to avoid?","answer":"1. $$\\cos 2A = \\cos^2 A - \\sin^2 A$$\n2. $$\\cos 2A = 1 - 2\\sin^2 A$$\n3. $$\\cos 2A = 2\\cos^2 A - 1$$\nTrap: Writing $$\\sin^2 A - \\cos^2 A$$. The order matters; it must be cosine first ($$\\cos^2 A - \\sin^2 A$$). Memorise these forms rather than deriving them in the exam to save time."},{"question":"For the modulus function $$f(x) = a|x - h| + k$$, how do you find the vertex $$P$$, and what are the coordinates of its image under the transformation $$y = 3f(x - 2)$$ if $$f(x) = 2|x - 5| + 10$$?","answer":"1. The vertex of $$y = a|x - h| + k$$ is directly at $$(h, k)$$.\n2. For $$f(x) = 2|x - 5| + 10$$, the vertex $$P$$ is $$(5, 10)$$.\n3. The transformation $$y = 3f(x - 2)$$ shifts $$x$$ right by $$2$$ ($$5 \\to 7$$) and stretches $$y$$ by a factor of $$3$$ ($$10 \\to 30$$).\n4. The image $$P'$$ is $$(7, 30)$$."},{"question":"When performing polynomial long division, what are the two common formatting traps to avoid regarding subtraction and the remainder?","answer":"1. Subtraction trap: Always bracket the term you are subtracting to avoid sign errors (e.g., $$(-5x) - (-4x) = -5x + 4x = -x$$, not $$-9x$$).\n2. Remainder trap: The remainder sits alone over the divisor. Write $$\\frac{C}{x - 2}$$, not $$\\frac{(x - 2)(\\text{quotient}) + C}{x - 2}$$."},{"question":"What is the integral of $$\\frac{k}{x - a}$$, and when is it mathematically valid to drop the modulus signs in the resulting logarithm?","answer":"1. $$\\int \\frac{k}{x - a} dx = k \\ln |x - a| + c$$.\n2. The modulus signs $$|x - a|$$ must be kept during the integration step.\n3. You can only drop the modulus signs when evaluating a definite integral if you know the argument is strictly positive (e.g., $$\\ln|6| - \\ln|2| = \\ln 6 - \\ln 2$$ because $$6, 2 \u003e 0$$)."},{"question":"When expressing $$a \\sin \\theta + b \\cos \\theta$$ as $$R \\sin(\\theta + \\alpha)$$, what is the exact value trap regarding $$R$$, and how should $$R$$ be calculated?","answer":"1. Trap: Giving $$R$$ as a rounded decimal (e.g., $$R = 4.472$$). The question requires the exact value, so no decimals are allowed.\n2. Calculate $$R$$ using $$R = \\sqrt{a^2 + b^2}$$.\n3. Leave the answer in exact surd form (e.g., $$\\sqrt{20}$$ simplifies to $$2\\sqrt{5}$$)."},{"question":"When solving a trig equation like $$\\sin(2x + \\alpha) = 1$$ for the second smallest positive $$x$$, what is the critical periodicity trap to avoid?","answer":"1. Trap: Finding the first $$x$$ and then adding $$2\\pi$$ to $$x$$.\n2. Correction: The $$2\\pi$$ periodicity belongs to the *whole angle* $$(2x + \\alpha)$$, not just $$x$$.\n3. Step 1: Find all solutions for the whole angle first (e.g., $$\\frac{\\pi}{2}$$, $$\\frac{5\\pi}{2}$$).\n4. Step 2: Set $$2x + \\alpha$$ equal to these angles and rearrange to solve for $$x$$."},{"question":"In exam calculations, what is the difference between rounding to 3 significant figures (s.f.) and 3 decimal places (d.p.), and how does this apply to the value $$3.694$$?","answer":"1. Significant figures count all non-zero digits starting from the first non-zero digit. Decimal places count only the digits after the decimal point.\n2. For $$3.694$$:\n- 3 s.f. is $$3.69$$ (the first three digits are 3, 6, 9).\n- 3 d.p. is $$3.694$$ (the three digits after the decimal are 6, 9, 4).\n3. Always check whether the question asks for s.f. or d.p. to avoid losing accuracy marks."}]},"minimax_1":{"label":"MiniMax M3 · Run 1","returned_model":"minimax/minimax-m3","cards":[{"question":"For P3, what is $\\frac{d}{dx}(a^x)$ and why does the power rule fail here? State the required condition on $a$.","answer":"$\\frac{d}{dx}(a^x) = a^x \\ln a$, with $a \u003e 0$ required. The power rule $nx^{n-1}$ fails because the variable $x$ sits in the power, not the base — check where the variable is: variable in the base ⇒ power rule; variable in the power ⇒ $a^x \\ln a$."},{"question":"Differentiate $3^{2x}$ with respect to $x$, showing the chain-rule steps.","answer":"Outer is $a^u$ with $a=3$, $u=2x$:\n1. Differentiate outer: $3^{2x} \\ln 3$.\n2. Multiply by $\\frac{du}{dx}=2$.\n3. Result: $2 \\cdot 3^{2x} \\ln 3$."},{"question":"Differentiate $\\ln(x^2+3x+5)$. State the validity condition and explain the rule.","answer":"By the chain rule: $\\frac{f'(x)}{f(x)} = \\frac{2x+3}{x^2+3x+5}$, provided $x^2+3x+5 \u003e 0$ (so $\\ln$ is real). \"Differentiate the argument and put it on top.\""},{"question":"Why does $\\frac{d}{dx}(\\ln 3x) = \\frac{1}{x}$ rather than $\\frac{1}{3x}$? Show the working.","answer":"Apply $\\frac{f'(x)}{f(x)}$ with $f(x)=3x$, $f'(x)=3$:\n1. $\\frac{d}{dx}(\\ln 3x) = \\frac{3}{3x}$.\n2. The constant $3$ cancels, giving $\\frac{1}{x}$.\n\nTrap: forgetting the $f'(x)=3$ in the numerator gives the wrong $\\frac{1}{3x}$."},{"question":"Write down the derivatives of $\\sin x$, $\\cos x$, $\\tan x$, $\\operatorname{cosec} x$, $\\sec x$, $\\cot x$ in that order. What is the sign pattern?","answer":"1. $\\sin x \\to +\\cos x$\n2. $\\cos x \\to -\\sin x$\n3. $\\tan x \\to +\\sec^2 x$\n4. $\\operatorname{cosec} x \\to -\\operatorname{cosec} x \\cot x$\n5. $\\sec x \\to +\\sec x \\tan x$\n6. $\\cot x \\to -\\operatorname{cosec}^2 x$\n\nSign pattern in this order: $+ - + - + -$."},{"question":"State the three Pythagorean identities for P3. Which one is commonly confused, and what is the correction?","answer":"1. $\\sin^2 A + \\cos^2 A = 1$\n2. $1 + \\tan^2 A = \\sec^2 A$\n3. $1 + \\cot^2 A = \\operatorname{cosec}^2 A$\n\nCommon confusion: writing $1+\\tan^2 A = \\cot^2 A$. The correct pair is $\\sec^2 A$ (and its mirror $\\cot^2 A$ pairs with $\\operatorname{cosec}^2 A$)."},{"question":"Write all three forms of $\\cos 2A$ and explain the order trap.","answer":"1. $\\cos 2A = \\cos^2 A - \\sin^2 A$ (cosine first — not $\\sin^2 A - \\cos^2 A$).\n2. $\\cos 2A = 1 - 2\\sin^2 A$ (replace $\\cos^2 A$ with $1-\\sin^2 A$).\n3. $\\cos 2A = 2\\cos^2 A - 1$ (replace $\\sin^2 A$ with $1-\\cos^2 A$).\n\nMemorise all three; do not derive under exam time pressure."},{"question":"In polynomial long division of $\\frac{2x^2-5x+8}{x-2}$, what is the rule for subtracting terms and where do brackets help? Give the final form $Ax+B+\\frac{C}{x-2}$.","answer":"Always bracket the term being subtracted before combining. For the $-5x$ step: $(-5x) - (-4x) = -5x + 4x = -x$, not $-9x$. Result: $g(x) = 2x - 1 + \\frac{6}{x-2}$, so $A=2$, $B=-1$, $C=6$. The remainder $6$ sits alone over $(x-2)$."},{"question":"Express $4\\sin 2x + 2\\cos 2x$ in the form $R\\sin(2x+\\alpha)$ with $R\u003e0$. Give $R$ exactly and the matching equations.","answer":"Expand $R\\sin(2x+\\alpha) = R\\sin 2x\\cos\\alpha + R\\cos 2x\\sin\\alpha$:\n1. $R\\cos\\alpha = 4$, $R\\sin\\alpha = 2$.\n2. $R = \\sqrt{4^2+2^2} = \\sqrt{20} = 2\\sqrt{5}$ (exact — never write $4.472$).\n3. $\\tan\\alpha = \\frac{2}{4} = \\frac{1}{2}$, so $\\alpha = \\arctan\\frac{1}{2} \\approx 0.464$ rad (3 s.f.).\n\nBoth $a,b\u003e0$ fix the first-quadrant angle; $\\tan\\alpha = \\frac{b}{a}$ alone does not fix the quadrant."},{"question":"For $f(x) = 2\\sqrt{5}\\sin(2x+\\alpha) - 1$ with $\\alpha \\approx 0.464$, find the second smallest positive $x$ that gives the maximum. What is the key periodicity trap?","answer":"$\\sin(\\cdot)=1$ when its argument equals $\\frac{\\pi}{2}+2n\\pi$:\n1. First max: $2x + 0.464 = \\frac{\\pi}{2} \\Rightarrow x \\approx 0.553$.\n2. Second max: $2x + 0.464 = \\frac{5\\pi}{2} \\Rightarrow x \\approx 3.69$ (3 s.f.).\n\nTrap: do not add $2\\pi$ to $x$ after rearranging. The $2\\pi$ periodicity belongs to the angle $2x+\\alpha$; divide by $2$ only after listing all angle solutions."},{"question":"Distinguish \"3 significant figures\" from \"3 decimal places\" using the value $3.694$. Why does this matter in P3?","answer":"$3.694$ to 3 s.f. is $3.69$ (rounding the digit after the third significant figure, $4$, down). 3 d.p. would be $3.694$. P3 questions asking for 3 s.f. require s.f., not d.p. — check which is demanded."},{"question":"State the reciprocal trig identities $\\tan A$, $\\sec A$, $\\operatorname{cosec} A$, $\\cot A$ and the tutor's \"third letter\" memory hook.","answer":"$\\tan A = \\frac{\\sin A}{\\cos A}$, $\\operatorname{cosec} A = \\frac{1}{\\sin A}$, $\\sec A = \\frac{1}{\\cos A}$, $\\cot A = \\frac{1}{\\tan A}$. Memory hook: the reciprocal's name matches the third letter of the original — cosec pairs with sin, sec with cos — so each reciprocal sits under its partner in the sin, cos, tan order."}]},"minimax_2":{"label":"MiniMax M3 · Run 2","returned_model":"minimax/minimax-m3","cards":[{"question":"A student differentiates $y = 5^x$ using the power rule and writes $\\frac{dy}{dx} = 5x^4$. What is the correct derivative, and what single check distinguishes the power rule from the exponential rule for $a^x$?","answer":"$\\frac{d}{dx}(a^x) = a^x \\ln a$, so $\\frac{d}{dx}(5^x) = 5^x \\ln 5$.\n\nCheck where the variable sits: variable in the **base** → power rule; variable in the **power** → $a^x \\ln a$ (with $a \u003e 0$ constant). The derivative leaves $a^x$ unchanged and pulls down a factor of $\\ln a$. [§3.1 trap box, §7 diagnostic]"},{"question":"Differentiate $y = 3^{2x}$. State the result exactly and name the rule used.","answer":"$\\frac{dy}{dx} = 2 \\cdot 3^{2x} \\ln 3$.\n\nMethod (chain rule, the tutor §3.1): differentiate the outer exponential to get $3^{2x} \\ln 3$, then multiply by the derivative of the inner $2x$, which is $2$. General form: $\\frac{d}{dx}(a^{kx}) = k\\, a^{kx} \\ln a$. [Item #7, Status S]"},{"question":"Differentiate $y = \\ln(3x)$ and $y = 5\\ln(2x)$, simplifying fully. What is the condition on the argument for $\\ln f(x)$ to be defined?","answer":"$\\frac{d}{dx}\\ln(3x) = \\dfrac{3}{3x} = \\dfrac{1}{x}$ ; $\\dfrac{d}{dx}\\bigl(5\\ln(2x)\\bigr) = 5 \\cdot \\dfrac{2}{2x} = \\dfrac{5}{x}$.\n\nRule: $\\frac{d}{dx}\\ln f(x) = \\dfrac{f'(x)}{f(x)}$ with $f(x) \u003e 0$. The constant inside the log cancels because its derivative (the numerator) equals the constant itself. [Items #5, #11; trap §3]"},{"question":"Write the six derivatives of $\\sin x$, $\\cos x$, $\\tan x$, $\\cosec x$, $\\sec x$, $\\cot x$ in order. What is the tutor's sign-pattern memory device, and which two derivatives echo which Pythagorean identities?","answer":"| $y$ | $dy/dx$ |\n|---|---|\n| $\\sin x$ | $+\\cos x$ |\n| $\\cos x$ | $-\\sin x$ |\n| $\\tan x$ | $+\\sec^2 x$ |\n| $\\cosec x$ | $-\\cosec x \\cot x$ |\n| $\\sec x$ | $+\\sec x \\tan x$ |\n| $\\cot x$ | $-\\cosec^2 x$ |\n\nSign pattern (the tutor §4): $+, -, +, -, +, -$ in the listed order. Echoes: $\\frac{d}{dx}\\tan x = \\sec^2 x$ mirrors $1 + \\tan^2 x = \\sec^2 x$; $\\frac{d}{dx}\\cot x = -\\cosec^2 x$ mirrors $1 + \\cot^2 x = \\cosec^2 x$. [§4 table, all rows Status S]"},{"question":"State the three standard forms of $\\cos 2A$. Why does order matter, and what is the working form used in the Q4(a) rewrite of $4\\cos^2 x$?","answer":"1. $\\cos 2A = \\cos^2 A - \\sin^2 A$ (cosine first — not $\\sin^2 A - \\cos^2 A$),\n2. $\\cos 2A = 1 - 2\\sin^2 A$,\n3. $\\cos 2A = 2\\cos^2 A - 1$.\n\nOrder matters: $\\sin^2 A - \\cos^2 A$ is wrong (the learner's error §7). Form (3) rearranges to $2\\cos^2 A = \\cos 2A + 1$, giving $4\\cos^2 x = 2\\cos 2x + 2$, which was used in Q4(a) to obtain $f(x) = 4\\sin 2x + 2\\cos 2x - 1$. [§5.3, §6.4(a), Status C8–C9 S]"},{"question":"State the three Pythagorean identities, and identify the specific error a student made by writing $1 + \\tan^2 A = \\cot^2 A$.","answer":"1. $\\sin^2 A + \\cos^2 A = 1$ (master identity),\n2. $1 + \\tan^2 A = \\sec^2 A$ (NOT $\\cot^2 A$),\n3. $1 + \\cot^2 A = \\cosec^2 A$.\n\nIdentity (2) is obtained by dividing the master identity by $\\cos^2 A$; identity (3) by dividing by $\\sin^2 A$. The error $1 + \\tan^2 A = \\cot^2 A$ was corrected by the tutor in §5.2 and is the same pairing that links to $\\frac{d}{dx}\\tan x = \\sec^2 x$. [§5.2, §7 diagnostic, Status C5–C7 S]"},{"question":"Write $4\\sin 2x + 2\\cos 2x$ in the form $R\\sin(2x + \\alpha)$ with $R \u003e 0$, giving $R$ exactly and $\\alpha$ to 3 s.f. in radians. Why must $R$ be left as an exact surd?","answer":"Expand $R\\sin(2x + \\alpha) = R\\sin 2x \\cos\\alpha + R\\cos 2x \\sin\\alpha$ and match:\n- $R\\cos\\alpha = 4$, $R\\sin\\alpha = 2$ $\\Rightarrow \\tan\\alpha = \\tfrac{2}{4} = \\tfrac{1}{2}$,\n- $R^2 = 4^2 + 2^2 = 20$, so $R = \\sqrt{20} = 2\\sqrt{5}$ (exact),\n- $\\alpha = \\arctan\\!\\left(\\tfrac{1}{2}\\right) \\approx 0.464$ rad (3 s.f.).\n\n$R = 4.472$ is wrong: \"we want the exact value of $R$, not a decimal. Exact, no decimals allowed.\" [§6.4(b), §8.3, Status S]"},{"question":"For $f(x) = 2\\sqrt{5}\\sin(2x + \\alpha) - 1$, state the maximum value and the **second smallest positive** $x$ at which it is attained (using $\\alpha \\approx 0.464$). What is the periodicity trap?","answer":"Max value: sin peaks at 1, so $f_{\\max} = 2\\sqrt{5}(1) - 1 = 2\\sqrt{5} - 1$ (exact).\n\nSecond smallest positive $x$: solve for the whole **angle** first, then divide.\n- $2x + \\alpha = \\tfrac{\\pi}{2}$: $x = \\tfrac{\\pi/2 - \\alpha}{2} \\approx 0.553$.\n- $2x + \\alpha = \\tfrac{5\\pi}{2}$: $x = \\tfrac{5\\pi/2 - \\alpha}{2} \\approx 3.69$ (3 s.f.).\n\nTrap: the $2\\pi$ periodicity belongs to the angle $2x + \\alpha$ **before** you divide by 2. Adding $2\\pi$ to $x$ after rearranging is wrong. Also: 3 s.f. $\\neq$ 3 d.p.; $3.694 \\to 3.69$. [§6.4(c), §7 diagnostic, §8.3]"},{"question":"Divide $2x^2 - 5x + 8$ by $x - 2$. State the quotient and remainder, and explain the sign trap when subtracting the $-4x$ term.","answer":"Quotient $2x - 1$, remainder $6$, so\n$$g(x) = 2x - 1 + \\frac{6}{x-2}.$$\n\nSign trap: $-5x - (-4x)$ must be computed as $(-5x) - (-4x) = -5x + 4x = -x$, NOT $-9x$. Rule (the tutor): always bracket the term you subtract. The remainder must be written as $\\dfrac{6}{x-2}$, not as a further multiple of $(x-2)$ over $(x-2)$. [§6.2(a), §7 diagnostic]"},{"question":"Evaluate $\\displaystyle\\int_4^8 \\frac{6}{x-2}\\,dx$. Show how the modulus signs in the antiderivative are handled, and identify the log law used to obtain the $\\ln 3$.","answer":"Antiderivative: $\\int \\dfrac{6}{x-2}\\,dx = 6\\ln|x - 2| + c$. Drop the modulus bars because on $[4,8]$ we have $x - 2 \u003e 0$.\n\n$$\\int_4^8 \\frac{6}{x-2}\\,dx = \\bigl[6\\ln(x-2)\\bigr]_4^8 = 6\\ln 6 - 6\\ln 2 = 6(\\ln 6 - \\ln 2) = 6\\ln\\!\\left(\\tfrac{6}{2}\\right) = 6\\ln 3.$$\n\nLog law: $\\ln 6 - \\ln 2 = \\ln\\!\\left(\\tfrac{6}{2}\\right)$. (Reverse of $\\frac{d}{dx}\\ln f(x) = \\dfrac{f'(x)}{f(x)}$.) [§6.2(b), Status S]"},{"question":"A student gives the vertex of $y = 2|x - 5| + 10$ as $(5, 0)$ after substituting $x = 5$. What is the correct vertex, and what is the tutor's one-line shortcut?","answer":"Correct vertex: $P = (5, 10)$. At $x = 5$: $f(5) = 2|0| + 10 = 10$, so $y = 10$, not $0$.\n\nShortcut (the tutor §6.1): the vertex of $y = a|x - h| + k$ is directly $(h, k)$. No piecewise work needed. Status: Solved. Exam tip: if an early part is missed, carry a plausible value forward — full method marks are still available on later parts. [§6.1(a)]"},{"question":"State the domain conditions attached to (i) $\\frac{d}{dx} a^x$, (ii) $\\frac{d}{dx} \\ln f(x)$, and (iii) the trig derivative formulae in $\\S4$. Why is the radian assumption stated explicitly for (iii)?","answer":"(i) $a^x$ derivative requires $a \u003e 0$ (constant). (ii) $\\ln f(x)$ requires $f(x) \u003e 0$, otherwise $\\ln f(x)$ is not real; the rule $\\frac{f'(x)}{f(x)}$ is only valid under this condition. (iii) The six trig derivative formulae assume $x$ is in **radians**, because the rate-of-change scaling $\\frac{d}{dx}\\sin x = \\cos x$ depends on the radian measure of $x$ (otherwise $\\frac{d}{dx}\\sin x^\\circ \\neq \\cos x^\\circ$). [§3.1, §4, §8.1 conditions marked †]"}]},"deepseek_1":{"label":"DeepSeek V4 Pro","returned_model":"deepseek/deepseek-v4-pro","cards":[{"question":"How do you differentiate \\(a^x\\) (where \\(a\u003e0\\) is constant) and \\(x^n\\), and what is the key mistake students make between them?","answer":"- \\(\\frac{d}{dx}(a^x) = a^x \\ln a\\) — the variable is in the **exponent**; do not use the power rule.  \n- \\(\\frac{d}{dx}(x^n) = n x^{n-1}\\) — the variable is in the **base**.  \n- Common trap: applying the power rule to \\(a^x\\), writing \\(x a^{x-1}\\). Always check where the variable sits."},{"question":"Differentiate \\(3^{2x}\\) with respect to \\(x\\), showing the chain‑rule steps.","answer":"1. Write as \\((3^2)^x\\)? No — use chain rule on \\(a^{kx}\\).  \n2. Outer derivative: \\(\\frac{d}{du}(3^u) = 3^u \\ln 3\\) with \\(u = 2x\\).  \n3. Inner derivative: \\(\\frac{du}{dx} = 2\\).  \n4. Multiply: \\(\\frac{d}{dx}\\left(3^{2x}\\right) = 2 \\cdot 3^{2x} \\ln 3\\).  \nRule: \\(\\frac{d}{dx}a^{kx} = k\\,a^{kx}\\ln a\\)."},{"question":"Explain why \\(\\frac{d}{dx}\\ln(3x)\\) simplifies to \\(\\frac{1}{x}\\), and what error often causes students to get \\(\\frac{1}{3x}\\) instead.","answer":"- Chain rule: \\(\\frac{d}{dx}\\ln(f(x)) = \\frac{f'(x)}{f(x)}\\). Here \\(f(x)=3x\\), so \\(f'(x)=3\\).  \n- \\[\n\\frac{3}{3x} = \\frac{1}{x}.\n\\]\n- The error \\(\\frac{1}{3x}\\) comes from forgetting the numerator \\(f'(x)\\). The constant inside the log cancels out after differentiation."},{"question":"What are the derivatives of \\(\\sin x\\) and \\(\\cos x\\), and what memory pattern helps recall the signs?","answer":"- \\(\\frac{d}{dx}(\\sin x) = +\\cos x\\)  \n- \\(\\frac{d}{dx}(\\cos x) = -\\sin x\\)  \n- Sign pattern: write the six trig functions in order \\(\\sin, \\cos, \\tan, \\cosec, \\sec, \\cot\\) → their derivative signs alternate \\(+\\;-\\;+\\;-\\;+\\;-\\).  \n\\(\\sin x\\) and \\(\\cos x\\) occupy positions 1 and 2: plus then minus."},{"question":"State the derivative of \\(\\tan x\\) and show how it connects directly to the identity \\(1 + \\tan^2 x = \\sec^2 x\\).","answer":"- \\(\\frac{d}{dx}(\\tan x) = \\sec^2 x\\)  \n- Connection: the Pythagorean identity \\(1 + \\tan^2 x = \\sec^2 x\\) matches exactly the derivative. This pairing is a memory aid — the derivative of \\(\\tan x\\) is the squared reciprocal function \\(\\sec^2 x\\)."},{"question":"Give the derivative of \\(\\cot x\\) and name the Pythagorean identity it mirrors.","answer":"- \\(\\frac{d}{dx}(\\cot x) = -\\cosec^2 x\\)  \n- It mirrors \\(1 + \\cot^2 x = \\cosec^2 x\\) — just as \\(\\tan x \\rightarrow \\sec^2 x\\) links to \\(1+\\tan^2 x = \\sec^2 x\\), the pair \\(\\cot x \\rightarrow -\\cosec^2 x\\) links to the identity with the matching squared function."},{"question":"Write the derivatives of \\(\\cosec x\\) and \\(\\sec x\\). Where do they fit in the \\(+ - + - + -\\) sign pattern?","answer":"- \\(\\frac{d}{dx}(\\cosec x) = -\\cosec x \\cot x\\) (position 4 → minus)  \n- \\(\\frac{d}{dx}(\\sec x) = +\\sec x \\tan x\\) (position 5 → plus)  \nIn the ordered list \\(\\sin, \\cos, \\tan, \\cosec, \\sec, \\cot\\), the signs of their derivatives run \\(+,\\,-,\\,+,\\,-,\\,+,\\,-\\). \\(\\cosec\\) is fourth (\\(-\\)), \\(\\sec\\) is fifth (\\(+\\))."},{"question":"List the three equivalent forms of \\(\\cos 2A\\), and what order mistake do students often make when recalling the first form?","answer":"1. \\(\\cos 2A = \\cos^2 A - \\sin^2 A\\) — **cosine first**, not \\(\\sin^2 A - \\cos^2 A\\).  \n2. \\(\\cos 2A = 1 - 2\\sin^2 A\\) (replace \\(\\cos^2 A\\) by \\(1-\\sin^2 A\\))  \n3. \\(\\cos 2A = 2\\cos^2 A - 1\\) (replace \\(\\sin^2 A\\) by \\(1-\\cos^2 A\\))  \nCommon trap: writing \\(\\sin^2 A - \\cos^2 A\\); always put \\(\\cos^2 A\\) before the minus."},{"question":"To express \\(8\\sin x \\cos x + 4\\cos^2 x\\) as \\(a\\sin 2x + b\\cos 2x + c\\), which double‑angle identities are used? Give the result.","answer":"1. Use \\(\\sin 2x = 2\\sin x \\cos x\\) → \\(8\\sin x \\cos x = 4\\sin 2x\\).  \n2. Use \\(\\cos 2x = 2\\cos^2 x - 1\\) → \\(2\\cos^2 x = \\cos 2x + 1\\), so \\(4\\cos^2 x = 2\\cos 2x + 2\\).  \n3. Combine: \\(f(x) = 4\\sin 2x + (2\\cos 2x + 2) - 3 = 4\\sin 2x + 2\\cos 2x - 1\\).  \nThus \\(a=4,\\; b=2,\\; c=-1\\)."},{"question":"When writing \\(4\\sin 2x + 2\\cos 2x\\) as \\(R\\sin(2x+\\alpha)\\) with \\(R\u003e0\\), \\(0\u003c\\alpha\u003c\\frac{\\pi}{2}\\), how do you find the **exact** values of \\(R\\) and \\(\\tan\\alpha\\)? What trap must be avoided?","answer":"1. Expand: \\(R\\sin(2x+\\alpha)=R\\sin 2x\\cos\\alpha + R\\cos 2x\\sin\\alpha\\).  \n2. Compare coefficients: \\(R\\cos\\alpha = 4,\\; R\\sin\\alpha = 2\\).  \n3. \\(R = \\sqrt{4^2 + 2^2} = \\sqrt{20} = 2\\sqrt{5}\\) exactly — **not** a decimal.  \n4. \\(\\tan\\alpha = \\frac{2}{4} = \\frac{1}{2}\\), so \\(\\alpha = \\arctan(0.5) \\approx 0.464\\) rad (3 s.f.).  \nTrap: giving \\(R\\) as 4.472; the question wants the exact surd \\(2\\sqrt{5}\\)."},{"question":"Given \\(\\sin(2x + \\alpha) = 1\\), describe the steps to find the **second smallest positive** value of \\(x\\). Why must you **not** simply add \\(2\\pi\\) to the first \\(x\\)?","answer":"1. The maximum of \\(\\sin\\) occurs when the **whole angle** equals \\(\\frac{\\pi}{2} + 2n\\pi\\).  \n2. For \\(n=0\\): \\(2x + \\alpha = \\frac{\\pi}{2} \\Rightarrow x = \\frac{\\pi/2 - \\alpha}{2}\\).  \n3. For \\(n=1\\): \\(2x + \\alpha = \\frac{5\\pi}{2} \\Rightarrow x = \\frac{5\\pi/2 - \\alpha}{2}\\).  \n4. The periodicity \\(2\\pi\\) applies to the angle \\(2x+\\alpha\\), **before** dividing by 2. Adding \\(2\\pi\\) directly to \\(x\\) after rearranging ignores the factor of 2 and gives wrong solutions."},{"question":"Explain why \\(\\int \\frac{6}{x-2}\\,dx = 6\\ln|x-2| + c\\), linking it to the derivative of \\(\\ln|f(x)|\\).","answer":"- From the chain rule, \\(\\frac{d}{dx}\\ln|f(x)| = \\frac{f'(x)}{f(x)}\\).  \n- Here \\(f(x)=x-2\\), so \\(f'(x)=1\\), and \\(\\frac{d}{dx}\\ln|x-2| = \\frac{1}{x-2}\\).  \n- Therefore \\(\\int \\frac{1}{x-2}\\,dx = \\ln|x-2| + c\\), and the constant multiple gives \\(\\int \\frac{6}{x-2}\\,dx = 6\\ln|x-2| + c\\).  \n- The modulus is kept because the argument may not be positive over the whole domain; drop only when the argument is known to be positive."}]},"kimi_1":{"label":"Kimi K3","returned_model":"moonshotai/kimi-k3","cards":[{"question":"Differentiate $$a^x$$ ($$a\u003e0$$ constant). Why does the power rule not apply, and what wrong answer does misapplying it give?","answer":"1. Check where the variable is: in $$a^x$$ the variable sits in the power, not the base, so the power rule does not apply.\n2. $$\\frac{d}{dx}(a^x) = a^x \\ln a$$ — the $$a^x$$ is unchanged and a factor $$\\ln a$$ comes down.\n3. Trap (the learner's first attempt): $$x\\,a^{x-1}$$ — that is the power rule $$\\frac{d}{dx}(x^a) = a\\,x^{a-1}$$ misapplied; use it only when the variable is in the base."},{"question":"Differentiate $$a^{kx}$$ (e.g. $$3^{2x}$$), justifying each step.","answer":"1. Chain rule: differentiate the outer exponential to get $$a^{kx}\\ln a$$.\n2. Multiply by the derivative of the inner $$kx$$, which is $$k$$.\n3. Result: $$k\\,a^{kx}\\ln a$$, e.g. $$\\frac{d}{dx}(3^{2x}) = 2\\cdot 3^{2x}\\ln 3$$. the tutor's neatness convention: write the constant at the front."},{"question":"State $$\\frac{d}{dx}\\ln f(x)$$ with its validity condition, and explain why $$\\frac{d}{dx}\\ln(kx) = \\frac{1}{x}$$.","answer":"1. $$\\frac{d}{dx}\\ln f(x) = \\frac{f'(x)}{f(x)}$$ — \"differentiate the argument, that goes on top\"; valid only for $$f(x) \u003e 0$$ († spec condition).\n2. For $$\\ln(kx)$$: numerator $$f'(x) = k$$, giving $$\\frac{k}{kx} = \\frac{1}{x}$$ — the constant inside the log cancels.\n3. Trap: answering $$\\frac{1}{3x}$$ for $$\\ln 3x$$ omits the $$f'(x) = 3$$ in the numerator; once included it simplifies back to $$\\frac{1}{x}$$."},{"question":"Give the derivatives of $$\\sin x, \\cos x, \\tan x, \\cosec x, \\sec x, \\cot x$$ and the tutor's sign memory pattern.","answer":"In that order the derivatives are:\n$$\\cos x,\\quad -\\sin x,\\quad \\sec^2 x,\\quad -\\cosec x \\cot x,\\quad \\sec x \\tan x,\\quad -\\cosec^2 x$$\n1. Written in the order sin, cos, tan, cosec, sec, cot, the signs run $$+ - + - + -$$.\n2. This pattern is the tutor's remedy for the learner's wobble of dropping the minus sign on $$\\frac{d}{dx}\\cos x = -\\sin x$$.\n3. († These formulae assume $$x$$ is in radians.)"},{"question":"Which Pythagorean identities pair with the derivatives of $$\\tan x$$ and $$\\cot x$$, and what error did the learner make here?","answer":"1. $$\\frac{d}{dx}\\tan x = \\sec^2 x$$ pairs with $$1 + \\tan^2 A = \\sec^2 A$$; $$\\frac{d}{dx}\\cot x = -\\cosec^2 x$$ pairs with $$1 + \\cot^2 A = \\cosec^2 A$$. the tutor wrote each identity beside its matching derivative to bind them in memory.\n2. the learner answered $$\\cot^2 A$$ for $$1 + \\tan^2 A$$; correction: it is $$\\sec^2 A$$.\n3. Master identity: $$\\sin^2 A + \\cos^2 A = 1$$ († dividing by $$\\cos^2 A$$ or $$\\sin^2 A$$ yields the other two)."},{"question":"State the three forms of $$\\cos 2A$$, the order trap, and the rearrangement used to handle $$4\\cos^2 x$$ in Q4a.","answer":"1. $$\\cos 2A = \\cos^2 A - \\sin^2 A = 1 - 2\\sin^2 A = 2\\cos^2 A - 1$$. the tutor: memorise all three rather than deriving in the exam — deriving costs time; ideal flashcard material.\n2. Order trap: cosine first — not $$\\sin^2 A - \\cos^2 A$$ (the learner's slip).\n3. From the third form, $$2\\cos^2 A = \\cos 2A + 1$$, so $$4\\cos^2 x = 2\\cos 2x + 2$$; with $$8\\sin x\\cos x = 4\\sin 2x$$ this gave $$f(x) = 4\\sin 2x + 2\\cos 2x - 1$$."},{"question":"How do you write $$4\\sin 2x + 2\\cos 2x$$ as $$R\\sin(2x + \\alpha)$$, and why is $$\\tan\\alpha = \\frac{b}{a}$$ alone insufficient?","answer":"1. Expand $$R\\sin(2x+\\alpha) = R\\sin 2x\\cos\\alpha + R\\cos 2x\\sin\\alpha$$ and match: $$R\\cos\\alpha = 4,\\ R\\sin\\alpha = 2$$.\n2. $$R^2 = 4^2 + 2^2 = 20$$, so $$R = \\sqrt{20} = 2\\sqrt{5}$$ (give the exact surd).\n3. $$\\tan\\alpha = \\frac{2}{4}$$ does not by itself fix the quadrant (†); use the signs of $$a,b$$ — both positive here, so first quadrant, $$\\alpha = \\arctan\\frac{1}{2} \\approx 0.464$$ rad.\n4. The constant carries over: $$f(x) = 2\\sqrt{5}\\sin(2x + \\alpha) - 1$$."},{"question":"What exactness, units and rounding traps did the tutor flag in Q4 (values $$R$$, $$\\alpha$$, and 3.694)?","answer":"1. Exact means exact: $$R = 2\\sqrt{5}$$; writing the decimal $$4.472$$ loses the mark — \"exact, no decimals allowed.\"\n2. Check the demanded units and accuracy: $$\\alpha \\approx 0.464$$ is radians to 3 s.f.\n3. Significant figures are not decimal places: $$3.694$$ to 3 s.f. is $$3.69$$ (the learner's 4-s.f. answer was a trap)."},{"question":"How do you find the second smallest positive $$x$$ satisfying $$\\sin(2x + \\alpha) = 1$$ with $$\\alpha \\approx 0.464$$, and what was the headline mistake of the lesson?","answer":"1. Solve for the whole angle first (†): $$2x + \\alpha = \\frac{\\pi}{2} + 2n\\pi$$, i.e. $$\\frac{\\pi}{2}, \\frac{5\\pi}{2}, \\dots$$\n2. Then rearrange each: $$x = \\frac{\\pi/2 - 0.464}{2} \\approx 0.553$$; $$x = \\frac{5\\pi/2 - 0.464}{2} \\approx 3.69$$. Second smallest positive: $$x \\approx 3.69$$.\n3. Headline mistake: adding $$2\\pi$$ to $$x$$ after rearranging. The $$2\\pi$$ periodicity belongs to the angle $$2x + \\alpha$$ before dividing by 2 — the rearranged solutions in $$x$$ are not $$2\\pi$$ apart."},{"question":"In the division of $$2x^2 - 5x + 8$$ by $$x - 2$$, what sign error did the learner make, what is the tutor's rule, and what two methods both give the answer?","answer":"1. Error: $$-5x - (-4x)$$ computed as $$-9x$$. the tutor's rule: always bracket the term you subtract — $$(-5x) - (-4x) = -5x + 4x = -x$$.\n2. Result: $$g(x) = 2x - 1 + \\frac{6}{x-2}$$ ($$A=2, B=-1, C=6$$); the remainder 6 alone sits over $$(x-2)$$, not $$(x-2)(2x-1) + 6$$ over $$(x-2)$$.\n3. Methods: long division (the tutor's preference for speed), or multiply up $$2x^2-5x+8 \\equiv (Ax+B)(x-2)+C$$ and substitute $$x=2,0,1$$ to get $$C=6, B=-1, A=2$$. Both agree."},{"question":"How is $$\\int_4^8 \\left(2x - 1 + \\frac{6}{x-2}\\right)dx$$ shown to equal $$\\alpha + \\beta\\ln 3$$, including the log traps?","answer":"1. Key result: $$\\int \\frac{k}{x-2}\\,dx = k\\ln|x-2|$$ — the reverse of $$\\frac{d}{dx}\\ln f(x) = \\frac{f'(x)}{f(x)}$$.\n2. Integrate term by term: $$\\left[x^2 - x + 6\\ln|x-2|\\right]_4^8 = (64 - 8 + 6\\ln 6) - (16 - 4 + 6\\ln 2)$$.\n3. Simplify: $$44 + 6(\\ln 6 - \\ln 2) = 44 + 6\\ln 3$$ using the log law $$\\ln 6 - \\ln 2 = \\ln\\frac{6}{2}$$; the modulus bars drop because $$6, 2 \u003e 0$$. So $$\\alpha = 44,\\ \\beta = 6$$."},{"question":"For $$f(x) = 2|x-5| + 10$$: state the vertex shortcut, the strategy for solving $$f(x) \u003e 6x$$ without a calculator, and the image of $$P$$ under $$y = 3f(x-2)$$.","answer":"1. Vertex shortcut: $$y = a|x-h| + k$$ has vertex $$(h,k)$$, so $$P = (5,10)$$.\n2. Inequality: think graphically first to pick the correct branch — the graph is above $$6x$$ on the left branch, so solve $$6x = -2x + 20 \\Rightarrow x = \\frac{5}{2}$$, giving $$x \u003c \\frac{5}{2}$$. Calculator solutions are not acceptable — show the algebra.\n3. Transformation: $$x-2$$ shifts right 2 ($$5 \\to 7$$); the factor 3 stretches $$y$$ ($$10 \\to 30$$), so $$P' = (7, 30)$$.\n4. Exam tip the tutor stressed twice: if stuck on an early part, invent a plausible value and carry it forward — later method marks are still available."}]}},ROLES=Object.keys(DATA);let active=ROLES[0],selected={};for(const r of ROLES)selected[r]=new Set(DATA[r].cards.map((_,i)=>i));
function typeset(){const x=document.getElementById('list');if(window.MathJax&&MathJax.typesetPromise){if(MathJax.typesetClear)MathJax.typesetClear([x]);MathJax.typesetPromise([x]).catch(()=>{})}}
function tabs(){const t=document.getElementById('tabs');t.replaceChildren();for(const r of ROLES){const b=document.createElement('button');b.className='tab'+(r===active?' active':'');b.textContent=DATA[r].label+' ('+DATA[r].cards.length+')';b.onclick=()=>{active=r;tabs();render()};t.append(b)}}
function render(){const l=document.getElementById('list');l.replaceChildren();DATA[active].cards.forEach((c,i)=>{const article=document.createElement('article');article.className='card';const row=document.createElement('div');row.className='row';const pick=document.createElement('input');pick.className='pick';pick.type='checkbox';pick.checked=selected[active].has(i);pick.setAttribute('aria-label',`Select card ${i+1}`);const qw=document.createElement('div');qw.className='qwrap';const q=document.createElement('div');q.className='q';q.tabIndex=0;q.textContent=c.question;const ans=document.createElement('div');ans.className='answer';const txt=document.createElement('div');txt.textContent=c.answer;const foot=document.createElement('div');foot.className='foot';const cp=document.createElement('button');cp.className='copy';cp.textContent='Copy';cp.onclick=()=>copyText(c.question+'\t'+c.answer);foot.append(cp);ans.append(txt,foot);qw.append(q,ans);row.append(pick,qw);article.append(row);l.append(article);pick.onchange=()=>{pick.checked?selected[active].add(i):selected[active].delete(i);count()};const toggle=()=>{article.classList.toggle('open');typeset()};q.onclick=toggle;q.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle()}}});count();typeset()}
function count(){document.getElementById('count').textContent=`${selected[active].size} / ${DATA[active].cards.length} selected`}
function setall(v){selected[active]=v?new Set(DATA[active].cards.map((_,i)=>i)):new Set();render()}
function reveal(v){document.querySelectorAll('.card').forEach(x=>x.classList.toggle('open',v));typeset()}
function copyText(s){navigator.clipboard.writeText(s).then(()=>toast('Copied')).catch(()=>toast('Copy failed'))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)}
function table(){const c=DATA[active].cards.filter((_,i)=>selected[active].has(i));let s='| Question | Answer |\n| --- | --- |\n';for(const x of c)s+='| '+x.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+x.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n';copyText(s)}
addEventListener('DOMContentLoaded',()=>{tabs();render();document.getElementById('sel').onclick=()=>setall(true);document.getElementById('desel').onclick=()=>setall(false);document.getElementById('reveal').onclick=()=>reveal(true);document.getElementById('hide').onclick=()=>reveal(false);document.getElementById('table').onclick=table});</script></body></html>
