f resistance $$R$$, $$R_T \\to 0$$ (short-circuit-like).\n\nTakeaway: series stacks restrict flow; parallel branches enable flow.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "Why is the potential difference across resistors in a series circuit NOT the same, even though the current is the same? (2 steps)", "answer": "- Step 1: Current is the same because charge is conserved — the same amount of charge flows through each component per second (no junctions to split at).\n\n- Step 2: However, V = IR. If I is the same but R is different, then V must differ. Each resistor does different amounts of work on the charge (dissipating different amounts of energy per coulomb). The voltage drop represents energy loss per charge, not the amount of charge flowing.\n\nA key misconception: same I doesn't imply same V. Only I is uniform in series; V depends on R.", "source": "MiniMax ②", "_id": "minimax_2_12"}, {"question": "For a combination network (series + parallel), why must you collapse the parallel sub-circuits *first* before adding the series resistances, rather than attempting a single global formula? (3 steps)", "answer": "- Step 1: The formulas $$R_T = \\sum R$$ (series) and $$1/R_T = \\sum 1/R$$ (parallel) apply only to *pure* topologies. A combination network has neither a single global series structure nor a single global parallel structure.\n- Step 2: By collapsing each parallel sub-block into one equivalent resistor, you reduce that sub-block to a simple resistor that *is* in series with the rest. Now the whole reduced circuit is in pure series form, and you can add directly.\n- Step 3: Trying to apply one formula to the whole network treats all resistors as if they shared identical topology, which is geometrically wrong and gives nonsense answers — typically a number not even close to either the series sum or parallel reciprocal.\n\nProcedure: identify the innermost parallel sub-block → reduce to single equivalent → repeat outward → finally add the outer series resistors.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "In a series circuit with a 12 V battery and two resistors R1 = 8.0 Ω and R2 = 4.0 Ω, what is the total resistance? How do you calculate it? (2 steps)", "answer": "- Step 1: In series, resistances simply add together: $$R_{total} = R_1 + R_2$$\n- Step 2: Therefore: R_total = 8.0 Ω + 4.0 Ω = **12 Ω**. The total resistance is always greater than any individual resistance when resistors are added in series — you are making it harder for current to flow by adding more resistive material to the single path.", "source": "MiniMax ①", "_id": "minimax_1_5"}, {"question": "In a tricky combination circuit, you have an 80 Ω resistor in series with a parallel pair (20 Ω and 10 Ω). A student tries to compute $$1/R_T = 1/80 + 1/20 + 1/10$$ in one go. Why is this wrong, and what's the correct approach? (3 steps)", "answer": "- Step 1: That formula is the pure-parallel formula, which assumes *all three* resistors share the same two nodes. But the 80 Ω is in series with the rest — it doesn't share nodes with the 20 Ω and 10 Ω branches.\n- Step 2: Correct: collapse the parallel pair first. $$1/R_p = 1/20 + 1/10 = 1/20 + 2/20 = 3/20$$, so $$R_p = 20/3 \\approx 6.7\\ \\Omega$$.\n- Step 3: Now add in series: $$R_T = 80 + 6.7 \\approx 87\\ \\Omega$$. Notice how different this is from naïvely applying one formula — and it's the only correct way to honour the actual topology.\n\nTakeaway: identify *which* resistors share the same two nodes; that's the parallel block. Everything else is in series with that block.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "A current of 30 mA flows through a series circuit containing a 9.0 V battery, a diode with $$V_{\\text{diode}} = 1.5\\ \\text{V}$$, and a single resistor R. Use KVL to find the p.d. across R, and explain conceptually what units you must check. (3 steps)", "answer": "- Step 1: KVL around the loop: $$\\varepsilon = V_{\\text{diode}} + V_R$$. So $$V_R = 9.0 - 1.5 = 7.5\\ \\text{V}$$.\n- Step 2: The unit check: current was given as 30 mA = 0.030 A. If you wanted to find R, you'd use $$R = V_R/I = 7.5/0.030 = 250\\ \\Omega$$ — but only if you convert mA to A first. Plugging in \"30\" instead of \"0.030\" would give an answer 1000× too small.\n- Step 3: General rule: always convert to base SI units (A, V, Ω) before substituting into formulas. Watch out for m (10⁻³), μ (10⁻⁶), k (10³), M (10⁶).\n\nTrap: micro vs milli vs kilo prefix errors are among the most common in exams.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "A circuit has resistor C in series with a parallel pair: branch A (12 Ω, carrying 0.8 A) and branch B (carrying 1.2 A). Conceptually find $$I_C$$, $$V_A$$, and $$R_B$$. (3 steps)", "answer": "- Step 1: KCL at the junction: $$I_C = I_A + I_B = 0.8 + 1.2 = 2.0\\ \\text{A}$$. The series current C carries everything that later splits between A and B.\n- Step 2: Ohm's law on branch A: $$V_A = I_A R_A = 0.8 \\times 12 = 9.6\\ \\text{V}$$. Since A and B are in parallel, $$V_B = V_A = 9.6\\ \\text{V}$$.\n- Step 3: Ohm's law on branch B: $$R_B = V_B / I_B = 9.6 / 1.2 = 8.0\\ \\Omega$$. Sanity: B has smaller resistance than A (8 < 12), so B should carry more current — and indeed 1.2 > 0.8 ✓.\n\nStrategy tip: when total voltage is unknown, start from currents — KCL gives you the easiest entry point.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Why must you solve the parallel sub-circuit first in a combination network, rather than applying one formula to the whole circuit? (2 steps)", "answer": "- Step 1: The series and parallel resistance formulas apply to **different arrangements**. A combination circuit has resistors in **both** arrangements — there is no single formula that handles mixed topologies.\n- Step 2: By collapsing the parallel section into a single equivalent resistor, you convert the combination into a **pure series circuit**, which you can then solve with the simple series formula $$R_T = R_{series} + R_p$$. This two-step reduction is the only reliable method.\n\nAttempting to write something like $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2 + R_3}$$ in one go is error-prone and often wrong — it mixes series and parallel logic incorrectly.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "What's the difference between the rule \"current is the same\" and the rule \"voltage is the same\" — and in which circuit type does each apply?", "answer": "- Step 1: **Series circuit**: there is one path, so charge flow rate is identical everywhere → *current is the same*. Voltage, however, is shared between components because each component dissipates some energy per charge.\n- Step 2: **Parallel circuit**: all branches connect the same two nodes (points of equal potential), so the potential difference across each branch is identical → *voltage is the same*. Current, however, splits among branches according to each branch's resistance.\n- Step 3: Mnemonic: **\"Series — same I, split V; Parallel — same V, split I.\"**\n\nThese two rules are direct consequences of conservation of charge and energy respectively.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "In a series-parallel combination, how should you approach calculating unknown currents and voltages? (2 steps)", "answer": "- Step 1: Follow this strategy: (1) Identify and solve the parallel sub-circuit(s) first — find R_parallel. (2) Add series resistances to get R_total. (3) Find total current from I = V/R_total.\n\n- Step 2: Then work backwards: (4) Use series rule (same I) for series elements. (5) Use KVL to find p.d. across parallel group. (6) Use I = V/R in each parallel branch. (7) Always check with KCL and KVL.\n\nNever try to apply one formula to the whole combination at once — break it into steps.", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "A parallel circuit has a 3.0 Ω branch and an unknown branch, with 4.8 V across them. The total current from the supply is 2.4 A. Find the resistance of the unknown branch. (4 steps)", "answer": "- Step 1: Find the current through the known branch (Ohm's Law): $$I_1 = \\frac{V}{R_1} = \\frac{4.8}{3.0} = 1.6\\text{ A}$$.\n- Step 2: Find the current through the unknown branch (KCL): $$I_T = I_1 + I_2$$, so $$I_2 = I_T - I_1 = 2.4 - 1.6 = 0.8\\text{ A}$$.\n- Step 3: Find the resistance of the unknown branch (Ohm's Law): $$R_2 = \\frac{V}{I_2} = \\frac{4.8}{0.8} = 6.0\\text{ Ω}$$.\n- Step 4: Sanity check: $$R_T = \\frac{R_1 R_2}{R_1 + R_2} = \\frac{3 \\times 6}{3 + 6} = \\frac{18}{9} = 2.0\\text{ Ω}$$. Then $$I_T = V/R_T = 4.8/2.0 = 2.4\\text{ A}$$ ✓.\n\nKCL gives the unknown current, then Ohm's Law gives the unknown resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "Why is potential difference defined as energy *per unit charge* ($$V = E/Q$$) rather than just \"energy\"?", "answer": "- Step 1: We want a quantity that describes how much \"push\" the battery gives each charge carrier, independent of how *many* carriers flow. That requires normalising energy by charge.\n- Step 2: Different size batteries with the same chemistry have the same energy *per coulomb*, but deliver different total energies because they push more or fewer coulombs. The intensive quantity (per-charge) is what's physically meaningful for circuit analysis.\n- Step 3: One volt = one joule per coulomb. This per-charge definition is exactly what makes Kirchhoff's voltage law work cleanly: travel around a loop with 1 coulomb, count joules added/lost, and they must sum to zero — independent of how big the current is.\n\nThe \"per charge\" structure is what lets us think of voltage as a property of *positions* in the circuit, not of charge flows.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "Conceptually, why does the same e.m.f. drive *different* currents in different circuits, and what determines the current?", "answer": "- Step 1: E.m.f. specifies the energy per charge that the source *offers*. But how many charges actually flow per second depends on the *resistance* of the circuit they have to pass through.\n- Step 2: From Ohm's Law applied to the whole loop: $$I = \\varepsilon / R_T$$. The same $$\\varepsilon$$ pushes more current through low-$$R_T$$ circuits, less through high-$$R_T$$ circuits.\n- Step 3: Analogy: a fixed water pressure (e.m.f.) drives a faster flow through a wide pipe (low R) than through a narrow pipe (high R). The pump's push is the same; the response depends on what's downstream.\n\nThis is also why short-circuiting a battery (R → 0) draws very large currents.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "When you add another resistor in parallel to an existing parallel circuit, what happens to the total resistance, and...in terms of direction (increases or decreases), and why does this make physical sense? (2 steps)", "answer": "- Step 1: The total resistance **always decreases**. Adding another parallel branch adds another term to the right side of $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\cdots$$, making $$\\frac{1}{R_T}$$ larger, which means $$R_T$$ itself becomes smaller.\n- Step 2: Physically, adding a resistor in parallel provides an **additional path** for current to flow. Even if the new branch has a very large resistance, it still carries *some* current, so the total current from the source increases for the same voltage. More current for the same voltage means less total resistance. This is like adding another lane to a road — traffic flows more easily overall.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "Why can't you use a single \"formula for the whole circuit\" when a network mixes series and parallel, and what does it mean structurally to \"reduce\" the network?", "answer": "- Step 1: Series and parallel are *different* combination rules — they correspond to different conservation principles applied at different parts of the network. There's no single algebraic operation that captures both at once.\n- Step 2: Reduction means: identify a sub-block (a pure series chain or a pure parallel cluster), replace it with its equivalent single resistance, redraw, and repeat. You collapse the network step by step.\n- Step 3: After full reduction, the whole network is a single resistor — at which point Ohm's Law gives you total current. Then you work *backwards*, expanding the network to find currents and voltages in each original component.\n\nIt's like simplifying an algebraic expression: handle the innermost parentheses first.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "When deriving the combined resistance for series and parallel circuits, explain why you must start with different quantities (voltage vs. current) in each case. (2 steps)", "answer": "- Step 1: In **series**, voltage is the quantity that *adds up* (V_total = V1 + V2). Therefore you start with the voltage rule to derive the resistance formula.\n- Step 2: In **parallel**, current is the quantity that *adds up* (I_total = I1 + I2). Therefore you start with the current rule. If you start with the wrong quantity, you get stuck with complex fractions that don't simplify — this is the exact mistake Phuc made in the lesson (starting parallel proof with R1 + R2 instead of I1 + I2).", "source": "MiniMax ①", "_id": "minimax_1_17"}, {"question": "A student writes the equation for potential difference as $$V = \\frac{E}{t}$$. What is wrong with this, and what is the correct equation? (2 steps)", "answer": "- Step 1: The denominator should be **charge** $$Q$$, not **time** $$t$$. The correct equation is $$V = \\frac{E}{Q}$$.\n- Step 2: Potential difference measures **energy transferred per unit charge**, not per unit time. One volt = one joule per coulomb. Writing $$E/t$$ would give power (watts), not voltage — a completely different physical quantity.\n\nThis was a common exam error: confusing energy-per-charge (voltage) with energy-per-time (power).", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "In a \"find the missing value\" problem with a combination network, what's a good *order of operations* when you have partial information (some currents, some voltages, some resistances)?", "answer": "- Step 1: First, look for what you can compute *directly* using a single rule (Ohm's law on a fully-specified branch, KCL at a junction where two of three currents are known, etc.).\n- Step 2: Use those results to unlock the next layer — e.g., if you find a branch voltage, use the parallel-voltage rule to assign that voltage to other branches; if you find a junction current, use KCL elsewhere.\n- Step 3: Save the hardest unknown (e.g., a resistance buried inside the parallel section) for last, after you've propagated enough information.\n\nThe tutor's advice in the lesson: \"Start with the current in C — it's the easiest.\" Always pick the easiest move first.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Why is it physically sensible that a charge in a parallel section takes only one branch rather than splitting itself among all of them? (3 steps)", "answer": "- Step 1: Charge is carried by electrons, which are discrete particles. Each individual electron at the junction physically goes down one wire — it doesn't tear in half.\n- Step 2: What \"splits\" is the *statistical flow rate*: out of many electrons arriving per second, some go down branch L and some down branch M, in numbers set by $$I_k = V/R_k$$. The macroscopic current splits because the population of electrons distributes among the available paths.\n- Step 3: Therefore KVL for any one closed loop tracks one electron's journey through one path — that's why you don't sum $$V_L + V_M$$ in one loop, because no single electron traverses both branches.\n\nTakeaway: macroscopic current can split; an individual electron cannot.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "Write the \"product-over-sum\" shortcut formula for exactly two resistors in parallel. Under what circumstances is this formula valid, and what is its limitation? (2 steps)", "answer": "- Step 1: For exactly two parallel resistors: $$R_T = \\frac{R_1 R_2}{R_1 + R_2}$$. This is derived by combining the two reciprocal terms over a common denominator: $$\\frac{1}{R_T} = \\frac{R_1 + R_2}{R_1 R_2}$$, then inverting.\n- Step 2: This shortcut is only valid for **two** resistors in parallel. For three or more, you must use the general reciprocal method: $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\frac{1}{R_3} + \\cdots$$. There is no simple product-over-sum extension for three or more resistors. Also, remember to always take the reciprocal at the end — computing $$\\frac{1}{R_T}$$ is not the final answer; $$R_T$$ is.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "Why is KCL trivially satisfied at every point in a series circuit even though there are no branching junctions? (2 steps)", "answer": "- Step 1: In a series circuit, every cross-section of wire has exactly one wire entering and one wire leaving — there is nowhere for charge to split off.\n- Step 2: Since charge cannot accumulate in the wire (conservation of charge), the rate of charge entering any cross-section equals the rate leaving. Hence $$I_{in} = I_{out}$$ at every point, which is why the current is identical everywhere in a series loop.\n\nMisconception probe: KCL doesn't only \"activate\" at branching points — it holds everywhere; in series it just gives the trivial statement \"current in = current out\".", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "A circuit consists of a battery, a resistor R1 in series, and two resistors R2 and R3 in parallel with each other. Describe the step-by-step strategy to find all currents and voltages in this circuit. (3 steps)", "answer": "- Step 1: **Simplify the circuit.** Find the equivalent resistance of the parallel pair R2 ∥ R3. Use 1/R_parallel = 1/R2 + 1/R3.\n- Step 2: **Find total current.** Add R1 to the parallel equivalent: R_total = R1 + R_parallel. Then I_total = ε / R_total.\n- Step 3: **Work backwards to find branch values.** Since R1 is in series, the current through it is I_total. Use V = IR to find voltage across R1. Use KVL (ε − V_R1) to find voltage across the parallel section (same for both branches). Use I = V/R to find current in each parallel branch. Finally, verify KCL at the junction.", "source": "MiniMax ①", "_id": "minimax_1_18"}, {"question": "Explain why a \"junction\" only exists in a parallel circuit (or a combination network), and why series circuits don't have any.", "answer": "- Step 1: A junction is a point where three or more wires meet — that is, a point where current can split or recombine. It's a topological feature of the wiring.\n- Step 2: In a pure series circuit, every component is connected end-to-end in one loop: each node has exactly two wires (one in, one out). No splits → no junctions.\n- Step 3: As soon as you add a parallel branch, you create two junctions: one where the current splits, and one where it recombines. At each junction, KCL must be applied.\n\nKCL is still trivially \"true\" in series — but with no junctions to apply it at, it gives no new information beyond $$I = I = I = \\cdots$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "You have three 10 Ω resistors. One arrangement is all three in series (30 Ω). Another is all three in parallel (3.3 Ω). Describe the arrangement that gives approximately 15 Ω, and explain your reasoning. (2 steps)", "answer": "- Step 1: To get approximately 15 Ω, connect **two resistors in parallel** (giving 5 Ω) and then connect this combination **in series** with the third 10 Ω resistor.\n- Step 2: Two 10 Ω resistors in parallel: $$R_{\\text{parallel}} = 10/2 = 5\\;\\Omega$$. Adding the third in series: $$R_T = 5 + 10 = 15\\;\\Omega$$. This uses the fact that parallel reduces resistance (below the smallest branch) and series increases it. By combining both topologies, you can achieve intermediate values that neither pure series nor pure parallel can reach alone.", "source": "GLM 5.1 ②", "_id": "glm_2_62"}, {"question": "A resistor C is in series with a parallel pair: branch A ($$R_A = 12\\text{ Ω}$$, $$I_A = 0.8\\text{ A}$$) and branch B ($$I_B = 1.2\\text{ A}$$). Find the current through C, the p.d. across A, and the resistance of B. (4 steps)", "answer": "- Step 1: Current through C (KCL at the junction): $$I_C = I_A + I_B = 0.8 + 1.2 = 2.0\\text{ A}$$. The total current entering the parallel section must leave the series element.\n- Step 2: P.d. across A (Ohm's Law): $$V_A = I_A \\times R_A = 0.8 \\times 12 = 9.6\\text{ V}$$.\n- Step 3: P.d. across B (parallel voltage rule): $$V_B = V_A = 9.6\\text{ V}$$. Both branches share the same two nodes, so the p.d. is identical.\n- Step 4: Resistance of B (Ohm's Law): $$R_B = \\frac{V_B}{I_B} = \\frac{9.6}{1.2} = 8.0\\text{ Ω}$$. The branch with more current has less resistance, as expected.\n\nStart with KCL for current, then Ohm's Law and parallel rules for voltage and resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "Imagine you have three identical 10 Ω resistors. Describe (without drawing) the seven distinct combinations you can make using one, two, or three of them, and give the resulting resistance for each. (3 steps)", "answer": "- Step 1: One resistor alone: $$10\\ \\Omega$$. Two in series: $$20\\ \\Omega$$. Three in series: $$30\\ \\Omega$$.\n- Step 2: Two in parallel: $$10/2 = 5\\ \\Omega$$. Three in parallel: $$10/3 \\approx 3.3\\ \\Omega$$.\n- Step 3: Mixed: two in parallel ($$5\\ \\Omega$$) then in series with the third → $$5 + 10 = 15\\ \\Omega$$. Or: two in series ($$20\\ \\Omega$$) in parallel with the third → $$(20 \\times 10)/(20+10) = 200/30 \\approx 6.7\\ \\Omega$$.\n\nTotal: 10, 20, 30, 5, 3.3, 15, 6.7 Ω. Notice all the mixed ones lie *between* the pure series and pure parallel extremes.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "Three equal resistors, each of resistance $$R$$, are connected in parallel. What is the combined resistance, and what is the rule for $$n$$ equal resistors in parallel? (2 steps)", "answer": "- Step 1: $$1/R_T = 1/R + 1/R + 1/R = 3/R$$, so $$R_T = R/3$$.\n- Step 2: For $$n$$ equal resistors in parallel: $$1/R_T = n/R$$, giving $$R_T = R/n$$. Useful mental shortcut — and it confirms parallel R is always less than the smallest branch (here $$R/n < R$$).\n\nQuick check: three 6 Ω resistors in parallel → $$6/3 = 2\\ \\Omega$$.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "A learner argues: \"In a series circuit the current is the same everywhere, so by the same logic the potential difference must also be the same across every component.\" What's wrong with this reasoning? (3 steps)", "answer": "- Step 1: The reasoning conflates two different conserved quantities. Current measures *charge per unit time* — and charge is conserved, so the count of electrons passing per second cannot change along a single wire.\n- Step 2: Potential difference measures *energy per unit charge* ($$V = E/Q$$). Even though the same number of charges flow per second, each charge loses energy as it passes through a resistor, so the joules-per-coulomb decreases from one side of a resistor to the other.\n- Step 3: Conclusion: same I everywhere ≠ same V everywhere. In fact $$V = IR$$, so equal I with unequal R must give unequal V. The two quantities obey *different* conservation laws (charge for I; energy for V).\n\nTakeaway: Current is about how many; voltage is about how much energy per one.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "When solving a combination circuit problem, list the step-by-step strategy in the correct order. Why is the order important? (4 steps)", "answer": "- Step 1: **Identify and solve the parallel sub-circuit(s)** — find $$R_{\\text{parallel}}$$ using the reciprocal formula. This reduces the parallel section to a single equivalent resistor.\n- Step 2: **Add series resistances** to get $$R_T$$. Now the entire circuit is a simple series circuit.\n- Step 3: **Find total current** $$I_T = \\varepsilon / R_T$$. This is the current through the battery and any series elements.\n- Step 4: **Work backwards** — use the series current to find p.d.s across series elements ($$V = IR$$), use KVL to find the p.d. across the parallel section ($$V_p = \\varepsilon - V_{\\text{series}}$$), and use Ohm's Law in each parallel branch ($$I = V_p / R$$). Finally, check KCL (branch currents sum to total) and KVL (p.d.s sum to e.m.f.).\n\nThe order matters because you must simplify before you can calculate total current, and you need total current before you can find individual voltages and branch currents.", "source": "GLM 5.1 ①", "_id": "glm_1_36"}, {"question": "Explain KVL by tracking 1 coulomb of charge around a single closed loop with a 24 V battery and three resistors. (3 steps)", "answer": "- Step 1: At the battery, the 1 C charge **gains** 24 joules of energy ($$\\varepsilon = 24$$ V means 24 J/C).\n- Step 2: As the charge passes through the three resistors, it **loses** energy: say 4 J at $$R_1$$, 8 J at $$R_2$$, and 12 J at $$R_3$$. These correspond to $$V_1 = 4$$ V, $$V_2 = 8$$ V, $$V_3 = 12$$ V.\n- Step 3: By conservation of energy: energy gained = energy lost, so $$24 = 4 + 8 + 12$$, i.e., $$\\varepsilon = V_1 + V_2 + V_3$$. The charge returns to the battery with zero net energy — ready to gain another 24 J.\n\nKVL is simply the electrical statement that energy in = energy out around any closed loop.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "Why does a charge in a closed loop obey Kirchhoff’s Second Law even if it passes through multiple parallel branches? (2 steps)", "answer": "- Step 1: **Energy conservation**: A charge gains energy from the battery and loses it in components. The total energy gained equals total energy lost, regardless of the path.  \n- Step 2: **Path independence**: The law applies to **any closed loop**, not the entire circuit. Each parallel branch forms a separate loop with the source.\n\n[Takeaway: KVL ensures that energy changes balance in every possible loop, not just the main circuit path.]", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "Why is the combined resistance of resistors in parallel always *less than the smallest individual resistance*?", "answer": "- Step 1: Conceptually: each parallel branch provides an *additional path* for charge to flow. More paths means more total current can flow for the same voltage.\n- Step 2: Since $$R = V/I$$, increasing $$I$$ at fixed $$V$$ means lower $$R$$. So adding any branch — no matter how large its resistance — increases total current and therefore decreases total resistance.\n- Step 3: Quick sanity check: two equal resistors $$R$$ in parallel give $$R/2$$; the combined resistance halves. If you ever calculate a parallel total *larger* than the smallest branch, you've made an error (likely forgot to take the reciprocal at the end).\n\nThis is also a useful \"smell test\" for exam answers.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "Two resistors of 6 Ω and 3 Ω are in parallel. Use the product-over-sum shortcut to find the combined resistance mentally. (2 steps)", "answer": "- Step 1: For exactly **two** parallel resistors, the shortcut is: $$R_T = \\frac{R_1 R_2}{R_1 + R_2}$$. Substitute: $$R_T = \\frac{6 \\times 3}{6 + 3} = \\frac{18}{9} = 2$$ Ω.\n- Step 2: Quick sanity check: the result (2 Ω) is less than the smallest branch (3 Ω) ✓. Also, the two branch resistances are in a 2:1 ratio, and the result (2 Ω) is one-third of the smaller resistance — consistent with two unequal paths sharing the load.\n\nThe product-over-sum formula only works for exactly two parallel resistors. For three or more, use the reciprocal method.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "A series circuit has a $$4\\ \\Omega$$ and a $$12\\ \\Omega$$ resistor across a 6 V supply. Without long arithmetic, work out the ratio of p.d.s across the two resistors and check that they sum to 6 V. (3 steps)", "answer": "- Step 1: Same current through both (series), so $$V_k = I R_k$$ — voltages are in the ratio of resistances. $$V_1 : V_2 = 4 : 12 = 1 : 3$$.\n- Step 2: So the 4 Ω takes 1/4 of the supply and the 12 Ω takes 3/4: $$V_1 = 6/4 = 1.5\\ \\text{V}$$, $$V_2 = 3 \\times 1.5 = 4.5\\ \\text{V}$$.\n- Step 3: KVL check: $$1.5 + 4.5 = 6.0\\ \\text{V}$$ ✓. Energy per coulomb gained at the battery (6 J) equals total dissipated (1.5 + 4.5 J).\n\nTakeaway: in series the p.d. distributes in proportion to R — this is the basis of the potential divider.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "A student has a combination circuit with an 80 Ω resistor in series with a parallel pair of 20 Ω and 10 Ω. They write $$\\frac{1}{R_T} = \\frac{1}{80} + \\frac{1}{20} + \\frac{1}{10}$$. What is wrong with this approach, and what is the correct first step? (2 steps)", "answer": "- Step 1: The student has applied the parallel formula to **all three resistors**, including the 80 Ω series resistor. But the 80 Ω resistor is not in parallel with the 20 Ω and 10 Ω — it is in series with the parallel pair. The parallel formula requires the same p.d. across all resistors, which is not true for the 80 Ω resistor.\n- Step 2: The correct first step is to solve the parallel sub-circuit alone: $$\\frac{1}{R_p} = \\frac{1}{20} + \\frac{1}{10} = \\frac{3}{20}$$, so $$R_p ≈ 6.7\\text{ Ω}$$. Then add the series resistor: $$R_T = 80 + 6.7 ≈ 86.7\\text{ Ω}$$. Never mix series and parallel resistors in one formula.\n\nIsolate the parallel sub-circuit first. The 80 Ω resistor is separate — it joins later.", "source": "GLM 5.1 ①", "_id": "glm_1_40"}, {"question": "In a parallel circuit with a 12 V source and two resistors $$R_1 = 4\\text{ Ω}$$ and $$R_2 = 8\\text{ Ω}$$, qualitatively: which resistor carries more current, and why? (2 steps)", "answer": "- Step 1: In parallel, the p.d. is the same (12 V) across both resistors. By Ohm's Law ($$I = V/R$$), the current through each resistor is inversely proportional to its resistance since $$V$$ is the same: $$I_1 = V/R_1$$ and $$I_2 = V/R_2$$.\n- Step 2: Since $$R_1 = 4\\text{ Ω} < R_2 = 8\\text{ Ω}$$, and the voltage is the same, $$I_1 > I_2$$. The smaller resistor offers less opposition, so more current flows through it. Specifically, $$R_1$$ is half of $$R_2$$, so $$I_1$$ is twice $$I_2$$: 3 A through $$R_1$$ and 1.5 A through $$R_2$$.\n\nIn parallel, the smaller resistor carries more current — same voltage, so $$I \\propto 1/R$$.", "source": "GLM 5.1 ①", "_id": "glm_1_22"}, {"question": "Given a **combination circuit** with a series resistor $ R_1 = 6\\,\\Omega $ and a parallel pair $ R_2 = 3\\,\\Omega \\parallel R_3 = 6\\,\\Omega $, rank the currents $ I_1, I_2, I_3 $ through each resistor. (3 steps)", "answer": "- Step 1: **Calculate $ R_{\\text{parallel}} $**: $ \\frac{1}{R_{23}} = \\frac{1}{3} + \\frac{1}{6} = \\frac{1}{2} \\Rightarrow R_{23} = 2\\,\\Omega $.  \n- Step 2: **Total resistance**: $ R_{\\text{total}} = R_1 + R_{23} = 6 + 2 = 8\\,\\Omega $.  \n- Step 3: **Currents**:  \n+ $ I_1 = I_{\\text{total}} = \\frac{\\varepsilon}{R_{\\text{total}}} $ (same as series current).  \n+ $ I_2 = \\frac{V_{23}}{R_2} = \\frac{I_1 R_{23}}{R_2} = \\frac{I_1 \\cdot 2}{3} \\approx 0.67 I_1 $.  \n+ $ I_3 = \\frac{V_{23}}{R_3} = \\frac{I_1 \\cdot 2}{6} \\approx 0.33 I_1 $.  \n**Ranking**: $ I_1 > I_2 > I_3 $.\n\n[Takeaway: Series resistor carries the highest current, while parallel branch currents depend on individual resistances.]", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "Three identical 10 Ω resistors can be arranged in seven distinct circuits (singly, in series, in parallel, and mixed). Pick the two extremes — all-series and all-parallel — and compute the resulting resistance. Then describe what intermediate arrangements would give.", "answer": "- Step 1: **All three in series**: $$R_T = 10 + 10 + 10 = 30$$ Ω. This is the maximum.\n- Step 2: **All three in parallel**: $$1/R_T = 3/10$$, so $$R_T = 10/3 \\approx 3.3$$ Ω. This is the minimum.\n- Step 3: **Intermediate arrangements** lie between these two extremes:\n+ Two in parallel (5 Ω) then in series with the third → $$5 + 10 = 15$$ Ω.\n+ Two in series (20 Ω) then in parallel with the third → $$\\dfrac{20 \\times 10}{20 + 10} = 6.7$$ Ω.\n\nThe general principle: more parallelism → lower $$R_T$$; more seriality → higher $$R_T$$.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "A 8.0 Ω resistor is in series with a parallel combination of 3.0 Ω and 6.0 Ω, across a 12.0 V battery. Find the total current from the battery — explain the reasoning, not just the arithmetic. (3 steps)", "answer": "- Step 1: Collapse the parallel pair first. For 3.0 Ω ∥ 6.0 Ω: $$\\dfrac{1}{R_p} = \\dfrac{1}{3} + \\dfrac{1}{6} = \\dfrac{3}{6} = \\dfrac{1}{2}$$, so $$R_p = 2.0$$ Ω. (Sanity check: this is less than the smaller branch, 3.0 Ω ✓.)\n- Step 2: Add the series resistor: $$R_T = 8.0 + 2.0 = 10.0$$ Ω.\n- Step 3: Apply Ohm's Law to the whole circuit: $$I_T = \\varepsilon / R_T = 12.0 / 10.0 = 1.2$$ A.\n\nThis is the current through the 8.0 Ω resistor (and the supply); it will split between the 3.0 Ω and 6.0 Ω branches in inverse proportion to their resistances.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "A student claims: \"Kirchhoff's First Law only applies to parallel circuits because series circuits don't have junctions.\" Why is this reasoning flawed? Explain what happens when you apply KCL to a series circuit. (3 steps)", "answer": "- Step 1: KCL is a consequence of **conservation of charge**, which is a universal principle — it holds everywhere, in every circuit, at every point. It is not a rule that \"switches on\" only at junctions in parallel circuits.\n- Step 2: In a series circuit, there are no branch junctions, so KCL is **trivially satisfied** at every point. At any cross-section of the wire, the current in equals the current out: $$I_{\\text{in}} = I_{\\text{out}}$$. Since there's only one path, the current is the same everywhere: $$I_1 = I_2 = I_3$$.\n- Step 3: The misconception is treating KCL as a \"parallel circuit rule.\" KCL doesn't care about topology. It says: charge cannot accumulate. In series, this simply means the same current flows through every component. In parallel, it means the current splits at the branch point. Either way, the law holds.\n\nKCL is always true — it's a charge rule, not a topology rule.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "When deriving the series resistance formula, why does the factor of $$I$$ cancel cleanly, but in the parallel derivation it's the factor of $$V$$ that cancels? What does this tell you about which quantity is \"the same\" in each topology? (3 steps)", "answer": "- Step 1: In series, $$I$$ is the *same* through every resistor (KCL trivially), so when you write $$V_T = V_1 + V_2$$ as $$IR_T = IR_1 + IR_2$$, the common factor I is shared by every term and divides out.\n- Step 2: In parallel, $$V$$ is the *same* across every branch, so when you write $$I_T = I_1 + I_2$$ as $$V/R_T = V/R_1 + V/R_2$$, the common factor V is shared by every term and divides out.\n- Step 3: The \"what cancels\" tells you what's common to all components. The derivation structure mirrors the physics: the shared quantity is the one that survives as a common factor and divides away.\n\nMeta-insight: the algebra is just bookkeeping for the physical sameness — different topology, different shared quantity, different cancellation.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "A student attempts to derive the parallel resistance formula by starting with R_total = R1 + R2 and substituting V = IR. Explain why this approach fails and what the correct starting point should be. (2 steps)", "answer": "- Step 1: Starting with R1 + R2 is the series approach — it's the wrong fundamental principle. You end up with (V₁/I₁ + V₂/I₂), which becomes a messy fraction that doesn't simplify to the parallel formula.\n- Step 2: The correct approach is to start with the quantity that **adds up** in parallel: **current**. Start with I_total = I1 + I2, then substitute I = V/R. This is exactly what Phuc learned in the lesson — choosing the right starting principle is essential for the derivation to work.", "source": "MiniMax ①", "_id": "minimax_1_42"}, {"question": "When solving a combination network (some resistors in series, some in parallel), what is the correct two-step strategy and why does applying \"one formula to the whole thing\" fail? (3 steps)", "answer": "- Step 1: **Step A: collapse the parallel section first.** Compute the equivalent resistance of any parallel sub-block using $$1/R_p = 1/R_1 + 1/R_2 + \\cdots$$.\n- Step 2: **Step B: add series resistances.** Replace the parallel block with its equivalent single resistor, then sum it with the series elements: $$R_T = R_{series} + R_p$$.\n- Step 3: A single formula can't describe the whole circuit because the topology mixes two different rules (current-splitting and voltage-splitting). Trying $$1/R_T = 1/R_1 + 1/R_2 + \\cdots$$ across all resistors would falsely treat series resistors as if they were in parallel.\n\nAlways identify the sub-blocks first, then combine them outward.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Explain why a \"parallel resistance is always less than the smallest branch\" rule does not contradict energy conservation, even though adding more resistors seems like it should add more resistance. (3 steps)", "answer": "- Step 1: Energy conservation governs how much *power* the source must deliver, not the value of the combined resistance. Adding a parallel branch keeps the voltage the same but opens up another path, so more current flows from the source.\n- Step 2: More current at the same voltage means the source delivers more power ($$P = VI$$), and the new branch dissipates additional power — energy is still conserved (source power = sum of all branch powers).\n- Step 3: The combined resistance $$R_T = V/I_T$$ drops because $$I_T$$ went up while $$V$$ stayed fixed. Mathematically the source now \"sees\" an easier load. No conservation law is violated; we just gave charge more routes.\n\nIntuition: more lanes on a motorway means more cars get through per second — total resistance to flow drops.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "Conceptually, why does the proof of the series resistance rule \"feel similar\" to the proof of the parallel resistance rule, even though one gives addition and the other gives reciprocal addition? (3 steps)", "answer": "- Step 1: Both proofs follow the same skeleton: (i) start from the conservation law that gives an *additive* equation, (ii) substitute Ohm's law to inject R, (iii) use the topology rule that gives a *shared* quantity, (iv) cancel and rearrange.\n- Step 2: In series, energy adds (KVL): $$V_T = V_1 + V_2$$, with shared I. Substituting and cancelling I gives a sum of R's.\n- Step 3: In parallel, charge adds (KCL): $$I_T = I_1 + I_2$$, with shared V. Substituting and cancelling V gives a sum of (1/R)'s because Ohm's law was inverted to express current ($$I = V/R$$).\n\nThe reciprocal in the parallel formula comes from the fact that we needed to write I in terms of V — which puts R in the *denominator*.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "When deriving the combined resistance for a parallel circuit, why must you start with I_total = I₁ + I₂ rather than starting with R = R₁ + R₂? (2 steps)", "answer": "- Step 1: In parallel circuits, current is what adds up (charges split at junctions). Starting with R = R₁ + R₂ applies to series, not parallel.\n\n- Step 2: If you start with the series approach in a parallel problem, you get a complex fraction (V₁I₂ + V₂I₁)/(I₁I₂) and get stuck. The proof must start from the conservation principle relevant to that circuit type: charge conservation → current rules; energy conservation → voltage rules.\n\nThis is the \"proof starting-point rule\" — always start with the quantity that actually adds in that configuration.", "source": "MiniMax ②", "_id": "minimax_2_22"}, {"question": "In the \"Charlie the Coulomb\" picture, why is the battery called a \"filling station\" and why does Charlie end with 0 J/C after completing the loop? Connect this to KVL. (2 steps)", "answer": "- Step 1: The battery is a \"filling station\" because it *supplies* energy to each coulomb of charge. The e.m.f. $$\\varepsilon$$ is the energy gained per charge: if $$\\varepsilon = 100$$ V, Charlie gains 100 J/C. This is the only place where Charlie's energy per charge increases.\n- Step 2: Charlie ends with 0 J/C because every joule gained at the battery is transferred to the components (resistors, bulbs, etc.) around the circuit. By conservation of energy (KVL): energy gained = energy lost. $$\\varepsilon = \\sum V_{\\text{drops}}$$. If Charlie returned with energy remaining, it would mean energy was not fully accounted for; if Charlie needed more, energy would have been created. Both violate conservation of energy.", "source": "GLM 5.1 ②", "_id": "glm_2_64"}, {"question": "Alex's framework says: \"Conservation of Charge → start with current; Conservation of Energy → start with voltage.\" When deriving the series resistance formula, which do you start with, and why? (2 steps)", "answer": "- Step 1: For the **series** derivation, you start with **voltage** ($$V_T = V_1 + V_2$$), which comes from **conservation of energy** (KVL). In a series circuit, voltage is the quantity that is shared/split across components — it adds up.\n- Step 2: You would *not* start with current ($$I_T = I_1 + I_2$$) because in series, current doesn't add — it's the same everywhere. Starting with the current equation would give you nothing to work with (it just says $$I = I$$). The framework: **series → voltage adds → start with KVL**; **parallel → current adds → start with KCL**.\n\nMatch your starting equation to the quantity that actually adds up in that circuit type.", "source": "GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "Why is the total resistance of a parallel combination always **less** than the smallest individual branch resistance? Explain using the physical idea of current paths. (3 steps)", "answer": "- Step 1: Adding a resistor in parallel creates an **additional path** for current to flow. More paths means more total current can flow for the same applied voltage.\n- Step 2: Since $$R_T = \\frac{V}{I_T}$$, and the total current $$I_T$$ is now larger (because there are more branches carrying current), the total resistance must be **smaller**. More current for the same voltage → less resistance.\n- Step 3: Even a very large resistor added in parallel provides *some* extra current path, so $$R_T$$ always decreases. The limiting case: if you add a resistor with infinite resistance (an open circuit / no branch), $$R_T$$ stays the same. But any finite parallel resistor reduces $$R_T$$ below the smallest existing branch value.\n\nMore paths = more current = less total resistance. Always.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "Why is the combined resistance of any parallel network always less than the smallest individual branch resistance? (3 steps)", "answer": "- Step 1: Adding a branch in parallel gives charge another path to flow through, so for the same applied voltage more total current flows.\n- Step 2: From $$R = V/I$$, increasing $$I$$ at fixed $$V$$ must decrease the effective $$R$$.\n- Step 3: Mathematically: $$1/R_T = 1/R_1 + 1/R_2 + \\cdots$$. Since each term is positive, $$1/R_T$$ is strictly larger than any single $$1/R_k$$, so $$R_T < R_k$$ for every branch — in particular smaller than the smallest.\n\nEdge case: Two equal resistors $$R$$ in parallel give $$R/2$$; three equal $$R$$s give $$R/3$$; n equal $$R$$s give $$R/n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "A combination circuit has $$R_1 = 8\\text{ Ω}$$ in series with a parallel pair $$R_2 = 3\\text{ Ω}$$ and $$R_3 = 6\\text{ Ω}$$, powered by a 12 V battery. The total current is 1.2 A. Verify that the power delivered by the battery equals the total power dissipated in the resistors. (3 steps)", "answer": "- Step 1: Power delivered by the battery: $$P_{\\text{battery}} = \\varepsilon \\times I_T = 12 \\times 1.2 = 14.4\\text{ W}$$.\n- Step 2: Power dissipated in each resistor: $$P_1 = I_T^2 \\times R_1 = 1.2^2 \\times 8 = 11.52\\text{ W}$$. For the parallel section: $$I_2 = 0.80\\text{ A}$$, $$I_3 = 0.40\\text{ A}$$, so $$P_2 = I_2^2 \\times R_2 = 0.80^2 \\times 3 = 1.92\\text{ W}$$ and $$P_3 = I_3^2 \\times R_3 = 0.40^2 \\times 6 = 0.96\\text{ W}$$.\n- Step 3: Total dissipated: $$11.52 + 1.92 + 0.96 = 14.4\\text{ W} = P_{\\text{battery}}$$ ✓. Conservation of energy: all electrical energy supplied by the battery is converted to heat in the resistors. This is a powerful check.\n\nPower in = power out. Conservation of energy expressed as power balance.", "source": "GLM 5.1 ①", "_id": "glm_1_52"}, {"question": "Why can you never have a situation where adding a resistor in parallel *increases* the total resistance? Explain using the concept of conductance ($$1/R$$). (2 steps)", "answer": "- Step 1: In parallel, conductances add: $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\cdots$$. Each additional parallel branch adds a *positive* conductance term ($$\\frac{1}{R_k} > 0$$ for any resistor), so the total conductance always increases.\n- Step 2: Since conductance is the reciprocal of resistance, an increase in total conductance means a *decrease* in total resistance. There is no way to add a positive conductance and get a smaller total conductance. Even adding a very large resistor (tiny conductance) still increases the total conductance slightly, reducing $$R_T$$ slightly. This is why parallel resistance is always less than the smallest branch — you are adding conductance, not resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_59"}, {"question": "A resistor is in a circuit and current flows through it. Does the resistor \"use up\" or \"store\" any of the charge that enters it? What actually changes as charge passes through, and why? (3 steps)", "answer": "- Step 1: No — the resistor does not consume, store, or destroy any charge. Charge (electrons) is a conserved physical quantity; it cannot be created or destroyed. Every electron that enters the resistor exits the other side.\n- Step 2: What *does* change is the **energy per unit charge** — the potential difference. As charge flows through the resistor, electrical energy is converted to thermal energy (heating). The charge itself is unchanged; only the energy it carries decreases.\n- Step 3: This is precisely why current is the same everywhere in a series circuit (charge is conserved — same number of electrons per second at every point) while potential difference *drops* across each component (energy is dissipated). The two conservation laws govern different quantities: charge conservation → constant current; energy conservation → shared voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "Electric current is defined as the rate of flow of charge. What is the equation linking current, charge, and time, and why does this definition imply that current can never simply \"disappear\" at a point in a circuit? (3 steps)", "answer": "- Step 1: The equation is $$I = \\frac{Q}{t}$$, where $$I$$ is current in amperes (A), $$Q$$ is charge in coulombs (C), and $$t$$ is time in seconds (s). This says current is the amount of charge passing a point per unit time.\n- Step 2: Charge is carried by physical particles — electrons in a metal wire. These are real, countable objects. They cannot be created or destroyed in ordinary circuit processes (conservation of charge). Since $$I = Q/t$$, if charge can't vanish, then the *rate of charge flow* (current) can't vanish either.\n- Step 3: Therefore, at any point in a circuit, whatever charge flows in must flow out. If 1 C/s arrives at a point, 1 C/s must leave. This is the physical intuition behind Kirchhoff's First Law — it is not a rule about circuit topology, but a consequence of charge being a conserved quantity.\n\nCurrent is the *flow* of conserved stuff — so the flow can't just stop or disappear.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A student says: \"Charge is used up when it goes through a resistor — that's why the voltage drops.\" Is this statement correct? Explain what actually happens to charge and to energy at a resistor. (3 steps)", "answer": "- Step 1: The statement is **incorrect** about charge being \"used up.\" Charge (electrons) is a conserved, physical thing. Electrons flow *through* the resistor and out the other side. The number of electrons entering equals the number leaving — none are stored, consumed, or destroyed.\n- Step 2: What *does* change at a resistor is the **energy per unit charge** — the potential difference. The resistor converts electrical energy into thermal energy (heat). Each coulomb arrives with more energy than it leaves with, but the *charge itself* is unchanged.\n- Step 3: This is exactly why, in a series circuit, current is the same everywhere (charge conserved) but potential difference is not (energy is dissipated at each component). The \"Charlie the Coulomb\" analogy captures this: Charlie loses energy at each resistor, but Charlie himself is still there — same charge, less energy.\n\nCharge is conserved; energy is transferred. Don't confuse the two.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "State Kirchhoff's First Law in both words and equation form, and name the fundamental conservation principle it expresses. (2 steps)", "answer": "- Step 1: In words: At any junction in a circuit, the sum of the currents entering the junction equals the sum of the currents leaving the junction. In equation form: $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$\n- Step 2: This law is a direct consequence of **conservation of charge**. Charge cannot be created or destroyed, so every coulomb that arrives at a junction must leave by some route. No charge can pile up at a junction — it must flow continuously.\n\nKCL is a statement about charge, not about circuit type.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "A student claims: \"Kirchhoff's First Law only applies to parallel circuits because series circuits don't have junctions.\" Why is this reasoning flawed? Explain what happens when you apply KCL to a series circuit. (3 steps)", "answer": "- Step 1: KCL is a consequence of **conservation of charge**, which is a universal principle — it holds everywhere, in every circuit, at every point. It is not a rule that \"switches on\" only at junctions in parallel circuits.\n- Step 2: In a series circuit, there are no branch junctions, so KCL is **trivially satisfied** at every point. At any cross-section of the wire, the current in equals the current out: $$I_{\\text{in}} = I_{\\text{out}}$$. Since there's only one path, the current is the same everywhere: $$I_1 = I_2 = I_3$$.\n- Step 3: The misconception is treating KCL as a \"parallel circuit rule.\" KCL doesn't care about topology. It says: charge cannot accumulate. In series, this simply means the same current flows through every component. In parallel, it means the current splits at the branch point. Either way, the law holds.\n\nKCL is always true — it's a charge rule, not a topology rule.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "A junction has two wires carrying current in: $$I_1 = 0.35\\text{ A}$$ and $$I_2 = 0.15\\text{ A}$$. One wire carries current out. What is the current in the outgoing wire, and which law determines this? (2 steps)", "answer": "- Step 1: By Kirchhoff's First Law (conservation of charge): $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$. So $$I_{\\text{out}} = I_1 + I_2 = 0.35 + 0.15 = 0.50\\text{ A}$$.\n- Step 2: This is determined by KCL, which expresses conservation of charge. Every coulomb arriving at the junction must leave — charge cannot accumulate. The 0.50 C/s entering must exit as 0.50 C/s.\n\nKCL gives you the outgoing current directly from the incoming currents.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Potential difference is defined as \"energy transferred per unit charge.\" Write the equation for this. A student once wrote $$V = E/t$$ instead — why is this wrong, and what does their version actually calculate? (3 steps)", "answer": "- Step 1: The correct equation is $$V = \\frac{E}{Q}$$, where $$V$$ is potential difference in volts (V), $$E$$ is energy transferred in joules (J), and $$Q$$ is charge in coulombs (C). One volt = one joule per coulomb.\n- Step 2: The student's version $$V = \\frac{E}{t}$$ has the wrong denominator — it uses time instead of charge. This equation does not give potential difference; instead, $$\\frac{E}{t}$$ is **power** ($$P$$), the rate of energy transfer, measured in watts (W).\n- Step 3: The unit check reveals the error: $$V = E/Q$$ gives units of J/C = V (correct). But $$E/t$$ gives units of J/s = W (watts, not volts). If you write $$R = V/I$$, the units are V/A = Ω (correct). But $$R = VI$$ gives V·A = W (watts, not ohms). Always check units to catch these inversions.\n\n$$V = E/Q$$ (energy per charge), not $$E/t$$ (energy per time = power).", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "In the \"Charlie the Coulomb\" analogy, a charge carrier gains 100 J of energy per coulomb at the battery, then loses 60 J/C at the first resistor. How much energy per coulomb does Charlie have left after the first resistor, and what does this imply about the p.d. across the second resistor? (3 steps)", "answer": "- Step 1: Charlie starts with 100 J/C (the e.m.f. = 100 V). After the first resistor, 60 J/C is transferred to heat, so Charlie has $$100 - 60 = 40\\text{ J/C}$$ remaining.\n- Step 2: The remaining 40 J/C must be fully transferred at the second resistor (assuming a simple two-resistor series circuit). By conservation of energy, everything gained must be given out: 60 + 40 = 100 J/C total.\n- Step 3: Therefore, the p.d. across the second resistor is 40 V (since $$V = E/Q = 40\\text{ J}/1\\text{ C}$$). The p.d.s sum to the e.m.f.: $$V_1 + V_2 = 60 + 40 = 100\\text{ V} = \\varepsilon$$. This is Kirchhoff's Second Law in action.\n\nCharlie's energy always returns to zero at the end of the loop — conservation of energy.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "State Kirchhoff's Second Law in both words and equation form, and name the fundamental conservation principle it expresses. (2 steps)", "answer": "- Step 1: In words: Around any closed loop in a circuit, the sum of the e.m.f.s equals the sum of the potential differences (voltage drops). In equation form: $$\\sum \\varepsilon = \\sum IR$$ around any closed loop.\n- Step 2: This law is a direct consequence of **conservation of energy**. A charge going around a complete loop gains energy from the source(s) and loses energy at the resistors. Since energy cannot be created or destroyed, the total energy gained must equal the total energy lost. The charge returns to its starting point with no net energy change.\n\nKVL is a statement about energy, not about circuit type.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "A circuit has a 9.0 V source, a resistor K in series, and then a parallel pair L and M. The p.d. across the parallel section is 2.0 V. A student calculates the total as $$V_K + V_L + V_M = 7.0 + 2.0 + 2.0 = 11.0\\text{ V}$$ and says this violates KVL. Explain why this calculation is wrong and what the correct KVL check is. (3 steps)", "answer": "- Step 1: The student is **double-counting** the parallel branches. In a parallel section, a single charge carrier travels through L *or* M — not both. The 2.0 V is the same p.d. across both branches simultaneously; it is not experienced twice by any single charge.\n- Step 2: KVL applies to a **single closed loop**. One valid loop goes: source → K → L → back to source. In this loop: $$\\varepsilon = V_K + V_L = 7.0 + 2.0 = 9.0\\text{ V}$$. Another valid loop goes: source → K → M → back to source. In this loop: $$\\varepsilon = V_K + V_M = 7.0 + 2.0 = 9.0\\text{ V}$$. Both check out.\n- Step 3: The error was treating the parallel section as if a charge goes through both L and M. It doesn't. Any single path through the circuit gives $$7 + 2 = 9\\text{ V} = \\varepsilon$$. KVL is satisfied for each independent loop.\n\nA charge takes one branch only — never add parallel voltages together.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "In a parallel circuit with two branches, each branch has the same p.d. across it. Why must this be true, considering how the branches are physically connected? (2 steps)", "answer": "- Step 1: In a parallel circuit, all branches are connected between the **same two nodes** (junction points). Both ends of every branch are at the same electrical potential because they share the same connection points.\n- Step 2: Since potential difference is the difference in potential between two points, and all branches span the same two points, the p.d. across every branch must be identical: $$V_1 = V_2 = V_3 = V$$. This is a geometric/topological fact about parallel connections, not a separate law.\n\nSame two nodes → same voltage. It's that simple.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "For a series circuit with two resistors, state the rules for (a) current and (b) potential difference. Then explain which conservation law underpins each rule. (3 steps)", "answer": "- Step 1: (a) Current rule: The current is the same everywhere in a series circuit. $$I_1 = I_2 = I$$. This is a consequence of **conservation of charge** (KCL) — with only one path, charge cannot accumulate anywhere, so the flow rate is identical at every point.\n- Step 2: (b) Potential difference rule: The p.d.s add up. $$V_{\\text{total}} = V_1 + V_2$$. This is a consequence of **conservation of energy** (KVL) — the energy gained per charge at the source must equal the total energy lost per charge at the resistors.\n- Step 3: The key mnemonic: In series, **same I** (charge conserved), **shared V** (energy conserved). When you derive the series resistance formula, you start from the voltage rule because that's the quantity that adds up.\n\nSeries: same I, add V. I from charge conservation, V from energy conservation.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "For a parallel circuit with two branches, state the rules for (a) current and (b) potential difference. Then explain which conservation law underpins each rule. (3 steps)", "answer": "- Step 1: (a) Current rule: The total current splits at the junction. $$I_{\\text{total}} = I_1 + I_2$$. This is a consequence of **conservation of charge** (KCL) — every coulomb arriving at the junction must leave through one of the branches; charge cannot pile up.\n- Step 2: (b) Potential difference rule: The p.d. is the same across every branch. $$V_1 = V_2 = V$$. This is a consequence of the **shared-node geometry** of parallel circuits, which is consistent with **conservation of energy** (KVL) — each loop independently satisfies $$\\varepsilon = V_{\\text{branch}}$$ (plus any series elements).\n- Step 3: The key mnemonic: In parallel, **same V** (shared nodes / energy), **split I** (charge conservation). When you derive the parallel resistance formula, you start from the current rule because that's the quantity that adds up.\n\nParallel: same V, split I. I from charge conservation, V from shared nodes.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Derive the formula $$R_T = R_1 + R_2$$ for two resistors in series, starting from the appropriate conservation law. Show every step. (4 steps)", "answer": "- Step 1: Start with the quantity that adds up in series — **voltage** (conservation of energy / KVL): $$V_T = V_1 + V_2$$\n- Step 2: Apply Ohm's Law ($$V = IR$$) to each term: $$I_T R_T = I_1 R_1 + I_2 R_2$$\n- Step 3: Apply the series current rule (current is the same everywhere): $$I_T = I_1 = I_2 = I$$. Substitute: $$I R_T = I R_1 + I R_2$$\n- Step 4: Cancel the common factor $$I$$ from all terms: $$R_T = R_1 + R_2$$\n\nThe proof starts from KVL (voltage adds) because in series, voltage is the shared-and-split quantity.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Derive the formula $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$ for two resistors in parallel, starting from the appropriate conservation law. Show every step. (4 steps)", "answer": "- Step 1: Start with the quantity that adds up in parallel — **current** (conservation of charge / KCL): $$I_T = I_1 + I_2$$\n- Step 2: Apply Ohm's Law in the form $$I = \\frac{V}{R}$$ to each term: $$\\frac{V_T}{R_T} = \\frac{V_1}{R_1} + \\frac{V_2}{R_2}$$\n- Step 3: Apply the parallel voltage rule (p.d. is the same across every branch): $$V_T = V_1 = V_2 = V$$. Substitute: $$\\frac{V}{R_T} = \\frac{V}{R_1} + \\frac{V}{R_2}$$\n- Step 4: Divide every term by $$V$$ (cancel the common factor): $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$\n\nThe proof starts from KCL (current adds) because in parallel, current is the split quantity.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A student tries to derive the parallel resistance formula by starting with $$R_T = R_1 + R_2$$ (the series approach) and substituting Ohm's Law. Why does this approach fail? (3 steps)", "answer": "- Step 1: Starting with $$R_T = R_1 + R_2$$ and substituting $$R = V/I$$ gives: $$\\frac{V_T}{I_T} = \\frac{V_1}{I_1} + \\frac{V_2}{I_2}$$. In parallel, $$V_T = V_1 = V_2$$, so this becomes: $$\\frac{V}{I_T} = \\frac{V}{I_1} + \\frac{V}{I_2}$$.\n- Step 2: Dividing by $$V$$: $$\\frac{1}{I_T} = \\frac{1}{I_1} + \\frac{1}{I_2}$$. This is a true statement (currents add, so reciprocals of currents have this relationship), but it's not useful for finding $$R_T$$ in terms of $$R_1$$ and $$R_2$$.\n- Step 3: The fundamental error is starting from the wrong principle. In parallel, resistances do **not** add directly. You must start from the quantity that *does* add — current ($$I_T = I_1 + I_2$$) — and then substitute Ohm's Law. Starting from the series formula assumes the wrong physical principle.\n\nAlways start your proof from the quantity that adds up in that circuit type.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Alex's framework says: \"Conservation of Charge → start with current; Conservation of Energy → start with voltage.\" When deriving the series resistance formula, which do you start with, and why? (2 steps)", "answer": "- Step 1: For the **series** derivation, you start with **voltage** ($$V_T = V_1 + V_2$$), which comes from **conservation of energy** (KVL). In a series circuit, voltage is the quantity that is shared/split across components — it adds up.\n- Step 2: You would *not* start with current ($$I_T = I_1 + I_2$$) because in series, current doesn't add — it's the same everywhere. Starting with the current equation would give you nothing to work with (it just says $$I = I$$). The framework: **series → voltage adds → start with KVL**; **parallel → current adds → start with KCL**.\n\nMatch your starting equation to the quantity that actually adds up in that circuit type.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": true}, {"question": "Why is the total resistance of a parallel combination always **less** than the smallest individual branch resistance? Explain using the physical idea of current paths. (3 steps)", "answer": "- Step 1: Adding a resistor in parallel creates an **additional path** for current to flow. More paths means more total current can flow for the same applied voltage.\n- Step 2: Since $$R_T = \\frac{V}{I_T}$$, and the total current $$I_T$$ is now larger (because there are more branches carrying current), the total resistance must be **smaller**. More current for the same voltage → less resistance.\n- Step 3: Even a very large resistor added in parallel provides *some* extra current path, so $$R_T$$ always decreases. The limiting case: if you add a resistor with infinite resistance (an open circuit / no branch), $$R_T$$ stays the same. But any finite parallel resistor reduces $$R_T$$ below the smallest existing branch value.\n\nMore paths = more current = less total resistance. Always.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "Two equal resistors of $$6\\text{ Ω}$$ each are connected in parallel. Without doing a full calculation, what is the combined resistance, and what is the intuitive reasoning? (2 steps)", "answer": "- Step 1: The combined resistance is **3 Ω** — exactly half of each individual resistor. When two identical resistors are in parallel, the current splits equally between them, so the total current is twice what flows through one branch.\n- Step 2: Since $$I_T = 2 \\times I_1$$ for the same voltage, we get $$R_T = \\frac{V}{I_T} = \\frac{V}{2I_1} = \\frac{R_1}{2}$$. The formula confirms: $$\\frac{1}{R_T} = \\frac{1}{6} + \\frac{1}{6} = \\frac{2}{6}$$, so $$R_T = 3\\text{ Ω}$$. Two equal resistors in parallel → halve the resistance.\n\nTwo identical parallel resistors = half the resistance. This is a quick mental shortcut.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "A student computes the parallel resistance of two resistors and gets $$\\frac{1}{R_T} = 0.50\\text{ Ω}^{-1}$$. They write $$R_T = 0.50\\text{ Ω}$$. What mistake have they made? (2 steps)", "answer": "- Step 1: The student has forgotten to take the **reciprocal** at the final step. The equation $$\\frac{1}{R_T} = 0.50\\text{ Ω}^{-1}$$ means that $$R_T = \\frac{1}{0.50} = 2.0\\text{ Ω}$$, not 0.50 Ω.\n- Step 2: This is the most common parallel-resistance error. The formula gives you the *reciprocal* of the total resistance. You must always flip the final answer. A two-step check: (i) compute $$\\frac{1}{R_T}$$, (ii) take the reciprocal to get $$R_T$$. Also, sanity-check: the answer should be *less* than the smallest branch resistance. Getting 0.50 Ω when the smallest branch might be, say, 2 Ω, would immediately flag the error.\n\nAlways flip the reciprocal at the end. And check: $$R_T$$ < smallest branch.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Write the product-over-sum shortcut formula for exactly two resistors in parallel. Why does this formula not work for three or more parallel resistors? (2 steps)", "answer": "- Step 1: For exactly two parallel resistors: $$R_T = \\frac{R_1 R_2}{R_1 + R_2}$$. This is derived by combining the two fractions: $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2} = \\frac{R_1 + R_2}{R_1 R_2}$$, then taking the reciprocal.\n- Step 2: For three resistors, $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\frac{1}{R_3}$$, which combines to $$\\frac{1}{R_T} = \\frac{R_2 R_3 + R_1 R_3 + R_1 R_2}{R_1 R_2 R_3}$$. This is a different structure — it involves three products in the numerator and three resistors in the denominator. The simple product/sum pattern only emerges for two resistors. The reciprocal method generalises to any number; the shortcut does not.\n\nTwo-resistor shortcut: $$R_T = R_1 R_2 / (R_1 + R_2)$$. For 3+ resistors, use the reciprocal method.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "A student writes the resistance formula as $$R = V \\times I$$. Explain why this is wrong in terms of (a) units and (b) the physical meaning of resistance. (3 steps)", "answer": "- Step 1: The correct formula is $$R = \\frac{V}{I}$$. Resistance is the ratio of p.d. to current — how much voltage is needed per unit of current.\n- Step 2: **Unit check:** $$R = V/I$$ gives units of V/A = Ω (correct). But $$R = V \\times I$$ gives units of V·A = W (watts, the unit of power). This is clearly wrong — resistance is not power.\n- Step 3: **Physical meaning:** Resistance measures how much a component *opposes* current flow. If you double the voltage and the resistance stays the same, the current doubles ($$I = V/R$$). But if you wrote $$R = VI$$, doubling $$V$$ would quadruple $$R$$, which makes no physical sense — resistance is a property of the component, not of how you drive it.\n\nAlways write $$R = V/I$$. Never $$R = VI$$. The unit check catches it instantly.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "In a series circuit with a 12 V source and two resistors $$R_1 = 4\\text{ Ω}$$ and $$R_2 = 8\\text{ Ω}$$, qualitatively: which resistor has the larger p.d. across it, and why? (2 steps)", "answer": "- Step 1: In series, the current is the same through both resistors. By Ohm's Law ($$V = IR$$), the p.d. across each resistor is proportional to its resistance since $$I$$ is the same: $$V_1 = IR_1$$ and $$V_2 = IR_2$$.\n- Step 2: Since $$R_2 = 8\\text{ Ω} > R_1 = 4\\text{ Ω}$$, and the current is the same, $$V_2 > V_1$$. The larger resistor takes a larger share of the total voltage. Specifically, $$R_2$$ is twice $$R_1$$, so $$V_2$$ is twice $$V_1$$: the 12 V splits as 4 V and 8 V.\n\nIn series, the bigger resistor gets the bigger voltage share — same current, so $$V \\propto R$$.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "In a parallel circuit with a 12 V source and two resistors $$R_1 = 4\\text{ Ω}$$ and $$R_2 = 8\\text{ Ω}$$, qualitatively: which resistor carries more current, and why? (2 steps)", "answer": "- Step 1: In parallel, the p.d. is the same (12 V) across both resistors. By Ohm's Law ($$I = V/R$$), the current through each resistor is inversely proportional to its resistance since $$V$$ is the same: $$I_1 = V/R_1$$ and $$I_2 = V/R_2$$.\n- Step 2: Since $$R_1 = 4\\text{ Ω} < R_2 = 8\\text{ Ω}$$, and the voltage is the same, $$I_1 > I_2$$. The smaller resistor offers less opposition, so more current flows through it. Specifically, $$R_1$$ is half of $$R_2$$, so $$I_1$$ is twice $$I_2$$: 3 A through $$R_1$$ and 1.5 A through $$R_2$$.\n\nIn parallel, the smaller resistor carries more current — same voltage, so $$I \\propto 1/R$$.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": true}, {"question": "A combination circuit has an 8 Ω resistor in series with a parallel pair (3 Ω and 6 Ω). Describe the two-step method to find the total resistance, and explain why you cannot apply a single formula to the whole circuit. (3 steps)", "answer": "- Step 1: **Step 1 — Solve the parallel sub-circuit first.** The 3 Ω and 6 Ω resistors are in parallel: $$\\frac{1}{R_p} = \\frac{1}{3} + \\frac{1}{6} = \\frac{2}{6} + \\frac{1}{6} = \\frac{3}{6}$$, so $$R_p = 2\\text{ Ω}$$. This replaces the entire parallel section with a single equivalent resistor.\n- Step 2: **Step 2 — Add the series resistor.** Now the circuit is effectively 8 Ω in series with 2 Ω: $$R_T = 8 + 2 = 10\\text{ Ω}$$.\n- Step 3: You cannot apply a single formula because the series and parallel rules are different. The series formula ($$R_T = R_1 + R_2$$) only works when current is the same through both. The parallel formula ($$1/R_T = 1/R_1 + 1/R_2$$) only works when voltage is the same across both. In a combination circuit, neither condition holds for the whole circuit. You must simplify sub-circuits piece by piece.\n\nAlways solve parallel sub-circuits first, then add series. Never try one formula for everything.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A combination circuit has a 12 V battery, $$R_1 = 8\\text{ Ω}$$ in series with a parallel pair $$R_2 = 3\\text{ Ω}$$ and $$R_3 = 6\\text{ Ω}$$. The total resistance is 10 Ω. Find the total current, the p.d. across $$R_1$$, and the p.d. across the parallel section. (3 steps)", "answer": "- Step 1: Total current: $$I_T = \\frac{\\varepsilon}{R_T} = \\frac{12}{10} = 1.2\\text{ A}$$. This current flows through $$R_1$$ (series — same current everywhere in the main loop).\n- Step 2: P.d. across $$R_1$$: $$V_1 = I_T \\times R_1 = 1.2 \\times 8 = 9.6\\text{ V}$$. This is the voltage dropped across the series resistor.\n- Step 3: P.d. across the parallel section: by KVL, $$V_{\\text{parallel}} = \\varepsilon - V_1 = 12 - 9.6 = 2.4\\text{ V}$$. Both $$R_2$$ and $$R_3$$ have 2.4 V across them (parallel rule). Check: $$9.6 + 2.4 = 12\\text{ V} = \\varepsilon$$ ✓.\n\nSeries element gets the big voltage drop; parallel section gets whatever remains (KVL).", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Continuing from the previous circuit: the parallel section has 2.4 V across it, with $$R_2 = 3\\text{ Ω}$$ and $$R_3 = 6\\text{ Ω}$$. Find the current through each branch and verify KCL. (2 steps)", "answer": "- Step 1: Branch currents by Ohm's Law ($$I = V/R$$): $$I_2 = \\frac{2.4}{3} = 0.80\\text{ A}$$ and $$I_3 = \\frac{2.4}{6} = 0.40\\text{ A}$$. The smaller resistor (3 Ω) carries more current, as expected in parallel.\n- Step 2: KCL check: $$I_2 + I_3 = 0.80 + 0.40 = 1.20\\text{ A} = I_T$$ ✓. The branch currents sum to the total current. This confirms the current split is consistent with charge conservation.\n\nSmaller parallel resistor → more current. Branch currents always sum to total (KCL).", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "In a circuit, resistor K is in series with a parallel pair L and M. The source is 9.0 V, the current through K is 3.0 A, and the current through M is 2.0 A. The p.d. across the parallel section is 2.0 V. Find the current through L and the p.d. across K. (3 steps)", "answer": "- Step 1: Current through L (KCL at the junction): $$I_K = I_L + I_M$$, so $$I_L = I_K - I_M = 3.0 - 2.0 = 1.0\\text{ A}$$. Charge conservation: the 3.0 A entering splits into 1.0 A and 2.0 A.\n- Step 2: P.d. across K (KVL on the full loop): $$\\varepsilon = V_K + V_{\\text{parallel}}$$, so $$V_K = 9.0 - 2.0 = 7.0\\text{ V}$$. The series resistor gets the remaining voltage after the parallel section.\n- Step 3: Verify: loop K→L: $$V_K + V_L = 7.0 + 2.0 = 9.0\\text{ V} = \\varepsilon$$ ✓. Loop K→M: $$V_K + V_M = 7.0 + 2.0 = 9.0\\text{ V} = \\varepsilon$$ ✓. Do NOT compute $$7 + 2 + 2 = 11$$ — a charge takes one branch only.\n\nUse KCL for current splits, KVL for voltage splits. Each loop independently satisfies KVL.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "A student sees a combination circuit and immediately writes $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\frac{1}{R_3}$$ for the entire circuit, where $$R_1$$ is in series with the parallel pair $$R_2$$ and $$R_3$$. Why is this wrong? (2 steps)", "answer": "- Step 1: The reciprocal formula only applies to resistors that are **all in parallel** with each other. $$R_1$$ is in series with the parallel pair, not in parallel with them. The voltage across $$R_1$$ is different from the voltage across $$R_2$$ and $$R_3$$ (which share the same p.d.). The parallel formula requires the same p.d. across all resistors — this condition is violated for $$R_1$$.\n- Step 2: The correct approach is the two-step method: first combine $$R_2$$ and $$R_3$$ in parallel to get $$R_p$$, then add $$R_1$$ in series: $$R_T = R_1 + R_p$$. You cannot skip the intermediate step.\n\nNever apply the parallel formula to a series element. Simplify sub-circuits first.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A resistor C is in series with a parallel pair: branch A ($$R_A = 12\\text{ Ω}$$, $$I_A = 0.8\\text{ A}$$) and branch B ($$I_B = 1.2\\text{ A}$$). Find the current through C, the p.d. across A, and the resistance of B. (4 steps)", "answer": "- Step 1: Current through C (KCL at the junction): $$I_C = I_A + I_B = 0.8 + 1.2 = 2.0\\text{ A}$$. The total current entering the parallel section must leave the series element.\n- Step 2: P.d. across A (Ohm's Law): $$V_A = I_A \\times R_A = 0.8 \\times 12 = 9.6\\text{ V}$$.\n- Step 3: P.d. across B (parallel voltage rule): $$V_B = V_A = 9.6\\text{ V}$$. Both branches share the same two nodes, so the p.d. is identical.\n- Step 4: Resistance of B (Ohm's Law): $$R_B = \\frac{V_B}{I_B} = \\frac{9.6}{1.2} = 8.0\\text{ Ω}$$. The branch with more current has less resistance, as expected.\n\nStart with KCL for current, then Ohm's Law and parallel rules for voltage and resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "A circuit has a 9.0 V source, a diode (p.d. = 1.5 V), and two resistors H and I, all in series. The current is 30 mA everywhere. Why is the current the same through all components, and what is the total p.d. across H and I combined? (3 steps)", "answer": "- Step 1: The current is the same everywhere (30 mA = 0.030 A) because this is a **series circuit** — there is only one path, so by conservation of charge (KCL), the same charge flows through every component. The diode, H, and I all carry identical current.\n- Step 2: By KVL (conservation of energy): the total e.m.f. equals the sum of all p.d.s around the loop. $$\\varepsilon = V_{\\text{diode}} + V_H + V_I$$.\n- Step 3: Therefore: $$V_H + V_I = \\varepsilon - V_{\\text{diode}} = 9.0 - 1.5 = 7.5\\text{ V}$$. The diode takes its fixed 1.5 V, and the remaining 7.5 V is shared between the two resistors. The diode is a non-ohmic component, but KVL still applies — energy conservation is universal.\n\nSeries = same current everywhere (KCL). KVL always holds, even with non-ohmic components like diodes.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "Three resistors of 6 Ω each are connected in parallel. What is the combined resistance? Explain the pattern when N identical resistors are in parallel. (2 steps)", "answer": "- Step 1: For three 6 Ω resistors in parallel: $$\\frac{1}{R_T} = \\frac{1}{6} + \\frac{1}{6} + \\frac{1}{6} = \\frac{3}{6} = \\frac{1}{2}$$, so $$R_T = 2\\text{ Ω}$$. This is one-third of each individual resistance.\n- Step 2: General pattern: for N identical resistors of resistance R in parallel, $$\\frac{1}{R_T} = \\frac{N}{R}$$, so $$R_T = \\frac{R}{N}$$. Three equal resistors → one-third the resistance. Ten equal resistors → one-tenth. More parallel paths = less total resistance.\n\nN identical resistors in parallel: $$R_T = R/N$$. More paths = less resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "When a question says \"state and explain Kirchhoff's First Law,\" what four elements must your answer include for full marks? (2 steps)", "answer": "- Step 1: The four required elements are: (1) **Name the law** — Kirchhoff's First Law. (2) **State it in words** — the sum of currents entering a junction equals the sum of currents leaving. (3) **State the conservation principle** — it is a consequence of conservation of charge. (4) **Write the equation** — $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$.\n- Step 2: Mark schemes specifically look for the phrase \"conservation of charge\" and the equation. Simply writing the equation without the conservation principle will lose marks. The \"explain\" part requires you to say *why* — charge cannot be created or destroyed, so it cannot accumulate at a junction.\n\nName → State → Conservation principle → Equation. Don't skip the \"why.\"", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "When
