<script>
const DATA={"selected": [{"question": "A student says \"resistors store electrons — that's why the voltage drops.\" Explain why this is fundamentally wrong. What do resistors actually do to the charge and to the energy? (2 steps)", "answer": "- Step 1: Resistors do **not** store electrons. Charge (electrons) flows *through* the resistor — every electron that enters exits the other side. No charge accumulates inside. This is conservation of charge: the current in equals the current out.\n- Step 2: What resistors actually do is **convert electrical energy to thermal energy** (heating). The energy *per charge* (i.e., the potential difference) decreases across the resistor, but the charge itself is unchanged. The voltage drop reflects energy being *transferred out* of the electrical form, not charge being \"used up\" or stored.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "For the circuit with resistor C in series with parallel pair A∥B, where I_A = 0.8 A, I_B = 1.2 A, and R_A = 12 Ω, find: (a) current in C, (b) voltage across A, (c) resistance of B. (3 steps)", "answer": "- Step 1: (a) Apply KCL at the junction: I_C = I_A + I_B = 0.8 + 1.2 = 2.0 A.\n\n- Step 2: (b) Voltage across A: V_A = I_A × R_A = 0.8 × 12 = 9.6 V. In parallel, V_B = V_A = 9.6 V.\n\n- Step 3: (c) Resistance of B: R_B = V_B / I_B = 9.6 / 1.2 = 8.0 Ω.\n\nKey strategy: start with what you can determine (current at junction using KCL), then work outward using V = IR and the parallel voltage rule.", "source": "MiniMax ②", "_id": "minimax_2_30"}, {"question": "Suppose you replace a single 6 Ω resistor in a circuit with two 12 Ω resistors in parallel. Conceptually, does the circuit behaviour change, and why? (2 steps)", "answer": "- Step 1: Two equal $$R$$ in parallel give $$R/2$$, so two 12 Ω give 6 Ω. Equivalent resistance is identical.\n- Step 2: From the rest of the circuit's perspective, nothing changes — same current flows, same voltage drop. The only practical differences are: (i) each 12 Ω resistor dissipates half the power of the original 6 Ω, useful for power rating; (ii) if one of the two 12 Ω resistors fails open, the equivalent jumps to 12 Ω instead of going open — useful for fault tolerance.\n\nTakeaway: equivalent resistance is what the circuit \"sees\"; how you build it up can differ.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "In a complex network with multiple junctions and loops, you need to apply both Kirchhoff's Laws. Describe the strategy: at how many junctions do you apply KCL, and around how many loops do you apply KVL? (2 steps)", "answer": "- Step 1: Apply KCL at **each junction independently**. At every junction, write $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$. Each junction gives one independent equation. You do not choose when KCL applies — it applies at every junction, always.\n- Step 2: Apply KVL around **each independent closed loop**. Each loop gives one equation: $$\\sum \\varepsilon = \\sum IR$$. The number of independent loop equations needed equals the number of \"meshes\" (windowpanes) in the circuit diagram. Together, the KCL and KVL equations provide enough independent equations to solve for all unknown currents and voltages.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "Why do household circuits use parallel wiring rather than series? Explain using Kirchhoff's laws and the practical consequences. (2 steps)", "answer": "- Step 1: In **parallel**, each appliance gets the **full supply voltage** (KVL — each loop has the same source). If one appliance breaks (open circuit), the others continue working because each has its own independent loop.\n- Step 2: In **series**, appliances would **share the voltage** (KVL — voltages add). If one breaks (open circuit), the entire circuit is broken — no current flows anywhere. Also, turning on more appliances would change the voltage distribution for all others.\n\nParallel wiring ensures constant voltage for all devices and independence between branches — both direct consequences of KVL applied to each separate loop.", "source": "GLM 5.1 ③", "_id": "glm_3_37"}, {"question": "A circuit has a 9.0 V source, a diode with forward voltage 1.5 V, and two resistors in series. What is the total p.d. *across the two resistors combined*, and what conservation law is being used?", "answer": "- Step 1: Apply KVL around the closed loop: $$\\varepsilon = V_{diode} + V_{R_1} + V_{R_2}$$.\n- Step 2: Rearrange for the combined resistor voltage: $$V_{R_1} + V_{R_2} = \\varepsilon - V_{diode} = 9.0 - 1.5 = 7.5$$ V.\n- Step 3: The principle is conservation of energy — each coulomb gains 9.0 J at the source, drops 1.5 J at the diode, and must therefore drop 7.5 J across the resistors combined.\n\nThe same current (whatever it is) flows through diode and both resistors, since this is a series loop.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "In a working parallel circuit with two branches, one branch suddenly breaks (open circuit — infinite resistance). What happens to the total resistance, total current, and the current in the remaining branch? (3 steps)", "answer": "- Step 1: **Total resistance increases**. Removing a branch removes a current path, so the overall resistance rises. With only one branch remaining, $$R_T$$ equals the resistance of that single branch — which is larger than the previous parallel combination.\n- Step 2: **Total current decreases** (by $$I = V/R_T$$ with higher $$R_T$$). The battery now pushes current through only one path instead of two.\n- Step 3: **The remaining branch now carries the full current** (it was previously sharing the load). Its voltage stays the same (still connected across the same source), so its current is unchanged at $$I = V/R$$, but this is now the *only* current in the circuit.\n\nThis is why household wiring uses parallel circuits: if one appliance breaks, the others continue working at the same voltage.", "source": "GLM 5.1 ③", "_id": "glm_3_34"}, {"question": "For each of the following, state whether the components are in series, parallel, or neither: (a) Two resistors with one wire connecting one end of each to the same point, and the other ends connected to different points. (b) Two resistors connected to the same two nodes. (c) Three resistors where the first connects to the second, and the second connects to the third, with the ends brought out to terminals. (3 steps)", "answer": "- Step 1: (a) **Neither** — this is not a valid circuit connection. Each resistor has one end at the same point, but their other ends are at different points with no connection between them. This is incomplete.\n- Step 2: (b) **Parallel** — both resistors connect between the same two nodes. This is the definition of parallel.\n- Step 3: (c) **Series** — the resistors form a single continuous path: current must pass through R1, then R2, then R3 in sequence. There are no junctions between them.", "source": "MiniMax ①", "_id": "minimax_1_43"}, {"question": "A student computes two resistors in parallel and gets $$R_T$$ *larger* than one of the branches. Without redoing the arithmetic, how do you know they made a mistake, and what is the most likely error? (2 steps)", "answer": "- Step 1: Parallel combinations always reduce the total resistance below the smallest branch, because each extra branch provides an extra path for current. So $$R_T >$$ a branch value is physically impossible for a pure parallel pair.\n- Step 2: Most likely error: they forgot to take the reciprocal at the end. They computed $$1/R_1 + 1/R_2$$ and wrote that sum down as $$R_T$$ instead of inverting to get $$R_T = 1/(\\text{that sum})$$.\n\nAlternative: they added resistors directly ($$R_1 + R_2$$), which is the series rule, not parallel.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Derive the formula for the total resistance of two resistors in series, starting from Kirchhoff's Laws. Clearly identify which law you start from and why. (4 steps)", "answer": "- Step 1: Start with the **voltage rule** (KVL — conservation of energy), because in a series circuit, voltage is the quantity that adds up: $$V_T = V_1 + V_2$$.\n- Step 2: Substitute Ohm's Law ($$V = IR$$) for each term: $$I_T R_T = I_1 R_1 + I_2 R_2$$.\n- Step 3: Apply the series current rule (KCL — current is the same everywhere): $$I_T = I_1 = I_2 = I$$. This gives $$IR_T = IR_1 + IR_2$$.\n- Step 4: Cancel the common factor $$I$$ from all terms: $$R_T = R_1 + R_2$$.\n\nThe proof starts from KVL (voltage adds in series) because that is the non-trivial addition rule for this circuit type. KCL gives the trivial fact that $$I$$ is the same, which allows cancellation.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Why is it wrong to say \"Kirchhoff's First Law only applies to parallel circuits\"? (2 steps)", "answer": "- Step 1: KCL is a statement about conservation of charge, not about circuit topology. It holds at every single junction in every circuit, every time.\n\n- Step 2: In series circuits, there are no junction points where current splits, so KCL reduces to \"current in = current out\" trivially everywhere. In parallel circuits, current splits at junctions, and KCL tells us how it splits. The law is the same; only the configuration differs.\n\nA common exam trap — KCL is always true regardless of whether components are in series or parallel.", "source": "MiniMax ②", "_id": "minimax_2_5"}, {"question": "In the circuit J-K-L-M from the lesson, the source is 9.0 V, the voltage across the parallel section is 2.0 V, and the current through the series resistor K is 3.0 A. A student calculates the total loop voltage as 7 + 2 + 2 = 11 V. Explain why this is wrong and what the correct total should be. (2 steps)", "answer": "- Step 1: The student has double-counted the parallel section. A charge going through the circuit travels through K (losing 7 V) and then through either L OR M (losing 2 V) — never both.\n- Step 2: The correct KVL calculation traces ONE complete path: either through K then L (7 + 2 = 9 V), or through K then M (7 + 2 = 9 V). Both give 9.0 V = ε. The key insight: in parallel circuits, each branch represents an alternative path, not a sequential energy loss.", "source": "MiniMax ①", "_id": "minimax_1_37"}, {"question": "Derive the equation for the total resistance of two resistors in parallel: $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$. Start from the correct Kirchhoff law. (4 steps)", "answer": "- Step 1: Start with KCL (conservation of charge → currents add at the junction): $$I_T = I_1 + I_2$$\n- Step 2: Apply Ohm's Law in the form $$I = \\frac{V}{R}$$ to each term: $$\\frac{V_T}{R_T} = \\frac{V_1}{R_1} + \\frac{V_2}{R_2}$$\n- Step 3: Apply the parallel voltage rule (KVL — same voltage across each branch): $$V_T = V_1 = V_2 = V$$. Substitute: $$\\frac{V}{R_T} = \\frac{V}{R_1} + \\frac{V}{R_2}$$\n- Step 4: Divide through by $$V$$ (since $$V \\neq 0$$): $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$\n\nThe proof starts from current (the quantity that adds in parallel). Starting from voltage would lead to a dead end — a common exam mistake.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "In a parallel circuit, a charge carrier travels through only one branch. Why does this mean we must never add the p.d.s of parallel branches together when applying KVL? (2 steps)", "answer": "- Step 1: KVL applies to a **single closed loop** traced by one charge. A charge going through the circuit enters the parallel section, takes **one** branch (e.g., L), and exits. It never goes through the other branch (M).\n- Step 2: Therefore, the energy lost by that charge is the p.d. of the branch it chose, not the sum of both branches. If $$V_L = V_M = 2\\text{ V}$$, the charge loses 2 V in the parallel section — not 4 V. Adding both branch voltages would be double-counting: it assumes the charge goes through both branches, which is physically impossible.\n\nOne charge, one path. Never sum parallel branch voltages.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "A two-resistor parallel block with $$R_1 = 20\\ \\Omega$$ and $$R_2 = 10\\ \\Omega$$ has a 12 V drop across it. Without computing the exact branch currents (just the conceptual split), where does most of the current go and what is the ratio? (2 steps)", "answer": "- Step 1: Each branch sees the full 12 V. Current per branch: $$I = V/R$$, so smaller R means larger I.\n- Step 2: Ratio $$I_1 : I_2 = R_2 : R_1 = 10 : 20 = 1 : 2$$. Twice as much current flows through the 10 Ω branch as through the 20 Ω branch. If total current is 1.8 A, the split is 0.6 A and 1.2 A.\n\nTakeaway: current splits inversely with resistance — easier branch gets more.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "A student observes a circuit and says \"since the current is the same in series, the voltage should be the same too — they're both per-unit physical quantities.\" Identify the conceptual error.", "answer": "- Step 1: The error conflates two different \"per\" quantities. Current is *charge per time* ($$I = Q/t$$); voltage is *energy per charge* ($$V = E/Q$$). They're different conserved-quantity ratios.\n- Step 2: Conservation of *charge* (a physical, indestructible particle count) forces current to be uniform through a series loop. But energy is *transferred* at each resistor — converted to heat — so energy per charge necessarily drops at each component.\n- Step 3: The asymmetry: charge passes through the resistor unchanged; energy is partially deposited in it. Hence $$I$$ uniform, $$V$$ shared. The two quantities follow from different conservation laws applied to different aspects of the system.\n\nThe mnemonic: \"Charge survives; energy gets spent.\"", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "In a circuit, resistor K is in series with a parallel pair L and M. The source is 9.0 V, the current through K is 3.0 A, and the current through M is 2.0 A. The p.d. across the parallel section is 2.0 V. Find the current through L and the p.d. across K. (3 steps)", "answer": "- Step 1: Current through L (KCL at the junction): $$I_K = I_L + I_M$$, so $$I_L = I_K - I_M = 3.0 - 2.0 = 1.0\\text{ A}$$. Charge conservation: the 3.0 A entering splits into 1.0 A and 2.0 A.\n- Step 2: P.d. across K (KVL on the full loop): $$\\varepsilon = V_K + V_{\\text{parallel}}$$, so $$V_K = 9.0 - 2.0 = 7.0\\text{ V}$$. The series resistor gets the remaining voltage after the parallel section.\n- Step 3: Verify: loop K→L: $$V_K + V_L = 7.0 + 2.0 = 9.0\\text{ V} = \\varepsilon$$ ✓. Loop K→M: $$V_K + V_M = 7.0 + 2.0 = 9.0\\text{ V} = \\varepsilon$$ ✓. Do NOT compute $$7 + 2 + 2 = 11$$ — a charge takes one branch only.\n\nUse KCL for current splits, KVL for voltage splits. Each loop independently satisfies KVL.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "A student says: \"In a parallel circuit, the current through each branch is the same because the voltage is the same.\" Is this reasoning correct? Explain. (2 steps)", "answer": "- Step 1: The premise (voltage is the same across parallel branches) is correct, but the conclusion (current is the same) is **not necessarily true**. The current through each branch depends on both the voltage and the resistance: $$I = V/R$$.\n- Step 2: Same V, but different R → different I. Only if the branches have **equal resistance** will the currents be equal. For example, a 3 Ω branch and a 6 Ω branch with 12 V across them: $$I_1 = 4\\text{ A}$$ and $$I_2 = 2\\text{ A}$$. Same voltage, different currents. The student is confusing \"same V\" with \"same I.\"\n\nSame V does not mean same I — it depends on R. Only equal R gives equal I.", "source": "GLM 5.1 ①", "_id": "glm_1_53"}, {"question": "Using the \"Charlie the Coulomb\" picture, explain why current is the *same* everywhere in a series circuit but potential difference is *not*. (3 steps)", "answer": "- Step 1: Charge (electrons) is a physical, conserved quantity. \"Charlie\" — a 1-coulomb packet — cannot disappear at a resistor; he flows straight through. So the *rate* at which Charlies pass any point ($$I = Q/t$$) is identical everywhere in a series loop.\n- Step 2: But Charlie carries *energy*. At the battery he gains energy (e.g. 100 J/C). At each resistor he gives up some of that energy as heat/light — say 60 J at one resistor, then 40 J at the next. So the *energy per coulomb* drops at each component.\n- Step 3: Since $$V = E/Q$$, and energy per charge changes across each component but charge flow does not, we get the asymmetry:\n+ $$I$$ same everywhere → conservation of *charge*\n+ $$V$$ shared between components → conservation of *energy*", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "Continuing from the previous circuit: the parallel section has 2.4 V across it, with $$R_2 = 3\\text{ Ω}$$ and $$R_3 = 6\\text{ Ω}$$. Find the current through each branch and verify KCL. (2 steps)", "answer": "- Step 1: Branch currents by Ohm's Law ($$I = V/R$$): $$I_2 = \\frac{2.4}{3} = 0.80\\text{ A}$$ and $$I_3 = \\frac{2.4}{6} = 0.40\\text{ A}$$. The smaller resistor (3 Ω) carries more current, as expected in parallel.\n- Step 2: KCL check: $$I_2 + I_3 = 0.80 + 0.40 = 1.20\\text{ A} = I_T$$ ✓. The branch currents sum to the total current. This confirms the current split is consistent with charge conservation.\n\nSmaller parallel resistor → more current. Branch currents always sum to total (KCL).", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "What happens to the total resistance of a parallel circuit when you add another branch (another resistor in parallel)? Explain physically. (2 steps)", "answer": "- Step 1: The total resistance **decreases**. Adding a branch provides an **additional path** for current to flow — even if the new branch has a very large resistance, it still offers some alternative route.\n- Step 2: Physically, think of it like adding another lane to a road: even a slow lane gives traffic an alternative, so the total flow capacity increases and the overall \"resistance\" to flow decreases. Mathematically, $$\\frac{1}{R_T}$$ gets an extra positive term, so $$\\frac{1}{R_T}$$ increases, meaning $$R_T$$ decreases.\n\nThis is the opposite of series, where adding a resistor always increases total resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "Summarise the \"proof starting-point rule\": when deriving the series resistance formula, which conservation law and which quantity do you start from? When deriving the parallel resistance formula, which conservation law and which quantity do you start from? (2 steps)", "answer": "- Step 1: **Series derivation** — start from conservation of **energy** (KVL), which gives the voltage addition rule: $$V_T = V_1 + V_2$$. Voltage is the quantity that adds in series, so it is the natural starting point. Then substitute $$V = IR$$, use the series current rule (same $$I$$), and cancel.\n- Step 2: **Parallel derivation** — start from conservation of **charge** (KCL), which gives the current addition rule: $$I_T = I_1 + I_2$$. Current is the quantity that adds in parallel, so it is the natural starting point. Then substitute $$I = V/R$$, use the parallel voltage rule (same $$V$$), and cancel. **Always start from the quantity that adds up in that circuit type.**", "source": "GLM 5.1 ②", "_id": "glm_2_58"}, {"question": "Suppose you're given a circuit with a series resistor $$R_K$$ followed by a parallel pair $$R_L$$ and $$R_M$$. You know $$\\varepsilon$$, $$R_K$$, $$R_L$$, $$R_M$$. Outline the steps to find the current through $$R_L$$ specifically. (5 steps)", "answer": "- Step 1: Combine $$R_L$$ and $$R_M$$ into an equivalent parallel resistance: $$R_{LM} = R_L R_M / (R_L + R_M)$$.\n- Step 2: Compute total resistance: $$R_T = R_K + R_{LM}$$.\n- Step 3: Compute the source current (and thus the current through $$R_K$$): $$I_T = \\varepsilon / R_T$$.\n- Step 4: Find the p.d. across the parallel section using KVL: $$V_{LM} = \\varepsilon - I_T R_K$$. (Equivalent to $$V_{LM} = I_T R_{LM}$$.)\n- Step 5: Apply Ohm's Law to the L branch alone: $$I_L = V_{LM} / R_L$$.\n\nNotice we never needed $$I_M$$ directly — although KCL would give $$I_M = I_T - I_L$$ as a check.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Two resistors of 12 Ω and 4 Ω are connected in parallel. Using the product-over-sum form, find $$R_T$$ and sanity-check it.", "answer": "- Step 1: Product-over-sum formula (valid for *exactly two* resistors): $$R_T = \\dfrac{R_1 R_2}{R_1 + R_2} = \\dfrac{12 \\times 4}{12 + 4} = \\dfrac{48}{16} = 3.0$$ Ω.\n- Step 2: Sanity check: 3.0 Ω is less than the smaller branch (4 Ω) ✓.\n- Step 3: Equivalent reciprocal calculation: $$\\dfrac{1}{R_T} = \\dfrac{1}{12} + \\dfrac{1}{4} = \\dfrac{1}{12} + \\dfrac{3}{12} = \\dfrac{4}{12}$$, so $$R_T = 3.0$$ Ω ✓.\n\nThe product-over-sum is a useful shortcut but only works for two resistors; for three or more, use the reciprocal sum directly.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "For a series circuit with two resistors, state the rules for (a) current and (b) potential difference. Then explain which conservation law underpins each rule. (3 steps)", "answer": "- Step 1: (a) Current rule: The current is the same everywhere in a series circuit. $$I_1 = I_2 = I$$. This is a consequence of **conservation of charge** (KCL) — with only one path, charge cannot accumulate anywhere, so the flow rate is identical at every point.\n- Step 2: (b) Potential difference rule: The p.d.s add up. $$V_{\\text{total}} = V_1 + V_2$$. This is a consequence of **conservation of energy** (KVL) — the energy gained per charge at the source must equal the total energy lost per charge at the resistors.\n- Step 3: The key mnemonic: In series, **same I** (charge conserved), **shared V** (energy conserved). When you derive the series resistance formula, you start from the voltage rule because that's the quantity that adds up.\n\nSeries: same I, add V. I from charge conservation, V from energy conservation.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "A junction has three wires: 2.0 A enters, 1.5 A exits one branch, and 0.3 A exits another. What is the current in the third branch, and in which direction does it flow? (3 steps)", "answer": "- Step 1: Apply KCL: $ \\sum I_{\\text{in}} = \\sum I_{\\text{out}} $.  \n- Step 2: Let $ I_3 $ be the unknown current. If $ I_3 $ flows **out**, then $ 2.0\\,\\text{A} = 1.5\\,\\text{A} + 0.3\\,\\text{A} + I_3 $. Solving gives $ I_3 = 0.2\\,\\text{A} $ **outward**.  \n+ Alternatively, if $ I_3 $ flows **in**, $ 2.0\\,\\text{A} + I_3 = 1.5\\,\\text{A} + 0.3\\,\\text{A} $, leading to $ I_3 = -0.2\\,\\text{A} $, confirming outward flow.  \n- Step 3: The third branch has **0.2 A exiting** the junction.\n\n[Takeaway: KCL requires balancing all currents algebraically, accounting for direction (sign).]", "source": "Qwen 3 ②", "_id": "qwen_2_1"}, {"question": "A very large resistor (e.g., 1 MΩ) is added in series with a small resistor (e.g., 10 Ω). Is the combined resistance closer to 10 Ω or 1 MΩ? Explain why, and contrast with the parallel case. (2 steps)", "answer": "- Step 1: The combined resistance is very close to 1 MΩ — only slightly more. In series, resistances add directly: $$R_T = 10 + 1{,}000{,}000 = 1{,}000{,}010 \\;\\Omega \\approx 1\\;\\text{M}\\Omega$$. The large resistor completely dominates.\n- Step 2: General principle: when resistors of very different values are in **series**, the **largest resistance dominates**. In **parallel**, the **smallest resistance dominates**. This is because series adds resistances (large term swamps small term), while parallel adds *conductances* ($$1/R$$), where the small resistor has the largest conductance and therefore dominates.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "A combination circuit has a 12 V battery, R₁ = 8 Ω in series with R₂ ∥ R₃ (where R₂ = 3 Ω, R₃ = 6 Ω). The total current is 1.2 A. Which resistor carries more current — R₂ or R₃ — and roughly by what factor? (2 steps)", "answer": "- Step 1: R₂ (3 Ω) carries more current than R₃ (6 Ω). Both have the same voltage across them (parallel rule), and since $$I = V/R$$, the smaller resistance draws more current. R₂ has half the resistance of R₃, so it carries roughly twice the current.\n- Step 2: With 2.4 V across the parallel section: $$I_2 = 2.4/3.0 = 0.80$$ A and $$I_3 = 2.4/6.0 = 0.40$$ A. The ratio is exactly 2:1, matching the resistance ratio of 1:2. In general, for two parallel resistors, the current splits *inversely* proportional to the resistances.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "Explain why in a parallel circuit, the voltage across each branch is the same as the source voltage. (2 steps)", "answer": "- Step 1: In parallel, all branches connect directly between the same two points (nodes). Both ends of each branch are at the same electrical potential as the battery terminals.\n\n- Step 2: Consider \"Charlie the Coulomb\" — whether he goes through branch 1 or branch 2, he starts at the positive terminal (say, +9 V) and ends at the negative terminal (0 V). The energy drop per charge is the same regardless of path. That's why V = V₁ = V₂ = V_source.\n\nThis is a direct consequence of energy conservation (KVL) — every complete loop must give the same total energy change.", "source": "MiniMax ②", "_id": "minimax_2_25"}, {"question": "In a combination circuit with a series resistor R₁ and parallel resistors R₂ || R₃, why must you calculate the parallel resistance first?", "answer": "- **Series-parallel hierarchy**: Parallel sub-circuits behave like a single resistor in series.  \n- **Step-by-step approach**:  \n  1. Solve parallel section first: 1/R₂₃ = 1/R₂ + 1/R₃.  \n  2. Add series resistor: R_total = R₁ + R₂₃.  \n- **Example**: R₁ = 8 Ω, R₂ = 3 Ω, R₃ = 6 Ω → R₂₃ = 2 Ω → R_total = 10 Ω.  \n- **Misconception**: Trying to apply one formula (e.g., 1/(R₁ + R₂) + 1/R₃) leads to errors.  \n\n*Takeaway: Parallel networks simplify first to reduce complexity before handling series additions.*", "source": "Qwen 3 ①", "_id": "qwen_1_6"}, {"question": "Why does the \"two-step method\" of solving combination circuits naturally enforce both Kirchhoff's laws automatically? (3 steps)", "answer": "- Step 1: Step 1 (collapse parallel block to equivalent): this step uses the parallel rules — same voltage across each branch (KVL applied per loop) and currents adding at the junction (KCL). So building the equivalent resistor \"bakes in\" both laws for that sub-circuit.\n- Step 2: Step 2 (add series resistances): this uses series rules — same current through each (KCL trivially) and voltages adding (KVL around the loop). So adding R's straight enforces both laws again.\n- Step 3: Composition: by the time you've collapsed everything to a single equivalent $$R_T$$ and used $$I_T = \\varepsilon/R_T$$, every charge has been counted consistently at every junction (KCL) and every joule has been balanced around every loop (KVL).\n\nTakeaway: the method is just KCL + KVL applied locally, in the right order.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "A combination circuit has $$R_1 = 8\\ \\Omega$$ in series with a parallel pair $$R_2 = 3\\ \\Omega$$ and $$R_3 = 6\\ \\Omega$$, all across a battery. Conceptually walk through how to find: (a) the total resistance, (b) the current from the battery, and (c) the p.d. across the parallel section — without doing big arithmetic. (4 steps)", "answer": "- Step 1: Collapse the parallel pair first. With $$3\\ \\Omega$$ and $$6\\ \\Omega$$ in parallel, the result is less than 3 Ω. Using product-over-sum: $$(3 \\times 6)/(3 + 6) = 18/9 = 2\\ \\Omega$$.\n- Step 2: Add in series: $$R_T = 8 + 2 = 10\\ \\Omega$$. Clean round number.\n- Step 3: Battery current $$I_T = \\varepsilon / R_T$$. For a 12 V battery this gives $$1.2\\ \\text{A}$$ — the same current flows through the 8 Ω resistor since it's in series with the rest.\n- Step 4: P.d. across the parallel section is just the leftover voltage after subtracting the drop across $$R_1$$. With $$V_1 = I_T R_1$$ and the rest by KVL: $$V_{\\text{parallel}} = \\varepsilon - V_1$$. Notice that 2 Ω out of 10 Ω carries 2/10 = 1/5 of the supply, so $$V_{\\text{parallel}} = 0.2 \\varepsilon$$.\n\nTakeaway: the supply voltage divides between the series resistor and the parallel block in proportion to their resistances.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "Why is the total resistance of resistors in **parallel** always less than the smallest individual resistance? (2 steps)", "answer": "- Step 1: **Conductance perspective**: Each resistor provides an additional path for current. Total conductance $ G_{\\text{total}} = G_1 + G_2 + \\dots $ increases with more resistors.  \n- Step 2: **Mathematical proof**: For two resistors, $ \\frac{1}{R_{\\text{total}}} = \\frac{1}{R_1} + \\frac{1}{R_2} $. If $ R_1 < R_2 $, $ \\frac{1}{R_{\\text{total}}} > \\frac{1}{R_1} $, so $ R_{\\text{total}} < R_1 $.\n\n[Takeaway: Parallel resistors reduce total resistance by creating new current pathways, akin to widening a pipe to allow more flow.]", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "A very large resistor (e.g., 1 MΩ) is added in parallel with a small resistor (e.g., 10 Ω). Is the combined resistance closer to 10 Ω or 1 MΩ? Explain why, and state the general principle. (2 steps)", "answer": "- Step 1: The combined resistance is very close to 10 Ω — only slightly less. The 1 MΩ branch carries negligible current compared to the 10 Ω branch, so it barely increases the total current. The dominant path is the 10 Ω branch.\n- Step 2: General principle: when resistors of very different values are in parallel, the **smallest resistance dominates**. The total is slightly less than the smallest branch but very close to it. Using the formula: $$\\frac{1}{R_T} = \\frac{1}{10} + \\frac{1}{1{,}000{,}000} \\approx 0.1$$, so $$R_T \\approx 10\\;\\Omega$$. The large resistor barely changes the total.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "Why does conservation of energy guarantee that the sum of energy dissipated in all resistors equals the energy supplied by the battery in any given time? (3 steps)", "answer": "- Step 1: In a circuit, the battery does work on each coulomb of charge, giving it $$\\varepsilon$$ joules of energy per coulomb. In time $$t$$, charge $$Q = It$$ flows, so total energy supplied is $$\\varepsilon Q = \\varepsilon I t$$.\n- Step 2: As that charge traverses each resistor, energy is dissipated as heat: $$Q V_k = Q \\cdot I R_k = I^2 R_k t$$ per resistor. The sum over all resistors is $$I^2 R_T t$$.\n- Step 3: Since KVL forces $$\\varepsilon = \\sum IR_k = IR_T$$, multiplying by $$It$$: $$\\varepsilon I t = I^2 R_T t = \\sum I^2 R_k t$$. Energy supplied = sum of energies dissipated. No energy lost, none created.\n\nTakeaway: KVL is energy bookkeeping, and at steady state nothing is left over.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "When deriving the series or parallel resistance formula, how do you decide which conservation law to start from? (2 steps)", "answer": "- Step 1: **Start from the quantity that adds up** in that circuit type:\n  + Series → voltages add (KVL, conservation of energy) → start with $$V_T = V_1 + V_2$$\n  + Parallel → currents add (KCL, conservation of charge) → start with $$I_T = I_1 + I_2$$\n- Step 2: If you start from the wrong quantity (e.g., adding voltages in a parallel proof), the algebra produces an ungainly fraction with no clean simplification. The correct starting point leads naturally to Ohm's Law substitution and cancellation of the shared quantity.\n\nConservation of Charge → current rules → parallel derivation. Conservation of Energy → voltage rules → series derivation.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "A student begins the parallel resistance derivation by writing $$R_T = R_1 + R_2$$ and substituting $$\\frac{V_1}{I_1} + \\frac{V_2}{I_2}$$. Why does this approach fail, and what should the student have written as the starting equation instead? (2 steps)", "answer": "- Step 1: This approach fails because $$R_T = R_1 + R_2$$ is the *series* formula — resistances do not add directly in parallel. Substituting Ohm's Law into this wrong starting point produces a complex fraction $$\\frac{V_1 I_2 + V_2 I_1}{I_1 I_2}$$ that cannot simplify to the correct result.\n- Step 2: The correct starting equation is $$I_T = I_1 + I_2$$ (KCL — the quantity that *does* add in parallel). From there, substituting $$I = V/R$$ and cancelling the common $$V$$ yields the correct $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$. **Always start the proof from the quantity that adds up in that circuit type.**", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "A student reasons: \"Current is the same everywhere in a series circuit, so the potential difference must also be the same everywhere.\" Why is this reasoning flawed? (3 steps)", "answer": "- Step 1: The student is conflating **charge conservation** (which governs current) with **energy** (which governs potential difference). Same current means the *amount of charge per second* is the same everywhere — but that says nothing about the *energy each charge carries*.\n- Step 2: $$V = IR$$ tells us the potential difference depends on **both** current and resistance. In series, $$I$$ is the same, but each resistor has a **different** $$R$$, so each has a **different** $$V$$. A larger resistor takes a larger share of the total voltage.\n- Step 3: Physically, \"Charlie the Coulomb\" loses more energy at a larger resistor (more resistance = more energy transferred per charge). The current stays the same because the same number of electrons flow, but each electron gives up different amounts of energy at different components.\n\nCurrent and potential difference are governed by **different** conservation laws: current by conservation of charge, voltage by conservation of energy.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "Imagine a \"Charlie the Coulomb\" at a battery with e.m.f. $$\\varepsilon = 24$$ V, then travelling through three resistors in series with voltage drops of 4 V, 8 V, and 12 V. Verify KVL, and explain what would violate conservation of energy if the drops did not sum to 24 V. (3 steps)", "answer": "- Step 1: The charge gains 24 J/C at the battery (the e.m.f.). It then loses 4 J/C, 8 J/C, and 12 J/C at the three resistors. Total lost: $$4 + 8 + 12 = 24$$ J/C.\n- Step 2: KVL is satisfied: $$\\varepsilon = V_1 + V_2 + V_3 = 4 + 8 + 12 = 24$$ V. The charge returns to its starting point with 0 J/C net gain — all energy supplied has been dissipated.\n- Step 3: If the drops summed to less than 24 V, the charge would return to the battery with leftover energy — energy would have been *created* somewhere, violating conservation. If they summed to more than 24 V, the charge would end with negative energy — energy would have been *destroyed*. Neither is possible. KVL is simply the statement that energy is conserved around a closed loop.", "source": "GLM 5.1 ②", "_id": "glm_2_54"}, {"question": "Why do voltmeters in a lab circuit need very high resistance, and ammeters need very low resistance? Tie your answer to the rules for series and parallel currents and voltages. (3 steps)", "answer": "- Step 1: A voltmeter is connected *in parallel* with the component whose p.d. you want to measure. By the parallel rule, current splits inversely with resistance — so if the voltmeter had low resistance it would draw significant current, changing the actual current through the component and distorting the measurement.\n- Step 2: An ammeter is connected *in series* with the component. By the series rule, the same current flows through ammeter and component, and the ammeter's resistance adds to the total. If it were large it would reduce the current it's trying to measure.\n- Step 3: Ideal limits: voltmeter $$R \\to \\infty$$ (draws no current, doesn't perturb circuit); ammeter $$R \\to 0$$ (drops no voltage, doesn't perturb circuit). Real meters approximate these limits.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "In a series circuit, why is it sometimes said that \"the current is the same everywhere\" yet in a parallel circuit current splits? Aren't electrons the same kind of particle in both cases? (3 steps)", "answer": "- Step 1: Yes — electrons are identical particles regardless of circuit. The difference is *geometry*, not physics.\n- Step 2: In series there is only one path. By conservation of charge, the rate of electrons through every cross-section must match — there's nowhere else for them to go.\n- Step 3: In parallel there is a *junction*: the wires fork into multiple paths. Conservation of charge then says the total rate in equals total rate out, but the rate can distribute differently among the branches (by $$I_k = V/R_k$$). One charge takes one path; collectively the flow splits.\n\nTakeaway: KCL is the same law in both — it just has more interesting consequences when there are branches.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "A combination circuit has a series resistor dropping 7 V, followed by a parallel section dropping 2 V. The source e.m.f. is 9 V. How would you verify this is correct using both Kirchhoff's laws? (3 steps)", "answer": "- Step 1: **KVL check** — any single loop: $$V_{series} + V_{one\\ branch} = 7 + 2 = 9$$ V = $$\\varepsilon$$ ✓. Do NOT add both parallel branches: $$7 + 2 + 2 = 11$$ V is wrong (double-counting).\n- Step 2: **KCL check** — at the junction before the parallel section, the total current entering equals the sum of branch currents leaving: $$I_T = I_1 + I_2$$. This must hold numerically.\n- Step 3: If both checks pass, the solution is self-consistent. KVL confirms energy conservation; KCL confirms charge conservation. Always run both checks on combination circuits.\n\nThese two checks catch the most common errors: double-counting parallel branches (KVL) and mis-splitting currents (KCL).", "source": "GLM 5.1 ③", "_id": "glm_3_33"}, {"question": "A student insists \"resistors store electrons, which is why current is reduced.\" Why is this wrong? (2 steps)", "answer": "- Step 1: Electrons are conserved — they cannot pile up in any component. Whatever rate of electrons enters a resistor must exit, otherwise charge would accumulate (violating conservation of charge) and the circuit could never reach a steady state.\n- Step 2: A resistor *resists* the flow by converting some of the electrical energy carried by the charges into thermal energy (heat). The current through the resistor is set by $$I = V/R$$, not by any \"storage\" mechanism.\n\nMisconception probe: Capacitors store charge; resistors do not. Resistors transform energy form (electrical → thermal).", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "When a question says \"state and explain Kirchhoff's First Law,\" what four elements must your answer include for full marks? (2 steps)", "answer": "- Step 1: The four required elements are: (1) **Name the law** — Kirchhoff's First Law. (2) **State it in words** — the sum of currents entering a junction equals the sum of currents leaving. (3) **State the conservation principle** — it is a consequence of conservation of charge. (4) **Write the equation** — $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$.\n- Step 2: Mark schemes specifically look for the phrase \"conservation of charge\" and the equation. Simply writing the equation without the conservation principle will lose marks. The \"explain\" part requires you to say *why* — charge cannot be created or destroyed, so it cannot accumulate at a junction.\n\nName → State → Conservation principle → Equation. Don't skip the \"why.\"", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "A student calculates the parallel resistance of a 4 Ω and 12 Ω resistor and gets 3 Ω. They then say \"the total parallel resistance is 3 Ω, which is less than both 4 Ω and 12 Ω.\" Is the statement \"less than both\" correct? Explain the general rule. (2 steps)", "answer": "- Step 1: The calculation is correct: $$\\frac{1}{R_T} = \\frac{1}{4} + \\frac{1}{12} = \\frac{3}{12} + \\frac{1}{12} = \\frac{4}{12}$$, so $$R_T = 3\\text{ Ω}$$. And 3 Ω is indeed less than 4 Ω (the smallest branch) and less than 12 Ω.\n- Step 2: The general rule: the total parallel resistance is **always less than the smallest individual branch resistance**. Adding any parallel path provides an additional route for current, reducing the total opposition. Even adding a very large resistor in parallel reduces $$R_T$$ slightly below the smallest existing branch. If you ever get $$R_T > R_{\\text{smallest}}$$, you've made an error (likely added resistances instead of using reciprocals).\n\n$$R_T$$ (parallel) < smallest branch. Always. If not, check your working.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "A 6.0 V battery with negligible internal resistance is connected to two resistors in parallel (2.0 Ω and 3.0 Ω). The total power from the battery is 30 W. Verify this using the total current, and explain why this equals the sum of the power dissipated in each resistor. (3 steps)", "answer": "- Step 1: Total resistance of the parallel combination: $$\\frac{1}{R_T} = \\frac{1}{2} + \\frac{1}{3} = \\frac{5}{6}$$, so $$R_T = 1.2\\;\\Omega$$. Total current: $$I_T = 6.0/1.2 = 5.0$$ A. Power from battery: $$P = \\varepsilon \\times I_T = 6.0 \\times 5.0 = 30$$ W.\n- Step 2: Individual powers: $$P_1 = I_1^2 R_1 = 3.0^2 \\times 2.0 = 18$$ W; $$P_2 = I_2^2 R_2 = 2.0^2 \\times 3.0 = 12$$ W.\n- Step 3: Sum of individual powers: $$18 + 12 = 30$$ W = battery power ✓. This is conservation of energy: all the power supplied by the battery is dissipated in the resistors. None is created or lost. This is the power equivalent of KVL.", "source": "GLM 5.1 ②", "_id": "glm_2_67"}, {"question": "In a parallel circuit, why is the potential difference the same across every branch but the current split between them? (3 steps)", "answer": "- Step 1: All branches connect between the same two circuit nodes. The potential difference is determined entirely by the energy per charge between those two nodes — and there is only one such value, so $$V_1 = V_2 = \\cdots = V$$.\n- Step 2: The current splits because of KCL at the junction where the wires divide: $$I_T = I_1 + I_2 + \\cdots$$. Each branch draws current set by Ohm's law $$I_k = V/R_k$$, so a branch with smaller $$R_k$$ draws more current.\n- Step 3: Physical picture: a single charge takes one branch only (not all of them), but at the junction the total flow rate splits among the available paths in proportion to $$1/R_k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "Suppose three resistors $$R_1 = 30\\ \\Omega$$, $$R_2 = 20\\ \\Omega$$, $$R_3 = 20\\ \\Omega$$ are in series across some battery. Without computing exact branch currents, describe how the supply voltage distributes among them and identify which resistor has the largest p.d. (2 steps)", "answer": "- Step 1: In series the same current $$I$$ flows through all three, so $$V_k = I R_k$$. The p.d. across each resistor is therefore directly proportional to its resistance.\n- Step 2: $$R_1 = 30\\ \\Omega$$ is largest, so it gets the largest share of the supply voltage — specifically $$30/(30+20+20) = 3/7$$ of it. The two 20 Ω resistors each get $$2/7$$. Total resistance is $$70\\ \\Omega$$, so for, say, a 7 V supply the drops would be 3 V, 2 V, 2 V — easy mental check.\n\nTakeaway: In series, p.d. is shared *in proportion to resistance*.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "In the \"Charlie the Coulomb\" analogy, a charge carrier gains 100 J of energy per coulomb at the battery, then loses 60 J/C at the first resistor. How much energy per coulomb does Charlie have left after the first resistor, and what does this imply about the p.d. across the second resistor? (3 steps)", "answer": "- Step 1: Charlie starts with 100 J/C (the e.m.f. = 100 V). After the first resistor, 60 J/C is transferred to heat, so Charlie has $$100 - 60 = 40\\text{ J/C}$$ remaining.\n- Step 2: The remaining 40 J/C must be fully transferred at the second resistor (assuming a simple two-resistor series circuit). By conservation of energy, everything gained must be given out: 60 + 40 = 100 J/C total.\n- Step 3: Therefore, the p.d. across the second resistor is 40 V (since $$V = E/Q = 40\\text{ J}/1\\text{ C}$$). The p.d.s sum to the e.m.f.: $$V_1 + V_2 = 60 + 40 = 100\\text{ V} = \\varepsilon$$. This is Kirchhoff's Second Law in action.\n\nCharlie's energy always returns to zero at the end of the loop — conservation of energy.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "Derive the formula for the total resistance of two resistors in parallel, starting from a conservation principle. State which principle you start from and why. (4 steps)", "answer": "- Step 1: **Start from conservation of charge** (KCL), because in a parallel circuit current is the quantity that *adds up* at the junction: $$I_T = I_1 + I_2$$.\n- Step 2: Apply Ohm's Law in the form $$I = V/R$$ to each term: $$\\dfrac{V_T}{R_T} = \\dfrac{V_1}{R_1} + \\dfrac{V_2}{R_2}$$.\n- Step 3: Apply the parallel voltage rule (KVL): $$V_T = V_1 = V_2 = V$$, giving $$\\dfrac{V}{R_T} = \\dfrac{V}{R_1} + \\dfrac{V}{R_2}$$.\n- Step 4: Divide every term by $$V$$: $$\\dfrac{1}{R_T} = \\dfrac{1}{R_1} + \\dfrac{1}{R_2}$$.\n\nAdding a resistor in parallel always *decreases* total resistance, because it provides another path for current.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "A student argues: \"In a parallel circuit with two branches, if I double the resistance of one branch, the total resistance doubles.\" Explain why this is wrong, and describe qualitatively what actually happens to the total resistance. (3 steps)", "answer": "- Step 1: The total parallel resistance is **not** proportional to any single branch. It depends on the reciprocal sum: $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$. If you double $$R_2$$, the term $$\\frac{1}{R_2}$$ is halved, but $$\\frac{1}{R_1}$$ stays the same.\n- Step 2: Qualitatively: doubling one branch's resistance makes that branch carry less current (harder path), so the total current decreases slightly. Since $$R_T = V/I_T$$, and $$I_T$$ decreases, $$R_T$$ increases — but not by a factor of 2. The total resistance increases, but by less than doubling.\n- Step 3: Example: $$R_1 = 4\\text{ Ω}$$, $$R_2 = 4\\text{ Ω}$$ → $$R_T = 2\\text{ Ω}$$. Double $$R_2$$ to 8 Ω: $$\\frac{1}{R_T} = \\frac{1}{4} + \\frac{1}{8} = \\frac{3}{8}$$ → $$R_T = 2.67\\text{ Ω}$$. The total went from 2 to 2.67 Ω — an increase, but nowhere near doubling.\n\nChanging one branch changes $$R_T$$, but not proportionally. The reciprocal relationship makes it non-linear.", "source": "GLM 5.1 ①", "_id": "glm_1_48"}, {"question": "In a circuit, resistor K (7.0 V across it) is in series with a parallel section containing L and M (each with 2.0 V across them). The source e.m.f. is 9.0 V. A student adds 7 + 2 + 2 = 11 V and says KVL is violated. Explain the error. (3 steps)", "answer": "- Step 1: The student has double-counted the parallel branches. A single charge travelling through the circuit goes through K and then through **either** L **or** M — not both. The charge takes one path only.\n- Step 2: Applying KVL to the loop K → L: $$V_K + V_L = 7.0 + 2.0 = 9.0 \\text{ V} = \\varepsilon$$. Applying KVL to the loop K → M: $$V_K + V_M = 7.0 + 2.0 = 9.0 \\text{ V} = \\varepsilon$$. Both loops independently satisfy KVL.\n- Step 3: The mistake of adding $$7 + 2 + 2 = 11$$ treats the charge as if it goes through both L and M simultaneously. But in a parallel section, the current *splits* — some charge goes through L, the rest through M. Each individual charge follows one complete loop, and KVL must hold for each loop separately.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "In a parallel circuit with two branches of resistances $$R_1 < R_2$$, which branch carries the larger current, and why is this consistent with KCL?", "answer": "- Step 1: Both branches have the *same* p.d. $$V$$ across them (parallel rule). By Ohm's Law, $$I = V/R$$, so the branch with *smaller* resistance carries the *larger* current.\n- Step 2: This is consistent with KCL: the total current $$I_T = I_1 + I_2$$ splits between branches — but unequally, in inverse proportion to resistance. The \"easier\" path takes more current.\n- Step 3: Quick example: 4 Ω and 12 Ω in parallel under 12 V. The 4 Ω branch carries 3 A; the 12 Ω branch carries 1 A; total is 4 A — KCL satisfied. The smaller resistance takes 3× the current.\n\nThis is why a short circuit (very low $$R$$) draws huge current — almost all the current diverts through it.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "Explain Kirchhoff’s Second Law (KVL) using the \"Charlie the Coulomb\" analogy. (2 steps)", "answer": "- Step 1: **Energy conservation**: A charge (Charlie) gains energy at the battery (e.g., 100 V = 100 J/C) and loses it across components.  \n  + Example: In a series circuit with a 100 V battery and two resistors (60 V and 40 V drops), Charlie ends with 0 J/C.  \n- Step 2: **Loop closure**: For any closed loop, energy gained (battery) equals energy lost (resistors):  \n  + Math: ε = V₁ + V₂ (e.g., 100 V = 60 V + 40 V).  \n  + Misconception: Charges only traverse one branch in parallel circuits, avoiding double-counting (e.g., 7.0 V + 2.0 V = 9.0 V in Phuc’s example).  \n\n*Takeaway: KVL ensures energy conservation in loops by tracking energy transfers per charge.*", "source": "Qwen 3 ①", "_id": "qwen_1_2"}, {"question": "Why does dividing every term by $$V$$ at the final step of the parallel-derivation work, and what does it reveal physically?", "answer": "- Step 1: At that step we have $$V/R_T = V/R_1 + V/R_2$$. Every term contains the factor $$V$$. Because $$V \\neq 0$$ (otherwise no current flows), we can divide through legitimately.\n- Step 2: Dividing yields $$1/R_T = 1/R_1 + 1/R_2$$ — purely a relationship between resistances, with no dependence on the source voltage.\n- Step 3: Physically, this reveals that the *equivalent resistance* is a property of the network alone, not of the applied voltage. Whatever voltage you connect to the terminals, the network responds with the same equivalent $$R_T$$. The reciprocal sum is just the algebraic shape that this voltage-independence forces.\n\nThis is why we can talk about \"the resistance\" of a network as a fixed property.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "A 9.0 V source drives a series circuit containing a diode (1.5 V drop) and two resistors. The current is 30 mA everywhere. Why is the current the same everywhere, and what is the total p.d. available for the two resistors? (2 steps)", "answer": "- Step 1: The current is the same everywhere (30 mA) because this is a series circuit — there is only one path, so by conservation of charge (KCL), the same current flows through every component. The diode, like any series component, does not store or divert charge.\n- Step 2: By KVL, the total e.m.f. equals the sum of all voltage drops: $$\\varepsilon = V_{\\text{diode}} + V_H + V_I$$. So the p.d. available for the two resistors together is: $$V_H + V_I = 9.0 - 1.5 = 7.5$$ V. The diode's 1.5 V drop is a fixed energy cost per coulomb; the remaining 7.5 V is shared between the resistors.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "A student writes the resistance formula as $$R = IV$$. Why is this wrong both dimensionally and conceptually? (3 steps)", "answer": "- Step 1: Dimensional check: $$IV$$ has units $$\\text{A} \\cdot \\text{V} = \\text{W}$$ (watts — power!), not ohms. So $$R = IV$$ would equate resistance with power, which is nonsense.\n- Step 2: The correct definition is $$R = V/I$$ (volts per amp = ohms). Resistance measures *how much voltage is needed per unit current* — the steeper the V-I slope, the more resistive.\n- Step 3: The confusion likely comes from $$P = IV$$ (power) and $$V = IR$$ (Ohm's law). Memorise: $$R = V/I$$ — always division of voltage by current, never product.\n\nMark scheme tip: write $$R = V/I$$ every time to lock in the correct form.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "A student says: \"Charge is used up when it goes through a resistor — that's why the voltage drops.\" Is this statement correct? Explain what actually happens to charge and to energy at a resistor. (3 steps)", "answer": "- Step 1: The statement is **incorrect** about charge being \"used up.\" Charge (electrons) is a conserved, physical thing. Electrons flow *through* the resistor and out the other side. The number of electrons entering equals the number leaving — none are stored, consumed, or destroyed.\n- Step 2: What *does* change at a resistor is the **energy per unit charge** — the potential difference. The resistor converts electrical energy into thermal energy (heat). Each coulomb arrives with more energy than it leaves with, but the *charge itself* is unchanged.\n- Step 3: This is exactly why, in a series circuit, current is the same everywhere (charge conserved) but potential difference is not (energy is dissipated at each component). The \"Charlie the Coulomb\" analogy captures this: Charlie loses energy at each resistor, but Charlie himself is still there — same charge, less energy.\n\nCharge is conserved; energy is transferred. Don't confuse the two.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "In the \"Charlie the Coulomb\" analogy, a charge carrier starts at a 100 V battery and passes through two resistors in series. After the first resistor, Charlie has lost 60 J/C. How much energy per charge remains, and what does this tell you about the relationship between e.m.f. and individual potential differences? (2 steps)", "answer": "- Step 1: Charlie started with 100 J/C (100 V). After losing 60 J/C at the first resistor, he has $$100 - 60 = 40$$ J/C remaining, which corresponds to 40 V. At the second resistor, he loses this remaining 40 J/C, ending at 0 J/C — all energy has been transferred.\n- Step 2: This demonstrates that the total e.m.f. (energy supplied per charge by the battery) equals the sum of the potential differences across all components: $$\\varepsilon = V_1 + V_2$$. The battery \"fills up\" Charlie with energy, and each component \"drains\" some of it. By the time Charlie returns to the battery, all energy has been spent — conservation of energy.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "Consider a circuit with source $$\\varepsilon = 9.0\\ \\text{V}$$, a single series resistor K, and then a parallel pair L and M. A student writes the KVL equation as $$\\varepsilon = V_K + V_L + V_M$$. Why is this wrong, and what is the correct loop equation? (3 steps)", "answer": "- Step 1: KVL applies to a single *closed loop* — that is, a single complete path a charge can take from one terminal of the source back to the other. A charge passing through K then enters the parallel section and takes *either* branch L *or* branch M, not both.\n- Step 2: So there are two valid loops: $$\\varepsilon = V_K + V_L$$ (loop through L) and $$\\varepsilon = V_K + V_M$$ (loop through M). Since L and M share the same two nodes, $$V_L = V_M$$, so both equations give the same answer.\n- Step 3: Writing $$V_K + V_L + V_M$$ double-counts the parallel section — it would correspond to a charge passing through both branches in series, which is geometrically impossible.\n\nMisconception probe: KVL is per loop, not per \"every drop in the circuit\".", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "Potential difference is defined as \"energy transferred per unit charge.\" Write the equation for this. A student once wrote $$V = E/t$$ instead — why is this wrong, and what does their version actually calculate? (3 steps)", "answer": "- Step 1: The correct equation is $$V = \\frac{E}{Q}$$, where $$V$$ is potential difference in volts (V), $$E$$ is energy transferred in joules (J), and $$Q$$ is charge in coulombs (C). One volt = one joule per coulomb.\n- Step 2: The student's version $$V = \\frac{E}{t}$$ has the wrong denominator — it uses time instead of charge. This equation does not give potential difference; instead, $$\\frac{E}{t}$$ is **power** ($$P$$), the rate of energy transfer, measured in watts (W).\n- Step 3: The unit check reveals the error: $$V = E/Q$$ gives units of J/C = V (correct). But $$E/t$$ gives units of J/s = W (watts, not volts). If you write $$R = V/I$$, the units are V/A = Ω (correct). But $$R = VI$$ gives V·A = W (watts, not ohms). Always check units to catch these inversions.\n\n$$V = E/Q$$ (energy per charge), not $$E/t$$ (energy per time = power).", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "In a parallel circuit with a 6.0 V source, two resistors (2.0 Ω and 3.0 Ω) are connected in parallel. Without calculating exact power values, which resistor dissipates more power, and why? (2 steps)", "answer": "- Step 1: The 2.0 Ω resistor dissipates more power. Both resistors have the same 6.0 V across them (parallel rule), but the 2.0 Ω resistor draws more current because $$I = V/R$$ — lower resistance means higher current for the same voltage.\n- Step 2: Since $$P = VI$$ and $$V$$ is the same for both, the resistor with the higher current (the 2.0 Ω one) has higher power. Alternatively, using $$P = V^2/R$$: same $$V$$, smaller $$R$$ → larger $$P$$. In parallel, the *smallest* resistance always dissipates the most power. This is the opposite of series, where the *largest* resistance dissipates the most ($$P = I^2 R$$, same $$I$$, larger $$R$$ → larger $$P$$).", "source": "GLM 5.1 ②", "_id": "glm_2_31"}, {"question": "Two students debate: one says \"KVL applies only to the *outer* loop of a circuit\"; the other says \"KVL applies to every closed loop, including inner ones.\" Who is right and why?", "answer": "- Step 1: The second student is right. KVL is a statement about energy conservation for *any* closed path, including any sub-loop entirely interior to the circuit.\n- Step 2: For example, in a circuit with a parallel pair $$R_L \\parallel R_M$$, you can trace a closed loop down through $$R_L$$ and back up through $$R_M$$ (no source crossed). KVL gives $$V_L - V_M = 0$$, i.e. $$V_L = V_M$$ — recovering the parallel-voltage rule.\n- Step 3: This is also why every loop in a complex network gives a valid KVL equation; choosing different loops yields a system of equations that can be solved simultaneously.\n\nKVL is loop-universal; the energy balance must hold on every closed path.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "What is the difference between e.m.f. ($$\\varepsilon$$) and potential difference (V) conceptually, and why do both appear in KVL? (3 steps)", "answer": "- Step 1: **E.m.f.** is the energy *supplied per unit charge* by a source (battery, cell, generator) as it pushes charge through itself — units volts.\n- Step 2: **Potential difference** is the energy *transferred per unit charge* between two points in a circuit, usually across a component that dissipates energy (resistor, bulb).\n- Step 3: KVL balances them: $$\\sum \\varepsilon = \\sum IR$$. EMF terms are *energy sources* (gains); IR terms are *energy sinks* (losses). Around a closed loop, total gain equals total loss — that's conservation of energy in compact form.\n\nNote: for ideal sources, $$\\varepsilon$$ equals the terminal p.d. across the source; for real sources with internal resistance, $$V_{\\text{terminal}} = \\varepsilon - Ir$$ — but that's the next chapter.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Using the \"Charlie the Coulomb\" picture, what happens to a unit of charge as it passes through a battery and then through each resistor in a series circuit? (3 steps)", "answer": "- Step 1: **At the battery** (\"filling station\"): Charlie *gains* energy. If the e.m.f. is 100 V, Charlie gains 100 joules per coulomb. The charge itself is unchanged — only the energy it carries increases.\n- Step 2: **At each resistor**: Charlie *loses* energy. The resistor converts electrical energy to thermal energy (or light, etc.). The charge itself is unchanged — it flows straight through.\n- Step 3: **After the last component**: Charlie has 0 J/C remaining — all energy gained from the battery has been transferred. The charge then re-enters the battery to be \"refuelled.\" This is conservation of energy: energy gained = energy lost.\n\nThe key insight: charge is conserved (same number of electrons throughout), but energy per charge (voltage) changes at each component.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "In a parallel circuit, explain why the potential difference across each branch is the same, even though the current through each branch may be different. (2 steps)", "answer": "- Step 1: In a parallel circuit, all branches connect directly between the same two nodes (the positive and negative terminals of the battery). There is no other component between these nodes.\n- Step 2: Potential difference is energy per unit charge. Since both ends of each branch are connected to the same points in the circuit, each coulomb of charge gains or loses the same amount of energy when moving between these two points, regardless of which branch it takes. Voltage is a \"potential\" defined by position in the circuit, not by the path taken.", "source": "MiniMax ①", "_id": "minimax_1_14"}, {"question": "Why is it useful to think of conservation laws (charge, energy) as *axioms* from which the series and parallel rules are *derived*, rather than as four separate facts to memorise?", "answer": "- Step 1: There are infinitely many circuit configurations, but only two underlying laws (charge conservation, energy conservation). Memorising all the rules separately is brittle; deriving them from conservation laws lets you handle *any* configuration.\n- Step 2: For example, when the tutor says \"start the proof from the quantity that adds up\": this is a corollary of the right conservation law. Series → energy conservation → voltages add → start there. Parallel → charge conservation → currents add → start there.\n- Step 3: Once you internalise this, exam derivations become almost mechanical: identify which quantity is conserved (sums) in the topology, write that as your starting equation, substitute Ohm's Law, apply the \"same-everywhere\" rule, cancel, done.\n\nThe two conservation laws are the bedrock; everything else is derivation.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Why is a parallel circuit topology preferred for home wiring rather than a series topology? (3 steps)", "answer": "- Step 1: In parallel, every appliance is connected between the same two supply rails, so each gets the full supply voltage (e.g. 230 V) independently — appliances are rated for that voltage and need it to operate.\n- Step 2: If one appliance fails (breaks the circuit on its branch), the other branches still form complete loops to the supply, so current still flows through them. Other lights and devices keep working.\n- Step 3: In series, one bulb failing would break the only loop, so *everything* would go dark. Also, the supply voltage would split across all components, so each would receive only a fraction of 230 V — far below rated voltage.\n\nTakeaway: parallel = independent branches, full voltage, fault tolerance.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "Derive the formula for the combined resistance of resistors in series from first principles. (3 steps)", "answer": "- Step 1: Start with the principle that adds up in series: conservation of energy gives voltage addition. Write: V_total = V₁ + V₂ (KVL).\n\n- Step 2: Apply Ohm's Law (V = IR) to each component: I R_total = I R₁ + I R₂, where I is the current through each (since current is the same everywhere in series).\n\n- Step 3: Cancel I from both sides: R_total = R₁ + R₂. This extends to any number of resistors in series.\n\nThe key insight: we start with the quantity that adds (voltage) because series is about voltage sharing.", "source": "MiniMax ②", "_id": "minimax_2_9"}, {"question": "Why must we always convert prefixes (mA, μA, kΩ, MΩ) to base SI units (A, Ω) *before* substituting into Ohm's Law or other equations?", "answer": "- Step 1: The formula $$V = IR$$ (and all derived equations) is defined in coherent SI units: volts, amperes, ohms. Mixing prefixes silently produces wrong answers by factors of 1000 (or worse).\n- Step 2: Common conversions: $$1 \\text{ mA} = 10^{-3}$$ A, $$1 \\text{ μA} = 10^{-6}$$ A, $$1 \\text{ kΩ} = 10^3$$ Ω, $$1 \\text{ MΩ} = 10^6$$ Ω.\n- Step 3: For instance, $$V = (30 \\text{ mA})(2 \\text{ kΩ})$$ should be computed as $$V = (0.030)(2000) = 60$$ V. If you naively wrote $$V = 30 \\times 2 = 60$$ \"thinking the prefixes cancel,\" you'd be right by luck in this case but wrong in general.\n\nAlways convert first; trust the arithmetic; restate the unit at the end.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "A circuit has two parallel branches. Branch 1 has a single 12 Ω resistor. Branch 2 has two resistors (12 Ω and 8 Ω) in series. A 7.6 Ω resistor is in series with the entire parallel section. Describe the two-step process to find the total resistance, without computing the final number. (3 steps)", "answer": "- Step 1: Solve **inside** each parallel branch first. Branch 1 is just 12 Ω. Branch 2 has 12 Ω + 8 Ω = 20 Ω in series (within that branch, the series rule applies).\n- Step 2: Now treat the two branches as a parallel combination: 12 Ω ∥ 20 Ω. Use the parallel formula to find $$R_{\\text{parallel}}$$.\n- Step 3: Finally, add the 7.6 Ω series resistor: $$R_T = 7.6 + R_{\\text{parallel}}$$. The key principle: always work from the *inside out* — resolve the most deeply nested sub-circuits first, then work outward to the series connections.", "source": "GLM 5.1 ②", "_id": "glm_2_66"}, {"question": "In the combination network above, conceptually how does the battery current split between the 3 Ω and 6 Ω branches, and what cross-check confirms your answer? (3 steps)", "answer": "- Step 1: Both parallel branches share the same p.d. (call it $$V_p$$). Branch currents go as $$I_k = V_p/R_k$$, so current is inversely proportional to branch resistance.\n- Step 2: With $$R_2 = 3\\ \\Omega$$ and $$R_3 = 6\\ \\Omega$$, the ratio $$I_2 : I_3 = 6 : 3 = 2 : 1$$. The 3 Ω branch carries twice the current of the 6 Ω branch. Out of the total current entering the parallel section, $$2/3$$ goes through the 3 Ω and $$1/3$$ through the 6 Ω.\n- Step 3: Cross-check with KCL: the two branch currents must add to the total current flowing in from the 8 Ω resistor. If they do, your split is correct.\n\nTakeaway: smaller R = more current; the ratio is exactly the inverse of the resistance ratio.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "With the internal resistance (0.8 Ω) in the previous question, the power from the battery is 18.0 W but the parallel resistors only dissipate 10.8 W. Where is the remaining 7.2 W, and what principle does this illustrate? (2 steps)", "answer": "- Step 1: The remaining 7.2 W is dissipated *inside the battery* as heat, across its internal resistance. The power wasted is $$I^2 r = 3.0^2 \\times 0.8 = 7.2$$ W. This energy heats the battery rather than doing useful work in the external circuit.\n- Step 2: This illustrates conservation of energy: total power supplied ($$P = \\varepsilon I = 18.0$$ W) = useful power delivered to external circuit (10.8 W) + wasted power in internal resistance (7.2 W). Energy is not lost — it is merely redirected into an undesirable form (heat inside the battery). This is why low internal resistance is desirable for batteries: it minimises wasted power.", "source": "GLM 5.1 ②", "_id": "glm_2_69"}, {"question": "A student writes the resistance formula as $$R = V \\times I$$. Explain why this is wrong in terms of (a) units and (b) the physical meaning of resistance. (3 steps)", "answer": "- Step 1: The correct formula is $$R = \\frac{V}{I}$$. Resistance is the ratio of p.d. to current — how much voltage is needed per unit of current.\n- Step 2: **Unit check:** $$R = V/I$$ gives units of V/A = Ω (correct). But $$R = V \\times I$$ gives units of V·A = W (watts, the unit of power). This is clearly wrong — resistance is not power.\n- Step 3: **Physical meaning:** Resistance measures how much a component *opposes* current flow. If you double the voltage and the resistance stays the same, the current doubles ($$I = V/R$$). But if you wrote $$R = VI$$, doubling $$V$$ would quadruple $$R$$, which makes no physical sense — resistance is a property of the component, not of how you drive it.\n\nAlways write $$R = V/I$$. Never $$R = VI$$. The unit check catches it instantly.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "In a combination circuit, the p.d. across the parallel section is 5.0 V and the total e.m.f. is 9.0 V. What is the p.d. across the series element, and which law determines this? (2 steps)", "answer": "- Step 1: By KVL around the closed loop, the e.m.f. equals the sum of p.d.s: $$\\varepsilon = V_{\\text{series}} + V_{\\text{parallel}}$$. So $$V_{\\text{series}} = 9.0 - 5.0 = 4.0$$ V.\n- Step 2: This is determined by Kirchhoff's Second Law (conservation of energy). The battery supplies 9.0 J per coulomb; 5.0 J/C is dissipated in the parallel section and 4.0 J/C in the series element. All energy supplied must be accounted for — none is created or destroyed.", "source": "GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "Two resistors are connected in parallel: $$R_1 = 4\\ \\Omega$$ and $$R_2 = 12\\ \\Omega$$. Without computing exact numbers, in what ratio does the current split between them, and why? (2 steps)", "answer": "- Step 1: Both branches share the same potential difference $$V$$. So $$I_k = V/R_k$$, meaning current in each branch is *inversely* proportional to that branch's resistance.\n- Step 2: Hence $$I_1 / I_2 = R_2 / R_1 = 12/4 = 3$$. The 4 Ω branch carries three times the current of the 12 Ω branch. Three-quarters of the total current goes through the 4 Ω branch, one-quarter through the 12 Ω.\n\nTakeaway: In parallel, current splits *inversely* with resistance — the easier path gets more current.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "A common student error is to apply $$R_T = R_1 + R_2$$ to two parallel resistors. Suppose they do this with $$R_1 = 60\\ \\Omega$$ and $$R_2 = 30\\ \\Omega$$. What \"smell test\" would immediately flag the error, and what's the correct answer? (3 steps)", "answer": "- Step 1: Direct (incorrect) sum: $$60 + 30 = 90\\ \\Omega$$. Smell test: parallel total must be *less* than the smallest branch (30 Ω). But 90 Ω > 30 Ω — impossible for a parallel pair.\n- Step 2: Correct reciprocal sum: $$1/R_T = 1/60 + 1/30 = 1/60 + 2/60 = 3/60$$, so $$R_T = 20\\ \\Omega$$.\n- Step 3: Check: $$20\\ \\Omega < 30\\ \\Omega$$ ✓. And: two equal 60 Ω resistors in parallel would give 30 Ω, so adding a \"stronger\" 30 Ω branch makes total drop further to 20 Ω — makes physical sense.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "A complex combination circuit has a 7.6 Ω resistor in series with a parallel arrangement. One parallel branch is a single 12 Ω resistor. The other branch has 12 Ω and 8 Ω in series. Describe the step-by-step approach to find the total resistance. (3 steps)", "answer": "- Step 1: Solve the series branch first: the 12 Ω and 8 Ω in series give $$12 + 8 = 20\\text{ Ω}$$. Now the parallel section is 12 Ω ∥ 20 Ω.\n- Step 2: Solve the parallel section: $$\\frac{1}{R_p} = \\frac{1}{12} + \\frac{1}{20} = \\frac{5}{60} + \\frac{3}{60} = \\frac{8}{60}$$, so $$R_p = \\frac{60}{8} = 7.5\\text{ Ω}$$.\n- Step 3: Add the series resistor: $$R_T = 7.6 + 7.5 = 15.1\\text{ Ω}$$. The key insight: within a parallel branch, you can have series elements. Solve those first, then combine the parallel section, then add series elements.\n\nWork from the inside out: series within branches → parallel combination → external series.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "A student reasons: \"In a series circuit, I is the same everywhere. Since $$V = IR$$, and I is constant, V should also be constant.\" Identify the logical flaw in this reasoning. (2 steps)", "answer": "- Step 1: The flaw is the implicit assumption that $$R$$ is the same everywhere. The equation $$V = IR$$ has *three* variables. If $$I$$ is constant but $$R$$ varies from component to component, then $$V$$ must also vary.\n- Step 2: In a series circuit, each component has a different resistance (e.g., a 3 Ω resistor and a 5 Ω resistor). Same current through both, but $$V_1 = I \\times 3$$ and $$V_2 = I \\times 5$$ — different voltages. The correct conclusion from \"same I\" is not \"same V\" but rather \"V is proportional to R.\" Components with larger resistance have larger voltage drops in series.", "source": "GLM 5.1 ②", "_id": "glm_2_40"}, {"question": "A circuit has a 12.0 V battery, an 8.0 Ω resistor in series with a parallel pair (3.0 Ω and 6.0 Ω). What is the first step in finding the total resistance, and why must you take this step before adding the series resistor? (2 steps)", "answer": "- Step 1: The first step is to **solve the parallel sub-circuit** on its own. Calculate the combined resistance of the 3.0 Ω ∥ 6.0 Ω pair: $$\\frac{1}{R_{23}} = \\frac{1}{3} + \\frac{1}{6} = \\frac{2+1}{6} = \\frac{3}{6} = \\frac{1}{2}$$, so $$R_{23} = 2.0\\;\\Omega$$.\n- Step 2: You must do this first because the parallel pair acts as a *single equivalent resistor* in the overall series circuit. Only after collapsing the parallel section into one value (2.0 Ω) can you add it to the series resistor: $$R_T = 8.0 + 2.0 = 10.0\\;\\Omega$$. Trying to apply one formula to the whole combination in one go produces wrong answers — the series and parallel rules apply to different groupings within the circuit.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "Derive the equation 1/R_total = 1/R1 + 1/R2 for two resistors in parallel, starting from the principle of charge conservation. (4 steps)", "answer": "- Step 1: Start with Kirchhoff's First Law (charge conservation) at the junction: the total current equals the sum of branch currents: $$I_{total} = I_1 + I_2$$\n- Step 2: Apply Ohm's Law in the form I = V/R for each branch: $$\\frac{V}{R_{total}} = \\frac{V_1}{R_1} + \\frac{V_2}{R_2}$$\n- Step 3: In parallel, the voltage is the same across each branch (both connect to the same two nodes), so V_total = V1 = V2 = V: $$\\frac{V}{R_{total}} = \\frac{V}{R_1} + \\frac{V}{R_2}$$\n- Step 4: Divide both sides by V: $$\\frac{1}{R_{total}} = \\frac{1}{R_1} + \\frac{1}{R_2}$$\n\n**Takeaway:** The parallel proof ALWAYS starts with current adding (the quantity that sums in parallel), not voltage.", "source": "MiniMax ①", "_id": "minimax_1_8"}, {"question": "A student asks: \"Why doesn't the circuit lose charge at the resistor? Doesn't the resistor use it up?\" Explain the misconception. (3 steps)", "answer": "- Step 1: The resistor does **not** consume or store charge. Electrons flow *through* the resistor and out the other side. The number of electrons entering equals the number leaving.\n- Step 2: What the resistor *does* consume is **energy**. As electrons pass through, they transfer electrical energy to thermal energy (heating). The charge itself is unchanged — it is the *energy per charge* (the potential) that decreases.\n- Step 3: This is precisely why current is the same everywhere in a series circuit (charge conserved) but potential difference drops across each component (energy dissipated). The two conservation laws govern different quantities.\n\nResistors resist the *flow* of charge and convert energy — they never trap or destroy the charge itself.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "A circuit has a resistor $$K$$ in series with a parallel combination of $$L$$ and $$M$$. The source is 9.0 V. A student writes \"the sum of the voltage drops is $$V_K + V_L + V_M$$.\" Why is this wrong? (3 steps)", "answer": "- Step 1: KVL applies to a *single closed loop*. A charge takes one path around the circuit — it does not travel through both $$L$$ and $$M$$.\n- Step 2: A given coulomb passes through $$K$$ and then through *either* $$L$$ or $$M$$. Whichever branch it takes, it loses $$V_L = V_M$$ (parallel branches have equal p.d.) — but only once.\n- Step 3: So for any single complete loop: $$\\varepsilon = V_K + V_{parallel}$$. With $$V_K = 7.0$$ V and $$V_{parallel} = 2.0$$ V, we get $$7.0 + 2.0 = 9.0$$ V ✓. Adding $$V_L + V_M$$ would double-count the parallel section.\n\nThe trap: visualise *one charge's journey*, not all branches simultaneously.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "Conceptually, what happens to the total resistance of a circuit if you (a) add another resistor in series, or (b) add another resistor in parallel? Why? (3 steps)", "answer": "- Step 1: Adding in series: total resistance *increases*. Every additional resistor lengthens the single path the current must traverse, dissipating more energy per coulomb. Mathematically $$R_T = R_1 + R_2 + R_3 + \\cdots$$ — strictly grows.\n- Step 2: Adding in parallel: total resistance *decreases*. Every additional branch provides another path for current, allowing more total current to flow at the same voltage. Mathematically $$1/R_T$$ grows, so $$R_T$$ shrinks.\n- Step 3: Limit cases: as $$n \\to \\infty$$ series resistors of resistance $$R$$, $$R_T \\to \\infty$$ (open circuit-like). As $$n \\to \\infty$$ parallel resistors o
