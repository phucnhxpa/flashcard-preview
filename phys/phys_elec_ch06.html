.7 \\approx 87\\ \\Omega$$. Notice how different this is from naïvely applying one formula — and it's the only correct way to honour the actual topology.\n\nTakeaway: identify *which* resistors share the same two nodes; that's the parallel block. Everything else is in series with that block.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "A two-resistor parallel block with $$R_1 = 20\\ \\Omega$$ and $$R_2 = 10\\ \\Omega$$ has a 12 V drop across it. Without computing the exact branch currents (just the conceptual split), where does most of the current go and what is the ratio? (2 steps)", "answer": "- Step 1: Each branch sees the full 12 V. Current per branch: $$I = V/R$$, so smaller R means larger I.\n- Step 2: Ratio $$I_1 : I_2 = R_2 : R_1 = 10 : 20 = 1 : 2$$. Twice as much current flows through the 10 Ω branch as through the 20 Ω branch. If total current is 1.8 A, the split is 0.6 A and 1.2 A.\n\nTakeaway: current splits inversely with resistance — easier branch gets more.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Suppose you replace a single 6 Ω resistor in a circuit with two 12 Ω resistors in parallel. Conceptually, does the circuit behaviour change, and why? (2 steps)", "answer": "- Step 1: Two equal $$R$$ in parallel give $$R/2$$, so two 12 Ω give 6 Ω. Equivalent resistance is identical.\n- Step 2: From the rest of the circuit's perspective, nothing changes — same current flows, same voltage drop. The only practical differences are: (i) each 12 Ω resistor dissipates half the power of the original 6 Ω, useful for power rating; (ii) if one of the two 12 Ω resistors fails open, the equivalent jumps to 12 Ω instead of going open — useful for fault tolerance.\n\nTakeaway: equivalent resistance is what the circuit \"sees\"; how you build it up can differ.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Why is it physically sensible that a charge in a parallel section takes only one branch rather than splitting itself among all of them? (3 steps)", "answer": "- Step 1: Charge is carried by electrons, which are discrete particles. Each individual electron at the junction physically goes down one wire — it doesn't tear in half.\n- Step 2: What \"splits\" is the *statistical flow rate*: out of many electrons arriving per second, some go down branch L and some down branch M, in numbers set by $$I_k = V/R_k$$. The macroscopic current splits because the population of electrons distributes among the available paths.\n- Step 3: Therefore KVL for any one closed loop tracks one electron's journey through one path — that's why you don't sum $$V_L + V_M$$ in one loop, because no single electron traverses both branches.\n\nTakeaway: macroscopic current can split; an individual electron cannot.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "A student rearranges Ohm's law and writes $$V = I/R$$. Why is this wrong, and what physical absurdity follows if you take it seriously? (3 steps)", "answer": "- Step 1: The correct rearrangement of $$R = V/I$$ is $$V = IR$$, not $$V = I/R$$.\n- Step 2: With $$V = I/R$$, increasing R would *decrease* V at fixed I. But experimentally, pushing a fixed current through a larger resistor produces a *larger* voltage drop, not smaller. The wrong formula predicts the opposite of reality.\n- Step 3: Dimensional check: $$I/R$$ has units $$\\text{A}/\\Omega = \\text{A}^2/\\text{V}$$, not volts. So the formula is dimensionally inconsistent.\n\nHabit fix: always start from the definitional form $$R = V/I$$ and rearrange algebraically.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "Tie it all together: in one sentence per item, why are KCL and KVL truly *universal* (applying to any circuit), and what role do the series/parallel rules play relative to them? (3 steps)", "answer": "- Step 1: **KCL** holds because charge is conserved — a fundamental property of matter, independent of any specific component or topology. It applies at every junction in every circuit.\n- Step 2: **KVL** holds because energy is conserved — also fundamental. It applies around every closed loop in every circuit.\n- Step 3: The **series and parallel rules** ($$R_T = \\sum R$$ and $$1/R_T = \\sum 1/R$$) are *derived consequences* of KCL + KVL applied to specific topologies. They are not separate laws; they are KCL and KVL packaged for two common geometries. Combination circuits use both in sequence.\n\nBig picture: two conservation laws → all of DC circuit analysis.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}], "count": 50}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What fundamental physical principle does Kirchhoff's First Law (KCL) express, and why does this make it \"topology-independent\"?", "answer": "- Step 1: KCL expresses **conservation of charge** — the idea that charge (carried by electrons) is a physical, conserved quantity that cannot be created, destroyed, or accumulated in a wire.\n- Step 2: Because charge cannot pile up at any point in a circuit, every coulomb that flows *into* a junction per second must flow *out* per second. Mathematically: $$\\sum I_{in} = \\sum I_{out}$$.\n- Step 3: This is *not* a rule about series vs. parallel — it's a rule about charge. It applies at every single junction in every circuit, every time.\n+ In series circuits: trivially satisfied because there are no branching junctions (one wire in, one out).\n+ In parallel circuits: at each branch point, currents split or recombine but their sum is preserved.\n\nThe key takeaway: KCL is a statement about *charge*, not about *circuit topology*.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "A student claims \"Kirchhoff's First Law only applies in parallel circuits, because that's where currents split.\" Explain why this reasoning is wrong.", "answer": "- Step 1: KCL is fundamentally a statement of charge conservation. It says: at any point/junction, charge in = charge out, because charge cannot accumulate or vanish.\n- Step 2: In a series circuit, this is trivially satisfied — at any cross-section of wire, electrons enter at the same rate they leave. So $$I$$ is the same everywhere.\n- Step 3: KCL doesn't *select* which circuits it applies to. It always applies. The reason it looks \"interesting\" only in parallel circuits is that there, currents visibly split — but the underlying law is identical.\n\nKCL is universal: parallel just makes it visible.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "What fundamental physical principle does Kirchhoff's Second Law (KVL) express, and what equation captures it?", "answer": "- Step 1: KVL expresses **conservation of energy**. Energy cannot be created or destroyed; it can only be transformed.\n- Step 2: Consider 1 coulomb of charge travelling around any closed loop. The battery deposits $$\\varepsilon$$ joules into that charge; each resistor extracts some energy $$IR$$ joules. By the end of the loop, the charge has zero net energy gain.\n- Step 3: Therefore around any closed loop: $$\\sum \\varepsilon = \\sum IR$$.\n\nThe \"loop\" can be any closed path — not just simple series loops.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Using the \"Charlie the Coulomb\" picture, explain why current is the *same* everywhere in a series circuit but potential difference is *not*. (3 steps)", "answer": "- Step 1: Charge (electrons) is a physical, conserved quantity. \"Charlie\" — a 1-coulomb packet — cannot disappear at a resistor; he flows straight through. So the *rate* at which Charlies pass any point ($$I = Q/t$$) is identical everywhere in a series loop.\n- Step 2: But Charlie carries *energy*. At the battery he gains energy (e.g. 100 J/C). At each resistor he gives up some of that energy as heat/light — say 60 J at one resistor, then 40 J at the next. So the *energy per coulomb* drops at each component.\n- Step 3: Since $$V = E/Q$$, and energy per charge changes across each component but charge flow does not, we get the asymmetry:\n+ $$I$$ same everywhere → conservation of *charge*\n+ $$V$$ shared between components → conservation of *energy*", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "Why doesn't a resistor \"consume\" or \"store\" charge, even though it slows the current down?", "answer": "- Step 1: A resistor doesn't actually slow the *rate* of charge flow — in steady state, the same current that enters one terminal of the resistor leaves the other terminal. Charge is conserved.\n- Step 2: What the resistor *does* take is **energy**. Each coulomb passing through loses some of its electrical potential energy, which is dissipated as heat (and possibly light in a bulb).\n- Step 3: So the conceptual distinction is: resistors are *energy transducers*, not *charge sinks*. Charge flows through; energy gets transformed.\n\nA common misconception is to picture the resistor as \"trapping\" electrons — but charge accumulation would violate conservation of charge.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Derive the formula for the total resistance of two resistors in series, starting from a conservation principle. State which principle you start from and why. (4 steps)", "answer": "- Step 1: **Start from conservation of energy** (KVL), because in a series circuit voltage is the quantity that *adds up*: $$V_T = V_1 + V_2$$.\n- Step 2: Apply Ohm's Law $$V = IR$$ to each term: $$I_T R_T = I_1 R_1 + I_2 R_2$$.\n- Step 3: Apply the series current rule (KCL trivially): $$I_T = I_1 = I_2 = I$$, so $$I R_T = I R_1 + I R_2$$.\n- Step 4: Cancel $$I$$ from every term: $$R_T = R_1 + R_2$$.\n\nThe rule generalises: $$R_T = R_1 + R_2 + R_3 + \\cdots$$. Adding a resistor in series always *increases* total resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Derive the formula for the total resistance of two resistors in parallel, starting from a conservation principle. State which principle you start from and why. (4 steps)", "answer": "- Step 1: **Start from conservation of charge** (KCL), because in a parallel circuit current is the quantity that *adds up* at the junction: $$I_T = I_1 + I_2$$.\n- Step 2: Apply Ohm's Law in the form $$I = V/R$$ to each term: $$\\dfrac{V_T}{R_T} = \\dfrac{V_1}{R_1} + \\dfrac{V_2}{R_2}$$.\n- Step 3: Apply the parallel voltage rule (KVL): $$V_T = V_1 = V_2 = V$$, giving $$\\dfrac{V}{R_T} = \\dfrac{V}{R_1} + \\dfrac{V}{R_2}$$.\n- Step 4: Divide every term by $$V$$: $$\\dfrac{1}{R_T} = \\dfrac{1}{R_1} + \\dfrac{1}{R_2}$$.\n\nAdding a resistor in parallel always *decreases* total resistance, because it provides another path for current.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "A student tries to derive the parallel resistance formula by starting with $$R_T = R_1 + R_2$$ and substituting $$V/I$$ for each $$R$$. Why does this approach fail? (3 steps)", "answer": "- Step 1: The approach treats addition of resistances as the starting point. But in a parallel circuit, *resistances do not add* — that's the very thing we're trying to derive a different rule for.\n- Step 2: Substituting gives $$R_T = V_1/I_1 + V_2/I_2$$, which produces an ugly fraction $$(V_1 I_2 + V_2 I_1)/(I_1 I_2)$$ with no clean simplification, because we haven't yet used the parallel rule.\n- Step 3: The correct rule is: **start from the quantity that adds in that circuit type.** In parallel, *currents* add (KCL), not resistances. Starting from $$I_T = I_1 + I_2$$ leads cleanly to the reciprocal formula.\n\nThe general lesson: pick your starting conservation law to match what's actually being summed.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Why is the combined resistance of resistors in parallel always *less than the smallest individual resistance*?", "answer": "- Step 1: Conceptually: each parallel branch provides an *additional path* for charge to flow. More paths means more total current can flow for the same voltage.\n- Step 2: Since $$R = V/I$$, increasing $$I$$ at fixed $$V$$ means lower $$R$$. So adding any branch — no matter how large its resistance — increases total current and therefore decreases total resistance.\n- Step 3: Quick sanity check: two equal resistors $$R$$ in parallel give $$R/2$$; the combined resistance halves. If you ever calculate a parallel total *larger* than the smallest branch, you've made an error (likely forgot to take the reciprocal at the end).\n\nThis is also a useful \"smell test\" for exam answers.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "What's the difference between the rule \"current is the same\" and the rule \"voltage is the same\" — and in which circuit type does each apply?", "answer": "- Step 1: **Series circuit**: there is one path, so charge flow rate is identical everywhere → *current is the same*. Voltage, however, is shared between components because each component dissipates some energy per charge.\n- Step 2: **Parallel circuit**: all branches connect the same two nodes (points of equal potential), so the potential difference across each branch is identical → *voltage is the same*. Current, however, splits among branches according to each branch's resistance.\n- Step 3: Mnemonic: **\"Series — same I, split V; Parallel — same V, split I.\"**\n\nThese two rules are direct consequences of conservation of charge and energy respectively.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "A circuit has a resistor $$K$$ in series with a parallel combination of $$L$$ and $$M$$. The source is 9.0 V. A student writes \"the sum of the voltage drops is $$V_K + V_L + V_M$$.\" Why is this wrong? (3 steps)", "answer": "- Step 1: KVL applies to a *single closed loop*. A charge takes one path around the circuit — it does not travel through both $$L$$ and $$M$$.\n- Step 2: A given coulomb passes through $$K$$ and then through *either* $$L$$ or $$M$$. Whichever branch it takes, it loses $$V_L = V_M$$ (parallel branches have equal p.d.) — but only once.\n- Step 3: So for any single complete loop: $$\\varepsilon = V_K + V_{parallel}$$. With $$V_K = 7.0$$ V and $$V_{parallel} = 2.0$$ V, we get $$7.0 + 2.0 = 9.0$$ V ✓. Adding $$V_L + V_M$$ would double-count the parallel section.\n\nThe trap: visualise *one charge's journey*, not all branches simultaneously.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Resistor $$K$$ is in series with a parallel combination of $$L$$ and $$M$$. The current entering $$K$$ is 3.0 A and the current through $$M$$ is 2.0 A. What is the current through $$L$$, and what conservation law tells you?", "answer": "- Step 1: Apply KCL at the junction where the current splits: charge entering = charge leaving, so $$I_K = I_L + I_M$$.\n- Step 2: Rearrange: $$I_L = I_K - I_M = 3.0 - 2.0 = 1.0$$ A.\n- Step 3: This relies on conservation of charge — no charge accumulates at the junction, so the total leaving (through $$L$$ and $$M$$) must equal the total arriving (through $$K$$).", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "When solving a combination network (some resistors in series, some in parallel), what is the correct two-step strategy and why does applying \"one formula to the whole thing\" fail? (3 steps)", "answer": "- Step 1: **Step A: collapse the parallel section first.** Compute the equivalent resistance of any parallel sub-block using $$1/R_p = 1/R_1 + 1/R_2 + \\cdots$$.\n- Step 2: **Step B: add series resistances.** Replace the parallel block with its equivalent single resistor, then sum it with the series elements: $$R_T = R_{series} + R_p$$.\n- Step 3: A single formula can't describe the whole circuit because the topology mixes two different rules (current-splitting and voltage-splitting). Trying $$1/R_T = 1/R_1 + 1/R_2 + \\cdots$$ across all resistors would falsely treat series resistors as if they were in parallel.\n\nAlways identify the sub-blocks first, then combine them outward.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "A 8.0 Ω resistor is in series with a parallel combination of 3.0 Ω and 6.0 Ω, across a 12.0 V battery. Find the total current from the battery — explain the reasoning, not just the arithmetic. (3 steps)", "answer": "- Step 1: Collapse the parallel pair first. For 3.0 Ω ∥ 6.0 Ω: $$\\dfrac{1}{R_p} = \\dfrac{1}{3} + \\dfrac{1}{6} = \\dfrac{3}{6} = \\dfrac{1}{2}$$, so $$R_p = 2.0$$ Ω. (Sanity check: this is less than the smaller branch, 3.0 Ω ✓.)\n- Step 2: Add the series resistor: $$R_T = 8.0 + 2.0 = 10.0$$ Ω.\n- Step 3: Apply Ohm's Law to the whole circuit: $$I_T = \\varepsilon / R_T = 12.0 / 10.0 = 1.2$$ A.\n\nThis is the current through the 8.0 Ω resistor (and the supply); it will split between the 3.0 Ω and 6.0 Ω branches in inverse proportion to their resistances.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "In the previous circuit (8.0 Ω in series with 3.0 Ω ∥ 6.0 Ω, 12.0 V source, total current 1.2 A), explain conceptually how to find the p.d. across the parallel section *without* finding the branch currents first.", "answer": "- Step 1: The 8.0 Ω resistor sees the full series current $$I_T = 1.2$$ A. So the p.d. across it is $$V_1 = I_T R_1 = 1.2 \\times 8.0 = 9.6$$ V.\n- Step 2: Apply KVL around the loop: the source e.m.f. equals the sum of p.d.s. Since the parallel section behaves as a single voltage drop, $$V_{parallel} = \\varepsilon - V_1 = 12.0 - 9.6 = 2.4$$ V.\n- Step 3: This is the p.d. across *both* parallel branches (since they share the same two nodes). To split the currents: $$I = V_{parallel} / R_{branch}$$ for each branch — the smaller branch (3.0 Ω) gets the larger current.\n\nKVL gives us the parallel-section voltage \"for free\" from the series structure.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "What is wrong with writing $$R = IV$$ instead of $$R = V/I$$, and why does this error commonly slip past students?", "answer": "- Step 1: $$R$$ is *defined* as the ratio of potential difference to current: $$R = V/I$$. This produces units of $$\\text{V/A} = \\Omega$$.\n- Step 2: Writing $$R = IV$$ gives units of $$\\text{A} \\cdot \\text{V} = \\text{W}$$ (watts!) — the units of *power*, not resistance. So the formula is dimensionally wrong.\n- Step 3: The error sneaks in because students remember the three quantities $$V, I, R$$ are linked by \"V = IR\" and reshuffle the letters carelessly. Always derive: starting from $$V = IR$$, divide both sides by $$I$$ to get $$R = V/I$$.\n\nQuick check: a bigger voltage at the same current should give a bigger resistance — this matches $$R = V/I$$, not $$R = IV$$.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Three 6.0 Ω resistors are connected in parallel. What is the combined resistance, and how can you see the answer \"by inspection\" without much calculation?", "answer": "- Step 1: For $$n$$ *identical* resistors $$R$$ in parallel, the combined resistance is $$R/n$$. This is because $$\\dfrac{1}{R_T} = n \\cdot \\dfrac{1}{R}$$.\n- Step 2: With three 6.0 Ω in parallel: $$R_T = 6.0/3 = 2.0$$ Ω.\n- Step 3: Sanity check: 2.0 Ω is less than the smallest branch (6.0 Ω), consistent with the parallel-resistance rule.\n\nUseful shortcut for exam time: two equal resistors → half; three equal → third; etc.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "A 3.0 Ω resistor and an unknown resistor are connected in parallel across a 4.8 V source. The total current from the source is 2.4 A. Find the unknown branch's resistance — explain the conceptual steps. (3 steps)", "answer": "- Step 1: Both branches have the same p.d. (parallel rule): $$V = 4.8$$ V across each. So the current through the 3.0 Ω branch is $$I_1 = V/R_1 = 4.8/3.0 = 1.6$$ A.\n- Step 2: Apply KCL at the junction: total current = sum of branch currents, so $$I_2 = I_T - I_1 = 2.4 - 1.6 = 0.8$$ A.\n- Step 3: Ohm's Law for the unknown branch: $$R_2 = V/I_2 = 4.8/0.8 = 6.0$$ Ω.\n\nOrder of reasoning: use the *equal voltage* rule first to find the known branch's current, then KCL, then Ohm's Law.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Why is potential difference defined as energy *per unit charge* ($$V = E/Q$$) rather than just \"energy\"?", "answer": "- Step 1: We want a quantity that describes how much \"push\" the battery gives each charge carrier, independent of how *many* carriers flow. That requires normalising energy by charge.\n- Step 2: Different size batteries with the same chemistry have the same energy *per coulomb*, but deliver different total energies because they push more or fewer coulombs. The intensive quantity (per-charge) is what's physically meaningful for circuit analysis.\n- Step 3: One volt = one joule per coulomb. This per-charge definition is exactly what makes Kirchhoff's voltage law work cleanly: travel around a loop with 1 coulomb, count joules added/lost, and they must sum to zero — independent of how big the current is.\n\nThe \"per charge\" structure is what lets us think of voltage as a property of *positions* in the circuit, not of charge flows.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Two resistors of 12 Ω and 4 Ω are connected in parallel. Using the product-over-sum form, find $$R_T$$ and sanity-check it.", "answer": "- Step 1: Product-over-sum formula (valid for *exactly two* resistors): $$R_T = \\dfrac{R_1 R_2}{R_1 + R_2} = \\dfrac{12 \\times 4}{12 + 4} = \\dfrac{48}{16} = 3.0$$ Ω.\n- Step 2: Sanity check: 3.0 Ω is less than the smaller branch (4 Ω) ✓.\n- Step 3: Equivalent reciprocal calculation: $$\\dfrac{1}{R_T} = \\dfrac{1}{12} + \\dfrac{1}{4} = \\dfrac{1}{12} + \\dfrac{3}{12} = \\dfrac{4}{12}$$, so $$R_T = 3.0$$ Ω ✓.\n\nThe product-over-sum is a useful shortcut but only works for two resistors; for three or more, use the reciprocal sum directly.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "A circuit has a 9.0 V source, a diode with forward voltage 1.5 V, and two resistors in series. What is the total p.d. *across the two resistors combined*, and what conservation law is being used?", "answer": "- Step 1: Apply KVL around the closed loop: $$\\varepsilon = V_{diode} + V_{R_1} + V_{R_2}$$.\n- Step 2: Rearrange for the combined resistor voltage: $$V_{R_1} + V_{R_2} = \\varepsilon - V_{diode} = 9.0 - 1.5 = 7.5$$ V.\n- Step 3: The principle is conservation of energy — each coulomb gains 9.0 J at the source, drops 1.5 J at the diode, and must therefore drop 7.5 J across the resistors combined.\n\nThe same current (whatever it is) flows through diode and both resistors, since this is a series loop.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "In a parallel circuit with two branches of resistances $$R_1 < R_2$$, which branch carries the larger current, and why is this consistent with KCL?", "answer": "- Step 1: Both branches have the *same* p.d. $$V$$ across them (parallel rule). By Ohm's Law, $$I = V/R$$, so the branch with *smaller* resistance carries the *larger* current.\n- Step 2: This is consistent with KCL: the total current $$I_T = I_1 + I_2$$ splits between branches — but unequally, in inverse proportion to resistance. The \"easier\" path takes more current.\n- Step 3: Quick example: 4 Ω and 12 Ω in parallel under 12 V. The 4 Ω branch carries 3 A; the 12 Ω branch carries 1 A; total is 4 A — KCL satisfied. The smaller resistance takes 3× the current.\n\nThis is why a short circuit (very low $$R$$) draws huge current — almost all the current diverts through it.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "In a series circuit, two unequal resistors $$R_1 < R_2$$ have the same current flowing through them. Which one has the larger p.d. across it, and what conservation law does this reflect?", "answer": "- Step 1: From Ohm's Law $$V = IR$$, with the same $$I$$ in both resistors, the larger resistance gets the larger voltage drop. So $$V_2 > V_1$$.\n- Step 2: This reflects conservation of energy (KVL): the total p.d. of the source is shared between the resistors in proportion to their resistances. The \"harder\" resistor takes more of the energy per coulomb.\n- Step 3: Intuition: imagine Charlie the Coulomb pushing through both resistors with the same effort (same I). The bigger resistor gives him more trouble, draining more energy from him — so the voltage drop across it is larger.\n\nThis proportional sharing is the basis of the potential divider.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Why can't you use a single \"formula for the whole circuit\" when a network mixes series and parallel, and what does it mean structurally to \"reduce\" the network?", "answer": "- Step 1: Series and parallel are *different* combination rules — they correspond to different conservation principles applied at different parts of the network. There's no single algebraic operation that captures both at once.\n- Step 2: Reduction means: identify a sub-block (a pure series chain or a pure parallel cluster), replace it with its equivalent single resistance, redraw, and repeat. You collapse the network step by step.\n- Step 3: After full reduction, the whole network is a single resistor — at which point Ohm's Law gives you total current. Then you work *backwards*, expanding the network to find currents and voltages in each original component.\n\nIt's like simplifying an algebraic expression: handle the innermost parentheses first.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "Resistor C is in series with a parallel pair: branch A (12 Ω carrying 0.8 A) and branch B (carrying 1.2 A). Find $$R_B$$ — describe the reasoning chain, not just the arithmetic. (4 steps)", "answer": "- Step 1: Find the p.d. across A using Ohm's Law: $$V_A = I_A R_A = 0.8 \\times 12 = 9.6$$ V.\n- Step 2: A and B are in parallel, so they share the same voltage: $$V_B = V_A = 9.6$$ V.\n- Step 3: Apply Ohm's Law to B: $$R_B = V_B / I_B = 9.6 / 1.2 = 8.0$$ Ω.\n- Step 4: (Bonus check) Current through C is found by KCL at the junction: $$I_C = I_A + I_B = 0.8 + 1.2 = 2.0$$ A.\n\nThe conceptual chain: Ohm's law on the known branch → parallel-voltage rule → Ohm's law on the unknown branch.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "\"Adding more resistors in series always increases total resistance; adding more resistors in parallel always decreases it.\" Explain the intuition behind both halves of this statement.", "answer": "- Step 1: **Series**: charge has only one path. Each added resistor is another obstacle on that single path. Cumulative obstruction grows, so $$R_T = R_1 + R_2 + \\cdots$$ rises.\n- Step 2: **Parallel**: each added branch is another *alternative* path. More paths means more current can flow for the same voltage. Since $$R = V/I$$ with $$V$$ fixed, larger $$I$$ means smaller $$R_T$$.\n- Step 3: A nice way to picture it: parallel resistors are like multiple traffic lanes — more lanes ease the flow. Series resistors are like a sequence of toll booths — each one delays you further.\n\nBoth directional rules follow from the underlying conservation laws.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Why is \"stating the law in words\" before doing the calculation important for mark-scheme answers on Kirchhoff problems?", "answer": "- Step 1: Examiners award marks for *demonstrating understanding* of the underlying principle (charge or energy conservation), not just for the numerical answer. Mark schemes typically have a dedicated mark for the law statement.\n- Step 2: A complete answer follows a structure: (1) name the law, (2) state it in words referencing the conservation principle, (3) write the equation, (4) substitute numbers.\n- Step 3: Example: \"By Kirchhoff's First Law, conservation of charge requires that the sum of currents into a junction equals the sum out. So $$I_1 + I_2 = I_T$$ at this junction; substituting…\"\n\nEven if your arithmetic slips, the conceptual-statement mark is locked in.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Three identical 10 Ω resistors can be arranged in seven distinct circuits (singly, in series, in parallel, and mixed). Pick the two extremes — all-series and all-parallel — and compute the resulting resistance. Then describe what intermediate arrangements would give.", "answer": "- Step 1: **All three in series**: $$R_T = 10 + 10 + 10 = 30$$ Ω. This is the maximum.\n- Step 2: **All three in parallel**: $$1/R_T = 3/10$$, so $$R_T = 10/3 \\approx 3.3$$ Ω. This is the minimum.\n- Step 3: **Intermediate arrangements** lie between these two extremes:\n+ Two in parallel (5 Ω) then in series with the third → $$5 + 10 = 15$$ Ω.\n+ Two in series (20 Ω) then in parallel with the third → $$\\dfrac{20 \\times 10}{20 + 10} = 6.7$$ Ω.\n\nThe general principle: more parallelism → lower $$R_T$$; more seriality → higher $$R_T$$.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "What's the unit consistency check for a parallel resistance calculation, and why is it useful?", "answer": "- Step 1: When using $$1/R_T = 1/R_1 + 1/R_2$$, each term has units of $$\\Omega^{-1}$$ (sometimes called *siemens*, S). So your intermediate sum is in $$\\Omega^{-1}$$, not $$\\Omega$$.\n- Step 2: The final step — taking the reciprocal — converts back to ohms. If you forget this last step, you'll report a tiny number with the wrong units.\n- Step 3: Practical check: if your computed \"parallel resistance\" is *larger* than any individual branch, you've forgotten to invert — or you confused parallel with series.\n\nThe reciprocal step is the most-commonly-skipped move in parallel calculations.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Explain why a \"junction\" only exists in a parallel circuit (or a combination network), and why series circuits don't have any.", "answer": "- Step 1: A junction is a point where three or more wires meet — that is, a point where current can split or recombine. It's a topological feature of the wiring.\n- Step 2: In a pure series circuit, every component is connected end-to-end in one loop: each node has exactly two wires (one in, one out). No splits → no junctions.\n- Step 3: As soon as you add a parallel branch, you create two junctions: one where the current splits, and one where it recombines. At each junction, KCL must be applied.\n\nKCL is still trivially \"true\" in series — but with no junctions to apply it at, it gives no new information beyond $$I = I = I = \\cdots$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Suppose you compute parallel resistance and get a *bigger* number than the smallest branch. What likely went wrong, and how would you diagnose?", "answer": "- Step 1: For genuine parallel resistors, $$R_T$$ is always strictly less than the smallest branch — this is a *theorem*, not a coincidence. So a larger result indicates an error.\n- Step 2: Common diagnoses:\n+ Forgot to take the reciprocal at the end (most common — you reported $$1/R_T$$, not $$R_T$$).\n+ Accidentally added the resistances directly as if they were in series.\n+ Computed a parallel combination of just two values but wrote down the wrong arithmetic.\n- Step 3: Quick recovery: redo with the product-over-sum form $$R_T = R_1 R_2 / (R_1 + R_2)$$ if there are only two resistors, and check against the smallest-branch sanity test.\n\nThe \"less than smallest\" rule is your safety net.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Why does dividing every term by $$V$$ at the final step of the parallel-derivation work, and what does it reveal physically?", "answer": "- Step 1: At that step we have $$V/R_T = V/R_1 + V/R_2$$. Every term contains the factor $$V$$. Because $$V \\neq 0$$ (otherwise no current flows), we can divide through legitimately.\n- Step 2: Dividing yields $$1/R_T = 1/R_1 + 1/R_2$$ — purely a relationship between resistances, with no dependence on the source voltage.\n- Step 3: Physically, this reveals that the *equivalent resistance* is a property of the network alone, not of the applied voltage. Whatever voltage you connect to the terminals, the network responds with the same equivalent $$R_T$$. The reciprocal sum is just the algebraic shape that this voltage-independence forces.\n\nThis is why we can talk about \"the resistance\" of a network as a fixed property.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "A student observes a circuit and says \"since the current is the same in series, the voltage should be the same too — they're both per-unit physical quantities.\" Identify the conceptual error.", "answer": "- Step 1: The error conflates two different \"per\" quantities. Current is *charge per time* ($$I = Q/t$$); voltage is *energy per charge* ($$V = E/Q$$). They're different conserved-quantity ratios.\n- Step 2: Conservation of *charge* (a physical, indestructible particle count) forces current to be uniform through a series loop. But energy is *transferred* at each resistor — converted to heat — so energy per charge necessarily drops at each component.\n- Step 3: The asymmetry: charge passes through the resistor unchanged; energy is partially deposited in it. Hence $$I$$ uniform, $$V$$ shared. The two quantities follow from different conservation laws applied to different aspects of the system.\n\nThe mnemonic: \"Charge survives; energy gets spent.\"", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "Two 4 Ω resistors are connected in parallel, and that combination is in series with another 4 Ω resistor. A 12 V battery drives the circuit. *Without doing the full calculation,* predict: which resistor has the largest p.d. across it, and roughly what fraction of the source voltage does it carry?", "answer": "- Step 1: The parallel pair (4 Ω ∥ 4 Ω) reduces to 2 Ω. So the total is 2 Ω + 4 Ω = 6 Ω in series.\n- Step 2: With the same current flowing through both the series resistor and the parallel block, voltage divides in proportion to resistance: $$V_{series} : V_{parallel} = 4 : 2 = 2:1$$.\n- Step 3: So the 4 Ω series resistor takes roughly $$2/3$$ of the source voltage — about 8 V — while the parallel section carries the remaining 4 V (which is the same across each parallel branch).\n\nThe intuition: the largest resistance in the series chain wins the largest share of the voltage.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "In a parallel circuit with branches of 2 Ω, 4 Ω, and 4 Ω, *without computing the exact total*, estimate the order of magnitude of $$R_T$$ and explain the reasoning.", "answer": "- Step 1: We know $$R_T$$ must be less than the smallest branch (2 Ω). So $$R_T < 2$$ Ω.\n- Step 2: The two 4 Ω branches in parallel give 2 Ω. So effectively we have 2 Ω ∥ 2 Ω, which is 1 Ω.\n- Step 3: So $$R_T = 1$$ Ω — consistent with our upper bound (< 2 Ω). This kind of nested simplification is faster than the raw reciprocal sum.\n\nUsing \"equal resistors in parallel halve\" repeatedly is a great mental-arithmetic technique.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Why does the equation $$\\sum \\varepsilon = \\sum IR$$ for KVL include the e.m.f. on the left and the $$IR$$ drops on the right, rather than all terms on one side?", "answer": "- Step 1: The form $$\\sum \\varepsilon = \\sum IR$$ emphasises the physical picture: sources *deliver* energy per charge ($$\\varepsilon$$); resistors *dissipate* energy per charge ($$IR$$). Energy in equals energy out.\n- Step 2: Equivalently, you could write $$\\sum \\varepsilon - \\sum IR = 0$$, treating the loop as a closed energy balance: net energy change of 1 C around the loop is zero.\n- Step 3: Both forms encode conservation of energy. The split form makes it easy to substitute values: identify all sources (left) and all resistors (right), then equate.\n\nThe choice is conventional; the physics is the same.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "In a \"find the missing value\" problem with a combination network, what's a good *order of operations* when you have partial information (some currents, some voltages, some resistances)?", "answer": "- Step 1: First, look for what you can compute *directly* using a single rule (Ohm's law on a fully-specified branch, KCL at a junction where two of three currents are known, etc.).\n- Step 2: Use those results to unlock the next layer — e.g., if you find a branch voltage, use the parallel-voltage rule to assign that voltage to other branches; if you find a junction current, use KCL elsewhere.\n- Step 3: Save the hardest unknown (e.g., a resistance buried inside the parallel section) for last, after you've propagated enough information.\n\nThe tutor's advice in the lesson: \"Start with the current in C — it's the easiest.\" Always pick the easiest move first.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Suppose you're given a circuit with a series resistor $$R_K$$ followed by a parallel pair $$R_L$$ and $$R_M$$. You know $$\\varepsilon$$, $$R_K$$, $$R_L$$, $$R_M$$. Outline the steps to find the current through $$R_L$$ specifically. (5 steps)", "answer": "- Step 1: Combine $$R_L$$ and $$R_M$$ into an equivalent parallel resistance: $$R_{LM} = R_L R_M / (R_L + R_M)$$.\n- Step 2: Compute total resistance: $$R_T = R_K + R_{LM}$$.\n- Step 3: Compute the source current (and thus the current through $$R_K$$): $$I_T = \\varepsilon / R_T$$.\n- Step 4: Find the p.d. across the parallel section using KVL: $$V_{LM} = \\varepsilon - I_T R_K$$. (Equivalent to $$V_{LM} = I_T R_{LM}$$.)\n- Step 5: Apply Ohm's Law to the L branch alone: $$I_L = V_{LM} / R_L$$.\n\nNotice we never needed $$I_M$$ directly — although KCL would give $$I_M = I_T - I_L$$ as a check.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "What's the conceptual significance of $$\\varepsilon$$ (e.m.f.) being measured in volts, given that potential difference is also in volts?", "answer": "- Step 1: Both $$\\varepsilon$$ and $$V$$ are *energy per unit charge* (J/C = V). They share units because they describe the same physical quantity — energy density per coulomb.\n- Step 2: The distinction is *direction of energy transfer*. E.m.f. is the energy a source *supplies* to each coulomb (chemical → electrical in a cell). P.d. across a resistor is the energy each coulomb *gives up* (electrical → heat).\n- Step 3: So in KVL, $$\\sum \\varepsilon = \\sum IR$$ is really \"energy in per coulomb = energy out per coulomb around any loop.\" Same units, opposite roles in the energy balance.\n\nA battery's e.m.f. is its \"energy-injection rate per charge\"; a resistor's voltage drop is its \"energy-extraction rate per charge.\"", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Why must we always convert prefixes (mA, μA, kΩ, MΩ) to base SI units (A, Ω) *before* substituting into Ohm's Law or other equations?", "answer": "- Step 1: The formula $$V = IR$$ (and all derived equations) is defined in coherent SI units: volts, amperes, ohms. Mixing prefixes silently produces wrong answers by factors of 1000 (or worse).\n- Step 2: Common conversions: $$1 \\text{ mA} = 10^{-3}$$ A, $$1 \\text{ μA} = 10^{-6}$$ A, $$ s is also why every loop in a complex network gives a valid KVL equation; choosing different loops yields a system of equations that can be solved simultaneously.\n\nKVL is loop-universal; the energy balance must hold on every closed path.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Why is it useful to think of conservation laws (charge, energy) as *axioms* from which the series and parallel rules are *derived*, rather than as four separate facts to memorise?", "answer": "- Step 1: There are infinitely many circuit configurations, but only two underlying laws (charge conservation, energy conservation). Memorising all the rules separately is brittle; deriving them from conservation laws lets you handle *any* configuration.\n- Step 2: For example, when the tutor says \"start the proof from the quantity that adds up\": this is a corollary of the right conservation law. Series → energy conservation → voltages add → start there. Parallel → charge conservation → currents add → start there.\n- Step 3: Once you internalise this, exam derivations become almost mechanical: identify which quantity is conserved (sums) in the topology, write that as your starting equation, substitute Ohm's Law, apply the \"same-everywhere\" rule, cancel, done.\n\nThe two conservation laws are the bedrock; everything else is derivation.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}], "count": 43}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.9, "in_tokens": 28400, "out_tokens": 18091, "reasoning_chars": 2970, "cost_eur": 0.0857, "elapsed_s": 154, "content_chars": 57644}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 28399, "out_tokens": 20441, "reasoning_chars": 3759, "cost_eur": 0.0933, "elapsed_s": 680, "content_chars": 68029}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display" const SK='phys_elec_ch06';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
