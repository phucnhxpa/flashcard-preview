/I happens to equal V×I. But this is pure coincidence. Always use R = V/I. Never write R = IV.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Explain why potential difference (voltage) is described as \"energy per unit charge.\" Give the equation and units. (2 steps)", "answer": "- Step 1: Potential difference V is defined as the energy transferred (or converted) per unit charge: $$V = \\frac{E}{Q}$$ where E is energy in joules (J) and Q is charge in coulombs (C).\n- Step 2: One volt equals one joule per coulomb: 1 V = 1 J/C. So if there is a 12 V potential difference across a component, each coulomb of charge transferring through that component loses 12 joules of electrical energy.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In a series circuit, if you add more resistors in series, what happens to the total resistance and total current? Explain physically. (2 steps)", "answer": "- Step 1: Total resistance **increases**. Each additional resistor adds its own opposition to current flow, making it harder for charge to complete the loop. R_total = R1 + R2 + R3 + ...\n- Step 2: Total current **decreases**. Since the battery voltage is fixed, and R_total has increased, by I = ε/R_total, the current must decrease. More resistance means less flow.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In a parallel circuit, if you add more resistors in parallel, what happens to the total resistance and total current? Explain physically. (2 steps)", "answer": "- Step 1: Total resistance **decreases**. Adding another parallel branch provides an additional path for charge to flow, making it easier overall for current to pass. The total is always less than the smallest branch resistance.\n- Step 2: Total current **increases**. With more paths available and total resistance decreased, more charge can flow per second from the battery. I_total = ε/R_total — as R_total gets smaller, I_total gets larger.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A student says \"I is the same everywhere in a circuit.\" Is this always true? Explain with reference to series and parallel circuits. (2 steps)", "answer": "- No, this is only true in **series** circuits. In **parallel** circuits, current splits at junctions — different branches carry different currents.\n- The statement \"I is the same everywhere\" is true for the series portion of any circuit, but when a circuit splits into parallel branches, the current divides. The total current from the source equals the sum of branch currents (KCL), but the current in each branch can be different.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A circuit has a battery, a 10 Ω resistor in series, and two resistors of 20 Ω each in parallel with each other. The total current is 0.50 A. Find: (a) the voltage across the parallel section, (b) the current in each parallel branch. (3 steps)", "answer": "- Step 1: Find parallel equivalent: two 20 Ω in parallel = (20 × 20)/(20 + 20) = 400/40 = 10 Ω. Total R = 10 + 10 = 20 Ω.\n- Step 2: (a) Voltage across series resistor: V = IR = 0.50 × 10 = 5.0 V. By KVL, voltage across parallel section = ε − V_series. We need ε: ε = I × R_total = 0.50 × 20 = 10 V. So V_parallel = 10 − 5.0 = **5.0 V**.\n- Step 3: (b) Each parallel branch has 5.0 V across it. Current in each: I = V/R = 5.0 V / 20 Ω = **0.25 A** in each branch. Total branch current = 0.25 + 0.25 = 0.50 A ✓", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "In a complex circuit, how do you identify which resistors are in series and which are in parallel? (2 steps)", "answer": "- Step 1: Look for components that share exactly the same two nodes (points). If two components connect between the same two points with no other components between them, they are in parallel.\n- Step 2: Look for components that form a single continuous path with no junctions between them. If charge must pass through components one after another with no alternative path, they are in series. In complex circuits, first identify and simplify any obvious series or parallel groups, then re-assess the simplified circuit.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "A circuit has a 12 Ω resistor in series with a parallel combination of two equal resistors. The total resistance is measured as 16 Ω. Find the value of each of the parallel resistors. (3 steps)", "answer": "- Step 1: Let each parallel resistor be R. Their combined resistance: R_parallel = R/2 (since two equal resistors in parallel = R/2).\n- Step 2: Total R = R_series + R_parallel = 12 + R/2 = 16.\n- Step 3: R/2 = 4, so R = **8 Ω** each. Check: 8 Ω ∥ 8 Ω = 4 Ω. Add series 12 Ω gives 16 Ω ✓", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "Explain what happens to the power dissipated in a resistor when the voltage across it is doubled, assuming resistance stays constant. (2 steps)", "answer": "- From the power formula P = V²/R, if voltage is doubled (V → 2V) and R is constant, then: $$P_{new} = \\frac{(2V)^2}{R} = \\frac{4V^2}{R} = 4P_{old}$$\n- Power increases by a factor of 4. This is important for circuit design — doubling voltage can cause massive increases in power dissipated as heat, which may damage components.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Two identical lamps are connected in series to a battery. One lamp then blows (becomes an open circuit). What happens to the other lamp? Explain. (2 steps)", "answer": "- In a series circuit, there is only one path for current. When one lamp blows (open circuit), the path is broken — no current can flow anywhere in the circuit.\n- The other lamp will **go out** immediately. Even though it is not damaged, it cannot operate because current cannot flow through the broken lamp. This contrasts with parallel circuits, where if one branch opens, the other branches continue to operate independently.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Two identical lamps are connected in parallel to a battery. One lamp then blows (becomes an open circuit). What happens to the other lamp? Explain. (2 steps)", "answer": "- In a parallel circuit, each branch operates independently. When one lamp blows, its branch becomes open, but the other branch still connects both terminals of the battery.\n- The other lamp continues to operate normally, with the same voltage and current as before. This is why household wiring is parallel — if one appliance fails, others keep working.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A student calculates the total resistance of a 4 Ω and 6 Ω resistor in parallel as 10 Ω. Explain the two most common errors in parallel resistance calculations and how to avoid them. (2 steps)", "answer": "- The two common errors are: (1) Adding resistances directly as if they were in series: R_total ≠ R1 + R2; (2) Forgetting to take the reciprocal at the end.\n- The correct method: 1/R_total = 1/4 + 1/6 = 0.25 + 0.167 = 0.417 Ω⁻¹. Then R_total = 1/0.417 = **2.4 Ω**. Always remember: **add reciprocals, then reciprocal** — never add resistances directly in parallel.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In the circuit J-K-L-M from the lesson, the source is 9.0 V, the voltage across the parallel section is 2.0 V, and the current through the series resistor K is 3.0 A. A student calculates the total loop voltage as 7 + 2 + 2 = 11 V. Explain why this is wrong and what the correct total should be. (2 steps)", "answer": "- Step 1: The student has double-counted the parallel section. A charge going through the circuit travels through K (losing 7 V) and then through either L OR M (losing 2 V) — never both.\n- Step 2: The correct KVL calculation traces ONE complete path: either through K then L (7 + 2 = 9 V), or through K then M (7 + 2 = 9 V). Both give 9.0 V = ε. The key insight: in parallel circuits, each branch represents an alternative path, not a sequential energy loss.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": true}, {"question": "State the three fundamental electrical definitions involving charge Q, energy E, current I, voltage V, and time t, with their units. (1 step)", "answer": "- Current: $$I = \\frac{Q}{t}$$ — ampere (A) = coulombs per second (C/s)\n- Potential difference: $$V = \\frac{E}{Q}$$ — volt (V) = joules per coulomb (J/C)\n- Resistance: $$R = \\frac{V}{I}$$ — ohm (Ω) = volts per ampere (V/A)\n\nThese three definitions form the foundation for all circuit analysis.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "In a series circuit, does the current \"use up\" or \"lose\" energy as it passes through resistors? Explain the distinction between current and energy flow. (2 steps)", "answer": "- Step 1: No — current (the flow of charge) is conserved. The same amount of charge that enters a resistor leaves it. Charge is a physical quantity of particles; it is not \"used up.\"\n- Step 2: What is \"lost\" is **energy per charge** — the potential difference. The battery gives each coulomb a fixed amount of energy (e.m.f.). As charges pass through resistors, this energy is converted to other forms (heat, light), so the energy per charge decreases. The current remains the same; only the voltage drops.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "A student says \"the voltage is the same at every point in a circuit.\" Is this always true? Explain with examples from series and parallel circuits. (2 steps)", "answer": "- Step 1: No, this is only true in **parallel** circuits (across each branch). In series circuits, voltage is shared — different points have different potentials.\n- Step 2: For example, in a series circuit with 12 V battery and two resistors, the point after the first resistor has a lower voltage than the point after the second resistor. Each resistor causes a voltage drop. Only in parallel (where every branch connects directly to both terminals) is the voltage the same across all branches.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Describe the \"Charlie the Coulomb\" analogy for understanding voltage in a series circuit. How does this help resolve the misconception that voltage is the same everywhere? (2 steps)", "answer": "- Step 1: Imagine \"Charlie\" as a single coulomb of charge traveling around the circuit. At the battery (the \"filling station\"), Charlie loads up with energy — if the battery is 12 V, Charlie gains 12 J of energy.\n- Step 2: As Charlie passes through each resistor, he loses some of this energy (converted to heat/light). After the first resistor, he might have 7 J left; after the second, 2 J; at the end, 0 J. The current (how fast Charlie moves) stays constant — but his energy content (voltage) decreases at each component. This visualizes why voltage drops in series while current stays the same.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "A student attempts to derive the parallel resistance formula by starting with R_total = R1 + R2 and substituting V = IR. Explain why this approach fails and what the correct starting point should be. (2 steps)", "answer": "- Step 1: Starting with R1 + R2 is the series approach — it's the wrong fundamental principle. You end up with (V₁/I₁ + V₂/I₂), which becomes a messy fraction that doesn't simplify to the parallel formula.\n- Step 2: The correct approach is to start with the quantity that **adds up** in parallel: **current**. Start with I_total = I1 + I2, then substitute I = V/R. This is exactly what Phuc learned in the lesson — choosing the right starting principle is essential for the derivation to work.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": true}, {"question": "For each of the following, state whether the components are in series, parallel, or neither: (a) Two resistors with one wire connecting one end of each to the same point, and the other ends connected to different points. (b) Two resistors connected to the same two nodes. (c) Three resistors where the first connects to the second, and the second connects to the third, with the ends brought out to terminals. (3 steps)", "answer": "- Step 1: (a) **Neither** — this is not a valid circuit connection. Each resistor has one end at the same point, but their other ends are at different points with no connection between them. This is incomplete.\n- Step 2: (b) **Parallel** — both resistors connect between the same two nodes. This is the definition of parallel.\n- Step 3: (c) **Series** — the resistors form a single continuous path: current must pass through R1, then R2, then R3 in sequence. There are no junctions between them.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": true}, {"question": "In exam-style questions on Kirchhoff's laws, what is the recommended four-part structure for answering \"state and explain\" questions? (2 steps)", "answer": "- Step 1: (1) Name the law (Kirchhoff's First/Second Law). (2) State it in words, referencing the conservation principle (charge for KCL, energy for KVL). (3) Write the equation (ΣI_in = ΣI_out, or Σε = ΣIR). (4) Apply numerically to the specific circuit.\n- Step 2: Mark schemes often reward simply naming the correct law and stating its physical basis. The keywords \"conservation of charge\" and \"conservation of energy\" are high-value terms to include.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "A 9.0 V battery is connected to three resistors in series: R1 = 2.0 Ω, R2 = 3.0 Ω, R3 = 4.0 Ω. Calculate: (a) total resistance, (b) total current, (c) voltage across each resistor. (3 steps)", "answer": "- Step 1: (a) R_total = 2.0 + 3.0 + 4.0 = **9.0 Ω**\n- Step 2: (b) I_total = ε / R_total = 9.0 V / 9.0 Ω = **1.0 A**\n- Step 3: (c) V1 = IR = 1.0 × 2.0 = **2.0 V**; V2 = 1.0 × 3.0 = **3.0 V**; V3 = 1.0 × 4.0 = **4.0 V**. Check: 2.0 + 3.0 + 4.0 = 9.0 V = ε ✓ (KVL)", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "Explain why ammeters must be connected in series and voltmeters must be connected in parallel to measure current and voltage correctly. (2 steps)", "answer": "- Step 1: **Ammeters** measure current by actually being part of the current path. They must have very low resistance so they don't change the circuit. Connecting them in series means all the current flows through them, giving an accurate reading.\n- Step 2: **Voltmeters** measure the potential difference between two points. They must have very high resistance so they draw negligible current from the circuit. Connecting them in parallel (across a component) places them between the two points whose potential difference you want to measure, without affecting the current flow.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "A circuit consists of a battery, a 5.0 Ω resistor, and two resistors of 10 Ω each in parallel. The total current is 2.0 A. Find: (a) battery voltage, (b) current through each 10 Ω resistor. (3 steps)", "answer": "- Step 1: Two 10 Ω in parallel = (10 × 10)/(10 + 10) = 100/20 = 5.0 Ω. Total R = 5.0 + 5.0 = 10 Ω.\n- Step 2: (a) ε = I × R_total = 2.0 A × 10 Ω = **20 V**\n- Step 3: (b) Voltage across parallel section = ε − IR_series = 20 − (2.0 × 5.0) = 20 − 10 = 10 V. Each 10 Ω branch has 10 V across it, so current in each = V/R = 10/10 = **1.0 A**. Check: 1.0 + 1.0 = 2.0 A ✓ (KCL)", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "Summarize the key differences between series and parallel circuits in a table format, covering current, voltage, resistance rules, and the effect on total resistance when adding components. (2 steps)", "answer": "- Step 1:\n\n| Property | Series | Parallel |\n|---|---|---|\n| Current | Same everywhere (I₁ = I₂ = I) | Splits at junctions (I_total = I₁ + I₂) |\n| Voltage | Shared/split (V_total = V₁ + V₂) | Same across each branch (V₁ = V₂ = V) |\n| Resistance | R_total = R₁ + R₂ + ... | 1/R_total = 1/R₁ + 1/R₂ + ... |\n| Adding R | Increases total R | Decreases total R |\n\n- Step 2: Remember: **Series = Same I, Add V, Add R; Parallel = Same V, Add I, Add 1/R.** This mnemonic captures the essential behaviors.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}], "count": 49}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A battery supplies 3.0 A to a circuit for 60 seconds. How much charge has flowed through the battery? (1 step)", "answer": "- Step 1: Rearrange I = Q/t to Q = I × t. Convert 60 s (no conversion needed), so Q = 3.0 A × 60 s = 180 C.\n\nCharge is conserved — it's the amount of \"stuff\" (electrons) flowing, not the rate.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "What does potential difference (voltage) physically represent, and why is it defined as energy per unit charge? (2 steps)", "answer": "- Step 1: Potential difference V is defined as V = E/Q, where E is energy transferred and Q is charge. One volt equals one joule per coulomb.\n\n+ This means: if V = 5 V, then each coulomb of charge transfers 5 J of energy as it passes through that component.\n\n- Step 2: We define it this way because charge itself is conserved (electrons don't disappear), but energy per charge changes as work is done by or on the charge at each component. This is why voltage \"drops\" across resistors but current stays the same in series.\n\nVoltage tells us how much energy each individual charge gives up or gains — it's an intensive quantity (per unit), not extensive.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "State Kirchhoff's First Law and identify which fundamental conservation principle it represents. (1 step)", "answer": "- Step 1: Kirchhoff's First Law states: At any junction, the sum of currents entering equals the sum of currents leaving. Mathematically: ∑I_in = ∑I_out.\n\nThis law is a direct consequence of the **conservation of charge** — charge cannot be created, destroyed, or stored at a junction. Every coulomb that arrives must immediately leave by some other route.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "In a series circuit with no junctions, how does Kirchhoff's First Law apply if there's no obvious \"splitting point\"? (2 steps)", "answer": "- Step 1: In a series circuit, there are no branch junctions — it's one continuous loop. Charge enters one end of a wire segment and leaves the other end at the same rate.\n\n- Step 2: Therefore, the current is the same everywhere: I_in = I_out at every cross-section. KCL is trivially satisfied. This is why we say \"current is the same everywhere in series\" — it's not a separate rule, it's KCL applied to a circuit with no junctions.\n\nKCL is always true — it's not a rule about \"parallel circuits only.\" It's about conservation of charge at every point.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A junction has three wires. Currents of 0.35 A and 0.15 A enter the junction, while one wire carries current away. What is the current leaving? (1 step)", "answer": "- Step 1: Apply KCL: I_in = I_out. Total in = 0.35 + 0.15 = 0.50 A. Therefore, current leaving = 0.50 A.\n\nThe total charge entering per second must equal the total charge leaving per second — conservation of charge.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Why is it wrong to say \"Kirchhoff's First Law only applies to parallel circuits\"? (2 steps)", "answer": "- Step 1: KCL is a statement about conservation of charge, not about circuit topology. It holds at every single junction in every circuit, every time.\n\n- Step 2: In series circuits, there are no junction points where current splits, so KCL reduces to \"current in = current out\" trivially everywhere. In parallel circuits, current splits at junctions, and KCL tells us how it splits. The law is the same; only the configuration differs.\n\nA common exam trap — KCL is always true regardless of whether components are in series or parallel.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": true}, {"question": "State Kirchhoff's Second Law and identify which fundamental conservation principle it represents. (1 step)", "answer": "- Step 1: Kirchhoff's Second Law states: Around any closed loop, the sum of e.m.f.s equals the sum of potential drops. Mathematically: ∑ε = ∑IR (or ∑V = 0 around a loop).\n\nThis law is a direct consequence of the **conservation of energy** — energy cannot be created or destroyed in a circuit. The battery supplies energy (e.m.f.), and resistors dissipate that energy as heat (potential drops).", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Using the \"Charlie the Coulomb\" analogy, explain why the potential difference across a series circuit adds up to the source voltage. (2 steps)", "answer": "- Step 1: Imagine a single charge carrier (\"Charlie the Coulomb\") traveling around a series circuit. At the battery, Charlie gains energy — if the e.m.f. is 9.0 V, Charlie gains 9.0 J of energy per coulomb (the \"filling station\").\n\n- Step 2: As Charlie passes through each component (resistors), he loses energy. If he loses 6.0 J/C at the first resistor and 3.0 J/C at the second, he ends with 0 J/C. The total energy lost (6.0 + 3.0 = 9.0 J/C) equals what he gained. Energy is conserved: ε = V₁ + V₂ + ...\n\nThe charge itself is conserved (same amount goes in and out), but the energy per charge decreases at each component.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "In a circuit with a 9.0 V battery, a resistor K (7.0 V drop), and a parallel section L∥M (2.0 V drop), a student calculates 7 + 2 + 2 = 11 V and says KVL is violated. Explain the error. (2 steps)", "answer": "- Step 1: The student has double-counted the parallel section. In the parallel branches, a single charge goes through K, then takes either L OR M — not both branches.\n\n- Step 2: For any complete single loop (the only physically possible path), we have either K → L (7 + 2 = 9 V) or K → M (7 + 2 = 9 V). Either way, the sum equals the e.m.f. KVL applies to each closed loop separately, not by adding both parallel branches simultaneously.\n\nThis is a classic trap — remember that charges don't split and go through both branches; they choose one path.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Derive the formula for the combined resistance of resistors in series from first principles. (3 steps)", "answer": "- Step 1: Start with the principle that adds up in series: conservation of energy gives voltage addition. Write: V_total = V₁ + V₂ (KVL).\n\n- Step 2: Apply Ohm's Law (V = IR) to each component: I R_total = I R₁ + I R₂, where I is the current through each (since current is the same everywhere in series).\n\n- Step 3: Cancel I from both sides: R_total = R₁ + R₂. This extends to any number of resistors in series.\n\nThe key insight: we start with the quantity that adds (voltage) because series is about voltage sharing.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": true}, {"question": "Two resistors of 4.0 Ω and 12 Ω are connected in series. What is the total resistance? (1 step)", "answer": "- Step 1: For resistors in series, simply add: R_total = 4.0 + 12 = 16 Ω.\n\nAdding resistance in series always increases the total — we're restricting current flow more by adding more resistive material.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "In a series circuit with a 6.0 V battery and two resistors (4.0 Ω and 12 Ω), calculate the current and the potential difference across each resistor. (2 steps)", "answer": "- Step 1: Total R = 4.0 + 12 = 16 Ω. Total current I = V/R = 6.0/16 = 0.375 A (same everywhere in series).\n\n- Step 2: V_across_4Ω = I × R = 0.375 × 4.0 = 1.5 V. V_across_12Ω = 0.375 × 12 = 4.5 V. Check: 1.5 + 4.5 = 6.0 V ✓ (KVL).\n\nSame current through both, but different voltage drops because V = IR — different resistances give different energies per charge.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Why is the potential difference across resistors in a series circuit NOT the same, even though the current is the same? (2 steps)", "answer": "- Step 1: Current is the same because charge is conserved — the same amount of charge flows through each component per second (no junctions to split at).\n\n- Step 2: However, V = IR. If I is the same but R is different, then V must differ. Each resistor does different amounts of work on the charge (dissipating different amounts of energy per coulomb). The voltage drop represents energy loss per charge, not the amount of charge flowing.\n\nA key misconception: same I doesn't imply same V. Only I is uniform in series; V depends on R.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": true}, {"question": "Derive the formula for the combined resistance of two resistors in parallel from first principles. (3 steps)", "answer": "- Step 1: Start with the principle that adds up in parallel: conservation of charge gives current addition. Write: I_total = I₁ + I₂ (KCL).\n\n- Step 2: Apply Ohm's Law in the form I = V/R to each branch: V/R_total = V/R₁ + V/R₂. In parallel, voltage is the same across each branch.\n\n- Step 3: Divide both sides by V: 1/R_total = 1/R₁ + 1/R₂. The total resistance is always less than the smallest branch resistance.\n\nThe key insight: we start with the quantity that adds (current) because parallel is about current splitting.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Two resistors of 4.0 Ω and 12 Ω are connected in parallel. Calculate the combined resistance. (1 step)", "answer": "- Step 1: Use 1/R_total = 1/4.0 + 1/12 = 0.25 + 0.0833 = 0.3333 Ω⁻¹. Therefore R_total = 1/0.3333 = 3.0 Ω.\n\nNotice: 3.0 Ω is less than 4.0 Ω (the smallest branch). This is always true — parallel resistance is always less than the smallest individual resistance because we're providing more paths for current to flow.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "What is the combined resistance of two equal resistors R in parallel? (1 step)", "answer": "- Step 1: Using 1/R_total = 1/R + 1/R = 2/R, so R_total = R/2.\n\nFor two equal resistors in parallel, the combined resistance is exactly half of each individual resistance. More paths = easier flow = lower resistance.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In a parallel circuit with a 6.0 V battery and two branches (2.0 Ω and 3.0 Ω), calculate the current in each branch and the total current. (2 steps)", "answer": "- Step 1: In parallel, voltage is the same across each branch: V = 6.0 V across both. I₁ = V/R₁ = 6.0/2.0 = 3.0 A. I₂ = V/R₂ = 6.0/3.0 = 2.0 A.\n\n- Step 2: Total current I_total = I₁ + I₂ (KCL) = 3.0 + 2.0 = 5.0 A. Check with combined R: R_parallel = (2×3)/(2+3) = 6/5 = 1.2 Ω. Then I = V/R = 6.0/1.2 = 5.0 A ✓\n\nSame voltage across each branch, but currents differ based on each branch's resistance.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Why is the total resistance in a parallel circuit always less than the smallest individual resistance? (2 steps)", "answer": "- Step 1: Adding a resistor in parallel creates an additional path for current to flow. It's like adding another lane to a highway — more routes for charges to travel means less overall obstruction.\n\n- Step 2: Mathematically, 1/R_total = 1/R₁ + 1/R₂ + ... Since each term on the right is positive, 1/R_total > 1/R_smallest, which means R_total < R_smallest.\n\nThis is a fundamental property: parallel circuits always reduce total resistance compared to any individual branch.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "For the combination circuit: R₁ = 8.0 Ω in series with a parallel pair R₂ = 3.0 Ω ∥ R₃ = 6.0 Ω, powered by a 12.0 V battery, calculate: (a) the total resistance, (b) the total current, (c) the p.d. across each component. (3 steps)", "answer": "- Step 1: Find parallel section first: 1/R₂₃ = 1/3.0 + 1/6.0 = 1/2.0, so R₂₃ = 2.0 Ω. Total R = 8.0 + 2.0 = 10.0 Ω.\n\n- Step 2: Total current I_total = V/R_total = 12.0/10.0 = 1.2 A. This current flows through R₁ (series rule).\n\n- Step 3: V_across_R₁ = I × R₁ = 1.2 × 8.0 = 9.6 V. By KVL, V_across_parallel = 12.0 - 9.6 = 2.4 V (same across both R₂ and R₃). Then I₂ = 2.4/3.0 = 0.80 A, I₃ = 2.4/6.0 = 0.40 A. Check: 0.80 + 0.40 = 1.2 A ✓\n\nAlways solve parallel sections first, then treat them as single resistors in series.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A student writes R = V × I. Explain why this is wrong and what the correct relationship is. (2 steps)", "answer": "- Step 1: R = V × I gives units of V·A (volts times amps), which is watts — not ohms. This is a fundamental unit error.\n\n- Step 2: The correct relationship is R = V/I. Resistance is defined as the ratio of potential difference to current. From Ohm's Law: V = IR, so R = V/I.\n\nAlways write R = V/I — never the reverse. This error commonly appears in exam traps.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A student says \"resistors store electrons.\" Explain why this is incorrect. (2 steps)", "answer": "- Step 1: Resistors do not store charge. Charge (electrons) flows through the resistor and out the other side — it's a conserved physical quantity.\n\n- Step 2: What resistors do is dissipate electrical energy as heat. They resist the flow of charge (converting electrical energy to thermal energy), but the charge itself passes through. No electrons accumulate in a resistor under normal conditions.\n\nThis misconception confuses energy transfer with charge storage — they're different physical quantities.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "In a complex circuit, you need to find an unknown resistor in a parallel branch. What is the recommended first step? (1 step)", "answer": "- Step 1: Start with KCL at the junction. Find whatever current you can determine first (usually the total current or a known branch current), then use that to find other currents via I_total = I₁ + I₂ + ...\n\nFrom the lesson analysis, the tutor's key advice was: \"Start with the current in C — it's the easiest.\" Use conservation of charge as your entry point.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "When deriving the combined resistance for a parallel circuit, why must you start with I_total = I₁ + I₂ rather than starting with R = R₁ + R₂? (2 steps)", "answer": "- Step 1: In parallel circuits, current is what adds up (charges split at junctions). Starting with R = R₁ + R₂ applies to series, not parallel.\n\n- Step 2: If you start with the series approach in a parallel problem, you get a complex fraction (V₁I₂ + V₂I₁)/(I₁I₂) and get stuck. The proof must start from the conservation principle relevant to that circuit type: charge conservation → current rules; energy conservation → voltage rules.\n\nThis is the \"proof starting-point rule\" — always start with the quantity that actually adds in that configuration.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": true}, {"question": "In a combination circuit, should you solve the series parts or parallel parts first? Why? (1 step)", "answer": "- Step 1: Always solve parallel parts first, then add series resistances. This is because parallel combinations reduce to a single equivalent resistance that can then be treated as one component in series.\n\nIf you try to apply one formula to the whole circuit at once, you'll get the wrong answer. The textbook explicitly warns: \"do not try to do it all in one go.\"", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Convert the following: (a) 5 mA to amperes, (b) 0.75 μA to amperes, (c) 4.7 kΩ to ohms. (1 step)", "answer": "- Step 1: (a) 5 mA = 5 × 10⁻³ A = 0.005 A. (b) 0.75 μA = 0.75 × 10⁻⁶ A = 7.5 × 10⁻⁷ A. (c) 4.7 kΩ = 4.7 × 10³ Ω = 4700 Ω.\n\nCommon prefix trap: m = 10⁻³, μ = 10⁻⁶, k = 10³. Always convert to base SI units before substituting into equations.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Explain why in a parallel circuit, the voltage across each branch is the same as the source voltage. (2 steps)", "answer": "- Step 1: In parallel, all branches connect directly between the same two points (nodes). Both ends of each branch are at the same electrical potential as the battery terminals.\n\n- Step 2: Consider \"Charlie the Coulomb\" — whether he goes through branch 1 or branch 2, he starts at the positive terminal (say, +9 V) and ends at the negative terminal (0 V). The energy drop per charge is the same regardless of path. That's why V = V₁ = V₂ = V_source.\n\nThis is a direct consequence of energy conservation (KVL) — every complete loop must give the same total energy change.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": true}, {"question": "A 3.0 Ω resistor and an unknown resistor R are in parallel with 4.8 V across them. The total current from the supply is 2.4 A. Find the resistance R. (2 steps)", "answer": "- Step 1: Current through 3.0 Ω branch: I₁ = V/R = 4.8/3.0 = 1.6 A. Using KCL at the junction: I_total = I₁ + I₂, so I₂ = 2.4 - 1.6 = 0.8 A.\n\n- Step 2: The unknown resistance: R = V/I₂ = 4.8/0.8 = 6.0 Ω.\n\nThe key was starting with the current rule (KCL) — find what you can, then work backward.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "In a series circuit, what happens to the total resistance when you add another resistor in series? In a parallel circuit, what happens when you add another resistor in parallel? (1 step)", "answer": "- Step 1: In series: total resistance increases (R_total = R₁ + R₂ + ...). In parallel: total resistance decreases (1/R_total = 1/R₁ + 1/R₂ + ...).\n\nSeries adds resistance because we're adding more material that resists flow. Parallel decreases resistance because we're adding more paths for current.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Why must you \"take the reciprocal\" when calculating total resistance in parallel? (1 step)", "answer": "- Step 1: Because resistance isn't additive in parallel — it's the conductance (1/R) that adds. We derive 1/R_total = 1/R₁ + 1/R₂, so we must invert (reciprocal) to get R_total.\n\nThink of it physically: adding parallel paths increases conductance (easier flow), not resistance. Adding conductances is simple; adding resistances requires this reciprocal method.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A student calculates the total resistance of a 60 Ω and 30 Ω resistor in parallel and gets 90 Ω. Explain what's wrong and find the correct answer. (2 steps)", "answer": "- Step 1: The student incorrectly added the resistances directly (60 + 30 = 90 Ω), forgetting that parallel resistance uses reciprocals and is always less than the smallest branch.\n\n- Step 2: Correct calculation: 1/R_total = 1/60 + 1/30 = 1/60 + 2/60 = 3/60 = 1/20, so R_total = 20 Ω. This is less than 30 Ω, as expected for parallel.\n\nA common trap — never add parallel resistances directly. Always use the reciprocal formula or product-over-sum (R₁R₂/(R₁+R₂)) for two resistors.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "For the circuit with resistor C in series with parallel pair A∥B, where I_A = 0.8 A, I_B = 1.2 A, and R_A = 12 Ω, find: (a) current in C, (b) voltage across A, (c) resistance of B. (3 steps)", "answer": "- Step 1: (a) Apply KCL at the junction: I_C = I_A + I_B = 0.8 + 1.2 = 2.0 A.\n\n- Step 2: (b) Voltage across A: V_A = I_A × R_A = 0.8 × 12 = 9.6 V. In parallel, V_B = V_A = 9.6 V.\n\n- Step 3: (c) Resistance of B: R_B = V_B / I_B = 9.6 / 1.2 = 8.0 Ω.\n\nKey strategy: start with what you can determine (current at junction using KCL), then work outward using V = IR and the parallel voltage rule.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": true}, {"question": "What is the product-over-sum formula for two resistors in parallel, and when is it most useful? (1 step)", "answer": "- Step 1: For exactly two resistors in parallel: R_total = (R₁ × R₂) / (R₁ + R₂). This is a shortcut that avoids the reciprocal calculation.\n\nIt's most useful when you only have two resistors in parallel (common in exam questions) — faster than calculating 1/R₁ + 1/R₂, then inverting.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In a series-parallel combination, how should you approach calculating unknown currents and voltages? (2 steps)", "answer": "- Step 1: Follow this strategy: (1) Identify and solve the parallel sub-circuit(s) first — find R_parallel. (2) Add series resistances to get R_total. (3) Find total current from I = V/R_total.\n\n- Step 2: Then work backwards: (4) Use series rule (same I) for series elements. (5) Use KVL to find p.d. across parallel group. (6) Use I = V/R in each parallel branch. (7) Always check with KCL and KVL.\n\nNever try to apply one formula to the whole combination at once — break it into steps.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "When answering an exam question that asks you to \"derive the equation for combining resistances in series,\" what steps must you show? (2 steps)", "answer": "- Step 1: You must demonstrate: (1) Start with the appropriate conservation law (energy → voltage for series). (2) Write the voltage addition equation: V_total = V₁ + V₂. (3) Substitute Ohm's Law (V = IR) into each term. (4) Apply the current rule (I is the same in series). (5) Cancel I to get R_total = R₁ + R₂.\n\n- Step 2: The mark scheme expects you to explicitly show this reasoning chain — not just write the final formula. \"No ECF if no working\" is standard examiner practice.\n\nShow every step of the logical chain from conservation principle to final equation.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}], "count": 34}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "State Kirchhoff's First Law (KCL) in both words and equation form, and name the conservation principle it expresses. (3 steps)", "answer": "- Step 1: In words: at any junction in a circuit, the sum of currents flowing in equals the sum of currents flowing out. No charge piles up at the junction; whatever arrives must leave.\n- Step 2: In equation form: $$\\sum I_{in} = \\sum I_{out}$$ at every junction, every time.\n- Step 3: The underlying principle is **conservation of charge**. Charge is carried by physical particles (electrons) that cannot be created, destroyed, or stored in a wire — so the rate of charge entering a point must equal the rate leaving.\n\nTakeaway: KCL is not a \"parallel-only\" rule — it is a charge-counting rule that applies to every junction in every circuit.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "State Kirchhoff's Second Law (KVL) in both words and equation form, and name the conservation principle it expresses. (3 steps)", "answer": "- Step 1: In words: around any closed loop in a circuit, the sum of e.m.f.s equals the sum of potential drops ($$IR$$ terms).\n- Step 2: In equation form: $$\\sum \\varepsilon = \\sum IR$$ taken around any single closed loop.\n- Step 3: The principle is **conservation of energy**. A charge that returns to its starting point in a loop has gained no net energy — whatever joules per coulomb it picked up at the source(s) must be dissipated across the components in that loop.\n\nTakeaway: KVL is an energy bookkeeping statement applied to one closed path at a time.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why is KCL trivially satisfied at every point in a series circuit even though there are no branching junctions? (2 steps)", "answer": "- Step 1: In a series circuit, every cross-section of wire has exactly one wire entering and one wire leaving — there is nowhere for charge to split off.\n- Step 2: Since charge cannot accumulate in the wire (conservation of charge), the rate of charge entering any cross-section equals the rate leaving. Hence $$I_{in} = I_{out}$$ at every point, which is why the current is identical everywhere in a series loop.\n\nMisconception probe: KCL doesn't only \"activate\" at branching points — it holds everywhere; in series it just gives the trivial statement \"current in = current out\".", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "A learner argues: \"In a series circuit the current is the same everywhere, so by the same logic the potential difference must also be the same across every component.\" What's wrong with this reasoning? (3 steps)", "answer": "- Step 1: The reasoning conflates two different conserved quantities. Current measures *charge per unit time* — and charge is conserved, so the count of electrons passing per second cannot change along a single wire.\n- Step 2: Potential difference measures *energy per unit charge* ($$V = E/Q$$). Even though the same number of charges flow per second, each charge loses energy as it passes through a resistor, so the joules-per-coulomb decreases from one side of a resistor to the other.\n- Step 3: Conclusion: same I everywhere ≠ same V everywhere. In fact $$V = IR$$, so equal I with unequal R must give unequal V. The two quantities obey *different* conservation laws (charge for I; energy for V).\n\nTakeaway: Current is about how many; voltage is about how much energy per one.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "Using the \"Charlie the Coulomb\" picture, explain why charge is unchanged but potential difference drops across a resistor. (3 steps)", "answer": "- Step 1: \"Charlie\" is a single coulomb of charge traveling around the circuit. At the battery he is given energy — say 100 J — so he leaves with 100 J/C, i.e. a potential of 100 V relative to the start.\n- Step 2: When Charlie passes through a resistor, he himself (the physical electrons) does not get destroyed — the *same* coulomb of charge exits the resistor. What he gives up is energy: say 60 J converted to heat, leaving him with 40 J/C.\n- Step 3: After all resistors he returns to the battery with 0 J/C of \"excess\" energy. So the *number* of charges flowing per second (current) is unchanged through every component, but the *energy per charge* (potential) drops at each resistor.\n\nTakeaway: Resistors dissipate energy, not charge.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "A student insists \"resistors store electrons, which is why current is reduced.\" Why is this wrong? (2 steps)", "answer": "- Step 1: Electrons are conserved — they cannot pile up in any component. Whatever rate of electrons enters a resistor must exit, otherwise charge would accumulate (violating conservation of charge) and the circuit could never reach a steady state.\n- Step 2: A resistor *resists* the flow by converting some of the electrical energy carried by the charges into thermal energy (heat). The current through the resistor is set by $$I = V/R$$, not by any \"storage\" mechanism.\n\nMisconception probe: Capacitors store charge; resistors do not. Resistors transform energy form (electrical → thermal).", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "Derive $$R_T = R_1 + R_2$$ for two resistors in series from first principles. State which conservation principle you start from and why. (4 steps)", "answer": "- Step 1: Start from **conservation of energy** (KVL), because in series the quantity that *adds* is the voltage. Write: $$V_T = V_1 + V_2$$.\n- Step 2: Apply Ohm's law $$V = IR$$ to each term: $$I_T R_T = I_1 R_1 + I_2 R_2$$.\n- Step 3: Apply the series current rule (KCL trivially gives same current everywhere): $$I_T = I_1 = I_2 = I$$, so $$I R_T = I R_1 + I R_2$$.\n- Step 4: Cancel the common factor $$I$$: $$R_T = R_1 + R_2$$.\n\nTakeaway: The rule \"start from the quantity that adds up\" prevents the student from getting stuck — in series, voltage adds.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Derive $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$ for two resistors in parallel from first principles. Why must you start from current, not voltage? (4 steps)", "answer": "- Step 1: In parallel the *current* splits and adds (voltage is the same across each branch). So start from **conservation of charge** (KCL): $$I_T = I_1 + I_2$$. Starting from $$R_1 + R_2$$ leads to an ungainly fraction that doesn't simplify.\n- Step 2: Apply Ohm's law in the form $$I = V/R$$ to each term: $$\\dfrac{V_T}{R_T} = \\dfrac{V_1}{R_1} + \\dfrac{V_2}{R_2}$$.\n- Step 3: Apply the parallel voltage rule (both branches share the same two nodes): $$V_T = V_1 = V_2 = V$$, so $$\\dfrac{V}{R_T} = \\dfrac{V}{R_1} + \\dfrac{V}{R_2}$$.\n- Step 4: Divide through by $$V$$: $$\\dfrac{1}{R_T} = \\dfrac{1}{R_1} + \\dfrac{1}{R_2}$$.\n\nTakeaway: In parallel, current is the quantity that adds, so the proof must launch from KCL.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "What is the general \"proof-starting-point\" rule for series vs parallel resistance derivations, and what conservation principle does each correspond to? (2 steps)", "answer": "- Step 1: Always start the proof from the quantity that *adds up* in that topology.\n+ Series → voltages add → start from $$V_T = V_1 + V_2$$ (KVL, conservation of energy).\n+ Parallel → currents add → start from $$I_T = I_1 + I_2$$ (KCL, conservation of charge).\n- Step 2: This works because Ohm's law lets you re-express the \"adding\" quantity in terms of $$R$$, and then the *shared* quantity (same I in series, same V in parallel) cancels out cleanly, leaving an equation involving only resistances.\n\nTakeaway: Conservation of Charge → current rule; Conservation of Energy → voltage rule.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Why is the combined resistance of any parallel network always less than the smallest individual branch resistance? (3 steps)", "answer": "- Step 1: Adding a branch in parallel gives charge another path to flow through, so for the same applied voltage more total current flows.\n- Step 2: From $$R = V/I$$, increasing $$I$$ at fixed $$V$$ must decrease the effective $$R$$.\n- Step 3: Mathematically: $$1/R_T = 1/R_1 + 1/R_2 + \\cdots$$. Since each term is positive, $$1/R_T$$ is strictly larger than any single $$1/R_k$$, so $$R_T < R_k$$ for every branch — in particular smaller than the smallest.\n\nEdge case: Two equal resistors $$R$$ in parallel give $$R/2$$; three equal $$R$$s give $$R/3$$; n equal $$R$$s give $$R/n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "A student computes two resistors in parallel and gets $$R_T$$ *larger* than one of the branches. Without redoing the arithmetic, how do you know they made a mistake, and what is the most likely error? (2 steps)", "answer": "- Step 1: Parallel combinations always reduce the total resistance below the smallest branch, because each extra branch provides an extra path for current. So $$R_T >$$ a branch value is physically impossible for a pure parallel pair.\n- Step 2: Most likely error: they forgot to take the reciprocal at the end. They computed $$1/R_1 + 1/R_2$$ and wrote that sum down as $$R_T$$ instead of inverting to get $$R_T = 1/(\\text{that sum})$$.\n\nAlternative: they added resistors directly ($$R_1 + R_2$$), which is the series rule, not parallel.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "For two parallel resistors, the \"product-over-sum\" formula gives $$R_T = R_1 R_2 / (R_1 + R_2)$$. Show this follows from the reciprocal formula, and explain why this shortcut does *not* generalize to three resistors. (3 steps)", "answer": "- Step 1: Starting from $$1/R_T = 1/R_1 + 1/R_2$$, put the right-hand side over a common denominator: $$1/R_T = (R_2 + R_1)/(R_1 R_2)$$.\n- Step 2: Invert both sides: $$R_T = R_1 R_2 / (R_1 + R_2)$$.\n- Step 3: For three resistors, $$1/R_T = 1/R_1 + 1/R_2 + 1/R_3$$ has common denominator $$R_1 R_2 R_3$$ and numerator $$R_2 R_3 + R_1 R_3 + R_1 R_2$$ — not a clean \"product over sum\". So the shortcut is a special case for n = 2 only; for more resistors stick to the reciprocal method (or combine two at a time).", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "In a series circuit, why is the current the same at every point but the potential difference shared between components? Frame your answer in terms of which conservation law applies where. (3 steps)", "answer": "- Step 1: Current is the same everywhere because of **conservation of charge** (KCL). With only one path, the number of charges per second passing any cross-section must be identical — there is nowhere else for them to go.\n- Step 2: Potential difference is *shared* because of **conservation of energy** (KVL). Each charge gains $$\\varepsilon$$ joules per coulomb at the source, then must dissipate that same total amount across the resistors before returning to the source.\n- Step 3: So in symbols: $$I_1 = I_2 = \\cdots = I$$ (charge rule) and $$V_T = V_1 + V_2 + \\cdots$$ (energy rule). The two rules answer different physical questions — one about \"how many charges\", one about \"how much energy per charge\".", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "In a parallel circuit, why is the potential difference the same across every branch but the current split between them? (3 steps)", "answer": "- Step 1: All branches connect between the same two circuit nodes. The potential difference is determined entirely by the energy per charge between those two nodes — and there is only one such value, so $$V_1 = V_2 = \\cdots = V$$.\n- Step 2: The current splits because of KCL at the junction where the wires divide: $$I_T = I_1 + I_2 + \\cdots$$. Each branch draws current set by Ohm's law $$I_k = V/R_k$$, so a branch with smaller $$R_k$$ draws more current.\n- Step 3: Physical picture: a single charge takes one branch only (not all of them), but at the junction the total flow rate splits among the available paths in proportion to $$1/R_k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Consider a circuit with source $$\\varepsilon = 9.0\\ \\text{V}$$, a single series resistor K, and then a parallel pair L and M. A student writes the KVL equation as $$\\varepsilon = V_K + V_L + V_M$$. Why is this wrong, and what is the correct loop equation? (3 steps)", "answer": "- Step 1: KVL applies to a single *closed loop* — that is, a single complete path a charge can take from one terminal of the source back to the other. A charge passing through K then enters the parallel section and takes *either* branch L *or* branch M, not both.\n- Step 2: So there are two valid loops: $$\\varepsilon = V_K + V_L$$ (loop through L) and $$\\varepsilon = V_K + V_M$$ (loop through M). Since L and M share the same two nodes, $$V_L = V_M$$, so both equations give the same answer.\n- Step 3: Writing $$V_K + V_L + V_M$$ double-counts the parallel section — it would correspond to a charge passing through both branches in series, which is geometrically impossible.\n\nMisconception probe: KVL is per loop, not per \"every drop in the circuit\".", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Suppose three resistors $$R_1 = 30\\ \\Omega$$, $$R_2 = 20\\ \\Omega$$, $$R_3 = 20\\ \\Omega$$ are in series across some battery. Without computing exact branch currents, describe how the supply voltage distributes among them and identify which resistor has the largest p.d. (2 steps)", "answer": "- Step 1: In series the same current $$I$$ flows through all three, so $$V_k = I R_k$$. The p.d. across each resistor is therefore directly proportional to its resistance.\n- Step 2: $$R_1 = 30\\ \\Omega$$ is largest, so it gets the largest share of the supply voltage — specifically $$30/(30+20+20) = 3/7$$ of it. The two 20 Ω resistors each get $$2/7$$. Total resistance is $$70\\ \\Omega$$, so for, say, a 7 V supply the drops would be 3 V, 2 V, 2 V — easy mental check.\n\nTakeaway: In series, p.d. is shared *in proportion to resistance*.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "Two resistors are connected in parallel: $$R_1 = 4\\ \\Omega$$ and $$R_2 = 12\\ \\Omega$$. Without computing exact numbers, in what ratio does the current split between them, and why? (2 steps)", "answer": "- Step 1: Both branches share the same potential difference $$V$$. So $$I_k = V/R_k$$, meaning current in each branch is *inversely* proportional to that branch's resistance.\n- Step 2: Hence $$I_1 / I_2 = R_2 / R_1 = 12/4 = 3$$. The 4 Ω branch carries three times the current of the 12 Ω branch. Three-quarters of the total current goes through the 4 Ω branch, one-quarter through the 12 Ω.\n\nTakeaway: In parallel, current splits *inversely* with resistance — the easier path gets more current.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "Explain why a \"parallel resistance is always less than the smallest branch\" rule does not contradict energy conservation, even though adding more resistors seems like it should add more resistance. (3 steps)", "answer": "- Step 1: Energy conservation governs how much *power* the source must deliver, not the value of the combined resistance. Adding a parallel branch keeps the voltage the same but opens up another path, so more current flows from the source.\n- Step 2: More current at the same voltage means the source delivers more power ($$P = VI$$), and the new branch dissipates additional power — energy is still conserved (source power = sum of all branch powers).\n- Step 3: The combined resistance $$R_T = V/I_T$$ drops because $$I_T$$ went up while $$V$$ stayed fixed. Mathematically the source now \"sees\" an easier load. No conservation law is violated; we just gave charge more routes.\n\nIntuition: more lanes on a motorway means more cars get through per second — total resistance to flow drops.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "For a combination network (series + parallel), why must you collapse the parallel sub-circuits *first* before adding the series resistances, rather than attempting a single global formula? (3 steps)", "answer": "- Step 1: The formulas $$R_T = \\sum R$$ (series) and $$1/R_T = \\sum 1/R$$ (parallel) apply only to *pure* topologies. A combination network has neither a single global series structure nor a single global parallel structure.\n- Step 2: By collapsing each parallel sub-block into one equivalent resistor, you reduce that sub-block to a simple resistor that *is* in series with the rest. Now the whole reduced circuit is in pure series form, and you can add directly.\n- Step 3: Trying to apply one formula to the whole network treats all resistors as if they shared identical topology, which is geometrically wrong and gives nonsense answers — typically a number not even close to either the series sum or parallel reciprocal.\n\nProcedure: identify the innermost parallel sub-block → reduce to single equivalent → repeat outward → finally add the outer series resistors.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "A combination circuit has $$R_1 = 8\\ \\Omega$$ in series with a parallel pair $$R_2 = 3\\ \\Omega$$ and $$R_3 = 6\\ \\Omega$$, all across a battery. Conceptually walk through how to find: (a) the total resistance, (b) the current from the battery, and (c) the p.d. across the parallel section — without doing big arithmetic. (4 steps)", "answer": "- Step 1: Collapse the parallel pair first. With $$3\\ \\Omega$$ and $$6\\ \\Omega$$ in parallel, the result is less than 3 Ω. Using product-over-sum: $$(3 \\times 6)/(3 + 6) = 18/9 = 2\\ \\Omega$$.\n- Step 2: Add in series: $$R_T = 8 + 2 = 10\\ \\Omega$$. Clean round number.\n- Step 3: Battery current $$I_T = \\varepsilon / R_T$$. For a 12 V battery this gives $$1.2\\ \\text{A}$$ — the same current flows through the 8 Ω resistor since it's in series with the rest.\n- Step 4: P.d. across the parallel section is just the leftover voltage after subtracting the drop across $$R_1$$. With $$V_1 = I_T R_1$$ and the rest by KVL: $$V_{\\text{parallel}} = \\varepsilon - V_1$$. Notice that 2 Ω out of 10 Ω carries 2/10 = 1/5 of the supply, so $$V_{\\text{parallel}} = 0.2 \\varepsilon$$.\n\nTakeaway: the supply voltage divides between the series resistor and the parallel block in proportion to their resistances.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "In the combination network above, conceptually how does the battery current split between the 3 Ω and 6 Ω branches, and what cross-check confirms your answer? (3 steps)", "answer": "- Step 1: Both parallel branches share the same p.d. (call it $$V_p$$). Branch currents go as $$I_k = V_p/R_k$$, so current is inversely proportional to branch resistance.\n- Step 2: With $$R_2 = 3\\ \\Omega$$ and $$R_3 = 6\\ \\Omega$$, the ratio $$I_2 : I_3 = 6 : 3 = 2 : 1$$. The 3 Ω branch carries twice the current of the 6 Ω branch. Out of the total current entering the parallel section, $$2/3$$ goes through the 3 Ω and $$1/3$$ through the 6 Ω.\n- Step 3: Cross-check with KCL: the two branch currents must add to the total current flowing in from the 8 Ω resistor. If they do, your split is correct.\n\nTakeaway: smaller R = more current; the ratio is exactly the inverse of the resistance ratio.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "Why does the \"two-step method\" of solving combination circuits naturally enforce both Kirchhoff's laws automatically? (3 steps)", "answer": "- Step 1: Step 1 (collapse parallel block to equivalent): this step uses the parallel rules — same voltage across each branch (KVL applied per loop) and currents adding at the junction (KCL). So building the equivalent resistor \"bakes in\" both laws for that sub-circuit.\n- Step 2: Step 2 (add series resistances): this uses series rules — same current through each (KCL trivially) and voltages adding (KVL around the loop). So adding R's straight enforces both laws again.\n- Step 3: Composition: by the time you've collapsed everything to a single equivalent $$R_T$$ and used $$I_T = \\varepsilon/R_T$$, every charge has been counted consistently at every junction (KCL) and every joule has been balanced around every loop (KVL).\n\nTakeaway: the method is just KCL + KVL applied locally, in the right order.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "A student writes the resistance formula as $$R = IV$$. Why is this wrong both dimensionally and conceptually? (3 steps)", "answer": "- Step 1: Dimensional check: $$IV$$ has units $$\\text{A} \\cdot \\text{V} = \\text{W}$$ (watts — power!), not ohms. So $$R = IV$$ would equate resistance with power, which is nonsense.\n- Step 2: The correct definition is $$R = V/I$$ (volts per amp = ohms). Resistance measures *how much voltage is needed per unit current* — the steeper the V-I slope, the more resistive.\n- Step 3: The confusion likely comes from $$P = IV$$ (power) and $$V = IR$$ (Ohm's law). Memorise: $$R = V/I$$ — always division of voltage by current, never product.\n\nMark scheme tip: write $$R = V/I$$ every time to lock in the correct form.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "A junction in a circuit has currents $$I_1 = 0.35\\ \\text{A}$$ and $$I_2 = 0.15\\ \\text{A}$$ flowing in, and one current $$I_3$$ flowing out. Conceptually find $$I_3$$ and explain how this reflects charge conservation. (2 steps)", "answer": "- Step 1: KCL at the junction: total in = total out, so $$I_3 = I_1 + I_2 = 0.35 + 0.15 = 0.50\\ \\text{A}$$.\n- Step 2: Physical meaning: charge cannot accumulate at the junction (electrons are conserved physical particles). Every 0.35 C/s arriving from one wire and 0.15 C/s from the other must leave at exactly 0.50 C/s, otherwise charge would pile up — which never happens in a steady circuit.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "Three equal resistors, each of resistance $$R$$, are connected in parallel. What is the combined resistance, and what is the rule for $$n$$ equal resistors in parallel? (2 steps)", "answer": "- Step 1: $$1/R_T = 1/R + 1/R + 1/R = 3/R$$, so $$R_T = R/3$$.\n- Step 2: For $$n$$ equal resistors in parallel: $$1/R_T = n/R$$, giving $$R_T = R/n$$. Useful mental shortcut — and it confirms parallel R is always less than the smallest branch (here $$R/n < R$$).\n\nQuick check: three 6 Ω resistors in parallel → $$6/3 = 2\\ \\Omega$$.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "A series circuit has a $$4\\ \\Omega$$ and a $$12\\ \\Omega$$ resistor across a 6 V supply. Without long arithmetic, work out the ratio of p.d.s across the two resistors and check that they sum to 6 V. (3 steps)", "answer": "- Step 1: Same current through both (series), so $$V_k = I R_k$$ — voltages are in the ratio of resistances. $$V_1 : V_2 = 4 : 12 = 1 : 3$$.\n- Step 2: So the 4 Ω takes 1/4 of the supply and the 12 Ω takes 3/4: $$V_1 = 6/4 = 1.5\\ \\text{V}$$, $$V_2 = 3 \\times 1.5 = 4.5\\ \\text{V}$$.\n- Step 3: KVL check: $$1.5 + 4.5 = 6.0\\ \\text{V}$$ ✓. Energy per coulomb gained at the battery (6 J) equals total dissipated (1.5 + 4.5 J).\n\nTakeaway: in series the p.d. distributes in proportion to R — this is the basis of the potential divider.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "A parallel combination of a 3 Ω branch and an unknown branch has 4.8 V across it. The total current from the supply is 2.4 A. Conceptually find the unknown branch resistance. (3 steps)", "answer": "- Step 1: The 3 Ω branch carries current $$I_1 = V/R_1 = 4.8/3 = 1.6\\ \\text{A}$$ (Ohm's law on that branch).\n- Step 2: By KCL the unknown branch carries $$I_2 = I_T - I_1 = 2.4 - 1.6 = 0.8\\ \\text{A}$$.\n- Step 3: That branch sees the same 4.8 V (parallel rule), so $$R_2 = V/I_2 = 4.8/0.8 = 6.0\\ \\Omega$$.\n\nCross-check: the unknown branch is 6 Ω, twice the 3 Ω, so it should carry half the current — and $$0.8 = 1.6 / 2$$ ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "A \"state and explain\" exam question asks: \"Use Kirchhoff's laws to explain how the current and potential difference distribute in a circuit.\" What four ingredients should your answer contain to get full marks? (4 steps)", "answer": "- Step 1: **Name** both laws explicitly: Kirchhoff's First Law (current) and Kirchhoff's Second Law (voltage).\n- Step 2: **State the conservation principle** behind each: KCL ↔ conservation of charge; KVL ↔ conservation of energy.\n- Step 3: **Write the mathematical statements**: $$\\sum I_{in} = \\sum I_{out}$$ at any junction; $$\\sum \\varepsilon = \\sum IR$$ around any closed loop.\n- Step 4: **Apply** to the specific circuit: identify junctions and loops, show how KCL determines current splits and KVL determines voltage shares.\n\nExaminer keywords: \"conservation of charge\", \"conservation of energy\", \"junction\", \"closed loop\". Use them verbatim.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Imagine you have three identical 10 Ω resistors. Describe (without drawing) the seven distinct combinations you can make using one, two, or three of them, and give the resulting resistance for each. (3 steps)", "answer": "- Step 1: One resistor alone: $$10\\ \\Omega$$. Two in series: $$20\\ \\Omega$$. Three in series: $$30\\ \\Omega$$.\n- Step 2: Two in parallel: $$10/2 = 5\\ \\Omega$$. Three in parallel: $$10/3 \\approx 3.3\\ \\Omega$$.\n- Step 3: Mixed: two in parallel ($$5\\ \\Omega$$) then in series with the third → $$5 + 10 = 15\\ \\Omega$$. Or: two in series ($$20\\ \\Omega$$) in parallel with the third → $$(20 \\times 10)/(20+10) = 200/30 \\approx 6.7\\ \\Omega$$.\n\nTotal: 10, 20, 30, 5, 3.3, 15, 6.7 Ω. Notice all the mixed ones lie *between* the pure series and pure parallel extremes.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Why is a parallel circuit topology preferred for home wiring rather than a series topology? (3 steps)", "answer": "- Step 1: In parallel, every appliance is connected between the same two supply rails, so each gets the full supply voltage (e.g. 230 V) independently — appliances are rated for that voltage and need it to operate.\n- Step 2: If one appliance fails (breaks the circuit on its branch), the other branches still form complete loops to the supply, so current still flows through them. Other lights and devices keep working.\n- Step 3: In series, one bulb failing would break the only loop, so *everything* would go dark. Also, the supply voltage would split across all components, so each would receive only a fraction of 230 V — far below rated voltage.\n\nTakeaway: parallel = independent branches, full voltage, fault tolerance.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "A current of 30 mA flows through a series circuit containing a 9.0 V battery, a diode with $$V_{\\text{diode}} = 1.5\\ \\text{V}$$, and a single resistor R. Use KVL to find the p.d. across R, and explain conceptually what units you must check. (3 steps)", "answer": "- Step 1: KVL around the loop: $$\\varepsilon = V_{\\text{diode}} + V_R$$. So $$V_R = 9.0 - 1.5 = 7.5\\ \\text{V}$$.\n- Step 2: The unit check: current was given as 30 mA = 0.030 A. If you wanted to find R, you'd use $$R = V_R/I = 7.5/0.030 = 250\\ \\Omega$$ — but only if you convert mA to A first. Plugging in \"30\" instead of \"0.030\" would give an answer 1000× too small.\n- Step 3: General rule: always convert to base SI units (A, V, Ω) before substituting into formulas. Watch out for m (10⁻³), μ (10⁻⁶), k (10³), M (10⁶).\n\nTrap: micro vs milli vs kilo prefix errors are among the most common in exams.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "When deriving the series resistance formula, why does the factor of $$I$$ cancel cleanly, but in the parallel derivation it's the factor of $$V$$ that cancels? What does this tell you about which quantity is \"the same\" in each topology? (3 steps)", "answer": "- Step 1: In series, $$I$$ is the *same* through every resistor (KCL trivially), so when you write $$V_T = V_1 + V_2$$ as $$IR_T = IR_1 + IR_2$$, the common factor I is shared by every term and divides out.\n- Step 2: In parallel, $$V$$ is the *same* across every branch, so when you write $$I_T = I_1 + I_2$$ as $$V/R_T = V/R_1 + V/R_2$$, the common factor V is shared by every term and divides out.\n- Step 3: The \"what cancels\" tells you what's common to all components. The derivation structure mirrors the physics: the shared quantity is the one that survives as a common factor and divides away.\n\nMeta-insight: the algebra is just bookkeeping for the physical sameness — different topology, different shared quantity, different cancellation.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "A circuit has an EMF source $$\\varepsilon = 9.0\\ \\text{V}$$, a resistor K in series with a parallel pair L and M. Given $$I_K = 3.0\\ \\text{A}$$, $$I_M = 2.0\\ \\text{A}$$, and the p.d. across the parallel section is 2.0 V, conceptually find $$I_L$$ and $$V_K$$. (3 steps)", "answer": "- Step 1: KCL at the junction where current splits into L and M: $$I_K = I_L + I_M$$, so $$I_L = 3.0 - 2.0 = 1.0\\ \\text{A}$$.\n- Step 2: KVL around any one loop (say through L): $$\\varepsilon = V_K + V_L$$. Since L and M are parallel, $$V_L = V_M = 2.0\\ \\text{V}$$, so $$V_K = 9.0 - 2.0 = 7.0\\ \\text{V}$$.\n- Step 3: Sanity check: do *not* compute $$V_K + V_L + V_M$$ — that double-counts the parallel section. A charge takes one branch only, so any single loop has just one of $$V_L, V_M$$.\n\nTakeaway: pick one closed loop at a time, sum drops along that single path.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Conceptually, what happens to the total resistance of a circuit if you (a) add another resistor in series, or (b) add another resistor in parallel? Why? (3 steps)", "answer": "- Step 1: Adding in series: total resistance *increases*. Every additional resistor lengthens the single path the current must traverse, dissipating more energy per coulomb. Mathematically $$R_T = R_1 + R_2 + R_3 + \\cdots$$ — strictly grows.\n- Step 2: Adding in parallel: total resistance *decreases*. Every additional branch provides another path for current, allowing more total current to flow at the same voltage. Mathematically $$1/R_T$$ grows, so $$R_T$$ shrinks.\n- Step 3: Limit cases: as $$n \\to \\infty$$ series resistors of resistance $$R$$, $$R_T \\to \\infty$$ (open circuit-like). As $$n \\to \\infty$$ parallel resistors of resistance $$R$$, $$R_T \\to 0$$ (short-circuit-like).\n\nTakeaway: series stacks restrict flow; parallel branches enable flow.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "In a series circuit, why is it sometimes said that \"the current is the same everywhere\" yet in a parallel circuit current splits? Aren't electrons the same kind of particle in both cases? (3 steps)", "answer": "- Step 1: Yes — electrons are identical particles regardless of circuit. The difference is *geometry*, not physics.\n- Step 2: In series there is only one path. By conservation of charge, the rate of electrons through every cross-section must match — there's nowhere else for them to go.\n- Step 3: In parallel there is a *junction*: the wires fork into multiple paths. Conservation of charge then says the total rate in equals total rate out, but the rate can distribute differently among the branches (by $$I_k = V/R_k$$). One charge takes one path; collectively the flow splits.\n\nTakeaway: KCL is the same law in both — it just has more interesting consequences when there are branches.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "Why do voltmeters in a lab circuit need very high resistance, and ammeters need very low resistance? Tie your answer to the rules for series and parallel currents and voltages. (3 steps)", "answer": "- Step 1: A voltmeter is connected *in parallel* with the component whose p.d. you want to measure. By the parallel rule, current splits inversely with resistance — so if the voltmeter had low resistance it would draw significant current, changing the actual current through the component and distorting the measurement.\n- Step 2: An ammeter is connected *in series* with the component. By the series rule, the same current flows through ammeter and component, and the ammeter's resistance adds to the total. If it were large it would reduce the current it's trying to measure.\n- Step 3: Ideal limits: voltmeter $$R \\to \\infty$$ (draws no current, doesn't perturb circuit); ammeter $$R \\to 0$$ (drops no voltage, doesn't perturb circuit). Real meters approximate these limits.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "A circuit has resistor C in series with a parallel pair: branch A (12 Ω, carrying 0.8 A) and branch B (carrying 1.2 A). Conceptually find $$I_C$$, $$V_A$$, and $$R_B$$. (3 steps)", "answer": "- Step 1: KCL at the junction: $$I_C = I_A + I_B = 0.8 + 1.2 = 2.0\\ \\text{A}$$. The series current C carries everything that later splits between A and B.\n- Step 2: Ohm's law on branch A: $$V_A = I_A R_A = 0.8 \\times 12 = 9.6\\ \\text{V}$$. Since A and B are in parallel, $$V_B = V_A = 9.6\\ \\text{V}$$.\n- Step 3: Ohm's law on branch B: $$R_B = V_B / I_B = 9.6 / 1.2 = 8.0\\ \\Omega$$. Sanity: B has smaller resistance than A (8 < 12), so B should carry more current — and indeed 1.2 > 0.8 ✓.\n\nStrategy tip: when total voltage is unknown, start from currents — KCL gives you the easiest entry point.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Why does conservation of energy guarantee that the sum of energy dissipated in all resistors equals the energy supplied by the battery in any given time? (3 steps)", "answer": "- Step 1: In a circuit, the battery does work on each coulomb of charge, giving it $$\\varepsilon$$ joules of energy per coulomb. In time $$t$$, charge $$Q = It$$ flows, so total energy supplied is $$\\varepsilon Q = \\varepsilon I t$$.\n- Step 2: As that charge traverses each resistor, energy is dissipated as heat: $$Q V_k = Q \\cdot I R_k = I^2 R_k t$$ per resistor. The sum over all resistors is $$I^2 R_T t$$.\n- Step 3: Since KVL forces $$\\varepsilon = \\sum IR_k = IR_T$$, multiplying by $$It$$: $$\\varepsilon I t = I^2 R_T t = \\sum I^2 R_k t$$. Energy supplied = sum of energies dissipated. No energy lost, none created.\n\nTakeaway: KVL is energy bookkeeping, and at steady state nothing is left over.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Conceptually, why does the proof of the series resistance rule \"feel similar\" to the proof of the parallel resistance rule, even though one gives addition and the other gives reciprocal addition? (3 steps)", "answer": "- Step 1: Both proofs follow the same skeleton: (i) start from the conservation law that gives an *additive* equation, (ii) substitute Ohm's law to inject R, (iii) use the topology rule that gives a *shared* quantity, (iv) cancel and rearrange.\n- Step 2: In series, energy adds (KVL): $$V_T = V_1 + V_2$$, with shared I. Substituting and cancelling I gives a sum of R's.\n- Step 3: In parallel, charge adds (KCL): $$I_T = I_1 + I_2$$, with shared V. Substituting and cancelling V gives a sum of (1/R)'s because Ohm's law was inverted to express current ($$I = V/R$$).\n\nThe reciprocal in the parallel formula comes from the fact that we needed to write I in terms of V — which puts R in the *denominator*.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "In a parallel network with $$R_1 = 4\\ \\Omega$$ and $$R_2 = 12\\ \\Omega$$, what is the combined resistance, and how does it compare to the smallest branch? (2 steps)", "answer": "- Step 1: Use product-over-sum: $$R_T = R_1 R_2 / (R_1 + R_2) = (4 \\times 12)/(4+12) = 48/16 = 3\\ \\Omega$$.\n- Step 2: Compare: $$R_T = 3\\ \\Omega < 4\\ \\Omega$$ (the smallest branch) ✓. Sanity test passes — parallel total is always strictly less than the smallest branch.\n\nNote: equivalent calculation by reciprocals: $$1/R_T = 1/4 + 1/12 = 3/12 + 1/12 = 4/12 = 1/3$$, so $$R_T = 3\\ \\Omega$$ ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "A common student error is to apply $$R_T = R_1 + R_2$$ to two parallel resistors. Suppose they do this with $$R_1 = 60\\ \\Omega$$ and $$R_2 = 30\\ \\Omega$$. What \"smell test\" would immediately flag the error, and what's the correct answer? (3 steps)", "answer": "- Step 1: Direct (incorrect) sum: $$60 + 30 = 90\\ \\Omega$$. Smell test: parallel total must be *less* than the smallest branch (30 Ω). But 90 Ω > 30 Ω — impossible for a parallel pair.\n- Step 2: Correct reciprocal sum: $$1/R_T = 1/60 + 1/30 = 1/60 + 2/60 = 3/60$$, so $$R_T = 20\\ \\Omega$$.\n- Step 3: Check: $$20\\ \\Omega < 30\\ \\Omega$$ ✓. And: two equal 60 Ω resistors in parallel would give 30 Ω, so adding a \"stronger\" 30 Ω branch makes total drop further to 20 Ω — makes physical sense.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "When stating Kirchhoff's laws in an exam, which exact phrases do mark schemes typically reward? (2 steps)", "answer": "- Step 1: For **KCL**: \"Kirchhoff's first law is a consequence of conservation of charge\" and \"the sum of currents into a junction equals the sum of currents out\". The keyword **junction** is essential.\n- Step 2: For **KVL**: \"Kirchhoff's second law is a consequence of conservation of energy\" and \"the sum of e.m.f.s around a closed loop equals the sum of potential differences (or IR drops) around that loop\". The keyword **closed loop** is essential.\n\nTip: even if you know the physics, omitting the conservation phrase or the words \"junction\" / \"closed loop\" loses marks.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Three resistors $$R_1 = 7\\ \\Omega$$, and a parallel pair $$R_2 = 4\\ \\Omega$$ and $$R_3 = 12\\ \\Omega$$. Conceptually find the total resistance, and explain why this number is dominated by $$R_1$$. (3 steps)", "answer": "- Step 1: Collapse the parallel pair. $$R_{23} = (4 \\times 12)/(4+12) = 48/16 = 3\\ \\Omega$$. Note $$R_{23}$$ is less than both 4 and 12, as expected.\n- Step 2: Add in series: $$R_T = R_1 + R_{23} = 7 + 3 = 10\\ \\Omega$$. Clean round number.\n- Step 3: $$R_1 = 7\\ \\Omega$$ is more than twice $$R_{23} = 3\\ \\Omega$$, so the 7 Ω contributes the bulk of the total. This means most of the source voltage will drop across $$R_1$$ (70%), while the parallel block sees only 30% of the supply.\n\nTakeaway: in a series chain, the largest resistor \"wins\" the voltage budget proportionally.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "What is the difference between e.m.f. ($$\\varepsilon$$) and potential difference (V) conceptually, and why do both appear in KVL? (3 steps)", "answer": "- Step 1: **E.m.f.** is the energy *supplied per unit charge* by a source (battery, cell, generator) as it pushes charge through itself — units volts.\n- Step 2: **Potential difference** is the energy *transferred per unit charge* between two points in a circuit, usually across a component that dissipates energy (resistor, bulb).\n- Step 3: KVL balances them: $$\\sum \\varepsilon = \\sum IR$$. EMF terms are *energy sources* (gains); IR terms are *energy sinks* (losses). Around a closed loop, total gain equals total loss — that's conservation of energy in compact form.\n\nNote: for ideal sources, $$\\varepsilon$$ equals the terminal p.d. across the source; for real sources with internal resistance, $$V_{\\text{terminal}} = \\varepsilon - Ir$$ — but that's the next chapter.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "In a tricky combination circuit, you have an 80 Ω resistor in series with a parallel pair (20 Ω and 10 Ω). A student tries to compute $$1/R_T = 1/80 + 1/20 + 1/10$$ in one go. Why is this wrong, and what's the correct approach? (3 steps)", "answer": "- Step 1: That formula is the pure-parallel formula, which assumes *all three* resistors share the same two nodes. But the 80 Ω is in series with the rest — it doesn't share nodes with the 20 Ω and 10 Ω branches.\n- Step 2: Correct: collapse the parallel pair first. $$1/R_p = 1/20 + 1/10 = 1/20 + 2/20 = 3/20$$, so $$R_p = 20/3 \\approx 6.7\\ \\Omega$$.\n- Step 3: Now add in series: $$R_T = 80 + 6
