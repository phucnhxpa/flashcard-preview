d asks: \"Does the $$I$$ have to be the same in every term?\" Explain when $$I$$ is the same and when it differs, using the distinction between series and parallel loops. (2 steps)", "answer": "- Step 1: In a **single series loop**, the current $$I$$ is the same through every component. KVL becomes $$\\varepsilon = IR_1 + IR_2 + IR_3$$, and you can factor out $$I$$: $$\\varepsilon = I(R_1 + R_2 + R_3)$$. This is the simple case.\n- Step 2: In a **loop containing a parallel section**, different branches carry different currents. KVL still applies to each *closed loop* independently. For a loop going through one specific branch, the equation uses that branch's current. For example, the loop through K and L: $$\\varepsilon = I_K R_K + I_L R_L$$. A different loop through K and M: $$\\varepsilon = I_K R_K + I_M R_M$$. The $$I$$ values differ across branches — you must use the correct current for each component in the specific loop you are analysing.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}, {"question": "A battery with e.m.f. 9.0 V and negligible internal resistance is connected to two resistors in series. If one resistor has 7.0 V across it and 3.0 A through it, what is its resistance, and what is the resistance of the other resistor? (3 steps)", "answer": "- Step 1: Find the resistance of the first resistor using Ohm's Law: $$R_K = \\frac{V_K}{I_K} = \\frac{7.0}{3.0} \\approx 2.33\\;\\Omega$$.\n- Step 2: Find the voltage across the other resistor using KVL: $$V_{\\text{other}} = 9.0 - 7.0 = 2.0$$ V. In series, the current is the same (3.0 A), so $$R_{\\text{other}} = \\frac{2.0}{3.0} \\approx 0.67\\;\\Omega$$.\n- Step 3: Verify: $$R_T = 2.33 + 0.67 = 3.0\\;\\Omega$$, and $$I = \\frac{9.0}{3.0} = 3.0$$ A ✓. The resistor with the larger voltage drop has the larger resistance — consistent with $$V = IR$$ for the same current.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": false}, {"question": "You have three 10 Ω resistors. One arrangement is all three in series (30 Ω). Another is all three in parallel (3.3 Ω). Describe the arrangement that gives approximately 15 Ω, and explain your reasoning. (2 steps)", "answer": "- Step 1: To get approximately 15 Ω, connect **two resistors in parallel** (giving 5 Ω) and then connect this combination **in series** with the third 10 Ω resistor.\n- Step 2: Two 10 Ω resistors in parallel: $$R_{\\text{parallel}} = 10/2 = 5\\;\\Omega$$. Adding the third in series: $$R_T = 5 + 10 = 15\\;\\Omega$$. This uses the fact that parallel reduces resistance (below the smallest branch) and series increases it. By combining both topologies, you can achieve intermediate values that neither pure series nor pure parallel can reach alone.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": true}, {"question": "A student is working on a parallel circuit problem and writes: $$R_T = \\frac{1}{R_1} + \\frac{1}{R_2}$$. Identify the two errors in this expression. (2 steps)", "answer": "- Step 1: The first error is that the left side should be $$\\frac{1}{R_T}$$, not $$R_T$$. The correct equation is $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$. Writing $$R_T$$ on the left makes the equation dimensionally inconsistent (ohms on the left, inverse ohms on the right).\n- Step 2: The second error (related) is that even if the right side is computed correctly, the student would be reading off $$\\frac{1}{R_T}$$ as the final answer instead of taking the reciprocal to find $$R_T$$. The two-step process is: (i) compute $$\\frac{1}{R_T}$$ by adding reciprocals, (ii) invert to get $$R_T$$. Skipping step (ii) is one of the most common exam mistakes.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": false}, {"question": "In the \"Charlie the Coulomb\" picture, why is the battery called a \"filling station\" and why does Charlie end with 0 J/C after completing the loop? Connect this to KVL. (2 steps)", "answer": "- Step 1: The battery is a \"filling station\" because it *supplies* energy to each coulomb of charge. The e.m.f. $$\\varepsilon$$ is the energy gained per charge: if $$\\varepsilon = 100$$ V, Charlie gains 100 J/C. This is the only place where Charlie's energy per charge increases.\n- Step 2: Charlie ends with 0 J/C because every joule gained at the battery is transferred to the components (resistors, bulbs, etc.) around the circuit. By conservation of energy (KVL): energy gained = energy lost. $$\\varepsilon = \\sum V_{\\text{drops}}$$. If Charlie returned with energy remaining, it would mean energy was not fully accounted for; if Charlie needed more, energy would have been created. Both violate conservation of energy.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": true}, {"question": "A student connects an ohmmeter to a resistor that is still part of a live circuit. Why is this dangerous or problematic? (2 steps)", "answer": "- Step 1: An ohmmeter works by passing its own small current through the component and measuring the response. If the component is still connected in a live circuit, the ohmmeter's current combines with the circuit's existing current, giving a false resistance reading.\n- Step 2: More seriously, the external circuit's voltage and current can damage the ohmmeter. The ohmmeter is designed to measure passive components with only its internal battery as the source. An external voltage can overload the meter's electronics. **Always disconnect a component from the circuit before measuring its resistance with an ohmmeter.**", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": false}, {"question": "A circuit has two parallel branches. Branch 1 has a single 12 Ω resistor. Branch 2 has two resistors (12 Ω and 8 Ω) in series. A 7.6 Ω resistor is in series with the entire parallel section. Describe the two-step process to find the total resistance, without computing the final number. (3 steps)", "answer": "- Step 1: Solve **inside** each parallel branch first. Branch 1 is just 12 Ω. Branch 2 has 12 Ω + 8 Ω = 20 Ω in series (within that branch, the series rule applies).\n- Step 2: Now treat the two branches as a parallel combination: 12 Ω ∥ 20 Ω. Use the parallel formula to find $$R_{\\text{parallel}}$$.\n- Step 3: Finally, add the 7.6 Ω series resistor: $$R_T = 7.6 + R_{\\text{parallel}}$$. The key principle: always work from the *inside out* — resolve the most deeply nested sub-circuits first, then work outward to the series connections.", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": true}, {"question": "A 6.0 V battery with negligible internal resistance is connected to two resistors in parallel (2.0 Ω and 3.0 Ω). The total power from the battery is 30 W. Verify this using the total current, and explain why this equals the sum of the power dissipated in each resistor. (3 steps)", "answer": "- Step 1: Total resistance of the parallel combination: $$\\frac{1}{R_T} = \\frac{1}{2} + \\frac{1}{3} = \\frac{5}{6}$$, so $$R_T = 1.2\\;\\Omega$$. Total current: $$I_T = 6.0/1.2 = 5.0$$ A. Power from battery: $$P = \\varepsilon \\times I_T = 6.0 \\times 5.0 = 30$$ W.\n- Step 2: Individual powers: $$P_1 = I_1^2 R_1 = 3.0^2 \\times 2.0 = 18$$ W; $$P_2 = I_2^2 R_2 = 2.0^2 \\times 3.0 = 12$$ W.\n- Step 3: Sum of individual powers: $$18 + 12 = 30$$ W = battery power ✓. This is conservation of energy: all the power supplied by the battery is dissipated in the resistors. None is created or lost. This is the power equivalent of KVL.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": true}, {"question": "The same 6.0 V battery now has internal resistance $$r = 0.8\\;\\Omega$$. The parallel resistors (2.0 Ω and 3.0 Ω) are still connected. Will the terminal p.d. be 6.0 V, more than 6.0 V, or less than 6.0 V? Explain why. (2 steps)", "answer": "- Step 1: The terminal p.d. will be **less than 6.0 V**. Some of the e.m.f. is \"lost\" across the internal resistance. The current flows through $$r$$ before reaching the external circuit, and the voltage drop across $$r$$ reduces what is available to the parallel resistors.\n- Step 2: Quantitatively: total resistance = 1.2 + 0.8 = 2.0 Ω. Current = 6.0/2.0 = 3.0 A. Lost volts = $$Ir = 3.0 \\times 0.8 = 2.4$$ V. Terminal p.d. = 6.0 − 2.4 = 3.6 V. The internal resistance acts like an additional series resistor that steals some of the voltage. This is why real batteries deliver less than their rated e.m.f. when under load.", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": false}, {"question": "With the internal resistance (0.8 Ω) in the previous question, the power from the battery is 18.0 W but the parallel resistors only dissipate 10.8 W. Where is the remaining 7.2 W, and what principle does this illustrate? (2 steps)", "answer": "- Step 1: The remaining 7.2 W is dissipated *inside the battery* as heat, across its internal resistance. The power wasted is $$I^2 r = 3.0^2 \\times 0.8 = 7.2$$ W. This energy heats the battery rather than doing useful work in the external circuit.\n- Step 2: This illustrates conservation of energy: total power supplied ($$P = \\varepsilon I = 18.0$$ W) = useful power delivered to external circuit (10.8 W) + wasted power in internal resistance (7.2 W). Energy is not lost — it is merely redirected into an undesirable form (heat inside the battery). This is why low internal resistance is desirable for batteries: it minimises wasted power.", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": true}], "count": 70}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What does electric current physically measure, and what is its defining equation? (2 steps)", "answer": "- Step 1: Electric current measures the **rate of flow of charge** — how many coulombs of charge pass a point per second.\n- Step 2: The defining equation is $$I = \\frac{Q}{t}$$, where $$I$$ is current in amperes (A), $$Q$$ is charge in coulombs (C), and $$t$$ is time in seconds (s). One ampere means one coulomb of charge flows past a point each second.\n\nCurrent is not the speed of charges — it is the *amount* of charge per unit time.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "A student writes the equation for potential difference as $$V = \\frac{E}{t}$$. What is wrong with this, and what is the correct equation? (2 steps)", "answer": "- Step 1: The denominator should be **charge** $$Q$$, not **time** $$t$$. The correct equation is $$V = \\frac{E}{Q}$$.\n- Step 2: Potential difference measures **energy transferred per unit charge**, not per unit time. One volt = one joule per coulomb. Writing $$E/t$$ would give power (watts), not voltage — a completely different physical quantity.\n\nThis was a common exam error: confusing energy-per-charge (voltage) with energy-per-time (power).", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "What does it mean to say \"charge is conserved\" in the context of an electric circuit? (2 steps)", "answer": "- Step 1: Charge is made up of physical particles (electrons). It **cannot be created, destroyed, or stored** in a wire. Every electron that enters a component or junction must leave it.\n- Step 2: In a circuit, this means charge cannot pile up or vanish at any point. The rate of charge entering any cross-section of wire equals the rate leaving. This physical fact is the foundation of Kirchhoff's First Law.\n\nCharge is a conserved quantity of nature — like mass in a closed system — not a \"fuel\" that gets consumed.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A student asks: \"Why doesn't the circuit lose charge at the resistor? Doesn't the resistor use it up?\" Explain the misconception. (3 steps)", "answer": "- Step 1: The resistor does **not** consume or store charge. Electrons flow *through* the resistor and out the other side. The number of electrons entering equals the number leaving.\n- Step 2: What the resistor *does* consume is **energy**. As electrons pass through, they transfer electrical energy to thermal energy (heating). The charge itself is unchanged — it is the *energy per charge* (the potential) that decreases.\n- Step 3: This is precisely why current is the same everywhere in a series circuit (charge conserved) but potential difference drops across each component (energy dissipated). The two conservation laws govern different quantities.\n\nResistors resist the *flow* of charge and convert energy — they never trap or destroy the charge itself.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "State Kirchhoff's First Law and name the conservation principle it expresses. (2 steps)", "answer": "- Step 1: Kirchhoff's First Law states that at any junction, the **sum of currents entering equals the sum of currents leaving**: $$\\sum I_{in} = \\sum I_{out}$$.\n- Step 2: This is a direct consequence of the **conservation of charge**. Since charge cannot be created or destroyed at a junction, every coulomb that arrives must immediately leave by some route.\n\nThis law holds at every single junction in every circuit, regardless of whether the circuit is series, parallel, or a complex network.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "A student says \"KCL only applies to parallel circuits because that's where junctions are.\" Is this correct? Explain why or why not. (3 steps)", "answer": "- Step 1: This is **incorrect**. KCL is a statement about **charge conservation**, not about circuit topology. It applies at every junction in every type of circuit.\n- Step 2: In a **parallel circuit**, KCL is non-trivially visible: at a branch point, $$I_T = I_1 + I_2$$, the current visibly splits.\n- Step 3: In a **series circuit**, there are no branch junctions — every point has one wire in and one wire out — so KCL is **trivially satisfied**: $$I_{in} = I_{out}$$ at every point, meaning the current is the same everywhere. KCL still holds; it's just that the equation simplifies to $$I_1 = I_2$$.\n\nYou do not \"choose\" when KCL applies. It always applies.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "In a series circuit with no junctions, how is Kirchhoff's First Law satisfied? (2 steps)", "answer": "- Step 1: At every point in a series circuit, there is exactly one wire carrying current in and one wire carrying current out. KCL requires $$I_{in} = I_{out}$$, so the current is identical at every point.\n- Step 2: Charge cannot accumulate anywhere in the wire — there is nowhere else for it to go. So the rate of charge entering any cross-section equals the rate leaving. KCL is trivially satisfied everywhere, giving $$I_1 = I_2 = I_3 = I$$.\n\nThis is why \"current is the same everywhere in series\" — it is not a separate rule, it is KCL applied to a circuit with no branching.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Using the \"Charlie the Coulomb\" picture, what happens to a unit of charge as it passes through a battery and then through each resistor in a series circuit? (3 steps)", "answer": "- Step 1: **At the battery** (\"filling station\"): Charlie *gains* energy. If the e.m.f. is 100 V, Charlie gains 100 joules per coulomb. The charge itself is unchanged — only the energy it carries increases.\n- Step 2: **At each resistor**: Charlie *loses* energy. The resistor converts electrical energy to thermal energy (or light, etc.). The charge itself is unchanged — it flows straight through.\n- Step 3: **After the last component**: Charlie has 0 J/C remaining — all energy gained from the battery has been transferred. The charge then re-enters the battery to be \"refuelled.\" This is conservation of energy: energy gained = energy lost.\n\nThe key insight: charge is conserved (same number of electrons throughout), but energy per charge (voltage) changes at each component.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "A student reasons: \"Current is the same everywhere in a series circuit, so the potential difference must also be the same everywhere.\" Why is this reasoning flawed? (3 steps)", "answer": "- Step 1: The student is conflating **charge conservation** (which governs current) with **energy** (which governs potential difference). Same current means the *amount of charge per second* is the same everywhere — but that says nothing about the *energy each charge carries*.\n- Step 2: $$V = IR$$ tells us the potential difference depends on **both** current and resistance. In series, $$I$$ is the same, but each resistor has a **different** $$R$$, so each has a **different** $$V$$. A larger resistor takes a larger share of the total voltage.\n- Step 3: Physically, \"Charlie the Coulomb\" loses more energy at a larger resistor (more resistance = more energy transferred per charge). The current stays the same because the same number of electrons flow, but each electron gives up different amounts of energy at different components.\n\nCurrent and potential difference are governed by **different** conservation laws: current by conservation of charge, voltage by conservation of energy.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "Define e.m.f. ($$\\varepsilon$$) and explain how it differs from a potential difference across a resistor. (2 steps)", "answer": "- Step 1: **e.m.f.** is the **energy supplied per unit charge by the source** (battery, cell). It measures how much energy the source *gives* to each coulomb passing through it. Unit: volts (V).\n- Step 2: **Potential difference across a resistor** is the **energy transferred (dissipated) per unit charge** as charge passes through the resistor. The source *provides* energy (e.m.f.); the components *consume* energy (p.d. drops). Both have units of volts, but one is energy *in*, the other is energy *out*.\n\nIn a single-loop circuit with no internal resistance: $$\\varepsilon = V_1 + V_2 + V_3$$ — all energy supplied is dissipated.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "State Kirchhoff's Second Law and name the conservation principle it expresses. (2 steps)", "answer": "- Step 1: Kirchhoff's Second Law states that around any closed loop, the **sum of e.m.f.s equals the sum of potential drops**: $$\\sum \\varepsilon = \\sum IR$$.\n- Step 2: This is a direct consequence of the **conservation of energy**. A charge completing a full loop returns to its starting point with no net energy gain or loss — all energy received from the source must equal all energy dissipated in the components.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Explain KVL by tracking 1 coulomb of charge around a single closed loop with a 24 V battery and three resistors. (3 steps)", "answer": "- Step 1: At the battery, the 1 C charge **gains** 24 joules of energy ($$\\varepsilon = 24$$ V means 24 J/C).\n- Step 2: As the charge passes through the three resistors, it **loses** energy: say 4 J at $$R_1$$, 8 J at $$R_2$$, and 12 J at $$R_3$$. These correspond to $$V_1 = 4$$ V, $$V_2 = 8$$ V, $$V_3 = 12$$ V.\n- Step 3: By conservation of energy: energy gained = energy lost, so $$24 = 4 + 8 + 12$$, i.e., $$\\varepsilon = V_1 + V_2 + V_3$$. The charge returns to the battery with zero net energy — ready to gain another 24 J.\n\nKVL is simply the electrical statement that energy in = energy out around any closed loop.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "In a circuit, resistor K (7.0 V drop) is in series with a parallel pair L and M (each 2.0 V drop). A student calculates the total as $$7 + 2 + 2 = 11$$ V. Why is this wrong, and what is the correct total? (3 steps)", "answer": "- Step 1: The student has **double-counted** the parallel branches. A single charge travels through K, then through **either L or M** — not both. It never experiences both 2 V drops simultaneously.\n- Step 2: Any single closed loop gives: $$V_K + V_L = 7 + 2 = 9$$ V, or $$V_K + V_M = 7 + 2 = 9$$ V. Both loops independently satisfy KVL.\n- Step 3: The correct total e.m.f. is **9 V**, not 11 V. KVL applies **per loop**. Each loop through a different parallel branch is a separate, independent path.\n\nThis is the \"double-counting trap\" — the most common KVL error in combination circuits.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "In a parallel circuit with two branches connected to a single battery, how does KVL apply? Each branch seems like a separate path — does the law still hold? (2 steps)", "answer": "- Step 1: Yes, KVL holds for **each closed loop independently**. Each branch, together with the battery, forms its own closed loop. For branch 1: $$\\varepsilon = V_1$$; for branch 2: $$\\varepsilon = V_2$$.\n- Step 2: Since both branches share the same two nodes, the potential difference across each branch must be the same: $$V_1 = V_2 = \\varepsilon$$. This is why \"voltage is the same across parallel branches\" — it is KVL applied to each loop separately.\n\nA parallel circuit is effectively multiple independent series loops sharing the same source.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "In a series circuit, what are the rules for current and potential difference, and which Kirchhoff law underpins each? (2 steps)", "answer": "- Step 1: **Current** is the same everywhere ($$I_1 = I_2 = I_3 = I$$). This follows from **KCL** (conservation of charge) — with no junctions, current cannot split or change.\n- Step 2: **Potential difference** is shared ($$V_T = V_1 + V_2 + V_3$$). This follows from **KVL** (conservation of energy) — all energy supplied by the source is distributed among the components.\n\nIn series: same I (KCL), shared V (KVL).", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Derive the equation for the total resistance of two resistors in series: $$R_T = R_1 + R_2$$. Start from the correct Kirchhoff law. (4 steps)", "answer": "- Step 1: Start with KVL (conservation of energy → voltages add in series): $$V_T = V_1 + V_2$$\n- Step 2: Apply Ohm's Law ($$V = IR$$) to each term: $$I_T R_T = I_1 R_1 + I_2 R_2$$\n- Step 3: Apply the series current rule (KCL — current is the same everywhere): $$I_T = I_1 = I_2 = I$$. Substitute: $$I R_T = I R_1 + I R_2$$\n- Step 4: Cancel the common factor $$I$$: $$R_T = R_1 + R_2$$\n\nThe proof starts from voltage (the quantity that adds in series), then uses Ohm's Law, then uses the current rule, then cancels. This extends to any number of resistors.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "A 4 Ω and a 12 Ω resistor are in series. Without doing a full calculation, will the total resistance be closer to 4 Ω, 12 Ω, or 16 Ω? Explain. (2 steps)", "answer": "- Step 1: In series, resistances **add directly**: $$R_T = R_1 + R_2 = 4 + 12 = 16$$ Ω. The total is exactly the sum — not an average or a weighted value.\n- Step 2: Adding any resistor in series **always increases** the total resistance. This is because you are making the single path longer/more obstructive — there is no alternative route for current.\n\nThe total is 16 Ω, which is larger than either individual resistor. Series resistance always increases.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "In a series circuit with a 9 V battery, a diode (1.5 V drop), and two resistors, how much total p.d. is available for the two resistors? (2 steps)", "answer": "- Step 1: By KVL around the loop: $$\\varepsilon = V_{diode} + V_{R1} + V_{R2}$$. The battery's e.m.f. must account for **all** voltage drops, including non-ohmic components like diodes.\n- Step 2: The resistors share the remaining voltage: $$V_{R1} + V_{R2} = \\varepsilon - V_{diode} = 9.0 - 1.5 = 7.5$$ V.\n\nEven non-ohmic components obey KVL — they still have a voltage drop that must be accounted for in the loop equation.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "In a parallel circuit, what are the rules for potential difference and current, and which Kirchhoff law underpins each? (2 steps)", "answer": "- Step 1: **Potential difference** is the same across every branch ($$V_1 = V_2 = V_3 = V$$). This follows from **KVL** (conservation of energy) — each branch forms its own loop with the same source, so each loop gives the same voltage.\n- Step 2: **Current** splits at junctions ($$I_T = I_1 + I_2 + I_3$$). This follows from **KCL** (conservation of charge) — at each branch point, incoming current equals the sum of outgoing currents.\n\nIn parallel: same V (KVL), split I (KCL).", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "Derive the equation for the total resistance of two resistors in parallel: $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$. Start from the correct Kirchhoff law. (4 steps)", "answer": "- Step 1: Start with KCL (conservation of charge → currents add at the junction): $$I_T = I_1 + I_2$$\n- Step 2: Apply Ohm's Law in the form $$I = \\frac{V}{R}$$ to each term: $$\\frac{V_T}{R_T} = \\frac{V_1}{R_1} + \\frac{V_2}{R_2}$$\n- Step 3: Apply the parallel voltage rule (KVL — same voltage across each branch): $$V_T = V_1 = V_2 = V$$. Substitute: $$\\frac{V}{R_T} = \\frac{V}{R_1} + \\frac{V}{R_2}$$\n- Step 4: Divide through by $$V$$ (since $$V \\neq 0$$): $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$\n\nThe proof starts from current (the quantity that adds in parallel). Starting from voltage would lead to a dead end — a common exam mistake.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "A student starts the parallel resistance derivation by writing $$R_T = R_1 + R_2$$, then substitutes Ohm's Law. Why does this fail? (3 steps)", "answer": "- Step 1: Writing $$R_T = R_1 + R_2$$ is the **series** starting point. It assumes voltages add — but in parallel, voltages do NOT add (they are the same across each branch).\n- Step 2: Substituting $$R = V/I$$ into $$R_1 + R_2$$ gives $$\\frac{V_1}{I_1} + \\frac{V_2}{I_2}$$. In parallel, $$V_1 = V_2 = V$$, but $$I_1 \\neq I_2$$, so this becomes $$V\\left(\\frac{1}{I_1} + \\frac{1}{I_2}\\right)$$ — an ungainly fraction with no clear path to simplification.\n- Step 3: The correct approach starts from what **adds** in parallel: current. Write $$I_T = I_1 + I_2$$, then substitute $$I = V/R$$, then cancel the common $$V$$. This yields the clean reciprocal formula.\n\nAlways start the proof from the quantity that adds up in that circuit type.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "A 4 Ω resistor and a 12 Ω resistor are connected in parallel. Is the combined resistance closer to 3 Ω, 4 Ω, or 16 Ω? Explain the general principle. (2 steps)", "answer": "- Step 1: The combined resistance is **3 Ω** — which is **less than** the smallest branch (4 Ω). Using $$\\frac{1}{R_T} = \\frac{1}{4} + \\frac{1}{12} = \\frac{3}{12} + \\frac{1}{12} = \\frac{4}{12}$$, so $$R_T = \\frac{12}{4} = 3$$ Ω.\n- Step 2: **General principle**: the total resistance of a parallel combination is **always less than the smallest individual branch resistance**. Adding a parallel branch provides an additional path for current, so the overall resistance to flow decreases.\n\nIf you ever calculate a parallel $$R_T$$ that is larger than any branch, you have made an error (likely adding resistances directly instead of using reciprocals).", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "What happens to the total resistance of a parallel circuit when you add another branch (another resistor in parallel)? Explain physically. (2 steps)", "answer": "- Step 1: The total resistance **decreases**. Adding a branch provides an **additional path** for current to flow — even if the new branch has a very large resistance, it still offers some alternative route.\n- Step 2: Physically, think of it like adding another lane to a road: even a slow lane gives traffic an alternative, so the total flow capacity increases and the overall \"resistance\" to flow decreases. Mathematically, $$\\frac{1}{R_T}$$ gets an extra positive term, so $$\\frac{1}{R_T}$$ increases, meaning $$R_T$$ decreases.\n\nThis is the opposite of series, where adding a resistor always increases total resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "Two resistors of 6 Ω and 3 Ω are in parallel. Use the product-over-sum shortcut to find the combined resistance mentally. (2 steps)", "answer": "- Step 1: For exactly **two** parallel resistors, the shortcut is: $$R_T = \\frac{R_1 R_2}{R_1 + R_2}$$. Substitute: $$R_T = \\frac{6 \\times 3}{6 + 3} = \\frac{18}{9} = 2$$ Ω.\n- Step 2: Quick sanity check: the result (2 Ω) is less than the smallest branch (3 Ω) ✓. Also, the two branch resistances are in a 2:1 ratio, and the result (2 Ω) is one-third of the smaller resistance — consistent with two unequal paths sharing the load.\n\nThe product-over-sum formula only works for exactly two parallel resistors. For three or more, use the reciprocal method.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "When deriving the series or parallel resistance formula, how do you decide which conservation law to start from? (2 steps)", "answer": "- Step 1: **Start from the quantity that adds up** in that circuit type:\n  + Series → voltages add (KVL, conservation of energy) → start with $$V_T = V_1 + V_2$$\n  + Parallel → currents add (KCL, conservation of charge) → start with $$I_T = I_1 + I_2$$\n- Step 2: If you start from the wrong quantity (e.g., adding voltages in a parallel proof), the algebra produces an ungainly fraction with no clean simplification. The correct starting point leads naturally to Ohm's Law substitution and cancellation of the shared quantity.\n\nConservation of Charge → current rules → parallel derivation. Conservation of Energy → voltage rules → series derivation.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "A student writes $$R = IV$$. Identify the error and explain why it matters. (2 steps)", "answer": "- Step 1: The correct definition is $$R = \\frac{V}{I}$$. Writing $$R = IV$$ gives units of $$\\text{V} \\cdot \\text{A} = \\text{W}$$ (watts, power), not ohms. The ohm is defined as volts per ampere: $$\\Omega = \\text{V/A}$$.\n- Step 2: Numerically, $$R = IV$$ would give absurd results. For example, if $$V = 6$$ V and $$I = 2$$ A, the correct resistance is $$R = 6/2 = 3$$ Ω, but $$R = IV$$ would give $$2 \\times 6 = 12$$ — wrong by a factor of $$I^2$$.\n\nAlways write and remember $$R = V/I$$. Resistance is the ratio of p.d. to current — p.d. \"on top,\" current \"on the bottom.\"", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "What is the step-by-step strategy for solving a series-parallel combination network? (7 steps)", "answer": "- Step 1: Identify and solve the **parallel sub-circuit(s)** first — find the equivalent resistance $$R_p$$ using the reciprocal formula.\n- Step 2: Add any **series resistances** to get the total resistance: $$R_T = R_{series} + R_p$$.\n- Step 3: Find the **total current** from the source: $$I_T = \\frac{\\varepsilon}{R_T}$$.\n- Step 4: Use the **series rule** (same current) to find the p.d. across each series element: $$V = I_T R$$.\n- Step 5: Use **KVL** to find the p.d. across the parallel group: $$V_p = \\varepsilon - V_{series}$$.\n- Step 6: Use **Ohm's Law** in each parallel branch: $$I_{branch} = \\frac{V_p}{R_{branch}}$$.\n- Step 7: **Check**: KCL (branch currents sum to $$I_T$$) and KVL (all p.d.s sum to $$\\varepsilon$$).\n\nNever try to apply a single formula to the whole combination in one go.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "Why must you solve the parallel sub-circuit first in a combination network, rather than applying one formula to the whole circuit? (2 steps)", "answer": "- Step 1: The series and parallel resistance formulas apply to **different arrangements**. A combination circuit has resistors in **both** arrangements — there is no single formula that handles mixed topologies.\n- Step 2: By collapsing the parallel section into a single equivalent resistor, you convert the combination into a **pure series circuit**, which you can then solve with the simple series formula $$R_T = R_{series} + R_p$$. This two-step reduction is the only reliable method.\n\nAttempting to write something like $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2 + R_3}$$ in one go is error-prone and often wrong — it mixes series and parallel logic incorrectly.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "A very large resistor (e.g., 1 MΩ) is added in parallel with a small resistor (e.g., 10 Ω). Qualitatively, what is the combined resistance, and why? (2 steps)", "answer": "- Step 1: The combined resistance is **very slightly less than 10 Ω**. The large resistor provides a tiny additional current path, so the total resistance decreases marginally below the smallest branch.\n- Step 2: In the limit, if the added resistor were **infinitely large** (open circuit — no branch at all), it would carry zero current and have no effect: $$R_T \\approx 10$$ Ω. Adding a very large parallel resistor is almost like adding nothing at all.\n\nThis edge case confirms the principle: parallel resistance is always *less than* the smallest, but the decrease can be negligibly small if the added branch has very high resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A very small resistor (approaching 0 Ω) is placed in parallel with a 100 Ω resistor. What happens to the combined resistance, and what is the physical interpretation? (2 steps)", "answer": "- Step 1: The combined resistance **approaches 0 Ω**. In the reciprocal formula, $$\\frac{1}{R_T} = \\frac{1}{\\approx 0} + \\frac{1}{100} \\rightarrow \\infty$$, so $$R_T \\rightarrow 0$$.\n- Step 2: Physically, a near-zero-resistance branch acts as a **short circuit** — it provides an almost unrestricted path for current. Virtually all current flows through this branch, and the 100 Ω branch carries negligible current. The total resistance is dominated by the smallest branch.\n\nThis is why a short circuit is dangerous: it creates a near-zero resistance path, causing very large currents.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "Two resistors of 6 Ω and 3 Ω are connected in parallel across a 12 V battery. Find the combined resistance, the total current, and the current in each branch — using only mental arithmetic. (4 steps)", "answer": "- Step 1: Combined resistance (product-over-sum): $$R_T = \\frac{6 \\times 3}{6 + 3} = \\frac{18}{9} = 2$$ Ω.\n- Step 2: Total current: $$I_T = \\frac{12}{2} = 6$$ A.\n- Step 3: Since voltage is the same (12 V) across each branch: $$I_1 = \\frac{12}{6} = 2$$ A and $$I_2 = \\frac{12}{3} = 4$$ A.\n- Step 4: Check KCL: $$I_1 + I_2 = 2 + 4 = 6 = I_T$$ ✓. The smaller resistor carries more current — twice as much, in fact, because its resistance is half.\n\nNotice the current splits in the **inverse ratio** of the resistances: the 3 Ω resistor gets twice the current of the 6 Ω resistor.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "A 6 Ω resistor is in series with a parallel combination of two 6 Ω resistors, all connected to an 18 V battery. Find the total resistance and total current using mental arithmetic. (4 steps)", "answer": "- Step 1: Parallel section: two equal 6 Ω resistors in parallel give $$R_p = \\frac{6}{2} = 3$$ Ω (equal parallel resistors halve the resistance).\n- Step 2: Total resistance: $$R_T = 6 + 3 = 9$$ Ω.\n- Step 3: Total current: $$I_T = \\frac{18}{9} = 2$$ A.\n- Step 4: P.d. across the series resistor: $$V_1 = 2 \\times 6 = 12$$ V. P.d. across parallel section: $$V_p = 18 - 12 = 6$$ V. Each parallel branch carries $$\\frac{6}{6} = 1$$ A. Check: $$1 + 1 = 2$$ A ✓.\n\nThe series resistor takes the lion's share of the voltage (12 V vs 6 V) because it has twice the resistance of the parallel equivalent.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "In a parallel circuit, branch A has $$R_A = 12$$ Ω with $$I_A = 0.8$$ A, and branch B carries $$I_B = 1.2$$ A. Find the resistance of branch B using mental arithmetic. (3 steps)", "answer": "- Step 1: Find the common voltage across the parallel section using branch A: $$V = I_A \\times R_A = 0.8 \\times 12 = 9.6$$ V.\n- Step 2: Since parallel branches share the same voltage: $$V_B = V_A = 9.6$$ V.\n- Step 3: Use Ohm's Law for branch B: $$R_B = \\frac{V_B}{I_B} = \\frac{9.6}{1.2} = 8$$ Ω.\n\nBranch B carries more current because it has **less** resistance (8 Ω vs 12 Ω). In parallel, the branch with lower resistance always carries more current.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "A combination circuit has a series resistor dropping 7 V, followed by a parallel section dropping 2 V. The source e.m.f. is 9 V. How would you verify this is correct using both Kirchhoff's laws? (3 steps)", "answer": "- Step 1: **KVL check** — any single loop: $$V_{series} + V_{one\\ branch} = 7 + 2 = 9$$ V = $$\\varepsilon$$ ✓. Do NOT add both parallel branches: $$7 + 2 + 2 = 11$$ V is wrong (double-counting).\n- Step 2: **KCL check** — at the junction before the parallel section, the total current entering equals the sum of branch currents leaving: $$I_T = I_1 + I_2$$. This must hold numerically.\n- Step 3: If both checks pass, the solution is self-consistent. KVL confirms energy conservation; KCL confirms charge conservation. Always run both checks on combination circuits.\n\nThese two checks catch the most common errors: double-counting parallel branches (KVL) and mis-splitting currents (KCL).", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": true}, {"question": "In a working parallel circuit with two branches, one branch suddenly breaks (open circuit — infinite resistance). What happens to the total resistance, total current, and the current in the remaining branch? (3 steps)", "answer": "- Step 1: **Total resistance increases**. Removing a branch removes a current path, so the overall resistance rises. With only one branch remaining, $$R_T$$ equals the resistance of that single branch — which is larger than the previous parallel combination.\n- Step 2: **Total current decreases** (by $$I = V/R_T$$ with higher $$R_T$$). The battery now pushes current through only one path instead of two.\n- Step 3: **The remaining branch now carries the full current** (it was previously sharing the load). Its voltage stays the same (still connected across the same source), so its current is unchanged at $$I = V/R$$, but this is now the *only* current in the circuit.\n\nThis is why household wiring uses parallel circuits: if one appliance breaks, the others continue working at the same voltage.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": true}, {"question": "Three identical resistors of 6 Ω each can be arranged in different series-parallel combinations. What is the maximum possible total resistance, and what is the minimum? Explain the arrangements. (2 steps)", "answer": "- Step 1: **Maximum resistance = 18 Ω** (all three in series: $$6 + 6 + 6 = 18$$ Ω). Series maximises resistance because the current has to push through every resistor on a single path.\n- Step 2: **Minimum resistance = 2 Ω** (all three in parallel: $$\\frac{1}{R_T} = \\frac{1}{6} + \\frac{1}{6} + \\frac{1}{6} = \\frac{3}{6} = \\frac{1}{2}$$, so $$R_T = 2$$ Ω). Parallel minimises resistance because current has the maximum number of alternative paths.\n\nFor $$n$$ identical resistors: series gives $$nR$$, parallel gives $$R/n$$. The ratio between maximum and minimum is $$n^2$$ (here, $$9$$).", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "A student solves a combination circuit and gets $$R_T = 5$$ Ω. The circuit has a 3 Ω resistor in series with a parallel section. Is the parallel section's equivalent resistance necessarily less than 3 Ω? Explain. (2 steps)", "answer": "- Step 1: Yes. If the total is 5 Ω and the series resistor is 3 Ω, then $$R_p = R_T - R_{series} = 5 - 3 = 2$$ Ω, which is less than 3 Ω.\n- Step 2: More generally, the parallel equivalent resistance must be **positive** (resistances are always positive for ohmic components), so $$R_T > R_{series}$$ always. But $$R_p$$ can be any positive value — it is not constrained by the value of the series resistor. It could be larger or smaller than the series resistor, but it must be less than the smallest branch within it.\n\nThe constraint is that $$R_p < R_{smallest\\ branch}$$, not that it must be smaller than the series resistor.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "Why do household circuits use parallel wiring rather than series? Explain using Kirchhoff's laws and the practical consequences. (2 steps)", "answer": "- Step 1: In **parallel**, each appliance gets the **full supply voltage** (KVL — each loop has the same source). If one appliance breaks (open circuit), the others continue working because each has its own independent loop.\n- Step 2: In **series**, appliances would **share the voltage** (KVL — voltages add). If one breaks (open circuit), the entire circuit is broken — no current flows anywhere. Also, turning on more appliances would change the voltage distribution for all others.\n\nParallel wiring ensures constant voltage for all devices and independence between branches — both direct consequences of KVL applied to each separate loop.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "A 10 V battery drives a series circuit with $$R_1 = 2$$ Ω and $$R_2 = 3$$ Ω. Using mental arithmetic, find the current, the p.d. across each resistor, and verify KVL. (3 steps)", "answer": "- Step 1: Total resistance: $$R_T = 2 + 3 = 5$$ Ω. Current: $$I = \\frac{10}{5} = 2$$ A (same everywhere — KCL).\n- Step 2: P.d. across each: $$V_1 = 2 \\times 2 = 4$$ V; $$V_2 = 2 \\times 3 = 6$$ V. The larger resistor (3 Ω) gets the larger share of the voltage.\n- Step 3: KVL check: $$V_1 + V_2 = 4 + 6 = 10$$ V = $$\\varepsilon$$ ✓.\n\nIn series, the p.d. splits in **proportion to the resistances**. Here the ratio is 2:3, and the voltages are 4 V:6 V — the same ratio.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "In the derivation of the parallel resistance formula, after reaching $$\\frac{V}{R_T} = \\frac{V}{R_1} + \\frac{V}{R_2}$$, how do you get from this to $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$? (2 steps)", "answer": "- Step 1: Every term on both sides of the equation contains a factor of $$V$$. Since the voltage across a parallel circuit is non-zero (there is a source driving current), $$V$$ can be safely cancelled.\n- Step 2: Divide both sides by $$V$$: $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$. The \"1\" in the numerator comes from $$V/V = 1$$ — it is not a mysterious constant; it is simply the result of cancelling the common voltage factor.\n\nThis is the algebraic step that students most often ask about. The key insight: since all branches share the same voltage, it cancels from every term.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "For \"state and explain\" exam questions about Kirchhoff's laws, what four elements must your answer include? (2 steps)", "answer": "- Step 1: The four required elements are:\n  + (1) **Name the law** (Kirchhoff's First or Second Law)\n  + (2) **State it in words** with the conservation principle (e.g., \"conservation of charge means the sum of currents into a junction equals the sum out\")\n  + (3) **Write the equation** (e.g., $$\\sum I_{in} = \\sum I_{out}$$)\n  + (4) **Apply numerically** to the specific circuit given\n- Step 2: Mark schemes specifically look for the conservation principle keyword: \"conservation of charge\" for KCL, \"conservation of energy\" for KVL. Without these keywords, marks are lost even if the equation is correct.\n\nNo explanation credit is given for just writing the equation — the conservation principle must be stated explicitly.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "A circuit has a 12 V battery, an 8 Ω resistor in series, and a parallel section with a 3 Ω and 6 Ω resistor. Walk through the full solution strategy conceptually — what do you find at each major step, and in what order? (5 steps)", "answer": "- Step 1: **Parallel section**: combine 3 Ω and 6 Ω. $$\\frac{1}{R_p} = \\frac{1}{3} + \\frac{1}{6} = \\frac{2}{6} + \\frac{1}{6} = \\frac{3}{6}$$, so $$R_p = 2$$ Ω. (Always less than the smallest branch: 2 < 3 ✓)\n- Step 2: **Total resistance**: $$R_T = 8 + 2 = 10$$ Ω. (Series addition)\n- Step 3: **Total current**: $$I_T = \\frac{12}{10} = 1.2$$ A. (Ohm's Law for the whole circuit)\n- Step 4: **Voltage distribution**: series resistor gets $$V_1 = 1.2 \\times 8 = 9.6$$ V; parallel section gets $$V_p = 12 - 9.6 = 2.4$$ V. (KVL: 9.6 + 2.4 = 12 ✓)\n- Step 5: **Branch currents**: $$I_2 = \\frac{2.4}{3} = 0.8$$ A; $$I_3 = \\frac{2.4}{6} = 0.4$$ A. (KCL: 0.8 + 0.4 = 1.2 ✓)\n\nThe 6 Ω branch carries half the current of the 3 Ω branch — current splits inversely proportional to resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}], "count": 42}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why is Kirchhoff’s First Law (KCL) always true, regardless of circuit topology? (3 steps)", "answer": "- Step 1: **Charge conservation** is the foundation. Charges are physical particles (electrons) that cannot be created, destroyed, or stored in a wire.  \n- Step 2: **Junction behavior**: At any junction, every coulomb arriving must immediately leave via another branch. For example:  \n  + In a series circuit (no junctions), current is the same everywhere (I_in = I_out trivially).  \n  + In a parallel circuit, total current splits into branches (I_total = I₁ + I₂).  \n- Step 3: **No topology dependence**: KCL is not a rule about circuit type (series/parallel) but a universal statement about charge conservation. Even in complex networks, KCL applies independently at each junction.  \n\n*Takeaway: KCL is a universal law because charge is always conserved at every junction.*", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why doesn’t a resistor \"store\" or \"lose\" charge, even though it dissipates energy?", "answer": "- **Charge conservation**: Electrons (charge carriers) flow through a resistor but are not consumed or stored. The number of electrons entering equals the number exiting.  \n- **Energy vs. charge**: Resistors dissipate energy (e.g., as heat), not charge. Voltage (energy per charge) decreases across the resistor, but current (I = Q/t) remains constant.  \n- **Analogy**: Like a water pipe with a turbine: water (charge) flows through, but energy (pressure) drops as the turbine does work.  \n\n*Takeaway: Current stays the same in series, but voltage drops because energy per charge decreases.*", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Explain Kirchhoff’s Second Law (KVL) using the \"Charlie the Coulomb\" analogy. (2 steps)", "answer": "- Step 1: **Energy conservation**: A charge (Charlie) gains energy at the battery (e.g., 100 V = 100 J/C) and loses it across components.  \n  + Example: In a series circuit with a 100 V battery and two resistors (60 V and 40 V drops), Charlie ends with 0 J/C.  \n- Step 2: **Loop closure**: For any closed loop, energy gained (battery) equals energy lost (resistors):  \n  + Math: ε = V₁ + V₂ (e.g., 100 V = 60 V + 40 V).  \n  + Misconception: Charges only traverse one branch in parallel circuits, avoiding double-counting (e.g., 7.0 V + 2.0 V = 9.0 V in Phuc’s example).  \n\n*Takeaway: KVL ensures energy conservation in loops by tracking energy transfers per charge.*", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": true}, {"question": "Why is the total resistance in a parallel circuit always less than the smallest individual resistor?", "answer": "- **Multiple paths**: Adding a resistor in parallel provides an additional path for current, reducing total resistance.  \n- **Reciprocal math**: 1/R_total = 1/R₁ + 1/R₂ → For R₁ = 4 Ω and R₂ = 12 Ω:  \n  + 1/R_total = 1/4 + 1/12 = 3/12 + 1/12 = 4/12 → R_total = 3 Ω (less than both 4 Ω and 12 Ω).  \n- **Edge case**: Two equal resistors in parallel halve the total resistance (e.g., 10 Ω + 10 Ω → 5 Ω).  \n\n*Takeaway: Parallel resistors \"share\" current, lowering total resistance more than any single path.*", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Derive the formula for resistors in series (R_total = R₁ + R₂) using conservation of energy. (4 steps)", "answer": "- Step 1: **Voltage adds in series**: V_total = V₁ + V₂ (KVL).  \n- Step 2: **Ohm’s Law**: V₁ = IR₁ and V₂ = IR₂ (since current I is same everywhere).  \n- Step 3: **Total voltage**: V_total = I(R₁ + R₂).  \n- Step 4: **Define R_total**: V_total = IR_total → R_total = R₁ + R₂.  \n\n*Takeaway: Series resistors add because voltage drops are energy losses shared by the circuit.*", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Derive the formula for resistors in parallel (1/R_total = 1/R₁ + 1/R₂) using conservation of charge. (4 steps)", "answer": "- Step 1: **Current adds in parallel**: I_total = I₁ + I₂ (KCL).  \n- Step 2: **Ohm’s Law in parallel**: I₁ = V/R₁ and I₂ = V/R₂ (since voltage V is same across branches).  \n- Step 3: **Total current**: V/R_total = V/R₁ + V/R₂.  \n- Step 4: **Cancel voltage**: 1/R_total = 1/R₁ + 1/R₂.  \n\n*Takeaway: Parallel resistors split current, so their reciprocals add to reflect shared workload.*", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "In a combination circuit with a series resistor R₁ and parallel resistors R₂ || R₃, why must you calculate the parallel resistance first?", "answer": "- **Series-parallel hierarchy**: Parallel sub-circuits behave like a single resistor in series.  \n- **Step-by-step approach**:  \n  1. Solve parallel section first: 1/R₂₃ = 1/R₂ + 1/R₃.  \n  2. Add series resistor: R_total = R₁ + R₂₃.  \n- **Example**: R₁ = 8 Ω, R₂ = 3 Ω, R₃ = 6 Ω → R₂₃ = 2 Ω → R_total = 10 Ω.  \n- **Misconception**: Trying to apply one formula (e.g., 1/(R₁ + R₂) + 1/R₃) leads to errors.  \n\n*Takeaway: Parallel networks simplify first to reduce complexity before handling series additions.*", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": true}, {"question": "A 9.0 V battery powers a series circuit with a 7.0 Ω resistor and a parallel pair (4.0 Ω and 12 Ω). Calculate the current through the 12 Ω resistor. (3 steps)", "answer": "- Step 1: **Parallel resistance**: 1/R₂₃ = 1/4 + 1/12 = 3/12 + 1/12 = 4/12 → R₂₃ = 3.0 Ω.  \n- Step 2: **Total resistance**: R_total = 7.0 Ω + 3.0 Ω = 10.0 Ω.  \n- Step 3: **Total current**: I_total = 9.0 V / 10.0 Ω = 0.9 A.  \n- Step 4: **Parallel voltage**: V₂₃ = I_total × R₂₃ = 0.9 A × 3.0 Ω = 2.7 V.  \n- Step 5: **Current in 12 Ω**: I = V₂₃ / R₃ = 2.7 V / 12 Ω = 0.225 A.  \n\n*Takeaway: Use series-parallel rules step-by-step to isolate branch currents.*", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is R = V/I correct, but R = IV incorrect?", "answer": "- **Definition**: Resistance is the ratio of voltage to current (R = V/I), measuring how much voltage drop occurs per unit current.  \n- **Units**: Ohms (Ω) = volts (V)/amps (A). R = IV would give units of volts × amps (VA), which is watts (power), not resistance.  \n- **Physical meaning**: Resistance is a material property; it doesn’t increase with current (unlike power, P = IV).  \n\n*Takeaway: R = V/I defines resistance; R = IV incorrectly equates resistance with power.*", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "In a parallel circuit with three equal resistors, how does the total resistance compare to one resistor?", "answer": "- **Reciprocal sum**: For three equal R: 1/R_total = 1/R + 1/R + 1/R = 3/R → R_total = R/3.  \n- **Example**: Three 10 Ω resistors → R_total = 3.3 Ω.  \n- **Edge case**: Number of resistors inversely scales total resistance (e.g., 2 resistors → R_total = R/2).  \n\n*Takeaway: More parallel resistors mean lower total resistance, as current has more paths.*", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Explain why Kirchhoff’s First Law (KCL) applies to **both** series and parallel circuits. (3 steps)", "answer": "- Step 1: **Conservation of charge** dictates that charge cannot accumulate at any point in a circuit. Electrons flow continuously; they do not \"pile up\" at junctions.  \n- Step 2: **In a series circuit**, even though there are no physical junctions, the law still holds trivially: the current entering any point equals the current leaving it (e.g., $ I_{\\text{in}} = I_{\\text{out}} $ at every point).  \n- Step 3: **In a parallel circuit**, KCL explicitly governs junctions: $ I_{\\text{total}} = I_1 + I_2 + \\dots $. The law’s universality stems from the fact that charge is a conserved physical quantity, independent of circuit topology.\n\n[Takeaway: KCL is a universal statement about charge conservation, not a rule limited to specific circuit configurations.]", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "A junction has three wires: 2.0 A enters, 1.5 A exits one branch, and 0.3 A exits another. What is the current in the third branch, and in which direction does it flow? (3 steps)", "answer": "- Step 1: Apply KCL: $ \\sum I_{\\text{in}} = \\sum I_{\\text{out}} $.  \n- Step 2: Let $ I_3 $ be the unknown current. If $ I_3 $ flows **out**, then $ 2.0\\,\\text{A} = 1.5\\,\\text{A} + 0.3\\,\\text{A} + I_3 $. Solving gives $ I_3 = 0.2\\,\\text{A} $ **outward**.  \n+ Alternatively, if $ I_3 $ flows **in**, $ 2.0\\,\\text{A} + I_3 = 1.5\\,\\text{A} + 0.3\\,\\text{A} $, leading to $ I_3 = -0.2\\,\\text{A} $, confirming outward flow.  \n- Step 3: The third branch has **0.2 A exiting** the junction.\n\n[Takeaway: KCL requires balancing all currents algebraically, accounting for direction (sign).]", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": true}, {"question": "A resistor in a series circuit has a potential difference of 4.0 V. If the resistor is replaced with one of lower resistance, how will the current and voltage across this resistor change? (3 steps)", "answer": "- Step 1: **Series current**: The total resistance decreases, so $ I_{\\text{total}} = \\varepsilon / R_{\\text{total}} $ increases.  \n- Step 2: **Voltage across resistor**: $ V = IR $. Since $ I $ increases and $ R $ decreases, the product $ IR $ may increase or decrease depending on relative changes.  \n+ Example: Original $ R = 4\\,\\Omega $, $ V = 4.0\\,\\text{V} $, so $ I = 1.0\\,\\text{A} $. Replace with $ R = 2\\,\\Omega $: total resistance halves, doubling current $ I = 2.0\\,\\text{A} $. New $ V = 2.0\\,\\text{A} \\times 2\\,\\Omega = 4.0\\,\\text{V} $.  \n- Step 3: **Voltage remains the same** if $ \\varepsilon $ is constant, but this requires $ R $ to change proportionally to $ I $.  \n\n[Takeaway: In series, $ I $ is shared, so changing $ R $ affects $ V $ via $ V = IR $, but total $ \\varepsilon $ constrains the outcome.]", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why is the total resistance of resistors in **parallel** always less than the smallest individual resistance? (2 steps)", "answer": "- Step 1: **Conductance perspective**: Each resistor provides an additional path for current. Total conductance $ G_{\\text{total}} = G_1 + G_2 + \\dots $ increases with more resistors.  \n- Step 2: **Mathematical proof**: For two resistors, $ \\frac{1}{R_{\\text{total}}} = \\frac{1}{R_1} + \\frac{1}{R_2} $. If $ R_1 < R_2 $, $ \\frac{1}{R_{\\text{total}}} > \\frac{1}{R_1} $, so $ R_{\\text{total}} < R_1 $.\n\n[Takeaway: Parallel resistors reduce total resistance by creating new current pathways, akin to widening a pipe to allow more flow.]", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "In a **series circuit**, why is the current the same everywhere but the potential difference shared among components? (3 steps)", "answer": "- Step 1: **Conservation of charge**: Current $ I = \\frac{dQ}{dt} $ is the rate of charge flow. Without junctions, all charge must pass through each component.  \n- Step 2: **Energy dissipation**: Each component removes energy from the circuit via work $ V = \\frac{E}{Q} $. Since $ Q $ is fixed (no charge loss), $ E $ must be distributed.  \n- Step 3: **Ohm’s Law**: $ V = IR $. Same $ I $, but different $ R $ values lead to different $ V $ drops across components.\n\n[Takeaway: Current continuity ensures charge conservation, while voltage division ensures energy conservation.]", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Derive the formula for resistors in **parallel** starting from conservation of charge. (4 steps)", "answer": "- Step 1: **Start with Kirchhoff’s First Law**: At a junction, $ I_{\\text{total}} = I_1 + I_2 + \\dots $.  \n- Step 2: **Apply Ohm’s Law to currents**: $ I = \\frac{V}{R} $, so $ \\frac{V}{R_{\\text{total}}} = \\frac{V}{R_1} + \\frac{V}{R_2} + \\dots $ (voltage is same across all branches).  \n- Step 3: **Cancel voltage**: Divide both sides by $ V $ to get $ \\frac{1}{R_{\\text{total}}} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\dots $.  \n- Step 4: **Generalize**: This applies to any number of parallel resistors.\n\n[Takeaway: Parallel derivation begins with current conservation, not voltage. This contrasts with series derivations.]", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Given a **combination circuit** with a series resistor $ R_1 = 6\\,\\Omega $ and a parallel pair $ R_2 = 3\\,\\Omega \\parallel R_3 = 6\\,\\Omega $, rank the currents $ I_1, I_2, I_3 $ through each resistor. (3 steps)", "answer": "- Step 1: **Calculate $ R_{\\text{parallel}} $**: $ \\frac{1}{R_{23}} = \\frac{1}{3} + \\frac{1}{6} = \\frac{1}{2} \\Rightarrow R_{23} = 2\\,\\Omega $.  \n- Step 2: **Total resistance**: $ R_{\\text{total}} = R_1 + R_{23} = 6 + 2 = 8\\,\\Omega $.  \n- Step 3: **Currents**:  \n+ $ I_1 = I_{\\text{total}} = \\frac{\\varepsilon}{R_{\\text{total}}} $ (same as series current).  \n+ $ I_2 = \\frac{V_{23}}{R_2} = \\frac{I_1 R_{23}}{R_2} = \\frac{I_1 \\cdot 2}{3} \\approx 0.67 I_1 $.  \n+ $ I_3 = \\frac{V_{23}}{R_3} = \\frac{I_1 \\cdot 2}{6} \\approx 0.33 I_1 $.  \n**Ranking**: $ I_1 > I_2 > I_3 $.\n\n[Takeaway: Series resistor carries the highest current, while parallel branch currents depend on individual resistances.]", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "A junction in a circuit has 4.0 A entering and 1.5 A leaving through one branch. A second branch has 2.0 A leaving. Is a third branch present? If so, what is the current and direction? (3 steps)", "answer": "- Step 1: Apply KCL: $ \\sum I_{\\text{in}} = \\sum I_{\\text{out}} $.  \n- Step 2: Total exiting: $ 1.5\\,\\text{A} + 2.0\\,\\text{A} = 3.5\\,\\text{A} $. Since $ 4.0\\,\\text{A} > 3.5\\,\\text{A} $, a third branch must exist.  \n- Step 3: $ 4.0\\,\\text{A} = 3.5\\,\\text{A} + I_3 \\Rightarrow I_3 = 0.5\\,\\text{A} $ **exiting** the junction.\n\n[Takeaway: KCL ensures net current flow at a junction is zero; unbalanced currents imply missing branches.]", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "In a **parallel circuit**, if one branch’s resistance increases, how do the other branch currents and total resistance change? (3 steps)", "answer": "- Step 1: **Voltage remains constant** across parallel branches ($ V = IR $: $ R \\uparrow $, $ I \\downarrow $ for the altered branch).  \n- Step 2: **Other branches**: Since $ V $ is same, their currents $ I = \\frac{V}{R} $ remain unchanged.  \n- Step 3: **Total resistance**: The overall resistance increases because one branch’s $ R $ is larger.  \n\n[Takeaway: Parallel branch adjustments affect only the altered branch’s current and total resistance.]", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why does a charge in a closed loop obey Kirchhoff’s Second Law even if it passes through multiple parallel branches? (2 steps)", "answer": "- Step 1: **Energy conservation**: A charge gains energy from the battery and loses it in components. The total energy gained equals total energy lost, regardless of the path.  \n- Step 2: **Path independence**: The law applies to **any closed loop**, not the entire circuit. Each parallel branch forms a separate loop with the source.\n\n[Takeaway: KVL ensures that energy changes balance in every possible loop, not just the main circuit path.]", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "A student says \"KCL only applies to parallel circuits, not series circuits.\" Explain why this statement is incorrect. (2 steps)", "answer": "- Step 1: In a series circuit, there are no junctions where current splits, so the statement \"I in = I out\" is trivially satisfied at every point. The current entering any cross-section of wire equals the current leaving — charge cannot pile up anywhere.\n- Step 2: KCL is fundamentally about conservation of charge, not about whether a circuit has branches. The student is confusing the *application* of KCL (which is most visible at parallel junctions) with the *law itself*. KCL holds in every circuit, always — it is a statement about the physical nature of charge.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Explain why current is the same at all points in a series circuit, using the concept of charge conservation. (2 steps)", "answer": "- Step 1: In a series circuit, there is only one path for charge to flow. There are no junctions where charge can split into different branches.\n- Step 2: Since charge is conserved and cannot accumulate anywhere in the wire, the rate of charge flow (current) must be the same at every point along the loop. If I were different at two points, charge would have to appear or disappear between them, violating conservation of charge.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "State Kirchhoff's Second Law and explain the physical principle it represents. (2 steps)", "answer": "- Step 1: Kirchhoff's Second Law states that around any closed loop, the sum of the e.m.f.s equals the sum of the potential drops: $$\\sum \\varepsilon = \\sum IR$$\n- Step 2: This law is a direct consequence of **conservation of energy**. When a charge carrier (e.g., an electron) completes a full loop, it must return to its starting point with the same energy it began with. The battery supplies energy (e.m.f.), and each resistor dissipates energy (potential drop). Since energy cannot be created or destroyed, these must balance.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "In the \"Charlie the Coulomb\" analogy, a charge leaves the battery with 100 J of energy per coulomb (100 V), loses 60 J/C at the first resistor and 40 J/C at the second resistor. Explain what happens to the charge itself and what happens to the energy per charge. (2 steps)", "answer": "- Step 1: The charge (electrons) is conserved — it flows through both resistors and returns to the battery. The number of charge carriers does not change; they are not \"used up\" or stored in the resistors.\n- Step 2: What changes is the **energy per unit charge** (the potential difference). At the battery, each coulomb gains 100 J of energy. At the first resistor, 60 J is transferred to thermal energy. At the second resistor, the remaining 40 J is transferred. By the end, each coulomb has 0 J of electrical energy left. This is why voltage drops across each component in series, even though current stays constant.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A student writes R = V × I. Identify the error and state the correct relationship. (1 step)", "answer": "- The formula R = V × I is dimensionally wrong — multiplying volts by amperes gives units of W (watts), not ohms (Ω). The correct relationship is derived from Ohm's Law: $$R = \\frac{V}{I}$$ This defines resistance as the ratio of potential difference to current. Always write R = V/I; never R = IV.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "In a series circuit with a 12 V battery and two resistors R1 = 8.0 Ω and R2 = 4.0 Ω, what is the total resistance? How do you calculate it? (2 steps)", "answer": "- Step 1: In series, resistances simply add together: $$R_{total} = R_1 + R_2$$\n- Step 2: Therefore: R_total = 8.0 Ω + 4.0 Ω = **12 Ω**. The total resistance is always greater than any individual resistance when resistors are added in series — you are making it harder for current to flow by adding more resistive material to the single path.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": true}, {"question": "Derive the equation R_total = R1 + R2 for two resistors in series, starting from the principle of energy conservation. (4 steps)", "answer": "- Step 1: Start with Kirchhoff's Second Law (energy conservation) for a series circuit: the total voltage equals the sum of individual voltage drops: $$V_{total} = V_1 + V_2$$\n- Step 2: Apply Ohm's Law (V = IR) to each component: $$I R_{total} = I R_1 + I R_2$$\n- Step 3: In a series circuit, the current is the same everywhere (from charge conservation), so I_total = I1 = I2 = I. Substitute: $$I R_{total} = I R_1 + I R_2$$\n- Step 4: Divide both sides by I (the current is the same, so this is valid): $$R_{total} = R_1 + R_2$$\n\n**Takeaway:** The series proof ALWAYS starts with voltage adding (the quantity that sums in series), not current.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Two resistors of 6.0 Ω and 3.0 Ω are connected in parallel. Calculate the combined resistance. (2 steps)", "answer": "- Step 1: In parallel, resistances combine using reciprocals: $$\\frac{1}{R_{total}} = \\frac{1}{R_1} + \\frac{1}{R_2} = \\frac{1}{6.0} + \\frac{1}{3.0}$$\n- Step 2: Calculate: 1/6.0 + 1/3.0 = 0.167 + 0.333 = 0.5 Ω⁻¹. Therefore R_total = 1 ÷ 0.5 = **2.0 Ω**.\n\n**Key check:** The combined resistance (2.0 Ω) is less than the smallest branch resistance (3.0 Ω). This is ALWAYS true for parallel circuits — adding parallel branches provides more paths for current, reducing total resistance.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Derive the equation 1/R_total = 1/R1 + 1/R2 for two resistors in parallel, starting from the principle of charge conservation. (4 steps)", "answer": "- Step 1: Start with Kirchhoff's First Law (charge conservation) at the junction: the total current equals the sum of branch currents: $$I_{total} = I_1 + I_2$$\n- Step 2: Apply Ohm's Law in the form I = V/R for each branch: $$\\frac{V}{R_{total}} = \\frac{V_1}{R_1} + \\frac{V_2}{R_2}$$\n- Step 3: In parallel, the voltage is the same across each branch (both connect to the same two nodes), so V_total = V1 = V2 = V: $$\\frac{V}{R_{total}} = \\frac{V}{R_1} + \\frac{V}{R_2}$$\n- Step 4: Divide both sides by V: $$\\frac{1}{R_{total}} = \\frac{1}{R_1} + \\frac{1}{R_2}$$\n\n**Takeaway:** The parallel proof ALWAYS starts with current adding (the quantity that sums in parallel), not voltage.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": true}, {"question": "A student says \"the resistance in a parallel circuit is always less than the smallest individual resistance.\" Is this true? Explain with an example. (2 steps)", "answer": "- Step 1: Yes, this statement is always true for parallel circuits.\n- Step 2: Consider two resistors of 10 Ω and 5 Ω in parallel. Using 1/R_total = 1/10 + 1/5 = 0.1 + 0.2 = 0.3 Ω⁻¹, we get R_total = 3.3 Ω. This is less than 5 Ω (the smallest branch). Physically, adding a parallel branch creates an additional path for charge to flow, making it easier for current to pass overall — hence lower total resistance.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "For exactly two resistors in parallel, show that R_total = (R1 × R2)/(R1 + R2). (2 steps)", "answer": "- Step 1: Start from the standard parallel formula: $$\\frac{1}{R_{total}} = \\frac{1}{R_1} + \\frac{1}{R_2} = \\frac{R_2 + R_1}{R_1 R_2}$$\n- Step 2: Invert both sides: $$R_{total} = \\frac{R_1 R_2}{R_1 + R_2}$$ This is the \"product-over-sum\" shortcut, useful for exactly two parallel resistors.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In a combination circuit, a 20 Ω resistor is in series with a parallel pair of 30 Ω and 60 Ω. Calculate the total resistance using the two-step method. (3 steps)", "answer": "- Step 1: **Solve the parallel section first.** For 30 Ω ∥ 60 Ω: 1/R_parallel = 1/30 + 1/60 = 0.0333 + 0.0167 = 0.05 Ω⁻¹. So R_parallel = 1 ÷ 0.05 = **20 Ω**.\n- Step 2: **Now add the series resistor.** R_total = R_series + R_parallel = 20 Ω + 20 Ω = **40 Ω**.\n- Step 3: Never try to apply one formula to the whole combination circuit at once. Always identify and solve the parallel sub-circuit(s) first, then handle series elements.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "In a circuit with a 9.0 V battery, a 7.0 Ω resistor (R1) in series with a parallel pair of 4.0 Ω (R2) and 12 Ω (R3), find the current through each component. (4 steps)", "answer": "- Step 1: Find parallel equivalent: 1/R_23 = 1/4.0 + 1/12 = 0.25 + 0.0833 = 0.333 Ω⁻¹, so R_23 = 3.0 Ω.\n- Step 2: Total resistance: R_total = R1 + R_23 = 7.0 + 3.0 = 10 Ω.\n- Step 3: Total current from battery: I_total = ε/R_total = 9.0 V / 10 Ω = **0.90 A**. This current flows through R1 (series rule).\n- Step 4: Voltage across parallel section = ε − IR1 = 9.0 − (0.90 × 7.0) = 9.0 − 6.3 = 2.7 V. Now I2 = V/R2 = 2.7/4.0 = **0.68 A**; I3 = V/R3 = 2.7/12 = **0.23 A**. Check: 0.68 + 0.23 ≈ 0.90 A ✓ (KCL)", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Why is it incorrect to write VK + VL + VM = ε when calculating KVL for a circuit with a series resistor K and a parallel branch containing L and M? (2 steps)", "answer": "- Step 1: In KVL, you trace a single closed loop that a charge actually travels along. A charge going through the parallel section goes through EITHER L OR M — not both.\n- Step 2: If you add VK + VL + VM, you are double-counting the parallel section. The correct loop is either: ε = VK + VL, OR ε = VK + VM. Both give 9.0 V if VK = 7.0 V and VL = VM = 2.0 V. Never add voltages across parallel branches together — each branch represents an alternative path, not a sequential drop.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In a parallel circuit, explain why the potential difference across each branch is the same, even though the current through each branch may be different. (2 steps)", "answer": "- Step 1: In a parallel circuit, all branches connect directly between the same two nodes (the positive and negative terminals of the battery). There is no other component between these nodes.\n- Step 2: Potential difference is energy per unit charge. Since both ends of each branch are connected to the same points in the circuit, each coulomb of charge gains or loses the same amount of energy when moving between these two points, regardless of which branch it takes. Voltage is a \"potential\" defined by position in the circuit, not by the path taken.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": true}, {"question": "A circuit has three 6.0 Ω resistors connected in parallel. What is the total resistance? Explain your answer. (2 steps)", "answer": "- Step 1: Using the parallel formula: 1/R_total = 1/6.0 + 1/6.0 + 1/6.0 = 3/6.0 = 0.5 Ω⁻¹. So R_total = 2.0 Ω.\n- Step 2: This matches the general rule: for n equal resistors R in parallel, R_total = R/n. Three 6 Ω resistors in parallel give 6/3 = 2.0 Ω. The total is less than any individual resistor because you now have three parallel paths for current to flow.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "A student states that in series circuits \"voltage is shared\" and in parallel circuits \"current is shared.\" Explain what this means and give the mathematical relationships. (2 steps)", "answer": "- Step 1: **Series:** Current is the same through every component (I_total = I1 = I2 = ...). Voltage is divided among components — the total supply voltage is shared/split across each component: V_total = V1 + V2 + V3 (KVL).\n- Step 2: **Parallel:** Voltage is the same across every branch (V_total = V1 = V2 = V3). Current splits at junctions — the total current from the supply is the sum of branch currents: I_total = I1 + I2 + I3 (KCL).", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "When deriving the combined resistance for series and parallel circuits, explain why you must start with different quantities (voltage vs. current) in each case. (2 steps)", "answer": "- Step 1: In **series**, voltage is the quantity that *adds up* (V_total = V1 + V2). Therefore you start with the voltage rule to derive the resistance formula.\n- Step 2: In **parallel**, current is the quantity that *adds up* (I_total = I1 + I2). Therefore you start with the current rule. If you start with the wrong quantity, you get stuck with complex fractions that don't simplify — this is the exact mistake Phuc made in the lesson (starting parallel proof with R1 + R2 instead of I1 + I2).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": true}, {"question": "A circuit consists of a battery, a resistor R1 in series, and two resistors R2 and R3 in parallel with each other. Describe the step-by-step strategy to find all currents and voltages in this circuit. (3 steps)", "answer": "- Step 1: **Simplify the circuit.** Find the equivalent resistance of the parallel pair R2 ∥ R3. Use 1/R_parallel = 1/R2 + 1/R3.\n- Step 2: **Find total current.** Add R1 to the parallel equivalent: R_total = R1 + R_parallel. Then I_total = ε / R_total.\n- Step 3: **Work backwards to find branch values.** Since R1 is in series, the current through it is I_total. Use V = IR to find voltage across R1. Use KVL (ε − V_R1) to find voltage across the parallel section (same for both branches). Use I = V/R to find current in each parallel branch. Finally, verify KCL at the junction.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": true}, {"question": "A student writes \"resistors store electrons.\" Explain why this is incorrect and describe what actually happens when current flows through a resistor. (2 steps)", "answer": "- Step 1: Resistors do not store charge. Electrons flow through the resistor and continue out the other side. The resistor does not accumulate or store electrons any more than a pipe stores water when water flows through it.\n- Step 2: What actually happens is **energy transfer**. As electrons pass through the resistor, they collide with atoms in the resistive material, transferring electrical energy to thermal energy (heat). The charge (electrons) is conserved and flows continuously; only the energy per charge (voltage) decreases.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In a series circuit, the current is 0.50 A. The first resistor has a voltage drop of 2.0 V, and the second has a voltage drop of 4.0 V. What is the battery voltage? Explain using KVL. (2 steps)", "answer": "- Step 1: Apply Kirchhoff's Second Law (KVL): the sum of voltage drops equals the total e.m.f.: $$\\varepsilon = V_1 + V_2$$\n- Step 2: Therefore, ε = 2.0 V + 4.0 V = **6.0 V**. This conservation of energy makes sense: the battery supplies 6 J of energy per coulomb, and the two resistors together dissipate exactly 6 J per coulomb. Note that the current value (0.50 A) is not needed for this calculation — only voltage values matter for KVL.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A junction has three wires. Currents of 0.30 A and 0.50 A enter the junction, while 0.20 A leaves through a fourth wire. Is this consistent with Kirchhoff's First Law? (2 steps)", "answer": "- Step 1: Apply KCL: sum of currents in must equal sum of currents out. Total in = 0.30 + 0.50 = **0.80 A**.\n- Step 2: Total out = 0.20 A. Since 0.80 ≠ 0.20, this violates conservation of charge. Either there is a mistake in the measurements, or charge is somehow accumulating at the junction (which is physically impossible in a steady-state circuit). The correct outgoing current should be 0.80 A for KCL to be satisfied.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Explain why the total resistance of a parallel combination is always less than the smallest individual resistance, using the concept of current paths. (2 steps)", "answer": "- Step 1: Adding a resistor in parallel creates an additional path for charge to flow. This is like adding another lane to a highway — more routes become available, making it easier for traffic (current) to get through.\n- Step 2: Electrically, this means the total opposition to current flow decreases. Even if you add a very large resistor in parallel, it still provides some alternative path, so the overall resistance decreases. Mathematically, 1/R_total = 1/R1 + 1/R2 + ... always gives a larger sum of reciprocals, meaning R_total must be smaller than any individual branch resistance.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A circuit has a 6.0 V battery connected to two parallel branches. Branch 1 contains a 12 Ω resistor, and branch 2 contains an unknown resistor R. The total current from the battery is 1.0 A. Find the resistance R. (3 steps)", "answer": "- Step 1: In parallel, voltage is the same across each branch. So voltage across both R1 and R is 6.0 V.\n- Step 2: Current through R1: I1 = V/R1 = 6.0 V / 12 Ω = 0.50 A.\n- Step 3: By KCL at the junction, total current = I1 + I2. So I2 = I_total − I1 = 1.0 − 0.50 = 0.50 A. Therefore R = V/I2 = 6.0 V / 0.50 A = **12 Ω**.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Convert the following to base SI units: (a) 5.0 mA, (b) 2.5 kΩ, (c) 750 µV. Explain why this conversion is important before substitution into equations. (2 steps)", "answer": "- Step 1: (a) 5.0 mA = 5.0 × 10⁻³ A = 0.0050 A. (b) 2.5 kΩ = 2.5 × 10³ Ω = 2500 Ω. (c) 750 µV = 750 × 10⁻⁶ V = 7.5 × 10⁻⁴ V.\n- Step 2: Always convert to base SI units (A, Ω, V) before substituting into equations. Mixing prefixes (m, k, µ) leads to orders-of-magnitude errors. For example, forgetting to convert mA to A would make your current 1000 times too large, ruining calculations.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A student writes R = V × I to find resistance, then calculates R = 9 V × 0.5 A = 4.5 Ω. What is wrong with this approach? (2 steps)", "answer": "- Step 1: The formula R = V × I is dimensionally incorrect. Volts × Amps = Watts (J/s), not Ohms. The correct formula is R = V/I, which gives Ohms (V/A).\n- Step 2: The numerical answer (4.5) is actually correct in this case only because the numbers were chosen such that V
