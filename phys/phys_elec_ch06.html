a question says \"state and explain Kirchhoff's Second Law,\" what four elements must your answer include for full marks? (2 steps)", "answer": "- Step 1: The four required elements are: (1) **Name the law** — Kirchhoff's Second Law. (2) **State it in words** — the sum of e.m.f.s around any closed loop equals the sum of potential differences around that loop. (3) **State the conservation principle** — it is a consequence of conservation of energy. (4) **Write the equation** — $$\\sum \\varepsilon = \\sum IR$$ around any closed loop.\n- Step 2: The \"explain\" part: energy cannot be created or destroyed. The energy gained per charge from the source must equal the energy lost per charge in the resistors. A charge returning to its starting point has no net energy gain or loss.\n\nName → State → Conservation principle → Equation. \"Conservation of energy\" is the key phrase.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "A student reasons: \"In a series circuit, the current is the same everywhere, so the potential difference must also be the same everywhere.\" Explain the flaw in this reasoning using the relationship between V, I, and R. (3 steps)", "answer": "- Step 1: The student is correct that current is the same everywhere in series (KCL). But they are incorrectly assuming that \"same I\" implies \"same V.\"\n- Step 2: Ohm's Law says $$V = IR$$. The current $$I$$ is the same, but the **resistance R is different** for each component. If $$R_1 \\neq R_2$$, then $$V_1 = IR_1 \\neq IR_2 = V_2$$. Same current through different resistances produces different voltage drops.\n- Step 3: The \"Charlie the Coulomb\" picture: Charlie (the charge) flows at the same rate through every component (same current), but loses different amounts of energy at each resistor depending on its resistance. A bigger resistor takes more energy from Charlie, so the voltage drop is larger. Same I does not mean same V.\n\n$$V = IR$$: same I, different R → different V. Current and voltage are distinct quantities.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "In a parallel circuit, a charge carrier travels through only one branch. Why does this mean we must never add the p.d.s of parallel branches together when applying KVL? (2 steps)", "answer": "- Step 1: KVL applies to a **single closed loop** traced by one charge. A charge going through the circuit enters the parallel section, takes **one** branch (e.g., L), and exits. It never goes through the other branch (M).\n- Step 2: Therefore, the energy lost by that charge is the p.d. of the branch it chose, not the sum of both branches. If $$V_L = V_M = 2\\text{ V}$$, the charge loses 2 V in the parallel section — not 4 V. Adding both branch voltages would be double-counting: it assumes the charge goes through both branches, which is physically impossible.\n\nOne charge, one path. Never sum parallel branch voltages.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "A student claims: \"Resistors store electrons — that's why the voltage drops across them.\" Explain why this is wrong, and state what resistors actually do. (2 steps)", "answer": "- Step 1: Resistors do **not** store electrons. Electrons flow continuously through a resistor — the number entering equals the number leaving (conservation of charge). No charge accumulates inside.\n- Step 2: What resistors actually do is **convert electrical energy into thermal energy**. They resist the *flow* of charge, causing energy to be dissipated as heat. The voltage drop reflects the energy transferred per unit charge, not a storage of charge. The resistor is an energy converter, not a charge container.\n\nResistors resist flow and convert energy. They do not store charge.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "When solving a combination circuit problem, list the step-by-step strategy in the correct order. Why is the order important? (4 steps)", "answer": "- Step 1: **Identify and solve the parallel sub-circuit(s)** — find $$R_{\\text{parallel}}$$ using the reciprocal formula. This reduces the parallel section to a single equivalent resistor.\n- Step 2: **Add series resistances** to get $$R_T$$. Now the entire circuit is a simple series circuit.\n- Step 3: **Find total current** $$I_T = \\varepsilon / R_T$$. This is the current through the battery and any series elements.\n- Step 4: **Work backwards** — use the series current to find p.d.s across series elements ($$V = IR$$), use KVL to find the p.d. across the parallel section ($$V_p = \\varepsilon - V_{\\text{series}}$$), and use Ohm's Law in each parallel branch ($$I = V_p / R$$). Finally, check KCL (branch currents sum to total) and KVL (p.d.s sum to e.m.f.).\n\nThe order matters because you must simplify before you can calculate total current, and you need total current before you can find individual voltages and branch currents.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": true}, {"question": "Convert the following to base SI units: (a) 2.5 mA, (b) 47 µA, (c) 4.7 kΩ, (d) 2.2 MΩ. (2 steps)", "answer": "- Step 1: The prefix conversions: milli (m) = $$10^{-3}$$, micro (µ) = $$10^{-6}$$, kilo (k) = $$10^{3}$$, mega (M) = $$10^{6}$$.\n- Step 2: (a) $$2.5\\text{ mA} = 2.5 \\times 10^{-3}\\text{ A} = 0.0025\\text{ A}$$. (b) $$47\\text{ µA} = 47 \\times 10^{-6}\\text{ A} = 4.7 \\times 10^{-5}\\text{ A}$$. (c) $$4.7\\text{ kΩ} = 4.7 \\times 10^{3}\\text{ Ω} = 4700\\text{ Ω}$$. (d) $$2.2\\text{ MΩ} = 2.2 \\times 10^{6}\\text{ Ω} = 2{,}200{,}000\\text{ Ω}$$.\n\nAlways convert to base SI (A, Ω, V) before substituting into any equation.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "A combination circuit has $$R_1 = 7.0\\text{ Ω}$$ in series with a parallel pair $$R_2 = 4.0\\text{ Ω}$$ and $$R_3 = 12\\text{ Ω}$$. Find the total resistance using the two-step method. (3 steps)", "answer": "- Step 1: Solve the parallel sub-circuit: $$\\frac{1}{R_p} = \\frac{1}{4.0} + \\frac{1}{12} = \\frac{3}{12} + \\frac{1}{12} = \\frac{4}{12}$$, so $$R_p = \\frac{12}{4} = 3.0\\text{ Ω}$$.\n- Step 2: Add the series resistor: $$R_T = R_1 + R_p = 7.0 + 3.0 = 10.0\\text{ Ω}$$.\n- Step 3: Sanity check: $$R_p = 3.0\\text{ Ω} < R_2 = 4.0\\text{ Ω}$$ (parallel resistance is less than the smallest branch ✓). $$R_T = 10.0\\text{ Ω} > R_1 = 7.0\\text{ Ω}$$ (adding series resistance increases total ✓).\n\nParallel first (3.0 Ω), then series (7.0 + 3.0 = 10.0 Ω). Two steps, always in this order.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "A parallel circuit has a 3.0 Ω branch and an unknown branch, with 4.8 V across them. The total current from the supply is 2.4 A. Find the resistance of the unknown branch. (4 steps)", "answer": "- Step 1: Find the current through the known branch (Ohm's Law): $$I_1 = \\frac{V}{R_1} = \\frac{4.8}{3.0} = 1.6\\text{ A}$$.\n- Step 2: Find the current through the unknown branch (KCL): $$I_T = I_1 + I_2$$, so $$I_2 = I_T - I_1 = 2.4 - 1.6 = 0.8\\text{ A}$$.\n- Step 3: Find the resistance of the unknown branch (Ohm's Law): $$R_2 = \\frac{V}{I_2} = \\frac{4.8}{0.8} = 6.0\\text{ Ω}$$.\n- Step 4: Sanity check: $$R_T = \\frac{R_1 R_2}{R_1 + R_2} = \\frac{3 \\times 6}{3 + 6} = \\frac{18}{9} = 2.0\\text{ Ω}$$. Then $$I_T = V/R_T = 4.8/2.0 = 2.4\\text{ A}$$ ✓.\n\nKCL gives the unknown current, then Ohm's Law gives the unknown resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "A student has a combination circuit with an 80 Ω resistor in series with a parallel pair of 20 Ω and 10 Ω. They write $$\\frac{1}{R_T} = \\frac{1}{80} + \\frac{1}{20} + \\frac{1}{10}$$. What is wrong with this approach, and what is the correct first step? (2 steps)", "answer": "- Step 1: The student has applied the parallel formula to **all three resistors**, including the 80 Ω series resistor. But the 80 Ω resistor is not in parallel with the 20 Ω and 10 Ω — it is in series with the parallel pair. The parallel formula requires the same p.d. across all resistors, which is not true for the 80 Ω resistor.\n- Step 2: The correct first step is to solve the parallel sub-circuit alone: $$\\frac{1}{R_p} = \\frac{1}{20} + \\frac{1}{10} = \\frac{3}{20}$$, so $$R_p ≈ 6.7\\text{ Ω}$$. Then add the series resistor: $$R_T = 80 + 6.7 ≈ 86.7\\text{ Ω}$$. Never mix series and parallel resistors in one formula.\n\nIsolate the parallel sub-circuit first. The 80 Ω resistor is separate — it joins later.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": true}, {"question": "A complex combination circuit has a 7.6 Ω resistor in series with a parallel arrangement. One parallel branch is a single 12 Ω resistor. The other branch has 12 Ω and 8 Ω in series. Describe the step-by-step approach to find the total resistance. (3 steps)", "answer": "- Step 1: Solve the series branch first: the 12 Ω and 8 Ω in series give $$12 + 8 = 20\\text{ Ω}$$. Now the parallel section is 12 Ω ∥ 20 Ω.\n- Step 2: Solve the parallel section: $$\\frac{1}{R_p} = \\frac{1}{12} + \\frac{1}{20} = \\frac{5}{60} + \\frac{3}{60} = \\frac{8}{60}$$, so $$R_p = \\frac{60}{8} = 7.5\\text{ Ω}$$.\n- Step 3: Add the series resistor: $$R_T = 7.6 + 7.5 = 15.1\\text{ Ω}$$. The key insight: within a parallel branch, you can have series elements. Solve those first, then combine the parallel section, then add series elements.\n\nWork from the inside out: series within branches → parallel combination → external series.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "In a parallel circuit used for home wiring, one light bulb breaks (its filament opens — infinite resistance in that branch). Explain why the other lights in the parallel circuit continue to work normally. (2 steps)", "answer": "- Step 1: In a parallel circuit, each branch is independent. The p.d. across each branch is determined by the source, not by the other branches. When one branch opens (infinite resistance → zero current), the voltage across the remaining branches is unchanged.\n- Step 2: The remaining branches still have the same p.d. across them, so the same current flows through them by Ohm's Law ($$I = V/R$$, and neither V nor R has changed for those branches). The total current decreases (one fewer branch), but each surviving branch is unaffected. This is why parallel circuits are used for home wiring — one device failing doesn't affect the others.\n\nParallel branches are independent. One failing doesn't change the voltage or current in the others.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "A student calculates the parallel resistance of a 4 Ω and 12 Ω resistor and gets 3 Ω. They then say \"the total parallel resistance is 3 Ω, which is less than both 4 Ω and 12 Ω.\" Is the statement \"less than both\" correct? Explain the general rule. (2 steps)", "answer": "- Step 1: The calculation is correct: $$\\frac{1}{R_T} = \\frac{1}{4} + \\frac{1}{12} = \\frac{3}{12} + \\frac{1}{12} = \\frac{4}{12}$$, so $$R_T = 3\\text{ Ω}$$. And 3 Ω is indeed less than 4 Ω (the smallest branch) and less than 12 Ω.\n- Step 2: The general rule: the total parallel resistance is **always less than the smallest individual branch resistance**. Adding any parallel path provides an additional route for current, reducing the total opposition. Even adding a very large resistor in parallel reduces $$R_T$$ slightly below the smallest existing branch. If you ever get $$R_T > R_{\\text{smallest}}$$, you've made an error (likely added resistances instead of using reciprocals).\n\n$$R_T$$ (parallel) < smallest branch. Always. If not, check your working.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "A circuit has a 6.0 V source with two resistors in series: $$R_1 = 4.0\\text{ Ω}$$ and $$R_2 = 12\\text{ Ω}$$. Find the current and the p.d. across each resistor. (3 steps)", "answer": "- Step 1: Total resistance: $$R_T = R_1 + R_2 = 4.0 + 12 = 16\\text{ Ω}$$. Total current: $$I = \\frac{V}{R_T} = \\frac{6.0}{16} = 0.375\\text{ A}$$. This current flows through both resistors (series).\n- Step 2: P.d. across $$R_1$$: $$V_1 = IR_1 = 0.375 \\times 4.0 = 1.5\\text{ V}$$. P.d. across $$R_2$$: $$V_2 = IR_2 = 0.375 \\times 12 = 4.5\\text{ V}$$.\n- Step 3: KVL check: $$V_1 + V_2 = 1.5 + 4.5 = 6.0\\text{ V} = \\varepsilon$$ ✓. The larger resistor (12 Ω) takes the larger share of the voltage (4.5 V vs 1.5 V), consistent with $$V \\propto R$$ in series.\n\nSeries: find I first, then V = IR for each. Bigger R gets bigger V.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "Why is it important to show your working when deriving the series or parallel resistance formulas in an exam? What happens if you just write the final answer? (2 steps)", "answer": "- Step 1: The mark scheme for derivation questions awards marks for each logical step: starting equation (KVL or KCL), substitution of Ohm's Law, application of the current/voltage rule, and cancellation. If you skip steps and just write the final formula, you get no method marks.\n- Step 2: The standard exam rule is \"no error-carried-forward (ecf) if no working is shown.\" If your final answer is wrong but your method is visible, you can still gain partial credit. With no working, a wrong answer gets zero. The derivation steps are: (1) state the starting equation from the conservation law, (2) substitute Ohm's Law, (3) apply the series/parallel rule, (4) cancel the common factor.\n\nShow every step: start from conservation law → Ohm's Law → circuit rule → cancel. No shortcuts.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "A student is asked to find the total resistance of a circuit with 30 Ω, 20 Ω, and 20 Ω in series. They write $$R_T = 30 + 20 + 20 = 70\\text{ Ω}$$. Is this correct? What would the answer be if the same three resistors were all in parallel instead? (2 steps)", "answer": "- Step 1: Series: correct. $$R_T = 30 + 20 + 20 = 70\\text{ Ω}$$. In series, resistances simply add.\n- Step 2: Parallel: $$\\frac{1}{R_T} = \\frac{1}{30} + \\frac{1}{20} + \\frac{1}{20} = \\frac{2}{60} + \\frac{3}{60} + \\frac{3}{60} = \\frac{8}{60}$$, so $$R_T = \\frac{60}{8} = 7.5\\text{ Ω}$$. Notice the parallel result (7.5 Ω) is much less than the smallest resistor (20 Ω), consistent with the rule that parallel resistance is always less than the smallest branch.\n\nSame resistors, very different results: 70 Ω (series) vs 7.5 Ω (parallel). Topology matters enormously.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "A student draws current arrows on a junction diagram but accidentally draws one arrow pointing in the wrong direction. They then write $$I_1 + I_2 = I_3 + I_4$$ where $$I_1$$ and $$I_2$$ are labelled as \"in\" but $$I_2$$ is actually flowing out. How can you avoid this mistake? (2 steps)", "answer": "- Step 1: Always draw current arrows in the **conventional current direction** (from positive to negative terminal of the supply) before labelling. At a junction, arrows on wires coming from the supply side are \"in,\" and arrows on wires going toward the load side are \"out.\"\n- Step 2: Alternatively, use the algebraic form of KCL: $$\\sum I = 0$$, where currents entering are positive and currents leaving are negative (or vice versa). If you accidentally mislabel a direction, the sign will be wrong, but the equation will still balance if you're consistent. The examiner tip: colour-code or label each wire with a direction arrow before writing any equations.\n\nDraw arrows first (conventional current), then identify in vs out. Colour-coding prevents confusion.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "A student argues: \"In a parallel circuit with two branches, if I double the resistance of one branch, the total resistance doubles.\" Explain why this is wrong, and describe qualitatively what actually happens to the total resistance. (3 steps)", "answer": "- Step 1: The total parallel resistance is **not** proportional to any single branch. It depends on the reciprocal sum: $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$. If you double $$R_2$$, the term $$\\frac{1}{R_2}$$ is halved, but $$\\frac{1}{R_1}$$ stays the same.\n- Step 2: Qualitatively: doubling one branch's resistance makes that branch carry less current (harder path), so the total current decreases slightly. Since $$R_T = V/I_T$$, and $$I_T$$ decreases, $$R_T$$ increases — but not by a factor of 2. The total resistance increases, but by less than doubling.\n- Step 3: Example: $$R_1 = 4\\text{ Ω}$$, $$R_2 = 4\\text{ Ω}$$ → $$R_T = 2\\text{ Ω}$$. Double $$R_2$$ to 8 Ω: $$\\frac{1}{R_T} = \\frac{1}{4} + \\frac{1}{8} = \\frac{3}{8}$$ → $$R_T = 2.67\\text{ Ω}$$. The total went from 2 to 2.67 Ω — an increase, but nowhere near doubling.\n\nChanging one branch changes $$R_T$$, but not proportionally. The reciprocal relationship makes it non-linear.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": true}, {"question": "A circuit has a battery with e.m.f. $$\\varepsilon$$ and two resistors in series. Using the \"Charlie the Coulomb\" picture, explain why KVL must hold — that is, why the total energy gained per charge at the battery must equal the total energy lost per charge at the resistors. (3 steps)", "answer": "- Step 1: At the battery, Charlie gains $$\\varepsilon$$ joules per coulomb. This is the energy supplied by the chemical reactions in the cell — it's the \"filling station\" where Charlie gets energised.\n- Step 2: At each resistor, Charlie loses energy — $$V_1 = IR_1$$ joules per coulomb at the first resistor, and $$V_2 = IR_2$$ at the second. The energy is converted to heat. Charlie's \"energy per charge\" decreases at each step.\n- Step 3: When Charlie returns to the starting point, he must have the same energy he started with (the circuit is in steady state — nothing is changing with time). Therefore, total energy gained = total energy lost: $$\\varepsilon = V_1 + V_2$$. If this weren't true, energy would be accumulating somewhere, violating conservation of energy. KVL is simply energy conservation applied to a closed loop.\n\nCharlie gains ε, loses V₁ + V₂, returns to start. Energy in = energy out. Always.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "A parallel circuit has two branches with resistances $$R_1$$ and $$R_2$$, connected to a source of voltage $$V$$. The total current from the source is $$I_T$$. Write the expression for how the total current splits between the two branches in terms of the resistances. (2 steps)", "answer": "- Step 1: Both branches have the same voltage $$V$$ across them. The branch currents are: $$I_1 = \\frac{V}{R_1}$$ and $$I_2 = \\frac{V}{R_2}$$. The total current is $$I_T = I_1 + I_2 = V\\left(\\frac{1}{R_1} + \\frac{1}{R_2}\\right) = \\frac{V}{R_T}$$.\n- Step 2: The fraction of total current through each branch is inversely proportional to its resistance: $$\\frac{I_1}{I_T} = \\frac{R_2}{R_1 + R_2}$$ and $$\\frac{I_2}{I_T} = \\frac{R_1}{R_1 + R_2}$$. The smaller resistor carries a larger fraction of the current. For example, if $$R_1 = 3\\text{ Ω}$$ and $$R_2 = 6\\text{ Ω}$$, then $$I_1$$ gets $$\\frac{6}{9} = \\frac{2}{3}$$ of the total, and $$I_2$$ gets $$\\frac{3}{9} = \\frac{1}{3}$$.\n\nCurrent splits in inverse proportion to resistance: smaller R → more current.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "A student is given a circuit with a resistor in series with a parallel section. They are asked to find the p.d. across the series resistor. They don't know the current, but they know the e.m.f. and the p.d. across the parallel section. How can they find the series p.d.? (2 steps)", "answer": "- Step 1: Apply KVL to the full loop: $$\\varepsilon = V_{\\text{series}} + V_{\\text{parallel}}$$. The total e.m.f. equals the sum of the p.d. across the series element and the p.d. across the parallel section.\n- Step 2: Rearrange: $$V_{\\text{series}} = \\varepsilon - V_{\\text{parallel}}$$. You don't need to know the current or the resistance — KVL gives you the series voltage directly from the e.m.f. and the parallel voltage. This is often the fastest route when the parallel p.d. is known.\n\nKVL shortcut: $$V_{\\text{series}} = \\varepsilon - V_{\\text{parallel}}$$. No need for current or resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "A combination circuit has $$R_1 = 8\\text{ Ω}$$ in series with a parallel pair $$R_2 = 3\\text{ Ω}$$ and $$R_3 = 6\\text{ Ω}$$, powered by a 12 V battery. The total current is 1.2 A. Verify that the power delivered by the battery equals the total power dissipated in the resistors. (3 steps)", "answer": "- Step 1: Power delivered by the battery: $$P_{\\text{battery}} = \\varepsilon \\times I_T = 12 \\times 1.2 = 14.4\\text{ W}$$.\n- Step 2: Power dissipated in each resistor: $$P_1 = I_T^2 \\times R_1 = 1.2^2 \\times 8 = 11.52\\text{ W}$$. For the parallel section: $$I_2 = 0.80\\text{ A}$$, $$I_3 = 0.40\\text{ A}$$, so $$P_2 = I_2^2 \\times R_2 = 0.80^2 \\times 3 = 1.92\\text{ W}$$ and $$P_3 = I_3^2 \\times R_3 = 0.40^2 \\times 6 = 0.96\\text{ W}$$.\n- Step 3: Total dissipated: $$11.52 + 1.92 + 0.96 = 14.4\\text{ W} = P_{\\text{battery}}$$ ✓. Conservation of energy: all electrical energy supplied by the battery is converted to heat in the resistors. This is a powerful check.\n\nPower in = power out. Conservation of energy expressed as power balance.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": true}, {"question": "A student says: \"In a parallel circuit, the current through each branch is the same because the voltage is the same.\" Is this reasoning correct? Explain. (2 steps)", "answer": "- Step 1: The premise (voltage is the same across parallel branches) is correct, but the conclusion (current is the same) is **not necessarily true**. The current through each branch depends on both the voltage and the resistance: $$I = V/R$$.\n- Step 2: Same V, but different R → different I. Only if the branches have **equal resistance** will the currents be equal. For example, a 3 Ω branch and a 6 Ω branch with 12 V across them: $$I_1 = 4\\text{ A}$$ and $$I_2 = 2\\text{ A}$$. Same voltage, different currents. The student is confusing \"same V\" with \"same I.\"\n\nSame V does not mean same I — it depends on R. Only equal R gives equal I.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": true}, {"question": "A student is solving a combination circuit and finds the p.d. across the parallel section is 2.4 V. They then write: \"The p.d. across $$R_2$$ is 2.4 V and the p.d. across $$R_3$$ is 2.4 V, so the total p.d. across the parallel section is 4.8 V.\" Explain the error. (2 steps)", "answer": "- Step 1: The p.d. across the parallel section **is** 2.4 V. The p.d. across $$R_2$$ is 2.4 V and the p.d. across $$R_3$$ is 2.4 V. These are the **same** 2.4 V measured across the same two nodes — they are not separate voltages that add.\n- Step 2: The error is treating the parallel voltages as if they were series voltages. In series, p.d.s add because the charge goes through each component in sequence. In parallel, the charge goes through one branch only, so the branch voltages are the same measurement, not separate contributions. The total p.d. across the parallel section is 2.4 V, not 4.8 V.\n\nParallel: same V across branches = one measurement, not a sum. Don't add parallel voltages.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}], "count": 55}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "Electric current is defined as the rate of flow of charge. Write the equation linking current, charge, and time, and explain why the unit \"ampere\" is equivalent to \"coulombs per second.\"", "answer": "The equation is $$I = \\frac{Q}{t}$$, where $$I$$ is current in amperes (A), $$Q$$ is charge in coulombs (C), and $$t$$ is time in seconds (s). Rearranging gives $$Q = It$$, meaning one coulomb is the charge transported by a current of one ampere in one second. The ampere is therefore literally \"coulombs per second\" — it counts how much charge passes a point each second. This definition is foundational because it connects a measurable macroscopic quantity (current) to a microscopic one (charge carried by electrons).", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A student writes $$V = \\frac{E}{t}$$ for the definition of potential difference. Identify the error and state the correct equation with its physical meaning. (2 steps)", "answer": "- Step 1: The denominator is wrong. Potential difference is energy transferred *per unit charge*, not per unit time. The correct equation is $$V = \\frac{E}{Q}$$, where $$E$$ is energy in joules and $$Q$$ is charge in coulombs.\n- Step 2: One volt means one joule of energy is transferred per coulomb of charge that passes. The student's version $$V = E/t$$ would give units of J/s = watts (power), not volts. This is a common slip — confusing energy-per-charge with energy-per-time.\n\nThe key distinction: current ($$I = Q/t$$) is about *how much* charge flows per second; potential difference ($$V = E/Q$$) is about *how much energy each coulomb* carries or loses.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "A resistor is in a circuit and current flows through it. Does the resistor \"use up\" or \"store\" any of the charge that enters it? What actually changes as charge passes through, and why? (3 steps)", "answer": "- Step 1: No — the resistor does not consume, store, or destroy any charge. Charge (electrons) is a conserved physical quantity; it cannot be created or destroyed. Every electron that enters the resistor exits the other side.\n- Step 2: What *does* change is the **energy per unit charge** — the potential difference. As charge flows through the resistor, electrical energy is converted to thermal energy (heating). The charge itself is unchanged; only the energy it carries decreases.\n- Step 3: This is precisely why current is the same everywhere in a series circuit (charge is conserved — same number of electrons per second at every point) while potential difference *drops* across each component (energy is dissipated). The two conservation laws govern different quantities: charge conservation → constant current; energy conservation → shared voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "In the \"Charlie the Coulomb\" analogy, a charge carrier starts at a 100 V battery and passes through two resistors in series. After the first resistor, Charlie has lost 60 J/C. How much energy per charge remains, and what does this tell you about the relationship between e.m.f. and individual potential differences? (2 steps)", "answer": "- Step 1: Charlie started with 100 J/C (100 V). After losing 60 J/C at the first resistor, he has $$100 - 60 = 40$$ J/C remaining, which corresponds to 40 V. At the second resistor, he loses this remaining 40 J/C, ending at 0 J/C — all energy has been transferred.\n- Step 2: This demonstrates that the total e.m.f. (energy supplied per charge by the battery) equals the sum of the potential differences across all components: $$\\varepsilon = V_1 + V_2$$. The battery \"fills up\" Charlie with energy, and each component \"drains\" some of it. By the time Charlie returns to the battery, all energy has been spent — conservation of energy.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "State Kirchhoff's First Law in both words and equation form. Name the fundamental conservation principle it expresses.", "answer": "Kirchhoff's First Law states: at any junction in a circuit, the sum of currents entering the junction equals the sum of currents leaving the junction. In equation form: $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$. It is a direct consequence of **conservation of charge** — charge cannot be created, destroyed, or accumulate at a junction. Every coulomb that arrives must leave by some route. This law applies at *every* junction in *every* circuit, regardless of topology.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "A student says \"Kirchhoff's First Law only applies to parallel circuits because that's where junctions are.\" Is this correct? Explain why or why not, and describe how KCL manifests in a series circuit. (3 steps)", "answer": "- Step 1: This is incorrect. KCL is a statement about **conservation of charge**, not a rule about circuit type. It holds at every junction in every circuit — series, parallel, or any combination.\n- Step 2: In a series circuit, there are no branch junctions — only a single path. At any point along the wire, one wire carries current in and one wire carries current out. KCL is *trivially satisfied*: $$I_{\\text{in}} = I_{\\text{out}}$$ at every point, so the current is the same everywhere.\n- Step 3: In a parallel circuit, KCL is non-trivially satisfied at each branch point: $$I_{\\text{total}} = I_1 + I_2 + \\cdots$$. But the law itself hasn't changed — it's the same principle operating in both cases. You never \"choose\" when KCL applies; it always applies.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "State Kirchhoff's Second Law in both words and equation form. Name the fundamental conservation principle it expresses.", "answer": "Kirchhoff's Second Law states: around any closed loop in a circuit, the sum of the e.m.f.s equals the sum of the potential differences (voltage drops). In equation form: $$\\sum \\varepsilon = \\sum IR$$. It is a direct consequence of **conservation of energy** — a charge travelling round a complete loop cannot gain or lose net energy. The battery supplies $$\\varepsilon$$ joules per coulomb; the resistors dissipate exactly that same total. The charge returns to its starting point with the same energy it had initially.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "In a circuit, resistor K (7.0 V across it) is in series with a parallel section containing L and M (each with 2.0 V across them). The source e.m.f. is 9.0 V. A student adds 7 + 2 + 2 = 11 V and says KVL is violated. Explain the error. (3 steps)", "answer": "- Step 1: The student has double-counted the parallel branches. A single charge travelling through the circuit goes through K and then through **either** L **or** M — not both. The charge takes one path only.\n- Step 2: Applying KVL to the loop K → L: $$V_K + V_L = 7.0 + 2.0 = 9.0 \\text{ V} = \\varepsilon$$. Applying KVL to the loop K → M: $$V_K + V_M = 7.0 + 2.0 = 9.0 \\text{ V} = \\varepsilon$$. Both loops independently satisfy KVL.\n- Step 3: The mistake of adding $$7 + 2 + 2 = 11$$ treats the charge as if it goes through both L and M simultaneously. But in a parallel section, the current *splits* — some charge goes through L, the rest through M. Each individual charge follows one complete loop, and KVL must hold for each loop separately.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "In a series circuit, the current is the same everywhere. Does this mean the potential difference is also the same across every component? Explain using the relationship between V, I, and R. (2 steps)", "answer": "- Step 1: No — the potential difference is *not* the same across every component, even though the current is. By Ohm's Law, $$V = IR$$. The current $$I$$ is the same through each component, but each component has a different resistance $$R$$, so each has a different $$V$$.\n- Step 2: For example, if $$I = 2$$ A flows through $$R_1 = 3\\;\\Omega$$ and $$R_2 = 5\\;\\Omega$$ in series, then $$V_1 = 2 \\times 3 = 6$$ V and $$V_2 = 2 \\times 5 = 10$$ V. Same current, different voltages. The voltage *shares* (adds up) in series: $$V_{\\text{total}} = V_1 + V_2 = 16$$ V. The key insight: same $$I$$ does not imply same $$V$$ — it depends on $$R$$.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "What are the two key rules for a series circuit regarding current and potential difference? State which Kirchhoff law is responsible for each rule. (2 steps)", "answer": "- Step 1: **Current rule** — the current is the same at every point in a series circuit: $$I_1 = I_2 = I_3 = I$$. This is a consequence of Kirchhoff's First Law (conservation of charge): with no junctions, charge cannot split or accumulate, so the same current flows everywhere.\n- Step 2: **Potential difference rule** — the total potential difference is shared among the components: $$V_{\\text{total}} = V_1 + V_2 + V_3$$. This is a consequence of Kirchhoff's Second Law (conservation of energy): the energy gained per charge at the source must equal the total energy lost per charge across all components in the loop.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Derive the formula for the total resistance of two resistors in series, starting from Kirchhoff's Laws. Clearly identify which law you start from and why. (4 steps)", "answer": "- Step 1: Start with the **voltage rule** (KVL — conservation of energy), because in a series circuit, voltage is the quantity that adds up: $$V_T = V_1 + V_2$$.\n- Step 2: Substitute Ohm's Law ($$V = IR$$) for each term: $$I_T R_T = I_1 R_1 + I_2 R_2$$.\n- Step 3: Apply the series current rule (KCL — current is the same everywhere): $$I_T = I_1 = I_2 = I$$. This gives $$IR_T = IR_1 + IR_2$$.\n- Step 4: Cancel the common factor $$I$$ from all terms: $$R_T = R_1 + R_2$$.\n\nThe proof starts from KVL (voltage adds in series) because that is the non-trivial addition rule for this circuit type. KCL gives the trivial fact that $$I$$ is the same, which allows cancellation.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "When you add another resistor in series to an existing series circuit, what happens to the total resistance, and why does this make physical sense in terms of the current path? (2 steps)", "answer": "- Step 1: The total resistance **always increases**. Since $$R_T = R_1 + R_2 + R_3 + \\cdots$$, adding another positive resistance term makes $$R_T$$ larger.\n- Step 2: Physically, adding a resistor in series means the current must pass through *more* obstacles — there is still only one path, but it is now longer/more resistive. Each additional resistor offers further opposition to the flow of charge. This contrasts with parallel (where adding a branch provides an *additional* path, reducing total resistance).", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "What are the two key rules for a parallel circuit regarding potential difference and current? State which Kirchhoff law is responsible for each rule. (2 steps)", "answer": "- Step 1: **Potential difference rule** — the potential difference is the same across every branch: $$V_1 = V_2 = V_3 = V$$. This is because both ends of each branch connect to the same two nodes, so the voltage across each branch is identical. This is consistent with KVL applied to each individual loop.\n- Step 2: **Current rule** — the total current splits at junctions: $$I_{\\text{total}} = I_1 + I_2 + I_3$$. This is a consequence of Kirchhoff's First Law (conservation of charge): at each branch point, the current arriving must equal the sum of currents leaving by each branch.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Derive the formula for the total resistance of two resistors in parallel, starting from Kirchhoff's Laws. Clearly identify which law you start from and why. (4 steps)", "answer": "- Step 1: Start with the **current rule** (KCL — conservation of charge), because in a parallel circuit, current is the quantity that adds up: $$I_T = I_1 + I_2$$.\n- Step 2: Substitute Ohm's Law in the form $$I = \\frac{V}{R}$$ for each term: $$\\frac{V_T}{R_T} = \\frac{V_1}{R_1} + \\frac{V_2}{R_2}$$.\n- Step 3: Apply the parallel voltage rule (KVL — voltage is the same across every branch): $$V_T = V_1 = V_2 = V$$. This gives $$\\frac{V}{R_T} = \\frac{V}{R_1} + \\frac{V}{R_2}$$.\n- Step 4: Divide through by $$V$$ (cancel the common factor): $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$.\n\nThe proof starts from KCL (current adds in parallel) because that is the non-trivial addition rule for this circuit type. Starting from $$R_1 + R_2$$ (the series approach) produces an ungainly fraction and leads nowhere.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A student begins the parallel resistance derivation by writing $$R_T = R_1 + R_2$$ and substituting $$\\frac{V_1}{I_1} + \\frac{V_2}{I_2}$$. Why does this approach fail, and what should the student have written as the starting equation instead? (2 steps)", "answer": "- Step 1: This approach fails because $$R_T = R_1 + R_2$$ is the *series* formula — resistances do not add directly in parallel. Substituting Ohm's Law into this wrong starting point produces a complex fraction $$\\frac{V_1 I_2 + V_2 I_1}{I_1 I_2}$$ that cannot simplify to the correct result.\n- Step 2: The correct starting equation is $$I_T = I_1 + I_2$$ (KCL — the quantity that *does* add in parallel). From there, substituting $$I = V/R$$ and cancelling the common $$V$$ yields the correct $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$. **Always start the proof from the quantity that adds up in that circuit type.**", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "When you add another resistor in parallel to an existing parallel circuit, what happens to the total resistance, and...in terms of direction (increases or decreases), and why does this make physical sense? (2 steps)", "answer": "- Step 1: The total resistance **always decreases**. Adding another parallel branch adds another term to the right side of $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\cdots$$, making $$\\frac{1}{R_T}$$ larger, which means $$R_T$$ itself becomes smaller.\n- Step 2: Physically, adding a resistor in parallel provides an **additional path** for current to flow. Even if the new branch has a very large resistance, it still carries *some* current, so the total current from the source increases for the same voltage. More current for the same voltage means less total resistance. This is like adding another lane to a road — traffic flows more easily overall.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "Two resistors of 4 Ω and 12 Ω are connected in parallel. Without doing the full reciprocal calculation, what can you immediately say about the value of the combined resistance relative to 4 Ω? Explain why. (2 steps)", "answer": "- Step 1: The combined resistance must be **less than 4 Ω** (the smallest branch resistance). This is a universal rule: the total resistance of parallel resistors is always less than the smallest individual resistance.\n- Step 2: Intuitively, the 4 Ω branch alone already provides one path for current. Adding the 12 Ω branch in parallel provides an *additional* path (even if it's a narrower one), so the total current for the same voltage is greater than what the 4 Ω branch alone would allow. More total current → less total resistance. If you calculated it: $$\\frac{1}{R_T} = \\frac{1}{4} + \\frac{1}{12} = \\frac{4}{12}$$, so $$R_T = 3\\;\\Omega < 4\\;\\Omega$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Two identical resistors, each of resistance $$R$$, are connected in parallel. What is the total resistance, and why? Give a quick intuitive explanation. (2 steps)", "answer": "- Step 1: The total resistance is $$\\frac{R}{2}$$ — exactly half of one resistor. Using the formula: $$\\frac{1}{R_T} = \\frac{1}{R} + \\frac{1}{R} = \\frac{2}{R}$$, so $$R_T = \\frac{R}{2}$$.\n- Step 2: Intuitively, two identical paths mean the current can split equally — each branch carries half the total current. For the same voltage, twice the current flows compared to a single resistor, so the total resistance is halved. This extends: three identical resistors in parallel give $$R_T = \\frac{R}{3}$$, and so on.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "Write the \"product-over-sum\" shortcut formula for exactly two resistors in parallel. Under what circumstances is this formula valid, and what is its limitation? (2 steps)", "answer": "- Step 1: For exactly two parallel resistors: $$R_T = \\frac{R_1 R_2}{R_1 + R_2}$$. This is derived by combining the two reciprocal terms over a common denominator: $$\\frac{1}{R_T} = \\frac{R_1 + R_2}{R_1 R_2}$$, then inverting.\n- Step 2: This shortcut is only valid for **two** resistors in parallel. For three or more, you must use the general reciprocal method: $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\frac{1}{R_3} + \\cdots$$. There is no simple product-over-sum extension for three or more resistors. Also, remember to always take the reciprocal at the end — computing $$\\frac{1}{R_T}$$ is not the final answer; $$R_T$$ is.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "A student calculates $$\\frac{1}{R_T} = \\frac{1}{6} + \\frac{1}{3} = \\frac{1}{2}$$ for two parallel resistors and writes $$R_T = \\frac{1}{2}\\;\\Omega$$ as the final answer. What mistake has been made? (2 steps)", "answer": "- Step 1: The student has forgotten to take the reciprocal at the final step. The calculation gives $$\\frac{1}{R_T} = \\frac{1}{2}$$, not $$R_T = \\frac{1}{2}$$. The correct step is to invert: if $$\\frac{1}{R_T} = 0.5$$, then $$R_T = \\frac{1}{0.5} = 2\\;\\Omega$$.\n- Step 2: This is one of the most common exam errors with parallel resistance. The two-step check is: (i) compute $$\\frac{1}{R_T}$$ first, (ii) then take the reciprocal to get $$R_T$$. A quick sanity check: since 6 Ω and 3 Ω are in parallel, the answer must be less than 3 Ω (the smallest branch). Getting $$R_T = 0.5\\;\\Omega$$ would be suspiciously small; $$R_T = 2\\;\\Omega$$ is correctly less than 3 Ω but reasonable.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "A student writes the resistance formula as $$R = IV$$. Why is this wrong, both algebraically and in terms of units? (2 steps)", "answer": "- Step 1: Algebraically, Ohm's Law is $$V = IR$$, which rearranges to $$R = \\frac{V}{I}$$, not $$R = IV$$. Multiplying current by voltage gives power ($$P = IV$$, in watts), not resistance.\n- Step 2: In terms of units, $$R = \\frac{V}{I}$$ gives $$\\frac{\\text{volts}}{\\text{amperes}} = \\text{ohms}$$, which is correct. But $$R = IV$$ gives $$\\text{amperes} \\times \\text{volts} = \\text{watts}$$, which is a unit of power, not resistance. Always write and remember $$R = \\frac{V}{I}$$ — never $$R = IV$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "A circuit has a 12.0 V battery, an 8.0 Ω resistor in series with a parallel pair (3.0 Ω and 6.0 Ω). What is the first step in finding the total resistance, and why must you take this step before adding the series resistor? (2 steps)", "answer": "- Step 1: The first step is to **solve the parallel sub-circuit** on its own. Calculate the combined resistance of the 3.0 Ω ∥ 6.0 Ω pair: $$\\frac{1}{R_{23}} = \\frac{1}{3} + \\frac{1}{6} = \\frac{2+1}{6} = \\frac{3}{6} = \\frac{1}{2}$$, so $$R_{23} = 2.0\\;\\Omega$$.\n- Step 2: You must do this first because the parallel pair acts as a *single equivalent resistor* in the overall series circuit. Only after collapsing the parallel section into one value (2.0 Ω) can you add it to the series resistor: $$R_T = 8.0 + 2.0 = 10.0\\;\\Omega$$. Trying to apply one formula to the whole combination in one go produces wrong answers — the series and parallel rules apply to different groupings within the circuit.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "For the combination circuit (12.0 V, 8.0 Ω in series with 3.0 Ω ∥ 6.0 Ω), the total resistance is 10.0 Ω and the total current is 1.2 A. How do you find the p.d. across the 8.0 Ω resistor and the p.d. across the parallel section? Which Kirchhoff law do you use for each? (3 steps)", "answer": "- Step 1: The 8.0 Ω resistor carries the full current (series rule — same $$I$$ everywhere). Use Ohm's Law: $$V_1 = I_T \\times R_1 = 1.2 \\times 8.0 = 9.6$$ V.\n- Step 2: The p.d. across the parallel section is found using KVL around the full loop: $$\\varepsilon = V_1 + V_{23}$$, so $$V_{23} = 12.0 - 9.6 = 2.4$$ V. Both the 3.0 Ω and 6.0 Ω resistors have 2.4 V across them (parallel voltage rule).\n- Step 3: You can verify: the branch currents are $$I_2 = \\frac{2.4}{3.0} = 0.80$$ A and $$I_3 = \\frac{2.4}{6.0} = 0.40$$ A. KCL check: $$0.80 + 0.40 = 1.20$$ A $$= I_T$$. KVL check: $$9.6 + 2.4 = 12.0$$ V $$= \\varepsilon$$. Both laws are satisfied.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "In a combination circuit, the p.d. across the parallel section is 5.0 V and the total e.m.f. is 9.0 V. What is the p.d. across the series element, and which law determines this? (2 steps)", "answer": "- Step 1: By KVL around the closed loop, the e.m.f. equals the sum of p.d.s: $$\\varepsilon = V_{\\text{series}} + V_{\\text{parallel}}$$. So $$V_{\\text{series}} = 9.0 - 5.0 = 4.0$$ V.\n- Step 2: This is determined by Kirchhoff's Second Law (conservation of energy). The battery supplies 9.0 J per coulomb; 5.0 J/C is dissipated in the parallel section and 4.0 J/C in the series element. All energy supplied must be accounted for — none is created or destroyed.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "A parallel circuit has a 3.0 Ω branch and an unknown branch, with 4.8 V across them. The total current from the supply is 2.4 A. Describe the logical steps to find the unknown resistance — without computing the final number, explain what you would calculate and in what order. (3 steps)", "answer": "- Step 1: Find the current through the known 3.0 Ω branch using Ohm's Law: $$I_1 = \\frac{V}{R_1} = \\frac{4.8}{3.0} = 1.6$$ A.\n- Step 2: Use KCL at the junction to find the current through the unknown branch: $$I_2 = I_T - I_1 = 2.4 - 1.6 = 0.8$$ A. The total current splits, so the unknown branch current is what remains.\n- Step 3: Use Ohm's Law again for the unknown branch: $$R_2 = \\frac{V}{I_2} = \\frac{4.8}{0.8} = 6.0\\;\\Omega$$. The voltage across the unknown branch is the same 4.8 V (parallel rule). This three-step approach (Ohm → KCL → Ohm) is the standard method for finding unknowns in parallel sections.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "A student says \"resistors store electrons — that's why the voltage drops.\" Explain why this is fundamentally wrong. What do resistors actually do to the charge and to the energy? (2 steps)", "answer": "- Step 1: Resistors do **not** store electrons. Charge (electrons) flows *through* the resistor — every electron that enters exits the other side. No charge accumulates inside. This is conservation of charge: the current in equals the current out.\n- Step 2: What resistors actually do is **convert electrical energy to thermal energy** (heating). The energy *per charge* (i.e., the potential difference) decreases across the resistor, but the charge itself is unchanged. The voltage drop reflects energy being *transferred out* of the electrical form, not charge being \"used up\" or stored.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "You are asked to \"state and explain\" Kirchhoff's First Law in an exam. List the four elements your answer should contain for full marks. (2 steps)", "answer": "- Step 1: The four required elements are: (1) **Name the law**: Kirchhoff's First Law. (2) **State it in words with the conservation principle**: the sum of currents entering a junction equals the sum of currents leaving, due to conservation of charge. (3) **Write the equation**: $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$. (4) **Apply numerically** if the question provides values (e.g., calculate the missing current).\n- Step 2: The mark-scheme keywords are \"conservation of charge\" and \"sum of currents into junction equals sum out.\" Simply writing the equation without the conservation principle typically loses the explanation mark. Always connect the law to its underlying physical principle.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "You are asked to \"state and explain\" Kirchhoff's Second Law in an exam. List the key elements your answer should contain. (2 steps)", "answer": "- Step 1: The required elements are: (1) **Name the law**: Kirchhoff's Second Law. (2) **State it in words with the conservation principle**: the sum of e.m.f.s around a closed loop equals the sum of potential differences, due to conservation of energy. (3) **Write the equation**: $$\\sum \\varepsilon = \\sum IR$$. (4) **Apply numerically** if the question provides values.\n- Step 2: The mark-scheme keywords are \"conservation of energy\" and \"sum of e.m.f.s equals sum of p.d.s around loop.\" A charge completing a full loop returns to its starting energy — all energy gained from the source is lost across components. Without the conservation principle, the explanation is incomplete.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "In the series resistance derivation, the proof starts from $$V_T = V_1 + V_2$$. In the parallel resistance derivation, the proof starts from $$I_T = I_1 + I_2$$. What general principle determines which equation you start from? (2 steps)", "answer": "- Step 1: You always start from the equation for the **quantity that adds up** in that circuit type. In series, voltages add ($$V_T = V_1 + V_2$$, from KVL/conservation of energy). In parallel, currents add ($$I_T = I_1 + I_2$$, from KCL/conservation of charge).\n- Step 2: The deeper principle: conservation of energy → voltage rules → start from voltage when deriving series formulas. Conservation of charge → current rules → start from current when deriving parallel formulas. If you start from the wrong quantity (e.g., $$R_1 + R_2$$ for parallel), you generate complex fractions and cannot reach the correct result. The starting point is determined by which conservation law governs the *non-trivial* addition in that topology.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A 9.0 V source drives a series circuit containing a diode (1.5 V drop) and two resistors. The current is 30 mA everywhere. Why is the current the same everywhere, and what is the total p.d. available for the two resistors? (2 steps)", "answer": "- Step 1: The current is the same everywhere (30 mA) because this is a series circuit — there is only one path, so by conservation of charge (KCL), the same current flows through every component. The diode, like any series component, does not store or divert charge.\n- Step 2: By KVL, the total e.m.f. equals the sum of all voltage drops: $$\\varepsilon = V_{\\text{diode}} + V_H + V_I$$. So the p.d. available for the two resistors together is: $$V_H + V_I = 9.0 - 1.5 = 7.5$$ V. The diode's 1.5 V drop is a fixed energy cost per coulomb; the remaining 7.5 V is shared between the resistors.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "A circuit has resistor C in series with a parallel pair (A and B). Given: $$R_A = 12\\;\\Omega$$, $$I_A = 0.8$$ A, and $$I_B = 1.2$$ A. Find $$I_C$$, $$V_A$$, and $$R_B$$, describing which law or rule you use at each step. (4 steps)", "answer": "- Step 1: Find $$I_C$$ using KCL at the junction. The total current through C equals the sum of the branch currents: $$I_C = I_A + I_B = 0.8 + 1.2 = 2.0$$ A. C is in series with the whole parallel section, so it carries the total current.\n- Step 2: Find $$V_A$$ using Ohm's Law: $$V_A = I_A \\times R_A = 0.8 \\times 12 = 9.6$$ V.\n- Step 3: Find $$V_B$$ using the parallel voltage rule (KVL): both branches share the same two nodes, so $$V_B = V_A = 9.6$$ V.\n- Step 4: Find $$R_B$$ using Ohm's Law: $$R_B = \\frac{V_B}{I_B} = \\frac{9.6}{1.2} = 8.0\\;\\Omega$$. Notice that the branch with *more* current has *less* resistance — this is consistent with $$I = V/R$$ for the same voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "In a parallel circuit with a 6.0 V source, two resistors (2.0 Ω and 3.0 Ω) are connected in parallel. Without calculating exact power values, which resistor dissipates more power, and why? (2 steps)", "answer": "- Step 1: The 2.0 Ω resistor dissipates more power. Both resistors have the same 6.0 V across them (parallel rule), but the 2.0 Ω resistor draws more current because $$I = V/R$$ — lower resistance means higher current for the same voltage.\n- Step 2: Since $$P = VI$$ and $$V$$ is the same for both, the resistor with the higher current (the 2.0 Ω one) has higher power. Alternatively, using $$P = V^2/R$$: same $$V$$, smaller $$R$$ → larger $$P$$. In parallel, the *smallest* resistance always dissipates the most power. This is the opposite of series, where the *largest* resistance dissipates the most ($$P = I^2 R$$, same $$I$$, larger $$R$$ → larger $$P$$).", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "Three resistors of 6.0 Ω each are connected in parallel. What is the total resistance? Explain using the \"identical resistors\" shortcut. (2 steps)", "answer": "- Step 1: For three identical resistors in parallel, the total resistance is $$R_T = \\frac{R}{3} = \\frac{6.0}{3} = 2.0\\;\\Omega$$. Using the reciprocal method: $$\\frac{1}{R_T} = \\frac{1}{6} + \\frac{1}{6} + \\frac{1}{6} = \\frac{3}{6} = \\frac{1}{2}$$, so $$R_T = 2.0\\;\\Omega$$.\n- Step 2: The shortcut: for $$n$$ identical resistors of resistance $$R$$ in parallel, $$R_T = \\frac{R}{n}$$. This works because each additional identical branch provides an equal extra path for current, so the total current is $$n$$ times the single-branch current for the same voltage. $$n$$ times the current means $$\\frac{1}{n}$$ the resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "A very large resistor (e.g., 1 MΩ) is added in parallel with a small resistor (e.g., 10 Ω). Is the combined resistance closer to 10 Ω or 1 MΩ? Explain why, and state the general principle. (2 steps)", "answer": "- Step 1: The combined resistance is very close to 10 Ω — only slightly less. The 1 MΩ branch carries negligible current compared to the 10 Ω branch, so it barely increases the total current. The dominant path is the 10 Ω branch.\n- Step 2: General principle: when resistors of very different values are in parallel, the **smallest resistance dominates**. The total is slightly less than the smallest branch but very close to it. Using the formula: $$\\frac{1}{R_T} = \\frac{1}{10} + \\frac{1}{1{,}000{,}000} \\approx 0.1$$, so $$R_T \\approx 10\\;\\Omega$$. The large resistor barely changes the total.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "A very large resistor (e.g., 1 MΩ) is added in series with a small resistor (e.g., 10 Ω). Is the combined resistance closer to 10 Ω or 1 MΩ? Explain why, and contrast with the parallel case. (2 steps)", "answer": "- Step 1: The combined resistance is very close to 1 MΩ — only slightly more. In series, resistances add directly: $$R_T = 10 + 1{,}000{,}000 = 1{,}000{,}010 \\;\\Omega \\approx 1\\;\\text{M}\\Omega$$. The large resistor completely dominates.\n- Step 2: General principle: when resistors of very different values are in **series**, the **largest resistance dominates**. In **parallel**, the **smallest resistance dominates**. This is because series adds resistances (large term swamps small term), while parallel adds *conductances* ($$1/R$$), where the small resistor has the largest conductance and therefore dominates.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "A student calculates the total resistance of a combination circuit as follows: $$\\frac{1}{R_T} = \\frac{1}{80} + \\frac{1}{20} + \\frac{1}{10}$$, treating all three resistors as parallel. The circuit actually has 80 Ω in *series* with a parallel pair (20 Ω ∥ 10 Ω). What is the conceptual error, and what should the student have done? (3 steps)", "answer": "- Step 1: The error is treating the entire circuit as if all three resistors are in parallel. The 80 Ω resistor is in *series* with the parallel section — it is not in parallel with the 20 Ω and 10 Ω resistors.\n- Step 2: The correct approach is the **two-step method**: first, solve the parallel sub-circuit. $$\\frac{1}{R_p} = \\frac{1}{20} + \\frac{1}{10} = \\frac{3}{20}$$, so $$R_p \\approx 6.7\\;\\Omega$$. This collapses the parallel pair into a single equivalent resistor.\n- Step 3: Then add the series resistor: $$R_T = 80 + 6.7 = 86.7\\;\\Omega$$. The student's incorrect method would give a much smaller value (treating 80 Ω as parallel makes the total even smaller). **Never apply a single formula to the whole combination — solve parallel sub-circuits first, then add series values.**", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "In a parallel circuit, each closed loop can be treated as its own independent series circuit (KVL applies per loop). What practical consequence does this have for domestic wiring, and why? (2 steps)", "answer": "- Step 1: In domestic wiring, appliances are connected in parallel. Each loop (source → appliance → source) acts as an independent series circuit. This means each appliance receives the full supply voltage regardless of what else is connected.\n- Step 2: The practical benefit: if one appliance breaks (its loop is open), the other loops are unaffected — current still flows through the remaining appliances. In series, one broken component would break the entire circuit. This independence is why parallel circuits are essential for household wiring: each device operates independently at full voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "A student is solving a combination circuit and writes $$R_T = R_1 + R_2 + R_3$$ where $$R_1$$ is a series resistor and $$R_2, R_3$$ are in parallel with each other. Is this equation correct? Explain. (2 steps)", "answer": "- Step 1: This equation is **incorrect** as written. $$R_T = R_1 + R_2 + R_3$$ is the series formula, but $$R_2$$ and $$R_3$$ are in *parallel* with each other, not in series. You cannot directly add $$R_2$$ and $$R_3$$.\n- Step 2: The correct approach: first compute the parallel combination $$R_{23}$$ using $$\\frac{1}{R_{2323}} = \\frac{1}{R_2} + \\frac{1}{R_3}$$, then add the series resistor: $$R_T = R_1 + R_{23}$$. The key insight is that $$R_2$$ and $$R_3$$ together behave as a *single* equivalent resistor $$R_{23}$$, and only then does the series addition apply.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "In a combination circuit (R₁ in series with R₂ ∥ R₃), the total current from the battery is $$I_T$$. Rank the currents $$I_1$$ (through R₁), $$I_2$$ (through R₂), and $$I_3$$ (through R₃) in terms of magnitude, and explain the relationships using Kirchhoff's Laws. (3 steps)", "answer": "- Step 1: $$I_1 = I_T$$. Since R₁ is in series with the entire parallel section, it carries the full supply current. By KCL, the current through R₁ equals the total current from the battery.\n- Step 2: $$I_2 + I_3 = I_T$$ (KCL at the junction where the circuit splits into the two parallel branches). The total current divides between the two branches.\n- Step 3: The relative sizes of $$I_2$$ and $$I_3$$ depend on the resistances. Since both branches have the same voltage across them (parallel rule), by Ohm's Law $$I = V/R$$: the branch with *smaller* resistance carries *larger* current. If $$R_2 < R_3$$, then $$I_2 > I_3$$. The overall ranking: $$I_1 = I_T > I_2 > I_3$$ (assuming $$R_2 < R_3$$).", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "A combination circuit has a 12 V battery, R₁ = 8 Ω in series with R₂ ∥ R₃ (where R₂ = 3 Ω, R₃ = 6 Ω). The total current is 1.2 A. Which resistor carries more current — R₂ or R₃ — and roughly by what factor? (2 steps)", "answer": "- Step 1: R₂ (3 Ω) carries more current than R₃ (6 Ω). Both have the same voltage across them (parallel rule), and since $$I = V/R$$, the smaller resistance draws more current. R₂ has half the resistance of R₃, so it carries roughly twice the current.\n- Step 2: With 2.4 V across the parallel section: $$I_2 = 2.4/3.0 = 0.80$$ A and $$I_3 = 2.4/6.0 = 0.40$$ A. The ratio is exactly 2:1, matching the resistance ratio of 1:2. In general, for two parallel resistors, the current splits *inversely* proportional to the resistances.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "A student reasons: \"In a series circuit, I is the same everywhere. Since $$V = IR$$, and I is constant, V should also be constant.\" Identify the logical flaw in this reasoning. (2 steps)", "answer": "- Step 1: The flaw is the implicit assumption that $$R$$ is the same everywhere. The equation $$V = IR$$ has *three* variables. If $$I$$ is constant but $$R$$ varies from component to component, then $$V$$ must also vary.\n- Step 2: In a series circuit, each component has a different resistance (e.g., a 3 Ω resistor and a 5 Ω resistor). Same current through both, but $$V_1 = I \\times 3$$ and $$V_2 = I \\times 5$$ — different voltages. The correct conclusion from \"same I\" is not \"same V\" but rather \"V is proportional to R.\" Components with larger resistance have larger voltage drops in series.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "You have a 12 V supply and need to deliver approximately 1.2 A of current. You have resistors of 8 Ω, 3 Ω, and 6 Ω available. How would you connect them to achieve a total resistance of about 10 Ω? (2 steps)", "answer": "- Step 1: Connect the 3 Ω and 6 Ω resistors in *parallel*. Their combined resistance is: $$\\frac{1}{R_{23}} = \\frac{1}{3} + \\frac{1}{6} = \\frac{1}{2}$$, so $$R_{23} = 2\\;\\Omega$$.\n- Step 2: Then connect this parallel combination in *series* with the 8 Ω resistor. Total: $$R_T = 8 + 2 = 10\\;\\Omega$$. Current: $$I = 12/10 = 1.2$$ A. This is the standard approach for combination circuits: use parallel to *reduce* resistance below the smallest branch value, then add series resistance to reach the target.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "Why is it impossible for the total resistance of a parallel combination to equal the *average* of the individual resistances? Use the formula to explain. (2 steps)", "answer": "- Step 1: The parallel formula adds *reciprocals*, not the resistances themselves: $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2}$$. This is a *harmonic* mean, not an arithmetic mean. The result is always less than the arithmetic average.\n- Step 2: For example, with 4 Ω and 12 Ω in parallel: the arithmetic average is $$\\frac{4+12}{2} = 8\\;\\Omega$$, but the actual parallel combination is 3 Ω. The parallel formula gives a value even less than the *smallest* branch (4 Ω), which is necessarily less than the average (8 Ω). Adding conductances ($$1/R$$) and then inverting always produces a smaller result than averaging the resistances directly.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "A circuit has two resistors in parallel: R₁ = 10 Ω and R₂ = 10 Ω. A third resistor R₃ = 10 Ω is added in parallel. Describe what happens to the total resistance qualitatively, and give the new total. (2 steps)", "answer": "- Step 1: The total resistance **decreases** further. Adding any resistor in parallel always reduces the total resistance because it provides an additional current path.\n- Step 2: With two 10 Ω resistors: $$R_T = 10/2 = 5\\;\\Omega$$. With three: $$R_T = 10/3 \\approx 3.3\\;\\Omega$$. Each additional identical branch reduces the total resistance by providing more paths for current. The general rule for $$n$$ identical resistors $$R$$ in parallel: $$R_T = R/n$$.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "A student measures current with an ammeter and voltage with a voltmeter to find resistance using $$R = V/I$$. In one setup, the ammeter is placed *before* the resistor (between supply and resistor) and the voltmeter is across the resistor only. In another setup, the voltmeter is across *both* the ammeter and resistor. Which setup is generally preferable and why? (2 steps)", "answer": "- Step 1: The first setup is generally preferable — ammeter in series with the resistor, voltmeter across the resistor *only*. Here, the ammeter measures the true current through the resistor, and the voltmeter reads the true p.d. across it, giving an accurate $$R = V/I$$.\n- Step 2: In the second setup, the voltmeter reads the p.d. across *both* the ammeter and resistor combined ($$V = V_R + V_A$$). Since the ammeter has a small but non-zero resistance, the calculated $$R = V/I$$ would overestimate the true resistor value. The first setup avoids this error as long as the voltmeter has a much higher resistance than the resistor (so negligible current is diverted through the voltmeter).", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "In a complex network with multiple junctions and loops, you need to apply both Kirchhoff's Laws. Describe the strategy: at how many junctions do you apply KCL, and around how many loops do you apply KVL? (2 steps)", "answer": "- Step 1: Apply KCL at **each junction independently**. At every junction, write $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$. Each junction gives one independent equation. You do not choose when KCL applies — it applies at every junction, always.\n- Step 2: Apply KVL around **each independent closed loop**. Each loop gives one equation: $$\\sum \\varepsilon = \\sum IR$$. The number of independent loop equations needed equals the number of \"meshes\" (windowpanes) in the circuit diagram. Together, the KCL and KVL equations provide enough independent equations to solve for all unknown currents and voltages.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "A 6.0 V battery drives a series circuit with two resistors: 4.0 Ω and 12 Ω. Without computing exact values, which resistor has the larger voltage across it, and roughly what fraction of the total voltage does it receive? (2 steps)", "answer": "- Step 1: The 12 Ω resistor has the larger voltage across it. In a series circuit, $$V = IR$$ with the same $$I$$ for both, so voltage is directly proportional to resistance. The 12 Ω resistor has three times the resistance of the 4.0 Ω resistor, so it receives three times the voltage.\n- Step 2: The total resistance is 16 Ω. The 12 Ω resistor receives $$\\frac{12}{16} = \\frac{3}{4}$$ of the total voltage, so approximately 4.5 V. The 4.0 Ω resistor receives $$\\frac{4}{16} = \\frac{1}{4}$$, so approximately 1.5 V. This \"voltage divider\" principle — voltage splits in proportion to resistance — is a direct consequence of the same current flowing through both.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "A student sees a circuit with a 9.0 V source, a series resistor K, and a parallel section with L and M. The voltage across the parallel section is 2.0 V. The student writes: \"The voltage across K is 2.0 V because it's in the same circuit.\" Identify and correct the error. (2 steps)", "answer": "- Step 1: This is incorrect. K is in *series* with the parallel section, not in parallel with it. The voltage across K is not the same as the voltage across the parallel section — voltages in series *add*, not equal each other.\n- Step 2: By KVL: $$\\varepsilon = V_K + V_{\\text{parallel}}$$, so $$V_K = 9.0 - 2.0 = 7.0$$ V. The source voltage is *shared* between the series element and the parallel section. The 2.0 V is the parallel section's share; the remaining 7.0 V is K's share. Confusing \"same circuit\" with \"same voltage\" is a common error — voltage equality only holds for *parallel* connections, not series.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "A circuit has a resistor in series with a parallel pair. You are given the e.m.f. and all resistance values. List the seven-step strategy for finding every current and p.d. in the circuit. (3 steps — list the strategy in three logical groups)", "answer": "- Step 1: **Find total resistance and current.** (1) Solve the parallel sub-circuit to find $$R_{\\text{parallel}}$$. (2) Add series resistances to get $$R_T$$. (3) Find total current: $$I_T = \\varepsilon / R_T$$.\n- Step 2: **Find voltages.** (4) Use the series rule (same $$I$$) to find p.d. across the series element: $$V_{\\text{series}} = I_T \\times R_{\\text{series}}$$. (5) Use KVL to find p.d. across the parallel group: $$V_{\\text{parallel}} = \\varepsilon - V_{\\text{series}}$$.\n- Step 3: **Find branch currents and verify.** (6) Use Ohm's Law in each parallel branch: $$I_k = V_{\\text{parallel}} / R_k$$. (7) Always check: KCL (branch currents sum to $$I_T$$) and KVL (p.d.s sum to $$\\varepsilon$$).", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "A student forgets to convert 30 mA to amperes before substituting into Ohm's Law with a 200 Ω resistor. They calculate $$V = 30 \\times 200 = 6000$$ V. What should the calculation be, and what is the general rule? (2 steps)", "answer": "- Step 1: The correct calculation: $$30 \\text{ mA} = 0.030 \\text{ A}$$, so $$V = 0.030 \\times 200 = 6.0$$ V. The student's answer of 6000 V is off by a factor of 1000 because they did not convert milliamps to amps.\n- Step 2: General rule: **always convert to base SI units before substituting into any equation.** $$1 \\text{ mA} = 10^{-3} \\text{ A}$$, $$1 \\text{ μA} = 10^{-6} \\text{ A}$$, $$1 \\text{ kΩ} = 10^3 \\text{ Ω}$$, $$1 \\text{ MΩ} = 10^6 \\text{ Ω}$$. Failing to convert is one of the most common sources of wrong answers in circuit calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "Two resistors, 60 Ω and 30 Ω, are connected in parallel. Using mental math or simple fractions, find the combined resistance. (2 steps)", "answer": "- Step 1: Write the reciprocal equation: $$\\frac{1}{R_T} = \\frac{1}{60} + \\frac{1}{30} = \\frac{1}{60} + \\frac{2}{60} = \\frac{3}{60} = \\frac{1}{20}$$.\n- Step 2: Invert to get $$R_T = 20\\;\\Omega$$. Quick check: 20 Ω is less than 30 Ω (the smallest branch), so this is consistent with the rule that parallel resistance is always less than the smallest individual resistance. Alternatively, using product-over-sum: $$R_T = \\frac{60 \\times 30}{60 + 30} = \\frac{1800}{90} = 20\\;\\Omega$$.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "A circuit has 7.0 Ω in series with a parallel pair of 4.0 Ω and 12 Ω. Find the total resistance. (3 steps)", "answer": "- Step 1: Solve the parallel sub-circuit: $$\\frac{1}{R_{23}} = \\frac{1}{4.0} + \\frac{1}{12} = \\frac{3}{12} + \\frac{1}{12} = \\frac{4}{12} = \\frac{1}{3}$$, so $$R_{23} = 3.0\\;\\Omega$$.\n- Step 2: Add the series resistor: $$R_T = 7.0 + 3.0 = 10.0\\;\\Omega$$.\n- Step 3: Sanity check: the parallel combination (3.0 Ω) is less than the smallest branch (4.0 Ω) ✓. The total (10.0 Ω) is greater than either the series resistor or the parallel combination alone ✓ (series always increases resistance).", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "A junction has two wires carrying current *into* the junction: $$I_1 = 0.35$$ A and $$I_2 = 0.15$$ A. What is the current leaving the junction, and which law determines this? (2 steps)", "answer": "- Step 1: By Kirchhoff's First Law (conservation of charge): $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$. The total current entering is $$0.35 + 0.15 = 0.50$$ A.\n- Step 2: Therefore the current leaving the junction is **0.50 A**. Charge cannot accumulate at the junction — every coulomb arriving must depart by some route. This is KCL in its simplest form: what goes in must come out.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "A student argues: \"In a series circuit, KCL doesn't apply because there are no junctions.\" Is this reasoning correct? Explain how KCL applies in a series circuit. (2 steps)", "answer": "- Step 1: The reasoning is incorrect. KCL *does* apply in a series circuit — it applies at *every* point, not just at branch junctions. At any cross-section of the wire in a series circuit, the current entering equals the current leaving.\n- Step 2: In a series circuit, KCL is *trivially satisfied* at every point: one wire in, one wire out, so $$I_{\\text{in}} = I_{\\text{out}}$$ automatically. This is why the current is the same everywhere — there's nowhere for charge to accumulate or diverge. KCL is not a rule that only activates at visible junctions; it is a universal statement about charge conservation that holds at every point in every circuit.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "Imagine a \"Charlie the Coulomb\" at a battery with e.m.f. $$\\varepsilon = 24$$ V, then travelling through three resistors in series with voltage drops of 4 V, 8 V, and 12 V. Verify KVL, and explain what would violate conservation of energy if the drops did not sum to 24 V. (3 steps)", "answer": "- Step 1: The charge gains 24 J/C at the battery (the e.m.f.). It then loses 4 J/C, 8 J/C, and 12 J/C at the three resistors. Total lost: $$4 + 8 + 12 = 24$$ J/C.\n- Step 2: KVL is satisfied: $$\\varepsilon = V_1 + V_2 + V_3 = 4 + 8 + 12 = 24$$ V. The charge returns to its starting point with 0 J/C net gain — all energy supplied has been dissipated.\n- Step 3: If the drops summed to less than 24 V, the charge would return to the battery with leftover energy — energy would have been *created* somewhere, violating conservation. If they summed to more than 24 V, the charge would end with negative energy — energy would have been *destroyed*. Neither is possible. KVL is simply the statement that energy is conserved around a closed loop.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": true}, {"question": "In a parallel circuit with a 6.0 V source and two resistors (2.0 Ω and 3.0 Ω), the total current from the battery is 5.0 A. Verify this using KCL, and explain why the battery current is larger than either branch current. (2 steps)", "answer": "- Step 1: Each branch has 6.0 V across it (parallel rule). Branch currents: $$I_1 = 6.0/2.0 = 3.0$$ A and $$I_2 = 6.0/3.0 = 2.0$$ A. By KCL: $$I_T = I_1 + I_2 = 3.0 + 2.0 = 5.0$$ A ✓.\n- Step 2: The battery current is larger than either individual branch current because the battery must supply *all* the charge that flows through *both* branches. At the junction, the current splits — but the battery sees the combined demand. This is why adding more parallel branches increases the total current draw (and decreases total resistance): each new branch adds to the total current the battery must provide.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}, {"question": "A student is given a combination circuit and asked to find the p.d. across the series resistor. They try to use the parallel voltage rule (same V everywhere) for the series resistor. Why is this wrong, and what rule should they use instead? (2 steps)", "answer": "- Step 1: The parallel voltage rule (same V across branches) only applies to components in *parallel* — those connected between the same two nodes. A series resistor is not in parallel with anything; it is in series, so it does not share the same voltage as the parallel section.\n- Step 2: To find the p.d. across the series resistor, use **Ohm's Law** ($$V = I_T \\times R_{\\text{series}}$$) since the total current flows through it, or use **KVL** ($$V_{\\text{series}} = \\varepsilon - V_{\\text{parallel}}$$) if the parallel section voltage is already known. In series, voltage *adds* (KVL); in parallel, voltage is *equal* (same nodes). Confusing these two rules is a major source of errors.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "A circuit has an 80 Ω resistor in series with a parallel combination of 20 Ω and 10 Ω. A student skips step 1 and writes $$R_T = 80 + 20 + 10 = 110\\;\\Omega$$. Explain the error and give the correct total. (3 steps)", "answer": "- Step 1: The student has treated all three resistors as if they are in series, adding them directly. But the 20 Ω and 10 Ω resistors are in *parallel* with each other, not in series. Adding them directly (20 + 10 = 30 Ω) overestimates their combined resistance.\n- Step 2: Correct step 1 — solve the parallel section: $$\\frac{1}{R_p} = \\frac{1}{20} + \\frac{1}{10} = \\frac{1}{20} + \\frac{2}{20} = \\frac{3}{20}$$, so $$R_p = \\frac{20}{3} \\approx 6.7\\;\\Omega$$. This is much less than 30 Ω because parallel *reduces* resistance.\n- Step 3: Correct step 2 — add the series resistor: $$R_T = 80 + 6.7 = 86.7\\;\\Omega$$. The student's answer of 110 Ω is significantly too high. The parallel section provides an additional current path, making the total resistance much less than if all were in series.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}, {"question": "Summarise the \"proof starting-point rule\": when deriving the series resistance formula, which conservation law and which quantity do you start from? When deriving the parallel resistance formula, which conservation law and which quantity do you start from? (2 steps)", "answer": "- Step 1: **Series derivation** — start from conservation of **energy** (KVL), which gives the voltage addition rule: $$V_T = V_1 + V_2$$. Voltage is the quantity that adds in series, so it is the natural starting point. Then substitute $$V = IR$$, use the series current rule (same $$I$$), and cancel.\n- Step 2: **Parallel derivation** — start from conservation of **charge** (KCL), which gives the current addition rule: $$I_T = I_1 + I_2$$. Current is the quantity that adds in parallel, so it is the natural starting point. Then substitute $$I = V/R$$, use the parallel voltage rule (same $$V$$), and cancel. **Always start from the quantity that adds up in that circuit type.**", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": true}, {"question": "Why can you never have a situation where adding a resistor in parallel *increases* the total resistance? Explain using the concept of conductance ($$1/R$$). (2 steps)", "answer": "- Step 1: In parallel, conductances add: $$\\frac{1}{R_T} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\cdots$$. Each additional parallel branch adds a *positive* conductance term ($$\\frac{1}{R_k} > 0$$ for any resistor), so the total conductance always increases.\n- Step 2: Since conductance is the reciprocal of resistance, an increase in total conductance means a *decrease* in total resistance. There is no way to add a positive conductance and get a smaller total conductance. Even adding a very large resistor (tiny conductance) still increases the total conductance slightly, reducing $$R_T$$ slightly. This is why parallel resistance is always less than the smallest branch — you are adding conductance, not resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": true}, {"question": "A student sees the equation $$\\sum \\varepsilon = \\sum IR$$ an
