? (3 steps)", "answer": "- Step 1: Use the baseline ratio: same current means $$\\frac{V_{th}}{R_{th}} = \\frac{V_S}{R_{th} + R}$$, i.e. $$\\frac{5}{450} = \\frac{9}{450+R}$$.\n- Step 2: Cross-multiply: $$5(450+R) = 9 \\times 450$$, which rearranges to give $$R$$ in terms of known quantities.\n- Step 3: Sense-check the answer: since $$V_R = 9 - 5 = 4\\,\\text{V} < V_{th} = 5\\,\\text{V}$$, we expect $$R < R_{th}$$, i.e. $$R < 450\\,\\Omega$$.\n\nThe sense-check is just $$V \\propto R$$ — smaller voltage means smaller resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Why is the sense-check \"smaller voltage ⟹ smaller resistance\" so powerful in divider problems?", "answer": "Because in a series circuit the current is identical through both resistors, so $$V = IR$$ tells you that voltage and resistance scale together. If you compute a resistance and the resulting voltage ratio doesn't match the resistance ratio, you have an arithmetic error. This single check catches numerator-flip mistakes, sign errors, and order-of-magnitude blunders. It is the cheapest verification step available and should be done on every divider answer.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "When mixing units like 200 kΩ and 10 MΩ in a divider, what's the safest way to handle them and why?", "answer": "Convert everything to the same power of ten before computing ratios. For example, $$200\\,\\text{k}\\Omega = 200 \\times 10^3\\,\\Omega$$ and $$10\\,\\text{M}\\Omega = 10\\,000 \\times 10^3\\,\\Omega$$. Now both are in $$10^3$$ units, so the ratio is simply $$200/(200+10\\,000) = 200/10\\,200 \\approx 1/51$$. This avoids confusing $$\\mu$$ ($$10^{-6}$$), m ($$10^{-3}$$), k ($$10^3$$), M ($$10^6$$). The common trap is treating $$\\mu$$ and m as similar — they differ by a factor of 1000.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Why does the same circuit current flow through both resistors in an unloaded potential divider?", "answer": "Because the circuit is purely series — there are no junctions where current can split or accumulate. By conservation of charge (Kirchhoff's First Law), the same number of electrons per second must pass every point along a single loop. This is the foundational fact that makes $$V \\propto R$$ valid for the divider: equal $$I$$ multiplied by different $$R$$ gives proportionally different $$V$$. Once you add a load in parallel, this breaks down for the parallel section, but the current entering the parallel combination still equals what leaves it.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "What is the *intuition* behind why loading reduces $$V_{out}$$, expressed in terms of \"stealing current\"? (3 steps)", "answer": "- Step 1: Imagine the unloaded divider in equilibrium — the same current flows through $$R_1$$ and $$R_2$$, splitting the voltage in ratio of resistances.\n- Step 2: Connecting a load $$R_L$$ in parallel with $$R_2$$ opens a new pathway for current to bypass $$R_2$$. The total current drawn from the supply rises because two parallel branches always have lower resistance than one.\n- Step 3: More current through $$R_1$$ means more voltage dropped across $$R_1$$ (by $$V = IR_1$$). By KVL, less voltage remains for the output section. Hence $$V_{out}$$ falls.\n\nThe load \"steals\" current that would otherwise have gone through $$R_2$$ alone, redistributing the voltage in favour of $$R_1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Why can $$V_{out}$$ on a potentiometer reach exactly 0 and exactly $$V_{in}$$ (limiting cases)?", "answer": "When the slider is at the very bottom, the output section has length zero and therefore zero resistance, so $$V_{out} = V_{in} \\cdot 0/R_{total} = 0$$. When the slider is at the very top, the output section spans the full wire and has resistance $$R_{total}$$, so $$V_{out} = V_{in} \\cdot R_{total}/R_{total} = V_{in}$$. These two extremes show why the potentiometer is \"continuously variable from 0 to $$V_{in}$$\" — a property a series rheostat cannot match.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "What is the difference between Kirchhoff's First Law and Kirchhoff's Second Law, and which one underlies the potential-divider formula?", "answer": "**Kirchhoff's First Law (current):** at any junction, $$\\sum I_{in} = \\sum I_{out}$$ — conservation of charge. **Kirchhoff's Second Law (voltage):** around any closed loop, $$\\sum \\varepsilon = \\sum V$$ — conservation of energy per charge. The divider formula relies primarily on the *Second* Law (the sum of $$V_1 + V_2$$ equals $$V_{in}$$, so they share the supply), combined with the fact that the same current flows through both (which is just topology — no junctions in a simple series loop, so the First Law is trivially satisfied).", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "A student writes \"$$R = IV$$\" when rearranging Ohm's Law. What is wrong, and how should they remember the correct form?", "answer": "Ohm's Law is $$V = IR$$, so the correct rearrangements are $$R = V/I$$ and $$I = V/R$$. The form \"$$R = IV$$\" is dimensionally wrong: $$I \\times V$$ has units of power (watts), not resistance. The mnemonic \"Very Itchy Rash\" (V-I-R) reminds you that V on its own equals I times R, and any rearrangement keeps V/I or V/R structures — never a product on the wrong side.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "What is the conceptual reason the LDR and NTC thermistor have similarly shaped R–vs–environment curves (steep at low values, flattening at high values)?", "answer": "Both are semiconductors where the resistance depends on the number of available charge carriers (electrons). At low temperature or low light, few carriers are excited into the conduction band, so resistance is very high and small changes in the stimulus cause large drops in resistance — hence the steep region. At high temperature/intensity, most carriers are already free, so further increases produce only small changes in resistance — the flattening region. The underlying physics is exponential carrier excitation, which produces this characteristic concave-down decreasing curve.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "If a thermistor and a fixed resistor are arranged so that $$V_{out}$$ is across the thermistor, and the temperature falls below some threshold, what happens to $$V_{out}$$ — and how could this trigger a heater? (3 steps)", "answer": "- Step 1: Temperature falls $$\\Rightarrow$$ $$R_{th}$$ increases (NTC behaviour reversed).\n- Step 2: The thermistor now takes a larger share of the supply, so $$V_{out}$$ across it rises.\n- Step 3: When $$V_{out}$$ exceeds a threshold set by an external circuit (e.g. a transistor switching point), the heater turns on, restoring the temperature.\n\nThis is the principle of a thermostatic switch: the sensor's resistance change becomes a voltage change, which becomes a switching signal.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Why might increasing only $$V_{in}$$ (without changing resistances) not be a good way to increase $$V_{out}$$ in a sensor circuit?", "answer": "Because $$V_{out} = V_{in} \\cdot R_2/(R_1+R_2)$$ scales linearly with $$V_{in}$$, *all* voltages in the circuit increase proportionally — including the voltage across the fixed resistor and any noise voltages. You haven't changed the *fraction* of the supply at the output; you've just scaled everything. To genuinely shift the ratio (e.g. make the output a larger share), you need to change the resistance ratio itself. Also, larger $$V_{in}$$ means more current, more power dissipation, and potentially exceeding component ratings.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "In a loaded divider, what happens to $$V_{out}$$ in the *limiting case* where $$R_L \\to \\infty$$ (open circuit) and where $$R_L \\to 0$$ (short circuit)? (2 steps)", "answer": "- Step 1: $$R_L \\to \\infty$$: the parallel combination $$R_2 \\| R_L \\to R_2$$, so $$V_{out}$$ approaches the unloaded value. An \"infinite\" load draws no current, so it doesn't disturb the divider — this is why ideal voltmeters have very high resistance.\n- Step 2: $$R_L \\to 0$$: the parallel combination collapses to 0, so $$V_{out} \\to 0$$. A short circuit across the output forces both output terminals to the same potential, dragging $$V_{out}$$ to zero regardless of what the divider would have produced.\n\nThe 10× rule lives in between these extremes — loaded enough to draw a usable signal, but high enough not to short out the divider.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Why is a digital voltmeter a good choice for measuring $$V_{out}$$ on a potential divider?", "answer": "Because digital voltmeters have very high input resistance (typically $$> 10\\,\\text{M}\\Omega$$), they act as essentially open circuits — drawing negligible current from the divider. This means they don't load the circuit significantly, so the measured $$V_{out}$$ is very close to the true unloaded value. An analogue voltmeter with low input resistance (say a few kΩ) would significantly load the divider and give a misleadingly low reading. The 10× rule applies to the voltmeter too: $$R_{voltmeter} \\geq 10\\,R_2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "A divider has $$R_1 = 5\\,\\text{k}\\Omega$$ and $$R_2 = 10\\,\\text{k}\\Omega$$ across 9 V. A 30 kΩ load is added across $$R_2$$. Roughly how much does $$V_{out}$$ drop, and why is the drop \"noticeable but not catastrophic\"? (3 steps)", "answer": "- Step 1: Unloaded: $$V_{out} = 9 \\times 10/15 = 6\\,\\text{V}$$.\n- Step 2: Loaded: $$R_2 \\| R_L = (10 \\times 30)/40 = 7.5\\,\\text{k}\\Omega$$. Now $$V_{out} = 9 \\times 7.5/12.5 = 5.4\\,\\text{V}$$.\n- Step 3: The drop is 0.6 V — significant but not severe. The load is only 3× $$R_2$$, less than the recommended 10×. If $$R_L$$ were 100 kΩ (10× $$R_2$$), the drop would be much smaller; if $$R_L$$ were 1 kΩ (much less than $$R_2$$), the output would collapse.\n\nThe loading severity scales with how close $$R_L$$ is to $$R_2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Why does a thermistor used as a sensor typically have a fixed resistor with comparable resistance, rather than one that is much larger or much smaller?", "answer": "If the fixed resistor is much larger than the thermistor's typical resistance, the thermistor's share of the supply will always be small and changes in its resistance will produce only tiny changes in $$V_{out}$$ — poor sensitivity. If the fixed resistor is much smaller, the thermistor dominates and again small changes have weak effect on the ratio. The sensitivity (the rate of change of $$V_{out}$$ with respect to $$R_{th}$$) is maximised when the two resistances are roughly comparable — typically the fixed resistor is chosen close to the thermistor's mid-range resistance, so the output voltage swings through the most useful range as conditions change.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "What is the visual intuition for \"voltage divides in series; current divides in parallel\"?", "answer": "Picture water flowing down a pipe. In **series** (a single channel with two narrow sections), the same flow rate (current) passes through both — the *pressure drop* (voltage) is shared between the sections, with bigger drop across the more restrictive section. In **parallel** (the channel splits into two side-by-side pipes that rejoin), the pressure drop across each parallel branch is the same (both span the same two points), but the flow splits — with more flow going through the easier (lower-resistance) branch. The divider exploits the first: same current through both, voltage shared by resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Why does a uniform resistance wire give a linear relationship between $$V_{out}$$ and slider position, while a non-uniform wire would not?", "answer": "A uniform wire has constant resistance per unit length ($$\\rho/A$$ constant), so the resistance of any section is directly proportional to its length: $$R = \\rho L / A$$. Therefore $$V_{out} = V_{in} \\cdot R_2/R_{total} = V_{in} \\cdot L_2/L_{total}$$ — a linear function of slider position. If the wire's cross-section or material varied along its length, resistance would no longer be proportional to length and $$V_{out}$$ would change non-linearly with position. The linearity is the whole point of using a uniform wire in metre-bridge / potentiometer experiments.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "In the formula $$V_{out} = V_{in} \\cdot R_2/(R_1+R_2)$$, what is the maximum and minimum possible value of $$V_{out}$$ if $$R_1$$ and $$R_2$$ are both positive?", "answer": "The fraction $$R_2/(R_1+R_2)$$ lies strictly between 0 and 1 (exclusive) for any positive $$R_1, R_2$$. As $$R_2 \\to 0$$, $$V_{out} \\to 0$$. As $$R_2 \\to \\infty$$ (or $$R_1 \\to 0$$), $$V_{out} \\to V_{in}$$. So $$V_{out}$$ can approach but never exceed the supply, and can approach but never drop below zero. Physically, you can't get *more* voltage out of a passive divider than you put in — this would violate energy conservation. The divider is a passive scaling device.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "Why does the voltage across the fixed resistor in a sensor circuit always move in the opposite direction to the voltage across the sensor?", "answer": "By Kirchhoff's Voltage Law applied to the series loop, $$V_{sensor} + V_{fixed} = V_ mportant?", "answer": "Removing the load means $$R_L \\to \\infty$$, so the parallel combination $$R_2 \\| R_L \\to R_2$$ and the circuit reduces to the original two-resistor divider. $$V_{out}$$ returns to $$V_{in} \\cdot R_2/(R_1+R_2)$$. This matters practically because when you design a divider for a specific output voltage (e.g. 5 V for a sensor reference), you must consider whether the downstream component will load it. If the load is light (high resistance), the design value holds; if heavy (low resistance), you must redesign with the loaded equations or buffer the output (e.g. with an op-amp). This is why real-world dividers often have buffers between them and the next stage.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "A 12 V supply across an LDR (top) and a 2 kΩ fixed resistor (bottom). In bright light $$R_{LDR} = 0.5\\,\\text{k}\\Omega$$; in darkness $$R_{LDR} = 8\\,\\text{k}\\Omega$$. Roughly what fraction of the supply appears across the fixed resistor in each case? (2 steps)", "answer": "- Step 1: Bright: fixed resistor = 2 kΩ, total = 2.5 kΩ. Fraction = $$2/2.5 = 0.8$$, so $$V_{out} \\approx 0.8 \\times 12 = 9.6\\,\\text{V}$$.\n- Step 2: Dark: total = 10 kΩ. Fraction = $$2/10 = 0.2$$, so $$V_{out} \\approx 0.2 \\times 12 = 2.4\\,\\text{V}$$.\n\nDirection check: in darkness LDR resistance rises, so it takes a bigger share of the supply, leaving less for the fixed resistor — consistent with the answer. Sensor with LDR on top gives high $$V_{out}$$ in light, low in dark — ideal for a \"lights-off in bright sunlight\" detector, opposite of a streetlight.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "Why is the \"baseline equation\" $$V_{in}/(R_1+R_2) = V_1/R_1 = V_2/R_2$$ called that, and what makes it more fundamental than the standard divider formula?", "answer": "It's called \"baseline\" because every divider equation can be derived from it — it's the foundational statement that the const SK='phys_elec_ch08';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
