ke all three steps explicit.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A thermistor is the top resistor in a divider, with the output taken across a fixed 1.0 kΩ resistor at the bottom. At 25°C, the thermistor resistance is 3.0 kΩ, and the supply is 5.0 V. Calculate Vout across the fixed resistor. Then, when temperature rises to 60°C and thermistor resistance falls to 1.0 kΩ, calculate the new Vout. What direction of change do you observe? (3 steps)", "answer": "- Step 1 (At 25°C): Vout = Vin × Rbottom/(Rtop + Rbottom) = 5.0 V × 1.0 kΩ/(3.0 + 1.0) kΩ = 5.0 × 1/4 = 1.25 V.\n- Step 2 (At 60°C): New thermistor R = 1.0 kΩ. Vout = 5.0 × 1.0/(1.0 + 1.0) = 5.0 × 1/2 = 2.5 V.\n- Step 3 (Direction): Vout increased from 1.25 V to 2.5 V. This matches our chain: ↑T → ↓Rth → ↓Vth → ↑VR (across the fixed resistor). The output voltage increases when the thermistor (top) gets hotter.\n\nNotice: if the thermistor were at the bottom instead, Vout would decrease with temperature. Always check the circuit position first!", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "An LDR (Light-Dependent Resistor) is used as the bottom resistor in a potential divider. In bright light, its resistance is 0.50 kΩ; in darkness, it is 8.0 kΩ. The fixed top resistor is 2.0 kΩ, and supply voltage is 12 V. Calculate Vout in both conditions, and explain the practical application for street lighting. (3 steps)", "answer": "- Step 1 (Bright light): R_LDR = 0.50 kΩ. Vout = 12 × 0.50/(2.0 + 0.50) = 12 × 0.50/2.50 = 12 × 0.20 = 2.4 V.\n- Step 2 (Darkness): R_LDR = 8.0 kΩ. Vout = 12 × 8.0/(2.0 + 8.0) = 12 × 8/10 = 9.6 V.\n- Step 3 (Application): When it gets dark, LDR resistance increases, so Vout across the LDR increases. This increased voltage can be used to trigger a transistor or relay to turn on the street lamp. In effect: ↓ light → ↑ RLDR → ↑ VLDR → lamp turns on.\n\nThe key insight: Vout increases when the sensor is in the bottom position and resistance increases. The street light wants to turn ON when it's dark (high resistance, high Vout), so the sensor goes at the bottom.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Why does the resistance of both an NTC thermistor and an LDR decrease as their respective environmental conditions (temperature and light intensity) increase? What is the microscopic explanation? (2 steps)", "answer": "- Step 1: Both are semiconductor devices. In semiconductors, the number of charge carriers (free electrons) increases with energy input. Higher temperature gives electrons more thermal energy to break free from their atomic bonds. Higher light intensity provides photon energy that also releases charge carriers.\n- Step 2: More charge carriers means easier current flow, which by R = V/I (for fixed V) means lower resistance. This is why they're called \"negative temperature coefficient\" (NTC) for thermistors—the coefficient of resistance with temperature is negative.\n\nThis semiconductor behavior distinguishes them from metal conductors, where resistance increases with temperature (positive temperature coefficient).", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": true}, {"question": "A student connects a voltmeter (as a load) across the output of a potential divider and observes that Vout drops significantly. The student says \"the voltmeter is using up some of the voltage.\" Explain why this statement is misleading and what is actually happening in terms of circuit behavior. (2 steps)", "answer": "- Step 1: A voltmeter doesn't \"use\" voltage—it draws a small current to measure potential difference. However, any load (including a voltmeter) connected across R2 forms a parallel combination with R2.\n- Step 2: This parallel combination has lower resistance than R2 alone: RBC = (R2 × RL)/(R2 + RL). Lower bottom resistance means the fraction of Vin across it decreases. The apparent \"voltage loss\" is really due to the divider ratio changing because the effective bottom resistance changed. High-resistance voltmeters minimize this effect (that's why digital voltmeters have high input impedance).\n\nThe key misconception: it's not that the voltmeter \"uses\" voltage like a resistor dissipating power—it's that the voltmeter changes the circuit topology itself by creating a parallel branch.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": true}, {"question": "In the \"baseline equation\" for a potential divider, we write: Vin/(R1 + R2) = V1/R1 = V2/R2. What does each fraction actually equal, and why is this a compact way to set up any divider calculation? (2 steps)", "answer": "- Step 1: Each fraction equals the current I flowing through the series circuit. Since I = Vin/(R1 + R2), and also I = V1/R1 (Ohm's Law for R1), and I = V2/R2 (Ohm's Law for R2), all three ratios are equal.\n- Step 2: This \"baseline equation\" is powerful because it lets you solve for any unknown when you know any two of: Vin, V1, V2, R1, R2. For example, if you know Vin and R1 and want R2 for a specific Vout, you can set up: Vout/R2 = Vin/(R1 + R2) and solve algebraically. It's a single unified relationship rather than separate formulas.\n\nThis is especially useful for sensor problems where you're given the output voltage and need to find a required resistance.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": true}, {"question": "For a 3-mark exam question asking \"State and explain what happens to the voltage across the fixed resistor when the temperature decreases,\" what three pieces of information must your answer include to achieve full marks? (2 steps)", "answer": "- Step 1: (1) Direction of resistance change: \"Thermistor resistance increases\" (because temperature decreased).\n- Step 2: (2) Direction of voltage change across the thermistor and why: \"Voltage across the thermistor increases because V = IR and the current is the same through the series circuit.\" (3) Direction of voltage change across the other resistor using Kirchhoff: \"Therefore, by KVL, the voltage across the fixed resistor decreases.\"\n\nEach step is 1 mark. Examiners look for all three: R change → V_sensor change → V_other change (with reasoning). Missing any step loses a mark.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A potential divider is designed with R1 = 5.0 kΩ and R2 = 10 kΩ across 9.0 V. A load of 30 kΩ is connected across R2. Calculate: (a) the parallel combination of R2 and the load, (b) the loaded Vout, and (c) what would Vout be with no load. Comment on the difference. (3 steps)", "answer": "- Step 1 (Parallel combination): RBC = (R2 × RL)/(R2 + RL) = (10 × 30)/(10 + 30) = 300/40 = 7.5 kΩ.\n- Step 2 (Loaded Vout): Vout = Vin × RBC/(R1 + RBC) = 9.0 × 7.5/(5.0 + 7.5) = 9.0 × 7.5/12.5 = 9.0 × 0.6 = 5.4 V.\n- Step 3 (Unloaded Vout): Vout_unloaded = 9.0 × 10/(5.0 + 10) = 9.0 × 10/15 = 6.0 V. The load reduced Vout by 0.6 V (from 6.0 to 5.4 V). This is a 10% drop. The load (30 kΩ) is only 3× R2, not the recommended 10×, which is why the effect is noticeable. If RL = 100 kΩ (10×), the drop would be minimal.\n\nThis shows why the 10× rule matters: a load that's too small significantly loads down the divider.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "In the worked example from your textbook, a thermistor circuit has a fixed 220 Ω resistor in series with a thermistor across 6.0 V. At 20°C, Rth = 440 Ω; at 60°C, Rth = 110 Ω. Calculate Vout (across the fixed resistor) at both temperatures and explain the trend. (2 steps)", "answer": "- Step 1 (At 20°C): The thermistor is at the top (R1), fixed resistor at bottom (R2). Vout = Vin × R2/(R1 + R2) = 6.0 × 220/(440 + 220) = 6.0 × 220/660 = 6.0 × 1/3 = 2.0 V.\n- Step 2 (At 60°C): Rth = 110 Ω. Vout = 6.0 × 220/(110 + 220) = 6.0 × 220/330 = 6.0 × 2/3 = 4.0 V. As temperature increases, Vout increases (from 2.0 V to 4.0 V). This is because: ↑T → ↓Rth → ↓Vth → ↑VR (across the fixed resistor).\n\nThis matches our chain: when the thermistor is the top resistor, output across the bottom increases with temperature.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A student remembers the potential divider formula as \"Vout = Vin × R2/(R1 + R2)\" but forgets which resistor R2 represents. How can the student always determine which resistor is R2 in any circuit diagram? (1 step)", "answer": "- Step 1: R2 is simply **the resistor across which the output voltage is taken** (the one connected to the \"output\" terminals or where the voltmeter is connected). The student should ask: \"Where is Vout being measured?\" That resistor is R2, and it goes in the numerator. If measuring across the top resistor, then R1 goes on top.\n\nThis is a foolproof method: identify the output terminals first, then assign R2 to the resistor connected between those terminals.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Explain why adding a load resistor to the output of a potential divider can be modelled as adding a resistance in parallel with R2, rather than in series. What does this do to the total resistance of the bottom portion of the divider? (2 steps)", "answer": "- Step 1: The output terminals of a potential divider are connected across R2. When you connect a load, both ends of the load connect to the same two points as R2's ends. This is the definition of a parallel connection—same two nodes at both ends.\n- Step 2: When resistors are in parallel, the total resistance is always less than either individual resistor: RBC = (R2 × RL)/(R2 + RL) < R2. This reduced resistance then forms the bottom half of the divider with R1. The key insight: parallel always reduces resistance; series always adds.\n\nThis is why adding a load makes Vout drop—the \"bottom\" of the divider becomes less resistive, so it gets less voltage share.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In the lesson video, Alex emphasizes \"Very Itchy Rash\" as a mnemonic. What does this mnemonic remind students, and why is this related to potential divider calculations? (1 step)", "answer": "- Step 1: \"Very Itchy Rash\" reminds students of V = IR (Voltage = Current × Resistance). This is essential for potential dividers because every step involves Ohm's Law: finding the series current, finding voltage drops across each resistor, checking calculations. If students confuse V = IR with R = IV (which is wrong), they cannot solve divider problems. The relationship V ∝ R at constant I is the entire basis for why voltage divides in proportion to resistance.\n\nThis is a critical foundation—if you can't confidently apply Ohm's Law, you can't understand potential dividers.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A circuit has a 24 V supply connected to R1 = 8.0 Ω (top) and R2 = 16.0 Ω (bottom) in series. (a) Find Vout across R2. (b) State the ratio V1:V2 and explain what this tells you about voltage distribution in series. (2 steps)", "answer": "- Step 1 (a): Vout = Vin × R2/(R1 + R2) = 24 V × 16.0/(8.0 + 16.0) = 24 × 16/24 = 16.0 V.\n- Step 2 (b): V1:V2 = R1:R2 = 8.0:16.0 = 1:2. So V1 = 8 V, V2 = 16 V. This confirms that in a series circuit, voltage divides in direct proportion to resistance. The larger resistor gets the larger voltage share—exactly twice as much in this case. This is because the same current flows through both, and V = IR.\n\nThis ratio relationship (V1/V2 = R1/R2) is a powerful shortcut: you can often solve problems by inspection if the ratios are simple.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Why is it important to convert all resistances to the same units (e.g., all in kΩ or all in Ω) before calculating with the potential divider formula? Give an example where failing to do this would cause error. (1 step)", "answer": "- Step 1: The formula R1 + R2 requires both resistances in the same units. If R1 = 2 kΩ = 2000 Ω and R2 = 4 Ω, adding \"2 kΩ + 4 Ω\" without converting gives the wrong total (2004 Ω vs. 2004 Ω actually works here, but consider 200 kΩ + 10 MΩ). If you treat 200 kΩ and 10 MΩ as 200 + 10 = 210, you get a factor of 10,000 error. Always convert to a common unit (preferably the smaller unit to avoid decimal confusion): 200 kΩ + 10,000 kΩ = 10,200 kΩ.\n\nThis is especially important when mixing kΩ and MΩ—a common trap in exam questions.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "A potentiometer wire is 1.0 m long with total resistance 10 Ω, connected across a 5.0 V supply. The slider is positioned at 70 cm from the top (i.e., 30 cm from the bottom). Calculate Vout across the bottom section using both the resistance-ratio method and the length-ratio method, and verify they give the same answer. (3 steps)", "answer": "- Step 1 (Resistance ratio): The bottom section is 30 cm out of 100 cm = 0.30 of the total length. Since wire is uniform, Rbottom = 0.30 × 10 Ω = 3.0 Ω. Vout = Vin × Rbottom/Rtotal = 5.0 × 3.0/10 = 1.5 V.\n- Step 2 (Length ratio): Vout = Vin × Lbottom/Ltotal = 5.0 × 0.30/1.0 = 1.5 V.\n- Step 3 (Verification): Both methods give 1.5 V. This confirms that for uniform wire, resistance is directly proportional to length, so you can use length ratios directly without calculating actual resistances.\n\nThis equivalence is why potentiometer problems can be solved using length ratios—much faster in exams.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": true}, {"question": "A temperature control circuit uses a thermistor in the bottom position of a divider, with output fed to a transistor that switches a heater on when Vout exceeds 3.0 V. With a 9.0 V supply and fixed top resistor R = 1.0 kΩ, what thermistor resistance would trigger the heater to turn on? Show how to set up and solve this. (2 steps)", "answer": "- Step 1: Set up the divider equation with Vout = 3.0 V, Vin = 9.0 V, R1 = R = 1.0 kΩ (top), R2 = Rth (bottom): 3.0 = 9.0 × Rth/(1000 + Rth).\n- Step 2: Solve: Divide both sides by 9.0: 3.0/9.0 = Rth/(1000 + Rth). So 1/3 = Rth/(1000 + Rth). Cross-multiply: 1000 + Rth = 3Rth. So 1000 = 2Rth, giving Rth = 500 Ω. When the thermistor reaches 500 Ω, Vout = 3.0 V and the heater switches on. Below 500 Ω (higher temperature), Vout < 3.0 V, heater off; above 500 Ω (lower temperature), Vout > 3.0 V, heater on.\n\nThis is how thermostat circuits work—setting a threshold resistance determines the trigger temperature.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "A student says that in a loaded potential divider, \"the load resistor takes some of the current, so the voltage drops.\" Is this correct? Explain more precisely what's happening to the voltage division. (2 steps)", "answer": "- Step 1: Partially correct—but it's not that the load \"takes\" current in a way that simply reduces voltage like a resistor in series. Rather, the load creates a parallel path, changing the effective resistance of the bottom section.\n- Step 2: When R2 and RL are in parallel, the combined resistance is less than R2 alone. This means the bottom section's share of the total resistance decreases. Since voltage divides in proportion to resistance (V ∝ R in series), a smaller bottom resistance means a smaller voltage share. The current does increase (total R decreased), but this increases the voltage drop across R1, leaving less for the output.\n\nThe key is: the parallel combination changes the divider ratio, not just the current. Think \"ratio change\" rather than \"current stealing.\"", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "In the sensor direction table from your notes, if the thermistor is in the TOP position (output across bottom resistor), what happens to Vout when temperature increases? How does this differ if the thermistor is in the BOTTOM position (output across thermistor)? (1 step)", "answer": "- Step 1: **Thermistor TOP**: ↑T → ↓Rth → ↓Vth (less voltage across thermistor) → ↑Vout (across bottom resistor, by KVL). **Thermistor BOTTOM**: ↑T → ↓Rth → ↓Vout (less voltage across thermistor). The direction is opposite! This is why position matters. The \"other resistor's voltage always changes opposite to the sensor's voltage\" (KVL), so whichever position the sensor is in determines whether Vout increases or decreases with the environmental change.\n\nAlways identify position first, then apply the chain. Many students get this backwards because they memorize a rule without checking position.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": true}], "count": 25}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What is the defining structural feature of a potential divider circuit, and what is its purpose?", "answer": "A potential divider is fundamentally just **two resistors connected in series across a supply voltage**. There's nothing more exotic going on — Alex's framing captures it perfectly: \"a set of two resistors in series, dressed up in a few different ways.\" Its purpose is to **split (divide) the supply voltage** into a smaller chosen value $$V_{out}$$, which can then power another component or act as a trigger/switch (e.g. turning on a lamp when a sensor's resistance changes). The output is \"tapped off\" across one of the two resistors.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why does the voltage in a series circuit split in proportion to the resistances? (3 steps)", "answer": "- Step 1: In a series circuit, there is only one path for current, so the current $$I$$ is **the same through every component**. There are no junctions to split charge.\n- Step 2: By Ohm's law, the voltage across any resistor is $$V = IR$$. Since $$I$$ is fixed for both resistors, the voltage across each one is **directly proportional to its resistance**.\n- Step 3: Therefore $$\\frac{V_1}{V_2} = \\frac{R_1}{R_2}$$ — bigger resistance gets a bigger share. Intuitively: the same \"current river\" flowing through a narrower constriction (bigger R) drops more energy per unit charge there.\n\nTakeaway: $$V \\propto R$$ in series is a direct consequence of $$I$$ being shared, not split.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Derive the potential divider output formula from first principles, starting from Kirchhoff and Ohm's laws. (4 steps)", "answer": "- Step 1: Apply Kirchhoff's second law (KVL): the supply $$V_{in}$$ equals the sum of voltage drops, so $$V_{in} = V_1 + V_2$$.\n- Step 2: Use the series-current insight: $$I = \\frac{V_{in}}{R_1 + R_2}$$ — the single current flowing everywhere.\n- Step 3: The voltage across $$R_2$$ (taken as the output) is from Ohm's law: $$V_{out} = IR_2 = \\frac{V_{in}}{R_1+R_2} \\cdot R_2$$.\n- Step 4: Rearrange to the standard form: $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_1 + R_2}$$.\n\nKey insight: the resistor whose voltage you want sits in the **numerator**; the **total** resistance sits in the denominator.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "A student wrote $$V_{out} = V_{in} \\cdot \\frac{R_1}{R_1+R_2}$$ when asked for the voltage across $$R_2$$. What's wrong, and how do you remember the correct rule?", "answer": "- Step 1: The formula they wrote gives the voltage across $$R_1$$, not $$R_2$$. They've put the wrong resistor in the numerator.\n- Step 2: The rule: **the resistor whose voltage you are finding goes on top** of the fraction. The denominator is always the total series resistance.\n- Step 3: Sanity check by limits: if $$R_2 \\gg R_1$$, almost all the supply voltage should drop across $$R_2$$, so the fraction should approach 1. The formula $$\\frac{R_2}{R_1+R_2}$$ does this; $$\\frac{R_1}{R_1+R_2}$$ would approach 0 — clearly wrong for $$V_2$$.\n\nMnemonic anchor: \"voltage across $$R_x$$ ⇒ $$R_x$$ on top.\"", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "In a series circuit with a $$2\\,\\Omega$$ and a $$4\\,\\Omega$$ resistor across a $$12\\,\\text{V}$$ supply, what is $$V_{out}$$ across the $$4\\,\\Omega$$ resistor, and how should you sanity-check it?", "answer": "- Step 1: Use $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_1+R_2} = 12 \\cdot \\frac{4}{2+4} = 12 \\cdot \\frac{2}{3} = 8\\,\\text{V}$$.\n- Step 2: Sanity-check 1 — the voltage across the $$2\\,\\Omega$$ resistor must be $$12 - 8 = 4\\,\\text{V}$$ (by KVL).\n- Step 3: Sanity-check 2 — the ratio $$V_1/V_2 = 4/8 = 1/2$$ matches $$R_1/R_2 = 2/4 = 1/2$$. ✓\n\nIntuition: the larger resistor gets the larger share because, with the same current, $$V \\propto R$$.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "If you connect a $$200\\,\\text{k}\\Omega$$ resistor in series with a $$10\\,\\text{M}\\Omega$$ resistor across a supply, roughly what fraction of the supply voltage drops across the smaller resistor, and what does this tell you?", "answer": "- Step 1: Convert to a common power: $$200 \\times 10^3$$ vs $$10\\,000 \\times 10^3$$. The smaller resistance is about $$\\frac{1}{51}$$ of the total.\n- Step 2: So $$V_{out}$$ across the $$200\\,\\text{k}\\Omega$$ ≈ $$\\frac{1}{51}$$ of $$V_{in}$$ — almost nothing.\n- Step 3: Lesson: when resistances differ by orders of magnitude, almost **all** the voltage drops across the bigger one. The smaller resistor \"vanishes\" from the voltage distribution.\n\nThis is why mixing kΩ and MΩ in a divider gives extreme outputs — useful for triggers, useless if you want a moderate $$V_{out}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "What is a potentiometer, and how does it physically achieve a continuously variable output voltage?", "answer": "- Step 1: A potentiometer is a single **three-terminal component** consisting of a resistive wire (or track) of total resistance $$R_{total}$$, with a **sliding contact** that touches the wire somewhere along its length.\n- Step 2: The slider divides the wire into two \"imaginary\" resistors: one above ($$R_1$$) and one below ($$R_2$$), with $$R_1 + R_2 = R_{total}$$ always.\n- Step 3: As you move the slider, you continuously change the ratio $$R_2/(R_1+R_2)$$, so $$V_{out}$$ varies smoothly between **0 (slider at the bottom)** and **$$V_{in}$$ (slider at the top)**.\n\nThis continuous full-range control is the potentiometer's key advantage over a series rheostat.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Why does a potentiometer give a much wider voltage range than a rheostat placed in series with a load?", "answer": "- Step 1: A series rheostat only changes the **total** circuit resistance, so it adjusts the current. The voltage across the load is then $$V_{load} = IR_{load}$$, and even when the rheostat is at maximum, the load still gets a non-trivial voltage share.\n- Step 2: For example, with a 6 V supply, 20 Ω rheostat (max) and 220 Ω load, the load voltage only drops to $$\\frac{220}{240}\\cdot 6 \\approx 5.5\\,\\text{V}$$ at minimum. The achievable range is tiny (5.5–6.0 V).\n- Step 3: A potentiometer, by contrast, taps off a fraction of $$V_{in}$$ directly. Sliding to one end gives 0 V, the other gives $$V_{in}$$ — **the full 0 to $$V_{in}$$ range**.\n\nMemorise: **rheostat controls current; potentiometer controls potential difference.**", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "For a uniform resistance wire used as a potentiometer, why is the output voltage proportional to the length of the lower section?", "answer": "- Step 1: For uniform wire of constant cross-section and material, resistance is proportional to length: $$R = \\rho L/A$$, so $$R \\propto L$$.\n- Step 2: Substituting into the divider formula: $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_{total}} = V_{in} \\cdot \\frac{L_2}{L_{total}}$$.\n- Step 3: So you can directly use length ratios. E.g. if the slider is at $$\\frac{3}{4}$$ of the way up the wire, the lower section is $$\\frac{1}{4}$$ of total length, so $$V_{out} = \\frac{1}{4} V_{in}$$.\n\nThis gives an easy mental shortcut for wire-based potentiometer problems — no need to compute resistances explicitly.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "A uniform wire AB has 12 V across it. The sliding contact X is placed so that AX is one-third of AB. What is the output voltage across XB?", "answer": "- Step 1: Length XB = $$1 - \\frac{1}{3} = \\frac{2}{3}$$ of AB.\n- Step 2: Since $$R \\propto L$$ for uniform wire, $$V_{XB} = \\frac{2}{3} \\cdot 12 = 8\\,\\text{V}$$.\n- Step 3: Sanity check: $$V_{AX} = \\frac{1}{3} \\cdot 12 = 4\\,\\text{V}$$; $$4 + 8 = 12$$. ✓\n\nKey skill: identify *which* segment the output is across before plugging in lengths.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "What does it mean to \"load\" a potential divider, and what physical change does it cause in the circuit? (3 steps)", "answer": "- Step 1: \"Loading\" means connecting a component (the load, resistance $$R_L$$) **across** the output resistor $$R_2$$ to draw the output voltage. The load is in **parallel** with $$R_2$$, not in series.\n- Step 2: The effective bottom resistance becomes the parallel combination: $$R_{BC} = \\frac{R_2 R_L}{R_2 + R_L}$$, which is **always less than $$R_2$$**.\n- Step 3: Because the bottom resistance has dropped, the total circuit resistance drops, the current rises, and a larger share of voltage now drops across $$R_1$$ — meaning **$$V_{out}$$ falls** compared with the unloaded case.\n\nCounter-intuitive but crucial: adding the very thing you want to power *reduces* the voltage you're trying to deliver to it.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "A divider has $$R_1 = R_2 = 6\\,\\Omega$$ across $$7.5\\,\\text{V}$$. Unloaded, $$V_{out}$$ is $$3.75\\,\\text{V}$$. A $$6\\,\\Omega$$ lamp is connected as the load. Qualitatively (no exact numbers needed), what happens to $$V_{out}$$, and roughly by how much?", "answer": "- Step 1: The lamp ($$6\\,\\Omega$$) in parallel with $$R_2$$ ($$6\\,\\Omega$$) halves the effective bottom resistance to $$3\\,\\Omega$$.\n- Step 2: Now the divider behaves like a $$6\\,\\Omega$$ top and $$3\\,\\Omega$$ bottom: $$V_{out} \\approx \\frac{3}{9} \\cdot 7.5 = 2.5\\,\\text{V}$$.\n- Step 3: So $$V_{out}$$ drops from roughly $$3.75$$ to $$2.5\\,\\text{V}$$ — a large reduction (about a third less). Conclusion: when $$R_L$$ is comparable to $$R_2$$, loading is **severe**.\n\nThis is why a \"tempting\" answer of \"the lamp gets $$3.75\\,\\text{V}$$\" is wrong — it ignores how the lamp itself changes the circuit.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "What is the practical rule of thumb for choosing a load resistance to keep the loaded output close to the unloaded value, and why does it work?", "answer": "- Step 1: Choose $$R_L \\geq 10 R_2$$.\n- Step 2: When $$R_L \\gg R_2$$, the parallel combination $$R_{BC} = \\frac{R_2 R_L}{R_2 + R_L} \\approx R_2$$ (since the larger resistor barely affects the parallel total).\n- Step 3: With the bottom resistance practically unchanged, the divider ratio stays close to the unloaded one, so $$V_{out}$$ barely shifts.\n\nLimit thinking: as $$R_L \\to \\infty$$ (open circuit, ideal voltmeter), $$R_{BC} \\to R_2$$ exactly — no loading at all. The \"$$10\\times$$\" rule says \"close enough to infinity for practical purposes.\"", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Why does an \"ideal\" voltmeter not load a potential divider, while a real lamp does?", "answer": "- Step 1: An ideal voltmeter has infinite resistance, so when connected in parallel with $$R_2$$, the parallel combination is still essentially $$R_2$$ — no change to the divider.\n- Step 2: A real lamp has a finite, often modest resistance (sometimes comparable to $$R_2$$). When placed in parallel, it pulls the effective resistance down significantly.\n- Step 3: Practical takeaway: voltmeters are designed with high input impedance precisely so they measure the voltage without disturbing the circuit. Loads that *use* power must draw current and inevitably perturb the divider.\n\nThis is the conceptual reason behind the $$R_L \\geq 10 R_2$$ rule: real components are never ideal.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "What is an NTC thermistor, and what is the physical reason its resistance falls as temperature rises?", "answer": "- Step 1: An **NTC (Negative Temperature Coefficient) thermistor** is a semiconductor component whose resistance **decreases as temperature increases**.\n- Step 2: Physically: thermal energy frees more charge carriers (electrons/holes) in the semiconductor. With more charge carriers available, current can flow more easily — i.e. resistance drops.\n- Step 3: Note this is opposite to a metal wire, where heating increases lattice vibration and *raises* resistance. Semiconductors behave the other way because the dominant effect is carrier generation, not collision frequency.\n\nGraphically: $$R$$-vs-$$T$$ is a steep falling curve, flattening at higher temperatures.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "What is an LDR, and how does its resistance respond to light intensity?", "answer": "- Step 1: An **LDR (Light-Dependent Resistor)** is a semiconductor whose resistance **decreases as light intensity increases**.\n- Step 2: Physically: incoming photons give electrons enough energy to enter the conduction band, increasing the number of free charge carriers — so current flows more easily.\n- Step 3: In darkness, very few carriers are excited, so resistance is high (kΩ to MΩ range typically). In bright light, resistance drops dramatically (to tens or hundreds of Ω).\n\nSame shape of curve as the thermistor — falling resistance with increasing \"stimulus.\"", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "A thermistor (NTC) is placed in the **bottom** position of a divider with a fixed top resistor. Temperature rises — describe step-by-step what happens to $$V_{out}$$ (taken across the thermistor). (4 steps)", "answer": "- Step 1: Temperature increases ⇒ thermistor's resistance $$R_{th}$$ **decreases**.\n- Step 2: With the same current path, the voltage share across the thermistor is $$V_{th} = V_{in} \\cdot \\frac{R_{th}}{R_1 + R_{th}}$$. As $$R_{th}$$ falls relative to $$R_1$$, the fraction shrinks.\n- Step 3: So $$V_{th}$$ (= $$V_{out}$$) **decreases**.\n- Step 4: By KVL, the voltage across the fixed top resistor must **increase** correspondingly ($$V_1 = V_{in} - V_{out}$$).\n\nThe full \"exam chain\": $$\\uparrow T \\Rightarrow \\downarrow R_{th} \\Rightarrow \\downarrow V_{th} \\Rightarrow \\uparrow V_R$$.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "A thermistor sits in the **top** position; the fixed resistor is at the bottom with $$V_{out}$$ across it. Temperature rises — does $$V_{out}$$ increase or decrease, and why?", "answer": "- Step 1: $$\\uparrow T \\Rightarrow \\downarrow R_{th}$$ (NTC behaviour).\n- Step 2: Since $$R_{th}$$ is the *top* resistor, the divider formula gives $$V_{out} = V_{in} \\cdot \\frac{R_{fixed}}{R_{th} + R_{fixed}}$$. As $$R_{th}$$ drops, the denominator falls, and the fraction **increases**.\n- Step 3: So $$V_{out}$$ **increases**. Intuition: the top resistor \"drops less\" of the supply, leaving more for the bottom fixed resistor.\n\nCrucial habit: **always first identify whether the sensor is the top or bottom resistor** before predicting direction.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "For a 3-mark \"state and explain\" sensor question, what three explicit steps must your answer include to earn full marks?", "answer": "- Step 1: State the direction of the **sensor's resistance change** in response to the environmental change (e.g. \"thermistor resistance decreases\").\n- Step 2: State and justify the direction of the **sensor's voltage change**, citing the proportionality $$V \\propto R$$ in series (same current throughout).\n- Step 3: State the direction of the **other resistor's voltage change**, citing Kirchhoff's voltage law ($$V_{other} = V_{supply} - V_{sensor}$$).\n\nExaminers want the full causal chain, not just the final answer. Skipping any step costs a mark.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "For a street-light circuit using an LDR, where would you place the LDR (top or bottom of the divider) so that $$V_{out}$$ *rises* when night falls, and why?", "answer": "- Step 1: We want $$V_{out}$$ to rise as light intensity falls, so we can use $$V_{out}$$ to trigger the lamp on.\n- Step 2: At night, $$R_{LDR}$$ becomes large. If the LDR is on **top**, the formula $$V_{out} = V_{in}\\cdot \\frac{R_{fixed}}{R_{LDR}+R_{fixed}}$$ gives a *smaller* output (more drop across LDR) — wrong direction.\n- Step 3: If the LDR is on the **top** but $$V_{out}$$ is taken across the LDR itself, or equivalently the LDR is the **bottom** resistor with $$V_{out}$$ across it — then $$V_{out} = V_{in}\\cdot\\frac{R_{LDR}}{R_{LDR}+R_{fixed}}$$, which **increases** as $$R_{LDR}$$ grows.\n\nDesign rule: **place the sensor so that $$V_{out}$$ is across the sensor itself** when you want $$V_{out}$$ to track the sensor's resistance directly.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "Without doing the algebra in full, set up the equation to find the fixed series resistor $$R$$ that makes the voltage across a $$450\\,\\Omega$$ thermistor equal to $$5.0\\,\\text{V}$$ from a $$9.0\\,\\text{V}$$ supply. (3 steps)", "answer": "- Step 1: Use the baseline ratio $$\\frac{V_{th}}{R_{th}} = \\frac{V_{in}}{R_{th}+R}$$ (common current).\n- Step 2: Substitute: $$\\frac{5.0}{450} = \\frac{9.0}{450 + R}$$.\n- Step 3: Sanity-check the *direction* before solving: $$V_R = 9.0 - 5.0 = 4.0\\,\\text{V}$$. Since $$V_R < V_{th}$$ and $$V \\propto R$$, we expect $$R < R_{th}$$, i.e. $$R < 450\\,\\Omega$$. (The actual value is $$360\\,\\Omega$$.)\n\nThe conceptual move is the **ratio setup** plus the **inequality check** — both are far more valuable than the arithmetic.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Why is the equation \"$$R = IV$$\" wrong, and what is the correct rearrangement of Ohm's law?", "answer": "- Step 1: Ohm's law is $$V = IR$$. Solving for $$R$$ means dividing both sides by $$I$$: $$R = V/I$$, **not** $$IV$$.\n- Step 2: The mnemonic \"Very Itchy Rash\" (V, I, R) helps: V is on its own, equal to $$I \\times R$$. The \"triangle method\" (V on top, I and R on the bottom) gives the three rearrangements: $$V = IR$$, $$I = V/R$$, $$R = V/I$$.\n- Step 3: A quick units check also catches the error: $$R$$ has units of $$\\Omega = \\text{V/A}$$, so it must be a **ratio** of voltage to current, never a product.\n\nThis was a recurring Phuc trap — worth burning in.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "In a series circuit, why is \"current is the same everywhere\" independent of whether you draw the circuit as series, parallel, or some hybrid — and what is the more fundamental principle?", "answer": "- Step 1: The deeper principle is **conservation of charge**: at any junction, charge in per second equals charge out per second (Kirchhoff's first law: $$\\Sigma I_{in} = \\Sigma I_{out}$$).\n- Step 2: A series circuit has **no junctions** along its single loop, so the current that enters one component must exit the other — the same value everywhere.\n- Step 3: In a parallel network, junctions exist, and current splits *at the junctions*, but each individual branch still obeys $$I = V/R$$ for itself. Series-vs-parallel is just a structural description; the conservation law is universal.\n\nPhuc's confusion (\"do I need to know series or parallel?\") came from mistaking the consequence for the principle.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "In a loaded divider with $$R_1 = 5\\,\\text{k}\\Omega$$, $$R_2 = 10\\,\\text{k}\\Omega$$, supply $$9\\,\\text{V}$$, and a load $$R_L = 30\\,\\text{k}\\Omega$$ across $$R_2$$: conceptually walk through how $$V_{out}$$ compares with the unloaded case (no exact numbers needed). (4 steps)", "answer": "- Step 1: Unloaded: $$V_{out} = 9 \\cdot \\frac{10}{15} = 6\\,\\text{V}$$ (since $$R_2$$ is two-thirds of total).\n- Step 2: Loaded: $$R_L = 30\\,\\text{k}\\Omega$$ is only $$3\\times R_2$$ — **below** the rule-of-thumb $$10\\times$$, so loading effect is **noticeable**.\n- Step 3: Parallel combo $$R_{BC} = \\frac{10 \\cdot 30}{10 + 30} = 7.5\\,\\text{k}\\Omega$$ — bottom resistance shrinks by 25%.\n- Step 4: New $$V_{out} = 9 \\cdot \\frac{7.5}{12.5} = 5.4\\,\\text{V}$$ — a drop of $$0.6\\,\\text{V}$$ from $$6\\,\\text{V}$$.\n\nLesson: a load that's \"only\" $$3\\times R_2$$ already cuts $$V_{out}$$ by $$\\sim 10\\%$$ — small loading violations have visible consequences.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "As the load resistance $$R_L$$ is varied from very large to very small, sketch qualitatively how $$V_{out}$$ of a divider changes. What are the two limits?", "answer": "- Step 1: Limit 1 ($$R_L \\to \\infty$$, ideal voltmeter): the load draws no current, parallel combo = $$R_2$$, $$V_{out}$$ equals the unloaded value $$V_{in}\\cdot R_2/(R_1+R_2)$$.\n- Step 2: Limit 2 ($$R_L \\to 0$$, short circuit): parallel combo $$\\to 0$$, so the bottom resistance vanishes, $$V_{out} \\to 0$$. All the voltage drops across $$R_1$$.\n- Step 3: Between these limits, $$V_{out}$$ decreases smoothly and monotonically as $$R_L$$ decreases.\n\nThis curve gives you a strong intuition: any finite load **always reduces** $$V_{out}$$ — the only question is by how much.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "A 24 V supply has $$R_1 = 8\\,\\Omega$$ (top) and $$R_2 = 16\\,\\Omega$$ (bottom). What is the voltage across $$R_2$$, and how does the ratio $$V_1/V_2$$ relate to the resistances?", "answer": "- Step 1: $$V_{out} = 24 \\cdot \\frac{16}{8+16} = 24 \\cdot \\frac{2}{3} = 16\\,\\text{V}$$.\n- Step 2: $$V_1 = 24 - 16 = 8\\,\\text{V}$$.\n- Step 3: Ratio: $$V_1/V_2 = 8/16 = 1/2$$, which equals $$R_1/R_2 = 8/16 = 1/2$$. ✓\n\nReinforces the core idea: $$V \\propto R$$ in series, so the ratio of voltages directly mirrors the ratio of resistances.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Compare and contrast the *direction* of $$V_{out}$$ change for a thermistor sensor and an LDR sensor (both placed as the **bottom** resistor) when (a) you warm the thermistor and (b) you brighten the LDR.", "answer": "- Step 1: Both are NTC-style (resistance falls as the stimulus increases) — thermistor with temperature, LDR with light.\n- Step 2: Both placed as bottom resistor with $$V_{out}$$ across them: $$V_{out} \\propto R_{sensor}/(R_{fixed}+R_{sensor})$$. As $$R_{sensor}$$ falls, $$V_{out}$$ **falls**.\n- Step 3: So (a) warming the thermistor → $$V_{out}$$ ↓; (b) brightening the LDR → $$V_{out}$$ ↓. Conversely, cooling/darkening raises $$V_{out}$$.\n\nMemorise the pattern: both sensors share the same direction-of-change behaviour because both are NTC in spirit.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "A thermistor's resistance is $$3.0\\,\\text{k}\\Omega$$ at room temperature and $$1.0\\,\\text{k}\\Omega$$ when warm. In a divider with a $$1.0\\,\\text{k}\\Omega$$ fixed top resistor and $$5.0\\,\\text{V}$$ supply (output taken across the thermistor), conceptually predict whether $$V_{out}$$ at room temperature is closer to half the supply or to most of the supply.", "answer": "- Step 1: At room temp, $$R_{th} = 3\\,\\text{k}\\Omega$$ vs $$R_{fixed} = 1\\,\\text{k}\\Omega$$ — thermistor is **three times bigger**, so it gets **three-quarters** of the voltage.\n- Step 2: $$V_{out} \\approx \\frac{3}{4} \\cdot 5.0 = 3.75\\,\\text{V}$$ — closer to \"most\" of the supply.\n- Step 3: At warm temp, $$R_{th} = R_{fixed}$$, so they split evenly: $$V_{out} = 2.5\\,\\text{V}$$. So as it warms, $$V_{out}$$ falls from 3.75 V to 2.5 V — a noticeable drop, in the expected direction.\n\nQuick mental check: ratio thinking ($$R_{th}:R_{total} = 3:4$$) gives you the answer instantly, no algebra needed.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why might you choose to use a thermistor in the *top* position vs the *bottom* position when designing a temperature-triggered switch?", "answer": "- Step 1: The position determines the **direction** of $$V_{out}$$ change. If the switch fires when $$V_{out}$$ exceeds a threshold, you must place the sensor so the desired environmental change *raises* $$V_{out}$$.\n- Step 2: **Thermistor on top**: $$\\uparrow T \\Rightarrow \\downarrow R_{th} \\Rightarrow \\uparrow V_{out}$$ (across bottom fixed R). Use this to trigger on *heat* (e.g. fire alarm).\n- Step 3: **Thermistor on bottom** (output across thermistor): $$\\uparrow T \\Rightarrow \\downarrow R_{th} \\Rightarrow \\downarrow V_{out}$$. Use this when you want $$V_{out}$$ to *fall* with heat, or to trigger on cold.\n\nDesign principle: position = polarity. The circuit topology encodes which environmental direction triggers the switch.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "What is the role of the \"baseline equation\" $$\\frac{V_{in}}{R_1+R_2} = \\frac{V_1}{R_1} = \\frac{V_2}{R_2}$$, and why is it more flexible than just memorising $$V_{out} = V_{in}R_2/(R_1+R_2)$$?", "answer": "- Step 1: Each fraction equals the common series current $$I$$. So the equation literally states \"the current is the same everywhere in this series circuit.\"\n- Step 2: From this single expression you can solve **any** divider problem: given any three of $$\\{V_{in}, V_1, V_2, R_1, R_2\\}$$, you can find the others by picking two of the equalities.\n- Step 3: For example, to find an unknown $$R$$ given a known sensor resistance and known voltages, use $$\\frac{V_{sensor}}{R_{sensor}} = \\frac{V_{in}}{R_{sensor}+R}$$ directly, without rearranging the $$V_{out}$$ formula.\n\nAlex called this \"the baseline equation\" precisely because it's the most general — every other divider formula is a derivative of it.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Imagine the slider of a potentiometer is slowly moved from the bottom of the wire to the top. Describe what happens to (a) the total circuit current, and (b) $$V_{out}$$.", "answer": "- Step 1: (a) The total resistance of the wire ($$R_1 + R_2 = R_{total}$$) stays **constant** — moving the slider only changes *how* the wire is divided, not its total. So if the load draws no current, the **circuit current stays the same**.\n- Step 2: (b) $$V_{out} = V_{in} \\cdot R_2/R_{total}$$. As the slider rises, $$R_2$$ (the section below the slider) grows from 0 to $$R_{total}$$, so $$V_{out}$$ rises linearly from 0 to $$V_{in}$$.\n- Step 3: This is the defining behaviour: **constant current, continuously variable output**.\n\nSubtle point worth grasping: the potentiometer doesn't waste more energy at different settings — it just redistributes voltage along the wire.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "Suppose you connect a load across the lower half of a potentiometer that's set near the top of its travel (so $$R_2 \\approx R_{total}$$). Will the loading effect be more or less severe than if the slider were near the middle, and why?", "answer": "- Step 1: Loading severity depends on the ratio $$R_L / R_2$$. The smaller this ratio, the more $$V_{out}$$ drops.\n- Step 2: When the slider is near the **top**, $$R_2$$ is large (≈ $$R_{total}$$). So for a given $$R_L$$, the ratio $$R_L/R_2$$ is small ⇒ stronger loading effect.\n- Step 3: When the slider is near the **middle**, $$R_2$$ is smaller, so $$R_L/R_2$$ is larger ⇒ less loading distortion.\n\nCounterintuitive design implication: high $$V_{out}$$ settings on a potentiometer are *more* vulnerable to load disturbance than low settings.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "A divider with $$R_1 = R_2 = R$$ (equal resistors) is loaded with $$R_L = R$$. By what factor does $$V_{out}$$ change from the unloaded case?", "answer": "- Step 1: Unloaded: $$V_{out} = V_{in} \\cdot \\frac{R}{R+R} = \\frac{1}{2}V_{in}$$.\n- Step 2: Loaded: parallel of $$R \\parallel R = R/2$$. New bottom = $$R/2$$, total = $$R + R/2 = 3R/2$$. So $$V_{out} = V_{in} \\cdot \\frac{R/2}{3R/2} = \\frac{1}{3}V_{in}$$.\n- Step 3: Ratio: loaded/unloaded = $$\\frac{1/3}{1/2} = \\frac{2}{3}$$. So $$V_{out}$$ drops to **two-thirds** of its unloaded value — a 33% reduction.\n\nThis is a useful benchmark case for sanity-checking any loading calculation.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "A potential divider is built with $$V_{in} = 12\\,\\text{V}$$, an LDR on top, and a fixed $$2\\,\\text{k}\\Omega$$ on the bottom. In bright light $$R_{LDR} = 0.5\\,\\text{k}\\Omega$$, in darkness $$R_{LDR} = 8\\,\\text{k}\\Omega$$. Without detailed calculation, where will $$V_{out}$$ (across the fixed resistor) be in each case — closer to $$V_{in}$$ or closer to 0?", "answer": "- Step 1: Bright light: LDR ($$0.5\\,\\text{k}\\Omega$$) is much smaller than the fixed $$2\\,\\text{k}\\Omega$$. The fixed resistor dominates, so $$V_{out}$$ is most of $$V_{in}$$ — close to 12 V (actually ≈ 9.6 V).\n- Step 2: Darkness: LDR ($$8\\,\\text{k}\\Omega$$) is much larger than the fixed $$2\\,\\text{k}\\Omega$$. The LDR dominates the voltage drop, so $$V_{out}$$ across the small fixed resistor is small — close to 0 (actually ≈ 2.4 V).\n- Step 3: So $$V_{out}$$ is high in light, low in dark — useful for *darkness-triggered* alarms (where you'd want the opposite to drive a street lamp, hence the design choice of which resistor goes where).\n\nRatio thinking (which resistor dominates?) gives the answer without arithmetic.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Why must you always check the *position* of the sensor (top vs bottom) before predicting the direction of $$V_{out}$$ — what common misconception does this prevent?", "answer": "- Step 1: The misconception: \"thermistor heats up → $$V_{out}$$ goes up\" stated as a universal rule. It is **not** universal.\n- Step 2: The truth: the direction of $$V_{out}$$ change depends on **which resistor's voltage you're calling $$V_{out}$$**.\n+ If $$V_{out}$$ is across the thermistor itself, heating drops $$V_{out}$$ (because $$R_{th}$$ drops).\n+ If $$V_{out}$$ is across the *other* (fixed) resistor, heating raises $$V_{out}$$ (because more of the supply is \"left over\" for it).\n- Step 3: Always do two checks: (1) which resistor is the sensor (top/bottom)? (2) which resistor is $$V_{out}$$ measured across? Then apply $$V \\propto R$$ in series.\n\nThis is the single biggest exam trap in sensor-divider questions.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "A divider has $$V_{in} = 15\\,\\text{V}$$, an LDR on top, and a fixed resistor on the bottom. At the switching point, $$R_{LDR} = 7\\,\\text{k}\\Omega$$ and we want $$V_{LDR} = 9\\,\\text{V}$$. Set up the relation for the fixed resistor $$R_1$$ (no need to solve numerically).", "answer": "- Step 1: Wait — the question says $$V_{out} = 9\\,\\text{V}$$ across the LDR, but the LDR is on top. So in the divider formula treating the LDR as \"the resistor whose voltage we want,\" it goes in the numerator: $$V_{LDR} = V_{in} \\cdot \\frac{R_{LDR}}{R_1+R_{LDR}}$$.\n- Step 2: Substitute: $$9 = 15 \\cdot \\frac{7}{R_1 + 7}$$ (in kΩ).\n- Step 3: Sanity check direction: $$V_{LDR} = 9$$ is more than half of $$V_{in} = 15$$, so the LDR must be more than half the total resistance — meaning $$R_1 < R_{LDR} = 7\\,\\text{k}\\Omega$$. Solving gives $$R_1 \\approx 4.7\\,\\text{k}\\Omega$$. ✓\n\nInequality check before solving: catches setup errors instantly.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Why does a loaded divider not just \"subtract\" the load voltage but instead change the entire current and voltage distribution? (3 steps)", "answer": "- Step 1: A naive view treats the divider as a \"voltage source of value $$V_{out}$$\" sitting independently — so adding a load shouldn't change anything. This is wrong.\n- Step 2: A real divider is **resistive throughout**: the load adds a new parallel path, changing the total circuit resistance. By Ohm's law, this changes the current $$I$$.\n- Step 3: Once $$I$$ changes, the voltage drop $$V_1 = IR_1$$ across the top resistor changes too — and that change *redistributes* the remaining voltage between $$R_1$$ and the parallel combo at the bottom.\n\nKey insight: the divider only behaves like a clean voltage source when its **output impedance** ($$R_1 \\parallel R_2$$) is much smaller than the load. Otherwise, the load *and* the divider interact strongly.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "If you tried to power a high-current device (e.g. a motor) directly from a potential-divider tap-off, what would go wrong?", "answer": "- Step 1: Motors have low resistance and draw substantial current. Connecting one across $$R_2$$ creates a tiny parallel resistance ($$R_2 \\parallel R_{motor} \\ll R_2$$).\n- Step 2: This collapses the bottom resistance and pulls $$V_{out}$$ down towards zero. The motor would not get enough voltage to operate.\n- Step 3: Worse, the divider resistors would dissipate significant heat as the high current passes through them.\n\nConclusion: potential dividers are **for control signals, not power delivery**. Use a transistor switch or buffer amplifier to drive high-current loads, with the divider providing the trigger voltage.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Suppose someone claims \"a potentiometer can deliver more voltage than the supply if you slide it past the top.\" Why is this impossible?", "answer": "- Step 1: The potentiometer is purely a passive resistor network — it cannot add energy. By Kirchhoff's voltage law, the sum of voltage drops around the loop equals the supply EMF.\n- Step 2: The slider can only tap off a fraction of the total wire's voltage drop. At its uppermost position, $$R_2 = R_{total}$$, giving $$V_{out} = V_{in}$$. There's no \"past the top\" — the wire ends there.\n- Step 3: To exceed $$V_{in}$$ would require boosting (e.g. a transformer or DC-DC converter), which involves active components, not just resistors.\n\nEnergy conservation forbids passive voltage gain — the divider can only redistribute, never amplify.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "In a thermistor-based divider, the thermistor R drops smoothly with temperature (curved, not linear). Will $$V_{out}$$ also vary linearly with temperature? Explain.", "answer": "- Step 1: $$V_{out}$$ depends on $$R_{th}$$ via the divider formula, which is itself a nonlinear function: $$V_{out} = V_{in} R_{th}/(R_1+R_{th})$$ or its complement.\n- Step 2: Even if $$R_{th}(T)$$ were linear in T, the divider formula squishes it into an S-shape (asymptotic at the extremes).\n- Step 3: Combined with the *actual* nonlinear $$R_{th}(T)$$ curve (steep at low T, flattening at high T), $$V_{out}(T)$$ is doubly nonlinear — usefully steep around the \"switching\" point, gently sloped at extremes.\n\nPractical consequence: thermistor circuits are great for **threshold-triggering** (where you don't need linearity), but poor for **linear measurement** without compensation.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "A divider with an LDR is \"ratiometric\" — meaning $$V_{out}$$ depends on the ratio of $$R_{LDR}$$ to other resistances, not absolute values. Why is this useful, and what does it imply about supply voltage stability?", "answer": "- Step 1: The output formula is $$V_{out} = V_{in} \\cdot \\frac{R_{LDR}}{R_1+R_{LDR}}$$. A fluctuation in $$V_{in}$$ scales $$V_{out}$$ proportionally — the *fraction* doesn't depend on $$V_{in}$$.\n- Step 2: So if you're feeding $$V_{out}$$ into a comparator that also references $$V_{in}$$ (e.g. via another divider), the trigger point depends purely on resistance ratios, not on the absolute supply voltage.\n- Step 3: This makes the circuit robust to battery drain or supply fluctuations — a key practical advantage for sensor circuits in real environments.\n\nBut: if the trigger threshold is an absolute voltage (e.g. an op-amp comparator with a fixed reference), then supply variations *do* matter — context matters.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Comparing a potentiometer (continuously variable) with a sensor divider (thermistor/LDR): both vary $$V_{out}$$, but how do they differ in what \"drives\" the variation?", "answer": "- Step 1: A **potentiometer** is varied by physical user input — the slider position is manually (or mechanically) controlled. The variation is intentional.\n- Step 2: A **sensor divider** is varied by an environmental quantity (temperature, light) acting on the sensor's resistance. The variation is automatic and responds to the world.\n- Step 3: Both produce a variable $$V_{out}$$ from a fixed $$V_{in}$$, but they serve different purposes:\n+ Potentiometer = manual control (volume knob, dimmer).\n+ Sensor divider = automatic sensing (thermostat, light switch).\n\nSame circuit principle (series resistor division), different \"knob\" turning the dial.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "A potential divider has $$V_{in} = 6\\,\\text{V}$$ across $$R_1 = 440\\,\\Omega$$ (thermistor, top) and $$R_2 = 220\\,\\Omega$$ (fixed, bottom). Mentally estimate $$V_{out}$$ across the fixed resistor without long calculation.", "answer": "- Step 1: Total resistance = $$440 + 220 = 660\\,\\Omega$$. $$R_2$$ is $$\\frac{220}{660} = \\frac{1}{3}$$ of the total.\n- Step 2: So $$V_{out} = \\frac{1}{3} \\cdot 6 = 2\\,\\text{V}$$.\n- Step 3: Sense check: $$V_1$$ across the thermistor = $$6 - 2 = 4\\,\\text{V}$$, ratio $$V_1/V_2 = 2 = R_1/R_2 = 440/220$$. ✓\n\nThe trick is recognising the simple ratio (1:2 or 1:3) and doing the divider as a fraction, not a formula.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "If the thermistor in Q43 cools so its resistance rises to $$1100\\,\\Omega$$, qualitatively what happens to $$V_{out}$$ (across the fixed $$220\\,\\Omega$$)?", "answer": "- Step 1: New ratio: $$R_2/(R_1+R_2) = 220/(1100+220) = 220/1320 = 1/6$$.\n- Step 2: $$V_{out}$$ drops from $$\\frac{1}{3} \\cdot 6 = 2\\,\\text{V}$$ to $$\\frac{1}{6} \\cdot 6 = 1\\,\\text{V}$$.\n- Step 3: Causal chain: thermistor cools → $$R_{th}$$ rises → thermistor takes a bigger share of $$V_{in}$$ → fixed resistor's share (= $$V_{out}$$) falls.\n\nPattern: when sensor R rises, $$V_{out}$$ across the *other* resistor falls. The \"see-saw\" between the two voltages is rigid: their sum is always $$V_{in}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Why is the voltage drop across a series resistor (in a sensor divider) often plotted vs the environmental variable, rather than the sensor's voltage itself?", "answer": "- Step 1: In trigger circuits, the *control* signal often needs to **rise** with the environmental stimulus (e.g. heating should raise a signal to turn on a fan).\n- Step 2: If the sensor is NTC (resistance falls with stimulus), the sensor's own voltage *falls* — wrong direction for a \"rising trigger.\" But the fixed resistor's voltage *rises* — the right direction.\n- Step 3: So engineers plot $$V_{fixed}$$ (or $$V_{out}$$ across the non-sensor) when they want a stimulus-rising signal. This is purely a design convention dictated by the comparator/switch downstream.\n\nThe choice of *which* voltage to call $$V_{out}$$ encodes the desired polarity of the response.\n\n## JARGON TABLE\n\n| | What does it mean? |\n| --- | --- |\n| **Core Concepts** | |\n| Potential divider | Two resistors in series across a supply; the supply p.d. is shared in proportion to the resistances, allowing a chosen $$V_{out}$$ to be tapped off. |\n| Output voltage ($$V_{out}$$) | The voltage tapped off across one of the divider's resistors, used to drive or trigger another circuit. |\n| Input voltage ($$V_{in}$$) | The supply voltage across the entire series divider. |\n| Series circuit | Single-loop circuit; current is the same through every component; voltages add to the supply. |\n| Voltage ratio rule | $$V_1/V_2 = R_1/R_2$$ — voltages split in the ratio of resistances when current is the same. |\n| Baseline equation | $$V_{in}/(R_1+R_2) = V_1/R_1 = V_2/R_2$$, where each fraction equals the common series current. |\n| **Potentiometer** | |\n| Potentiometer | Single 3-terminal component (resistive wire + sliding contact) acting as a continuously variable divider; $$V_{out}$$ ranges from 0 to $$V_{in}$$. |\n| Sliding contact (slider) | The movable tap on a potentiometer that divides the resistive track into two effective resistors $$R_1$$ and $$R_2$$. |\n| Rheostat | Two-terminal variable resistor used to control current in series; less effective at delivering wide voltage range than a potentiometer. |\n| Uniform resistance wire | Wire of constant cross-section/material where $$R \\propto L$$, so divider ratios equal length ratios. |\n| **Loaded Divider** | |\n| Load resistor ($$R_L$$) | A component (device) connected across $$R_2$$ to draw the output voltage; in *parallel* with $$R_2$$. |\n| Loading effect | The reduction in $$V_{out}$$ caused by adding a load — the parallel combination $$R_2 \\parallel R_L < R_2$$. |\n| Unloaded divider | A divider with no current drawn at the output (or load $$\\gg R_2$$); $$V_{out}$$ follows the basic formula exactly. |\n| $$R_L \\geq 10R_2$$ rule | Rule of thumb to keep loading effect small — load resistance at least 10× the output resistor. |\n| Output impedance | Effective source resistance seen by the load (≈ $$R_1 \\parallel R_2$$); determines how much loading distorts the output. |\n| **Sensor Components** | |\n| NTC thermistor | \"Negative Temperature Coefficient\" thermistor — semiconductor whose resistance **decreases** as temperature rises (more thermal carriers freed). |\n| LDR (Light-Dependent Resistor) | Semiconductor whose resistance **decreases** as light intensity rises (photons free more carriers). |\n| Sensor sub-circuit | A potential divider where one resistor is replaced by a sensor (thermistor/LDR); $$V_{out}$$ varies with environment. |\n| Sensor position (top/bottom) | Whether the sensor is $$R_1$$ or $$R_2$$ — determines the direction of $$V_{out}$$ change with environment. |\n| Trigger / switching point | The environmental value (e.g. light level, temperature) at which $$V_{out}$$ crosses a threshold to activate a downstream switch. |\n| **Underlying Laws** | |\n| Ohm's law | $$V = IR$$ — rearranged as $$I = V/R$$ or $$R = V/I$$. Never $$R = IV$$. |\n| Kirchhoff's 1st law (KCL) | Sum of currents into a junction = sum of currents out (charge conservation). |\n| Kirchhoff's 2nd law (KVL) | Sum of EMFs around a closed loop = sum of voltage drops (energy conservation). |\n| $$V \\propto R$$ (series) | Direct consequence of constant current in series — bigger R gets bigger voltage share. |\n\n## FORMULA TABLE\n\n| $$LHS = ?$$ | Answer | Name / Hint |\n| --- | --- | --- |\n| **Basic Divider** | | |\n| $$V_{out} = ?$$ | $$= V_{in} \\cdot \\frac{R_2}{R_1+R_2}$$ | Potential divider formula ($$V_{out}$$ across $$R_2$$); resistor whose voltage you want goes on top |\n| $$V_1/V_2 = ?$$ | $$= R_1/R_2$$ | Voltage ratio = resistance ratio (series) |\n| $$I = ?$$ | $$= V_{in}/(R_1+R_2)$$ | Series current — same everywhere |\n| $$V_{in}/(R_1+R_2) = ?$$ | $$= V_1/R_1 = V_2/R_2$$ | Baseline equation; each fraction = common current |\n| $$V_1 + V_2 = ?$$ | $$= V_{in}$$ | Kirchhoff's voltage law for the divider loop |\n| **Potentiometer (uniform wire)** | | |\n| $$V_{out} = ?$$ | $$= V_{in} \\cdot \\frac{L_2}{L_{total}}$$ | Output proportional to length of lower section |\n| $$R = ?$$ (uniform wire) | $$= \\rho L/A \\;\\;(R \\propto L)$$ | Resistance proportional to length |\n| **Loaded Divider** | | |\n| $$R_{BC} = ?$$ | $$= \\frac{R_2 R_L}{R_2+R_L}$$ | Parallel combination of $$R_2$$ and load |\n| $$V_{out,\\,loaded} = ?$$ | $$= V_{in} \\cdot \\frac{R_{BC}}{R_1+R_{BC}}$$ | Loaded output voltage |\n| $$R_L \\geq ?$$ | $$\\geq 10 R_2$$ | Rule of thumb to minimise loading effect |\n| **Ohm & Kirchhoff (background)** | | |\n| $$V = ?$$ | $$= IR$$ | Ohm's law |\n| $$\\Sigma I_{in} = ?$$ | $$= \\Sigma I_{out}$$ | Kirchhoff's current law (junction) |\n| $$\\Sigma \\varepsilon = ?$$ | $$= \\Sigma V_{drop}$$ | Kirchhoff's voltage law (loop) |\n| **Sensor Direction Rules** | | |\n| For NTC thermistor: $$\\uparrow T \\Rightarrow$$ | $$\\downarrow R_{th}$$ | More thermal carriers freed |\n| For LDR: $$\\uparrow \\text{light} \\Rightarrow$$ | $$\\downarrow R_{LDR}$$ | More photo-generated carriers |\n| Sensor on bottom, $$V_{out}$$ across it: $$\\downarrow R_{sensor} \\Rightarrow$$ | $$\\downarrow V_{out}$$ | $$V \\propto R$$ in series |\n| Sensor on top, $$V_{out}$$ across bottom fixed R: $$\\downarrow R_{sensor} \\Rightarrow$$ | $$\\uparrow V_{out}$$ | Less voltage dropped across sensor leaves more for fixed R |", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}], "count": 45}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What is the fundamental physical setup of a potential divider, and what is its purpose?", "answer": "A potential divider is simply two resistors connected in series across a supply voltage $$V_{in}$$, where the output is tapped across one of the resistors. The purpose is to split (divide) the supply p.d. into a smaller, specific output voltage $$V_{out}$$ that can drive or trigger another part of a circuit. The framing matters: it is \"just a series circuit dressed up in a few different ways\" — the entire toolkit (Kirchhoff's laws, Ohm's Law, series current rule) applies directly.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why does voltage split in proportion to resistance in a series potential divider? (3 steps)", "answer": "- Step 1: In a series circuit, the current $$I$$ is the same at every point because charge cannot accumulate and there are no junctions where current can split.\n- Step 2: By Ohm's Law, the voltage across each resistor is $$V = IR$$. Since $$I$$ is identical for both resistors, the only thing that distinguishes $$V_1$$ from $$V_2$$ is their resistance.\n- Step 3: Therefore $$V \\propto R$$ in series, and the ratio $$\\frac{V_1}{V_2} = \\frac{R_1}{R_2}$$ — the bigger resistor takes the bigger share of the supply voltage.\n\nThis is the conceptual heart of the divider: same current, so voltage is dictated entirely by resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Derive the potential-divider formula $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_1 + R_2}$$ from first principles. (3 steps)", "answer": "- Step 1: Total resistance in series is $$R_1 + R_2$$, so the common current is $$I = \\frac{V_{in}}{R_1 + R_2}$$.\n- Step 2: The voltage across $$R_2$$ (where output is tapped) is by Ohm's Law $$V_2 = IR_2$$.\n- Step 3: Substituting: $$V_{out} = V_2 = \\frac{V_{in}}{R_1+R_2} \\cdot R_2 = V_{in} \\cdot \\frac{R_2}{R_1+R_2}$$.\n\nThe structure to remember: the numerator is the resistance you are taking the voltage *across*; the denominator is the total resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "In the potential-divider formula, how do you decide which resistor goes in the numerator of the fraction?", "answer": "The resistor whose voltage you are calculating **always** goes on top of the fraction. If you want the p.d. across the top resistor, put $$R_1$$ in the numerator; if across the bottom resistor, put $$R_2$$. This is because the formula is really just $$V_{across\\ R} = I \\times R$$, where $$I = \\frac{V_{in}}{R_{total}}$$, so the $$R$$ you multiply by is the one you are finding the voltage for. Common trap: students automatically put $$R_2$$ on top without checking the circuit.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What is the \"baseline equation\" $$\\frac{V_{in}}{R_1+R_2} = \\frac{V_1}{R_1} = \\frac{V_2}{R_2}$$ saying physically, and why is it useful? (3 steps)", "answer": "- Step 1: Each fraction equals the common series current $$I$$. The supply ratio $$V_{in}/(R_1+R_2) = I$$, and each individual ratio $$V_k/R_k = I$$ by Ohm's Law.\n- Step 2: Because all three fractions are equal, you can equate any two and solve for an unknown without computing the current explicitly.\n- Step 3: This is more flexible than memorising $$V_{out} = V_{in} \\cdot R_2/(R_1+R_2)$$ because it handles any unknown: a missing voltage, a missing resistance, or a missing supply value.\n\nIt is the *one master equation* for any divider question.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "A 6 V supply is connected to two equal resistors in series. Without calculation, what is the p.d. across each, and why?", "answer": "Each resistor takes 3 V. Because the resistors are equal and the same current flows through both (series), each gets an equal share of the supply by $$V = IR$$. This is the simplest application of \"voltage splits in proportion to resistance\" — equal resistance means equal voltage. No formula needed; pure proportionality reasoning.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "A 12 V supply is across a $$2\\,\\text{k}\\Omega$$ (top) and $$4\\,\\text{k}\\Omega$$ (bottom) divider. Roughly what fraction of the supply appears across the bottom resistor, and why?", "answer": "The bottom $$4\\,\\text{k}\\Omega$$ takes $$\\frac{4}{2+4} = \\frac{2}{3}$$ of the supply, so $$V_{out} \\approx 8\\,\\text{V}$$. Intuition: the $$4\\,\\text{k}\\Omega$$ is twice the size of the $$2\\,\\text{k}\\Omega$$, so it must take twice the voltage of the smaller one; if the total is 12 V split in ratio 1:2, the bottom gets 8 V and the top gets 4 V. No calculator needed — just resistance ratios.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Why does Kirchhoff's Voltage Law (KVL) act as a sanity check on every divider calculation? (2 steps)", "answer": "- Step 1: KVL says the sum of p.d.s around a closed loop equals the supply EMF: $$V_1 + V_2 = V_{in}$$.\n- Step 2: After computing $$V_2$$ from the divider formula, you can always verify $$V_1 = V_{in} - V_2$$. If the two voltages don't add to the supply, you've made an arithmetic or numerator-choice error.\n\nThis is the cheapest, fastest error check available.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "What is a potentiometer, and how does it differ from two discrete resistors?", "answer": "A potentiometer is a single three-terminal component consisting of a resistive wire (or track) of fixed total resistance $$R_{total}$$, plus a sliding contact (wiper) that can be positioned anywhere along the wire. The slider effectively divides the single resistor into two parts $$R_1$$ and $$R_2 = R_{total} - R_1$$, which together sum to a constant. Unlike two fixed resistors, this allows $$V_{out}$$ to be varied **continuously** from 0 to $$V_{in}$$ just by moving the slider.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "For a potentiometer made from a uniform resistance wire of length $$L_{total}$$, what determines $$V_{out}$$ and why? (2 steps)", "answer": "- Step 1: For a uniform wire, resistance is proportional to length: $$R \\propto L$$. So $$R_2/R_{total} = L_2/L_{total}$$.\n- Step 2: Therefore $$V_{out} = V_{in} \\cdot \\frac{L_2}{L_{total}}$$, where $$L_2$$ is the length of the section the output is taken across.\n\nThis means you can read $$V_{out}$$ directly off a ruler — no resistance values needed, just lengths.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "On a uniform potentiometer wire with 12 V across the full length, the slider is placed such that the lower section is $$\\frac{1}{4}$$ of the total length. What is $$V_{out}$$ across the lower section?", "answer": "$$V_{out} = \\frac{1}{4} \\times 12 = 3\\,\\text{V}$$. Because resistance is proportional to length in a uniform wire, taking $$\\frac{1}{4}$$ of the length means tapping off $$\\frac{1}{4}$$ of the resistance, and therefore $$\\frac{1}{4}$$ of the supply voltage. No formula manipulation needed.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "What is the conceptual difference between using a variable resistor as a **rheostat** versus as a **potentiometer**?", "answer": "A rheostat uses only two terminals and is placed in series to **control current**: changing its resistance changes the total circuit resistance and hence the current, but $$V_{out}$$ can only range from a minimum (when the rheostat = max) up to roughly $$V_{in}$$ — never below the minimum. A potentiometer uses all three terminals to **control voltage**: $$V_{out}$$ ranges fully from 0 to $$V_{in}$$. The mnemonic: *rheostat controls current; potentiometer controls potential difference*. A potentiometer is the more useful arrangement for experiments needing the full voltage range (e.g. I–V characteristics).", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "A student wants to investigate the I–V characteristics of a $$220\\,\\Omega$$ resistor using a 6 V supply and a $$20\\,\\Omega$$ rheostat in series. Why is this circuit a poor choice? (3 steps)", "answer": "- Step 1: When rheostat = 0, full 6 V appears across the resistor. When rheostat = max ($$20\\,\\Omega$$), total resistance is $$240\\,\\Omega$$, so current is $$\\approx 25\\,\\text{mA}$$, giving $$V \\approx 5.5\\,\\text{V}$$ across the $$220\\,\\Omega$$.\n- Step 2: The achievable voltage range is only 5.5 V to 6.0 V — a tiny window.\n- Step 3: A potentiometer arrangement, by contrast, would allow $$V_{out}$$ from 0 to 6 V, giving a full I–V curve.\n\nLesson: rheostats give a narrow voltage range; potentiometers give the full range.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "When a load resistor $$R_L$$ is connected across the output of a potential divider, what happens to $$V_{out}$$ and why? (4 steps)", "answer": "- Step 1: $$R_L$$ sits in **parallel** with $$R_2$$ (not in series), creating a combined resistance $$R_{BC} = \\frac{R_2 R_L}{R_2 + R_L}$$ which is always *less* than $$R_2$$.\n- Step 2: The total circuit resistance falls from $$R_1 + R_2$$ to $$R_1 + R_{BC}$$, so the current drawn from the supply *increases*.\n- Step 3: With more current through $$R_1$$, the voltage drop across $$R_1$$ rises, leaving less voltage for the output section.\n- Step 4: Therefore $$V_{out}$$ decreases compared with the unloaded value.\n\nConceptually: loading \"steals\" current and pulls the output voltage down.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Why is it a common mistake to think the load resistor goes in series with $$R_2$$ rather than parallel?", "answer": "Students sometimes picture the load as \"after\" $$R_2$$ in the current path, suggesting series. But the load is tapped across the **same two output terminals** as $$R_2$$ — both endpoints are at the same nodes — so by definition the load is in **parallel** with $$R_2$$. Drawing the circuit with explicit nodes (BC for the output terminals) makes this clear. The parallel combination always has smaller resistance than either branch alone, which is why $$V_{out}$$ drops.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "What is the rule of thumb for choosing a load resistance to minimise loading effect on a potential divider, and why does it work?", "answer": "Use $$R_L \\geq 10\\,R_2$$. When the load is at least ten times bigger than the output resistor, the parallel combination $$R_2 \\| R_L$$ is dominated by $$R_2$$ and changes only slightly (by roughly 10%). For instance, $$R_2 \\| 10R_2 = \\frac{10R_2}{11} \\approx 0.91 R_2$$. The smaller the change in effective output resistance, the smaller the change in $$V_{out}$$. If the load is comparable to or smaller than $$R_2$$, the parallel combination collapses sharply and $$V_{out}$$ falls significantly.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "A divider with $$R_1 = 12\\,\\Omega$$, $$R_2 = 6\\,\\Omega$$, $$V_{in} = 7.5\\,\\text{V}$$ gives 2.5 V unloaded. A 6 Ω lamp is connected across $$R_2$$. Without computing exact numbers, will $$V_{out}$$ rise, fall, or stay the same, and by roughly how much? (3 steps)", "answer": "- Step 1: $$R_L = R_2 = 6\\,\\Omega$$ — equal values in parallel give half: $$R_{BC} = 3\\,\\Omega$$.\n- Step 2: The effective bottom resistance halves while the top stays at $$12\\,\\Omega$$, so the bottom now takes a much smaller share of the supply.\n- Step 3: The ratio $$3/(12+3) = 1/5$$ instead of $$6/18 = 1/3$$, so $$V_{out}$$ falls from 2.5 V to roughly 1.5 V — a major drop because the load is only 1× $$R_2$$, not 10×.\n\nLesson: a load comparable to $$R_2$$ causes large loading; always check the 10× rule.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "What is an NTC thermistor, and what does \"NTC\" mean physically? (2 steps)", "answer": "- Step 1: NTC stands for **Negative Temperature Coefficient**: the resistance decreases as temperature increases — the opposite of metal wires.\n- Step 2: Physically, in a thermistor (a semiconductor), heating gives electrons enough thermal energy to break free into the conduction band, so more charge carriers become available and resistance falls.\n\nKey shape of the R–T graph: steep at low T, flattening at high T.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "What is an LDR, and how does its resistance depend on light intensity?", "answer": "An LDR (Light-Dependent Resistor) is a semiconductor component whose resistance **decreases as light intensity increases**. Physically, photons striking the material excite electrons into the conduction band, increasing the number of charge carriers and lowering resistance. In darkness, resistance can be in the megohm range; in bright light, it drops to hundreds of ohms. The R–vs–intensity curve is steep at low light and flattens at high light — same shape as the thermistor R–T curve.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "In a sensor divider with the thermistor as the **bottom** resistor (output across thermistor), what happens to $$V_{out}$$ when temperature rises? (3 steps)", "answer": "- Step 1: Temperature rises $$\\Rightarrow$$ thermistor resistance $$R_{th}$$ decreases.\n- Step 2: Since $$V \\propto R$$ in series (same current), the voltage across the thermistor falls: $$V_{th} = V_{out}$$ decreases.\n- Step 3: By KVL, the voltage across the fixed top resistor increases — but $$V_{out}$$ is across the thermistor, so $$V_{out}$$ decreases.\n\nSensor 3-mark chain: ↑T → ↓$$R_{th}$$ → ↓$$V_{th}$$ → ($$V_R$$ ↑ by KVL).", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "In a sensor divider with the thermistor as the **top** resistor (output across fixed bottom resistor R), what happens to $$V_{out}$$ when temperature rises? (3 steps)", "answer": "- Step 1: ↑T $$\\Rightarrow$$ $$R_{th}$$ decreases.\n- Step 2: Total resistance falls, so circuit current $$I$$ rises.\n- Step 3: $$V_{out} = IR$$ where $$R$$ is the fixed bottom resistor (unchanged). Since $$I$$ increased, $$V_{out}$$ increases.\n\nEquivalent reasoning via KVL: the thermistor's share of the supply shrinks, so the fixed resistor's share grows. Always read the circuit first to determine which position the sensor occupies.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Why does the position of the sensor (top vs bottom) flip the direction of $$V_{out}$$ change?", "answer": "Because $$V_{out}$$ is *defined* as the voltage across whichever resistor the output is tapped from. If the sensor is in the output position, $$V_{out}$$ tracks the sensor's voltage directly. If the sensor is in the *other* position, $$V_{out}$$ is across the fixed resistor, which by KVL moves in the *opposite* direction to the sensor. The physics is identical; the labelling determines whether $$V_{out}$$ rises or falls. **Always identify which component the output is across before predicting direction.**", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "Write out the full 3-mark \"state and explain\" answer chain for: \"Temperature of the thermistor (top resistor) rises — what happens to the p.d. across the fixed bottom resistor $$R$$?\" (3 steps)", "answer": "- Step 1: Temperature increases, so the thermistor's resistance $$R_{th}$$ decreases (NTC behaviour).\n- Step 2: Total resistance falls, so current rises; equivalently, by $$V \\propto R$$ in series, the voltage across the thermistor decreases.\n- Step 3: By Kirchhoff's Voltage Law, $$V_R = V_S - V_{th}$$, so $$V_R$$ increases.\n\nEach step earns one mark. Examiners want all three: resistance change, sensor voltage change (with reasoning), other resistor voltage change (citing KVL).", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Why does a streetlight using an LDR sensor switch on at dusk? (3 steps)", "answer": "- Step 1: As light fades at dusk, the LDR's resistance increases.\n- Step 2: If the output is taken across the LDR, its voltage rises (because its share of the supply grows as its resistance grows relative to the fixed resistor).\n- Step 3: When $$V_{out}$$ rises above a threshold, it triggers a switching circuit (e.g. a transistor) that turns the lamp on.\n\nThe LDR converts an environmental change (light) into a voltage change that an electronic circuit can act on.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "A thermistor circuit has $$R_{th} = 3.0\\,\\text{k}\\Omega$$ at 25°C with a fixed 1.0 kΩ resistor and 5 V supply, output across the thermistor. Without exact computation, roughly what fraction of the supply appears at $$V_{out}$$?", "answer": "The thermistor is 3 kΩ and the fixed is 1 kΩ, so the thermistor takes $$\\frac{3}{1+3} = \\frac{3}{4}$$ of the supply: $$V_{out} \\approx \\frac{3}{4} \\times 5 = 3.75\\,\\text{V}$$. The thermistor dominates the divider because it is 3× larger than the fixed resistor. If the temperature rises and $$R_{th}$$ drops to 1 kΩ, the two resistors are equal and $$V_{out}$$ falls to half the supply (2.5 V). The output drops as temperature rises — sensor reasoning confirmed.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "In a 9 V circuit with an unknown series resistor $$R$$ and a 450 Ω thermistor (output across thermistor reads 5 V), how do you set up the equation to find $$R$$
