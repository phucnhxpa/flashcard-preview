<script>
const DATA={"selected": [{"question": "When a load resistor $$R_L$$ is connected across the output of a potential divider, what happens to $$V_{out}$$ and why? (4 steps)", "answer": "- Step 1: $$R_L$$ sits in **parallel** with $$R_2$$ (not in series), creating a combined resistance $$R_{BC} = \\frac{R_2 R_L}{R_2 + R_L}$$ which is always *less* than $$R_2$$.\n- Step 2: The total circuit resistance falls from $$R_1 + R_2$$ to $$R_1 + R_{BC}$$, so the current drawn from the supply *increases*.\n- Step 3: With more current through $$R_1$$, the voltage drop across $$R_1$$ rises, leaving less voltage for the output section.\n- Step 4: Therefore $$V_{out}$$ decreases compared with the unloaded value.\n\nConceptually: loading \"steals\" current and pulls the output voltage down.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "In the sensor direction table from your notes, if the thermistor is in the TOP position (output across bottom resistor), what happens to Vout when temperature increases? How does this differ if the thermistor is in the BOTTOM position (output across thermistor)? (1 step)", "answer": "- Step 1: **Thermistor TOP**: ↑T → ↓Rth → ↓Vth (less voltage across thermistor) → ↑Vout (across bottom resistor, by KVL). **Thermistor BOTTOM**: ↑T → ↓Rth → ↓Vout (less voltage across thermistor). The direction is opposite! This is why position matters. The \"other resistor's voltage always changes opposite to the sensor's voltage\" (KVL), so whichever position the sensor is in determines whether Vout increases or decreases with the environmental change.\n\nAlways identify position first, then apply the chain. Many students get this backwards because they memorize a rule without checking position.", "source": "MiniMax ②", "_id": "minimax_2_24"}, {"question": "In a potential divider, a thermistor is the **top** resistor ($$R_1$$) and a fixed resistor is the **bottom** resistor ($$R_2$$, output across $$R_2$$). When temperature increases, does $$V_{out}$$ increase or decrease? Walk through the chain of reasoning. (4 steps)", "answer": "- Step 1: Temperature increases → the NTC thermistor's resistance **decreases** ($$R_1$$ decreases).\n\n- Step 2: Total resistance $$R_1 + R_2$$ decreases, so the current **increases**: $$I = V_{in}/(R_1 + R_2)$$.\n\n- Step 3: The voltage across the thermistor is $$V_1 = IR_1$$. Although $$I$$ increased, $$R_1$$ decreased significantly. The net effect is that $$V_1$$ **decreases** (a smaller fraction of $$V_{in}$$ is lost across $$R_1$$).\n\n- Step 4: By KVL: $$V_{out} = V_{in} - V_1$$. Since $$V_1$$ decreased, $$V_{out}$$ **increases**.\n\n+ Shortcut reasoning: the thermistor's resistance decreased, so it claims a **smaller share** of the voltage. The remaining voltage (across $$R_2$$) must therefore be larger. When the sensor is on top, ↑T → ↑$$V_{out}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "What is the conceptual difference between using a variable resistor as a **rheostat** versus as a **potentiometer**?", "answer": "A rheostat uses only two terminals and is placed in series to **control current**: changing its resistance changes the total circuit resistance and hence the current, but $$V_{out}$$ can only range from a minimum (when the rheostat = max) up to roughly $$V_{in}$$ — never below the minimum. A potentiometer uses all three terminals to **control voltage**: $$V_{out}$$ ranges fully from 0 to $$V_{in}$$. The mnemonic: *rheostat controls current; potentiometer controls potential difference*. A potentiometer is the more useful arrangement for experiments needing the full voltage range (e.g. I–V characteristics).", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "In a loaded divider, what happens to $$V_{out}$$ in the *limiting case* where $$R_L \\to \\infty$$ (open circuit) and where $$R_L \\to 0$$ (short circuit)? (2 steps)", "answer": "- Step 1: $$R_L \\to \\infty$$: the parallel combination $$R_2 \\| R_L \\to R_2$$, so $$V_{out}$$ approaches the unloaded value. An \"infinite\" load draws no current, so it doesn't disturb the divider — this is why ideal voltmeters have very high resistance.\n- Step 2: $$R_L \\to 0$$: the parallel combination collapses to 0, so $$V_{out} \\to 0$$. A short circuit across the output forces both output terminals to the same potential, dragging $$V_{out}$$ to zero regardless of what the divider would have produced.\n\nThe 10× rule lives in between these extremes — loaded enough to draw a usable signal, but high enough not to short out the divider.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "In the \"baseline equation\" for a potential divider, we write: Vin/(R1 + R2) = V1/R1 = V2/R2. What does each fraction actually equal, and why is this a compact way to set up any divider calculation? (2 steps)", "answer": "- Step 1: Each fraction equals the current I flowing through the series circuit. Since I = Vin/(R1 + R2), and also I = V1/R1 (Ohm's Law for R1), and I = V2/R2 (Ohm's Law for R2), all three ratios are equal.\n- Step 2: This \"baseline equation\" is powerful because it lets you solve for any unknown when you know any two of: Vin, V1, V2, R1, R2. For example, if you know Vin and R1 and want R2 for a specific Vout, you can set up: Vout/R2 = Vin/(R1 + R2) and solve algebraically. It's a single unified relationship rather than separate formulas.\n\nThis is especially useful for sensor problems where you're given the output voltage and need to find a required resistance.", "source": "MiniMax ②", "_id": "minimax_2_12"}, {"question": "What does it mean to \"load\" a potential divider, and what physical change does it cause in the circuit? (3 steps)", "answer": "- Step 1: \"Loading\" means connecting a component (the load, resistance $$R_L$$) **across** the output resistor $$R_2$$ to draw the output voltage. The load is in **parallel** with $$R_2$$, not in series.\n- Step 2: The effective bottom resistance becomes the parallel combination: $$R_{BC} = \\frac{R_2 R_L}{R_2 + R_L}$$, which is **always less than $$R_2$$**.\n- Step 3: Because the bottom resistance has dropped, the total circuit resistance drops, the current rises, and a larger share of voltage now drops across $$R_1$$ — meaning **$$V_{out}$$ falls** compared with the unloaded case.\n\nCounter-intuitive but crucial: adding the very thing you want to power *reduces* the voltage you're trying to deliver to it.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "When solving a thermistor problem like \"Find R given $$V_{in}, V_{th}, R_{th}$$,\" why is it cleaner to use the baseline ratio rather than the standard divider formula?", "answer": "The baseline ratio $$\\frac{V_{th}}{R_{th}} = \\frac{V_S}{R_{th}+R}$$ lets you directly equate two expressions for the common current $$I$$, leading immediately to a linear equation in $$R$$. The standard formula $$V_{th} = V_S \\cdot R_{th}/(R_{th}+R)$$ works too, but requires extra algebraic shuffling to isolate $$R$$. Both are equivalent — the baseline ratio just exposes the underlying \"same-current\" physics more transparently and reduces algebraic clutter. It's also more flexible for the variety of unknowns that exam questions can throw at you.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "A potentiometer is a continuously variable potential divider. Explain why it can output any voltage from 0 V up to the input voltage, whereas a standard variable resistor (rheostat) connected in series cannot. (3 steps)", "answer": "- Step 1: A potentiometer consists of a single resistive track with a sliding contact (wiper). The wiper effectively splits the one long resistor into two separate resistors, $$R_1$$ and $$R_2$$, connected in series.\n- Step 2: By moving the wiper, you change the ratio $$\\frac{R_2}{R_1 + R_2}$$ smoothly. When the wiper is at the very bottom, $$R_2 = 0$$ and $$V_{out} = 0$$. When at the top, $$R_2$$ equals the total resistance and $$V_{out} = V_{in}$$.\n- Step 3: A rheostat in series only changes the *total* resistance of the circuit, which changes the current, but it does not provide a variable voltage \"tap\" at a specific point to maintain a stable ratio. It controls current, not potential difference.", "source": "MiniMax ①", "_id": "minimax_1_2"}, {"question": "A potential divider has a thermistor on top and a fixed resistor on the bottom. The output across the fixed resistor is used to trigger a heater. Explain the full chain of reasoning for why this circuit could act as an automatic heater controller that turns ON when the room gets cold. (4 steps)", "answer": "- Step 1: When the room gets cold, the temperature decreases. For an NTC thermistor, ↓T → ↑$$R_{th}$$. The thermistor resistance increases.\n\n- Step 2: With higher $$R_{th}$$, the thermistor claims a **larger** share of the supply voltage (since $$V \\propto R$$ in series). So $$V_{th}$$ increases.\n\n- Step 3: By KVL: $$V_{out} = V_{in} - V_{th}$$. Since $$V_{th}$$ increased, $$V_{out}$$ (across the fixed resistor) **decreases**.\n\n- Step 4: Wait — this gives ↓$$V_{out}$$ when cold. To trigger a heater when cold, you'd want ↑$$V_{out}$$ when cold. So this configuration is **wrong** for that purpose! You would need to **swap** the positions: put the thermistor on the bottom (output across thermistor), so that ↓T → ↑$$R_{th}$$ → ↑$$V_{th}$$ → ↑$$V_{out}$$, triggering the heater.\n\n+ This is a trick question to test whether you blindly follow a pattern or actually reason through the circuit. The sensor's position determines everything — always work through the chain from first principles.", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "A divider has a 5 kΩ resistor on top and a 10 kΩ resistor on the bottom, connected to a 9 V supply. A 10 kΩ load is connected across the bottom resistor. Qualitatively, how does the new output voltage compare to the unloaded output voltage, and what is the approximate effective resistance of the bottom section? (2 steps)", "answer": "- Step 1: Calculate the effective resistance of the bottom section. The 10 kΩ load is in parallel with the 10 kΩ bottom resistor. Two identical resistors in parallel have exactly half the resistance of one, so the effective resistance is $$5\\text{ k}\\Omega$$.\n- Step 2: Compare to the unloaded state. Unloaded, the bottom was 10 kΩ out of a total of 15 kΩ, taking a large share of the voltage. Loaded, the bottom is now only 5 kΩ out of a total of 10 kΩ ($$5\\text{ k}\\Omega + 5\\text{ k}\\Omega$$), meaning it takes exactly half the supply voltage. The output voltage has decreased compared to the unloaded state.", "source": "GLM 5.1 ①", "_id": "glm_1_12"}, {"question": "Why does a potentiometer give a much wider voltage range than a rheostat placed in series with a load?", "answer": "- Step 1: A series rheostat only changes the **total** circuit resistance, so it adjusts the current. The voltage across the load is then $$V_{load} = IR_{load}$$, and even when the rheostat is at maximum, the load still gets a non-trivial voltage share.\n- Step 2: For example, with a 6 V supply, 20 Ω rheostat (max) and 220 Ω load, the load voltage only drops to $$\\frac{220}{240}\\cdot 6 \\approx 5.5\\,\\text{V}$$ at minimum. The achievable range is tiny (5.5–6.0 V).\n- Step 3: A potentiometer, by contrast, taps off a fraction of $$V_{in}$$ directly. Sliding to one end gives 0 V, the other gives $$V_{in}$$ — **the full 0 to $$V_{in}$$ range**.\n\nMemorise: **rheostat controls current; potentiometer controls potential difference.**", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Why does the voltage across the fixed resistor in a sensor circuit always move in the opposite direction to the voltage across the sensor?", "answer": "By Kirchhoff's Voltage Law applied to the series loop, $$V_{sensor} + V_{fixed} = V_{in}$$. Since $$V_{in}$$ is constant, any increase in one must be exactly matched by a decrease in the other. Mathematically, $$V_{fixed} = V_{in} - V_{sensor}$$, so $$\\Delta V_{fixed} = -\\Delta V_{sensor}$$. This is why the 3-mark answer chain always ends with citing KVL: it justifies why the *other* resistor's voltage moves opposite to the sensor's.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "A divider has $$R_1 = 5\\text{ k}\\Omega$$ and $$R_2 = 10\\text{ k}\\Omega$$ across a 9 V supply. A load of 30 kΩ is connected across $$R_2$$. Without doing heavy calculation, will the loaded $$V_{out}$$ be noticeably different from the unloaded value? Justify qualitatively. (3 steps)", "answer": "- Step 1: Check the rule of thumb: is $$R_L \\geq 10 \\times R_2$$? Here $$R_L = 30\\text{ k}\\Omega$$ and $$10 \\times R_2 = 100\\text{ k}\\Omega$$. Since $$30 < 100$$, the condition is **not** met.\n\n- Step 2: Because $$R_L$$ is only 3 times $$R_2$$ (not 10 times), the parallel combination $$R_{BC}$$ will be noticeably less than $$R_2$$. This means a significant drop in $$V_{out}$$ is expected.\n\n- Step 3: The unloaded $$V_{out} = 9 \\times \\frac{10}{15} = 6\\text{ V}$$. The loaded $$V_{out}$$ will be noticeably below 6 V (in fact it works out to about 5.4 V — a 0.6 V drop). The loading effect is significant because the load is not large enough relative to $$R_2$$.\n\n+ Takeaway: \"3× is not enough.\" The 10× rule exists because anything less causes a meaningful voltage drop.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "A thermistor sits in the **top** position; the fixed resistor is at the bottom with $$V_{out}$$ across it. Temperature rises — does $$V_{out}$$ increase or decrease, and why?", "answer": "- Step 1: $$\\uparrow T \\Rightarrow \\downarrow R_{th}$$ (NTC behaviour).\n- Step 2: Since $$R_{th}$$ is the *top* resistor, the divider formula gives $$V_{out} = V_{in} \\cdot \\frac{R_{fixed}}{R_{th} + R_{fixed}}$$. As $$R_{th}$$ drops, the denominator falls, and the fraction **increases**.\n- Step 3: So $$V_{out}$$ **increases**. Intuition: the top resistor \"drops less\" of the supply, leaving more for the bottom fixed resistor.\n\nCrucial habit: **always first identify whether the sensor is the top or bottom resistor** before predicting direction.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "Why does the position of the sensor (top vs bottom) flip the direction of $$V_{out}$$ change?", "answer": "Because $$V_{out}$$ is *defined* as the voltage across whichever resistor the output is tapped from. If the sensor is in the output position, $$V_{out}$$ tracks the sensor's voltage directly. If the sensor is in the *other* position, $$V_{out}$$ is across the fixed resistor, which by KVL moves in the *opposite* direction to the sensor. The physics is identical; the labelling determines whether $$V_{out}$$ rises or falls. **Always identify which component the output is across before predicting direction.**", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "In a sensor divider circuit, why is it useful to choose the fixed resistor to be approximately half the sensor's resistance at the operating point? (Think about sensitivity.) (3 steps)", "answer": "- Step 1: Core Practical 12 suggests choosing $$R_2 \\approx \\frac{1}{2} R_1$$ (where $$R_1$$ is the thermistor resistance at room temperature). This places the operating point near the middle of the voltage range.\n\n- Step 2: When $$R_2 \\approx R_1/2$$, the unloaded $$V_{out} \\approx V_{in} \\times (R_1/2)/(R_1 + R_1/2) = V_{in}/3$$. This means there is plenty of room for $$V_{out}$$ to change in both directions as the sensor resistance varies.\n\n- Step 3: If the fixed resistor were very large or very small compared to the sensor, $$V_{out}$$ would be stuck near 0 V or near $$V_{in}$$, and small changes in sensor resistance would produce very small changes in $$V_{out}$$. Choosing a comparable value maximises the **sensitivity** — the change in $$V_{out}$$ per unit change in the environmental variable.\n\n+ This is a design principle: for maximum voltage swing, the two resistances should be of similar order of magnitude at the typical operating point.", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "A student reasons: \"In a loaded divider, if I make $$R_L$$ extremely large (approaching infinity), then $$V_{out}$$ should approach the unloaded value.\" Is this correct? Explain why. (3 steps)", "answer": "- Step 1: Yes, this is correct. As $$R_L \\to \\infty$$, the parallel combination approaches:\n$$R_{BC} = \\frac{R_2 \\cdot R_L}{R_2 + R_L} \\to \\frac{R_2 \\cdot R_L}{R_L} = R_2$$\n\n- Step 2: Physically, an infinitely large load draws **zero current** (since $$I_L = V_{out}/R_L \\to 0$$). If no current flows through the load, it might as well not be there — the divider is effectively unloaded.\n\n- Step 3: This is the ideal case: a perfect voltmeter (infinite resistance) connected across $$R_2$$ would read the true unloaded voltage. Real voltmeters have finite (but very large) resistance, which is why they only approximate the unloaded reading.\n\n+ This explains why the rule of thumb $$R_L \\geq 10 R_2$$ works: it's a practical compromise. Not infinite, but large enough that the loading effect is small (under ~10%).", "source": "GLM 5.1 ②", "_id": "glm_2_27"}, {"question": "If you connect a $$200\\,\\text{k}\\Omega$$ resistor in series with a $$10\\,\\text{M}\\Omega$$ resistor across a supply, roughly what fraction of the supply voltage drops across the smaller resistor, and what does this tell you?", "answer": "- Step 1: Convert to a common power: $$200 \\times 10^3$$ vs $$10\\,000 \\times 10^3$$. The smaller resistance is about $$\\frac{1}{51}$$ of the total.\n- Step 2: So $$V_{out}$$ across the $$200\\,\\text{k}\\Omega$$ ≈ $$\\frac{1}{51}$$ of $$V_{in}$$ — almost nothing.\n- Step 3: Lesson: when resistances differ by orders of magnitude, almost **all** the voltage drops across the bigger one. The smaller resistor \"vanishes\" from the voltage distribution.\n\nThis is why mixing kΩ and MΩ in a divider gives extreme outputs — useful for triggers, useless if you want a moderate $$V_{out}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "Why does a loaded divider not just \"subtract\" the load voltage but instead change the entire current and voltage distribution? (3 steps)", "answer": "- Step 1: A naive view treats the divider as a \"voltage source of value $$V_{out}$$\" sitting independently — so adding a load shouldn't change anything. This is wrong.\n- Step 2: A real divider is **resistive throughout**: the load adds a new parallel path, changing the total circuit resistance. By Ohm's law, this changes the current $$I$$.\n- Step 3: Once $$I$$ changes, the voltage drop $$V_1 = IR_1$$ across the top resistor changes too — and that change *redistributes* the remaining voltage between $$R_1$$ and the parallel combo at the bottom.\n\nKey insight: the divider only behaves like a clean voltage source when its **output impedance** ($$R_1 \\parallel R_2$$) is much smaller than the load. Otherwise, the load *and* the divider interact strongly.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "An LDR is the **bottom** resistor in a potential divider (output across the LDR). When light intensity decreases (it gets darker), what happens to $$V_{out}$$? Walk through the reasoning. (3 steps)", "answer": "- Step 1: Decreased light intensity → LDR resistance **increases** (fewer photons, fewer free charge carriers).\n\n- Step 2: Since $$V \\propto R$$ in series (same current), the LDR's increased resistance means it claims a **larger fraction** of the supply voltage. So $$V_{LDR}$$ **increases**.\n\n- Step 3: Since the output is across the LDR, $$V_{out}$$ **increases** when it gets darker.\n\n+ This is the principle behind automatic street lights: at dusk, light intensity falls → LDR resistance rises → $$V_{out}$$ across LDR rises → this higher voltage triggers the lamp circuit to switch on. The LDR is placed at the bottom so that darkness produces a high trigger voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "A student sets up a potential divider with $$R_1 = 1\\text{ M}\\Omega$$ and $$R_2 = 1\\text{ M}\\Omega$$ across a 10 V supply, expecting 5 V output. They measure with a voltmeter of resistance 1 MΩ and get only 3.33 V. Explain why. (3 steps)", "answer": "- Step 1: The voltmeter (1 MΩ) is in parallel with $$R_2$$ (1 MΩ). The parallel combination is:\n$$R_{BC} = \\frac{1 \\times 1}{1 + 1} = 0.5\\text{ M}\\Omega$$\n\n- Step 2: The loaded divider now has $$R_1 = 1\\text{ M}\\Omega$$ on top and $$R_{BC} = 0.5\\text{ M}\\Omega$$ on bottom. The output is:\n$$V_{out} = 10 \\times \\frac{0.5}{1 + 0.5} = 10 \\times \\frac{1}{3} \\approx 3.33\\text{ V}$$\n\n- Step 3: The voltmeter's resistance is equal to $$R_2$$, so it halves the effective bottom resistance. This is far from the 10× rule (here $$R_L/R_2 = 1$$), causing a massive 33% drop from the expected 5 V.\n\n+ Lesson: high-resistance dividers are extremely sensitive to loading. A 1 MΩ divider is a poor design choice if you're measuring with a 1 MΩ voltmeter. Use much smaller divider resistances, or a voltmeter with much higher input impedance.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "A student uses a rheostat (variable resistor) in series with a fixed resistor and claims they can achieve any output voltage from 0 V up to the full supply voltage. Why is this claim wrong? (3 steps)", "answer": "- Step 1: With a rheostat in series, the output is taken across the fixed resistor. The minimum output voltage occurs when the rheostat is at maximum resistance: $$V_{out,min} = V_{in} \\cdot \\frac{R_{fixed}}{R_{fixed} + R_{rheostat,max}}$$. This is still greater than zero.\n\n- Step 2: The maximum output occurs when the rheostat is at zero resistance: $$V_{out,max} = V_{in}$$. So the range is from some positive minimum to $$V_{in}$$ — **not** from 0 to $$V_{in}$$.\n\n- Step 3: A potentiometer, by contrast, can achieve 0 V (slider at bottom, $$R_2 = 0$$) because it is wired as a three-terminal divider where the output is taken across a section of the track that can shrink to zero. This is why a potentiometer is preferred when you need the full voltage range.\n\n+ Example: a 20 Ω rheostat in series with a 220 Ω resistor on a 6 V supply can only vary the output from 5.5 V to 6.0 V — nearly useless for investigating I-V characteristics over a wide range.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "What's the conceptual reason a potentiometer can be thought of as \"two imaginary resistors that always sum to a constant\"?", "answer": "The full wire has a fixed total resistance $$R_{total}$$. The slider physically taps the wire at some point, dividing it into two sections: the upper $$R_1$$ and the lower $$R_2$$. By construction, $$R_1 + R_2 = R_{total}$$ always — moving the slider only redistributes the total between the two sections. This is fundamentally different from two discrete resistors, where the total resistance changes if you swap them out. The constant-sum property is why the current through the wire stays the same regardless of slider position (assuming no load), and only the *ratio* $$R_2/R_{total}$$ changes.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "As the load resistance $$R_L$$ is varied from very large to very small, sketch qualitatively how $$V_{out}$$ of a divider changes. What are the two limits?", "answer": "- Step 1: Limit 1 ($$R_L \\to \\infty$$, ideal voltmeter): the load draws no current, parallel combo = $$R_2$$, $$V_{out}$$ equals the unloaded value $$V_{in}\\cdot R_2/(R_1+R_2)$$.\n- Step 2: Limit 2 ($$R_L \\to 0$$, short circuit): parallel combo $$\\to 0$$, so the bottom resistance vanishes, $$V_{out} \\to 0$$. All the voltage drops across $$R_1$$.\n- Step 3: Between these limits, $$V_{out}$$ decreases smoothly and monotonically as $$R_L$$ decreases.\n\nThis curve gives you a strong intuition: any finite load **always reduces** $$V_{out}$$ — the only question is by how much.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "Imagine the slider of a potentiometer is slowly moved from the bottom of the wire to the top. Describe what happens to (a) the total circuit current, and (b) $$V_{out}$$.", "answer": "- Step 1: (a) The total resistance of the wire ($$R_1 + R_2 = R_{total}$$) stays **constant** — moving the slider only changes *how* the wire is divided, not its total. So if the load draws no current, the **circuit current stays the same**.\n- Step 2: (b) $$V_{out} = V_{in} \\cdot R_2/R_{total}$$. As the slider rises, $$R_2$$ (the section below the slider) grows from 0 to $$R_{total}$$, so $$V_{out}$$ rises linearly from 0 to $$V_{in}$$.\n- Step 3: This is the defining behaviour: **constant current, continuously variable output**.\n\nSubtle point worth grasping: the potentiometer doesn't waste more energy at different settings — it just redistributes voltage along the wire.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "A student writes \"Vout = Vin × (R1/(R1 + R2))\" for the output voltage across R2. Explain why this is incorrect and state the correct formulation. What is the general rule for which resistor goes in the numerator?", "answer": "- Step 1: The student's formula is inverted. It gives the voltage across R1, not R2. If you want Vout across R2, then R2 must be in the numerator.\n- Step 2: The general rule is: **the resistor whose voltage you are finding goes on top of the fraction**. Think of it as \"the voltage across X is proportional to X's fraction of the total resistance.\"\n- Quick check: If R2 = 0 Ω, there should be 0 V across it. Using R2 in numerator: Vout = Vin × 0/(R1+0) = 0 ✓. Using R1 in numerator: Vout = Vin × R1/(R1+0) = Vin ✗\n\nThis is one of the most common exam errors—always identify which resistor your output is across before substituting.", "source": "MiniMax ②", "_id": "minimax_2_2"}, {"question": "Why must you always check the *position* of the sensor (top vs bottom) before predicting the direction of $$V_{out}$$ — what common misconception does this prevent?", "answer": "- Step 1: The misconception: \"thermistor heats up → $$V_{out}$$ goes up\" stated as a universal rule. It is **not** universal.\n- Step 2: The truth: the direction of $$V_{out}$$ change depends on **which resistor's voltage you're calling $$V_{out}$$**.\n+ If $$V_{out}$$ is across the thermistor itself, heating drops $$V_{out}$$ (because $$R_{th}$$ drops).\n+ If $$V_{out}$$ is across the *other* (fixed) resistor, heating raises $$V_{out}$$ (because more of the supply is \"left over\" for it).\n- Step 3: Always do two checks: (1) which resistor is the sensor (top/bottom)? (2) which resistor is $$V_{out}$$ measured across? Then apply $$V \\propto R$$ in series.\n\nThis is the single biggest exam trap in sensor-divider questions.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Why is the \"baseline equation\" $$V_{in}/(R_1+R_2) = V_1/R_1 = V_2/R_2$$ called that, and what makes it more fundamental than the standard divider formula?", "answer": "It's called \"baseline\" because every divider equation can be derived from it — it's the foundational statement that the same current $$I$$ flows through all three \"resistances\" (the total $$R_1+R_2$$, $$R_1$$ alone, and $$R_2$$ alone). Each fraction equals $$I$$. The standard formula $$V_{out} = V_{in} \\cdot R_2/(R_1+R_2)$$ is just one rearrangement (equating the first and third fractions and solving for $$V_2$$). The baseline equation is more fundamental because it makes the underlying physics (constant current) explicit and gives you flexibility: any two of the three fractions can be equated to solve any divider problem.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "Why does the resistance of both an NTC thermistor and an LDR decrease as their respective environmental conditions (temperature and light intensity) increase? What is the microscopic explanation? (2 steps)", "answer": "- Step 1: Both are semiconductor devices. In semiconductors, the number of charge carriers (free electrons) increases with energy input. Higher temperature gives electrons more thermal energy to break free from their atomic bonds. Higher light intensity provides photon energy that also releases charge carriers.\n- Step 2: More charge carriers means easier current flow, which by R = V/I (for fixed V) means lower resistance. This is why they're called \"negative temperature coefficient\" (NTC) for thermistors—the coefficient of resistance with temperature is negative.\n\nThis semiconductor behavior distinguishes them from metal conductors, where resistance increases with temperature (positive temperature coefficient).", "source": "MiniMax ②", "_id": "minimax_2_10"}, {"question": "In a potential divider, a thermistor is the **bottom** resistor (output across the thermistor) and a fixed resistor is on top. When temperature increases, does $$V_{out}$$ increase or decrease? Walk through the full chain. (4 steps)", "answer": "- Step 1: Temperature increases → NTC thermistor resistance **decreases** ($$R_{th}$$ decreases).\n\n- Step 2: Since $$V \\propto R$$ (same current in series), the thermistor's reduced resistance means it claims a **smaller fraction** of the supply voltage. So $$V_{th}$$ **decreases**.\n\n- Step 3: By KVL: $$V_R = V_{in} - V_{th}$$. Since $$V_{th}$$ decreased, the voltage across the fixed resistor $$V_R$$ **increases**.\n\n- Step 4: Since the output is taken across the thermistor ($$V_{out} = V_{th}$$), and $$V_{th}$$ decreased, **$$V_{out}$$ decreases**.\n\n+ Critical comparison: the same temperature increase causes **opposite** effects on $$V_{out}$$ depending on which position the thermistor occupies! When thermistor is on top: ↑T → ↑$$V_{out}$$. When thermistor is on bottom: ↑T → ↓$$V_{out}$$. **Always read the circuit first.**", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "Edge case: In a potential divider, what happens to $$V_{out}$$ if $$R_1 = 0$$ (the top resistor is replaced by a wire)? What if $$R_2 = 0$$ (the bottom resistor is a wire)? (3 steps)", "answer": "- Step 1: If $$R_1 = 0$$: the formula gives $$V_{out} = V_{in} \\cdot \\frac{R_2}{0 + R_2} = V_{in}$$. The entire supply voltage appears across $$R_2$$. This makes sense — with zero resistance on top, no voltage is dropped there, so all of $$V_{in}$$ appears at the output.\n\n- Step 2: If $$R_2 = 0$$: the formula gives $$V_{out} = V_{in} \\cdot \\frac{0}{R_1 + 0} = 0$$. The output is zero because the bottom is a short circuit — all the voltage is dropped across $$R_1$$ and none across the zero-resistance bottom.\n\n- Step 3: These limiting cases confirm the physical intuition: voltage divides in proportion to resistance. Zero resistance gets zero voltage; all the resistance gets all the voltage (in a two-resistor divider).\n\n+ Warning: in practice, $$R_1 = 0$$ means very high current ($$I = V_{in}/R_2$$), which could damage the supply or components. The formula is correct but the circuit may not be safe.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "What is the *intuition* behind why loading reduces $$V_{out}$$, expressed in terms of \"stealing current\"? (3 steps)", "answer": "- Step 1: Imagine the unloaded divider in equilibrium — the same current flows through $$R_1$$ and $$R_2$$, splitting the voltage in ratio of resistances.\n- Step 2: Connecting a load $$R_L$$ in parallel with $$R_2$$ opens a new pathway for current to bypass $$R_2$$. The total current drawn from the supply rises because two parallel branches always have lower resistance than one.\n- Step 3: More current through $$R_1$$ means more voltage dropped across $$R_1$$ (by $$V = IR_1$$). By KVL, less voltage remains for the output section. Hence $$V_{out}$$ falls.\n\nThe load \"steals\" current that would otherwise have gone through $$R_2$$ alone, redistributing the voltage in favour of $$R_1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "A student connects a voltmeter (as a load) across the output of a potential divider and observes that Vout drops significantly. The student says \"the voltmeter is using up some of the voltage.\" Explain why this statement is misleading and what is actually happening in terms of circuit behavior. (2 steps)", "answer": "- Step 1: A voltmeter doesn't \"use\" voltage—it draws a small current to measure potential difference. However, any load (including a voltmeter) connected across R2 forms a parallel combination with R2.\n- Step 2: This parallel combination has lower resistance than R2 alone: RBC = (R2 × RL)/(R2 + RL). Lower bottom resistance means the fraction of Vin across it decreases. The apparent \"voltage loss\" is really due to the divider ratio changing because the effective bottom resistance changed. High-resistance voltmeters minimize this effect (that's why digital voltmeters have high input impedance).\n\nThe key misconception: it's not that the voltmeter \"uses\" voltage like a resistor dissipating power—it's that the voltmeter changes the circuit topology itself by creating a parallel branch.", "source": "MiniMax ②", "_id": "minimax_2_11"}, {"question": "In a thermistor-based divider, the thermistor R drops smoothly with temperature (curved, not linear). Will $$V_{out}$$ also vary linearly with temperature? Explain.", "answer": "- Step 1: $$V_{out}$$ depends on $$R_{th}$$ via the divider formula, which is itself a nonlinear function: $$V_{out} = V_{in} R_{th}/(R_1+R_{th})$$ or its complement.\n- Step 2: Even if $$R_{th}(T)$$ were linear in T, the divider formula squishes it into an S-shape (asymptotic at the extremes).\n- Step 3: Combined with the *actual* nonlinear $$R_{th}(T)$$ curve (steep at low T, flattening at high T), $$V_{out}(T)$$ is doubly nonlinear — usefully steep around the \"switching\" point, gently sloped at extremes.\n\nPractical consequence: thermistor circuits are great for **threshold-triggering** (where you don't need linearity), but poor for **linear measurement** without compensation.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "A divider with an LDR is \"ratiometric\" — meaning $$V_{out}$$ depends on the ratio of $$R_{LDR}$$ to other resistances, not absolute values. Why is this useful, and what does it imply about supply voltage stability?", "answer": "- Step 1: The output formula is $$V_{out} = V_{in} \\cdot \\frac{R_{LDR}}{R_1+R_{LDR}}$$. A fluctuation in $$V_{in}$$ scales $$V_{out}$$ proportionally — the *fraction* doesn't depend on $$V_{in}$$.\n- Step 2: So if you're feeding $$V_{out}$$ into a comparator that also references $$V_{in}$$ (e.g. via another divider), the trigger point depends purely on resistance ratios, not on the absolute supply voltage.\n- Step 3: This makes the circuit robust to battery drain or supply fluctuations — a key practical advantage for sensor circuits in real environments.\n\nBut: if the trigger threshold is an absolute voltage (e.g. an op-amp comparator with a fixed reference), then supply variations *do* matter — context matters.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "Comparing a potentiometer (continuously variable) with a sensor divider (thermistor/LDR): both vary $$V_{out}$$, but how do they differ in what \"drives\" the variation?", "answer": "- Step 1: A **potentiometer** is varied by physical user input — the slider position is manually (or mechanically) controlled. The variation is intentional.\n- Step 2: A **sensor divider** is varied by an environmental quantity (temperature, light) acting on the sensor's resistance. The variation is automatic and responds to the world.\n- Step 3: Both produce a variable $$V_{out}$$ from a fixed $$V_{in}$$, but they serve different purposes:\n+ Potentiometer = manual control (volume knob, dimmer).\n+ Sensor divider = automatic sensing (thermostat, light switch).\n\nSame circuit principle (series resistor division), different \"knob\" turning the dial.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "A potentiometer wire is 1.0 m long with total resistance 10 Ω, connected across a 5.0 V supply. The slider is positioned at 70 cm from the top (i.e., 30 cm from the bottom). Calculate Vout across the bottom section using both the resistance-ratio method and the length-ratio method, and verify they give the same answer. (3 steps)", "answer": "- Step 1 (Resistance ratio): The bottom section is 30 cm out of 100 cm = 0.30 of the total length. Since wire is uniform, Rbottom = 0.30 × 10 Ω = 3.0 Ω. Vout = Vin × Rbottom/Rtotal = 5.0 × 3.0/10 = 1.5 V.\n- Step 2 (Length ratio): Vout = Vin × Lbottom/Ltotal = 5.0 × 0.30/1.0 = 1.5 V.\n- Step 3 (Verification): Both methods give 1.5 V. This confirms that for uniform wire, resistance is directly proportional to length, so you can use length ratios directly without calculating actual resistances.\n\nThis equivalence is why potentiometer problems can be solved using length ratios—much faster in exams.", "source": "MiniMax ②", "_id": "minimax_2_21"}, {"question": "In a series circuit, why is \"current is the same everywhere\" independent of whether you draw the circuit as series, parallel, or some hybrid — and what is the more fundamental principle?", "answer": "- Step 1: The deeper principle is **conservation of charge**: at any junction, charge in per second equals charge out per second (Kirchhoff's first law: $$\\Sigma I_{in} = \\Sigma I_{out}$$).\n- Step 2: A series circuit has **no junctions** along its single loop, so the current that enters one component must exit the other — the same value everywhere.\n- Step 3: In a parallel network, junctions exist, and current splits *at the junctions*, but each individual branch still obeys $$I = V/R$$ for itself. Series-vs-parallel is just a structural description; the conservation law is universal.\n\nPhuc's confusion (\"do I need to know series or parallel?\") came from mistaking the consequence for the principle.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "Why is the formula Vout = Vin·(R2/(R1 + R2)) valid only when no load is connected? Explain using Ohm’s Law and Kirchhoff’s Law. (3 steps)", "answer": "- Step 1: No load ⇒ I is the same everywhere:  \n  $$ I = \\frac{V_{in}}{R_1 + R_2} $$.  \n- Step 2: Ohm’s Law for R2:  \n  $$ V_{out} = I R_2 = \\frac{V_{in} R_2}{R_1 + R_2} $$.  \n- Step 3: With a load, RL is in parallel with R2, reducing effective resistance and increasing I. This invalidates the original assumption of constant current.  \n\n> **Key insight:** The formula assumes all current flows through R2. Any diversion (load) breaks this assumption.", "source": "Qwen 3 ②", "_id": "qwen_2_7"}, {"question": "What is the \"rule of thumb\" for ensuring a load resistor does not significantly affect the output voltage of a potential divider? Explain why this rule works using the parallel resistance formula.", "answer": "- Step 1: The rule is RL ≥ 10 × R2 (load resistance should be at least 10 times the output resistor). If R2 = 1 kΩ, use RL ≥ 10 kΩ.\n- Step 2: When R2 and RL are in parallel, the combined resistance is RBC = (R2 × RL)/(R2 + RL). If RL >> R2, then R2 + RL ≈ RL, so RBC ≈ (R2 × RL)/RL = R2. The combined resistance is almost exactly R2—the load has negligible effect.\n- Quick calculation: If RL = 10R2, then RBC = (R2 × 10R2)/(R2 + 10R2) = 10R2²/11R2 = (10/11)R2 ≈ 0.91R2. Only a ~9% reduction. If RL = R2, then RBC = R2/2—a 50% reduction!\n\nThis rule is crucial for sensor circuits: your voltmeter or control circuit must have high enough resistance not to \"load down\" the divider.", "source": "MiniMax ②", "_id": "minimax_2_6"}, {"question": "In a loaded divider with $$R_1 = 5\\,\\text{k}\\Omega$$, $$R_2 = 10\\,\\text{k}\\Omega$$, supply $$9\\,\\text{V}$$, and a load $$R_L = 30\\,\\text{k}\\Omega$$ across $$R_2$$: conceptually walk through how $$V_{out}$$ compares with the unloaded case (no exact numbers needed). (4 steps)", "answer": "- Step 1: Unloaded: $$V_{out} = 9 \\cdot \\frac{10}{15} = 6\\,\\text{V}$$ (since $$R_2$$ is two-thirds of total).\n- Step 2: Loaded: $$R_L = 30\\,\\text{k}\\Omega$$ is only $$3\\times R_2$$ — **below** the rule-of-thumb $$10\\times$$, so loading effect is **noticeable**.\n- Step 3: Parallel combo $$R_{BC} = \\frac{10 \\cdot 30}{10 + 30} = 7.5\\,\\text{k}\\Omega$$ — bottom resistance shrinks by 25%.\n- Step 4: New $$V_{out} = 9 \\cdot \\frac{7.5}{12.5} = 5.4\\,\\text{V}$$ — a drop of $$0.6\\,\\text{V}$$ from $$6\\,\\text{V}$$.\n\nLesson: a load that's \"only\" $$3\\times R_2$$ already cuts $$V_{out}$$ by $$\\sim 10\\%$$ — small loading violations have visible consequences.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "Derive the potential divider output formula from first principles, starting from Kirchhoff and Ohm's laws. (4 steps)", "answer": "- Step 1: Apply Kirchhoff's second law (KVL): the supply $$V_{in}$$ equals the sum of voltage drops, so $$V_{in} = V_1 + V_2$$.\n- Step 2: Use the series-current insight: $$I = \\frac{V_{in}}{R_1 + R_2}$$ — the single current flowing everywhere.\n- Step 3: The voltage across $$R_2$$ (taken as the output) is from Ohm's law: $$V_{out} = IR_2 = \\frac{V_{in}}{R_1+R_2} \\cdot R_2$$.\n- Step 4: Rearrange to the standard form: $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_1 + R_2}$$.\n\nKey insight: the resistor whose voltage you want sits in the **numerator**; the **total** resistance sits in the denominator.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "What is the difference between Kirchhoff's First Law and Kirchhoff's Second Law, and which one underlies the potential-divider formula?", "answer": "**Kirchhoff's First Law (current):** at any junction, $$\\sum I_{in} = \\sum I_{out}$$ — conservation of charge. **Kirchhoff's Second Law (voltage):** around any closed loop, $$\\sum \\varepsilon = \\sum V$$ — conservation of energy per charge. The divider formula relies primarily on the *Second* Law (the sum of $$V_1 + V_2$$ equals $$V_{in}$$, so they share the supply), combined with the fact that the same current flows through both (which is just topology — no junctions in a simple series loop, so the First Law is trivially satisfied).", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "A common misconception: a student says \"the load is in series with $$R_2$$, so the total resistance increases.\" Explain why this is wrong and what the correct configuration is. (3 steps)", "answer": "- Step 1: The load $$R_L$$ is connected **across** $$R_2$$ — meaning one end of $$R_L$$ connects to the same node as the top of $$R_2$$, and the other end connects to the same node as the bottom of $$R_2$$. This is the definition of a **parallel** connection, not series.\n\n- Step 2: In parallel, the combined resistance is:\n$$R_{BC} = \\frac{R_2 \\cdot R_L}{R_2 + R_L}$$\nThis is always less than $$R_2$$ (adding another path for current always reduces the total resistance between two nodes).\n\n- Step 3: If the load were in series (which it is not), the total resistance would indeed increase. But physically, the load is tapping off the output voltage — it must be connected across $$R_2$$ to \"see\" that voltage. It cannot be in series with $$R_2$$ and still measure the voltage across it.\n\n+ Think of it like plugging a device into a wall socket: the device goes in parallel with the mains, not in series. Same principle here.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "Why is the voltage drop across a series resistor (in a sensor divider) often plotted vs the environmental variable, rather than the sensor's voltage itself?", "answer": "- Step 1: In trigger circuits, the *control* signal often needs to **rise** with the environmental stimulus (e.g. heating should raise a signal to turn on a fan).\n- Step 2: If the sensor is NTC (resistance falls with stimulus), the sensor's own voltage *falls* — wrong direction for a \"rising trigger.\" But the fixed resistor's voltage *rises* — the right direction.\n- Step 3: So engineers plot $$V_{fixed}$$ (or $$V_{out}$$ across the non-sensor) when they want a stimulus-rising signal. This is purely a design convention dictated by the comparator/switch downstream.\n\nThe choice of *which* voltage to call $$V_{out}$$ encodes the desired polarity of the response.\n\n## JARGON TABLE\n\n| | What does it mean? |\n| --- | --- |\n| **Core Concepts** | |\n| Potential divider | Two resistors in series across a supply; the supply p.d. is shared in proportion to the resistances, allowing a chosen $$V_{out}$$ to be tapped off. |\n| Output voltage ($$V_{out}$$) | The voltage tapped off across one of the divider's resistors, used to drive or trigger another circuit. |\n| Input voltage ($$V_{in}$$) | The supply voltage across the entire series divider. |\n| Series circuit | Single-loop circuit; current is the same through every component; voltages add to the supply. |\n| Voltage ratio rule | $$V_1/V_2 = R_1/R_2$$ — voltages split in the ratio of resistances when current is the same. |\n| Baseline equation | $$V_{in}/(R_1+R_2) = V_1/R_1 = V_2/R_2$$, where each fraction equals the common series current. |\n| **Potentiometer** | |\n| Potentiometer | Single 3-terminal component (resistive wire + sliding contact) acting as a continuously variable divider; $$V_{out}$$ ranges from 0 to $$V_{in}$$. |\n| Sliding contact (slider) | The movable tap on a potentiometer that divides the resistive track into two effective resistors $$R_1$$ and $$R_2$$. |\n| Rheostat | Two-terminal variable resistor used to control current in series; less effective at delivering wide voltage range than a potentiometer. |\n| Uniform resistance wire | Wire of constant cross-section/material where $$R \\propto L$$, so divider ratios equal length ratios. |\n| **Loaded Divider** | |\n| Load resistor ($$R_L$$) | A component (device) connected across $$R_2$$ to draw the output voltage; in *parallel* with $$R_2$$. |\n| Loading effect | The reduction in $$V_{out}$$ caused by adding a load — the parallel combination $$R_2 \\parallel R_L < R_2$$. |\n| Unloaded divider | A divider with no current drawn at the output (or load $$\\gg R_2$$); $$V_{out}$$ follows the basic formula exactly. |\n| $$R_L \\geq 10R_2$$ rule | Rule of thumb to keep loading effect small — load resistance at least 10× the output resistor. |\n| Output impedance | Effective source resistance seen by the load (≈ $$R_1 \\parallel R_2$$); determines how much loading distorts the output. |\n| **Sensor Components** | |\n| NTC thermistor | \"Negative Temperature Coefficient\" thermistor — semiconductor whose resistance **decreases** as temperature rises (more thermal carriers freed). |\n| LDR (Light-Dependent Resistor) | Semiconductor whose resistance **decreases** as light intensity rises (photons free more carriers). |\n| Sensor sub-circuit | A potential divider where one resistor is replaced by a sensor (thermistor/LDR); $$V_{out}$$ varies with environment. |\n| Sensor position (top/bottom) | Whether the sensor is $$R_1$$ or $$R_2$$ — determines the direction of $$V_{out}$$ change with environment. |\n| Trigger / switching point | The environmental value (e.g. light level, temperature) at which $$V_{out}$$ crosses a threshold to activate a downstream switch. |\n| **Underlying Laws** | |\n| Ohm's law | $$V = IR$$ — rearranged as $$I = V/R$$ or $$R = V/I$$. Never $$R = IV$$. |\n| Kirchhoff's 1st law (KCL) | Sum of currents into a junction = sum of currents out (charge conservation). |\n| Kirchhoff's 2nd law (KVL) | Sum of EMFs around a closed loop = sum of voltage drops (energy conservation). |\n| $$V \\propto R$$ (series) | Direct consequence of constant current in series — bigger R gets bigger voltage share. |\n\n## FORMULA TABLE\n\n| $$LHS = ?$$ | Answer | Name / Hint |\n| --- | --- | --- |\n| **Basic Divider** | | |\n| $$V_{out} = ?$$ | $$= V_{in} \\cdot \\frac{R_2}{R_1+R_2}$$ | Potential divider formula ($$V_{out}$$ across $$R_2$$); resistor whose voltage you want goes on top |\n| $$V_1/V_2 = ?$$ | $$= R_1/R_2$$ | Voltage ratio = resistance ratio (series) |\n| $$I = ?$$ | $$= V_{in}/(R_1+R_2)$$ | Series current — same everywhere |\n| $$V_{in}/(R_1+R_2) = ?$$ | $$= V_1/R_1 = V_2/R_2$$ | Baseline equation; each fraction = common current |\n| $$V_1 + V_2 = ?$$ | $$= V_{in}$$ | Kirchhoff's voltage law for the divider loop |\n| **Potentiometer (uniform wire)** | | |\n| $$V_{out} = ?$$ | $$= V_{in} \\cdot \\frac{L_2}{L_{total}}$$ | Output proportional to length of lower section |\n| $$R = ?$$ (uniform wire) | $$= \\rho L/A \\;\\;(R \\propto L)$$ | Resistance proportional to length |\n| **Loaded Divider** | | |\n| $$R_{BC} = ?$$ | $$= \\frac{R_2 R_L}{R_2+R_L}$$ | Parallel combination of $$R_2$$ and load |\n| $$V_{out,\\,loaded} = ?$$ | $$= V_{in} \\cdot \\frac{R_{BC}}{R_1+R_{BC}}$$ | Loaded output voltage |\n| $$R_L \\geq ?$$ | $$\\geq 10 R_2$$ | Rule of thumb to minimise loading effect |\n| **Ohm & Kirchhoff (background)** | | |\n| $$V = ?$$ | $$= IR$$ | Ohm's law |\n| $$\\Sigma I_{in} = ?$$ | $$= \\Sigma I_{out}$$ | Kirchhoff's current law (junction) |\n| $$\\Sigma \\varepsilon = ?$$ | $$= \\Sigma V_{drop}$$ | Kirchhoff's voltage law (loop) |\n| **Sensor Direction Rules** | | |\n| For NTC thermistor: $$\\uparrow T \\Rightarrow$$ | $$\\downarrow R_{th}$$ | More thermal carriers freed |\n| For LDR: $$\\uparrow \\text{light} \\Rightarrow$$ | $$\\downarrow R_{LDR}$$ | More photo-generated carriers |\n| Sensor on bottom, $$V_{out}$$ across it: $$\\downarrow R_{sensor} \\Rightarrow$$ | $$\\downarrow V_{out}$$ | $$V \\propto R$$ in series |\n| Sensor on top, $$V_{out}$$ across bottom fixed R: $$\\downarrow R_{sensor} \\Rightarrow$$ | $$\\uparrow V_{out}$$ | Less voltage dropped across sensor leaves more for fixed R |", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Suppose you connect a load across the lower half of a potentiometer that's set near the top of its travel (so $$R_2 \\approx R_{total}$$). Will the loading effect be more or less severe than if the slider were near the middle, and why?", "answer": "- Step 1: Loading severity depends on the ratio $$R_L / R_2$$. The smaller this ratio, the more $$V_{out}$$ drops.\n- Step 2: When the slider is near the **top**, $$R_2$$ is large (≈ $$R_{total}$$). So for a given $$R_L$$, the ratio $$R_L/R_2$$ is small ⇒ stronger loading effect.\n- Step 3: When the slider is near the **middle**, $$R_2$$ is smaller, so $$R_L/R_2$$ is larger ⇒ less loading distortion.\n\nCounterintuitive design implication: high $$V_{out}$$ settings on a potentiometer are *more* vulnerable to load disturbance than low settings.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Why is the answer to \"what happens to $$V_{out}$$ when the load is removed?\" the unloaded divider value, and why is this practically important?", "answer": "Removing the load means $$R_L \\to \\infty$$, so the parallel combination $$R_2 \\| R_L \\to R_2$$ and the circuit reduces to the original two-resistor divider. $$V_{out}$$ returns to $$V_{in} \\cdot R_2/(R_1+R_2)$$. This matters practically because when you design a divider for a specific output voltage (e.g. 5 V for a sensor reference), you must consider whether the downstream component will load it. If the load is light (high resistance), the design value holds; if heavy (low resistance), you must redesign with the loaded equations or buffer the output (e.g. with an op-amp). This is why real-world dividers often have buffers between them and the next stage.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "For a street-light circuit using an LDR, where would you place the LDR (top or bottom of the divider) so that $$V_{out}$$ *rises* when night falls, and why?", "answer": "- Step 1: We want $$V_{out}$$ to rise as light intensity falls, so we can use $$V_{out}$$ to trigger the lamp on.\n- Step 2: At night, $$R_{LDR}$$ becomes large. If the LDR is on **top**, the formula $$V_{out} = V_{in}\\cdot \\frac{R_{fixed}}{R_{LDR}+R_{fixed}}$$ gives a *smaller* output (more drop across LDR) — wrong direction.\n- Step 3: If the LDR is on the **top** but $$V_{out}$$ is taken across the LDR itself, or equivalently the LDR is the **bottom** resistor with $$V_{out}$$ across it — then $$V_{out} = V_{in}\\cdot\\frac{R_{LDR}}{R_{LDR}+R_{fixed}}$$, which **increases** as $$R_{LDR}$$ grows.\n\nDesign rule: **place the sensor so that $$V_{out}$$ is across the sensor itself** when you want $$V_{out}$$ to track the sensor's resistance directly.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "Why is it critical to identify the **position** of the sensor (top or bottom) in a divider before reasoning about how $$V_{out}$$ changes? Give a concrete example showing how the same environmental change can produce opposite effects. (3 steps)", "answer": "- Step 1: The direction of $$V_{out}$$ change depends on both (a) whether the sensor's resistance increases or decreases, AND (b) whether the output is taken across the sensor or across the other resistor. The position determines which voltage you're reading.\n\n- Step 2: Example: temperature increases → thermistor resistance decreases.\n+ If thermistor is on the **bottom** (output across thermistor): ↓$$R_{th}$$ → ↓$$V_{th}$$ → $$V_{out}$$ **decreases**.\n+ If thermistor is on the **top** (output across fixed resistor): ↓$$R_{th}$$ → ↓$$V_{th}$$ → ↑$$V_R$$ → $$V_{out}$$ **increases**.\n\n- Step 3: Same temperature increase, opposite effect on $$V_{out}$$! This is why the guide emphasises: \"Always read the circuit to identify which position the sensor occupies before reasoning about direction.\" Getting the position wrong guarantees a wrong answer.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "Suppose someone claims \"a potentiometer can deliver more voltage than the supply if you slide it past the top.\" Why is this impossible?", "answer": "- Step 1: The potentiometer is purely a passive resistor network — it cannot add energy. By Kirchhoff's voltage law, the sum of voltage drops around the loop equals the supply EMF.\n- Step 2: The slider can only tap off a fraction of the total wire's voltage drop. At its uppermost position, $$R_2 = R_{total}$$, giving $$V_{out} = V_{in}$$. There's no \"past the top\" — the wire ends there.\n- Step 3: To exceed $$V_{in}$$ would require boosting (e.g. a transformer or DC-DC converter), which involves active components, not just resistors.\n\nEnergy conservation forbids passive voltage gain — the divider can only redistribute, never amplify.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "Synthesis question: A designer wants a potential divider that outputs approximately 3 V from a 9 V supply, and this output must remain stable when a 100 kΩ load is connected. Should they choose (a) $$R_1 = 1\\text{ k}\\Omega, R_2 = 500\\,\\Omega$$ or (b) $$R_1 = 100\\text{ k}\\Omega, R_2 = 50\\text{ k}\\Omega$$? Both give ~3 V unloaded. Explain which is better and why. (4 steps)", "answer": "- Step 1: Both options give the same unloaded $$V_{out}$$ because the ratio $$R_2/(R_1+R_2)$$ is the same (1/3 in both cases): $$V_{out} = 9 \\times 1/3 = 3\\text{ V}$$.\n\n- Step 2: Now check the loading effect. For option (a), $$R_L = 100\\text{ k}\\Omega$$ vs $$R_2 = 500\\,\\Omega$$. The ratio is $$R_L/R_2 = 200$$. This far exceeds the 10× rule — loading effect is negligible. $$R_{BC} \\approx 500\\,\\Omega$$.\n\n- Step 3: For option (b), $$R_L = 100\\text{ k}\\Omega$$ vs $$R_2 = 50\\text{ k}\\Omega$$. The ratio is $$R_L/R_2 = 2$$. This is well below the 10× rule — significant loading. $$R_{BC} = 50 \\times 100 / 150 \\approx 33\\text{ k}\\Omega$$, noticeably less than 50 kΩ.\n\n- Step 4: **Option (a) is better.** Lower divider resistances mean the load is large relative to $$R_2$$, so the output remains stable. Higher divider resistances (option b) save power but make the output sensitive to loading.\n\n+ Design trade-off: low-resistance dividers are more stable under load but waste more power ($$I = V_{in}/(R_1+R_2)$$ is larger). High-resistance dividers save power but are easily disturbed by loads. Choose based on your priority.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "Why might you choose to use a thermistor in the *top* position vs the *bottom* position when designing a temperature-triggered switch?", "answer": "- Step 1: The position determines the **direction** of $$V_{out}$$ change. If the switch fires when $$V_{out}$$ exceeds a threshold, you must place the sensor so the desired environmental change *raises* $$V_{out}$$.\n- Step 2: **Thermistor on top**: $$\\uparrow T \\Rightarrow \\downarrow R_{th} \\Rightarrow \\uparrow V_{out}$$ (across bottom fixed R). Use this to trigger on *heat* (e.g. fire alarm).\n- Step 3: **Thermistor on bottom** (output across thermistor): $$\\uparrow T \\Rightarrow \\downarrow R_{th} \\Rightarrow \\downarrow V_{out}$$. Use this when you want $$V_{out}$$ to *fall* with heat, or to trigger on cold.\n\nDesign principle: position = polarity. The circuit topology encodes which environmental direction triggers the switch.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What is the fundamental purpose of a potential divider circuit, and what is its simplest component configuration?", "answer": "A potential divider is designed to split (divide) a supply voltage into smaller, specific voltages to provide a desired output voltage ($$V_{out}$$) for another part of a circuit. Its simplest configuration consists of two resistors connected in series across a voltage supply.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "In a potential divider with two resistors in series, why is the voltage across each resistor directly proportional to its resistance? (2 steps)", "answer": "- Step 1: In a series circuit, the current $$I$$ is the same everywhere. This means the exact same current flows through both resistors, regardless of their individual resistance values.\n- Step 2: According to Ohm's Law, $$V = IR$$. Since $$I$$ is constant for both resistors, the voltage $$V$$ across a resistor depends entirely on its resistance $$R$$. A larger resistance will have a larger voltage drop across it, making voltage directly proportional to resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Derive the formula for the output voltage $$V_{out}$$ across resistor $$R_2$$ in a series potential divider with supply voltage $$V_{in}$$ and resistors $$R_1$$ and $$R_2$$. (3 steps)", "answer": "- Step 1: Calculate the current flowing through the series circuit. The total resistance is $$R_1 + R_2$$, so by Ohm's Law, the current is $$I = \\frac{V_{in}}{R_1 + R_2}$$.\n- Step 2: Apply Ohm's Law to the specific resistor $$R_2$$ where the output voltage is taken. The voltage across it is $$V_{out} = I \\times R_2$$.\n- Step 3: Substitute the expression for $$I$$ from Step 1 into Step 2: $$V_{out} = \\left(\\frac{V_{in}}{R_1 + R_2}\\right) \\times R_2 = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "When using the potential divider formula $$V_{out} = V_{in} \\times \\frac{R_{out}}{R_1 + R_2}$$, how do you decide which resistance goes in the numerator $$R_{out}$$?", "answer": "The resistor whose voltage you are trying to find (the one across which the output is taken) ALWAYS goes in the numerator. If you want the voltage across the top resistor, put $$R_1$$ on top; if you want the voltage across the bottom resistor, put $$R_2$$ on top.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A potential divider has a 9 V supply across a 3 kΩ resistor and a 6 kΩ resistor in series. Without a calculator, what is the voltage across the 6 kΩ resistor? (2 steps)", "answer": "- Step 1: Determine the ratio of the target resistor to the total resistance. The total resistance is $$3\\text{ k}\\Omega + 6\\text{ k}\\Omega = 9\\text{ k}\\Omega$$. The 6 kΩ resistor represents $$\\frac{6}{9} = \\frac{2}{3}$$ of the total resistance.\n- Step 2: Apply the principle that voltage is proportional to resistance. The 6 kΩ resistor takes $$\\frac{2}{3}$$ of the supply voltage, so $$V_{out} = \\frac{2}{3} \\times 9\\text{ V} = 6\\text{ V}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "State the relationship between the voltage ratio and the resistance ratio for two resistors in series.", "answer": "For two resistors $$R_1$$ and $$R_2$$ in series, the ratio of the voltages across them is equal to the ratio of their resistances: $$\\frac{V_1}{V_2} = \\frac{R_1}{R_2}$$. This means if one resistor is twice as large as the other, it will have twice the voltage across it.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "What is a potentiometer, and what key advantage does it offer over using a variable resistor (rheostat) in series for controlling voltage? (2 steps)", "answer": "- Step 1: A potentiometer is a single component with three terminals (a resistive track and a sliding contact) that acts as a continuously variable potential divider.\n- Step 2: The key advantage is its output range. A potentiometer can vary $$V_{out}$$ continuously from 0 V up to the full supply voltage $$V_{in}$$. A rheostat in series with a load cannot reduce the voltage across the load to 0 V because there is always some minimum resistance in the circuit keeping the current flowing.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "In a potentiometer circuit, moving the sliding contact downwards decreases the length (and resistance) of the lower section. What happens to the output voltage $$V_{out}$$ taken across this lower section, and why? (2 steps)", "answer": "- Step 1: The output voltage is given by $$V_{out} = V_{in} \\times \\frac{R_{lower}}{R_{total}}$$. Moving the slider down decreases $$R_{lower}$$.\n- Step 2: Because $$R_{lower}$$ is in the numerator, decreasing it decreases the fraction of $$V_{in}$$ that is dropped across the lower section. Therefore, $$V_{out}$$ decreases.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "A uniform resistance wire of total length 100 cm is connected to a 10 V supply. A sliding contact is placed 30 cm from the top. What is the output voltage across the bottom section of the wire? (3 steps)", "answer": "- Step 1: Find the length of the bottom section. If the total length is 100 cm and the top section is 30 cm, the bottom section is $$100\\text{ cm} - 30\\text{ cm} = 70\\text{ cm}$$.\n- Step 2: In a uniform wire, resistance is directly proportional to length. Therefore, the bottom section represents $$\\frac{70}{100} = \\frac{7}{10}$$ of the total resistance.\n- Step 3: Calculate the output voltage using the divider principle. $$V_{out} = \\frac{7}{10} \\times 10\\text{ V} = 7\\text{ V}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "What is a \"loaded divider,\" and what immediate effect does connecting a load have on the output voltage? (2 steps)", "answer": "- Step 1: A loaded divider is a potential divider where a load resistor (representing a component or sub-circuit) is connected across the output, in parallel with the bottom resistor $$R_2$$.\n- Step 2: The immediate effect is that the output voltage $$V_{out}$$ decreases compared to the unloaded state.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Explain conceptually why connecting a load resistor $$R_L$$ across the output resistor $$R_2$$ of a potential divider causes the output voltage to drop. (3 steps)", "answer": "- Step 1: Connecting $$R_L$$ across $$R_2$$ creates a parallel combination. The effective resistance of two resistors in parallel is always less than the smallest individual resistor, so the effective bottom resistance decreases.\n- Step 2: With a lower total circuit resistance, the current flowing from the supply increases. This increased current flows through the top resistor $$R_1$$, increasing the voltage drop across it ($$V_1 = I \\times R_1$$).\n- Step 3: By Kirchhoff's Voltage Law, $$V_{in} = V_1 + V_{out}$$. Since $$V_1$$ has increased, $$V_{out}$$ must decrease to maintain the total equal to $$V_{in}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "What is the rule of thumb for choosing a load resistance $$R_L$$ to minimize the loading effect on a potential divider, and what is the underlying reason? (2 steps)", "answer": "- Step 1: The rule of thumb is that the load resistance should be at least 10 times greater than the output resistance ($$R_L \\ge 10 R_2$$).\n- Step 2: The reason is that when $$R_L$$ is much larger than $$R_2$$, it draws very little current from the divider. The parallel combination $$R_2 \\parallel R_L$$ remains very close in value to $$R_2$$, keeping the output voltage nearly unchanged from the unloaded value.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "A divider has a 5 kΩ resistor on top and a 10 kΩ resistor on the bottom, connected to a 9 V supply. A 10 kΩ load is connected across the bottom resistor. Qualitatively, how does the new output voltage compare to the unloaded output voltage, and what is the approximate effective resistance of the bottom section? (2 steps)", "answer": "- Step 1: Calculate the effective resistance of the bottom section. The 10 kΩ load is in parallel with the 10 kΩ bottom resistor. Two identical resistors in parallel have exactly half the resistance of one, so the effective resistance is $$5\\text{ k}\\Omega$$.\n- Step 2: Compare to the unloaded state. Unloaded, the bottom was 10 kΩ out of a total of 15 kΩ, taking a large share of the voltage. Loaded, the bottom is now only 5 kΩ out of a total of 10 kΩ ($$5\\text{ k}\\Omega + 5\\text{ k}\\Omega$$), meaning it takes exactly half the supply voltage. The output voltage has decreased compared to the unloaded state.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "What does \"NTC\" stand for in the context of a thermistor, and how does its resistance respond to an increase in temperature? (2 steps)", "answer": "- Step 1: \"NTC\" stands for Negative Temperature Coefficient.\n- Step 2: This means that as the temperature increases, the resistance of the thermistor decreases. Physically, electrons gain thermal energy and can flow more easily, reducing resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A potential divider has an NTC thermistor at the top (R1) and a fixed resistor at the bottom (R2). The output is taken across R2. If the temperature increases, what happens to the output voltage, and why? (3 steps)", "answer": "- Step 1: As temperature increases, the resistance of the NTC thermistor ($$R_1$$) decreases.\n- Step 2: Because the total series resistance decreases, the current in the circuit increases.\n- Step 3: The output voltage is across the fixed resistor $$R_2$$, so $$V_{out} = I \\times R_2$$. Since $$I$$ has increased and $$R_2$$ is constant, $$V_{out}$$ increases. Alternatively: $$R_1$$ takes a smaller share of the voltage, so $$R_2$$ takes a larger share.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "A potential divider has an NTC thermistor at the bottom (R2) and a fixed resistor at the top (R1). The output is taken across the thermistor. If the temperature increases, what happens to the output voltage? (2 steps)", "answer": "- Step 1: As temperature increases, the resistance of the NTC thermistor ($$R_2$$) decreases.\n- Step 2: Since voltage is proportional to resistance in a series circuit ($$V \\propto R$$), a decrease in the thermistor's resistance means the voltage across it (the output voltage) also decreases.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "In a 3-mark exam question asking you to \"state and explain\" the change in voltage across a fixed resistor when a thermistor's temperature changes, what three distinct steps must your answer include?", "answer": "- Step 1: State the direction of the sensor's resistance change (e.g., \"As temperature increases, the resistance of the thermistor decreases\").\n- Step 2: State the direction of the voltage change across the sensor and briefly why (e.g., \"Since $$V \\propto R$$ for the same current, the voltage across the thermistor decreases\").\n- Step 3: State the direction of the voltage change across the other resistor, citing Kirchhoff's Voltage Law (e.g., \"By KVL, the total voltage is shared, so if the thermistor's voltage decreases, the voltage across the fixed resistor must increase\").", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "How does the resistance of a Light Dependent Resistor (LDR) change as light intensity increases, and what is the physical consequence for the voltage across it in a series divider?", "answer": "As light intensity increases, the resistance of an LDR decreases. In a series potential divider, because voltage is proportional to resistance, a decrease in the LDR's resistance leads to a decrease in the voltage across it.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "A street lamp is designed to turn on at dusk using an LDR in a potential divider. The LDR is at the bottom of the divider, and the output voltage across the LDR triggers the lamp. Explain the chain of events that causes the lamp to turn on as daylight fades. (3 steps)", "answer": "- Step 1: At dusk, light intensity decreases, which causes the resistance of the LDR to increase.\n- Step 2: Because voltage is proportional to resistance in a series circuit, the increased resistance of the LDR means it takes a larger share of the supply voltage.\n- Step 3: Therefore, the output voltage across the LDR increases, reaching the threshold required to trigger the lamp circuit and turn the street lamp on.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A student sets up a divider and measures the output voltage. They then connect a voltmeter with very low resistance across the output. Will the voltmeter reading be accurate? Explain your reasoning. (2 steps)", "answer": "- Step 1: No, the reading will not be accurate; it will read significantly lower than the true unloaded voltage.\n- Step 2: A voltmeter with low resistance acts as a heavy load in parallel with the output resistor. This drastically reduces the effective resistance of the bottom section, causing the output voltage to drop (the \"loaded divider\" effect). An ideal voltmeter has infinite resistance to avoid drawing any current.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "A student writes Ohm's Law as $$R = IV$$. Why is this incorrect, and what is the correct rearrangement? (2 steps)", "answer": "- Step 1: It is incorrect because it mathematically implies that resistance increases if either current or voltage increases, which contradicts the definition of resistance as a property of the component (for an ohmic conductor at constant temperature).\n- Step 2: The correct form is $$V = IR$$ (mnemonic: \"Very Itchy Rash\"). Rearranging for resistance gives $$R = \\frac{V}{I}$$, and for current gives $$I = \\frac{V}{R}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "The \"baseline equation\" for a potential divider is written as $$\\frac{V_{in}}{R_1 + R_2} = \\frac{V_1}{R_1} = \\frac{V_2}{R_2}$$. What fundamental principle of series circuits makes all three of these fractions equal? (2 steps)", "answer": "- Step 1: In a series circuit, the current $$I$$ is the same at all points; there are no junctions for current to split.\n- Step 2: By Ohm's Law, $$I = \\frac{V}{R}$$. Therefore, the current through the whole circuit is $$\\frac{V_{in}}{R_1 + R_2}$$, the current through $$R_1$$ is $$\\frac{V_1}{R_1}$$, and the current through $$R_2$$ is $$\\frac{V_2}{R_2}$$. Since all three currents are identical, all three fractions are equal.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "A potential divider uses an LDR at the bottom and a fixed resistor at the top. The output is taken across the LDR. If light intensity suddenly increases, what happens to the voltage across the fixed resistor? (2 steps)", "answer": "- Step 1: If light intensity increases, the resistance of the LDR decreases.\n- Step 2: By Kirchhoff's Voltage Law, the voltage across the fixed resistor plus the voltage across the LDR must equal the supply voltage. Since the LDR's resistance has decreased, its voltage share decreases, meaning the voltage across the fixed resistor must increase to compensate.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A student wants to vary the voltage across a 100 Ω resistor from 0 V to 6 V using a 6 V battery and a variable resistor. Should they connect the variable resistor in series with the 100 Ω resistor, or use it as a potentiometer in a divider? Explain why. (2 steps)", "answer": "- Step 1: They should use the variable resistor as a potentiometer in a potential divider arrangement.\n- Step 2: If connected in series (as a rheostat), even with the variable resistor set to 0 Ω, the voltage across the 100 Ω resistor would be 6 V. As the variable resistor increases, the voltage across the 100 Ω resistor drops, but it can never reach 0 V because there is always the 100 Ω resistance in the circuit. A potentiometer allows the voltage to be continuously varied from 0 V to the full 6 V.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "In a loaded divider, the load resistor $$R_L$$ is connected across the bottom resistor $$R_2$$. A student mistakenly treats $$R_L$$ as being in series with $$R_2$$. How would this mistake affect their calculation of the output voltage? (2 steps)", "answer": "- Step 1: If treated as series, the student would add the resistances ($$R_2 + R_L$$), making the effective bottom resistance much larger than $$R_2$$.\n- Step 2: This would lead them to calculate a much higher output voltage than reality. In reality, $$R_L$$ is in parallel with $$R_2$$, which reduces the effective bottom resistance and thus reduces the output voltage.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}], "count": 25}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A circuit has two resistors connected in series across a supply voltage. What is this arrangement called, and what is its fundamental purpose? (2 steps)", "answer": "- Step 1: This arrangement is called a **potential divider**. It consists of exactly two resistors ($$R_1$$ and $$R_2$$) connected in series across a supply voltage $$V_{in}$$. The supply p.d. is shared (divided) between the two resistors in proportion to their resistances.\n\n- Step 2: Its purpose is to produce a specific output voltage $$V_{out}$$ that is a fraction of the input voltage. This $$V_{out}$$ can then be tapped off to power or control another circuit — for example, acting as a trigger or switch. The key idea: you \"divide the potential\" to get the voltage you need.\n\nThink of it as a voltage \"tap\" — you draw off whatever fraction of the supply voltage your downstream circuit requires.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "In a potential divider, why must the current be the same through both resistors? What fundamental circuit law guarantees this? (2 steps)", "answer": "- Step 1: In a series circuit, there are no junctions (no branching points) between the two resistors. Since charge cannot accumulate anywhere in the circuit, the same rate of charge flow must pass through every component.\n\n- Step 2: This is guaranteed by **Kirchhoff's First Law** (conservation of charge): at any point in the circuit, the current entering equals the current leaving. With no junctions between $$R_1$$ and $$R_2$$, there is nowhere for current to split or join — so $$I$$ is identical everywhere.\n\nThis is the critical starting point for the entire potential-divider derivation: because $$I$$ is the same, we can write $$I = V_1/R_1 = V_2/R_2$$ and equate the two.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "Write the \"baseline ratio\" equation that compactly expresses the current relationship in a potential divider. What does each fraction equal? (2 steps)", "answer": "- Step 1: The baseline ratio equation is:\n$$\\frac{V_{in}}{R_1 + R_2} = \\frac{V_1}{R_1} = \\frac{V_2}{R_2}$$\n\n- Step 2: Each fraction equals the common series current $$I$$. The first fraction uses total voltage and total resistance; the second uses the voltage and resistance of $$R_1$$; the third uses the voltage and resistance of $$R_2$$. Since all three equal the same current, they are all equal to each other.\n\nThis is the most versatile setup equation — from it you can derive the potential-divider formula, find any unknown voltage, or find a resistance. Always start a divider problem by writing this ratio.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "In the potential-divider formula $$V_{out} = V_{in} \\times \\frac{R_{?}}{R_1 + R_2}$$, which resistor goes in the numerator — the one on top of the circuit, or the one across which you are measuring the output voltage? (2 steps)", "answer": "- Step 1: The resistor in the numerator is **the one across which you are measuring the output voltage**. It has nothing to do with physical position (\"top\" or \"bottom\") — it is entirely determined by which resistor's voltage you want.\n\n- Step 2: If you want the voltage across $$R_2$$, then $$R_2$$ goes on top. If you want the voltage across $$R_1$$, then $$R_1$$ goes on top. The denominator is always $$R_1 + R_2$$ (the total resistanc
