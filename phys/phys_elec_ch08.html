e).\n\n+ Common trap: students automatically put the bottom resistor in the numerator. This only works if the output is taken across the bottom resistor. Always check: \"Which resistor am I finding the voltage across?\" — that one goes on top.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Starting from Ohm's Law and the fact that current is the same everywhere in a series divider, derive the formula $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_1 + R_2}$$ step by step. (4 steps)", "answer": "- Step 1: The total resistance of the series combination is $$R_1 + R_2$$. By Ohm's Law, the current flowing through the circuit is:\n$$I = \\frac{V_{in}}{R_1 + R_2}$$\n\n- Step 2: This same current flows through $$R_2$$. Apply Ohm's Law again to find the voltage across $$R_2$$:\n$$V_2 = I \\times R_2$$\n\n- Step 3: Substitute the expression for $$I$$ from Step 1:\n$$V_2 = \\frac{V_{in}}{R_1 + R_2} \\times R_2 = V_{in} \\cdot \\frac{R_2}{R_1 + R_2}$$\n\n- Step 4: Since the output is taken across $$R_2$$, we call this $$V_{out}$$:\n$$V_{out} = V_{in} \\cdot \\frac{R_2}{R_1 + R_2}$$\n\nThe logic is simple: (1) find the current from total V and total R, then (2) use that current with the individual resistance to find the individual voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "In a series potential divider, how does the ratio of the voltages across the two resistors relate to the ratio of their resistances? Why? (3 steps)", "answer": "- Step 1: The voltage ratio equals the resistance ratio:\n$$\\frac{V_1}{V_2} = \\frac{R_1}{R_2}$$\n\n- Step 2: This follows directly from Ohm's Law. Since the current $$I$$ is the same through both resistors: $$V_1 = IR_1$$ and $$V_2 = IR_2$$. Dividing the first equation by the second:\n$$\\frac{V_1}{V_2} = \\frac{IR_1}{IR_2} = \\frac{R_1}{R_2}$$\n\n- Step 3: The $$I$$ cancels because it is identical for both resistors. This is why **voltage is proportional to resistance in a series circuit** — the bigger resistance gets the bigger voltage share. This is a direct consequence of the same current flowing through both.\n\n+ Quick check: if $$R_1 = 2\\,\\Omega$$ and $$R_2 = 4\\,\\Omega$$, then $$V_1/V_2 = 2/4 = 1/2$$. The 4 Ω resistor gets twice the voltage of the 2 Ω resistor.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "How can you verify that your calculated voltages across $$R_1$$ and $$R_2$$ in a potential divider are correct, using a fundamental circuit law? (2 steps)", "answer": "- Step 1: Apply **Kirchhoff's Voltage Law (KVL)** around the loop: the sum of the potential differences across all components must equal the supply voltage:\n$$V_1 + V_2 = V_{in}$$\n\n- Step 2: If your calculated $$V_1$$ and $$V_2$$ do not add up to $$V_{in}$$, something is wrong. For example, with $$V_{in} = 12\\text{ V}$$, if you find $$V_2 = 8\\text{ V}$$, then $$V_1$$ must be $$12 - 8 = 4\\text{ V}$$. This also lets you find one voltage from the other without reapplying the divider formula.\n\n+ This check works because KVL is just energy conservation: the energy gained per charge from the supply must equal the total energy lost per charge around the loop.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "A simple exercise: A 12 V supply is connected to a 2 kΩ resistor ($$R_1$$) in series with a 4 kΩ resistor ($$R_2$$). What fraction of the supply voltage appears across $$R_2$$, and what is $$V_{out}$$? (2 steps)", "answer": "- Step 1: The fraction of the supply voltage across $$R_2$$ is:\n$$\\frac{R_2}{R_1 + R_2} = \\frac{4}{2 + 4} = \\frac{4}{6} = \\frac{2}{3}$$\n\nSo two-thirds of the supply voltage appears across $$R_2$$.\n\n- Step 2: Multiply by the supply voltage:\n$$V_{out} = \\frac{2}{3} \\times 12 = 8\\text{ V}$$\n\n+ Sense-check: $$V_1 = 12 - 8 = 4\\text{ V}$$. Ratio $$V_1/V_2 = 4/8 = 1/2$$, which matches $$R_1/R_2 = 2/4 = 1/2$$. ✓ The bigger resistor (4 kΩ) gets the bigger voltage share (8 V).", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "What is a potentiometer, and how does it differ in structure from a basic two-resistor potential divider? (2 steps)", "answer": "- Step 1: A potentiometer is a single three-terminal component consisting of a resistive wire (or track) of total resistance $$R_{total}$$ with a **sliding contact** that can be positioned anywhere along its length. The slider effectively divides the single track into two parts: one with resistance $$R_1$$ and the other with $$R_2 = R_{total} - R_1$$.\n\n- Step 2: Unlike a basic divider (two separate, fixed resistors), a potentiometer allows **continuous adjustment** of the resistance ratio by moving the slider. This means $$V_{out}$$ can be varied smoothly from 0 to $$V_{in}$$, rather than being fixed at one value.\n\n+ Key distinction: a rheostat (two-terminal variable resistor) controls **current**; a potentiometer (three-terminal) controls **potential difference**. Same physical device, different wiring.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "In a potentiometer circuit, what is the output voltage when the slider is at (a) the very top and (b) the very bottom of the resistive track? Explain using the divider formula. (3 steps)", "answer": "- Step 1: The divider formula for a potentiometer is:\n$$V_{out} = V_{in} \\cdot \\frac{R_2}{R_{total}}$$\nwhere $$R_2$$ is the resistance of the section below the slider.\n\n- Step 2: **Slider at the top**: $$R_2 = R_{total}$$ (the entire track is below the slider). So:\n$$V_{out} = V_{in} \\cdot \\frac{R_{total}}{R_{total}} = V_{in}$$\nThe full supply voltage appears at the output.\n\n- Step 3: **Slider at the bottom**: $$R_2 = 0$$ (nothing is below the slider). So:\n$$V_{out} = V_{in} \\cdot \\frac{0}{R_{total}} = 0$$\nNo voltage appears at the output.\n\nThis is the key advantage of a potentiometer: $$V_{out}$$ ranges continuously from 0 to $$V_{in}$$. A rheostat in series cannot achieve a zero output voltage (some minimum always remains).", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "For a uniform resistance wire used as a potentiometer, how does the output voltage relate to the position of the sliding contact? Why? (3 steps)", "answer": "- Step 1: In a uniform wire, resistance is proportional to length. If the wire has total length $$L_{total}$$ and the section below the slider has length $$L_2$$, then:\n$$\\frac{R_2}{R_{total}} = \\frac{L_2}{L_{total}}$$\n\n- Step 2: Substituting into the divider formula:\n$$V_{out} = V_{in} \\cdot \\frac{L_2}{L_{total}}$$\n\n- Step 3: This means the output voltage is directly proportional to the length of wire below the slider. If the slider is halfway along the wire, you get half the supply voltage. If it's one-quarter from the bottom, you get one-quarter of the supply voltage.\n\n+ This proportionality only holds for a **uniform** wire (constant cross-sectional area and resistivity). If the wire were non-uniform, resistance would not be proportional to length and this simple relationship would break down.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "A uniform resistance wire across a 12 V supply has a sliding contact. If the contact is placed so that the bottom section is one-third of the total length, what is $$V_{out}$$? (2 steps)", "answer": "- Step 1: For a uniform wire, the voltage fraction equals the length fraction:\n$$\\frac{V_{out}}{V_{in}} = \\frac{L_2}{L_{total}} = \\frac{1}{3}$$\n\n- Step 2: Therefore:\n$$V_{out} = \\frac{1}{3} \\times 12 = 4\\text{ V}$$\n\nNo need to know the actual length or resistance — only the fraction matters for a uniform wire.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A student uses a rheostat (variable resistor) in series with a fixed resistor and claims they can achieve any output voltage from 0 V up to the full supply voltage. Why is this claim wrong? (3 steps)", "answer": "- Step 1: With a rheostat in series, the output is taken across the fixed resistor. The minimum output voltage occurs when the rheostat is at maximum resistance: $$V_{out,min} = V_{in} \\cdot \\frac{R_{fixed}}{R_{fixed} + R_{rheostat,max}}$$. This is still greater than zero.\n\n- Step 2: The maximum output occurs when the rheostat is at zero resistance: $$V_{out,max} = V_{in}$$. So the range is from some positive minimum to $$V_{in}$$ — **not** from 0 to $$V_{in}$$.\n\n- Step 3: A potentiometer, by contrast, can achieve 0 V (slider at bottom, $$R_2 = 0$$) because it is wired as a three-terminal divider where the output is taken across a section of the track that can shrink to zero. This is why a potentiometer is preferred when you need the full voltage range.\n\n+ Example: a 20 Ω rheostat in series with a 220 Ω resistor on a 6 V supply can only vary the output from 5.5 V to 6.0 V — nearly useless for investigating I-V characteristics over a wide range.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "What is a \"loaded divider,\" and what physical change does adding a load cause to the circuit? (3 steps)", "answer": "- Step 1: A loaded divider is a potential divider where a **load resistor** ($$R_L$$) is connected across the output (i.e., across $$R_2$$) to extract the output voltage and power something downstream.\n\n- Step 2: The load $$R_L$$ is in **parallel** with $$R_2$$. This creates a combined resistance:\n$$R_{BC} = \\frac{R_2 \\cdot R_L}{R_2 + R_L}$$\nwhich is always **less than** $$R_2$$ alone.\n\n- Step 3: Because the effective bottom resistance decreases, the circuit is no longer the same as the unloaded divider. The total resistance falls, the current increases, and — crucially — $$V_{out}$$ changes (it decreases).\n\n+ The load \"disturbs\" the divider. The unloaded formula $$V_{out} = V_{in} \\cdot R_2/(R_1+R_2)$$ no longer applies; you must use $$R_{BC}$$ instead of $$R_2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Explain step by step why connecting a load across $$R_2$$ in a potential divider causes the output voltage to **decrease**. (4 steps)", "answer": "- Step 1: The load $$R_L$$ is in **parallel** with $$R_2$$. Two resistors in parallel always have a combined resistance less than either individual resistor:\n$$R_{BC} = \\frac{R_2 \\cdot R_L}{R_2 + R_L} < R_2$$\n\n- Step 2: The total circuit resistance decreases (from $$R_1 + R_2$$ to $$R_1 + R_{BC}$$), so by Ohm's Law the current **increases**:\n$$I_{new} = \\frac{V_{in}}{R_1 + R_{BC}} > I_{old}$$\n\n- Step 3: A larger current through $$R_1$$ means a **larger voltage drop** across $$R_1$$:\n$$V_{1,new} = I_{new} \\cdot R_1 > V_{1,old}$$\n\n- Step 4: By Kirchhoff's Voltage Law, $$V_{out} = V_{in} - V_1$$. Since $$V_1$$ has increased, $$V_{out}$$ must **decrease**. The load \"steals\" some of the voltage that was previously across $$R_2$$.\n\n+ Alternative viewpoint: the bottom resistance has decreased, so it claims a smaller fraction of the total voltage. Either way, the conclusion is the same: loading reduces $$V_{out}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "A common misconception: a student says \"the load is in series with $$R_2$$, so the total resistance increases.\" Explain why this is wrong and what the correct configuration is. (3 steps)", "answer": "- Step 1: The load $$R_L$$ is connected **across** $$R_2$$ — meaning one end of $$R_L$$ connects to the same node as the top of $$R_2$$, and the other end connects to the same node as the bottom of $$R_2$$. This is the definition of a **parallel** connection, not series.\n\n- Step 2: In parallel, the combined resistance is:\n$$R_{BC} = \\frac{R_2 \\cdot R_L}{R_2 + R_L}$$\nThis is always less than $$R_2$$ (adding another path for current always reduces the total resistance between two nodes).\n\n- Step 3: If the load were in series (which it is not), the total resistance would indeed increase. But physically, the load is tapping off the output voltage — it must be connected across $$R_2$$ to \"see\" that voltage. It cannot be in series with $$R_2$$ and still measure the voltage across it.\n\n+ Think of it like plugging a device into a wall socket: the device goes in parallel with the mains, not in series. Same principle here.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "What is the rule of thumb for choosing a load resistance to minimise the loading effect on a potential divider? Why does this work? (3 steps)", "answer": "- Step 1: The rule of thumb is: the load resistance should be **at least 10 times** the value of $$R_2$$:\n$$R_L \\geq 10 \\cdot R_2$$\n\n- Step 2: When $$R_L$$ is much larger than $$R_2$$, the parallel combination $$R_{BC} = R_2 \\cdot R_L / (R_2 + R_L)$$ is very close to $$R_2$$. For example, if $$R_L = 10R_2$$:\n$$R_{BC} = \\frac{R_2 \\times 10R_2}{R_2 + 10R_2} = \\frac{10R_2^2}{11R_2} = \\frac{10}{11}R_2 \\approx 0.91R_2$$\nOnly a 9% reduction — the loaded $$V_{out}$$ is close to the unloaded value.\n\n- Step 3: If $$R_L$$ is small (e.g., $$R_L = R_2$$), then $$R_{BC} = R_2/2$$ — a 50% reduction — and $$V_{out}$$ drops significantly. The larger the load resistance relative to $$R_2$$, the less it disturbs the divider.\n\n+ This is a design principle: if you need $$V_{out}$$ to remain stable under loading, choose divider resistors that are small compared to the expected load, or use a buffer amplifier between the divider and the load.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "A divider has $$R_1 = 5\\text{ k}\\Omega$$ and $$R_2 = 10\\text{ k}\\Omega$$ across a 9 V supply. A load of 30 kΩ is connected across $$R_2$$. Without doing heavy calculation, will the loaded $$V_{out}$$ be noticeably different from the unloaded value? Justify qualitatively. (3 steps)", "answer": "- Step 1: Check the rule of thumb: is $$R_L \\geq 10 \\times R_2$$? Here $$R_L = 30\\text{ k}\\Omega$$ and $$10 \\times R_2 = 100\\text{ k}\\Omega$$. Since $$30 < 100$$, the condition is **not** met.\n\n- Step 2: Because $$R_L$$ is only 3 times $$R_2$$ (not 10 times), the parallel combination $$R_{BC}$$ will be noticeably less than $$R_2$$. This means a significant drop in $$V_{out}$$ is expected.\n\n- Step 3: The unloaded $$V_{out} = 9 \\times \\frac{10}{15} = 6\\text{ V}$$. The loaded $$V_{out}$$ will be noticeably below 6 V (in fact it works out to about 5.4 V — a 0.6 V drop). The loading effect is significant because the load is not large enough relative to $$R_2$$.\n\n+ Takeaway: \"3× is not enough.\" The 10× rule exists because anything less causes a meaningful voltage drop.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "What does \"NTC\" stand for in the context of a thermistor, and what does it tell you about how resistance changes with temperature? (2 steps)", "answer": "- Step 1: NTC stands for **Negative Temperature Coefficient**. \"Negative\" means the relationship between temperature and resistance goes in the opposite direction — as one increases, the other decreases.\n\n- Step 2: Specifically, as temperature **increases**, the resistance of an NTC thermistor **decreases**. Physically, this is because electrons gain thermal energy and can move more easily through the semiconductor material, increasing conductivity (and therefore decreasing resistance).\n\n+ The resistance-temperature graph is a steeply falling curve — it drops quickly at low temperatures and flattens at higher temperatures. This non-linear behaviour is characteristic of NTC thermistors.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "How does the resistance of an LDR change with light intensity, and what is the physical reason? (2 steps)", "answer": "- Step 1: As light intensity **increases**, the resistance of an LDR **decreases**. In bright light, an LDR has low resistance; in darkness, it has high resistance.\n\n- Step 2: Physically, light photons deliver energy to the semiconductor material, freeing more charge carriers (electrons) to conduct. More charge carriers means higher conductivity and lower resistance. This is similar in principle to the NTC thermistor, but triggered by photons instead of thermal energy.\n\n+ Typical values: an LDR might have resistance of ~0.5 kΩ in bright light but ~8 kΩ in darkness — a huge range, which makes it very effective as a sensor in divider circuits.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "In a potential divider, a thermistor is the **top** resistor ($$R_1$$) and a fixed resistor is the **bottom** resistor ($$R_2$$, output across $$R_2$$). When temperature increases, does $$V_{out}$$ increase or decrease? Walk through the chain of reasoning. (4 steps)", "answer": "- Step 1: Temperature increases → the NTC thermistor's resistance **decreases** ($$R_1$$ decreases).\n\n- Step 2: Total resistance $$R_1 + R_2$$ decreases, so the current **increases**: $$I = V_{in}/(R_1 + R_2)$$.\n\n- Step 3: The voltage across the thermistor is $$V_1 = IR_1$$. Although $$I$$ increased, $$R_1$$ decreased significantly. The net effect is that $$V_1$$ **decreases** (a smaller fraction of $$V_{in}$$ is lost across $$R_1$$).\n\n- Step 4: By KVL: $$V_{out} = V_{in} - V_1$$. Since $$V_1$$ decreased, $$V_{out}$$ **increases**.\n\n+ Shortcut reasoning: the thermistor's resistance decreased, so it claims a **smaller share** of the voltage. The remaining voltage (across $$R_2$$) must therefore be larger. When the sensor is on top, ↑T → ↑$$V_{out}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "In a potential divider, a thermistor is the **bottom** resistor (output across the thermistor) and a fixed resistor is on top. When temperature increases, does $$V_{out}$$ increase or decrease? Walk through the full chain. (4 steps)", "answer": "- Step 1: Temperature increases → NTC thermistor resistance **decreases** ($$R_{th}$$ decreases).\n\n- Step 2: Since $$V \\propto R$$ (same current in series), the thermistor's reduced resistance means it claims a **smaller fraction** of the supply voltage. So $$V_{th}$$ **decreases**.\n\n- Step 3: By KVL: $$V_R = V_{in} - V_{th}$$. Since $$V_{th}$$ decreased, the voltage across the fixed resistor $$V_R$$ **increases**.\n\n- Step 4: Since the output is taken across the thermistor ($$V_{out} = V_{th}$$), and $$V_{th}$$ decreased, **$$V_{out}$$ decreases**.\n\n+ Critical comparison: the same temperature increase causes **opposite** effects on $$V_{out}$$ depending on which position the thermistor occupies! When thermistor is on top: ↑T → ↑$$V_{out}$$. When thermistor is on bottom: ↑T → ↓$$V_{out}$$. **Always read the circuit first.**", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "An LDR is the **bottom** resistor in a potential divider (output across the LDR). When light intensity decreases (it gets darker), what happens to $$V_{out}$$? Walk through the reasoning. (3 steps)", "answer": "- Step 1: Decreased light intensity → LDR resistance **increases** (fewer photons, fewer free charge carriers).\n\n- Step 2: Since $$V \\propto R$$ in series (same current), the LDR's increased resistance means it claims a **larger fraction** of the supply voltage. So $$V_{LDR}$$ **increases**.\n\n- Step 3: Since the output is across the LDR, $$V_{out}$$ **increases** when it gets darker.\n\n+ This is the principle behind automatic street lights: at dusk, light intensity falls → LDR resistance rises → $$V_{out}$$ across LDR rises → this higher voltage triggers the lamp circuit to switch on. The LDR is placed at the bottom so that darkness produces a high trigger voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "An LDR is the **top** resistor in a potential divider (output across the fixed bottom resistor). When light intensity increases, what happens to $$V_{out}$$? Explain briefly. (3 steps)", "answer": "- Step 1: Increased light → LDR resistance **decreases**.\n\n- Step 2: The LDR claims a smaller fraction of the supply voltage (since $$V \\propto R$$). So $$V_{LDR}$$ decreases.\n\n- Step 3: By KVL: $$V_{out} = V_{in} - V_{LDR}$$. Since $$V_{LDR}$$ decreased, $$V_{out}$$ **increases**.\n\n+ When the LDR is on top and output is across the fixed resistor: brighter light → higher $$V_{out}$$. This could be used for a circuit that triggers when light exceeds a threshold (e.g., automatic blinds closing in bright sunlight).", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "For a 3-mark \"state and explain\" exam question about a sensor in a potential divider, what three steps must your answer contain to get full marks? (3 steps)", "answer": "- Step 1: **State the direction of resistance change** of the sensor. E.g., \"The resistance of the thermistor decreases\" (because temperature increased, NTC behaviour). This earns 1 mark.\n\n- Step 2: **State the direction of voltage change across the sensor** and briefly justify it. E.g., \"The p.d. across the thermistor decreases because voltage is proportional to resistance in series (same current).\" This earns 1 mark.\n\n- Step 3: **State the direction of voltage change across the other resistor**, citing Kirchhoff's Voltage Law. E.g., \"By Kirchhoff's Voltage Law, the p.d. across the fixed resistor increases.\" This earns 1 mark.\n\n+ All three steps must be explicit. Missing the KVL justification in step 3, or not explaining *why* the sensor voltage changed, will lose marks. The examiner needs to see the full chain: environment change → sensor R change → sensor V change → other resistor V change.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "A common mistake is writing \"R = IV\" when rearranging Ohm's Law. What is the correct rearrangement, and why is \"R = IV\" nonsensical in terms of units? (3 steps)", "answer": "- Step 1: Ohm's Law is $$V = IR$$. To make $$R$$ the subject, divide both sides by $$I$$:\n$$R = \\frac{V}{I}$$\n\n- Step 2: The mistake \"R = IV\" would mean multiplying current and voltage. Check the units: $$I \\times V$$ has units of Amps × Volts = Watts (power), not Ohms (resistance). So \"R = IV\" gives you a power value, not a resistance.\n\n- Step 3: The correct units check: $$V/I$$ has units of Volts/Amps = Ohms. ✓ Use the mnemonic \"Very Itchy Rash\" (V = IR) to remember the correct order, and always divide V by I to get R.\n\n+ This trap appeared in the lesson video. The tutor's mnemonic: V is on its own, I and R are multiplied together on the other side. Never rearrange to R = IV.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "Edge case: In a potential divider, what happens to $$V_{out}$$ if $$R_1 = 0$$ (the top resistor is replaced by a wire)? What if $$R_2 = 0$$ (the bottom resistor is a wire)? (3 steps)", "answer": "- Step 1: If $$R_1 = 0$$: the formula gives $$V_{out} = V_{in} \\cdot \\frac{R_2}{0 + R_2} = V_{in}$$. The entire supply voltage appears across $$R_2$$. This makes sense — with zero resistance on top, no voltage is dropped there, so all of $$V_{in}$$ appears at the output.\n\n- Step 2: If $$R_2 = 0$$: the formula gives $$V_{out} = V_{in} \\cdot \\frac{0}{R_1 + 0} = 0$$. The output is zero because the bottom is a short circuit — all the voltage is dropped across $$R_1$$ and none across the zero-resistance bottom.\n\n- Step 3: These limiting cases confirm the physical intuition: voltage divides in proportion to resistance. Zero resistance gets zero voltage; all the resistance gets all the voltage (in a two-resistor divider).\n\n+ Warning: in practice, $$R_1 = 0$$ means very high current ($$I = V_{in}/R_2$$), which could damage the supply or components. The formula is correct but the circuit may not be safe.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "A student reasons: \"In a loaded divider, if I make $$R_L$$ extremely large (approaching infinity), then $$V_{out}$$ should approach the unloaded value.\" Is this correct? Explain why. (3 steps)", "answer": "- Step 1: Yes, this is correct. As $$R_L \\to \\infty$$, the parallel combination approaches:\n$$R_{BC} = \\frac{R_2 \\cdot R_L}{R_2 + R_L} \\to \\frac{R_2 \\cdot R_L}{R_L} = R_2$$\n\n- Step 2: Physically, an infinitely large load draws **zero current** (since $$I_L = V_{out}/R_L \\to 0$$). If no current flows through the load, it might as well not be there — the divider is effectively unloaded.\n\n- Step 3: This is the ideal case: a perfect voltmeter (infinite resistance) connected across $$R_2$$ would read the true unloaded voltage. Real voltmeters have finite (but very large) resistance, which is why they only approximate the unloaded reading.\n\n+ This explains why the rule of thumb $$R_L \\geq 10 R_2$$ works: it's a practical compromise. Not infinite, but large enough that the loading effect is small (under ~10%).", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": true}, {"question": "A thermistor has resistance 450 Ω at 20°C and is in series with a fixed resistor across a 9 V supply. The voltage across the thermistor is 5 V. Without solving the full equation, is the fixed resistor larger or smaller than 450 Ω? How can you tell? (2 steps)", "answer": "- Step 1: The thermistor has 5 V across it out of 9 V total. That means the fixed resistor has $$9 - 5 = 4\\text{ V}$$ across it. The thermistor has the **larger** voltage share (5 V vs 4 V).\n\n- Step 2: Since $$V \\propto R$$ in series, the component with the larger voltage must have the larger resistance. The thermistor (5 V) has more voltage, so it has more resistance than the fixed resistor. Therefore, the fixed resistor is **smaller** than 450 Ω.\n\n+ The actual calculation gives R = 360 Ω, which confirms: 360 < 450. ✓ This type of qualitative reasoning is a powerful sanity check — always compare voltage shares to predict resistance relationships before computing.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A potential divider uses an LDR (top) and a fixed 2 kΩ resistor (bottom, output across fixed resistor). In bright light the LDR resistance is 0.5 kΩ; in darkness it is 8 kΩ. Without detailed calculation, describe what happens to $$V_{out}$$ as it goes from bright to dark. (3 steps)", "answer": "- Step 1: In bright light, the LDR has low resistance (0.5 kΩ). The total resistance is dominated by the fixed 2 kΩ resistor, so most of the supply voltage drops across it. $$V_{out}$$ is **high**.\n\n- Step 2: In darkness, the LDR has high resistance (8 kΩ). Now the LDR claims most of the supply voltage, leaving less for the fixed resistor. $$V_{out}$$ is **low**.\n\n- Step 3: As light decreases (bright → dark), $$V_{out}$$ **decreases**. The output across the fixed resistor falls because the LDR's increasing resistance takes a larger share of the voltage.\n\n+ If you wanted the opposite behaviour (darkness → high $$V_{out}$$ to trigger a street lamp), you would put the LDR at the bottom and the fixed resistor on top. Sensor position determines the direction of the output response!", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "Why is it critical to identify the **position** of the sensor (top or bottom) in a divider before reasoning about how $$V_{out}$$ changes? Give a concrete example showing how the same environmental change can produce opposite effects. (3 steps)", "answer": "- Step 1: The direction of $$V_{out}$$ change depends on both (a) whether the sensor's resistance increases or decreases, AND (b) whether the output is taken across the sensor or across the other resistor. The position determines which voltage you're reading.\n\n- Step 2: Example: temperature increases → thermistor resistance decreases.\n+ If thermistor is on the **bottom** (output across thermistor): ↓$$R_{th}$$ → ↓$$V_{th}$$ → $$V_{out}$$ **decreases**.\n+ If thermistor is on the **top** (output across fixed resistor): ↓$$R_{th}$$ → ↓$$V_{th}$$ → ↑$$V_R$$ → $$V_{out}$$ **increases**.\n\n- Step 3: Same temperature increase, opposite effect on $$V_{out}$$! This is why the guide emphasises: \"Always read the circuit to identify which position the sensor occupies before reasoning about direction.\" Getting the position wrong guarantees a wrong answer.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "A divider has $$R_1 = 12\\,\\Omega$$ (top) and $$R_2 = 6\\,\\Omega$$ (bottom) across a 7.5 V supply. A 6 Ω lamp is connected across $$R_2$$. Qualitatively, how does the lamp's addition change $$V_{out}$$ — does it increase, decrease, or stay the same? Why? (3 steps)", "answer": "- Step 1: The lamp ($$R_L = 6\\,\\Omega$$) is in **parallel** with $$R_2 = 6\\,\\Omega$$. Two equal resistors in parallel give a combined resistance of half: $$R_{BC} = 6/2 = 3\\,\\Omega$$. The effective bottom resistance has halved.\n\n- Step 2: With the bottom resistance reduced from 6 Ω to 3 Ω, the bottom section now claims a smaller fraction of the supply voltage. (Previously: 6/18 of the total; now: 3/15 of the total.)\n\n- Step 3: Therefore $$V_{out}$$ **decreases**. The unloaded output was 2.5 V; the loaded output drops to 1.5 V — a significant reduction because the load resistance equals $$R_2$$ (far below the 10× rule of thumb).\n\n+ The lamp current is $$1.5/6 = 0.25\\text{ A}$$. The remaining current ($$0.50 - 0.25 = 0.25\\text{ A}$$) flows through $$R_2$$. Both paths share the same 1.5 V.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "Synthesis question: A designer wants a potential divider that outputs approximately 3 V from a 9 V supply, and this output must remain stable when a 100 kΩ load is connected. Should they choose (a) $$R_1 = 1\\text{ k}\\Omega, R_2 = 500\\,\\Omega$$ or (b) $$R_1 = 100\\text{ k}\\Omega, R_2 = 50\\text{ k}\\Omega$$? Both give ~3 V unloaded. Explain which is better and why. (4 steps)", "answer": "- Step 1: Both options give the same unloaded $$V_{out}$$ because the ratio $$R_2/(R_1+R_2)$$ is the same (1/3 in both cases): $$V_{out} = 9 \\times 1/3 = 3\\text{ V}$$.\n\n- Step 2: Now check the loading effect. For option (a), $$R_L = 100\\text{ k}\\Omega$$ vs $$R_2 = 500\\,\\Omega$$. The ratio is $$R_L/R_2 = 200$$. This far exceeds the 10× rule — loading effect is negligible. $$R_{BC} \\approx 500\\,\\Omega$$.\n\n- Step 3: For option (b), $$R_L = 100\\text{ k}\\Omega$$ vs $$R_2 = 50\\text{ k}\\Omega$$. The ratio is $$R_L/R_2 = 2$$. This is well below the 10× rule — significant loading. $$R_{BC} = 50 \\times 100 / 150 \\approx 33\\text{ k}\\Omega$$, noticeably less than 50 kΩ.\n\n- Step 4: **Option (a) is better.** Lower divider resistances mean the load is large relative to $$R_2$$, so the output remains stable. Higher divider resistances (option b) save power but make the output sensitive to loading.\n\n+ Design trade-off: low-resistance dividers are more stable under load but waste more power ($$I = V_{in}/(R_1+R_2)$$ is larger). High-resistance dividers save power but are easily disturbed by loads. Choose based on your priority.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "A student claims: \"If I connect a voltmeter across $$R_2$$ in a potential divider, it will read exactly the unloaded voltage.\" Is this always true? What assumption does this require? (3 steps)", "answer": "- Step 1: This is **not always true**. A real voltmeter has finite resistance, so it acts as a load on the divider. The voltmeter is in parallel with $$R_2$$, creating a loaded divider.\n\n- Step 2: The assumption required is that the voltmeter resistance is **very large** compared to $$R_2$$ (ideally infinite). If $$R_{voltmeter} \\gg R_2$$, then the parallel combination $$R_{BC} \\approx R_2$$, and the reading is essentially the unloaded voltage.\n\n- Step 3: If $$R_2$$ is large (e.g., 1 MΩ) and the voltmeter has typical resistance of 10 MΩ, then $$R_{BC} = 1 \\times 10/11 \\approx 0.91\\text{ M}\\Omega$$ — a 9% error. The voltmeter would read significantly less than the true unloaded voltage.\n\n+ This is why the rule of thumb exists: the measuring device (or any load) should have resistance at least 10× the output resistor. For high-resistance dividers, you need a voltmeter with correspondingly high input impedance.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "When mixing units in potential-divider calculations (e.g., 200 kΩ and 10 MΩ), what is the safest approach to avoid errors? Illustrate with the ratio $$200\\text{ k}\\Omega / (200\\text{ k}\\Omega + 10\\text{ M}\\Omega)$$. (3 steps)", "answer": "- Step 1: Convert all resistances to the same power of 10 before combining. The safest approach is to express everything in terms of a common unit — e.g., $$\\times 10^3$$ (kΩ).\n\n- Step 2: Convert 10 MΩ: $$10\\text{ M}\\Omega = 10 \\times 10^6\\,\\Omega = 10000 \\times 10^3\\,\\Omega$$. Now both values are in $$\\times 10^3$$:\n$$200 \\times 10^3 \\text{ and } 10000 \\times 10^3$$\n\n- Step 3: The ratio becomes:\n$$\\frac{200}{200 + 10000} = \\frac{200}{10200} = \\frac{1}{51}$$\n\nThe $$\\times 10^3$$ factor cancels in the ratio, so you only need to get the coefficients right.\n\n+ Common error: mixing 200 and 10 directly to get 200/210 = 20/21 — this is wrong because 10 MΩ ≠ 10 kΩ. Always convert to the same unit first. The lesson video highlighted this exact trap.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "In a sensor divider circuit, why is it useful to choose the fixed resistor to be approximately half the sensor's resistance at the operating point? (Think about sensitivity.) (3 steps)", "answer": "- Step 1: Core Practical 12 suggests choosing $$R_2 \\approx \\frac{1}{2} R_1$$ (where $$R_1$$ is the thermistor resistance at room temperature). This places the operating point near the middle of the voltage range.\n\n- Step 2: When $$R_2 \\approx R_1/2$$, the unloaded $$V_{out} \\approx V_{in} \\times (R_1/2)/(R_1 + R_1/2) = V_{in}/3$$. This means there is plenty of room for $$V_{out}$$ to change in both directions as the sensor resistance varies.\n\n- Step 3: If the fixed resistor were very large or very small compared to the sensor, $$V_{out}$$ would be stuck near 0 V or near $$V_{in}$$, and small changes in sensor resistance would produce very small changes in $$V_{out}$$. Choosing a comparable value maximises the **sensitivity** — the change in $$V_{out}$$ per unit change in the environmental variable.\n\n+ This is a design principle: for maximum voltage swing, the two resistances should be of similar order of magnitude at the typical operating point.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "A potential divider has a thermistor on top and a fixed resistor on the bottom. The output across the fixed resistor is used to trigger a heater. Explain the full chain of reasoning for why this circuit could act as an automatic heater controller that turns ON when the room gets cold. (4 steps)", "answer": "- Step 1: When the room gets cold, the temperature decreases. For an NTC thermistor, ↓T → ↑$$R_{th}$$. The thermistor resistance increases.\n\n- Step 2: With higher $$R_{th}$$, the thermistor claims a **larger** share of the supply voltage (since $$V \\propto R$$ in series). So $$V_{th}$$ increases.\n\n- Step 3: By KVL: $$V_{out} = V_{in} - V_{th}$$. Since $$V_{th}$$ increased, $$V_{out}$$ (across the fixed resistor) **decreases**.\n\n- Step 4: Wait — this gives ↓$$V_{out}$$ when cold. To trigger a heater when cold, you'd want ↑$$V_{out}$$ when cold. So this configuration is **wrong** for that purpose! You would need to **swap** the positions: put the thermistor on the bottom (output across thermistor), so that ↓T → ↑$$R_{th}$$ → ↑$$V_{th}$$ → ↑$$V_{out}$$, triggering the heater.\n\n+ This is a trick question to test whether you blindly follow a pattern or actually reason through the circuit. The sensor's position determines everything — always work through the chain from first principles.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "Quick conceptual exercise: In a potential divider, $$R_1 = R_2$$. What fraction of $$V_{in}$$ appears across each resistor? No calculation needed — just reason from the proportionality principle. (2 steps)", "answer": "- Step 1: Since $$V \\propto R$$ in series and both resistances are equal, the voltage must divide equally. Each resistor gets half the supply voltage.\n\n- Step 2: $$V_1 = V_2 = V_{in}/2$$. This also follows from the formula: $$V_{out} = V_{in} \\times R_2/(R_1+R_2) = V_{in} \\times R/(R+R) = V_{in}/2$$.\n\n+ This is the simplest possible divider. Whenever you see equal resistances, immediately conclude equal voltage split — no calculation needed.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "What is the combined resistance formula for two resistors in parallel ($$R_2$$ and $$R_L$$), and why is the result always less than either individual resistance? (3 steps)", "answer": "- Step 1: The formula is:\n$$R_{BC} = \\frac{R_2 \\cdot R_L}{R_2 + R_L}$$\n\n- Step 2: The result is always less than either individual resistance because adding a parallel path provides an **additional route** for current to flow. More paths = easier for current = lower total resistance.\n\n- Step 3: Algebraically, since $$R_2 + R_L > R_2$$ (both positive), we have:\n$$R_{BC} = R_2 \\cdot \\frac{R_L}{R_2 + R_L} < R_2 \\cdot 1 = R_2$$\nSimilarly, $$R_{BC} < R_L$$. The parallel combination is less than the smaller of the two resistances.\n\n+ Special case: if $$R_2 = R_L$$, then $$R_{BC} = R_2/2$$. Two equal paths each carry half the current, so the total resistance is halved.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "A student sets up a potential divider with $$R_1 = 1\\text{ M}\\Omega$$ and $$R_2 = 1\\text{ M}\\Omega$$ across a 10 V supply, expecting 5 V output. They measure with a voltmeter of resistance 1 MΩ and get only 3.33 V. Explain why. (3 steps)", "answer": "- Step 1: The voltmeter (1 MΩ) is in parallel with $$R_2$$ (1 MΩ). The parallel combination is:\n$$R_{BC} = \\frac{1 \\times 1}{1 + 1} = 0.5\\text{ M}\\Omega$$\n\n- Step 2: The loaded divider now has $$R_1 = 1\\text{ M}\\Omega$$ on top and $$R_{BC} = 0.5\\text{ M}\\Omega$$ on bottom. The output is:\n$$V_{out} = 10 \\times \\frac{0.5}{1 + 0.5} = 10 \\times \\frac{1}{3} \\approx 3.33\\text{ V}$$\n\n- Step 3: The voltmeter's resistance is equal to $$R_2$$, so it halves the effective bottom resistance. This is far from the 10× rule (here $$R_L/R_2 = 1$$), causing a massive 33% drop from the expected 5 V.\n\n+ Lesson: high-resistance dividers are extremely sensitive to loading. A 1 MΩ divider is a poor design choice if you're measuring with a 1 MΩ voltmeter. Use much smaller divider resistances, or a voltmeter with much higher input impedance.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}], "count": 40}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What is the fundamental structure and purpose of a potential divider circuit? (2 steps)", "answer": "- Step 1: A potential divider consists of two resistors connected in series across a supply voltage $$V_{in}$$.\n- Step 2: Its purpose is to divide or \"split\" the supply potential difference between the two resistors in proportion to their resistances, producing a specific output voltage $$V_{out}$$ that can be tapped off to power or trigger another circuit.\n\nThink of it as \"dressing up\" a simple series circuit to act as a voltage selector.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "Starting from Kirchhoff's Voltage Law and Ohm's Law, derive the potential divider formula for the output voltage $$V_{out}$$ across the bottom resistor $$R_2$$. (4 steps)", "answer": "- Step 1: In a series circuit, the current $$I$$ is the same everywhere. By Ohm's Law ($$V = IR$$), the current for the entire loop is determined by the total voltage and total resistance: $$I = \\frac{V_{in}}{R_1 + R_2}$$.\n- Step 2: The voltage across the specific resistor $$R_2$$ is given by Ohm's Law as $$V_{out} = I \\times R_2$$.\n- Step 3: Substitute the expression for the current $$I$$ from Step 1 into the equation from Step 2: $$V_{out} = \\left(\\frac{V_{in}}{R_1 + R_2}\\right) \\times R_2$$.\n- Step 4: Rearrange to group the resistance terms, yielding the standard formula: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$.\n\nThe core insight is that because the current is constant, the fraction of the total voltage across $$R_2$$ is exactly equal to the fraction of the total resistance that $$R_2$$ represents.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "In a potential divider, how does the ratio of the voltages across the two resistors relate to the ratio of their resistances, and what fundamental law dictates this? (3 steps)", "answer": "- Step 1: Apply Ohm's Law to each resistor individually: $$V_1 = I \\times R_1$$ and $$V_2 = I \\times R_2$$.\n- Step 2: Because the resistors are in series, Kirchhoff's Current Law (conservation of charge) dictates that the current $$I$$ is identical through both.\n- Step 3: Divide the two voltage equations. The current $$I$$ cancels out, leaving the ratio: $$\\frac{V_1}{V_2} = \\frac{R_1}{R_2}$$. This shows that in a series circuit, voltage is directly proportional to resistance ($$V \\propto R$$).\n\nThe bigger resistor always takes the bigger share of the voltage.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "When using the potential divider formula, a common trap is misplacing the resistances. How do you decide which resistance goes in the numerator? (2 steps)", "answer": "- Step 1: Identify which resistor the output voltage $$V_{out}$$ is being measured across.\n- Step 2: The resistance of *that specific resistor* always goes in the numerator. If the output is across $$R_1$$, use $$V_{out} = V_{in} \\times \\frac{R_1}{R_1 + R_2}$$; if across $$R_2$$, use $$\\frac{R_2}{R_1 + R_2}$$.\n\nNever blindly assume $$R_2$$ goes on top; the numerator belongs to the resistor you are \"measuring.\"", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "A common mistake is writing Ohm's Law as $$R = IV$$. Explain why this is physically and algebraically incorrect, and state the correct rearrangements. (2 steps)", "answer": "- Step 1: Ohm's Law states that Voltage is the product of Current and Resistance: $$V = IR$$ (use the mnemonic \"Very Itchy Rash\" to remember V = I × R).\n- Step 2: Algebraically, to isolate resistance, you must divide voltage by current: $$R = \\frac{V}{I}$$. Writing $$R = IV$$ implies resistance increases with current, which contradicts the definition of resistance as the ratio of voltage to current.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "The \"baseline equation\" for a potential divider is often written as $$\\frac{V_{in}}{R_1 + R_2} = \\frac{V_1}{R_1} = \\frac{V_2}{R_2}$$. What is the physical meaning of this compact expression, and why is it useful? (3 steps)", "answer": "- Step 1: Each of these three fractions represents the exact same physical quantity: the current $$I$$ flowing through the series loop.\n- Step 2: It combines Kirchhoff's Voltage Law (total voltage equals sum of voltages) and Ohm's Law ($$V = IR$$) into a single proportional relationship.\n- Step 3: It is highly useful for solving problems from first principles. If you know any two corresponding pairs (e.g., $$V_{in}$$ and $$R_{total}$$, and $$V_1$$ and $$R_1$$), you can set them equal to find the missing value without explicitly calculating the current first.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "How does a potentiometer function as a continuously variable potential divider, and what is the range of its output voltage? (3 steps)", "answer": "- Step 1: A potentiometer consists of a single resistive track (or wire) with a sliding contact. The slider divides the track into two sections, effectively creating two variable resistors ($$R_1$$ and $$R_2$$) in series.\n- Step 2: Moving the slider changes the lengths (and thus resistances) of the two sections. If the slider moves up, the bottom section $$R_2$$ gets longer, so its resistance increases, and $$V_{out}$$ increases.\n- Step 3: Because the slider can move continuously from one end to the other, the output voltage ranges smoothly from 0 V (slider at the bottom, $$R_2 = 0$$) to $$V_{in}$$ (slider at the top, $$R_2 = R_{total}$$).", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Why is a potentiometer (3 terminals used) preferred over a rheostat (2 terminals used) for varying voltage in a circuit? (2 steps)", "answer": "- Step 1: A rheostat is placed in series with a component to control current. It cannot reduce the voltage across the component to zero; the minimum voltage is determined by the ratio of the component's resistance to the total resistance.\n- Step 2: A potentiometer uses all three terminals to act as a full potential divider. It can vary the output voltage continuously from 0 V up to the full supply voltage $$V_{in}$$, providing a much greater and more precise range of control over potential difference.\n\nRemember: a rheostat controls current; a potentiometer controls potential difference.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "In a potentiometer with a uniform resistance wire, how does the output voltage relate to the position of the sliding contact? (2 steps)", "answer": "- Step 1: For a uniform wire, resistance is directly proportional to length ($$R \\propto L$$). Therefore, the fraction of total resistance is equal to the fraction of total length.\n- Step 2: The potential divider formula simplifies to a length ratio: $$V_{out} = V_{in} \\times \\frac{L_2}{L_{total}}$$, where $$L_2$$ is the length of the section across which the output is taken.\n\nThis allows you to calculate voltage drop without knowing the specific resistance value of the wire.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "What is a \"loaded divider,\" and qualitatively how does connecting a load affect the output voltage? (2 steps)", "answer": "- Step 1: A loaded divider is a potential divider where a load resistor ($$R_L$$) is connected across the output component ($$R_2$$) to draw current and power an external device.\n- Step 2: Connecting the load always *reduces* the output voltage $$V_{out}$$ compared to the unloaded case.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Explain the step-by-step mechanism of why adding a load resistor reduces the output voltage of a potential divider. (4 steps)", "answer": "- Step 1: The load resistor $$R_L$$ is connected in parallel with the bottom resistor $$R_2$$.\n- Step 2: The parallel combination creates an effective bottom resistance $$R_{BC} = \\frac{R_2 R_L}{R_2 + R_L}$$, which is *less* than the original $$R_2$$ alone.\n- Step 3: Because the total series resistance of the circuit has decreased, the total current drawn from the supply increases.\n- Step 4: With a larger current flowing through the top resistor $$R_1$$, the voltage drop across $$R_1$$ increases ($$V_1 = I \\times R_1$$). By Kirchhoff's Voltage Law ($$V_{in} = V_1 + V_{out}$$), if $$V_1$$ increases, less voltage remains for the output $$V_{out}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "A common trap is treating the load resistor as if it is in series with $$R_2$$. Why is this incorrect, and what is the correct topology? (2 steps)", "answer": "- Step 1: The load resistor is connected \"across\" the output, meaning it provides an alternative path for the current alongside $$R_2$$. This is the definition of a parallel connection.\n- Step 2: Treating it as series would imply the resistances add up ($$R_2 + R_L$$), increasing the bottom resistance and falsely increasing $$V_{out}$$. In reality, the parallel combination reduces the bottom resistance, decreasing $$V_{out}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "State the rule of thumb for minimizing the loading effect on a potential divider, and explain the reasoning behind it. (2 steps)", "answer": "- Step 1: The rule of thumb is that the load resistance should be at least 10 times greater than the output resistor ($$R_L \\geq 10 R_2$$).\n- Step 2: If $$R_L$$ is much larger than $$R_2$$, the parallel combination $$R_{BC} = \\frac{R_2 R_L}{R_2 + R_L}$$ is approximately equal to $$R_2$$. The effective resistance barely changes, so $$V_{out}$$ remains close to its unloaded value.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "What does \"NTC\" stand for in the context of a thermistor, and how does its resistance behave with changing temperature? (2 steps)", "answer": "- Step 1: NTC stands for Negative Temperature Coefficient.\n- Step 2: This means that as temperature increases, the resistance of the thermistor decreases. Microscopically, electrons gain thermal energy, freeing more charge carriers to flow, which lowers resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "In a potential divider with a fixed resistor and an NTC thermistor, the output is taken across the thermistor. Explain the 3-mark logic chain for what happens to the voltages when temperature increases. (3 steps)", "answer": "- Step 1: Environment change: Temperature increases $$\\Rightarrow$$ thermistor resistance $$R_{th}$$ decreases (NTC behaviour).\n- Step 2: Sensor voltage: Because voltage is proportional to resistance in series ($$V \\propto R$$), the voltage across the thermistor $$V_{th}$$ decreases.\n- Step 3: Other voltage: By Kirchhoff's Voltage Law ($$V_{in} = V_{R} + V_{th}$$), if the supply voltage is constant and $$V_{th}$$ decreases, the voltage across the fixed resistor $$V_{R}$$ must increase.\n\nFor exam marks, you must explicitly state all three links: resistance change, sensor voltage change, and the other voltage change citing Kirchhoff.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "How does the resistance of a Light Dependent Resistor (LDR) change with light intensity, and what is the microscopic cause? (2 steps)", "answer": "- Step 1: As light intensity increases, the resistance of the LDR decreases.\n- Step 2: Photons of light transfer energy to electrons in the semiconductor material, freeing more charge carriers to conduct, which lowers the resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "In a street light circuit, an LDR is used as the bottom resistor in a potential divider, and the output is taken across it to trigger the lamp. Explain the logic chain for why the street light turns on at dusk. (3 steps)", "answer": "- Step 1: At dusk, light intensity falls, causing the LDR's resistance to increase.\n- Step 2: Since the LDR is in series with a fixed resistor, its increased resistance means it claims a larger share of the supply voltage ($$V \\propto R$$).\n- Step 3: The output voltage across the LDR increases. When this voltage rises above the trigger threshold, the lamp circuit switches on.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "A potential divider has an NTC thermistor and a fixed resistor. Initially, the output across the thermistor *decreases* when temperature rises. If you swap the positions of the thermistor and the fixed resistor (but keep measuring output across the thermistor), how does the output behave when temperature rises? (3 steps)", "answer": "- Step 1: The thermistor's resistance still decreases when temperature rises, regardless of its physical position in the circuit.\n- Step 2: The voltage across the thermistor still decreases because $$V \\propto R$$ (it represents a smaller fraction of the total resistance).\n- Step 3: The position swap does not change the fundamental rule that voltage is proportional to resistance for components in series. The thermistor's voltage share always moves in the same direction as its resistance share.\n\nAlways read the circuit to identify which component the output is across, but the proportionality rule never changes.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "In a sensor potential divider, if the environment changes such that the sensor's resistance *decreases*, what happens to the voltage across the *fixed* resistor, and why? (2 steps)", "answer": "- Step 1: If the sensor's resistance decreases, the total series resistance decreases, so the total current $$I$$ in the circuit increases.\n- Step 2: The voltage across the fixed resistor is $$V = I \\times R_{fixed}$$. Since $$I$$ increases and $$R_{fixed}$$ is constant, the voltage across the fixed resistor must increase.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A 12 V supply is connected to a 2.0 k$$\\Omega$$ resistor (top) and a 4.0 k$$\\Omega$$ resistor (bottom) in series. Using the resistance ratio, what is the output voltage across the bottom resistor? (2 steps)", "answer": "- Step 1: Identify the fraction of the total resistance that the bottom resistor represents: $$\\frac{R_2}{R_1 + R_2} = \\frac{4.0}{2.0 + 4.0} = \\frac{4}{6} = \\frac{2}{3}$$.\n- Step 2: Multiply the supply voltage by this fraction: $$V_{out} = 12 \\text{ V} \\times \\frac{2}{3} = 8.0 \\text{ V}$$.\n\nThe bottom resistor is twice as large as the top one, so it takes twice the voltage share (8 V vs 4 V).", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "A uniform resistance wire has 12.0 V across it. A sliding contact is placed such that the output length is $$\\frac{1}{4}$$ of the total length. What is the output voltage? (2 steps)", "answer": "- Step 1: In a uniform wire, resistance is proportional to length, so the voltage fraction equals the length fraction. The output fraction is $$\\frac{1}{4}$$.\n- Step 2: Calculate the voltage: $$V_{out} = 12.0 \\text{ V} \\times \\frac{1}{4} = 3.0 \\text{ V}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "A potential divider has $$R_1 = 10 \\text{ k}\\Omega$$ and $$R_2 = 10 \\text{ k}\\Omega$$ across a 9 V supply (unloaded $$V_{out} = 4.5$$ V). A load of $$5 \\text{ k}\\Omega$$ is connected across $$R_2$$. Without full calculation, will the new $$V_{out}$$ be significantly closer to 4.5 V, or will it drop well below it, and why? (2 steps)", "answer": "- Step 1: The load ($$5 \\text{ k}\\Omega$$) in parallel with $$R_2$$ ($$10 \\text{ k}\\Omega$$) creates an effective resistance significantly less than $$10 \\text{ k}\\Omega$$ (it will be closer to the smaller value, around $$3.3 \\text{ k}\\Omega$$).\n- Step 2: Since the effective bottom resistance is now much less than the top resistance ($$10 \\text{ k}\\Omega$$), it will take a much smaller share of the voltage, pulling $$V_{out}$$ well below the original 4.5 V.\n\nThis is why the rule of thumb $$R_L \\geq 10 R_2$$ exists; a $$5 \\text{ k}\\Omega$$ load on a $$10 \\text{ k}\\Omega$$ resistor severely \"loads down\" the circuit.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}], "count": 22}, "qwen_1": {"label": "Qwen 3 ①", "cards": [], "count": 0}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why does the voltage split in a series resistive circuit? Use the microscopic view of electron flow to explain. (3 steps)", "answer": "- Step 1: Electrons flow through the circuit due to the electric field from the voltage source.  \n- Step 2: Electrons collide with positive ions in the resistor lattice, transferring kinetic energy and increasing thermal energy (heating).  \n- Step 3: The energy loss per unit charge (voltage drop) is proportional to the resistance: higher resistance ⇒ more collisions ⇒ greater voltage drop.  \nThis is why voltage divides in proportion to resistances in series.  \n\n> **Takeaway:** Voltage in series resistors splits because energy loss (voltage) depends on how much the material resists electron flow (resistance).", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "What happens to Vout in a potential divider if RL (load resistor) becomes equal to R2? Derive the new Vout formula. (4 steps)", "answer": "- Step 1: RL is in parallel with R2:  \n  $$ R_{BC} = \\frac{R_2 R_L}{R_2 + R_L} $$.  \n- Step 2: For RL = R2:  \n  $$ R_{BC} = \\frac{R_2 \\cdot R_2}{R_2 + R_2} = \\frac{R_2^2}{2 R_2} = \\frac{R_2}{2} $$.  \n- Step 3: New Vout formula:  \n  $$ V_{out} = V_{in} \\cdot \\frac{R_{BC}}{R_1 + R_{BC}} = V_{in} \\cdot \\frac{R_2 / 2}{R_1 + R_2 / 2} $$.  \n- Step 4: Conclusion:  \n  The output voltage drops because the effective bottom resistance is halved (parallel combination).  \n\n> **Misconception:** Adding a load *doesn’t* keep Vout the same. Always recalculate R2∥RL.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How does a thermistor in the *bottom* resistor position affect Vout when temperature increases? Use the chain: T → Rth → Vth → VR. (3 steps)", "answer": "- Step 1: Temperature ↑ ⇒ Rth (thermistor) ↓ (NTC behavior).  \n- Step 2: Same series current → Vth = I·Rth ↓.  \n- Step 3: By Kirchhoff’s Voltage Law: VR = Vin − Vth ↑.  \nThus, Vout (VR) increases when temperature rises.  \n\n> **Edge case:** If the thermistor were *top*, Vout would decrease with temperature. Position matters!", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why is the potentiometer output voltage proportional to the length of the resistive wire? Use the formula and physical reasoning. (2 steps)", "answer": "- Step 1: Uniform wire ⇒ resistance proportional to length (R ∝ L).  \n- Step 2:  \n  $$ V_{out} = V_{in} \\cdot \\frac{L_2}{L_{total}} $$.  \n  Longer L2 ⇒ higher R2 ⇒ higher voltage share.  \n\n> **Visual intuition:** Imagine cutting a wire into two pieces: the longer piece has higher resistance and thus a bigger voltage drop.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Calculate Vout for a divider with R1 = 3 kΩ, R2 = 6 kΩ, Vin = 9 V. If a 12 kΩ load is added across R2, what is the new Vout? Compare both values. (4 steps)", "answer": "- Step 1: Unloaded Vout:  \n  $$ V_{out} = 9 \\cdot \\frac{6}{3 + 6} = 6.0\\ \\text{V} $$.  \n- Step 2: R2∥RL:  \n  $$ R_{BC} = \\frac{6 \\times 12}{6 + 12} = 4.0\\ \\text{kΩ} $$.  \n- Step 3: Loaded Vout:  \n  $$ V_{out,\\ loaded} = 9 \\cdot \\frac{4}{3 + 4} = 5.14\\ \\text{V} $$.  \n- Step 4: The load reduced Vout by ~0.86 V (14% decrease).  \n\n> **Takeaway:** Even a load ≥ R2 causes significant voltage drop. Best to use RL ≥ 10 R2.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "What is the purpose of a potentiometer as a continuously variable divider? Why not just use a rheostat in series? (2 steps)", "answer": "- Step 1: A potentiometer allows Vout to vary from 0 to Vin. A rheostat in series only controls current, not the potential difference.  \n- Step 2: Potentiometers provide a *voltage control* (output voltage varies), while rheostats provide a *current control* (total resistance varies).  \n\n> **Key distinction:**  \n  - **Potentiometer:** Output voltage ranges from 0 to Vin.  \n  - **Rheostat:** Controls current by varying total resistance.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "An LDR (light-dependent resistor) is placed in the *top* resistor position. If light intensity increases, what happens to Vout (taken across the LDR)? Explain with a chain. (3 steps)", "answer": "- Step 1: Light ↑ ⇒ RLDR ↓ (LDR behavior).  \n- Step 2: Same series current → VLDR = I·RLDR ↓.  \n- Step 3: Since Vout = VLDR, Vout decreases.  \n\n> **Contrast:** If the LDR were *bottom*, Vout would increase with light. Position determines direction of change.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why is the formula Vout = Vin·(R2/(R1 + R2)) valid only when no load is connected? Explain using Ohm’s Law and Kirchhoff’s Law. (3 steps)", "answer": "- Step 1: No load ⇒ I is the same everywhere:  \n  $$ I = \\frac{V_{in}}{R_1 + R_2} $$.  \n- Step 2: Ohm’s Law for R2:  \n  $$ V_{out} = I R_2 = \\frac{V_{in} R_2}{R_1 + R_2} $$.  \n- Step 3: With a load, RL is in parallel with R2, reducing effective resistance and increasing I. This invalidates the original assumption of constant current.  \n\n> **Key insight:** The formula assumes all current flows through R2. Any diversion (load) breaks this assumption.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": true}, {"question": "A street light uses an LDR in a potential divider. At dusk, light intensity decreases. Explain how this turns the lamp on. Use the sensor resistor position in your reasoning. (3 steps)", "answer": "- Step 1: LDR is *bottom* resistor ⇒ Vout increases when RLDR ↑ (due to darkness).  \n- Step 2: Darkness ⇒ RLDR ↑ ⇒ Vout = Vin·(RLDR/(R + RLDR)) ↑.  \n- Step 3: Rising Vout reaches a threshold voltage that activates the lamp circuit.  \n\n> **Design logic:** The LDR must be *bottom* to make Vout increase with darkness. Opposite position would require darkness to turn it off.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "A thermistor is in series with a fixed resistor R. At 25°C, Vout across the thermistor is 3.75 V. At 60°C, Vout drops to 2.5 V. What does this say about the thermistor’s position? Prove with Ohm’s Law. (3 steps)", "answer": "- Step 1: Vout ↓ with ↑ temperature ⇒ Rth ↓ (Ohm’s Law: V = IR).  \n- Step 2: If the thermistor were *top*, Vth ↓ would imply ↑ Vout across R (since VR = Vin − Vth).  \n- Step 3: Since Vout (measured across the thermistor) decreases, the thermistor must be *top*.  \n\n> **Conclusion:** Voltage across the thermistor decreases when its resistance decreases, confirming it is the top resistor.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "In the potential divider formula $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$, explain why the resistor you want the voltage across must be placed in the numerator. (2 steps)", "answer": "- Step 1: The fraction $$\\frac{R_2}{R_1 + R_2}$$ represents the proportion of the total resistance that the output resistor ($R_2$) contributes to the circuit.\n- Step 2: Since the voltage across each resistor in a series circuit is proportional to its resistance (from $$V=IR$$ with constant current), the voltage across $$R_2$$ is exactly this fraction of the total supply voltage. If you wanted the voltage across the top resistor, you would simply swap $$R_2$$ for $$R_1$$ in the numerator.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A potential divider is connected to a 12 V supply. The top resistor is 2 $$\\Omega$$ and the bottom resistor is 4 $$\\Omega$$. What is the output voltage $$V_{out}$$? (2 steps)", "answer": "- Step 1: Identify the resistor you are taking the output across. Here, it is the 4 $$\\Omega$$ resistor ($$R_2$$). Apply the formula: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$.\n- Step 2: Substitute the values: $$12 \\times \\frac{4}{2 + 4} = 12 \\times \\frac{4}{6} = 12 \\times \\frac{2}{3} = 8.0 \\text{ V}$$.\n+ [Check]: The voltage should be more than half (since $$R_2 > R_1$$), and 8V is 2/3 of 12V. The ratio $$V_{out}/V_{in} = 4/6 = 2/3$$ matches the ratio of resistances $$4/2 = 2$$.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "A potentiometer is a continuously variable potential divider. Explain why it can output any voltage from 0 V up to the input voltage, whereas a standard variable resistor (rheostat) connected in series cannot. (3 steps)", "answer": "- Step 1: A potentiometer consists of a single resistive track with a sliding contact (wiper). The wiper effectively splits the one long resistor into two separate resistors, $$R_1$$ and $$R_2$$, connected in series.\n- Step 2: By moving the wiper, you change the ratio $$\\frac{R_2}{R_1 + R_2}$$ smoothly. When the wiper is at the very bottom, $$R_2 = 0$$ and $$V_{out} = 0$$. When at the top, $$R_2$$ equals the total resistance and $$V_{out} = V_{in}$$.\n- Step 3: A rheostat in series only changes the *total* resistance of the circuit, which changes the current, but it does not provide a variable voltage \"tap\" at a specific point to maintain a stable ratio. It controls current, not potential difference.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": true}, {"question": "A uniform resistance wire of length 100 cm is connected across a 6.0 V supply. A sliding contact is placed 25 cm from the positive end. Calculate the output voltage across the bottom section. (2 steps)", "answer": "- Step 1: For a uniform wire, resistance is proportional to length. The total length is 100 cm. If the contact is 25 cm from the positive (top) end, the bottom section (output) is $$100 - 25 = 75$$ cm.\n- Step 2: The voltage divides in the ratio of the lengths: $$V_{out} = V_{in} \\times \\frac{L_{bottom}}{L_{total}} = 6.0 \\times \\frac{75}{100} = 6.0 \\times 0.75 = 4.5 \\text{ V}$$.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "You connect a voltmeter (acting as a load) across the output of a potential divider. Explain why this causes the output voltage to decrease, even if the voltmeter has a very high resistance. (3 steps)", "answer": "- Step 1: Connecting a load places a resistor in **parallel** with the bottom output resistor of the divider.\n- Step 2: The combined resistance of two resistors in parallel is always **less than** the smallest individual resistor. This reduces the effective resistance of the bottom section of the divider.\n- Step 3: With a lower effective resistance at the bottom, the ratio $$\\frac{R_{bottom}}{R_{total}}$$ decreases. Consequently, the voltage across this section ($$V_{out}$$) decreases.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "What is the \"Rule of Thumb\" for the value of load resistance relative to the output resistor in a potential divider to minimize the loading effect? (1 step)", "answer": "- Step 1: The load resistance ($$R_L$$) should be at least **10 times** greater than the output resistor ($$R_2$$) across which the voltage is taken ($$R_L \\geq 10 R_2$$). This ensures the equivalent parallel resistance is close to $$R_2$$, so the voltage divider ratio remains nearly unchanged.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Define an NTC thermistor and explain the fundamental reason its resistance decreases with temperature. (2 steps)", "answer": "- Step 1: NTC stands for **Negative Temperature Coefficient**. It is a temperature-dependent resistor.\n- Step 2: As temperature increases, the thermistor material absorbs thermal energy. This releases more charge carriers (electrons), making it easier for current to flow. Since $$R = V/I$$, a higher current for the same voltage implies a lower resistance.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "In a potential divider circuit, the NTC thermistor is the **top** resistor and a fixed resistor is at the **bottom**. The temperature increases. Describe what happens to the voltage across the fixed resistor (the output). (3 steps)", "answer": "- Step 1: Temperature increases $$\\Rightarrow$$ Thermistor resistance decreases (NTC behavior).\n- Step 2: Because the current in the series circuit is constant, and the thermistor (top) resistance has decreased, the voltage across it ($$V = IR$$) must decrease.\n- Step 3: By Kirchhoff's Voltage Law, the total voltage is constant ($$V_{in} = V_{thermistor} + V_{fixed}$$). Since $$V_{thermistor}$$ has decreased, $$V_{fixed}$$ (across the bottom resistor) must increase.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "A darkness sensor uses an LDR (Light Dependent Resistor) as the **bottom** resistor in a potential divider. It gets darker. Describe what happens to the output voltage across the LDR. (3 steps)", "answer": "- Step 1: It gets darker $$\\Rightarrow$$ Light intensity decreases $$\\Rightarrow$$ LDR resistance increases (LDR behavior).\n- Step 2: In a series circuit, voltage is proportional to resistance. Since the LDR (bottom) resistance has increased, its share of the voltage increases.\n- Step 3: Therefore, the voltage across the LDR ($$V_{out}$$) **increases**.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A student writes down \"$$R = IV$$\". Explain why this is incorrect and state the correct relationship between Resistance, Current, and Voltage. (2 steps)", "answer": "- Step 1: The student has rearranged the formula incorrectly. The correct relationship is **Ohm's Law**: $$V = IR$$.\n- Step 2: Rearranging for Resistance gives $$R = \\frac{V}{I}$$. The term $$IV$$ has units of Ampere-Volts, which is Watts (Power), not Ohms.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In a potential divider used as a temperature sensor, if the thermistor is positioned at the **bottom** (output is taken across it), what happens to $$V_{out}$$ as temperature rises? (3 steps)", "answer": "- Step 1: Temperature rises $$\\Rightarrow$$ Thermistor resistance decreases.\n- Step 2: The output is taken across the thermistor (bottom). Since the resistance of the bottom resistor has decreased, the fraction $$\\frac{R_{bottom}}{R_{total}}$$ becomes smaller.\n- Step 3: Therefore, the output voltage $$V_{out}$$ **decreases**.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A potential divider has $$R_1 = 10 \\text{ k}\\Omega$$ and $$R_2 = 10 \\text{ k}\\Omega$$ connected to a 5 V supply. A load of $$1 \\text{ k}\\Omega$$ is connected across $$R_2$$. Will the loaded $$V_{out}$$ be higher or lower than 2.5 V? Explain your reasoning. (3 steps)", "answer": "- Step 1: With no load, the voltages are equal (ratio 1:1), so $$V_{out} = 2.5$$ V.\n- Step 2: The load ($$1 \\text{ k}\\Omega$$) is in parallel with $$R_2$$ ($$10 \\text{ k}\\Omega$$). The parallel combination $$R_{eq} = \\frac{10 \\times 1}{10 + 1} \\approx 0.91 \\text{ k}\\Omega$$.\n- Step 3: This combined resistance is much less than $$R_2$$. It acts as a single small resistor in series with $$R_1$$. The voltage will now be shared mostly across $$R_1$$ (10k) rather than equally. Thus, $$V_{out}$$ will be **significantly lower** than 2.5 V.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "You need to design a circuit that turns on a heater when the temperature drops below a certain point using a thermistor. Should the thermistor be the top or bottom resistor in a potential divider connected to a fixed reference voltage? (2 steps)", "answer": "- Step 1: We want the output voltage to trigger the heater switch (turn ON) when it gets cold.\n- Step 2: When cold, the thermistor resistance is **high**. We want a **high** output voltage to activate the switch. Therefore, the thermistor should be the **bottom** resistor. High thermistor resistance $$\\Rightarrow$$ large fraction of voltage taken $$\\Rightarrow$$ high $$V_{out}$$.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}], "count": 13}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A potential divider consists of two resistors R1 and R2 connected in series across a supply voltage Vin. Using the fact that the current is the same everywhere in a series circuit, derive the formula for the output voltage Vout taken across R2. (3 steps)", "answer": "- Step 1: In a series circuit, the same current I flows through both resistors. From Ohm's Law, I = Vin/(R1 + R2), where (R1 + R2) is the total resistance.\n- Step 2: The voltage across each resistor follows V = IR. So V1 = I × R1 and V2 = I × R2. Since I is the same for both, the ratio of voltages equals the ratio of resistances: V1/V2 = R1/R2.\n- Step 3: Substitute the expression for I from Step 1 into V2: Vout = V2 = (Vin/(R1 + R2)) × R2 = Vin × R2/(R1 + R2). This is the potential-divider formula—the output voltage is the fraction of the input voltage equal to the ratio of the output resistance to the total resistance.\n\nThe key insight: voltage divides in proportion to resistance because the current is identical throughout a series circuit. This is why V ∝ R in a series divider.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "In a potential divider circuit, if R1 = 2 kΩ and R2 = 4 kΩ connected to a 12 V supply, what is the voltage across R2? Also explain why V1 + V2 equals Vin. (2 steps)", "answer": "- Step 1: Apply the formula directly: Vout = Vin × R2/(R1 + R2) = 12 V × 4 kΩ/(2 kΩ + 4 kΩ) = 12 × 4/6 = 8.0 V.\n- Step 2: V1 + V2 = Vin because of Kirchhoff's Voltage Law (the \"electrical voltages rule\"): the sum of potential differences around any closed loop must equal the total emf supplied. Here, the loop goes from the battery (Vin) through R1 and R2 and back, so Vin = V1 + V2. From our calculation: V1 = 12 − 8 = 4 V, and 4 + 8 = 12 ✓\n\nThis is a powerful check: always verify that your individual voltage drops sum to the supply voltage.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A student writes \"Vout = Vin × (R1/(R1 + R2))\" for the output voltage across R2. Explain why this is incorrect and state the correct formulation. What is the general rule for which resistor goes in the numerator?", "answer": "- Step 1: The student's formula is inverted. It gives the voltage across R1, not R2. If you want Vout across R2, then R2 must be in the numerator.\n- Step 2: The general rule is: **the resistor whose voltage you are finding goes on top of the fraction**. Think of it as \"the voltage across X is proportional to X's fraction of the total resistance.\"\n- Quick check: If R2 = 0 Ω, there should be 0 V across it. Using R2 in numerator: Vout = Vin × 0/(R1+0) = 0 ✓. Using R1 in numerator: Vout = Vin × R1/(R1+0) = Vin ✗\n\nThis is one of the most common exam errors—always identify which resistor your output is across before substituting.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "What is the key difference between a rheostat and a potentiometer, and why does a potentiometer allow Vout to range from 0 to Vin while a rheostat used as a variable resistor cannot achieve this? (2 steps)", "answer": "- Step 1: A rheostat has only two terminals—it's a variable resistance in series with the load, controlling current. A potentiometer has three terminals: two fixed ends of a resistive track and a sliding contact. The output is taken between the sliding contact and one end, creating two series resistors whose ratio changes as you slide.\n- Step 2: With a potentiometer, moving the slider to the bottom makes the lower resistance zero, giving Vout = 0. Moving to the top makes the lower resistance equal the total, giving Vout = Vin. A rheostat in series can only reduce the total resistance but can never make the voltage across the load equal to the supply voltage (there's always some resistance in the circuit).\n\nThe potentiometer gives true 0-to-Vin control; the rheostat gives limited range. This is why volume controls use potentiometers.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A uniform resistance wire of total length Ltotal = 80 cm is connected across a 6.0 V supply. A sliding contact is positioned 30 cm from the top end. Derive why Vout can be calculated using length ratios, and find Vout. (3 steps)", "answer": "- Step 1: For uniform wire, resistance is proportional to length (R ∝ L). Since the wire is uniform, the same current flows through both sections, so voltage also divides in proportion to length.\n- Step 2: The bottom section length = Ltotal − 30 cm = 50 cm. The fraction of the total length for the bottom section = 50/80 = 5/8.\n- Step 3: Vout = Vin × (Lbottom/Ltotal) = 6.0 V × 50/80 = 6.0 × 0.625 = 3.75 V. Alternatively, using resistance: if R ∝ L, then Rbottom/Rtotal = 50/80, so the voltage ratio is identical.\n\nThis is why potentiometer problems can be solved using length ratios directly—very useful for exam questions.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A 7.5 V supply feeds a potential divider with R1 = 12 Ω (top) and R2 = 6.0 Ω (bottom). Calculate Vout when no load is connected, then explain what happens when a lamp of resistance 6.0 Ω is connected across R2. Why does Vout decrease? (3 steps)", "answer": "- Step 1 (Unloaded): Using the divider formula: Vout = 7.5 × 6.0/(12 + 6.0) = 7.5 × 6/18 = 7.5 × 1/3 = 2.5 V.\n- Step 2 (Loaded): The lamp (RL = 6.0 Ω) is in parallel with R2 (6.0 Ω). The combined resistance: RBC = (6.0 × 6.0)/(6.0 + 6.0) = 36/12 = 3.0 Ω. This is less than the original R2 = 6.0 Ω.\n- Step 3 (Why Vout decreases): With the parallel combination, the bottom resistance drops from 6.0 Ω to 3.0 Ω. Now Vout = 7.5 × 3.0/(12 + 3.0) = 7.5 × 3/15 = 1.5 V. The voltage drops because: (a) total resistance falls, so current increases; (b) the increased current causes a larger voltage drop across R1; (c) less voltage remains for the output.\n\nThe load \"loads\" the divider—it draws current, changing the effective resistance at the output. This is why we connect voltmeter inputs (high resistance) to minimize loading effects.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What is the \"rule of thumb\" for ensuring a load resistor does not significantly affect the output voltage of a potential divider? Explain why this rule works using the parallel resistance formula.", "answer": "- Step 1: The rule is RL ≥ 10 × R2 (load resistance should be at least 10 times the output resistor). If R2 = 1 kΩ, use RL ≥ 10 kΩ.\n- Step 2: When R2 and RL are in parallel, the combined resistance is RBC = (R2 × RL)/(R2 + RL). If RL >> R2, then R2 + RL ≈ RL, so RBC ≈ (R2 × RL)/RL = R2. The combined resistance is almost exactly R2—the load has negligible effect.\n- Quick calculation: If RL = 10R2, then RBC = (R2 × 10R2)/(R2 + 10R2) = 10R2²/11R2 = (10/11)R2 ≈ 0.91R2. Only a ~9% reduction. If RL = R2, then RBC = R2/2—a 50% reduction!\n\nThis rule is crucial for sensor circuits: your voltmeter or control circuit must have high enough resistance not to \"load down\" the divider.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": true}, {"question": "An NTC thermistor is used in a potential divider with a fixed resistor R. The output is taken across the thermistor (bottom position). When temperature increases, what happens to the voltage across the thermistor? Explain using the chain of reasoning: environment change → sensor R → sensor V → other resistor V. (3 steps)", "answer": "- Step 1: Temperature increases → thermistor resistance decreases (NTC behavior: electrons gain thermal energy and flow more easily).\n- Step 2: Since V = IR and the current I is the same through both resistors (series), when Rth decreases, the voltage across it also decreases (V ∝ R).\n- Step 3: By Kirchhoff's Voltage Law, VR = Vin − Vth. As Vth decreases, VR increases. So the voltage across the fixed resistor increases.\n\nThis three-step chain is exactly what examiners want for 3-mark \"state and explain\" questions. Always ma
