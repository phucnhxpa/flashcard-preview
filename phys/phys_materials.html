\\mathrm{N}$$ weight hung on it. Without computing exactly, sketch the order of magnitude of the extension and explain why the new length is barely different from the natural length. (3 steps)", "answer": "- Step 1: From $$x = F/k = 12/8500$$, the extension is on the order of $$10/10^4 = 10^{-3}\\,\\mathrm{m}$$, i.e. about a millimetre. Specifically, $$\\sim 1.4\\,\\mathrm{mm}$$.\n- Step 2: Compared to the natural length of 50 mm, the extension is less than 3% — small but not negligible.\n- Step 3: Physical interpretation: a stiff spring (large $$k$$) resists stretching strongly, so even a moderate force produces only a small extension. The new length 5.0 cm + 0.14 cm ≈ 5.14 cm — barely changed from natural.\n\nSanity check: if $$k$$ were instead 85 N/m (a soft spring), the same 12 N would give 14 cm extension — totally different regime.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "A steel cable of diameter $$30\\,\\mathrm{mm}$$, length $$25\\,\\mathrm{m}$$, supports a load of $$20\\,\\mathrm{kN}$$ with Young modulus $$200\\,\\mathrm{GPa}$$. Without doing the exact arithmetic, estimate the order of magnitude of the extension and check it makes sense. (3 steps)", "answer": "- Step 1: Stress: $$\\sigma = F/A$$. $$F \\sim 2\\times10^4\\,\\mathrm{N}$$, $$A \\sim \\pi(15\\times10^{-3})^2 \\sim 7\\times10^{-4}\\,\\mathrm{m^2}$$. So $$\\sigma \\sim 3\\times10^7\\,\\mathrm{Pa}$$.\n- Step 2: Strain: $$\\varepsilon = \\sigma/E = 3\\times10^7 / 2\\times10^{11} \\sim 10^{-4}$$. This is a tiny fractional stretch — typical of metals in the elastic region.\n- Step 3: Extension: $$\\Delta L = \\varepsilon L \\sim 10^{-4} \\times 25 \\sim 2.5\\times10^{-3}\\,\\mathrm{m}$$ = a few mm.\n\nSanity check: a 25-metre steel cable stretching only millimetres under 2 tonnes of load is consistent with steel's very high Young modulus. If the answer came out as centimetres or metres, something would be wrong by orders of magnitude — likely an area error from $$\\pi d^2$$ instead of $$\\pi(d/2)^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "A 200 kg piano hangs from a single steel wire. Given mild steel's breaking strength of 500 MPa, what conceptual steps determine the minimum wire diameter? (4 steps)", "answer": "- Step 1: Convert mass to weight to find the tensile force the wire must support: $$F = mg \\sim 2\\times10^3\\,\\mathrm{N}$$.\n- Step 2: At the breaking limit, $$\\sigma = F/A$$ reaches the breaking strength. So the *minimum* area is $$A_{\\min} = F/\\sigma_{\\text{break}}$$.\n- Step 3: From minimum area to minimum diameter: $$A = \\pi(d/2)^2$$, so $$d = 2\\sqrt{A/\\pi}$$.\n- Step 4: Sanity check: with $$F \\sim 2000\\,\\mathrm{N}$$ and stress $$5\\times10^8\\,\\mathrm{Pa}$$, area $$\\sim 4\\times10^{-6}\\,\\mathrm{m^2}$$, radius $$\\sim 10^{-3}\\,\\mathrm{m}$$, diameter $$\\sim 2\\,\\mathrm{mm}$$. Reasonable: a 2 mm steel wire holding 200 kg is plausible but at the limit — no safety factor.\n\nIn practice, an engineer would use a much thicker wire (safety factor 2-10×); the calculated value is a theoretical minimum.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "A rubber band of natural length 8.4 cm is stretched to a strain of 2.45. Why does this value of strain seem absurdly large for a metal but reasonable for rubber? (3 steps)", "answer": "- Step 1: Strain of 2.45 means $$\\Delta L/L_0 = 2.45$$ — the extension is 2.45 times the original length, so the band's new length is 3.45 times its original (about 29 cm from 8.4 cm).\n- Step 2: For a metal, strains in the elastic region are typically $$10^{-3}$$ to $$10^{-4}$$. Even at fracture, metal strains rarely exceed 0.3 (30%). A strain of 2.45 in steel would shatter it many times over.\n- Step 3: For polymers like rubber, the long-chain molecules are coiled up at rest and uncoil under stretching, allowing strains of several hundred percent without breaking bonds. The chains are flexible at room temperature, so the material can deform enormously while still returning when released.\n\nThis is why rubber behaviour can't be described by Hooke's law — the stress-strain curve is non-linear from the start, and $$\\tfrac12 Fx$$ cannot be used for energy.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "When measuring Young modulus of a wire with Searle's apparatus, why is a *control* wire used alongside the test wire?", "answer": "The control wire is identical to the test wire and hangs from the same support, but it carries only a fixed small reference load. Its purpose is to compensate for **systematic errors that affect both wires equally**: thermal expansion (the support and both wires shift in temperature with the room), any sagging or yielding of the support structure, and any drift in the reference scale position. Since extension is measured as the *difference* between the test and control wire positions (e.g., via a Vernier scale attached to one and a main scale to the other), any common-mode shift cancels out. Without the control wire, you'd be measuring the test wire's extension plus all the environmental noise — leading to a systematically wrong Young modulus.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "Why do percentage uncertainties combine differently for products and powers compared to sums and differences? (3 steps)", "answer": "- Step 1: For a product $$z = xy$$, fractional uncertainties add: $$\\Delta z/z = \\Delta x/x + \\Delta y/y$$. This is because a 1% error in $$x$$ scales $$z$$ by 1%, independent of $$y$$, so errors compound multiplicatively when expressed as fractions.\n- Step 2: For a power $$z = x^n$$, the fractional uncertainty multiplies by the power: $$\\Delta z/z = n\\,\\Delta x/x$$. Example: area $$A \\propto d^2$$, so a 0.2% error in $$d$$ becomes a 0.4% error in $$A$$. Doubling: 0.5% → 1%, etc.\n- Step 3: For sums/differences $$z = x \\pm y$$, *absolute* uncertainties add: $$\\Delta z = \\Delta x + \\Delta y$$. This means subtracting two similar numbers can give catastrophic *relative* uncertainty (the \"subtraction trap\"), e.g., subtracting two lengths to find a small extension.\n\nPractical implication: when computing Young modulus from $$FL/(A\\Delta L)$$, area's uncertainty doubles from diameter's because of the square.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Why is \"stress\" measured in pascals — the same unit as pressure — but they describe different physical concepts? (3 steps)", "answer": "- Step 1: Both stress and pressure are force per unit area, so they share the unit $$\\mathrm{N\\,m^{-2}} = \\mathrm{Pa}$$. Dimensionally identical.\n- Step 2: **Pressure** describes a fluid or gas pushing on a surface — it's a scalar, acts equally in all directions at a point, and is perpendicular to any surface it contacts.\n- Step 3: **Stress** describes internal forces *within* a deformable solid — it's a tensor (it has direction and orientation), can be tensile (pulling apart) or compressive (pushing together), and can also include shear components parallel to a surface.\n\nSo pressure is a special case of normal compressive stress acting equally in all directions, typical of fluids. Stress in solids is more general. Sharing the unit is a coincidence of definition (force/area), not a statement that they are physically the same thing.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "A force of $$160\\,\\mathrm{N}$$ extends a copper wire by $$2.7\\,\\mathrm{cm}$$. Conceptually walk through finding the stiffness without doing the actual arithmetic. (3 steps)", "answer": "- Step 1: Identify what's given: force and extension only. Original length and cross-sectional area are NOT given, so this can't be a Young modulus question — it must be a Hooke's law question. Target: $$k$$.\n- Step 2: Convert extension to SI units (cm → m, i.e., multiply by $$10^{-2}$$). This is essential because $$k$$ must be in $$\\mathrm{N\\,m^{-1}}$$.\n- Step 3: Apply $$k = F/x$$. Sanity check magnitude: force ~ hundreds of N, extension ~ $$10^{-2}$$ m, so $$k$$ should be on the order of $$10^4\\,\\mathrm{N\\,m^{-1}}$$ — a moderately stiff wire.\n\nThe discipline: identify the formula by which quantities are given, not by what feels familiar.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "A volume question asks for the volume of a sphere where the diameter is given in cm and the final answer is needed in $$\\mathrm{m^3}$$. Why is the cubed unit conversion easy to get wrong? (3 steps)", "answer": "- Step 1: The conversion factor 1 cm = $$10^{-2}$$ m applies to length. When cubed, $$1\\,\\mathrm{cm^3} = (10^{-2}\\,\\mathrm{m})^3 = 10^{-6}\\,\\mathrm{m^3}$$ — the exponent of 10 multiplies by 3.\n- Step 2: Common error: forgetting the cubing and using $$10^{-2}$$ as the volume conversion. This makes the result $$10^4$$ times wrong — off by orders of magnitude.\n- Step 3: To avoid: either (a) convert all lengths to metres *first*, then compute volume in $$\\mathrm{m^3}$$ directly; or (b) compute volume in $$\\mathrm{cm^3}$$ and then multiply by $$10^{-6}$$ to get $$\\mathrm{m^3}$$. Don't mix.\n\nDensity conversion follows the same logic: $$1\\,\\mathrm{g\\,cm^{-3}} = 10^{-3}\\,\\mathrm{kg} / 10^{-6}\\,\\mathrm{m^3} = 10^3\\,\\mathrm{kg\\,m^{-3}}$$. The factor is $$10^3$$, not $$10^5$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Why does a force-extension graph that curves before reaching the limit of proportionality not exist in practice for a Hookean spring?", "answer": "A Hookean spring, by definition, obeys $$F = kx$$ over its entire elastic range — the relationship is strictly linear up to the limit of proportionality. Curvature in the graph before this limit would mean the spring constant varies with extension, which contradicts the proportionality statement. In real springs, the graph is straight from the origin (within experimental error) up to the limit of proportionality, then begins to curve as the material's microscopic potential energy stops being parabolic. The straight-line region is what Hooke's law captures; curvature beyond it is the breakdown of the linear approximation. So a Hookean material has a sharp transition between straight and curved, not a gradual curve from zero.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "What is the difference between \"the elastic strain energy in a wire\" and \"the elastic strain energy per unit volume\", and when would you use each? (3 steps)", "answer": "- Step 1: **Total elastic strain energy** $$E_e = \\tfrac12 Fx = \\tfrac12 kx^2$$ has units of joules and refers to the specific sample (a particular wire of length $$L$$ and area $$A$$). It depends on the geometry.\n- Step 2: **Energy density** $$u = E_e/V = \\tfrac12 \\sigma\\varepsilon$$ has units $$\\mathrm{J\\,m^{-3}}$$ and characterises the *material's* energy storage per cubic metre at a given strain. Independent of geometry.\n- Step 3: When to use each:\n+ Use total $$E_e$$ when asked about a specific sample (e.g., \"how much energy is stored in this 45 m rail when pre-strained?\").\n+ Use $$u$$ when comparing materials (e.g., \"which material absorbs more energy per cubic metre before failing?\"). Total energy = $$u \\times V = u \\times AL$$.\n\nThe relation parallels mass vs. density: one is sample-specific, the other is material-only.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Why is a brittle material's behaviour described as \"snapping without warning\", and what does this look like on a stress-strain graph? (3 steps)", "answer": "- Step 1: Brittle materials (glass, ceramic) have essentially no plastic region — the stress-strain curve is straight and stops abruptly with little or no curving.\n- Step 2: Just before fracture, there is no visible necking, no significant non-linearity — the material behaves elastically right up to the breaking point. So a user inspecting the sample sees no obvious signs of imminent failure.\n- Step 3: This contrasts with ductile materials, which neck visibly (thin locally) and stretch substantially in the plastic region before fracturing — giving warning. Brittle failure can be catastrophic in engineering because there's no time to detect and respond before collapse.\n\nGraph-wise: brittle = straight line ending in a sudden point of fracture. Ductile = long curved plastic region with visible UTS peak before fracture.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "A bolt 5 cm long with cross-sectional area $$0.25\\,\\mathrm{cm^2}$$ must extend by no more than $$0.02\\,\\mathrm{mm}$$ under a $$90\\,\\mathrm{kg}$$ load. Conceptually outline the steps to find the *minimum* Young modulus. (4 steps)", "answer": "- Step 1: Convert mass to force (weight): $$F = mg$$. This is the tensile load the bolt must support.\n- Step 2: The condition is \"extends by no more than $$\\Delta L_{\\max}$$\". For a given $$F$$, $$L_0$$, and $$A$$, the extension is $$\\Delta L = FL_0/(AE)$$. So a *larger* $$E$$ produces a *smaller* extension. The minimum $$E$$ is the one that makes $$\\Delta L$$ exactly equal to the maximum allowed.\n- Step 3: Rearrange for $$E$$: $$E_{\\min} = FL_0/(A \\Delta L_{\\max})$$. The smaller the allowed extension, the larger $$E$$ must be.\n- Step 4: Convert all units to SI before substituting — cm → m, cm² → m², mm → m. Sanity-check the answer's order of magnitude against typical material values (metals ~10¹¹ Pa).\n\nThe exam trap: remembering that \"minimum modulus\" corresponds to \"maximum allowed extension\" — they vary inversely.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "A copper wire is stretched and the extension is measured. Why might a single measurement give a misleading value for the spring constant, and how does a force-extension graph improve this?", "answer": "A single measurement of $$(F, x)$$ pair gives $$k = F/x$$, but this includes any zero-offset error, sticking, or non-linearity at low loads, and there's no way to detect random fluctuations. By plotting many $$(F, x)$$ points and drawing a best-fit straight line through them, you (a) average out random scatter by fitting all points simultaneously, (b) automatically subtract any offset by using the *gradient* rather than absolute values, (c) visually identify the limit of proportionality as the point where the line stops being straight, and (d) detect outliers. The gradient $$\\Delta F/\\Delta x$$ taken over the full linear range is much more reliable than any single point. This is why graph-based analysis is standard practice for stiffness measurements.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Three brass alloys are made of copper and zinc with these volume fractions: 50/50, 70/30, and 90/10 (copper/zinc). Without numbers, predict which alloy has the highest density and why.", "answer": "Copper is denser than zinc ($$8.9 \\times 10^3$$ vs. $$7.1\\times 10^3\\,\\mathrm{kg\\,m^{-3}}$$), so the more copper an alloy contains by volume, the higher its density. The volume-weighted density is $$\\rho = f_{\\text{Cu}}\\rho_{\\text{Cu}} + f_{\\text{Zn}}\\rho_{\\text{Zn}}$$, which increases monotonically with $$f_{\\text{Cu}}$$. So the 90/10 alloy is densest, the 50/50 is least dense, and 70/30 sits in between. The relationship is linear in volume fraction — doubling the copper content does not double the density, but pushes it linearly toward pure copper's value of $$8.9 \\times 10^3$$. If instead the alloys were mixed by *mass* fraction, the relationship would be harmonic (reciprocals add), and the ordering could be different.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Why does Hooke's law $$F = kx$$ assume the spring is massless, and what changes for a real spring with significant mass? (3 steps)", "answer": "- Step 1: $$F = kx$$ assumes the only force stretching the spring is the externally applied force. For a horizontal massless spring, this is exact.\n- Step 2: For a vertical real spring, gravity acts on the spring's own mass, causing each section to extend slightly under the weight of everything below it. The bottom of the spring is unstretched (no weight below it); the top is most stretched (supports full spring weight plus any added mass).\n- Step 3: For laboratory springs in A-level questions, the spring's mass is typically negligible compared to the loaded mass, so $$F = kx$$ remains a good approximation. The error is on the order of $$m_{\\text{spring}}/m_{\\text{load}}$$. The video question explicitly says \"the weight of the springs is negligible\" to license this approximation.\n\nReal engineering applications (long cables under their own weight) require corrections — the cable's own weight contributes to the stress distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "When the same force is applied, why does a longer wire of the same material stretch more than a shorter wire?", "answer": "Think of the wire as a chain of atomic bonds stretched in series along its length. Each bond stretches by a small amount under the applied force. A longer wire contains more bonds in series — twice as long means twice as many bonds — and the total extension is the sum of all individual bond extensions. So the total extension is proportional to length, leading to $$\\Delta L = FL/(AE)$$. Equivalently: the *strain* (fractional stretch) is the same for both wires under the same stress, because strain is a material property at given stress. But strain × length = extension, so a longer wire gives a larger absolute extension. This is also why $$k \\propto 1/L$$: a longer wire is \"softer\" because the same force produces more total extension.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "A wire is doubled in cross-sectional area (e.g., diameter increased by $$\\sqrt{2}$$). What happens to the spring constant $$k$$ and to the Young modulus $$E$$? (3 steps)", "answer": "- Step 1: From $$k = EA/L$$: doubling $$A$$ doubles $$k$$. The wire is twice as stiff because there are twice as many parallel atomic bonds across the section, sharing the load equally.\n- Step 2: Young modulus $$E$$ does not change. $$E$$ is a material property — it depends on the strength of individual bonds, not on how many bonds there are.\n- Step 3: Physical picture: thicker wire = more bonds in parallel = stiffer object (higher $$k$$), but each bond is identical to before, so the *material* is the same (same $$E$$). This is the parallel-springs analogy at the atomic scale.\n\nTakeaway: geometry changes $$k$$; material changes $$E$$.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "Why is the area under a force-extension graph equal to the work done on the spring, and why is this energy \"stored\" rather than lost? (3 steps)", "answer": "- Step 1: Work done = force × distance for a constant force. When force varies with position, the total work is the integral $$W = \\int F\\,dx$$ — geometrically, this is the area under the force-distance graph.\n- Step 2: For a spring obeying Hooke's law, the force varies linearly with extension, so the area is a triangle: $$W = \\tfrac12 Fx$$. This is the work the external agent does to stretch the spring.\n- Step 3: In an *elastic* deformation (within the elastic limit), no energy is dissipated — the work goes into raising the potential energy of the stretched bonds. On release, the bonds relax and return all this energy as kinetic energy (or to whatever is attached). Hence it's \"stored\" elastic strain energy, fully recoverable. Beyond the elastic limit, some energy is dissipated as heat during plastic deformation, and the recoverable fraction decreases.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "What is the physical meaning of toughness, and how is it different from strength on a stress-strain graph? (3 steps)", "answer": "- Step 1: **Strength** is the maximum stress a material can withstand, read as the *peak* (UTS) of the stress-strain curve. A strong material can hold a high load before failing.\n- Step 2: **Toughness** is the total energy a material absorbs per unit volume before fracturing — the *total area under the stress-strain curve up to fracture*. A tough material can absorb a lot of energy (impact, vibration) before breaking.\n- Step 3: The two are independent:\n+ Glass is strong (high UTS) but not tough (small area — brittle fracture).\n+ Mild steel is moderately strong but very tough (large area — long plastic region absorbs huge energy).\n+ Rubber has low UTS but moderate-to-high toughness because the curve extends to very large strains.\n\nEngineering choice: bridges and crash-resistant structures need toughness; cutting tools and pressure vessels need strength.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "What is \"necking\" in a tensile test, and what does it have to do with the downturn of the engineering stress-strain curve after UTS? (3 steps)", "answer": "- Step 1: As a ductile metal is stretched into its plastic region, deformation eventually localises into a small section — that section thins more than the rest, forming a visible \"neck\".\n- Step 2: At the neck, the actual cross-sectional area shrinks. The load on the sample can actually *fall* (because the necked region is now thinner and the material can't sustain as much total force), even though the *true* stress at the neck (force divided by instantaneous area) keeps rising.\n- Step 3: Engineering stress uses the original (fixed) area $$A_0$$ in its definition. So when the load falls during necking, engineering stress = load/$$A_0$$ also falls — producing the downturn after UTS. The *true stress* (using instantaneous area) would not show this downturn.\n\nSo the falling part of the engineering curve is an artifact of the area convention, not a sign of material weakness.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "Conceptually, why does increasing the radius of a wire reduce extension under a fixed load, but increasing the length of the wire increases extension? (3 steps)", "answer": "- Step 1: From $$\\Delta L = FL/(AE)$$, extension is proportional to $$L$$ and inversely proportional to $$A$$. The geometry has two opposite effects.\n- Step 2: **Why $$A$$ in denominator**: more cross-sectional area means more bonds in *parallel* across the section, sharing the load. Each bond carries less force, so each stretches less. The wire is stiffer overall.\n- Step 3: **Why $$L$$ in numerator**: more length means more bonds in *series* along the wire. Even if each bond stretches the same tiny amount (same stress → same strain), there are more of them adding up, giving more total extension.\n\nSo thicker = more parallel paths = stiffer = less extension. Longer = more series links = more cumulative stretch = more extension. The two effects together explain $$k = EA/L$$.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "Why does the unloading line, for a sample stretched past its elastic limit, run parallel to the original elastic loading line?", "answer": "Both the loading line (in the elastic region) and the unloading line are governed by the *elastic* response of the material — the relaxation of stretched but unbroken bonds. The Young modulus $$E$$ characterises this elastic response, and it is essentially unchanged by plastic deformation (the bonds that recover are still the same atomic bonds with the same stiffness). So the slope $$dE/d\\sigma = 1/E$$ (or $$dF/dx = k$$) is the same on unloading as on loading. The difference is that the unloading line is *shifted* along the strain axis by the amount of permanent plastic strain — bonds that broke and reformed in new positions stay in those positions and don't contribute to the recovery. The geometric result: parallel lines, offset by the permanent strain.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "A spring of natural length $$210\\,\\mathrm{mm}$$ and $$k = 240\\,\\mathrm{N\\,m^{-1}}$$ supports an $$8\\,\\mathrm{N}$$ load. Why might a student answer \"the spring is now about 24 cm long\" but get this wrong?", "answer": "The extension is $$x = F/k = 8/240 \\approx 0.033\\,\\mathrm{m} = 3.3\\,\\mathrm{cm}$$. Adding to the natural length: $$21\\,\\mathrm{cm} + 3.3\\,\\mathrm{cm} \\approx 24.3\\,\\mathrm{cm}$$. So \"about 24 cm\" is roughly right for a *single* spring under 8 N. The mistake comes when students confuse the question: if \"two in series\" was meant, the *chain* length is $$2 \\times 24.3 = 48.6\\,\\mathrm{cm}$$; if \"two in parallel\", each spring shares 4 N, so each spring's length is $$21 + (4/240) \\times 100 \\approx 22.7\\,\\mathrm{cm}$$. The trap is to compute the single-spring case and label it as the answer for a series/parallel configuration — always identify which configuration first, then apply the appropriate force per spring.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "Why must you use the *original* unstressed length of a wire when computing strain, even after the wire has been stretched many times in repeated trials? (3 steps)", "answer": "- Step 1: Engineering strain is defined as $$\\varepsilon = (L - L_0)/L_0$$ where $$L_0$$ is the original unstressed length. The convention fixes the reference state.\n- Step 2: If the wire has been stretched into its plastic region, it has a new unstressed length $$L_0' > L_0$$ (permanent extension). For *new* tests starting from this state, you'd use $$L_0'$$ as the reference. But within any one test where you're just loading and elastically stretching, you use whatever the unloaded length is at the start of that test.\n- Step 3: For Young modulus determination, always start from the unstretched state and ensure no plastic deformation has occurred during the test — otherwise the reference $$L_0$$ is ambiguous.\n\nTakeaway: strain references the unstressed state at the start of the test; don't update it mid-stretch.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": true}, {"question": "A 50 mm bridge cable supports a force of 4 kN. Roughly, what is the stress, and is the cable in danger of yielding (steel yields around 250 MPa)? (3 steps)", "answer": "- Step 1: Area: $$A = \\pi(d/2)^2 = \\pi(25\\times 10^{-3})^2 \\approx 2\\times 10^{-3}\\,\\mathrm{m^2}$$.\n- Step 2: Stress: $$\\sigma = F/A = 4000/2\\times 10^{-3} = 2\\times 10^6\\,\\mathrm{Pa} = 2\\,\\mathrm{MPa}$$.\n- Step 3: Steel yields at ~250 MPa, so a stress of 2 MPa is over 100 times smaller than the yield stress. The cable is operating well within the elastic region, with an enormous safety factor — appropriate for a structure where failure could be catastrophic.\n\nThis sanity check illustrates why bridge cables look \"overdesigned\": they need to handle dynamic loads, fatigue, and have huge safety margins.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "When pre-straining a railway track at 8°C with a strain of $$3 \\times 10^{-4}$$, given thermal strain of $$2.5 \\times 10^{-5}$$ per Kelvin, the engineer aims for the rail to become unstressed at a specific temperature. Conceptually, why is that temperature 20°C? (3 steps)", "answer": "- Step 1: The pre-strain is tensile — the rail is stretched. As temperature rises, the rail wants to expand thermally, which would *relieve* the pre-existing tension. The rail becomes unstressed when the would-be thermal expansion exactly equals the pre-strain.\n- Step 2: Thermal strain per Kelvin is $$2.5 \\times 10^{-5}$$. To accumulate a strain of $$3 \\times 10^{-4}$$, the temperature must rise by $$3 \\times 10^{-4} / 2.5 \\times 10^{-5} = 12\\,\\mathrm{K}$$.\n- Step 3: Starting from 8°C and adding 12 K gives 20°C. At this temperature, the thermal expansion the rail \"would have done\" (had it been free) exactly cancels the pre-stretch — leaving zero net stress.\n\nAbove 20°C, the rail experiences compressive stress (it wants to expand but can't). Below 20°C (and certainly at 8°C laying time), it experiences tension. Pre-straining lets the engineer choose where on this temperature range the zero-stress point falls.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": true}, {"question": "Why is \"extension\" different from \"displacement\" in some physics contexts, even though they share units of length?", "answer": "Both have units of metres, but they describe different things. **Extension** specifically refers to the *change in length* of a deformable object (a spring, wire, rubber band) under load — it's a property of the object's deformation, always measured from the unstressed reference state. **Displacement** is the more general vector quantity describing how far an object's position has changed from a reference point — it can apply to a particle, a rigid body, etc., and it's a vector with direction. In Hooke's law $$F = kx$$, the $$x$$ is technically an extension (scalar), but the formula is often written using $$x$$ as if it were a displacement because for a 1D spring the two coincide in magnitude. In the PhET simulation, \"displacement\" of the block from equilibrium is the spring's extension.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "What is the physical meaning of the area under a stress-strain graph in the *elastic* region versus the area under the *whole* graph up to fracture? (3 steps)", "answer": "- Step 1: **Area under the elastic part only** = elastic strain energy density $$u = \\tfrac12 \\sigma\\varepsilon$$. This is the recoverable energy per unit volume — released back to the system when the load is removed.\n- Step 2: **Area under the whole curve up to fracture** = total energy per unit volume absorbed before fracture, called the **modulus of toughness**. This includes both recoverable elastic energy and non-recoverable plastic deformation energy.\n- Step 3: For a brittle material, the two areas are nearly equal (no significant plastic region). For a ductile material, the toughness is much larger than the elastic energy density — most of the absorbed energy goes into plastic work, dissipated as heat as bonds rearrange.\n\nEngineering interpretation: elastic energy is what makes springs useful; toughness is what makes structures safe against impact.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": true}, {"question": "Why does measuring 20 separate readings of one wire's diameter and averaging them give a better estimate than measuring one reading carefully? (3 steps)", "answer": "- Step 1: Each individual reading has random uncertainty — variations in micrometer alignment, wire roughness, slight ovality, operator judgment. These random errors are statistically independent across readings.\n- Step 2: Averaging $$N$$ independent readings reduces the standard error by a factor of $$\\sqrt{N}$$ (central limit theorem). So 20 readings give about $$\\sqrt{20} \\approx 4.5$$ times less random uncertainty than one reading.\n- Step 3: Crucially, this only reduces *random* uncertainty — it does NOT reduce systematic uncertainty (e.g., a zero error or a miscalibrated instrument). For a wire that may not be perfectly circular, taking readings at different orientations also samples the variation and gives a more representative \"average diameter\".\n\nSingle readings give a number with no estimate of its reliability; multiple readings give both a best estimate and a measure of its uncertainty.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": true}, {"question": "Sketch (describe) the force-extension graph for a typical Hookean spring loaded from zero up to and past its elastic limit, then unloaded. What does the resulting graph look like? (3 steps)", "answer": "- Step 1: From the origin, draw a straight line up to the limit of proportionality (P). Slope = $$k$$.\n- Step 2: Past P, the line curves over slightly (still rising but with decreasing slope) up to the elastic limit (E'), and continues into the plastic region. Beyond E', the spring is permanently deformed.\n- Step 3: Now unload from a point beyond E': draw a *straight line parallel* to the original elastic line, sloping back down to zero force. This unloading line meets the extension axis at a non-zero value — the **permanent extension**. The spring has not returned to its original length.\n\nIf reloaded again, the spring follows this new unloading line (with the offset extension as its new \"natural\" state) — and behaves elastically with the same stiffness $$k$$, up to a higher yield stress (work hardening).", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": false}, {"question": "Why is the spring constant of two identical springs in series exactly half of the single-spring constant, while in parallel it is exactly double? (3 steps)", "answer": "- Step 1: **Series**: under a force $$F$$, each spring sees full $$F$$ and extends by $$F/k$$. Total extension = $$2F/k$$. So $$k_{\\text{eff}} = F/(2F/k) = k/2$$ — half of the single-spring value.\n- Step 2: **Parallel**: both springs share the same extension $$x$$. Each spring provides force $$kx$$; total force = $$2kx$$. So $$k_{\\text{eff}} = 2kx/x = 2k$$ — double the single-spring value.\n- Step 3: Intuition: in series, the load passes through both springs sequentially — twice as many \"stretchable\" elements add up to twice the total extension for the same force, hence halved stiffness. In parallel, both springs resist together — twice the resistance to stretching means double the stiffness.\n\nThe factor 2 is exact for two identical springs; for $$N$$ identical springs: $$k_{\\text{series}} = k/N$$ and $$k_{\\text{parallel}} = Nk$$.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": true}, {"question": "Why is \"tensile strength\" a property of the material rather than a property of the specific bolt or wire being tested?", "answer": "Tensile strength is the maximum stress (force per unit area) a material can sustain before breaking. By dividing the breaking force by the cross-sectional area, the dependence on the bolt's specific dimensions is removed — it becomes a property of the material itself. Two bolts of different sizes made from the same brass will break at different *forces*, but at the same *stress* (force per unit area). So when a problem says \"brass has tensile strength 190 MPa\", this number applies to any brass sample, and to find the maximum force a specific brass pin can withstand, you multiply by that pin's cross-sectional area: $$F_{\\max} = \\sigma_{\\text{strength}} \\times A$$. This normalisation is the same principle that defines stress, strain, and Young modulus as material properties.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": true}, {"question": "What is the conceptual relationship between the elastic strain energy stored in a spring and the gravitational potential energy lost by a mass hung from it (in equilibrium)? (3 steps)", "answer": "- Step 1: When a mass $$m$$ is gently hung from a spring (lowered slowly to equilibrium), the spring extends by $$x = mg/k$$. The mass loses gravitational PE = $$mgx$$ as it descends.\n- Step 2: The spring gains elastic strain energy $$\\tfrac12 Fx = \\tfrac12 mgx$$ — only *half* of the PE lost by the mass.\n- Step 3: Where does the other half go? It's transferred to whoever is lowering the mass (your hand does negative work as you support it down). If instead you simply release the mass, the missing half becomes kinetic energy, and the mass oscillates around equilibrium with that energy.\n\nSo in equilibrium, only half the gravitational PE lost goes into the spring; the rest is taken away by the agent (or becomes KE in dynamic loading). This is why \"hang gently\" and \"drop suddenly\" give different dynamic behaviour.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": true}, {"question": "Why is the conversion 1 g/cm³ = 1000 kg/m³ and not 0.001 kg/m³ or 10⁶ kg/m³? (3 steps)", "answer": "- Step 1: Start with the conversions: $$1\\,\\mathrm{g} = 10^{-3}\\,\\mathrm{kg}$$ and $$1\\,\\mathrm{cm} = 10^{-2}\\,\\mathrm{m}$$, so $$1\\,\\mathrm{cm^3} = (10^{-2})^3 = 10^{-6}\\,\\mathrm{m^3}$$.\n- Step 2: Substitute: $$1\\,\\mathrm{g\\,cm^{-3}} = 10^{-3}\\,\\mathrm{kg} / 10^{-6}\\,\\mathrm{m^3} = 10^{-3} \\times 10^6 \\,\\mathrm{kg\\,m^{-3}} = 10^3\\,\\mathrm{kg\\,m^{-3}}$$.\n- Step 3: Sanity check: water has density 1 g/cm³ = 1000 kg/m³ — the well-known value. So the factor is exactly $$10^3$$, arising from $$10^{-3}$$ (mass) divided by $$10^{-6}$$ (volume) = $$10^3$$ (the volume conversion dominates because it's cubed).\n\nIf you forgot to cube the length, you'd get $$10^{-3}/10^{-2} = 10^{-1}$$ — factor 10000 wrong.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": true}, {"question": "A piece of metal stretches under a load. After the load is removed, you measure that the metal is permanently longer. What does this tell you about the maximum stress reached, the limit of proportionality, and the elastic limit?", "answer": "Permanent extension means the metal has undergone plastic deformation, which only occurs *beyond the elastic limit*. So the maximum stress reached during loading exceeded the elastic limit. It also necessarily exceeded the limit of proportionality (which is below the elastic limit on the curve). However, the maximum stress was certainly below the ultimate tensile stress (UTS) — otherwise the sample would have failed (necked and fractured). So the loading took the material through three regimes: linear elastic (below P), non-linear elastic (P to E'), and into plastic deformation (above E'), but stopped before UTS. The unloading line from the maximum point is parallel to the original elastic line, and meets the strain axis at the permanent strain you observed.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": true}, {"question": "Why is it incorrect to say \"rubber obeys Hooke's law for small extensions\" without qualification, and what makes rubber's stress-strain behaviour fundamentally different from a metal? (3 steps)", "answer": "- Step 1: For genuinely small extensions, rubber's behaviour can be approximated as linear, so Hooke's law works at low strains in a rough sense. But \"small\" for rubber typically means strains of a few percent — much less than rubber's typical operating range.\n- Step 2: The fundamental difference: in metals, elasticity comes from stretching atomic bonds slightly, which is well-modelled by a parabolic potential and gives linear response. In rubber, elasticity comes from *uncoiling* polymer chains — long molecules that are randomly tangled and straighten out under tension.\n- Step 3: Uncoiling is geometric, not bond-stretching, so the force vs. strain relationship is intrinsically non-linear from the start. Rubber also shows hysteresis (loading ≠ unloading curves), large permissible strains (often >100%), and stiffening at high strain (chains run out of slack and start to actually stretch bonds).\n\nSo rubber is \"elastic\" in the sense of being recoverable, but it does NOT obey Hooke's law in any normal sense — using $$F = kx$$ for rubber over its useful range gives the wrong answer.", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": true}], "count": 70}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 56359, "out_tokens": 11387, "reasoning_chars": 2125, "cost_eur": 0.0911, "elapsed_s": 423, "content_chars": 40959}, "glm_2": {"run": 2, "provider": "glm", "model": " const SK='phys_materials_v3';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
