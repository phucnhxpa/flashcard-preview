<script>
const DATA={"selected": [{"question": "What is the difference between positive and negative zero error on a micrometer, and how do you correct an observed reading?", "answer": "Zero error is a systematic error: when the jaws are fully closed (true reading = 0), the instrument shows a non-zero value. **Positive zero error**: the thimble's zero mark is below the main scale line — the instrument reads slightly *high* of zero. **Negative zero error**: the thimble's zero mark is above the main scale line — the instrument reads slightly *low* of zero (e.g., reading \"48\" really means -0.02 mm). **Correction rule**: actual reading = observed reading − zero error (with sign). A positive zero error is *subtracted* (the instrument was reading too high); a negative zero error is also subtracted, but since it's negative the effect is to *add* to the observed value. This rule is consistent in both cases if you keep the sign of the zero error.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "What is the difference between \"limit of proportionality\" and \"elastic limit\", and could a material have one without the other?", "answer": "- Step 1: *Limit of proportionality*: where the stress-strain graph stops being a straight line. Beyond it, deformation can still be elastic but is non-linear.\n- Step 2: *Elastic limit*: where deformation becomes *permanent* on unloading. Beyond it, plastic deformation begins.\n- Step 3: They are not the same point — the elastic limit is usually slightly *beyond* the limit of proportionality. There is a small region of *non-linear elastic* behaviour between them, where unloading still returns to zero strain but the loading curve was not straight.\n\nIn principle a material could have them coincide (linear up to the elastic limit), but for most real materials there is a small gap.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "For springs connected in series and supporting a single hanging mass, why is the extension of each spring the same as if it were alone (for the same force), and what happens to the effective spring constant? (3 steps)", "answer": "- Step 1: In a vertical series chain, the same force passes through every spring (each spring has to hold up everything below it, ignoring spring weight). So each spring sees the full applied force $$F$$.\n- Step 2: Each spring therefore extends by $$x_i = F/k_i$$ — its own individual extension as if it were alone under load $$F$$. The total chain extension is $$x_{\\text{total}} = x_1 + x_2 + \\dots = F(1/k_1 + 1/k_2 + \\dots)$$.\n- Step 3: Comparing to $$x_{\\text{total}} = F/k_{\\text{eff}}$$, we get $$1/k_{\\text{eff}} = 1/k_1 + 1/k_2 + \\dots$$. The effective stiffness *decreases* (series chain is softer than any individual spring).\n\nAnalogy: springs in series behave like resistors in *parallel* — the reciprocals add.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Why does A-level physics use the *original* cross-sectional area $$A_0$$ in the definition of stress, even though the wire gets thinner when stretched? (3 steps)", "answer": "- Step 1: This convention defines *engineering stress*: $$\\sigma = F/A_0$$ using the original unstressed area. In reality, as the wire stretches it gets slightly thinner (the Poisson effect), so the *true stress* $$F/A_{\\text{instant}}$$ is slightly larger.\n- Step 2: Two reasons for the convention:\n+ Practicality: $$A_0$$ is measured once with a micrometer before loading. Measuring the instantaneous area at every load is impractical.\n+ Accuracy in the elastic region: elastic strains in metals are tiny (~$$10^{-3}$$), so the area change is also ~$$10^{-3}$$ — well below the uncertainty in measuring the diameter. Using $$A_0$$ introduces no meaningful error where Hooke's law applies.\n- Step 3: The distinction only matters at large plastic strains. The fall-off of the *engineering* stress-strain curve after the UTS is an artifact of using $$A_0$$ while the true area shrinks. The true-stress curve keeps rising; the engineering curve doesn't because the load drops as the neck thins.\n\nSo the downturn after the UTS does NOT mean the material is getting weaker — it's just a feature of the engineering stress convention.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "Derive the relationship between the spring constant k of a wire and Young's modulus E of the material, showing why Young's modulus is independent of the sample dimensions. (3 steps)", "answer": "- Step 1: Start with Hooke's Law: F = kx, and Young's modulus: E = FL/(AΔL)\n- Step 2: From Young's modulus: F = EA(ΔL)/L. Compare with F = kx = kΔL\n- Step 3: Therefore kΔL = EA(ΔL)/L, giving k = EA/L\n\nThis shows k depends on geometry (area A, length L), while E depends only on the material. Double the length → k halves (longer wire stretches more easily). Double the area → k doubles (thicker wire is stiffer). When geometry factors cancel in σ/ε, only E remains.", "source": "MiniMax ①", "_id": "minimax_1_12"}, {"question": "Why do \"stiff\", \"strong\", and \"tough\" describe three different material properties, and where on a stress-strain graph do you read each? (3 steps)", "answer": "- Step 1: **Stiff** = resists elastic deformation. Read from the *gradient* of the linear region — the Young modulus $$E$$. A stiff material has a steep initial slope.\n- Step 2: **Strong** = withstands high stress before failing. Read from the *peak* of the curve — the ultimate tensile stress (UTS). A strong material has a high peak.\n- Step 3: **Tough** = absorbs energy before fracturing. Read from the *total area under the curve* up to fracture. A tough material has a large area.\n\nA material can be:\n+ stiff but brittle (glass — steep slope, small area, low UTS-to-failure).\n+ less stiff but very tough (mild steel — moderate slope, very large area).\n+ flexible but tough (rubber — shallow slope but huge area thanks to large strain).", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Starting from the definitions of stress and strain, derive the relationship between spring constant $$k$$, Young modulus $$E$$, cross-sectional area $$A$$, and original length $$L$$. (4 steps)", "answer": "- Step 1: Write the definitions. Stress $$\\sigma = F/A$$ and Strain $$\\varepsilon = x/L$$ (where $$x$$ is extension).\n- Step 2: Combine into Young modulus. $$E = \\sigma / \\varepsilon = \\frac{F/A}{x/L} = \\frac{FL}{Ax}$$.\n- Step 3: Recognise Hooke's law in the expression. The term $$F/x$$ is the spring constant $$k$$. Substitute $$k = F/x$$ into the numerator.\n- Step 4: Rearrange. $$E = \\frac{kL}{A}$$, which rearranges to the key relationship $$k = \\frac{EA}{L}$$.\n\nThis proves that a larger area or shorter length makes the *object* stiffer (higher $$k$$), but the *material* stiffness ($$E$$) remains constant.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "What is the difference between the gradient of a *force-extension* graph and the gradient of a *stress-strain* graph? Why does it matter?", "answer": "- Step 1: The gradient of force-extension is the *spring constant* $$k$$ — property of the *object* (depends on length, area, material). Unit: $$\\mathrm{N\\,m^{-1}}$$.\n- Step 2: The gradient of stress-strain is the *Young modulus* $$E$$ — property of the *material* (independent of sample size). Unit: Pa.\n- Step 3: They are related by $$k = EA/L$$. Confusing them — quoting $$k$$ when $$E$$ is asked — is a common exam error that loses marks.\n\nAlways check axis labels before quoting a gradient.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "When pre-straining a railway track at 8°C with a strain of $$3 \\times 10^{-4}$$, given thermal strain of $$2.5 \\times 10^{-5}$$ per Kelvin, the engineer aims for the rail to become unstressed at a specific temperature. Conceptually, why is that temperature 20°C? (3 steps)", "answer": "- Step 1: The pre-strain is tensile — the rail is stretched. As temperature rises, the rail wants to expand thermally, which would *relieve* the pre-existing tension. The rail becomes unstressed when the would-be thermal expansion exactly equals the pre-strain.\n- Step 2: Thermal strain per Kelvin is $$2.5 \\times 10^{-5}$$. To accumulate a strain of $$3 \\times 10^{-4}$$, the temperature must rise by $$3 \\times 10^{-4} / 2.5 \\times 10^{-5} = 12\\,\\mathrm{K}$$.\n- Step 3: Starting from 8°C and adding 12 K gives 20°C. At this temperature, the thermal expansion the rail \"would have done\" (had it been free) exactly cancels the pre-stretch — leaving zero net stress.\n\nAbove 20°C, the rail experiences compressive stress (it wants to expand but can't). Below 20°C (and certainly at 8°C laying time), it experiences tension. Pre-straining lets the engineer choose where on this temperature range the zero-stress point falls.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "Compare stress-strain graph shapes for brittle (ceramic), ductile (steel), and polymeric (rubber) materials. (3 steps)", "answer": "- Step 1: Identify regions on graph. Brittle → short elastic line ending in fracture; ductile → long curved plastic region with necking; polymeric → nonlinear elasticity.\n- Step 2: Toughness intuition: Area under graph up to fracture. Ceramic has high $\\sigma$ but low $\\varepsilon$ → low toughness. Steel has moderate $\\sigma$ but long $\\varepsilon$ → high toughness.  \n- Step 3: Safety implications:  \n  + Brittle: sudden failure with no warning.  \n  + Ductile: visible deformation before collapse.  \n  + Polymeric: energy dissipation via hysteresis (safety vs vibration).  \n+ Common misconception: \"Strong=stiff=robust\" — false. High $E$ (stiff) ≠ high $\\text{UTS}$ (strong) ≠ high toughness.\n\n**Takeaway:** The graph shape predicts failure type, ductility, and energy absorption capability.", "source": "Qwen 3 ②", "_id": "qwen_2_7"}, {"question": "Tensile stress is defined using the *original* cross-sectional area ($$\\sigma = F/A_0$$), not the instantaneous area (engineering stress). Give two reasons why this convention is used at A-level. (2 steps)", "answer": "- Step 1: It is practically measurable. The original area can be measured precisely with a micrometer before loading. Measuring the instantaneous area of a stretching, thinning wire inside a testing machine is extremely difficult.\n- Step 2: In the elastic region, the difference is negligible. Elastic strains are tiny (order of $$10^{-3}$$), so the area changes by roughly $$0.1\\%$$, which is far smaller than measurement uncertainty. Using $$A_0$$ introduces no meaningful error where Hooke's law applies.\n\nThe distinction only matters in deep plastic deformation (necking), where true stress diverges from engineering stress.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "Three identical springs support a mass in parallel. Each spring carries what fraction of the load, and how does the extension compare to one spring alone supporting the full mass? (3 steps)", "answer": "- Step 1: In parallel, all springs must stretch by the same amount $$x$$ (they are constrained between the same supports). They share the load equally if identical, so each carries $$F/3$$.\n- Step 2: The effective stiffness is $$k_{\\text{eff}} = 3k$$, so the extension is $$x = F/(3k)$$ — one-third of what a single spring would give for the same total load $$F/k$$.\n- Step 3: You can check this two ways: (a) total formula: $$x = F/k_{\\text{eff}} = F/(3k)$$. (b) Single-spring view: each spring carries $$F/3$$ and stretches $$(F/3)/k = F/(3k)$$ — same answer.\n\nTakeaway: $$N$$ parallel springs → load shares equally → extension is $$1/N$$ of single-spring case.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Why is \"stress\" measured in pascals — the same unit as pressure — but they describe different physical concepts? (3 steps)", "answer": "- Step 1: Both stress and pressure are force per unit area, so they share the unit $$\\mathrm{N\\,m^{-2}} = \\mathrm{Pa}$$. Dimensionally identical.\n- Step 2: **Pressure** describes a fluid or gas pushing on a surface — it's a scalar, acts equally in all directions at a point, and is perpendicular to any surface it contacts.\n- Step 3: **Stress** describes internal forces *within* a deformable solid — it's a tensor (it has direction and orientation), can be tensile (pulling apart) or compressive (pushing together), and can also include shear components parallel to a surface.\n\nSo pressure is a special case of normal compressive stress acting equally in all directions, typical of fluids. Stress in solids is more general. Sharing the unit is a coincidence of definition (force/area), not a statement that they are physically the same thing.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Two identical springs each of constant $$k$$ are joined end-to-end (series). What is the effective spring constant, and why does this match the formula for resistors in *parallel*? (3 steps)", "answer": "- Step 1: In series, the same force $$F$$ passes through both springs. Each extends by $$x_1 = F/k$$, so the total extension is $$2F/k$$.\n- Step 2: From $$F = k_{eff}(2F/k)$$ we get $$k_{eff} = k/2$$. General rule: $$1/k_{eff} = 1/k_1 + 1/k_2$$.\n- Step 3: The reciprocal combination is structurally identical to *parallel* resistors. The reason: in both cases the \"intensive\" quantity (current for resistors, force here) is the same across components, and the \"extensive\" quantity (voltage, extension) adds — exactly the conditions for the reciprocal rule.\n\nSeries springs = parallel resistors. Counterintuitive but rigorous.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "Why must the area under a rubber stress-strain curve be interpreted differently than for metals? (3 steps)", "answer": "- Step 1: Rubber exhibits hysteresis: loading/unloading paths differ. Area between them is energy lost to heat.  \n- Step 2: Energy return ≠ full loading area. For a tire, the returned elastic energy is the unloading area; the loop represents dissipated energy.  \n- Step 3: Practical benefit: Hysteresis damping is why rubber is used in vibration mounts and shock absorbers.  \n+ Edge case: Perfect elasticity (no loop) is rare; nearly all polymeric materials have some hysteresis.  \n\n**Takeaway:** The energy return ratio is $(\\text{unloading area})/(\\text{loading area})$; the difference warms the material.", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "Derive the expression for elastic energy *density* (energy per unit volume) stored in a stretched wire, starting from the elastic strain energy $$E_e = \\frac{1}{2} F x$$. (3 steps)", "answer": "- Step 1: Write energy per unit volume as $$u = E_e / V$$. The volume of the wire is $$V = A \\times L$$, where $$A$$ is cross-sectional area and $$L$$ is original length. So, $$u = \\frac{\\frac{1}{2} F x}{A L}$$.\n- Step 2: Rearrange the expression to group terms: $$u = \\frac{1}{2} \\left( \\frac{F}{A} \\right) \\left( \\frac{x}{L} \\right)$$.\n- Step 3: Recognize that $$F/A$$ is tensile stress ($$\\sigma$$) and $$x/L$$ is tensile strain ($$\\varepsilon$$). Therefore, the energy density is $$u = \\frac{1}{2} \\sigma \\varepsilon$$. Since $$\\sigma = E \\varepsilon$$, this can also be written as $$u = \\frac{1}{2} E \\varepsilon^2$$ or $$u = \\frac{\\sigma^2}{2E}$$.\n\nThis shows that energy density is a property of the material's strain state, independent of the sample's dimensions.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "Distinguish between \"stiff\", \"strong\", and \"tough\". A material can be one without the others — give an example. (3 steps)", "answer": "- Step 1: *Stiff*: large Young modulus $$E$$ — steep initial slope on stress-strain graph. Resists elastic deformation.\n- Step 2: *Strong*: large UTS — high peak stress before failure. Resists fracture.\n- Step 3: *Tough*: large area under the entire stress-strain curve — absorbs much energy per unit volume before breaking.\n\nExamples: glass fibre is *strong* (high UTS) and *stiff* but not *tough* (brittle, small area). Mild steel is *less stiff* than ceramic but very *tough*. Rubber is *neither stiff nor strong* by these measures but can be tough at large strain.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "Why is the area under a stress-strain graph energy per unit volume? (4 steps)", "answer": "- Step 1: **Elastic Energy in a Wire**  \n$$\nE_e = \\frac{1}{2}Fx = \\frac{1}{2}(\\sigma A)(\\varepsilon L) = \\frac{1}{2}\\sigma \\varepsilon (AL) = \\frac{1}{2}\\sigma \\varepsilon V.\n$$  \n- Step 2: **Energy Density**  \n$$\nu = \\frac{E_e}{V} = \\frac{1}{2}\\sigma \\varepsilon.\n$$  \n- Step 3: **Graph Interpretation**  \nArea under $\\sigma$-$\\varepsilon$ curve is energy density (J/m³).  \n- Step 4: **Contrast with Force-Extension**  \nForce-extension graphs require $\\frac{1}{2}Fx$ for energy; stress-strain graphs directly scale with material properties.", "source": "Qwen 3 ①", "_id": "qwen_1_9"}, {"question": "In the context of the density of a mixture, why can you not simply average the densities of the components? (2 steps)", "answer": "- Step 1: Density is mass divided by volume. Simply averaging densities assumes equal volumes.\n- Step 2: If you have a small piece of heavy metal and a large piece of light metal, the total mass is dominated by the heavy metal, but the total volume is dominated by the light metal. You must calculate Total Mass / Total Volume.", "source": "MiniMax ②", "_id": "minimax_2_22"}, {"question": "What is elastic hysteresis in rubber, and what does the area enclosed by the loading-unloading loop physically represent?", "answer": "- Step 1: When rubber is stretched and then released, the *loading* path and the *unloading* path do not coincide — they form a closed loop on the stress-strain (or force-extension) graph.\n- Step 2: The area under the *loading* curve is the work done *on* the rubber. The area under the *unloading* curve is the work the rubber *returns*. Their difference — the enclosed loop area — is energy that is *not* recovered.\n- Step 3: That dissipated energy converts to *internal energy (heat)* within the rubber. This is why repeatedly flexed rubber (a tyre, a damper) warms up.\n\nUseful in vibration damping; wasteful in drive belts. Cannot be modelled by $$\\tfrac{1}{2}Fx$$ because the curve is non-linear and the path matters.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Why is it incorrect to say \"rubber obeys Hooke's law for small extensions\" without qualification, and what makes rubber's stress-strain behaviour fundamentally different from a metal? (3 steps)", "answer": "- Step 1: For genuinely small extensions, rubber's behaviour can be approximated as linear, so Hooke's law works at low strains in a rough sense. But \"small\" for rubber typically means strains of a few percent — much less than rubber's typical operating range.\n- Step 2: The fundamental difference: in metals, elasticity comes from stretching atomic bonds slightly, which is well-modelled by a parabolic potential and gives linear response. In rubber, elasticity comes from *uncoiling* polymer chains — long molecules that are randomly tangled and straighten out under tension.\n- Step 3: Uncoiling is geometric, not bond-stretching, so the force vs. strain relationship is intrinsically non-linear from the start. Rubber also shows hysteresis (loading ≠ unloading curves), large permissible strains (often >100%), and stiffening at high strain (chains run out of slack and start to actually stretch bonds).\n\nSo rubber is \"elastic\" in the sense of being recoverable, but it does NOT obey Hooke's law in any normal sense — using $$F = kx$$ for rubber over its useful range gives the wrong answer.", "source": "Opus 4.7 ②", "_id": "opus_2_69"}, {"question": "Why is Hooke's law linear at small extensions, and what physically goes wrong at the limit of proportionality? (3 steps)", "answer": "- Step 1: At the atomic level, a solid is a lattice of atoms sitting at an equilibrium separation $$r_0$$. The interatomic potential energy curve near $$r_0$$ is approximately parabolic.\n- Step 2: A parabolic potential gives a restoring force linear in displacement: $$F \\approx -\\kappa(r - r_0)$$. Summed over every bond crossing a section, this microscopic linearity becomes the macroscopic $$F = kx$$.\n- Step 3: The parabolic approximation only holds for small displacements from $$r_0$$. Beyond that, the true potential is asymmetric and the restoring force is no longer proportional to displacement — this is the physical origin of the limit of proportionality.\n\nSo Hooke's law isn't a fundamental law but a small-displacement linearisation of a deeper non-linear interaction.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "On a stress-strain graph, how do you identify the **Young modulus**, the **ultimate tensile stress (UTS)**, and the **toughness** of the material? (3 steps)", "answer": "- Step 1: The **Young modulus** is the **gradient** of the initial, straight-line (linear elastic) portion of the graph.\n- Step 2: The **ultimate tensile stress (UTS)** is the highest point (peak) on the stress-strain curve. It represents the maximum stress the material can withstand.\n- Step 3: **Toughness** is represented by the **total area under the curve** up to the point of fracture. It measures the energy absorbed per unit volume before breaking.\n\nStiffness is gradient; strength is peak height; toughness is total area.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "How does **engineering stress** differ from **true stress** during the plastic deformation (necking) phase of a tensile test? (2 steps)", "answer": "- Step 1: **Engineering stress** uses the constant, original cross-sectional area ($$F/A_0$$). As necking occurs, the area shrinks, so the load $$F$$ required to continue stretching drops. Because the denominator $$A_0$$ is fixed, the engineering stress curve peaks at the Ultimate Tensile Stress (UTS) and then falls.\n- Step 2: **True stress** uses the instantaneous, shrinking cross-sectional area ($$F/A_{\\text{inst}}$$). Even though the load drops during necking, the area is shrinking *faster*, so the ratio $$F/A_{\\text{inst}}$$ actually continues to rise until fracture. The downturn after UTS is an artefact of the engineering stress definition.\n\nAt A-level, always use the original area unless told otherwise.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "A rubber band has loading area 0.48 J and unloading area 0.31 J under their respective curves. How much energy is dissipated per cycle, and as what?", "answer": "- Step 1: Energy dissipated = loading work − recovered work = $$0.48 - 0.31 = 0.17 \\, \\mathrm{J}$$ per cycle.\n- Step 2: This appears as internal energy (heat) in the rubber.\n- Step 3: Sanity-check the ratio: about 35% of input energy is lost in one cycle — large, consistent with rubber being a strongly hysteretic material (a steel spring would lose almost nothing).\n\nThe recoverable fraction (about 65%) is the \"resilience\" of the material.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "A 1-litre bottle contains 0.915 kg of whiskey. Roughly what is its density in kg/m³, and how does it compare to water? (3 steps)", "answer": "- Step 1: Convert: $$1 \\, \\mathrm{L} = 10^{-3} \\, \\mathrm{m^3}$$.\n- Step 2: $$\\rho = m/V = 0.915/(10^{-3}) = 915 \\, \\mathrm{kg\\,m^{-3}}$$.\n- Step 3: Water is 1000 kg/m³, so whiskey is less dense by about 8%. Makes sense: whiskey is mostly water but contains ethanol ($$\\sim 800 \\, \\mathrm{kg\\,m^{-3}}$$), pulling the average down.\n\nWhiskey floats on... no, actually it mixes with water; but a pure layer would float briefly.", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "A copper wire is stretched and the extension is measured. Why might a single measurement give a misleading value for the spring constant, and how does a force-extension graph improve this?", "answer": "A single measurement of $$(F, x)$$ pair gives $$k = F/x$$, but this includes any zero-offset error, sticking, or non-linearity at low loads, and there's no way to detect random fluctuations. By plotting many $$(F, x)$$ points and drawing a best-fit straight line through them, you (a) average out random scatter by fitting all points simultaneously, (b) automatically subtract any offset by using the *gradient* rather than absolute values, (c) visually identify the limit of proportionality as the point where the line stops being straight, and (d) detect outliers. The gradient $$\\Delta F/\\Delta x$$ taken over the full linear range is much more reliable than any single point. This is why graph-based analysis is standard practice for stiffness measurements.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "A wire's diameter is measured as $$1.00 \\pm 0.02 \\text{ mm}$$. Why is the percentage uncertainty in the cross-sectional area roughly twice the percentage uncertainty in the diameter? (3 steps)", "answer": "- Step 1: Calculate the percentage uncertainty in the diameter. $$\\frac{0.02}{1.00} \\times 100\\% = 2\\%$$.\n- Step 2: Relate diameter to area. Area $$A = \\pi(\\frac{d}{2})^2$$, which means $$A \\propto d^2$$. \n- Step 3: Apply the rule for powers in uncertainty. When a quantity is raised to a power $$n$$, its percentage uncertainty is multiplied by $$n$$. Because the diameter is squared, the percentage uncertainty in the area is approximately $$2 \\times 2\\% = 4\\%$$.\n\nThis is a critical rule for error propagation: squaring a measurement doubles its percentage uncertainty.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "Why is the Young modulus of steel ($$\\sim 2 \\times 10^{11}$$ Pa) a much more useful quantity than the spring constant of a steel wire when comparing materials?", "answer": "- Step 1: A spring constant depends on the *specific dimensions* of the wire: a longer wire has smaller $$k$$, a thicker wire has larger $$k$$. Two pieces of identical steel can have completely different $$k$$.\n- Step 2: Young modulus *removes* both geometry dependences — by using stress (force per area) and strain (extension per length) — leaving a number that is the same for *any* shape of steel.\n- Step 3: So if I want to know \"is steel stiffer than copper?\" I compare their Young moduli ($$\\sim 2 \\times 10^{11}$$ vs $$\\sim 1.3 \\times 10^{11}$$ Pa) without worrying about wire sizes.\n\n$$E$$ is the material identity card; $$k$$ is the object's resume.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "A mixture is 70% copper and 30% zinc by volume, with $$\\rho_{Cu} = 8.9 \\times 10^3$$ and $$\\rho_{Zn} = 7.1 \\times 10^3 \\, \\mathrm{kg\\,m^{-3}}$$. Without precise computation, roughly where should the alloy density sit relative to the simple mean, and why? (3 steps)", "answer": "- Step 1: The simple arithmetic mean would be $$(8.9 + 7.1)/2 = 8.0 \\times 10^3$$.\n- Step 2: But copper occupies *more* of the volume (70%), so the alloy is dominated by copper and should sit closer to $$8.9 \\times 10^3$$ than to the midpoint.\n- Step 3: Volume-weighted: $$0.7(8.9) + 0.3(7.1) \\approx 8.4 \\times 10^3 \\, \\mathrm{kg\\,m^{-3}}$$, noticeably above the simple mean. The weighting always pulls toward the more-abundant component.\n\nThe lesson behind the number: weighted averages pull toward the dominant fraction.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Two identical springs, each with spring constant $$k$$, are joined in series. What is the effective spring constant $$k_{\\text{eff}}$$ of the combination? If they were joined in parallel instead, what would $$k_{\\text{eff}}$$ be? (2 steps)", "answer": "- Step 1: **Series:** The effective stiffness *decreases*. The formula is $$1/k_{\\text{eff}} = 1/k_1 + 1/k_2 = 1/k + 1/k = 2/k$$. Therefore, $$k_{\\text{eff}} = k/2$$. The combination is softer.\n- Step 2: **Parallel:** The effective stiffness *increases*. The formula is $$k_{\\text{eff}} = k_1 + k_2 = k + k = 2k$$. The combination is stiffer.\n\nNotice that series springs follow the same mathematical rule as parallel resistors, and vice versa.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "A student is asked to define \"Strain.\" They write: \"Strain is the change in length.\" Why does this definition score zero marks, and what is the correct definition? (2 steps)", "answer": "- Step 1: \"Change in length\" is the *extension* ($$\\Delta L$$), which is a measured quantity with units of metres. Strain is a specific ratio that normalizes the extension by the original length.\n- Step 2: The correct definition must include the ratio and the reference value: \"Strain is the change in length *divided by the original length*.\"\n+ This makes strain dimensionless, allowing comparison between samples of different lengths. Omitting \"divided by original length\" is a common mark-losing error.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "The Young Modulus $$E$$ is defined as $$E = \\frac{\\sigma}{\\varepsilon} = \\frac{F/A}{\\Delta L / L} = \\frac{FL}{A \\Delta L}$$. Show how this formula connects to the spring constant $$k = F/\\Delta L$$, and explain why doubling the length of a wire halves its stiffness. (3 steps)", "answer": "- Step 1: Start with the definition of Young Modulus and substitute $$k = F/\\Delta L$$ (which means $$\\Delta L = F/k$$).\n+ $$E = \\frac{FL}{A(F/k)} = \\frac{FLk}{AF} = \\frac{kL}{A}$$.\n- Step 2: Rearrange to solve for the spring constant $$k$$.\n+ $$k = \\frac{EA}{L}$$.\n- Step 3: Analyze the relationship $$k = EA/L$$. For a fixed material ($$E$$ is constant) and fixed thickness ($$A$$ is constant), the stiffness $$k$$ is inversely proportional to length $$L$$.\n+ If length $$L$$ doubles, $$k$$ halves.\n+ This confirms that a longer wire is \"softer\" (extends more for the same force), while Young Modulus remains a constant property of the material.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "Why is the spring constant of two identical springs in series exactly half of the single-spring constant, while in parallel it is exactly double? (3 steps)", "answer": "- Step 1: **Series**: under a force $$F$$, each spring sees full $$F$$ and extends by $$F/k$$. Total extension = $$2F/k$$. So $$k_{\\text{eff}} = F/(2F/k) = k/2$$ — half of the single-spring value.\n- Step 2: **Parallel**: both springs share the same extension $$x$$. Each spring provides force $$kx$$; total force = $$2kx$$. So $$k_{\\text{eff}} = 2kx/x = 2k$$ — double the single-spring value.\n- Step 3: Intuition: in series, the load passes through both springs sequentially — twice as many \"stretchable\" elements add up to twice the total extension for the same force, hence halved stiffness. In parallel, both springs resist together — twice the resistance to stretching means double the stiffness.\n\nThe factor 2 is exact for two identical springs; for $$N$$ identical springs: $$k_{\\text{series}} = k/N$$ and $$k_{\\text{parallel}} = Nk$$.", "source": "Opus 4.7 ②", "_id": "opus_2_64"}, {"question": "Two wires of identical material are loaded with the same force, but wire A is twice as long as wire B. Compare their *spring constants*, their *extensions*, and their *strains*.", "answer": "- Step 1: *Spring constants*: from $$k = EA/L$$, $$k_A = k_B / 2$$ — A is softer.\n- Step 2: *Extensions*: from $$\\Delta L = FL/(AE)$$ at the same $$F$$, $$\\Delta L_A = 2 \\Delta L_B$$ — A extends twice as much.\n- Step 3: *Strains*: $$\\varepsilon = \\Delta L/L = (2\\Delta L_B)/(2L_B) = \\Delta L_B/L_B = \\varepsilon_B$$ — *same strain!*\n\nThe lesson: stress and strain *both* are the same in A and B (same material, same force, same area), so $$E$$ is identical. The geometric difference shows up in $$k$$ and $$\\Delta L$$, but is washed out by the strain definition.", "source": "Opus 4.7 ①", "_id": "opus_1_69"}, {"question": "A wire is doubled in cross-sectional area (e.g., diameter increased by $$\\sqrt{2}$$). What happens to the spring constant $$k$$ and to the Young modulus $$E$$? (3 steps)", "answer": "- Step 1: From $$k = EA/L$$: doubling $$A$$ doubles $$k$$. The wire is twice as stiff because there are twice as many parallel atomic bonds across the section, sharing the load equally.\n- Step 2: Young modulus $$E$$ does not change. $$E$$ is a material property — it depends on the strength of individual bonds, not on how many bonds there are.\n- Step 3: Physical picture: thicker wire = more bonds in parallel = stiffer object (higher $$k$$), but each bond is identical to before, so the *material* is the same (same $$E$$). This is the parallel-springs analogy at the atomic scale.\n\nTakeaway: geometry changes $$k$$; material changes $$E$$.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "Why would an engineer not lay railway tracks at the *highest* observed local temperature with zero pre-strain? (3 steps)", "answer": "- Step 1: If rails are laid unstressed at the highest temperature, they are also at their natural (relaxed) length at that temperature. Any cooling below that temperature would cause thermal contraction.\n- Step 2: Since the rails are fixed at both ends, contraction generates large tensile stress. The colder it gets relative to the laying temperature, the larger this tensile stress becomes.\n- Step 3: Sufficient tensile stress can exceed the material's strength, causing the rails to fracture in cold weather — a serious safety failure.\n\nPre-straining at a moderate temperature (with deliberate tensile stretch) means the rails start with controlled tension that *reduces* as they warm up and *increases* as they cool, keeping stresses within safe limits across the full temperature range.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "An alloy is made of 70% copper and 30% zinc *by volume*. Why is taking a simple mean of the two densities $$(\\rho_{copper} + \\rho_{zinc})/2$$ incorrect for finding the alloy's density? (3 steps)", "answer": "- Step 1: Density is mass per unit volume. To find the mixture density, you must use total mass over total volume: $$\\rho_{mix} = \\frac{m_1 + m_2}{V_{total}}$$.\n- Step 2: Express masses in terms of their densities and volumes. $$m_1 = \\rho_1 V_1$$ and $$m_2 = \\rho_2 V_2$$. So, $$\\rho_{mix} = \\frac{\\rho_1 V_1 + \\rho_2 V_2}{V_{total}}$$.\n- Step 3: Factor out the total volume. Because $$f_1 = V_1/V_{total}$$ and $$f_2 = V_2/V_{total}$$, the density becomes $$\\rho_{mix} = f_1\\rho_1 + f_2\\rho_2$$. This is a *volume-weighted* average, not a simple mean. A simple mean only works if the volume fractions are exactly 50/50.\n\nNever average densities directly; always go back to total mass over total volume.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "What does it mean for the *toughness* of a material to be the area under the stress-strain curve up to fracture, and why does it have units of $$\\mathrm{J\\,m^{-3}}$$?", "answer": "- Step 1: The area under a stress (Pa) versus strain (dimensionless) graph has units of Pa = $$\\mathrm{N\\,m^{-2}} = \\mathrm{J\\,m^{-3}}$$. So it is an *energy per unit volume*.\n- Step 2: Physically, this is the total elastic-plus-plastic energy absorbed per unit volume of material before it breaks. A material with a large area under its curve absorbs a lot of energy before failing — it is *tough*.\n- Step 3: Brittle materials (glass) have tiny area = low toughness despite possibly high UTS. Ductile materials (mild steel) have huge area from the long plastic plateau = high toughness. Rubber has moderate area from large strains.\n\nToughness is what makes a material useful for absorbing impacts.", "source": "Opus 4.7 ①", "_id": "opus_1_67"}, {"question": "Why is the trap $$A = \\pi d^2$$ (instead of $$\\pi(d/2)^2$$) so dangerous, and how does it cascade through a Young modulus problem?", "answer": "- Step 1: $$\\pi d^2 = \\pi(2r)^2 = 4\\pi r^2 = 4A_{correct}$$, so the wrong area is 4× too large.\n- Step 2: In a stress calculation $$\\sigma = F/A$$, the wrong stress is 4× too *small*.\n- Step 3: In an extension calculation $$\\Delta L = FL/(AE)$$, the wrong extension is 4× too *small*. In a minimum-diameter calculation, the resulting diameter is off by $$\\sqrt{4} = 2 \\times$$.\n\nThe safeguard: whenever you see \"diameter\", write \"$$r = d/2$$\" on its own line *before* touching the area formula.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "A 50 N/m spring is joined end-to-end with a 75 N/m spring; a 9.0 N load hangs from the bottom. What is the extension of *each* spring, and why must you use each spring's own $$k$$, not the effective $$k$$? (3 steps)", "answer": "- Step 1: In series, the *same* force passes through both springs — 9.0 N each.\n- Step 2: Each spring extends according to its own constant: softer spring $$x_1 = 9.0/50 = 0.18 \\, \\mathrm{m}$$; stiffer spring $$x_2 = 9.0/75 = 0.12 \\, \\mathrm{m}$$.\n- Step 3: Using $$k_{eff} = (1/50 + 1/75)^{-1} = 30 \\, \\mathrm{N\\,m^{-1}}$$ would give total chain extension $$9.0/30 = 0.30 \\, \\mathrm{m}$$ — which equals $$x_1 + x_2$$ as a consistency check, but tells you *nothing* about either spring individually.\n\nThe softer spring stretches more — that's the conceptual takeaway.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "What happens to engineering stress beyond the elastic limit, and why is this critical for structural engineering? (4 steps)", "answer": "- Step 1: Define engineering stress: $\\sigma = F/A_0$, where $A_0$ is original cross-sectional area.\n- Step 2: Describe geometric vs material failure: Beyond yield point, plastic deformation occurs without significant stress increase.\n- Step 3: Explain stress drop post-UTS: In engineering stress, $A_0$ stays fixed while the real area shrinks (necking), so $\\sigma_{\\text{engineer}} = F/A_0$ decreases even though true stress $\\sigma_{\\text{true}} = F/A_{\\text{actual}}$ keeps rising.  \n- Step 4: Link to safety: Engineering structures must avoid UTS to prevent catastrophic failure. Steel in buildings must stay within elastic region.  \n+ Contrast: True stress curves never decrease — this is an artifact of using fixed $A_0$.  \n+ Real-world impact: The downturn on the curve is misleading — material is *not* weakening, it's thinning.\n\n**Takeaway:** Engineering stress is a design constraint; true stress reveals the material’s full strength.", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "An alloy is made of 60% material A and 40% material B *by mass*. To find the density of this alloy, should you use a volume-weighted average, a mass-weighted average, or a simple average of the two densities? (2 steps)", "answer": "- Step 1: You must always return to the fundamental definition: $$\\rho = m_{\\text{total}} / V_{\\text{total}}$$. Since the fractions are given by mass, the total mass is known ($$m_1 + m_2$$), but the total volume must be calculated by adding the individual volumes ($$V_1 + V_2 = m_1/\\rho_1 + m_2/\\rho_2$$).\n- Step 2: Because you are summing the *volumes* at fixed mass, the densities combine **harmonically**. The formula is $$1/\\rho_{\\text{mix}} = w_1/\\rho_1 + w_2/\\rho_2$$, where $$w$$ represents the mass fractions. A volume-weighted average only works when the composition is given *by volume*.\n\nNever average densities directly; the physical condition (mass vs volume fractions) dictates the formula.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "Why does the formula $$E_e = \\tfrac{1}{2}Fx$$ for elastic strain energy share the same factor-of-half structure as kinetic energy $$\\tfrac{1}{2}mv^2$$?", "answer": "- Step 1: Both arise from integrating a linearly-growing quantity from zero. For KE: force $$F = ma$$ accelerates a mass from $$0$$ to $$v$$ over a distance $$d$$, with average velocity $$v/2$$. Work done $$= F \\times d = m \\times (v^2/2)$$.\n- Step 2: For elastic energy: force grows from $$0$$ to $$F$$ over extension $$0$$ to $$x$$, with average force $$F/2$$. Work done $$= (F/2) \\times x = \\tfrac{1}{2}Fx$$.\n- Step 3: General principle: if a linear-in-quantity quantity is integrated over a range starting from zero, the result is the *area of a triangle* = $$\\tfrac{1}{2}$$ × (final value) × (range).\n\nThe $$\\tfrac{1}{2}$$ is the geometric signature of \"starts at zero and grows linearly\".", "source": "Opus 4.7 ①", "_id": "opus_1_65"}, {"question": "Why is the conversion 1 g/cm³ = 1000 kg/m³ and not 0.001 kg/m³ or 10⁶ kg/m³? (3 steps)", "answer": "- Step 1: Start with the conversions: $$1\\,\\mathrm{g} = 10^{-3}\\,\\mathrm{kg}$$ and $$1\\,\\mathrm{cm} = 10^{-2}\\,\\mathrm{m}$$, so $$1\\,\\mathrm{cm^3} = (10^{-2})^3 = 10^{-6}\\,\\mathrm{m^3}$$.\n- Step 2: Substitute: $$1\\,\\mathrm{g\\,cm^{-3}} = 10^{-3}\\,\\mathrm{kg} / 10^{-6}\\,\\mathrm{m^3} = 10^{-3} \\times 10^6 \\,\\mathrm{kg\\,m^{-3}} = 10^3\\,\\mathrm{kg\\,m^{-3}}$$.\n- Step 3: Sanity check: water has density 1 g/cm³ = 1000 kg/m³ — the well-known value. So the factor is exactly $$10^3$$, arising from $$10^{-3}$$ (mass) divided by $$10^{-6}$$ (volume) = $$10^3$$ (the volume conversion dominates because it's cubed).\n\nIf you forgot to cube the length, you'd get $$10^{-3}/10^{-2} = 10^{-1}$$ — factor 10000 wrong.", "source": "Opus 4.7 ②", "_id": "opus_2_67"}, {"question": "Why can’t stress be calculated from strain alone in a copper wire? (2 steps)", "answer": "- Step 1: **Stress Formula**  \n$$\n\\sigma = \\frac{F}{A} \\quad \\text{or} \\quad \\sigma = E \\varepsilon.\n$$  \n- Step 2: **Missing Data**  \nGiven only strain and original length (e.g., Q9 in video), without $F$, $A$, or $E$, stress cannot be determined.", "source": "Qwen 3 ①", "_id": "qwen_1_27"}, {"question": "A wire is stretched and the recorded extension is given. To find strain, why must you divide by the *original* length and not the new (stretched) length?", "answer": "Strain is defined as $$\\varepsilon = \\Delta L / L_0$$ where $$L_0$$ is the original (unstressed) length. The choice is conventional but consistent with engineering stress: both use the reference state before loading, so $$E = \\sigma/\\varepsilon$$ is well-defined and reproducible. Using the final stretched length would give a smaller denominator and a different number (true strain), and crucially it would not match the engineering-stress definition that Edexcel uses. For small strains (~$$10^{-3}$$ in metals) the difference is negligible numerically, but the convention is fixed.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "How to interpret a stress-strain curve’s ultimate tensile stress (UTS)? (3 steps)", "answer": "- Step 1: **UTS Definition**  \nMaximum stress before necking.  \n- Step 2: **Engineering vs True Stress**  \nEngineering stress uses original area → UTS appears as peak. True stress keeps rising until fracture.  \n- Step 3: **Material Behavior**  \nAt UTS, necking begins. Ductile materials show UTS; brittle materials fracture before reaching it.", "source": "Qwen 3 ①", "_id": "qwen_1_22"}, {"question": "Derive the formula for elastic strain energy stored in a spring obeying Hooke's Law. (4 steps)", "answer": "- Step 1: Recognize that work done $W = \\int F\\,dx$, but $F$ isn't constant — it varies from $0$ to $F$.  \n- Step 2: Substitute Hooke's Law $F = kx$:  \n  $$\n  E_e = \\int_0^x kx'\\,dx' = \\frac{1}{2}kx^2.\n  $$\n- Step 3: Link to triangle area under $F-x$ graph: base $x$, height $kx$ →  \n  $$\n  \\text{Area} = \\frac{1}{2}x(kx) = \\frac{1}{2}kx^2.\n  $$\n- Step 4: Compare with rectangle area (incorrect): A constant force at value $F$ over $x$ would give $Fx$, but real force starts at 0 → triangle area is half.  \n+ Limiting case: If stiffness $k \\to 0$ (floppy spring), energy stored decreases.  \n+ Misconception: \"Why not just use $Fx$?\" — explains the ½ factor.\n\n**Takeaway:** Elastic energy is the area under the elastic region of the force-extension graph, not the entire rectangle.", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "Why is density an intensive property? Explain using a copper block example. (3 steps)", "answer": "- Step 1: **Definition**  \nDensity is mass per unit volume.  \n- Step 2: **Copper Block Example**  \nIf you cut a copper block in half:  \n$$\n\\rho_{\\text{half}} = \\frac{m/2}{V/2} = \\frac{m}{V} = \\rho.\n$$  \n- Step 3: **Conceptual Insight**  \nDensity depends only on the material, not the sample size. This contrasts with extensive properties like mass or volume.\n\n[Optional: Takeaway: Intensive properties reveal material identity; extensive properties scale with sample size.]", "source": "Qwen 3 ①", "_id": "qwen_1_0"}, {"question": "What does the spring constant $$k$$ *physically* measure, and what is its unit? Why is it a property of the *object*, not the material?", "answer": "- Step 1: $$k$$ is the gradient of the force-extension graph: $$k = \\Delta F / \\Delta x$$, with unit $$\\mathrm{N\\,m^{-1}}$$.\n- Step 2: It answers \"how many newtons to stretch *this object* by one metre\".\n- Step 3: It depends on the object's geometry (length, area), not just the material: a longer wire of the same metal has a smaller $$k$$ (more atoms in series, each contributing extension); a thicker wire has a larger $$k$$ (more atoms in parallel sharing the load). Hence two wires of the same steel can have very different $$k$$.\n\nThat object-versus-material distinction is the whole reason Young modulus is introduced.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "When the same force is applied, why does a longer wire of the same material stretch more than a shorter wire?", "answer": "Think of the wire as a chain of atomic bonds stretched in series along its length. Each bond stretches by a small amount under the applied force. A longer wire contains more bonds in series — twice as long means twice as many bonds — and the total extension is the sum of all individual bond extensions. So the total extension is proportional to length, leading to $$\\Delta L = FL/(AE)$$. Equivalently: the *strain* (fractional stretch) is the same for both wires under the same stress, because strain is a material property at given stress. But strain × length = extension, so a longer wire gives a larger absolute extension. This is also why $$k \\propto 1/L$$: a longer wire is \"softer\" because the same force produces more total extension.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Springs in series combine like resistors in parallel, and springs in parallel combine like resistors in series. Explain the physical reason for this crossover analogy. (2 steps)", "answer": "- Step 1: For springs in *series*, the **force** is the same through all springs, but **extensions add**. This matches how parallel resistors have the same voltage but currents add.\n- Step 2: For springs in *parallel*, the **extension** (displacement) is the same for all springs, but **forces add**. This matches how series resistors have the same current but voltages add.\n\nThe quantity that is shared (force for series springs, extension for parallel springs) determines which mathematical rule applies.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "Why is averaging the two component densities of an alloy generally wrong, and what is the correct rule for volume-fraction mixing? (3 steps)", "answer": "- Step 1: Start from the only definition that is always true: $$\\rho_{\\text{mix}} = \\frac{m_{\\text{total}}}{V_{\\text{total}}}$$. For volume fractions $$f_1, f_2$$ of total volume $$V$$, masses are $$m_i = \\rho_i f_i V$$, so $$\\rho_{\\text{mix}} = f_1\\rho_1 + f_2\\rho_2$$ — a *volume-weighted* average.\n- Step 2: The simple mean $$(\\rho_1+\\rho_2)/2$$ is only correct in the special case $$f_1=f_2=0.5$$. For brass at 70/30, the simple mean gives $$8.0\\times10^3$$ vs. the correct $$8.36\\times10^3\\,\\mathrm{kg\\,m^{-3}}$$ — a 4% error.\n- Step 3: If instead the mix is specified by *mass* fractions $$w_1, w_2$$, the densities combine harmonically: $$1/\\rho_{\\text{mix}} = w_1/\\rho_1 + w_2/\\rho_2$$, because at fixed mass it is the volumes that add.\n\nHabit: never average densities directly — always go back to \"total mass over total volume\" first.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "Why is density considered an intensive property, while mass and volume are extensive properties? Explain using a copper block example.", "answer": "- Step 1: Intensive properties do NOT depend on the amount of substance; extensive properties DO scale with quantity.\n- Step 2: Take a copper block with density ρ = 8900 kg/m³. Cut it in half: each half has half the mass AND half the volume.\n- Step 3: Calculate density of half: ρ_half = (m/2)/(V/2) = m/V = ρ. The value unchanged.\n\nIntensive properties emerge from the ratio of two extensive properties, canceling out the amount. This is the same structural idea behind Young's modulus.", "source": "MiniMax ①", "_id": "minimax_1_2"}, {"question": "Why is the factor $$\\tfrac{1}{2}$$ in $$E_e = \\tfrac{1}{2}Fx$$ the most-forgotten detail, and what does $$Fx$$ without the half represent?", "answer": "$$Fx$$ would be the work done if the force were *constant* at value $$F$$ throughout the stretch — the area of the rectangle, twice the triangle. But in a Hooke spring the force *grows linearly from zero*; the average over the stretch is only $$F/2$$. So the stored energy is half of $$Fx$$. Skipping the $$\\tfrac{1}{2}$$ gives an answer twice too large. The exam phrasing: \"average force during stretching is half the final force, so $$E_e = \\tfrac{1}{2}Fx$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Sketch (describe) the standard engineering stress-strain curve for a ductile metal and identify the five key landmarks in order. (5 steps)", "answer": "- Step 1: **Origin to P (limit of proportionality):** straight line through origin. Gradient = Young modulus. Stress proportional to strain. Hooke's law holds here only.\n- Step 2: **P to E′ (elastic limit):** curve bends over; stress no longer proportional to strain, but the sample still returns to its original length on unloading. Non-linear elastic.\n- Step 3: **Y (yield point):** material suddenly extends a lot for little extra load (a near-horizontal step or small drop). Plastic deformation begins — atoms slide past one another permanently.\n- Step 4: **Plastic region and UTS:** curve rises again as the material work-hardens, peaking at the **ultimate tensile stress** — the highest point on the curve.\n- Step 5: **Beyond UTS to fracture (X):** curve falls because necking begins (local thinning) while engineering stress uses the fixed original area. Ends at fracture.\n\nAreas: linear part = recoverable elastic strain energy; total area to fracture = toughness.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "Why is the order of magnitude of Young modulus for metals around $$10^{11}$$ Pa, while for rubber it can be as low as $$10^6$$ Pa?", "answer": "- Step 1: Young modulus reflects the *steepness* of the atomic potential well near equilibrium. For metals, strong metallic bonds give a deep, narrow well — small displacement produces large restoring force, hence large $$E$$.\n- Step 2: Rubber consists of long-chain polymers that are mostly *coiled* in the unloaded state. Stretching first uncoils the chains (entropic, low force), and only at very high strain do you start stretching individual bonds.\n- Step 3: So rubber's effective stiffness comes from chain configurations rather than direct bond stretching — a much \"softer\" mechanism, giving $$E$$ orders of magnitude lower.\n\nThe factor of $$10^5$$ between metal and rubber comes from *what* the stretch is doing at the atomic level.", "source": "Opus 4.7 ①", "_id": "opus_1_72"}, {"question": "An irregular object is submerged in a Eureka can, but the student notices small air bubbles clinging to its surface. How will this affect the volume measurement, and consequently the density? (2 steps)", "answer": "- Step 1: The air bubbles will displace additional water. The volume of water collected in the measuring cylinder will be the volume of the object *plus* the volume of the air bubbles.\n- Step 2: This leads to an overestimation of the object's volume. Since density is mass over volume ($$\\rho = m/V$$), an inflated volume will result in an underestimation of the object's density.\n\nAlways ensure the object is fully submerged and free of trapped air.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "You are asked to estimate the density of a liquid mixture where the components are given *by mass fraction* (e.g., 60% by mass liquid A, 40% by mass liquid B). Why can't you use the volume-weighted average formula $$\\rho_{\\text{mix}} = f_A\\rho_A + f_B\\rho_B$$ here? (2 steps)", "answer": "- Step 1: The volume-weighted average formula assumes you know the *volume* fractions. If you are given *mass* fractions, the volumes of the components are not immediately known; you must calculate them using $$V = m/\\rho$$.\n- Step 2: For mass fractions, the volumes add, not the densities.\n+ Total volume $$V = V_A + V_B = \\frac{m_A}{\\rho_A} + \\frac{m_B}{\\rho_B}$$.\n+ Since $$\\rho = m_{\\text{total}} / V_{\\text{total}}$$, inverting the density equation gives the harmonic-style combination:\n+ $$\\frac{1}{\\rho_{\\text{mix}}} = \\frac{w_A}{\\rho_A} + \\frac{w_B}{\\rho_B}$$ (where $$w$$ is mass fraction).\nUsing the volume average with mass fractions would yield a significantly incorrect (typically overestimated) density.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "Why does the unloading line, for a sample stretched past its elastic limit, run parallel to the original elastic loading line?", "answer": "Both the loading line (in the elastic region) and the unloading line are governed by the *elastic* response of the material — the relaxation of stretched but unbroken bonds. The Young modulus $$E$$ characterises this elastic response, and it is essentially unchanged by plastic deformation (the bonds that recover are still the same atomic bonds with the same stiffness). So the slope $$dE/d\\sigma = 1/E$$ (or $$dF/dx = k$$) is the same on unloading as on loading. The difference is that the unloading line is *shifted* along the strain axis by the amount of permanent plastic strain — bonds that broke and reformed in new positions stay in those positions and don't contribute to the recovery. The geometric result: parallel lines, offset by the permanent strain.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "Why does the engineering stress-strain curve *fall* after the ultimate tensile stress, even though the material is not actually getting weaker?", "answer": "- Step 1: Beyond the UTS, the sample develops a *neck* — a localised thinning where deformation concentrates. The true cross-section there shrinks rapidly.\n- Step 2: The *true stress* (force per *current* area) keeps rising — the material is still hardening locally. But *engineering stress* uses the fixed *original* area $$A_0$$.\n- Step 3: Since the load now needed to keep stretching the necked region *drops* (less material to pull through), and we are dividing by an unchanged $$A_0$$, the engineering stress falls.\n\nThe downturn is an artefact of the engineering-stress convention, not a property of the material weakening.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Distinguish between the **limit of proportionality**, the **elastic limit**, and the **yield point** on a stress-strain curve. Which comes first, and what physically changes at each? (3 steps)", "answer": "- Step 1: **Limit of proportionality (P):** This comes first. It is the point beyond which stress is no longer directly proportional to strain. The graph stops being a straight line; Hooke's law no longer applies.\n- Step 2: **Elastic limit (E):** Slightly beyond P. Up to this point, the material will still return to its original length when the load is removed (it is elastic, even though non-linear between P and E). Beyond it, some deformation is permanent (plastic).\n- Step 3: **Yield point (Y):** Beyond the elastic limit. This is where the material begins to extend rapidly with little or no extra load. On the curve, it appears as a near-horizontal step. Atoms are now sliding past one another permanently.\n\nProportionality is about straightness; elastic limit is about springing back; yield is about suddenly giving way.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "A piece of metal stretches under a load. After the load is removed, you measure that the metal is permanently longer. What does this tell you about the maximum stress reached, the limit of proportionality, and the elastic limit?", "answer": "Permanent extension means the metal has undergone plastic deformation, which only occurs *beyond the elastic limit*. So the maximum stress reached during loading exceeded the elastic limit. It also necessarily exceeded the limit of proportionality (which is below the elastic limit on the curve). However, the maximum stress was certainly below the ultimate tensile stress (UTS) — otherwise the sample would have failed (necked and fractured). So the loading took the material through three regimes: linear elastic (below P), non-linear elastic (P to E'), and into plastic deformation (above E'), but stopped before UTS. The unloading line from the maximum point is parallel to the original elastic line, and meets the strain axis at the permanent strain you observed.", "source": "Opus 4.7 ②", "_id": "opus_2_68"}, {"question": "On a standard engineering stress-strain graph for a ductile metal, the curve peaks at the Ultimate Tensile Stress (UTS) and then falls before fracture. Why does the *engineering stress* fall even though the material hasn't broken yet? (2 steps)", "answer": "- Step 1: After the UTS, the material begins to \"neck\"—the cross-sectional area locally decreases significantly in one small region.\n- Step 2: Engineering stress is calculated using the *original* fixed area $$A_0$$. Even though the load might still be increasing in the necked region, the load divided by the original area actually decreases. The *true* stress (force over instantaneous area) continues to rise, but the engineering curve dips.\n\nThe downturn is a mathematical artifact of the engineering stress definition, not a sign the material is getting weaker.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "A copper wire with original length 1.52 m stretches by 3.2 mm. Can you compute its stress from this information alone? Explain your reasoning. (3 steps)", "answer": "- Step 1: From the given data you can compute strain: $$\\varepsilon = 0.0032/1.52 \\approx 2.1 \\times 10^{-3}$$.\n- Step 2: Stress is $$\\sigma = F/A$$ — requires the force and the cross-sectional area. Alternatively $$\\sigma = E\\varepsilon$$ — requires the Young modulus. Neither pair is given.\n- Step 3: The correct exam answer is: \"Stress cannot be calculated; force and area (or the Young modulus) are missing.\" State the missing data — do not invent or assume a value.\n\nThe reflex to \"use a formula\" must be checked by first auditing what each formula needs.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "The spring constant $$k$$ describes an object, whereas Young modulus $$E$$ describes a material. Explain conceptually why a longer wire of the same metal has a *smaller* spring constant. (2 steps)", "answer": "- Step 1: Imagine the wire as a chain of atomic bonds. A longer wire has more bonds in series. When you pull the chain, each bond stretches by a small amount, and these small stretches add up.\n- Step 2: Because there are more bonds to stretch, the same applied force produces a larger total extension. Since $$k = F/x$$, a larger $$x$$ for the same $$F$$ means a smaller $$k$$. The wire is \"softer\" as a whole object, even though the material itself (the bond stiffness) hasn't changed.\n\nSpring constant depends on geometry (length and area); Young modulus strips geometry away.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "Why must the elastic strain energy formula $$\\tfrac12 Fx$$ NOT be used beyond the limit of proportionality, and what should be used instead?", "answer": "The formula $$E_e=\\tfrac12 Fx$$ relies on the force-extension graph being a straight line through the origin, because only then is the area a triangle. Beyond the limit of proportionality, the graph curves (for rubber it's S-shaped from the start), and the area under the curve is no longer a simple triangle. In that case, the energy must be calculated as the *actual area under the graph* — typically by counting squares, using the trapezium rule, or numerical integration. Forcing $$\\tfrac12 Fx$$ on a curved graph will give the wrong answer because it implicitly assumes linearity that doesn't exist.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "Why is the standard tensile-test stress-strain curve described as \"engineering stress\" and not \"true stress\", and when does this matter?", "answer": "- Step 1: Engineering stress uses the *original* cross-section $$A_0$$, measured once before loading. True stress uses the *instantaneous* (current) cross-section, which shrinks as the wire thins.\n- Step 2: In the elastic region, the cross-section barely changes (strains $$\\sim 10^{-3}$$ for metals), so engineering and true stress agree.\n- Step 3: It matters only at large plastic strains — after the UTS, when necking begins. There the engineering curve falls (because load drops while $$A_0$$ is fixed), while the true-stress curve keeps rising (because actual area shrinks faster than load).\n\nThe downturn after UTS is a feature of the engineering convention, not real weakening.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "An alloy is made of 70% copper and 30% zinc *by volume*. A student calculates the alloy's density by simply averaging the two densities: $$\\rho_{\\text{mix}} = (\\rho_{\\text{copper}} + \\rho_{\\text{zinc}}) / 2$$. Why is this mathematically wrong unless the volume fractions are exactly equal? (3 steps)", "answer": "- Step 1: Density is total mass over total volume ($$\\rho_{\\text{mix}} = m_{\\text{total}} / V_{\\text{total}}$$). The total mass is the sum of the individual masses: $$m_{\\text{total}} = m_1 + m_2 = \\rho_1 V_1 + \\rho_2 V_2$$.\n- Step 2: Substitute this into the density definition, using volume fractions $$f_1$$ and $$f_2$$ (where $$V_1 = f_1 V_{\\text{total}}$$ and $$V_2 = f_2 V_{\\text{total}}$$). This gives $$\\rho_{\\text{mix}} = (\\rho_1 f_1 V_{\\text{total}} + \\rho_2 f_2 V_{\\text{total}}) / V_{\\text{total}} = f_1 \\rho_1 + f_2 \\rho_2$$.\n- Step 3: The correct formula is a **volume-weighted average**, not a simple average. A simple average $$(\\rho_1 + \\rho_2)/2$$ is only true if $$f_1 = f_2 = 0.5$$. For a 70/30 split, the denser component contributes more to the average because it occupies more of the volume.\n\nNever average densities directly; always go back to \"total mass over total volume\".", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "What is the conceptual relationship between the elastic strain energy stored in a spring and the gravitational potential energy lost by a mass hung from it (in equilibrium)? (3 steps)", "answer": "- Step 1: When a mass $$m$$ is gently hung from a spring (lowered slowly to equilibrium), the spring extends by $$x = mg/k$$. The mass loses gravitational PE = $$mgx$$ as it descends.\n- Step 2: The spring gains elastic strain energy $$\\tfrac12 Fx = \\tfrac12 mgx$$ — only *half* of the PE lost by the mass.\n- Step 3: Where does the other half go? It's transferred to whoever is lowering the mass (your hand does negative work as you support it down). If instead you simply release the mass, the missing half becomes kinetic energy, and the mass oscillates around equilibrium with that energy.\n\nSo in equilibrium, only half the gravitational PE lost goes into the spring; the rest is taken away by the agent (or becomes KE in dynamic loading). This is why \"hang gently\" and \"drop suddenly\" give different dynamic behaviour.", "source": "Opus 4.7 ②", "_id": "opus_2_66"}, {"question": "A steel rail is laid in cold weather and stretched so it has a permanent \"pre-strain\". If the temperature rises, the rail wants to expand. Explain why pre-straining prevents the rail from buckling when it gets hot. (3 steps)", "answer": "- Step 1: When steel gets hot, it naturally wants to expand. If laid without pre-strain, this expansion would push against the fixed ends, causing large compressive forces that could buckle the rail.\n- Step 2: Pre-straining stretches the rail while fixing it. This builds in tensile stress (like a stretched rubber band pinned at both ends).\n- Step 3: As the temperature rises, the thermal expansion simply relieves the built-in tensile stress. The rail goes from being stretched to being unstretched, rather than from being unstretched to being compressed. Buckling is avoided because the rail never enters a compressive state.\n\nPre-straining uses up the \"slack\" so thermal expansion doesn't create compression.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "Why does a force-extension graph of a spring still going through the origin matter when extracting the spring constant?", "answer": "- Step 1: Hooke's law $$F = kx$$ has no constant term: at zero force, the spring sits at its natural length (zero extension). The graph must pass through the origin.\n- Step 2: If your data line does *not* pass through the origin, there is a systematic error — most commonly an unmeasured initial extension (the hanger weight, or the spring's own weight), or a zero error in the ruler.\n- Step 3: The *gradient* of the line still gives $$k$$ correctly even with a non-zero intercept — provided the line is still straight. The intercept is itself diagnostic of what went wrong.\n\nFor exam plotting: draw a best-fit straight line, take the gradient over a *large triangle*, and explain any non-zero intercept.", "source": "Opus 4.7 ①", "_id": "opus_1_73"}, {"question": "What is the physical meaning of the area under a stress-strain graph in the *elastic* region versus the area under the *whole* graph up to fracture? (3 steps)", "answer": "- Step 1: **Area under the elastic part only** = elastic strain energy density $$u = \\tfrac12 \\sigma\\varepsilon$$. This is the recoverable energy per unit volume — released back to the system when the load is removed.\n- Step 2: **Area under the whole curve up to fracture** = total energy per unit volume absorbed before fracture, called the **modulus of toughness**. This includes both recoverable elastic energy and non-recoverable plastic deformation energy.\n- Step 3: For a brittle material, the two areas are nearly equal (no significant plastic region). For a ductile material, the toughness is much larger than the elastic energy density — most of the absorbed energy goes into plastic work, dissipated as heat as bonds rearrange.\n\nEngineering interpretation: elastic energy is what makes springs useful; toughness is what makes structures safe against impact.", "source": "Opus 4.7 ②", "_id": "opus_2_61"}, {"question": "How to derive the formula for elastic strain energy in a spring? (4 steps)", "answer": "- Step 1: **Work Done**  \nWork $E_e$ is the area under $F$-$x$ graph.  \n- Step 2: **Linear Region Geometry**  \nFor $F = kx$, the graph is a triangle:  \n$$\nE_e = \\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2}Fx = \\frac{1}{2}kx^2.\n$$  \n- Step 3: **Integration Approach**  \n$$\nE_e = \\int_0^{x} F\\,\\text{d}x' = \\int_0^{x} kx'\\,\\text{d}x' = \\frac{1}{2}kx^2.\n$$  \n- Step 4: **Energy Density**  \nDivide by material volume to get $u = \\frac{1}{2}\\sigma \\varepsilon$ → property of material/strain state.", "source": "Qwen 3 ①", "_id": "qwen_1_15"}, {"question": "For springs connected in parallel supporting a single mass, why does the load share between them and what is the effective spring constant? (3 steps)", "answer": "- Step 1: In parallel, all springs are connected between the same two supports, so they must all have the same extension $$x$$ (they stretch together).\n- Step 2: Each spring contributes a force $$F_i = k_i x$$. The total force supported is $$F_{\\text{total}} = \\sum F_i = x \\sum k_i$$.\n- Step 3: Comparing to $$F_{\\text{total}} = k_{\\text{eff}} x$$, we get $$k_{\\text{eff}} = k_1 + k_2 + \\dots$$. The effective stiffness *increases* (parallel array is stiffer than any individual spring).\n\nAnalogy: springs in parallel behave like resistors in *series* — the stiffnesses add directly. So parallel = stiffer = smaller extension for the same load.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Why is the factor of ½ essential in elastic strain energy? (2 steps)", "answer": "- Step 1: **Average Force**  \nForce increases from 0 to $F$ → average force is $\\frac{1}{2}F$.  \n- Step 2: **Energy Formula**  \n$$\nE_e = \\frac{1}{2}Fx = \\frac{1}{2}kx^2.\n$$  \n+ Example: Stretching a spring with $k = 100$ N/m by $x = 0.1$ m → $E_e = \\frac{1}{2} \\times 100 \\times 0.1^2 = 0.5$ J.", "source": "Qwen 3 ①", "_id": "qwen_1_23"}, {"question": "A micrometer reading shows the 4.5 mm mark and the thimble reads 38 divisions. (a) What is the diameter? (b) Calculate the cross-sectional area. (c) Estimate percentage uncertainty in area from resolution 0.01 mm. (3 steps)", "answer": "- Step 1: (a) Main scale: 4.5 mm (includes visible 0.5 mm mark). Thimble: 38 × 0.01 = 0.38 mm. Total: 4.88 mm = 4.88 × 10⁻³ m\n- Step 2: (b) A = π(d/2)² = π(2.44 × 10⁻³)² = 1.87 × 10⁻⁵ m²\n- Step 3: (c) Resolution uncertainty in d = 0.01 mm / 4.88 mm = 0.205%. Since area ∝ d², percentage uncertainty DOUBLES: 0.41%\n\nThe power rule: when a quantity is raised to a power (here d²), its percentage uncertainty multiplies by that power. This is why small measurement errors have larger effects on calculated quantities.", "source": "MiniMax ①", "_id": "minimax_1_23"}, {"question": "Density is an *intensive* property, whereas mass is *extensive*. Explain what this means by imagining a uniform block of aluminium being cut exactly in half. (2 steps)", "answer": "- Step 1: Define extensive. Mass is extensive because it depends on the amount of substance. If you cut the block in half, the mass halves (from $$m$$ to $$m/2$$).\n- Step 2: Define intensive. Density is intensive because it is a property of the material itself, independent of the amount. When you cut the block in half, the volume also halves (from $$V$$ to $$V/2$$). The new density is $$\\frac{m/2}{V/2} = \\frac{m}{V}$$, which is exactly the same as the original density.\n\nIntensive properties (like density, Young modulus) cancel out the \"amount\" of the sample.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "Explain the shape of a stress-strain graph for a **brittle** material (like glass) compared to a **ductile** material (like steel). (2 steps)", "answer": "- Step 1: **Brittle**: The graph is a straight line (linear) almost to the point of fracture. There is very little or no plastic (curved) region. It breaks suddenly.\n- Step 2: **Ductile**: The graph has a linear region, then curves (yields) into a long plastic region where it stretches significantly (necking) before breaking.", "source": "MiniMax ②", "_id": "minimax_2_17"}, {"question": "Why is density considered an intensive property? (3 steps)", "answer": "- Step 1: Define intensive vs. extensive properties. **Intensive** properties (density, color, temperature) don't depend on sample size; **extensive** properties (mass, volume) do.\n- Step 2: Use mathematical proof. For a copper block halved:  \n  $$\n  \\rho_{\\text{half}} = \\frac{m/2}{V/2} = \\frac{m}{V} = \\rho_{\\text{original}}.\n  $$\n- Step 3: Connect to material structure. Density depends only on atomic/molecular arrangement (material identity), not on how much material exists.  \n+ Misconception probe: \"If I take half a sample, shouldn't the density change?\"  \n+ Edge case: Compare 1 kg vs 2 kg of lead.  \n\n**Takeaway:** Density is a fingerprint of the material, not the sample size.", "source": "Qwen 3 ②", "_id": "qwen_2_0"}, {"question": "A rubber band shows \"hysteresis\" when stretched and released. What does this mean, and what happens to the energy represented by the loop area? (2 steps)", "answer": "- Step 1: Hysteresis means the loading curve (stretching) and the unloading curve (shrinking) do not coincide. They form a closed loop.\n- Step 2: The area inside the loop represents energy that is **dissipated as heat** during the stretching cycle. The material does not return all the input energy as potential energy; some is lost.", "source": "MiniMax ②", "_id": "minimax_2_18"}, {"question": "Why does Young modulus not depend on the size of the sample, even though force, extension, and area clearly do?", "answer": "Young modulus is defined as the ratio of stress to strain: $$E = (F/A)/(x/L)$$. Dividing force by area normalises out the cross-sectional dimensions (a thicker wire carries more force for the same internal \"tightness\"), and dividing extension by original length normalises out the length (a longer wire extends more for the same fractional stretch). The two normalisations exactly cancel the geometry-dependence of $$F$$ and $$x$$, leaving a number that depends only on what the material is made of — the strength of its interatomic bonds. This is the same logic that makes density an intensive property: a ratio of extensive quantities removes the size dependence.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "What is \"necking\" in a tensile test, and what does it have to do with the downturn of the engineering stress-strain curve after UTS? (3 steps)", "answer": "- Step 1: As a ductile metal is stretched into its plastic region, deformation eventually localises into a small section — that section thins more than the rest, forming a visible \"neck\".\n- Step 2: At the neck, the actual cross-sectional area shrinks. The load on the sample can actually *fall* (because the necked region is now thinner and the material can't sustain as much total force), even though the *true* stress at the neck (force divided by instantaneous area) keeps rising.\n- Step 3: Engineering stress uses the original (fixed) area $$A_0$$ in its definition. So when the load falls during necking, engineering stress = load/$$A_0$$ also falls — producing the downturn after UTS. The *true stress* (using instantaneous area) would not show this downturn.\n\nSo the falling part of the engineering curve is an artifact of the area convention, not a sign of material weakness.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "When measuring the density of an irregular object with the Eureka can, why might a *small object* give a less reliable density than a *large object*?", "answer": "- Step 1: The measuring cylinder resolution is fixed (e.g. $$\\pm 1 \\, \\mathrm{mL}$$). For a small object displacing 5 mL, this is a 20% volume uncertainty; for a 50 mL object, only 2%.\n- Step 2: Air bubbles, adhesion, and splashing are absolute errors of order 0.5-1 mL. They dominate small displaced volumes but are negligible for larger ones.\n- Step 3: So density precision improves with object size, up to the limit of measuring-cylinder range. The trick: choose an object that fills a reasonable fraction of the cylinder.\n\nGeneral principle: make the measured quantity large relative to the uncertainty.", "source": "Opus 4.7 ①", "_id": "opus_1_68"}, {"question": "Why does mixing two metals by mass fraction require harmonic mean for density? (4 steps)", "answer": "- Step 1: Start with definition of density: $\\rho_{\\text{mix}} = \\frac{m_{\\text{total}}}{V_{\\text{total}}}$.\n- Step 2: For mass fractions $w_1,w_2$:  \n  $$\n  m_1 = w_1 m_{\\text{total}},\\quad m_2 = w_2 m_{\\text{total}}.\n  $$\n- Step 3: Volume adds, mass fixed:  \n  $$\n  V_{\\text{total}} = \\frac{m_1}{\\rho_1} + \\frac{m_2}{\\rho_2} = \\frac{w_1 m_{\\text{total}}}{\\rho_1} + \\frac{w_2 m_{\\text{total}}}{\\rho_2}.\n  $$\n- Step 4: Substitute into $\\rho_{\\text{mix}}$:  \n  $$\n  \\rho_{\\text{mix}} = \\frac{m_{\\text{total}}}{\\frac{w_1 m_{\\text{total}}}{\\rho_1} + \\frac{w_2 m_{\\text{total}}}{\\rho_2}} = \\frac{1}{\\frac{w_1}{\\rho_1} + \\frac{w_2}{\\rho_2}}^{-1}.\n  $$\n+ Counterexample: If you mix by volume instead, use arithmetic mean $\\rho = f_1\\rho_1 + f_2\\rho_2$.  \n+ Practical mistake: Averaging densities directly gives +4% error in brass (8.0 vs. 8.36×10³ kg/m³).\n\n**Takeaway:** Always calculate \"total mass / total volume\" — don't average or assume equal fractions.", "source": "Qwen 3 ②", "_id": "qwen_2_1"}, {"question": "Two safety precautions specific to Young modulus experiments — what are they and what hazard does each address?", "answer": "- Step 1: *Safety goggles* — to protect eyes from a wire snapping under tension. Steel wires under near-breaking load can recoil violently when they fail.\n- Step 2: *Sand tray under the masses* — to cushion falling weights when the wire snaps, protecting feet and floor.\n- Step 3: Bonus precaution: stay out of the line of recoil; clamp the support firmly; don't exceed published safe loads. Reasoning consistently: when something is stretched near its limit, anticipate sudden release of stored elastic energy.\n\nThe \"wear gloves\" answer is not the main hazard here — it is eye protection.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "Two identical springs, each with spring constant k = 240 N/m, are connected (a) in series and (b) in parallel. What is the effective spring constant in each case? Explain why. (2 steps)", "answer": "- Step 1: Series combination: 1/k_eff = 1/k + 1/k = 2/k. Therefore k_eff = k/2 = 12
