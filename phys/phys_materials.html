0 N/m. The same force stretches each spring, so total extension doubles → system is \"softer.\"\n- Step 2: Parallel combination: k_eff = k + k = 2k = 480 N/m. The force is shared between springs, each extending less → system is \"stiffer.\"\n\nThe analogy to resistors helps: series springs behave like parallel resistors (k decreases); parallel springs behave like series resistors (k increases).", "source": "MiniMax ①", "_id": "minimax_1_8"}, {"question": "What are the main residual uncertainties in the Eureka-can density experiment that you cannot easily eliminate?", "answer": "Three matter: (i) *adhesion* — some water clings to the string or the object and never reaches the cylinder, slightly under-reading volume; (ii) *trapped air bubbles* on the object's surface displace water without being part of the object, over-reading volume; (iii) *measuring cylinder resolution* — typically $$\\pm 1 \\, \\mathrm{mL}$$ — sets a fundamental floor on volume precision. These cannot be reduced by repeating, only by careful technique and choice of apparatus.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Why does measuring 10 sheets of paper and dividing by 10 give a better thickness than measuring one sheet directly?", "answer": "The dominant uncertainty in a single measurement is the instrument resolution — say $$\\pm 0.01 \\, \\mathrm{mm}$$. For one sheet of about $$0.1 \\, \\mathrm{mm}$$ that is a 10% uncertainty. For a stack of ten sheets ($$\\sim 1.0 \\, \\mathrm{mm}$$) it is only 1% of the stack thickness. Dividing the stack by ten preserves the *absolute* uncertainty of the single reading but applies it to a number ten times larger, so the *percentage* uncertainty drops by a factor of ten. This is a general technique: when a small quantity has high % uncertainty, measure a multiple of it.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "When measuring Young modulus of a wire with Searle's apparatus, why is a *control* wire used alongside the test wire?", "answer": "The control wire is identical to the test wire and hangs from the same support, but it carries only a fixed small reference load. Its purpose is to compensate for **systematic errors that affect both wires equally**: thermal expansion (the support and both wires shift in temperature with the room), any sagging or yielding of the support structure, and any drift in the reference scale position. Since extension is measured as the *difference* between the test and control wire positions (e.g., via a Vernier scale attached to one and a main scale to the other), any common-mode shift cancels out. Without the control wire, you'd be measuring the test wire's extension plus all the environmental noise — leading to a systematically wrong Young modulus.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Why do percentage uncertainties combine differently for products and powers compared to sums and differences? (3 steps)", "answer": "- Step 1: For a product $$z = xy$$, fractional uncertainties add: $$\\Delta z/z = \\Delta x/x + \\Delta y/y$$. This is because a 1% error in $$x$$ scales $$z$$ by 1%, independent of $$y$$, so errors compound multiplicatively when expressed as fractions.\n- Step 2: For a power $$z = x^n$$, the fractional uncertainty multiplies by the power: $$\\Delta z/z = n\\,\\Delta x/x$$. Example: area $$A \\propto d^2$$, so a 0.2% error in $$d$$ becomes a 0.4% error in $$A$$. Doubling: 0.5% → 1%, etc.\n- Step 3: For sums/differences $$z = x \\pm y$$, *absolute* uncertainties add: $$\\Delta z = \\Delta x + \\Delta y$$. This means subtracting two similar numbers can give catastrophic *relative* uncertainty (the \"subtraction trap\"), e.g., subtracting two lengths to find a small extension.\n\nPractical implication: when computing Young modulus from $$FL/(A\\Delta L)$$, area's uncertainty doubles from diameter's because of the square.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Why is the cross-sectional area in stress defined using the *original* unstretched area $$A_0$$ rather than the instantaneous area? (3 steps)", "answer": "- Step 1: This convention defines *engineering stress* $$\\sigma = F/A_0$$. In reality, as a wire stretches it gets slightly thinner (Poisson effect), so the *true* instantaneous area is smaller and the *true stress* $$F/A_{instant}$$ is larger.\n- Step 2: Two practical reasons for $$A_0$$: (i) it is *measurable* once, before loading, with a micrometer; the instantaneous area would require re-measurement at every load. (ii) In the elastic region, strains are tiny (around $$10^{-3}$$ for metals), so the area change is negligible — well within the diameter measurement uncertainty.\n- Step 3: The convention only causes a visible discrepancy at large plastic strains (after necking), where the engineering curve falls after the UTS while the true-stress curve keeps rising.\n\nUse $$A_0$$ at A-level unless explicitly told otherwise.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "If you load a ductile metal past the elastic limit and then release the load, what does the unloading line on a force-extension graph look like, and what does the intercept on the strain axis mean?", "answer": "- Step 1: The unloading line is *straight and parallel to the original elastic line* (the Young modulus has not changed — the material has just been displaced into a new equilibrium).\n- Step 2: It does *not* return to the origin. It hits the strain axis at a positive value — the *permanent (plastic) strain* that the material is now stuck with.\n- Step 3: The horizontal distance between the release point and this intercept is the *recoverable elastic strain*. The intercept itself is the unrecoverable plastic strain.\n\nThis is exactly how you test for plastic deformation in an exam graph: unload, look at where it hits the axis.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "What does \"yield\" mean physically at the atomic level, and why does it correspond to a sudden flat-or-falling region on the stress-strain graph?", "answer": "- Step 1: In a metal lattice, dislocations (line defects) can move under stress. Below yield, they are pinned by other defects, grain boundaries, or impurities — the material deforms only by elastic bond stretching.\n- Step 2: At yield, the applied stress overcomes the pinning forces and dislocations start *sliding* along crystal planes en masse. Each dislocation movement allows atoms to slip past each other, producing large strain at almost constant stress.\n- Step 3: That is why the stress-strain curve flattens or briefly dips at yield: the material is \"giving\" macroscopically because dislocations are moving freely. Beyond yield, the moving dislocations tangle, work-hardening the material — and the curve rises again.\n\nYield is the macroscopic signature of microscopic dislocation motion.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "Why is it a mistake to use the effective series stiffness $$k_{\\text{eff}}$$ to calculate the extension of one individual spring in a series chain?", "answer": "The effective series stiffness $$k_{\\text{eff}}$$ gives the *total chain extension*, not the extension of any single spring. In a series chain, each spring carries the same force $$F$$ (because the load passes through all of them), so each spring's individual extension is $$x_i = F/k_i$$ using its *own* stiffness, not $$k_{\\text{eff}}$$. Using $$F/k_{\\text{eff}}$$ would give the sum of all extensions, which is the chain length change, not one spring's. The exam trap is to confuse \"extension of each spring\" with \"total extension of the chain\" — they are different quantities by a factor of (number of springs) for identical springs.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "If two substances are mixed by *mass fraction* rather than *volume fraction*, what is the correct combination rule for density, and why is it different?", "answer": "- Step 1: For a fixed total mass, it is now the *volumes* that add: $$V_{total} = V_1 + V_2 = m_1/\\rho_1 + m_2/\\rho_2$$.\n- Step 2: Dividing both sides by total mass $$m$$ gives $$1/\\rho_{mix} = w_1/\\rho_1 + w_2/\\rho_2$$, a *harmonic* (reciprocal) combination.\n- Step 3: The structure reverses because: with volume fractions, masses add at fixed volume → arithmetic weighting. With mass fractions, volumes add at fixed mass → harmonic weighting.\n\nAlways go back to \"total mass / total volume\" — the algebra picks the right form automatically.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "When loading a spring beyond its elastic limit and then unloading, what does the force-extension graph look like? What does the intercept on the extension axis represent? (2 steps)", "answer": "- Step 1: The unloading line is a straight line PARALLEL to the original elastic line, but it meets the extension axis at a NON-ZERO value.\n- Step 2: The intercept represents the PERMANENT (plastic) extension — the amount the spring stays stretched after removing the load. The horizontal distance between the unloading line and the original line is the recovered (elastic) extension.\n\nThis is the operational test for plastic deformation: if it returns to the origin → elastic only. If it stops short → plastic deformation has occurred.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "Why does deriving cross-sectional area from a diameter measurement use $$A = \\pi(d/2)^2$$ and not $$A = \\pi d^2$$, and what is the size of the error if you forget?", "answer": "The area of a circle uses the radius: $$A = \\pi r^2$$. When given diameter $$d$$, you must halve it first: $$r = d/2$$, so $$A = \\pi(d/2)^2 = \\pi d^2/4$$. Forgetting the halving and using $$\\pi d^2$$ gives an area that is **4 times too large**. The consequences cascade: stress comes out 4 times too small; extension predicted from a Young modulus formula comes out 4 times too small; a required diameter for a given load comes out wrong too. The discipline that prevents this: the instant a diameter appears in a question, write $$r = d/2$$ on its own line *before* you touch the area formula.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "Why is \"tensile stress is the *inverse* of pressure\" wrong, and what is the correct relationship?", "answer": "- Step 1: Both are force per unit area, with the same unit (Pa) and the same formula structure $$\\sigma = F/A$$ or $$p = F/A$$.\n- Step 2: They are *similar*, not inverse. The difference is contextual: pressure usually refers to force on a surface from a fluid, acting perpendicular and inward (compressive). Tensile stress refers to internal force within a solid stretched outward.\n- Step 3: Calling one the \"inverse\" of the other (in the mathematical sense $$1/x$$) is dimensionally and conceptually wrong. The correct statement: tensile stress is the *solid-material analogue* of pressure for tension.\n\nCompressive stress is closer to pressure; tensile stress is its opposite *direction* but the same dimensional definition.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "A spring of natural length $$210\\,\\mathrm{mm}$$ and $$k = 240\\,\\mathrm{N\\,m^{-1}}$$ supports an $$8\\,\\mathrm{N}$$ load. Why might a student answer \"the spring is now about 24 cm long\" but get this wrong?", "answer": "The extension is $$x = F/k = 8/240 \\approx 0.033\\,\\mathrm{m} = 3.3\\,\\mathrm{cm}$$. Adding to the natural length: $$21\\,\\mathrm{cm} + 3.3\\,\\mathrm{cm} \\approx 24.3\\,\\mathrm{cm}$$. So \"about 24 cm\" is roughly right for a *single* spring under 8 N. The mistake comes when students confuse the question: if \"two in series\" was meant, the *chain* length is $$2 \\times 24.3 = 48.6\\,\\mathrm{cm}$$; if \"two in parallel\", each spring shares 4 N, so each spring's length is $$21 + (4/240) \\times 100 \\approx 22.7\\,\\mathrm{cm}$$. The trap is to compute the single-spring case and label it as the answer for a series/parallel configuration — always identify which configuration first, then apply the appropriate force per spring.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "Energy density is the elastic energy stored per unit volume ($$u = E_e / V$$). Derive the formula for energy density in terms of stress and strain, starting from the elastic strain energy formula $$E_e = \\frac{1}{2} F x$$. (3 steps)", "answer": "- Step 1: Write the volume of the wire as $$V = A \\times L$$ (Cross-sectional area $$\\times$$ Original length). Substitute this into the energy density definition.\n+ $$u = \\frac{E_e}{V} = \\frac{\\frac{1}{2} F x}{A L}$$.\n- Step 2: Rearrange the fraction to group terms that look like stress and strain.\n+ $$u = \\frac{1}{2} \\left( \\frac{F}{A} \\right) \\left( \\frac{x}{L} \\right)$$.\n- Step 3: Substitute the definitions of stress ($$\\sigma = F/A$$) and strain ($$\\varepsilon = x/L$$).\n+ $$u = \\frac{1}{2} \\sigma \\varepsilon$$.\nThis shows that the energy density is simply the area of the triangle under the linear region of the *stress-strain* graph.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "Why does Young modulus depend only on the material, not on shape? (5 steps)", "answer": "- Step 1: Start with Hooke's Law in terms of $k$:  \n  $$\n  k = \\frac{EA}{L} \\quad \\Rightarrow \\quad E = \\frac{kL}{A}.\n  $$\n- Step 2: Consider two copper wires: Wire A is long/thin (small $A$, large $L$), Wire B is short/thick (large $A$, small $L$).  \n- Step 3: Show $k$ varies:  \n  $$\n  k_A = \\frac{EA}{L/2},\\quad k_B = \\frac{2EA}{L} \\quad \\text{for } A,B \\text{ of same volume}.\n  $$\n- Step 4: Stress and strain remove geometry:  \n  $$\n  \\sigma = \\frac{F}{A},\\quad \\varepsilon = \\frac{x}{L},\\quad E = \\frac{\\sigma}{\\varepsilon} = \\frac{FL}{Ax}.\n  $$\n- Step 5: Explain independence from $A$ and $L$: Since $\\sigma$ and $\\varepsilon$ normalize out sample dimensions, $E$ describes the material's inherent stiffness.  \n+ Counterexample: Steel beam vs guitar string — same $E$ but different $k$.  \n+ Visual intuition: Folding the geometry back into $k = EA/L$ explains why longer springs are softer.\n\n**Takeaway:** $E$ is geometry-independent — it's the intrinsic stiffness of the material, not the object.", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "What is the difference between \"the elastic strain energy in a wire\" and \"the elastic strain energy per unit volume\", and when would you use each? (3 steps)", "answer": "- Step 1: **Total elastic strain energy** $$E_e = \\tfrac12 Fx = \\tfrac12 kx^2$$ has units of joules and refers to the specific sample (a particular wire of length $$L$$ and area $$A$$). It depends on the geometry.\n- Step 2: **Energy density** $$u = E_e/V = \\tfrac12 \\sigma\\varepsilon$$ has units $$\\mathrm{J\\,m^{-3}}$$ and characterises the *material's* energy storage per cubic metre at a given strain. Independent of geometry.\n- Step 3: When to use each:\n+ Use total $$E_e$$ when asked about a specific sample (e.g., \"how much energy is stored in this 45 m rail when pre-strained?\").\n+ Use $$u$$ when comparing materials (e.g., \"which material absorbs more energy per cubic metre before failing?\"). Total energy = $$u \\times V = u \\times AL$$.\n\nThe relation parallels mass vs. density: one is sample-specific, the other is material-only.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "What is elastic hysteresis in rubber, what does the loop area represent, and what is one practical consequence? (3 steps)", "answer": "- Step 1: Hysteresis means the loading and unloading curves don't coincide, even though the deformation is overall reversible. Loading follows an upper path; unloading follows a lower path back to the origin. The two enclose a loop.\n- Step 2: The area under the *loading* curve = work done *on* the rubber. The area under the *unloading* curve = work the rubber returns. Their difference (the enclosed loop) = energy dissipated as internal energy (heat) per cycle, due to molecular rearrangement within the polymer.\n- Step 3: Practical consequences:\n+ Vehicle tyres heat up under repeated flexing — energy lost per loop accumulates.\n+ Vibration damping uses hysteresis deliberately to absorb unwanted oscillation energy.\n+ Rubber drive belts waste energy via hysteresis — undesirable in that context.\n\nImportant: $$\\tfrac12 Fx$$ cannot be used for rubber because the curve is non-linear; energy must come from the actual area.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "Why is density classified as an intensive property, and how can you test whether a given physical quantity is intensive or extensive? (3 steps)", "answer": "- Step 1: Density $$\\rho=m/V$$ does not depend on how much of the substance you have. If you cut a copper block in half, both mass and volume halve, so $$\\rho_{\\text{half}} = (m/2)/(V/2) = m/V = \\rho$$. The ratio of two extensive quantities cancels the dependence on amount.\n- Step 2: The operational test is: \"If I doubled the sample size, would this number change?\"\n+ If yes → extensive (mass, volume, weight, extension).\n+ If no → intensive (density, Young modulus, stress at a given strain, temperature).\n- Step 3: This same structural idea reappears with Young modulus: stress and strain are defined precisely so their ratio strips out sample geometry, leaving a material constant. Density is the simplest example of this normalisation idea.\n\nTakeaway: intensive quantities are ratios where the \"amount\" cancels out.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Why is \"tensile strength\" a property of the material rather than a property of the specific bolt or wire being tested?", "answer": "Tensile strength is the maximum stress (force per unit area) a material can sustain before breaking. By dividing the breaking force by the cross-sectional area, the dependence on the bolt's specific dimensions is removed — it becomes a property of the material itself. Two bolts of different sizes made from the same brass will break at different *forces*, but at the same *stress* (force per unit area). So when a problem says \"brass has tensile strength 190 MPa\", this number applies to any brass sample, and to find the maximum force a specific brass pin can withstand, you multiply by that pin's cross-sectional area: $$F_{\\max} = \\sigma_{\\text{strength}} \\times A$$. This normalisation is the same principle that defines stress, strain, and Young modulus as material properties.", "source": "Opus 4.7 ②", "_id": "opus_2_65"}, {"question": "Brass is an alloy of 70% copper and 30% zinc by volume. Given densities: copper = 8.9 × 10³ kg/m³, zinc = 7.1 × 10³ kg/m³, calculate the density of brass. Why can't you just average the densities? (3 steps)", "answer": "- Step 1: This is NOT a simple average. You must calculate total mass over total volume because densities combine based on volume fractions.\n- Step 2: For 1 m³ of brass: V_Cu = 0.70 m³, V_Zn = 0.30 m³. Mass = (8.9 × 10³ × 0.70) + (7.1 × 10³ × 0.30) = 6230 + 2130 = 8360 kg.\n- Step 3: ρ_brass = 8360 kg / 1 m³ = 8360 kg/m³.\n\nA simple mean would give (8.9 + 7.1)/2 × 10³ = 8000 kg/m³ — a 4% error. The key phrase: \"Go back to total mass over total volume.\"", "source": "MiniMax ①", "_id": "minimax_1_5"}, {"question": "Why is averaging two densities directly to get the density of a mixture wrong, and when (if ever) is it correct?", "answer": "Densities cannot be averaged like temperatures because density is a ratio, not an additive quantity. The correct procedure is always \"total mass divided by total volume\". For a mixture with volume fractions $$f_1, f_2$$ of materials with densities $$\\rho_1, \\rho_2$$: total mass is $$\\rho_1 f_1 V + \\rho_2 f_2 V$$ and total volume is $$V$$, giving $$\\rho_{mix} = f_1\\rho_1 + f_2\\rho_2$$ — a *volume-weighted* average. A simple arithmetic mean is only correct in the special case $$f_1 = f_2 = 0.5$$. The single habit that prevents this mistake: never combine densities — go back to \"total mass over total volume\".", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "When measuring the thickness of one sheet of paper, why is it better to measure 10 sheets stacked together and then divide, even if you have a high-resolution micrometer?", "answer": "Instrument resolution introduces an absolute uncertainty (say ±0.01 mm for a micrometer). A single sheet might be 0.10 mm thick — so the *percentage* uncertainty is ±10%. Measuring 10 sheets together gives a reading near 1.0 mm with the same absolute uncertainty ±0.01 mm, so the percentage uncertainty drops to ±1%. Dividing the result by 10 gives the per-sheet thickness with the *same* low percentage uncertainty. The principle: make the measured quantity as large as possible relative to the instrument's resolution to drive down percentage uncertainty. This applies broadly — multiple oscillations to measure a period, longer wires to measure Young modulus, etc.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "What is the physical meaning of toughness, and how is it different from strength on a stress-strain graph? (3 steps)", "answer": "- Step 1: **Strength** is the maximum stress a material can withstand, read as the *peak* (UTS) of the stress-strain curve. A strong material can hold a high load before failing.\n- Step 2: **Toughness** is the total energy a material absorbs per unit volume before fracturing — the *total area under the stress-strain curve up to fracture*. A tough material can absorb a lot of energy (impact, vibration) before breaking.\n- Step 3: The two are independent:\n+ Glass is strong (high UTS) but not tough (small area — brittle fracture).\n+ Mild steel is moderately strong but very tough (large area — long plastic region absorbs huge energy).\n+ Rubber has low UTS but moderate-to-high toughness because the curve extends to very large strains.\n\nEngineering choice: bridges and crash-resistant structures need toughness; cutting tools and pressure vessels need strength.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "Why is \"force per unit area\" the *spring constant* analogue at the material level called a stress, not a spring constant?", "answer": "The spring constant $$k = F/x$$ depends on how thick and how long the object is. To compare different *materials* fairly, we need two normalisations: divide force by cross-sectional area (to remove thickness effects) → stress $$\\sigma = F/A$$; divide extension by original length (to remove length effects) → strain $$\\varepsilon = x/L$$. The ratio of these two gives Young modulus $$E = \\sigma/\\varepsilon$$, which is a true material property. So \"stress\" is the geometry-corrected force, and \"strain\" is the geometry-corrected extension; their ratio is the material-only version of the spring constant.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "Explain why brittle materials (like glass) can be strong but not tough, while ductile materials (like steel) can be tough but not as stiff. Use the stress-strain curve concepts.", "answer": "- Brittle materials: Stress-strain curve is a steep straight line with no curve. They have high UTS (strong) but fracture at small strains with little warning. The area under the curve is small → low toughness. Example: glass has high strength but breaks suddenly.\n\n- Ductile materials: Curve has long plastic region after yield. They absorb much energy before breaking (high toughness), giving visible \"necking\" and warning. Area under curve is large.\n\n- Stiffness (steep gradient = high E) is independent of strength (height of UTS). A material can be stiff AND brittle (glass), or less stiff AND tough (mild steel).", "source": "MiniMax ①", "_id": "minimax_1_17"}, {"question": "To support a 200 kg piano with a single steel wire of breaking strength 500 MPa, what minimum diameter is needed? Walk through the structure. (4 steps)", "answer": "- Step 1: Force required: $$F = mg \\approx 200 \\times 10 = 2000 \\, \\mathrm{N}$$ (rough).\n- Step 2: Minimum area: $$A = F/\\sigma_{max} \\approx 2000/(5 \\times 10^8) = 4 \\times 10^{-6} \\, \\mathrm{m^2}$$.\n- Step 3: From $$A = \\pi(d/2)^2$$, solve $$d/2 = \\sqrt{A/\\pi} \\approx \\sqrt{1.3 \\times 10^{-6}} \\approx 1.1 \\times 10^{-3} \\, \\mathrm{m}$$.\n- Step 4: $$d \\approx 2.2 \\, \\mathrm{mm}$$.\n\nSanity check: a piano really does hang on roughly mm-thick steel wires (think of a guitar string scaled up) — physically reasonable.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Derive the elastic strain energy formula $$E_e=\\tfrac12 kx^2$$ from first principles, and explain why the factor of one-half appears. (3 steps)", "answer": "- Step 1: Work is force times distance, but here the force grows from $$0$$ at zero extension to $$F$$ at extension $$x$$. So we need the area under the force-extension graph, not force times final extension.\n- Step 2: For a Hookean spring the graph is a straight line through the origin, so the area is a triangle: $$E_e = \\tfrac12 (\\text{base})(\\text{height}) = \\tfrac12 x F$$. Integrating gives the same result: $$E_e = \\int_0^x F\\,dx' = \\int_0^x kx'\\,dx' = \\tfrac12 kx^2$$.\n- Step 3: The factor of one-half appears because the *average* force during the stretch is $$\\tfrac12 F$$, not $$F$$. Writing $$Fx$$ without the half would be the work of a *constant* force $$F$$ — the rectangle, which is twice the actual triangular area.\n\nTakeaway: the half comes from the linear build-up of force, not from a calculus trick.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "A rubber band shows elastic hysteresis: the loading curve and unloading curve do not coincide. What does this mean, and what happens to the energy? (2 steps)", "answer": "- Step 1: Hysteresis means the material follows different paths when loading and unloading. The work done stretching is greater than the work returned.\n- Step 2: The area between the two curves represents energy dissipated as HEAT in the rubber. This is why a stretched rubber band released repeatedly feels warm, and why tyres heat up during driving.\n\nThis is useful for vibration damping (car suspensions) but wasteful in rubber belts. The deformation is elastic (returns to original shape) but energy is lost each cycle.", "source": "MiniMax ①", "_id": "minimax_1_18"}, {"question": "Conceptually, why does increasing the radius of a wire reduce extension under a fixed load, but increasing the length of the wire increases extension? (3 steps)", "answer": "- Step 1: From $$\\Delta L = FL/(AE)$$, extension is proportional to $$L$$ and inversely proportional to $$A$$. The geometry has two opposite effects.\n- Step 2: **Why $$A$$ in denominator**: more cross-sectional area means more bonds in *parallel* across the section, sharing the load. Each bond carries less force, so each stretches less. The wire is stiffer overall.\n- Step 3: **Why $$L$$ in numerator**: more length means more bonds in *series* along the wire. Even if each bond stretches the same tiny amount (same stress → same strain), there are more of them adding up, giving more total extension.\n\nSo thicker = more parallel paths = stiffer = less extension. Longer = more series links = more cumulative stretch = more extension. The two effects together explain $$k = EA/L$$.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "Why does measuring 20 separate readings of one wire's diameter and averaging them give a better estimate than measuring one reading carefully? (3 steps)", "answer": "- Step 1: Each individual reading has random uncertainty — variations in micrometer alignment, wire roughness, slight ovality, operator judgment. These random errors are statistically independent across readings.\n- Step 2: Averaging $$N$$ independent readings reduces the standard error by a factor of $$\\sqrt{N}$$ (central limit theorem). So 20 readings give about $$\\sqrt{20} \\approx 4.5$$ times less random uncertainty than one reading.\n- Step 3: Crucially, this only reduces *random* uncertainty — it does NOT reduce systematic uncertainty (e.g., a zero error or a miscalibrated instrument). For a wire that may not be perfectly circular, taking readings at different orientations also samples the variation and gives a more representative \"average diameter\".\n\nSingle readings give a number with no estimate of its reliability; multiple readings give both a best estimate and a measure of its uncertainty.", "source": "Opus 4.7 ②", "_id": "opus_2_62"}, {"question": "How does the spring constant change when a spring is (a) halved in length? (b) halved in diameter? (c) cut into three equal pieces and connected in series? (3 steps for each sub-question)", "answer": "- Step 1 (a): Treat length as in parallel: $k \\propto 1/L$, so halving length → $k$ doubles.\n- Step 2 (b): Cross-sectional area scales as $r^2$. Halving diameter → quarter area → quarter stiffness.\n- Step 3 (c): Series springs → reciprocal rule. Three pieces in series: $k_{\\text{series}} = k/3$. Each spring has same $k = EA/L$, so total extension adds, requiring less force — softer system.\n+ Contrast: Cutting and arranging in parallel makes $k$ triple — stiffer overall.\n+ Intuition: Thicker cables (larger $A$) and shorter cables (small $L$) are inherently stiffer.\n\n**Takeaway:** Spring constant $k$ is object-dependent; geometry (length, cross-section) controls how much it deforms.", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "Explain why the yield point on a stress-strain curve isn’t just a point — why does it sometimes appear as a short horizontal line? (2 steps)", "answer": "- Step 1: Material microstructure explanation: Dislocations in metals begin to move easily when stress reaches yield point, allowing large strain with little stress increase.  \n- Step 2: Engineering impact: This sudden elongation (yielding) is a critical design consideration to prevent unexpected deformation.  \n+ Edge case: Some materials (e.g., carbon fiber) lack a clear yield point — stress increases continuously until fracture.\n\n**Takeaway:** Yielding is the onset of permanent atomic rearrangement, not just bond stretching.", "source": "Qwen 3 ②", "_id": "qwen_2_11"}, {"question": "Why must you use the *original* unstressed length of a wire when computing strain, even after the wire has been stretched many times in repeated trials? (3 steps)", "answer": "- Step 1: Engineering strain is defined as $$\\varepsilon = (L - L_0)/L_0$$ where $$L_0$$ is the original unstressed length. The convention fixes the reference state.\n- Step 2: If the wire has been stretched into its plastic region, it has a new unstressed length $$L_0' > L_0$$ (permanent extension). For *new* tests starting from this state, you'd use $$L_0'$$ as the reference. But within any one test where you're just loading and elastically stretching, you use whatever the unloaded length is at the start of that test.\n- Step 3: For Young modulus determination, always start from the unstretched state and ensure no plastic deformation has occurred during the test — otherwise the reference $$L_0$$ is ambiguous.\n\nTakeaway: strain references the unstressed state at the start of the test; don't update it mid-stretch.", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "A student claims: \"If I add more springs in parallel, the system stores more elastic energy at the same extension.\" Critique this. (3 steps)", "answer": "- Step 1: For the same extension $$x$$, each parallel spring stores $$\\tfrac{1}{2}kx^2$$. With $$n$$ identical springs, total energy is $$n \\times \\tfrac{1}{2}kx^2 = \\tfrac{1}{2}(nk)x^2 = \\tfrac{1}{2}k_{eff}x^2$$.\n- Step 2: At fixed *extension*, yes — more parallel springs store more energy because more material is being deformed.\n- Step 3: But to *reach* the same extension, you must apply $$F = nkx$$, i.e. proportionally more force. If instead you fix the *force* and let extension adjust, $$x = F/(nk)$$, and each spring stores $$\\tfrac{1}{2}k(F/nk)^2 = F^2/(2n^2 k)$$, with total $$n \\times$$ that $$= F^2/(2nk)$$ — *less* energy with more springs.\n\nSo the claim is correct at fixed extension, wrong at fixed force. Always specify what's held constant.", "source": "Opus 4.7 ①", "_id": "opus_1_70"}, {"question": "A balloon of 20 cm radius contains 50 g of air. Why does its computed density (about 1.5 kg/m³) exceed the standard atmospheric value (about 1.2 kg/m³)?", "answer": "- Step 1: A balloon is inflated to a pressure *above* atmospheric — the rubber walls exert inward tension on the gas, so to stay in mechanical equilibrium the internal pressure must exceed external.\n- Step 2: Higher pressure at fixed volume means more air molecules packed into the same space — by the ideal gas law $$\\rho \\propto p/T$$ at fixed temperature.\n- Step 3: Temperature could also matter (cooler air is denser), but pressure is the dominant effect for a flexible balloon. So the air *inside* is compressed and denser than ambient.\n\nThe principle: the balloon's tension story sets the pressure, and the pressure sets the density.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "What does the spring constant $$k$$ physically measure, and why does it depend on the dimensions of the object?", "answer": "The spring constant $$k$$ is the gradient of the force-extension line, with units $$\\mathrm{N\\,m^{-1}}$$. It answers the question: \"How many newtons are required to stretch *this particular object* by one metre?\" It is a property of the whole object, not of the material. A longer wire of the same metal has a smaller $$k$$ (more bonds in a chain, each stretching, so larger total extension for the same force), and a thicker wire has a larger $$k$$ (more parallel bonds sharing the load). This object-dependence is exactly why Young modulus is needed: to characterise the *material* independently of its shape.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "When rubber is stretched and released, the loading and unloading curves form a closed loop (hysteresis). What does the area enclosed by this loop represent, and where does that energy go? (2 steps)", "answer": "- Step 1: The area enclosed by the loop represents the energy dissipated (not recovered) per cycle of loading and unloading.\n- Step 2: This energy is converted into internal energy (heat) within the rubber. This is why a repeatedly stretched rubber band or a flexing tyre becomes warm.\n\nThe loading curve area is work done *on* the rubber; the unloading curve area is work done *by* the rubber; the difference (loop area) is the heat lost.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "The elastic strain energy stored in a wire can be expressed as total energy $$E_e$$ or energy density $$u$$. Explain what energy density means physically and how it relates to stress and strain. (2 steps)", "answer": "- Step 1: Energy density $$u$$ is the elastic strain energy stored *per unit volume* of the material ($$u = E_e / V$$). Its unit is $$\\text{J m}^{-3}$$, which is dimensionally equivalent to Pascals.\n- Step 2: Dividing the energy formula $$\\frac{1}{2}Fx$$ by volume $$V = AL$$ gives $$u = \\frac{\\frac{1}{2}Fx}{AL} = \\frac{1}{2} \\left(\\frac{F}{A}\\right) \\left(\\frac{x}{L}\\right) = \\frac{1}{2}\\sigma\\varepsilon$$. Thus, energy density equals half the product of stress and strain.\n\nThis is the area under the *stress-strain* graph, just as total energy is the area under the *force-extension* graph.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "The formula for elastic strain energy is $$E_e = \\frac{1}{2} F x$$. Why is there a factor of $$\\frac{1}{2}$$, rather than just $$F x$$? Explain using the concept of average force during the stretch. (2 steps)", "answer": "- Step 1: Work done is force times distance, but this formula assumes a *constant* force. When stretching a spring from zero extension to a final extension $$x$$, the force is not constant; it starts at 0 and increases linearly to $$F$$.\n- Step 2: To calculate the work done, we must use the *average* force during the stretch.\n+ Average force = $$\\frac{0 + F}{2} = \\frac{1}{2} F$$.\n+ Work done = Average force $$\\times$$ distance = $$\\frac{1}{2} F \\times x$$.\n+ The product $$Fx$$ (without the half) would be the work done by a constant force $$F$$ pushing over the distance $$x$$, which is twice the actual energy stored in the spring.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "When unloading a rubber band, why is the unloading curve *below* the loading curve, not above it?", "answer": "- Step 1: During loading, you do work *on* the rubber against the internal resistance.\n- Step 2: At any given extension, more force was needed to *get* there (loading) than the rubber pushes back with on the way out (unloading) — because some energy has already been \"spent\" as internal friction.\n- Step 3: Therefore at the same extension, the loading force is higher than the unloading force, so the loading curve sits *above* the unloading curve. The area between them is the dissipated heat.\n\nIf unloading were *above* loading, you would get more energy out than you put in — that would violate energy conservation.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "A volume question asks for the volume of a sphere where the diameter is given in cm and the final answer is needed in $$\\mathrm{m^3}$$. Why is the cubed unit conversion easy to get wrong? (3 steps)", "answer": "- Step 1: The conversion factor 1 cm = $$10^{-2}$$ m applies to length. When cubed, $$1\\,\\mathrm{cm^3} = (10^{-2}\\,\\mathrm{m})^3 = 10^{-6}\\,\\mathrm{m^3}$$ — the exponent of 10 multiplies by 3.\n- Step 2: Common error: forgetting the cubing and using $$10^{-2}$$ as the volume conversion. This makes the result $$10^4$$ times wrong — off by orders of magnitude.\n- Step 3: To avoid: either (a) convert all lengths to metres *first*, then compute volume in $$\\mathrm{m^3}$$ directly; or (b) compute volume in $$\\mathrm{cm^3}$$ and then multiply by $$10^{-6}$$ to get $$\\mathrm{m^3}$$. Don't mix.\n\nDensity conversion follows the same logic: $$1\\,\\mathrm{g\\,cm^{-3}} = 10^{-3}\\,\\mathrm{kg} / 10^{-6}\\,\\mathrm{m^3} = 10^3\\,\\mathrm{kg\\,m^{-3}}$$. The factor is $$10^3$$, not $$10^5$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "Hooke's Law states $$F = kx$$. At the atomic level, a solid is a lattice of atoms connected by interatomic bonds. Explain why Hooke's Law is linear for small extensions, and why it fails for large extensions. (3 steps)", "answer": "- Step 1: Atoms sit at an equilibrium separation $$r_0$$ where the interatomic potential energy is at a minimum. Near this minimum, the potential energy curve is approximately **parabolic** (like a U-shape).\n- Step 2: Force is the negative gradient of the potential energy curve. The gradient of a parabola is a straight line. Therefore, for small displacements from $$r_0$$, the restoring force is approximately linearly proportional to the displacement: $$F \\approx -\\kappa(r - r_0)$$.\n- Step 3: For large extensions, the atoms are pulled far from $$r_0$$. The potential energy curve is no longer parabolic (it flattens out as atoms approach separation). Because the curve is no longer parabolic, its gradient is no longer linear, and Hooke's Law breaks down. This is the physical origin of the limit of proportionality.", "source": "GLM 5.1 ①", "_id": "glm_1_12"}, {"question": "What distinguishes brittle, ductile, and polymeric materials in terms of their stress-strain curve shape and failure behaviour? (3 steps)", "answer": "- Step 1: **Brittle** (glass, ceramic): curve is straight, often steep, stops abruptly with essentially no plastic region. Fractures suddenly at the end of the elastic line with little warning. Can have high UTS but small total area under curve → low toughness.\n- Step 2: **Ductile** (copper, mild steel): linear region, then yield, then long curved plastic region to UTS and down to fracture. Necks visibly before breaking — gives warning. Large area under curve → tough.\n- Step 3: **Polymeric** (rubber): shallow S-shape, easy to stretch initially then stiffening at high strain. Strains can reach hundreds of percent. Loading and unloading follow different paths (hysteresis loop).\n\nTwo warnings: (a) \"brittle\" does NOT mean \"weak\" — glass fibre is brittle but very strong. (b) \"stiff\" (high $$E$$), \"strong\" (high UTS), and \"tough\" (large total area) are three independent properties.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A micrometer screw gauge has a main scale marked in millimetres and half-millimetres, and a thimble scale with 50 divisions. If the thimble rotates by one full turn, how far does the spindle move, and what is the resolution of the instrument? (2 steps)", "answer": "- Step 1: The main scale is marked in 0.5 mm increments. The thimble has 50 divisions. If the thimble rotates one full turn (50 divisions), the spindle must advance by one main-scale increment to maintain the mechanism's gearing ratio.\n+ Therefore, one full turn advances the spindle by 0.5 mm.\n- Step 2: The resolution is the distance moved per single thimble division.\n+ Resolution = (Distance per full turn) / (Number of divisions) = $$0.5 \\text{ mm} / 50 = 0.01 \\text{ mm}$$.\nThis means the smallest distance the instrument can reliably detect is $$0.01 \\text{ mm}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "When reading a micrometer, a student notes that the last fully visible mark on the main scale (sleeve) is 7 mm, and the 0.5 mm mark is *not* visible. The thimble reads 24. What mistake would the student make if they assumed the 0.5 mm mark was visible, and what is the correct reading? (2 steps)", "answer": "- Step 1: If the student incorrectly assumes the 0.5 mm mark is visible, they would add 0.5 mm to the main scale reading.\n+ Incorrect main reading = $$7.0 \\text{ mm} + 0.5 \\text{ mm} = 7.5 \\text{ mm}$$.\n+ This leads to an overestimation of the total reading by exactly 0.5 mm.\n- Step 2: The correct reading only includes the last visible mark (7.0 mm) plus the thimble reading.\n+ Thimble contribution = $$24 \\times 0.01 \\text{ mm} = 0.24 \\text{ mm}$$.\n+ Correct total reading = $$7.0 \\text{ mm} + 0.24 \\text{ mm} = 7.24 \\text{ mm}$$.\nThe 0.5 mm mark is the most common trap; it must only be added if the thimble edge has clearly passed it.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "A Vernier caliper has a main scale in millimetres and a Vernier scale with 20 divisions that slides along the main scale. The total length of the 20 Vernier divisions equals 19 mm on the main scale. What is the resolution of this instrument? (3 steps)", "answer": "- Step 1: Determine the length of one Vernier division.\n+ 20 Vernier divisions = 19 mm.\n+ 1 Vernier division = $$19 / 20 = 0.95 \\text{ mm}$$.\n- Step 2: Determine the difference between one main scale division and one Vernier division.\n+ 1 main scale division = 1.00 mm.\n+ Difference = $$1.00 \\text{ mm} - 0.95 \\text{ mm} = 0.05 \\text{ mm}$$.\n- Step 3: The resolution (least count) is this difference. When the Vernier scale moves by 0.05 mm, the first Vernier line aligns with a main scale line. Therefore, the instrument can detect changes of 0.05 mm.\n+ Resolution = $$0.05 \\text{ mm}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "When a Vernier caliper's jaws are fully closed, the zero of the Vernier scale sits slightly to the *right* of the main scale zero, and the 2nd Vernier division aligns with a main scale line (resolution = 0.05 mm). Is this a positive or negative zero error, and how should the final measurement be corrected? (2 steps)", "answer": "- Step 1: Identify the type of error. A positive zero error occurs when the instrument reads a value greater than zero when it should read zero. Since the Vernier zero is to the right (indicating a reading > 0), this is a **positive zero error**.\n+ The magnitude of the error is $$2 \\times 0.05 \\text{ mm} = +0.10 \\text{ mm}$$.\n- Step 2: Apply the correction. Because the instrument consistently reads *too high* by 0.10 mm, you must subtract this value from any observed reading to find the true value.\n+ Actual Reading = Observed Reading - (+0.10 mm).", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A student measures the diameter of a wire using a micrometer. They take a single reading. Another student measures the same wire's diameter at five different points and averages them. Both students use the same instrument. What specific type of error does the second student reduce, and why does this method work? (2 steps)", "answer": "- Step 1: The second student reduces **random errors**. Random errors are unpredictable fluctuations (e.g., from slight variations in the wire's shape or how tightly the micrometer is closed) that cause readings to scatter around the true value.\n- Step 2: Averaging works because random errors are equally likely to be positive or negative. By taking multiple readings, the overestimates and underestimates tend to cancel each other out.\n+ The mean value converges closer to the true value than a single, potentially anomalous, reading would.\n+ This does *not* fix systematic errors (like a zero error), which push all readings in the same direction.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "A student wants to measure the thickness of a single sheet of paper ($$\\approx 0.1 \\text{ mm}$$) using a ruler (resolution 1 mm). They measure a stack of 50 sheets to be 5 mm thick. How does this method reduce the percentage uncertainty of the measurement? (2 steps)", "answer": "- Step 1: Calculate the absolute uncertainty for a single measurement vs. the stack. The ruler has an absolute uncertainty of $$\\pm 0.5 \\text{ mm}$$ (half the smallest division).\n+ For 1 sheet: Absolute uncertainty is $$\\pm 0.5 \\text{ mm}$$. The reading is roughly 0.1 mm. This is impossible to read reliably.\n+ For 50 sheets: Absolute uncertainty is still $$\\pm 0.5 \\text{ mm}$$ on the 5 mm reading.\n- Step 2: Compare the percentage uncertainties.\n+ Uncertainty for the stack thickness: $$(0.5 / 5.0) \\times 100\\% = 10\\%$$.\n+ Uncertainty for a single sheet thickness (found by dividing stack thickness by 50): The absolute uncertainty also divides by 50, becoming $$\\pm 0.01 \\text{ mm}$$.\n+ New percentage uncertainty on the single sheet value: $$(0.01 / 0.1) \\times 100\\% = 10\\%$$.\n+ By measuring a larger quantity, the absolute uncertainty of the instrument becomes a much smaller fraction of the measured value, reducing the overall percentage uncertainty.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "Density is defined as mass per unit volume ($$\\rho = m/V$$). If you cut a uniform block of copper exactly in half, does the density of one of the halves change? Explain the reasoning using the concepts of extensive and intensive properties. (2 steps)", "answer": "- Step 1: The density does **not** change. Mass and volume are **extensive** properties—they scale with the amount of substance. When you cut the block in half, the mass halves ($$m/2$$) and the volume halves ($$V/2$$).\n- Step 2: Density is an **intensive** property—it depends on the material itself, not the amount.\n+ $$\\rho_{\\text{half}} = \\frac{m/2}{V/2} = \\frac{m}{V} = \\rho_{\\text{original}}$$.\nThe amount-dependent factors (numerator and denominator) cancel out, leaving a property that characterizes the material regardless of sample size.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Brass is an alloy of 70% copper and 30% zinc *by volume*. A student calculates the density of brass by simply averaging the densities of copper and zinc: $$\\rho_{\\text{brass}} = (\\rho_{\\text{copper}} + \\rho_{\\text{zinc}}) / 2$$. Why is this calculation fundamentally wrong, even if the volume fractions happened to be 50/50? (2 steps)", "answer": "- Step 1: Density is mass divided by volume. To find the density of a mixture, you must find the *total* mass and divide by the *total* volume: $$\\rho_{\\text{mix}} = \\frac{m_1 + m_2}{V_1 + V_2}$$. A simple arithmetic mean of densities ignores the definition of density and the weighting of the components.\n- Step 2: For volume fractions $$f_1$$ and $$f_2$$, the correct formula is a *volume-weighted average*: $$\\rho_{\\text{mix}} = f_1\\rho_1 + f_2\\rho_2$$.\n+ A simple mean $$(\\rho_1 + \\rho_2)/2$$ is only valid if $$f_1 = f_2 = 0.5$$.\n+ For the 70/30 mix, the student's method ignores that the final density should be \"pulled\" more toward copper's density because copper occupies more of the volume.\n+ The habit should always be: go back to \"total mass over total volume\" rather than averaging densities directly.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "You are asked to estimate the density of a liquid mixture where the components are given *by mass fraction* (e.g., 60% by mass liquid A, 40% by mass liquid B). Why can't you use the volume-weighted average formula $$\\rho_{\\text{mix}} = f_A\\rho_A + f_B\\rho_B$$ here? (2 steps)", "answer": "- Step 1: The volume-weighted average formula assumes you know the *volume* fractions. If you are given *mass* fractions, the volumes of the components are not immediately known; you must calculate them using $$V = m/\\rho$$.\n- Step 2: For mass fractions, the volumes add, not the densities.\n+ Total volume $$V = V_A + V_B = \\frac{m_A}{\\rho_A} + \\frac{m_B}{\\rho_B}$$.\n+ Since $$\\rho = m_{\\text{total}} / V_{\\text{total}}$$, inverting the density equation gives the harmonic-style combination:\n+ $$\\frac{1}{\\rho_{\\text{mix}}} = \\frac{w_A}{\\rho_A} + \\frac{w_B}{\\rho_B}$$ (where $$w$$ is mass fraction).\nUsing the volume average with mass fractions would yield a significantly incorrect (typically overestimated) density.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "To measure the density of an irregular solid (like a small stone), why is it crucial to measure the mass *before* using the water displacement method to find the volume? (2 steps)", "answer": "- Step 1: When the stone is submerged in water to measure its volume, water adheres to its surface. If you were to measure the mass after submersion, you would be measuring the mass of the stone *plus* the mass of the water clinging to it.\n- Step 2: This would introduce a systematic error: the measured mass would be artificially high, while the volume measurement would be accurate (assuming the stone is fully submerged). Since $$\\rho = m/V$$, an overestimated mass leads to a calculated density that is higher than the true density of the stone.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "When measuring the density of a liquid using a measuring cylinder and a mass balance, a student measures the mass of the empty cylinder, then adds the liquid and measures the total mass. Why is it important to ensure the cylinder is dry before the first mass measurement? (2 steps)", "answer": "- Step 1: The goal is to find the mass of the liquid alone ($$m_{\\text{liquid}} = m_{\\text{full}} - m_{\\text{empty}}$$). If the cylinder is wet, $$m_{\\text{empty}}$$ includes the mass of residual water.\n- Step 2: When the liquid is added and the total mass is measured, the residual water is still there. The subtraction $$(m_{\\text{full}} - m_{\\text{empty}})$$ would correctly cancel out the residual water's mass.\n+ However, the *volume* reading would be contaminated. The residual water adds volume that isn't accounted for in the \"empty\" state, or mixes with the test liquid, meaning the volume reading on the scale doesn't correspond solely to the mass of the test liquid calculated. This leads to an inaccurate density value.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "A balloon is inflated at sea level. If the same balloon is taken to a high altitude where the atmospheric pressure is significantly lower (and temperature is lower), how would the *density* of the air inside the balloon change, assuming the balloon is elastic and expands? (2 steps)", "answer": "- Step 1: Consider the mass and volume. The mass of the air trapped inside the sealed balloon remains constant. However, because the external atmospheric pressure is lower at high altitude, there is less force compressing the balloon. The elastic balloon will expand, increasing its volume.\n- Step 2: Since density is mass divided by volume ($$\\rho = m/V$$), and the mass is constant while the volume increases, the density of the air inside the balloon must **decrease**.\n+ Additionally, lower temperature tends to increase density, but for a gas in an elastic container, the pressure drop (and resulting volume increase) is typically the dominant effect unless the balloon is rigid.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Hooke's Law states $$F = kx$$. At the atomic level, a solid is a lattice of atoms connected by interatomic bonds. Explain why Hooke's Law is linear for small extensions, and why it fails for large extensions. (3 steps)", "answer": "- Step 1: Atoms sit at an equilibrium separation $$r_0$$ where the interatomic potential energy is at a minimum. Near this minimum, the potential energy curve is approximately **parabolic** (like a U-shape).\n- Step 2: Force is the negative gradient of the potential energy curve. The gradient of a parabola is a straight line. Therefore, for small displacements from $$r_0$$, the restoring force is approximately linearly proportional to the displacement: $$F \\approx -\\kappa(r - r_0)$$.\n- Step 3: For large extensions, the atoms are pulled far from $$r_0$$. The potential energy curve is no longer parabolic (it flattens out as atoms approach separation). Because the curve is no longer parabolic, its gradient is no longer linear, and Hooke's Law breaks down. This is the physical origin of the limit of proportionality.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "A spring constant $$k$$ is defined as force per unit extension ($$k = F/x$$). Is the spring constant a property of the *material* (like steel) or the *object* (like a specific spring)? How does the spring constant change if a wire is made longer? (2 steps)", "answer": "- Step 1: The spring constant $$k$$ is a property of the **object**, not just the material. It depends on the dimensions (length and cross-sectional area) of the object. Two springs made of the same steel but with different coil sizes will have different spring constants.\n- Step 2: If a wire (or spring) is made longer, the spring constant **decreases** (the wire becomes \"softer\" or easier to stretch).\n+ Intuition: A longer wire has more atomic bonds in series. Each bond stretches by a small amount under the force, but the total extension is the sum of all these small stretches.\n+ More bonds in series = more total extension for the same force = lower $$k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Two identical springs, each with spring constant $$k$$, are connected end-to-end (in series). A force $$F$$ is applied to the combination. What is the extension of the *combination*, and what is the effective spring constant $$k_{\\text{eff}}$$ of the system? (2 steps)", "answer": "- Step 1: In a series arrangement, the same force $$F$$ is transmitted through both springs. Each spring extends by $$x = F/k$$. The total extension is the sum of the individual extensions.\n+ $$x_{\\text{total}} = x_1 + x_2 = \\frac{F}{k} + \\frac{F}{k} = \\frac{2F}{k}$$.\n- Step 2: The effective spring constant is defined by $$F = k_{\\text{eff}} x_{\\text{total}}$$.\n+ Rearranging: $$k_{\\text{eff}} = \\frac{F}{x_{\\text{total}}} = \\frac{F}{2F/k} = \\frac{k}{2}$$.\n+ The effective constant is *smaller* than the individual constants. The general rule is $$\\frac{1}{k_{\\text{eff}}} = \\frac{1}{k_1} + \\frac{1}{k_2}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Two identical springs, each with spring constant $$k$$, are connected side-by-side (in parallel) supporting a mass. A force $$F$$ is applied to the combination. What is the effective spring constant $$k_{\\text{eff}}$$, and how does the extension compare to using a single spring? (2 steps)", "answer": "- Step 1: In a parallel arrangement, the force is shared between the springs, but both springs must extend by the *same* amount $$x$$. If the springs are identical, they share the load equally: $$F_1 = F_2 = F/2$$.\n+ The extension of each is $$x = \\frac{F/2}{k}$$.\n- Step 2: The total force is $$F = F_1 + F_2 = kx + kx = 2kx$$.\n+ Therefore, the effective spring constant is $$k_{\\text{eff}} = 2k$$.\n+ The extension is *half* of what it would be for a single spring under the same load. The general rule is $$k_{\\text{eff}} = k_1 + k_2$$. Parallel springs are stiffer.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "The formula for elastic strain energy is $$E_e = \\frac{1}{2} F x$$. Why is there a factor of $$\\frac{1}{2}$$, rather than just $$F x$$? Explain using the concept of average force during the stretch. (2 steps)", "answer": "- Step 1: Work done is force times distance, but this formula assumes a *constant* force. When stretching a spring from zero extension to a final extension $$x$$, the force is not constant; it starts at 0 and increases linearly to $$F$$.\n- Step 2: To calculate the work done, we must use the *average* force during the stretch.\n+ Average force = $$\\frac{0 + F}{2} = \\frac{1}{2} F$$.\n+ Work done = Average force $$\\times$$ distance = $$\\frac{1}{2} F \\times x$$.\n+ The product $$Fx$$ (without the half) would be the work done by a constant force $$F$$ pushing over the distance $$x$$, which is twice the actual energy stored in the spring.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "A spring is stretched beyond its limit of proportionality, resulting in a curved force-extension graph. Can you still use the formula $$E_e = \\frac{1}{2} k x^2$$ to find the energy stored? If not, how must the energy be determined? (2 steps)", "answer": "- Step 1: You **cannot** use $$E_e = \\frac{1}{2} k x^2$$ or $$\\frac{1}{2} F x$$ beyond the limit of proportionality. These formulas are derived specifically for the linear (straight-line) region where Hooke's Law holds ($$F = kx$$). Beyond this point, the relationship is non-linear.\n- Step 2: The energy stored is still the area under the force-extension graph, but because the graph is curved, the area is no longer a simple triangle.\n+ To find the energy, you must determine the actual area under the curve, typically by counting squares on the graph paper or using the trapezium rule.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Stress is defined as $$\\sigma = F/A$$, and Strain is defined as $$\\varepsilon = \\Delta L / L$$. Both stress and strain involve geometric dimensions of the sample (Area and Length). Why do we define these quantities instead of just using Force and Extension? (2 steps)", "answer": "- Step 1: Force and Extension depend on the specific size and shape of the object (they are extensive or object-dependent). A thick, short wire extends less than a thin, long wire under the same force. This makes it impossible to compare the inherent stiffness of the *materials* themselves.\n- Step 2: Stress and Strain \"normalize\" the measurements by the sample's geometry.\n+ Stress divides Force by Area, removing the dependence on how thick the sample is.\n+ Strain divides Extension by Original Length, removing the dependence on how long the sample is.\n+ By normalizing out the geometry, Stress and Strain allow us to compare the fundamental material response, leading to a material constant (Young Modulus) that is independent of sample dimensions.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "The Young Modulus $$E$$ is defined as $$E = \\frac{\\sigma}{\\varepsilon} = \\frac{F/A}{\\Delta L / L} = \\frac{FL}{A \\Delta L}$$. Show how this formula connects to the spring constant $$k = F/\\Delta L$$, and explain why doubling the length of a wire halves its stiffness. (3 steps)", "answer": "- Step 1: Start with the definition of Young Modulus and substitute $$k = F/\\Delta L$$ (which means $$\\Delta L = F/k$$).\n+ $$E = \\frac{FL}{A(F/k)} = \\frac{FLk}{AF} = \\frac{kL}{A}$$.\n- Step 2: Rearrange to solve for the spring constant $$k$$.\n+ $$k = \\frac{EA}{L}$$.\n- Step 3: Analyze the relationship $$k = EA/L$$. For a fixed material ($$E$$ is constant) and fixed thickness ($$A$$ is constant), the stiffness $$k$$ is inversely proportional to length $$L$$.\n+ If length $$L$$ doubles, $$k$$ halves.\n+ This confirms that a longer wire is \"softer\" (extends more for the same force), while Young Modulus remains a constant property of the material.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "In the formula for stress $$\\sigma = F/A$$, the area $$A$$ is typically the *original* cross-sectional area (Engineering Stress). What is \"True Stress,\" and why is Engineering Stress preferred in A-level physics? (2 steps)", "answer": "- Step 1: True Stress uses the *instantaneous* cross-sectional area ($$F/A_{\\text{instant}}$$). As a wire stretches, it gets thinner (Poisson effect), so the instantaneous area decreases, making True Stress higher than Engineering Stress.\n- Step 2: Engineering Stress is preferred for two reasons:\n+ **Practicality:** The original area $$A_0$$ can be measured easily before the test with a micrometer. Measuring the instantaneous area during stretching is extremely difficult.\n+ **Negligible difference in the elastic region:** Elastic strains are tiny (order of $$10^{-3}$$), so the area change is also tiny. The difference between True and Engineering stress is far below experimental uncertainty. (The distinction only matters at large plastic strains).", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "On a stress-strain graph for a ductile metal, three key points appear close together: Limit of Proportionality (P), Elastic Limit (E), and Yield Point (Y). What specific physical change occurs at each point? (3 steps)", "answer": "- Step 1: **Limit of Proportionality (P)**. This is the point where the graph stops being a straight line. The physical change is that stress is no longer directly proportional to strain; Hooke's Law ceases to apply.\n- Step 2: **Elastic Limit (E)**. This is the point beyond which the material will no longer return to its original length when the load is removed. The physical change is the onset of permanent (plastic) deformation.\n- Step 3: **Yield Point (Y)**. This is the point where the material begins to extend rapidly with little or no extra load. The physical change is that atomic planes start to slide past one another (slip), causing a sudden large increase in strain.\n+ Summary: P = line stops being straight; E = deformation stops being reversible; Y = material suddenly gives way.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "A student claims: \"A brittle material is a weak material.\" Is this statement correct? Justify your answer using the concepts of Ultimate Tensile Stress (UTS) and the shape of a stress-strain curve. (2 steps)", "answer": "- Step 1: The statement is **incorrect**. Brittleness refers to *how* a material fails (with little or no plastic deformation), not how strong it is. A brittle material can have a very high Ultimate Tensile Stress (it takes a large stress to break it).\n- Step 2: On a stress-strain curve, a brittle material shows a straight line that stops abruptly at fracture, with almost no curved plastic region.\n+ Glass fibre is brittle but very strong (high UTS, steep gradient).\n+ Lead is ductile but weak (low UTS, large plastic region).\n+ Therefore, \"brittle\" $$\\neq$$ \"weak\".", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A ductile metal wire is stretched *beyond* its elastic limit and then unloaded. On the stress-strain graph, the unloading line is parallel to the initial loading line but does not return to the origin. What does the horizontal intercept of the unloading line represent? (2 steps)", "answer": "- Step 1: The unloading line is parallel to the initial elastic line because, as the load is removed, the material still behaves elastically in reverse (the atomic bonds recoil by the same proportion).\n- Step 2: Because the wire was stretched beyond the elastic limit, it has suffered permanent deformation. The horizontal intercept (the strain value where the unloading line meets the x-axis) represents the **permanent (plastic) strain**.\n+ This is the amount by which the sample is permanently longer than it was originally.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Rubber shows \"elastic hysteresis.\" When a rubber band is stretched and released, the unloading curve lies *below* the loading curve on a force-extension graph. What does the area enclosed between these two curves represent physically? (2 steps)", "answer": "- Step 1: The area under the *loading* curve is the total work done *on* the rubber to stretch it. The area under the *unloading* curve is the work the rubber *returns* as it contracts.\n- Step 2: The area of the loop between them is the difference between these two energies.\n+ This missing energy is not returned; it is **dissipated as heat** (internal energy) within the rubber.\n+ This is why a repeatedly stretched rubber band feels warm. The loop area represents the energy lost per cycle.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "When calculating the cross-sectional area of a wire given its diameter, a student writes $$A = \\pi d^2$$. How many times too large is their calculated area, and how does this error affect a subsequent calculation of Young Modulus? (2 steps)", "answer": "- Step 1: The correct formula is $$A = \\pi (d/2)^2 = \\pi d^2 / 4$$. The student's formula $$\\pi d^2$$ is exactly **4 times too large** (they forgot to halve the diameter to get the radius before squaring).\n- Step 2: Young Modulus is $$E = \\frac{FL}{A \\Delta L}$$. Since Area $$A$$ is in the denominator, an area that is 4 times too large will result in a Young Modulus that is **4 times too small**.\n+ This is one of the most common and damaging calculation errors in materials physics.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "A wire has a length of 2.0 m and extends by 4 mm under a load. A student calculates strain as $$\\varepsilon = \\frac{\\Delta L}{L} = \\frac{4}{2.0} = 2$$. What fundamental mistake did they make, and what is the correct strain value? (2 steps)", "answer": "- Step 1: The student failed to convert the units so they match. Extension is in millimetres and original length is in metres. They must both be in the same units (usually metres) before taking the ratio.\n- Step 2: Convert 4 mm to 0.004 m.\n+ Correct strain = $$\\frac{0.004 \\text{ m}}{2.0 \\text{ m}} = 0.002$$.\n+ Strain is a dimensionless ratio, but the input lengths must be in consistent units for the ratio to be correct. A strain of 2 would mean the wire is three times its original length, which is impossible for a metal wire under normal tension.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "A steel rail is laid in cold weather and pre-strained (stretched and fixed) so that it is under tension. Explain why the engineer does *not* pre-strain the rail enough to make it unstressed at the highest observed summer temperature. What would happen in the winter? (2 steps)", "answer": "- Step 1: If the rail were unstressed at the highest summer temperature, it would mean the rail is fully expanded and loose at that temperature.\n- Step 2: When winter comes, the temperature drops significantly, and the rail tries to contract. Because it is fixed at the ends, it cannot contract, so it is put under immense **tensile stress**.\n+ This high tensile stress in cold weather could exceed the UTS of the steel, causing the rail to **snap/fracture**. The engineer must balance the pre-strain so the rail is never under too much compression (summer) nor too much tension (winter).", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Energy density is the elastic energy stored per unit volume ($$u = E_e / V$$). Derive the formula for energy density in terms of stress and strain, starting from the elastic strain energy formula $$E_e = \\frac{1}{2} F x$$. (3 steps)", "answer": "- Step 1: Write the volume of the wire as $$V = A \\times L$$ (Cross-sectional area $$\\times$$ Original length). Substitute this into the energy density definition.\n+ $$u = \\frac{E_e}{V} = \\frac{\\frac{1}{2} F x}{A L}$$.\n- Step 2: Rearrange the fraction to group terms that look like stress and strain.\n+ $$u = \\frac{1}{2} \\left( \\frac{F}{A} \\right) \\left( \\frac{x}{L} \\right)$$.\n- Step 3: Substitute the definitions of stress ($$\\sigma = F/A$$) and strain ($$\\varepsilon = x/L$$).\n+ $$u = \\frac{1}{2} \\sigma \\varepsilon$$.\nThis shows that the energy density is simply the area of the triangle under the linear region of the *stress-strain* graph.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "A student is given a force-extension graph for a *specific* copper wire and a stress-strain graph for *copper* as a material. They claim the gradient of the linear region on both graphs represents the Young Modulus. Are they correct? (2 steps)", "answer": "- Step 1: The student is **incorrect**. The gradient of the stress-strain graph is the Young Modulus ($$E = \\sigma / \\varepsilon$$). This describes the stiffness of the material itself, independent of dimensions.\n- Step 2: The gradient of the force-extension graph is the **spring constant** ($$k = F / x$$). This describes the stiffness of that specific object (which depends on its length and cross-sectional area).\n+ Only if you multiply the gradient of the force-extension graph by $$L/A$$ do you get the Young Modulus.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "A copper wire is stretched by 3.0 mm under a load. The original length was 1.5 m. Without doing complex arithmetic, estimate the order of magnitude of the strain. (2 steps)", "answer": "- Step 1: Convert the extension to metres to match the original length.\n+ $$3.0 \\text{ mm} = 3.0 \\times 10^{-3} \\text{ m}$$.\n- Step 2: Calculate the rough ratio.\n+ Strain = $$\\frac{3 \\times 10^{-3}}{1.5} \\approx \\frac{2 \\times 10^{-3}}{1} = 2 \\times 10^{-3}$$.\n+ The order of magnitude is $$10^{-3}$$. This is a typical elastic strain for metals; if you calculated a strain of 0.1 or 10, you likely forgot a unit conversion (like using mm for extension and m for length).", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A suspension bridge cable has a diameter of 50 mm and supports a force of 4 kN. Estimate the order of magnitude of the stress in the cable. (3 steps)", "answer": "- Step 1: Approximate the area. The diameter is 50 mm = 0.05 m. The radius is 0.025 m.\n+ Area $$\\approx \\pi (0.025)^2 \\approx 3 \\times (6 \\times 10^{-4}) \\approx 1.8 \\times 10^{-3} \\text{ m}^2$$. (Roughly $$2 \\times 10^{-3} \\text{ m}^2$$).\n- Step 2: Convert force to Newtons.\n+ $$4 \\text{ kN} = 4000 \\text{ N}$$.\n- Step 3: Calculate stress order of magnitude.\n+ Stress = $$\\frac{F}{A} \\approx \\frac{4 \\times 10^3}{2 \\times 10^{-3}} = 2 \\times 10^6 \\text{ Pa}$$.\n+ The order of magnitude is $$10^6 \\text{ Pa}$$ (or a few MPa). This is a relatively low stress for steel, confirming the cable is safely loaded.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "Two different springs, $$k_1 = 100 \\text{ N/m}$$ and $$k_2 = 300 \\text{ N/m}$$, are joined in series. A 12 N weight is hung from the bottom. Which spring extends more, and by roughly what factor? (2 steps)", "answer": "- Step 1: In a series combination, the same force (12 N) passes through both springs. The extension of each is $$x = F/k$$.\n+ Since force is constant, the extension is inversely proportional to the spring constant.\n- Step 2: Compare the spring constants.\n+ $$k_2$$ is 3 times stiffer than $$k_1$$.\n+ Therefore, the softer spring ($$k_1$$) will extend **3 times more** than the stiffer spring ($$k_2$$).", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "Three identical springs hang in parallel, supporting a mass. If the mass is 6.0 kg, and each spring has a constant of 200 N/m, what is the extension of the system? (Use $$g \\approx 10 \\text{ m/s}^2$$ for mental math). (2 steps)", "answer": "- Step 1: Calculate the total force and the effective spring constant.\n+ Total force = $$mg = 6.0 \\times 10 = 60 \\text{ N}$$.\n+ Effective $$k$$ for parallel springs = $$k_1 + k_2 + k_3 = 200 + 200 + 200 = 600 \\text{ N/m}$$.\n- Step 2: Use Hooke's Law for the combination.\n+ $$x = \\frac{F}{k_{\\text{eff}}} = \\frac{60}{600} = 0.1 \\text{ m} = 10 \\text{ cm}$$.\n+ Each spring extends by 10 cm because in parallel, the extension is the same for all springs.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "A wire of length $$L$$ and cross-sectional area $$A$$ is stretched by a force $$F$$ by an amount $$\\Delta L$$. The wire is then replaced by one of the same material but twice the length ($$2L$$) and twice the area ($$2A$$). If the same force $$F$$ is applied, how does the new extension compare to $$\\Delta L$$? (3 steps)", "answer": "- Step 1: Use the Young Modulus rearrangement for extension: $$\\Delta L = \\frac{FL}{AE}$$.\n- Step 2: Analyze the changes. Length $$L$$ doubles (which would double the extension). Area $$A$$ doubles (which would halve the extension). Force $$F$$ and Material $$E$$ are constant.\n- Step 3: Combine the effects.\n+ New extension = $$\\frac{F(2L)}{(2A)E} = \\frac{2}{2} \\left( \\frac{FL}{AE} \\right) = 1 \\times \\Delta L$$.\n+ The new extension is exactly the same as the original extension $$\\Delta L$$. The doubling of length and doubling of area cancel each other out.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "A student measures the diameter of a wire as 0.80 mm. The uncertainty in the measurement is $$\\pm 0.01 \\text{ mm}$$. What is the approximate percentage uncertainty in the *cross-sectional area* of the wire? (2 steps)", "answer": "- Step 1: Calculate the percentage uncertainty in the diameter.\n+ $$\\% \\text{ uncertainty in } d = \\left( \\frac{0.01}{0.80} \\right) \\times 100\\% \\approx 1.25\\%$$.\n- Step 2: Determine how this propagates to the area. The formula for area is $$A = \\pi (d/2)^2$$, which is proportional to $$d^2$$.\n+ When a quantity is raised to a power, its percentage uncertainty is multiplied by that power.\n+ $$\\% \\text{ uncertainty in } A = 2 \\times (\\% \\text{ uncertainty in } d) = 2 \\times 1.25\\% = 2.5\\%$$.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "A sample of metal is loaded until it fractures. The total area under the stress-strain curve up to the fracture point is much larger for Material A than Material B. What material property does this area represent, and which material would you choose for a car bumper? (2 steps)", "answer": "- Step 1: The total area under a stress-strain curve up to fracture represents the **toughness** of the material (energy absorbed per unit volume before breaking).\n- Step 2: A car bumper must absorb kinetic energy during a crash without breaking. You would choose **Material A**.\n+ Material A can absorb much more energy before fracturing (it is tougher), even if Material B might be stronger (higher UTS). Toughness is the critical property for impact resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "A student is asked to define \"Strain.\" They write: \"Strain is the change in length.\" Why does this definition score zero marks, and what is the correct definition? (2 steps)", "answer": "- Step 1: \"Change in length\" is the *extension* ($$\\Delta L$$), which is a measured quantity with units of metres. Strain is a specific ratio that normalizes the extension by the original length.\n- Step 2: The correct definition must include the ratio and the reference value: \"Strain is the change in length *divided by the original length*.\"\n+ This makes strain dimensionless, allowing comparison between samples of different lengths. Omitting \"divided by original length\" is a common mark-losing error.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "In a Hooke's Law experiment, a student adds masses to a spring and records the *total length* of the spring each time. To plot a Force-Extension graph, what must the student do with the length data, and why? (2 steps)", "answer": "- Step 1: The student must calculate the *extension* for each load by subtracting the initial (unstretched) length from the total length: $$x = L_{\\text{total}} - L_0$$.\n- Step 2: Hooke's Law states that Force is proportional to *extension*, not total length. The graph must start at the origin (0 force, 0 extension) to verify the proportionality and to allow the gradient (spring constant) to be calculated correctly. Plotting total length would shift the line along the x-axis, ruining the proportionality check and making the gradient calculation meaningless for $$k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "In Searle's Apparatus for measuring Young's Modulus, there are *two* wires: a \"test wire\" and a \"control wire.\" What specific experimental issue does the control wire eliminate? (2 steps)", "answer": "- Step 1: The apparatus measures the *difference* in extension between the two wires using a spirit level and a micrometer. The control wire is subjected to the same initial tension and temperature as the test wire.\n- Step 2: The control wire compensates for **yielding of the support** and **thermal expansion/contraction**.\n+ If the ceiling support bends slightly, or the room temperature changes, both wires expand/contract by the same amount. Because the measurement is the *difference* between them, these effects cancel out, isolating only the extension due to the added load on the test wire.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}], "count": 40}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A length is given as $$5 \\text{ cm}$$. To convert this to metres, you multiply by $$10^{-2}$$. If you are converting a *volume* given in $$\\text{cm}^3$$ to $$\\text{m}^3$$, what happens to the conversion factor, and why is this a common trap in density calculations? (2 steps)", "answer": "- Step 1: A volume conversion requires cubing the length conversion factor. Since $$1 \\text{ cm} = 10^{-2} \\text{ m}$$, it follows that $$1 \\text{ cm}^3 = (10^{-2} \\text{ m})^3 = 10^{-6} \\text{ m}^3$$.\n- Step 2: The trap occurs because students often multiply by $$10^{-2}$$ once (or even twice) instead of three times. This leads to a volume that is off by a factor of 100 or 10,000, causing the final density calculation to be off by the same massive factor.\n\nThe single habit to prevent this: always write out
