$$(10^{-2})^3 = 10^{-6}$$ explicitly before substituting.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Density is defined as $$\\rho = m/V$$. If you take a uniform block of copper and cut it perfectly in half, does the density of one of the halves change? Explain the reasoning using the concepts of extensive and intensive properties. (2 steps)", "answer": "- Step 1: The density does *not* change. When you cut the block in half, you halve the mass ($$m/2$$) and you halve the volume ($$V/2$$). Substituting these into the formula gives $$\\rho_{\\text{half}} = (m/2) / (V/2) = m/V = \\rho$$.\n- Step 2: This occurs because mass and volume are **extensive** properties (they scale with the amount of substance), whereas density is an **intensive** property (it is independent of the amount of substance). Taking the ratio of two extensive quantities cancels out the dependence on sample size.\n\nThe mental test is: \"If I doubled the sample, would this number change?\" If yes, it's extensive; if no, it's intensive.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "An alloy is made of 70% copper and 30% zinc *by volume*. A student calculates the alloy's density by simply averaging the two densities: $$\\rho_{\\text{mix}} = (\\rho_{\\text{copper}} + \\rho_{\\text{zinc}}) / 2$$. Why is this mathematically wrong unless the volume fractions are exactly equal? (3 steps)", "answer": "- Step 1: Density is total mass over total volume ($$\\rho_{\\text{mix}} = m_{\\text{total}} / V_{\\text{total}}$$). The total mass is the sum of the individual masses: $$m_{\\text{total}} = m_1 + m_2 = \\rho_1 V_1 + \\rho_2 V_2$$.\n- Step 2: Substitute this into the density definition, using volume fractions $$f_1$$ and $$f_2$$ (where $$V_1 = f_1 V_{\\text{total}}$$ and $$V_2 = f_2 V_{\\text{total}}$$). This gives $$\\rho_{\\text{mix}} = (\\rho_1 f_1 V_{\\text{total}} + \\rho_2 f_2 V_{\\text{total}}) / V_{\\text{total}} = f_1 \\rho_1 + f_2 \\rho_2$$.\n- Step 3: The correct formula is a **volume-weighted average**, not a simple average. A simple average $$(\\rho_1 + \\rho_2)/2$$ is only true if $$f_1 = f_2 = 0.5$$. For a 70/30 split, the denser component contributes more to the average because it occupies more of the volume.\n\nNever average densities directly; always go back to \"total mass over total volume\".", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "When reading a micrometer screw gauge, what is the significance of the half-millimetre (0.5 mm) marks on the sleeve (main scale), and what is the most common mistake students make when reading them? (2 steps)", "answer": "- Step 1: The half-millimetre marks indicate whether the thimble has completed a full millimetre revolution plus a half revolution. Each full revolution of the thimble opens the jaws by 0.5 mm. You must check if the 0.5 mm mark *after* the last visible full millimetre line is exposed.\n- Step 2: The most common mistake is failing to add the 0.5 mm. A student might see the \"7 mm\" line exposed and read the thimble, getting e.g. 0.32 mm, for a total of 7.32 mm. But if the 0.5 mm mark *after* the 7 mm line is also visible, the main scale reading is actually 7.5 mm, making the true reading 7.82 mm.\n\nAlways explicitly ask yourself: \"Is the 0.5 mm mark visible past the last full millimetre?\"", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "When reading a Vernier caliper, how do you determine the decimal fraction of a millimetre, and what physical feature of the scales must you look for? (2 steps)", "answer": "- Step 1: You read the main scale up to the zero mark of the Vernier (sliding) scale to get the whole millimetre portion. To get the decimal fraction, you must scan along the Vernier scale to find the *single division line* on the Vernier scale that aligns perfectly with *any* line on the main scale.\n- Step 2: Once you find the perfectly aligned line, you read the number of that Vernier division and multiply it by the Vernier scale's resolution (e.g., if the 6th division aligns and the resolution is 0.05 mm, the decimal reading is $$6 \\times 0.05 = 0.30 \\text{ mm}$$). You then add this to the main scale reading.\n\nDo not just pick a line that is \"close\"; it must be the single line of perfect alignment.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "When a micrometer is fully closed, the zero on the thimble sits *below* the horizontal main scale line, giving a reading of +0.03 mm. This is a positive zero error. When you take a measurement of an object, how do you correct for this error? (2 steps)", "answer": "- Step 1: A positive zero error means the instrument reads a value greater than zero when it should read zero. Therefore, any subsequent measurement will be *inflated* by this error amount.\n- Step 2: To find the true measurement, you must *subtract* the zero error from the observed reading. The formula is: $$\\text{Actual Reading} = \\text{Observed Reading} - \\text{Zero Error}$$. In this case, Actual = Observed - 0.03 mm.\n\nIf the zero mark sat *above* the line (negative error, e.g. +0.97 mm), you would subtract that negative value (or add the magnitude of the deficit).", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "In the practical method for measuring the density of an irregular solid using a Eureka can and a measuring cylinder, why is it crucial to measure the mass of the object *before* submerging it in the water? (2 steps)", "answer": "- Step 1: Measuring mass first ensures the object is completely dry. If the object were submerged first, water would adhere to its surface and fill its crevices.\n- Step 2: When placed on the mass balance afterwards, this trapped water would add to the measured mass, leading to an overestimation of the object's mass and consequently an overestimation of its density ($$\\rho = m/V$$).\n\nAlways measure mass dry, then measure volume wet.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "To measure the density of a liquid, a student measures the mass of an empty measuring cylinder, then adds liquid and measures the total mass. Why is this two-step mass measurement necessary, rather than just placing the liquid directly on the balance? (1 step)", "answer": "- Step 1: The measuring cylinder itself has mass. Placing the liquid directly on the balance would measure the combined mass of the liquid *and* the container. By measuring the empty cylinder first ($$m_{\\text{empty}}$$) and then the full cylinder ($$m_{\\text{full}}$$), you can isolate the liquid's mass via subtraction: $$m_{\\text{liquid}} = m_{\\text{full}} - m_{\\text{empty}}$$. This eliminates the systematic error of the container's mass.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Distinguish between **accuracy** and **precision** in the context of taking physical measurements. (2 steps)", "answer": "- Step 1: **Accuracy** refers to how close a measurement is to the true or accepted value of the quantity being measured. It is compromised by systematic errors (e.g. a poorly calibrated scale).\n- Step 2: **Precision** refers to the repeatability or reproducibility of the measurements—how close repeated measurements are to *each other*. It is linked to the resolution of the instrument and is compromised by random errors (e.g. fluctuations in reading). High precision does not guarantee high accuracy.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "What is the difference between a random error and a systematic error, and what is the standard practical method for reducing the effect of random errors? (2 steps)", "answer": "- Step 1: A **random error** is an unpredictable variation in measurements (e.g. slight changes in reading a meniscus) that scatters results around a mean. A **systematic error** is a consistent, repeatable offset (e.g. a zero error or poor calibration) that shifts all results in one direction.\n- Step 2: Random errors are reduced by taking multiple repeat readings and calculating a mean, which allows random fluctuations to cancel out. Systematic errors *cannot* be reduced by averaging; they must be eliminated by calibrating the instrument or correcting the method (e.g. subtracting a zero error).", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "State Hooke's Law. What crucial condition limits the validity of this law, and what is the physical meaning of that limit? (2 steps)", "answer": "- Step 1: Hooke's Law states that the extension of a spring (or material) is directly proportional to the applied force, provided the **limit of proportionality** is not exceeded. Mathematically, $$F \\propto x$$ or $$F = kx$$.\n- Step 2: The limit of proportionality is the point beyond which the force-extension graph stops being a straight line. Physically, at the atomic level, it represents the point where the displacement of atoms from their equilibrium positions is large enough that the parabolic approximation of the interatomic potential breaks down, and the restoring force is no longer linear.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "The spring constant $$k$$ is defined by $$F = kx$$. Is the spring constant a property of the *material* or of the *object*? Explain using an example. (2 steps)", "answer": "- Step 1: The spring constant is a property of the **object**, not the material. It depends on the dimensions of the object (length and cross-sectional area) as well as the material.\n- Step 2: For example, two springs made of identical steel wire but with different coil lengths or thicknesses will have different spring constants. A longer spring will extend more under the same force (softer, lower $$k$$), and a thicker spring will extend less (stiffer, higher $$k$$), even though the material (steel) is the same.\n\nThis object-vs-material distinction is precisely why the Young modulus is introduced.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "The formula for elastic strain energy stored in a spring obeying Hooke's Law is $$E_e = \\frac{1}{2} F x$$. Derive the origin of the factor of $$\\frac{1}{2}$$ by considering the work done to stretch the spring. (3 steps)", "answer": "- Step 1: Work done is defined as force multiplied by distance. However, as you stretch a spring from 0 to $$x$$, the force is not constant; it grows linearly from 0 to $$F$$.\n- Step 2: Because the force grows linearly, the average force during the stretch is half the final force: $$F_{\\text{avg}} = \\frac{1}{2} F$$. The work done is therefore the average force times the distance: $$W = F_{\\text{avg}} \\times x = \\frac{1}{2} F x$$.\n- Step 3: Geometrically, this is equivalent to the area under the force-extension graph. For a linear relationship, the area is a triangle ($$\\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2} \\times x \\times F$$). The product $$Fx$$ (without the half) would be the area of a rectangle, which is the work a *constant* force $$F$$ would do—twice the actual energy stored.\n\nThe single most-forgotten detail is this factor of one half.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Derive the expression for elastic energy *density* (energy per unit volume) stored in a stretched wire, starting from the elastic strain energy $$E_e = \\frac{1}{2} F x$$. (3 steps)", "answer": "- Step 1: Write energy per unit volume as $$u = E_e / V$$. The volume of the wire is $$V = A \\times L$$, where $$A$$ is cross-sectional area and $$L$$ is original length. So, $$u = \\frac{\\frac{1}{2} F x}{A L}$$.\n- Step 2: Rearrange the expression to group terms: $$u = \\frac{1}{2} \\left( \\frac{F}{A} \\right) \\left( \\frac{x}{L} \\right)$$.\n- Step 3: Recognize that $$F/A$$ is tensile stress ($$\\sigma$$) and $$x/L$$ is tensile strain ($$\\varepsilon$$). Therefore, the energy density is $$u = \\frac{1}{2} \\sigma \\varepsilon$$. Since $$\\sigma = E \\varepsilon$$, this can also be written as $$u = \\frac{1}{2} E \\varepsilon^2$$ or $$u = \\frac{\\sigma^2}{2E}$$.\n\nThis shows that energy density is a property of the material's strain state, independent of the sample's dimensions.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "Tensile stress is defined as $$\\sigma = F / A$$. At A-level, the area $$A$$ used is the *original* cross-sectional area, not the instantaneous area. Give two reasons why the original area is used instead of the true instantaneous area. (2 steps)", "answer": "- Step 1: **Measurability:** The original cross-sectional area can be measured precisely once, before loading, using a micrometer. The instantaneous area changes continuously as the wire stretches and narrows (the Poisson effect), making it impractical to measure during the test.\n- Step 2: **Negligible difference in the elastic region:** In the linear elastic region, strains are tiny (of order $$10^{-3}$$), so the area change is also of order $$10^{-3}$$—far smaller than the uncertainty in the diameter measurement itself. Using $$A_0$$ introduces no meaningful error where Hooke's law applies.\n\nThis convention defines \"engineering stress\", which is why the curve turns down after the UTS even though the material isn't actually getting weaker.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "How does **engineering stress** differ from **true stress** during the plastic deformation (necking) phase of a tensile test? (2 steps)", "answer": "- Step 1: **Engineering stress** uses the constant, original cross-sectional area ($$F/A_0$$). As necking occurs, the area shrinks, so the load $$F$$ required to continue stretching drops. Because the denominator $$A_0$$ is fixed, the engineering stress curve peaks at the Ultimate Tensile Stress (UTS) and then falls.\n- Step 2: **True stress** uses the instantaneous, shrinking cross-sectional area ($$F/A_{\\text{inst}}$$). Even though the load drops during necking, the area is shrinking *faster*, so the ratio $$F/A_{\\text{inst}}$$ actually continues to rise until fracture. The downturn after UTS is an artefact of the engineering stress definition.\n\nAt A-level, always use the original area unless told otherwise.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "Tensile strain is defined as $$\\varepsilon = \\Delta L / L$$. Explain why strain is a dimensionless quantity, and identify a common mistake regarding which length to use in the denominator. (2 steps)", "answer": "- Step 1: Strain is dimensionless because it is a ratio of two lengths (extension over original length). The units (metres) cancel out. It represents a fractional change in length.\n- Step 2: The common mistake is using the *final* (stretched) length in the denominator instead of the *original* length. By definition, strain must be the change in length divided by the original, unstretched length $$L_0$$. Using the final length would yield a different, incorrect value.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "The Young modulus $$E$$ is a material constant, while the spring constant $$k$$ is an object constant. Derive the relationship between $$E$$ and $$k$$ to show exactly how the geometry factors affect stiffness. (3 steps)", "answer": "- Step 1: Start with the definitions: $$E = \\sigma / \\varepsilon = (F/A) / (x/L) = FL / (Ax)$$. Rearrange this to solve for force: $$F = (EA / L) x$$.\n- Step 2: Compare this with Hooke's Law, $$F = kx$$. By equating the coefficients of $$x$$, we find $$k = EA / L$$.\n- Step 3: This relationship reveals the geometry dependence. For a fixed material ($$E$$ is constant), the object stiffness $$k$$ is directly proportional to cross-sectional area $$A$$ (thicker wire = stiffer) and inversely proportional to length $$L$$ (longer wire = softer). Stress and strain normalize out these geometry factors, leaving $$E$$ dependent only on the material.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "Distinguish between the **limit of proportionality**, the **elastic limit**, and the **yield point** on a stress-strain curve. Which comes first, and what physically changes at each? (3 steps)", "answer": "- Step 1: **Limit of proportionality (P):** This comes first. It is the point beyond which stress is no longer directly proportional to strain. The graph stops being a straight line; Hooke's law no longer applies.\n- Step 2: **Elastic limit (E):** Slightly beyond P. Up to this point, the material will still return to its original length when the load is removed (it is elastic, even though non-linear between P and E). Beyond it, some deformation is permanent (plastic).\n- Step 3: **Yield point (Y):** Beyond the elastic limit. This is where the material begins to extend rapidly with little or no extra load. On the curve, it appears as a near-horizontal step. Atoms are now sliding past one another permanently.\n\nProportionality is about straightness; elastic limit is about springing back; yield is about suddenly giving way.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "Contrast the stress-strain behaviour of **brittle** and **ductile** materials. Does \"brittle\" mean \"weak\"? (2 steps)", "answer": "- Step 1: A **brittle** material (like glass or ceramic) shows little to no plastic deformation; the curve is essentially straight until it suddenly snaps. A **ductile** material (like copper or mild steel) has a long plastic region where it stretches and necks before breaking, giving warning of failure.\n- Step 2: \"Brittle\" does **not** mean \"weak\". A brittle material can have a very high ultimate tensile stress (it can be very strong), but it fails suddenly without warning. \"Brittle\" describes *how* it fails (lack of plastic deformation), not the magnitude of the stress it can withstand.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "When a rubber band is stretched and then released, its loading and unloading curves form a closed loop (hysteresis). What does the area enclosed by this loop represent? (2 steps)", "answer": "- Step 1: The area under the *loading* curve represents the total work done *on* the rubber to stretch it. The area under the *unloading* curve represents the work the rubber *returns* as it contracts.\n- Step 2: The area *enclosed between* the two curves (the loop) is the difference between these two energies. It represents the **energy dissipated as heat** (internal energy) during the cycle. This is why a repeatedly stretched rubber band warms up.\n\nThis energy loss is called elastic hysteresis.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "A ductile metal wire is stretched *beyond* its elastic limit and then unloaded. Describe the path of the unloading line on a force-extension graph compared to the loading line, and explain what the intercept on the extension axis represents. (2 steps)", "answer": "- Step 1: The unloading line is a straight line that is **parallel to the initial linear (elastic) loading line**, but it does not return to the origin. It meets the extension axis at a non-zero value.\n- Step 2: The intercept on the extension axis represents the **permanent (plastic) extension**. The material will not return to its original length. The horizontal distance between the unloading line and the point of release represents the recovered *elastic* extension.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Two identical springs are arranged in **series**. When a force $$F$$ is applied to the combination, what quantity is shared by both springs, and how does the total extension relate to the individual extensions? (2 steps)", "answer": "- Step 1: In a series arrangement, the same **force** is transmitted through both springs. The force pulling on spring 1 is $$F$$, and the force pulling on spring 2 is also $$F$$.\n- Step 2: The **total extension** is the *sum* of the individual extensions ($$x_{\\text{total}} = x_1 + x_2$$). Because each spring extends under the same force, the combination extends more than a single spring would under the same force. This makes the overall system less stiff.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Two identical springs are arranged in **parallel**. When a force $$F$$ is applied to the combination, what quantity is shared by both springs, and how does the total force relate to the individual forces? (2 steps)", "answer": "- Step 1: In a parallel arrangement, both springs must have the same **extension**. They are forced to stretch by the same amount because they are connected side-by-side to a common bar.\n- Step 2: The **total force** is the *sum* of the individual forces provided by each spring ($$F_{\\text{total}} = F_1 + F_2$$). Because the load is shared, less force is needed per spring for a given extension, making the overall system stiffer (higher effective spring constant).", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "If the percentage uncertainty in the diameter of a wire is $$1\\%$$, what is the percentage uncertainty in its cross-sectional area $$A = \\pi(d/2)^2$$? Justify your answer. (2 steps)", "answer": "- Step 1: The area formula depends on the square of the diameter (or radius). In error propagation, when a quantity is raised to a power $$n$$, its percentage uncertainty is multiplied by that power.\n- Step 2: Therefore, the percentage uncertainty in $$A$$ is $$2 \\times 1\\% = 2\\%$$. This is why measuring the diameter of a thin wire with a micrometer is so critical; any uncertainty in diameter is doubled when calculating area, which heavily affects stress and Young modulus calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "On a stress-strain graph, how do you identify the **Young modulus**, the **ultimate tensile stress (UTS)**, and the **toughness** of the material? (3 steps)", "answer": "- Step 1: The **Young modulus** is the **gradient** of the initial, straight-line (linear elastic) portion of the graph.\n- Step 2: The **ultimate tensile stress (UTS)** is the highest point (peak) on the stress-strain curve. It represents the maximum stress the material can withstand.\n- Step 3: **Toughness** is represented by the **total area under the curve** up to the point of fracture. It measures the energy absorbed per unit volume before breaking.\n\nStiffness is gradient; strength is peak height; toughness is total area.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "In the Searle's apparatus experiment to determine the Young modulus of a wire, why are *two* wires (a test wire and a control wire) used instead of just one? (2 steps)", "answer": "- Step 1: The control wire compensates for any **yielding of the support** or **changes in temperature**. If the ceiling support bends slightly, or if the room temperature changes causing the wire to expand/contract, both wires will be affected equally.\n- Step 2: By measuring the extension of the test wire *relative to* the control wire using a spirit level and vernier scale, these systematic errors cancel out. The apparatus only measures the extension caused purely by the added load.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "When calculating the cross-sectional area of a wire from its diameter, a student uses the formula $$A = \\pi d^2$$ instead of $$A = \\pi (d/2)^2$$. By what factor is their calculated area wrong, and how does this affect a subsequent calculation of stress? (2 steps)", "answer": "- Step 1: The correct formula is $$\\pi d^2 / 4$$. The incorrect formula $$\\pi d^2$$ is 4 times larger than the correct one. The area is overestimated by a factor of 4.\n- Step 2: Because stress is $$F/A$$, an area that is 4 times too large will result in a stress that is 4 times too small. This would propagate to make the calculated Young modulus 4 times too small.\n\nAlways write $$r = d/2$$ on its own line before substituting into the area formula.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "A metal wire is stretched within its elastic limit. If the applied force is doubled, what happens to the stress, the strain, and the elastic strain energy stored in the wire? (3 steps)", "answer": "- Step 1: **Stress** is directly proportional to force ($$\\sigma = F/A$$). If force doubles, stress doubles.\n- Step 2: **Strain** is directly proportional to stress (and thus force) within the elastic limit ($$\\varepsilon = \\sigma/E$$). If force doubles, strain doubles.\n- Step 3: **Elastic strain energy** is proportional to force times extension ($$E_e = \\frac{1}{2} F x$$). If force doubles, extension also doubles, so energy is $$2F \\times 2x / 2 = 4Fx/2$$. The energy increases by a factor of **4**.\n\nEnergy scales with the *square* of the force or extension.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "An alloy is made of 60% material A and 40% material B *by mass*. To find the density of this alloy, should you use a volume-weighted average, a mass-weighted average, or a simple average of the two densities? (2 steps)", "answer": "- Step 1: You must always return to the fundamental definition: $$\\rho = m_{\\text{total}} / V_{\\text{total}}$$. Since the fractions are given by mass, the total mass is known ($$m_1 + m_2$$), but the total volume must be calculated by adding the individual volumes ($$V_1 + V_2 = m_1/\\rho_1 + m_2/\\rho_2$$).\n- Step 2: Because you are summing the *volumes* at fixed mass, the densities combine **harmonically**. The formula is $$1/\\rho_{\\text{mix}} = w_1/\\rho_1 + w_2/\\rho_2$$, where $$w$$ represents the mass fractions. A volume-weighted average only works when the composition is given *by volume*.\n\nNever average densities directly; the physical condition (mass vs volume fractions) dictates the formula.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "A student reads a micrometer and sees the \"5\" mm mark on the sleeve, but the 0.5 mm mark after it is *not* visible. The thimble reads \"28\". What is the total reading? (2 steps)", "answer": "- Step 1: Determine the main scale reading. Since the 5 mm mark is visible but the 0.5 mm mark after it is hidden, the thimble has not yet completed the half-millimetre revolution. The main scale reading is 5.0 mm.\n- Step 2: Add the thimble reading. The thimble reads 28, which corresponds to $$28 \\times 0.01 \\text{ mm} = 0.28 \\text{ mm}$$. Total reading = $$5.0 + 0.28 = 5.28 \\text{ mm}$$.\n\nIf the 0.5 mm mark *were* visible, the reading would be 5.78 mm.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "A Vernier caliper has a resolution of 0.05 mm. The main scale reads 23 mm (the Vernier zero is just past the 23 mm mark), and the 7th division on the Vernier scale aligns perfectly with a main scale line. What is the total reading? (2 steps)", "answer": "- Step 1: Identify the main scale reading. The zero mark of the Vernier scale is just past 23 mm, so the main scale contribution is 23 mm.\n- Step 2: Calculate the Vernier scale contribution. The 7th division aligns, and each division represents 0.05 mm. So, the decimal reading is $$7 \\times 0.05 = 0.35 \\text{ mm}$$. The total reading is $$23 + 0.35 = 23.35 \\text{ mm}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A steel wire has a Young modulus $$E$$, length $$L$$, and cross-sectional area $$A$$. A force $$F$$ is applied. Write the sequence of formulas you would use to calculate the elastic strain energy stored, without using the shortcut $$\\frac{1}{2} F x$$ directly from $$x$$. (3 steps)", "answer": "- Step 1: Calculate the stress: $$\\sigma = F / A$$.\n- Step 2: Calculate the strain: $$\\varepsilon = \\sigma / E = F / (AE)$$.\n- Step 3: Calculate the energy density: $$u = \\frac{1}{2} \\sigma \\varepsilon = \\frac{1}{2} (F/A) (F / (AE)) = F^2 / (2A^2 E)$$. Then multiply by the volume $$V = AL$$ to get total energy: $$E_e = u \\times V = (F^2 / (2A^2 E)) \\times AL = F^2 L / (2AE)$$.\n\nThis alternative formula, $$E_e = F^2 L / (2AE)$$, is extremely useful when extension is not directly known.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "A rubber band is stretched to a strain of 2.5. Its original length was 10 cm. What is its new total length? (2 steps)", "answer": "- Step 1: Strain is defined as $$\\varepsilon = \\Delta L / L_0$$. Rearrange to find the extension: $$\\Delta L = \\varepsilon \\times L_0$$.\n- Step 2: Calculate the extension: $$\\Delta L = 2.5 \\times 10 \\text{ cm} = 25 \\text{ cm}$$. The new total length is the original length plus the extension: $$L_{\\text{new}} = 10 \\text{ cm} + 25 \\text{ cm} = 35 \\text{ cm}$$.\n\nDo not confuse strain with the new length; strain is the *fractional change*, so you must add it to the original length to get the total length.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "Two identical springs, each with spring constant $$k$$, are joined in series. What is the effective spring constant $$k_{\\text{eff}}$$ of the combination? If they were joined in parallel instead, what would $$k_{\\text{eff}}$$ be? (2 steps)", "answer": "- Step 1: **Series:** The effective stiffness *decreases*. The formula is $$1/k_{\\text{eff}} = 1/k_1 + 1/k_2 = 1/k + 1/k = 2/k$$. Therefore, $$k_{\\text{eff}} = k/2$$. The combination is softer.\n- Step 2: **Parallel:** The effective stiffness *increases*. The formula is $$k_{\\text{eff}} = k_1 + k_2 = k + k = 2k$$. The combination is stiffer.\n\nNotice that series springs follow the same mathematical rule as parallel resistors, and vice versa.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "A wire of length $$L$$ and cross-sectional area $$A$$ is made of a material with Young modulus $$E$$. If the wire is replaced by one of the same material but with twice the length ($$2L$$) and twice the diameter, what happens to its spring constant $$k$$? (3 steps)", "answer": "- Step 1: Recall the relationship: $$k = EA / L$$. The new length is $$2L$$.\n- Step 2: The new diameter is $$2d$$, so the new radius is $$2r$$. The new area is $$A_{\\text{new}} = \\pi (2r)^2 = 4 \\pi r^2 = 4A$$.\n- Step 3: Substitute the new values into the stiffness formula: $$k_{\\text{new}} = E(4A) / (2L) = 2 (EA/L) = 2k$$. The spring constant doubles.\n\nArea doubling has a larger effect than length doubling because area is in the numerator and length is in the denominator.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "In an experiment to find the Young modulus, why is it better to plot a stress-strain graph and find the gradient, rather than making a single calculation of $$E = \\sigma / \\varepsilon$$ from one set of readings? (2 steps)", "answer": "- Step 1: A single calculation relies on one pair of values, which may contain random errors in the measurement of force, diameter, length, or extension. Plotting a graph averages out these random errors by using all the data points.\n- Step 2: Drawing a line of best fit and calculating its gradient minimizes the effect of anomalous results. It also clearly identifies the linear elastic region, ensuring that the modulus is calculated only where Hooke's law is valid.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "A student is asked to calculate the tensile stress in a wire. They are given the original length, the extension, and the material the wire is made of. Explain why they cannot complete the calculation. (2 steps)", "answer": "- Step 1: Stress is defined as force per unit cross-sectional area ($$\\sigma = F/A$$). The student has neither the force nor the cross-sectional area.\n- Step 2: While they could calculate the *strain* ($$\\varepsilon = \\text{extension} / \\text{original length}$$), they cannot convert strain to stress without the Young modulus of the material being explicitly provided. Without $$F$$, $$A$$, or $$E$$, stress is impossible to determine.\n\nWhen data is missing, state what is missing rather than forcing a formula.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "A crane cable is made of steel with a Young modulus of $$200 \\text{ GPa}$$. The cable is 20 m long and has a diameter of 10 mm. If a 5 kN load is applied, roughly what order of magnitude should the extension be? (Do not calculate exactly, just estimate). (3 steps)", "answer": "- Step 1: Estimate the area. Diameter is 10 mm = 0.01 m. Radius is 0.005 m. Area $$\\approx \\pi (5 \\times 10^{-3})^2 \\approx 75 \\times 10^{-6} \\text{ m}^2$$ (using $$3 \\times 25 = 75$$).\n- Step 2: Estimate the stress. Force = 5000 N. Stress $$\\approx 5000 / (75 \\times 10^{-6}) \\approx (5/75) \\times 10^8 \\approx 0.07 \\times 10^8 = 7 \\times 10^6 \\text{ Pa}$$.\n- Step 3: Estimate the strain. $$E = 200 \\times 10^9$$, so strain $$\\varepsilon = \\sigma / E \\approx (7 \\times 10^6) / (200 \\times 10^9) \\approx 3.5 \\times 10^{-5}$$. Extension = strain $$\\times$$ length = $$3.5 \\times 10^{-5} \\times 20 \\text{ m} \\approx 70 \\times 10^{-5} \\text{ m} = 0.7 \\text{ mm}$$.\n\nThe extension should be a fraction of a millimetre—steel is very stiff.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "Explain the atomic-level mechanism that causes Hooke's Law to be linear for small extensions. (2 steps)", "answer": "- Step 1: In a solid, atoms are held in equilibrium positions by interatomic forces, which are described by a potential energy curve. Near the equilibrium separation $$r_0$$, this potential well is approximately **parabolic**.\n- Step 2: A parabolic potential means the restoring force (the negative gradient of the potential) is a linear function of displacement from equilibrium ($$F \\approx -\\kappa(r - r_0)$$). When summed over all atomic bonds in a cross-section, this microscopic linearity appears macroscopically as Hooke's Law ($$F = kx$$).\n\nOnce atoms are pulled far from $$r_0$$, the parabolic approximation fails, and the material reaches its limit of proportionality.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "When pre-straining steel rails for a railway, an engineer stretches the rail at a cold temperature (e.g., 8°C) and fixes it into place. Why is it dangerous to design the pre-strain based on the *highest* observed temperature at the location? (2 steps)", "answer": "- Step 1: If the rail is unstressed at the highest temperature, then when the temperature drops to its lowest, the rail will try to contract. Because it is fixed in place, this contraction is prevented, inducing significant **tensile stress** in the rail.\n- Step 2: This high tensile stress in cold weather could exceed the UTS of the steel and cause the rail to **snap** (fracture). The engineer must balance the risk of buckling in heat (compressive stress) with the risk of snapping in cold (tensile stress).", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "A student measures the density of a liquid by pouring 50 ml into a measuring cylinder and placing it on a balance. They record the mass as 65 g. What crucial step has been missed, and how does it affect the result? (2 steps)", "answer": "- Step 1: The crucial missed step is measuring the mass of the **empty** measuring cylinder first. The 65 g reading is the mass of the liquid *plus* the glass cylinder.\n- Step 2: Because the cylinder's mass hasn't been subtracted, the calculated mass of the liquid will be too high. This leads to an overestimation of the liquid's density ($$\\rho = m/V$$).", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "If you want to reduce the percentage uncertainty in measuring the thickness of a single sheet of paper, what practical technique should you use? (2 steps)", "answer": "- Step 1: Measure the thickness of a large stack of papers (e.g., 100 sheets) using a micrometer, then divide the total thickness by the number of sheets.\n- Step 2: This reduces the percentage uncertainty because the absolute uncertainty of the micrometer (e.g. $$\\pm 0.01 \\text{ mm}$$) is now divided by 100, making the percentage uncertainty 100 times smaller than if you measured one sheet directly.\n\nMake the measured value as large as possible relative to the instrument's resolution.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "In a Hooke's Law practical, a pointer is attached to the bottom of the spring next to a metre ruler. Why is it important to read the ruler at eye level, and what type of error does this prevent? (2 steps)", "answer": "- Step 1: Reading at eye level ensures you are looking perpendicular to the scale. If you read from above or below, the apparent position of the pointer against the scale shifts.\n- Step 2: This shift is called a **parallax error**, which is a type of reading error (often systematic if you always view from the same wrong angle). It leads to incorrect values for the extension.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "An irregular object is submerged in a Eureka can, but the student notices small air bubbles clinging to its surface. How will this affect the volume measurement, and consequently the density? (2 steps)", "answer": "- Step 1: The air bubbles will displace additional water. The volume of water collected in the measuring cylinder will be the volume of the object *plus* the volume of the air bubbles.\n- Step 2: This leads to an overestimation of the object's volume. Since density is mass over volume ($$\\rho = m/V$$), an inflated volume will result in an underestimation of the object's density.\n\nAlways ensure the object is fully submerged and free of trapped air.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "A spring of constant $$k_1 = 100 \\text{ Nm}^{-1}$$ is in series with a spring of $$k_2 = 300 \\text{ Nm}^{-1}$$. A 6 N force is applied. Does the softer spring or the stiffer spring extend more, and by what factor? (2 steps)", "answer": "- Step 1: In a series combination, the *same force* passes through both springs. Therefore, each spring extends according to its own constant ($$x = F/k$$).\n- Step 2: The softer spring ($$k_1 = 100$$) will extend more because it is easier to stretch. Specifically, $$x_1 = 6/100 = 0.06 \\text{ m}$$, and $$x_2 = 6/300 = 0.02 \\text{ m}$$. The softer spring extends 3 times more than the stiffer spring, which is the exact inverse ratio of their spring constants.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "Three identical springs, each with constant $$k$$, are arranged in parallel to support a mass. What is the effective spring constant, and how much force does *each* spring support if the total force is $$F$$? (2 steps)", "answer": "- Step 1: For springs in parallel, the effective spring constant is the sum of the individual constants: $$k_{\\text{eff}} = k + k + k = 3k$$.\n- Step 2: Because the springs are identical and in parallel, they share the load equally. Each spring supports one-third of the total force: $$F_{\\text{each}} = F / 3$$.\n\nParallel springs share the load; series springs share the extension.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "A material has a very high Young modulus but a low ultimate tensile stress. Describe what would happen if you tried to use this material as a crane cable supporting a heavy load. (2 steps)", "answer": "- Step 1: The high Young modulus means the material is very **stiff**; it will stretch very little under the load (minimal extension).\n- Step 2: However, the low ultimate tensile stress means the material is not very **strong**. It will snap (fracture) under a relatively low load. The cable would barely stretch before breaking suddenly.\n\nStiffness (gradient) is independent of strength (peak stress).", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "A student calculates the elastic strain energy in a rubber band using the formula $$E_e = \\frac{1}{2} F x$$. Why is this incorrect? (2 steps)", "answer": "- Step 1: The formula $$\\frac{1}{2} F x$$ only applies when the force-extension relationship is linear (a straight line through the origin), which is the case for materials obeying Hooke's Law.\n- Step 2: Rubber exhibits a non-linear, curved force-extension relationship (a shallow S-shape). Therefore, the energy stored is the actual area under the *curved* loading graph, not the area of a triangle.\n\nFor non-linear materials, energy must be found by counting squares or integration, never by $$\\frac{1}{2} F x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "A wire is stretched by a force $$F$$ and stores energy $$E_e$$. If the force is increased such that the extension triples (still within the elastic limit), what is the new elastic strain energy? (2 steps)", "answer": "- Step 1: Within the elastic limit, the system obeys Hooke's Law ($$F \\propto x$$). If the extension triples, the force must also triple.\n- Step 2: The elastic strain energy is $$E_e = \\frac{1}{2} F x$$. If both $$F$$ and $$x$$ are multiplied by 3, the energy is multiplied by $$3 \\times 3 = 9$$. The new energy is $$9 E_e$$.\n\nEnergy is proportional to the *square* of the force or extension.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}], "count": 50}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When reading a micrometer screw gauge, the main scale (sleeve) shows marks for full millimetres and half millimetres. If the thimble reads '25' and the last visible mark on the main scale is a half-millimetre mark just past the 7 mm line, what is the total reading in mm? (2 steps)", "answer": "- Step 1: Read the main scale. The last visible mark is the half-millimetre line after the 7 mm line, so the main scale reading is $$7.5 \\text{ mm}$$. A common trap is missing this half-millimetre mark and reading only $$7.0 \\text{ mm}$$.\n- Step 2: Read the thimble scale and add it to the main scale. The thimble reads 25 divisions, and each division is $$0.01 \\text{ mm}$$, so the thimble adds $$0.25 \\text{ mm}$$. Total reading = $$7.5 + 0.25 = 7.75 \\text{ mm}$$.\n\nThe half-millimetre mark is the single most-forgotten detail on a micrometer.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "How do you determine the fractional/decimal reading on a Vernier caliper scale? What physical feature are you looking for? (1 step)", "answer": "- Step 1: You are looking for the single line on the sliding Vernier scale that aligns *perfectly* with *any* line on the fixed main scale. The division number of that aligned Vernier line, multiplied by the resolution of the instrument (e.g., $$0.05 \\text{ mm}$$ or $$0.02 \\text{ mm}$$), gives the decimal reading to add to the main scale reading.\n\nYou do not estimate gaps; you find the exact alignment.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "A micrometer reads $$+0.03 \\text{ mm}$$ when the jaws are fully closed. A student then measures a wire and reads $$1.56 \\text{ mm}$$. What is the actual diameter, and why? (2 steps)", "answer": "- Step 1: Identify the nature of the error. A reading greater than zero when closed is a *positive zero error*. The instrument consistently reads too high.\n- Step 2: Subtract the zero error from the observed reading. Actual diameter = $$1.56 \\text{ mm} - 0.03 \\text{ mm} = 1.53 \\text{ mm}$$. \n\nFor a positive zero error, you subtract; for a negative zero error (e.g., reads $$-0.02 \\text{ mm}$$ when closed), you add the magnitude.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A student takes 5 measurements of a pendulum period using a stopwatch: $$1.8\\text{s}, 1.9\\text{s}, 1.7\\text{s}, 1.8\\text{s}, 1.8\\text{s}$$. The resolution of the stopwatch is $$0.01\\text{s}$$. Comment on the accuracy and precision of these results. (2 steps)", "answer": "- Step 1: Precision refers to the spread of repeated measurements. These results are close to each other (spread is only $$0.2\\text{s}$$), so they are precise.\n- Step 2: Accuracy refers to closeness to the true value. The resolution of the stopwatch ($$0.01\\text{s}$$) is much finer than the spread of the measurements ($$\\pm 0.1\\text{s}$$). The limitation here is human reaction time, not the instrument. Thus, despite the instrument being highly precise (and the readings being repeatable), the accuracy of the actual timing is limited by the user.\n\nHigh resolution does not guarantee high accuracy in practice if systematic errors (like reaction time) dominate.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "A wire's diameter is measured as $$1.00 \\pm 0.02 \\text{ mm}$$. Why is the percentage uncertainty in the cross-sectional area roughly twice the percentage uncertainty in the diameter? (3 steps)", "answer": "- Step 1: Calculate the percentage uncertainty in the diameter. $$\\frac{0.02}{1.00} \\times 100\\% = 2\\%$$.\n- Step 2: Relate diameter to area. Area $$A = \\pi(\\frac{d}{2})^2$$, which means $$A \\propto d^2$$. \n- Step 3: Apply the rule for powers in uncertainty. When a quantity is raised to a power $$n$$, its percentage uncertainty is multiplied by $$n$$. Because the diameter is squared, the percentage uncertainty in the area is approximately $$2 \\times 2\\% = 4\\%$$.\n\nThis is a critical rule for error propagation: squaring a measurement doubles its percentage uncertainty.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "Density is an *intensive* property, whereas mass is *extensive*. Explain what this means by imagining a uniform block of aluminium being cut exactly in half. (2 steps)", "answer": "- Step 1: Define extensive. Mass is extensive because it depends on the amount of substance. If you cut the block in half, the mass halves (from $$m$$ to $$m/2$$).\n- Step 2: Define intensive. Density is intensive because it is a property of the material itself, independent of the amount. When you cut the block in half, the volume also halves (from $$V$$ to $$V/2$$). The new density is $$\\frac{m/2}{V/2} = \\frac{m}{V}$$, which is exactly the same as the original density.\n\nIntensive properties (like density, Young modulus) cancel out the \"amount\" of the sample.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Water has a density of $$1 \\text{ g cm}^{-3}$$. Explain why this equals $$1000 \\text{ kg m}^{-3}$$ without just stating a conversion factor—walk through the units. (3 steps)", "answer": "- Step 1: Convert the mass unit. $$1 \\text{ g} = 10^{-3} \\text{ kg}$$.\n- Step 2: Convert the volume unit. $$1 \\text{ cm} = 10^{-2} \\text{ m}$$. Therefore, $$1 \\text{ cm}^3 = (10^{-2} \\text{ m})^3 = 10^{-6} \\text{ m}^3$$. A common trap is to think $$1 \\text{ cm}^3 = 10^{-2} \\text{ m}^3$$.\n- Step 3: Divide mass by volume. $$\\frac{1 \\text{ g}}{1 \\text{ cm}^3} = \\frac{10^{-3} \\text{ kg}}{10^{-6} \\text{ m}^3} = 10^{3} \\text{ kg m}^{-3} = 1000 \\text{ kg m}^{-3}$$.\n\nThe cubic power is what makes the density in $$\\text{kg m}^{-3}$$ look a thousand times larger than in $$\\text{g cm}^{-3}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "An alloy is made of 70% copper and 30% zinc *by volume*. Why is taking a simple mean of the two densities $$(\\rho_{copper} + \\rho_{zinc})/2$$ incorrect for finding the alloy's density? (3 steps)", "answer": "- Step 1: Density is mass per unit volume. To find the mixture density, you must use total mass over total volume: $$\\rho_{mix} = \\frac{m_1 + m_2}{V_{total}}$$.\n- Step 2: Express masses in terms of their densities and volumes. $$m_1 = \\rho_1 V_1$$ and $$m_2 = \\rho_2 V_2$$. So, $$\\rho_{mix} = \\frac{\\rho_1 V_1 + \\rho_2 V_2}{V_{total}}$$.\n- Step 3: Factor out the total volume. Because $$f_1 = V_1/V_{total}$$ and $$f_2 = V_2/V_{total}$$, the density becomes $$\\rho_{mix} = f_1\\rho_1 + f_2\\rho_2$$. This is a *volume-weighted* average, not a simple mean. A simple mean only works if the volume fractions are exactly 50/50.\n\nNever average densities directly; always go back to total mass over total volume.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "When using a Eureka can to measure the volume of an irregular stone, why must the stone be lowered gently and why must it be completely dry before measuring its mass? (2 steps)", "answer": "- Step 1: Lowering gently prevents splashing. If water splashes out of the collecting cylinder, the measured displaced volume will be less than the actual volume of the stone, leading to a calculated density that is too high.\n- Step 2: The stone must be dry so that the measured mass is only the mass of the stone. If wet, the added water mass increases the numerator in $$\\rho = m/V$$, making the calculated density artificially high.\n\nThese are practical steps to minimise systematic errors in the displacement method.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "When measuring the density of a liquid, why do we measure the mass of the empty measuring cylinder first, rather than just pouring the liquid into an un-weighed cylinder and trying to subtract an estimated container mass later? (2 steps)", "answer": "- Step 1: To find the liquid mass, you must subtract the container mass ($$m_{liquid} = m_{full} - m_{empty}$$). Measuring the empty cylinder directly gives a precise baseline.\n- Step 2: Estimating or looking up the mass of the cylinder introduces unnecessary systematic error and ignores residues or variations in glass thickness. By measuring the same cylinder empty and full on the same balance, the mass of the container cancels exactly, ensuring the mass difference accurately reflects only the liquid.\n\nAlways measure the empty vessel; never assume its mass.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "State Hooke's law, paying careful attention to the condition that limits its validity. (1 step)", "answer": "- Step 1: Hooke's law states that the extension of a sample is directly proportional to the applied force, *provided that the limit of proportionality is not exceeded*.\n\nThe proviso is essential for exam marks; without it, the statement is physically false because materials behave non-linearly at high loads.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "A spring has a natural length of $$10 \\text{ cm}$$. When a $$5 \\text{ N}$$ force is applied, its new length is $$12 \\text{ cm}$$. Explain the difference between 'length' and 'extension' and state the extension here. (1 step)", "answer": "- Step 1: 'Length' (or stretched length) is the total end-to-end distance of the spring. 'Extension' ($$x$$ or $$\\Delta L$$) is the *increase* in length from the natural (unstretched) length. Here, extension = $$12 \\text{ cm} - 10 \\text{ cm} = 2 \\text{ cm}$$. Hooke's law uses extension, not total length.\n\nA common trap is putting the total length into $$F=kx$$ instead of the extension.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "The spring constant $$k$$ describes an object, whereas Young modulus $$E$$ describes a material. Explain conceptually why a longer wire of the same metal has a *smaller* spring constant. (2 steps)", "answer": "- Step 1: Imagine the wire as a chain of atomic bonds. A longer wire has more bonds in series. When you pull the chain, each bond stretches by a small amount, and these small stretches add up.\n- Step 2: Because there are more bonds to stretch, the same applied force produces a larger total extension. Since $$k = F/x$$, a larger $$x$$ for the same $$F$$ means a smaller $$k$$. The wire is \"softer\" as a whole object, even though the material itself (the bond stiffness) hasn't changed.\n\nSpring constant depends on geometry (length and area); Young modulus strips geometry away.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "Two identical springs are joined end-to-end (in series) and a weight is hung from the bottom. How does the total extension compare to a single spring under the same weight, and what is the effective spring constant? (2 steps)", "answer": "- Step 1: The same force stretches each spring fully. If one spring extends by $$x$$, the second also extends by $$x$$. The total extension is $$2x$$, which is double the extension of a single spring.\n- Step 2: Because the extension doubles for the same force, the effective spring constant halves. The formula is $$\\frac{1}{k_{eff}} = \\frac{1}{k_1} + \\frac{1}{k_2}$$, so for two identical springs, $$k_{eff} = k/2$$. This is analogous to resistors in parallel.\n\nSeries springs are easier to stretch (softer overall).", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Two identical springs are hung side-by-side (in parallel) supporting a single weight. How does the extension compare to a single spring, and why does the effective spring constant double? (2 steps)", "answer": "- Step 1: The weight is shared equally between the two springs. Each spring supports only half the load, so each stretches by only half as much as a single spring would under the full load. Thus, the total extension is halved.\n- Step 2: Because the extension is halved for the same applied force, the effective stiffness doubles. The formula is $$k_{eff} = k_1 + k_2$$, so $$k_{eff} = 2k$$. This is analogous to resistors in series.\n\nParallel springs are harder to stretch (stiffer overall).", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Springs in series combine like resistors in parallel, and springs in parallel combine like resistors in series. Explain the physical reason for this crossover analogy. (2 steps)", "answer": "- Step 1: For springs in *series*, the **force** is the same through all springs, but **extensions add**. This matches how parallel resistors have the same voltage but currents add.\n- Step 2: For springs in *parallel*, the **extension** (displacement) is the same for all springs, but **forces add**. This matches how series resistors have the same current but voltages add.\n\nThe quantity that is shared (force for series springs, extension for parallel springs) determines which mathematical rule applies.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "Tensile stress is defined using the *original* cross-sectional area ($$\\sigma = F/A_0$$), not the instantaneous area (engineering stress). Give two reasons why this convention is used at A-level. (2 steps)", "answer": "- Step 1: It is practically measurable. The original area can be measured precisely with a micrometer before loading. Measuring the instantaneous area of a stretching, thinning wire inside a testing machine is extremely difficult.\n- Step 2: In the elastic region, the difference is negligible. Elastic strains are tiny (order of $$10^{-3}$$), so the area changes by roughly $$0.1\\%$$, which is far smaller than measurement uncertainty. Using $$A_0$$ introduces no meaningful error where Hooke's law applies.\n\nThe distinction only matters in deep plastic deformation (necking), where true stress diverges from engineering stress.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "Strain is defined as $$\\varepsilon = \\Delta L / L$$. Explain why strain has no units, and why this makes Young modulus have the same unit as stress. (2 steps)", "answer": "- Step 1: Strain is a ratio of two lengths (extension over original length). When you divide metres by metres, the units cancel completely, leaving a dimensionless number.\n- Step 2: Young modulus is defined as $$E = \\sigma / \\varepsilon$$. Since strain has no units, the unit of $$E$$ is simply the unit of stress (Pascals, $$\\text{Pa}$$) divided by nothing, resulting in Pascals.\n\nThis cancellation of geometry (length in strain, area in stress) is what makes $$E$$ a pure material property.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "A question provides the diameter $$d$$ of a wire and asks for its cross-sectional area to calculate stress. What is the common mistake students make when substituting $$d$$ into the area formula? (2 steps)", "answer": "- Step 1: The formula for area requires the radius, where $$r = d/2$$. The common mistake is using the diameter directly as the radius, writing $$A = \\pi d^2$$ instead of $$A = \\pi (d/2)^2$$.\n- Step 2: Using $$\\pi d^2$$ gives an area that is *four times too large* (since $$(d/2)^2 = d^2/4$$). This makes the calculated stress four times too small, and any subsequent extension calculation four times too large.\n\nAlways halve the diameter on its own line before squaring: $$r = d/2$$, then $$A = \\pi r^2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "Starting from the definitions of stress and strain, derive the relationship between spring constant $$k$$, Young modulus $$E$$, cross-sectional area $$A$$, and original length $$L$$. (4 steps)", "answer": "- Step 1: Write the definitions. Stress $$\\sigma = F/A$$ and Strain $$\\varepsilon = x/L$$ (where $$x$$ is extension).\n- Step 2: Combine into Young modulus. $$E = \\sigma / \\varepsilon = \\frac{F/A}{x/L} = \\frac{FL}{Ax}$$.\n- Step 3: Recognise Hooke's law in the expression. The term $$F/x$$ is the spring constant $$k$$. Substitute $$k = F/x$$ into the numerator.\n- Step 4: Rearrange. $$E = \\frac{kL}{A}$$, which rearranges to the key relationship $$k = \\frac{EA}{L}$$.\n\nThis proves that a larger area or shorter length makes the *object* stiffer (higher $$k$$), but the *material* stiffness ($$E$$) remains constant.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "When stretching a spring obeying Hooke's law, the work done is $$\\frac{1}{2} F x$$, not just $$F x$$. Explain the physical reason for the factor of one half using the concept of average force. (3 steps)", "answer": "- Step 1: Work done is force $$\\times$$ distance, but only if the force is constant. When stretching a spring, the force starts at 0 and builds up to $$F$$.\n- Step 2: Because force increases linearly with extension (Hooke's law), the average force during the pull is not $$F$$, but halfway between the start and end values: $$F_{avg} = \\frac{0 + F}{2} = \\frac{1}{2}F$$.\n- Step 3: Work done = Average force $$\\times$$ distance = $$\\frac{1}{2}F \\times x$$. The product $$Fx$$ (no half) is the area of the whole rectangle on the graph, which is twice the actual triangular area.\n\nThe factor of one half exists because the force ramps up from zero; if you applied the full force $$F$$ instantly, the work would be $$Fx$$, but that's not how a spring stretches.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "The elastic strain energy stored in a wire can be expressed as total energy $$E_e$$ or energy density $$u$$. Explain what energy density means physically and how it relates to stress and strain. (2 steps)", "answer": "- Step 1: Energy density $$u$$ is the elastic strain energy stored *per unit volume* of the material ($$u = E_e / V$$). Its unit is $$\\text{J m}^{-3}$$, which is dimensionally equivalent to Pascals.\n- Step 2: Dividing the energy formula $$\\frac{1}{2}Fx$$ by volume $$V = AL$$ gives $$u = \\frac{\\frac{1}{2}Fx}{AL} = \\frac{1}{2} \\left(\\frac{F}{A}\\right) \\left(\\frac{x}{L}\\right) = \\frac{1}{2}\\sigma\\varepsilon$$. Thus, energy density equals half the product of stress and strain.\n\nThis is the area under the *stress-strain* graph, just as total energy is the area under the *force-extension* graph.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "For a rubber band, the force-extension curve is not a straight line. Why can't we use the formula $$E_e = \\frac{1}{2} k x^2$$ to find the energy stored, and what must we do instead? (2 steps)", "answer": "- Step 1: The formula $$\\frac{1}{2} k x^2$$ relies on Hooke's law ($$F=kx$$) being true so that the graph is a triangle. For rubber, the curve is non-linear (often an S-shape), so the area is not a triangle.\n- Step 2: Instead, you must find the *actual* area under the curved force-extension graph. This is done by counting squares on the graph paper or using the trapezium rule, not by forcing a linear formula.\n\nLinear energy formulas only apply in the linear elastic region.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "On a stress-strain curve, the limit of proportionality and the elastic limit are close together but distinct. What is the key difference in material behaviour between these two points? (2 steps)", "answer": "- Step 1: The limit of proportionality (P) is the point where the graph stops being a straight line. Beyond P, Hooke's law ($$\\sigma \\propto \\varepsilon$$) is no longer valid, but the material *might still be elastic* (it will still return to its original shape).\n- Step 2: The elastic limit (E) is the point beyond which the material will not fully return to its original length when unloaded. Between P and E, the material is non-linear but still elastic; beyond E, the deformation becomes plastic (permanent).\n\nProportionality is about the line being straight; elasticity is about springing back.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "How does the stress-strain curve behave at the yield point, and what physically happens to the material's structure there? (2 steps)", "answer": "- Step 1: On the curve, the yield point shows a sudden large increase in strain for little or no increase in stress. The graph often has a near-horizontal step or a slight dip.\n- Step 2: Physically, the atomic layers in the material begin to slide past one another permanently (dislocation movement). The material \"gives way\" and deforms rapidly under constant load.\n\nYielding is the onset of massive permanent deformation, distinct from the subtle non-linearity at the limit of proportionality.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "On a standard engineering stress-strain graph for a ductile metal, the curve peaks at the Ultimate Tensile Stress (UTS) and then falls before fracture. Why does the *engineering stress* fall even though the material hasn't broken yet? (2 steps)", "answer": "- Step 1: After the UTS, the material begins to \"neck\"—the cross-sectional area locally decreases significantly in one small region.\n- Step 2: Engineering stress is calculated using the *original* fixed area $$A_0$$. Even though the load might still be increasing in the necked region, the load divided by the original area actually decreases. The *true* stress (force over instantaneous area) continues to rise, but the engineering curve dips.\n\nThe downturn is a mathematical artifact of the engineering stress definition, not a sign the material is getting weaker.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "A brittle material like glass and a ductile material like copper can both have high breaking stresses. What is the fundamental difference in how they behave just before fracture? (2 steps)", "answer": "- Step 1: A ductile material undergoes significant plastic deformation (necking, stretching) before it breaks, giving visible warning. Its stress-strain curve has a large curved region.\n- Step 2: A brittle material shows little to no plastic deformation before fracture. It snaps suddenly while still in the elastic (or nearly elastic) region. Its stress-strain curve is essentially a straight line that stops abruptly.\n\nBrittle does not mean \"weak\"; it means \"no warning.\" A brittle material can be very strong but still fail without yielding.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "Distinguish between a \"stiff\" material, a \"strong\" material, and a \"tough\" material based on their stress-strain curves. (3 steps)", "answer": "- Step 1: Stiffness is indicated by the gradient of the initial linear region. A stiff material has a steep gradient (high Young modulus), resisting elastic deformation.\n- Step 2: Strength is indicated by the maximum stress (UTS) the material can withstand. A strong material reaches a high point on the stress axis before breaking or yielding.\n- Step 3: Toughness is indicated by the *total area under the stress-strain curve up to fracture*. A tough material absorbs a large amount of energy per unit volume before breaking (usually ductile materials with long, curving graphs).\n\nA material can be stiff but brittle (glass), or less stiff but tough (polyethylene).", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "A metal wire is stretched beyond its elastic limit and then the load is removed. Describe the path of the unloading line on a force-extension graph relative to the loading line, and state what the horizontal intercept represents. (2 steps)", "answer": "- Step 1: The unloading line is straight and parallel to the initial linear (loading) region of the graph, but it does not return to the origin.\n- Step 2: The horizontal intercept on the extension axis represents the permanent (plastic) extension. The material has been permanently deformed and will not return to its original length.\n\nThe parallel shift shows that the atomic bonds still behave elastically (same stiffness/gradient), but the whole lattice has been shifted to a new resting position.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "When rubber is stretched and released, the loading and unloading curves form a closed loop (hysteresis). What does the area enclosed by this loop represent, and where does that energy go? (2 steps)", "answer": "- Step 1: The area enclosed by the loop represents the energy dissipated (not recovered) per cycle of loading and unloading.\n- Step 2: This energy is converted into internal energy (heat) within the rubber. This is why a repeatedly stretched rubber band or a flexing tyre becomes warm.\n\nThe loading curve area is work done *on* the rubber; the unloading curve area is work done *by* the rubber; the difference (loop area) is the heat lost.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "Wire A is made of copper, is 1 m long, and has diameter 1 mm. Wire B is also copper, is 2 m long, and has diameter 2 mm. Compare their Young moduli and their spring constants. (3 steps)", "answer": "- Step 1: Compare Young moduli. Both wires are made of copper, so their Young moduli are identical. Young modulus is a material property and does not depend on dimensions.\n- Step 2: Use the relationship $$k = \\frac{EA}{L}$$ to compare spring constants. Wire B has twice the length (which halves $$k$$) but twice the diameter, meaning its area is $$2^2 = 4$$ times larger (which quadruples $$k$$).\n- Step 3: Combine the effects. Wire B's spring constant is $$4/2 = 2$$ times larger than Wire A's. Even though it is longer, the quadrupled area dominates, making Wire B stiffer as an object.\n\nObject stiffness ($$k$$) depends on geometry; material stiffness ($$E$$) does not.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "A steel rail is laid in cold weather and stretched so it has a permanent \"pre-strain\". If the temperature rises, the rail wants to expand. Explain why pre-straining prevents the rail from buckling when it gets hot. (3 steps)", "answer": "- Step 1: When steel gets hot, it naturally wants to expand. If laid without pre-strain, this expansion would push against the fixed ends, causing large compressive forces that could buckle the rail.\n- Step 2: Pre-straining stretches the rail while fixing it. This builds in tensile stress (like a stretched rubber band pinned at both ends).\n- Step 3: As the temperature rises, the thermal expansion simply relieves the built-in tensile stress. The rail goes from being stretched to being unstretched, rather than from being unstretched to being compressed. Buckling is avoided because the rail never enters a compressive state.\n\nPre-straining uses up the \"slack\" so thermal expansion doesn't create compression.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "An alloy is 60% by volume tin (density $$7 \\text{ g cm}^{-3}$$) and 40% by volume lead (density $$11 \\text{ g cm}^{-3}$$). Estimate the alloy density using mental math. Is it closer to 7 or 11? (2 steps)", "answer": "- Step 1: Use the volume-weighted formula $$\\rho = f_1\\rho_1 + f_2\\rho_2$$. Multiply the fractions by the densities: $$0.6 \\times 7 = 4.2$$ and $$0.4 \\times 11 = 4.4$$.\n- Step 2: Add them together. $$4.2 + 4.4 = 8.6 \\text{ g cm}^{-3}$$. The density is much closer to 9 than to the simple average of 9, and because it is 60% tin, it is pulled slightly toward the tin density from the midpoint.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "A single spring extends by 6 cm under a 12 N load. What is the total extension if two identical springs are arranged in parallel under the same 12 N load? What if they are in series? (2 steps)", "answer": "- Step 1: Parallel arrangement. The 12 N load is shared equally (6 N per spring). Each spring extends by 3 cm. Since they are side-by-side, the total extension is 3 cm (half the original).\n- Step 2: Series arrangement. The full 12 N passes through each spring. Each spring extends by 6 cm. Since they are end-to-end, the extensions add up: $$6 + 6 = 12$$ cm (double the original).", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "A $$2 \\text{ kg}$$ mass hangs from a spring. What force value must be used in $$F=kx$$, assuming Earth's gravity? (1 step)", "answer": "- Step 1: The mass must be converted to its weight (force). $$F = mg = 2 \\text{ kg} \\times 9.81 \\text{ N kg}^{-1} \\approx 19.6 \\text{ N}$$. A common trap is to substitute the mass (2) directly into the formula instead of the weight.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "A spring with constant $$200 \\text{ N m}^{-1}$$ is stretched by $$0.1 \\text{ m}$$. Calculate the elastic strain energy stored. (2 steps)", "answer": "- Step 1: Use the formula $$E_e = \\frac{1}{2} k x^2$$. Substitute the values: $$E_e = 0.5 \\times 200 \\times (0.1)^2$$.\n- Step 2: Calculate. $$0.5 \\times 200 = 100$$. $$(0.1)^2 = 0.01$$. $$100 \\times 0.01 = 1 \\text{ J}$$. Remember the half and the square on the extension!", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "You need to measure the diameter of a large steel ball (approx 3 cm) and a thin copper wire (approx 0.5 mm). Which instrument (micrometer or Vernier caliper) is most appropriate for each? (2 steps)", "answer": "- Step 1: The thin copper wire requires high precision because small errors in diameter lead to large errors in area. The micrometer (resolution $$0.01 \\text{ mm}$$) is appropriate here. A Vernier caliper would have too large a percentage uncertainty for a 0.5 mm object.\n- Step 2: The large steel ball cannot fit in a standard micrometer (max range usually 25 mm). The Vernier caliper (range 0-150 mm, resolution $$0.05 \\text{ mm}$$) is appropriate, as the percentage uncertainty on a 3 cm reading will be very small anyway.\n\nMatch the instrument to the size and precision needed.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "When the jaws of a Vernier caliper are closed, the zero mark on the Vernier scale is to the *left* of the zero mark on the main scale. Is this a positive or negative zero error, and how do you correct the final reading? (2 steps)", "answer": "- Step 1: This is a negative zero error. The instrument reads less than zero when closed (e.g., $$-0.05 \\text{ mm}$$). It will consistently read too low.\n- Step 2: To correct it, you must *add* the magnitude of the zero error to the observed reading. (e.g., if it reads $$-0.05 \\text{ mm}$$ closed, and you measure $$10.20 \\text{ mm}$$, the actual reading is $$10.20 - (-0.05) = 10.25 \\text{ mm}$$).\n\nNegative zero errors make readings too small; they are corrected by addition.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "A micrometer reads $$4.5 \\text{ mm}$$ on the sleeve and $$12$$ on the thimble. If the zero error is $$+0.03 \\text{ mm}$$, what is the true diameter? (2 steps)", "answer": "- Step 1: Calculate the observed reading. $$4.5 \\text{ mm} + (12 \\times 0.01 \\text{ mm}) = 4.5 + 0.12 = 4.62 \\text{ mm}$$.\n- Step 2: Correct for the positive zero error. The instrument reads too high by $$0.03 \\text{ mm}$$, so subtract it. True diameter = $$4.62 - 0.03 = 4.59 \\text{ mm}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "Distinguish between a \"simple mean\" and a \"volume-weighted mean\" in the context of calculating the density of a mixture. When would they give the same result? (2 steps)", "answer": "- Step 1: A simple mean is $$(\\rho_1 + \\rho_2)/2$$. A volume-weighted mean is $$f_1\\rho_1 + f_2\\rho_2$$, where $$f$$ is the volume fraction. The volume-weighted mean accounts for the fact that one component might take up more space and thus contribute more mass proportionally.\n- Step 2: They only give the exact same result if the mixture is exactly 50% by volume of component 1 and 50% by volume of component 2 (i.e., $$f_1 = f_2 = 0.5$$).", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}], "count": 40}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why is density an intensive property? Explain using a copper block example. (3 steps)", "answer": "- Step 1: **Definition**  \nDensity is mass per unit volume.  \n- Step 2: **Copper Block Example**  \nIf you cut a copper block in half:  \n$$\n\\rho_{\\text{half}} = \\frac{m/2}{V/2} = \\frac{m}{V} = \\rho.\n$$  \n- Step 3: **Conceptual Insight**  \nDensity depends only on the material, not the sample size. This contrasts with extensive properties like mass or volume.\n\n[Optional: Takeaway: Intensive properties reveal material identity; extensive properties scale with sample size.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": true}, {"question": "How to read a micrometer with a positive zero error? (3 steps)", "answer": "- Step 1: **Identify Zero Error**  \nPositive zero error occurs when thimble's zero mark is *below* the main scale line when jaws are closed.  \n- Step 2: **Correct the Reading**  \nActual Reading = Observed Reading - Zero Error.  \n+ Example: Zero error = +0.02 mm, observed = 10.37 mm → Actual = 10.37 - 0.02 = 10.35 mm.  \n- Step 3: **Why It Matters**  \nZero error is a systematic error; correcting it ensures accuracy in measuring small lengths.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why is stress defined using the original cross-sectional area? (3 steps)", "answer": "- Step 1: **Definition of Stress**  \n$$\n\\sigma = \\frac{F}{A_0}, \\quad \\text{where } A_0 \\text{ is original area}.\n$$  \n- Step 2: **True vs Engineering Stress**  \nTrue stress uses instantaneous area $A_{\\text{inst}}$, but $A_0$ is easier to measure and sufficient for elastic calculations.  \n- Step 3: **Practical Reason**  \nIn elastic deformation, area changes are negligible (e.g., ~0.1% for metals), so $A_0$ introduces no meaningful error.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How to calculate the extension of a steel cable (diameter 30 mm, length 25 m) under a 20 kN load? Young modulus = 200 GPa. (4 steps)", "answer": "- Step 1: **Calculate Radius**  \n$$\nr = \\frac{d}{2} = \\frac{30 \\times 10^{-3}}{2} = 0.015\\,\\text{m}.\n$$  \n- Step 2: **Compute Area**  \n$$\nA = \\pi r^2 = \\pi (0.015)^2 = 7.07 \\times 10^{-4}\\,\\text{m}^2.\n$$  \n- Step 3: **Apply Young Modulus Formula**  \n$$\nE = \\frac{FL}{A\\Delta L} \\Rightarrow \\Delta L = \\frac{FL}{AE}.\n$$  \n- Step 4: **Substitute Values**  \n$$\n\\Delta L = \\frac{(20 \\times 10^3)(25)}{(7.07 \\times 10^{-4})(200 \\times 10^9)} = 3.53 \\times 10^{-3}\\,\\text{m} = 3.53\\,\\text{mm}.\n$$\n\n[Takeaway: Extension scales with force and original length, inversely with area and stiffness.]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why do springs in series have lower effective stiffness than a single spring? (3 steps)", "answer": "- Step 1: **Force and Extension in Series**  \nSame force $F$ acts on each spring. Each extends by $x = F/k$.  \n- Step 2: **Total Extension**  \nFor two springs:  \n$$\nx_{\\text{total}} = x_1 + x_2 = \\frac{F}{k} + \\frac{F}{k} = \\frac{2F}{k} \\Rightarrow k_{\\text{eff}} = \\frac{F}{x_{\\text{total}}} = \\frac{k}{2}.\n$$  \n- Step 3: **Physical Intuition**  \nSeries springs share the same force but add extensions. The system is \"softer\" (less stiffness) than a single spring.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why can't you average densities directly to find an alloy's density? (3 steps)", "answer": "- Step 1: **Density Formula**  \n$$\n\\rho_{\\text{mix}} = \\frac{m_1 + m_2}{V_1 + V_2} = \\frac{\\rho_1 V_1 + \\rho_2 V_2}{V_1 + V_2}.\n$$  \n- Step 2: **Volume-Weighted Average**  \nFor brass (70% copper by volume):  \n$$\n\\rho_{\\text{brass}} = 0.70\\rho_{\\text{Cu}} + 0.30\\rho_{\\text{Zn}}.\n$$  \n- Step 3: **Common Pitfall**  \nSimple mean $\\frac{\\rho_1 + \\rho_2}{2}$ is only valid if volumes are equal. Always use volume fractions.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How to calculate elastic strain energy in a rubber band with non-linear force-extension? (2 steps)", "answer": "- Step 1: **Linear vs Non-Linear**  \nHooke’s law gives $E_e = \\frac{1}{2}Fx$ or $\\frac{1}{2}kx^2$ *only* for straight-line regions.  \n- Step 2: **For Non-Linear Graph**  \nUse the actual area under the $F-x$ curve.  \n+ Example: Count squares under a curved graph or use the trapezium rule.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why does a longer wire have a smaller spring constant? (4 steps)", "answer": "- Step 1: **Spring Constant Definition**  \n$$\nk = \\frac{F}{x} = \\frac{EA}{L} \\quad \\text{(from } E = \\frac{FL}{Ax} \\text{)}.\n$$  \n- Step 2: **Geometry Dependence**  \n$k$ is inversely proportional to length ($k \\propto 1/L$) and directly proportional to area ($k \\propto A$).  \n- Step 3: **Physical Intuition**  \nA longer wire has more material to stretch (x ∝ L), so a given force causes more extension.  \n- Step 4: **Contrast with Young Modulus**  \n$E = \\sigma/\\varepsilon$ cancels $A$ and $L$, making it a material property.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How to determine the Young modulus from a stress-strain graph? (3 steps)", "answer": "- Step 1: **Linear Region**  \nYoung modulus is the gradient of the straight-line (proportional) part:  \n$$\nE = \\frac{\\Delta \\sigma}{\\Delta \\varepsilon}.\n$$  \n- Step 2: **Units Check**  \nStress (Pa) over strain (dimensionless) → units of E match stress.
