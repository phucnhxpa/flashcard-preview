\n- Step 3: **Practical Application**  \nPick two points in the linear region. Example: stress changes from $0$ to $4.2 \\times 10^8$ Pa at strain $2.0 \\times 10^{-3}$:  \n$$\nE = \\frac{4.2 \\times 10^8}{2.0 \\times 10^{-3}} = 2.1 \\times 10^{11}\\,\\text{Pa}.\n$$", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why is the area under a stress-strain graph energy per unit volume? (4 steps)", "answer": "- Step 1: **Elastic Energy in a Wire**  \n$$\nE_e = \\frac{1}{2}Fx = \\frac{1}{2}(\\sigma A)(\\varepsilon L) = \\frac{1}{2}\\sigma \\varepsilon (AL) = \\frac{1}{2}\\sigma \\varepsilon V.\n$$  \n- Step 2: **Energy Density**  \n$$\nu = \\frac{E_e}{V} = \\frac{1}{2}\\sigma \\varepsilon.\n$$  \n- Step 3: **Graph Interpretation**  \nArea under $\\sigma$-$\\varepsilon$ curve is energy density (J/m³).  \n- Step 4: **Contrast with Force-Extension**  \nForce-extension graphs require $\\frac{1}{2}Fx$ for energy; stress-strain graphs directly scale with material properties.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": true}, {"question": "How to distinguish limit of proportionality, elastic limit, and yield point on a stress-strain curve? (3 steps)", "answer": "- Step 1: **Limit of Proportionality (P)**  \nEnd of the straight line where $\\sigma \\propto \\varepsilon$.  \n- Step 2: **Elastic Limit (E')**  \nBeyond P, still elastic (sample returns to original length on unloading), but Hooke’s law no longer applies.  \n- Step 3: **Yield Point (Y)**  \nSudden extension with no load increase. At this point, plastic deformation begins.\n\n[Takeaway: P → non-linear elasticity, E' → plastic risk, Y → rapid plastic flow.]", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "Why is the spring constant different for series and parallel arrangements? (4 steps)", "answer": "- Step 1: **Series Case**  \nSame force, extensions add:  \n$$\n\\frac{1}{k_{\\text{eff}}} = \\frac{1}{k_1} + \\frac{1}{k_2}.\n$$  \n- Step 2: **Parallel Case**  \nSame extension, forces add:  \n$$\nk_{\\text{eff}} = k_1 + k_2.\n$$  \n- Step 3: **Analogy to Resistors**  \nSeries springs → resistors in parallel; parallel springs → resistors in series.  \n- Step 4: **Physical Intuition**  \nSeries: shared extension, softer system. Parallel: shared force, stiffer system.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "How to calculate the cross-sectional area of a wire from its diameter? (3 steps)", "answer": "- Step 1: **Radius Conversion**  \n$$\nr = \\frac{d}{2}.\n$$  \n- Step 2: **Area Formula**  \n$$\nA = \\pi r^2 = \\pi \\left(\\frac{d}{2}\\right)^2 = \\frac{\\pi d^2}{4}.\n$$  \n- Step 3: **Common Mistake**  \nUsing $A = \\pi d^2$ gives 4× the correct area.  \n+ Example: d = 2 mm → A = π(0.001 m)² = 3.14 × 10⁻⁶ m², not 12.6 × 10⁻⁶ m².", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How to estimate the mass of air in a room? (3 steps)", "answer": "- Step 1: **Assumptions**  \nTypical room dimensions: 5 m × 4 m × 2.5 m → V = 50 m³.  \n- Step 2: **Air Density**  \nStandard air density ≈ 1.2 kg/m³.  \n- Step 3: **Calculate Mass**  \n$$\nm = \\rho V = 1.2 \\times 50 = 60\\,\\text{kg}.\n$$  \n+ Note: At high altitudes, air density decreases, so mass would be lower.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why does a balloon’s air density differ from standard air density? (2 steps)", "answer": "- Step 1: **Standard vs Inflated Density**  \nStandard: 1.2 kg/m³ at 1 atm.  \n- Step 2: **Pressure Effect**  \nIn a balloon, air is compressed (higher pressure) → more molecules in same V → higher density.  \n+ Example: Balloon density ≈ 1.49 kg/m³ (video example) due to inflation pressure.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "How to derive the formula for elastic strain energy in a spring? (4 steps)", "answer": "- Step 1: **Work Done**  \nWork $E_e$ is the area under $F$-$x$ graph.  \n- Step 2: **Linear Region Geometry**  \nFor $F = kx$, the graph is a triangle:  \n$$\nE_e = \\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2}Fx = \\frac{1}{2}kx^2.\n$$  \n- Step 3: **Integration Approach**  \n$$\nE_e = \\int_0^{x} F\\,\\text{d}x' = \\int_0^{x} kx'\\,\\text{d}x' = \\frac{1}{2}kx^2.\n$$  \n- Step 4: **Energy Density**  \nDivide by material volume to get $u = \\frac{1}{2}\\sigma \\varepsilon$ → property of material/strain state.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": true}, {"question": "What is the difference between stress and pressure? (2 steps)", "answer": "- Step 1: **Definition**  \nStress: internal force per unit area in solids. Pressure: external force per unit area in fluids.  \n- Step 2: **Directionality**  \nStress can be tensile (pull) or compressive (push); pressure is always compressive in fluids.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "How to calculate the stiffness of a spring from a force-extension graph? (2 steps)", "answer": "- Step 1: **Gradient Interpretation**  \n$$\nk = \\frac{\\Delta F}{\\Delta x} \\quad \\text{(slope of straight-line region)}.\n$$  \n- Step 2: **Non-Linear Region**  \nBeyond the limit of proportionality, the slope decreases → $k$ is no longer constant.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Why does a brass alloy’s density require volume fractions, not mass fractions? (3 steps)", "answer": "- Step 1: **Mass Fractions vs Volume Fractions**  \nMass fractions would require:  \n$$\n\\frac{1}{\\rho_{\\text{mix}}} = \\frac{w_1}{\\rho_1} + \\frac{w_2}{\\rho_2}.\n$$  \n- Step 2: **Volume Fractions**  \nBrass example:  \n$$\n\\rho_{\\text{mix}} = 0.70 \\times 8.9 \\times 10^3 + 0.30 \\times 7.1 \\times 10^3 = 8360\\,\\text{kg/m}^3.\n$$  \n- Step 3: **Key Principle**  \nDensity is mass/volume → volume fractions directly contribute to total mass and volume. Mass fractions must be converted to volume fractions.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "How to compare stress-strain curves for brittle, ductile, and polymeric materials? (3 steps)", "answer": "- Step 1: **Brittle Materials**  \nStraight line ends abruptly at fracture (e.g., glass).  \n- Step 2: **Ductile Materials**  \nLinear region → yield → plastic deformation → necking → fracture.  \n- Step 3: **Polymeric Materials**  \nNon-linear S-shape curve; hysteresis (loading/unloading paths differ); large strains (e.g., rubber).\n\n[Takeaway: Brittle → no warning; ductile → visible stretching; polymeric → elastic but non-linear.]", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}, {"question": "Why is Young modulus a material constant, but spring constant not? (4 steps)", "answer": "- Step 1: **Spring Constant**  \n$$\nk = \\frac{EA}{L} \\quad \\text{(geometry-dependent)}.\n$$  \n- Step 2: **Young Modulus**  \n$$\nE = \\frac{\\sigma}{\\varepsilon} = \\frac{F/A}{x/L} = \\frac{FL}{Ax}.\n$$  \n- Step 3: **Geometry Cancellation**  \nIn $E$, $A$ and $L$ cancel out → E depends only on material.  \n- Step 4: **Practical Implication**  \nTwo steel wires with different lengths and thicknesses have the same $E$ but different $k$.", "source": "Qwen 3 ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "How to calculate the diameter of a steel wire (Young modulus = 200 GPa) supporting a 200 kg piano with max stress 500 MPa? (4 steps)", "answer": "- Step 1: **Force Calculation**  \n$$\nF = mg = 200 \\times 9.81 = 1962\\,\\text{N}.\n$$  \n- Step 2: **Stress Formula**  \n$$\n\\sigma = \\frac{F}{A} \\Rightarrow A = \\frac{F}{\\sigma} = \\frac{1962}{500 \\times 10^6} = 3.924 \\times 10^{-6}\\,\\text{m}^2.\n$$  \n- Step 3: **Radius from Area**  \n$$\nr = \\sqrt{\\frac{A}{\\pi}} = \\sqrt{\\frac{3.924 \\times 10^{-6}}{\\pi}} = 1.117 \\times 10^{-3}\\,\\text{m}.\n$$  \n- Step 4: **Diameter**  \n$$\nd = 2r = 2.23 \\times 10^{-3}\\,\\text{m} = 2.23\\,\\text{mm}.\n$$\n\n[Takeaway: Stress defines area; area defines diameter.]", "source": "Qwen 3 ①", "_id": "qwen_1_21", "judge_pick": false}, {"question": "How to interpret a stress-strain curve’s ultimate tensile stress (UTS)? (3 steps)", "answer": "- Step 1: **UTS Definition**  \nMaximum stress before necking.  \n- Step 2: **Engineering vs True Stress**  \nEngineering stress uses original area → UTS appears as peak. True stress keeps rising until fracture.  \n- Step 3: **Material Behavior**  \nAt UTS, necking begins. Ductile materials show UTS; brittle materials fracture before reaching it.", "source": "Qwen 3 ①", "_id": "qwen_1_22", "judge_pick": true}, {"question": "Why is the factor of ½ essential in elastic strain energy? (2 steps)", "answer": "- Step 1: **Average Force**  \nForce increases from 0 to $F$ → average force is $\\frac{1}{2}F$.  \n- Step 2: **Energy Formula**  \n$$\nE_e = \\frac{1}{2}Fx = \\frac{1}{2}kx^2.\n$$  \n+ Example: Stretching a spring with $k = 100$ N/m by $x = 0.1$ m → $E_e = \\frac{1}{2} \\times 100 \\times 0.1^2 = 0.5$ J.", "source": "Qwen 3 ①", "_id": "qwen_1_23", "judge_pick": true}, {"question": "What is the physical meaning of the area under a stress-strain graph up to fracture? (2 steps)", "answer": "- Step 1: **Total Energy Density**  \n$$\nu_{\\text{toughness}} = \\int_0^{\\varepsilon_{\\text{fracture}}} \\sigma\\,\\text{d}\\varepsilon.\n$$  \n- Step 2: **Material Toughness**  \nToughness = energy absorbed per unit volume before breaking.  \n+ Example: Ductile metals have large areas (tough), brittle materials have small areas (fragile).", "source": "Qwen 3 ①", "_id": "qwen_1_24", "judge_pick": false}, {"question": "How to convert cm³ to m³? Why is this critical for density calculations? (2 steps)", "answer": "- Step 1: **Conversion Rule**  \n$$\n1\\,\\text{cm}^3 = (10^{-2}\\,\\text{m})^3 = 10^{-6}\\,\\text{m}^3.\n$$  \n- Step 2: **Density Calculation**  \nUsing 1 cm³ = 10⁻³ m³ would make density 1000× too small.  \n+ Example: Air density in balloon (video) → 50 g in 20 cm radius → $\\rho = 1.49$ kg/m³ (vs. 1.2 kg/m³ standard). The correct conversion ensures accurate results.", "source": "Qwen 3 ①", "_id": "qwen_1_25", "judge_pick": false}, {"question": "How to calculate the extension of two different springs (k₁ = 50 N/m, k₂ = 75 N/m) in series under 9.0 N? (4 steps)", "answer": "- Step 1: **Force in Series**  \nEach spring carries full 9.0 N.  \n- Step 2: **Individual Extensions**  \n$$\nx_1 = \\frac{F}{k_1} = \\frac{9.0}{50} = 0.180\\,\\text{m}, \\quad x_2 = \\frac{F}{k_2} = \\frac{9.0}{75} = 0.120\\,\\text{m}.\n$$  \n- Step 3: **Total Extension**  \n$$\nx_{\\text{total}} = x_1 + x_2 = 0.180 + 0.120 = 0.300\\,\\text{m}.\n$$  \n- Step 4: **Effective Stiffness**  \n$$\nk_{\\text{eff}} = \\frac{F}{x_{\\text{total}}} = \\frac{9.0}{0.300} = 30\\,\\text{N/m}.\n$$  \n+ Check: $1/k_{\\text{eff}} = 1/50 + 1/75 = 0.020 + 0.0133 = 0.0333 \\Rightarrow k_{\\text{eff}} = 30\\,\\text{N/m}$.", "source": "Qwen 3 ①", "_id": "qwen_1_26", "judge_pick": false}, {"question": "Why can’t stress be calculated from strain alone in a copper wire? (2 steps)", "answer": "- Step 1: **Stress Formula**  \n$$\n\\sigma = \\frac{F}{A} \\quad \\text{or} \\quad \\sigma = E \\varepsilon.\n$$  \n- Step 2: **Missing Data**  \nGiven only strain and original length (e.g., Q9 in video), without $F$, $A$, or $E$, stress cannot be determined.", "source": "Qwen 3 ①", "_id": "qwen_1_27", "judge_pick": true}, {"question": "How to determine the Young modulus of a wire using Searle’s apparatus? (5 steps)", "answer": "- Step 1: **Measure Diameter**  \nUse micrometer at multiple points → average radius $r = d/2$.  \n- Step 2: **Calculate Area**  \n$$\nA = \\pi r^2.\n$$  \n- Step 3: **Apply Load Gradually**  \nRecord forces and extensions.  \n- Step 4: **Plot Stress-Strain Curve**  \nGradient is $E$ in linear region.  \n- Step 5: **Control Wire Use**  \nCompensates for temperature-induced expansion in test wire → isolates elastic extension.", "source": "Qwen 3 ①", "_id": "qwen_1_28", "judge_pick": false}, {"question": "What is the elastic limit, and how is it tested? (3 steps)", "answer": "- Step 1: **Definition**  \nMaximum load for which the material returns to original length on unloading.  \n- Step 2: **Testing Method**  \nApply increasing load, then unload. If extension returns to zero → within elastic limit.  \n- Step 3: **Contrast with Proportionality**  \nLimit of proportionality is where linearity ends; elastic limit is where reversibility ends. Between them: non-linear but still elastic.", "source": "Qwen 3 ①", "_id": "qwen_1_29", "judge_pick": false}, {"question": "How to calculate the energy density of a material under strain? (3 steps)", "answer": "- Step 1: **Energy Density Formula**  \n$$\nu = \\frac{1}{2} \\sigma \\varepsilon = \\frac{1}{2} E \\varepsilon^2 = \\frac{\\sigma^2}{2E}.\n$$  \n- Step 2: **Interpretation**  \nEnergy density (J/m³) is energy stored per unit volume.  \n- Step 3: **Practical Use**  \nUsed to compare energy-absorbing capacity of materials (e.g., springs, bows).", "source": "Qwen 3 ①", "_id": "qwen_1_30", "judge_pick": false}, {"question": "Why is the spring constant $k$ a geometry-dependent property? (4 steps)", "answer": "- Step 1: **Spring Constant Formula**  \n$$\nk = \\frac{EA}{L}.\n$$  \n- Step 2: **Geometry Dependence**  \nDoubling length → $k$ halves. Doubling area → $k$ doubles.  \n- Step 3: **Physical Intuition**  \nLonger springs stretch more (softer), thicker springs stretch less (stiffer).  \n- Step 4: **Contrast with Young Modulus**  \n$E$ is material constant; $k$ changes with $A$ and $L$.", "source": "Qwen 3 ①", "_id": "qwen_1_31", "judge_pick": false}, {"question": "How to sketch a stress-strain curve for a ductile metal? (5 steps)", "answer": "- Step 1: **Linear Region**  \nStraight line through origin → Hooke’s law holds.  \n- Step 2: **Limit of Proportionality (P)**  \nEnd of linear region.  \n- Step 3: **Elastic Limit (E')**  \nEnd of reversible extension.  \n- Step 4: **Yield Point (Y)**  \nSudden extension with little load increase.  \n- Step 5: **Necking and Fracture**  \nUTS → necking → fracture. Shade area under curve as toughness.\n\n[Takeaway: Ductile materials show large plastic region; brittle materials fracture at P.]", "source": "Qwen 3 ①", "_id": "qwen_1_32", "judge_pick": false}], "count": 33}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is density considered an intensive property? (3 steps)", "answer": "- Step 1: Define intensive vs. extensive properties. **Intensive** properties (density, color, temperature) don't depend on sample size; **extensive** properties (mass, volume) do.\n- Step 2: Use mathematical proof. For a copper block halved:  \n  $$\n  \\rho_{\\text{half}} = \\frac{m/2}{V/2} = \\frac{m}{V} = \\rho_{\\text{original}}.\n  $$\n- Step 3: Connect to material structure. Density depends only on atomic/molecular arrangement (material identity), not on how much material exists.  \n+ Misconception probe: \"If I take half a sample, shouldn't the density change?\"  \n+ Edge case: Compare 1 kg vs 2 kg of lead.  \n\n**Takeaway:** Density is a fingerprint of the material, not the sample size.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": true}, {"question": "Why does mixing two metals by mass fraction require harmonic mean for density? (4 steps)", "answer": "- Step 1: Start with definition of density: $\\rho_{\\text{mix}} = \\frac{m_{\\text{total}}}{V_{\\text{total}}}$.\n- Step 2: For mass fractions $w_1,w_2$:  \n  $$\n  m_1 = w_1 m_{\\text{total}},\\quad m_2 = w_2 m_{\\text{total}}.\n  $$\n- Step 3: Volume adds, mass fixed:  \n  $$\n  V_{\\text{total}} = \\frac{m_1}{\\rho_1} + \\frac{m_2}{\\rho_2} = \\frac{w_1 m_{\\text{total}}}{\\rho_1} + \\frac{w_2 m_{\\text{total}}}{\\rho_2}.\n  $$\n- Step 4: Substitute into $\\rho_{\\text{mix}}$:  \n  $$\n  \\rho_{\\text{mix}} = \\frac{m_{\\text{total}}}{\\frac{w_1 m_{\\text{total}}}{\\rho_1} + \\frac{w_2 m_{\\text{total}}}{\\rho_2}} = \\frac{1}{\\frac{w_1}{\\rho_1} + \\frac{w_2}{\\rho_2}}^{-1}.\n  $$\n+ Counterexample: If you mix by volume instead, use arithmetic mean $\\rho = f_1\\rho_1 + f_2\\rho_2$.  \n+ Practical mistake: Averaging densities directly gives +4% error in brass (8.0 vs. 8.36×10³ kg/m³).\n\n**Takeaway:** Always calculate \"total mass / total volume\" — don't average or assume equal fractions.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": true}, {"question": "Derive the formula for elastic strain energy stored in a spring obeying Hooke's Law. (4 steps)", "answer": "- Step 1: Recognize that work done $W = \\int F\\,dx$, but $F$ isn't constant — it varies from $0$ to $F$.  \n- Step 2: Substitute Hooke's Law $F = kx$:  \n  $$\n  E_e = \\int_0^x kx'\\,dx' = \\frac{1}{2}kx^2.\n  $$\n- Step 3: Link to triangle area under $F-x$ graph: base $x$, height $kx$ →  \n  $$\n  \\text{Area} = \\frac{1}{2}x(kx) = \\frac{1}{2}kx^2.\n  $$\n- Step 4: Compare with rectangle area (incorrect): A constant force at value $F$ over $x$ would give $Fx$, but real force starts at 0 → triangle area is half.  \n+ Limiting case: If stiffness $k \\to 0$ (floppy spring), energy stored decreases.  \n+ Misconception: \"Why not just use $Fx$?\" — explains the ½ factor.\n\n**Takeaway:** Elastic energy is the area under the elastic region of the force-extension graph, not the entire rectangle.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "Why does Young modulus depend only on the material, not on shape? (5 steps)", "answer": "- Step 1: Start with Hooke's Law in terms of $k$:  \n  $$\n  k = \\frac{EA}{L} \\quad \\Rightarrow \\quad E = \\frac{kL}{A}.\n  $$\n- Step 2: Consider two copper wires: Wire A is long/thin (small $A$, large $L$), Wire B is short/thick (large $A$, small $L$).  \n- Step 3: Show $k$ varies:  \n  $$\n  k_A = \\frac{EA}{L/2},\\quad k_B = \\frac{2EA}{L} \\quad \\text{for } A,B \\text{ of same volume}.\n  $$\n- Step 4: Stress and strain remove geometry:  \n  $$\n  \\sigma = \\frac{F}{A},\\quad \\varepsilon = \\frac{x}{L},\\quad E = \\frac{\\sigma}{\\varepsilon} = \\frac{FL}{Ax}.\n  $$\n- Step 5: Explain independence from $A$ and $L$: Since $\\sigma$ and $\\varepsilon$ normalize out sample dimensions, $E$ describes the material's inherent stiffness.  \n+ Counterexample: Steel beam vs guitar string — same $E$ but different $k$.  \n+ Visual intuition: Folding the geometry back into $k = EA/L$ explains why longer springs are softer.\n\n**Takeaway:** $E$ is geometry-independent — it's the intrinsic stiffness of the material, not the object.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "What happens to engineering stress beyond the elastic limit, and why is this critical for structural engineering? (4 steps)", "answer": "- Step 1: Define engineering stress: $\\sigma = F/A_0$, where $A_0$ is original cross-sectional area.\n- Step 2: Describe geometric vs material failure: Beyond yield point, plastic deformation occurs without significant stress increase.\n- Step 3: Explain stress drop post-UTS: In engineering stress, $A_0$ stays fixed while the real area shrinks (necking), so $\\sigma_{\\text{engineer}} = F/A_0$ decreases even though true stress $\\sigma_{\\text{true}} = F/A_{\\text{actual}}$ keeps rising.  \n- Step 4: Link to safety: Engineering structures must avoid UTS to prevent catastrophic failure. Steel in buildings must stay within elastic region.  \n+ Contrast: True stress curves never decrease — this is an artifact of using fixed $A_0$.  \n+ Real-world impact: The downturn on the curve is misleading — material is *not* weakening, it's thinning.\n\n**Takeaway:** Engineering stress is a design constraint; true stress reveals the material’s full strength.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "A rubber band is stretched to 2.5× its original length. Explain why the stress-strain graph is nonlinear, yet stores elastic energy. (3 steps)", "answer": "- Step 1: Polymers align at high strains. Unlike metals, rubber’s long-chain molecules unwind during extension → non-Hookean behavior.  \n- Step 2: Elastic but nonlinear: Even without proportionality, the material springs back — energy is *storedd* during loading.  \n- Step 3: Area under graph still equals energy per unit volume:  \n  $$\n  u = \\int_0^\\varepsilon \\sigma(\\varepsilon')\\,d\\varepsilon'.\n  $$\n+ Misconception: \"Only Hookean materials store elastic energy\" — incorrect!  \n+ Visual intuition: Rubber’s S-shaped curve shows stiffness increase with strain due to molecular straightening.\n\n**Takeaway:** Elastic energy exists if the material returns to original length, regardless of linear stress-strain relationship.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why must the area under a rubber stress-strain curve be interpreted differently than for metals? (3 steps)", "answer": "- Step 1: Rubber exhibits hysteresis: loading/unloading paths differ. Area between them is energy lost to heat.  \n- Step 2: Energy return ≠ full loading area. For a tire, the returned elastic energy is the unloading area; the loop represents dissipated energy.  \n- Step 3: Practical benefit: Hysteresis damping is why rubber is used in vibration mounts and shock absorbers.  \n+ Edge case: Perfect elasticity (no loop) is rare; nearly all polymeric materials have some hysteresis.  \n\n**Takeaway:** The energy return ratio is $(\\text{unloading area})/(\\text{loading area})$; the difference warms the material.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "Compare stress-strain graph shapes for brittle (ceramic), ductile (steel), and polymeric (rubber) materials. (3 steps)", "answer": "- Step 1: Identify regions on graph. Brittle → short elastic line ending in fracture; ductile → long curved plastic region with necking; polymeric → nonlinear elasticity.\n- Step 2: Toughness intuition: Area under graph up to fracture. Ceramic has high $\\sigma$ but low $\\varepsilon$ → low toughness. Steel has moderate $\\sigma$ but long $\\varepsilon$ → high toughness.  \n- Step 3: Safety implications:  \n  + Brittle: sudden failure with no warning.  \n  + Ductile: visible deformation before collapse.  \n  + Polymeric: energy dissipation via hysteresis (safety vs vibration).  \n+ Common misconception: \"Strong=stiff=robust\" — false. High $E$ (stiff) ≠ high $\\text{UTS}$ (strong) ≠ high toughness.\n\n**Takeaway:** The graph shape predicts failure type, ductility, and energy absorption capability.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": true}, {"question": "Explain why micrometers and Vernier calipers are necessary for small dimension measurements. (3 steps)", "answer": "- Step 1: Resolution matters. A 20 cm ruler has ±1 mm, leading to ±0.5% error for 20 mm readings. A micrometer has ±0.01 mm → ±0.05% error.  \n- Step 2: Zero error correction: If a micrometer reads +0.02 mm when closed, subtract 0.02 mm from observed readings.  \n- Step 3: Practical importance: A 0.1 mm error in radius translates to 0.3 mm error in volume ($V \\propto r^3$) and 0.1 mm in spring extension becomes 0.17% vs 17% in stress.  \n+ Common mistake: Using ruler for wire diameter — area error of 4× if $d$ is off by 10%.  \n\n**Takeaway:** Precise measuring instruments mitigate volume/area errors that amplify in physics formulas (via exponents).", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How does the spring constant change when a spring is (a) halved in length? (b) halved in diameter? (c) cut into three equal pieces and connected in series? (3 steps for each sub-question)", "answer": "- Step 1 (a): Treat length as in parallel: $k \\propto 1/L$, so halving length → $k$ doubles.\n- Step 2 (b): Cross-sectional area scales as $r^2$. Halving diameter → quarter area → quarter stiffness.\n- Step 3 (c): Series springs → reciprocal rule. Three pieces in series: $k_{\\text{series}} = k/3$. Each spring has same $k = EA/L$, so total extension adds, requiring less force — softer system.\n+ Contrast: Cutting and arranging in parallel makes $k$ triple — stiffer overall.\n+ Intuition: Thicker cables (larger $A$) and shorter cables (small $L$) are inherently stiffer.\n\n**Takeaway:** Spring constant $k$ is object-dependent; geometry (length, cross-section) controls how much it deforms.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}, {"question": "A brass spring is stretched beyond the elastic limit. Can it still return to its original shape? Justify using microstructure. (3 steps)", "answer": "- Step 1: Define elastic limit: Maximum load at which no permanent deformation exists.\n- Step 2: Describe atomic-level changes:  \n  + Below limit → atoms displace temporarily, bonds stretch → spring back.  \n  + Beyond limit → slip planes move in metals, atomic bonds break and re-form in new positions → plasticity.  \n- Step 3: Stress-strain curve: After elastic limit, the unloading line is parallel to the original elastic region, intercepting at positive strain (permanent set).  \n+ Misconception: \"Plastic region is always linear\" — it’s often curved with work hardening.  \n+ Real-world consequence: Plastic deformation is irreversible and weakens structural integrity.\n\n**Takeaway:** Elastic vs plastic behavior is about the reversibility of atomic displacements.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Explain why the yield point on a stress-strain curve isn’t just a point — why does it sometimes appear as a short horizontal line? (2 steps)", "answer": "- Step 1: Material microstructure explanation: Dislocations in metals begin to move easily when stress reaches yield point, allowing large strain with little stress increase.  \n- Step 2: Engineering impact: This sudden elongation (yielding) is a critical design consideration to prevent unexpected deformation.  \n+ Edge case: Some materials (e.g., carbon fiber) lack a clear yield point — stress increases continuously until fracture.\n\n**Takeaway:** Yielding is the onset of permanent atomic rearrangement, not just bond stretching.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": true}, {"question": "If two identical springs are cut in half and connected in parallel, what is the effective stiffness compared to the original single spring? (3 steps)", "answer": "- Step 1: Cutting doubles each spring’s $k$. If $k_{\\text{original}} = k$, each half has $k_{\\text{half}} = 2k$.  \n- Step 2: Parallel rule says add constants: $k_{\\text{parallel}} = 2k + 2k = 4k$.  \n- Step 3: Contrast with series: Cutting the spring in half and placing them in parallel increases stiffness dramatically. A 59 N/m spring becomes 236 N/m.  \n+ Mental test: 4k stiffness means it takes 4× the force to extend the same amount.\n\n**Takeaway:** Cutting and reconfiguring springs can engineer much stiffer systems — crucial for vehicle suspension design.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}], "count": 13}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is the correct procedure for reading a micrometer screw gauge that shows 10.5 mm on the main scale and has the 37th thimble division aligned with the main scale line? (2 steps)", "answer": "- Step 1: Read the main scale. The sleeve shows 10.5 mm (the last full mm mark plus the visible 0.5 mm mark).\n- Step 2: Read the thimble scale. The 37th division × 0.01 mm = 0.37 mm. Add them: 10.5 mm + 0.37 mm = 10.87 mm.\n\nThe half-millimeter marks on the sleeve are the most common source of error in micrometer reading. Always check whether the 0.5 mm mark is visible past the last full millimeter.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A Vernier caliper has a resolution of 0.05 mm. The Vernier zero lies just past the 21 mm mark on the main scale, and the 6th division on the Vernier scale aligns with a main scale line. What is the reading? (2 steps)", "answer": "- Step 1: Read the main scale. The last full millimeter before the Vernier zero is 21 mm.\n- Step 2: Read the Vernier scale. The 6th division × 0.05 mm = 0.30 mm. Add: 21 mm + 0.30 mm = 21.30 mm.\n\nThe key insight is that you're looking for the ONE division on the Vernier scale that perfectly matches ANY line on the main scale — not guessing which might be closest.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Why is density considered an intensive property, while mass and volume are extensive properties? Explain using a copper block example.", "answer": "- Step 1: Intensive properties do NOT depend on the amount of substance; extensive properties DO scale with quantity.\n- Step 2: Take a copper block with density ρ = 8900 kg/m³. Cut it in half: each half has half the mass AND half the volume.\n- Step 3: Calculate density of half: ρ_half = (m/2)/(V/2) = m/V = ρ. The value unchanged.\n\nIntensive properties emerge from the ratio of two extensive properties, canceling out the amount. This is the same structural idea behind Young's modulus.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": true}, {"question": "A bottle contains 1 litre of whiskey with mass 0.915 kg. Calculate its density in kg/m³, showing the unit conversion steps. (3 steps)", "answer": "- Step 1: Identify given values. Volume = 1 litre, Mass = 0.915 kg. Remember: 1000 litres = 1 m³.\n- Step 2: Convert volume to SI units. 1 litre = 1 × 10⁻³ m³.\n- Step 3: Apply density formula. ρ = m/V = 0.915 kg / (1 × 10⁻³ m³) = 915 kg/m³.\n\nThe trap is forgetting that litres to cubic metres involves 10⁻³, not 10⁻⁶. (10⁻³ m)³ = 10⁻⁹ m³, but since we're converting the whole litre (not cubing 1 litre), we use the direct conversion.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A spherical hockey ball has radius 36 mm and mass 160 g. Calculate its density in (a) g/cm³ and (b) kg/m³. (4 steps)", "answer": "- Step 1: Convert to consistent units. r = 36 mm = 3.6 cm = 0.036 m. m = 160 g = 0.160 kg.\n- Step 2: Calculate volume. V = (4/3)πr³. In cm³: V = (4/3)π(3.6)³ ≈ 195.4 cm³.\n- Step 3: Part (a): ρ = 160 g / 195.4 cm³ = 0.819 g/cm³.\n- Step 4: Part (b): In m³: V = (4/3)π(0.036)³ = 1.954 × 10⁻⁴ m³. ρ = 0.160 kg / 1.954 × 10⁻⁴ m³ ≈ 819 kg/m³.\n\nNotice: 0.819 g/cm³ × 1000 = 819 kg/m³. The conversion factor of 1000 between these units should be checked: (10⁻³ kg)/(10⁻⁶ m³) = 10³ kg/m³ per g/cm³.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Brass is an alloy of 70% copper and 30% zinc by volume. Given densities: copper = 8.9 × 10³ kg/m³, zinc = 7.1 × 10³ kg/m³, calculate the density of brass. Why can't you just average the densities? (3 steps)", "answer": "- Step 1: This is NOT a simple average. You must calculate total mass over total volume because densities combine based on volume fractions.\n- Step 2: For 1 m³ of brass: V_Cu = 0.70 m³, V_Zn = 0.30 m³. Mass = (8.9 × 10³ × 0.70) + (7.1 × 10³ × 0.30) = 6230 + 2130 = 8360 kg.\n- Step 3: ρ_brass = 8360 kg / 1 m³ = 8360 kg/m³.\n\nA simple mean would give (8.9 + 7.1)/2 × 10³ = 8000 kg/m³ — a 4% error. The key phrase: \"Go back to total mass over total volume.\"", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": true}, {"question": "State Hooke's Law and explain what the spring constant k actually measures, including its units.", "answer": "Hooke's Law states that the extension of a sample is directly proportional to the applied force, provided the limit of proportionality is not exceeded. Mathematically: F = kx.\n\nThe spring constant k measures the stiffness of the specific object. It tells you how many newtons of force are needed to produce one metre of extension. Unit: N m⁻¹.\n\nImportant distinction: k describes a particular object (a specific wire or spring), while Young's modulus E describes the material itself. A longer wire of the same material has a smaller k.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "A spring of original length 300 mm is stretched to 385 mm by a 5.0 N weight. Calculate the spring constant k. (3 steps)", "answer": "- Step 1: Calculate extension. x = 385 mm - 300 mm = 85 mm = 85 × 10⁻³ m = 0.085 m.\n- Step 2: Apply Hooke's Law. k = F/x\n- Step 3: Substitute. k = 5.0 N / 0.085 m = 58.8 N/m ≈ 59 N/m\n\nCommon mistake: using 385 mm directly as extension instead of subtracting the original length. The extension is the CHANGE in length, not the final length.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Two identical springs, each with spring constant k = 240 N/m, are connected (a) in series and (b) in parallel. What is the effective spring constant in each case? Explain why. (2 steps)", "answer": "- Step 1: Series combination: 1/k_eff = 1/k + 1/k = 2/k. Therefore k_eff = k/2 = 120 N/m. The same force stretches each spring, so total extension doubles → system is \"softer.\"\n- Step 2: Parallel combination: k_eff = k + k = 2k = 480 N/m. The force is shared between springs, each extending less → system is \"stiffer.\"\n\nThe analogy to resistors helps: series springs behave like parallel resistors (k decreases); parallel springs behave like series resistors (k increases).", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": true}, {"question": "Two DIFFERENT springs with constants 50 N/m and 75 N/m are connected in series. A 9.0 N load is attached. What is the stretched length of EACH spring if each has natural length 120 mm? (4 steps)", "answer": "- Step 1: In series, the SAME force passes through each spring.\n- Step 2: Calculate extension of first spring: x₁ = F/k₁ = 9.0/50 = 0.18 m = 180 mm\n- Step 3: Calculate extension of second spring: x₂ = F/k₂ = 9.0/75 = 0.12 m = 120 mm\n- Step 4: Stretched lengths: L₁ = 120 + 180 = 300 mm; L₂ = 120 + 120 = 240 mm. Total = 540 mm.\n\nCommon trap: Using the effective k (30 N/m) to find individual spring extensions — that gives the TOTAL extension, not each spring's. The softer spring stretches MORE.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Define tensile stress and tensile strain, giving formulas and units. Why is strain dimensionless?", "answer": "- Tensile stress (σ): Force per unit cross-sectional area. σ = F/A. Unit: Pascal (Pa) = N/m².\n\n- Tensile strain (ε): Extension divided by original length. ε = ΔL/L₀. No unit — it's a ratio of length to length.\n\nStrain is dimensionless because it's the fractional change in length. Whether you measure in metres or millimetres, the ratio cancels the units. This is why stress-strain graphs have no unit on the x-axis.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A steel cable has diameter 2.3 mm and length 28 m. It supports a weight of 3200 N. Young's modulus for steel is 2.1 × 10¹¹ Pa. Calculate the extension. (4 steps)", "answer": "- Step 1: Convert diameter to radius. d = 2.3 mm = 2.3 × 10⁻³ m, so r = 1.15 × 10⁻³ m.\n- Step 2: Calculate cross-sectional area. A = πr² = π(1.15 × 10⁻³)² = 4.15 × 10⁻⁶ m².\n- Step 3: Rearrange Young's modulus formula: ΔL = FL/(AE)\n- Step 4: Substitute: ΔL = (3200 × 28) / (4.15 × 10⁻⁶ × 2.1 × 10¹¹) = 0.103 m = 10.3 cm\n\nCritical error to avoid: Using diameter directly as radius (gives area 4× too large, extension 4× too small). Always halve the diameter first.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Derive the relationship between the spring constant k of a wire and Young's modulus E of the material, showing why Young's modulus is independent of the sample dimensions. (3 steps)", "answer": "- Step 1: Start with Hooke's Law: F = kx, and Young's modulus: E = FL/(AΔL)\n- Step 2: From Young's modulus: F = EA(ΔL)/L. Compare with F = kx = kΔL\n- Step 3: Therefore kΔL = EA(ΔL)/L, giving k = EA/L\n\nThis shows k depends on geometry (area A, length L), while E depends only on the material. Double the length → k halves (longer wire stretches more easily). Double the area → k doubles (thicker wire is stiffer). When geometry factors cancel in σ/ε, only E remains.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": true}, {"question": "Explain the difference between the limit of proportionality, the elastic limit, and the yield point on a stress-strain graph. (3 steps)", "answer": "- Step 1 (Limit of Proportionality): The last point where stress is directly proportional to strain. The graph stops being a straight line. Hooke's Law no longer applies beyond this point.\n- Step 2 (Elastic Limit): The maximum stress from which the material returns to its original length when unloaded. Beyond this, permanent (plastic) deformation occurs.\n- Step 3 (Yield Point): The stress at which the material begins to extend rapidly with little or no increase in load. For ductile metals, atoms slip past each other permanently.\n\nThe test question distinction: proportionality is about the line being straight; elastic limit is about whether it springs back; yield is about it suddenly giving way.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "A steel rail has cross-sectional area 7.5 × 10⁻³ m² and Young's modulus 2.0 × 10¹¹ Pa. A pre-strain of 3.0 × 10⁻⁴ is applied. Calculate the tensile force required. (3 steps)", "answer": "- Step 1: Recall that E = Stress/Strain, so Stress = E × Strain\n- Step 2: σ = (2.0 × 10¹¹ Pa) × (3.0 × 10⁻⁴) = 6.0 × 10⁷ Pa\n- Step 3: Use σ = F/A, so F = σA = (6.0 × 10⁷) × (7.5 × 10⁻³) = 4.5 × 10⁴ N = 45 kN\n\nThis is a direct F = EAε calculation. The pre-strain is simply the strain value in this context.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Calculate the elastic strain energy stored in the 45 m rail from Q15 when pre-strained. (3 steps)", "answer": "- Step 1: First find the extension. Strain ε = ΔL/L, so ΔL = εL = (3.0 × 10⁻⁴) × 45 = 0.0135 m\n- Step 2: The force from Q15 is F = 45,000 N\n- Step 3: Energy = ½FΔL = 0.5 × 45,000 × 0.0135 = 303.75 J ≈ 304 J\n\nThe factor of ½ is the most commonly forgotten element. Energy is the AREA under the force-extension graph (a triangle), not F×ΔL (a rectangle). The average force during stretching is half the final force.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Sketch the stress-strain curve for a ductile metal (like mild steel) and label: linear region, limit of proportionality, yield point, ultimate tensile stress (UTS), and fracture point. (Conceptual)", "answer": "The curve starts as a straight line from the origin (linear elastic region, gradient = E). It then bends (limit of proportionality passed). A small yield plateau appears where strain increases with little stress increase (yield point). The curve rises to a maximum (UTS), then falls as necking occurs, ending at fracture.\n\nKey distinctions:\n- Linear region: Hooke's Law applies, E = σ/ε\n- After UTS: Engineering stress drops because it uses original (larger) area while actual load drops due to necking\n- Total area under curve up to fracture = toughness (energy absorbed)", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Explain why brittle materials (like glass) can be strong but not tough, while ductile materials (like steel) can be tough but not as stiff. Use the stress-strain curve concepts.", "answer": "- Brittle materials: Stress-strain curve is a steep straight line with no curve. They have high UTS (strong) but fracture at small strains with little warning. The area under the curve is small → low toughness. Example: glass has high strength but breaks suddenly.\n\n- Ductile materials: Curve has long plastic region after yield. They absorb much energy before breaking (high toughness), giving visible \"necking\" and warning. Area under curve is large.\n\n- Stiffness (steep gradient = high E) is independent of strength (height of UTS). A material can be stiff AND brittle (glass), or less stiff AND tough (mild steel).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": true}, {"question": "A rubber band shows elastic hysteresis: the loading curve and unloading curve do not coincide. What does this mean, and what happens to the energy? (2 steps)", "answer": "- Step 1: Hysteresis means the material follows different paths when loading and unloading. The work done stretching is greater than the work returned.\n- Step 2: The area between the two curves represents energy dissipated as HEAT in the rubber. This is why a stretched rubber band released repeatedly feels warm, and why tyres heat up during driving.\n\nThis is useful for vibration damping (car suspensions) but wasteful in rubber belts. The deformation is elastic (returns to original shape) but energy is lost each cycle.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": true}, {"question": "Describe how to measure the density of an irregular solid (like a stone) using a Eureka can, including how to improve accuracy. (3 steps)", "answer": "- Step 1: Method: Measure stone's mass with balance. Fill Eureka can to spout, let settle. Place measuring cylinder under spout. Lower stone into Eureka can (submerged, no touching). Collect displaced water; its volume equals stone's volume. ρ = m/V.\n- Step 2: To improve accuracy: Use a thin string to lower gently (prevent splashing). Repeat multiple times and average. Use a more precise measuring cylinder. Ensure stone is dry before weighing.\n- Step 3: Systematic errors to avoid: Water sticking to the stone or spout (underestimates volume). Air bubbles trapped on stone (overestimates volume). Parallax error when reading measuring cylinder (read at eye level).", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Describe the practical setup for determining Young's modulus using Searle's apparatus. What specific features compensate for experimental errors? (3 steps)", "answer": "- Step 1: Setup: Two wires (test and control) hang from rigid support. Test wire has slotted masses. A vernier scale attached to test wire, main scale on control wire. Spirit level ensures horizontal alignment.\n- Step 2: The control wire compensates for: any yielding of the support, and thermal expansion due to temperature changes. Only the DIFFERENCE in extension is measured.\n- Step 3: Accuracy improvements: Use micrometer for diameter (not ruler). Take multiple diameter readings and average. Use vernier for extension. Plot graph of F vs ΔL; gradient gives k, then E = kL/A.\n\nSafety: Safety glasses (wire may snap), sand tray (falling masses).", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A copper wire has original length 1.52 m and stretches by 3.2 mm under tension. From this information alone, can you calculate the stress? Explain what is missing. (2 steps)", "answer": "- Step 1: You can calculate strain: ε = ΔL/L₀ = 0.0032/1.52 = 2.1 × 10⁻³\n- Step 2: You CANNOT calculate stress because stress = F/A requires both the force applied AND the cross-sectional area. Neither is given. Alternatively, σ = Eε requires Young's modulus, which is also not provided.\n\nThis tests the skill of auditing what a question actually provides. Attempting to force a formula with missing data loses marks; stating what's missing earns them.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A steel wire of length 2.5 m and diameter 0.80 mm is loaded within its elastic limit. At the working point, stress = 3.6 × 10⁸ Pa and strain = 1.8 × 10⁻³. Calculate (a) elastic strain energy per unit volume, and (b) total elastic strain energy stored. (4 steps)", "answer": "- Step 1: Energy per unit volume (u) = ½σε = 0.5 × (3.6 × 10⁸) × (1.8 × 10⁻³) = 3.24 × 10⁵ J/m³\n- Step 2: Calculate cross-sectional area. d = 0.80 mm = 8.0 × 10⁻⁴ m. A = π(d/2)² = π(4.0 × 10⁻⁴)² = 5.03 × 10⁻⁷ m²\n- Step 3: Calculate volume. V = A × L = (5.03 × 10⁻⁷) × 2.5 = 1.26 × 10⁻⁶ m³\n- Step 4: Total energy = uV = (3.24 × 10⁵) × (1.26 × 10⁻⁶) = 0.407 J\n\nCross-check: F = σA = 181 N, ΔL = εL = 4.5 × 10⁻³ m. ½FΔL = 0.5 × 181 × 0.0045 = 0.407 J. Same answer, confirming consistency.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A micrometer reading shows the 4.5 mm mark and the thimble reads 38 divisions. (a) What is the diameter? (b) Calculate the cross-sectional area. (c) Estimate percentage uncertainty in area from resolution 0.01 mm. (3 steps)", "answer": "- Step 1: (a) Main scale: 4.5 mm (includes visible 0.5 mm mark). Thimble: 38 × 0.01 = 0.38 mm. Total: 4.88 mm = 4.88 × 10⁻³ m\n- Step 2: (b) A = π(d/2)² = π(2.44 × 10⁻³)² = 1.87 × 10⁻⁵ m²\n- Step 3: (c) Resolution uncertainty in d = 0.01 mm / 4.88 mm = 0.205%. Since area ∝ d², percentage uncertainty DOUBLES: 0.41%\n\nThe power rule: when a quantity is raised to a power (here d²), its percentage uncertainty multiplies by that power. This is why small measurement errors have larger effects on calculated quantities.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": true}, {"question": "A steel rail is laid at 8°C with pre-strain 3.0 × 10⁻⁴. The coefficient of thermal expansion is 2.5 × 10⁻⁵ per K. At what temperature will the rail become unstressed? Explain why engineers don't use the highest observed temperature for pre-straining. (3 steps)", "answer": "- Step 1: Calculate temperature rise needed to eliminate strain. ΔT = strain / (strain per K) = (3.0 × 10⁻⁴) / (2.5 × 10⁻⁵) = 12 K\n- Step 2: Final temperature = 8°C + 12°C = 20°C\n- Step 3: Engineers DON'T use highest temperature because: if rails are unstressed at the highest temperature, they will be in tension when it gets cold. This tensile stress could cause rails to snap. Pre-straining balances against the coldest expected temperature to avoid both buckling (hot) and snapping (cold).", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "What is the difference between accuracy and precision in experimental measurement? Give an example.", "answer": "- Accuracy: How close a measurement is to the TRUE value. A stopped clock is accurate twice a day but not precise.\n- Precision: How close repeated measurements are to EACH OTHER. The stopped clock is precise (always same reading) but not accurate.\n\nExample: Measuring a known 10.00 cm block. Three measurements: 10.05, 10.06, 10.05 cm. These are precise (close together) but not accurate (systematically high). Taking many readings and averaging reduces random error, improving precision; calibration reduces systematic error, improving accuracy.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "When loading a spring beyond its elastic limit and then unloading, what does the force-extension graph look like? What does the intercept on the extension axis represent? (2 steps)", "answer": "- Step 1: The unloading line is a straight line PARALLEL to the original elastic line, but it meets the extension axis at a NON-ZERO value.\n- Step 2: The intercept represents the PERMANENT (plastic) extension — the amount the spring stays stretched after removing the load. The horizontal distance between the unloading line and the original line is the recovered (elastic) extension.\n\nThis is the operational test for plastic deformation: if it returns to the origin → elastic only. If it stops short → plastic deformation has occurred.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "A 12 N weight is hung on a spring with constant 8500 N/m. The spring's relaxed length is 5.0 cm. Calculate (a) the extension and (b) the new length. (2 steps)", "answer": "- Step 1: Extension x = F/k = 12/8500 = 1.41 × 10⁻³ m = 0.141 cm\n- Step 2: New length = original + extension = 5.0 cm + 0.141 cm = 5.141 cm\n\nKey point: The question asks for new length, not just extension. These are different quantities. Watch for whether the question wants x or L_new.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A horizontal plank supported at both ends bends 4.0 mm when a 55 kg child stands in the middle. Calculate the stiffness constant of the plank. (2 steps)", "answer": "- Step 1: Convert: mass → weight force. F = mg = 55 × 9.81 = 539.55 N. Extension x = 4.0 mm = 4.0 × 10⁻³ m.\n- Step 2: Stiffness k = F/x = 539.55 / 0.004 = 1.35 × 10⁵ N/m\n\nThis is treating the plank as a spring in the sense of F = kx, though in reality the distribution of forces and moments is more complex.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Explain why the density of air in a balloon (calculated as ~1.5 kg/m³ from the problem) differs from standard air density (~1.2 kg/m³). What does this tell us about the air inside? (2 steps)", "answer": "- Step 1: Standard air density is measured at atmospheric pressure. A balloon is inflated by blowing air into it, creating pressure HIGHER than atmospheric.\n- Step 2: Higher pressure means more air molecules are packed into the same volume. Since density = mass/volume, denser air. The balloon air is compressed.\n\nThis applies to any pressurized gas: higher pressure → higher density (at constant temperature). This is why balloon animals feel firmer than you'd expect from the amount of air blown in.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}], "count": 30}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A measurement is taken as $5.0 \\pm 0.1$. What is the percentage uncertainty? (1 step)", "answer": "- Step 1: Percentage uncertainty is calculated as $(\\text{absolute uncertainty} / \\text{measured value}) \\times 100\\%$.\n- Calculation: $(0.1 / 5.0) \\times 100\\% = 2\\%$.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Explain the difference between *accuracy* and *precision* in experimental physics. (2 steps)", "answer": "- Step 1: **Accuracy** refers to how close a measured value is to the true or accepted value. It is a measure of correctness.\n- Step 2: **Precision** (or repeatability) refers to how close repeated measurements are to each other. It is a measure of consistency, regardless of whether they are close to the true value.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Describe the step-by-step process to read a Micrometer Screw Gauge that reads 10.87 mm. (3 steps)", "answer": "- Step 1: Read the **Main Scale (Sleeve)**. Look for the last full millimeter mark visible (10 mm) and check if the 0.5 mm mark is visible after it. Here it is visible, so the main scale reads 10.5 mm.\n- Step 2: Read the **Thimble Scale**. Identify which division on the thimble aligns exactly with the horizontal line on the sleeve. If the 37th division aligns: $37 \\times 0.01 \\, \\text{mm} = 0.37 \\, \\text{mm}$.\n- Step 3: Add them together. $10.5 \\, \\text{mm} + 0.37 \\, \\text{mm} = 10.87 \\, \\text{mm}$.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "A Vernier Caliper has a positive zero error. The jaws are closed but the Vernier scale reads 0.05 mm. When measuring an object, the reading is 24.80 mm. What is the actual measurement? (2 steps)", "answer": "- Step 1: Positive zero error means the instrument reads *too high* when jaws are closed.\n- Step 2: Actual Reading = Observed Reading - Zero Error. Therefore, Actual = $24.80 \\, \\text{mm} - 0.05 \\, \\text{mm} = 24.75 \\, \\text{mm}$.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Why is density considered an *intensive* property, whereas mass and volume are *extensive*? (2 steps)", "answer": "- Step 1: Extensive properties (like mass and volume) depend on the amount of substance present. If you double the sample, mass and volume double.\n- Step 2: Intensive properties (like density) do *not* depend on the amount. Density is the ratio of mass to volume ($\\rho = m/V$). Because both $m$ and $V$ scale by the same factor when you change the sample size, the ratio remains constant.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A brass alloy is made of 70% copper and 30% zinc by volume. Using $\\rho_{Cu} = 8.9 \\times 10^3 \\, \\text{kg/m}^3$ and $\\rho_{Zn} = 7.1 \\times 10^3 \\, \\text{kg/m}^3$, calculate the density of the alloy. (3 steps)", "answer": "- Step 1: For a mixture by volume, the total mass is the sum of the masses of the components. $m_{tot} = m_{Cu} + m_{Zn}$.\n- Step 2: Mass = Density $\\times$ Volume. Let total volume $V = 1 \\, \\text{m}^3$.\n  $m_{Cu} = 8.9 \\times 10^3 \\times 0.7 = 6230 \\, \\text{kg}$\n  $m_{Zn} = 7.1 \\times 10^3 \\times 0.3 = 2130 \\, \\text{kg}$\n- Step 3: Total mass = $8360 \\, \\text{kg}$. Since total volume is $1 \\, \\text{m}^3$, density = $8360 \\, \\text{kg/m}^3$.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Describe a method to determine the density of an irregular solid object (like a stone) using a Eureka can. (4 steps)", "answer": "- Step 1: **Measure Mass**. Use a mass balance to measure the dry mass ($m$) of the stone.\n- Step 2: **Fill Eureka Can**. Fill the displacement can with water until it overflows from the spout. allow time for dripping to stop.\n- Step 3: **Collect Displaced Water**. Place a dry measuring cylinder under the spout. Gently submerge the stone (tied with string) into the can. Collect all water that flows out.\n- Step 4: **Calculate Volume & Density**. Read the volume of water in the cylinder ($V$). Use $\\rho = m/V$.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "State Hooke's Law and define the \"Limit of Proportionality\". (2 steps)", "answer": "- Step 1: **Hooke's Law**: The extension ($x$) of a spring is directly proportional to the applied force ($F$), provided the elastic limit is not exceeded. $F = kx$.\n- Step 2: **Limit of Proportionality**: This is the point on the force-extension graph beyond which the graph stops being a straight line. Up to this point, $F \\propto x$ perfectly.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A force-extension graph is a straight line passing through the origin. How do you determine the Spring Constant ($k$) from this graph? (1 step)", "answer": "- Step 1: The Spring Constant $k$ is the gradient of the force-extension graph.\n$$k = \\frac{\\Delta F}{\\Delta x} = \\frac{\\text{Change in Force}}{\\text{Change in Extension}}$$\nIt has units $\\text{N m}^{-1}$.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Two identical springs are connected in series and pulled by a force $F$. Compare the total extension to the extension of a single spring under the same force. (2 steps)", "answer": "- Step 1: In **series**, the same force $F$ passes through each spring. Each spring extends by the same amount as a single spring would under force $F$.\n- Step 2: Therefore, the total extension of the series combination is **double** the extension of a single spring (for two identical springs).", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Two identical springs are connected in parallel and pulled by a force $F$. Compare the effective spring constant ($k_{eff}$) to a single spring ($k$). (2 steps)", "answer": "- Step 1: In **parallel**, the force $F$ is shared between the springs. Each spring carries only half the force ($F/2$).\n- Step 2: Since extension is shared, the system is stiffer. The effective spring constant doubles: $k_{eff} = k_1 + k_2 = 2k$.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Derive the formula for Elastic Strain Energy ($E_e$) stored in a spring obeying Hooke's Law. (3 steps)", "answer": "- Step 1: Work done (Energy) = Area under the Force-Extension graph.\n- Step 2: For a linear (Hookean) spring, the graph is a straight line from origin to point $(x, F)$. The area under the line is a triangle with base $x$ and height $F$.\n- Step 3: Area $= \\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2} Fx$. Substituting $F=kx$ gives $E_e = \\frac{1}{2} kx^2$.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Define *Tensile Stress* and *Tensile Strain*, including their symbols and units. (2 steps)", "answer": "- Step 1: **Stress ($\\sigma$)** is the force per unit cross-sectional area. $\\sigma = F/A$. Unit: Pascal (Pa) or $\\text{N m}^{-2}$.\n- Step 2: **Strain ($\\varepsilon$)** is the extension per unit original length. $\\varepsilon = \\Delta L / L_0$. It is dimensionless (no units).", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Explain why Young's Modulus ($E$) is considered a material property, while the Spring Constant ($k$) is an object property. (2 steps)", "answer": "- Step 1: $k$ depends on the dimensions of the object (length and area). A longer wire or thinner wire has a smaller $k$.\n- Step 2: Young's Modulus is defined as $E = \\sigma / \\varepsilon = (F/A) / (\\Delta L / L)$. The $A$ and $L$ cancel out. $E$ depends only on the type of material (e.g., steel vs copper), not the dimensions of the sample.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A steel cable has a diameter of 2.0 mm and length 2.0 m. It is pulled with a force of 400 N. Young's Modulus for steel is $2.0 \\times 10^{11} \\, \\text{Pa}$. Calculate the extension. (3 steps)", "answer": "- Step 1: Calculate Cross-sectional Area. Diameter $d = 2.0 \\, \\text{mm} = 2.0 \\times 10^{-3} \\, \\text{m}$. Radius $r = 1.0 \\times 10^{-3} \\, \\text{m}$.\n$$A = \\pi r^2 = \\pi (1.0 \\times 10^{-3})^2 = 3.14 \\times 10^{-6} \\, \\text{m}^2$$\n- Step 2: Use the rearranged Young's Modulus formula: $\\Delta L = \\frac{F L}{A E}$\n- Step 3: Substitute:\n$$\\Delta L = \\frac{400 \\times 2.0}{(3.14 \\times 10^{-6}) \\times (2.0 \\times 10^{11})} = \\frac{800}{6.28 \\times 10^5} \\approx 1.3 \\times 10^{-3} \\, \\text{m} = 1.3 \\, \\text{mm}$$", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "On a stress-strain curve for a ductile metal, describe what is happening at the \"Yield Point\". (2 steps)", "answer": "- Step 1: The Yield Point is the stress at which the material begins to deform plastically.\n- Step 2: At this point, the material extends significantly with little or no increase in load. The atomic bonds are breaking and reforming in new positions permanently. The graph may show a slight drop or a horizontal \"step\".", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "What is the difference between the **Limit of Proportionality** and the **Elastic Limit**? (2 steps)", "answer": "- Step 1: **Limit of Proportionality**: The point where the graph stops being a straight line. Hooke's Law ($F \\propto x$) no longer applies.\n- Step 2: **Elastic Limit**: The maximum stress after which the material will not return to its original length when the load is removed. Beyond this, deformation is plastic (permanent).", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Explain the shape of a stress-strain graph for a **brittle** material (like glass) compared to a **ductile** material (like steel). (2 steps)", "answer": "- Step 1: **Brittle**: The graph is a straight line (linear) almost to the point of fracture. There is very little or no plastic (curved) region. It breaks suddenly.\n- Step 2: **Ductile**: The graph has a linear region, then curves (yields) into a long plastic region where it stretches significantly (necking) before breaking.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": true}, {"question": "A rubber band shows \"hysteresis\" when stretched and released. What does this mean, and what happens to the energy represented by the loop area? (2 steps)", "answer": "- Step 1: Hysteresis means the loading curve (stretching) and the unloading curve (shrinking) do not coincide. They form a closed loop.\n- Step 2: The area inside the loop represents energy that is **dissipated as heat** during the stretching cycle. The material does not return all the input energy as potential energy; some is lost.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": true}, {"question": "A wire is stretched beyond its elastic limit and then unloading is started. Will the unloading line be parallel to the original linear section of the graph? (1 step)", "answer": "- Step 1: Yes. When unloading from a plastic region, the material behaves elastically (reversibly) relative to its new, deformed state. The unloading line is parallel to the original elastic line, but it intersects the x-axis at a positive (permanent) strain value.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A student calculates the cross-sectional area of a wire as $A = \\pi d^2$, using the diameter directly. By what factor is their area calculation incorrect? (1 step)", "answer": "- Step 1: The correct formula is $A = \\pi (d/2)^2 = \\pi d^2 / 4$. Using $\\pi d^2$ makes the area **4 times too large**. This error propagates to stress (4x too small) and extension (4x too large).", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Define \"Ultimate Tensile Stress\" (UTS). (1 step)", "answer": "- Step 1: UTS is the maximum stress that a material can withstand while being stretched or pulled before breaking. It corresponds to the highest point on the stress-strain curve.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In the context of the density of a mixture, why can you not simply average the densities of the components? (2 steps)", "answer": "- Step 1: Density is mass divided by volume. Simply averaging densities assumes equal volumes.\n- Step 2: If you have a small piece of heavy metal and a large piece of light metal, the total mass is dominated by the heavy metal, but the total volume is dominated by the light metal. You must calculate Total Mass / Total Volume.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": true}, {"question": "What is \"Pre-straining\" (or pre-stress) in the context of railway tracks, and why is it done? (2 steps)", "answer": "- Step 1: Pre-straining involves stretching the rails (creating tension) while fixing them to the ground in cold weather.\n- Step 2: When the weather gets hot, the rails expand. The pre-strain (tension) accommodates this expansion, preventing large compressive stresses that would cause the rails to **buckle**.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "What is the function of the \"Control Wire\" in a Searle's Apparatus experiment to measure Young's Modulus? (1 step)", "answer": "- Step 1: The control wire compensates for any changes in length due to temperature fluctuations or the yielding of the support framework, ensuring that only the extension of the test wire due to the applied load is measured.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}], "count": 25}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "Why is density classified as an *intensive* property, while mass and volume are *extensive*? (3 steps)", "answer": "- Step 1: An extensive property scales with the amount of substance: cut a copper block in half and both the mass and the volume halve.\n- Step 2: Density is the *ratio* $$\\rho = m/V$$. When you halve the sample: $$\\rho_{half} = (m/2)/(V/2) = m/V = \\rho$$. The \"amount\" cancels from the top and bottom.\n- Step 3: So density depends only on what the substance *is*, not how much you have. Mental test: \"If I doubled the sample, would this change?\" If no, it is intensive. This same structural argument later makes Young modulus a material constant.\n\nDensity characterises the *material*; mass and volume characterise the *sample*.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why is averaging two densities directly to get the density of a mixture wrong, and when (if ever) is it correct?", "answer": "Densities cannot be averaged like temperatures because density is a ratio, not an additive quantity. The correct procedure is always \"total mass divided by total volume\". For a mixture with volume fractions $$f_1, f_2$$ of materials with densities $$\\rho_1, \\rho_2$$: total mass is $$\\rho_1 f_1 V + \\rho_2 f_2 V$$ and total volume is $$V$$, giving $$\\rho_{mix} = f_1\\rho_1 + f_2\\rho_2$$ — a *volume-weighted* average. A simple arithmetic mean is only correct in the special case $$f_1 = f_2 = 0.5$$. The single habit that prevents this mistake: never combine densities — go back to \"total mass over total volume\".", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "A mixture is 70% copper and 30% zinc by volume, with $$\\rho_{Cu} = 8.9 \\times 10^3$$ and $$\\rho_{Zn} = 7.1 \\times 10^3 \\, \\mathrm{kg\\,m^{-3}}$$. Without precise computation, roughly where should the alloy density sit relative to the simple mean, and why? (3 steps)", "answer": "- Step 1: The simple arithmetic mean would be $$(8.9 + 7.1)/2 = 8.0 \\times 10^3$$.\n- Step 2: But copper occupies *more* of the volume (70%), so the alloy is dominated by copper and should sit closer to $$8.9 \\times 10^3$$ than to the midpoint.\n- Step 3: Volume-weighted: $$0.7(8.9) + 0.3(7.1) \\approx 8.4 \\times 10^3 \\, \\mathrm{kg\\,m^{-3}}$$, noticeably above the simple mean. The weighting always pulls toward the more-abundant component.\n\nThe lesson behind the number: weighted averages pull toward the dominant fraction.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "If two substances are mixed by *mass fraction* rather than *volume fraction*, what is the correct combination rule for density, and why is it different?", "answer": "- Step 1: For a fixed total mass, it is now the *volumes* that add: $$V_{total} = V_1 + V_2 = m_1/\\rho_1 + m_2/\\rho_2$$.\n- Step 2: Dividing both sides by total mass $$m$$ gives $$1/\\rho_{mix} = w_1/\\rho_1 + w_2/\\rho_2$$, a *harmonic* (reciprocal) combination.\n- Step 3: The structure reverses because: with volume fractions, masses add at fixed volume → arithmetic weighting. With mass fractions, volumes add at fixed mass → harmonic weighting.\n\nAlways go back to \"total mass / total volume\" — the algebra picks the right form automatically.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "Why does converting $$1 \\, \\mathrm{cm^3}$$ to $$\\mathrm{m^3}$$ give $$10^{-6}$$, not $$10^{-2}$$? (2 steps)", "answer": "- Step 1: The conversion $$1 \\, \\mathrm{cm} = 10^{-2} \\, \\mathrm{m}$$ applies to a *length*. For a volume, every linear dimension is cubed.\n- Step 2: $$1 \\, \\mathrm{cm^3} = (10^{-2} \\, \\mathrm{m})^3 = 10^{-6} \\, \\mathrm{m^3}$$. The exponent applies to the whole bracket.\n\nConsequence: $$1 \\, \\mathrm{g\\,cm^{-3}} = 10^{-3} \\, \\mathrm{kg} / 10^{-6} \\, \\mathrm{m^3} = 10^3 \\, \\mathrm{kg\\,m^{-3}}$$. Densities in $$\\mathrm{kg\\,m^{-3}}$$ look 1000$$\\times$$ larger than in $$\\mathrm{g\\,cm^{-3}}$$ because $$\\mathrm{m^3}$$ is enormous compared to $$\\mathrm{cm^3}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Why is reading the *0.5 mm* mark on the micrometer sleeve a common error, and what is the consequence of missing it?", "answer": "The micrometer sleeve has both full-millimetre marks *and* half-millimetre marks between them. Beginners often only see the full-mm marks, so a reading of 4.5 mm + 38 thimble divisions ($$= 4.88$$ mm) gets misread as 4.0 mm + 0.38 mm $$= 4.38$$ mm — a $$0.5$$ mm error. In materials problems where this is the wire diameter, halving and squaring propagates the error into the area, then into stress, Young modulus, or extension. The safeguard: always state in words \"the half-millimetre mark is/is not visible past the last full mm\" before writing the reading.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Explain how to read a Vernier caliper and what is meant by \"the aligning line\". (3 steps)", "answer": "- Step 1: Read the main scale up to the *Vernier zero* — that gives the whole millimetres part.\n- Step 2: Look along the Vernier scale for the single division that lines up *exactly* with any line on the main scale (it does not matter which main-scale line). That number multiplied by the resolution (typically $$0.05 \\, \\mathrm{mm}$$) gives the fractional part.\n- Step 3: Add the two parts. Example: main scale at 20 mm, 4th Vernier division aligned, resolution $$0.05 \\, \\mathrm{mm}$$ → reading $$= 20 + 4(0.05) = 20.20 \\, \\mathrm{mm}$$.\n\nThe aligning line is found, not chosen — only one Vernier line truly coincides with a main-scale line at a given setting.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "A Vernier caliper has a *positive* zero error of $$+0.05 \\, \\mathrm{mm}$$. A measurement reads $$34.55 \\, \\mathrm{mm}$$. What is the true value, and why is the operation a subtraction?", "answer": "- Step 1: A positive zero error means the instrument reads *above* zero when the jaws are closed — it consistently *overstates* lengths by $$0.05 \\, \\mathrm{mm}$$.\n- Step 2: True value = observed − zero error = $$34.55 - 0.05 = 34.50 \\, \\mathrm{mm}$$.\n- Step 3: The sign convention: if the instrument tells you \"too much\", subtract; if it tells you \"too little\" (negative zero error, jaws closed but pointer below zero), subtract a negative, i.e. add.\n\nThe mental rule: subtract the zero error *with its sign*.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Why does measuring 10 sheets of paper and dividing by 10 give a better thickness than measuring one sheet directly?", "answer": "The dominant uncertainty in a single measurement is the instrument resolution — say $$\\pm 0.01 \\, \\mathrm{mm}$$. For one sheet of about $$0.1 \\, \\mathrm{mm}$$ that is a 10% uncertainty. For a stack of ten sheets ($$\\sim 1.0 \\, \\mathrm{mm}$$) it is only 1% of the stack thickness. Dividing the stack by ten preserves the *absolute* uncertainty of the single reading but applies it to a number ten times larger, so the *percentage* uncertainty drops by a factor of ten. This is a general technique: when a small quantity has high % uncertainty, measure a multiple of it.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "Describe the method to find the density of an irregular solid (e.g. a stone) using a Eureka can. (5 steps)", "answer": "- Step 1: Measure the mass $$m$$ of the dry object on a digital balance.\n- Step 2: Fill the Eureka can with water until water just stops dripping from the spout — this defines a clean \"full\" level.\n- Step 3: Place an empty, dry measuring cylinder under the spout.\n- Step 4: Gently lower the object (tied with string) until fully submerged. Displaced water flows out and is captured.\n- Step 5: Read the displaced-water volume $$V$$ at eye level. Then $$\\rho = m/V$$.\n\nWhy displacement works: by Archimedes' principle, the volume of water displaced equals the volume of the submerged object — regardless of shape.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "What are the main residual uncertainties in the Eureka-can density experiment that you cannot easily eliminate?", "answer": "Three matter: (i) *adhesion* — some water clings to the string or the object and never reaches the cylinder, slightly under-reading volume; (ii) *trapped air bubbles* on the object's surface displace water without being part of the object, over-reading volume; (iii) *measuring cylinder resolution* — typically $$\\pm 1 \\, \\mathrm{mL}$$ — sets a fundamental floor on volume precision. These cannot be reduced by repeating, only by careful technique and choice of apparatus.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "State Hooke's law in full, including the conditional clause that examiners look for.", "answer": "The extension of a sample is directly proportional to the force applied, *provided the limit of proportionality is not exceeded*. In symbols, $$F = kx$$. The conditional clause is essential: without it the statement is mathematically wrong beyond the linear region. Many candidates lose the conditional mark by omitting \"up to the limit of proportionality\".", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Why is Hooke's law approximately linear at the *atomic* level, and what physically sets the limit of proportionality? (3 steps)", "answer": "- Step 1: Atoms in a solid sit at an equilibrium separation $$r_0$$ in a potential well. The interatomic potential energy curve $$U(r)$$ is, *near* $$r_0$$, approximately a parabola.\n- Step 2: The restoring force is the negative gradient of $$U$$: for a parabolic well, this gradient is linear in displacement — i.e. $$F \\propto -(r - r_0)$$. Summed over every atomic bond across a cross-section, this gives the macroscopic Hooke's law $$F = kx$$.\n- Step 3: The parabolic approximation only holds for *small* displacements from $$r_0$$. Stretch the bond further and the real potential is asymmetric and softens — that is the physical origin of the limit of proportionality.\n\nLinearity is a consequence of being close to equilibrium, not a fundamental law.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "What does the spring constant $$k$$ *physically* measure, and what is its unit? Why is it a property of the *object*, not the material?", "answer": "- Step 1: $$k$$ is the gradient of the force-extension graph: $$k = \\Delta F / \\Delta x$$, with unit $$\\mathrm{N\\,m^{-1}}$$.\n- Step 2: It answers \"how many newtons to stretch *this object* by one metre\".\n- Step 3: It depends on the object's geometry (length, area), not just the material: a longer wire of the same metal has a smaller $$k$$ (more atoms in series, each contributing extension); a thicker wire has a larger $$k$$ (more atoms in parallel sharing the load). Hence two wires of the same steel can have very different $$k$$.\n\nThat object-versus-material distinction is the whole reason Young modulus is introduced.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Two identical springs each of constant $$k$$ are joined end-to-end (series). What is the effective spring constant, and why does this match the formula for resistors in *parallel*? (3 steps)", "answer": "- Step 1: In series, the same force $$F$$ passes through both springs. Each extends by $$x_1 = F/k$$, so the total extension is $$2F/k$$.\n- Step 2: From $$F = k_{eff}(2F/k)$$ we get $$k_{eff} = k/2$$. General rule: $$1/k_{eff} = 1/k_1 + 1/k_2$$.\n- Step 3: The reciprocal combination is structurally identical to *parallel* resistors. The reason: in both cases the \"intensive\" quantity (current for resistors, force here) is the same across components, and the \"extensive\" quantity (voltage, extension) adds — exactly the conditions for the reciprocal rule.\n\nSeries springs = parallel resistors. Counterintuitive but rigorous.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Two identical springs of constant $$k$$ are joined side-by-side (parallel). What is the effective $$k$$, and why is the system *stiffer*?", "answer": "- Step 1: In parallel, both springs extend by the *same* amount $$x$$. They share the load: $$F = F_1 + F_2 = kx + kx = 2kx$$.\n- Step 2: So $$k_{eff} = 2k$$. General rule: $$k_{eff} = k_1 + k_2 + \\dots$$.\n- Step 3: Stiffer because each spring still resists with its full $$k$$, and the resistances *add*. Physically there are now twice as many atomic bonds across the section opposing the same displacement.\n\nParallel springs = series resistors: the additive quantity is across-component-different, the same-across-components quantity is shared. Opposite to the series spring case.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "For a 5.0 N weight stretching a spring from 300 mm to 385 mm, what is the spring constant? Walk through the steps. (3 steps)", "answer": "- Step 1: Extension $$x = 385 - 300 = 85 \\, \\mathrm{mm} = 0.085 \\, \\mathrm{m}$$. *Extension* (not new length) goes into Hooke's law.\n- Step 2: Rearrange $$F = kx$$ to $$k = F/x = 5.0 / 0.085$$.\n- Step 3: $$k \\approx 59 \\, \\mathrm{N\\,m^{-1}}$$. Sanity-check: this is a soft lab spring (a few N stretch it by a few cm) — reasonable.\n\nThe danger: substituting 385 mm or 300 mm instead of the extension 85 mm.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Derive the formula for elastic strain energy stored in a Hooke spring two different ways. (3 steps)", "answer": "- Step 1: *Graphical*: on a force-extension graph the force grows linearly from 0 to $$F$$ as the extension grows from 0 to $$x$$. The work done is the area under the line — a triangle of base $$x$$ and height $$F$$, giving $$E_e = \\tfrac{1}{2}Fx$$.\n- Step 2: *Integration*: work done is $$\\int F \\, dx'$$. Substituting $$F = kx'$$:\n$$E_e = \\int_0^x kx' \\, dx' = \\tfrac{1}{2}kx^2.$$\n- Step 3: Using $$F = kx$$ links the two: $$\\tfrac{1}{2}Fx = \\tfrac{1}{2}(kx)x = \\tfrac{1}{2}kx^2$$. Both forms are the same statement.\n\nThe factor $$\\tfrac{1}{2}$$ comes from the *average* force during the stretch being $$F/2$$, not $$F$$.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Why is the factor $$\\tfrac{1}{2}$$ in $$E_e = \\tfrac{1}{2}Fx$$ the most-forgotten detail, and what does $$Fx$$ without the half represent?", "answer": "$$Fx$$ would be the work done if the force were *constant* at value $$F$$ throughout the stretch — the area of the rectangle, twice the triangle. But in a Hooke spring the force *grows linearly from zero*; the average over the stretch is only $$F/2$$. So the stored energy is half of $$Fx$$. Skipping the $$\\tfrac{1}{2}$$ gives an answer twice too large. The exam phrasing: \"average force during stretching is half the final force, so $$E_e = \\tfrac{1}{2}Fx$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "When does $$E_e = \\tfrac{1}{2}Fx$$ stop being valid, and what must you do instead?", "answer": "It is valid only in the linear (Hooke) region of the force-extension graph, where the relationship between $$F$$ and $$x$$ is a straight line through the origin. Beyond the limit of proportionality (or for non-linear materials like rubber from the start), the graph curves, the average force is no longer $$F/2$$, and the energy is the *actual area under the curve* — found by counting squares, by the trapezium rule, or by integration of the empirical curve. Using $$\\tfrac{1}{2}Fx$$ outside the linear region gives a wrong answer.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Define tensile stress and tensile strain. What is the unit of each, and why?", "answer": "- Step 1: *Tensile stress* $$\\sigma = F/A$$ where $$A$$ is the (original) cross-sectional area. Unit: $$\\mathrm{Pa} = \\mathrm{N\\,m^{-2}}$$ — the same as pressure, because the definition is also \"force per unit area\", but here it refers to internal forces within a solid under tension.\n- Step 2: *Tensile strain* $$\\varepsilon = \\Delta L / L_0$$, where $$\\Delta L$$ is the extension and $$L_0$$ the original length. Strain has *no unit* — it is the ratio of two lengths, so units cancel.\n- Step 3: Both quantities are \"normalised\": stress removes the dependence on cross-section, stra
