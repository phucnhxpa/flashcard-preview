lectrons to undergo).\n- Step 2: Experiment also shows doubling the cross-sectional area halves the resistance: $$R \\propto 1/A$$ (wider wire = more parallel paths for electrons).\n- Step 3: Combine: $$R \\propto l/A$$, so $$R = (\\text{constant}) \\times l/A$$.\n- Step 4: That constant is defined as the resistivity $$\\rho$$, a material property. Hence $$R = \\rho l / A$$.\n\nThe proportionalities make intuitive sense: longer means more obstacles in the way; wider means more \"lanes\" of traffic.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Show that the SI unit of resistivity is $$\\Omega\\cdot\\text{m}$$ (not $$\\Omega/\\text{m}$$). (2 steps)", "answer": "- Step 1: Rearrange: $$\\rho = RA/l$$.\n- Step 2: Substitute units: $$\\rho = \\dfrac{\\Omega \\cdot \\text{m}^2}{\\text{m}} = \\Omega\\cdot\\text{m}$$.\n\nSo resistivity is \"ohm-metres\", not \"ohms per metre\". A common exam trap is writing $$\\Omega/\\text{m}$$, which is dimensionally wrong — it would imply $$\\rho$$ shrinks for a longer wire, which contradicts the definition (resistivity has nothing to do with the wire's length).", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Why does resistance scale with $$1/A$$ rather than, say, $$1/\\sqrt{A}$$? Give a physical intuition. (3 steps)", "answer": "- Step 1: Think of the wire as many parallel \"channels\" running side by side; each thin strip of cross-section carries some current.\n- Step 2: Doubling the area means *twice as many* such parallel paths, sharing the same voltage. Parallel resistors of equal value combine inversely with count, so total $$R$$ halves.\n- Step 3: This linear \"more paths = less resistance\" rule gives $$R \\propto 1/A$$ exactly. A $$1/\\sqrt{A}$$ scaling would imply geometry effects (like surface friction), which don't apply to bulk conduction.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "A wire's diameter is given in millimetres. What is the conversion factor to metres, and what is a common trap? (2 steps)", "answer": "- Step 1: $$1\\,\\text{mm} = 10^{-3}\\,\\text{m}$$, so multiply by $$10^{-3}$$.\n- Step 2: The trap: confusing *milli-* with *micro-*. Micrometres ($$\\mu\\text{m}$$) use $$10^{-6}$$. Misreading \"mm\" as \"$$\\mu$$m\" makes the diameter 1000× too small, so the area is $$10^6$$ times too small, and $$\\rho$$ comes out $$10^6$$ times too large.\n\nAlways pause and ask: is this milli (10⁻³) or micro (10⁻⁶)?", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "Why does the cross-sectional area of a wire scale with the *square* of the diameter, and what concrete consequence does this have? (3 steps)", "answer": "- Step 1: For a circular cross-section, $$A = \\pi r^2 = \\pi d^2 / 4$$. Both $$r$$ and $$d$$ appear squared because area is two-dimensional.\n- Step 2: If you double the diameter, the area quadruples ($$2^2 = 4$$); if you halve the diameter, the area shrinks to a quarter.\n- Step 3: Consequence: resistance $$R = \\rho l/A$$ is therefore very sensitive to diameter. A 10% error in $$d$$ becomes a ~20% error in $$A$$, and so a ~20% error in $$\\rho$$. That's why diameter must be measured with a *micrometer* (resolution 0.01 mm), not a ruler.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "A student writes $$A = \\pi d^2$$ when computing the cross-section of a wire. By what factor is their resistivity answer wrong? (3 steps)", "answer": "- Step 1: The correct formula is $$A = \\pi d^2/4$$, since $$r = d/2$$ and $$A = \\pi r^2$$.\n- Step 2: The student's formula gives an area 4× too large.\n- Step 3: Since $$\\rho = RA/l$$, their resistivity is also 4× too large.\n\nMemory hook: always plug in the *radius*, or use the $$\\pi d^2/4$$ shortcut — never put $$d$$ directly into $$\\pi r^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Why is a micrometer (resolution 0.01 mm) the appropriate instrument for measuring a wire's diameter, rather than a ruler? (3 steps)", "answer": "- Step 1: A typical wire diameter is on the order of 0.2 mm. A ruler's resolution is 1 mm — comparable to or *larger* than what we're trying to measure, giving 100%+ uncertainty.\n- Step 2: A micrometer has resolution 0.01 mm, so the relative uncertainty drops to ~5% for a 0.2 mm wire.\n- Step 3: Since $$A \\propto d^2$$, this small fractional error in $$d$$ doubles to ~10% in $$A$$, which is the dominant uncertainty in $$\\rho$$. A ruler measurement would make the whole experiment meaningless.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Why should the diameter of a wire be measured at several different positions *and* orientations along its length? (3 steps)", "answer": "- Step 1: Manufacturing produces wires that are not perfectly uniform — diameter may vary slightly along the length (random error in $$d$$).\n- Step 2: The wire may also not be perfectly circular — its cross-section could be slightly oval. Measuring at one orientation only would systematically miss this.\n- Step 3: Taking 5–10 readings at *different positions* and *different rotational orientations* and then averaging both reduces random error in $$d$$ and detects non-circularity, giving a more representative mean diameter.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "What is a \"zero error\" on a micrometer, and why must it be checked before use?", "answer": "A zero error occurs when the micrometer reads a non-zero value when its jaws are fully closed on nothing. If unnoticed, every diameter reading is systematically too high or too low by that fixed offset. Since $$A \\propto d^2$$ and $$\\rho \\propto A$$, even a small zero error propagates into the final resistivity. The fix is simple: close the jaws, record the offset, and subtract it (or add, depending on sign) from every subsequent reading. This eliminates the systematic error at its source.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "In Core Practical 7, what is plotted on each axis of the analysis graph, and what does the gradient represent? (3 steps)", "answer": "- Step 1: Plot resistance $$R$$ on the y-axis (dependent variable) against length $$l$$ on the x-axis (independent variable).\n- Step 2: From $$R = (\\rho/A)\\,l$$, this is in the form $$y = mx$$ with gradient $$m = \\rho/A$$.\n- Step 3: To extract $$\\rho$$, multiply the gradient by the measured cross-sectional area: $$\\rho = \\text{gradient} \\times A$$. Forgetting the multiplication-by-$$A$$ step is a very common error.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Why is a graphical method (plotting $$R$$ vs $$l$$) preferred over taking a single $$V$$ and $$I$$ measurement to find $$\\rho$$? (3 steps)", "answer": "- Step 1: A single pair of $$(V, I)$$ measurements is vulnerable to random error in that one reading. Multiple data points averaged via a best-fit line reduce random scatter.\n- Step 2: Crucially, contact resistance (from crocodile-clip imperfection) adds a *constant* offset to every $$R$$ reading. This shows up as a non-zero $$y$$-intercept on the graph — but the **gradient is unaffected** by a constant shift.\n- Step 3: So the graphical method automatically extracts the part of $$R$$ that depends on $$l$$ (which gives $$\\rho$$) while discarding the systematic contact-resistance offset.\n\nThis is a beautiful demonstration of why graphs beat single-point measurements: they separate signal from systematic noise.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "In a CP7 graph of $$R$$ vs $$l$$, the best-fit line does not pass through the origin. What does the y-intercept physically represent, and is this a problem? (3 steps)", "answer": "- Step 1: At $$l = 0$$, the wire itself has zero resistance, so theoretically $$R$$ should be zero.\n- Step 2: A non-zero intercept indicates a constant added resistance — typically **contact resistance** from the crocodile clips, plus possibly internal wiring resistance.\n- Step 3: This is *not* a problem for finding $$\\rho$$, because we use the **gradient**, which is unaffected by the offset. The graph elegantly diagnoses the systematic error without letting it spoil the answer.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Why must the current through the test wire in CP7 be kept small, and the supply switched off between readings? (3 steps)", "answer": "- Step 1: Power dissipated in the wire is $$P = I^2 R$$, which heats it up.\n- Step 2: Heating raises the wire's temperature, which raises its resistivity (metal behaviour). This means $$\\rho$$ is no longer constant during the experiment — it drifts upward.\n- Step 3: A drifting $$\\rho$$ corrupts both the gradient and the final answer, giving a value that's higher than the wire's true cold resistivity. Low current + short switch-on times keep the wire near room temperature, holding $$\\rho$$ constant.\n\nExaminer keyword combo: \"to prevent heating, which would change the resistivity.\"", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "In the CP7 circuit, why is the ammeter placed in series with the wire and the voltmeter placed in parallel across the test segment?", "answer": "The ammeter measures current *through* the wire, and since the same current must flow through every component in a single loop, it must be placed *in series*. The voltmeter measures p.d. *across* the test segment, which is a parallel comparison of potential at the two endpoints, so it must be *in parallel*. The voltmeter must also have very high resistance so it draws negligible current — otherwise it would divert current from the wire and falsify the $$I$$ reading. Conceptually: ammeters interrupt and join the flow; voltmeters tap potential at two points without disturbing the flow.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Why is the fixed contact placed exactly at the zero mark of the ruler in CP7, and what happens if it's offset? (2 steps)", "answer": "- Step 1: The length $$l$$ recorded is read from the ruler scale at the flying-lead position, *assuming* the other end of the test segment starts at $$l = 0$$.\n- Step 2: If the fixed contact is actually 1 cm past the zero mark, every recorded $$l$$ is too small by 1 cm. This shifts the whole $$R$$-vs-$$l$$ line horizontally — introducing an additional non-zero intercept but, again, **not changing the gradient**. So the systematic length error is also absorbed by the graphical method, though it's still good practice to align carefully.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "How does temperature affect the resistivity of a metal, and why? (3 steps)", "answer": "- Step 1: As temperature rises, the lattice ions of the metal vibrate more vigorously about their fixed positions.\n- Step 2: This means a drifting electron is more likely to collide with an ion per unit time — collision frequency rises.\n- Step 3: More collisions ⟹ greater impedance to electron flow ⟹ resistivity $$\\rho$$ increases, and hence $$R$$ increases. The relationship is roughly linear over modest temperature ranges.\n\nSo: metals get *more* resistive when hot. This is why the filament lamp is non-ohmic, and why precision resistors are made from alloys (like constantan) whose $$\\rho$$ is nearly temperature-independent.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "How does temperature affect the resistivity of a semiconductor (e.g. an NTC thermistor), and why is the behaviour opposite to that of a metal? (3 steps)", "answer": "- Step 1: In a semiconductor, the number of free charge carriers ($$n$$ in $$I = nAvq$$) is small at low temperatures because electrons are bound to atoms.\n- Step 2: As temperature rises, thermal energy frees more electrons into the conduction band — $$n$$ increases dramatically (often exponentially).\n- Step 3: The rise in $$n$$ massively outweighs any extra collision rate, so the *net effect* is resistivity $$\\rho$$ **decreases** with temperature. Thermistors exploit this: hotter → lower $$R$$ → more current → useful for temperature sensors.\n\nKey contrast: metals lose mobility with heat; semiconductors gain carriers — opposite trends.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Why does a low-resistivity material like copper make good electrical wiring, while a high-resistivity material like rubber serves as an insulator? (2 steps)", "answer": "- Step 1: Resistivity quantifies how strongly a material opposes electron flow. Copper has $$\\rho \\approx 1.72 \\times 10^{-8}\\,\\Omega\\cdot\\text{m}$$ — electrons drift through it very easily, so a wire made of it has tiny $$R$$ and little energy is wasted as heat during transmission.\n- Step 2: Rubber has $$\\rho$$ around $$10^{13}\\,\\Omega\\cdot\\text{m}$$ — about $$10^{21}$$ times larger. Virtually no current can flow through it for any reasonable voltage, making it ideal for sheathing wires to keep current contained.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "When could a circuit *benefit* from including a high-resistance component, given that resistance \"wastes\" energy? (3 steps)", "answer": "- Step 1: **Component protection**: a sensitive LED might burn out if connected directly to a 9 V battery. A series resistor drops most of the voltage and limits current, protecting the LED.\n- Step 2: **Current control**: heating elements (kettles, toasters) are *designed* with specific resistances so that $$P = V^2/R$$ delivers a known power for a given mains voltage.\n- Step 3: **Safety in power transmission**: resistors and fuses help control fault currents and prevent dangerous surges.\n\nSo resistance isn't always wasteful — sometimes it's the *whole point* of the component.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "A wire of length $$L$$ and diameter $$D$$ has resistance $$R$$. Both $$L$$ and $$D$$ are halved. What is the new resistance in terms of $$R$$? (4 steps)", "answer": "- Step 1: Use $$R \\propto l/A$$ with $$A \\propto d^2$$.\n- Step 2: Halving length: $$l \\to l/2$$ contributes a factor of $$\\tfrac{1}{2}$$ to $$R$$.\n- Step 3: Halving diameter: $$A \\to A/4$$, contributing a factor of $$4$$ to $$R$$ (since $$R \\propto 1/A$$).\n- Step 4: Net factor: $$\\tfrac{1}{2} \\times 4 = 2$$. New resistance is $$2R$$.\n\nKey insight: diameter changes dominate because of the squaring. A small change in $$d$$ has a big effect on $$R$$.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "A wire is replaced by one of the same material but **double the length and double the diameter**. Without calculating numbers, what happens to its resistance? (3 steps)", "answer": "- Step 1: Length doubles ⟹ $$R$$ factor of 2 (more obstacles).\n- Step 2: Diameter doubles ⟹ area quadruples ⟹ $$R$$ factor of $$1/4$$ (more parallel paths).\n- Step 3: Net: $$2 \\times 1/4 = 1/2$$. The new resistance is **half** the original.\n\nCounterintuitive but instructive: making a wire longer *and* fatter can still lower its overall resistance, because area scales faster with diameter than length scales with linear extent.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Two wires of equal length, made of the same material, have diameters $$d$$ and $$2d$$. Without computing, what is the ratio of their resistances? (2 steps)", "answer": "- Step 1: $$R \\propto 1/A \\propto 1/d^2$$.\n- Step 2: Doubling $$d$$ quadruples the area, so resistance drops by a factor of 4. The thicker wire has resistance $$R/4$$ where $$R$$ is the thinner wire's resistance.\n\nUseful intuition: thickness matters squared; lay out two wires and the fat one is \"4 times more conductive\" for double the diameter.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "A wire's resistivity is $$\\rho$$ and its resistance is $$R$$. If you cut the wire exactly in half and lay the two halves side by side (in parallel), what is the combined resistance? (3 steps)", "answer": "- Step 1: Each half has length $$l/2$$, so each half-wire has resistance $$R/2$$ (length halved, area unchanged).\n- Step 2: Two identical $$R/2$$ resistors in parallel give $$\\dfrac{1}{R_{\\text{tot}}} = \\dfrac{2}{R/2} = \\dfrac{4}{R}$$, so $$R_{\\text{tot}} = R/4$$.\n- Step 3: Note this is exactly what you'd get from a single wire of length $$l/2$$ and area $$2A$$ — i.e., a wire half as long and twice as thick. The geometry is equivalent, confirming the result.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "A nichrome wire shows resistance $$R \\approx 18\\,\\Omega$$ over $$1\\,\\text{m}$$ with diameter about $$0.27\\,\\text{mm}$$. Sketch the conceptual workflow to extract $$\\rho$$ without computing the final number. (3 steps)", "answer": "- Step 1: Convert units: diameter $$d = 0.27\\,\\text{mm} = 0.27 \\times 10^{-3}\\,\\text{m}$$; length already in metres.\n- Step 2: Compute cross-section using $$A = \\pi d^2/4$$. With $$d \\sim 3 \\times 10^{-4}\\,\\text{m}$$, $$d^2 \\sim 10^{-7}\\,\\text{m}^2$$, so $$A$$ is of order $$10^{-8}\\,\\text{m}^2$$.\n- Step 3: Apply $$\\rho = RA/l$$. With $$R \\sim 20\\,\\Omega$$, $$A \\sim 6 \\times 10^{-8}\\,\\text{m}^2$$, $$l = 1\\,\\text{m}$$, the result is of order $$10^{-6}\\,\\Omega\\cdot\\text{m}$$ — characteristic of an alloy like nichrome.\n\nThe point: a quick order-of-magnitude check tells you whether your answer is sensible (metals: $$10^{-8}$$; alloys: $$10^{-7}$$ to $$10^{-6}$$; semiconductors: highly variable; insulators: very large).", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "A CP7 student finds the gradient of $$R$$ vs $$l$$ is $$8\\,\\Omega/\\text{m}$$ and the wire diameter is roughly $$0.2\\,\\text{mm}$$. Walk through the conceptual extraction of $$\\rho$$. (3 steps)", "answer": "- Step 1: The gradient equals $$\\rho/A$$, so $$\\rho = \\text{gradient} \\times A$$.\n- Step 2: Compute $$A = \\pi d^2/4$$ with $$d = 0.2 \\times 10^{-3}\\,\\text{m}$$. So $$A \\sim \\pi (10^{-4})^2/4 \\sim 3 \\times 10^{-8}\\,\\text{m}^2$$.\n- Step 3: Multiply: $$\\rho \\sim 8 \\times 3 \\times 10^{-8} \\sim 2.4 \\times 10^{-7}\\,\\Omega\\cdot\\text{m}$$. This is a sensible value for a resistance-alloy wire like constantan.\n\nThe lesson: always do the gradient-times-area multiplication — never report the gradient itself as $$\\rho$$.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Suppose two students in CP7 both measure $$\\rho$$ for the same wire, but Student A uses a single $$(V, I)$$ pair while Student B uses the gradient of a $$R$$ vs $$l$$ graph. Both have crocodile-clip contact resistance. Whose answer is more reliable, and why? (3 steps)", "answer": "- Step 1: Contact resistance adds a constant $$R_c$$ to every measured $$R$$: the *measured* resistance is $$R_{\\text{measured}} = (\\rho/A)\\,l + R_c$$.\n- Step 2: Student A's single point gives $$\\rho = R_{\\text{measured}}\\,A/l$$, which absorbs $$R_c$$ and yields $$\\rho$$ too high.\n- Step 3: Student B's gradient is $$\\Delta R/\\Delta l = \\rho/A$$ — the $$R_c$$ offset cancels in the *change*, so the gradient is unaffected. Student B's $$\\rho$$ is unbiased by contact resistance.\n\nMoral: graphical methods isolate the meaningful slope from constant systematic offsets.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "A student measures the diameter of a wire as 0.30 mm with $$\\pm 0.01\\,\\text{mm}$$ uncertainty. What is the fractional uncertainty in the cross-sectional area, and why? (3 steps)", "answer": "- Step 1: Fractional uncertainty in $$d$$ is $$\\delta d/d = 0.01/0.30 \\approx 3.3\\%$$.\n- Step 2: Since $$A = \\pi d^2/4$$ and $$A \\propto d^2$$, the fractional uncertainty in $$A$$ is **twice** that of $$d$$: $$\\delta A/A = 2 \\delta d / d$$.\n- Step 3: So $$\\delta A/A \\approx 6.7\\%$$.\n\nGeneral rule: when a quantity is raised to a power $$n$$, its fractional uncertainty is multiplied by $$|n|$$. Squaring doubles the relative error.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "In CP7, the fractional uncertainty in $$\\rho$$ is the sum of the fractional uncertainty in the gradient *plus* twice the fractional uncertainty in $$d$$. Why \"plus\", and why \"twice\"? (3 steps)", "answer": "- Step 1: $$\\rho = \\text{gradient} \\times A$$ is a product. For products, **fractional uncertainties add**: $$\\delta\\rho/\\rho = \\delta(\\text{grad})/\\text{grad} + \\delta A/A$$.\n- Step 2: $$A$$ depends on $$d^2$$, so $$\\delta A/A = 2\\,\\delta d/d$$ (squaring doubles fractional error, as in the previous card).\n- Step 3: Substituting gives $$\\delta\\rho/\\rho = \\delta(\\text{grad})/\\text{grad} + 2\\,\\delta d/d$$.\n\nThe diameter uncertainty contribution is doubled because of the squaring in the area formula — a subtle but important detail for full marks.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "How is the uncertainty in the gradient of a best-fit line typically estimated graphically? (2 steps)", "answer": "- Step 1: Draw the steepest reasonable line through the data (maximum gradient) and the shallowest reasonable line (minimum gradient) that both still pass through the scattered points.\n- Step 2: The uncertainty is half the spread: $$\\delta(\\text{gradient}) = (m_{\\text{max}} - m_{\\text{min}})/2$$.\n\nThis is sometimes called the \"min-max line method\" and gives an honest visual estimate of how much the scatter in data permits the slope to vary.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Why is constantan often used for CP7 rather than copper? (3 steps)", "answer": "- Step 1: Copper has very low resistivity ($$\\sim 10^{-8}\\,\\Omega\\cdot\\text{m}$$). A 1 m wire of typical diameter has resistance of order $$10^{-1}\\,\\Omega$$ — comparable to contact resistance, so the signal-to-noise is poor.\n- Step 2: Constantan ($$\\rho \\sim 5 \\times 10^{-7}\\,\\Omega\\cdot\\text{m}$$) has ~30× higher resistivity, giving a comfortably measurable $$R$$ over a 1 m sample.\n- Step 3: Constantan's resistivity is also very weakly temperature-dependent — so small heating effects during the experiment don't spoil the measurement. Both properties make it ideal.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Why is it important that the same wire (and not a piece of a different sample) is used throughout a CP7 run? (2 steps)", "answer": "- Step 1: $$\\rho$$ is a material property, and small composition or processing differences between batches/samples can alter $$\\rho$$ measurably.\n- Step 2: $$A$$ (from one diameter measurement) is also used as the same value across all length points; if you switched samples mid-experiment with different diameters, $$A$$ would no longer be a constant, and the $$R$$-vs-$$l$$ plot would lose its linear-through-origin structure.\n\nConsistent material *and* consistent geometry are both needed for the linear model to hold.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "A student plotting $$R$$ vs $$l$$ for a CP7 experiment finds the line is curved rather than straight. Suggest a likely physical cause. (3 steps)", "answer": "- Step 1: $$R = \\rho l/A$$ predicts a straight line *only if* $$\\rho$$ and $$A$$ are constant across all measurements.\n- Step 2: If the current was allowed to flow for too long or at too high a value, the wire heats progressively during longer measurements — $$\\rho$$ increases at longer $$l$$ readings (which carry more total dissipation or take more time). This curves the graph upward.\n- Step 3: Alternative causes: variable contact pressure (non-systematic), wire non-uniformity, or thermal drift between readings. The fix is to switch off between readings and let the wire cool.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Why is it sometimes advantageous to use an ohmmeter directly in CP7 instead of separate voltmeter + ammeter? (3 steps)", "answer": "- Step 1: An ohmmeter measures $$R$$ directly by sending its own tiny test current through the component and reading the voltage drop — no manual $$V/I$$ division needed.\n- Step 2: This reduces propagated error: with separate meters, $$R$$ inherits the uncertainty from both $$V$$ and $$I$$ readings.\n- Step 3: It also avoids the issue of the voltmeter drawing some current away from the ammeter loop (or vice versa, depending on circuit topology). Trade-off: ohmmeters typically have lower resolution than dedicated voltmeter + ammeter combinations.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "A filament lamp has resistance $$50\\,\\Omega$$ when cold. When fully lit, its resistance is roughly 10× higher. What does this tell you about the lamp's temperature dependence and its operation? (3 steps)", "answer": "- Step 1: A 10× rise in $$R$$ means $$\\rho$$ has risen by the same factor (geometry is fixed) — the tungsten filament is much hotter when lit.\n- Step 2: When you first switch on, $$R$$ is low, so initial current is high: $$I = V/R$$ surges. This is why filament bulbs often fail *at switch-on*.\n- Step 3: As the filament heats, $$R$$ rises, current drops, and the system settles into a steady operating point where power dissipated equals heat radiated. The strong positive temperature coefficient is essential to this self-regulation.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Why doesn't Ohm's Law apply to a filament lamp? (3 steps)", "answer": "- Step 1: Ohm's Law requires $$R$$ to be constant — equivalently, the $$I$$-$$V$$ graph must be linear.\n- Step 2: In a filament lamp, increasing $$V$$ raises $$I$$, which raises power dissipated, which raises temperature, which raises $$\\rho$$, which raises $$R$$.\n- Step 3: So as $$V$$ grows, the \"effective\" $$R$$ at each operating point changes — the $$I$$-$$V$$ curve bends. The component still has a well-defined $$R = V/I$$ at any *instant*, but that $$R$$ is not constant across the range — hence \"non-ohmic\".", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Two materials have resistivities $$\\rho_1 = 1.7 \\times 10^{-8}\\,\\Omega\\cdot\\text{m}$$ and $$\\rho_2 = 2.6 \\times 10^{-8}\\,\\Omega\\cdot\\text{m}$$. Cylinders of equal length and cross-section are made from each. Which is the better conductor, and roughly by what factor? (3 steps)", "answer": "- Step 1: For identical geometry, $$R \\propto \\rho$$. Lower $$\\rho$$ = lower $$R$$ = better conductor.\n- Step 2: $$\\rho_1 < \\rho_2$$, so material 1 (copper) is the better conductor.\n- Step 3: The ratio $$\\rho_2/\\rho_1 \\approx 1.5$$, so material 2 (aluminium) has ~50% more resistance for the same shape. This is why high-voltage transmission lines often use aluminium (cheaper, lighter) despite slightly worse conductivity — the geometry compensates.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "For a non-ohmic component (a diode-like curve), the question asks: \"What p.d. is needed to make its resistance equal $$50\\,\\Omega$$?\" Why can't you simply use a fixed $$I$$ from another part of the problem and compute $$V = IR$$? (3 steps)", "answer": "- Step 1: For a non-ohmic component, $$V$$ and $$I$$ are not independently free — they're locked together by the curve. You can't pick an arbitrary $$I$$ and demand a $$V$$.\n- Step 2: The condition $$R = 50\\,\\Omega$$ means $$V/I = 50$$, which is a straight line through the origin on the $$I$$-$$V$$ plot with gradient $$1/50$$.\n- Step 3: The actual operating point is where this $$R = 50$$ line **intersects the component's curve** — only that point satisfies both the $$R = 50$$ requirement *and* the component's $$I$$-$$V$$ relationship simultaneously. Read $$V$$ off at that intersection.\n\nThis is the classic graphical-intersection method for non-ohmic components.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "On an $$I$$ vs $$V$$ graph, a line representing constant resistance $$R$$ has gradient $$1/R$$. Sketch in your head: at $$R = 50\\,\\Omega$$, the line through origin has what gradient, and how would you use one chosen point to draw it? (3 steps)", "answer": "- Step 1: Gradient = $$1/R = 1/50 = 0.02\\,\\text{A/V}$$.\n- Step 2: Pick any convenient $$V$$, say $$V = 0.6\\,\\text{V}$$. Then $$I = V/R = 0.6/50 = 0.012\\,\\text{A} = 12\\,\\text{mA}$$.\n- Step 3: Plot the point $$(0.6\\,\\text{V}, 12\\,\\text{mA})$$ and draw a straight line from the origin through it. Where this line crosses the non-ohmic curve gives the operating point at which the component \"behaves as\" a $$50\\,\\Omega$$ resistor.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Why must $$l$$ and $$A$$ both be in SI units (metres and m²) when computing $$\\rho$$, and what's a common slip? (2 steps)", "answer": "- Step 1: $$\\rho$$ in $$\\Omega\\cdot\\text{m}$$ assumes $$l$$ in m and $$A$$ in m². If you plug in $$l$$ in cm and $$A$$ in mm², the resulting $$\\rho$$ will be off by powers of 10 — not by a sensible \"unit choice\", but by raw numerical error.\n- Step 2: Common slips: forgetting to convert $$d = 0.27\\,\\text{mm}$$ to $$0.27 \\times 10^{-3}\\,\\text{m}$$ before squaring (huge error since $$d$$ is squared); leaving $$l$$ in cm; computing $$A$$ in mm² and not converting to m². Always do the unit conversion *first*, then plug numbers in.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "Why does plotting $$R$$ vs $$l$$ for a single uniform wire give a line through the origin (in the ideal, contact-resistance-free case)? (2 steps)", "answer": "- Step 1: From $$R = (\\rho/A)\\,l$$, when $$l = 0$$, $$R = 0$$ exactly — no wire means no resistance.\n- Step 2: For any $$l > 0$$, $$R$$ scales linearly with $$l$$ at a rate $$\\rho/A$$. Hence: straight line, gradient $$\\rho/A$$, intercept zero. Any deviation from this ideal (e.g. non-zero intercept) signals a systematic effect like contact resistance — useful diagnostic information.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "A wire's resistance is found to be 0.1 Ω over a 1 m sample of copper. Why is this measurement experimentally challenging, and how would you redesign CP7 to fix it? (3 steps)", "answer": "- Step 1: A 0.1 Ω reading is comparable to (or smaller than) typical voltmeter/ammeter uncertainties and contact resistance offsets (~0.1 Ω). The relative error in $$R$$ becomes huge.\n- Step 2: Solution 1 — use a much longer wire (e.g. 10 m) to multiply $$R$$ by 10×, raising it above the noise floor.\n- Step 3: Solution 2 — use a higher-resistivity material (nichrome, constantan) where the same geometry gives $$R \\sim 10\\,\\Omega$$, far above contact noise. This is why CP7 typically uses resistance-alloy wires rather than copper.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Why do we say that resistivity depends on \"material and temperature\" but not on geometry, while resistance depends on all three?", "answer": "Resistivity is defined at the microscopic level: it captures how readily charge carriers move through the material's lattice, which depends on the material's atomic structure (fixed by chemistry) and how strongly the lattice vibrates (set by temperature). It is geometry-independent: a cubic millimetre of copper has the same $$\\rho$$ as a kilometre-long copper cable. Resistance, in contrast, is an *engineering* quantity for a particular shape: take the same material and stretch it longer or thinner, and the resistance changes via $$R = \\rho l/A$$ — even though $$\\rho$$ itself is unchanged. Material + temperature set the intrinsic *quality* of conduction; geometry sets the *amount* of material the current must traverse.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Why does increasing the temperature of a metal increase the rate of electron–lattice collisions, in terms of the underlying physics? (3 steps)", "answer": "- Step 1: Lattice ions sit in periodic positions and vibrate thermally — their oscillation amplitude grows with temperature.\n- Step 2: Conduction electrons travel in straight lines between collisions. The probability of \"running into\" an ion in a given distance depends on the effective cross-section the vibrating ion presents — larger amplitude means a larger \"target\".\n- Step 3: So the *mean free path* (average distance between collisions) shortens with rising $$T$$, raising the collision rate, raising scattering, raising resistivity. The temperature dependence is roughly linear over modest ranges for metals.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "Imagine a wire whose diameter varies along its length (thicker at one end, thinner at the other). Why is $$R = \\rho l/A$$ not directly applicable, and what would you need to do instead? (3 steps)", "answer": "- Step 1: The formula $$R = \\rho l/A$$ assumes *uniform* cross-section. If $$A$$ varies with position, the formula no longer gives a single answer — local resistance per unit length depends on local $$A$$.\n- Step 2: You'd need to treat the wire as a sequence of thin slices, each of thickness $$dl$$ and area $$A(l)$$, contributing $$dR = \\rho\\,dl/A(l)$$.\n- Step 3: Total resistance is the integral $$R = \\int_0^L \\rho\\,dl/A(l)$$. Conceptually: a non-uniform wire is a series combination of many slightly-different uniform resistors. This is why CP7 specifies a wire of *uniform* cross-section — otherwise the analysis breaks down.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "Two identical resistors are connected in series. Compare this to a single resistor of double the length (same material and cross-section). Are they equivalent, and why does this reveal the meaning of $$R \\propto l$$? (3 steps)", "answer": "- Step 1: Series resistors add: total $$R_{\\text{series}} = R + R = 2R$$.\n- Step 2: A single wire of double length has $$R' = \\rho(2l)/A = 2 \\times (\\rho l/A) = 2R$$.\n- Step 3: Identical results — confirming that $$R \\propto l$$ is just the macroscopic statement of \"adding more wire in series\". Two short wires end-to-end electrically *are* one long wire.\n\nThis symmetry is also why doubling diameter (quadrupling area) is *equivalent* to four wires in parallel.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "Why is the relationship $$I \\propto V$$ called Ohm's \"Law\" if it only holds for certain materials under certain conditions?", "answer": "Historically, Georg Ohm discovered this proportionality for metallic conductors and it was elevated to \"Law\" status before its limits were widely understood. Modern physics treats it more accurately as a *constitutive relation* or empirical behaviour of a class of materials (called *ohmic* conductors) under restricted conditions (constant temperature, low fields, no exotic effects). It contrasts with fundamental laws like conservation of charge, which hold universally. Calling it \"Ohm's Law\" persists by convention, but the implicit qualifier \"for ohmic materials at constant temperature\" should always be remembered — otherwise you'll apply it incorrectly to filament lamps, diodes, and semiconductors.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "A student claims: \"If I use a thicker wire in CP7, my measured $$\\rho$$ should come out smaller, because resistance is smaller.\" Why is this wrong? (3 steps)", "answer": "- Step 1: $$\\rho$$ is a *material property* — it doesn't depend on geometry. Whatever the wire's diameter, $$\\rho$$ should come out the same (within experimental uncertainty).\n- Step 2: The student is confusing $$R$$ (which does depend on $$A$$) with $$\\rho$$ (which doesn't). The thicker wire will give lower $$R$$ at each $$l$$, but also a larger $$A$$ — and $$\\rho = (\\text{gradient}) \\times A$$ exactly cancels this geometric difference.\n- Step 3: This is precisely the point of defining $$\\rho$$: it abstracts away the geometry to give the intrinsic conduction property of the material. The thick and thin wires of the same material *must* yield the same $$\\rho$$, or the experiment has gone wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "Why is the unit of resistance the ohm $$(\\Omega)$$, and how is it built up from base units?", "answer": "Resistance is defined as $$R = V/I$$, and using $$V$$ = J/C and $$I$$ = C/s, we get $$\\Omega = \\text{V/A} = (\\text{J/C})/(\\text{C/s}) = \\text{J}\\cdot\\text{s}/\\text{C}^2$$. In base SI units, this expands further to $$\\text{kg}\\cdot\\text{m}^2 \\cdot \\text{s}^{-3} \\cdot \\text{A}^{-2}$$. For most purposes, just remember $$1\\,\\Omega = 1\\,\\text{V/A}$$ — one volt of \"push\" producing one ampere of current means the resistance is one ohm. Resistivity then carries an extra factor of metres: $$\\Omega\\cdot\\text{m}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "In CP7, why specifically plot $$R$$ on the y-axis and $$l$$ on the x-axis, rather than the reverse? (2 steps)", "answer": "- Step 1: $$l$$ is the *independent variable* — the one the experimenter directly sets (by moving the flying lead). Convention places independents on the x-axis.\n- Step 2: $$R$$ is the *dependent variable* — calculated from $$V/I$$ at each chosen $$l$$. Plotting $$R$$ on y gives $$R = (\\rho/A)\\,l$$ in the familiar $$y = mx$$ form, where the gradient $$\\rho/A$$ is read directly. Swapping axes would give a graph of gradient $$A/\\rho$$, which is fine but adds an unnecessary reciprocal step.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "What conceptual error does writing \"$$\\rho$$ has units of $$\\Omega/\\text{m}$$\" make, and how does the correct unit reflect the formula's structure? (3 steps)", "answer": "- Step 1: \"$$\\Omega/\\text{m}$$\" would mean resistance per unit length — but that's a *geometry-dependent* quantity (it depends on the wire's cross-section too), not an intrinsic material constant.\n- Step 2: The correct unit $$\\Omega\\cdot\\text{m}$$ arises because $$\\rho = RA/l$$ has units $$\\Omega \\cdot \\text{m}^2/\\text{m} = \\Omega\\cdot\\text{m}$$.\n- Step 3: Physically, \"$$\\Omega\\cdot\\text{m}$$\" says: imagine a 1-metre cube of material — its end-to-end resistance is numerically $$\\rho$$. That's the intrinsic measure: a cubic metre of pure copper has $$\\sim 1.7 \\times 10^{-8}\\,\\Omega$$ across opposite faces.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "Why is it important to take *multiple* readings of current $$I$$ at each length and average them, in CP7? (2 steps)", "answer": "- Step 1: A single $$I$$ reading is subject to random fluctuations — slight contact pressure variations, meter jitter, brief temperature blips.\n- Step 2: Averaging $$n$$ independent readings reduces the random uncertainty in the mean by a factor of $$\\sqrt{n}$$. Three readings cuts random error to about 58%; ten readings to about 32%. This gives a more reliable $$R = V/\\bar{I}$$ at each $$l$$, sharpening the gradient determination.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "A student measures the wire diameter as 5.77 mm using a micrometer with reading 5.5 mm on the sleeve and 0.27 mm on the thimble. They then convert to \"$$5.77 \\times 10^{-6}\\,\\text{m}$$\". What's the error and what's the right value? (3 steps)", "answer": "- Step 1: 5.77 mm in metres is $$5.77 \\times 10^{-3}\\,\\text{m}$$, since milli means $$10^{-3}$$.\n- Step 2: The student's conversion uses $$10^{-6}$$, which is *micro* — they've confused mm with $$\\mu$$m.\n- Step 3: The numerical impact: the student's $$d$$ is 1000× too small, so their $$A$$ is $$10^6$$ times too small, so their $$\\rho$$ comes out $$10^6$$ times too *large*. A nichrome wire's true $$\\rho \\sim 10^{-6}\\,\\Omega\\cdot\\text{m}$$ would be reported as $$\\sim 1\\,\\Omega\\cdot\\text{m}$$ — implausibly high for a metallic conductor. Such order-of-magnitude sanity checks catch this error instantly.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}], "count": 60}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Define resistance and state its SI unit, including the operational equation that defines it.", "answer": "Resistance is the property of a component that quantifies how strongly it opposes the flow of electric current. Operationally, it is defined as $$R = V/I$$, where $$V$$ is the potential difference across the component in volts and $$I$$ is the current through it in amperes. The SI unit is the ohm ($$\\Omega$$), where $$1\\,\\Omega = 1\\,\\text{V/A}$$. Crucially, this is a *ratio* — never a product. Writing $$R = VI$$ is a common slip but dimensionally and physically wrong: doubling the voltage for a fixed resistor doubles the current, not multiplies them.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why is resistance defined as $$V/I$$ rather than $$V \\times I$$? Reason from what each quantity physically represents. (3 steps)", "answer": "- Step 1: $$V$$ is the energy delivered *per unit charge* (J/C) — it's the \"push\" driving charges forward.\n- Step 2: $$I$$ is the rate of charge flow (C/s) — how much charge actually makes it through per second.\n- Step 3: Resistance should describe how much push is needed to achieve a given flow. So we ask: \"how many volts per amp does this component demand?\" That's a *ratio*: $$R = V/I$$. Multiplying voltage by current gives power $$P = VI$$ (energy per second), which is a completely different physical quantity.\n\nTakeaway: $$R$$ measures \"opposition per unit flow\"; $$P$$ measures \"energy per second.\"", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "State Ohm's Law precisely, including the condition under which it holds.", "answer": "Ohm's Law states that the current through a metallic conductor is *directly proportional* to the potential difference across it, **provided the temperature (and other physical conditions) remain constant**. Symbolically: $$V \\propto I$$, or equivalently $$R = V/I = \\text{constant}$$. The condition \"constant temperature\" is essential — without it, heating changes resistivity and the proportionality breaks down. Note: \"directly proportional\" is stronger than \"linear\" — the I–V line must pass through the origin.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "On an $$I$$–$$V$$ graph (current on y-axis, voltage on x-axis), what visual feature identifies an ohmic conductor, and how is its resistance read off? (3 steps)", "answer": "- Step 1: An ohmic conductor produces a **straight line through the origin** on an $$I$$–$$V$$ plot. The \"through the origin\" part matters — it encodes the direct proportionality.\n- Step 2: Since $$I = V/R$$, the gradient is $$\\Delta I / \\Delta V = 1/R$$.\n- Step 3: Therefore $$R = 1/\\text{gradient}$$. A steeper gradient means *smaller* resistance (current rises quickly per volt); a shallow gradient means large resistance.\n\nCommon trap: if axes are swapped (V on y-axis, I on x-axis), then gradient directly equals $$R$$. Always check the axes.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Why does a filament lamp produce a curved (non-ohmic) $$I$$–$$V$$ characteristic? Explain the microscopic chain of cause and effect. (4 steps)", "answer": "- Step 1: As current flows, electrons collide with lattice ions and transfer kinetic energy to the lattice as thermal energy — the filament heats up.\n- Step 2: Higher temperature means the lattice ions vibrate more vigorously with larger amplitudes.\n- Step 3: Larger vibrations present a bigger \"target\" for drifting electrons, so collisions become more frequent.\n- Step 4: More collisions per second means resistivity $$\\rho$$ rises, so resistance $$R$$ rises with current. The I–V curve bends away from a straight line — for the same extra volt, you get *less* extra current at higher operating points.\n\nKey insight: the lamp is non-ohmic not because the material is exotic, but because the *temperature isn't held constant* during operation.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "A student claims a resistor \"stores\" the electrons it removes from the current. Why is this wrong, and what actually happens?", "answer": "Electrons are not stored or destroyed — charge is conserved, so the same number of electrons enters and leaves the resistor per second in steady state. What changes is their *drift velocity*: collisions with the vibrating lattice transfer their kinetic energy to thermal energy of the ions (heating the resistor). The reduced average drift velocity means a smaller rate of charge flow, i.e., smaller current. So a resistor doesn't act as an \"electron reservoir\" — it acts as an *energy converter*, transforming electrical energy into heat while slowing the electrons. The current is the same on both sides; the energy per charge ($$V$$) drops across it.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Distinguish *resistance* from *resistivity*. Why do we need both concepts? (3 steps)", "answer": "- Step 1: **Resistance** ($$R$$, in $$\\Omega$$) is a property of a specific *component* — it depends on what the component is made of *and* its shape and size. A long thin copper wire and a short fat copper wire have very different resistances.\n- Step 2: **Resistivity** ($$\\rho$$, in $$\\Omega\\cdot\\text{m}$$) is an intrinsic property of the *material* itself — it depends only on what the material is and its temperature. All pure copper at 20°C has the same resistivity, no matter the shape.\n- Step 3: We need both because resistance is what circuits \"see\" (it determines current), but resistivity is what tells us how good a material is at conducting in the abstract. The link is $$R = \\rho l/A$$: geometry converts the intrinsic property into the measured one.\n\nAnalogy: resistivity is like density (material property); resistance is like mass (depends on how much and what shape).", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Starting from the experimental observations $$R \\propto l$$ and $$R \\propto 1/A$$, derive the resistivity equation and explain why each proportionality makes physical sense. (3 steps)", "answer": "- Step 1: Experimentally, doubling the length of a uniform wire doubles its resistance: $$R \\propto l$$. Physically, electrons must traverse twice as much material, encountering twice as many collisions on average.\n- Step 2: Doubling the cross-sectional area halves the resistance: $$R \\propto 1/A$$. Physically, a wider wire offers more parallel paths for electrons — like a wider pipe carrying water more easily.\n- Step 3: Combining: $$R \\propto l/A$$, so $$R = \\rho\\, l/A$$ where the constant of proportionality $$\\rho$$ depends only on the material (and temperature). Rearranging gives $$\\rho = RA/l$$.\n\nThe constant $$\\rho$$ \"factors out\" the geometry, isolating the material's intrinsic ability to oppose current.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Derive the SI unit of resistivity from $$\\rho = RA/l$$.", "answer": "Substitute units directly: $$[\\rho] = [R][A]/[l] = \\Omega \\cdot \\text{m}^2 / \\text{m} = \\Omega\\cdot\\text{m}$$. So resistivity is measured in **ohm-metres**, not ohms per metre. The unit $$\\Omega/\\text{m}$$ is dimensionally wrong and would correspond to something like \"ohms gained per metre of length\" (which is actually the gradient of an $$R$$–$$l$$ graph, not resistivity itself).", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "Why is the unit $$\\Omega/\\text{m}$$ a wrong answer for resistivity, even though it sounds plausible?", "answer": "\"Ohms per metre\" would mean resistance scales as length — but resistance also depends on cross-sectional area, which $$\\Omega/\\text{m}$$ ignores. From $$\\rho = RA/l$$, the metres of area ($$\\text{m}^2$$) and the metres of length ($$\\text{m}$$) don't cancel completely — one metre survives in the numerator. So the correct unit is $$\\Omega\\cdot\\text{m}$$. Conceptually, $$\\Omega/\\text{m}$$ is actually the *gradient* of an $$R$$ vs $$l$$ graph for a specific wire, not the resistivity of the material itself.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "A wire's length is doubled and its diameter is halved. By what factor does its resistance change, and why? (4 steps)", "answer": "- Step 1: From $$R = \\rho l/A$$, resistance scales with $$l/A$$, and for a circular cross-section $$A \\propto d^2$$.\n- Step 2: Doubling length: $$l \\to 2l$$ multiplies $$R$$ by 2.\n- Step 3: Halving diameter: $$d \\to d/2$$ means $$d^2 \\to d^2/4$$, so $$A \\to A/4$$. Since $$R \\propto 1/A$$, this multiplies $$R$$ by 4.\n- Step 4: Combined factor: $$2 \\times 4 = 8$$. New resistance is $$8R$$.\n\nKey intuition: diameter changes have a *squared* effect on resistance because area depends on $$d^2$$ — small diameter changes have a big impact.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Why is it especially important to convert micrometer readings in millimetres to metres (factor $$10^{-3}$$) and not micrometres (factor $$10^{-6}$$)? Quantify the consequence of getting it wrong.", "answer": "The micrometer's name refers to its *resolution* (it can resolve fractions of a micrometre on the thimble scale), not its units — it reads in **millimetres**. If you mistakenly treat the reading as micrometres and convert with $$10^{-6}$$ instead of $$10^{-3}$$, you make $$d$$ a factor of $$1000$$ too small. Since $$A \\propto d^2$$, the area is off by $$10^6$$, and since $$\\rho \\propto A$$, the resistivity is wrong by a factor of $$10^6$$. That turns a nichrome value of $$\\sim 10^{-6}\\,\\Omega\\cdot\\text{m}$$ into $$\\sim 10^{-12}\\,\\Omega\\cdot\\text{m}$$ — clearly absurd. Always sanity-check the order of magnitude.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "Why is the formula $$A = \\pi d^2 / 4$$ used in resistivity work, rather than $$A = \\pi r^2$$?", "answer": "They are equivalent: $$r = d/2$$, so $$A = \\pi r^2 = \\pi (d/2)^2 = \\pi d^2/4$$. The reason we *prefer* the $$d^2/4$$ form in practice is that the micrometer measures the **diameter** directly. Using $$\\pi d^2/4$$ avoids an intermediate halving step, which is one less place to make an arithmetic mistake. The common error is substituting $$d$$ straight into $$\\pi r^2$$ — giving $$\\pi d^2$$, which is **four times too large**, and a resistivity that's four times too small.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "A pencil-lead-shaped resistor (graphite, circular cross-section) has its diameter doubled. By what factor does its resistance change, assuming length and material are unchanged?", "answer": "$$R = \\rho l/A$$, so $$R \\propto 1/A$$. With circular cross-section, $$A \\propto d^2$$. Doubling $$d$$ quadruples $$A$$, so resistance falls to $$1/4$$ of its original value. Conceptually: a wire twice as wide has *four times* the parallel pathways for electron flow, not twice — the squared dependence catches students out.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Compare how resistivity changes with temperature in a metal versus a semiconductor, and explain the underlying microscopic reason. (4 steps)", "answer": "- Step 1: In a **metal**, the number of free electrons is essentially fixed by the atomic structure — temperature doesn't change it much.\n- Step 2: Heating a metal makes lattice ions vibrate more vigorously, so electrons collide with them more often. More collisions → higher $$\\rho$$ → higher $$R$$.\n- Step 3: In a **semiconductor**, the dominant effect is different: there are few free charge carriers at low temperature, but heating provides energy to liberate more (e.g., promoting electrons across the band gap).\n- Step 4: The huge increase in carrier number outweighs the increased collision rate, so $$\\rho$$ *decreases* with temperature → $$R$$ decreases. This is why NTC (negative temperature coefficient) thermistors are used as temperature sensors.\n\nMemory hook: metals \"get worse\" with heat; semiconductors \"get better.\"", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "Why does the filament lamp's resistance increase with current, even though current itself doesn't directly change resistance?", "answer": "Current itself doesn't change resistance — *temperature* does. The chain is: higher current → more power dissipated ($$P = I^2 R$$) → filament heats up → lattice vibrations increase → more electron–ion collisions → resistivity rises → resistance rises. So current is the *upstream cause* (it drives heating), but the *mechanism* is thermal: changing $$\\rho$$. This is why in low-current measurements (like CP7), the wire stays near room temperature and resistance stays effectively constant.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "In Core Practical 7, why must the current be kept small and switched off between readings? What error does this prevent? (3 steps)", "answer": "- Step 1: A current flowing through the wire dissipates power $$P = I^2 R$$ as heat in the wire.\n- Step 2: If the wire heats up, its resistivity $$\\rho$$ increases (metals), and so does $$R$$ — meaning the resistance we measure is no longer the room-temperature value we want to report.\n- Step 3: Keeping current low and switching off between readings keeps the wire at room temperature, so $$\\rho$$ stays effectively constant across all length values and the $$R$$ vs $$l$$ relationship remains linear.\n\nThe full mark-scheme answer must mention **both** the heating *and* its effect on resistivity — a single half wins no marks.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Describe the circuit layout for CP7 (resistivity of a wire). Where do the ammeter, voltmeter, and flying lead go, and why? (4 steps)", "answer": "- Step 1: The test wire is taped along a metre ruler with one end at the zero mark — this defines the start of the measured length.\n- Step 2: An **ammeter is in series** with the wire (it must carry the same current as the wire, and a series ammeter has very low resistance so it doesn't disturb the circuit).\n- Step 3: A **voltmeter is in parallel** with the segment of wire being tested (it measures the p.d. across just that segment, drawing negligible current due to its high resistance).\n- Step 4: The **flying lead** (a crocodile clip) slides along the wire to define the segment length $$l$$. The fixed voltmeter terminal sits at $$l=0$$; moving the flying lead changes $$l$$ without altering the rest of the circuit.\n\nAlternative: an ohmmeter can replace the V+A pair, reading $$R$$ directly.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "In CP7, what is plotted on each axis, and what does the gradient represent? Why this choice? (3 steps)", "answer": "- Step 1: Plot $$R$$ (resistance, $$\\Omega$$) on the **y-axis** and $$l$$ (length, $$\\text{m}$$) on the **x-axis**.\n- Step 2: Rearranging $$R = \\rho l/A$$ as $$R = (\\rho/A)\\, l$$, this is in the form $$y = mx$$ where $$m = \\rho/A$$. So the **gradient equals $$\\rho/A$$**, not $$\\rho$$ itself.\n- Step 3: To extract resistivity: $$\\rho = \\text{gradient} \\times A$$, where $$A = \\pi d^2/4$$ from the micrometer measurement.\n\nCommon trap: stopping after finding the gradient and quoting that as $$\\rho$$. The gradient has units $$\\Omega/\\text{m}$$, not $$\\Omega\\cdot\\text{m}$$ — different quantity entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Why is the graphical method ($$R$$ vs $$l$$ plot) superior to taking a single pair of measurements and computing $$\\rho = RA/l$$ directly? (3 steps)", "answer": "- Step 1: **Reduces random error**: many data points are averaged by the best-fit line, so individual fluctuations (e.g., contact-pressure variation, slight current fluctuations) get smoothed out instead of dominating one reading.\n- Step 2: **Eliminates a systematic offset**: contact resistance between the crocodile clip and the wire adds a constant extra $$R$$ to every reading. This shifts the line up (non-zero y-intercept) but **does not change the gradient**. Since we use only the gradient to find $$\\rho$$, contact resistance is automatically cancelled.\n- Step 3: **Visual quality check**: a linear graph through the origin confirms $$R \\propto l$$ (the underlying physics holds). A curved or scattered plot warns of problems (heating, non-uniform wire) before you trust the result.\n\nThis is the canonical argument for graphical analysis in any \"find a constant from a linear relationship\" experiment.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "A student's $$R$$ vs $$l$$ graph in CP7 has a non-zero y-intercept (it doesn't pass through the origin). What does this physically indicate, and does it affect the calculated resistivity?", "answer": "A non-zero y-intercept means that at $$l = 0$$ (no wire length included), there's still some measured resistance — this comes from **contact resistance** at the crocodile clip and the connecting wires. It's a **systematic error** in the resistance measurements. However, since $$\\rho$$ is calculated from the **gradient** (not the intercept), a constant offset shifts the whole line vertically but leaves the slope unchanged. So the resistivity calculation is unaffected — this is precisely why the graphical method is chosen over single-point calculations.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "Why is the wire's diameter measured at multiple positions and orientations along its length, not just once? (3 steps)", "answer": "- Step 1: A wire is rarely perfectly cylindrical — manufacturing introduces small variations in diameter along its length (random error in $$d$$).\n- Step 2: The cross-section may not be perfectly circular — slightly oval. Measuring at different orientations (rotating the wire between readings) detects this and averages over it.\n- Step 3: Since $$A \\propto d^2$$, *any* error in $$d$$ is **doubled** in the fractional uncertainty of $$A$$, which propagates directly into $$\\rho$$. So reducing the random scatter in $$d$$ has outsized impact on the accuracy of $$\\rho$$.\n\nTypical procedure: 5–10 measurements at different positions and orientations, then average.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Why is a micrometer screw gauge preferred over a normal ruler for measuring wire diameter in CP7?", "answer": "A ruler's resolution is typically $$1\\,\\text{mm}$$, but wire diameters in CP7 are around $$0.2$$–$$0.5\\,\\text{mm}$$ — the diameter itself is below the ruler's smallest division. Using a ruler would give 100% relative uncertainty or worse. A micrometer has resolution $$0.01\\,\\text{mm}$$, giving a relative uncertainty of only $$\\sim 2$$–$$5\\%$$ on a $$0.3\\,\\text{mm}$$ wire. Since this fractional uncertainty is doubled when computing $$A = \\pi d^2/4$$, having the smallest possible $$\\delta d/d$$ is critical for an accurate resistivity.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "What is a \"zero error\" on a micrometer, and why must it be checked before use?", "answer": "A zero error is a systematic offset: when the micrometer jaws are fully closed (measuring nothing), the scale should read exactly $$0.00\\,\\text{mm}$$. If it reads, say, $$+0.02\\,\\text{mm}$$, every subsequent reading is too high by $$0.02\\,\\text{mm}$$. Since wire diameters in CP7 are around $$0.2\\,\\text{mm}$$, a $$0.02\\,\\text{mm}$$ offset is a 10% systematic error in $$d$$, which becomes a **20% error in area** and resistivity. To correct: record the zero error before measuring and subtract it from each subsequent reading (or add, if negative).", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "In CP7, why must the fixed end of the circuit make contact at *exactly* $$l = 0$$ on the ruler? (3 steps)", "answer": "- Step 1: The independent variable $$l$$ is defined as the distance from the fixed contact to the flying lead. If the fixed contact is, say, at $$l = 2\\,\\text{cm}$$ rather than $$0$$, then every reading of $$l$$ is too large by $$2\\,\\text{cm}$$.\n- Step 2: This shifts every data point horizontally by the same amount — a **systematic length error**.\n- Step 3: Unlike contact resistance (which is a vertical shift and cancels out in the gradient), a horizontal shift also doesn't change the gradient of a straight line, so the gradient and hence $$\\rho$$ are *still* unaffected — but the line now misses the origin in a different way, which can mislead interpretation.\n\nBest practice: always align the fixed contact exactly at $$l=0$$ on the ruler to keep the analysis clean and intercept attributable to contact resistance alone.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Given the uncertainty $$\\delta d$$ in the diameter and $$\\delta(\\text{gradient})$$ in the $$R$$ vs $$l$$ slope, how do these combine to give the fractional uncertainty in $$\\rho$$? (3 steps)", "answer": "- Step 1: Since $$A = \\pi d^2/4$$, and $$d$$ is squared, the fractional uncertainty in $$A$$ is **twice** that in $$d$$: $$\\delta A/A = 2\\,\\delta d/d$$.\n- Step 2: Since $$\\rho = \\text{gradient} \\times A$$, and the two factors are independent, fractional uncertainties add: $$\\delta\\rho/\\rho = \\delta(\\text{gradient})/\\text{gradient} + \\delta A/A$$.\n- Step 3: Substituting: $$\\delta\\rho/\\rho = \\delta(\\text{gradient})/\\text{gradient} + 2\\,\\delta d/d$$. The diameter contribution is doubled — which is why micrometer precision and multiple readings of $$d$$ matter so much.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Why does the fractional uncertainty in the diameter get *doubled* when propagated to the cross-sectional area? Reason without just quoting the rule. (3 steps)", "answer": "- Step 1: $$A = \\pi d^2 /4$$, so $$A$$ depends on $$d$$ raised to the **second power**.\n- Step 2: For small fluctuations: if $$d$$ changes by 1%, then $$d^2$$ changes by approximately 2% (since $$(1.01)^2 \\approx 1.02$$). The exponent becomes the multiplier on the fractional error.\n- Step 3: So $$\\delta A/A \\approx 2\\,\\delta d/d$$. In general, for $$y = x^n$$, the fractional uncertainty rule is $$\\delta y/y = |n|\\,\\delta x/x$$.\n\nPractical consequence: even modest improvements in measuring $$d$$ pay off twice over in the area, and hence in resistivity precision.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "A wire has $$R = 5.0\\,\\Omega$$ and carries $$I = 2.0\\,\\text{A}$$. What p.d. is across it, and what does this tell you about the energy delivered? (3 steps)", "answer": "- Step 1: From $$R = V/I$$, rearrange: $$V = IR = 2.0 \\times 5.0 = 10\\,\\text{V}$$.\n- Step 2: $$10\\,\\text{V}$$ means each coulomb of charge passing through the wire loses $$10\\,\\text{J}$$ of energy to the wire (as heat, via collisions).\n- Step 3: With $$2\\,\\text{A}$$ (i.e., $$2\\,\\text{C/s}$$), total power dissipated is $$P = VI = 20\\,\\text{W}$$ — $$20\\,\\text{J}$$ of electrical energy is converted to heat every second.\n\nMental model: $$V$$ is the \"energy tax\" per charge; $$I$$ is the \"charge throughput\"; $$VI$$ is the total energy per second.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "A copper wire of length $$1\\,\\text{m}$$ and diameter $$0.5\\,\\text{mm}$$ has resistivity around $$1.7 \\times 10^{-8}\\,\\Omega\\cdot\\text{m}$$. Estimate the order of magnitude of its resistance without computing exactly. (3 steps)", "answer": "- Step 1: Area $$A \\sim \\pi (0.25 \\times 10^{-3})^2 \\sim 3 \\times (6 \\times 10^{-8}) \\sim 2 \\times 10^{-7}\\,\\text{m}^2$$ — order $$10^{-7}\\,\\text{m}^2$$.\n- Step 2: $$R = \\rho l/A \\sim (1.7 \\times 10^{-8}) \\times 1 / (2 \\times 10^{-7}) \\sim 10^{-1}\\,\\Omega$$.\n- Step 3: So $$R$$ is roughly $$0.1\\,\\Omega$$ — a small fraction of an ohm. This is why a metre of copper wire is essentially a \"zero-resistance\" connector in normal circuits, and why power lines can carry hundreds of amps without overheating absurdly.\n\nThe key takeaway: copper's resistivity is so low ($$10^{-8}$$) that ordinary geometries give resistances well below $$1\\,\\Omega$$.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "A constantan wire's CP7 graph gives gradient $$8\\,\\Omega/\\text{m}$$, and the wire has diameter $$0.2\\,\\text{mm}$$. Walk through (without computing the final number) how to extract resistivity. (4 steps)", "answer": "- Step 1: Convert diameter to metres: $$d = 0.2 \\times 10^{-3}\\,\\text{m}$$.\n- Step 2: Compute the cross-sectional area: $$A = \\pi d^2/4 \\sim \\pi (0.2 \\times 10^{-3})^2/4 \\sim \\pi \\times 10^{-8}\\,\\text{m}^2 \\sim 3 \\times 10^{-8}\\,\\text{m}^2$$.\n- Step 3: Recognise that gradient $$= \\rho/A$$, so $$\\rho = \\text{gradient} \\times A$$.\n- Step 4: Order-of-magnitude estimate: $$\\rho \\sim 8 \\times 3 \\times 10^{-8} \\sim 2 \\times 10^{-7}\\,\\Omega\\cdot\\text{m}$$ — consistent with known constantan values.\n\nThe conceptual move that matters: gradient alone is not resistivity — it must be **multiplied by area**.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Two wires are made of the same material at the same temperature. Wire A is twice as long and twice as thick (in diameter) as wire B. Which has the higher resistance, and by what factor? (3 steps)", "answer": "- Step 1: $$R \\propto l/A \\propto l/d^2$$.\n- Step 2: For wire A relative to wire B: $$l_A = 2 l_B$$ contributes a factor of 2; $$d_A = 2 d_B$$ means $$d_A^2 = 4 d_B^2$$, contributing a factor of $$1/4$$.\n- Step 3: Net: $$R_A/R_B = 2 \\times (1/4) = 1/2$$. So wire A has **half** the resistance of wire B.\n\nIntuition check: making it longer hurts (more material to traverse), but making it thicker helps *more* because of the squared dependence on diameter.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Why does a thicker wire carry more current for the same applied voltage, even though there are \"more electrons to push\"?", "answer": "Counterintuitively, more electrons in a thicker wire is exactly *why* it conducts better. The same voltage produces the same electric field along the wire's length (for a fixed length), which exerts the same force per electron. With more electrons available to drift in parallel (larger cross-section), the total rate of charge flow — current — is larger. Mathematically: $$I = nAvq$$ — current scales linearly with cross-sectional area $$A$$. Equivalently, $$R = \\rho l/A$$ falls as $$A$$ rises, so for fixed $$V$$, $$I = V/R$$ rises.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "A material has resistivity $$10^{-5}\\,\\Omega\\cdot\\text{m}$$. Roughly speaking, would you call it a good conductor, a semiconductor, or an insulator? Justify with comparisons.", "answer": "Typical conductors (copper, aluminium) have $$\\rho \\sim 10^{-8}\\,\\Omega\\cdot\\text{m}$$. Typical insulators (rubber, glass) have $$\\rho \\sim 10^{10}$$ or higher. Semiconductors (silicon, graphite) sit in the middle, around $$10^{-5}$$ to $$10^{3}\\,\\Omega\\cdot\\text{m}$$. So $$10^{-5}\\,\\Omega\\cdot\\text{m}$$ is roughly a thousand times worse than a metal but still many orders of magnitude better than an insulator — characteristic of a **semiconductor or poor conductor** like graphite ($$\\sim 7 \\times 10^{-5}\\,\\Omega\\cdot\\text{m}$$). It would conduct, but noticeably worse than a metal wire.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "A student plots $$R$$ vs $$l$$ for CP7 and finds the line curves slightly upward at higher $$l$$ rather than being straight. What physical effect could cause this, and what should they do?", "answer": "Curvature upward (steeper slope at larger $$l$$) suggests the wire is getting hotter at higher currents/longer measurement times — at longer $$l$$, more power $$I^2R$$ is dissipated, raising temperature and increasing $$\\rho$$ above its room-temperature value. The data points sit higher than the straight-line proportionality predicts. Fix: reduce current further, switch off between readings (longer \"rest\" periods), or use a thicker wire. A genuinely linear plot is a sanity check that the wire was at constant temperature throughout.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "Why is \"current is directly proportional to p.d.\" the correct mark-scheme statement of Ohm's Law, rather than just \"linear\"?", "answer": "\"Linear\" allows any straight line, including one with a non-zero intercept (e.g., $$I = aV + b$$). \"Directly proportional\" specifically requires $$I = aV$$ with $$b = 0$$ — the line passes through the origin, and doubling $$V$$ exactly doubles $$I$$. This distinction matters physically: a non-ohmic component might have a roughly linear $$I$$–$$V$$ region that doesn't pass through the origin (e.g., a diode above its threshold), and that's *not* Ohm's Law behaviour. The \"through origin\" feature is what guarantees constant $$R$$.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "If you measure a wire's resistance with a low current (room temperature) and again with a high current (wire visibly glowing), how do the two values compare and what does this teach about how $$R$$ is reported? (3 steps)", "answer": "- Step 1: Low current: wire stays cool, $$\\rho$$ at its room-temperature value, measured $$R$$ is the \"true\" room-temperature resistance.\n- Step 2: High current: wire heats significantly, $$\\rho$$ rises, measured $$R$$ is *higher* — perhaps by a factor of several for a tungsten filament glowing white-hot.\n- Step 3: This shows that \"the resistance of a wire\" is not a unique number — it's a function of temperature. When values are quoted in tables, they implicitly assume room temperature ($$20\\,^\\circ\\text{C}$$ or $$25\\,^\\circ\\text{C}$$). Reporting $$R$$ without temperature context is incomplete for non-trivial conductors.\n\nThis is exactly why CP7 demands low current — to pin down a well-defined room-temperature value.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "A wire of resistance $$R$$ is cut in half and the two halves connected in parallel. What is the new resistance, and what does this teach about the geometry dependence?", "answer": "Cutting in half: each half has resistance $$R/2$$ (length halved, $$R \\propto l$$). Two such resistors in parallel give $$R_{\\text{parallel}} = (R/2)/2 = R/4$$. Equivalently: putting two wires in parallel doubles the effective area while halving the length, so $$R \\propto l/A$$ falls by a factor of $$2 \\times 2 = 4$$. This shows the **two geometry factors compound multiplicatively** — and explains why power lines use thick, short conductors when possible.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Why doesn't using an ohmmeter (instead of voltmeter + ammeter) eliminate the need for careful technique in CP7?", "answer": "An ohmmeter measures $$R$$ directly by sending its own small current through the wire and measuring the resulting p.d. internally — convenient, but it doesn't change the underlying physics: contact resistance still adds to the measured value, the diameter must still be measured with a micrometer, multiple length readings still need a graph, and the current it injects can still heat the wire if the wire is fine. The ohmmeter simplifies the *electrical* measurement but doesn't bypass any of CP7's error-control principles: low current, multiple readings, graphical extraction of gradient.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "When asked to \"explain the difference between resistance and resistivity\" for marks, what *two* essential ideas must your answer contain?", "answer": "Both halves are needed for full marks: **(1)** Resistance is a property of a *component* (or specific object/wire), depending on its material, length, area, and temperature — measured in $$\\Omega$$. **(2)** Resistivity is an intrinsic property of a *material*, independent of shape and size, depending only on material and temperature — measured in $$\\Omega\\cdot\\text{m}$$, defined by $$\\rho = RA/l$$. A common one-mark answer just says \"resistivity is a material property\" — that's only half the contrast. State explicitly that resistance also depends on geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Sketch (in words) what an $$I$$–$$V$$ graph looks like for a filament lamp, and explain each region. (3 steps)", "answer": "- Step 1: Near the origin (small $$V$$, small $$I$$), the wire is cool — $$R$$ is at its low room-temperature value, so the gradient $$dI/dV$$ is **steep** (small $$R$$ means big $$I$$ per volt).\n- Step 2: As $$V$$ rises, more power dissipates, the filament heats up, $$\\rho$$ and $$R$$ rise. The curve **bends over** — each additional volt produces less additional current than before.\n- Step 3: At high $$V$$, the filament glows hot; $$R$$ is much larger than at room temperature; the gradient is **shallow**. Mirror-image curve in the negative quadrant (reverse polarity has the same effect).\n\nThe single curve is symmetric about the origin (no preferred direction) and characteristic of any non-ohmic device whose resistance depends on temperature.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Why might two ostensibly identical pieces of nichrome wire give slightly different resistivity values when measured in CP7?", "answer": "Several sources: **(1)** Variation in actual diameter along/between wires (manufacturing tolerance) — different averaged $$d$$ gives different $$A$$. **(2)** Composition variation — \"nichrome\" is an alloy whose exact Ni/Cr ratio can vary slightly between batches, changing $$\\rho$$. **(3)** Slight temperature differences during measurement (lab temperature variation, different heating from current). **(4)** Differences in contact pressure introducing different contact resistances (though these largely cancel via the gradient method). **(5)** Random measurement scatter in individual $$V$$ and $$I$$ readings. The graphical method averages over most of these, but cannot eliminate genuine material variation between samples.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "A student finds gradient $$= 7.9\\,\\Omega/\\text{m}$$ for a wire of diameter $$0.2\\,\\text{mm}$$. Without computing exactly, in what order of magnitude range does $$\\rho$$ lie? (3 steps)", "answer": "- Step 1: $$A = \\pi d^2/4 \\sim 3 \\times (0.2 \\times 10^{-3})^2 / 4 \\sim 3 \\times 10^{-8}\\,\\text{m}^2$$.\n- Step 2: $$\\rho = \\text{grad} \\times A \\sim 8 \\times 3 \\times 10^{-8} \\sim 2.4 \\times 10^{-7}\\,\\Omega\\cdot\\text{m}$$.\n- Step 3: Order $$10^{-7}\\,\\Omega\\cdot\\text{m}$$ — consistent with constantan ($$\\sim 5 \\times 10^{-7}$$) or similar alloys, definitely much higher than pure copper ($$10^{-8}$$) but well below semiconductors ($$10^{-5}$$+).\n\nThe estimate is a sanity check: if you compute and get $$10^{-3}$$ or $$10^{-11}$$, you've made a unit conversion error.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "In a power transmission line, why are wires made thick (large $$A$$) even though copper is expensive? Reason from the resistivity equation and power loss.", "answer": "Power lost as heat in a transmission cable is $$P_{\\text{loss}} = I^2 R$$, and $$R = \\rho l/A$$ for a given material and route. The length $$l$$ is fixed by geography, and $$\\rho$$ is fixed by the choice of material. The only easy lever is $$A$$: doubling the cross-section halves $$R$$ and halves the power loss for a given transmitted current. Even though thick copper is expensive upfront, the saved energy (and reduced wire heating) over decades pays back. Going to a thinner wire would dump enormous amounts of energy as heat — wasteful and a fire hazard.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Why does the resistivity of a metal not depend on the shape of the sample, even though resistance does?", "answer": "Resistivity describes a *material* response: how strongly the lattice (with its fixed structure and bonding) impedes electron flow per unit length per unit cross-section. The lattice spacing, electron density, and vibration character are properties of the material at a given temperature — they don't know about the shape of the macroscopic sample. Resistance, on the other hand, is what you get when you \"package\" that material into a specific geometry: $$R = \\rho \\times (\\text{geometry factor } l/A)$$. The material contributes $$\\rho$$; the shape contributes $$l/A$$. Separating them this way is the whole conceptual point of defining resistivity.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "When the CP7 graph's best-fit line is drawn, why use \"maximum and minimum gradient lines\" to estimate the gradient uncertainty?", "answer": "The data points have scatter due to random errors, and the best-fit line passes through the middle of the scatter. Drawing the **steepest plausible line** (max gradient) and the **shallowest plausible line** (min gradient) that still pass through the bulk of the data envelopes the range of acceptable slopes. The uncertainty is half this range: $$\\delta(\\text{gradient}) = (\\text{max} - \\text{min})/2$$. This is a practical way of estimating the uncertainty without statistical regression formulae, and it captures both the random scatter and the visual sensitivity of the gradient to the choice of line.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "What is the role of the ammeter and voltmeter resistances in CP7, and why don't they spoil the measurement?", "answer": "An ideal ammeter has *zero* resistance — it doesn't add to the circuit resistance, so the current it measures truly reflects what's flowing through the wire. An ideal voltmeter has *infinite* resistance — it draws no current, so it doesn't divert flow away from the wire being measured. Real meters approximate these ideals very well (modern digital meters: ammeter resistance milliohms, voltmeter $$\\sim 10\\,\\text{M}\\Omega$$). Since the test wire's resistance is only a few ohms, the meter effects are typically $$<1\\%$$ — small compared to other uncertainties. If using a very low-resistance wire, however, the
