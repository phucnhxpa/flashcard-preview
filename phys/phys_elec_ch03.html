atomic structure (fixed by chemistry) and how strongly the lattice vibrates (set by temperature). It is geometry-independent: a cubic millimetre of copper has the same $$\\rho$$ as a kilometre-long copper cable. Resistance, in contrast, is an *engineering* quantity for a particular shape: take the same material and stretch it longer or thinner, and the resistance changes via $$R = \\rho l/A$$ — even though $$\\rho$$ itself is unchanged. Material + temperature set the intrinsic *quality* of conduction; geometry sets the *amount* of material the current must traverse.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Phuc once asked whether a resistor \"stores\" the electrons that don't make it through. Why is this a misconception, and what is actually happening? (3 steps)", "answer": "- Step 1: Charge is conserved. The same number of electrons that enter a resistor per second must leave it per second in steady state — otherwise charge would pile up indefinitely.\n- Step 2: A resistor doesn't reduce the *count* of electrons, it reduces their *drift speed* via collisions. Current $$I = nAvq$$ drops because $$v$$ drops, not because $$n$$ vanishes.\n- Step 3: So if \"10 electrons/sec\" enter, \"10 electrons/sec\" still exit — but they exit with a smaller average drift velocity, and the *circuit current* is determined by whatever rate the resistor allows the whole loop to settle into.\n\nThe mental image: a resistor is a *slowdown zone*, not a storage tank.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Why is graphite (a non-metal) a moderately good conductor, with resistivity $$\\sim 7 \\times 10^{-5}\\,\\Omega\\cdot\\text{m}$$?", "answer": "Graphite has a layered crystal structure: within each layer, carbon atoms are bonded in a hexagonal network where three of carbon's four valence electrons form covalent bonds, and the **fourth electron is delocalised** across the layer. These delocalised electrons act like a 2D electron gas, free to drift and carry current — much like free electrons in a metal. So graphite conducts *along* its layers reasonably well. It's not as good as copper (whose entire valence cloud is delocalised in 3D), but vastly better than insulators with no free charge carriers. This explains its use in pencil \"lead\" being measurable as a resistor in lab experiments.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "For semiconductors (e.g., thermistors), why does resistivity ρ decrease with temperature? Contrast this with metals using charge carrier behavior. (4 steps)", "answer": "- Step 1: **Metals**:\n+ Lattice vibrations dominate → higher temperature → more collisions → ↑ρ.\n\n- Step 2: **Semiconductors**:\n+ Thermal energy frees more charge carriers (electrons/holes).\n+ Carrier density ↑ → ρ ↓ despite increased lattice vibrations.\n\n- Step 3: **Dominant factor**:\n+ Carrier density effect > lattice vibration effect in semiconductors.\n\n- Step 4: **Mathematical contrast**:\n+ Metals: ρ ∝ T.\n+ Semiconductors: ρ ∝ e^(-E_gap/(kT)) (exponential decrease).", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "A battery supplies current to a circuit containing a resistor. A student claims \"the resistor stores the extra electrons that don't make it through.\" Why is this wrong?", "answer": "This is a misconception. A resistor does not store or accumulate electrons.\n\n- Step 1: In a series circuit, current is the same at every point — the same number of electrons per second enters and leaves the resistor. There is no \"build-up.\"\n- Step 2: What the resistor does is slow electrons down through collisions with lattice ions. This reduces the **drift velocity**, and therefore the current, throughout the entire circuit simultaneously.\n- Step 3: Think of it like a narrow section of pipe restricting water flow: the flow rate drops everywhere in the pipe, not just after the narrow section. Water doesn't accumulate inside the constriction.\n- Step 4: The energy from collisions is dissipated as **heat** ($$P = I^2 R$$), not stored as electrons.\n\nThe correct mental model: resistance is like friction that slows all the traffic, not a parking lot that traps cars.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "A student plots $$R$$ vs $$l$$ for CP7 and finds the line curves slightly upward at higher $$l$$ rather than being straight. What physical effect could cause this, and what should they do?", "answer": "Curvature upward (steeper slope at larger $$l$$) suggests the wire is getting hotter at higher currents/longer measurement times — at longer $$l$$, more power $$I^2R$$ is dissipated, raising temperature and increasing $$\\rho$$ above its room-temperature value. The data points sit higher than the straight-line proportionality predicts. Fix: reduce current further, switch off between readings (longer \"rest\" periods), or use a thicker wire. A genuinely linear plot is a sanity check that the wire was at constant temperature throughout.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "What is the role of the ammeter and voltmeter resistances in CP7, and why don't they spoil the measurement?", "answer": "An ideal ammeter has *zero* resistance — it doesn't add to the circuit resistance, so the current it measures truly reflects what's flowing through the wire. An ideal voltmeter has *infinite* resistance — it draws no current, so it doesn't divert flow away from the wire being measured. Real meters approximate these ideals very well (modern digital meters: ammeter resistance milliohms, voltmeter $$\\sim 10\\,\\text{M}\\Omega$$). Since the test wire's resistance is only a few ohms, the meter effects are typically $$<1\\%$$ — small compared to other uncertainties. If using a very low-resistance wire, however, the ammeter's resistance could become significant.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "Why is constantan often used for CP7 rather than copper? (3 steps)", "answer": "- Step 1: Copper has very low resistivity ($$\\sim 10^{-8}\\,\\Omega\\cdot\\text{m}$$). A 1 m wire of typical diameter has resistance of order $$10^{-1}\\,\\Omega$$ — comparable to contact resistance, so the signal-to-noise is poor.\n- Step 2: Constantan ($$\\rho \\sim 5 \\times 10^{-7}\\,\\Omega\\cdot\\text{m}$$) has ~30× higher resistivity, giving a comfortably measurable $$R$$ over a 1 m sample.\n- Step 3: Constantan's resistivity is also very weakly temperature-dependent — so small heating effects during the experiment don't spoil the measurement. Both properties make it ideal.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "In Core Practical 7, describe the key steps of the method from measuring the diameter to calculating resistivity. (4 steps)", "answer": "- Step 1: Measure the diameter of the wire using a micrometer at 5–10 different positions and orientations along the wire. Calculate the mean diameter $$\\bar{d}$$. Check for zero error on the micrometer before use.\n- Step 2: Set up the circuit: tape the wire along a metre ruler, connect an ammeter in series and a voltmeter in parallel across the test length. Use a flying lead (crocodile clip) to select different lengths.\n- Step 3: For each length (e.g., 0.25 m, 0.50 m, ...), switch on briefly, record $$V$$ and $$I$$, then switch off immediately. Calculate $$R = V/I$$ for each length. Take at least 3 current readings per length and average.\n- Step 4: Plot a graph of $$R$$ (y-axis) against $$l$$ (x-axis). Draw the best-fit straight line. The gradient equals $$\\rho/A$$, so calculate $$\\rho = \\text{gradient} \\times A$$, where $$A = \\pi \\bar{d}^2 / 4$$.\n\nTakeaway: Measure diameter → vary length → record V and I → plot R vs l → gradient × A = ρ.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "In a power transmission line, why are wires made thick (large $$A$$) even though copper is expensive? Reason from the resistivity equation and power loss.", "answer": "Power lost as heat in a transmission cable is $$P_{\\text{loss}} = I^2 R$$, and $$R = \\rho l/A$$ for a given material and route. The length $$l$$ is fixed by geography, and $$\\rho$$ is fixed by the choice of material. The only easy lever is $$A$$: doubling the cross-section halves $$R$$ and halves the power loss for a given transmitted current. Even though thick copper is expensive upfront, the saved energy (and reduced wire heating) over decades pays back. Going to a thinner wire would dump enormous amounts of energy as heat — wasteful and a fire hazard.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "In Core Practical 7, why should the current through the wire be kept small? Relate this to the formula R = ρl/A and the temperature dependence of resistivity. (3 steps)", "answer": "- Step 1: **Heating effect**: Current I → power P = I²R → temperature ↑.\n- Step 2: **Temperature impact on ρ**:\n+ For metals: ρ ∝ T → heating ↑ρ → ↑R.\n- Step 3: **Measurement corruption**:\n+ R = ρl/A → if ρ ↑ due to heating, measured R is artificially high → calculated ρ (from gradient) is wrong.", "source": "Qwen 3 ②", "_id": "qwen_2_9"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A student measures the potential difference across a component as 6 V and the current through it as 2 A. They claim the resistance is 12 Ω. What fundamental mistake did they make, and what is the correct resistance? (3 steps)", "answer": "- Step 1: Identify the mistake. The student multiplied voltage and current ($$R = V \\times I = 6 \\times 2 = 12$$). Resistance is defined as the ratio of potential difference to current, not their product. This is a common trap where students confuse the formula for resistance with the formula for power ($$P = VI$$).\n- Step 2: Apply the correct definition. The formula for resistance is $$R = \\frac{V}{I}$$. Resistance measures how much the component opposes the flow of charge per unit of driving force (voltage), so it makes physical sense to divide the driving force by the resulting flow.\n- Step 3: Calculate the correct value. Substitute the values: $$R = \\frac{6 \\text{ V}}{2 \\text{ A}} = 3 \\text{ } \\Omega$$. The correct resistance is 3 Ω.\n\nAlways divide V by I; multiplying them gives power, not resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "At a microscopic level, why does a metal wire resist the flow of electrons, and why does this process cause the wire to heat up? Does the resistor \"store\" the lost electrons? (3 steps)", "answer": "- Step 1: Consider the lattice structure. A metal wire consists of a lattice of vibrating positive ions surrounded by a sea of delocalised (free) electrons. When a potential difference is applied, electrons drift, but they constantly collide with these vibrating lattice ions.\n- Step 2: Explain the resistance and heating. Each collision transfers kinetic energy from the moving electron to the lattice ion. This reduces the electron's drift velocity (opposing current = resistance) and increases the amplitude of the lattice's vibrations (thermal energy = heating).\n- Step 3: Address the storage misconception. The resistor does not \"store\" or accumulate electrons. The total number of electrons entering and leaving the resistor per second is the same (conservation of charge). The resistor slows down the *rate of flow* (current), it doesn't trap them.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "Ohm's Law states that current is directly proportional to potential difference. What crucial condition must be met for this law to hold true, and what happens physically if this condition is violated? (2 steps)", "answer": "- Step 1: State the condition. Ohm's Law only holds if the temperature of the conductor remains constant. It is specifically defined for a metallic conductor at constant temperature.\n- Step 2: Explain what happens if violated. If current flows, collisions heat the lattice (Joule heating). If temperature rises, lattice ions vibrate more vigorously, increasing collision frequency, which increases resistance. Therefore, $$V$$ is no longer directly proportional to $$I$$, and the conductor becomes non-ohmic.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "How can you distinguish between an ohmic and a non-ohmic conductor by looking at their I-V characteristics, and what does the gradient of an I-V graph physically represent? (3 steps)", "answer": "- Step 1: Describe the ohmic graph. An ohmic conductor produces a straight line through the origin on an I-V graph. This shows direct proportionality ($$I \\propto V$$), meaning resistance is constant regardless of the applied voltage.\n- Step 2: Describe the non-ohmic graph. A non-ohmic conductor produces a curve. The changing gradient indicates that resistance varies with the applied voltage or current.\n- Step 3: Identify the gradient. Since the graph is I (y-axis) vs V (x-axis), the gradient is $$\\frac{\\Delta I}{\\Delta V}$$. Because $$R = \\frac{V}{I}$$, the gradient is the reciprocal of resistance: $$\\text{gradient} = \\frac{1}{R}$$. A steeper gradient means lower resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A copper wire and a wooden rod are both 1 m long. The copper wire has low resistance, while the wood has extremely high resistance. Is this difference due to resistance or resistivity? Explain the distinction. (3 steps)", "answer": "- Step 1: Define Resistance. Resistance ($$R$$) is a property of a specific component. It depends on the material's resistivity, the component's length, and its cross-sectional area. It measures how much that specific object opposes current.\n- Step 2: Define Resistivity. Resistivity ($$\\rho$$) is an intrinsic property of a material itself, independent of the shape or size of the sample. It measures how strongly the material inherently opposes current.\n- Step 3: Apply to the example. The difference is due to *resistivity*. Copper has a very low resistivity ($$\\approx 1.72 \\times 10^{-8} \\text{ } \\Omega \\cdot \\text{m}$$), making it a good conductor. Wood has an extremely high resistivity, making it an insulator. Even if you changed the length or thickness of the wood, its resistivity (and its nature as an insulator) would remain the same.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Why does the resistance of a wire double if its length is doubled, but quarter if its cross-sectional area is doubled? Use the \"pipe\" analogy to explain. (3 steps)", "answer": "- Step 1: Explain length dependence ($$R \\propto l$$). Imagine the wire as a pipe. If you double the length of the pipe, the electrons have to travel twice as far. They will encounter twice as many lattice ions, leading to twice as many collisions. This makes it twice as hard to push current through, so resistance doubles.\n- Step 2: Explain area dependence ($$R \\propto \\frac{1}{A}$$). If you double the cross-sectional area, you've essentially provided two parallel paths for the current (like having two identical pipes side-by-side). Twice the area means twice the number of conduction electrons available to carry charge per unit time, so the resistance halves. Note: doubling area doesn't double radius/diameter; it doubles the area itself.\n- Step 3: Combine into the formula. Combining these proportionalities, $$R \\propto \\frac{l}{A}$$. To make this an equation, we introduce the constant of proportionality, which is the resistivity $$\\rho$$: $$R = \\frac{\\rho l}{A}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "The unit of resistance is the ohm ($$\\Omega$$). By deriving from the formula $$R = \\frac{\\rho l}{A}$$, what is the SI unit of resistivity, and why is it incorrect to write it as $$\\Omega / \\text{m}$$? (2 steps)", "answer": "- Step 1: Derive the unit. Rearrange the formula for resistivity: $$\\rho = \\frac{R A}{l}$$. Substitute the units: Resistance is in $$\\Omega$$, Area is in $$\\text{m}^2$$, and length is in $$\\text{m}$$. Therefore, the unit is $$\\frac{\\Omega \\cdot \\text{m}^2}{\\text{m}} = \\Omega \\cdot \\text{m}$$.\n- Step 2: Explain the common error. Writing $$\\Omega / \\text{m}$$ suggests resistance per unit length, which is only true if the cross-sectional area is constant and defined. Resistivity is a bulk property that accounts for both length and area. The unit $$\\Omega \\cdot \\text{m}$$ correctly reflects the algebraic combination of area and length in the defining equation.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "A student measures the diameter of a wire as $$d$$. They calculate the cross-sectional area as $$A = \\pi d^2$$. What is wrong with this calculation, and what is the correct formula? (2 steps)", "answer": "- Step 1: Identify the error. The formula for the area of a circle is $$A = \\pi r^2$$, where $$r$$ is the radius. The student substituted the diameter $$d$$ where the radius $$r$$ should go. This results in an area that is 4 times too large.\n- Step 2: Provide the correct formula. Since radius is half the diameter ($$r = \\frac{d}{2}$$), substitute this into the area formula: $$A = \\pi \\left(\\frac{d}{2}\\right)^2 = \\pi \\frac{d^2}{4} = \\frac{\\pi d^2}{4}$$. Always use the radius, or divide the diameter squared by 4.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "A micrometer measures a wire's diameter as 0.25 mm. A student converts this to metres by writing $$0.25 \\times 10^{-6}$$ m. Why is this wrong, and what is the correct conversion? (2 steps)", "answer": "- Step 1: Identify the prefix confusion. The student has confused the \"milli\" (mm) prefix with the \"micro\" ($$\\mu$$m) prefix. The \"milli\" prefix means $$10^{-3}$$, not $$10^{-6}$$.\n- Step 2: Apply the correct conversion. To convert millimetres to metres, you multiply by $$10^{-3}$$. Therefore, $$0.25 \\text{ mm} = 0.25 \\times 10^{-3} \\text{ m} = 2.5 \\times 10^{-4} \\text{ m}$$. The student's error would make the area (which depends on $$d^2$$) too small by a factor of $$10^6$$, and the calculated resistivity too small by $$10^6$$.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "As a metal wire heats up, its resistance increases. Explain this phenomenon at the microscopic level. (2 steps)", "answer": "- Step 1: Describe the initial state. In a metal, conduction electrons drift through a lattice of positive ions. At a low temperature, the ions vibrate gently, and electrons pass through relatively easily.\n- Step 2: Describe the heating effect. When temperature increases, the lattice ions gain thermal energy and vibrate more vigorously and with greater amplitude. This increases the probability of collisions between the drifting electrons and the lattice ions. More frequent collisions mean the electrons are impeded more, increasing the resistance (and resistivity).", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Unlike metals, the resistance of a semiconductor (like an NTC thermistor) decreases as temperature increases. What is the primary microscopic reason for this opposite behaviour? (2 steps)", "answer": "- Step 1: Identify the key difference. In a metal, the number of free charge carriers is essentially constant. In a semiconductor, many charge carriers are bound and not free to conduct at low temperatures.\n- Step 2: Explain the heating effect. As temperature increases in a semiconductor, thermal energy frees more charge carriers from their atoms. The increase in the number of free charge carriers (which increases conductivity) outweighs the effect of increased lattice vibrations (which increases resistance). Therefore, the overall resistance decreases as temperature rises.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "The I-V graph for a filament lamp curves and flattens out at higher voltages. Explain why it is not a straight line and what the flattening indicates. (3 steps)", "answer": "- Step 1: State the component's nature. A filament lamp is made of a thin metal wire (tungsten) that is designed to get very hot and glow.\n- Step 2: Explain the self-heating. As voltage (and current) increases, the power dissipated ($$P = I^2 R$$) increases, causing the filament's temperature to rise significantly.\n- Step 3: Connect to the curve. As temperature rises, the metal's resistance increases (due to increased lattice vibrations). Because R is increasing, the current does not increase proportionally with voltage. The gradient of the I-V graph ($$1/R$$) decreases, causing the curve to flatten.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "In Core Practical 7 (measuring resistivity), it is crucial to keep the current low and switch off the power supply between readings. What would happen to your results if you ignored this precaution? (2 steps)", "answer": "- Step 1: Identify the physical effect. A high continuous current would cause Joule heating ($$P = I^2 R$$) in the wire, raising its temperature.\n- Step 2: Explain the consequence for the experiment. The experiment assumes resistivity ($$\\rho$$) is constant. If the wire heats up, its resistivity increases (since it's a metal). You would be measuring a changing value of $$\\rho$$, leading to inconsistent resistance readings and a falsely high calculated resistivity.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Why must you measure the wire's diameter at several different positions and orientations using a micrometer, rather than just once? (2 steps)", "answer": "- Step 1: Address non-circularity. The wire may not have a perfectly circular or uniform cross-section along its entire length. Measuring at different orientations checks for an elliptical shape (non-circularity).\n- Step 2: Address random error. Measuring at multiple positions and averaging reduces the effect of random errors (like slight variations in wire thickness or small reading errors) and gives a more representative mean diameter. Since area is proportional to $$d^2$$, a small error in $$d$$ significantly affects the calculated area.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "In CP7, you plot a graph of Resistance (y-axis) against Length (x-axis). How do you extract the resistivity from this graph? (3 steps)", "answer": "- Step 1: State the governing equation. The relationship is $$R = \\frac{\\rho l}{A}$$.\n- Step 2: Compare to the straight-line equation. Rearrange to match $$y = mx + c$$: $$R = \\left(\\frac{\\rho}{A}\\right) l + 0$$. Here, $$y = R$$, $$x = l$$, and the gradient $$m = \\frac{\\rho}{A}$$.\n- Step 3: Calculate resistivity. Calculate the gradient of the line of best fit. Then, rearrange the gradient equation to find resistivity: $$\\rho = \\text{gradient} \\times A$$. Remember to multiply by the cross-sectional area—this is a very common exam trap!", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "In an ideal CP7 experiment, the R vs l graph passes through the origin. However, a student's graph has a positive y-intercept. What does this intercept represent, and does it affect the calculated resistivity? (2 steps)", "answer": "- Step 1: Identify the intercept's meaning. A positive y-intercept means there is resistance when the length of the test wire is zero. This is caused by \"contact resistance\"—resistance at the connections between the wire and the crocodile clips/circuit leads.\n- Step 2: Assess the impact on resistivity. This contact resistance is a constant systematic error. However, because it only shifts the line upwards (affecting the intercept), it does not change the gradient of the line. Since resistivity is calculated from the gradient, the calculated resistivity is unaffected.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Why is plotting a graph and using the gradient preferred over calculating resistivity from a single pair of resistance and length readings? (2 steps)", "answer": "- Step 1: Reducing random error. A single reading might contain a significant random error. A graph averages over multiple data points, minimising the effect of random scatter and providing a more reliable value for the gradient.\n- Step 2: Eliminating systematic error. As noted previously, a graph can eliminate the effect of constant systematic errors (like contact resistance) that shift the line but don't change the gradient. A single reading would fully incorporate this systematic error into the resistance value.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "The fractional uncertainty in a wire's diameter is 2%. What is the fractional uncertainty in its cross-sectional area, and why? (2 steps)", "answer": "- Step 1: Relate area to diameter. The cross-sectional area is given by $$A = \\frac{\\pi d^2}{4}$$. Notice that area is proportional to the square of the diameter ($$A \\propto d^2$$).\n- Step 2: Calculate fractional uncertainty. When a quantity is raised to a power, its fractional uncertainty is multiplied by that power. Therefore, $$\\frac{\\Delta A}{A} = 2 \\times \\frac{\\Delta d}{d} = 2 \\times 2\\% = 4\\%$$. This doubling effect makes precise diameter measurement critical in CP7.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "In CP7, the resistivity is calculated as $$\\rho = \\text{gradient} \\times A$$. If the fractional uncertainty in the gradient is 3% and the fractional uncertainty in area is 4%, what is the total fractional uncertainty in the resistivity? (2 steps)", "answer": "- Step 1: Identify the mathematical operation. The formula $$\\rho = \\text{gradient} \\times A$$ involves the multiplication of two quantities.\n- Step 2: Apply the uncertainty rule. When quantities are multiplied or divided, their fractional (or percentage) uncertainties are added. Therefore, $$\\frac{\\Delta \\rho}{\\rho} = \\frac{\\Delta \\text{gradient}}{\\text{gradient}} + \\frac{\\Delta A}{A} = 3\\% + 4\\% = 7\\%$$.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A wire has resistance $$R$$. If the length of the wire is doubled and the diameter is halved, what is the new resistance in terms of $$R$$? (3 steps)", "answer": "- Step 1: State the relationship. Resistance is given by $$R = \\frac{\\rho l}{A}$$. We can also express area in terms of diameter: $$A = \\frac{\\pi d^2}{4}$$, so $$R \\propto \\frac{l}{d^2}$$.\n- Step 2: Evaluate the length change. Length is doubled ($$l \\rightarrow 2l$$). Since $$R \\propto l$$, doubling the length doubles the resistance (factor of 2).\n- Step 3: Evaluate the diameter change. Diameter is halved ($$d \\rightarrow \\frac{d}{2}$$). Since $$R \\propto \\frac{1}{d^2}$$, the new resistance is proportional to $$\\frac{1}{(d/2)^2} = \\frac{4}{d^2}$$. This increases resistance by a factor of 4.\n- Step 4: Combine the factors. Total new resistance = $$2 \\times 4 \\times R = 8R$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Wire X has resistivity $$\\rho$$, length $$l$$, and diameter $$d$$. Wire Y has resistivity $$2\\rho$$, length $$2l$$, and diameter $$2d$$. How does the resistance of Wire Y compare to Wire X? (3 steps)", "answer": "- Step 1: Write the resistance ratio. $$\\frac{R_Y}{R_X} = \\frac{\\rho_Y l_Y / A_Y}{\\rho_X l_X / A_X}$$. Since $$A \\propto d^2$$, we can write this as $$\\frac{\\rho_Y l_Y d_X^2}{\\rho_X l_X d_Y^2}$$.\n- Step 2: Substitute the given ratios. $$\\rho_Y = 2\\rho_X$$, $$l_Y = 2l_X$$, and $$d_Y = 2d_X$$. So, $$\\frac{R_Y}{R_X} = \\frac{(2\\rho_X) (2l_X) d_X^2}{\\rho_X l_X (2d_X)^2}$$.\n- Step 3: Simplify. The numerator has factors of 2 and 2 (total 4). The denominator has $$2^2 = 4$$ from the diameter term. So, $$\\frac{R_Y}{R_X} = \\frac{4 \\rho_X l_X d_X^2}{4 \\rho_X l_X d_X^2} = 1$$. The resistance of Wire Y is the same as Wire X.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "As the temperature of a metal approaches absolute zero, its resistivity decreases. What is the limiting case called when resistivity reaches exactly zero, and what is a practical consequence? (2 steps)", "answer": "- Step 1: Name the phenomenon. When a material is cooled below a certain critical temperature and its resistivity drops to exactly zero, it becomes a superconductor. There is no opposition to current flow.\n- Step 2: State a practical consequence. With zero resistance, a current can flow indefinitely without any power loss ($$P = I^2 R = 0$$). This is used in powerful electromagnets (like in MRI machines) and could reduce energy loss in power transmission.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "A component has a potential difference of 12 V across it and a current of 3 A flowing through it. What is its resistance?", "answer": "Use the definition of resistance. $$R = \\frac{V}{I} = \\frac{12}{3} = 4 \\text{ } \\Omega$$. Remember to divide, not multiply!", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A wire has a resistance of 10 $$\\Omega$$. If the length is tripled but the diameter remains the same, what is the new resistance? (2 steps)", "answer": "- Step 1: Identify the relationship. $$R = \\frac{\\rho l}{A}$$. If diameter is constant, area $$A$$ is constant. Therefore, $$R \\propto l$$.\n- Step 2: Apply the change. If length is tripled, resistance also triples. New resistance = $$3 \\times 10 = 30 \\text{ } \\Omega$$.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "In a CP7 experiment, the gradient of the R vs l graph is found to be $$4 \\text{ } \\Omega/\\text{m}$$. The cross-sectional area of the wire is $$2 \\times 10^{-7} \\text{ m}^2$$. What is the resistivity of the wire? (2 steps)", "answer": "- Step 1: Recall the relationship between gradient and resistivity. Gradient = $$\\frac{\\rho}{A}$$, so $$\\rho = \\text{gradient} \\times A$$.\n- Step 2: Substitute the values. $$\\rho = 4 \\times (2 \\times 10^{-7}) = 8 \\times 10^{-7} \\text{ } \\Omega \\cdot \\text{m}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}], "count": 25}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A component has a potential difference of 6 V across it and a current of 0.12 A through it. What is its resistance, and what equation defines resistance? (2 steps)", "answer": "- Step 1: Resistance is defined by the equation $$R = \\frac{V}{I}$$, where $$V$$ is the potential difference across the component and $$I$$ is the current through it. The unit is the ohm ($$\\Omega$$), where $$1\\;\\Omega = 1\\;\\text{V/A}$$.\n- Step 2: Substituting the values: $$R = \\frac{6}{0.12} = 50\\;\\Omega$$. Note: you always divide voltage by current — never multiply them.\n\nTakeaway: $$R = V/I$$, not $$R = VI$$. This was a confirmed mistake in a real lesson — always divide.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A student calculates resistance by multiplying current and voltage together. Why is this physically wrong, and what quantity does $$V \\times I$$ actually represent? (2 steps)", "answer": "- Step 1: Resistance is defined as the ratio of potential difference to current: $$R = V/I$$. Multiplying them gives $$V \\times I$$, which is the formula for **power** ($$P = VI$$, in watts), not resistance. The student is confusing two completely different physical quantities.\n- Step 2: The units of $$V \\times I$$ are $$\\text{V} \\cdot \\text{A} = \\text{W}$$ (watts), whereas resistance has units of $$\\Omega = \\text{V/A}$$. These are dimensionally different — one measures energy transfer rate, the other measures opposition to current.\n\nTakeaway: $$R = V/I$$ gives ohms; $$V \\times I$$ gives watts. Never confuse the two.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "Ohm's Law states that current is \"directly proportional\" to potential difference for a metallic conductor. What specific condition must be satisfied for this proportionality to hold, and what happens if it isn't? (2 steps)", "answer": "- Step 1: Ohm's Law requires that the **temperature remains constant**. The full statement is: for a metallic conductor at constant temperature, the current is directly proportional to the potential difference ($$I \\propto V$$), meaning resistance $$R$$ is constant.\n- Step 2: If temperature is not constant (e.g., a filament lamp heats up as current flows), the resistance changes, the proportionality breaks down, and the component becomes non-ohmic. The I–V graph curves instead of being a straight line through the origin.\n\nTakeaway: Ohm's Law is not just \"linear\" — it requires constant temperature, which guarantees constant resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "How can you distinguish an ohmic conductor from a non-ohmic conductor by looking at their I–V graphs? (2 steps)", "answer": "- Step 1: An **ohmic conductor** produces a straight-line I–V graph that passes through the origin. The gradient of this line is $$1/R$$ (since $$I = V/R$$), and because $$R$$ is constant, the gradient is constant everywhere.\n- Step 2: A **non-ohmic conductor** produces a curved I–V graph. The gradient from the origin changes along the curve, meaning the resistance is not constant. For a filament lamp, the curve flattens at higher currents because resistance increases as the lamp heats up.\n\nTakeaway: Straight line through origin = ohmic (constant $$R$$); curve = non-ohmic (changing $$R$$).", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "On an I–V graph for a filament lamp, the curve becomes less steep (flatter) at higher voltages. Explain microscopically why the resistance increases. (3 steps)", "answer": "- Step 1: As current increases through the filament, more electrons flow per second, and more collisions occur between the conduction electrons and the lattice ions. These collisions transfer kinetic energy to the lattice, heating it up.\n- Step 2: At higher temperature, the lattice ions vibrate more vigorously about their fixed positions. This increases the effective cross-section of each ion and the probability of collisions with the drifting electrons.\n- Step 3: More frequent and more energetic collisions reduce the mean drift velocity of the electrons, which reduces the current for a given voltage. Since $$R = V/I$$ and $$I$$ increases less than proportionally with $$V$$, the resistance $$R$$ increases with temperature.\n\nTakeaway: More current → more heating → more lattice vibration → more collisions → higher resistance. This positive feedback makes the filament lamp non-ohmic.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "A student says: \"A resistor stores electrons — that's why the current coming out is less than the current going in.\" Explain why this is wrong, and describe what actually happens. (2 steps)", "answer": "- Step 1: A resistor does **not** store electrons. In a series circuit, the current is the same at every point — the same number of electrons per second enters and leaves the resistor. The resistor does not accumulate or trap charge.\n- Step 2: What the resistor does is **slow down** the electrons. Collisions between the drifting electrons and the lattice ions reduce the electrons' drift velocity. A lower drift velocity means a lower current ($$I = nAvq$$). The \"missing\" kinetic energy is transferred to the lattice as thermal energy (heat). The resistor opposes the flow — it doesn't hoard electrons.\n\nTakeaway: Resistors slow electrons via collisions; they don't store them. Current in = current out (in series).", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "What is resistivity, and how does it differ from resistance? Give a concrete example to illustrate. (3 steps)", "answer": "- Step 1: **Resistance** ($$R$$, in $$\\Omega$$) is a property of a specific component — it depends on the material the component is made from, its length, and its cross-sectional area. Two copper wires of different thicknesses and lengths have different resistances.\n- Step 2: **Resistivity** ($$\\rho$$, in $$\\Omega \\cdot \\text{m}$$) is an intrinsic property of a **material** — it measures how strongly that material opposes current flow, regardless of the shape or size of the object made from it. Two copper wires of different thicknesses and lengths have the **same** resistivity (at the same temperature).\n- Step 3: For example, a thin long copper wire and a thick short copper wire have very different resistances, but both have the same resistivity ($$\\rho \\approx 1.72 \\times 10^{-8}\\;\\Omega \\cdot \\text{m}$$). Resistivity depends only on the material and its temperature.\n\nTakeaway: Resistance = property of a component; Resistivity = intrinsic property of a material.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Why does resistance increase with the length of a conductor? Give both an intuitive explanation and the formal proportionality. (2 steps)", "answer": "- Step 1: Intuitively, a longer conductor means electrons must travel a greater distance through the material, encountering more lattice ions along the way. Each collision slows the electron and transfers energy to the lattice. More length → more collisions → greater total opposition to flow. Think of walking through a crowded corridor: the longer it is, the more people you bump into.\n- Step 2: Formally, experiment shows $$R \\propto l$$, meaning doubling the length doubles the resistance. This is one of the two proportionalities that combine to give $$R = \\rho l / A$$.\n\nTakeaway: $$R \\propto l$$ — longer wire means more collisions, more resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Why does resistance decrease with increasing cross-sectional area? Give both an intuitive explanation and the formal proportionality. (2 steps)", "answer": "- Step 1: Intuitively, a larger cross-sectional area provides more parallel paths for electrons to flow through simultaneously. Just as a wider pipe allows more water to flow, a thicker wire allows more electrons to drift side-by-side, increasing the total current for the same voltage and thus decreasing the resistance.\n- Step 2: Formally, experiment shows $$R \\propto 1/A$$, meaning doubling the area halves the resistance. Combined with $$R \\propto l$$, this gives $$R = \\rho l / A$$.\n\nTakeaway: $$R \\propto 1/A$$ — thicker wire means more parallel paths, less resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Starting from the two proportionalities $$R \\propto l$$ and $$R \\propto 1/A$$, derive the resistivity equation and show that the unit of resistivity is $$\\Omega \\cdot \\text{m}$$. (3 steps)", "answer": "- Step 1: Combine the two proportionalities: $$R \\propto l$$ and $$R \\propto 1/A$$ together give $$R \\propto \\frac{l}{A}$$. Introducing a constant of proportionality $$\\rho$$: $$R = \\frac{\\rho l}{A}$$.\n- Step 2: Rearrange for $$\\rho$$: $$\\rho = \\frac{RA}{l}$$. Now substitute the SI units: $$R$$ is in $$\\Omega$$, $$A$$ is in $$\\text{m}^2$$, and $$l$$ is in $$\\text{m}$$.\n- Step 3: $$[\\rho] = \\frac{\\Omega \\cdot \\text{m}^2}{\\text{m}} = \\Omega \\cdot \\text{m}$$. The unit is ohm-metres, **not** ohms per metre ($$\\Omega/\\text{m}$$). Writing $$\\Omega/\\text{m}$$ is dimensionally inconsistent with $$\\rho = RA/l$$.\n\nTakeaway: The unit of resistivity is $$\\Omega \\cdot \\text{m}$$, derived directly from $$\\rho = RA/l$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "A common exam error is writing the unit of resistivity as $$\\Omega/\\text{m}$$ (ohms per metre) instead of $$\\Omega \\cdot \\text{m}$$ (ohm-metres). Show that $$\\Omega/\\text{m}$$ is dimensionally inconsistent with the resistivity equation. (2 steps)", "answer": "- Step 1: From the defining equation $$\\rho = RA/l$$, the units are $$\\frac{\\Omega \\times \\text{m}^2}{\\text{m}} = \\Omega \\cdot \\text{m}$$. The metre from area ($$\\text{m}^2$$) partially cancels the metre from length ($$\\text{m}$$), leaving one metre multiplied by ohms.\n- Step 2: If resistivity had units of $$\\Omega/\\text{m}$$, then $$R = \\rho l / A$$ would give units of $$\\frac{(\\Omega/\\text{m}) \\times \\text{m}}{\\text{m}^2} = \\frac{\\Omega}{\\text{m}^2}$$, which is not ohms. The equation would be dimensionally wrong. Only $$\\Omega \\cdot \\text{m}$$ makes $$R = \\rho l / A$$ dimensionally consistent.\n\nTakeaway: $$\\Omega \\cdot \\text{m}$$ (multiply), not $$\\Omega/\\text{m}$$ (divide). Check dimensions to verify.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "A wire has a circular cross-section with diameter $$d$$. Derive the formula for the cross-sectional area $$A$$ in terms of $$d$$, and identify the common mistake students make. (2 steps)", "answer": "- Step 1: The area of a circle is $$A = \\pi r^2$$. Since the radius $$r = d/2$$, substituting gives $$A = \\pi \\left(\\frac{d}{2}\\right)^2 = \\pi \\times \\frac{d^2}{4} = \\frac{\\pi d^2}{4}$$.\n- Step 2: The common mistake is substituting the diameter directly into $$\\pi r^2$$, writing $$A = \\pi d^2$$. This gives an area that is **4 times too large** (since $$(d/2)^2 = d^2/4$$, not $$d^2$$). This error propagates into the resistivity calculation, making $$\\rho$$ wrong by a factor of 4.\n\nTakeaway: Always use $$A = \\pi d^2/4$$ for a wire, or compute $$r = d/2$$ first then use $$A = \\pi r^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A micrometer reads a wire diameter as 0.28 mm. What is this in metres, and what is the common conversion error? (2 steps)", "answer": "- Step 1: To convert millimetres to metres, multiply by $$10^{-3}$$: $$d = 0.28 \\times 10^{-3}\\;\\text{m} = 2.8 \\times 10^{-4}\\;\\text{m}$$. The prefix \"milli\" means $$10^{-3}$$.\n- Step 2: The common error is confusing millimetres with micrometres, and multiplying by $$10^{-6}$$ instead of $$10^{-3}$$. This would give $$d = 0.28 \\times 10^{-6}\\;\\text{m}$$, which is 1000 times too small. Since area goes as $$d^2$$, this would make the area too small by a factor of $$10^6$$, and the calculated resistivity too large by a factor of $$10^6$$.\n\nTakeaway: mm → m is $$\\times 10^{-3}$$, not $$\\times 10^{-6}$$. Mixing up milli and micro is catastrophic.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "If the diameter of a wire is doubled while keeping the length and material the same, what happens to its resistance? Explain step by step. (3 steps)", "answer": "- Step 1: Resistance is given by $$R = \\rho l / A$$. Since the material and length are unchanged, only $$A$$ changes. We need to determine how $$A$$ changes when diameter doubles.\n- Step 2: Since $$A = \\pi d^2 / 4$$, area is proportional to $$d^2$$. If diameter doubles ($$d \\to 2d$$), then $$d^2 \\to 4d^2$$, so the area becomes 4 times larger: $$A_{\\text{new}} = 4A$$.\n- Step 3: Since $$R \\propto 1/A$$, the resistance becomes $$R_{\\text{new}} = R/4$$. Doubling the diameter quarters the resistance. A small increase in wire thickness dramatically reduces resistance.\n\nTakeaway: $$R \\propto 1/d^2$$. Double the diameter → quarter the resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A wire has resistance $$R$$. If both its length and its diameter are halved, what is the new resistance in terms of $$R$$? (3 steps)", "answer": "- Step 1: Consider the length change. Since $$R \\propto l$$, halving the length halves the resistance contribution: factor of $$\\times \\frac{1}{2}$$.\n- Step 2: Consider the diameter change. Since $$A \\propto d^2$$, halving the diameter quarters the area: $$A_{\\text{new}} = A/4$$. Since $$R \\propto 1/A$$, this makes the resistance contribution increase by a factor of 4.\n- Step 3: Combine both effects: $$R_{\\text{new}} = R \\times \\frac{1}{2} \\times 4 = 2R$$. The diameter change dominates — halving the diameter quarters the area (quadrupling resistance from area), while halving the length only halves resistance. Net effect: resistance doubles.\n\nTakeaway: When both length and diameter change, work through each effect on $$R$$ separately, then multiply the factors.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "Explain why the resistivity of a metal increases with temperature. Describe the microscopic mechanism. (3 steps)", "answer": "- Step 1: In a metal, current is carried by conduction electrons that drift through the lattice of positive ions. At low temperature, the ions vibrate gently around their equilibrium positions, and electrons drift through with relatively few collisions.\n- Step 2: As temperature increases, the lattice ions gain thermal energy and vibrate more vigorously with larger amplitude. Each ion effectively occupies a larger cross-section, and the probability of an electron colliding with an ion increases.\n- Step 3: More frequent and more energetic collisions reduce the mean drift velocity of the electrons, which reduces the current for a given voltage. Since $$R = V/I$$ and $$I$$ decreases, $$R$$ increases. Because this effect is due to the material itself (not the wire's dimensions), we say the **resistivity** $$\\rho$$ increases with temperature for metals.\n\nTakeaway: Metal: $$T \\uparrow \\Rightarrow$$ lattice vibration $$\\uparrow \\Rightarrow$$ collisions $$\\uparrow \\Rightarrow \\rho \\uparrow \\Rightarrow R \\uparrow$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Explain why the resistivity of a semiconductor (like an NTC thermistor) decreases with temperature. How is the mechanism fundamentally different from a metal? (3 steps)", "answer": "- Step 1: In a semiconductor, there are far fewer free charge carriers at low temperature compared to a metal. Many electrons are bound to their atoms and cannot participate in conduction. This is why semiconductors have much higher resistivity than metals at room temperature.\n- Step 2: As temperature increases, thermal energy excites more bound electrons into the conduction band, freeing them to carry current. The number of charge carriers $$n$$ increases significantly with temperature.\n- Step 3: Although increased lattice vibration (the same effect as in metals) would tend to increase resistance, the increase in charge carrier density dominates by far. More carriers means more current for the same voltage, so $$R$$ decreases. Since $$R \\propto \\rho$$ (for fixed geometry), the resistivity $$\\rho$$ decreases.\n\nTakeaway: Semiconductor: $$T \\uparrow \\Rightarrow$$ charge carriers freed $$\\Rightarrow n \\uparrow \\Rightarrow \\rho \\downarrow \\Rightarrow R \\downarrow$$. The carrier density effect dominates over the lattice vibration effect.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "A student claims: \"A filament lamp obeys Ohm's Law at low voltages but not at high voltages.\" Is this statement correct? Explain carefully. (3 steps)", "answer": "- Step 1: At very low voltages (and therefore very low currents), the filament does not heat up significantly. The temperature remains approximately constant, so the resistance is approximately constant, and the I–V relationship is nearly linear. In this limited region, the lamp behaves approximately ohmically.\n- Step 2: However, Ohm's Law requires that the conductor be **at constant temperature** throughout its operation. A filament lamp is designed to heat up — that's how it produces light. As current increases, the temperature rises, resistance increases, and the I–V graph curves.\n- Step 3: Strictly speaking, the filament lamp is a non-ohmic conductor because its resistance is not constant over its normal operating range. The statement is partially true in a limited sense, but the lamp is classified as non-ohmic because the condition of constant temperature is not maintained in practice.\n\nTakeaway: A filament lamp is non-ohmic because its temperature (and therefore resistance) changes with current. At very low currents it may appear nearly ohmic, but it does not truly obey Ohm's Law.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "In Core Practical 7 (measuring the resistivity of a wire), identify the independent variable, the dependent variable, and two key control variables. Why must each control variable be controlled? (3 steps)", "answer": "- Step 1: The **independent variable** is the length $$l$$ of the wire (changed in steps, e.g., 0.25 m intervals). The **dependent variable** is the resistance $$R$$ (calculated from $$R = V/I$$ at each length).\n- Step 2: The **voltage across the wire** must be controlled (kept constant or monitored) because changing the voltage changes the current, which could heat the wire and alter its resistivity. The **wire material** must be controlled because different materials have different resistivities — using the same wire throughout ensures this.\n- Step 3: The **temperature** must also be controlled (by using small currents and switching off between readings). If the wire heats up, its resistivity changes, which would corrupt the measurement. This is the most critical control in the experiment.\n\nTakeaway: Independent = length, Dependent = resistance, Control = voltage, material, temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "In Core Practical 7, describe the key steps of the method from measuring the diameter to calculating resistivity. (4 steps)", "answer": "- Step 1: Measure the diameter of the wire using a micrometer at 5–10 different positions and orientations along the wire. Calculate the mean diameter $$\\bar{d}$$. Check for zero error on the micrometer before use.\n- Step 2: Set up the circuit: tape the wire along a metre ruler, connect an ammeter in series and a voltmeter in parallel across the test length. Use a flying lead (crocodile clip) to select different lengths.\n- Step 3: For each length (e.g., 0.25 m, 0.50 m, ...), switch on briefly, record $$V$$ and $$I$$, then switch off immediately. Calculate $$R = V/I$$ for each length. Take at least 3 current readings per length and average.\n- Step 4: Plot a graph of $$R$$ (y-axis) against $$l$$ (x-axis). Draw the best-fit straight line. The gradient equals $$\\rho/A$$, so calculate $$\\rho = \\text{gradient} \\times A$$, where $$A = \\pi \\bar{d}^2 / 4$$.\n\nTakeaway: Measure diameter → vary length → record V and I → plot R vs l → gradient × A = ρ.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "In Core Practical 7, why must the current through the test wire be kept small, and why should the power supply be switched off between readings? (2 steps)", "answer": "- Step 1: A larger current causes more heating of the wire (since $$P = I^2R$$, power dissipated as heat increases with the square of the current). For a metal wire, heating increases the resistivity, which would change the very quantity we are trying to measure. This would give a systematically high value of $$\\rho$$.\n- Step 2: Switching off between readings allows the wire to cool back down to room temperature before the next measurement. This ensures that each reading is taken at approximately the same temperature, keeping the resistivity constant throughout the experiment.\n\nTakeaway: Small current + switch off between readings = constant temperature = constant resistivity = valid measurement.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "In Core Practical 7, the R vs l graph should ideally pass through the origin. If instead it has a positive intercept on the R-axis, what does this indicate, and why doesn't it affect the resistivity calculation? (3 steps)", "answer": "- Step 1: A positive intercept on the R-axis means that even when the test length $$l = 0$$, there is still some measured resistance. This is caused by **contact resistance** — the resistance at the joints where the crocodile clips or flying lead connect to the wire.\n- Step 2: Poor contact between the clip and the wire adds extra resistance that is not due to the wire itself. This is a **systematic error** — it shifts all resistance readings up by the same constant amount.\n- Step 3: However, the gradient of the R vs l line is unaffected by a constant vertical offset. Since $$R = \\frac{\\rho}{A}l + R_{\\text{contact}}$$, the gradient is still $$\\rho/A$$ regardless of the intercept. This is a key advantage of the graphical method — it effectively eliminates the systematic error from contact resistance.\n\nTakeaway: Non-zero intercept = contact resistance. Gradient is unaffected, so $$\\rho$$ calculation is still valid.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "A student finds the gradient of their R vs l graph and writes \"$$\\rho = \\text{gradient}$$\". What step have they missed, and why? (2 steps)", "answer": "- Step 1: The gradient of the R vs l graph equals $$\\rho/A$$, not $$\\rho$$. This comes from comparing $$R = \\frac{\\rho}{A} \\cdot l$$ to the straight-line equation $$y = mx$$, where the gradient $$m = \\rho/A$$.\n- Step 2: To find $$\\rho$$, you must multiply the gradient by the cross-sectional area $$A$$: $$\\rho = \\text{gradient} \\times A$$. The student has forgotten this final multiplication step. This is one of the most common errors in CP7 mark schemes.\n\nTakeaway: Gradient $$= \\rho/A$$, so $$\\rho = \\text{gradient} \\times A$$. Never skip the multiplication by $$A$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Why is a graphical method (plotting R vs l and using the gradient) preferred over calculating $$\\rho$$ from a single pair of readings in Core Practical 7? Give two distinct reasons. (2 steps)", "answer": "- Step 1: **Reduces random error**: A single measurement of $$R$$ and $$l$$ could be affected by random errors (e.g., reading fluctuations, slight variations in contact). The graph averages over many data points, and the line of best fit minimises the effect of random scatter on the result.\n- Step 2: **Eliminates systematic error from contact resistance**: Contact resistance adds a constant offset to all $$R$$ values, shifting the graph up but not changing its gradient. A single reading would include this contact resistance in the calculated $$R$$, giving a wrong value of $$\\rho$$. The gradient method automatically excludes it.\n\nTakeaway: Graphical method = averaging (reduces random error) + gradient ignores intercept (eliminates contact resistance systematic error).", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "Why should you measure the diameter of the wire at multiple positions and different orientations in Core Practical 7? (2 steps)", "answer": "- Step 1: The wire may not be perfectly circular in cross-section — manufacturing imperfections can make it slightly elliptical or irregular. Measuring at different orientations (rotating the micrometer around the wire) detects this **non-circularity**.\n- Step 2: Taking multiple measurements at different positions and orientations and then calculating the mean reduces **random error** in the diameter. Since $$A \\propto d^2$$, even a small error in $$d$$ is amplified when squaring, so an accurate mean diameter is crucial for an accurate resistivity value.\n\nTakeaway: Multiple measurements at different positions/orientations → detect non-circularity, reduce random error in $$d$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "Before using a micrometer in Core Practical 7, what check must you perform, and what type of error does it prevent? (2 steps)", "answer": "- Step 1: You must check for **zero error** by closing the micrometer jaws on nothing (with nothing between them). If it reads non-zero, this is a zero error that must be noted and subtracted from all subsequent readings.\n- Step 2: A zero error is a **systematic error** — it shifts all diameter readings in the same direction by the same amount. If not corrected, the calculated area (and hence resistivity) will be systematically wrong. Unlike random errors, systematic errors cannot be reduced by averaging.\n\nTakeaway: Always check for zero error on the micrometer. It's a systematic error that must be corrected, not averaged out.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "The fractional uncertainty in the cross-sectional area $$A$$ is twice the fractional uncertainty in the diameter $$d$$. Explain why, mathematically. (2 steps)", "answer": "- Step 1: The cross-sectional area is $$A = \\frac{\\pi d^2}{4}$$. Since $$\\pi$$ and 4 are exact constants, the only variable is $$d$$. When a variable is raised to a power $$n$$, the fractional uncertainty in the result is $$n$$ times the fractional uncertainty in the variable.\n- Step 2: Here, $$d$$ is raised to the power 2, so $$\\frac{\\delta A}{A} = 2 \\times \\frac{\\delta d}{d}$$. This means if the diameter has a fractional uncertainty of 2%, the area has a fractional uncertainty of 4%. This doubling effect makes diameter measurement the most critical source of uncertainty in the resistivity calculation.\n\nTakeaway: $$\\frac{\\delta A}{A} = 2\\frac{\\delta d}{d}$$. Because $$A \\propto d^2$$, any uncertainty in $$d$$ is doubled in $$A$$.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "Write the expression for the combined fractional uncertainty in $$\\rho$$ in Core Practical 7, and explain each term. (3 steps)", "answer": "- Step 1: Since $$\\rho = \\text{gradient} \\times A$$, the fractional uncertainty in $$\\rho$$ is the sum of the fractional uncertainties in the gradient and in $$A$$: $$\\frac{\\delta \\rho}{\\rho} = \\frac{\\delta(\\text{gradient})}{\\text{gradient}} + \\frac{\\delta A}{A}$$.\n- Step 2: The uncertainty in the gradient is found by drawing lines of maximum and minimum gradient through the scatter on the R vs l graph: $$\\delta(\\text{gradient}) = \\frac{\\text{max gradient} - \\text{min gradient}}{2}$$.\n- Step 3: Since $$\\frac{\\delta A}{A} = 2\\frac{\\delta d}{d}$$, we can write the full expression as: $$\\frac{\\delta \\rho}{\\rho} = \\frac{\\delta(\\text{gradient})}{\\text{gradient}} + 2\\frac{\\delta d}{d}$$. The diameter uncertainty is doubled and is often the dominant term.\n\nTakeaway: $$\\frac{\\delta \\rho}{\\rho} = \\frac{\\delta(\\text{grad})}{\\text{grad}} + 2\\frac{\\delta d}{d}$$. The factor of 2 makes diameter measurement the biggest contributor to uncertainty in $$\\rho$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "A student uses a metre ruler instead of a micrometer to measure the wire diameter in Core Practical 7. Why is this inappropriate? Give a quantitative argument. (2 steps)", "answer": "- Step 1: A metre ruler has a resolution of 1 mm, while a typical wire diameter is around 0.2–0.3 mm. The ruler cannot resolve the diameter at all — the measurement would be essentially meaningless.\n- Step 2: A micrometer has a resolution of 0.01 mm, giving a fractional uncertainty in $$d$$ of roughly $$0.01/0.28 \\approx 3.6\\%$$. A ruler would give $$1.0/0.28 \\approx 360\\%$$ — completely unacceptable. Since $$\\delta A/A = 2\\delta d/d$$, the area uncertainty with a ruler would be ~720%, making the resistivity calculation worthless.\n\nTakeaway: A micrometer is necessary because the diameter is small and requires high resolution. A ruler cannot resolve typical wire diameters.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "Two wires are made of the same material. Wire X has length $$L$$ and diameter $$d$$. Wire Y has length $$2L$$ and diameter $$2d$$. Which wire has the greater resistance, and by what factor? (3 steps)", "answer": "- Step 1: Since both wires are the same material, $$\\rho$$ is the same. Use $$R = \\rho l / A$$ with $$A \\propto d^2$$. For Wire X: $$R_X = \\frac{\\rho L}{\\pi d^2/4}$$. For Wire Y: $$R_Y = \\frac{\\rho (2L)}{\\pi (2d)^2/4} = \\frac{2\\rho L}{\\pi \\cdot 4d^2 / 4} = \\frac{2\\rho L}{\\pi d^2}$$.\n- Step 2: Rewrite Wire X: $$R_X = \\frac{4\\rho L}{\\pi d^2}$$. Now compare: $$\\frac{R_Y}{R_X} = \\frac{2\\rho L / (\\pi d^2)}{4\\rho L / (\\pi d^2)} = \\frac{2}{4} = \\frac{1}{2}$$.\n- Step 3: Wire X has the greater resistance, by a factor of 2. Even though Wire Y is twice as long (which would double resistance), its diameter is also doubled, which quadruples the area (halving resistance from that effect). The area effect dominates: net factor = $$2/4 = 1/2$$.\n\nTakeaway: $$R \\propto l/d^2$$. For wires of the same material, compare $$l/d^2$$ ratios to determine which has greater resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "A student says: \"Copper is a better conductor than nichrome because copper has lower resistance.\" Explain why this statement is imprecise, and rephrase it correctly using the concept of resistivity. (2 steps)", "answer": "- Step 1: The statement is imprecise because resistance depends on the dimensions of the component, not just the material. A very long, thin copper wire could have higher resistance than a short, thick nichrome wire. Saying \"copper has lower resistance\" confuses a property of a specific component with a property of the material.\n- Step 2: The correct statement is: \"Copper is a better conductor than nichrome because copper has lower **resistivity**.\" Copper's resistivity ($$\\approx 1.72 \\times 10^{-8}\\;\\Omega \\cdot \\text{m}$$) is much lower than nichrome's ($$\\approx 1.1 \\times 10^{-6}\\;\\Omega \\cdot \\text{m}$$). Resistivity is an intrinsic property that allows a fair comparison between materials regardless of shape or size.\n\nTakeaway: Compare materials using resistivity (intrinsic), not resistance (depends on dimensions).", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "In the I–V graph of a filament lamp, at which point is the resistance lowest — at low voltage or high voltage? Explain using the relationship between the graph's shape and $$R = V/I$$. (2 steps)", "answer": "- Step 1: On an I–V graph, the resistance at any point is given by $$R = V/I$$, which is the reciprocal of the gradient of the line from the origin to that point (not the local tangent gradient). At low voltage, the curve is steep from the origin (large $$I$$ relative to $$V$$), so $$R = V/I$$ is small.\n- Step 2: At high voltage, the curve flattens relative to the origin (smaller increase in $$I$$ relative to $$V$$), so $$R = V/I$$ is larger. The resistance is lowest at low voltage (when the filament is cool) and highest at high voltage (when the filament is hot).\n\nTakeaway: On an I–V graph, low voltage = steep from origin = low $$R$$; high voltage = flatter from origin = high $$R$$.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "A wire of length 0.50 m has a potential difference of 1.2 V across it and a current of 0.060 A through it. Calculate its resistance. (2 steps)", "answer": "- Step 1: Use the definition of resistance: $$R = V/I$$.\n- Step 2: $$R = \\frac{1.2}{0.060} = 20\\;\\Omega$$. Always divide voltage by current — never multiply.\n\nTakeaway: $$R = V/I$$: simple division, no shortcuts.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "In a CP7 experiment, the R vs l graph has a gradient of 8.0 $$\\Omega/\\text{m}$$. The mean wire diameter is 0.20 mm. Calculate the resistivity. (3 steps)", "answer": "- Step 1: Convert the diameter to metres: $$d = 0.20 \\times 10^{-3}\\;\\text{m}$$. Calculate the cross-sectional area: $$A = \\frac{\\pi d^2}{4} = \\frac{\\pi (0.20 \\times 10^{-3})^2}{4} = \\frac{\\pi \\times 4.0 \\times 10^{-8}}{4} = \\pi \\times 10^{-8} \\approx 3.14 \\times 10^{-8}\\;\\text{m}^2$$.\n- Step 2: Use the relationship $$\\rho = \\text{gradient} \\times A$$.\n- Step 3: $$\\rho = 8.0 \\times 3.14 \\times 10^{-8} \\approx 2.5 \\times 10^{-7}\\;\\Omega \\cdot \\text{m}$$. This is a reasonable value for a constantan-type wire.\n\nTakeaway: $$\\rho = \\text{gradient} \\times A$$. Convert diameter to metres first, then compute area, then multiply by gradient.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "A student measures the diameter of a wire as 0.25 mm but forgets to check for zero error. The micrometer actually has a zero error of +0.02 mm (it reads 0.02 mm when closed on nothing). Will the calculated resistivity be too high or too low? Explain. (3 steps)", "answer": "- Step 1: The true diameter is $$d_{\\text{true}} = d_{\\text{reading}} - \\text{zero error} = 0.25 - 0.02 = 0.23\\;\\text{mm}$$. The student used $$d = 0.25\\;\\text{mm}$$ (too large by 0.02 mm).\n- Step 2: A larger diameter gives a larger area ($$A \\propto d^2$$). The student's calculated area is too large.\n- Step 3: Since $$\\rho = \\text{gradient} \\times A$$, and the gradient is correct (it comes from the R vs l graph, unaffected by diameter measurement), the overestimated area leads to an overestimated resistivity. The calculated $$\\rho$$ is **too high**.\n\nTakeaway: Positive zero error → overestimated diameter → overestimated area → overestimated resistivity.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "A student argues: \"If I make the current very large in CP7, the R vs l graph will still be a straight line, just with steeper values. So it doesn't matter.\" Why is this wrong? (3 steps)", "answer": "- Step 1: At large currents, the wire heats up significantly. For a metal wire, resistivity increases with temperature. This means $$\\rho$$ is no longer constant — it depends on how much current flows (and thus how hot the wire gets).\n- Step 2: At longer wire lengths (which have higher resistance and dissipate more power $$P = I^2R$$), the wire will be hotter, and the local resistivity will be higher. This means the R vs l relationship is no longer linear — the graph curves upward at longer lengths.\n- Step 3: The assumption that gradient $$= \\rho/A$$ relies on $$\\rho$$ being constant. If the graph curves, the gradient changes along the line, and there is no single value of $$\\rho$$ to extract. The experiment becomes invalid.\n\nTakeaway: Large current → heating → $$\\rho$$ not constant → R vs l not linear → experiment invalid.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "A non-ohmic component has 2.0 V across it when the current is 100 mA, and 3.0 V across it when the current is 120 mA. Is its resistance increasing or decreasing as the voltage increases? Show your reasoning. (2 steps)", "answer": "- Step 1: Calculate resistance at each point using $$R = V/I$$. At the first point: $$R_1 = 2.0 / 0.100 = 20\\;\\Omega$$. At the second point: $$R_2 = 3.0 / 0.120 = 25\\;\\Omega$$.\n- Step 2: Since $$R_2 > R_1$$, the resistance is increasing as voltage (and current) increases. This is consistent with a component that heats up (like a metal filament lamp), where increased temperature leads to increased resistivity and resistance.\n\nTakeaway: For non-ohmic components, always calculate $$R = V/I$$ at each operating point separately — you cannot just read the gradient.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "What is the key difference between how you determine resistance from an I–V graph for an ohmic conductor versus a non-ohmic conductor? (2 steps)", "answer": "- Step 1: For an **ohmic conductor**, the I–V graph is a straight line through the origin. The resistance is constant and equals the reciprocal of the gradient: $$R = 1/\\text{gradient}$$. You can use the gradient because the line is straight and passes through the origin.\n- Step 2: For a **non-ohmic conductor**, the I–V graph is a curve, and the resistance changes at every point. You must use $$R = V/I$$ at the specific point of interest — take the coordinates of that point and divide voltage by current. You **cannot** use the local gradient of the curve, because $$R = V/I \\neq 1/(\\text{local gradient})$$ unless the curve passes through the origin.\n\nTakeaway: Ohmic → $$R = 1/\\text{gradient}$$ (constant). Non-ohmic → $$R = V/I$$ at each point (varies). Never use the local gradient for non-ohmic components.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "A carbon chip has resistivity $$3.0 \\times 10^{-5}\\;\\Omega \\cdot \\text{m}$$, length 10 mm, and a rectangular cross-section of 5 mm × 1 mm. Walk through how to find its resistance, identifying which dimension is length and which form the area. (3 steps)", "answer": "- Step 1: Identify the direction of current flow. The current flows along the **length** of the chip (10 mm), so $$l = 10 \\times 10^{-3}\\;\\text{m}$$. The cross-sectional area perpendicular to the current is the rectangle: $$A = 5 \\times 10^{-3} \\times 1 \\times 10^{-3} = 5.0 \\times 10^{-6}\\;\\text{m}^2$$.\n- Step 2: Apply $$R = \\rho l / A$$: $$R = \\frac{3.0 \\times 10^{-5} \\times 0.010}{5.0 \\times 10^{-6}}$$. The numerator is $$3.0 \\times 10^{-7}$$ and the denominator is $$5.0 \\times 10^{-6}$$.\n- Step 3: $$R = \\frac{3.0 \\times 10^{-7}}{5.0 \\times 10^{-6}} = \\frac{3.0}{50} = 0.06\\;\\Omega$$. The resistance is small because the chip is short and has a relatively large cross-sectional area.\n\nTakeaway: For non-circular cross-sections, identify which dimension is the length (along the current) and which dimensions form the area (perpendicular to the current).", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "On a standard I–V graph (current on y-axis, voltage on x-axis), the gradient represents $$1/R$$. If the axes were swapped, what would the gradient represent? Why is the standard convention important to remember? (2 steps)", "answer": "- Step 1: With $$I$$ on the y-axis and $$V$$ on the x-axis, the equation is $$I = (1/R)V$$, in the form $$y = mx$$ with gradient $$m = 1/R$$. If the axes were swapped ($$V$$ on y, $$I$$ on x), the equation would be $$V = RI$$, and the gradient would be $$R$$ directly.\n- Step 2: The convention in physics is to plot I–V characteristics with $$I$$ on the y-axis, so the gradient gives $$1/R$$, not $$R$$. This is a common source of confusion: a steeper line means **lower** resistance (larger current for same voltage), not higher. Always check which variable is on which axis before interpreting the gradient.\n\nTakeaway: Standard I–V graph: gradient = $$1/R$$ (steeper = lower resistance). Swapped V–I graph: gradient = $$R$$. Always check the axes.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "When a student reads a micrometer, the main scale shows 5.5 mm and the thimble scale shows 27 (i.e., 0.27 mm). What is the total reading, and what is it in metres? (2 steps)", "answer": "- Step 1: The micrometer reading is the sum of the main scale and the thimble scale: $$d = 5.5 + 0.27 = 5.77\\;\\text{mm}$$. The main scale gives whole and half millimetres; the thimble gives hundredths of a millimetre.\n- Step 2: Convert to metres: $$d = 5.77 \\times 10^{-3}\\;\\text{m}$$. Remember: mm to m is multiply by $$10^{-3}$$, not $$10^{-6}$$.\n\nTakeaway: Micrometer reading = main scale + thimble scale. Convert mm → m by ×$$10^{-3}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "A student reasons: \"If I halve the length of a wire, I halve the number of electrons in it, so the current should halve too.\" Is this reasoning correct? Explain. (3 steps)", "answer": "- Step 1: The number of free electrons in the wire is not what determines the current. Current is the **rate of flow** of charge ($$I = \\Delta Q / \\Delta t$$), not the total amount of charge stored. Halving the length does halve the total number of free electrons in the wire, but this doesn't directly determine the rate at which they flow.\n- Step 2: What halving the length actually does is reduce the number of collisions each electron experiences as it traverses the wire (shorter path = fewer obstacles). This means each electron maintains a higher drift velocity, so for a given voltage, the current is higher (not lower).\n- Step 3: The resistance halves because $$R \\propto l$$, and by Ohm's law $$I = V/R$$, the current actually **doubles** (for a fixed voltage), it doesn't halve. The student's reasoning confuses total charge with rate of charge flow.\n\nTakeaway: Current depends on drift velocity and carrier density per unit volume, not on the total number of electrons in the wire. Halving length halves resistance, which increases current.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "A superconductor has zero resistivity below a certain critical temperature. What does this mean for the resistance of a wire made from a superconducting material, and what practical consequence does this have? (2 steps)", "answer": "- Step 1: If $$\\rho = 0$$, then $$R = \\rho l / A = 0$$ regardless of the wire's length or cross-sectional area. A superconducting wire has zero resistance, meaning current can flow through it without any potential difference being needed ($$V = IR = 0$$) and without any energy being dissipated as heat.\n- Step 2: The practical consequence is that once a current is established in a superconducting loop, it can flow indefinitely without a power source — there are no collisions to dissipate the electrons' energy. This enables applications like MRI machines and maglev trains that require very large currents with no energy loss.\n\nTakeaway: $$\\rho = 0 \\Rightarrow R = 0$$ for any size wire. No energy dissipation, no voltage drop, persistent currents possible.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "A student's R vs l graph in CP7 gives a gradient of 5.0 Ω/m. The mean diameter is 0.40 mm with an uncertainty of ±0.01 mm. Estimate the fractional uncertainty in the resistivity, assuming the gradient uncertainty is negligible. (3 steps)", "answer": "- Step 1: The fractional uncertainty in $$\\rho$$ is $$\\frac{\\delta \\rho}{\\rho} = \\frac{\\delta(\\text{grad})}{\\text{grad}} + 2\\frac{\\delta d}{d}$$. Since gradient uncertainty is negligible, $$\\frac{\\delta \\rho}{\\rho} \\approx 2\\frac{\\delta d}{d}$$.\n- Step 2: $$\\frac{\\delta d}{d} = \\frac{0.01}{0.40} = 0.025 = 2.5\\%$$. So $$\\frac{\\delta \\rho}{\\rho} \\approx 2 \\times 2.5\\% = 5\\%$$.\n- Step 3: The fractional uncertainty in resistivity is approximately 5%, coming entirely from the diameter measurement. This illustrates why the diameter is the most critical measurement in CP7 — its uncertainty is doubled when propagated to area, and then to resistivity.\n\nTakeaway: Even a small fractional uncertainty in $$d$$ (2.5%) becomes 5% in $$\\rho$$ because of the $$d^2$$ dependence in area.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "In CP7, why is it important that the wire be taped straight along the ruler rather than laid loosely on top? (2 steps)", "answer": "- Step 1: If the wire is loose, it can shift or curl, meaning the actual length of wire between the contacts may not match the ruler reading. This introduces a systematic error in the length measurement.\n- Step 2: Taping the wire straight ensures that the distance between the contacts (as read from the ruler) accurately represents the length of wire through which the current flows. Any slack or curvature would make the actual wire length longer than the measured length, giving a systematically high resistance for that measured length and corrupting the gradient.\n\nTakeaway: Tape the wire straight to the ruler so the ruler reading matches the actual current-carrying length.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "A wire has resistance 43 Ω. If its length is doubled and its diameter is also doubled, what is the new resistance? (3 steps)", "answer": "- Step 1: Use $$R = \\rho l / A$$. Since $$A \\propto d^2$$, doubling the diameter quadruples the area: $$A_{\\text{new}} = 4A$$. Doubling the length gives $$l_{\\text{new}} = 2l$$.\n- Step 2: The new resistance is $$R_{\\text{new}} = \\frac{\\rho \\times 2l}{4A} = \\frac{2}{4} \\times \\frac{\\rho l}{A} = \\frac{1}{2}R$$.\n- Step 3: So $$R_{\\text{new}} = 43/2 = 21.5\\;\\Omega$$. The area effect (4× increase, reducing R by 4×) dominates the length effect (2× increase, increasing R by 2×). Net factor: $$2/4 = 1/2$$.\n\nTakeaway: $$R_{\\text{new}} = R \\times \\frac{l_{\\text{new}}/l}{(d_{\\text{new}}/d)^2}$$. For both doubled: factor = $$2/4 = 1/2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "A student's R vs l graph in CP7 has a negative y-intercept (the best-fit line, when extrapolated back, crosses below the origin). What could cause this, and does it invalidate the experiment? (2 steps)", "answer": "- Step 1: A negative intercept means that at $$l = 0$$, the measured resistance is negative, which is physically impossible. This could be caused by a **systematic error in the length measurement** — for example, if the fixed contact point is slightly beyond the ruler's zero mark, so the actual wire length is longer than the measured length for every reading. This makes every $$R$$ value correspond to a longer-than-recorded wire, effectively shifting the graph to the right and creating a negative intercept.\n- Step 2: This does not necessarily invalidate the resistivity calculation, because the gradient (which gives $$\\rho/A$$) is unaffected by a constant horizontal shift. However, it indicates a systematic error that should be investigated and corrected if possible, and should be discussed in the evaluation.\n\nTakeaway: A negative intercept suggests a systematic length offset. The gradient (and hence $$\\rho$$) is still valid, but the error should be noted and evaluated.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "You are given two wires of the same material. Wire A has length $$L$$ and diameter $$d$$. Wire B has length $$3L$$ and diameter $$3d$$. Wire A has resistance $$R_A$$. Express $$R_B$$ in terms of $$R_A$$. (2 steps)", "answer": "- Step 1: Since both wires are the same material, $$\\rho$$ is the same. Using the proportionality $$R \\propto l/d^2$$: the ratio is $$\\frac{R_B}{R_A} = \\frac{3L / (3d)^2}{L / d^2} = \\frac{3L / 9d^2}{L / d^2} = \\frac{3}{9} = \\frac{1}{3}$$.\n- Step 2: So $$R_B = R_A / 3$$. Even though Wire B is three times longer (which would triple resistance), its diameter is also three times larger, making the area nine times larger (which would reduce resistance by a factor of 9). Net factor: $$3/9 = 1/3$$.\n\nTakeaway: $$R \\propto l/d^2$$ is the quick comparison formula for wires of the same material.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "In CP7, a student notices that the data points scatter more at longer lengths than at shorter lengths. Suggest a physical reason for this increased scatter, and explain whether it introduces random or systematic error. (2 steps)", "answer": "- Step 1: At longer lengths, the resistance is higher, so more power is dissipated as heat ($$P = I^2R$$). This means the wire heats up more at longer lengths, causing the resistance to be slightly higher than expected for a given length. This creates a **systematic** deviation — points curve upward at longer
