ammeter's resistance could become significant.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "A common student error is to forget to multiply the gradient by $$A$$ when computing $$\\rho$$ from CP7. What does the unit check tell you immediately if you forget?", "answer": "The gradient has units $$\\Omega/\\text{m}$$ (from $$R$$ in $$\\Omega$$ divided by $$l$$ in $$\\text{m}$$). Resistivity has units $$\\Omega\\cdot\\text{m}$$. These are clearly different — they differ by a factor of $$\\text{m}^2$$, which is exactly the units of area $$A$$. So multiplying gradient $$\\Omega/\\text{m}$$ by $$A$$ in $$\\text{m}^2$$ gives $$\\Omega\\cdot\\text{m}$$. The unit mismatch is an instant alarm bell: if a student quotes a \"resistivity\" in $$\\Omega/\\text{m}$$, they've omitted the area-multiplication step. **Always unit-check final answers.**", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Two CP7 students measure the same wire. Student A takes 4 length readings; Student B takes 10. Both fit a best-fit line. Why is Student B's resistivity result more reliable?", "answer": "More data points mean **(1)** random fluctuations in individual $$R$$ measurements get averaged out more effectively by the line, **(2)** the gradient is more tightly constrained (the steepest and shallowest plausible lines through 10 points are closer together than through 4), reducing $$\\delta(\\text{gradient})$$, **(3)** any curvature or outlier behaviour is easier to spot. The gain isn't linear — going from 4 to 10 points doesn't quadruple precision — but it substantially tightens the uncertainty in the gradient and hence in $$\\rho$$. This is why mark schemes typically demand 8–10 length readings.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Why is graphite (a non-metal) a moderately good conductor, with resistivity $$\\sim 7 \\times 10^{-5}\\,\\Omega\\cdot\\text{m}$$?", "answer": "Graphite has a layered crystal structure: within each layer, carbon atoms are bonded in a hexagonal network where three of carbon's four valence electrons form covalent bonds, and the **fourth electron is delocalised** across the layer. These delocalised electrons act like a 2D electron gas, free to drift and carry current — much like free electrons in a metal. So graphite conducts *along* its layers reasonably well. It's not as good as copper (whose entire valence cloud is delocalised in 3D), but vastly better than insulators with no free charge carriers. This explains its use in pencil \"lead\" being measurable as a resistor in lab experiments.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Imagine you measure resistivity at two temperatures: $$20\\,^\\circ\\text{C}$$ and $$80\\,^\\circ\\text{C}$$, for both a copper wire and a thermistor. Predict qualitatively how each value would change. (3 steps)", "answer": "- Step 1: **Copper (metal)**: $$\\rho$$ increases with temperature. At $$80\\,^\\circ\\text{C}$$, $$\\rho$$ is noticeably higher than at $$20\\,^\\circ\\text{C}$$ — perhaps by 25% or so (rough rule: metals' $$\\rho$$ increases roughly linearly with absolute T, so a $$60\\,\\text{K}$$ rise from $$293\\,\\text{K}$$ gives $$\\sim 20\\%$$).\n- Step 2: **Thermistor (semiconductor)**: $$\\rho$$ **decreases** with temperature, often dramatically (exponentially). At $$80\\,^\\circ\\text{C}$$, $$\\rho$$ might be a factor of 10 or more *smaller* than at $$20\\,^\\circ\\text{C}$$.\n- Step 3: Direction matters for the exam: metals up, semiconductors down. Never the reverse.\n\nThis is why thermistors make good temperature sensors (large signal change) and why metals' resistance is only weakly temperature-dependent over modest ranges.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "Why does the answer to \"what causes resistance in a metal?\" point to the *lattice ions*, not the electrons themselves?", "answer": "Electrons are the *moving* charges that constitute the current — they're not the obstacle, they're the thing being obstructed. The obstacle is the **vibrating positively-charged lattice ions** (and to a smaller extent, lattice defects/impurities). As electrons drift through, they collide with these vibrating ions, transferring kinetic energy to them as thermal energy (heat). The hotter the lattice, the more vigorous the vibration, the more frequent the collisions, the higher the resistance. The electrons themselves don't cause resistance — they *experience* it.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "A worked exam approach: a wire has $$V = 0.7\\,\\text{V}$$ across it when $$I = 40\\,\\text{mA}$$. Without exact computation, estimate the order of magnitude of its resistance. (3 steps)", "answer": "- Step 1: $$R = V/I$$ (never $$V \\times I$$).\n- Step 2: Convert: $$40\\,\\text{mA} = 0.04\\,\\text{A}$$.\n- Step 3: $$R \\sim 0.7 / 0.04 \\sim 17$$–$$20\\,\\Omega$$. So this is a low-resistance component — order $$10\\,\\Omega$$, consistent with a diode or LED near its operating voltage.\n\nThe conceptual move: divide volts by amps; the milli-prefix on current is critical to convert to base SI.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "Why does halving the length of a wire halve its resistance but doubling the diameter quarter it (rather than halve it)? What's the asymmetry?", "answer": "Length and area enter the resistance formula differently: $$R \\propto l$$ (linear) but $$R \\propto 1/A$$ (inverse) — and *area itself* depends on diameter squared. So changing $$l$$ by a factor $$k$$ changes $$R$$ by $$k$$ (linear in $$l$$), but changing $$d$$ by a factor $$k$$ changes $$A$$ by $$k^2$$ and hence $$R$$ by $$1/k^2$$. The asymmetry comes from geometry: a wire is essentially a 1D path along its length but a 2D path across its cross-section. The cross-section gives two independent \"directions\" for current to spread into, so geometry effects there are squared.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "What's the practical reason exam questions ask you to plot $$R$$ vs $$l$$ rather than, say, $$1/R$$ vs $$1/l$$?", "answer": "Both would in principle yield $$\\rho$$, but $$R$$ vs $$l$$ is the **simplest linear relationship**: rearranging $$R = (\\rho/A)\\,l$$ gives $$y = mx$$ directly, with gradient $$= \\rho/A$$. Errors propagate cleanly through a linear fit. Plotting $$1/R$$ vs $$1/l$$ requires taking reciprocals, which non-linearly distorts the uncertainty bars (errors near $$l = 0$$ blow up). Linear plots with simple gradient extraction are always preferred when possible — they minimise propagation errors and are easier to visually assess for outliers and systematic effects.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "A wire that's already heated up gives \"wrong\" resistivity in CP7. But the formula $$\\rho = RA/l$$ still gives the resistivity at *that* temperature. So in what sense is the measurement \"wrong\"? (3 steps)", "answer": "- Step 1: $$\\rho$$ is genuinely a function of temperature, so $$\\rho(T)$$ for the heated wire is a valid physical quantity at that temperature.\n- Step 2: The issue is **inconsistency across the data set**: if length 1 is measured cold ($$\\rho_1$$) and length 2 is measured hotter ($$\\rho_2 > \\rho_1$$), then the $$R$$ vs $$l$$ data points don't lie on a single straight line — they reflect *different* underlying resistivities. The line becomes curved or its gradient is biased high.\n- Step 3: So the \"wrong\" part isn't $$\\rho$$ being undefined — it's that you're conflating measurements at different temperatures into one fit, producing a value that doesn't correspond to any single well-defined state of the wire. The reported $$\\rho$$ is some hybrid not equal to either the room-temperature or the heated value.\n\nWhy it matters: published resistivities are quoted at a specified temperature (usually $$20\\,^\\circ\\text{C}$$), and the experiment is supposed to match that.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}], "count": 55}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.9, "in_tokens": 20451, "out_tokens": 12315, "reasoning_chars": 27433, "cost_eur": 0.0594, "elapsed_s": 330, "content_chars": 20413}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 20451, "out_tokens": 28344, "reasoning_chars": 54780, "cost_eur": 0.111, "elapsed_s": 483, "content_chars": 52289}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 19916, "out_tokens": 16661, "reasoning_chars": 45475, "cost_eur": 0.0729, "elapsed_s": 156, "content_chars": 17514}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 19635, "out_tokens": 7462, "reasoning_chars": 1603, "cost_eur": 0.0112, "elapsed_s": 62, "content_chars": 26114}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 19635, "out_tokens": 5789, "reasoning_chars": 6986, "cost_eur": 0.0095, "elapsed_s": 56, "content_chars": 15249}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 30180, "out_tokens": 20422, "reasoning_chars": 0, "cost_eur": 1.8256, "elapsed_s": 279, "content_chars": 48504}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 30180, "out_tokens": 19825, "reasoning_chars": 0, "cost_eur": 1.7844, "elapsed_s": 278, "content_chars": 48678}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235 const SK='phys_elec_ch03';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}

function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}
