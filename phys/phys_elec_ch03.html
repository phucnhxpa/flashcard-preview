lengths, rather than scattering randomly.\n- Step 2: If the scatter is truly random, it could be due to inconsistent contact pressure with the flying lead at different positions. However, if the increased scatter is actually due to heating, it is systematic and would make the gradient slightly too steep, giving a slightly overestimated $$\\rho$$. This is another reason to keep currents small — to minimise heating and keep the graph linear.\n\nTakeaway: More scatter at longer lengths is likely from heating (systematic, curving upward) rather than random variation. Small currents minimise this.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "Power is dissipated in a resistor as heat. Starting from $$P = IV$$, derive the two other expressions for power dissipation: $$P = I^2R$$ and $$P = V^2/R$$. (3 steps)", "answer": "- Step 1: Start with $$P = IV$$. From Ohm's Law, $$V = IR$$. Substitute this into the power equation: $$P = I \\times (IR) = I^2R$$. This form is useful when you know the current and resistance.\n- Step 2: From Ohm's Law, $$I = V/R$$. Substitute this into $$P = IV$$: $$P = (V/R) \\times V = V^2/R$$. This form is useful when you know the voltage and resistance.\n- Step 3: Alternatively, to get $$P = V^2/R$$ from $$P = I^2R$$: square $$I = V/R$$ to get $$I^2 = V^2/R^2$$, then substitute: $$P = (V^2/R^2) \\times R = V^2/R$$. All three forms are equivalent for ohmic conductors; choose the one that uses the quantities you know.\n\nTakeaway: $$P = IV = I^2R = V^2/R$$. Choose the form based on which variables are given.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}], "count": 50}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What is the defining equation for electrical resistance, and what are its SI units? Why must it be a ratio, not a product?", "answer": "The defining equation is $$R = \\frac{V}{I}$$, where $$V$$ is the potential difference across the component (volts) and $$I$$ is the current through it (amperes). The SI unit is the ohm: $$1\\,\\Omega = 1\\,\\text{V/A}$$.\n\nIt must be a ratio because resistance measures how much voltage is *needed per unit of current*. Higher resistance means more voltage required to push the same current. If you mistakenly multiply ($$R = V \\times I$$), you get units of watts (power), which is a completely different physical quantity. This is a confirmed exam trap from the lesson — always divide, never multiply.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "State Ohm's Law precisely. What two conditions must hold for a conductor to obey it?", "answer": "Ohm's Law: the current through a metallic conductor is **directly proportional** to the potential difference across it, provided the **temperature remains constant**.\n\nThe two conditions:\n1. The conductor must be metallic (or ohmic by nature).\n2. The temperature must remain constant.\n\nNote: \"directly proportional\" is stronger than \"linear.\" Direct proportionality means the I–V graph is a straight line **through the origin** — not just any straight line. A line with a non-zero intercept is linear but not directly proportional, and does not satisfy Ohm's Law.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "On an I–V characteristic graph (current on y-axis, voltage on x-axis), how do you distinguish an ohmic from a non-ohmic conductor? What does the gradient represent?", "answer": "An **ohmic** conductor produces a straight line through the origin — because $$I \\propto V$$, meaning resistance is constant at every operating point.\n\nA **non-ohmic** conductor produces a curve — because resistance changes (typically with temperature), so the I–V relationship is non-linear.\n\nFor the ohmic graph, gradient $$= \\frac{I}{V} = \\frac{1}{R}$$. A steeper line means **lower** resistance (more current per volt), and a shallower line means higher resistance. This is counterintuitive at first — the gradient is the *inverse* of resistance, not resistance itself.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "At the microscopic level, what causes a metal to have resistance? Describe how electrical energy is converted to thermal energy.", "answer": "- Step 1: When a potential difference is applied, free (conduction) electrons in the metal accelerate under the electric field.\n- Step 2: As they drift, they **collide** with the positive lattice ions, which are vibrating about their equilibrium positions.\n- Step 3: Each collision reduces the electron's velocity (transferring kinetic energy from the electron to the ion). This is why electrons reach a steady \"drift velocity\" rather than accelerating indefinitely.\n- Step 4: The kinetic energy transferred to the lattice ions increases their vibrational amplitude — this is **thermal energy (heating)**. More collisions per unit length means higher resistance.\n\nKey insight: a resistor does NOT store or accumulate electrons — it **slows them down**, reducing the rate of flow (current). The \"missing\" electrons aren't stored; they just move more slowly throughout the entire circuit.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "A battery supplies current to a circuit containing a resistor. A student claims \"the resistor stores the extra electrons that don't make it through.\" Why is this wrong?", "answer": "This is a misconception. A resistor does not store or accumulate electrons.\n\n- Step 1: In a series circuit, current is the same at every point — the same number of electrons per second enters and leaves the resistor. There is no \"build-up.\"\n- Step 2: What the resistor does is slow electrons down through collisions with lattice ions. This reduces the **drift velocity**, and therefore the current, throughout the entire circuit simultaneously.\n- Step 3: Think of it like a narrow section of pipe restricting water flow: the flow rate drops everywhere in the pipe, not just after the narrow section. Water doesn't accumulate inside the constriction.\n- Step 4: The energy from collisions is dissipated as **heat** ($$P = I^2 R$$), not stored as electrons.\n\nThe correct mental model: resistance is like friction that slows all the traffic, not a parking lot that traps cars.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "Why does resistance increase with length, and why does it decrease with cross-sectional area? Give both an intuitive and a formal explanation. (3 steps)", "answer": "- Step 1: **Length ($$R \\propto l$$):** A longer wire means electrons must travel through more material, encountering more lattice ions and suffering more collisions. Like a longer obstacle course — more obstacles, more resistance.\n- Step 2: **Area ($$R \\propto \\frac{1}{A}$$):** A thicker wire provides more parallel pathways for electrons. Think of multiple thin wires in parallel: each carries some current, and the total current is the sum. More area = more parallel paths = less total resistance. Like a wider pipe letting more water through.\n- Step 3: **Combining:** $$R \\propto \\frac{l}{A}$$, which gives $$R = \\frac{\\rho l}{A}$$ where the constant of proportionality $$\\rho$$ is the resistivity — a property of the material alone.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "Starting from the experimental proportionalities, derive the resistivity formula and show that the unit of resistivity is $$\\Omega \\cdot \\text{m}$$. (4 steps)", "answer": "- Step 1: From experiment: $$R \\propto l$$ and $$R \\propto \\frac{1}{A}$$.\n- Step 2: Combining: $$R \\propto \\frac{l}{A}$$. Introduce a constant of proportionality $$\\rho$$ (resistivity): $$R = \\frac{\\rho l}{A}$$.\n- Step 3: Rearrange for $$\\rho$$: $$\\rho = \\frac{RA}{l}$$.\n- Step 4: Substitute SI units: $$[\\rho] = \\frac{\\Omega \\times \\text{m}^2}{\\text{m}} = \\Omega \\cdot \\text{m}$$.\n\nKey insight: $$\\rho$$ is a property of the **material** only. Change the wire's length or area and $$R$$ changes, but $$\\rho$$ stays the same for the same material at the same temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A student writes the unit of resistivity as $$\\Omega / \\text{m}$$ (ohms per metre). Prove this is wrong using dimensional analysis, and explain the intuitive reason.", "answer": "From $$\\rho = \\frac{RA}{l}$$:\n- $$R$$ has units $$\\Omega$$, $$A$$ has units $$\\text{m}^2$$, $$l$$ has units $$\\text{m}$$\n- Therefore: $$[\\rho] = \\frac{\\Omega \\times \\text{m}^2}{\\text{m}} = \\Omega \\cdot \\text{m}$$\n\nIf the unit were $$\\Omega / \\text{m}$$, then plugging into $$R = \\frac{\\rho l}{A}$$:\n$$\\frac{(\\Omega / \\text{m}) \\times \\text{m}}{\\text{m}^2} = \\frac{\\Omega}{\\text{m}^2}$$ — which is NOT ohms. The formula would be dimensionally inconsistent.\n\nIntuitively: if $$\\rho$$ had units of $$\\Omega / \\text{m}$$, then a longer wire would have *less* resistance — the opposite of reality. The correct unit, $$\\Omega \\cdot \\text{m}$$, ensures resistance scales correctly with length.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "Explain the difference between resistance and resistivity. If you stretch a copper wire to double its length (constant volume), which quantity changes and which stays the same?", "answer": "**Resistance** ($$R$$, in $$\\Omega$$) is a property of a **specific component** — it depends on the material's resistivity, the length, and the cross-sectional area of that particular piece of wire.\n\n**Resistivity** ($$\\rho$$, in $$\\Omega \\cdot \\text{m}$$) is an **intrinsic property of the material** — it depends only on the material and its temperature, not on shape or size.\n\nIf you stretch a copper wire to double its length (volume constant, so area halves):\n- **Resistance changes** — it quadruples ($$R \\propto \\frac{l}{A}$$: length doubles and area halves, so $$R$$ increases by factor of 4).\n- **Resistivity stays the same** — it's still copper at the same temperature. The material hasn't changed, only the geometry.\n\nAnalogy: resistivity is like density (property of the substance); resistance is like mass (depends on how much substance and its shape).", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "A wire has a circular cross-section with diameter $$d$$. Write the formula for cross-sectional area. What is the common error when substituting the diameter?", "answer": "The area is:\n$$A = \\frac{\\pi d^2}{4}$$\n\nThis comes from $$A = \\pi r^2$$ where $$r = \\frac{d}{2}$$:\n$$A = \\pi \\left(\\frac{d}{2}\\right)^2 = \\pi \\times \\frac{d^2}{4} = \\frac{\\pi d^2}{4}$$\n\nThe common error: substituting diameter $$d$$ directly into $$A = \\pi r^2$$ as if it were the radius. This gives $$\\pi d^2$$ instead of $$\\frac{\\pi d^2}{4}$$ — an area **4 times too large**. Since $$R = \\frac{\\rho l}{A}$$, this would give a resistance 4 times too small.\n\nRule: if you have the diameter, use $$A = \\frac{\\pi d^2}{4}$$. If you have the radius, use $$A = \\pi r^2$$. Never substitute $$d$$ where $$r$$ goes.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "A wire diameter is measured as 0.27 mm. A student converts this to metres as $$0.27 \\times 10^{-6}\\,\\text{m}$$. Why is this wrong, and how catastrophically does it affect the calculated resistance?", "answer": "The student confused millimetres (mm, $$\\times 10^{-3}$$) with micrometres (μm, $$\\times 10^{-6}$$).\n\nCorrect conversion: $$0.27\\,\\text{mm} = 0.27 \\times 10^{-3}\\,\\text{m} = 2.7 \\times 10^{-4}\\,\\text{m}$$\n\nStudent's error: $$0.27 \\times 10^{-6}\\,\\text{m} = 2.7 \\times 10^{-7}\\,\\text{m}$$ — this is 1000 times too small.\n\nThe cascade effect: since $$A = \\frac{\\pi d^2}{4}$$, area goes as $$d^2$$. If $$d$$ is 1000× too small, then $$d^2$$ is $$10^6$$ times too small, so $$A$$ is $$10^6$$ times too small. Since $$R = \\frac{\\rho l}{A}$$, the calculated resistance would be **$$10^6$$ times too large**. One prefix error cascades into a million-fold error in the final answer.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "Explain why the resistivity of a metal increases with temperature. What is the microscopic mechanism, and how does this make a filament lamp non-ohmic? (4 steps)", "answer": "- Step 1: In a metal, conduction electrons drift through a lattice of positive ions that are vibrating due to thermal energy.\n- Step 2: When temperature increases, the lattice ions vibrate with **greater amplitude and frequency** — they \"occupy more space.\"\n- Step 3: Larger vibrations mean electrons collide with ions more frequently. Each collision transfers kinetic energy from the electron to the lattice. More collisions per unit length → higher resistivity → higher resistance.\n- Step 4: For a filament lamp: as current flows, the filament heats up → increased lattice vibrations → increased resistivity → increased resistance. Since $$R$$ is not constant (it changes with the operating point), the I–V graph curves rather than forming a straight line. The lamp is non-ohmic.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "For a semiconductor (NTC thermistor), resistivity *decreases* as temperature increases — the opposite of a metal. Explain the mechanism. (3 steps)", "answer": "- Step 1: In a semiconductor at low temperature, most charge carriers (electrons) are **bound** to their atoms and cannot conduct. The material has high resistivity because few free carriers are available.\n- Step 2: As temperature increases, thermal energy **liberates more charge carriers** from their bound states. These freed electrons become conduction electrons, dramatically increasing the number available to carry current.\n- Step 3: The increase in carrier concentration **overwhelms** the effect of increased lattice vibrations (which would increase resistance, as in metals). Net result: resistivity decreases with temperature.\n\nThe fundamental contrast: in metals, the number of free electrons is already large and roughly constant — only the collision rate changes with temperature. In semiconductors, the **number** of carriers itself changes dramatically.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "A metal wire and an NTC thermistor are both heated from 20°C to 100°C. For each, state whether resistance increases or decreases, and identify the dominant mechanism. (3 steps)", "answer": "- Step 1: **Metal wire** — Resistance INCREASES. Dominant mechanism: increased lattice ion vibrations → more frequent electron-lattice collisions → higher resistivity. The number of free electrons is essentially unchanged.\n- Step 2: **NTC thermistor** — Resistance DECREASES. Dominant mechanism: thermal energy liberates more charge carriers from bound states → more free electrons available to conduct → lower resistivity. The increase in carrier concentration overwhelms the increase in lattice vibrations.\n- Step 3: \"NTC\" stands for **Negative Temperature Coefficient** — resistance goes negative (decreases) as temperature increases. This is a useful mnemonic for the direction.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "In Core Practical 7, what is the aim, and what are the independent, dependent, and control variables?", "answer": "**Aim:** To determine the resistivity $$\\rho$$ of the material of a given wire.\n\n**Variables:**\n- **Independent:** Length $$l$$ of the wire segment (varied in steps of 0.10 m or 0.25 m, with at least 8–10 readings).\n- **Dependent:** Resistance $$R$$ (calculated from $$R = \\frac{V}{I}$$ at each length, or read from an ohmmeter).\n- **Controlled:**\n  + Voltage across the wire (keep constant, check with voltmeter)\n  + Wire material (same wire throughout)\n  + Temperature (switch off between readings)\n  + Cross-sectional area (same wire = same diameter)", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Describe the circuit used in CP7. Where is the ammeter, where is the voltmeter, and what is the role of the \"flying lead\"? (3 steps)", "answer": "- Step 1: The test wire is taped along a metre ruler with one end at the zero mark. The **ammeter** is connected in **series** with the wire and the power supply — it measures the current through the wire.\n- Step 2: The **voltmeter** is connected in **parallel** across the test segment of the wire — it measures the p.d. across only the length being tested.\n- Step 3: The **flying lead** (a crocodile clip on a wire) is attached to the voltmeter and slides along the wire to different positions on the ruler, setting the measured length $$l$$. One voltmeter terminal is fixed at $$l = 0$$; the flying lead is moved to $$l = 0.25, 0.50, 0.75\\ldots$$ m.\n\nThis ensures V and I are measured for each specific length, allowing $$R = \\frac{V}{I}$$ to be calculated for that segment.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "In CP7, the wire diameter is measured at 5–10 different positions and orientations. Give two distinct reasons why, and explain why this is especially important given the relationship between area and diameter. (3 steps)", "answer": "- Step 1: **Reason 1 — Non-circularity:** The wire may not be perfectly circular. Measuring at different orientations (rotating the wire) checks for elliptical or irregular cross-sections. Averaging gives a better effective diameter.\n- Step 2: **Reason 2 — Non-uniformity:** The diameter may vary along the wire due to manufacturing inconsistencies. Measuring at different positions checks for this variation. Averaging reduces random error.\n- Step 3: **Why it matters so much:** Since $$A \\propto d^2$$, any error in $$d$$ is **squared** in its effect on $$A$$, and hence on the calculated $$\\rho$$. A 2% error in diameter → 4% error in area → 4% error in resistivity. This amplification is why we use a micrometer (resolution 0.01 mm) and take multiple readings.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "What is a micrometer zero error, what type of error does it cause if uncorrected, and how do you correct it?", "answer": "A **zero error** occurs when the micrometer reads a non-zero value with the jaws fully closed (nothing between them). For example, if it reads +0.02 mm when closed, every subsequent measurement will be 0.02 mm too high.\n\nIf uncorrected, this is a **systematic error** — it shifts all measurements in the same direction by a constant amount. Unlike random errors, systematic errors cannot be reduced by averaging.\n\nCorrection: note the zero error, and **subtract** it from every reading. For example, if zero error is +0.02 mm and a reading is 0.27 mm, the true diameter is $$0.27 - 0.02 = 0.25\\,\\text{mm}$$.\n\nThis matters because an incorrect diameter leads to an incorrect area, which leads to an incorrect resistivity — all shifted consistently in one direction.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "In CP7, you plot R (y-axis) against l (x-axis). Show that the gradient equals $$\\frac{\\rho}{A}$$, and explain how to obtain the resistivity from the graph. (4 steps)", "answer": "- Step 1: Start with the resistivity formula: $$R = \\frac{\\rho l}{A}$$\n- Step 2: Rearrange to match the straight-line equation $$y = mx + c$$:\n$$R = \\underbrace{\\frac{\\rho}{A}}_{m} \\cdot l + \\underbrace{0}_{c}$$\n- Step 3: Comparing: $$y = R$$, $$x = l$$, gradient $$m = \\frac{\\rho}{A}$$, y-intercept $$c = 0$$ (line should pass through origin).\n- Step 4: To find resistivity: $$\\rho = \\text{gradient} \\times A$$, where $$A = \\frac{\\pi \\bar{d}^2}{4}$$.\n\n**Common trap:** The gradient gives $$\\frac{\\rho}{A}$$, NOT $$\\rho$$. You must multiply by A to get resistivity. Missing this final multiplication is a frequent mark-scheme error.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "Instead of measuring R for a single length and calculating $$\\rho = \\frac{RA}{l}$$, CP7 uses a graphical method. Give two advantages of the graphical approach. (3 steps)", "answer": "- Step 1: **Reduces random error:** A single R and l measurement is subject to random errors (reading errors, fluctuations). The line of best fit effectively averages over many data points, making the gradient more reliable than any single pair of readings.\n- Step 2: **Eliminates systematic error from contact resistance:** Crocodile clips introduce a small, constant contact resistance that shifts every R measurement up by the", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}], "count": 20}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Define resistance (R) and state its SI unit. Explain why R = V/I is a definition, not Ohm's Law. (2 steps)", "answer": "- Step 1: **Resistance** is the ratio of potential difference (V) across a component to the current (I) through it: $ R = \\frac{V}{I} $. Its SI unit is the **ohm (Ω)**.  \n- Step 2: Ohm’s Law is a specific statement about materials where $ I \\propto V $ (at constant temperature). $ R = V/I $ is a general definition applicable to all components, including non-ohmic ones like diodes.  \n\n**Takeaway:** Resistance quantifies how much a component opposes current, regardless of whether it obeys Ohm’s Law.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Describe how the resistance of a metal filament lamp changes with temperature. Is it an ohmic conductor? Explain. (2 steps)", "answer": "- Step 1: As temperature increases, lattice ions in the metal vibrate more vigorously, increasing collisions with electrons. This raises the resistivity ($ \\rho $), making resistance ($ R \\propto \\rho $) increase.  \n- Step 2: The I–V graph curves (non-linear), meaning $ R $ is not constant. The lamp is **non-ohmic** because $ I \\propto V $ only holds at constant temperature, which isn’t the case here.  \n\n**Takeaway:** Temperature-dependent resistivity causes non-ohmic behavior in filament lamps.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Derive the SI unit of resistivity ($ \\rho $) using the equation $ R = \\frac{\\rho l}{A} $. (2 steps)", "answer": "- Step 1: Rearranging $ \\rho = \\frac{RA}{l} $, substitute SI units:  \n  $ \\rho = \\frac{(\\Omega)(m^2)}{m} = \\Omega \\cdot m $.  \n- Step 2: Resistivity’s unit ($ \\Omega \\cdot m $) reflects its role as a material-dependent property: higher $ \\rho $ means stronger opposition to current.  \n\n**Takeaway:** Resistivity is an intrinsic material property, unlike resistance, which depends on geometry.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why is a micrometer used to measure the diameter of a wire in the resistivity experiment? Explain how this affects the calculation of cross-sectional area. (2 steps)", "answer": "- Step 1: A micrometer provides high resolution (±0.01 mm), crucial for thin wires. Diameter errors strongly affect area ($ A = \\pi d^2/4 $), as fractional uncertainty in $ d $ is doubled in $ A $.  \n- Step 2: Example: A 0.1 mm error in $ d = 0.5 $ mm leads to a 40% error in $ A $, drastically skewing $ \\rho = \\frac{RA}{l} $.  \n\n**Takeaway:** Precision in diameter measurement is critical to minimize uncertainty in resistivity calculations.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": true}, {"question": "A wire’s length is halved and its diameter is halved. What happens to its resistance? Explain using $ R = \\frac{\\rho l}{A} $. (3 steps)", "answer": "- Step 1: Resistance depends on $ l $ and $ A $. Halving $ d $ reduces $ A $ by a factor of 4 (since $ A \\propto d^2 $).  \n- Step 2: Halving $ l $ reduces $ R \\propto l $, but reducing $ A $ increases $ R \\propto \\frac{1}{A} $.  \n- Step 3: Net effect: $ R \\propto \\frac{l}{A} \\rightarrow \\frac{l/2}{A/4} = 2l/A $, so $ R $ doubles.  \n\n**Takeaway:** Changes in diameter have a stronger effect on resistance than length due to the squared dependence in area.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "In Core Practical 7, why is a graph of $ R $ vs $ l $ plotted, and how is resistivity determined from it? (2 steps)", "answer": "- Step 1: The relationship $ R = \\frac{\\rho}{A}l $ implies $ R \\propto l $. A straight-line graph through the origin confirms this, with gradient $ \\rho/A $.  \n- Step 2: Calculate $ \\rho = \\text{gradient} \\times A $. This method averages data, reduces random errors, and avoids systematic errors like contact resistance (which shifts the intercept but not the gradient).  \n\n**Takeaway:** Graphical analysis improves accuracy by averaging multiple measurements and isolating systematic errors.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "Explain why the resistivity of a semiconductor like a thermistor decreases with temperature. Compare this to a metal. (2 steps)", "answer": "- Step 1: In semiconductors, increasing temperature frees more charge carriers (electrons/hole pairs), increasing $ n $. This dominates over lattice vibrations, reducing $ \\rho $.  \n- Step 2: In metals, $ n $ is constant, but lattice vibrations increase with temperature, increasing $ \\rho $.  \n\n**Takeaway:** The opposite temperature dependencies of $ \\rho $ distinguish metals (higher $ \\rho $ with T) and semiconductors (lower $ \\rho $ with T).", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What is the difference between resistance and resistivity? Provide one similarity. (2 steps)", "answer": "- Step 1: **Resistance (R)** is a component property depending on geometry ($ R = \\rho l/A $) and material. **Resistivity (ρ)** is an intrinsic material property independent of shape/size.  \n- Step 2: Similarity: Both quantify opposition to current. Resistivity is used to calculate resistance for a given material and geometry.  \n\n**Takeaway:** Resistivity characterizes materials, while resistance characterizes components.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why must the current be kept low in Core Practical 7? What would happen if it weren’t? (2 steps)", "answer": "- Step 1: High current heats the wire, increasing its resistivity ($ \\rho $) due to metal’s positive temperature coefficient.  \n- Step 2: This would give a falsely high $ \\rho $ value, as measured $ R $ would include thermal effects, violating the constant-temperature assumption.  \n\n**Takeaway:** Temperature control is vital to measure intrinsic resistivity, not temperature-influenced resistance.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "Calculate the percentage uncertainty in resistivity ($ \\rho $) if the diameter measurement has a ±2% uncertainty. Explain why this is critical. (2 steps)", "answer": "- Step 1: Area ($ A \\propto d^2 $) has ±4% uncertainty (twice the diameter’s). Since $ \\rho = \\frac{RA}{l} $, $ \\rho $’s uncertainty includes ±4% from $ A $.  \n- Step 2: Diameter dominates uncertainty in $ \\rho $, making careful, repeated measurements essential to minimize error.  \n\n**Takeaway:** Small errors in diameter measurements can significantly affect resistivity results due to the squared term in area.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is resistance defined as R = V/I and not R = V×I? Explain using the microscopic model of electron collisions. (3 steps)", "answer": "- Step 1: **Definition context**: Resistance measures how much a component impedes electron flow. \n- Step 2: **Microscopic reasoning**: \n+ Electrons collide with lattice ions. More collisions → higher resistance. Voltage (V) is the energy per charge to push electrons, current (I) is actual flow rate. Resistance is the ratio V/I, not product, because:\n  - Higher V increases E-field → faster electrons → higher I (so R=V/I remains constant for ohmic conductors).\n  - Higher I implies lower R (R ∝ 1/I) for fixed V.\n- Step 3: **Unit consistency**: Ω = V/A, not Ω·A. Multiplying V×I gives power (W), not resistance.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Two wires (A and B) have the same material but different lengths (A is longer) and different diameters (A is thinner). How do these changes affect their resistance? What if we compare resistivity instead of resistance? (2 steps)", "answer": "- Step 1: **Resistance comparison**:\n+ R ∝ l/A. Longer (A) → higher l.\n+ Thinner (A) → smaller radius → A ∝ r² → larger resistance.\n→ A has higher resistance than B.\n\n- Step 2: **Resistivity comparison**:\n+ Resistivity ρ is material-dependent only. Same material → same ρ.\n+ ρ for A = ρ for B, despite different R.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why does a filament lamp (non-ohmic) have a curved I-V graph? Explain how temperature-induced changes in resistivity cause this, using the relation R = ρl/A. (3 steps)", "answer": "- Step 1: **Initial state**: Cold filament has low ρ → low R (Ohm's Law applies: I ∝ V).\n- Step 2: **Heating effect**: Current flow → Joule heating → temperature ↑ → lattice vibrations ↑.\n- Step 3: **ρ and R increase**:\n+ For metals: ρ ∝ temperature → ρ ↑.\n+ R = ρl/A → R ↑ with temperature.\n→ I = V/R → slope dI/dV decreases → curve flattens at high V.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "A student measures a wire's diameter as 0.5mm instead of 0.25mm. What error occurs in: i) area calculation? ii) resistivity calculation? Explain the multiplicative effects. (4 steps)", "answer": "- Step 1: **Area formula**: A = πd²/4. \n- Step 2: **i) Area error**:\n+ Actual d = 0.25mm → A ∝ (0.25)² = 0.0625.\n+ Measured d = 0.5mm → A ∝ (0.5)² = 0.25.\n→ Area is overestimated by factor = 0.25/0.0625 = 4×.\n\n- Step 3: **ii) Resistivity error**:\n+ ρ = R×A/l. Overestimated A → overestimated ρ by 4×.\n- Step 4: **Takeaway**: Diameter measurement errors compound quadratically in A and linearly in ρ.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "In Core Practical 7, why plot R vs l instead of calculating ρ from a single measurement? Explain how this method reduces: i) random errors, ii) systematic errors. (3 steps)", "answer": "- Step 1: **Random error reduction**:\n+ Gradient calculation averages multiple data points, reducing scatter from e.g., inconsistent contact resistance.\n\n- Step 2: **Systematic error mitigation**:\n+ Contact resistance (constant offset) affects individual R measurements but not the gradient (ΔR/Δl).\n\n- Step 3: **Precision improvement**:\n+ High-precision slope measurement (via best-fit line) > single-point error.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "For semiconductors (e.g., thermistors), why does resistivity ρ decrease with temperature? Contrast this with metals using charge carrier behavior. (4 steps)", "answer": "- Step 1: **Metals**:\n+ Lattice vibrations dominate → higher temperature → more collisions → ↑ρ.\n\n- Step 2: **Semiconductors**:\n+ Thermal energy frees more charge carriers (electrons/holes).\n+ Carrier density ↑ → ρ ↓ despite increased lattice vibrations.\n\n- Step 3: **Dominant factor**:\n+ Carrier density effect > lattice vibration effect in semiconductors.\n\n- Step 4: **Mathematical contrast**:\n+ Metals: ρ ∝ T.\n+ Semiconductors: ρ ∝ e^(-E_gap/(kT)) (exponential decrease).", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "Why are units of resistivity Ω·m and not Ω/m? Derive the unit of ρ from R = ρl/A. (2 steps)", "answer": "- Step 1: **Rearranged formula**: ρ = R×A/l.\n- Step 2: **Unit substitution**:\n+ R: Ω, A: m², l: m → ρ = Ω×m²/m = Ω·m.\n+ Misconception check: Ω/m would imply ρ ∝ 1/l, contradicting R ∝ l.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "If a wire's length doubles and diameter halves, what happens to resistance? Use R = ρl/A and analyze the effect of l and A independently. (3 steps)", "answer": "- Step 1: **Length effect**: R ∝ l → 2× length → 2× higher R.\n- Step 2: **Diameter effect**: R ∝ 1/A. Diameter halved → radius halved → A ∝ (½r)² = ¼A → R ×4.\n- Step 3: **Combined effect**: 2× (from l) × 4× (from A) = 8× increase in R.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "What are the key visual differences between: i) an ohmic conductor's I-V graph, ii) a filament lamp's I-V graph, and iii) a semiconductor diode's I-V graph? Explain why. (5 steps)", "answer": "- Step 1: **i) Ohmic conductor**:\n+ Straight line through origin → constant R = V/I slope.\n\n- Step 2: **ii) Filament lamp**:\n+ S-shaped curve: steep at low V (R low) → flattens at high V (R high due to heating).\n\n- Step 3: **iii) Diode**:\n+ Exponential rise above threshold voltage (~0.7V) → non-linear + no negative symmetry.\n\n- Step 4: **Asymmetry explanation**:\n+ Diode allows current only in one direction → asymmetric graph.\n\n- Step 5: **Takeaway**: Graph shape reveals material behavior (constant ρ vs. temperature-dependent ρ vs. threshold effects).", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "In Core Practical 7, why should the current through the wire be kept small? Relate this to the formula R = ρl/A and the temperature dependence of resistivity. (3 steps)", "answer": "- Step 1: **Heating effect**: Current I → power P = I²R → temperature ↑.\n- Step 2: **Temperature impact on ρ**:\n+ For metals: ρ ∝ T → heating ↑ρ → ↑R.\n- Step 3: **Measurement corruption**:\n+ R = ρl/A → if ρ ↑ due to heating, measured R is artificially high → calculated ρ (from gradient) is wrong.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "State Ohm's Law and explain what is meant by an ohmic conductor. How does its I–V graph appear? (3 steps)", "answer": "- Step 1: Ohm's Law states that for a metallic conductor at constant temperature, the current I is directly proportional to the potential difference V across it: $$V \\propto I$$.\n- Step 2: An ohmic conductor is one that obeys Ohm's Law — its resistance remains constant regardless of the applied voltage (provided temperature is constant).\n- Step 3: The I–V graph for an ohmic conductor is a straight line passing through the origin. The gradient equals $$1/R$$, so a steeper line means lower resistance.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A component has a p.d. of 0.7 V across it when the current is 40 mA. Calculate its resistance at this operating point. (2 steps)", "answer": "- Step 1: Convert the current to amperes: $$I = 40\\ mA = 40 \\times 10^{-3}\\ A$$.\n- Step 2: Use the resistance formula (NOT R = IV): $$R = \\frac{V}{I} = \\frac{0.7}{40 \\times 10^{-3}} = \\frac{0.7}{0.04} = 17.5\\ \\Omega$$.\n\nAlways divide voltage by current — never multiply them. This was a confirmed common error in the lesson.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What is electrical resistivity? How does it differ from resistance? (3 steps)", "answer": "- Step 1: Resistivity (symbol ρ, \"rho\") is an intrinsic property of a material that measures how strongly the material opposes the flow of electric current. It is defined by the equation $$\\rho = \\frac{RA}{l}$$.\n- Step 2: The key difference: resistance R is a property of a specific component (depends on its shape, size, and material), while resistivity ρ is a property of the material itself (independent of shape or size).\n- Step 3: For example, a copper wire has the same resistivity as a copper block — both are made of copper. But the wire has much lower resistance because it is long and thin.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "State the unit of resistivity and derive it from the formula $$\\rho = RA/l$$. (2 steps)", "answer": "- Step 1: Starting from $$\\rho = \\frac{RA}{l}$$, substitute the SI units: resistance R in Ω, area A in m², length l in m.\n- Step 2: Therefore $$\\rho = \\frac{\\Omega \\cdot m^2}{m} = \\Omega \\cdot m$$ (ohm-metres). The common mistake is writing Ω/m, which is dimensionally incorrect.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Write down the resistivity equation and identify what each symbol represents. (1 step)", "answer": "The resistivity equation is: $$R = \\frac{\\rho l}{A}$$ where R is resistance (Ω), ρ is resistivity (Ω·m), l is the length of the conductor (m), and A is the cross-sectional area (m²). All quantities must be in SI units (metres, not millimetres).", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A wire has resistance R. If its length is doubled and its diameter is halved, what happens to its resistance? Explain using proportionality. (3 steps)", "answer": "- Step 1: From $$R = \\rho l/A$$, resistance is directly proportional to length (R ∝ l) and inversely proportional to area (R ∝ 1/A).\n- Step 2: Doubling length: l → 2l, so R doubles (factor of 2). Halving diameter: d → d/2, so area A ∝ d², so A → A/4. Since R ∝ 1/A, when area becomes quartered, resistance becomes four times larger (factor of 4).\n- Step 3: Combined effect: new R = 2 × 4 × original R = 8R. The resistance increases by a factor of 8.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A wire of diameter 0.30 mm is measured with a micrometer. Explain how to calculate its cross-sectional area in m². (3 steps)", "answer": "- Step 1: Convert diameter from mm to m: $$d = 0.30\\ mm = 0.30 \\times 10^{-3}\\ m = 3.0 \\times 10^{-4}\\ m$$. Remember: mm to m uses ×10⁻³, not ×10⁻⁶.\n- Step 2: The radius is half the diameter: $$r = d/2 = 1.5 \\times 10^{-4}\\ m$$.\n- Step 3: Calculate area using $$A = \\pi r^2 = \\pi (1.5 \\times 10^{-4})^2 = \\pi \\times 2.25 \\times 10^{-8} = 7.07 \\times 10^{-8}\\ m^2$$. Alternatively, use the equivalent formula $$A = \\frac{\\pi d^2}{4}$$.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Why is a micrometer screw gauge used to measure wire diameter rather than a ruler? (2 steps)", "answer": "- Step 1: A ruler has a resolution of typically 1 mm, which is too coarse for measuring thin wires (often 0.2–0.5 mm). This would introduce significant percentage uncertainty.\n- Step 2: A micrometer has a resolution of 0.01 mm (10 μm), giving much greater precision. Since cross-sectional area depends on diameter squared (A ∝ d²), small errors in d get amplified, so we need the most precise instrument available.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Sketch and explain the I–V graph for a filament lamp. Why is it non-ohmic? (3 steps)", "answer": "- Step 1: The I–V graph for a filament lamp is a curve that starts with a steep gradient at low voltage and gradually becomes shallower as voltage increases. It does NOT form a straight line through the origin.\n- Step 2: The lamp is non-ohmic because its resistance is not constant. As current flows, the filament heats up.\n- Step 3: At higher temperatures, the metal lattice ions vibrate more vigorously, causing more collisions with electrons. This increases resistivity, so resistance increases with temperature. The curve bends because R is no longer constant.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Explain why the resistance of a metal increases with temperature, while that of a semiconductor (NTC thermistor) decreases. (3 steps)", "answer": "- Step 1: For metals (e.g., copper, tungsten): as temperature increases, the lattice ions vibrate more violently. This increases the frequency of collisions between conduction electrons and the lattice, impeding electron flow more strongly. Hence resistivity ρ increases, and so does resistance R.\n- Step 2: For semiconductors (e.g., NTC thermistors): as temperature increases, more electrons gain enough energy to escape their atoms and become free charge carriers. The increase in carrier concentration outweighs the increased scattering, so overall resistivity decreases.\n- Step 3: This opposite behaviour is why metals have positive temperature coefficients (PTC) while semiconductors have negative temperature coefficients (NTC).", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": true}, {"question": "In Core Practical 7, why must the current through the test wire be kept small and the power switched off between readings? (2 steps)", "answer": "- Step 1: The resistivity of a material depends on its temperature. If a large current flows, the wire will heat up (Joule heating, $$P = I^2R$$).\n- Step 2: As the wire heats, its resistivity changes (increases for metals), which would alter the measured resistance and produce an inaccurate value for ρ. Keeping current low and switching off between readings ensures temperature remains roughly constant.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Describe the method for measuring the resistivity of a wire in Core Practical 7, including how the length is varied. (4 steps)", "answer": "- Step 1: Measure the diameter d of the wire at 5–10 positions along its length using a micrometer, rotating the wire to check for non-circularity. Calculate the mean diameter.\n- Step 2: Set up the circuit: ammeter in series with the test wire (taped to a metre ruler), voltmeter in parallel across the wire segment being measured.\n- Step 3: Use a flying lead (crocodile clip) to make contact at the zero end of the wire, and move it to different lengths (e.g., 0.25 m, 0.50 m, 0.75 m, up to the full length).\n- Step 4: At each length, record the current I and voltage V, then calculate resistance R = V/I. Alternatively, use an ohmmeter directly. Plot a graph of R against l.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "In CP7, a student plots R (y-axis) against l (x-axis). What does the gradient represent, and how is resistivity calculated from it? (2 steps)", "answer": "- Step 1: From the equation $$R = \\frac{\\rho l}{A}$$, comparing to $$y = mx$$, the gradient m equals $$\\frac{\\rho}{A}$$.\n- Step 2: To find resistivity: first calculate the cross-sectional area $$A = \\frac{\\pi d^2}{4}$$, then $$\\rho = \\text{gradient} \\times A$$. A common error is forgetting to multiply by A and quoting the gradient itself as ρ.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A student obtains the following data in CP7: mean diameter = 0.191 mm, gradient of R vs l graph = 7.9 Ω/m. Calculate the resistivity of the wire. (3 steps)", "answer": "- Step 1: Convert diameter to metres and calculate area: $$d = 0.191 \\times 10^{-3}\\ m$$. $$A = \\frac{\\pi d^2}{4} = \\frac{\\pi (0.191 \\times 10^{-3})^2}{4} = 2.86 \\times 10^{-8}\\ m^2$$.\n- Step 2: The gradient is 7.9 Ω/m, which equals ρ/A. Rearranging: $$\\rho = \\text{gradient} \\times A$$.\n- Step 3: $$\\rho = 7.9 \\times 2.86 \\times 10^{-8} = 2.26 \\times 10^{-7}\\ \\Omega \\cdot m$$ ≈ $$2.3 \\times 10^{-7}\\ \\Omega \\cdot m$$.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Why is a graphical method (plotting R vs l) preferred over taking a single measurement of R and l to calculate resistivity? (3 steps)", "answer": "- Step 1: Random error reduction: taking multiple readings at different lengths and drawing a best-fit line averages out random errors in measuring R and l.\n- Step 2: Systematic error elimination: if there is contact resistance (e.g., poor connection at the crocodile clips), the graph may not pass through the origin but may have a y-intercept. However, the gradient (ρ/A) remains accurate because the intercept simply represents a constant offset.\n- Step 3: Visual confirmation: the linear relationship R ∝ l confirms the experiment is working correctly. Any deviation from a straight line would indicate problems (e.g., wire heating up).", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "In CP7, a student measures the diameter of a wire five times: 0.27 mm, 0.28 mm, 0.27 mm, 0.26 mm, 0.27 mm. Calculate the mean diameter and the cross-sectional area. (3 steps)", "answer": "- Step 1: Calculate the mean diameter: $$d_{mean} = \\frac{0.27 + 0.28 + 0.27 + 0.26 + 0.27}{5} = \\frac{1.35}{5} = 0.27\\ mm$$.\n- Step 2: Convert to metres: $$d = 0.27 \\times 10^{-3}\\ m = 2.7 \\times 10^{-4}\\ m$$.\n- Step 3: Calculate area: $$A = \\frac{\\pi d^2}{4} = \\frac{\\pi (2.7 \\times 10^{-4})^2}{4} = \\frac{\\pi \\times 7.29 \\times 10^{-8}}{4} = 5.73 \\times 10^{-8}\\ m^2$$.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Explain what is meant by \"zero error\" in a micrometer and why it must be corrected. (2 steps)", "answer": "- Step 1: Zero error occurs when the jaws of the micrometer are closed completely but the thimble scale does not read zero. This is a systematic error — all subsequent readings will be offset by this amount.\n- Step 2: If not corrected, the calculated cross-sectional area will be wrong, leading to an incorrect value of resistivity. To correct: if the micrometer reads positive when closed, subtract this value from all measurements; if negative, add it.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A wire has resistance 5.0 Ω and current 2.0 A flowing through it. What is the potential difference across the wire? (1 step)", "answer": "Rearranging $$R = V/I$$ gives $$V = IR$$. Substituting: $$V = 2.0\\ A \\times 5.0\\ \\Omega = 10\\ V$$.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A copper wire of length 0.50 m and diameter 0.40 mm has resistivity $$1.72 \\times 10^{-8}\\ \\Omega \\cdot m$$. Calculate its resistance to 2 significant figures. (3 steps)", "answer": "- Step 1: Convert diameter to metres: $$d = 0.40 \\times 10^{-3}\\ m$$. Radius $$r = d/2 = 0.20 \\times 10^{-3}\\ m$$.\n- Step 2: Calculate cross-sectional area: $$A = \\pi r^2 = \\pi (0.20 \\times 10^{-3})^2 = \\pi \\times 4.0 \\times 10^{-8} = 1.257 \\times 10^{-7}\\ m^2$$.\n- Step 3: Calculate resistance: $$R = \\rho l/A = \\frac{1.72 \\times 10^{-8} \\times 0.50}{1.257 \\times 10^{-7}} = \\frac{8.6 \\times 10^{-9}}{1.257 \\times 10^{-7}} \\approx 0.068\\ \\Omega$$ ≈ 0.068 Ω (2 s.f. = 0.068 Ω).", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Explain the difference between resistance and resistivity in terms of what each property depends on. (2 steps)", "answer": "- Step 1: Resistance R depends on both the material (its resistivity) AND the physical dimensions of the component — specifically its length l and cross-sectional area A. A long thin wire has high R; a short thick wire has low R.\n- Step 2: Resistivity ρ depends only on the material itself and its temperature. It is an intrinsic property — a measure of how strongly the material opposes current flow, regardless of how much of the material you have.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Why is nichrome or constantan preferred over copper for making resistor wires in laboratory experiments? (2 steps)", "answer": "- Step 1: Nichrome and constantan have much higher resistivity than copper (nichrome ≈ $$1.1 \\times 10^{-6}\\ \\Omega \\cdot m$$, constantan ≈ $$4.9 \\times 10^{-7}\\ \\Omega \\cdot m$$, vs copper ≈ $$1.72 \\times 10^{-8}\\ \\Omega \\cdot m$$).\n- Step 2: This means much shorter lengths are needed to achieve the same resistance, making the resistors more compact. Additionally, nichrome and constantan have a very low temperature coefficient — their resistance changes very little with temperature, making them more stable for precise measurements.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In CP7, explain why diameter measurements should be taken at different positions along the wire and at different orientations. (2 steps)", "answer": "- Step 1: The wire may not be perfectly uniform — its diameter could vary slightly along its length due to manufacturing imperfections.\n- Step 2: Taking measurements at different positions and rotating the wire checks for non-circularity (the wire might be slightly oval). Averaging multiple readings reduces random error in the cross-sectional area.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "What precautions should be taken when connecting the flying lead to the wire in CP7, and why? (2 steps)", "answer": "- Step 1: The crocodile clip must be pressed firmly onto the wire to ensure good electrical contact. Poor contact adds extra (contact) resistance, which would be included in the measured R and cause error.\n- Step 2: Additionally, the fixed end of the circuit must align exactly with the zero mark on the ruler. Any offset creates a systematic error in the measured length l.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A wire of length L and diameter D has resistance R. If the length is doubled and the diameter is halved, state the new resistance in terms of R. (2 steps)", "answer": "- Step 1: From $$R \\propto l/d^2$$ (since A ∝ d²). Doubling length: l → 2l multiplies R by 2. Halving diameter: d → d/2 means d² → d²/4, so A → A/4, which multiplies R by 4 (since R ∝ 1/A).\n- Step 2: Combined effect: new R = 2 × 4 × R = 8R.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "A student in CP7 finds the gradient of their R vs l graph is 6.3 Ω/m, and the wire diameter is 0.30 mm. Calculate the resistivity. (3 steps)", "answer": "- Step 1: Calculate cross-sectional area: $$d = 0.30 \\times 10^{-3}\\ m$$. $$A = \\frac{\\pi d^2}{4} = \\frac{\\pi (0.30 \\times 10^{-3})^2}{4} = \\frac{\\pi \\times 9.0 \\times 10^{-8}}{4} = 7.07 \\times 10^{-8}\\ m^2$$.\n- Step 2: Gradient = ρ/A = 6.3 Ω/m. Rearranging: ρ = gradient × A.\n- Step 3: $$\\rho = 6.3 \\times 7.07 \\times 10^{-8} = 4.45 \\times 10^{-7}\\ \\Omega \\cdot m$$ ≈ $$4.5 \\times 10^{-7}\\ \\Omega \\cdot m$$.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Explain why a filament lamp is considered non-ohmic, referencing the effect of temperature on resistance. (2 steps)", "answer": "- Step 1: As current increases through the filament lamp, electrical power is dissipated ($$P = I^2R$$), causing the filament to heat up significantly.\n- Step 2: For metals (tungsten filament), as temperature rises, resistivity increases due to increased lattice vibration. This means resistance is not constant — it increases with current/voltage. Since the I–V graph is not a straight line through the origin, it is non-ohmic.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In CP7, how is the uncertainty in resistivity affected by the uncertainty in diameter? Explain using fractional uncertainty. (3 steps)", "answer": "- Step 1: Cross-sectional area A = πd²/4. Since area depends on d squared, a small uncertainty in d leads to a larger percentage uncertainty in A.\n- Step 2: Mathematically, the fractional uncertainty in A is twice the fractional uncertainty in d: $$\\frac{\\delta A}{A} = 2\\frac{\\delta d}{d}$$. This is because differentiating d² gives 2d·dd, so relative terms multiply by 2.\n- Step 3: Since ρ = gradient × A, the fractional uncertainty in ρ is the sum of uncertainties in gradient and area: $$\\frac{\\delta \\rho}{\\rho} = \\frac{\\delta(\\text{gradient})}{\\text{gradient}} + \\frac{\\delta A}{A}$$. Hence uncertainty in d has a magnified effect on the final ρ.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Two wires made of the same material have the same length but wire A has twice the diameter of wire B. Compare their resistances. (2 steps)", "answer": "- Step 1: Resistance R ∝ 1/A, and A ∝ d². Since wire A has twice the diameter, d_A = 2d_B, so area A_A = π(2d_B)²/4 = 4 × (πd_B²/4) = 4A_B.\n- Step 2: Since R ∝ 1/A, doubling the area quarters the resistance. Therefore R_A = R_B / 4. Wire A has one-quarter the resistance of wire B.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Explain what happens to electrons when they pass through a resistor. Do they get \"used up\" or \"stored\"? (2 steps)", "answer": "- Step 1: Electrons do not get used up or stored in a resistor. The same number of electrons enter one end as leave the other.\n- Step 2: What happens is that electrons collide with vibrating lattice ions, losing kinetic energy as thermal energy (heat). This slows the electrons down, reducing the rate of flow (current). The resistor \"dissipates\" energy but does not store charge.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A carbon chip has resistivity $$3.0 \\times 10^{-5}\\ \\Omega \\cdot m$$, length 10 mm, and rectangular cross-section 5 mm × 1 mm. Calculate its resistance. (3 steps)", "answer": "- Step 1: Convert all lengths to metres: $$l = 10 \\times 10^{-3} = 0.010\\ m$$. Cross-sectional area $$A = (5 \\times 10^{-3}) \\times (1 \\times 10^{-3}) = 5.0 \\times 10^{-6}\\ m^2$$.\n- Step 2: Use $$R = \\rho l / A$$.\n- Step 3: $$R = \\frac{3.0 \\times 10^{-5} \\times 0.010}{5.0 \\times 10^{-6}} = \\frac{3.0 \\times 10^{-7}}{5.0 \\times 10^{-6}} = 0.060\\ \\Omega$$.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In CP7, if the graph of R against l does not pass through the origin, what does this indicate, and does it affect the calculation of resistivity? (2 steps)", "answer": "- Step 1: A non-zero intercept on the R-axis indicates the presence of contact resistance — additional resistance from the poor connection between the crocodile clips and the wire. This is a systematic error.\n- Step 2: When calculating ρ from the gradient (ρ = gradient × A), this systematic error does NOT affect the result. The gradient remains correct because contact resistance adds a constant offset to all R readings, affecting the intercept but not the slope of the line.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "Why is it important to keep the voltage across the wire constant in CP7, rather than just setting a fixed current? (2 steps)", "answer": "- Step 1: In the standard CP7 method, you set the power supply voltage to a fixed value (e.g., 6 V) and measure the current at each length. This keeps the electrical conditions consistent.\n- Step 2: More importantly, the voltmeter is connected directly across the wire segment being measured. If you varied the current instead, the voltage drop would change, and the power dissipated in the wire (P = IV) would vary, potentially causing uneven heating at different lengths and corrupting the ρ measurement.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Explain why copper is a much better conductor than carbon (graphite). (1 step)", "answer": "Copper has a much lower resistivity (≈$$1.72 \\times 10^{-8}\\ \\Omega \\cdot m$$) compared to carbon/graphite (≈$$7 \\times 10^{-5}\\ \\Omega \\cdot m$$). This means for the same dimensions, copper offers far less opposition to current flow. The difference arises from the number and mobility of charge carriers — copper has many free electrons per unit volume that move easily, while carbon has fewer and they are less mobile.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A wire is 1.0 m long with cross-sectional area $$5.0 \\times 10^{-7}\\ m^2$$ and resistance 3.4 Ω. Calculate the resistivity of the material. (2 steps)", "answer": "- Step 1: Rearrange the resistivity formula: $$\\rho = \\frac{RA}{l}$$.\n- Step 2: $$\\rho = \\frac{3.4\\ \\Omega \\times 5.0 \\times 10^{-7}\\ m^2}{1.0\\ m} = 1.7 \\times 10^{-6}\\ \\Omega \\cdot m$$.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "What is the purpose of a fuse in an electrical circuit? If a kettle is rated at 240 V and 3.0 kW, show whether a 13 A fuse is appropriate. (3 steps)", "answer": "- Step 1: A fuse is a safety device that protects appliances and circuits by melting (breaking) if the current exceeds its rated value.\n- Step 2: Calculate the operating current: $$P = VI$$, so $$I = P/V = \\frac{3000\\ W}{240\\ V} = 12.5\\ A$$.\n- Step 3: Since 12.5 A < 13 A, the kettle operates safely without blowing the fuse. If the current exceeded 13 A (e.g., due to a fault), the fuse would melt and disconnect the circuit.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In CP7, describe how to determine the uncertainty in the gradient of the R vs l graph. (2 steps)", "answer": "- Step 1: Draw the best-fit straight line through the data points. Then draw two additional lines: one with the maximum possible gradient and one with the minimum possible gradient that still pass through or near the error bars (or the spread of points).\n- Step 2: Calculate the gradient of each line. The uncertainty in the gradient is approximately half the difference between the maximum and minimum gradients: $$\\delta(\\text{gradient}) = \\frac{\\text{gradient}_{max} - \\text{gradient}_{min}}{2}$$.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A wire is made longer while keeping the same material and diameter. What happens to its resistance, and why? (1 step)", "answer": "Resistance increases proportionally. From $$R = \\rho l/A$$, for fixed ρ and A, R is directly proportional to length l. A longer wire provides more opportunities for electron-lattice collisions, impeding current flow more — exactly what resistance measures.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "Why can superconductors carry current with zero resistance? (1 step)", "answer": "In superconductors, below a critical temperature, electrons form Cooper pairs and move through the lattice without colliding with the ions. There is no scattering, no energy loss, and hence zero resistivity. This is a quantum mechanical effect that eliminates electrical resistance entirely.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Explain why the current should be switched off between readings in CP7, and how this relates to obtaining an accurate value of resistivity. (2 steps)", "answer": "- Step 1: When current flows through the wire, electrical energy is converted to heat ($$P = I^2R$$). This raises the wire's temperature.\n- Step 2: For metals, increased temperature increases resistivity (ρ increases). If the wire is hotter during later measurements than earlier ones, the R vs l relationship won't be perfectly linear, and the calculated ρ will be inaccurate. Switching off between readings allows the wire to cool back to room temperature.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}], "count": 39}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "State Ohm's Law. What specific condition must be true for a conductor to be classified as \"ohmic\"? (2 steps)", "answer": "- Step 1: Ohm's Law states that the current ($I$) flowing through a conductor is directly proportional to the potential difference ($V$) across it, provided the physical conditions (like temperature) remain constant.\n- Step 2: For a conductor to be ohmic, the ratio $V/I$ must be constant. Graphically, this means its $I$-$V$ graph is a straight line passing through the origin.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A student states that because a resistor slows down electrons, it must therefore \"store\" electrons (like a capacitor). Explain why this is a misconception. (2 steps)", "answer": "- Step 1: A common misconception is that resistors act like storage tanks for electrons. This is incorrect.\n- Step 2: The primary function of a resistor is to **slow down** the rate of flow of electrons (the current) by providing collisions with lattice ions. While some energy is dissipated as heat, the number of electrons entering one end of the resistor is (almost) the same as the number leaving the other end; they are not stored inside.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A student uses a voltmeter and ammeter to measure the p.d. and current for a component. They record $V = 4.0\\ \\text{V}$ and $I = 0.2\\ \\text{A}$. They accidentally calculate $R$ as $0.8\\ \\Omega$ by multiplying ($R = V \\times I$). What is the correct resistance, and why is their method wrong? (2 steps)", "answer": "- Step 1: The correct calculation is division: $$R = \\frac{V}{I} = \\frac{4.0}{0.2} = 20\\ \\Omega$$\n- Step 2: The student confused the formula $R = V/I$ with $R = V \\times I$. Resistance is defined as the ratio (division) of voltage to current. Multiplying the two values gives power ($P = IV$), not resistance. This is a very common exam trap.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Define electrical resistivity ($\\rho$). Include the formula and its unit in your answer. (1 step)", "answer": "- Step 1: Resistivity ($\\rho$) is an intrinsic property of a material that measures how strongly it opposes the flow of electric current. It is defined by the equation: $$R = \\frac{\\rho l}{A}$$ where $R$ is resistance, $l$ is length, and $A$ is cross-sectional area. The unit of resistivity is ohm-metres ($\\Omega \\cdot \\text{m}$).", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Explain why resistivity is described as an \"intrinsic\" property, whereas resistance is described as an \"extrinsic\" property. (2 steps)", "answer": "- Step 1: **Intrinsic** properties depend only on the material itself (e.g., the type of metal or semiconductor) and its temperature, not on the shape or size of the object.\n- Step 2: **Extrinsic** properties (like resistance) depend on the dimensions of the specific component. For example, a long copper wire has more resistance than a short one, even though the *resistivity* of copper remains the same in both cases.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Derive the unit of resistivity ($\\Omega \\cdot \\text{m}$) from the formula $R = \\rho l / A$. (2 steps)", "answer": "- Step 1: Start with the rearranged formula $\\rho = \\frac{RA}{l}$.\n- Step 2: Substitute the units: Resistance ($R$) is in $\\Omega$, Area ($A$) is in $\\text{m}^2$, and Length ($l$) is in $\\text{m}$. Therefore: $$\\rho = \\frac{\\Omega \\cdot \\text{m}^2}{\\text{m}} = \\Omega \\cdot \\text{m}$$\n+ Note: A common error is writing $\\Omega/\\text{m}$, which is incorrect.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "A wire has a circular cross-section with diameter $d$. Write the formula for its cross-sectional area $A$ in terms of $d$. (1 step)", "answer": "- Step 1: The area of a circle is $A = \\pi r^2$. Since radius $r = d/2$, the area can be written as: $$A = \\pi \\left(\\frac{d}{2}\\right)^2 = \\frac{\\pi d^2}{4}$$\n+ Common mistake: Substituting $d$ directly into $A = \\pi r^2$ gives an area 4 times too large.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "You measure the diameter of a wire using a micrometer as $0.28\\ \\text{mm}$. What is this value in metres, and why is this conversion important for calculating resistivity? (2 steps)", "answer": "- Step 1: $0.28\\ \\text{mm} = 0.28 \\times 10^{-3}\\ \\text{m} = 2.8 \\times 10^{-4}\\ \\text{m}$.\n- Step 2: The formula $R = \\rho l/A$ requires all quantities in SI base units (metres, not millimetres). Using millimetres would result in an error of a factor of $10^6$ in the area calculation, completely corrupting the resistivity value.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A wire of length $L$ and diameter $D$ has resistance $R$. If the length is doubled and the diameter is halved, what is the new resistance in terms of $R$? (2 steps)", "answer": "- Step 1: Resistance $R$ is proportional to length $l$ and inversely proportional to the area $A$ ($R \\propto l/A$). Since $A \\propto d^2$, halving the diameter ($d \\rightarrow d/2$) reduces the area by a factor of 4 ($A \\rightarrow A/4$).\n- Step 2: New length: $2L$. New area: $A/4$. Therefore: $$R_{new} = R \\times \\frac{2L}{A/4} = R \\times 2 \\times 4 = 8R$$\n+ The resistance increases by a factor of 8.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Describe the microscopic mechanism that causes the resistance in a metallic conductor. (2 steps)", "answer": "- Step 1: In a metal, current is carried by free electrons moving through a lattice of positive ions.\n- Step 2: As electrons drift through, they collide with the vibrating lattice ions. These collisions \"slow down\" the electrons, reducing their drift velocity. The kinetic energy from the electrons is transferred to the lattice, dissipating as thermal energy (heat). This opposition to flow is resistance.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "How does the resistivity of a pure metal (like copper) change with temperature? Why does this happen? (2 steps)", "answer": "- Step 1: The resistivity of a metal **increases** with temperature.\n- Step 2: As temperature rises, the lattice ions vibrate more vigorously (\"phonons\"). This increases the frequency and effectiveness of collisions between the lattice and the conduction electrons, impeding the flow of current more strongly, thus increasing resistivity.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "How does the resistivity of a semiconductor (like an NTC thermistor) change with temperature? Why does this happen? (2 steps)", "answer": "- Step 1: The resistivity of a semiconductor **decreases** with temperature.\n- Step 2: Unlike metals, the increase in temperature provides enough energy to free more charge carriers (electrons) from their atoms. The massive increase in the number of charge carriers outweighs the increase in lattice scattering, allowing more current to flow and reducing resistivity.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Explain why the filament of a incandescent light bulb is considered a \"non-ohmic\" conductor. (2 steps)", "answer": "- Step 1: The filament is made of tungsten, a metal. As the current increases, the filament heats up significantly (to emit light).\n- Step 2: Because the temperature increases, the resistivity of the metal increases (as per Q12). This means the resistance is not constant; it increases with current. The $I$-$V$ graph is a curve, not a straight line, so it does not obey Ohm's Law.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "In Core Practical 7 (measuring resistivity), state two precautions taken to ensure accurate results and explain the reasoning for each. (2 steps)", "answer": "- Step 1: **Keep current low / switch off between readings:** This prevents the wire from heating up. If the wire gets hot, its resistivity changes (increases for metals), altering the resistance and giving an inaccurate result.\n- Step 2: **Measure diameter at multiple points and orientations:** The wire might not be perfectly circular or uniform. Taking multiple readings and averaging reduces random error in the diameter and hence the area.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "In Core Practical 7, the results are plotted as a graph of Resistance ($R$) on the y-axis against Length ($l$) on the x-axis. What does the gradient of this graph represent? (1 step)", "answer": "- Step 1: Comparing $R = \\frac{\\rho l}{A}$ to the equation of a straight line $y = mx$, we can see that $y=R$, $x=l$, and $m = \\frac{\\rho}{A}$.\n+ Therefore, the gradient is equal to $\\rho / A$.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "In Core Practical 7, how do you determine the resistivity of the wire from the graph? (2 steps)", "answer": "- Step 1: First, calculate the cross-sectional area $A$ of the wire using its diameter: $A = \\pi d^2 / 4$.\n- Step 2: The gradient of the $R$ vs $l$ graph is equal to $\\rho / A$. To find resistivity $\\rho$, multiply the gradient by the cross-sectional area: $$\\rho = \\text{gradient} \\times A$$", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Why is a graphical method (plotting $R$ vs $l$) preferred in Core Practical 7 over taking a single measurement of $R$ and $l$? (2 steps)", "answer": "- Step 1: It reduces **random errors** by averaging the trend across many data points rather than relying on one potentially faulty reading.\n- Step 2: It accounts for **systematic errors** like contact resistance. If the $R$ vs $l$ graph does not pass through the origin (due to contact resistance at the crocodile clips), the gradient (which gives $\\rho/A$) remains accurate, whereas a single point would include this offset error.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Explain what \"zero error\" is in the context of a micrometer screw gauge, and why it must be corrected. (2 steps)", "answer": "- Step 1: Zero error occurs when the jaws of the micrometer are closed completely but the thimble scale does not read exactly zero.\n- Step 2: If not corrected, every subsequent diameter measurement will be systematically too large or too small. This leads to an incorrect calculation of the cross-sectional area $A$, and consequently, an incorrect value for resistivity $\\rho$.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A student finds that their $R$ vs $l$ graph has a significant intercept on the y-axis (positive R when l = 0). What does this intercept represent, and does it affect the calculation of resistivity? (2 steps)", "answer": "- Step 1: The intercept represents **contact resistance**—extra resistance from the poor electrical connection at the points where the circuit connects to the wire (e.g., crocodile clips).\n- Step 2: No, it does not affect the calculation of resistivity. Since $R \\propto l$, the gradient (which gives $\\rho/A$) is unaffected by this constant offset. However, it indicates a systematic error in the experimental setup that should be minimized (e.g., by pressing contacts more firmly).", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Two wires are made of the same material and have the same length. Wire A has twice the diameter of Wire B. Compare the resistance of Wire A to Wire B. (2 steps)", "answer": "- Step 1: Resistance $R \\propto 1/A$, and area $A \\propto d^2$. If diameter $d$ doubles ($d_A = 2d_B$), then $d_A^2 = 4d_B^2$.\n- Step 2: Therefore, the area of Wire A is 4 times that of Wire B. Since $R \\propto 1/A$, the resistance of Wire A is $\\frac{1}{4}$ of the resistance of Wire B. $$R_A = \\frac{R_B}{4}$$", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A wire has a resistance of $10\\ \\Omega$. If its length is reduced to one-third of its original length (assuming the temperature stays the same), what is the new resistance? (1 step)", "answer": "- Step 1: From $R = \\rho l / A$, resistance is directly proportional to length ($R \\propto l$). Reducing the length to $1/3$ reduces the resistance to $1/3$.\n+ New resistance = $10 / 3 \\approx 3.3\\ \\Omega$.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "The table below gives data for four wires made of different materials but with identical dimensions. Which wire has the highest resistivity? (Mental Math) (1 step)\n- Wire 1: $R = 5\\ \\Omega$\n- Wire 2: $R = 20\\ \\Omega$\n- Wire 3: $R = 0.5\\ \\Omega$\n- Wire 4: $R = 2\\ \\Omega$", "answer": "- Step 1: Since length ($l$) and area ($A$) are identical for all wires, resistance $R$ is directly proportional to resistivity $\\rho$ ($R = \\rho l / A$). Therefore, the highest resistance corresponds to the highest resistivity.\n+ Wire 2 ($20\\ \\Omega$) has the highest resistivity.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A student tries to measure the resistivity of a wire but uses a very high current, causing the wire to become very hot. How will this affect the final calculated value of resistivity compared to the true value? (1 step)", "answer": "- Step 1: For metals, resistivity increases with temperature. If the wire heats up significantly, $\\rho$ increases during the experiment.\n+ This means the calculated value of resistivity will be **higher** than the true (room temperature) value of the material.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}], "count": 23}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "How is the resistance of a component defined in terms of the potential difference across it and the current through it, and what is the SI unit?", "answer": "Resistance is defined as the ratio of potential difference to current: $$R = V/I$$. The unit is the ohm $$(\\Omega)$$, where $$1\\,\\Omega = 1\\,\\text{V/A}$$. The key point is that we *divide* — never multiply — voltage and current. Conceptually, resistance tells you how much voltage you need per unit current; a high-$$R$$ component demands a large push (voltage) for only a trickle of charge flow.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why is writing $$R = V \\times I$$ a fundamental error, and what does the correct operation tell you physically? (3 steps)", "answer": "- Step 1: The product $$V \\times I$$ has units of $$\\text{V}\\cdot\\text{A} = \\text{W}$$ — that's *power dissipated*, not resistance. So $$R = VI$$ is dimensionally a power formula in disguise.\n- Step 2: The correct $$R = V/I$$ has units $$\\text{V}/\\text{A} = \\Omega$$, matching resistance.\n- Step 3: Physically, $$V/I$$ asks: \"for a given push (volts), how little current do I get?\" A large ratio means the component is choking the flow — high resistance. Multiplication would instead measure energy throughput, a totally different quantity.\n\nMnemonic: resistance is \"voltage *per* current\", and \"per\" always means divide.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "State Ohm's Law precisely and identify the condition under which it holds.", "answer": "Ohm's Law states that for a metallic conductor **at constant temperature**, the current through it is directly proportional to the potential difference across it: $$I \\propto V$$, equivalently $$R$$ is constant. The temperature qualifier is essential — if a wire heats up, its resistivity changes and the proportionality breaks. So Ohm's Law is not a universal law of nature, but a property of *certain* materials under *certain* conditions.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "On an $$I$$ vs $$V$$ graph, what feature identifies an ohmic conductor, and what does the gradient represent? (3 steps)", "answer": "- Step 1: An ohmic conductor produces a **straight line through the origin** on an $$I$$-$$V$$ plot.\n- Step 2: Because $$I = V/R$$, the gradient $$\\Delta I/\\Delta V = 1/R$$ — i.e. the *reciprocal* of resistance.\n- Step 3: A steeper line therefore means *lower* resistance (more current per volt); a shallower line means *higher* resistance. Through-origin matters: zero voltage must give zero current — otherwise something else (e.g. an emf or offset) is going on.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Why does a filament lamp give a curved (non-ohmic) $$I$$–$$V$$ characteristic, and in which direction does the curve bend? (3 steps)", "answer": "- Step 1: As current flows, the filament heats up due to power dissipation $$P = I^2R$$.\n- Step 2: In a metal, hotter lattice ions vibrate more vigorously, causing more frequent electron–lattice collisions. This raises resistivity $$\\rho$$, hence raises $$R$$.\n- Step 3: Because $$R$$ grows with $$V$$ (via heating), each extra volt produces *less* extra current than the previous volt. The $$I$$-$$V$$ curve therefore bends *away from the current axis* — it flattens at higher voltage, showing diminishing returns in current.\n\nTakeaway: non-ohmic behaviour here is a thermal feedback effect, not a different \"law of physics\".", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "At a microscopic level, what causes electrical resistance in a metal, and what happens to the energy lost? (3 steps)", "answer": "- Step 1: Free conduction electrons drift through the metal under an electric field, but repeatedly **collide with vibrating lattice ions**.\n- Step 2: Each collision randomises and reduces the electron's drift velocity, transferring kinetic energy to the lattice.\n- Step 3: This transferred energy manifests as increased lattice vibration — i.e. **heat**. So electrical energy is dissipated thermally inside the conductor. A resistor doesn't \"store\" or \"consume\" electrons; it slows them and warms up.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "Phuc once asked whether a resistor \"stores\" the electrons that don't make it through. Why is this a misconception, and what is actually happening? (3 steps)", "answer": "- Step 1: Charge is conserved. The same number of electrons that enter a resistor per second must leave it per second in steady state — otherwise charge would pile up indefinitely.\n- Step 2: A resistor doesn't reduce the *count* of electrons, it reduces their *drift speed* via collisions. Current $$I = nAvq$$ drops because $$v$$ drops, not because $$n$$ vanishes.\n- Step 3: So if \"10 electrons/sec\" enter, \"10 electrons/sec\" still exit — but they exit with a smaller average drift velocity, and the *circuit current* is determined by whatever rate the resistor allows the whole loop to settle into.\n\nThe mental image: a resistor is a *slowdown zone*, not a storage tank.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "Distinguish carefully between *resistance* and *resistivity*. (3 steps)", "answer": "- Step 1: **Resistance** $$R$$ is a property of a specific *component* — it depends on the material, its length, its cross-section, and its temperature. Units: $$\\Omega$$.\n- Step 2: **Resistivity** $$\\rho$$ is an *intrinsic property of the material itself* — it does not depend on the shape or size of the sample. Units: $$\\Omega\\cdot\\text{m}$$.\n- Step 3: They are linked by geometry: $$R = \\rho l/A$$. Two wires of the same material have the same $$\\rho$$ but can have very different $$R$$ if their lengths or areas differ.\n\nAnalogy: $$\\rho$$ is like the \"viscosity\" of the material for electrons; $$R$$ is like the actual flow resistance of a specific pipe made from it.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Derive the formula $$R = \\rho l / A$$ from experimental proportionalities. (4 steps)", "answer": "- Step 1: Experiment shows that for a uniform wire, doubling the length doubles the resistance: $$R \\propto l$$ (longer wire = more collisions for e
