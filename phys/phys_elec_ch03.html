<script>
const DATA={"selected": [{"question": "Why is it important that the same wire (and not a piece of a different sample) is used throughout a CP7 run? (2 steps)", "answer": "- Step 1: $$\\rho$$ is a material property, and small composition or processing differences between batches/samples can alter $$\\rho$$ measurably.\n- Step 2: $$A$$ (from one diameter measurement) is also used as the same value across all length points; if you switched samples mid-experiment with different diameters, $$A$$ would no longer be a constant, and the $$R$$-vs-$$l$$ plot would lose its linear-through-origin structure.\n\nConsistent material *and* consistent geometry are both needed for the linear model to hold.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "A common student error is to forget to multiply the gradient by $$A$$ when computing $$\\rho$$ from CP7. What does the unit check tell you immediately if you forget?", "answer": "The gradient has units $$\\Omega/\\text{m}$$ (from $$R$$ in $$\\Omega$$ divided by $$l$$ in $$\\text{m}$$). Resistivity has units $$\\Omega\\cdot\\text{m}$$. These are clearly different — they differ by a factor of $$\\text{m}^2$$, which is exactly the units of area $$A$$. So multiplying gradient $$\\Omega/\\text{m}$$ by $$A$$ in $$\\text{m}^2$$ gives $$\\Omega\\cdot\\text{m}$$. The unit mismatch is an instant alarm bell: if a student quotes a \"resistivity\" in $$\\Omega/\\text{m}$$, they've omitted the area-multiplication step. **Always unit-check final answers.**", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "Explain why the resistance of a metal increases with temperature, while that of a semiconductor (NTC thermistor) decreases. (3 steps)", "answer": "- Step 1: For metals (e.g., copper, tungsten): as temperature increases, the lattice ions vibrate more violently. This increases the frequency of collisions between conduction electrons and the lattice, impeding electron flow more strongly. Hence resistivity ρ increases, and so does resistance R.\n- Step 2: For semiconductors (e.g., NTC thermistors): as temperature increases, more electrons gain enough energy to escape their atoms and become free charge carriers. The increase in carrier concentration outweighs the increased scattering, so overall resistivity decreases.\n- Step 3: This opposite behaviour is why metals have positive temperature coefficients (PTC) while semiconductors have negative temperature coefficients (NTC).", "source": "MiniMax ①", "_id": "minimax_1_9"}, {"question": "A wire diameter is measured as 0.27 mm. A student converts this to metres as $$0.27 \\times 10^{-6}\\,\\text{m}$$. Why is this wrong, and how catastrophically does it affect the calculated resistance?", "answer": "The student confused millimetres (mm, $$\\times 10^{-3}$$) with micrometres (μm, $$\\times 10^{-6}$$).\n\nCorrect conversion: $$0.27\\,\\text{mm} = 0.27 \\times 10^{-3}\\,\\text{m} = 2.7 \\times 10^{-4}\\,\\text{m}$$\n\nStudent's error: $$0.27 \\times 10^{-6}\\,\\text{m} = 2.7 \\times 10^{-7}\\,\\text{m}$$ — this is 1000 times too small.\n\nThe cascade effect: since $$A = \\frac{\\pi d^2}{4}$$, area goes as $$d^2$$. If $$d$$ is 1000× too small, then $$d^2$$ is $$10^6$$ times too small, so $$A$$ is $$10^6$$ times too small. Since $$R = \\frac{\\rho l}{A}$$, the calculated resistance would be **$$10^6$$ times too large**. One prefix error cascades into a million-fold error in the final answer.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "Why does a thicker wire carry more current for the same applied voltage, even though there are \"more electrons to push\"?", "answer": "Counterintuitively, more electrons in a thicker wire is exactly *why* it conducts better. The same voltage produces the same electric field along the wire's length (for a fixed length), which exerts the same force per electron. With more electrons available to drift in parallel (larger cross-section), the total rate of charge flow — current — is larger. Mathematically: $$I = nAvq$$ — current scales linearly with cross-sectional area $$A$$. Equivalently, $$R = \\rho l/A$$ falls as $$A$$ rises, so for fixed $$V$$, $$I = V/R$$ rises.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Why doesn't Ohm's Law apply to a filament lamp? (3 steps)", "answer": "- Step 1: Ohm's Law requires $$R$$ to be constant — equivalently, the $$I$$-$$V$$ graph must be linear.\n- Step 2: In a filament lamp, increasing $$V$$ raises $$I$$, which raises power dissipated, which raises temperature, which raises $$\\rho$$, which raises $$R$$.\n- Step 3: So as $$V$$ grows, the \"effective\" $$R$$ at each operating point changes — the $$I$$-$$V$$ curve bends. The component still has a well-defined $$R = V/I$$ at any *instant*, but that $$R$$ is not constant across the range — hence \"non-ohmic\".", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "At a microscopic level, why does a metal wire resist the flow of electrons, and why does this process cause the wire to heat up? Does the resistor \"store\" the lost electrons? (3 steps)", "answer": "- Step 1: Consider the lattice structure. A metal wire consists of a lattice of vibrating positive ions surrounded by a sea of delocalised (free) electrons. When a potential difference is applied, electrons drift, but they constantly collide with these vibrating lattice ions.\n- Step 2: Explain the resistance and heating. Each collision transfers kinetic energy from the moving electron to the lattice ion. This reduces the electron's drift velocity (opposing current = resistance) and increases the amplitude of the lattice's vibrations (thermal energy = heating).\n- Step 3: Address the storage misconception. The resistor does not \"store\" or accumulate electrons. The total number of electrons entering and leaving the resistor per second is the same (conservation of charge). The resistor slows down the *rate of flow* (current), it doesn't trap them.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "A wire of resistance $$R$$ is cut in half and the two halves connected in parallel. What is the new resistance, and what does this teach about the geometry dependence?", "answer": "Cutting in half: each half has resistance $$R/2$$ (length halved, $$R \\propto l$$). Two such resistors in parallel give $$R_{\\text{parallel}} = (R/2)/2 = R/4$$. Equivalently: putting two wires in parallel doubles the effective area while halving the length, so $$R \\propto l/A$$ falls by a factor of $$2 \\times 2 = 4$$. This shows the **two geometry factors compound multiplicatively** — and explains why power lines use thick, short conductors when possible.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Why should the diameter of a wire be measured at several different positions *and* orientations along its length? (3 steps)", "answer": "- Step 1: Manufacturing produces wires that are not perfectly uniform — diameter may vary slightly along the length (random error in $$d$$).\n- Step 2: The wire may also not be perfectly circular — its cross-section could be slightly oval. Measuring at one orientation only would systematically miss this.\n- Step 3: Taking 5–10 readings at *different positions* and *different rotational orientations* and then averaging both reduces random error in $$d$$ and detects non-circularity, giving a more representative mean diameter.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "A student writes the unit of resistivity as $$\\Omega / \\text{m}$$ (ohms per metre). Prove this is wrong using dimensional analysis, and explain the intuitive reason.", "answer": "From $$\\rho = \\frac{RA}{l}$$:\n- $$R$$ has units $$\\Omega$$, $$A$$ has units $$\\text{m}^2$$, $$l$$ has units $$\\text{m}$$\n- Therefore: $$[\\rho] = \\frac{\\Omega \\times \\text{m}^2}{\\text{m}} = \\Omega \\cdot \\text{m}$$\n\nIf the unit were $$\\Omega / \\text{m}$$, then plugging into $$R = \\frac{\\rho l}{A}$$:\n$$\\frac{(\\Omega / \\text{m}) \\times \\text{m}}{\\text{m}^2} = \\frac{\\Omega}{\\text{m}^2}$$ — which is NOT ohms. The formula would be dimensionally inconsistent.\n\nIntuitively: if $$\\rho$$ had units of $$\\Omega / \\text{m}$$, then a longer wire would have *less* resistance — the opposite of reality. The correct unit, $$\\Omega \\cdot \\text{m}$$, ensures resistance scales correctly with length.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "In CP7, why must the fixed end of the circuit make contact at *exactly* $$l = 0$$ on the ruler? (3 steps)", "answer": "- Step 1: The independent variable $$l$$ is defined as the distance from the fixed contact to the flying lead. If the fixed contact is, say, at $$l = 2\\,\\text{cm}$$ rather than $$0$$, then every reading of $$l$$ is too large by $$2\\,\\text{cm}$$.\n- Step 2: This shifts every data point horizontally by the same amount — a **systematic length error**.\n- Step 3: Unlike contact resistance (which is a vertical shift and cancels out in the gradient), a horizontal shift also doesn't change the gradient of a straight line, so the gradient and hence $$\\rho$$ are *still* unaffected — but the line now misses the origin in a different way, which can mislead interpretation.\n\nBest practice: always align the fixed contact exactly at $$l=0$$ on the ruler to keep the analysis clean and intercept attributable to contact resistance alone.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "Why does the resistance of a wire double if its length is doubled, but quarter if its cross-sectional area is doubled? Use the \"pipe\" analogy to explain. (3 steps)", "answer": "- Step 1: Explain length dependence ($$R \\propto l$$). Imagine the wire as a pipe. If you double the length of the pipe, the electrons have to travel twice as far. They will encounter twice as many lattice ions, leading to twice as many collisions. This makes it twice as hard to push current through, so resistance doubles.\n- Step 2: Explain area dependence ($$R \\propto \\frac{1}{A}$$). If you double the cross-sectional area, you've essentially provided two parallel paths for the current (like having two identical pipes side-by-side). Twice the area means twice the number of conduction electrons available to carry charge per unit time, so the resistance halves. Note: doubling area doesn't double radius/diameter; it doubles the area itself.\n- Step 3: Combine into the formula. Combining these proportionalities, $$R \\propto \\frac{l}{A}$$. To make this an equation, we introduce the constant of proportionality, which is the resistivity $$\\rho$$: $$R = \\frac{\\rho l}{A}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "Why is writing $$R = V \\times I$$ a fundamental error, and what does the correct operation tell you physically? (3 steps)", "answer": "- Step 1: The product $$V \\times I$$ has units of $$\\text{V}\\cdot\\text{A} = \\text{W}$$ — that's *power dissipated*, not resistance. So $$R = VI$$ is dimensionally a power formula in disguise.\n- Step 2: The correct $$R = V/I$$ has units $$\\text{V}/\\text{A} = \\Omega$$, matching resistance.\n- Step 3: Physically, $$V/I$$ asks: \"for a given push (volts), how little current do I get?\" A large ratio means the component is choking the flow — high resistance. Multiplication would instead measure energy throughput, a totally different quantity.\n\nMnemonic: resistance is \"voltage *per* current\", and \"per\" always means divide.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "If you measure a wire's resistance with a low current (room temperature) and again with a high current (wire visibly glowing), how do the two values compare and what does this teach about how $$R$$ is reported? (3 steps)", "answer": "- Step 1: Low current: wire stays cool, $$\\rho$$ at its room-temperature value, measured $$R$$ is the \"true\" room-temperature resistance.\n- Step 2: High current: wire heats significantly, $$\\rho$$ rises, measured $$R$$ is *higher* — perhaps by a factor of several for a tungsten filament glowing white-hot.\n- Step 3: This shows that \"the resistance of a wire\" is not a unique number — it's a function of temperature. When values are quoted in tables, they implicitly assume room temperature ($$20\\,^\\circ\\text{C}$$ or $$25\\,^\\circ\\text{C}$$). Reporting $$R$$ without temperature context is incomplete for non-trivial conductors.\n\nThis is exactly why CP7 demands low current — to pin down a well-defined room-temperature value.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "At the microscopic level, what causes a metal to have resistance? Describe how electrical energy is converted to thermal energy.", "answer": "- Step 1: When a potential difference is applied, free (conduction) electrons in the metal accelerate under the electric field.\n- Step 2: As they drift, they **collide** with the positive lattice ions, which are vibrating about their equilibrium positions.\n- Step 3: Each collision reduces the electron's velocity (transferring kinetic energy from the electron to the ion). This is why electrons reach a steady \"drift velocity\" rather than accelerating indefinitely.\n- Step 4: The kinetic energy transferred to the lattice ions increases their vibrational amplitude — this is **thermal energy (heating)**. More collisions per unit length means higher resistance.\n\nKey insight: a resistor does NOT store or accumulate electrons — it **slows them down**, reducing the rate of flow (current). The \"missing\" electrons aren't stored; they just move more slowly throughout the entire circuit.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "In Core Practical 7, why is a graph of $ R $ vs $ l $ plotted, and how is resistivity determined from it? (2 steps)", "answer": "- Step 1: The relationship $ R = \\frac{\\rho}{A}l $ implies $ R \\propto l $. A straight-line graph through the origin confirms this, with gradient $ \\rho/A $.  \n- Step 2: Calculate $ \\rho = \\text{gradient} \\times A $. This method averages data, reduces random errors, and avoids systematic errors like contact resistance (which shifts the intercept but not the gradient).  \n\n**Takeaway:** Graphical analysis improves accuracy by averaging multiple measurements and isolating systematic errors.", "source": "Qwen 3 ①", "_id": "qwen_1_5"}, {"question": "Why is it especially important to convert micrometer readings in millimetres to metres (factor $$10^{-3}$$) and not micrometres (factor $$10^{-6}$$)? Quantify the consequence of getting it wrong.", "answer": "The micrometer's name refers to its *resolution* (it can resolve fractions of a micrometre on the thimble scale), not its units — it reads in **millimetres**. If you mistakenly treat the reading as micrometres and convert with $$10^{-6}$$ instead of $$10^{-3}$$, you make $$d$$ a factor of $$1000$$ too small. Since $$A \\propto d^2$$, the area is off by $$10^6$$, and since $$\\rho \\propto A$$, the resistivity is wrong by a factor of $$10^6$$. That turns a nichrome value of $$\\sim 10^{-6}\\,\\Omega\\cdot\\text{m}$$ into $$\\sim 10^{-12}\\,\\Omega\\cdot\\text{m}$$ — clearly absurd. Always sanity-check the order of magnitude.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "At a microscopic level, what causes electrical resistance in a metal, and what happens to the energy lost? (3 steps)", "answer": "- Step 1: Free conduction electrons drift through the metal under an electric field, but repeatedly **collide with vibrating lattice ions**.\n- Step 2: Each collision randomises and reduces the electron's drift velocity, transferring kinetic energy to the lattice.\n- Step 3: This transferred energy manifests as increased lattice vibration — i.e. **heat**. So electrical energy is dissipated thermally inside the conductor. A resistor doesn't \"store\" or \"consume\" electrons; it slows them and warms up.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "When a student reads a micrometer, the main scale shows 5.5 mm and the thimble scale shows 27 (i.e., 0.27 mm). What is the total reading, and what is it in metres? (2 steps)", "answer": "- Step 1: The micrometer reading is the sum of the main scale and the thimble scale: $$d = 5.5 + 0.27 = 5.77\\;\\text{mm}$$. The main scale gives whole and half millimetres; the thimble gives hundredths of a millimetre.\n- Step 2: Convert to metres: $$d = 5.77 \\times 10^{-3}\\;\\text{m}$$. Remember: mm to m is multiply by $$10^{-3}$$, not $$10^{-6}$$.\n\nTakeaway: Micrometer reading = main scale + thimble scale. Convert mm → m by ×$$10^{-3}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_40"}, {"question": "In CP7, a student notices that the data points scatter more at longer lengths than at shorter lengths. Suggest a physical reason for this increased scatter, and explain whether it introduces random or systematic error. (2 steps)", "answer": "- Step 1: At longer lengths, the resistance is higher, so more power is dissipated as heat ($$P = I^2R$$). This means the wire heats up more at longer lengths, causing the resistance to be slightly higher than expected for a given length. This creates a **systematic** deviation — points curve upward at longer lengths, rather than scattering randomly.\n- Step 2: If the scatter is truly random, it could be due to inconsistent contact pressure with the flying lead at different positions. However, if the increased scatter is actually due to heating, it is systematic and would make the gradient slightly too steep, giving a slightly overestimated $$\\rho$$. This is another reason to keep currents small — to minimise heating and keep the graph linear.\n\nTakeaway: More scatter at longer lengths is likely from heating (systematic, curving upward) rather than random variation. Small currents minimise this.", "source": "GLM 5.1 ②", "_id": "glm_2_48"}, {"question": "Why does a filament lamp produce a curved (non-ohmic) $$I$$–$$V$$ characteristic? Explain the microscopic chain of cause and effect. (4 steps)", "answer": "- Step 1: As current flows, electrons collide with lattice ions and transfer kinetic energy to the lattice as thermal energy — the filament heats up.\n- Step 2: Higher temperature means the lattice ions vibrate more vigorously with larger amplitudes.\n- Step 3: Larger vibrations present a bigger \"target\" for drifting electrons, so collisions become more frequent.\n- Step 4: More collisions per second means resistivity $$\\rho$$ rises, so resistance $$R$$ rises with current. The I–V curve bends away from a straight line — for the same extra volt, you get *less* extra current at higher operating points.\n\nKey insight: the lamp is non-ohmic not because the material is exotic, but because the *temperature isn't held constant* during operation.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Why is a graphical method (plotting R vs l and using the gradient) preferred over calculating $$\\rho$$ from a single pair of readings in Core Practical 7? Give two distinct reasons. (2 steps)", "answer": "- Step 1: **Reduces random error**: A single measurement of $$R$$ and $$l$$ could be affected by random errors (e.g., reading fluctuations, slight variations in contact). The graph averages over many data points, and the line of best fit minimises the effect of random scatter on the result.\n- Step 2: **Eliminates systematic error from contact resistance**: Contact resistance adds a constant offset to all $$R$$ values, shifting the graph up but not changing its gradient. A single reading would include this contact resistance in the calculated $$R$$, giving a wrong value of $$\\rho$$. The gradient method automatically excludes it.\n\nTakeaway: Graphical method = averaging (reduces random error) + gradient ignores intercept (eliminates contact resistance systematic error).", "source": "GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "What is a \"zero error\" on a micrometer, and why must it be checked before use?", "answer": "A zero error occurs when the micrometer reads a non-zero value when its jaws are fully closed on nothing. If unnoticed, every diameter reading is systematically too high or too low by that fixed offset. Since $$A \\propto d^2$$ and $$\\rho \\propto A$$, even a small zero error propagates into the final resistivity. The fix is simple: close the jaws, record the offset, and subtract it (or add, depending on sign) from every subsequent reading. This eliminates the systematic error at its source.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "When asked to \"explain the difference between resistance and resistivity\" for marks, what *two* essential ideas must your answer contain?", "answer": "Both halves are needed for full marks: **(1)** Resistance is a property of a *component* (or specific object/wire), depending on its material, length, area, and temperature — measured in $$\\Omega$$. **(2)** Resistivity is an intrinsic property of a *material*, independent of shape and size, depending only on material and temperature — measured in $$\\Omega\\cdot\\text{m}$$, defined by $$\\rho = RA/l$$. A common one-mark answer just says \"resistivity is a material property\" — that's only half the contrast. State explicitly that resistance also depends on geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "A student claims: \"A filament lamp obeys Ohm's Law at low voltages but not at high voltages.\" Is this statement correct? Explain carefully. (3 steps)", "answer": "- Step 1: At very low voltages (and therefore very low currents), the filament does not heat up significantly. The temperature remains approximately constant, so the resistance is approximately constant, and the I–V relationship is nearly linear. In this limited region, the lamp behaves approximately ohmically.\n- Step 2: However, Ohm's Law requires that the conductor be **at constant temperature** throughout its operation. A filament lamp is designed to heat up — that's how it produces light. As current increases, the temperature rises, resistance increases, and the I–V graph curves.\n- Step 3: Strictly speaking, the filament lamp is a non-ohmic conductor because its resistance is not constant over its normal operating range. The statement is partially true in a limited sense, but the lamp is classified as non-ohmic because the condition of constant temperature is not maintained in practice.\n\nTakeaway: A filament lamp is non-ohmic because its temperature (and therefore resistance) changes with current. At very low currents it may appear nearly ohmic, but it does not truly obey Ohm's Law.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "What conceptual error does writing \"$$\\rho$$ has units of $$\\Omega/\\text{m}$$\" make, and how does the correct unit reflect the formula's structure? (3 steps)", "answer": "- Step 1: \"$$\\Omega/\\text{m}$$\" would mean resistance per unit length — but that's a *geometry-dependent* quantity (it depends on the wire's cross-section too), not an intrinsic material constant.\n- Step 2: The correct unit $$\\Omega\\cdot\\text{m}$$ arises because $$\\rho = RA/l$$ has units $$\\Omega \\cdot \\text{m}^2/\\text{m} = \\Omega\\cdot\\text{m}$$.\n- Step 3: Physically, \"$$\\Omega\\cdot\\text{m}$$\" says: imagine a 1-metre cube of material — its end-to-end resistance is numerically $$\\rho$$. That's the intrinsic measure: a cubic metre of pure copper has $$\\sim 1.7 \\times 10^{-8}\\,\\Omega$$ across opposite faces.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "A metal wire and an NTC thermistor are both heated from 20°C to 100°C. For each, state whether resistance increases or decreases, and identify the dominant mechanism. (3 steps)", "answer": "- Step 1: **Metal wire** — Resistance INCREASES. Dominant mechanism: increased lattice ion vibrations → more frequent electron-lattice collisions → higher resistivity. The number of free electrons is essentially unchanged.\n- Step 2: **NTC thermistor** — Resistance DECREASES. Dominant mechanism: thermal energy liberates more charge carriers from bound states → more free electrons available to conduct → lower resistivity. The increase in carrier concentration overwhelms the increase in lattice vibrations.\n- Step 3: \"NTC\" stands for **Negative Temperature Coefficient** — resistance goes negative (decreases) as temperature increases. This is a useful mnemonic for the direction.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "Given the uncertainty $$\\delta d$$ in the diameter and $$\\delta(\\text{gradient})$$ in the $$R$$ vs $$l$$ slope, how do these combine to give the fractional uncertainty in $$\\rho$$? (3 steps)", "answer": "- Step 1: Since $$A = \\pi d^2/4$$, and $$d$$ is squared, the fractional uncertainty in $$A$$ is **twice** that in $$d$$: $$\\delta A/A = 2\\,\\delta d/d$$.\n- Step 2: Since $$\\rho = \\text{gradient} \\times A$$, and the two factors are independent, fractional uncertainties add: $$\\delta\\rho/\\rho = \\delta(\\text{gradient})/\\text{gradient} + \\delta A/A$$.\n- Step 3: Substituting: $$\\delta\\rho/\\rho = \\delta(\\text{gradient})/\\text{gradient} + 2\\,\\delta d/d$$. The diameter contribution is doubled — which is why micrometer precision and multiple readings of $$d$$ matter so much.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "A student says: \"Copper is a better conductor than nichrome because copper has lower resistance.\" Explain why this statement is imprecise, and rephrase it correctly using the concept of resistivity. (2 steps)", "answer": "- Step 1: The statement is imprecise because resistance depends on the dimensions of the component, not just the material. A very long, thin copper wire could have higher resistance than a short, thick nichrome wire. Saying \"copper has lower resistance\" confuses a property of a specific component with a property of the material.\n- Step 2: The correct statement is: \"Copper is a better conductor than nichrome because copper has lower **resistivity**.\" Copper's resistivity ($$\\approx 1.72 \\times 10^{-8}\\;\\Omega \\cdot \\text{m}$$) is much lower than nichrome's ($$\\approx 1.1 \\times 10^{-6}\\;\\Omega \\cdot \\text{m}$$). Resistivity is an intrinsic property that allows a fair comparison between materials regardless of shape or size.\n\nTakeaway: Compare materials using resistivity (intrinsic), not resistance (depends on dimensions).", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "Why does the fractional uncertainty in the diameter get *doubled* when propagated to the cross-sectional area? Reason without just quoting the rule. (3 steps)", "answer": "- Step 1: $$A = \\pi d^2 /4$$, so $$A$$ depends on $$d$$ raised to the **second power**.\n- Step 2: For small fluctuations: if $$d$$ changes by 1%, then $$d^2$$ changes by approximately 2% (since $$(1.01)^2 \\approx 1.02$$). The exponent becomes the multiplier on the fractional error.\n- Step 3: So $$\\delta A/A \\approx 2\\,\\delta d/d$$. In general, for $$y = x^n$$, the fractional uncertainty rule is $$\\delta y/y = |n|\\,\\delta x/x$$.\n\nPractical consequence: even modest improvements in measuring $$d$$ pay off twice over in the area, and hence in resistivity precision.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "Why does halving the length of a wire halve its resistance but doubling the diameter quarter it (rather than halve it)? What's the asymmetry?", "answer": "Length and area enter the resistance formula differently: $$R \\propto l$$ (linear) but $$R \\propto 1/A$$ (inverse) — and *area itself* depends on diameter squared. So changing $$l$$ by a factor $$k$$ changes $$R$$ by $$k$$ (linear in $$l$$), but changing $$d$$ by a factor $$k$$ changes $$A$$ by $$k^2$$ and hence $$R$$ by $$1/k^2$$. The asymmetry comes from geometry: a wire is essentially a 1D path along its length but a 2D path across its cross-section. The cross-section gives two independent \"directions\" for current to spread into, so geometry effects there are squared.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "Why does the resistivity of a metal not depend on the shape of the sample, even though resistance does?", "answer": "Resistivity describes a *material* response: how strongly the lattice (with its fixed structure and bonding) impedes electron flow per unit length per unit cross-section. The lattice spacing, electron density, and vibration character are properties of the material at a given temperature — they don't know about the shape of the macroscopic sample. Resistance, on the other hand, is what you get when you \"package\" that material into a specific geometry: $$R = \\rho \\times (\\text{geometry factor } l/A)$$. The material contributes $$\\rho$$; the shape contributes $$l/A$$. Separating them this way is the whole conceptual point of defining resistivity.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "A wire that's already heated up gives \"wrong\" resistivity in CP7. But the formula $$\\rho = RA/l$$ still gives the resistivity at *that* temperature. So in what sense is the measurement \"wrong\"? (3 steps)", "answer": "- Step 1: $$\\rho$$ is genuinely a function of temperature, so $$\\rho(T)$$ for the heated wire is a valid physical quantity at that temperature.\n- Step 2: The issue is **inconsistency across the data set**: if length 1 is measured cold ($$\\rho_1$$) and length 2 is measured hotter ($$\\rho_2 > \\rho_1$$), then the $$R$$ vs $$l$$ data points don't lie on a single straight line — they reflect *different* underlying resistivities. The line becomes curved or its gradient is biased high.\n- Step 3: So the \"wrong\" part isn't $$\\rho$$ being undefined — it's that you're conflating measurements at different temperatures into one fit, producing a value that doesn't correspond to any single well-defined state of the wire. The reported $$\\rho$$ is some hybrid not equal to either the room-temperature or the heated value.\n\nWhy it matters: published resistivities are quoted at a specified temperature (usually $$20\\,^\\circ\\text{C}$$), and the experiment is supposed to match that.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "A student reasons: \"If I halve the length of a wire, I halve the number of electrons in it, so the current should halve too.\" Is this reasoning correct? Explain. (3 steps)", "answer": "- Step 1: The number of free electrons in the wire is not what determines the current. Current is the **rate of flow** of charge ($$I = \\Delta Q / \\Delta t$$), not the total amount of charge stored. Halving the length does halve the total number of free electrons in the wire, but this doesn't directly determine the rate at which they flow.\n- Step 2: What halving the length actually does is reduce the number of collisions each electron experiences as it traverses the wire (shorter path = fewer obstacles). This means each electron maintains a higher drift velocity, so for a given voltage, the current is higher (not lower).\n- Step 3: The resistance halves because $$R \\propto l$$, and by Ohm's law $$I = V/R$$, the current actually **doubles** (for a fixed voltage), it doesn't halve. The student's reasoning confuses total charge with rate of charge flow.\n\nTakeaway: Current depends on drift velocity and carrier density per unit volume, not on the total number of electrons in the wire. Halving length halves resistance, which increases current.", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "Why is the relationship $$I \\propto V$$ called Ohm's \"Law\" if it only holds for certain materials under certain conditions?", "answer": "Historically, Georg Ohm discovered this proportionality for metallic conductors and it was elevated to \"Law\" status before its limits were widely understood. Modern physics treats it more accurately as a *constitutive relation* or empirical behaviour of a class of materials (called *ohmic* conductors) under restricted conditions (constant temperature, low fields, no exotic effects). It contrasts with fundamental laws like conservation of charge, which hold universally. Calling it \"Ohm's Law\" persists by convention, but the implicit qualifier \"for ohmic materials at constant temperature\" should always be remembered — otherwise you'll apply it incorrectly to filament lamps, diodes, and semiconductors.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "A student claims a resistor \"stores\" the electrons it removes from the current. Why is this wrong, and what actually happens?", "answer": "Electrons are not stored or destroyed — charge is conserved, so the same number of electrons enters and leaves the resistor per second in steady state. What changes is their *drift velocity*: collisions with the vibrating lattice transfer their kinetic energy to thermal energy of the ions (heating the resistor). The reduced average drift velocity means a smaller rate of charge flow, i.e., smaller current. So a resistor doesn't act as an \"electron reservoir\" — it acts as an *energy converter*, transforming electrical energy into heat while slowing the electrons. The current is the same on both sides; the energy per charge ($$V$$) drops across it.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "Why does a filament lamp give a curved (non-ohmic) $$I$$–$$V$$ characteristic, and in which direction does the curve bend? (3 steps)", "answer": "- Step 1: As current flows, the filament heats up due to power dissipation $$P = I^2R$$.\n- Step 2: In a metal, hotter lattice ions vibrate more vigorously, causing more frequent electron–lattice collisions. This raises resistivity $$\\rho$$, hence raises $$R$$.\n- Step 3: Because $$R$$ grows with $$V$$ (via heating), each extra volt produces *less* extra current than the previous volt. The $$I$$-$$V$$ curve therefore bends *away from the current axis* — it flattens at higher voltage, showing diminishing returns in current.\n\nTakeaway: non-ohmic behaviour here is a thermal feedback effect, not a different \"law of physics\".", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "On an I–V characteristic graph (current on y-axis, voltage on x-axis), how do you distinguish an ohmic from a non-ohmic conductor? What does the gradient represent?", "answer": "An **ohmic** conductor produces a straight line through the origin — because $$I \\propto V$$, meaning resistance is constant at every operating point.\n\nA **non-ohmic** conductor produces a curve — because resistance changes (typically with temperature), so the I–V relationship is non-linear.\n\nFor the ohmic graph, gradient $$= \\frac{I}{V} = \\frac{1}{R}$$. A steeper line means **lower** resistance (more current per volt), and a shallower line means higher resistance. This is counterintuitive at first — the gradient is the *inverse* of resistance, not resistance itself.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "A wire has resistance 43 Ω. If its length is doubled and its diameter is also doubled, what is the new resistance? (3 steps)", "answer": "- Step 1: Use $$R = \\rho l / A$$. Since $$A \\propto d^2$$, doubling the diameter quadruples the area: $$A_{\\text{new}} = 4A$$. Doubling the length gives $$l_{\\text{new}} = 2l$$.\n- Step 2: The new resistance is $$R_{\\text{new}} = \\frac{\\rho \\times 2l}{4A} = \\frac{2}{4} \\times \\frac{\\rho l}{A} = \\frac{1}{2}R$$.\n- Step 3: So $$R_{\\text{new}} = 43/2 = 21.5\\;\\Omega$$. The area effect (4× increase, reducing R by 4×) dominates the length effect (2× increase, increasing R by 2×). Net factor: $$2/4 = 1/2$$.\n\nTakeaway: $$R_{\\text{new}} = R \\times \\frac{l_{\\text{new}}/l}{(d_{\\text{new}}/d)^2}$$. For both doubled: factor = $$2/4 = 1/2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "A wire has a circular cross-section with diameter $$d$$. Write the formula for cross-sectional area. What is the common error when substituting the diameter?", "answer": "The area is:\n$$A = \\frac{\\pi d^2}{4}$$\n\nThis comes from $$A = \\pi r^2$$ where $$r = \\frac{d}{2}$$:\n$$A = \\pi \\left(\\frac{d}{2}\\right)^2 = \\pi \\times \\frac{d^2}{4} = \\frac{\\pi d^2}{4}$$\n\nThe common error: substituting diameter $$d$$ directly into $$A = \\pi r^2$$ as if it were the radius. This gives $$\\pi d^2$$ instead of $$\\frac{\\pi d^2}{4}$$ — an area **4 times too large**. Since $$R = \\frac{\\rho l}{A}$$, this would give a resistance 4 times too small.\n\nRule: if you have the diameter, use $$A = \\frac{\\pi d^2}{4}$$. If you have the radius, use $$A = \\pi r^2$$. Never substitute $$d$$ where $$r$$ goes.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "A worked exam approach: a wire has $$V = 0.7\\,\\text{V}$$ across it when $$I = 40\\,\\text{mA}$$. Without exact computation, estimate the order of magnitude of its resistance. (3 steps)", "answer": "- Step 1: $$R = V/I$$ (never $$V \\times I$$).\n- Step 2: Convert: $$40\\,\\text{mA} = 0.04\\,\\text{A}$$.\n- Step 3: $$R \\sim 0.7 / 0.04 \\sim 17$$–$$20\\,\\Omega$$. So this is a low-resistance component — order $$10\\,\\Omega$$, consistent with a diode or LED near its operating voltage.\n\nThe conceptual move: divide volts by amps; the milli-prefix on current is critical to convert to base SI.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "Why does the cross-sectional area of a wire scale with the *square* of the diameter, and what concrete consequence does this have? (3 steps)", "answer": "- Step 1: For a circular cross-section, $$A = \\pi r^2 = \\pi d^2 / 4$$. Both $$r$$ and $$d$$ appear squared because area is two-dimensional.\n- Step 2: If you double the diameter, the area quadruples ($$2^2 = 4$$); if you halve the diameter, the area shrinks to a quarter.\n- Step 3: Consequence: resistance $$R = \\rho l/A$$ is therefore very sensitive to diameter. A 10% error in $$d$$ becomes a ~20% error in $$A$$, and so a ~20% error in $$\\rho$$. That's why diameter must be measured with a *micrometer* (resolution 0.01 mm), not a ruler.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "Why does increasing the temperature of a metal increase the rate of electron–lattice collisions, in terms of the underlying physics? (3 steps)", "answer": "- Step 1: Lattice ions sit in periodic positions and vibrate thermally — their oscillation amplitude grows with temperature.\n- Step 2: Conduction electrons travel in straight lines between collisions. The probability of \"running into\" an ion in a given distance depends on the effective cross-section the vibrating ion presents — larger amplitude means a larger \"target\".\n- Step 3: So the *mean free path* (average distance between collisions) shortens with rising $$T$$, raising the collision rate, raising scattering, raising resistivity. The temperature dependence is roughly linear over modest ranges for metals.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "You are given two wires of the same material. Wire A has length $$L$$ and diameter $$d$$. Wire B has length $$3L$$ and diameter $$3d$$. Wire A has resistance $$R_A$$. Express $$R_B$$ in terms of $$R_A$$. (2 steps)", "answer": "- Step 1: Since both wires are the same material, $$\\rho$$ is the same. Using the proportionality $$R \\propto l/d^2$$: the ratio is $$\\frac{R_B}{R_A} = \\frac{3L / (3d)^2}{L / d^2} = \\frac{3L / 9d^2}{L / d^2} = \\frac{3}{9} = \\frac{1}{3}$$.\n- Step 2: So $$R_B = R_A / 3$$. Even though Wire B is three times longer (which would triple resistance), its diameter is also three times larger, making the area nine times larger (which would reduce resistance by a factor of 9). Net factor: $$3/9 = 1/3$$.\n\nTakeaway: $$R \\propto l/d^2$$ is the quick comparison formula for wires of the same material.", "source": "GLM 5.1 ②", "_id": "glm_2_47"}, {"question": "A student says: \"A resistor stores electrons — that's why the current coming out is less than the current going in.\" Explain why this is wrong, and describe what actually happens. (2 steps)", "answer": "- Step 1: A resistor does **not** store electrons. In a series circuit, the current is the same at every point — the same number of electrons per second enters and leaves the resistor. The resistor does not accumulate or trap charge.\n- Step 2: What the resistor does is **slow down** the electrons. Collisions between the drifting electrons and the lattice ions reduce the electrons' drift velocity. A lower drift velocity means a lower current ($$I = nAvq$$). The \"missing\" kinetic energy is transferred to the lattice as thermal energy (heat). The resistor opposes the flow — it doesn't hoard electrons.\n\nTakeaway: Resistors slow electrons via collisions; they don't store them. Current in = current out (in series).", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "Why must the current be kept low in Core Practical 7? What would happen if it weren’t? (2 steps)", "answer": "- Step 1: High current heats the wire, increasing its resistivity ($ \\rho $) due to metal’s positive temperature coefficient.  \n- Step 2: This would give a falsely high $ \\rho $ value, as measured $ R $ would include thermal effects, violating the constant-temperature assumption.  \n\n**Takeaway:** Temperature control is vital to measure intrinsic resistivity, not temperature-influenced resistance.", "source": "Qwen 3 ①", "_id": "qwen_1_8"}, {"question": "In Core Practical 7, the R vs l graph should ideally pass through the origin. If instead it has a positive intercept on the R-axis, what does this indicate, and why doesn't it affect the resistivity calculation? (3 steps)", "answer": "- Step 1: A positive intercept on the R-axis means that even when the test length $$l = 0$$, there is still some measured resistance. This is caused by **contact resistance** — the resistance at the joints where the crocodile clips or flying lead connect to the wire.\n- Step 2: Poor contact between the clip and the wire adds extra resistance that is not due to the wire itself. This is a **systematic error** — it shifts all resistance readings up by the same constant amount.\n- Step 3: However, the gradient of the R vs l line is unaffected by a constant vertical offset. Since $$R = \\frac{\\rho}{A}l + R_{\\text{contact}}$$, the gradient is still $$\\rho/A$$ regardless of the intercept. This is a key advantage of the graphical method — it effectively eliminates the systematic error from contact resistance.\n\nTakeaway: Non-zero intercept = contact resistance. Gradient is unaffected, so $$\\rho$$ calculation is still valid.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "A student's $$R$$ vs $$l$$ graph in CP7 has a non-zero y-intercept (it doesn't pass through the origin). What does this physically indicate, and does it affect the calculated resistivity?", "answer": "A non-zero y-intercept means that at $$l = 0$$ (no wire length included), there's still some measured resistance — this comes from **contact resistance** at the crocodile clip and the connecting wires. It's a **systematic error** in the resistance measurements. However, since $$\\rho$$ is calculated from the **gradient** (not the intercept), a constant offset shifts the whole line vertically but leaves the slope unchanged. So the resistivity calculation is unaffected — this is precisely why the graphical method is chosen over single-point calculations.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "Imagine a wire whose diameter varies along its length (thicker at one end, thinner at the other). Why is $$R = \\rho l/A$$ not directly applicable, and what would you need to do instead? (3 steps)", "answer": "- Step 1: The formula $$R = \\rho l/A$$ assumes *uniform* cross-section. If $$A$$ varies with position, the formula no longer gives a single answer — local resistance per unit length depends on local $$A$$.\n- Step 2: You'd need to treat the wire as a sequence of thin slices, each of thickness $$dl$$ and area $$A(l)$$, contributing $$dR = \\rho\\,dl/A(l)$$.\n- Step 3: Total resistance is the integral $$R = \\int_0^L \\rho\\,dl/A(l)$$. Conceptually: a non-uniform wire is a series combination of many slightly-different uniform resistors. This is why CP7 specifies a wire of *uniform* cross-section — otherwise the analysis breaks down.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "What is a \"zero error\" on a micrometer, and why must it be checked before use?", "answer": "A zero error is a systematic offset: when the micrometer jaws are fully closed (measuring nothing), the scale should read exactly $$0.00\\,\\text{mm}$$. If it reads, say, $$+0.02\\,\\text{mm}$$, every subsequent reading is too high by $$0.02\\,\\text{mm}$$. Since wire diameters in CP7 are around $$0.2\\,\\text{mm}$$, a $$0.02\\,\\text{mm}$$ offset is a 10% systematic error in $$d$$, which becomes a **20% error in area** and resistivity. To correct: record the zero error before measuring and subtract it from each subsequent reading (or add, if negative).", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "State Ohm's Law precisely. What two conditions must hold for a conductor to obey it?", "answer": "Ohm's Law: the current through a metallic conductor is **directly proportional** to the potential difference across it, provided the **temperature remains constant**.\n\nThe two conditions:\n1. The conductor must be metallic (or ohmic by nature).\n2. The temperature must remain constant.\n\nNote: \"directly proportional\" is stronger than \"linear.\" Direct proportionality means the I–V graph is a straight line **through the origin** — not just any straight line. A line with a non-zero intercept is linear but not directly proportional, and does not satisfy Ohm's Law.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "A student measures the potential difference across a component as 6 V and the current through it as 2 A. They claim the resistance is 12 Ω. What fundamental mistake did they make, and what is the correct resistance? (3 steps)", "answer": "- Step 1: Identify the mistake. The student multiplied voltage and current ($$R = V \\times I = 6 \\times 2 = 12$$). Resistance is defined as the ratio of potential difference to current, not their product. This is a common trap where students confuse the formula for resistance with the formula for power ($$P = VI$$).\n- Step 2: Apply the correct definition. The formula for resistance is $$R = \\frac{V}{I}$$. Resistance measures how much the component opposes the flow of charge per unit of driving force (voltage), so it makes physical sense to divide the driving force by the resulting flow.\n- Step 3: Calculate the correct value. Substitute the values: $$R = \\frac{6 \\text{ V}}{2 \\text{ A}} = 3 \\text{ } \\Omega$$. The correct resistance is 3 Ω.\n\nAlways divide V by I; multiplying them gives power, not resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "A wire's resistance is found to be 0.1 Ω over a 1 m sample of copper. Why is this measurement experimentally challenging, and how would you redesign CP7 to fix it? (3 steps)", "answer": "- Step 1: A 0.1 Ω reading is comparable to (or smaller than) typical voltmeter/ammeter uncertainties and contact resistance offsets (~0.1 Ω). The relative error in $$R$$ becomes huge.\n- Step 2: Solution 1 — use a much longer wire (e.g. 10 m) to multiply $$R$$ by 10×, raising it above the noise floor.\n- Step 3: Solution 2 — use a higher-resistivity material (nichrome, constantan) where the same geometry gives $$R \\sim 10\\,\\Omega$$, far above contact noise. This is why CP7 typically uses resistance-alloy wires rather than copper.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "A student finds gradient $$= 7.9\\,\\Omega/\\text{m}$$ for a wire of diameter $$0.2\\,\\text{mm}$$. Without computing exactly, in what order of magnitude range does $$\\rho$$ lie? (3 steps)", "answer": "- Step 1: $$A = \\pi d^2/4 \\sim 3 \\times (0.2 \\times 10^{-3})^2 / 4 \\sim 3 \\times 10^{-8}\\,\\text{m}^2$$.\n- Step 2: $$\\rho = \\text{grad} \\times A \\sim 8 \\times 3 \\times 10^{-8} \\sim 2.4 \\times 10^{-7}\\,\\Omega\\cdot\\text{m}$$.\n- Step 3: Order $$10^{-7}\\,\\Omega\\cdot\\text{m}$$ — consistent with constantan ($$\\sim 5 \\times 10^{-7}$$) or similar alloys, definitely much higher than pure copper ($$10^{-8}$$) but well below semiconductors ($$10^{-5}$$+).\n\nThe estimate is a sanity check: if you compute and get $$10^{-3}$$ or $$10^{-11}$$, you've made a unit conversion error.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "When could a circuit *benefit* from including a high-resistance component, given that resistance \"wastes\" energy? (3 steps)", "answer": "- Step 1: **Component protection**: a sensitive LED might burn out if connected directly to a 9 V battery. A series resistor drops most of the voltage and limits current, protecting the LED.\n- Step 2: **Current control**: heating elements (kettles, toasters) are *designed* with specific resistances so that $$P = V^2/R$$ delivers a known power for a given mains voltage.\n- Step 3: **Safety in power transmission**: resistors and fuses help control fault currents and prevent dangerous surges.\n\nSo resistance isn't always wasteful — sometimes it's the *whole point* of the component.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "Derive the SI unit of resistivity from $$\\rho = RA/l$$.", "answer": "Substitute units directly: $$[\\rho] = [R][A]/[l] = \\Omega \\cdot \\text{m}^2 / \\text{m} = \\Omega\\cdot\\text{m}$$. So resistivity is measured in **ohm-metres**, not ohms per metre. The unit $$\\Omega/\\text{m}$$ is dimensionally wrong and would correspond to something like \"ohms gained per metre of length\" (which is actually the gradient of an $$R$$–$$l$$ graph, not resistivity itself).", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "Why might two ostensibly identical pieces of nichrome wire give slightly different resistivity values when measured in CP7?", "answer": "Several sources: **(1)** Variation in actual diameter along/between wires (manufacturing tolerance) — different averaged $$d$$ gives different $$A$$. **(2)** Composition variation — \"nichrome\" is an alloy whose exact Ni/Cr ratio can vary slightly between batches, changing $$\\rho$$. **(3)** Slight temperature differences during measurement (lab temperature variation, different heating from current). **(4)** Differences in contact pressure introducing different contact resistances (though these largely cancel via the gradient method). **(5)** Random measurement scatter in individual $$V$$ and $$I$$ readings. The graphical method averages over most of these, but cannot eliminate genuine material variation between samples.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "Why is a micrometer used to measure the diameter of a wire in the resistivity experiment? Explain how this affects the calculation of cross-sectional area. (2 steps)", "answer": "- Step 1: A micrometer provides high resolution (±0.01 mm), crucial for thin wires. Diameter errors strongly affect area ($ A = \\pi d^2/4 $), as fractional uncertainty in $ d $ is doubled in $ A $.  \n- Step 2: Example: A 0.1 mm error in $ d = 0.5 $ mm leads to a 40% error in $ A $, drastically skewing $ \\rho = \\frac{RA}{l} $.  \n\n**Takeaway:** Precision in diameter measurement is critical to minimize uncertainty in resistivity calculations.", "source": "Qwen 3 ①", "_id": "qwen_1_3"}, {"question": "A student measures a wire's diameter as 0.5mm instead of 0.25mm. What error occurs in: i) area calculation? ii) resistivity calculation? Explain the multiplicative effects. (4 steps)", "answer": "- Step 1: **Area formula**: A = πd²/4. \n- Step 2: **i) Area error**:\n+ Actual d = 0.25mm → A ∝ (0.25)² = 0.0625.\n+ Measured d = 0.5mm → A ∝ (0.5)² = 0.25.\n→ Area is overestimated by factor = 0.25/0.0625 = 4×.\n\n- Step 3: **ii) Resistivity error**:\n+ ρ = R×A/l. Overestimated A → overestimated ρ by 4×.\n- Step 4: **Takeaway**: Diameter measurement errors compound quadratically in A and linearly in ρ.", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "What's the practical reason exam questions ask you to plot $$R$$ vs $$l$$ rather than, say, $$1/R$$ vs $$1/l$$?", "answer": "Both would in principle yield $$\\rho$$, but $$R$$ vs $$l$$ is the **simplest linear relationship**: rearranging $$R = (\\rho/A)\\,l$$ gives $$y = mx$$ directly, with gradient $$= \\rho/A$$. Errors propagate cleanly through a linear fit. Plotting $$1/R$$ vs $$1/l$$ requires taking reciprocals, which non-linearly distorts the uncertainty bars (errors near $$l = 0$$ blow up). Linear plots with simple gradient extraction are always preferred when possible — they minimise propagation errors and are easier to visually assess for outliers and systematic effects.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "Why is a micrometer screw gauge preferred over a normal ruler for measuring wire diameter in CP7?", "answer": "A ruler's resolution is typically $$1\\,\\text{mm}$$, but wire diameters in CP7 are around $$0.2$$–$$0.5\\,\\text{mm}$$ — the diameter itself is below the ruler's smallest division. Using a ruler would give 100% relative uncertainty or worse. A micrometer has resolution $$0.01\\,\\text{mm}$$, giving a relative uncertainty of only $$\\sim 2$$–$$5\\%$$ on a $$0.3\\,\\text{mm}$$ wire. Since this fractional uncertainty is doubled when computing $$A = \\pi d^2/4$$, having the smallest possible $$\\delta d/d$$ is critical for an accurate resistivity.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "Why is resistance defined as $$V/I$$ rather than $$V \\times I$$? Reason from what each quantity physically represents. (3 steps)", "answer": "- Step 1: $$V$$ is the energy delivered *per unit charge* (J/C) — it's the \"push\" driving charges forward.\n- Step 2: $$I$$ is the rate of charge flow (C/s) — how much charge actually makes it through per second.\n- Step 3: Resistance should describe how much push is needed to achieve a given flow. So we ask: \"how many volts per amp does this component demand?\" That's a *ratio*: $$R = V/I$$. Multiplying voltage by current gives power $$P = VI$$ (energy per second), which is a completely different physical quantity.\n\nTakeaway: $$R$$ measures \"opposition per unit flow\"; $$P$$ measures \"energy per second.\"", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "Why does resistance scale with $$1/A$$ rather than, say, $$1/\\sqrt{A}$$? Give a physical intuition. (3 steps)", "answer": "- Step 1: Think of the wire as many parallel \"channels\" running side by side; each thin strip of cross-section carries some current.\n- Step 2: Doubling the area means *twice as many* such parallel paths, sharing the same voltage. Parallel resistors of equal value combine inversely with count, so total $$R$$ halves.\n- Step 3: This linear \"more paths = less resistance\" rule gives $$R \\propto 1/A$$ exactly. A $$1/\\sqrt{A}$$ scaling would imply geometry effects (like surface friction), which don't apply to bulk conduction.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Suppose two students in CP7 both measure $$\\rho$$ for the same wire, but Student A uses a single $$(V, I)$$ pair while Student B uses the gradient of a $$R$$ vs $$l$$ graph. Both have crocodile-clip contact resistance. Whose answer is more reliable, and why? (3 steps)", "answer": "- Step 1: Contact resistance adds a constant $$R_c$$ to every measured $$R$$: the *measured* resistance is $$R_{\\text{measured}} = (\\rho/A)\\,l + R_c$$.\n- Step 2: Student A's single point gives $$\\rho = R_{\\text{measured}}\\,A/l$$, which absorbs $$R_c$$ and yields $$\\rho$$ too high.\n- Step 3: Student B's gradient is $$\\Delta R/\\Delta l = \\rho/A$$ — the $$R_c$$ offset cancels in the *change*, so the gradient is unaffected. Student B's $$\\rho$$ is unbiased by contact resistance.\n\nMoral: graphical methods isolate the meaningful slope from constant systematic offsets.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "A pencil-lead-shaped resistor (graphite, circular cross-section) has its diameter doubled. By what factor does its resistance change, assuming length and material are unchanged?", "answer": "$$R = \\rho l/A$$, so $$R \\propto 1/A$$. With circular cross-section, $$A \\propto d^2$$. Doubling $$d$$ quadruples $$A$$, so resistance falls to $$1/4$$ of its original value. Conceptually: a wire twice as wide has *four times* the parallel pathways for electron flow, not twice — the squared dependence catches students out.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "A carbon chip has resistivity $$3.0 \\times 10^{-5}\\;\\Omega \\cdot \\text{m}$$, length 10 mm, and a rectangular cross-section of 5 mm × 1 mm. Walk through how to find its resistance, identifying which dimension is length and which form the area. (3 steps)", "answer": "- Step 1: Identify the direction of current flow. The current flows along the **length** of the chip (10 mm), so $$l = 10 \\times 10^{-3}\\;\\text{m}$$. The cross-sectional area perpendicular to the current is the rectangle: $$A = 5 \\times 10^{-3} \\times 1 \\times 10^{-3} = 5.0 \\times 10^{-6}\\;\\text{m}^2$$.\n- Step 2: Apply $$R = \\rho l / A$$: $$R = \\frac{3.0 \\times 10^{-5} \\times 0.010}{5.0 \\times 10^{-6}}$$. The numerator is $$3.0 \\times 10^{-7}$$ and the denominator is $$5.0 \\times 10^{-6}$$.\n- Step 3: $$R = \\frac{3.0 \\times 10^{-7}}{5.0 \\times 10^{-6}} = \\frac{3.0}{50} = 0.06\\;\\Omega$$. The resistance is small because the chip is short and has a relatively large cross-sectional area.\n\nTakeaway: For non-circular cross-sections, identify which dimension is the length (along the current) and which dimensions form the area (perpendicular to the current).", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "Compare how resistivity changes with temperature in a metal versus a semiconductor, and explain the underlying microscopic reason. (4 steps)", "answer": "- Step 1: In a **metal**, the number of free electrons is essentially fixed by the atomic structure — temperature doesn't change it much.\n- Step 2: Heating a metal makes lattice ions vibrate more vigorously, so electrons collide with them more often. More collisions → higher $$\\rho$$ → higher $$R$$.\n- Step 3: In a **semiconductor**, the dominant effect is different: there are few free charge carriers at low temperature, but heating provides energy to liberate more (e.g., promoting electrons across the band gap).\n- Step 4: The huge increase in carrier number outweighs the increased collision rate, so $$\\rho$$ *decreases* with temperature → $$R$$ decreases. This is why NTC (negative temperature coefficient) thermistors are used as temperature sensors.\n\nMemory hook: metals \"get worse\" with heat; semiconductors \"get better.\"", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "Distinguish carefully between *resistance* and *resistivity*. (3 steps)", "answer": "- Step 1: **Resistance** $$R$$ is a property of a specific *component* — it depends on the material, its length, its cross-section, and its temperature. Units: $$\\Omega$$.\n- Step 2: **Resistivity** $$\\rho$$ is an *intrinsic property of the material itself* — it does not depend on the shape or size of the sample. Units: $$\\Omega\\cdot\\text{m}$$.\n- Step 3: They are linked by geometry: $$R = \\rho l/A$$. Two wires of the same material have the same $$\\rho$$ but can have very different $$R$$ if their lengths or areas differ.\n\nAnalogy: $$\\rho$$ is like the \"viscosity\" of the material for electrons; $$R$$ is like the actual flow resistance of a specific pipe made from it.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "A wire's diameter is given in millimetres. What is the conversion factor to metres, and what is a common trap? (2 steps)", "answer": "- Step 1: $$1\\,\\text{mm} = 10^{-3}\\,\\text{m}$$, so multiply by $$10^{-3}$$.\n- Step 2: The trap: confusing *milli-* with *micro-*. Micrometres ($$\\mu\\text{m}$$) use $$10^{-6}$$. Misreading \"mm\" as \"$$\\mu$$m\" makes the diameter 1000× too small, so the area is $$10^6$$ times too small, and $$\\rho$$ comes out $$10^6$$ times too large.\n\nAlways pause and ask: is this milli (10⁻³) or micro (10⁻⁶)?", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Two wires are made of the same material. Wire X has length $$L$$ and diameter $$d$$. Wire Y has length $$2L$$ and diameter $$2d$$. Which wire has the greater resistance, and by what factor? (3 steps)", "answer": "- Step 1: Since both wires are the same material, $$\\rho$$ is the same. Use $$R = \\rho l / A$$ with $$A \\propto d^2$$. For Wire X: $$R_X = \\frac{\\rho L}{\\pi d^2/4}$$. For Wire Y: $$R_Y = \\frac{\\rho (2L)}{\\pi (2d)^2/4} = \\frac{2\\rho L}{\\pi \\cdot 4d^2 / 4} = \\frac{2\\rho L}{\\pi d^2}$$.\n- Step 2: Rewrite Wire X: $$R_X = \\frac{4\\rho L}{\\pi d^2}$$. Now compare: $$\\frac{R_Y}{R_X} = \\frac{2\\rho L / (\\pi d^2)}{4\\rho L / (\\pi d^2)} = \\frac{2}{4} = \\frac{1}{2}$$.\n- Step 3: Wire X has the greater resistance, by a factor of 2. Even though Wire Y is twice as long (which would double resistance), its diameter is also doubled, which quadruples the area (halving resistance from that effect). The area effect dominates: net factor = $$2/4 = 1/2$$.\n\nTakeaway: $$R \\propto l/d^2$$. For wires of the same material, compare $$l/d^2$$ ratios to determine which has greater resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "When the CP7 graph's best-fit line is drawn, why use \"maximum and minimum gradient lines\" to estimate the gradient uncertainty?", "answer": "The data points have scatter due to random errors, and the best-fit line passes through the middle of the scatter. Drawing the **steepest plausible line** (max gradient) and the **shallowest plausible line** (min gradient) that still pass through the bulk of the data envelopes the range of acceptable slopes. The uncertainty is half this range: $$\\delta(\\text{gradient}) = (\\text{max} - \\text{min})/2$$. This is a practical way of estimating the uncertainty without statistical regression formulae, and it captures both the random scatter and the visual sensitivity of the gradient to the choice of line.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "A micrometer measures a wire's diameter as 0.25 mm. A student converts this to metres by writing $$0.25 \\times 10^{-6}$$ m. Why is this wrong, and what is the correct conversion? (2 steps)", "answer": "- Step 1: Identify the prefix confusion. The student has confused the \"milli\" (mm) prefix with the \"micro\" ($$\\mu$$m) prefix. The \"milli\" prefix means $$10^{-3}$$, not $$10^{-6}$$.\n- Step 2: Apply the correct conversion. To convert millimetres to metres, you multiply by $$10^{-3}$$. Therefore, $$0.25 \\text{ mm} = 0.25 \\times 10^{-3} \\text{ m} = 2.5 \\times 10^{-4} \\text{ m}$$. The student's error would make the area (which depends on $$d^2$$) too small by a factor of $$10^6$$, and the calculated resistivity too small by $$10^6$$.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "A student claims: \"If I use a thicker wire in CP7, my measured $$\\rho$$ should come out smaller, because resistance is smaller.\" Why is this wrong? (3 steps)", "answer": "- Step 1: $$\\rho$$ is a *material property* — it doesn't depend on geometry. Whatever the wire's diameter, $$\\rho$$ should come out the same (within experimental uncertainty).\n- Step 2: The student is confusing $$R$$ (which does depend on $$A$$) with $$\\rho$$ (which doesn't). The thicker wire will give lower $$R$$ at each $$l$$, but also a larger $$A$$ — and $$\\rho = (\\text{gradient}) \\times A$$ exactly cancels this geometric difference.\n- Step 3: This is precisely the point of defining $$\\rho$$: it abstracts away the geometry to give the intrinsic conduction property of the material. The thick and thin wires of the same material *must* yield the same $$\\rho$$, or the experiment has gone wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "Explain the difference between resistance and resistivity. If you stretch a copper wire to double its length (constant volume), which quantity changes and which stays the same?", "answer": "**Resistance** ($$R$$, in $$\\Omega$$) is a property of a **specific component** — it depends on the material's resistivity, the length, and the cross-sectional area of that particular piece of wire.\n\n**Resistivity** ($$\\rho$$, in $$\\Omega \\cdot \\text{m}$$) is an **intrinsic property of the material** — it depends only on the material and its temperature, not on shape or size.\n\nIf you stretch a copper wire to double its length (volume constant, so area halves):\n- **Resistance changes** — it quadruples ($$R \\propto \\frac{l}{A}$$: length doubles and area halves, so $$R$$ increases by factor of 4).\n- **Resistivity stays the same** — it's still copper at the same temperature. The material hasn't changed, only the geometry.\n\nAnalogy: resistivity is like density (property of the substance); resistance is like mass (depends on how much substance and its shape).", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "In the I–V graph of a filament lamp, at which point is the resistance lowest — at low voltage or high voltage? Explain using the relationship between the graph's shape and $$R = V/I$$. (2 steps)", "answer": "- Step 1: On an I–V graph, the resistance at any point is given by $$R = V/I$$, which is the reciprocal of the gradient of the line from the origin to that point (not the local tangent gradient). At low voltage, the curve is steep from the origin (large $$I$$ relative to $$V$$), so $$R = V/I$$ is small.\n- Step 2: At high voltage, the curve flattens relative to the origin (smaller increase in $$I$$ relative to $$V$$), so $$R = V/I$$ is larger. The resistance is lowest at low voltage (when the filament is cool) and highest at high voltage (when the filament is hot).\n\nTakeaway: On an I–V graph, low voltage = steep from origin = low $$R$$; high voltage = flatter from origin = high $$R$$.", "source": "GLM 5.1 ②", "_id": "glm_2_31"}, {"question": "Why is the graphical method ($$R$$ vs $$l$$ plot) superior to taking a single pair of measurements and computing $$\\rho = RA/l$$ directly? (3 steps)", "answer": "- Step 1: **Reduces random error**: many data points are averaged by the best-fit line, so individual fluctuations (e.g., contact-pressure variation, slight current fluctuations) get smoothed out instead of dominating one reading.\n- Step 2: **Eliminates a systematic offset**: contact resistance between the crocodile clip and the wire adds a constant extra $$R$$ to every reading. This shifts the line up (non-zero y-intercept) but **does not change the gradient**. Since we use only the gradient to find $$\\rho$$, contact resistance is automatically cancelled.\n- Step 3: **Visual quality check**: a linear graph through the origin confirms $$R \\propto l$$ (the underlying physics holds). A curved or scattered plot warns of problems (heating, non-uniform wire) before you trust the result.\n\nThis is the canonical argument for graphical analysis in any \"find a constant from a linear relationship\" experiment.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Why is it sometimes advantageous to use an ohmmeter directly in CP7 instead of separate voltmeter + ammeter? (3 steps)", "answer": "- Step 1: An ohmmeter measures $$R$$ directly by sending its own tiny test current through the component and reading the voltage drop — no manual $$V/I$$ division needed.\n- Step 2: This reduces propagated error: with separate meters, $$R$$ inherits the uncertainty from both $$V$$ and $$I$$ readings.\n- Step 3: It also avoids the issue of the voltmeter drawing some current away from the ammeter loop (or vice versa, depending on circuit topology). Trade-off: ohmmeters typically have lower resolution than dedicated voltmeter + ammeter combinations.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "What is the key difference between how you determine resistance from an I–V graph for an ohmic conductor versus a non-ohmic conductor? (2 steps)", "answer": "- Step 1: For an **ohmic conductor**, the I–V graph is a straight line through the origin. The resistance is constant and equals the reciprocal of the gradient: $$R = 1/\\text{gradient}$$. You can use the gradient because the line is straight and passes through the origin.\n- Step 2: For a **non-ohmic conductor**, the I–V graph is a curve, and the resistance changes at every point. You must use $$R = V/I$$ at the specific point of interest — take the coordinates of that point and divide voltage by current. You **cannot** use the local gradient of the curve, because $$R = V/I \\neq 1/(\\text{local gradient})$$ unless the curve passes through the origin.\n\nTakeaway: Ohmic → $$R = 1/\\text{gradient}$$ (constant). Non-ohmic → $$R = V/I$$ at each point (varies). Never use the local gradient for non-ohmic components.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "Why does the filament lamp's resistance increase with current, even though current itself doesn't directly change resistance?", "answer": "Current itself doesn't change resistance — *temperature* does. The chain is: higher current → more power dissipated ($$P = I^2 R$$) → filament heats up → lattice vibrations increase → more electron–ion collisions → resistivity rises → resistance rises. So current is the *upstream cause* (it drives heating), but the *mechanism* is thermal: changing $$\\rho$$. This is why in low-current measurements (like CP7), the wire stays near room temperature and resistance stays effectively constant.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "In Core Practical 7 (measuring the resistivity of a wire), identify the independent variable, the dependent variable, and two key control variables. Why must each control variable be controlled? (3 steps)", "answer": "- Step 1: The **independent variable** is the length $$l$$ of the wire (changed in steps, e.g., 0.25 m intervals). The **dependent variable** is the resistance $$R$$ (calculated from $$R = V/I$$ at each length).\n- Step 2: The **voltage across the wire** must be controlled (kept constant or monitored) because changing the voltage changes the current, which could heat the wire and alter its resistivity. The **wire material** must be controlled because different materials have different resistivities — using the same wire throughout ensures this.\n- Step 3: The **temperature** must also be controlled (by using small currents and switching off between readings). If the wire heats up, its resistivity changes, which would corrupt the measurement. This is the most critical control in the experiment.\n\nTakeaway: Independent = length, Dependent = resistance, Control = voltage, material, temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "A constantan wire's CP7 graph gives gradient $$8\\,\\Omega/\\text{m}$$, and the wire has diameter $$0.2\\,\\text{mm}$$. Walk through (without computing the final number) how to extract resistivity. (4 steps)", "answer": "- Step 1: Convert diameter to metres: $$d = 0.2 \\times 10^{-3}\\,\\text{m}$$.\n- Step 2: Compute the cross-sectional area: $$A = \\pi d^2/4 \\sim \\pi (0.2 \\times 10^{-3})^2/4 \\sim \\pi \\times 10^{-8}\\,\\text{m}^2 \\sim 3 \\times 10^{-8}\\,\\text{m}^2$$.\n- Step 3: Recognise that gradient $$= \\rho/A$$, so $$\\rho = \\text{gradient} \\times A$$.\n- Step 4: Order-of-magnitude estimate: $$\\rho \\sim 8 \\times 3 \\times 10^{-8} \\sim 2 \\times 10^{-7}\\,\\Omega\\cdot\\text{m}$$ — consistent with known constantan values.\n\nThe conceptual move that matters: gradient alone is not resistivity — it must be **multiplied by area**.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "Explain why the resistivity of a semiconductor (like an NTC thermistor) decreases with temperature. How is the mechanism fundamentally different from a metal? (3 steps)", "answer": "- Step 1: In a semiconductor, there are far fewer free charge carriers at low temperature compared to a metal. Many electrons are bound to their atoms and cannot participate in conduction. This is why semiconductors have much higher resistivity than metals at room temperature.\n- Step 2: As temperature increases, thermal energy excites more bound electrons into the conduction band, freeing them to carry current. The number of charge carriers $$n$$ increases significantly with temperature.\n- Step 3: Although increased lattice vibration (the same effect as in metals) would tend to increase resistance, the increase in charge carrier density dominates by far. More carriers means more current for the same voltage, so $$R$$ decreases. Since $$R \\propto \\rho$$ (for fixed geometry), the resistivity $$\\rho$$ decreases.\n\nTakeaway: Semiconductor: $$T \\uparrow \\Rightarrow$$ charge carriers freed $$\\Rightarrow n \\uparrow \\Rightarrow \\rho \\downarrow \\Rightarrow R \\downarrow$$. The carrier density effect dominates over the lattice vibration effect.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "In CP7, you plot R (y-axis) against l (x-axis). Show that the gradient equals $$\\frac{\\rho}{A}$$, and explain how to obtain the resistivity from the graph. (4 steps)", "answer": "- Step 1: Start with the resistivity formula: $$R = \\frac{\\rho l}{A}$$\n- Step 2: Rearrange to match the straight-line equation $$y = mx + c$$:\n$$R = \\underbrace{\\frac{\\rho}{A}}_{m} \\cdot l + \\underbrace{0}_{c}$$\n- Step 3: Comparing: $$y = R$$, $$x = l$$, gradient $$m = \\frac{\\rho}{A}$$, y-intercept $$c = 0$$ (line should pass through origin).\n- Step 4: To find resistivity: $$\\rho = \\text{gradient} \\times A$$, where $$A = \\frac{\\pi \\bar{d}^2}{4}$$.\n\n**Common trap:** The gradient gives $$\\frac{\\rho}{A}$$, NOT $$\\rho$$. You must multiply by A to get resistivity. Missing this final multiplication is a frequent mark-scheme error.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "A student measures the diameter of a wire as 0.25 mm but forgets to check for zero error. The micrometer actually has a zero error of +0.02 mm (it reads 0.02 mm when closed on nothing). Will the calculated resistivity be too high or too low? Explain. (3 steps)", "answer": "- Step 1: The true diameter is $$d_{\\text{true}} = d_{\\text{reading}} - \\text{zero error} = 0.25 - 0.02 = 0.23\\;\\text{mm}$$. The student used $$d = 0.25\\;\\text{mm}$$ (too large by 0.02 mm).\n- Step 2: A larger diameter gives a larger area ($$A \\propto d^2$$). The student's calculated area is too large.\n- Step 3: Since $$\\rho = \\text{gradient} \\times A$$, and the gradient is correct (it comes from the R vs l graph, unaffected by diameter measurement), the overestimated area leads to an overestimated resistivity. The calculated $$\\rho$$ is **too high**.\n\nTakeaway: Positive zero error → overestimated diameter → overestimated area → overestimated resistivity.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "A filament lamp has resistance $$50\\,\\Omega$$ when cold. When fully lit, its resistance is roughly 10× higher. What does this tell you about the lamp's temperature dependence and its operation? (3 steps)", "answer": "- Step 1: A 10× rise in $$R$$ means $$\\rho$$ has risen by the same factor (geometry is fixed) — the tungsten filament is much hotter when lit.\n- Step 2: When you first switch on, $$R$$ is low, so initial current is high: $$I = V/R$$ surges. This is why filament bulbs often fail *at switch-on*.\n- Step 3: As the filament heats, $$R$$ rises, current drops, and the system settles into a steady operating point where power dissipated equals heat radiated. The strong positive temperature coefficient is essential to this self-regulation.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Power is dissipated in a resistor as heat. Starting from $$P = IV$$, derive the two other expressions for power dissipation: $$P = I^2R$$ and $$P = V^2/R$$. (3 steps)", "answer": "- Step 1: Start with $$P = IV$$. From Ohm's Law, $$V = IR$$. Substitute this into the power equation: $$P = I \\times (IR) = I^2R$$. This form is useful when you know the current and resistance.\n- Step 2: From Ohm's Law, $$I = V/R$$. Substitute this into $$P = IV$$: $$P = (V/R) \\times V = V^2/R$$. This form is useful when you know the voltage and resistance.\n- Step 3: Alternatively, to get $$P = V^2/R$$ from $$P = I^2R$$: square $$I = V/R$$ to get $$I^2 = V^2/R^2$$, then substitute: $$P = (V^2/R^2) \\times R = V^2/R$$. All three forms are equivalent for ohmic conductors; choose the one that uses the quantities you know.\n\nTakeaway: $$P = IV = I^2R = V^2/R$$. Choose the form based on which variables are given.", "source": "GLM 5.1 ②", "_id": "glm_2_49"}, {"question": "Two materials have resistivities $$\\rho_1 = 1.7 \\times 10^{-8}\\,\\Omega\\cdot\\text{m}$$ and $$\\rho_2 = 2.6 \\times 10^{-8}\\,\\Omega\\cdot\\text{m}$$. Cylinders of equal length and cross-section are made from each. Which is the better conductor, and roughly by what factor? (3 steps)", "answer": "- Step 1: For identical geometry, $$R \\propto \\rho$$. Lower $$\\rho$$ = lower $$R$$ = better conductor.\n- Step 2: $$\\rho_1 < \\rho_2$$, so material 1 (copper) is the better conductor.\n- Step 3: The ratio $$\\rho_2/\\rho_1 \\approx 1.5$$, so material 2 (aluminium) has ~50% more resistance for the same shape. This is why high-voltage transmission lines often use aluminium (cheaper, lighter) despite slightly worse conductivity — the geometry compensates.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Why do we say that resistivity depends on \"material and temperature\" but not on geometry, while resistance depends on all three?", "answer": "Resistivity is defined at the microscopic level: it captures how readily charge carriers move through the material's lattice, which depends on the material's
