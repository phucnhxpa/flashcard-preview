ormal operating resistance is $$R_{\\text{hot}} = V/I = 240/0.25 = 960$$ Ω — twelve times the cold resistance. This dramatic change in resistance with temperature is what makes tungsten a *non-ohmic* conductor.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "A student says: \"Before I can apply Kirchhoff's First Law at a junction, I need to know whether the circuit is series or parallel.\" Why is this statement wrong? (2 steps)", "answer": "- Step 1: Kirchhoff's First Law ($$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$) is a statement of *conservation of charge* at a single point (a junction/node). It holds at **any** junction, regardless of the overall circuit topology.\n- Step 2: The law says: charge cannot accumulate at a junction. Whatever current flows in must flow out. This is true whether the junction is part of a series circuit, a parallel circuit, or a complex network. You do not need to \"classify\" the circuit first.\n\nThis was a specific misconception Phuc displayed in a lesson. The series/parallel classification is a useful *tool* for analysing specific circuit configurations, but Kirchhoff's Laws are more fundamental — they apply universally.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "A 2000 W hair dryer operates at 230 V. Should it be fitted with a 5 A fuse or a 13 A fuse? Walk through the full reasoning. (3 steps)", "answer": "- Step 1: Calculate the operating current: $$I = \\frac{P}{V} = \\frac{2000}{230} \\approx 8.7$$ A.\n- Step 2: Compare to available fuses. A 5 A fuse would blow because 8.7 A > 5 A. A 13 A fuse would not blow because 8.7 A < 13 A.\n- Step 3: Choose the **13 A fuse**. It is the *next standard rating above* the operating current. You must not choose a fuse with a rating far above the operating current (e.g., 30 A) because it would not provide adequate protection — a fault could cause a dangerous current (say 25 A) without blowing the fuse.\n\nThe exam keyword: state both the calculated current AND the comparison. \"I = 8.7 A > 5 A, so a 5 A fuse would blow during normal operation. I = 8.7 A < 13 A, so a 13 A fuse is appropriate.\"", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "An appliance converts 500 J of electrical energy into 350 J of useful work in 10 s. Calculate the input power, the useful output power, and the efficiency. (3 steps)", "answer": "- Step 1: Input power: $$P_{\\text{in}} = \\frac{W_{\\text{in}}}{t} = \\frac{500}{10} = 50$$ W.\n- Step 2: Useful output power: $$P_{\\text{useful}} = \\frac{W_{\\text{useful}}}{t} = \\frac{350}{10} = 35$$ W.\n- Step 3: Efficiency: $$\\eta = \\frac{P_{\\text{useful}}}{P_{\\text{in}}} \\times 100\\% = \\frac{35}{50} \\times 100\\% = 70\\%$$.\n\nThe \"missing\" 30% (15 W) is dissipated as heat. Notice you could also calculate efficiency directly from energies: $$\\eta = \\frac{350}{500} \\times 100\\% = 70\\%$$ — the time cancels because both numerator and denominator are divided by the same t.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "A bulb filament carries 250 mA with 2.2 V across it for 60 seconds. Calculate the electrical energy converted using the direct method. Then show the roundabout method gives the same answer but involves more risk. (3 steps)", "answer": "- Step 1: **Direct method** — one step: $$W = IVt = 0.25 \\times 2.2 \\times 60 = 33$$ J.\n- Step 2: **Roundabout method** — two steps: first, $$Q = It = 0.25 \\times 60 = 15$$ C. Then, $$E = QV = 15 \\times 2.2 = 33$$ J. Same answer.\n- Step 3: The roundabout method has two risks: (1) you might accidentally use $$V = E/t$$ instead of $$E = QV$$ in the second step (a documented student error), and (2) you might forget to convert 250 mA to 0.25 A in one of the two steps. More steps = more chances to go wrong.\n\nThis example comes directly from the textbook and was worked through in the lesson. The tutor specifically wrote $$E = Pt$$, $$E = IVt$$, $$E = I^2 Rt$$ on the board to push the student towards single-step energy calculations.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "A 5 Ω and a 3 Ω resistor are in series with a 16 V supply, carrying a total current of 2 A. Calculate the power in each resistor using the most direct formula, then verify that the total power equals the battery's power output. (4 steps)", "answer": "- Step 1: In series, the current is the same everywhere: $$I = 2$$ A through both resistors. Given I and R → use $$P = I^2 R$$.\n- Step 2: $$P_{5\\Omega} = (2)^2 \\times 5 = 4 \\times 5 = 20$$ W. $$P_{3\\Omega} = (2)^2 \\times 3 = 4 \\times 3 = 12$$ W.\n- Step 3: Total dissipated: $$P_{\\text{total}} = 20 + 12 = 32$$ W.\n- Step 4: Battery power: $$P_{\\text{battery}} = V_{\\text{battery}} \\times I_{\\text{total}} = 16 \\times 2 = 32$$ W. ✓ Conservation of energy holds.\n\nNotice: the 5 Ω resistor dissipates more power than the 3 Ω resistor because, at constant current, $$P \\propto R$$. The larger resistor \"claims\" a larger share of the voltage ($$V_{5\\Omega} = 10$$ V, $$V_{3\\Omega} = 6$$ V), and hence dissipates more power.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "An electric kettle is rated 240 V, 3.0 kW. Calculate the resistance of its heating element using the most direct formula. (2 steps)", "answer": "- Step 1: Given V and P → use $$P = \\frac{V^2}{R}$$, rearranged: $$R = \\frac{V^2}{P}$$.\n- Step 2: $$R = \\frac{(240)^2}{3000} = \\frac{57600}{3000} = 19.2$$ Ω.\n\nYou could also first find $$I = P/V = 12.5$$ A, then $$R = V/I = 240/12.5 = 19.2$$ Ω — same answer, but the direct route is one step instead of two.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "A student trying to find the resistance of a component from its power rating writes $$R = \\frac{I}{V}$$. Without doing any numerical calculation, explain why this must be wrong using dimensional analysis. (2 steps)", "answer": "- Step 1: The dimensions of $$\\frac{I}{V}$$ are $$\\frac{\\text{amperes}}{\\text{volts}} = \\frac{\\text{A}}{\\text{V}}$$. Since $$V = \\frac{J}{C}$$ and $$A = \\frac{C}{s}$$, we get $$\\frac{A}{V} = \\frac{C/s}{J/C} = \\frac{C^2}{J \\cdot s}$$, which has units of siemens (conductance), not ohms.\n- Step 2: Resistance must have units of ohms (Ω), which is V/A. The correct expression is $$R = \\frac{V}{I}$$, giving units $$\\frac{V}{A} = \\Omega$$. Always do a quick units check if you're unsure of a rearrangement.\n\nDimensional analysis is your safety net: if the units don't match the expected quantity, the formula is definitely wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "In the circuit lesson, a student tried to calculate battery power using $$P = 0.83 \\times 3.6$$ (a resistor's current times a resistor's voltage). What is wrong with this approach, and what should be used instead? (2 steps)", "answer": "- Step 1: $$P = 0.83 \\times 3.6$$ uses the voltage across a *single resistor* and the current through it. This gives the power dissipated *in that resistor*, not the power supplied by the battery.\n- Step 2: Battery power must use the **battery's own voltage** and the **total current** it supplies: $$P_{\\text{battery}} = V_{\\text{battery}} \\times I_{\\text{total}}$$. For the lesson circuit: $$P = 3.0 \\times 0.83 = 2.49$$ W.\n\nThe key principle: each component's power is calculated using *that component's* voltage and current. Mixing values from different components gives a meaningless number.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "A student is asked to find the current in a potential divider circuit and suggests using $$I = Q/t$$. Why is this the wrong starting point, and what should be used instead? (2 steps)", "answer": "- Step 1: $$I = Q/t$$ relates current to charge and time. In a potential divider circuit, you are not given charge or a specific time interval — you are given voltage and resistance.\n- Step 2: The appropriate formula is $$I = \\frac{V}{R}$$ (Ohm's Law rearranged). In a series potential divider, the total current is $$I = \\frac{V_{\\text{in}}}{R_1 + R_2}$$, using the total voltage and total resistance.\n\nAlways start with the formula that uses the quantities you *have*. If you know V and R, reach for Ohm's Law. If you know Q and t, then $$I = Q/t$$ would be appropriate.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "A 4.0 Ω resistor in a parallel branch carries 1.5 A. A second branch has an unknown resistor $$R_x$$. The total supply is 12 V with a 2.8 Ω resistor in series with the parallel pair. Walk through finding the power in each component, choosing the best formula each time. (5 steps)", "answer": "- Step 1: Voltage across the 4 Ω resistor: $$V_{4} = IR = 1.5 \\times 4.0 = 6.0$$ V. Since it's parallel, $$V_{R_x} = 6.0$$ V also. Voltage across 2.8 Ω: $$12 - 6 = 6.0$$ V.\n- Step 2: Total current: $$I_T = V_{2.8}/R = 6.0/2.8 \\approx 2.14$$ A. Current through $$R_x$$: $$I_x = 2.14 - 1.5 = 0.64$$ A. So $$R_x = 6.0/0.64 \\approx 9.4$$ Ω.\n- Step 3: **Power in 2.8 Ω** — given I and R → use $$P = I^2 R$$: $$P = (2.14)^2 \\times 2.8 \\approx 12.8$$ W.\n- Step 4: **Power in 4.0 Ω** — given V and I → use $$P = VI$$: $$P = 6.0 \\times 1.5 = 9.0$$ W.\n- Step 5: **Power in $$R_x$$** — given V and R → use $$P = V^2/R$$: $$P = 36/9.4 \\approx 3.8$$ W.\n\nTotal: $$12.8 + 9.0 + 3.8 = 25.6$$ W. Check: $$P_{\\text{supply}} = 12 \\times 2.14 = 25.7$$ W (rounding difference ✓).", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": true}, {"question": "Explain why the three definitions $$P = W/t$$, $$I = Q/t$$, and $$V = W/Q$$ are the *starting points* for all electrical power and energy derivations, not the derived formulas themselves. (2 steps)", "answer": "- Step 1: These three equations are *definitions* — they define what power, current, and potential difference *are*. They are not derived from anything else; they are the foundational building blocks of circuit theory.\n- Step 2: All derived formulas ($$P = IV$$, $$P = I^2 R$$, $$P = V^2/R$$, $$W = IVt$$, etc.) come from combining these definitions with Ohm's Law ($$V = IR$$). If you forget a derived formula, you can always reconstruct it from the definitions. But if you confuse the definitions themselves (e.g., $$V = E/t$$ instead of $$V = E/Q$$), everything downstream is wrong.\n\nThis is why the tutor always started derivations from these three definitions, and why confusing them (as Phuc did with $$V = E/t$$) is such a high-priority trap.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "A student calculates the power dissipated in a resistor as 0.5 W and then needs to find the energy dissipated in 3 minutes. They write $$W = 0.5 \\times 3 = 1.5$$ J. What went wrong? (2 steps)", "answer": "- Step 1: The formula $$W = Pt$$ requires time in *seconds*. 3 minutes = 180 seconds, not 3 seconds.\n- Step 2: The correct calculation: $$W = 0.5 \\times 180 = 90$$ J. The student's answer of 1.5 J is off by a factor of 60.\n\nThis is a common exam trap: always check that your time is in seconds before using $$W = Pt$$ or $$W = IVt$$. The SI unit of energy (joules) requires seconds, not minutes or hours.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "Two lamps are connected in series to a 150 V supply. Lamp X has resistance 400 Ω and lamp Y has resistance 100 Ω. Which lamp is brighter, and why? (3 steps)", "answer": "- Step 1: In series, the same current flows through both lamps. At constant current, power is proportional to resistance: $$P = I^2 R$$.\n- Step 2: Since lamp X has 4× the resistance of lamp Y, it dissipates 4× the power: $$P_X = 4 P_Y$$. Lamp X is brighter.\n- Step 3: This may feel counterintuitive — we often associate \"higher resistance\" with \"blocking current.\" But in series, the current is forced through both lamps equally. The higher-resistance lamp drops more voltage ($$V_X = 4V_Y$$), so it converts more energy per charge.\n\nIf the lamps were in *parallel* instead, the result would reverse: at constant voltage, $$P = V^2/R$$, so the *lower*-resistance lamp would dissipate more power and be brighter. Context matters!", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "A student claims: \"A resistor with resistance R dissipates power P. If I replace it with a resistor of resistance 2R, it will always dissipate more power.\" Is this claim correct? Explain with two counterexamples. (3 steps)", "answer": "- Step 1: The claim is **not always correct** — it depends on what is held constant in the circuit.\n- Step 2: **Counterexample 1 (constant voltage):** If the resistor is connected directly across a fixed voltage supply, $$P = V^2/R$$. Doubling R *halves* the power. The 2R resistor dissipates *less* power.\n- Step 3: **Counterexample 2 (constant current):** If the resistor carries a fixed current (e.g., in series with a constant current source), $$P = I^2 R$$. Doubling R *doubles* the power. The 2R resistor dissipates *more* power.\n\nThe takeaway: you cannot determine how power changes with resistance without knowing what is held constant (V, I, or something else). Always identify your given quantities first.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "A 6 V battery powers a motor that lifts a 0.6 kg mass by 0.94 m in 7.7 s. The motor draws 0.75 A. Calculate the efficiency of the motor. (Take $$g = 10$$ m/s².) (3 steps)", "answer": "- Step 1: Useful output power (mechanical): $$P_{\\text{out}} = \\frac{mgh}{t} = \\frac{0.6 \\times 10 \\times 0.94}{7.7} = \\frac{5.64}{7.7} \\approx 0.73$$ W.\n- Step 2: Total input power (electrical): $$P_{\\text{in}} = IV = 0.75 \\times 6 = 4.5$$ W.\n- Step 3: Efficiency: $$\\eta = \\frac{P_{\\text{out}}}{P_{\\text{in}}} \\times 100\\% = \\frac{0.73}{4.5} \\times 100\\% \\approx 16\\%$$.\n\nThe remaining 84% is dissipated as heat (resistive losses in the motor windings, friction, air resistance). Real small electric motors are typically only 15–30% efficient, which is why they get warm during operation.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "What exam-keyword phrases should you include in a 3-mark answer explaining the heating effect of a current in a metallic conductor? (2 steps)", "answer": "- Step 1: The three essential phrases that mark schemes look for:\n  + \"Electrons collide with (positive) lattice ions\"\n  + \"Transfer kinetic energy to the ions\"\n  + \"Ions vibrate with greater amplitude\" (= increased temperature/heat)\n- Step 2: Common insufficient answers that lose marks:\n  + \"Electrons hit atoms\" — too vague; must specify *lattice ions* and *kinetic energy transfer*\n  + \"Friction causes heat\" — not the correct microscopic mechanism (there is no \"friction\" in the mechanical sense)\n  + \"Resistance makes heat\" — circular reasoning; doesn't explain *how*\n\nThe mark scheme rewards the causal chain: moving electrons → collisions → energy transfer → increased vibration = heat. Each link in the chain earns a mark.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": true}, {"question": "You are told that an electric iron operates at 230 V with a power of 1.5 kW. Without doing a full calculation, estimate the order of magnitude of the current, and state which fuse (3 A, 5 A, or 13 A) is appropriate. (2 steps)", "answer": "- Step 1: Rough estimate: $$I \\approx \\frac{P}{V} = \\frac{1500}{230} \\approx \\frac{1500}{250} = 6$$ A (approximation). The actual value is $$\\frac{1500}{230} \\approx 6.5$$ A.\n- Step 2: Since ~6.5 A > 5 A, a 5 A fuse would blow. The appropriate fuse is **13 A** (the next standard rating above 6.5 A).\n\nOrder-of-magnitude reasoning: 1.5 kW at 230 V means the current is in the \"several amps\" range — well above 3 A or 5 A, so 13 A is the only viable standard choice. You don't need a precise calculation to make the right fuse selection.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "Why does a fuse with a rating *much higher* than the operating current provide poor protection, even though it won't blow during normal operation? (2 steps)", "answer": "- Step 1: A fuse protects against *fault* conditions (short circuits, component failures) where the current rises far above normal. It must blow *before* the fault current causes damage or fire.\n- Step 2: If the fuse rating is much higher than the operating current, a large fault current could flow for a long time before the fuse reaches its melting point. For example, a 30 A fuse on a 7 A appliance would allow a 25 A fault current to flow without blowing — potentially causing overheating, melting insulation, or fire.\n\nThe rule: choose the **next standard rating above** the operating current. Not the highest available, not one that's \"close enough\" — the next one up. This provides both normal-operation compatibility and fault protection.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "A student is given V = 1.5 V and R = 6 Ω for a resistor and writes $$P = IV = I \\times 1.5$$. What conceptual error has the student made, and what should they do instead? (2 steps)", "answer": "- Step 1: The student has substituted V but left I as a symbol. However, I was *not given* — it must be calculated first from $$I = V/R = 1.5/6 = 0.25$$ A. The student has started with the wrong formula for the given quantities.\n- Step 2: Since V and R are given, the direct formula is $$P = V^2/R = (1.5)^2/6 = 2.25/6 = 0.375$$ W. No intermediate calculation of I is needed.\n\nThe general principle: if you find yourself having to *calculate* a quantity before you can use a formula, you've probably chosen the wrong formula. Look at what's directly given and pick the matching one.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": true}, {"question": "The symbol \"W\" appears in both electrical formulas and unit labels. How do you distinguish between \"W\" meaning work/energy and \"W\" meaning watts in printed text and in formulas? (2 steps)", "answer": "- Step 1: In printed textbook text, the convention is: *italic* **W** = the physical quantity work (measured in joules). Upright **W** = the unit watts. For example: \"$$W = 50$$ W\" means \"the work done is 50 joules per second of power times time.\"\n- Step 2: In handwritten exam work, you cannot rely on font style. The safest approach is to always write the *unit* next to the *numerical value* and use the symbol W only for the quantity: e.g., \"$$W = 33$$ J\" (not \"$$W = 33$$ W\", which would be confusing). When writing power, use \"$$P = 3.0$$ W.\"\n\nThe textbook explicitly warns about this ambiguity. In practice, the context usually makes it clear: if W appears in a formula like $$W = IVt$$, it means energy (work). If it appears after a number, it's the unit of power.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": true}, {"question": "Show that a volt-ampere (VA) is equivalent to a watt (W) using the definitions of potential difference and current. (3 steps)", "answer": "- Step 1: From the definition of current: $$I = Q/t$$, so the unit of current is A = C/s (coulombs per second).\n- Step 2: From the definition of potential difference: $$V = W/Q$$, so the unit of voltage is V = J/C (joules per coulomb).\n- Step 3: Multiply the units: VA = (J/C)(C/s) = J/s = W. The coulombs cancel, leaving joules per second, which is the watt.\n\nThis is why the unit \"volt-ampere\" is used for apparent power in AC circuits — it has the same dimensions as watts but represents a different physical quantity (apparent power vs. real power). For DC circuits and resistive loads, VA and W give the same numerical value.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "A student says: \"In a parallel circuit, the current splits equally between the branches.\" Is this always true? Give a counterexample. (2 steps)", "answer": "- Step 1: No, current only splits equally if the two branches have *equal resistance*. Kirchhoff's First Law says the total current equals the sum of branch currents, but says nothing about how they split.\n- Step 2: Counterexample: a 6 Ω and a 3 Ω resistor in parallel with 1.5 V across them. $$I_{6\\Omega} = 1.5/6 = 0.25$$ A, $$I_{3\\Omega} = 1.5/3 = 0.50$$ A. The 3 Ω branch gets *twice* the current because it has half the resistance. Current splits in the *inverse ratio* of resistances.\n\nIn general: lower resistance → more current (at constant voltage). Only equal resistances give equal current splitting.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}], "count": 46}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Explain the microscopic process of resistive heating in a conductor. Why does the rate of heat transfer equal I²R at constant temperature? (3 steps)", "answer": "- Step 1: Electrons drift through a lattice of positive ions under an electric field. Their random thermal motion (due to temperature) remains constant, but they acquire a net drift velocity from the applied voltage.  \n- Step 2: Electrons collide with the lattice ions, transferring kinetic energy to them. This energy transfer causes the ions to vibrate more vigorously, increasing the conductor's thermal energy.  \n- Step 3: At constant temperature, energy loss via collisions equals energy input from the current. The power dissipated (rate of heat transfer) becomes P = I²R, where I is current and R is resistance.  \n\n[Optional: Electrons are slowed but not stored — charge conservation ensures current remains constant. Heat dissipation arises from energy transfer during collisions, not electron accumulation.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is P = IV the general formula for power, while P = I²R and P = V²/R are specialized cases? (3 steps)", "answer": "- Step 1: P = IV comes directly from definitions of power (P = E/t), current (I = Q/t), and voltage (V = E/Q). It applies universally because it doesn't assume Ohm's Law.  \n- Step 2: P = I²R is derived by substituting V = IR (Ohm's Law) into P = IV. It's valid only for ohmic resistors where V ∝ I.  \n- Step 3: P = V²/R comes from substituting I = V/R into P = IV. Like P = I²R, it requires Ohmic behavior. Both specialized formulas highlight the square dependence on current/voltage for heating effects.  \n\n[Takeaway: Use P = IV when component isn't ohmic; use squared terms when R is constant and I or V is known.]", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "A 6Ω and a 3Ω resistor are in parallel with 1.5V across them. Calculate power in each using P = V²/R. Why is this formula ideal here? (3 steps)", "answer": "- Step 1: For the 6Ω resistor: P = (1.5)² / 6 = 2.25 / 6 = 0.375 W.  \n- Step 2: For the 3Ω resistor: P = (1.5)² / 3 = 2.25 / 3 = 0.75 W.  \n- Step 3: P = V²/R is ideal because both resistors share the same voltage in parallel. Avoids calculating current first, reducing steps.  \n\n[Check: Total current = 0.375/1.5 + 0.75/1.5 = 0.25 A + 0.5 A = 0.75 A ✓]", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "A 2.0Ω resistor in series carries 0.75A. Calculate power using P = I²R. Why is this formula preferred over P = IV here? (3 steps)", "answer": "- Step 1: P = (0.75)² × 2.0 = 0.5625 × 2 = 1.125 W.  \n- Step 2: P = I²R is preferred because current is known (I = 0.75A) and constant in series. Voltage drop would require extra step (V = IR = 1.5V) before calculating P = IV.  \n- Step 3: The \"heating effect\" formula P = I²R directly links current and resistance to power, emphasizing energy transfer to thermal energy.  \n\n[Alternative method: P = IV = 1.5V × 0.75A = 1.125 W ✓ Same result.]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "What is the efficiency of an electric motor that lifts 200g 1m in 5s, drawing 0.5A at 12V? (4 steps)", "answer": "- Step 1: Calculate useful work done: Euseful = mgh = 0.2kg × 9.8N/kg × 1m = 1.96 J.  \n- Step 2: Find useful power: Puseful = E/t = 1.96 J / 5s = 0.392 W.  \n- Step 3: Total power input: Ptotal = IV = 0.5A × 12V = 6 W.  \n- Step 4: Efficiency = (0.392 / 6) × 100% ≈ 6.53%. The rest (93.47%) is lost as heat, sound, etc.  \n\n[Takeaway: Efficiency = (Useful / Total) × 100%. Always state \"useful\" and \"total\" explicitly.]", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why is it better to calculate electrical energy directly via W = IVt instead of W = QV? (2 steps)", "answer": "- Step 1: W = IVt uses directly measurable quantities (current, voltage, time). It requires one substitution (IVt) rather than two steps (Q = It → QV).  \n- Step 2: Subtleties like unit consistency (Q in coulombs, V in volts) make W = QV error-prone. Example: If t is in hours, IVt in watt-hours is intuitive, but QV would need Q in ampere-hours, complicating conversions.  \n\n[Phuc's trap: Avoid roundabout methods. Use the most direct formula.]", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "An electric kettle (240V, 3.0kW) operates on a 12.5A current. Why is a 13A fuse correct? (3 steps)", "answer": "- Step 1: Calculate operating current: I = P/V = 3000W / 240V = 12.5 A.  \n- Step 2: Fuses protect against excessive current. A 12.5A current is below the 13A fuse rating, so the fuse doesn't blow during normal operation.  \n- Step 3: Choose the next standard rating *above* operating current. 12.5A → 13A fuse (not 3A or 30A). Prevents nuisance tripping but allows overload protection.  \n\n[Key rule: Fuse rating > operating current. Never round down.]", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What is the power dissipated in a 47kΩ resistor with a 250mW maximum rating? Find the maximum safe current. (3 steps)", "answer": "- Step 1: Use P = I²R. Rearranged: I = √(P/R) = √(0.25W / 47000Ω) ≈ √(5.32×10⁻⁶) ≈ 2.3×10⁻³ A = 2.3 mA.  \n- Step 2: P = I²R is appropriate because the question focuses on heating effect due to current.  \n- Step 3: Exceeding 2.3mA would exceed the 250mW rating, risking overheating or resistor failure.  \n\n[Takeaway: Always check I²R for thermal limits. Don't confuse with P = V²/R, which would require voltage.]", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Contrast P = IV (general power) vs. P = I²R (heating effect). When is each most useful? (2 steps)", "answer": "- Step 1: P = IV applies to any device (e.g., motors, LEDs). It measures energy transfer rate, regardless of energy form (mechanical, light, heat).  \n- Step 2: P = I²R specifically calculates power lost as heat in a resistor. Most useful for analyzing inefficiencies in conductors, e.g., power lines or filament lamps.  \n\n[Difference: P = IV is universal; P = I²R isolates resistive heating.]", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "In a series resistor with 2.0A and 19.2Ω, why does doubling the current quadruple the power? (3 steps)", "answer": "- Step 1: P = I²R. Power depends on I squared.  \n- Step 2: If I doubles (2A → 4A), P increases by 2² = 4× (1.125W → 4.5W).  \n- Step 3: This scaling occurs because each electron's kinetic energy transfer (per collision) increases with velocity (I ∝ v_drift). More electrons and higher velocity → I² scaling.  \n\n[Edge case: If R changes (e.g., with temperature), P may not scale as I².]", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why is V = E/Q correct, but V = E/t incorrect? (2 steps)", "answer": "- Step 1: V = E/Q means voltage is energy per unit charge. If 1C moves 1J, V = 1J/1C = 1V. This matches energy conservation: electrons lose E = VQ.  \n- Step 2: V = E/t incorrectly defines voltage as energy per time. Time belongs in current (I = Q/t), not voltage. Confusing V = E/Q with E = IVt leads to errors in energy calculations.  \n\n[Phuc's correction: Voltage is energy per charge; time is for current.]", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "A 12V battery powers a 4Ω and 2Ω resistor in series. Show total power dissipated equals battery power. (4 steps)", "answer": "- Step 1: Total resistance: R_total = 4Ω + 2Ω = 6Ω.  \n- Step 2: Current: I = V_total / R_total = 12V / 6Ω = 2A.  \n- Step 3: Power in 4Ω: P = I²R = (2A)²×4Ω = 16W.  \n- Step 4: Power in 2Ω: P = (2A)²×2Ω = 8W. Total = 16+8=24W.  \n- Step 5: Battery power P = IV = 2A×12V = 24W. ✓ Conservation of energy confirmed.  \n\n[Takeaway: Total power dissipated equals battery's energy output.]", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "A 150Ω resistor has 12V across it. Calculate power using P = V²/R. Why is this method ideal here? (3 steps)", "answer": "- Step 1: P = (12V)² / 150Ω = 144 / 150 = 0.96 W.  \n- Step 2: P = V²/R is ideal when voltage is known and constant across the resistor.  \n- Step 3: Contrasts with P = I²R, which would require calculating I first (I = V/R = 0.08A → I²R = 0.96W). Both give same result, but V²/R is faster here.  \n\n[Key: Choose formula based on known quantities. V and R → V²/R.]", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "If a 5V kettle draws 5W, what current flows? Why is this important for fuse selection? (3 steps)", "answer": "- Step 1: I = P/V = 5W / 5V = 1A.  \n- Step 2: Fuses protect by melting when current exceeds rating. A 1A operating current requires a fuse slightly above this (e.g., 3A) to avoid nuisance tripping.  \n- Step 3: Choosing a fuse too low (1A) risks cutting off normal operation; too high (13A) risks fire hazards.  \n\n[Takeaway: I = P/V informs fuse rating choice.]", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why does a 40W filament lamp use more energy than a 4.5W LED over 5 hours? (3 steps)", "answer": "- Step 1: E = Pt. For lamp: 40W×5h = 200Wh. For LED: 4.5W×5h = 22.5Wh.  \n- Step 2: The lamp's higher power rating means more energy conversion.  \n- Step 3: Inefficient devices (like incandescent bulbs) waste energy as heat. LEDs convert more to light, reducing E.  \n\n[Takeaway: Higher power × same time = more energy. Efficiency matters.]", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "What happens to electrons in a resistor? Do they accumulate, slow down, or get lost? (3 steps)", "answer": "- Step 1: Electrons don't accumulate. Kirchhoff's First Law confirms current (charge/time) is conserved.  \n- Step 2: They slow down due to collisions with lattice ions, but aren't stored. Drift velocity decreases, but net charge flow remains constant.  \n- Step 3: Energy is dissipated as heat, not electrons. The resistor doesn't \"store\" electrons; it dissipates energy via collisions.  \n\n[Contrast: Capacitors store charge; resistors store energy as heat.]", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}], "count": 16}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Explain the microscopic mechanism of resistive heating in a conductor (3 steps)", "answer": "- Step 1: Free electrons drift through a metallic lattice under an applied voltage.  \n- Step 2: Electrons collide with positive ions in the lattice, transferring kinetic energy to the ions.  \n+ These collisions cause ions to vibrate more intensely (thermal energy increase).  \n- Step 3: Charge is conserved (Kirchhoff’s First Law), but energy is dissipated as heat via P = I²R.  \n+ This explains why resistive heating rate depends on current squared.  \n\n[Takeaway: Heating arises from electron-ion collisions, not charge accumulation.]", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Derive P = I²R from P = IV and Ohm’s Law (2 steps)", "answer": "- Step 1: Start with Ohm’s Law (V = IR) and substitute into P = IV:  \n  P = I × (IR).  \n- Step 2: Simplify to P = I²R.  \n+ This formula is specifically called the *heating-effect* formula because it directly relates power dissipation to resistive heating.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why is the rate of heat transfer proportional to I²R in a resistor? (2 steps)", "answer": "- Step 1: Microscopically, doubling current (I) doubles both the number of collisions and the kinetic energy transferred per collision (since KE ∝ v²).  \n- Step 2: Thus, power (energy/time) increases with I², multiplied by resistance R (how much energy is \"lost\" per unit charge).  \n+ This links the macroscopic P = I²R to the microscopic behavior of electrons.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "For a 150 Ω resistor with 12 V across it, which power formula should you use and why?", "answer": "- Step 1: Choose P = V²/R because voltage (V) and resistance (R) are directly given.  \n- Step 2: This avoids calculating current (I = V/R = 0.08 A) first, which would add unnecessary steps.  \n+ Formula: P = (12²)/150 = 0.96 W.  \n\n[Use when V and R are known.]", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Derive P = V²/R from P = IV and Ohm’s Law (2 steps)", "answer": "- Step 1: Use Ohm’s Law to express current as I = V/R.  \n- Step 2: Substitute into P = IV: P = (V/R) × V = V²/R.  \n+ This formula is useful when voltage and resistance are known but current is not.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why does doubling the current in a resistor quadruple the power dissipated? (2 steps)", "answer": "- Step 1: P = I²R shows power is proportional to current squared.  \n- Step 2: Doubling I (e.g., from 2A to 4A) gives (4A)² = 16A², which is 4× (2A)² = 4A².  \n+ This is because both the number of electrons and their average kinetic energy increase linearly with I.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Which power formula should you use if you know voltage and resistance but not current?", "answer": "- Step 1: Use P = V²/R because it explicitly relates power to voltage (V) and resistance (R).  \n+ Example: A 6Ω resistor with 1.5V across it: P = (1.5)² /6 = 0.375 W.  \n\n[This avoids calculating I = V/R = 0.25A first, saving steps.]", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why is the \"roundabout\" method of calculating electrical energy (Q = It then E = QV) discouraged? (2 steps)", "answer": "- Step 1: It requires two substitutions (Q and V) instead of one (P = IV then E = Pt).  \n+ Example: For 250 mA at 2.2V over 60s:  \n  *Roundabout*: Q = 0.25A × 60s = 15C; E = 15C × 2.2V = 33 J.  \n  *Direct*: E = 0.25A × 2.2V × 60s = 33 J.  \n- Step 2: Roundabout method increases risk of unit errors (e.g., mC vs C).", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "A kettle rated 240V, 3.0kW requires a 13A fuse. Why? (2 steps)", "answer": "- Step 1: Calculate operating current: I = P/V = 3000W /240V = 12.5A.  \n- Step 2: Choose the next standard fuse above 12.5A: 13A (not 5A or 30A).  \n+ Using I = V/P would give 240V/3000W = 0.08A (incorrect).", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why is P = IV considered the \"general\" power formula, while P = I²R and P = V²/R are context-dependent?", "answer": "- Step 1: P = IV applies to *any* device (ohmic or non-ohmic) because it defines power as energy per charge (V) × charge per time (I).  \n- Step 2: P = I²R and P = V²/R require Ohm’s Law (V = IR) to be true, which only applies to ohmic devices.  \n+ For non-ohmic components (e.g., diodes), P = IV remains valid but P = I²R and P = V²/R do not.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Why does a resistor’s temperature affect its heating effect (P = I²R)? (2 steps)", "answer": "- Step 1: At constant temperature, P = I²R holds because resistivity is constant.  \n- Step 2: If temperature increases (e.g., a filament lamp), R increases, altering the heating effect.  \n+ Example: A cold 10Ω filament with 0.25A dissipates 0.625W (I²R), but if R rises to 50Ω when hot, P = 3.125W.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "For a 12V car battery powering a 36W bulb, which formula gives the current? Why?", "answer": "- Step 1: Use I = P/V because P and V are known (directly given).  \n- Step 2: I = 36W /12V = 3.0A.  \n+ Alternative (I = V/R) fails unless R is known.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Why can’t you use P = I²R to calculate power in a non-ohmic component? (2 steps)", "answer": "- Step 1: Non-ohmic devices (e.g., diodes, filament lamps) have variable resistance, so R ≠ constant.  \n- Step 2: If R changes with V, P = I²R becomes unreliable without knowing R’s instantaneous value.  \n+ Efficiency calculations or energy transfer requires graphical methods or device-specific V-I curves.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "What is the efficiency of a 100W motor lifting 9.8N through 0.94m in 7.7s? (3 steps)", "answer": "- Step 1: Calculate useful output power: Pout = mgh/t = (9.8N × 0.94m)/7.7s ≈ 1.2W.  \n- Step 2: Input power is electrical: Pin = IV = 0.75A × 3.2V = 2.4W.  \n- Step 3: Efficiency η = (Pout/Pin) × 100% = (1.2W/2.4W) × 100% = 50%.  \n+ Misconception: Forgetting that 50% energy is lost as heat in the motor.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "Why is the \"twinkle twinkle little star\" mnemonic valid for resistive heating? (2 steps)", "answer": "- Step 1: \"Twinkle, twinkle, little star\" → P = I²R. The square of current is critical.  \n- Step 2: This emphasizes why doubling current quadruples heating (P ∝ I²), crucial for fuse ratings and energy-efficient appliances.  \n+ Contrast: P = V²/R uses voltage squared, but voltage isn’t directly proportional to heating if resistance changes.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}], "count": 15}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Derive the general electrical power equation $$P = IV$$ from the definitions of power, current, and potential difference. (4 steps)", "answer": "- Step 1: Power is defined as the rate of doing work (energy transfer): $$P = \\frac{\\Delta W}{\\Delta t}$$.\n- Step 2: Potential difference (p.d.) is defined as the energy transferred per unit charge: $$V = \\frac{\\Delta W}{\\Delta Q}$$.\n- Step 3: Current is defined as the rate of flow of charge: $$I = \\frac{\\Delta Q}{\\Delta t}$$.\n- Step 4: Combine them: $$\\Delta W = V \\Delta Q$$ and $$\\Delta Q = I \\Delta t$$. Substituting into the power equation gives $$P = \\frac{V \\Delta Q}{\\Delta t} = V \\cdot I$$.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Starting from $$P = IV$$, derive the formula $$P = I^2R$$ and explain why it is specifically known as the \"heating effect\" formula. (3 steps)", "answer": "- Step 1: Start with the general power equation $$P = IV$$.\n- Step 2: Apply Ohm's Law, which states $$V = IR$$ (for ohmic conductors/resistors).\n- Step 3: Substitute $$V = IR$$ into $$P = IV$$ to get $$P = I \\times (IR) = I^2R$$.\n- Step 4: This form is called the heating effect because it mathematically describes the rate at which electrical energy is dissipated as thermal energy (heat) in a resistor due to its resistance.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Starting from $$P = IV$$, derive the formula $$P = \\frac{V^2}{R}$$. (3 steps)", "answer": "- Step 1: Start with the general power equation $$P = IV$$.\n- Step 2: Rearrange Ohm's Law to express current in terms of voltage and resistance: $$I = \\frac{V}{R}$$.\n- Step 3: Substitute $$I = \\frac{V}{R}$$ into $$P = IV$$:\n$$P = \\frac{V}{R} \\times V = \\frac{V^2}{R}$$.\n- Step 4: This formula is useful when you know the voltage across a component and its resistance.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A resistor has 2 A flowing through it with a resistance of 5 $$\\Omega$$. Another resistor has 10 V across it with a resistance of 2 $$\\Omega$$. Calculate the power in both cases. Which formula did you use and why? (3 steps)", "answer": "- Step 1: For the first resistor (I = 2 A, R = 5 $$\\Omega$$): Use $$P = I^2R$$.\n$$P = (2)^2 \\times 5 = 20 \\text{ W}$$.\n- Step 2: For the second resistor (V = 10 V, R = 2 $$\\Omega$$): Use $$P = \\frac{V^2}{R}$$.\n$$P = \\frac{(10)^2}{2} = 50 \\text{ W}$$.\n- Step 3: The choice of formula depends on the given quantities: Use $$P = I^2R$$ when I and R are given; use $$P = V^2/R$$ when V and R are given. Use $$P = IV$$ only when both I and V are given directly.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "If the current through a fixed resistor is doubled, what happens to the power dissipated? What if the voltage across a fixed resistor is doubled instead? (2 steps)", "answer": "- Step 1: Since $$P = I^2R$$, if current (I) doubles, power becomes $$(2I)^2R = 4I^2R$$. The power quadruples.\n- Step 2: Since $$P = V^2/R$$, if voltage (V) doubles, power becomes $$(2V)^2/R = 4V^2/R$$. The power quadruples.\n- Step 3: Key insight: Both current and voltage appear squared in power formulas, so doubling either results in a four-fold increase in power dissipation.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A lamp operates at 6.0 V and draws a current of 0.50 A. Calculate (a) the power of the lamp and (b) the electrical energy converted in 3.0 minutes. (3 steps)", "answer": "- Step 1: (a) Use $$P = IV$$ directly: $$P = 0.50 \\times 6.0 = 3.0 \\text{ W}$$.\n- Step 2: (b) Convert time to seconds: $$t = 3.0 \\text{ min} = 180 \\text{ s}$$.\n- Step 3: Use the direct energy formula $$W = Pt$$: $$W = 3.0 \\times 180 = 540 \\text{ J}$$.\n- Step 4: Do not use the \"roundabout\" route (finding Q then E=QV) unless charge is explicitly given in the question.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A charge of 50 C passes through a resistor with a potential difference of 10 V across it. How much energy is dissipated? (1 step)", "answer": "- Step 1: Since the problem explicitly gives the charge (Q), use the energy equation derived from the definition of p.d.: $$E = QV$$.\n- Step 2: $$E = 50 \\times 10 = 500 \\text{ J}$$.\n- Step 3: Note that this gives the same answer as $$W = IVt$$ would, but uses the charge route as requested by the specific quantities given.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "An electric kettle is rated 240 V, 2.0 kW. (a) Calculate the normal operating current. (b) Which standard fuse should be fitted: 3 A, 5 A, or 13 A? (2 steps)", "answer": "- Step 1: (a) Use the power equation rearranged for current: $$I = \\frac{P}{V}$$. $$I = \\frac{2000}{240} = 8.33 \\text{ A}$$.\n- Step 2: (b) The fuse must be rated *higher* than the operating current to allow normal operation but blow in a fault.\n- Step 3: 3 A and 5 A are too low (kettle would blow them immediately). 13 A is the correct choice.\n- Step 4: Common error: Using $$I = V/P$$ (which gives 0.12 A) or choosing the lower rating.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Define efficiency for an electrical device and calculate it for a motor that takes in 50 W of electrical power but delivers 35 W of useful mechanical power. (2 steps)", "answer": "- Step 1: Efficiency ($$\\eta$$) is defined as the ratio of useful power output to total power input, usually expressed as a percentage: $$\\eta = \\frac{P_{\\text{useful}}}{P_{\\text{total}}} \\times 100\\%$$.\n- Step 2: $$\\eta = \\frac{35}{50} \\times 100\\% = 70\\%$$.\n- Step 3: The remaining 15 W (30%) is dissipated as heat due to friction and electrical resistance.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A student writes $$R = I \\times V$$ for Ohm's Law. Explain why this is wrong and state the correct relationship. (1 step)", "answer": "- Step 1: This is incorrect. Resistance is defined as voltage divided by current, not multiplied.\n- Step 2: The correct relationship is $$R = \\frac{V}{I}$$.\n- Step 3: Check the units: $$\\Omega = \\frac{V}{A}$$. If you multiply $$A \\times V$$, you get Watts (power), not Ohms.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "A student recalls potential difference as $$V = \\frac{E}{t}$$ (energy divided by time). Explain why this is wrong. (1 step)", "answer": "- Step 1: This formula is actually the equation for Power ($$P = E/t$$), not potential difference.\n- Step 2: Potential difference is the energy transferred *per unit charge*. The correct definition is $$V = \\frac{E}{Q}$$.\n- Step 3: Time ($$t$$) belongs in the current equation: $$I = \\frac{Q}{t}$$.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In a series circuit with two resistors, which resistor dissipates more power? In a parallel circuit with two resistors, which dissipates more? Explain. (3 steps)", "answer": "- Step 1: In **series**, the current (I) is the same through both resistors. Using $$P = I^2R$$, the power is proportional to resistance. The **larger resistance** dissipates more power.\n- Step 2: In **parallel**, the voltage (V) is the same across both resistors. Using $$P = V^2/R$$, power is inversely proportional to resistance. The **smaller resistance** dissipates more power.\n- Step 3: This is why connecting many low-resistance loads in parallel draws a huge current from the supply.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Explain why filament lamps often blow (fail) the moment they are switched on, rather than while they are running steadily. (2 steps)", "answer": "- Step 1: At room temperature (cold), the resistance of the tungsten filament is relatively low.\n- Step 2: When switched on, the initial current is very high ($$I = V/R_{\\text{cold}}$$), causing a massive power surge ($$P = V^2/R$$).\n- Step 3: This thermal shock from the sudden heating can crack the fragile tungsten filament. Once hot, resistance increases and current decreases to the operating level.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "State two differences between the general power formula $$P = IV$$ and the heating-effect formula $$P = I^2R$$. (2 steps)", "answer": "- Step 1: **Scope**: $$P = IV$$ is the general definition of electrical power and applies to any component (batteries, motors, LEDs). $$P = I^2R$$ specifically describes power dissipated as heat in a resistor.\n- Step 2: **Dependence**: $$P = IV$$ depends on the voltage across the *entire* component. $$P = I^2R$$ isolates the power lost due to resistance within the component.\n- Step 3: **Use case**: Use $$P = I^2R$$ when calculating internal heating or when only current and resistance are known.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "A device is connected to a 12 V battery. If the resistance of the device is doubled, how does the power consumption change? (1 step)", "answer": "- Step 1: Since the device is connected to a *constant voltage source* (the battery), we use $$P = V^2/R$$.\n- Step 2: If resistance (R) doubles, the denominator doubles, so power is halved.\n- Step 3: Key distinction: If it were a *constant current* source, power would double (because $$P = I^2R$$).", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Explain the term \"dissipated\" in the context of power in a resistor. (1 step)", "answer": "- Step 1: To \"dissipate\" means to scatter or spread out energy.\n- Step 2: In a resistor, the electrical energy from the battery is \"dissipated\" as thermal energy (heat) that spreads into the surroundings.\n- Step 3: This energy is not lost (conservation of energy holds), but it is converted from useful electrical energy into non-useful thermal energy.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Why don't electrons \"pile up\" inside a resistor? (1 step)", "answer": "- Step 1: This relates to Kirchhoff's First Law (Conservation of Charge).\n- Step 2: The rate of charge flow entering the resistor must equal the rate leaving it ($$I_{\\text{in}} = I_{\\text{out}}$$).\n- Step 3: Electrons are slowed down (their kinetic energy is transferred to heat), but they continue moving through. They are not stored inside the resistor.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A 60 W filament lamp and a 4 W LED lamp both produce similar amounts of light. Why is the LED considered more efficient? (1 step)", "answer": "- Step 1: Efficiency is the ratio of useful output to total input.\n- Step 2: Both lamps convert electrical energy into light (useful) and heat (waste).\n- Step 3: The 60 W filament lamp produces mostly heat (very inefficient). The 4 W LED produces the same light output for much less power input, meaning a much higher percentage of input power is converted to useful light.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A hair dryer is rated 230 V, 2000 W. It is used in a country where the mains voltage is 110 V. Will it work correctly? What happens to the power output? (2 steps)", "answer": "- Step 1: No, it will not work correctly.\n- Step 2: The dryer is designed for 230 V. If plugged into 110 V (assuming the heating element resistance stays roughly constant), using $$P = V^2/R$$:\n$$P_{\\text{new}} = \\frac{(110)^2}{(230)^2} \\times 2000 \\approx \\frac{1}{4} \\times 2000 \\approx 500 \\text{ W}$$.\n- Step 3: The power output drops to about 1/4 of the rated value, so it will produce hardly any hot air. (In reality, the fan motor would also run slowly).", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}], "count": 19}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Starting from P = IV and Ohm's Law (V = IR), derive the alternative power equations P = I²R and P = V²/R. Explain when each formula is most useful. (2 steps)", "answer": "- Step 1: To get P = I²R, substitute V = IR into P = IV: $$P = I \\times (IR) = I^2R$$ Use this when you know the current I and resistance R.\n- Step 2: To get P = V²/R, substitute I = V/R into P = IV: $$P = \\frac{V}{R} \\times V = \\frac{V^2}{R}$$ Use this when you know the voltage V and resistance R.\n\n+ P = IV is the general formula — use when both I and V are given directly.\n+ P = I²R is specifically called the \"heating effect\" formula — use when you have current and resistance.\n+ P = V²/R — use when you have voltage and resistance.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Describe the microscopic origin of resistance heating in a metallic conductor. Why does the current entering a resistor equal the current leaving it? (3 steps)", "answer": "- Step 1: When current flows through a metallic conductor, electrons drift through a lattice of positive ions.\n- Step 2: As electrons move, they collide with the lattice ions, transferring kinetic energy to them. The ions vibrate with greater amplitude — increased ionic vibration is heat at the atomic level.\n+ The electrons are slowed down by these collisions (this is resistance), but they are not stored or destroyed.\n- Step 3: Charge is conserved (Kirchhoff's First Law). The number of electrons entering the resistor per second equals the number leaving per second — only their speed (drift velocity) changes. The rate of heat transfer equals I²R at constant temperature.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A 2.0 Ω resistor carries 0.75 A. Calculate the power dissipated using the most appropriate formula, and verify your answer using a different power formula. (2 steps)", "answer": "- Step 1: Given I = 0.75 A and R = 2.0 Ω, use P = I²R: $$P = (0.75)^2 \\times 2.0 = 0.5625 \\times 2.0 = 1.125 \\text{ W} \\approx 1.1 \\text{ W}$$\n- Step 2: Verify using P = IV. First find the voltage across the resistor: V = IR = 0.75 × 2.0 = 1.5 V. Then P = IV = 0.75 × 1.5 = 1.125 W ✓\n\nBoth methods give the same answer, confirming the calculation is correct.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "A lamp operates at 6.0 V and draws 0.50 A. Calculate (a) the power of the lamp, and (b) the energy converted in 3.0 minutes. (2 steps)", "answer": "- Step 1: (a) Power using P = IV: $$P = 0.50 \\times 6.0 = 3.0 \\text{ W}$$\n- Step 2: (b) Energy in 3.0 minutes = 180 seconds. Use W = Pt directly: $$W = 3.0 \\times 180 = 540 \\text{ J}$$\n\n+ Note: Do NOT use the roundabout method (Q = It, then E = QV) unless charge Q is explicitly given. The direct method W = Pt is one step and has fewer chances for unit errors.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Explain what happens to the current through a resistor when the voltage is doubled, and explain what happens to the power dissipated. Use the concept of proportionality.", "answer": "From Ohm's Law, V = IR, so for a fixed resistance R:\n- Current: I ∝ V. If voltage doubles, current doubles.\n- Power: Using P = V²/R, P ∝ V². If voltage doubles, power increases by a factor of 2² = 4.\n\n+ Similarly, using P = I²R, if current doubles (at constant R), power quadruples.\n+ This is why small increases in voltage or current can cause large increases in power dissipation — important for understanding fuse selection and component ratings.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "An electric kettle is rated 240 V, 3.0 kW. (a) Calculate the operating current. (b) Show that a 13 A fuse is appropriate. (2 steps)", "answer": "- Step 1: (a) Use I = P/V (not V/P — a common slip): $$I = \\frac{3000}{240} = 12.5 \\text{ A}$$\n- Step 2: (b) The calculated current is 12.5 A. Since 12.5 A < 13 A, the kettle operates safely with a 13 A fuse — it will only blow if current exceeds 13 A. A 3 A fuse would blow immediately, and a 30 A fuse would offer no protection.\n\n+ Fuse selection rule: calculate I = P/V, then choose the next standard rating above that value.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "A 150 Ω resistor has 12 V across it. Calculate the power dissipated, stating which formula you choose and explaining why. (1 step)", "answer": "Given V = 12 V and R = 150 Ω, use P = V²/R because we know voltage and resistance:\n$$P = \\frac{12^2}{150} = \\frac{144}{150} = 0.96 \\text{ W}$$\n\n+ We could alternatively find current (I = V/R = 0.08 A) and use P = I²R, but P = V²/R is more direct — no intermediate calculation needed.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Define efficiency for an electrical device and write the formula. Why is efficiency always less than 100% for real devices?", "answer": "Efficiency (η) is the fraction of input power that is converted to useful output power:\n$$\\eta = \\frac{P_{\\text/useful}}{P_{\\text/total}} \\times 100\\%$$\n\n+ Real devices always have some energy dissipated as heat due to resistance in wires and components. Even efficient devices like LEDs produce some heat. The input power equals useful power plus power lost as heat, so useful < total, giving η < 100%.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A 2000 W hair-dryer operates at 230 V. (a) Calculate the operating current. (b) Should a 5 A or 13 A fuse be fitted? (2 steps)", "answer": "- Step 1: (a) I = P/V = 2000/230 = 8.7 A\n- Step 2: (b) 8.7 A > 5 A, so a 5 A fuse would blow during normal operation. The correct choice is a 13 A fuse (the next standard rating above 8.7 A).\n\n+ Standard UK fuse ratings are 3 A, 5 A, and 13 A. Always round up to the next standard rating.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "A 5 Ω and a 3 Ω resistor are connected in series to a 16 V supply. The total current is 2.0 A. Calculate the power dissipated in each resistor using the most direct formula. (2 steps)", "answer": "- Step 1: In series, current is the same through both resistors (I = 2.0 A everywhere). Use P = I²R directly:\n$$P_{5\\Omega} = (2.0)^2 \\times 5 = 4 \\times 5 = 20 \\text{ W}$$\n$$P_{3\\Omega} = (2.0)^2 \\times 3 = 4 \\times 3 = 12 \\text{ W}$$\n- Step 2: Verify: Total power = 20 + 12 = 32 W. Power supplied by battery = VI = 16 × 2.0 = 32 W ✓\n\n+ We used I²R because current was given and is the same for both resistors — no need to find voltage first.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "An appliance converts 500 J of electrical energy into 350 J of useful work in 10 s. Calculate (a) the input power and (b) the efficiency. (2 steps)", "answer": "- Step 1: (a) Input power = energy input ÷ time: $$P_{\\text/in} = \\frac{500}{10} = 50 \\text{ W}$$\n- Step 2: (b) Useful power = useful energy ÷ time = 350/10 = 35 W. Efficiency: $$\\eta = \\frac{35}{50} \\times 100\\% = 70\\%$$\n\n+ The remaining 30% (150 J) is dissipated as heat due to resistance in the circuit.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Explain the difference between P = I²R and P = IV. Which one specifically relates to the heating effect, and why?", "answer": "- P = IV is the general power equation — it applies to any electrical component and represents total power transferred.\n- P = I²R specifically describes power dissipated as thermal energy in a resistor due to the heating effect.\n\n+ P = I²R is called the \"heating effect formula\" because it gives the rate at which electrical energy is converted to heat in a resistive element. It applies specifically to resistors where electrical energy is dissipated as thermal energy.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Why does a filament lamp draw a much higher current at the instant it's switched on compared to its operating current? Use the concept of resistance and temperature.", "answer": "At room temperature (switch-on), the filament's resistance is low (e.g., 80 Ω for a 240 V, 60 W lamp). Using I = V/R:\n$$I_{\\text/start} = \\frac{240}{80} = 3.0 \\text{ A}$$\n\nAt operating temperature (~2400°C), resistance increases dramatically (to ~960 Ω):\n$$I_{\\text/operating} = \\frac{240}{960} = 0.25 \\text{ A}$$\n\n+ This \"current surge\" at switch-on explains why lamp filaments heat up so quickly — the initial high power (720 W vs 60 W) rapidly raises the temperature.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": true}, {"question": "A resistor has maximum safe power 250 mW and resistance 47 kΩ. Find the maximum safe current. (2 steps)", "answer": "- Step 1: Given P = 250 mW = 250 × 10⁻³ W and R = 47 × 10³ Ω, use P = I²R rearranged: $$I^2 = \\frac{P}{R} = \\frac{250 \\times 10^{-3}}{47 \\times 10^3} = \\frac{0.25}{47000} \\approx 5.32 \\times 10^{-6}$$\n- Step 2: $$I = \\sqrt{5.32 \\times 10^{-6}} = 2.3 \\times 10^{-3} \\text{ A} = 2.3 \\text{ mA}$$\n\n+ Common trap: Remember milli (m) = 10⁻³, not 10⁻⁶. 250 mW = 250 × 10⁻³ W, not 250 × 10⁻⁶ W.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Explain why electrical energy can be calculated using W = Pt, but the formula E = QV is used only in specific situations. When is each appropriate?", "answer": "- W = Pt is the direct method: when power and time are given, multiply them directly. This is the first-choice method.\n- E = QV (or W = QV) applies when charge Q is explicitly given in the problem. This comes from the definition V = W/Q.\n\n+ Example: If a problem gives \"current 0.25 A for 60 seconds,\" find charge first (Q = It = 15 C), then energy (E = QV). But if it gives \"power 3 W for 180 seconds,\" use W = Pt directly.\n\n+ The roundabout method (Q = It, then E = QV) gives the same answer but uses two steps and has twice the chance for unit errors.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Two identical resistors are connected in series to a battery. If one resistor is removed and the remaining resistor is connected directly to the same battery, what happens to the power dissipated? Explain using proportionality.", "answer": "- In series: Total resistance = 2R. Current I = V/(2R).\n- Power in one resistor: P_series = I²R = (V/(2R))² × R = V²/(4R)\n\n+ Single resistor: Resistance = R. Current I = V/R.\n- Power: P_single = V²/R\n\n+ Ratio: P_single / P_series = (V²/R) / (V²/(4R)) = 4\n\nConnecting a single resistor to the same voltage dissipates 4 times the power. This is because P ∝ 1/R at constant voltage — halving the resistance doubles the power.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A circuit has a 12 V supply driving a 2.8 Ω resistor in series with a parallel combination. The parallel section has 6.0 V across it. The total current is 2.14 A, with 1.5 A through the 4.0 Ω branch. Find the unknown resistance Rx and the power in each component. (3 steps)", "answer": "- Step 1: Find Rx: Voltage across Rx = parallel voltage = 6.0 V. Current through Rx = IT - I_4Ω = 2.14 - 1.5 = 0.64 A. So Rx = V/I = 6.0/0.64 = 9.4 Ω\n- Step 2: Choose power formula by available quantities:\n  - P_2.8Ω = I²R = (2.14)² × 2.8 ≈ 12.8 W (using I and R)\n  - P_4Ω = VI = 6.0 × 1.5 = 9.0 W (using V and I)\n  - P_Rx = V²/R = 36/9.4 ≈ 3.8 W (using V and R)\n- Step 3: Total power = 12.8 + 9.0 + 3.8 = 25.6 W. Check: P_battery = V × IT = 12 × 2.14 = 25.7 W ✓", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "A device is rated 240 V, 1.8 kW. Calculate (a) the current in the heating element, (b) the charge passing through in 20 minutes, and (c) the thermal energy produced. (3 steps)", "answer": "- Step 1: (a) I = P/V = 1800/240 = 7.5 A\n- Step 2: (b) Time = 20 min = 1200 s. Charge Q = It = 7.5 × 1200 = 9000 C\n- Step 3: (c) Energy W = Pt = 1800 × 1200 = 2.16 × 10⁶ J or W = IVt = 7.5 × 240 × 1200 = 2.16 × 10⁶ J\n\n+ Note: For part (c), use W = Pt directly — don't go through Q = It first unless specifically asked.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A laptop charger is rated 19.5 V, 2.3 A. A smartphone charger is rated 5 V, 1.0 A. (a) What is the power of each charger? (b) If both operate for 3 hours, how much more energy does the laptop charger transfer? (2 steps)", "answer": "- Step 1: (a) P_laptop = IV = 2.3 × 19.5 = 44.85 W ≈ 45 W. P_phone = 1.0 × 5 = 5 W\n- Step 2: (b) Time = 3 hours = 10800 s. E_laptop = Pt = 44.85 × 10800 ≈ 484,000 J. E_phone = 5 × 10800 = 54,000 J. Difference ≈ 430,000 J\n\n+ The laptop charger transfers about 9 times more energy because its power rating is 9 times higher.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A battery supplies 0.75 A to a circuit with total resistance 4 Ω connected to a 3 V battery. Calculate (a) the total power dissipated and (b) verify using battery voltage × current. (1 step)", "answer": "- Step 1: (a) Using P = I²R for total power: P = (0.75)² × 4 = 0.5625 × 4 = 2.25 W\n- Alternative: P = IV = 0.75 × 3 = 2.25 W ✓\n\n+ Both methods agree. Note that P = I²R_total uses the total circuit resistance (4 Ω), not individual components.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A filament lamp is marked 240 V, 60 W. Calculate (a) the current when operating normally, and (b) the resistance of the filament at operating temperature. (2 steps)", "answer": "- Step 1: (a) Using P = IV: I = P/V = 60/240 = 0.25 A\n- Step 2: (b) Using Ohm's Law: R = V/I = 240/0.25 = 960 Ω\n\n+ At room temperature (just after switch-off), the filament resistance would be much lower (typically ~80 Ω). The high operating resistance is due to the filament being at high temperature.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Explain what happens to electrons when they pass through a resistor. Do they get \"used up\" or stored? How does this relate to Kirchhoff's First Law?", "answer": "- Electrons are not used up, destroyed, or stored inside a resistor.\n- They drift through the lattice, but collisions with ions slow them down (this is resistance).\n- The rate of electron flow (current) entering the resistor equals the rate leaving — charge is conserved.\n\n+ Kirchhoff's First Law states that charge is conserved at any junction: ΣI_in = ΣI_out. In a simple series circuit, this means current is the same everywhere because electrons flow continuously — they don't accumulate anywhere.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A kettle has resistance 19.2 Ω and operates at 240 V. What is its power rating? Verify using two different power formulas. (2 steps)", "answer": "- Step 1: Using P = V²/R: $$P = \\frac{240^2}{19.2} = \\frac{57600}{19.2} = 3000 \\text{ W} = 3.0 \\text{ kW}$$\n- Step 2: Verify: Current I = V/R = 240/19.2 = 12.5 A. Using P = IV: P = 12.5 × 240 = 3000 W ✓\n\n+ This is a typical domestic kettle rating (3 kW at 240 V).", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Why is it important to choose the correct power formula for the given quantities? What errors could occur from using the wrong one?", "answer": "- Using the correct formula avoids unnecessary intermediate calculations and reduces error opportunities.\n- Example error: Trying to use P = V²/R when only I and R are given requires first calculating V = IR, then substituting — two steps instead of one.\n- More importantly, forcing a formula can lead to unit confusion: mixing up what quantities you have (e.g., using voltage values where current should go).\n\n+ The exam tip: Identify what quantities are given in the question, then select the matching formula from P = IV, P = I²R, or P = V²/R.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A motor lifts a 600 g mass through 0.94 m in 7.7 s. The motor operates at 3.2 V and 0.75 A. Calculate (a) the useful output power, (b) the input power, and (c) the efficiency. (3 steps)", "answer": "- Step 1: (a) Useful work = mgh = 0.6 × 9.8 × 0.94 ≈ 5.5 J. Useful power = 5.5/7.7 ≈ 0.72 W\n- Step 2: (b) Input power = IV = 0.75 × 3.2 = 2.4 W\n- Step 3: (c) Efficiency = (0.72/2.4) × 100% ≈ 30%\n\n+ About 70% of the electrical energy is wasted as heat in the motor's windings (resistance).", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Explain why power transmission lines use very high voltages. How does this relate to P = I²R losses?", "answer": "- Power transmitted P = IV is fixed by demand. To minimize power losses (dissipated as heat in the transmission lines), we want to minimize current I.\n- Since P = IV, for fixed power, if we double the voltage, the current halves.\n- The power lost in the lines is P_loss = I²R — so halving the current reduces losses by a factor of 4.\n\n+ This is why national grids transmit at hundreds of kilovolts, then use transformers to step down to safe household voltages.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": true}, {"question": "A device has efficiency 85%. If it draws 50 W of electrical power, how much useful power does it produce and how much is wasted as heat?", "answer": "- Useful power = efficiency × input power = 0.85 × 50 W = 42.5 W\n- Wasted power = 50 - 42.5 = 7.5 W (or equivalently, 15% of input)\n\n+ This wasted power is dissipated as heat due to resistance in the device's components and connecting wires.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "In a parallel circuit with a 6 Ω and 3 Ω resistor connected to a 3 V battery, calculate the power in each resistor using the most direct formula. Verify using Kirchhoff's laws. (2 steps)", "answer": "- Step 1: In parallel, voltage is the same across both resistors (3 V). Use P = V²/R:\n$$P_{6\\Omega} = \\frac{3^2}{6} = \\frac{9}{6} = 1.5 \\text{ W}$$\n$$P_{3\\Omega} = \\frac{3^2}{3} = \\frac{9}{3} = 3.0 \\text{ W}$$\n\n- Step 2: Verify: Current through 6Ω = V/R = 3/6 = 0.5 A. Current through 3Ω = 3/3 = 1.0 A. Total current = 1.5 A = IT (from IT = VT/RT = 3/2 = 1.5 A). Total power = 1.5 + 3.0 = 4.5 W = battery power (3 × 1.5) ✓", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A circuits problem gives you current I and voltage V, but you need to find power dissipated. Which formula should you use? What if you were given current I and resistance R instead?", "answer": "- Given I and V → Use P = IV directly (most direct)\n- Given I and R → Use P = I²R (avoid finding V first)\n- Given V and R → Use P = V²/R (avoid finding I first)\n\n+ The key is matching the formula to what you're given — this minimizes steps and reduces error opportunities.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "What is the difference between \"dissipated\" and \"stored\" energy in the context of electrical circuits?", "answer": "- \"Dissipated\" means energy that is transferred out of the electrical form into another form (typically heat) and cannot be recovered. Power dissipated in a resistor is \"lost\" from the electrical circuit's perspective.\n- \"Stored\" energy would be in a component like a capacitor (electric field) or inductor (magnetic field) — this energy can be recovered.\n\n+ When we say \"power is dissipated in a resistor,\" we mean it's converted to thermal energy (heat) and散 (scattered) into the surroundings.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "A 240 V appliance has a 13 A fuse fitted. What is the maximum power the appliance can safely consume? What happens if it tries to draw more power?", "answer": "- Maximum safe power = IV = 13 × 240 = 3120 W = 3.12 kW\n- If the appliance tries to draw more than this (exceeding 13 A), the fuse wire heats up and melts, breaking the circuit and cutting off power to prevent fire or damage.\n\n+ This is why fuses are safety devices — they protect appliances and prevent electrical fires by limiting current.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "When deriving the formula for total resistance in parallel (1/RT = 1/R1 + 1/R2), why do we start with the current equation rather than the voltage equation?", "answer": "- In parallel circuits, current splits (adds up) at junctions: IT = I1 + I2. Voltage is the same across parallel branches.\n- The derivation must start with the quantity that is conserved/summed in that configuration:\n  + Series: start with voltage (V_T = V1 + V2) because voltage adds\n  + Parallel: start with current (I_T = I1 + I2) because current adds\n- Starting with the wrong quantity leads to an unworkable derivation.\n\n+ This is a key exam technique: knowing which Kirchhoff law to apply based on circuit topology.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": true}, {"question": "A student calculates power as P = IV but gets the wrong answer. They then calculate P = I²R and get a different answer. What could have gone wrong, and how can they check their work?", "answer": "- Possible errors:\n  1. Using the wrong values for I, V, or R (e.g., mixing up branch values with total values)\n  2. Using the current/voltage from one component in a formula meant for another\n  3. Incorrect unit conversions (milli vs micro prefixes)\n  4. Algebraic rearrangement errors\n- Check: All power formulas must give the same answer for the same circuit. If they don't, something is wrong with the values used.\n- Also verify by calculating total power supplied by battery (P = Vbattery × Ibattery) — this must equal sum of all individual power dissipations.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Why do LED lights have much higher efficiency than filament lamps? Use the concept of power dissipation and useful output.", "answer": "- Filament lamps: Only ~10% of electrical energy becomes visible light; ~90% is dissipated as infrared heat. A 60 W filament lamp produces only ~6 W of light.\n- LED lamps: Can produce the same light output (600 lumens) using only ~6-8 W. Efficiency = useful power output (light) / electrical input can exceed 80%.\n\n+ The heating effect (I²R) still occurs in LEDs but is much reduced because the total power input is much lower for the same light output. The remaining energy is also converted to heat, but much less than filament bulbs.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}], "count": 34}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "At the microscopic level, what physical process inside a metallic conductor is responsible for \"resistance heating,\" and what exactly does \"heat\" mean in this picture? (3 steps)", "answer": "- Step 1: When a current flows, free electrons drift through a stationary lattice of positive metal ions. The electrons aren't moving through empty space — they continually bump into the vibrating lattice ions on their way.\n- Step 2: Each collision transfers some of the electron's kinetic energy to the ion. The ion responds by vibrating with a larger amplitude about its equilibrium position.\n+ Electrons are slowed by the collision but are **not** stored or destroyed — charge in = charge out (Kirchhoff's 1st Law).\n+ The energy lost by electrons doesn't disappear; it becomes vibrational energy of the lattice.\n- Step 3: \"Heat\" at the atomic level **is** that increased random vibration of the ions. So saying \"the resistor heats up\" is literally saying \"the ions vibrate more vigorously.\"\n\nTakeaway: resistive heating = kinetic-energy transfer from drifting electrons to lattice ions via collisions; greater ionic vibration = thermal energy.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Why is it specifically $$P = I^2R$$ that's labelled the \"heating effect\" formula, even though $$P = IV$$ and $$P = V^2/R$$ give the same power numerically?", "answer": "- Step 1: All three formulas yield identical power for a given resistor — they are algebraic rearrangements via Ohm's Law. So numerically, no preference exists.\n- Step 2: But $$P = I^2R$$ explicitly ties power to (a) the current of charges flowing and (b) the resistance — the very quantities that govern *how many collisions per second* occur between electrons and ions.\n+ More current → more electrons per second crashing into ions.\n+ More resistance → more collisions per electron per metre travelled.\n- Step 3: So $$P = I^2R$$ is the version that mirrors the *microscopic mechanism* of heating: it's the formula whose variables most directly correspond to what's physically generating the thermal energy.\n\nTakeaway: it's a conceptual label, not a numerical one — \"heating effect\" emphasizes the causal link to collisions.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "Starting from only the three fundamental definitions of power, current, and potential difference, derive $$P = IV$$. (3 steps)", "answer": "- Step 1: Write the three definitions: $$P = W/t$$ (power = work done per time), $$I = Q/t$$ (current = charge per time), $$V = W/Q$$ (p.d. = work done per unit charge).\n- Step 2: Rearrange the p.d. definition to express work: $$W = QV$$. This says \"the energy delivered to a charge $$Q$$ through a potential difference $$V$$.\"\n- Step 3: Divide both sides by time: $$W/t = (Q/t) \\cdot V$$. Recognise that the left-hand side is $$P$$ and $$Q/t$$ is $$I$$, giving $$P = IV$$.\n\nTakeaway: $$P = IV$$ is not a new physical law — it's the algebraic consequence of \"energy per charge × charges per second = energy per second.\"", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Derive $$P = I^2R$$ from $$P = IV$$ using Ohm's Law, and explain in one line when to reach for it. (2 steps)", "answer": "- Step 1: Ohm's Law gives $$V = IR$$. Substitute into $$P = IV$$: $$P = I \\cdot (IR) = I^2R$$.\n- Step 2: Use this whenever the question hands you **current and resistance** directly — you avoid the extra step of first computing $$V$$.\n\nTakeaway: choose the formula whose variables you already have; don't pre-compute something only to feed it into a different formula.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Derive $$P = V^2/R$$ from $$P = IV$$, and state when this version is the natural choice. (2 steps)", "answer": "- Step 1: From Ohm's Law: $$I = V/R$$. Substitute into $$P = IV$$: $$P = (V/R) \\cdot V = V^2/R$$.\n- Step 2: Use this when you know **voltage and resistance** — typical for parallel branches (where every branch shares the supply p.d.) or for components rated by voltage like a kettle.\n\nTakeaway: $$V^2/R$$ is the \"parallel branch / rated-voltage\" formula.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "A resistor's current is doubled while its resistance stays fixed. By what factor does the power dissipated change, and *why* does the answer differ from \"doubled\"?", "answer": "- Step 1: With $$R$$ fixed, the relevant formula is $$P = I^2R$$ — power is quadratic in current.\n- Step 2: Doubling $$I$$ gives $$P_{new} = (2I)^2 R = 4I^2R$$, i.e. **four times** the original power.\n- Step 3: Intuitively, two things scale up simultaneously when current doubles: (a) twice as many electrons per second collide with ions, AND (b) each electron must be driven by twice the p.d. (since $$V = IR$$ and $$R$$ is fixed). Both effects multiply ⇒ ×4.\n\nTakeaway: whenever a quantity appears squared in a formula, scaling reasoning gives quadratic — not linear — results.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "For a fixed voltage source, if you double the resistance of a load, what happens to the power dissipated in it — and why is this the opposite of the \"fixed current\" case? (3 steps)", "answer": "- Step 1: With $$V$$ fixed, the relevant formula is $$P = V^2/R$$. Power is **inversely** proportional to $$R$$.\n- Step 2: Doubling $$R$$ ⇒ power **halves**.\n- Step 3: The opposite happens at fixed current: $$P = I^2R$$ with $$I$$ fixed gives $$P \\propto R$$, so doubling $$R$$ **doubles** power.\n+ Physical reason: at fixed $$V$$, raising $$R$$ chokes off the current → fewer collisions per second.\n+ At fixed $$I$$, raising $$R$$ means each electron experiences more resistance → more energy dissipated per electron.\n\nTakeaway: whether more resistance means more or less heating depends entirely on what's being held constant — voltage or current.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "A student writes \"$$R = IV$$\" in their working. What's wrong, and what's a quick units-check that exposes the error?", "answer": "- Step 1: Ohm's Law is $$R = V/I$$ — resistance is voltage *divided by* current, never multiplied.\n- Step 2: Units check: the ohm is defined as $$\\Omega = \\text{V/A}$$, i.e., volts per ampere. So $$R$$ must have $$V$$ on top, $$I$$ on the bottom. $$IV$$ would give units of $$A \\cdot V = W$$ — that's power, not resistance.\n- Step 3: A useful sanity rule: if you ever write \"$$R = IV$$\", you've actually written the formula for **power** $$P = IV$$. Stop and rearrange.\n\nTakeaway: $$R = V/I$$; the unit ohm = V/A makes the fraction's orientation unambiguous
