rrent exceeds the fuse's rated value, the heating effect ($$P = I^2 R$$) causes the fuse wire to **melt**, breaking the circuit. This protects the appliance from overheating, fire, or further damage. The fuse cannot be reused once blown.\n\n+ The fuse wire is designed to be the **weakest link** — it melts before any other part of the circuit can be damaged. This is why you must choose the correct rating: too low and it blows during normal operation; too high and it doesn't protect anything.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "An electric kettle is rated 240 V, 3.0 kW. State the procedure for choosing the correct fuse, and show why a 13 A fuse is appropriate. (3 steps)", "answer": "- Step 1: Calculate the normal operating current: $$I = \\frac{P}{V} = \\frac{3000}{240} = 12.5$$ A. (Note: rearrange $$P = IV$$ as $$I = P/V$$, **not** $$I = V/P$$ — a common slip under pressure.)\n- Step 2: Compare the operating current to the available standard fuse ratings (3 A, 5 A, 13 A). The fuse must have a rating **above** the operating current, otherwise it would blow during normal use.\n- Step 3: 12.5 A > 5 A (a 5 A fuse would blow immediately), and 12.5 A < 13 A (a 13 A fuse holds). Choose the **next standard rating above** the operating current → **13 A fuse**.\n\n+ Why not a much higher fuse? A 30 A fuse would also hold, but it would not protect the kettle — a fault current of 20 A could start a fire without blowing the fuse. Always choose the **next** standard rating above, not any arbitrary higher one.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "A student writes $$R = I \\times V$$ when rearranging Ohm's Law. Explain why this is wrong, and demonstrate the correct rearrangement using both algebra and a units check. (2 steps)", "answer": "- Step 1: Ohm's Law is $$V = IR$$, which rearranges to $$R = \\frac{V}{I}$$. The student has put $$I$$ and $$V$$ on the wrong sides — $$R = IV$$ would give units of $$\\text{A} \\times \\text{V} = \\text{W}$$ (watts, the unit of power), not ohms.\n- Step 2: Units check for the correct formula: $$R = \\frac{V}{I}$$ gives units of $$\\frac{\\text{V}}{\\text{A}} = \\Omega$$ (ohms). This confirms that voltage must be the **numerator** and current the **denominator**.\n\n+ This was a documented mistake made by Phuc during a lesson (corrected by the tutor immediately). If you ever see \"$$R = IV$$\" in your working, stop and correct it — you have accidentally written a power equation, not a resistance equation.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A student recalls the definition of potential difference as $$V = \\frac{E}{t}$$ (energy divided by time). Explain why this is incorrect, state the correct definition, and identify which quantity actually uses time in its denominator. (2 steps)", "answer": "- Step 1: The correct definition of potential difference is $$V = \\frac{E}{Q}$$ (energy transferred **per unit charge**). The student has confused the denominator with time.\n- Step 2: Time appears in the definition of **current**, not voltage: $$I = \\frac{Q}{t}$$ (charge per unit time). These two definitions must not be mixed: $$V = E/Q$$ and $$I = Q/t$$.\n\n+ Quick check: if $$V = E/t$$ were true, then voltage would have units of $$\\text{J/s} = \\text{W}$$ (watts, power), which is nonsensical. The correct unit is $$\\text{J/C} = \\text{V}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "A resistor is rated at 250 mW maximum safe power. A student writes this as $$250 \\times 10^{-6}$$ W. What is wrong, and what is the correct conversion? Give both the prefix rule and a quick sanity check. (2 steps)", "answer": "- Step 1: The prefix \"milli\" (m) means $$\\times 10^{-3}$$, not $$\\times 10^{-6}$$. So 250 mW $$= 250 \\times 10^{-3}$$ W $$= 0.250$$ W. The student has confused milli with micro ($$\\mu$$, which is $$\\times 10^{-6}$$).\n- Step 2: Sanity check: 250 mW is roughly a quarter of a watt (a small resistor), while $$250 \\times 10^{-6}$$ W = 0.00025 W (an absurdly tiny power for a resistor). If the number seems unreasonably small, check your prefix.\n\n+ Prefix reminder: kilo (k) = $$10^3$$, milli (m) = $$10^{-3}$$, micro ($$\\mu$$) = $$10^{-6}$$. Always expand the prefix **before** substituting into any equation.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "A student says: \"I need to know whether a circuit is series or parallel before I can apply Kirchhoff's First Law.\" Explain why this statement is incorrect, and state the true condition under which Kirchhoff's First Law applies. (2 steps)", "answer": "- Step 1: Kirchhoff's First Law ($$\\sum I_{in} = \\sum I_{out}$$) is a statement of **conservation of charge** at a single point (junction/node). It applies at **any junction**, regardless of whether the overall circuit topology is series, parallel, or a complex network.\n- Step 2: In a series circuit, there is simply only one path, so $$I_{in} = I_{out}$$ trivially (the current is the same at all points). In a parallel circuit, current splits at a junction, so $$I_T = I_1 + I_2$$. The law is the same in both cases — it does not depend on knowing the topology in advance.\n\n+ This was Phuc's documented confusion. The key insight: Kirchhoff's First Law is about **charge conservation at a node**, not about the global arrangement of the circuit.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Two resistors, 5 Ω and 3 Ω, are connected in series carrying 2 A. Without calculating any intermediate voltages, calculate the power dissipated in each resistor. Which formula do you choose and why? (2 steps)", "answer": "- Step 1: In a series circuit, the **same current** flows through both resistors, and we know both $$I$$ and $$R$$ for each. The most direct formula is $$P = I^2 R$$ — no need to find the voltage first.\n- Step 2: $$P_{5\\Omega} = (2)^2 \\times 5 = 4 \\times 5 = 20$$ W. $$P_{3\\Omega} = (2)^2 \\times 3 = 4 \\times 3 = 12$$ W.\n\n+ Verification: total power = 20 + 12 = 32 W. Check using the supply: if total voltage is $$V = I \\times R_T = 2 \\times 8 = 16$$ V, then $$P_{supply} = VI = 16 \\times 2 = 32$$ W. ✓ Conservation of energy confirmed.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "In a parallel section of a circuit, 1.5 V appears across both a 6 Ω and a 3 Ω resistor. Calculate the power dissipated in each, and verify the total current using Kirchhoff's First Law. (3 steps)", "answer": "- Step 1: In parallel, the **same voltage** is across both resistors, and we know both $$V$$ and $$R$$. Use $$P = V^2/R$$ directly.\n- Step 2: $$P_{6\\Omega} = \\frac{(1.5)^2}{6} = \\frac{2.25}{6} = 0.375$$ W. $$P_{3\\Omega} = \\frac{(1.5)^2}{3} = \\frac{2.25}{3} = 0.75$$ W.\n- Step 3: Verify currents: $$I_{6\\Omega} = \\frac{1.5}{6} = 0.25$$ A, $$I_{3\\Omega} = \\frac{1.5}{3} = 0.50$$ A. Total = 0.25 + 0.50 = 0.75 A. This should equal the total supply current — Kirchhoff's First Law holds. ✓\n\n+ Note: the 3 Ω resistor dissipates **double** the power of the 6 Ω resistor because, at the same voltage, lower resistance allows more current ($$P = V^2/R$$, so halving $$R$$ doubles $$P$$).", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A lamp operates at 6 V and draws 0.5 A. Calculate (a) the power of the lamp, and (b) the energy converted in 3 minutes. Use the most direct formula for each step. (2 steps)", "answer": "- Step 1: Given $$I$$ and $$V$$ directly → use $$P = IV = 0.5 \\times 6 = 3$$ W.\n- Step 2: Given $$P$$ and $$t$$ → use $$W = Pt = 3 \\times 180 = 540$$ J. (Convert 3 min to 180 s first.)\n\n+ Do **not** go: $$Q = It = 0.5 \\times 180 = 90$$ C, then $$E = QV = 90 \\times 6 = 540$$ J. Same answer, but unnecessary extra step with an extra chance for error.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "A 2000 W hair-dryer operates at 230 V. (a) Calculate the operating current. (b) Should a 5 A or 13 A fuse be fitted? Explain your reasoning. (3 steps)", "answer": "- Step 1: Use $$I = P/V = 2000/230 \\approx 8.7$$ A. (Rearrange $$P = IV$$ correctly: $$I = P/V$$, not $$I = V/P$$.)\n- Step 2: Compare 8.7 A to available fuse ratings. A 5 A fuse would blow immediately during normal operation (8.7 A > 5 A). A 13 A fuse would hold (8.7 A < 13 A).\n- Step 3: Choose the **13 A fuse** — it is the next standard rating above the operating current.\n\n+ Why not 5 A? The fuse would melt during normal drying, making the hair-dryer unusable. Why not a much higher fuse? A higher fuse would not protect against moderate overloads that could still cause overheating.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "An appliance converts 500 J of electrical energy into 350 J of useful work in 10 s. Calculate (a) the input power and (b) the efficiency. (3 steps)", "answer": "- Step 1: Input power: $$P_{total} = \\frac{W_{total}}{t} = \\frac{500}{10} = 50$$ W.\n- Step 2: Useful output power: $$P_{useful} = \\frac{W_{useful}}{t} = \\frac{350}{10} = 35$$ W.\n- Step 3: Efficiency: $$\\eta = \\frac{P_{useful}}{P_{total}} \\times 100\\% = \\frac{35}{50} \\times 100\\% = 70\\%$$. The remaining 30% (15 W) is dissipated as heat or other non-useful forms.\n\n+ Exam tip: always express efficiency as a **percentage** and explicitly label which power is \"useful\" and which is \"total.\"", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "A resistor has a maximum safe power of 250 mW and a resistance of 47 kΩ. Find the maximum safe current. State which formula you use and why, then give the result to an appropriate number of significant figures. (3 steps)", "answer": "- Step 1: Given $$P$$ and $$R$$ → rearrange $$P = I^2 R$$ for $$I$$:\n$$I^2 = \\frac{P}{R} \\implies I = \\sqrt{\\frac{P}{R}}$$\n- Step 2: Convert units: $$P = 250 \\times 10^{-3}$$ W, $$R = 47 \\times 10^3$$ Ω.\n$$I = \\sqrt{\\frac{250 \\times 10^{-3}}{47 \\times 10^3}} = \\sqrt{5.32 \\times 10^{-6}} \\approx 2.3 \\times 10^{-3} \\text{ A} = 2.3 \\text{ mA}$$\n- Step 3: The result is 2.3 mA (2 s.f., matching the 2 s.f. in 250 mW). Exceeding this current would cause the resistor to overheat and potentially fail.\n\n+ Conceptual point: the extremely small current (mA range) makes sense because 47 kΩ is a very large resistance — even a tiny current produces the maximum-rated power through $$I^2 R$$.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A filament lamp is rated 240 V, 60 W. At the instant it is switched on, its resistance is only 80 Ω (much lower than its operating resistance). Calculate the initial current surge and initial power, and explain why filament lamps often fail at switch-on. (3 steps)", "answer": "- Step 1: At switch-on, use $$I = V/R = 240/80 = 3.0$$ A. (Operating current is only $$I = P/V = 60/240 = 0.25$$ A — the surge is **12 times** larger.)\n- Step 2: Initial power: $$P = I^2 R = (3.0)^2 \\times 80 = 720$$ W (or $$P = VI = 240 \\times 3.0 = 720$$ W). This is **12 times** the rated 60 W.\n- Step 3: The huge current surge causes rapid, intense heating. The thermal shock (sudden expansion from cold to very hot) creates mechanical stress on the filament. This is why lamps most often fail at the moment of switch-on — the filament fractures under the sudden thermal load.\n\n+ The operating resistance is $$R = V/I = 240/0.25 = 960$$ Ω — much higher than 80 Ω because the filament heats up and its resistance increases (tungsten is a metal with positive temperature coefficient).", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "A student calculates the power supplied by a battery as $$P = 0.83 \\times 3.6$$, where 3.6 V is the voltage across a resistor and 0.83 A is the battery current. Explain why this calculation gives the wrong answer, and state the correct approach. (2 steps)", "answer": "- Step 1: Battery power is $$P = V_{battery} \\times I_{battery}$$. The student has used the voltage **across a resistor** (3.6 V), not the battery's own EMF. If the battery EMF is, say, 3 V, then the correct calculation is $$P = 3 \\times 0.83 = 2.49$$ W.\n- Step 2: The resistor's voltage is only a portion of the battery's total EMF (the rest may be dropped across internal resistance or other components). To find the **power supplied by the battery**, always use the **battery's own voltage (EMF)** and the **total current from the battery**.\n\n+ This was Phuc's documented mistake. The key rule: each component's power uses **that component's own** $$V$$ and $$I$$. The battery's power uses $$V_{battery}$$; a resistor's power uses $$V_{resistor}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "A 12 V supply drives a 2.8 Ω resistor in series with a parallel pair (4 Ω and unknown $$R_x$$). The 4 Ω resistor carries 1.5 A. Without doing the full calculation, explain the logical sequence of steps you would follow to find the power in each component. (3 steps)", "answer": "- Step 1: Find the voltage across the 4 Ω resistor: $$V_4 = I_4 \\times R_4 = 1.5 \\times 4 = 6.0$$ V. Since the parallel branches share the same voltage, this is also the voltage across $$R_x$$ and the entire parallel section.\n- Step 2: The remaining voltage is across the 2.8 Ω series resistor: $$V_{2.8} = 12 - 6 = 6.0$$ V. Find total current: $$I_T = 6.0 / 2.8 \\approx 2.14$$ A. Then $$I_x = I_T - 1.5 = 0.64$$ A, giving $$R_x = 6.0 / 0.64 \\approx 9.4$$ Ω.\n- Step 3: Choose power formula by available quantities for each component:\n+ 2.8 Ω: know $$I_T$$ and $$R$$ → $$P = I^2 R$$\n+ 4 Ω: know $$V$$ and $$I$$ → $$P = VI$$\n+ $$R_x$$: know $$V$$ and $$R$$ → $$P = V^2 / R$$\n+ Verify: sum of individual powers ≈ battery power ($$P = V_{battery} \\times I_T$$).\n\n+ The power-budget check (total dissipated = total supplied) is a powerful verification tool — if the numbers don't approximately match, there is an error somewhere.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A student sees \"40 mA\" on a circuit diagram and substitutes it as $$40 \\times 10^{-6}$$ A into a calculation. Identify the error and give the correct conversion. Also convert 40 µA correctly. (2 steps)", "answer": "- Step 1: \"mA\" means milliamps, where milli = $$10^{-3}$$. So 40 mA $$= 40 \\times 10^{-3}$$ A $$= 0.040$$ A. The student has used the micro ($$\\mu$$) multiplier of $$10^{-6}$$ instead.\n- Step 2: 40 µA (microamps) would indeed be $$40 \\times 10^{-6}$$ A $$= 4.0 \\times 10^{-5}$$ A. The two differ by a factor of 1000. Always check the **prefix symbol**: m = milli ($$10^{-3}$$), µ = micro ($$10^{-6}$$).\n\n+ Sanity check: 40 mA is a plausible current for a small electronic circuit (0.04 A). 40 µA is an extremely tiny current (0.00004 A), typical of sensor inputs. If your answer seems orders of magnitude off, recheck the prefix.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "Why does $$P = I^2 R$$ specifically earn the title \"heating-effect formula,\" while $$P = IV$$ is called the \"general power formula\"? What is the key difference in what they describe? (2 steps)", "answer": "- Step 1: $$P = IV$$ is **general** — it gives the total electrical power delivered to **any** component (motor, lamp, resistor, speaker). It requires no assumption about Ohm's Law or the nature of the component.\n- Step 2: $$P = I^2 R$$ specifically describes the rate of energy conversion to **heat** in a resistive element. At constant temperature, the rate of heat transfer from a resistor is exactly $$I^2 R$$. This formula explicitly involves resistance, which is the property that causes heating through electron-lattice collisions.\n\n+ A motor receiving $$P = IV$$ electrical power converts some to mechanical work and some to heat. The heat portion alone is $$I^2 R$$ (where $$R$$ is the motor's coil resistance). The difference $$IV - I^2 R$$ is the useful mechanical output.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "A student argues: \"In a parallel circuit, the voltage is the same everywhere, including across the series resistor.\" Explain why this is wrong, using the concept of voltage drops around a closed loop. (2 steps)", "answer": "- Step 1: In a circuit with both series and parallel sections, the **parallel branches** share the same voltage (by Kirchhoff's Second Law applied around each branch loop). But the series resistor has its **own** voltage drop.\n- Step 2: By Kirchhoff's Second Law for the main loop: $$V_{supply} = V_{series} + V_{parallel}$$. The series resistor \"uses up\" some of the supply voltage before it reaches the parallel section. The parallel section only gets what remains.\n\n+ Phuc's documented confusion: conflating \"voltage is the same across parallel branches\" with \"voltage is the same everywhere in the circuit.\" Voltage is only the same across components that are **directly in parallel** with each other — not across series components that precede them.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "An electric iron is rated 240 V, 1.8 kW. A student calculates the current as $$I = V/P = 240/1800 \\approx 0.13$$ A. Find the error and give the correct calculation. (2 steps)", "answer": "- Step 1: The correct rearrangement of $$P = IV$$ for current is $$I = P/V$$, not $$I = V/P$$. The student has inverted the fraction.\n- Step 2: Correct calculation: $$I = P/V = 1800/240 = 7.5$$ A. Sanity check: a 1.8 kW appliance on a 240 V supply should draw several amps (it's a heating device), not 0.13 A. If the answer seems too small, check the rearrangement.\n\n+ This slip (writing $$I = V/P$$ instead of $$I = P/V$$) was made by tutor Marta herself during a lesson before she self-corrected. Under exam pressure, always double-check rearrangements by multiplying back: does $$P = IV$$ give the original $$P$$ value?", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}], "count": 35}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In a metallic conductor carrying current, what physically happens at the atomic level that causes the conductor to heat up? Describe the mechanism step by step. (3 steps)", "answer": "- Step 1: When a current flows, free electrons drift through a lattice of fixed positive ions. The electrons are the mobile charge carriers; the ions are locked in place within the metallic crystal structure.\n- Step 2: As electrons move, they collide with the lattice ions. Each collision transfers some of the electron's kinetic energy to an ion — the electron slows down, and the ion gains energy.\n- Step 3: The ions, having absorbed kinetic energy, vibrate with greater amplitude about their equilibrium positions. This increased vibrational amplitude of the lattice ions *is* what we perceive as heat (thermal/internal energy). The more collisions per second, the faster the ions vibrate, and the hotter the conductor becomes.\n\nThe key chain is: electron drift → collisions with ions → ions vibrate more → heat.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "When electrons collide with lattice ions inside a resistor and lose kinetic energy, does the current leaving the resistor equal the current entering it? Why? (2 steps)", "answer": "- Step 1: Yes, the current leaving equals the current entering. This is a direct consequence of **conservation of charge** (Kirchhoff's First Law). Charge cannot be created or destroyed at any point in the circuit.\n- Step 2: The collisions slow individual electrons down, but they do not \"store\" or \"trap\" electrons inside the resistor. The *drift speed* may be reduced, but the *number of electrons passing per second* (the current) must be the same at every cross-section of a series path. Electrons are not accumulated inside the resistor.\n\nA common misconception is that a resistor \"absorbs\" some of the electrons. It absorbs *energy*, not charge.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "Why is $$P = I^2 R$$ specifically called the \"heating-effect formula,\" given that all three power formulas ($$P = IV$$, $$P = I^2 R$$, $$P = V^2/R$$) give the same numerical answer for an ohmic resistor? (2 steps)", "answer": "- Step 1: The microscopic picture shows that heat is produced by electron–ion collisions. The *rate* of these collisions depends on how many electrons are flowing (current $$I$$) and how frequently each one collides (determined by resistance $$R$$). The formula $$P = I^2 R$$ directly expresses power in terms of these two collision-related quantities — current and resistance — without needing the voltage.\n- Step 2: At constant temperature, the rate of heat transfer from a resistor is *exactly* $$I^2 R$$. This formula makes the physics of heating most transparent: doubling the current quadruples the heating (because $$I$$ is squared), which matches the intuition that twice as many electrons, each colliding twice as often, produce four times the collision energy per second.\n\n$$P = IV$$ is the *general* power formula (works for any component). $$P = I^2 R$$ is the *heating-specific* form because it ties directly to the collision mechanism.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "Derive $$P = IV$$ from the three fundamental definitions: $$P = \\Delta W / \\Delta t$$, $$I = Q / t$$, and $$V = W / Q$$. Walk through each substitution. (3 steps)", "answer": "- Step 1: Start from the definition of potential difference: $$V = W/Q$$. Rearrange to get an expression for energy: $$W = QV$$.\n- Step 2: Divide both sides by time $$t$$: $$\\frac{W}{t} = \\frac{Q}{t} \\times V$$.\n- Step 3: Recognise that $$\\frac{W}{t} = P$$ (power is energy per unit time) and $$\\frac{Q}{t} = I$$ (current is charge per unit time). Substituting: $$P = I \\times V$$.\n\nThis is the most general electrical power equation — it applies to *any* component, not just resistors, because it relies only on the definitions of power, current, and voltage, with no assumption about Ohm's Law.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "Starting from $$P = IV$$, derive $$P = I^2 R$$. State the key assumption that makes this derivation valid. (2 steps)", "answer": "- Step 1: Apply Ohm's Law in the form $$V = IR$$. Substitute this into $$P = IV$$: $$P = I \\times (IR) = I^2 R$$.\n- Step 2: The key assumption is that the component obeys **Ohm's Law** (i.e., resistance is constant and independent of current). For non-ohmic components (like a filament lamp at different temperatures), $$R$$ is not constant, so you cannot simply substitute $$V = IR$$ globally — you would need to use the specific $$V$$ and $$I$$ at the operating point.\n\nUse this formula when you know current and resistance — it avoids having to calculate $$V$$ first.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Starting from $$P = IV$$, derive $$P = V^2 / R$$ using the most direct substitution. Then show the alternative derivation that goes through $$P = I^2 R$$. (3 steps)", "answer": "- Step 1 (direct route): From Ohm's Law, $$I = V/R$$. Substitute into $$P = IV$$: $$P = \\frac{V}{R} \\times V = \\frac{V^2}{R}$$.\n- Step 2 (alternative route via $$P = I^2 R$$): Start with $$I = V/R$$. Square both sides: $$I^2 = V^2/R^2$$. Substitute into $$P = I^2 R$$: $$P = \\frac{V^2}{R^2} \\times R = \\frac{V^2}{R}$$.\n- Step 3: Both routes give the same result. The alternative route was specifically requested by a student in a lesson and demonstrated by the tutor — it shows the internal consistency of the three power formulas. Use $$P = V^2/R$$ when you know voltage and resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "A circuit problem gives you the current through a resistor and its resistance, but not the voltage across it. Which single power formula should you reach for, and why is it the most efficient choice? (2 steps)", "answer": "- Step 1: Use **$$P = I^2 R$$**. This formula requires exactly the two quantities you already have ($$I$$ and $$R$$), so you can compute power in one step.\n- Step 2: Using any other formula would require you to first calculate the missing quantity. For example, using $$P = IV$$ would force you to compute $$V = IR$$ first, then multiply by $$I$$ — an unnecessary extra step that introduces a chance for error. Similarly, $$P = V^2/R$$ would require computing $$V$$ first and then squaring it.\n\nThe principle: **match the formula to the given quantities** to minimise steps and reduce error.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "A resistor has a fixed resistance $$R$$. If the current through it doubles (from $$I$$ to $$2I$$), what happens to the power dissipated, and why? (2 steps)", "answer": "- Step 1: Since $$R$$ is fixed and current is given, use $$P = I^2 R$$. The power is proportional to the *square* of the current: $$P \\propto I^2$$.\n- Step 2: Doubling the current means: $$P_{\\text{new}} = (2I)^2 R = 4I^2 R = 4P_{\\text{old}}$$. The power **quadruples**. This is because twice as many electrons are flowing, *and* each electron is driven by a doubled voltage (since $$V = IR$$ and $$R$$ is fixed), so each electron delivers twice the energy. The two factors of 2 multiply to give a factor of 4.\n\nThis quadratic relationship is a favourite exam trap: students often intuitively guess \"double the current, double the power,\" but the squaring makes it four times.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A resistor is connected across a fixed voltage supply. If the resistance is doubled, what happens to the power dissipated? Explain using the appropriate formula. (2 steps)", "answer": "- Step 1: With fixed voltage and variable resistance, use $$P = V^2 / R$$. Here, $$V$$ is constant, so $$P \\propto 1/R$$ — power is *inversely proportional* to resistance.\n- Step 2: Doubling $$R$$ halves the power: $$P_{\\text{new}} = V^2 / (2R) = \\frac{1}{2} P_{\\text{old}}$$. Physically, a larger resistance at the same voltage draws less current ($$I = V/R$$), so fewer electrons per second pass through, and the total energy delivered per second drops.\n\nContrast this with the case where *current* is fixed (e.g., in a series circuit where the same current flows through all components): there, $$P = I^2 R$$ and doubling $$R$$ *doubles* the power. The formula you choose determines the direction of the relationship.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "In a series circuit with fixed current $$I$$, resistor $$R_1$$ has twice the resistance of $$R_2$$. Which resistor dissipates more power, and by what factor? (2 steps)", "answer": "- Step 1: In a series circuit, the current is the same through every component. With $$I$$ fixed, the appropriate formula is $$P = I^2 R$$, so power is directly proportional to resistance: $$P \\propto R$$.\n- Step 2: Since $$R_1 = 2R_2$$, we get $$P_1 = I^2 R_1 = I^2 (2R_2) = 2P_2$$. The resistor with twice the resistance dissipates **twice** the power. In a series circuit, the larger resistor \"takes\" more of the voltage, and since the same current flows, it converts more energy per second.\n\nThis is the opposite of what happens at fixed voltage (where larger resistance means *less* power). Context matters — always check what is held constant.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "A 3 V battery drives a 2 Ω resistor in series with a parallel combination of 6 Ω and 3 Ω resistors. The parallel resistance works out to 2 Ω, giving a total resistance of 4 Ω and total current of 0.75 A. The voltage across the parallel section is 1.5 V. Which power formula is most direct for (a) the 2 Ω series resistor, and (b) each parallel resistor? (3 steps)", "answer": "- Step 1: For the **2 Ω series resistor**, you know the current ($$I_T = 0.75$$ A, same everywhere in series) and the resistance. Use $$P = I^2 R$$: $$P = (0.75)^2 \\times 2 = 1.125$$ W. No need to find voltage first.\n- Step 2: For the **parallel resistors**, you know the voltage across the parallel section ($$V = 1.5$$ V, same across both branches) and each resistance. Use $$P = V^2 / R$$: for the 6 Ω, $$P = (1.5)^2 / 6 = 0.375$$ W; for the 3 Ω, $$P = (1.5)^2 / 3 = 0.75$$ W.\n- Step 3: Verification — the total power should equal the battery's output: $$P_{\\text{battery}} = V_{\\text{battery}} \\times I_T = 3 \\times 0.75 = 2.25$$ W. Sum of individual powers: $$1.125 + 0.375 + 0.75 = 2.25$$ W. ✓ Conservation of energy holds.\n\nThis example shows how choosing the right formula for each sub-circuit avoids unnecessary intermediate calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "Starting from $$P = W/t$$, write down the three equivalent energy formulas obtained by substituting each power expression. When should you use $$E = QV$$ instead? (2 steps)", "answer": "- Step 1: Since $$W = P \\times t$$, substitute each power formula:\n  + $$W = IVt$$ (from $$P = IV$$)\n  + $$W = I^2 Rt$$ (from $$P = I^2 R$$)\n  + $$W = \\frac{V^2}{R} t$$ (from $$P = V^2/R$$)\n- Step 2: Use **$$E = QV$$** only when the *charge* $$Q$$ is explicitly given in the problem. This comes directly from the definition of voltage ($$V = W/Q$$ rearranged). If the problem gives you power and time, or current, voltage, and time, then $$W = Pt$$ or $$W = IVt$$ is more direct — one step instead of two.\n\nThe roundabout route (calculate $$Q = It$$, then $$E = QV$$) gives the same numerical answer but requires two substitutions and doubles the chance of a unit error.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A bulb filament carries 250 mA at 2.2 V. How much energy is converted in 1 minute? Show the direct method and explain why the roundabout method ($$Q = It$$, then $$E = QV$$) is discouraged. (3 steps)", "answer": "- Step 1 (direct method): Use $$W = IVt$$. Convert units: $$I = 0.250$$ A, $$t = 60$$ s. $$W = 0.250 \\times 2.2 \\times 60 = 33$$ J. One step, one substitution, done.\n- Step 2 (roundabout method): First compute charge: $$Q = It = 0.250 \\times 60 = 15$$ C. Then compute energy: $$E = QV = 15 \\times 2.2 = 33$$ J. Same answer, but two steps.\n- Step 3: The roundabout method is discouraged because: (a) it requires two substitutions instead of one, (b) there are two opportunities for a unit error (e.g., forgetting to convert mA to A, or minutes to seconds), and (c) examiners award method marks, and a slip in an unnecessary intermediate step can lose those marks. Always reach for the most direct formula first.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "A common exam error is writing $$V = E/t$$ instead of the correct definition. What is the correct definition of potential difference, and where does time actually appear in the electrical equations? (2 steps)", "answer": "- Step 1: The correct definition is **$$V = E/Q$$** (or $$V = W/Q$$) — potential difference is energy transferred *per unit charge*, measured in joules per coulomb (J/C = V). Time does not appear in this definition.\n- Step 2: Time appears in the definition of **current**: $$I = Q/t$$ — current is charge per unit time, measured in coulombs per second (C/s = A). Confusing these two definitions leads to mixing $$Q$$ and $$t$$ in the wrong places. A quick unit check catches this: $$V = \\text{J/C}$$, not $$\\text{J/s}$$ (which would be watts).\n\nThe mnemonic: **V is energy per charge (E/Q); I is charge per time (Q/t)**. Never substitute one for the other.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Another common error is writing $$R = I \\times V$$. What is the correct form of Ohm's Law, and how can you quickly verify it using units? (2 steps)", "answer": "- Step 1: The correct form is **$$R = V/I$$** — resistance equals voltage divided by current. Writing $$R = IV$$ would give resistance units of A·V, which is not ohms.\n- Step 2: Unit check: $$\\frac{V}{A} = \\Omega$$. This is the definition of the ohm. Alternatively, $$R = V/I$$ rearranges to $$V = IR$$, which is the form most commonly used for substitution into power equations. If you ever catch yourself writing $$R = IV$$, stop and flip the fraction.\n\nThis was a specific error observed in a lesson — the tutor had to correct it immediately. Always double-check rearrangements under pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "An electric kettle is rated 240 V, 3.0 kW. (a) What current does it draw? (b) Should a 3 A, 5 A, or 13 A fuse be used? Explain the selection rule. (3 steps)", "answer": "- Step 1: Calculate the operating current using $$I = P/V$$ (not $$I = V/P$$ — a common rearrangement slip): $$I = 3000/240 = 12.5$$ A.\n- Step 2: The fuse must carry the normal operating current without melting, but melt if the current exceeds safe levels. Therefore, choose the **next standard fuse rating above** the operating current.\n- Step 3: Standard UK fuse ratings are 3 A, 5 A, and 13 A. Since $$12.5$$ A > 5 A, a 5 A fuse would blow during normal use. The 13 A fuse is the next rating above 12.5 A, so it allows normal operation while still protecting against dangerous overcurrents. Choose the **13 A fuse**.\n\nNever choose a fuse rated *below* the operating current (it would blow during normal use) or far above (it wouldn't protect the appliance).", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "A 2000 W hair dryer operates at 230 V. The available fuses are 5 A and 13 A. Which fuse should be fitted, and what would happen if the wrong one were chosen? (3 steps)", "answer": "- Step 1: Calculate operating current: $$I = P/V = 2000/230 \\approx 8.7$$ A.\n- Step 2: A 5 A fuse would blow during normal operation because $$8.7$$ A > 5 A. The hair dryer would not work at all — the fuse melts every time you switch it on.\n- Step 3: The 13 A fuse is the correct choice ($$8.7$$ A < 13 A). It allows the 8.7 A operating current to pass safely but would still melt if a fault caused the current to rise significantly above 13 A, protecting against fire or damage.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "What is the efficiency formula for an electrical device, and what happens to the \"missing\" power that is not useful output? (2 steps)", "answer": "- Step 1: Efficiency is defined as: $$\\eta = \\frac{P_{\\text{useful}}}{P_{\\text{total}}} \\times 100\\%$$. Here, $$P_{\\text{total}} = IV$$ (the total electrical power input), and $$P_{\\text{useful}}$$ is the rate at which the device does its intended work (e.g., mechanical power from a motor, light from a lamp).\n- Step 2: The difference $$P_{\\text{total}} - P_{\\text{useful}} = P_{\\text{wasted}}$$ is dissipated as heat (and sometimes sound). No energy is destroyed — conservation of energy ensures that all input energy goes somewhere. In an electric motor, the wasted power heats the motor's coils due to resistive heating ($$I^2 R$$ losses), friction, and air resistance.\n\nA filament lamp is only ~10% efficient at producing visible light; the remaining ~90% is infrared (heat). An LED lamp is far more efficient, producing the same light for a fraction of the input power.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "An appliance converts 500 J of electrical energy into 350 J of useful work in 10 s. Calculate (a) the input power, (b) the useful output power, and (c) the efficiency. (3 steps)", "answer": "- Step 1: Input power: $$P_{\\text{total}} = W/t = 500/10 = 50$$ W.\n- Step 2: Useful output power: $$P_{\\text{useful}} = W_{\\text{useful}}/t = 350/10 = 35$$ W.\n- Step 3: Efficiency: $$\\eta = (35/50) \\times 100\\% = 70\\%$$. The remaining 30% (15 W) is wasted as heat.\n\nNote: You could also compute efficiency directly from energies: $$\\eta = (350/500) \\times 100\\% = 70\\%$$, because the factor of $$t$$ cancels. But in exam questions, you are often asked for power values as intermediate steps, so compute them explicitly.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "A resistor has a maximum safe power rating of 250 mW and a resistance of 47 kΩ. What is the maximum safe current it can carry? Identify the correct formula and the common prefix trap. (3 steps)", "answer": "- Step 1: You are given $$P$$ and $$R$$, so rearrange $$P = I^2 R$$ for current: $$I^2 = P/R$$, so $$I = \\sqrt{P/R}$$.\n- Step 2: Convert units carefully — this is the prefix trap: 250 mW = $$250 \\times 10^{-3}$$ W (milli = $$10^{-3}$$, NOT $$10^{-6}$$), and 47 kΩ = $$47 \\times 10^3$$ Ω. So $$I = \\sqrt{\\frac{250 \\times 10^{-3}}{47 \\times 10^3}} = \\sqrt{5.32 \\times 10^{-6}} \\approx 2.3 \\times 10^{-3}$$ A = **2.3 mA**.\n- Step 3: The critical trap is confusing milli ($$10^{-3}$$) with micro ($$10^{-6}$$). Writing $$250 \\times 10^{-6}$$ W instead of $$250 \\times 10^{-3}$$ W would give a current that is ~32 times too small. Always expand prefixes before substituting.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "A 240 V, 60 W filament lamp is switched on. At the instant of switching, its resistance is only 80 Ω (the filament is cold). What is the \"surge\" current and power at switch-on, and why are they much larger than the normal operating values? (3 steps)", "answer": "- Step 1: Normal operation: $$I = P/V = 60/240 = 0.25$$ A, and $$R = V/I = 240/0.25 = 960$$ Ω (hot resistance).\n- Step 2: At switch-on (cold filament, $$R = 80$$ Ω): $$I_{\\text{surge}} = V/R = 240/80 = 3.0$$ A. The surge power: $$P_{\\text{surge}} = IV = 3.0 \\times 240 = 720$$ W.\n- Step 3: The surge current is 12× the normal current, and the surge power is 12× the rated power. This happens because the cold filament has much lower resistance (tungsten's resistivity increases sharply with temperature). As the filament heats up in a fraction of a second, its resistance rises toward 960 Ω, and the current drops to 0.25 A. This surge is why filament lamps often fail at the moment of switching on — the sudden thermal stress is greatest then.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "A 12 V supply (negligible internal resistance) drives a 2.8 Ω resistor in series with a parallel pair: a 4.0 Ω resistor carrying 1.5 A and an unknown resistor $$R_x$$. Find the voltage across the parallel section, the current through $$R_x$$, and the value of $$R_x$$. (4 steps)", "answer": "- Step 1: Voltage across the 4.0 Ω resistor: $$V_4 = IR = 1.5 \\times 4.0 = 6.0$$ V. Since the two branches are in parallel, the voltage across $$R_x$$ is also 6.0 V.\n- Step 2: Voltage across the 2.8 Ω series resistor: $$V_{2.8} = 12 - 6.0 = 6.0$$ V.\n- Step 3: Total current from the supply: $$I_T = V_{2.8}/R_{2.8} = 6.0/2.8 \\approx 2.14$$ A. Current through $$R_x$$: $$I_x = I_T - I_4 = 2.14 - 1.5 = 0.64$$ A (by Kirchhoff's First Law at the junction).\n- Step 4: Resistance of $$R_x$$: $$R_x = V/I_x = 6.0/0.64 \\approx 9.4$$ Ω.\n\nThis problem combines Kirchhoff's laws, Ohm's Law, and the parallel voltage rule. The key insight is that the parallel branches share the same voltage, and the series resistor \"uses up\" the remaining voltage from the supply.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "For the circuit in Q22, calculate the power dissipated in each component and verify that the total equals the power supplied by the battery. Choose the most direct formula for each. (3 steps)", "answer": "- Step 1: Choose formula by available quantities:\n  + 2.8 Ω resistor: know $$I_T \\approx 2.14$$ A and $$R = 2.8$$ Ω → use $$P = I^2 R$$: $$P_{2.8} = (2.14)^2 \\times 2.8 \\approx 12.8$$ W\n  + 4.0 Ω resistor: know $$V = 6.0$$ V and $$I = 1.5$$ A → use $$P = IV$$: $$P_4 = 6.0 \\times 1.5 = 9.0$$ W\n  + $$R_x = 9.4$$ Ω: know $$V = 6.0$$ V and $$R = 9.4$$ Ω → use $$P = V^2/R$$: $$P_x = 36/9.4 \\approx 3.8$$ W\n- Step 2: Total power dissipated: $$12.8 + 9.0 + 3.8 = 25.6$$ W.\n- Step 3: Power supplied by battery: $$P_{\\text{battery}} = V_{\\text{battery}} \\times I_T = 12 \\times 2.14 = 25.7$$ W. The small discrepancy (~0.1 W) is due to rounding intermediate values. This confirms conservation of energy: total power in = total power out.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Why must you use the battery's own voltage (not a resistor's voltage) when calculating the total power supplied by the battery? What error does this address? (2 steps)", "answer": "- Step 1: The battery's power output is the rate at which it delivers energy to the *entire* circuit. This is $$P_{\\text{battery}} = V_{\\text{battery}} \\times I_{\\text{battery}}$$, where $$V_{\\text{battery}}$$ is the EMF of the battery and $$I_{\\text{battery}}$$ is the total current leaving the battery.\n- Step 2: A common error is to multiply the total current by a *resistor's* voltage drop (e.g., $$0.83 \\times 3.6$$) instead of the battery voltage. This would give the power dissipated in that particular resistor only, not the total power supplied by the battery. The battery's voltage is the \"full\" voltage driving the current; each resistor only \"sees\" a portion of it.\n\nAlways label which voltage belongs to which component, and use the battery's voltage when calculating battery power.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "A student says: \"To apply Kirchhoff's First Law at a junction, I need to know whether the circuit is series or parallel.\" Is this correct? Explain why or why not. (2 steps)", "answer": "- Step 1: This is **incorrect**. Kirchhoff's First Law (the sum of currents entering a junction equals the sum leaving) is a statement of **conservation of charge**. It applies at *any* junction, regardless of the overall circuit topology.\n- Step 2: The labels \"series\" and \"parallel\" describe how components are connected in the overall circuit, but Kirchhoff's First Law is local — it applies to a single junction point. At any node where conductors meet, charge cannot accumulate, so the total current in must equal the total current out. This is true whether the junction is part of a series chain, a parallel network, or a complex combination circuit.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "A student reasons: \"Current is the same everywhere in a series circuit, and voltage is energy per charge, so voltage must also be the same everywhere in a series circuit.\" Identify the flaw in this logic. (2 steps)", "answer": "- Step 1: The student's starting premise is correct: current is the same everywhere in series (by conservation of charge), and voltage is indeed energy per charge ($$V = E/Q$$). But the conclusion does not follow.\n- Step 2: The flaw is that \"same charge\" does not mean \"same energy.\" Each unit of charge (each \"Charlie the Coulomb\") carries a certain amount of energy out of the battery. As it passes through each resistor, it *loses* some of that energy to the resistor. The *number* of charges per second (current) is conserved, but the *energy per charge* (voltage) decreases at each component. That is exactly why $$V_T = V_1 + V_2 + \\ldots$$ in series — the total energy per charge delivered by the battery equals the sum of energy per charge lost at each resistor.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "In a parallel circuit with two branches, a student adds the voltages across each branch and gets a total greater than the supply voltage. Explain why this is wrong and what the correct voltage rule is. (2 steps)", "answer": "- Step 1: In a parallel circuit, each branch is connected directly across the same two nodes of the supply. Therefore, the voltage across each branch equals the supply voltage: $$V_{\\text{supply}} = V_1 = V_2$$.\n- Step 2: The student's error is adding the voltages as if they were in series. In series, voltages add because a single charge passes through each component in turn, losing energy at each one. In parallel, a single charge goes through only *one* branch, not both. Kirchhoff's Second Law says the sum of voltage drops around *any single closed loop* equals the EMF — and each branch forms its own loop with the supply. Adding voltages across parallel branches has no physical meaning.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "A student calculates the power in each branch of a parallel circuit and then adds them all up. Is this a valid way to find the total power, and why? (2 steps)", "answer": "- Step 1: Yes, this is valid. By conservation of energy, the total power dissipated in the circuit must equal the total power supplied by the battery. Since energy cannot be created or destroyed, summing the power in every component gives the total power.\n- Step 2: This serves as an excellent cross-check. Calculate $$P_{\\text{battery}} = V_{\\text{battery}} \\times I_T$$ independently, and compare with the sum of individual powers. They should agree (within rounding). If they don't, there is an error somewhere in the calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "What is the difference between EMF and potential difference, in terms of energy transfer direction? (2 steps)", "answer": "- Step 1: **EMF** (electromotive force) is the energy transferred *to* each unit of charge by the power source (e.g., a battery converts chemical energy to electrical energy). It is the \"cause\" — the voltage that drives current around the circuit.\n- Step 2: **Potential difference** (p.d.) is the energy transferred *from* each unit of charge as it passes through a component (e.g., a resistor converts electrical energy to thermal energy). It is the \"effect\" — the voltage drop across a component where energy is used. Both are measured in volts (J/C), but EMF describes energy *gained* per charge, while p.d. describes energy *lost* per charge.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A lamp operates at 6.0 V and draws 0.50 A. Calculate (a) the power of the lamp and (b) the energy converted in 3.0 minutes. Use the most direct method. (3 steps)", "answer": "- Step 1: Power: $$P = IV = 0.50 \\times 6.0 = 3.0$$ W. (Given $$I$$ and $$V$$, so $$P = IV$$ is the direct formula.)\n- Step 2: Energy: $$W = Pt = 3.0 \\times 180 = 540$$ J. (Convert 3.0 min to 180 s. Using $$W = Pt$$ directly — one step.)\n- Step 3: Note that $$W = IVt = 0.50 \\times 6.0 \\times 180 = 540$$ J gives the same answer in a single substitution. The roundabout method ($$Q = It = 0.50 \\times 180 = 90$$ C, then $$E = QV = 90 \\times 6.0 = 540$$ J) also works but adds an unnecessary intermediate step.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A 150 Ω resistor has 12 V across it. Calculate the power dissipated, stating which formula you chose and why. (2 steps)", "answer": "- Step 1: The given quantities are $$V = 12$$ V and $$R = 150$$ Ω. The formula that uses exactly these two quantities is $$P = V^2/R$$.\n- Step 2: $$P = (12)^2 / 150 = 144/150 = 0.96$$ W. Using $$P = IV$$ would require calculating $$I = V/R = 12/150 = 0.08$$ A first, then $$P = 0.08 \\times 12 = 0.96$$ W — same answer but with an extra step. Using $$P = I^2 R$$ would also require finding $$I$$ first. $$P = V^2/R$$ is the most direct choice.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "A 5 Ω and a 3 Ω resistor are connected in series to a 16 V supply, with a total current of 2.0 A. Calculate the power dissipated in each resistor. Which formula is most direct and why? (3 steps)", "answer": "- Step 1: In a series circuit, the current is the same through both resistors: $$I = 2.0$$ A. With $$I$$ and $$R$$ known for each, the most direct formula is $$P = I^2 R$$.\n- Step 2: $$P_{5\\Omega} = (2.0)^2 \\times 5 = 4 \\times 5 = 20$$ W. $$P_{3\\Omega} = (2.0)^2 \\times 3 = 4 \\times 3 = 12$$ W.\n- Step 3: Cross-check: total power = $$20 + 12 = 32$$ W. Battery power = $$V \\times I = 16 \\times 2.0 = 32$$ W. ✓ The larger resistor dissipates more power in a series circuit (at constant current, $$P \\propto R$$).", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A student needs to find the current in a potential divider circuit where the supply voltage and both resistances are known. They suggest using $$I = Q/t$$. Why is this unhelpful, and what should they use instead? (2 steps)", "answer": "- Step 1: $$I = Q/t$$ is the *definition* of current, but it requires knowing the charge $$Q$$ and time $$t$$, neither of which is given in this problem. It is not a practical calculation tool here.\n- Step 2: When voltage and resistance are the known quantities, use **Ohm's Law**: $$I = V/R$$. For a potential divider with supply voltage $$V_{\\text{in}}$$ and total resistance $$R_1 + R_2$$, the current is $$I = V_{\\text{in}} / (R_1 + R_2)$$. This directly uses the given quantities.\n\nAlways match your formula to the quantities you know: $$V$$ and $$R$$ known → reach for Ohm's Law.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "Explain the prefix trap between \"milli\" and \"micro.\" Give an example of how this can cause a major error in a power calculation. (2 steps)", "answer": "- Step 1: **milli (m) = $$10^{-3}$$**; **micro (μ) = $$10^{-6}$$**. They differ by a factor of 1000. Confusing them shifts the decimal point by three places.\n- Step 2: Example: A resistor's maximum safe power is 250 mW. If you write this as $$250 \\times 10^{-6}$$ W (confusing milli with micro), you are using a value 1000 times too small. When calculating maximum safe current ($$I = \\sqrt{P/R}$$), the resulting current would be ~32 times too small (since $$\\sqrt{1000} \\approx 32$$). You might then think a tiny current is safe when it would actually destroy the resistor.\n\nAlways expand prefixes before substituting: 250 mW = 0.250 W; 40 mA = 0.040 A; 47 kΩ = 47,000 Ω.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "A student claims that a resistor \"stores\" electrons — the longer it operates, the more electrons accumulate inside it. Why is this wrong, and what is the correct picture? (2 steps)", "answer": "- Step 1: This violates **conservation of charge** and **Kirchhoff's First Law**. The current entering a resistor equals the current leaving it at all times. Electrons flow through the resistor; they are not accumulated inside it. If charge built up, the resulting electric field would quickly restore equilibrium.\n- Step 2: The correct picture is that the resistor *slows down* electrons through collisions with lattice ions. The *rate of flow* (current) is the same in and out, but the electrons lose kinetic energy to the lattice as they pass through. The resistor converts electrical energy to thermal energy; it does not store charge. Over time, the resistor gets hotter (more internal energy in the lattice), but the number of electrons inside it remains constant.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "When deriving the combined resistance formula for parallel circuits, a student starts by writing $$R_T = R_1 + R_2$$ and substituting Ohm's Law. They get stuck with a messy fraction. What should the correct starting point be, and why? (2 steps)", "answer": "- Step 1: The correct starting point for a parallel derivation is **$$I_T = I_1 + I_2$$** — the quantity that *adds up* in parallel is current (by Kirchhoff's First Law / conservation of charge). Starting with $$R_T = R_1 + R_2$$ is the series approach and leads to a dead end.\n- Step 2: The general principle: start the derivation with the quantity that is conserved or summed in that configuration. In **series**, voltage adds ($$V_T = V_1 + V_2$$), so start there. In **parallel**, current adds ($$I_T = I_1 + I_2$$), so start there. Then substitute Ohm's Law and simplify. For parallel: $$V_T/R_T = V_1/R_1 + V_2/R_2$$. Since $$V_T = V_1 = V_2$$ in parallel, voltage cancels, giving $$1/R_T = 1/R_1 + 1/R_2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "The word \"dissipated\" is often used when discussing power in resistors. What does it mean physically, and why is it an appropriate term? (2 steps)", "answer": "- Step 1: \"Dissipated\" means \"scattered\" or \"dispersed.\" When electrical energy is transferred to a resistor, it increases the kinetic and potential energy of the resistor's atoms (internal energy). This energy is distributed randomly among billions of atoms vibrating in all directions.\n- Step 2: The term is appropriate because the energy becomes \"disordered\" — it is thermal energy spread throughout the material, impossible to fully recover as useful electrical energy. This is consistent with the second law of thermodynamics: energy dissipation increases entropy. The resistor doesn't \"consume\" energy (that would violate conservation); it *scatters* it into a less useful form.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "A student is asked to calculate the power supplied by a battery in a circuit. They multiply the current by a resistor's voltage drop instead of the battery's EMF. Will this give the correct answer for the battery's power? Why or why not? (2 steps)", "answer": "- Step 1: No, this gives the power dissipated *in that specific resistor*, not the power supplied by the battery. The resistor's voltage is only a portion of the total EMF (unless it is the only component in the circuit).\n- Step 2: The battery supplies energy at a rate determined by its *own* voltage (EMF) and the total current: $$P_{\\text{battery}} = \\mathcal{E} \\times I_T$$. Using a resistor's voltage gives only the fraction of power delivered to that resistor. To find total battery power, you must use the battery's full voltage.\n\nThis was a specific error observed in a lesson — always distinguish between \"voltage across a component\" and \"voltage of the supply.\"", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "An electric motor lifts a 0.6 kg mass through 0.94 m in 7.7 s. The electrical input is 3.2 V and 0.75 A. Calculate the useful output power, the input power, and the efficiency. (3 steps)", "answer": "- Step 1: Useful output power (mechanical): $$P_{\\text{out}} = mgh/t = (0.6 \\times 9.81 \\times 0.94)/7.7 \\approx 5.53/7.7 \\approx 0.72$$ W.\n- Step 2: Electrical input power: $$P_{\\text{in}} = IV = 0.75 \\times 3.2 = 2.4$$ W.\n- Step 3: Efficiency: $$\\eta = (0.72/2.4) \\times 100\\% \\approx 30\\%$$. The remaining 70% is wasted as heat in the motor's coils (resistive heating), friction, and air resistance. This is typical for small electric motors under load.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "A common exam question asks you to \"show that\" a fuse is appropriate for an appliance. What three things must you state to get full marks? (3 steps)", "answer": "- Step 1: **State the formula and calculate the operating current**: \"Using $$I = P/V$$, $$I = 3000/240 = 12.5$$ A.\"\n- Step 2: **State the comparison**: \"Since 12.5 A < 13 A, the current does not exceed the fuse rating during normal operation.\"\n- Step 3: **State the conclusion**: \"Therefore, the 13 A fuse is appropriate. It will not blow during normal use but will melt if a fault causes the current to exceed 13 A, protecting the appliance.\"\n\nMany students lose marks by calculating the current but not explicitly stating the comparison and conclusion. The mark scheme requires all three elements.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "For a 3-mark question asking you to explain the heating effect of a current, what three key phrases should you include? (3 steps)", "answer": "- Step 1: **\"Electrons collide with (positive) lattice ions\"** — this identifies the microscopic mechanism.\n- Step 2: **\"Transfer kinetic energy to ions\"** — this describes the energy transfer process.\n- Step 3: **\"Ions vibrate with greater amplitude\"** — this connects the energy transfer to the macroscopic observation of heating.\n\nAll three phrases strengthen a 3-mark answer. Omitting any one loses depth. The sequence tells the complete story: cause (collisions) → mechanism (energy transfer) → effect (increased vibration = heat).", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "A 5 Ω resistor and a 10 Ω resistor are connected in parallel across a 20 V supply. Without doing a full calculation, which resistor dissipates more power? Explain your reasoning. (2 steps)", "answer": "- Step 1: In a parallel circuit, the voltage is the same across both resistors. With $$V$$ constant, use $$P = V^2/R$$: power is *inversely proportional* to resistance ($$P \\propto 1/R$$).\n- Step 2: The 5 Ω resistor has half the resistance, so it dissipates **twice** the power: $$P_{5\\Omega} = V^2/5$$ vs. $$P_{10\\Omega} = V^2/10$$. In parallel, the *lower* resistance draws more current ($$I = V/R$$), so more charge flows through it per second, and more energy is delivered per second.\n\nThis is the opposite of the series case, where the *larger* resistor dissipates more power. Always check: is current fixed (series → $$P \\propto R$$) or voltage fixed (parallel → $$P \\propto 1/R$$)?", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}], "count": 42}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When current flows through a metallic conductor, what happens at the microscopic level that produces heat? Describe the chain of events from electron motion to thermal energy. (3 steps)", "answer": "- Step 1: Conduction electrons drift through a lattice of positive metal ions. As they move, they collide with (\"bash into\") these lattice ions.\n- Step 2: Each collision transfers some of the electron's kinetic energy to the ion. The electron slows down, but is not destroyed or stored — it continues drifting.\n- Step 3: The ion now has more kinetic energy and vibrates with greater amplitude. Increased ionic vibration is, at the atomic level, exactly what we call heat (thermal/internal energy).\n\nThe key insight: electrons are the *carriers* of energy, not the things that heat up. They deliver energy to the lattice ions, and it is the *ions* whose vibration constitutes the temperature rise.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "A student says: \"Electrons enter a resistor faster than they leave it, so charge accumulates inside.\" Why is this statement wrong, and what principle directly contradicts it? (2 steps)", "answer": "- Step 1: Kirchhoff's First Law (conservation of charge) states that the current entering any junction or component equals the current leaving it. Charge cannot be created, destroyed, or accumulated in a steady-state circuit.\n- Step 2: What the resistor *does* is slow each electron down (via collisions with lattice ions), reducing the drift velocity. But the *number* of electrons passing any cross-section per second is the same on both sides — the rate of flow (current) in equals the rate of flow out.\n\nThe resistor dissipates *energy* (electrons lose kinetic energy to the lattice), not *charge*. This is the fundamental distinction between energy transfer and charge conservation.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "Starting from the three fundamental definitions $$P = \\frac{\\Delta W}{\\Delta t}$$, $$I = \\frac{Q}{t}$$, and $$V = \\frac{W}{Q}$$, derive $$P = IV$$. Show every algebraic step. (3 steps)", "answer": "- Step 1: From the definition of potential difference, $$V = \\frac{W}{Q}$$, rearrange to express energy: $$W = QV$$.\n- Step 2: Divide both sides by time $$t$$: $$\\frac{W}{t} = \\frac{Q}{t} \\times V$$.\n- Step 3: Recognise that $$\\frac{W}{t} = P$$ (power) and $$\\frac{Q}{t} = I$$ (current). Substituting: $$P = I \\times V$$.\n\nThis derivation shows that $$P = IV$$ is the *general* power equation — it works for any electrical component, not just resistors. It requires no assumption about Ohm's Law.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Using Ohm's Law ($$V = IR$$) and the general power equation ($$P = IV$$), derive $$P = I^2 R$$. When is this formula the most convenient choice? (2 steps)", "answer": "- Step 1: From Ohm's Law, $$V = IR$$. Substitute this expression for V into $$P = IV$$: $$P = I \\times (IR)$$.\n- Step 2: Simplify: $$P = I^2 R$$.\n\nUse $$P = I^2 R$$ when you *already know* the current $$I$$ and the resistance $$R$$ — it lets you calculate power directly without first finding the voltage. This is also specifically called the **heating-effect formula** because, at constant temperature, the rate of heat transfer from a resistor equals $$I^2 R$$.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "Derive $$P = \\frac{V^2}{R}$$ by substituting Ohm's Law into the general power equation. Then, show the *alternative* derivation that goes through $$P = I^2 R$$ instead. (4 steps)", "answer": "- Step 1: **Method 1 (direct):** From Ohm's Law, $$I = \\frac{V}{R}$$. Substitute into $$P = IV$$: $$P = \\frac{V}{R} \\times V$$.\n- Step 2: Simplify: $$P = \\frac{V^2}{R}$$. Use this when V and R are the known quantities.\n- Step 3: **Method 2 (via $$I^2 R$$):** Start from $$I = \\frac{V}{R}$$ and square both sides: $$I^2 = \\frac{V^2}{R^2}$$.\n- Step 4: Substitute $$I^2$$ into $$P = I^2 R$$: $$P = \\frac{V^2}{R^2} \\times R = \\frac{V^2}{R}$$. The R in the denominator cancels one R from $$R^2$$, leaving a single R in the denominator.\n\nBoth methods arrive at the same result. Method 2 was specifically requested by the student Phuc and demonstrated by the tutor in a lesson — it reinforces that all three power equations are algebraically equivalent.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "A question gives you the current through a resistor and the voltage across it. Which power formula should you reach for, and why is it a poor strategy to first calculate R and then use a different formula? (2 steps)", "answer": "- Step 1: When $$I$$ and $$V$$ are both given directly, use $$P = IV$$ — the general power equation. It requires one multiplication and no intermediate calculation.\n- Step 2: If you instead calculate $$R = V/I$$ first and then use $$P = I^2 R$$ or $$P = V^2/R$$, you have introduced an extra substitution step. Each extra step is a chance for a unit error or arithmetic slip, and examiners may not award full method marks for an unnecessarily roundabout route.\n\nThe principle: identify your *given* quantities first, then select the matching formula. Never substitute a quantity you had to *calculate* into a formula intended for *directly given* values without double-checking.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "A resistor has a constant resistance $$R$$. If the current through it doubles, by what factor does the power change? Explain why. (2 steps)", "answer": "- Step 1: The relevant formula is $$P = I^2 R$$ (since R is fixed and we are changing I). Power is proportional to the *square* of the current: $$P \\propto I^2$$.\n- Step 2: If $$I$$ doubles to $$2I$$, then $$P' = (2I)^2 R = 4I^2 R = 4P$$. Power becomes **four times** larger.\n\nThis quadratic relationship is a frequent MCQ trap. Students often intuitively guess \"double the current → double the power,\" but because $$I$$ is squared, doubling current always *quadruples* power at constant R.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A resistor has a constant resistance $$R$$. If the voltage across it doubles, by what factor does the power change? Then: if the voltage is held constant and the resistance doubles, what happens to power? (3 steps)", "answer": "- Step 1: At constant R, use $$P = \\frac{V^2}{R}$$. Power is proportional to the square of voltage: $$P \\propto V^2$$. If V doubles: $$P' = \\frac{(2V)^2}{R} = \\frac{4V^2}{R} = 4P$$. Power quadruples.\n- Step 2: At constant V, use $$P = \\frac{V^2}{R}$$. Now power is *inversely* proportional to resistance: $$P \\propto \\frac{1}{R}$$. If R doubles: $$P' = \\frac{V^2}{2R} = \\frac{P}{2}$$. Power is **halved**.\n- Step 3: The crucial distinction: which quantity is held constant determines which formula to reason with. Fixed R → use $$I^2 R$$ or $$V^2/R$$ (both give quadratic scaling). Fixed V → use $$V^2/R$$ (inverse). Fixed I → use $$I^2 R$$ (linear in R).", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "At constant current, if resistance doubles, what happens to the power dissipated? Why is this different from what happens at constant voltage? (2 steps)", "answer": "- Step 1: At constant I, use $$P = I^2 R$$. Since $$I^2$$ is fixed, power is directly proportional to R: $$P \\propto R$$. If R doubles, power **doubles**.\n- Step 2: At constant V, use $$P = V^2/R$$. Since $$V^2$$ is fixed, power is inversely proportional to R: $$P \\propto 1/R$$. If R doubles, power **halves**.\n\nThe apparent contradiction resolves when you realise that \"constant I\" and \"constant V\" are physically different situations. At constant I, doubling R requires doubling V (to push the same current through more resistance), so more energy is delivered. At constant V, doubling R means less current flows, so less energy is delivered per second.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "Why is $$P = I^2 R$$ specifically called the \"heating-effect formula,\" and not $$P = IV$$ or $$P = V^2/R$$, even though all three give the same numerical answer for an ohmic resistor? (2 steps)", "answer": "- Step 1: At the microscopic level, the rate of heat generation in a resistor is determined by how many electrons (proportional to I) are colliding with lattice ions and how fast they are drifting (also related to I). The collision rate scales with $$I^2$$ when resistance is fixed, making $$I^2 R$$ the natural expression for resistive heating.\n- Step 2: $$P = IV$$ is the *general* power equation — it applies to *any* component (motors, LEDs, batteries), not just resistors producing heat. $$P = V^2/R$$ is algebraically equivalent to $$I^2 R$$ for ohmic resistors, but its form (voltage squared over resistance) doesn't directly mirror the microscopic collision mechanism.\n\nIn exam answers: use \"heating effect\" language specifically with $$I^2 R$$. For a 3-mark explanation of heating, the key phrases are: \"electrons collide with positive lattice ions,\" \"transfer kinetic energy to ions,\" \"ions vibrate with greater amplitude.\"", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "Derive the three electrical energy formulas $$W = IVt$$, $$W = I^2 Rt$$, and $$W = \\frac{V^2}{R}t$$ from the power equations. (2 steps)", "answer": "- Step 1: Start from the definition $$P = \\frac{W}{t}$$, which rearranges to $$W = Pt$$. This tells us: energy = power × time.\n- Step 2: Substitute each power formula into $$W = Pt$$:\n  + $$P = IV$$ → $$W = IVt$$\n  + $$P = I^2 R$$ → $$W = I^2 Rt$$\n  + $$P = \\frac{V^2}{R}$$ → $$W = \\frac{V^2}{R}t$$\n\nThe pattern: each energy formula is just the corresponding power formula multiplied by time. This means your formula-selection logic for power transfers directly to energy — pick by what you're given (I & V, I & R, or V & R).", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "A student calculates electrical energy by first finding $$Q = It$$, then computing $$E = QV$$. Another student goes straight to $$W = IVt$$. Both get the same number. Which approach is better for exam work and why? (2 steps)", "answer": "- Step 1: The direct method $$W = IVt$$ is one step: multiply the three known quantities. The roundabout method ($$Q = It$$, then $$E = QV$$) is two steps with two substitutions.\n- Step 2: Each extra step introduces a chance for an arithmetic error or a unit mistake. If you accidentally use $$V = E/t$$ instead of $$V = E/Q$$ in the second step, the whole answer is wrong. The direct route avoids this entirely.\n\n**Exam technique rule:** Reach for $$W = Pt$$ or $$W = IVt$$ first. Only use $$E = QV$$ when the charge $$Q$$ is *explicitly given* in the question (e.g., \"a charge of 15 C flows through...\").", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Under what specific circumstance should you use $$E = QV$$ instead of $$W = Pt$$ or $$W = IVt$$ for an energy calculation? (2 steps)", "answer": "- Step 1: Use $$E = QV$$ only when the *charge* $$Q$$ is explicitly stated or directly given in the problem. For example: \"A charge of 20 C flows through a potential difference of 6 V\" — here, $$E = 20 \\times 6 = 120$$ J directly.\n- Step 2: If the question gives current, voltage, and time (or power and time) instead, use $$W = IVt$$ or $$W = Pt$$. Going through $$Q = It$$ first to get charge, then $$E = QV$$, is an unnecessary roundabout route that introduces extra calculation steps.\n\nThe formula $$E = QV$$ comes directly from the definition of potential difference ($$V = E/Q$$ rearranged). It is the fundamental energy-charge relationship, but in practice most exam questions give you I, V, and t rather than Q directly.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Define efficiency for an electrical device, write the formula, and explain what happens to the \"missing\" (non-useful) power. (3 steps)", "answer": "- Step 1: Efficiency is the fraction of total input power that is converted to *useful* output: $$\\eta = \\frac{P_{\\text{useful}}}{P_{\\text{total}}} \\times 100\\%$$.\n- Step 2: For an electrical device, $$P_{\\text{total}} = IV$$ (the electrical power supplied). $$P_{\\text{useful}}$$ is whatever useful work is done — mechanical power for a motor, light output for a lamp, heating output for a kettle.\n- Step 3: The \"missing\" power ($$P_{\\text{total}} - P_{\\text{useful}}$$) is dissipated as heat, typically due to resistive losses in wires and internal resistance. No energy is destroyed (conservation of energy) — it is just transferred to a less useful form.\n\nA filament lamp is only ~10% efficient at converting electrical energy to visible light; ~90% becomes infrared radiation (heat). An LED lamp can be ~80% efficient, which is why replacing filament lamps with LEDs saves so much energy.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "What is a fuse, how does it protect a circuit, and what are the standard UK fuse ratings? (2 steps)", "answer": "- Step 1: A fuse is a thin wire with a specified current rating. If the current flowing through it *exceeds* that rated value, the wire heats up and melts, breaking the circuit and protecting the appliance from damage or fire.\n- Step 2: The standard UK fuse ratings are **3 A, 5 A, and 13 A**. A fuse does *not* limit current to its rating — it simply melts if the current goes above that value. A 13 A fuse allows any current up to 13 A to pass safely.\n\nThe fuse must be chosen so that the *normal operating current* of the appliance is below the fuse rating, but the fuse rating is the *next standard value above* the operating current.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "An electric kettle is rated 240 V, 3.0 kW. Walk through the fuse selection procedure step by step, including the common rearrangement trap. (3 steps)", "answer": "- Step 1: Calculate the normal operating current using $$I = \\frac{P}{V}$$. Note: this is **not** $$I = \\frac{V}{P}$$ — a common slip under pressure. $$I = \\frac{3000}{240} = 12.5$$ A.\n- Step 2: Compare this current to the standard fuse ratings: 3 A (too low — would blow immediately), 5 A (too low), 13 A (above 12.5 A ✓).\n- Step 3: Choose the **13 A fuse** because 12.5 A < 13 A — the fuse will not blow during normal operation, but will blow if a fault causes current to rise significantly above 13 A.\n\nYou must *always* state both the calculated current AND the comparison in your exam answer: \"I = 12.5 A < 13 A, so the 13 A fuse is appropriate.\"", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "A student writes $$R = I \\times V$$ when rearranging Ohm's Law. How do you know this is wrong using a units argument, and what is the correct form? (2 steps)", "answer": "- Step 1: Check the units. Resistance is measured in ohms (Ω). Current × voltage has units A × V = watts (W), which is a unit of *power*, not resistance.\n- Step 2: The correct rearrangement of Ohm's Law ($$V = IR$$) is $$R = \\frac{V}{I}$$. Units: $$\\frac{V}{A} = \\Omega$$, which checks out. Voltage must be the *numerator*.\n\nThis was a specific error the student Phuc made during a lesson. If you catch yourself writing $$R = IV$$, stop immediately — it is always $$R = V/I$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "A student recalls $$V = \\frac{E}{t}$$ for potential difference. Why is this wrong, and where does the \"t\" actually belong? (2 steps)", "answer": "- Step 1: Potential difference is energy per unit *charge*, not per unit time: $$V = \\frac{E}{Q}$$. The unit of V is J/C, not J/s.\n- Step 2: The denominator \"t\" belongs in the *current* definition: $$I = \\frac{Q}{t}$$. Mixing these up gives $$V = E/t$$, which actually describes *power* ($$P = E/t$$), not voltage.\n\nThis confusion between the definitions of voltage and current was another documented error. To keep them straight: **voltage** = energy per charge ($$V = E/Q$$), **current** = charge per time ($$I = Q/t$$), **power** = energy per time ($$P = E/t$$).", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "Convert 250 mW to watts and 40 µA to amperes. Then explain the common prefix trap. (3 steps)", "answer": "- Step 1: **milli** (m) = $$10^{-3}$$. So 250 mW = $$250 \\times 10^{-3}$$ W = **0.25 W**. A common mistake is writing $$250 \\times 10^{-6}$$ W, confusing milli with micro.\n- Step 2: **micro** (µ) = $$10^{-6}$$. So 40 µA = $$40 \\times 10^{-6}$$ A = **4.0 × 10⁻⁵ A** (or 0.000040 A).\n- Step 3: The trap: \"m\" is milli ($$10^{-3}$$) and \"µ\" is micro ($$10^{-6}$$) — they differ by a factor of 1000. Always expand the prefix *before* substituting into a formula. The student Phuc specifically made this error in a lesson (writing 250 mW as 250 × 10⁻⁶ W).\n\nMnemonic: **m**illi is a **m**illisecond (1/1000 s); **µ**icro is a **µ**icrosecond (1/1,000,000 s). If you can remember that a millisecond is \"thousandth\" and a microsecond is \"millionth,\" you won't confuse them.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A 2.0 Ω resistor in a series circuit carries 0.5 A. Calculate the power dissipated in it using the most direct formula, then verify using a different formula. (3 steps)", "answer": "- Step 1: Given I and R → use $$P = I^2 R$$ directly: $$P = (0.5)^2 \\times 2.0 = 0.25 \\times 2.0 = 0.5$$ W.\n- Step 2: Verify by first finding V: $$V = IR = 0.5 \\times 2.0 = 1.0$$ V. Then $$P = IV = 0.5 \\times 1.0 = 0.5$$ W. ✓\n- Step 3: Cross-check with third formula: $$P = V^2/R = 1.0^2/2.0 = 0.5$$ W. ✓ All three formulas agree.\n\nThis demonstrates that formula choice is about *convenience*, not correctness — all three give the same answer for an ohmic resistor. But using the formula that matches your given quantities avoids unnecessary intermediate steps.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Two resistors (6 Ω and 3 Ω) are in parallel with 1.5 V across them. Which power formula should you use for each, and why? Calculate the power in each. (3 steps)", "answer": "- Step 1: Given V (same across both, it's parallel) and R for each → use $$P = V^2/R$$.\n- Step 2: For the 6 Ω resistor: $$P = \\frac{(1.5)^2}{6} = \\frac{2.25}{6} = 0.375$$ W. For the 3 Ω resistor: $$P = \\frac{(1.5)^2}{3} = \\frac{2.25}{3} = 0.75$$ W.\n- Step 3: Notice: the 3 Ω resistor (half the resistance) dissipates *twice* the power. At constant voltage, $$P \\propto 1/R$$ — lower resistance means more current, hence more power. This is the opposite of what happens at constant current (where higher R means more power).\n\nYou can verify currents: $$I_{6\\Omega} = 1.5/6 = 0.25$$ A, $$I_{3\\Omega} = 1.5/3 = 0.50$$ A. Sum = 0.75 A = total current (Kirchhoff's First Law ✓).", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "In a circuit, the total power supplied by the battery should equal the sum of powers dissipated in all resistors. Why must this be true, and what law guarantees it? (2 steps)", "answer": "- Step 1: By conservation of energy, all the electrical energy delivered by the battery per second (its power output) must equal the total energy converted per second in all the resistors. Energy cannot be created or destroyed.\n- Step 2: This is a consequence of Kirchhoff's Second Law (conservation of energy around any closed loop). The battery's EMF provides the total energy; each resistor dissipates its share. If the sums don't match, you have an arithmetic or conceptual error.\n\nThis is a powerful *verification tool*: after calculating individual powers, add them up and compare to $$P_{\\text{battery}} = V_{\\text{battery}} \\times I_{\\text{total}}$$. Any discrepancy indicates a calculation error (or rounding difference).", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "A resistor is labelled \"maximum safe power: 250 mW, resistance: 47 kΩ.\" What is the maximum safe current it can carry? Walk through the reasoning including unit conversion. (3 steps)", "answer": "- Step 1: Convert units first. 250 mW = $$250 \\times 10^{-3}$$ W = 0.25 W. 47 kΩ = $$47 \\times 10^{3}$$ Ω.\n- Step 2: Given P and R → rearrange $$P = I^2 R$$ to solve for I: $$I^2 = \\frac{P}{R} = \\frac{0.25}{47 \\times 10^{3}} \\approx 5.32 \\times 10^{-6}$$ A².\n- Step 3: Take the square root: $$I = \\sqrt{5.32 \\times 10^{-6}} \\approx 2.3 \\times 10^{-3}$$ A = **2.3 mA**.\n\nKey insight: even though the resistance is very large (47 kΩ), the maximum safe current is tiny (2.3 mA) because the power limit is only 250 mW. Exceeding this current would overheat and damage the resistor.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "A filament lamp is rated 240 V, 60 W. At the instant it is switched on, its resistance is only 80 Ω (the filament is cold). Calculate the initial \"surge\" current and power, and explain why filament lamps often blow at switch-on. (3 steps)", "answer": "- Step 1: At switch-on, use the cold resistance: $$I_{\\text{surge}} = \\frac{V}{R_{\\text{cold}}} = \\frac{240}{80} = 3.0$$ A. Compare to the normal operating current: $$I_{\\text{normal}} = \\frac{P}{V} = \\frac{60}{240} = 0.25$$ A.\n- Step 2: The surge current is **12 times** the operating current. Initial power: $$P_{\\text{surge}} = \\frac{V^2}{R_{\\text{cold}}} = \\frac{240^2}{80} = 720$$ W — **12 times** the rated 60 W.\n- Step 3: This massive power surge heats the filament extremely rapidly. The thermal stress at switch-on is why filament lamps most often fail at the moment they are turned on. As the filament heats, its resistance increases (tungsten has a positive temperature coefficient), current drops, and the lamp settles at its rated 60 W.\n\nThe n
