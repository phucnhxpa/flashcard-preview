<script>
const DATA={"selected": [{"question": "Two lamps are connected in series to a 150 V supply. Lamp X has resistance 400 Ω and lamp Y has resistance 100 Ω. Which lamp is brighter, and why? (3 steps)", "answer": "- Step 1: In series, the same current flows through both lamps. At constant current, power is proportional to resistance: $$P = I^2 R$$.\n- Step 2: Since lamp X has 4× the resistance of lamp Y, it dissipates 4× the power: $$P_X = 4 P_Y$$. Lamp X is brighter.\n- Step 3: This may feel counterintuitive — we often associate \"higher resistance\" with \"blocking current.\" But in series, the current is forced through both lamps equally. The higher-resistance lamp drops more voltage ($$V_X = 4V_Y$$), so it converts more energy per charge.\n\nIf the lamps were in *parallel* instead, the result would reverse: at constant voltage, $$P = V^2/R$$, so the *lower*-resistance lamp would dissipate more power and be brighter. Context matters!", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "A filament lamp is rated 240 V, 60 W. At the instant it is switched on, its resistance is only 80 Ω (the filament is cold). Calculate the initial \"surge\" current and power, and explain why filament lamps often blow at switch-on. (3 steps)", "answer": "- Step 1: At switch-on, use the cold resistance: $$I_{\\text{surge}} = \\frac{V}{R_{\\text{cold}}} = \\frac{240}{80} = 3.0$$ A. Compare to the normal operating current: $$I_{\\text{normal}} = \\frac{P}{V} = \\frac{60}{240} = 0.25$$ A.\n- Step 2: The surge current is **12 times** the operating current. Initial power: $$P_{\\text{surge}} = \\frac{V^2}{R_{\\text{cold}}} = \\frac{240^2}{80} = 720$$ W — **12 times** the rated 60 W.\n- Step 3: This massive power surge heats the filament extremely rapidly. The thermal stress at switch-on is why filament lamps most often fail at the moment they are turned on. As the filament heats, its resistance increases (tungsten has a positive temperature coefficient), current drops, and the lamp settles at its rated 60 W.\n\nThe normal operating resistance is $$R_{\\text{hot}} = V/I = 240/0.25 = 960$$ Ω — twelve times the cold resistance. This dramatic change in resistance with temperature is what makes tungsten a *non-ohmic* conductor.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "A resistor is connected across a constant-voltage supply. If its resistance is doubled, what happens to the power it dissipates? Give the factor of change and the equation that explains it. (2 steps)", "answer": "- Step 1: With voltage fixed, use $$P = \\frac{V^2}{R}$$. Power is **inversely proportional** to resistance: $$P \\propto \\frac{1}{R}$$.\n- Step 2: When $$R$$ doubles: $$P_{new} = \\frac{V^2}{2R} = \\frac{P}{2}$$. The power is **halved**.\n\n+ Physical intuition: a larger resistance opposes current more, so less current flows ($$I = V/R$$ halves), and since $$P = VI$$ with $$V$$ constant, halving $$I$$ halves the power. The \"higher resistance = more heating\" intuition only applies when current is fixed (e.g., in a series circuit where the same current flows through all components).", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "Why does $$P = I^2 R$$ specifically earn the title \"heating-effect formula,\" while $$P = IV$$ is called the \"general power formula\"? What is the key difference in what they describe? (2 steps)", "answer": "- Step 1: $$P = IV$$ is **general** — it gives the total electrical power delivered to **any** component (motor, lamp, resistor, speaker). It requires no assumption about Ohm's Law or the nature of the component.\n- Step 2: $$P = I^2 R$$ specifically describes the rate of energy conversion to **heat** in a resistive element. At constant temperature, the rate of heat transfer from a resistor is exactly $$I^2 R$$. This formula explicitly involves resistance, which is the property that causes heating through electron-lattice collisions.\n\n+ A motor receiving $$P = IV$$ electrical power converts some to mechanical work and some to heat. The heat portion alone is $$I^2 R$$ (where $$R$$ is the motor's coil resistance). The difference $$IV - I^2 R$$ is the useful mechanical output.", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "Why is $$P = I^2 R$$ specifically called the \"heating-effect formula,\" given that all three power formulas ($$P = IV$$, $$P = I^2 R$$, $$P = V^2/R$$) give the same numerical answer for an ohmic resistor? (2 steps)", "answer": "- Step 1: The microscopic picture shows that heat is produced by electron–ion collisions. The *rate* of these collisions depends on how many electrons are flowing (current $$I$$) and how frequently each one collides (determined by resistance $$R$$). The formula $$P = I^2 R$$ directly expresses power in terms of these two collision-related quantities — current and resistance — without needing the voltage.\n- Step 2: At constant temperature, the rate of heat transfer from a resistor is *exactly* $$I^2 R$$. This formula makes the physics of heating most transparent: doubling the current quadruples the heating (because $$I$$ is squared), which matches the intuition that twice as many electrons, each colliding twice as often, produce four times the collision energy per second.\n\n$$P = IV$$ is the *general* power formula (works for any component). $$P = I^2 R$$ is the *heating-specific* form because it ties directly to the collision mechanism.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "Two identical bulbs are connected in series across a 150 V supply. Why does each bulb get only half the supply voltage, and why does this make each one *dimmer* than if it were connected alone across 150 V? (3 steps)", "answer": "- Step 1: In series, the same current flows through both bulbs. By Kirchhoff's 2nd Law (conservation of energy), the supply voltage is shared between them — and since they're identical (same $$R$$), each gets 75 V.\n- Step 2: Power dissipated by each bulb: $$P = V^2/R = 75^2/R$$, compared to $$150^2/R$$ if connected alone. So the series-connected bulb dissipates $$1/4$$ the power of the same bulb alone.\n- Step 3: Less dissipated power → less heat in the filament → lower temperature → less visible light. So each bulb is significantly dimmer in series, not just half-as-bright.\n\nTakeaway: $$P \\propto V^2$$, so halving the voltage across a bulb quarters its power output — a strong, non-linear dimming.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "Derive $$P = IV$$ from the three fundamental definitions: $$P = \\Delta W / \\Delta t$$, $$I = Q / t$$, and $$V = W / Q$$. Walk through each substitution. (3 steps)", "answer": "- Step 1: Start from the definition of potential difference: $$V = W/Q$$. Rearrange to get an expression for energy: $$W = QV$$.\n- Step 2: Divide both sides by time $$t$$: $$\\frac{W}{t} = \\frac{Q}{t} \\times V$$.\n- Step 3: Recognise that $$\\frac{W}{t} = P$$ (power is energy per unit time) and $$\\frac{Q}{t} = I$$ (current is charge per unit time). Substituting: $$P = I \\times V$$.\n\nThis is the most general electrical power equation — it applies to *any* component, not just resistors, because it relies only on the definitions of power, current, and voltage, with no assumption about Ohm's Law.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "Why is the energy \"1 kWh\" (one kilowatt-hour) equivalent to $$3.6 \\times 10^6$$ joules, and why do electricity companies use kWh instead of joules? (3 steps)", "answer": "- Step 1: $$1 \\text{ kWh} = 1000 \\text{ W} \\times 3600 \\text{ s} = 3.6 \\times 10^6$$ J — using $$E = Pt$$ with $$P$$ in watts and $$t$$ in seconds.\n- Step 2: Joules are tiny on a household scale: a fridge running for a day consumes ~$$10^7$$ J — awkward to bill in. kWh gives a more human-scale number (a fridge uses ~3 kWh/day).\n- Step 3: kWh is just an energy unit (not power!) — the name \"kilowatt-hour\" describes the *recipe*: \"the energy used when a 1 kW device runs for 1 hour.\"\n\nTakeaway: 1 kWh = 3.6 MJ; it's an energy unit chosen for scale, not a power unit.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "A 6 V battery powers a motor that lifts a 0.6 kg mass by 0.94 m in 7.7 s. The motor draws 0.75 A. Calculate the efficiency of the motor. (Take $$g = 10$$ m/s².) (3 steps)", "answer": "- Step 1: Useful output power (mechanical): $$P_{\\text{out}} = \\frac{mgh}{t} = \\frac{0.6 \\times 10 \\times 0.94}{7.7} = \\frac{5.64}{7.7} \\approx 0.73$$ W.\n- Step 2: Total input power (electrical): $$P_{\\text{in}} = IV = 0.75 \\times 6 = 4.5$$ W.\n- Step 3: Efficiency: $$\\eta = \\frac{P_{\\text{out}}}{P_{\\text{in}}} \\times 100\\% = \\frac{0.73}{4.5} \\times 100\\% \\approx 16\\%$$.\n\nThe remaining 84% is dissipated as heat (resistive losses in the motor windings, friction, air resistance). Real small electric motors are typically only 15–30% efficient, which is why they get warm during operation.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "Explain why doubling the voltage across a fixed resistor quadruples the power, by thinking about *both* the current and the energy each charge carries. (2 steps)", "answer": "- Step 1: Doubling $$V$$ doubles the current too (Ohm's Law: $$I = V/R$$). So twice as many coulombs pass per second.\n- Step 2: Each coulomb now also gains twice the energy crossing the resistor (since $$V$$ doubled). So the power = (rate of charge flow) × (energy per charge) = $$2 \\times 2 = 4$$ times the original. This is the intuitive content of $$P = V^2/R$$: both factors of $$V$$ contribute one factor of 2.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "A 1 W LED and a 60 W filament lamp give roughly the same brightness. What does this tell you about the difference in their conversion mechanisms?", "answer": "Brightness corresponds to *useful light output*, not total power input. If both produce similar visible light, then the LED converts roughly 60× more efficiently. The filament lamp wastes ~90%+ of its 60 W as infrared heat (because incandescence is inherently a broadband thermal process). The LED uses semiconductor electron-hole recombination to emit photons directly in the visible band, with very little going to heat. So total electrical power and useful output power can differ by huge factors when the conversion physics is inefficient.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "At the microscopic level, what physical process inside a metallic conductor is responsible for \"resistance heating,\" and what exactly does \"heat\" mean in this picture? (3 steps)", "answer": "- Step 1: When a current flows, free electrons drift through a stationary lattice of positive metal ions. The electrons aren't moving through empty space — they continually bump into the vibrating lattice ions on their way.\n- Step 2: Each collision transfers some of the electron's kinetic energy to the ion. The ion responds by vibrating with a larger amplitude about its equilibrium position.\n+ Electrons are slowed by the collision but are **not** stored or destroyed — charge in = charge out (Kirchhoff's 1st Law).\n+ The energy lost by electrons doesn't disappear; it becomes vibrational energy of the lattice.\n- Step 3: \"Heat\" at the atomic level **is** that increased random vibration of the ions. So saying \"the resistor heats up\" is literally saying \"the ions vibrate more vigorously.\"\n\nTakeaway: resistive heating = kinetic-energy transfer from drifting electrons to lattice ions via collisions; greater ionic vibration = thermal energy.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "A student says: \"The current entering a resistor is larger than the current leaving it, because some electrons get stuck inside the resistor.\" Explain why this is physically impossible and state the fundamental principle involved. (2 steps)", "answer": "- Step 1: Charge is a conserved quantity — it cannot be created or destroyed. This is formalised in **Kirchhoff's First Law**: the total current entering any junction (or component) equals the total current leaving it ($$\\sum I_{in} = \\sum I_{out}$$).\n- Step 2: A resistor slows electrons down (reduces their drift velocity) through collisions with lattice ions, but it does **not** accumulate or store charge. The same number of electrons per second enter as leave; the resistor dissipates **energy**, not charge.\n\n+ Common exam phrasing: \"electrons are not stored in a resistor — they are slowed down, and the energy they lose becomes heat.\"", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "Two lamps are connected in series across a 150 V supply. Lamp 1 has higher resistance than lamp 2. Which one is brighter, and why does this look counterintuitive?", "answer": "The *higher-resistance* lamp is brighter. In series, both carry the same current $$I$$. So power dissipated in each is $$P = I^2R$$, meaning $$P \\propto R$$ — the bigger resistor dissipates more power. This feels counterintuitive because we associate \"resistance\" with \"blocking energy flow.\" The resolution: the same current is forced through both, and each unit of charge drops more voltage across the bigger resistor (since $$V = IR$$), so more energy is dumped there per second.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "A resistor carries a constant current (e.g., in a series circuit where the same current flows everywhere). If its resistance is doubled, what happens to the power it dissipates? Give the factor of change and the equation. (2 steps)", "answer": "- Step 1: With current fixed, use $$P = I^2 R$$. Power is **directly proportional** to resistance: $$P \\propto R$$.\n- Step 2: When $$R$$ doubles: $$P_{new} = I^2 (2R) = 2P$$. The power **doubles**.\n\n+ Contrast with Q11: the same action (doubling $$R$$) gives the **opposite** result depending on what is held constant. With fixed $$V$$, more $$R$$ → less power. With fixed $$I$$, more $$R$$ → more power. This is a favourite MCQ trap.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "Why is $$P = I^2 R$$ specifically called the \"heating-effect formula,\" and not $$P = IV$$ or $$P = V^2/R$$, even though all three give the same numerical answer for an ohmic resistor? (2 steps)", "answer": "- Step 1: At the microscopic level, the rate of heat generation in a resistor is determined by how many electrons (proportional to I) are colliding with lattice ions and how fast they are drifting (also related to I). The collision rate scales with $$I^2$$ when resistance is fixed, making $$I^2 R$$ the natural expression for resistive heating.\n- Step 2: $$P = IV$$ is the *general* power equation — it applies to *any* component (motors, LEDs, batteries), not just resistors producing heat. $$P = V^2/R$$ is algebraically equivalent to $$I^2 R$$ for ohmic resistors, but its form (voltage squared over resistance) doesn't directly mirror the microscopic collision mechanism.\n\nIn exam answers: use \"heating effect\" language specifically with $$I^2 R$$. For a 3-mark explanation of heating, the key phrases are: \"electrons collide with positive lattice ions,\" \"transfer kinetic energy to ions,\" \"ions vibrate with greater amplitude.\"", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "Why is $$P = V^2/R$$ inappropriate to compare two resistors in *series*, but $$P = I^2R$$ inappropriate to compare two resistors in *parallel*? (2 steps)", "answer": "- Step 1: In series, $$I$$ is the shared quantity — both resistors carry the same current. So $$P = I^2R$$ cleanly separates the resistors by their differing $$R$$. But the voltages across them differ, so $$V^2/R$$ requires you to know each one's individual voltage drop — extra work.\n- Step 2: In parallel, $$V$$ is the shared quantity — both see the same p.d. So $$P = V^2/R$$ cleanly separates them by $$R$$. Their currents differ, so $$I^2R$$ needs individual branch currents — extra work. Match the formula to whichever quantity is *common* across the components being compared.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "A student asks: \"Can I also derive $$P = \\frac{V^2}{R}$$ by starting from $$P = I^2 R$$ instead of $$P = IV$$?\" Show how this alternative derivation works step by step. (3 steps)", "answer": "- Step 1: Start with $$I = \\frac{V}{R}$$ (Ohm's Law rearranged). Square both sides:\n$$I^2 = \\frac{V^2}{R^2}$$\n- Step 2: Substitute this expression for $$I^2$$ into the heating-effect formula $$P = I^2 R$$:\n$$P = \\frac{V^2}{R^2} \\times R$$\n- Step 3: Cancel one factor of $$R$$ from numerator and denominator:\n$$P = \\frac{V^2}{R}$$\n\n+ This alternative route confirms that all three power equations are mathematically equivalent — they are just rearrangements of the same underlying relationship.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "A small heater is rated 12 V, 60 W. If you accidentally connect it to a 24 V supply, by what factor does its initial power dissipation exceed the rated value — and why is this dangerous? (3 steps)", "answer": "- Step 1: Assuming the resistance is approximately constant (it isn't quite, but as a first estimate), $$P = V^2/R$$ with $$R$$ fixed gives $$P \\propto V^2$$. Doubling $$V$$ quadruples $$P$$.\n- Step 2: So the heater would attempt to dissipate ~240 W instead of 60 W — four times the rated thermal load.\n- Step 3: The element isn't designed to dissipate that much heat; it would overheat rapidly, potentially melting the heating element, damaging insulation, or starting a fire. This is exactly why appliances have voltage ratings and fuses sized for them.\n\nTakeaway: $$P \\propto V^2$$ means small overvoltages cause disproportionately large power surges — a major safety concern.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Why must total power supplied by the battery equal the sum of powers dissipated in all components (in a circuit with negligible internal resistance)?", "answer": "Conservation of energy. The battery is the only energy source, converting chemical to electrical at a rate $$P_\\text{batt} = V_\\text{batt} I_\\text{batt}$$. Every joule it supplies per second must end up somewhere — and in a circuit of pure resistors, it's all dissipated as heat. So $$P_\\text{batt} = \\sum P_\\text{resistor}$$. Any discrepancy in worked problems is purely arithmetic/rounding error, not real physics.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "A 12 V supply drives a 2.8 Ω series resistor in series with a parallel pair (4 Ω and an unknown $$R_x$$). The 4 Ω carries 1.5 A. Without doing the final arithmetic, explain the *strategy* for finding the power dissipated in each component. (5 steps)", "answer": "- Step 1: Find the p.d. across the 4 Ω: $$V_4 = IR = 1.5 \\times 4 = 6$$ V.\n- Step 2: Parallel branches share this 6 V, so $$V_{R_x} = 6$$ V. The series resistor then has the remainder: $$V_{2.8} = 12 - 6 = 6$$ V.\n- Step 3: Total current = current through 2.8 Ω = $$6/2.8 \\approx 2.14$$ A. By Kirchhoff's First Law, $$I_x = 2.14 - 1.5 \\approx 0.64$$ A, so $$R_x = 6/0.64 \\approx 9.4$$ Ω.\n- Step 4: Now pick the power formula by what's directly known per component:\n+ 2.8 Ω: use $$P = I^2R$$ with $$I_T$$\n+ 4 Ω: use $$P = VI$$ (both given)\n+ $$R_x$$: use $$P = V^2/R$$ (cleanest)\n- Step 5: Cross-check: sum of these powers should match $$P_\\text{supply} = V_\\text{batt} \\times I_T \\approx 12 \\times 2.14$$.\n\nTakeaway: in mixed circuits, work the resistances first, then pick the most direct power formula per component.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "A student is asked to calculate the power supplied by a battery in a circuit. They multiply the current by a resistor's voltage drop instead of the battery's EMF. Will this give the correct answer for the battery's power? Why or why not? (2 steps)", "answer": "- Step 1: No, this gives the power dissipated *in that specific resistor*, not the power supplied by the battery. The resistor's voltage is only a portion of the total EMF (unless it is the only component in the circuit).\n- Step 2: The battery supplies energy at a rate determined by its *own* voltage (EMF) and the total current: $$P_{\\text{battery}} = \\mathcal{E} \\times I_T$$. Using a resistor's voltage gives only the fraction of power delivered to that resistor. To find total battery power, you must use the battery's full voltage.\n\nThis was a specific error observed in a lesson — always distinguish between \"voltage across a component\" and \"voltage of the supply.\"", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "Why can't you simply add resistances $$R_1 + R_2$$ to combine resistors in *parallel* — and what fundamental conservation law tells you that combinations work differently in parallel vs. series?", "answer": "- Step 1: In series, voltages add ($$V = V_1 + V_2$$, from energy conservation around the loop). Since $$I$$ is common, $$IR_T = IR_1 + IR_2$$ → $$R_T = R_1 + R_2$$.\n- Step 2: In parallel, *currents* add ($$I_T = I_1 + I_2$$, from charge conservation at the junction). Since $$V$$ is common, $$V/R_T = V/R_1 + V/R_2$$ → $$1/R_T = 1/R_1 + 1/R_2$$.\n- Step 3: The key is: identify the *shared* quantity (current in series, voltage in parallel), then start the proof from the *summed* quantity. This is why parallel combination uses reciprocals — you're summing currents, which produce reciprocal-resistance terms via Ohm's Law.\n\nTakeaway: series = \"voltages add\" (energy conservation); parallel = \"currents add\" (charge conservation). The math falls out accordingly.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Define the efficiency of an electrical device and explain what \"useful\" vs \"total\" power means in the context of, say, an electric motor lifting a load.", "answer": "Efficiency is the fraction (or percentage) of input power that is converted into the *desired* output form: $$\\eta = (P_\\text{useful}/P_\\text{total}) \\times 100\\%$$. For an electric motor lifting a mass, $$P_\\text{total}$$ is the electrical power supplied ($$P = IV$$), while $$P_\\text{useful}$$ is the mechanical power output ($$mgh/t$$ for lifting). The shortfall — the rest of the energy — is dissipated as heat in the motor windings (due to $$I^2R$$), as sound, and in friction. Efficiency is dimensionless because it's a ratio of two powers.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Why is it conceptually meaningful to talk about energy being \"dissipated\" in a resistor rather than \"stored\" or \"lost\"?", "answer": "\"Dissipated\" literally means \"scattered\" — the energy doesn't vanish (energy is conserved), but it becomes spread out among the disordered thermal motion of countless lattice ions. It can't easily be recovered as useful work, because organising a sea of random vibrations back into directed electron motion is thermodynamically very expensive (second law). \"Lost\" misleadingly suggests violation of conservation; \"stored\" suggests retrievability. \"Dissipated\" captures both: still present as heat, but degraded.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "The symbol \"W\" appears in both electrical formulas and unit labels. How do you distinguish between \"W\" meaning work/energy and \"W\" meaning watts in printed text and in formulas? (2 steps)", "answer": "- Step 1: In printed textbook text, the convention is: *italic* **W** = the physical quantity work (measured in joules). Upright **W** = the unit watts. For example: \"$$W = 50$$ W\" means \"the work done is 50 joules per second of power times time.\"\n- Step 2: In handwritten exam work, you cannot rely on font style. The safest approach is to always write the *unit* next to the *numerical value* and use the symbol W only for the quantity: e.g., \"$$W = 33$$ J\" (not \"$$W = 33$$ W\", which would be confusing). When writing power, use \"$$P = 3.0$$ W.\"\n\nThe textbook explicitly warns about this ambiguity. In practice, the context usually makes it clear: if W appears in a formula like $$W = IVt$$, it means energy (work). If it appears after a number, it's the unit of power.", "source": "GLM 5.1 ③", "_id": "glm_3_43"}, {"question": "Define the efficiency of an electrical device and explain why the input power is always $$IV$$ but the useful output power can vary in form. (3 steps)", "answer": "- Step 1: Efficiency is $$\\eta = (P_{\\text{useful}}/P_{\\text{total}}) \\times 100\\%$$ — the fraction of input electrical power that comes out in the desired form, expressed as a percentage.\n- Step 2: $$P_{\\text{total}} = IV$$ because *all* devices draw electrical input as current at a given p.d. — that's the universal electrical input.\n- Step 3: But $$P_{\\text{useful}}$$ depends on the device's purpose:\n+ Motor: useful output = mechanical power (force × velocity, or lifted-weight × velocity).\n+ Bulb: useful output = visible light power.\n+ Heater: useful output = thermal power (here efficiency is often ~100%!).\n+ The remainder ($$P_{\\text{total}} - P_{\\text{useful}}$$) is wasted, almost always as heat.\n\nTakeaway: input is always electrical, but \"useful\" is context-dependent — that's why a heater can be \"100% efficient\" while a filament bulb is ~10%.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "Three different power formulas exist for resistors. Are there *physically* three different things going on, or just one phenomenon expressed three ways?", "answer": "Just one phenomenon, three views. The underlying physics is: charges (carrying energy $$E = QV$$) flow through the resistor and dump energy via lattice collisions. The rate of energy transfer is $$P = E/t$$, which becomes $$P = IV$$. Ohm's Law then lets you swap one of $$I, V$$ for the other via $$R$$, giving $$P = I^2R$$ or $$P = V^2/R$$. All three are mathematically equivalent — choosing one is a matter of *what's most directly known*, not what physics applies.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "Why is electrical heating power proportional to $$I^2$$ rather than $$I$$, even though \"more current = more heating\" sounds linear? (3 steps)", "answer": "- Step 1: Yes, more current means more electrons per second hitting the lattice ions — that's one factor of $$I$$.\n- Step 2: But by Ohm's Law, driving more current through a fixed resistance also requires a higher voltage: $$V = IR$$. So each electron travels through a *larger* potential drop, losing more energy per collision sequence. That's the second factor of $$I$$.\n- Step 3: Combining both effects: total power = (electrons per second) × (energy per electron) ∝ $$I \\times I = I^2$$. Hence the $$I^2$$ dependence.\n\nTakeaway: the quadratic comes from two compounding linear effects — more carriers per second AND more energy per carrier.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "For two resistors in parallel across a common branch voltage, why is $$P = V^2/R$$ the natural formula for each — and what does this say about how power *splits* between unequal parallel resistors? (3 steps)", "answer": "- Step 1: Parallel branches share the same potential difference $$V$$. So $$V$$ is identical for each — and once you know the resistances, $$P = V^2/R$$ for each branch is a one-step calculation.\n- Step 2: Since $$V$$ is common and $$P \\propto 1/R$$, the *smaller* resistor dissipates *more* power: $$P_1/P_2 = R_2/R_1$$.\n+ Example: 3 Ω and 6 Ω in parallel at 1.5 V → $$P_3 = 0.75$$ W, $$P_6 = 0.375$$ W. The 3 Ω resistor dissipates twice as much.\n- Step 3: Intuition: at fixed voltage, less resistance lets more current flow → more collisions per second → more heating.\n\nTakeaway: in parallel, smaller R dissipates more power; the ratio is the inverse of the resistance ratio.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "In a circuit, why must the total power dissipated across all resistors equal the power supplied by the battery, even when the resistors are a complex series-parallel mix? (3 steps)", "answer": "- Step 1: The battery transfers electrical energy to charges at a rate $$P_{batt} = V_{batt} \\times I_T$$.\n- Step 2: Conservation of energy: energy is neither created nor destroyed. Every joule the battery delivers must end up somewhere — and in a purely resistive circuit, everything ends up as heat in the resistors (no mechanical work, no storage).\n- Step 3: Therefore $$\\sum P_{resistors} = P_{batt}$$, regardless of topology. This is also why discrepancies between summed resistor powers and battery power signal a rounding error in your working — they should match exactly in the absence of rounding.\n\nTakeaway: power conservation is a strict equality and an excellent cross-check for circuit calculations.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "Two students compute the power in a 2 Ω resistor carrying 3 A. Student A uses $$P = I^2R$$. Student B first finds $$V = IR = 6$$ V, then uses $$P = V^2/R$$. They get the same answer — so why does it matter which method is \"preferred\"?", "answer": "Both are algebraically equivalent, so they must give the same answer. The preference is about *exam hygiene*: using directly-given values ($$I$$ and $$R$$ here) means one calculation step and one chance for an arithmetic/rounding error. Student B introduces an intermediate $$V$$ which is an extra opportunity to slip on units, sig figs, or rounding. The shortest substitution path is also the safest.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "A common misconception is that a resistor \"stores\" or \"consumes\" electrons (e.g., 10 electrons go in, 1 comes out). Why is this wrong, and what *does* the resistor do? (3 steps)", "answer": "- Step 1: Charge is conserved at every junction and through every component (Kirchhoff's 1st Law). The number of electrons entering a resistor per second equals the number leaving — there's no storage and no destruction.\n- Step 2: What changes is the electrons' *kinetic energy* and *drift speed*. They collide repeatedly with lattice ions, transferring kinetic energy and slowing their drift.\n- Step 3: So if the current drops from \"10 e⁻/s\" to \"1 e⁻/s\" across a resistor in a steady state, that's impossible — the current must be the *same* through a series component. What the resistor does is dissipate energy: same number of electrons pass through, but they emerge having delivered some of their energy to the lattice (which becomes heat).\n\nTakeaway: resistors are energy dissipators, not charge reservoirs. Current in = current out.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "An LED dissipates 4 W and provides as much useful light as a 50 W halogen lamp. Estimate the efficiency improvement and reason about where the saved energy \"would have\" gone in the halogen case. (2 steps)", "answer": "- Step 1: If the useful light output is roughly the same, then the LED uses ~4/50 = 8% of the energy of the halogen for the same outcome. The halogen wastes most of its 50 W input.\n- Step 2: In the halogen, most of the 50 W goes into heating the filament and surroundings — infrared radiation and direct heat conduction. The LED avoids this thermal pathway by generating visible photons directly via semiconductor processes. The \"saved\" 46 W per lamp doesn't have to be supplied at all — it's not just shifted to a different form; it never needs to be drawn from the grid.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "At constant current, if resistance doubles, what happens to the power dissipated? Why is this different from what happens at constant voltage? (2 steps)", "answer": "- Step 1: At constant I, use $$P = I^2 R$$. Since $$I^2$$ is fixed, power is directly proportional to R: $$P \\propto R$$. If R doubles, power **doubles**.\n- Step 2: At constant V, use $$P = V^2/R$$. Since $$V^2$$ is fixed, power is inversely proportional to R: $$P \\propto 1/R$$. If R doubles, power **halves**.\n\nThe apparent contradiction resolves when you realise that \"constant I\" and \"constant V\" are physically different situations. At constant I, doubling R requires doubling V (to push the same current through more resistance), so more energy is delivered. At constant V, doubling R means less current flows, so less energy is delivered per second.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "Why is it specifically $$P = I^2R$$ that's labelled the \"heating effect\" formula, even though $$P = IV$$ and $$P = V^2/R$$ give the same power numerically?", "answer": "- Step 1: All three formulas yield identical power for a given resistor — they are algebraic rearrangements via Ohm's Law. So numerically, no preference exists.\n- Step 2: But $$P = I^2R$$ explicitly ties power to (a) the current of charges flowing and (b) the resistance — the very quantities that govern *how many collisions per second* occur between electrons and ions.\n+ More current → more electrons per second crashing into ions.\n+ More resistance → more collisions per electron per metre travelled.\n- Step 3: So $$P = I^2R$$ is the version that mirrors the *microscopic mechanism* of heating: it's the formula whose variables most directly correspond to what's physically generating the thermal energy.\n\nTakeaway: it's a conceptual label, not a numerical one — \"heating effect\" emphasizes the causal link to collisions.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "For two resistors in series, which one dissipates more power — the larger or smaller — and why is this exactly opposite to the parallel case? (3 steps)", "answer": "- Step 1: In series, current $$I$$ is the same through both resistors. With $$I$$ fixed and $$P = I^2R$$, the *larger* resistor dissipates *more* power.\n- Step 2: Ratio: $$P_1/P_2 = R_1/R_2$$ (direct proportion to resistance).\n+ Example: 3 Ω and 5 Ω in series at 2 A → $$P_3 = 12$$ W, $$P_5 = 20$$ W. Larger resistor dissipates more.\n- Step 3: Why opposite to parallel? In parallel, common quantity is voltage, and $$P = V^2/R$$ gives $$P \\propto 1/R$$. In series, common quantity is current, and $$P = I^2R$$ gives $$P \\propto R$$. The shared quantity decides the proportionality.\n\nTakeaway: identify what's shared (current in series, voltage in parallel), and the proportionality of power follows.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "When current flows through a metallic conductor, what happens at the microscopic level that produces heat? Describe the chain of events from electron motion to thermal energy. (3 steps)", "answer": "- Step 1: Conduction electrons drift through a lattice of positive metal ions. As they move, they collide with (\"bash into\") these lattice ions.\n- Step 2: Each collision transfers some of the electron's kinetic energy to the ion. The electron slows down, but is not destroyed or stored — it continues drifting.\n- Step 3: The ion now has more kinetic energy and vibrates with greater amplitude. Increased ionic vibration is, at the atomic level, exactly what we call heat (thermal/internal energy).\n\nThe key insight: electrons are the *carriers* of energy, not the things that heat up. They deliver energy to the lattice ions, and it is the *ions* whose vibration constitutes the temperature rise.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "A student argues: \"In a parallel circuit, the voltage is the same everywhere, including across the series resistor.\" Explain why this is wrong, using the concept of voltage drops around a closed loop. (2 steps)", "answer": "- Step 1: In a circuit with both series and parallel sections, the **parallel branches** share the same voltage (by Kirchhoff's Second Law applied around each branch loop). But the series resistor has its **own** voltage drop.\n- Step 2: By Kirchhoff's Second Law for the main loop: $$V_{supply} = V_{series} + V_{parallel}$$. The series resistor \"uses up\" some of the supply voltage before it reaches the parallel section. The parallel section only gets what remains.\n\n+ Phuc's documented confusion: conflating \"voltage is the same across parallel branches\" with \"voltage is the same everywhere in the circuit.\" Voltage is only the same across components that are **directly in parallel** with each other — not across series components that precede them.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "When deriving the combined resistance formula for parallel circuits, a student starts by writing $$R_T = R_1 + R_2$$ and substituting Ohm's Law. They get stuck with a messy fraction. What should the correct starting point be, and why? (2 steps)", "answer": "- Step 1: The correct starting point for a parallel derivation is **$$I_T = I_1 + I_2$$** — the quantity that *adds up* in parallel is current (by Kirchhoff's First Law / conservation of charge). Starting with $$R_T = R_1 + R_2$$ is the series approach and leads to a dead end.\n- Step 2: The general principle: start the derivation with the quantity that is conserved or summed in that configuration. In **series**, voltage adds ($$V_T = V_1 + V_2$$), so start there. In **parallel**, current adds ($$I_T = I_1 + I_2$$), so start there. Then substitute Ohm's Law and simplify. For parallel: $$V_T/R_T = V_1/R_1 + V_2/R_2$$. Since $$V_T = V_1 = V_2$$ in parallel, voltage cancels, giving $$1/R_T = 1/R_1 + 1/R_2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "A student reasons: \"Current is the same everywhere in a series circuit, and voltage is energy per charge, so voltage must also be the same everywhere in a series circuit.\" Identify the flaw in this logic. (2 steps)", "answer": "- Step 1: The student's starting premise is correct: current is the same everywhere in series (by conservation of charge), and voltage is indeed energy per charge ($$V = E/Q$$). But the conclusion does not follow.\n- Step 2: The flaw is that \"same charge\" does not mean \"same energy.\" Each unit of charge (each \"Charlie the Coulomb\") carries a certain amount of energy out of the battery. As it passes through each resistor, it *loses* some of that energy to the resistor. The *number* of charges per second (current) is conserved, but the *energy per charge* (voltage) decreases at each component. That is exactly why $$V_T = V_1 + V_2 + \\ldots$$ in series — the total energy per charge delivered by the battery equals the sum of energy per charge lost at each resistor.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "A resistor has a constant resistance $$R$$. If the voltage across it doubles, by what factor does the power change? Then: if the voltage is held constant and the resistance doubles, what happens to power? (3 steps)", "answer": "- Step 1: At constant R, use $$P = \\frac{V^2}{R}$$. Power is proportional to the square of voltage: $$P \\propto V^2$$. If V doubles: $$P' = \\frac{(2V)^2}{R} = \\frac{4V^2}{R} = 4P$$. Power quadruples.\n- Step 2: At constant V, use $$P = \\frac{V^2}{R}$$. Now power is *inversely* proportional to resistance: $$P \\propto \\frac{1}{R}$$. If R doubles: $$P' = \\frac{V^2}{2R} = \\frac{P}{2}$$. Power is **halved**.\n- Step 3: The crucial distinction: which quantity is held constant determines which formula to reason with. Fixed R → use $$I^2 R$$ or $$V^2/R$$ (both give quadratic scaling). Fixed V → use $$V^2/R$$ (inverse). Fixed I → use $$I^2 R$$ (linear in R).", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "Conceptually, why do two power formulas $$P = I^2R$$ and $$P = V^2/R$$ give *opposite* dependences on $$R$$ (one rises with R, one falls with R)? Aren't they both just power in a resistor? (3 steps)", "answer": "- Step 1: They're the same physics, just *which other variable is held fixed* differs. They describe different scenarios.\n- Step 2: $$P = I^2R$$ at fixed $$I$$: bigger $$R$$ → more energy dissipated per electron → more power. (Series scenario: current is constrained to be a specific value by the rest of the circuit.)\n- Step 3: $$P = V^2/R$$ at fixed $$V$$: bigger $$R$$ → smaller current $$I = V/R$$ → fewer collisions per second → less power. (Parallel/rated-voltage scenario: voltage is the constraint.)\n+ Both are correct; they highlight which is the \"knob you turn\" and which is the \"consequence.\"\n\nTakeaway: the two formulas describe the same physical resistor but answer different what-if questions depending on what's held constant.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "Why is P = IV the general formula for power, while P = I²R and P = V²/R are specialized cases? (3 steps)", "answer": "- Step 1: P = IV comes directly from definitions of power (P = E/t), current (I = Q/t), and voltage (V = E/Q). It applies universally because it doesn't assume Ohm's Law.  \n- Step 2: P = I²R is derived by substituting V = IR (Ohm's Law) into P = IV. It's valid only for ohmic resistors where V ∝ I.  \n- Step 3: P = V²/R comes from substituting I = V/R into P = IV. Like P = I²R, it requires Ohmic behavior. Both specialized formulas highlight the square dependence on current/voltage for heating effects.  \n\n[Takeaway: Use P = IV when component isn't ohmic; use squared terms when R is constant and I or V is known.]", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "A kettle draws 12.5 A in normal use. The available fuses are 3 A, 5 A, 13 A, and 30 A. Which fuse do you fit, and what would go wrong with each of the others?", "answer": "- Step 1: Fit the **13 A fuse** — it's the smallest standard rating above 12.5 A.\n- Step 2: Consequences of wrong choices:\n+ 3 A or 5 A: would blow instantly under normal operation (current exceeds rating).\n+ 30 A: kettle would run, but a fault (e.g., short circuit) could let a dangerously large current flow before the fuse melts — appliance/cable could overheat or catch fire.\n- Step 3: The principle: closest rating *above* normal current strikes the balance between (a) not nuisance-tripping, (b) tripping promptly on faults.\n\nTakeaway: fuse selection is a tight upper-bound problem, not a \"close enough\" problem.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "A 47 kΩ resistor has a maximum safe power rating of 250 mW. Conceptually (no full arithmetic), what determines the maximum safe current, and why is $$P = I^2R$$ the natural choice here? (3 steps)", "answer": "- Step 1: \"Safe power\" is the upper limit on dissipation before the resistor overheats and is damaged. You want the largest current that stays under that limit.\n- Step 2: $$R$$ is given and $$P_{max}$$ is given — so use $$P = I^2R$$, rearranged to $$I_{max} = \\sqrt{P_{max}/R}$$. No need to know voltage.\n- Step 3: Order of magnitude check: $$P/R = 250 \\times 10^{-3} / (47 \\times 10^3) \\approx 5 \\times 10^{-6}$$, so $$I \\approx \\sqrt{5 \\times 10^{-6}} \\approx 2$$ mA. A clearly small, milliamp-scale current — sensible for a high-resistance component.\n\nTakeaway: when $$P$$ and $$R$$ are given and $$I$$ is sought, $$P = I^2R$$ rearranged is the direct route.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "A 230 V hair-dryer is rated 2000 W. Should it be fitted with a 5 A or a 13 A fuse, and explain the reasoning in terms of both normal and fault conditions. (3 steps)", "answer": "- Step 1: Normal operating current: $$I = P/V = 2000/230 \\approx 8.7$$ A.\n- Step 2: 5 A fuse would blow during normal use (8.7 > 5), so the dryer wouldn't run. Reject.\n- Step 3: 13 A fuse allows normal operation (8.7 < 13) but cuts off at higher fault currents (e.g., a short circuit could push current well above 13 A, blowing the fuse and protecting the device). So fit the 13 A fuse — it's the next standard rating above operating current.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "When deriving the formula for total resistance in parallel (1/RT = 1/R1 + 1/R2), why do we start with the current equation rather than the voltage equation?", "answer": "- In parallel circuits, current splits (adds up) at junctions: IT = I1 + I2. Voltage is the same across parallel branches.\n- The derivation must start with the quantity that is conserved/summed in that configuration:\n  + Series: start with voltage (V_T = V1 + V2) because voltage adds\n  + Parallel: start with current (I_T = I1 + I2) because current adds\n- Starting with the wrong quantity leads to an unworkable derivation.\n\n+ This is a key exam technique: knowing which Kirchhoff law to apply based on circuit topology.", "source": "MiniMax ②", "_id": "minimax_2_31"}, {"question": "A 3 V battery drives a 2 Ω resistor in series with a parallel combination of 6 Ω and 3 Ω resistors. The parallel resistance works out to 2 Ω, giving a total resistance of 4 Ω and total current of 0.75 A. The voltage across the parallel section is 1.5 V. Which power formula is most direct for (a) the 2 Ω series resistor, and (b) each parallel resistor? (3 steps)", "answer": "- Step 1: For the **2 Ω series resistor**, you know the current ($$I_T = 0.75$$ A, same everywhere in series) and the resistance. Use $$P = I^2 R$$: $$P = (0.75)^2 \\times 2 = 1.125$$ W. No need to find voltage first.\n- Step 2: For the **parallel resistors**, you know the voltage across the parallel section ($$V = 1.5$$ V, same across both branches) and each resistance. Use $$P = V^2 / R$$: for the 6 Ω, $$P = (1.5)^2 / 6 = 0.375$$ W; for the 3 Ω, $$P = (1.5)^2 / 3 = 0.75$$ W.\n- Step 3: Verification — the total power should equal the battery's output: $$P_{\\text{battery}} = V_{\\text{battery}} \\times I_T = 3 \\times 0.75 = 2.25$$ W. Sum of individual powers: $$1.125 + 0.375 + 0.75 = 2.25$$ W. ✓ Conservation of energy holds.\n\nThis example shows how choosing the right formula for each sub-circuit avoids unnecessary intermediate calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "A resistor in series with two parallel branches carries the *total* current. To find the power it dissipates, which formula is most efficient, and why is using $$P = V^2/R$$ awkward here? (3 steps)", "answer": "- Step 1: A series resistor sees the total circuit current $$I_T$$, which is usually known or easy to find from $$V_{supply}/R_{total}$$. Its resistance is given.\n- Step 2: With $$I$$ and $$R$$ both directly available, $$P = I^2R$$ is the one-step choice.\n- Step 3: Using $$P = V^2/R$$ would require first computing the voltage drop across the series resistor — an extra step that depends on knowing the total current anyway. Why detour?\n\nTakeaway: identify what's *already* known about the component; pick the formula that consumes those quantities directly.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "Why does a kilowatt-hour (kW·h) equal 3.6 MJ, and why is this unit used for electricity bills rather than joules?", "answer": "$$1\\text{ kW} \\cdot 1\\text{ h} = 1000\\text{ W} \\times 3600\\text{ s} = 3{,}600{,}000\\text{ J} = 3.6\\text{ MJ}$$. Electricity companies use kW·h because typical household consumption (hundreds to thousands of joules per second over hours) gives convenient numbers in kW·h (e.g., 10 kW·h/day) instead of unwieldy megajoules (36 MJ/day). It's a units-of-convenience choice; the underlying physics is the same energy in joules.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Why is $$E = QV$$ usually a *roundabout* way to find electrical energy when the question gives you current, voltage, and time?", "answer": "$$E = QV$$ requires you first to compute $$Q = It$$, then multiply by $$V$$ — two steps and two chances to slip. But $$W = IVt$$ gives the answer in *one* substitution. Algebraically they're identical (since $$Q = It$$ means $$QV = IVt$$), but unless $$Q$$ is given explicitly in the question, going via $$Q$$ is just extra work. Reserve $$E = QV$$ for the case where charge $$Q$$ is stated as a given.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "Why is the dimensional unit of the volt $$\\text{kg} \\cdot \\text{m}^2 / (\\text{s}^3 \\cdot \\text{A})$$ in SI base units — and what does this tell you about voltage's relationship to mechanical quantities? (3 steps)", "answer": "- Step 1: Voltage is energy per charge: $$V = E/Q$$, so units are J/C.\n- Step 2: The joule in SI base units is $$\\text{kg} \\cdot \\text{m}^2 / \\text{s}^2$$ (from $$E = \\frac{1}{2}mv^2$$ or work = force × distance). The coulomb is $$\\text{A} \\cdot \\text{s}$$ (from $$Q = It$$).\n- Step 3: So $$\\text{V} = \\text{J/C} = (\\text{kg} \\cdot \\text{m}^2/\\text{s}^2) / (\\text{A} \\cdot \\text{s}) = \\text{kg} \\cdot \\text{m}^2 \\cdot \\text{s}^{-3} \\cdot \\text{A}^{-1}$$. This shows electrical and mechanical quantities are deeply linked: voltage is literally \"mechanical work per unit charge,\" and the SI base units make that explicit.\n\nTakeaway: SI base units reveal that voltage = mechanical-energy-per-charge — a hidden connection between electricity and mechanics.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "A filament lamp delivers only about 10% of its electrical input as visible light. Where does the other 90% go, and why is this called \"inefficient\" despite no energy being lost? (3 steps)", "answer": "- Step 1: The 90% becomes thermal radiation (infrared) and conducted heat — i.e., it warms the surroundings rather than illuminating them.\n- Step 2: Energy is *conserved*: nothing is destroyed. But energy in a useless form (infrared, conducted heat) doesn't fulfill the device's purpose (illumination).\n- Step 3: Efficiency measures the *fraction of energy in the desired form*, not whether energy is conserved. A filament bulb wastes most input as heat → low efficiency by design (it lights up *because* it's hot, but most of the heating-effect energy never becomes visible light).\n\nTakeaway: \"inefficient\" means most energy ends up in an unwanted form, not that energy disappears.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "A 100 W and a 60 W bulb are both rated for 240 V. Without computing exact resistance values, explain which bulb has the higher resistance and why this is counterintuitive.", "answer": "- Step 1: Both operate at the same voltage (240 V). With $$P = V^2/R$$, $$P \\propto 1/R$$ at fixed $$V$$. So the *higher-power* bulb has *lower* resistance.\n- Step 2: Therefore the **60 W bulb has the higher resistance** — counterintuitive because \"more resistance\" sounds like \"more heating effect\" by analogy with $$P = I^2R$$.\n- Step 3: The resolution: at fixed voltage, higher resistance means less current, and the reduction in $$I$$ overpowers the increase in $$R$$ in the $$I^2R$$ heating calculation. Equivalently, $$V^2/R$$ falls as $$R$$ rises.\n\nTakeaway: at fixed voltage (the household rating), brighter (higher-power) bulbs have *lower* resistance.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Why is voltage *not* the same everywhere in a series circuit, even though current is — and what does this tell you about the difference between charge and energy? (2 steps)", "answer": "- Step 1: Current is the rate of flow of charge. Since charges can't be created or destroyed and can't pile up, the same number of charges per second pass every point in a series loop — current is uniform.\n- Step 2: Voltage is the *energy per unit charge*. As a charge crosses a component, it transfers some of its energy to that component (as heat in a resistor, light in a bulb, etc.). So the energy-per-charge progressively drops across each component, even though the *number* of charges per second is unchanged. Charge is conserved; energy is dissipated.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Explain why power transmission lines use very high voltages. How does this relate to P = I²R losses?", "answer": "- Power transmitted P = IV is fixed by demand. To minimize power losses (dissipated as heat in the transmission lines), we want to minimize current I.\n- Since P = IV, for fixed power, if we double the voltage, the current halves.\n- The power lost in the lines is P_loss = I²R — so halving the current reduces losses by a factor of 4.\n\n+ This is why national grids transmit at hundreds of kilovolts, then use transformers to step down to safe household voltages.", "source": "MiniMax ②", "_id": "minimax_2_25"}, {"question": "Why does a fuse with a rating *much higher* than the operating current provide poor protection, even though it won't blow during normal operation? (2 steps)", "answer": "- Step 1: A fuse protects against *fault* conditions (short circuits, component failures) where the current rises far above normal. It must blow *before* the fault current causes damage or fire.\n- Step 2: If the fuse rating is much higher than the operating current, a large fault current could flow for a long time before the fuse reaches its melting point. For example, a 30 A fuse on a 7 A appliance would allow a 25 A fault current to flow without blowing — potentially causing overheating, melting insulation, or fire.\n\nThe rule: choose the **next standard rating above** the operating current. Not the highest available, not one that's \"close enough\" — the next one up. This provides both normal-operation compatibility and fault protection.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "For a fixed voltage source, if you double the resistance of a load, what happens to the power dissipated in it — and why is this the opposite of the \"fixed current\" case? (3 steps)", "answer": "- Step 1: With $$V$$ fixed, the relevant formula is $$P = V^2/R$$. Power is **inversely** proportional to $$R$$.\n- Step 2: Doubling $$R$$ ⇒ power **halves**.\n- Step 3: The opposite happens at fixed current: $$P = I^2R$$ with $$I$$ fixed gives $$P \\propto R$$, so doubling $$R$$ **doubles** power.\n+ Physical reason: at fixed $$V$$, raising $$R$$ chokes off the current → fewer collisions per second.\n+ At fixed $$I$$, raising $$R$$ means each electron experiences more resistance → more energy dissipated per electron.\n\nTakeaway: whether more resistance means more or less heating depends entirely on what's being held constant — voltage or current.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Why is it generally cleaner to compute total power from the supply as $$P_\\text{total} = V_\\text{supply} \\times I_\\text{total}$$ rather than as the sum of individual component powers, even though both should agree?", "answer": "Both *must* agree by conservation of energy, but summing individual powers means computing each component's $$P$$ first — multiple steps, multiple rounding errors. $$V_\\text{supply} \\times I_\\text{total}$$ uses two quantities that are usually known directly (the supply voltage is given; total current is found in one Ohm's-Law step). It's the shortest path. The component-by-component sum then serves as a useful *check* on your work.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "What exam-keyword phrases should you include in a 3-mark answer explaining the heating effect of a current in a metallic conductor? (2 steps)", "answer": "- Step 1: The three essential phrases that mark schemes look for:\n  + \"Electrons collide with (positive) lattice ions\"\n  + \"Transfer kinetic energy to the ions\"\n  + \"Ions vibrate with greater amplitude\" (= increased temperature/heat)\n- Step 2: Common insufficient answers that lose marks:\n  + \"Electrons hit atoms\" — too vague; must specify *lattice ions* and *kinetic energy transfer*\n  + \"Friction causes heat\" — not the correct microscopic mechanism (there is no \"friction\" in the mechanical sense)\n  + \"Resistance makes heat\" — circular reasoning; doesn't explain *how*\n\nThe mark scheme rewards the causal chain: moving electrons → collisions → energy transfer → increased vibration = heat. Each link in the chain earns a mark.", "source": "GLM 5.1 ③", "_id": "glm_3_39"}, {"question": "Why does a filament lamp draw a much higher current at the instant it's switched on compared to its operating current? Use the concept of resistance and temperature.", "answer": "At room temperature (switch-on), the filament's resistance is low (e.g., 80 Ω for a 240 V, 60 W lamp). Using I = V/R:\n$$I_{\\text/start} = \\frac{240}{80} = 3.0 \\text{ A}$$\n\nAt operating temperature (~2400°C), resistance increases dramatically (to ~960 Ω):\n$$I_{\\text/operating} = \\frac{240}{960} = 0.25 \\text{ A}$$\n\n+ This \"current surge\" at switch-on explains why lamp filaments heat up so quickly — the initial high power (720 W vs 60 W) rapidly raises the temperature.", "source": "MiniMax ②", "_id": "minimax_2_12"}, {"question": "When you switch on a filament lamp, why does its instantaneous power dissipation briefly spike above its rated steady-state value? (3 steps)", "answer": "- Step 1: At cold temperature (room temp), the filament's resistance is much lower than at operating temperature — maybe by a factor of 10 for tungsten.\n- Step 2: The voltage across it is set by the supply (say, 240 V), so by Ohm's Law $$I = V/R$$, a low $$R$$ means a large initial current. With small $$R$$ and large $$I$$, the power $$P = V^2/R$$ is much higher than steady state.\n- Step 3: This surge heats the filament rapidly, $$R$$ rises, current and power drop, settling to the rated value within a fraction of a second. This is why filaments most often fail at the moment of switch-on.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "A 4.0 Ω resistor in a parallel branch carries 1.5 A. A second branch has an unknown resistor $$R_x$$. The total supply is 12 V with a 2.8 Ω resistor in series with the parallel pair. Walk through finding the power in each component, choosing the best formula each time. (5 steps)", "answer": "- Step 1: Voltage across the 4 Ω resistor: $$V_{4} = IR = 1.5 \\times 4.0 = 6.0$$ V. Since it's parallel, $$V_{R_x} = 6.0$$ V also. Voltage across 2.8 Ω: $$12 - 6 = 6.0$$ V.\n- Step 2: Total current: $$I_T = V_{2.8}/R = 6.0/2.8 \\approx 2.14$$ A. Current through $$R_x$$: $$I_x = 2.14 - 1.5 = 0.64$$ A. So $$R_x = 6.0/0.64 \\approx 9.4$$ Ω.\n- Step 3: **Power in 2.8 Ω** — given I and R → use $$P = I^2 R$$: $$P = (2.14)^2 \\times 2.8 \\approx 12.8$$ W.\n- Step 4: **Power in 4.0 Ω** — given V and I → use $$P = VI$$: $$P = 6.0 \\times 1.5 = 9.0$$ W.\n- Step 5: **Power in $$R_x$$** — given V and R → use $$P = V^2/R$$: $$P = 36/9.4 \\approx 3.8$$ W.\n\nTotal: $$12.8 + 9.0 + 3.8 = 25.6$$ W. Check: $$P_{\\text{supply}} = 12 \\times 2.14 = 25.7$$ W (rounding difference ✓).", "source": "GLM 5.1 ③", "_id": "glm_3_33"}, {"question": "Two appliances in a house — a 100 W lamp and a 2000 W kettle — are both plugged into the same 240 V mains. Without numerical detail, explain why the kettle needs a much higher-rated fuse and why its element must have much lower resistance.", "answer": "Both operate at the same 240 V. The kettle dissipates 20× more power than the lamp ($$2000/100 = 20$$), so by $$P = IV$$ at fixed $$V$$, the kettle draws 20× more current. A larger fuse is needed to allow that current without blowing during normal use. Also, by $$P = V^2/R$$ at fixed $$V$$, more power means *lower* $$R$$ — the kettle element has roughly 1/20th the resistance of the lamp. Low resistance lets a large current flow, and that large $$I^2R$$ heating is exactly what boils the water quickly.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Why does the heating-effect law $$P = I^2R$$ apply *at constant temperature*, and what changes if the resistor heats up significantly during operation?", "answer": "$$P = I^2R$$ assumes $$R$$ has a well-defined fixed value — true at constant temperature. In real metals, $$R$$ rises with temperature (more lattice vibration means more electron–ion collisions). So as the resistor heats up under high current, $$R$$ creeps upward, which (at fixed voltage) reduces $$I$$ and changes the dissipated power. For an ohmic resistor near room temperature, the change is small; for a tungsten filament starting from cold, $$R$$ can multiply ~10× by operating temperature, causing a large current spike at switch-on that quickly drops as the filament heats.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "A student is given V = 1.5 V and R = 6 Ω for a resistor and writes $$P = IV = I \\times 1.5$$. What conceptual error has the student made, and what should they do instead? (2 steps)", "answer": "- Step 1: The student has substituted V but left I as a symbol. However, I was *not given* — it must be calculated first from $$I = V/R = 1.5/6 = 0.25$$ A. The student has started with the wrong formula for the given quantities.\n- Step 2: Since V and R are given, the direct formula is $$P = V^2/R = (1.5)^2/6 = 2.25/6 = 0.375$$ W. No intermediate calculation of I is needed.\n\nThe general principle: if you find yourself having to *calculate* a quantity before you can use a formula, you've probably chosen the wrong formula. Look at what's directly given and pick the matching one.", "source": "GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "In a series circuit with fixed current $$I$$, resistor $$R_1$$ has twice the resistance of $$R_2$$. Which resistor dissipates more power, and by what factor? (2 steps)", "answer": "- Step 1: In a series circuit, the current is the same through every component. With $$I$$ fixed, the appropriate formula is $$P = I^2 R$$, so power is directly proportional to resistance: $$P \\propto R$$.\n- Step 2: Since $$R_1 = 2R_2$$, we get $$P_1 = I^2 R_1 = I^2 (2R_2) = 2P_2$$. The resistor with twice the resistance dissipates **twice** the power. In a series circuit, the larger resistor \"takes\" more of the voltage, and since the same current flows, it converts more energy per second.\n\nThis is the opposite of what happens at fixed voltage (where larger resistance means *less* power). Context matters — always check what is held constant.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "A student claims: \"A resistor with resistance R dissipates power P. If I replace it with a resistor of resistance 2R, it will always dissipate more power.\" Is this claim correct? Explain with two counterexamples. (3 steps)", "answer": "- Step 1: The claim is **not always correct** — it depends on what is held constant in the circuit.\n- Step 2: **Counterexample 1 (constant voltage):** If the resistor is connected directly across a fixed voltage supply, $$P = V^2/R$$. Doubling R *halves* the power. The 2R resistor dissipates *less* power.\n- Step 3: **Counterexample 2 (constant current):** If the resistor carries a fixed current (e.g., in series with a constant current source), $$P = I^2 R$$. Doubling R *doubles* the power. The 2R resistor dissipates *more* power.\n\nThe takeaway: you cannot determine how power changes with resistance without knowing what is held constant (V, I, or something else). Always identify your given quantities first.", "source": "GLM 5.1 ③", "_id": "glm_3_37"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "When a current flows through a metallic conductor, what happens at the microscopic level that causes the conductor to heat up? Describe the chain of events from electron motion to thermal energy. (3 steps)", "answer": "- Step 1: Free electrons drift through the metal lattice under the influence of the electric field. As they move, they repeatedly **collide** with the fixed positive lattice ions.\n- Step 2: In each collision, electrons transfer some of their kinetic energy to the ions. This is an inelastic interaction — the electron slows down, and the ion gains kinetic energy.\n- Step 3: The ions, having gained kinetic energy, vibrate with greater amplitude about their equilibrium positions. Increased amplitude of ionic vibration is, at the atomic level, exactly what we call **heat** (thermal/internal energy).\n\nKey takeaway: Heat in a resistor is not electrons \"carrying\" thermal energy — it is the lattice ions vibrating more vigorously because electrons have bashed into them.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A student says: \"The current entering a resistor is larger than the current leaving it, because some electrons get stuck inside the resistor.\" Explain why this is physically impossible and state the fundamental principle involved. (2 steps)", "answer": "- Step 1: Charge is a conserved quantity — it cannot be created or destroyed. This is formalised in **Kirchhoff's First Law**: the total current entering any junction (or component) equals the total current leaving it ($$\\sum I_{in} = \\sum I_{out}$$).\n- Step 2: A resistor slows electrons down (reduces their drift velocity) through collisions with lattice ions, but it does **not** accumulate or store charge. The same number of electrons per second enter as leave; the resistor dissipates **energy**, not charge.\n\n+ Common exam phrasing: \"electrons are not stored in a resistor — they are slowed down, and the energy they lose becomes heat.\"", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "Why is the rate of heat transfer from a resistor specifically equal to $$I^2 R$$ (at constant temperature), rather than simply $$IR$$ or $$I R^2$$? Explain the physical reason behind the square on the current. (2 steps)", "answer": "- Step 1: Doubling the current means **twice as many electrons** pass through per second, *and* each electron has **twice the drift velocity** (hence roughly twice the kinetic energy to transfer per collision). The number of collisions per second also increases proportionally. This means the energy transferred per second scales with the **square** of the current — doubling $$I$$ quadruples the heating.\n- Step 2: The resistance $$R$$ enters linearly because, for a given current, a larger $$R$$ means more frequent or more energetic collisions per unit length of conductor. So the heating rate is $$P = I^2 R$$ — current squared (because of the double-counting effect above) times resistance (because more resistance = more energy extracted per electron).\n\n+ This is why $$P = I^2 R$$ is specifically called the **heating-effect formula** — it directly gives the rate at which energy is converted to thermal energy in a resistive element.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Starting from three fundamental definitions — $$P = \\frac{\\Delta W}{\\Delta t}$$, $$I = \\frac{Q}{t}$$, and $$V = \\frac{W}{Q}$$ — derive the general electrical power equation $$P = IV$$. Show each substitution step. (3 steps)", "answer": "- Step 1: From the definition of potential difference, $$V = \\frac{W}{Q}$$, rearrange to express energy: $$W = QV$$.\n- Step 2: Divide both sides by time $$t$$: $$\\frac{W}{t} = \\frac{Q}{t} \\times V$$.\n- Step 3: Recognise that $$\\frac{W}{t} = P$$ (power) and $$\\frac{Q}{t} = I$$ (current). Substitute: $$P = I \\times V$$.\n\n+ $$P = IV$$ is the **general** power equation — it works for **any** electrical component (ohmic or non-ohmic), because it uses only the fundamental definitions of power, current, and p.d. No assumption about Ohm's Law is needed.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Derive the power equation in terms of current and resistance, $$P = I^2 R$$, starting from $$P = IV$$ and using Ohm's Law. When is this formula the most direct choice? (2 steps)", "answer": "- Step 1: Ohm's Law states $$V = IR$$. Substitute this into $$P = IV$$:\n$$P = I \\times (IR) = I^2 R$$\n- Step 2: This formula is the most direct choice when you **know the current through** and the **resistance of** the component — you do not need to calculate $$V$$ first.\n\n+ Mnemonic: \"Twinkle, Twinkle, Little Star, Power equals I squared R\" — the rhyme tells you to **multiply** by $$R$$ (not divide), which distinguishes it from $$P = V^2/R$$.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Derive the power equation in terms of voltage and resistance, $$P = \\frac{V^2}{R}$$, using the standard substitution method from $$P = IV$$. When is this formula the most direct choice? (2 steps)", "answer": "- Step 1: From Ohm's Law, rearrange for current: $$I = \\frac{V}{R}$$. Substitute into $$P = IV$$:\n$$P = \\frac{V}{R} \\times V = \\frac{V^2}{R}$$\n- Step 2: This formula is the most direct choice when you **know the voltage across** and the **resistance of** the component — you do not need to calculate $$I$$ first.\n\n+ Note the division by $$R$$ (contrast with $$P = I^2 R$$ which multiplies by $$R$$). The mnemonic helps: if $$V$$ is on top, you divide by $$R$$; if $$I$$ is on top, you multiply by $$R$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "A student asks: \"Can I also derive $$P = \\frac{V^2}{R}$$ by starting from $$P = I^2 R$$ instead of $$P = IV$$?\" Show how this alternative derivation works step by step. (3 steps)", "answer": "- Step 1: Start with $$I = \\frac{V}{R}$$ (Ohm's Law rearranged). Square both sides:\n$$I^2 = \\frac{V^2}{R^2}$$\n- Step 2: Substitute this expression for $$I^2$$ into the heating-effect formula $$P = I^2 R$$:\n$$P = \\frac{V^2}{R^2} \\times R$$\n- Step 3: Cancel one factor of $$R$$ from numerator and denominator:\n$$P = \\frac{V^2}{R}$$\n\n+ This alternative route confirms that all three power equations are mathematically equivalent — they are just rearrangements of the same underlying relationship.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "A circuit problem gives you the current through a resistor and its resistance, but not the voltage across it. Which single power formula lets you calculate the power in one step, and why would using a different formula be a mistake? (2 steps)", "answer": "- Step 1: Use **$$P = I^2 R$$** — it requires exactly the two quantities you have ($$I$$ and $$R$$) and nothing else.\n- Step 2: Using $$P = IV$$ would force you to first calculate $$V = IR$$ (an extra step, introducing a rounding or arithmetic error). Using $$P = V^2/R$$ would require calculating $$V$$ first as well. Each extra calculation step is a chance for a unit error or sign mistake.\n\n+ Exam strategy: always identify your **given quantities** first, underline them, then pick the formula that matches. The formula selection flowchart is: **I and V** → $$P = IV$$; **I and R** → $$P = I^2 R$$; **V and R** → $$P = V^2/R$$.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "A resistor has fixed resistance $$R$$. If the current through it doubles (from $$I$$ to $$2I$$), what happens to the power dissipated? Explain using the relevant power equation, and give the factor of change. (2 steps)", "answer": "- Step 1: For a fixed $$R$$, the relevant power equation is $$P = I^2 R$$. Power is proportional to the **square** of the current: $$P \\propto I^2$$.\n- Step 2: When $$I$$ doubles to $$2I$$: $$P_{new} = (2I)^2 R = 4I^2 R = 4P$$. The power **quadruples** (multiplied by 4), not doubles.\n\n+ Common exam trap: students intuitively expect \"double the current → double the power.\" This is wrong because the $$I^2$$ relationship means current has a **non-linear** (squared) effect on heating. This is why fuses are so sensitive to even modest current overloads.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "A resistor has fixed resistance $$R$$. If the voltage across it doubles (from $$V$$ to $$2V$$), what happens to the power dissipated? State the factor of change and the equation that justifies it. (2 steps)", "answer": "- Step 1: For a fixed $$R$$, the relevant power equation is $$P = \\frac{V^2}{R}$$. Power is proportional to the **square** of the voltage: $$P \\propto V^2$$.\n- Step 2: When $$V$$ doubles to $$2V$$: $$P_{new} = \\frac{(2V)^2}{R} = \\frac{4V^2}{R} = 4P$$. The power **quadruples**.\n\n+ Symmetry insight: both $$P = I^2 R$$ and $$P = V^2/R$$ give a quadratic scaling because Ohm's Law ($$V = IR$$) means doubling $$I$$ also doubles $$V$$ for a fixed $$R$$. The physics is the same either way you look at it.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A resistor is connected across a constant-voltage supply. If its resistance is doubled, what happens to the power it dissipates? Give the factor of change and the equation that explains it. (2 steps)", "answer": "- Step 1: With voltage fixed, use $$P = \\frac{V^2}{R}$$. Power is **inversely proportional** to resistance: $$P \\propto \\frac{1}{R}$$.\n- Step 2: When $$R$$ doubles: $$P_{new} = \\frac{V^2}{2R} = \\frac{P}{2}$$. The power is **halved**.\n\n+ Physical intuition: a larger resistance opposes current more, so less current flows ($$I = V/R$$ halves), and since $$P = VI$$ with $$V$$ constant, halving $$I$$ halves the power. The \"higher resistance = more heating\" intuition only applies when current is fixed (e.g., in a series circuit where the same current flows through all components).", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "A resistor carries a constant current (e.g., in a series circuit where the same current flows everywhere). If its resistance is doubled, what happens to the power it dissipates? Give the factor of change and the equation. (2 steps)", "answer": "- Step 1: With current fixed, use $$P = I^2 R$$. Power is **directly proportional** to resistance: $$P \\propto R$$.\n- Step 2: When $$R$$ doubles: $$P_{new} = I^2 (2R) = 2P$$. The power **doubles**.\n\n+ Contrast with Q11: the same action (doubling $$R$$) gives the **opposite** result depending on what is held constant. With fixed $$V$$, more $$R$$ → less power. With fixed $$I$$, more $$R$$ → more power. This is a favourite MCQ trap.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "Starting from $$P = \\frac{W}{t}$$, write down the three equivalent energy equations obtained by substituting each power formula. Which one should you reach for first in most exam questions? (2 steps)", "answer": "- Step 1: Multiply each power equation by time $$t$$:\n+ From $$P = IV$$: $$W = IVt$$\n+ From $$P = I^2 R$$: $$W = I^2 Rt$$\n+ From $$P = V^2/R$$: $$W = \\frac{V^2 t}{R}$$\n- Step 2: The **first-choice** formula is $$W = Pt$$ (or equivalently $$W = IVt$$). Use this directly when power and time are given, or when current and voltage are given. Do **not** go the roundabout route of computing $$Q = It$$ then $$E = QV$$ unless charge is explicitly stated in the question.\n\n+ Phuc's documented trap: using $$Q = It$$ then $$E = QV$$ instead of $$W = Pt$$ directly. Both give the same answer, but the roundabout route uses two steps and two substitutions — doubling the chance of a unit error.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "A bulb carries 250 mA with 2.2 V across it. A student calculates energy in 1 minute by first finding $$Q = It = 0.25 \\times 60 = 15$$ C, then $$E = QV = 15 \\times 2.2 = 33$$ J. What is the more direct one-step method, and why is it preferred? (2 steps)", "answer": "- Step 1: Use $$W = IVt$$ directly: $$W = 0.25 \\times 2.2 \\times 60 = 33$$ J. Same answer, but in a single substitution.\n- Step 2: The direct method is preferred because: (a) it requires fewer arithmetic operations, reducing the risk of errors; (b) it avoids an intermediate value ($$Q$$) that has no physical significance for the question asked; (c) exam mark schemes award method marks, and a cleaner method with fewer steps is less likely to accumulate errors.\n\n+ The roundabout method works mathematically ($$W = IVt = I \\cdot t \\cdot V = (It) \\cdot V = QV$$), but in an exam, every extra step is a risk. Always use the **shortest valid route**.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "The equation $$E = QV$$ relates energy to charge and voltage. Under what specific circumstance should you use this equation instead of $$W = Pt$$ or $$W = IVt$$? (2 steps)", "answer": "- Step 1: Use $$E = QV$$ only when **charge $$Q$$** is explicitly stated or given in the problem (e.g., \"a charge of 15 C flows through a component with a p.d. of 6 V\").\n- Step 2: If the problem gives you current, voltage, and time instead, then $$W = IVt$$ or $$W = Pt$$ is the direct route. Going via $$Q = It$$ first and then $$E = QV$$ is a two-step detour — use it only when $$Q$$ is already a known quantity.\n\n+ Remember: $$V = \\frac{E}{Q}$$ (not $$V = \\frac{E}{t}$$). Time belongs in the current definition ($$I = Q/t$$), not in the voltage definition. Mixing these up is a documented exam trap.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Define electrical efficiency and write its formula. For a device that converts 500 J of electrical energy into 350 J of useful work in 10 s, explain how to calculate both the input power and the efficiency. (3 steps)", "answer": "- Step 1: Efficiency is the fraction of input power converted to **useful** output power:\n$$\\eta = \\frac{P_{useful}}{P_{total}} \\times 100\\%$$\n- Step 2: Calculate input power: $$P_{total} = \\frac{W_{total}}{t} = \\frac{500}{10} = 50$$ W. Calculate useful power: $$P_{useful} = \\frac{W_{useful}}{t} = \\frac{350}{10} = 35$$ W.\n- Step 3: Calculate efficiency: $$\\eta = \\frac{35}{50} \\times 100\\% = 70\\%$$. The remaining 30% is dissipated as heat (or other non-useful forms).\n\n+ Key exam point: always label which power is \"useful\" and which is \"total.\" Express efficiency as a **percentage**. For an electric motor, the useful output is mechanical power; the wasted output is heat in the windings and friction.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "What is a fuse, and what does it physically do when the current exceeds its rated value? Explain the mechanism and the purpose. (2 steps)", "answer": "- Step 1: A fuse is a thin piece of wire with a specified **current rating** (standard UK values: 3 A, 5 A, 13 A). It is placed in series with the live wire of an appliance.\n- Step 2: If the cu
