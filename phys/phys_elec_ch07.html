.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Why is \"$$V = E/t$$\" wrong, and what's the right way to remember where time goes in electrical definitions? (3 steps)", "answer": "- Step 1: Potential difference is defined as **energy transferred per unit charge**: $$V = E/Q$$. It has units of joules per coulomb, not joules per second.\n- Step 2: Time appears in the definition of **current** instead: $$I = Q/t$$ (charge per unit time, coulombs per second = amperes).\n- Step 3: Mnemonic: ask \"per *what*?\" — voltage is per *charge* (Q), current is per *time* (t), power is energy per *time* (t). Time only belongs in quantities that are rates (current, power), not in quantities that are per-charge (voltage).\n\nTakeaway: $$V = E/Q$$, $$I = Q/t$$, $$P = E/t$$ — match each \"per\" carefully.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Given a kettle rated 240 V, 3.0 kW, explain conceptually (no full calculation) how you'd determine (a) the operating current and (b) the resistance of the heating element. (2 steps)", "answer": "- Step 1: For the current, you know power and voltage, so rearrange $$P = IV$$ to $$I = P/V$$. You'd divide 3000 by 240 — order of magnitude ~10 A. (Not $$I = V/P$$, which is a common slip.)\n- Step 2: For the resistance, you know voltage and power, so use $$P = V^2/R$$ rearranged to $$R = V^2/P$$. You'd square 240 (~58000) and divide by 3000 — order of magnitude ~20 Ω.\n\nTakeaway: never compute $$I$$ first only to then find $$R = V/I$$ — go directly from the *given* quantities to the answer.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Why must we choose the *next standard fuse rating above* the calculated operating current, rather than rounding to the nearest rating? (3 steps)", "answer": "- Step 1: A fuse is a thin wire designed to melt and break the circuit when current exceeds its rated value. Below the rating it does nothing.\n- Step 2: If you pick a fuse *below* the operating current, the appliance's normal current flow will instantly melt it — the appliance never works.\n- Step 3: If you pick a fuse *above* but as close as possible, the appliance runs normally, but any abnormal surge (short circuit, fault) trips the fuse promptly. Picking *too far above* means dangerous fault currents could flow before the fuse blows.\n+ Example: 12.5 A operating current → 13 A fuse (correct), not 3 A (blows immediately), not 30 A (wouldn't protect).\n\nTakeaway: the fuse rating is the *upper bound* on safe current — pick the smallest standard rating that still exceeds normal operating current.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "A kettle draws 12.5 A in normal use. The available fuses are 3 A, 5 A, 13 A, and 30 A. Which fuse do you fit, and what would go wrong with each of the others?", "answer": "- Step 1: Fit the **13 A fuse** — it's the smallest standard rating above 12.5 A.\n- Step 2: Consequences of wrong choices:\n+ 3 A or 5 A: would blow instantly under normal operation (current exceeds rating).\n+ 30 A: kettle would run, but a fault (e.g., short circuit) could let a dangerously large current flow before the fuse melts — appliance/cable could overheat or catch fire.\n- Step 3: The principle: closest rating *above* normal current strikes the balance between (a) not nuisance-tripping, (b) tripping promptly on faults.\n\nTakeaway: fuse selection is a tight upper-bound problem, not a \"close enough\" problem.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "A student computes electrical energy in two ways: (i) $$W = Pt$$ directly, and (ii) $$Q = It$$ then $$E = QV$$. Both give the same number. Why does the textbook strongly prefer method (i)?", "answer": "- Step 1: Method (i) is a single substitution — one formula, one calculation, one chance to make an arithmetic mistake.\n- Step 2: Method (ii) requires two formulas and two arithmetic steps, doubling the chances of (a) a slip, (b) a unit error (e.g., forgetting to convert minutes to seconds at the right place), and (c) carrying an inappropriate rounding through.\n- Step 3: Use method (ii) **only** when charge $$Q$$ is explicitly given in the question — then $$E = QV$$ is the direct one-step approach. Otherwise, prefer $$W = Pt$$ or $$W = IVt$$.\n\nTakeaway: always reach for the formula that uses the quantities the question gives you directly; \"roundabout\" routes lose method marks if a slip occurs.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Write down four equivalent expressions for the electrical energy dissipated in a resistor over time $$t$$, and explain when each is the most natural choice. (4 steps)", "answer": "- Step 1: $$W = Pt$$ — when power $$P$$ and time $$t$$ are given directly (e.g., a 60 W bulb for 1 hour).\n- Step 2: $$W = IVt$$ — when you know current, voltage, and time (general-purpose, derived from $$P = IV$$).\n- Step 3: $$W = I^2Rt$$ — when current and resistance are known; emphasizes the heating effect (rate of thermal dissipation).\n- Step 4: $$W = (V^2/R)t$$ — when voltage and resistance are known; useful for parallel branches or rated-voltage components.\n\nTakeaway: all four come from $$W = Pt$$ with different power formulas substituted; choose by what's given.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Explain why $$E = QV$$ is *not* a special new formula but rather a restatement of the definition of voltage. (2 steps)", "answer": "- Step 1: Voltage is defined as energy transferred per unit charge: $$V = W/Q$$. Multiply both sides by $$Q$$: $$W = QV$$, equivalently $$E = QV$$.\n- Step 2: So $$E = QV$$ says: \"the energy delivered when charge $$Q$$ falls through a potential difference $$V$$ equals $$Q$$ times $$V$$.\" This is literally the definition of \"potential difference\" turned into an energy statement.\n\nTakeaway: $$E = QV$$ is the defining equation of voltage written with energy on the left — not a new physical law.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "A 0.50 A current passes through a 6.0 V bulb. Without doing a multi-step calculation, sketch how you'd determine (a) the power dissipated and (b) the energy converted in 3.0 minutes. (2 steps)", "answer": "- Step 1: For power: both $$I$$ and $$V$$ are given directly, so use $$P = IV$$. The product $$0.5 \\times 6 = 3$$ W — easy mental math, no detour through resistance.\n- Step 2: For energy: now power and time are both known, so $$W = Pt$$. Convert 3.0 min to 180 s, then $$W = 3 \\times 180 = 540$$ J. Do **not** go via $$Q = It$$ then $$E = QV$$ — that's two extra steps for no benefit.\n\nTakeaway: read the given quantities first, then pick the most direct chain $$IV \\to Pt$$.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Define the efficiency of an electrical device and explain why the input power is always $$IV$$ but the useful output power can vary in form. (3 steps)", "answer": "- Step 1: Efficiency is $$\\eta = (P_{\\text{useful}}/P_{\\text{total}}) \\times 100\\%$$ — the fraction of input electrical power that comes out in the desired form, expressed as a percentage.\n- Step 2: $$P_{\\text{total}} = IV$$ because *all* devices draw electrical input as current at a given p.d. — that's the universal electrical input.\n- Step 3: But $$P_{\\text{useful}}$$ depends on the device's purpose:\n+ Motor: useful output = mechanical power (force × velocity, or lifted-weight × velocity).\n+ Bulb: useful output = visible light power.\n+ Heater: useful output = thermal power (here efficiency is often ~100%!).\n+ The remainder ($$P_{\\text{total}} - P_{\\text{useful}}$$) is wasted, almost always as heat.\n\nTakeaway: input is always electrical, but \"useful\" is context-dependent — that's why a heater can be \"100% efficient\" while a filament bulb is ~10%.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "A filament lamp delivers only about 10% of its electrical input as visible light. Where does the other 90% go, and why is this called \"inefficient\" despite no energy being lost? (3 steps)", "answer": "- Step 1: The 90% becomes thermal radiation (infrared) and conducted heat — i.e., it warms the surroundings rather than illuminating them.\n- Step 2: Energy is *conserved*: nothing is destroyed. But energy in a useless form (infrared, conducted heat) doesn't fulfill the device's purpose (illumination).\n- Step 3: Efficiency measures the *fraction of energy in the desired form*, not whether energy is conserved. A filament bulb wastes most input as heat → low efficiency by design (it lights up *because* it's hot, but most of the heating-effect energy never becomes visible light).\n\nTakeaway: \"inefficient\" means most energy ends up in an unwanted form, not that energy disappears.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "Why does a filament lamp's resistance increase sharply when it's switched on, and what does this mean for the *initial* power surge compared to its rated operating power? (3 steps)", "answer": "- Step 1: When cold (room temperature), the filament's resistance is low — perhaps 80 Ω for a lamp that operates at 960 Ω when hot. Lattice ions vibrate less, so electrons collide with them less often.\n- Step 2: At the instant of switch-on, full mains voltage (e.g., 240 V) is applied across this low cold resistance, so a *large* initial current flows: $$I = V/R = 240/80 = 3$$ A (compared to rated ~0.25 A when hot).\n- Step 3: That large initial current rapidly dissipates energy as heat (~720 W instantaneously vs ~60 W rated), driving the filament temperature up. As temperature rises, resistance rises, current falls, and power settles to the rated value. This is why filament bulbs often blow at the moment of being switched on.\n\nTakeaway: a filament's resistance is not constant — it's a non-ohmic, temperature-dependent component, leading to a brief but intense power surge at switch-on.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "A resistor in series with two parallel branches carries the *total* current. To find the power it dissipates, which formula is most efficient, and why is using $$P = V^2/R$$ awkward here? (3 steps)", "answer": "- Step 1: A series resistor sees the total circuit current $$I_T$$, which is usually known or easy to find from $$V_{supply}/R_{total}$$. Its resistance is given.\n- Step 2: With $$I$$ and $$R$$ both directly available, $$P = I^2R$$ is the one-step choice.\n- Step 3: Using $$P = V^2/R$$ would require first computing the voltage drop across the series resistor — an extra step that depends on knowing the total current anyway. Why detour?\n\nTakeaway: identify what's *already* known about the component; pick the formula that consumes those quantities directly.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "For two resistors in parallel across a common branch voltage, why is $$P = V^2/R$$ the natural formula for each — and what does this say about how power *splits* between unequal parallel resistors? (3 steps)", "answer": "- Step 1: Parallel branches share the same potential difference $$V$$. So $$V$$ is identical for each — and once you know the resistances, $$P = V^2/R$$ for each branch is a one-step calculation.\n- Step 2: Since $$V$$ is common and $$P \\propto 1/R$$, the *smaller* resistor dissipates *more* power: $$P_1/P_2 = R_2/R_1$$.\n+ Example: 3 Ω and 6 Ω in parallel at 1.5 V → $$P_3 = 0.75$$ W, $$P_6 = 0.375$$ W. The 3 Ω resistor dissipates twice as much.\n- Step 3: Intuition: at fixed voltage, less resistance lets more current flow → more collisions per second → more heating.\n\nTakeaway: in parallel, smaller R dissipates more power; the ratio is the inverse of the resistance ratio.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "For two resistors in series, which one dissipates more power — the larger or smaller — and why is this exactly opposite to the parallel case? (3 steps)", "answer": "- Step 1: In series, current $$I$$ is the same through both resistors. With $$I$$ fixed and $$P = I^2R$$, the *larger* resistor dissipates *more* power.\n- Step 2: Ratio: $$P_1/P_2 = R_1/R_2$$ (direct proportion to resistance).\n+ Example: 3 Ω and 5 Ω in series at 2 A → $$P_3 = 12$$ W, $$P_5 = 20$$ W. Larger resistor dissipates more.\n- Step 3: Why opposite to parallel? In parallel, common quantity is voltage, and $$P = V^2/R$$ gives $$P \\propto 1/R$$. In series, common quantity is current, and $$P = I^2R$$ gives $$P \\propto R$$. The shared quantity decides the proportionality.\n\nTakeaway: identify what's shared (current in series, voltage in parallel), and the proportionality of power follows.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "A circuit has a 12 V supply, a 2.8 Ω series resistor, and a parallel section with a known 6 V drop across it. Without computing the exact answer, sketch the *logic* for finding the total power supplied by the battery and the power dissipated in the 2.8 Ω resistor. (3 steps)", "answer": "- Step 1: Voltage across the 2.8 Ω = 12 − 6 = 6 V (Kirchhoff's 2nd Law — voltages around a loop sum to the EMF). Total current $$I_T = 6/2.8$$, roughly 2 A.\n- Step 2: Power in the 2.8 Ω: $$I_T$$ and $$R$$ both known → $$P = I^2R \\approx 2^2 \\times 2.8 \\approx 11$$ W. (Don't first find $$V$$ and use $$V^2/R$$ — that's a longer path when $$I^2R$$ is already available.)\n- Step 3: Power supplied by battery: $$P_{batt} = V_{batt} \\times I_T = 12 \\times 2 \\approx 24$$ W. Sanity check: this must equal the sum of all dissipated powers in the circuit (conservation of energy).\n\nTakeaway: at each step, choose the power formula that matches the *given* quantities for that component, and use total-power balance as a cross-check.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "In a circuit, why must the total power dissipated across all resistors equal the power supplied by the battery, even when the resistors are a complex series-parallel mix? (3 steps)", "answer": "- Step 1: The battery transfers electrical energy to charges at a rate $$P_{batt} = V_{batt} \\times I_T$$.\n- Step 2: Conservation of energy: energy is neither created nor destroyed. Every joule the battery delivers must end up somewhere — and in a purely resistive circuit, everything ends up as heat in the resistors (no mechanical work, no storage).\n- Step 3: Therefore $$\\sum P_{resistors} = P_{batt}$$, regardless of topology. This is also why discrepancies between summed resistor powers and battery power signal a rounding error in your working — they should match exactly in the absence of rounding.\n\nTakeaway: power conservation is a strict equality and an excellent cross-check for circuit calculations.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "A circuit's parallel section has a 3 Ω and a 6 Ω resistor sharing 1.5 V. Without exact arithmetic, explain why the current through the 3 Ω is twice that through the 6 Ω, and how this connects to Kirchhoff's 1st Law. (3 steps)", "answer": "- Step 1: Same voltage across both → from $$I = V/R$$, current is inversely proportional to resistance. So the 3 Ω carries twice the current of the 6 Ω.\n- Step 2: Numerically: $$I_3 = 0.5$$ A, $$I_6 = 0.25$$ A — the smaller resistor lets more electrons through per second.\n- Step 3: Kirchhoff's 1st Law (conservation of charge): the total current into the parallel section equals the sum out: $$I_T = I_3 + I_6 = 0.75$$ A. The branch currents must add up to the trunk current — no charge is stored or lost at a junction.\n\nTakeaway: in parallel, currents split inversely with resistance, and they must always sum back to the trunk current.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Show that the units of $$P = IV$$ are indeed watts (joules per second), using only base electrical definitions. (3 steps)", "answer": "- Step 1: $$I$$ has units of amperes = coulombs per second ($$\\text{C/s}$$), from $$I = Q/t$$.\n- Step 2: $$V$$ has units of volts = joules per coulomb ($$\\text{J/C}$$), from $$V = E/Q$$.\n- Step 3: Multiply: $$IV = (\\text{C/s}) \\times (\\text{J/C}) = \\text{J/s} = \\text{W}$$. The coulombs cancel, leaving joules per second — exactly the definition of power.\n\nTakeaway: $$P = IV$$ is dimensionally consistent: \"charges per second\" times \"joules per charge\" gives \"joules per second.\"", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "A 47 kΩ resistor has a maximum safe power rating of 250 mW. Conceptually (no full arithmetic), what determines the maximum safe current, and why is $$P = I^2R$$ the natural choice here? (3 steps)", "answer": "- Step 1: \"Safe power\" is the upper limit on dissipation before the resistor overheats and is damaged. You want the largest current that stays under that limit.\n- Step 2: $$R$$ is given and $$P_{max}$$ is given — so use $$P = I^2R$$, rearranged to $$I_{max} = \\sqrt{P_{max}/R}$$. No need to know voltage.\n- Step 3: Order of magnitude check: $$P/R = 250 \\times 10^{-3} / (47 \\times 10^3) \\approx 5 \\times 10^{-6}$$, so $$I \\approx \\sqrt{5 \\times 10^{-6}} \\approx 2$$ mA. A clearly small, milliamp-scale current — sensible for a high-resistance component.\n\nTakeaway: when $$P$$ and $$R$$ are given and $$I$$ is sought, $$P = I^2R$$ rearranged is the direct route.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "A common misconception is that a resistor \"stores\" or \"consumes\" electrons (e.g., 10 electrons go in, 1 comes out). Why is this wrong, and what *does* the resistor do? (3 steps)", "answer": "- Step 1: Charge is conserved at every junction and through every component (Kirchhoff's 1st Law). The number of electrons entering a resistor per second equals the number leaving — there's no storage and no destruction.\n- Step 2: What changes is the electrons' *kinetic energy* and *drift speed*. They collide repeatedly with lattice ions, transferring kinetic energy and slowing their drift.\n- Step 3: So if the current drops from \"10 e⁻/s\" to \"1 e⁻/s\" across a resistor in a steady state, that's impossible — the current must be the *same* through a series component. What the resistor does is dissipate energy: same number of electrons pass through, but they emerge having delivered some of their energy to the lattice (which becomes heat).\n\nTakeaway: resistors are energy dissipators, not charge reservoirs. Current in = current out.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "Why does the prefix \"milli\" mean $$10^{-3}$$ while \"micro\" means $$10^{-6}$$, and what's a common slip when converting 250 mW to watts? (3 steps)", "answer": "- Step 1: SI prefixes: milli (m) = $$10^{-3}$$ (one-thousandth); micro (μ) = $$10^{-6}$$ (one-millionth). They differ by a factor of 1000.\n- Step 2: Common error: writing \"250 mW = $$250 \\times 10^{-6}$$ W\" — confusing milli for micro. Correct: $$250 \\text{ mW} = 250 \\times 10^{-3} \\text{ W} = 0.25$$ W.\n- Step 3: Always *expand the prefix into a power of 10 before substituting* into the formula. This kills the slip at source. Same applies to mA vs μA, kΩ vs MΩ, etc.\n\nTakeaway: milli = $$10^{-3}$$, micro = $$10^{-6}$$; always expand prefixes early in your working.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "A motor lifts a 100 g mass through 0.95 m in 4.1 s, drawing 0.24 A at 6.0 V. Without doing the full arithmetic, sketch how to compute its efficiency. (3 steps)", "answer": "- Step 1: Useful output = mechanical power = work done against gravity ÷ time. Work done = $$mgh \\approx 0.1 \\times 10 \\times 0.95 \\approx 1$$ J. Time = 4.1 s. So $$P_{useful} \\approx 1/4 \\approx 0.25$$ W.\n- Step 2: Total input = electrical power = $$IV \\approx 0.24 \\times 6 \\approx 1.4$$ W.\n- Step 3: Efficiency = $$P_{useful}/P_{total} \\times 100\\% \\approx 0.25/1.4 \\times 100\\% \\approx 18\\%$$.\n+ The other ~82% is lost as heat in the motor's coils (resistance heating) and friction.\n\nTakeaway: efficiency = useful mechanical power out ÷ electrical power in; for motors, most loss is to coil heating and friction.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Two identical bulbs are connected in series across a 150 V supply. Why does each bulb get only half the supply voltage, and why does this make each one *dimmer* than if it were connected alone across 150 V? (3 steps)", "answer": "- Step 1: In series, the same current flows through both bulbs. By Kirchhoff's 2nd Law (conservation of energy), the supply voltage is shared between them — and since they're identical (same $$R$$), each gets 75 V.\n- Step 2: Power dissipated by each bulb: $$P = V^2/R = 75^2/R$$, compared to $$150^2/R$$ if connected alone. So the series-connected bulb dissipates $$1/4$$ the power of the same bulb alone.\n- Step 3: Less dissipated power → less heat in the filament → lower temperature → less visible light. So each bulb is significantly dimmer in series, not just half-as-bright.\n\nTakeaway: $$P \\propto V^2$$, so halving the voltage across a bulb quarters its power output — a strong, non-linear dimming.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "Why is the energy \"1 kWh\" (one kilowatt-hour) equivalent to $$3.6 \\times 10^6$$ joules, and why do electricity companies use kWh instead of joules? (3 steps)", "answer": "- Step 1: $$1 \\text{ kWh} = 1000 \\text{ W} \\times 3600 \\text{ s} = 3.6 \\times 10^6$$ J — using $$E = Pt$$ with $$P$$ in watts and $$t$$ in seconds.\n- Step 2: Joules are tiny on a household scale: a fridge running for a day consumes ~$$10^7$$ J — awkward to bill in. kWh gives a more human-scale number (a fridge uses ~3 kWh/day).\n- Step 3: kWh is just an energy unit (not power!) — the name \"kilowatt-hour\" describes the *recipe*: \"the energy used when a 1 kW device runs for 1 hour.\"\n\nTakeaway: 1 kWh = 3.6 MJ; it's an energy unit chosen for scale, not a power unit.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "A circuit has a 3 V battery with a 2 Ω series resistor and a parallel pair (6 Ω and 3 Ω). Conceptually, walk through how to find the total power supplied by the battery without computing each branch separately. (3 steps)", "answer": "- Step 1: Find $$R_T$$: parallel section is $$1/(1/6 + 1/3) = 2$$ Ω; total = 2 + 2 = 4 Ω.\n- Step 2: Total current: $$I_T = V/R_T = 3/4 = 0.75$$ A.\n- Step 3: Battery power: $$P_{batt} = V \\times I_T = 3 \\times 0.75 = 2.25$$ W. (Cross-check: this must equal the sum of all resistor powers — 1.125 + 0.375 + 0.75 = 2.25 W ✓.)\n\nTakeaway: $$P_{batt} = V_{batt} \\times I_T$$ is always the fastest route — no need to track each component if you only want the total.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Why is it a mistake to compute \"battery power = $$V_{resistor} \\times I_T$$\" or \"battery power = $$P = 0.83 \\times 3.6$$\" using random circuit values? (3 steps)", "answer": "- Step 1: Power for any component is calculated using *that component's* voltage and current — not a mix from different parts of the circuit.\n- Step 2: Battery power = (battery EMF) × (current through the battery), i.e., $$P = V_{batt} \\times I_{batt}$$. Substituting a resistor's voltage gives the resistor's power, not the battery's.\n- Step 3: The deeper principle: power dissipated/supplied by *any* element = $$V$$ across that element × $$I$$ through that element. Mismatching them violates the definition.\n\nTakeaway: always pair $$V$$ and $$I$$ from the *same component* when computing its power.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "A small heater is rated 12 V, 60 W. If you accidentally connect it to a 24 V supply, by what factor does its initial power dissipation exceed the rated value — and why is this dangerous? (3 steps)", "answer": "- Step 1: Assuming the resistance is approximately constant (it isn't quite, but as a first estimate), $$P = V^2/R$$ with $$R$$ fixed gives $$P \\propto V^2$$. Doubling $$V$$ quadruples $$P$$.\n- Step 2: So the heater would attempt to dissipate ~240 W instead of 60 W — four times the rated thermal load.\n- Step 3: The element isn't designed to dissipate that much heat; it would overheat rapidly, potentially melting the heating element, damaging insulation, or starting a fire. This is exactly why appliances have voltage ratings and fuses sized for them.\n\nTakeaway: $$P \\propto V^2$$ means small overvoltages cause disproportionately large power surges — a major safety concern.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "A lamp filament reaches ~960 Ω when hot but is only ~80 Ω when cold. At switch-on under 240 V, sketch (conceptually) how the current and power evolve over the first second. (3 steps)", "answer": "- Step 1: At t = 0: $$I = V/R_{cold} = 240/80 = 3$$ A. Power: $$P = I^2R = 9 \\times 80 = 720$$ W — a brief, large surge.\n- Step 2: This surge rapidly heats the filament. As temperature rises, lattice ions vibrate more, scattering electrons more — so resistance rises sharply over a fraction of a second.\n- Step 3: As $$R$$ rises toward 960 Ω, current falls toward $$I = V/R_{hot} = 240/960 = 0.25$$ A and power settles at $$P = IV = 60$$ W (the rated value).\n+ Practical consequence: bulbs often blow at switch-on because the initial surge stresses the cold filament.\n\nTakeaway: a filament's resistance climbs with temperature, so switch-on involves a large, transient power surge that quickly damps to the rated value.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "A 4 W LED gives the same light output as a 50 W halogen bulb. Why does the LED save energy *without* sacrificing brightness, in terms of energy conversion efficiency? (3 steps)", "answer": "- Step 1: Brightness depends on the **light power** output, not the electrical input. Both produce roughly the same light power.\n- Step 2: Halogen converts only a small fraction of its 50 W input into visible light (~5–10%); the rest becomes heat (infrared + conducted).\n- Step 3: LED converts a much higher fraction (~50% or more) of its 4 W input into visible light — so even though it draws far less electrical power, the *useful* (visible-light) output is comparable. Same light, less waste heat, less electricity needed.\n\nTakeaway: LEDs are more efficient because they convert a larger fraction of input electrical energy into visible light (not heat), so they need less input to produce the same brightness.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Conceptually, why do two power formulas $$P = I^2R$$ and $$P = V^2/R$$ give *opposite* dependences on $$R$$ (one rises with R, one falls with R)? Aren't they both just power in a resistor? (3 steps)", "answer": "- Step 1: They're the same physics, just *which other variable is held fixed* differs. They describe different scenarios.\n- Step 2: $$P = I^2R$$ at fixed $$I$$: bigger $$R$$ → more energy dissipated per electron → more power. (Series scenario: current is constrained to be a specific value by the rest of the circuit.)\n- Step 3: $$P = V^2/R$$ at fixed $$V$$: bigger $$R$$ → smaller current $$I = V/R$$ → fewer collisions per second → less power. (Parallel/rated-voltage scenario: voltage is the constraint.)\n+ Both are correct; they highlight which is the \"knob you turn\" and which is the \"consequence.\"\n\nTakeaway: the two formulas describe the same physical resistor but answer different what-if questions depending on what's held constant.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "A circuit uses 500 J of electrical energy in 10 s and converts 350 J into useful work. State the input power, useful power, and efficiency, and explain where the remaining energy goes. (3 steps)", "answer": "- Step 1: $$P_{in} = E_{in}/t = 500/10 = 50$$ W. $$P_{useful} = 350/10 = 35$$ W.\n- Step 2: Efficiency $$\\eta = P_{useful}/P_{in} \\times 100\\% = 35/50 \\times 100\\% = 70\\%$$.\n- Step 3: The remaining 150 J (15 W) is dissipated, almost certainly as heat — in resistive components of the device (motor coils, internal wiring) and via friction (mechanical losses). Energy is conserved; it just leaves the system as low-grade thermal energy.\n\nTakeaway: efficiency is computed identically whether you use energy or power as long as the same time period is used for both; the lost fraction is almost always heat.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Why is electrical heating power proportional to $$I^2$$ rather than $$I$$, even though \"more current = more heating\" sounds linear? (3 steps)", "answer": "- Step 1: Yes, more current means more electrons per second hitting the lattice ions — that's one factor of $$I$$.\n- Step 2: But by Ohm's Law, driving more current through a fixed resistance also requires a higher voltage: $$V = IR$$. So each electron travels through a *larger* potential drop, losing more energy per collision sequence. That's the second factor of $$I$$.\n- Step 3: Combining both effects: total power = (electrons per second) × (energy per electron) ∝ $$I \\times I = I^2$$. Hence the $$I^2$$ dependence.\n\nTakeaway: the quadratic comes from two compounding linear effects — more carriers per second AND more energy per carrier.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "Compare two appliances: a 100 W heater operating for 1 hour and a 60 W bulb operating for 100 minutes. Which uses more energy, and how much, in joules? (Mental math friendly.) (3 steps)", "answer": "- Step 1: Heater: $$E = Pt = 100 \\times 3600 = 360{,}000$$ J = 360 kJ.\n- Step 2: Bulb: $$E = Pt = 60 \\times 6000 = 360{,}000$$ J = 360 kJ. (100 min = 6000 s.)\n- Step 3: They use exactly the same energy. The heater uses higher power for less time; the bulb uses lower power for more time — but the product $$Pt$$ is the same.\n\nTakeaway: energy is the product of power and time; same product means same energy, regardless of how it's split.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "An electric iron is rated 230 V, 1.5 kW. Conceptually, how do you find the charge that passes through its element in 20 minutes? (3 steps)", "answer": "- Step 1: First find current: $$I = P/V = 1500/230 \\approx 6.5$$ A.\n- Step 2: Then charge: $$Q = It \\approx 6.5 \\times 1200 \\approx 7800$$ C (20 min = 1200 s).\n- Step 3: As a sanity check: this is a huge number of coulombs because current of several amps is itself a large rate of charge flow ($$1 \\text{ A} = 1 \\text{ C/s}$$). Over 20 minutes, the totals are naturally in the thousands of coulombs.\n\nTakeaway: charge = current × time. Big currents over minute-scale times give thousands of coulombs.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Why is \"$$I = V/P$$\" wrong when calculating the operating current from voltage and rated power, and what's a units check that catches it instantly?", "answer": "- Step 1: The correct rearrangement of $$P = IV$$ is $$I = P/V$$ — power divided by voltage.\n- Step 2: Units check: $$V/P$$ has units of $$\\text{V/W} = \\text{V} / (\\text{V} \\cdot \\text{A}) = 1/\\text{A}$$ — i.e., per-ampere, not amperes. That's an immediate red flag.\n- Step 3: Conversely, $$P/V$$ has units of $$\\text{W/V} = \\text{V} \\cdot \\text{A}/\\text{V} = \\text{A}$$ — correctly amperes. The dimensional check is a quick safeguard.\n\nTakeaway: $$I = P/V$$ (not $$V/P$$); the V's must cancel to leave amperes.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "A 100 W and a 60 W bulb are both rated for 240 V. Without computing exact resistance values, explain which bulb has the higher resistance and why this is counterintuitive.", "answer": "- Step 1: Both operate at the same voltage (240 V). With $$P = V^2/R$$, $$P \\propto 1/R$$ at fixed $$V$$. So the *higher-power* bulb has *lower* resistance.\n- Step 2: Therefore the **60 W bulb has the higher resistance** — counterintuitive because \"more resistance\" sounds like \"more heating effect\" by analogy with $$P = I^2R$$.\n- Step 3: The resolution: at fixed voltage, higher resistance means less current, and the reduction in $$I$$ overpowers the increase in $$R$$ in the $$I^2R$$ heating calculation. Equivalently, $$V^2/R$$ falls as $$R$$ rises.\n\nTakeaway: at fixed voltage (the household rating), brighter (higher-power) bulbs have *lower* resistance.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "Why is the cold resistance of a filament bulb so much lower than its hot operating resistance — and what is the microscopic reason?", "answer": "- Step 1: A bulb's filament is a metal (tungsten). Metals' resistance increases with temperature.\n- Step 2: At higher temperature, lattice ions vibrate with greater amplitude, presenting larger effective \"obstacles\" to drifting electrons → more collisions per second → higher resistivity → higher resistance.\n- Step 3: Cold: low vibration → low collision frequency → low R. Hot: high vibration → high collision frequency → high R. Tungsten's resistance can rise by a factor of ~10–15× between room temperature and ~2500°C operating temperature.\n\nTakeaway: lattice ion vibration amplitude is the microscopic origin of temperature-dependent resistance in metals.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "A potential divider has two resistors $$R_1$$ and $$R_2$$ in series across a supply $$V$$. Why does the bigger resistor get the bigger share of voltage, and how does this connect to $$P = I^2R$$? (3 steps)", "answer": "- Step 1: In series, current $$I$$ is the same through both resistors.\n- Step 2: From Ohm's Law, $$V_i = IR_i$$. Since $$I$$ is shared, $$V_i \\propto R_i$$: bigger resistor → bigger voltage drop.\n- Step 3: Equivalently, $$P_i = I^2 R_i$$ at fixed $$I$$, so the bigger resistor dissipates more power AND has more voltage across it. Both are consistent: more energy lost per unit charge means a bigger voltage drop AND more power dissipated.\n\nTakeaway: in series, $$V \\propto R$$ and $$P \\propto R$$ — the bigger resistor \"hogs\" both voltage and power.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Why can't you simply add resistances $$R_1 + R_2$$ to combine resistors in *parallel* — and what fundamental conservation law tells you that combinations work differently in parallel vs. series?", "answer": "- Step 1: In series, voltages add ($$V = V_1 + V_2$$, from energy conservation around the loop). Since $$I$$ is common, $$IR_T = IR_1 + IR_2$$ → $$R_T = R_1 + R_2$$.\n- Step 2: In parallel, *currents* add ($$I_T = I_1 + I_2$$, from charge conservation at the junction). Since $$V$$ is common, $$V/R_T = V/R_1 + V/R_2$$ → $$1/R_T = 1/R_1 + 1/R_2$$.\n- Step 3: The key is: identify the *shared* quantity (current in series, voltage in parallel), then start the proof from the *summed* quantity. This is why parallel combination uses reciprocals — you're summing currents, which produce reciprocal-resistance terms via Ohm's Law.\n\nTakeaway: series = \"voltages add\" (energy conservation); parallel = \"currents add\" (charge conservation). The math falls out accordingly.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "A device dissipates 24 W when 6 V is across it. Mental math: what's its resistance, and what's the current?", "answer": "- Step 1: Given $$V$$ and $$P$$, use $$R = V^2/P = 36/24 = 1.5$$ Ω.\n- Step 2: Current: $$I = P/V = 24/6 = 4$$ A.\n- Step 3: Cross-check with Ohm's Law: $$V = IR = 4 \\times 1.5 = 6$$ V ✓. And $$P = I^2R = 16 \\times 1.5 = 24$$ W ✓ — all three formulas agree.\n\nTakeaway: with any two of $$\\{V, I, R, P\\}$$, the other two are determined; multiple cross-checks should always agree.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Why does the equation $$W = IVt$$ encode a \"rate × time\" structure, and how does it relate to $$W = Pt$$? (2 steps)", "answer": "- Step 1: $$W = IVt$$ can be rearranged as $$W = (IV) \\times t$$. The term $$IV$$ is the *instantaneous power* (rate of energy delivery), so the whole expression is \"rate × time = total amount.\"\n- Step 2: This is identical in structure to $$W = Pt$$, where $$P$$ is power and $$t$$ is time. Indeed, $$P = IV$$, so $$W = IVt = Pt$$ — they're the same equation.\n\nTakeaway: $$W = Pt$$ is the parent; $$W = IVt$$, $$W = I^2Rt$$, and $$W = (V^2/R)t$$ are children obtained by substituting different expressions for $$P$$.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "A 5 V, 5 W iPhone charger is mistakenly used to charge an iPad rated 5.1 V, 2.1 A. What current does the iPhone charger deliver, and why is using it on the iPad problematic?", "answer": "- Step 1: Charger current rating: $$I = P/V = 5/5 = 1$$ A (one amp).\n- Step 2: The iPad expects 2.1 A. The 1 A charger can only deliver less than half the iPad's expected charging current.\n- Step 3: Consequences: (a) charging takes more than twice as long. (b) The charger runs continuously at its maximum, potentially overheating. (c) Long-term: continuously running a small charger at its limit can stress the iPad's battery management circuitry and shorten battery lifespan.\n\nTakeaway: chargers must be matched in voltage *and* sized to provide at least the device's rated current; undersized chargers work but are slow and stressful on both ends.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "Why is the dimensional unit of the volt $$\\text{kg} \\cdot \\text{m}^2 / (\\text{s}^3 \\cdot \\text{A})$$ in SI base units — and what does this tell you about voltage's relationship to mechanical quantities? (3 steps)", "answer": "- Step 1: Voltage is energy per charge: $$V = E/Q$$, so units are J/C.\n- Step 2: The joule in SI base units is $$\\text{kg} \\cdot \\text{m}^2 / \\text{s}^2$$ (from $$E = \\frac{1}{2}mv^2$$ or work = force × distance). The coulomb is $$\\text{A} \\cdot \\text{s}$$ (from $$Q = It$$).\n- Step 3: So $$\\text{V} = \\text{J/C} = (\\text{kg} \\cdot \\text{m}^2/\\text{s}^2) / (\\text{A} \\cdot \\text{s}) = \\text{kg} \\cdot \\text{m}^2 \\cdot \\text{s}^{-3} \\cdot \\text{A}^{-1}$$. This shows electrical and mechanical quantities are deeply linked: voltage is literally \"mechanical work per unit charge,\" and the SI base units make that explicit.\n\nTakeaway: SI base units reveal that voltage = mechanical-energy-per-charge — a hidden connection between electricity and mechanics.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "A typical UK home runs 12 hours of a 50 W LED TV daily. Conceptually, what is the daily energy consumption in kWh, and how does that translate to a yearly cost at 15p per kWh?", "answer": "- Step 1: Daily energy: $$E = Pt = 50 \\text{ W} \\times 12 \\text{ h} = 600$$ Wh = 0.6 kWh.\n- Step 2: Yearly energy: $$0.6 \\text{ kWh} \\times 365 \\approx 220$$ kWh.\n- Step 3: Cost: $$220 \\times 0.15 \\approx £33$$ per year. (Compare a 210 W plasma TV: 210/50 ≈ 4× higher, so ~£130/yr — a substantial saving from LED.)\n\nTakeaway: $$E$$ in kWh = power (kW) × time (h); cost = energy (kWh) × rate (£/kWh). LEDs save roughly 75–80% on the same usage pattern.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}], "count": 52}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "At the microscopic level, what causes a metallic conductor to heat up when current flows, and which particles end up with the extra thermal energy? (3 steps)", "answer": "- Step 1: A current is a drift of free electrons through a fixed lattice of positive ions. As electrons drift under the applied p.d., they accelerate between collisions and gain kinetic energy from the field.\n- Step 2: They then collide with the lattice ions and transfer some of that kinetic energy to the ions. The electrons are slowed down by these collisions (then re-accelerated by the field), while the ions begin to vibrate more energetically about their fixed positions.\n- Step 3: Increased ionic vibration *is* what we mean by thermal/internal energy at the atomic scale. So the ions are the ones that end up hotter; the electrons act as energy couriers between the field and the lattice.\n\nTakeaway: heating = electrons → collisions → ions vibrate more → temperature rises.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why is it conceptually wrong to say \"a resistor stores or uses up electrons\"?", "answer": "Charge is conserved (Kirchhoff's First Law): the number of electrons entering a resistor per second equals the number leaving per second. The electrons are not destroyed, absorbed, or stockpiled inside the resistor. What the resistor does is *slow them down* via collisions with the lattice — so the current (rate of flow) entering the resistor equals the current leaving, but the electrons hand off energy on the way through. The resistor accumulates *energy* (as heat), not charge.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Starting only from the definitions $$P = E/t$$, $$I = Q/t$$, and $$V = E/Q$$, derive $$P = IV$$. (3 steps)", "answer": "- Step 1: From $$V = E/Q$$ rearrange to $$E = QV$$. This says the energy carried by a charge $$Q$$ through a p.d. $$V$$ is just charge times voltage.\n- Step 2: Substitute into $$P = E/t$$: $$P = \\frac{QV}{t} = \\frac{Q}{t} \\cdot V$$.\n- Step 3: Recognise $$Q/t = I$$. Therefore $$P = IV$$.\n\nTakeaway: $$P = IV$$ is not an extra fact — it falls out of the definitions of current, voltage, and power.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Derive $$P = I^2R$$ from $$P = IV$$, and explain why this form is called the \"heating-effect\" formula. (2 steps)", "answer": "- Step 1: From Ohm's Law $$V = IR$$. Substitute into $$P = IV$$: $$P = I(IR) = I^2R$$.\n- Step 2: It's called the heating-effect formula because, at constant temperature, the rate at which a resistor dissipates energy as heat is exactly $$I^2R$$ — the current literally drives the collisions that heat the lattice, so framing power in terms of $$I$$ and $$R$$ goes straight to the physical mechanism.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Derive $$P = V^2/R$$ two different ways from $$P = IV$$. (2 steps)", "answer": "- Step 1 (direct): From Ohm's Law $$I = V/R$$. Substitute into $$P = IV$$: $$P = (V/R) \\cdot V = V^2/R$$.\n- Step 2 (alternative): Square $$I = V/R$$ to get $$I^2 = V^2/R^2$$. Substitute into $$P = I^2R$$: $$P = (V^2/R^2) \\cdot R = V^2/R$$. One factor of $$R$$ cancels.\n\nBoth routes work because all three power formulas are just $$P = IV$$ dressed in different clothes via Ohm's Law.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "You're given a circuit problem. How do you decide which of $$P = IV$$, $$P = I^2R$$, or $$P = V^2/R$$ to use? (3 steps)", "answer": "- Step 1: Identify which two of the three quantities ($$I, V, R$$) are *directly given* (not ones you'd have to calculate first). Using directly given values minimises rounding error and arithmetic slips.\n- Step 2: Match to the formula whose two variables you have:\n+ I and V given → $$P = IV$$\n+ I and R given → $$P = I^2R$$\n+ V and R given → $$P = V^2/R$$\n- Step 3: If you only have one of $$I$$, $$V$$, $$R$$, find a second using Ohm's Law, but always check whether choosing a different formula could have avoided the extra step.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "In a fixed resistor, what happens to the power dissipated if you double the current through it? Explain qualitatively.", "answer": "Power quadruples. Using $$P = I^2R$$ with $$R$$ fixed, $$P \\propto I^2$$, so doubling $$I$$ multiplies $$P$$ by $$2^2 = 4$$. Intuitively: doubling the current means twice as many charge carriers per second AND each carrier crosses twice the p.d. (because $$V = IR$$ also doubles). Energy delivered per second is therefore (twice the rate) × (twice the energy per charge) = 4× the original.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "A resistor is connected across a fixed voltage supply. If its resistance is doubled, what happens to the power it dissipates? (2 steps)", "answer": "- Step 1: With $$V$$ fixed, the appropriate formula is $$P = V^2/R$$. So $$P \\propto 1/R$$.\n- Step 2: Doubling $$R$$ halves $$P$$. Intuitively: a bigger resistance pulls less current from the same voltage ($$I = V/R$$ halves), so charge flows more sluggishly and less energy is dumped per second.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "A resistor carries a fixed current (e.g., it's in series with a current-controlling element). If its resistance is doubled, what happens to its power dissipation?", "answer": "Power doubles. With $$I$$ fixed, use $$P = I^2R$$, so $$P \\propto R$$. Conceptually: same number of charges per second pass through, but each one now drops twice the voltage (since $$V = IR$$ doubles), so each carries twice the energy across the resistor — total energy per second doubles.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Two students compute the power in a 2 Ω resistor carrying 3 A. Student A uses $$P = I^2R$$. Student B first finds $$V = IR = 6$$ V, then uses $$P = V^2/R$$. They get the same answer — so why does it matter which method is \"preferred\"?", "answer": "Both are algebraically equivalent, so they must give the same answer. The preference is about *exam hygiene*: using directly-given values ($$I$$ and $$R$$ here) means one calculation step and one chance for an arithmetic/rounding error. Student B introduces an intermediate $$V$$ which is an extra opportunity to slip on units, sig figs, or rounding. The shortest substitution path is also the safest.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "From $$P = E/t$$, write down three equivalent expressions for the electrical energy $$W$$ dissipated in a resistor in time $$t$$. (3 steps)", "answer": "- Step 1: Rearrange $$P = W/t$$ to get $$W = Pt$$.\n- Step 2: Substitute each form of $$P$$:\n+ $$W = IVt$$ (from $$P = IV$$)\n+ $$W = I^2Rt$$ (from $$P = I^2R$$)\n+ $$W = (V^2/R)\\,t$$ (from $$P = V^2/R$$)\n- Step 3: These are all the same energy — pick whichever uses the directly given quantities.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Why is $$E = QV$$ usually a *roundabout* way to find electrical energy when the question gives you current, voltage, and time?", "answer": "$$E = QV$$ requires you first to compute $$Q = It$$, then multiply by $$V$$ — two steps and two chances to slip. But $$W = IVt$$ gives the answer in *one* substitution. Algebraically they're identical (since $$Q = It$$ means $$QV = IVt$$), but unless $$Q$$ is given explicitly in the question, going via $$Q$$ is just extra work. Reserve $$E = QV$$ for the case where charge $$Q$$ is stated as a given.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "A bulb operates at 6 V drawing 0.5 A. Without doing the full arithmetic, describe how you would find the energy converted in 3 minutes and what unit the answer takes. (2 steps)", "answer": "- Step 1: $$I$$ and $$V$$ are directly given, plus $$t$$. Use $$W = IVt$$ — one-step formula.\n- Step 2: Convert time to seconds (3 min = 180 s), multiply $$I \\times V \\times t$$. Units: A × V × s = (C/s)(J/C)(s) = J. So the answer is in joules. Mental check: $$P = IV = 3$$ W, and 3 W for 180 s ≈ 540 J.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Why does potential difference have units of joules per coulomb, and how does this directly motivate the formula $$W = QV$$?", "answer": "Potential difference is *defined* as energy transferred per unit charge passing through a component: $$V = W/Q$$. So 1 volt literally means 1 joule of energy delivered per coulomb of charge. Rearranging gives $$W = QV$$ — total energy = (charge that passed) × (energy each unit of charge delivered). The formula is just the definition flipped around.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "A common slip: writing $$V = E/t$$ instead of $$V = E/Q$$. Why is the \"Q\" version the correct one, and what does the \"E/t\" version actually compute?", "answer": "Potential difference is energy *per unit charge* (definition of voltage), so the denominator must be charge $$Q$$, not time $$t$$. The expression $$E/t$$ has units J/s = W = power, not voltage. So writing $$V = E/t$$ is dimensionally wrong: it would give you the power instead of the p.d. Remember: time goes in current ($$I = Q/t$$); charge goes in voltage ($$V = E/Q$$).", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Another common slip: writing $$R = IV$$. Use units to show why $$R = V/I$$ is the only correct version.", "answer": "Resistance is measured in ohms (Ω). The ohm is defined as 1 volt per ampere: $$1\\,\\Omega = 1\\,\\text{V}/\\text{A}$$. So the formula must have V in the numerator and I in the denominator: $$R = V/I$$. If you wrote $$R = IV$$, the units would be V·A = W (watts) — that's power, not resistance. The dimensional check rules out $$R = IV$$ instantly.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "What is a fuse, and what physical event happens inside it when it \"blows\"? (2 steps)", "answer": "- Step 1: A fuse is a thin wire connected in series with an appliance, designed with a specific *current rating* (e.g., 3 A, 5 A, 13 A in the UK). Under normal current, the wire stays cool enough to remain intact.\n- Step 2: If the current exceeds the rated value (e.g., due to a short circuit or fault), the $$I^2R$$ heating in the thin fuse wire becomes large enough to melt it. The wire breaks, opening the circuit, cutting current to the appliance and preventing fire or further damage.\n\nTakeaway: the fuse exploits the heating effect *deliberately* — it's a sacrificial component.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Outline the standard procedure for choosing a fuse rating for an appliance, given its voltage and power rating. (3 steps)", "answer": "- Step 1: Calculate the appliance's normal operating current using $$I = P/V$$ (a rearrangement of $$P = IV$$). Beware the easy slip of writing $$I = V/P$$ — units check: A = W/V is correct.\n- Step 2: Compare this current to the available standard fuse ratings (commonly 3 A, 5 A, 13 A).\n- Step 3: Choose the *next standard rating above* the operating current. Too low → fuse blows during normal use. Too high → fuse fails to protect at dangerous currents.\n\nExample logic: I = 12.5 A → fit 13 A (not 3 A, not 30 A).", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "An appliance has an operating current of 8.7 A. Why is a 5 A fuse the wrong choice, and why isn't a 30 A fuse a \"safer\" alternative to 13 A? (2 steps)", "answer": "- Step 1: A 5 A fuse would blow under normal operation (8.7 A > 5 A), making the appliance unusable. So it's too restrictive.\n- Step 2: A 30 A fuse only blows above 30 A — a fault current of, say, 20 A would flow happily through it and could overheat the appliance wiring, defeating the protective purpose. The 13 A fuse sits just above normal current (so it doesn't blow in routine use) but well below dangerous levels (so it blows promptly in a fault). \"Higher rating = safer\" is the wrong instinct.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Define the efficiency of an electrical device and explain what \"useful\" vs \"total\" power means in the context of, say, an electric motor lifting a load.", "answer": "Efficiency is the fraction (or percentage) of input power that is converted into the *desired* output form: $$\\eta = (P_\\text{useful}/P_\\text{total}) \\times 100\\%$$. For an electric motor lifting a mass, $$P_\\text{total}$$ is the electrical power supplied ($$P = IV$$), while $$P_\\text{useful}$$ is the mechanical power output ($$mgh/t$$ for lifting). The shortfall — the rest of the energy — is dissipated as heat in the motor windings (due to $$I^2R$$), as sound, and in friction. Efficiency is dimensionless because it's a ratio of two powers.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "A device receives 500 J of electrical energy and produces 350 J of useful output, all in 10 s. Without finalising the arithmetic, describe how you'd find (a) the input power and (b) the efficiency, and explain what happens to the missing 150 J. (3 steps)", "answer": "- Step 1: Input power is total electrical energy per second: $$P_\\text{in} = W/t = 500/10 = 50$$ W.\n- Step 2: Useful power output is the useful energy per second: $$P_\\text{useful} = 350/10 = 35$$ W. (Or compute efficiency directly from energies: $$350/500 = 70\\%$$.)\n- Step 3: The missing 150 J (or equivalently 15 W) is dissipated as heat, sound, etc. — non-useful energy forms. Efficiency captures *all* unwanted losses, not just heat, but heat usually dominates.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Why does a filament lamp have such low efficiency for producing light, and how is the \"wasted\" energy distributed? (2 steps)", "answer": "- Step 1: The filament must reach a very high temperature to glow visibly. Most of the electrical energy goes into heating the filament (via $$I^2R$$) and the surroundings.\n- Step 2: The hot filament emits a broad blackbody spectrum: only roughly 10% of the radiation is in the visible band; the rest is in the infrared (felt as heat, not seen as light). So even though almost 100% of the electrical input becomes radiation, only about 10% of that is *useful* light. LEDs, by contrast, generate light directly via electronic transitions without first heating a body, hence much higher efficiency.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "In a circuit, why does the equation $$P_\\text{battery} = V_\\text{battery} \\times I_\\text{battery}$$ give the total power supplied — and what's wrong with using $$V$$ from one resistor times $$I$$ from another? (2 steps)", "answer": "- Step 1: Power is energy per unit time. For a battery, the relevant $$V$$ is its own e.m.f./terminal voltage (energy gained per coulomb passing through it), and $$I$$ is the current through the battery itself. Multiplying these gives total electrical energy delivered per second.\n- Step 2: Mixing a resistor's voltage with the battery's current (or vice versa) is dimensionally fine but physically meaningless — you're not computing the power of any single component. Each component's power must use that component's *own* $$V$$ and $$I$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "For a series resistor carrying the total circuit current, why is $$P = I^2R$$ usually the most natural choice, while for resistors in a parallel branch, $$P = V^2/R$$ is often more natural? (2 steps)", "answer": "- Step 1: In a series resistor, the current you've already computed (total circuit current) flows directly through it, so $$I$$ and $$R$$ are both directly known — $$P = I^2R$$ is one step.\n- Step 2: In a parallel branch, all branches share the same p.d. across them — once you've found that common voltage, $$V$$ and each branch's $$R$$ are directly known. Using $$P = V^2/R$$ avoids first computing each branch's current. It's about minimising intermediate steps based on what's \"free\" in each topology.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "A 12 V supply drives a 2.8 Ω series resistor in series with a parallel pair (4 Ω and an unknown $$R_x$$). The 4 Ω carries 1.5 A. Without doing the final arithmetic, explain the *strategy* for finding the power dissipated in each component. (5 steps)", "answer": "- Step 1: Find the p.d. across the 4 Ω: $$V_4 = IR = 1.5 \\times 4 = 6$$ V.\n- Step 2: Parallel branches share this 6 V, so $$V_{R_x} = 6$$ V. The series resistor then has the remainder: $$V_{2.8} = 12 - 6 = 6$$ V.\n- Step 3: Total current = current through 2.8 Ω = $$6/2.8 \\approx 2.14$$ A. By Kirchhoff's First Law, $$I_x = 2.14 - 1.5 \\approx 0.64$$ A, so $$R_x = 6/0.64 \\approx 9.4$$ Ω.\n- Step 4: Now pick the power formula by what's directly known per component:\n+ 2.8 Ω: use $$P = I^2R$$ with $$I_T$$\n+ 4 Ω: use $$P = VI$$ (both given)\n+ $$R_x$$: use $$P = V^2/R$$ (cleanest)\n- Step 5: Cross-check: sum of these powers should match $$P_\\text{supply} = V_\\text{batt} \\times I_T \\approx 12 \\times 2.14$$.\n\nTakeaway: in mixed circuits, work the resistances first, then pick the most direct power formula per component.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Why must total power supplied by the battery equal the sum of powers dissipated in all components (in a circuit with negligible internal resistance)?", "answer": "Conservation of energy. The battery is the only energy source, converting chemical to electrical at a rate $$P_\\text{batt} = V_\\text{batt} I_\\text{batt}$$. Every joule it supplies per second must end up somewhere — and in a circuit of pure resistors, it's all dissipated as heat. So $$P_\\text{batt} = \\sum P_\\text{resistor}$$. Any discrepancy in worked problems is purely arithmetic/rounding error, not real physics.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Three identical bulbs are connected (a) in series, (b) in parallel, across the same battery. In which configuration does each bulb glow brighter, and why?", "answer": "Each bulb glows brighter in *parallel*. In series, the full battery voltage is shared among the three bulbs, so each bulb sees only ~1/3 of the supply voltage and dissipates much less power ($$P = V^2/R$$ with smaller $$V$$). In parallel, every bulb sees the *full* supply voltage independently, so each dissipates the full $$V^2/R$$. Parallel also draws more total current from the battery (since total resistance is lower), so the battery supplies more total power.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A 250 mA current flows through a 47 kΩ resistor. The maximum safe power is 250 mW. Without finishing the calculation, describe how you'd determine the maximum safe current and what the underlying limit physically represents. (3 steps)", "answer": "- Step 1: With $$P$$ and $$R$$ given, rearrange $$P = I^2R$$ to $$I = \\sqrt{P/R}$$. Plug in $$P = 0.250$$ W and $$R = 47{,}000$$ Ω.\n- Step 2: $$I^2 = P/R \\approx 5.3 \\times 10^{-6}\\text{ A}^2$$, so $$I \\approx 2.3$$ mA.\n- Step 3: Physically, this is the current above which the $$I^2R$$ heating raises the resistor's temperature beyond what it can safely shed to the surroundings — the resistor would damage itself or its substrate. The rating is a thermal-tolerance limit, not an electrical breakdown limit.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Why does the heating-effect law $$P = I^2R$$ apply *at constant temperature*, and what changes if the resistor heats up significantly during operation?", "answer": "$$P = I^2R$$ assumes $$R$$ has a well-defined fixed value — true at constant temperature. In real metals, $$R$$ rises with temperature (more lattice vibration means more electron–ion collisions). So as the resistor heats up under high current, $$R$$ creeps upward, which (at fixed voltage) reduces $$I$$ and changes the dissipated power. For an ohmic resistor near room temperature, the change is small; for a tungsten filament starting from cold, $$R$$ can multiply ~10× by operating temperature, causing a large current spike at switch-on that quickly drops as the filament heats.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "Show that an electric kettle rated 240 V, 3.0 kW operates safely with a 13 A fuse, and find (qualitatively) the resistance of its heating element. (2 steps)", "answer": "- Step 1: Operating current $$I = P/V = 3000/240 = 12.5$$ A. Since $$12.5 < 13$$, the fuse doesn't blow under normal operation — the 13 A fuse is the correct standard rating just above 12.5 A.\n- Step 2: For the element resistance, use $$P = V^2/R$$ rearranged: $$R = V^2/P = 240^2/3000 \\approx 19$$ Ω. Intuitively, the element is a fairly low-resistance heater — low enough to pull a hefty current from mains and dump kilowatts of heat into the water.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Two lamps are connected in series across a 150 V supply. Lamp 1 has higher resistance than lamp 2. Which one is brighter, and why does this look counterintuitive?", "answer": "The *higher-resistance* lamp is brighter. In series, both carry the same current $$I$$. So power dissipated in each is $$P = I^2R$$, meaning $$P \\propto R$$ — the bigger resistor dissipates more power. This feels counterintuitive because we associate \"resistance\" with \"blocking energy flow.\" The resolution: the same current is forced through both, and each unit of charge drops more voltage across the bigger resistor (since $$V = IR$$), so more energy is dumped there per second.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "Two lamps are connected in *parallel* across the same supply. Which one (higher or lower resistance) is brighter, and how does that compare to the series case?", "answer": "In parallel, the *lower-resistance* lamp is brighter — the opposite of the series case. Both branches see the same voltage, so power is $$P = V^2/R$$, meaning $$P \\propto 1/R$$. The lower-resistance lamp pulls more current and dissipates more power. Conceptually: with the same energy-per-charge available, a low-resistance path lets more charge flow per second, so more total energy is delivered.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Why is $$P = V^2/R$$ inappropriate to compare two resistors in *series*, but $$P = I^2R$$ inappropriate to compare two resistors in *parallel*? (2 steps)", "answer": "- Step 1: In series, $$I$$ is the shared quantity — both resistors carry the same current. So $$P = I^2R$$ cleanly separates the resistors by their differing $$R$$. But the voltages across them differ, so $$V^2/R$$ requires you to know each one's individual voltage drop — extra work.\n- Step 2: In parallel, $$V$$ is the shared quantity — both see the same p.d. So $$P = V^2/R$$ cleanly separates them by $$R$$. Their currents differ, so $$I^2R$$ needs individual branch currents — extra work. Match the formula to whichever quantity is *common* across the components being compared.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "Explain why doubling the voltage across a fixed resistor quadruples the power, by thinking about *both* the current and the energy each charge carries. (2 steps)", "answer": "- Step 1: Doubling $$V$$ doubles the current too (Ohm's Law: $$I = V/R$$). So twice as many coulombs pass per second.\n- Step 2: Each coulomb now also gains twice the energy crossing the resistor (since $$V$$ doubled). So the power = (rate of charge flow) × (energy per charge) = $$2 \\times 2 = 4$$ times the original. This is the intuitive content of $$P = V^2/R$$: both factors of $$V$$ contribute one factor of 2.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "A 1 W LED and a 60 W filament lamp give roughly the same brightness. What does this tell you about the difference in their conversion mechanisms?", "answer": "Brightness corresponds to *useful light output*, not total power input. If both produce similar visible light, then the LED converts roughly 60× more efficiently. The filament lamp wastes ~90%+ of its 60 W as infrared heat (because incandescence is inherently a broadband thermal process). The LED uses semiconductor electron-hole recombination to emit photons directly in the visible band, with very little going to heat. So total electrical power and useful output power can differ by huge factors when the conversion physics is inefficient.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "A 5 V, 2 A iPad charger fully charges a battery in 4 hours. Without doing exact arithmetic, describe how you'd find the energy stored, what assumptions you'd make, and roughly what order of magnitude the answer should be. (3 steps)", "answer": "- Step 1: Power supplied: $$P = IV = 5 \\times 2 = 10$$ W. Time = 4 h = 14,400 s.\n- Step 2: Energy delivered: $$W = Pt = 10 \\times 14{,}400 = 144{,}000$$ J ≈ 0.14 MJ.\n- Step 3: Assumption: 100% of supplied electrical energy is stored in the battery. Reality: some is lost as heat during charging, so actual stored energy is somewhat less than 144 kJ — but the order of magnitude (10⁵ J) is right.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Why does a kilowatt-hour (kW·h) equal 3.6 MJ, and why is this unit used for electricity bills rather than joules?", "answer": "$$1\\text{ kW} \\cdot 1\\text{ h} = 1000\\text{ W} \\times 3600\\text{ s} = 3{,}600{,}000\\text{ J} = 3.6\\text{ MJ}$$. Electricity companies use kW·h because typical household consumption (hundreds to thousands of joules per second over hours) gives convenient numbers in kW·h (e.g., 10 kW·h/day) instead of unwieldy megajoules (36 MJ/day). It's a units-of-convenience choice; the underlying physics is the same energy in joules.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "When you switch on a filament lamp, why does its instantaneous power dissipation briefly spike above its rated steady-state value? (3 steps)", "answer": "- Step 1: At cold temperature (room temp), the filament's resistance is much lower than at operating temperature — maybe by a factor of 10 for tungsten.\n- Step 2: The voltage across it is set by the supply (say, 240 V), so by Ohm's Law $$I = V/R$$, a low $$R$$ means a large initial current. With small $$R$$ and large $$I$$, the power $$P = V^2/R$$ is much higher than steady state.\n- Step 3: This surge heats the filament rapidly, $$R$$ rises, current and power drop, settling to the rated value within a fraction of a second. This is why filaments most often fail at the moment of switch-on.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "Why is current conserved at every junction in a circuit (Kirchhoff's First Law) regardless of whether the circuit is \"series\" or \"parallel\"?", "answer": "Kirchhoff's First Law is purely a statement of charge conservation: charge cannot be created or destroyed, and (in steady state) charge cannot accumulate at a junction (a junction is just a point with no storage capacity). So whatever charge flows in per second must flow out per second. This is topology-independent — it holds at every node in every circuit, however complicated. \"Series vs parallel\" affects *what equations you can write* but not whether $$\\sum I_\\text{in} = \\sum I_\\text{out}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Why is voltage *not* the same everywhere in a series circuit, even though current is — and what does this tell you about the difference between charge and energy? (2 steps)", "answer": "- Step 1: Current is the rate of flow of charge. Since charges can't be created or destroyed and can't pile up, the same number of charges per second pass every point in a series loop — current is uniform.\n- Step 2: Voltage is the *energy per unit charge*. As a charge crosses a component, it transfers some of its energy to that component (as heat in a resistor, light in a bulb, etc.). So the energy-per-charge progressively drops across each component, even though the *number* of charges per second is unchanged. Charge is conserved; energy is dissipated.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "A small heater is rated 1500 W at 230 V. Roughly what current does it draw, and roughly what is the resistance of its element? (2 steps)", "answer": "- Step 1: Current: $$I = P/V = 1500/230 \\approx 6.5$$ A. (Mental check: 1500/200 = 7.5, slightly less since denominator is bigger → ~6.5 A.)\n- Step 2: Resistance: $$R = V^2/P = 230^2/1500$$. $$230^2 \\approx 53{,}000$$, so $$R \\approx 53{,}000/1500 \\approx 35$$ Ω. Sanity-check via Ohm's Law: $$R = V/I = 230/6.5 \\approx 35$$ Ω ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "A common student mistake: applying $$P = IV$$ to a battery, where $$I$$ is the current through one *branch* of a parallel circuit and $$V$$ is the battery's e.m.f. Why is this wrong? (2 steps)", "answer": "- Step 1: The battery's power output uses the total current it supplies — i.e., the current flowing through the battery itself, which is the sum of all branch currents in parallel circuits.\n- Step 2: Multiplying battery voltage by only one branch's current undercounts the energy delivered per second, because the other branches also draw current from the same battery. Always use $$I_\\text{total}$$ (the current at the battery terminals) for $$P_\\text{battery} = V \\times I_\\text{total}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Two appliances in a house — a 100 W lamp and a 2000 W kettle — are both plugged into the same 240 V mains. Without numerical detail, explain why the kettle needs a much higher-rated fuse and why its element must have much lower resistance.", "answer": "Both operate at the same 240 V. The kettle dissipates 20× more power than the lamp ($$2000/100 = 20$$), so by $$P = IV$$ at fixed $$V$$, the kettle draws 20× more current. A larger fuse is needed to allow that current without blowing during normal use. Also, by $$P = V^2/R$$ at fixed $$V$$, more power means *lower* $$R$$ — the kettle element has roughly 1/20th the resistance of the lamp. Low resistance lets a large current flow, and that large $$I^2R$$ heating is exactly what boils the water quickly.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "In the lesson, Phuc once wrote $$P = 0.83 \\times 3.6$$ for battery power, where 3.6 was the total circuit resistance and 0.83 was the battery current. Why is this dimensionally wrong, and what *was* the correct calculation?", "answer": "$$I \\times R$$ has units A × Ω = V, not W. So multiplying a current by a resistance gives a voltage, not a power. The correct formula for battery power is $$P = V_\\text{battery} \\times I_\\text{battery}$$, e.g., $$P = 3 \\times 0.83 \\approx 2.5$$ W if the battery is 3 V. The trap is that \"0.83 × 3.6 = 3.0\" gives a plausible-looking number, but its units are volts — it's just the battery e.m.f. recovered via Ohm's Law, not the power.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Why is it generally cleaner to compute total power from the supply as $$P_\\text{total} = V_\\text{supply} \\times I_\\text{total}$$ rather than as the sum of individual component powers, even though both should agree?", "answer": "Both *must* agree by conservation of energy, but summing individual powers means computing each component's $$P$$ first — multiple steps, multiple rounding errors. $$V_\\text{supply} \\times I_\\text{total}$$ uses two quantities that are usually known directly (the supply voltage is given; total current is found in one Ohm's-Law step). It's the shortest path. The component-by-component sum then serves as a useful *check* on your work.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Why is it conceptually meaningful to talk about energy being \"dissipated\" in a resistor rather than \"stored\" or \"lost\"?", "answer": "\"Dissipated\" literally means \"scattered\" — the energy doesn't vanish (energy is conserved), but it becomes spread out among the disordered thermal motion of countless lattice ions. It can't easily be recovered as useful work, because organising a sea of random vibrations back into directed electron motion is thermodynamically very expensive (second law). \"Lost\" misleadingly suggests violation of conservation; \"stored\" suggests retrievability. \"Dissipated\" captures both: still present as heat, but degraded.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "A 230 V hair-dryer is rated 2000 W. Should it be fitted with a 5 A or a 13 A fuse, and explain the reasoning in terms of both normal and fault conditions. (3 steps)", "answer": "- Step 1: Normal operating current: $$I = P/V = 2000/230 \\approx 8.7$$ A.\n- Step 2: 5 A fuse would blow during normal use (8.7 > 5), so the dryer wouldn't run. Reject.\n- Step 3: 13 A fuse allows normal operation (8.7 < 13) but cuts off at higher fault currents (e.g., a short circuit could push current well above 13 A, blowing the fuse and protecting the device). So fit the 13 A fuse — it's the next standard rating above operating current.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Three different power formulas exist for resistors. Are there *physically* three different things going on, or just one phenomenon expressed three ways?", "answer": "Just one phenomenon, three views. The underlying physics is: charges (carrying energy $$E = QV$$) flow through the resistor and dump energy via lattice collisions. The rate of energy transfer is $$P = E/t$$, which becomes $$P = IV$$. Ohm's Law then lets you swap one of $$I, V$$ for the other via $$R$$, giving $$P = I^2R$$ or $$P = V^2/R$$. All three are mathematically equivalent — choosing one is a matter of *what's most directly known*, not what physics applies.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "Why doesn't the *type* of component (resistor, lamp, motor) change the formula $$P = IV$$, even though it changes how the energy is used? (2 steps)", "answer": "- Step 1: $$P = IV$$ comes directly from the definitions of current and voltage. It says: power = (charge per second) × (energy per charge) = energy per second, regardless of what the component does with that energy.\n- Step 2: What changes is the *form* the energy ends up in: in a resistor it's heat, in a lamp it's light + heat, in a motor it's kinetic energy + heat, in a battery being charged it's stored chemical energy. $$P = IV$$ is universal; the conversion mechanism varies. (Only $$P = I^2R$$ and $$P = V^2/R$$ specifically require Ohm's Law and thus an ohmic resistor at constant temperature.)", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "An LED dissipates 4 W and provides as much useful light as a 50 W halogen lamp. Estimate the efficiency improvement and reason about where the saved energy \"would have\" gone in the halogen case. (2 steps)", "answer": "- Step 1: If the useful light output is roughly the same, then the LED uses ~4/50 = 8% of the energy of the halogen for the same outcome. The halogen wastes most of its 50 W input.\n- Step 2: In the halogen, most of the 50 W goes into heating the filament and surroundings — infrared radiation and direct heat conduction. The LED avoids this thermal pathway by generating visible photons directly via semiconductor processes. The \"saved\" 46 W per lamp doesn't have to be supplied at all — it's not just shifted to a different form; it never needs to be drawn from the grid.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}], "count": 50}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.9, "in_tokens": 46472, "out_tokens": 11199, "reasoning_chars": 4156, "cost_eur": 0.081, "elapsed_s": 127, "content_chars": 34962}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 46472, "out_tokens": 11172, "reasoning_chars": 3101, "cost_eur": 0.0809, "elapsed_s": 403, "content_chars": 36711}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.9, "in_tokens": 46472, "out_tokens": 14114, "reasoning_chars": 5026, "cost_eur": 0.0903, "elapsed_s": 251, "content_chars": 44055}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 44997, "out_tokens": 7455, "reasoning_chars": 13643, "cost_eur": 0.0158, "elapsed_s": 70, "content_chars": 12764}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 44997, "out_tokens": 7401, "reasoning_chars": 2191, "cost_eur": 0.0158, "elapsed_s": 63, "content_chars": 23408}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 68166, "out_tokens": 20405, "reasoning_chars": 0, "cost_eur": 2.3486, "elapsed_s": 270, "content_chars": 48013}, "
