eat. Brief switch-on time keeps the cell cool.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "A battery with $$\\varepsilon = 4.5\\,V$$ and $$r = 0.4\\,\\Omega$$ is connected to a lamp of resistance $$6.4\\,\\Omega$$. Without doing detailed calculations, compare the power dissipated in the lamp versus the power wasted inside the cell. Which is larger, and roughly by how much? (2 steps)", "answer": "- Step 1: The current is $$I = \\varepsilon/(R+r) = 4.5/(6.4 + 0.4) = 4.5/6.8 \\approx 0.66\\,A$$. Power in the lamp: $$P_{lamp} = I^2 R = 0.66^2 \\times 6.4 \\approx 2.8\\,W$$. Power wasted in cell: $$P_{wasted} = I^2 r = 0.66^2 \\times 0.4 \\approx 0.17\\,W$$.\n- Step 2: The lamp power is about 16 times larger than the wasted power because $$R = 6.4\\,\\Omega$$ is 16 times larger than $$r = 0.4\\,\\Omega$$, and both use the same $$I^2$$ factor. The ratio $$P_{lamp}/P_{wasted} = R/r = 6.4/0.4 = 16$$. Most of the power goes to the load because $$R \\gg r$$ — the internal resistance is a small fraction of the total, so only a small fraction of the power is wasted.\n\nRule of thumb: when $$R \\gg r$$, most power reaches the load (high efficiency); when $$R = r$$, power is split 50/50 (maximum power but low efficiency).", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "What safety precautions must be followed during CP8, and why is a burning smell a warning sign? (2 steps)", "answer": "- Step 1: Safety precautions: (1) do not touch electrical components immediately after use — they may be hot; (2) switch off immediately if a burning smell is detected; (3) keep all liquids away from the apparatus. These prevent burns, electrical hazards, and short circuits from spills.\n- Step 2: A burning smell indicates a component is overheating — likely the variable resistor or the cell is dissipating excessive power. At low resistance settings, high currents flow and $$I^2R$$ heating can melt insulation or damage components. Continuing to run the circuit risks component failure, fire, or in the case of the cell, leakage of hot chemicals.\n\nThe variable resistor is the most vulnerable component because it handles the full circuit current and its resistance is being deliberately decreased during the experiment.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "Explain why a voltmeter connected across the terminals of a cell in an *open* circuit reads the e.m.f., but the same voltmeter in a *closed* circuit reads the terminal p.d. (which is less). Use the concept of lost volts in your answer. (2 steps)", "answer": "- Step 1: Open circuit ($$I \\approx 0$$): no current flows through the cell's internal resistance, so there is no voltage drop across $$r$$. Lost volts $$= Ir = 0$$. The full e.m.f. appears at the terminals, and the voltmeter reads $$\\varepsilon$$.\n- Step 2: Closed circuit ($$I > 0$$): current flows through $$r$$, creating a voltage drop $$Ir$$ across it. This drop *subtracts* from the e.m.f. — it is \"lost\" to the external circuit. The voltmeter now reads $$V = \\varepsilon - Ir$$, which is less than $$\\varepsilon$$. The greater the current, the greater the lost volts, and the lower the voltmeter reading.\n\nThe voltmeter always reads the terminal p.d.; it just happens that in open circuit, terminal p.d. equals e.m.f.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "A student claims \"two identical cells in parallel give double the voltage.\" Identify and correct this misconception, and explain what actually doubles (or increases). (2 steps)", "answer": "- Step 1: This is wrong. Two identical cells in parallel give the *same* e.m.f. as one cell: $$\\varepsilon_{total} = \\varepsilon$$. A charge passing through the external circuit only goes through one cell's worth of e.m.f., not both. The cells are side by side, not end to end.\n- Step 2: What *does* change is the effective internal resistance: $$r_{total} = r/2$$ (halved, for two identical cells). This means the battery can deliver *more current* with *less voltage sag* than a single cell. The current-delivery capacity effectively doubles, not the voltage.\n\nSeries cells increase voltage; parallel cells decrease internal resistance and increase current capacity.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "Synthesis question: A battery with $$\\varepsilon = 6.0\\,V$$ and $$r = 2.0\\,\\Omega$$ is connected to a load $$R$$. If $$R$$ is adjusted from $$0.5\\,\\Omega$$ to $$2.0\\,\\Omega$$ to $$8.0\\,\\Omega$$, describe qualitatively how the terminal p.d. and power to the load change. At which value of $$R$$ is maximum power delivered? (3 steps)", "answer": "- Step 1: **Terminal p.d.** increases monotonically as $$R$$ increases. At $$R = 0.5\\,\\Omega$$: large current, large lost volts, low $$V$$. At $$R = 8.0\\,\\Omega$$: small current, small lost volts, $$V \\approx \\varepsilon$$. Terminal p.d. rises from well below $$6\\,V$$ toward nearly $$6\\,V$$.\n- Step 2: **Power to load** peaks at $$R = r = 2.0\\,\\Omega$$ (maximum power transfer theorem). At $$R = 0.5\\,\\Omega$$: high current but low voltage across load → low power. At $$R = 8.0\\,\\Omega$$: high voltage but low current → low power. At $$R = 2.0\\,\\Omega$$: the balance of voltage and current is optimal for power delivery.\n- Step 3: Maximum power $$= \\varepsilon^2/(4r) = 36/(4 \\times 2) = 36/8 = 4.5\\,W$$. At this point, terminal p.d. $$= \\varepsilon/2 = 3.0\\,V$$ and current $$= \\varepsilon/(2r) = 6.0/4.0 = 1.5\\,A$$. Check: $$P = VI = 3.0 \\times 1.5 = 4.5\\,W$$. ✓\n\nThe key insight: maximum power does *not* occur at maximum terminal p.d. or maximum current — it occurs at the sweet spot where $$R = r$$.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "A battery with $$\\varepsilon = 12\\,V$$ and $$r = 0.01\\,\\Omega$$ delivers $$200\\,A$$ to a starter motor. Explain why the headlights dim when the engine starts, using the concepts of terminal p.d. and lost volts. (2 steps)", "answer": "- Step 1: Before starting, the headlights draw a small current ($$\\sim 5\\,A$$). Lost volts $$= 5 \\times 0.01 = 0.05\\,V$$, so terminal p.d. $$\\approx 11.95\\,V$$ — essentially the full $$12\\,V$$. Headlights are bright.\n- Step 2: When the starter motor engages, it draws $$200\\,A$$. Lost volts jump to $$200 \\times 0.01 = 2.0\\,V$$. Terminal p.d. drops to $$12 - 2 = 10\\,V$$. The headlights are now running at $$10\\,V$$ instead of $$12\\,V$$ — about 17% less voltage, which means significantly less power ($$P \\propto V^2$$, so roughly 30% less power). The headlights visibly dim.\n\nThis is a direct real-world demonstration of $$V = \\varepsilon - Ir$$: a heavy current load drags down the terminal voltage for everything sharing the same battery.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "A student uses a fresh cell for CP8 and gets a straight-line V–I graph. Another student uses an old, partially depleted cell and gets a curved graph. Explain why the depleted cell produces curvature. (2 steps)", "answer": "- Step 1: A fresh cell has stable chemistry: its e.m.f. and internal resistance are approximately constant across the range of currents tested, so $$V = \\varepsilon - Ir$$ produces a straight line.\n- Step 2: A depleted cell has exhausted some of its chemical reactants. Its e.m.f. may drift downward during the experiment (less energy available per coulomb), and its internal resistance may be both larger and more variable (increased resistance of degraded electrodes and depleted electrolyte). As current changes, $$r$$ changes non-linearly, so the V–I relationship departs from a straight line. The graph curves because the underlying constants in $$V = \\varepsilon - Ir$$ are no longer constant.\n\nCP8 method explicitly specifies using a fresh cell to ensure the linear model is valid.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "A battery has $$\\varepsilon = 12.0\\,V$$ and $$r = 12.0\\,\\Omega$$, connected in series with $$R_1 = 15.0\\,\\Omega$$ and an unknown resistor $$R_2$$. The p.d. across $$R_2$$ is $$6.0\\,V$$. Walk through finding the current and $$R_2$$ using Kirchhoff's voltage law. (3 steps)", "answer": "- Step 1: By Kirchhoff's voltage law around the loop: $$\\varepsilon = I(r + R_1 + R_2)$$. We also know $$V_2 = IR_2 = 6.0\\,V$$, so $$R_2 = 6.0/I$$. Substitute into the KVL equation: $$12.0 = I(12.0 + 15.0) + I \\times (6.0/I) = 27.0I + 6.0$$.\n- Step 2: Solve for $$I$$: $$12.0 - 6.0 = 27.0I$$, so $$I = 6.0/27.0 = 0.222\\,A$$ (to 3 s.f.).\n- Step 3: Find $$R_2$$: $$R_2 = V_2/I = 6.0/0.222 = 27\\,\\Omega$$. Sense-check: $$\\varepsilon = I(r + R_1 + R_2) = 0.222 \\times (12 + 15 + 27) = 0.222 \\times 54 = 12.0\\,V$$. ✓\n\nThis was the lesson Q3 (introduced at 55:38 but not completed in session). The key technique: use the known p.d. across $$R_2$$ to express $$R_2$$ in terms of $$I$$, then substitute into KVL to eliminate the unknown.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "Conceptual exercise: A battery has $$\\varepsilon = 10\\,V$$ and $$r = 2\\,\\Omega$$. It is connected to a load $$R = 8\\,\\Omega$$. Find (a) the current, (b) the terminal p.d., and (c) the fraction of total power that reaches the load. Walk through each step. (3 steps)", "answer": "- Step 1: Current: $$I = \\varepsilon/(R + r) = 10/(8 + 2) = 10/10 = 1.0\\,A$$.\n- Step 2: Terminal p.d.: $$V = \\varepsilon - Ir = 10 - 1.0 \\times 2 = 8.0\\,V$$. (Alternatively, $$V = IR = 1.0 \\times 8 = 8.0\\,V$$.)\n- Step 3: Power to load: $$P_{load} = I^2 R = 1.0 \\times 8 = 8.0\\,W$$. Total power from battery: $$P_{total} = I\\varepsilon = 1.0 \\times 10 = 10.0\\,W$$. Fraction reaching load: $$8.0/10.0 = 0.8 = 80\\%$$. This makes sense: efficiency $$= R/(R+r) = 8/10 = 80\\%$$. Since $$R = 4r$$ (load is 4 times internal resistance), most power goes to the load — good efficiency but not maximum power (which would require $$R = r = 2\\,\\Omega$$).\n\nWhen $$R \\gg r$$, efficiency approaches 100% but power to the load is below maximum. When $$R = r$$, efficiency is only 50% but power is maximised.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "Conceptual exercise: Two identical cells, each $$\\varepsilon = 1.5\\,V$$ and $$r = 0.5\\,\\Omega$$, are connected in series with a $$4.0\\,\\Omega$$ load. Find the terminal p.d. and compare it to the case where the same two cells are in parallel. (3 steps)", "answer": "- Step 1: **Series**: $$\\varepsilon_{total} = 3.0\\,V$$, $$r_{total} = 1.0\\,\\Omega$$. Current: $$I = 3.0/(4.0 + 1.0) = 3.0/5.0 = 0.60\\,A$$. Terminal p.d.: $$V = 3.0 - 0.60 \\times 1.0 = 2.4\\,V$$.\n- Step 2: **Parallel**: $$\\varepsilon_{total} = 1.5\\,V$$, $$r_{total} = 0.25\\,\\Omega$$. Current: $$I = 1.5/(4.0 + 0.25) = 1.5/4.25 \\approx 0.35\\,A$$. Terminal p.d.: $$V = 1.5 - 0.35 \\times 0.25 \\approx 1.5 - 0.09 = 1.41\\,V$$.\n- Step 3: The series arrangement gives a higher terminal p.d. ($$2.4\\,V$$ vs. $$1.41\\,V$$) because the doubled e.m.f. more than compensates for the doubled internal resistance. The parallel arrangement gives lower voltage but with much less voltage sag (only $$0.09\\,V$$ lost vs. $$0.60\\,V$$ lost). Choose series for voltage; choose parallel for current capacity and stability.\n\nThis illustrates the fundamental trade-off: series adds voltage, parallel reduces internal resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "A student draws a V–I graph and the line slopes *upward* from left to right. What is wrong, and what would this imply about the physics of the cell? (2 steps)", "answer": "- Step 1: The V–I graph for a real cell must slope *downward* (negative gradient) because $$V = \\varepsilon - Ir$$: as current increases, terminal p.d. decreases. An upward-sloping line would have a positive gradient, implying $$V = \\varepsilon + Ir$$ — terminal p.d. *increases* with current.\n- Step 2: This would violate conservation of energy: the cell would be delivering *more* energy per coulomb to the external circuit as current increases, meaning it creates energy from nothing. The lost-volts term must *subtract* from e.m.f., not add to it. If a real experiment produced an upward slope, the student has likely swapped the axes (plting $$I$$ vs. $$V$$ instead of $$V$$ vs. $$I$$) or misread the data.\n\nAlways plot $$V$$ on the y-axis and $$I$$ on the x-axis. The line must slope downward.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "Edge case analysis: An ideal voltmeter (infinite resistance) reads $$\\varepsilon$$ across a cell in open circuit. A real voltmeter with finite resistance $$R_V$$ draws a tiny current. Show that the reading will be slightly less than $$\\varepsilon$$, and estimate how much less for $$R_V = 10\\,M\\Omega$$, $$r = 1\\,\\Omega$$, $$\\varepsilon = 9\\,V$$. (3 steps)", "answer": "- Step 1: The voltmeter in parallel with the cell forms a circuit: current $$I = \\varepsilon/(R_V + r)$$ flows through $$r$$ and the voltmeter. The voltmeter reads the terminal p.d. across its own terminals: $$V = \\varepsilon - Ir$$.\n- Step 2: Substitute: $$I = \\varepsilon/(R_V + r)$$, so $$V = \\varepsilon - \\frac{\\varepsilon r}{R_V + r} = \\varepsilon\\left(1 - \\frac{r}{R_V + r}\\right) = \\varepsilon \\cdot \\frac{R_V}{R_V + r}$$.\n- Step 3: For $$R_V = 10\\,M\\Omega = 10^7\\,\\Omega$$ and $$r = 1\\,\\Omega$$: $$V = 9.0 \\times \\frac{10^7}{10^7 + 1} = 9.0 \\times \\frac{10{,}000{,}000}{10{,}000{,}001} \\approx 9.0 \\times 0.9999999 = 8.9999991\\,V$$. The reading is essentially $$9.0\\,V$$ — the error is about $$0.9\\,\\mu V$$, far below any meter's resolution. This confirms that a high-resistance voltmeter effectively reads e.m.f. in open circuit.\n\nThe key point: a real voltmeter introduces a *tiny* systematic error, but for $$R_V \\gg r$$ it is negligible. Only if $$R_V$$ were comparable to $$r$$ (e.g. an analogue meter with $$R_V \\sim k\\Omega$$) would the error be significant.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "A student performing CP8 collects data but then accidentally plots $$I$$ on the y-axis and $$V$$ on the x-axis. Describe what the graph would look like, and explain how the student could still extract $$\\varepsilon$$ and $$r$$ from it (with careful thinking). (2 steps)", "answer": "- Step 1: With axes swapped, the equation becomes $$I = \\frac{\\varepsilon - V}{r} = -\\frac{1}{r}V + \\frac{\\varepsilon}{r}$$. This is still a straight line, but now: gradient $$= -1/r$$ and y-intercept $$= \\varepsilon/r$$ (the short-circuit current). The x-intercept (where $$I = 0$$) is $$V = \\varepsilon$$.\n- Step 2: From the swapped graph: the x-intercept gives $$\\varepsilon$$ directly. The y-intercept gives $$\\varepsilon/r$$, so $$r = \\varepsilon / (\\text{y-intercept})$$. Alternatively, the gradient gives $$-1/r$$, so $$r = -1/\\text{gradient}$$. It's possible to extract the same information, but the standard convention ($$V$$ vs. $$I$$) is much more intuitive and less error-prone.\n\nAlways follow the CP8 convention: $$V$$ on y-axis, $$I$$ on x-axis. The swapped axes make gradient interpretation error-prone.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "A student says \"the resistor stores electrons, which is why it has a voltage across it.\" Identify and correct this misconception. (2 steps)", "answer": "- Step 1: Resistors do not store electrons. A resistor opposes the flow of charge (current) through it, and in doing so converts electrical energy to thermal energy (Joule heating). The voltage across a resistor represents the energy *lost* per unit charge as it passes through — not stored charge.\n- Step 2: The misconception confuses resistance with capacitance. A *capacitor* stores charge and energy; a *resistor* dissipates energy. The p.d. across a resistor exists because charges lose energy flowing through it (collisions with the lattice ions), not because electrons accumulate. Current is the same on both sides of a resistor (Kirchhoff's first law) — electrons don't pile up inside.\n\nThis is flagged as a common exam trap in the study material: resistors oppose current and dissipate energy; they do not store electrons.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}], "count": 50}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why is e.m.f. (ε) defined as energy per charge supplied by the source, while terminal potential difference (V) is energy per charge available to the external circuit? Use the equation ε = V + Ir to explain. (3 steps)", "answer": "- Step 1: **e.m.f. (ε)** represents the total energy supplied by the cell to each coulomb of charge. This energy comes from chemical reactions inside the cell.  \n- Step 2: **Terminal p.d. (V)** is the energy per coulomb that reaches the external circuit. Some energy is lost as heat due to internal resistance (r), causing a voltage drop called \"lost volts\" (Ir).  \n- Step 3: The equation ε = V + Ir reflects conservation of energy. The total energy (ε) is split between the external circuit (V) and internal losses (Ir). Thus, V = ε − Ir, showing terminal p.d. decreases as current (I) increases.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why does a voltmeter read e.m.f. (ε) when a cell is disconnected from a circuit but reads less when connected? (2 steps)", "answer": "- Step 1: When the cell is disconnected (open circuit), no current (I = 0) flows, so there are no \"lost volts\" (Ir = 0). The terminal p.d. equals the e.m.f.: V = ε − Ir → V = ε.  \n- Step 2: When connected (closed circuit), current flows through the internal resistance, causing a voltage drop (Ir). Terminal p.d. becomes V = ε − Ir, which is less than ε.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How does internal resistance (r) cause a battery to warm up during use? Use the equation for power dissipated in r. (2 steps)", "answer": "- Step 1: Power dissipated in a resistor is P = I²R. For internal resistance, P = I²r.  \n- Step 2: As current (I) flows through the cell, energy is converted to heat in the internal resistance (r), causing the battery to warm. The greater the current or r, the more heat generated.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Derive the equation ε = I(R + r) using Kirchhoff’s voltage law. (3 steps)", "answer": "- Step 1: Kirchhoff’s voltage law states that the sum of e.m.f.s in a closed loop equals the sum of potential drops: ε = V_total.  \n- Step 2: Total potential drop occurs across the external resistor (V_ext = IR) and internal resistor (V_int = Ir).  \n- Step 3: Combine: ε = IR + Ir → ε = I(R + r). This shows the e.m.f. drives current through both external and internal resistances.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "In a V–I graph (terminal p.d. vs. current), why is the gradient equal to −r? How does this relate to maximum power transfer? (3 steps)", "answer": "- Step 1: The equation V = ε − Ir is rearranged to V = −rI + ε, matching y = mx + c (y = V, x = I, m = −r, c = ε).  \n- Step 2: Gradient (m) is negative because terminal p.d. decreases as current increases. The magnitude of the gradient equals internal resistance (r).  \n- Step 3: Maximum power transfer occurs when external resistance R = r. At this point, current I = ε/(R + r) = ε/(2r), and power P = I²R = ε²/(4r).", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why do identical cells in parallel have the same e.m.f. but lower total internal resistance? Use an example with 3 cells. (2 steps)", "answer": "- Step 1: E.m.f. in parallel: Identical cells in parallel supply the same voltage (ε) as a single cell because the potential difference across each cell is identical.  \n- Step 2: Internal resistance in parallel: For n identical cells, total internal resistance r_total = r/n. Example: 3 cells with r = 0.5 Ω each → r_total = 0.5/3 ≈ 0.17 Ω. This allows higher current delivery without voltage drop.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "In Core Practical 8, why must the switch be opened between readings? How does this affect accuracy? (2 steps)", "answer": "- Step 1: Prolonged current flow heats the cell, increasing its internal resistance (r) and decreasing e.m.f. (ε) over time, introducing systematic error.  \n- Step 2: Opening the switch keeps the cell cool, maintaining constant ε and r. This ensures data points lie on a straight line (V = −rI + ε) for accurate gradient and intercept determination.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why does a car battery (ε = 12 V, r = 0.01 Ω) dim headlights when starting the engine? Use the equation V = ε − Ir. (2 steps)", "answer": "- Step 1: Starting the engine draws a large current (I = 200 A). Lost volts: Ir = 200 × 0.01 = 2 V.  \n- Step 2: Terminal p.d.: V = 12 − 2 = 10 V. Headlights, designed for 12 V, receive only 10 V, causing them to dim.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is the maximum power delivered to a load when R = r? What fraction of total power is wasted in r in this case? (2 steps)", "answer": "- Step 1: Power in load P = I²R. Substitute I = ε/(R + r) → P = ε²R/(R + r)². Differentiate P with respect to R and set dP/dR = 0 → R = r.  \n- Step 2: At R = r, P_max = ε²/(4r). Total power ε²/(2r) (sum of power in R and r). Half the power is wasted in internal resistance (Ir = ε/2).", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "Why is a voltmeter connected in parallel and designed to have high resistance? Use the concept of terminal p.d. (2 steps)", "answer": "- Step 1: Voltmeters measure potential difference across a component. Connecting in parallel ensures it experiences the same voltage as the component.  \n- Step 2: High resistance minimizes current draw (I = V/R). A low-resistance voltmeter would divert significant current, altering circuit behavior and lowering terminal p.d.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What is the key distinction between electromotive force (EMF) and potential difference (PD) in terms of energy transfer and measurement context? (3 steps)", "answer": "- Step 1: **EMF definition**  \n  EMF (ε) is the energy supplied *per unit charge* by the source (e.g., chemical to electrical energy in a cell). Measured in volts (V = J/C).  \n  - Formula: $ \\epsilon = \\frac{W}{Q} $, where $ W $ is energy (J) and $ Q $ is charge (C).  \n- Step 2: **PD definition**  \n  PD is the energy *lost per unit charge* in a component (e.g., heat/light in a resistor).  \n  - Formula: $ V = \\frac{W}{Q} $, but here $ W $ is energy dissipated in the component.  \n- Step 3: **Measurement context**  \n  - EMF is measured when no current flows (open circuit; terminal PD = EMF).  \n  - PD is measured when current flows (terminal PD < EMF due to lost volts).  \n  - Example: Voltmeter reads ε only when switch is open (I = 0).  \n\n**Takeaway:** EMF is energy supplied; PD is energy lost. They are equal only when no current flows.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why does a cell with internal resistance warm up during use? Explain using energy dissipation and lost volts.", "answer": "- Step 1: **Internal resistance model**  \n  A cell is modeled as an ideal EMF source (ε) in series with an internal resistor (r).  \n- Step 2: **Energy dissipation**  \n  When current $ I $ flows, a voltage drop $ V_r = Ir $ occurs across r. This energy is dissipated as heat:  \n  $ P = I^2r $.  \n- Step 3: **Lost volts**  \n  The \"lost volts\" $ Ir $ is the energy per coulomb wasted in the cell, reducing terminal PD:  \n  $ V_{\\text{terminal}} = \\epsilon - Ir $.  \n  - Example: A car battery (r = 0.01 Ω) with $ I = 200 \\, \\text{A} $ dissipates $ 200^2 \\times 0.01 = 400 \\, \\text{W} $ as heat.  \n\n**Takeaway:** Internal resistance causes energy loss as heat, making the cell warm.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": true}, {"question": "Derive the core equation $ \\epsilon = I(R + r) $ using energy conservation in a circuit. (3 steps)", "answer": "- Step 1: **Energy conservation**  \n  The total energy supplied by the cell (ε) equals the total energy dissipated in the circuit:  \n  $ \\epsilon Q = V_R Q + V_r Q $, where $ Q $ is charge.  \n  Cancel $ Q $: $ \\epsilon = V_R + V_r $.  \n- Step 2: **Apply Ohm’s Law**  \n  $ V_R = IR $, $ V_r = Ir $. Substitute:  \n  $ \\epsilon = IR + Ir $.  \n- Step 3: **Factor current**  \n  $ \\epsilon = I(R + r) $.  \n  - Terminal PD: $ V = IR = \\epsilon - Ir $.  \n  - Lost volts: $ Ir $.  \n\n**Takeaway:** EMF is split between external load (useful) and internal resistance (wasted).", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How does terminal PD change as current increases in a circuit with internal resistance? Explain using $ V = \\epsilon - Ir $.", "answer": "- Step 1: **Relationship**  \n  Terminal PD $ V $ decreases linearly with current $ I $: $ V = \\epsilon - Ir $.  \n- Step 2: **Physical cause**  \n  As $ I $ increases, the voltage drop across internal resistance $ Ir $ increases, leaving less voltage for the external circuit.  \n- Step 3: **Edge cases**  \n  - Open circuit ($ I = 0 $): $ V = \\epsilon $.  \n  - Short circuit ($ R = 0 $): $ I = \\frac{\\epsilon}{r} $, $ V = 0 $.  \n\n**Takeaway:** More current → more lost volts → lower terminal PD.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "For a cell with EMF 12 V and internal resistance 0.5 Ω connected to a 5.5 Ω resistor, calculate the terminal PD and lost volts. (2 steps)", "answer": "- Step 1: **Total current**  \n  $ I = \\frac{\\epsilon}{R + r} = \\frac{12}{5.5 + 0.5} = 2 \\, \\text{A} $.  \n- Step 2: **Terminal PD and lost volts**  \n  - Terminal PD: $ V = IR = 2 \\times 5.5 = 11 \\, \\text{V} $.  \n  - Lost volts: $ Ir = 2 \\times 0.5 = 1 \\, \\text{V} $.  \n  - Check: $ \\epsilon = 11 + 1 = 12 \\, \\text{V} $.  \n\n**Takeaway:** Internal resistance reduces terminal PD; 1 V is wasted in this case.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "In Core Practical 8, why is a rheostat used to vary current, and how does the V–I graph determine EMF and internal resistance?", "answer": "- Step 1: **Rheostat purpose**  \n  Varying load resistance $ R $ changes current $ I $, allowing measurement of terminal PD $ V $ and $ I $.  \n- Step 2: **Graph analysis**  \n  Plot $ V $ (y-axis) vs. $ I $ (x-axis):  \n  - Equation: $ V = -rI + \\epsilon $ (straight line).  \n  - Y-intercept = ε (EMF).  \n  - Gradient = $ -r $ (internal resistance).  \n- Step 3: **Precautions**  \n  - Open switch between readings to prevent heating (changes r).  \n  - Use fresh cell (old cells have variable ε and r).  \n\n**Takeaway:** Gradient = -r; y-intercept = ε.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How do cells in series and parallel affect total EMF and internal resistance? Give examples for identical cells.", "answer": "- Step 1: **Series connection**  \n  - Total EMF: $ \\epsilon_{\\text{total}} = \\epsilon_1 + \\epsilon_2 + \\dots $.  \n  - Total r: $ r_{\\text{total}} = r_1 + r_2 + \\dots $.  \n  - Example: 3 identical cells (1.5 V, 0.2 Ω each):  \n    $ \\epsilon_{\\text{total}} = 4.5 \\, \\text{V} $, $ r_{\\text{total}} = 0.6 \\, \\Omega $.  \n- Step 2: **Parallel connection**  \n  - Total EMF: $ \\epsilon_{\\text{total}} = \\epsilon $ (same as one cell).  \n  - Total r: $ r_{\\text{total}} = \\frac{r}{n} $ (n cells).  \n  - Example: 3 identical cells (1.5 V, 0.2 Ω each):  \n    $ \\epsilon_{\\text{total}} = 1.5 \\, \\text{V} $, $ r_{\\text{total}} = 0.067 \\, \\Omega $.  \n\n**Takeaway:** Series increases EMF and r; parallel keeps EMF same, reduces r.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why is maximum power delivered to a load when $ R = r $? Explain with the formula for power.", "answer": "- Step 1: **Power formula**  \n  Power in load: $ P = I^2R $. Substitute $ I = \\frac{\\epsilon}{R + r} $:  \n  $ P = \\frac{\\epsilon^2 R}{(R + r)^2} $.  \n- Step 2: **Maximizing P**  \n  Differentiate $ P $ with respect to $ R $, set $ \\frac{dP}{dR} = 0 $:  \n  Maximum occurs when $ R = r $.  \n- Step 3: **Efficiency**  \n  At $ R = r $, $ P_{\\text{max}} = \\frac{\\epsilon^2}{4r} $. Only 50% of energy is used (other 50% lost in r).  \n\n**Takeaway:** Match load resistance to internal resistance for max power transfer.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}], "count": 8}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Define **Terminal Potential Difference (p.d.)** and state how it differs from EMF when a current is flowing. (2 steps)", "answer": "- Step 1: Terminal p.d. ($$V$$) is the potential difference across the *external* terminals of the power supply—the energy per unit charge available to the external circuit.\n- Step 2: Unlike EMF (which is the energy supplied *by* the source), the terminal p.d. is always **less than** the EMF when current flows, because some energy is lost overcoming the internal resistance of the battery.\n+ Mathematically: $$V = \\varepsilon - Ir$$ (where $$Ir$$ represents the \"lost volts\").", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Explain what **Internal Resistance** is and why it causes a battery to become warm during use. (2 steps)", "answer": "- Step 1: Internal resistance ($$r$$) is the resistance of the materials inside the battery (electrolyte, electrodes) that charge must flow through. It is modeled as a resistor in series with the ideal EMF source.\n- Step 2: When current $$I$$ flows, energy is dissipated as heat in the battery itself according to $$P = I^2 r$$. This is why the battery gets warm; this energy is not available to the external circuit (\"lost volts\").", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Write down the core equation relating EMF ($$\\varepsilon$$), Terminal p.d. ($$V$$), current ($$I$$), and internal resistance ($$r$$). Explain what each term represents in the context of energy conservation. (3 steps)", "answer": "- Step 1: The equation is $$\\varepsilon = V + Ir$$.\n- Step 2: This is derived from conservation of energy (Kirchhoff's voltage law). The energy per charge supplied by the chemical reaction ($$\\varepsilon$$) must equal the energy delivered to the external load ($$V$$) plus the energy wasted inside the cell ($$Ir$$).\n+ $$V$$ is the useful terminal p.d.\n+ $$Ir$$ is the \"lost volts\" (energy lost per charge inside the battery).\n- Step 3: Rearranged, this gives the terminal p.d.: $$V = \\varepsilon - Ir$$.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A battery is connected to a circuit. If the current in the circuit increases, describe what happens to the **Terminal p.d.** and the **Lost volts**. Explain why. (2 steps)", "answer": "- Step 1: As current $$I$$ increases:\n    * The **Lost volts** ($$Ir$$) increase (proportional to $$I$$).\n    * The **Terminal p.d.** ($$V$$) decreases.\n- Step 2: This happens because the equation $$V = \\varepsilon - Ir$$ shows that the fixed EMF ($$\\varepsilon$$) is being \"shared\" between the external load and the internal resistance. More of the available voltage is dropped across the internal resistance as current rises, leaving less for the external circuit.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "In a Core Practical (CP8) experiment to measure EMF and internal resistance, a student plots **Terminal p.d. (V) on the y-axis** against **Current (I) on the x-axis**. What physical quantities do the **y-intercept** and the **gradient** of this graph represent? (2 steps)", "answer": "- Step 1: The equation for the graph is $$V = -\\!rI + \\varepsilon$$ (in the form $$y = mx + c$$).\n- Step 2:\n    * **Y-intercept ($$c$$)**: Represents $$\\varepsilon$$ (EMF). This is the voltage when $$I = 0$$ (open circuit).\n    * **Gradient ($$m$$)**: Equals $$-r$$ (negative internal resistance). The magnitude of the gradient gives the internal resistance ($$r = -\\text{gradient}$$).", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Describe the experimental setup and method for CP8 to determine the EMF and internal resistance of a cell. Include one key precaution and explain why it is necessary. (3 steps)", "answer": "- Step 1: **Setup**: A cell is connected in series with an ammeter, a variable resistor (rheostat), and a switch. A voltmeter is connected across the cell terminals.\n- Step 2: **Method**: \n    1. Start with the variable resistor at maximum resistance (to minimize current).\n    2. With the switch open, record the voltmeter reading (open-circuit voltage $$\\approx \\varepsilon$$).\n    3. Close the switch, record current $$I$$ and terminal p.d. $$V$$.\n    4. Vary the resistance (decrease in steps), recording $$I$$ and $$V$$ each time.\n    5. Plot a graph of $$V$$ vs $$I$$.\n- Step 3: **Key Precaution**: Open the switch between readings. \n+ **Reason**: Leaving the switch closed causes the current to flow continuously, heating the cell. This changes the internal resistance and EMF over time (systematic error).", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A voltmeter connected across a battery reads **1.55 V** when the circuit switch is **open**, but drops to **1.49 V** when the switch is **closed** connecting a $$10 \\Omega$$ resistor. Calculate the internal resistance of the battery. (3 steps)", "answer": "- Step 1: With the switch open, $$I \\approx 0$$, so the reading is the EMF: $$\\varepsilon = 1.55 \\text{ V}$$.\n- Step 2: With the switch closed, the terminal p.d. is $$V = 1.49 \\text{ V}$$. The current in the $$10 \\Omega$$ resistor is $$I = \\frac{V}{R} = \\frac{1.49}{10} = 0.149 \\text{ A}$$.\n- Step 3: The \"lost volts\" is $$\\varepsilon - V = 1.55 - 1.49 = 0.06 \\text{ V}$$.\n+ Internal resistance is $$r = \\frac{\\text{Lost volts}}{I} = \\frac{0.06}{0.149} \\approx 0.40 \\Omega$$.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Three identical cells, each with EMF $$1.5 \\text{ V}$$ and internal resistance $$0.5 \\Omega$$, are connected **in series** with the same polarity. What are the total EMF and total internal resistance? (1 step)", "answer": "- Step 1: For cells in series, EMFs and internal resistances add up.\n+ Total $$\\varepsilon = 1.5 + 1.5 + 1.5 = 4.5 \\text{ V}$$\n+ Total $$r = 0.5 + 0.5 + 0.5 = 1.5 \\Omega$$", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Three identical cells (each $$\\varepsilon = 1.5 \\text{ V}$$, $$r = 0.5 \\Omega$$) are connected **in parallel**. What are the total EMF and total internal resistance? Why is this configuration useful? (2 steps)", "answer": "- Step 1: For identical cells in parallel:\n    * Total $$\\varepsilon$$ remains equal to one cell: $$1.5 \\text{ V}$$.\n    * Total internal resistance is reduced: $$r_{\\text{total}} = \\frac{0.5}{3} \\approx 0.17 \\Omega$$.\n- Step 2: **Usefulness**: This allows the battery to supply a **larger current** to a load. Because the internal resistance is much lower, the voltage drop across the battery ($$Ir$$) is smaller, so the terminal p.d. stays closer to the EMF even under high load.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A battery has an EMF of $$12 \\text{ V}$$ and internal resistance of $$0.01 \\Omega$$. It is connected to a car starter motor that draws $$200 \\text{ A}$$. Calculate: (a) the Terminal p.d. during starting, (b) the power delivered to the motor. (3 steps)", "answer": "- Step 1: Calculate the \"lost volts\": $$Ir = 200 \\times 0.01 = 2 \\text{ V}$$.\n- Step 2: (a) Terminal p.d.: $$V = \\varepsilon - Ir = 12 - 2 = 10 \\text{ V}$$.\n- Step 3: (b) Power to motor: $$P = IV = 200 \\times 10 = 2000 \\text{ W} = 2.0 \\text{ kW}$$.\n+ Note: The headlights would dim because the terminal p.d. drops from 12 V to 10 V.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "State the condition for **Maximum Power Transfer** in a circuit containing a source with internal resistance $$r$$ and an external load $$R$$. What is the efficiency at this condition? (2 steps)", "answer": "- Step 1: Maximum power is transferred to the load when **$$R = r$$** (the external resistance equals the internal resistance).\n- Step 2: At this point, exactly half the total power is dissipated in the load and half is wasted in the internal resistance.\n+ Efficiency is only **50%**. This condition is used where signal strength matters (e.g., audio), but for power supplies, we usually design $$r \\ll R$$ for high efficiency.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A student forgets the sign in the equation for the terminal p.d. and writes $$V = \\varepsilon + Ir$$. Explain why this is wrong and what the correct consequence would be. (2 steps)", "answer": "- Step 1: The equation $$V = \\varepsilon + Ir$$ is incorrect because the voltage drop across the internal resistance **reduces** the voltage available to the outside world.\n- Step 2: If this incorrect equation were true, adding current would make the terminal voltage *higher* than the EMF, which violates conservation of energy. The correct relationship is $$V = \\varepsilon - Ir$$.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "In the context of internal resistance, explain the terms \"Lost Volts\" and \"Short Circuit\". What makes a short circuit dangerous? (2 steps)", "answer": "- Step 1: **Lost Volts** ($$Ir$$) is the voltage drop across the internal resistance. It is energy wasted (converted to heat) inside the source, not available to the circuit.\n- Step 2: A **Short Circuit** occurs when the external resistance $$R = 0$$. The current becomes $$I = \\varepsilon / r$$.\n+ It is dangerous because if $$r$$ is very small (like a car battery), the current $$I$$ becomes extremely large. The power dissipated as heat in the battery ($$\\varepsilon I$$) can cause rapid overheating or explosion.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A torch battery has EMF $$4.5 \\text{ V}$$ and internal resistance $$0.4 \\Omega$$. It is connected to a lamp of resistance $$6.4 \\Omega$$. Calculate the current in the circuit and the power wasted in the battery. (3 steps)", "answer": "- Step 1: Use the current form of the equation: $$I = \\frac{\\varepsilon}{R + r}$$.\n+ $$I = \\frac{4.5}{6.4 + 0.4} = \\frac{4.5}{6.8} \\approx 0.66 \\text{ A}$$\n- Step 2: The power wasted in the battery (internal resistance) is $$P_{\\text{wasted}} = I^2 r$$.\n- Step 3: $$P_{\\text{wasted}} = (0.66)^2 \\times 0.4 = 0.436 \\times 0.4 \\approx 0.17 \\text{ W}$$.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In a V-I graph for a real cell, the line becomes noticeably curved at high currents instead of straight. What does this suggest about the internal resistance? (1 step)", "answer": "- Step 1: This suggests that the internal resistance is **not constant**; it increases at high currents.\n+ This often happens because the chemical reactions in the cell cannot supply charge fast enough, or heating changes the properties of the electrolyte. The simple model $$V = \\varepsilon - Ir$$ assumes $$r$$ is constant.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Explain why a laboratory voltmeter should have a very high resistance. (1 step)", "answer": "- Step 1: A voltmeter is connected in **parallel** to measure the p.d. across a component.\n+ If the voltmeter has low resistance, it would draw current from the circuit, acting as an extra load. This would change the circuit conditions and give an inaccurate (lower) reading of the p.d. A high-resistance voltmeter minimizes this \"loading effect.\"", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "You are given a battery with unknown EMF and internal resistance, a voltmeter, an ammeter, and a variable resistor. Sketch a circuit diagram you would use to find the EMF and r, and explain how you would use it. (2 steps)", "answer": "- Step 1: Connect the battery in series with the ammeter, the variable resistor, and a switch. Connect the voltmeter directly across the battery terminals (in parallel).\n- Step 2: \n    1. Start with the variable resistor at maximum value (switch open).\n    2. Close switch, record current $$I$$ and terminal p.d. $$V$$.\n    3. Vary the resistor to get different $$I$$ and $$V$$ values (at least 6-8 sets).\n    4. Plot a graph of $$V$$ (y-axis) vs $$I$$ (x-axis).\n    5. The y-intercept gives $$\\varepsilon$$; the gradient ($$-r$$) gives the internal resistance.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Why is it important to start the CP8 experiment with the variable resistor at its **maximum** resistance? (1 step)", "answer": "- Step 1: Starting at maximum resistance ensures the **current is minimized** at the beginning.\n+ This prevents the cell from heating up significantly at the start of the experiment, which would cause the internal resistance and EMF to change during the course of the data collection (systematic error).", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Two resistors, $$6.0 \\Omega$$ and $$3.0 \\Omega$$, are connected in parallel. This combination is then connected in series to a battery with EMF $$12.0 \\text{ V}$$ and internal resistance $$1.0 \\Omega$$. Calculate the terminal p.d. of the battery. (4 steps)", "answer": "- Step 1: Find the equivalent resistance of the parallel section: $$\\frac{1}{R_{\\text{p}}} = \\frac{1}{6} + \\frac{1}{3} = \\frac{1}{2}$$. So $$R_{\\text{p}} = 2.0 \\Omega$$.\n- Step 2: Find the total circuit resistance: $$R_{\\text{total}} = R_{\\text{p}} + r = 2.0 + 1.0 = 3.0 \\Omega$$.\n- Step 3: Calculate the circuit current: $$I = \\frac{\\varepsilon}{R_{\\text{total}}} = \\frac{12.0}{3.0} = 4.0 \\text{ A}$$.\n- Step 4: Calculate terminal p.d.: $$V = \\varepsilon - Ir = 12.0 - (4.0 \\times 1.0) = 8.0 \\text{ V}$$.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}], "count": 19}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Define electromotive force (e.m.f.) and state its units. Explain why e.m.f. is not actually a \"force.\" (2 steps)", "answer": "- Step 1: E.m.f. is defined as the amount of energy converted from chemical (or other) forms to electrical energy per unit charge passing through the power supply.\n- Step 2: The unit is the volt (V), which equals joules per coulomb (J C⁻¹). Despite its name, e.m.f. is NOT a force — it is a measure of energy per unit charge, exactly like potential difference but describing energy GAINED by charges (rather than energy LOST).\n\n[Key distinction: e.m.f. describes energy supplied TO charges; p.d. describes energy converted FROM electrical to other forms BY charges.]", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "What is the fundamental difference between potential difference (p.d.) and e.m.f.? Use the concept of energy transfer direction in your answer. (2 steps)", "answer": "- Step 1: Both p.d. and e.m.f. have the same units (V = J C⁻¹) and algebraic form (energy/charge), but they describe energy transfer in OPPOSITE directions.\n- Step 2: P.d. is the energy converted FROM electrical energy to other forms (heat, light, mechanical) per unit charge passing THROUGH a component. E.m.f. is the energy converted TO electrical energy from chemical/mechanical sources per unit charge passing THROUGH the source.\n\n[Think of it this way: charges GAIN energy at the source (e.m.f.), then LOSE energy through components (p.d.).]", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Explain what is meant by \"internal resistance\" of a power supply. Why does a real cell become warm during use? (3 steps)", "answer": "- Step 1: Internal resistance (r) is the resistance within the power supply itself — the resistance of the electrolyte, electrodes, and contact materials that charge must flow through inside the battery.\n- Step 2: When current flows, charges must pass through this internal resistance, causing an energy loss. This lost energy is dissipated as heat inside the cell — which is why batteries feel warm during use.\n- Step 3: This internal resistance is modelled in series with an ideal e.m.f. source. The voltage drop across it (Vr = Ir) is called \"lost volts\" — not available to the external circuit.\n\n[This is a key point: the chemical energy is split — some emerges at the terminals (useful), some is wasted as heat inside the cell.]", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "A battery has e.m.f. ε = 9.0 V and internal resistance r = 0.5 Ω. When connected to an external resistor, the terminal p.d. is measured as 8.0 V. Calculate the current flowing in the circuit. (3 steps)", "answer": "- Step 1: Recall the core equation: ε = V + Ir, where V is terminal p.d. We know ε = 9.0 V, V = 8.0 V, and r = 0.5 Ω.\n- Step 2: Rearrange to find current: Ir = ε − V = 9.0 − 8.0 = 1.0 V\n- Step 3: Therefore, I = (ε − V)/r = 1.0 V / 0.5 Ω = 2.0 A\n\n[This is the \"lost volts\" method — when you know ε and V, subtract to find Ir, then divide by r to get I.]", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Write down the three equivalent forms of the core e.m.f. equation and explain what each term represents. (3 steps)", "answer": "- Step 1: ε = I(R + r) — the current form, showing total circuit resistance (external R + internal r)\n- Step 2: ε = V + Ir — the voltage form, showing e.m.f. splits into terminal p.d. (V) plus lost volts (Ir)\n- Step 3: V = ε − Ir — rearranged to find terminal p.d., which decreases as current I increases\n\n+ ε (epsilon) = e.m.f. of the source\n+ R = external load resistance\n+ r = internal resistance\n+ V = terminal p.d. (across external load)\n+ Ir = lost volts (across internal resistance)", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "In an open circuit (switch open, no current), a voltmeter connected across a battery reads 1.55 V. When the switch is closed and a 10 Ω resistor is connected, the voltmeter reads 1.49 V. Calculate the internal resistance of the battery. (4 steps)", "answer": "- Step 1: With switch open (I = 0), the voltmeter reading equals the e.m.f. because there are no lost volts: ε = 1.55 V\n- Step 2: With switch closed, terminal p.d. V = 1.49 V. Find the current through the external resistor using Ohm's law: I = V/R = 1.49 V / 10 Ω = 0.149 A\n- Step 3: The \"lost volts\" = ε − V = 1.55 − 1.49 = 0.06 V\n- Step 4: Internal resistance r = (ε − V)/I = 0.06 V / 0.149 A ≈ 0.40 Ω\n\n[This is the standard method: find ε from open-circuit reading, find I from closed circuit, then use r = (ε − V)/I]", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Explain why the terminal p.d. of a battery decreases when more current is drawn. Use the equation V = ε − Ir in your explanation. (2 steps)", "answer": "- Step 1: The e.m.f. ε is fixed (determined by the chemical reaction). As current I increases, the term Ir (lost volts) increases proportionally.\n- Step 2: Since V = ε − Ir, the terminal p.d. V must decrease as Ir increases. More of the e.m.f. is \"lost\" inside the battery rather than being available to the external circuit.\n\n[Physical intuition: think of internal resistance as a constriction in the pipe. As more water flows (higher current), more pressure is lost at the constriction, leaving less pressure at the outlet.]", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "What is meant by \"lost volts\"? Why is this terminology appropriate? (2 steps)", "answer": "- Step 1: Lost volts (Ir) is the voltage drop across the internal resistance of the power supply — energy per unit charge that is dissipated as heat INSIDE the cell rather than being delivered to the external circuit.\n- Step 2: The term \"lost\" is appropriate because this voltage is NOT available to power external devices. It is wasted energy — the battery feels warm because of this power loss (P = I²r).\n\n[Note: \"lost volts\" is NOT energy stored in the battery. It is energy wasted per unit charge.]", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A torch battery has ε = 4.5 V and r = 0.4 Ω. It is connected to a lamp of resistance R = 6.4 Ω. Calculate (a) the current in the circuit, (b) the terminal p.d., and (c) the lost volts. (4 steps)", "answer": "- Step 1: Use I = ε/(R + r) = 4.5 V / (6.4 + 0.4) Ω = 4.5 / 6.8 = 0.66 A (2 s.f.)\n- Step 2: Terminal p.d. V = IR = 0.66 A × 6.4 Ω = 4.2 V (or use V = ε − Ir = 4.5 − 0.27 = 4.2 V)\n- Step 3: Lost volts Ir = 0.66 A × 0.4 Ω = 0.26 V ≈ 0.3 V (2 s.f.)\n- Step 4: Check: ε = V + Ir → 4.5 = 4.2 + 0.3 = 4.5 ✓\n\n[Three ways to find the same answer — all equivalent. This is a good sanity check.]", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Sketch a graph of terminal p.d. V (y-axis) against current I (x-axis) for a real cell. Label the axes, intercept, and gradient, and explain what each represents. (3 steps)", "answer": "- Step 1: The graph is a straight line with equation V = ε − Ir, which rearranges to V = (−r)I + ε. This is in the form y = mx + c.\n- Step 2: The y-intercept (where I = 0) equals ε — this is the e.m.f. (open-circuit voltage). The line slopes downward with negative gradient.\n- Step 3: The gradient equals −r (negative of internal resistance). Therefore, r = −gradient. A steeper negative gradient means higher internal resistance.\n\n[Key point: the gradient is NEGATIVE. When calculating r, you must take the negative of the gradient, then report r as a positive value.]", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "In a Core Practical 8 experiment, a student plots V against I and obtains a straight line with y-intercept 1.60 V and gradient −22.7 Ω. State the e.m.f. and internal resistance of the cell. (2 steps)", "answer": "- Step 1: The y-intercept directly gives the e.m.f.: ε = 1.60 V\n- Step 2: The gradient equals −r, so r = −(−22.7 Ω) = 22.7 Ω. Internal resistance r = 22.7 Ω (always report as positive value)\n\n[Common error: students sometimes report r as negative. Remember: r is a resistance (always positive), so r = −gradient.]", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Describe the method for Core Practical 8 to measure e.m.f. and internal resistance. Include the circuit setup, what is varied, and what is measured. (4 steps)", "answer": "- Step 1: Set up a circuit with: cell (under test) in series with ammeter and variable resistor (rheostat). Connect a voltmeter across the cell terminals (to measure terminal p.d.).\n- Step 2: Start with variable resistor at MAXIMUM resistance (to minimize current and heating effects).\n- Step 3: With switch OPEN, record the open-circuit voltmeter reading (≈ ε). Then close switch and record pairs of (I, V) values for different resistance settings.\n- Step 4: OPEN THE SWITCH between readings to prevent heating and changing ε. Collect 8–10 pairs across the full range, then plot V (y) vs I (x).\n\n[Key safety: prolonged current heats the cell, changing its internal resistance over time — this is a systematic error.]", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "In Core Practical 8, why is it important to (a) start with the variable resistor at maximum value, and (b) open the switch between taking readings? (2 steps)", "answer": "- Step 1: (a) Starting at maximum R minimizes the initial current. Large currents can cause excessive heating, which changes the cell's internal resistance and e.m.f. during the experiment (systematic error). It also protects components from damage.\n- Step 2: (b) Opening the switch between readings stops current flow, allowing the cell to cool and preventing ongoing heating. If current flows continuously, ε and r change over time, giving poor linear graphs.\n\n[Heating is the main issue: as the cell warms, the chemical reactions speed up, changing its characteristics. This is why quick readings matter.]", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Three identical cells, each with e.m.f. 1.5 V and internal resistance 0.5 Ω, are connected (a) in series and (b) in parallel. For each arrangement, state the total e.m.f. and total internal resistance. (3 steps)", "answer": "- Step 1: (a) In SERIES: e.m.f.s add and internal resistances add. ε_total = 1.5 + 1.5 + 1.5 = 4.5 V. r_total = 0.5 + 0.5 + 0.5 = 1.5 Ω.\n- Step 2: (b) In PARALLEL (identical cells): e.m.f. stays the same (you don't get more voltage by paralleling identical cells), but internal resistance divides: r_total = r/n = 0.5/3 = 0.17 Ω.\n- Step 3: ε_total = 1.5 V for parallel. The parallel combination can deliver larger currents because r is much smaller.\n\n[Parallel cells: useful for high-current applications (like car starters) because lower internal resistance means less voltage drop.]", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": true}, {"question": "A student connects two 1.5 V cells in parallel (both with internal resistance 0.5 Ω). What is the total e.m.f. and total internal resistance? Why might you use cells in parallel? (2 steps)", "answer": "- Step 1: For n identical cells in parallel: ε_total = ε (same as one cell) = 1.5 V. Internal resistance r_total = r/n = 0.5/2 = 0.25 Ω.\n- Step 2: The advantage of parallel cells is NOT more voltage — it's the ability to deliver MORE CURRENT. With lower internal resistance, the voltage drop Ir is smaller for a given current, so terminal p.d. stays closer to ε. This is useful for high-current loads.\n\n[Common misconception: students think parallel cells give double voltage. They don't — they give the same voltage but with lower internal resistance.]", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "A car battery has ε = 12 V and very low internal resistance r = 0.01 Ω. The starter motor draws I = 200 A when starting. Calculate (a) the terminal p.d. during starting and (b) the power delivered to the motor. (3 steps)", "answer": "- Step 1: Terminal p.d. V = ε − Ir = 12 V − (200 A × 0.01 Ω) = 12 V − 2 V = 10 V\n- Step 2: The 2 V \"lost\" inside the battery is significant — headlights would dim noticeably because they expect 12 V but only receive 10 V.\n- Step 3: Power to motor P = IV = 200 A × 10 V = 2000 W = 2.0 kW\n\n[Car batteries need very low r because the starter motor needs huge current. Even 0.01 Ω causes a 2 V drop at 200 A!]", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Explain the principle of maximum power transfer. At what condition is maximum power delivered to the load, and what is the efficiency at this point? (3 steps)", "answer": "- Step 1: Power delivered to external load R is P = I²R = [ε/(R + r)]² × R. Differentiating with respect to R and setting dP/dR = 0 shows maximum power occurs when R = r.\n- Step 2: At this condition (R = r), the power delivered is P_max = ε²/(4r). Note that this is only 50% efficient — half the power is wasted in the internal resistance.\n- Step 3: In many real applications, we want HIGH efficiency (not maximum power), so we design with r ≪ R. However, in applications like audio speakers, matching R = r maximizes power transfer to the load.\n\n[50% efficiency at maximum power is a key insight — you're always wasting as much as you deliver!]", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "A battery has ε = 6.0 V and r = 2.0 Ω. What external resistance R will give maximum power transfer? Calculate this maximum power. (3 steps)", "answer": "- Step 1: Maximum power transfer occurs when R = r = 2.0 Ω\n- Step 2: Current at this condition: I = ε/(R + r) = 6.0/(2.0 + 2.0) = 6.0/4.0 = 1.5 A\n- Step 3: Maximum power P_max = I²R = (1.5)² × 2.0 = 2.25 × 2.0 = 4.5 W (or use P = ε²/(4r) = 36/(8) = 4.5 W ✓)\n\n[You could also use P = V²/R where V = ε/2 = 3 V when R = r, giving P = 9/2 = 4.5 W]", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A student says \"the gradient of the V-I graph gives the internal resistance.\" Identify and correct this error. (2 steps)", "answer": "- Step 1: The error is about the SIGN. The equation is V = ε − Ir, which has gradient = −r (negative).\n- Step 2: Corrected statement: The gradient of the V-I graph is −r (negative r). Therefore, r = −gradient. The magnitude of the gradient gives r, but you must take the negative sign and report r as a POSITIVE value.\n\n[This is a classic exam trap — many students forget the negative sign and either report r as negative or forget to negate the gradient.]", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Why can't you use a potato to power a pacemaker? Explain using the concept of internal resistance. (2 steps)", "answer": "- Step 1: A potato battery has a very high internal resistance (typically hundreds or thousands of ohms) because the electrochemical reactions inside are weak.\n- Step 2: Even if the e.m.f. is ~0.8 V, the high internal resistance means very little current can flow (I = ε/(R + r)). For a pacemaker needing microamps, the potato's r is too high to deliver useful current at a usable voltage.\n\n[This is why we need chemical batteries with low internal resistance for practical applications — the potato works in principle but fails in practice due to excessive r.]", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": true}, {"question": "Two resistors of 6.0 Ω and 3.0 Ω are connected in parallel, and this combination is connected to a battery with ε = 12.0 V and r = 1.0 Ω. Calculate the terminal p.d. (4 steps)", "answer": "- Step 1: First find the parallel combination: 1/R_p = 1/6 + 1/3 = 1/2, so R_p = 2.0 Ω\n- Step 2: Total external resistance = 2.0 Ω. The total circuit resistance = R_p + r = 2.0 + 1.0 = 3.0 Ω\n- Step 3: Current I = ε/(R + r) = 12.0 V / 3.0 Ω = 4.0 A\n- Step 4: Terminal p.d. V = ε − Ir = 12.0 V − (4.0 A × 1.0 Ω) = 8.0 V (or V = IR_p = 4.0 × 2.0 = 8.0 V ✓)\n\n[Two methods give same answer — always check consistency between V = ε − Ir and V = IR_external]", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Explain why a battery with \"negligible internal resistance\" can be treated as having terminal p.d. equal to its e.m.f. even when current flows. (2 steps)", "answer": "- Step 1: When r ≈ 0, the \"lost volts\" term Ir becomes negligible regardless of current (since r is essentially zero).\n- Step 2: Using V = ε − Ir, if r ≈ 0, then V ≈ ε − 0 = ε. So terminal p.d. equals e.m.f. for all practical currents.\n\n[In exam questions, \"negligible internal resistance\" is a hint: you can treat ε = V directly and skip internal resistance calculations.]", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A 12 V car battery has internal resistance 0.01 Ω. Calculate the short-circuit current if the terminals are accidentally shorted together. Why is this dangerous? (2 steps)", "answer": "- Step 1: Short circuit means R = 0. Short-circuit current I_sc = ε/r = 12 V / 0.01 Ω = 1200 A\n- Step 2: This enormous current is dangerous because power dissipated in the battery is P = I²r = (1200)² × 0.01 = 14,400 W! This instantly generates huge heat, potentially causing fire or explosion.\n\n[Real car batteries can supply 1000+ A when shorted. Never short battery terminals!]", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In CP8, a student plots V against I and obtains data points that curve downwards rather than forming a straight line. What does this suggest, and how might this be caused? (2 steps)", "answer": "- Step 1: A curved graph (not straight) suggests that the internal resistance is NOT constant — it increases at higher currents.\n- Step 2: This is often caused by heating: as current increases, the cell warms up, changing the chemistry and increasing r. The equation V = ε − Ir assumes constant r, which breaks down at high currents.\n\n[This is why you should use low currents in CP8 and take quick readings — heating effects invalidate the linear model.]", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A battery is connected to an external resistor. The power dissipated in the external resistor is 16 W, and the power wasted in the internal resistance is 4 W. What is the ratio of internal resistance to external resistance (r:R)? (3 steps)", "answer": "- Step 1: Power in external resistor: P_ext = I²R = 16 W. Power in internal resistance: P_int = I²r = 4 W.\n- Step 2: Since both powers have the same I² factor: I²R / I²r = 16/4, so R/r = 4.\n- Step 3: Therefore r/R = 1/4, so r:R = 1:4.\n\n[When power ratios are given, the current cancels out — a useful shortcut!]", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "A student measures the terminal p.d. of a battery as 4.8 V while supplying a current of 0.5 A. The battery is labelled 5.0 V. Estimate the internal resistance of the battery. (2 steps)", "answer": "- Step 1: Lost volts = ε − V = 5.0 − 4.8 = 0.2 V\n- Step 2: Internal resistance r = (ε − V)/I = 0.2 V / 0.5 A = 0.4 Ω\n\n[Simple estimation: 0.2 V lost at 0.5 A → r ≈ 0.4 Ω. This is a quick check — don't need exact values to get close.]", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Why does a battery's terminal p.d. recover somewhat after being left to rest, even if it was drained under load? (2 steps)", "answer": "- Step 1: When a battery supplies current, the chemical reactions at the electrodes produce concentration gradients and buildup of reaction products.\n- Step 2: When resting, these gradients dissipate through diffusion, and the chemical equilibrium partially recovers. This restores some of the \"lost\" e.m.f. — which is why a \"resting\" battery sometimes shows higher voltage than under load.\n\n[This is why you should take open-circuit readings after a rest period in CP8 — the battery recovers slightly.]", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "A circuit has a battery (ε, r) connected to two resistors R₁ and R₂ in series. Write down an expression for the terminal p.d. across R₁ in terms of ε, r, R₁, and R₂. (2 steps)", "answer": "- Step 1: Total external resistance = R₁ + R₂. Total circuit resistance = R₁ + R₂ + r.\n- Step 2: Current I = ε / (R₁ + R₂ + r). Terminal p.d. across R₁ = IR₁ = [ε / (R₁ + R₂ + r)] × R₁\n\n[This is just Ohm's law applied to part of a series circuit, combined with the e.m.f. equation.]", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Explain the difference between a \"fresh\" battery and a \"run-down\" battery in terms of e.m.f. and internal resistance. (2 steps)", "answer": "- Step 1: A run-down battery has lower e.m.f. because the chemical reactants have been depleted — less energy per charge is available.\n- Step 2: A run-down battery also typically has HIGHER internal resistance because the electrolyte and electrode materials degrade, making it harder for charge to flow through. Both effects reduce terminal p.d. under load.\n\n[This is why old batteries feel \"weak\" — lower ε AND higher r both reduce the voltage available to your device.]", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "In an experiment to find ε and r, a student records the following pairs: (0.10 A, 1.44 V), (0.40 A, 1.32 V), (0.80 A, 1.09 V). Plot these points and estimate ε and r from the trend. (3 steps)", "answer": "- Step 1: Plot V on y-axis, I on x-axis. The points should form a straight line (confirming constant r).\n- Step 2: Extrapolate the line to I = 0 (y-intercept). This gives ε ≈ 1.5 V (reading between the highest V values).\n- Step 3: Find gradient: use (1.44 − 1.09) / (0.10 − 0.80) = 0.35 / (−0.70) = −0.5 Ω. So r = −(−0.5) = 0.5 Ω.\n\n[From the data: r ≈ 0.5 Ω, ε ≈ 1.5 V. This matches the textbook example.]", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Why must you use a high-resistance voltmeter when measuring e.m.f. directly across a cell? What happens if you use a low-resistance voltmeter? (2 steps)", "answer": "- Step 1: A high-resistance voltmeter draws minimal current (ideally zero). When measuring ε, we want I ≈ 0 so no voltage is lost across internal resistance.\n- Step 2: If the voltmeter has low resistance, it draws current, causing a voltage drop Ir across the internal resistance. The reading would be less than the true ε — a systematic error.\n\n[Digital voltmeters have resistance ~10 MΩ, so they're effectively ideal. Analogue meters may have lower R.]", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A solar cell is connected to a variable resistor. Sketch how you would expect the V-I characteristic to differ from a standard chemical cell, and explain why. (2 steps)", "answer": "- Step 1: A solar cell's V-I graph is initially flat (constant voltage) then curves down at higher currents, unlike the straight line of a chemical cell.\n- Step 2: This is because a solar cell's internal resistance decreases significantly as light intensity increases, and also changes with current (the diode characteristics become significant at higher currents). At low currents, r is high and nearly constant; at high currents, r drops considerably.\n\n[This is why the CP8 method works for chemical cells but needs modification for solar cells — the linear model doesn't apply.]", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "A battery has ε = 3.0 V and r = 1.0 Ω. It is connected to an external resistor R. If the power dissipated in R equals the power dissipated in r, find the value of R. (3 steps)", "answer": "- Step 1: Power in R: P_R = I²R. Power in r: P_r = I²r. Given P_R = P_r, so I²R = I²r.\n- Step 2: Cancel I²: R = r = 1.0 Ω\n- Step 3: Check with actual values: I = ε/(R + r) = 3.0/2.0 = 1.5 A. P_R = (1.5)² × 1 = 2.25 W. P_r = (1.5)² × 1 = 2.25 W. ✓\n\n[When power dissipated equals, external R must equal internal r. This is a key result!]", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In the water analogy for electric circuits, what does (a) a pump represent, (b) a pipe represent, and (c) friction in the pipes represent? (2 steps)", "answer": "- Step 1: (a) The pump represents the power supply (battery/cell) — it provides the \"pressure\" (voltage) to drive water (charge) around the system.\n- Step 2: (b) The pipe represents the wires/circuit. (c) Friction in the pipes represents resistance — it opposes flow and dissipates energy as heat. Friction at the pump itself represents internal resistance.\n\n[This analogy helps visualize why higher resistance (friction) reduces flow (current) and why some pressure is lost (voltage dropped) at the pump itself (internal resistance).]", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A student connects two different batteries in series — one with ε₁ = 1.5 V, r₁ = 0.5 Ω, and another with ε₂ = 2.0 V, r₂ = 1.0 Ω. Calculate the total e.m.f. and total internal resistance of the combination. (2 steps)", "answer": "- Step 1: For batteries in series: ε_total = ε₁ + ε₂ = 1.5 + 2.0 = 3.5 V\n- Step 2: r_total = r₁ + r₂ = 0.5 + 1.0 = 1.5 Ω\n\n[Simple addition for series. Note: you can only add e.m.f.s directly when they're in series pointing the same way.]", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A student forgets to close the switch before recording current and voltage readings in CP8. How would this affect the calculated values of ε and r? (2 steps)", "answer": "- Step 1: If the switch is left OPEN (no current), the ammeter reads I = 0, and the voltmeter reads terminal p.d. = ε (no lost volts).\n- Step 2: This gives ONE data point at (0, ε). To find r, you need multiple points at different currents. With switch open, you can't vary I, so you can't determine r at all — you only get ε.\n\n[You need the switch CLOSED to get varying I values for the V-I graph. Opening between readings is for safety and to prevent heating, not for data collection.]", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "Explain why connecting batteries in parallel is useful for high-current applications like car engine starting. (2 steps)", "answer": "- Step 1: In parallel, identical batteries give the same ε but the internal resistances combine as r/n (where n is number of cells).\n- Step 2: This gives a much LOWER total internal resistance. Since current I = ε/(R + r_total), lower r_total allows much higher currents to be delivered to the starter motor without excessive voltage drop.\n\n[Car batteries often have multiple plates internally to achieve low r. The parallel principle is the same.]", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A nurse accidentally touches both terminals of a 12 V car battery. Why does she feel almost nothing, but touching the 230 V mains is lethal? Use resistance concepts. (2 steps)", "answer": "- Step 1: Human body resistance from hand-to-hand is ~10 kΩ (dry) to ~1 kΩ (wet). With 12 V: I = V/R = 12/10,000 = 1.2 mA — below sensation threshold.\n- Step 2: With 230 V: I = 230/10,000 = 23 mA — enough to cause muscular contraction and cardiac issues. The battery's low internal resistance (0.01 Ω) is irrelevant here because the body resistance dominates. The 12 V cannot push dangerous current through the body's high resistance.\n\n[It's the current through the body that matters, not the voltage. But voltage drives current through resistance (I = V/R).]", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A laboratory power supply has very high internal resistance (~1 MΩ). Explain why this is a safety feature. (2 steps)", "answer": "- Step 1: Even if someone accidentally touches the terminals, the high internal resistance limits the current to I = ε/r ≈ 240 V / 1,000,000 Ω = 0.24 mA — well below dangerous levels.\n- Step 2: The high internal resistance acts as a built-in current limiter. Even a short circuit can't produce dangerous currents because r is so large. This is why EHT (extra-high tension) supplies have huge internal r — to make them \"touchable\" in principle.\n\n[This is why high-voltage lab supplies are relatively safe despite high voltage — the current is limited by r.]", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "Sketch and label the circuit diagram for Core Practical 8, showing all components and indicating where each measurement is taken. (2 steps)", "answer": "- Step 1: Circuit: Battery (ε, r) in series with ammeter (A), switch, and variable resistor (rheostat). Voltmeter (V) connected ACROSS the battery terminals (i.e., across the external circuit).\n- Step 2: Label: Ammeter measures current I in the circuit. Voltmeter measures terminal p.d. V (not ε directly — that's found from the graph). The variable resistor is adjusted to get different (I, V) pairs.\n\n[Key: voltmeter across BATTERY terminals, not across the variable resistor. This measures terminal p.d.]", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "A battery has ε = 5.0 V. When connected to a 10 Ω resistor, terminal p.d. is 4.0 V. When connected to a 5 Ω resistor, terminal p.d. is 3.0 V. Show how to find r from these two measurements. (3 steps)", "answer": "- Step 1: For R = 10 Ω: Ir₁ = ε − V₁ = 5.0 − 4.0 = 1.0 V. Current I₁ = V₁/R = 4.0/10 = 0.4 A. So r₁ = 1.0/0.4 = 2.5 Ω.\n- Step 2: For R = 5 Ω: Ir₂ = ε − V₂ = 5.0 − 3.0 = 2.0 V. Current I₂ = V₂/R = 3.0/5 = 0.6 A. So r₂ = 2.0/0.6 = 3.33 Ω.\n- Step 3: These differ slightly due to measurement uncertainty. Draw V-I graph: points are (0.4, 4.0) and (0.6, 3.0). Gradient = (3.0 − 4.0)/(0.6 − 0.4) = −1/0.2 = −5 Ω, so r ≈ 5 Ω. The discrepancy shows why graph method is better than two-point calculation.\n\n[Two-point calculation is error-prone. Graph method averages all data points and gives more reliable r.]", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "State three sources of uncertainty in Core Practical 8 and explain how each affects the results. (3 steps)", "answer": "- Step 1: (a) Random error from fluctuating meter readings or varying contact resistance. This scatters points around the best-fit line but can be reduced by repeating readings.\n- Step 2: (b) Systematic error from voltmeter not being perfectly ideal (draws tiny current) or ammeter having small resistance. This shifts all points consistently.\n- Step 3: (c) Resolution limits: voltmeter resolution 1 mV, ammeter 0.1 mA. This sets minimum detectable changes. Using largest possible triangle for gradient minimizes percentage uncertainty.\n\n[Heating is another systematic error: if cell warms during experiment, r changes, causing curvature in the graph.]", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "In CP8, a student draws a line of best fit that doesn't pass through the origin. Is this expected? Explain. (2 steps)", "answer": "- Step 1: No, the line should pass through the origin only if ε = 0 (dead cell). For a real cell, the y-intercept is ε (when I = 0).\n- Step 2: However, if the student plots V on y-axis and I on x-axis, the line should intercept the V-axis at ε, not at the origin. The origin (0,0) represents short-circuit condition where V = 0 and I = ε/r — not a data point you'd typically collect.\n\n[Some students wrongly think the line should go through (0,0). It doesn't — that's a condition of short circuit, not open circuit.]", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "Why does a battery feel warm after supplying current for a long time? Use the concept of power dissipation. (2 steps)", "answer": "- Step 1: Power dissipated in the internal resistance is P = I²r. This energy is converted to heat inside the battery.\n- Step 2: Over time, this heating accumulates, making the battery feel warm. The chemical reactions may also be exothermic. High current applications (like starting a car) make batteries noticeably hot.\n\n[This is Joule heating: P = I²R for any resistor, including the internal resistance of a battery.]", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "A circuit contains a battery with ε = 9.0 V and r = 2.0 Ω connected to three resistors: 6 Ω, 3 Ω, and 2 Ω all in series. Calculate (a) total resistance, (b) current, (c) terminal p.d., and (d) lost volts. (4 steps)", "answer": "- Step 1: (a) Total external R = 6 + 3 + 2 = 11 Ω. Total circuit R = 11 + 2 = 13 Ω.\n- Step 2: (b) Current I = ε/(R + r) = 9.0/13 = 0.69 A\n- Step 3: (c) Terminal p.d. V = IR_external = 0.69 × 11 = 7.6 V (or V = ε − Ir = 9.0 − 1.38 = 7.6 V)\n- Step 4: (d) Lost volts Ir = 0.69 × 2 = 1.38 V. Check: 7.6 + 1.38 = 8.98 ≈ 9.0 V ✓\n\n[Always check: terminal p.d. + lost volts = e.m.f.]", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "A student claims: \"E.m.f. is the voltage of the battery.\" Explain why this statement is imprecise and give the correct wording. (2 steps)", "answer": "- Step 1: The statement is imprecise because \"voltage\" usually refers to terminal p.d., which equals e.m.f. ONLY when no current flows (open circuit).\n- Step 2: The correct definition: \"E.m.f. is the energy transferred from chemical to electrical energy per unit charge by the source.\" Or: \"E.m.f. is the potential difference across the cell when no current flows.\"\n\n[Always use the full definition in exams — \"voltage of the battery\" is too vague and may not be true when current flows.]", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "A battery is connected to a resistor R. If you halve the resistance R, what happens to (a) the current, (b) the terminal p.d., and (c) the lost volts? Explain using equations. (3 steps)", "answer": "- Step 1: (a) Current doubles. I = ε/(R + r). If R halves, denominator decreases, so I increases (but doesn't quite double because r is fixed).\n- Step 2: (b) Terminal p.d. V = ε − Ir. Since I increases, Ir increases, so V decreases.\n- Step 3: (c) Lost volts Ir = I × r. Since I increases, lost volts increases. More of the e.m.f. is wasted inside the battery.\n\n[Intuitively: lower external resistance → more current → more lost volts → less terminal voltage. This is why batteries run down faster on low-R loads.]", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "In CP8, explain why taking readings quickly (with switch open between readings) gives more accurate results than leaving the switch closed continuously. (2 steps)", "answer": "- Step 1: When current flows continuously, the cell heats up. Heating changes the chemical reactions, causing ε and r to drift during the experiment.\n- Step 2: This creates a systematic error — your (I, V) points don't follow a single straight line but drift over time. Taking quick readings with the switch open between them minimizes heating and gives a cleaner, more accurate linear graph.\n\n[Heating effects are the main reason for the \"open switch between readings\" protocol in CP8.]", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "A battery has internal resistance r. Under what condition does the terminal p.d. equal half the e.m.f.? (2 steps)", "answer": "- Step 1: Terminal p.d. V = ε − Ir. We want V = ε/2.\n- Step 2: So ε − Ir = ε/2 ⇒ Ir = ε/2 ⇒ I = ε/(2r). At this current, half the e.m.f. is lost in internal resistance, leaving half for the external circuit.\n\n[At maximum power transfer (R = r), V = ε/2 exactly. This is a key result: at max power, efficiency is only 50%.]", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "Explain why a voltmeter connected across a battery in an open circuit reads the e.m.f., but when a load is connected, it reads less than the e.m.f. (2 steps)", "answer": "- Step 1: In open circuit, no current flows through the battery, so there is no voltage drop across internal resistance (Ir = 0). The voltmeter directly measures ε.\n- Step 2: When a load is connected, current flows, causing lost volts Ir across the internal resistance. The terminal p.d. V = ε − Ir is now less than ε. The voltmeter measures this reduced voltage.\n\n[This is why you need to measure ε using open-circuit condition, not under load.]", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}], "count": 50}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What is the conceptual distinction
