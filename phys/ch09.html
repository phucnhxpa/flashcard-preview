 total e.m.f. and total internal resistance of this combination? Why do they add this way? (3 steps)", "answer": "- Step 1: Total e.m.f. $$\\varepsilon_{total} = \\varepsilon_1 + \\varepsilon_2 = 3 + 4.5 = 7.5 V$$. In series, each cell adds energy to the charges flowing through it, so energy per coulomb adds.\n- Step 2: Total internal resistance $$r_{total} = r_1 + r_2 = 0.5 + 1 = 1.5 \\Omega$$. Resistances in series simply add up because the current must flow through both internal resistors sequentially.\n- Step 3: The combination acts like a single, larger battery with a higher voltage and higher internal resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Three identical cells, each with e.m.f. $$1.5 V$$ and internal resistance $$0.9 \\Omega$$, are connected in parallel. What is the total e.m.f. and total internal resistance? Explain the intuition. (3 steps)", "answer": "- Step 1: Total e.m.f. $$\\varepsilon_{total} = 1.5 V$$. Connecting identical cells in parallel does not increase voltage because all cells maintain the same potential difference across the same two terminals; charges don't get \"extra\" energy by choosing one path over another.\n- Step 2: Total internal resistance $$r_{total} = r/n = 0.9/3 = 0.3 \\Omega$$. Like any resistors in parallel, adding more paths decreases total resistance.\n- Step 3: Intuition: Paralleling cells provides more pathways for current, reducing internal resistance and allowing a larger current to be drawn without significant voltage drop (useful for car starters).", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "A battery with fixed $$\\varepsilon$$ and $$r$$ is connected to a variable load $$R$$. For what value of $$R$$ is the power delivered to the load maximized? What is the efficiency at this point? (3 steps)", "answer": "- Step 1: Maximum power transfer occurs when the load resistance equals the internal resistance: $$R = r$$.\n- Step 2: At this condition, the terminal p.d. is exactly half the e.m.f. ($$V = \\varepsilon/2$$) because the lost volts equal the terminal p.d.\n- Step 3: Since half the voltage is across $$R$$ and half across $$r$$, and the current is the same through both, half the total power is delivered to the load and half is wasted inside the cell. Efficiency = 50%. (For high efficiency, we usually want $$R \\gg r$$).", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "In Core Practical 8, what are the independent and dependent variables when investigating e.m.f. and internal resistance? Why must the switch be opened between readings? (3 steps)", "answer": "- Step 1: Independent variable is the load resistance $$R$$ (varied using a rheostat). Dependent variables are the terminal p.d. $$V$$ and current $$I$$.\n- Step 2: Control variables are the e.m.f. and internal resistance of the cell (which should remain constant).\n- Step 3: The switch must be opened between readings to prevent the cell from heating up. If the cell heats, its internal resistance changes (usually increases), introducing a systematic error and ruining the straight-line graph.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "In CP8, a student plots V on the y-axis and I on the x-axis. The y-intercept is 1.60 V and the gradient is -22.7. Determine the e.m.f. and internal resistance. (2 steps)", "answer": "- Step 1: The y-intercept corresponds to $$I = 0$$ (open circuit), which equals the e.m.f. $$\\varepsilon = 1.60 V$$.\n- Step 2: The gradient corresponds to $$-r$$. Therefore, internal resistance $$r = -(\\text{gradient}) = -(-22.7) = 22.7 \\Omega$$.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A car battery needs a very small internal resistance (~0.01 Ω), while a lab EHT (Extra High Tension) supply needs a very large internal resistance (~50 MΩ). Explain why, based on what happens during a short circuit. (3 steps)", "answer": "- Step 1: Car battery: The starter motor needs a huge current (~200 A). Low $$r$$ ensures that even at high current, the lost volts ($$Ir$$) are small, so terminal p.d. stays high enough to turn the motor.\n- Step 2: EHT supply: It produces high voltage for experiments. If accidentally short-circuited (e.g., by a person), the huge internal resistance limits the current to a tiny, safe value ($$I = \\varepsilon/r \\approx \\text{fraction of a mA}$$).\n- Step 3: Car battery optimizes for high current delivery; EHT supply optimizes for safety via current limitation.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "A battery has $$\\varepsilon = 5 V$$. When connected to a $$4 \\Omega$$ resistor, the terminal p.d. is $$4 V$$. What is the internal resistance $$r$$? (Mental math: think of lost volts first). (3 steps)", "answer": "- Step 1: Find lost volts. The e.m.f. is 5 V, but only 4 V reaches the external circuit. Lost volts = $$5 - 4 = 1 V$$.\n- Step 2: Find the current. The terminal p.d. (4 V) is across the 4 Ω resistor. $$I = V/R = 4/4 = 1 A$$.\n- Step 3: Find internal resistance. Lost volts = $$Ir$$, so $$1 = 1 \\times r$$. Therefore, $$r = 1 \\Omega$$.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "In a CP8-style experiment with a solar cell, the V-I graph curves at higher currents rather than forming a perfect straight line. What does this indicate about the internal resistance of the solar cell? (3 steps)", "answer": "- Step 1: A straight line implies a constant gradient, which means a constant internal resistance.\n- Step 2: A curve means the gradient is changing. Since gradient = -r, a changing gradient means the internal resistance is not constant.\n- Step 3: At higher currents, the cell heats up, or physical limitations of the semiconductor material cause the internal resistance to increase, bending the graph downward more steeply.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A cell ($$\\varepsilon$$, $$r$$) is connected to a load $$R$$. The current is $$I$$. Write the expression for the power wasted inside the cell. If $$R$$ decreases, does the wasted power increase or decrease? (3 steps)", "answer": "- Step 1: Power wasted inside the cell is dissipated in the internal resistance: $$P_{wasted} = I^2 r$$.\n- Step 2: As $$R$$ decreases, the total resistance in the circuit decreases, so the current $$I = \\varepsilon/(R+r)$$ increases.\n- Step 3: Since $$P_{wasted} = I^2 r$$ and $$r$$ is constant, an increase in current causes an increase in wasted power. (This is why shorting a battery causes it to get very hot very quickly).", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "A student remembers \"V = IR\" and tries to find resistance by writing $$R = IV$$. Identify the error and explain how to correctly rearrange the equation. (3 steps)", "answer": "- Step 1: The error is treating $$I$$ and $$V$$ as multiplicative factors. In $$V = IR$$, $$I$$ and $$R$$ are multiplied together to give $$V$$.\n- Step 2: To make $$R$$ the subject, divide both sides by $$I$$: $$R = V/I$$.\n- Step 3: Check units to verify: Volts (J/C) divided by Amps (C/s) gives Ohms, which is correct. $$I \\times V$$ would give Amp-Volts (Watts), which is power, not resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "State the exact exam-board definition of electromotive force (e.m.f.), specifying the energy transfer direction. (3 steps)", "answer": "- Step 1: E.m.f. is defined as the amount of energy converted *from chemical (or other forms) to electrical* energy per unit charge passing through the source.\n- Step 2: The key distinction is the direction: chemical/mechanical → electrical. This is the opposite of p.d., which is electrical → heat/light/mechanical.\n- Step 3: Formula: $$\\varepsilon = W/Q$$, measured in Volts ($$J C^{-1}$$). It is not a force!", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "What would happen if you connected two cells in parallel with *different* e.m.f.s (e.g., $$\\varepsilon_1 = 9V$$ and $$\\varepsilon_2 = 3V$$)? Why is this generally avoided? (3 steps)", "answer": "- Step 1: The cell with the higher e.m.f. (9V) would drive current *backwards* through the cell with the lower e.m.f. (3V).\n- Step 2: The 9V cell would effectively try to \"charge\" the 3V cell, driving current against its natural chemical reaction.\n- Step 3: This creates a low-resistance internal loop where large currents can flow between the cells, causing them to overheat and waste power. That is why the \"identical cells in parallel\" rule strictly applies to safe, intended operation.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "In a circuit measuring internal resistance, why must an ammeter have very low resistance and a voltmeter very high resistance? What error does a non-ideal voltmeter introduce? (3 steps)", "answer": "- Step 1: Ammeter: It is in series. Low resistance ensures it doesn't significantly add to the total resistance ($$R+r$$), which would reduce current and alter the reading.\n- Step 2: Voltmeter: It is in parallel across the cell terminals. High resistance ensures it draws negligible current, so the current measured by the ammeter is (almost) entirely through the load, not the voltmeter.\n- Step 3: A non-ideal voltmeter draws some current, meaning even with the switch \"open,\" a tiny current flows, causing some lost volts. Thus, the voltmeter would read slightly *less* than the true e.m.f.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "When a car's starter motor engages, the headlights dim. Using the concepts of e.m.f., terminal p.d., and internal resistance, explain why the headlights dim. (3 steps)", "answer": "- Step 1: The starter motor has very low resistance, so when it engages, it draws a very large current from the battery.\n- Step 2: This large current flows through the battery's internal resistance, creating significant lost volts ($$V_{lost} = Ir$$).\n- Step 3: The terminal p.d. drops ($$V = \\varepsilon - Ir$$). Since the headlights are connected to the same terminals, the p.d. across them also drops, causing them to dim.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A power supply has $$\\varepsilon = 12V$$ and $$r = 2\\Omega$$. It is connected to a load $$R = 10\\Omega$$. Is the efficiency of power delivery to the load greater than, less than, or equal to 50%? Explain without calculating exact numbers. (3 steps)", "answer": "- Step 1: Efficiency depends on the ratio of useful power ($$I^2 R$$) to total power ($$I\\varepsilon$$). Since current is the same through $$R$$ and $$r$$, the ratio of powers is simply the ratio of resistances: $$R / (R + r)$$.\n- Step 2: We are given $$R = 10\\Omega$$ and $$r = 2\\Omega$$. Since $$R > r$$, the fraction $$R / (R+r)$$ is greater than 1/2.\n- Step 3: Therefore, the efficiency is greater than 50%. (Maximum power transfer occurs at 50% when $$R=r$$, but higher efficiency is achieved when $$R \\gg r$$).", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Two identical cells, each $$\\varepsilon = 1.5V$$ and $$r = 0.5\\Omega$$, are connected in series with a $$4\\Omega$$ external resistor. What is the terminal p.d. across the 4Ω resistor? (Mental math: total e.m.f. and total r first). (3 steps)", "answer": "- Step 1: Cells in series add their e.m.f.s and internal resistances. Total $$\\varepsilon = 1.5 + 1.5 = 3V$$. Total $$r = 0.5 + 0.5 = 1\\Omega$$.\n- Step 2: Total circuit resistance is $$R_{total} = R + r = 4 + 1 = 5\\Omega$$. Current $$I = \\varepsilon / R_{total} = 3 / 5 = 0.6 A$$.\n- Step 3: Terminal p.d. is the voltage across the external resistor: $$V = IR = 0.6 \\times 4 = 2.4 V$$. (Or, lost volts = $$0.6 \\times 1 = 0.6 V$$, so $$V = 3 - 0.6 = 2.4 V$$).", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "In the CP8 circuit diagram, where must the ammeter and voltmeter be placed relative to the battery and the variable resistor? (3 steps)", "answer": "- Step 1: The ammeter must be in *series* with the battery and the variable resistor to measure the total current drawn from the cell.\n- Step 2: The voltmeter must be in *parallel* across the battery terminals (measuring what's available externally, not inside the dotted box).\n- Step 3: The variable resistor acts as the load $$R$$. Changing it varies the current $$I$$, which in turn varies the terminal p.d. $$V$$ recorded by the voltmeter.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}], "count": 26}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "What does potential difference (p.d.) across a component describe in terms of energy transfer, and what is its standard unit? (3 steps)", "answer": "- Step 1: Potential difference describes the electrical energy converted *from* the charges into other forms (such as heat or light) *per unit charge* passing through the component.\n- Step 2: Mathematically, this is expressed as $$V = \\frac{W}{Q}$$, where $$W$$ is the energy converted (work done) in joules and $$Q$$ is the charge in coulombs.\n- Step 3: The standard unit is the volt (V). Since it is energy per charge, 1 V is equivalent to 1 joule per coulomb ($$J\\,C^{-1}$$).", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "How does the definition of electromotive force (e.m.f.) differ from potential difference in terms of the direction of energy transfer? (3 steps)", "answer": "- Step 1: E.m.f. describes the energy transferred *to* the charges *from* the source (e.g., chemical energy converted to electrical energy) per unit charge passing through the source.\n- Step 2: While p.d. represents energy *leaving* the charges (electrical to other forms), e.m.f. represents energy *entering* the charges (other forms to electrical).\n- Step 3: Like p.d., it is mathematically $$\\varepsilon = \\frac{W}{Q}$$ and is measured in volts ($$J\\,C^{-1}$$). The key distinction is the energy's direction relative to the charges.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "Why is the term \"electromotive force\" potentially misleading, and what is a more accurate way to conceptualise it? (3 steps)", "answer": "- Step 1: The term suggests it is a mechanical push or a physical force, but it actually measures energy transfer per unit charge.\n- Step 2: It represents the maximum potential difference a source can provide when no current is flowing, serving as the \"voltage source\" of the circuit.\n- Step 3: Conceptually, it is much more accurate to think of it as \"electromotive energy per charge\" rather than a force, as it quantifies the total energy available to be pushed around the circuit.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Why does a battery become warm when it is supplying a large current to a circuit? (2 steps)", "answer": "- Step 1: Every real power supply has some internal resistance ($$r$$) due to the physical materials (like the electrolyte and electrodes) inside the cell that the charges must flow through.\n- Step 2: When current $$I$$ flows, electrical energy is dissipated as heat inside the cell due to this internal resistance, following the power relationship $$P = I^2 r$$, which causes the battery to warm up.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "When a current flows through a battery, how does the terminal potential difference relate to the e.m.f. and the \"lost volts\"? (2 steps)", "answer": "- Step 1: The e.m.f. ($$\\varepsilon$$) is the total energy per charge supplied by the cell, but some of this energy is wasted as heat inside the cell due to its internal resistance. This wasted energy per charge is the \"lost volts\" ($$Ir$$).\n- Step 2: The terminal p.d. ($$V$$) is the remaining energy per charge available to the external circuit. Therefore, the e.m.f. splits as $$\\varepsilon = V + Ir$$, meaning the terminal p.d. is always less than the e.m.f. when current flows.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "A high-resistance voltmeter is connected across the terminals of an isolated cell. What does the voltmeter read, and why? (2 steps)", "answer": "- Step 1: The voltmeter reads the e.m.f. ($$\\varepsilon$$) of the cell directly.\n- Step 2: Because the voltmeter has a very high resistance, the current $$I$$ flowing is effectively zero. With $$I \\approx 0$$, the lost volts $$Ir \\approx 0$$, so the terminal p.d. $$V = \\varepsilon - Ir$$ equals exactly $$\\varepsilon$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "What happens to the terminal p.d. and the current if the external resistance $$R$$ of a circuit is reduced to zero (a short circuit)? (2 steps)", "answer": "- Step 1: The terminal p.d. $$V$$ drops to zero because there is no external load to maintain a potential difference; all the e.m.f. is dropped entirely across the internal resistance.\n- Step 2: The current reaches its maximum possible value, the short-circuit current $$I_{sc} = \\frac{\\varepsilon}{r}$$. This can be dangerously high if the internal resistance $$r$$ is very small.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Starting from the conservation of energy (Kirchhoff's voltage law), derive the equation relating e.m.f., current, external resistance, and internal resistance: $$\\varepsilon = I(R + r)$$. (3 steps)", "answer": "- Step 1: The e.m.f. supplies energy per coulomb to the circuit. By conservation of energy, this energy per coulomb must equal the sum of the energy per coulomb dissipated in the external load ($$R$$) and the internal resistance ($$r$$).\n- Step 2: Express these energy-per-coulomb terms as voltages using Ohm's law ($$V = IR$$): the p.d. across the load is $$IR$$, and the p.d. lost internally is $$Ir$$.\n- Step 3: Equate the supplied energy to the dissipated energy: $$\\varepsilon = IR + Ir$$. Factoring out the current gives $$\\varepsilon = I(R + r)$$, showing the total e.m.f. drives the current through the total circuit resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "Using the core equation $$\\varepsilon = I(R + r)$$, derive the expression for terminal p.d. $$V$$ in terms of $$\\varepsilon$$, $$I$$, and $$r$$. What does this imply about the relationship between current and terminal p.d.? (2 steps)", "answer": "- Step 1: Substitute $$V = IR$$ (since terminal p.d. is the p.d. across the external load) into $$\\varepsilon = IR + Ir$$ to get $$\\varepsilon = V + Ir$$, which rearranges to $$V = \\varepsilon - Ir$$.\n- Step 2: This implies an inverse relationship: as the current $$I$$ drawn from the cell increases, the lost volts $$Ir$$ increase, causing the terminal p.d. $$V$$ to decrease linearly.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "In the equation $$\\varepsilon = I(R + r)$$, what is the physical distinction between capital $$R$$ and lowercase $$r$$? (2 steps)", "answer": "- Step 1: Capital $$R$$ represents the external load resistance; it is the total resistance of the components outside the battery that the current flows through and delivers useful work to.\n- Step 2: Lowercase $$r$$ represents the internal resistance of the power supply itself; it is inside the battery, is unavoidable in real cells, and causes energy to be wasted as heat within the battery.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "How can the equation $$V = \\varepsilon - Ir$$ be rearranged into the straight-line form $$y = mx + c$$, and what do the variables represent? (2 steps)", "answer": "- Step 1: By matching terms: the dependent variable $$y$$ corresponds to terminal p.d. $$V$$, the independent variable $$x$$ corresponds to current $$I$$, and the constant term $$c$$ corresponds to $$\\varepsilon$$.\n- Step 2: The gradient $$m$$ corresponds to $$-r$$. So the straight-line form is $$V = (-r)I + \\varepsilon$$. Plotting $$V$$ on the y-axis and $$I$$ on the x-axis yields a straight line with a negative gradient.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "In a V-I graph for a cell with internal resistance, what physical quantities do the y-intercept and the gradient represent? (2 steps)", "answer": "- Step 1: The y-intercept occurs when $$I = 0$$, which represents the open-circuit voltage, so it directly equals the e.m.f. ($$\\varepsilon$$).\n- Step 2: The gradient is the coefficient of $$I$$ in the equation $$V = -rI + \\varepsilon$$, so the gradient equals $$-r$$. Since internal resistance is a positive physical quantity, $$r = -\\text{gradient}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A student calculates the internal resistance of a cell from a V-I graph and writes $$r = \\text{gradient}$$. Why is this incorrect? (2 steps)", "answer": "- Step 1: The equation of the line is $$V = -rI + \\varepsilon$$, meaning the gradient of the V-I graph is $$-r$$, not $$+r$$.\n- Step 2: Because the line slopes downwards (terminal p.d. decreases as current increases), the gradient is a negative number. Internal resistance must be a positive value, so you must take the magnitude: $$r = -\\text{gradient}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "What does the x-intercept on a V-I graph for a cell represent physically? (2 steps)", "answer": "- Step 1: The x-intercept occurs where terminal p.d. $$V = 0$$.\n- Step 2: This represents the short-circuit condition, where the external resistance is zero. The current at this intercept is the maximum possible current the cell can provide, given by $$I_{sc} = \\frac{\\varepsilon}{r}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Two cells with e.m.f.s $$\\varepsilon_1$$ and $$\\varepsilon_2$$, and internal resistances $$r_1$$ and $$r_2$$, are connected in series (same polarity). What are the total e.m.f. and total internal resistance? (2 steps)", "answer": "- Step 1: The total e.m.f. is the sum of the individual e.m.f.s because each cell adds energy to the charges flowing through them: $$\\varepsilon_{total} = \\varepsilon_1 + \\varepsilon_2$$.\n- Step 2: The total internal resistance is the sum of the individual internal resistances because they are resistors in series, opposing the current cumulatively: $$r_{total} = r_1 + r_2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "Three identical cells, each with e.m.f. $$\\varepsilon$$ and internal resistance $$r$$, are connected in parallel. What are the total e.m.f. and total internal resistance? Why? (3 steps)", "answer": "- Step 1: The total e.m.f. remains $$\\varepsilon$$. Connecting identical cells in parallel does not increase the energy per charge; charges only pass through one cell, experiencing its e.m.f.\n- Step 2: The total internal resistance is $$r/3$$. For $$n$$ identical resistors in parallel, $$\\frac{1}{r_{total}} = \\frac{n}{r}$$, so $$r_{total} = \\frac{r}{n}$$.\n- Step 3: This configuration allows a larger current to be drawn with less voltage drop (fewer lost volts), which is useful for high-current applications like car starter motors.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "A student claims that connecting two identical 1.5 V cells in parallel gives a total e.m.f. of 3.0 V. Why is this wrong? (2 steps)", "answer": "- Step 1: Parallel components share the same potential difference; charges only travel through one cell, so they only gain the energy from one e.m.f. source.\n- Step 2: The total e.m.f. remains 1.5 V. The benefit of parallel cells is reduced internal resistance (and thus higher maximum current capability), not increased voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "In Core Practical 8, what components are used, and how are the ammeter and voltmeter positioned relative to the cell and variable resistor? (2 steps)", "answer": "- Step 1: The circuit consists of a cell, a variable resistor (rheostat), an ammeter, a voltmeter, and a switch.\n- Step 2: The ammeter is connected in series with the cell and variable resistor to measure the circuit current $$I$$. The voltmeter is connected in parallel across the cell's terminals to measure the terminal p.d. $$V$$.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "During Core Practical 8, why is it important to start with the variable resistor at maximum resistance and to open the switch between readings? (2 steps)", "answer": "- Step 1: Starting at maximum resistance minimises the initial current, preventing the cell from heating up, which would alter its internal resistance and e.m.f.\n- Step 2: Opening the switch between readings prevents the cell from continuously discharging, which would cause its e.m.f. and internal resistance to drift over time (a systematic error).", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "For Core Practical 8, identify the independent, dependent, and control variables. (3 steps)", "answer": "- Step 1: Independent variable: the load resistance $$R$$, which is adjusted using the variable resistor.\n- Step 2: Dependent variables: the terminal p.d. $$V$$ (measured by voltmeter) and the current $$I$$ (measured by ammeter).\n- Step 3: Control variables: the e.m.f. $$\\varepsilon$$ and internal resistance $$r$$ of the cell, kept constant by using the same fresh cell and minimising heating effects by switching off between readings.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "A cell delivers a current $$I$$ and has internal resistance $$r$$. Write the expression for the power wasted inside the cell. Why is this power considered \"wasted\"? (2 steps)", "answer": "- Step 1: The power dissipated as heat inside the cell is given by $$P_r = I^2 r$$. It can also be expressed as $$P_r = I \\times \\text{lost volts} = I(Ir) = I^2 r$$.\n- Step 2: It is wasted because this energy is dissipated as thermal energy inside the battery, rather than being delivered as useful electrical energy to the external circuit where it can do work.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "For a cell with e.m.f. $$\\varepsilon$$ and internal resistance $$r$$, what condition must the external load resistance $$R$$ satisfy to maximise the power delivered to the load? (2 steps)", "answer": "- Step 1: Maximum power transfer occurs when the external load resistance equals the internal resistance of the source: $$R = r$$.\n- Step 2: At this point, the power delivered to the load is $$P_{max} = \\frac{\\varepsilon^2}{4r}$$. However, the efficiency is only 50%, because half the total power is wasted as heat inside the cell.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "A car battery has $$\\varepsilon = 12\\text{ V}$$ and $$r = 0.01\\,\\Omega$$. Without doing a full calculation, explain why accidentally short-circuiting it with a metal wrench is extremely dangerous. (2 steps)", "answer": "- Step 1: The internal resistance is extremely small, meaning the short-circuit current $$I_{sc} = \\frac{\\varepsilon}{r}$$ will be enormous (on the order of hundreds or thousands of amps).\n- Step 2: This massive current will dissipate huge power both inside the battery ($$I^2 r$$) and in the wrench, causing rapid overheating, melting of metal, fire, and potential explosion of the battery.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "When a car engine starts, the starter motor draws a very large current. Why do the headlights momentarily dim? (3 steps)", "answer": "- Step 1: The starter motor draws a huge current from the battery, significantly increasing the total current $$I$$ flowing from the battery.\n- Step 2: According to $$V = \\varepsilon - Ir$$, a larger current means a larger voltage drop across the internal resistance (more lost volts).\n- Step 3: Consequently, the terminal p.d. $$V$$ drops significantly, meaning the headlights (connected to the same battery terminals) receive less voltage and dim.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "A battery has an e.m.f. of $$6.0\\text{ V}$$ and a terminal p.d. of $$5.5\\text{ V}$$. What are the lost volts, and why are they described as \"lost\"? (2 steps)", "answer": "- Step 1: Lost volts = e.m.f. - terminal p.d. = $$6.0\\text{ V} - 5.5\\text{ V} = 0.5\\text{ V}$$.\n- Step 2: They are \"lost\" because this 0.5 V is dropped across the internal resistance inside the cell and is unavailable to do work in the external circuit; it is wasted as thermal energy inside the battery.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "A voltmeter reads $$9.0\\text{ V}$$ across a battery with the switch open, and $$8.4\\text{ V}$$ with the switch closed (connecting a $$2\\,\\Omega$$ resistor). Estimate the internal resistance $$r$$. (3 steps)", "answer": "- Step 1: Open circuit: e.m.f. $$\\varepsilon = 9.0\\text{ V}$$ (since no current flows, there are no lost volts).\n- Step 2: Closed circuit: terminal p.d. $$V = 8.4\\text{ V}$$. The current is $$I = \\frac{V}{R} = \\frac{8.4}{2} = 4.2\\text{ A}$$.\n- Step 3: Lost volts = $$\\varepsilon - V = 9.0 - 8.4 = 0.6\\text{ V}$$. Internal resistance $$r = \\frac{\\text{lost volts}}{I} = \\frac{0.6}{4.2} \\approx 0.14\\,\\Omega$$.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "Two cells are connected in series. Cell 1 has $$\\varepsilon_1 = 3.0\\text{ V}$$, $$r_1 = 1.0\\,\\Omega$$. Cell 2 has $$\\varepsilon_2 = 3.0\\text{ V}$$, $$r_2 = 2.0\\,\\Omega$$. What is the total e.m.f. and total internal resistance? (2 steps)", "answer": "- Step 1: Total e.m.f. is the sum of the individual e.m.f.s: $$\\varepsilon_{total} = 3.0 + 3.0 = 6.0\\text{ V}$$.\n- Step 2: Total internal resistance is the sum of the individual internal resistances: $$r_{total} = 1.0 + 2.0 = 3.0\\,\\Omega$$.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "Two identical cells, each with $$\\varepsilon = 2.0\\text{ V}$$ and $$r = 4.0\\,\\Omega$$, are connected in parallel. What is the total e.m.f. and total internal resistance? (2 steps)", "answer": "- Step 1: Total e.m.f. remains the same as one cell: $$\\varepsilon_{total} = 2.0\\text{ V}$$.\n- Step 2: Total internal resistance is halved because they are identical resistors in parallel: $$r_{total} = \\frac{4.0}{2} = 2.0\\,\\Omega$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "In a CP8 experiment, a V-I graph yields a y-intercept of $$1.5\\text{ V}$$ and a gradient of $$-2.0$$. What are the e.m.f. and internal resistance of the cell? (2 steps)", "answer": "- Step 1: The y-intercept corresponds to the e.m.f., so $$\\varepsilon = 1.5\\text{ V}$$.\n- Step 2: The gradient corresponds to $$-r$$. Since the gradient is $$-2.0$$, the internal resistance is $$r = -(-2.0) = 2.0\\,\\Omega$$.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "To find the power delivered to the external load resistor $$R$$, a student uses $$P = I^2 R$$ and another uses $$P = \\frac{V^2}{R}$$, where $$V$$ is the terminal p.d. Are both correct? Why? (2 steps)", "answer": "- Step 1: Yes, both are correct because they are mathematically equivalent via Ohm's law ($$V = IR$$).\n- Step 2: Using $$V$$ as the terminal p.d. ensures we only calculate the power delivered to the external circuit. $$P = I^2 R = I \\times (IR) = IV$$, and $$P = \\frac{V^2}{R} = V \\times \\frac{V}{R} = IV$$. Both correctly yield the useful output power.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A laboratory Extra High Tension (E.H.T.) power supply has a very large built-in internal resistance (e.g., $$50\\,M\\Omega$$). Why is this a crucial safety feature? (2 steps)", "answer": "- Step 1: A large internal resistance severely limits the maximum current that can flow if a person accidentally touches the live terminal, because $$I_{sc} = \\frac{\\varepsilon}{r}$$.\n- Step 2: Even with a high e.m.f., the current is restricted to a tiny fraction of an amp, which prevents a fatal electric shock, though it can still deliver a nasty jolt.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "When a power supply delivers maximum power to a load ($$R = r$$), what fraction of the total power generated by the source is delivered to the load, and why? (3 steps)", "answer": "- Step 1: The total power generated by the source is $$P_{total} = \\varepsilon I$$. This power is split between the load and the internal resistance.\n- Step 2: The power delivered to the load is $$P_{load} = I^2 R$$, and the power wasted internally is $$P_{internal} = I^2 r$$.\n- Step 3: When $$R = r$$, $$P_{load} = P_{internal}$$, meaning exactly half the total power is delivered to the load and half is wasted as heat. Therefore, the efficiency is 50%.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "In a simple circuit with a cell and one external resistor, why does a voltmeter connected across the cell terminals read the same as a voltmeter connected across the external resistor? (2 steps)", "answer": "- Step 1: The terminal p.d. is defined as the potential difference across the external terminals of the cell.\n- Step 2: Since the external resistor is the only component connected between these two terminals, the p.d. across the resistor must equal the terminal p.d. (By Kirchhoff's voltage law, all the voltage available externally is dropped across this single resistor).", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "Using a water analogy, how can you visualise e.m.f., terminal p.d., and internal resistance? (3 steps)", "answer": "- Step 1: Think of a water pump pushing water around a pipe loop. The e.m.f. is like the total pressure the pump can generate.\n- Step 2: The internal resistance is like the friction inside the pump itself, which causes some pressure to be lost inside the pump before the water even enters the main pipe.\n- Step 3: The terminal p.d. is the actual water pressure available in the main pipe to do work (like turning a paddle wheel). As you draw more water (current), more pressure is lost inside the pump (lost volts), leaving less pressure in the main pipe (lower terminal p.d.).", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "A V-I graph for a solar cell is often a straight line at low currents but curves downwards at higher currents. What does this indicate about the internal resistance of the solar cell? (2 steps)", "answer": "- Step 1: A straight line indicates a constant internal resistance (the gradient is constant).\n- Step 2: The curve at higher currents indicates that the internal resistance is not constant; it increases significantly at larger current values, causing the terminal p.d. to drop faster than a linear prediction.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "As a battery ages and runs down, what typically happens to its e.m.f. and internal resistance, and how does this affect its performance? (3 steps)", "answer": "- Step 1: The e.m.f. usually decreases slightly as the chemical reactants deplete.\n- Step 2: The internal resistance increases significantly due to the buildup of chemical products and the drying of the electrolyte.\n- Step 3: This increased internal resistance causes more lost volts ($$Ir$$) for any given current, meaning the terminal p.d. drops more steeply, and the battery is less able to deliver power to the external circuit.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}], "count": 36}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "Both potential difference and e.m.f. share the algebraic form $$X = W/Q$$ and are measured in volts. What fundamental distinction makes them opposites of each other, and why is calling e.m.f. a \"force\" misleading? (2 steps)", "answer": "- Step 1: The direction of energy transfer is reversed. P.d. describes energy *leaving* the charges — electrical energy converted *to* other forms (heat, light, mechanical) per coulomb as charge passes through a component. E.m.f. describes energy *entering* the charges — chemical (or other) energy converted *to* electrical energy per coulomb as charge passes *through the source*. Same units ($$V = J\\,C^{-1}$$), opposite energy direction.\n+ P.d. across a resistor: charges *lose* energy.\n+ E.m.f. of a cell: charges *gain* energy.\n- Step 2: The name \"electromotive force\" is a historical misnomer. It is not a force (Newtons); it is an energy-per-charge quantity (Volts). The \"force\" part referred to the tendency to push charge around a circuit, but dimensionally it is identical to p.d. — just applied in the opposite energy direction.\n\nThe key exam wording: e.m.f. is \"energy converted from chemical (or other) to electrical per unit charge\"; p.d. is \"energy converted from electrical to other forms per unit charge.\"", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "A high-resistance voltmeter is connected across the terminals of an isolated cell with nothing else in the circuit. What does the voltmeter read, and why is this value not equal to the terminal p.d. when a load is attached? (2 steps)", "answer": "- Step 1: The voltmeter reads the e.m.f. ($$\\\\varepsilon$$) directly. With the switch open (open circuit), virtually no current flows ($$I \\approx 0$$) because the voltmeter's resistance is enormous (e.g. $$10\\,M\\Omega$$). Since lost volts $$= Ir = 0 \\times r = 0$$, there is no voltage drop inside the cell, so the full e.m.f. appears at the terminals.\n- Step 2: When a load resistor is attached and current flows, the term $$Ir$$ (lost volts) becomes non-zero. The terminal p.d. drops to $$V = \\varepsilon - Ir$$, which is strictly less than $$\\varepsilon$$. The more current drawn, the larger the lost volts, and the lower the terminal p.d.\n\nThis is why the open-circuit voltmeter reading is the standard way to measure e.m.f. — no lost volts contaminate the reading.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "Where does internal resistance physically come from inside a battery, and why does it cause the battery to become warm during use? (2 steps)", "answer": "- Step 1: Inside any real cell, charge carriers must move through physical materials — the electrolyte, the electrodes, and any contact junctions. These materials have finite resistivity, so they present a small resistance to current flow. This is the internal resistance $$r$$, modelled as a resistor in series with the ideal e.m.f. source inside the dotted \"battery box.\"\n- Step 2: When current $$I$$ flows, the power dissipated in the internal resistance is $$P = I^2 r$$ (Joule heating). This energy is thermal — it warms the cell from the inside. It is not available to the external circuit; it is wasted. The voltage drop $$Ir$$ across $$r$$ represents energy per coulomb lost as heat *inside* the battery, which is why terminal p.d. is always less than e.m.f. when current flows.\n\nA battery that feels warm after extended use is directly demonstrating $$I^2 r$$ heating in its internal resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "Starting from conservation of energy (Kirchhoff's voltage law), walk through the derivation of $$\\varepsilon = I(R + r)$$ and then rearrange to obtain $$V = \\varepsilon - Ir$$. At each step, state what physical quantity each term represents. (4 steps)", "answer": "- Step 1: Consider a cell of e.m.f. $$\\varepsilon$$ and internal resistance $$r$$ connected to an external load $$R$$. By conservation of energy (Kirchhoff's voltage law around the loop), the energy per coulomb *supplied* by the cell equals the energy per coulomb *dissipated* in all resistances: $$\\varepsilon = V_R + V_r$$, where $$V_R$$ is the p.d. across the load and $$V_r$$ is the p.d. across internal resistance.\n- Step 2: Apply Ohm's law to each resistance. The same current $$I$$ flows through both (they are in series): $$V_R = IR$$ and $$V_r = Ir$$. Substitute: $$\\varepsilon = IR + Ir$$.\n- Step 3: Factor out $$I$$: $$\\varepsilon = I(R + r)$$. This is the \"current form\" — useful for finding the circuit current when you know both resistances: $$I = \\frac{\\varepsilon}{R + r}$$.\n- Step 4: Recognise that $$V = IR$$ is the terminal p.d. (p.d. across the external load). Substitute back: $$\\varepsilon = V + Ir \\Rightarrow V = \\varepsilon - Ir$$. This is the \"terminal p.d. form\" — shows explicitly that terminal p.d. falls below e.m.f. by the lost volts $$Ir$$.\n\nEvery real circuit problem with a battery reduces to one of these two forms; choose the one that isolates your unknown.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "A student writes $$V = \\varepsilon + Ir$$ for the terminal p.d. of a cell delivering current. Identify and correct the error, and explain what would be physically absurd if this equation were true. (2 steps)", "answer": "- Step 1: The correct equation is $$V = \\varepsilon - Ir$$. The minus sign is critical: lost volts $$Ir$$ *reduce* the terminal p.d. below the e.m.f. Writing a plus sign would mean the terminal p.d. *exceeds* the e.m.f. when current flows — implying the battery somehow creates extra energy from nowhere.\n- Step 2: If $$V = \\varepsilon + Ir$$ were true, drawing more current would *increase* the terminal p.d., violating conservation of energy. The e.m.f. is the total energy per coulomb the source can provide; you cannot get more energy out than was supplied. The internal resistance always *consumes* some of that energy as heat, so the available terminal p.d. must be less than $$\\varepsilon$$, not more.\n\nThis is a classic exam trap — always subtract the lost-volts term.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "What are the \"lost volts\" in a circuit with internal resistance, and why is it wrong to say that lost volts represent energy *stored* inside the cell? (2 steps)", "answer": "- Step 1: Lost volts $$= Ir$$, the voltage drop across the internal resistance $$r$$. It is the portion of the e.m.f. that does not reach the external circuit — the \"volts lost\" inside the battery. Numerically, lost volts $$= \\varepsilon - V$$.\n- Step 2: Lost volts represent energy *dissipated as heat* inside the cell, not energy stored. The power wasted is $$P = I^2 r$$ (Joule heating). This energy is irreversibly converted to thermal energy in the battery's internal materials and cannot be recovered. Calling it \"stored\" would imply the battery can reclaim it later, which is false — it is waste heat.\n\nThe name \"lost volts\" reflects that these volts are unavailable (lost) to the external circuit, not that they are saved somewhere.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Describe the three special cases of terminal p.d.: (a) open circuit, (b) normal operation, and (c) short circuit. For each, state what $$V$$ equals and what physically happens. (3 steps)", "answer": "- Step 1: **Open circuit** ($$I = 0$$, switch open): $$V = \\varepsilon - 0 \\times r = \\varepsilon$$. No current flows, so no lost volts. A voltmeter across the terminals reads the full e.m.f. This is how you measure $$\\varepsilon$$ experimentally.\n- Step 2: **Normal operation** ($$I > 0$$, load $$R$$ connected): $$V = \\varepsilon - Ir < \\varepsilon$$. Current flows, lost volts $$Ir > 0$$, so terminal p.d. is strictly less than e.m.f. The larger the current, the lower the terminal p.d.\n- Step 3: **Short circuit** ($$R = 0$$, terminals connected by a near-zero-resistance path): $$I_{sc} = \\frac{\\varepsilon}{0 + r} = \\frac{\\varepsilon}{r}$$, and $$V = \\varepsilon - I_{sc} \\cdot r = \\varepsilon - \\varepsilon = 0$$. All the e.m.f. is dropped across $$r$$; zero voltage reaches the external circuit. All power $$\\frac{\\varepsilon^2}{r}$$ is dissipated as heat *inside* the cell — extremely dangerous if $$r$$ is small (e.g. car battery: $$I_{sc} = 12/0.01 = 1200\\,A$$).\n\nThe short-circuit case shows why low-$$r$$ batteries must never have their terminals bridged.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A car battery has $$\\varepsilon = 12\\,V$$ and $$r = 0.01\\,\\Omega$$. Without doing any complex calculation, explain why short-circuiting this battery is far more dangerous than short-circuiting a torch battery with $$\\varepsilon = 4.5\\,V$$ and $$r = 0.4\\,\\Omega$$. (2 steps)", "answer": "- Step 1: Short-circuit current is $$I_{sc} = \\varepsilon / r$$. For the car battery: $$I_{sc} \\approx 12/0.01 = 1200\\,A$$. For the torch battery: $$I_{sc} \\approx 4.5/0.4 \\approx 11\\,A$$. The car battery delivers roughly 100 times more current because its internal resistance is 40 times smaller while its e.m.f. is only about 3 times smaller.\n- Step 2: The power dissipated *inside* the cell during a short circuit is $$P = \\varepsilon^2 / r$$. For the car battery this is $$144/0.01 = 14{,}400\\,W$$ (14.4 kW!) vs. $$\\sim 20\\,W$$ for the torch battery. That enormous power heats the car battery catastrophically — risk of explosion, melting, and fire. The tiny $$r$$ is what makes it dangerous: less resistance means less restriction on current.\n\nThis is why car batteries have thick terminals and heavy-duty insulation — their low internal resistance is a feature for normal use (delivering hundreds of amps to the starter) but a hazard in a short circuit.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "The equation $$V = \\varepsilon - Ir$$ can be written as $$V = (-r)I + \\varepsilon$$. By comparing this to $$y = mx + c$$, identify what the y-intercept and gradient represent on a V–I graph, and explain why the gradient is always negative. (3 steps)", "answer": "- Step 1: Mapping to straight-line form: $$y = V$$, $$x = I$$, so the equation becomes $$y = (-r)x + \\varepsilon$$. The y-intercept ($$x = 0$$, i.e. $$I = 0$$) is $$\\varepsilon$$ — the e.m.f. This makes physical sense: at zero current, terminal p.d. equals e.m.f. (no lost volts).\n- Step 2: The gradient is $$-r$$, which is always negative because internal resistance $$r$$ is always positive. This means the line slopes *downward* from left to right: as current increases, terminal p.d. decreases.\n- Step 3: The negative gradient is a direct consequence of lost volts increasing with current. Every extra ampere of current adds another $$Ir$$ of lost volts, subtracting from $$\\varepsilon$$. The steeper the downward slope (larger $$r$$), the more terminal p.d. drops per unit increase in current — a battery with high internal resistance \"sags\" badly under load.\n\nTo find $$r$$ from the graph: take the magnitude of the gradient, $$r = |\\text{gradient}| = -\\text{gradient}$$ (since gradient is negative).", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "In a CP8 experiment, a student plots V vs. I and obtains a straight line with y-intercept $$1.60\\,V$$ and gradient $$-22.7\\,\\Omega$$. A second student says \"the internal resistance is $$-22.7\\,\\Omega$$.\" Identify and correct the error. (2 steps)", "answer": "- Step 1: The gradient of the V–I graph equals $$-r$$, not $$r$$. Since the gradient is $$-22.7\\,\\Omega$$, we have $$-r = -22.7\\,\\Omega$$, so $$r = 22.7\\,\\Omega$$. Resistance is always positive; a negative resistance is physically meaningless in this context.\n- Step 2: The student's error is confusing the gradient with the internal resistance directly. The correct relationship is $$r = -\\text{gradient}$$. You must flip the sign. The e.m.f. is correctly read from the y-intercept: $$\\varepsilon = 1.60\\,V$$.\n\nThis is one of the most common exam traps: writing $$r = \\text{gradient}$$ instead of $$r = -\\text{gradient}$$. Always remember: the line slopes *down*, so the gradient is negative, but $$r$$ is positive.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Three identical cells, each with $$\\varepsilon = 1.5\\,V$$ and $$r = 0.5\\,\\Omega$$, are connected in series (same polarity). State the total e.m.f. and total internal resistance, and explain why both quantities add. (2 steps)", "answer": "- Step 1: For cells in series (same polarity), both e.m.f.s and internal resistances add: $$\\varepsilon_{total} = \\varepsilon_1 + \\varepsilon_2 + \\varepsilon_3 = 1.5 + 1.5 + 1.5 = 4.5\\,V$$, and $$r_{total} = r_1 + r_2 + r_3 = 0.5 + 0.5 + 0.5 = 1.5\\,\\Omega$$.\n- Step 2: E.m.f.s add because each cell independently transfers energy to each coulomb passing through it; three cells in series mean each coulomb gains energy from all three, tripling the total energy per coulomb. Internal resistances add because they are in series — charge must flow through each cell's internal materials sequentially, and series resistances always sum.\n\nMore voltage but also more internal resistance: the current through a given load may not triple compared to a single cell, because $$r_{total}$$ has also increased.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Three identical cells, each with $$\\varepsilon = 1.5\\,V$$ and $$r = 0.5\\,\\Omega$$, are connected in parallel. State the total e.m.f. and total internal resistance, and explain the reasoning behind each result. (3 steps)", "answer": "- Step 1: **Total e.m.f.** $$\\varepsilon_{total} = \\varepsilon = 1.5\\,V$$. Connecting identical cells in parallel does *not* increase the voltage. Each cell provides the same energy per coulomb; with all positive terminals connected together and all negative terminals together, a charge moving through the external circuit still only passes through one cell's worth of e.m.f.\n+ Analogy: three identical water pumps in parallel don't create more pressure than one — they just deliver more flow.\n- Step 2: **Total internal resistance** $$r_{total} = r/n = 0.5/3 \\approx 0.17\\,\\Omega$$. The internal resistances are in parallel, so they share the total current. Each carries $$I/3$$, reducing the effective resistance by a factor of 3. Using the parallel formula: $$1/r_{total} = 1/r + 1/r + 1/r = 3/r$$, so $$r_{total} = r/3$$.\n- Step 3: The practical benefit: same voltage as one cell, but much less internal resistance. This means less voltage sag under load — more current can be delivered with smaller lost volts. This is exactly why car batteries use many cells in parallel (or thick plates with low effective $$r$$): the starter motor needs hundreds of amps without the terminal voltage collapsing.\n\nParallel cells: same e.m.f., reduced internal resistance, higher current capacity.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Why would you choose to connect identical cells in parallel rather than in series for a high-current application like a car starter motor, even though the total e.m.f. stays the same? (2 steps)", "answer": "- Step 1: The starter motor needs very high current (hundreds of amps) with minimal voltage drop. With $$n$$ cells in parallel, $$r_{total} = r/n$$, so the internal resistance drops dramatically. Less $$r$$ means less lost volts ($$Ir$$) at any given current, so the terminal p.d. stays closer to $$\\varepsilon$$ under heavy load.\n- Step 2: With cells in series, $$r_{total}$$ increases, which is counterproductive for high current. The short-circuit current for parallel cells is $$I_{sc} = \\varepsilon/(r/n) = n\\varepsilon/r$$, which is $$n$$ times larger than for one cell. For a car battery where $$r$$ is already tiny per cell, paralleling further reduces $$r_{total}$$ and maximises the current that can be delivered without the terminal voltage sagging below what the motor needs.\n\nParallel configuration sacrifices extra voltage for current-delivery capability — the right trade-off for starting engines.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "Maximum power is delivered to an external load $$R$$ when $$R = r$$. Explain *why* this condition maximises power, using the idea of a \"tug-of-war\" between the load and the internal resistance. (3 steps)", "answer": "- Step 1: The power delivered to the load is $$P = I^2 R = \\left(\\frac{\\varepsilon}{R+r}\\right)^2 R = \\frac{\\varepsilon^2 R}{(R+r)^2}$$. Consider two extremes: (a) if $$R \\to 0$$, then $$I \\to \\varepsilon/r$$ (large current) but all power is wasted in $$r$$ since $$P = I^2 \\cdot 0 = 0$$; (b) if $$R \\to \\infty$$, then $$I \\to 0$$ (no current) and again $$P \\to 0$$. Somewhere in between, power is maximised.\n- Step 2: At $$R = r$$, the two resistances are equal, so they split the total voltage equally: $$V_R = V_r = \\varepsilon/2$$. The current is $$I = \\varepsilon/(2r)$$. The power to the load is $$P_{max} = I^2 R = \\frac{\\varepsilon^2}{(2r)^2} \\cdot r = \\frac{\\varepsilon^2}{4r}$$.\n- Step 3: The \"tug-of-war\" insight: if $$R \\ll r$$, the internal resistance dominates and steals most of the voltage (and power). If $$R \\gg r$$, the current is too small to deliver much power despite the large resistance. The balance point — where neither resistance dominates — is $$R = r$$. At this point, exactly 50% of the power goes to the load and 50% is wasted in $$r$$.\n\nMaximum power transfer does *not* mean maximum efficiency — it means maximum *power to the load*, at the cost of 50% waste.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "At the maximum power transfer condition ($$R = r$$), only 50% of the total power reaches the load. Why do most real-world power supplies design for $$r \\ll R$$ instead, and what does this sacrifice? (2 steps)", "answer": "- Step 1: When $$r \\ll R$$, almost all the e.m.f. appears at the terminals ($$V \\approx \\varepsilon$$), and nearly all the power goes to the load. The efficiency $$\\eta = P_{load}/P_{total} = R/(R+r)$$ approaches 1 as $$r \\to 0$$. For example, the national grid uses high voltages and low source resistances to deliver energy efficiently to homes.\n- Step 2: The sacrifice is that the *absolute* power delivered to the load is below the maximum possible $$\\varepsilon^2/(4r)$$. But in most applications, efficiency (minimising waste heat) matters far more than extracting the theoretical maximum power. A power station that wastes 50% of its energy as heat in its own wiring would be economically disastrous.\n\nMaximum power transfer is most relevant in specialised applications (e.g. impedance matching in audio amplifiers and RF circuits), not in general power delivery.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "In a circuit with e.m.f. $$\\varepsilon$$ and internal resistance $$r$$, write the expression for power dissipated *inside* the cell, and explain qualitatively what happens to this wasted power as the external load $$R$$ decreases toward zero. (2 steps)", "answer": "- Step 1: The power wasted in the internal resistance is $$P_{wasted} = I^2 r = \\left(\\frac{\\varepsilon}{R+r}\\right)^2 r$$. This is the Joule heating inside the battery.\n- Step 2: As $$R$$ decreases toward zero (approaching a short circuit), the current $$I = \\varepsilon/(R+r)$$ increases toward $$\\varepsilon/r$$, and the wasted power increases toward $$P_{wasted} = (\\varepsilon/r)^2 \\times r = \\varepsilon^2/r$$. Meanwhile, the useful power to the load $$P_{load} = I^2 R$$ goes to zero because $$R \\to 0$$. All the cell's output power is being dumped as heat *inside the battery itself* — this is why short circuits cause batteries to overheat, swell, or catch fire.\n\nLow load resistance = high current = high internal heating = danger.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "In a circuit, a battery with e.m.f. $$\\varepsilon$$ and internal resistance $$r$$ is connected to a load $$R$$. Write two expressions for the power delivered to the load — one using terminal p.d. and one using current — and show they are equivalent. (2 steps)", "answer": "- Step 1: Using terminal p.d.: $$P_{load} = V \\times I$$, where $$V$$ is the terminal p.d. across $$R$$. Using current: $$P_{load} = I^2 R$$, since the same current $$I$$ flows through $$R$$ and $$V = IR$$.\n- Step 2: They are equivalent because $$P = V \\times I = (IR) \\times I = I^2 R$$. A third form exists: $$P = V^2/R$$, substituting $$I = V/R$$. However, be careful: $$P = V^2/R$$ uses the terminal p.d. $$V$$, *not* the e.m.f. $$\\varepsilon$$. Using $$\\varepsilon^2/R$$ would overestimate the power because it ignores the voltage lost across $$r$$.\n\nChoose the form that uses the known quantities in your problem: if you know $$V$$ and $$I$$, use $$P = VI$$; if you know $$I$$ and $$R$$, use $$P = I^2R$$; if you know $$V$$ and $$R$$, use $$P = V^2/R$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "In the standard circuit diagram for a cell with internal resistance, a dotted box encloses both the ideal e.m.f. source and the resistor $$r$$. What does this dotted box represent physically, and what appears across its external terminals? (2 steps)", "answer": "- Step 1: The dotted box represents the *real battery* — the combination of the ideal voltage source ($$\\varepsilon$$) and the internal resistance ($$r$$) that cannot be separated. You cannot access the ideal e.m.f. alone; you can only measure what appears at the terminals of the box.\n- Step 2: Across the external terminals of the box (and hence across the load $$R$$) appears the terminal p.d. $$V = \\varepsilon - Ir$$. This is the voltage actually available to the external circuit. The lost volts $$Ir$$ appear *inside* the box, across $$r$$, and are inaccessible externally.\n\nThe dotted box is a visual reminder: \"everything inside is part of the battery; everything outside is the external circuit.\"", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "A student measures the voltage across a battery's terminals with a switch open and reads $$1.55\\,V$$. When the switch is closed (connecting a $$10\\,\\Omega$$ resistor), the reading drops to $$1.49\\,V$$. Explain how to find the internal resistance from these two readings. (3 steps)", "answer": "- Step 1: Open circuit ($$I \\approx 0$$): the voltmeter reads the e.m.f. directly, so $$\\varepsilon = 1.55\\,V$$. No lost volts because negligible current flows through the cell's internal resistance.\n- Step 2: Closed circuit: terminal p.d. drops to $$V = 1.49\\,V$$ because current now flows. The current through the $$10\\,\\Omega$$ load is $$I = V/R = 1.49/10 = 0.149\\,A$$. The lost volts are $$\\varepsilon - V = 1.55 - 1.49 = 0.06\\,V$$.\n- Step 3: Lost volts $$= Ir$$, so $$r = (\\varepsilon - V)/I = 0.06/0.149 \\approx 0.40\\,\\Omega$$. The internal resistance is the ratio of lost volts to current — a direct measurement from just two voltage readings and one known external resistance.\n\nThis open/closed switch technique is a quick way to estimate $$r$$ without a full CP8 experiment.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "In the worked example from the lesson (June 7), the battery has $$\\varepsilon = 12.5\\,V$$, external $$R = 20.0\\,\\Omega$$, and terminal p.d. $$V = 12.0\\,V$$. Walk through finding the lost volts, current, and internal resistance, explaining how the terminal p.d. is identified in the circuit. (3 steps)", "answer": "- Step 1: **Lost volts** $$= \\varepsilon - V = 12.5 - 12.0 = 0.5\\,V$$. These 0.5 V are dropped across the internal resistance inside the battery.\n- Step 2: **Current**: The terminal p.d. $$V = 12.0\\,V$$ appears across the only external component, the $$20.0\\,\\Omega$$ resistor (Phuc's key question at 50:04 in the lesson — terminal p.d. is across the external load). By Ohm's law: $$I = V/R = 12.0/20.0 = 0.60\\,A$$.\n- Step 3: **Internal resistance**: Lost volts $$= Ir$$, so $$r = Ir/I = 0.5/0.60 \\approx 0.83\\,\\Omega$$. Sense-check: $$V = \\varepsilon - Ir = 12.5 - (0.60)(0.83) = 12.5 - 0.50 = 12.0\\,V$$. ✓\n\nKey lesson point: terminal p.d. is the p.d. across the *external* components. If there is only one external resistor, terminal p.d. is across that resistor.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "A common confusion is swapping the symbols $$R$$ and $$r$$ in the equation $$\\varepsilon = I(R + r)$$. What does each symbol represent, and what goes wrong if you swap them? (2 steps)", "answer": "- Step 1: Capital $$R$$ = external (load) resistance, the resistor(s) outside the battery box. Lower-case $$r$$ = internal resistance, inside the battery box. In $$\\varepsilon = I(R + r)$$, the total resistance in the circuit is $$R + r$$, and the e.m.f. drives current through *both*.\n- Step 2: If you swap them, you would calculate $$V = IR$$ using the wrong resistance — assigning the internal resistance's value to the external load and vice versa. This gives incorrect terminal p.d., current, and power values. In the June 7 lesson (53:33), Phuc asked \"is large R the R of the battery?\" — the answer is no; large $$R$$ is always the external load, small $$r$$ is always inside the battery.\n\nMnemonic: **R** = **R**elays/external (the load the battery powers); **r** = **r**esiding inside (the battery's own resistance).", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "In Core Practical 8, what is the independent variable, what are the dependent variables, and what must be controlled? Explain why the e.m.f. and internal resistance must remain constant. (2 steps)", "answer": "- Step 1: **Independent variable**: load resistance $$R$$ (varied using a rheostat/variable resistor). **Dependent variables**: terminal p.d. $$V$$ (measured by voltmeter across battery terminals) and current $$I$$ (measured by ammeter in series). **Control variables**: the cell itself — its e.m.f. $$\\varepsilon$$ and internal resistance $$r$$ must stay constant throughout the experiment.\n- Step 2: If $$\\varepsilon$$ or $$r$$ change during data collection, the V–I graph would not be a single straight line — it would show scatter or curvature because the underlying model ($$V = \\varepsilon - Ir$$ with constant $$\\varepsilon$$ and $$r$$) would be violated. This is why the switch must be opened between readings (to prevent heating that changes $$r$$) and why a fresh cell should be used (run-down cells have variable $$r$$).\n\nThe experiment assumes $$\\varepsilon$$ and $$r$$ are fixed properties of the cell; any drift creates systematic error.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "In CP8, why must the switch be opened between readings, and why should you start with the variable resistor at its maximum value? What happens if you ignore these precautions? (3 steps)", "answer": "- Step 1: **Open the switch between readings**: prolonged current flow heats the cell, which changes its internal resistance (and potentially its e.m.f.). If $$r$$ changes during the experiment, the V–I data no longer fits a single straight line — systematic error. Opening the switch allows the cell to cool, keeping $$r$$ approximately constant.\n- Step 2: **Start at maximum $$R$$**: this minimises the initial current, preventing a sudden large current from overheating the cell or damaging components. If you started at minimum $$R$$, the maximum current would flow immediately, potentially overheating the cell before any readings are taken — contaminating all subsequent data with a changed $$r$$.\n- Step 3: If you ignore these precautions, the cell heats up progressively, $$r$$ increases (resistance of metals increases with temperature), and the V–I graph curves instead of forming a straight line. The y-intercept (e.m.f.) would still be approximately correct, but the gradient (and hence the calculated $$r$$) would be unreliable.\n\nThese precautions ensure the model $$V = \\varepsilon - Ir$$ (constant $$\\varepsilon$$, $$r$$) remains valid throughout data collection.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "In CP8, why should you draw the largest possible triangle when finding the gradient of the V–I graph, and what are the main sources of random and systematic error in this experiment? (3 steps)", "answer": "- Step 1: **Largest triangle**: the percentage uncertainty in the gradient depends on $$\\Delta V / V$$ and $$\\Delta I / I$$. By taking the largest possible range of values on the best-fit line, the absolute uncertainties in reading the graph stay the same, but they become a smaller *fraction* of the larger $$\\Delta V$$ and $$\\Delta I$$, reducing the percentage uncertainty in $$r$$.\n- Step 2: **Random errors**: fluctuating meter readings (especially at low values); variable contact resistance in crocodile clips; difficulty reading meters precisely. Reduced by taking repeat readings and averaging, and waiting for readings to stabilise.\n- Step 3: **Systematic errors**: the ammeter has a small but non-zero resistance (adding to the total circuit resistance); the voltmeter draws a tiny current (so the ammeter reads slightly more current than passes through the load). These shift all data points systematically, giving slightly wrong values of $$\\varepsilon$$ and $$r$$. Using meters with the highest possible quality (digital, high resolution) minimises these effects.\n\nThe largest-triangle technique is a general graph skill: always use the full span of the best-fit line, not just two adjacent data points.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "A student performing CP8 plots V on the y-axis and I on the x-axis. The best-fit line has y-intercept $$5.0\\,V$$ and gradient $$-14.3\\,\\Omega$$. Determine the e.m.f. and internal resistance, showing how the gradient calculation works. (2 steps)", "answer": "- Step 1: The y-intercept represents $$\\varepsilon$$ (the terminal p.d. when $$I = 0$$). So $$\\varepsilon = 5.0\\,V$$.\n- Step 2: The gradient equals $$-r$$. So $$-r = -14.3\\,\\Omega$$, giving $$r = 14.3\\,\\Omega$$. To calculate the gradient from the graph: pick two points far apart on the line (largest triangle), e.g. $$(I_1, V_1) = (0, 5.0)$$ and $$(I_2, V_2) = (0.35, 0)$$. Then gradient $$= \\Delta V / \\Delta I = (0 - 5.0)/(0.35 - 0) = -5.0/0.35 = -14.3\\,\\Omega$$. So $$r = -(-14.3) = 14.3\\,\\Omega$$.\n\nRemember: gradient is negative, but $$r$$ is positive. Always report $$r$$ as a positive value.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "In the CP8 circuit, the ammeter is placed in series and the voltmeter is placed across the battery terminals. Explain why the voltmeter must have very high resistance, and what error is introduced if it does not. (2 steps)", "answer": "- Step 1: The voltmeter is in parallel with the battery (and the external circuit). If it has finite resistance, it draws a small current $$i$$, so the ammeter reads $$I_{ammeter} = I_{load} + i$$ — slightly more than the true load current. This is a systematic error: every current reading is slightly too high.\n- Step 2: A high-resistance voltmeter (e.g. $$10\\,M\\Omega$$) draws negligible current ($$i = V/R_V \\approx \\mu A$$), making $$I_{ammeter} \\approx I_{load}$$ to within the meter's resolution. The systematic error becomes insignificant compared to random uncertainties.\n\nIdeal voltmeters have infinite resistance; real digital voltmeters are close enough for this experiment.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A student says \"the e.m.f. is just the voltage of the battery.\" Explain why this informal statement is incomplete and could lose marks, and give the exam-board-approved definition. (2 steps)", "answer": "- Step 1: \"Voltage of the battery\" is ambiguous — it could mean the terminal p.d. (which is less than e.m.f. when current flows) or the e.m.f. itself. The two are equal only in open circuit. Using \"voltage\" without qualification fails to distinguish energy *supplied* (e.m.f.) from energy *available* (terminal p.d.).\n- Step 2: The exam-board definition: \"E.m.f. is the amount of energy converted from chemical (or other) to electrical energy per unit charge passing through the source.\" This specifies the *direction* of energy conversion (into the charges) and the location (through the source). Units: volts ($$= J\\,C^{-1}$$).\n\nAlways use the precise wording: \"energy per unit charge transferred *from* chemical *to* electrical *by the source*.\"", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "A student writes $$R = I/V$$ for resistance. Identify the error and state the correct rearrangement of $$V = IR$$. Explain the \"Very Itchy Rash\" mnemonic and how it helps. (2 steps)", "answer": "- Step 1: From $$V = IR$$, rearranging gives $$R = V/I$$ (not $$I/V$$). The error is inverting the fraction. Writing $$R = I/V$$ would give units of $$A/V = S$$ (siemens, conductance), not ohms. The correct unit is $$\\Omega = V/A$$.\n- Step 2: The \"Very Itchy Rash\" mnemonic (from tutor Alex): **V** = **I** × **R**. To find any one quantity, cover it with your finger: cover **V** → see **I** × **R**; cover **I** → see **V**/R; cover **R** → see **V**/I. This avoids the common trap of writing $$R = IV$$ or $$I = RV$$.\n\nThis was Phuc's recurring trap (noted globally in the study material). Always double-check: resistance divides voltage by current, not multiplies them.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "Two resistors of $$6.0\\,\\Omega$$ and $$3.0\\,\\Omega$$ are connected in parallel, then connected to a battery with $$\\varepsilon = 12.0\\,V$$ and $$r = 1.0\\,\\Omega$$. Explain conceptually why the terminal p.d. will be less than $$12.0\\,V$$, and walk through the calculation of terminal p.d. (3 steps)", "answer": "- Step 1: The parallel combination has resistance less than either individual resistor: $$1/R_p = 1/6 + 1/3 = 1/6 + 2/6 = 3/6 = 1/2$$, so $$R_p = 2.0\\,\\Omega$$. This is a fairly low load resistance, meaning substantial current will flow.\n- Step 2: The total circuit resistance is $$R_p + r = 2.0 + 1.0 = 3.0\\,\\Omega$$. The current is $$I = \\varepsilon/(R_p + r) = 12.0/3.0 = 4.0\\,A$$. This is a significant current, so lost volts will be substantial: $$Ir = 4.0 \\times 1.0 = 4.0\\,V$$.\n- Step 3: Terminal p.d. $$V = \\varepsilon - Ir = 12.0 - 4.0 = 8.0\\,V$$. The terminal p.d. is only $$8.0\\,V$$ — a third of the e.m.f. is lost inside the battery. This happens because the parallel load draws heavy current, and the internal resistance (equal to half the load resistance) claims a large share of the voltage.\n\nKey insight: low external resistance → high current → large lost volts → low terminal p.d.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "Why does the terminal p.d. of a battery decrease as more current is drawn? Use the equation $$V = \\varepsilon - Ir$$ in your explanation, and describe a real-world example. (2 steps)", "answer": "- Step 1: $$V = \\varepsilon - Ir$$. The e.m.f. $$\\varepsilon$$ is a fixed property of the cell (determined by its chemistry). As more current $$I$$ is drawn (by decreasing the external load $$R$$), the product $$Ir$$ increases. Since $$\\varepsilon$$ is constant, subtracting a larger $$Ir$$ gives a smaller $$V$$. Terminal p.d. *must* fall.\n- Step 2: Real-world example: a car battery ($$\\varepsilon = 12\\,V$$, $$r = 0.01\\,\\Omega$$). With headlights only ($$\\sim 5\\,A$$), lost volts $$= 5 \\times 0.01 = 0.05\\,V$$ — barely noticeable. When the starter motor engages ($$\\sim 200\\,A$$), lost volts $$= 200 \\times 0.01 = 2\\,V$$, and the terminal p.d. drops to $$10\\,V$$ — the headlights visibly dim.\n\nThe relationship is linear: every extra ampere of current costs $$r$$ additional volts of terminal p.d.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "In the lesson, Phuc noticed that previously the class used $$V$$ for the battery voltage but now uses $$\\varepsilon$$. Explain *why* the symbol changes when internal resistance is introduced, and what the shift in notation represents physically. (2 steps)", "answer": "- Step 1: When internal resistance was \"negligible\" (ignored), $$V$$ (terminal p.d.) equalled the e.m.f., so there was no need for a separate symbol. The battery was treated as an ideal voltage source where all its energy reaches the external circuit.\n- Step 2: Once internal resistance is acknowledged, $$V$$ and $$\\varepsilon$$ diverge: $$\\varepsilon$$ is the total energy per coulomb the source *attempts* to provide, while $$V$$ is the energy per coulomb that *actually reaches* the external circuit. The symbol $$\\varepsilon$$ (epsilon) specifically denotes e.m.f. — the energy *input* to the charges — distinguishing it from the terminal p.d. $$V$$ that is *output* to the circuit.\n\nPhuc's insight at 48:07 was correct: \"the reason we didn't have EMF before was that the energy wasn't lost. Now we take into account the case that we lost some energy due to internal resistance.\"", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "A battery with $$\\varepsilon = 9.0\\,V$$ and $$r = 1.0\\,\\Omega$$ produces a terminal p.d. of $$7.5\\,V$$ under load. Without heavy calculation, find the current and load resistance, explaining which equation forms are most direct for each. (3 steps)", "answer": "- Step 1: **Current** — use the most direct form. Lost volts $$= \\varepsilon - V = 9.0 - 7.5 = 1.5\\,V$$. Since lost volts $$= Ir$$, $$I = (\\varepsilon - V)/r = 1.5/1.0 = 1.5\\,A$$. Alternatively, rearrange $$V = \\varepsilon - Ir$$ to $$I = (\\varepsilon - V)/r$$.\n- Step 2: **Load resistance** — now that you know $$I$$ and $$V$$, use Ohm's law on the external component: $$R = V/I = 7.5/1.5 = 5.0\\,\\Omega$$. This is the most direct route.\n- Step 3: You could also use $$\\varepsilon = I(R + r)$$ to find $$R$$: $$9.0 = 1.5(R + 1.0)$$, so $$R + 1.0 = 6.0$$, $$R = 5.0\\,\\Omega$$. Same answer, but involves more steps. Always identify which unknown you need and choose the equation that isolates it with fewest rearrangements.\n\nEfficiency tip: for current, use $$I = \\varepsilon/(R+r)$$ if $$R$$ is known, or $$I = (\\varepsilon - V)/r$$ if $$V$$ is known. For terminal p.d., use $$V = \\varepsilon - Ir$$. For $$r$$, use $$r = (\\varepsilon - V)/I$$.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "Explain why an E.H.T. (Extra High Tension) power supply in a school laboratory is designed with a very large internal resistance ($$\\sim 50\\,M\\Omega$$), unlike a car battery which has very low internal resistance. (2 steps)", "answer": "- Step 1: The E.H.T. supply produces high voltage (thousands of volts) for experiments. If a person accidentally touched the terminals, the current through their body would be limited by the internal resistance: $$I = \\varepsilon / (R_{body} + r)$$. With $$r = 50\\,M\\Omega$$ and $$R_{body} \\approx 10\\,k\\Omega$$, the current is $$I \\approx \\varepsilon / r \\approx \\text{kV} / 50\\,M\\Omega \\approx \\text{tens of }\\mu A$$ — enough for a nasty shock but unlikely to be fatal.\n- Step 2: This is a deliberate safety design: the large internal resistance acts as a built-in current limiter. Even under a short circuit, $$I_{sc} = \\varepsilon / r$$ remains tiny. In contrast, the car battery's tiny $$r$$ means $$I_{sc}$$ is enormous — dangerous in a short circuit but essential for delivering hundreds of amps to the starter motor.\n\nInternal resistance can be a *feature* (safety) or a *drawback* (voltage sag), depending on the application.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "A battery is connected to a variable resistor. As the resistance of the load is increased from near zero to very large, describe what happens to (a) the current, (b) the terminal p.d., and (c) the power delivered to the load. Explain the trend in each case. (3 steps)", "answer": "- Step 1: **Current** decreases. $$I = \\varepsilon/(R + r)$$: as $$R$$ increases, the denominator grows, so $$I$$ falls. At $$R = 0$$, $$I = \\varepsilon/r$$ (maximum). At $$R \\to \\infty$$, $$I \\to 0$$.\n- Step 2: **Terminal p.d.** increases. $$V = \\varepsilon - Ir$$: as $$I$$ falls, the lost volts $$Ir$$ decrease, so $$V$$ rises toward $$\\varepsilon$$. At $$R = 0$$, $$V = 0$$. At $$R \\to \\infty$$, $$V \\to \\varepsilon$$. More of the e.m.f. reaches the external circuit when less current is drawn.\n- Step 3: **Power to load** first increases then decreases, peaking at $$R = r$$. At $$R \\to 0$$: $$P \\to 0$$ (no voltage across load). At $$R \\to \\infty$$: $$P \\to 0$$ (no current). At $$R = r$$: $$P = \\varepsilon^2/(4r)$$, the maximum. This non-monotonic behaviour is the maximum power transfer result.\n\nCurrent monotonically decreases; terminal p.d. monotonically increases; power peaks in the middle at $$R = r$$.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "In the solar cell experiment (textbook Ch 11.3), the V–I graph curves at higher currents rather than remaining a straight line. Explain what this curvature means about the cell's internal resistance. (2 steps)", "answer": "- Step 1: The V–I graph for a cell with *constant* internal resistance would be a perfect straight line ($$V = \\varepsilon - Ir$$). If the graph curves (deviates from a straight line at higher currents), the internal resistance is *not constant* — it changes with current.\n- Step 2: In the solar cell data, the line curves more steeply downward at higher currents, meaning the effective internal resistance *increases* at large currents. This is typical: at high currents, heating and charge-carrier saturation effects inside the cell make it harder for current to flow, effectively increasing $$r$$. The straight-line model only applies for low-current (linear) regions of the graph.\n\nFor CP8 with ordinary cells, the line is approximately straight because currents are kept moderate. But always check: if your graph curves, $$r$$ is not constant, and the simple model breaks down.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": true}, {"question": "A student performing CP8 forgets to open the switch between readings and takes all measurements quickly with continuous current flow. What specific error is introduced, and how would the V–I graph look different from the ideal? (2 steps)", "answer": "- Step 1: Continuous current flow heats the cell. As the cell warms up, its internal resistance increases (the chemical reactions slow and the electrolyte's resistivity rises). This means $$r$$ is not constant throughout the experiment — it drifts upward as more readings are taken.\n- Step 2: The V–I graph would show data points that progressively fall *below* a single straight line at higher currents (because increasing $$r$$ causes more lost volts than expected). The line would curve downward at the high-current end. If you still drew a straight best-fit line, the gradient would give an *average* $$r$$ that doesn't represent the cell at any single temperature — a systematic error in both $$\\varepsilon$$ and $$r$$.\n\nThis is why the method specifies: close switch, record readings, open switch, adjust $$R$$, rep
