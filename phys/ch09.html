between e.m.f. (ε) and potential difference (V) across a component, in terms of energy direction? (3 steps)", "answer": "- Step 1: Both have the same algebraic form $$\\varepsilon = W/Q$$ and $$V = W/Q$$, with units $$\\text{J C}^{-1} = \\text{V}$$. Numerically they look identical, but the *direction* of energy transfer is what distinguishes them.\n- Step 2: E.m.f. describes energy being *given to* the charges:\n+ Chemical (or mechanical) energy is converted *into* electrical energy by the source.\n+ Charges *gain* energy as they pass through the e.m.f. source.\n- Step 3: P.d. describes energy being *lost by* the charges:\n+ Electrical energy is converted *out* into heat, light, or mechanical energy in the component.\n+ Charges *lose* energy as they pass through the component.\n\nTakeaway: same formula, opposite energy flow — e.m.f. is the source's gift, p.d. is the component's bill.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why is \"electromotive force\" a misleading name, and what is it actually?", "answer": "Despite the name, e.m.f. is **not a force** at all — it has no units of newtons, and it doesn't push charges in any mechanical sense. It's an energy-per-charge quantity, measured in volts (joules per coulomb). The word \"force\" is a historical artefact from early electricity research when scientists thought of it as something that \"drove\" charges around. A more accurate modern description is: the energy transferred per unit charge from some other form (chemical, mechanical, light) into electrical form by the source. Always state this in exam answers — examiners penalise \"the voltage of the battery\" or \"force from the cell\".", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "Why does every real power supply have internal resistance, physically? (3 steps)", "answer": "- Step 1: A cell is not an idealised energy source — it is a physical object made of real materials (electrodes, electrolyte, contacts, terminals).\n- Step 2: When charges flow through the cell to be \"energised,\" they must physically traverse these materials:\n+ The electrolyte has finite conductivity (ions move sluggishly).\n+ Electrodes have resistance.\n+ Contact resistance exists at every internal junction.\n- Step 3: Together these create an unavoidable resistance *inside* the cell, modelled as a resistor $$r$$ in series with the ideal e.m.f. source. As current flows through $$r$$, energy is dissipated as heat — which is why batteries warm up during use.\n\nTakeaway: internal resistance is not a design flaw — it's a consequence of building the cell out of real matter.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "Starting from energy conservation, derive the equation $$\\varepsilon = I(R + r)$$ for a cell driving a load. (3 steps)", "answer": "- Step 1: Consider one coulomb of charge making a full loop. The cell supplies energy $$\\varepsilon$$ joules to it (by definition of e.m.f.).\n- Step 2: As that coulomb traverses the loop, energy is dissipated in two places:\n+ External load $$R$$: energy lost per coulomb $$= V_R = IR$$.\n+ Internal resistance $$r$$: energy lost per coulomb $$= V_r = Ir$$.\n- Step 3: By energy conservation (Kirchhoff's voltage law), the energy given equals the total energy dissipated: $$\\varepsilon = IR + Ir = I(R + r)$$.\n\nTakeaway: the equation is just \"energy in = energy out\" applied to one coulomb on a round trip.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "What is the \"lost volts\" in a circuit, and why is it called \"lost\"?", "answer": "The \"lost volts\" is $$V_r = Ir$$ — the voltage drop across the internal resistance of the cell. It's called \"lost\" because this energy is dissipated as heat *inside* the cell and is therefore not available to the external circuit; from the perspective of whatever you're trying to power (a lamp, a motor), that fraction of the e.m.f. is permanently lost to internal heating. It's not \"stored\" anywhere — it's wasted. The bigger the current, the bigger the lost volts, and the less useful voltage remains.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "Why does the terminal p.d. of a battery decrease as more current is drawn from it? (3 steps)", "answer": "- Step 1: Start from $$V = \\varepsilon - Ir$$. The e.m.f. $$\\varepsilon$$ is fixed by the chemistry of the cell, and the internal resistance $$r$$ is roughly constant.\n- Step 2: When current $$I$$ increases (because external resistance was reduced), the lost-volts term $$Ir$$ grows.\n- Step 3: Since $$\\varepsilon$$ is fixed and $$Ir$$ has grown, the terminal p.d. $$V$$ must shrink to keep the energy books balanced.\n\nTakeaway: more current → more energy wasted internally → less left for the external circuit. This is why headlights dim when you crank the starter motor.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "What does a voltmeter connected across a cell read when the switch is open (no current flowing), and why?", "answer": "The voltmeter reads the e.m.f. ε directly. The reasoning: with the switch open, essentially no current flows (a good voltmeter has very high resistance, so $$I \\approx 0$$). The lost volts $$Ir = 0 \\cdot r = 0$$. From $$V = \\varepsilon - Ir$$, we get $$V = \\varepsilon$$. This is the only situation where terminal p.d. equals e.m.f. — it's the cleanest way to measure $$\\varepsilon$$ in practice.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "A car battery has e.m.f. 12 V and internal resistance 0.01 Ω. The starter motor draws 200 A. Estimate the terminal p.d. during cranking — and explain the headlight dimming. (3 steps)", "answer": "- Step 1: Compute lost volts: $$V_r = Ir = 200 \\times 0.01 = 2 \\text{ V}$$.\n- Step 2: Terminal p.d.: $$V = \\varepsilon - Ir = 12 - 2 = 10 \\text{ V}$$.\n- Step 3: The headlights are wired across the battery terminals, so they see only 10 V instead of 12 V during cranking. Their power $$P = V^2/R$$ drops by roughly $$(10/12)^2 \\approx 70\\%$$, producing visibly dimmer light. Once the engine starts and the starter disengages, current drops and terminal p.d. returns to ≈12 V.\n\nTakeaway: even tiny $$r$$ matters when $$I$$ is huge.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Why must a car battery be designed with extremely low internal resistance (≈0.01 Ω), and what is the consequence for short-circuit current?", "answer": "- Step 1: A starter motor demands hundreds of amps. If $$r$$ were large, the lost volts $$Ir$$ would consume most of the e.m.f. and the motor would never receive enough power to turn the engine.\n- Step 2: Low $$r$$ means high deliverable current with minimal voltage drop.\n- Step 3: The danger: short-circuit current is $$I_{sc} = \\varepsilon/r$$. For a car battery, $$I_{sc} \\approx 12/0.01 = 1200 \\text{ A}$$ — enough to weld a spanner instantly, melt cables, or cause a battery explosion. This is why you must never directly short a car battery.\n\nTakeaway: low $$r$$ is a feature (high power delivery) and a hazard (catastrophic short-circuit current).", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "In contrast to a car battery, why does a laboratory E.H.T. supply have a *very large* built-in internal resistance (≈50 MΩ)?", "answer": "Safety. An E.H.T. supply provides thousands of volts. If a person accidentally touches both terminals, the current that flows is limited by $$I = \\varepsilon/(R_{body} + r)$$. With $$r = 50 \\text{ M}\\Omega$$, even at $$\\varepsilon = 5000 \\text{ V}$$, the current is at most $$5000/50{\\times}10^6 = 0.1 \\text{ mA}$$ — still a nasty shock but not lethal. Without that large internal resistance, the same supply could push lethal currents through a human body. So internal resistance is deliberately engineered to be huge here, sacrificing power delivery for safety.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "What happens to terminal p.d. in the limit of a short circuit (R → 0), and where does all the energy go? (3 steps)", "answer": "- Step 1: As $$R \\to 0$$, the circuit current rises to its maximum: $$I_{sc} = \\varepsilon/r$$.\n- Step 2: Substituting into $$V = \\varepsilon - Ir$$: $$V = \\varepsilon - (\\varepsilon/r)r = 0$$. Terminal p.d. collapses to zero.\n- Step 3: All energy released by the cell ($$\\varepsilon I_{sc}$$) is now dissipated *inside* the cell across $$r$$, since the external load takes none. The cell rapidly heats up — this is the failure mode behind battery fires.\n\nTakeaway: short circuit = 100% internal dissipation = thermal runaway risk.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Rearrange $$V = \\varepsilon - Ir$$ into the form $$y = mx + c$$ and identify what gradient and intercept of a V-vs-I plot represent. (3 steps)", "answer": "- Step 1: Compare $$V = -rI + \\varepsilon$$ with $$y = mx + c$$.\n- Step 2: Match terms:\n+ $$y = V$$ (terminal p.d., vertical axis)\n+ $$x = I$$ (current, horizontal axis)\n+ $$m = -r$$ (gradient is negative of internal resistance)\n+ $$c = \\varepsilon$$ (y-intercept is the e.m.f.)\n- Step 3: So a V–I graph for a real cell is a straight line sloping *downward*, hitting the V-axis at $$\\varepsilon$$. Internal resistance is read as $$r = -\\text{gradient}$$ — quote it as a positive number.\n\nTakeaway: the graph encodes both quantities at once — intercept gives ε, slope gives −r.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "A student plots V against I in CP8 and reports the internal resistance as \"−14.3 Ω because that's the gradient.\" What's wrong, and what's the correct statement?", "answer": "Internal resistance is a physical resistance — it cannot be negative. The gradient of the V–I graph is $$-r$$, *not* $$r$$ itself. The correct interpretation: the magnitude of the gradient gives $$r$$. So if gradient = −14.3 Ω/A, then $$r = 14.3 \\text{ Ω}$$. The negative sign tells you the line slopes downward (as expected — more current means more lost volts means less terminal p.d.), not that resistance is negative.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "A cell has e.m.f. 1.5 V and the V–I line extrapolates to hit the I-axis at some point. What does that I-axis intercept represent physically?", "answer": "- Step 1: The I-axis intercept is where $$V = 0$$ — the terminal p.d. has collapsed to zero.\n- Step 2: From $$0 = \\varepsilon - Ir$$, solving gives $$I = \\varepsilon/r$$.\n- Step 3: This is the short-circuit current — the theoretical maximum current the cell could deliver if the external resistance were zero. It's a useful diagnostic: a steep line (large r) reaches V=0 at small current; a shallow line (small r) extends to very large currents before V=0.\n\nTakeaway: V-intercept = ε; I-intercept = $$\\varepsilon/r$$ = short-circuit current.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Two identical cells, each with e.m.f. ε and internal resistance r, are connected in series. What are the total e.m.f. and total internal resistance, and why?", "answer": "- Step 1: In series, each coulomb passes through *both* cells in sequence. Each cell gives it ε joules, so total energy per coulomb = $$2\\varepsilon$$.\n- Step 2: The two internal resistances are in series (current passes through both), so resistances add: $$r_{tot} = 2r$$.\n- Step 3: General rule for n identical cells in series: $$\\varepsilon_{tot} = n\\varepsilon$$, $$r_{tot} = nr$$. You gain voltage but also accumulate internal resistance proportionally.\n\nTakeaway: series = more push, more drag.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Three identical 1.5 V cells (each with internal resistance 0.6 Ω) are connected in parallel. What are the total e.m.f. and effective internal resistance, and what's the practical advantage? (3 steps)", "answer": "- Step 1: All three cells are at the same potential (1.5 V), so connecting them in parallel does *not* increase e.m.f. — $$\\varepsilon_{tot} = 1.5 \\text{ V}$$ (not 4.5 V).\n- Step 2: The three internal resistances are now in parallel: $$r_{tot} = r/n = 0.6/3 = 0.2 \\text{ Ω}$$.\n- Step 3: Practical advantage: the cell array can deliver three times the current for the same voltage drop, because lost volts $$Ir$$ are reduced. Used in high-current applications (car starter batteries internally are many cells in parallel).\n\nTakeaway: parallel identical cells = same voltage, lower r, higher current capacity.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Why does putting identical cells in parallel *not* increase the e.m.f., contrary to a common misconception?", "answer": "E.m.f. is energy *per coulomb*, not total energy. A coulomb passing through one cell gets ε joules; if the cell is paralleled with another identical cell, the coulomb still only passes through *one* cell (it takes one path), so it still gets only ε joules. The two cells share the workload of supplying current, but each individual coulomb sees the same energy boost. To double the voltage per coulomb you'd need series (where each coulomb visits both cells in turn).", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "A student wonders: \"If two cells in parallel give the same voltage, why bother?\" Give the deep reason. (3 steps)", "answer": "- Step 1: Recall that the terminal p.d. delivered to a load is $$V = \\varepsilon - Ir_{tot}$$. The \"weakness\" of a cell under load is governed by $$r_{tot}$$, not just $$\\varepsilon$$.\n- Step 2: Parallel halves (or thirds) the internal resistance, so for the same current $$I$$, the lost volts $$Ir_{tot}$$ are dramatically smaller.\n- Step 3: Practically: a single 1.5 V cell trying to drive 1 A through a 0.5 Ω internal resistance loses 0.5 V (33% of e.m.f.). Three such cells in parallel have $$r_{tot} = 0.17 \\text{ Ω}$$ — same current loses only 0.17 V (11%). The load sees a \"stiffer\" voltage source.\n\nTakeaway: parallel cells = stiffer supply, more current with less voltage sag.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "At what condition does a cell deliver maximum power to an external load, and what's the surprising efficiency result? (3 steps)", "answer": "- Step 1: Power to load is $$P = I^2R = [\\varepsilon/(R+r)]^2 R$$. Differentiate w.r.t. $$R$$ and set to zero: maximum occurs when $$R = r$$.\n- Step 2: At this matching condition: current $$I = \\varepsilon/(2r)$$, and $$P_{max} = \\varepsilon^2/(4r)$$.\n- Step 3: The efficiency surprise: at maximum power transfer, *half* of the e.m.f. is dropped across $$r$$ and half across $$R$$. So only 50% of the total power generated by the cell reaches the load — the other 50% is wasted as heat inside the cell. For real-world high-efficiency designs (mains supplies, power grids), engineers deliberately make $$r \\ll R$$, sacrificing peak power for efficiency.\n\nTakeaway: maximum power ≠ maximum efficiency. Match for power; mismatch (low r) for efficiency.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "In the equation $$\\varepsilon = I(R+r)$$, what's the difference between capital R and lower-case r, and why does this matter for exam answers? (3 steps)", "answer": "- Step 1: Capital $$R$$ = *external* load resistance (the lamp, resistor, motor — whatever's outside the battery).\n- Step 2: Lower-case $$r$$ = *internal* resistance (inside the dotted battery box, an inherent property of the cell).\n- Step 3: Why it matters:\n+ Terminal p.d. = $$IR$$ (the useful voltage across the external load).\n+ Lost volts = $$Ir$$ (wasted inside the cell).\n+ Mixing them up swaps \"useful\" and \"wasted\" energy — and gets the wrong answer for almost every quantity.\n\nTakeaway: big R = outside (good), little r = inside (bad).", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "In CP8, why must the switch be opened between current readings rather than left closed throughout the experiment? (3 steps)", "answer": "- Step 1: When current flows, power $$I^2r$$ is dissipated inside the cell as heat. This heats up the electrolyte.\n- Step 2: Heating changes both the internal resistance (it drifts as the cell warms) and slightly the e.m.f. (chemistry shifts with temperature).\n- Step 3: If the switch stays closed, by the end of the experiment $$r$$ and $$\\varepsilon$$ are no longer what they were at the start — introducing a systematic drift that distorts the V–I line away from straight, ruining the gradient and intercept analysis. Opening between readings keeps the cell cool and the parameters stable.\n\nTakeaway: open switch = thermal stability = trustworthy graph.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "Why should you start CP8 with the variable resistor set to its maximum value rather than minimum? (3 steps)", "answer": "- Step 1: At minimum external $$R$$, the circuit current $$I = \\varepsilon/(R+r)$$ is at its largest.\n- Step 2: Large currents:\n+ Heat the cell rapidly (changing $$r$$ — systematic error).\n+ May exceed ammeter range.\n+ Risk damaging components if current spikes.\n- Step 3: Starting at maximum $$R$$ ensures small initial current, gentle warm-up, and lets you sweep *down* through values safely. You also get the most \"open-circuit-like\" point early on, anchoring the high-V end of the graph.\n\nTakeaway: high R first = safe, cool, controlled.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "When determining gradient from a V–I graph in CP8, why must you draw the *largest possible* triangle rather than a small one?", "answer": "Percentage uncertainty in the gradient is dominated by reading errors in $$\\Delta V$$ and $$\\Delta I$$. If the triangle is small (say $$\\Delta V = 0.1 \\text{ V}$$ and the reading error is 0.05 V), that's a 50% uncertainty in the rise. With a large triangle ($$\\Delta V = 1.0 \\text{ V}$$, same 0.05 V error), it's only 5%. Since $$r$$ is calculated from the gradient, halving the triangle size doubles the uncertainty in $$r$$. The line of best fit also smooths random fluctuations only when you span a wide range — small triangles can be dominated by noise on a single point.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "A student in CP8 obtains a V–I graph with y-intercept 1.60 V and gradient −22.7 Ω. State the e.m.f. and internal resistance of the cell.", "answer": "From the rearrangement $$V = -rI + \\varepsilon$$: y-intercept = $$\\varepsilon$$, so $$\\varepsilon = 1.60 \\text{ V}$$. The gradient = $$-r$$, so $$r = -(\\text{gradient}) = -(-22.7) = 22.7 \\text{ Ω}$$. Note that the internal resistance is large here (consistent with a small cell), so even modest currents will produce significant lost volts — this cell is \"weak\" under load.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "Conceptually, what does the y-intercept of the V–I graph correspond to, and why is it found by *extrapolation* rather than direct measurement? (3 steps)", "answer": "- Step 1: The y-intercept is the value of $$V$$ when $$I = 0$$ — i.e. the terminal p.d. with no current flowing, which by definition equals the e.m.f.\n- Step 2: But in CP8 you can't actually measure at $$I = 0$$ directly through the circuit (no current means no ammeter reading to plot), and reaching $$I = 0$$ requires infinite external resistance.\n- Step 3: So you measure a range of (I, V) points with finite currents, fit a straight line, and *extrapolate* back to where the line crosses the V-axis. This crossing tells you what V would be in the limit $$I \\to 0$$, which is $$\\varepsilon$$.\n\nTakeaway: ε is read from the graph's reach into a region you can't physically visit.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "A cell has ε = 4.5 V, r = 0.4 Ω, connected to a 6.4 Ω lamp. Without computing exact wattages, compare conceptually the relative power dissipated in the lamp vs the cell. (3 steps)", "answer": "- Step 1: Both $$R$$ and $$r$$ carry the same current $$I$$ (series circuit). So $$P_R/P_r = I^2R/I^2r = R/r$$.\n- Step 2: Here $$R/r = 6.4/0.4 = 16$$, so the lamp dissipates roughly 16 times more power than the cell.\n- Step 3: Interpretation: about $$16/17 \\approx 94\\%$$ of the cell's power reaches the lamp; $$\\approx 6\\%$$ is wasted inside the cell. The lamp design ($$R \\gg r$$) is efficient.\n\nTakeaway: efficiency ratio = R/(R+r); the bigger R is relative to r, the more goes to useful work.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "A voltmeter reads 1.55 V with switch open and 1.49 V with switch closed (closing connects a 10 Ω load). Walk through the reasoning to find internal resistance, without doing precise arithmetic. (3 steps)", "answer": "- Step 1: Switch open → no current → no lost volts → reading = ε. So $$\\varepsilon = 1.55 \\text{ V}$$.\n- Step 2: Switch closed → current $$I$$ flows through the 10 Ω load. The terminal p.d. (which is also across the 10 Ω resistor) is 1.49 V, so $$I = V/R = 1.49/10 \\approx 0.15 \\text{ A}$$.\n- Step 3: Lost volts = $$\\varepsilon - V = 1.55 - 1.49 = 0.06 \\text{ V}$$. Then $$r = (\\text{lost volts})/I = 0.06/0.15 \\approx 0.4 \\text{ Ω}$$.\n\nTakeaway: open-then-close gives a clean two-point measurement; the voltage *drop* between the two readings is the lost volts at that current.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Why must a voltmeter used to measure terminal p.d. (or e.m.f. in the open-circuit method) have very high resistance? (3 steps)", "answer": "- Step 1: A voltmeter is itself part of the circuit; whatever current flows through it comes out of the cell.\n- Step 2: If the voltmeter has modest resistance, even with the \"switch open,\" significant current flows through it, producing real lost volts $$Ir$$.\n- Step 3: The voltmeter would then read $$\\varepsilon - Ir$$ rather than $$\\varepsilon$$ — and you'd systematically underestimate the e.m.f. A high-resistance voltmeter (≈ 10 MΩ for digital meters) draws negligibly little current ($$\\sim$$ μA), so $$Ir \\approx 0$$ and the reading is essentially ε.\n\nTakeaway: only an ideal (infinite-R) voltmeter would read ε exactly; high-R ones approximate the ideal.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "In a circuit with a cell (ε = 12 V, r = 1 Ω) connected to a parallel combination of 6 Ω and 3 Ω, work through finding terminal p.d. conceptually. (4 steps)", "answer": "- Step 1: Combine the parallel resistors: $$1/R_p = 1/6 + 1/3 = 1/2$$, so $$R_p = 2 \\text{ Ω}$$. The external load is now 2 Ω.\n- Step 2: Apply $$I = \\varepsilon/(R_p + r) = 12/(2+1) = 4 \\text{ A}$$.\n- Step 3: Lost volts $$Ir = 4 \\times 1 = 4 \\text{ V}$$.\n- Step 4: Terminal p.d. $$V = \\varepsilon - Ir = 12 - 4 = 8 \\text{ V}$$. Sense-check: this is the p.d. across the parallel combination, and indeed $$IR_p = 4 \\times 2 = 8 \\text{ V}$$. ✓\n\nTakeaway: even with complex external networks, the cell sees only their total equivalent resistance.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Why is the lost-volts term subtracted (V = ε − Ir) rather than added in the terminal-p.d. equation? Conceptually, what would adding imply?", "answer": "Energy can only be given to the charges *once*, at the source. From the perspective of the external circuit, the cell starts with ε joules per coulomb to offer; the internal resistance siphons off $$Ir$$ joules per coulomb *before* they leave the cell. So what arrives at the external terminals is $$\\varepsilon - Ir$$ — what's left after the internal toll. Writing $$V = \\varepsilon + Ir$$ would mean the internal resistance somehow *adds* energy to the charges, which would violate conservation (you can't get energy out of a passive resistor). This is one of the most common exam slip-ups.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "Two cells in series (each ε = 1.5 V, r = 0.5 Ω) drive a 4 Ω load. Without precise arithmetic, predict whether the current is closer to 0.3 A, 0.6 A, or 1.0 A — and why. (3 steps)", "answer": "- Step 1: Total e.m.f. in series: $$\\varepsilon_{tot} = 1.5 + 1.5 = 3.0 \\text{ V}$$. Total internal resistance: $$r_{tot} = 0.5 + 0.5 = 1.0 \\text{ Ω}$$.\n- Step 2: Total circuit resistance: $$R + r_{tot} = 4 + 1 = 5 \\text{ Ω}$$.\n- Step 3: $$I = \\varepsilon_{tot}/(R + r_{tot}) = 3/5 = 0.6 \\text{ A}$$. The current is 0.6 A.\n\nTakeaway: in series, both ε and r scale up — they partly cancel in the current calculation, but voltage delivered per cell stays similar to the single-cell case.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Why does a resistor *not* \"store electrons\" — and what does it actually do?", "answer": "A resistor opposes the flow of charge by causing collisions between conducting electrons and the lattice ions of the resistor material. Each collision transfers kinetic energy from the electron to the lattice, raising the lattice's thermal vibrations (i.e. heating it up). The electrons don't accumulate or get \"stored\" — the same number of electrons flow in and out per second (charge is conserved at every cross-section). What's lost is *energy*, dissipated as heat. So a resistor is an energy converter (electrical → thermal), not a storage device. (Capacitors store charge; resistors dissipate energy.)", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "A common student mistake is to use $$R = IV$$ instead of $$R = V/I$$. Why is this wrong, dimensionally and conceptually? (3 steps)", "answer": "- Step 1: Ohm's law is $$V = IR$$. Rearranging for $$R$$: divide both sides by $$I$$, giving $$R = V/I$$.\n- Step 2: Dimensionally, $$IV$$ has units of $$\\text{A} \\times \\text{V} = \\text{W}$$ (watts) — that's power, not resistance. So $$R = IV$$ would mean \"resistance equals power,\" which is nonsense.\n- Step 3: Conceptually: resistance measures *how much voltage is needed per unit current* — a steeper voltage requirement per amp means more resistance. So you divide V by I, not multiply.\n\nMnemonic (\"Very Itchy Rash\"): cover the quantity you want — covering R in V=IR leaves V/I.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Why is the equation $$P = I^2R$$ usually more convenient than $$P = V^2/R$$ when calculating power wasted in internal resistance r?", "answer": "In a series circuit, the *current* I is the same through R and r, but the *voltages* across them are different ($$IR$$ vs $$Ir$$). If you know I, you immediately get $$P_r = I^2r$$ in one step. Using $$P = V^2/R$$ would require first computing $$V_r = Ir$$, then squaring it and dividing by r — two extra steps that risk arithmetic errors. So when current is the common variable (series circuit), $$I^2R$$ is the natural form. ($$V^2/R$$ becomes more natural when voltage is the common variable — e.g., parallel components across a fixed terminal p.d.)", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Sketch (in words) how the V–I graph would look for (a) an ideal cell with zero internal resistance and (b) a real cell with finite r. What's the visual difference? (3 steps)", "answer": "- Step 1: Ideal cell ($$r = 0$$): $$V = \\varepsilon$$ regardless of $$I$$. Graph is a horizontal line at $$V = \\varepsilon$$ — terminal p.d. never drops.\n- Step 2: Real cell (finite r): $$V = \\varepsilon - Ir$$ slopes downward with gradient $$-r$$. Steeper slope = bigger r.\n- Step 3: Visual rule of thumb: a \"flat\" V–I line means a stiff supply (low r, good for delivering current without voltage sag); a \"steep\" line means a weak supply (high r, terminal voltage collapses quickly as load increases).\n\nTakeaway: slope steepness = how much the cell \"struggles\" under load.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "A solar cell shows a V–I graph that is initially straight at low currents but curves at higher currents. What does the curvature physically indicate? (3 steps)", "answer": "- Step 1: A straight V–I line means constant internal resistance — the simple model $$V = \\varepsilon - Ir$$ holds.\n- Step 2: Curvature (the line bending more steeply) at high currents means $$r$$ is *not* constant — the effective internal resistance grows as current increases.\n- Step 3: Physical cause in a solar cell: at high current draw, charge carriers are being extracted faster than light can regenerate them; the cell's chemistry/physics deviates from the simple linear model, with non-ohmic semiconductor effects taking over. For low-current operation, the linear approximation still gives a sensible $$r$$ from the straight part of the graph.\n\nTakeaway: r is only truly constant in the linear regime; real sources can be non-ohmic under stress.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Why is it important in CP8 to wait for voltmeter and ammeter readings to stabilise before recording, even if the switch was just closed?", "answer": "Several time-dependent effects occur right after closing the switch: (i) capacitive effects in the wires/components cause brief transient currents; (ii) the cell's chemistry has a small \"settling time\" as ions redistribute near the electrodes; (iii) needle-based meters have mechanical inertia and oscillate before settling. Recording too early captures a transient value, not the steady-state V and I that the simple model $$V = \\varepsilon - Ir$$ predicts. Waiting ensures the system is in equilibrium and the data point genuinely lies on the V–I characteristic.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Two cells of e.m.f. 1.5 V are connected — one in normal orientation, one reversed (back-to-front). What is the net e.m.f. of the combination, and why? (3 steps)", "answer": "- Step 1: In series, e.m.f.s add *as vectors* — they obey signs depending on orientation.\n- Step 2: A cell wired in reverse pushes charges the opposite way; its contribution to the loop's energy budget is $$-\\varepsilon$$ instead of $$+\\varepsilon$$.\n- Step 3: Net e.m.f. = $$1.5 - 1.5 = 0 \\text{ V}$$. No current flows (assuming identical cells). However, internal resistances still add: $$r_{tot} = 2r$$. This is sometimes used to \"fight\" two cells against each other in null-balance circuits.\n\nTakeaway: e.m.f.s in series add algebraically with sign; same direction → sum; opposite → difference.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Edge case: what is the terminal p.d. of a cell on \"open circuit\" (no external connection at all), and why does this differ from the \"switch open\" case in CP8?", "answer": "On true open circuit (terminals dangling, nothing connected), $$I = 0$$ exactly, so $$V = \\varepsilon$$ across the terminals — but you can't *measure* it without connecting something. In CP8 with \"switch open\" you do have a voltmeter still connected; technically a tiny current flows through it, but because the voltmeter has very high resistance (≈ 10 MΩ vs r ≈ 0.4 Ω), this current is utterly negligible ($$\\sim$$ μA) and the lost volts are sub-microvolt. So \"switch open with high-R voltmeter\" is operationally indistinguishable from true open circuit for practical purposes.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "Why does a \"dead\" or run-down battery often have unusually high internal resistance, and what's the consequence for CP8 measurements?", "answer": "- Step 1: As a cell discharges, chemical changes accumulate: reaction products coat the electrodes, electrolyte concentration shifts, gas bubbles form. All these processes increase the difficulty of ion transport inside the cell — effectively raising $$r$$.\n- Step 2: Worse, run-down cells often have $$r$$ that *varies* during use as the chemistry continues to evolve, breaking the assumption of constant r underlying CP8's straight-line graph.\n- Step 3: Consequence: the V–I plot may curve or scatter erratically, gradient analysis becomes unreliable, and both $$\\varepsilon$$ and $$r$$ drift between readings. This is why CP8 must use a *fresh* cell.\n\nTakeaway: a fresh cell has stable, reproducible internal parameters — essential for a meaningful linear fit.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "A circuit has ε = 12.5 V, external resistor R = 20 Ω, and terminal p.d. = 12.0 V. Without precise calculation, estimate which is bigger: r or R, and by roughly how much? (3 steps)", "answer": "- Step 1: Lost volts = $$12.5 - 12.0 = 0.5 \\text{ V}$$, which is about 4% of the e.m.f. Useful voltage = 12.0 V across R.\n- Step 2: Both R and r carry the same current. The ratio of voltage drops gives the ratio of resistances: $$r/R = V_r/V_R = 0.5/12 \\approx 1/24$$.\n- Step 3: So $$r \\approx R/24 \\approx 0.83 \\text{ Ω}$$ — internal resistance is roughly 24 times smaller than the external load.\n\nTakeaway: small lost-volts fraction means small r relative to R — and you can read the ratio directly from the voltage split.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Why is it physically reasonable that increasing current causes lost volts to increase linearly (rather than, say, quadratically)? (3 steps)", "answer": "- Step 1: Internal resistance obeys Ohm's law (at constant temperature and for ohmic materials): $$V_r = Ir$$, linear in I.\n- Step 2: Linearity reflects the underlying physics: each charge carrier loses an amount of energy proportional to the resistance it traverses; doubling the number of charges per second (current) doubles the total energy lost per second, but the voltage drop *per coulomb* stays the same multiple of r.\n- Step 3: Power dissipated, however, *is* quadratic: $$P = I^2r$$. So doubling current quadruples internal heating — which is why high-current draw heats cells dramatically (and changes r through temperature effects).\n\nTakeaway: lost volts linear in I (Ohm); lost power quadratic in I (Joule heating).", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "An exam question states \"a battery of negligible internal resistance.\" What practical assumption does this allow, and how does it simplify the circuit analysis?", "answer": "\"Negligible internal resistance\" means treating $$r \\approx 0$$. Consequences: (i) lost volts $$Ir \\approx 0$$ regardless of current; (ii) terminal p.d. = e.m.f. always, so you can treat $$V = \\varepsilon$$ as a fixed source voltage; (iii) the equation $$\\varepsilon = I(R+r)$$ simplifies to $$\\varepsilon = IR$$ — just Ohm's law for the external circuit. This is the \"ideal battery\" approximation: useful when r is small compared to all external resistances (e.g., a 12 V battery with $$r = 0.01 \\text{ Ω}$$ driving a 100 Ω circuit). When the problem gives r, you must include it.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "A student claims \"if we use a thicker wire to connect the cell to the load, we reduce the internal resistance of the cell.\" Why is this wrong? (3 steps)", "answer": "- Step 1: Internal resistance is *inside* the cell — it comes from the electrolyte, electrodes, and internal contacts. It is fixed by the cell's construction, not by anything external.\n- Step 2: Thicker external wires reduce the *external* circuit's resistance (specifically the wires' contribution to R). They cannot reach inside the cell to alter $$r$$.\n- Step 3: What thicker wires *do* achieve: lower total resistance $$R + r$$, so larger current, larger lost volts $$Ir$$, and *lower* terminal p.d. — paradoxically, \"better wires\" can make the load see less voltage if r is non-negligible.\n\nTakeaway: r is an intrinsic property of the cell; only changing the cell itself (or its temperature) changes r.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Connecting four 1.5 V cells in series with the *same* polarity vs alternating polarity: what's the e.m.f. and total r in each case, with four cells each having r = 0.5 Ω? (3 steps)", "answer": "- Step 1: All same polarity: e.m.f.s add positively. $$\\varepsilon_{tot} = 4 \\times 1.5 = 6.0 \\text{ V}$$, $$r_{tot} = 4 \\times 0.5 = 2.0 \\text{ Ω}$$.\n- Step 2: Alternating polarity (++−−): two cells push forward, two push back. $$\\varepsilon_{tot} = 1.5 + 1.5 - 1.5 - 1.5 = 0 \\text{ V}$$. But internal resistances *always* add regardless of orientation (resistance is non-directional): $$r_{tot} = 2.0 \\text{ Ω}$$.\n- Step 3: Practical consequence: alternating gives no useful voltage but still has the same internal resistance, so all the e.m.f. of any one cell would be \"wasted\" fighting the other. Always check cell orientation when wiring.\n\nTakeaway: e.m.f. is directional (has sign); resistance is scalar (always adds).", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Conceptually, why is it that two formulations $$P = IV$$ and $$P = I^2R$$ give the same answer for a resistor, but the *interpretation* differs?", "answer": "Both equal the power dissipated in the resistor. $$P = IV$$ comes from the energy definition: rate of charge flow times energy per charge = energy per second. $$P = I^2R$$ comes from substituting Ohm's law $$V = IR$$ into $$P = IV$$. Interpretation difference: $$P = IV$$ is universal (works for any component, including non-ohmic ones like LEDs and motors); $$P = I^2R$$ specifically uses Ohm's law and only works for ohmic resistors. For internal resistance (ohmic), both apply — but if you were calculating power delivered to a motor (non-ohmic), only $$P = IV$$ is safe.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "A cell is driving a single load resistor R. The student varies R upward (increases R). Without precise calculation, predict the qualitative effect on (a) circuit current, (b) lost volts, (c) terminal p.d., (d) power dissipated in R. (4 steps)", "answer": "- Step 1: Current $$I = \\varepsilon/(R+r)$$. Larger R → larger denominator → *current decreases*.\n- Step 2: Lost volts $$V_r = Ir$$. Smaller I → *lost volts decrease*.\n- Step 3: Terminal p.d. $$V = \\varepsilon - Ir$$. Lost volts smaller → *V increases* (approaches ε as R → ∞).\n- Step 4: Power in R = $$I^2R$$. Two competing effects — I shrinks, R grows. Result depends on regime:\n+ If $$R \\ll r$$: increasing R increases power (numerator wins).\n+ If $$R = r$$: maximum power point.\n+ If $$R \\gg r$$: increasing R decreases power (denominator wins, $$I^2R \\approx \\varepsilon^2/R$$).\n\nTakeaway: V monotonically approaches ε; I monotonically decreases; P has a peak at R = r.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Why is energy dissipated in internal resistance \"wasted\" but energy dissipated in a heater resistor is \"useful\"? Both are just $$I^2R$$ heating.", "answer": "Physically, both convert electrical energy to thermal energy via $$I^2R$$ — they're the same process. The labels \"wasted\" and \"useful\" depend entirely on the *purpose* of the circuit. If you're trying to power a heater, the thermal energy in the heater resistor is what you want (useful). The thermal energy in the cell's internal resistor isn't what you wanted — you wanted that energy delivered to the heater, but some leaked away inside the cell first (wasted). Same physics, different intent: \"waste\" is human, not physical. A useful insight: a battery deliberately designed as a heat source would treat its internal r as the \"useful\" element.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "Sanity check: a cell with ε = 1.5 V is connected to a 2.2 Ω external resistor and the ammeter reads 0.60 A. The student is asked to find r. Walk through conceptually. (3 steps)", "answer": "- Step 1: Terminal p.d. across the 2.2 Ω resistor: $$V = IR = 0.60 \\times 2.2 = 1.32 \\text{ V}$$.\n- Step 2: Lost volts = $$\\varepsilon - V = 1.5 - 1.32 = 0.18 \\text{ V}$$.\n- Step 3: Internal resistance: $$r = V_r/I = 0.18/0.60 = 0.3 \\text{ Ω}$$. Sanity check: $$R + r = 2.5 \\text{ Ω}$$; $$\\varepsilon/(R+r) = 1.5/2.5 = 0.60 \\text{ A}$$. ✓\n\nTakeaway: the workflow is always (i) find V across external; (ii) lost volts = ε − V; (iii) r = (lost volts)/I.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "Why does the textbook describe the cell as \"an ideal e.m.f. source in series with a resistor r\"? Is the resistor *physically* a separate component?", "answer": "No — internally there's no actual discrete resistor inside the cell. The \"ideal e.m.f. + series resistor\" is a *circuit model* that captures the cell's behaviour with two clean components: a perfect energy source and a perfect resistor. The real cell's lumped behaviour (energy supply + irreducible energy loss) is mathematically equivalent to this idealised pair. The dotted box in circuit diagrams reminds you the two are inseparable — they're two abstractions of one physical cell. This modelling trick lets us apply Kirchhoff's laws to the cell as if it were two distinct elements, even though physically it's a single chemical system.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}], "count": 50}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Define e.m.f. ($$\\varepsilon$$) of a power source in terms of energy and charge, and state its SI unit.", "answer": "E.m.f. is the energy transferred (converted) from chemical — or other non-electrical form — to electrical energy **per unit charge** passing through the source. Symbolically, $$\\varepsilon = \\dfrac{W}{Q}$$, where $$W$$ is the energy supplied to the charges and $$Q$$ is the charge that has flowed. The SI unit is the volt (V), which is equivalent to a joule per coulomb ($$\\mathrm{J\\,C^{-1}}$$). Despite its historical name \"electromotive force,\" e.m.f. is **not a force** — it is an energy transfer per charge. The exam-board phrasing to memorise: *\"the energy converted from chemical (or other) to electrical per unit charge passing through the source.\"*", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Define potential difference (p.d.) across a circuit component and contrast it conceptually with e.m.f. (2 steps)", "answer": "- Step 1: P.d. is the electrical energy converted to **other forms** (heat, light, mechanical) per unit charge passing **through the component**: $$V = W/Q$$. So p.d. describes charges *losing* energy as they pass through something like a resistor or lamp.\n- Step 2: E.m.f. has the same algebraic form $$\\varepsilon = W/Q$$ but the energy flow is **reversed**: the source *gives* energy to the charges. Same units (V), opposite direction of energy transfer.\n\nMental model: a battery is an \"energy pump\" (e.m.f.), while a resistor is an \"energy drain\" (p.d.).", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Why does a real cell get warm during use, and what physical feature does this reveal? (3 steps)", "answer": "- Step 1: A real cell isn't a perfect e.m.f. source — charges must flow through the electrolyte, electrodes, and internal contacts, all of which physically resist the flow.\n- Step 2: This internal resistance $$r$$ is in series with the ideal e.m.f. inside the cell. When current $$I$$ flows, energy is dissipated inside the cell at a rate $$P_r = I^2 r$$.\n- Step 3: That dissipated energy emerges as **heat inside the cell** — the warming you feel is direct evidence of internal resistance.\n\nThe \"lost volts\" $$Ir$$ are not lost to the universe — they are lost to the *external* circuit and become heat inside the battery.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Starting from energy conservation around a loop containing a cell ($$\\varepsilon$$, $$r$$) and an external resistor $$R$$, derive the equation $$\\varepsilon = I(R+r)$$. (3 steps)", "answer": "- Step 1: In one second, the cell delivers energy at rate $$\\varepsilon I$$ (e.m.f. × current = power supplied to charges).\n- Step 2: That energy is dissipated in two places — the external load at rate $$I^2 R$$, and the internal resistance at rate $$I^2 r$$. Energy conservation: $$\\varepsilon I = I^2 R + I^2 r$$.\n- Step 3: Divide both sides by $$I$$: $$\\varepsilon = IR + Ir = I(R+r)$$.\n\nThis is just Kirchhoff's voltage law for the loop: e.m.f. = sum of $$IR$$ drops around the loop, including the drop inside the cell.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What does the equation $$V = \\varepsilon - Ir$$ tell you physically about how terminal p.d. behaves? (3 steps)", "answer": "- Step 1: $$\\varepsilon$$ is fixed by the chemistry of the cell — it does not change as you load the cell.\n- Step 2: The \"lost volts\" term $$Ir$$ grows linearly with current. The more current you draw, the more energy per coulomb is dissipated inside the cell.\n- Step 3: Since $$\\varepsilon$$ is fixed and $$Ir$$ grows, the terminal p.d. $$V$$ (energy per coulomb that survives to the external circuit) must shrink. So **drawing more current → lower terminal voltage**.\n\nThis is why a torch dims when you add more bulbs in parallel, and why a car's headlights flicker when you crank the starter.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "What is meant by \"lost volts,\" and where does this energy go? Why is the word \"lost\" slightly misleading?", "answer": "\"Lost volts\" $$V_r = Ir$$ is the voltage drop across the internal resistance of the cell — the energy per coulomb that does **not** make it to the external circuit. The energy isn't destroyed: it becomes heat inside the cell (which is why the cell warms up). The word \"lost\" only means lost *to the external circuit* — from the user's perspective, it's wasted because it can't power the load. Equivalently, $$V_r = \\varepsilon - V$$, the gap between what the cell could deliver in principle and what actually reaches the load.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Under what condition does a voltmeter across a cell read exactly the e.m.f., and why? (3 steps)", "answer": "- Step 1: A high-resistance voltmeter draws essentially zero current. If it's the only thing connected to the cell (open switch elsewhere), then $$I \\approx 0$$ throughout the cell.\n- Step 2: With $$I = 0$$, the lost-volts term $$Ir = 0$$, so there's no voltage drop across the internal resistance.\n- Step 3: From $$V = \\varepsilon - Ir$$, we get $$V = \\varepsilon$$ — the voltmeter reads the e.m.f. directly.\n\nKey insight: e.m.f. is only directly measurable in open-circuit conditions. The moment current flows, you measure something less.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "A cell with $$\\varepsilon = 1.5\\,\\mathrm{V}$$ and $$r = 0.5\\,\\Omega$$ is short-circuited (load $$R = 0$$). What happens qualitatively to the current and terminal p.d., and why is short-circuiting a low-$$r$$ battery dangerous? (3 steps)", "answer": "- Step 1: With $$R = 0$$, the current is $$I_{sc} = \\varepsilon/r = 1.5/0.5 = 3\\,\\mathrm{A}$$. All the e.m.f. drops inside the cell.\n- Step 2: Terminal p.d. $$V = \\varepsilon - Ir = 1.5 - 3(0.5) = 0\\,\\mathrm{V}$$. Every joule per coulomb is dissipated internally.\n- Step 3: For a car battery with $$r \\approx 0.01\\,\\Omega$$ and $$\\varepsilon = 12\\,\\mathrm{V}$$, $$I_{sc} = 1200\\,\\mathrm{A}$$. That enormous current dumps $$I^2 r$$ heat into the battery — explosion, melted terminals, fire. Low $$r$$ is great for delivering power but terrifying when shorted.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "Two identical cells (each $$\\varepsilon$$, $$r$$) are connected in series. What are the total e.m.f. and total internal resistance, and why? (2 steps)", "answer": "- Step 1: In series, the same charge passes through both cells. Each cell adds its own energy per coulomb, so the total energy per coulomb is doubled: $$\\varepsilon_{\\text{tot}} = 2\\varepsilon$$.\n- Step 2: The internal resistors are also in series with each other, so they add: $$r_{\\text{tot}} = 2r$$.\n\nTrade-off: you get more voltage, but also more internal resistance — so the cell network heats up more per amp delivered.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Two **identical** cells in parallel: what are $$\\varepsilon_{\\text{tot}}$$ and $$r_{\\text{tot}}$$, and why don't you get double the voltage? (3 steps)", "answer": "- Step 1: Each cell tries to push charges to the same potential. Putting identical cells side by side doesn't change the potential difference between the terminals — it just provides more \"parallel paths\" for charge to flow.\n- Step 2: So $$\\varepsilon_{\\text{tot}} = \\varepsilon$$ — same as one cell. (You'd only get double voltage by stacking them in series, not by paralleling.)\n- Step 3: The internal resistances are in parallel: for $$n$$ identical cells, $$r_{\\text{tot}} = r/n$$. So the network can deliver more current for the same terminal p.d. — useful for high-current applications like a car starter.\n\nCommon exam trap: \"two cells in parallel → 3 V\" is wrong; it's still 1.5 V but with half the internal resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "In the CP8 V–I graph, why does the gradient equal $$-r$$ and the y-intercept equal $$\\varepsilon$$? (3 steps)", "answer": "- Step 1: Start from $$V = \\varepsilon - Ir$$ and rearrange into straight-line form $$y = mx + c$$: take $$y = V$$, $$x = I$$, slope $$m = -r$$, intercept $$c = \\varepsilon$$.\n- Step 2: When $$I = 0$$ (extrapolated to the y-axis), $$V = \\varepsilon$$. The y-intercept literally represents the open-circuit terminal voltage = the e.m.f.\n- Step 3: The slope is $$\\Delta V/\\Delta I = -r$$ — every extra amp drawn costs an extra $$r$$ volts of terminal p.d. The slope is **negative** because more current means less terminal voltage. So $$r = -\\text{gradient}$$ (and you quote $$r$$ as a positive number).", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "In CP8 a student finds the gradient of the V–I graph is $$-22.7$$ and the y-intercept is $$1.60\\,\\mathrm{V}$$. State $$\\varepsilon$$ and $$r$$, and explain why $$r$$ is not reported as $$-22.7\\,\\Omega$$.", "answer": "$$\\varepsilon = 1.60\\,\\mathrm{V}$$ (the y-intercept directly). For the internal resistance, $$r = -\\text{gradient} = -(-22.7) = 22.7\\,\\Omega$$. Resistance is an intrinsic property of a material — it's always a non-negative quantity. The minus sign in the gradient simply reflects the physical fact that *terminal p.d. decreases as current increases*; it is not telling you that resistance is negative. Always strip the sign when reporting $$r$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Why must the switch in the CP8 circuit be opened between readings, and what error does leaving it closed introduce? (3 steps)", "answer": "- Step 1: When current flows, power $$I^2 r$$ is dissipated inside the cell, raising its temperature.\n- Step 2: Both $$\\varepsilon$$ and $$r$$ drift with temperature and with depletion of the cell's chemistry. If you leave the switch closed, the cell ages noticeably during the experiment.\n- Step 3: This is a **systematic error**: the y-intercept and gradient you measure no longer correspond to a single fixed cell, biasing both $$\\varepsilon$$ and $$r$$ in unpredictable directions.\n\nBest practice: close switch only briefly, read both meters, immediately open. Also: start with maximum $$R$$ so the *initial* current is small.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "Why is the rheostat in CP8 set to its **maximum** resistance at the start of the experiment?", "answer": "Starting at maximum resistance minimises the initial current drawn from the cell. This serves three purposes: (1) it limits initial heating from $$I^2 r$$, protecting both the cell and the components from temperature drift that would change $$\\varepsilon$$ and $$r$$ mid-experiment; (2) it protects the ammeter from accidentally overloading; (3) it gives one data point at low $$I$$ (high $$V$$), which anchors the upper end of the V–I straight line — important because the y-intercept is found by *extrapolating* to $$I = 0$$, so a data point near that end greatly reduces extrapolation uncertainty.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "A voltmeter reads 1.55 V with the switch open and 1.49 V with the switch closed (load = 10 Ω). Conceptually, walk through how to extract $$r$$. (4 steps)", "answer": "- Step 1: Open switch → no current → no lost volts → voltmeter reads $$\\varepsilon = 1.55\\,\\mathrm{V}$$.\n- Step 2: Closed switch → terminal p.d. is now $$V = 1.49\\,\\mathrm{V}$$, which sits across the 10 Ω load. Current is $$I = V/R = 1.49/10 \\approx 0.15\\,\\mathrm{A}$$.\n- Step 3: The drop $$\\varepsilon - V = 0.06\\,\\mathrm{V}$$ is the lost volts $$Ir$$.\n- Step 4: So $$r = (\\varepsilon - V)/I \\approx 0.06/0.15 \\approx 0.4\\,\\Omega$$.\n\nConceptual takeaway: open-circuit reading gives $$\\varepsilon$$, closed-circuit drop tells you how much $$Ir$$ ate into it.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Why is a low internal resistance ($$r \\approx 0.01\\,\\Omega$$) essential for a car battery? (3 steps)", "answer": "- Step 1: A starter motor draws an enormous initial current (~200 A) to overcome the engine's stationary inertia.\n- Step 2: With $$\\varepsilon = 12\\,\\mathrm{V}$$ and $$r = 0.01\\,\\Omega$$, the lost volts during cranking are $$Ir = 200 \\times 0.01 = 2\\,\\mathrm{V}$$ — terminal p.d. dips to 10 V. If $$r$$ were even 0.1 Ω, lost volts would be 20 V, exceeding the e.m.f. — the motor simply couldn't draw 200 A.\n- Step 3: Low $$r$$ also means most of the battery's power reaches the motor instead of being wasted as internal heat. The trade-off: low-$$r$$ batteries are extremely dangerous if shorted.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "When you start a car, why do the headlights momentarily dim? (3 steps)", "answer": "- Step 1: Before cranking, only the headlights draw current (a few amps). Terminal p.d. is close to $$\\varepsilon \\approx 12\\,\\mathrm{V}$$, headlights are at full brightness.\n- Step 2: When the starter engages, the current shoots up to ~200 A. Lost volts $$Ir$$ jumps from negligible to ~2 V.\n- Step 3: Terminal p.d. drops from ~12 V to ~10 V. The headlights, now seeing a lower voltage, dim because the power they receive is $$P = V^2/R$$ — and a ~17% voltage drop is roughly a 30% power drop.\n\nThis is *direct visual evidence* of internal resistance in action.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "At what value of external load $$R$$ is the power delivered to the load maximised, and why is this *not* the most efficient operating condition? (3 steps)", "answer": "- Step 1: Power to the load is $$P = I^2 R = \\left(\\dfrac{\\varepsilon}{R+r}\\right)^2 R$$. Differentiating w.r.t. $$R$$ and setting to zero gives the maximum power transfer condition: $$R = r$$.\n- Step 2: At this condition, the current is $$I = \\varepsilon/(2r)$$, and the load p.d. is exactly $$\\varepsilon/2$$. So half the e.m.f. drops across the load, half drops internally — only **50% efficient**.\n- Step 3: For real-world devices (e.g., domestic mains, power supplies), engineers want $$r \\ll R$$ so that almost all the energy reaches the load — efficiency $$\\gg 50\\%$$, even if absolute power is not maximised.\n\nSo \"max power\" ≠ \"max efficiency.\" Audio amplifiers care about the first; power grids care about the second.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "A torch battery has $$\\varepsilon = 4.5\\,\\mathrm{V}$$, $$r = 0.4\\,\\Omega$$, connected to a lamp of resistance 6.4 Ω. Without doing exact arithmetic, estimate how the power splits between the lamp and the internal resistance. (3 steps)", "answer": "- Step 1: Power ratio of any two series resistors carrying the same current is simply $$P_R / P_r = R/r$$ (since $$P = I^2 R$$ and $$I$$ cancels).\n- Step 2: Here $$R/r = 6.4/0.4 = 16$$. So the lamp gets about 16× more power than the internal resistance wastes.\n- Step 3: As a fraction of total power, lamp gets $$16/17 \\approx 94\\%$$, cell wastes $$1/17 \\approx 6\\%$$. Efficient because $$r \\ll R$$.\n\nMental rule: the ratio $$R:r$$ *is* the efficiency ratio. The larger $$R/r$$, the more efficient.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Why does the V–I graph for a real cell in CP8 sometimes curve away from a straight line at high currents, and what does this reveal? (2 steps)", "answer": "- Step 1: The model $$V = \\varepsilon - Ir$$ assumes $$r$$ is constant. In reality, $$r$$ depends on temperature; at high $$I$$, the cell heats up rapidly ($$P_r = I^2 r$$), and $$r$$ itself changes.\n- Step 2: $$\\varepsilon$$ can also drift slightly with chemistry depletion at high currents. So the line begins to curve at high $$I$$ — usually downward, since heating typically increases $$r$$ further, exaggerating the voltage drop.\n\nThis is why you keep currents modest in CP8 and take readings quickly: to stay in the \"constant $$r$$\" regime.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "Why is it physically wrong to say \"lost volts is energy stored in the battery\"? (2 steps)", "answer": "- Step 1: The \"lost volts\" $$Ir$$ is a voltage drop across the internal resistance. The associated power $$P = I \\cdot Ir = I^2 r$$ is **dissipated as heat** through resistive (Joule) heating inside the cell.\n- Step 2: Stored energy in a battery is *chemical* energy in the electrolyte/electrodes. Lost volts represents energy *leaving* that store and being wasted as heat — the opposite of storage.\n\nQuick test: a battery sitting on a shelf has stored energy but zero lost volts (no current). Lost volts only exist when current flows.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "Why can't you measure $$\\varepsilon$$ accurately by simply connecting a voltmeter across a battery that's powering a circuit? (3 steps)", "answer": "- Step 1: When the circuit is closed, current flows through the cell. The voltmeter measures the **terminal p.d.** $$V$$ across the external terminals.\n- Step 2: This terminal p.d. is $$V = \\varepsilon - Ir$$, which is always less than $$\\varepsilon$$ when $$I > 0$$.\n- Step 3: To measure $$\\varepsilon$$ directly, you need $$I = 0$$: open the external circuit and let only a very high-resistance voltmeter sit across the terminals. Then no current flows, no lost volts, and the voltmeter reads $$\\varepsilon$$ itself.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Walk through which formula to choose for each task: (a) finding circuit current, (b) finding terminal p.d., (c) finding internal resistance, given $$\\varepsilon$$, $$V$$, $$I$$, $$R$$. (3 steps)", "answer": "- Step 1: For **current**, use $$I = \\varepsilon/(R+r)$$ — directly gives current from the known total loop resistance.\n- Step 2: For **terminal p.d.**, use $$V = \\varepsilon - Ir$$ (or equivalently $$V = IR$$ if the external load is a single resistor).\n- Step 3: For **internal resistance**, use $$r = (\\varepsilon - V)/I$$ — derived by rearranging $$\\varepsilon = V + Ir$$.\n\nMental shortcut: pick the form where every variable on the RHS is known, so you don't have to do a roundabout substitution.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "A battery with $$\\varepsilon = 12\\,\\mathrm{V}$$, $$r = 1\\,\\Omega$$ is connected to a parallel combination of 6 Ω and 3 Ω. Without doing exact arithmetic, conceptually walk through finding the terminal p.d. (4 steps)", "answer": "- Step 1: First, replace the parallel pair by a single equivalent resistance. Parallel: $$1/R_p = 1/6 + 1/3 = 1/2$$, so $$R_p = 2\\,\\Omega$$. This is now an effective external load.\n- Step 2: Total loop resistance is $$R_p + r = 2 + 1 = 3\\,\\Omega$$.\n- Step 3: Circuit current is $$I = \\varepsilon/(R_p + r) = 12/3 = 4\\,\\mathrm{A}$$.\n- Step 4: Terminal p.d. is across the external network: $$V = IR_p = 4 \\times 2 = 8\\,\\mathrm{V}$$. Or equivalently $$V = \\varepsilon - Ir = 12 - 4 = 8\\,\\mathrm{V}$$.\n\nKey idea: collapse the external network to a single equivalent resistor first, *then* apply the EMF equation.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "What is the difference between $$R$$ (capital) and $$r$$ (lowercase) in the equation $$\\varepsilon = I(R + r)$$, and why does this distinction matter?", "answer": "Capital $$R$$ is the **external load resistance** — the resistor(s) outside the battery that you've connected to do useful work (lamp, motor, heater). Lowercase $$r$$ is the **internal resistance** — the resistance inside the battery itself, due to the electrolyte and electrodes. The distinction matters because: (1) you can't change $$r$$ from outside — it's a property of the cell; (2) terminal p.d. is only across $$R$$, not $$r$$; (3) energy dissipated in $$R$$ is useful, while energy dissipated in $$r$$ is wasted as heat inside the cell. Confusing them inverts your sense of which energy is \"useful\" vs \"lost.\"", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Why does the y-intercept of a CP8 V–I graph give the **e.m.f.** rather than just the \"max terminal p.d.\"?", "answer": "The y-intercept is the value of $$V$$ when $$I = 0$$ (extrapolated). At zero current, the lost-volts term $$Ir = 0$$, so the equation $$V = \\varepsilon - Ir$$ collapses to $$V = \\varepsilon$$. So the y-intercept is *physically* the open-circuit terminal voltage, which by definition equals the e.m.f. of the cell. It's not \"max terminal p.d.\" in a vague sense — it's the precise condition where no energy is being wasted internally, allowing every joule per coulomb supplied by the chemistry to appear at the terminals.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Sketch mentally: how does the V–I graph change if you replace the cell with one of (a) larger $$\\varepsilon$$, (b) larger $$r$$? (2 steps)", "answer": "- Step 1: Larger $$\\varepsilon$$ shifts the entire line **upward** — the y-intercept rises, but the gradient (slope) stays the same. Same internal resistance, more energy per charge supplied.\n- Step 2: Larger $$r$$ makes the line **steeper (more negative slope)** while the y-intercept stays the same — same e.m.f., but each amp drawn now costs more lost volts.\n\nVisual intuition: $$\\varepsilon$$ is \"where the line starts,\" $$r$$ is \"how steeply it falls.\"", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Why does drawing the largest possible triangle when reading the gradient of the V–I graph reduce uncertainty?", "answer": "The gradient is $$\\Delta V / \\Delta I$$. Each meter reading has a fixed absolute uncertainty (e.g., $$\\pm 1\\,\\mathrm{mV}$$ for the voltmeter, $$\\pm 0.1\\,\\mathrm{mA}$$ for the ammeter). The *percentage* uncertainty in $$\\Delta V$$ and $$\\Delta I$$ shrinks as $$\\Delta V$$ and $$\\Delta I$$ grow. A small triangle gives small differences with large percentage errors; a large triangle gives large differences with small percentage errors. Since gradient uncertainty propagates directly into $$r$$, a bigger triangle gives a more precise value of internal resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "A student claims: \"If I put two cells in parallel I get twice the e.m.f. and half the internal resistance.\" Identify and correct the misconception. (2 steps)", "answer": "- Step 1: The student has confused parallel with series. Putting cells in parallel does **not** add e.m.f.s — both cells push charge to the same potential, so $$\\varepsilon_{\\text{tot}} = \\varepsilon$$ (single-cell value).\n- Step 2: The internal-resistance claim is correct: identical cells in parallel give $$r_{\\text{tot}} = r/2$$, because the two internal resistors are in parallel. So the correct statement is: \"Two identical cells in parallel give **the same** e.m.f. but **halved** internal resistance.\"\n\nTo double the e.m.f., use *series*. To increase current capacity at fixed voltage, use *parallel*.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Conceptually, why is e.m.f. measured in volts (same unit as p.d.) even though it represents energy *gained* by charges, not lost?", "answer": "Both quantities are defined as energy per unit charge: $$\\varepsilon = W/Q$$ and $$V = W/Q$$. The SI unit of \"joules per coulomb\" is the volt. The fact that the energy direction is opposite (cell gives vs. component takes) doesn't change the *dimensions* of the ratio. The unit captures \"how much energy each coulomb carries through this element,\" whether deposited or extracted. So a 1.5 V cell injects 1.5 J into every coulomb passing through, while a 1.5 V resistor extracts 1.5 J from every coulomb — same magnitude unit, opposite energy flow.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "In the CP8 experiment, why would using a worn-out cell give misleading results? (2 steps)", "answer": "- Step 1: A run-down cell has a depleted electrolyte, which both reduces $$\\varepsilon$$ and substantially increases $$r$$ — and worse, both quantities **vary during the experiment** as the chemistry continues to deplete.\n- Step 2: The model $$V = \\varepsilon - Ir$$ assumes both $$\\varepsilon$$ and $$r$$ are constant during the readings. Drifting values produce a curved or \"noisy\" V–I plot, making the best-fit line meaningless and the extracted $$\\varepsilon$$ and $$r$$ inaccurate.\n\nBest practice: use a fresh cell so the constants stay constant during the ~10 minute experiment.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Why does the V–I graph always slope **downward** (negative gradient), and what would an upward-sloping graph indicate?", "answer": "The slope of $$V$$ vs. $$I$$ is $$-r$$. Since resistance is a positive quantity ($$r > 0$$ for any real material), the slope is always negative — more current always means lower terminal voltage. An upward-sloping graph would imply $$r < 0$$, meaning the cell *gains* energy when current flows through it instead of dissipating it — which violates the second law of thermodynamics. (Active devices like transistors and op-amps can mimic \"negative resistance\" in narrow regions, but a passive cell cannot.)", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Suppose a power supply has $$\\varepsilon = 10\\,\\mathrm{V}$$, $$r = 2\\,\\Omega$$ and you want to deliver maximum power to a load. Without doing detailed arithmetic, walk through what load $$R$$ to choose and roughly what fraction of the cell's energy reaches the load. (3 steps)", "answer": "- Step 1: For maximum power transfer, set $$R = r = 2\\,\\Omega$$.\n- Step 2: At this condition, current $$I = \\varepsilon/(R + r) = 10/4 = 2.5\\,\\mathrm{A}$$, and terminal p.d. $$V = \\varepsilon/2 = 5\\,\\mathrm{V}$$.\n- Step 3: The load receives 50% of the total power; the other 50% is wasted inside the cell. So *max power transfer is only 50% efficient*. This is fine for short-pulse applications (camera flashes, audio output) but terrible for continuous operation.\n\nFor efficient continuous use, choose $$R \\gg r$$ instead — you get less absolute power, but a much higher fraction reaches the load.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "A cell delivers 0.6 A through a 20 Ω external resistor with terminal p.d. 12 V. Conceptually walk through finding the e.m.f. and internal resistance. (3 steps)", "answer": "- Step 1: Terminal p.d. is across the external resistor, so check: $$V = IR$$ gives $$12 = 0.6 \\times 20$$ ✓ — consistent.\n- Step 2: Lost volts $$V_r$$ are the gap between $$\\varepsilon$$ and $$V$$. Use $$\\varepsilon = V + Ir$$, but we still need $$\\varepsilon$$ first or $$r$$ first — we need an extra piece of info. If we're told $$\\varepsilon = 12.5\\,\\mathrm{V}$$, then lost volts = $$\\varepsilon - V = 0.5\\,\\mathrm{V}$$.\n- Step 3: Then $$r = V_r/I = 0.5/0.6 \\approx 0.83\\,\\Omega$$.\n\nSense-check: $$r$$ is small compared to the 20 Ω external resistor, so the cell is efficient (~96% of energy reaches load). Consistent with a good battery.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Why is a voltmeter ideally *infinite* resistance and an ammeter ideally *zero* resistance in CP8?", "answer": "A voltmeter is in **parallel** with the cell terminals — if it had finite resistance, some current would flow through the voltmeter itself, slightly altering the actual current $$I$$ measured by the ammeter. Ideally the voltmeter resistance is so high that this leakage is negligible. An ammeter is in **series** with the circuit — if it had any resistance, that resistance would add to the external load $$R$$, creating an extra voltage drop and confusing the relationship $$V = \\varepsilon - Ir$$. Ideally zero so it doesn't perturb the circuit. Real meters approach these ideals but never quite reach them — hence small systematic errors.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "A cell has $$\\varepsilon = 1.5\\,\\mathrm{V}$$, $$r = 0.3\\,\\Omega$$, and drives a $$2.2\\,\\Omega$$ resistor. Conceptually walk through the current, terminal p.d., and lost volts. (3 steps)", "answer": "- Step 1: Loop resistance is $$R + r = 2.5\\,\\Omega$$, so current is $$I = \\varepsilon/(R+r) = 1.5/2.5 = 0.6\\,\\mathrm{A}$$.\n- Step 2: Lost volts are $$Ir = 0.6 \\times 0.3 = 0.18\\,\\mathrm{V}$$.\n- Step 3: Terminal p.d. = $$\\varepsilon - Ir = 1.5 - 0.18 = 1.32\\,\\mathrm{V}$$ (or equivalently $$IR = 0.6 \\times 2.2 = 1.32\\,\\mathrm{V}$$ — same answer, two routes).\n\nSense-check: terminal p.d. (1.32 V) < e.m.f. (1.5 V) ✓; and lost volts (0.18 V) ≪ terminal p.d. (1.32 V) since $$r \\ll R$$.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Why does the equation $$\\varepsilon = V + Ir$$ look like a \"conservation of energy per coulomb\" statement?", "answer": "Each term has units of joules per coulomb (volts), and each represents an energy-per-charge transaction in the loop. $$\\varepsilon$$ is the energy *given* to each coulomb by the cell. $$V$$ is the energy each coulomb *delivers* to the external circuit. $$Ir$$ is the energy each coulomb *dissipates* inside the cell as heat. Conservation of energy demands: energy supplied = energy delivered externally + energy wasted internally, i.e., $$\\varepsilon = V + Ir$$. So the equation is literally Kirchhoff's voltage law expressed per coulomb — every loop in a circuit must conserve energy per unit charge.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "What's the purpose of stating $$\\varepsilon = I(R+r)$$ versus $$\\varepsilon = V + Ir$$ — when do you use each form?", "answer": "Both forms are mathematically equivalent (use $$V = IR$$ to convert). Use $$\\varepsilon = I(R+r)$$ when you know the **external load $$R$$** and want to find the **current** directly — it bundles all the resistance into a total loop resistance. Use $$\\varepsilon = V + Ir$$ when you've measured **terminal p.d. $$V$$ and current $$I$$** (typical CP8 situation) and want to extract $$\\varepsilon$$ and $$r$$ — this form maps directly to the straight-line equation $$V = \\varepsilon - Ir$$. So one form is for \"predicting\" current from known loop, the other for \"extracting\" cell properties from data.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "Why are voltmeters used in CP8 ideally connected across the **battery terminals** rather than across the external load resistor?", "answer": "If you connect across the battery terminals, you directly measure the **terminal p.d.** $$V$$, which is exactly the $$V$$ in $$V = \\varepsilon - Ir$$. Across an ideal external resistor, you'd get the same value (since $$V_{\\text{terminal}} = V_R$$ when there's only one external resistor), but the voltmeter would be \"watching\" only the load — if the load is a rheostat being adjusted, any contact-resistance fluctuation perturbs the reading. Across the cell, the voltmeter sees the *cell's actual output*, independent of how the external network is wired. Cleaner, more direct.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Two cells of e.m.f. $$\\varepsilon_1$$ and $$\\varepsilon_2$$ (different values) are wired in series. Will the total internal resistance still just be $$r_1 + r_2$$, and what subtlety arises with the e.m.f.s? (2 steps)", "answer": "- Step 1: Internal resistances always add in series, regardless of e.m.f. values: $$r_{\\text{tot}} = r_1 + r_2$$. They're just two resistors in the same loop.\n- Step 2: For the e.m.f.s, **polarity matters**. If both cells are oriented the same way (positive terminal to negative terminal in series), $$\\varepsilon_{\\text{tot}} = \\varepsilon_1 + \\varepsilon_2$$. If one is reversed, they oppose: $$\\varepsilon_{\\text{tot}} = \\varepsilon_1 - \\varepsilon_2$$. The internal resistances still add positively either way — only the energy contributions can cancel.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Why does a battery's e.m.f. typically slightly decrease over its lifetime even before it's \"dead\"?", "answer": "The e.m.f. depends on the chemical potential difference between the electrode materials. As the battery is used, the chemistry at the electrodes shifts: reactant concentrations drop, byproducts build up, and the electrode surfaces may corrode or passivate. These changes slightly lower the chemical energy released per coulomb of charge transferred, so $$\\varepsilon$$ drifts downward gradually. Simultaneously, $$r$$ tends to *increase* as ionic mobility in the electrolyte drops. A \"dead\" battery is usually one where $$r$$ has grown so large that even modest currents cause terminal p.d. to collapse below useful levels.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "In CP8, why take **at least 8–10 data points** rather than just 2 to determine $$\\varepsilon$$ and $$r$$? (2 steps)", "answer": "- Step 1: With only 2 data points, any random fluctuation in either reading (meter jitter, contact resistance variation) directly shifts the line you'd draw between them — gradient and intercept are highly sensitive to a single bad point. No way to detect outliers.\n- Step 2: With 8–10 points across a wide range of currents, you can draw a **best-fit line**, smoothing out random scatter. Outliers become visible and can be re-checked. Both $$\\varepsilon$$ (intercept) and $$r$$ (gradient) become much more reliable. Also, a wide range of $$I$$ values lets you check whether $$r$$ is genuinely constant (linearity check).", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Why does a solar cell typically have a **very high** internal resistance (kΩ range) compared to a chemical battery (Ω or less)?", "answer": "A solar cell generates current by light freeing electron-hole pairs in semiconductor material. The internal resistance reflects how easily those charge carriers can migrate through the semiconductor to the terminals — and silicon, even when doped, has relatively low carrier mobility compared to the ionic conduction in a battery's liquid electrolyte. As a result, only small currents can flow before the lost-volts $$Ir$$ swamps the e.m.f., causing terminal p.d. to collapse. This is why solar cells are used in arrays (parallel reduces $$r_{\\text{tot}}$$) and why their behaviour at high currents is nonlinear — $$r$$ itself rises further as current grows.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "A laboratory EHT (extra-high tension) supply has $$\\varepsilon \\approx 5000\\,\\mathrm{V}$$ but $$r \\approx 50\\,\\mathrm{M}\\Omega$$. Why is the huge internal resistance a *safety* feature, not a defect? (2 steps)", "answer": "- Step 1: If a person (resistance ~10 kΩ) accidentally touches the terminals, the current is $$I = \\varepsilon/(R + r) \\approx 5000/(50\\times 10^6) \\approx 0.1\\,\\mathrm{mA}$$ — uncomfortable, but not lethal.\n- Step 2: Without that huge $$r$$, 5000 V across a 10 kΩ human would give $$I = 0.5\\,\\mathrm{A}$$ — fatal. So the EHT's enormous internal resistance acts as a built-in current limiter, decoupling the dangerous voltage from any dangerous current. It's the opposite design philosophy from a car battery (low $$r$$, high current capability).", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Why is the statement \"terminal p.d. = e.m.f.\" correct only when $$I = 0$$ and not in general?", "answer": "From $$V = \\varepsilon - Ir$$, the two are equal exactly when the lost-volts term vanishes, i.e., when $$I = 0$$. Any nonzero current causes some energy per coulomb to be wasted internally, so $$V < \\varepsilon$$ strictly. Saying \"terminal p.d. equals e.m.f.\" in a circuit with current flowing is a misconception, often arising because students conflate \"the voltage of the battery\" (a vague phrase) with \"what a voltmeter reads under load\" (which is $$V$$, not $$\\varepsilon$$). The only foolproof way to read $$\\varepsilon$$ directly is open-circuit with a high-resistance voltmeter.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "Three identical cells (each 1.5 V, 0.5 Ω) are wired all in parallel. What current can flow if shorted, and how does this compare to a single cell? (3 steps)", "answer": "- Step 1: Parallel: $$\\varepsilon_{\\text{tot}} = 1.5\\,\\mathrm{V}$$; $$r_{\\text{tot}} = r/3 = 0.5/3 \\approx 0.17\\,\\Omega$$.\n- Step 2: Short-circuit current: $$I_{sc} = \\varepsilon/r_{\\text{tot}} = 1.5/0.17 \\approx 9\\,\\mathrm{A}$$.\n- Step 3: A single cell alone would short-circuit at $$I_{sc} = 1.5/0.5 = 3\\,\\mathrm{A}$$. So three cells in parallel deliver 3× the short-circuit current at the same terminal voltage — the whole point of paralleling cells for high-current applications.\n\nKey insight: parallel doesn't boost voltage, but boosts current capability by reducing $$r_{\\text{tot}}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "The lost-volts term is sometimes written $$V_r$$, sometimes called the \"p.d. across the internal resistance.\" Are these the same thing? (2 steps)", "answer": "- Step 1: Yes — $$V_r = Ir$$ is literally the potential difference across the internal resistor (the imaginary one in series with the ideal e.m.f. inside the battery box). It obeys Ohm's law just like any ot
