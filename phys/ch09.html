<script>
const DATA={"selected": [{"question": "Conceptually, why is it that two formulations $$P = IV$$ and $$P = I^2R$$ give the same answer for a resistor, but the *interpretation* differs?", "answer": "Both equal the power dissipated in the resistor. $$P = IV$$ comes from the energy definition: rate of charge flow times energy per charge = energy per second. $$P = I^2R$$ comes from substituting Ohm's law $$V = IR$$ into $$P = IV$$. Interpretation difference: $$P = IV$$ is universal (works for any component, including non-ohmic ones like LEDs and motors); $$P = I^2R$$ specifically uses Ohm's law and only works for ohmic resistors. For internal resistance (ohmic), both apply — but if you were calculating power delivered to a motor (non-ohmic), only $$P = IV$$ is safe.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "Connecting four 1.5 V cells in series with the *same* polarity vs alternating polarity: what's the e.m.f. and total r in each case, with four cells each having r = 0.5 Ω? (3 steps)", "answer": "- Step 1: All same polarity: e.m.f.s add positively. $$\\varepsilon_{tot} = 4 \\times 1.5 = 6.0 \\text{ V}$$, $$r_{tot} = 4 \\times 0.5 = 2.0 \\text{ Ω}$$.\n- Step 2: Alternating polarity (++−−): two cells push forward, two push back. $$\\varepsilon_{tot} = 1.5 + 1.5 - 1.5 - 1.5 = 0 \\text{ V}$$. But internal resistances *always* add regardless of orientation (resistance is non-directional): $$r_{tot} = 2.0 \\text{ Ω}$$.\n- Step 3: Practical consequence: alternating gives no useful voltage but still has the same internal resistance, so all the e.m.f. of any one cell would be \"wasted\" fighting the other. Always check cell orientation when wiring.\n\nTakeaway: e.m.f. is directional (has sign); resistance is scalar (always adds).", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "In CP8, why must the switch be opened between current readings rather than left closed throughout the experiment? (3 steps)", "answer": "- Step 1: When current flows, power $$I^2r$$ is dissipated inside the cell as heat. This heats up the electrolyte.\n- Step 2: Heating changes both the internal resistance (it drifts as the cell warms) and slightly the e.m.f. (chemistry shifts with temperature).\n- Step 3: If the switch stays closed, by the end of the experiment $$r$$ and $$\\varepsilon$$ are no longer what they were at the start — introducing a systematic drift that distorts the V–I line away from straight, ruining the gradient and intercept analysis. Opening between readings keeps the cell cool and the parameters stable.\n\nTakeaway: open switch = thermal stability = trustworthy graph.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "Why is the maximum power delivered to a load when R = r? What fraction of total power is wasted in r in this case? (2 steps)", "answer": "- Step 1: Power in load P = I²R. Substitute I = ε/(R + r) → P = ε²R/(R + r)². Differentiate P with respect to R and set dP/dR = 0 → R = r.  \n- Step 2: At R = r, P_max = ε²/(4r). Total power ε²/(2r) (sum of power in R and r). Half the power is wasted in internal resistance (Ir = ε/2).", "source": "Qwen 3 ①", "_id": "qwen_1_8"}, {"question": "Starting from conservation of energy (Kirchhoff's voltage law), walk through the derivation of $$\\varepsilon = I(R + r)$$ and then rearrange to obtain $$V = \\varepsilon - Ir$$. At each step, state what physical quantity each term represents. (4 steps)", "answer": "- Step 1: Consider a cell of e.m.f. $$\\varepsilon$$ and internal resistance $$r$$ connected to an external load $$R$$. By conservation of energy (Kirchhoff's voltage law around the loop), the energy per coulomb *supplied* by the cell equals the energy per coulomb *dissipated* in all resistances: $$\\varepsilon = V_R + V_r$$, where $$V_R$$ is the p.d. across the load and $$V_r$$ is the p.d. across internal resistance.\n- Step 2: Apply Ohm's law to each resistance. The same current $$I$$ flows through both (they are in series): $$V_R = IR$$ and $$V_r = Ir$$. Substitute: $$\\varepsilon = IR + Ir$$.\n- Step 3: Factor out $$I$$: $$\\varepsilon = I(R + r)$$. This is the \"current form\" — useful for finding the circuit current when you know both resistances: $$I = \\frac{\\varepsilon}{R + r}$$.\n- Step 4: Recognise that $$V = IR$$ is the terminal p.d. (p.d. across the external load). Substitute back: $$\\varepsilon = V + Ir \\Rightarrow V = \\varepsilon - Ir$$. This is the \"terminal p.d. form\" — shows explicitly that terminal p.d. falls below e.m.f. by the lost volts $$Ir$$.\n\nEvery real circuit problem with a battery reduces to one of these two forms; choose the one that isolates your unknown.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "Edge case: what is the terminal p.d. of a cell on \"open circuit\" (no external connection at all), and why does this differ from the \"switch open\" case in CP8?", "answer": "On true open circuit (terminals dangling, nothing connected), $$I = 0$$ exactly, so $$V = \\varepsilon$$ across the terminals — but you can't *measure* it without connecting something. In CP8 with \"switch open\" you do have a voltmeter still connected; technically a tiny current flows through it, but because the voltmeter has very high resistance (≈ 10 MΩ vs r ≈ 0.4 Ω), this current is utterly negligible ($$\\sim$$ μA) and the lost volts are sub-microvolt. So \"switch open with high-R voltmeter\" is operationally indistinguishable from true open circuit for practical purposes.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "Why is energy dissipated in internal resistance \"wasted\" but energy dissipated in a heater resistor is \"useful\"? Both are just $$I^2R$$ heating.", "answer": "Physically, both convert electrical energy to thermal energy via $$I^2R$$ — they're the same process. The labels \"wasted\" and \"useful\" depend entirely on the *purpose* of the circuit. If you're trying to power a heater, the thermal energy in the heater resistor is what you want (useful). The thermal energy in the cell's internal resistor isn't what you wanted — you wanted that energy delivered to the heater, but some leaked away inside the cell first (wasted). Same physics, different intent: \"waste\" is human, not physical. A useful insight: a battery deliberately designed as a heat source would treat its internal r as the \"useful\" element.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "A circuit has ε = 12.5 V, external resistor R = 20 Ω, and terminal p.d. = 12.0 V. Without precise calculation, estimate which is bigger: r or R, and by roughly how much? (3 steps)", "answer": "- Step 1: Lost volts = $$12.5 - 12.0 = 0.5 \\text{ V}$$, which is about 4% of the e.m.f. Useful voltage = 12.0 V across R.\n- Step 2: Both R and r carry the same current. The ratio of voltage drops gives the ratio of resistances: $$r/R = V_r/V_R = 0.5/12 \\approx 1/24$$.\n- Step 3: So $$r \\approx R/24 \\approx 0.83 \\text{ Ω}$$ — internal resistance is roughly 24 times smaller than the external load.\n\nTakeaway: small lost-volts fraction means small r relative to R — and you can read the ratio directly from the voltage split.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "A student writes $$R = I/V$$ for resistance. Identify the error and state the correct rearrangement of $$V = IR$$. Explain the \"Very Itchy Rash\" mnemonic and how it helps. (2 steps)", "answer": "- Step 1: From $$V = IR$$, rearranging gives $$R = V/I$$ (not $$I/V$$). The error is inverting the fraction. Writing $$R = I/V$$ would give units of $$A/V = S$$ (siemens, conductance), not ohms. The correct unit is $$\\Omega = V/A$$.\n- Step 2: The \"Very Itchy Rash\" mnemonic (from tutor Alex): **V** = **I** × **R**. To find any one quantity, cover it with your finger: cover **V** → see **I** × **R**; cover **I** → see **V**/R; cover **R** → see **V**/I. This avoids the common trap of writing $$R = IV$$ or $$I = RV$$.\n\nThis was Phuc's recurring trap (noted globally in the study material). Always double-check: resistance divides voltage by current, not multiplies them.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "In the solar cell experiment (textbook Ch 11.3), the V–I graph curves at higher currents rather than remaining a straight line. Explain what this curvature means about the cell's internal resistance. (2 steps)", "answer": "- Step 1: The V–I graph for a cell with *constant* internal resistance would be a perfect straight line ($$V = \\varepsilon - Ir$$). If the graph curves (deviates from a straight line at higher currents), the internal resistance is *not constant* — it changes with current.\n- Step 2: In the solar cell data, the line curves more steeply downward at higher currents, meaning the effective internal resistance *increases* at large currents. This is typical: at high currents, heating and charge-carrier saturation effects inside the cell make it harder for current to flow, effectively increasing $$r$$. The straight-line model only applies for low-current (linear) regions of the graph.\n\nFor CP8 with ordinary cells, the line is approximately straight because currents are kept moderate. But always check: if your graph curves, $$r$$ is not constant, and the simple model breaks down.", "source": "GLM 5.1 ③", "_id": "glm_3_34"}, {"question": "Why does the V–I graph always slope **downward** (negative gradient), and what would an upward-sloping graph indicate?", "answer": "The slope of $$V$$ vs. $$I$$ is $$-r$$. Since resistance is a positive quantity ($$r > 0$$ for any real material), the slope is always negative — more current always means lower terminal voltage. An upward-sloping graph would imply $$r < 0$$, meaning the cell *gains* energy when current flows through it instead of dissipating it — which violates the second law of thermodynamics. (Active devices like transistors and op-amps can mimic \"negative resistance\" in narrow regions, but a passive cell cannot.)", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "A cell is driving a single load resistor R. The student varies R upward (increases R). Without precise calculation, predict the qualitative effect on (a) circuit current, (b) lost volts, (c) terminal p.d., (d) power dissipated in R. (4 steps)", "answer": "- Step 1: Current $$I = \\varepsilon/(R+r)$$. Larger R → larger denominator → *current decreases*.\n- Step 2: Lost volts $$V_r = Ir$$. Smaller I → *lost volts decrease*.\n- Step 3: Terminal p.d. $$V = \\varepsilon - Ir$$. Lost volts smaller → *V increases* (approaches ε as R → ∞).\n- Step 4: Power in R = $$I^2R$$. Two competing effects — I shrinks, R grows. Result depends on regime:\n+ If $$R \\ll r$$: increasing R increases power (numerator wins).\n+ If $$R = r$$: maximum power point.\n+ If $$R \\gg r$$: increasing R decreases power (denominator wins, $$I^2R \\approx \\varepsilon^2/R$$).\n\nTakeaway: V monotonically approaches ε; I monotonically decreases; P has a peak at R = r.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "A torch battery has $$\\varepsilon = 4.5\\,\\mathrm{V}$$, $$r = 0.4\\,\\Omega$$, connected to a lamp of resistance 6.4 Ω. Without doing exact arithmetic, estimate how the power splits between the lamp and the internal resistance. (3 steps)", "answer": "- Step 1: Power ratio of any two series resistors carrying the same current is simply $$P_R / P_r = R/r$$ (since $$P = I^2 R$$ and $$I$$ cancels).\n- Step 2: Here $$R/r = 6.4/0.4 = 16$$. So the lamp gets about 16× more power than the internal resistance wastes.\n- Step 3: As a fraction of total power, lamp gets $$16/17 \\approx 94\\%$$, cell wastes $$1/17 \\approx 6\\%$$. Efficient because $$r \\ll R$$.\n\nMental rule: the ratio $$R:r$$ *is* the efficiency ratio. The larger $$R/r$$, the more efficient.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "Why does the textbook describe the cell as \"an ideal e.m.f. source in series with a resistor r\"? Is the resistor *physically* a separate component?", "answer": "No — internally there's no actual discrete resistor inside the cell. The \"ideal e.m.f. + series resistor\" is a *circuit model* that captures the cell's behaviour with two clean components: a perfect energy source and a perfect resistor. The real cell's lumped behaviour (energy supply + irreducible energy loss) is mathematically equivalent to this idealised pair. The dotted box in circuit diagrams reminds you the two are inseparable — they're two abstractions of one physical cell. This modelling trick lets us apply Kirchhoff's laws to the cell as if it were two distinct elements, even though physically it's a single chemical system.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "In CP8, why take **at least 8–10 data points** rather than just 2 to determine $$\\varepsilon$$ and $$r$$? (2 steps)", "answer": "- Step 1: With only 2 data points, any random fluctuation in either reading (meter jitter, contact resistance variation) directly shifts the line you'd draw between them — gradient and intercept are highly sensitive to a single bad point. No way to detect outliers.\n- Step 2: With 8–10 points across a wide range of currents, you can draw a **best-fit line**, smoothing out random scatter. Outliers become visible and can be re-checked. Both $$\\varepsilon$$ (intercept) and $$r$$ (gradient) become much more reliable. Also, a wide range of $$I$$ values lets you check whether $$r$$ is genuinely constant (linearity check).", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "In a circuit with a cell (ε = 12 V, r = 1 Ω) connected to a parallel combination of 6 Ω and 3 Ω, work through finding terminal p.d. conceptually. (4 steps)", "answer": "- Step 1: Combine the parallel resistors: $$1/R_p = 1/6 + 1/3 = 1/2$$, so $$R_p = 2 \\text{ Ω}$$. The external load is now 2 Ω.\n- Step 2: Apply $$I = \\varepsilon/(R_p + r) = 12/(2+1) = 4 \\text{ A}$$.\n- Step 3: Lost volts $$Ir = 4 \\times 1 = 4 \\text{ V}$$.\n- Step 4: Terminal p.d. $$V = \\varepsilon - Ir = 12 - 4 = 8 \\text{ V}$$. Sense-check: this is the p.d. across the parallel combination, and indeed $$IR_p = 4 \\times 2 = 8 \\text{ V}$$. ✓\n\nTakeaway: even with complex external networks, the cell sees only their total equivalent resistance.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "Why is it physically wrong to say \"lost volts is energy stored in the battery\"? (2 steps)", "answer": "- Step 1: The \"lost volts\" $$Ir$$ is a voltage drop across the internal resistance. The associated power $$P = I \\cdot Ir = I^2 r$$ is **dissipated as heat** through resistive (Joule) heating inside the cell.\n- Step 2: Stored energy in a battery is *chemical* energy in the electrolyte/electrodes. Lost volts represents energy *leaving* that store and being wasted as heat — the opposite of storage.\n\nQuick test: a battery sitting on a shelf has stored energy but zero lost volts (no current). Lost volts only exist when current flows.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "A voltmeter reads 1.55 V with switch open and 1.49 V with switch closed (closing connects a 10 Ω load). Walk through the reasoning to find internal resistance, without doing precise arithmetic. (3 steps)", "answer": "- Step 1: Switch open → no current → no lost volts → reading = ε. So $$\\varepsilon = 1.55 \\text{ V}$$.\n- Step 2: Switch closed → current $$I$$ flows through the 10 Ω load. The terminal p.d. (which is also across the 10 Ω resistor) is 1.49 V, so $$I = V/R = 1.49/10 \\approx 0.15 \\text{ A}$$.\n- Step 3: Lost volts = $$\\varepsilon - V = 1.55 - 1.49 = 0.06 \\text{ V}$$. Then $$r = (\\text{lost volts})/I = 0.06/0.15 \\approx 0.4 \\text{ Ω}$$.\n\nTakeaway: open-then-close gives a clean two-point measurement; the voltage *drop* between the two readings is the lost volts at that current.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "Why does the V–I graph for a real cell in CP8 sometimes curve away from a straight line at high currents, and what does this reveal? (2 steps)", "answer": "- Step 1: The model $$V = \\varepsilon - Ir$$ assumes $$r$$ is constant. In reality, $$r$$ depends on temperature; at high $$I$$, the cell heats up rapidly ($$P_r = I^2 r$$), and $$r$$ itself changes.\n- Step 2: $$\\varepsilon$$ can also drift slightly with chemistry depletion at high currents. So the line begins to curve at high $$I$$ — usually downward, since heating typically increases $$r$$ further, exaggerating the voltage drop.\n\nThis is why you keep currents modest in CP8 and take readings quickly: to stay in the \"constant $$r$$\" regime.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Why does a cell with internal resistance warm up during use? Explain using energy dissipation and lost volts.", "answer": "- Step 1: **Internal resistance model**  \n  A cell is modeled as an ideal EMF source (ε) in series with an internal resistor (r).  \n- Step 2: **Energy dissipation**  \n  When current $ I $ flows, a voltage drop $ V_r = Ir $ occurs across r. This energy is dissipated as heat:  \n  $ P = I^2r $.  \n- Step 3: **Lost volts**  \n  The \"lost volts\" $ Ir $ is the energy per coulomb wasted in the cell, reducing terminal PD:  \n  $ V_{\\text{terminal}} = \\epsilon - Ir $.  \n  - Example: A car battery (r = 0.01 Ω) with $ I = 200 \\, \\text{A} $ dissipates $ 200^2 \\times 0.01 = 400 \\, \\text{W} $ as heat.  \n\n**Takeaway:** Internal resistance causes energy loss as heat, making the cell warm.", "source": "Qwen 3 ②", "_id": "qwen_2_1"}, {"question": "Why does the y-intercept of a CP8 V–I graph give the **e.m.f.** rather than just the \"max terminal p.d.\"?", "answer": "The y-intercept is the value of $$V$$ when $$I = 0$$ (extrapolated). At zero current, the lost-volts term $$Ir = 0$$, so the equation $$V = \\varepsilon - Ir$$ collapses to $$V = \\varepsilon$$. So the y-intercept is *physically* the open-circuit terminal voltage, which by definition equals the e.m.f. of the cell. It's not \"max terminal p.d.\" in a vague sense — it's the precise condition where no energy is being wasted internally, allowing every joule per coulomb supplied by the chemistry to appear at the terminals.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "A car battery has e.m.f. 12 V and internal resistance 0.01 Ω. The starter motor draws 200 A. Estimate the terminal p.d. during cranking — and explain the headlight dimming. (3 steps)", "answer": "- Step 1: Compute lost volts: $$V_r = Ir = 200 \\times 0.01 = 2 \\text{ V}$$.\n- Step 2: Terminal p.d.: $$V = \\varepsilon - Ir = 12 - 2 = 10 \\text{ V}$$.\n- Step 3: The headlights are wired across the battery terminals, so they see only 10 V instead of 12 V during cranking. Their power $$P = V^2/R$$ drops by roughly $$(10/12)^2 \\approx 70\\%$$, producing visibly dimmer light. Once the engine starts and the starter disengages, current drops and terminal p.d. returns to ≈12 V.\n\nTakeaway: even tiny $$r$$ matters when $$I$$ is huge.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Sketch (in words) how the V–I graph would look for (a) an ideal cell with zero internal resistance and (b) a real cell with finite r. What's the visual difference? (3 steps)", "answer": "- Step 1: Ideal cell ($$r = 0$$): $$V = \\varepsilon$$ regardless of $$I$$. Graph is a horizontal line at $$V = \\varepsilon$$ — terminal p.d. never drops.\n- Step 2: Real cell (finite r): $$V = \\varepsilon - Ir$$ slopes downward with gradient $$-r$$. Steeper slope = bigger r.\n- Step 3: Visual rule of thumb: a \"flat\" V–I line means a stiff supply (low r, good for delivering current without voltage sag); a \"steep\" line means a weak supply (high r, terminal voltage collapses quickly as load increases).\n\nTakeaway: slope steepness = how much the cell \"struggles\" under load.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Why is it physically reasonable that increasing current causes lost volts to increase linearly (rather than, say, quadratically)? (3 steps)", "answer": "- Step 1: Internal resistance obeys Ohm's law (at constant temperature and for ohmic materials): $$V_r = Ir$$, linear in I.\n- Step 2: Linearity reflects the underlying physics: each charge carrier loses an amount of energy proportional to the resistance it traverses; doubling the number of charges per second (current) doubles the total energy lost per second, but the voltage drop *per coulomb* stays the same multiple of r.\n- Step 3: Power dissipated, however, *is* quadratic: $$P = I^2r$$. So doubling current quadruples internal heating — which is why high-current draw heats cells dramatically (and changes r through temperature effects).\n\nTakeaway: lost volts linear in I (Ohm); lost power quadratic in I (Joule heating).", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Explain why a voltmeter connected across the terminals of a cell in an *open* circuit reads the e.m.f., but the same voltmeter in a *closed* circuit reads the terminal p.d. (which is less). Use the concept of lost volts in your answer. (2 steps)", "answer": "- Step 1: Open circuit ($$I \\approx 0$$): no current flows through the cell's internal resistance, so there is no voltage drop across $$r$$. Lost volts $$= Ir = 0$$. The full e.m.f. appears at the terminals, and the voltmeter reads $$\\varepsilon$$.\n- Step 2: Closed circuit ($$I > 0$$): current flows through $$r$$, creating a voltage drop $$Ir$$ across it. This drop *subtracts* from the e.m.f. — it is \"lost\" to the external circuit. The voltmeter now reads $$V = \\varepsilon - Ir$$, which is less than $$\\varepsilon$$. The greater the current, the greater the lost volts, and the lower the voltmeter reading.\n\nThe voltmeter always reads the terminal p.d.; it just happens that in open circuit, terminal p.d. equals e.m.f.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "Why can't you use a potato to power a pacemaker? Explain using the concept of internal resistance. (2 steps)", "answer": "- Step 1: A potato battery has a very high internal resistance (typically hundreds or thousands of ohms) because the electrochemical reactions inside are weak.\n- Step 2: Even if the e.m.f. is ~0.8 V, the high internal resistance means very little current can flow (I = ε/(R + r)). For a pacemaker needing microamps, the potato's r is too high to deliver useful current at a usable voltage.\n\n[This is why we need chemical batteries with low internal resistance for practical applications — the potato works in principle but fails in practice due to excessive r.]", "source": "MiniMax ②", "_id": "minimax_2_19"}, {"question": "Why are voltmeters used in CP8 ideally connected across the **battery terminals** rather than across the external load resistor?", "answer": "If you connect across the battery terminals, you directly measure the **terminal p.d.** $$V$$, which is exactly the $$V$$ in $$V = \\varepsilon - Ir$$. Across an ideal external resistor, you'd get the same value (since $$V_{\\text{terminal}} = V_R$$ when there's only one external resistor), but the voltmeter would be \"watching\" only the load — if the load is a rheostat being adjusted, any contact-resistance fluctuation perturbs the reading. Across the cell, the voltmeter sees the *cell's actual output*, independent of how the external network is wired. Cleaner, more direct.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "A student writes $$V = \\varepsilon + Ir$$ for the terminal p.d. of a cell delivering current. Identify and correct the error, and explain what would be physically absurd if this equation were true. (2 steps)", "answer": "- Step 1: The correct equation is $$V = \\varepsilon - Ir$$. The minus sign is critical: lost volts $$Ir$$ *reduce* the terminal p.d. below the e.m.f. Writing a plus sign would mean the terminal p.d. *exceeds* the e.m.f. when current flows — implying the battery somehow creates extra energy from nowhere.\n- Step 2: If $$V = \\varepsilon + Ir$$ were true, drawing more current would *increase* the terminal p.d., violating conservation of energy. The e.m.f. is the total energy per coulomb the source can provide; you cannot get more energy out than was supplied. The internal resistance always *consumes* some of that energy as heat, so the available terminal p.d. must be less than $$\\varepsilon$$, not more.\n\nThis is a classic exam trap — always subtract the lost-volts term.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "At what value of external load $$R$$ is the power delivered to the load maximised, and why is this *not* the most efficient operating condition? (3 steps)", "answer": "- Step 1: Power to the load is $$P = I^2 R = \\left(\\dfrac{\\varepsilon}{R+r}\\right)^2 R$$. Differentiating w.r.t. $$R$$ and setting to zero gives the maximum power transfer condition: $$R = r$$.\n- Step 2: At this condition, the current is $$I = \\varepsilon/(2r)$$, and the load p.d. is exactly $$\\varepsilon/2$$. So half the e.m.f. drops across the load, half drops internally — only **50% efficient**.\n- Step 3: For real-world devices (e.g., domestic mains, power supplies), engineers want $$r \\ll R$$ so that almost all the energy reaches the load — efficiency $$\\gg 50\\%$$, even if absolute power is not maximised.\n\nSo \"max power\" ≠ \"max efficiency.\" Audio amplifiers care about the first; power grids care about the second.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "What is the \"lost volts\" in a circuit, and why is it called \"lost\"?", "answer": "The \"lost volts\" is $$V_r = Ir$$ — the voltage drop across the internal resistance of the cell. It's called \"lost\" because this energy is dissipated as heat *inside* the cell and is therefore not available to the external circuit; from the perspective of whatever you're trying to power (a lamp, a motor), that fraction of the e.m.f. is permanently lost to internal heating. It's not \"stored\" anywhere — it's wasted. The bigger the current, the bigger the lost volts, and the less useful voltage remains.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "Why does a \"dead\" or run-down battery often have unusually high internal resistance, and what's the consequence for CP8 measurements?", "answer": "- Step 1: As a cell discharges, chemical changes accumulate: reaction products coat the electrodes, electrolyte concentration shifts, gas bubbles form. All these processes increase the difficulty of ion transport inside the cell — effectively raising $$r$$.\n- Step 2: Worse, run-down cells often have $$r$$ that *varies* during use as the chemistry continues to evolve, breaking the assumption of constant r underlying CP8's straight-line graph.\n- Step 3: Consequence: the V–I plot may curve or scatter erratically, gradient analysis becomes unreliable, and both $$\\varepsilon$$ and $$r$$ drift between readings. This is why CP8 must use a *fresh* cell.\n\nTakeaway: a fresh cell has stable, reproducible internal parameters — essential for a meaningful linear fit.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "What happens to terminal p.d. in the limit of a short circuit (R → 0), and where does all the energy go? (3 steps)", "answer": "- Step 1: As $$R \\to 0$$, the circuit current rises to its maximum: $$I_{sc} = \\varepsilon/r$$.\n- Step 2: Substituting into $$V = \\varepsilon - Ir$$: $$V = \\varepsilon - (\\varepsilon/r)r = 0$$. Terminal p.d. collapses to zero.\n- Step 3: All energy released by the cell ($$\\varepsilon I_{sc}$$) is now dissipated *inside* the cell across $$r$$, since the external load takes none. The cell rapidly heats up — this is the failure mode behind battery fires.\n\nTakeaway: short circuit = 100% internal dissipation = thermal runaway risk.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Why does putting identical cells in parallel *not* increase the e.m.f., contrary to a common misconception?", "answer": "E.m.f. is energy *per coulomb*, not total energy. A coulomb passing through one cell gets ε joules; if the cell is paralleled with another identical cell, the coulomb still only passes through *one* cell (it takes one path), so it still gets only ε joules. The two cells share the workload of supplying current, but each individual coulomb sees the same energy boost. To double the voltage per coulomb you'd need series (where each coulomb visits both cells in turn).", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "Starting from the conservation of energy (Kirchhoff's voltage law), derive the equation relating e.m.f., current, external resistance, and internal resistance: $$\\varepsilon = I(R + r)$$. (3 steps)", "answer": "- Step 1: The e.m.f. supplies energy per coulomb to the circuit. By conservation of energy, this energy per coulomb must equal the sum of the energy per coulomb dissipated in the external load ($$R$$) and the internal resistance ($$r$$).\n- Step 2: Express these energy-per-coulomb terms as voltages using Ohm's law ($$V = IR$$): the p.d. across the load is $$IR$$, and the p.d. lost internally is $$Ir$$.\n- Step 3: Equate the supplied energy to the dissipated energy: $$\\varepsilon = IR + Ir$$. Factoring out the current gives $$\\varepsilon = I(R + r)$$, showing the total e.m.f. drives the current through the total circuit resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "Why does the terminal p.d. of a battery decrease as more current is drawn from it? (3 steps)", "answer": "- Step 1: Start from $$V = \\varepsilon - Ir$$. The e.m.f. $$\\varepsilon$$ is fixed by the chemistry of the cell, and the internal resistance $$r$$ is roughly constant.\n- Step 2: When current $$I$$ increases (because external resistance was reduced), the lost-volts term $$Ir$$ grows.\n- Step 3: Since $$\\varepsilon$$ is fixed and $$Ir$$ has grown, the terminal p.d. $$V$$ must shrink to keep the energy books balanced.\n\nTakeaway: more current → more energy wasted internally → less left for the external circuit. This is why headlights dim when you crank the starter motor.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "Why does every real power supply have internal resistance, physically? (3 steps)", "answer": "- Step 1: A cell is not an idealised energy source — it is a physical object made of real materials (electrodes, electrolyte, contacts, terminals).\n- Step 2: When charges flow through the cell to be \"energised,\" they must physically traverse these materials:\n+ The electrolyte has finite conductivity (ions move sluggishly).\n+ Electrodes have resistance.\n+ Contact resistance exists at every internal junction.\n- Step 3: Together these create an unavoidable resistance *inside* the cell, modelled as a resistor $$r$$ in series with the ideal e.m.f. source. As current flows through $$r$$, energy is dissipated as heat — which is why batteries warm up during use.\n\nTakeaway: internal resistance is not a design flaw — it's a consequence of building the cell out of real matter.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Why does a resistor *not* \"store electrons\" — and what does it actually do?", "answer": "A resistor opposes the flow of charge by causing collisions between conducting electrons and the lattice ions of the resistor material. Each collision transfers kinetic energy from the electron to the lattice, raising the lattice's thermal vibrations (i.e. heating it up). The electrons don't accumulate or get \"stored\" — the same number of electrons flow in and out per second (charge is conserved at every cross-section). What's lost is *energy*, dissipated as heat. So a resistor is an energy converter (electrical → thermal), not a storage device. (Capacitors store charge; resistors dissipate energy.)", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Three identical cells, each with e.m.f. $$1.5 V$$ and internal resistance $$0.9 \\Omega$$, are connected in parallel. What is the total e.m.f. and total internal resistance? Explain the intuition. (3 steps)", "answer": "- Step 1: Total e.m.f. $$\\varepsilon_{total} = 1.5 V$$. Connecting identical cells in parallel does not increase voltage because all cells maintain the same potential difference across the same two terminals; charges don't get \"extra\" energy by choosing one path over another.\n- Step 2: Total internal resistance $$r_{total} = r/n = 0.9/3 = 0.3 \\Omega$$. Like any resistors in parallel, adding more paths decreases total resistance.\n- Step 3: Intuition: Paralleling cells provides more pathways for current, reducing internal resistance and allowing a larger current to be drawn without significant voltage drop (useful for car starters).", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "A battery with $$\\varepsilon = 12\\,V$$ and $$r = 0.01\\,\\Omega$$ delivers $$200\\,A$$ to a starter motor. Explain why the headlights dim when the engine starts, using the concepts of terminal p.d. and lost volts. (2 steps)", "answer": "- Step 1: Before starting, the headlights draw a small current ($$\\sim 5\\,A$$). Lost volts $$= 5 \\times 0.01 = 0.05\\,V$$, so terminal p.d. $$\\approx 11.95\\,V$$ — essentially the full $$12\\,V$$. Headlights are bright.\n- Step 2: When the starter motor engages, it draws $$200\\,A$$. Lost volts jump to $$200 \\times 0.01 = 2.0\\,V$$. Terminal p.d. drops to $$12 - 2 = 10\\,V$$. The headlights are now running at $$10\\,V$$ instead of $$12\\,V$$ — about 17% less voltage, which means significantly less power ($$P \\propto V^2$$, so roughly 30% less power). The headlights visibly dim.\n\nThis is a direct real-world demonstration of $$V = \\varepsilon - Ir$$: a heavy current load drags down the terminal voltage for everything sharing the same battery.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "Conceptually, why is e.m.f. measured in volts (same unit as p.d.) even though it represents energy *gained* by charges, not lost?", "answer": "Both quantities are defined as energy per unit charge: $$\\varepsilon = W/Q$$ and $$V = W/Q$$. The SI unit of \"joules per coulomb\" is the volt. The fact that the energy direction is opposite (cell gives vs. component takes) doesn't change the *dimensions* of the ratio. The unit captures \"how much energy each coulomb carries through this element,\" whether deposited or extracted. So a 1.5 V cell injects 1.5 J into every coulomb passing through, while a 1.5 V resistor extracts 1.5 J from every coulomb — same magnitude unit, opposite energy flow.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "A student plots V against I in CP8 and reports the internal resistance as \"−14.3 Ω because that's the gradient.\" What's wrong, and what's the correct statement?", "answer": "Internal resistance is a physical resistance — it cannot be negative. The gradient of the V–I graph is $$-r$$, *not* $$r$$ itself. The correct interpretation: the magnitude of the gradient gives $$r$$. So if gradient = −14.3 Ω/A, then $$r = 14.3 \\text{ Ω}$$. The negative sign tells you the line slopes downward (as expected — more current means more lost volts means less terminal p.d.), not that resistance is negative.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "Why is \"electromotive force\" a misleading name, and what is it actually?", "answer": "Despite the name, e.m.f. is **not a force** at all — it has no units of newtons, and it doesn't push charges in any mechanical sense. It's an energy-per-charge quantity, measured in volts (joules per coulomb). The word \"force\" is a historical artefact from early electricity research when scientists thought of it as something that \"drove\" charges around. A more accurate modern description is: the energy transferred per unit charge from some other form (chemical, mechanical, light) into electrical form by the source. Always state this in exam answers — examiners penalise \"the voltage of the battery\" or \"force from the cell\".", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "A common confusion is swapping the symbols $$R$$ and $$r$$ in the equation $$\\varepsilon = I(R + r)$$. What does each symbol represent, and what goes wrong if you swap them? (2 steps)", "answer": "- Step 1: Capital $$R$$ = external (load) resistance, the resistor(s) outside the battery box. Lower-case $$r$$ = internal resistance, inside the battery box. In $$\\varepsilon = I(R + r)$$, the total resistance in the circuit is $$R + r$$, and the e.m.f. drives current through *both*.\n- Step 2: If you swap them, you would calculate $$V = IR$$ using the wrong resistance — assigning the internal resistance's value to the external load and vice versa. This gives incorrect terminal p.d., current, and power values. In the June 7 lesson (53:33), Phuc asked \"is large R the R of the battery?\" — the answer is no; large $$R$$ is always the external load, small $$r$$ is always inside the battery.\n\nMnemonic: **R** = **R**elays/external (the load the battery powers); **r** = **r**esiding inside (the battery's own resistance).", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "What is meant by \"lost volts,\" and where does this energy go? Why is the word \"lost\" slightly misleading?", "answer": "\"Lost volts\" $$V_r = Ir$$ is the voltage drop across the internal resistance of the cell — the energy per coulomb that does **not** make it to the external circuit. The energy isn't destroyed: it becomes heat inside the cell (which is why the cell warms up). The word \"lost\" only means lost *to the external circuit* — from the user's perspective, it's wasted because it can't power the load. Equivalently, $$V_r = \\varepsilon - V$$, the gap between what the cell could deliver in principle and what actually reaches the load.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "At the maximum power transfer condition ($$R = r$$), only 50% of the total power reaches the load. Why do most real-world power supplies design for $$r \\ll R$$ instead, and what does this sacrifice? (2 steps)", "answer": "- Step 1: When $$r \\ll R$$, almost all the e.m.f. appears at the terminals ($$V \\approx \\varepsilon$$), and nearly all the power goes to the load. The efficiency $$\\eta = P_{load}/P_{total} = R/(R+r)$$ approaches 1 as $$r \\to 0$$. For example, the national grid uses high voltages and low source resistances to deliver energy efficiently to homes.\n- Step 2: The sacrifice is that the *absolute* power delivered to the load is below the maximum possible $$\\varepsilon^2/(4r)$$. But in most applications, efficiency (minimising waste heat) matters far more than extracting the theoretical maximum power. A power station that wastes 50% of its energy as heat in its own wiring would be economically disastrous.\n\nMaximum power transfer is most relevant in specialised applications (e.g. impedance matching in audio amplifiers and RF circuits), not in general power delivery.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "At what condition does a cell deliver maximum power to an external load, and what's the surprising efficiency result? (3 steps)", "answer": "- Step 1: Power to load is $$P = I^2R = [\\varepsilon/(R+r)]^2 R$$. Differentiate w.r.t. $$R$$ and set to zero: maximum occurs when $$R = r$$.\n- Step 2: At this matching condition: current $$I = \\varepsilon/(2r)$$, and $$P_{max} = \\varepsilon^2/(4r)$$.\n- Step 3: The efficiency surprise: at maximum power transfer, *half* of the e.m.f. is dropped across $$r$$ and half across $$R$$. So only 50% of the total power generated by the cell reaches the load — the other 50% is wasted as heat inside the cell. For real-world high-efficiency designs (mains supplies, power grids), engineers deliberately make $$r \\ll R$$, sacrificing peak power for efficiency.\n\nTakeaway: maximum power ≠ maximum efficiency. Match for power; mismatch (low r) for efficiency.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Why does the equation $$\\varepsilon = V + Ir$$ look like a \"conservation of energy per coulomb\" statement?", "answer": "Each term has units of joules per coulomb (volts), and each represents an energy-per-charge transaction in the loop. $$\\varepsilon$$ is the energy *given* to each coulomb by the cell. $$V$$ is the energy each coulomb *delivers* to the external circuit. $$Ir$$ is the energy each coulomb *dissipates* inside the cell as heat. Conservation of energy demands: energy supplied = energy delivered externally + energy wasted internally, i.e., $$\\varepsilon = V + Ir$$. So the equation is literally Kirchhoff's voltage law expressed per coulomb — every loop in a circuit must conserve energy per unit charge.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Maximum power is delivered to an external load $$R$$ when $$R = r$$. Explain *why* this condition maximises power, using the idea of a \"tug-of-war\" between the load and the internal resistance. (3 steps)", "answer": "- Step 1: The power delivered to the load is $$P = I^2 R = \\left(\\frac{\\varepsilon}{R+r}\\right)^2 R = \\frac{\\varepsilon^2 R}{(R+r)^2}$$. Consider two extremes: (a) if $$R \\to 0$$, then $$I \\to \\varepsilon/r$$ (large current) but all power is wasted in $$r$$ since $$P = I^2 \\cdot 0 = 0$$; (b) if $$R \\to \\infty$$, then $$I \\to 0$$ (no current) and again $$P \\to 0$$. Somewhere in between, power is maximised.\n- Step 2: At $$R = r$$, the two resistances are equal, so they split the total voltage equally: $$V_R = V_r = \\varepsilon/2$$. The current is $$I = \\varepsilon/(2r)$$. The power to the load is $$P_{max} = I^2 R = \\frac{\\varepsilon^2}{(2r)^2} \\cdot r = \\frac{\\varepsilon^2}{4r}$$.\n- Step 3: The \"tug-of-war\" insight: if $$R \\ll r$$, the internal resistance dominates and steals most of the voltage (and power). If $$R \\gg r$$, the current is too small to deliver much power despite the large resistance. The balance point — where neither resistance dominates — is $$R = r$$. At this point, exactly 50% of the power goes to the load and 50% is wasted in $$r$$.\n\nMaximum power transfer does *not* mean maximum efficiency — it means maximum *power to the load*, at the cost of 50% waste.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "Where does internal resistance physically come from inside a battery, and why does it cause the battery to become warm during use? (2 steps)", "answer": "- Step 1: Inside any real cell, charge carriers must move through physical materials — the electrolyte, the electrodes, and any contact junctions. These materials have finite resistivity, so they present a small resistance to current flow. This is the internal resistance $$r$$, modelled as a resistor in series with the ideal e.m.f. source inside the dotted \"battery box.\"\n- Step 2: When current $$I$$ flows, the power dissipated in the internal resistance is $$P = I^2 r$$ (Joule heating). This energy is thermal — it warms the cell from the inside. It is not available to the external circuit; it is wasted. The voltage drop $$Ir$$ across $$r$$ represents energy per coulomb lost as heat *inside* the battery, which is why terminal p.d. is always less than e.m.f. when current flows.\n\nA battery that feels warm after extended use is directly demonstrating $$I^2 r$$ heating in its internal resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "Why must the switch in the CP8 circuit be opened between readings, and what error does leaving it closed introduce? (3 steps)", "answer": "- Step 1: When current flows, power $$I^2 r$$ is dissipated inside the cell, raising its temperature.\n- Step 2: Both $$\\varepsilon$$ and $$r$$ drift with temperature and with depletion of the cell's chemistry. If you leave the switch closed, the cell ages noticeably during the experiment.\n- Step 3: This is a **systematic error**: the y-intercept and gradient you measure no longer correspond to a single fixed cell, biasing both $$\\varepsilon$$ and $$r$$ in unpredictable directions.\n\nBest practice: close switch only briefly, read both meters, immediately open. Also: start with maximum $$R$$ so the *initial* current is small.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "In contrast to a car battery, why does a laboratory E.H.T. supply have a *very large* built-in internal resistance (≈50 MΩ)?", "answer": "Safety. An E.H.T. supply provides thousands of volts. If a person accidentally touches both terminals, the current that flows is limited by $$I = \\varepsilon/(R_{body} + r)$$. With $$r = 50 \\text{ M}\\Omega$$, even at $$\\varepsilon = 5000 \\text{ V}$$, the current is at most $$5000/50{\\times}10^6 = 0.1 \\text{ mA}$$ — still a nasty shock but not lethal. Without that large internal resistance, the same supply could push lethal currents through a human body. So internal resistance is deliberately engineered to be huge here, sacrificing power delivery for safety.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "A battery with $$\\varepsilon = 4.5\\,V$$ and $$r = 0.4\\,\\Omega$$ is connected to a lamp of resistance $$6.4\\,\\Omega$$. Without doing detailed calculations, compare the power dissipated in the lamp versus the power wasted inside the cell. Which is larger, and roughly by how much? (2 steps)", "answer": "- Step 1: The current is $$I = \\varepsilon/(R+r) = 4.5/(6.4 + 0.4) = 4.5/6.8 \\approx 0.66\\,A$$. Power in the lamp: $$P_{lamp} = I^2 R = 0.66^2 \\times 6.4 \\approx 2.8\\,W$$. Power wasted in cell: $$P_{wasted} = I^2 r = 0.66^2 \\times 0.4 \\approx 0.17\\,W$$.\n- Step 2: The lamp power is about 16 times larger than the wasted power because $$R = 6.4\\,\\Omega$$ is 16 times larger than $$r = 0.4\\,\\Omega$$, and both use the same $$I^2$$ factor. The ratio $$P_{lamp}/P_{wasted} = R/r = 6.4/0.4 = 16$$. Most of the power goes to the load because $$R \\gg r$$ — the internal resistance is a small fraction of the total, so only a small fraction of the power is wasted.\n\nRule of thumb: when $$R \\gg r$$, most power reaches the load (high efficiency); when $$R = r$$, power is split 50/50 (maximum power but low efficiency).", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "A cell with $$\\varepsilon = 1.5\\,\\mathrm{V}$$ and $$r = 0.5\\,\\Omega$$ is short-circuited (load $$R = 0$$). What happens qualitatively to the current and terminal p.d., and why is short-circuiting a low-$$r$$ battery dangerous? (3 steps)", "answer": "- Step 1: With $$R = 0$$, the current is $$I_{sc} = \\varepsilon/r = 1.5/0.5 = 3\\,\\mathrm{A}$$. All the e.m.f. drops inside the cell.\n- Step 2: Terminal p.d. $$V = \\varepsilon - Ir = 1.5 - 3(0.5) = 0\\,\\mathrm{V}$$. Every joule per coulomb is dissipated internally.\n- Step 3: For a car battery with $$r \\approx 0.01\\,\\Omega$$ and $$\\varepsilon = 12\\,\\mathrm{V}$$, $$I_{sc} = 1200\\,\\mathrm{A}$$. That enormous current dumps $$I^2 r$$ heat into the battery — explosion, melted terminals, fire. Low $$r$$ is great for delivering power but terrifying when shorted.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "In CP8, why is using a rheostat (continuous variable resistor) better than swapping in different fixed resistors? (2 steps)", "answer": "- Step 1: A rheostat lets you sweep smoothly through a wide range of currents, ensuring you get well-spaced data points across the full V–I range without gaps. Each new switching action with fixed resistors introduces fresh contact resistance and possibly damaged connections.\n- Step 2: Smooth variation also means the cell doesn't experience sudden current jumps that could accelerate heating. You can also linger briefly at low currents (initial high-$$R$$ region) to take careful readings near the y-intercept — critical for accurate $$\\varepsilon$$ extrapolation.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "What does a voltmeter connected across a cell read when the switch is open (no current flowing), and why?", "answer": "The voltmeter reads the e.m.f. ε directly. The reasoning: with the switch open, essentially no current flows (a good voltmeter has very high resistance, so $$I \\approx 0$$). The lost volts $$Ir = 0 \\cdot r = 0$$. From $$V = \\varepsilon - Ir$$, we get $$V = \\varepsilon$$. This is the only situation where terminal p.d. equals e.m.f. — it's the cleanest way to measure $$\\varepsilon$$ in practice.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Define e.m.f. ($$\\varepsilon$$) of a power source in terms of energy and charge, and state its SI unit.", "answer": "E.m.f. is the energy transferred (converted) from chemical — or other non-electrical form — to electrical energy **per unit charge** passing through the source. Symbolically, $$\\varepsilon = \\dfrac{W}{Q}$$, where $$W$$ is the energy supplied to the charges and $$Q$$ is the charge that has flowed. The SI unit is the volt (V), which is equivalent to a joule per coulomb ($$\\mathrm{J\\,C^{-1}}$$). Despite its historical name \"electromotive force,\" e.m.f. is **not a force** — it is an energy transfer per charge. The exam-board phrasing to memorise: *\"the energy converted from chemical (or other) to electrical per unit charge passing through the source.\"*", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Starting from energy conservation, derive the equation $$\\varepsilon = I(R + r)$$ for a cell driving a load. (3 steps)", "answer": "- Step 1: Consider one coulomb of charge making a full loop. The cell supplies energy $$\\varepsilon$$ joules to it (by definition of e.m.f.).\n- Step 2: As that coulomb traverses the loop, energy is dissipated in two places:\n+ External load $$R$$: energy lost per coulomb $$= V_R = IR$$.\n+ Internal resistance $$r$$: energy lost per coulomb $$= V_r = Ir$$.\n- Step 3: By energy conservation (Kirchhoff's voltage law), the energy given equals the total energy dissipated: $$\\varepsilon = IR + Ir = I(R + r)$$.\n\nTakeaway: the equation is just \"energy in = energy out\" applied to one coulomb on a round trip.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "Why is a voltmeter ideally *infinite* resistance and an ammeter ideally *zero* resistance in CP8?", "answer": "A voltmeter is in **parallel** with the cell terminals — if it had finite resistance, some current would flow through the voltmeter itself, slightly altering the actual current $$I$$ measured by the ammeter. Ideally the voltmeter resistance is so high that this leakage is negligible. An ammeter is in **series** with the circuit — if it had any resistance, that resistance would add to the external load $$R$$, creating an extra voltage drop and confusing the relationship $$V = \\varepsilon - Ir$$. Ideally zero so it doesn't perturb the circuit. Real meters approach these ideals but never quite reach them — hence small systematic errors.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "What are the \"lost volts\" in a circuit with internal resistance, and why is it wrong to say that lost volts represent energy *stored* inside the cell? (2 steps)", "answer": "- Step 1: Lost volts $$= Ir$$, the voltage drop across the internal resistance $$r$$. It is the portion of the e.m.f. that does not reach the external circuit — the \"volts lost\" inside the battery. Numerically, lost volts $$= \\varepsilon - V$$.\n- Step 2: Lost volts represent energy *dissipated as heat* inside the cell, not energy stored. The power wasted is $$P = I^2 r$$ (Joule heating). This energy is irreversibly converted to thermal energy in the battery's internal materials and cannot be recovered. Calling it \"stored\" would imply the battery can reclaim it later, which is false — it is waste heat.\n\nThe name \"lost volts\" reflects that these volts are unavailable (lost) to the external circuit, not that they are saved somewhere.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "An exam question states \"a battery of negligible internal resistance.\" What practical assumption does this allow, and how does it simplify the circuit analysis?", "answer": "\"Negligible internal resistance\" means treating $$r \\approx 0$$. Consequences: (i) lost volts $$Ir \\approx 0$$ regardless of current; (ii) terminal p.d. = e.m.f. always, so you can treat $$V = \\varepsilon$$ as a fixed source voltage; (iii) the equation $$\\varepsilon = I(R+r)$$ simplifies to $$\\varepsilon = IR$$ — just Ohm's law for the external circuit. This is the \"ideal battery\" approximation: useful when r is small compared to all external resistances (e.g., a 12 V battery with $$r = 0.01 \\text{ Ω}$$ driving a 100 Ω circuit). When the problem gives r, you must include it.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "A car battery needs a very small internal resistance (~0.01 Ω), while a lab EHT (Extra High Tension) supply needs a very large internal resistance (~50 MΩ). Explain why, based on what happens during a short circuit. (3 steps)", "answer": "- Step 1: Car battery: The starter motor needs a huge current (~200 A). Low $$r$$ ensures that even at high current, the lost volts ($$Ir$$) are small, so terminal p.d. stays high enough to turn the motor.\n- Step 2: EHT supply: It produces high voltage for experiments. If accidentally short-circuited (e.g., by a person), the huge internal resistance limits the current to a tiny, safe value ($$I = \\varepsilon/r \\approx \\text{fraction of a mA}$$).\n- Step 3: Car battery optimizes for high current delivery; EHT supply optimizes for safety via current limitation.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "A car battery has $$\\varepsilon = 12\\,V$$ and $$r = 0.01\\,\\Omega$$. Without doing any complex calculation, explain why short-circuiting this battery is far more dangerous than short-circuiting a torch battery with $$\\varepsilon = 4.5\\,V$$ and $$r = 0.4\\,\\Omega$$. (2 steps)", "answer": "- Step 1: Short-circuit current is $$I_{sc} = \\varepsilon / r$$. For the car battery: $$I_{sc} \\approx 12/0.01 = 1200\\,A$$. For the torch battery: $$I_{sc} \\approx 4.5/0.4 \\approx 11\\,A$$. The car battery delivers roughly 100 times more current because its internal resistance is 40 times smaller while its e.m.f. is only about 3 times smaller.\n- Step 2: The power dissipated *inside* the cell during a short circuit is $$P = \\varepsilon^2 / r$$. For the car battery this is $$144/0.01 = 14{,}400\\,W$$ (14.4 kW!) vs. $$\\sim 20\\,W$$ for the torch battery. That enormous power heats the car battery catastrophically — risk of explosion, melting, and fire. The tiny $$r$$ is what makes it dangerous: less resistance means less restriction on current.\n\nThis is why car batteries have thick terminals and heavy-duty insulation — their low internal resistance is a feature for normal use (delivering hundreds of amps to the starter) but a hazard in a short circuit.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "Why is the lost-volts term subtracted (V = ε − Ir) rather than added in the terminal-p.d. equation? Conceptually, what would adding imply?", "answer": "Energy can only be given to the charges *once*, at the source. From the perspective of the external circuit, the cell starts with ε joules per coulomb to offer; the internal resistance siphons off $$Ir$$ joules per coulomb *before* they leave the cell. So what arrives at the external terminals is $$\\varepsilon - Ir$$ — what's left after the internal toll. Writing $$V = \\varepsilon + Ir$$ would mean the internal resistance somehow *adds* energy to the charges, which would violate conservation (you can't get energy out of a passive resistor). This is one of the most common exam slip-ups.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "A common student mistake is to use $$R = IV$$ instead of $$R = V/I$$. Why is this wrong, dimensionally and conceptually? (3 steps)", "answer": "- Step 1: Ohm's law is $$V = IR$$. Rearranging for $$R$$: divide both sides by $$I$$, giving $$R = V/I$$.\n- Step 2: Dimensionally, $$IV$$ has units of $$\\text{A} \\times \\text{V} = \\text{W}$$ (watts) — that's power, not resistance. So $$R = IV$$ would mean \"resistance equals power,\" which is nonsense.\n- Step 3: Conceptually: resistance measures *how much voltage is needed per unit current* — a steeper voltage requirement per amp means more resistance. So you divide V by I, not multiply.\n\nMnemonic (\"Very Itchy Rash\"): cover the quantity you want — covering R in V=IR leaves V/I.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "A battery with $$\\varepsilon = 12\\,\\mathrm{V}$$, $$r = 1\\,\\Omega$$ is connected to a parallel combination of 6 Ω and 3 Ω. Without doing exact arithmetic, conceptually walk through finding the terminal p.d. (4 steps)", "answer": "- Step 1: First, replace the parallel pair by a single equivalent resistance. Parallel: $$1/R_p = 1/6 + 1/3 = 1/2$$, so $$R_p = 2\\,\\Omega$$. This is now an effective external load.\n- Step 2: Total loop resistance is $$R_p + r = 2 + 1 = 3\\,\\Omega$$.\n- Step 3: Circuit current is $$I = \\varepsilon/(R_p + r) = 12/3 = 4\\,\\mathrm{A}$$.\n- Step 4: Terminal p.d. is across the external network: $$V = IR_p = 4 \\times 2 = 8\\,\\mathrm{V}$$. Or equivalently $$V = \\varepsilon - Ir = 12 - 4 = 8\\,\\mathrm{V}$$.\n\nKey idea: collapse the external network to a single equivalent resistor first, *then* apply the EMF equation.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Three identical cells, each with e.m.f. 1.5 V and internal resistance 0.5 Ω, are connected (a) in series and (b) in parallel. For each arrangement, state the total e.m.f. and total internal resistance. (3 steps)", "answer": "- Step 1: (a) In SERIES: e.m.f.s add and internal resistances add. ε_total = 1.5 + 1.5 + 1.5 = 4.5 V. r_total = 0.5 + 0.5 + 0.5 = 1.5 Ω.\n- Step 2: (b) In PARALLEL (identical cells): e.m.f. stays the same (you don't get more voltage by paralleling identical cells), but internal resistance divides: r_total = r/n = 0.5/3 = 0.17 Ω.\n- Step 3: ε_total = 1.5 V for parallel. The parallel combination can deliver larger currents because r is much smaller.\n\n[Parallel cells: useful for high-current applications (like car starters) because lower internal resistance means less voltage drop.]", "source": "MiniMax ②", "_id": "minimax_2_13"}, {"question": "Why would you choose to connect identical cells in parallel rather than in series for a high-current application like a car starter motor, even though the total e.m.f. stays the same? (2 steps)", "answer": "- Step 1: The starter motor needs very high current (hundreds of amps) with minimal voltage drop. With $$n$$ cells in parallel, $$r_{total} = r/n$$, so the internal resistance drops dramatically. Less $$r$$ means less lost volts ($$Ir$$) at any given current, so the terminal p.d. stays closer to $$\\varepsilon$$ under heavy load.\n- Step 2: With cells in series, $$r_{total}$$ increases, which is counterproductive for high current. The short-circuit current for parallel cells is $$I_{sc} = \\varepsilon/(r/n) = n\\varepsilon/r$$, which is $$n$$ times larger than for one cell. For a car battery where $$r$$ is already tiny per cell, paralleling further reduces $$r_{total}$$ and maximises the current that can be delivered without the terminal voltage sagging below what the motor needs.\n\nParallel configuration sacrifices extra voltage for current-delivery capability — the right trade-off for starting engines.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "Why should you start CP8 with the variable resistor set to its maximum value rather than minimum? (3 steps)", "answer": "- Step 1: At minimum external $$R$$, the circuit current $$I = \\varepsilon/(R+r)$$ is at its largest.\n- Step 2: Large currents:\n+ Heat the cell rapidly (changing $$r$$ — systematic error).\n+ May exceed ammeter range.\n+ Risk damaging components if current spikes.\n- Step 3: Starting at maximum $$R$$ ensures small initial current, gentle warm-up, and lets you sweep *down* through values safely. You also get the most \"open-circuit-like\" point early on, anchoring the high-V end of the graph.\n\nTakeaway: high R first = safe, cool, controlled.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "Two cells with e.m.f.s $$\\varepsilon_1$$ and $$\\varepsilon_2$$, and internal resistances $$r_1$$ and $$r_2$$, are connected in series (same polarity). What are the total e.m.f. and total internal resistance? (2 steps)", "answer": "- Step 1: The total e.m.f. is the sum of the individual e.m.f.s because each cell adds energy to the charges flowing through them: $$\\varepsilon_{total} = \\varepsilon_1 + \\varepsilon_2$$.\n- Step 2: The total internal resistance is the sum of the individual internal resistances because they are resistors in series, opposing the current cumulatively: $$r_{total} = r_1 + r_2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "Why is it important in CP8 to wait for voltmeter and ammeter readings to stabilise before recording, even if the switch was just closed?", "answer": "Several time-dependent effects occur right after closing the switch: (i) capacitive effects in the wires/components cause brief transient currents; (ii) the cell's chemistry has a small \"settling time\" as ions redistribute near the electrodes; (iii) needle-based meters have mechanical inertia and oscillate before settling. Recording too early captures a transient value, not the steady-state V and I that the simple model $$V = \\varepsilon - Ir$$ predicts. Waiting ensures the system is in equilibrium and the data point genuinely lies on the V–I characteristic.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "What's the purpose of stating $$\\varepsilon = I(R+r)$$ versus $$\\varepsilon = V + Ir$$ — when do you use each form?", "answer": "Both forms are mathematically equivalent (use $$V = IR$$ to convert). Use $$\\varepsilon = I(R+r)$$ when you know the **external load $$R$$** and want to find the **current** directly — it bundles all the resistance into a total loop resistance. Use $$\\varepsilon = V + Ir$$ when you've measured **terminal p.d. $$V$$ and current $$I$$** (typical CP8 situation) and want to extract $$\\varepsilon$$ and $$r$$ — this form maps directly to the straight-line equation $$V = \\varepsilon - Ir$$. So one form is for \"predicting\" current from known loop, the other for \"extracting\" cell properties from data.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "A laboratory EHT (extra-high tension) supply has $$\\varepsilon \\approx 5000\\,\\mathrm{V}$$ but $$r \\approx 50\\,\\mathrm{M}\\Omega$$. Why is the huge internal resistance a *safety* feature, not a defect? (2 steps)", "answer": "- Step 1: If a person (resistance ~10 kΩ) accidentally touches the terminals, the current is $$I = \\varepsilon/(R + r) \\approx 5000/(50\\times 10^6) \\approx 0.1\\,\\mathrm{mA}$$ — uncomfortable, but not lethal.\n- Step 2: Without that huge $$r$$, 5000 V across a 10 kΩ human would give $$I = 0.5\\,\\mathrm{A}$$ — fatal. So the EHT's enormous internal resistance acts as a built-in current limiter, decoupling the dangerous voltage from any dangerous current. It's the opposite design philosophy from a car battery (low $$r$$, high current capability).", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "A student performing CP8 collects data but then accidentally plots $$I$$ on the y-axis and $$V$$ on the x-axis. Describe what the graph would look like, and explain how the student could still extract $$\\varepsilon$$ and $$r$$ from it (with careful thinking). (2 steps)", "answer": "- Step 1: With axes swapped, the equation becomes $$I = \\frac{\\varepsilon - V}{r} = -\\frac{1}{r}V + \\frac{\\varepsilon}{r}$$. This is still a straight line, but now: gradient $$= -1/r$$ and y-intercept $$= \\varepsilon/r$$ (the short-circuit current). The x-intercept (where $$I = 0$$) is $$V = \\varepsilon$$.\n- Step 2: From the swapped graph: the x-intercept gives $$\\varepsilon$$ directly. The y-intercept gives $$\\varepsilon/r$$, so $$r = \\varepsilon / (\\text{y-intercept})$$. Alternatively, the gradient gives $$-1/r$$, so $$r = -1/\\text{gradient}$$. It's possible to extract the same information, but the standard convention ($$V$$ vs. $$I$$) is much more intuitive and less error-prone.\n\nAlways follow the CP8 convention: $$V$$ on y-axis, $$I$$ on x-axis. The swapped axes make gradient interpretation error-prone.", "source": "GLM 5.1 ③", "_id": "glm_3_48"}, {"question": "In the standard circuit diagram for a cell with internal resistance, a dotted box encloses both the ideal e.m.f. source and the resistor $$r$$. What does this dotted box represent physically, and what appears across its external terminals? (2 steps)", "answer": "- Step 1: The dotted box represents the *real battery* — the combination of the ideal voltage source ($$\\varepsilon$$) and the internal resistance ($$r$$) that cannot be separated. You cannot access the ideal e.m.f. alone; you can only measure what appears at the terminals of the box.\n- Step 2: Across the external terminals of the box (and hence across the load $$R$$) appears the terminal p.d. $$V = \\varepsilon - Ir$$. This is the voltage actually available to the external circuit. The lost volts $$Ir$$ appear *inside* the box, across $$r$$, and are inaccessible externally.\n\nThe dotted box is a visual reminder: \"everything inside is part of the battery; everything outside is the external circuit.\"", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "Why does drawing the largest possible triangle when reading the gradient of the V–I graph reduce uncertainty?", "answer": "The gradient is $$\\Delta V / \\Delta I$$. Each meter reading has a fixed absolute uncertainty (e.g., $$\\pm 1\\,\\mathrm{mV}$$ for the voltmeter, $$\\pm 0.1\\,\\mathrm{mA}$$ for the ammeter). The *percentage* uncertainty in $$\\Delta V$$ and $$\\Delta I$$ shrinks as $$\\Delta V$$ and $$\\Delta I$$ grow. A small triangle gives small differences with large percentage errors; a large triangle gives large differences with small percentage errors. Since gradient uncertainty propagates directly into $$r$$, a bigger triangle gives a more precise value of internal resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Why does a battery's e.m.f. typically slightly decrease over its lifetime even before it's \"dead\"?", "answer": "The e.m.f. depends on the chemical potential difference between the electrode materials. As the battery is used, the chemistry at the electrodes shifts: reactant concentrations drop, byproducts build up, and the electrode surfaces may corrode or passivate. These changes slightly lower the chemical energy released per coulomb of charge transferred, so $$\\varepsilon$$ drifts downward gradually. Simultaneously, $$r$$ tends to *increase* as ionic mobility in the electrolyte drops. A \"dead\" battery is usually one where $$r$$ has grown so large that even modest currents cause terminal p.d. to collapse below useful levels.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "In the worked example from the lesson (June 7), the battery has $$\\varepsilon = 12.5\\,V$$, external $$R = 20.0\\,\\Omega$$, and terminal p.d. $$V = 12.0\\,V$$. Walk through finding the lost volts, current, and internal resistance, explaining how the terminal p.d. is identified in the circuit. (3 steps)", "answer": "- Step 1: **Lost volts** $$= \\varepsilon - V = 12.5 - 12.0 = 0.5\\,V$$. These 0.5 V are dropped across the internal resistance inside the battery.\n- Step 2: **Current**: The terminal p.d. $$V = 12.0\\,V$$ appears across the only external component, the $$20.0\\,\\Omega$$ resistor (Phuc's key question at 50:04 in the lesson — terminal p.d. is across the external load). By Ohm's law: $$I = V/R = 12.0/20.0 = 0.60\\,A$$.\n- Step 3: **Internal resistance**: Lost volts $$= Ir$$, so $$r = Ir/I = 0.5/0.60 \\approx 0.83\\,\\Omega$$. Sense-check: $$V = \\varepsilon - Ir = 12.5 - (0.60)(0.83) = 12.5 - 0.50 = 12.0\\,V$$. ✓\n\nKey lesson point: terminal p.d. is the p.d. across the *external* components. If there is only one external resistor, terminal p.d. is across that resistor.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "Two **identical** cells in parallel: what are $$\\varepsilon_{\\text{tot}}$$ and $$r_{\\text{tot}}$$, and why don't you get double the voltage? (3 steps)", "answer": "- Step 1: Each cell tries to push charges to the same potential. Putting identical cells side by side doesn't change the potential difference between the terminals — it just provides more \"parallel paths\" for charge to flow.\n- Step 2: So $$\\varepsilon_{\\text{tot}} = \\varepsilon$$ — same as one cell. (You'd only get double voltage by stacking them in series, not by paralleling.)\n- Step 3: The internal resistances are in parallel: for $$n$$ identical cells, $$r_{\\text{tot}} = r/n$$. So the network can deliver more current for the same terminal p.d. — useful for high-current applications like a car starter.\n\nCommon exam trap: \"two cells in parallel → 3 V\" is wrong; it's still 1.5 V but with half the internal resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "A student wonders: \"If two cells in parallel give the same voltage, why bother?\" Give the deep reason. (3 steps)", "answer": "- Step 1: Recall that the terminal p.d. delivered to a load is $$V = \\varepsilon - Ir_{tot}$$. The \"weakness\" of a cell under load is governed by $$r_{tot}$$, not just $$\\varepsilon$$.\n- Step 2: Parallel halves (or thirds) the internal resistance, so for the same current $$I$$, the lost volts $$Ir_{tot}$$ are dramatically smaller.\n- Step 3: Practically: a single 1.5 V cell trying to drive 1 A through a 0.5 Ω internal resistance loses 0.5 V (33% of e.m.f.). Three such cells in parallel have $$r_{tot} = 0.17 \\text{ Ω}$$ — same current loses only 0.17 V (11%). The load sees a \"stiffer\" voltage source.\n\nTakeaway: parallel cells = stiffer supply, more current with less voltage sag.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "When a power supply delivers maximum power to a load ($$R = r$$), what fraction of the total power generated by the source is delivered to the load, and why? (3 steps)", "answer": "- Step 1: The total power generated by the source is $$P_{total} = \\varepsilon I$$. This power is split between the load and the internal resistance.\n- Step 2: The power delivered to the load is $$P_{load} = I^2 R$$, and the power wasted internally is $$P_{internal} = I^2 r$$.\n- Step 3: When $$R = r$$, $$P_{load} = P_{internal}$$, meaning exactly half the total power is delivered to the load and half is wasted as heat. Therefore, the efficiency is 50%.", "source": "GLM 5.1 ②", "_id": "glm_2_31"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A cell transfers 6 J of chemical energy to 2 C of charge. A resistor then converts 5 J of electrical energy to heat from the same 2 C. What is the e.m.f. of the cell and the p.d. across the resistor? Explain the energy direction difference. (3 steps)", "answer": "- Step 1: Calculate e.m.f. using $$\\varepsilon = W/Q$$. $$\\varepsilon = 6/2 = 3 V$$. E.m.f. is the energy *gained* by charges from the source (chemical → electrical).\n- Step 2: Calculate p.d. using $$V = W/Q$$. $$V = 5/2 = 2.5 V$$. P.d. is the energy *lost* by charges in the component (electrical → thermal).\n- Step 3: Contrast the direction. E.m.f. \"pushes\" energy into the charges; p.d. measures energy \"pulled out\" of the charges as they do work in the external circuit.\n\nThe energy difference (0.5 J/C) is the \"lost volts\" inside the cell.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Why does a real battery get warm when supplying current, while an ideal voltage source does not? Describe the standard circuit model that accounts for this. (3 steps)", "answer": "- Step 1: Real batteries have physical materials (electrolyte, electrodes) that charges must flow through. These materials have resistance, so some electrical energy is dissipated as thermal energy inside the battery itself ($$P = I^2 r$$).\n- Step 2: An ideal voltage source has zero internal resistance, so no energy is lost inside it and it does not warm up.\n- Step 3: The standard model represents a real battery as an ideal e.m.f. source ($$\\varepsilon$$) in *series* with a small resistor ($$r$$), often enclosed in a dotted box to signify the \"real battery.\"", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Starting from the conservation of energy (Kirchhoff's voltage law) around a single loop containing a cell ($$\\varepsilon$$, $$r$$) and an external load ($$R$$), derive the equation $$\\varepsilon = I(R + r)$$. (3 steps)", "answer": "- Step 1: By conservation of energy, the total energy per coulomb supplied by the cell must equal the total energy per coulomb dissipated in the entire loop (both inside and outside the cell). $$\\varepsilon = \\text{energy/coulomb in } r + \\text{energy/coulomb in } R$$.\n- Step 2: Using Ohm's law ($$V = IR$$), the energy per coulomb dissipated in each resistor is the p.d. across it: $$V_r = Ir$$ and $$V_R = IR$$.\n- Step 3: Substitute these into the conservation equation: $$\\varepsilon = Ir + IR$$. Factor out the current $$I$$ to get $$\\varepsilon = I(r + R)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "A cell has $$\\varepsilon = 10 V$$ and $$r = 1 \\Omega$$. If the current drawn is $$2 A$$, calculate the \"lost volts\" and the terminal p.d. Explain why terminal p.d. is always less than e.m.f. when current flows. (3 steps)", "answer": "- Step 1: Find lost volts across the internal resistance: $$V_{lost} = Ir = 2 \\times 1 = 2 V$$.\n- Step 2: Find terminal p.d. available to the external circuit: $$V = \\varepsilon - Ir = 10 - 2 = 8 V$$.\n- Step 3: Whenever current flows, some energy per coulomb is *always* wasted overcoming the internal resistance ($$Ir$$). Since $$\\varepsilon$$ is fixed, this waste means less energy per coulomb ($$V$$) is available externally. Only when $$I = 0$$ (open circuit) does $$V = \\varepsilon$$.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "In the equation $$\\varepsilon = I(R + r)$$, a student claims that \"large R is the resistance of the battery.\" Identify and correct this misconception. What does each variable actually represent? (3 steps)", "answer": "- Step 1: The student has confused the external and internal resistances. Large $$R$$ is the *external* load resistance (the resistor, lamp, etc. in the main circuit).\n- Step 2: Small $$r$$ is the *internal* resistance of the power supply itself (inside the dotted battery box).\n- Step 3: The equation states that the e.m.f. drives current through the *total* resistance of the loop, which is the sum of the external load plus the internal resistance of the source.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Rearrange $$V = \\varepsilon - Ir$$ into the straight-line form $$y = mx + c$$. Identify what the gradient and y-intercept of a V-I graph represent. (3 steps)", "answer": "- Step 1: The equation is already in the form $$y = mx + c$$, where $$y = V$$ and $$x = I$$.\n- Step 2: Compare $$V = (-r)I + \\varepsilon$$ with $$y = mx + c$$. The y-intercept ($$c$$) is $$\\varepsilon$$ (the e.m.f. when $$I = 0$$).\n- Step 3: The gradient ($$m$$) is $$-r$$. Since $$r$$ is positive, the gradient is *negative* (line slopes downwards), and the magnitude of the gradient gives the internal resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "A student plots a V-I graph and calculates the gradient as $$-5 \\Omega$$. They write \"internal resistance $$r = -5 \\Omega$$.\" Identify and correct the error. (3 steps)", "answer": "- Step 1: The error is reporting internal resistance as a negative value. Resistance is a physical property that always opposes current, so it must be a positive quantity.\n- Step 2: The equation gives gradient $$= -r$$. Therefore, $$r = -(\\text{gradient})$$.\n- Step 3: Since gradient $$= -5 \\Omega$$, $$r = -(-5) = 5 \\Omega$$. The internal resistance is simply the magnitude of the gradient.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "A high-resistance voltmeter is connected across a cell. It reads 1.5 V with the switch open, and 1.2 V with the switch closed. Explain these two readings. (3 steps)", "answer": "- Step 1: Switch open ($$I \\approx 0$$): No current flows, so there are no lost volts ($$Ir = 0$$). The voltmeter reads the full e.m.f.: $$\\varepsilon = 1.5 V$$.\n- Step 2: Switch closed (current flows): Current now flows through the internal resistance, creating lost volts ($$Ir$$).\n- Step 3: The voltmeter now reads terminal p.d.: $$V = \\varepsilon - Ir = 1.2 V$$. The drop of 0.3 V represents the lost volts inside the cell.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "What happens to the terminal p.d. and current if the external resistance $$R$$ of a cell is reduced to zero (a \"short circuit\")? Express the current in terms of $$\\varepsilon$$ and $$r$$. (3 steps)", "answer": "- Step 1: If $$R = 0$$, the terminal p.d. $$V = IR = 0$$. All the e.m.f. is dropped across the internal resistance ($$\\varepsilon = Ir$$).\n- Step 2: The current reaches its maximum possible value, the short-circuit current: $$I_{sc} = \\varepsilon / r$$.\n- Step 3: Conceptually, there is no external resistance to limit the current, so only the small internal resistance $$r$$ restricts the flow. For a car battery ($$r \\approx 0.01 \\Omega$$), this leads to dangerously high currents and overheating.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Two cells, one with $$\\varepsilon_1 = 3V, r_1 = 0.5\\Omega$$ and another with $$\\varepsilon_2 = 4.5V, r_2 = 1\\Omega$$, are connected in series (same polarity). What is the
