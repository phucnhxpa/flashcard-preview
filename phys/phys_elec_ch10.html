tant illumination, the LDR behaves approximately ohmic. But the I-V curve will still curve upward at higher voltages due to self-heating. The degree of curvature depends on how much self-heating occurs. In exam questions, if the LDR is described as self-heating, expect the upward-curving I-V characteristic.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "In the equation $$R = R_0 e^{-k\\theta}$$ for a thermistor, what does each symbol represent, and what does the negative sign in the exponent tell you about the R-T relationship? (2 steps)", "answer": "- Step 1: $$R$$ = resistance at temperature $$\\theta$$ (in °C), $$R_0$$ = resistance at 0°C, $$k$$ = a positive constant (with units K⁻¹ or °C⁻¹) that characterises how quickly resistance falls with temperature, and $$\\theta$$ = temperature. The equation describes an exponential decay of resistance with temperature.\n- Step 2: The negative sign in the exponent ($$-k\\theta$$) means that as $$\\theta$$ increases, the exponent becomes more negative, so $$e^{-k\\theta}$$ becomes smaller, and $$R$$ decreases. This is the mathematical expression of NTC behaviour. If you take natural logs: $$\\ln R = -k\\theta + \\ln R_0$$, which is a straight line with negative gradient when you plot $$\\ln R$$ vs $$\\theta$$ — a useful way to verify the exponential relationship experimentally.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "You are told that a thermistor's resistance follows $$R = R_0 e^{-k\\theta}$$ with $$k \\approx 0.034$$ K⁻¹ and $$R_0 \\approx 13$$ kΩ. Without doing any calculation, explain whether the resistance falls by a larger *absolute* amount between 20°C→40°C or between 60°C→80°C. (3 steps)", "answer": "- Step 1: The exponential function means the *percentage* decrease per degree is constant (each 10°C rise reduces $$R$$ by roughly the same factor). But the *absolute* decrease depends on the starting value.\n- Step 2: At 20°C, the resistance is still relatively high (a few kΩ). A constant percentage of a large number gives a large absolute decrease. At 60°C, the resistance has already fallen significantly (to a smaller value). The same percentage of a smaller number gives a smaller absolute decrease.\n- Step 3: Therefore, the absolute decrease is *larger* between 20°C→40°C than between 60°C→80°C. This is exactly what the R-T graph shows: the curve is steep at low temperatures (large absolute changes) and flattens at high temperatures (small absolute changes). Exponential decay always has this property — the rate of change is proportional to the current value.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "A common exam question asks you to \"explain why resistance decreases\" for a thermistor. List the four mark-scheme points in the correct order. (4 steps)", "answer": "- Step 1: Temperature increases (state the stimulus).\n- Step 2: More electrons are freed from the crystal lattice / number density $$n$$ increases (state the microscopic mechanism).\n- Step 3: In the equation $$I = nqvA$$, the increase in $$n$$ outweighs any decrease in $$v$$ (show you understand the competition between $$n$$ and $$v$$).\n- Step 4: Current $$I$$ increases (for the same voltage), so $$R = V/I$$ decreases (connect back to the macroscopic quantity using the correct formula).\n\nThese four points, in this order, are what examiners are looking for. Skipping step 3 (the $$n$$ vs $$v$$ competition) is the most common way to lose a mark.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "A student sets up a potential divider with $$V_{in} = 9$$ V, a thermistor ($$R_1 = 3.0$$ kΩ at room temperature) on top, and a fixed resistor ($$R_2 = 1.0$$ kΩ) on the bottom. $$V_{out}$$ is across $$R_2$$. Calculate $$V_{out}$$ at room temperature, and state what happens to $$V_{out}$$ when the thermistor is warmed. (3 steps)", "answer": "- Step 1: At room temperature, $$R_1 = 3.0$$ kΩ and $$R_2 = 1.0$$ kΩ. The ratio is 3:1, so the fixed resistor gets 1/(3+1) = 1/4 of the supply voltage.\n- Step 2: $$V_{out} = 9.0 \\times 1.0/(3.0 + 1.0) = 9.0 \\times 0.25 = 2.25$$ V.\n- Step 3: When the thermistor is warmed, its resistance $$R_1$$ decreases. The fraction $$R_2/(R_1 + R_2)$$ increases (the denominator shrinks while the numerator stays the same). So $$V_{out}$$ *increases*. The fixed resistor now claims a larger share of the supply voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "Why is the equation $$I = nqvA$$ described as the \"key to understanding\" why resistance changes in semiconductors, but not particularly insightful for metals? (2 steps)", "answer": "- Step 1: For a semiconductor, the equation reveals that $$n$$ is the *variable that changes most* with temperature or light. The equation makes it clear that increasing $$n$$ (by freeing bound electrons) is the dominant mechanism — this is the *explanation* for why $$R$$ decreases. Without $$I = nqvA$$, you cannot give a microscopic account of semiconductor behaviour.\n- Step 2: For a metal, $$n$$ is essentially constant. The equation tells you that $$I$$ can only change through $$v$$ (since $$n$$, $$q$$, $$A$$ are fixed). But the equation doesn't explain *why* $$v$$ decreases with temperature — you need the additional idea of lattice vibrations causing more collisions. So for metals, $$I = nqvA$$ is necessary but not sufficient; for semiconductors, it is the central explanatory tool.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "A potential divider uses an LDR on top and a fixed resistor on the bottom. The circuit is intended to automatically turn *on* a street lamp when it gets dark. Should the switch be triggered by the voltage across the LDR or across the fixed resistor? Explain. (3 steps)", "answer": "- Step 1: When it gets dark, the LDR's resistance increases (fewer photons → fewer free carriers → higher $$R$$). We need the triggering voltage to be *high* in the dark.\n- Step 2: If we measure across the LDR (on top, as $$R_1$$): $$V_{LDR} = V_{in} \\times R_1/(R_1 + R_2)$$. When it's dark, $$R_1$$ is large, so the fraction is large, and $$V_{LDR}$$ is high. ✓\n- Step 3: If we measure across the fixed resistor (on bottom, as $$R_2$$): $$V_{out} = V_{in} \\times R_2/(R_1 + R_2)$$. When it's dark, $$R_1$$ is large, so the fraction is *small*, and $$V_{out}$$ is low. ✗ So the switch should be triggered by the voltage across the **LDR** — it goes high in the dark, which is exactly when we want the lamp to turn on.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}, {"question": "A student says: \"When you increase the voltage across a thermistor, the resistance decreases because voltage and resistance are inversely proportional.\" Identify the flaw in this reasoning. (3 steps)", "answer": "- Step 1: Voltage and resistance are *not* generally inversely proportional. The relationship $$R = V/I$$ is a *definition*, not a proportionality — changing $$V$$ does not necessarily change $$R$$ (for an ohmic component, $$R$$ is constant regardless of $$V$$).\n- Step 2: The real reason the thermistor's resistance decreases at higher voltage is *indirect*: higher voltage → higher current → more power dissipated ($$P = IV$$) → thermistor self-heats → temperature rises → $$n$$ increases → $$R$$ decreases. The voltage itself doesn't directly change the resistance; it's the *temperature change caused by the power dissipation* that changes the resistance.\n- Step 3: The student's error is confusing correlation with causation. Yes, higher voltage correlates with lower resistance in a thermistor, but the causal chain goes through temperature. This is why exam marks require you to state the mechanism (temperature → $$n$$ → $$R$$), not just the mathematical relationship.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "If you halve the cross-sectional area of a wire (same material, same current), what happens to the drift velocity? Explain using $$I = nqvA$$. (2 steps)", "answer": "- Step 1: From $$I = nqvA$$, if the current $$I$$ is the same, the material is the same (same $$n$$ and $$q$$), and the area $$A$$ is halved, then the drift velocity $$v$$ must double to compensate.\n- Step 2: This makes physical sense: the same number of charge carriers must pass through a narrower \"pipe\" each second, so they must move faster. Think of water flowing through a pipe — if you squeeze the pipe to half its area, the water speed doubles to maintain the same flow rate. This is why thinner wires of the same material carrying the same current have higher drift velocities (and also higher resistance, since $$R \\propto 1/A$$).", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": true}], "count": 52}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "Derive the current equation $$I = nqvA$$ from first principles by considering charge carriers drifting through a conductor of cross-sectional area $$A$$. Walk through each physical step. (5 steps)", "answer": "- Step 1: Imagine a conductor with cross-sectional area $$A$$. Free charge carriers (each carrying charge $$q$$) drift with mean velocity $$v$$. In a small time interval $$\\Delta t$$, each carrier travels a distance $$v \\Delta t$$.\n- Step 2: The volume of conductor \"swept\" by these carriers in time $$\\Delta t$$ is a slab of area $$A$$ and length $$v\\Delta t$$, so volume swept $$= A \\cdot v\\Delta t$$.\n- Step 3: Since there are $$n$$ carriers per cubic metre, the number of carriers in that swept volume is $$n \\cdot A \\cdot v\\Delta t$$. Each carries charge $$q$$, so the total charge passing through the cross-section in time $$\\Delta t$$ is $$\\Delta Q = n q v A \\Delta t$$.\n- Step 4: Current is defined as charge per unit time: $$I = \\frac{\\Delta Q}{\\Delta t} = \\frac{n q v A \\Delta t}{\\Delta t}$$\n- Step 5: The $$\\Delta t$$ cancels, giving $$I = nqvA$$. This equation reveals that current depends on *how many* carriers exist ($$n$$), *how much charge* each carries ($$q$$), *how fast* they drift ($$v$$), and *how thick* the conductor is ($$A$$).\n\nThe power of this equation: in a semiconductor, $$n$$ can change dramatically with temperature or light — that is the entire basis for thermistor and LDR behaviour.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "In the equation $$I = nqvA$$, which two quantities are effectively fixed for a given piece of material in a given circuit, and which two can vary when temperature or illumination changes? Explain why. (2 steps)", "answer": "- Step 1: The charge per carrier $$q$$ is a fundamental constant (e.g. $$1.60 \\times 10^{-19}$$ C for an electron — it never changes). The cross-sectional area $$A$$ is fixed by the physical geometry of the component. So $$q$$ and $$A$$ are constants for a given device.\n- Step 2: The number density $$n$$ (carriers per m³) and the drift velocity $$v$$ are the variables. In a metal, $$n$$ is essentially fixed but $$v$$ changes with temperature. In a semiconductor, $$n$$ changes dramatically (with temperature or light), and $$v$$ also changes slightly — but the change in $$n$$ dominates.\n\nThis split — fixed ($$q, A$$) vs. variable ($$n, v$$) — is what makes $$I = nqvA$$ the master key for explaining why resistance behaves differently in metals vs. semiconductors.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "A copper wire and a silicon thermistor are both heated. Using $$I = nqvA$$, explain why copper's resistance *increases* while the thermistor's resistance *decreases*. Focus on which variable changes in each case and why. (3 steps)", "answer": "- Step 1: In copper (a metal), $$n$$ is already enormous ($$\\approx 8.4 \\times 10^{28}$$ m⁻³, roughly one free electron per atom) and barely changes when heated. But heating makes lattice ions vibrate more, increasing electron–ion collisions, which *reduces* the drift velocity $$v$$. Since $$n$$ and $$v$$ are the only variables and $$n$$ is fixed, a drop in $$v$$ means $$I$$ drops — so $$R = V/I$$ *increases*.\n- Step 2: In the silicon thermistor (a semiconductor), $$n$$ is initially very small because most electrons are locked in covalent bonds. Heating provides thermal energy that frees more electrons from the lattice, so $$n$$ *increases sharply* (approximately exponentially). Although $$v$$ decreases slightly due to more scattering, the huge increase in $$n$$ far outweighs the small decrease in $$v$$.\n- Step 3: The net effect in the semiconductor: $$I = nqvA$$ increases because the $$n$$-increase dominates, so for the same voltage, $$R = V/I$$ *decreases*. In the metal, $$I$$ decreases because only $$v$$ changes (decreasing), so $$R$$ *increases*. These are opposite behaviours — the single most tested distinction in this topic.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "Copper has approximately $$n \\approx 8.4 \\times 10^{28}$$ free electrons per m³. Physically, where does this enormous number come from, and why does it mean $$n$$ is essentially \"locked\" and cannot increase further with temperature? (2 steps)", "answer": "- Step 1: In copper, each atom contributes roughly one free (conduction) electron to the \"electron sea.\" Copper's atomic density is about $$8.4 \\times 10^{28}$$ atoms per m³, so there is one free electron per atom. This is an intrinsic property of the metallic bond — the outermost electron is so loosely bound that it delocalises completely.\n- Step 2: Because every available electron is *already* free at any practical temperature, raising the temperature cannot free \"more\" electrons — there are no more to free. The metal is already \"fully ionised\" in terms of its conduction electrons. So $$n$$ is effectively a fixed constant, and the only way temperature affects current is through changing $$v$$ (more collisions → slower drift → less current → higher resistance).", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "In a semiconductor at low temperature, most electrons are \"locked into covalent bonds.\" What does this mean physically, and how does thermal energy change the situation? (3 steps)", "answer": "- Step 1: In a semiconductor like silicon, each atom forms four covalent bonds with neighbouring atoms. The electrons in these bonds are shared between atoms and are *not* free to move through the lattice — they are localised. At low temperature, almost all electrons are in this bound state, so the number density of free carriers $$n$$ is very small (many orders of magnitude below a metal).\n- Step 2: When thermal energy is supplied (temperature rises), some bound electrons gain enough kinetic energy to break free from their covalent bonds. They become delocalised conduction electrons, free to drift when a voltage is applied. Each freed electron increases $$n$$ by one.\n- Step 3: The number of freed electrons increases approximately *exponentially* with absolute temperature. This means even a modest temperature rise causes a dramatic increase in $$n$$. For example, going from 20°C to 100°C can reduce a thermistor's resistance by a factor of ~10, because $$n$$ has increased by roughly that factor.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "An LDR is made from cadmium sulfide (CdS), a semiconductor. In darkness, its resistance can be several MΩ. Explain the microscopic mechanism by which incident light reduces its resistance, referencing $$I = nqvA$$. (3 steps)", "answer": "- Step 1: In darkness, almost all electrons in the CdS lattice are bound in covalent bonds — $$n$$ is very small, so the LDR's resistance is very high (several MΩ). There are very few free carriers available to carry current.\n- Step 2: When photons of light strike the semiconductor surface, their energy is absorbed by the lattice. If a photon has enough energy, it can transfer that energy to a bound electron, giving it enough to escape the covalent bond and become a free conduction electron.\n- Step 3: More light intensity means more photons per second arriving, which frees more electrons per second, so $$n$$ increases. From $$I = nqvA$$, with $$n$$ increased and $$q$$, $$v$$, $$A$$ roughly the same or only slightly changed, the current $$I$$ increases for the same applied voltage. Therefore $$R = V/I$$ *decreases*. In bright light, $$n$$ is large enough that $$R$$ falls to a few hundred ohms.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "When a semiconductor is heated, the number density $$n$$ increases but the drift velocity $$v$$ also decreases (more lattice scattering). Why does the resistance still *go down*? What would happen if $$v$$ decreased by the same *factor* as $$n$$ increased? (3 steps)", "answer": "- Step 1: In $$I = nqvA$$, both $$n$$ and $$v$$ change with temperature, but they change on very different scales. The number density $$n$$ increases approximately *exponentially* with temperature — it can double, triple, or increase tenfold over a modest temperature range. Meanwhile, $$v$$ only decreases slightly (around by a few percent) because the increased lattice scattering modestly impedes the carriers.\n- Step 2: The product $$n \\times v$$ therefore *increases* overall — the huge multiplicative increase in $$n$$ swamps the small fractional decrease in $$v$$. So $$I$$ increases, and $$R = V/I$$ decreases.\n- Step 3: If $$v$$ decreased by the same *factor* as $$n$$ increased (e.g. $$n$$ doubles and $$v$$ halves), then $$n \\times v$$ would stay constant, and resistance would not change. This is approximately what happens in a *doped* carbon resistor — the increase in $$n$$ and decrease in $$v$$ roughly balance, giving nearly constant resistance over a wide temperature range. But in a pure NTC thermistor, the exponential rise of $$n$$ always dominates.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "An NTC thermistor is described as having a \"negative temperature coefficient.\" Break down what each word means and why the name is appropriate. (2 steps)", "answer": "- Step 1: \"Temperature coefficient\" describes the *direction* of change of resistance with temperature. A *positive* coefficient means resistance goes *up* when temperature goes up (like a metal). A *negative* coefficient means resistance goes *down* when temperature goes up.\n- Step 2: \"NTC\" stands for \"Negative Temperature Coefficient.\" The name is appropriate because in this thermistor, raising the temperature frees more charge carriers ($$n$$ increases sharply), which increases current and therefore *decreases* resistance. The coefficient (direction of change) is negative — resistance and temperature change in *opposite* directions.\n\nMemory aid: \"NTC = Negative = resisTance goes down when Temperature goes up.\"", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A student claims: \"When a thermistor heats up, its resistance decreases because the electrons move faster.\" Using the $$I = nqvA$$ framework, identify what is correct and what is wrong in this statement. (3 steps)", "answer": "- Step 1: The conclusion (resistance decreases) is correct, but the reason given is wrong. The student says \"electrons move faster\" — meaning higher drift velocity $$v$$. In reality, when a semiconductor heats up, the lattice ions vibrate more, causing *more* collisions with charge carriers. This *reduces* the mean drift velocity $$v$$, not increases it.\n- Step 2: The correct reason the resistance decreases is that $$n$$ increases sharply (more electrons are freed from covalent bonds by thermal energy). The increase in $$n$$ is the dominant effect. Even though $$v$$ decreases slightly, the product $$n \\times v$$ increases overall, so $$I$$ increases.\n- Step 3: So the correct statement is: \"When a thermistor heats up, its resistance decreases because the number density of free charge carriers $$n$$ increases sharply — this dominates over the slight decrease in drift velocity $$v$$.\" The student confused the roles of $$n$$ and $$v$$.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "The R–temperature graph for an NTC thermistor is a decreasing curve that starts steep and then flattens. Why isn't it a straight line, and why does it flatten at higher temperatures? (3 steps)", "answer": "- Step 1: The number density $$n$$ increases approximately *exponentially* with absolute temperature. Since $$R \\propto 1/n$$ (roughly), resistance decreases in a way that mirrors this exponential increase — it drops very rapidly at first.\n- Step 2: The curve is steep at low temperatures because each degree of heating frees a large *fraction* of the remaining bound electrons. At low T, most electrons are still bound, so each temperature increment frees a significant proportion of them, causing a large drop in R.\n- Step 3: At higher temperatures, most of the easily-freed electrons are already in the conduction band. Further temperature increases free fewer *additional* electrons per degree, so the rate of resistance decrease slows down — the curve flattens. It is not a straight line because the underlying mechanism (freeing bound electrons) is inherently exponential, not linear.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "The I–V characteristic of a thermistor curves *upward* (increasing gradient) compared to the straight line of an ohmic resistor. Explain the self-reinforcing mechanism that causes this shape. (3 steps)", "answer": "- Step 1: When a small voltage is applied, a small current flows, and little power is dissipated ($$P = IV$$). The thermistor stays near room temperature, so $$n$$ is modest and $$R$$ is relatively high. The gradient $$\\Delta I / \\Delta V = 1/R$$ is small.\n- Step 2: As voltage increases, more current flows and more power is dissipated as heat in the thermistor ($$P = I^2 R$$). This raises the thermistor's temperature, which frees more electrons, increasing $$n$$, which *decreases* $$R$$.\n- Step 3: With lower $$R$$, the next increment of voltage produces an even larger increment of current (since $$\\Delta I = \\Delta V / R$$, and $$R$$ is now smaller). So the gradient of the I–V curve *increases* — the curve bends upward away from the ohmic straight line. This is a self-reinforcing cycle: more V → more heating → lower R → even more I for the same ΔV.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "The I–V characteristic of a thermistor is symmetric about the origin (it looks the same in the third quadrant as in the first). Why is this, and how does this distinguish it from a semiconductor diode? (2 steps)", "answer": "- Step 1: A thermistor is simply a piece of semiconductor material with two terminals. It has no junction (no p–n boundary). Whether the applied voltage is positive or negative, the mechanism is the same: current flows, power is dissipated, the material heats up, $$n$$ increases, $$R$$ decreases, and the gradient increases. The physics is direction-independent, so the curve is symmetric.\n- Step 2: A semiconductor diode, by contrast, has a p–n junction that allows current easily in one direction (forward bias) but blocks it in the other (reverse bias). Its I–V curve is highly asymmetric. The thermistor's symmetry tells you it is a *non-directional, non-ohmic* component — it doesn't care about polarity, but its resistance does change with operating conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "Sketch the R–illumination curve for an LDR and explain its shape. Why is it described as \"hyperbolic\" and what are the approximate resistance values at the extremes? (2 steps)", "answer": "- Step 1: The curve starts very high on the left (darkness: R ≈ several MΩ) and decreases as illumination increases, falling to roughly a few hundred ohms in bright light. The curve drops steeply at first (low light levels free the first electrons, making a large fractional change in the tiny initial $$n$$), then the rate of decrease slows at higher illumination.\n- Step 2: The shape resembles a hyperbola because resistance is approximately inversely proportional to the number of free carriers ($$R \\propto 1/n$$), and $$n$$ increases roughly proportionally with light intensity (more photons → more freed electrons). If $$n \\propto E$$ (illumination), then $$R \\propto 1/E$$, which gives a hyperbolic curve. The curve never reaches zero because there is always some residual resistance from the semiconductor material itself.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "A metal wire and an NTC thermistor are both at 20°C. Their temperatures are raised to 100°C. For each component, state: (a) what happens to $$n$$, (b) what happens to $$v$$, (c) what happens to $$R$$. (3 steps)", "answer": "- Step 1: **Metal (e.g. copper):** (a) $$n$$ is fixed — already one free electron per atom, no more to free. (b) $$v$$ decreases — lattice ions vibrate more, more collisions, electrons drift more slowly. (c) Since $$I = nqvA$$ and only $$v$$ changes (decreasing), $$I$$ decreases for the same voltage, so $$R$$ *increases*.\n- Step 2: **NTC thermistor:** (a) $$n$$ increases sharply — thermal energy frees many more electrons from covalent bonds (approximately exponential increase). (b) $$v$$ decreases slightly — same lattice scattering argument as the metal, but the effect is modest.\n- Step 3: (c) In the thermistor, the huge increase in $$n$$ dominates over the slight decrease in $$v$$, so $$n \\times v$$ increases overall. From $$I = nqvA$$, current $$I$$ increases for the same voltage, so $$R$$ *decreases*. Summary: metal → R up (PTC); thermistor → R down (NTC). Opposite behaviours.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Define \"positive temperature coefficient\" (PTC) and \"negative temperature coefficient\" (NTC). Give a real-world example of each, and state which one describes a typical metal and which describes a typical thermistor. (2 steps)", "answer": "- Step 1: A **PTC** material has resistivity that *increases* with increasing temperature. The coefficient is \"positive\" because the change in resistivity is in the same direction as the change in temperature. Example: copper wire — as it heats, lattice vibrations impede electron flow, so resistance rises. All pure metals are PTC.\n- Step 2: An **NTC** material has resistivity that *decreases* with increasing temperature. The coefficient is \"negative\" because resistivity changes in the opposite direction to temperature. Example: an NTC thermistor (metal-oxide ceramic) — as it heats, more charge carriers are freed, so resistance falls. Most common thermistors are NTC. Note: PTC thermistors also exist (through doping), but are not the standard exam focus.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "A typical NTC thermistor has R ≈ 706 Ω at 20°C and R ≈ 74 Ω at 100°C. An LDR has R ≈ several MΩ in darkness and R ≈ a few hundred Ω in bright light. What do these ranges reveal about the *sensitivity* of each sensor, and in what situations would you choose one over the other? (2 steps)", "answer": "- Step 1: The thermistor's resistance changes by a factor of about 10× over an 80°C range (706→74 Ω). The LDR's resistance changes by a factor of about 10,000× from dark to bright (MΩ → hundreds of Ω). Both are highly sensitive, but the LDR has an even larger dynamic range. This makes the LDR excellent for on/off light switching (street lamps) and the thermistor excellent for temperature measurement and control.\n- Step 2: You would choose a thermistor when the stimulus is *temperature* (thermostats, ovens, fire alarms, digital thermometers). You would choose an LDR when the stimulus is *light* (automatic street lights, burglar alarms, camera exposure meters). The key design principle: match the sensor whose resistance changes in response to the quantity you want to detect.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Derive the potential-divider formula $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$ for two resistors $$R_1$$ and $$R_2$$ in series with a supply voltage $$V_{in}$$, where $$V_{out}$$ is measured across $$R_2$$. (4 steps)", "answer": "- Step 1: Two resistors $$R_1$$ and $$R_2$$ are in series across a supply $$V_{in}$$. The same current $$I$$ flows through both (series circuit: current is the same everywhere).\n- Step 2: By Ohm's law, the total resistance is $$R_{total} = R_1 + R_2$$, so the circuit current is $$I = \\frac{V_{in}}{R_1 + R_2}$$.\n- Step 3: The voltage across $$R_2$$ is found by Ohm's law again: $$V_{out} = I \\times R_2 = \\frac{V_{in}}{R_1 + R_2} \\times R_2$$.\n- Step 4: Rearranging: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$. This shows that $$V_{out}$$ is a *fraction* of $$V_{in}$$ — the fraction depends on the ratio of $$R_2$$ to the total resistance. If $$R_2$$ is a large fraction of the total, $$V_{out}$$ is large; if $$R_2$$ is a small fraction, $$V_{out}$$ is small.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "In a potential-divider sensor circuit, a thermistor is placed as $$R_1$$ (top) and a fixed resistor as $$R_2$$ (bottom), with $$V_{out}$$ measured across $$R_2$$. When temperature rises, does $$V_{out}$$ increase or decrease? Walk through the logic two different ways. (4 steps)", "answer": "- Step 1: **Using the formula:** When temperature rises, the thermistor's resistance $$R_1$$ decreases. From $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$, the numerator $$R_2$$ is fixed, but the denominator $$R_1 + R_2$$ decreases (since $$R_1$$ is smaller). So the fraction $$\\frac{R_2}{R_1+R_2}$$ *increases*, and $$V_{out}$$ *increases*.\n- Step 2: **Using first principles (current route):** As $$R_1$$ decreases, the total circuit resistance $$R_1 + R_2$$ decreases. With $$V_{in}$$ fixed, the current $$I = V_{in}/(R_1+R_2)$$ *increases*. Since $$V_{out} = I \\times R_2$$ and both $$I$$ and $$R_2$$ are now larger (well, $$I$$ is larger and $$R_2$$ is the same), $$V_{out}$$ *increases*.\n- Step 3: **Intuitive check:** The thermistor is \"giving up\" its share of the voltage — its resistance dropped, so it takes less voltage, leaving more for $$R_2$$.\n- Step 4: Key result: sensor on top, $$V_{out}$$ across the fixed resistor → $$V_{out}$$ *rises* when temperature rises. This is the standard configuration for a temperature-rising alarm.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "In the same potential-divider circuit (thermistor as $$R_1$$ on top, fixed $$R_2$$ on bottom, $$V_{out}$$ across $$R_2$$), what happens to the voltage *across the thermistor itself* when temperature rises? Many students get this wrong — explain carefully. (3 steps)", "answer": "- Step 1: The supply voltage is shared: $$V_{in} = V_{R1} + V_{R2}$$. When temperature rises, $$R_1$$ (thermistor) decreases, and we established that $$V_{out} = V_{R2}$$ *increases*.\n- Step 2: Since $$V_{in}$$ is fixed and $$V_{R2}$$ increases, the voltage across the thermistor $$V_{R1} = V_{in} - V_{R2}$$ must *decrease*. The thermistor takes a smaller share of the supply voltage because its resistance is now a smaller fraction of the total.\n- Step 3: Common trap: students assume that because the *current* through the thermistor increases, the voltage across it must increase. But $$V_{R1} = I \\times R_1$$, and while $$I$$ increases, $$R_1$$ decreases by a larger *factor*. The net effect is that $$V_{R1}$$ decreases. Always think in terms of voltage sharing (proportional to resistance fraction), not just current.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "You want a potential-divider circuit where $$V_{out}$$ *decreases* when temperature rises (e.g. to trigger a cooling system at high temperature). How should you rearrange the components compared to the standard configuration? (2 steps)", "answer": "- Step 1: In the standard configuration, the thermistor is on top ($$R_1$$) and $$V_{out}$$ is across the fixed resistor ($$R_2$$) at the bottom — this gives $$V_{out}$$ *increasing* with temperature. To reverse the behaviour, swap the positions: put the *fixed resistor* on top ($$R_1$$) and the *thermistor* on the bottom ($$R_2$$), with $$V_{out}$$ still measured across the bottom component.\n- Step 2: Now $$V_{out} = V_{in} \\times \\frac{R_{therm}}{R_{fixed} + R_{therm}}$$. When temperature rises, $$R_{therm}$$ decreases, so the fraction $$\\frac{R_{therm}}{R_{fixed} + R_{therm}}$$ decreases, and $$V_{out}$$ *decreases*. The output voltage now moves in the *same* direction as the thermistor's resistance (both decrease), giving the desired inverted response.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "An LDR is used in a potential divider to control a street lamp that should turn ON when it gets dark. The LDR is placed as $$R_1$$ (top) and the fixed resistor as $$R_2$$ (bottom). Should the switching circuit monitor $$V_{out}$$ across $$R_2$$ or across the LDR? Explain. (3 steps)", "answer": "- Step 1: When it gets dark, the LDR's resistance *increases* (fewer photons → fewer free electrons → higher $$R$$). We want the lamp to turn ON, so we need the monitored voltage to *cross a threshold upward* when it gets dark.\n- Step 2: If we monitor across the fixed resistor $$R_2$$: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$. When it gets dark, $$R_1$$ (LDR) increases, so the denominator increases and the fraction *decreases*. $$V_{out}$$ across $$R_2$$ goes *down*. This would not trigger the lamp.\n- Step 3: If we monitor across the LDR ($$R_1$$): $$V_{LDR} = V_{in} \\times \\frac{R_1}{R_1 + R_2}$$. When it gets dark, $$R_1$$ increases, so both numerator and the LDR's share of the total increase. $$V_{LDR}$$ goes *up*. This rising voltage can trigger the switching circuit to turn the lamp ON. Alternatively, swap the LDR to the bottom position and monitor across the fixed resistor — same effect.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "A student calculates resistance as $$R = I \\times V$$ and gets 0.009 Ω for $$V = 3$$ V, $$I = 3$$ mA. Identify the error, state the correct formula, and calculate the correct resistance. (3 steps)", "answer": "- Step 1: The error is using $$R = IV$$, which is physically wrong. Resistance is defined as voltage *divided by* current, not voltage *times* current. The student has inverted the relationship.\n- Step 2: The correct formula is $$R = \\frac{V}{I}$$. This comes directly from Ohm's law rearranged: $$V = IR$$, so $$R = V/I$$. Writing $$R = IV$$ would give units of V·A = W (watts, power), not Ω (ohms, resistance).\n- Step 3: Correct calculation: $$R = \\frac{V}{I} = \\frac{3.0}{3.0 \\times 10^{-3}} = 1000$$ Ω. The student's answer of 0.009 Ω is off by a factor of over 100,000 — a catastrophic error that always results from using $$R = IV$$ instead of $$R = V/I$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "A student writes: \"When the thermistor heats up, it changes the current in the circuit, which causes the voltage to change.\" An examiner would deduct marks for this. What is wrong with this chain of reasoning, and what should the student have said? (3 steps)", "answer": "- Step 1: The student's chain starts with \"changes the current\" — but the *first* thing that changes is the *resistance*, not the current. The thermistor is a *resistive* sensor: its defining property is that its resistance changes in response to a stimulus (temperature or light).\n- Step 2: The correct causal chain is: stimulus (temperature rises) → number density $$n$$ increases → resistance $$R$$ changes (decreases) → *then* current changes (by Ohm's law, $$I = V/R$$) → *then* voltages in the circuit redistribute. The resistance change is the *cause*; the current change is a *consequence*.\n- Step 3: Examiners explicitly look for the statement \"resistance decreases/increases\" as the first step. If you skip it and go straight to \"current changes,\" you lose the mechanism mark. Always start your answer with the resistance change, then explain the consequences.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "A student claims that in a series circuit with a thermistor, \"the thermistor uses up some of the electrons, so fewer come out than go in.\" Explain why this is fundamentally wrong, and state what actually happens to charge and energy. (2 steps)", "answer": "- Step 1: This is a misconception — charge is *conserved*. In a series circuit, the current is the same at every point. Electrons are not \"used up,\" \"stored,\" or \"consumed\" by any component. The same number of electrons per second flows through the thermistor as through every other part of the circuit. What the thermistor *does* is impede the flow (resistance), reducing the *rate* of flow (current) *everywhere* in the series circuit equally.\n- Step 2: What the component *does* transfer is *energy*. As electrons pass through the thermistor, they lose electrical potential energy (voltage drops across the component), which is converted to heat. The electrons emerge with less energy but the same number. Think of it like a turnstile: everyone who enters also exits, but they've all been slowed down.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "A copper wire with cross-sectional area $$A = 1.0 \\times 10^{-6}$$ m² carries a current of 10 A. With $$n = 8.4 \\times 10^{28}$$ m⁻³ and $$q = 1.6 \\times 10^{-19}$$ C, the drift velocity works out to roughly 0.7 mm/s. Why is this so remarkably slow, and how does this reconcile with the fact that when you flip a switch, the light turns on almost instantly? (3 steps)", "answer": "- Step 1: The drift velocity is the *average net forward speed* of individual electrons through the lattice. It is slow because there are an enormous number of free electrons ($$n$$ is huge), so even a tiny drift speed for each one collectively produces a large current. From $$I = nqvA$$, with $$n \\approx 10^{29}$$, you only need $$v \\approx 10^{-3}$$ m/s to get 10 A.\n- Step 2: The reason the light turns on instantly is that the *electric field* (signal) propagates through the circuit at close to the speed of light ($$\\sim 3 \\times 10^8$$ m/s). When you close the switch, the electric field is established throughout the entire circuit almost instantaneously, and *all* electrons everywhere start drifting simultaneously.\n- Step 3: Analogy: imagine a long pipe full of water. When you turn on the tap at one end, water comes out the other end almost immediately — not because water travelled the length of the pipe, but because the *pressure wave* (analogous to the electric field) propagated through the already-present water. The electrons were already there; the field just made them all start moving at once.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "The number density $$n$$ in a semiconductor increases \"approximately exponentially\" with absolute temperature. Qualitatively, what does \"exponentially\" mean here, and why does it produce such a steep R–T curve? (2 steps)", "answer": "- Step 1: \"Exponentially\" means that each equal step up in temperature causes the *same fractional* (percentage) increase in $$n$$, not the same *absolute* increase. For example, if $$n$$ doubles for every 10 K rise, then going from 100 to 110 K might double $$n$$ from 10 to 20, but going from 200 to 210 K would double $$n$$ from 160 to 320. The *rate of increase accelerates* as $$n$$ gets larger.\n- Step 2: Since $$R \\propto 1/n$$ (roughly), an exponential increase in $$n$$ means $$R$$ drops very rapidly at first (when the fractional change in $$n$$ per degree is large relative to the current value) and then the *rate* of R-decrease slows as you approach higher temperatures (the curve flattens). This is exactly the shape of the NTC thermistor's R–T curve: steep drop at low T, flattening at high T. The exponential relationship between $$n$$ and $$T$$ is the root cause.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "When investigating the I–V characteristic of a thermistor, the experimenter must wait at least 5 minutes after switching off the power supply before reversing the connections and repeating the measurements. Why is this waiting period essential? (2 steps)", "answer": "- Step 1: During the first set of measurements, the current flowing through the thermistor dissipates power as heat ($$P = I^2 R$$), raising the thermistor's temperature above room temperature. This elevated temperature means $$n$$ is higher and $$R$$ is lower than they would be at room temperature.\n- Step 2: If you immediately reverse the connections and take new readings, the thermistor is still warm from the first run, so the data will not represent the component's behaviour at room temperature — it will show an artificially high current (low resistance) for each voltage. Waiting 5 minutes allows the thermistor to cool back to ambient temperature, ensuring the second set of readings is a fair test of the same initial conditions. Without this, the two halves of the I–V curve would be asymmetric.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "At room temperature, glass is an excellent electrical insulator. However, when heated until it glows red hot, it can conduct electricity well enough to light a lamp. Explain this using the $$I = nqvA$$ framework. (2 steps)", "answer": "- Step 1: At room temperature, glass has an extremely small $$n$$ — virtually all electrons are tightly bound in the lattice, with no free carriers. With $$n \\approx 0$$, even a large voltage produces negligible current ($$I = nqvA \\approx 0$$), so it behaves as an insulator.\n- Step 2: At very high temperature, the thermal energy is so large that it can break electrons free from even the strongest bonds in the glass lattice. $$n$$ increases dramatically — the material transitions from insulator to conductor. Once current flows, the power dissipated ($$P = I^2 R$$) can maintain the high temperature, and the glass continues conducting even after the external heat source is removed. This demonstrates that the boundary between \"insulator\" and \"semiconductor\" is temperature-dependent — at extreme temperatures, even insulators can conduct.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "The textbook mentions that PTC (positive temperature coefficient) semiconductors also exist, and that some doped semiconductors can even have roughly *constant* resistance over a temperature range. How is this possible given that $$n$$ always increases with temperature in a semiconductor? (2 steps)", "answer": "- Step 1: In a pure semiconductor, $$n$$ increases with temperature and this dominates, giving NTC behaviour. But in a *doped* semiconductor, impurity atoms are deliberately added (e.g. arsenic in silicon). These impurities provide extra free carriers even at low temperature, so the starting value of $$n$$ is much higher than in a pure semiconductor.\n- Step 2: In some doped materials, the increase in $$n$$ with temperature is modest (many carriers are already free from the dopant atoms), and the increased lattice scattering (which reduces $$v$$) becomes significant by comparison. If the increase in $$n$$ and decrease in $$v$$ happen to balance, $$n \\times v$$ stays roughly constant, and $$R$$ barely changes. Carbon resistors are an example — they are made from a form of doped semiconductor/graphite mixture and maintain approximately constant resistance over a practical temperature range. In a PTC semiconductor, the $$v$$-decrease actually dominates over the $$n$$-increase, giving rising resistance with temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "A thermistor (as $$R_1$$) and a fixed resistor $$R_2 = 100\\,\\Omega$$ form a potential divider with $$V_{in} = 9.0$$ V. At 20°C, the thermistor has $$R_1 = 200\\,\\Omega$$. At 60°C, $$R_1 = 50\\,\\Omega$$. Calculate $$V_{out}$$ across $$R_2$$ at each temperature and state the direction of change. (3 steps)", "answer": "- Step 1: Use the potential-divider formula: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$. At 20°C: $$V_{out} = 9.0 \\times \\frac{100}{200 + 100} = 9.0 \\times \\frac{100}{300} = 9.0 \\times \\frac{1}{3} = 3.0$$ V.\n- Step 2: At 60°C: $$V_{out} = 9.0 \\times \\frac{100}{50 + 100} = 9.0 \\times \\frac{100}{150} = 9.0 \\times \\frac{2}{3} = 6.0$$ V.\n- Step 3: As temperature rises from 20°C to 60°C, the thermistor's resistance drops from 200 Ω to 50 Ω, and $$V_{out}$$ across the fixed resistor *increases* from 3.0 V to 6.0 V. The output rose because the thermistor now takes a smaller fraction of the supply voltage, leaving a larger fraction for $$R_2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "An examiner shows you four I–V graphs: (A) a curve bending *upward* from a straight line (increasing gradient), (B) a straight line through the origin, (C) a curve bending *below* a straight line (decreasing gradient), (D) a curve that only conducts in one direction. Which represents an NTC thermistor? Explain your reasoning. (2 steps)", "answer": "- Step 1: The answer is **(A)** — a curve with increasing gradient. As voltage increases, more power is dissipated in the thermistor, its temperature rises, $$n$$ increases, $$R$$ decreases, and the gradient ($$\\Delta I/\\Delta V = 1/R$$) *increases*. The curve bends upward away from the ohmic straight line.\n- Step 2: Eliminating the others: (B) is a fixed ohmic resistor (constant $$R$$, constant gradient). (C) is a filament lamp — as current increases, the metal filament heats up, $$R$$ increases, and the gradient *decreases* (opposite of a thermistor). (D) is a diode — it only conducts in one direction (asymmetric), unlike a thermistor which is symmetric. The thermistor's curve looks like (A) in both quadrants.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "An LDR is connected as $$R_2$$ (bottom) in a potential divider with a fixed resistor $$R_1 = 8.0$$ kΩ on top and $$V_{in} = 12$$ V. In daylight, the LDR resistance is about 800 Ω. As it gets darker, explain step-by-step why the power dissipated in the fixed resistor $$R_1$$ *decreases*. (4 steps)", "answer": "- Step 1: As it gets darker, fewer photons hit the LDR semiconductor. Fewer electrons are freed from the lattice, so $$n$$ decreases. From $$I = nqvA$$ (applied to the LDR), the LDR's ability to conduct decreases, so $$R_{LDR}$$ *increases*.\n- Step 2: The total circuit resistance is $$R_{total} = R_1 + R_{LDR}$$. Since $$R_{LDR}$$ increases, $$R_{total}$$ *increases*.\n- Step 3: With $$V_{in}$$ fixed, the circuit current $$I = V_{in}/R_{total}$$ *decreases* (Ohm's law: more total resistance means less current from the same supply).\n- Step 4: The power dissipated in the fixed resistor is $$P = I^2 R_1$$. Since $$I$$ has decreased and $$R_1$$ is constant, $$P$$ *decreases*. Note: you could also reason that less current means less voltage across $$R_1$$ ($$V_1 = IR_1$$), and $$P = V_1^2/R_1$$ also decreases. Either route reaches the same conclusion.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "A student measures a current of 3.00 mA and a voltage of 3.00 V across a thermistor. They calculate resistance as $$R = \\frac{3.00}{3.00} = 1.0\\,\\Omega$$. Identify the error and correct it. (2 steps)", "answer": "- Step 1: The student made a *unit conversion error*. The current is 3.00 **mA** = $$3.00 \\times 10^{-3}$$ A, not 3.00 A. They substituted 3.00 (in amps) instead of 0.00300. This is a very common trap — mixing milliamps and amps.\n- Step 2: The correct calculation: $$R = \\frac{V}{I} = \\frac{3.00}{3.00 \\times 10^{-3}} = 1000\\,\\Omega = 1.0\\,\\text{k}\\Omega$$. The student's answer of 1.0 Ω is wrong by a factor of 1000. Always convert mA to A before substituting: $$1\\,\\text{mA} = 1 \\times 10^{-3}$$ A, and $$1\\,\\mu\\text{A} = 1 \\times 10^{-6}$$ A.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "An examiner asks: \"Explain why the resistance of an NTC thermistor decreases as temperature increases\" (3 marks). Write out the mark-scheme chain, identifying exactly what earns each mark. (4 steps)", "answer": "- Step 1: **Mark 1 — State the stimulus effect on carriers:** As temperature increases, thermal energy frees more electrons from the semiconductor lattice / more charge carriers are released. (Key phrase: \"more electrons freed\" or \"number density of charge carriers increases.\")\n- Step 2: **Mark 2 — Link to $$n$$ explicitly:** The number density of free charge carriers, $$n$$, increases (approximately exponentially with temperature). (Key phrase: \"$$n$$ increases.\")\n- Step 3: **Mark 3 — Use $$I = nqvA$$ to show $$n$$ dominates:** In the equation $$I = nqvA$$, the increase in $$n$$ is much greater than any decrease in drift velocity $$v$$, so the product $$n \\times v$$ increases. Therefore current $$I$$ increases for the same applied voltage. (Key phrase: \"increase in $$n$$ outweighs/outdominates the decrease in $$v$$.\")\n- Step 4: **Conclusion — State R decreases:** Since $$R = V/I$$ and $$I$$ has increased (for the same $$V$$), the resistance $$R$$ decreases. (Key phrase: \"$$R = V/I$$ decreases\" or \"resistance decreases because current increases.\")\n\nDo NOT just say \"resistance decreases because it's a semiconductor\" — that earns zero marks. The chain must go: temperature ↑ → $$n$$ ↑ → $$n$$ dominates over $$v$$ ↓ → $$I$$ ↑ → $$R$$ ↓.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": true}, {"question": "A potential divider has a thermistor as $$R_1$$ (top) and a fixed resistor as $$R_2$$ (bottom). At room temperature, $$R_1 = 3R_2$$ (the thermistor's resistance is three times the fixed resistor's value). What fraction of $$V_{in}$$ appears as $$V_{out}$$? If the thermistor heats up and its resistance drops to equal $$R_2$$, what is the new fraction? (2 steps)", "answer": "- Step 1: At room temperature, $$R_1 = 3R_2$$, so $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2} = V_{in} \\times \\frac{R_2}{3R_2 + R_2} = V_{in} \\times \\frac{R_2}{4R_2} = V_{in} \\times \\frac{1}{4}$$. Only one-quarter of the supply voltage appears across the fixed resistor.\n- Step 2: When the thermistor heats and $$R_1 = R_2$$: $$V_{out} = V_{in} \\times \\frac{R_2}{R_2 + R_2} = V_{in} \\times \\frac{R_2}{2R_2} = V_{in} \\times \\frac{1}{2}$$. Now half the supply voltage appears across the fixed resistor. The output has *doubled* (from ¼ to ½ of $$V_{in}$$) because the thermistor's resistance fell from 3× to 1× the fixed resistor's value. This shows how sensitively the divider responds to the sensor.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "You have a metal wire and an NTC thermistor. Both are connected to identical batteries at the same initial temperature. After 10 seconds, the current through the thermistor is *higher* than at the start, but the current through the metal wire is *lower* than at the start. Explain both observations. (3 steps)", "answer": "- Step 1: **Metal wire:** Current flowing through the wire dissipates heat ($$P = I^2R$$), raising its temperature. In a metal, $$n$$ is fixed and lattice vibrations increase, reducing drift velocity $$v$$. From $$I = nqvA$$, with $$n$$ constant and $$v$$ decreasing, the current *decreases*. So after 10 seconds, the wire is warmer and its current has dropped.\n- Step 2: **NTC thermistor:** Current flowing also heats the thermistor. But in the semiconductor, the temperature rise frees more electrons, increasing $$n$$ sharply. Although $$v$$ decreases slightly, the increase in $$n$$ dominates, so $$n \\times v$$ increases. From $$I = nqvA$$, current *increases*. So after 10 seconds, the thermistor is warmer and its current has risen.\n- Step 3: This is a self-reinforcing effect in the thermistor: more current → more heating → lower R → even more current. In the metal, it's self-limiting: more current → more heating → higher R → less current. This is why a thermistor can exhibit thermal runaway if not carefully controlled, while a metal wire naturally stabilises.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": true}, {"question": "Two students argue about a thermistor's I–V curve. Student A says the gradient at any point equals $$1/R$$. Student B says the gradient equals $$R$$. Who is correct, and how does this explain the curve's shape? (2 steps)", "answer": "- Step 1: Student A is correct. On an I–V graph (current on y-axis, voltage on x-axis), the gradient at any point is $$\\frac{\\Delta I}{\\Delta V}$$. From Ohm's law, $$I = V/R$$, so $$\\frac{dI}{dV} = 1/R$$. A steeper gradient means lower resistance; a shallower gradient means higher resistance.\n- Step 2: For a thermistor, at low voltages the temperature is near ambient, $$R$$ is high, and the gradient is shallow (small $$1/R$$). As voltage increases, the thermistor heats up, $$R$$ decreases, and $$1/R$$ increases — so the gradient gets steeper. The curve bends upward with increasing gradient, directly reflecting the decreasing resistance. This is the opposite of a filament lamp, where the gradient *decreases* (because R increases with temperature in a metal).", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "A potential divider uses an LDR as $$R_2$$ (bottom) with a fixed resistor on top. In bright light, the LDR has $$R_2 = 200\\,\\Omega$$ and the fixed resistor is $$R_1 = 200\\,\\Omega$$. In darkness, $$R_2$$ rises to about $$2\\,\\text{M}\\Omega$$. Qualitatively, what happens to $$V_{out}$$ across the LDR as it goes from bright to dark? (2 steps)", "answer": "- Step 1: In bright light, $$R_2 = R_1 = 200\\,\\Omega$$, so $$V_{out} = V_{in} \\times \\frac{200}{200+200} = V_{in} \\times \\frac{1}{2}$$. The LDR gets half the supply voltage.\n- Step 2: In darkness, $$R_2 = 2\\,\\text{M}\\Omega$$ while $$R_1 = 200\\,\\Omega$$. Now $$R_2 \\gg R_1$$, so $$V_{out} = V_{in} \\times \\frac{2{,}000{,}000}{200 + 2{,}000{,}000} \\approx V_{in} \\times \\frac{2{,}000{,}000}{2{,}000{,}000} \\approx V_{in}$$. The LDR takes almost *all* the supply voltage because its resistance is vastly larger than the fixed resistor. So as it goes from bright to dark, $$V_{out}$$ *increases* from about $$V_{in}/2$$ to nearly $$V_{in}$$. This rising voltage in darkness is exactly what triggers automatic street lights.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}], "count": 38}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Explain how the current equation $ I = nqvA $ accounts for changes in conductivity between metals and semiconductors. (3 steps)", "answer": "- Step 1: **Identify terms in $ I = nqvA $**  \n  $ n $ = number density of free charge carriers, $ q $ = charge per carrier (e.g., $ 1.60 \\times 10^{-19} \\, \\text{C} $), $ v $ = drift velocity, $ A $ = cross-sectional area. Conductivity depends on $ n $ and $ v $.  \n- Step 2: **Metals vs. semiconductors**  \n  Metals have a fixed, high $ n $ ($ \\sim 10^{28} \\, \\text{m}^{-3} $). When temperature rises, $ v $ decreases due to increased ion vibrations, increasing resistance. Semiconductors have low $ n $ at low temperatures but $ n $ increases exponentially with thermal/photon energy, overwhelming any decrease in $ v $.  \n- Step 3: **Resulting behavior**  \n  In metals, $ R $ increases with temperature (PTC). In semiconductors, $ R $ decreases (NTC) because the rise in $ n $ dominates.  \n\n**Takeaway:** Conductivity hinges on $ n $: metals rely on fixed $ n $, semiconductors on $ n $-modulation via external stimuli.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why does the number density $ n $ of free electrons in a semiconductor increase with temperature? (3 steps)", "answer": "- Step 1: **Electron excitation mechanism**  \n  At low temperatures, most electrons are bound in covalent bonds. Thermal energy provides enough energy to break bonds, freeing electrons for conduction.  \n- Step 2: **Exponential dependence**  \n  The number of freed electrons follows an exponential relationship with temperature: $ n \\propto e^{-E_g/(2kT)} $, where $ E_g $ is the bandgap energy.  \n- Step 3: **Effect on conductivity**  \n  Even a small temperature rise significantly increases $ n $, drastically lowering resistance (NTC behavior).  \n\n**Takeaway:** Thermal energy unlocks electrons bound in the lattice, exponentially boosting $ n $ and conductivity.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How does photon absorption in an LDR (light-dependent resistor) alter its resistance? (3 steps)", "answer": "- Step 1: **Photon energy transfer**  \n  Photons transfer energy to electrons in the semiconductor lattice, freeing them from covalent bonds.  \n- Step 2: **Increase in $ n $**  \n  More photons (higher light intensity) = more freed electrons, increasing $ n $.  \n- Step 3: **Impact on resistance**  \n  From $ I = nqvA $, higher $ n $ increases current for a fixed voltage, so $ R = V/I $ decreases.  \n\n**Takeaway:** Light intensity → more photons → higher $ n $ → lower resistance.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does a thermistor’s I–V curve have an increasing gradient? (3 steps)", "answer": "- Step 1: **Self-heating effect**  \n  As current increases, power dissipation ($ P = I^2R $) raises the thermistor’s temperature.  \n- Step 2: **Temperature-dependent resistance**  \n  Higher temperature → lower $ R $ (NTC behavior), allowing more current for smaller voltage increments.  \n- Step 3: **Graph shape**  \n  The curve bends upward because $ \\frac{dI}{dV} = \\frac{1}{R} $ increases as $ R $ decreases.  \n\n**Takeaway:** Non-ohmic behavior arises from thermal feedback: current → temperature → $ R $ → current.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "In a potential-divider circuit with a thermistor as $ R_1 $, what happens to $ V_{\\text{out}} $ (across $ R_2 $) when temperature rises? (3 steps)", "answer": "- Step 1: **Thermistor resistance change**  \n  Temperature rise → $ R_1 $ (thermistor) decreases (NTC behavior).  \n- Step 2: **Voltage division formula**  \n  $ V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R_2}{R_1 + R_2} $. Lower $ R_1 $ → larger $ \\frac{R_2}{R_1 + R_2} $ → higher $ V_{\\text{out}} $.  \n- Step 3: **Practical implication**  \n  Output voltage increases with temperature, useful for temperature sensors.  \n\n**Takeaway:** $ V_{\\text{out}} $ is inversely related to $ R_1 $; sensor placement determines response.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why do metals exhibit positive temperature coefficient (PTC) behavior, unlike semiconductors? (3 steps)", "answer": "- Step 1: **Fixed $ n $ in metals**  \n  $ n $ remains constant (all valence electrons are free at all temperatures).  \n- Step 2: **Increased ion vibrations**  \n  Higher temperature → stronger lattice vibrations → more electron-ion collisions → reduced $ v $.  \n- Step 3: **Resistance increase**  \n  $ I = nqvA $ decreases for a fixed voltage, so $ R = V/I $ increases.  \n\n**Takeaway:** Metals’ $ R \\propto \\text{temperature} $ due to scattering, semiconductors’ $ R \\propto 1/\\text{temperature} $ due to $ n $-modulation.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Calculate the drift velocity $ v $ of electrons in a copper wire with $ n = 8.4 \\times 10^{28} \\, \\text{m}^{-3} $, $ A = 1.0 \\, \\text{mm}^2 $, and $ I = 10 \\, \\text{A} $. (3 steps)", "answer": "- Step 1: **Rearranged formula**  \n  $ v = \\frac{I}{nqA} $.  \n- Step 2: **Substitute values**  \n  $ v = \\frac{10}{8.4 \\times 10^{28} \\times 1.60 \\times 10^{-19} \\times 1.0 \\times 10^{-6}} $.  \n- Step 3: **Compute**  \n  $ v \\approx 7.4 \\times 10^{-4} \\, \\text{m/s} $.  \n  + **Key insight:** Despite high current, drift velocity is extremely slow (~0.74 mm/s) due to massive $ n $.  \n\n**Takeaway:** Drift velocity is low because electrons collide frequently, even though current is high due to dense $ n $.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is the formula $ R = IV $ incorrect? (2 steps)", "answer": "- Step 1: **Definition of resistance**  \n  Resistance is $ R = \\frac{V}{I} $, the ratio of voltage to current.  \n- Step 2: **Misconception probe**  \n  Using $ R = IV $ incorrectly implies resistance increases with current, which contradicts material properties. Ohm’s law defines $ R $ as constant for ohmic devices (e.g., $ V \\propto I $), but $ R = IV $ would make $ R $ scale quadratically with $ I $.  \n\n**Takeaway:** Resistance is a property of the material, not a product of $ I $ and $ V $.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}], "count": 8}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Derive the current equation $ I = nqvA $ from the concept of charge carriers moving through a conductor. Describe each term in the equation and explain why this equation is critical for understanding resistance changes in semiconductors. (5 steps)", "answer": "- **Step 1:** Define the terms in the equation:  \n  - $ n $: number density of free charge carriers (electrons per m³)  \n  - $ q $: charge per carrier (1.60 × 10⁻¹⁹ C for electrons)  \n  - $ v $: drift velocity (average velocity of carriers moving under an electric field)  \n  - $ A $: cross-sectional area of the conductor (m²)  \n\n- **Step 2:** Consider a conductor segment of length $ v\\Delta t $. Charge carriers travel distance $ v\\Delta t $ in time $ \\Delta t $.  \n\n- **Step 3:** Volume swept = $ A \\cdot v\\Delta t $. Total free carriers in this volume = $ n \\cdot A v \\Delta t $.  \n\n- **Step 4:** Total charge moved = $ \\Delta Q = nqvA\\Delta t $. Current $ I = \\Delta Q/\\Delta t = nqvA $.  \n\n- **Step 5:** In semiconductors, $ n $ is not fixed (unlike metals). Changes in temperature or illumination directly alter $ n $, affecting $ I $ and resistance $ R = V/I $.  \n\n**Takeaway:** The equation links microscopic parameters ($ n, v $) to macroscopic current $ I $, explaining why semiconductors' resistance depends on $ n $.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why does the number density of free electrons $ n $ in a semiconductor increase exponentially with temperature, while in a metal it remains nearly constant? (4 steps)", "answer": "- **Step 1:** In metals, electrons are already delocalized (e.g., $ n \\approx 8.4 \\times 10^{28} \\, \\text{m}^{-3} $ for copper). Thermal energy doesn’t free more electrons.  \n\n- **Step 2:** In semiconductors (e.g., silicon), electrons are bound in covalent bonds at low temperatures. Thermal energy breaks these bonds, freeing electrons to conduct.  \n\n- **Step 3:** The number of freed electrons increases exponentially with temperature due to the Arrhenius-type dependence: $ n \\propto e^{-E_g/(2kT)} $, where $ E_g $ is the bandgap energy.  \n\n- **Step 4:** In metals, $ n $ is fixed, but $ v $ decreases due to more lattice vibrations (higher resistance). In semiconductors, the exponential rise in $ n $ dominates over reduced $ v $, lowering resistance.  \n\n**Takeaway:** Semiconductors' $ n \\uparrow $ with $ T $ explains NTC behavior; metals' $ n $ fixed explains PTC behavior.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Explain why the resistance of an NTC thermistor decreases with increasing temperature, using the equation $ I = nqvA $. (4 steps)", "answer": "- **Step 1:** Heating the thermistor provides thermal energy to break covalent bonds in the semiconductor lattice.  \n\n- **Step 2:** This increases $ n $ (free electrons) exponentially, as described by $ n \\propto e^{-E_g/(2kT)} $.  \n\n- **Step 3:** Though $ v $ decreases slightly (more lattice collisions), the exponential rise in $ n $ dominates.  \n\n- **Step 4:** For fixed voltage $ V $, $ I = nqvA $ increases, so $ R = V/I $ decreases.  \n\n**Takeaway:** NTC thermistor resistance drops because $ n \\uparrow \\gg v \\downarrow $.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How does photon absorption in an LDR increase its conductivity? Contrast this with thermal energy's effect in a thermistor. (3 steps)", "answer": "- **Step 1:** LDR photons (visible light) transfer energy to bound electrons in the semiconductor, freeing them to conduct. More light = more photons = higher $ n $.  \n\n- **Step 2:** Thermistors rely on thermal energy to free electrons, while LDRs rely on photon energy. Both mechanisms increase $ n $, but the energy source differs.  \n\n- **Step 3:** In both cases, $ R = V/I $ decreases because $ n \\uparrow $. However, LDRs respond to light intensity; thermistors respond to temperature.  \n\n**Takeaway:** Photon energy in LDRs and thermal energy in thermistors both increase $ n $, but via different mechanisms.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why does the I-V curve of a thermistor curve upward at higher voltages? (3 steps)", "answer": "- **Step 1:** At higher voltages, power dissipation $ P = IV $ heats the thermistor (self-heating).  \n\n- **Step 2:** This temperature rise increases $ n $ (via thermal energy), lowering $ R = V/I $.  \n\n- **Step 3:** Reduced $ R $ allows more current $ I $ to flow for a given $ V $, causing the I-V curve to steepen (increasing gradient).  \n\n**Takeaway:** Self-heating in thermistors creates a positive feedback loop ($ V \\uparrow \\rightarrow T \\uparrow \\rightarrow n \\uparrow \\rightarrow R \\downarrow \\rightarrow I \\uparrow $).", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "Contrast the resistance-temperature behavior of metals (PTC) and semiconductors (NTC), and explain the underlying physical reasons. (5 steps)", "answer": "- **Step 1:** Metals (PTC): $ n $ is constant. Increased $ T $ causes more lattice vibrations → more collisions → reduced $ v $.  \n\n- **Step 2:** Reduced $ v $ lowers $ I = nqvA $, so $ R = V/I $ increases with $ T $.  \n\n- **Step 3:** Semiconductors (NTC): $ n $ increases exponentially with $ T $.  \n\n- **Step 4:** The exponential rise in $ n $ dominates over reduced $ v $, so $ I \\uparrow $ and $ R = V/I \\downarrow $.  \n\n- **Step 5:** Metals: $ R \\propto T $; semiconductors: $ R \\propto e^{-kT} $.  \n\n**Takeaway:** Opposite behaviors arise from fixed $ n $ (metals) vs temperature-dependent $ n $ (semiconductors).", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "How does a potential-divider circuit with a thermistor function as a temperature sensor? Derive $ V_{\\text{out}} = V_{\\text{in}} \\cdot \\frac{R_2}{R_1 + R_2} $ and explain its sensitivity to temperature changes. (4 steps)", "answer": "- **Step 1:** Voltage divider formula derivation:  \n  $ V_{\\text{out}} = IR_2 $, where $ I = \\frac{V_{\\text{in}}}{R_1 + R_2} $. Combine: $ V_{\\text{out}} = V_{\\text{in}} \\cdot \\frac{R_2}{R_1 + R_2} $.  \n\n- **Step 2:** If the thermistor is $ R_1 $, its resistance decreases as temperature rises.  \n\n- **Step 3:** Lower $ R_1 $ increases $ \\frac{R_2}{R_1 + R_2} $, so $ V_{\\text{out}} \\uparrow $.  \n\n- **Step 4:** A voltmeter across $ R_2 $ detects this voltage change, allowing temperature inference. Swapping $ R_1 $ and $ R_2 $ inverts the response.  \n\n**Takeaway:** Temperature-induced $ R_1 $ changes alter $ V_{\\text{out}} $, making the divider a sensitive sensor.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "Why is the drift velocity of electrons in a copper wire extremely slow (e.g., 0.74 mm/s for 10 A), even though electrical signals travel near light speed? (3 steps)", "answer": "- **Step 1:** Electrons undergo frequent collisions with lattice ions, causing a random walk with a small net drift.  \n\n- **Step 2:** Drift velocity $ v = \\frac{I}{nqA} $. For $ n \\approx 8.4 \\times 10^{28} \\, \\text{m}^{-3} $, $ v $ is tiny despite high $ I $.  \n\n- **Step 3:** The electric field propagates at near-light speed, but individual electrons drift slowly, similar to water flowing slowly in a hose while pressure waves move fast.  \n\n**Takeaway:** Drift velocity is slow because $ n $ is enormous in metals; signals propagate via field changes, not individual electrons.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why is the formula $ R = \\frac{V}{I} $ correct, while $ R = IV $ is wrong? Provide a numerical example to clarify. (2 steps)", "answer": "- **Step 1:** Resistance $ R $ is defined as the ratio $ V/I $. It quantifies how much voltage $ V $ is needed to drive current $ I $.  \n\n- **Step 2:** Example: If $ V = 3 \\, \\text{V} $, $ I = 3 \\, \\text{mA} $, then $ R = 3 / 0.003 = 1000 \\, \\Omega $. Using $ R = IV = 3 \\times 0.003 = 0.009 \\, \\Omega $ is nonsensical.  \n\n**Takeaway:** $ R $ is a proportionality constant in $ V = IR $; reversing terms violates units and physical meaning.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Explain why the resistance of a thermistor does not decrease linearly with temperature, using the R-T graph from Activity 10.4. (3 steps)", "answer": "- **Step 1:** The R-T graph for an NTC thermistor is a decreasing curve that flattens at high $ T $.  \n\n- **Step 2:** Resistance decreases exponentially: $ R = R_0 e^{-kT} $. At low $ T $, small $ \\Delta T $ causes large $ \\Delta R $; at high $ T $, $ \\Delta R $ diminishes.  \n\n- **Step 3:** This nonlinearity arises because $ n \\propto e^{-E_g/(2kT)} $, leading to a nonlinear $ R \\propto 1/n $ relationship.  \n\n**Takeaway:** Exponential dependence of $ n $ on $ T $ causes the R-T curve to be nonlinear.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}, {"question": "In a potential-divider circuit with an LDR as $ R_1 $, how does $ V_{\\text{out}} $ across $ R_2 $ change when the room darkens? Explain using the chain of reasoning: darkness → photons → $ n $ → $ R $ → $ I $ → $ V_{\\text{out}} $. (4 steps)", "answer": "- **Step 1:** Darkness → fewer photons incident on LDR → fewer freed electrons → $ n \\downarrow $.  \n\n- **Step 2:** Lower $ n $ → $ R_{\\text{LDR}} \\uparrow $.  \n\n- **Step 3:** Higher $ R_{\\text{total}} = R_{\\text{LDR}} + R_2 $ → $ I = \\frac{V_{\\text{in}}}{R_{\\text{total}}} \\downarrow $.  \n\n- **Step 4:** $ V_{\\text{out}} = IR_2 \\downarrow $ because $ I $ decreases.  \n\n**Takeaway:** Darkness increases LDR resistance, reducing current and $ V_{\\text{out}} $.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "For a thermistor in a potential-divider circuit, why is it incorrect to say \"the sensor changes the current directly\"? Use the correct chain of reasoning: stimulus → $ n $ → $ R $ → $ I $ → $ V_{\\text{out}} $. (3 steps)", "answer": "- **Step 1:** The term \"sensor changes the current\" skips the critical resistance change. Correct chain:  \n  Temperature ↑ → $ n \\uparrow $ → $ R \\downarrow $ → $ I \\uparrow $ (for fixed $ V $) → $ V_{\\text{out}} \\uparrow $.  \n\n- **Step 2:** Resistance $ R $ mediates the relationship between stimulus (temperature/light) and current $ I $.  \n\n- **Step 3:** Omitting $ R $ ignores the physical mechanism and violates causality: resistance is the independent variable here.  \n\n**Takeaway:** Resistance $ R $ is the mediator; current $ I $ is a dependent variable.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}], "count": 12}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Why does the resistance of a metal increase when its temperature rises, while the resistance of a semiconductor decreases? Use the equation I = nqvA in your explanation. (3 steps)", "answer": "- Step 1: Behavior in metals\n  - In a metal like copper, n is already very large (one free electron per atom) and stays essentially fixed when temperature rises\n  - Instead, the increased temperature causes the metal ions to vibrate more violently in the lattice\n  - This increases the frequency of collisions between free electrons and ions, reducing the drift velocity v\n  - Since I = nqvA, with n fixed and v decreasing, the current I decreases for a given voltage, so R = V/I increases\n\n- Step 2: Behavior in semiconductors\n  - In a semiconductor (thermistor material), at low temperature most electrons are locked in covalent bonds, so n is very small\n  - When temperature rises, some electrons gain enough thermal energy to break free from the lattice\n  - This causes n to increase dramatically (approximately exponentially)\n  - Although v decreases slightly due to more collisions, the huge increase in n dominates, so I increases and R = V/I decreases\n\n- Step 3: The key distinction\n  - Metal: n is fixed → R increases with T due to decreased v\n  - Semiconductor: n increases sharply → R decreases with T despite decreased v\n  - This opposite behavior is the most commonly tested concept in exams", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What does \"NTC\" stand for in \"NTC thermistor\", and why is this name appropriate? (2 steps)", "answer": "- Step 1: Define NTC\n  - NTC stands for Negative Temperature Coefficient\n  - \"Negative\" means the coefficient of resistance with temperature is negative—resistance decreases as temperature increases\n  - \"Coefficient\" refers to how much resistance changes per degree temperature change\n\n- Step 2: Why it's appropriate for a thermistor\n  - Most thermistors are made from semiconductor materials (mixed metal-oxide ceramics)\n  - When temperature increases, more electrons gain enough energy to break free from the crystal lattice\n  - This increases the number density n of free charge carriers\n  - From I = nqvA, more carriers means larger current for the same voltage, so resistance R = V/I decreases\n  - The name accurately describes this inverse relationship between temperature and resistance", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "An LDR (Light Dependent Resistor) is made from cadmium sulfide, a semiconductor. Explain, using the concept of number density n, why the resistance of an LDR decreases when light shines on it. (3 steps)", "answer": "- Step 1: Initial state in darkness\n  - In darkness, almost all electrons in the LDR semiconductor are locked into covalent bonds in the crystal lattice\n  - The number density n of free charge carriers is very small—around only a few per billion atoms\n  - This makes the LDR have very high resistance, often several MΩ\n\n- Step 2: What happens when light arrives\n  - Light photons are absorbed by the semiconductor lattice\n  - Each photon transfers its energy to a bound electron\n  - If the photon energy exceeds the binding energy, the electron gains enough energy to break free from the lattice\n  - This process is called photoionization\n\n- Step 3: The result for resistance\n  - More free electrons means n increases significantly\n  - From I = nqvA, for the same applied voltage, current I increases\n  - Therefore R = V/I decreases\n  - More light intensity → more photons → more freed electrons → higher n → lower resistance\n  - Typical values: darkness = several MΩ; bright light = tens to hundreds of Ω", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Sketch and describe the shape of the resistance-versus-temperature graph for an NTC thermistor. What feature makes this graph clearly different from a linear relationship? (2 steps)", "answer": "- Step 1: Describe the graph shape\n  - The graph shows resistance R on the y-axis (typically 0-800 Ω range) versus temperature θ on the x-axis (0-100°C)\n  - The curve starts at high resistance at low temperature and decreases as temperature rises\n  - The curve is steepest at low temperatures and gradually flattens at higher temperatures\n  - It is NOT a straight line—it is a decreasing curve that bends\n\n- Step 2: The key feature and physical meaning\n  - The non-linear shape reflects the exponential relationship between n and temperature: n increases exponentially with temperature\n  - At low temperatures, a small temperature increase produces a relatively large increase in n (and thus large R decrease)\n  - At high temperatures, n is already large, so additional temperature increases produce smaller proportional changes in n\n  - This is why the curve is initially steep then flattens—the rate of resistance change decreases as temperature increases", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Describe the shape of the resistance-versus-illumination graph for an LDR. How does the steepness of this curve compare to the thermistor's R-T curve? (2 steps)", "answer": "- Step 1: Graph shape description\n  - The graph shows resistance R on the y-axis versus light intensity (illumination) on the x-axis\n  - In complete darkness (zero illumination), resistance is maximum—can be several MΩ\n  - As illumination increases, resistance decreases rapidly\n  - The curve is hyperbolic in nature—resistance falls steeply at low light levels, then flattens out at high illumination\n  - At very bright light, resistance approaches a minimum value (tens of ohms)\n\n- Step 2: Comparison with thermistor curve\n  - Both curves show the same qualitative behavior: a rapid decrease followed by flattening\n  - The LDR curve is often even steeper at the start because even small amounts of light can free many electrons\n  - Both graphs are clearly non-linear, emphasizing that these are not simple ohmic resistors\n  - The flattening at high stimulus (temperature or light) occurs because n is approaching saturation—there are limited electrons to free", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "The I-V characteristic curve for a thermistor bends upward away from a straight line through the origin. Explain why this happens, relating your answer to the concept of self-heating. (3 steps)", "answer": "- Step 1: Understand the baseline behavior\n  - For an ohmic resistor, a straight line through the origin represents constant resistance (R = V/I is constant)\n  - The thermistor curve starts near this line at low voltages but then bends upward\n\n- Step 2: What happens at higher voltages\n  - As voltage increases, current through the thermistor increases\n  - Power dissipated is P = IV, so higher voltage means more electrical power converted to thermal energy\n  - This heats the thermistor (self-heating)\n\n- Step 3: The feedback effect\n  - As the thermistor's temperature rises, more electrons gain thermal energy to break free\n  - Number density n increases significantly\n  - From I = nqvA, increased n means increased current\n  - This lowers the resistance further, so the current increases even more for the same voltage increase\n  - The gradient (ΔI/ΔV) increases—this is the upward bend\n  - This is a positive feedback loop: more voltage → more current → more heat → lower R → even more current", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "In a potential-divider circuit with a therm
