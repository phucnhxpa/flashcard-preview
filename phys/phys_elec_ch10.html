istor as R₁ and a fixed resistor R₂, what happens to the output voltage Vout across R₂ when the temperature increases? Explain using the potential-divider formula. (3 steps)", "answer": "- Step 1: Write the potential-divider formula\n  - $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$\n  - The thermistor is R₁ (the sensor), and R₂ is a fixed resistor\n\n- Step 2: What happens when temperature increases\n  - Temperature increases → thermistor resistance R₁ decreases (NTC behavior)\n  - The denominator (R₁ + R₂) decreases\n  - The numerator (R₂) stays constant\n  - This means the fraction R₂/(R₁ + R₂) increases\n\n- Step 3: The result for Vout\n  - Since the fraction increases, Vout = Vin × (that fraction) also increases\n  - Alternatively, think from first principles: lower R₁ means lower total resistance, so circuit current I = Vin/(R₁ + R₂) increases\n  - Vout = I × R₂, and since both I and R₂ are larger, Vout definitely increases\n  - So: Temperature ↑ → Thermistor R ↓ → Vout ↑", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "A student connects an LDR as R₂ in a potential divider (LDR at the bottom, fixed resistor R₁ on top). The room becomes darker. Does Vout increase or decrease? Explain briefly. (2 steps)", "answer": "- Step 1: Analyze the circuit configuration\n  - In this configuration, R₁ (fixed resistor) is at the top, R₂ (LDR) is at the bottom\n  - Vout is measured across R₂ (the LDR)\n  - As the room gets darker, the LDR resistance increases (less light → fewer free electrons → higher resistance)\n\n- Step 2: Apply the potential-divider formula\n  - Formula: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$\n  - When darkness increases, R₂ increases significantly\n  - The denominator (R₁ + R₂) increases\n  - Numerator R₂ also increases\n  - The fraction R₂/(R₁ + R₂) gets larger because R₂ increases more proportionally\n  - Therefore Vout increases in the dark\n  - This is why LDR circuits can be used to turn on lights when it gets dark", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "A student writes R = IV to calculate resistance. Explain why this is wrong and state the correct formula. (2 steps)", "answer": "- Step 1: Identify the error\n  - The student has multiplied current by voltage (IV), which gives units of watts (power), not ohms (resistance)\n  - Physically, R = IV would mean resistance increases with current, which makes no sense\n\n- Step 2: State the correct formula\n  - The correct formula is $$R = \\frac{V}{I}$$\n  - This comes from Ohm's law: V = IR, rearranged to R = V/I\n  - Resistance equals voltage divided by current\n  - Example: If V = 3 V and I = 3 mA = 3 × 10⁻³ A, then R = 3/(3 × 10⁻³) = 1000 Ω\n  - Using the student's wrong formula: R = 3 × 0.003 = 0.009 Ω—completely wrong!", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A copper wire has cross-sectional area A = 1.0 mm² and carries current I = 10 A. Given that copper has n = 8.4 × 10²⁸ m⁻³, calculate the mean drift velocity of electrons. Why is this value so small compared to the speed of electrical signals? (3 steps)", "answer": "- Step 1: Rearrange the current equation\n  - Starting with I = nqvA, solve for drift velocity v:\n  - $$v = \\frac{I}{nqA}$$\n\n- Step 2: Substitute the values (using mental-math-friendly numbers)\n  - I = 10 A\n  - n = 8.4 × 10²⁸ m⁻³\n  - q = 1.6 × 10⁻¹⁹ C (electron charge)\n  - A = 1.0 mm² = 1.0 × 10⁻⁶ m²\n  - Denominator: n × q × A = 8.4 × 10²⁸ × 1.6 × 10⁻¹⁹ × 10⁻⁶ = 8.4 × 1.6 × 10³ = 13.44 × 10³ = 1.344 × 10⁴\n  - v = 10 / 1.344 × 10⁴ ≈ 7.4 × 10⁻⁴ m/s = 0.74 mm/s\n\n- Step 3: Why so small?\n  - This is about 0.74 millimeters per second—slower than a snail!\n  - Individual electrons drift very slowly through the conductor\n  - However, the electrical signal (the electric field) propagates at nearly the speed of light\n  - When you flip a light switch, electrons throughout the circuit start moving almost instantaneously because the field propagates instantly\n  - This is similar to water in a pipe: water flows slowly, but pressure (signal) travels fast", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In a potential-divider circuit, the thermistor is placed as R₂ (at the bottom) instead of R₁. Describe how the circuit behavior changes compared to having the thermistor at the top position. (2 steps)", "answer": "- Step 1: Understand the difference in configuration\n  - Original: Thermistor as R₁ (top), fixed resistor as R₂ (bottom)—Vout across R₂\n  - New: Fixed resistor as R₁ (top), thermistor as R₂ (bottom)—Vout across thermistor\n\n- Step 2: How behavior changes\n  - Formula is still Vout = Vin × (R₂/(R₁ + R₂))\n  - Now R₂ is the thermistor\n  - When temperature increases: thermistor R₂ decreases\n  - The fraction R₂/(R₁ + R₂) decreases\n  - Therefore Vout DECREASES when temperature rises (opposite of the previous configuration)\n  - This is useful for different applications—some circuits need output to fall when temperature rises, others need it to rise\n  - The key principle: output voltage is taken across whichever component is R₂", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Explain why copper has much higher conductivity than a semiconductor at room temperature, using the concept of number density n. (2 steps)", "answer": "- Step 1: Compare number densities\n  - Copper (metal): n ≈ 8.4 × 10²⁸ m⁻³—approximately one free electron per atom\n  - Semiconductor (silicon at room temperature): n ≈ 10¹⁶ m⁻³ (pure), maybe 10²⁰ m⁻³ (doped)\n  - This is a difference of about 8-12 orders of magnitude\n\n- Step 2: The implication for conductivity\n  - From I = nqvA, for the same drift velocity v and cross-section A, current I is directly proportional to n\n  - If n is 10²⁸ versus 10²⁰, that's a factor of 10⁸ (100 million) times more current for the same conditions\n  - Higher current at given voltage means lower resistance\n  - Metals are \"crowded\" with free electrons; semiconductors have very few at room temperature\n  - This is why metals are good conductors and semiconductors can act as insulators when unexcited", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A thermistor in a circuit has resistance 1000 Ω at low voltage. When the voltage is increased significantly, the resistance drops to 400 Ω. Explain this change using the concept of power dissipation and self-heating. (3 steps)", "answer": "- Step 1: Identify what's happening\n  - At low voltage, the thermistor has high resistance (1000 Ω)\n  - At high voltage, the same thermistor has lower resistance (400 Ω)\n\n- Step 2: Role of power dissipation\n  - Power dissipated in the thermistor: P = IV = V²/R = I²R\n  - At higher voltage, more electrical power is converted to thermal energy\n  - This heats up the thermistor\n\n- Step 3: The self-heating effect\n  - Higher temperature → more thermal energy available to free electrons from the lattice\n  - Number density n increases significantly\n  - From I = nqvA, increased n means more current for the same voltage\n  - Therefore R = V/I decreases\n  - This is why the I-V curve for a thermistor bends upward—the resistance actively decreases as voltage (and thus temperature) increases\n  - This is a form of positive feedback: more voltage → more heating → lower R → more current → even more heating", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In a potential-divider circuit with an LDR as the sensor, the fixed resistor has resistance 8.0 kΩ. In bright daylight, the LDR resistance is 670 Ω, and the supply voltage is 12.0 V. Estimate the output voltage across the LDR. (Mental math allowed) (2 steps)", "answer": "- Step 1: Apply the potential-divider formula\n  - $$V_{out} = V_{in} \\times \\frac{R_{LDR}}{R_{fixed} + R_{LDR}}$$\n  - Here: Vin = 12.0 V, R₁ (fixed) = 8000 Ω, R₂ (LDR) = 670 Ω\n\n- Step 2: Calculate (simplified)\n  - Total R = 8000 + 670 = 8670 Ω\n  - Fraction = 670/8670 ≈ 670/8670\n  - 670/8670 = 67/867 ≈ 0.077\n  - Vout ≈ 12.0 × 0.077 ≈ 0.92 V\n  - More precisely: 12 × (670/8670) = 12 × 0.07728 = 0.927 V ≈ 0.93 V\n  - Answer: approximately 0.93 V", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "What is the key difference in how number density n changes with temperature for a metal versus an NTC thermistor? Why does this cause opposite resistance behaviors? (2 steps)", "answer": "- Step 1: The fundamental difference\n  - In a metal: n is essentially constant with temperature (already at maximum—one electron per atom available)\n  - In a semiconductor (thermistor): n increases exponentially with temperature because more electrons gain enough energy to break free from covalent bonds\n\n- Step 2: Why opposite R behavior results\n  - Metal: n fixed → increased temperature → ions vibrate more → drift velocity v decreases → I decreases → R increases (PTC behavior)\n  - Thermistor: n increases dramatically → dominates over the slight v decrease → I increases → R decreases (NTC behavior)\n  - The key is that semiconductors have \"room to grow\" in terms of available charge carriers, while metals are already saturated", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A student says \"the thermistor stores electrons when it's cold, releasing them when hot.\" Identify two errors in this statement and explain the correct mechanism. (3 steps)", "answer": "- Step 1: First error—\"stores electrons\"\n  - All materials contain electrons; thermistors don't \"store\" electrons any differently than other components\n  - The number of electrons in the circuit is always the same; they don't get stored or used up\n  - Charge is conserved in circuits—electrons flow but aren't created or destroyed\n\n- Step 2: Second error—implying electrons are \"released\"\n  - It's not that pre-existing electrons are released; rather, electrons that were previously bound to atoms become free\n  - These are new free charge carriers created by thermal energy\n  - The total electron count in the material changes because electrons become mobile, not because they're released from storage\n\n- Step 3: The correct mechanism\n  - At low temperatures, electrons are bound in covalent bonds (not free to move)\n  - At higher temperatures, thermal energy gives electrons enough energy to break their bonds\n  - These now-free electrons become part of the \"free charge carrier\" population\n  - This increases n, the number density of free charge carriers per cubic meter\n  - More free carriers means more conduction → lower resistance", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": true}, {"question": "In a potential-divider circuit, the thermistor resistance decreases significantly when temperature rises. Does the voltage across the thermistor increase or decrease? Explain using two different methods of reasoning. (3 steps)", "answer": "- Step 1: Method 1—using the fraction\n  - Vthermistor = Vin × (Rthermistor / (Rthermistor + Rfixed))\n  - When temperature rises, Rthermistor decreases\n  - The numerator decreases, the denominator decreases\n  - The fraction becomes smaller (fixed resistor takes a larger share)\n  - Therefore Vthermistor decreases\n\n- Step 2: Method 2—using current\n  - Total resistance Rtotal = Rthermistor + Rfixed decreases\n  - Circuit current I = Vin/Rtotal increases\n  - Voltage across thermistor = I × Rthermistor\n  - Even though Rthermistor decreases, the effect is complicated—BUT we know from the fraction method that the thermistor voltage decreases\n\n- Step 3: The key insight\n  - Less voltage is dropped across the thermistor (because its R decreased)\n  - More voltage appears across the fixed resistor\n  - This is essential to remember: when sensor R decreases, voltage ACROSS the sensor decreases; voltage ACROSS the other resistor increases", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "What are the typical resistance values for an NTC thermistor at room temperature (20°C) versus near boiling water (100°C), and for an LDR in darkness versus bright light? (2 steps)", "answer": "- Step 1: Thermistor values\n  - At 20°C (room temperature): approximately 700 Ω (specifically around 706 Ω from textbook data)\n  - At 100°C (boiling water): approximately 74 Ω\n  - This is roughly a 10× decrease for a 80°C temperature rise\n\n- Step 2: LDR values\n  - In darkness: several MΩ (can be 1-10 MΩ)\n  - In bright light: tens to hundreds of Ω (typically a few hundred Ω)\n  - This can be a 10,000× difference between dark and bright conditions\n\n- Step 3: Why these matter\n  - These large resistance changes make the components useful as sensors\n  - The thermistor's order-of-magnitude change is enough to detect temperature changes electronically\n  - The LDR's huge range allows detecting light levels from pitch darkness to bright sunlight", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "In an experiment with a thermistor, a student records a current of 3.00 mA at 3.00 V, and 16.25 mA at 7.00 V. Calculate the resistance at each point and explain why they are different. (Mental math allowed) (2 steps)", "answer": "- Step 1: Calculate resistances\n  - Point 1: R = V/I = 3.00 V / (3.00 × 10⁻³ A) = 1000 Ω\n  - Point 2: R = 7.00 V / (16.25 × 10⁻³ A) = 7.00 / 0.01625 ≈ 430.8 Ω ≈ 431 Ω\n  - Both calculations use R = V/I (not IV!)\n\n- Step 2: Explain the difference\n  - The resistance dropped from 1000 Ω to 431 Ω\n  - At higher voltage (7 V), more current flows, dissipating more power as heat\n  - The thermistor heats up (self-heating)\n  - Higher temperature frees more electrons from the semiconductor lattice\n  - Number density n increases dramatically\n  - From I = nqvA, increased n means more current for same voltage\n  - Therefore R = V/I decreases\n  - This is why the thermistor's I-V curve bends upward—the resistance decreases as voltage (and thus temperature) increases", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A fixed resistor and an LDR are connected in series with a battery. As the room gets darker, does the power dissipated in the fixed resistor increase or decrease? Explain using the concept of circuit current. (2 steps)", "answer": "- Step 1: What happens to the circuit\n  - In darkness, LDR resistance increases (fewer free electrons)\n  - Total resistance Rtotal = Rfixed + RLDR increases\n  - Battery voltage Vin is constant\n  - Circuit current I = Vin / Rtotal decreases\n\n- Step 2: What happens to power in the fixed resistor\n  - Power dissipated in the fixed resistor: P = I²Rfixed\n  - Rfixed is constant (say, 1 kΩ)\n  - I decreases significantly as the room darkens\n  - Since P is proportional to I², and I decreases, P decreases\n  - Alternative explanation: less current flows, so less power = IV across that resistor", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "What is the circuit symbol for an NTC thermistor, and how does it differ from the symbol for a regular (fixed) resistor? (1 step)", "answer": "- Step 1: Symbol identification\n  - Regular resistor: a simple zigzag line or a rectangle\n  - NTC thermistor: the same symbol as a resistor but with a small \"t\" or thermometer symbol next to it, or sometimes a diagonal line through it with \"t\" markings\n  - The key is that the thermistor symbol resembles a resistor but has additional markings to indicate temperature dependence\n  - LDR symbol is similar to a resistor but with arrows coming toward it representing light (like a sun symbol)", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Explain why using currents significantly larger than 20 mA in a thermistor experiment might be inadvisable, based on what you know about self-heating. (2 steps)", "answer": "- Step 1: The self-heating problem\n  - At higher currents, power dissipation P = I²R increases quadratically\n  - This generates more thermal energy in the thermistor\n  - The thermistor heats up significantly above ambient temperature\n\n- Step 2: Why this is problematic\n  - The measured resistance no longer reflects the ambient temperature\n  - It's now the resistance at a higher, uncontrolled temperature\n  - This introduces significant experimental error\n  - Additionally, excessive heating could damage the thermistor or change its characteristics permanently\n  - At extreme currents, the thermistor could fail entirely", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A thermistor and fixed resistor are connected in a potential divider. The fixed resistor has resistance approximately equal to the thermistor's resistance at room temperature. Why is this a good design choice for a temperature sensor? (2 steps)", "answer": "- Step 1: The mathematical reason\n  - When R1 ≈ R2 in a divider, Vout = Vin × (R2/(R1+R2)) = Vin × (1/2) = Vin/2\n  - This places the operating point in the middle of the range\n  - Small changes in either resistance produce relatively large changes in Vout\n  - Sensitivity is maximized when R1 ≈ R2\n\n- Step 2: The practical benefit\n  - At room temperature (the typical starting point), Vout is about half the supply voltage\n  - As temperature changes, Vout can swing significantly in either direction\n  - This provides the maximum range of output voltage for the temperature change\n  - If Rfixed were too small or too large compared to the thermistor, Vout would barely change with temperature", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "The resistance of a semiconductor can decrease by a factor of 10 when temperature increases by 80°C, while a metal's resistance might only double over the same range. What does this tell you about the sensitivity of semiconductor sensors versus metals? (2 steps)", "answer": "- Step 1: Quantify the difference\n  - Semiconductor (thermistor): factor of 10 change (1000 Ω → 100 Ω)\n  - Metal: factor of 2 change (1 Ω → 2 Ω)\n  - The semiconductor changes 10× more than the metal for the same temperature swing\n\n- Step 2: Implications for sensors\n  - Semiconductor thermistors are far more sensitive to temperature changes than metals\n  - This makes thermistors excellent for precise temperature sensing applications\n  - A small temperature change produces a large resistance change in a thermistor\n  - Metals would require much more sophisticated measurement to detect the same temperature change\n  - This is why thermistors are used in thermometers, thermostats, and temperature control circuits\n  - The exponential relationship between n and T gives semiconductors their high sensitivity", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In the equation R = V/I, what are the SI units of each quantity? If you mistakenly calculated R = IV, what would the units be? (2 steps)", "answer": "- Step 1: Correct formula units\n  - V (voltage/potential difference) is in volts (V)\n  - I (current) is in amperes (A)\n  - R = V/I has units of V/A, which is defined as ohms (Ω)\n  - 1 Ω = 1 V/A\n\n- Step 2: Wrong formula units\n  - R = I × V would have units of A × V = watts (W)\n  - This is a unit of power, not resistance\n  - This simple unit check can help you catch the error if you forget the formula", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "An LDR is used in a circuit to automatically turn on street lights when it gets dark. Describe what happens to the circuit current and the voltage across the LDR as night falls. (2 steps)", "answer": "- Step 1: What happens as darkness increases\n  - As it gets darker, fewer photons hit the LDR\n  - Fewer electrons gain enough energy to break free from the lattice\n  - Number density n decreases\n  - LDR resistance increases (from hundreds of Ω to MΩ)\n\n- Step 2: Effects on the circuit\n  - Total resistance increases significantly\n  - Circuit current I = Vin/Rtotal decreases\n  - Voltage across the LDR (if it's the output) changes depending on configuration\n  - Typically: more voltage appears across the high-resistance LDR\n  - This increased voltage can be used to trigger the switching transistor that turns on the street lights", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A wire made from a semiconductor material shows a positive temperature coefficient (PTC) behavior over a certain temperature range. What must be true about the change in drift velocity v in this material? (2 steps)", "answer": "- Step 1: Understand PTC behavior\n  - PTC = positive temperature coefficient = resistance increases as temperature increases\n  - From I = nqvA, for this to happen, the overall current must decrease\n\n- Step 2: What this implies about v\n  - If resistance increases (current decreases for fixed voltage), either n must decrease OR v must decrease (or both)\n  - For a semiconductor, n typically increases with temperature (opposite of what we need for PTC)\n  - Therefore, the decrease in drift velocity v must dominate\n  - The increased collisions from lattice vibrations must reduce v so much that even the increased n can't compensate\n  - This can happen in specially \"doped\" semiconductors or at high temperatures where n saturates", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Two students are discussing a thermistor circuit. One says \"the current is bigger when the thermistor is hot because the resistance is smaller.\" The other says \"the resistance is smaller because there are more free electrons.\" Which explanation is more complete, and why? (2 steps)", "answer": "- Step 1: Evaluate each explanation\n  - Student 1's explanation: \"R is smaller, so I is bigger\" — this describes the Ohm's law relationship but doesn't explain WHY R changed\n  - Student 2's explanation: \"more free electrons\" — this identifies the root cause (increased n) but doesn't connect it to the resistance change\n\n- Step 2: The complete explanation\n  - Neither is fully complete alone\n  - The full chain is: Temperature ↑ → thermal energy frees more electrons → number density n increases → from I = nqvA, current increases (for same V) → therefore R = V/I decreases\n  - Student 2 gets closer to the fundamental mechanism, but Student 1 correctly describes the circuit consequence\n  - For exam marks, you need the chain: stimulus → n changes → I changes → R changes", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Sketch the I-V characteristic for a filament lamp and explain how it differs from the I-V characteristic of a thermistor, even though both show non-ohmic behavior. (3 steps)", "answer": "- Step 1: The filament lamp curve\n  - The I-V graph for a filament lamp curves downward (concave down)\n  - Starting from origin, the gradient is steep at low voltage, then decreases\n  - This means resistance increases as voltage/current increases\n  - Reason: higher current heats the filament, ions vibrate more, v decreases, R increases\n\n- Step 2: The thermistor curve\n  - The I-V graph for a thermistor curves upward (concave up)\n  - Starting from origin, the gradient increases with voltage\n  - This means resistance decreases as voltage/current increases\n  - Reason: self-heating increases temperature, n increases dramatically, R decreases\n\n- Step 3: The key difference\n  - Both show non-ohmic behavior but in opposite directions\n  - Filament lamp: heating causes MORE resistance (more collisions)\n  - Thermistor: heating causes LESS resistance (more free carriers)\n  - This is the same metal vs. semiconductor distinction, just within the filament lamp (metal) versus thermistor (semiconductor)", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In a potential-divider circuit with a thermistor as the sensor, explain what happens to the sensitivity of the circuit (how much Vout changes per degree temperature change) if you swap the thermistor and fixed resistor positions. (2 steps)", "answer": "- Step 1: Original configuration (thermistor on top)\n  - Vout = Vin × Rfixed / (Rthermistor + Rfixed)\n  - As temperature increases, Rthermistor decreases, so Vout increases\n  - Sensitivity depends on how much Rthermistor changes relative to Rfixed\n\n- Step 2: Swapped configuration (thermistor on bottom)\n  - Vout = Vin × Rthermistor / (Rfixed + Rthermistor)\n  - As temperature increases, Rthermistor decreases, so Vout DECREASES\n  - The magnitude of change (absolute sensitivity) is the same, but the DIRECTION reverses\n\n- Step 3: Practical consideration\n  - The choice of configuration depends on what you want the circuit to do\n  - Some applications want output to rise with temperature (temperature monitoring)\n  - Others want output to fall (overheat protection)\n  - The sensitivity is actually determined by the ratio of Rfixed to the thermistor's resistance range", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Why is it important to wait at least 5 minutes before reversing the polarity in a thermistor I-V experiment, as mentioned in the textbook? (2 steps)", "answer": "- Step 1: The problem with immediate reversal\n  - When the thermistor has been operating at higher voltage, it has heated up due to self-heating\n  - The resistance is now lower than it would be at room temperature\n\n- Step 2: Why wait 5 minutes\n  - If you immediately reverse polarity and take measurements, the thermistor is still hot from the previous measurements\n  - This would give artificially low resistance values\n  - Waiting allows the thermistor to cool back to ambient (room) temperature\n  - This ensures the measurements reflect the actual voltage-current relationship, not a contaminated by residual heating effect", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "A semiconductor's resistance decreases exponentially with temperature according to R = R₀e^(-kθ). What does this mathematical form tell you about how resistance changes with temperature, and how is this reflected in the shape of the R-T graph? (2 steps)", "answer": "- Step 1: Understanding exponential decrease\n  - R = R₀e^(-kθ) means resistance starts at R₀ when θ = 0\n  - As θ increases, the exponent becomes more negative, so e^(-kθ) gets smaller\n  - The rate of decrease is proportional to the current value—a fixed percentage drop per degree\n  - This is why the R-T curve is steep at low temperatures (large percentage change) and flattens at high temperatures (smaller percentage change)\n\n- Step 2: The graphical consequence\n  - Taking natural logs: ln R = -kθ + ln R₀\n  - This is a straight line with negative gradient when plotting ln R vs θ\n  - This confirms the textbook activity: plotting ln R against temperature gives a straight line (up to about 65°C)\n  - The curve shape (steep then flattening) is the visual representation of exponential decay", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": true}, {"question": "In the drift velocity equation v = I/(nqA), what happens to v if you double the current while keeping the wire the same? What happens to v if you replace the wire with one that has twice the cross-sectional area? (2 steps)", "answer": "- Step 1: Doubling the current\n  - From v = I/(nqA), if I doubles and n, q, A stay the same, then v doubles\n  - Doubling the current means charge carriers must drift twice as fast on average to carry twice the charge per second\n\n- Step 2: Doubling the cross-sectional area\n  - If A doubles and I stays the same, then v halves\n  - This is because the same number of charges per second can spread out over a larger area\n  - Think of it like water in a pipe: for the same flow rate, a wider pipe has slower water velocity\n  - This is why thick wires have lower resistance—larger area allows more charge to flow with less \"traffic density\"", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A circuit uses a thermistor to trigger an alarm when temperature exceeds a certain threshold. The fixed resistor is chosen so that Vout equals half the supply voltage at the threshold temperature. Explain why this is a good design choice. (2 steps)", "answer": "- Step 1: The middle-point advantage\n  - At the threshold temperature, Rthermistor ≈ Rfixed\n  - Vout = Vin × Rfixed/(Rthermistor + Rfixed) = Vin × 0.5 = Vin/2\n  - This is the point of maximum sensitivity\n\n- Step 2: Why maximum sensitivity?\n  - If Rthermistor is much smaller than Rfixed, small changes in Rthermistor produce tiny changes in the fraction\n  - If Rthermistor is much larger than Rfixed, small changes also produce tiny changes\n  - At the midpoint (equal resistances), the fraction changes most rapidly with resistance\n  - This gives the clearest \"switching\" action for the alarm\n  - A small temperature change around the threshold produces a large Vout change", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": true}], "count": 34}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In a copper wire at room temperature, the number density n is approximately $$8.4 \\times 10^{28} \\, \\text{m}^{-3}$$. Explain why this value is essentially constant when the temperature increases, unlike in a semiconductor. (3 steps)", "answer": "- Step 1: In copper (a metal), there is approximately one free electron per atom that is already available for conduction at room temperature. The value of n is already at its maximum because all valence electrons are already freed from their atomic bonds.\n- Step 2: When temperature increases, the copper does not \"create\" more free electrons — there are no more electrons to release. The number density n remains fixed.\n- Step 3: Instead, the increased temperature causes the copper lattice ions to vibrate more violently, which increases the collision rate with the free electrons. This reduces the drift velocity v, which increases the resistance. This is why metals have a positive temperature coefficient (PTC).\n\nThis is fundamentally different from semiconductors, where n can increase dramatically with temperature because most electrons are initially bound in covalent bonds.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A student writes \"$$R = IV$$\" for a resistor. Explain why this is incorrect and state the correct relationship between resistance, voltage, and current. (2 steps)", "answer": "- Step 1: The equation $$R = IV$$ is dimensionally incorrect. The left side has units of ohms (V/A), while the right side would have units of A·V = watts. This is clearly wrong.\n- Step 2: The correct relationship is $$R = \\frac{V}{I}$$, which states that resistance equals voltage divided by current. This comes directly from Ohm's law: $$V = IR$$, which rearranges to $$R = \\frac{V}{I}$$.\n\nThis is a very common exam trap. Always write R = V/I, never R = IV. If V = 3 V and I = 3 mA = 3 × 10⁻³ A, then R = 3/0.003 = 1000 Ω, not 3 × 0.003 = 0.009 Ω.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "An LDR (light-dependent resistor) is made from cadmium sulfide, a semiconductor. Explain, using the concept of number density n, why the resistance of an LDR decreases when the light intensity incident on it increases. (4 steps)", "answer": "- Step 1: In darkness, the LDR semiconductor has very few free charge carriers because electrons are locked into the crystal lattice. The number density n is extremely small, giving the LDR a very high resistance (often several MΩ).\n- Step 2: When light shines on the LDR, photons from the light are absorbed by the semiconductor lattice. Each photon transfers its energy to a bound electron.\n- Step 3: If the photon energy is sufficient (greater than the band gap), it frees the electron from its bond, allowing it to conduct. This creates new free charge carriers, increasing the number density n.\n- Step 4: As light intensity increases, more photons are incident per second, freeing more electrons, so n increases further. From I = nqvA, more carriers means more current for the same voltage, so R = V/I decreases. This is why LDR resistance falls with increasing illumination.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "State three key differences between the behavior of a metal (e.g., copper) and an NTC thermistor (semiconductor) when their temperatures rise. (3 differences)", "answer": "- Difference 1: **Number density n**: In a metal, n is fixed (already maximum) and does not change significantly with temperature. In a semiconductor (thermistor), n increases sharply with temperature as more electrons gain enough energy to break free from the lattice.\n- Difference 2: **Resistance change**: In a metal, resistance increases with temperature (PTC behavior). In a thermistor, resistance decreases with temperature (NTC behavior). This is opposite behavior and is the most commonly tested distinction.\n- Difference 3: **Mechanism**: In a metal, increased resistance is due to increased lattice vibrations causing more collisions (drift velocity v decreases). In a thermistor, the huge increase in n dominates over any decrease in v, so resistance falls.\n\nA memory aid: \"Metal heats up, resists more. Thermistor heats up, conducts more.\"", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Sketch the expected shape of the resistance-versus-temperature graph for an NTC thermistor. Describe the key features of this graph and explain why it has this shape. (3 steps)", "answer": "- Step 1: The graph shows resistance R on the y-axis and temperature θ on the x-axis. It is a decreasing curve — not a straight line. At low temperatures (e.g., 0°C), resistance is high (often several kΩ). As temperature increases, resistance falls rapidly at first, then the curve flattens out at higher temperatures.\n- Step 2: The curve is steepest at low temperatures and gradually becomes shallower. This is because n increases approximately exponentially with temperature: at low temperatures, a small temperature rise releases a relatively large percentage of new carriers, but at high temperatures, most carriers are already freed.\n- Step 3: The shape reflects the exponential relationship between resistance and temperature: $$R = R_0 e^{-k\\theta}$$. Taking logarithms gives $$\\ln R = -k\\theta + \\ln R_0$$, which is a straight line. However, the actual R-θ curve is curved, decreasing most rapidly at low temperatures.\n\nThis is fundamentally different from a metal, where R increases linearly with temperature.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Sketch the expected shape of the resistance-versus-illumination graph for an LDR. Describe how the resistance changes from dark to bright conditions and explain the typical numerical range. (3 steps)", "answer": "- Step 1: The graph shows resistance R on the y-axis (usually logarithmic scale) against light intensity (illumination) on the x-axis. It is a decreasing curve — as illumination increases, resistance decreases. The curve is hyperbolic in shape.\n- Step 2: In darkness, the LDR has very high resistance — typically several MΩ (megohms, millions of ohms). As light intensity increases, resistance drops rapidly at first, then the curve flattens. In bright light, resistance can fall to just tens or hundreds of ohms.\n- Step 3: This large range (from MΩ to Ω) is because each photon frees one electron. More light means more photons per second, more electrons freed, more carriers, lower resistance. The exact values depend on the specific LDR, but the ratio of dark-to-bright resistance can be 1000:1 or more.\n\nThis behavior allows LDRs to be used as light sensors — the change in resistance can trigger switches for street lights, alarm systems, or brightness controls.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "The I-V characteristic curve for a thermistor is shown below. Describe the shape of this curve and explain why it differs from the straight-line graph of an ohmic resistor. (3 steps)", "answer": "- Step 1: The I-V graph for a thermistor curves upward — it bends away from a straight line through the origin. At low voltages, the graph is nearly linear, but as voltage increases, the current rises faster than linearly (the gradient increases).\n- Step 2: This happens because at higher voltages, more power is dissipated in the thermistor (P = IV). This power heats the thermistor, increasing its temperature. As temperature rises, more charge carriers are freed (n increases), so resistance decreases.\n- Step 3: With lower resistance, the same voltage increment produces a larger current increment. Therefore, the gradient (which equals 1/R) increases with voltage. The curve is symmetric — it works the same in both positive and negative directions.\n\nA straight-line I-V graph (ohmic behavior) would mean constant resistance. The thermistor's upward bend shows decreasing resistance with increasing power dissipation (self-heating).", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "In a potential-divider circuit containing a thermistor (as R₁) and a fixed resistor (R₂), state what happens to Vout when the temperature rises. Explain this using both the potential-divider formula and first principles. (3 steps)", "answer": "- Step 1: Using the potential-divider formula: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$. When temperature rises, the thermistor resistance R₁ decreases. In the denominator, R₁ + R₂ decreases. Since R₂ stays constant, the fraction R₂/(R₁ + R₂) increases.\n- Step 2: Therefore, Vout increases when temperature rises.\n- Step 3: From first principles: R₁ decreases → total circuit resistance decreases → current I = Vin/(R₁ + R₂) increases. Since Vout = I × R₂, and R₂ is constant, Vout must increase. Alternatively: less voltage is dropped across the smaller R₁, so more voltage appears across R₂.\n\nIf the thermistor were placed as R₂ instead, the behavior would reverse — Vout would decrease as temperature rises. The position of the sensor in the divider determines the output behavior.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A thermistor and fixed resistor are connected in a potential divider with Vin = 9.0 V. At room temperature, the thermistor resistance is 3.0 kΩ and the fixed resistor is 1.0 kΩ. Calculate Vout at room temperature. (2 steps)", "answer": "- Step 1: Identify the circuit configuration. The thermistor is R₁ (top), fixed resistor is R₂ (bottom), and Vout is across R₂.\n- Step 2: Apply the potential-divider formula:\n$$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2} = 9.0 \\times \\frac{1.0}{3.0 + 1.0} = 9.0 \\times \\frac{1.0}{4.0} = 9.0 \\times 0.25 = 2.25 \\, \\text{V}$$\n\nSo Vout = 2.25 V at room temperature. Note that the fraction is simply R₂/(total R), which here is 1/4 of the input voltage.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "In the circuit from the previous question, the temperature rises and the thermistor resistance falls to 1.0 kΩ. Calculate the new Vout and explain why it has changed. (3 steps)", "answer": "- Step 1: Apply the potential-divider formula with new R₁ = 1.0 kΩ:\n$$V_{out} = 9.0 \\times \\frac{1.0}{1.0 + 1.0} = 9.0 \\times \\frac{1.0}{2.0} = 9.0 \\times 0.5 = 4.5 \\, \\text{V}$$\n- Step 2: Vout has increased from 2.25 V to 4.5 V.\n- Step 3: This happens because the thermistor resistance decreased from 3.0 kΩ to 1.0 kΩ. When R₁ decreases, a smaller proportion of the total voltage is dropped across R₁, and a larger proportion appears across R₂ (where Vout is measured). Alternatively: lower total resistance means higher circuit current, and since Vout = I × R₂, more current means higher Vout.\n\nThis shows how the potential divider can convert a change in sensor resistance into a change in output voltage — the basis of temperature switching circuits.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Explain what is meant by the term \"number density\" (n) of charge carriers, and explain why a semiconductor has a much lower number density than a metal like copper at room temperature. (3 steps)", "answer": "- Step 1: Number density n is defined as the number of free charge carriers per unit volume of the material, measured in m⁻³ (carriers per cubic metre). It tells you how many charge carriers are available to conduct electricity in a given volume.\n- Step 2: In copper (a metal), each atom contributes approximately one free electron to the conduction band. With about 8.4 × 10²⁸ atoms per m³, copper has n ≈ 8.4 × 10²⁸ m⁻³. This is an enormous number.\n- Step 3: In a semiconductor like silicon, at room temperature, only a tiny fraction of electrons have enough thermal energy to break free from the covalent bonds. The number density is many orders of magnitude smaller — around 10¹⁹ to 10²⁰ m⁻³, depending on temperature. This is why semiconductors conduct much less well than metals. The huge difference in n explains why metals are good conductors and semiconductors are insulators at low temperatures.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A copper wire has cross-sectional area $$A = 1.0 \\, \\text{mm}^2 = 1.0 \\times 10^{-6} \\, \\text{m}^2$$ and carries a current of I = 10 A. Given that copper has n = $$8.4 \\times 10^{28} \\, \\text{m}^{-3}$$, calculate the mean drift velocity of the electrons. State the order of magnitude of your answer. (3 steps)", "answer": "- Step 1: Rearrange the current equation to find drift velocity: $$I = nqvA$$ gives $$v = \\frac{I}{nqA}$$. The charge on an electron is q = 1.60 × 10⁻¹⁹ C.\n- Step 2: Substitute the values:\n$$v = \\frac{10}{(8.4 \\times 10^{28}) \\times (1.60 \\times 10^{-19}) \\times (1.0 \\times 10^{-6})}$$\n$$v = \\frac{10}{8.4 \\times 1.60 \\times 10^{28 -19 -6}} = \\frac{10}{13.44 \\times 10^3} = \\frac{10}{1.344 \\times 10^4}$$\n$$v \\approx 7.4 \\times 10^{-4} \\, \\text{m/s}$$\n- Step 3: The drift velocity is approximately 7 × 10⁻⁴ m/s, or about 0.7 mm/s. This is remarkably slow — less than 1 millimeter per second. The electrons are moving very slowly, but the electric signal propagates at nearly the speed of light because each electron pushes the next one like dominoes.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "An LDR is connected as R₂ (the bottom resistor) in a potential divider with a fixed resistor R₁ = 8.0 kΩ and supply Vin = 12.0 V. In normal daylight, the LDR resistance is 670 Ω. Calculate Vout across the LDR. (2 steps)", "answer": "- Step 1: Here the LDR is R₂ (bottom), so Vout is measured across the LDR. The fixed resistor is R₁ = 8000 Ω on top.\n- Step 2: Apply the potential-divider formula, remembering that the LDR is R₂:\n$$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2} = 12.0 \\times \\frac{670}{8000 + 670} = 12.0 \\times \\frac{670}{8670}$$\n$$\\frac{670}{8670} \\approx 0.0773$$\n$$V_{out} \\approx 12.0 \\times 0.0773 \\approx 0.93 \\, \\text{V}$$\n\nSo Vout across the LDR is about 0.93 V in daylight.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Using the circuit from the previous question, explain what happens to the power dissipated in the fixed resistor R₁ when the LDR is placed in darkness (its resistance increases dramatically). (3 steps)", "answer": "- Step 1: In darkness, the LDR resistance increases significantly (from 670 Ω to around 1 MΩ or more). This increases the total circuit resistance: R_total = R₁ + R_LDR.\n- Step 2: Since the supply voltage Vin is fixed, the circuit current decreases: $$I = \\frac{V_{in}}{R_{total}}$$. With much higher R_LDR, the current drops substantially.\n- Step 3: Power dissipated in the fixed resistor is $$P = I^2 R_1$$. Since I decreases and R₁ is constant, the power P decreases. Alternatively, since less current flows through R₁, and P = IV across R₁, the power drops. The fixed resistor dissipates less power when the LDR is in darkness.\n\nThis illustrates a key principle: in a potential divider with a sensor, changing conditions affect both the voltage distribution and power consumption throughout the circuit.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "State what is meant by (a) an NTC thermistor and (b) a PTC material. Give one example of each. (2 parts)", "answer": "- (a) **NTC** stands for **Negative Temperature Coefficient**. An NTC thermistor is a semiconductor device whose resistance decreases when its temperature increases. Most thermistors are NTC type. Example: a mixed metal-oxide ceramic thermistor used in temperature sensing circuits.\n- (b) **PTC** stands for **Positive Temperature Coefficient**. A PTC material is one whose resistance increases when its temperature increases. Example: a metallic conductor like copper or tungsten. At high temperatures, the increased lattice vibrations impede electron flow more, increasing resistance.\n\nNote: Some specially doped semiconductors can show PTC behavior, but for Edexcel IAL, the key contrast is between metal (PTC) and semiconductor thermistor (NTC).", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "A student says \"The thermistor stores electrons, which is why the current changes.\" Explain why this statement is incorrect. (2 steps)", "answer": "- Step 1: This statement confuses charge storage with energy transfer. Resistors, thermistors, and LDRs do not \"store\" electrons — they are not capacitors. The current is the same throughout a series circuit because charge is conserved; no charge is lost or stored in the component.\n- Step 2: What actually happens is that the thermistor changes its resistance in response to temperature. This affects how much current flows for a given voltage (Ohm's law), but the same amount of charge exits the component as enters it. The component transfers electrical energy to thermal energy (heating), but does not store charge.\n\nThis is a common exam trap. Remember: current is the same everywhere in a series circuit; components do not \"use up\" or \"store\" charge.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In a potential-divider circuit used as a temperature sensor, explain why the fixed resistor is typically chosen to have a value approximately equal to the thermistor resistance at the mid-point of the operating temperature range. (2 steps)", "answer": "- Step 1: The potential-divider gives the maximum sensitivity when R₁ ≈ R₂. At this point, a small change in R₁ produces the largest change in Vout. This is because the fraction R₂/(R₁ + R₂) is most sensitive to changes in R₁ when R₁ and R₂ are similar.\n- Step 2: If the fixed resistor is too large or too small compared to the thermistor, the output voltage changes only slightly over the operating range, making it difficult to detect and measure temperature changes accurately. Choosing R₂ ≈ R₁ (at the mid-temperature) ensures the circuit is optimized for the intended application.\n\nFor example, if the thermistor varies from 440 Ω to 110 Ω over the temperature range, a fixed resistor of about 220-330 Ω would be suitable.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Explain why the I-V characteristic of a thermistor shows increasing gradient (curving upward) while the I-V characteristic of a metallic conductor (like a filament lamp) shows decreasing gradient (curving downward). (3 steps)", "answer": "- Step 1: **Thermistor**: As voltage (and thus current) increases, power dissipation (P = IV) increases. This heats the thermistor, raising its temperature. Higher temperature frees more charge carriers (n increases), which reduces resistance. Lower resistance means current increases faster for each additional volt — the gradient increases. This is an upward curve.\n- Step 2: **Filament lamp (metal)**: As voltage increases, the current heats the filament. Temperature rises, causing the lattice ions to vibrate more intensely. This increases electron scattering, reducing drift velocity v and increasing resistance. Higher resistance means current increases more slowly for each additional volt — the gradient decreases. This is a downward curve.\n- Step 3: The key difference is the underlying mechanism: in the thermistor, n increases with temperature (resistance falls); in the metal, n is fixed and v decreases with temperature (resistance rises). This produces opposite curve shapes.\n\nUnderstanding which curve bends which way is essential for identifying component types in exam questions.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": true}, {"question": "A thermistor has a current of 3.00 mA when V = 3.00 V is applied, and 16.25 mA when V = 7.00 V is applied. Calculate the resistance at each operating point and explain the difference. (3 steps)", "answer": "- Step 1: At I = 3.00 mA = 3.00 × 10⁻³ A, V = 3.00 V:\n$$R = \\frac{V}{I} = \\frac{3.00}{3.00 \\times 10^{-3}} = 1000 \\, \\Omega$$\n- Step 2: At I = 16.25 mA = 16.25 × 10⁻³ A, V = 7.00 V:\n$$R = \\frac{V}{I} = \\frac{7.00}{16.25 \\times 10^{-3}} = \\frac{7.00}{0.01625} \\approx 431 \\, \\Omega$$\n- Step 3: The resistance has decreased from 1000 Ω to 431 Ω. This happens because the higher voltage causes more current, which dissipates more power (P = IV). This additional power heats the thermistor, increasing n (more charge carriers freed), which decreases the resistance. This demonstrates the self-heating effect: higher voltage → higher current → more heating → lower resistance.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Draw the circuit symbols for (a) a thermistor and (b) an LDR. (2 symbols)", "answer": "- (a) **Thermistor symbol**: A rectangle with a diagonal line through it (representing a resistor), with a small \"t\" or \"θ\" next to it, or alternatively the IEC symbol for a temperature-dependent resistor. The most common Edexcel symbol is a resistor symbol with a diagonal line and a small \"t\" below it.\n- (b) **LDR symbol**: Similar to a resistor symbol (rectangle with diagonal), but with incoming arrows representing light rays striking it. The arrows point toward the rectangle to indicate light input.\n\nBoth symbols look like a resistor, with additional notation to indicate the controlling variable (temperature or light).", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A student states that \"in a semiconductor, when temperature increases, the electrons move faster, so current increases.\" Evaluate this statement and explain what actually happens at the microscopic level. (3 steps)", "answer": "- Step 1: The statement is partially correct but incomplete. While drift velocity v does change, it is NOT the primary reason for increased current in semiconductors. In fact, v actually decreases slightly due to increased scattering.\n- Step 2: The dominant effect is the huge increase in number density n. At low temperatures, most electrons in a semiconductor are bound in covalent bonds. As temperature rises, thermal energy frees more and more electrons, increasing n dramatically (approximately exponentially).\n- Step 3: In the equation I = nqvA, the increase in n (many orders of magnitude) more than compensates for any decrease in v. The net effect is a large increase in current. So the key concept is: **more carriers, not faster carriers** — it's the number of charge carriers that changes most significantly, not their speed.\n\nThis is fundamentally different from metals, where n is essentially constant and current changes primarily through v.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "An LDR is used in a circuit to switch on a garden light automatically when it gets dark. Explain what happens to the LDR resistance and the output voltage of the potential-divider as evening approaches and it gets darker. (4 steps)", "answer": "- Step 1: As light intensity decreases (evening approaches), fewer photons hit the LDR semiconductor.\n- Step 2: Fewer photons mean fewer electrons are freed from the crystal lattice, so the number density n of free charge carriers decreases.\n- Step 3: With fewer carriers, the LDR resistance increases — it can go from a few hundred ohms in bright light to several MΩ in darkness.\n- Step 4: In a typical potential-divider circuit (LDR as one resistor), this increase in LDR resistance means less voltage is dropped across the other resistor, so Vout changes. For an automatic light circuit, the increased Vout (or the change in state) triggers the transistor/switch to turn on the garden light. The exact behavior depends on whether the LDR is R₁ or R₂ in the divider.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Explain why very high currents should not be passed through a thermistor used in an experiment to measure its I-V characteristic. (2 steps)", "answer": "- Step 1: At high currents, the power dissipated (P = IV) becomes large. This causes significant self-heating of the thermistor.\n- Step 2: The self-heating raises the thermistor's temperature, which changes its resistance (decreases it for an NTC thermistor). This makes it impossible to isolate the effect of applied voltage from the effect of temperature. The measurement no longer reflects the true I-V relationship at a constant temperature — the thermistor is heating itself. This is why experiments typically use low currents and allow cooling time between measurements.\n\nThis is why the I-V curve of a thermistor shows the combined effect of voltage and self-generated heat.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Two graphs are shown: Graph A shows current increasing linearly with voltage (straight line through origin). Graph B shows current increasing with voltage but the curve bends upward (gradient increases). Identify which graph represents (i) a fixed ohmic resistor, (ii) a thermistor, and explain your reasoning. (3 parts)", "answer": "- (i) **Fixed ohmic resistor**: Graph A. A straight line through the origin means resistance is constant. The gradient (I/V = 1/R) is constant, so R is constant regardless of voltage.\n- (ii) **Thermistor**: Graph B. The upward-bending curve shows that as voltage increases, the gradient (ΔI/ΔV) increases. This means resistance is decreasing. This happens because higher voltage causes self-heating, which increases n and decreases R. The thermistor is non-ohmic.\n\nThis is a common exam question type: identifying components from their I-V characteristics. Remember: upward bend → decreasing R (thermistor, LDR); downward bend → increasing R (filament lamp, metal).", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A copper wire and a silicon crystal (semiconductor) are at the same temperature. Using the concept of number density n, explain why copper has a much lower resistance than silicon. (3 steps)", "answer": "- Step 1: Copper has an extremely high number density of free electrons: approximately n ≈ 8.4 × 10²⁸ m⁻³ (roughly one free electron per atom). This means there are enormous numbers of charge carriers available to conduct current.\n- Step 2: Silicon at room temperature has a much lower number density — around 10¹⁹ to 10²⁰ m⁻³. Most electrons are bound in covalent bonds and are not free to conduct.\n- Step 3: From I = nqvA, for the same wire dimensions and electric field, the current in copper is billions of times larger because n is billions of times larger. Since R = V/I, this means copper's resistance is billions of times smaller. The huge difference in n is why metals are conductors and semiconductors are insulators (at low temperatures).", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "In a potential-divider light sensor circuit, the LDR is placed as R₁ (top resistor). Describe what happens to Vout when light incident on the LDR increases (becomes brighter). (3 steps)", "answer": "- Step 1: When light on the LDR increases, more photons free more electrons, decreasing the LDR resistance (R₁ decreases).\n- Step 2: Using the potential-divider formula: Vout = Vin × [R₂/(R₁ + R₂)]. When R₁ decreases, the denominator decreases, and the fraction R₂/(R₁ + R₂) increases.\n- Step 3: Therefore, Vout increases when illumination increases. This is the opposite behavior to having the LDR as R₂ (bottom). The position of the sensor determines whether Vout increases or decreases with light.\n\nThis behavior is used in automatic street lights: as it gets dark, LDR resistance increases, and Vout decreases, which can be used to trigger the switching transistor to turn on the light.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A student converts 3.00 mA to $$3.00 \\times 10^{-6}$$ A instead of $$3.00 \\times 10^{-3}$$ A. Explain the error and state the correct conversion. (2 steps)", "answer": "- Step 1: The student confused milli- (10⁻³) with micro- (10⁻⁶). The prefix \"milli-\" means one-thousandth (10⁻³), while \"micro-\" means one-millionth (10⁻⁶).\n- Step 2: The correct conversion is: 3.00 mA = 3.00 × 10⁻³ A. If it were microamps, it would be 3.00 μA = 3.00 × 10⁻⁶ A. The difference is a factor of 1000 — a massive error that would make calculations completely wrong.\n\nThis is a common exam trap. Always check your prefixes: m = 10⁻³, μ = 10⁻⁶, n = 10⁻⁹, p = 10⁻¹².", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Explain why the resistance of an NTC thermistor at 100°C is much lower than at 20°C, using the specific data from the textbook: R ≈ 706 Ω at 20°C and R ≈ 74 Ω at 100°C. What does this tell you about how n changes with temperature? (3 steps)", "answer": "- Step 1: The resistance drops by a factor of about 706/74 ≈ 9.5 when temperature rises from 20°C to 100°C.\n- Step 2: Since R = V/I (at constant voltage, R ∝ 1/I), the current must increase by about 9.5 times. This large increase in current means many more charge carriers are available.\n- Step 3: Using I = nqvA, the dominant factor is the increase in n. The number density of free electrons must increase dramatically — roughly by a factor of 9.5 in this case. This is consistent with the exponential relationship: n increases approximately exponentially with temperature. At higher temperatures, much more thermal energy is available to free electrons from the covalent bonds, creating many more carriers.\n\nThis dramatic change in resistance over a relatively small temperature range (80°C) is why thermistors are so useful as sensitive temperature sensors.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": true}, {"question": "In a potential-divider circuit, if you wanted the output voltage to DECREASE when temperature rises, how would you arrange the components? Explain your answer. (2 steps)", "answer": "- Step 1: Swap the positions of the thermistor and fixed resistor. Place the fixed resistor as R₁ (top) and the thermistor as R₂ (bottom). Now Vout is measured across the thermistor.\n- Step 2: When temperature rises, the thermistor resistance (now R₂) decreases. Using Vout = Vin × [R₂/(R₁ + R₂)], as R₂ decreases, the fraction decreases, so Vout decreases. This gives the opposite behavior to the standard configuration.\n\nThis flexibility allows designers to create circuits that respond either increasing or decreasing with temperature, depending on the application requirements.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A filament lamp and a thermistor both show curved I-V graphs, but the curves bend in opposite directions. Explain why both are non-ohmic but curve in opposite ways. (3 steps)", "answer": "- Step 1: Both devices are non-ohmic because their resistance changes with applied voltage/current. However, the direction of change is opposite.\n- Step 2: **Filament lamp**: Current heats the filament, raising its temperature. Metal filaments have PTC behavior — increased temperature increases lattice vibrations, which reduces drift velocity v and increases resistance. Higher resistance means current increases less rapidly with voltage → curve bends downward (gradient decreases).\n- Step 3: **Thermistor**: Current heats the thermistor, raising its temperature. Semiconductors have NTC behavior — increased temperature frees more charge carriers, increasing n dramatically, which reduces resistance. Lower resistance means current increases more rapidly with voltage → curve bends upward (gradient increases).\n\nThe key distinction: metals → resistance increases with temperature (downward curve); semiconductors → resistance decreases with temperature (upward curve).", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": true}, {"question": "Define what is meant by (a) drift velocity and (b) mean drift velocity, in the context of electron flow in a conductor. (2 parts)", "answer": "- (a) **Drift velocity** is the average velocity of charge carriers (usually electrons) in a conductor when an electric field is applied. It is not the random thermal motion speed (which is much faster), but the net slow movement in the direction opposite to the electric field.\n- (b) **Mean drift velocity** is the statistical average of the drift velocities of all the charge carriers. Individual electrons move randomly and collide frequently, but on average they drift slowly in one direction. The mean drift velocity v appears in the equation I = nqvA.\n\nTypical drift velocities are very small — on the order of 10⁻⁴ m/s (less than 1 mm/s) for normal currents in metals.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A data logger is suggested as a method to obtain the I-V characteristic of a thermistor. State one advantage and one disadvantage of using a data logger compared to manual measurements with a voltmeter and ammeter. (2 points)", "answer": "- **Advantage**: A data logger can take measurements much more quickly and at smaller intervals, reducing human error and capturing rapid changes. It can also log data automatically over long periods or with continuous variations, improving precision and allowing more data points.\n- **Disadvantage**: The data logger itself may introduce systematic errors (calibration issues) or may not be able to handle the high currents or voltages required. It also removes the student's direct engagement with the circuit, which can be valuable for understanding. Additionally, equipment setup is more complex.\n\nThis type of question appears in Edexcel practical papers, testing understanding of experimental methods and data collection.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "Explain why glass is an insulator at room temperature but can conduct electricity when heated to very high temperatures, using the concepts from this chapter. (3 steps)", "answer": "- Step 1: At room temperature, glass is an insulator because its electrons are tightly bound in covalent bonds. The number density n of free charge carriers is essentially zero — no electrons are available to conduct.\n- Step 2: When heated to very high temperatures (glowing red hot), the thermal energy supplied is sufficient to break some of the bonds between atoms in the glass structure.\n- Step 3: This thermal breakdown releases electrons from the lattice, dramatically increasing n. According to I = nqvA, even though v may decrease slightly due to increased scattering, the huge increase in n dominates, and the glass begins to conduct. This is the same principle as for a thermistor, but at much higher temperatures.\n\nThis demonstrates the semiconductor behavior of materials that are normally insulators — at high enough temperatures, they can conduct.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In the potential-divider formula $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$, explain what happens to Vout in the limiting cases where (a) R₁ → 0 and (b) R₁ → ∞. (2 cases)", "answer": "- (a) When R₁ → 0 (thermistor resistance becomes very small, e.g., at very high temperature): The fraction becomes R₂/(0 + R₂) = R₂/R₂ = 1. So Vout → Vin. Almost the full input voltage appears across R₂.\n- (b) When R₁ → ∞ (thermistor resistance becomes very large, e.g., at very low temperature or dark for LDR): The fraction becomes R₂/(∞ + R₂) → 0. So Vout → 0. Almost no voltage appears across R₂.\n\nThese limiting cases show the full range of output voltage: from 0 to Vin. The actual operating range depends on how the sensor resistance changes over its working range.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "A thermistor is to be used in a circuit to protect a delicate component from overheating. Explain how you would set up the circuit and what behavior you would expect. (3 steps)", "answer": "- Step 1: Connect the thermistor in series with the delicate component and a power supply. Alternatively, use it in a potential-divider configuration to monitor temperature and trigger a shutdown transistor.\n- Step 2: As temperature rises, the thermistor resistance decreases (NTC behavior). In a series circuit, this lower resistance allows more current to flow — but we want to protect the component, so we might use the thermistor to trigger a transistor that disconnects the supply when temperature gets too high.\n- Step 3: The key is to choose a thermistor with the appropriate resistance range so that at normal operating temperatures, current flows normally, but at excessive temperatures, the circuit behavior changes (either limiting current or cutting it off entirely). The thermistor acts as a temperature-sensitive switch.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Why do LDRs and thermistors both show the same type of R-change behavior (resistance decreases with increasing \"energy input\") despite different triggering mechanisms? (2 steps)", "answer": "- Step 1: Both devices are semiconductors. In both cases, the mechanism involves increasing the number density n of free charge carriers.\n- Step 2: For the thermistor, the energy input is thermal energy (heat), which frees electrons from covalent bonds. For the LDR, the energy input is photon energy (light), which also frees electrons from bonds. In both cases, more energy → more free carriers → lower resistance. The underlying semiconductor physics is the same, even though the source of energy differs.\n\nThis is why both components have \"negative coefficient\" behavior — they both rely on the same fundamental property of semiconductors: n increases with energy input.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "Explain what is meant by the \"self-heating\" effect in a thermistor, and describe how this affects the shape of its I-V characteristic. (2 steps)", "answer": "- Step 1: Self-heating occurs when current through the thermistor dissipates power (P = IV), which raises its temperature. This is an internal heating effect, not due to external temperature changes.\n- Step 2: As voltage (and thus current) increases, more power is dissipated, the thermistor gets hotter, its resistance decreases (NTC), and the current increases even more. This creates a positive feedback loop, causing the I-V curve to bend upward (increasing gradient). At low voltages, self-heating is minimal, and the curve is nearly linear. At higher voltages, self-heating becomes significant, and the curve bends upward.\n\nThis is why the I-V curve is not a straight line — the thermistor's own operation changes its resistance.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A student connect a voltmeter across the output of a potential-divider and reads Vout = 3.0 V when Vin = 6.0 V. If the fixed resistor is 500 Ω, calculate the resistance of the sensor (thermistor or LDR). (3 steps)", "answer": "- Step 1: Use the potential-divider formula rearranged to find the sensor resistance R₁:\n$$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$\n$$\\frac{V_{out}}{V_{in}} = \\frac{R_2}{R_1 + R_2}$$\n$$\\frac{3.0}{6.0} = \\frac{500}{R_1 + 500}$$\n$$0.5 = \\frac{500}{R_1 + 500}$$\n- Step 2: Rearrange: 0.5(R₁ + 500) = 500 → R₁ + 500 = 1000 → R₁ = 500 Ω.\n- Step 3: The sensor resistance is 500 Ω, equal to the fixed resistor. This makes sense: when R₁ = R₂, each resistor drops half the voltage, so Vout = Vin/2 = 3.0 V.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}], "count": 38}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What does each symbol in the equation $$I = nqvA$$ physically represent, and why does this equation matter for understanding semiconductors?", "answer": "- Step 1: $$I$$ is the current (in amperes), the rate of charge flow through a cross-section of the conductor.\n- Step 2: $$n$$ is the **number density** of free charge carriers — how many free electrons (or holes) exist per cubic metre. Units: $$\\text{m}^{-3}$$.\n- Step 3: $$q$$ is the charge per carrier. For electrons, $$q = 1.60 \\times 10^{-19}\\ \\text{C}$$. This is fixed.\n- Step 4: $$v$$ is the **mean drift velocity** — the average speed at which carriers drift along the wire under the applied field. Typically very slow (mm/s).\n- Step 5: $$A$$ is the cross-sectional area of the conductor.\n- Step 6: This equation matters because $$q$$ and $$A$$ are fixed by the material and geometry. So changes in current (and hence resistance) come from changes in $$n$$ or $$v$$. In **metals**, $$n$$ is fixed and $$v$$ changes with temperature. In **semiconductors**, $$n$$ changes dramatically with temperature/light — and this is the whole story.\n\nTakeaway: $$I = nqvA$$ is the lens for understanding every R-vs-T or R-vs-light behaviour in this chapter.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Derive the equation $$I = nqvA$$ from first principles, starting from \"how much charge passes a cross-section per second?\" (4 steps)", "answer": "- Step 1: Imagine a conductor of cross-sectional area $$A$$ with free carriers drifting at mean velocity $$v$$. In a time $$\\Delta t$$, each carrier travels a distance $$v\\,\\Delta t$$ along the wire.\n- Step 2: The volume of conductor that \"sweeps past\" any chosen cross-section in time $$\\Delta t$$ is $$A \\cdot v\\,\\Delta t$$ — a cylinder of length $$v\\,\\Delta t$$ and area $$A$$.\n- Step 3: The number of carriers in that volume is (number density × volume) $$= n \\cdot A \\cdot v\\,\\Delta t$$. The total charge they carry is $$\\Delta Q = n \\cdot q \\cdot A \\cdot v \\cdot \\Delta t$$.\n- Step 4: Current is charge per unit time: $$I = \\Delta Q / \\Delta t = nqvA$$.\n\nTakeaway: It's really just \"how many carriers cross the boundary per second, each carrying charge $$q$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "Why does a metal's resistance **increase** when its temperature rises, in terms of $$I = nqvA$$? (3 steps)", "answer": "- Step 1: In a metal, $$n$$ is already huge (roughly one free electron per atom, e.g. $$n \\approx 8.4 \\times 10^{28}\\ \\text{m}^{-3}$$ for copper). The metal is \"fully ionised\" in this sense, so heating cannot free more carriers — $$n$$ is essentially fixed.\n- Step 2: Heating the lattice makes the positive ions vibrate with greater amplitude. The drifting electrons collide with these vibrating ions more often, scattering them and reducing the **mean drift velocity** $$v$$.\n- Step 3: With $$n$$, $$q$$, $$A$$ all constant and $$v$$ decreasing, $$I = nqvA$$ falls for the same voltage. Hence $$R = V/I$$ rises. Metal = **PTC** (positive temperature coefficient).\n\nTakeaway: In a metal, temperature attacks $$v$$, not $$n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Why does an NTC thermistor's resistance **decrease** sharply when its temperature rises, in terms of $$I = nqvA$$? (4 steps)", "answer": "- Step 1: In a semiconductor (thermistor material), most electrons are locked into covalent bonds in the lattice at low temperature. $$n$$ is initially very small.\n- Step 2: As temperature rises, thermal energy breaks some bonds, freeing electrons. $$n$$ increases **approximately exponentially** with temperature — a huge change.\n- Step 3: At the same time, lattice vibrations also reduce $$v$$ slightly (same mechanism as in a metal), but this effect is small.\n- Step 4: The massive rise in $$n$$ dominates over the small fall in $$v$$. So $$I = nqvA$$ rises strongly for the same voltage, meaning $$R = V/I$$ falls. Semiconductor = **NTC** (negative temperature coefficient).\n\nTakeaway: In a semiconductor, temperature attacks $$n$$ much harder than $$v$$ — opposite winner compared to a metal.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "Why are the temperature behaviours of a metal and an NTC thermistor *opposite*, even though the underlying physics (lattice vibrations) is the same in both? (3 steps)", "answer": "- Step 1: Both effects happen in both materials when temperature rises: (a) lattice ions vibrate more, scattering electrons and reducing $$v$$; (b) thermal energy can free more bound electrons, raising $$n$$.\n- Step 2: In a metal, $$n$$ is already saturated (electrons are already free), so effect (b) is negligible. Only effect (a) matters → $$v$$ falls → $$R$$ rises.\n- Step 3: In a semiconductor, $$n$$ starts tiny, so effect (b) is enormous and exponential. It vastly outweighs effect (a) → $$n$$ rises sharply → $$R$$ falls.\n\nTakeaway: Same two effects in both materials; the *starting value of $$n$$* decides which effect wins.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "Explain qualitatively why $$n$$ in a semiconductor grows roughly *exponentially* with temperature, rather than linearly.", "answer": "Freeing an electron from a covalent bond requires a certain minimum thermal energy. At any given temperature, only a fraction of electrons have enough random thermal energy (from the Boltzmann distribution tail) to break free. As temperature rises, that \"tail\" of energetic electrons grows much faster than linearly — doubling the temperature can multiply the freed-carrier population by far more than 2. This is a statistical-mechanical effect: $$n \\propto e^{-E_g/(2k_B T)}$$ roughly, so even modest temperature increases produce dramatic increases in $$n$$. That's why the R–T curve of a thermistor is so steep at low temperatures and flattens at high ones.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "Why does an LDR's resistance fall when light shines on it? Trace the chain from photon to current. (4 steps)", "answer": "- Step 1: Light is made of photons, each carrying energy $$E = hf$$. The LDR is a semiconductor (typically cadmium sulfide, CdS) with most electrons locked in covalent bonds.\n- Step 2: When a photon is absorbed by the lattice, its energy can be transferred to a bound electron. If the photon energy exceeds the binding energy, the electron is freed and becomes available to conduct.\n- Step 3: More photons (brighter light, higher intensity) means more electrons freed per second. The number density $$n$$ of conduction electrons rises with illumination.\n- Step 4: From $$I = nqvA$$, larger $$n$$ ⇒ larger $$I$$ at the same voltage ⇒ smaller $$R = V/I$$.\n\nTakeaway: The LDR converts \"more photons\" into \"more free carriers\" into \"lower resistance\".", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Why is the R-vs-temperature graph of a thermistor a steeply falling curve at low T that flattens at high T, rather than a straight line? (3 steps)", "answer": "- Step 1: Since $$n$$ grows roughly exponentially with $$T$$, $$R$$ (which is roughly inversely proportional to $$n$$) decays roughly exponentially with $$T$$.\n- Step 2: At low temperatures, freeing the first carriers makes a *huge* relative change to $$n$$ (going from \"almost none\" to \"some\"). So $$R$$ falls very steeply.\n- Step 3: At high temperatures, $$n$$ is already large; freeing more carriers makes a small *relative* change. So the curve flattens — diminishing returns.\n\nTakeaway: The shape reflects exponential decay; the curve is steep where $$n$$ is small and gentle where $$n$$ is already large.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Sketch (in words) the I-V characteristic of a thermistor and explain why it bends *away* from a straight ohmic line. (4 steps)", "answer": "- Step 1: At low $$V$$, the current is small and the thermistor doesn't heat much — it behaves nearly ohmically, so the curve starts almost linear.\n- Step 2: As $$V$$ rises, power dissipated $$P = IV$$ rises and self-heats the thermistor.\n- Step 3: The higher internal temperature increases $$n$$, which decreases $$R$$. So for each extra volt added, the current rises by *more* than it did the previous volt.\n- Step 4: The graph therefore bends upward (gradient $$dI/dV = 1/R$$ increases). It is also symmetric in both quadrants — the device doesn't care about current direction.\n\nTakeaway: The I-V curve bends upward because the thermistor *gets less resistive as it gets hotter*, and it heats itself.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "The LDR's R-vs-illumination graph is roughly a hyperbolic decrease. Why doesn't $$R$$ ever drop instantly to zero, even in very bright light?", "answer": "Even with intense illumination, the number of free carriers $$n$$ remains finite — the semiconductor still has limits on how many electrons can be freed (set by the number of bonded electrons and how fast they recombine). Also, even with $$n$$ large, the drift velocity $$v$$ is still limited by lattice scattering, and the wire/contacts have their own resistance. So $$R$$ falls dramatically (from MΩ in darkness to tens of Ω in bright light) but stays positive. The curve approaches an asymptote, never zero.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Why is it *wrong* to write $$R = IV$$? What's the correct formula and a simple sanity check? (3 steps)", "answer": "- Step 1: The correct definition is $$R = V/I$$ — resistance is the *ratio* of voltage to current. This comes directly from Ohm's relation $$V = IR$$, rearranged.\n- Step 2: $$R = IV$$ instead computes power: $$P = IV$$ (watts), not resistance. The two equations describe completely different quantities.\n- Step 3: Sanity check by units. $$V/I$$ has units $$\\text{volt}/\\text{amp} = \\text{ohm}$$ ✓. But $$IV$$ has units $$\\text{amp} \\cdot \\text{volt} = \\text{watt}$$ ✗. Also a numerical check: if $$V = 3\\ \\text{V}$$, $$I = 3\\ \\text{mA}$$, then $$R = 3/0.003 = 1000\\ \\Omega$$, which is sensible; $$IV = 0.009$$ would not be a resistance.\n\nTakeaway: Multiplying gives power. Dividing gives resistance. Always check units.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "A thermistor passes 3.0 mA at 3.0 V, and 16.25 mA at 7.0 V. What is its resistance at each point, and what does the change tell you? (3 steps)", "answer": "- Step 1: At 3.0 V,
