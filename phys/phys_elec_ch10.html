ut only slightly — the temperature coefficient is small (a few parts per thousand per °C). To measure room-temperature changes of a few degrees, you'd need an extremely precise resistance measurement.\n- Step 2: A thermistor (semiconductor), by contrast, can change R by factors of 2–10 over the same temperature range. The signal is enormous, easy to detect, and translates directly into a usable voltage swing in a potential divider.\n- Step 3: Practical conclusion: metals are good for *very precise* sensing over wide ranges (like platinum resistance thermometers, used industrially), but thermistors are vastly more sensitive in normal operating ranges.\n\nTakeaway: Use thermistors when you need large, easy-to-measure response over a narrow range.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "A semiconductor has $$n$$ that doubles for every 10 °C rise. If R falls by a factor of 2 every 10 °C, what does this imply about $$v$$? (3 steps)", "answer": "- Step 1: From $$I = nqvA$$ at fixed V, $$R = V/I = V/(nqvA)$$. So $$R \\propto 1/(nv)$$.\n- Step 2: If $$n$$ doubles and R halves, the product $$nv$$ exactly doubles. Since $$n$$ alone doubles, $$v$$ must be **roughly unchanged** (or only slightly reduced).\n- Step 3: This is consistent with the physical picture: in a thermistor, $$v$$ changes slowly (mild scattering increase) while $$n$$ changes dramatically. To good approximation, R is set by $$n$$.\n\nTakeaway: Exponential R-T behaviour is essentially exponential $$n$$-T behaviour, with $$v$$ playing only a minor role.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "An exam question asks: \"Explain why R decreases when an LDR is illuminated.\" For a 4-mark answer, what four points must you make? (4 steps)", "answer": "- Step 1: **Photons** (or \"light energy\") incident on the semiconductor lattice transfer their energy to **electrons in covalent bonds**.\n- Step 2: This frees electrons from the bonds — **number density $$n$$ of charge carriers increases**.\n- Step 3: From the equation $$I = nqvA$$, with $$q$$ and $$A$$ fixed and $$v$$ approximately constant, **current $$I$$ increases** for the same applied voltage.\n- Step 4: Since $$R = V/I$$ and $$V$$ is fixed while $$I$$ has risen, **R decreases**.\n\nTakeaway: Hit all four steps — photon → free electrons → n up → R down. Don't skip the equation.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "A potential-divider light sensor uses an LDR in the top slot and a fixed resistor at the bottom, with the output across the fixed resistor. As the room gets darker, does the output rise or fall, and why?", "answer": "- Step 1: Darker → fewer photons → fewer free carriers → LDR resistance **rises** sharply.\n- Step 2: $$V_{out}$$ across the fixed bottom resistor $$R_2$$: $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_{LDR} + R_2}$$. As $$R_{LDR}$$ grows, the denominator grows and the fraction shrinks.\n- Step 3: $$V_{out}$$ across the fixed resistor **falls** as the room darkens.\n\nTakeaway: LDR on top + dark → output (across bottom) falls. LDR on bottom + dark → output (across LDR) rises. Position matters.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Connect the three formulae: $$I = nqvA$$, $$R = V/I$$, and $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_1+R_2}$$. Walk through how a temperature change at the thermistor ends up changing the output voltage of a potential divider. (5 steps)", "answer": "- Step 1: Temperature rises at the thermistor.\n- Step 2: From the semiconductor mechanism, $$n$$ in the thermistor rises substantially (electrons freed from lattice).\n- Step 3: From $$I = nqvA$$, at the same applied voltage the current through the thermistor would rise (if measured in isolation); equivalently, $$R = V/I$$ for the thermistor **falls**.\n- Step 4: In the potential divider $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_1+R_2}$$: if the thermistor sits as $$R_1$$, the denominator shrinks → fraction grows → $$V_{out}$$ rises.\n- Step 5: That voltage change can be fed to a switch or alarm circuit. The whole chain — heat → electronic structure change → resistance change → voltage shift — links microscopic semiconductor physics to a macroscopic sensor output.\n\nTakeaway: Three formulas, one chain: $$n$$-change drives R-change drives V-change. This is the heart of sensor circuit design.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Two students disagree about why metal wire resistance rises with temperature. Student A says \"because electrons disappear when heated.\" Student B says \"because the lattice ions vibrate more, scattering electrons more often, reducing drift velocity.\" Who is right and why? (3 steps)", "answer": "- Step 1: Student A is wrong — heating doesn't destroy electrons or cause them to disappear. Charge is conserved; the number of free electrons in a metal is essentially constant.\n- Step 2: Student B is correct. In $$I = nqvA$$, the change in $$R$$ with T for a metal comes from $$v$$, not $$n$$. More lattice vibration → more collisions per unit time → less net drift in a given field → smaller $$v$$ → smaller $$I$$ → larger $$R$$.\n- Step 3: This is the opposite of a thermistor, where $$n$$ changes dramatically. Metal: $$v$$ effect. Thermistor: $$n$$ effect.\n\nTakeaway: Always identify *which* term in $$I=nqvA$$ is changing — that's the key to predicting R behaviour.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "You're asked: \"Compare what happens in copper vs in a NTC thermistor as they're cooled from room temperature.\" Give a structured answer. (4 steps)", "answer": "- Step 1: **Copper (metal)**: Cooling reduces lattice vibration → fewer scattering events → larger drift velocity $$v$$ → larger $$I$$ for same $$V$$ → R **falls**. (At very low temperatures, some metals become superconducting — R drops to zero.)\n- Step 2: **Thermistor (semiconductor)**: Cooling reduces thermal energy available to break covalent bonds → fewer free carriers → $$n$$ **falls** sharply.\n- Step 3: From $$I = nqvA$$, the drop in $$n$$ dominates → $$I$$ falls → R **rises** sharply.\n- Step 4: At very low T, a thermistor can become essentially insulating (R extremely large), while a metal becomes an excellent conductor — completely opposite behaviour.\n\nTakeaway: Cooling moves a metal towards better conduction; cooling moves a semiconductor towards worse conduction.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}], "count": 50}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 19640, "out_tokens": 11013, "reasoning_chars": 24977, "cost_eur": 0.0544, "elapsed_s": 111, "content_chars": 16722}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 19640, "out_tokens": 15751, "reasoning_chars": 1723, "cost_eur": 0.0697, "elapsed_s": 179, "content_chars": 60679}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 19639, "out_tokens": 17599, "reasoning_chars": 19904, "cost_eur": 0.0756, "elapsed_s": 208, "content_chars": 47877}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 18958, "out_tokens": 10088, "reasoning_chars": 2201, "cost_eur": 0.0137, "elapsed_s": 85, "content_chars": 39106}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 18958, "out_tokens": 10723, "reasoning_chars": 2407, "cost_eur": 0.0143, "elapsed_s": 94, "content_chars": 42441}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 29247, "out_tokens": 21780, "reas const SK='phys_elec_ch10';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
