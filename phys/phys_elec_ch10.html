<script>
const DATA={"selected": [{"question": "A copper wire and a silicon thermistor are both heated. Using $$I = nqvA$$, explain why copper's resistance *increases* while the thermistor's resistance *decreases*. Focus on which variable changes in each case and why. (3 steps)", "answer": "- Step 1: In copper (a metal), $$n$$ is already enormous ($$\\approx 8.4 \\times 10^{28}$$ m⁻³, roughly one free electron per atom) and barely changes when heated. But heating makes lattice ions vibrate more, increasing electron–ion collisions, which *reduces* the drift velocity $$v$$. Since $$n$$ and $$v$$ are the only variables and $$n$$ is fixed, a drop in $$v$$ means $$I$$ drops — so $$R = V/I$$ *increases*.\n- Step 2: In the silicon thermistor (a semiconductor), $$n$$ is initially very small because most electrons are locked in covalent bonds. Heating provides thermal energy that frees more electrons from the lattice, so $$n$$ *increases sharply* (approximately exponentially). Although $$v$$ decreases slightly due to more scattering, the huge increase in $$n$$ far outweighs the small decrease in $$v$$.\n- Step 3: The net effect in the semiconductor: $$I = nqvA$$ increases because the $$n$$-increase dominates, so for the same voltage, $$R = V/I$$ *decreases*. In the metal, $$I$$ decreases because only $$v$$ changes (decreasing), so $$R$$ *increases*. These are opposite behaviours — the single most tested distinction in this topic.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "A filament lamp and a thermistor both show curved I-V graphs, but the curves bend in opposite directions. Explain why both are non-ohmic but curve in opposite ways. (3 steps)", "answer": "- Step 1: Both devices are non-ohmic because their resistance changes with applied voltage/current. However, the direction of change is opposite.\n- Step 2: **Filament lamp**: Current heats the filament, raising its temperature. Metal filaments have PTC behavior — increased temperature increases lattice vibrations, which reduces drift velocity v and increases resistance. Higher resistance means current increases less rapidly with voltage → curve bends downward (gradient decreases).\n- Step 3: **Thermistor**: Current heats the thermistor, raising its temperature. Semiconductors have NTC behavior — increased temperature frees more charge carriers, increasing n dramatically, which reduces resistance. Lower resistance means current increases more rapidly with voltage → curve bends upward (gradient increases).\n\nThe key distinction: metals → resistance increases with temperature (downward curve); semiconductors → resistance decreases with temperature (upward curve).", "source": "MiniMax ②", "_id": "minimax_2_29"}, {"question": "Derive the current equation $$I = nqvA$$ from first principles by considering the charge that passes through a cross-section of a wire in time $$\\Delta t$$. (4 steps)", "answer": "- Step 1: Imagine a wire of cross-sectional area $$A$$. Free charge carriers drift with mean velocity $$v$$. In a time interval $$\\Delta t$$, each carrier moves a distance $$v \\Delta t$$.\n- Step 2: The volume of wire \"swept\" by these carriers in time $$\\Delta t$$ is a cylinder of length $$v\\Delta t$$ and area $$A$$: Volume $$= A \\cdot v\\Delta t$$.\n- Step 3: This volume contains $$n \\cdot A \\cdot v\\Delta t$$ carriers (since there are $$n$$ carriers per unit volume). Each carries charge $$q$$, so the total charge passing through the cross-section is $$\\Delta Q = n \\cdot q \\cdot v \\cdot A \\cdot \\Delta t$$.\n- Step 4: Current is charge per unit time: $$I = \\frac{\\Delta Q}{\\Delta t} = \\frac{nqvA\\Delta t}{\\Delta t} = nqvA$$.\n\nThis derivation shows the equation is really just \"number of carriers × charge per carrier × how fast they move × how wide the pipe is\" — a flow-rate equation.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "Why is writing $$R = IV$$ a serious error, and what is the correct relation? Use units to justify. (3 steps)", "answer": "- Step 1: The correct definition is $$R = V/I$$. Resistance is volts per ampere — ohms ($$\\Omega$$) = V/A.\n- Step 2: If you wrote $$R = IV$$, the units would be A·V = watts (W), which is **power**, not resistance. The formula would predict that running more current through a resistor (at fixed voltage) makes it more resistive — physically absurd.\n- Step 3: Quick sanity check: if $$V = 3\\,\\text{V}$$ and $$I = 3\\,\\text{mA}$$, $$R = V/I = 3 / 0.003 = 1000\\,\\Omega$$. Using the wrong formula gives $$3 \\times 0.003 = 0.009\\,\\Omega$$ — about five orders of magnitude wrong.\n\nTakeaway: $$R = V/I$$. If your answer is in watts, you've made the classic error.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "Explain why the resistance of an NTC thermistor at 100°C is much lower than at 20°C, using the specific data from the textbook: R ≈ 706 Ω at 20°C and R ≈ 74 Ω at 100°C. What does this tell you about how n changes with temperature? (3 steps)", "answer": "- Step 1: The resistance drops by a factor of about 706/74 ≈ 9.5 when temperature rises from 20°C to 100°C.\n- Step 2: Since R = V/I (at constant voltage, R ∝ 1/I), the current must increase by about 9.5 times. This large increase in current means many more charge carriers are available.\n- Step 3: Using I = nqvA, the dominant factor is the increase in n. The number density of free electrons must increase dramatically — roughly by a factor of 9.5 in this case. This is consistent with the exponential relationship: n increases approximately exponentially with temperature. At higher temperatures, much more thermal energy is available to free electrons from the covalent bonds, creating many more carriers.\n\nThis dramatic change in resistance over a relatively small temperature range (80°C) is why thermistors are so useful as sensitive temperature sensors.", "source": "MiniMax ②", "_id": "minimax_2_27"}, {"question": "Why is constantan (a copper-nickel alloy) used to make standard fixed resistors instead of pure copper?", "answer": "Constantan has a much higher resistivity than copper (~50 × 10⁻⁸ Ω·m vs ~1.7 × 10⁻⁸ Ω·m), so you only need a short length of wire to make a useful-sized resistor — practical for manufacturing. More importantly, constantan has a *very small temperature coefficient of resistivity*: its resistance barely changes with temperature. Pure copper, by contrast, has a strong PTC behaviour — its resistance would drift significantly when the resistor warms up under load, making it unreliable. So constantan's \"boring\" temperature-independence is exactly what you want for a precision fixed resistor.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "Why does the I-V curve of a thermistor curve upward at higher voltages? (3 steps)", "answer": "- **Step 1:** At higher voltages, power dissipation $ P = IV $ heats the thermistor (self-heating).  \n\n- **Step 2:** This temperature rise increases $ n $ (via thermal energy), lowering $ R = V/I $.  \n\n- **Step 3:** Reduced $ R $ allows more current $ I $ to flow for a given $ V $, causing the I-V curve to steepen (increasing gradient).  \n\n**Takeaway:** Self-heating in thermistors creates a positive feedback loop ($ V \\uparrow \\rightarrow T \\uparrow \\rightarrow n \\uparrow \\rightarrow R \\downarrow \\rightarrow I \\uparrow $).", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "Why is the LDR's R-illumination graph drawn as a *hyperbolic-looking* curve (steep at low light, flatter at high light)? (3 steps)", "answer": "- Step 1: At very low illumination, even a small added light intensity can free a relatively large fraction of additional electrons. So $$n$$ jumps significantly and $$R$$ falls steeply.\n- Step 2: At higher illumination, $$n$$ is already substantial. Adding more light makes a smaller *relative* contribution to $$n$$, so $$R$$ falls only gradually.\n- Step 3: The curve has the shape \"1/x-like\" because $$R \\propto 1/n$$ and $$n$$ grows with light intensity (roughly linearly until saturation), giving a hyperbolic-looking decrease.\n\nTakeaway: Diminishing-returns shape comes from $$R$$ being inversely related to a growing $$n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "Suppose you connect a thermistor in series with a battery and ammeter (no fixed resistor). As current rises, what happens, and what's the risk?", "answer": "- Step 1: Current dissipates power $$P = I^2 R$$ in the thermistor, heating it.\n- Step 2: Hotter thermistor → lower R → higher I at the same V → more power dissipated → even hotter. This is **positive feedback** (thermal runaway).\n- Step 3: Without a current-limiting fixed resistor in series, the thermistor can overheat and be destroyed. That's why measurement circuits cap the maximum current (~20 mA) and why most real circuits include a series ballast resistor.\n\nTakeaway: Self-heating + NTC behaviour → thermal runaway risk. Always limit current.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "Compare: thermistor on top of divider with fixed $$R_2$$ vs LDR on bottom of divider with fixed $$R_1$$. In both, what stimulus causes $$V_{out}$$ to *increase*? (3 steps)", "answer": "- Step 1: **Thermistor on top**: $$V_{out}$$ across $$R_2$$ (bottom). Heat → thermistor R falls → fraction $$R_2/(R_1+R_2)$$ rises → $$V_{out}$$ **rises**. Stimulus = **heat**.\n- Step 2: **LDR on bottom**: $$V_{out}$$ across the LDR. Darkness → LDR R rises → fraction $$R_2/(R_1+R_2)$$ rises → $$V_{out}$$ **rises**. Stimulus = **darkness**.\n- Step 3: Both rise but for opposite-feeling reasons: in the first, the *fixed* resistor grabs more voltage as the sensor weakens; in the second, the sensor itself grows and grabs more voltage. The position of $$V_{out}$$ relative to the sensor is what flips the logic.\n\nTakeaway: To predict $$V_{out}$$ direction, always identify *which* resistor $$V_{out}$$ is across, then ask whether that resistor's share of the total is growing or shrinking.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "What's a common application of an LDR in a potential divider, and how would you wire it so that a streetlight comes on at dusk? (3 steps)", "answer": "- Step 1: Place the LDR as $$R_2$$ (bottom) of the divider, with a fixed resistor $$R_1$$ on top. Measure $$V_{out}$$ across the LDR.\n- Step 2: In daylight: LDR R is small (~100 Ω). $$V_{out}$$ ≈ small (most of the supply drops across the large fixed $$R_1$$).\n- Step 3: At dusk: LDR R grows large (MΩ). The LDR now dominates; $$V_{out}$$ across it rises towards $$V_{in}$$. A threshold switch detects this rise and turns on the lamp. The light stays on until dawn raises the LDR's conductance again.\n\nTakeaway: LDR at bottom of divider → output rises as it gets dark → triggers the lamp.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "Contrast the mechanism of resistance change with temperature in a metal (PTC) versus an NTC semiconductor. (3 steps)", "answer": "- Step 1: In a metal, the number density $$n$$ is already very large and essentially fixed (roughly one free electron per atom). Rising temperature increases lattice vibrations, causing more collisions and reducing drift velocity $$v$$. Since $$I = nqvA$$ and $$v$$ drops, current drops, so resistance *increases* (Positive Temperature Coefficient).\n- Step 2: In an NTC semiconductor, the number density $$n$$ is initially very small. Rising temperature frees many more bound electrons, causing $$n$$ to increase exponentially. This huge increase in $$n$$ dominates over the slight decrease in $$v$$.\n- Step 3: Since $$I = nqvA$$ and $$n$$ increases massively, current increases, so resistance *decreases* (Negative Temperature Coefficient). The behaviours are opposite.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "Why is drift velocity so tiny in metals — slower than walking — despite the wire carrying amperes of current?", "answer": "- Step 1: In $$I = nqvA$$, you can carry a huge current $$I$$ either by having lots of carriers $$n$$ or by making them fast $$v$$. Metals have **enormous** $$n$$ (~$$10^{29}\\,\\text{m}^{-3}$$), so even at modest $$v$$, $$I$$ is large.\n- Step 2: Concretely: if $$n$$ is $$10^{29}$$, $$q$$ is $$10^{-19}$$, $$A$$ is $$10^{-6}$$, then $$nqA \\sim 10^4$$ A per (m/s). Just 1 mm/s of drift produces ~10 A. You don't need fast electrons.\n- Step 3: Physically, electrons in a metal are constantly bouncing off ions; the electric field nudges them slightly in one direction on top of huge thermal motion. The net drift is tiny.\n\nTakeaway: Huge $$n$$ → tiny $$v$$ does the job. Metals achieve currents through density, not speed.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "An LDR is placed in the *bottom* slot of a potential divider ($$R_2$$, where $$V_{out}$$ is measured) with a fixed $$R_1$$ on top. The room gets darker. Does $$V_{out}$$ increase or decrease, and why?", "answer": "- Step 1: Darker → fewer photons → less freeing of bound electrons → $$n$$ falls → LDR resistance $$R_2$$ **increases**.\n- Step 2: In $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_1 + R_2}$$, $$R_2$$ grows. The numerator grows, but the denominator also grows by the same amount. The ratio approaches 1 — i.e., $$V_{out}$$ **increases**.\n- Step 3: Intuition: if the LDR becomes \"the big resistor,\" it grabs most of the supply voltage. Since $$V_{out}$$ is measured across it, $$V_{out}$$ rises. This is exactly the trigger you'd want to switch on a streetlight at dusk.\n\nTakeaway: LDR on the bottom, light decreases → $$V_{out}$$ rises. Classic streetlight design.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Why is the I-V curve of a filament lamp (a metal) and the I-V curve of a thermistor essentially *mirror images* of each other (both bending away from the ohmic line, but in opposite directions)? (3 steps)", "answer": "- Step 1: Both devices self-heat as $$V$$ rises.\n- Step 2: In the **lamp** (metal, PTC), heating raises $$R$$, so each volt adds *less* current than the previous one. The curve bends *down* away from the ohmic line — gradient decreases.\n- Step 3: In the **thermistor** (semiconductor, NTC), heating lowers $$R$$, so each volt adds *more* current than the previous one. The curve bends *up* away from the ohmic line — gradient increases.\n\nTakeaway: They're mirror images because heating produces opposite resistance changes in the two material types — the central distinction between metal and semiconductor behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "A copper wire carries 10 A and has a cross-sectional area of 1.0 mm². Given $$n \\approx 8.4 \\times 10^{28}$$ m⁻³, the drift velocity works out to roughly 0.7 mm/s. Why is this so surprisingly slow, and how does electrical energy transfer actually happen if electrons barely move? (3 steps)", "answer": "- Step 1: The drift velocity is slow because there are *so many* free electrons in copper ($$n \\approx 10^{28}$$). Even though each electron barely crawls, the collective flow of $$10^{28}$$ carriers per cubic metre produces a substantial current. From $$I = nqvA$$, enormous $$n$$ compensates for tiny $$v$$.\n- Step 2: Electrical energy is not transferred by the physical motion of electrons from one end to the other. Instead, the electric field propagates through the wire at close to the speed of light. When you close a switch, the electric field is established throughout the circuit almost instantaneously.\n- Step 3: All electrons along the wire start drifting simultaneously — they push each other like a line of people in a crowded corridor. The signal (the electric field) travels fast; the individual charge carriers travel slow. This is analogous to how sound travels fast through air even though individual air molecules only oscillate tiny distances.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "Contrast the resistance-temperature behavior of metals (PTC) and semiconductors (NTC), and explain the underlying physical reasons. (5 steps)", "answer": "- **Step 1:** Metals (PTC): $ n $ is constant. Increased $ T $ causes more lattice vibrations → more collisions → reduced $ v $.  \n\n- **Step 2:** Reduced $ v $ lowers $ I = nqvA $, so $ R = V/I $ increases with $ T $.  \n\n- **Step 3:** Semiconductors (NTC): $ n $ increases exponentially with $ T $.  \n\n- **Step 4:** The exponential rise in $ n $ dominates over reduced $ v $, so $ I \\uparrow $ and $ R = V/I \\downarrow $.  \n\n- **Step 5:** Metals: $ R \\propto T $; semiconductors: $ R \\propto e^{-kT} $.  \n\n**Takeaway:** Opposite behaviors arise from fixed $ n $ (metals) vs temperature-dependent $ n $ (semiconductors).", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "Why does an NTC thermistor's resistance **decrease** sharply when its temperature rises, in terms of $$I = nqvA$$? (4 steps)", "answer": "- Step 1: In a semiconductor (thermistor material), most electrons are locked into covalent bonds in the lattice at low temperature. $$n$$ is initially very small.\n- Step 2: As temperature rises, thermal energy breaks some bonds, freeing electrons. $$n$$ increases **approximately exponentially** with temperature — a huge change.\n- Step 3: At the same time, lattice vibrations also reduce $$v$$ slightly (same mechanism as in a metal), but this effect is small.\n- Step 4: The massive rise in $$n$$ dominates over the small fall in $$v$$. So $$I = nqvA$$ rises strongly for the same voltage, meaning $$R = V/I$$ falls. Semiconductor = **NTC** (negative temperature coefficient).\n\nTakeaway: In a semiconductor, temperature attacks $$n$$ much harder than $$v$$ — opposite winner compared to a metal.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "Estimate the drift velocity of electrons in a copper wire of area $$1\\,\\text{mm}^2$$ carrying $$10\\,\\text{A}$$. Use $$n \\approx 8.4 \\times 10^{28}\\,\\text{m}^{-3}$$. You don't need an exact number — get the order of magnitude and interpret it. (3 steps)", "answer": "- Step 1: Rearrange $$I = nqvA$$ to get $$v = \\frac{I}{nqA}$$. Plug in orders: numerator $$\\sim 10$$. Denominator $$\\sim 10^{29} \\times 10^{-19} \\times 10^{-6} = 10^4$$.\n- Step 2: So $$v \\sim 10/10^4 = 10^{-3}\\,\\text{m/s}$$ — about **1 mm per second**. The full value is roughly $$7.4 \\times 10^{-4}\\,\\text{m/s}$$, or ~0.74 mm/s.\n- Step 3: This is astonishingly slow — slower than walking pace by orders of magnitude. Yet electrical signals (and light bulbs turning on) propagate at near light speed, because the **electric field** establishes itself nearly instantaneously throughout the wire; individual electrons don't need to travel far.\n\nTakeaway: Drift velocity is millimetres per second, even at high currents. Signals fly, but electrons crawl.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Copper has approximately $$n \\approx 8.4 \\times 10^{28}$$ free electrons per m³. Physically, where does this enormous number come from, and why does it mean $$n$$ is essentially \"locked\" and cannot increase further with temperature? (2 steps)", "answer": "- Step 1: In copper, each atom contributes roughly one free (conduction) electron to the \"electron sea.\" Copper's atomic density is about $$8.4 \\times 10^{28}$$ atoms per m³, so there is one free electron per atom. This is an intrinsic property of the metallic bond — the outermost electron is so loosely bound that it delocalises completely.\n- Step 2: Because every available electron is *already* free at any practical temperature, raising the temperature cannot free \"more\" electrons — there are no more to free. The metal is already \"fully ionised\" in terms of its conduction electrons. So $$n$$ is effectively a fixed constant, and the only way temperature affects current is through changing $$v$$ (more collisions → slower drift → less current → higher resistance).", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "Why is using $$P = V^2/R$$ rather than $$P = I^2 R$$ sometimes more useful when reasoning about a thermistor in a potential divider? (3 steps)", "answer": "- Step 1: When voltage across a component is fixed (e.g. the supply across a divider), $$P = V^2/R$$ tells you that as $$R$$ drops, $$P$$ rises *for that component if V across it stays the same*.\n- Step 2: In a divider, the supply $$V_{\\text{in}}$$ is fixed but $$V$$ across each component is *not* — it depends on the resistance ratio. So you have to be careful which voltage you're using.\n- Step 3: For the *total* power, $$P_{\\text{total}} = V_{\\text{in}}^2 / R_{\\text{total}}$$: as the thermistor's $$R$$ falls, $$R_{\\text{total}}$$ falls, so total power dissipated by the supply rises. This is a more robust use of the $$V^2/R$$ form.\n\nTakeaway: Pick the formula whose fixed quantity matches your circuit constraint.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "You have a metal wire and an NTC thermistor. Both are connected to identical batteries at the same initial temperature. After 10 seconds, the current through the thermistor is *higher* than at the start, but the current through the metal wire is *lower* than at the start. Explain both observations. (3 steps)", "answer": "- Step 1: **Metal wire:** Current flowing through the wire dissipates heat ($$P = I^2R$$), raising its temperature. In a metal, $$n$$ is fixed and lattice vibrations increase, reducing drift velocity $$v$$. From $$I = nqvA$$, with $$n$$ constant and $$v$$ decreasing, the current *decreases*. So after 10 seconds, the wire is warmer and its current has dropped.\n- Step 2: **NTC thermistor:** Current flowing also heats the thermistor. But in the semiconductor, the temperature rise frees more electrons, increasing $$n$$ sharply. Although $$v$$ decreases slightly, the increase in $$n$$ dominates, so $$n \\times v$$ increases. From $$I = nqvA$$, current *increases*. So after 10 seconds, the thermistor is warmer and its current has risen.\n- Step 3: This is a self-reinforcing effect in the thermistor: more current → more heating → lower R → even more current. In the metal, it's self-limiting: more current → more heating → higher R → less current. This is why a thermistor can exhibit thermal runaway if not carefully controlled, while a metal wire naturally stabilises.", "source": "GLM 5.1 ③", "_id": "glm_3_35"}, {"question": "Walk through, step by step, why the resistance of an NTC thermistor decreases when its temperature rises. Use $$I = nqvA$$ in your reasoning. (5 steps)", "answer": "- Step 1: Rising temperature delivers thermal energy to the semiconductor lattice. Some bound electrons absorb enough energy to escape their covalent bonds and become free conduction electrons.\n- Step 2: The number density $$n$$ of free carriers **rises sharply** (approximately exponentially with temperature in the operating range).\n- Step 3: At the same time, the lattice ions vibrate more, so carriers scatter more often, making the drift velocity $$v$$ slightly smaller for a given electric field.\n- Step 4: In $$I = nqvA$$, the **huge rise in $$n$$ massively outweighs the small fall in $$v$$**, so for the same applied voltage, $$I$$ increases.\n- Step 5: Since $$R = V/I$$ and $$V$$ is fixed while $$I$$ has grown, $$R$$ must **decrease**.\n\nTakeaway: In a semiconductor, the \"$$n$$ effect\" wins over the \"$$v$$ effect\" — opposite to a metal.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "An examiner asks: \"Explain why the resistance of an NTC thermistor decreases as temperature increases\" (3 marks). Write out the mark-scheme chain, identifying exactly what earns each mark. (4 steps)", "answer": "- Step 1: **Mark 1 — State the stimulus effect on carriers:** As temperature increases, thermal energy frees more electrons from the semiconductor lattice / more charge carriers are released. (Key phrase: \"more electrons freed\" or \"number density of charge carriers increases.\")\n- Step 2: **Mark 2 — Link to $$n$$ explicitly:** The number density of free charge carriers, $$n$$, increases (approximately exponentially with temperature). (Key phrase: \"$$n$$ increases.\")\n- Step 3: **Mark 3 — Use $$I = nqvA$$ to show $$n$$ dominates:** In the equation $$I = nqvA$$, the increase in $$n$$ is much greater than any decrease in drift velocity $$v$$, so the product $$n \\times v$$ increases. Therefore current $$I$$ increases for the same applied voltage. (Key phrase: \"increase in $$n$$ outweighs/outdominates the decrease in $$v$$.\")\n- Step 4: **Conclusion — State R decreases:** Since $$R = V/I$$ and $$I$$ has increased (for the same $$V$$), the resistance $$R$$ decreases. (Key phrase: \"$$R = V/I$$ decreases\" or \"resistance decreases because current increases.\")\n\nDo NOT just say \"resistance decreases because it's a semiconductor\" — that earns zero marks. The chain must go: temperature ↑ → $$n$$ ↑ → $$n$$ dominates over $$v$$ ↓ → $$I$$ ↑ → $$R$$ ↓.", "source": "GLM 5.1 ③", "_id": "glm_3_33"}, {"question": "An examiner shows you four I–V graphs: (A) a curve bending *upward* from a straight line (increasing gradient), (B) a straight line through the origin, (C) a curve bending *below* a straight line (decreasing gradient), (D) a curve that only conducts in one direction. Which represents an NTC thermistor? Explain your reasoning. (2 steps)", "answer": "- Step 1: The answer is **(A)** — a curve with increasing gradient. As voltage increases, more power is dissipated in the thermistor, its temperature rises, $$n$$ increases, $$R$$ decreases, and the gradient ($$\\Delta I/\\Delta V = 1/R$$) *increases*. The curve bends upward away from the ohmic straight line.\n- Step 2: Eliminating the others: (B) is a fixed ohmic resistor (constant $$R$$, constant gradient). (C) is a filament lamp — as current increases, the metal filament heats up, $$R$$ increases, and the gradient *decreases* (opposite of a thermistor). (D) is a diode — it only conducts in one direction (asymmetric), unlike a thermistor which is symmetric. The thermistor's curve looks like (A) in both quadrants.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "On an I-V graph, the gradient of the curve at any point equals $$1/R$$. For a thermistor, the gradient increases as you move to higher voltages. For a filament lamp, the gradient decreases. Explain what each gradient change tells you about how resistance is changing. (3 steps)", "answer": "- Step 1: Gradient = $$\\Delta I / \\Delta V = 1/R$$. If the gradient is increasing, then $$1/R$$ is increasing, which means $$R$$ is *decreasing*. This is the thermistor: higher voltage → more self-heating → more carriers → lower $$R$$ → steeper gradient.\n- Step 2: If the gradient is decreasing, then $$1/R$$ is decreasing, which means $$R$$ is *increasing*. This is the filament lamp: higher voltage → more current → more heating → more lattice vibrations → higher $$R$$ → flatter gradient.\n- Step 3: The I-V graph is a direct visual diagnostic of resistance behaviour. An ohmic component (fixed resistor) has a constant gradient (straight line) because $$R$$ doesn't change. Any curvature tells you $$R$$ is changing — and the *direction* of curvature tells you whether $$R$$ is increasing or decreasing.", "source": "GLM 5.1 ②", "_id": "glm_2_28"}, {"question": "An LDR has a resistance of several MΩ in darkness and a few hundred Ω in bright light. What does this enormous range tell you about how much $$n$$ changes with illumination? (2 steps)", "answer": "- Step 1: Since $$R = V/I$$ and $$I = nqvA$$, we can write $$R \\propto 1/n$$ (for fixed $$V$$, $$q$$, $$v$$, $$A$$). If resistance drops from ~$$10^6$$ Ω to ~$$10^2$$ Ω, that is a factor of roughly $$10^4$$ decrease.\n- Step 2: This means $$n$$ has increased by roughly a factor of $$10^4$$ — ten thousand times more free carriers in bright light than in darkness. This dramatic change reflects how few electrons are free in the dark (nearly all locked in bonds) versus how many photons can liberate in bright light.\n\nThe LDR's enormous resistance range is a direct consequence of the semiconductor's sensitivity to photon energy.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "Why does the I-V characteristic of a thermistor curve upward (steeper gradient at higher V) rather than being a straight line? (4 steps)", "answer": "- Step 1: For an ohmic resistor, $$I \\propto V$$ — gradient $$=1/R$$ is constant, so the line is straight.\n- Step 2: In a thermistor, as $$V$$ increases, the **power dissipated** $$P = VI = V^2/R$$ rises sharply. This heats the thermistor.\n- Step 3: Heating frees more electrons, $$n$$ rises, and the thermistor's resistance **falls**.\n- Step 4: With lower $$R$$, the same incremental increase in $$V$$ now produces a **larger** increase in $$I$$ than before. So the gradient $$dI/dV = 1/R$$ keeps growing → curve bends upward.\n\nTakeaway: Self-heating creates positive feedback on conductivity, so the I-V curve gets steeper as you go.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "A student says: \"When a thermistor heats up, the lattice ions vibrate more, impeding electron flow, so resistance increases.\" Why is this reasoning flawed for an NTC thermistor? (2 steps)", "answer": "- Step 1: The student is correctly identifying the mechanism that happens in a *metal* (where the number of free carriers is fixed, so increased vibrations dominate and resistance rises).\n- Step 2: In an NTC thermistor, the number of free carriers $$n$$ is not fixed; it increases exponentially with temperature. The massive influx of new charge carriers more than compensates for the increased impedance from lattice vibrations. The net effect is a *decrease* in resistance, not an increase.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "In the potential-divider formula $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$, explain what happens to Vout in the limiting cases where (a) R₁ → 0 and (b) R₁ → ∞. (2 cases)", "answer": "- (a) When R₁ → 0 (thermistor resistance becomes very small, e.g., at very high temperature): The fraction becomes R₂/(0 + R₂) = R₂/R₂ = 1. So Vout → Vin. Almost the full input voltage appears across R₂.\n- (b) When R₁ → ∞ (thermistor resistance becomes very large, e.g., at very low temperature or dark for LDR): The fraction becomes R₂/(∞ + R₂) → 0. So Vout → 0. Almost no voltage appears across R₂.\n\nThese limiting cases show the full range of output voltage: from 0 to Vin. The actual operating range depends on how the sensor resistance changes over its working range.", "source": "MiniMax ②", "_id": "minimax_2_33"}, {"question": "The I-V characteristic of a thermistor is a curve that bends *upward* (increasing gradient) away from a straight line through the origin. Explain why, using the self-heating effect. (4 steps)", "answer": "- Step 1: At low voltages, the thermistor is at room temperature, and the I-V curve starts roughly linearly (small V, small I, roughly constant R).\n- Step 2: As voltage increases, the power dissipated in the thermistor ($$P = IV$$ or $$P = V^2/R$$) increases. This power heats the thermistor above room temperature.\n- Step 3: The self-heating raises the thermistor's temperature → frees more electrons → increases $$n$$ → decreases $$R$$. With lower resistance, the current for a given voltage is *higher* than it would be at constant resistance.\n- Step 4: On the I-V graph, this means the current grows *faster* than linearly — the curve bends upward (increasing gradient). The gradient at any point is $$\\Delta I / \\Delta V = 1/R$$, and since $$R$$ is falling, the gradient is increasing. This is the signature of a non-ohmic component whose resistance falls with temperature.\n\nNote: The curve is symmetric about the origin — the thermistor works in both directions, and self-heating occurs regardless of current direction.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "Derive the equation $$I = nqvA$$ from first principles, starting from \"how much charge passes a cross-section per second?\" (4 steps)", "answer": "- Step 1: Imagine a conductor of cross-sectional area $$A$$ with free carriers drifting at mean velocity $$v$$. In a time $$\\Delta t$$, each carrier travels a distance $$v\\,\\Delta t$$ along the wire.\n- Step 2: The volume of conductor that \"sweeps past\" any chosen cross-section in time $$\\Delta t$$ is $$A \\cdot v\\,\\Delta t$$ — a cylinder of length $$v\\,\\Delta t$$ and area $$A$$.\n- Step 3: The number of carriers in that volume is (number density × volume) $$= n \\cdot A \\cdot v\\,\\Delta t$$. The total charge they carry is $$\\Delta Q = n \\cdot q \\cdot A \\cdot v \\cdot \\Delta t$$.\n- Step 4: Current is charge per unit time: $$I = \\Delta Q / \\Delta t = nqvA$$.\n\nTakeaway: It's really just \"how many carriers cross the boundary per second, each carrying charge $$q$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "A semiconductor's resistance decreases exponentially with temperature according to R = R₀e^(-kθ). What does this mathematical form tell you about how resistance changes with temperature, and how is this reflected in the shape of the R-T graph? (2 steps)", "answer": "- Step 1: Understanding exponential decrease\n  - R = R₀e^(-kθ) means resistance starts at R₀ when θ = 0\n  - As θ increases, the exponent becomes more negative, so e^(-kθ) gets smaller\n  - The rate of decrease is proportional to the current value—a fixed percentage drop per degree\n  - This is why the R-T curve is steep at low temperatures (large percentage change) and flattens at high temperatures (smaller percentage change)\n\n- Step 2: The graphical consequence\n  - Taking natural logs: ln R = -kθ + ln R₀\n  - This is a straight line with negative gradient when plotting ln R vs θ\n  - This confirms the textbook activity: plotting ln R against temperature gives a straight line (up to about 65°C)\n  - The curve shape (steep then flattening) is the visual representation of exponential decay", "source": "MiniMax ①", "_id": "minimax_1_31"}, {"question": "A circuit uses a thermistor to trigger an alarm when temperature exceeds a certain threshold. The fixed resistor is chosen so that Vout equals half the supply voltage at the threshold temperature. Explain why this is a good design choice. (2 steps)", "answer": "- Step 1: The middle-point advantage\n  - At the threshold temperature, Rthermistor ≈ Rfixed\n  - Vout = Vin × Rfixed/(Rthermistor + Rfixed) = Vin × 0.5 = Vin/2\n  - This is the point of maximum sensitivity\n\n- Step 2: Why maximum sensitivity?\n  - If Rthermistor is much smaller than Rfixed, small changes in Rthermistor produce tiny changes in the fraction\n  - If Rthermistor is much larger than Rfixed, small changes also produce tiny changes\n  - At the midpoint (equal resistances), the fraction changes most rapidly with resistance\n  - This gives the clearest \"switching\" action for the alarm\n  - A small temperature change around the threshold produces a large Vout change", "source": "MiniMax ①", "_id": "minimax_1_33"}, {"question": "From an I-V graph showing four curves — (A) bending upward from a straight line, (B) straight line through origin, (C) bending below a straight line, (D) horizontal — which corresponds to an LDR (or thermistor) and why? (3 steps)", "answer": "- Step 1: Both LDRs and thermistors self-heat as voltage rises (or, for an LDR, as the test current dissipates). This raises $$n$$ → lowers $$R$$ → makes $$I$$ grow *faster* than linearly with $$V$$.\n- Step 2: So gradient $$dI/dV = 1/R$$ *increases* with $$V$$. The curve bends upward — that's graph **A**.\n- Step 3: (B) is a fixed ohmic resistor. (C) bending below would be a filament lamp (where $$R$$ rises with $$V$$, the opposite of a thermistor). (D) horizontal would be a constant-current source, not relevant here.\n\nTakeaway: \"Bend up from ohmic line\" = $$R$$ falls under stress (NTC). \"Bend down from ohmic line\" = $$R$$ rises under stress (PTC, e.g. lamp).", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "How does a potential-divider circuit with a thermistor function as a temperature sensor? Derive $ V_{\\text{out}} = V_{\\text{in}} \\cdot \\frac{R_2}{R_1 + R_2} $ and explain its sensitivity to temperature changes. (4 steps)", "answer": "- **Step 1:** Voltage divider formula derivation:  \n  $ V_{\\text{out}} = IR_2 $, where $ I = \\frac{V_{\\text{in}}}{R_1 + R_2} $. Combine: $ V_{\\text{out}} = V_{\\text{in}} \\cdot \\frac{R_2}{R_1 + R_2} $.  \n\n- **Step 2:** If the thermistor is $ R_1 $, its resistance decreases as temperature rises.  \n\n- **Step 3:** Lower $ R_1 $ increases $ \\frac{R_2}{R_1 + R_2} $, so $ V_{\\text{out}} \\uparrow $.  \n\n- **Step 4:** A voltmeter across $ R_2 $ detects this voltage change, allowing temperature inference. Swapping $ R_1 $ and $ R_2 $ inverts the response.  \n\n**Takeaway:** Temperature-induced $ R_1 $ changes alter $ V_{\\text{out}} $, making the divider a sensitive sensor.", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "A student sees an I-V curve that bends *below* a straight line (decreasing gradient) and one that bends *above* a straight line (increasing gradient). Which belongs to a filament lamp and which to an NTC thermistor? Explain the physical reason for each shape. (3 steps)", "answer": "- Step 1: **Filament lamp** → curve bends *below* (decreasing gradient). As current increases, the filament heats up, lattice vibrations increase, drift velocity decreases, resistance increases. Higher $$R$$ means the gradient $$1/R$$ decreases, so the curve flattens. This is PTC behaviour.\n- Step 2: **NTC thermistor** → curve bends *above* (increasing gradient). As current increases, the thermistor heats up, more carriers are freed, $$n$$ increases, resistance decreases. Lower $$R$$ means the gradient $$1/R$$ increases, so the curve steepens. This is NTC behaviour.\n- Step 3: The opposite curvatures come from opposite resistance-temperature relationships. In a metal/lamp, heating makes conduction harder (more collisions). In a semiconductor, heating makes conduction easier (more carriers). The I-V curve shape is a direct window into whether the component is PTC or NTC.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "Why does an LDR have a much higher dark resistance (~MΩ) than a metal of the same dimensions (~Ω)? Use $$I = nqvA$$ to compare. (3 steps)", "answer": "- Step 1: In darkness, an LDR's $$n$$ is many orders of magnitude smaller than copper's (around $$10^{16}\\ \\text{m}^{-3}$$ vs $$10^{29}\\ \\text{m}^{-3}$$) — most electrons are bound in the lattice.\n- Step 2: From $$I = nqvA$$, with $$q$$, $$v$$, $$A$$ comparable, the LDR carries *vastly* less current for the same voltage. So $$R = V/I$$ is vastly larger.\n- Step 3: Shining light frees electrons and raises $$n$$ by many orders of magnitude, dropping $$R$$ from MΩ to hundreds of Ω.\n\nTakeaway: The resistance gap between a metal and a dark semiconductor is essentially the gap between their values of $$n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "The I-V characteristic of a thermistor is described as \"symmetric.\" What does this mean, and why is the thermistor symmetric while a diode is not? (2 steps)", "answer": "- Step 1: \"Symmetric\" means the I-V curve looks the same in the first and third quadrants — when you reverse the voltage, the current reverses with the same magnitude at the same |V|. The thermistor conducts equally well in both directions.\n- Step 2: A diode is *asymmetric* because it has a p-n junction that allows current easily in one direction (forward bias) but blocks it in the other (reverse bias). A thermistor has no p-n junction — it is simply a homogeneous piece of semiconductor ceramic. Whether electrons drift left or right, the same number of free carriers exist and the same scattering occurs. So the thermistor's resistance is the same regardless of current direction, giving a symmetric I-V curve.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "Why does a metal wire act as a \"bad\" temperature sensor compared to a thermistor, even though a metal's resistance *does* change with temperature?", "answer": "Two reasons. First, the *magnitude*: in the relevant range (say 0–100 °C), a metal's resistance only changes by maybe 30–40% total, while a thermistor's can drop by 90% or more. The signal is much smaller from a metal. Second, the *fractional change per degree*: in metals, $$R$$ depends roughly linearly on $$T$$, with a typical temperature coefficient of ~0.004 K⁻¹, while a thermistor's exponential dependence gives ~0.03 K⁻¹ — almost 10× more sensitive. So for the same temperature change, a thermistor produces a much larger and more easily measured response. (Metals *are* used for very precise temperature measurement — platinum resistance thermometers — but for everyday electronics, thermistors win on sensitivity and cost.)", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Why does saying \"the thermistor stores electrons\" or \"the LDR uses up the charge\" reveal a fundamental misconception?", "answer": "Charge is *conserved*, and in a series circuit the current is the *same everywhere* at any instant. Components don't store charge (capacitors do, briefly, but that's different) — they merely impede the flow and transfer electrical energy into heat or other forms. The same number of electrons that enter a thermistor per second also leave per second. What the thermistor actually does is *dissipate energy* ($$P = IV$$) — it converts electrical PE into thermal energy via collisions, but never destroys or stockpiles charge. Using \"stores electrons\" or \"uses up charge\" language conflates *energy transfer* with *charge transfer* and shows the student hasn't internalised charge conservation.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "Why does the number density $$n$$ of free charge carriers barely change in a metal when its temperature rises, but increase sharply in a semiconductor? (3 steps)", "answer": "- Step 1: In a metal like copper, the atoms are already fully ionised in the lattice — each atom has already donated its conduction electron(s). There is essentially one free electron per atom at *any* temperature. Raising the temperature cannot free significantly more electrons because they are already free. So $$n$$ is essentially fixed (and very large, ~$$10^{28}$$ m⁻³).\n- Step 2: In a semiconductor, most electrons are locked into covalent bonds at low temperature. Only a tiny fraction are free, so $$n$$ is very small. When temperature rises, thermal energy is absorbed by bound electrons, giving some of them enough energy to break free from the lattice and become conduction electrons.\n- Step 3: The increase in $$n$$ is approximately *exponential* with temperature — each small temperature rise frees proportionally more carriers. This is the fundamental asymmetry: metals have already \"maxed out\" their free carriers, while semiconductors have a vast reservoir of bound electrons waiting to be liberated.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "Define \"positive temperature coefficient\" (PTC) and \"negative temperature coefficient\" (NTC). Give a real-world example of each, and state which one describes a typical metal and which describes a typical thermistor. (2 steps)", "answer": "- Step 1: A **PTC** material has resistivity that *increases* with increasing temperature. The coefficient is \"positive\" because the change in resistivity is in the same direction as the change in temperature. Example: copper wire — as it heats, lattice vibrations impede electron flow, so resistance rises. All pure metals are PTC.\n- Step 2: An **NTC** material has resistivity that *decreases* with increasing temperature. The coefficient is \"negative\" because resistivity changes in the opposite direction to temperature. Example: an NTC thermistor (metal-oxide ceramic) — as it heats, more charge carriers are freed, so resistance falls. Most common thermistors are NTC. Note: PTC thermistors also exist (through doping), but are not the standard exam focus.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "A semiconductor's resistivity drops about 10× per 30 °C in some temperature range. A metal's resistivity rises maybe 10% per 30 °C. Why is the semiconductor change so much more *dramatic*?", "answer": "In the semiconductor, the change is driven by $$n$$, which depends *exponentially* on temperature — a small temperature rise unlocks a huge fractional increase in free carriers. In the metal, $$n$$ is constant; only $$v$$ changes, and it does so only as fast as lattice vibrations scale (roughly linearly with $$T$$ in the relevant range). Exponential growth in $$n$$ beats linear decrease in $$v$$ by orders of magnitude. That's why thermistors are useful for sensing (big response to small temperature changes) while pure metal wires are *not* good temperature sensors at moderate temperatures.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Suppose the supply voltage in a potential divider doubles. Does the *ratio* $$V_{\\text{out}}/V_{\\text{in}}$$ change? Does the temperature *response* change? (3 steps)", "answer": "- Step 1: The ratio $$V_{\\text{out}}/V_{\\text{in}} = R_2/(R_1 + R_2)$$ depends only on resistances, not on $$V_{\\text{in}}$$. So if you double $$V_{\\text{in}}$$, $$V_{\\text{out}}$$ also doubles — same ratio.\n- Step 2: The temperature *response* (how much $$V_{\\text{out}}$$ changes per degree) is proportional to $$V_{\\text{in}}$$: a 1 V change in $$V_{\\text{out}}$$ at $$V_{\\text{in}} = 6\\ \\text{V}$$ becomes a 2 V change at $$V_{\\text{in}} = 12\\ \\text{V}$$. So higher supply → bigger signal.\n- Step 3: But the *self-heating* of the thermistor also increases (power scales as $$V_{\\text{in}}^2$$), which shifts the thermistor's operating point and may bias the R-T relationship. Trade-off: bigger signal vs more self-heating distortion.\n\nTakeaway: Higher supply gives a stronger signal but more self-heating; choose accordingly.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "A student claims: \"When a thermistor heats up, its resistance decreases because the electrons move faster.\" Using the $$I = nqvA$$ framework, identify what is correct and what is wrong in this statement. (3 steps)", "answer": "- Step 1: The conclusion (resistance decreases) is correct, but the reason given is wrong. The student says \"electrons move faster\" — meaning higher drift velocity $$v$$. In reality, when a semiconductor heats up, the lattice ions vibrate more, causing *more* collisions with charge carriers. This *reduces* the mean drift velocity $$v$$, not increases it.\n- Step 2: The correct reason the resistance decreases is that $$n$$ increases sharply (more electrons are freed from covalent bonds by thermal energy). The increase in $$n$$ is the dominant effect. Even though $$v$$ decreases slightly, the product $$n \\times v$$ increases overall, so $$I$$ increases.\n- Step 3: So the correct statement is: \"When a thermistor heats up, its resistance decreases because the number density of free charge carriers $$n$$ increases sharply — this dominates over the slight decrease in drift velocity $$v$$.\" The student confused the roles of $$n$$ and $$v$$.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "Common student error: \"The thermistor's resistance change makes the current change first, and that changes the voltage.\" What's the proper logical chain, and why does the order matter? (4 steps)", "answer": "- Step 1: The **stimulus** (heat or light) comes first.\n- Step 2: The stimulus changes $$n$$ in the semiconductor — more carriers freed.\n- Step 3: This changes the **resistance** of the component (via $$I = nqvA$$ at fixed $$v$$).\n- Step 4: The changed R, combined with the (constant) supply voltage, finally changes the **current** through Ohm's law and changes the voltage distribution across the circuit.\n\nTakeaway: Stimulus → $$n$$ → R → I and V. Examiners specifically want you to state \"resistance changes\" before getting to current or voltage.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "What is \"doping\" and how is it relevant to building a semiconductor with a *positive* temperature coefficient (PTC)?", "answer": "Doping is adding controlled impurities (e.g. arsenic or boron) to a pure semiconductor like silicon. The impurities donate extra free carriers, raising $$n$$ at room temperature. By choosing the doping carefully, you can tune the semiconductor so that:\n- (a) at room temperature $$n$$ is large enough that the material behaves more \"metal-like\", and further temperature rise mainly reduces $$v$$ (giving a PTC response), or\n- (b) the increase in $$n$$ with $$T$$ is balanced by the decrease in $$v$$, giving a nearly *temperature-independent* resistor (e.g. carbon resistors).\n\nSo doping lets engineers design semiconductors that are NTC, PTC, or nearly constant-R — by controlling the balance between $$n$$ and $$v$$ behaviour in $$I = nqvA$$.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "The number density $$n$$ in a semiconductor increases \"approximately exponentially\" with absolute temperature. Qualitatively, what does \"exponentially\" mean here, and why does it produce such a steep R–T curve? (2 steps)", "answer": "- Step 1: \"Exponentially\" means that each equal step up in temperature causes the *same fractional* (percentage) increase in $$n$$, not the same *absolute* increase. For example, if $$n$$ doubles for every 10 K rise, then going from 100 to 110 K might double $$n$$ from 10 to 20, but going from 200 to 210 K would double $$n$$ from 160 to 320. The *rate of increase accelerates* as $$n$$ gets larger.\n- Step 2: Since $$R \\propto 1/n$$ (roughly), an exponential increase in $$n$$ means $$R$$ drops very rapidly at first (when the fractional change in $$n$$ per degree is large relative to the current value) and then the *rate* of R-decrease slows as you approach higher temperatures (the curve flattens). This is exactly the shape of the NTC thermistor's R–T curve: steep drop at low T, flattening at high T. The exponential relationship between $$n$$ and $$T$$ is the root cause.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "A student mixes up milliamps and microamps: they write $$3.00$$ mA as $$3.00 \\times 10^{-6}$$ A. What is the correct conversion, and by what factor is the student off? Why does this matter for resistance calculations? (2 steps)", "answer": "- Step 1: 1 mA = $$1 \\times 10^{-3}$$ A, so 3.00 mA = $$3.00 \\times 10^{-3}$$ A. The student wrote $$3.00 \\times 10^{-6}$$ A, which is 1000 times too small (they confused milli with micro).\n- Step 2: In a resistance calculation $$R = V/I$$, using a current that is 1000× too small would give a resistance that is 1000× too *large*. For example, with $$V = 3$$ V: correct $$R = 3/0.003 = 1000$$ Ω, but the student gets $$R = 3/0.000003 = 10^6$$ Ω. This is a catastrophic error that turns a kΩ answer into a MΩ answer. Always check: milli = $$10^{-3}$$, micro = $$10^{-6}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "When a semiconductor is heated, the number density $$n$$ increases but the drift velocity $$v$$ also decreases (more lattice scattering). Why does the resistance still *go down*? What would happen if $$v$$ decreased by the same *factor* as $$n$$ increased? (3 steps)", "answer": "- Step 1: In $$I = nqvA$$, both $$n$$ and $$v$$ change with temperature, but they change on very different scales. The number density $$n$$ increases approximately *exponentially* with temperature — it can double, triple, or increase tenfold over a modest temperature range. Meanwhile, $$v$$ only decreases slightly (around by a few percent) because the increased lattice scattering modestly impedes the carriers.\n- Step 2: The product $$n \\times v$$ therefore *increases* overall — the huge multiplicative increase in $$n$$ swamps the small fractional decrease in $$v$$. So $$I$$ increases, and $$R = V/I$$ decreases.\n- Step 3: If $$v$$ decreased by the same *factor* as $$n$$ increased (e.g. $$n$$ doubles and $$v$$ halves), then $$n \\times v$$ would stay constant, and resistance would not change. This is approximately what happens in a *doped* carbon resistor — the increase in $$n$$ and decrease in $$v$$ roughly balance, giving nearly constant resistance over a wide temperature range. But in a pure NTC thermistor, the exponential rise of $$n$$ always dominates.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "What does \"NTC\" stand for in \"NTC thermistor\", and why is this name appropriate? (2 steps)", "answer": "- Step 1: Define NTC\n  - NTC stands for Negative Temperature Coefficient\n  - \"Negative\" means the coefficient of resistance with temperature is negative—resistance decreases as temperature increases\n  - \"Coefficient\" refers to how much resistance changes per degree temperature change\n\n- Step 2: Why it's appropriate for a thermistor\n  - Most thermistors are made from semiconductor materials (mixed metal-oxide ceramics)\n  - When temperature increases, more electrons gain enough energy to break free from the crystal lattice\n  - This increases the number density n of free charge carriers\n  - From I = nqvA, more carriers means larger current for the same voltage, so resistance R = V/I decreases\n  - The name accurately describes this inverse relationship between temperature and resistance", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "Why is \"the thermistor has lower resistance than the fixed resistor, so it conducts more current\" a misleading statement in a *series* circuit?", "answer": "In a *series* circuit, the same current flows through every component — the thermistor doesn't \"conduct more current\" than the fixed resistor; both carry exactly the same current. What does happen is that less *voltage* drops across the thermistor (because it has lower $$R$$ and $$V = IR$$). The misconception confuses the parallel-circuit intuition (where lower-R branches carry more current) with the series-circuit reality (where everyone carries the same I). The correct phrasing is \"the thermistor has lower resistance, so a smaller fraction of the supply voltage drops across it.\"", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Why does increasing the *length* of a thermistor (not its temperature) increase its resistance, while increasing temperature *decreases* it? Reconcile using physical reasoning. (3 steps)", "answer": "- Step 1: Resistance $$R = \\rho L/A$$ depends on geometry — longer wire means more material, more places for collisions, larger $$R$$. This is geometric, not electronic.\n- Step 2: Temperature, by contrast, changes the **microscopic material property** $$\\rho$$ (resistivity), via changing $$n$$. For a thermistor, hotter → more free carriers → lower $$\\rho$$ → lower $$R$$.\n- Step 3: These two effects are independent. You could lengthen and heat a thermistor simultaneously, and one effect would raise R while the other lowers it. Whichever change is proportionally larger wins.\n\nTakeaway: Geometry sets the baseline R; carrier physics modulates it.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Why can a thermistor's R-T curve sometimes be modelled as $$R = R_0 e^{-k\\theta}$$, and what does taking logs do? (3 steps)", "answer": "- Step 1: Since $$n \\propto e^{+k\\theta}$$ (roughly) and $$R \\propto 1/n$$, we get $$R \\propto e^{-k\\theta}$$ — exponential decay with temperature. The parameter $$R_0$$ is the resistance at $$\\theta = 0$$.\n- Step 2: Taking natural log of both sides: $$\\ln R = \\ln R_0 - k\\theta$$.\n- Step 3: This is a straight line: plot $$\\ln R$$ (y-axis) against $$\\theta$$ (x-axis), and you get a line with gradient $$-k$$ and intercept $$\\ln R_0$$. This is a way to *test* whether real data follows the exponential model and to extract the constants $$k$$ and $$R_0$$.\n\nTakeaway: Logs turn exponentials into straight lines — a powerful trick for validating exponential relationships.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "A student claims: \"An LDR's resistance falls by a factor of 1000 from dark to bright. So drift velocity must increase by a factor of 1000 too.\" Identify and correct the error.", "answer": "- Step 1: The student is assuming $$n$$ doesn't change — that all the resistance change comes from $$v$$. This contradicts the physics of an LDR.\n- Step 2: In reality, light increases $$n$$ by orders of magnitude — that's the entire mechanism. Drift velocity $$v$$ changes only modestly (and may even drop slightly with self-heating).\n- Step 3: A factor of 1000 drop in R comes overwhelmingly from $$n$$ growing by a factor of ~1000, not from $$v$$ changing.\n\nTakeaway: For semiconductor sensors, the dominant variable is always $$n$$. Don't blame $$v$$.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "Explain qualitatively why $$n$$ in a semiconductor grows roughly *exponentially* with temperature, rather than linearly.", "answer": "Freeing an electron from a covalent bond requires a certain minimum thermal energy. At any given temperature, only a fraction of electrons have enough random thermal energy (from the Boltzmann distribution tail) to break free. As temperature rises, that \"tail\" of energetic electrons grows much faster than linearly — doubling the temperature can multiply the freed-carrier population by far more than 2. This is a statistical-mechanical effect: $$n \\propto e^{-E_g/(2k_B T)}$$ roughly, so even modest temperature increases produce dramatic increases in $$n$$. That's why the R–T curve of a thermistor is so steep at low temperatures and flattens at high ones.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "Two students disagree about why metal wire resistance rises with temperature. Student A says \"because electrons disappear when heated.\" Student B says \"because the lattice ions vibrate more, scattering electrons more often, reducing drift velocity.\" Who is right and why? (3 steps)", "answer": "- Step 1: Student A is wrong — heating doesn't destroy electrons or cause them to disappear. Charge is conserved; the number of free electrons in a metal is essentially constant.\n- Step 2: Student B is correct. In $$I = nqvA$$, the change in $$R$$ with T for a metal comes from $$v$$, not $$n$$. More lattice vibration → more collisions per unit time → less net drift in a given field → smaller $$v$$ → smaller $$I$$ → larger $$R$$.\n- Step 3: This is the opposite of a thermistor, where $$n$$ changes dramatically. Metal: $$v$$ effect. Thermistor: $$n$$ effect.\n\nTakeaway: Always identify *which* term in $$I=nqvA$$ is changing — that's the key to predicting R behaviour.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Why is the R-vs-temperature graph of a thermistor a steeply falling curve at low T that flattens at high T, rather than a straight line? (3 steps)", "answer": "- Step 1: Since $$n$$ grows roughly exponentially with $$T$$, $$R$$ (which is roughly inversely proportional to $$n$$) decays roughly exponentially with $$T$$.\n- Step 2: At low temperatures, freeing the first carriers makes a *huge* relative change to $$n$$ (going from \"almost none\" to \"some\"). So $$R$$ falls very steeply.\n- Step 3: At high temperatures, $$n$$ is already large; freeing more carriers makes a small *relative* change. So the curve flattens — diminishing returns.\n\nTakeaway: The shape reflects exponential decay; the curve is steep where $$n$$ is small and gentle where $$n$$ is already large.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Why does $$n$$ rise *exponentially* (not linearly) with temperature in a semiconductor? Give an intuitive picture. (3 steps)", "answer": "- Step 1: To free a bound electron, you need to give it more than a certain \"escape energy\" (the bond energy). Whether an electron has that much energy depends on the **tail** of the thermal energy distribution.\n- Step 2: As temperature rises, the high-energy tail of the distribution swells very rapidly — roughly like $$e^{-E/kT}$$. A small rise in $$T$$ dramatically increases the fraction of electrons that exceed the escape threshold.\n- Step 3: So $$n$$ doesn't creep up — it explodes. Heating a thermistor from 20 °C to 100 °C can drop $$R$$ by an order of magnitude, because so many more electrons clear the energy barrier.\n\nTakeaway: Exponential dependence comes from the **statistics of barrier-crossing**, not from anything linear about heat.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "A student says \"the thermistor stores electrons when it's cold, releasing them when hot.\" Identify two errors in this statement and explain the correct mechanism. (3 steps)", "answer": "- Step 1: First error—\"stores electrons\"\n  - All materials contain electrons; thermistors don't \"store\" electrons any differently than other components\n  - The number of electrons in the circuit is always the same; they don't get stored or used up\n  - Charge is conserved in circuits—electrons flow but aren't created or destroyed\n\n- Step 2: Second error—implying electrons are \"released\"\n  - It's not that pre-existing electrons are released; rather, electrons that were previously bound to atoms become free\n  - These are new free charge carriers created by thermal energy\n  - The total electron count in the material changes because electrons become mobile, not because they're released from storage\n\n- Step 3: The correct mechanism\n  - At low temperatures, electrons are bound in covalent bonds (not free to move)\n  - At higher temperatures, thermal energy gives electrons enough energy to break their bonds\n  - These now-free electrons become part of the \"free charge carrier\" population\n  - This increases n, the number density of free charge carriers per cubic meter\n  - More free carriers means more conduction → lower resistance", "source": "MiniMax ①", "_id": "minimax_1_15"}, {"question": "A potential divider uses an LDR on top and a fixed resistor on the bottom. The circuit is intended to automatically turn *on* a street lamp when it gets dark. Should the switch be triggered by the voltage across the LDR or across the fixed resistor? Explain. (3 steps)", "answer": "- Step 1: When it gets dark, the LDR's resistance increases (fewer photons → fewer free carriers → higher $$R$$). We need the triggering voltage to be *high* in the dark.\n- Step 2: If we measure across the LDR (on top, as $$R_1$$): $$V_{LDR} = V_{in} \\times R_1/(R_1 + R_2)$$. When it's dark, $$R_1$$ is large, so the fraction is large, and $$V_{LDR}$$ is high. ✓\n- Step 3: If we measure across the fixed resistor (on bottom, as $$R_2$$): $$V_{out} = V_{in} \\times R_2/(R_1 + R_2)$$. When it's dark, $$R_1$$ is large, so the fraction is *small*, and $$V_{out}$$ is low. ✗ So the switch should be triggered by the voltage across the **LDR** — it goes high in the dark, which is exactly when we want the lamp to turn on.", "source": "GLM 5.1 ②", "_id": "glm_2_49"}, {"question": "Why are the temperature behaviours of a metal and an NTC thermistor *opposite*, even though the underlying physics (lattice vibrations) is the same in both? (3 steps)", "answer": "- Step 1: Both effects happen in both materials when temperature rises: (a) lattice ions vibrate more, scattering electrons and reducing $$v$$; (b) thermal energy can free more bound electrons, raising $$n$$.\n- Step 2: In a metal, $$n$$ is already saturated (electrons are already free), so effect (b) is negligible. Only effect (a) matters → $$v$$ falls → $$R$$ rises.\n- Step 3: In a semiconductor, $$n$$ starts tiny, so effect (b) is enormous and exponential. It vastly outweighs effect (a) → $$n$$ rises sharply → $$R$$ falls.\n\nTakeaway: Same two effects in both materials; the *starting value of $$n$$* decides which effect wins.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "A student says: \"At high temperatures, a semiconductor and a metal will have the same resistance because they both have lots of free electrons.\" Evaluate this claim. (3 steps)", "answer": "- Step 1: It is true that at high temperatures, a semiconductor has many more free electrons than at low temperatures — $$n$$ increases significantly. However, a metal still has $$n \\approx 10^{28}$$ m⁻³, which is *far* larger than even a hot semiconductor.\n- Step 2: Even at very high temperatures, a semiconductor's $$n$$ is typically many orders of magnitude smaller than a metal's. The semiconductor's resistance may have decreased dramatically from its cold value, but it is still much higher than a metal's resistance at the same temperature.\n- Step 3: Additionally, the metal's resistance has *increased* with temperature (more lattice vibrations), while the semiconductor's has decreased. But the metal started so much lower that it remains the better conductor. The claim is wrong: they will not have the same resistance, and the metal will always have far lower resistance at any practical temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "When using the formula $$v = I/(nqA)$$, a student gets a drift velocity of about 0.7 mm/s for electrons in a copper wire carrying 10 A. If the wire is replaced with a semiconductor wire of the same dimensions carrying the same current, would the drift velocity be higher or lower? Why? (2 steps)", "answer": "- Step 1: From $$v = I/(nqA)$$, for the same $$I$$, $$q$$, and $$A$$, the drift velocity is inversely proportional to $$n$$. A semiconductor has a much *smaller* $$n$$ than copper (fewer free carriers per unit volume).\n- Step 2: Therefore, the drift velocity in the semiconductor would be much *higher* than in copper. Each carrier must move faster to carry the same current because there are fewer of them. This is a counterintuitive result: the \"worse\" conductor (semiconductor) has faster-moving individual carriers, but the paucity of carriers means the total current is still limited.", "source": "GLM 5.1 ②", "_id": "glm_2_40"}, {"question": "A copper wire and a semiconductor of the same size both carry 1 A. Roughly compare the magnitudes of their drift velocities. Justify with $$I = nqvA$$. (3 steps)", "answer": "- Step 1: For the same $$I$$, same $$q$$, same $$A$$: $$v \\propto 1/n$$.\n- Step 2: Copper has $$n \\sim 10^{29}\\,\\text{m}^{-3}$$; a typical semiconductor at room temperature has $$n$$ many orders of magnitude smaller (e.g. $$10^{16}$$–$$10^{19}$$).\n- Step 3: To deliver the same current, the semiconductor's electrons must drift **much faster** — potentially by factors of $$10^{10}$$ or more. In practice, this means semiconductors require huge electric fields (huge voltages) to push the same current, which is why their resistance is high.\n\nTakeaway: Few carriers ⇒ they must run fast to carry the same current — and that needs a high voltage, i.e. high resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "If you halve the cross-sectional area of a wire (same material, same current), what happens to the drift velocity? Explain using $$I = nqvA$$. (2 steps)", "answer": "- Step 1: From $$I = nqvA$$, if the current $$I$$ is the same, the material is the same (same $$n$$ and $$q$$), and the area $$A$$ is halved, then the drift velocity $$v$$ must double to compensate.\n- Step 2: This makes physical sense: the same number of charge carriers must pass through a narrower \"pipe\" each second, so they must move faster. Think of water flowing through a pipe — if you squeeze the pipe to half its area, the water speed doubles to maintain the same flow rate. This is why thinner wires of the same material carrying the same current have higher drift velocities (and also higher resistance, since $$R \\propto 1/A$$).", "source": "GLM 5.1 ②", "_id": "glm_2_51"}, {"question": "In the equation $$R = R_0 e^{-k\\theta}$$ for a thermistor, what does each symbol represent, and what does the negative sign in the exponent tell you about the R-T relationship? (2 steps)", "answer": "- Step 1: $$R$$ = resistance at temperature $$\\theta$$ (in °C), $$R_0$$ = resistance at 0°C, $$k$$ = a positive constant (with units K⁻¹ or °C⁻¹) that characterises how quickly resistance falls with temperature, and $$\\theta$$ = temperature. The equation describes an exponential decay of resistance with temperature.\n- Step 2: The negative sign in the exponent ($$-k\\theta$$) means that as $$\\theta$$ increases, the exponent becomes more negative, so $$e^{-k\\theta}$$ becomes smaller, and $$R$$ decreases. This is the mathematical expression of NTC behaviour. If you take natural logs: $$\\ln R = -k\\theta + \\ln R_0$$, which is a straight line with negative gradient when you plot $$\\ln R$$ vs $$\\theta$$ — a useful way to verify the exponential relationship experimentally.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "Why does the \"n rises with T or light\" rule fail at extremely high temperatures (where eventually the thermistor would behave more like a metal)? (3 steps)", "answer": "- Step 1: At very high temperatures, essentially *all* the bonded electrons in the semiconductor have been freed. $$n$$ saturates — it can't grow further because there are no more bonds to break.\n- Step 2: Once $$n$$ is saturated, the only thing that can still change with further temperature rise is $$v$$ — and increased lattice vibration *decreases* $$v$$ (more scattering).\n- Step 3: So at extreme T, the semiconductor's $$R$$ stops falling and starts to *rise* — the device transitions to PTC behaviour, like a metal. The NTC behaviour only holds while there are bonds left to break.\n\nTakeaway: NTC behaviour is bounded above — eventually a semiconductor \"runs out of $$n$$-room\" and switches to metal-like behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "Why does copper conduct so much better than silicon at room temperature, when both are crystalline solids? Use $$I = nqvA$$.", "answer": "- Step 1: The decisive factor is $$n$$. In copper, **every atom donates roughly one free electron** to the conduction sea — $$n \\sim 8 \\times 10^{28}\\,\\text{m}^{-3}$$.\n- Step 2: In silicon at room temperature, the vast majority of electrons are locked in covalent bonds; only a tiny fraction have enough thermal energy to escape. Pure silicon's intrinsic carrier density is ~$$10^{10}\\,\\text{m}^{-3}$$ — about **18 orders of magnitude** lower than copper.\n- Step 3: From $$I = nqvA$$, conductivity scales with $$n$$ (with $$v$$ being only modestly different). With orders-of-magnitude fewer carriers, silicon's resistance is vastly higher than copper's.\n\nTakeaway: Conductivity is dominated by carrier *availability*. Bound electrons can't carry current.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "Explain why the I-V characteristic of a thermistor shows increasing gradient (curving upward) while the I-V characteristic of a metallic conductor (like a filament lamp) shows decreasing gradient (curving downward). (3 steps)", "answer": "- Step 1: **Thermistor**: As voltage (and thus current) increases, power dissipation (P = IV) increases. This heats the thermistor, raising its temperature. Higher temperature frees more charge carriers (n increases), which reduces resistance. Lower resistance means current increases faster for each additional volt — the gradient increases. This is an upward curve.\n- Step 2: **Filament lamp (metal)**: As voltage increases, the current heats the filament. Temperature rises, causing the lattice ions to vibrate more intensely. This increases electron scattering, reducing drift velocity v and increasing resistance. Higher resistance means current increases more slowly for each additional volt — the gradient decreases. This is a downward curve.\n- Step 3: The key difference is the underlying mechanism: in the thermistor, n increases with temperature (resistance falls); in the metal, n is fixed and v decreases with temperature (resistance rises). This produces opposite curve shapes.\n\nUnderstanding which curve bends which way is essential for identifying component types in exam questions.", "source": "MiniMax ②", "_id": "minimax_2_17"}, {"question": "Doping a semiconductor with impurity atoms can change its electrical properties dramatically. How does this relate to the number density $$n$$, and why is this useful? (2 steps)", "answer": "- Step 1: Doping introduces impurity atoms (e.g. arsenic or boron in silicon) that have either extra valence electrons or fewer valence electrons than the host atoms. These extra (or missing) electrons increase the number density of free charge carriers, $$n$$, even at low temperatures.\n- Step 2: By carefully controlling the type and quantity of impurity, engineers can precisely tune $$n$$ — and hence the conductivity — of the semiconductor. This is the basis of all modern electronics: transistors, computer chips, and integrated circuits rely on doped semiconductors with precisely controlled carrier densities. Without doping, silicon would be too insulating at room temperature to be useful in most electronic applications.", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "In the potential-divider circuit from Q23, explain why the *power* dissipated in the fixed resistor $$R_2$$ increases when the thermistor heats up. Use two different reasoning paths. (4 steps)", "answer": "- Step 1: **Path 1 — via current.** When the thermistor heats up, $$R_1$$ decreases, so total resistance $$R_1 + R_2$$ decreases. Since $$V_{in}$$ is fixed, the circuit current $$I = V_{in}/(R_1 + R_2)$$ increases.\n- Step 2: Power in $$R_2$$ is $$P = I^2 R_2$$. Since $$I$$ has increased and $$R_2$$ is constant, $$P$$ increases.\n- Step 3: **Path 2 — via voltage.** When $$R_1$$ decreases, the voltage across $$R_2$$ increases (as shown in Q23: from 2.0 V to 4.0 V). Power in $$R_2$$ is also $$P = V_{out}^2 / R_2$$. Since $$V_{out}$$ has increased and $$R_2$$ is constant, $$P$$ increases.\n- Step 4: Both paths give the same answer because they are physically equivalent ($$P = I^2R = V^2/R$$). The exam may award marks for either approach. The key insight: when the sensor resistance falls, *more* power is dissipated in the fixed resistor, not less.", "source": "GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "A student claims that in a series circuit with a thermistor, \"the thermistor uses up some of the electrons, so fewer come out than go in.\" Explain why this is fundamentally wrong, and state what actually happens to charge and energy. (2 steps)", "answer": "- Step 1: This is a misconception — charge is *conserved*. In a series circuit, the current is the same at every point. Electrons are not \"used up,\" \"stored,\" or \"consumed\" by any component. The same number of electrons per second flows through the thermistor as through every other part of the circuit. What the thermistor *does* is impede the flow (resistance), reducing the *rate* of flow (current) *everywhere* in the series circuit equally.\n- Step 2: What the component *does* transfer is *energy*. As electrons pass through the thermistor, they lose electrical potential energy (voltage drops across the component), which is converted to heat. The electrons emerge with less energy but the same number. Think of it like a turnstile: everyone who enters also exits, but they've all been slowed down.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "At room temperature, glass is an excellent electrical insulator. However, when heated until it glows red hot, it can conduct electricity well enough to light a lamp. Explain this using the $$I = nqvA$$ framework. (2 steps)", "answer": "- Step 1: At room temperature, glass has an extremely small $$n$$ — virtually all electrons are tightly bound in the lattice, with no free carriers. With $$n \\approx 0$$, even a large voltage produces negligible current ($$I = nqvA \\approx 0$$), so it behaves as an insulator.\n- Step 2: At very high temperature, the thermal energy is so large that it can break electrons free from even the strongest bonds in the glass lattice. $$n$$ increases dramatically — the material transitions from insulator to conductor. Once current flows, the power dissipated ($$P = I^2 R$$) can maintain the high temperature, and the glass continues conducting even after the external heat source is removed. This demonstrates that the boundary between \"insulator\" and \"semiconductor\" is temperature-dependent — at extreme temperatures, even insulators can conduct.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "Copper has roughly one free electron per atom, giving $$n \\approx 8.4 \\times 10^{28}$$ m⁻³. A typical semiconductor at room temperature might have $$n$$ many orders of magnitude smaller. What does this immediately tell you about their relative resistances for the same geometry and drift velocity? (2 steps)", "answer": "- Step 1: From $$I = nqvA$$, if everything else ($$q$$, $$v$$, $$A$$) is the same, the current is directly proportional to $$n$$. Copper's enormous $$n$$ means it carries a huge current compared to a semiconductor with the same drift velocity and area.\n- Step 2: Since $$R = V/I$$, a larger current at the same voltage means a smaller resistance. So copper has a much *lower* resistance than a semiconductor of the same dimensions — it is the huge difference in $$n$$ that makes metals such good conductors and semiconductors such poor conductors at low temperature.\n\nThis is why a semiconductor at room temperature is sometimes called a \"poor conductor\" — most of its electrons are locked in bonds and cannot carry charge.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "The textbook mentions that PTC (positive temperature coefficient) semiconductors also exist, and that some doped semiconductors can even hav
