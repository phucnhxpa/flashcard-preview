$$R = V/I = 3.0 / (3.0 \\times 10^{-3}) = 1000\\ \\Omega$$.\n- Step 2: At 7.0 V, $$R = V/I = 7.0 / (16.25 \\times 10^{-3}) \\approx 430\\ \\Omega$$.\n- Step 3: $$R$$ has more than halved as $$V$$ rose. Reason: higher $$V$$ means higher power dissipation $$P = IV$$, which heats the thermistor. Heating frees more electrons (raises $$n$$), so $$R$$ falls. This is *self-heating* — the thermistor's resistance depends on the operating point.\n\nTakeaway: A thermistor doesn't have one \"resistance\"; it has a resistance that depends on its current temperature, which depends on how much you're driving it.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "In the potential divider formula $$V_{\\text{out}} = V_{\\text{in}} \\cdot R_2/(R_1 + R_2)$$, what happens to $$V_{\\text{out}}$$ if the sensor placed at $$R_1$$ is a thermistor and the temperature rises? (3 steps)", "answer": "- Step 1: Temperature rises ⇒ thermistor resistance $$R_1$$ falls.\n- Step 2: The denominator $$R_1 + R_2$$ shrinks, while the numerator $$R_2$$ is fixed. So the ratio $$R_2/(R_1+R_2)$$ grows.\n- Step 3: Therefore $$V_{\\text{out}}$$ across $$R_2$$ rises. Alternatively: smaller $$R_1$$ means less voltage drops across it, so more is left for $$R_2$$.\n\nTakeaway: With sensor on top, $$V_{\\text{out}}$$ moves *opposite* to the sensor's resistance.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Suppose you want $$V_{\\text{out}}$$ to *decrease* when temperature rises (e.g. to switch off a heater). How would you arrange the thermistor and fixed resistor in the potential divider? Explain. (3 steps)", "answer": "- Step 1: Standard arrangement (thermistor on top, fixed $$R_2$$ on bottom) gives $$V_{\\text{out}}$$ across $$R_2$$ that *rises* with temperature. We want the opposite.\n- Step 2: Swap them: put the **fixed resistor on top** ($$R_1$$) and the **thermistor on bottom** ($$R_2$$). Take $$V_{\\text{out}}$$ across the thermistor.\n- Step 3: As $$T$$ rises, thermistor resistance falls. With $$R_1$$ fixed, the voltage across the thermistor ($$V_{\\text{out}}$$) falls (less of the supply drops across it). So $$V_{\\text{out}}$$ decreases with rising temperature — what we wanted.\n\nTakeaway: Whether $$V_{\\text{out}}$$ goes up or down with the stimulus is set by which side of the divider you tap.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "A thermistor (top, $$R_1$$) in a potential divider with $$R_2 = 220\\ \\Omega$$ and $$V_{\\text{in}} = 6.0\\ \\text{V}$$. Thermistor is 440 Ω at 20 °C and 110 Ω at 60 °C. What is $$V_{\\text{out}}$$ at each temperature, and what's the takeaway? (3 steps)", "answer": "- Step 1: At 20 °C: $$V_{\\text{out}} = 6.0 \\times 220/(440+220) = 6.0 \\times 1/3 = 2.0\\ \\text{V}$$.\n- Step 2: At 60 °C: $$V_{\\text{out}} = 6.0 \\times 220/(110+220) = 6.0 \\times 2/3 = 4.0\\ \\text{V}$$.\n- Step 3: Heating the thermistor doubled $$V_{\\text{out}}$$ (2 V → 4 V). The sensor's resistance dropped, so a larger fraction of $$V_{\\text{in}}$$ now sits across the fixed resistor.\n\nTakeaway: A potential divider converts a *resistance change* into a usable *voltage signal* — that's the whole point of a sensor circuit.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "An LDR is placed as the *bottom* component ($$R_2$$) in a potential divider, with a fixed resistor on top. As the room gets darker, does $$V_{\\text{out}}$$ (across the LDR) increase or decrease? Why? (3 steps)", "answer": "- Step 1: Darker ⇒ fewer photons ⇒ fewer free electrons ⇒ $$n$$ falls ⇒ LDR resistance $$R_2$$ **increases**.\n- Step 2: Since $$V_{\\text{out}} = V_{\\text{in}} \\cdot R_2/(R_1+R_2)$$, and $$R_2$$ grows while $$R_1$$ stays fixed, the ratio grows.\n- Step 3: $$V_{\\text{out}}$$ across the LDR increases. Physically: more resistance on the bottom means a larger share of the supply drops across it.\n\nTakeaway: Sensor on the bottom → $$V_{\\text{out}}$$ moves *with* the sensor's resistance.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Copper has $$n \\approx 8.4 \\times 10^{28}\\ \\text{m}^{-3}$$, $$A = 1.0\\ \\text{mm}^2$$, carrying $$I = 10\\ \\text{A}$$. Conceptually, what is the order-of-magnitude drift velocity, and why is it so small? (3 steps)", "answer": "- Step 1: Rearrange $$I = nqvA$$: $$v = I/(nqA)$$.\n- Step 2: Plug in orders of magnitude: $$v \\sim 10/(10^{29} \\cdot 10^{-19} \\cdot 10^{-6}) = 10/10^{4} = 10^{-3}\\ \\text{m/s}$$. So drift velocity is about $$10^{-3}$$ m/s ≈ **1 mm/s** (the precise value is around 0.7 mm/s).\n- Step 3: This is astonishingly slow because $$n$$ is so huge in a metal — every cubic metre contains $$\\sim 10^{29}$$ electrons. With so many carriers, each only needs to crawl to deliver a large current. (The electrical *signal* travels near light speed, but individual electrons crawl.)\n\nTakeaway: Big current doesn't mean fast electrons — it means many electrons.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Why does an LDR have a much higher dark resistance (~MΩ) than a metal of the same dimensions (~Ω)? Use $$I = nqvA$$ to compare. (3 steps)", "answer": "- Step 1: In darkness, an LDR's $$n$$ is many orders of magnitude smaller than copper's (around $$10^{16}\\ \\text{m}^{-3}$$ vs $$10^{29}\\ \\text{m}^{-3}$$) — most electrons are bound in the lattice.\n- Step 2: From $$I = nqvA$$, with $$q$$, $$v$$, $$A$$ comparable, the LDR carries *vastly* less current for the same voltage. So $$R = V/I$$ is vastly larger.\n- Step 3: Shining light frees electrons and raises $$n$$ by many orders of magnitude, dropping $$R$$ from MΩ to hundreds of Ω.\n\nTakeaway: The resistance gap between a metal and a dark semiconductor is essentially the gap between their values of $$n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "A student says: \"When temperature rises in a thermistor, the *current* changes, so the resistance changes.\" Why is this the *wrong way round*, and what's the correct causal chain? (3 steps)", "answer": "- Step 1: The wrong chain reverses cause and effect. Current doesn't cause resistance to change in a sensor — the *stimulus* (temperature/light) causes the resistance to change.\n- Step 2: Correct chain: **stimulus** (heat/light) → frees more electrons → **number density $$n$$ increases** → **resistance $$R$$ decreases** (because $$I = nqvA$$ now permits more current at the same $$V$$) → only *then* does the circuit current change (by Ohm's law).\n- Step 3: Examiners specifically look for \"$$R$$ changes\" as an explicit step before \"$$I$$ changes\". Skip it and you lose marks.\n\nTakeaway: The chain runs stimulus → $$n$$ → $$R$$ → $$I$$, in that order.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Why is the thermistor I-V curve symmetric (looks the same in both quadrants, just mirrored)? (2 steps)", "answer": "- Step 1: The thermistor's resistance depends only on its temperature, not on the *direction* of current flow. Reversing the polarity reverses both $$V$$ and $$I$$ but doesn't change $$|V|/|I| = R$$.\n- Step 2: Power dissipation $$P = IV$$ has the same magnitude regardless of sign (since both flip), so the device heats identically — and thus has the same $$R$$ — at $$+V$$ and $$-V$$. The curve is point-symmetric through the origin.\n\nTakeaway: Thermistors are non-polar; they care about how hard you drive them, not which way.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Is a thermistor \"ohmic\"? Explain by comparing its I-V curve to a fixed resistor. (3 steps)", "answer": "- Step 1: Ohmic means $$V/I$$ is constant — the I-V graph is a straight line through the origin.\n- Step 2: A thermistor's I-V curve bends upward (gradient increases). The ratio $$V/I$$ at low $$V$$ is *higher* than at high $$V$$. So $$R$$ depends on operating point.\n- Step 3: Therefore the thermistor is **non-ohmic**. It only approximately obeys Ohm's law at very low currents where self-heating is negligible.\n\nTakeaway: Ohm's law fails whenever the resistance changes with the operating conditions — and a thermistor is a textbook example.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "When light increases on an LDR in a potential divider (LDR on top, fixed bottom), why does the power dissipated in the fixed resistor *increase*? (4 steps)", "answer": "- Step 1: More light → LDR resistance $$R_{\\text{LDR}}$$ falls.\n- Step 2: Total circuit resistance $$R_{\\text{total}} = R_{\\text{LDR}} + R_{\\text{fixed}}$$ falls.\n- Step 3: Since $$V_{\\text{in}}$$ is fixed, current $$I = V_{\\text{in}}/R_{\\text{total}}$$ rises.\n- Step 4: Power in the fixed resistor is $$P = I^2 R_{\\text{fixed}}$$. With $$I$$ up and $$R_{\\text{fixed}}$$ unchanged, $$P$$ rises.\n\nTakeaway: A drop in the sensor's $$R$$ pushes more current through the whole loop, dissipating more power in everything else.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "When the LDR in the same circuit gets darker, does the power in the fixed resistor go up or down? Reason through the chain. (3 steps)", "answer": "- Step 1: Darker ⇒ LDR $$R$$ increases (fewer free carriers).\n- Step 2: Total $$R_{\\text{total}}$$ increases → circuit current $$I$$ decreases (supply is fixed).\n- Step 3: Power in the fixed resistor $$P = I^2 R_{\\text{fixed}}$$: $$I$$ shrinks, $$R_{\\text{fixed}}$$ constant, so $$P$$ drops.\n\nTakeaway: When the sensor \"chokes\" the loop, every other component receives less power.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Why does saying \"the thermistor stores electrons\" or \"the LDR uses up the charge\" reveal a fundamental misconception?", "answer": "Charge is *conserved*, and in a series circuit the current is the *same everywhere* at any instant. Components don't store charge (capacitors do, briefly, but that's different) — they merely impede the flow and transfer electrical energy into heat or other forms. The same number of electrons that enter a thermistor per second also leave per second. What the thermistor actually does is *dissipate energy* ($$P = IV$$) — it converts electrical PE into thermal energy via collisions, but never destroys or stockpiles charge. Using \"stores electrons\" or \"uses up charge\" language conflates *energy transfer* with *charge transfer* and shows the student hasn't internalised charge conservation.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Glass is normally an insulator. Why can it become a conductor when heated to red-hot temperatures, and how does this relate to thermistors? (3 steps)", "answer": "- Step 1: At room temperature, glass has nearly zero free electrons — its $$n$$ is essentially zero, so $$I = nqvA$$ gives a negligible current. Insulator.\n- Step 2: Heated very strongly, the lattice ions vibrate violently and thermal energy is enough to break electrons free from the bonds — $$n$$ rises from \"essentially zero\" to \"non-negligible\".\n- Step 3: Once enough carriers exist, current flows. Indeed, if the current itself dissipates enough power ($$P = I^2 R$$) to maintain the high temperature, the glass keeps conducting after the external heat source is removed — a positive feedback loop.\n\nTakeaway: Glass is just an extreme NTC semiconductor — the same physics that runs a thermistor, just at a much higher temperature threshold.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "A semiconductor's resistivity drops about 10× per 30 °C in some temperature range. A metal's resistivity rises maybe 10% per 30 °C. Why is the semiconductor change so much more *dramatic*?", "answer": "In the semiconductor, the change is driven by $$n$$, which depends *exponentially* on temperature — a small temperature rise unlocks a huge fractional increase in free carriers. In the metal, $$n$$ is constant; only $$v$$ changes, and it does so only as fast as lattice vibrations scale (roughly linearly with $$T$$ in the relevant range). Exponential growth in $$n$$ beats linear decrease in $$v$$ by orders of magnitude. That's why thermistors are useful for sensing (big response to small temperature changes) while pure metal wires are *not* good temperature sensors at moderate temperatures.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "What is \"doping\" and how is it relevant to building a semiconductor with a *positive* temperature coefficient (PTC)?", "answer": "Doping is adding controlled impurities (e.g. arsenic or boron) to a pure semiconductor like silicon. The impurities donate extra free carriers, raising $$n$$ at room temperature. By choosing the doping carefully, you can tune the semiconductor so that:\n- (a) at room temperature $$n$$ is large enough that the material behaves more \"metal-like\", and further temperature rise mainly reduces $$v$$ (giving a PTC response), or\n- (b) the increase in $$n$$ with $$T$$ is balanced by the decrease in $$v$$, giving a nearly *temperature-independent* resistor (e.g. carbon resistors).\n\nSo doping lets engineers design semiconductors that are NTC, PTC, or nearly constant-R — by controlling the balance between $$n$$ and $$v$$ behaviour in $$I = nqvA$$.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Sketch how the *R* of a thermistor versus *T* would change if you doubled all linear dimensions of the device (length, width, height). Does the curve shape change? (3 steps)", "answer": "- Step 1: Resistance depends on geometry: $$R = \\rho L / A$$ where $$\\rho$$ is resistivity, $$L$$ is length, $$A$$ is cross-section.\n- Step 2: Doubling all dimensions: $$L \\to 2L$$, $$A \\to (2L)^2 = 4L^2$$ so cross-section quadruples. Thus $$R \\to 2L \\cdot \\rho / (4A) = R/2$$.\n- Step 3: Every point of the R-T curve halves. The *shape* (exponential decay) is unchanged — that's set by $$\\rho(T)$$, a material property — but the curve is scaled vertically by 1/2.\n\nTakeaway: Geometry shifts the curve's scale; the *exponential shape* belongs to the material physics.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why does a streetlight controller using an LDR typically place the LDR on top of the divider and tap $$V_{\\text{out}}$$ from the bottom? (3 steps)", "answer": "- Step 1: We want the lamp to switch **ON** when it gets **dark**, i.e. when $$V_{\\text{out}}$$ exceeds some threshold.\n- Step 2: In darkness, LDR resistance is very high. With LDR on top, the divider drops most of the voltage across the LDR, leaving only a small $$V_{\\text{out}}$$ across the bottom resistor — that doesn't trigger.\n- Step 3: Wait — actually we want the *opposite*: when dark, $$V_{\\text{out}}$$ should be **high** enough to trigger. So we need LDR on bottom (so darker → larger LDR R → larger $$V_{\\text{out}}$$). Alternatively: if LDR is on top, then in **darkness** the voltage across $$R_1$$ (LDR) is large; tapping $$V_{\\text{out}}$$ across the LDR itself (top of divider) would also work — depends on the circuit convention.\n\nTakeaway: The choice of LDR-on-top vs LDR-on-bottom, plus where you tap $$V_{\\text{out}}$$, determines whether your switch fires in darkness or in light. Always trace through the divider formula carefully.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Compare and contrast: thermistor vs LDR. Why are they often discussed together, and how do they differ? (3 steps)", "answer": "- Step 1: **Similar**: both are semiconductor sensors whose resistance falls when stimulated. Both rely on increasing $$n$$ via $$I = nqvA$$. Both are non-ohmic. Both are used in potential-divider sensor circuits to produce a voltage signal.\n- Step 2: **Different stimulus**: thermistor responds to *temperature* (heat energy frees electrons); LDR responds to *light intensity* (photon energy frees electrons).\n- Step 3: **Different applications**: thermistors → thermostats, fire alarms, temperature alarms; LDRs → automatic streetlights, camera light meters, garden lights.\n\nTakeaway: Same physics, different energy source (thermal vs photonic) for freeing the carriers.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "From an I-V graph showing four curves — (A) bending upward from a straight line, (B) straight line through origin, (C) bending below a straight line, (D) horizontal — which corresponds to an LDR (or thermistor) and why? (3 steps)", "answer": "- Step 1: Both LDRs and thermistors self-heat as voltage rises (or, for an LDR, as the test current dissipates). This raises $$n$$ → lowers $$R$$ → makes $$I$$ grow *faster* than linearly with $$V$$.\n- Step 2: So gradient $$dI/dV = 1/R$$ *increases* with $$V$$. The curve bends upward — that's graph **A**.\n- Step 3: (B) is a fixed ohmic resistor. (C) bending below would be a filament lamp (where $$R$$ rises with $$V$$, the opposite of a thermistor). (D) horizontal would be a constant-current source, not relevant here.\n\nTakeaway: \"Bend up from ohmic line\" = $$R$$ falls under stress (NTC). \"Bend down from ohmic line\" = $$R$$ rises under stress (PTC, e.g. lamp).", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "Why is the I-V curve of a filament lamp (a metal) and the I-V curve of a thermistor essentially *mirror images* of each other (both bending away from the ohmic line, but in opposite directions)? (3 steps)", "answer": "- Step 1: Both devices self-heat as $$V$$ rises.\n- Step 2: In the **lamp** (metal, PTC), heating raises $$R$$, so each volt adds *less* current than the previous one. The curve bends *down* away from the ohmic line — gradient decreases.\n- Step 3: In the **thermistor** (semiconductor, NTC), heating lowers $$R$$, so each volt adds *more* current than the previous one. The curve bends *up* away from the ohmic line — gradient increases.\n\nTakeaway: They're mirror images because heating produces opposite resistance changes in the two material types — the central distinction between metal and semiconductor behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "A thermistor potential divider has fixed $$R_2 = 1.0\\ \\text{k}\\Omega$$, supply 9.0 V, and thermistor (top) = 3.0 kΩ at room temp. What is $$V_{\\text{out}}$$, and how does it change when the thermistor warms? (3 steps)", "answer": "- Step 1: At room temperature, $$V_{\\text{out}} = 9.0 \\times 1.0/(3.0+1.0) = 9.0 \\times 0.25 = 2.25\\ \\text{V}$$.\n- Step 2: When thermistor warms, its resistance falls (say to 1.0 kΩ). Now $$V_{\\text{out}} = 9.0 \\times 1.0/(1.0+1.0) = 4.5\\ \\text{V}$$. It rises.\n- Step 3: General behaviour: as thermistor heats, $$R_1$$ falls, fraction $$R_2/(R_1+R_2)$$ rises, so $$V_{\\text{out}}$$ rises monotonically.\n\nTakeaway: Cold → low $$V_{\\text{out}}$$; hot → high $$V_{\\text{out}}$$ (sensor on top, output on bottom).", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Why is the LDR's R-illumination graph drawn as a *hyperbolic-looking* curve (steep at low light, flatter at high light)? (3 steps)", "answer": "- Step 1: At very low illumination, even a small added light intensity can free a relatively large fraction of additional electrons. So $$n$$ jumps significantly and $$R$$ falls steeply.\n- Step 2: At higher illumination, $$n$$ is already substantial. Adding more light makes a smaller *relative* contribution to $$n$$, so $$R$$ falls only gradually.\n- Step 3: The curve has the shape \"1/x-like\" because $$R \\propto 1/n$$ and $$n$$ grows with light intensity (roughly linearly until saturation), giving a hyperbolic-looking decrease.\n\nTakeaway: Diminishing-returns shape comes from $$R$$ being inversely related to a growing $$n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "In a thermistor I-V experiment, why must one wait at least 5 minutes between forward and reverse measurements? (2 steps)", "answer": "- Step 1: During the forward measurement, current dissipates power and heats the thermistor — so its $$R$$ drops below the cold value.\n- Step 2: If you immediately reverse and remeasure, the thermistor is still hot, so the reverse curve won't reflect the same starting temperature. Waiting 5 minutes lets it cool back to ambient, so both halves of the symmetric I-V curve are taken at the same baseline temperature — making them comparable.\n\nTakeaway: Self-heating biases measurements; let the device equilibrate before changing direction.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Why shouldn't one use a current much above 20 mA when characterising a thermistor in a lab experiment? (2 steps)", "answer": "- Step 1: Power dissipated $$P = I^2R$$ grows as the square of current. At high currents, the thermistor self-heats dramatically — possibly enough to damage it or shift its operating point so far that the measurements become unrepresentative.\n- Step 2: Practically: above some current limit, thermal runaway can occur (more current → more heat → lower $$R$$ → even more current). Keeping below ~20 mA ensures the device stays within a manageable temperature range.\n\nTakeaway: Keeping power low keeps the measurement near the device's \"cold\" R-T curve.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "If a copper wire and a semiconductor of the same dimensions are both at room temperature, conceptually compare their drift velocities $$v$$ for the same applied voltage. (3 steps)", "answer": "- Step 1: Both have the same $$V$$, $$A$$, $$q$$. From $$I = nqvA$$, $$I$$ depends on $$n$$ and $$v$$.\n- Step 2: Copper's $$n$$ is enormous (~$$10^{29}$$); the semiconductor's $$n$$ is tiny (~$$10^{16}$$ at room T). So copper has ~$$10^{13}$$ times more carriers per cubic metre.\n- Step 3: But copper carries much more current too (lower $$R$$). In fact, $$v$$ in the semiconductor can actually be *higher* than in copper because the smaller $$n$$ means each carrier needs to move faster to maintain any given current. However, the total current $$nqvA$$ is still vastly smaller in the semiconductor.\n\nTakeaway: Don't confuse drift velocity with current: a slow horde beats a fast few.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Inside an NTC thermistor, you measure that $$n$$ doubles when temperature rises 10 °C, while $$v$$ drops by 5%. What is the qualitative effect on $$R$$? (3 steps)", "answer": "- Step 1: $$I \\propto n \\cdot v$$ (with $$q$$ and $$A$$ fixed). New $$I / \\text{old } I = (2) \\times (0.95) = 1.9$$. Current nearly doubles.\n- Step 2: Since $$R = V/I$$ and $$V$$ is the same, $$R$$ falls to roughly $$1/1.9 \\approx 0.53$$ times its original value — about a 47% drop.\n- Step 3: This demonstrates why $$n$$ dominates: doubling $$n$$ produces an almost doubling of conductance even with a small $$v$$ penalty. The result is the steep NTC behaviour.\n\nTakeaway: $$n$$ swings of factor 2 swamp $$v$$ changes of a few percent.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "If you put an LDR in series with an LED and battery (no other resistor), describe qualitatively what happens to the LED's brightness as the LDR moves from dark to light. (3 steps)", "answer": "- Step 1: In darkness, LDR resistance is very high (MΩ). Almost all the supply voltage drops across the LDR, leaving almost nothing for the LED. LED is essentially OFF.\n- Step 2: As light shines on the LDR, $$n$$ rises, $$R$$ falls. The series circuit current rises. The LED begins to receive more voltage and current — it lights up.\n- Step 3: In bright light, LDR resistance is tens of ohms — the current is limited mainly by the LED itself and any internal resistance. LED is at near-full brightness.\n\nTakeaway: An LDR in series acts as a \"light-controlled valve\" for current.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Why is the description \"an LDR has resistance\" technically incomplete in physics exam writing, and what should you specify? (2 steps)", "answer": "- Step 1: An LDR's resistance is not a single number — it depends on the illumination level. So saying \"the LDR has resistance $$R$$\" is ambiguous.\n- Step 2: You must specify the conditions: \"the LDR has resistance $$R$$ at illumination $$E$$\" or \"in darkness, the LDR has resistance ~MΩ\" or \"in bright light, ~tens of Ω.\" Similarly for thermistors — always cite the temperature.\n\nTakeaway: Sensor \"resistance\" is always conditional on the stimulus; quoting it without conditions is meaningless.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "When does an LDR's I-V graph itself self-heat, and how does that show up in the curve? (3 steps)", "answer": "- Step 1: Even at moderate currents, the small physical volume of the LDR semiconductor means power dissipated is concentrated and heats it — though usually less dramatically than a thermistor.\n- Step 2: This raises $$n$$ slightly (via thermal effect on top of the photon effect), further dropping $$R$$.\n- Step 3: So the LDR I-V curve also bends upward (gradient $$dI/dV = 1/R$$ increases). The shape is similar to a thermistor's I-V curve. Without illumination, the curve is steep but with very small currents (since $$R$$ is huge in darkness).\n\nTakeaway: An LDR is fundamentally a thermistor that also responds to light — both effects can show up in an I-V measurement.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Why do mark schemes reward saying \"$$n$$ increases\" rather than just \"more electrons are freed\"? What's the precise distinction? (2 steps)", "answer": "- Step 1: \"More electrons freed\" is a process description; \"$$n$$ increases\" links the process to the specific quantity in $$I = nqvA$$, which is what governs current. Examiners want to see that you connect the microscopic process to the equation.\n- Step 2: The full mark-scheme chain: stimulus → bonds break / photons absorbed → free electrons created → **number density $$n$$ increases** → from $$I = nqvA$$, $$I$$ rises (since $$n$$ rise outweighs any $$v$$ fall) → $$R = V/I$$ falls. Each link is a marking point.\n\nTakeaway: Translate process language into equation-quantity language to score full marks.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Compare the I-V curves of a fixed resistor, a filament lamp, and a thermistor side by side. (3 steps)", "answer": "- Step 1: **Fixed resistor (ohmic)**: straight line through the origin. Constant $$R$$. Gradient $$= 1/R$$.\n- Step 2: **Filament lamp (metal, PTC)**: curves *below* the ohmic line — gradient decreases. As $$V$$ rises, the filament heats, $$R$$ rises, so $$I$$ grows *slower* than linearly. Symmetric.\n- Step 3: **Thermistor (semiconductor, NTC)**: curves *above* the ohmic line — gradient increases. As $$V$$ rises, the thermistor heats, $$R$$ falls, so $$I$$ grows *faster* than linearly. Symmetric.\n\nTakeaway: The three curves are mirror images of each other relative to the straight ohmic baseline — the differences come from how $$R$$ responds to power.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "A potential divider has fixed $$R_1 = 8.0\\ \\text{k}\\Omega$$ and LDR as $$R_2$$, with $$V_{\\text{in}} = 12\\ \\text{V}$$. In daylight, LDR = 670 Ω. Conceptually, what is $$V_{\\text{out}}$$ across the LDR, and what fraction of the supply is it? (3 steps)", "answer": "- Step 1: $$V_{\\text{out}}$$ across the LDR is $$V_{\\text{in}} \\cdot R_{\\text{LDR}}/(R_1 + R_{\\text{LDR}}) = 12 \\cdot 670/(8000+670) \\approx 12 \\cdot 670/8670$$.\n- Step 2: That fraction is roughly $$670/8670 \\approx 0.077$$, so $$V_{\\text{out}} \\approx 0.93\\ \\text{V}$$ — under a volt.\n- Step 3: Most of the 12 V (about 11 V) drops across the fixed 8 kΩ resistor because it's about 12× larger than the LDR's resistance. The divider concentrates voltage on the bigger resistor.\n\nTakeaway: Voltage distributes in proportion to resistance — biggest R gets the biggest share.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "If the LDR in the previous question goes dark and its resistance rises to 80 kΩ, qualitatively what happens to $$V_{\\text{out}}$$ across the LDR and to the circuit current? (3 steps)", "answer": "- Step 1: New LDR resistance (80 kΩ) is 10× the fixed resistor (8 kΩ). So now the LDR is the *bigger* resistor.\n- Step 2: $$V_{\\text{out}}$$ across LDR $$\\approx 12 \\times 80/(80+8) = 12 \\times 80/88 \\approx 10.9\\ \\text{V}$$. So $$V_{\\text{out}}$$ across the LDR has gone from ~0.93 V to ~10.9 V — about 12× higher.\n- Step 3: Circuit current was $$12/8670 \\approx 1.4\\ \\text{mA}$$ in daylight; now $$12/88000 \\approx 0.14\\ \\text{mA}$$ — about 10× smaller. Power dissipated everywhere drops accordingly.\n\nTakeaway: Going dark dramatically reroutes voltage to the LDR and chokes current throughout the circuit.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Why does the \"n rises with T or light\" rule fail at extremely high temperatures (where eventually the thermistor would behave more like a metal)? (3 steps)", "answer": "- Step 1: At very high temperatures, essentially *all* the bonded electrons in the semiconductor have been freed. $$n$$ saturates — it can't grow further because there are no more bonds to break.\n- Step 2: Once $$n$$ is saturated, the only thing that can still change with further temperature rise is $$v$$ — and increased lattice vibration *decreases* $$v$$ (more scattering).\n- Step 3: So at extreme T, the semiconductor's $$R$$ stops falling and starts to *rise* — the device transitions to PTC behaviour, like a metal. The NTC behaviour only holds while there are bonds left to break.\n\nTakeaway: NTC behaviour is bounded above — eventually a semiconductor \"runs out of $$n$$-room\" and switches to metal-like behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Why is \"the thermistor has lower resistance than the fixed resistor, so it conducts more current\" a misleading statement in a *series* circuit?", "answer": "In a *series* circuit, the same current flows through every component — the thermistor doesn't \"conduct more current\" than the fixed resistor; both carry exactly the same current. What does happen is that less *voltage* drops across the thermistor (because it has lower $$R$$ and $$V = IR$$). The misconception confuses the parallel-circuit intuition (where lower-R branches carry more current) with the series-circuit reality (where everyone carries the same I). The correct phrasing is \"the thermistor has lower resistance, so a smaller fraction of the supply voltage drops across it.\"", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "A student claims: \"When a thermistor heats up, its drift velocity $$v$$ also increases, which is why $$I$$ rises.\" Why is this wrong?", "answer": "Heating actually *decreases* drift velocity $$v$$ in any solid conductor, because hotter lattice ions vibrate more and scatter the drifting electrons more often. So $$v$$ slightly *falls* with temperature in both metals and semiconductors. The current $$I = nqvA$$ rises in a thermistor *despite* the small fall in $$v$$ because the simultaneous rise in $$n$$ (from freed electrons) is so large that it dominates. The student has invented an effect that doesn't exist — and missed the real reason ($$n$$ growing exponentially). The correct chain is: heat → more $$n$$ → bigger $$I$$, despite slightly smaller $$v$$.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Why are thermistors often preferred over fixed resistors in temperature-sensing circuits, even though their R-T curve is non-linear? (3 steps)", "answer": "- Step 1: A fixed resistor's $$R$$ doesn't change with temperature, so it gives no signal. Useless as a sensor.\n- Step 2: A thermistor's $$R$$ changes dramatically — sometimes by an order of magnitude over 0-100 °C. That huge sensitivity gives a strong, easy-to-detect signal in a potential divider.\n- Step 3: The non-linearity (steep at low T, flat at high T) can actually be useful: it provides high resolution near the temperatures of interest (room temperature region), where the steepest sensitivity often lies. Calibration handles the rest.\n\nTakeaway: Big response > linear response, for sensor purposes.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "Why does a metal wire act as a \"bad\" temperature sensor compared to a thermistor, even though a metal's resistance *does* change with temperature?", "answer": "Two reasons. First, the *magnitude*: in the relevant range (say 0–100 °C), a metal's resistance only changes by maybe 30–40% total, while a thermistor's can drop by 90% or more. The signal is much smaller from a metal. Second, the *fractional change per degree*: in metals, $$R$$ depends roughly linearly on $$T$$, with a typical temperature coefficient of ~0.004 K⁻¹, while a thermistor's exponential dependence gives ~0.03 K⁻¹ — almost 10× more sensitive. So for the same temperature change, a thermistor produces a much larger and more easily measured response. (Metals *are* used for very precise temperature measurement — platinum resistance thermometers — but for everyday electronics, thermistors win on sensitivity and cost.)", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Why is using $$P = V^2/R$$ rather than $$P = I^2 R$$ sometimes more useful when reasoning about a thermistor in a potential divider? (3 steps)", "answer": "- Step 1: When voltage across a component is fixed (e.g. the supply across a divider), $$P = V^2/R$$ tells you that as $$R$$ drops, $$P$$ rises *for that component if V across it stays the same*.\n- Step 2: In a divider, the supply $$V_{\\text{in}}$$ is fixed but $$V$$ across each component is *not* — it depends on the resistance ratio. So you have to be careful which voltage you're using.\n- Step 3: For the *total* power, $$P_{\\text{total}} = V_{\\text{in}}^2 / R_{\\text{total}}$$: as the thermistor's $$R$$ falls, $$R_{\\text{total}}$$ falls, so total power dissipated by the supply rises. This is a more robust use of the $$V^2/R$$ form.\n\nTakeaway: Pick the formula whose fixed quantity matches your circuit constraint.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "A potential divider with thermistor on top is used as a *fire alarm* trigger when temperature exceeds a threshold. Why does this circuit naturally suit the application? (3 steps)", "answer": "- Step 1: We want the alarm to trigger at high temperature. So $$V_{\\text{out}}$$ should rise as $$T$$ rises.\n- Step 2: Thermistor on top + take $$V_{\\text{out}}$$ across bottom fixed resistor: $$V_{\\text{out}} = V_{\\text{in}} \\cdot R_2/(R_1 + R_2)$$ with $$R_1$$ falling as $$T$$ rises ⇒ $$V_{\\text{out}}$$ rises with $$T$$. ✓\n- Step 3: A comparator (electronic switch) is set so that when $$V_{\\text{out}}$$ exceeds a chosen threshold voltage, it activates the alarm. The threshold corresponds to a specific temperature you've calibrated for.\n\nTakeaway: This is a textbook sensor circuit — the divider maps temperature onto voltage, which then drives a switch.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "From a mark-scheme perspective, list the four key points an examiner expects when asked \"why does a thermistor's resistance decrease when temperature rises?\" (4 steps)", "answer": "- Step 1: **Temperature rises (or more thermal energy)** — start by stating the cause.\n- Step 2: **More electrons freed from the lattice / $$n$$ increases** — name the microscopic mechanism and the quantity.\n- Step 3: **In $$I = nqvA$$, the increase in $$n$$ outweighs any decrease in $$v$$** — explicitly link to the equation and address why $$n$$ dominates.\n- Step 4: **Current $$I$$ increases for the same voltage, so $$R = V/I$$ decreases** — close the loop with the resistance definition.\n\nTakeaway: Always: cause → mechanism → equation → conclusion.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "Suppose the supply voltage in a potential divider doubles. Does the *ratio* $$V_{\\text{out}}/V_{\\text{in}}$$ change? Does the temperature *response* change? (3 steps)", "answer": "- Step 1: The ratio $$V_{\\text{out}}/V_{\\text{in}} = R_2/(R_1 + R_2)$$ depends only on resistances, not on $$V_{\\text{in}}$$. So if you double $$V_{\\text{in}}$$, $$V_{\\text{out}}$$ also doubles — same ratio.\n- Step 2: The temperature *response* (how much $$V_{\\text{out}}$$ changes per degree) is proportional to $$V_{\\text{in}}$$: a 1 V change in $$V_{\\text{out}}$$ at $$V_{\\text{in}} = 6\\ \\text{V}$$ becomes a 2 V change at $$V_{\\text{in}} = 12\\ \\text{V}$$. So higher supply → bigger signal.\n- Step 3: But the *self-heating* of the thermistor also increases (power scales as $$V_{\\text{in}}^2$$), which shifts the thermistor's operating point and may bias the R-T relationship. Trade-off: bigger signal vs more self-heating distortion.\n\nTakeaway: Higher supply gives a stronger signal but more self-heating; choose accordingly.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "Why can a thermistor's R-T curve sometimes be modelled as $$R = R_0 e^{-k\\theta}$$, and what does taking logs do? (3 steps)", "answer": "- Step 1: Since $$n \\propto e^{+k\\theta}$$ (roughly) and $$R \\propto 1/n$$, we get $$R \\propto e^{-k\\theta}$$ — exponential decay with temperature. The parameter $$R_0$$ is the resistance at $$\\theta = 0$$.\n- Step 2: Taking natural log of both sides: $$\\ln R = \\ln R_0 - k\\theta$$.\n- Step 3: This is a straight line: plot $$\\ln R$$ (y-axis) against $$\\theta$$ (x-axis), and you get a line with gradient $$-k$$ and intercept $$\\ln R_0$$. This is a way to *test* whether real data follows the exponential model and to extract the constants $$k$$ and $$R_0$$.\n\nTakeaway: Logs turn exponentials into straight lines — a powerful trick for validating exponential relationships.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "Why is constantan (a copper-nickel alloy) used to make standard fixed resistors instead of pure copper?", "answer": "Constantan has a much higher resistivity than copper (~50 × 10⁻⁸ Ω·m vs ~1.7 × 10⁻⁸ Ω·m), so you only need a short length of wire to make a useful-sized resistor — practical for manufacturing. More importantly, constantan has a *very small temperature coefficient of resistivity*: its resistance barely changes with temperature. Pure copper, by contrast, has a strong PTC behaviour — its resistance would drift significantly when the resistor warms up under load, making it unreliable. So constantan's \"boring\" temperature-independence is exactly what you want for a precision fixed resistor.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}], "count": 56}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What does the equation $$I = nqvA$$ describe at the microscopic level, and what does each symbol represent?", "answer": "- Step 1: The equation describes the **macroscopic current** $$I$$ in a conductor in terms of what the **charge carriers** are physically doing inside it. It links a measurable quantity (current, in amperes) to a microscopic picture (carriers drifting through a wire).\n- Step 2: Each symbol carries a precise meaning:\n+ $$n$$ = **number density** of free charge carriers (how many mobile carriers per cubic metre, units $$\\text{m}^{-3}$$).\n+ $$q$$ = charge on each carrier (for electrons, $$1.60 \\times 10^{-19}\\,\\text{C}$$).\n+ $$v$$ = **mean drift velocity** — the average velocity at which carriers drift along the wire (not their fast random thermal speed).\n+ $$A$$ = cross-sectional area of the conductor in $$\\text{m}^2$$.\n- Step 3: The intuition: in a time $$\\Delta t$$, carriers move a distance $$v\\Delta t$$, sweeping out a volume $$A v \\Delta t$$ containing $$nAv\\Delta t$$ carriers. The charge that passes is $$\\Delta Q = nqvA\\Delta t$$, so $$I = \\Delta Q/\\Delta t = nqvA$$.\n\nTakeaway: $$I = nqvA$$ is the \"volume-sweeping\" picture of current — count the carriers in the volume crossed per second, multiply by their charge.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "In $$I = nqvA$$ applied to a normal metal wire, which of the four quantities are essentially fixed by the material and geometry, and which can change?", "answer": "- Step 1: $$q$$ is fixed — it's just the electron charge, the same for every metal.\n- Step 2: $$A$$ is fixed by the wire's geometry (its cross-section doesn't change appreciably with current or temperature).\n- Step 3: $$n$$ is essentially **fixed** in a metal. Metals already have roughly one free electron per atom (e.g. copper: $$n \\approx 8.4 \\times 10^{28}\\,\\text{m}^{-3}$$). Heating barely changes this — the conduction band is already full.\n- Step 4: Only $$v$$ (the drift velocity) varies appreciably — it depends on how strong the electric field is and how often electrons scatter off vibrating ions.\n\nTakeaway: In a metal, the \"lever\" that current can pull is **drift velocity**. Temperature affects $$R$$ through $$v$$, not $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Why does the number density $$n$$ in a metal not increase significantly when you heat it, even though heating adds energy? (2 steps)", "answer": "- Step 1: In a metal, the outer electrons of each atom are **already delocalised** into a \"sea\" of free conduction electrons at room temperature. There's roughly one mobile electron per atom — there are no large pools of bound electrons waiting to be freed.\n- Step 2: Adding thermal energy by heating doesn't liberate new conduction electrons (there are essentially none left to liberate at the relevant energy scale). Instead, the added energy goes into making the lattice ions vibrate more vigorously, which affects scattering, not carrier number.\n\nTakeaway: Metal is \"carrier-saturated\" — $$n$$ is essentially maxed out, so heat acts on $$v$$, not $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "In a semiconductor at low temperature, why is the number density $$n$$ of free charge carriers very small?", "answer": "- Step 1: In a semiconductor like silicon or a metal-oxide ceramic, electrons are **locked into covalent bonds** within the crystal lattice. They have a fixed role — pairing up neighbouring atoms — and aren't free to wander.\n- Step 2: To become a conduction electron, an electron must absorb enough energy to **break out** of its bond. At low temperatures, very few electrons have enough thermal energy to do this, so very few are free at any moment.\n- Step 3: Result: $$n$$ is tiny compared to a metal — sometimes by 10 or more orders of magnitude — which is why a cold semiconductor is a poor conductor (high resistance).\n\nTakeaway: Semiconductors start with electrons \"imprisoned\" in bonds. Conduction requires liberating them.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Walk through, step by step, why the resistance of an NTC thermistor decreases when its temperature rises. Use $$I = nqvA$$ in your reasoning. (5 steps)", "answer": "- Step 1: Rising temperature delivers thermal energy to the semiconductor lattice. Some bound electrons absorb enough energy to escape their covalent bonds and become free conduction electrons.\n- Step 2: The number density $$n$$ of free carriers **rises sharply** (approximately exponentially with temperature in the operating range).\n- Step 3: At the same time, the lattice ions vibrate more, so carriers scatter more often, making the drift velocity $$v$$ slightly smaller for a given electric field.\n- Step 4: In $$I = nqvA$$, the **huge rise in $$n$$ massively outweighs the small fall in $$v$$**, so for the same applied voltage, $$I$$ increases.\n- Step 5: Since $$R = V/I$$ and $$V$$ is fixed while $$I$$ has grown, $$R$$ must **decrease**.\n\nTakeaway: In a semiconductor, the \"$$n$$ effect\" wins over the \"$$v$$ effect\" — opposite to a metal.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "Compare what happens in a metal vs an NTC thermistor when temperature rises, in terms of $$n$$, $$v$$, and net effect on $$R$$. (3 steps)", "answer": "- Step 1: **Metal**:\n+ $$n$$ is fixed (electrons already free).\n+ $$v$$ decreases (more lattice vibrations cause more scattering).\n+ Net: $$I$$ falls for the same $$V$$, so $$R$$ **rises** (PTC behaviour).\n- Step 2: **NTC thermistor**:\n+ $$n$$ rises sharply (electrons freed from bonds).\n+ $$v$$ decreases slightly (same scattering reason).\n+ Net: rise in $$n$$ overwhelmingly dominates, $$I$$ rises, $$R$$ **falls** (NTC behaviour).\n- Step 3: The same physical effect — more lattice vibration — is present in both cases, but in a metal it's the **only** effect (so it controls $$R$$), while in a semiconductor it's overpowered by the much larger change in carrier number.\n\nTakeaway: Metals and semiconductors have **opposite** R–T behaviour because they respond to heat through different terms in $$I = nqvA$$.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Why does an LDR's resistance fall when more light shines on it? Frame your explanation using $$I = nqvA$$. (4 steps)", "answer": "- Step 1: An LDR is made from a high-resistance semiconductor (e.g. cadmium sulfide). In the dark, almost all electrons are bound in covalent bonds — $$n$$ is very small, so $$R$$ is huge (megaohms).\n- Step 2: When light shines on the LDR, **photons are absorbed** by the lattice. The photon's energy is transferred to a bound electron, giving it enough energy to break free and become a conduction electron.\n- Step 3: More light intensity → more photons per second → more electrons liberated per second. The number density $$n$$ **increases**.\n- Step 4: In $$I = nqvA$$, larger $$n$$ (with $$q$$, $$v$$, $$A$$ approximately unchanged) means larger $$I$$ for the same $$V$$. Therefore $$R = V/I$$ **falls**.\n\nTakeaway: Light is to an LDR what heat is to a thermistor — both inject energy that frees bound electrons, raising $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Why does $$n$$ rise *exponentially* (not linearly) with temperature in a semiconductor? Give an intuitive picture. (3 steps)", "answer": "- Step 1: To free a bound electron, you need to give it more than a certain \"escape energy\" (the bond energy). Whether an electron has that much energy depends on the **tail** of the thermal energy distribution.\n- Step 2: As temperature rises, the high-energy tail of the distribution swells very rapidly — roughly like $$e^{-E/kT}$$. A small rise in $$T$$ dramatically increases the fraction of electrons that exceed the escape threshold.\n- Step 3: So $$n$$ doesn't creep up — it explodes. Heating a thermistor from 20 °C to 100 °C can drop $$R$$ by an order of magnitude, because so many more electrons clear the energy barrier.\n\nTakeaway: Exponential dependence comes from the **statistics of barrier-crossing**, not from anything linear about heat.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "Sketch (in words) the shape of the R-vs-temperature curve for an NTC thermistor. Why isn't it a straight line?", "answer": "- Step 1: The curve **starts high** at low temperature (e.g. ~700 Ω at 20 °C) and **falls steeply** as temperature first increases.\n- Step 2: As temperature continues to rise, the curve **flattens out** — at high T, resistance is small (e.g. ~74 Ω at 100 °C) and continues to drop, but more gradually.\n- Step 3: The shape is roughly **exponential decay**: $$R \\approx R_0 e^{-k\\theta}$$ over a useful range. It's not linear because doubling the temperature doesn't double the freed-electron count — exponential growth in $$n$$ means exponential decay in $$R$$.\n\nTakeaway: Steep at low T, flat at high T — the signature shape of NTC behaviour.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Sketch (in words) the shape of the R-vs-illumination curve for an LDR, and explain the limiting behaviours at very low and very high illumination.", "answer": "- Step 1: At very low illumination (near darkness), $$R$$ is **very large** — several MΩ. Almost no photons → very few freed electrons → tiny $$n$$.\n- Step 2: As illumination increases, $$R$$ **falls steeply** at first (a hyperbolic-looking decrease).\n- Step 3: At high illumination (bright light), $$R$$ is **small** — tens to a few hundred ohms — and the curve flattens. The semiconductor is being saturated with freed carriers; further light produces diminishing returns.\n- Step 4: The huge **dynamic range** (MΩ → tens of Ω) is what makes LDRs useful as light sensors.\n\nTakeaway: Steep fall at low light, flattening at high light — like a saturating decay curve.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Why does the I-V characteristic of a thermistor curve upward (steeper gradient at higher V) rather than being a straight line? (4 steps)", "answer": "- Step 1: For an ohmic resistor, $$I \\propto V$$ — gradient $$=1/R$$ is constant, so the line is straight.\n- Step 2: In a thermistor, as $$V$$ increases, the **power dissipated** $$P = VI = V^2/R$$ rises sharply. This heats the thermistor.\n- Step 3: Heating frees more electrons, $$n$$ rises, and the thermistor's resistance **falls**.\n- Step 4: With lower $$R$$, the same incremental increase in $$V$$ now produces a **larger** increase in $$I$$ than before. So the gradient $$dI/dV = 1/R$$ keeps growing → curve bends upward.\n\nTakeaway: Self-heating creates positive feedback on conductivity, so the I-V curve gets steeper as you go.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Why is the thermistor I-V curve symmetric about the origin (works identically for positive and negative voltages)?", "answer": "- Step 1: The mechanism that lowers resistance is **thermal**, not directional. Heating frees electrons regardless of which way the current flows.\n- Step 2: The semiconductor doesn't have a built-in polarity (unlike a diode). The lattice and the bond-breaking process don't care about the sign of $$V$$.\n- Step 3: So if you reverse the supply, you trace out a curve that's a mirror image through the origin — same shape, same upward-bending gradient.\n\nTakeaway: Thermistor symmetry reflects that the underlying physics (heat → freed carriers) is direction-independent.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "A thermistor measured $$1000\\,\\Omega$$ at $$V=3.0\\,\\text{V}$$ and dropped to $$\\approx 430\\,\\Omega$$ at $$V=7.0\\,\\text{V}$$. Explain conceptually why the resistance changed. (3 steps)", "answer": "- Step 1: Higher applied voltage drives a larger current, which dissipates more power as heat ($$P = VI$$) inside the thermistor itself.\n- Step 2: That extra heat raises the thermistor's temperature, providing thermal energy that frees more bound electrons. The number density $$n$$ rises sharply.\n- Step 3: From $$I = nqvA$$, larger $$n$$ means larger $$I$$ for the same $$V$$, so $$R = V/I$$ falls. The thermistor is being warmed by its own current — a self-heating effect.\n\nTakeaway: A thermistor \"shows\" its temperature dependence even at fixed ambient temperature, because the current heats it.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "What is the difference between PTC and NTC behaviour, and which category does each of (a) a copper wire, (b) a typical thermistor, and (c) a tungsten filament lamp fall into?", "answer": "- Step 1: **PTC** = positive temperature coefficient — resistance **increases** as temperature rises.\n- Step 2: **NTC** = negative temperature coefficient — resistance **decreases** as temperature rises.\n- Step 3: Classification:\n+ (a) Copper wire — **PTC** (metal: more lattice vibration → more scattering → higher R).\n+ (b) Typical thermistor — **NTC** (semiconductor: heat frees electrons → $$n$$ rises → R falls).\n+ (c) Tungsten filament — **PTC** (metal — same physics as copper; that's why an I-V curve for a filament lamp bends downward as it heats).\n\nTakeaway: PTC = metals; NTC = standard semiconductors used as sensors.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "What is the most common conceptual exam trap when asked about how resistance changes with temperature in a metal vs a thermistor?", "answer": "- Step 1: Students confuse the two and say a metal's resistance falls with rising T, or a thermistor's rises. **These behaviours are opposite.**\n- Step 2: The memory hook: \"**Metal heats up → resists more. Thermistor heats up → conducts more.**\" Or: metals \"vibrate\", semiconductors \"free electrons\" — different dominant effects.\n- Step 3: Another trap: assuming the *same* mechanism governs both. The lattice-vibration effect exists in both, but in a metal it's the only effect; in a semiconductor it's swamped by the change in $$n$$.\n\nTakeaway: Always think first about *what changes most* — $$n$$ or $$v$$ — before predicting R.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Why is writing $$R = IV$$ a serious error, and what is the correct relation? Use units to justify. (3 steps)", "answer": "- Step 1: The correct definition is $$R = V/I$$. Resistance is volts per ampere — ohms ($$\\Omega$$) = V/A.\n- Step 2: If you wrote $$R = IV$$, the units would be A·V = watts (W), which is **power**, not resistance. The formula would predict that running more current through a resistor (at fixed voltage) makes it more resistive — physically absurd.\n- Step 3: Quick sanity check: if $$V = 3\\,\\text{V}$$ and $$I = 3\\,\\text{mA}$$, $$R = V/I = 3 / 0.003 = 1000\\,\\Omega$$. Using the wrong formula gives $$3 \\times 0.003 = 0.009\\,\\Omega$$ — about five orders of magnitude wrong.\n\nTakeaway: $$R = V/I$$. If your answer is in watts, you've made the classic error.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "In a potential divider, the formula $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_1 + R_2}$$ tells us that $$V_{out}$$ is taken across which resistor, and how do we choose which component is the sensor? (3 steps)", "answer": "- Step 1: $$V_{out}$$ is measured across $$R_2$$, the resistor that appears on top of the fraction. (Often drawn as the \"lower\" resistor connected to the 0 V rail.)\n- Step 2: You're free to choose either $$R_1$$ or $$R_2$$ to be the sensor (thermistor/LDR). The choice determines whether $$V_{out}$$ rises or falls with the stimulus.\n+ Sensor at $$R_1$$ (top), fixed resistor at $$R_2$$: when sensor R falls, the fraction $$\\frac{R_2}{R_1+R_2}$$ grows → $$V_{out}$$ **rises**.\n+ Sensor at $$R_2$$ (bottom), fixed resistor at $$R_1$$: when sensor R falls, $$\\frac{R_2}{R_1+R_2}$$ shrinks → $$V_{out}$$ **falls**.\n- Step 3: So the design choice — sensor on top or bottom — sets the direction of the output response. This lets you build either \"switch on when hot\" or \"switch on when cold\" circuits.\n\nTakeaway: Position of the sensor in the divider controls the *direction* of the output's response to the stimulus.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "A thermistor sits as $$R_1$$ (top) in a potential divider with a fixed resistor $$R_2$$. If the room temperature rises, does $$V_{out}$$ (across $$R_2$$) rise or fall, and why?", "answer": "- Step 1: Temperature rises → thermistor's $$n$$ rises → its resistance $$R_1$$ **falls**.\n- Step 2: Using $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_1+R_2}$$: $$R_2$$ is fixed, but $$R_1$$ shrinks, so the denominator shrinks and the fraction grows.\n- Step 3: Alternative view via current: total resistance falls, so circuit current $$I = V_{in}/(R_1+R_2)$$ rises. Since $$V_{out} = IR_2$$ and $$R_2$$ is fixed, $$V_{out}$$ **rises**.\n\nTakeaway: Sensor on top + sensor R falls → larger share of voltage goes to the fixed resistor.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "A thermistor sits as $$R_1$$ at 440 Ω (cold) vs 110 Ω (hot), with $$R_2 = 220\\,\\Omega$$ fixed and $$V_{in} = 6.0\\,\\text{V}$$. Roughly what fraction of the supply appears across $$R_2$$ in each case? (Use intuition, not heavy calculation.) (3 steps)", "answer": "- Step 1: Cold case: $$R_1 = 440\\,\\Omega$$, $$R_2 = 220\\,\\Omega$$. Total = $$660\\,\\Omega$$. Fraction = $$220/660 = 1/3$$. So $$V_{out} \\approx 6.0 \\times 1/3 = 2.0\\,\\text{V}$$.\n- Step 2: Hot case: $$R_1 = 110\\,\\Omega$$, $$R_2 = 220\\,\\Omega$$. Total = $$330\\,\\Omega$$. Fraction = $$220/330 = 2/3$$. So $$V_{out} \\approx 6.0 \\times 2/3 = 4.0\\,\\text{V}$$.\n- Step 3: Heating **doubled** $$V_{out}$$ — a strong response. This is exactly the kind of voltage swing you'd feed into a switching circuit to trigger an alarm.\n\nTakeaway: Sensor on top, heat applied → $$V_{out}$$ swings up sharply because the sensor's \"share\" of the divider shrinks.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Estimate the drift velocity of electrons in a copper wire of area $$1\\,\\text{mm}^2$$ carrying $$10\\,\\text{A}$$. Use $$n \\approx 8.4 \\times 10^{28}\\,\\text{m}^{-3}$$. You don't need an exact number — get the order of magnitude and interpret it. (3 steps)", "answer": "- Step 1: Rearrange $$I = nqvA$$ to get $$v = \\frac{I}{nqA}$$. Plug in orders: numerator $$\\sim 10$$. Denominator $$\\sim 10^{29} \\times 10^{-19} \\times 10^{-6} = 10^4$$.\n- Step 2: So $$v \\sim 10/10^4 = 10^{-3}\\,\\text{m/s}$$ — about **1 mm per second**. The full value is roughly $$7.4 \\times 10^{-4}\\,\\text{m/s}$$, or ~0.74 mm/s.\n- Step 3: This is astonishingly slow — slower than walking pace by orders of magnitude. Yet electrical signals (and light bulbs turning on) propagate at near light speed, because the **electric field** establishes itself nearly instantaneously throughout the wire; individual electrons don't need to travel far.\n\nTakeaway: Drift velocity is millimetres per second, even at high currents. Signals fly, but electrons crawl.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "Why is drift velocity so tiny in metals — slower than walking — despite the wire carrying amperes of current?", "answer": "- Step 1: In $$I = nqvA$$, you can carry a huge current $$I$$ either by having lots of carriers $$n$$ or by making them fast $$v$$. Metals have **enormous** $$n$$ (~$$10^{29}\\,\\text{m}^{-3}$$), so even at modest $$v$$, $$I$$ is large.\n- Step 2: Concretely: if $$n$$ is $$10^{29}$$, $$q$$ is $$10^{-19}$$, $$A$$ is $$10^{-6}$$, then $$nqA \\sim 10^4$$ A per (m/s). Just 1 mm/s of drift produces ~10 A. You don't need fast electrons.\n- Step 3: Physically, electrons in a metal are constantly bouncing off ions; the electric field nudges them slightly in one direction on top of huge thermal motion. The net drift is tiny.\n\nTakeaway: Huge $$n$$ → tiny $$v$$ does the job. Metals achieve currents through density, not speed.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "A copper wire and a semiconductor of the same size both carry 1 A. Roughly compare the magnitudes of their drift velocities. Justify with $$I = nqvA$$. (3 steps)", "answer": "- Step 1: For the same $$I$$, same $$q$$, same $$A$$: $$v \\propto 1/n$$.\n- Step 2: Copper has $$n \\sim 10^{29}\\,\\text{m}^{-3}$$; a typical semiconductor at room temperature has $$n$$ many orders of magnitude smaller (e.g. $$10^{16}$$–$$10^{19}$$).\n- Step 3: To deliver the same current, the semiconductor's electrons must drift **much faster** — potentially by factors of $$10^{10}$$ or more. In practice, this means semiconductors require huge electric fields (huge voltages) to push the same current, which is why their resistance is high.\n\nTakeaway: Few carriers ⇒ they must run fast to carry the same current — and that needs a high voltage, i.e. high resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "Why does copper conduct so much better than silicon at room temperature, when both are crystalline solids? Use $$I = nqvA$$.", "answer": "- Step 1: The decisive factor is $$n$$. In copper, **every atom donates roughly one free electron** to the conduction sea — $$n \\sim 8 \\times 10^{28}\\,\\text{m}^{-3}$$.\n- Step 2: In silicon at room temperature, the vast majority of electrons are locked in covalent bonds; only a tiny fraction have enough thermal energy to escape. Pure silicon's intrinsic carrier density is ~$$10^{10}\\,\\text{m}^{-3}$$ — about **18 orders of magnitude** lower than copper.\n- Step 3: From $$I = nqvA$$, conductivity scales with $$n$$ (with $$v$$ being only modestly different). With orders-of-magnitude fewer carriers, silicon's resistance is vastly higher than copper's.\n\nTakeaway: Conductivity is dominated by carrier *availability*. Bound electrons can't carry current.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "In a metal, heating reduces drift velocity $$v$$. But in a thermistor, heating *also* reduces $$v$$ slightly — yet the resistance still falls. Reconcile this.", "answer": "- Step 1: Both effects coexist: hotter lattice → more vibrations → more scattering → smaller $$v$$ for given field, regardless of metal or semiconductor.\n- Step 2: But in a semiconductor, heating also drastically increases $$n$$. Compared to factors of 10× or 100× change in $$n$$, the modest reduction in $$v$$ (a few tens of percent) is negligible.\n- Step 3: Net: $$nv$$ grows substantially in a semiconductor (because $$n$$ wins), so $$I$$ rises and $$R$$ falls — even though one of the two factors works against it.\n\nTakeaway: Always check **which term dominates** in $$I = nqvA$$ before predicting how R responds.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "What's the difference between (a) the thermistor's resistance change due to its surroundings (e.g. a hot room) and (b) the resistance change due to its own current passing through it?", "answer": "- Step 1: (a) **External heating**: room or fluid temperature changes, the thermistor equilibrates with it, and $$n$$ adjusts. This is the principle behind using a thermistor as a thermometer — its R reflects ambient T.\n- Step 2: (b) **Self-heating**: current through the thermistor dissipates power $$P = I^2 R$$ inside it. This warms the thermistor above ambient, lowering R even without any change in surroundings. This is responsible for the curved I-V characteristic.\n- Step 3: For accurate temperature sensing, you want to minimise self-heating — use small measurement currents. For switching/control circuits, self-heating doesn't matter much, but it can cause runaway if not designed for.\n\nTakeaway: Same mechanism (heat frees carriers) but different heat sources — environment vs. the current itself.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Why might you need to wait 5 minutes after reversing the supply when measuring a thermistor's I-V curve?", "answer": "- Step 1: During the forward sweep, the current heated the thermistor — its temperature rose above ambient and its R dropped accordingly.\n- Step 2: If you immediately reverse and start measuring, the thermistor is **still hot** from the previous run. The reverse-direction curve would not start from the \"true\" cold resistance but from a partially warmed state, distorting the data.\n- Step 3: Waiting allows the thermistor to cool back to ambient (heat dissipated to surroundings), so the reverse sweep begins from the same baseline as the forward sweep — giving a symmetric I-V curve.\n\nTakeaway: Self-heating has a thermal time constant. Let it cool before retesting.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Why does the I-V curve of an LDR resemble that of a thermistor (upward-bending curve), even though an LDR is normally controlled by light, not current?", "answer": "- Step 1: At low V, low current, low power dissipation — the LDR sits at whatever R the ambient illumination dictates.\n- Step 2: As V grows, the LDR carries more current; some of the dissipated power warms it. In addition, if the device's R falls, you can get a feedback effect — slightly more current at slightly lower R.\n- Step 3: Either way, R tends to drop a bit as V increases. From $$I = V/R$$, when R is decreasing as V increases, $$I$$ rises faster than linearly. The I-V gradient ($$1/R$$) increases — curve bends upward.\n\nTakeaway: Any device where R falls with V (whether from self-heating or any other feedback) will show an upward-bending I-V curve.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "An LDR is placed in the *bottom* slot of a potential divider ($$R_2$$, where $$V_{out}$$ is measured) with a fixed $$R_1$$ on top. The room gets darker. Does $$V_{out}$$ increase or decrease, and why?", "answer": "- Step 1: Darker → fewer photons → less freeing of bound electrons → $$n$$ falls → LDR resistance $$R_2$$ **increases**.\n- Step 2: In $$V_{out} = V_{in} \\cdot \\frac{R_2}{R_1 + R_2}$$, $$R_2$$ grows. The numerator grows, but the denominator also grows by the same amount. The ratio approaches 1 — i.e., $$V_{out}$$ **increases**.\n- Step 3: Intuition: if the LDR becomes \"the big resistor,\" it grabs most of the supply voltage. Since $$V_{out}$$ is measured across it, $$V_{out}$$ rises. This is exactly the trigger you'd want to switch on a streetlight at dusk.\n\nTakeaway: LDR on the bottom, light decreases → $$V_{out}$$ rises. Classic streetlight design.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Compare: thermistor on top of divider with fixed $$R_2$$ vs LDR on bottom of divider with fixed $$R_1$$. In both, what stimulus causes $$V_{out}$$ to *increase*? (3 steps)", "answer": "- Step 1: **Thermistor on top**: $$V_{out}$$ across $$R_2$$ (bottom). Heat → thermistor R falls → fraction $$R_2/(R_1+R_2)$$ rises → $$V_{out}$$ **rises**. Stimulus = **heat**.\n- Step 2: **LDR on bottom**: $$V_{out}$$ across the LDR. Darkness → LDR R rises → fraction $$R_2/(R_1+R_2)$$ rises → $$V_{out}$$ **rises**. Stimulus = **darkness**.\n- Step 3: Both rise but for opposite-feeling reasons: in the first, the *fixed* resistor grabs more voltage as the sensor weakens; in the second, the sensor itself grows and grabs more voltage. The position of $$V_{out}$$ relative to the sensor is what flips the logic.\n\nTakeaway: To predict $$V_{out}$$ direction, always identify *which* resistor $$V_{out}$$ is across, then ask whether that resistor's share of the total is growing or shrinking.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "In a potential-divider sensor circuit, when the sensor's resistance decreases, does the voltage *across the sensor* increase or decrease, and why?", "answer": "- Step 1: Voltage divides in proportion to resistance: $$V \\propto R$$ in series. The component with the larger R carries the larger voltage drop.\n- Step 2: If the sensor's R falls, its share of the total R shrinks, so its share of $$V_{in}$$ shrinks — the voltage **across the sensor** decreases.\n- Step 3: Conservation: the rest of the supply voltage has to go somewhere — it appears across the fixed resistor. So if you're measuring $$V_{out}$$ across the *other* resistor, you'd see an *increase*. Be very careful which resistor you're measuring across.\n\nTakeaway: Voltage across a falling-R sensor falls; voltage across its series partner rises. Same physics, opposite-looking answer.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Common student error: \"The thermistor's resistance change makes the current change first, and that changes the voltage.\" What's the proper logical chain, and why does the order matter? (4 steps)", "answer": "- Step 1: The **stimulus** (heat or light) comes first.\n- Step 2: The stimulus changes $$n$$ in the semiconductor — more carriers freed.\n- Step 3: This changes the **resistance** of the component (via $$I = nqvA$$ at fixed $$v$$).\n- Step 4: The changed R, combined with the (constant) supply voltage, finally changes the **current** through Ohm's law and changes the voltage distribution across the circuit.\n\nTakeaway: Stimulus → $$n$$ → R → I and V. Examiners specifically want you to state \"resistance changes\" before getting to current or voltage.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "Common student error: \"A resistor stores electrons / uses up charge.\" What's wrong with this picture? (3 steps)", "answer": "- Step 1: Charge is **conserved**. In a series circuit, the current entering a component equals the current leaving it. Nothing is \"used up\" or stored.\n- Step 2: A resistor (or thermistor/LDR) does dissipate **energy**, not charge. The electrons transfer kinetic energy to the lattice as heat through collisions, but the electrons themselves continue downstream.\n- Step 3: Think of a river: water flows through a turbine, transferring energy to it, but no water disappears in the turbine. Same for charge in a resistor.\n\nTakeaway: Components transfer energy, not charge. Don't say \"uses up electrons.\"", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Suggest a simple application of a thermistor in a potential divider and explain how it could trigger a warning lamp at, say, 40 °C. (3 steps)", "answer": "- Step 1: Set up: thermistor as $$R_1$$ (top), fixed resistor $$R_2$$ (bottom), $$V_{out}$$ measured across $$R_2$$. Choose $$R_2$$ roughly equal to half the thermistor's room-temperature resistance for a good range.\n- Step 2: As temperature rises, thermistor's R falls, $$V_{out}$$ across $$R_2$$ rises. Plot $$V_{out}$$ vs $$\\theta$$ experimentally — at, say, 40 °C the output might be 2.4 V.\n- Step 3: Connect $$V_{out}$$ to a comparator/switch circuit (e.g. a transistor that turns on when its base voltage exceeds 2.4 V). When the room hits 40 °C, the switch trips and a warning lamp lights.\n\nTakeaway: A thermistor + fixed resistor + threshold circuit = a temperature-triggered alarm.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "What's a common application of an LDR in a potential divider, and how would you wire it so that a streetlight comes on at dusk? (3 steps)", "answer": "- Step 1: Place the LDR as $$R_2$$ (bottom) of the divider, with a fixed resistor $$R_1$$ on top. Measure $$V_{out}$$ across the LDR.\n- Step 2: In daylight: LDR R is small (~100 Ω). $$V_{out}$$ ≈ small (most of the supply drops across the large fixed $$R_1$$).\n- Step 3: At dusk: LDR R grows large (MΩ). The LDR now dominates; $$V_{out}$$ across it rises towards $$V_{in}$$. A threshold switch detects this rise and turns on the lamp. The light stays on until dawn raises the LDR's conductance again.\n\nTakeaway: LDR at bottom of divider → output rises as it gets dark → triggers the lamp.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "When sketching the I-V graph of a thermistor, why must you include points for negative V (and not just the first quadrant)? (2 steps)", "answer": "- Step 1: A thermistor's behaviour is symmetric under polarity reversal — the heating mechanism that lowers R doesn't depend on current direction.\n- Step 2: A complete I-V characteristic shows both quadrants — the curve passes through the origin and bends upward on both sides, with mirror symmetry about the origin. Showing only positive V would imply (incorrectly) that the device has polarity, like a diode.\n\nTakeaway: Thermistors are bidirectional. The graph should reflect this with symmetric branches.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "A student claims: \"An LDR's resistance falls by a factor of 1000 from dark to bright. So drift velocity must increase by a factor of 1000 too.\" Identify and correct the error.", "answer": "- Step 1: The student is assuming $$n$$ doesn't change — that all the resistance change comes from $$v$$. This contradicts the physics of an LDR.\n- Step 2: In reality, light increases $$n$$ by orders of magnitude — that's the entire mechanism. Drift velocity $$v$$ changes only modestly (and may even drop slightly with self-heating).\n- Step 3: A factor of 1000 drop in R comes overwhelmingly from $$n$$ growing by a factor of ~1000, not from $$v$$ changing.\n\nTakeaway: For semiconductor sensors, the dominant variable is always $$n$$. Don't blame $$v$$.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Why does increasing the *length* of a thermistor (not its temperature) increase its resistance, while increasing temperature *decreases* it? Reconcile using physical reasoning. (3 steps)", "answer": "- Step 1: Resistance $$R = \\rho L/A$$ depends on geometry — longer wire means more material, more places for collisions, larger $$R$$. This is geometric, not electronic.\n- Step 2: Temperature, by contrast, changes the **microscopic material property** $$\\rho$$ (resistivity), via changing $$n$$. For a thermistor, hotter → more free carriers → lower $$\\rho$$ → lower $$R$$.\n- Step 3: These two effects are independent. You could lengthen and heat a thermistor simultaneously, and one effect would raise R while the other lowers it. Whichever change is proportionally larger wins.\n\nTakeaway: Geometry sets the baseline R; carrier physics modulates it.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Sketch (in words) and explain the I-V graph of a tungsten filament lamp, and contrast it with the I-V graph of a thermistor. Why do they look different? (4 steps)", "answer": "- Step 1: Filament lamp I-V: as V increases, the filament heats up; being a metal, its resistance **rises**, so the slope $$dI/dV = 1/R$$ **falls**. Graph bends **downward** (gradient decreases).\n- Step 2: Thermistor I-V: as V increases, self-heating raises $$n$$, lowering R. Slope $$1/R$$ **rises**. Graph bends **upward** (gradient increases).\n- Step 3: Both involve self-heating from the dissipated power $$P = VI$$, but the materials respond oppositely.\n+ Filament (metal): n fixed, v decreases → R up → curve bends down.\n+ Thermistor (semiconductor): n rises → R down → curve bends up.\n- Step 4: This is exactly the PTC vs NTC distinction, made visible in the I-V trace.\n\nTakeaway: Curving down = PTC (metal). Curving up = NTC (semiconductor).", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "A thermistor is placed in series with a 1.0 kΩ fixed resistor across a 9.0 V supply, with $$V_{out}$$ across the fixed resistor. At room temperature the thermistor reads 3.0 kΩ. Roughly what is $$V_{out}$$? What happens if the room cools? (4 steps)", "answer": "- Step 1: Total R = 3.0 + 1.0 = 4.0 kΩ. Fraction of supply across the fixed resistor = $$1.0/4.0 = 1/4$$.\n- Step 2: $$V_{out} = 9.0 \\times 1/4 = 2.25\\,\\text{V}$$.\n- Step 3: If the room cools, thermistor R **rises** (NTC: cold → less freeing of carriers → higher R). Total R rises, fraction $$R_{fix}/R_{total}$$ shrinks.\n- Step 4: $$V_{out}$$ across the fixed resistor **decreases**.\n\nTakeaway: Thermistor (top) + cooler room → less voltage across the fixed bottom resistor.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "When measuring a thermistor's R-T characteristic experimentally, why is it important to **stir** the water before recording the temperature? (2 steps)", "answer": "- Step 1: Water heated from below has temperature gradients — hotter near the heat source, cooler at the top. The thermometer and thermistor might be at different temperatures within the same bath, giving you a misleading reading.\n- Step 2: Stirring forces convective mixing so the bath reaches near-uniform temperature. The recorded $$\\theta$$ then truly corresponds to the thermistor's environment, so the R measurement reflects the true relationship at that temperature.\n\nTakeaway: Uniform temperature → reliable data. Always stir.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Why does the resistance of a semiconductor *cannot* be considered to decrease forever as temperature keeps rising? What limits the trend?", "answer": "- Step 1: At low and moderate temperatures, the dominant effect is freeing more carriers — $$n$$ rises exponentially, R falls steeply.\n- Step 2: As temperature climbs, the lattice vibrates more violently. Scattering increases drastically, so drift velocity $$v$$ falls.\n- Step 3: At sufficiently high T, most easily-freed electrons are already freed (n nearly saturated), and the falling $$v$$ starts to dominate. The R-T curve flattens and could eventually rise again — semiconductor behaviour gives way to metal-like behaviour at extreme temperatures.\n\nTakeaway: NTC behaviour isn't infinite — it eventually saturates and can reverse.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "Suppose you connect a thermistor in series with a battery and ammeter (no fixed resistor). As current rises, what happens, and what's the risk?", "answer": "- Step 1: Current dissipates power $$P = I^2 R$$ in the thermistor, heating it.\n- Step 2: Hotter thermistor → lower R → higher I at the same V → more power dissipated → even hotter. This is **positive feedback** (thermal runaway).\n- Step 3: Without a current-limiting fixed resistor in series, the thermistor can overheat and be destroyed. That's why measurement circuits cap the maximum current (~20 mA) and why most real circuits include a series ballast resistor.\n\nTakeaway: Self-heating + NTC behaviour → thermal runaway risk. Always limit current.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Two LDRs sit on different sides of a streetlamp's sensor — one in shadow, one in sun. The shadow LDR reads 2 MΩ, the sun LDR reads 200 Ω. By roughly what factor has the carrier density $$n$$ differed between them (assuming $$v$$ similar)? (3 steps)", "answer": "- Step 1: For the same V, $$R \\propto 1/I \\propto 1/(nv)$$. With $$v$$ similar, $$R \\propto 1/n$$, so $$n \\propto 1/R$$.\n- Step 2: Ratio of resistances: $$2 \\times 10^6 / 200 = 10^4$$. So the ratio of carrier densities is approximately $$10^4$$ in the opposite direction — the sunlit LDR has ~10,000 times more conduction electrons than the shaded one.\n- Step 3: This enormous ratio shows the **dynamic range** of $$n$$ in a semiconductor: photons can change carrier density by orders of magnitude, which is why LDRs are such sensitive light detectors.\n\nTakeaway: Factor-1000+ changes in R reflect factor-1000+ changes in $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Why don't we typically use a metal wire as a temperature sensor for room-temperature measurements, even though its resistance does change with temperature?", "answer": "- Step 1: A metal's R changes with T, b
