e roughly *constant* resistance over a temperature range. How is this possible given that $$n$$ always increases with temperature in a semiconductor? (2 steps)", "answer": "- Step 1: In a pure semiconductor, $$n$$ increases with temperature and this dominates, giving NTC behaviour. But in a *doped* semiconductor, impurity atoms are deliberately added (e.g. arsenic in silicon). These impurities provide extra free carriers even at low temperature, so the starting value of $$n$$ is much higher than in a pure semiconductor.\n- Step 2: In some doped materials, the increase in $$n$$ with temperature is modest (many carriers are already free from the dopant atoms), and the increased lattice scattering (which reduces $$v$$) becomes significant by comparison. If the increase in $$n$$ and decrease in $$v$$ happen to balance, $$n \\times v$$ stays roughly constant, and $$R$$ barely changes. Carbon resistors are an example — they are made from a form of doped semiconductor/graphite mixture and maintain approximately constant resistance over a practical temperature range. In a PTC semiconductor, the $$v$$-decrease actually dominates over the $$n$$-increase, giving rising resistance with temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "You are told that a thermistor's resistance follows $$R = R_0 e^{-k\\theta}$$ with $$k \\approx 0.034$$ K⁻¹ and $$R_0 \\approx 13$$ kΩ. Without doing any calculation, explain whether the resistance falls by a larger *absolute* amount between 20°C→40°C or between 60°C→80°C. (3 steps)", "answer": "- Step 1: The exponential function means the *percentage* decrease per degree is constant (each 10°C rise reduces $$R$$ by roughly the same factor). But the *absolute* decrease depends on the starting value.\n- Step 2: At 20°C, the resistance is still relatively high (a few kΩ). A constant percentage of a large number gives a large absolute decrease. At 60°C, the resistance has already fallen significantly (to a smaller value). The same percentage of a smaller number gives a smaller absolute decrease.\n- Step 3: Therefore, the absolute decrease is *larger* between 20°C→40°C than between 60°C→80°C. This is exactly what the R-T graph shows: the curve is steep at low temperatures (large absolute changes) and flattens at high temperatures (small absolute changes). Exponential decay always has this property — the rate of change is proportional to the current value.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "When temperature rises in a metal, the drift velocity $$v$$ decreases. When temperature rises in a semiconductor, $$v$$ also decreases slightly — yet the semiconductor's resistance goes *down* while the metal's goes *up*. Explain this paradox using $$I = nqvA$$. (3 steps)", "answer": "- Step 1: In both materials, higher temperature means more vigorous lattice vibrations, so electrons collide more often and their drift velocity $$v$$ decreases. This effect alone would increase resistance in *both* cases (less $$v$$ → less $$I$$ → more $$R$$).\n- Step 2: In a metal, $$n$$ is essentially constant. So the only effect of heating is the reduction in $$v$$, which means $$I$$ decreases and $$R$$ increases. Metal resistance always rises with temperature (PTC behaviour).\n- Step 3: In a semiconductor, the reduction in $$v$$ is overwhelmed by the *enormous* increase in $$n$$. Even though each carrier drifts slightly slower, there are so many *more* carriers that the total current $$I = nqvA$$ increases dramatically. So $$R = V/I$$ *decreases*. The key insight: in a semiconductor, the $$n$$-effect dominates; in a metal, the $$v$$-effect is the only game in town.\n\nThis is the single most tested distinction in exams — the opposite behaviour of metals and NTC semiconductors with temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "Sketch (in words) and explain the I-V graph of a tungsten filament lamp, and contrast it with the I-V graph of a thermistor. Why do they look different? (4 steps)", "answer": "- Step 1: Filament lamp I-V: as V increases, the filament heats up; being a metal, its resistance **rises**, so the slope $$dI/dV = 1/R$$ **falls**. Graph bends **downward** (gradient decreases).\n- Step 2: Thermistor I-V: as V increases, self-heating raises $$n$$, lowering R. Slope $$1/R$$ **rises**. Graph bends **upward** (gradient increases).\n- Step 3: Both involve self-heating from the dissipated power $$P = VI$$, but the materials respond oppositely.\n+ Filament (metal): n fixed, v decreases → R up → curve bends down.\n+ Thermistor (semiconductor): n rises → R down → curve bends up.\n- Step 4: This is exactly the PTC vs NTC distinction, made visible in the I-V trace.\n\nTakeaway: Curving down = PTC (metal). Curving up = NTC (semiconductor).", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Why does the resistance of a semiconductor *cannot* be considered to decrease forever as temperature keeps rising? What limits the trend?", "answer": "- Step 1: At low and moderate temperatures, the dominant effect is freeing more carriers — $$n$$ rises exponentially, R falls steeply.\n- Step 2: As temperature climbs, the lattice vibrates more violently. Scattering increases drastically, so drift velocity $$v$$ falls.\n- Step 3: At sufficiently high T, most easily-freed electrons are already freed (n nearly saturated), and the falling $$v$$ starts to dominate. The R-T curve flattens and could eventually rise again — semiconductor behaviour gives way to metal-like behaviour at extreme temperatures.\n\nTakeaway: NTC behaviour isn't infinite — it eventually saturates and can reverse.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "The I–V characteristic of a thermistor is symmetric about the origin (it looks the same in the third quadrant as in the first). Why is this, and how does this distinguish it from a semiconductor diode? (2 steps)", "answer": "- Step 1: A thermistor is simply a piece of semiconductor material with two terminals. It has no junction (no p–n boundary). Whether the applied voltage is positive or negative, the mechanism is the same: current flows, power is dissipated, the material heats up, $$n$$ increases, $$R$$ decreases, and the gradient increases. The physics is direction-independent, so the curve is symmetric.\n- Step 2: A semiconductor diode, by contrast, has a p–n junction that allows current easily in one direction (forward bias) but blocks it in the other (reverse bias). Its I–V curve is highly asymmetric. The thermistor's symmetry tells you it is a *non-directional, non-ohmic* component — it doesn't care about polarity, but its resistance does change with operating conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "Compare and contrast: thermistor vs LDR. Why are they often discussed together, and how do they differ? (3 steps)", "answer": "- Step 1: **Similar**: both are semiconductor sensors whose resistance falls when stimulated. Both rely on increasing $$n$$ via $$I = nqvA$$. Both are non-ohmic. Both are used in potential-divider sensor circuits to produce a voltage signal.\n- Step 2: **Different stimulus**: thermistor responds to *temperature* (heat energy frees electrons); LDR responds to *light intensity* (photon energy frees electrons).\n- Step 3: **Different applications**: thermistors → thermostats, fire alarms, temperature alarms; LDRs → automatic streetlights, camera light meters, garden lights.\n\nTakeaway: Same physics, different energy source (thermal vs photonic) for freeing the carriers.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "Two LDRs sit on different sides of a streetlamp's sensor — one in shadow, one in sun. The shadow LDR reads 2 MΩ, the sun LDR reads 200 Ω. By roughly what factor has the carrier density $$n$$ differed between them (assuming $$v$$ similar)? (3 steps)", "answer": "- Step 1: For the same V, $$R \\propto 1/I \\propto 1/(nv)$$. With $$v$$ similar, $$R \\propto 1/n$$, so $$n \\propto 1/R$$.\n- Step 2: Ratio of resistances: $$2 \\times 10^6 / 200 = 10^4$$. So the ratio of carrier densities is approximately $$10^4$$ in the opposite direction — the sunlit LDR has ~10,000 times more conduction electrons than the shaded one.\n- Step 3: This enormous ratio shows the **dynamic range** of $$n$$ in a semiconductor: photons can change carrier density by orders of magnitude, which is why LDRs are such sensitive light detectors.\n\nTakeaway: Factor-1000+ changes in R reflect factor-1000+ changes in $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "An LDR is connected as $$R_2$$ (bottom) in a potential divider with a fixed resistor $$R_1 = 8.0$$ kΩ on top and $$V_{in} = 12$$ V. In daylight, the LDR resistance is about 800 Ω. As it gets darker, explain step-by-step why the power dissipated in the fixed resistor $$R_1$$ *decreases*. (4 steps)", "answer": "- Step 1: As it gets darker, fewer photons hit the LDR semiconductor. Fewer electrons are freed from the lattice, so $$n$$ decreases. From $$I = nqvA$$ (applied to the LDR), the LDR's ability to conduct decreases, so $$R_{LDR}$$ *increases*.\n- Step 2: The total circuit resistance is $$R_{total} = R_1 + R_{LDR}$$. Since $$R_{LDR}$$ increases, $$R_{total}$$ *increases*.\n- Step 3: With $$V_{in}$$ fixed, the circuit current $$I = V_{in}/R_{total}$$ *decreases* (Ohm's law: more total resistance means less current from the same supply).\n- Step 4: The power dissipated in the fixed resistor is $$P = I^2 R_1$$. Since $$I$$ has decreased and $$R_1$$ is constant, $$P$$ *decreases*. Note: you could also reason that less current means less voltage across $$R_1$$ ($$V_1 = IR_1$$), and $$P = V_1^2/R_1$$ also decreases. Either route reaches the same conclusion.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "Common student error: \"A resistor stores electrons / uses up charge.\" What's wrong with this picture? (3 steps)", "answer": "- Step 1: Charge is **conserved**. In a series circuit, the current entering a component equals the current leaving it. Nothing is \"used up\" or stored.\n- Step 2: A resistor (or thermistor/LDR) does dissipate **energy**, not charge. The electrons transfer kinetic energy to the lattice as heat through collisions, but the electrons themselves continue downstream.\n- Step 3: Think of a river: water flows through a turbine, transferring energy to it, but no water disappears in the turbine. Same for charge in a resistor.\n\nTakeaway: Components transfer energy, not charge. Don't say \"uses up electrons.\"", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Why does the number density $$n$$ in a metal not increase significantly when you heat it, even though heating adds energy? (2 steps)", "answer": "- Step 1: In a metal, the outer electrons of each atom are **already delocalised** into a \"sea\" of free conduction electrons at room temperature. There's roughly one mobile electron per atom — there are no large pools of bound electrons waiting to be freed.\n- Step 2: Adding thermal energy by heating doesn't liberate new conduction electrons (there are essentially none left to liberate at the relevant energy scale). Instead, the added energy goes into making the lattice ions vibrate more vigorously, which affects scattering, not carrier number.\n\nTakeaway: Metal is \"carrier-saturated\" — $$n$$ is essentially maxed out, so heat acts on $$v$$, not $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "A thermistor has a resistance of $$1000\\ \\Omega$$ at $$3\\ \\text{V}$$ and $$430\\ \\Omega$$ at $$7\\ \\text{V}$$. If the voltage is doubled from $$3\\ \\text{V}$$ to $$6\\ \\text{V}$$, will the current more than double, exactly double, or less than double? Explain. (3 steps)", "answer": "- Step 1: Calculate the current at $$3\\ \\text{V}$$: $$I_1 = V/R = 3/1000 = 3\\ \\text{mA}$$. If the thermistor were ohmic (fixed $$R$$), doubling the voltage would exactly double the current.\n- Step 2: However, a thermistor is non-ohmic. As voltage increases, it dissipates more power, heats up, and its resistance *decreases*.\n- Step 3: At $$6\\ \\text{V}$$, the resistance will be less than $$1000\\ \\Omega$$ (somewhere between $$1000\\ \\Omega$$ and $$430\\ \\Omega$$). Since $$I = V/R$$ and $$R$$ is dropping, the current will increase *more* than proportionally. Therefore, the current will more than double.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "A glass rod is normally an excellent insulator. Yet when heated until it glows red hot, it can conduct electricity. Explain this using the concept of number density $$n$$. (3 steps)", "answer": "- Step 1: At room temperature, glass has an extremely small number density of free charge carriers — virtually all electrons are tightly bound in atomic/molecular bonds. This makes $$n$$ ≈ 0, so $$I = nqvA ≈ 0$$, and it behaves as an insulator.\n- Step 2: At very high temperatures (glowing red hot), the thermal energy is large enough to break the atomic structure of the glass. Electrons that were tightly bound receive enough energy to break free, dramatically increasing $$n$$.\n- Step 3: With $$n$$ now significantly larger, $$I = nqvA$$ gives a non-negligible current, and the glass conducts. This is a spectacular demonstration that *any* material can become a conductor if the temperature is high enough to free sufficient charge carriers. Once conducting, the current's own power dissipation ($$P = I^2R$$) can maintain the temperature, keeping the glass conducting even after the external heat source is removed.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "Explain why the resistance of a thermistor does not decrease linearly with temperature, using the R-T graph from Activity 10.4. (3 steps)", "answer": "- **Step 1:** The R-T graph for an NTC thermistor is a decreasing curve that flattens at high $ T $.  \n\n- **Step 2:** Resistance decreases exponentially: $ R = R_0 e^{-kT} $. At low $ T $, small $ \\Delta T $ causes large $ \\Delta R $; at high $ T $, $ \\Delta R $ diminishes.  \n\n- **Step 3:** This nonlinearity arises because $ n \\propto e^{-E_g/(2kT)} $, leading to a nonlinear $ R \\propto 1/n $ relationship.  \n\n**Takeaway:** Exponential dependence of $ n $ on $ T $ causes the R-T curve to be nonlinear.", "source": "Qwen 3 ②", "_id": "qwen_2_9"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "Derive the current equation $$I = nqvA$$ by considering the volume of charge carriers that pass through a cross-section of a conductor in a time $$\\Delta t$$. (5 steps)", "answer": "- Step 1: Imagine a conductor with cross-sectional area $$A$$. Charge carriers drift with mean velocity $$v$$. In a small time interval $$\\Delta t$$, each carrier moves a distance $$v\\Delta t$$.\n- Step 2: The volume of conductor swept by these carriers in this time is the area times the length: $$\\text{Volume} = A \\times v\\Delta t$$.\n- Step 3: If there are $$n$$ free charge carriers per unit volume (number density), the total number of carriers in this swept volume is $$n \\times (A v\\Delta t)$$.\n- Step 4: Each carrier has charge $$q$$. The total charge $$\\Delta Q$$ passing through the cross-section in time $$\\Delta t$$ is therefore $$\\Delta Q = n \\times (A v\\Delta t) \\times q = nqvA\\Delta t$$.\n- Step 5: Current is defined as the rate of flow of charge, $$I = \\Delta Q / \\Delta t$$. Dividing the total charge by $$\\Delta t$$ gives the final equation: $$I = nqvA$$.\n\nThis derivation shows that current depends on *how many* carriers exist ($$n$$), *how much charge* they carry ($$q$$), *how fast* they move ($$v$$), and the *area* available ($$A$$).", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "What is the physical meaning of each variable in the current equation $$I = nqvA$$, and why does current depend on all four factors? (4 steps)", "answer": "- Step 1: $$n$$ is the number density of free charge carriers (carriers per $$\\text{m}^3$$). It represents *how many* charge carriers are available to move in a given volume.\n- Step 2: $$q$$ is the charge per carrier (in Coulombs). It represents *how much charge* each individual carrier transports (for electrons, this is $$1.60 \\times 10^{-19}\\ \\text{C}$$).\n- Step 3: $$v$$ is the mean drift velocity (in $$\\text{m/s}$$). It represents *how fast* the carriers are moving down the conductor on average.\n- Step 4: $$A$$ is the cross-sectional area (in $$\\text{m}^2$$). It represents *how much space* the carriers have to flow through. Current depends on all four because total charge flow per second depends on the number of carriers, the charge each carries, their speed, and the \"width\" of the path.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Copper has a very high number density of free electrons ($$n \\approx 8.4 \\times 10^{28}\\ \\text{m}^{-3}$$). Explain why this means the drift velocity $$v$$ is remarkably slow (less than 1 mm/s) for typical currents. (3 steps)", "answer": "- Step 1: Rearrange the current equation for drift velocity: $$v = \\frac{I}{nqA}$$.\n- Step 2: Notice that $$v$$ is inversely proportional to $$n$$. Because copper has such an enormous number density of free electrons (roughly one per atom), the denominator is huge.\n- Step 3: For a typical current $$I$$ and cross-sectional area $$A$$, the massive $$n$$ means the velocity $$v$$ must be very small to balance the equation. It's like a very wide, crowded river flowing slowly compared to a narrow stream moving fast to deliver the same amount of water.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "In a semiconductor, how does an increase in temperature affect the number density $$n$$ and the drift velocity $$v$$, and which effect dominates the overall change in current? (3 steps)", "answer": "- Step 1: When temperature rises, thermal energy is transferred to the semiconductor lattice. This energy frees more electrons from their covalent bonds, causing the number density $$n$$ to increase sharply (approximately exponentially).\n- Step 2: The increased temperature also causes lattice ions to vibrate more, which increases collisions and slightly *decreases* the drift velocity $$v$$.\n- Step 3: The increase in $$n$$ is massive and exponential, while the decrease in $$v$$ is relatively small. In the equation $$I = nqvA$$, the huge increase in $$n$$ dominates, so the overall current $$I$$ increases significantly.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "How does the absorption of photons change the electrical properties of an LDR semiconductor? (2 steps)", "answer": "- Step 1: When light photons are absorbed by the semiconductor lattice (e.g., cadmium sulfide), their energy is transferred to bound electrons.\n- Step 2: This energy gives the electrons enough energy to break free from the crystal lattice, increasing the number density of free charge carriers $$n$$. From $$I = nqvA$$, a higher $$n$$ at the same voltage means a higher current and therefore a lower resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Contrast the mechanism of resistance change with temperature in a metal (PTC) versus an NTC semiconductor. (3 steps)", "answer": "- Step 1: In a metal, the number density $$n$$ is already very large and essentially fixed (roughly one free electron per atom). Rising temperature increases lattice vibrations, causing more collisions and reducing drift velocity $$v$$. Since $$I = nqvA$$ and $$v$$ drops, current drops, so resistance *increases* (Positive Temperature Coefficient).\n- Step 2: In an NTC semiconductor, the number density $$n$$ is initially very small. Rising temperature frees many more bound electrons, causing $$n$$ to increase exponentially. This huge increase in $$n$$ dominates over the slight decrease in $$v$$.\n- Step 3: Since $$I = nqvA$$ and $$n$$ increases massively, current increases, so resistance *decreases* (Negative Temperature Coefficient). The behaviours are opposite.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "A student says: \"When a thermistor heats up, the lattice ions vibrate more, impeding electron flow, so resistance increases.\" Why is this reasoning flawed for an NTC thermistor? (2 steps)", "answer": "- Step 1: The student is correctly identifying the mechanism that happens in a *metal* (where the number of free carriers is fixed, so increased vibrations dominate and resistance rises).\n- Step 2: In an NTC thermistor, the number of free carriers $$n$$ is not fixed; it increases exponentially with temperature. The massive influx of new charge carriers more than compensates for the increased impedance from lattice vibrations. The net effect is a *decrease* in resistance, not an increase.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "At extremely high temperatures, even materials normally considered insulators (like glass) can become conductors. Explain this using the concept of number density $$n$$. (2 steps)", "answer": "- Step 1: An insulator has a very small number density of free charge carriers because electrons are tightly bound. At low temperatures, $$n$$ is so close to zero that $$I = nqvA$$ yields practically no current.\n- Step 2: At extremely high temperatures, the thermal energy is so intense that it breaks down the atomic structure, freeing many bound electrons. This causes $$n$$ to increase dramatically, allowing the material to conduct electricity (as seen in the glowing glass experiment).", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Describe the shape of the Resistance vs Temperature graph for an NTC thermistor and explain why it has this specific non-linear shape. (3 steps)", "answer": "- Step 1: The graph is a decreasing curve that starts steep at low temperatures and flattens out at higher temperatures. It is not a straight line.\n- Step 2: The steep drop at low temperatures occurs because the number density $$n$$ increases approximately *exponentially* with temperature. A small increase in $$T$$ frees a large proportion of the remaining bound electrons, causing a rapid drop in $$R$$.\n- Step 3: The curve flattens at higher temperatures because most of the available bound electrons have already been freed. Further increases in $$T$$ cannot increase $$n$$ as rapidly, so the rate of resistance decrease slows down.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Sketch the I-V characteristic for a thermistor. Why does the gradient ($$1/R$$) increase as the voltage increases, unlike a fixed resistor? (3 steps)", "answer": "- Step 1: The I-V graph is a curve that passes through the origin and bends *upward* (increasing gradient) as voltage increases, symmetric in both directions.\n- Step 2: As voltage increases, the current increases, which means more power is dissipated as heat ($$P = I^2R$$). This self-heating raises the temperature of the thermistor.\n- Step 3: The higher temperature causes the number density $$n$$ to increase, which lowers the resistance $$R$$. Since the gradient of an I-V graph is $$1/R$$, a lower resistance means a steeper (increasing) gradient. A fixed resistor doesn't heat up enough to change its structure, so its gradient is constant.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Describe the shape of the Resistance vs Illumination graph for an LDR, and state the approximate orders of magnitude for resistance in darkness versus bright light. (2 steps)", "answer": "- Step 1: The graph is a decreasing, hyperbolic curve. As light intensity increases, resistance falls.\n+ In complete darkness, resistance is very high (several $$\\text{M}\\Omega$$, or millions of ohms).\n+ In bright light, resistance falls to a very low value (a few hundred $$\\Omega$$, or tens of ohms).\n- Step 2: This massive range occurs because in the dark, very few electrons are free to conduct, but intense light provides abundant photon energy to free a huge proportion of bound electrons, drastically lowering resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Why does an LDR have such a high resistance in the dark compared to a metal wire at room temperature? (2 steps)", "answer": "- Step 1: An LDR is made from a semiconductor. In the dark, there is no photon energy to free bound electrons, so the number density of free charge carriers $$n$$ is extremely small.\n- Step 2: A metal has a massive, fixed number density of free electrons. Since $$I = nqvA$$, the tiny $$n$$ in a dark LDR means only a tiny current can flow for a given voltage, resulting in a very high resistance compared to the metal.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "In a potential divider, a thermistor is placed as $$R_1$$ (top) and a fixed resistor as $$R_2$$ (bottom). Output $$V_{out}$$ is measured across $$R_2$$. If temperature rises, explain what happens to $$V_{out}$$. (3 steps)", "answer": "- Step 1: When temperature rises, the thermistor's resistance $$R_1$$ decreases (NTC behaviour).\n- Step 2: The total circuit resistance $$R_{total} = R_1 + R_2$$ decreases, so the circuit current $$I = V_{in}/R_{total}$$ increases.\n- Step 3: The output voltage is across the fixed resistor: $$V_{out} = I \\times R_2$$. Since $$I$$ increases and $$R_2$$ is constant, $$V_{out}$$ increases. (Alternatively, using the divider formula: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$, as $$R_1$$ falls, the fraction of voltage across $$R_2$$ grows).", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "You want a circuit where the output voltage *decreases* as temperature rises. How would you rearrange the thermistor and fixed resistor in a potential divider to achieve this? (2 steps)", "answer": "- Step 1: Swap the positions so the fixed resistor is on top ($$R_1$$) and the thermistor is on the bottom ($$R_2$$). Measure $$V_{out}$$ across the thermistor.\n- Step 2: When temperature rises, the thermistor's resistance $$R_2$$ decreases. Since $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$, a smaller $$R_2$$ means a smaller fraction of the total voltage is dropped across it, so $$V_{out}$$ decreases.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "An LDR is placed as $$R_1$$ (top) and a fixed resistor as $$R_2$$ (bottom) in a divider with a constant $$V_{in}$$. As the room gets darker, explain what happens to the power dissipated in the fixed resistor $$R_2$$. (3 steps)", "answer": "- Step 1: As it gets darker, fewer photons hit the LDR, so its number density $$n$$ decreases and its resistance $$R_1$$ increases.\n- Step 2: The total circuit resistance $$R_{total} = R_1 + R_2$$ increases. Since $$V_{in}$$ is fixed, the circuit current $$I = V_{in}/R_{total}$$ decreases.\n- Step 3: Power dissipated in the fixed resistor is $$P = I^2 R_2$$. Since the current $$I$$ has decreased and $$R_2$$ is constant, the power dissipated in $$R_2$$ decreases.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "A student calculates resistance by multiplying voltage and current ($$R = IV$$). Explain why this is physically wrong and state the correct formula. (2 steps)", "answer": "- Step 1: Resistance is defined as the ratio of voltage to current—it measures how much voltage is required to push a unit of current. Multiplying them ($$IV$$) gives power ($$P = IV$$), not resistance.\n- Step 2: The correct formula is $$R = \\frac{V}{I}$$. Writing $$R = IV$$ is a common exam trap that will lose marks. For example, if $$V = 3\\ \\text{V}$$ and $$I = 3\\ \\text{mA}$$, $$R = 1000\\ \\Omega$$, not $$0.009\\ \\Omega$$.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "A thermistor has a resistance of $$1000\\ \\Omega$$ at $$3\\ \\text{V}$$ and $$430\\ \\Omega$$ at $$7\\ \\text{V}$$. If the voltage is doubled from $$3\\ \\text{V}$$ to $$6\\ \\text{V}$$, will the current more than double, exactly double, or less than double? Explain. (3 steps)", "answer": "- Step 1: Calculate the current at $$3\\ \\text{V}$$: $$I_1 = V/R = 3/1000 = 3\\ \\text{mA}$$. If the thermistor were ohmic (fixed $$R$$), doubling the voltage would exactly double the current.\n- Step 2: However, a thermistor is non-ohmic. As voltage increases, it dissipates more power, heats up, and its resistance *decreases*.\n- Step 3: At $$6\\ \\text{V}$$, the resistance will be less than $$1000\\ \\Omega$$ (somewhere between $$1000\\ \\Omega$$ and $$430\\ \\Omega$$). Since $$I = V/R$$ and $$R$$ is dropping, the current will increase *more* than proportionally. Therefore, the current will more than double.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "A potential divider has $$V_{in} = 9\\ \\text{V}$$, a thermistor $$R_1$$ and a fixed resistor $$R_2 = 1\\ \\text{k}\\Omega$$. At room temp, $$R_1 = 2\\ \\text{k}\\Omega$$ and $$V_{out}$$ (across $$R_2$$) is $$3\\ \\text{V}$$. If the temperature rises such that $$R_1$$ halves to $$1\\ \\text{k}\\Omega$$, does $$V_{out}$$ less than double, exactly double, or more than double? (3 steps)", "answer": "- Step 1: Use the potential divider formula: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$. Initially, $$V_{out} = 9 \\times \\frac{1}{2+1} = 3\\ \\text{V}$$.\n- Step 2: When $$R_1$$ halves to $$1\\ \\text{k}\\Omega$$, the new output is $$V_{out} = 9 \\times \\frac{1}{1+1} = 4.5\\ \\text{V}$$.\n- Step 3: The output voltage increased from $$3\\ \\text{V}$$ to $$4.5\\ \\text{V}$$. This is an increase of $$1.5\\ \\text{V}$$, which is half of the initial voltage. Therefore, the output *less than doubles* (it increases by 50%). The divider formula is non-linear with respect to $$R_1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}], "count": 18}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In the equation $$I = nqvA$$, what physical quantity does each symbol represent, and which ones are fixed by the material and geometry of a wire? (3 steps)", "answer": "- Step 1: The symbols represent: $$n$$ = number density of free charge carriers (carriers per cubic metre), $$q$$ = charge on each carrier (e.g. $$1.60 \\times 10^{-19}$$ C for electrons), $$v$$ = mean drift velocity of the carriers (m/s), $$A$$ = cross-sectional area of the conductor (m²).\n- Step 2: The quantities fixed by material and geometry are $$q$$ (determined by the type of charge carrier — electrons in metals) and $$A$$ (set by the physical dimensions of the wire). These do not change when you alter temperature or voltage.\n- Step 3: The quantities that *can* change are $$n$$ (how many carriers are free to move — depends on material type and conditions like temperature or light) and $$v$$ (how fast they drift — depends on the electric field and on how much they collide with the lattice). This distinction is the key to understanding why metals and semiconductors behave differently.\n\nThe equation tells you that current depends on *how many* carriers exist and *how fast* they move — two independent levers.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Derive the current equation $$I = nqvA$$ from first principles by considering the charge that passes through a cross-section of a wire in time $$\\Delta t$$. (4 steps)", "answer": "- Step 1: Imagine a wire of cross-sectional area $$A$$. Free charge carriers drift with mean velocity $$v$$. In a time interval $$\\Delta t$$, each carrier moves a distance $$v \\Delta t$$.\n- Step 2: The volume of wire \"swept\" by these carriers in time $$\\Delta t$$ is a cylinder of length $$v\\Delta t$$ and area $$A$$: Volume $$= A \\cdot v\\Delta t$$.\n- Step 3: This volume contains $$n \\cdot A \\cdot v\\Delta t$$ carriers (since there are $$n$$ carriers per unit volume). Each carries charge $$q$$, so the total charge passing through the cross-section is $$\\Delta Q = n \\cdot q \\cdot v \\cdot A \\cdot \\Delta t$$.\n- Step 4: Current is charge per unit time: $$I = \\frac{\\Delta Q}{\\Delta t} = \\frac{nqvA\\Delta t}{\\Delta t} = nqvA$$.\n\nThis derivation shows the equation is really just \"number of carriers × charge per carrier × how fast they move × how wide the pipe is\" — a flow-rate equation.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "Copper has roughly one free electron per atom, giving $$n \\approx 8.4 \\times 10^{28}$$ m⁻³. A typical semiconductor at room temperature might have $$n$$ many orders of magnitude smaller. What does this immediately tell you about their relative resistances for the same geometry and drift velocity? (2 steps)", "answer": "- Step 1: From $$I = nqvA$$, if everything else ($$q$$, $$v$$, $$A$$) is the same, the current is directly proportional to $$n$$. Copper's enormous $$n$$ means it carries a huge current compared to a semiconductor with the same drift velocity and area.\n- Step 2: Since $$R = V/I$$, a larger current at the same voltage means a smaller resistance. So copper has a much *lower* resistance than a semiconductor of the same dimensions — it is the huge difference in $$n$$ that makes metals such good conductors and semiconductors such poor conductors at low temperature.\n\nThis is why a semiconductor at room temperature is sometimes called a \"poor conductor\" — most of its electrons are locked in bonds and cannot carry charge.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "Why does the number density $$n$$ of free charge carriers barely change in a metal when its temperature rises, but increase sharply in a semiconductor? (3 steps)", "answer": "- Step 1: In a metal like copper, the atoms are already fully ionised in the lattice — each atom has already donated its conduction electron(s). There is essentially one free electron per atom at *any* temperature. Raising the temperature cannot free significantly more electrons because they are already free. So $$n$$ is essentially fixed (and very large, ~$$10^{28}$$ m⁻³).\n- Step 2: In a semiconductor, most electrons are locked into covalent bonds at low temperature. Only a tiny fraction are free, so $$n$$ is very small. When temperature rises, thermal energy is absorbed by bound electrons, giving some of them enough energy to break free from the lattice and become conduction electrons.\n- Step 3: The increase in $$n$$ is approximately *exponential* with temperature — each small temperature rise frees proportionally more carriers. This is the fundamental asymmetry: metals have already \"maxed out\" their free carriers, while semiconductors have a vast reservoir of bound electrons waiting to be liberated.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "When temperature rises in a metal, the drift velocity $$v$$ decreases. When temperature rises in a semiconductor, $$v$$ also decreases slightly — yet the semiconductor's resistance goes *down* while the metal's goes *up*. Explain this paradox using $$I = nqvA$$. (3 steps)", "answer": "- Step 1: In both materials, higher temperature means more vigorous lattice vibrations, so electrons collide more often and their drift velocity $$v$$ decreases. This effect alone would increase resistance in *both* cases (less $$v$$ → less $$I$$ → more $$R$$).\n- Step 2: In a metal, $$n$$ is essentially constant. So the only effect of heating is the reduction in $$v$$, which means $$I$$ decreases and $$R$$ increases. Metal resistance always rises with temperature (PTC behaviour).\n- Step 3: In a semiconductor, the reduction in $$v$$ is overwhelmed by the *enormous* increase in $$n$$. Even though each carrier drifts slightly slower, there are so many *more* carriers that the total current $$I = nqvA$$ increases dramatically. So $$R = V/I$$ *decreases*. The key insight: in a semiconductor, the $$n$$-effect dominates; in a metal, the $$v$$-effect is the only game in town.\n\nThis is the single most tested distinction in exams — the opposite behaviour of metals and NTC semiconductors with temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "What does \"NTC\" stand for, and what does it mean physically? Why is this term applied to most common thermistors? (2 steps)", "answer": "- Step 1: NTC stands for **Negative Temperature Coefficient**. \"Coefficient\" here refers to the temperature coefficient of resistivity — the rate at which resistivity (and hence resistance) changes with temperature. \"Negative\" means that as temperature increases, resistivity/resistance *decreases*.\n- Step 2: Most common thermistors are NTC because they are made from semiconductor ceramics (mixed metal oxides). In these materials, the dominant effect of heating is to free more charge carriers (increase $$n$$), which lowers resistance. The NTC label distinguishes them from metals, which have a *positive* temperature coefficient (PTC) — their resistance *increases* with temperature.\n\nNote: PTC thermistors *do* exist (some are designed to have resistance rise with temperature for specific applications), but the vast majority of thermistors you encounter in A-level physics are NTC.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Describe the step-by-step mechanism by which an NTC thermistor's resistance decreases when temperature rises. Write your answer as a chain of cause and effect suitable for an exam \"explain\" question. (5 steps)", "answer": "- Step 1: Temperature rises → thermal energy is absorbed by the semiconductor lattice.\n- Step 2: Some bound electrons gain enough energy to break free from covalent bonds → the number density of free charge carriers, $$n$$, increases sharply (approximately exponentially).\n- Step 3: Although the increased lattice vibrations also cause more scattering (slightly reducing drift velocity $$v$$), the increase in $$n$$ is far larger and dominates.\n- Step 4: From $$I = nqvA$$, the current $$I$$ increases for the same applied voltage.\n- Step 5: Since $$R = V/I$$ and $$V$$ is constant while $$I$$ has increased, the resistance $$R$$ decreases.\n\nThis chain (stimulus → $$n$$ changes → $$I$$ changes → $$R$$ changes) is the mark-scheme structure examiners want to see.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Describe the mechanism by which an LDR's resistance decreases when illumination increases. How is this similar to, and different from, the thermistor mechanism? (4 steps)", "answer": "- Step 1: Light photons are absorbed by the semiconductor lattice of the LDR (typically cadmium sulfide, CdS). The photon energy is transferred to bound electrons.\n- Step 2: Some electrons gain enough energy from the photons to break free from the crystal lattice → the number density of free charge carriers, $$n$$, increases.\n- Step 3: More light intensity means more photons per second → more electrons freed per second → $$n$$ increases further → current $$I = nqvA$$ increases for the same voltage → resistance $$R = V/I$$ decreases.\n- Step 4: Similarity to thermistor: in both cases, the stimulus frees bound electrons, increasing $$n$$, which dominates over any reduction in $$v$$, so $$R$$ falls. Difference: the energy source is *thermal* (heat) for the thermistor but *electromagnetic* (photon energy) for the LDR. The thermistor responds to temperature; the LDR responds to light intensity.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "An LDR has a resistance of several MΩ in darkness and a few hundred Ω in bright light. What does this enormous range tell you about how much $$n$$ changes with illumination? (2 steps)", "answer": "- Step 1: Since $$R = V/I$$ and $$I = nqvA$$, we can write $$R \\propto 1/n$$ (for fixed $$V$$, $$q$$, $$v$$, $$A$$). If resistance drops from ~$$10^6$$ Ω to ~$$10^2$$ Ω, that is a factor of roughly $$10^4$$ decrease.\n- Step 2: This means $$n$$ has increased by roughly a factor of $$10^4$$ — ten thousand times more free carriers in bright light than in darkness. This dramatic change reflects how few electrons are free in the dark (nearly all locked in bonds) versus how many photons can liberate in bright light.\n\nThe LDR's enormous resistance range is a direct consequence of the semiconductor's sensitivity to photon energy.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "A student says: \"When a thermistor heats up, its resistance falls because the electrons move faster.\" Explain why this statement is wrong, and give the correct explanation. (3 steps)", "answer": "- Step 1: The student is confusing *drift velocity* with *thermal (random) velocity*. When temperature rises, electrons do move faster *randomly* (more thermal kinetic energy), but drift velocity $$v$$ actually *decreases* because of more frequent collisions with the vibrating lattice.\n- Step 2: The correct reason resistance falls is that the number density of free carriers, $$n$$, increases sharply. More electrons are freed from the lattice by thermal energy. From $$I = nqvA$$, the increase in $$n$$ dominates over the decrease in $$v$$, so total current increases.\n- Step 3: Therefore $$R = V/I$$ decreases. The key variable that changes is $$n$$, not $$v$$ — and it changes in the *opposite* direction to what the student assumed. This is a common misconception: faster random motion ≠ faster drift.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Sketch (in words) the shape of the R-vs-temperature graph for an NTC thermistor. Why is it a curve rather than a straight line, and what does the shape tell you about how $$n$$ varies with temperature? (3 steps)", "answer": "- Step 1: The graph is a *decreasing curve* — resistance falls as temperature rises. It is steep at low temperatures and gradually flattens at higher temperatures. It is NOT a straight line.\n- Step 2: The curve is steep initially because a small temperature rise frees a large *fraction* of the remaining bound electrons — $$n$$ increases rapidly, so $$R$$ drops rapidly. At higher temperatures, most of the easily-freed electrons are already conducting, so each additional degree frees a smaller *additional* fraction — $$n$$ still increases but more slowly, so $$R$$ decreases more slowly.\n- Step 3: This reflects the approximately exponential relationship: $$n$$ increases roughly exponentially with temperature, which means $$R$$ decreases roughly exponentially. On a log-linear plot, $$\\ln R$$ vs $$T$$ would be approximately a straight line (with negative gradient). The flattening of the curve at high $$T$$ is the visual signature of this exponential decay of resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Sketch (in words) the R-vs-illumination graph for an LDR. Why does it have a hyperbolic (decreasing, flattening) shape? (2 steps)", "answer": "- Step 1: The graph is a decreasing curve — resistance falls as light intensity increases. In darkness (left side), resistance is very high (several MΩ). In bright light (right side), resistance is low (a few hundred Ω). The curve is steep at low illumination and flattens at high illumination.\n- Step 2: At low illumination, each additional photon frees a significant fraction of the remaining bound electrons, so $$n$$ increases rapidly and $$R$$ drops rapidly. At high illumination, most easily-freed electrons are already conducting, so additional photons have diminishing effect — $$R$$ still decreases but more slowly. The shape mirrors the thermistor's R-T curve: in both cases, the reservoir of bound electrons is being depleted, so the rate of change slows down.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "The I-V characteristic of a thermistor is a curve that bends *upward* (increasing gradient) away from a straight line through the origin. Explain why, using the self-heating effect. (4 steps)", "answer": "- Step 1: At low voltages, the thermistor is at room temperature, and the I-V curve starts roughly linearly (small V, small I, roughly constant R).\n- Step 2: As voltage increases, the power dissipated in the thermistor ($$P = IV$$ or $$P = V^2/R$$) increases. This power heats the thermistor above room temperature.\n- Step 3: The self-heating raises the thermistor's temperature → frees more electrons → increases $$n$$ → decreases $$R$$. With lower resistance, the current for a given voltage is *higher* than it would be at constant resistance.\n- Step 4: On the I-V graph, this means the current grows *faster* than linearly — the curve bends upward (increasing gradient). The gradient at any point is $$\\Delta I / \\Delta V = 1/R$$, and since $$R$$ is falling, the gradient is increasing. This is the signature of a non-ohmic component whose resistance falls with temperature.\n\nNote: The curve is symmetric about the origin — the thermistor works in both directions, and self-heating occurs regardless of current direction.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "A student sees an I-V curve that bends *below* a straight line (decreasing gradient) and one that bends *above* a straight line (increasing gradient). Which belongs to a filament lamp and which to an NTC thermistor? Explain the physical reason for each shape. (3 steps)", "answer": "- Step 1: **Filament lamp** → curve bends *below* (decreasing gradient). As current increases, the filament heats up, lattice vibrations increase, drift velocity decreases, resistance increases. Higher $$R$$ means the gradient $$1/R$$ decreases, so the curve flattens. This is PTC behaviour.\n- Step 2: **NTC thermistor** → curve bends *above* (increasing gradient). As current increases, the thermistor heats up, more carriers are freed, $$n$$ increases, resistance decreases. Lower $$R$$ means the gradient $$1/R$$ increases, so the curve steepens. This is NTC behaviour.\n- Step 3: The opposite curvatures come from opposite resistance-temperature relationships. In a metal/lamp, heating makes conduction harder (more collisions). In a semiconductor, heating makes conduction easier (more carriers). The I-V curve shape is a direct window into whether the component is PTC or NTC.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "In a potential-divider circuit, a thermistor ($$R_1$$) is on top and a fixed resistor ($$R_2$$) is on the bottom, with $$V_{out}$$ measured across $$R_2$$. The supply voltage is $$V_{in}$$. Write the formula for $$V_{out}$$ and explain *from first principles* (without just quoting the formula) why $$V_{out}$$ increases when temperature rises. (4 steps)", "answer": "- Step 1: The formula is $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$. This comes from the fact that $$V_{out} = IR_2$$ and the current through the series circuit is $$I = V_{in}/(R_1 + R_2)$$.\n- Step 2: When temperature rises, the thermistor's resistance $$R_1$$ decreases (NTC behaviour — more free carriers, lower $$R$$).\n- Step 3: With $$R_1$$ smaller, the total resistance $$R_1 + R_2$$ is smaller, so the circuit current $$I = V_{in}/(R_1 + R_2)$$ is larger.\n- Step 4: Since $$V_{out} = IR_2$$ and $$R_2$$ is fixed while $$I$$ has increased, $$V_{out}$$ increases. Alternatively from the formula: the fraction $$R_2/(R_1 + R_2)$$ increases because the denominator decreases while the numerator stays the same — the fixed resistor now claims a larger *share* of the supply voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "In the same potential-divider circuit (thermistor on top as $$R_1$$, fixed resistor on bottom as $$R_2$$), what happens to the voltage *across the thermistor itself* when temperature rises? Explain why this is the opposite of what happens to $$V_{out}$$. (3 steps)", "answer": "- Step 1: The voltage across the thermistor is $$V_{therm} = V_{in} - V_{out}$$ (since the two voltages must add up to $$V_{in}$$ in a series circuit).\n- Step 2: As temperature rises, $$R_1$$ (thermistor) decreases. From the voltage-divider principle, the voltage across each component is proportional to its resistance: $$V_{therm} = V_{in} \\times \\frac{R_1}{R_1 + R_2}$$. Since $$R_1$$ has decreased, the fraction $$R_1/(R_1+R_2)$$ has decreased, so $$V_{therm}$$ decreases.\n- Step 3: This is the opposite of $$V_{out}$$ because the supply voltage is shared between the two components. If the thermistor claims a smaller share (because its resistance fell), the fixed resistor must claim a larger share. What one loses, the other gains. This is a common exam trap — students assume *all* voltages increase, but only $$V_{out}$$ (across $$R_2$$) increases; the voltage across the sensor itself actually *decreases*.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "You want a potential-divider circuit where the output voltage *decreases* when temperature rises. How would you rearrange the components compared to the standard arrangement? (3 steps)", "answer": "- Step 1: In the standard arrangement (thermistor on top as $$R_1$$, fixed resistor on bottom as $$R_2$$), $$V_{out}$$ across $$R_2$$ *increases* when temperature rises (because $$R_1$$ falls, giving $$R_2$$ a larger share).\n- Step 2: To make $$V_{out}$$ *decrease* when temperature rises, swap the positions: put the *fixed resistor* on top as $$R_1$$ and the *thermistor* on the bottom as $$R_2$$. Now $$V_{out}$$ is measured across the thermistor.\n- Step 3: When temperature rises, the thermistor's resistance $$R_2$$ decreases. The voltage across it is $$V_{out} = V_{in} \\times R_2/(R_1 + R_2)$$. Since $$R_2$$ has decreased, the fraction is smaller, and $$V_{out}$$ decreases. This arrangement is useful for circuits where you want the output to fall as temperature rises (e.g., a cooling system that deactivates as temperature drops).\n\nThe key principle: whichever component you measure $$V_{out}$$ across, its voltage increases when *its own* resistance increases relative to the other component.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "An LDR is placed as $$R_1$$ (top) in a potential divider with a fixed resistor $$R_2$$ (bottom). $$V_{out}$$ is across $$R_2$$. As the room gets darker, does $$V_{out}$$ increase or decrease? Explain the chain of reasoning. (4 steps)", "answer": "- Step 1: When it gets darker, fewer photons hit the LDR semiconductor → fewer electrons are freed from the lattice → number density $$n$$ decreases → LDR resistance $$R_1$$ increases.\n- Step 2: Total resistance $$R_1 + R_2$$ increases (since $$R_1$$ increased and $$R_2$$ is fixed).\n- Step 3: Circuit current $$I = V_{in}/(R_1 + R_2)$$ decreases.\n- Step 4: Since $$V_{out} = IR_2$$ and $$R_2$$ is fixed while $$I$$ decreased, $$V_{out}$$ decreases. Alternatively from the formula: the fraction $$R_2/(R_1+R_2)$$ decreases because the denominator increased. The LDR now claims a *larger* share of the supply voltage, leaving less for the fixed resistor.\n\nThis is the principle behind automatic street lights: when it's dark, $$V_{out}$$ across the fixed resistor is low — but if you instead measure across the LDR, that voltage goes *up* in the dark, which can trigger a switch to turn on the light.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "A student writes $$R = IV$$ on their exam paper. Explain why this is physically wrong, and give the correct formula. Use a simple numerical example to show how badly wrong the answer can be. (3 steps)", "answer": "- Step 1: The correct formula is $$R = V/I$$ (resistance = voltage ÷ current). The student has written the product instead of the quotient — they have inverted the relationship.\n- Step 2: Consider $$V = 3$$ V and $$I = 3$$ mA = 0.003 A. The correct resistance is $$R = V/I = 3/0.003 = 1000$$ Ω. The student's formula gives $$R = IV = 0.003 \\times 3 = 0.009$$ Ω — off by a factor of over 100,000.\n- Step 3: The formula $$R = V/I$$ comes directly from Ohm's law: resistance is defined as the ratio of voltage to current. Writing $$R = IV$$ has the wrong units (V·A = W, not Ω) and contradicts the definition. This is one of the most common and easily avoidable exam errors — always check: resistance should be *larger* when voltage is large or current is small, which only makes sense with division.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "A copper wire carries 10 A and has a cross-sectional area of 1.0 mm². Given $$n \\approx 8.4 \\times 10^{28}$$ m⁻³, the drift velocity works out to roughly 0.7 mm/s. Why is this so surprisingly slow, and how does electrical energy transfer actually happen if electrons barely move? (3 steps)", "answer": "- Step 1: The drift velocity is slow because there are *so many* free electrons in copper ($$n \\approx 10^{28}$$). Even though each electron barely crawls, the collective flow of $$10^{28}$$ carriers per cubic metre produces a substantial current. From $$I = nqvA$$, enormous $$n$$ compensates for tiny $$v$$.\n- Step 2: Electrical energy is not transferred by the physical motion of electrons from one end to the other. Instead, the electric field propagates through the wire at close to the speed of light. When you close a switch, the electric field is established throughout the circuit almost instantaneously.\n- Step 3: All electrons along the wire start drifting simultaneously — they push each other like a line of people in a crowded corridor. The signal (the electric field) travels fast; the individual charge carriers travel slow. This is analogous to how sound travels fast through air even though individual air molecules only oscillate tiny distances.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "If you double the cross-sectional area of a wire while keeping the current, material, and drift velocity the same, what happens to the number of free charge carriers passing a given point per second? Explain using $$I = nqvA$$. (2 steps)", "answer": "- Step 1: From $$I = nqvA$$, if $$A$$ doubles while $$n$$, $$q$$, and $$v$$ stay the same, then $$I$$ must double. But the question says current is *kept the same*. So to keep $$I$$ constant with doubled $$A$$, something else must halve — either $$n$$ or $$v$$.\n- Step 2: If we interpret the question as: same material (same $$n$$), same current, but doubled area — then the drift velocity must halve ($$v_{new} = v/2$$). The number of carriers passing per second is $$I/q$$, which is unchanged. But the *density* of flow is different: the same total current is now spread over twice the area, so each electron drifts half as fast. This is why thicker wires of the same material carrying the same current have lower current density and lower drift velocity.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "A student says: \"In a series circuit with a thermistor and a fixed resistor, the thermistor stores some of the electrons, which is why the current is lower on the other side.\" Identify and correct the misconception. (3 steps)", "answer": "- Step 1: The misconception is that components \"store\" or \"use up\" charge. In a series circuit, current is the same at every point — charge is conserved. Electrons flow through the thermistor; they are not stored by it.\n- Step 2: What the thermistor *does* do is resist the flow of charge. It has a certain resistance, and when current flows through it, energy is transferred from the electrons to the lattice (heating). The same number of electrons per second enter and leave the thermistor.\n- Step 3: The correct language: the thermistor *impedes* the flow (it has resistance), not that it *stores* charge. The current is the same throughout the series circuit. The thermistor's resistance determines how much voltage is dropped across it and how much energy is transferred, but it does not reduce the number of electrons passing any point per second.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "In a potential divider with a thermistor ($$R_1 = 440$$ Ω at 20°C) on top and a fixed resistor ($$R_2 = 220$$ Ω) on the bottom, with $$V_{in} = 6$$ V, the output voltage at 20°C is 2.0 V. If the temperature rises to 60°C and the thermistor resistance falls to 110 Ω, what is the new output voltage? Walk through the reasoning without heavy calculation. (3 steps)", "answer": "- Step 1: At 20°C, the thermistor (440 Ω) is twice the fixed resistor (220 Ω), so the supply voltage splits in ratio 2:1. The fixed resistor gets 1/3 of 6 V = 2.0 V. ✓\n- Step 2: At 60°C, the thermistor falls to 110 Ω, which is now *half* the fixed resistor (220 Ω). The voltage splits in ratio 1:2, with the larger share going to the larger resistor.\n- Step 3: The fixed resistor now gets 2/3 of 6 V = 4.0 V. The output has *doubled* from 2.0 V to 4.0 V simply because the thermistor's resistance fell from twice $$R_2$$ to half of $$R_2$$. This dramatic swing is why thermistors are so useful in sensor circuits — small temperature changes produce large voltage changes.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "In the potential-divider circuit from Q23, explain why the *power* dissipated in the fixed resistor $$R_2$$ increases when the thermistor heats up. Use two different reasoning paths. (4 steps)", "answer": "- Step 1: **Path 1 — via current.** When the thermistor heats up, $$R_1$$ decreases, so total resistance $$R_1 + R_2$$ decreases. Since $$V_{in}$$ is fixed, the circuit current $$I = V_{in}/(R_1 + R_2)$$ increases.\n- Step 2: Power in $$R_2$$ is $$P = I^2 R_2$$. Since $$I$$ has increased and $$R_2$$ is constant, $$P$$ increases.\n- Step 3: **Path 2 — via voltage.** When $$R_1$$ decreases, the voltage across $$R_2$$ increases (as shown in Q23: from 2.0 V to 4.0 V). Power in $$R_2$$ is also $$P = V_{out}^2 / R_2$$. Since $$V_{out}$$ has increased and $$R_2$$ is constant, $$P$$ increases.\n- Step 4: Both paths give the same answer because they are physically equivalent ($$P = I^2R = V^2/R$$). The exam may award marks for either approach. The key insight: when the sensor resistance falls, *more* power is dissipated in the fixed resistor, not less.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "A student claims: \"When light intensity on an LDR increases, the LDR changes the current in the circuit.\" An examiner would penalise this as a first statement. What should the student say instead, and why does the order matter? (3 steps)", "answer": "- Step 1: The correct first statement is: \"The LDR's resistance changes.\" The stimulus (light) causes a change in resistance, not directly in current. The chain is: light increases → $$n$$ increases → $$R$$ decreases → then (by Ohm's law) current changes.\n- Step 2: Examiners want to see the *resistance change* stated explicitly because it is the *cause* of the current change. Saying \"the component changes the current\" skips the crucial physics and makes it sound like the component directly controls current, which is misleading.\n- Step 3: The mark-scheme order is: (1) stimulus changes, (2) number density $$n$$ changes, (3) resistance changes, (4) current changes (by Ohm's law). This chain shows understanding of the mechanism. Starting with \"current changes\" is an effect, not a cause — it earns no mechanism marks.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "Why must you wait at least 5 minutes before reversing the power supply connections when measuring the I-V characteristic of a thermistor? (2 steps)", "answer": "- Step 1: When current flows through the thermistor, it self-heats (power dissipated raises its temperature above ambient). This changes its resistance. If you immediately reverse the connections and take readings, the thermistor is still hot from the previous readings, so its resistance is still lower than room-temperature resistance.\n- Step 2: Waiting 5+ minutes allows the thermistor to cool back to room temperature (ambient temperature). This ensures that the negative-voltage readings start from the same initial conditions as the positive-voltage readings, giving a fair and symmetric I-V curve. Without waiting, the curve would be distorted — the negative branch would start at a lower resistance than the positive branch started at.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "A glass rod is normally an excellent insulator. Yet when heated until it glows red hot, it can conduct electricity. Explain this using the concept of number density $$n$$. (3 steps)", "answer": "- Step 1: At room temperature, glass has an extremely small number density of free charge carriers — virtually all electrons are tightly bound in atomic/molecular bonds. This makes $$n$$ ≈ 0, so $$I = nqvA ≈ 0$$, and it behaves as an insulator.\n- Step 2: At very high temperatures (glowing red hot), the thermal energy is large enough to break the atomic structure of the glass. Electrons that were tightly bound receive enough energy to break free, dramatically increasing $$n$$.\n- Step 3: With $$n$$ now significantly larger, $$I = nqvA$$ gives a non-negligible current, and the glass conducts. This is a spectacular demonstration that *any* material can become a conductor if the temperature is high enough to free sufficient charge carriers. Once conducting, the current's own power dissipation ($$P = I^2R$$) can maintain the temperature, keeping the glass conducting even after the external heat source is removed.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "What is the difference between a PTC and an NTC component? Give one example of each, and state which type a *metal wire* is. (2 steps)", "answer": "- Step 1: **PTC** (Positive Temperature Coefficient): resistance *increases* with temperature. **NTC** (Negative Temperature Coefficient): resistance *decreases* with temperature. The \"coefficient\" refers to the sign of the temperature coefficient of resistivity.\n- Step 2: A metal wire (e.g. copper, tungsten filament) is **PTC** — its resistance increases with temperature because $$n$$ is fixed and lattice vibrations impede electron flow. An NTC thermistor is, as the name suggests, **NTC** — its resistance decreases with temperature because the increase in $$n$$ dominates. A carbon resistor is approximately neither — its resistance is roughly constant over a wide temperature range (very small temperature coefficient).", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "On an I-V graph, the gradient of the curve at any point equals $$1/R$$. For a thermistor, the gradient increases as you move to higher voltages. For a filament lamp, the gradient decreases. Explain what each gradient change tells you about how resistance is changing. (3 steps)", "answer": "- Step 1: Gradient = $$\\Delta I / \\Delta V = 1/R$$. If the gradient is increasing, then $$1/R$$ is increasing, which means $$R$$ is *decreasing*. This is the thermistor: higher voltage → more self-heating → more carriers → lower $$R$$ → steeper gradient.\n- Step 2: If the gradient is decreasing, then $$1/R$$ is decreasing, which means $$R$$ is *increasing*. This is the filament lamp: higher voltage → more current → more heating → more lattice vibrations → higher $$R$$ → flatter gradient.\n- Step 3: The I-V graph is a direct visual diagnostic of resistance behaviour. An ohmic component (fixed resistor) has a constant gradient (straight line) because $$R$$ doesn't change. Any curvature tells you $$R$$ is changing — and the *direction* of curvature tells you whether $$R$$ is increasing or decreasing.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": true}, {"question": "In a potential divider, you have a fixed resistor $$R_1 = 3.0$$ kΩ on top and an LDR as $$R_2$$ on the bottom, with $$V_{in} = 9$$ V. In daylight, $$R_{LDR} = 6$$ kΩ. In darkness, $$R_{LDR} = 2$$ MΩ. Qualitatively, how does $$V_{out}$$ (across the LDR) change from daylight to darkness? (3 steps)", "answer": "- Step 1: In daylight, $$R_{LDR} = 6$$ kΩ, which is twice the fixed resistor (3 kΩ). The voltage splits in ratio 3:6 = 1:2, so the LDR gets 2/3 of 9 V ≈ 6 V.\n- Step 2: In darkness, $$R_{LDR} = 2$$ MΩ, which is *thousands of times* larger than the fixed resistor (3 kΩ). The LDR now claims almost *all* of the supply voltage — nearly 9 V.\n- Step 3: So $$V_{out}$$ across the LDR *increases* dramatically from daylight to darkness, from about 6 V to nearly 9 V. This is the principle behind automatic lighting: the large voltage across the LDR in darkness can trigger a switch to turn on a street lamp. When the LDR is on the bottom, its voltage goes *up* in the dark — opposite to the case where the fixed resistor is on the bottom.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A potential-divider circuit has a thermistor and a fixed resistor. The output is connected to a switch that activates a heater when $$V_{out}$$ exceeds a threshold. Should the thermistor be on top or bottom if you want the heater to turn on when it gets *cold*? (3 steps)", "answer": "- Step 1: The heater should activate when it's cold. A thermistor's resistance is *high* when cold (NTC: low T → high R). We need $$V_{out}$$ to exceed the threshold when the thermistor resistance is high.\n- Step 2: If the thermistor is on the *bottom* (as $$R_2$$, with $$V_{out}$$ across it), then $$V_{out} = V_{in} \\times R_2/(R_1 + R_2)$$. When it's cold, $$R_2$$ (thermistor) is high, so the fraction is large, and $$V_{out}$$ is high. ✓\n- Step 3: If the thermistor were on top (as $$R_1$$), then $$V_{out}$$ across the fixed $$R_2$$ would be *low* when the thermistor is cold (high $$R_1$$ means the fixed resistor gets a small share). ✗ So the thermistor must be on the **bottom** for a \"turn on when cold\" application.\n\nThis is the design logic: place the sensor where its *high-resistance* state gives a *high* output voltage, if you want the circuit to activate in that state.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Why is it not advisable to use currents significantly larger than 20 mA when measuring the I-V characteristic of a thermistor? (2 steps)", "answer": "- Step 1: Larger currents cause more power dissipation ($$P = I^2R$$), which produces more self-heating. This raises the thermistor's temperature well above ambient, changing its resistance significantly during the measurement.\n- Step 2: The I-V characteristic you measure would no longer represent the thermistor's behaviour at a fixed temperature — it would be a confused mixture of different temperatures. The results would be inconsistent and hard to interpret. Additionally, excessive current could overheat and permanently damage the semiconductor material. Keeping current moderate ensures the thermistor's temperature change is gradual and the measurements are meaningful.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A student mixes up milliamps and microamps: they write $$3.00$$ mA as $$3.00 \\times 10^{-6}$$ A. What is the correct conversion, and by what factor is the student off? Why does this matter for resistance calculations? (2 steps)", "answer": "- Step 1: 1 mA = $$1 \\times 10^{-3}$$ A, so 3.00 mA = $$3.00 \\times 10^{-3}$$ A. The student wrote $$3.00 \\times 10^{-6}$$ A, which is 1000 times too small (they confused milli with micro).\n- Step 2: In a resistance calculation $$R = V/I$$, using a current that is 1000× too small would give a resistance that is 1000× too *large*. For example, with $$V = 3$$ V: correct $$R = 3/0.003 = 1000$$ Ω, but the student gets $$R = 3/0.000003 = 10^6$$ Ω. This is a catastrophic error that turns a kΩ answer into a MΩ answer. Always check: milli = $$10^{-3}$$, micro = $$10^{-6}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "The I-V characteristic of a thermistor is described as \"symmetric.\" What does this mean, and why is the thermistor symmetric while a diode is not? (2 steps)", "answer": "- Step 1: \"Symmetric\" means the I-V curve looks the same in the first and third quadrants — when you reverse the voltage, the current reverses with the same magnitude at the same |V|. The thermistor conducts equally well in both directions.\n- Step 2: A diode is *asymmetric* because it has a p-n junction that allows current easily in one direction (forward bias) but blocks it in the other (reverse bias). A thermistor has no p-n junction — it is simply a homogeneous piece of semiconductor ceramic. Whether electrons drift left or right, the same number of free carriers exist and the same scattering occurs. So the thermistor's resistance is the same regardless of current direction, giving a symmetric I-V curve.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "If you wanted to check whether a component is a thermistor or a fixed resistor using only an I-V graph, what feature would you look for? (2 steps)", "answer": "- Step 1: A fixed (ohmic) resistor produces a *straight line* through the origin on an I-V graph — constant gradient means constant resistance. The gradient is $$1/R$$, and it doesn't change.\n- Step 2: A thermistor produces a *curved* line that bends upward (increasing gradient) as |V| increases. The increasing gradient means resistance is decreasing — the self-heating effect is at work. So: straight line = fixed resistor; upward-curving line = NTC thermistor (or any component whose resistance decreases with self-heating).", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "Doping a semiconductor with impurity atoms can change its electrical properties dramatically. How does this relate to the number density $$n$$, and why is this useful? (2 steps)", "answer": "- Step 1: Doping introduces impurity atoms (e.g. arsenic or boron in silicon) that have either extra valence electrons or fewer valence electrons than the host atoms. These extra (or missing) electrons increase the number density of free charge carriers, $$n$$, even at low temperatures.\n- Step 2: By carefully controlling the type and quantity of impurity, engineers can precisely tune $$n$$ — and hence the conductivity — of the semiconductor. This is the basis of all modern electronics: transistors, computer chips, and integrated circuits rely on doped semiconductors with precisely controlled carrier densities. Without doping, silicon would be too insulating at room temperature to be useful in most electronic applications.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "A student says: \"At high temperatures, a semiconductor and a metal will have the same resistance because they both have lots of free electrons.\" Evaluate this claim. (3 steps)", "answer": "- Step 1: It is true that at high temperatures, a semiconductor has many more free electrons than at low temperatures — $$n$$ increases significantly. However, a metal still has $$n \\approx 10^{28}$$ m⁻³, which is *far* larger than even a hot semiconductor.\n- Step 2: Even at very high temperatures, a semiconductor's $$n$$ is typically many orders of magnitude smaller than a metal's. The semiconductor's resistance may have decreased dramatically from its cold value, but it is still much higher than a metal's resistance at the same temperature.\n- Step 3: Additionally, the metal's resistance has *increased* with temperature (more lattice vibrations), while the semiconductor's has decreased. But the metal started so much lower that it remains the better conductor. The claim is wrong: they will not have the same resistance, and the metal will always have far lower resistance at any practical temperature.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "A potential divider has $$V_{in} = 12$$ V, with a fixed resistor $$R_1 = 8.0$$ kΩ on top and an LDR as $$R_2$$ on the bottom. In daylight, $$R_{LDR} = 670$$ Ω. Qualitatively, what fraction of the supply voltage appears across the LDR, and what does this tell you about the LDR's effectiveness as a sensor in this configuration? (3 steps)", "answer": "- Step 1: The LDR's resistance (670 Ω) is much smaller than the fixed resistor (8000 Ω). The ratio is roughly 1:12. So the LDR claims only about 1/13 of the supply voltage — roughly 0.9 V out of 12 V.\n- Step 2: This means most of the supply voltage is dropped across the fixed resistor, and the output across the LDR is very small. In this configuration, the LDR's resistance change (from ~670 Ω in daylight to ~MΩ in darkness) will cause a *large* swing in $$V_{out}$$ across the LDR — from ~0.9 V to nearly 12 V.\n- Step 3: This is actually a very effective sensor configuration *if* you measure $$V_{out}$$ across the LDR. The enormous resistance ratio means the output swings dramatically between light and dark. The key design principle: make the fixed resistor comparable to the sensor's *mid-range* resistance for maximum sensitivity, but even with a mismatch, the large dynamic range of the LDR ensures a big voltage swing.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "Explain, using the mechanism chain, why the power dissipated in a fixed resistor *decreases* when an LDR in series with it is darkened. (4 steps)", "answer": "- Step 1: When the LDR is darkened, fewer photons free electrons → number density $$n$$ in the LDR decreases → LDR resistance increases.\n- Step 2: Total circuit resistance $$R_{total} = R_{fixed} + R_{LDR}$$ increases (since $$R_{LDR}$$ increased).\n- Step 3: Circuit current $$I = V_{in}/R_{total}$$ decreases (since $$V_{in}$$ is fixed and $$R_{total}$$ increased).\n- Step 4: Power in the fixed resistor is $$P = I^2 R_{fixed}$$. Since $$I$$ decreased and $$R_{fixed}$$ is constant, $$P$$ decreases. Alternatively: with less current, the voltage across the fixed resistor ($$V = IR_{fixed}$$) also decreases, and $$P = V^2/R_{fixed}$$ decreases. Both approaches give the same conclusion.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "A student measures the resistance of a thermistor at two operating points: at low voltage it is 1000 Ω, and at high voltage it is 431 Ω. Explain why the resistance is different at the two points, and why you cannot describe the thermistor as having \"a resistance of 1000 Ω\" as a fixed property. (3 steps)", "answer": "- Step 1: The thermistor's resistance depends on its temperature. At the low-voltage point, the thermistor is near room temperature (little self-heating), so its resistance is high (1000 Ω). At the high-voltage point, more power is dissipated, the thermistor self-heats, and its temperature rises above ambient.\n- Step 2: The higher temperature frees more charge carriers (increases $$n$$), which decreases resistance to 431 Ω. The thermistor's resistance is not a fixed property — it depends on the operating conditions (temperature, which depends on voltage and current).\n- Step 3: This is why we say a thermistor is *non-ohmic*: its resistance is not constant. You can only state the resistance at a specific operating point (specific temperature or specific voltage/current). Saying \"the resistance is 1000 Ω\" without specifying conditions is incomplete — a fixed resistor would always show the same $$R$$ regardless of operating point, but a thermistor will not.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "When using the formula $$v = I/(nqA)$$, a student gets a drift velocity of about 0.7 mm/s for electrons in a copper wire carrying 10 A. If the wire is replaced with a semiconductor wire of the same dimensions carrying the same current, would the drift velocity be higher or lower? Why? (2 steps)", "answer": "- Step 1: From $$v = I/(nqA)$$, for the same $$I$$, $$q$$, and $$A$$, the drift velocity is inversely proportional to $$n$$. A semiconductor has a much *smaller* $$n$$ than copper (fewer free carriers per unit volume).\n- Step 2: Therefore, the drift velocity in the semiconductor would be much *higher* than in copper. Each carrier must move faster to carry the same current because there are fewer of them. This is a counterintuitive result: the \"worse\" conductor (semiconductor) has faster-moving individual carriers, but the paucity of carriers means the total current is still limited.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "Complete the following comparison table conceptually: for a metal and an NTC thermistor, what happens to (a) $$n$$, (b) $$v$$, (c) $$R$$ when temperature increases? (3 steps)", "answer": "- Step 1: **Metal:** (a) $$n$$ stays essentially constant (already fully ionised), (b) $$v$$ decreases (more lattice vibrations → more collisions), (c) $$R$$ increases (since $$I = nqvA$$ decreases with constant $$n$$ and reduced $$v$$).\n- Step 2: **NTC thermistor:** (a) $$n$$ increases sharply (thermal energy frees bound electrons), (b) $$v$$ decreases slightly (same lattice vibration effect as metal, but much less significant), (c) $$R$$ decreases (because the huge increase in $$n$$ dominates over the small decrease in $$v$$, so $$I = nqvA$$ increases).\n- Step 3: The critical comparison: in both cases, $$v$$ decreases with temperature. The *difference* is what happens to $$n$$ — fixed in metals, sharply increasing in semiconductors. This is why the resistance moves in opposite directions: the $$v$$-effect dominates in metals, the $$n$$-effect dominates in semiconductors.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "A potential-divider circuit is used as a temperature sensor. The fixed resistor $$R_2$$ is chosen to be approximately half the thermistor's resistance at room temperature. Why is this a good design choice rather than making $$R_2$$ much larger or much smaller? (3 steps)", "answer": "- Step 1: If $$R_2$$ is much larger than the thermistor, almost all the supply voltage always appears across $$R_2$$ regardless of the thermistor's resistance. The output voltage barely changes with temperature — poor sensitivity.\n- Step 2: If $$R_2$$ is much smaller than the thermistor, almost all the supply voltage appears across the thermistor, and $$V_{out}$$ across $$R_2$$ is always tiny. Again, the output barely changes with temperature — poor sensitivity.\n- Step 3: Choosing $$R_2 \\approx R_{thermistor}/2$$ (or comparable to it) puts the operating point in the middle of the divider range, where changes in the thermistor's resistance cause the *largest* changes in $$V_{out}$$. Maximum sensitivity occurs when the two resistances are of the same order of magnitude — this is a general principle of potential-divider sensor design.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "A student claims that an LDR's I-V characteristic should look like a straight line because \"light intensity is kept constant during the measurement.\" Is this correct? Explain. (3 steps)", "answer": "- Step 1: If light intensity is truly kept constant and the LDR does not self-heat significantly, then the LDR's resistance is approximately constant during the measurement. In that case, the I-V curve would indeed be roughly a straight line (ohmic behaviour at fixed temperature and illumination).\n- Step 2: However, at higher voltages and currents, the LDR *will* self-heat (just like a thermistor). This self-heating raises the LDR's temperature, which decreases its resistance (NTC behaviour of the semiconductor). So the gradient increases at higher voltages.\n- Step 3: The student is partially correct — at low currents with cons
