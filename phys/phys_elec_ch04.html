 85 mA. Estimate the power dissipated. (2 steps)", "answer": "- Step 1: Convert current to amperes: 85 mA = 85 × 10⁻³ A = 8.5 × 10⁻² A.\n- Step 2: Use P = I²R: $$P = (8.5 \\times 10^{-2})^2 \\times 47 = (7.225 \\times 10^{-3}) \\times 47 \\approx 0.34 \\, \\text{W}$$.\n\nThis is a small power — much less than 1 watt. The resistor would feel slightly warm but not hot.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Explain, in terms of the microscopic behavior of electrons, why the resistance of a metal increases when its temperature rises. (3 steps)", "answer": "- Step 1: In a metal, conduction electrons drift through a lattice of positive ions. The ions vibrate about fixed positions.\n- Step 2: As temperature increases, the amplitude of lattice vibration increases.\n- Step 3: This causes more frequent collisions between drifting electrons and vibrating ions. More collisions reduce the electron drift velocity v in I = nAvq. Since V is fixed, lower v means lower current I, so R = V/I increases.\n\nThink of running through students jumping around vigorously versus standing still — you collide more and slow down more at higher \"temperature.\"", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "State the behavior of a material with a Positive Temperature Coefficient (PTC). Give an example of such a material. (1 step)", "answer": "- Step 1: A PTC material shows increasing resistance with increasing temperature — resistance rises because lattice vibrations increase. Metals like copper, tungsten, and nichrome are PTC materials.\n\nThis is why filament lamp resistance is much higher when operating (hot) than at room temperature — roughly 10× higher at normal operating temperature.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Explain why an NTC (Negative Temperature Coefficient) thermistor's resistance decreases when temperature increases, unlike metals. (3 steps)", "answer": "- Step 1: An NTC thermistor is a semiconductor, not a metal.\n- Step 2: In a semiconductor, the number density n of free charge carriers (electrons) is not fixed — it increases dramatically with temperature as more electrons gain enough thermal energy to break free from their bonds.\n- Step 3: In I = nAvq, more carriers n means larger current for the same voltage, so R = V/I decreases. This dominates over any increase in lattice vibration.\n\nThe key difference: metals have fixed n (number of free electrons doesn't change with T), while semiconductors have variable n.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Sketch a graph showing how resistance varies with temperature for: (i) a metal (PTC), (ii) an NTC thermistor, and (iii) a superconductor. Label the key features. (2 steps)", "answer": "- Step 1: (i) Metal: resistance rises approximately linearly with temperature — more lattice vibration increases collisions. (ii) NTC thermistor: resistance falls steeply (non-linearly) with temperature — more charge carriers released. (iii) Superconductor: above critical temperature Tc, behaves like a normal metal; at Tc, resistance drops abruptly to zero and remains zero below Tc.\n- Step 2: Key features: For superconductor, label Tc (the critical temperature where ρ suddenly becomes zero). For metal, show approximate linear increase. For thermistor, show steep downward curve.\n\nThe superconductor is the only case where resistance becomes exactly zero — not just very low, but zero.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Define a superconductor in the precise wording required by exam boards. What is the critical temperature Tc? (2 steps)", "answer": "- Step 1: A superconductor is a material that, when cooled below its critical (transition) temperature Tc, loses all electrical resistance — its resistivity drops abruptly to exactly zero.\n- Step 2: The critical temperature Tc is the temperature below which the material exhibits zero resistivity. Above Tc, it behaves as a normal conductor with finite resistivity.\n\nTypical values: Mercury (Tc = 4.2 K), Niobium (Tc = 9.3 K), YBCO ceramic (Tc = 92 K, called \"high-Tc\" superconductor).", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Give TWO applications of superconductors and explain why zero resistance is beneficial in each case. (2 steps)", "answer": "- Step 1: (1) MRI scanners and strong electromagnets: Superconducting coils carry very large currents to produce extremely strong magnetic fields without any heating — impossible with normal copper wires which would overheat. (2) Power transmission cables: Zero resistance means zero power loss (P = I²R = 0), so electricity can be transmitted over long distances without energy wasted as heat.\n- Step 2: Other valid answers: Maglev trains (powerful magnetic levitation without friction), particle accelerators like LHC (precise strong magnetic fields for steering charged particles).\n\nThe key benefit is: no energy loss as heat, enabling huge currents and persistent currents that flow indefinitely.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": true}, {"question": "An electric kettle is rated at 240 V and 3.0 kW. Calculate the current it draws and explain why a 13 A fuse is suitable. (3 steps)", "answer": "- Step 1: Convert power to watts: 3.0 kW = 3.0 × 10³ W.\n- Step 2: Use P = VI, rearranged to I = P/V: $$I = \\frac{3.0 \\times 10^3}{240} = 12.5 \\, \\text{A}$$.\n- Step 3: Since 12.5 A < 13 A, the kettle operates safely without blowing the fuse. If current exceeded 13 A, the fuse would melt and break the circuit for safety.\n\nThis is why fuse rating should be slightly above normal operating current — to allow normal operation but protect against faults.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "In the CP7 required practical to measure resistivity, state: (i) the independent variable, (ii) the dependent variable, and (iii) two precautions to ensure accurate results. (2 steps)", "answer": "- Step 1: (i) Independent variable: length L of the wire. (ii) Dependent variable: resistance R (measured as V/I). (iii) Precautions: (1) Keep current low (< 0.5 A) to minimize Joule heating which changes resistivity; (2) Measure wire diameter at several positions and average (wire may not be perfectly uniform).\n- Step 2: Other precautions: Ensure good electrical contacts at crocodile clips (minimize contact resistance); use a voltmeter-ammeter method because resistance is small (< 1 Ω).\n\nPlot R vs L — gradient = ρ/A, so ρ = gradient × A.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A non-ohmic component has a current of 40 mA when the potential difference is 0.70 V. Calculate its resistance at this point. Why can't you use this resistance value to predict the behavior at other voltages? (2 steps)", "answer": "- Step 1: Convert current: 40 mA = 40 × 10⁻³ A. Use R = V/I: $$R = \\frac{0.70}{40 \\times 10^{-3}} = \\frac{0.70}{0.040} = 17.5 \\, \\Omega$$.\n- Step 2: This resistance only applies at this specific operating point (V = 0.70 V). Since the component is non-ohmic, its resistance changes with voltage/current. At a different voltage, the number of charge carriers or temperature will be different, so R will be different. You must read V and I at each point separately.\n\nThis is why the graphical method is needed for non-ohmic components — you cannot assume R is constant.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Explain the graphical method to find the voltage at which a non-ohmic component has a resistance of 50 Ω. (3 steps)", "answer": "- Step 1: A straight line through the origin with gradient 1/R = 1/50 represents a constant resistance of 50 Ω.\n- Step 2: Draw this 50 Ω line on the same axes as the component's I–V curve. Pick a point on the line (e.g., V = 0.60 V) and calculate corresponding I = V/R = 0.60/50 = 0.012 A. Draw the line through origin and this point.\n- Step 3: The intersection of this straight line with the component's curved I–V graph gives the operating point. At this intersection, both conditions are satisfied: the component's actual I–V relationship AND R = 50 Ω. Read the voltage at this intersection — this is the answer.\n\nThis method works because it finds the unique (V, I) pair that satisfies both the component's behavior and the specified resistance.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A thermistor is connected in series with a fixed 100 Ω resistor and a battery. When the thermistor is cooled, describe what happens to: (a) the thermistor's resistance, (b) the total circuit resistance, (c) the current in the circuit. (3 steps)", "answer": "- Step 1: (a) Cooling the NTC thermistor decreases the number of free charge carriers, so its resistance increases.\n- Step 2: (b) Since thermistor resistance increases and it's in series with the 100 Ω resistor, total circuit resistance = 100 Ω + R_thermistor increases.\n- Step 3: (c) With higher total resistance and the same battery voltage, current I = V/total R decreases (Ohm's Law).\n\nThis is the principle behind temperature sensors — a cooled thermistor reduces current, which can trigger alarms or control systems.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Why do filament lamps show a momentary \"surge\" of current when first switched on? (2 steps)", "answer": "- Step 1: When switched on, the filament is at room temperature, so its resistance is low (perhaps 10× lower than operating resistance).\n- Step 2: At low R, current I = V/R is very high — this is the surge. As the filament quickly heats up, resistance increases, and current decreases to its normal operating value.\n\nThis is why older incandescent bulbs often failed when switched on — the surge current stressed the cold filament.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "What is the difference between \"micro\" (μ) and \"milli\" (m) in scientific notation? If a current is 40 mA, what is this in amperes? (1 step)", "answer": "- Step 1: milli (m) = 10⁻³, micro (μ) = 10⁻⁶. So 40 mA = 40 × 10⁻³ A = 0.040 A — NOT 40 × 10⁻⁶ A.\n\nA common error is confusing m and μ, leading to factor of 1000 mistake in calculations.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "For a metallic conductor, the relationship R(θ) = R₀(1 + αθ) describes how resistance varies with temperature (in °C). What does α represent, and what is its typical value for copper? (1 step)", "answer": "- Step 1: α is the temperature coefficient of resistance. For copper, α ≈ 4 × 10⁻³ K⁻¹ (or per °C, since the size of a degree is the same in Kelvin and Celsius for small changes).\n\nA positive α means resistance increases with temperature — this is the PTC behavior of metals.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A copper wire and a constantan wire of the same dimensions are compared. Which one has higher resistivity? How do you know? (1 step)", "answer": "- Step 1: Constantan has much higher resistivity than copper — typically ρ ≈ 49 × 10⁻⁸ Ω·m for constantan versus ~1.7 × 10⁻⁸ Ω·m for copper. This is why constantan is used for making standard resistors — its resistance changes very little with temperature (low α), while copper would vary significantly.\n\nThe key is that resistivity is an intrinsic material property — different materials have different resistivities regardless of shape.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In the drift velocity equation I = nAvq, identify what each symbol represents and explain why for a metal, n and A are treated as constants when temperature changes. (2 steps)", "answer": "- Step 1: I = current (A), n = number density of charge carriers (m⁻³), A = cross-sectional area (m²), v = drift velocity (m/s), q = charge on carrier (C, e = 1.6 × 10⁻¹⁹ C for electrons).\n- Step 2: For a metal, n is constant because the number of free conduction electrons per unit volume doesn't change with temperature — all atoms provide electrons. A is constant because the wire dimensions don't change significantly. Only v changes with temperature (decreases as collisions increase), which explains why resistance changes.\n\nIn semiconductors, n is NOT constant — it increases with temperature, which is why they behave differently.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "State two key differences between how resistance behaves in a metal versus a semiconductor as temperature increases. (1 step)", "answer": "- Step 1: (1) Metal: resistance increases with temperature (PTC). (2) Semiconductor/NTC thermistor: resistance decreases with temperature (NTC). The mechanisms are opposite: metals have more lattice collisions, while semiconductors have more free charge carriers.\n\nThis opposite behavior is why thermistors are useful temperature sensors — they respond in the opposite way to wires.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Why is it incorrect to say \"a resistor stores electrons\"? Clarify what resistance actually does to the electrons flowing through a component. (2 steps)", "answer": "- Step 1: Resistance does not store electrons — electrons flow through the component and out the other side. The current is the same on both sides of a resistor in series.\n- Step 2: What resistance actually does is slow down the electrons (reduce drift velocity) through collisions with the lattice. Electrons lose kinetic energy in these collisions, which is converted to heat. The \"opposition\" is to the rate of flow, not to the accumulation of charge.\n\nThis is a common misconception — the key effect is reducing speed, not storing charge.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}], "count": 26}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "How is the resistance of a component formally defined in terms of the quantities you can measure in a circuit, and what is the SI unit?", "answer": "Resistance is defined as the ratio of the potential difference $$V$$ across a component to the current $$I$$ through it: $$R = V/I$$. The unit is the ohm, where $$1\\ \\Omega = 1\\ \\text{V/A}$$ — one ohm is the resistance that allows one ampere to flow when one volt is applied. Critically, you *divide*, never multiply — a very common slip is writing $$R = IV$$, which is dimensionally power, not resistance. Also, $$R$$ is not a fixed material constant; it depends on the component's geometry and temperature.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Why is resistance physically present in a metal wire even at room temperature — what is happening at the microscopic level? (3 steps)", "answer": "- Step 1: A metal consists of a regular lattice of positive ions, with conduction (free) electrons drifting through it under an applied electric field.\n- Step 2: As electrons drift, they continually collide with the vibrating lattice ions. Each collision transfers kinetic energy from the electron to the ion, which appears as heat (Joule heating).\n- Step 3: These collisions limit the average drift velocity $$v$$ in $$I = nAvq$$. A slower drift velocity means a smaller current for the same applied voltage — and by $$R = V/I$$, that smaller $$I$$ is exactly what we *call* \"resistance\".\n\nTakeaway: resistance is not a \"barrier\" or \"store\" — it is the cumulative slowing effect of electron-lattice collisions.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "State Ohm's law precisely, including the condition that must hold, and explain why the condition matters. (3 steps)", "answer": "- Step 1: Ohm's law: the current through a conductor is directly proportional to the potential difference across it, *provided the temperature is constant*. Symbolically, $$I \\propto V$$ at constant $$T$$.\n- Step 2: The temperature condition matters because if current heats the conductor, lattice vibrations increase, $$R$$ changes, and the proportionality breaks down — you'd no longer get a straight line.\n- Step 3: A mark-scheme answer must include *both* \"directly proportional\" *and* \"at constant temperature\". Stating only the first half loses the mark.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "On an $$I$$ (y-axis) versus $$V$$ (x-axis) graph, how do you read off resistance for an ohmic versus a non-ohmic component, and why is the method different? (3 steps)", "answer": "- Step 1: For an ohmic conductor, the graph is a straight line through the origin. The gradient $$\\Delta I/\\Delta V = 1/R$$, so $$R = 1/\\text{gradient}$$. Because $$R$$ is constant, any point on the line gives the same answer.\n- Step 2: For a non-ohmic component (e.g. filament lamp, diode), the graph is curved. The gradient changes from point to point because $$R$$ itself is changing. So you cannot use a single gradient value.\n- Step 3: Instead, pick the specific operating point of interest, read off $$V$$ and $$I$$ at that point, and compute $$R = V/I$$ directly. The instantaneous resistance is a *secant* from the origin, not a tangent.\n\nCommon trap: students try $$1/\\text{gradient}$$ on a curve — wrong, because the slope of the curve is $$dI/dV$$, not $$I/V$$.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "A filament lamp's $$I$$-$$V$$ graph curves so that the gradient decreases as $$V$$ increases. What does this tell you about how the lamp's resistance changes with voltage, and why does it happen physically? (3 steps)", "answer": "- Step 1: Gradient = $$I/V = 1/R$$. A *decreasing* gradient means $$1/R$$ is shrinking, so $$R$$ is *increasing* as $$V$$ (and hence current) increases.\n- Step 2: A bigger current means more electrons flowing per second, which means more collisions per second with lattice ions, which heats the filament.\n- Step 3: The hotter filament has lattice ions vibrating with larger amplitude, so collisions become more frequent — drift velocity drops further — $$R$$ rises. This is positive feedback up to thermal equilibrium, and it's exactly why the lamp is non-ohmic.\n\nSubtle point: the *curve* on the graph is the visual signature of $$R$$ depending on $$T$$, which depends on $$I$$, which depends on $$V$$.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "When measuring the resistance of a component in the lab, why must the supply voltage be kept low (typically 1–2 V), and what is the role of the ammeter and voltmeter? (3 steps)", "answer": "- Step 1: Place the ammeter in series (it reads the current through the component) and the voltmeter in parallel (it reads the p.d. across the component). Then $$R = V/I$$.\n- Step 2: An ideal ammeter has zero resistance (so it doesn't reduce the current it's measuring); an ideal voltmeter has infinite resistance (so it draws no current from the component).\n- Step 3: The supply voltage must be low because a large current would heat the component. If $$T$$ rises, $$R$$ changes during the measurement, invalidating any test of Ohm's law and giving misleading values. Low $$V$$ keeps $$I^2 R$$ heating negligible.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Conceptually, what is the difference between *resistance* and *resistivity*, and why do we need both quantities? (3 steps)", "answer": "- Step 1: Resistance $$R$$ describes a specific *object* — a particular wire, of particular length and thickness, at a particular temperature. It depends on geometry.\n- Step 2: Resistivity $$\\rho$$ describes the *material itself*, independent of shape. Copper has the same $$\\rho$$ whether shaped into a thin long wire or a thick short rod (at the same temperature).\n- Step 3: We need both because engineers care about $$R$$ (what current flows in this exact component) while material scientists care about $$\\rho$$ (is this material a good conductor at all?). The formula $$R = \\rho L/A$$ bridges the two.\n\nQuick check: units of $$\\rho$$ are $$\\Omega \\cdot \\text{m}$$, *not* $$\\Omega/\\text{m}$$ — a frequent error.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Starting from the geometric formula for the resistance of a uniform wire, derive an expression for resistivity $$\\rho$$ and explain physically why $$R$$ grows with length and shrinks with cross-sectional area. (4 steps)", "answer": "- Step 1: For a uniform wire, $$R = \\rho L / A$$. Rearranging: $$\\rho = RA/L$$, with units $$\\Omega \\cdot \\text{m}^2 / \\text{m} = \\Omega \\cdot \\text{m}$$.\n- Step 2: Why $$R \\propto L$$: a longer wire means electrons must traverse more lattice, encountering more collisions. Two wires in series add resistances — doubling length is like putting two identical wires in series.\n- Step 3: Why $$R \\propto 1/A$$: a thicker wire provides more parallel \"channels\" for electrons to flow. Two wires in parallel halve the resistance — doubling $$A$$ is like having two identical wires in parallel.\n- Step 4: $$\\rho$$ encodes everything else — how easily electrons drift through this *material*, which depends on the number density $$n$$ of charge carriers and how strongly they're scattered (temperature, impurities).", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "A copper wire is replaced by another copper wire of the same length but with the diameter doubled. Qualitatively, what happens to the resistance and why? (3 steps)", "answer": "- Step 1: Resistivity $$\\rho$$ is unchanged (same material, same temperature). Length unchanged.\n- Step 2: Cross-sectional area $$A = \\pi (d/2)^2$$ scales as $$d^2$$. Doubling the diameter quadruples $$A$$.\n- Step 3: Since $$R = \\rho L /A$$ and $$A$$ has gone up by a factor of 4, $$R$$ drops to one-quarter of its original value. The wire conducts much better because there are effectively four times the parallel paths.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Why is \"wood has high resistivity\" a more meaningful statement than \"wood has high resistance\"? (2 steps)", "answer": "- Step 1: \"Wood has high resistance\" is ambiguous — resistance depends on the specific piece (a thin strip of wood vs a thick block have different $$R$$). It's a statement about an *object*, not the substance.\n- Step 2: \"Wood has high resistivity\" is a statement about the material itself: regardless of shape, wood resists electron flow strongly. This is the property you'd look up in a table and use to classify wood as an insulator.\n\nBottom line: resistivity is the *fingerprint* of a material; resistance is the *symptom* of a particular component.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Why is electrical power dissipated in a resistor, and where does the energy go? (3 steps)", "answer": "- Step 1: When a charge $$Q$$ moves through a p.d. $$V$$, it loses electrical potential energy $$QV$$. The rate of energy delivery is $$P = QV/t = IV$$.\n- Step 2: Inside the resistor, that energy doesn't increase the electrons' kinetic energy on average (steady state — drift velocity is constant). Instead, each collision with the lattice transfers kinetic energy to lattice vibrations.\n- Step 3: Increased lattice vibration = increased temperature = heat. So electrical energy converts to thermal energy (and in some cases, light — e.g. a filament glowing). Power dissipation is fundamentally a Joule heating process.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Starting from $$P = IV$$, derive the two alternative forms $$P = I^2 R$$ and $$P = V^2/R$$, and explain when you'd choose each form. (3 steps)", "answer": "- Step 1: From Ohm's law, $$V = IR$$. Substituting into $$P = IV$$: $$P = I(IR) = I^2 R$$. This form is convenient when you know the current through the resistor and its resistance.\n- Step 2: Alternatively, $$I = V/R$$. Substituting: $$P = (V/R) \\cdot V = V^2/R$$. This is convenient when you know the voltage across the resistor and its resistance.\n- Step 3: Choosing: in a series circuit, the current is shared, so $$I^2 R$$ is often easier (current is the common variable). In a parallel circuit, voltage is shared, so $$V^2/R$$ is often easier (voltage is the common variable).", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "A 100 Ω resistor and a 200 Ω resistor are placed in series across a battery. Which one dissipates more power, and why? (3 steps)", "answer": "- Step 1: In series, the current $$I$$ is the *same* through both. Use $$P = I^2 R$$.\n- Step 2: Since $$I$$ is common, $$P \\propto R$$. The 200 Ω resistor dissipates twice the power of the 100 Ω resistor.\n- Step 3: Intuition: in series, the bigger resistor has the bigger voltage drop across it (it \"hogs\" more of the e.m.f.). Bigger $$V$$ across same $$I$$ means more energy delivered per second.\n\nCommon confusion: students sometimes use $$P = V^2/R$$ and conclude \"small $$R$$ dissipates more\" — that's only true at constant voltage (parallel), not constant current (series).", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Same two resistors (100 Ω and 200 Ω), now connected in *parallel* across a battery. Which dissipates more power? (3 steps)", "answer": "- Step 1: In parallel, the voltage $$V$$ across each is the *same*. Use $$P = V^2/R$$.\n- Step 2: With $$V$$ common, $$P \\propto 1/R$$. The 100 Ω resistor dissipates twice the power of the 200 Ω resistor.\n- Step 3: Intuition: in parallel, the smaller resistor lets more current through. Same voltage × bigger current = more power. The lower-resistance branch \"carries the load\".\n\nKey insight: the answer flips compared to the series case — the dependence of $$P$$ on $$R$$ inverts when you switch from constant-$$I$$ to constant-$$V$$ conditions.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "An appliance is rated \"240 V, 3.0 kW\" and the fuse is rated 13 A. Without calculating exactly, explain how you'd decide whether the fuse is appropriate. (3 steps)", "answer": "- Step 1: From $$P = IV$$, the normal operating current is $$I = P/V$$. Plugging in roughly: $$3000/240 \\approx 12.5\\,\\text{A}$$.\n- Step 2: Compare to the fuse rating. The fuse blows if current exceeds 13 A. Here $$12.5 < 13$$, so the fuse will not blow under normal operation — it's safe.\n- Step 3: The fuse also has to be *low enough* to actually protect: if you'd chosen a 30 A fuse, normal operation is fine but a fault current (say 20 A from a short) wouldn't blow it, defeating the purpose. The 13 A choice gives a small margin above 12.5 A — appropriate.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Why does the resistance of a metal *increase* with temperature? Walk through the chain of cause and effect using the equation $$I = nAvq$$. (4 steps)", "answer": "- Step 1: In a metal, the lattice ions vibrate about fixed positions. As $$T$$ rises, the *amplitude* of these vibrations increases.\n- Step 2: Larger-amplitude ion vibrations present a \"bigger target\" for drifting electrons — collisions between electrons and ions become more frequent.\n- Step 3: More frequent collisions reduce the average drift velocity $$v$$ of the electrons. Crucially, in a metal $$n$$ (carrier density), $$A$$ (cross-section), and $$q$$ (electron charge) are all unchanged by temperature.\n- Step 4: From $$I = nAvq$$, the only variable that drops is $$v$$, so $$I$$ drops for the same $$V$$. Hence by $$R = V/I$$, $$R$$ rises. Metals have a *positive temperature coefficient* (PTC).\n\nAnalogy: running through a crowd of 500 people standing still is easy; running through 500 people jumping around vigorously is much harder.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Why does the resistance of a *semiconductor* (or NTC thermistor) *decrease* with temperature — and how is the mechanism fundamentally different from a metal? (4 steps)", "answer": "- Step 1: In a semiconductor, electrons are bound to atoms unless they gain enough thermal energy to break free. So $$n$$ (number density of free charge carriers) is *not* constant with temperature.\n- Step 2: As $$T$$ rises, more electrons gain enough thermal energy to escape into the conduction band — $$n$$ increases, often dramatically (exponentially).\n- Step 3: There is also more lattice vibration (which would lower $$v$$), but the *huge* increase in $$n$$ dominates by many orders of magnitude.\n- Step 4: From $$I = nAvq$$, the rise in $$n$$ outweighs the fall in $$v$$, so $$I$$ rises for the same $$V$$, and $$R = V/I$$ drops. Semiconductors have a *negative temperature coefficient* (NTC).\n\nThe key contrast: in a metal, $$n$$ is fixed; in a semiconductor, $$n$$ is temperature-controlled.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "A student says: \"In both metals and semiconductors, lattice vibrations increase with temperature, so resistance must increase in both.\" Where does this reasoning break down? (3 steps)", "answer": "- Step 1: The statement about lattice vibrations is correct — they do increase in both materials, and they do reduce drift velocity in both cases.\n- Step 2: The reasoning misses that for a *semiconductor*, the dominant effect of temperature is on $$n$$ (carrier density), not on $$v$$. The increase in $$n$$ is exponential and overwhelms the modest decrease in $$v$$.\n- Step 3: For a metal, $$n$$ is set by the electron sea and is essentially constant with temperature, so only the $$v$$ effect matters — hence $$R$$ rises. The two materials differ in *which factor in $$I=nAvq$$ is temperature-sensitive*.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "An NTC thermistor is in series with a fixed 100 Ω resistor and a battery. The thermistor is cooled. Without numbers, explain what happens to (a) the thermistor's resistance, (b) the total circuit resistance, (c) the current, and (d) the voltage across the thermistor. (4 steps)", "answer": "- Step 1: Cooling an NTC thermistor *increases* its resistance (fewer thermal carriers).\n- Step 2: Total circuit resistance = thermistor + 100 Ω + internal. Thermistor up → total up.\n- Step 3: Same e.m.f. divided by a larger total resistance → current decreases throughout the series loop.\n- Step 4: Voltage across the thermistor: by $$V = IR_{\\text{therm}}$$, $$I$$ went down but $$R_{\\text{therm}}$$ went up — and since the thermistor now takes a larger *share* of the total resistance, its voltage drop *increases*. (The fixed resistor's drop decreases.)\n\nThis is the basis of thermistor-based temperature sensing: the changing voltage across the thermistor signals the temperature.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Sketch (in words) the shape of resistance vs temperature for: (a) a metal, (b) an NTC thermistor, (c) a superconductor — across a wide temperature range. (3 steps)", "answer": "- Step 1: Metal: $$R$$ rises approximately *linearly* with $$T$$ (for moderate ranges). Gentle positive slope. At $$T = 0$$, $$R$$ extrapolates to a non-zero residual value $$R_0$$ (impurity scattering).\n- Step 2: NTC thermistor: $$R$$ falls *steeply and non-linearly* (roughly exponentially) as $$T$$ rises. Very high $$R$$ when cold, low $$R$$ when hot — concave-up decreasing curve.\n- Step 3: Superconductor: behaves like a normal metal above its critical temperature $$T_c$$. At exactly $$T = T_c$$, $$R$$ drops *abruptly* (discontinuously) to zero. Below $$T_c$$, $$R = 0$$ identically.\n\nThe metal curve and the superconductor curve *coincide* above $$T_c$$; what makes a superconductor special is the cliff-edge drop at $$T_c$$.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Define a superconductor in the precise language an exam would expect, including what *exactly* zero means. (3 steps)", "answer": "- Step 1: A superconductor is a material whose resistivity drops to *exactly zero* below a characteristic temperature called the *critical temperature* (or *transition temperature*) $$T_c$$.\n- Step 2: \"Exactly zero\" matters: saying \"very low resistance\" is not enough for full marks. Below $$T_c$$, a current can flow indefinitely with no energy loss as heat — there is no dissipation at all.\n- Step 3: A complete answer also gives the condition: \"below $$T_c$$\". Above $$T_c$$, the material behaves as an ordinary conductor with normal resistivity.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "Why is \"$$R = 0$$\" such a powerful property — what physical consequence does it have for power dissipation, and why does this matter for applications? (3 steps)", "answer": "- Step 1: Power dissipated in a resistor is $$P = I^2 R$$. If $$R = 0$$, then $$P = 0$$ regardless of how large $$I$$ is. No Joule heating, no energy wasted as heat.\n- Step 2: This means a superconductor can carry *enormous* currents without overheating — limited only by the critical current and critical magnetic field of the material, not by thermal management.\n- Step 3: Consequences: (a) electromagnets can be made far stronger than normal (used in MRI scanners, particle accelerators); (b) power cables can transmit electricity with zero loss; (c) magnetic levitation (maglev) becomes practical because of the strong, stable fields.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "Give three applications of superconductors and for each explain *why* zero resistance specifically enables it. (3 steps)", "answer": "- Step 1: *MRI scanners and strong electromagnets.* Producing a strong, stable magnetic field needs a very large current in a coil. In a normal copper coil, $$I^2 R$$ heating would melt the wire. With $$R = 0$$, huge currents flow without heating — yielding strong fields for medical imaging.\n- Step 2: *Lossless power transmission.* In conventional cables, several percent of power is wasted as heat over long distances. With superconducting cables, $$P = I^2 R = 0$$, so all delivered power reaches the load. Critical at scale (national grids).\n- Step 3: *Maglev trains.* Powerful onboard superconducting magnets repel the track, levitating the train (no friction). Sustaining the field requires continuous current, which is only feasible without dissipation.\n\n(Bonus: particle accelerators like the LHC use superconducting magnets to steer protons precisely.)", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "Why must a superconductor be kept *cold* (often near liquid helium or liquid nitrogen temperatures), and what trade-off does this create for practical use? (3 steps)", "answer": "- Step 1: Superconductivity only exists below the critical temperature $$T_c$$. Above $$T_c$$, the material reverts to ordinary metallic behaviour with normal resistance. Typical $$T_c$$: mercury 4.2 K, niobium 9.3 K, YBCO ceramic ~92 K.\n- Step 2: To stay below $$T_c$$, the superconductor must be cooled with cryogenic fluid — liquid helium (4 K, very expensive) for conventional superconductors, or liquid nitrogen (77 K, cheaper) for high-$$T_c$$ ceramics.\n- Step 3: Trade-off: although the superconductor itself dissipates zero power, the *cooling system* consumes significant energy. Whether superconductivity is net-beneficial depends on whether the saved $$I^2 R$$ losses outweigh the cooling overhead. This is why higher-$$T_c$$ materials are the holy grail.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Above its critical temperature, how does a superconductor behave, and what does its $$R$$-vs-$$T$$ curve look like at exactly $$T_c$$? (3 steps)", "answer": "- Step 1: Above $$T_c$$, the material is just an ordinary conductor (often a metal). Its resistance follows the standard metallic behaviour — roughly linear increase with $$T$$.\n- Step 2: At exactly $$T = T_c$$, there is a phase transition: the resistance drops discontinuously (vertical cliff) from a finite value to exactly zero.\n- Step 3: This sharpness is a defining feature — it's not a gradual decrease but a sudden change of state, like water freezing. Below $$T_c$$, $$R$$ stays pinned at zero.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "A student claims: \"When current flows through a resistor, electrons get stored inside it — that's why the current coming out is less than the current going in.\" What is wrong with this claim? (3 steps)", "answer": "- Step 1: In any series circuit, conservation of charge requires the current to be the *same* at every point — what goes in must come out at every instant. Electrons are not accumulated inside a resistor.\n- Step 2: A resistor doesn't *reduce the number* of electrons flowing; it reduces the *drift velocity*. The same number of electrons enter and leave per second, but each one travels more slowly because of lattice collisions.\n- Step 3: The energy lost per electron (transferred to heat) is what makes a resistor \"consume\" power, not any storage of charge. Charge storage is the job of capacitors, not resistors.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Why is reading \"I = 40 mA\" as $$40 \\times 10^{-6}\\,\\text{A}$$ a serious error, and what's the correct conversion? (2 steps)", "answer": "- Step 1: The prefix \"m\" stands for *milli* = $$10^{-3}$$, *not* micro. So $$40\\ \\text{mA} = 40 \\times 10^{-3}\\,\\text{A} = 0.040\\,\\text{A}$$.\n- Step 2: The prefix $$\\mu$$ (Greek mu) is *micro* = $$10^{-6}$$. Confusing the two changes the answer by a factor of 1000 — typically turning a sensible answer into one that's three orders of magnitude wrong. Always check: m = milli ($$10^{-3}$$), $$\\mu$$ = micro ($$10^{-6}$$), k = kilo ($$10^{3}$$), M = mega ($$10^{6}$$).", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "A non-ohmic component has an $$I$$-$$V$$ curve. You're asked: \"At what p.d. is the resistance equal to $$50\\,\\Omega$$?\" Why can't you just use $$V = IR$$ with $$I$$ from another point on the curve, and what's the correct *graphical* method? (4 steps)", "answer": "- Step 1: For a non-ohmic component, $$I$$ and $$V$$ change *together* in a non-proportional way. A current value from one point on the curve doesn't apply at the new operating point.\n- Step 2: The condition \"$$R = 50\\,\\Omega$$\" defines a line through the origin on the $$I$$-$$V$$ graph: every point on that line satisfies $$V/I = 50$$, i.e. $$I = V/50$$.\n- Step 3: To find the actual operating point, draw the line $$I = V/50$$ on the same axes as the component's curve. Pick a convenient test point — e.g. $$V = 0.6\\,\\text{V}$$ gives $$I = 0.012\\,\\text{A}$$ — to anchor the line.\n- Step 4: Where the straight line *intersects* the component's curve is the unique point that satisfies both: (a) the component's own $$I$$-$$V$$ relationship, and (b) $$R = V/I = 50$$. Read the $$V$$-coordinate at the intersection — that's the answer.\n\nThis is essentially a \"load line\" technique used in electronics.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "What is the conceptual significance of the $$I$$-$$V$$ graph for an ohmic conductor passing *through the origin*? (2 steps)", "answer": "- Step 1: Passing through the origin means: zero p.d. → zero current. There is no offset, no threshold voltage needed before current flows.\n- Step 2: It also means strict proportionality (not just linearity): $$I/V$$ is the *same constant* at every point on the line. A line with a nonzero intercept would still be straight, but $$I$$ would not be proportional to $$V$$ — and the component would not obey Ohm's law in the strict sense.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "In the equation $$I = nAvq$$, identify which factor changes with temperature for (a) a metal, (b) a semiconductor, and use this to predict the sign of the temperature coefficient. (3 steps)", "answer": "- Step 1: For a metal: $$n$$, $$A$$, $$q$$ all fixed; only $$v$$ changes (decreases with $$T$$ due to more lattice scattering). $$I$$ drops → $$R$$ rises → PTC (positive coefficient).\n- Step 2: For a semiconductor: $$A$$ and $$q$$ fixed; both $$n$$ and $$v$$ change with $$T$$. But $$n$$ rises exponentially (more electrons freed thermally), while $$v$$ falls modestly. The $$n$$ effect dominates by far.\n- Step 3: Net effect for a semiconductor: $$I$$ rises → $$R$$ falls → NTC (negative coefficient). The drift-velocity equation neatly captures *why* the two materials respond oppositely: different factors are temperature-sensitive in each.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "A copper wire has resistance $$R_0$$ at 0 °C and resistance rises linearly with temperature. If its temperature is raised from room temperature (~20 °C) to about 100 °C, would you expect the fractional change in $$R$$ to be roughly a few percent or many tens of percent? Justify directionally without computing precisely. (3 steps)", "answer": "- Step 1: The temperature coefficient of copper is $$\\alpha \\approx 4 \\times 10^{-3}\\ \\text{K}^{-1}$$ — about 0.4% per kelvin.\n- Step 2: A temperature change $$\\Delta T \\approx 80\\,\\text{K}$$ gives $$\\Delta R / R_0 \\approx \\alpha \\cdot \\Delta T \\approx 0.004 \\times 80 \\approx 0.32$$, i.e. about 30%.\n- Step 3: So the resistance increase is *substantial* (tens of percent), not just a few percent. This is why a filament lamp's hot resistance (operating at ~3000 K) is roughly ten times its cold resistance — a huge effect, not a small correction.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Why does a filament lamp draw a momentary \"surge\" of current when first switched on? (3 steps)", "answer": "- Step 1: When cold, the filament's resistance is much lower than its hot operating resistance (about 10× lower) because lattice vibrations are minimal.\n- Step 2: At the instant of switch-on, full mains voltage is applied across this low cold resistance, so $$I = V/R_{\\text{cold}}$$ is large.\n- Step 3: As current flows, $$I^2 R$$ heating rapidly warms the filament; $$R$$ climbs to its hot value within a fraction of a second, and current settles to its steady operating value. This initial spike is why filament lamps tend to fail *at the moment of switching on* — thermal stress on a cold filament.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "A filament lamp converts most of its electrical power into heat, with only a small fraction emitted as visible light. Why is an LED much more efficient for lighting? (3 steps)", "answer": "- Step 1: A filament lamp produces light because the filament gets so hot (~3000 K) that it glows incandescently. The vast majority of emitted radiation is infrared (heat), and only a small slice falls in the visible spectrum.\n- Step 2: All the $$I^2 R$$ power dissipation goes into heating first; light is a *byproduct* of being incandescent. Efficiency is fundamentally limited by the blackbody spectrum of the filament temperature.\n- Step 3: An LED produces light through a direct electronic process (electron-hole recombination) at low temperature, emitting almost exclusively in a narrow visible band. There is far less waste heat, so a much larger fraction of input power becomes visible light — typically 5–10× more efficient.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "In Core Practical CP7 (resistivity of a wire), what do you plot, what is the gradient, and how do you obtain $$\\rho$$? (3 steps)", "answer": "- Step 1: For each length $$L$$ of the same wire, measure $$V$$ and $$I$$, compute $$R = V/I$$. Plot $$R$$ (y-axis) versus $$L$$ (x-axis). Theory: $$R = (\\rho/A) L$$, so the graph is a straight line through the origin.\n- Step 2: The gradient is $$\\rho/A$$. So $$\\rho = \\text{gradient} \\times A$$.\n- Step 3: Measure the wire's diameter $$d$$ with a micrometer at several positions and average (wire isn't perfectly uniform). Compute $$A = \\pi (d/2)^2$$. Multiply by gradient to get $$\\rho$$.\n\nThe graph method is better than a single-point calculation because it averages out random errors.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Why is the *current* in CP7 deliberately kept small (typically below ~0.5 A), and what would go wrong otherwise? (3 steps)", "answer": "- Step 1: A larger current causes more $$I^2 R$$ Joule heating in the wire — temperature rises significantly.\n- Step 2: Resistivity of a metal depends on temperature. If the wire heats up during measurement, $$\\rho$$ at the end of the experiment differs from $$\\rho$$ at the start — the very quantity you're trying to measure is changing.\n- Step 3: This both invalidates the assumption of constant $$\\rho$$ (so the $$R$$-vs-$$L$$ graph wouldn't be a straight line of fixed gradient) and introduces a systematic error in the final $$\\rho$$ value. Keeping current low keeps temperature essentially constant.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Why is uncertainty in diameter measurement particularly damaging to the final resistivity result? (3 steps)", "answer": "- Step 1: $$A = \\pi (d/2)^2 \\propto d^2$$. A fractional uncertainty in $$d$$ of $$\\epsilon$$ becomes a fractional uncertainty of $$2\\epsilon$$ in $$A$$.\n- Step 2: $$\\rho = \\text{gradient} \\times A$$, so $$A$$'s uncertainty propagates directly into $$\\rho$$ — a 2% error in $$d$$ becomes a 4% error in $$\\rho$$.\n- Step 3: Compounding this, the wire isn't perfectly cylindrical; measuring $$d$$ at one location can misrepresent the true effective $$d$$. That's why you measure at three (or more) positions and average — and also rotate the wire at each position to catch ellipticity.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "Compare resistance and resistivity in terms of: what they describe, units, what they depend on, and how each is measured. (4 steps)", "answer": "- Step 1: *What it describes*: Resistance describes a specific *component* (a particular wire with given dimensions). Resistivity describes the *material* itself, independent of shape.\n- Step 2: *Units*: Resistance is in ohms ($$\\Omega$$). Resistivity is in ohm-metres ($$\\Omega \\cdot \\text{m}$$) — note the multiplication, not division.\n- Step 3: *Dependence*: Resistance depends on material, geometry (length, area), and temperature. Resistivity depends only on material and temperature (not geometry).\n- Step 4: *Measurement*: Resistance directly via ammeter and voltmeter: $$R = V/I$$. Resistivity indirectly via $$\\rho = RA/L$$, requiring measurements of length, area (from diameter), *and* resistance.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "If you wanted to design an electrical heating element that dissipates a specific power at a given mains voltage, what material property and geometric choices would you balance? (3 steps)", "answer": "- Step 1: Required: $$P = V^2/R$$ with $$V$$ fixed by mains. To get a target $$P$$, you need a specific $$R$$. From $$R = \\rho L /A$$, you have three knobs: $$\\rho$$ (material), $$L$$ (length), $$A$$ (cross-section).\n- Step 2: You want a material with relatively high $$\\rho$$ (so you don't need an absurdly long wire) and a high melting point so it can run hot without failing — nichrome is ideal.\n- Step 3: Once material is chosen, trade off $$L$$ and $$A$$ for the desired $$R$$ — longer or thinner wire gives more $$R$$. Practically, also consider mechanical strength, packaging (coiled element), and ensure the wire can tolerate the temperature it'll reach at the design power.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "A non-ohmic component's $$I$$-$$V$$ curve shows current rising sharply near $$V \\approx 0.7\\,\\text{V}$$ (typical diode behaviour). What is the *qualitative* behaviour of its resistance as $$V$$ increases past this threshold? (3 steps)", "answer": "- Step 1: At low $$V$$ (below threshold), the curve is nearly flat — tiny current for any applied voltage. Resistance $$R = V/I$$ is very *large* (small $$I$$ for any $$V$$).\n- Step 2: As $$V$$ approaches and exceeds 0.7 V, the curve turns up sharply — $$I$$ grows rapidly. $$R = V/I$$ drops dramatically because $$I$$ has surged.\n- Step 3: So the diode's resistance is *high* below threshold and *low* above threshold — it acts as a one-way valve. The gradient $$\\Delta I/\\Delta V$$ is also changing, confirming non-ohmic behaviour: you cannot describe this with a single $$R$$ value.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "You're given a wire and told its resistivity at 20 °C and a temperature coefficient $$\\alpha$$. Conceptually, how does the resistance of the wire at 80 °C compare to its resistance at 20 °C? (3 steps)", "answer": "- Step 1: Resistance scales linearly with temperature for moderate ranges: $$R(\\theta) = R_0(1 + \\alpha\\theta)$$.\n- Step 2: From 20 °C to 80 °C, $$\\Delta\\theta = 60\\,\\text{K}$$. With $$\\alpha \\sim 4 \\times 10^{-3}\\,\\text{K}^{-1}$$ (copper-like), $$\\alpha \\Delta\\theta \\sim 0.24$$ — about 24% increase.\n- Step 3: So $$R(80°C) \\approx 1.24 \\times R(20°C)$$. Without computing exactly, the *direction* is clear (increase) and the *magnitude* is moderate (tens of percent, not a doubling or tenfold change). This intuition is enough for sanity-checking exam answers.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Why does a 13 A fuse blow when current exceeds ~13 A, and what role does $$I^2 R$$ play in its operation? (3 steps)", "answer": "- Step 1: A fuse is a deliberately thin wire of a low-melting-point material. Power dissipated in the fuse is $$P = I^2 R_{\\text{fuse}}$$ — small $$R$$ but growing with $$I^2$$.\n- Step 2: Below the rated current, the fuse runs warm but survives. As $$I$$ exceeds the rating, $$I^2 R$$ heating outpaces heat dissipation to the surroundings — the fuse wire reaches its melting point.\n- Step 3: The wire melts, breaking the circuit and stopping the current. The fuse \"sacrifices itself\" to protect downstream components and prevent fires. So the fuse exploits the *quadratic* dependence of $$P$$ on $$I$$ to trigger sharply above its rating.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Combine your knowledge: a copper wire is being used as a current-carrying transmission line. As current rises, *resistance* of the wire also rises (because it heats). Walk through why power transmission via *superconducting* cables is qualitatively different. (4 steps)", "answer": "- Step 1: In a copper transmission line, $$I^2 R$$ heating raises the wire's temperature, which raises $$R$$ (PTC of copper). The wire dissipates power $$P_{\\text{loss}} = I^2 R$$, which grows non-trivially with load and self-heating.\n- Step 2: At national-grid scale, these losses can amount to several percent of transmitted power — a huge absolute energy waste.\n- Step 3: A superconducting cable, below $$T_c$$, has $$R = 0$$ identically. No matter how much current flows (up to the critical current), $$I^2 R = 0$$. No heating, no self-induced rise in $$R$$.\n- Step 4: The catch: the superconducting cable must be kept below $$T_c$$ by cryogenic cooling, which itself consumes power. The technology is worth it only when the saved transmission losses exceed the cooling overhead — typically over long distances and at high currents.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "What is the relationship between the *gradient* of an $$I$$-$$V$$ graph (for an ohmic conductor) and the component's resistance, and why does a *steeper* line mean *lower* resistance? (3 steps)", "answer": "- Step 1: For an ohmic conductor, $$I = V/R$$, so plotting $$I$$ (y) against $$V$$ (x) gives a straight line of gradient $$1/R$$.\n- Step 2: A steeper line means $$1/R$$ is large, which means $$R$$ is *small*. Physically: a small resistance means a lot of current flows for a small voltage — high $$I$$ per $$V$$ — steep slope.\n- Step 3: This is a common confusion: students assume \"steep = lots of resistance\". It's actually the opposite — flatter lines correspond to higher resistance (more $$V$$ needed to push the same $$I$$).", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "When you say \"a wire has temperature coefficient $$\\alpha \\approx 4 \\times 10^{-3}\\,\\text{K}^{-1}$$\", what does this number mean intuitively? (2 steps)", "answer": "- Step 1: It means the fractional change in resistance per kelvin temperature change is about 0.4%. So heating the wire by 1 K increases its resistance by about 0.4% of $$R_0$$.\n- Step 2: Over modest temperature changes (tens of K), the cumulative change is just $$\\alpha \\Delta T$$ in fractional terms. Over hundreds of K (like a glowing filament), the linear approximation breaks down — the relation becomes more complicated and resistance can rise by an order of magnitude.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "A resistor has $$R = 47\\,\\Omega$$ and carries 0.1 A. Roughly what order of magnitude of power does it dissipate? Reason it out without a calculator. (3 steps)", "answer": "- Step 1: $$P = I^2 R = (0.1)^2 \\times 47 = 0.01 \\times 47 = 0.47\\,\\text{W}$$.\n- Step 2: So about half a watt — a small amount, comparable to a dim indicator LED, easily handled by a standard quarter-watt resistor... wait, no: standard 1/4-watt resistors would actually be overrated and would risk overheating at 0.47 W.\n- Step 3: Practical takeaway: when picking a resistor for a circuit, always check $$I^2 R$$ exceeds neither the resistor's power rating nor what the heat-dissipation surface can handle. Choose at least a 1/2-watt resistor here.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "What is the difference, physically, between increasing the *length* of a wire and increasing its *temperature*, in terms of why each raises resistance? (3 steps)", "answer": "- Step 1: Increasing length: electrons must traverse more of the lattice, encountering more collisions overall. The *probability of scattering per electron per second per unit length* is unchanged, but the total path is longer. This is a *geometric* effect.\n- Step 2: Increasing temperature: same length, but each unit of path has more vigorously vibrating ions, so the *probability of scattering per unit length increases*. This is a *microscopic / material* effect (raises $$\\rho$$).\n- Step 3: In formula terms: $$R = \\rho L /A$$. Changing $$L$$ holds $$\\rho$$ fixed and scales $$R$$. Changing $$T$$ raises $$\\rho$$ itself, scaling $$R$$ even at fixed geometry. Both raise $$R$$, but through different mechanisms.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Looking at a typical $$R$$-vs-$$T$$ curve for a metal: extrapolating the linear region back to $$T = 0\\,\\text{K}$$ gives a small but *non-zero* intercept $$R_0$$ rather than $$R = 0$$. Why is this, and how does it differ from a superconductor? (3 steps)", "answer": "- Step 1: Even at very low $$T$$, lattice vibrations decrease but never fully vanish (some quantum zero-point motion), and crucially, there are always *impurities and defects* in the wire that scatter electrons regardless of temperature.\n- Step 2: So a normal metal has a *residual resistance* $$R_0$$ at very low $$T$$ — not zero, just small. The linear $$R = R_0(1 + \\alpha\\theta)$$ captures this with the constant term $$R_0$$.\n- Step 3: A superconductor is fundamentally different: below $$T_c$$, it undergoes a quantum phase transition into a state where electrons pair up and flow without scattering at all. $$R$$ is *exactly* zero, not just small. Impurities and defects no longer cause dissipation in this special state.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Is it possible for a current to keep flowing in a superconducting loop *forever*, even with the battery disconnected? Why or why not? (3 steps)", "answer": "- Step 1: In a normal resistive loop, any flowing current quickly decays because energy is lost to $$I^2 R$$ heating, even after the source is removed. Within milliseconds to seconds, $$I \\to 0$$.\n- Step 2: In a superconducting loop below $$T_c$$, $$R = 0$$ exactly. There is no mechanism by which the current loses energy — no Joule heating, no dissipation.\n- Step 3: So yes — once a current is established in a superconducting loop, it will continue indefinitely (experiments have shown persistent currents lasting for years with no measurable decay). This is the basis of superconducting \"permanent magnets\" used in MRI.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "A common exam phrasing: \"Explain why the resistance of a metallic wire increases when its temperature is raised.\" Sketch the ideal four-step answer aligned to mark-scheme keywords. (4 steps)", "answer": "- Step 1: State the cause: as temperature increases, the *amplitude of vibration of the lattice ions increases*.\n- Step 2: Consequence for collisions: this leads to *more frequent collisions* between the conduction electrons and the lattice ions.\n- Step 3: Effect on drift velocity: the *drift velocity of the electrons is reduced* (with $$n$$, $$A$$, $$q$$ constant in $$I = nAvq$$).\n- Step 4: Effect on resistance: at the same p.d., a lower current means $$R = V/I$$ is *higher* — so resistance increases.\n\nEach step is typically one mark; missing any of the four loses marks. Avoid vague language like \"electrons can't get through\" — be specific about collisions, drift velocity, and current.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Why is the resistance of an NTC thermistor a useful component for *measuring temperature* in everyday devices? (3 steps)", "answer": "- Step 1: The thermistor's resistance changes *steeply* with temperature — a small temperature change produces a large, easily measurable change in $$R$$. Much more sensitive than a metal wire.\n- Step 2: In a circuit (often a potential divider), this changing $$R$$ translates directly to a changing voltage, which can be read by an analog-to-digital converter or microcontroller.\n- Step 3: Applications: oven temperature control, fire alarms (sudden temperature spike → resistance drop → trip a circuit), digital thermometers, thermostats. The non-linearity is a small disadvantage but is calibrated out in software.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "In a series circuit with two resistors of different values, why doesn't the *first* resistor \"use up\" the current so the second resistor sees less? (3 steps)", "answer": "- Step 1: Current is a flow of charge. Charge is conserved — no electrons are destroyed or stored in a resistor.\n- Step 2: In series, by Kirchhoff's current law, the current is the same at every cross-section of the loop. Whatever flows into one resistor must flow out the other side and into the next.\n- Step 3: What *does* get \"used up\" is energy. Each resistor takes a share of the total p.d. ($$V = IR$$, with larger $$R$$ taking more $$V$$). The first resistor dissipates $$I^2 R_1$$, the second $$I^2 R_2$$, but $$I$$ is identical through both.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Why is it incorrect to claim that \"a superconductor has very low resistance\"? (2 steps)", "answer": "- Step 1: Below $$T_c$$, a superconductor's resistance is *exactly* zero, not merely small. Experimentally, persistent currents in superconducting loops show no decay over years, putting an upper bound on $$R$$ at effectively zero (resistivity bounded by ~$$10^{-18}\\,\\Omega\\,\\text{m}$$ or less).\n- Step 2: This distinction matters because \"low but nonzero\" still implies *some* dissipation, however tiny — and a true superconductor has *none*. In exam mark schemes, \"very low\" or \"negligible\" resistance does *not* earn the mark — only \"zero\" or \"exactly zero\" does.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}], "count": 52}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "How is resistance defined in terms of potential difference and current, and what is its SI unit?", "answer": "Resistance is defined as the ratio of the potential difference across a component to the current flowing through it, written as $$R = V/I$$. The SI unit is the **ohm** ($$\\Omega$$), where $$1\\,\\Omega = 1\\,\\text{V/A}$$ — meaning one ohm is the resistance that allows exactly one ampere to flow when one volt is applied. Crucially, you *divide* V by I; never multiply. Resistance is not a force \"opposing\" current in some vague sense — it is precisely this voltage-per-unit-current ratio, which tells you how much \"push\" (volts) you need to drive each ampere through the component.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why is writing $$R = IV$$ wrong, and what is the conceptual reason resistance is a *ratio* rather than a product? (2 steps)", "answer": "- Step 1: $$R = IV$$ would have units of $$\\text{A}\\cdot\\text{V} = \\text{W}$$ (power), not ohms. The product $$IV$$ measures energy-per-second delivered, not opposition to flow.\n- Step 2: Resistance answers the question \"for a given driving voltage, how little current do I get?\" The smaller the current at a given V, the *larger* the resistance. That inverse relationship between R and I (at fixed V) only emerges from division: $$R = V/I$$, not multiplication.\n\nTakeaway: resistance is fundamentally a *ratio* — \"volts needed per ampere delivered.\"", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "State Ohm's law precisely, including the condition that must be met.", "answer": "Ohm's law states that the current through a conductor is directly proportional to the potential difference across it, **provided the temperature is constant**. Symbolically: $$I \\propto V$$ at constant $$T$$, which means $$V/I$$ is constant, i.e. resistance is constant. The temperature condition is essential because heating a conductor changes its resistance — if you omit \"constant temperature\" in an exam answer, you lose a mark. Components that obey this law are called *ohmic*.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "On an I–V graph (current on the y-axis, p.d. on the x-axis), how do you identify an ohmic conductor visually, and how do you read its resistance? (3 steps)", "answer": "- Step 1: An ohmic conductor produces a **straight line passing through the origin**. Straight = constant gradient = constant R; through origin = zero current when zero voltage (no offset).\n- Step 2: The gradient $$\\Delta I / \\Delta V = 1/R$$. So a *steeper* line means *lower* resistance (more current per volt), and a *shallower* line means higher resistance — this catches many students out.\n- Step 3: To get R, either compute $$R = 1/\\text{gradient}$$, or pick any point on the line and use $$R = V/I$$. Both give the same answer because R is constant.\n\nTakeaway: steeper I–V line ⇒ smaller R; shallower ⇒ larger R.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Why can you NOT use the gradient of an I–V curve to find the resistance of a non-ohmic component? (3 steps)", "answer": "- Step 1: For a non-ohmic component (e.g. filament lamp, diode), the I–V graph is a *curve*, not a straight line. The gradient $$\\mathrm{d}I/\\mathrm{d}V$$ changes from point to point.\n- Step 2: The gradient at any single point gives a *differential* quantity (how I changes with a small change in V near that point), not the actual ratio $$V/I$$. These are different numbers on a curve.\n- Step 3: Resistance is defined as $$R = V/I$$ at a *specific operating point*. You must read both V and I at the point of interest and divide them — never use the slope of the curve.\n\nTakeaway: on a curve, \"gradient ≠ 1/R.\" Always go back to the definition.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "A non-ohmic component shows $$I = 40\\,\\text{mA}$$ when $$V = 0.70\\,\\text{V}$$. Roughly what is its resistance at that operating point? (2 steps)", "answer": "- Step 1: Convert: $$40\\,\\text{mA} = 0.040\\,\\text{A}$$ (milli = $$10^{-3}$$, NOT micro = $$10^{-6}$$).\n- Step 2: $$R = V/I = 0.70/0.040 \\approx 17.5\\,\\Omega$$. Mentally: 0.7 divided by 0.04 ≈ 17–18 Ω.\n\nTakeaway: for any component (ohmic or not) at a known operating point, just divide.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Why is the graphical \"line through the origin\" method needed to find the p.d. at which a non-ohmic component has a *specific* resistance (e.g. 50 Ω)? (3 steps)", "answer": "- Step 1: At the target resistance R, you don't know either V or I independently — you have one equation $$V/I = R$$ but two unknowns. The component's I–V curve gives you the *second* equation linking V and I.\n- Step 2: The locus of all (V, I) pairs satisfying $$V/I = 50$$ is a straight line through the origin with gradient $$1/50$$. So you draw that line.\n- Step 3: Where this straight line *intersects* the component's curve is the unique point (V, I) satisfying both conditions simultaneously — i.e., the operating point at which the component's resistance equals 50 Ω. Read off V (and I) from the intersection.\n\nTakeaway: two unknowns ⇒ need two curves ⇒ intersection gives the answer.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Why must the supply voltage be kept low (e.g. 1–2 V) when measuring the resistance of a component in the lab to test Ohm's law?", "answer": "High current causes Joule heating: $$P = I^2 R$$ dissipates energy as heat inside the component. For a metal, this raises temperature, which raises resistance — so the very act of measuring would *change* the quantity being measured. Ohm's law itself requires constant temperature, so heating invalidates the test (the I–V graph would curve instead of staying linear). Using a low voltage keeps current — and hence heating — small enough that R stays effectively constant during the measurement.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Why must the ammeter be ideally zero-resistance and the voltmeter ideally infinite-resistance when measuring R = V/I? (2 steps)", "answer": "- Step 1: The ammeter sits *in series* with the component, so any resistance it has would add to the circuit's resistance and reduce the current — giving a falsely high reading of R. Ideal $$R_A = 0$$ avoids this.\n- Step 2: The voltmeter sits *in parallel*, so any finite resistance lets a sneak current flow through it, diverting current away from the ammeter — making the ammeter under-read. Ideal $$R_V = \\infty$$ means zero current through the voltmeter, and the ammeter reads the true component current.\n\nTakeaway: ideal meters minimise perturbation of the very circuit they're measuring.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "What is the microscopic origin of resistance in a metal, and how does it relate to drift velocity? (4 steps)", "answer": "- Step 1: A metal consists of a lattice of positive ions, with free conduction electrons drifting through it under an applied electric field.\n- Step 2: As electrons drift, they *collide* with the vibrating lattice ions, losing kinetic energy to the lattice (which appears as heat).\n- Step 3: These collisions slow the electrons down, reducing their average drift velocity $$v$$.\n- Step 4: Since $$I = nAvq$$, a lower drift velocity at fixed $$n, A, q$$ means lower current for the same applied voltage. From $$R = V/I$$, lower I at same V means higher R. So resistance is fundamentally the manifestation of electron–lattice collisions.\n\nTakeaway: resistance ⇔ collision-limited drift velocity.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "A student claims \"a resistor stores electrons inside it, like a battery.\" Why is this wrong? (3 steps)", "answer": "- Step 1: A resistor is not a charge reservoir — it has no mechanism to accumulate net charge. If it did, charge would build up and stop the current.\n- Step 2: In a series circuit, the current is the *same* at every point — the number of electrons per second entering one side of the resistor equals the number leaving the other side. Nothing is \"trapped.\"\n- Step 3: What the resistor actually does is *slow electrons down* via collisions, reducing their drift velocity and hence the rate of flow. The electrons that enter still exit; they just take longer journeys and lose energy as heat along the way.\n\nTakeaway: resistors reduce the *rate* of flow, not the *number* of charges.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Define resistivity ρ and explain why it is more \"fundamental\" than resistance.", "answer": "Resistivity $$\\rho$$ is an intrinsic property of a *material*, defined via $$\\rho = RA/L$$, with units $$\\Omega\\cdot\\text{m}$$. It captures how strongly a given substance resists current independently of the shape or size of the object. Resistance, by contrast, depends on *both* the material AND the geometry (length, cross-section) — so two copper wires of different shapes have different R but the *same* ρ. Resistivity is therefore the material-level \"fingerprint\": copper always has $$\\rho \\approx 1.7 \\times 10^{-8}\\,\\Omega\\cdot\\text{m}$$ regardless of whether it's a thin wire or a thick bar. Resistance is a property of a specific component; resistivity is a property of the stuff it's made of.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Using $$R = \\rho L / A$$, qualitatively explain why a longer wire has more resistance and a thicker wire has less, in terms of electron flow. (3 steps)", "answer": "- Step 1: **Longer wire (L ↑):** electrons must traverse more lattice ions, suffering more collisions on the journey. More opportunities to lose energy ⇒ more impedance ⇒ higher R. Mathematically, $$R \\propto L$$.\n- Step 2: **Thicker wire (A ↑):** a larger cross-section provides more parallel \"lanes\" for electrons to flow through. More charge carriers can move per second for the same driving field ⇒ larger current ⇒ lower R. Mathematically, $$R \\propto 1/A$$.\n- Step 3: Combined: $$R = \\rho L/A$$ — longer × thinner = higher resistance; shorter × thicker = lower resistance. A short fat wire is the best conductor of a given material.\n\nTakeaway: length resists, area helps.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "Why are the units of resistivity $$\\Omega\\cdot\\text{m}$$ and NOT $$\\Omega/\\text{m}$$? (2 steps)", "answer": "- Step 1: Rearranging $$R = \\rho L/A$$ gives $$\\rho = RA/L$$. Units: $$[\\Omega] \\cdot [\\text{m}^2] / [\\text{m}] = \\Omega\\cdot\\text{m}$$.\n- Step 2: Intuitively, resistivity has to \"scale up\" by length and \"scale down\" by area to give resistance. The factor of length is multiplicative in the units, hence $$\\Omega\\cdot\\text{m}$$. Writing $$\\Omega/\\text{m}$$ would dimensionally be wrong (it would give R in $$\\Omega/\\text{m}^3$$ — meaningless).\n\nTakeaway: always dimension-check: $$[\\rho][L]/[A]$$ must give $$[R]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "What three formulas express the power dissipated in a resistor, and when is each form most convenient? (3 steps)", "answer": "- Step 1: $$P = IV$$ — the fundamental form, valid for any component. Use when you know both current AND voltage.\n- Step 2: $$P = I^2 R$$ — derived by substituting $$V = IR$$. Use when you know current and resistance (e.g. a wire of known R carrying a known I, like in transmission lines).\n- Step 3: $$P = V^2/R$$ — derived by substituting $$I = V/R$$. Use when you know voltage and resistance (e.g. a household appliance with fixed mains voltage 240 V).\n\nTakeaway: same physics, three algebraic faces — pick the one matching the variables you have.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Derive $$P = V^2/R$$ starting from $$P = IV$$. (3 steps)", "answer": "- Step 1: Start with $$P = IV$$.\n- Step 2: From Ohm's law (or the definition of resistance), $$I = V/R$$.\n- Step 3: Substitute: $$P = (V/R) \\cdot V = V^2/R$$.\n\nTakeaway: the substitution eliminates $$I$$ and expresses power purely in terms of the voltage applied and the resistance — handy because mains voltage is fixed and appliance resistance is a built-in property.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "If you double the current through a resistor (with R unchanged), what happens to the power dissipated, and why does this matter for cables and fuses? (2 steps)", "answer": "- Step 1: $$P = I^2 R$$ — doubling I quadruples P. The quadratic dependence means small increases in current cause disproportionately large heating.\n- Step 2: This is why thick cables are needed for high-current appliances and why fuses are sized carefully. A wire that would only warm gently at the rated current can overheat dangerously (and melt insulation, start fires) at modest overcurrent. The $$I^2$$ factor is the physical reason high-current transmission must be done at *low* current (high voltage), and why fuses must trip *before* I gets too large.\n\nTakeaway: heating scales as current squared — a brutal quadratic in safety calculations.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "An electric kettle is rated 240 V, 3.0 kW. Can it operate safely on a 13 A fuse? (3 steps)", "answer": "- Step 1: Find the operating current using $$P = IV \\Rightarrow I = P/V$$.\n- Step 2: $$I = 3000/240 = 12.5\\,\\text{A}$$. (Mental check: $$240 \\times 12 = 2880$$, $$240 \\times 13 = 3120$$, so 3000 sits between, closer to 12.5.)\n- Step 3: Since $$12.5\\,\\text{A} < 13\\,\\text{A}$$, the operating current is below the fuse rating — the fuse will NOT blow during normal operation, so it is safe. (If P were e.g. 3.5 kW, current would be ~14.6 A and the 13 A fuse would blow.)\n\nTakeaway: fuse safety check = compare $$P/V$$ to fuse rating.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Where does the power $$P = IV$$ dissipated in a resistor actually *go*, physically?", "answer": "It goes into thermal energy in the lattice — and sometimes into light. The mechanism is the same collisions that cause resistance: each electron, accelerated by the applied field, gains kinetic energy and then loses it on impact with a vibrating lattice ion, transferring that energy into increased lattice vibration (i.e. heat). On the macroscopic scale, the resistor's temperature rises (and it radiates heat to the environment). In a filament lamp, the lattice gets hot enough to emit visible light as black-body radiation — but most of the dissipated power is still wasted as heat, which is why filament lamps are inefficient compared to LEDs.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Why does the resistance of a metallic conductor *increase* as its temperature rises? Give the mechanism step by step. (5 steps)", "answer": "- Step 1: Raising T increases the **amplitude of vibration** of the positive lattice ions about their fixed positions — they jiggle more vigorously.\n- Step 2: Conduction electrons drifting through the metal now have a **higher probability of colliding** with the lattice ions (the ions present a \"bigger target\" in time-averaged sense).\n- Step 3: More frequent collisions reduce the average **drift velocity** $$v$$ of electrons.\n- Step 4: In $$I = nAvq$$, for a metal $$n$$ (number density of free electrons) does **not** depend on T, and $$A, q$$ are fixed. So lower $$v$$ directly means lower $$I$$ at the same applied V.\n- Step 5: From $$R = V/I$$: lower I at same V ⇒ higher R. Hence metals have a **positive temperature coefficient (PTC)**.\n\nTakeaway: hotter metal = jigglier lattice = slower electrons = higher R.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "Use the \"running through a crowd\" analogy to explain why a metal's resistance rises with temperature.", "answer": "Imagine running through a sports hall containing 500 students standing 1 m apart. If they stand still or sway gently, you can weave through them easily — few collisions, you reach the far end quickly. Now imagine they start jumping around vigorously: you'll collide with them constantly, get knocked off course, and progress much more slowly while expending lots of energy and getting hot. The students are the lattice ions; you are the conduction electron; their motion amplitude is temperature; your speed across the hall is drift velocity. More vigorous jumping (higher T) = more collisions = slower drift = higher resistance. The \"hot and exhausted\" feeling is exactly the Joule heating dissipated in the wire.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "A copper wire's resistance varies approximately linearly with temperature as $$R(\\theta) = R_0(1 + \\alpha\\theta)$$. What does each symbol mean, and why is the relationship not a *proportionality*? (3 steps)", "answer": "- Step 1: $$R_0$$ = resistance at $$0^\\circ\\text{C}$$; $$\\alpha$$ = temperature coefficient of resistance (≈ $$4 \\times 10^{-3}\\,\\text{K}^{-1}$$ for copper); $$\\theta$$ = temperature in $$^\\circ\\text{C}$$.\n- Step 2: Plotting R vs θ gives a straight line — but the y-intercept is $$R_0$$, not zero. The line does NOT pass through the origin.\n- Step 3: A *proportional* relationship would require $$R = k\\theta$$ (zero R at zero θ). Here, even at 0 °C, the metal still has resistance $$R_0$$ because lattice ions are still vibrating (thermal motion never stops above 0 K, and even at 0 K there's zero-point vibration plus impurity scattering). So R is *linear in θ*, but not *proportional to θ*.\n\nTakeaway: linear ≠ proportional; an intercept means there's a non-zero \"floor\" resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "In Core Practical CP7 (resistivity of a wire), you plot R against L. What does the gradient represent, and how do you then extract ρ? (3 steps)", "answer": "- Step 1: From $$R = (\\rho/A) L$$, this has the form $$y = mx$$ with $$y = R$$, $$x = L$$, gradient $$m = \\rho/A$$.\n- Step 2: The plot should be a straight line through the origin (zero length ⇒ zero resistance). Extract the gradient from a best-fit line.\n- Step 3: Compute the cross-sectional area $$A = \\pi(d/2)^2$$ from micrometer measurements of the diameter d (averaged at several positions to handle non-uniformity). Then $$\\rho = \\text{gradient} \\times A$$.\n\nTakeaway: a single linear plot + a diameter measurement gives the material's ρ.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question"
