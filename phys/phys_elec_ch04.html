<script>
const DATA={"selected": [{"question": "Why does a filament lamp draw a momentary \"surge\" of current when first switched on? (3 steps)", "answer": "- Step 1: When cold, the filament's resistance is much lower than its hot operating resistance (about 10× lower) because lattice vibrations are minimal.\n- Step 2: At the instant of switch-on, full mains voltage is applied across this low cold resistance, so $$I = V/R_{\\text{cold}}$$ is large.\n- Step 3: As current flows, $$I^2 R$$ heating rapidly warms the filament; $$R$$ climbs to its hot value within a fraction of a second, and current settles to its steady operating value. This initial spike is why filament lamps tend to fail *at the moment of switching on* — thermal stress on a cold filament.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Why does a filament lamp's I–V graph curve over (gradient decreases) rather than staying linear? (3 steps)", "answer": "- Step 1: At low V, current is small, $$P = I^2 R$$ heating is negligible, filament stays near room T. R is approximately constant — graph starts roughly linear.\n- Step 2: As V increases, I increases too, and the power dissipated $$I^2 R$$ heats the tungsten filament significantly (up to ~3000 K at full brightness).\n- Step 3: Tungsten is a metal (PTC), so as T rises, R rises. With R growing, each additional volt produces *less* additional current than before — the curve flattens (gradient $$\\Delta I/\\Delta V = 1/R$$ decreases). The filament's hot R can be ~10× its cold R, which also explains the brief current \"surge\" when a lamp is first switched on cold.\n\nTakeaway: non-ohmic curve in a filament lamp = Joule heating + PTC feeding back on itself.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Synthesis: Why is it physically impossible for a single I–V graph to simultaneously show Ohm's law obedience AND noticeable Joule heating, for a metal? (3 steps)", "answer": "- Step 1: Joule heating raises the metal's temperature, which raises its resistance (PTC).\n- Step 2: Ohm's law requires R = constant — so its validity depends on T being constant.\n- Step 3: If the I–V test draws enough current to heat the wire detectably, then R changes during the test, the I–V graph curves, and Ohm's law no longer applies. Conversely, if you keep the current small enough that heating is negligible, then T (and R) stays constant and the graph is linear — Ohm's law works. The two regimes are mutually exclusive: linear graph ⟺ negligible heating; visible heating ⟺ curved graph.\n\nTakeaway: Ohm's law is the low-current, isothermal limit of metal behaviour.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "Synthesis: predict and explain — if a superconductor is carrying a large current and you suddenly raise its temperature above $$T_c$$, what happens? (3 steps)", "answer": "- Step 1: Above $$T_c$$, the material reverts to a normal conductor with nonzero R.\n- Step 2: The current (still large from the superconducting phase) now flows through this finite resistance, so power $$P = I^2 R$$ is suddenly dissipated as heat.\n- Step 3: Because the current is large and R was zero a moment ago, the sudden onset of dissipation is intense — the material heats rapidly, often catastrophically (a \"quench\" in superconducting magnets). This is a major engineering concern in MRI and accelerator magnets: a localized warming above $$T_c$$ can dump megajoules of stored magnetic energy as heat, potentially damaging the coils. Quench-protection circuits exist precisely to manage this.\n\nTakeaway: zero R + large I = stored energy with nowhere to dissipate; restoring R unleashes it all at once.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Why doesn't a metal show the same temperature behaviour as a semiconductor, when *both* are made of atoms with bound electrons?", "answer": "The crucial difference is in the number density $$n$$ of free charge carriers. In a metal, free electrons are abundant *at all temperatures*: roughly one per atom, and $$n \\sim 10^{28}\\,\\text{m}^{-3}$$, essentially independent of T (small thermal changes don't add appreciable carriers because there's already a \"sea\" of them). In a semiconductor, by contrast, the number of free carriers at room temperature is *vastly smaller* and *strongly* temperature-dependent — bound electrons must be thermally promoted across an energy gap to become mobile. So temperature does two things in both materials (more lattice vibration → slower drift; and possibly more carriers), but in a metal only the first matters (n is \"saturated\"), whereas in a semiconductor the second dominates by orders of magnitude. Different starting populations of free carriers ⇒ different dominant effect ⇒ opposite sign of dR/dT.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "Why does the resistance of a metallic conductor *increase* as its temperature rises? Give the mechanism step by step. (5 steps)", "answer": "- Step 1: Raising T increases the **amplitude of vibration** of the positive lattice ions about their fixed positions — they jiggle more vigorously.\n- Step 2: Conduction electrons drifting through the metal now have a **higher probability of colliding** with the lattice ions (the ions present a \"bigger target\" in time-averaged sense).\n- Step 3: More frequent collisions reduce the average **drift velocity** $$v$$ of electrons.\n- Step 4: In $$I = nAvq$$, for a metal $$n$$ (number density of free electrons) does **not** depend on T, and $$A, q$$ are fixed. So lower $$v$$ directly means lower $$I$$ at the same applied V.\n- Step 5: From $$R = V/I$$: lower I at same V ⇒ higher R. Hence metals have a **positive temperature coefficient (PTC)**.\n\nTakeaway: hotter metal = jigglier lattice = slower electrons = higher R.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Combine your knowledge: a copper wire is being used as a current-carrying transmission line. As current rises, *resistance* of the wire also rises (because it heats). Walk through why power transmission via *superconducting* cables is qualitatively different. (4 steps)", "answer": "- Step 1: In a copper transmission line, $$I^2 R$$ heating raises the wire's temperature, which raises $$R$$ (PTC of copper). The wire dissipates power $$P_{\\text{loss}} = I^2 R$$, which grows non-trivially with load and self-heating.\n- Step 2: At national-grid scale, these losses can amount to several percent of transmitted power — a huge absolute energy waste.\n- Step 3: A superconducting cable, below $$T_c$$, has $$R = 0$$ identically. No matter how much current flows (up to the critical current), $$I^2 R = 0$$. No heating, no self-induced rise in $$R$$.\n- Step 4: The catch: the superconducting cable must be kept below $$T_c$$ by cryogenic cooling, which itself consumes power. The technology is worth it only when the saved transmission losses exceed the cooling overhead — typically over long distances and at high currents.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "A NTC thermistor is in series with a fixed resistor and a battery. The thermistor is *cooled*. What happens to (a) the total resistance, (b) the current, and (c) the p.d. across the thermistor? (3 steps)", "answer": "- Step 1: Cooling NTC ⇒ fewer free carriers ⇒ thermistor's resistance **rises**. Total circuit resistance therefore **increases**.\n- Step 2: With the same EMF and higher total R, by $$I = \\text{EMF}/R_\\text{total}$$, current **decreases**.\n- Step 3: The thermistor now has both a larger resistance AND carries a smaller current — but in a series circuit, the voltage divides in proportion to resistance. Since the thermistor took a larger share of the total resistance, the p.d. across it **increases**. (You can verify: $$V_\\text{therm} = I \\cdot R_\\text{therm}$$; R rose faster than I fell.)\n\nTakeaway: cooling NTC ⇒ R_total ↑, I ↓, V_therm ↑. This is the principle of temperature-sensing potential dividers.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Why does resistance in a metal conductor increase with temperature? What happens to electron flow? (3 steps)", "answer": "- Step 1: Increased temperature amplifies lattice ion vibrations. These vibrations scatter conduction electrons more frequently.\n+ Analogy: Imagine students jumping vs. standing still in a hallway—more collisions hinder motion.\n- Step 2: More collisions reduce electron drift velocity ($$v$$) in $$I = nAvq$$. With fewer collisions, electrons move slower.\n- Step 3: Lower current ($$I$$) for fixed voltage ($$V$$) implies higher $$R = V/I$$. This gives metals a positive temperature coefficient (PTC).\n+ Misconception Probe: Why doesn’t free electron density ($$n$$) in metals change? In metals, $$n$$ is fixed by atomic structure, unlike semiconductors.", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "A filament lamp has a much lower resistance when it is off (room temperature) than when it is fully lit. What happens to the current at the exact moment the lamp is switched on, and why? (3 steps)", "answer": "- Step 1: At the exact moment of switch-on, the filament is cold, so its resistance is very low.\n- Step 2: Because $$I = V/R$$, applying the full mains voltage across this very low resistance results in a momentary surge of current that is much higher than the normal operating current.\n- Step 3: This massive surge current causes rapid heating ($$P = I^2R$$), which increases the resistance, which in turn reduces the current back down to a steady operating level. This is why filament bulbs usually burn out exactly at the moment they are switched on.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "In CP7, why should you measure the wire's diameter at several positions along its length and use a micrometer (not a ruler)?", "answer": "Two reasons. **(1) Non-uniformity:** real wires are not perfectly cylindrical — the diameter varies slightly along the length due to manufacturing tolerances. Averaging several measurements gives a more representative A. **(2) Sensitivity of A to d:** because $$A = \\pi(d/2)^2$$, area depends on the *square* of diameter — so a 2% error in d gives a 4% error in A and hence a 4% error in ρ. A ruler can only resolve ~1 mm, which would give >100% error on a wire ~0.5 mm thick; a micrometer resolves ~0.01 mm, giving ~2% accuracy. The squared dependence makes diameter the experiment's biggest error source — measure it carefully.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "Why is \"$$R = 0$$\" such a powerful property — what physical consequence does it have for power dissipation, and why does this matter for applications? (3 steps)", "answer": "- Step 1: Power dissipated in a resistor is $$P = I^2 R$$. If $$R = 0$$, then $$P = 0$$ regardless of how large $$I$$ is. No Joule heating, no energy wasted as heat.\n- Step 2: This means a superconductor can carry *enormous* currents without overheating — limited only by the critical current and critical magnetic field of the material, not by thermal management.\n- Step 3: Consequences: (a) electromagnets can be made far stronger than normal (used in MRI scanners, particle accelerators); (b) power cables can transmit electricity with zero loss; (c) magnetic levitation (maglev) becomes practical because of the strong, stable fields.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "A student says: \"If I cool a metal wire to absolute zero, its resistance must reach zero — that makes it a superconductor.\" Identify the misconception. (3 steps)", "answer": "- Step 1: Cooling a metal does *reduce* its resistance gradually (PTC behaviour: $$R = R_0(1+\\alpha\\theta)$$ decreases as θ decreases), but it does *not* reach zero smoothly. Even at 0 K, normal metals retain a finite \"residual resistance\" from impurities, defects, and lattice imperfections (impurity scattering doesn't go away with temperature).\n- Step 2: A superconductor is qualitatively different: at a specific critical temperature $$T_c$$, the resistance drops *discontinuously* — a cliff edge, not a gentle approach. This is a phase transition.\n- Step 3: Not every metal is a superconductor. Some materials (e.g. mercury, niobium, certain ceramics) undergo this transition; others (e.g. copper, gold) never do, regardless of how cold you make them. So cooling alone is insufficient — the material must have the right physics to enable the transition.\n\nTakeaway: superconductivity is a discrete phase change in *specific* materials, not the natural limit of cooling any conductor.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Why can you NOT use the gradient of an I–V curve to find the resistance of a non-ohmic component? (3 steps)", "answer": "- Step 1: For a non-ohmic component (e.g. filament lamp, diode), the I–V graph is a *curve*, not a straight line. The gradient $$\\mathrm{d}I/\\mathrm{d}V$$ changes from point to point.\n- Step 2: The gradient at any single point gives a *differential* quantity (how I changes with a small change in V near that point), not the actual ratio $$V/I$$. These are different numbers on a curve.\n- Step 3: Resistance is defined as $$R = V/I$$ at a *specific operating point*. You must read both V and I at the point of interest and divide them — never use the slope of the curve.\n\nTakeaway: on a curve, \"gradient ≠ 1/R.\" Always go back to the definition.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "If you need to find the p.d. at which a non-ohmic component has a resistance of exactly 50 Ω, you must use a graphical intersection method. Explain why a direct calculation using $$V = IR$$ fails and how the intersection method works. (4 steps)", "answer": "- Step 1: A direct calculation using $$V = IR$$ fails because you have two unknowns: both $$V$$ and $$I$$ are changing simultaneously on the non-ohmic curve. You cannot assume the current from a previous operating point.\n- Step 2: To solve this, you draw a straight line through the origin representing the constant resistance of 50 Ω. On an I–V graph, this line has a gradient of $$1/R = 1/50$$.\n- Step 3: Any point on this straight line satisfies the condition $$R = 50 \\ \\Omega$$. However, the component must also obey its own physical behavior (its I–V curve).\n- Step 4: The intersection point of the 50 Ω line and the component's I–V curve is the *only* point where both conditions are met simultaneously. Reading the x-coordinate of this intersection gives the required p.d.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "Compare the temperature dependence of resistance in metals (PTC) and semiconductors (NTC). Why is their behavior opposite? (3 steps)", "answer": "- Step 1: Metals (PTC): Higher $T$ → stronger lattice vibrations → more electron collisions → $R$ increases.  \n- Step 2: Semiconductors (NTC): Higher $T$ → more free electrons released → $n$ increases dramatically → $R$ decreases.  \n- Step 3: The mechanisms oppose each other: lattice vibrations raise $R$ in metals, while free carrier density lowers $R$ in semiconductors.  \n\n**Critical Thinking:** Why doesn’t the NTC’s lattice vibration effect dominate? Because the exponential increase in $n$ overwhelms the small rise in collisions.", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "Compare the resistivity of a good normal conductor (e.g. copper) with that of a superconductor below $$T_c$$, in orders of magnitude.", "answer": "Copper has $$\\rho \\approx 1.7 \\times 10^{-8}\\,\\Omega\\cdot\\text{m}$$ — already one of the best normal conductors. A superconductor below $$T_c$$ has $$\\rho$$ effectively zero; experimental upper limits place it below $$\\sim 10^{-25}\\,\\Omega\\cdot\\text{m}$$ or so (often quoted as ~$$10^{-18}$$ in textbooks as a conservative figure), which is at least 10 orders of magnitude lower than copper. This isn't \"twice as good\" or \"ten times as good\" — it's a difference of factors so vast they cannot be meaningfully compared on a linear scale. Functionally, you should treat the superconductor as having genuinely zero resistivity.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Synthesis: A copper wire and an NTC thermistor are both heated from 20 °C to 80 °C. Sketch qualitatively how each one's current changes if connected to the same battery, and explain. (3 steps)", "answer": "- Step 1: **Copper wire (PTC):** as T rises, lattice vibration increases, drift velocity decreases, R increases. With fixed V (battery EMF), $$I = V/R$$ decreases. Current falls modestly (small percentage change over this T range).\n- Step 2: **NTC thermistor:** as T rises, the number of free charge carriers $$n$$ increases substantially (often near-exponentially), so R decreases substantially. With same V, current *increases* — and far more dramatically than the metal's current decreases.\n- Step 3: Putting them in series with the same source would give qualitatively *opposite* current responses to the same temperature change — exactly the property exploited in temperature-sensing circuits, where the NTC's dramatic resistance change provides a sensitive readout while a metal-wire reference stays nearly constant.\n\nTakeaway: same temperature change, opposite current responses — driven by which factor (n or v) dominates in the material.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Compare the temperature-resistance behavior of metals (PTC) and semiconductors (NTC). Explain the mechanisms. (4 steps)", "answer": "- Step 1: Metals (PTC):\n  + Temperature ↑ → lattice vibrations ↑ → more electron collisions → drift velocity ↓ → $$I$$ ↓ → $$R = V/I$$ ↑\n- Step 2: Semiconductors (NTC):\n  + Temperature ↑ → more free electrons released → $$n$$ ↑ → $$I$$ ↑ → $$R = V/I$$ ↓\n+ Analogy: Metal = crowded hallway with jumping students; semiconductor = students breaking free from desks.\n- Step 3: Metals: $$R \\propto T$$. Semiconductors: $$R \\propto 1/T$$.\n- Step 4: Graphically: Metal’s $$R$$-vs-$$T$$ is linear increasing; semiconductor’s curve is steeply decreasing.\n+ Misconception Probe: Why opposite behaviors? Metals have fixed $$n$$, semiconductors have $$n$$ dependent on thermal energy.", "source": "Qwen 3 ②", "_id": "qwen_2_8"}, {"question": "Why does an NTC thermistor's resistance *decrease* as its temperature rises — the opposite of a metal? (4 steps)", "answer": "- Step 1: An NTC thermistor is made of a **semiconductor**, where electrons are bound in covalent bonds and only \"escape\" to become free carriers if they gain enough thermal energy.\n- Step 2: Raising T gives more thermal energy to the bound electrons, so more of them break free. The number density of charge carriers $$n$$ in $$I = nAvq$$ **increases dramatically** with T (often exponentially).\n- Step 3: This effect *vastly* outweighs the reduction in drift velocity v from increased lattice vibrations (which still happens, as in metals).\n- Step 4: With $$n$$ rising much faster than $$v$$ is falling, the net product $$nv$$ rises, so I rises for the same V, and from $$R = V/I$$, R falls.\n\nTakeaway: in metals, n is fixed and v dominates ⇒ R↑ with T. In semiconductors, n is variable and dominates ⇒ R↓ with T.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "A common misconception is that a resistor \"stores\" electrons, slowing the flow by accumulating charge inside. Why is this physically incorrect, and what actually happens to the electrons? (3 steps)", "answer": "- Step 1: If a resistor stored electrons, charge would build up inside it, creating a massive repulsive force that would immediately stop any further current. In a series circuit, current is the same everywhere; charge does not accumulate.\n- Step 2: What actually happens is that the electrons collide with the lattice ions, which reduces their drift velocity. The \"rate of flow\" drops, meaning fewer electrons pass a given point per second.\n- Step 3: The total number of electrons entering the resistor equals the number leaving it; they just exit moving slower. The resistor slows the *traffic*, it does not *park the cars*.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "Why would using a superconducting cable for power transmission save energy compared to copper, even though copper already has a low resistivity?", "answer": "Copper's resistivity is low but not zero — it's about $$1.7 \\times 10^{-8}\\,\\Omega\\cdot\\text{m}$$. Over hundreds of kilometres of high-current transmission, the accumulated $$I^2R$$ losses are substantial — typically several percent of the transmitted power dissipated as heat. For a country-scale grid moving gigawatts, that's many megawatts of waste, plus the cost of generating capacity to replace it. A superconducting cable has $$R = 0$$ *exactly*, so $$P_\\text{loss} = I^2 \\cdot 0 = 0$$. No matter how long the line or how large the current, no energy is lost to heating. The catch: maintaining the cable below $$T_c$$ requires cryogenic cooling, which itself costs energy — so the economic case depends on whether the cooling cost is less than the $$I^2R$$ savings. For very long, high-current lines, it can be.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "A non-ohmic component shows $$I = 40\\,\\text{mA}$$ when $$V = 0.70\\,\\text{V}$$. Roughly what is its resistance at that operating point? (2 steps)", "answer": "- Step 1: Convert: $$40\\,\\text{mA} = 0.040\\,\\text{A}$$ (milli = $$10^{-3}$$, NOT micro = $$10^{-6}$$).\n- Step 2: $$R = V/I = 0.70/0.040 \\approx 17.5\\,\\Omega$$. Mentally: 0.7 divided by 0.04 ≈ 17–18 Ω.\n\nTakeaway: for any component (ohmic or not) at a known operating point, just divide.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "Starting from the geometric formula for the resistance of a uniform wire, derive an expression for resistivity $$\\rho$$ and explain physically why $$R$$ grows with length and shrinks with cross-sectional area. (4 steps)", "answer": "- Step 1: For a uniform wire, $$R = \\rho L / A$$. Rearranging: $$\\rho = RA/L$$, with units $$\\Omega \\cdot \\text{m}^2 / \\text{m} = \\Omega \\cdot \\text{m}$$.\n- Step 2: Why $$R \\propto L$$: a longer wire means electrons must traverse more lattice, encountering more collisions. Two wires in series add resistances — doubling length is like putting two identical wires in series.\n- Step 3: Why $$R \\propto 1/A$$: a thicker wire provides more parallel \"channels\" for electrons to flow. Two wires in parallel halve the resistance — doubling $$A$$ is like having two identical wires in parallel.\n- Step 4: $$\\rho$$ encodes everything else — how easily electrons drift through this *material*, which depends on the number density $$n$$ of charge carriers and how strongly they're scattered (temperature, impurities).", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Why does a thermistor (NTC) decrease in resistance with temperature? How does this differ from metals? (3 steps)", "answer": "- Step 1: In semiconductors, higher temperature releases more free electrons, increasing charge carrier density ($$n$$).\n+ Example: An NTC thermistor in a circuit conducts more current as temperature rises.\n- Step 2: Increased $$n$$ overpowers any rise in lattice vibrations, leading to lower resistance ($$R = V/I$$).\n- Step 3: Unlike metals (PTC), semiconductors have a negative temperature coefficient (NTC)—resistance drops with temperature due to more free carriers.\n+ Misconception Probe: Why don’t vibrations dominate in semiconductors? The surge in free carriers outweighs vibration effects, unlike metals.", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "Above its critical temperature, how does a superconductor behave, and what does its $$R$$-vs-$$T$$ curve look like at exactly $$T_c$$? (3 steps)", "answer": "- Step 1: Above $$T_c$$, the material is just an ordinary conductor (often a metal). Its resistance follows the standard metallic behaviour — roughly linear increase with $$T$$.\n- Step 2: At exactly $$T = T_c$$, there is a phase transition: the resistance drops discontinuously (vertical cliff) from a finite value to exactly zero.\n- Step 3: This sharpness is a defining feature — it's not a gradual decrease but a sudden change of state, like water freezing. Below $$T_c$$, $$R$$ stays pinned at zero.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "A filament lamp converts most of its electrical power into heat, with only a small fraction emitted as visible light. Why is an LED much more efficient for lighting? (3 steps)", "answer": "- Step 1: A filament lamp produces light because the filament gets so hot (~3000 K) that it glows incandescently. The vast majority of emitted radiation is infrared (heat), and only a small slice falls in the visible spectrum.\n- Step 2: All the $$I^2 R$$ power dissipation goes into heating first; light is a *byproduct* of being incandescent. Efficiency is fundamentally limited by the blackbody spectrum of the filament temperature.\n- Step 3: An LED produces light through a direct electronic process (electron-hole recombination) at low temperature, emitting almost exclusively in a narrow visible band. There is far less waste heat, so a much larger fraction of input power becomes visible light — typically 5–10× more efficient.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Why must the ammeter be ideally zero-resistance and the voltmeter ideally infinite-resistance when measuring R = V/I? (2 steps)", "answer": "- Step 1: The ammeter sits *in series* with the component, so any resistance it has would add to the circuit's resistance and reduce the current — giving a falsely high reading of R. Ideal $$R_A = 0$$ avoids this.\n- Step 2: The voltmeter sits *in parallel*, so any finite resistance lets a sneak current flow through it, diverting current away from the ammeter — making the ammeter under-read. Ideal $$R_V = \\infty$$ means zero current through the voltmeter, and the ammeter reads the true component current.\n\nTakeaway: ideal meters minimise perturbation of the very circuit they're measuring.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "A student claims: \"When current flows through a resistor, electrons get stored inside it — that's why the current coming out is less than the current going in.\" What is wrong with this claim? (3 steps)", "answer": "- Step 1: In any series circuit, conservation of charge requires the current to be the *same* at every point — what goes in must come out at every instant. Electrons are not accumulated inside a resistor.\n- Step 2: A resistor doesn't *reduce the number* of electrons flowing; it reduces the *drift velocity*. The same number of electrons enter and leave per second, but each one travels more slowly because of lattice collisions.\n- Step 3: The energy lost per electron (transferred to heat) is what makes a resistor \"consume\" power, not any storage of charge. Charge storage is the job of capacitors, not resistors.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Conceptual contrast: why are the words \"resistance increases\" appropriate for a metal heated up, but \"more charge carriers\" the correct keyword for an NTC thermistor heated up?", "answer": "Both materials have the same kind of heating happening (lattice vibrations rise), but the *cause of the resistance change* is different in each. For a **metal**, the population of free electrons $$n$$ is essentially fixed regardless of temperature, so the only way temperature affects current is via the drift velocity — more vibrations ⇒ slower drift ⇒ less current ⇒ more resistance. So \"increased vibrations / reduced drift velocity\" is the correct mark-scheme explanation. For a **semiconductor**, the number of free carriers is NOT fixed; raising T thermally promotes more electrons into the conduction band. The increase in $$n$$ is so large that it dominates — even though drift velocity also drops, current goes UP and resistance falls. So \"more charge carriers released\" is the mark-scheme keyword. Using \"fewer collisions\" for the NTC case is wrong: there are MORE collisions, but it doesn't matter because n is rising faster.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Why are the units of resistivity $$\\Omega\\cdot\\text{m}$$ and NOT $$\\Omega/\\text{m}$$? (2 steps)", "answer": "- Step 1: Rearranging $$R = \\rho L/A$$ gives $$\\rho = RA/L$$. Units: $$[\\Omega] \\cdot [\\text{m}^2] / [\\text{m}] = \\Omega\\cdot\\text{m}$$.\n- Step 2: Intuitively, resistivity has to \"scale up\" by length and \"scale down\" by area to give resistance. The factor of length is multiplicative in the units, hence $$\\Omega\\cdot\\text{m}$$. Writing $$\\Omega/\\text{m}$$ would dimensionally be wrong (it would give R in $$\\Omega/\\text{m}^3$$ — meaningless).\n\nTakeaway: always dimension-check: $$[\\rho][L]/[A]$$ must give $$[R]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Synthesis: A thin tungsten filament and a thick copper wire are both carrying the same current. Which heats up more, and why does this connect to choices of materials for lamps vs cables? (4 steps)", "answer": "- Step 1: Both have $$R = \\rho L/A$$. Tungsten has higher $$\\rho$$ than copper, AND the filament is thin (small A), AND can be relatively long when coiled — so R_tungsten ≫ R_copper.\n- Step 2: At the same current, $$P = I^2 R$$ — power dissipated scales linearly with R. So the filament dissipates orders of magnitude more power than the copper wire.\n- Step 3: The filament's small thermal mass and large dissipated power drive it to ~3000 K, where it glows white-hot (radiating visible light). The copper wire stays barely warm.\n- Step 4: This is *by design*: lamps want high-resistance materials that heat up to incandescence (high ρ, thin geometry); cables want the *opposite* — low ρ, thick wire — so they carry current with minimal heating. The same physics ($$P = I^2 R$$) drives both choices in opposite directions.\n\nTakeaway: same equation, opposite engineering goals — \"do dissipate\" vs \"don't dissipate.\"", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "Where does the power $$P = IV$$ dissipated in a resistor actually *go*, physically?", "answer": "It goes into thermal energy in the lattice — and sometimes into light. The mechanism is the same collisions that cause resistance: each electron, accelerated by the applied field, gains kinetic energy and then loses it on impact with a vibrating lattice ion, transferring that energy into increased lattice vibration (i.e. heat). On the macroscopic scale, the resistor's temperature rises (and it radiates heat to the environment). In a filament lamp, the lattice gets hot enough to emit visible light as black-body radiation — but most of the dissipated power is still wasted as heat, which is why filament lamps are inefficient compared to LEDs.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "A common exam phrasing: \"Explain why the resistance of a metallic wire increases when its temperature is raised.\" Sketch the ideal four-step answer aligned to mark-scheme keywords. (4 steps)", "answer": "- Step 1: State the cause: as temperature increases, the *amplitude of vibration of the lattice ions increases*.\n- Step 2: Consequence for collisions: this leads to *more frequent collisions* between the conduction electrons and the lattice ions.\n- Step 3: Effect on drift velocity: the *drift velocity of the electrons is reduced* (with $$n$$, $$A$$, $$q$$ constant in $$I = nAvq$$).\n- Step 4: Effect on resistance: at the same p.d., a lower current means $$R = V/I$$ is *higher* — so resistance increases.\n\nEach step is typically one mark; missing any of the four loses marks. Avoid vague language like \"electrons can't get through\" — be specific about collisions, drift velocity, and current.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "A non-ohmic component has an $$I$$-$$V$$ curve. You're asked: \"At what p.d. is the resistance equal to $$50\\,\\Omega$$?\" Why can't you just use $$V = IR$$ with $$I$$ from another point on the curve, and what's the correct *graphical* method? (4 steps)", "answer": "- Step 1: For a non-ohmic component, $$I$$ and $$V$$ change *together* in a non-proportional way. A current value from one point on the curve doesn't apply at the new operating point.\n- Step 2: The condition \"$$R = 50\\,\\Omega$$\" defines a line through the origin on the $$I$$-$$V$$ graph: every point on that line satisfies $$V/I = 50$$, i.e. $$I = V/50$$.\n- Step 3: To find the actual operating point, draw the line $$I = V/50$$ on the same axes as the component's curve. Pick a convenient test point — e.g. $$V = 0.6\\,\\text{V}$$ gives $$I = 0.012\\,\\text{A}$$ — to anchor the line.\n- Step 4: Where the straight line *intersects* the component's curve is the unique point that satisfies both: (a) the component's own $$I$$-$$V$$ relationship, and (b) $$R = V/I = 50$$. Read the $$V$$-coordinate at the intersection — that's the answer.\n\nThis is essentially a \"load line\" technique used in electronics.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "Use the \"running through a crowd\" analogy to explain why a metal's resistance rises with temperature.", "answer": "Imagine running through a sports hall containing 500 students standing 1 m apart. If they stand still or sway gently, you can weave through them easily — few collisions, you reach the far end quickly. Now imagine they start jumping around vigorously: you'll collide with them constantly, get knocked off course, and progress much more slowly while expending lots of energy and getting hot. The students are the lattice ions; you are the conduction electron; their motion amplitude is temperature; your speed across the hall is drift velocity. More vigorous jumping (higher T) = more collisions = slower drift = higher resistance. The \"hot and exhausted\" feeling is exactly the Joule heating dissipated in the wire.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "Give three applications of superconductors and for each explain *why* zero resistance specifically enables it. (3 steps)", "answer": "- Step 1: *MRI scanners and strong electromagnets.* Producing a strong, stable magnetic field needs a very large current in a coil. In a normal copper coil, $$I^2 R$$ heating would melt the wire. With $$R = 0$$, huge currents flow without heating — yielding strong fields for medical imaging.\n- Step 2: *Lossless power transmission.* In conventional cables, several percent of power is wasted as heat over long distances. With superconducting cables, $$P = I^2 R = 0$$, so all delivered power reaches the load. Critical at scale (national grids).\n- Step 3: *Maglev trains.* Powerful onboard superconducting magnets repel the track, levitating the train (no friction). Sustaining the field requires continuous current, which is only feasible without dissipation.\n\n(Bonus: particle accelerators like the LHC use superconducting magnets to steer protons precisely.)", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "A student says: \"In both metals and semiconductors, lattice vibrations increase with temperature, so resistance must increase in both.\" Where does this reasoning break down? (3 steps)", "answer": "- Step 1: The statement about lattice vibrations is correct — they do increase in both materials, and they do reduce drift velocity in both cases.\n- Step 2: The reasoning misses that for a *semiconductor*, the dominant effect of temperature is on $$n$$ (carrier density), not on $$v$$. The increase in $$n$$ is exponential and overwhelms the modest decrease in $$v$$.\n- Step 3: For a metal, $$n$$ is set by the electron sea and is essentially constant with temperature, so only the $$v$$ effect matters — hence $$R$$ rises. The two materials differ in *which factor in $$I=nAvq$$ is temperature-sensitive*.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "In CP7, why is it important to keep the current through the wire small (e.g. <0.5 A) during the measurement?", "answer": "A larger current would cause significant Joule heating ($$P = I^2 R$$), warming the wire above room temperature. Since metals are PTC, this would *raise* the wire's resistivity during the experiment, so different points on the R-vs-L plot would correspond to *different* temperatures — corrupting the assumption that ρ is constant along the line. Keeping I small ensures the heating is negligible, the wire stays at room temperature throughout, and the gradient $$\\rho/A$$ is a clean measurement of ρ at a single, well-defined temperature. (It also protects the wire from thermal damage.)", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Sketch the I-V graph for a filament lamp. Why does it have this shape? (3 steps)", "answer": "- Step 1: The graph is a curve with a **decreasing gradient** as $$V$$ increases.\n- Step 2: As the p.d. (and thus current) increases, the filament gets hotter due to more frequent electron-ion collisions ($$P = I^2R$$).\n- Step 3: The increasing temperature causes the resistance to increase (PTC). Since $$R = V/I$$ increases, the ratio $$I/V$$ decreases, meaning the gradient ($$1/R$$) of the I-V curve decreases, flattening the curve at higher voltages.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "State Ohm's law precisely, including the condition that must hold, and explain why the condition matters. (3 steps)", "answer": "- Step 1: Ohm's law: the current through a conductor is directly proportional to the potential difference across it, *provided the temperature is constant*. Symbolically, $$I \\propto V$$ at constant $$T$$.\n- Step 2: The temperature condition matters because if current heats the conductor, lattice vibrations increase, $$R$$ changes, and the proportionality breaks down — you'd no longer get a straight line.\n- Step 3: A mark-scheme answer must include *both* \"directly proportional\" *and* \"at constant temperature\". Stating only the first half loses the mark.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Why is it important to say a superconductor's resistivity is *exactly* zero rather than just \"very small\"? (2 steps)", "answer": "- Step 1: \"Very small but nonzero\" R would still dissipate some power $$I^2 R > 0$$, meaning a current set up in a loop would gradually decay as energy is lost. Experimentally, currents in superconducting rings have been observed to persist for years with no measurable decrease — consistent only with R being *exactly* zero, not merely tiny.\n- Step 2: This isn't a quantitative refinement of normal conduction — it's a qualitatively different state of matter (a phase transition). The collective quantum behaviour of paired electrons below $$T_c$$ means no energy can be transferred to the lattice. Saying \"very small\" misses the physics entirely; it's not \"a very good conductor,\" it's a fundamentally different phenomenon.\n\nTakeaway: the word \"exactly\" carries the physics — it's a phase, not a refinement.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Two wires are made of pure copper. Wire A is long and thin; Wire B is short and thick. They have different resistances. Do they have different resistivities? Explain the difference between resistance and resistivity. (3 steps)", "answer": "- Step 1: No, they have the **same resistivity**. Resistivity is an intrinsic property of the *material* (copper), independent of the object's dimensions.\n- Step 2: Resistance is a property of the specific *component* (the wire). It depends on both the material's resistivity and the object's geometry (length and cross-sectional area).\n- Step 3: Because Wire A is long (more material to push through) and thin (less space for electrons to flow), its resistance is higher than Wire B's. However, if you took a tiny cubic sample from either wire, they would exhibit the exact same resistivity.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "What is the difference, physically, between increasing the *length* of a wire and increasing its *temperature*, in terms of why each raises resistance? (3 steps)", "answer": "- Step 1: Increasing length: electrons must traverse more of the lattice, encountering more collisions overall. The *probability of scattering per electron per second per unit length* is unchanged, but the total path is longer. This is a *geometric* effect.\n- Step 2: Increasing temperature: same length, but each unit of path has more vigorously vibrating ions, so the *probability of scattering per unit length increases*. This is a *microscopic / material* effect (raises $$\\rho$$).\n- Step 3: In formula terms: $$R = \\rho L /A$$. Changing $$L$$ holds $$\\rho$$ fixed and scales $$R$$. Changing $$T$$ raises $$\\rho$$ itself, scaling $$R$$ even at fixed geometry. Both raise $$R$$, but through different mechanisms.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "Define a superconductor in the precise language an exam would expect, including what *exactly* zero means. (3 steps)", "answer": "- Step 1: A superconductor is a material whose resistivity drops to *exactly zero* below a characteristic temperature called the *critical temperature* (or *transition temperature*) $$T_c$$.\n- Step 2: \"Exactly zero\" matters: saying \"very low resistance\" is not enough for full marks. Below $$T_c$$, a current can flow indefinitely with no energy loss as heat — there is no dissipation at all.\n- Step 3: A complete answer also gives the condition: \"below $$T_c$$\". Above $$T_c$$, the material behaves as an ordinary conductor with normal resistivity.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "Give TWO applications of superconductors and explain why zero resistance is beneficial in each case. (2 steps)", "answer": "- Step 1: (1) MRI scanners and strong electromagnets: Superconducting coils carry very large currents to produce extremely strong magnetic fields without any heating — impossible with normal copper wires which would overheat. (2) Power transmission cables: Zero resistance means zero power loss (P = I²R = 0), so electricity can be transmitted over long distances without energy wasted as heat.\n- Step 2: Other valid answers: Maglev trains (powerful magnetic levitation without friction), particle accelerators like LHC (precise strong magnetic fields for steering charged particles).\n\nThe key benefit is: no energy loss as heat, enabling huge currents and persistent currents that flow indefinitely.", "source": "MiniMax ②", "_id": "minimax_2_13"}, {"question": "How is the resistance of a component formally defined in terms of the quantities you can measure in a circuit, and what is the SI unit?", "answer": "Resistance is defined as the ratio of the potential difference $$V$$ across a component to the current $$I$$ through it: $$R = V/I$$. The unit is the ohm, where $$1\\ \\Omega = 1\\ \\text{V/A}$$ — one ohm is the resistance that allows one ampere to flow when one volt is applied. Critically, you *divide*, never multiply — a very common slip is writing $$R = IV$$, which is dimensionally power, not resistance. Also, $$R$$ is not a fixed material constant; it depends on the component's geometry and temperature.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "Using $$R = \\rho L / A$$, qualitatively explain why a longer wire has more resistance and a thicker wire has less, in terms of electron flow. (3 steps)", "answer": "- Step 1: **Longer wire (L ↑):** electrons must traverse more lattice ions, suffering more collisions on the journey. More opportunities to lose energy ⇒ more impedance ⇒ higher R. Mathematically, $$R \\propto L$$.\n- Step 2: **Thicker wire (A ↑):** a larger cross-section provides more parallel \"lanes\" for electrons to flow through. More charge carriers can move per second for the same driving field ⇒ larger current ⇒ lower R. Mathematically, $$R \\propto 1/A$$.\n- Step 3: Combined: $$R = \\rho L/A$$ — longer × thinner = higher resistance; shorter × thicker = lower resistance. A short fat wire is the best conductor of a given material.\n\nTakeaway: length resists, area helps.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "A loop of superconducting wire is cooled below $$T_c$$ and a current is induced in it. What happens to that current over time, and why?", "answer": "The current persists indefinitely — for years, decades, in principle forever — with no decrease. The reason is that any current dissipates energy at a rate $$P = I^2 R$$, and for a superconductor below $$T_c$$, R is exactly zero. So the rate of energy loss is zero, the current has no mechanism to lose kinetic energy, and it just keeps circulating. This \"persistent current\" is the most direct experimental proof that R is precisely zero (not merely small) — measured decays place an upper limit on R that is astronomically smaller than even the best normal conductors.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "Why is uncertainty in diameter measurement particularly damaging to the final resistivity result? (3 steps)", "answer": "- Step 1: $$A = \\pi (d/2)^2 \\propto d^2$$. A fractional uncertainty in $$d$$ of $$\\epsilon$$ becomes a fractional uncertainty of $$2\\epsilon$$ in $$A$$.\n- Step 2: $$\\rho = \\text{gradient} \\times A$$, so $$A$$'s uncertainty propagates directly into $$\\rho$$ — a 2% error in $$d$$ becomes a 4% error in $$\\rho$$.\n- Step 3: Compounding this, the wire isn't perfectly cylindrical; measuring $$d$$ at one location can misrepresent the true effective $$d$$. That's why you measure at three (or more) positions and average — and also rotate the wire at each position to catch ellipticity.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "A wire of resistivity $$\\rho$$ and resistance R is stretched to twice its original length, keeping its volume constant. By what factor does its new resistance change? (4 steps)", "answer": "- Step 1: Original: length $$L$$, area $$A$$, volume $$V = LA$$.\n- Step 2: After stretching: length $$L' = 2L$$. Volume conserved: $$L'A' = LA$$, so $$A' = A/2$$.\n- Step 3: New resistance: $$R' = \\rho L'/A' = \\rho (2L)/(A/2) = 4 \\rho L/A = 4R$$.\n- Step 4: Resistance quadruples. Mechanism: stretching makes the wire longer (linear factor 2) AND thinner (area factor 1/2), and both effects raise R, multiplying together.\n\nTakeaway: stretching at constant volume ⇒ R goes up as the square of the stretch factor.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Looking at a typical $$R$$-vs-$$T$$ curve for a metal: extrapolating the linear region back to $$T = 0\\,\\text{K}$$ gives a small but *non-zero* intercept $$R_0$$ rather than $$R = 0$$. Why is this, and how does it differ from a superconductor? (3 steps)", "answer": "- Step 1: Even at very low $$T$$, lattice vibrations decrease but never fully vanish (some quantum zero-point motion), and crucially, there are always *impurities and defects* in the wire that scatter electrons regardless of temperature.\n- Step 2: So a normal metal has a *residual resistance* $$R_0$$ at very low $$T$$ — not zero, just small. The linear $$R = R_0(1 + \\alpha\\theta)$$ captures this with the constant term $$R_0$$.\n- Step 3: A superconductor is fundamentally different: below $$T_c$$, it undergoes a quantum phase transition into a state where electrons pair up and flow without scattering at all. $$R$$ is *exactly* zero, not just small. Impurities and defects no longer cause dissipation in this special state.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "On an I–V graph for a filament lamp, what is the relationship between the gradient at any point and the lamp's resistance at that point, and how does the gradient change as you move to higher V? (3 steps)", "answer": "- Step 1: At a single operating point $$(V, I)$$, the lamp's resistance is $$R = V/I$$ — the ratio, NOT the local gradient.\n- Step 2: The gradient $$\\mathrm{d}I/\\mathrm{d}V$$ is a *different* quantity (the differential conductance). For an ohmic conductor, gradient and 1/R coincide, but for a curving non-ohmic graph they don't.\n- Step 3: As V increases on a filament lamp, the curve flattens — gradient decreases. This reflects increasing R (because heating raises T, which raises R for tungsten). So qualitatively, a decreasing gradient as V grows tells you R is rising — diagnostic of a PTC component being heated.\n\nTakeaway: gradient shape *trends* track R changes, but the actual R value must always come from V/I at the point.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Why must a superconductor be kept *cold* (often near liquid helium or liquid nitrogen temperatures), and what trade-off does this create for practical use? (3 steps)", "answer": "- Step 1: Superconductivity only exists below the critical temperature $$T_c$$. Above $$T_c$$, the material reverts to ordinary metallic behaviour with normal resistance. Typical $$T_c$$: mercury 4.2 K, niobium 9.3 K, YBCO ceramic ~92 K.\n- Step 2: To stay below $$T_c$$, the superconductor must be cooled with cryogenic fluid — liquid helium (4 K, very expensive) for conventional superconductors, or liquid nitrogen (77 K, cheaper) for high-$$T_c$$ ceramics.\n- Step 3: Trade-off: although the superconductor itself dissipates zero power, the *cooling system* consumes significant energy. Whether superconductivity is net-beneficial depends on whether the saved $$I^2 R$$ losses outweigh the cooling overhead. This is why higher-$$T_c$$ materials are the holy grail.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "Contrast the behavior of resistance with temperature for a metal (PTC) and a semiconductor (NTC). (1 step)", "answer": "- **Metal (PTC):** Temperature $$\\uparrow$$ $$\\Rightarrow$$ Resistance $$\\uparrow$$. Caused by increased lattice vibrations.\n- **Semiconductor/NTC Thermistor:** Temperature $$\\uparrow$$ $$\\Rightarrow$$ Resistance $$\\downarrow$$. Caused by increased number of free charge carriers.", "source": "MiniMax ①", "_id": "minimax_1_12"}, {"question": "If you double the current through a resistor (with R unchanged), what happens to the power dissipated, and why does this matter for cables and fuses? (2 steps)", "answer": "- Step 1: $$P = I^2 R$$ — doubling I quadruples P. The quadratic dependence means small increases in current cause disproportionately large heating.\n- Step 2: This is why thick cables are needed for high-current appliances and why fuses are sized carefully. A wire that would only warm gently at the rated current can overheat dangerously (and melt insulation, start fires) at modest overcurrent. The $$I^2$$ factor is the physical reason high-current transmission must be done at *low* current (high voltage), and why fuses must trip *before* I gets too large.\n\nTakeaway: heating scales as current squared — a brutal quadratic in safety calculations.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "In the equation $$I = nAvq$$, identify which factor changes with temperature for (a) a metal, (b) a semiconductor, and use this to predict the sign of the temperature coefficient. (3 steps)", "answer": "- Step 1: For a metal: $$n$$, $$A$$, $$q$$ all fixed; only $$v$$ changes (decreases with $$T$$ due to more lattice scattering). $$I$$ drops → $$R$$ rises → PTC (positive coefficient).\n- Step 2: For a semiconductor: $$A$$ and $$q$$ fixed; both $$n$$ and $$v$$ change with $$T$$. But $$n$$ rises exponentially (more electrons freed thermally), while $$v$$ falls modestly. The $$n$$ effect dominates by far.\n- Step 3: Net effect for a semiconductor: $$I$$ rises → $$R$$ falls → NTC (negative coefficient). The drift-velocity equation neatly captures *why* the two materials respond oppositely: different factors are temperature-sensitive in each.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "Same two resistors (100 Ω and 200 Ω), now connected in *parallel* across a battery. Which dissipates more power? (3 steps)", "answer": "- Step 1: In parallel, the voltage $$V$$ across each is the *same*. Use $$P = V^2/R$$.\n- Step 2: With $$V$$ common, $$P \\propto 1/R$$. The 100 Ω resistor dissipates twice the power of the 200 Ω resistor.\n- Step 3: Intuition: in parallel, the smaller resistor lets more current through. Same voltage × bigger current = more power. The lower-resistance branch \"carries the load\".\n\nKey insight: the answer flips compared to the series case — the dependence of $$P$$ on $$R$$ inverts when you switch from constant-$$I$$ to constant-$$V$$ conditions.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "Define resistance and state its SI unit. (3 steps)", "answer": "- Step 1: Resistance is defined as the ratio of the potential difference ($$V$$) across a component to the current ($$I$$) flowing through it.\n- Step 2: Mathematically, this is expressed as $$R = \\frac{V}{I}$$. It measures how much a component opposes the flow of electric charge.\n- Step 3: The SI unit of resistance is the ohm ($$\\Omega$$), which is equivalent to one volt per ampere ($$1 \\text{ V/A}$$).", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A student writes $$R = I \\times V$$ to calculate resistance. Identify the mistake and explain why the correct formula makes physical sense. (3 steps)", "answer": "- Step 1: The formula is incorrect; resistance is $$R = V / I$$, not $$R = IV$$.\n- Step 2: Physically, resistance opposes current. For a fixed voltage, a higher resistance should result in *less* current.\n- Step 3: In $$R = V/I$$, if $$V$$ is constant and $$R$$ increases, $$I$$ must decrease, which matches the physics. If it were $$R = IV$$, higher resistance would imply *more* current, which contradicts what resistance fundamentally does.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "At the microscopic level, what causes a metal wire to have electrical resistance? (3 steps)", "answer": "- Step 1: In a metal, positive ions are arranged in a rigid lattice, and free (conduction) electrons drift through this lattice under an applied electric field.\n- Step 2: As electrons drift, they repeatedly collide with the vibrating lattice ions, transferring kinetic energy to the lattice.\n- Step 3: These collisions impede the net flow of electrons, reducing their drift velocity. This opposition to the flow of charge is the microscopic origin of resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "A student says \"A resistor stores the extra electrons that are blocked from flowing.\" Correct this misconception. (3 steps)", "answer": "- Step 1: A resistor does not accumulate or store charge. By the conservation of charge, the current entering a resistor equals the current leaving it.\n- Step 2: Instead of storing electrons, the resistor slows them down. The collisions with the lattice reduce the *drift velocity* of the electrons.\n- Step 3: A slower drift velocity means a lower rate of charge flow (current), not a buildup of electrons inside the component.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "To measure the resistance of an unknown component $$R_x$$, how should an ammeter and voltmeter be connected, and what are their ideal resistances? (3 steps)", "answer": "- Step 1: The ammeter must be connected in **series** with $$R_x$$ to measure the total current through it. An ideal ammeter has **zero resistance** so it does not reduce the current it is measuring.\n- Step 2: The voltmeter must be connected in **parallel** across $$R_x$$ to measure the potential difference across it. An ideal voltmeter has **infinite resistance** so that no current diverts through it, which would otherwise lower the current through $$R_x$$.\n- Step 3: The resistance is then calculated using $$R_x = V/I$$ from the meter readings.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "State Ohm's law. Why is the temperature condition crucial? (3 steps)", "answer": "- Step 1: Ohm's law states that the current through a conductor is directly proportional to the potential difference across it, **provided that the temperature remains constant**.\n- Step 2: The temperature condition is crucial because if the component heats up (like a filament lamp), its internal structure changes, causing its resistance to change.\n- Step 3: If resistance changes, the ratio $$V/I$$ is no longer a constant, so $$I$$ is no longer proportional to $$V$$, and Ohm's law no longer applies.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "For an ohmic conductor, what does its I-V characteristic graph look like, and how do you determine its resistance from the graph? (3 steps)", "answer": "- Step 1: The I-V graph for an ohmic conductor is a **straight line passing through the origin**.\n- Step 2: Because $$I \\propto V$$, the gradient of this line is $$\\Delta I / \\Delta V = 1/R$$.\n- Step 3: Therefore, resistance is the **reciprocal of the gradient**: $$R = 1 / \\text{gradient}$$. A steeper line means a lower resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "For a non-ohmic conductor (e.g., a filament lamp), how do you calculate its resistance at a specific operating point on its I-V curve? (3 steps)", "answer": "- Step 1: You **cannot** use the gradient of the curve at that point, because resistance is not constant for a non-ohmic component.\n- Step 2: Instead, read the specific values of potential difference $$V$$ and current $$I$$ at that exact operating point directly from the axes.\n- Step 3: Calculate the resistance using the definition $$R = V/I$$ for those specific coordinates. This gives the effective resistance at that specific state.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "A non-ohmic component has 10 V across it and 2 A through it. What is its resistance at this point, and why can't you find this using the graph's gradient? (3 steps)", "answer": "- Step 1: Resistance is defined as $$R = V/I$$. At this point, $$R = 10 / 2 = 5 \\ \\Omega$$.\n- Step 2: You cannot use the gradient because the component is non-ohmic, meaning its resistance is not constant.\n- Step 3: The gradient gives $$dI/dV$$ (which is $$1/R$$ only if R is constant), not the ratio of total V to total I at that specific operating point.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Define resistivity. How does it fundamentally differ from resistance? (3 steps)", "answer": "- Step 1: Resistivity ($$\\rho$$) is an intrinsic property of a material that indicates how strongly that specific material opposes the flow of current. Its SI unit is $$\\Omega \\cdot \\text{m}$$.\n- Step 2: Resistance ($$R$$) is a property of a specific *component*, depending on its dimensions (length and cross-sectional area) as well as the material and temperature.\n- Step 3: The key difference: Resistivity is independent of shape and size (it's purely the material), whereas resistance changes if you stretch or thicken the wire.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A wire has length $$L$$ and cross-sectional area $$A$$. Explain intuitively why resistance is proportional to $$L$$ and inversely proportional to $$A$$. (3 steps)", "answer": "- Step 1: **Length ($$L$$)**: A longer wire means electrons must travel through more of the lattice, encountering more ions and thus more collisions. More collisions = higher resistance.\n- Step 2: **Area ($$A$$)**: A thicker wire provides more parallel paths for electrons to drift through. More paths = easier flow = lower resistance.\n- Step 3: This leads to the relationship $$R \\propto L/A$$, which introduces the constant of proportionality as resistivity $$\\rho$$, giving $$R = \\rho L / A$$.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Wire A has twice the length and twice the cross-sectional area of Wire B, and both are made of the same material. How does the resistance of Wire A compare to Wire B? (3 steps)", "answer": "- Step 1: Resistance is given by $$R = \\rho L / A$$.\n- Step 2: Since they are the same material, resistivity $$\\rho$$ is the same. Wire A has $$L_A = 2L_B$$ and $$A_A = 2A_B$$.\n- Step 3: Substituting into the formula: $$R_A = \\rho (2L_B) / (2A_B) = \\rho L_B / A_B = R_B$$. Wire A has the **same** resistance as Wire B. (Doubling L doubles R, but doubling A halves R, so they cancel out).", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Starting from $$P = IV$$, derive the formula for power dissipated in terms of current and resistance, $$P = I^2R$$. (3 steps)", "answer": "- Step 1: Start with the definition of power in an electrical context: $$P = IV$$.\n- Step 2: From Ohm's law, we know that potential difference can be expressed as $$V = IR$$. Substitute this expression for $$V$$ into the power equation.\n- Step 3: This gives $$P = I \\times (IR)$$, which simplifies to $$P = I^2R$$.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Starting from $$P = IV$$, derive the formula for power dissipated in terms of potential difference and resistance, $$P = V^2/R$$. (3 steps)", "answer": "- Step 1: Start with the definition of power in an electrical context: $$P = IV$$.\n- Step 2: From Ohm's law, we know that current can be expressed as $$I = V/R$$. Substitute this expression for $$I$$ into the power equation.\n- Step 3: This gives $$P = \\left(\\frac{V}{R}\\right) \\times V$$, which simplifies to $$P = \\frac{V^2}{R}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "What does it mean for power to be \"dissipated\" in a resistor? Where does the energy go? (3 steps)", "answer": "- Step 1: \"Dissipated\" means the electrical energy transferred to the component is not stored but converted to other forms, primarily thermal energy (heat).\n- Step 2: As electrons drift through the resistor, they collide with the lattice ions, transferring their kinetic energy to the ions.\n- Step 3: This makes the ions vibrate more vigorously, increasing the thermal energy of the resistor. This energy is then lost to the surroundings, often as heat and sometimes as light (in a filament lamp).", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "An appliance normally draws 10 A. A 5 A fuse is installed in the plug. Will the fuse blow, and why? (3 steps)", "answer": "- Step 1: A fuse is a safety device designed to melt and break the circuit if the current exceeds its rating, protecting the appliance and wiring from overheating.\n- Step 2: The appliance draws 10 A, which is greater than the 5 A fuse rating.\n- Step 3: Therefore, the fuse **will blow** because the operating current exceeds the fuse's safe limit, causing the fuse wire to heat up and melt.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "How does an increase in temperature affect the resistance of a metallic conductor, and why? (3 steps)", "answer": "- Step 1: For a metallic conductor, an increase in temperature causes an **increase** in resistance (this is a Positive Temperature Coefficient, or PTC, behavior).\n- Step 2: As temperature rises, the lattice ions vibrate with greater amplitude and frequency about their fixed positions.\n- Step 3: This increases the rate of collisions between the drifting conduction electrons and the ions, reducing the drift velocity. A lower drift velocity means a lower current for the same p.d., hence a higher resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Using the drift velocity equation $$I = nAvq$$, explain why resistance increases with temperature for a metal. (3 steps)", "answer": "- Step 1: In the equation $$I = nAvq$$, for a given metal wire, the cross-sectional area $$A$$ and the charge on an electron $$q$$ are constant. The number density of free electrons $$n$$ also remains roughly constant with temperature in a metal.\n- Step 2: As temperature increases, greater lattice vibration causes more collisions, which reduces the mean drift velocity $$v$$ of the electrons.\n- Step 3: Since $$I \\propto v$$ (with other factors constant), the current $$I$$ decreases for the same applied p.d. Because $$R = V/I$$, a lower $$I$$ means a higher $$R$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Sketch the I-V graph for a filament lamp. Why does it have this shape? (3 steps)", "answer": "- Step 1: The graph is a curve with a **decreasing gradient** as $$V$$ increases.\n- Step 2: As the p.d. (and thus current) increases, the filament gets hotter due to more frequent electron-ion collisions ($$P = I^2R$$).\n- Step 3: The increasing temperature causes the resistance to increase (PTC). Since $$R = V/I$$ increases, the ratio $$I/V$$ decreases, meaning the gradient ($$1/R$$) of the I-V curve decreases, flattening the curve at higher voltages.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "How does an increase in temperature affect the resistance of an NTC thermistor, and why? (3 steps)", "answer": "- Step 1: For an NTC (Negative Temperature Coefficient) thermistor, an increase in temperature causes a **decrease** in resistance.\n- Step 2: A thermistor is made of a semiconductor. As temperature rises, more electrons gain enough thermal energy to break free from their atoms and become charge carriers.\n- Step 3: This significantly increases the number density of free charge carriers $$n$$. The effect of more charge carriers (which increases $$I$$) dominates over the effect of increased lattice vibrations (which would decrease $$I$$), resulting in a net increase in current and thus a decrease in resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Contrast the effect of temperature on the number density of free electrons ($$n$$) in a metal versus a semiconductor. (3 steps)", "answer": "- Step 1: In a **metal**, the number of free electrons is already vast at room temperature. Raising temperature has a negligible effect on $$n$$; the dominant effect is increased lattice vibrations.\n- Step 2: In a **semiconductor**, very few electrons are free at low temperatures. Heating provides energy to promote bound electrons into the conduction band, so $$n$$ increases dramatically with temperature.\n- Step 3: This difference in how $$n$$ behaves is why metal resistance goes up with $$T$$ (collisions dominate), while semiconductor resistance goes down with $$T$$ (more carriers dominate).", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "An NTC thermistor is in series with a fixed resistor and a battery. If the thermistor is cooled, what happens to the total circuit resistance and the current? (3 steps)", "answer": "- Step 1: Cooling an NTC thermistor causes its resistance to **increase** (opposite of heating).\n- Step 2: Since it is in series with a fixed resistor, the total circuit resistance is the sum of the two, so the total resistance also **increases**.\n- Step 3: With a higher total resistance and the same battery e.m.f., Ohm's law ($$I = V/R_{total}$$) dictates that the current in the circuit **decreases**.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Define a superconductor and its critical temperature $$T_c$$. (3 steps)", "answer": "- Step 1: A superconductor is a material that, when cooled below a certain temperature, loses all electrical resistance.\n- Step 2: This specific threshold temperature is called the critical (or transition) temperature, denoted as $$T_c$$.\n- Step 3: Below $$T_c$$, the material's resistivity drops abruptly to **exactly zero**. It is not just \"very low\"; it is precisely zero, meaning no energy is dissipated as heat.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Describe the shape of the resistance vs. temperature graph for a superconductor as it is cooled from room temperature. (3 steps)", "answer": "- Step 1: Above $$T_c$$, the material behaves as a normal metallic conductor, so resistance decreases gradually as temperature drops.\n- Step 2: At exactly $$T_c$$, the resistance drops **abruptly and discontinuously** to zero.\n- Step 3: Below $$T_c$$, the resistance remains exactly zero (a flat line along the temperature axis).", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Why is it incorrect to say a superconductor has \"very low resistance\"? What is the physical significance of it being exactly zero? (3 steps)", "answer": "- Step 1: \"Very low\" implies there is still some resistance, meaning some energy would still be dissipated as heat ($$P = I^2R$$).\n- Step 2: A superconductor has **exactly zero** resistance, meaning $$P = I^2(0) = 0$$. No electrical energy is lost as heat at all.\n- Step 3: This allows a current to flow indefinitely without a power source (persistent current), which is impossible if resistance is merely \"very low\" but not zero.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Give two applications of superconductors and explain why zero resistance is essential for each. (3 steps)", "answer": "- Step 1: **MRI scanners / Strong electromagnets**: Zero resistance allows massive currents to flow without overheating the coils, generating the extremely strong and stable magnetic fields required for medical imaging.\n- Step 2: **Lossless power transmission**: Since $$P = I^2R = 0$$, no electrical energy is wasted as heat in the transmission cables, vastly improving grid efficiency.\n+ Other valid applications include maglev trains (frictionless levitation via powerful magnets) and particle accelerators (precise steering fields).", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "For Required Practical CP7 (determining the resistivity of a wire), what are the independent and dependent variables, and what graph is plotted? (3 steps)", "answer": "- Step 1: **Independent variable**: Length of the wire ($$L$$), varied by moving a crocodile clip along a metre ruler.\n- Step 2: **Dependent variable**: Resistance of the wire ($$R$$), calculated by measuring voltage and current ($$R = V/I$$).\n- Step 3: A graph of $$R$$ (y-axis) against $$L$$ (x-axis) is plotted. Since $$R = (\\rho/A)L$$, the gradient of the straight line is $$\\rho/A$$, allowing resistivity to be found via $$\\rho = \\text{gradient} \\times A$$.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "In CP7, why must the current be kept very low during the experiment? (3 steps)", "answer": "- Step 1: Passing a high current through the wire causes Joule heating ($$P = I^2R$$), which raises the wire's temperature significantly.\n- Step 2: Resistivity is dependent on temperature. If the wire heats up, its resistivity changes, invalidating the experiment's assumption of constant $$\\rho$$.\n- Step 3: Keeping the current low minimizes heating, keeping the wire's temperature (and thus resistivity) approximately constant throughout the range of measurements.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "In CP7, the diameter $$d$$ of the wire is measured. If there is a 1% uncertainty in $$d$$, what is the percentage uncertainty in the cross-sectional area $$A$$, and subsequently in the calculated resistivity $$\\rho$$? (3 steps)", "answer": "- Step 1: Area is calculated using $$A = \\pi (d/2)^2$$, which means $$A \\propto d^2$$.\n- Step 2: When calculating a variable raised to a power, the percentage uncertainty is multiplied by that power. So, a 1% uncertainty in $$d$$ results in a **2%** uncertainty in $$A$$.\n- Step 3: Resistivity is calculated as $$\\rho = R A / L$$. Since $$A$$ is multiplied by $$R$$ (and divided by $$L$$), the percentage uncertainties add. Therefore, the 2% uncertainty in $$A$$ directly contributes a 2% uncertainty to $$\\rho$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "When finding the resistance of a non-ohmic component at a specific point, a student uses the gradient of the tangent at that point. Why is this wrong? (3 steps)", "answer": "- Step 1: The gradient of an I-V graph is $$\\Delta I / \\Delta V$$, which equals $$1/R$$ only if $$R$$ is constant (ohmic).\n- Step 2: For a non-ohmic component, the gradient of the tangent represents $$dI/dV$$, which is the *differential* conductance, not the total ratio of V to I at that point.\n- Step 3: Resistance is defined as the total ratio $$R = V/I$$. To find it, you must read the absolute values of $$V$$ and $$I$$ at the point and divide them, not use the local gradient.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "A non-ohmic component's I-V characteristic is plotted. How do you graphically find the p.d. at which the component's resistance is exactly 50 Ω? (3 steps)", "answer": "- Step 1: Draw a straight line from the origin with a gradient of $$1/50$$ (since gradient = $$I/V = 1/R$$).\n- Step 2: This straight line represents all possible combinations of $$V$$ and $$I$$ where the effective resistance is exactly 50 Ω.\n- Step 3: Find where this straight line intersects the non-ohmic component's I-V curve. The x-coordinate (voltage) of the intersection point is the required p.d.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A current is induced in a closed loop of superconducting wire below its critical temperature $$T_c$$. If the external source is removed, what happens to the current over time, and why? (3 steps)", "answer": "- Step 1: The current continues to flow **indefinitely** without decreasing.\n- Step 2: Because the resistance is exactly zero, there is no power dissipation ($$P = I^2R = 0$$). No electrical energy is converted to heat.\n- Step 3: Therefore, the electrons lose no kinetic energy to the lattice and maintain their drift velocity forever, resulting in a persistent current.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "To score full marks on an exam question asking to explain why resistance increases in a metal wire at higher temperature, what key phrases must you include? (3 steps)", "answer": "- Step 1: You must mention the lattice: \"lattice ions vibrate with greater amplitude\" or \"more vibrations\".\n- Step 2: You must link this to collisions: \"more frequent collisions between conduction electrons and lattice ions\".\n- Step 3: You must link this to current/resistance: \"reduced drift velocity\" leading to \"decreased current for the same p.d.\" or simply \"resistance increases\". Avoid vague terms like \"atoms block electrons more\".", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "To score full marks explaining why resistance decreases in an NTC thermistor at higher temperature, what key phrases must you include? (3 steps)", "answer": "- Step 1: You must identify it as a semiconductor and state that \"more charge carriers (free electrons) are released\".\n- Step 2: You must link this to current: \"increased number density of charge carriers\" means more current can flow for the same p.d.\n- Step 3: Conclude that \"resistance decreases\". Do not say \"fewer collisions\" as the primary reason; the increase in carriers dominates over the increased lattice vibrations.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "An exam question asks you to state Ohm's law. A student writes \"Current is proportional to potential difference.\" Why will this lose marks? (3 steps)", "answer": "- Step 1: The student's statement is missing the crucial condition under which this proportionality holds.\n- Step 2: Ohm's law only applies if the physical conditions remain constant, specifically **temperature**.\n- Step 3: For full marks, you must write: \"The current through a component is directly proportional to the potential difference across it, **provided that the temperature is constant**.\"", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "A student defines a superconductor as \"a material with very low resistance at low temperatures.\" Why does this fail to meet the mark scheme? (3 steps)", "answer": "- Step 1: \"Very low resistance\" is incorrect; a superconductor has **exactly zero** resistance (or resistivity).\n- Step 2: \"Low temperatures\" is too vague; it happens specifically below the **critical temperature** ($$T_c$$).\n- Step 3: The correct definition must state that \"resistivity drops to zero\" below the \"critical temperature\".", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}], "count": 36}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "What is the definition of resistance, its formula, and its SI unit? Why is it defined as the ratio of p.d. to current, rather than current to p.d.? (3 steps)", "answer": "- Step 1: Resistance is defined as the ratio of the potential difference ($$V$$) across a component to the current ($$I$$) flowing through it. The formula is $$R = \\frac{V}{I}$$, and the SI unit is the ohm ($$\\Omega$$), where $$1 \\ \\Omega = 1 \\ \\text{V/A}$$.\n- Step 2: It is defined as $$V/I$$ because resistance represents the opposition to current. For a given driving force (p.d. $$V$$), a higher opposition results in a smaller flow (current $$I$$). Therefore, $$R$$ is proportional to $$V$$ and inversely proportional to $$I$$.\n- Step 3: A common misconception is to write $$R = IV$$ (multiplying them). This physically implies that increasing the current *in
