creases* the resistance, which reverses cause and effect. Resistance *causes* a reduction in current; it does not multiply with it.\n\nTakeaway: Resistance divides voltage by current; it is the obstacle that reduces the flow.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "At a microscopic level, what causes a metal wire to have electrical resistance? (4 steps)", "answer": "- Step 1: In a metal, positive ions are arranged in a fixed lattice, and free (conduction) electrons drift through this lattice under the influence of the electric field created by the applied p.d.\n- Step 2: As the electrons drift, they collide with the vibrating lattice ions. These collisions transfer kinetic energy from the electrons to the lattice, which we observe as electrical heating.\n- Step 3: These collisions impede the forward motion of the electrons, reducing their average drift velocity. \n- Step 4: Because the electrons move slower (lower drift velocity), the rate of charge flow (current $$I$$) decreases. This reduction in current for a given p.d. is what we measure as resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "A common misconception is that a resistor \"stores\" electrons, slowing the flow by accumulating charge inside. Why is this physically incorrect, and what actually happens to the electrons? (3 steps)", "answer": "- Step 1: If a resistor stored electrons, charge would build up inside it, creating a massive repulsive force that would immediately stop any further current. In a series circuit, current is the same everywhere; charge does not accumulate.\n- Step 2: What actually happens is that the electrons collide with the lattice ions, which reduces their drift velocity. The \"rate of flow\" drops, meaning fewer electrons pass a given point per second.\n- Step 3: The total number of electrons entering the resistor equals the number leaving it; they just exit moving slower. The resistor slows the *traffic*, it does not *park the cars*.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "State Ohm's law precisely. What is the crucial condition that must be met for a conductor to obey this law? (2 steps)", "answer": "- Step 1: Ohm's law states that the current through a conductor is directly proportional to the potential difference across it ($$I \\propto V$$). This means $$V/I$$ is a constant, so the resistance does not change.\n- Step 2: The crucial condition is that the **temperature must remain constant**. If the temperature changes (as it does in a filament lamp), the lattice vibrations change, altering the resistance and breaking the proportionality.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "How do you determine the resistance of a component from its I–V graph for (a) an ohmic conductor and (b) a non-ohmic conductor? (3 steps)", "answer": "- Step 1: For an **ohmic conductor**, the I–V graph is a straight line through the origin. Because $$I \\propto V$$, the gradient ($$\\Delta I / \\Delta V$$) is constant and equals $$1/R$$. You can find $$R$$ by calculating $$1/\\text{gradient}$$.\n- Step 2: For a **non-ohmic conductor**, the I–V graph is a curve, meaning the gradient (and therefore resistance) changes depending on the p.d. You **cannot** use the gradient of the curve.\n- Step 3: Instead, you must read the specific values of $$V$$ and $$I$$ at the point of interest and calculate $$R = V/I$$ directly. This gives the resistance at that specific operating point, not an average.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "For a non-ohmic component, why can't you simply take the gradient of the I–V curve to find the resistance at a specific point? (2 steps)", "answer": "- Step 1: The gradient of an I–V curve is $$\\Delta I / \\Delta V$$. For a straight line (ohmic), this ratio is constant everywhere. For a curve (non-ohmic), the gradient changes continuously depending on where you measure it.\n- Step 2: Resistance is defined strictly as the ratio of total voltage to total current at a single operating state ($$R = V/I$$), not the rate of change of current with respect to voltage ($$dI/dV$$). At a curved section, $$V/I \\neq dI/dV$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "If you need to find the p.d. at which a non-ohmic component has a resistance of exactly 50 Ω, you must use a graphical intersection method. Explain why a direct calculation using $$V = IR$$ fails and how the intersection method works. (4 steps)", "answer": "- Step 1: A direct calculation using $$V = IR$$ fails because you have two unknowns: both $$V$$ and $$I$$ are changing simultaneously on the non-ohmic curve. You cannot assume the current from a previous operating point.\n- Step 2: To solve this, you draw a straight line through the origin representing the constant resistance of 50 Ω. On an I–V graph, this line has a gradient of $$1/R = 1/50$$.\n- Step 3: Any point on this straight line satisfies the condition $$R = 50 \\ \\Omega$$. However, the component must also obey its own physical behavior (its I–V curve).\n- Step 4: The intersection point of the 50 Ω line and the component's I–V curve is the *only* point where both conditions are met simultaneously. Reading the x-coordinate of this intersection gives the required p.d.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "To measure the resistance of an unknown component $$R_x$$ in a lab, you use a voltmeter and an ammeter. Describe the correct circuit arrangement and the ideal resistances of the meters, and explain why. (4 steps)", "answer": "- Step 1: The ammeter must be placed in **series** with $$R_x$$ to measure the current flowing through it. The voltmeter must be placed in **parallel** across $$R_x$$ to measure the p.d. across it.\n- Step 2: An ideal ammeter has **zero resistance**. If it had resistance, it would add to the total circuit resistance, reducing the current and giving a reading lower than the actual current in the circuit.\n- Step 3: An ideal voltmeter has **infinite resistance**. If it had finite resistance, it would draw current, diverting some current away from $$R_x$$ and making the ammeter reading inaccurate.\n- Step 4: By measuring $$V$$ and $$I$$ accurately, you calculate $$R_x = V/I$$. To avoid changing the resistance during the test (which violates Ohm's law conditions), use a low supply voltage (1–2 V) to prevent heating.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "What is the difference between resistance and resistivity? Which one is an intrinsic property of a material, and which depends on geometry? (3 steps)", "answer": "- Step 1: **Resistance** ($$R$$) is a property of a specific component. It depends on both the material the component is made of *and* its geometry (length and cross-sectional area).\n- Step 2: **Resistivity** ($$\\rho$$) is an intrinsic property of the material itself. It describes how strongly that specific material opposes current, regardless of its shape or size.\n- Step 3: For example, a short thick copper wire and a long thin copper wire have very different resistances, but they have the exact same resistivity because they are both made of copper. Resistivity only changes if the material changes or the temperature changes.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "The formula for resistance is $$R = \\frac{\\rho L}{A}$$. Explain the physical intuition behind why resistance is proportional to length $$L$$ and inversely proportional to cross-sectional area $$A$$. (3 steps)", "answer": "- Step 1: **Proportional to $$L$$:** A longer wire means the electrons must travel a greater distance through the lattice. This gives them more opportunities to collide with vibrating ions, increasing the total opposition. Think of running through a crowd: a longer crowd is harder to get through.\n- Step 2: **Inversely proportional to $$A$$:** A thicker wire provides more parallel pathways for the electrons to travel through. Just like a wider highway allows more traffic to flow simultaneously, a larger cross-sectional area reduces the overall opposition to current.\n- Step 3: Rearranging gives the formula for resistivity: $$\\rho = \\frac{RA}{L}$$. This isolates the material property by mathematically \"removing\" the geometric factors ($$L$$ and $$A$$).", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "The unit of resistivity is $$\\Omega \\cdot \\text{m}$$, not $$\\Omega / \\text{m}$$. Show how this unit is derived from the resistivity formula $$\\rho = \\frac{RA}{L}$$ and explain why it makes sense. (2 steps)", "answer": "- Step 1: Substitute the units into the formula: $$[\\rho] = \\frac{[\\Omega] \\cdot [\\text{m}^2]}{[\\text{m}]}$$. Dividing by $$\\text{m}$$ cancels one power of length from the area, leaving $$\\Omega \\cdot \\text{m}$$.\n- Step 2: It makes sense because resistivity is \"resistance times area per unit length.\" A common mistake is to write $$\\Omega/\\text{m}$$, which would imply resistance *per* meter. However, a 1-meter piece of a thick wire has less resistance than a 1-meter piece of a thin wire; the area must be factored in, hence $$\\Omega \\cdot \\text{m}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Starting from the base power equation $$P = IV$$, derive the two alternative expressions for power dissipation in a resistor: $$P = I^2R$$ and $$P = \\frac{V^2}{R}$$. (3 steps)", "answer": "- Step 1: Start with $$P = IV$$. From Ohm's law, we know $$V = IR$$. Substitute this into the power equation: $$P = I(IR) = I^2R$$. This form is useful when you know the current and resistance.\n- Step 2: Start again with $$P = IV$$. From Ohm's law, we also know $$I = \\frac{V}{R}$$. Substitute this into the power equation: $$P = V\\left(\\frac{V}{R}\\right) = \\frac{V^2}{R}$$. This form is useful when you know the voltage and resistance.\n- Step 3: Both derivations show that power dissipation is fundamentally driven by electron–ion collisions. The $$I^2R$$ form highlights that power scales with the square of the current, meaning a small increase in current causes a massive increase in heating.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A fuse is a safety device designed to melt and break the circuit if the current gets too high. Conceptually, how do you determine if a specific fuse rating is safe for an appliance? (3 steps)", "answer": "- Step 1: First, calculate the normal operating current of the appliance using its power rating and voltage: $$I = \\frac{P}{V}$$.\n- Step 2: Compare this operating current to the fuse's current rating. The fuse will melt if the current exceeds its rating.\n- Step 3: For safe operation, the operating current must be **less than** the fuse rating. If the operating current were higher, the fuse would blow during normal use. (e.g., If an appliance draws 12.5 A, a 13 A fuse is safe, but a 10 A fuse would melt).", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "How does an increase in temperature affect the resistance of a metallic conductor (like copper), and what is the microscopic mechanism behind this? (4 steps)", "answer": "- Step 1: For a metallic conductor, an increase in temperature causes an **increase** in resistance. This is known as a Positive Temperature Coefficient (PTC).\n- Step 2: Microscopically, the positive ions in the metal lattice are vibrating about their fixed positions. As temperature rises, the thermal energy causes the amplitude of these vibrations to increase.\n- Step 3: Larger amplitude vibrations mean the ions take up more space and move more vigorously, leading to more frequent collisions between the conduction electrons and the lattice ions.\n- Step 4: More frequent collisions reduce the drift velocity of the electrons. Since current depends on drift velocity, the current decreases for a given p.d., which means the resistance ($$R = V/I$$) has increased.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Using the drift velocity equation $$I = nAvq$$, walk through the logical chain that explains why the resistance of a metal wire increases when its temperature rises. (4 steps)", "answer": "- Step 1: Identify the constants: For a given metal wire, the number density of free electrons $$n$$, the cross-sectional area $$A$$, and the charge on an electron $$q$$ all remain constant when temperature changes.\n- Step 2: Identify the variable: As temperature rises, increased lattice vibrations cause more frequent electron–ion collisions, which reduces the drift velocity $$v$$.\n- Step 3: Because $$I = nAvq$$ and $$n, A, q$$ are constant, a decrease in drift velocity $$v$$ directly causes a decrease in current $$I$$.\n- Step 4: Since $$R = V/I$$, if the applied p.d. $$V$$ is kept constant but the current $$I$$ decreases, the resistance $$R$$ must increase.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "A filament lamp has a much lower resistance when it is off (room temperature) than when it is fully lit. What happens to the current at the exact moment the lamp is switched on, and why? (3 steps)", "answer": "- Step 1: At the exact moment of switch-on, the filament is cold, so its resistance is very low.\n- Step 2: Because $$I = V/R$$, applying the full mains voltage across this very low resistance results in a momentary surge of current that is much higher than the normal operating current.\n- Step 3: This massive surge current causes rapid heating ($$P = I^2R$$), which increases the resistance, which in turn reduces the current back down to a steady operating level. This is why filament bulbs usually burn out exactly at the moment they are switched on.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "How does an increase in temperature affect the resistance of an NTC thermistor, and what is the microscopic mechanism? (3 steps)", "answer": "- Step 1: For an NTC (Negative Temperature Coefficient) thermistor, an increase in temperature causes a **decrease** in resistance.\n- Step 2: A thermistor is made of a semiconductor. Unlike a metal, a semiconductor does not have many free charge carriers at low temperatures; most electrons are locked in bonds.\n- Step 3: As temperature increases, more electrons gain enough thermal energy to break free from their atoms. This dramatically increases the number density of free charge carriers $$n$$. The massive increase in $$n$$ increases the current, meaning the resistance ($$R = V/I$$) drops.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "In a semiconductor, lattice vibrations also increase with temperature (which would increase resistance), yet the overall resistance still decreases. Why does the \"more free carriers\" effect dominate? (3 steps)", "answer": "- Step 1: It is true that increased lattice vibrations impede electron flow slightly, just like in a metal.\n- Step 2: However, in a semiconductor, the initial number of free carriers $$n$$ is extremely small. Even a modest increase in temperature can double or triple the number of free electrons.\n- Step 3: The proportional increase in charge carriers ($$n$$) is vastly greater than the proportional decrease in drift velocity ($$v$$) caused by lattice vibrations. Therefore, the increase in $$n$$ dominates, current increases, and resistance falls.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "Define a superconductor and its critical temperature $$T_c$$. What happens to the resistivity at this point? (3 steps)", "answer": "- Step 1: A superconductor is a material that, when cooled below a specific temperature, loses all electrical resistance.\n- Step 2: This specific threshold is called the critical temperature (or transition temperature), denoted $$T_c$$.\n- Step 3: At and below $$T_c$$, the resistivity drops **abruptly to exactly zero**. This is not just \"very low\" resistance; it is precisely zero, meaning current can flow indefinitely without any energy loss as heat.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Sketch the resistance vs. temperature graph for a superconductor. Describe its behavior above $$T_c$$, at $$T_c$$, and below $$T_c$$. (3 steps)", "answer": "- Step 1: **Above $$T_c$$:** The material behaves as a normal conductor. As temperature decreases towards $$T_c$$, the resistance decreases linearly (similar to a normal metal).\n- Step 2: **At $$T_c$$:** The resistance drops abruptly and discontinuously to zero. It is not a gradual curve to zero; it is a sharp, vertical drop on the graph.\n- Step 3: **Below $$T_c$$:** The resistance remains exactly at zero regardless of how much further the temperature is lowered. The line is flat along the temperature axis ($$R = 0$$).", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Superconductors are used in MRI scanners and lossless power cables. Explain why zero resistance is specifically beneficial for these two applications. (2 steps)", "answer": "- Step 1: **MRI scanners:** They require extremely strong magnetic fields, which are generated by large currents in coils. In a normal wire, such large currents would create immense heat ($$P = I^2R$$) and melt the wires. With zero resistance, superconducting coils can carry huge currents indefinitely without overheating, allowing for powerful electromagnets.\n- Step 2: **Lossless power cables:** When electricity is transmitted through conventional cables, a significant amount of energy is dissipated as heat due to resistance ($$P = I^2R$$). Superconducting cables have $$R = 0$$, so $$P = 0$$, meaning electrical power can be transmitted with no energy loss.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "In Required Practical CP7 (Resistivity of a Wire), what are the independent, dependent, and control variables, and what graph do you plot to find the resistivity? (3 steps)", "answer": "- Step 1: The independent variable is the length $$L$$ of the wire. The dependent variable is the resistance $$R$$ (calculated as $$V/I$$). The control variables are the cross-sectional area $$A$$ (using the same wire throughout) and the temperature (kept low to avoid changing resistivity).\n- Step 2: You plot a graph of Resistance ($$R$$) on the y-axis against Length ($$L$$) on the x-axis.\n- Step 3: Because $$R = \\frac{\\rho}{A} L$$, the graph should be a straight line through the origin. The gradient equals $$\\rho/A$$. You can then calculate the resistivity using $$\\rho = \\text{gradient} \\times A$$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "In CP7, why must the current be kept low (e.g., < 0.5 A) during the experiment, and why must the wire diameter be measured at multiple positions? (3 steps)", "answer": "- Step 1: **Low current:** A high current causes Joule heating ($$P = I^2R$$), which raises the temperature of the wire. Since resistivity depends on temperature, heating the wire would change the very property you are trying to measure, introducing a systematic error.\n- Step 2: **Multiple diameter measurements:** The wire is not perfectly uniform; its thickness varies slightly along its length. Measuring the diameter at several positions and taking an average gives a more accurate representation of the cross-sectional area $$A$$.\n- Step 3: Additionally, the micrometer must be zeroed before use to avoid a zero error in the diameter measurement, which would severely impact the area calculation since $$A \\propto d^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "In CP7, the cross-sectional area $$A$$ is calculated from the diameter $$d$$ using $$A = \\pi(d/2)^2$$. If the diameter has a percentage uncertainty of 2%, what is the percentage uncertainty in the area $$A$$, and consequently in the resistivity $$\\rho$$? (4 steps)", "answer": "- Step 1: The formula for area is $$A = \\frac{\\pi d^2}{4}$$. When calculating percentage uncertainties, constants ($$\\pi$$, 4) are ignored, and powers are brought down as multipliers.\n- Step 2: Therefore, the percentage uncertainty in $$A$$ is twice the percentage uncertainty in $$d$$. Since uncertainty in $$d$$ is 2%, the uncertainty in $$A$$ is $$2 \\times 2\\% = 4\\%$$.\n- Step 3: Resistivity is calculated as $$\\rho = \\frac{RA}{L}$$. In multiplication/division, percentage uncertainties are added.\n- Step 4: The total percentage uncertainty in $$\\rho$$ is the sum of the uncertainties in $$R$$, $$A$$, and $$L$$. Just from the diameter alone, a 2% uncertainty already introduces a 4% uncertainty into the final resistivity, showing why measuring diameter carefully is critical.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "**[Exercise]** A component has a potential difference of 6.0 V across it and a current of 0.24 A flowing through it. Calculate its resistance. (2 steps)", "answer": "- Step 1: Recall the definition of resistance: $$R = \\frac{V}{I}$$. We are given $$V = 6.0 \\ \\text{V}$$ and $$I = 0.24 \\ \\text{A}$$.\n- Step 2: Substitute the values: $$R = \\frac{6.0}{0.24} = \\frac{600}{24} = 25 \\ \\Omega$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "**[Exercise]** A resistor of 20 Ω has a potential difference of 4.0 V across it. Which power formula is most convenient to use, and what is the power dissipated? (2 steps)", "answer": "- Step 1: We are given $$R$$ and $$V$$, and we want to find power $$P$$. The most convenient formula that directly uses $$R$$ and $$V$$ without needing to find current first is $$P = \\frac{V^2}{R}$$.\n- Step 2: Substitute the values: $$P = \\frac{4.0^2}{20} = \\frac{16}{20} = 0.8 \\ \\text{W}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "**[Exercise]** An electric heater is rated at 200 V, 1.0 kW. A student has 3 A, 5 A, and 13 A fuses available. Which fuse should be used for safe operation? (3 steps)", "answer": "- Step 1: First, calculate the normal operating current using $$I = \\frac{P}{V}$$. Here, $$P = 1.0 \\ \\text{kW} = 1000 \\ \\text{W}$$, and $$V = 200 \\ \\text{V}$$.\n- Step 2: Substitute the values: $$I = \\frac{1000}{200} = 5.0 \\ \\text{A}$$.\n- Step 3: The fuse must have a rating slightly higher than the normal operating current so it doesn't blow during normal use. A 5 A fuse would blow exactly at the operating current, so a 13 A fuse is the only safe choice.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "**[Exercise]** A wire is stretched so that its length doubles and its cross-sectional area halves (its volume is conserved). By what factor does its resistance change? (3 steps)", "answer": "- Step 1: Write down the resistance formula: $$R = \\frac{\\rho L}{A}$$.\n- Step 2: Apply the changes: Length changes to $$2L$$, and area changes to $$A/2$$. The new resistance $$R_{\\text{new}} = \\frac{\\rho (2L)}{A/2}$$.\n- Step 3: Simplify the fraction: Dividing by $$A/2$$ is the same as multiplying by 2. So, $$R_{\\text{new}} = \\frac{\\rho \\cdot 2L \\cdot 2}{A} = 4 \\left(\\frac{\\rho L}{A}\\right) = 4R$$. The resistance increases by a factor of 4.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "**[Exercise]** An NTC thermistor is connected in series with a fixed 100 Ω resistor and a 12 V battery. If the thermistor is cooled, what happens qualitatively to (a) the total circuit resistance and (b) the p.d. across the fixed 100 Ω resistor? (4 steps)", "answer": "- Step 1: Analyze the thermistor: An NTC thermistor has a Negative Temperature Coefficient. Cooling it means its temperature decreases, so its resistance *increases*.\n- Step 2: Total circuit resistance is the sum of the thermistor's resistance and the 100 Ω resistor. Since the thermistor's resistance increases, the total circuit resistance also increases.\n- Step 3: Analyze the current: By Ohm's law ($$I = V/R_{\\text{total}}$$), if the total resistance increases and the battery voltage is constant, the circuit current decreases.\n- Step 4: Analyze the p.d. across the fixed resistor: The p.d. across the 100 Ω resistor is $$V_{100} = I \\times 100$$. Since the current $$I$$ has decreased, the p.d. across the fixed 100 Ω resistor also decreases.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}], "count": 29}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "A component has a potential difference $$V$$ across it and a current $$I$$ flowing through it. What is the mathematical definition of its resistance, and why is it defined this way rather than as the product $$V \\times I$$? (2 steps)", "answer": "- Step 1: Resistance is defined as the ratio of potential difference to current: $$R = \\frac{V}{I}$$. This tells us how much voltage is needed to push a unit of current through the component. A higher $$R$$ means more voltage is required for the same current.\n- Step 2: It is not defined as $$V \\times I$$ (which is the formula for power, $$P$$) because resistance measures the *opposition* to current. If a component strongly opposes current, $$I$$ is small for a given $$V$$, so the ratio $$V/I$$ is large. If we multiplied them, a high current (low opposition) would give a large number, which contradicts the physical meaning of resistance.\n\nRemember: Resistance divides voltage by current; it does not multiply them.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "What are the SI units of resistance, and how is one of these units defined in terms of base electrical quantities? (2 steps)", "answer": "- Step 1: The SI unit of resistance is the ohm, represented by the Greek capital letter $$\\Omega$$.\n- Step 2: One ohm is defined as one volt per ampere: $$1 \\, \\Omega = 1 \\, \\text{V/A}$$. If a component has a potential difference of 1 V across it and a current of 1 A flowing through it, its resistance is exactly 1 $$\\Omega$$.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "A battery sends 10 electrons per second into a resistor, but the circuit only allows 1 electron per second to flow consistently. Does the resistor \"store\" the other 9 electrons inside it? Why or why not? (3 steps)", "answer": "- Step 1: No, the resistor does not store or accumulate electrons inside it. In a series circuit, the current (rate of flow of charge) must be the same at all points.\n- Step 2: The resistor opposes the flow by causing frequent collisions between the conduction electrons and the fixed lattice ions. These collisions drastically slow down the *drift velocity* of the electrons.\n- Step 3: Because the drift velocity is reduced throughout the entire circuit, the *overall* current drops from what it would be without the resistor. The 10 electrons/second scenario would only happen if there were no resistance; the resistor ensures the entire circuit settles at 1 electron/second. It slows the flow, it doesn't absorb the difference.\n\nMisconception busted: Resistors slow the rate of flow (current) everywhere in the circuit; they do not act like batteries or sponges that trap charge.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "To measure the resistance of an unknown component $$R_x$$, where should the ammeter and voltmeter be placed in the circuit, and what are the ideal resistances of these instruments? (2 steps)", "answer": "- Step 1: The ammeter must be placed in **series** with $$R_x$$ to measure the current flowing through it. The voltmeter must be placed in **parallel** across $$R_x$$ to measure the potential difference across it.\n- Step 2: An ideal ammeter has **zero resistance** so it does not reduce the current flowing through the component. An ideal voltmeter has **infinite resistance** so it draws no current away from the component, ensuring the ammeter reading equals the true current through $$R_x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "When verifying Ohm's law for a component in the lab, why is it crucial to keep the supply voltage low (e.g., 1–2 V)? (2 steps)", "answer": "- Step 1: Ohm's law requires that the current is directly proportional to the potential difference, *provided the temperature is constant*.\n- Step 2: A higher voltage drives a larger current, which causes more electron-ion collisions and increases the temperature of the component. If the temperature rises, the resistance changes, breaking the constant-temperature condition and invalidating the proportionality test. A low voltage prevents significant Joule heating.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "State Ohm's law exactly. What two conditions must be explicitly mentioned for the definition to be complete in an exam? (2 steps)", "answer": "- Step 1: Ohm's law states that the current through a component is **directly proportional** to the potential difference across it.\n- Step 2: The two essential conditions are: (1) the component must be at a **constant temperature**, and (2) the relationship must yield a **straight-line graph through the origin** on an I-V plot. Omitting \"constant temperature\" loses the mark, because changing temperature changes resistance, destroying the proportionality.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "An ohmic conductor is plotted on an I-V graph (current on the y-axis, voltage on the x-axis). How do you find its resistance from the graph, and what does the line look like? (2 steps)", "answer": "- Step 1: The line is a **straight line through the origin**, because current is directly proportional to voltage.\n- Step 2: The gradient of the line is $$\\frac{\\Delta I}{\\Delta V}$$, which equals $$\\frac{1}{R}$$. Therefore, the resistance is the reciprocal of the gradient: $$R = \\frac{1}{\\text{gradient}}$$. A steeper gradient means a lower resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A non-ohmic component has a curved I-V graph. A student attempts to find its resistance at a specific point by calculating the gradient of the tangent at that point. Why is this method incorrect? (3 steps)", "answer": "- Step 1: Ohm's law ($$R = V/I$$) applies strictly at a specific operating point for a non-ohmic component. The resistance is the ratio of the voltage to the current *at that exact point*.\n- Step 2: The gradient of the tangent $$\\frac{dI}{dV}$$ represents how a small change in voltage changes the current ($$\\frac{1}{R_{dynamic}}$$). This is the dynamic resistance, not the actual static resistance at that point.\n- Step 3: To find the actual resistance, you must read the specific values of $$V$$ and $$I$$ at the point of interest and calculate $$R = \\frac{V}{I}$$. You are finding the ratio of the coordinates, not the slope of the curve.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A non-ohmic component has an unknown operating voltage and current, but you know its resistance must be exactly 50 $$\\Omega$$. Explain the graphical method to find this operating point on its I-V curve. (3 steps)", "answer": "- Step 1: Draw a straight line from the origin representing $$R = 50 \\, \\Omega$$. On an I-V graph, this line has a gradient of $$\\frac{1}{R} = \\frac{1}{50}$$.\n- Step 2: To draw this line, pick an arbitrary voltage (e.g., $$V = 1 \\, \\text{V}$$) and calculate the corresponding current using $$I = \\frac{V}{R} = \\frac{1}{50} = 0.02 \\, \\text{A}$$. Plot the point (1 V, 0.02 A) and draw a line from the origin through it.\n- Step 3: The point where this straight line intersects the component's non-ohmic I-V curve is the operating point. At this intersection, both the component's physical behavior and the $$R = 50 \\, \\Omega$$ condition are satisfied simultaneously, giving you the unique $$V$$ and $$I$$.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Two wires are made of pure copper. Wire A is long and thin; Wire B is short and thick. They have different resistances. Do they have different resistivities? Explain the difference between resistance and resistivity. (3 steps)", "answer": "- Step 1: No, they have the **same resistivity**. Resistivity is an intrinsic property of the *material* (copper), independent of the object's dimensions.\n- Step 2: Resistance is a property of the specific *component* (the wire). It depends on both the material's resistivity and the object's geometry (length and cross-sectional area).\n- Step 3: Because Wire A is long (more material to push through) and thin (less space for electrons to flow), its resistance is higher than Wire B's. However, if you took a tiny cubic sample from either wire, they would exhibit the exact same resistivity.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "What is the formula relating resistance, resistivity, length, and cross-sectional area? Intuitively, why does resistance depend on length and area in this way? (3 steps)", "answer": "- Step 1: The formula is $$R = \\frac{\\rho L}{A}$$, which rearranges to $$\\rho = \\frac{RA}{L}$$.\n- Step 2: Resistance is proportional to length ($$L$$) because a longer wire means electrons must navigate more lattice ions, leading to more collisions. It's like running through a longer obstacle course.\n- Step 3: Resistance is inversely proportional to cross-sectional area ($$A$$) because a thicker wire provides more parallel pathways for electrons to drift through, reducing the overall opposition. It's like adding more lanes to a highway to reduce traffic.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "What is the SI unit of resistivity, and why does it have this particular combination of units? (2 steps)", "answer": "- Step 1: The SI unit of resistivity is the **ohm-metre** ($$\\Omega \\cdot \\text{m}$$).\n- Step 2: This comes directly from rearranging $$R = \\frac{\\rho L}{A}$$ to $$\\rho = \\frac{RA}{L}$$. Substituting the units gives $$\\frac{\\Omega \\cdot \\text{m}^2}{\\text{m}} = \\Omega \\cdot \\text{m}$$. A common mistake is to write $$\\Omega/\\text{m}$$; resistivity *multiplies* length, it doesn't divide it.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "When a current flows through a resistor, energy is transferred. What is the term for the rate of this energy transfer, and what is the base formula for it? (2 steps)", "answer": "- Step 1: The rate of energy transfer is called **power dissipation**, measured in watts (W). \"Dissipated\" means the electrical energy is transferred to the surroundings, typically as thermal energy (heat) or light.\n- Step 2: The base formula is $$P = IV$$, where $$P$$ is power, $$I$$ is current, and $$V$$ is the potential difference across the resistor. This states that power is the product of the charge flow rate and the energy per unit charge.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Starting from $$P = IV$$ and Ohm's law ($$V = IR$$), derive the formula for power dissipated purely in terms of current and resistance. (2 steps)", "answer": "- Step 1: Take the base power formula $$P = IV$$ and substitute the expression for voltage from Ohm's law, $$V = IR$$.\n- Step 2: This gives $$P = I \\times (IR)$$, which simplifies to $$P = I^2 R$$. This form is useful when you know the current flowing through a resistor but not the voltage across it.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Starting from $$P = I^2 R$$ and Ohm's law ($$I = V/R$$), derive the formula for power dissipated purely in terms of voltage and resistance. (3 steps)", "answer": "- Step 1: Start with the current-based power formula: $$P = I^2 R$$.\n- Step 2: Substitute the expression for current from Ohm's law, $$I = \\frac{V}{R}$$. Squaring this gives $$I^2 = \\frac{V^2}{R^2}$$.\n- Step 3: Substitute $$I^2$$ into the power equation: $$P = \\left(\\frac{V^2}{R^2}\\right) R$$. One $$R$$ cancels out from the numerator and denominator, leaving $$P = \\frac{V^2}{R}$$. This form is useful when a component is connected directly across a known voltage supply.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "An electric kettle is rated at 240 V and 3.0 kW. It is protected by a 13 A fuse. Will the fuse blow during normal operation? Outline the logic. (3 steps)", "answer": "- Step 1: A fuse melts and breaks the circuit if the current exceeds its rating (13 A). We must find the normal operating current of the kettle.\n- Step 2: Using the power formula $$P = VI$$, rearrange for current: $$I = \\frac{P}{V} = \\frac{3000 \\, \\text{W}}{240 \\, \\text{V}} = 12.5 \\, \\text{A}$$.\n- Step 3: Since the normal operating current (12.5 A) is less than the fuse rating (13 A), the fuse will **not** blow during normal operation. The kettle operates safely.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "How does the resistance of a typical metallic conductor change as its temperature increases? (1 step)", "answer": "- Step 1: As the temperature of a metallic conductor increases, its resistance **increases**. This is known as having a Positive Temperature Coefficient (PTC).", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Explain the microscopic mechanism for why a metal's resistance increases with temperature. Use the free-electron model and the concept of drift velocity. (4 steps)", "answer": "- Step 1: In a metal, positive ions are arranged in a rigid lattice and vibrate about their fixed positions. Free conduction electrons drift through this lattice under the applied electric field.\n- Step 2: When the temperature rises, the thermal energy causes the lattice ions to vibrate with a greater amplitude and frequency.\n- Step 3: The larger amplitude of vibration means the ions effectively take up more space, leading to **more frequent collisions** between the drifting electrons and the lattice ions.\n- Step 4: More collisions reduce the **drift velocity** $$v$$ of the electrons. Since current $$I = nAvq$$ and $$n, A, q$$ are constant for a given metal wire, a lower drift velocity means a lower current for the same voltage, which by $$R = V/I$$ means a higher resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "Using the equation $$I = nAvq$$, explain why the number density of free charge carriers $$n$$ does not change with temperature in a pure metal. (2 steps)", "answer": "- Step 1: In a pure metal, the number of free (conduction) electrons is essentially fixed by the atomic structure. Every atom contributes roughly the same number of conduction electrons, regardless of temperature.\n- Step 2: Because the metal is already saturated with free electrons at room temperature, heating the metal does not release any significant number of *new* charge carriers. Thus, $$n$$ remains constant, and the dominant effect of heating is the reduction of drift velocity $$v$$ due to increased lattice vibrations.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "How does the resistance of an NTC thermistor change as its temperature increases? (1 step)", "answer": "- Step 1: As the temperature of an NTC (Negative Temperature Coefficient) thermistor increases, its resistance **decreases**. It behaves oppositely to a metal.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Explain the microscopic mechanism for why a semiconductor (NTC thermistor) decreases its resistance as temperature rises. What is the dominant effect that overrides lattice vibrations? (3 steps)", "answer": "- Step 1: In a semiconductor, most electrons are tightly bound to their atoms at low temperatures, so the number density of free charge carriers $$n$$ is initially very low.\n- Step 2: As temperature rises, more electrons gain sufficient thermal energy to break free from their atomic bonds, dramatically **increasing the number density of free charge carriers $$n$$**.\n- Step 3: Although increased lattice vibrations still occur (which would increase resistance), the massive increase in $$n$$ dominates. Because $$I = nAvq$$, a much larger $$n$$ leads to a much larger current for the same voltage, meaning the resistance $$R = V/I$$ drops significantly.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Compare the effect of temperature on the number density of free charge carriers $$n$$ in a pure metal versus an NTC thermistor. Why does this lead to opposite resistance-temperature behaviors? (3 steps)", "answer": "- Step 1: In a pure metal, $$n$$ is already very high and remains essentially **constant** as temperature rises. The only significant effect of heating is increased lattice vibrations, which slow drift velocity and **increase** resistance.\n- Step 2: In an NTC thermistor, $$n$$ is initially very low but **increases dramatically** with temperature as thermal energy frees bound electrons.\n- Step 3: For the thermistor, the surge in charge carriers overwhelms the effect of lattice vibrations, causing current to rise and resistance to **decrease**. The dominant factor differs: lattice vibrations dominate in metals, while carrier release dominates in semiconductors.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "Define what a superconductor is, specifying the condition under which it exhibits this property. (2 steps)", "answer": "- Step 1: A superconductor is a material that loses all electrical resistance, meaning its resistivity drops abruptly to **exactly zero**.\n- Step 2: This occurs only when the material is cooled below a specific critical temperature, denoted as $$T_c$$ (also called the transition temperature). Above $$T_c$$, the material behaves as a normal conductor with non-zero resistivity.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "Describe the shape of a resistivity vs. temperature graph for a superconductor cooled from room temperature down to near 0 K. Mark the critical temperature $$T_c$$. (3 steps)", "answer": "- Step 1: Above $$T_c$$, the graph shows a gently rising curve similar to a normal metal, where resistivity increases with temperature due to lattice vibrations.\n- Step 2: At exactly $$T_c$$, the resistivity drops **vertically and discontinuously** to zero. This is a phase transition, not a gradual decline.\n- Step 3: Below $$T_c$$, the graph is a flat horizontal line resting exactly on the temperature axis, representing zero resistivity. Current flows indefinitely with no energy loss.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "Name two real-world applications of superconductors and explain why zero resistance is essential for each. (3 steps)", "answer": "- Step 1: **MRI scanners / Strong electromagnets**. Zero resistance allows extremely large currents to flow without any Joule heating ($$P = I^2R = 0$$). This produces immensely strong, stable magnetic fields required for high-resolution medical imaging without the coils melting.\n- Step 2: **Lossless power transmission**. Since $$P = I^2R = 0$$, no electrical energy is wasted as heat in the transmission cables. This allows electricity to be transferred over long distances with 100% efficiency.\n- Step 3: (Alternative) **Maglev trains**. Powerful superconducting magnets levitate the train above the track, eliminating mechanical friction and allowing for very high-speed travel, sustained efficiently because no power is lost to resistive heating in the magnets.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "In the Required Practical CP7 (Resistivity of a Wire), what are the independent, dependent, and control variables? (2 steps)", "answer": "- Step 1: The **independent variable** is the length $$L$$ of the wire. The **dependent variable** is the resistance $$R$$, calculated from $$V/I$$.\n- Step 2: The **control variables** are the cross-sectional area $$A$$ (using the same wire throughout) and the temperature of the wire (kept low and constant to avoid changing the resistivity $$\\rho$$).", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "In CP7, you plot a graph of Resistance (y-axis) against Length (x-axis). How do you find the resistivity $$\\rho$$ from this graph, and what precautions must you take to ensure a valid result? (3 steps)", "answer": "- Step 1: Rearrange the resistivity equation $$R = \\frac{\\rho L}{A}$$ to the form $$y = mx + c$$. Here, $$R$$ is on the y-axis, $$L$$ is on the x-axis, so the gradient $$m = \\frac{\\rho}{A}$$. Therefore, $$\\rho = \\text{gradient} \\times A$$.\n- Step 2: To keep temperature constant (a key precaution), keep the current very low (e.g., < 0.5 A) and switch off the circuit between readings to prevent Joule heating from changing the wire's resistivity.\n- Step 3: Measure the wire diameter $$d$$ at several different positions using a micrometer and average them to account for non-uniformity. A small error in $$d$$ is squared when calculating $$A = \\pi(d/2)^2$$, so a 2% error in $$d$$ causes a 4% error in $$A$$ and thus $$\\rho$$.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "A filament lamp is connected to a constant voltage supply. At the exact moment it is switched on, the current is very high, but it quickly drops and settles. Explain this \"surge\" using the concepts of temperature and resistance. (3 steps)", "answer": "- Step 1: At the exact moment of switch-on, the filament is cold. Its resistance is very low because the lattice ions are vibrating with small amplitude, offering little opposition to the electron flow.\n- Step 2: Because $$I = V/R$$ and the resistance is low, the initial current is very high. This large current causes rapid Joule heating ($$P = I^2R$$), which dramatically raises the temperature of the filament.\n- Step 3: As the temperature rises, the lattice ions vibrate more vigorously, increasing the resistance. The increasing resistance causes the current to drop until a thermal equilibrium is reached, where the rate of heat produced equals the rate of heat lost to the surroundings.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "If you continuously cool a normal metal wire (not a superconductor) towards absolute zero (0 K), its resistance decreases. Would it ever reach exactly zero? Contrast this with a superconductor. (2 steps)", "answer": "- Step 1: No, a normal metal's resistance would never reach exactly zero. Even at 0 K, where lattice vibrations cease, there would still be some minimal resistance due to impurities and defects in the crystal lattice.\n- Step 2: A superconductor differs fundamentally. Below its critical temperature $$T_c$$, its resistivity drops discontinuously to **exactly zero** due to a quantum mechanical phase transition (Cooper pairs forming), not just a gradual reduction in thermal vibrations.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A component has 6.0 V across it and a current of 0.24 A flowing through it. What is its resistance? (Mental math exercise) (2 steps)", "answer": "- Step 1: Write down the formula for resistance: $$R = \\frac{V}{I}$$.\n- Step 2: Substitute the values: $$R = \\frac{6.0}{0.24}$$. To make this easier, recognize that $$0.24 \\times 4 = 0.96$$ (close to 1), so $$0.24 \\times 25 = 6.0$$. Therefore, $$R = 25 \\, \\Omega$$.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "A wire has a resistivity of $$2.0 \\times 10^{-7} \\, \\Omega \\cdot \\text{m}$$, a length of 4.0 m, and a cross-sectional area of $$2.0 \\times 10^{-6} \\, \\text{m}^2$$. Calculate its resistance. (Mental math exercise) (2 steps)", "answer": "- Step 1: Use the resistivity formula: $$R = \\frac{\\rho L}{A}$$.\n- Step 2: Substitute the values: $$R = \\frac{(2.0 \\times 10^{-7}) \\times 4.0}{2.0 \\times 10^{-6}} = \\frac{8.0 \\times 10^{-7}}{2.0 \\times 10^{-6}}$$. Divide the coefficients (8/2 = 4) and subtract the exponents (-7 - -6 = -1). This gives $$4 \\times 10^{-1} = 0.4 \\, \\Omega$$.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "A 100 $$\\Omega$$ resistor has a current of 0.1 A flowing through it. What is the power dissipated? (Mental math exercise) (2 steps)", "answer": "- Step 1: Use the power formula that uses current and resistance: $$P = I^2 R$$.\n- Step 2: Substitute the values: $$P = (0.1)^2 \\times 100 = 0.01 \\times 100 = 1.0 \\, \\text{W}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}], "count": 32}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Explain why the resistance of a metallic conductor increases with temperature, discussing the role of lattice vibrations and electron collisions. (3 steps)", "answer": "- Step 1: At higher temperatures, the lattice ions vibrate more intensely.  \n- Step 2: These stronger vibrations cause more frequent collisions between conduction electrons and ions.  \n- Step 3: Increased collisions reduce electron drift velocity ($v$), decreasing current ($I$) for the same voltage ($V$). Since $R = V/I$, lower $I$ leads to higher resistance.  \n\n**Key Insight:** The increase in resistance is not due to electrons \"stopping\" but due to their average motion (drift velocity) being disrupted by vibrations.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why does the resistance of an NTC thermistor decrease with temperature, despite increased lattice vibrations? (3 steps)", "answer": "- Step 1: In semiconductors, the number of free charge carriers ($n$) increases exponentially with temperature.  \n- Step 2: More free electrons mean a higher current ($I$) for the same voltage ($V$).  \n- Step 3: Despite increased lattice vibrations (which would raise resistance), the surge in $n$ dominates, causing $R = V/I$ to decrease.  \n\n**Contrast:** Unlike metals, the increase in free carriers outweighs the effect of lattice vibrations in semiconductors.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Derive $P = I^2R$ and $P = V^2/R$ from the base formula $P = IV$. Why are these derived forms useful? (3 steps)", "answer": "- Step 1: Start with $P = IV$. Substitute $V = IR$ (Ohm’s Law) to get $P = I^2R$.  \n- Step 2: Substitute $I = V/R$ (Ohm’s Law) into $P = IV$ to get $P = V^2/R$.  \n- Step 3: These forms are useful when only $I$ and $R$ or $V$ and $R$ are known, avoiding direct measurement of both $V$ and $I$.  \n\n**Edge Case:** These formulas apply only to resistors where Ohm’s Law holds (constant $R$).", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "What is the difference between resistance and resistivity? How does resistivity relate to resistance? (2 steps)", "answer": "- Step 1: Resistance ($R$) is a component’s property, depending on its dimensions ($L$, $A$) and material.  \n- Step 2: Resistivity ($\\rho$) is a material’s intrinsic property: $\\rho = \\frac{RA}{L}$. It quantifies how strongly a material opposes current, independent of shape.  \n\n**Visual Analogy:** Resistivity is like a material’s \"pure\" resistance, while $R$ depends on how much of the material you have.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Describe the graphical method to find the resistance of a non-ohmic component at a specific point on its I–V curve. Why can’t you use the gradient? (3 steps)", "answer": "- Step 1: Read the voltage ($V$) and current ($I$) at the desired point on the I–V curve.  \n- Step 2: Calculate $R = V/I$ directly.  \n- Step 3: Gradient ($\\Delta I/\\Delta V$) gives $1/R$ for ohmic components, but for non-ohmic devices, the curve is nonlinear, so gradient varies and cannot represent a single $R$.  \n\n**Misconception Probe:** Why not just use the gradient? Because gradient is $\\Delta V/\\Delta I$, which equals $R$ only for linear (ohmic) components.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What happens to the resistivity of a superconductor below its critical temperature $T_c$? How is this useful for applications like MRI machines? (2 steps)", "answer": "- Step 1: Below $T_c$, resistivity ($\\rho$) drops abruptly to zero. This allows current to flow indefinitely without energy loss.  \n- Step 2: In MRI machines, superconducting coils sustain large currents without heating, generating strong, stable magnetic fields for imaging.  \n\n**Limiting Case:** At absolute zero, classical resistance would vanish, but superconductivity is a quantum phenomenon requiring $T < T_c$, not absolute zero.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why does a filament lamp not obey Ohm’s Law? How does its I–V graph reflect this? (3 steps)", "answer": "- Step 1: As current flows, the filament heats up, increasing $R$ due to lattice vibrations.  \n- Step 2: The I–V graph curves with a decreasing gradient, showing $R$ increases with $V$.  \n- Step 3: Ohm’s Law requires constant $R$ (straight line through origin). Curving graph violates this, so the lamp is non-ohmic.  \n\n**Visual Intuition:** The flattening curve means doubling $V$ gives less than double $I$, unlike ohmic conductors.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Compare the temperature dependence of resistance in metals (PTC) and semiconductors (NTC). Why is their behavior opposite? (3 steps)", "answer": "- Step 1: Metals (PTC): Higher $T$ → stronger lattice vibrations → more electron collisions → $R$ increases.  \n- Step 2: Semiconductors (NTC): Higher $T$ → more free electrons released → $n$ increases dramatically → $R$ decreases.  \n- Step 3: The mechanisms oppose each other: lattice vibrations raise $R$ in metals, while free carrier density lowers $R$ in semiconductors.  \n\n**Critical Thinking:** Why doesn’t the NTC’s lattice vibration effect dominate? Because the exponential increase in $n$ overwhelms the small rise in collisions.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}, {"question": "How does a fuse protect a circuit, and why is power dissipation ($P = I^2R$) relevant to its design? (3 steps)", "answer": "- Step 1: A fuse contains a low-melting-point wire. If current ($I$) exceeds the rating, it melts, breaking the circuit.  \n- Step 2: Power dissipated ($P = I^2R$) determines heating. Higher $I$ causes rapid heating due to the squared term.  \n- Step 3: The fuse’s $R$ is chosen so that $P$ reaches the melting point only when $I$ exceeds the safe limit.  \n\n**Example:** A 13 A fuse in a 240 V, 3.0 kW kettle ($I = 12.5 A$) avoids melting because $I < 13 A$.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "What is the purpose of measuring the resistivity of a metal wire in Required Practical CP7? How does the experiment isolate resistivity ($\\rho$) as a material property? (3 steps)", "answer": "- Step 1: The experiment varies the length ($L$) of a metal wire and measures resistance ($R$) while keeping cross-sectional area ($A$) constant.  \n- Step 2: Plotting $R$ vs. $L$ gives a straight line with gradient $\\rho/A$. Multiplying gradient by $A$ isolates $\\rho$.  \n- Step 3: By controlling $A$ and $T$, the experiment confirms $\\rho$ is a material property, independent of $L$ or $R$.  \n\n**Uncertainty Note:** A 2% error in $d$ (diameter) causes a 4% error in $A$, emphasizing precise micrometer use.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What is the definition of resistance, and what are its units? Why is resistance not a fixed material property? (3 steps)", "answer": "- Step 1: Resistance ($$R$$) is defined as the ratio of potential difference ($$V$$) across a component to the current ($$I$$) through it, $$R = \\frac{V}{I}$$. Units: ohms ($$\\Omega$$).\n- Step 2: Resistance depends on both the material's properties (like resistivity) and the component's physical dimensions (length and cross-sectional area). A longer conductor or one with smaller cross-sectional area has higher resistance.\n+ Example: A copper wire's resistance increases if stretched (longer) or made thinner (smaller area), even with constant resistivity.\n- Step 3: Resistance also changes with temperature. For most conductors, increasing temperature raises resistance due to greater lattice vibrations and more frequent electron collisions.\n+ Misconception Probe: Why isn't resistance a material property? Because it depends on geometry (length/area) and temperature, not just material.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Under what conditions does a component obey Ohm’s Law? What does this imply about its resistance? (2 steps)", "answer": "- Step 1: A component obeys Ohm’s Law if current ($$I$$) is directly proportional to voltage ($$V$$) *at constant temperature*. This gives a straight-line I-V graph through the origin (constant $$R$$).\n+ Example: A fixed resistor at room temperature shows a linear I-V graph.\n- Step 2: If temperature changes, resistance varies (e.g., filament lamp heats up), causing a non-linear I-V graph. Ohm’s Law only applies when temperature is constant.\n+ Misconception Probe: Does Ohm’s Law apply if temperature changes? No—changing temperature alters resistance, breaking the $$I \\propto V$$ relationship.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How does resistivity ($$\\rho$$) differ from resistance ($$R$$)? What factors affect each? (3 steps)", "answer": "- Step 1: Resistivity ($$\\rho$$) is an intrinsic material property, calculated by $$\\rho = \\frac{RA}{L}$$ (units: $$\\Omega \\cdot m$$). Resistance ($$R$$) is derived from $$R = \\rho \\frac{L}{A}$$.\n- Step 2: Resistivity depends only on material type and temperature. Copper’s $$\\rho$$ remains constant regardless of wire length/thickness.\n+ Example: Two copper wires of different sizes have same $$\\rho$$ but different $$R$$.\n- Step 3: Resistance is affected by geometry (length/area) and material $$\\rho$$. Longer or thinner conductors have higher $$R$$.\n+ Misconception Probe: Why does $$\\rho$$ stay constant for different resistor sizes? Because it’s a material property independent of dimensions.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How do the formulas $$P = IV$$, $$P = I^2R$$, and $$P = V^2/R$$ relate? When is each most useful? (3 steps)", "answer": "- Step 1: Start with $$P = IV$$. Substitute $$V = IR$$ to get $$P = I^2R$$—useful when current ($$I$$) and resistance ($$R$$) are known.\n+ Example: Calculating power loss in a transmission line with known current.\n- Step 2: Replace $$I$$ with $$V/R$$ in $$P = IV$$ to derive $$P = V^2/R$$—useful when voltage ($$V$$) and $$R$$ are known.\n+ Example: Determining power consumption of a resistor rated at 12V with known $$R$$.\n- Step 3: All formulas are equivalent via Ohm’s Law but are applied based on measurable variables (which two of $V, I, R$ are easier to measure).\n+ Misconception Probe: Why different formulas? They’re algebraic rearrangements optimized for available data.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why does resistance in a metal conductor increase with temperature? What happens to electron flow? (3 steps)", "answer": "- Step 1: Increased temperature amplifies lattice ion vibrations. These vibrations scatter conduction electrons more frequently.\n+ Analogy: Imagine students jumping vs. standing still in a hallway—more collisions hinder motion.\n- Step 2: More collisions reduce electron drift velocity ($$v$$) in $$I = nAvq$$. With fewer collisions, electrons move slower.\n- Step 3: Lower current ($$I$$) for fixed voltage ($$V$$) implies higher $$R = V/I$$. This gives metals a positive temperature coefficient (PTC).\n+ Misconception Probe: Why doesn’t free electron density ($$n$$) in metals change? In metals, $$n$$ is fixed by atomic structure, unlike semiconductors.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "Why does a thermistor (NTC) decrease in resistance with temperature? How does this differ from metals? (3 steps)", "answer": "- Step 1: In semiconductors, higher temperature releases more free electrons, increasing charge carrier density ($$n$$).\n+ Example: An NTC thermistor in a circuit conducts more current as temperature rises.\n- Step 2: Increased $$n$$ overpowers any rise in lattice vibrations, leading to lower resistance ($$R = V/I$$).\n- Step 3: Unlike metals (PTC), semiconductors have a negative temperature coefficient (NTC)—resistance drops with temperature due to more free carriers.\n+ Misconception Probe: Why don’t vibrations dominate in semiconductors? The surge in free carriers outweighs vibration effects, unlike metals.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "What is superconductivity? What conditions are required, and what are its key applications? (3 steps)", "answer": "- Step 1: Superconductivity occurs when a material’s resistivity ($$\\rho$$) drops abruptly to zero below its critical temperature ($$T_c$$).\n+ Example: Mercury becomes superconducting below 4.2 K.\n- Step 2: Below $$T_c$$, current flows indefinitely without energy loss (no $$I^2R$$ heating). Above $$T_c$$, the material behaves normally.\n- Step 3: Applications include:\n  + MRI machines (strong superconducting magnets)\n  + Maglev trains (frictionless magnetic levitation)\n  + Lossless power cables (zero resistive losses)\n+ Misconception Probe: Why don’t superconductors work at room temperature? $$T_c$$ is material-dependent—high-$$T_c$$ superconductors (e.g., YBCO) still require cooling (92 K).", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "A thermistor (NTC) and a fixed resistor (100 Ω) are connected in series with a battery. When the thermistor is cooled, what happens to (a) total resistance and (b) current? Explain why. (3 steps)", "answer": "- Step 1: Cooling an NTC thermistor increases its resistance ($$R_{th}$$), as fewer free carriers are available.\n- Step 2: Total circuit resistance $$R_{total} = R_{th} + 100 \\Omega$$ increases due to higher $$R_{th}$$.\n- Step 3: With constant battery voltage ($$V$$), current $$I = \\frac{V}{R_{total}}$$ decreases because $$R_{total}$$ is larger.\n+ Misconception Probe: Why doesn’t the resistor’s resistance change? Fixed resistors have negligible temperature dependence compared to thermistors.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Compare the temperature-resistance behavior of metals (PTC) and semiconductors (NTC). Explain the mechanisms. (4 steps)", "answer": "- Step 1: Metals (PTC):\n  + Temperature ↑ → lattice vibrations ↑ → more electron collisions → drift velocity ↓ → $$I$$ ↓ → $$R = V/I$$ ↑\n- Step 2: Semiconductors (NTC):\n  + Temperature ↑ → more free electrons released → $$n$$ ↑ → $$I$$ ↑ → $$R = V/I$$ ↓\n+ Analogy: Metal = crowded hallway with jumping students; semiconductor = students breaking free from desks.\n- Step 3: Metals: $$R \\propto T$$. Semiconductors: $$R \\propto 1/T$$.\n- Step 4: Graphically: Metal’s $$R$$-vs-$$T$$ is linear increasing; semiconductor’s curve is steeply decreasing.\n+ Misconception Probe: Why opposite behaviors? Metals have fixed $$n$$, semiconductors have $$n$$ dependent on thermal energy.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": true}, {"question": "How is resistivity ($$\\rho$$) determined experimentally for a metal wire? What precautions ensure accuracy? (3 steps)", "answer": "- Step 1: Measure resistance ($$R = V/I$$) of wires of varying lengths ($$L$$) but same thickness. Plot $$R$$ vs $$L$$—linear graph with slope $$\\rho/A$$.\n- Step 2: Calculate $$\\rho = \\text{slope} \\times A$$, where $$A = \\pi (d/2)^2$$ from micrometer-measured diameter ($$d$$).\n+ Example: If slope = 5.0 Ω/m and $$A = 2.0 \\times 10^{-6} m^2$$, then $$\\rho = 5.0 \\times 2.0 \\times 10^{-6} = 1.0 \\times 10^{-5} \\Omega \\cdot m$$.\n- Step 3: Precautions:\n  + Low current to prevent heating (which alters $$\\rho$$)\n  + Measure $$d$$ at multiple points (wire may not be uniform)\n  + Ensure good contacts to minimize contact resistance\n+ Misconception Probe: Why not measure one wire? Multiple lengths ensure a linear fit validates $$\\rho$$, avoiding anomalies.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "State the SI unit of resistance and define it in terms of base units (volts and amperes). (1 step)", "answer": "- The SI unit is the **ohm**, symbol $$\\Omega$$.\n- One ohm is defined as one volt per ampere: $$1 \\ \\Omega = 1 \\ V \\ A^{-1}$$.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Draw or describe the circuit used to measure the resistance of a component experimentally. What are the ideal properties of the ammeter and voltmeter in this circuit? (2 steps)", "answer": "- Step 1: Connect the component in series with an **ammeter** (to measure current $$I$$) and a **voltmeter** in **parallel** (to measure potential difference $$V$$).\n- Step 2: The ideal **ammeter** has **zero resistance** so it does not alter the current in the circuit. The ideal **voltmeter** has **infinite resistance** so it takes no current from the circuit, ensuring an accurate reading of the voltage across the component.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "State Ohm's Law. Under what specific physical condition does this law hold true? (1 step)", "answer": "- Ohm's Law states that the current $$I$$ through a conductor is **directly proportional** to the potential difference $$V$$ across it ($$I \\propto V$$).\n- This law only holds if the **temperature of the conductor is constant**.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Explain how to determine the resistance of an **ohmic conductor** from its current-voltage (I-V) graph. (2 steps)", "answer": "- Step 1: For an ohmic conductor, the I-V graph is a **straight line passing through the origin** (0,0).\n- Step 2: The gradient of this line is $$\\frac{\\Delta I}{\\Delta V}$$. Since $$R = \\frac{V}{I}$$, the resistance is the reciprocal of the gradient: $$R = \\frac{1}{\\text{gradient}}$$.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A filament lamp is a non-ohmic conductor. Sketch its I-V characteristic curve and explain why the curve is not a straight line through the origin. (2 steps)", "answer": "- Step 1: The curve starts as a steep straight line but then **bends downwards** (the gradient decreases) as voltage/current increases.\n- Step 2: This happens because as the current increases, the filament's **temperature rises**. Higher temperature increases lattice vibrations, leading to more frequent collisions with electrons, which **increases the resistance**. Since R is not constant, the graph is not a straight line.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A student tries to find the resistance of a non-ohmic component by calculating $$1/\\text{gradient}$$ at a specific point on its I-V curve. Explain why this method is invalid. (2 steps)", "answer": "- Step 1: For non-ohmic components (like a filament lamp or diode), the resistance **changes** with the potential difference.\n- Step 2: The gradient of the tangent at a specific point only gives the **instantaneous** $$1/R$$ at that exact voltage. To find the resistance at a specific point, you must **read the values of V and I at that point** and use $$R = V/I$$ directly.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Define resistivity $$\\rho$$. How does it differ from resistance $$R$$? (2 steps)", "answer": "- Step 1: Resistivity $$\\rho$$ is an **intrinsic property of a material**. It quantifies how strongly a specific material opposes electric current, regardless of its shape or size. Unit: $$\\Omega \\cdot m$$.\n- Step 2: Resistance $$R$$ is a property of a **specific component** (e.g., a particular wire). It depends on the material's resistivity, its length $$L$$, and its cross-sectional area $$A$$ ($$R = \\rho L / A$$).", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "A copper wire has a diameter $$d$$. If you replace it with a copper wire of diameter $$2d$$ (but keep the length the same), by what factor does the resistance change? Explain your reasoning. (2 steps)", "answer": "- Step 1: The cross-sectional area $$A$$ is proportional to $$d^2$$. If diameter doubles, area increases by a factor of $$(2)^2 = 4$$.\n- Step 2: Since $$R \\propto 1/A$$ (for constant $$L$$ and $$\\rho$$), the resistance decreases by a factor of 4. The new resistance is one-quarter of the original.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Derive the power dissipation formula $$P = I^2 R$$ starting from $$P = IV$$. (2 steps)", "answer": "- Step 1: Start with the definition of power $$P = IV$$.\n- Step 2: Substitute Ohm's Law ($$V = IR$$) into the power equation: $$P = I(IR) = I^2 R$$.\n- This shows power depends on the square of the current and the resistance.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "An electric kettle is rated at $$240 \\ V$$ and $$2.4 \\ kW$$. Calculate the current flowing when it is switched on. If a 10A fuse is used, will it blow? (2 steps)", "answer": "- Step 1: Use $$P = VI$$. Current $$I = P / V = (2400 \\ W) / (240 \\ V) = 10 \\ A$$.\n- Step 2: The current is exactly 10A. A 10A fuse is at its limit; any slight increase (e.g., voltage fluctuation) would blow it. For safe operation with a margin, a 13A fuse is usually chosen. A 10A fuse is likely to blow or operate at its limit (the answer depends on the exact wording, but typically 10A is too low for 2.4kW).", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Explain, using the \"free electron\" model, why the resistance of a metallic conductor increases with temperature. (2 steps)", "answer": "- Step 1: In a metal, conduction electrons drift through a lattice of positive ions. As temperature increases, the ions vibrate with **greater amplitude**.\n- Step 2: This increases the **frequency of collisions** between the electrons and the vibrating ions. These collisions impede the flow of electrons (reducing drift velocity), meaning more voltage is needed to drive the same current. Hence, resistance increases.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Explain why an NTC (Negative Temperature Coefficient) thermistor's resistance decreases as temperature increases. (2 steps)", "answer": "- Step 1: A thermistor is a semiconductor. Unlike metals, the number density of free charge carriers $$n$$ in a semiconductor **increases significantly with temperature** (more electrons gain enough energy to jump from the valence band to the conduction band).\n- Step 2: Since current $$I = nAvq$$ (for constant area $$A$$ and drift velocity $$v$$), more carriers mean a larger current for the same voltage. Thus, from $$R = V/I$$, resistance decreases.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Contrast the behavior of resistance with temperature for a metal (PTC) and a semiconductor (NTC). (1 step)", "answer": "- **Metal (PTC):** Temperature $$\\uparrow$$ $$\\Rightarrow$$ Resistance $$\\uparrow$$. Caused by increased lattice vibrations.\n- **Semiconductor/NTC Thermistor:** Temperature $$\\uparrow$$ $$\\Rightarrow$$ Resistance $$\\downarrow$$. Caused by increased number of free charge carriers.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": true}, {"question": "Define a superconductor. What happens to its resistivity below the critical temperature $$T_c$$? (1 step)", "answer": "- A superconductor is a material that, when cooled below its **critical temperature ($$T_c$$)**, loses all electrical resistance.\n- Its resistivity drops abruptly to **exactly zero** (effectively $$\\rho \\approx 0$$).", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "State two applications of superconductors and explain why the zero-resistance property is essential for each. (2 steps)", "answer": "- Step 1: **MRI Scanners:** Use superconducting coils to carry very large currents to generate extremely strong magnetic fields. Zero resistance means no heat loss, allowing huge currents to flow indefinitely without overheating.\n- Step 2: **Power Transmission Cables:** Zero resistance means $$P = I^2R = 0$$. Electricity can be transmitted over long distances with no energy loss as heat, vastly improving efficiency.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "In Required Practical CP7 ( resistivity of a wire), you plot a graph of Resistance $$R$$ against Temperature $$\\theta$$. What does the shape of this graph tell you about the metal? (1 step)", "answer": "- The graph is a **straight line with a positive gradient**, but it does not pass through the origin. It intercepts the y-axis at a value $$R_0$$ (resistance at $$0^\\circ \\text{C}$$).\n- This shows that resistance increases approximately **linearly** with temperature for a metal.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "You have a circuit with a fixed resistor in series with an NTC thermistor connected to a battery. What happens to the current if the thermistor is heated? Explain using the concept of total resistance. (2 steps)", "answer": "- Step 1: Heating the NTC thermistor **decreases** its resistance.\n- Step 2: The total resistance of the series circuit decreases ($$R_{total} = R_{fixed} + R_{thermistor}$$). Since the battery voltage is constant, the current $$I = V / R_{total}$$ **increases**.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}], "count": 17}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A component has a potential difference of 6.0 V across it and a current of 0.24 A flowing through it. Calculate its resistance. (2 steps)", "answer": "- Step 1: Identify the given values: V = 6.0 V, I = 0.24 A.\n- Step 2: Apply the resistance formula: $$R = \\frac{V}{I} = \\frac{6.0}{0.24} = 25 \\Omega$$.\n\nThe key is to divide voltage by current — never multiply them. This is a common mistake (R ≠ IV).", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "State Ohm's Law in the precise wording required by exam boards. What two conditions must both be satisfied for a component to obey Ohm's Law? (2 steps)", "answer": "- Step 1: Ohm's Law states: The current through a conductor is directly proportional to the potential difference across it, provided the temperature remains constant.\n- Step 2: The two required conditions are: (1) Current is directly proportional to potential difference (I ∝ V), AND (2) Temperature of the component remains constant.\n\nBoth conditions must be stated for full marks — temperature must be constant because resistance changes with temperature.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Explain why the I–V graph for an ohmic conductor is a straight line through the origin, while for a filament lamp it is a curve. (3 steps)", "answer": "- Step 1: For an ohmic conductor (e.g., a metal wire at constant temperature), resistance is constant. Since I = V/R, current is directly proportional to voltage — giving a straight-line graph through the origin with constant gradient (1/R).\n- Step 2: For a filament lamp, as current increases, the filament temperature rises significantly (from room temperature to ~3000 K when operating).\n- Step 3: Higher temperature increases lattice vibrations, causing more electron collisions, which increases resistance. Since R is no longer constant, the I–V graph curves — the gradient (1/R) decreases as voltage increases.\n\nThe curve shows the lamp is non-ohmic: resistance changes with operating conditions.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "How do you determine the resistance of a non-ohmic component from its I–V graph? Why can't you use the gradient? (2 steps)", "answer": "- Step 1: For a non-ohmic component, you must read off the voltage V and current I at the specific point of interest, then calculate R = V/I directly.\n- Step 2: You cannot use the gradient because resistance is not constant — the gradient changes at different points along the curve. A single gradient value would not represent the resistance at any specific operating point.\n\nThis is a common trap: students try to use 1/gradient for non-ohmic components, but this only works for ohmic conductors where R is constant.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Distinguish between resistance and resistivity. Which one is an intrinsic property of a material, and which depends on the dimensions of the component? (2 steps)", "answer": "- Step 1: Resistance R is the opposition of a specific component to current flow; it depends on the component's dimensions (length and cross-sectional area) and its temperature. Resistivity ρ is an intrinsic property of the material itself — it depends on the material and its temperature, but not on the shape or size.\n- Step 2: Resistivity is the intrinsic property (like density or melting point), while resistance is the geometrical property.\n\nThe formula linking them is $$R = \\frac{\\rho L}{A}$$, showing R scales with length L and inversely with area A.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A copper wire has resistivity ρ = 1.7 × 10⁻⁸ Ω·m, length L = 2.0 m, and diameter d = 0.50 mm. Estimate its resistance. (3 steps)", "answer": "- Step 1: Calculate cross-sectional area: $$A = \\pi \\left(\\frac{d}{2}\\right)^2 = \\pi \\times (0.25 \\times 10^{-3})^2 = \\pi \\times 6.25 \\times 10^{-8} \\approx 1.96 \\times 10^{-7} \\, \\text{m}^2$$.\n- Step 2: Use the resistivity formula: $$R = \\frac{\\rho L}{A}$$.\n- Step 3: Substitute: $$R = \\frac{1.7 \\times 10^{-8} \\times 2.0}{1.96 \\times 10^{-7}} \\approx \\frac{3.4 \\times 10^{-8}}{2 \\times 10^{-7}} \\approx 0.17 \\, \\Omega$$.\n\nUnits check: Ω·m × m / m² = Ω ✓. The wire has very low resistance because copper has low resistivity.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Write down the three equivalent formulas for electrical power dissipated in a resistor, and state which form is most useful when: (a) current is constant, (b) voltage is constant. (2 steps)", "answer": "- Step 1: The three equivalent formulas are: $$P = IV = I^2R = \\frac{V^2}{R}$$.\n- Step 2: (a) When current is constant, use P = I²R (R determines power loss). (b) When voltage is constant, use P = V²/R (higher R means lower power).\n\nPower dissipation occurs because electrons do work against resistance — energy is transferred as heat through electron-ion collisions.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "A 47 Ω resistor carries a current of
