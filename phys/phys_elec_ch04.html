: "In CP7, why is it important to keep the current through the wire small (e.g. <0.5 A) during the measurement?", "answer": "A larger current would cause significant Joule heating ($$P = I^2 R$$), warming the wire above room temperature. Since metals are PTC, this would *raise* the wire's resistivity during the experiment, so different points on the R-vs-L plot would correspond to *different* temperatures — corrupting the assumption that ρ is constant along the line. Keeping I small ensures the heating is negligible, the wire stays at room temperature throughout, and the gradient $$\\rho/A$$ is a clean measurement of ρ at a single, well-defined temperature. (It also protects the wire from thermal damage.)", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "In CP7, why should you measure the wire's diameter at several positions along its length and use a micrometer (not a ruler)?", "answer": "Two reasons. **(1) Non-uniformity:** real wires are not perfectly cylindrical — the diameter varies slightly along the length due to manufacturing tolerances. Averaging several measurements gives a more representative A. **(2) Sensitivity of A to d:** because $$A = \\pi(d/2)^2$$, area depends on the *square* of diameter — so a 2% error in d gives a 4% error in A and hence a 4% error in ρ. A ruler can only resolve ~1 mm, which would give >100% error on a wire ~0.5 mm thick; a micrometer resolves ~0.01 mm, giving ~2% accuracy. The squared dependence makes diameter the experiment's biggest error source — measure it carefully.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Why does an NTC thermistor's resistance *decrease* as its temperature rises — the opposite of a metal? (4 steps)", "answer": "- Step 1: An NTC thermistor is made of a **semiconductor**, where electrons are bound in covalent bonds and only \"escape\" to become free carriers if they gain enough thermal energy.\n- Step 2: Raising T gives more thermal energy to the bound electrons, so more of them break free. The number density of charge carriers $$n$$ in $$I = nAvq$$ **increases dramatically** with T (often exponentially).\n- Step 3: This effect *vastly* outweighs the reduction in drift velocity v from increased lattice vibrations (which still happens, as in metals).\n- Step 4: With $$n$$ rising much faster than $$v$$ is falling, the net product $$nv$$ rises, so I rises for the same V, and from $$R = V/I$$, R falls.\n\nTakeaway: in metals, n is fixed and v dominates ⇒ R↑ with T. In semiconductors, n is variable and dominates ⇒ R↓ with T.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Why doesn't a metal show the same temperature behaviour as a semiconductor, when *both* are made of atoms with bound electrons?", "answer": "The crucial difference is in the number density $$n$$ of free charge carriers. In a metal, free electrons are abundant *at all temperatures*: roughly one per atom, and $$n \\sim 10^{28}\\,\\text{m}^{-3}$$, essentially independent of T (small thermal changes don't add appreciable carriers because there's already a \"sea\" of them). In a semiconductor, by contrast, the number of free carriers at room temperature is *vastly smaller* and *strongly* temperature-dependent — bound electrons must be thermally promoted across an energy gap to become mobile. So temperature does two things in both materials (more lattice vibration → slower drift; and possibly more carriers), but in a metal only the first matters (n is \"saturated\"), whereas in a semiconductor the second dominates by orders of magnitude. Different starting populations of free carriers ⇒ different dominant effect ⇒ opposite sign of dR/dT.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "A NTC thermistor is in series with a fixed resistor and a battery. The thermistor is *cooled*. What happens to (a) the total resistance, (b) the current, and (c) the p.d. across the thermistor? (3 steps)", "answer": "- Step 1: Cooling NTC ⇒ fewer free carriers ⇒ thermistor's resistance **rises**. Total circuit resistance therefore **increases**.\n- Step 2: With the same EMF and higher total R, by $$I = \\text{EMF}/R_\\text{total}$$, current **decreases**.\n- Step 3: The thermistor now has both a larger resistance AND carries a smaller current — but in a series circuit, the voltage divides in proportion to resistance. Since the thermistor took a larger share of the total resistance, the p.d. across it **increases**. (You can verify: $$V_\\text{therm} = I \\cdot R_\\text{therm}$$; R rose faster than I fell.)\n\nTakeaway: cooling NTC ⇒ R_total ↑, I ↓, V_therm ↑. This is the principle of temperature-sensing potential dividers.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Why does a filament lamp's I–V graph curve over (gradient decreases) rather than staying linear? (3 steps)", "answer": "- Step 1: At low V, current is small, $$P = I^2 R$$ heating is negligible, filament stays near room T. R is approximately constant — graph starts roughly linear.\n- Step 2: As V increases, I increases too, and the power dissipated $$I^2 R$$ heats the tungsten filament significantly (up to ~3000 K at full brightness).\n- Step 3: Tungsten is a metal (PTC), so as T rises, R rises. With R growing, each additional volt produces *less* additional current than before — the curve flattens (gradient $$\\Delta I/\\Delta V = 1/R$$ decreases). The filament's hot R can be ~10× its cold R, which also explains the brief current \"surge\" when a lamp is first switched on cold.\n\nTakeaway: non-ohmic curve in a filament lamp = Joule heating + PTC feeding back on itself.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "Sketch and describe the resistance-vs-temperature graph for a metal, an NTC thermistor, and a superconductor on the same axes. (3 steps)", "answer": "- Step 1: **Metal:** approximately straight line with positive gradient — R rises gently and roughly linearly with T (slope = $$R_0\\alpha$$, intercept = $$R_0$$ above zero).\n- Step 2: **NTC thermistor:** steep curve falling from high R at low T toward low R at high T. The fall is non-linear (often roughly exponential), much steeper than the metal's rise.\n- Step 3: **Superconductor:** above critical temperature $$T_c$$, it behaves like a metal (gentle positive slope). At $$T = T_c$$, R drops *discontinuously* (cliff edge) to exactly zero. For all $$T < T_c$$, R = 0 (flat line on the axis).\n\nTakeaway: three distinct signatures — gentle rise (metal), steep fall (semiconductor), vertical cliff to zero (superconductor).", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Define a superconductor in exam-board language, including the precise condition under which it operates.", "answer": "A superconductor is a material whose resistivity drops abruptly to **exactly zero** when it is cooled below a specific temperature called the **critical (or transition) temperature** $$T_c$$. Above $$T_c$$, it behaves as an ordinary conductor (resistivity > 0); at $$T_c$$, the resistivity falls discontinuously; below $$T_c$$, current flows with absolutely no electrical resistance and therefore no heating effect ($$P = I^2 R = 0$$). For full exam marks you must say \"resistivity = zero\" (or \"no resistance\") — describing it as \"very low\" or \"almost zero\" is NOT sufficient. You must also state the condition: \"below the critical temperature $$T_c$$.\"", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Why is it important to say a superconductor's resistivity is *exactly* zero rather than just \"very small\"? (2 steps)", "answer": "- Step 1: \"Very small but nonzero\" R would still dissipate some power $$I^2 R > 0$$, meaning a current set up in a loop would gradually decay as energy is lost. Experimentally, currents in superconducting rings have been observed to persist for years with no measurable decrease — consistent only with R being *exactly* zero, not merely tiny.\n- Step 2: This isn't a quantitative refinement of normal conduction — it's a qualitatively different state of matter (a phase transition). The collective quantum behaviour of paired electrons below $$T_c$$ means no energy can be transferred to the lattice. Saying \"very small\" misses the physics entirely; it's not \"a very good conductor,\" it's a fundamentally different phenomenon.\n\nTakeaway: the word \"exactly\" carries the physics — it's a phase, not a refinement.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Give three real-world applications of superconductors and explain in each case why zero resistivity is essential. (3 steps)", "answer": "- Step 1: **MRI scanners / strong electromagnets:** superconducting coils carry enormous currents (hundreds of amps) without overheating, producing the extremely strong, stable magnetic fields needed to align nuclear spins for imaging. Any normal coil would melt or require impossibly heavy cooling at those currents because $$P = I^2 R$$ would be huge.\n- Step 2: **Lossless power transmission cables:** electricity is currently transmitted with several percent loss as heat in resistive cables. Superconducting cables would have $$P = I^2 R = 0$$, transmitting power across continents with zero Joule losses (and no voltage drop along the line).\n- Step 3: **Maglev trains:** powerful superconducting electromagnets levitate the train above the track, eliminating wheel-on-rail friction and enabling very high speeds. The magnets must be both extremely strong and stable — only achievable without overheating when R = 0. (Also: particle accelerators like the LHC, which use superconducting magnets to steer beams.)\n\nTakeaway: in every case, the benefit is the same — huge currents = strong fields, with no waste heat.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "A loop of superconducting wire is cooled below $$T_c$$ and a current is induced in it. What happens to that current over time, and why?", "answer": "The current persists indefinitely — for years, decades, in principle forever — with no decrease. The reason is that any current dissipates energy at a rate $$P = I^2 R$$, and for a superconductor below $$T_c$$, R is exactly zero. So the rate of energy loss is zero, the current has no mechanism to lose kinetic energy, and it just keeps circulating. This \"persistent current\" is the most direct experimental proof that R is precisely zero (not merely small) — measured decays place an upper limit on R that is astronomically smaller than even the best normal conductors.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "Compare the resistivity of a good normal conductor (e.g. copper) with that of a superconductor below $$T_c$$, in orders of magnitude.", "answer": "Copper has $$\\rho \\approx 1.7 \\times 10^{-8}\\,\\Omega\\cdot\\text{m}$$ — already one of the best normal conductors. A superconductor below $$T_c$$ has $$\\rho$$ effectively zero; experimental upper limits place it below $$\\sim 10^{-25}\\,\\Omega\\cdot\\text{m}$$ or so (often quoted as ~$$10^{-18}$$ in textbooks as a conservative figure), which is at least 10 orders of magnitude lower than copper. This isn't \"twice as good\" or \"ten times as good\" — it's a difference of factors so vast they cannot be meaningfully compared on a linear scale. Functionally, you should treat the superconductor as having genuinely zero resistivity.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Two pieces of copper — a thin wire of length 2 m and a thick rod of length 0.5 m — are sitting on a table. Do they have the same resistance? Same resistivity? (2 steps)", "answer": "- Step 1: **Resistance:** No. Resistance depends on geometry through $$R = \\rho L/A$$. The thin long wire has both larger L and smaller A, so it will have *much* higher R. The thick short rod has the opposite — much lower R.\n- Step 2: **Resistivity:** Yes — both are copper at the same temperature, so they have identical resistivity ($$\\rho \\approx 1.7 \\times 10^{-8}\\,\\Omega\\cdot\\text{m}$$). Resistivity is a property of the *material*, not the object's shape.\n\nTakeaway: same material ⇒ same ρ. Different shape ⇒ different R.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "A wire of resistivity $$\\rho$$ and resistance R is stretched to twice its original length, keeping its volume constant. By what factor does its new resistance change? (4 steps)", "answer": "- Step 1: Original: length $$L$$, area $$A$$, volume $$V = LA$$.\n- Step 2: After stretching: length $$L' = 2L$$. Volume conserved: $$L'A' = LA$$, so $$A' = A/2$$.\n- Step 3: New resistance: $$R' = \\rho L'/A' = \\rho (2L)/(A/2) = 4 \\rho L/A = 4R$$.\n- Step 4: Resistance quadruples. Mechanism: stretching makes the wire longer (linear factor 2) AND thinner (area factor 1/2), and both effects raise R, multiplying together.\n\nTakeaway: stretching at constant volume ⇒ R goes up as the square of the stretch factor.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "A student says: \"If I cool a metal wire to absolute zero, its resistance must reach zero — that makes it a superconductor.\" Identify the misconception. (3 steps)", "answer": "- Step 1: Cooling a metal does *reduce* its resistance gradually (PTC behaviour: $$R = R_0(1+\\alpha\\theta)$$ decreases as θ decreases), but it does *not* reach zero smoothly. Even at 0 K, normal metals retain a finite \"residual resistance\" from impurities, defects, and lattice imperfections (impurity scattering doesn't go away with temperature).\n- Step 2: A superconductor is qualitatively different: at a specific critical temperature $$T_c$$, the resistance drops *discontinuously* — a cliff edge, not a gentle approach. This is a phase transition.\n- Step 3: Not every metal is a superconductor. Some materials (e.g. mercury, niobium, certain ceramics) undergo this transition; others (e.g. copper, gold) never do, regardless of how cold you make them. So cooling alone is insufficient — the material must have the right physics to enable the transition.\n\nTakeaway: superconductivity is a discrete phase change in *specific* materials, not the natural limit of cooling any conductor.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "Why would using a superconducting cable for power transmission save energy compared to copper, even though copper already has a low resistivity?", "answer": "Copper's resistivity is low but not zero — it's about $$1.7 \\times 10^{-8}\\,\\Omega\\cdot\\text{m}$$. Over hundreds of kilometres of high-current transmission, the accumulated $$I^2R$$ losses are substantial — typically several percent of the transmitted power dissipated as heat. For a country-scale grid moving gigawatts, that's many megawatts of waste, plus the cost of generating capacity to replace it. A superconducting cable has $$R = 0$$ *exactly*, so $$P_\\text{loss} = I^2 \\cdot 0 = 0$$. No matter how long the line or how large the current, no energy is lost to heating. The catch: maintaining the cable below $$T_c$$ requires cryogenic cooling, which itself costs energy — so the economic case depends on whether the cooling cost is less than the $$I^2R$$ savings. For very long, high-current lines, it can be.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "On an I–V graph for a filament lamp, what is the relationship between the gradient at any point and the lamp's resistance at that point, and how does the gradient change as you move to higher V? (3 steps)", "answer": "- Step 1: At a single operating point $$(V, I)$$, the lamp's resistance is $$R = V/I$$ — the ratio, NOT the local gradient.\n- Step 2: The gradient $$\\mathrm{d}I/\\mathrm{d}V$$ is a *different* quantity (the differential conductance). For an ohmic conductor, gradient and 1/R coincide, but for a curving non-ohmic graph they don't.\n- Step 3: As V increases on a filament lamp, the curve flattens — gradient decreases. This reflects increasing R (because heating raises T, which raises R for tungsten). So qualitatively, a decreasing gradient as V grows tells you R is rising — diagnostic of a PTC component being heated.\n\nTakeaway: gradient shape *trends* track R changes, but the actual R value must always come from V/I at the point.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "Synthesis: A thin tungsten filament and a thick copper wire are both carrying the same current. Which heats up more, and why does this connect to choices of materials for lamps vs cables? (4 steps)", "answer": "- Step 1: Both have $$R = \\rho L/A$$. Tungsten has higher $$\\rho$$ than copper, AND the filament is thin (small A), AND can be relatively long when coiled — so R_tungsten ≫ R_copper.\n- Step 2: At the same current, $$P = I^2 R$$ — power dissipated scales linearly with R. So the filament dissipates orders of magnitude more power than the copper wire.\n- Step 3: The filament's small thermal mass and large dissipated power drive it to ~3000 K, where it glows white-hot (radiating visible light). The copper wire stays barely warm.\n- Step 4: This is *by design*: lamps want high-resistance materials that heat up to incandescence (high ρ, thin geometry); cables want the *opposite* — low ρ, thick wire — so they carry current with minimal heating. The same physics ($$P = I^2 R$$) drives both choices in opposite directions.\n\nTakeaway: same equation, opposite engineering goals — \"do dissipate\" vs \"don't dissipate.\"", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "Synthesis: Why does the current \"surge\" briefly when a cold filament lamp is switched on? (3 steps)", "answer": "- Step 1: When cold (room T), the tungsten filament has low resistance — perhaps ~10× lower than at operating temperature.\n- Step 2: At the instant of switching on, the lamp is at its cold (low R) state. By $$I = V/R$$, with V at full mains and R small, the initial current is much larger than the steady-state operating current — a \"surge.\"\n- Step 3: This current rapidly heats the filament via $$P = I^2 R$$. As T rises, R rises (PTC), so I drops back to its normal operating value within a fraction of a second. The surge is brief because heating is fast at high power. It's also why filaments often fail at the moment of switch-on rather than during steady use.\n\nTakeaway: cold lamp = low R = current spike = thermal shock at switch-on.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Synthesis: A copper wire and an NTC thermistor are both heated from 20 °C to 80 °C. Sketch qualitatively how each one's current changes if connected to the same battery, and explain. (3 steps)", "answer": "- Step 1: **Copper wire (PTC):** as T rises, lattice vibration increases, drift velocity decreases, R increases. With fixed V (battery EMF), $$I = V/R$$ decreases. Current falls modestly (small percentage change over this T range).\n- Step 2: **NTC thermistor:** as T rises, the number of free charge carriers $$n$$ increases substantially (often near-exponentially), so R decreases substantially. With same V, current *increases* — and far more dramatically than the metal's current decreases.\n- Step 3: Putting them in series with the same source would give qualitatively *opposite* current responses to the same temperature change — exactly the property exploited in temperature-sensing circuits, where the NTC's dramatic resistance change provides a sensitive readout while a metal-wire reference stays nearly constant.\n\nTakeaway: same temperature change, opposite current responses — driven by which factor (n or v) dominates in the material.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Synthesis: Why is it physically impossible for a single I–V graph to simultaneously show Ohm's law obedience AND noticeable Joule heating, for a metal? (3 steps)", "answer": "- Step 1: Joule heating raises the metal's temperature, which raises its resistance (PTC).\n- Step 2: Ohm's law requires R = constant — so its validity depends on T being constant.\n- Step 3: If the I–V test draws enough current to heat the wire detectably, then R changes during the test, the I–V graph curves, and Ohm's law no longer applies. Conversely, if you keep the current small enough that heating is negligible, then T (and R) stays constant and the graph is linear — Ohm's law works. The two regimes are mutually exclusive: linear graph ⟺ negligible heating; visible heating ⟺ curved graph.\n\nTakeaway: Ohm's law is the low-current, isothermal limit of metal behaviour.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Quick numerical: a wire has $$\\rho = 5 \\times 10^{-7}\\,\\Omega\\cdot\\text{m}$$, $$L = 1\\,\\text{m}$$, $$A = 1 \\times 10^{-6}\\,\\text{m}^2$$. Roughly what is R? (2 steps)", "answer": "- Step 1: $$R = \\rho L/A = (5 \\times 10^{-7})(1)/(1 \\times 10^{-6})$$.\n- Step 2: $$= 5 \\times 10^{-7+6} = 5 \\times 10^{-1} = 0.5\\,\\Omega$$. Sanity check: a half-ohm wire is reasonable for a resistance-grade alloy of these dimensions.\n\nTakeaway: dividing powers of 10 — $$10^{-7}/10^{-6} = 10^{-1}$$ — keeps the mental math clean.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "Quick numerical: a 12 V battery drives 2 A through a resistor. What is the power dissipated and the resistance? (2 steps)", "answer": "- Step 1: $$P = IV = 12 \\times 2 = 24\\,\\text{W}$$.\n- Step 2: $$R = V/I = 12/2 = 6\\,\\Omega$$. Cross-check: $$P = I^2 R = 4 \\times 6 = 24\\,\\text{W}$$ ✓, and $$P = V^2/R = 144/6 = 24\\,\\text{W}$$ ✓. All three formulas give the same answer, as they must.\n\nTakeaway: the three power formulas are a consistency-check tool.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "A 1 m metal wire has $$R_0 = 4\\,\\Omega$$ at 0 °C and $$\\alpha = 5 \\times 10^{-3}\\,\\text{K}^{-1}$$. Roughly what is its resistance at 100 °C? (2 steps)", "answer": "- Step 1: $$R(100) = R_0(1 + \\alpha\\theta) = 4(1 + 5 \\times 10^{-3} \\times 100) = 4(1 + 0.5) = 4 \\times 1.5$$.\n- Step 2: $$= 6\\,\\Omega$$. The wire's resistance has risen by 50% over the 100 K change — typical of metal PTC behaviour, modest but measurable.\n\nTakeaway: the fractional change in R over 100 K is roughly $$100\\alpha$$, here 50%.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "A common error: a student writes \"40 mA = 40 × 10⁻⁶ A\" in a calculation. What is wrong, and what is the correct conversion?", "answer": "The student has confused **milli (m)** with **micro (μ)**. The correct conversions are:\n- milli (m) = $$10^{-3}$$ → 40 mA = $$40 \\times 10^{-3}\\,\\text{A} = 0.040\\,\\text{A}$$\n- micro (μ) = $$10^{-6}$$ → 40 μA = $$40 \\times 10^{-6}\\,\\text{A} = 0.000040\\,\\text{A}$$\n\nThe student's value is a thousand times too small. This kind of prefix error propagates into every subsequent calculation — for instance, a resistance computed from $$R = V/I$$ would come out 1000× too large. Always check unit prefixes against the standard list (m = $$10^{-3}$$, μ = $$10^{-6}$$, k = $$10^3$$, M = $$10^6$$) before substituting numbers.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Conceptual contrast: why are the words \"resistance increases\" appropriate for a metal heated up, but \"more charge carriers\" the correct keyword for an NTC thermistor heated up?", "answer": "Both materials have the same kind of heating happening (lattice vibrations rise), but the *cause of the resistance change* is different in each. For a **metal**, the population of free electrons $$n$$ is essentially fixed regardless of temperature, so the only way temperature affects current is via the drift velocity — more vibrations ⇒ slower drift ⇒ less current ⇒ more resistance. So \"increased vibrations / reduced drift velocity\" is the correct mark-scheme explanation. For a **semiconductor**, the number of free carriers is NOT fixed; raising T thermally promotes more electrons into the conduction band. The increase in $$n$$ is so large that it dominates — even though drift velocity also drops, current goes UP and resistance falls. So \"more charge carriers released\" is the mark-scheme keyword. Using \"fewer collisions\" for the NTC case is wrong: there are MORE collisions, but it doesn't matter because n is rising faster.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Synthesis: predict and explain — if a superconductor is carrying a large current and you suddenly raise its temperature above $$T_c$$, what happens? (3 steps)", "answer": "- Step 1: Above $$T_c$$, the material reverts to a normal conductor with nonzero R.\n- Step 2: The current (still large from the superconducting phase) now flows through this finite resistance, so power $$P = I^2 R$$ is suddenly dissipated as heat.\n- Step 3: Because the current is large and R was zero a moment ago, the sudden onset of dissipation is intense — the material heats rapidly, often catastrophically (a \"quench\" in superconducting magnets). This is a major engineering concern in MRI and accelerator magnets: a localized warming above $$T_c$$ can dump megajoules of stored magnetic energy as heat, potentially damaging the coils. Quench-protection circuits exist precisely to manage this.\n\nTakeaway: zero R + large I = stored energy with nowhere to dissipate; restoring R unleashes it all at once.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}], "count": 50}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 19155, "out_tokens": 14993, "reasoning_chars": 32960, "cost_eur": 0.0668, "elapsed_s": 464, "content_chars": 25546}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 19155, "out_tokens": 11622, "reasoning_chars": 18679, "cost_eur": 0.0559, "elapsed_s": 238, "content_chars": 26756}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 19155, "out_tokens": 8873, "reasoning_chars": 8281, "cost_eur": 0.0471, "elapsed_s": 180, "content_chars": 26573}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 18475, "out_tokens": 4150, "reasoning_chars": 5688, "cost_eur": 0.0076, "elapsed_s": 37, "content_chars": 10619}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 18475, "out_tokens": 5533, "reasoning_chars": 2431, "cost_eur": 0.009, "elapsed_s": 49, "content_chars": 20155}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 28874, "out_tokens": 19775, "reasoning_chars": 0, "cost_eur": 1.7629, "elapsed_s": 272, "content_chars": 48677}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 28874, "out_tokens": 18652, "reasoning_chars": 0, "cost_eur": 1.6854, "elapsed_s": 260, "content_chars": 46838}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 19833, "out_tokens": 3580, "reasoning_chars": 5944, "cost_eur": 0.0076, "elapsed_s": 60, "content_chars": 7644}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 19833, "out_tokens": 4973, "reasoning_chars": 9861, "cost_eur": 0.0091, "elapsed_s": 88, "content_chars": 10265}}};
const SK='phys_elec_ch04';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
