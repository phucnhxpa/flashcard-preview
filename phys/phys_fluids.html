way: Upthrust depends only on the volume of fluid displaced, not depth.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How does the terminal velocity (v_t) of a sphere depend on its radius (r), and why does this relationship exist? (3 steps)", "answer": "- Step 1: Terminal velocity occurs when W = U + F_D. For a sphere, W = (4/3)πr³ρ_s g, U = (4/3)πr³ρ_f g, and F_D = 6πηr v_t.\n- Step 2: Equating forces: (4/3)πr³(ρ_s - ρ_f)g = 6πηr v_t. Solving for v_t gives v_t ∝ r².\n- Step 3: Larger spheres have more mass (r³), but drag grows linearly with r. The mismatch causes v_t to scale with r², leading to faster terminal velocity for larger spheres.\n\n[Takeaway: Terminal velocity scales with r² because weight grows faster (r³) than drag (r).]", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why does viscosity (η) of a liquid decrease with temperature increase, while η for a gas increases? (3 steps)", "answer": "- Step 1: In liquids, viscosity arises from molecular cohesion. Higher temperature increases kinetic energy, helping molecules overcome intermolecular forces → reduced η.\n- Step 2: In gases, viscosity stems from molecular diffusion across shear layers. Higher temperature means faster molecules → more frequent momentum transfer between layers → increased η.\n- Step 3: Microscopic contrast: Liquids (cohesion-dominated) vs. gases (diffusion-dominated) → opposite temperature dependencies.\n\n[Takeaway: Liquid cohesion weakens with heat (η↓), gas momentum transfer strengthens (η↑).]", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "What are the three conditions required for Stokes' Law to apply, and why is each condition necessary? (3 steps)", "answer": "- Step 1: **Small, smooth sphere** – ensures laminar flow without turbulence; irregular shapes or large sizes cause eddies.\n- Step 2: **Low speed** – high speeds create turbulence, invalidating linear drag (F ∝ v).\n- Step 3: **Laminar flow** – no turbulence; drag must be purely viscous, not inertial. \n\n[Takeaway: Any condition violation (turbulence, large/rough object) invalidates Stokes' Law.]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Explain why a falling object in a fluid reaches a terminal velocity using force balance. (3 steps)", "answer": "- Step 1: Initial motion: Weight (W) > Upthrust (U) + Drag (F_D). Net force accelerates the object (F_net = W - U - F_D).\n- Step 2: As speed increases, F_D (which ∝ v) grows until F_net = 0 (W = U + F_D). Acceleration stops.\n- Step 3: Terminal velocity (v_t) is stable because any speed increase would raise F_D > W - U, decelerating the object back to v_t.\n\n[Takeaway: Drag increases with speed until force equilibrium (F_net = 0) is achieved.]", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Derive the formula for terminal velocity of a sphere, v_t = (2r²g(ρ_s - ρ_f))/(9η). (5 steps)", "answer": "- Step 1: Force balance: W = U + F_D.\n- Step 2: Substitute: (4/3)πr³ρ_s g = (4/3)πr³ρ_f g + 6πηr v_t.\n- Step 3: Rearrange: 6πηr v_t = (4/3)πr³g(ρ_s - ρ_f).\n- Step 4: Cancel π and divide both sides by 6πηr: v_t = (4/3)πr³g(ρ_s - ρ_f)/(6πηr).\n- Step 5: Simplify: v_t = (2r²g(ρ_s - ρ_f))/(9η).\n\n[Takeaway: Derivation links fluid properties (η, ρ_f) and sphere properties (r, ρ_s) to v_t.]", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why is the starting line for timing a falling ball placed a few cm below the fluid surface in Core Practical 4? (3 steps)", "answer": "- Step 1: Object released from rest accelerates until drag (F_D = 6πηr v) balances net weight (W - U). This acceleration phase is non-uniform.\n- Step 2: Terminal velocity (v_t) occurs only after F_D grows enough to balance (W - U). This takes time and distance.\n- Step 3: Timing between lines below the surface captures only the constant-v_t phase. Timing from the surface would include acceleration, leading to incorrect η calculation.\n\n[Takeaway: Constant velocity required for accurate viscosity measurement.]", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What is the Reynolds number, and how does it relate to the validity of Stokes' Law? (3 steps)", "answer": "- Step 1: Reynolds number Re = (ρ_f v L)/η compares inertial forces (ρ_f v L) to viscous forces (η).\n- Step 2: Stokes' Law applies only when Re ≪ 1 (viscous forces dominate). Re > 1000 indicates turbulence where Stokes fails.\n- Step 3: For a sphere, L = 2r. Stokes' Law works for small r and η, low v – keeping Re ≪ 1.\n\n[Takeaway: Re quantifies when Stokes' Law breaks down (turbulence, high speed).]", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why does a hydrometer float higher in denser fluids? Use the relation m = ρ_f A Δh to explain. (2 steps)", "answer": "- Step 1: m = ρ_f A Δh implies Δh = m/(ρ_f A). For fixed m and A, Δh decreases as ρ_f increases.\n- Step 2: Denser fluids require less submerged volume to balance the same weight (m), so the hydrometer floats higher.\n\n[Takeaway: Inverse relationship between Δh and ρ_f; denser fluid ⇒ less submerged depth.]", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "What is the unit of viscosity (η) in SI base units, and how is it derived using Stokes' Law? (3 steps)", "answer": "- Step 1: From F = 6πηr v ⇒ η = F/(6πr v).\n- Step 2: Force (F) in Newtons = kg·m/s²; r in m; v in m/s.\n- Step 3: Units of η = (kg·m/s²) / (m * m/s) = kg/(m·s) = Pa·s = N·s/m².\n\n[Takeaway: η has units kg/(m·s) – derived from force, velocity, and radius units.]", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "If a sphere is moved from water to air, how does its terminal velocity change, and why? (3 steps)", "answer": "- Step 1: Terminal velocity v_t ∝ (ρ_s - ρ_f)/η. Air has much lower ρ_f and η compared to water.\n- Step 2: Lower ρ_f increases (ρ_s - ρ_f), increasing v_t. Lower η further increases v_t due to inverse relation.\n- Step 3: Sphere falls much faster in air due to both lower buoyancy and lower drag, leading to higher v_t.\n\n[Takeaway: v_t is significantly higher in low-density, low-viscosity fluids like air.]", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What happens to the terminal velocity of a sphere if its radius doubles? Explain using the formula v_t = (2r²g(ρ_s - ρ_f))/(9η). (2 steps)", "answer": "- Step 1: v_t ∝ r². Doubling r quadruples v_t.\n- Step 2: This is because weight increases with r³, but drag increases only with r, leading to a net r² dependence.\n\n[Takeaway: Terminal velocity scales with r² due to mismatch between weight (r³) and drag (r) dependencies.]", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Why does a skydiver experience a lower terminal velocity after opening the parachute? (3 steps)", "answer": "- Step 1: Parachute increases surface area (A) and drag coefficient, so drag F_D = 0.5Cρ_fAv² increases.\n- Step 2: With F_D ↑, v_t ↓ to maintain balance W = F_D (upthrust negligible in air).\n- Step 3: New terminal velocity occurs at lower speed where increased drag matches weight.\n\n[Takeaway: Larger area ⇒ higher drag ⇒ lower v_t.]", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "What is the apparent weight of a submerged object, and how is it related to upthrust? (2 steps)", "answer": "- Step 1: Apparent weight = W2 = W1 - U, where W1 is weight in air, W2 is weight when submerged.\n- Step 2: U = W1 - W2 measures the upthrust as the difference between actual weight and apparent weight.\n\n[Takeaway: Apparent weight loss equals the weight of displaced fluid (U).]", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "How does the density of a floating object compare with the fluid's density? (2 steps)", "answer": "- Step 1: For floating, W = U ⇒ ρ_s V_s g = ρ_f V_submerged g ⇒ V_submerged/V_s = ρ_s/ρ_f.\n- Step 2: Since V_submerged ≤ V_s, ρ_s ≤ ρ_f. Floating requires ρ_s < ρ_f; neutral buoyancy requires ρ_s = ρ_f.\n\n[Takeaway: Floating implies ρ_s < ρ_f; sinking implies ρ_s > ρ_f.]", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is upthrust independent of the depth of an object submerged in a fluid? (3 steps)", "answer": "- Step 1: **Pressure difference**. Fluid pressure increases with depth: $ P = \\rho_f g h $.  \n  - Step 2: **Net upward force**. The pressure on the bottom face ($ P_2 A = \\rho_f g h_2 A $) is greater than on the top ($ P_1 A = \\rho_f g h_1 A $). The difference $ U = \\rho_f g A (h_2 - h_1) = \\rho_f g V $ depends only on the *volume* of the submerged object, not absolute depth.  \n  - Step 3: **Archimedes’ Principle**. Upthrust $ U = \\rho_f V g $ is the weight of displaced fluid. Since $ h_2 - h_1 $ (height) is fixed for a submerged object, depth doesn’t affect $ U $.  \n\n**Takeaway:** Upthrust depends on displaced volume, not depth.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": true}, {"question": "Derive the formula for terminal velocity $ v_t = \\frac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta} $ for a sphere. (5 steps)", "answer": "- Step 1: **Force balance**. At terminal velocity, $ W = U + F_D $.  \n  - Step 2: **Weight of sphere**: $ W = \\rho_s V g = \\rho_s \\frac{4}{3} \\pi r^3 g $.  \n  - Step 3: **Upthrust**: $ U = \\rho_f V g = \\rho_f \\frac{4}{3} \\pi r^3 g $.  \n  - Step 4: **Stokes’ Law drag**: $ F_D = 6 \\pi \\eta r v_t $.  \n  - Step 5: **Combine equations**:  \n  $ \\rho_s \\frac{4}{3} \\pi r^3 g = \\rho_f \\frac{4}{3} \\pi r^3 g + 6 \\pi \\eta r v_t $.  \n  Rearranged:  \n  $ 6 \\pi \\eta r v_t = \\frac{4}{3} \\pi r^3 g (\\rho_s - \\rho_f) $.  \n  Cancel terms and simplify:  \n  $ v_t = \\frac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta} $.  \n\n**Takeaway:** Terminal velocity depends on radius squared, density difference, and inversely on viscosity.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Explain the difference in how liquid and gas viscosities change with temperature. (3 steps)", "answer": "- Step 1: **Liquids**. Increased temperature weakens intermolecular attractions, reducing internal friction. Example: warm honey flows faster.  \n  - Step 2: **Gases**. Higher temperature increases molecular kinetic energy and interlayer momentum exchange, increasing internal friction. Example: hot air resists flow more.  \n  - Step 3: **Molecular perspective**. Liquids rely on cohesion; gases rely on mass diffusion.  \n\n**Takeaway:** Liquids: $ \\eta \\downarrow $ with $ T $; Gases: $ \\eta \\uparrow $ with $ T $.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why is the falling-ball viscometer timing done between two marks below the surface?", "answer": "- Step 1: **Acceleration phase**. When released, the ball accelerates until drag + upthrust balances weight.  \n  - Step 2: **Constant velocity region**. Only when terminal velocity $ v_t $ is reached can the steady speed be measured. Timing starts after this acceleration phase.  \n  - Step 3: **Effect on data**. Measuring while accelerating would underestimate $ v_t $, overestimating viscosity $ \\eta $.  \n\n**Takeaway:** The timed region avoids acceleration phase to capture true $ v_t $.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How does a skydiver’s acceleration change before and after opening a parachute? (4 steps)", "answer": "- Step 1: **Before opening**. Acceleration $ a $ decreases as drag $ F_D \\propto v $ grows until $ v = v_t $.  \n  - Step 2: **Terminal velocity**. $ W = U + F_D \\Rightarrow a = 0 $.  \n  - Step 3: **After opening**. Drag increases sharply, $ F_D > W $, causing upward net force and deceleration.  \n  - Step 4: **New terminal velocity**. Drag reduces with speed until $ W = F_D + U $, achieving a slower $ v_{t,\\text{new}} $.  \n\n**Takeaway:** Parachute increases surface area, boosting drag and reducing $ v_t $.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "What are the three validity conditions for Stokes’ Law, and why is each necessary? (3 steps)", "answer": "- Step 1: **Small, smooth sphere**: Turbulence arises with large/irregular shapes, invalidating the linear drag model.  \n  - Step 2: **Low speed**: High speeds create turbulent flow, where drag scales with $ v^2 $.  \n  - Step 3: **Laminar flow**: Smooth, non-turbulent flow is required. Turbulence introduces chaotic forces.  \n\n**Takeaway:** Stokes’ Law only applies where $ Re \\ll 1 $, ensuring no turbulence.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "A floating rod’s submerged depth $ \\Delta h = \\frac{m}{\\rho_f A} $. Predict how $ \\Delta h $ changes if (a) the rod’s mass $ m $ increases, (b) the fluid density $ \\rho_f $ decreases.", "answer": "- Step 1: **Mass increase**. Larger $ m $ requires more displaced fluid (larger $ \\Delta h $) to balance $ W $.  \n  - Step 2: **Density decrease**. Fluid $ \\rho_f \\downarrow \\Rightarrow $ more volume needs displacement (larger $ \\Delta h $).  \n  - Step 3: **Mathematical intuition**. Direct $ \\Delta h \\propto m $; inverse $ \\Delta h \\propto 1/\\rho_f $.  \n\n**Takeaway:** $ \\Delta h $ adjusts to maintain $ W = U \\Rightarrow m = \\rho_f A \\Delta h $.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Which of these is a valid unit for viscosity $ \\eta $: N·s·m⁻², N·m⁻², or kg·m⁻²·s⁻¹? Justify with dimensional analysis.", "answer": "- Step 1: **Start with Stokes’ Law**: $ F = 6 \\pi \\eta r v $.  \n  - Step 2: **Units of force**: $ F $ has units $ \\text{kg·m/s²} $.  \n  - Step 3: **Solve for $ \\eta $**. Cancel $ r $ (m) and $ v $ (m/s):  \n  $ \\eta = \\frac{F}{6 \\pi r v} \\Rightarrow \\frac{\\text{kg·m/s²}}{\\text{m·m/s}} = \\text{kg/(m·s)} $.  \n  - Step 4: **Relate to options**. $ \\text{kg/(m·s)} = \\text{N·s/m²} = \\text{Pa·s} $. Reject $ \\text{N·m⁻²} $ (unit of pressure) and $ \\text{kg·m⁻²·s⁻¹} $ (dimensionally incorrect).  \n\n**Takeaway:** $ \\eta $ has units of viscosity = stress × time.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": true}, {"question": "Why does a ball bearing reach terminal velocity when dropped into oil? (4 steps)", "answer": "- Step 1: **Initial motion**. Net force $ W - U $ (since $ F_D = 0 $ at release) causes acceleration.  \n  - Step 2: **Drag growth**. As speed $ v \\uparrow $, viscous drag $ F_D \\propto v $ increases.  \n  - Step 3: **Reduces net force**. $ W - U - F_D \\rightarrow 0 $, so acceleration $ a \\rightarrow 0 $.  \n  - Step 4: **Terminal velocity achieved**. When $ W = U + F_D $, speed remains constant.  \n\n**Takeaway:** Terminal velocity occurs when drag balances effective weight.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "A cube floats with 70% of its volume submerged. What is the cube’s density compared to water?", "answer": "- Step 1: **Floating condition**: $ W = U \\Rightarrow m_s g = \\rho_f V_{\\text{sub}} g $.  \n  - Step 2: **Mass-volume relations**: $ \\rho_s V = \\rho_f V_{\\text{sub}} \\Rightarrow \\rho_s = \\rho_f \\frac{V_{\\text{sub}}}{V} $.  \n  - Step 3: **Submerged fraction**: $ V_{\\text{sub}}/V = 0.70 \\Rightarrow \\rho_s = 0.70 \\rho_f $.  \n\n**Takeaway:** Submerged fraction equals density ratio.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "A steel sphere and a wooden sphere of exactly the same diameter are dropped into the same container of water. The steel sinks while the wooden one floats. Explain this observation in terms of density, making clear what is being compared to what. (2 steps)", "answer": "- Step 1: Identify the relevant densities. The steel sphere has a much higher density (around $7800\\,\\text{kg\\,m}^{-3}$) than water ($1000\\,\\text{kg\\,m}^{-3}$), while wood has a lower density (typically $400\\text{--}800\\,\\text{kg\\,m}^{-3}$) than water.\n- Step 2: Apply the float/sink criterion. An object sinks if its weight exceeds the maximum possible upthrust: $$\\text{Sinks if } \\rho_s > \\rho_f$$ $$\\text{Floats if } \\rho_s < \\rho_f$$ + For steel: $\\rho_{\\text{steel}} > \\rho_{\\text{water}}$, so $W > U_{\\max}$ — it sinks. + For wood: $\\rho_{\\text{wood}} < \\rho_{\\text{water}}$, so $W < U_{\\max}$ when fully submerged, meaning it can find an equilibrium where only part is submerged — it floats.\nThe key insight: it's a direct comparison between the **object's density** and the **fluid's density**, not their masses or volumes.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A solid object is fully submerged in water but does not sink or rise — it hovers stationary at any depth. What must be true about the object's density compared to the water, and what is this situation called? (1 step)", "answer": "- Step 1: For a fully submerged object to experience zero net force at any depth, the weight must exactly equal the upthrust: $$W = U$$ Substituting: $$\\rho_s V g = \\rho_f V g$$ Cancel $V$ and $g$: $$\\rho_s = \\rho_f$$ This situation is called **neutral buoyancy**. The object has the same density as the fluid, so it neither sinks nor floats — it will remain stationary wherever placed within the fluid.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "A cylindrical rod of mass $m = 0.15\\,\\text{kg}$ and cross-sectional area $A = 6.0 \\times 10^{-4}\\,\\text{m}^2$ floats vertically in oil of density $\\rho_f = 850\\,\\text{kg\\,m}^{-3}$. Calculate the depth $\\Delta h$ to which it is submerged. (2 steps)", "answer": "- Step 1: Use the floating-rod relation derived from equilibrium: $m = \\rho_f A\\,\\Delta h$\n- Step 2: Rearrange to solve for $\\Delta h$: $$\\Delta h = \\frac{m}{\\rho_f A} = \\frac{0.15}{850 \\times 6.0 \\times 10^{-4}} = \\frac{0.15}{0.51} = \\mathbf{0.29\\,m}$$ The rod floats with about $29\\,\\text{cm}$ of its length underwater. This makes sense: a heavier rod or a thinner rod would need to displace more fluid (sink deeper) to balance its weight.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A beaker of water has density $1000\\,\\text{kg\\,m}^{-3}$. An ice cube of density $920\\,\\text{kg\\,m}^{-3}$ floats in it. What fraction of the ice cube's volume is submerged below the water surface? (2 steps)", "answer": "- Step 1: For a floating object, $W = U$. The weight of the ice is $W = \\rho_{\\text{ice}} V_{\\text{total}} g$, and the upthrust equals the weight of water displaced: $U = \\rho_{\\text{water}} V_{\\text{submerged}} g$.\n- Step 2: Set them equal and cancel $g$: $$\\rho_{\\text{ice}} V_{\\text{total}} = \\rho_{\\text{water}} V_{\\text{submerged}}$$ Rearrange for the fraction: $$\\frac{V_{\\text{submerged}}}{V_{\\text{total}}} = \\frac{\\rho_{\\text{ice}}}{\\rho_{\\text{water}}} = \\frac{920}{1000} = \\mathbf{0.92}$$ About $92\\%$ of the ice cube is underwater — this is why we only see the \"tip of the iceberg.\" The same principle applies to any floating body: fraction submerged = object density ÷ fluid density.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A metal block weighs $W_1 = 4.50\\,\\text{N}$ when hung from a spring balance in air. When the block is fully submerged in an unknown liquid, the balance reads $W_2 = 3.86\\,\\text{N}$. The liquid level in the cylinder rises by $\\Delta h = 0.12\\,\\text{m}$ in a cylinder of cross-sectional area $A = 4.0 \\times 10^{-4}\\,\\text{m}^2$. Find the density of the unknown liquid. (3 steps)", "answer": "- Step 1: Find the upthrust from the apparent weight loss. The liquid pushes upward, reducing the reading: $$U = W_1 - W_2 = 4.50 - 3.86 = 0.64\\,\\text{N}$$\n- Step 2: Find the displaced volume from the fluid level rise. The block's volume equals the volume of liquid displaced: $$V = A\\,\\Delta h = 4.0 \\times 10^{-4} \\times 0.12 = 4.8 \\times 10^{-5}\\,\\text{m}^3$$\n- Step 3: Use Archimedes' Principle $U = \\rho_f V g$ to find fluid density: $$\\rho_f = \\frac{U}{V g} = \\frac{0.64}{4.8 \\times 10^{-5} \\times 9.81} = \\frac{0.64}{4.71 \\times 10^{-4}} = \\mathbf{1.36 \\times 10^3\\,\\text{kg\\,m}^{-3}}$$ This is significantly denser than water — around a concentrated salt solution.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A sphere of radius $r$ is dropped into a viscous fluid. At the instant of release (when $v = 0$), what is the viscous drag force? Explain your answer. (1 step)", "answer": "- Step 1: Stokes' Law states $F = 6\\pi\\eta r v$, where $v$ is the velocity of the sphere relative to the fluid. At the exact moment of release, the sphere is at rest relative to the fluid, so $v = 0$. Substituting: $$F = 6\\pi\\eta r (0) = \\mathbf{0}$$ The viscous drag is zero at $v = 0$. This is crucial for understanding terminal velocity: initially there's no drag, only weight and (constant) upthrust, so the resultant force is large and the object accelerates. Only as speed builds does drag grow.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A small steel ball bearing (radius $r = 1.5 \\times 10^{-3}\\,\\text{m}$) falls through oil of viscosity $\\eta = 0.80\\,\\text{Pa\\,s}$ at a constant speed of $v = 0.020\\,\\text{m\\,s}^{-1}$. Calculate the viscous drag force on the ball bearing. (2 steps)", "answer": "- Step 1: Use Stokes' Law $F = 6\\pi\\eta r v$, ensuring all quantities are in SI base units.\n- Step 2: Substitute the values: $$F = 6\\pi \\times 0.80 \\times (1.5 \\times 10^{-3}) \\times 0.020$$ Calculate step by step: $6\\pi = 18.85$, then $18.85 \\times 0.80 = 15.08$, then $15.08 \\times 1.5 \\times 10^{-3} = 2.26 \\times 10^{-2}$, then $2.26 \\times 10^{-2} \\times 0.020 = \\mathbf{4.5 \\times 10^{-4}\\,N}$ This drag is quite small — only about $0.45$ millinewtons. This is why the falling-ball method requires precise timing: the forces involved are tiny.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "State the three conditions under which Stokes' Law ($F = 6\\pi\\eta r v$) is valid, and explain why each condition matters. (3 steps)", "answer": "- Step 1: The object must be a **small, smooth sphere**. A rough surface or non-spherical shape creates turbulent wakes and unpredictable drag patterns. The \"small\" qualifier ensures the sphere doesn't significantly disturb the flow field around it.\n- Step 2: The object must move at **low speed**. At high speeds, the orderly laminar flow breaks down into chaotic turbulent flow. The drag law changes fundamentally — it becomes roughly proportional to $v^2$ rather than $v$.\n+ The transition is governed by the Reynolds number $Re = \\frac{\\rho_f v L}{\\eta}$. Stokes' Law holds when $Re \\lesssim 1$.\n- Step 3: The flow must be **laminar** (smooth, non-turbulent). This means fluid layers slide past each other in parallel sheets without mixing. Turbulent flow creates eddies that carry away energy much more efficiently, making the $6\\pi\\eta r v$ relationship invalid.\n+ Additionally, there should be no wall effects — the container must be much wider than the sphere so the fluid appears unbounded.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "A raindrop with radius $r = 0.50\\,\\text{mm}$ falls through air of viscosity $\\eta = 1.8 \\times 10^{-5}\\,\\text{Pa\\,s}$ at a speed of $v = 2.0\\,\\text{m\\,s}^{-1}$. Check whether Stokes' Law is valid for this situation by calculating the Reynolds number. What does your result tell you? (3 steps)", "answer": "- Step 1: Recall the Reynolds number formula for flow past a sphere: $$Re = \\frac{\\rho_f v L}{\\eta}$$ where $\\rho_f$ is the fluid density, $v$ is the speed, $L$ is the characteristic length (for a sphere, the diameter $2r$), and $\\eta$ is the viscosity.\n- Step 2: Substitute the values. Air density $\\rho_f \\approx 1.2\\,\\text{kg\\,m}^{-3}$, so: $$Re = \\frac{1.2 \\times 2.0 \\times (1.0 \\times 10^{-3})}{1.8 \\times 10^{-5}} = \\frac{2.4 \\times 10^{-3}}{1.8 \\times 10^{-5}} = \\mathbf{133}$$ (where $1.0 \\times 10^{-3}$ is the diameter in metres).\n- Step 3: Interpret the result. $Re \\approx 130$ is much greater than 1, meaning inertia dominates over viscosity. The flow is definitely turbulent, and Stokes' Law does **not** properly describe the drag on this raindrop. The textbook problem is a deliberate idealisation — in reality, raindrops experience drag proportional to $v^2$, not $v$. This illustrates that \"low speed\" in the Stokes conditions is doing real physical work.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": true}, {"question": "Explain why the viscosity of a liquid decreases when the liquid is heated, while the viscosity of a gas increases when the gas is heated. (2 steps)", "answer": "- Step 1: For **liquids**, viscosity arises mainly from intermolecular attractions — molecules in adjacent layers \"stick\" to each other and resist sliding past. When heated, molecules gain kinetic energy and can more easily break free from these attractive forces. The internal friction decreases, so $\\eta$ falls. This is why warm honey flows much more easily than cold honey.\n- Step 2: For **gases**, molecules are far apart, so intermolecular attractions are negligible. Instead, viscosity comes from molecules diffusing between layers and carrying momentum across the boundary. When heated, molecules move faster and cross between layers more frequently, transporting momentum more effectively. The layers \"grip\" each other more strongly, so $\\eta$ increases. This is why hot air is slightly \"thicker\" in terms of momentum transport than cold air.\n+ The opposite trends are a key conceptual distinction: liquids become runnier when heated; gases become more viscous.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In the falling-ball viscometer experiment (Core Practical 4), the ball is timed between two marker lines that are positioned a few centimetres below the surface of the liquid, not from the point of release. Explain why this is crucial for finding an accurate value of the viscosity. (2 steps)", "answer": "- Step 1: At the instant of release, the ball is at rest and the drag force is zero. The ball accelerates as it falls, with drag growing as speed increases. The ball only reaches its terminal velocity after it has fallen a certain distance — specifically, when the drag grows large enough to balance weight minus upthrust.\n- Step 2: The timed distance must be in the region where the ball is already moving at constant terminal velocity. If you timed from the release point, you would include the accelerating phase, measuring an average speed that is less than $v_t$. Using this too-low speed in $\\eta = \\frac{mg}{6\\pi r v}$ would give an overestimate of the viscosity. By timing only the constant-velocity region, you get the correct $v$ to use in the equation.\n+ This is analogous to measuring a car's top speed on a racetrack — you need a long enough straight section to reach and maintain maximum speed before timing begins.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": true}, {"question": "A steel ball bearing of radius $r = 2.0\\,\\text{mm}$ and density $\\rho_s = 7800\\,\\text{kg\\,m}^{-3}$ falls through oil of density $\\rho_f = 900\\,\\text{kg\\,m}^{-3}$ and viscosity $\\eta = 0.85\\,\\text{Pa\\,s}$. Derive an expression for its terminal velocity $v_t$ and calculate its value. (4 steps)", "answer": "- Step 1: Write the force balance at terminal velocity. The ball moves at constant speed, so the resultant force is zero: $$W = U + F_D$$ Substituting the force expressions: $$\\rho_s V g = \\rho_f V g + 6\\pi\\eta r v_t$$ where $V = \\frac{4}{3}\\pi r^3$ for a sphere.\n- Step 2: Substitute the volume and simplify: $$\\rho_s \\left(\\frac{4}{3}\\pi r^3\\right) g = \\rho_f \\left(\\frac{4}{3}\\pi r^3\\right) g + 6\\pi\\eta r v_t$$ $$\\frac{4}{3}\\pi r^3 g (\\rho_s - \\rho_f) = 6\\pi\\eta r v_t$$\n- Step 3: Rearrange to isolate $v_t$: $$v_t = \\frac{\\frac{4}{3}\\pi r^3 g (\\rho_s - \\rho_f)}{6\\pi\\eta r} = \\frac{4\\pi r^3 g (\\rho_s - \\rho_f)}{18\\pi\\eta r} = \\frac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$\n+ Note: This formula is NOT on the data sheet — you must be able to derive it.\n- Step 4: Substitute the numbers. $r = 2.0 \\times 10^{-3}\\,\\text{m}$, so: $$v_t = \\frac{2 \\times (2.0 \\times 10^{-3})^2 \\times 9.81 \\times (7800 - 900)}{9 \\times 0.85} = \\frac{2 \\times 4.0 \\times 10^{-6} \\times 9.81 \\times 6900}{7.65}$$ Numerator: $2 \\times 4.0 \\times 10^{-6} \\times 9.81 \\times 6900 = 0.540$; denominator: $7.65$; so $v_t = \\mathbf{0.071\\,\\text{m\\,s}^{-1}}$ (about $7\\,\\text{cm}$ per second — slow enough to time by hand).", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A skydiver jumps from a plane and falls through air. Describe, in terms of forces, what happens from the moment of exit until she opens her parachute. In particular, explain why the skydiver reaches a terminal velocity rather than accelerating forever. (3 steps)", "answer": "- Step 1: At exit, the skydiver has $v = 0$, so drag $F_D = 0$. The only force is weight $W$ downward. Since $W > U + F_D$, there is a large resultant downward force, so she accelerates downward.\n- Step 2: As her speed increases, the drag force $F_D = 6\\pi\\eta r v$ grows proportionally to $v$. The upward forces (upthrust from air is negligible, so mainly drag) increase while weight stays constant. The resultant downward force decreases, so her acceleration decreases — she is still speeding up, but less rapidly.\n- Step 3: Eventually, at a specific speed $v_t$, the drag grows until $W = F_D$. The resultant force becomes zero, so acceleration is zero (Newton's First Law). From this point, she falls at constant speed — her terminal velocity. The key is that drag increases with speed; this is what creates a stable maximum speed. If drag were constant, she would accelerate indefinitely.\n+ When she opens the parachute, the surface area suddenly increases, so drag jumps dramatically. This creates an upward resultant, causing deceleration to a new, lower terminal velocity.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Sketch velocity-time and acceleration-time graphs for a ball bearing dropped into a tall cylinder of viscous oil. On your sketches, label: (i) the terminal velocity $v_t$, (ii) the point of maximum acceleration, and (iii) the region where the ball is accelerating but $a < g$. (3 steps)", "answer": "- Step 1: **Velocity-time graph**: The curve starts at the origin (v = 0 at t = 0). It rises with a steep positive gradient initially, then the gradient decreases as drag builds up. The curve asymptotically approaches a horizontal line — this plateau is $v_t$. Label the height of the plateau as $v_t$.\n- Step 2: **Acceleration-time graph**: At t = 0, acceleration equals the initial net acceleration $(W - U)/m$, which is the maximum. The graph starts at this positive value. As drag increases, the net force decreases, so acceleration decreases, approaching zero. The graph shows positive values decaying toward zero.\n- Step 3: Key features to label:\n+ (i) On the v-t graph: the horizontal asymptote = $v_t$\n+ (ii) On both graphs: at t = 0, where gradient (a) is maximum\n+ (iii) The entire region from t = 0 until the plateau is reached — during this time $a > 0$ (downward acceleration) but $a < g$ because upthrust and drag are already acting (even though drag at t = 0 is zero, upthrust is constant from the start if the ball is submerged immediately)\n+ Note: The v-t curve never goes above $v_t$ — if it did, drag would exceed weight and cause deceleration back down.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "A skydiver opens her parachute at terminal velocity $v_{t1}$, causing her speed to decrease rapidly to a new, lower terminal velocity $v_{t2}$. On a single set of axes, sketch how the (a) velocity, (b) acceleration, and (c) drag force vary with time through this event. Mark the moment the parachute opens. (3 steps)", "answer": "- Step 1: **Velocity-time**: Before the parachute opens, the graph is horizontal at $v_{t1}$. At the moment of opening, there is a sharp decrease in velocity — the curve drops steeply downward. It then levels off again at the new, lower horizontal line $v_{t2}$. The \"jump\" downward happens over a short time interval.\n- Step 2: **Acceleration-time**: At $v_{t1}$, acceleration is zero (flat v-t). When the parachute opens, the drag suddenly increases dramatically, making $F_{\\text{up}} > W$, so acceleration becomes negative (upward). This large negative acceleration appears as a sharp dip in the a-t graph. As the skydiver slows, drag decreases until $a = 0$ again at $v_{t2}$.\n- Step 3: **Drag-time**: Before the parachute opens, drag equals weight (at terminal velocity), so it's constant at $F_D = mg$. At parachute opening, drag jumps to a much larger value (because surface area increased dramatically). Then, as the skydiver slows, drag decreases until it returns to equal weight at the new, lower $v_{t2}$.\n+ The key physics: opening the parachute doesn't stop the fall immediately — it creates a large upward resultant that causes deceleration until a new equilibrium speed is reached.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Using dimensional analysis, show that the coefficient of viscosity $\\eta$ has SI units of $\\text{Pa\\,s}$, which is equivalent to $\\text{kg\\,m}^{-1}\\text{s}^{-1}$ and $\\text{N\\,s\\,m}^{-2}$. (3 steps)", "answer": "- Step 1: Start from Stokes' Law $F = 6\\pi\\eta r v$ and rearrange for $\\eta$: $$\\eta = \\frac{F}{6\\pi r v}$$ Since $6\\pi$ is dimensionless, we work with $\\eta = F/(rv)$.\n- Step 2: Substitute the SI units. Force $[F] = \\text{N} = \\text{kg\\,m\\,s}^{-2}$, radius $[r] = \\text{m}$, and velocity $[v] = \\text{m\\,s}^{-1}$. So: $$[\\eta] = \\frac{\\text{kg\\,m\\,s}^{-2}}{\\text{m} \\cdot \\text{m\\,s}^{-1}} = \\frac{\\text{kg\\,m\\,s}^{-2}}{\\text{m}^2\\text{s}^{-1}} = \\text{kg\\,m}^{-1}\\text{s}^{-1}$$\n- Step 3: Convert to the other common forms. Since pressure $P = \\text{N\\,m}^{-2} = \\text{Pa}$, we can write $\\text{Pa\\,s}$: $$\\text{Pa\\,s} = (\\text{N\\,m}^{-2})\\text{s} = \\text{N\\,s\\,m}^{-2}$$ And using $\\text{N} = \\text{kg\\,m\\,s}^{-2}$: $$\\text{N\\,s\\,m}^{-2} = (\\text{kg\\,m\\,s}^{-2})\\text{s\\,m}^{-2} = \\text{kg\\,m}^{-1}\\text{s}^{-1}$$ All three forms are equivalent. The most common is $\\text{Pa\\,s}$ (pascal-second).", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Which of the following is NOT a valid unit for viscosity $\\eta$? A) $\\text{kg\\,m}^{-1}\\text{s}^{-1}$, B) $\\text{N\\,s}$, C) $\\text{Pa\\,s}$, D) $\\text{N\\,m}^{-2}$. Explain your reasoning. (2 steps)", "answer": "- Step 1: We know from dimensional analysis that valid units for $\\eta$ are $\\text{Pa\\,s} = \\text{N\\,s\\,m}^{-2} = \\text{kg\\,m}^{-1}\\text{s}^{-1}$. So option A ($\\text{kg\\,m}^{-1}\\text{s}^{-1}$) and option C ($\\text{Pa\\,s}$) are both correct forms.\n- Step 2: Check the incorrect options. Option B ($\\text{N\\,s}$) has units of impulse or momentum ($\\text{kg\\,m\\,s}^{-1}$), which is missing the $\\text{m}^{-2}$ factor. Option D ($\\text{N\\,m}^{-2}$) is simply pressure (pascal), missing the seconds. Neither matches $\\text{kg\\,m}^{-1}\\text{s}^{-1}$.\n+ Therefore, the answer is **B** ($\\text{N\\,s}$) or **D** ($\\text{N\\,m}^{-2}$) depending on which one appears as the distractor in your specific exam paper. Both are invalid — B is missing the $\\text{m}^{-2}$, and D is missing the seconds.\n+ The exam trick here is that $\\text{N\\,s\\,m}^{-2}$ (with the $\\text{m}^{-2}$) IS valid, so if option D is printed as $\\text{N\\,s\\,m}^{-2}$ instead of $\\text{N\\,m}^{-2}$, then D would be valid and B would be the only wrong one.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Two ball bearings of the same material (same density) are dropped into identical containers of the same oil. One ball has twice the radius of the other. By what factor does the terminal velocity of the larger ball compare to the smaller ball? Show your reasoning. (2 steps)", "answer": "- Step 1: From the terminal velocity formula for a sphere: $$v_t = \\frac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$ All quantities except $r$ are identical for both balls (same material, same fluid). Therefore: $$v_t \\propto r^2$$\n- Step 2: If the larger ball has radius $2r$ (twice the smaller), then: $$\\frac{v_{t,\\text{large}}}{v_{t,\\text{small}}} = \\frac{(2r)^2}{r^2} = \\frac{4r^2}{r^2} = \\mathbf{4}$$ The larger ball reaches a terminal velocity four times greater than the smaller one. This is a significant effect: doubling the radius increases the terminal velocity by a factor of four, not two. This is because weight grows as $r^3$ (volume), but the drag at a given speed only grows as $r$ (linearly), so a larger ball needs a much higher speed for drag to catch up with its proportionally larger weight.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A steel ball and an aluminium ball of identical radius are dropped into the same oil. Which ball reaches the higher terminal velocity, and why? Use densities: $\\rho_{\\text{steel}} = 7800\\,\\text{kg\\,m}^{-3}$, $\\rho_{\\text{Al}} = 2700\\,\\text{kg\\,m}^{-3}$, $\\rho_{\\text{oil}} = 900\\,\\text{kg\\,m}^{-3}$. (2 steps)", "answer": "- Step 1: The terminal velocity depends on the density difference $(\\rho_s - \\rho_f)$. For steel: $\\rho_{\\text{steel}} - \\rho_{\\text{oil}} = 7800 - 900 = 6900\\,\\text{kg\\,m}^{-3}$. For aluminium: $\\rho_{\\text{Al}} - \\rho_{\\text{oil}} = 2700 - 900 = 1800\\,\\text{kg\\,m}^{-3}$.\n- Step 2: Since $v_t \\propto (\\rho_s - \\rho_f)$ for equal $r$ and $\\eta$: $$\\frac{v_{t,\\text{steel}}}{v_{t,\\text{Al}}} = \\frac{6900}{1800} = 3.83$$ The steel ball reaches a terminal velocity about 3.8 times higher than the aluminium ball. The steel is much denser, so even after accounting for the upthrust from the oil (which is the same for both since they have equal volume), the \"effective weight\" driving the fall is far greater for steel. The aluminium ball experiences relatively less net driving force relative to its drag, so it falls more slowly.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "In a falling-ball experiment, a student finds that their calculated value of viscosity is significantly larger than the expected value. Suggest four possible experimental sources of error and explain how each would cause an overestimation. (2 steps)", "answer": "- Step 1: **Timing started before terminal velocity reached**: If the start line is too close to the surface, the ball is still accelerating during the timed interval. The measured speed $v = s/t$ would be less than the true terminal velocity. Since $\\eta \\propto 1/v$, a lower measured speed gives a higher calculated viscosity.\n- Step 2: **Wall effects**: If the cylinder is too narrow, the ball's presence disturbs the fluid flow and creates additional drag (the \"edge effect\"). The ball falls slower than it would in an unbounded fluid. Using this slower measured speed in the calculation again gives an overestimated $\\eta$.\n+ Other sources include:\n+ **Temperature drop**: If the oil cools during the experiment, its viscosity increases significantly (especially for liquids). Using the room-temperature formula would then give an incorrectly high $\\eta$.\n+ **Reaction time error**: If the student consistently starts/stops the stopwatch late, the measured time is too large, making $v$ too small, so $\\eta$ too large.\n+ **Using diameter instead of radius**: If a student accidentally uses diameter in Stokes' Law, they'd put $r = 2r_{\\text{actual}}$ into the formula, making $F$ four times too large for a given speed, or making calculated $\\eta$ four times too large.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A student writes: \"The upthrust on a submerged object depends on how deep the object is placed, because pressure increases with depth.\" Explain why this statement is incorrect. (2 steps)", "answer": "- Step 1: While it's true that pressure increases with depth ($P = \\rho g h$), the upthrust depends on the *pressure difference* between the top and bottom of the object, not on the absolute pressure at any point.\n- Step 2: Consider an object pushed deeper into the fluid. Both its top face and bottom face experience increased pressure by exactly the same amount (because both go down by the same depth). The *difference* in pressure — and hence the *difference* in force — remains unchanged. Since upthrust equals this pressure-difference times area, it depends only on the volume displaced, not on depth.\n+ The student's error is conflating \"pressure at a point\" with \"pressure difference across the object.\" Archimedes' Principle makes this clear: upthrust equals the weight of fluid displaced, which depends on volume (how much fluid is pushed aside), not on how deep that displaced fluid sits.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A ball bearing is falling through oil at its terminal velocity. If someone somehow held the ball stationary for a moment and then released it, would it immediately return to the same terminal velocity? Explain. (2 steps)", "answer": "- Step 1: No, it would initially accelerate from rest again. At the instant of release from rest, the drag force is zero (Stokes' Law: $F \\propto v$, and $v = 0$). The ball experiences the full resultant force $W - U$, so it accelerates from zero.\n- Step 2: It will eventually return to terminal velocity, but it must go through the acceleration phase again — speeding up from zero, with drag gradually building until equilibrium is restored at the same $v_t$ (since $v_t$ depends only on the constants $r$, $\\rho_s$, $\\rho_f$, and $\\eta$, not on the ball's history). The path back is identical to the first approach: $v$ increases from zero, asymptotically approaching the same $v_t$.\n+ This is a useful intuition check: terminal velocity is a property of the conditions (ball size, densities, viscosity), not of whether you've reached it before.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A hollow plastic ball (average density less than water) is fully submerged and then released. Describe the motion of the ball from the moment of release, assuming it cannot escape the water surface. (3 steps)", "answer": "- Step 1: At release ($v = 0$), the ball experiences weight $W$ (down) and upthrust $U$ (up). Since $\\rho_{\\text{plastic}} < \\rho_{\\text{water}}$, we have $W < U_{\\max}$, and at full submersion $W < U$. There is an upward resultant force $U - W$, so the ball accelerates upward.\n- Step 2: As the ball rises, it emerges from the water. The submerged volume decreases, so upthrust $U = \\rho_f V_{\\text{sub}} g$ decreases. The weight remains constant. The upward resultant force decreases.\n- Step 3: Eventually, the ball reaches the surface and protrudes above. At some point, the submerged volume becomes just enough that $U = W$ (the weight of displaced water equals the ball's weight). At this equilibrium, the resultant force is zero, and the ball floats partially submerged with no further motion. The ball never overshoots because as soon as it rises higher, $V_{\\text{sub}}$ and $U$ decrease, creating a downward force pushing it back down.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "A spherical raindrop falls through air. As it falls, it collides with water vapour molecules and accumulates more mass. Explain how this affects its terminal velocity over time. (2 steps)", "answer": "- Step 1: As the raindrop falls and collects vapour, its mass increases. Since weight $W = mg$ increases, while the upthrust (negligible in air) stays tiny, the net driving force $W - U$ increases.\n- Step 2: However, as the drop grows, its radius increases too. This has two competing effects: (a) more weight pushes it toward higher $v_t$ (since $v_t \\propto r^2$ and also weight $\\propto r^3$), but (b) the drag coefficient also changes because the larger drop may experience turbulent flow (Stokes' Law no longer applies when $Re \\gtrsim 1$).\n+ In reality, larger raindrops fall faster than small ones (they reach higher terminal velocities), but they are also subject to aerodynamic breakup. The key point: increasing mass tends to increase terminal velocity, but the changing shape and flow regime complicate the picture.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": true}, {"question": "A micrometer screw gauge reads $5.72\\,\\text{mm}$ when measuring the diameter of a ball bearing. When the jaws are closed without anything between them, the gauge reads $-0.03\\,\\text{mm}$. What is the actual diameter of the ball bearing? (2 steps)", "answer": "- Step 1: Identify the observed reading and the zero error. Observed reading $= 5.72\\,\\text{mm}$. Zero error $= -0.03\\,\\text{mm}$ (negative means the gauge reads too low when closed).\n- Step 2: Apply the correction formula: $$\\text{actual} = \\text{observed} - \\text{zero error} = 5.72 - (-0.03) = \\mathbf{5.75\\,mm}$$ The micrometer was reading $0.03\\,\\text{mm}$ too low, so we add $0.03\\,\\text{mm}$ to get the true value. This small difference matters: since terminal velocity goes as $r^2$, a $0.01\\,\\text{mm}$ error in radius produces roughly a $1\\%$ error in $v_t$.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A vernier caliper has a main scale graduated in millimetres and a 10-division vernier scale. When measuring the diameter of a small sphere, the main scale reading just to the left of the vernier zero is $1.2\\,\\text{cm}$, and the 7th vernier line aligns exactly with a main scale line. The caliper has a positive zero error of $+0.04\\,\\text{cm}$. Find the actual diameter. (3 steps)", "answer": "- Step 1: Find the observed reading. Main scale: $1.2\\,\\text{cm} = 12.0\\,\\text{mm}$. The 7th vernier division corresponds to $0.7\\,\\text{mm}$ (since 10 divisions span $1\\,\\text{mm}$, each is $0.1\\,\\text{mm}$). Observed $= 12.0 + 0.7 = 12.7\\,\\text{mm} = 1.27\\,\\text{cm}$.\n- Step 2: Apply the zero error correction. For a positive zero error (reading too high), subtract: $$\\text{actual} = 1.27 - 0.04 = \\mathbf{1.23\\,cm}$$\n- Step 3: Note the key steps: read the main scale mark immediately to the *left* of the vernier zero (the whole number part), find which vernier line aligns (gives the decimal), then correct for zero error. Positive error means subtract; negative error means add.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A solid cone of base radius $R$, height $H$, and density $\\rho_s$ floats point-down in a liquid of density $\\rho_f$ (where $\\rho_s < \\rho_f$). Only the pointed tip is above the surface. Derive an expression for the fraction of the cone's volume that is submerged. (3 steps)", "answer": "- Step 1: For floating equilibrium, $W = U$. The weight is $W = \\rho_s V_{\\text{total}} g$, where $V_{\\text{total}} = \\frac{1}{3}\\pi R^2 H$ for a cone. The upthrust equals the weight of liquid displaced by the submerged portion.\n- Step 2: The submerged portion is a smaller, similar cone of height $h$, with base radius $r$ (where $r/R = h/H$). Its volume is $V_{\\text{sub}} = \\frac{1}{3}\\pi r^2 h = \\frac{1}{3}\\pi (R \\frac{h}{H})^2 h = \\frac{1}{3}\\pi R^2 \\frac{h^3}{H^2}$.\n- Step 3: Set $W = U$: $$\\rho_s \\left(\\frac{1}{3}\\pi R^2 H\\right) g = \\rho_f \\left(\\frac{1}{3}\\pi R^2 \\frac{h^3}{H^2}\\right) g$$ Cancel $\\frac{1}{3}\\pi R^2 g$: $$\\rho_s H = \\rho_f \\frac{h^3}{H^2}$$ Solve for the ratio $h/H$: $$\\frac{h}{H} = \\left(\\frac{\\rho_s}{\\rho_f}\\right)^{1/3}$$ The volume of a cone scales as $h^3$ (since $V \\propto r^2 h$ and $r \\propto h$), so the fraction submerged is: $$\\frac{V_{\\text{sub}}}{V_{\\text{total}}} = \\left(\\frac{h}{H}\\right)^3 = \\frac{\\rho_s}{\\rho_f}$$ Interestingly, this gives the same result as a fully submerged object: the fraction submerged equals the ratio of object density to fluid density. This holds for any similarly-shaped floating body.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "In some viscometers, instead of timing one ball, students time balls of several different radii and plot a graph of terminal velocity $v_t$ against radius squared $r^2$. Explain how this graphical method gives a more reliable value for viscosity than timing a single ball. (2 steps)", "answer": "- Step 1: From the terminal velocity formula (keeping everything else constant): $$v_t = \\frac{2g(\\rho_s - \\rho_f)}{9\\eta} \\, r^2 = k r^2$$ where $k$ is a constant for the experiment. This is a direct proportionality: $v_t \\propto r^2$. A graph of $v_t$ (y-axis) against $r^2$ (x-axis) should be a straight line through the origin.\n- Step 2: By plotting several points and drawing a best-fit line, random timing errors in individual runs are averaged out. The gradient of this line is $k = \\frac{2g(\\rho_s - \\rho_f)}{9\\eta}$. Rearranging: $$\\eta = \\frac{2g(\\rho_s - \\rho_f)}{9k}$$ Using the gradient rather than a single point means a single timing error has less impact on the final answer. Additionally, if the points show curvature at large $r^2$, this signals that Stokes' Law is breaking down (turbulent flow for larger/faster balls), which would alert the student to exclude those points or acknowledge the limitation.\n+ This method essentially uses the entire dataset to find $\\eta$, rather than trusting a single measurement.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": true}, {"question": "A student claims: \"Viscosity is basically the same thing as density — they're both ways of describing how 'heavy' a fluid is.\" Explain why this statement is wrong and distinguish clearly between density and viscosity. (2 steps)", "answer": "- Step 1: **Density** ($\\rho$) is mass per unit volume: $\\rho = m/V$, measured in $\\text{kg\\,m}^{-3}$. It tells you how much matter is packed into a given space. A cubic metre of lead is very dense ($11{,}300\\,\\text{kg\\,m}^{-3}$), while a cubic metre of air is not ($~1.2\\,\\text{kg\\,m}^{-3}$).\n- Step 2: **Viscosity** ($\\eta$) is a measure of a fluid's *resistance to flow* — its internal friction. It tells you how hard it is to move one layer of fluid past another. Water has low viscosity ($~10^{-3}\\,\\text{Pa\\,s}$) and flows easily; honey has high viscosity ($~10\\,\\text{Pa\\,s}$) and flows slowly. Crucially, a fluid can be dense but not viscous (e.g., mercury is very dense but flows almost as easily as water), or viscous but not dense (e.g., honey is much less dense than mercury but far more viscous).\n+ The student's confusion likely arises because both are fluid properties, but they describe completely different physical behaviours: density is about mass; viscosity is about flow resistance.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A diver jumps head-first from a platform into a pool, falling $10\\,\\text{m}$. Sketch a force diagram for the diver at three points: (a) just after stepping off, (b) after falling $5\\,\\text{m}$, and (c) at the instant before hitting the water. In each case, state the direction of the resultant force. (3 steps)", "answer": "- Step 1: **Just after stepping off** ($v \\approx 0$): Forces are weight $W$ (down) and upthrust $U$ (up, from the air). Since $W \\gg U$, the resultant is downward. The diver accelerates downward.\n- Step 2: **After falling $5\\,\\text{m}$** (at speed, but not yet terminal): Now there is significant air resistance (drag) $F_D$ pointing upward, opposing motion. So we have $W$ (down), $U$ (up), and $F_D$ (up). The resultant is still downward since $W > U + F_D$, but it's smaller than at the start, so acceleration has decreased.\n- Step 3: **Just before hitting the water** (at or near terminal velocity for a human): The drag has grown until approximately $W = U + F_D$. The resultant force is very close to zero. The diver is still falling at constant speed (terminal velocity, around $50\\,\\text{m\\,s}^{-1}$ or $180\\,\\text{km/h}$ for a head-first diver).\n+ The key progression: as speed increases, drag increases, resultant decreases, acceleration decreases, until equilibrium is reached.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A ship floats in fresh water ($\\rho = 1000\\,\\text{kg\\,m}^{-3}$). The ship then sails into seawater, which has higher density due to dissolved salt ($\\rho = 1025\\,\\text{kg\\,m}^{-3}$). Does the ship float higher or lower in the seawater? Explain using physics principles. (2 steps)", "answer": "- Step 1: The ship's weight $W$ remains unchanged (same mass, same cargo). For floating equilibrium, $W = U = \\rho_f V_{\\text{sub}} g$. In denser seawater, to produce the same upthrust $W$, a smaller submerged volume is needed.\n- Step 2: From $V_{\\text{sub}} = W/(\\rho_f g)$, since $W$ is constant and $\\rho_f$ has increased from $1000$ to $1025\\,\\text{kg\\,m}^{-3}$, the required $V_{\\text{sub}}$ decreases. The ship floats **higher** in seawater — less of its hull is submerged. This is why ships \"rise\" slightly when entering denser waters, and it's also the principle behind the hydrometer: floating higher indicates denser liquid.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "Explain why a parachute allows a skydiver to fall at a much slower terminal velocity, even though the skydiver's weight hasn't changed. (2 steps)", "answer": "- Step 1: Terminal velocity occurs when weight equals drag (ignoring the negligible upthrust in air): $W = F_D$. The drag force for a body moving through air at moderate speeds is given by $F_D \\propto A v$ (Stokes) or more generally $F_D \\propto A v^2$ at higher speeds, where $A$ is the cross-sectional area.\n- Step 2: When the parachute opens, the surface area $A$ increases dramatically (from around $0.5\\,\\text{m}^2$ in a dive position to $20\\text{--}30\\,\\text{m}^2$ for an open parachute). For a given speed, the drag force is now much larger. The new terminal velocity is reached when this larger drag equals the same weight $W$: $$v_{t,\\text{new}} = \\frac{W}{k A_{\\text{new}}}$$ Since $A_{\\text{new}} \\gg A_{\\text{old}}$, the new $v_t$ is much lower. The physics is straightforward: same driving force (weight), much greater opposing force (drag) at any given speed, so the equilibrium speed is lower.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": true}, {"question": "In a Core Practical 4 setup, a student measures the time for a ball to fall between two marks. They then repeat with ball bearings of different sizes. Describe the graph they should plot and how they would use it to determine the viscosity of the liquid. (3 steps)", "answer": "- Step 1: From the terminal velocity formula for a sphere, keeping fluid and ball densities constant: $$v_t = \\left[\\frac{2g(\\rho_s - \\rho_f)}{9\\eta}\\right] r^2$$ Let the constant in brackets be $K$. Then $v_t = K r^2$. This is a direct proportion between $v_t$ and $r^2$.\n- Step 2: The student should plot $v_t$ on the y-axis against $r^2$ on the x-axis. For each ball bearing, calculate $v_t = s/t$ (distance between markers divided by measured time), and calculate $r^2$ from the measured radius. The points should form a straight line passing through the origin.\n- Step 3: The gradient of this line is $K = \\frac{2g(\\rho_s - \\rho_f)}{9\\eta}$. Rearranging: $$\\eta = \\frac{2g(\\rho_s - \\rho_f)}{9 \\times \\text{gradient}}$$ The student measures the gradient from their straight-line fit, then substitutes the known values of $g$, $\\rho_s$, and $\\rho_f$ to calculate $\\eta$. This graphical method averages out random errors in timing and provides a visual check that Stokes' Law is holding (good straight line = laminar flow).", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "When a sphere reaches terminal velocity in a fluid, verify that the viscous drag calculated using Stokes' Law equals the effective weight $(W - U)$ by calculating both for a steel ball bearing ($r = 1.0\\,\\text{mm}$, $\\rho_s = 7800\\,\\text{kg\\,m}^{-3}$) in oil ($\\rho_f = 900\\,\\text{kg\\,m}^{-3}$, $\\eta = 0.90\\,\\text{Pa\\,s}$). (3 steps)", "answer": "- Step 1: Calculate the effective weight $(W - U)$. First find the volume: $$V = \\frac{4}{3}\\pi r^3 = \\frac{4}{3}\\pi (1.0 \\times 10^{-3})^3 = 4.19 \\times 10^{-9}\\,\\text{m}^3$$ Weight: $W = \\rho_s V g = 7800 \\times 4.19 \\times 10^{-9} \\times 9.81 = 3.21 \\times 10^{-4}\\,\\text{N}$. Upthrust: $U = \\rho_f V g = 900 \\times 4.19 \\times 10^{-9} \\times 9.81 = 3.70 \\times 10^{-5}\\,\\text{N}$. So $W - U = 2.84 \\times 10^{-4}\\,\\text{N}$.\n- Step 2: Calculate the terminal velocity using the formula: $$v_t = \\frac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta} = \\frac{2(1.0 \\times 10^{-3})^2 \\times 9.81 \\times (7800 - 900)}{9 \\times 0.90}$$ $$v_t = \\frac{2 \\times 10^{-6} \\times 9.81 \\times 6900}{8.1} = \\frac{0.135}{8.1} = 0.0167\\,\\text{m\\,s}^{-1}$$\n- Step 3: Calculate the drag using Stokes' Law at this velocity: $$F_D = 6\\pi\\eta r v_t = 6\\pi \\times 0.90 \\times 1.0 \\times 10^{-3} \\times 0.0167$$ $$F_D = 6\\pi \\times 1.5 \\times 10^{-5} = 2.83 \\times 10^{-4}\\,\\text{N}$$ This matches $W - U = 2.84 \\times 10^{-4}\\,\\text{N}$ (within rounding error), confirming the force balance is satisfied. This cross-check is a powerful way to verify your calculations.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "A balloon filled with helium floats in air. Explain, using Archimedes' Principle, why the balloon rises, and predict what would happen to the balloon if the surrounding air temperature increased significantly. (2 steps)", "answer": "- Step 1: The balloon experiences weight $W = m_{\\text{balloon}} g$ downward (including the helium mass plus the balloon skin). It experiences upthrust $U = \\rho_{\\text{air}} V g$ upward, where $V$ is the balloon's volume and $\\rho_{\\text{air}}$ is the density of surrounding air. Since helium is much less dense than air, for a given balloon volume, $\\rho_{\\text{air}} V g > m_{\\text{balloon}} g$, so $U > W$. The balloon rises.\n- Step 2: If the air temperature increases significantly, the density of air decreases (pressure constant, temperature up $\\Rightarrow$ density down, from the ideal gas law $\\rho = P/RT$). With lower $\\rho_{\\text{air}}$, the upthrust $U = \\rho_{\\text{air}} V g$ decreases. Eventually, if the air gets hot enough, $U$ may drop to equal $W$, and the balloon will stop rising. In extreme heating, $U < W$ and the balloon would begin to sink. This is why hot air balloons need to heat the air inside to stay aloft — they can't rely on ambient hot air.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": true}, {"question": "A solid sphere of radius $r$ and density $\\rho_s$ falls through a fluid of density $\\rho_f$ and viscosity $\\eta$. If the sphere's density is exactly equal to the fluid's density ($\\rho_s = \\rho_f$), what is its terminal velocity? Explain your answer. (1 step)", "answer": "- Step 1: From the terminal velocity formula: $$v_t = \\frac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$ If $\\rho_s = \\rho_f$, then the numerator is zero: $\\rho_s - \\rho_f = 0$. Therefore: $$v_t = \\mathbf{0}$$ The sphere has neutral buoyancy — its weight exactly equals the upthrust when fully submerged. Even if disturbed, it won't gain speed because there's no net driving force. In practice, any tiny perturbation would cause it to drift very slowly (dominated by very small residual effects), but its terminal velocity is conceptually zero. This is the condition for a body to hover stationary in the fluid.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A student measures the diameter of a steel ball bearing five times using a micrometer and obtains: $2.00\\,\\text{mm}$, $2.01\\,\\text{mm}$, $1.99\\,\\text{mm}$, $2.00\\,\\text{mm}$, $2.02\\,\\text{mm}$. The micrometer has a zero error of $+0.01\\,\\text{mm}$. Find (a) the mean diameter after correction and (b) the radius to use in Stokes' Law. (2 steps)", "answer": "- Step 1: First correct each measurement using the zero error. For a positive zero error (reading too high), subtract: $$2.00 - 0.01 = 1.99\\,\\text{mm}$$ $$2.01 - 0.01 = 2.00\\,\\text{mm}$$ $$1.99 - 0.01 = 1.98\\,\\text{mm}$$ $$2.00 - 0.01 = 1.99\\,\\text{mm}$$ $$2.02 - 0.01 = 2.01\\,\\text{mm}$$\n- Step 2: Calculate the mean and then the radius: Mean diameter $= \\frac{1.99 + 2.00 + 1.98 + 1.99 + 2.01}{5} = \\frac{9.97}{5} = 1.994\\,\\text{mm}$ (or $1.994 \\times 10^{-3}\\,\\text{m}$). The radius $r$ is half the diameter: $$r = \\frac{1.994}{2} = \\mathbf{0.997 \\times 10^{-3}\\,m} \\approx 1.00 \\times 10^{-3}\\,\\text{m}$$ Taking multiple readings and averaging reduces random error, and correcting for zero error removes systematic bias.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "Explain why a tennis ball reaches terminal velocity much faster than a bowling ball of similar size when both are dropped from a tall building. In your answer, discuss the relevant forces and the time scales involved. (2 steps)", "answer": "- Step 1: Both balls experience the same drag law ($F_D \\propto v$ at low speeds or $\\propto v^2$ at high speeds) and the same gravitational acceleration. However, the bowling ball has much greater mass, so its weight is larger. The net force $W - F_D$ at any given speed is therefore larger for the bowling ball.\n- Step 2: The time to reach terminal velocity depends on how quickly the accumulated drag can grow to match the weight. For the tennis ball (low mass), even a small drag force produces a significant deceleration, so it reaches equilibrium quickly. For the bowling ball (high mass), the same drag force produces only a tiny deceleration ( $a = F_{\\text{net}}/m$ is small), so it continues accelerating for much longer. The bowling ball takes far longer to approach its terminal velocity and reaches a much higher terminal speed (since $v_t \\propto W$, and $W$ is larger).\n+ In practical terms: the tennis ball \"feels\" the air resistance much more significantly relative to its weight, while the bowling ball's weight dominates until it reaches very high speeds.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": true}, {"question": "A fluid cell in a medical device uses a narrow tube to move fluid by applying pressure. The designer notices that at high flow rates, the pressure needed to maintain flow increases more than expected. Using your knowledge of fluid behaviour, explain what is happening and suggest how to address it. (2 steps)", "answer": "- Step 1: At low flow rates, the fluid moves in **laminar** flow — smooth, parallel layers. The pressure drop follows Poiseuille's law (which is essentially Stokes' Law applied to pipe flow): $\\Delta P \\propto v$. However, as the flow rate increases, the Reynolds number $Re = \\rho_f v L / \\eta$ increases. Once $Re$ exceeds a critical value (typically around 2000-4000 for pipes), the flow becomes **turbulent**.\n- Step 2: In turbulent flow, energy is dissipated not only by viscous friction but also by the chaotic formation of eddies and vortices. This creates a much larger pressure drop for a given flow rate. The relationship becomes $\\Delta P \\propto v^2$ or worse. To address this, the designer could: (a) increase the tube diameter (reduces velocity for same flow rate), (b) reduce the flow rate, (c) use a fluid with lower viscosity (if possible), or (d) ensure the entrance to the tube is designed to minimise turbulence. This is the same physics that limits how fast fluids can be pumped through pipelines — beyond certain speeds, you hit the turbulent regime and need exponentially more pressure.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": true}], "count": 39}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Derive the formula U = ρ_f V g from the pressure difference between the top and bottom of a submerged block. (4 steps)", "answer": "- Step 1: Let the block have cross-sectional area A and height L, with its top face at depth h₁ and bottom at depth h₂ = h₁ + L\n- Step 2: Pressure at depth in a fluid is P = ρ_f gh. The downward force on the top face is F_down = P₁A = ρ_f gh₁A\n- Step 3: The upward force on the bottom face is F_up = P₂A = ρ_f gh₂A = ρ_f g(h₁ + L)A\n- Step 4: Net upward force (upthrust): U = F_up - F_down = ρ_f gA(h₂ - h₁) = ρ_f gAL = ρ_f Vg, where V = AL is the submerged volume\n\nThis derivation shows upthrust equals the weight of fluid that would occupy the submerged volume — Archimedes' Principle.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A steel sphere (density 7800 kg m⁻³) is placed in water. Will it float, sink, or hover? Explain using density comparison.", "answer": "The steel sphere will **sink** because its density (7800 kg m⁻³) is greater than water's density (1000 kg m⁻³).\n\nThe condition is: if ρ_object > ρ_fluid, the weight exceeds the maximum possible upthrust (when fully submerged), so the net force is downward and the object sinks.\n\nIf ρ_object = ρ_fluid, it would hover at any depth (neutral buoyancy). If ρ_object < ρ_fluid, it floats with part above the surface.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "An iceberg (density 920 kg m⁻³) floats in seawater (density 1025 kg m⁻³). What fraction of the iceberg is submerged? (2 steps)", "answer": "- Step 1: For a floating body, weight = upthrust: ρ_ice V_total g = ρ_seawater V_submerged g\n- Step 2: Cancel g and rearrange: V_submitted/V_total = ρ_ice/ρ_seawater = 920/1025 = 0.898 ≈ 90%\n\nSo about 90% of the iceberg's volume is below water — explaining the saying \"the tip of the iceberg.\"", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "A vertical cylindrical rod of mass 0.15 kg and cross-sectional area 6.0 × 10⁻⁴ m² floats in water (ρ_f = 1000 kg m⁻³). To what depth Δh is the rod submerged? (3 steps)", "answer": "- Step 1: For floating equilibrium, W = U, so mg = ρ_f V g. Cancel g: m = ρ_f V\n- Step 2: For a cylinder, submerged volume V = A × Δh, so m = ρ_f A Δh\n- Step 3: Rearrange: Δh = m/(ρ_f A) = 0.15 / (1000 × 6.0 × 10⁻⁴) = 0.15 / 0.60 = 0.25 m\n\nThe rod floats submerged to a depth of 0.25 m (25 cm).", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "If the rod in Q5 were replaced by a thicker rod of the same mass but larger cross-sectional area, would it float higher or lower? Explain using m = ρ_f A Δh.", "answer": "It would float **higher** (submerged depth Δh would decrease).\n\nFrom Δh = m/(ρ_f A), with mass m and fluid density ρ_f held constant, Δh is inversely proportional to area A. A larger area means a smaller Δh.\n\nThis is intuitive: a wider object displaces enough fluid to support its weight over a shorter depth because it pushes aside more fluid per unit depth.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Describe the \"apparent weight\" method for finding a fluid's density, and write the formula. (3 steps)", "answer": "- Step 1: Weigh an object in air (reading W₁), then weigh it fully submerged in the fluid (reading W₂). The apparent loss of weight equals the upthrust: U = W₁ - W₂\n- Step 2: Measure the displaced volume V (from the rise in fluid level when the object is submerged)\n- Step 3: Since U = ρ_f V g, rearrange to find fluid density: ρ_f = U/(Vg) = (W₁ - W₂)/(Vg)\n\nThis is the \"complicated\" method Alex contrasted with the simple direct method (collect displaced fluid and measure its mass and volume).", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": true}, {"question": "Why does upthrust NOT depend on how deep an object is submerged? Explain using pressure concepts.", "answer": "When an object is pushed deeper, the pressure increases on both its top and bottom faces by the same amount (ρ_f g × the depth increase). The difference in pressure between top and bottom — which is what creates the net upward force — remains constant.\n\nMathematically, in U = ρ_f V g, there is no depth term. Upthrust depends only on the **volume of fluid displaced**, not on how deep that displacement occurs.\n\n(This assumes the fluid density is uniform, which is true for liquids in this topic.)", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Define viscosity and state its SI units. What does a higher viscosity value mean practically?", "answer": "Viscosity (η) is a measure of a fluid's internal friction or resistance to flow — the tangential force between adjacent layers moving at different speeds.\n\nSI units: **pascal-second (Pa·s)**, which is equivalent to kg·m⁻¹·s⁻¹ or N·s·m⁻².\n\nPractically: high viscosity fluids (honey, custard) flow slowly and resist motion through them strongly; low viscosity fluids (water, air) flow easily. Honey is about 10,000 times more viscous than water.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "How does viscosity change with temperature for (a) a liquid and (b) a gas? Explain why the trends are opposite. (3 steps)", "answer": "- Step 1: For **liquids**, viscosity **decreases** with temperature (warm honey flows more easily). For **gases**, viscosity **increases** with temperature.\n- Step 2 (liquids): Viscosity arises mainly from intermolecular attractions. Heating gives molecules more kinetic energy to break free from these attractions, so internal friction decreases.\n- Step 3 (gases): Viscosity comes from molecules diffusing between fast and slow layers, carrying momentum. Faster molecules (at higher temperature) cross between layers more often, transporting more momentum — so viscosity increases.\n\nThe microscopic origin of viscosity differs between liquids and gases.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "State Stokes' Law and identify what each symbol represents. Under what THREE conditions is it valid? (2 steps)", "answer": "Stokes' Law: **F = 6πηrv**\n\n- F = viscous drag force on the sphere (N)\n- η = viscosity of the fluid (Pa·s)\n- r = radius of the sphere (m) — not diameter\n- v = speed of sphere relative to fluid (m s⁻¹)\n\n**Three conditions for validity:**\n1. The object is a **small, smooth sphere**\n2. It moves at **low speed**\n3. The flow is **laminar** (smooth, non-turbulent) — no eddies\n\nIf any condition fails (e.g., a large object, high speed, or turbulent flow), Stokes' Law does not apply.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A steel ball bearing of radius 1.5 mm falls through oil at speed 0.030 m s⁻¹. The oil viscosity is 0.80 Pa·s. Calculate the viscous drag force. (3 steps)", "answer": "- Step 1: Use Stokes' Law F = 6πηrv. Convert radius to metres: r = 1.5 mm = 1.5 × 10⁻³ m\n- Step 2: Substitute: F = 6π × 0.80 × (1.5 × 10⁻³) × 0.030\n- Step 3: Calculate: 6π ≈ 18.85; 18.85 × 0.80 = 15.08; × 1.5 × 10⁻³ = 2.262 × 10⁻²; × 0.030 = 6.79 × 10⁻⁴ N ≈ **6.8 × 10⁻⁴ N**", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A raindrop of radius 0.50 mm falls through air (η = 1.8 × 10⁻⁵ Pa·s) at terminal velocity 2.0 m s⁻¹. Estimate its weight, stating any assumptions. (3 steps)", "answer": "- Step 1: At terminal velocity in air, weight ≈ drag (upthrust from air is negligible for a small drop): W ≈ F_D\n- Step 2: Use Stokes' Law: F = 6πηrv = 6π × 1.8 × 10⁻⁵ × (0.50 × 10⁻³) × 2.0\n- Step 3: Calculate: 6π ≈ 18.85; 18.85 × 1.8 × 10⁻⁵ = 3.39 × 10⁻⁴; × 0.50 × 10⁻³ = 1.70 × 10⁻⁷; × 2.0 = **3.4 × 10⁻⁷ N**\n\n[Audit note: This assumes Stokes' Law applies. Checking Reynolds number: Re ≈ 130, which is >1, so flow is actually turbulent and Stokes' Law is an approximation here. The exam question is a deliberate idealisation.]", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Explain why an object falling through a fluid reaches a terminal velocity. Your explanation should reference the forces involved. (4 steps)", "answer": "- Step 1: When released, the object accelerates downward because weight exceeds the upward forces (initially zero drag if starting from rest).\n- Step 2: As speed increases, the viscous drag force (F_D = 6πηrv) increases in direct proportion to speed.\n- Step 3: The resultant downward force = W - U - F_D becomes smaller as F_D grows, so the acceleration decreases.\n- Step 4: At exactly one speed (terminal velocity), drag has grown until W = U + F_D. The resultant force is zero, so acceleration is zero and the object falls at constant speed.\n\nThe key is that drag increases with speed — this self-limiting process creates a stable maximum speed.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A steel ball (density 7800 kg m⁻³, radius 1.0 mm) falls through oil (density 880 kg m⁻³, viscosity 0.85 Pa·s). Derive the terminal velocity formula for a sphere and calculate v_t. (5 steps)", "answer": "- Step 1: At terminal velocity, forces balance: W = U + F_D\n- Step 2: Substitute: ρ_s(4/3)πr³g = ρ_f(4/3)πr³g + 6πηr v_t\n- Step 3: Rearrange: 6πηr v_t = (4/3)πr³g(ρ_s - ρ_f)\n- Step 4: Cancel π and one r: v_t = (2r²g(ρ_s - ρ_f))/(9η)\n- Step 5: Calculate: r = 1.0 × 10⁻³ m; ρ_s - ρ_f = 7800 - 880 = 6920 kg m⁻³\n  v_t = [2 × (10⁻³)² × 9.81 × 6920] / [9 × 0.85]\n  = [2 × 10⁻⁶ × 9.81 × 6920] / 7.65\n  = 0.1358 / 7.65 = **1.8 × 10⁻² m s⁻¹** (≈ 0.018 m s⁻¹)\n\nThis is the complete derivation — the formula is NOT on the data sheet and must be derived.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A skydiver jumps from a plane, reaches terminal velocity, then opens a parachute. Sketch a velocity-time graph and explain the shape, identifying the two terminal velocities. (3 steps)", "answer": "- Step 1: From t=0, velocity rises steeply (large resultant force, large acceleration). As drag builds, the curve's gradient decreases.\n- Step 2: The graph flattens to a horizontal line at v_t1 — this is the first terminal velocity (fast, maybe 50-60 m s⁻¹ for a head-down dive).\n- Step 3: At parachute opening, the curve drops sharply (large upward resultant = deceleration). It then curves upward (drag decreasing as speed falls) and flattens again at a lower v_t2 (maybe 5-10 m s⁻¹).\n\nThe graph has steep rise → plateau → sharp drop → lower plateau. The two flat regions are the two terminal velocities.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "In Core Practical 4 (falling-ball viscometer), why is the ball timed between two marks that are below the surface, rather than from the moment it is released? (2 steps)", "answer": "- Step 1: When first released, the ball accelerates from rest. It needs a short distance for the drag to grow until it balances weight minus upthrust.\n- Step 2: Only after this \"run-in\" distance does the ball travel at constant terminal velocity. Timing between two marks below the surface ensures the measured speed v = s/t is the terminal velocity required by the formula η = mg/(6πrv).\n\nIf timing began from release, the measured speed would be too low (still accelerating), giving an overestimated viscosity.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Describe how to determine viscosity using the falling-ball method with multiple ball sizes and a graph. Why is this approach better than using a single ball? (3 steps)", "answer": "- Step 1: Use ball bearings of several different radii. For each, measure terminal velocity v_t (from timing over a known distance).\n- Step 2: Since v_t ∝ r² (from v_t = [2(ρ_s-ρ_f)g/9η] × r²), plot v_t (y-axis) against r² (x-axis). The points should form a straight line through the origin.\n- Step 3: The gradient k = 2(ρ_s-ρ_f)g/(9η). Rearrange to find η = 2(ρ_s-ρ_f)g/(9k).\n\nThis is better because: (a) plotting several points and taking the gradient averages out random errors; (b) a straight line through the origin confirms the flow stayed laminar (Stokes' Law valid); (c) curvature at large r would reveal if some balls went too fast for Stokes' Law.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Using dimensional analysis, show that the SI unit of viscosity η is kg·m⁻¹·s⁻¹, and explain why N·s·m⁻² is also a valid unit. (3 steps)", "answer": "- Step 1: From Stokes' Law F = 6πηrv, rearrange: η = F/(r·v). Units: F is N = kg·m·s⁻²; r is m; v is m·s⁻¹\n- Step 2: So [η] = (kg·m·s⁻²) / (m × m·s⁻¹) = kg·m⁻¹·s⁻¹\n- Step 3: Since N = kg·m·s⁻², we can write N·s·m⁻² = (kg·m·s⁻²) × s × m⁻² = kg·m⁻¹·s⁻¹. Also, since Pa = N·m⁻², Pa·s is also valid.\n\nSo η can be expressed as Pa·s, kg·m⁻¹·s⁻¹, or N·s·m⁻² — all equivalent.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Which of the following is NOT a valid unit for viscosity? (a) kg·m⁻¹·s⁻¹ (b) N·s (c) Pa·s (d) N·m⁻² (2 steps)", "answer": "- Step 1: Valid units for η are Pa·s, kg·m⁻¹·s⁻¹, and N·s·m⁻². Option (a) is kg·m⁻¹·s⁻¹ — valid. Option (c) is Pa·s — valid.\n- Step 2: Option (b) N·s has units kg·m·s⁻¹ (momentum, not viscosity). Option (d) N·m⁻² is pressure (Pa), missing the seconds.\n\nThe answer is **(b) N·s** (or **(d) N·m⁻²** depending on the exact options printed — see audit note in study material about the board record discrepancy).", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A student measures the diameter of a ball bearing as 4.0 mm using a micrometer. If they mistakenly use the diameter instead of the radius in Stokes' Law, by what factor will their calculated drag force be wrong? (2 steps)", "answer": "- Step 1: Stokes' Law uses radius r. If they use diameter d = 2r, they substitute d instead of r.\n- Step 2: The calculated F = 6πη(d)v = 6πη(2r)v = 2 × (6πηrv). Their answer will be **2 times too large**.\n\nSince terminal velocity v_t ∝ r², using diameter instead of radius would make v_t four times too large. This is a common error — always halve the diameter to get radius.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "An object is floating in fresh water (density 1000 kg m⁻³). If it is placed in salt water (density 1025 kg m⁻³), will it float higher or lower? Explain using the floating condition. (2 steps)", "answer": "It will **float higher** (submerged depth decreases).\n\nFor a floating body: weight = upthrust = weight of displaced fluid. The object's weight is unchanged, so it must displace the same *weight* of fluid. In denser salt water, a smaller volume of fluid has the same weight, so the submerged volume (and thus depth) decreases.\n\nFrom m = ρ_f A Δh: with m fixed, if ρ_f increases, Δh must decrease.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Explain the difference between laminar flow and turbulent flow. Why does Stoke
