s' Law fail when flow becomes turbulent? (2 steps)", "answer": "- **Laminar flow:** fluid moves in smooth, parallel layers that don't mix; viscous forces dominate; drag increases linearly with speed (Stokes' Law applies).\n- **Turbulent flow:** fluid forms chaotic eddies and swirls; inertial forces dominate; drag increases roughly with v² (not linear).\n\nStokes' Law assumes the linear relationship F ∝ v from laminar flow. Once turbulence forms, the flow pattern changes fundamentally and the simple 6πηrv formula no longer describes the drag.\n\nThe transition is governed by the Reynolds number: Re = ρ_f vL/η. Low Re (≈ <1) means laminar; high Re (≫1) means turbulent.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A vernier caliper gives a reading of 1.24 cm, but when fully closed it reads 0.04 cm (positive zero error). What is the actual length? (2 steps)", "answer": "- Step 1: A positive zero error means the instrument reads too high. The correction is: actual = observed - zero error.\n- Step 2: Actual = 1.24 cm - 0.04 cm = **1.20 cm**\n\nThe rule: actual = observed - zero error. Positive error → subtract; negative error (reads too low) → add.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "A micrometer reads 5.72 mm on a wire. When fully closed, it reads -0.02 mm (negative zero error). Find the true diameter. (2 steps)", "answer": "- Step 1: A negative zero error means the instrument reads too low. Actual = observed - (negative error) = observed + |error|\n- Step 2: Actual = 5.72 mm - (-0.02 mm) = 5.72 + 0.02 = **5.74 mm**\n\nAlternatively: actual = observed - zero_error = 5.72 - (-0.02) = 5.74 mm.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Why is pressure in a fluid described by P = ρgh, and why does this explain the existence of upthrust? (3 steps)", "answer": "- Step 1: P = ρgh comes from considering a column of fluid: weight = mg = ρVg = ρAhg, and pressure = force/area = weight/area = ρgh.\n- Step 2: This shows pressure increases linearly with depth — deeper points support taller columns of fluid.\n- Step 3: For a submerged object, the bottom face is deeper than the top face, so pressure on the bottom is greater. The difference in pressure between top and bottom creates a net upward force — this is upthrust.\n\nWithout the pressure-increasing-with-depth relationship, there would be no upthrust.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "A marble (mass 0.050 kg, density 2500 kg m⁻³) is held fully submerged in water and released. Find (a) the upthrust and (b) the initial acceleration. (4 steps)", "answer": "- Step 1: Find volume: V = m/ρ = 0.050/2500 = 2.0 × 10⁻⁵ m³\n- Step 2: Upthrust: U = ρ_f V g = 1000 × 2.0 × 10⁻⁵ × 9.81 = 0.196 N ≈ 0.20 N (upward)\n- Step 3: Weight: W = mg = 0.050 × 9.81 = 0.49 N (downward)\n- Step 4: Resultant = W - U = 0.49 - 0.20 = 0.29 N downward. Acceleration a = F/m = 0.29/0.050 = **5.8 m s⁻² downward**\n\nAt v = 0, drag is zero, so only weight and upthrust act.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Two steel balls of the same material fall through the same oil. Ball Y has twice the radius of Ball X. By what factor is (a) the weight and (b) the terminal velocity of Y larger than X? (3 steps)", "answer": "- Step 1: Weight ∝ volume ∝ r³. Doubling radius → weight increases by 2³ = **8 times**.\n- Step 2: v_t ∝ r² (from v_t = 2r²g(ρ_s-ρ_f)/9η). Doubling radius → v_t increases by 2² = **4 times**.\n- Step 3: This shows terminal velocity grows faster than weight because drag (∝ r) grows more slowly than weight (∝ r³). To balance weight, speed must increase until drag (∝ r × v) catches up, giving v ∝ r².", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "When oil is warmed, what happens to its viscosity and to the terminal velocity of a ball falling through it? Explain. (2 steps)", "answer": "- Step 1: For liquids, viscosity **decreases** with temperature (heating gives molecules more energy to overcome intermolecular attractions).\n- Step 2: Since v_t ∝ 1/η, a lower viscosity means a **higher terminal velocity**. The ball falls faster in warmer oil.\n\nThis is why warming honey makes it flow faster — and why a ball bearing would fall more quickly through warmed oil.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A parachutist opens their parachute. Using force concepts, explain why this causes the skydiver to slow down, and why they eventually reach a new (lower) terminal velocity. (3 steps)", "answer": "- Step 1: Opening the parachute dramatically increases the surface area, which increases the drag force at any given speed.\n- Step 2: At the instant it opens, drag suddenly exceeds weight, creating an upward resultant force. This upward resultant causes deceleration (the diver slows down).\n- Step 3: As the diver slows, drag decreases (F_D ∝ v). Eventually drag equals weight again at a new, lower speed — the lower terminal velocity. The parachute doesn't keep you accelerating upward; it just reduces the maximum speed.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A ball bearing reaches terminal velocity in oil. If its speed were somehow held at exactly half of terminal velocity, would it be in equilibrium? Explain using the force balance. (2 steps)", "answer": "- No, it would NOT be in equilibrium.\n\nAt half the terminal speed, the drag force is also half (since F_D ∝ v from Stokes' Law). But weight and upthrust are unchanged. At true terminal velocity: W = U + F_D (zero resultant). At half speed: W > U + (½F_D), so there is still a downward resultant force. The ball would accelerate downward, speeding up toward terminal velocity — not equilibrium.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "State Archimedes' Principle in one sentence, then explain why stating it as \"upthrust equals the mass of fluid displaced\" is incorrect.", "answer": "Archimedes' Principle: **The upthrust on a body in a fluid equals the weight of the fluid displaced by the body.**\n\nThe version \"mass of fluid displaced\" is wrong because upthrust is a **force** (measured in newtons), while mass is measured in kilograms. Upthrust = weight = mass × g. Using mass instead of weight would give an answer with the wrong units.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "In the falling-ball viscometer experiment, state two possible sources of error and suggest how each could be reduced. (2 steps)", "answer": "- Error 1: The ball may not have reached terminal velocity by the first timing mark. Fix: place the start line further below the surface, or use multiple timing intervals to check speed is constant.\n\nError 2: Wall effects — a narrow cylinder slows the ball because the fluid near the walls is nearly stationary. Fix: use a wide cylinder so r_ball ≪ r_cylinder.\n\nOther errors: reaction time in stopping the clock (use light gates); temperature changes affecting η (keep temperature constant); ball not perfectly spherical (use precision ball bearings).", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "A student claims that because acceleration is decreasing (from large to small) during the initial fall of a skydiver, the skydiver must be slowing down. Explain why this reasoning is incorrect. (2 steps)", "answer": "- The student is confusing **acceleration** with **velocity**.\n\nA decreasing (but still positive) acceleration means the skydiver is still speeding up — but the rate at which speed increases is getting smaller. Acceleration falling toward zero just means \"speeding up more gently.\"\n\nDeceleration (slowing down) only occurs when acceleration becomes **negative** — i.e., when the resultant force points upward. This happens when the parachute opens, not during the initial descent when weight still exceeds drag.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Explain why the upthrust on a fully submerged object does not change if the object is moved deeper, but the pressure on the object does increase with depth.", "answer": "- Pressure increases with depth because a deeper point supports a taller column of fluid above it: P = ρgh. Both the top and bottom faces experience this increased pressure as the object goes deeper.\n\nHowever, the **difference** in pressure between top and bottom faces stays the same. Pushing deeper raises pressure on both faces equally, so the net force (upthrust = pressure difference × area) is unchanged.\n\nUpthrust = weight of displaced fluid = ρ_f V g — and this depends only on volume displaced, not on depth.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A block of base area 0.015 m² floats in water submerged to a depth of 0.080 m. Calculate the upthrust on the block. (2 steps)", "answer": "- Step 1: Find submerged volume: V = A × Δh = 0.015 × 0.080 = 1.2 × 10⁻³ m³\n- Step 2: Upthrust = ρ_f V g = 1000 × 1.2 × 10⁻³ × 9.81 = **11.8 N**\n\nFor a floating body, this upthrust equals the block's weight.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Write the force balance equation at terminal velocity for a sphere falling through a fluid, identifying all four terms. Then state what this balance implies about acceleration.", "answer": "The balance is: **W = U + F_D**\n\n- W = weight = ρ_s V g (downward)\n- U = upthrust = ρ_f V g (upward)\n- F_D = viscous drag = 6πηr v_t (upward, opposing motion)\n\nAt terminal velocity, the resultant force is zero. By Newton's First Law, when resultant force is zero, acceleration is zero. The body moves at constant velocity.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "A solid sphere has density 600 kg m⁻³ and floats in a liquid of density 900 kg m⁻³. What fraction of its volume is (a) submerged and (b) above the surface? (2 steps)", "answer": "- Step 1: Fraction submerged = ρ_object / ρ_fluid = 600/900 = 2/3 ≈ 0.667\n- Step 2: Fraction above = 1 - 2/3 = **1/3 ≈ 0.333** (or 33%)\n\nThis is a general result: for any floating body, fraction submerged = ρ_object / ρ_fluid.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Why does the terminal velocity formula v_t = 2r²g(ρ_s - ρ_f)/(9η) contain the density difference (ρ_s - ρ_f) rather than just the sphere's density? Explain conceptually.", "answer": "The driving force for motion is the **net** downward force: weight minus upthrust.\n\n- Weight ∝ ρ_s (the object's density)\n- Upthrust ∝ ρ_f (the fluid's density)\n\nWhat matters is the difference: the effective \"weight in the fluid\" — how much heavier the sphere is than the fluid it displaces. If ρ_s = ρ_f (neutral buoyancy), the sphere wouldn't sink at all (v_t = 0). The (ρ_s - ρ_f) term captures this physics correctly.\n\nUsing just ρ_s would ignore upthrust entirely and overestimate v_t.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": true}, {"question": "A hydrometer is a weighted float used to measure liquid density. It floats higher in denser liquids. Explain this using the floating rod relation m = ρ_f A Δh. (2 steps)", "answer": "- The hydrometer's mass m is fixed. From m = ρ_f A Δh, rearranging gives Δh = m/(ρ_f A).\n- In a denser fluid (larger ρ_f), the submerged depth Δh must decrease for the same mass — meaning the hydrometer floats higher.\n- This is how a hydrometer works: the depth it sinks indicates the fluid's density. Markings on the stem allow direct reading of density.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}], "count": 39}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What is the underlying physical reason that an immersed object experiences an upward upthrust force from a surrounding fluid? (3 steps)", "answer": "- Step 1: Pressure in a fluid increases linearly with depth according to $$P = \\rho_f g h$$. This is because a deeper point supports a taller column of fluid above it.\n- Step 2: The bottom face of an immersed object sits at greater depth than the top face, so the fluid pressure on the bottom face is *larger* than that on the top face. Horizontal pressures cancel by symmetry, but vertical ones do not.\n- Step 3: The leftover, net upward push from this pressure asymmetry *is* the upthrust. So upthrust is not a separate fundamental force — it is a direct consequence of how pressure varies with depth in a fluid.\n\nUpthrust exists because fluids transmit pressure and pressure scales with depth.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Derive the formula $$U = \\rho_f V g$$ for the upthrust on a fully submerged block of cross-section $$A$$ and height $$L$$, starting from pressure-depth reasoning. (4 steps)", "answer": "- Step 1: Let the top face sit at depth $$h_1$$ and the bottom face at $$h_2 = h_1 + L$$. Using gauge pressure $$P = \\rho_f g h$$:\n+ Force pushing down on the top: $$F_{\\text{down}} = \\rho_f g h_1 A$$\n+ Force pushing up on the bottom: $$F_{\\text{up}} = \\rho_f g h_2 A$$\n- Step 2: The net upward force (the upthrust) is the difference: $$U = F_{\\text{up}} - F_{\\text{down}} = \\rho_f g A (h_2 - h_1)$$.\n- Step 3: But $$h_2 - h_1 = L$$, so $$U = \\rho_f g A L$$.\n- Step 4: Since $$A L = V$$, the submerged volume, we get $$U = \\rho_f V g$$. Notice $$h_1$$ cancelled out — upthrust depends only on the displaced volume, not on how deep the object is held.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why does the upthrust on a fully submerged object NOT depend on how deep it is held in the fluid? (2 steps)", "answer": "- Step 1: Pushing the object deeper raises the pressure on *both* its top and bottom faces by the same amount, $$\\rho_f g \\Delta h$$, because the fluid is uniform.\n- Step 2: Upthrust is the *difference* in those pressures times area. Since both pressures rise equally, their difference is unchanged. So upthrust depends only on the displaced volume and the fluid density — not on the absolute depth.\n\nThis is why a diver at 5 m and at 30 m feels the same buoyant force on their body (ignoring gas-compression effects in the lungs).", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "State Archimedes' Principle and explain why it is equivalent to the pressure-difference derivation of upthrust.", "answer": "Archimedes' Principle states that the upthrust on a body partially or fully immersed in a fluid equals the weight of the fluid that the body displaces. The pressure-difference derivation yields $$U = \\rho_f V g$$, where $$\\rho_f V$$ is exactly the *mass* of fluid that used to occupy the space now taken by the object, and $$\\rho_f V g$$ is therefore that fluid's *weight*. So the two routes — adding up pressure forces on the faces, or invoking the displaced-fluid principle — are mathematically identical and physically the same statement.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "In the formula $$U = \\rho_f V g$$, whose density and whose volume are involved? Why is this a common exam trap?", "answer": "The density is that of the **fluid** ($$\\rho_f$$), never the object's density. The volume is the **submerged** volume of the object (the volume of fluid pushed aside), which equals the total object volume only when the object is *fully* immersed. The trap arises because students instinctively reach for the object's density (since the object is \"the thing in the problem\"), but upthrust is set entirely by the fluid being pushed aside, not by what is doing the pushing.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Using the \"imaginary fluid-shape\" intuition, explain why upthrust equals the weight of displaced fluid. (3 steps)", "answer": "- Step 1: Imagine removing the submerged part of the object and replacing that exact same shape with the surrounding fluid itself. This fluid-shape is in equilibrium with the rest of the fluid — it just sits there, not moving.\n- Step 2: For that fluid-shape to be in equilibrium, the surrounding fluid must push it up with a force equal to its weight, $$\\rho_f V g$$.\n- Step 3: The surrounding fluid cannot distinguish between the imagined fluid-shape and the real object — it only \"sees\" the boundary. So it pushes up on the real object with exactly the same force, $$\\rho_f V g$$. This is upthrust = weight of fluid displaced.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "Explain the three buoyancy outcomes (sink, float, hover) in terms of comparing densities, and link each to the force balance. (3 steps)", "answer": "- Step 1: Compare object density $$\\rho_s$$ with fluid density $$\\rho_f$$. The maximum possible upthrust is $$U_{\\max} = \\rho_f V_{\\text{obj}} g$$, achieved when fully submerged.\n- Step 2: Outcomes:\n+ **Sinks** if $$\\rho_s > \\rho_f$$: even fully submerged, $$W > U_{\\max}$$, so net downward force remains and the object descends until it hits the bottom.\n+ **Floats** (partly out) if $$\\rho_s < \\rho_f$$: $$W < U_{\\max}$$, so the object rises until the *submerged* volume displaces a fluid weight exactly equal to its own weight.\n+ **Hovers (neutral buoyancy)** if $$\\rho_s = \\rho_f$$: $$W = U_{\\max}$$ when fully submerged, so equilibrium is achieved at any depth.\n- Step 3: The deciding question is always $$\\rho_s$$ vs $$\\rho_f$$ — never \"is the object heavy?\" because a heavy steel ship floats while a tiny pebble sinks. Density, not weight, determines buoyancy outcome.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "Derive the floating-rod relation $$m = \\rho_f A \\Delta h$$ for a vertical cylinder floating with submerged depth $$\\Delta h$$. (4 steps)", "answer": "- Step 1: At floating equilibrium, weight balances upthrust: $$W = U$$.\n- Step 2: Substitute the force formulas: $$mg = \\rho_f V g$$, where $$V$$ is the submerged volume.\n- Step 3: For a vertical cylinder, the submerged volume is $$V = A \\Delta h$$, where $$A$$ is the cross-sectional area. So $$mg = \\rho_f A \\Delta h \\, g$$.\n- Step 4: Cancel $$g$$ on both sides: $$m = \\rho_f A \\Delta h$$. This neat result links the object's mass to the fluid's density, the rod's cross-section, and how deep it sits.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "A vertical floating rod is given more mass, holding $$A$$ and $$\\rho_f$$ fixed. Does it sit deeper or higher in the fluid? Explain.", "answer": "It sits **deeper**. From $$m = \\rho_f A \\Delta h$$, rearranging gives $$\\Delta h = m/(\\rho_f A)$$. With $$\\rho_f$$ and $$A$$ held constant, $$\\Delta h$$ is directly proportional to $$m$$. Physically: a heavier rod has greater weight, so it needs a *larger* upthrust to balance — which requires displacing a larger volume of fluid, achieved by sitting deeper. The cross-section can't widen on its own, so the only way to displace more is to push further down.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "A vertical floating rod has its diameter increased (so larger $$A$$), keeping its mass and the fluid density fixed. Does it float higher or lower? Why is the answer counterintuitive at first?", "answer": "It floats **higher** (smaller $$\\Delta h$$). From $$\\Delta h = m/(\\rho_f A)$$ with $$m$$ and $$\\rho_f$$ constant, larger $$A$$ means smaller $$\\Delta h$$. The intuitive trap is to think \"bigger rod = sinks more,\" but the relevant comparison is *how much fluid you displace per unit depth*: a wider rod displaces more fluid for each cm of submersion, so it only needs to dip in a small distance to support the same weight. This is exactly why ships are wide.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "A floating object is moved from fresh water to salt water (denser). Does it sit deeper or higher? Explain in one sentence using the floating-rod relation.", "answer": "It sits **higher**. From $$m = \\rho_f A \\Delta h$$ with $$m$$ and $$A$$ fixed, increasing $$\\rho_f$$ requires a *smaller* $$\\Delta h$$ — the denser fluid only needs a small displaced volume to provide enough upthrust to balance the unchanged weight.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "What fraction of a floating iceberg sits below the water surface, given ice density $$\\rho_s$$ and water density $$\\rho_f$$? Derive the result. (3 steps)", "answer": "- Step 1: For floating equilibrium, $$W = U$$, i.e. $$\\rho_s V_{\\text{tot}} g = \\rho_f V_{\\text{sub}} g$$.\n- Step 2: Cancel $$g$$ and rearrange: $$\\dfrac{V_{\\text{sub}}}{V_{\\text{tot}}} = \\dfrac{\\rho_s}{\\rho_f}$$.\n- Step 3: So the submerged fraction is simply the *ratio of densities*. For an iceberg ($$\\rho_s \\approx 920$$, $$\\rho_f \\approx 1025$$), this is about 0.90 — about 90% is hidden below water, hence \"tip of the iceberg.\"\n\nThe general rule: the denser the object relative to the fluid, the more of it is submerged.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Explain the apparent-weight method for measuring upthrust and the density of an unknown fluid. (4 steps)", "answer": "- Step 1: Hang the object from a spring balance and read its weight in air, $$W_1$$ (this is just $$mg$$, with no fluid involved).\n- Step 2: Lower it fully into the fluid; the balance now reads a smaller weight $$W_2$$, because the fluid pushes up with force $$U$$. The balance reads net downward pull: $$W_2 = W_1 - U$$.\n- Step 3: Rearrange to get the upthrust: $$U = W_1 - W_2$$. This \"apparent loss of weight\" equals the weight of fluid displaced.\n- Step 4: To get the fluid density, measure the rise in fluid level in a graduated cylinder, giving the displaced volume $$V$$. Then from $$U = \\rho_f V g$$: $$\\rho_f = U/(V g)$$.\n\nKey insight: a spring balance in fluid doesn't lie about gravity — it measures the *net* downward pull, which is reduced by upthrust.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Why is \"mass of liquid displaced equals upthrust\" a wrong statement, even though it sounds reasonable?", "answer": "Because units don't match. Upthrust is a *force* measured in newtons (N), while mass is measured in kilograms (kg) — they are different physical quantities. The correct statement is that the **weight** of liquid displaced (a force, in N) equals the upthrust. To get from displaced mass to upthrust, you must multiply by $$g$$: $$U = (\\rho_f V) g = m_{\\text{displaced}} \\, g$$. This is a classic exam discriminator: confusing mass and weight loses the mark.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Define viscosity $$\\eta$$ in physical terms and explain what causes it microscopically in a liquid. (2 steps)", "answer": "- Step 1: Viscosity $$\\eta$$ is a measure of a fluid's *internal friction* — its resistance to flow. Operationally, when two layers of fluid slide past each other at different speeds, $$\\eta$$ sets the size of the shear force per unit area between them.\n- Step 2: In a liquid, viscosity originates from *intermolecular attractions*: molecules in adjacent layers tug on each other as they try to slide past, resisting relative motion. The stronger and longer-range these attractions, the more viscous the liquid. This is why honey (lots of hydrogen bonding) is highly viscous and water (less bonding) flows easily.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Why does the viscosity of a liquid *decrease* with rising temperature, while the viscosity of a gas *increases*? (3 steps)", "answer": "- Step 1: In a **liquid**, viscosity comes from intermolecular attractions. Heating gives molecules more kinetic energy, so they can more easily break free of neighbours and slide past them. The attractions matter less, internal friction falls, so $$\\eta$$ **decreases**. (Warm honey runs faster than cold honey.)\n- Step 2: In a **gas**, molecules are far apart and rarely attract. Viscosity here comes from molecules randomly *diffusing* across the boundary between fast- and slow-moving layers, carrying momentum with them. This momentum transfer is what makes layers \"grip\" each other.\n- Step 3: Heating a gas makes molecules move faster, so they cross between layers more frequently and transport *more* momentum per unit time. The layers grip more strongly — $$\\eta$$ **increases**.\n\nThe two trends look opposite but both follow from \"viscosity = whatever resists relative motion between layers,\" with different microscopic origins.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "State Stokes' Law and define every symbol with its units.", "answer": "Stokes' Law gives the viscous drag force on a small sphere moving slowly through a fluid: $$F = 6\\pi \\eta r v$$, where:\n- $$F$$ — viscous drag force, in newtons (N), pointing opposite to the sphere's motion\n- $$\\eta$$ — dynamic viscosity of the fluid, in pascal-seconds (Pa s)\n- $$r$$ — **radius** of the sphere (not diameter), in metres (m)\n- $$v$$ — speed of the sphere relative to the fluid, in m s⁻¹\n\nA key feature: $$F \\propto v$$ (drag grows in direct proportion to speed). This linearity is precisely what makes a stable terminal velocity possible.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "State the three (or four) validity conditions for Stokes' Law and explain why each matters.", "answer": "Stokes' Law $$F = 6\\pi \\eta r v$$ applies only when:\n- **Small, smooth sphere** — the geometry assumed in the derivation; a rough or non-spherical object disturbs the flow differently.\n- **Low speed** — at high speeds, inertial forces in the fluid dominate viscous ones, and drag stops being linear in $$v$$.\n- **Laminar (non-turbulent) flow** — the fluid slides past in smooth parallel sheets that close up neatly behind the sphere. Once turbulence forms (chaotic eddying), the drag law changes character entirely (roughly $$F \\propto v^2$$).\n- (Bonus) **No wall effects** — container much wider than sphere, otherwise walls slow the fluid and inflate apparent drag.\n\nFailing any one condition invalidates the law. That's why Stokes can't model aeroplanes, footballs, or cyclists.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "Contrast laminar and turbulent flow around a moving sphere. What does each \"look like\" and how does drag scale with speed in each case?", "answer": "**Laminar flow:** the fluid moves in smooth, parallel sheets that slide past the sphere and close up neatly behind it. The wake is calm and predictable. Drag arises purely from viscosity and scales linearly: $$F \\propto v$$. This is the regime where Stokes' Law applies.\n\n**Turbulent flow:** the parallel sheets break into chaotic, swirling eddies, especially behind the sphere. The wake is messy. Drag arises mostly from the kinetic energy thrown into these eddies (an inertial effect), and scales roughly with the *square* of speed: $$F \\propto v^2$$.\n\nThe transition is governed by the Reynolds number $$Re = \\rho_f v L / \\eta$$ — small $$Re$$ means viscosity dominates (laminar), large $$Re$$ means inertia dominates (turbulent).", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "A textbook problem asks you to apply Stokes' Law to a raindrop of radius 0.5 mm falling at 2 m/s in air. Why is this physically dubious even though you must answer as instructed?", "answer": "Checking the Reynolds number with $$\\rho_{\\text{air}} \\approx 1.2 \\text{ kg/m}^3$$, $$L = 2r = 10^{-3}$$ m, and $$\\eta_{\\text{air}} \\approx 1.8 \\times 10^{-5}$$ Pa s: $$Re = \\rho_f v L / \\eta \\approx 130$$, which is well above 1. Physically the flow around a real falling raindrop at that speed is **turbulent**, so Stokes' Law does not strictly apply — drag would be closer to $$F \\propto v^2$$ in reality. The exam question is a deliberate idealisation; you must answer using Stokes' formula as instructed, but understanding that \"low speed\" in the conditions is a real, restrictive requirement that this scenario quietly violates.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "Why does an object falling through a viscous fluid eventually reach a *constant* maximum speed (terminal velocity), rather than just accelerating forever? (3 steps)", "answer": "- Step 1: At release ($$v = 0$$), drag is zero (since $$F \\propto v$$), and weight exceeds upthrust. Net downward force is large, so the object accelerates downward.\n- Step 2: As speed grows, the drag force $$F_D = 6\\pi \\eta r v$$ grows linearly with $$v$$. So the *net* downward force = $$W - U - F_D$$ shrinks. Acceleration is still downward but smaller.\n- Step 3: At one specific speed, drag has grown just enough that $$W = U + F_D$$ exactly — net force is zero, so acceleration is zero, and speed stops changing. This is terminal velocity. Beyond it, the net force would point upward and slow the object down, so the object can never overshoot — it asymptotes onto $$v_t$$.\n\nA drag force that *grows with speed* is what guarantees a stable terminal velocity. A constant retarding force could not.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "Write down the force balance at terminal velocity for a sphere falling in a fluid, defining each force.", "answer": "At terminal velocity, the resultant force is zero, so: $$W = U + F_D$$. The three forces are:\n- $$W = \\rho_s V g$$ — weight, acting downward, set by the sphere's own density.\n- $$U = \\rho_f V g$$ — upthrust, acting upward, set by the fluid's density (and same volume).\n- $$F_D = 6\\pi \\eta r v_t$$ — viscous drag (Stokes), acting upward (opposing the downward motion).\n\nOnce these three balance, $$a = 0$$ and $$v = v_t$$ remains constant.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Derive the terminal velocity formula $$v_t = \\dfrac{2 r^2 g (\\rho_s - \\rho_f)}{9 \\eta}$$ for a sphere from the force balance. (5 steps)", "answer": "- Step 1: Start from the force balance at terminal velocity: $$W = U + F_D$$.\n- Step 2: Substitute formulas with $$V = \\tfrac{4}{3}\\pi r^3$$: $$\\rho_s \\tfrac{4}{3}\\pi r^3 g = \\rho_f \\tfrac{4}{3}\\pi r^3 g + 6\\pi \\eta r v_t$$.\n- Step 3: Collect terms involving the densities on the left: $$6\\pi \\eta r v_t = \\tfrac{4}{3}\\pi r^3 g (\\rho_s - \\rho_f)$$.\n- Step 4: Divide both sides by $$6\\pi \\eta r$$: $$v_t = \\dfrac{\\tfrac{4}{3}\\pi r^3 g (\\rho_s - \\rho_f)}{6\\pi \\eta r} = \\dfrac{4 \\pi r^3 g (\\rho_s - \\rho_f)}{18 \\pi \\eta r}$$.\n- Step 5: Cancel $$\\pi$$ and one power of $$r$$, and simplify $$4/18 = 2/9$$: $$v_t = \\dfrac{2 r^2 g (\\rho_s - \\rho_f)}{9 \\eta}$$.\n\nThis formula is examinable but **not** on the data sheet — you must be able to derive it.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Looking at $$v_t = \\dfrac{2 r^2 g (\\rho_s - \\rho_f)}{9 \\eta}$$, how does $$v_t$$ depend on each of $$r$$, $$\\eta$$, and $$(\\rho_s - \\rho_f)$$? Give physical reasoning.", "answer": "- **Radius:** $$v_t \\propto r^2$$. Doubling the radius quadruples $$v_t$$. Reason: weight scales as $$r^3$$ but Stokes drag per unit speed only scales as $$r^1$$ — so speed must rise as $$r^2$$ to make $$rv$$ match $$r^3$$.\n- **Viscosity:** $$v_t \\propto 1/\\eta$$. A \"thicker\" fluid produces more drag per unit speed, so balance is reached at a lower speed.\n- **Density difference:** $$v_t \\propto (\\rho_s - \\rho_f)$$. A denser sphere or thinner fluid means a larger net downward force ($$W - U$$) to overcome with drag, requiring higher $$v_t$$. Importantly, if $$\\rho_s < \\rho_f$$ this would be negative — the sphere rises rather than falls.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Two solid spheres, one aluminium ($$\\rho_s = 2700$$) and one lead ($$\\rho_s = 11300$$), of identical radii are dropped into the same oil ($$\\rho_f = 900$$). Which has the higher terminal velocity, and approximately by what factor?", "answer": "Lead falls faster. Since $$v_t \\propto (\\rho_s - \\rho_f)$$ when $$r$$ and $$\\eta$$ are fixed:\n- Lead: $$\\rho_s - \\rho_f = 11300 - 900 = 10400$$\n- Aluminium: $$\\rho_s - \\rho_f = 2700 - 900 = 1800$$\n\nRatio: $$10400/1800 \\approx 5.8$$. So lead reaches a terminal velocity roughly **5.8 times** that of aluminium. Note: it's the *difference* between sphere and fluid density that matters, not the density ratio.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Two spheres of the *same material* (same density) are dropped into the same fluid. Sphere Y has twice the radius of sphere X. By what factors do their weights and terminal velocities differ? Explain the mismatch. (3 steps)", "answer": "- Step 1: Weight scales with volume: $$W \\propto V \\propto r^3$$. So Y's weight is $$2^3 = 8$$ times X's.\n- Step 2: Terminal velocity scales as $$v_t \\propto r^2$$ (other quantities fixed). So Y's terminal velocity is $$2^2 = 4$$ times X's.\n- Step 3: Why the mismatch? Weight grows as $$r^3$$ but Stokes drag per unit speed grows only as $$r$$ (from $$F = 6\\pi\\eta r v$$). So the speed required for drag to match weight is determined by $$r \\cdot v \\propto r^3$$, giving $$v \\propto r^2$$. This $$r^3$$-vs-$$r^1$$ asymmetry between weight and drag-per-speed is the fundamental reason behind the $$r^2$$ scaling of $$v_t$$.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "A skydiver steps out of a plane. At the very first instant ($$v = 0$$), what are the forces, the resultant, and the acceleration? (2 steps)", "answer": "- Step 1: At $$v = 0$$, air resistance (drag) is zero since drag depends on speed. Upthrust from air is negligible compared to weight. So the only significant force is the diver's weight $$W = mg$$ acting downward.\n- Step 2: The resultant force is therefore the *full weight* downward — as large as it ever gets. By Newton's Second Law, the initial acceleration is $$a = W/m = g \\approx 9.81$$ m/s² downward (free fall). This is the steepest part of the velocity-time graph.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "A few seconds into a skydive, the resultant force is still downward but smaller than the weight. The student says \"the diver is slowing down.\" Why is this wrong? What's actually happening? (3 steps)", "answer": "- Step 1: A *downward* resultant force means the diver is still accelerating *downward*, by Newton's Second Law. So the speed is still increasing — the diver is still speeding up.\n- Step 2: What has changed is the *magnitude* of acceleration. As drag has grown, the net downward force has shrunk, so the diver is accelerating *less rapidly* than at the start. It feels like easing off, but speed is still rising.\n- Step 3: True deceleration would require the resultant force to point *upward* (against the direction of motion). For a falling skydiver pre-parachute, this never happens — drag never exceeds weight before terminal velocity.\n\nThe lesson: \"acceleration decreasing toward zero\" ≠ \"slowing down.\" It means speeding up ever more gently.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "Sketch and describe the velocity-time graph for a ball bearing dropped into oil, and explain the shape in terms of forces. (3 steps)", "answer": "- Step 1: The graph starts at the origin ($$v = 0$$ at $$t = 0$$) with a steep positive gradient — at release, drag is zero and the resultant force (and hence acceleration) is at its maximum.\n- Step 2: As speed grows, drag $$F_D \\propto v$$ grows, shrinking the resultant force and hence the acceleration. So the gradient of the $$v$$-$$t$$ graph is positive but *decreasing* — the curve bends over.\n- Step 3: The graph asymptotically approaches a horizontal line at $$v = v_t$$ — at terminal velocity, $$W = U + F_D$$, so resultant force = 0, acceleration = 0, gradient = 0. The curve never crosses $$v_t$$; it merely flattens onto it.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "What does the acceleration-time graph look like for a sphere falling to terminal velocity in a viscous fluid? Why?", "answer": "It starts at a maximum value $$a_{\\max} = (W - U)/m$$ at $$t = 0$$ (when drag is zero) and decays smoothly toward zero as $$t \\to \\infty$$. The decay is monotonic, not abrupt. Reason: as the sphere speeds up, drag grows linearly with $$v$$, eating into the resultant force. The acceleration tracks the resultant force, since $$a = F_{\\text{net}}/m$$. At terminal velocity the resultant is zero, so $$a = 0$$. The $$a$$-$$t$$ and $$F_{\\text{net}}$$-$$t$$ graphs have the *same shape* (just rescaled by a factor of $$m$$).", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "What happens to a skydiver's motion the instant the parachute opens? Describe the forces, resultant, and the resulting motion. (3 steps)", "answer": "- Step 1: Just before the chute opens, the diver is at terminal velocity $$v_{t1}$$ with $$W = F_D$$. The chute suddenly multiplies the surface area presented to the air, so drag at that speed jumps enormously — far above the weight.\n- Step 2: The forces are now: weight (unchanged, downward) and a *much larger* drag (upward). Net resultant is large and *upward*. By Newton's Second Law, the diver now has a large *upward* acceleration — but since they're moving downward, this is a *deceleration*: they slow down rapidly.\n- Step 3: As speed drops, drag falls (since $$F_D \\propto v$$ roughly), so the upward resultant shrinks. Eventually drag has fallen enough that $$W = U + F_D$$ again, but at a *lower* speed $$v_{t2}$$. The diver reaches a new, slower terminal velocity. The chute hasn't changed weight — it's changed the drag-vs-speed relationship.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "After the parachute opens and the diver decelerates, can the velocity become negative (i.e. the diver start moving upward)? Why or why not?", "answer": "No — the speed asymptotes onto a lower terminal velocity but never reverses. As the diver slows down, drag (which depends on speed) also falls. At some point drag has fallen enough that it just balances the weight again ($$W = F_D$$), and the resultant force returns to zero. At that moment the deceleration stops and the diver settles into a new, slower terminal velocity. The diver is still moving *downward*, just more slowly. For the velocity to reverse, the upward drag would have to remain larger than weight indefinitely, but drag falls as speed falls, so the system is self-correcting toward equilibrium.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "On a velocity-time graph for a skydiver who opens a parachute, identify the five phases and what each tells you about the resultant force. (5 steps)", "answer": "- Step 1: **Phase 1 (initial fall):** curve rising from origin with decreasing positive gradient. Resultant force is downward but shrinking.\n- Step 2: **Phase 2 (first terminal velocity $$v_{t1}$$):** horizontal line. Resultant force = 0, $$W = F_D$$.\n- Step 3: **Phase 3 (parachute opens):** curve drops steeply (negative gradient). Large *upward* resultant force; rapid deceleration.\n- Step 4: **Phase 4 (slowing):** still negative gradient but becoming gentler as drag falls with speed. Upward resultant force shrinking.\n- Step 5: **Phase 5 (new lower terminal velocity $$v_{t2}$$):** horizontal line at a lower speed than $$v_{t1}$$. Resultant force = 0 again, but at a smaller speed because the larger drag area requires less speed to match the weight.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Why does the falling-ball viscometer (Core Practical 4) time the ball between two marks *below* the liquid surface, rather than from the moment of release? (3 steps)", "answer": "- Step 1: When released at the surface, the ball is moving at $$v = 0$$ and has zero drag, so it's accelerating downward (not yet at terminal velocity). The equation $$\\eta = mg/(6\\pi r v)$$ assumes $$v$$ is the *terminal* velocity — applying it to a still-accelerating ball is invalid.\n- Step 2: The ball needs a short fall distance for drag to build up until $$W = U + F_D$$, after which $$v$$ is constant. Only past this point is the ball moving at true $$v_t$$.\n- Step 3: By placing the starting line a few cm *below* the surface (and the ending line above the bottom to avoid wall/floor effects), timing happens only over the constant-velocity region. Then $$v = s/t$$ is genuinely the terminal velocity, and the viscosity formula works.\n\nTiming from release would mix in the accelerating phase, giving an average speed less than $$v_t$$ — and so an *overestimate* of viscosity.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "In Core Practical 4, what measurements are required, with what instruments, and how do they combine to give viscosity? (3 steps)", "answer": "- Step 1: **Measurements:**\n+ Radius $$r$$ of the ball: micrometer screw gauge (since small absolute errors in $$r$$ matter a lot — $$v_t \\propto r^2$$). Average several readings at different orientations.\n+ Distance $$s$$ between timing lines: metre rule.\n+ Time $$t$$ for ball to fall between lines: stopwatch (or ideally light gates).\n+ Mass $$m$$ of ball: electronic balance.\n+ Densities $$\\rho_s$$ and $$\\rho_f$$ (if upthrust kept in formula).\n- Step 2: **Combine:** compute $$v = s/t$$ (the terminal velocity). \n- Step 3: **Substitute** into the rearranged formula. Simplest form (upthrust neglected): $$\\eta = mg/(6\\pi r v)$$. Full form (upthrust included): $$\\eta = 2r^2 g (\\rho_s - \\rho_f)/(9v)$$.\n\nRepeat for multiple balls or sizes and average; ideally plot $$v_t$$ against $$r^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "In an improved version of Core Practical 4, several ball sizes are used and $$v_t$$ is plotted against $$r^2$$. What does the graph look like, and how do you extract $$\\eta$$? (3 steps)", "answer": "- Step 1: Rearranging $$v_t = \\dfrac{2 r^2 g (\\rho_s - \\rho_f)}{9 \\eta}$$ shows $$v_t$$ is directly proportional to $$r^2$$ — so the graph is a *straight line through the origin* with gradient $$k = \\dfrac{2 g (\\rho_s - \\rho_f)}{9 \\eta}$$.\n- Step 2: Measure the gradient $$k$$ of the best-fit line through the data points.\n- Step 3: Rearrange for viscosity: $$\\eta = \\dfrac{2 g (\\rho_s - \\rho_f)}{9 k}$$.\n\nThis approach is better than a single measurement because the gradient averages out random errors across many data points. Also, a straight line through the origin is *evidence* that flow stayed laminar across all the ball sizes used — curvature at large $$r$$ would warn that big balls had gone too fast and turbulence had set in.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Determine the SI base units of viscosity $$\\eta$$ from Stokes' Law by dimensional analysis. (3 steps)", "answer": "- Step 1: Make $$\\eta$$ the subject of $$F = 6\\pi \\eta r v$$. Since $$6\\pi$$ is dimensionless: $$[\\eta] = \\dfrac{[F]}{[r][v]} = \\dfrac{\\text{N}}{\\text{m} \\cdot \\text{m s}^{-1}} = \\dfrac{\\text{N}}{\\text{m}^2 \\, \\text{s}^{-1}} = \\text{N s m}^{-2}$$.\n- Step 2: Use $$\\text{Pa} = \\text{N m}^{-2}$$ to rewrite: $$\\text{N s m}^{-2} = (\\text{N m}^{-2}) \\cdot \\text{s} = \\text{Pa s}$$.\n- Step 3: Convert to pure base units using $$\\text{N} = \\text{kg m s}^{-2}$$: $$\\text{N s m}^{-2} = (\\text{kg m s}^{-2}) \\cdot \\text{s} \\cdot \\text{m}^{-2} = \\text{kg m}^{-1} \\text{s}^{-1}$$.\n\nSo three equivalent forms: $$\\text{Pa s} = \\text{kg m}^{-1} \\text{s}^{-1} = \\text{N s m}^{-2}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Why is \"N s\" (newton-seconds) *not* a valid unit of viscosity, even though it looks plausible?", "answer": "Because \"N s\" has units of *impulse* (or momentum): $$\\text{N s} = \\text{kg m s}^{-1}$$. Comparing this to the true viscosity units $$\\text{kg m}^{-1} \\text{s}^{-1}$$, \"N s\" is missing a factor of $$\\text{m}^{-2}$$. The trap is that students see \"N\" and \"s\" appearing in Stokes' Law and grab them blindly. The correct approach is to *rearrange* $$\\eta = F/(6\\pi r v)$$ and substitute units carefully — that gives $$\\text{N s m}^{-2}$$, not $$\\text{N s}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Why is \"N m⁻²\" (i.e. pascals) *not* a valid unit of viscosity?", "answer": "Because $$\\text{N m}^{-2} = \\text{Pa}$$ is the unit of *pressure* — it has dimensions of force per area, with no time involved. Viscosity has units $$\\text{Pa s}$$ — pressure multiplied by *time*. So $$\\text{N m}^{-2}$$ is missing the \"s\" factor that comes from the velocity in $$F = 6\\pi \\eta r v$$. Pressure tells you about static stress in a fluid; viscosity tells you about how that stress responds to rates of deformation over time — hence the seconds.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Without computing exact numbers, explain qualitatively how the terminal velocity of a ball bearing in oil would change if (i) you used a denser ball, (ii) you warmed the oil, (iii) you used a smaller ball.", "answer": "Using $$v_t = \\dfrac{2 r^2 g (\\rho_s - \\rho_f)}{9 \\eta}$$:\n- **(i) Denser ball:** $$\\rho_s$$ increases, so $$(\\rho_s - \\rho_f)$$ grows, so $$v_t$$ increases — the ball falls faster. Physically, the heavier ball has more weight to balance, requiring stronger drag, which only happens at higher speed.\n- **(ii) Warmed oil:** liquid viscosity *decreases* with temperature, so $$\\eta$$ falls, so $$v_t$$ *increases*. Less internal friction lets the ball slide through faster before drag catches up with weight.\n- **(iii) Smaller ball:** $$r$$ decreases, and since $$v_t \\propto r^2$$, $$v_t$$ falls *quadratically*. Halving the radius drops $$v_t$$ to a quarter. Small balls fall much slower.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "A floating wooden cube has density 600 kg/m³ in water (1000 kg/m³). Without exact calculation, what fraction sits above the surface, and why?", "answer": "The submerged fraction is $$\\rho_s/\\rho_f = 600/1000 = 0.6$$ (60%), so the fraction *above* the surface is 40%. Reasoning: for floating equilibrium, the wood needs to displace a volume of water whose weight equals its own. Since wood is 60% as dense as water, it needs to push aside a volume of water equal to 60% of its own volume — meaning 60% of itself is submerged, 40% sticks up.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "When timing in Core Practical 4, you place the starting line too close to the surface — what happens to your computed value of $$\\eta$$, and why?", "answer": "Your computed viscosity will be **too high** (overestimate). Reasoning: if the starting line is too close to the surface, the ball is still accelerating when it crosses it (hasn't yet reached terminal velocity). So during the timed section, the ball is moving slower than $$v_t$$ on average. You divide distance by time and get a $$v$$ value lower than the true $$v_t$$. Plugging that smaller $$v$$ into $$\\eta = mg/(6\\pi r v)$$ gives a *larger* $$\\eta$$ than reality. The fix: place the line lower, or check that the time per equal distance interval is constant before officially timing.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "A spring balance reads 4.90 N for a metal block in air and 4.12 N when it's submerged in oil. Without exact computation, conceptually how do you get the oil's density from this and a displaced-volume measurement?", "answer": "- Step 1: The \"apparent weight loss\" $$W_1 - W_2 = 0.78$$ N is the upthrust $$U$$ (Archimedes), since the spring balance reads $$W - U$$ when submerged.\n- Step 2: Measure the displaced volume $$V$$ by reading the rise in oil level in a graduated cylinder.\n- Step 3: From $$U = \\rho_f V g$$, rearrange: $$\\rho_f = U/(Vg)$$. Substitute the numbers and you get the oil's density.\n\nConceptual takeaway: the apparent-weight method turns a force measurement (easy with a spring balance) into a density measurement, with the displaced volume bridging the two.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "A balloon of mass 25 g and volume 0.030 m³ is held under water and released. Qualitatively, what happens, and what determines the initial acceleration?", "answer": "The balloon rockets upward. The upthrust $$U = \\rho_f V g \\approx 1000 \\times 0.030 \\times 9.81 \\approx 294$$ N is *enormous* compared to the tiny weight $$W = 0.025 \\times 9.81 \\approx 0.25$$ N. So the net force is roughly 294 N *upward*. The initial acceleration is $$a = F_{\\text{net}}/m \\approx 294/0.025 \\approx 1.2 \\times 10^4$$ m/s² — over 1000 g, momentarily. Realistically, drag and turbulence would quickly cap the speed, but conceptually it illustrates how dramatically buoyancy can dominate weight when the density difference is huge.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Explain why a spread-out skydiver (star shape) has a *lower* terminal velocity than a head-first one, even before any parachute deploys. (2 steps)", "answer": "- Step 1: Spreading out increases the cross-sectional area presented to the airflow. This means more air molecules collide with the diver per second, transferring more momentum and producing a larger drag force at *any given speed*.\n- Step 2: Terminal velocity is set by drag = weight. Weight hasn't changed, but drag-per-unit-speed is larger. So balance is reached at a *lower* speed. The drag-versus-speed curve is steeper for the spread shape, intersecting the (horizontal) weight line earlier.\n\nThis is the same principle the parachute exploits, just less extreme.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "At terminal velocity, how can you cross-check whether your computed value of $$v_t$$ is correct using the force balance?", "answer": "Compute the drag from Stokes' Law at $$v_t$$: $$F_D = 6\\pi \\eta r v_t$$. Then independently compute $$W - U = (\\rho_s - \\rho_f) V g$$ using the densities and volume. The two should be equal — if they aren't, there's an arithmetic error somewhere. This consistency check (\"does $$6\\pi \\eta r v_t = W - U$$?\") is the fastest way to catch mistakes in $$v_t$$ derivations, and exactly the kind of cross-check examiners value.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Why is upthrust often (but not always) negligible for an object falling through *air*, but never negligible for one falling through *oil*?", "answer": "Upthrust scales with the fluid's density: $$U = \\rho_f V g$$. For a falling object in air, $$\\rho_{\\text{air}} \\approx 1.2$$ kg/m³ vs typical object density (steel 7800, plastic 1000), so $$U/W = \\rho_f/\\rho_s$$ is around $$10^{-4}$$ to $$10^{-3}$$ — completely negligible. For oil, $$\\rho_{\\text{oil}} \\approx 900$$ kg/m³ vs steel 7800, so $$U/W \\approx 0.11$$ — over 10%. Ignoring upthrust in oil inflates the computed $$v_t$$ by roughly that fraction. Rule of thumb: include upthrust whenever the fluid is a liquid; only consider neglecting it when the fluid is a gas and the object is solid.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "A floating hydrometer (weighted stem) rides higher in salt water than in fresh water. Explain why in terms of the floating-rod relation. (2 steps)", "answer": "- Step 1: The hydrometer's mass is fixed, so the *submerged volume* in each fluid must satisfy $$m = \\rho_f V_{\\text{sub}}$$ (since $$W = U$$ at floating equilibrium). The required submerged volume is $$V_{\\text{sub}} = m/\\rho_f$$.\n- Step 2: Salt water has higher $$\\rho_f$$, so the required $$V_{\\text{sub}}$$ is *smaller* — less of the hydrometer needs to be under water to provide enough upthrust. The instrument rides higher, exposing more of the stem above the surface. This is precisely how the device measures density: the higher it floats, the denser the fluid.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "When applying $$\\eta = mg/(6\\pi r v)$$ vs the full $$\\eta = 2r^2 g(\\rho_s - \\rho_f)/(9v)$$, when is the simplification safe and when does it introduce error?", "answer": "The simplified form ignores upthrust, treating the balance as just $$W = F_D$$ instead of $$W = U + F_D$$. This is safe only when upthrust is much smaller than weight — i.e. when the sphere's density is *much* greater than the fluid's. For example, a steel ball ($$\\rho_s = 7800$$) falling in air ($$\\rho_f = 1.2$$) — upthrust is negligible. But for the same steel ball in oil ($$\\rho_f = 900$$), upthrust is around 12% of weight, so ignoring it introduces a ~12% overestimate of $$\\eta$$. Always include upthrust when fluid density is non-trivial compared to sphere density.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "A common reading error in vernier calipers is to mistake the *vernier scale* for the *main scale*. What is the correct method, and what's the rule for combining with the vernier? (3 steps)", "answer": "- Step 1: First read the **main (fixed) scale** at the mark *immediately to the left of* the vernier zero. This gives the whole-and-first-decimal part (e.g. 1.3 cm).\n- Step 2: Find the *one* vernier (sliding) scale line that lines up exactly with a main-scale line. The number of that vernier line gives the next decimal place (e.g. line 3 → 0.03 cm).\n- Step 3: Add: 1.3 + 0.03 = 1.33 cm. Then correct for zero error using $$\\text{actual} = \\text{observed} - \\text{zero error}$$ (subtracting a positive error, adding a negative one).\n\nThe mistake to avoid: reading the integer part from the vernier instead of the main scale — that gives nonsense values.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "A micrometer has a zero error of $$-0.03$$ mm (it reads $$-0.03$$ mm when fully closed). An object measurement gives an observed reading of 4.62 mm. What is the true diameter, and what general rule applies?", "answer": "True reading = observed − zero error = $$4.62 - (-0.03) = 4.65$$ mm. The general rule: $$\\text{actual} = \\text{observed} - \\text{zero error}$$. A *negative* zero error means the instrument under-reads, so the true value is *larger* than observed — you effectively add. A *positive* zero error means the instrument over-reads, so you subtract. The trap: students sometimes \"always subtract\" the magnitude, ignoring sign. Treat the zero error as a signed quantity.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Two identical-radius balls fall in the same oil. One is twice as dense as the other. Without computing exact numbers, qualitatively compare their $$v$$-$$t$$ graphs.", "answer": "Both curves start at the origin and asymptote onto horizontal lines (terminal velocities). The denser ball has a larger $$(\\rho_s - \\rho_f)$$, so:\n- Its initial gradient (acceleration) is steeper, since the net downward force $$W - U$$ is bigger.\n- Its plateau is higher — because $$v_t \\propto (\\rho_s - \\rho_f)$$, the denser ball reaches a higher terminal velocity.\n- The time to \"essentially reach\" terminal velocity depends on details (both how fast drag grows and how much it has to grow), but the higher curve sits entirely above the lower one throughout the asymptotic approach.\n\nQualitatively: same shape, denser ball's curve is steeper and higher.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "What is \"neutral buoyancy\" and what's the precise density condition for it? Give an example.", "answer": "Neutral buoyancy is the state where a fully submerged object neither rises nor sinks — it hovers at any depth. The condition is $$\\rho_s = \\rho_f$$, i.e. the object's density exactly equals the fluid's density. Then when fully submerged, $$W = \\rho_s V g = \\rho_f V g = U$$, and the resultant force is zero everywhere. A fish controls its buoyancy by adjusting the volume (and hence density) of its swim bladder to match water density precisely — that's how it can stay at any depth without constantly swimming. Submarines do the same by flooding/emptying ballast tanks.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "State the floating condition $$W = U$$ in your own words, and explain why a fully loaded cargo ship still floats while a small dense pebble sinks.", "answer": "A floating object adjusts its submerged depth until the weight of fluid it displaces *exactly equals its own weight*. So a cargo ship — though enormously heavy — has a hull shape that displaces a vast amount of water (the steel is hollow, mostly air-filled). The *average* density of the ship-plus-air-inside is less than water's. A pebble, although tiny, has *all its mass packed densely into solid rock* — its density exceeds water's, so even when fully submerged it cannot displace enough water to match its weight, and it sinks. Density (effective average density, including any air pockets) is the deciding factor, not raw mass.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "When an object reaches terminal velocity in a fluid, what is the drag force *equal to* in terms of weight and upthrust? Use this to find the drag on a steel ball at terminal velocity without applying Stokes' Law directly.", "answer": "At terminal velocity, $$W = U + F_D$$, so $$F_D = W - U$$. This means you can find the drag at $$v_t$$ by computing weight minus upthrust *without* needing the Stokes formula. For example, if a sphere has volume $$V = 4 \\times 10^{-9}$$ m³, density 7800 kg/m³ in oil of density 880 kg/m³: weight $$\\approx 3.1 \\times 10^{-4}$$ N, upthrust $$\\approx 3.5 \\times 10^{-5}$$ N, so $$F_D \\approx 2.8 \\times 10^{-4}$$ N at $$v_t$$. As a bonus, this can cross-check your computed $$v_t$$: it should also equal $$6\\pi \\eta r v_t$$ from Stokes. If the two agree, your $$v_t$$ is correct.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "Explain why $$V_{\\text{sub}}/V_{\\text{tot}} = \\rho_s/\\rho_f$$ for a floating object, and what happens to this ratio as the fluid becomes denser. (2 steps)", "answer": "- Step 1: For floating equilibrium, $$W = U$$, i.e. $$\\rho_s V_{\\text{tot}} g = \\rho_f V_{\\text{sub}} g$$. Cancelling $$g$$ and rearranging gives $$V_{\\text{sub}}/V_{\\text{tot}} = \\rho_s/\\rho_f$$.\n- Step 2: As the fluid becomes denser ($$\\rho_f$$ increases), the ratio *decreases* — meaning less of the object sits submerged. Physically: a denser fluid requires only a small submerged volume to displace a fluid-weight matching the object's weight, so the object rides higher. This is why you float more easily in the salty Dead Sea than in fresh water.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "In what way does the dependence of drag on velocity ($$F \\propto v$$ in Stokes' regime) *guarantee* the existence of a stable terminal velocity? What if drag were a constant force instead?", "answer": "Because Stokes drag *grows with speed*, there's exactly one speed at which it has grown enough to cancel the net weight. Below it, drag is too small and the object accelerates *toward* it; above it, drag is too large and the object would decelerate *back toward* it. So $$v_t$$ is a stable attractor — small perturbations correct themselves. If drag were a constant force (independent of speed), then either weight exceeds drag (object accelerates forever) or drag exceeds weight (object decelerates to a stop or never starts). There would be no stable balance at any non-trivial speed. The speed-dependence of drag is exactly what makes $$v_t$$ a robust equilibrium.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "A ball-bearing falling through oil has terminal velocity 0.018 m/s. Now suppose the speed is somehow held (by an external force) at half this value. What is the drag, and is the ball in equilibrium?", "answer": "Stokes drag is $$F_D = 6\\pi \\eta r v$$, proportional to $$v$$. At half the terminal speed, drag is exactly *half* its terminal-velocity value. So $$F_D$$ now is smaller than $$W - U$$ (which is what it had to be at terminal velocity). The ball is **not** in equilibrium — there is a net downward force (since drag and upthrust together don't fully balance weight), and it would *want* to accelerate downward to recover $$v_t$$. The external force restraining it must be providing the missing upward force. This illustrates how the terminal velocity is a unique balance point.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "Why does $$U = \\rho_f V g$$ apply to the *submerged* volume only, even for an object that is partly above the fluid surface?", "answer": "Only the part of the object *below* the fluid surface displaces fluid — the part above sits in air (or vacuum), which can't be displaced in any meaningful sense. The pressure-difference derivation makes this clear: the upward push on the bottom face is large (it sits at depth), but there's no compensating downward push from fluid above the top of the submerged section, because the surface is right there. So $$V$$ in $$U = \\rho_f V g$$ refers to the *displaced* volume of fluid, which equals the *submerged* portion of the object — not the total object volume — when the object is partially out of the fluid.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "State the precise force-balance equation at terminal velocity and contrast it with the situation just after release. (2 steps)", "answer": "- Step 1: **At terminal velocity:** $$W = U + F_D$$, where $$F_D = 6\\pi \\eta r v_t$$. Net force = 0, so $$a = 0$$ and speed is constant at $$v_t$$.\n- Step 2: **Just after release ($$v = 0$$):** drag is zero, so the equation reduces to $$F_{\\text{net}} = W - U$$ (downward). This gives the initial (maximum) acceleration $$a_0 = (W - U)/m = (\\rho_s - \\rho_f)g/\\rho_s$$. The motion is fully unbalanced; only after speed builds up does drag come into play, gradually reducing the net force toward zero.\n\nThe same force-balance framework describes both situations — they're just different points on the path from \"released\" to \"terminal.\"", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "Suppose you halve the radius of a sphere falling in a fluid (keeping all other quantities the same). Without computing exactly, what happens to the time it takes to reach (approximately) terminal velocity, and to the value of that terminal velocity itself?", "answer": "The terminal velocity drops by a factor of 4 (since $$v_t \\propto r^2$$, and $$(1/2)^2 = 1/4$$). The time to \"essentially reach\" terminal velocity is a more subtle question — but conceptually, a smaller ball has less mass and less drag both, scaling differently. The characteristic timescale to approach $$v_t$$ is roughly $$\\tau \\sim m/(6\\pi \\eta r) \\propto r^3/r = r^2$$. So halving $$r$$ quarters the time-constant — smaller spheres reach their (much lower) terminal velocities much *faster*. This is why fine dust settles slowly but reaches its tiny terminal velocity almost immediately, while a hailstone takes longer to plateau at its much higher one.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "Why does increasing the surface area of a falling object (e.g., opening a parachute) cause it to slow down? Tie your explanation to the precise drag-speed relationship.", "answer": "Increasing surface area dramatically increases the drag force at any given speed. Just before the chute opens, the diver is at terminal velocity $$v_{t1}$$ with drag balancing weight. The instant the chute opens at that same speed, drag jumps far above weight — so net force is now upward (toward the diver, since they're moving downward). By Newton's Second Law, the diver decelerates rapidly. As speed falls, drag falls too (since drag depends on speed). The diver settles into a new equilibrium where the *larger drag area* matches weight at a *smaller speed* — a new, lower terminal velocity $$v_{t2}$$. The parachute didn't change weight; it shifted the entire drag-vs-speed relationship upward, moving the equilibrium point.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": false}], "count": 62}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Why does a submerged object experience a net upward force from the surrounding fluid, even though pressure pushes inward on all faces? (3 steps)", "answer": "- Step 1: Fluid pressure at a point depends on depth, $$P = \\rho_f g h$$. Horizontal pushes on opposite vertical faces sit at the same depth, so they cancel exactly.\n- Step 2: The top face of the object sits at a smaller depth $$h_1$$ than the bottom face at $$h_2 = h_1 + L$$. So the upward push on the bottom, $$P_2 A$$, is larger than the downward push on the top, $$P_1 A$$.\n- Step 3: The net (vertical) force is upward and equals $$(P_2 - P_1)A = \\rho_f g L A = \\rho_f g V$$, exactly the weight of fluid displaced. The horizontal cancellation plus the vertical mismatch *is* upthrust.\n\nThe asymmetry of pressure-with-depth is the entire origin of buoyancy.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "State Archimedes' Principle in one sentence, and give the formula for upthrust on a submerged body.", "answer": "Archimedes' Principle states that the upthrust on a body partially or fully immersed in a fluid equals the weight of the fluid that the body displaces. In symbols, $$U = \\rho_f V g$$, where $$\\rho_f$$ is the fluid density, $$V$$ is the submerged (displaced) volume, and $$g$$ is gravitational field strength. The key feature is that *both* density and volume in this formula refer to the displaced fluid, never to the object itself — even though the body in question is the object.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Why does upthrust on a fully submerged object not depend on how deep it is held? (3 steps)", "answer": "- Step 1: Push the object deeper by $$\\Delta h$$. The pressure on its top face rises by $$\\rho_f g \\Delta h$$, and the pressure on its bottom face also rises by exactly $$\\rho_f g \\Delta h$$.\n- Step 2: The *difference* between the bottom and top pressures, which is what produces upthrust, is unchanged.\n- Step 3: Equivalently, $$U = \\rho_f V g$$ contains no depth variable. Buoyancy is set entirely by the volume of fluid displaced, not by how far below the surface that volume sits.\n\nThis assumes uniform fluid density, which is excellent for liquids but breaks down for gases over large altitude ranges.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "In the upthrust formula $$U = \\rho_f V g$$, whose density is $$\\rho_f$$ and which volume is $$V$$?", "answer": "$$\\rho_f$$ is always the density of the surrounding *fluid*, never the object. $$V$$ is the *submerged* volume — the volume of fluid the object has pushed aside. For a fully submerged body, $$V$$ equals the object's total volume; for a floating body, $$V$$ is only the part below the waterline. A common slip is to substitute the object's density (because that is \"what the question is about\"), but upthrust is a property of the fluid being displaced, so it must use the fluid's density.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "A sealed sphere has average density $$\\rho_s$$ and is placed in a fluid of density $$\\rho_f$$. Explain qualitatively whether it floats, sinks, or hovers in each case. (3 steps)", "answer": "- Step 1: Compare the weight $$W = \\rho_s V g$$ with the maximum possible upthrust $$U_{\\max} = \\rho_f V g$$ (achieved when fully submerged).\n- Step 2: Three cases arise:\n+ If $$\\rho_s > \\rho_f$$, then $$W > U_{\\max}$$ even when fully under, so the sphere sinks.\n+ If $$\\rho_s < \\rho_f$$, then $$W < U_{\\max}$$. The sphere rises until enough of it pokes above the surface that the submerged volume gives an upthrust equal to $$W$$ — it floats partly out.\n+ If $$\\rho_s = \\rho_f$$, then $$W = U_{\\max}$$ exactly. The sphere hovers at any depth (neutral buoyancy).\n- Step 3: The criterion is always a density comparison, not a weight or volume comparison directly.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Derive the fraction of a floating object that is submerged in terms of densities. (3 steps)", "answer": "- Step 1: Floating equilibrium requires $$W = U$$, giving $$\\rho_s V_{\\text{tot}} g = \\rho_f V_{\\text{sub}} g$$.\n- Step 2: Cancel $$g$$ and rearrange: $$\\dfrac{V_{\\text{sub}}}{V_{\\text{tot}}} = \\dfrac{\\rho_s}{\\rho_f}$$.\n- Step 3: So an iceberg (ice density $$\\sim 920$$, seawater $$\\sim 1025\\,\\text{kg m}^{-3}$$) has about $$920/1025 \\approx 0.90$$ of its volume submerged — the famous \"tip of the iceberg.\" The closer $$\\rho_s$$ is to $$\\rho_f$$, the more is hidden underwater.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "A vertical cylindrical rod of mass $$m$$ and cross-section $$A$$ floats to depth $$\\Delta h$$ in fluid of density $$\\rho_f$$. Derive the relation between these quantities. (4 steps)", "answer": "- Step 1: Equilibrium: $$W = U$$.\n- Step 2: Substitute the force formulas: $$mg = \\rho_f V g$$, where $$V$$ is the submerged volume.\n- Step 3: For a vertical cylinder, submerged volume is $$V = A \\, \\Delta h$$, so $$mg = \\rho_f A \\, \\Delta h \\, g$$.\n- Step 4: Cancel $$g$$: $$m = \\rho_f A \\, \\Delta h$$. This relation lets you reason about how floating depth responds to changes in any one of $$m, A, \\rho_f$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "A rod floats in equilibrium in a liquid. Holding the others fixed, predict qualitatively the effect on submerged depth $$\\Delta h$$ of: (a) increasing rod mass, (b) increasing rod diameter, (c) decreasing liquid density. (3 steps)", "answer": "- Step 1: Rearrange the floating-rod relation: $$\\Delta h = \\dfrac{m}{\\rho_f A}$$.\n- Step 2: Read off each sensitivity:\n+ (a) Larger $$m$$ with $$\\rho_f, A$$ fixed → larger $$\\Delta h$$, so it floats *deeper*. More weight needs more displaced fluid.\n+ (b) Larger $$A$$ with $$m, \\rho_f$$ fixed → smaller $$\\Delta h$$, so it floats *higher*. A wider body needs less depth to displace the same fluid mass.\n+ (c) Smaller $$\\rho_f$$ with $$m, A$$ fixed → larger $$\\Delta h$$, so it floats *deeper*. Thinner fluid must be displaced in greater volume.\n- Step 3: The key discipline is to change only one variable at a time; conflating two (e.g. letting mass vary with diameter) produces wrong predictions.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "Explain the principle behind the apparent-weight method for finding upthrust, and what is measured. (3 steps)", "answer": "- Step 1: Hang the object from a spring balance in air; it reads its true weight $$W_1 = mg$$.\n- Step 2: Lower it fully into the fluid. Now the fluid pushes up with upthrust $$U$$, so the balance reads $$W_2 = W_1 - U$$.\n- Step 3: Rearranging, $$U = W_1 - W_2$$. The \"apparent loss of weight\" is exactly the upthrust — equal to the weight of the displaced fluid. Combined with a measurement of displaced volume (from change in fluid level), this gives the fluid density via $$\\rho_f = U/(Vg)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Contrast the direct (\"eureka can\") method and the apparent-weight method for finding a fluid's density. When would you choose each?", "answer": "The direct method uses a displacement can to collect the displaced fluid, then weighs it and measures its volume in a cylinder, giving $$\\rho = m/V$$ — no force readings needed. The apparent-weight method weighs an object in air ($$W_1$$) and submerged ($$W_2$$), computes upthrust $$U = W_1 - W_2$$, measures the displaced volume from the level change, and gets $$\\rho_f = U/(Vg)$$. Choose direct when you can cleanly capture the displaced fluid. Choose apparent-weight when you cannot pour or melt the object — e.g. when measuring the density of a liquid by submerging a known solid in it.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Define viscosity conceptually, and state its SI unit in three equivalent forms.", "answer": "Viscosity $$\\eta$$ is a fluid's internal friction — a measure of its resistance to flow, arising from tangential (shear) forces between fluid layers moving at different speeds. High viscosity means the fluid resists flow (honey, custard); low viscosity means it flows easily (water, air). The SI unit is the pascal-second, expressible as $$\\text{Pa s} = \\text{kg m}^{-1}\\text{s}^{-1} = \\text{N s m}^{-2}$$. All three are dimensionally identical and all are correct.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Why does heating a liquid *decrease* its viscosity but heating a gas *increase* its viscosity? (3 steps)", "answer": "- Step 1: In a liquid, molecules are close together and held by intermolecular attractions. These attractions are what produce the internal friction. Heating gives molecules more kinetic energy, so they overcome the attractions more easily and slip past one another — internal friction (and so $$\\eta$$) falls.\n- Step 2: In a gas, molecules are far apart and barely attract one another. Viscosity instead arises because molecules diffuse between layers, carrying momentum across the boundary. Heating makes them move faster, so they cross more often and transport more momentum per second — the layers \"grip\" each other harder and $$\\eta$$ rises.\n- Step 3: The two opposite trends come from completely different microscopic mechanisms: cohesion in liquids versus momentum-transport in gases.\n\nThe same temperature change pushes the two states in opposite directions — an unusual feature worth quoting if asked to explain.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "State Stokes' Law and list the conditions under which it applies. (2 steps)", "answer": "- Step 1: Stokes' Law gives the viscous drag on a small sphere moving slowly through a fluid: $$F = 6\\pi \\eta r v$$, where $$r$$ is the sphere's radius, $$v$$ is its speed relative to the fluid, and $$\\eta$$ is the fluid's viscosity.\n- Step 2: The conditions are:\n+ The object is a small, smooth *sphere*.\n+ It moves at *low speed* (so inertial effects don't dominate).\n+ The flow around it is *laminar* — smooth parallel layers, no turbulent eddies.\n+ No wall effects: the container must be much wider than the sphere.\n\nIf any condition fails (large/rough/non-spherical object, high speed, or turbulent flow), $$F = 6\\pi\\eta r v$$ no longer applies.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Why is the linear dependence of Stokes drag on speed ($$F \\propto v$$) what *guarantees* that a falling sphere reaches a terminal velocity? (3 steps)", "answer": "- Step 1: At rest, drag is zero, so the net force on the sphere is large and downward. It accelerates.\n- Step 2: As it speeds up, drag grows in *direct* proportion to $$v$$. The net downward force shrinks, so acceleration decreases — but the sphere still speeds up.\n- Step 3: There is exactly one speed at which drag has grown just enough to cancel weight (minus upthrust). At that speed, resultant is zero and acceleration is zero. Crucially, if the sphere overshot, the resultant would point backward and slow it down, so it asymptotically settles at $$v_t$$.\n\nIf drag were constant (independent of speed), there would be no way for the force balance to \"find\" itself — the sphere would either always accelerate or always decelerate. A speed-dependent drag is what makes terminal velocity possible.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Compare laminar and turbulent flow, and explain what happens to Stokes' Law in each regime.", "answer": "In laminar flow, fluid slides past the object in smooth, parallel layers that close up cleanly behind it; drag is purely viscous and rises in *direct* proportion to speed — this is the regime where $$F = 6\\pi\\eta r v$$ holds. In turbulent flow, the layers break into chaotic, swirling eddies, the wake becomes disordered, and drag rises roughly with the *square* of speed — a completely different law. The transition is driven by speed and size: small/slow objects stay laminar, large/fast ones go turbulent. Stokes' Law is valid only in the laminar regime, which is why \"low speed\" and \"small sphere\" are essential conditions.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "What is the Reynolds number, and why is it useful for deciding when Stokes' Law applies? (3 steps)", "answer": "- Step 1: The Reynolds number is a dimensionless ratio comparing inertial forces to viscous forces in a flow: $$Re = \\dfrac{\\rho_f v L}{\\eta}$$, where $$L$$ is a characteristic length (for a sphere, the diameter $$2r$$).\n- Step 2: When $$Re \\lesssim 1$$, viscous forces dominate, the flow stays laminar, and Stokes' Law applies. When $$Re \\gtrsim 1000$$, inertial effects dominate, the flow is turbulent, and Stokes' Law fails.\n- Step 3: This makes the \"small, slow, laminar\" condition quantitative: it really means \"$$Re$$ is small.\" A textbook raindrop at $$2\\,\\text{m s}^{-1}$$ has $$Re \\sim 100$$, so Stokes' Law doesn't really apply to it — exam questions that ask you to use Stokes anyway are deliberate idealisations.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Set up and write down the force balance for a sphere falling at terminal velocity through a viscous fluid, identifying each term.", "answer": "At terminal velocity, the resultant force is zero, so the downward and upward forces balance: $$W = U + F_D$$. Here $$W = \\rho_s V g$$ is the weight of the sphere (downward, using *sphere* density), $$U = \\rho_f V g$$ is the upthrust (upward, using *fluid* density), and $$F_D = 6\\pi\\eta r v_t$$ is the viscous drag (upward, opposing motion). This is the master equation from which the terminal velocity formula is derived — and the equation an examiner expects you to write down before any algebra.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Derive the terminal velocity of a sphere in a viscous fluid from the force balance. (5 steps)", "answer": "- Step 1: Force balance at $$v_t$$: $$W = U + F_D$$.\n- Step 2: Substitute the three forces with sphere volume $$V = \\tfrac{4}{3}\\pi r^3$$: $$\\rho_s \\tfrac{4}{3}\\pi r^3 g = \\rho_f \\tfrac{4}{3}\\pi r^3 g + 6\\pi \\eta r v_t$$.\n- Step 3: Collect the drag term: $$6\\pi \\eta r v_t = \\tfrac{4}{3}\\pi r^3 g (\\rho_s - \\rho_f)$$.\n- Step 4
