n object falling through *air*, but never negligible for one falling through *oil*?", "answer": "Upthrust scales with the fluid's density: $$U = \\rho_f V g$$. For a falling object in air, $$\\rho_{\\text{air}} \\approx 1.2$$ kg/m³ vs typical object density (steel 7800, plastic 1000), so $$U/W = \\rho_f/\\rho_s$$ is around $$10^{-4}$$ to $$10^{-3}$$ — completely negligible. For oil, $$\\rho_{\\text{oil}} \\approx 900$$ kg/m³ vs steel 7800, so $$U/W \\approx 0.11$$ — over 10%. Ignoring upthrust in oil inflates the computed $$v_t$$ by roughly that fraction. Rule of thumb: include upthrust whenever the fluid is a liquid; only consider neglecting it when the fluid is a gas and the object is solid.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "A cork (density $$240\\,\\text{kg m}^{-3}$$) is held fully underwater and released. At the instant of release, is the resultant force up or down? Qualitatively, how does the initial acceleration compare to $$g$$? (2 steps)", "answer": "- Step 1: The upthrust on the fully submerged cork is $$U = \\rho_f V g = 1000 \\times V \\times g$$. The weight is $$W = \\rho_s V g = 240 \\times V \\times g$$. Since $$\\rho_f > \\rho_s$$, upthrust exceeds weight, and the resultant is **upward**: $$F_{\\text{net}} = U - W = (1000 - 240)Vg = 760Vg$$ upward.\n- Step 2: The mass is $$m = 240V$$, so the initial acceleration is $$a = F_{\\text{net}}/m = 760Vg / (240V) = (760/240)g \\approx 3.2g$$ upward. The cork accelerates upward at over three times gravitational acceleration — it shoots up rapidly. This makes sense: the buoyant force is over four times the cork's weight.", "source": "GLM 5.1 ①", "_id": "glm_1_49"}, {"question": "Why is using a sphere's *diameter* in place of its *radius* in the Stokes formula a particularly costly error in terminal-velocity calculations? (3 steps)", "answer": "- Step 1: $$v_t \\propto r^2$$. Substituting the diameter $$d = 2r$$ gives an answer in $$d^2 = 4r^2$$, four times too large.\n- Step 2: This is the worst type of error: the units come out right, the formula is recognisable, and the number looks plausible. There is no dimensional check to catch it.\n- Step 3: The remedy is to always write \"radius = diameter / 2\" as an explicit first step on the working, and to keep $$r$$ in metres (not mm). Sphere volume formulas $$V = \\tfrac{4}{3}\\pi r^3$$ have the same trap, with an even worse factor of 8.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "Looking only at units, how can you quickly check whether a candidate formula for terminal velocity makes sense? (3 steps)", "answer": "- Step 1: Velocity has units $$\\text{m s}^{-1}$$. Check that the proposed formula's units reduce to this.\n- Step 2: For $$v_t = \\dfrac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$, work the numerator first: $$[r^2]\\,[g]\\,[\\rho] = \\text{m}^2 \\cdot \\text{m s}^{-2} \\cdot \\text{kg m}^{-3} = \\text{kg m}^{2+1-3}\\,\\text{s}^{-2} = \\text{kg s}^{-2}$$ (the numerical factors $$2$$ and $$9$$ are dimensionless and drop out).\n- Step 3: Denominator units: $$\\eta$$ has units $$\\text{kg m}^{-1}\\text{s}^{-1}$$. Dividing: $$\\dfrac{\\text{kg s}^{-2}}{\\text{kg m}^{-1}\\text{s}^{-1}} = \\text{m s}^{-1}$$ ✓. The formula is dimensionally consistent — a strong sanity check. If you derive a formula and the units don't reduce to m/s, you've made an algebra error.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "A rod floats in a liquid. Its diameter is increased while its mass and the fluid are kept the same. Does it float higher or lower, and why might a student mistakenly say \"deeper\"? (3 steps)", "answer": "- Step 1: From $$\\Delta h = m / (\\rho_f A)$$, with $$m$$ and $$\\rho_f$$ fixed and $$A$$ increased (larger diameter), the submerged depth $$\\Delta h$$ **decreases** — the rod floats higher.\n- Step 2: The physical reasoning: a wider rod displaces more fluid per unit of depth, so it needs less depth to displace the same weight of fluid. The same mass is supported by a shorter, wider column of displaced liquid.\n- Step 3: The mistake occurs when a student lets *two* variables change simultaneously — they imagine a larger diameter rod must also have more mass, and then conclude \"more mass → deeper.\" The fix: change *one* variable at a time. Here, mass is explicitly held constant; only the diameter changes.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "Describe the \"apparent weight\" method for finding a fluid's density, and write the formula. (3 steps)", "answer": "- Step 1: Weigh an object in air (reading W₁), then weigh it fully submerged in the fluid (reading W₂). The apparent loss of weight equals the upthrust: U = W₁ - W₂\n- Step 2: Measure the displaced volume V (from the rise in fluid level when the object is submerged)\n- Step 3: Since U = ρ_f V g, rearrange to find fluid density: ρ_f = U/(Vg) = (W₁ - W₂)/(Vg)\n\nThis is the \"complicated\" method Alex contrasted with the simple direct method (collect displaced fluid and measure its mass and volume).", "source": "MiniMax ②", "_id": "minimax_2_5"}, {"question": "A rod floats in equilibrium in a liquid. Holding the others fixed, predict qualitatively the effect on submerged depth $$\\Delta h$$ of: (a) increasing rod mass, (b) increasing rod diameter, (c) decreasing liquid density. (3 steps)", "answer": "- Step 1: Rearrange the floating-rod relation: $$\\Delta h = \\dfrac{m}{\\rho_f A}$$.\n- Step 2: Read off each sensitivity:\n+ (a) Larger $$m$$ with $$\\rho_f, A$$ fixed → larger $$\\Delta h$$, so it floats *deeper*. More weight needs more displaced fluid.\n+ (b) Larger $$A$$ with $$m, \\rho_f$$ fixed → smaller $$\\Delta h$$, so it floats *higher*. A wider body needs less depth to displace the same fluid mass.\n+ (c) Smaller $$\\rho_f$$ with $$m, A$$ fixed → larger $$\\Delta h$$, so it floats *deeper*. Thinner fluid must be displaced in greater volume.\n- Step 3: The key discipline is to change only one variable at a time; conflating two (e.g. letting mass vary with diameter) produces wrong predictions.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Archimedes' Principle says \"upthrust equals the weight of fluid displaced.\" A second way to understand this is the \"replace-with-fluid\" thought experiment. Describe this argument and explain why the surrounding fluid \"cannot tell the difference.\" (3 steps)", "answer": "- Step 1: Imagine scooping out the submerged part of the object and replacing it with a blob of fluid that has exactly the same shape and volume. This fluid-blob is just part of the surrounding fluid, sitting in equilibrium.\n- Step 2: Since the fluid-blob is in equilibrium, the surrounding fluid must be pushing it up with a force equal to its own weight: $$U = \\rho_f V g$$. Nothing else is holding it up — it is just sitting there, supported by pressure.\n- Step 3: The surrounding fluid cannot tell the difference between the original object and the fluid-blob replacement — the shape and position are the same, so the pressure distribution is the same. Therefore the surrounding fluid pushes up on the real object with exactly the same upthrust $$U = \\rho_f V g$$. This elegant argument proves Archimedes' Principle without any algebra.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "Explain why a parachute allows a skydiver to fall at a much slower terminal velocity, even though the skydiver's weight hasn't changed. (2 steps)", "answer": "- Step 1: Terminal velocity occurs when weight equals drag (ignoring the negligible upthrust in air): $W = F_D$. The drag force for a body moving through air at moderate speeds is given by $F_D \\propto A v$ (Stokes) or more generally $F_D \\propto A v^2$ at higher speeds, where $A$ is the cross-sectional area.\n- Step 2: When the parachute opens, the surface area $A$ increases dramatically (from around $0.5\\,\\text{m}^2$ in a dive position to $20\\text{--}30\\,\\text{m}^2$ for an open parachute). For a given speed, the drag force is now much larger. The new terminal velocity is reached when this larger drag equals the same weight $W$: $$v_{t,\\text{new}} = \\frac{W}{k A_{\\text{new}}}$$ Since $A_{\\text{new}} \\gg A_{\\text{old}}$, the new $v_t$ is much lower. The physics is straightforward: same driving force (weight), much greater opposing force (drag) at any given speed, so the equilibrium speed is lower.", "source": "MiniMax ①", "_id": "minimax_1_31"}, {"question": "A raindrop of radius $$0.5\\,\\text{mm}$$ falls at $$2\\,\\text{m s}^{-1}$$ in air. An exam question tells you to use Stokes' Law to find its weight. Should you use it? What concern might a physicist raise, and what number quantifies this concern? (2 steps)", "answer": "- Step 1: You should use it *as the question instructs* — exam questions are deliberate idealisations. The answer would be $$W = F_D = 6\\pi\\eta r v$$.\n- Step 2: A physicist's concern: the **Reynolds number** $$Re = \\rho_f v L / \\eta$$ (where $$L = 2r$$) quantifies whether flow is laminar. For this raindrop: $$Re = (1.2)(2.0)(1.0 \\times 10^{-3}) / (1.8 \\times 10^{-5}) \\approx 130$$. Since $$Re \\gg 1$$, the flow is turbulent and Stokes' Law does *not* physically apply. The \"low speed\" and \"laminar flow\" conditions are violated. This is a good reminder that the Stokes' conditions do real physical work — they're not just fine print.", "source": "GLM 5.1 ①", "_id": "glm_1_52"}, {"question": "Why does upthrust on a fully submerged object not depend on how deep it is held? (3 steps)", "answer": "- Step 1: Push the object deeper by $$\\Delta h$$. The pressure on its top face rises by $$\\rho_f g \\Delta h$$, and the pressure on its bottom face also rises by exactly $$\\rho_f g \\Delta h$$.\n- Step 2: The *difference* between the bottom and top pressures, which is what produces upthrust, is unchanged.\n- Step 3: Equivalently, $$U = \\rho_f V g$$ contains no depth variable. Buoyancy is set entirely by the volume of fluid displaced, not by how far below the surface that volume sits.\n\nThis assumes uniform fluid density, which is excellent for liquids but breaks down for gases over large altitude ranges.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A vernier caliper has a main scale and a sliding vernier scale. Describe the two-step procedure to read it, and explain what the vernier scale adds that the main scale alone cannot provide. (3 steps)", "answer": "- Step 1: Read the **main scale** at the mark immediately to the left of the vernier's zero line. This gives the whole-number and first-decimal part of the measurement (e.g., $$1.3\\,\\text{cm}$$).\n- Step 2: Find the single vernier line that aligns exactly with any main-scale line. Its number gives the next decimal place (e.g., line \"3\" adds $$0.03\\,\\text{cm}$$).\n- Step 3: Add them. The main scale alone can only resolve to its graduation size (e.g., $$0.1\\,\\text{cm}$$); the vernier scale subdivides that last interval, adding one extra digit of precision. A 10-division vernier resolves to $$0.1\\,\\text{mm}$$; a 50-division vernier resolves to $$0.02\\,\\text{mm}$$.\n\nThe vernier's whole purpose is to interpolate between main-scale marks — without it, you'd be guessing the last digit.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A vernier caliper reads $$1.05\\,\\text{cm}$$ when measuring an object. When the jaws are fully closed, the same caliper reads $$+0.04\\,\\text{cm}$$. What is the true reading, and why does the sign of the zero error matter? (2 steps)", "answer": "- Step 1: Apply the correction rule: $$\\text{actual} = \\text{observed} - \\text{zero error} = 1.05 - (+0.04) = 1.01\\,\\text{cm}$$. A *positive* zero error means the instrument reads *too high*, so we subtract.\n- Step 2: If the zero error were negative (e.g., $$-0.07\\,\\text{cm}$$), the instrument reads *too low*, and subtracting a negative number effectively *adds*: $$\\text{actual} = \\text{observed} - (-0.07) = \\text{observed} + 0.07$$. The sign matters because it tells you which direction the instrument is biased.\n\nThe rule is always the same formula — actual = observed − zero error — but the sign of the error determines whether you end up adding or subtracting.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "A micrometer's barrel (main) scale reads $$5.5\\,\\text{mm}$$ and its thimble reads 28 (each division = $$0.01\\,\\text{mm}$$). When closed, it reads $$+0.02\\,\\text{mm}$$. Find the true diameter. Why does a $$0.01\\,\\text{mm}$$ error in radius matter in a viscosity experiment? (3 steps)", "answer": "- Step 1: Compute the observed reading. The barrel gives $$5.5\\,\\text{mm}$$; the thimble adds $$28 \\times 0.01 = 0.28\\,\\text{mm}$$. Observed = $$5.5 + 0.28 = 5.78\\,\\text{mm}$$.\n- Step 2: Correct the zero error: $$5.78 - (+0.02) = 5.76\\,\\text{mm}$$.\n- Step 3: In a viscosity experiment, terminal velocity goes as $$v_t \\propto r^2$$. A $$0.01\\,\\text{mm}$$ error in $$r$$ (which is roughly $$2.88\\,\\text{mm}$$) is about $$0.35\\%$$ in radius, but because of the squaring, the resulting error in $$v_t$$ is roughly $$0.7\\%$$ — nearly doubled. That's why a micrometer (resolving to $$0.01\\,\\text{mm}$$) is used rather than a ruler.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "A steel pin and a steel girder have very different masses and volumes. Do they have the same density? Explain what \"intensive property\" means in this context.", "answer": "Yes — they have the same density. Density is an **intensive property**: it does not depend on how much material is present. Both are made of steel, so $$\\rho = m/V$$ gives the same value regardless of whether you measure a pin or a girder. The mass and volume each scale together, so their ratio stays constant. This is why density is useful for *identifying* a material — one measurement tells you what substance it is, not how much of it there is.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Near Earth's surface, an object's weight is given by $$W = mg$$. But the deeper law is $$F = Gm_1 m_2 / r^2$$. Why do we use $$W = mg$$ in fluids problems instead of the gravitation law? (2 steps)", "answer": "- Step 1: The gravitation law is the *general* model — it works for any two masses at any separation. But near Earth's surface, $$r$$ is essentially constant (Earth's radius $$\\approx 6370\\,\\text{km}$$), so $$Gm_{\\text{Earth}}/r^2$$ collapses to a single constant we call $$g \\approx 9.81\\,\\text{N kg}^{-1}$$.\n- Step 2: Therefore $$W = mg$$ is the *practical simplification* for any object close to the ground. In fluids problems all objects are near the surface, so $$W = mg$$ is the correct tool. Using $$F = Gm_1 m_2/r^2$$ isn't wrong, but it's unnecessarily complicated and introduces extra variables that all cancel to give $$g$$ anyway.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "In a fluid, pressure at a point acts equally in all directions, yet pressure *increases with depth*. Explain both facts using the formula $$P = \\rho g h$$, and explain why a dam wall is thicker at the bottom. (3 steps)", "answer": "- Step 1: At any given depth $$h$$, the pressure $$P = \\rho g h$$ is the same in every direction — that's a property of fluids (they cannot sustain shear at rest, so pressure pushes equally sideways as well as vertically).\n- Step 2: As $$h$$ increases, $$P$$ increases linearly — a deeper point supports a taller column of fluid above it, so the weight pressing down (and therefore the pressure) is greater.\n- Step 3: A dam wall is thicker at the bottom because the water pressure (and hence the total force on the wall) is greatest at the base. If the wall were uniform thickness, the bottom would be the most likely point of failure since it bears the largest force per unit area.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "Why does upthrust exist at all? A submerged block has fluid pressing on every face — why don't all those pressures just cancel out? (3 steps)", "answer": "- Step 1: The horizontal pressures *do* cancel — the push from the left equals the push from the right because they act at the same depth.\n- Step 2: The vertical pressures do *not* cancel, because the bottom face sits at a *greater depth* than the top face. Since $$P = \\rho g h$$, deeper means higher pressure: $$P_{\\text{bottom}} > P_{\\text{top}}$$.\n- Step 3: The upward force on the bottom face ($$P_{\\text{bottom}} \\times A$$) exceeds the downward force on the top face ($$P_{\\text{top}} \\times A$$). The leftover is a net *upward* force — that is upthrust. Without the depth-dependent pressure gradient, upthrust would not exist.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "Derive the upthrust formula $$U = \\rho_f V g$$ from pressure, for a rectangular block of cross-section $$A$$ and height $$L$$ whose top face is at depth $$h_1$$. (4 steps)", "answer": "- Step 1: Write the pressure at each horizontal face. Top face at depth $$h_1$$: $$P_1 = \\rho_f g h_1$$. Bottom face at depth $$h_2 = h_1 + L$$: $$P_2 = \\rho_f g h_2$$.\n- Step 2: Convert pressures to forces. Upward force: $$F_{\\text{up}} = P_2 A = \\rho_f g h_2 A$$. Downward force: $$F_{\\text{down}} = P_1 A = \\rho_f g h_1 A$$.\n- Step 3: Subtract to get the net upward force: $$U = F_{\\text{up}} - F_{\\text{down}} = \\rho_f g A(h_2 - h_1) = \\rho_f g A L$$.\n- Step 4: Recognise that $$A \\times L = V$$, the submerged volume. So $$U = \\rho_f V g$$. Notice that $$h_1$$ cancels — upthrust does not depend on how deep the object sits, only on the displaced volume.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "State Archimedes' Principle in one sentence. Then explain the \"replace-with-fluid\" intuition: why must the upthrust on any object equal the weight of the fluid it displaces? (3 steps)", "answer": "- Step 1: Archimedes' Principle: the upthrust on a body partially or fully immersed in a fluid equals the weight of the fluid that the body displaces.\n- Step 2: Imagine scooping out the submerged part of the object and replacing it with fluid of the same shape. That fluid-shape just sits there in equilibrium — the surrounding fluid pushes up on it with a force exactly equal to its own weight, $$\\rho_f V g$$.\n- Step 3: The surrounding fluid cannot tell the difference between that fluid-shape and the real object (the boundary is the same shape in the same place). So it pushes up on the real object with exactly the same force — $$U = \\rho_f V g$$. The upthrust must equal the displaced fluid's weight because that's exactly what the fluid was already pushing with before the object replaced it.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "In the formula $$U = \\rho_f V g$$, which density do you use — the object's or the fluid's? Which volume — the whole object or only the submerged part? What goes wrong if you pick the wrong one? (2 steps)", "answer": "- Step 1: Always use the **fluid's** density $$\\rho_f$$ and the **submerged** volume. Upthrust is about the fluid that was pushed aside, so it depends on how heavy that fluid is ($$\\rho_f$$) and how much of it was displaced ($$V_{\\text{submerged}}$$).\n- Step 2: Common mistakes:\n+ Using the object's density $$\\rho_s$$ would give the object's weight, not the upthrust — completely different physics.\n+ Using the whole-object volume when the object is only partly submerged overestimates the displaced fluid, giving too large an upthrust. Only when fully immersed does $$V_{\\text{submerged}} = V_{\\text{total}}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A fully submerged object is pushed twice as deep in a liquid of uniform density. What happens to the upthrust — does it double, stay the same, or something else? Explain why. (2 steps)", "answer": "- Step 1: The upthrust **stays the same**. The formula $$U = \\rho_f V g$$ contains no depth variable — it depends only on the fluid density, the displaced volume, and $$g$$.\n- Step 2: Pushing the block deeper raises the pressure on *both* the top and bottom faces by the same amount ($$\\rho_f g \\, \\Delta h$$). Their *difference* — which is what produces upthrust — is unchanged. The cancelled $$h_1$$ in the derivation (Q8) confirms this mathematically. This holds provided the fluid's density is uniform (true for liquids; for gases, density increases with depth and the picture is more subtle).", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "Three objects are placed in the same fluid: one floats at the surface, one hovers mid-liquid, and one sinks to the bottom. What are the density relationships in each case? What extra force acts on the sunk object? (3 steps)", "answer": "- Step 1: **Floating** (partly out): $$\\rho_s < \\rho_f$$. The object's weight is less than the maximum possible upthrust (when fully submerged), so it settles with only part of its volume below the surface.\n- Step 2: **Hovering** (neutral buoyancy): $$\\rho_s = \\rho_f$$. Weight exactly equals upthrust when fully submerged, so it can sit at any depth — no net force pushes it up or down.\n- Step 3: **Sunk**: $$\\rho_s > \\rho_f$$. Even fully submerged, upthrust cannot match weight. A **normal (contact) force** from the container floor provides the remaining upward force to balance the weight. Without the floor, the object would accelerate downward.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "An iceberg (density $$920\\,\\text{kg m}^{-3}$$) floats in seawater (density $$1025\\,\\text{kg m}^{-3}$$). Show that about 90% is below the surface. What general formula gives the submerged fraction of any floating object? (3 steps)", "answer": "- Step 1: For a floating object, $$W = U$$, so $$\\rho_s V_{\\text{tot}} g = \\rho_f V_{\\text{sub}} g$$. Cancel $$g$$.\n- Step 2: Rearrange: $$\\frac{V_{\\text{sub}}}{V_{\\text{tot}}} = \\frac{\\rho_s}{\\rho_f}$$. This is the general formula — the submerged fraction equals the ratio of the object's density to the fluid's density.\n- Step 3: For the iceberg: $$\\frac{920}{1025} = 0.898$$, so about 90% is submerged. This is the origin of the phrase \"tip of the iceberg\" — only ~10% is visible above water. If the fluid were denser (e.g., very salty water), the same iceberg would float higher.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Derive the floating-rod relation $$m = \\rho_f A \\, \\Delta h$$ from first principles, starting with the equilibrium condition for a floating vertical cylinder. (4 steps)", "answer": "- Step 1: Start from equilibrium: the object floats, so $$W = U$$.\n- Step 2: Substitute the force formulas. Weight: $$W = mg$$. Upthrust: $$U = \\rho_f V g$$, where $$V$$ is the submerged volume.\n- Step 3: For a vertical cylinder of cross-section $$A$$ submerged to depth $$\\Delta h$$, the submerged volume is $$V = A \\, \\Delta h$$. So $$mg = \\rho_f A \\, \\Delta h \\, g$$.\n- Step 4: Cancel $$g$$ from both sides: $$m = \\rho_f A \\, \\Delta h$$. This tells you the submerged depth is $$\\Delta h = m / (\\rho_f A)$$ — set by the object's mass, the fluid's density, and the rod's cross-section.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A vertical rod floats in a liquid. If the rod's mass increases (with cross-section and fluid unchanged), does it float deeper or higher? Explain using $$m = \\rho_f A \\, \\Delta h$$, and identify which variable is held constant. (2 steps)", "answer": "- Step 1: From $$\\Delta h = m / (\\rho_f A)$$, with $$\\rho_f$$ and $$A$$ held constant, $$\\Delta h$$ is directly proportional to $$m$$.\n- Step 2: More mass means the rod needs to displace more fluid to generate a larger upthrust. With $$A$$ fixed, the only way to displace more volume is to sink deeper — so $$\\Delta h$$ increases. The rod floats deeper.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "A vertical rod floats in a liquid. If the rod's diameter increases (same mass, same fluid), does it float deeper or higher? A common error is to let mass vary with diameter — why is that wrong? (3 steps)", "answer": "- Step 1: From $$\\Delta h = m / (\\rho_f A)$$, hold $$m$$ and $$\\rho_f$$ constant while increasing $$A$$ (larger diameter means larger cross-section).\n- Step 2: Since $$A$$ is in the denominator, increasing $$A$$ *decreases* $$\\Delta h$$ — the rod floats higher. A wider rod displaces enough fluid over a shorter depth, so it doesn't need to sink as far.\n- Step 3: The common error is thinking \"bigger rod = heavier = floats deeper.\" But the question specifies *only the diameter changes* — the mass is fixed (around the rod is hollow, or made of lighter material). You must change *one variable at a time* and hold the others constant. This was the exact mistake made in the lesson.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "A vertical rod floats in a liquid. If the liquid's density decreases (same rod, same mass), does the rod float deeper or higher? Explain the physical reasoning. (2 steps)", "answer": "- Step 1: From $$\\Delta h = m / (\\rho_f A)$$, with $$m$$ and $$A$$ fixed, $$\\Delta h$$ is inversely proportional to $$\\rho_f$$.\n- Step 2: A less dense fluid provides less upthrust per unit volume displaced. To generate the same upthrust (which must equal the unchanged weight), the rod must displace a *larger* volume — so it sinks deeper. Think of a rod floating in water vs. in a very light oil: the oil pushes up less per cubic metre, so the rod must push aside more of it.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "An object is weighed in air ($$W_1$$) and then weighed again while fully submerged in a liquid ($$W_2$$). How do you find the upthrust from these two readings? Why is $$W_2 < W_1$$? (2 steps)", "answer": "- Step 1: The upthrust is the apparent loss of weight: $$U = W_1 - W_2$$. In air, the only vertical force from the fluid is a negligible upthrust, so the balance reads the full weight. Submerged, the fluid pushes up on the object, so the balance reads less.\n- Step 2: $$W_2 < W_1$$ because the fluid now exerts an upward buoyant force on the object. The balance only measures the tension in the string (or the normal force supporting the object), and that tension is reduced by exactly the upthrust. The object hasn't lost mass — it's just being partially supported by the fluid.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "You have found the upthrust $$U$$ on a fully submerged object and measured the displaced volume $$V$$. Write the formula for the fluid's density. What two measurements give you $$V$$ in a measuring-cylinder experiment? (2 steps)", "answer": "- Step 1: From $$U = \\rho_f V g$$, rearrange: $$\\rho_f = \\frac{U}{Vg}$$. You need the upthrust, the displaced volume, and $$g$$.\n- Step 2: In a measuring cylinder, $$V = A \\, \\Delta h$$ where $$A$$ is the cylinder's cross-section and $$\\Delta h$$ is the rise in liquid level when the object is submerged. You measure $$A$$ (from the cylinder's diameter) and $$\\Delta h$$ (the change in level reading). Alternatively, read the volume directly from the cylinder scale before and after submerging the object.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Two methods for finding a fluid's density are: (1) direct, using a eureka can, and (2) apparent-weight. When is each method preferred? (2 steps)", "answer": "- Step 1: **Direct method** ($$\\rho = m/V$$): Collect the displaced fluid in a eureka (displacement) can, measure its mass on a balance and its volume in a cylinder. Preferred when you can capture the displaced fluid cleanly — e.g., for a liquid that pours easily without sticking.\n- Step 2: **Apparent-weight method** ($$U = W_1 - W_2$$, then $$\\rho_f = U/(Vg)$$): Weigh the object in air and submerged. Preferred when the object cannot be melted down or poured — e.g., a solid metal block — or when the fluid is viscous and hard to transfer cleanly to a balance. Examiners may ask you to describe either method.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Viscosity is described as a fluid's \"internal friction.\" What does that mean physically? Why is honey harder to stir than water? (2 steps)", "answer": "- Step 1: In a flowing fluid, adjacent layers move at different speeds. These layers exert **shear (tangential) forces** on each other — fast layers drag slow ones forward, and slow layers hold fast ones back. Viscosity $$\\eta$$ measures the size of this internal friction: the shear force per unit area is proportional to the velocity gradient between layers, and $$\\eta$$ is the constant of proportionality.\n- Step 2: Honey has a much higher $$\\eta$$ (roughly $$10\\,\\text{Pa s}$$) than water ($$\\sim 10^{-3}\\,\\text{Pa s}$$) — about ten thousand times more viscous. The intermolecular attractions in honey are stronger, so its layers grip each other more tightly and resist sliding past one another. That's why it's harder to stir and pours in a slow thread.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "When a liquid is heated, does its viscosity increase or decrease? Give an everyday example and explain the microscopic reason. (2 steps)", "answer": "- Step 1: A liquid's viscosity **decreases** when heated. Warm honey runs faster than cold honey; hot oil flows more freely.\n- Step 2: Microscopic reason: in a liquid, molecules are close together and the viscosity comes mainly from **intermolecular attractions** — molecules grip their neighbours. Heating gives molecules more kinetic energy, making it easier for them to break free and slip past one another. The attractions matter less, so the internal friction falls.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "When a gas is heated, does its viscosity increase or decrease? This is the opposite trend to liquids — explain the microscopic reason for the difference. (2 steps)", "answer": "- Step 1: A gas's viscosity **increases** when heated. This is the opposite of the liquid trend.\n- Step 2: Microscopic reason: in a gas, molecules are far apart and intermolecular attractions are negligible. Viscosity instead comes from molecules **diffusing between layers** and carrying momentum across. Faster molecules (at higher temperature) cross between layers more often and transport more momentum, so the layers \"grip\" each other more effectively. The internal friction rises, and $$\\eta$$ increases.\n\nThe key contrast: liquids resist flow via *attractions* (weakened by heating); gases resist flow via *momentum transfer* (strengthened by heating).", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Write Stokes' Law and identify what each symbol represents, including units. What is the key proportionality that makes terminal velocity possible? (2 steps)", "answer": "- Step 1: Stokes' Law: $$F = 6\\pi\\eta r v$$\n+ $$F$$ — viscous drag force on the sphere (N)\n+ $$\\eta$$ — viscosity of the fluid (Pa s)\n+ $$r$$ — **radius** of the sphere (m), not diameter\n+ $$v$$ — speed of the sphere relative to the fluid ($$\\text{m s}^{-1}$$)\n+ $$6\\pi$$ — a dimensionless constant\n- Step 2: The crucial feature is that $$F \\propto v$$ — drag is *directly proportional* to speed. This means as the object speeds up, drag grows linearly, eventually catching up to the driving force. If drag were constant (independent of speed), there would be no speed at which forces balance, and no terminal velocity.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "State all the conditions that must be satisfied for Stokes' Law to be valid. What happens if any one of them is violated? (2 steps)", "answer": "- Step 1: The four conditions:\n+ The object is a **small, smooth sphere**.\n+ It moves at **low speed**.\n+ The flow around it is **laminar** (smooth, parallel layers — no turbulence).\n+ No wall effects: the container is much wider than the sphere (effectively unbounded fluid).\n- Step 2: If any condition is violated, the law breaks down. For example, a football is large and fast → turbulent flow → drag rises roughly with $$v^2$$, not $$v$$. A rough sphere creates eddies at lower speeds than a smooth one. A sphere near a container wall experiences extra drag from the boundary. Stokes' Law cannot be used for aeroplanes, cyclists, or any non-spherical, fast, or large object.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "What is the difference between laminar and turbulent flow? Describe what each looks like physically, and explain why the drag law changes between them. (2 steps)", "answer": "- Step 1: **Laminar flow**: fluid moves in smooth, parallel layers that slide past each other without mixing. Around a sphere, the layers close up neatly behind it. Drag is purely viscous and rises in direct proportion to speed: $$F \\propto v$$.\n- Step 2: **Turbulent flow**: the smooth layers break into chaotic, swirling eddies. The wake behind the object becomes disorderly. Energy is lost to these eddies, and drag rises much faster — roughly with the **square** of speed: $$F \\propto v^2$$. This is a fundamentally different law. The transition from laminar to turbulent is governed by the Reynolds number: small $$Re$$ ($$\\lesssim 1$$) → laminar (Stokes holds); large $$Re$$ ($$\\gtrsim 1000$$) → turbulent (Stokes fails).", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "Why does a falling object reach a *maximum* speed at all? Why can't it just keep accelerating? Explain using the relationship between drag and speed. (3 steps)", "answer": "- Step 1: At the moment of release, speed is zero, so drag is zero. The only forces are weight (down) and upthrust (up). Since $$W > U$$, there is a large downward resultant and the object accelerates.\n- Step 2: As speed increases, drag *grows with speed* (in Stokes' regime, $$F_D \\propto v$$). This drag opposes the motion, so the downward resultant force *shrinks*: $$F_{\\text{net}} = W - U - F_D$$. The object still accelerates, but less and less.\n- Step 3: There is exactly one speed at which drag has grown enough that $$W = U + F_D$$. At this speed, the resultant is zero, acceleration is zero, and the speed stops changing. The object cannot overshoot because if it went faster, drag would exceed the driving force and push it back. A force that *grows with speed* is what guarantees a stable terminal velocity.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "Describe the three stages a sphere passes through when dropped into a fluid, from release to terminal velocity. At each stage, state the relative sizes of $$W$$, $$U$$, and $$F_D$$. (3 steps)", "answer": "- Step 1: **Just released** ($$v = 0$$): Drag $$F_D = 0$$ (no speed). Forces: $$W$$ down, $$U$$ up, with $$W > U$$. Resultant $$= W - U$$ is large and downward → large acceleration downward.\n- Step 2: **Accelerating** ($$0 < v < v_t$$): Drag $$F_D = 6\\pi\\eta r v$$ grows with speed and points up. Resultant $$= W - U - F_D$$ shrinks. The object still speeds up, but with decreasing acceleration.\n- Step 3: **Terminal velocity** ($$v = v_t$$): Drag has grown until $$U + F_D = W$$. Resultant $$= 0$$, acceleration $$= 0$$, and the sphere falls at constant speed. It will continue at this speed indefinitely unless conditions change.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Write the force-balance equation at terminal velocity in symbols. Then explain in words what each term means and why the resultant must be zero. (2 steps)", "answer": "- Step 1: $$W = U + F_D$$. Weight (down) equals upthrust (up) plus viscous drag (up).\n- Step 2: At terminal velocity, the object moves at constant speed. By Newton's First Law, constant velocity means zero resultant force. The three forces must balance exactly. If they didn't, there would be a net force and the object would still be accelerating — contradicting the definition of terminal velocity. Note: in air, upthrust is often negligible, so the balance simplifies to $$W \\approx F_D$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Derive the terminal velocity formula $$v_t = \\frac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$ from the force balance. Show every cancellation step. (5 steps)", "answer": "- Step 1: Start from the balance: $$W = U + F_D$$.\n- Step 2: Substitute the three force formulas. Sphere volume $$V = \\frac{4}{3}\\pi r^3$$, so $$W = \\rho_s \\frac{4}{3}\\pi r^3 g$$ and $$U = \\rho_f \\frac{4}{3}\\pi r^3 g$$. Drag: $$F_D = 6\\pi\\eta r v_t$$. The equation becomes: $$\\rho_s \\frac{4}{3}\\pi r^3 g = \\rho_f \\frac{4}{3}\\pi r^3 g + 6\\pi\\eta r v_t$$.\n- Step 3: Collect the drag term on one side: $$6\\pi\\eta r v_t = \\frac{4}{3}\\pi r^3 g (\\rho_s - \\rho_f)$$.\n- Step 4: Divide both sides by $$6\\pi\\eta r$$: $$v_t = \\frac{\\frac{4}{3}\\pi r^3 g(\\rho_s - \\rho_f)}{6\\pi\\eta r} = \\frac{4\\pi r^3 g(\\rho_s - \\rho_f)}{18\\pi\\eta r}$$.\n- Step 5: Cancel $$\\pi$$ and one power of $$r$$, simplify $$4/18 = 2/9$$: $$v_t = \\frac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$. This formula is NOT on the data sheet — you must be able to derive it.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "The terminal velocity formula is $$v_t = \\frac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$. Explain each proportionality: (a) why $$r^2$$ and not just $$r$$? (b) why the *difference* of densities, not just $$\\rho_s$$? (c) why is $$\\eta$$ in the denominator? (3 steps)", "answer": "- Step 1: $$v_t \\propto r^2$$: Weight grows as $$r^3$$ (volume), but drag at a given speed grows only as $$r$$ (Stokes: $$F \\propto r v$$). To restore balance, speed must climb until $$r v \\propto r^3$$, giving $$v \\propto r^2$$. The mismatch between $$r^3$$ (weight) and $$r$$ (drag per unit speed) is exactly why bigger spheres fall *much* faster.\n- Step 2: $$v_t \\propto (\\rho_s - \\rho_f)$$: The *net downward force* driving the motion is $$W - U = (\\rho_s - \\rho_f)Vg$$. If $$\\rho_s = \\rho_f$$, there's no net driving force and $$v_t = 0$$ (neutral buoyancy — it doesn't fall at all). Using only $$\\rho_s$$ would ignore upthrust and overestimate $$v_t$$.\n- Step 3: $$v_t \\propto 1/\\eta$$: A more viscous fluid provides more drag at any given speed, so the drag catches up to the driving force at a *lower* speed. Thicker fluid → slower terminal velocity.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "Three common numerical pitfalls in terminal velocity calculations are: using diameter instead of radius, using $$\\rho_s$$ instead of $$(\\rho_s - \\rho_f)$$, and leaving $$r$$ in mm. Estimate the error in each case. (3 steps)", "answer": "- Step 1: **Diameter for radius**: Since $$v_t \\propto r^2$$, substituting diameter $$d = 2r$$ gives $$(2r)^2 = 4r^2$$ — the answer is **4× too large**. Always halve the diameter first.\n- Step 2: **Using $$\\rho_s$$ instead of $$(\\rho_s - \\rho_f)$$**: This ignores upthrust. For a steel ball in oil ($$\\rho_s = 7800$$, $$\\rho_f = 880$$), using 7800 instead of 6920 overestimates by about $$\\frac{7800 - 6920}{6920} \\approx 13\\%$$. For objects in air the error is tiny, but in liquids it's significant.\n- Step 3: **Leaving $$r$$ in mm**: Since $$r$$ is squared and in metres, a $$1\\,\\text{mm}$$ radius should be $$1.0 \\times 10^{-3}\\,\\text{m}$$. Leaving it as $$1$$ gives $$r^2 = 1$$ instead of $$10^{-6}$$ — the answer is off by a factor of **one million**. Always convert to metres before squaring.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "In Core Practical 4 (falling-ball viscometer), why is the starting timing mark placed a few cm *below* the liquid surface rather than at the point of release? (2 steps)", "answer": "- Step 1: When the ball is first dropped, it accelerates from rest. During this acceleration phase, its speed is *not* constant — it's increasing toward terminal velocity. The equation $$\\eta = \\frac{2r^2 g(\\rho_s - \\rho_f)}{9v}$$ assumes $$v$$ is the *terminal* velocity, where forces are balanced.\n- Step 2: If you timed from release, the measured $$v = s/t$$ would mix in the accelerating phase, giving a speed lower than $$v_t$$. Substituting an underestimated $$v$$ into the formula would *overestimate* $$\\eta$$. By starting the timer only after the ball has had time to reach terminal velocity, you ensure $$v$$ is genuinely constant and the formula is valid.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "In Core Practical 4, a more reliable method uses several ball bearings of different radii and plots a graph. What goes on each axis, what shape should the graph be, and how do you extract $$\\eta$$ from the gradient? (3 steps)", "answer": "- Step 1: Plot $$v_t$$ (vertical) against $$r^2$$ (horizontal). From $$v_t = \\frac{2(\\rho_s - \\rho_f)g}{9\\eta} r^2$$, the relationship is direct proportion — a straight line through the origin with gradient $$k = \\frac{2(\\rho_s - \\rho_f)g}{9\\eta}$$.\n- Step 2: The straight-line-through-origin shape is evidence that Stokes' Law held across the range of balls used. If the larger balls caused turbulence, the points would curve away from the line at high $$r^2$$.\n- Step 3: Measure the gradient $$k$$, then rearrange: $$\\eta = \\frac{2(\\rho_s - \\rho_f)g}{9k}$$. This single gradient value averages out random errors from individual runs, giving a more reliable estimate of $$\\eta$$ than any single ball measurement.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "List three sources of error in Core Practical 4 and state an improvement for each. (3 steps)", "answer": "- Step 1: **Ball not yet at terminal velocity** — if the starting mark is too close to the surface, the ball is still accelerating. Improvement: place several marks at different depths and check that the time per interval is constant before the official timing region.\n- Step 2: **Wall/edge effects** — a narrow cylinder creates extra drag because the fluid flow is constrained by the walls. Improvement: use a wide cylinder where $$r_{\\text{ball}} \\ll r_{\\text{cylinder}}$$, so the fluid is effectively unbounded.\n- Step 3: **Temperature drift** — viscosity of a liquid changes strongly with temperature. Improvement: record the liquid's temperature and keep it constant (e.g., perform the experiment in a temperature-controlled room or allow time for thermal equilibrium). Other improvements include: using light gates instead of a stopwatch (reduces reaction-time error), using a micrometer for $$r$$ (repeated readings, averaged), and using small balls to ensure laminar flow.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "A skydiver steps out of a plane. At the very first instant (before any speed builds up), what forces act on them? What is the resultant force, and what does this mean for their acceleration? (2 steps)", "answer": "- Step 1: At the instant of stepping out, speed is zero, so air resistance (drag) is zero. The forces are: weight $$W = mg$$ downward, and upthrust from air (negligible for a person in air). The only significant force is weight.\n- Step 2: The resultant force is $$W$$ downward — large. By $$F = ma$$, this gives a large downward acceleration (approximately $$g$$). The skydiver starts falling with nearly free-fall acceleration. On a $$v$$–$$t$$ graph, this is the steep initial portion.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "A skydiver is falling and has built up some speed, but has not yet reached terminal velocity. Drag is now nonzero but still less than weight. Is the skydiver speeding up or slowing down? A common mistake is to say \"slowing down\" — explain why this is wrong. (3 steps)", "answer": "- Step 1: The resultant force is still *downward*: $$W > F_D$$ (upthrust negligible in air). A downward resultant means a downward acceleration, which means the diver is still **speeding up**.\n- Step 2: The mistake comes from confusing *decreasing acceleration* with *decreasing velocity*. The acceleration is getting *smaller* (because drag is growing and reducing the net force), but it is still *positive* (downward). The speed is still increasing — just increasing more slowly than before.\n- Step 3: The skydiver only begins to slow down when the resultant force points *upward* — which happens when drag exceeds weight (e.g., immediately after opening a parachute). Until then, any downward resultant means speeding up, regardless of how small that resultant is.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "A skydiver reaches terminal velocity, then opens a parachute. Describe what happens to the forces, the acceleration, and the speed in the moments after the parachute opens. Why does a new, lower terminal velocity result? (3 steps)", "answer": "- Step 1: Opening the parachute dramatically increases the surface area, so drag *jumps* to a value much larger than weight. The resultant force is now **upward** (drag minus weight), giving a large **upward acceleration** (i.e., a deceleration — the diver slows down).\n- Step 2: As the diver slows, drag decreases (since $$F_D$$ depends on speed). The upward resultant shrinks, so the deceleration eases.\n- Step 3: Eventually, drag falls until it once again equals weight — but now at a *lower* speed than before, because the larger surface area means less speed is needed to generate enough drag. This is the second, lower terminal velocity $$v_{t2}$$. The diver then falls at this constant slow speed until landing.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "Sketch a $$v$$–$$t$$ graph for a skydiver who falls, reaches a first terminal velocity, opens a parachute, then reaches a second (lower) terminal velocity. Describe the shape of each segment and what it tells you about the forces. (4 steps)", "answer": "- Step 1: **Initial fall**: the curve rises from the origin with a steep gradient that gradually flattens. Steep gradient = large acceleration (weight dominates). Flattening = drag growing, acceleration shrinking. The curve levels off at the first terminal velocity $$v_{t1}$$ (horizontal line).\n- Step 2: **Parachute opens**: the speed drops sharply — a steep *negative* gradient. Drag now far exceeds weight, giving a large upward resultant and strong deceleration.\n- Step 3: **Slowing phase**: the curve continues downward but the gradient becomes less steep (less negative). Drag is falling as speed drops, so the deceleration eases.\n- Step 4: **Second terminal velocity**: the curve flattens to a new horizontal line at $$v_{t2} < v_{t1}$$. Drag has decreased to equal weight again. The diver falls at this constant, slower speed. The graph never goes negative — the diver never flies upward.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "What is the shape of the $$a$$–$$t$$ graph for a skydiver falling through the entire sequence (fall → first $$v_t$$ → parachute opens → second $$v_t$$)? Why does it share the same shape as the resultant-force–time graph? (3 steps)", "answer": "- Step 1: **Initial fall**: $$a$$ starts at a maximum (near $$g$$) and decays toward zero as drag builds. This is a decreasing curve from a positive value toward zero.\n- Step 2: **Parachute opens**: $$a$$ plunges to a large *negative* value (upward resultant = large deceleration). Then $$a$$ climbs back toward zero as the diver slows and drag decreases.\n- Step 3: At both terminal velocities, $$a = 0$$ (flat portions of the $$a$$–$$t$$ graph). The $$a$$–$$t$$ and resultant-force–$$t$$ graphs share the same shape because $$F_{\\text{net}} = ma$$ — acceleration is just the resultant force divided by the constant mass. They are proportional at every instant.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "A floating object is described by four statements. Three are wrong. Identify the correct one and explain why each of the others fails: (A) volume displaced = volume of object, (B) density of object > density of liquid, (C) mass of liquid displaced = upthrust on object, (D) weight of liquid displaced = weight of object. (4 steps)", "answer": "- Step 1: **(A) is wrong**: A floating object is only *partly* submerged, so the displaced volume is *less* than the object's total volume. Only a fully submerged object displaces its own volume.\n- Step 2: **(B) is wrong**: A floating object is *less* dense than the liquid ($$\\rho_s < \\rho_f$$). If it were denser, it would sink.\n- Step 3: **(C) is wrong** on units: upthrust is a force (N), but \"mass of liquid displaced\" is a mass (kg). They cannot be equal. Upthrust equals the *weight* of liquid displaced ($$= \\text{mass} \\times g$$), not the mass itself. This is a classic mass-vs-weight trap.\n- Step 4: **(D) is correct**: For a floating body, $$W = U$$, and by Archimedes' Principle $$U =$$ weight of displaced liquid. Therefore the weight of liquid displaced equals the weight of the object.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "Derive the SI base units of viscosity $$\\eta$$ from Stokes' Law $$F = 6\\pi\\eta r v$$. Show that $$\\text{Pa s}$$, $$\\text{kg m}^{-1}\\text{s}^{-1}$$, and $$\\text{N s m}^{-2}$$ are all equivalent. Which of these is *not* a unit of viscosity: $$\\text{N s}$$ or $$\\text{N m}^{-2}$$? (4 steps)", "answer": "- Step 1: Rearrange Stokes' Law for $$\\eta$$: $$\\eta = \\frac{F}{6\\pi r v}$$. The $$6\\pi$$ is dimensionless, so the units are $$[\\eta] = \\frac{\\text{N}}{\\text{m} \\cdot \\text{m s}^{-1}} = \\frac{\\text{N}}{\\text{m}^2 \\text{s}^{-1}} = \\text{N s m}^{-2}$$.\n- Step 2: Convert newtons to base units ($$\\text{N} = \\text{kg m s}^{-2}$$): $$[\\eta] = (\\text{kg m s}^{-2})(\\text{s})(\\text{m}^{-2}) = \\text{kg m}^{-1} \\text{s}^{-1}$$.\n- Step 3: Since $$\\text{Pa} = \\text{N m}^{-2}$$, then $$\\text{Pa s} = (\\text{N m}^{-2})(\\text{s}) = \\text{N s m}^{-2}$$. All three forms are equivalent: $$\\text{Pa s} = \\text{kg m}^{-1}\\text{s}^{-1} = \\text{N s m}^{-2}$$.\n- Step 4: $$\\text{N s}$$ is *not* a unit of viscosity — it equals $$\\text{kg m s}^{-1}$$ (units of impulse/momentum), missing the $$\\text{m}^{-2}$$. $$\\text{N m}^{-2}$$ is also *not* a unit of viscosity — it's pressure (Pa), missing the seconds. Both lack something; the exam will offer one of them as the distractor.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "A sphere falls at terminal velocity in oil. Its weight is $$W$$ and the upthrust is $$U$$. Write an expression for the drag force $$F_D$$ at terminal velocity. Then explain how to cross-check your calculated $$v_t$$ — what two calculations should give the same answer? (2 steps)", "answer": "- Step 1: From the balance $$W = U + F_D$$, the drag at terminal velocity is $$F_D = W - U$$. This is the *net downward force* — the portion of weight not already balanced by upthrust.\n- Step 2: Cross-check method: (1) Calculate $$F_D$$ from the force balance: $$F_D = W - U$$. (2) Calculate $$F_D$$ from Stokes' Law using your computed $$v_t$$: $$F_D = 6\\pi\\eta r v_t$$. If the two values agree, your $$v_t$$ is correct. If they disagree, there's an arithmetic error somewhere. This is the fastest way to catch mistakes in terminal-velocity calculations.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": true}, {"question": "A wooden cube of density $$600\\,\\text{kg m}^{-3}$$ floats in water. What fraction sits *above* the surface? If the same cube were placed in a denser liquid, would more or less of it be above the surface? (2 steps)", "answer": "- Step 1: The submerged fraction is $$\\rho_s / \\rho_f = 600 / 1000 = 0.60$$, so 60% is submerged. The fraction *above* the surface is $$1 - 0.60 = 0.40$$, or 40%.\n- Step 2: In a denser liquid (say $$\\rho_f = 1200\\,\\text{kg m}^{-3}$$), the submerged fraction would be $$600/1200 = 0.50$$, so 50% above — *more* of it is above the surface. A denser liquid provides more upthrust per unit volume displaced, so the cube needs to displace less volume to match its weight, and it floats higher.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "Two spheres of the *same* radius but different densities (aluminium: $$2700\\,\\text{kg m}^{-3}$$, lead: $$11300\\,\\text{kg m}^{-3}$$) fall through the same oil ($$\\rho_f = 900\\,\\text{kg m}^{-3}$$). Which reaches a higher terminal velocity, and by roughly what factor? (2 steps)", "answer": "- Step 1: Since $$v_t \\propto (\\rho_s - \\rho_f)$$ for equal $$r$$ and $$\\eta$$, the terminal velocity depends on the density *difference*.\n- Step 2: Lead: $$(11300 - 900) = 10400$$. Aluminium: $$(2700 - 900) = 1800$$. Ratio: $$10400/1800 \\approx 5.8$$. The lead sphere's terminal velocity is about 5.8 times the aluminium sphere's. Despite having the same size, the much denser lead sphere has a far greater net downward driving force, so it needs more drag to balance — which means a higher speed.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "A ball at terminal velocity has drag $$F_D$$. If its speed were somehow held at *half* the terminal velocity, what would the drag be? Is the ball in equilibrium at this speed? (2 steps)", "answer": "- Step 1: Stokes' drag is proportional to speed: $$F_D \\propto v$$. At half the terminal velocity, the drag is *half*: $$F_D' = F_D / 2$$.\n- Step 2: At terminal velocity, $$W = U + F_D$$. At half the speed, drag is only $$F_D/2$$, so $$U + F_D' < W$$. The upward forces don't balance weight — there's a net downward resultant. The ball is **not in equilibrium**; it would accelerate downward back toward terminal velocity. This confirms that terminal velocity is a *stable* equilibrium: any perturbation is automatically corrected.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "A skydiver in a spread-eagle \"star\" shape falls more slowly than one diving head-first, even with no parachute. Explain this in terms of forces. (2 steps)", "answer": "- Step 1: In both positions, the weight is the same (same person, same mass). The difference is in the **cross-sectional area** presented to the air. The spread-eagle position has a much larger area than the head-first dive.\n- Step 2: At any given speed, a larger cross-sectional area means more air resistance (drag). So drag balances weight at a *lower* speed for the spread-eagle position. The terminal velocity is lower, and the diver falls more slowly. Weight hasn't changed — only the drag-vs-speed relationship has.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "A steel sphere of diameter $$4.0\\,\\text{mm}$$ and density $$7800\\,\\text{kg m}^{-3}$$ is dropped into glycerine ($$\\rho_f = 1260\\,\\text{kg m}^{-3}$$, $$\\eta = 1.5\\,\\text{Pa s}$$). Without doing the full calculation, estimate whether the terminal velocity is roughly $$0.004\\,\\text{m s}^{-1}$$, $$0.04\\,\\text{m s}^{-1}$$, or $$0.4\\,\\text{m s}^{-1}$$. State which quantities matter most for your estimate. (3 steps)", "answer": "- Step 1: The formula is $$v_t = \\frac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$. The radius is $$r = 2.0\\,\\text{mm} = 2.0 \\times 10^{-3}\\,\\text{m}$$, so $$r^2 = 4.0 \\times 10^{-6}\\,\\text{m}^2$$.\n- Step 2: Estimate the numerator: $$2 \\times 4.0 \\times 10^{-6} \\times 10 \\times (7800 - 1260) \\approx 8 \\times 10^{-6} \\times 10 \\times 6500 \\approx 8 \\times 10^{-6} \\times 65000 \\approx 0.5$$. Denominator: $$9 \\times 1.5 = 13.5$$.\n- Step 3: $$v_t \\approx 0.5/13.5 \\approx 0.04\\,\\text{m s}^{-1}$$. The order of magnitude is $$\\sim 10^{-2}\\,\\text{m s}^{-1}$$ — a slow creep of a few cm per second. The key quantities are $$r^2$$ (which is tiny, making $$v_t$$ small) and $$\\eta$$ (which is large for glycerine, also making $$v_t$$ small).", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "A hydrometer floats in water with a certain submerged volume. When placed in a denser salt solution, it floats higher — the submerged volume decreases. Explain why, using the floating condition. (2 steps)", "answer": "- Step 1: The floating condition is always $$W = U$$, i.e., $$mg = \\rho_f V_{\\text{sub}} g$$. The hydrometer's mass $$m$$ is fixed, so $$\\rho_f V_{\\text{sub}} = m$$ must be constant.\n- Step 2: If $$\\rho_f$$ increases (denser liquid), then $$V_{\\text{sub}}$$ must *decrease* to keep the product constant. The denser liquid provides more upthrust per unit volume, so less volume needs to be submerged to support the same weight. The hydrometer rides higher — and by measuring how much higher, you can determine the liquid's density. This is exactly how real hydrometers work.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "A cork (density $$240\\,\\text{kg m}^{-3}$$) is held fully underwater and released. At the instant of release, is the resultant force up or down? Qualitatively, how does the initial acceleration compare to $$g$$? (2 steps)", "answer": "- Step 1: The upthrust on the fully submerged cork is $$U = \\rho_f V g = 1000 \\times V \\times g$$. The weight is $$W = \\rho_s V g = 240 \\times V \\times g$$. Since $$\\rho_f > \\rho_s$$, upthrust exceeds weight, and the resultant is **upward**: $$F_{\\text{net}} = U - W = (1000 - 240)Vg = 760Vg$$ upward.\n- Step 2: The mass is $$m = 240V$$, so the initial acceleration is $$a = F_{\\text{net}}/m = 760Vg / (240V) = (760/240)g \\approx 3.2g$$ upward. The cork accelerates upward at over three times gravitational acceleration — it shoots up rapidly. This makes sense: the buoyant force is over four times the cork's weight.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": true}, {"question": "Two spheres of the same material but different sizes fall through oil. Sphere Y has twice the radius of sphere X. (a) By what factor is Y's weight larger? (b) By what factor is Y's terminal velocity larger? (c) Why isn't the answer to (b) the same as (a)? (3 steps)", "answer": "- Step 1: Weight $$\\propto V \\propto r^3$$. Doubling the radius multiplies weight by $$2^3 = \\mathbf{8}$$. Y is eight times heavier.\n- Step 2: Terminal velocity $$v_t \\propto r^2$$ (with $$\\rho_s$$, $$\\rho_f$$, $$\\eta$$ fixed). Doubling the radius multiplies $$v_t$$ by $$2^2 = \\mathbf{4}$$. Y's terminal velocity is four times X's.\n- Step 3: The answers differ because weight grows as $$r^3$$ but drag at a given speed grows only as $$r$$ (Stokes: $$F \\propto rv$$). The extra weight (factor 8) is partially compensated by the larger drag-per-speed (factor 2), so the speed only needs to increase by a factor of 4 to restore balance. If drag grew as fast as weight, the terminal velocity wouldn't change with size at all.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "Oil is heated in a falling-ball experiment. State and explain the effect on: (a) the oil's viscosity, and (b) the terminal velocity of the ball. (2 steps)", "answer": "- Step 1: **(a) Viscosity decreases**. Oil is a liquid, and heating a liquid gives its molecules more kinetic energy to overcome intermolecular attractions. The internal friction falls, so $$\\eta$$ decreases.\n- Step 2: **(b) Terminal velocity increases**. Since $$v_t \\propto 1/\\eta$$, a smaller viscosity means the drag catches up to the driving force at a *higher* speed. The ball falls faster through warm oil. This is why the temperature must be controlled in the experiment — even a few degrees of warming can noticeably change the result.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "A raindrop of radius $$0.5\\,\\text{mm}$$ falls at $$2\\,\\text{m s}^{-1}$$ in air. An exam question tells you to use Stokes' Law to find its weight. Should you use it? What concern might a physicist raise, and what number quantifies this concern? (2 steps)", "answer": "- Step 1: You should use it *as the question instructs* — exam questions are deliberate idealisations. The answer would be $$W = F_D = 6\\pi\\eta r v$$.\n- Step 2: A physicist's concern: the **Reynolds number** $$Re = \\rho_f v L / \\eta$$ (where $$L = 2r$$) quantifies whether flow is laminar. For this raindrop: $$Re = (1.2)(2.0)(1.0 \\times 10^{-3}) / (1.8 \\times 10^{-5}) \\approx 130$$. Since $$Re \\gg 1$$, the flow is turbulent and Stokes' Law does *not* physically apply. The \"low speed\" and \"laminar flow\" conditions are violated. This is a good reminder that the Stokes' conditions do real physical work — they're not just fine print.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": true}, {"question": "Convert $$1\\,\\text{cm}^3$$ to $$\\text{m}^3$$. A common mistake is to write $$10^{-2}\\,\\text{m}^3$$. Why is that wrong, and what is the correct conversion? (2 steps)", "answer": "- Step 1: $$1\\,\\text{cm} = 10^{-2}\\,\\text{m}$$, so $$1\\,\\text{cm}^3 = (10^{-2})^3\\,\\text{m}^3 = 10^{-6}\\,\\text{m}^3$$. You must *cube* the conversion factor.\n- Step 2: The common mistake is to write $$10^{-2}\\,\\text{m}^3$$ — this treats the volume as if it were a length, forgetting that the prefix is cubed. Similarly, $$1\\,\\text{litre} = 10^{-3}\\,\\text{m}^3$$. Getting this wrong in a density calculation ($$\\rho = m/V$$) would make the density off by a factor of $$10^4$$, which could turn water into something denser than lead.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": true}, {"question": "A ball bearing's fall through oil produces a $$v$$–$$t$$ graph that rises from the origin and levels off. (a) Where is acceleration greatest? (b) What is the acceleration on the flat part? (c) How would the curve differ for a denser ball of the same radius? (3 steps)", "answer": "- Step 1: **(a)** Acceleration is greatest at $$t = 0$$, where the gradient of the $$v$$–$$t$$ curve is steepest. At this point, drag is zero, so the net downward force ($$W - U$$) is at its maximum.\n- Step 2: **(b)** On the flat part, the gradient is zero — so acceleration is zero. This is the terminal velocity: forces are balanced, $$a = 0$$, constant speed.\n- Step 3: **(c)** A denser ball has a larger $$(\\rho_s - \\rho_f)$$, so it has a larger net downward force at every speed. This means: (i) the initial gradient (acceleration) is steeper, and (ii) it plateaus at a *higher* terminal velocity. The whole curve shifts upward — steeper rise, higher plateau.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "Why does upthrust not depend on depth (for a liquid of uniform density)? Pushing an object deeper increases the pressure on it — so shouldn't the force increase? Explain the flaw in this reasoning. (2 steps)", "answer": "- Step 1: Pushing the object deeper *does* increase the pressure on every face — but it increases the pressure on the **top** face and the **bottom** face by the *same amount* ($$\\Delta P = \\rho_f g \\, \\Delta h$$).\n- Step 2: Upthrust is the *difference* between the upward force on the bottom and the downward force on the top. Since both increase by the same amount, their *difference* is unchanged. Upthrust depends only on the displaced volume, not on how deep the object sits. The flawed reasoning focuses on the absolute pressure increasing, but it's the pressure *difference* that matters — and that difference is set by the object's height, not its depth.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": true}, {"question": "In the terminal velocity derivation, the formula contains $$(\\rho_s - \\rho_f)$$ rather than just $$\\rho_s$$. Physically, what does this difference represent? What happens to $$v_t$$ if $$\\rho_s = \\rho_f$$, and why? (2 steps)", "answer": "- Step 1: The quantity $$(\\rho_s - \\rho_f)$$ represents the **net downward driving force per unit volume**. The sphere's weight pulls it down, but the upthrust pushes it up. Only the *difference* drives the motion through the fluid.\n- Step 2: If $$\\rho_s = \\rho_f$$, then $$(\\rho_s - \\rho_f) = 0$$ and $$v_t = 0$$. This is **neutral buoyancy**: the sphere's weight is exactly balanced by upthrust even at zero speed. There's no net force to start it moving, and no terminal velocity to reach — it simply hovers at whatever depth it's placed. This confirms that upthrust cannot be ignored in liquids; omitting it would falsely predict a terminal velocity for neutrally buoyant objects.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": true}, {"question": "A balloon of volume $$0.030\\,\\text{m}^3$$ and total mass $$25\\,\\text{g}$$ is released underwater. Without calculating exact numbers, determine: is the initial resultant force up or down? Is the initial acceleration large or small compared to $$g$$? (2 steps)", "answer": "- Step 1: The upthrust is $$U = \\rho_f V g = 1000 \\times 0.030 \\times g = 30g$$ newtons upward. The weight is $$W = 0.025 \\times g = 0.025g$$ newtons downward. The resultant is overwhelmingly **upward** — upthrust is about 1200 times the weight.\n- Step 2: The initial acceleration is $$a = F_{\\text{net}}/m \\approx 30g / 0.025 \\approx 1200g$$ upward — vastly larger than $$g$$. The balloon shoots upward extremely fast. However, Stokes' Law would not apply here (the balloon would quickly reach turbulent speeds), so this calculation is only valid at the instant of release.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "In a falling-ball experiment, the measured viscosity came out *higher* than the accepted value. State two possible experimental reasons that would cause an *overestimate* of $$\\eta$$. (2 steps)", "answer": "- Step 1: **Timing started before terminal velocity was reached.** The ball was still accelerating, so the measured $$v = s/t$$ was too low. Since $$\\eta \\propto 1/v$$, an underestimated speed gives an overestimated viscosity.\n- Step 2: **Wall effects in a narrow cylinder.** The fluid flow around the ball is constrained by the nearby walls, creating extra drag that slows the ball below its true terminal velocity. Again, the measured $$v$$ is too low, so $$\\eta$$ is too high. Other possibilities: the liquid was cooler than assumed (higher $$\\eta$$ for liquids), or reaction-time errors in starting the stopwatch too late.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": false}, {"question": "Explain the following statement: \"A force that grows with speed is what guarantees a stable terminal velocity; a constant resistive force could not.\" What would happen if drag were constant regardless of speed? (2 steps)", "answer": "- Step 1: With speed-dependent drag, if the object accidentally goes *faster* than $$v_t$$, drag exceeds the driving force and pushes it back toward $$v_t$$. If it goes *slower*, drag is insufficient and it accelerates back up. The equilibrium is **self-correcting** — hence stable.\n- Step 2: If drag were constant (independent of speed), there would be only two possibilities: either the constant drag exactly equals the net driving force (unlikely coincidence, and unstable — any perturbation would send the object accelerating away), or it doesn't, and the object accelerates indefinitely. There's no mechanism to automatically find a balance. The speed-dependent nature of drag is essential for terminal velocity to exist at all.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": true}], "count": 60}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A sealed box is fully submerged in water. The bottom face is deeper than the top face. Explain how this depth difference leads to a net upward force (upthrust). (3 steps)", "answer": "- Step 1: In a fluid, pressure increases with depth according to $$P = \\rho g h$$. Because the bottom face is at a greater depth ($$h_2 > h_1$$), the pressure acting on the bottom face ($$P_2$$) is larger than the pressure acting on the top face ($$P_1$$).\n- Step 2: While horizontal pressure forces cancel out, the vertical forces do not. The upward force on the bottom face is $$F_{up} = P_2 A$$ and the downward force on the top face is $$F_{down} = P_1 A$$.\n- Step 3: Since $$P_2 > P_1$$, it follows that $$F_{up} > F_{down}$$. The net force is upward, and this difference is the upthrust.\n\nThe existence of upthrust relies entirely on the pressure gradient within the fluid.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Imagine removing a submerged object and replacing it with fluid of the exact same shape and volume. Why does this thought experiment prove that upthrust equals the weight of the displaced fluid? (2 steps)", "answer": "- Step 1: If you replace the object with a \"body\" of fluid identical to the fluid surrounding it, that body of fluid would just sit there in static equilibrium. It is not accelerating up or down.\n- Step 2: For this fluid body to be in equilibrium, the surrounding fluid must be pushing up on it with a force exactly equal to the fluid body's weight ($$W_{fluid}$$). The surrounding fluid cannot tell the difference between the fluid body and a solid object of the same shape, so it pushes up on the solid object with the exact same force.\n\nThis is the intuitive proof of Archimedes' Principle: Upthrust is just the fluid supporting the \"ghost\" of the fluid you pushed out of the way.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "In the upthrust formula $$U = \\rho_f V g$$, why is it incorrect to use the object's density, and what exactly does $$V$$ represent if the object is only partially submerged? (2 steps)", "answer": "- Step 1: Upthrust is defined by the fluid pushed aside, not the object itself. The force arises from the pressure of the *surrounding fluid*, which depends on the *fluid's* density ($$\\rho_f$$). Using the object's density would calculate the object's weight, not the upthrust.\n- Step 2: $$V$$ represents the **submerged volume**—the volume of the fluid that has been displaced. If the object floats partially submerged, $$V$$ is only the volume of the part under the surface, not the total volume of the object.\n\nAlways remember: Upthrust cares about the fluid and the hole the object makes in it.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "A fully submerged object is pushed deeper into a uniform liquid. Does the upthrust increase, decrease, or stay the same? Explain why. (2 steps)", "answer": "- Step 1: The upthrust stays the **same**. The formula $$U = \\rho_f V g$$ depends on the density of the fluid, the submerged volume, and gravity. None of these change when the object is pushed deeper (assuming uniform fluid density).\n- Step 2: While the pressure on both the top and bottom faces increases as you go deeper, the *difference* in pressure between the two faces depends only on the height difference ($$h_2 - h_1 = L$$), which is constant. Since $$U = \\rho_f g L A$$, the upthrust remains constant regardless of depth.\n\nThis assumes the fluid density is uniform; in a gas or a stratified ocean, density changes with depth could alter the upthrust.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "An object floats in equilibrium on the surface of a liquid. Compare the weight of the object to the weight of the fluid it displaces, and compare the object's density to the fluid's density. (2 steps)", "answer": "- Step 1: Because the object is in equilibrium, the upward upthrust must balance the downward weight ($$W = U$$). By Archimedes' Principle, upthrust equals the weight of the displaced fluid, so the **weight of the object equals the weight of the displaced fluid**.\n- Step 2: Since the object floats, it must be partially above the surface, meaning its submerged volume is less than its total volume. For the weight of a small volume of fluid (displaced) to equal the weight of a larger volume of the object (total), the **object's density must be less than the fluid's density** ($$\\rho_s < \\rho_f$$).\n\nIf densities were equal, the object would hover neutrally at any depth; if greater, it would sink.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "A wooden block has a density of $$600 \\text{ kg m}^{-3}$$ and floats in water ($$1000 \\text{ kg m}^{-3}$$). What fraction of the block's volume sits *above* the water surface? (2 steps)", "answer": "- Step 1: Set weight equal to upthrust: $$\\rho_s V_{tot} g = \\rho_f V_{sub} g$$. Canceling $$g$$, we get $$\\frac{V_{sub}}{V_{tot}} = \\frac{\\rho_s}{\\rho_f} = \\frac{600}{1000} = 0.60$$. So, 60% is submerged.\n- Step 2: The fraction *above* the surface is $$1 - 0.60 = 0.40$$, or **40%**.\n\nThe ratio of densities directly gives the submerged fraction; this is the \"tip of the iceberg\" principle.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "A vertical cylinder floats in a liquid. Using the floating-rod relation $$m = \\rho_f A \\Delta h$$, what happens to the submerged depth $$\\Delta h$$ if the rod's cross-sectional area $$A$$ is increased (while keeping its mass constant)? (2 steps)", "answer": "- Step 1: Rearrange the equation to solve for the submerged depth: $$\\Delta h = \\frac{m}{\\rho_f A}$$. We are holding mass $$m$$ and fluid density $$\\rho_f$$ constant.\n- Step 2: Since $$\\Delta h$$ is inversely proportional to the area $$A$$, increasing the area means the rod must float **higher** (a smaller $$\\Delta h$$). A wider base displaces the required mass of fluid over a shorter depth.\n\nThis highlights the importance of isolating variables; changing area while keeping mass constant means the object is either hollowed out or made of a less dense material.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "An object weighs $$W_1$$ in air and $$W_2$$ when submerged in liquid. How do you calculate the upthrust, and physically, why is $$W_2$$ smaller than $$W_1$$? (2 steps)", "answer": "- Step 1: The upthrust is the apparent loss of weight: $$U = W_1 - W_2$$.\n- Step 2: In air, the balance only supports the object's weight (minus a negligible air upthrust). In the liquid, the fluid pushes *up* on the object with the upthrust force. The balance now supports less of the load, resulting in a lower reading.\n\nThis \"apparent weight\" method is a practical way to experimentally determine upthrust without knowing the fluid density beforehand.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Viscosity is defined as a fluid's internal friction. What does \"internal friction\" mean in the context of adjacent fluid layers moving at different speeds? (2 steps)", "answer": "- Step 1: In a flowing fluid, layers move at different velocities (a velocity gradient). \"Internal friction\" refers to the tangential (shear) forces exerted between these adjacent layers.\n- Step 2: Faster layers try to drag slower layers along, while slower layers try to hold faster layers back. Viscosity ($$\\eta$$) is the constant of proportionality between this shear force per unit area and the velocity gradient. High viscosity means strong inter-layer \"grip\".\n\nThink of stirring honey vs. water: honey's layers grip each other tightly, resisting the gradient you try to impose.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "When a liquid is heated, its viscosity generally decreases. Explain the microscopic mechanism behind this trend. (2 steps)", "answer": "- Step 1: In a liquid, molecules are close together, and viscosity arises primarily from **intermolecular attractions** (cohesive forces) that bind the layers together.\n- Step 2: Heating gives molecules more kinetic energy, allowing them to slip past one another more easily and break free of these temporary attractions. With the \"grip\" weakened, the internal friction falls.\n\nWarm honey flows faster because its molecules have the energy to escape their neighbors' pull.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Unlike liquids, the viscosity of a gas *increases* with temperature. What is the microscopic mechanism responsible for this opposite trend? (2 steps)", "answer": "- Step 1: In a gas, molecules are far apart, so intermolecular attractions are negligible. Viscosity instead comes from **momentum transfer** as molecules randomly diffuse between faster and slower layers.\n- Step 2: Heating a gas increases the speed of these molecules, causing them to cross between layers more frequently and carry momentum across more rapidly. This enhanced momentum transport increases the \"grip\" between layers, raising the viscosity.\n\nIn gases, faster messengers mean stronger coupling; in liquids, faster molecules mean weaker bonds.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Stokes' Law ($$F = 6\\pi\\eta r v$$) applies only under specific conditions. List the three core conditions related to the object and the flow, and explain what happens if these conditions are violated. (3 steps)", "answer": "- Step 1: The object must be a **small, smooth sphere**. Irregular shapes or rough surfaces create complex wakes and pressure distributions not accounted for in the derivation.\n- Step 2: The flow must be **laminar** (smooth, parallel layers). If the speed is too high or the object too large, flow becomes turbulent (chaotic eddies), and drag increases dramatically, no longer following the linear $$v$$ dependence.\n- Step 3: The motion must be at **low speed**. This ensures inertial forces are small compared to viscous forces (low Reynolds number). Violating this triggers the turbulence mentioned in Step 2.\n\nStokes' Law is a \"creeping flow\" limit; it fails for airplanes or fast baseballs.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "According to Stokes' Law $$F = 6\\pi\\eta r v$$, how does the drag force change if the radius of the sphere doubles and the velocity is halved? (2 steps)", "answer": "- Step 1: Identify the dependencies: Drag $$F$$ is directly proportional to radius $$r$$ and directly proportional to velocity $$v$$.\n- Step 2: Doubling the radius doubles the drag (factor of 2). Halving the velocity halves the drag (factor of 1/2). The net change is $$2 \\times \\frac{1}{2} = 1$$. The drag force **stays the same**.\n\nBecause $$F \\propto rv$$, these two changes perfectly cancel out.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Contrast laminar flow and turbulent flow in terms of fluid layer behavior and the resulting drag force dependence on speed. (2 steps)", "answer": "- Step 1: In **laminar flow**, fluid moves in smooth, parallel layers that do not mix. The drag is purely viscous and rises linearly with speed ($$F \\propto v$$).\n- Step 2: In **turbulent flow**, the layers break into chaotic swirling eddies. Energy is lost to these vortices, causing drag to rise much more steeply, typically with the square of the speed ($$F \\propto v^2$$).\n\nThe transition between them depends on the Reynolds number; Stokes' Law strictly applies only to the laminar regime.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Why does a falling object eventually reach a constant \"terminal velocity\" rather than accelerating indefinitely? (3 steps)", "answer": "- Step 1: At the start, weigh
