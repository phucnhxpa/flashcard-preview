t exceeds drag (and upthrust), so there is a large net downward force and large acceleration. The object speeds up.\n- Step 2: As speed increases, the drag force (which opposes motion) also increases. This reduces the net downward force, meaning the acceleration decreases (the object still speeds up, just more slowly).\n- Step 3: Eventually, drag grows large enough to exactly balance the weight (and upthrust). The net force becomes zero, acceleration drops to zero, and the speed stops increasing. The object cannot go faster, because if it did, drag would exceed weight and push it back down.\n\nTerminal velocity exists because drag is a self-limiting force that grows with speed.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "A skydiver is falling and their acceleration is decreasing, but still points downward. Is the skydiver speeding up or slowing down? Explain the distinction. (3 steps)", "answer": "- Step 1: The skydiver is **speeding up**. Acceleration is the rate of change of velocity; as long as acceleration is in the same direction as velocity (downward), the speed increases.\n- Step 2: A *decreasing* acceleration does not mean deceleration. It means the *rate* at which they are speeding up is slowing down. They are gaining fewer m/s each second, but the total m/s is still increasing.\n- Step 3: Deceleration (slowing down) only begins when the resultant force (and thus acceleration) points *opposite* to the direction of motion (e.g., when a parachute opens, creating an upward resultant force).\n\nThis is a critical distinction: decreasing acceleration $$\\neq$$ deceleration.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Write the force balance equation for a sphere falling at terminal velocity in a fluid. Identify the direction of each force. (2 steps)", "answer": "- Step 1: At terminal velocity, the resultant force is zero, so downward forces equal upward forces. The equation is $$W = U + F_D$$.\n- Step 2: Weight ($$W$$) acts downward. Upthrust ($$U$$) and Viscous Drag ($$F_D$$) both act upward. Drag opposes the downward motion, and upthrust is the buoyant push of the fluid.\n\nIf upthrust is negligible (e.g., a dense ball in air), this simplifies to $$W = F_D$$.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Derive the formula for the terminal velocity of a sphere from the force balance equation $$W = U + F_D$$. (5 steps)", "answer": "- Step 1: Substitute the formulas for each force. Weight: $$\\rho_s \\frac{4}{3}\\pi r^3 g$$. Upthrust: $$\\rho_f \\frac{4}{3}\\pi r^3 g$$. Drag: $$6\\pi\\eta r v_t$$.\nEquation: $$\\rho_s \\frac{4}{3}\\pi r^3 g = \\rho_f \\frac{4}{3}\\pi r^3 g + 6\\pi\\eta r v_t$$.\n- Step 2: Group the volume terms together on the left: $$\\frac{4}{3}\\pi r^3 g (\\rho_s - \\rho_f) = 6\\pi\\eta r v_t$$.\n- Step 3: Isolate the drag term by moving it to one side (already done). Now, solve for $$v_t$$ by dividing both sides by $$6\\pi\\eta r$$.\n- Step 4: Write the expression: $$v_t = \\frac{4\\pi r^3 g (\\rho_s - \\rho_f)}{18\\pi\\eta r}$$.\n- Step 5: Cancel $$\\pi$$ and one power of $$r$$ ($$r^3/r = r^2$$). Simplify the fraction $$4/18$$ to $$2/9$$.\nFinal: $$v_t = \\frac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$.\n\nNote the driving force depends on the density *difference* ($$\\rho_s - \\rho_f$$), and the $$r^2$$ dependence shows larger spheres fall much faster.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "A steel ball and an aluminum ball of the *same radius* are dropped into oil. Which reaches a higher terminal velocity and why? (2 steps)", "answer": "- Step 1: The terminal velocity formula is $$v_t = \\frac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$. Since radius $$r$$, fluid density $$\\rho_f$$, and viscosity $$\\eta$$ are the same, $$v_t$$ depends only on the sphere density $$\\rho_s$$.\n- Step 2: Steel is denser than aluminum ($$\\rho_{steel} > \\rho_{aluminum}$$). A larger $$\\rho_s$$ results in a larger density difference ($$\\rho_s - \\rho_f$$), meaning a larger driving force relative to the drag. Therefore, the **steel ball** reaches a higher terminal velocity.\n\nThe denser object must fall faster to generate enough drag to balance its heavier weight.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "In the falling-ball viscometer experiment (Core Practical 4), why is the ball timed only between two marks *below* the surface, rather than from the moment of release? (2 steps)", "answer": "- Step 1: When released, the ball accelerates from rest. During this phase, its speed is changing and drag is building up. The force balance $$W = U + F_D$$ (and thus $$v = s/t$$) is only valid at constant terminal velocity.\n- Step 2: The marks are placed below the surface to ensure the ball has reached terminal velocity before timing starts. If timed from release, the average speed would be lower than terminal velocity, leading to an overestimation of the viscosity.\n\nThe starting line must be far enough down to allow the drag to grow until it balances the weight.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "In Core Practical 4, why is it better to plot a graph of terminal velocity $$v_t$$ against $$r^2$$ for several ball bearings rather than calculating $$\\eta$$ from a single run? (2 steps)", "answer": "- Step 1: A single run contains random errors (reaction time, measuring $$r$$). Plotting a graph and taking a line of best fit averages out these random errors.\n- Step 2: The relationship $$v_t = \\frac{2g(\\rho_s-\\rho_f)}{9\\eta} r^2$$ predicts a straight line through the origin. If the points curve at high $$r^2$$, it indicates the flow has become turbulent (Stokes' Law fails), validating the experimental conditions.\n\nThe gradient $$k = \\frac{2g(\\rho_s-\\rho_f)}{9\\eta}$$ allows for a more reliable calculation of $$\\eta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Derive the SI base units of viscosity using Stokes' Law $$F = 6\\pi\\eta r v$$. (3 steps)", "answer": "- Step 1: Rearrange the equation to make $$\\eta$$ the subject: $$\\eta = \\frac{F}{6\\pi r v}$$. The constant $$6\\pi$$ has no units.\n- Step 2: Substitute the SI base units for Force ($$N = \\text{kg m s}^{-2}$$), radius ($$m$$), and velocity ($$\\text{m s}^{-1}$$): $$[\\eta] = \\frac{\\text{kg m s}^{-2}}{(\\text{m})(\\text{m s}^{-1})} = \\frac{\\text{kg m s}^{-2}}{\\text{m}^2 \\text{s}^{-1}}$$.\n- Step 3: Simplify to get $$\\text{kg m}^{-1} \\text{s}^{-1}$$. This is equivalent to $$\\text{N s m}^{-2}$$ or $$\\text{Pa s}$$.\n\nDimensional analysis is a powerful tool to check if an unfamiliar unit (like $$\\text{Pa s}$$) matches the formula.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "A skydiver opens their parachute. Describe the immediate change in forces and the resulting motion (acceleration) just after the parachute opens. (3 steps)", "answer": "- Step 1: Opening the parachute drastically increases the surface area. Since drag depends on area and speed, the drag force immediately spikes, becoming much larger than the weight.\n- Step 2: Because Drag > Weight, there is now a large net force *upward* (opposite to the direction of motion).\n- Step 3: By Newton's Second Law, this upward resultant force causes an upward acceleration (deceleration). The skydiver slows down rapidly.\n\nAs the skydiver slows, drag decreases until it matches weight again, establishing a new, much lower terminal velocity.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Sketch the general shape of the resultant force-time graph for an object dropped from rest in a fluid. What is the value of the resultant force at $$t=0$$ and at terminal velocity? (3 steps)", "answer": "- Step 1: At $$t=0$$, the object is released from rest, so drag is zero. The resultant force is maximum (equal to Weight minus Upthrust).\n- Step 2: As the object speeds up, drag increases, reducing the net downward force. The graph curves downwards, approaching zero.\n- Step 3: At terminal velocity, the forces balance, so the resultant force is **zero**. The graph flattens out along the time axis.\n\nThe shape mirrors the acceleration-time graph exactly, since $$F = ma$$ and mass is constant.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "A micrometer reads $$+0.02 \\text{ mm}$$ when fully closed. If a ball bearing reads $$5.50 \\text{ mm}$$, what is the true diameter? Explain the logic of the correction. (2 steps)", "answer": "- Step 1: A reading of $$+0.02 \\text{ mm}$$ when closed is a positive zero error (the instrument reads too high). The rule is $$\\text{Actual} = \\text{Observed} - \\text{Zero Error}$$.\n- Step 2: Subtract the error from the reading: $$5.50 - 0.02 = 5.48 \\text{ mm}$$. We subtract because the instrument is \"lying\" to us by adding 0.02 to everything.\n\nIf the error were negative (e.g., $$-0.02$$), subtracting a negative would effectively add the correction back.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "A sphere has a radius of $$1.0 \\text{ cm}$$. When calculating its volume in SI units ($$\\text{m}^3$$), a common mistake is to get $$10^{-2} \\text{ m}^3$$. What is the correct order of magnitude for the volume, and why is the cube of the prefix factor important? (2 steps)", "answer": "- Step 1: The radius is $$1.0 \\times 10^{-2} \\text{ m}$$. The volume is $$V = \\frac{4}{3}\\pi r^3$$. Substituting the radius gives $$(10^{-2})^3 = 10^{-6}$$.\n- Step 2: The correct volume is on the order of $$10^{-6} \\text{ m}^3$$ (roughly $$4.2 \\times 10^{-6} \\text{ m}^3$$). The mistake comes from cubing the number but forgetting to cube the power of 10, leading to an error factor of $$10^4$$.\n\nAlways convert units *before* cubing, and remember that $$1 \\text{ cm}^3 = 10^{-6} \\text{ m}^3$$, not $$10^{-2} \\text{ m}^3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "A fully submerged object rests on the bottom of the tank. Compare the magnitudes of its Weight and the Upthrust. (2 steps)", "answer": "- Step 1: Because the object is resting on the bottom, it is in equilibrium. The downward forces must balance the upward forces.\n- Step 2: The forces are Weight (down), Upthrust (up), and the Normal contact force from the bottom of the tank (up). Therefore, $$W = U + N$$. This implies **Weight is greater than Upthrust**.\n\nThe object sinks because its weight exceeds the maximum possible upthrust (which occurs when fully submerged), requiring the floor to supply the missing upward force.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "A cork (density less than water) is held fully submerged and then released. Describe the direction of the resultant force at the instant of release (ignoring drag). (2 steps)", "answer": "- Step 1: When fully submerged, the volume of displaced water equals the total volume of the cork. The upthrust is $$U = \\rho_f V g$$.\n- Step 2: The weight is $$W = \\rho_s V g$$. Since the cork's density is less than water's ($$\\rho_s < \\rho_f$$), the upthrust is larger than the weight. The resultant force is **upward**.\n\nThe cork accelerates upwards towards the surface where it will float with a smaller submerged volume, reducing upthrust to match weight.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "A cube with sides of $$0.10 \\text{ m}$$ is fully submerged in water (density $$1000 \\text{ kg m}^{-3}$$). Using $$g = 10 \\text{ N kg}^{-1}$$, calculate the upthrust. (3 steps)", "answer": "- Step 1: Calculate the submerged volume. $$V = 0.10 \\times 0.10 \\times 0.10 = 0.001 \\text{ m}^3$$ (or $$10^{-3} \\text{ m}^3$$).\n- Step 2: Identify the fluid density ($$\\rho_f = 1000 \\text{ kg m}^{-3}$$) and gravity ($$g = 10 \\text{ N kg}^{-1}$$).\n- Step 3: Apply the upthrust formula: $$U = \\rho_f V g = 1000 \\times 0.001 \\times 10 = 10 \\text{ N}$$.\n\nNotice how easy the math is when you pick \"nice\" numbers; the conceptual step is ensuring you use the *fluid* density and the *submerged* volume.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A sphere of radius $$1 \\text{ mm}$$ moves at $$2 \\text{ m s}^{-1}$$ through a fluid of viscosity $$1 \\text{ Pa s}$$. Estimate the drag force (order of magnitude and value). (2 steps)", "answer": "- Step 1: Use Stokes' Law $$F = 6\\pi\\eta r v$$. Approximate $$6\\pi$$ as roughly 18 (or just under 20). Convert radius to meters: $$1 \\text{ mm} = 10^{-3} \\text{ m}$$.\n- Step 2: Substitute: $$F \\approx 18 \\times 1 \\times 10^{-3} \\times 2 = 36 \\times 10^{-3} \\text{ N} = 0.036 \\text{ N}$$. The order of magnitude is $$10^{-2} \\text{ N}$$.\n\nSmall spheres at low speeds in viscous fluids experience very small drag forces.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A rod of mass $$0.1 \\text{ kg}$$ and cross-section $$10^{-3} \\text{ m}^2$$ floats in water ($$1000 \\text{ kg m}^{-3}$$). Calculate the submerged depth. (2 steps)", "answer": "- Step 1: Use the floating rod relation $$m = \\rho_f A \\Delta h$$. Rearrange for depth: $$\\Delta h = \\frac{m}{\\rho_f A}$$.\n- Step 2: Substitute values: $$\\Delta h = \\frac{0.1}{1000 \\times 10^{-3}} = \\frac{0.1}{1} = 0.1 \\text{ m}$$ (or 10 cm).\n\nThis simple calculation confirms that 0.1 kg of water occupies a volume of $$10^{-4} \\text{ m}^3$$, which over an area of $$10^{-3} \\text{ m}^2$$ gives a height of 0.1 m.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "A raindrop falling at high speed in air is often modelled with Stokes' Law in simple textbook problems. Why is this physically inconsistent, even if mathematically convenient for the question? (2 steps)", "answer": "- Step 1: Stokes' Law requires laminar flow (low Reynolds number). A typical raindrop is relatively large and falls fast (e.g., $$2 \\text{ m/s}$$), while air has a very low viscosity.\n- Step 2: Calculating the Reynolds number for such a drop yields a value much greater than 1 (often >100). This indicates inertial forces dominate and the flow is turbulent, meaning the drag should be proportional to $$v^2$$, not $$v$$.\n\nThe model is stretched beyond its valid limit; you answer the exam question as asked, but should recognize the physical inaccuracy.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A floating object is moved from fresh water to salt water. What happens to the upthrust and the submerged volume? (3 steps)", "answer": "- Step 1: Because the object still floats, its weight is unchanged. For the forces to remain balanced, the upthrust must remain exactly equal to the weight. Thus, upthrust **does not change**.\n- Step 2: However, salt water is denser. Upthrust is $$U = \\rho_f V_{sub} g$$. To produce the same upthrust with a larger density fluid, a smaller submerged volume is required.\n- Step 3: Therefore, the submerged volume **decreases**. The object floats higher in salt water.\n\nThis is how a hydrometer works: the height it floats indicates the fluid density.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "A sphere is at terminal velocity $$v_t$$. If it were somehow forced to move at $$0.5 v_t$$, how would the drag force compare to its weight? (2 steps)", "answer": "- Step 1: At terminal velocity, drag equals the driving force ($$W - U$$). Since drag is proportional to velocity ($$F \\propto v$$), halving the velocity halves the drag.\n- Step 2: At half the speed, drag is only $$0.5$$ of the driving force. Since weight (and upthrust) are constant, the net force is now downward, and the object is no longer in equilibrium; it would accelerate back towards $$v_t$$.\n\nTerminal velocity is a stable equilibrium; perturbations from it result in forces that push the system back to the balance point.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "A hydrometer floats higher in a salt solution than in pure water. Explain what this indicates about the density of the salt solution. (2 steps)", "answer": "- Step 1: The hydrometer's mass is fixed, so the weight of the fluid displaced must be the same in both liquids to balance it.\n- Step 2: Floating \"higher\" means a smaller volume is submerged. To achieve the same displaced weight with a smaller volume, the fluid must be **denser**. Therefore, the salt solution is denser than pure water.\n\nA smaller \"hole\" in a denser fluid weighs the same as a larger \"hole\" in a less dense fluid.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}], "count": 35}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "A vernier caliper has a main scale and a sliding vernier scale. What is the step-by-step procedure to read it, and why does reading the \"wrong part\" of the scale give a completely wrong integer part? (3 steps)", "answer": "- Step 1: Read the main scale at the mark *immediately to the left of* the vernier zero line. This gives the whole-number and first-decimal part of the measurement. The common mistake is reading from the vernier (sliding) scale instead — that scale only supplies the final decimal digit, and using it for the integer gives a value that can be off by over a centimetre.\n- Step 2: Find the single vernier line that aligns exactly with any main-scale line. The number of that vernier division is the next decimal place.\n- Step 3: Add the two readings together. For a 10-division vernier the resolution is $$0.1\\,\\text{mm}=0.01\\,\\text{cm}$$; for a 50-division vernier it is $$0.02\\,\\text{mm}$$.\n\nThe integer part *must* come from the main scale because the vernier scale is short (typically 1 cm for 10 divisions) and its numbers do not represent centimetres — they represent the fine decimal only.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "An instrument reads a non-zero value when it should read zero. State the correction rule and explain why a *negative* zero error requires *adding*, not subtracting. (2 steps)", "answer": "- Step 1: The rule is $$\\text{actual reading} = \\text{observed reading} - \\text{zero error}$$. This single formula handles both signs automatically.\n- Step 2: A negative zero error (e.g. $$-0.07\\,\\text{cm}$$) means the instrument reads *too low* by $$0.07\\,\\text{cm}$$. Substituting into the rule: $$\\text{actual} = \\text{observed} - (-0.07) = \\text{observed} + 0.07$$. The double negative becomes addition because the instrument was already under-reading. Conversely, a positive zero error means the instrument reads too high, so subtracting a positive value corrects it downward.\n\nThe key insight: always apply the same formula — the sign of the zero error takes care of the direction of correction automatically.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "A micrometer screw gauge has a barrel scale in 0.5 mm steps and a 50-division thimble. What is its resolution, and why does the resolution matter for the falling-ball viscosity experiment in particular? (2 steps)", "answer": "- Step 1: Each thimble division represents $$0.01\\,\\text{mm}$$ (since $$0.5\\,\\text{mm}/50 = 0.01\\,\\text{mm}$$). The resolution is therefore $$0.01\\,\\text{mm}$$.\n- Step 2: In the falling-ball experiment, terminal velocity depends on $$r^2$$, so a tiny error in $$r$$ is squared. A $$0.01\\,\\text{mm}$$ error on a $$1\\,\\text{mm}$$ radius is a 1% error in $$r$$, but roughly a 2% error in $$r^2$$ — and therefore in $$v_t$$ and the calculated $$\\eta$$. A ruler (resolution ~1 mm) would introduce ~100% error in $$r^2$$, making the experiment useless. This is why a micrometer is essential.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Density is called an \"intensive property,\" meaning a steel pin and a steel girder have the same density. Explain what this means and why it is relevant when deciding whether an object will float. (2 steps)", "answer": "- Step 1: An intensive property does not depend on the amount of material. Density $$\\rho = m/V$$ stays the same regardless of size because both mass and volume scale together — doubling the volume doubles the mass, leaving $$\\rho$$ unchanged.\n- Step 2: Whether an object floats depends only on the *comparison* of its average density $$\\rho_s$$ with the fluid density $$\\rho_f$$ — not on its mass or volume individually. A tiny steel ball sinks, and a huge steel ship of the *same* steel would also sink if it were solid. The ship only floats because its hollow shape gives it a much *lower average density* than solid steel.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "Pressure in a fluid increases linearly with depth: $$P = \\rho g h$$. Explain *why* this is the physical origin of upthrust — what would happen if pressure were the same at all depths? (3 steps)", "answer": "- Step 1: In a real fluid, a deeper point supports a taller column of fluid above it, so the pressure is higher. This means the bottom face of a submerged object sits at a higher pressure than its top face.\n- Step 2: The higher pressure on the bottom face pushes *up* harder than the lower pressure on the top face pushes *down*. The horizontal pressures cancel (left = right), but the vertical pressures do not — the net result is an upward force: upthrust.\n- Step 3: If pressure were the same at all depths (no $$\\rho g h$$ gradient), the forces on the top and bottom faces would be equal and opposite, cancelling completely. There would be no upthrust at all — objects would not float, and Archimedes' Principle would not exist. The pressure gradient is the *cause*; upthrust is the *consequence*.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "Derive the upthrust formula $$U = \\rho_f V g$$ from the pressure-difference picture for a rectangular block of cross-section $$A$$ and height $$L$$ submerged with its top at depth $$h_1$$ and its bottom at depth $$h_2 = h_1 + L$$. (5 steps)", "answer": "- Step 1: Write the pressure at each face using $$P = \\rho_f g h$$. Top face: $$P_1 = \\rho_f g h_1$$. Bottom face: $$P_2 = \\rho_f g h_2$$.\n- Step 2: Convert each pressure to a force by multiplying by the cross-sectional area $$A$$: $$F_{\\text{down}} = P_1 A = \\rho_f g h_1 A$$ and $$F_{\\text{up}} = P_2 A = \\rho_f g h_2 A$$.\n- Step 3: The net upward force (upthrust) is the difference: $$U = F_{\\text{up}} - F_{\\text{down}} = \\rho_f g A (h_2 - h_1)$$.\n- Step 4: Recognise that $$h_2 - h_1 = L$$, the height (length) of the block, so $$U = \\rho_f g A L$$.\n- Step 5: Since $$A \\times L = V$$ (the submerged volume), we get $$U = \\rho_f V g$$. Notice: $$h_1$$ cancelled out entirely — upthrust does not depend on how deep the object is, only on the displaced volume.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Archimedes' Principle says \"upthrust equals the weight of fluid displaced.\" A second way to understand this is the \"replace-with-fluid\" thought experiment. Describe this argument and explain why the surrounding fluid \"cannot tell the difference.\" (3 steps)", "answer": "- Step 1: Imagine scooping out the submerged part of the object and replacing it with a blob of fluid that has exactly the same shape and volume. This fluid-blob is just part of the surrounding fluid, sitting in equilibrium.\n- Step 2: Since the fluid-blob is in equilibrium, the surrounding fluid must be pushing it up with a force equal to its own weight: $$U = \\rho_f V g$$. Nothing else is holding it up — it is just sitting there, supported by pressure.\n- Step 3: The surrounding fluid cannot tell the difference between the original object and the fluid-blob replacement — the shape and position are the same, so the pressure distribution is the same. Therefore the surrounding fluid pushes up on the real object with exactly the same upthrust $$U = \\rho_f V g$$. This elegant argument proves Archimedes' Principle without any algebra.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "A student calculates upthrust using $$U = \\rho_s V g$$ (the *object's* density). Explain why this is wrong, and identify the scenario where it would *accidentally* give the right answer — making it a dangerous trap. (3 steps)", "answer": "- Step 1: Upthrust is about the *fluid* that has been pushed aside. The correct formula is $$U = \\rho_f V g$$, where $$\\rho_f$$ is the **fluid's** density. The object's density $$\\rho_s$$ determines its *weight* $$W = \\rho_s V g$$, not the upthrust.\n- Step 2: Using $$\\rho_s$$ would give the object's weight, not the upthrust. For a dense object in a light fluid (e.g. steel in water), $$\\rho_s \\gg \\rho_f$$, so the \"upthrust\" would be wildly overestimated — you'd conclude the object should float when it actually sinks.\n- Step 3: The dangerous exception: if the object is *neutrally buoyant* ($$\\rho_s = \\rho_f$$), then $$\\rho_s V g = \\rho_f V g$$ by coincidence, and the wrong formula gives the right number. This makes the error hard to catch in that one special case, but it is still conceptually wrong and will fail in every other situation.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Push a fully submerged block twice as deep in a uniform liquid. Does the upthrust change? Explain using the pressure on both faces. (3 steps)", "answer": "- Step 1: When you push the block deeper by some distance $$\\Delta h$$, the top face is now at depth $$h_1 + \\Delta h$$ and the bottom face at $$h_2 + \\Delta h$$.\n- Step 2: The pressure on *both* faces increases by the same amount: $$\\Delta P = \\rho_f g \\Delta h$$. So the upward force on the bottom increases by $$\\Delta P \\times A$$, and the downward force on the top also increases by $$\\Delta P \\times A$$.\n- Step 3: The *difference* between the two forces is unchanged — the equal increase on both sides cancels. Therefore upthrust is independent of depth. It depends only on the displaced volume $$V$$ and the fluid density $$\\rho_f$$.\n\nThis only holds if the fluid is uniform in density. In a gas (where density varies with height), the picture is more subtle.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "An object is only *partially* submerged. What volume should you use in $$U = \\rho_f V g$$, and what is the common mistake? (2 steps)", "answer": "- Step 1: You must use the **submerged** volume only — the part actually below the fluid surface. The part above the surface displaces air, not liquid, and the upthrust from air is negligible in this context.\n- Step 2: The common mistake is using the *total* volume of the object. This is only correct when the object is *fully* immersed. For a floating object, the total volume is larger than the submerged volume, so using it would overestimate the upthrust — potentially making it seem like the object should be pushed upward out of the fluid, which is physically wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "An object is released in a fluid. By comparing one specific quantity, you can predict whether it will float, sink, or hover at any depth. What is that quantity and what are the three outcomes? (3 steps)", "answer": "- Step 1: Compare the object's average density $$\\rho_s$$ with the fluid's density $$\\rho_f$$. Equivalently, compare the object's weight $$W = \\rho_s V g$$ with the maximum possible upthrust $$U_{\\max} = \\rho_f V g$$ (the upthrust if fully submerged).\n- Step 2: If $$\\rho_s < \\rho_f$$ (equivalently $$W < U_{\\max}$$): the object **floats** partially out of the fluid. It settles where the submerged volume displaces just enough fluid to balance its weight.\n- Step 3: If $$\\rho_s > \\rho_f$$ ($$W > U_{\\max}$$): even when fully submerged, upthrust cannot match weight, so the object **sinks** to the bottom. If $$\\rho_s = \\rho_f$$ ($$W = U_{\\max}$$): the object has **neutral buoyancy** — it hovers at any depth with no tendency to rise or sink.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Derive the fraction of a floating object that is submerged, showing that it equals $$\\rho_s / \\rho_f$$. (3 steps)", "answer": "- Step 1: For a floating object, equilibrium gives $$W = U$$. Write both in terms of densities: $$\\rho_s V_{\\text{tot}} g = \\rho_f V_{\\text{sub}} g$$.\n- Step 2: Cancel $$g$$ from both sides: $$\\rho_s V_{\\text{tot}} = \\rho_f V_{\\text{sub}}$$.\n- Step 3: Rearrange: $$\\frac{V_{\\text{sub}}}{V_{\\text{tot}}} = \\frac{\\rho_s}{\\rho_f}$$. The fraction submerged equals the ratio of the object's density to the fluid's density. For ice in seawater ($$\\rho_s = 920$$, $$\\rho_f = 1025$$), about 90% is submerged — the origin of \"tip of the iceberg.\"", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "A floating object is moved from fresh water to salt water. Does it float higher or lower? Explain using the floating-fraction formula. (2 steps)", "answer": "- Step 1: Salt water is denser than fresh water. The fraction submerged is $$\\rho_s / \\rho_f$$, so a larger $$\\rho_f$$ gives a *smaller* fraction submerged.\n- Step 2: The object floats **higher** in salt water. Less of it needs to be submerged to displace the same weight of fluid, because each unit of displaced volume now \"weighs more\" (higher $$\\rho_f$$). The object's weight hasn't changed, but the same weight of displaced fluid is achieved with a smaller submerged volume.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Derive the floating-rod relation $$m = \\rho_f A \\Delta h$$ from first principles, and explain what each symbol represents. (4 steps)", "answer": "- Step 1: Start from the floating equilibrium condition: $$W = U$$, i.e. the object's weight equals the upthrust.\n- Step 2: Substitute the force formulas: $$mg = \\rho_f V g$$, where $$V$$ is the submerged volume.\n- Step 3: For a vertical cylinder, the submerged volume is $$V = A \\Delta h$$, where $$A$$ is the cross-sectional area and $$\\Delta h$$ is the depth below the surface. So $$mg = \\rho_f A \\Delta h g$$.\n- Step 4: Cancel $$g$$: $$m = \\rho_f A \\Delta h$$. Here $$m$$ is the object's mass, $$\\rho_f$$ is the *fluid's* density, $$A$$ is the cylinder's cross-section, and $$\\Delta h$$ is the submerged depth. This is a powerful sensitivity relation: changing any one quantity while holding the others fixed tells you exactly how $$\\Delta h$$ responds.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Using $$m = \\rho_f A \\Delta h$$, explain what happens to the submerged depth if you increase the rod's mass (holding area and fluid constant), and why the *weight* formula $$W = mg$$ is not the right tool for this reasoning. (3 steps)", "answer": "- Step 1: Rearrange: $$\\Delta h = m / (\\rho_f A)$$. With $$\\rho_f$$ and $$A$$ fixed, $$\\Delta h$$ is directly proportional to $$m$$. More mass means a deeper float.\n- Step 2: Physically: a heavier rod needs more displaced fluid to provide a larger upthrust. With the same cross-section, the only way to displace more fluid is to sink deeper.\n- Step 3: The formula $$W = mg$$ only tells you the weight; it doesn't connect to the displaced volume. The rod relation $$m = \\rho_f A \\Delta h$$ is the right tool because it explicitly links the object's mass to the submerged depth through the fluid density and cross-section. Using $$W = mg$$ alone would leave you stuck — you'd know the weight but not how deep the rod must sit to balance it.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "A rod floats in a liquid. Its diameter is increased while its mass and the fluid are kept the same. Does it float higher or lower, and why might a student mistakenly say \"deeper\"? (3 steps)", "answer": "- Step 1: From $$\\Delta h = m / (\\rho_f A)$$, with $$m$$ and $$\\rho_f$$ fixed and $$A$$ increased (larger diameter), the submerged depth $$\\Delta h$$ **decreases** — the rod floats higher.\n- Step 2: The physical reasoning: a wider rod displaces more fluid per unit of depth, so it needs less depth to displace the same weight of fluid. The same mass is supported by a shorter, wider column of displaced liquid.\n- Step 3: The mistake occurs when a student lets *two* variables change simultaneously — they imagine a larger diameter rod must also have more mass, and then conclude \"more mass → deeper.\" The fix: change *one* variable at a time. Here, mass is explicitly held constant; only the diameter changes.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "A rod floats in a liquid. The liquid is replaced with one of lower density (same rod, same mass). What happens to the submerged depth, and explain the physical mechanism? (2 steps)", "answer": "- Step 1: From $$\\Delta h = m / (\\rho_f A)$$, with $$m$$ and $$A$$ fixed and $$\\rho_f$$ decreased, the submerged depth $$\\Delta h$$ **increases** — the rod sinks lower.\n- Step 2: Each unit of displaced volume now provides less upthrust (because the fluid is lighter), so the rod must displace a *larger* volume to balance the same weight. With the same cross-section, that means going deeper. This is why objects tend to float lower in less dense fluids (e.g. a ship rides lower in fresh water than in salt water).", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "An object has weight $$W_1$$ when measured in air on a spring balance, and weight $$W_2$$ when fully submerged in a fluid. Derive the relationship between upthrust and these two readings, and explain why the balance reads *less* when submerged. (3 steps)", "answer": "- Step 1: In air, the balance reads the object's true weight: $$W_1 = mg$$. When submerged, the fluid pushes up on the object with upthrust $$U$$, so the balance now supports less of the weight.\n- Step 2: Force balance on the submerged object (at rest): $$W_1 = U + W_2$$, where $$W_2$$ is the reading on the balance. The upthrust \"relieves\" the balance of some of the load.\n- Step 3: Rearranging: $$U = W_1 - W_2$$. The apparent loss of weight equals the upthrust. This is the \"apparent-weight method\" — you can find the upthrust from two simple weighings, and then use $$U = \\rho_f V g$$ to find the fluid density, the object's volume, or the upthrust itself.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "You have found upthrust $$U = W_1 - W_2$$ by the apparent-weight method, and you also know the displaced volume $$V$$ from the change in fluid level. Show how to find the fluid's density, and explain why the *object's* density is not needed. (3 steps)", "answer": "- Step 1: Start from the upthrust formula: $$U = \\rho_f V g$$.\n- Step 2: Rearrange for the fluid density: $$\\rho_f = U / (Vg) = (W_1 - W_2) / (Vg)$$.\n- Step 3: The object's density $$\\rho_s$$ never appears. Upthrust depends only on the *fluid* displaced, not on what the object is made of. The object could be brass, aluminium, or plastic — as long as you know the upthrust (from the weight difference) and the displaced volume, the fluid density follows. This is the power of the method: you can find $$\\rho_f$$ without knowing anything about the object's material.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "A multiple-choice question asks which statement is correct about a floating object. One option says \"mass of liquid displaced = upthrust on object.\" Why is this wrong, even though it sounds right? (2 steps)", "answer": "- Step 1: Upthrust is a *force* measured in newtons (N). \"Mass of liquid displaced\" is a *mass* measured in kilograms (kg). A quantity in N cannot equal a quantity in kg — they are dimensionally incompatible.\n- Step 2: The correct statement is \"the *weight* of liquid displaced equals the upthrust on the object.\" Weight is mass times $$g$$: $$W_{\\text{displaced}} = m_{\\text{displaced}} \\times g$$. The missing factor of $$g$$ is the trap. This is a classic \"mass vs weight\" discriminator that examiners use to test whether you understand the distinction.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Viscosity is described as \"a fluid's internal friction.\" Explain what this means physically — what are the \"layers\" and why do they resist each other? (3 steps)", "answer": "- Step 1: When a fluid flows (or an object moves through it), different parts of the fluid move at different speeds. The fluid can be pictured as sliding in parallel layers (laminae).\n- Step 2: Adjacent layers moving at different speeds exert tangential (shear) forces on each other — faster layers drag slower ones forward, and slower ones drag faster ones back. This is the \"internal friction.\"\n- Step 3: Viscosity $$\\eta$$ quantifies how large these shear forces are. High viscosity (honey) means strong inter-layer forces — the fluid strongly resists deformation and flow. Low viscosity (water) means weak inter-layer forces — the fluid flows easily. The shear force per unit area between layers is proportional to the velocity gradient, and $$\\eta$$ is the constant of proportionality.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "When a liquid is heated, its viscosity decreases. Give the microscopic explanation for why this happens, and name a common everyday example. (2 steps)", "answer": "- Step 1: In a liquid, molecules are close together and the viscosity comes mainly from *intermolecular attractions* — neighbouring molecules cling to each other and resist being pulled apart. This is the source of the internal friction.\n- Step 2: Heating gives molecules more kinetic energy, allowing them to break free of their neighbours more easily. The attractions matter less, the layers slide past each other with less resistance, and the viscosity *falls*. Everyday example: warm honey runs much faster than cold honey — you can literally see the viscosity drop as the honey heats up.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "When a gas is heated, its viscosity *increases* — the opposite trend to a liquid. Give the microscopic explanation for why this happens. (2 steps)", "answer": "- Step 1: In a gas, molecules are far apart and intermolecular attractions are negligible. Viscosity instead comes from molecules *diffusing between layers* and carrying momentum across. A molecule from a fast layer wanders into a slow layer and speeds it up; a slow-layer molecule entering a fast layer slows it down. This momentum transfer is the gas's internal friction.\n- Step 2: Heating makes gas molecules move faster, so they cross between layers more frequently and carry more momentum per crossing. The layers \"grip\" each other more strongly, and viscosity *increases*. This is why the viscosity-temperature graph slopes upward for gases but downward for liquids — the microscopic mechanisms are fundamentally different.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "Rank these fluids by viscosity (lowest to highest): water, honey, air, motor oil. Approximately how many times more viscous is honey than water? (2 steps)", "answer": "- Step 1: From lowest to highest viscosity: **air** ($$\\sim 1.8 \\times 10^{-5}$$ Pa·s), **water** ($$\\sim 1.0 \\times 10^{-3}$$ Pa·s), **motor oil** ($$\\sim 0.1\\text{–}1$$ Pa·s), **honey** ($$\\sim 10$$ Pa·s).\n- Step 2: Honey is roughly $$10 / 0.001 = 10{,}000$$ times more viscous than water. This enormous range is why a ball bearing falls through water in seconds but creeps through honey for minutes — same physics, different $$\\eta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "State Stokes' Law $$F = 6\\pi\\eta r v$$ and identify what each symbol represents, including its SI unit. Why is the factor $$6\\pi$$ not just \"1\"? (3 steps)", "answer": "- Step 1: $$F$$ is the viscous drag force on the sphere (N), $$\\eta$$ is the viscosity of the fluid (Pa·s), $$r$$ is the **radius** of the sphere (m), and $$v$$ is the speed of the sphere relative to the fluid (m/s).\n- Step 2: The factor $$6\\pi$$ arises from the exact mathematical solution to the Navier-Stokes equations for a sphere in creeping (low-Re) flow. It is not arbitrary — it is the result of integrating the viscous stress over the entire surface of the sphere.\n- Step 3: The $$6\\pi$$ factor is dimensionless (a pure number), so it does not affect the unit analysis. But it is essential for getting the *magnitude* of the force correct. In calculations, evaluate $$6\\pi \\approx 18.85$$ to sufficient significant figures — rounding it to \"20\" introduces ~6% error.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "State all conditions that must be satisfied for Stokes' Law to be valid, and explain what happens if any one of them fails. (4 steps)", "answer": "- Step 1: The object must be a **small, smooth sphere**. If it is rough or non-spherical, the flow pattern changes and the simple formula breaks down.\n- Step 2: It must move at **low speed**. At high speed, the flow transitions from orderly to chaotic.\n- Step 3: The flow must be **laminar** (smooth parallel layers, no turbulence). Once turbulence forms, drag rises roughly with $$v^2$$ instead of $$v$$, and Stokes' Law is completely invalid.\n- Step 4: There must be **no wall effects** — the container must be much wider than the sphere so the fluid is effectively unbounded. A narrow container constrains the flow and increases the drag beyond what Stokes predicts. If any one condition fails, the formula $$F = 6\\pi\\eta r v$$ gives the wrong force — you cannot use it for aeroplanes, cyclists, or a ball in a narrow tube.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "In laminar flow, drag is proportional to $$v$$ (Stokes' Law). In turbulent flow, drag is roughly proportional to $$v^2$$. Explain why this difference matters for whether a terminal velocity *exists*. (3 steps)", "answer": "- Step 1: For terminal velocity to exist, drag must *grow with speed* so that it can eventually balance the constant weight. Both $$v$$ and $$v^2$$ grow with speed, so both cases allow a terminal velocity.\n- Step 2: The key difference is the *shape* of the force balance. With Stokes' drag ($$F \\propto v$$), there is exactly one speed where drag matches weight — a clean, unique terminal velocity. The formula simplifies neatly to $$v_t = 2r^2 g(\\rho_s - \\rho_f)/(9\\eta)$$.\n- Step 3: With turbulent drag ($$F \\propto v^2$$), a terminal velocity still exists but the formula is different and the speed is higher. The practical significance: if you wrongly apply Stokes' Law to a turbulent situation, you'll underestimate the drag and overestimate the terminal velocity. The transition from laminar to turbulent is marked by the Reynolds number exceeding ~1000.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "What is the Reynolds number, and how does it quantitatively explain *why* the Stokes' Law conditions exist? (3 steps)", "answer": "- Step 1: The Reynolds number $$Re = \\rho_f v L / \\eta$$ compares inertial forces (which tend to keep the fluid moving in chaotic patterns) with viscous forces (which tend to keep the flow smooth and orderly). For a sphere, the length scale $$L$$ is the diameter $$2r$$.\n- Step 2: When $$Re \\lesssim 1$$, viscous forces dominate — the flow is laminar and Stokes' Law holds. This is the regime of \"small, slow objects in viscous fluids.\" When $$Re \\gtrsim 1000$$, inertial forces dominate — the flow becomes turbulent and Stokes' Law fails.\n- Step 3: This single number explains all the Stokes conditions simultaneously: a small sphere (small $$L$$) gives small $$Re$$; a low speed gives small $$Re$$; a high viscosity gives small $$Re$$. The conditions \"small,\" \"slow,\" and \"viscous\" are all just ways of saying \"keep $$Re$$ small.\"", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "A common exam question treats a raindrop using Stokes' Law, but the Reynolds number is actually ~130. Does Stokes' Law apply? What should you do in the exam? (2 steps)", "answer": "- Step 1: Physically, no — at $$Re \\approx 130 \\gg 1$$, the flow is turbulent and Stokes' Law significantly underestimates the drag. A real raindrop at that speed experiences much more drag than $$6\\pi\\eta r v$$ predicts.\n- Step 2: In the exam, **use Stokes' Law if the question tells you to**. The exam is testing your ability to apply the formula, not your knowledge of when it breaks down. Answer as asked, but be aware that the model is being stretched. This awareness is valuable for \"evaluate\" or \"discuss\" questions where you can gain extra marks by noting the limitation.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "Explain *why* a falling object in a fluid must reach a terminal velocity — why can't it keep accelerating forever? (3 steps)", "answer": "- Step 1: The downward force (weight, minus upthrust) is constant — it doesn't change with speed. But the opposing drag force *grows with speed* (Stokes: $$F \\propto v$$; turbulent: $$F \\propto v^2$$).\n- Step 2: At low speed, drag is small, so the net force is large and downward — the object accelerates. As it speeds up, drag grows, so the net force shrinks. The acceleration decreases but the speed still increases.\n- Step 3: There is exactly one speed where drag (plus upthrust) has grown just enough to equal the weight. At that speed, the net force is zero, acceleration is zero, and the speed stops changing. Beyond that speed, drag would exceed weight, producing a net upward force that *slows the object back down*. So the object can never overshoot — it asymptotically approaches terminal velocity. A force that grows with speed is the essential ingredient; a constant resistive force could not guarantee a stable equilibrium.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "Describe the three stages a sphere goes through when released from rest in a fluid, in terms of the forces and the acceleration. (3 steps)", "answer": "- Step 1: **Just released** ($$v = 0$$): Drag $$= 6\\pi\\eta r \\times 0 = 0$$. The only forces are weight $$W$$ (down) and upthrust $$U$$ (up). Since $$W > U$$ (the sphere is denser than the fluid), the resultant force is large and downward, so the initial acceleration is large.\n- Step 2: **Accelerating** ($$0 < v < v_t$$): Drag $$F_D = 6\\pi\\eta r v$$ grows with speed and opposes motion (upward). The resultant $$W - U - F_D$$ shrinks. The object still speeds up, but with ever-decreasing acceleration.\n- Step 3: **Terminal velocity** ($$v = v_t$$): Drag has grown until $$U + F_D = W$$. The resultant force is zero, so by Newton's First Law, the acceleration is zero and the speed is constant at $$v_t$$. The object continues at this speed indefinitely unless conditions change.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "At terminal velocity, write the force-balance equation in symbols and explain what each term represents and its direction. (2 steps)", "answer": "- Step 1: The balance is $$W = U + F_D$$. Weight $$W$$ acts downward (the gravitational pull on the object). Upthrust $$U$$ acts upward (the buoyant force from the displaced fluid). Viscous drag $$F_D$$ acts upward (opposing the downward motion).\n- Step 2: Equivalently, the resultant force is zero: $$W - U - F_D = 0$$. This is the condition for *dynamic equilibrium* — the object is moving, but at constant velocity (Newton's First Law). Note: the object is *not* in static equilibrium because it is moving; it is in *dynamic* equilibrium (zero resultant force, constant velocity).", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "Derive the terminal velocity formula $$v_t = \\frac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$ from the force balance $$W = U + F_D$$. (5 steps)", "answer": "- Step 1: Start from the terminal-velocity balance: $$W = U + F_D$$. Substitute the three force formulas using sphere volume $$V = \\frac{4}{3}\\pi r^3$$: $$\\rho_s \\left(\\frac{4}{3}\\pi r^3\\right) g = \\rho_f \\left(\\frac{4}{3}\\pi r^3\\right) g + 6\\pi\\eta r v_t$$.\n- Step 2: Both the weight and upthrust share the common factor $$\\frac{4}{3}\\pi r^3 g$$. Collect the drag term on one side: $$6\\pi\\eta r v_t = \\frac{4}{3}\\pi r^3 g (\\rho_s - \\rho_f)$$.\n- Step 3: Divide both sides by $$6\\pi\\eta r$$: $$v_t = \\frac{\\frac{4}{3}\\pi r^3 g(\\rho_s - \\rho_f)}{6\\pi\\eta r}$$.\n- Step 4: Simplify: $$\\frac{4/3}{6} = \\frac{4}{18} = \\frac{2}{9}$$, and cancel one power of $$r$$ from $$r^3/r = r^2$$, and cancel $$\\pi$$: $$v_t = \\frac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$.\n- Step 5: Check the dependencies: $$v_t \\propto r^2$$ (bigger spheres fall much faster), $$v_t \\propto 1/\\eta$$ (thicker fluid, slower fall), and $$v_t \\propto (\\rho_s - \\rho_f)$$ (the *density difference* drives the motion — upthrust matters). This formula is **not on the data sheet** — you must be able to derive it.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "Terminal velocity is proportional to $$r^2$$, not $$r$$. Explain why doubling the radius more than doubles the terminal velocity, by comparing how weight and drag-per-unit-speed scale with radius. (3 steps)", "answer": "- Step 1: Weight scales as volume: $$W \\propto r^3$$ (since $$V = \\frac{4}{3}\\pi r^3$$). Doubling the radius multiplies the weight by 8.\n- Step 2: At a given speed, Stokes' drag scales as $$r$$: $$F_D \\propto r$$ (since $$F = 6\\pi\\eta r v$$). Doubling the radius only doubles the drag at the same speed.\n- Step 3: To restore balance ($$W = U + F_D$$), the speed must increase until the drag catches up with the extra weight. Since drag grows as $$r \\times v$$ but weight grows as $$r^3$$, we need $$v \\propto r^3 / r = r^2$$. The mismatch between $$r^3$$ (weight) and $$r$$ (drag per unit speed) is exactly why $$v_t \\propto r^2$$ — the speed must \"compensate\" for the extra factor of $$r^2$$ in weight.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": true}, {"question": "A skydiver is falling and the drag force is increasing but still less than the weight. A student says \"the diver is slowing down.\" What is the misconception, and what is the correct description? (3 steps)", "answer": "- Step 1: The misconception is confusing *decreasing acceleration* with *decreasing velocity*. The student hears \"the resultant force is getting smaller\" and interprets that as \"slowing down.\"\n- Step 2: As long as the resultant force is *downward* (weight exceeds drag), the diver is still accelerating *downward* — still speeding up. The acceleration is decreasing (getting closer to zero), but the speed is still increasing. Think of it this way: pressing the accelerator less hard still makes you go faster, just not as quickly.\n- Step 3: The diver only begins to slow down when the resultant force points *upward* — which happens when drag exceeds weight (e.g. when the parachute opens). Deceleration requires an *upward* resultant, not merely a *smaller downward* resultant. This is the single most important conceptual fix in this topic.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "Sketch and describe the velocity-time graph for a ball bearing dropped from rest into oil. Identify where the acceleration is greatest and where it is zero. (3 steps)", "answer": "- Step 1: The graph starts at the origin ($$v = 0$$ at $$t = 0$$) and rises with a steep initial gradient. The gradient (= acceleration) is largest at $$t = 0$$ because drag is zero and the resultant force is maximum.\n- Step 2: As speed increases, drag grows and the acceleration decreases. The gradient becomes less steep — the curve bends over. The velocity is still increasing, but ever more slowly.\n- Step 3: The curve flattens to a horizontal asymptote at $$v = v_t$$. Here the gradient is zero — acceleration is zero, the speed is constant, and the resultant force is zero. The curve never crosses this line; it approaches it from below.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "How does the acceleration-time graph for a falling sphere relate to the resultant-force-time graph, and why do they have the same shape? (2 steps)", "answer": "- Step 1: By Newton's Second Law, $$a = F_{\\text{net}} / m$$. Since the mass $$m$$ is constant, acceleration is directly proportional to the resultant force. The two graphs are identical in shape, differing only by a constant factor $$1/m$$ on the vertical scale.\n- Step 2: Both graphs start at a maximum value (at release, drag is zero so $$F_{\\text{net}} = W - U$$ and $$a = (W - U)/m$$) and decay towards zero as drag builds up and the resultant force shrinks. At terminal velocity, both reach zero. This is why you can draw one graph and immediately infer the other.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "A skydiver falls, reaches terminal velocity, opens a parachute, and reaches a second (lower) terminal velocity. Describe the five phases in terms of force balance and the direction of the resultant force. (5 steps)", "answer": "- Step 1: **Initial fall:** $$W > U + F_D$$, resultant is *downward*. The diver accelerates downward — speed increases with a decreasing rate.\n- Step 2: **First terminal velocity:** $$W = U + F_D$$, resultant is *zero*. Acceleration is zero, speed is constant at $$v_{t1}$$ (the fast terminal velocity).\n- Step 3: **Parachute opens:** The surface area increases dramatically, so drag jumps to a much larger value: $$U + F_D \\gg W$$, resultant is *upward*. This causes a large *deceleration* — the diver slows down rapidly.\n- Step 4: **Slowing:** As the diver slows, drag decreases (since $$F_D \\propto v$$). The upward resultant shrinks but is still upward — the diver is still decelerating, just less vigorously.\n- Step 5: **Second terminal velocity:** Drag has fallen until $$U + F_D = W$$ again, resultant is *zero*. The diver now moves at a constant, lower speed $$v_{t2} < v_{t1}$$. At both terminal velocities, the drag equals the weight (assuming upthrust from air is negligible).", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "When a parachute opens, the acceleration points upward (deceleration). A student asks \"can the acceleration go below zero?\" Clarify what this means and whether the diver's velocity can reverse. (2 steps)", "answer": "- Step 1: \"Acceleration below zero\" in the coordinate system where down is positive means the acceleration is *negative* — i.e. directed upward. This is exactly what happens when the parachute opens: drag exceeds weight, so the net force and acceleration point upward. The diver decelerates. This is perfectly physical and expected.\n- Step 2: The diver's velocity *cannot* reverse (start going upward) because as the diver slows, drag decreases. By the time the speed reaches zero, drag would also be zero, and weight would pull the diver down again. In practice, the diver never reaches zero speed — they settle onto the second terminal velocity $$v_{t2}$$ which is still downward. The upward acceleration only exists while the speed is above $$v_{t2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "In Core Practical 4 (falling-ball viscometer), the ball is timed only between two marks *below* the surface, not from the point of release. Explain why timing from release would give the wrong viscosity. (3 steps)", "answer": "- Step 1: The formula $$\\eta = 2r^2 g(\\rho_s - \\rho_f)/(9v)$$ assumes the ball is at terminal velocity, where $$v$$ is constant. The speed $$v = s/t$$ measured between the marks must be the terminal velocity.\n- Step 2: When the ball is first released, it starts from rest and accelerates. In this accelerating phase, the speed is less than $$v_t$$ and is changing. If you include this phase in the timing, the measured $$v = s/t$$ is an *average* speed that is lower than the terminal velocity.\n- Step 3: Since $$\\eta \\propto 1/v$$, underestimating $$v$$ would *overestimate* $$\\eta$$. The starting mark is placed a few centimetres below the surface so that by the time the ball reaches it, it has already accelerated to terminal velocity. Only then is the speed constant and the formula valid.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "In Core Practical 4, a more reliable method uses several ball bearings of different radii and plots a graph. What is plotted on each axis, what shape should the graph be, and how is the viscosity extracted from the gradient? (3 steps)", "answer": "- Step 1: Plot terminal velocity $$v_t$$ on the vertical axis against $$r^2$$ on the horizontal axis. From $$v_t = \\frac{2g(\\rho_s - \\rho_f)}{9\\eta} r^2$$, the relationship is direct proportionality — a straight line through the origin.\n- Step 2: The gradient of the line is $$k = \\frac{2g(\\rho_s - \\rho_f)}{9\\eta}$$. Rearranging: $$\\eta = \\frac{2g(\\rho_s - \\rho_f)}{9k}$$.\n- Step 3: Using multiple balls and a best-fit line averages out random errors in individual measurements. If the graph curves at large $$r^2$$, it warns that the larger balls were going too fast for laminar flow (Stokes' Law breaking down), and those points should be excluded. A straight line through the origin is also evidence that the flow stayed laminar across the range used.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "Name three sources of error in the falling-ball viscosity experiment and state an improvement for each. (3 steps)", "answer": "- Step 1: **Ball not at terminal velocity** — if the starting mark is too high, the ball is still accelerating. *Improvement:* place several marks at different depths and verify that the time per interval is constant before the official timing region.\n- Step 2: **Wall (edge) effects** — a narrow cylinder constrains the flow and increases the drag beyond what Stokes' Law predicts. *Improvement:* use a wide cylinder where the ball's radius is much smaller than the cylinder's radius.\n- Step 3: **Temperature drift** — viscosity of a liquid changes strongly with temperature (and the experiment is typically done by hand, warming the liquid). *Improvement:* measure and record the liquid's temperature, keep it constant, and perform the experiment quickly or in a temperature-controlled environment.\n\nAdditional errors: reaction time in the stopwatch (use light gates or time over a long distance), and small errors in measuring $$r$$ which are magnified by the $$r^2$$ dependence (use a micrometer and average multiple readings).", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "Derive the SI units of viscosity $$\\eta$$ from Stokes' Law $$F = 6\\pi\\eta r v$$, showing all three equivalent unit forms. (4 steps)", "answer": "- Step 1: Rearrange Stokes' Law to make $$\\eta$$ the subject (the $$6\\pi$$ is dimensionless): $$\\eta = F / (r \\cdot v)$$. Write the units: $$[\\eta] = \\text{N} / (\\text{m} \\cdot \\text{m s}^{-1}) = \\text{N} / (\\text{m}^2 \\text{s}^{-1}) = \\text{N s m}^{-2}$$.\n- Step 2: Convert the newton to base units using $$\\text{N} = \\text{kg m s}^{-2}$$: $$[\\eta] = (\\text{kg m s}^{-2}) \\cdot \\text{s} \\cdot \\text{m}^{-2} = \\text{kg m}^{-1} \\text{s}^{-1}$$.\n- Step 3: Relate to pascals using $$\\text{Pa} = \\text{N m}^{-2}$$: $$\\text{Pa s} = (\\text{N m}^{-2}) \\cdot \\text{s} = \\text{N s m}^{-2}$$. This confirms $$\\text{Pa s}$$ is a valid unit.\n- Step 4: The three equivalent forms are: $$\\text{Pa s} = \\text{kg m}^{-1} \\text{s}^{-1} = \\text{N s m}^{-2}$$. Note that $$\\text{N s}$$ (without the $$\\text{m}^{-2}$$) is *not* a valid unit of viscosity — it is a unit of impulse/momentum. Similarly, $$\\text{N m}^{-2}$$ alone is pressure (Pa), missing the seconds. Both are common exam distractors.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "A multiple-choice question asks which is NOT a valid unit of viscosity. One option is \"$$\\text{N s}$$\" and another is \"$$\\text{N m}^{-2}$$\". Explain why both are wrong. (2 steps)", "answer": "- Step 1: $$\\text{N s} = \\text{kg m s}^{-1}$$ — this is a unit of impulse or momentum. It lacks the $$\\text{m}^{-2}$$ that viscosity requires (compare with the correct $$\\text{N s m}^{-2}$$). The missing $$\\text{m}^{-2}$$ makes it dimensionally wrong.\n- Step 2: $$\\text{N m}^{-2} = \\text{Pa}$$ — this is a unit of pressure. It lacks the factor of seconds ($$\\text{s}$$) that viscosity requires (compare with the correct $$\\text{Pa s}$$). Without the time dimension, it cannot represent viscosity. Both options are missing one essential dimension — area for the first, time for the second.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "A cube of side 4 cm and mass 50 g is fully submerged in water ($$\\rho_f = 1000$$ kg/m³). Find the upthrust qualitatively — is it larger or smaller than the cube's weight, and will the cube float or sink? (No exact calculation needed — reason from densities.) (3 steps)", "answer": "- Step 1: The cube's density is roughly $$\\rho_s = m/V \\approx 0.050 / (0.04)^3 \\approx 0.050 / 6.4 \\times 10^{-5} \\approx 780$$ kg/m³. (The exact value is about 781 kg/m³.)\n- Step 2: Since $$\\rho_s \\approx 780 < 1000 = \\rho_f$$, the cube is less dense than water. The maximum upthrust (when fully submerged) exceeds the weight.\n- Step 3: The cube will **float**. When released, it will rise to the surface and float with some fraction above the waterline. The submerged fraction will be $$\\rho_s / \\rho_f \\approx 780/1000 \\approx 78\\%$$.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "Two identical-radius spheres are dropped into the same oil. One is aluminium ($$\\rho = 2700$$), the other is lead ($$\\rho = 11300$$). The oil has $$\\rho_f = 900$$ kg/m³. By roughly what factor is the lead ball's terminal velocity larger? (2 steps)", "answer": "- Step 1: Terminal velocity is proportional to the density difference: $$v_t \\propto (\\rho_s - \\rho_f)$$. For aluminium: $$\\rho_s - \\rho_f = 2700 - 900 = 1800$$. For lead: $$\\rho_s - \\rho_f = 11300 - 900 = 10400$$.\n- Step 2: The ratio is $$10400 / 1800 \\approx 5.8$$. The lead ball's terminal velocity is roughly **6 times** the aluminium ball's. Same radius, same oil — only the density difference drives the speed. This demonstrates how powerfully the object's density affects terminal velocity.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "A micrometer reads 4.62 mm on a wire. When closed, it reads +0.02 mm. What is the true diameter, and what type of zero error is this? (2 steps)", "answer": "- Step 1: The closed reading of +0.02 mm is a **positive** zero error — the instrument reads too high by 0.02 mm when it should read zero.\n- Step 2: Apply the correction rule: $$\\text{actual} = \\text{observed} - \\text{zero error} = 4.62 - 0.02 = 4.60$$ mm. The true diameter is 4.60 mm. A positive zero error always requires subtraction because the instrument is over-reading.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "A metal block weighs 4.90 N in air and 4.12 N when submerged in oil. The displaced volume is $$8.0 \\times 10^{-5}$$ m³. Find the oil's density by reasoning about what each measurement tells you — no need for exact arithmetic, just the logical steps and an approximate answer. (3 steps)", "answer": "- Step 1: The upthrust is the apparent weight loss: $$U = W_1 - W_2 = 4.90 - 4.12 = 0.78$$ N. This is the weight of the displaced oil.\n- Step 2: Rearrange $$U = \\rho_f V g$$ for the fluid density: $$\\rho_f = U / (Vg) = 0.78 / (8.0 \\times 10^{-5} \\times 9.81)$$. The denominator is approximately $$8.0 \\times 10^{-5} \\times 10 = 8.0 \\times 10^{-4}$$, so $$\\rho_f \\approx 0.78 / 0.0008 \\approx 975$$ kg/m³.\n- Step 3: The oil's density is about **990 kg/m³** (the exact value is 993 kg/m³) — just below water, consistent with a light oil. Notice: the object's density was never needed. The method works for any submerged object.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "A small steel sphere reaches terminal velocity in oil. The oil is then warmed significantly. State and explain the effect on (a) viscosity and (b) terminal velocity. (3 steps)", "answer": "- Step 1: Warming a *liquid* decreases its viscosity $$\\eta$$. The intermolecular attractions that create internal friction are overcome more easily at higher temperature.\n- Step 2: Since $$v_t \\propto 1/\\eta$$, a decrease in viscosity means the terminal velocity *increases*. The sphere falls faster in the warmer oil.\n- Step 3: Physically: with less viscous friction, the drag at any given speed is smaller. The drag can only balance the weight at a *higher* speed. This is the same reason warm honey flows faster — less resistance at every speed.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "A sphere is at terminal velocity in a fluid, with drag $$F_D = 5.0 \\times 10^{-4}$$ N. If the speed were somehow held at *half* the terminal velocity, what would the drag be, and would the sphere be in equilibrium? (3 steps)", "answer": "- Step 1: Stokes' drag is proportional to speed: $$F_D \\propto v$$. At half the terminal velocity, the drag is half: $$F_D = 2.5 \\times 10^{-4}$$ N.\n- Step 2: At terminal velocity, the balance was $$W = U + F_D$$. With drag now at only half its terminal-velocity value, the upward forces $$U + F_D$$ are *less* than the weight $$W$$.\n- Step 3: The sphere is **not in equilibrium**. There is a net downward force, so the sphere would accelerate downward, speeding up back towards terminal velocity. This demonstrates the *stability* of terminal velocity: any perturbation from $$v_t$$ creates a net force that restores the object back to $$v_t$$.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "A balloon of volume $$0.030$$ m³ and total mass 25 g is released underwater ($$\\rho_f = 1000$$ kg/m³). At the instant of release (drag = 0), estimate the direction and rough magnitude of the resultant force relative to the balloon's weight. (3 steps)", "answer": "- Step 1: Upthrust $$U = \\rho_f V g = 1000 \\times 0.030 \\times 9.81 \\approx 294$$ N (upward). Weight $$W = mg = 0.025 \\times 9.81 \\approx 0.25$$ N (downward).\n- Step 2: The upthrust is roughly **1200 times** the weight. The resultant force is $$U - W \\approx 294 - 0.25 \\approx 294$$ N — overwhelmingly upward.\n- Step 3: The balloon shoots upward at enormous initial acceleration (roughly $$a = F/m \\approx 294/0.025 \\approx 12{,}000$$ m/s² — over 1000g). In practice, turbulence and drag would immediately become enormous, so Stokes' Law would not apply. But the *direction* is clear: the balloon accelerates upward because its average density is far less than the water's.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "A floating cylindrical rod has mass 0.12 kg, cross-section $$8.0 \\times 10^{-4}$$ m², and floats in water ($$\\rho_f = 1000$$ kg/m³). Find the submerged depth — what single equation do you use? (2 steps)", "answer": "- Step 1: Use the floating-rod relation: $$m = \\rho_f A \\Delta h$$. Rearrange for the submerged depth: $$\\Delta h = m / (\\rho_f A)$$.\n- Step 2: Substitute: $$\\Delta h = 0.12 / (1000 \\times 8.0 \\times 10^{-4}) = 0.12 / 0.80 = 0.15$$ m = 15 cm. The rod floats with 15 cm of its length below the waterline. This is a straightforward application of the rod relation — no need to separately calculate weight and upthrust.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "A wooden cube ($$\\rho_s = 600$$ kg/m³) floats in water. What fraction sits *above* the surface? (2 steps)", "answer": "- Step 1: The fraction submerged is $$\\rho_s / \\rho_f = 600 / 1000 = 0.60$$, so 60% is below the surface.\n- Step 2: The fraction *above* the surface is $$1 - 0.60 = 0.40$$, i.e. **40%**. This is a direct consequence of the floating-fraction formula — lighter objects (relative to the fluid) float with more of their volume above the surface.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "A sphere of diameter 4.0 mm is used in a falling-ball experiment. A student substitutes the diameter directly into $$v_t = 2r^2 g(\\rho_s - \\rho_f)/(9\\eta)$$ instead of the radius. By what factor is their answer wrong, and in which direction? (2 steps)", "answer": "- Step 1: The formula requires the *radius* $$r = d/2$$. If the student substitutes the diameter $$d$$ in place of $$r$$, they compute $$v_t \\propto d^2$$ instead of $$v_t \\propto (d/2)^2 = d^2/4$$.\n- Step 2: Their answer is **4 times too large**. Since $$v_t \\propto r^2$$, using a value that is twice the correct radius squares to give four times the correct terminal velocity. This is one of the most common numerical pitfalls — always halve the diameter first.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "A student derives terminal velocity using only $$mg = 6\\pi\\eta r v_t$$ (ignoring upthrust). For a steel ball in oil, this gives a value about 13% too high. Explain why the error is in this direction, and when it would be *negligible*. (3 steps)", "answer": "- Step 1: The simplified balance $$mg = F_D$$ ignores upthrust, so it attributes *all* of the weight to drag. The correct balance is $$mg - U = F_D$$, where upthrust carries some of the weight.\n- Step 2: Since upthrust reduces the \"driving force\" from $$mg$$ to $$mg - U$$, the correct terminal velocity is lower. Ignoring upthrust overestimates the driving force and therefore overestimates $$v_t$$.\n- Step 3: The error is negligible when upthrust is tiny compared to weight — i.e. when the fluid density is much smaller than the object's density (e.g. a steel ball falling through *air*). For a dense ball in a dense liquid (steel in oil, where $$\\rho_f / \\rho_s \\approx 0.11$$), the error is significant (~13%) and must not be ignored.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": true}, {"question": "Two spheres of the *same* material but different sizes fall through the same oil. Sphere Y has twice the radius of sphere X. By what factor does Y's weight exceed X's, and by what factor does Y's terminal velocity exceed X's? (3 steps)", "answer": "- Step 1: Weight $$\\propto V \\propto r^3$$, so doubling the radius multiplies the weight by $$2^3 =$$ **8**.\n- Step 2: Terminal velocity $$\\propto r^2$$, so doubling the radius multiplies $$v_t$$ by $$2^2 =$$ **4**.\n- Step 3: The terminal velocity grows by a *smaller* factor than the weight (4 vs 8) because the drag at a given speed also grows (linearly with $$r$$), partially compensating for the extra weight. The speed must increase to make the drag catch up, but not by the full factor of 8 — only by a factor of 4, because drag itself benefits from the larger radius.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "A skydiver spreads into a \"star\" shape instead of diving head-first. Both positions are at terminal velocity, but the star position has a lower terminal velocity. Explain why, without doing any calculations. (2 steps)", "answer": "- Step 1: The star shape presents a much larger cross-sectional area to the air. At any given speed, the drag force is larger (more air molecules are hit per second, and the wake is wider).\n- Step 2: The weight is the same in both positions. Since drag balances weight at terminal velocity, a larger drag at every speed means the drag reaches the weight value at a *lower* speed. The star position therefore has a lower terminal velocity. The diver hasn't changed their weight — they've changed the drag-versus-speed relationship by changing their shape.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "In the falling-ball experiment, you could find $$\\eta$$ from a single ball measurement, or from a graph of $$v_t$$ vs $$r^2$$ using several balls. Give two reasons why the graph method is more reliable. (2 steps)", "answer": "- Step 1: **Averaging out random errors.** A single measurement is sensitive to random errors (reaction time, slight misalignment of the ball, temperature fluctuations). A best-fit line through multiple data points averages out these random fluctuations, giving a more reliable gradient and hence a more reliable $$\\eta$$.\n- Step 2: **Testing the validity of Stokes' Law.** If the graph of $$v_t$$ vs $$r^2$$ is a straight line through the origin, it confirms that the flow was laminar across all the balls used. If the larger balls produce points that curve upward, it signals that turbulence has set in and Stokes' Law is failing — those points can be excluded. A single measurement gives no such diagnostic.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": true}, {"question": "A student sees a $$v$$-$$t$$ graph that rises from the origin and levels off at 0.018 m/s. (a) What is the terminal velocity? (b) Where is the acceleration greatest? (c) What is the acceleration on the flat part? (3 steps)", "answer": "- Step 1: (a) The terminal velocity is the height of the horizontal plateau: $$v_t = 0.018$$ m/s. This is the constant speed the object eventually maintains.\n- Step 2: (b) The acceleration is greatest at $$t = 0$$, where the gradient of the $$v$$-$$t$$ graph is steepest. At this instant, drag is zero and the resultant force is at its maximum.\n- Step 3: (c) On the flat part, the gradient is zero, so the acceleration is **zero**. This is the defining feature of terminal velocity — constant speed means zero acceleration and zero resultant force.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "How would the $$v$$-$$t$$ graph differ for a *denser* ball of the same radius in the same oil? Describe both the initial gradient and the plateau. (2 steps)", "answer": "- Step 1: A denser ball has a larger initial resultant force ($$W - U$$ is larger), so the initial gradient (acceleration) is **steeper**. The curve rises faster from the origin.\n- Step 2: A denser ball also has a larger density difference $$(\\rho_s - \\rho_f)$$, so the terminal velocity is higher. The plateau (horizontal asymptote) sits at a **higher** $$v_t$$. Both effects go in the same direction: the denser ball accelerates harder initially *and* reaches a higher terminal speed.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": false}, {"question": "A fully submerged object of volume $$1.2 \\times 10^{-3}$$ m³ has weight 15 N in air. Find its apparent weight in water ($$\\rho_f = 1000$$ kg/m³) by reasoning about the upthrust. (2 steps)", "answer": "- Step 1: The upthrust in water is $$U = \\rho_f V g \\approx 1000 \\times 1.2 \\times 10^{-3} \\times 10 = 12$$ N (using $$g \\approx 10$$ for a quick estimate; the exact value is 11.8 N).\n- Step 2: The apparent weight is the weight in air minus the upthrust: $$W_2 = W_1 - U = 15 - 12 \\approx 3$$ N (exactly 3.2 N). The object feels much lighter underwater because the water is pushing it up. If the upthrust exceeded the weight, the apparent weight would be negative — meaning the object would float up.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "A hydrometer floats in water with a certain submerged volume. When placed in a salt solution, it floats 1.5 cm higher. Does the salt solution have a higher or lower density than water, and why? (2 steps)", "answer": "- Step 1: The hydrometer floats **higher** in the salt solution, meaning less of it is submerged. A smaller submerged volume still supports the same weight.\n- Step 2: This is only possible if each unit of displaced fluid provides more upthrust — i.e. the fluid is **denser**. Salt water is denser than fresh water, so less volume needs to be displaced to balance the hydrometer's weight. The hydrometer rides higher in denser fluids and lower in less dense ones — this is exactly how it measures liquid density.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "A 1 cm³ volume is being converted to m³. A student writes $$1\\,\\text{cm}^3 = 10^{-2}\\,\\text{m}^3$$. Why is this wrong, and what is the correct conversion? (2 steps)", "answer": "- Step 1: The mistake is cubing the prefix factor incorrectly. The student took $$1\\,\\text{cm} = 10^{-2}\\,\\text{m}$$ and simply replaced \"cm\" with \"m\" without cubing the factor. The correct approach is: $$1\\,\\text{cm}^3 = (10^{-2}\\,\\text{m})^3 = (10^{-2})^3\\,\\text{m}^3 = 10^{-6}\\,\\text{m}^3$$.\n- Step 2: The correct conversion is $$1\\,\\text{cm}^3 = 10^{-6}\\,\\text{m}^3$$. The student's answer of $$10^{-2}$$ is off by a factor of 10,000. This is one of the most common unit-conversion errors in physics exams. The cube of a length prefix cubes its factor: centi = $$10^{-2}$$, so $$(\\text{centi})^3 = 10^{-6}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": false}, {"question": "You need to verify that a steel ball's terminal velocity calculation is correct. Describe the cross-check method that doesn't require re-deriving the formula. (2 steps)", "answer": "- Step 1: From the force balance at terminal velocity, the drag must equal the weight minus the upthrust: $$F_D = W - U$$. Calculate $$W - U$$ independently using $$W = \\rho_s V g$$ and $$U = \\rho_f V g$$.\n- Step 2: Then calculate $$F_D$$ from Stokes' Law using the computed $$v_t$$: $$F_D = 6\\pi\\eta r v_t$$. If the two values agree, the terminal velocity is correct. If they disagree, there is an arithmetic error in the $$v_t$$ calculation. This is the fastest way to catch mistakes — it is essentially asking \"does the speed I found actually satisfy the force balance?\"", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": true}, {"question": "Why is a dam wall built thicker at the bottom than at the top? Link your answer to the physics of fluids in this topic. (2 steps)", "answer": "- Step 1: Pressure in a fluid increases with depth: $$P = \\rho g h$$. The water at the bottom of the dam is at greater depth and therefore exerts a larger pressure on the wall.\n- Step 2: The force on the wall is pressure times area. A larger pressure at the bottom means a larger force. The wall must be thicker at the bottom to withstand this greater force without failing. This is the same pressure-depth relationship that creates upthrust — the deeper face of a submerged object feels a larger pressure, and the difference creates the net upward force.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": false}], "count": 65}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why does the upthrust on a submerged object not depend on the depth of submersion? (3 steps)", "answer": "- Step 1: Pressure at any depth in a fluid is P = ρ_f g h. The pressure on the top face at h1 is P1 = ρ_f g h1, and on the bottom face at h2 = h1 + L is P2 = ρ_f g (h1 + L).\n- Step 2: The force difference between bottom and top faces is ΔF = (P2 - P1)A = ρ_f g L A. Since L*A is the submerged volume V, ΔF = ρ_f g V.\n- Step 3: Upthrust U = ρ_f V g depends only on displaced fluid volume, not h1. Depth cancels in ΔF calculation, so U is independent of depth.\n\n[Takea
