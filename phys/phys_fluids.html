: Divide both sides by $$6\\pi \\eta r$$: $$v_t = \\dfrac{4\\pi r^3 g(\\rho_s - \\rho_f)}{18 \\pi \\eta r}$$.\n- Step 5: Cancel $$\\pi$$ and one factor of $$r$$, simplify $$4/18 = 2/9$$: $$v_t = \\dfrac{2 r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$.\n\nThis formula is not on the data sheet — you must be able to reproduce this derivation cleanly.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "From $$v_t = \\dfrac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$, predict how the terminal velocity scales with each of: sphere radius, fluid viscosity, density difference. (3 steps)", "answer": "- Step 1: $$v_t \\propto r^2$$: doubling the radius quadruples the terminal velocity. Bigger spheres fall *much* faster — this is the strongest dependence.\n- Step 2: $$v_t \\propto 1/\\eta$$: thicker fluid means proportionally slower fall. Warming the fluid (which lowers $$\\eta$$ for a liquid) speeds up the sphere.\n- Step 3: $$v_t \\propto (\\rho_s - \\rho_f)$$: denser sphere or thinner fluid increases the driving force. Note it's the *difference*, not just $$\\rho_s$$ — forgetting upthrust would slightly overestimate $$v_t$$.\n\nThese three scalings together explain qualitative behaviour without needing the full numerical calculation.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Why does $$v_t$$ scale as $$r^2$$ rather than as $$r^3$$ (the volume) or as $$r$$ (the drag prefactor)? (3 steps)", "answer": "- Step 1: Weight grows as $$r^3$$, because it depends on volume. The driving (downward) force scales like $$r^3$$.\n- Step 2: Stokes drag at a *given speed* grows only as $$r$$, because $$F_D = 6\\pi\\eta r v$$. So the resistance per unit speed scales like $$r$$.\n- Step 3: For balance, $$r v_t \\propto r^3$$, so $$v_t \\propto r^2$$. The mismatch between $$r^3$$ (weight) and $$r^1$$ (drag-per-speed) is exactly what produces the $$r^2$$ scaling.\n\nBig things fall fast in viscous fluids because their weight grows faster with size than their viscous resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "A skydiver falls but has not yet reached terminal velocity. The resultant force is downward and decreasing. Is the skydiver speeding up, slowing down, or moving at constant speed? Explain. (3 steps)", "answer": "- Step 1: Acceleration is determined by *resultant force direction and magnitude*, not its rate of change. If the resultant is downward and the skydiver is moving downward, then the skydiver is speeding up.\n- Step 2: The fact that the resultant is *decreasing* means the rate of speeding up is slowing — acceleration is falling toward zero — but the skydiver is still gaining speed each second.\n- Step 3: Only when the resultant reverses direction (points upward, against motion) does the skydiver actually slow down. So \"decreasing acceleration\" ≠ \"slowing down.\" The skydiver is still accelerating, just less than before.\n\nConfusing decreasing acceleration with deceleration is the single most common mistake in this topic.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "A skydiver opens their parachute while moving downward at high speed. Describe what happens to the resultant force, the acceleration, the velocity, and the eventual motion. (4 steps)", "answer": "- Step 1: Opening the parachute dramatically increases the surface area, so drag jumps up sharply. Now drag (up) is much larger than weight (down).\n- Step 2: The resultant force is large and points *upward*, opposite to the downward motion. So acceleration points upward — this is a deceleration.\n- Step 3: As the skydiver slows, drag falls (drag depends on speed). The upward resultant shrinks, so the deceleration eases off.\n- Step 4: Eventually drag has fallen back to equal weight at a new, lower speed: $$W = U + F_D$$ holds again. The skydiver reaches a second, *lower* terminal velocity, $$v_{t2} < v_{t1}$$.\n\nCrucially, the skydiver never moves upward — they only decelerate downward toward a slower constant speed.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Sketch the shape of a velocity-time graph for a small sphere released into a viscous oil (no parachute). What does each feature represent? (3 steps)", "answer": "- Step 1: At $$t=0$$, velocity is zero. The gradient (= acceleration) is at its *maximum*, equal to $$(W-U)/m$$, because drag is zero at zero speed.\n- Step 2: The curve rises with a steadily decreasing gradient, because as $$v$$ grows, drag grows, so the resultant force and hence the acceleration shrink.\n- Step 3: The curve asymptotically approaches a horizontal line at $$v = v_t$$. It never crosses it — the sphere never overshoots terminal velocity.\n\nThe signature of terminal velocity on a $$v$$-$$t$$ graph is the curve flattening to a horizontal asymptote.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Sketch the corresponding acceleration-time graph for the same falling sphere, and explain how it relates to the resultant force-time graph. (3 steps)", "answer": "- Step 1: At $$t=0$$, acceleration is at its maximum value $$a_{\\max} = (W-U)/m$$ (drag is zero).\n- Step 2: As drag grows with speed, the resultant downward force shrinks, so acceleration decays toward zero. The curve falls smoothly from $$a_{\\max}$$ to zero.\n- Step 3: The resultant force-time graph has the *same shape*, because $$F_{\\text{net}} = ma$$ and mass is constant. It starts at $$W - U$$ and decays to zero. Both curves reach zero exactly when the sphere is at terminal velocity.\n\nThese two graphs are essentially identical up to a constant scale factor of $$m$$.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "On a velocity-time graph for the skydiver-with-parachute scenario, identify the five distinct phases and what the gradient looks like in each. (5 steps)", "answer": "- Step 1: Phase 1 (initial fall): positive gradient that gradually decreases — accelerating downward, but acceleration falling as drag builds.\n- Step 2: Phase 2 (first terminal velocity $$v_{t1}$$): zero gradient (horizontal line) — drag equals weight, constant high speed.\n- Step 3: Phase 3 (parachute opens): sudden steep *negative* gradient — large upward resultant decelerates the diver sharply.\n- Step 4: Phase 4 (slowing down): negative gradient easing toward zero — as speed falls, drag falls, so the upward resultant shrinks.\n- Step 5: Phase 5 (second terminal velocity $$v_{t2}$$): zero gradient again, at a *lower* horizontal line — new balance at lower speed because the larger area means less speed is needed for $$F_D = W$$.\n\nThe two terminal-velocity plateaus are at different heights, with $$v_{t2} < v_{t1}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Why, in the Core Practical 4 falling-ball viscometer, is the ball timed only between two marks *below* the surface, not from the moment of release? (3 steps)", "answer": "- Step 1: The ball is released from rest, so initially it is accelerating, not moving at constant speed.\n- Step 2: The terminal-velocity formulas assume $$v$$ is the *terminal* velocity — i.e. the speed during the equilibrium phase where $$W = U + F_D$$.\n- Step 3: Placing the starting line a few cm below the surface ensures the ball has had distance to reach terminal velocity before timing begins, so $$v = s/t$$ between the two marks really is $$v_t$$. Timing from release would mix in the accelerating phase, giving a lower average speed and hence overestimating $$\\eta$$.\n\nThe end line is also kept above the bottom to avoid the ball decelerating against the floor or any approaching wall effects.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "In the falling-ball viscometer, you measure the ball's radius, mass, the distance between two marks $$s$$, and the time $$t$$ to cross them. Write the formula for $$\\eta$$ from the simplified balance (ignoring upthrust). (3 steps)", "answer": "- Step 1: Simplified balance at terminal velocity (upthrust ignored): $$mg = 6\\pi\\eta r v$$.\n- Step 2: Solve for $$\\eta$$: $$\\eta = \\dfrac{mg}{6\\pi r v}$$.\n- Step 3: With $$v = s/t$$, substitute to get $$\\eta = \\dfrac{mgt}{6\\pi r s}$$. The radius comes from a micrometer (small-but-critical, since $$\\eta \\propto r^{-1}$$ here), the mass from a balance, and $$s, t$$ from the marked cylinder and stopwatch.\n\nThis is valid when the sphere is much denser than the fluid, so upthrust is genuinely a small correction.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Why is it better to use ball bearings of several different radii in the falling-ball experiment and plot $$v_t$$ against $$r^2$$, rather than relying on a single ball? (3 steps)", "answer": "- Step 1: From the terminal velocity formula, $$v_t = \\dfrac{2(\\rho_s - \\rho_f)g}{9\\eta} \\cdot r^2$$, so $$v_t$$ is directly proportional to $$r^2$$, with the constant prefactor depending on $$\\eta$$.\n- Step 2: Plotting $$v_t$$ vs $$r^2$$ gives a straight line through the origin. Using the gradient $$k$$ averages out random errors across multiple measurements: $$\\eta = \\dfrac{2(\\rho_s - \\rho_f)g}{9k}$$.\n- Step 3: A straight-line graph also provides a self-check: if the points curve at large $$r$$, that indicates the flow became turbulent for big balls (Stokes' Law breaking down), warning you to exclude those points.\n\nA single ball gives a single estimate; the graphical method gives both an averaged value and evidence of validity.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "What are the main sources of error in the falling-ball viscometer, and how can each be reduced? (3 steps)", "answer": "- Step 1: Failure to reach terminal velocity before timing — fix by checking that timing intervals between successive marks are equal (constant speed), and place the start line lower if not.\n- Step 2: Reaction-time error with a stopwatch — fix by timing over a long distance, using light gates, and repeating runs.\n- Step 3: Other systematic effects:\n+ Wall (edge) effects in a narrow cylinder slow the ball — use a wide cylinder.\n+ Temperature drift changes $$\\eta$$ strongly for liquids — maintain a constant, recorded temperature.\n+ Ball radius error matters since $$v_t \\propto r^2$$ — use a micrometer and average several measurements.\n+ Non-laminar flow if balls are too large — use small bearings to stay in the Stokes regime.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Derive the SI units of viscosity from $$F = 6\\pi \\eta r v$$ by dimensional analysis, and show they equal $$\\text{Pa s}$$. (4 steps)", "answer": "- Step 1: Solve for $$\\eta$$: $$\\eta = \\dfrac{F}{6\\pi r v}$$. The $$6\\pi$$ is dimensionless, so $$[\\eta] = \\dfrac{[F]}{[r][v]} = \\dfrac{\\text{N}}{\\text{m} \\cdot \\text{m s}^{-1}} = \\dfrac{\\text{N}}{\\text{m}^2 \\text{s}^{-1}} = \\text{N s m}^{-2}$$.\n- Step 2: Convert N to base units: $$\\text{N} = \\text{kg m s}^{-2}$$, so $$\\text{N s m}^{-2} = \\text{kg m s}^{-2} \\cdot \\text{s} \\cdot \\text{m}^{-2} = \\text{kg m}^{-1}\\text{s}^{-1}$$.\n- Step 3: Relate to pascals: $$\\text{Pa} = \\text{N m}^{-2}$$, so $$\\text{Pa s} = \\text{N m}^{-2} \\cdot \\text{s} = \\text{N s m}^{-2}$$.\n- Step 4: All three forms agree: $$[\\eta] = \\text{Pa s} = \\text{kg m}^{-1}\\text{s}^{-1} = \\text{N s m}^{-2}$$.\n\nThe method (rearrange, substitute base units) is more reliable than guessing from the look of the options.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "From the dimensional analysis of viscosity, explain why $$\\text{N s}$$ and $$\\text{N m}^{-2}$$ are NOT valid units of viscosity. (3 steps)", "answer": "- Step 1: $$\\text{N s}$$ in base units is $$\\text{kg m s}^{-2} \\cdot \\text{s} = \\text{kg m s}^{-1}$$ — these are the units of momentum (or impulse), not viscosity. It's missing the $$\\text{m}^{-2}$$ factor.\n- Step 2: $$\\text{N m}^{-2}$$ is the definition of the pascal — units of *pressure*, not viscosity. It's missing the factor of seconds.\n- Step 3: Viscosity has units $$\\text{N s m}^{-2}$$ — momentum-flux per unit area, or equivalently pressure-times-time. Both distractor units differ from this by one factor (a seconds, or an area), so they're dimensionally wrong.\n\nThis sort of \"spot the wrong unit\" question rewards dimensional analysis over recognition.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Look at the four statements about a floating object. Which are correct, and why are the wrong ones wrong? (a) volume of liquid displaced = volume of object; (b) density of object > density of liquid; (c) mass of liquid displaced = upthrust on object; (d) weight of liquid displaced = weight of object. (4 steps)", "answer": "- Step 1: (a) Wrong: a floating object is only *partly* submerged, so the displaced volume is less than the object's total volume.\n- Step 2: (b) Wrong: a floating object must have density *less* than the fluid ($$\\rho_s < \\rho_f$$); a denser object would sink.\n- Step 3: (c) Wrong by units: \"mass of liquid displaced\" has units of kg, but \"upthrust\" is a force in N. They cannot be equal; upthrust equals the *weight* of liquid displaced (mass × g).\n- Step 4: (d) Correct: for a floating body $$W_{\\text{object}} = U = W_{\\text{fluid displaced}}$$.\n\nThe trap is (c), which is right in spirit but wrong in units — a classic mass-vs-weight discriminator.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Why does a floating object ride higher in salt water than in fresh water? (3 steps)", "answer": "- Step 1: The object's mass and cross-section are unchanged. Only the fluid density has increased.\n- Step 2: From the floating-rod relation $$m = \\rho_f A \\Delta h$$, with $$m$$ and $$A$$ fixed, increasing $$\\rho_f$$ requires $$\\Delta h$$ to decrease.\n- Step 3: Less depth needs to be submerged to displace the same weight of (now denser) liquid. The object rides higher. This is exactly how a hydrometer works — measuring how high it floats tells you the density of the liquid.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "A hollow plastic ball of average density less than water is held fully submerged and released. Describe its initial acceleration qualitatively. (3 steps)", "answer": "- Step 1: At the moment of release, the ball has zero speed, so viscous drag is zero. Only weight (down) and upthrust (up) act.\n- Step 2: Since $$\\rho_s < \\rho_f$$, we have $$W < U$$, so the resultant force is upward and substantial.\n- Step 3: Acceleration is $$F_{\\text{net}}/m$$ upward, and because the mass is small (low density) and the net force is large, the upward acceleration can be much greater than $$g$$. The ball shoots upward — it does not just rise slowly. Drag then quickly builds up and (along with potential turbulence) limits the speed.\n\nA common mistake is to assume that buoyancy can only produce gentle motion; for low-density objects in dense fluids, initial accelerations can be many times $$g$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "Two spheres of the same radius are dropped through the same oil. Sphere A is aluminium ($$\\rho \\approx 2700$$); sphere B is lead ($$\\rho \\approx 11300\\,\\text{kg m}^{-3}$$). The oil has density $$900\\,\\text{kg m}^{-3}$$. Which reaches the higher terminal velocity, and roughly by what factor? (3 steps)", "answer": "- Step 1: With $$r$$ and $$\\eta$$ fixed, $$v_t \\propto (\\rho_s - \\rho_f)$$.\n- Step 2: For aluminium, $$\\rho_s - \\rho_f = 2700 - 900 = 1800$$. For lead, $$11300 - 900 = 10400$$.\n- Step 3: Ratio of terminal velocities $$\\approx 10400/1800 \\approx 5.8$$. The lead sphere reaches a terminal velocity about six times that of the aluminium one. Notice that ignoring upthrust (using density ratio $$11300/2700 \\approx 4.2$$) would give a noticeably different answer — the density *difference* matters, not the densities alone.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "A sphere falls at terminal velocity through oil with drag $$F_D$$. The oil is then warmed. What happens to the terminal velocity? (3 steps)", "answer": "- Step 1: Warming a *liquid* decreases its viscosity $$\\eta$$ (intermolecular attractions are more easily overcome).\n- Step 2: From $$v_t \\propto 1/\\eta$$, decreasing $$\\eta$$ increases $$v_t$$.\n- Step 3: Physically: the warmer oil offers less resistance per unit speed, so the sphere must move faster before drag grows enough to balance weight. The terminal velocity is higher. (For a gas instead of a liquid, the trend would reverse: warming raises $$\\eta$$ and lowers $$v_t$$.)", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "A skydiver in a star-spread shape falls at a lower terminal velocity than the same skydiver in a head-first dive, before any parachute opens. Why? (3 steps)", "answer": "- Step 1: Spreading out increases the cross-sectional area facing the airflow, which increases the air-resistance (drag) force for any given speed.\n- Step 2: Weight is unchanged (same person, same mass, $$g$$).\n- Step 3: At terminal velocity, drag equals weight. With a larger drag at any given speed, balance is achieved at a *lower* speed — so $$v_t$$ is lower in the star shape. This is exactly the same principle that makes a parachute work, just less dramatic.\n\nThis shows that an object's \"drag profile\" depends on its orientation and shape, not just its mass.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Suppose a sphere is somehow forced to move through a viscous fluid at half its terminal velocity. Is it in equilibrium? What is the net force? (3 steps)", "answer": "- Step 1: Drag depends linearly on speed: $$F_D = 6\\pi\\eta r v$$. At half the terminal velocity, drag is exactly half its terminal-velocity value.\n- Step 2: At terminal velocity, $$F_D = W - U$$. At half terminal velocity, drag is $$\\tfrac{1}{2}(W - U)$$ — so it only cancels half of the net downward force.\n- Step 3: Net force is $$\\tfrac{1}{2}(W - U)$$ downward — the sphere is *not* in equilibrium and would accelerate. If released at this speed, it would speed up toward $$v_t$$. This shows again how the speed-dependence of drag creates a stable equilibrium at exactly one speed.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Why is upthrust often (but not always) negligible for a small dense object falling through a gas, but never negligible for the same object falling through a liquid? (3 steps)", "answer": "- Step 1: Upthrust is $$U = \\rho_f V g$$, proportional to the fluid density. Weight is $$W = \\rho_s V g$$. Their ratio is $$U/W = \\rho_f/\\rho_s$$.\n- Step 2: For a steel ball ($$\\rho_s \\approx 7800$$) in air ($$\\rho_f \\approx 1.2$$): $$U/W \\approx 1.5 \\times 10^{-4}$$, truly negligible. In oil ($$\\rho_f \\approx 900$$): $$U/W \\approx 0.12$$, about 12% — not negligible.\n- Step 3: So in falling-ball viscometer analysis, the simplified $$mg = 6\\pi\\eta r v$$ form is okay for objects falling through gas but should be replaced by the full $$W = U + F_D$$ for liquids.\n\nThe discriminator is always the *ratio* of fluid density to object density.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Concrete check: a steel ball reaches terminal velocity in oil. The drag force at that instant can be computed two independent ways. What are they, and why must they give the same answer? (3 steps)", "answer": "- Step 1: Method 1 — force balance: $$F_D = W - U = (\\rho_s - \\rho_f) V g$$. This uses only the weights of the sphere and displaced fluid.\n- Step 2: Method 2 — Stokes' Law directly: $$F_D = 6\\pi\\eta r v_t$$. This uses the terminal velocity and the viscous properties.\n- Step 3: They must agree, because the terminal velocity is *defined* by exactly this balance ($$W = U + F_D$$). If you compute $$v_t$$ from the derived formula and then plug it into Stokes' Law, you must recover $$W - U$$. This cross-check is the fastest way to spot an arithmetic error in $$v_t$$ — a favourite examiner move.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "A cube of side 4 cm and mass 50 g is fully submerged in water (density 1000 kg/m³). Without doing a full calculation, what is the order of magnitude of the upthrust, and does the cube's mass matter? (3 steps)", "answer": "- Step 1: Volume $$= (0.04)^3 \\approx 6\\times10^{-5}\\,\\text{m}^3$$. Upthrust $$= \\rho_f V g \\approx 1000 \\cdot 6\\times10^{-5} \\cdot 10 \\approx 0.6\\,\\text{N}$$.\n- Step 2: The cube's mass is irrelevant to upthrust — only the fluid's density and the displaced volume matter. A wooden cube and a lead cube of the same shape, both fully submerged, experience the *same* upthrust.\n- Step 3: The cube's weight is $$W = mg \\approx 0.05 \\cdot 10 = 0.5\\,\\text{N}$$, which is slightly less than the upthrust ($$0.6\\,\\text{N}$$). So if released, the cube would actually rise — its average density ($$50/64 \\approx 0.78\\,\\text{g/cm}^3$$) is less than water's.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "A vertical rod of mass 0.20 kg and cross-section $$1.0\\times10^{-3}\\,\\text{m}^2$$ floats in oil of density 800 kg/m³. Without using a calculator, estimate the submerged depth. (3 steps)", "answer": "- Step 1: Use the floating-rod relation: $$\\Delta h = \\dfrac{m}{\\rho_f A}$$.\n- Step 2: Substitute mentally: $$\\Delta h = \\dfrac{0.20}{800 \\times 10^{-3}} = \\dfrac{0.20}{0.80} = 0.25\\,\\text{m}$$.\n- Step 3: This is reasonable: a quarter of a metre submerged for a 200 g rod in light oil. Increase the mass or decrease the fluid density and the rod would sit deeper; widen the rod (increase $$A$$) and it would sit higher.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "A 1.0 mm-radius steel ball ($$\\rho_s = 7800$$, $$\\rho_f = 880\\,\\text{kg m}^{-3}$$, $$\\eta = 0.85\\,\\text{Pa s}$$) falls through oil. Without computing the exact number, walk through the steps to find its terminal velocity. (3 steps)", "answer": "- Step 1: Use $$v_t = \\dfrac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$. Identify each input in SI: $$r = 10^{-3}\\,\\text{m}$$, $$\\rho_s - \\rho_f = 6920\\,\\text{kg m}^{-3}$$, $$g \\approx 10$$, $$\\eta = 0.85$$.\n- Step 2: The factor $$r^2 = 10^{-6}$$. So numerator $$\\approx 2 \\cdot 10^{-6} \\cdot 10 \\cdot 7000 = 0.14$$. Denominator $$\\approx 9 \\cdot 0.85 \\approx 8$$.\n- Step 3: $$v_t \\approx 0.14/8 \\approx 0.018\\,\\text{m s}^{-1}$$ — a slow creep of less than 2 cm/s. This is why the falling-ball method works by hand: terminal velocities are small enough to time.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "Why is using a sphere's *diameter* in place of its *radius* in the Stokes formula a particularly costly error in terminal-velocity calculations? (3 steps)", "answer": "- Step 1: $$v_t \\propto r^2$$. Substituting the diameter $$d = 2r$$ gives an answer in $$d^2 = 4r^2$$, four times too large.\n- Step 2: This is the worst type of error: the units come out right, the formula is recognisable, and the number looks plausible. There is no dimensional check to catch it.\n- Step 3: The remedy is to always write \"radius = diameter / 2\" as an explicit first step on the working, and to keep $$r$$ in metres (not mm). Sphere volume formulas $$V = \\tfrac{4}{3}\\pi r^3$$ have the same trap, with an even worse factor of 8.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "During the parachute opening transition, a student says \"the acceleration cannot go below zero.\" Is this correct? Resolve the confusion. (3 steps)", "answer": "- Step 1: \"Acceleration\" is a vector with direction. It is \"zero\" only when the resultant force vanishes (e.g. at terminal velocity).\n- Step 2: When the parachute opens, drag (up) is much larger than weight (down). The resultant force points *upward*, while the skydiver still moves *downward*. So the acceleration is upward — opposite to velocity.\n- Step 3: This is a deceleration (in the sense of slowing down), but the acceleration vector itself is not \"negative\" in any absolute sense — it is simply pointing upward instead of downward. The student is confusing \"acceleration going below zero\" (which is a coordinate-frame statement) with \"the body cannot reverse direction\" (which is a separate physical claim). The skydiver doesn't move upward — they slow until drag drops to balance weight again at a new lower $$v_t$$.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "A vernier caliper shows an observed reading of 1.05 cm with a zero error of +0.04 cm. What is the actual reading, and what would change if the zero error were −0.07 cm instead? (3 steps)", "answer": "- Step 1: The rule is: $$\\text{actual} = \\text{observed} - \\text{zero error}$$.\n- Step 2: With zero error $$+0.04$$: actual $$= 1.05 - 0.04 = 1.01\\,\\text{cm}$$. A positive zero error means the instrument reads *too high*, so we subtract.\n- Step 3: With zero error $$-0.07$$: actual $$= 1.05 - (-0.07) = 1.12\\,\\text{cm}$$. A negative zero error means the instrument reads *too low*, so subtracting a negative effectively adds. The sign is the easy mark to drop — always write the rule explicitly before substituting.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "Why is pressure at a point in a fluid the same in all directions, but the *net* force on a submerged object is upward? (3 steps)", "answer": "- Step 1: Pressure is a scalar at each point — fluid molecules push equally in all directions at that point, regardless of orientation.\n- Step 2: An object's faces sit at different depths. Each face experiences a pressure determined by its depth: deeper faces experience larger pressures.\n- Step 3: When you sum the pressure-times-area contributions over the object's surface, opposite horizontal pushes cancel (same depth on each side), but the *upward* push on the deeper bottom exceeds the *downward* push on the shallower top. The asymmetry of depth across the object — not anisotropy of pressure at a point — is what produces upthrust.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "State Archimedes' Principle and explain why it gives the same answer as adding up the pressure forces on each face of a submerged block. (3 steps)", "answer": "- Step 1: Archimedes: upthrust equals the *weight* of fluid displaced, $$U = \\rho_f V g$$.\n- Step 2: Pressure-force derivation for a block of base area $$A$$, height $$L$$: bottom force up minus top force down = $$\\rho_f g (h_2 - h_1) A = \\rho_f g L A = \\rho_f g V$$.\n- Step 3: These match because $$\\rho_f V$$ is exactly the mass of fluid that *would* have occupied the space now taken by the block, and $$\\rho_f V g$$ is that fluid's weight. The pressure picture and the \"weight of fluid displaced\" picture are two routes to the same equation. Quoting both in an exam shows depth of understanding.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "A balloon of volume 0.030 m³ and mass 25 g is released underwater. Estimate the order of magnitude of the upward force and the initial acceleration. (3 steps)", "answer": "- Step 1: Upthrust: $$U = \\rho_f V g = 1000 \\cdot 0.030 \\cdot 10 \\approx 300\\,\\text{N}$$. Weight: $$W = mg = 0.025 \\cdot 10 \\approx 0.25\\,\\text{N}$$.\n- Step 2: At the instant of release, drag is zero. Resultant $$\\approx 300 - 0.25 \\approx 300\\,\\text{N}$$ upward — utterly dominated by upthrust.\n- Step 3: Acceleration $$= F/m \\approx 300/0.025 \\approx 1.2 \\times 10^4\\,\\text{m s}^{-2}$$ upward — over a thousand $$g$$! In practice, drag (and probably turbulence) limits this rapidly, but conceptually the early-release acceleration of a very buoyant object can be enormous.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "A common exam phrase reads: \"the upthrust equals the *mass* of liquid displaced.\" Why is this wrong, and what is the correct version? (3 steps)", "answer": "- Step 1: Upthrust is a *force*, with units of newtons. Mass has units of kilograms. These cannot be equal — they're dimensionally incompatible.\n- Step 2: The correct Archimedes' Principle states: upthrust equals the *weight* of liquid displaced. Weight is force, so dimensions match.\n- Step 3: Algebraically: $$U = (\\text{mass of fluid displaced}) \\times g = \\rho_f V g$$. The factor of $$g$$ converts mass to weight. Confusion between \"mass of fluid displaced\" and \"weight of fluid displaced\" is a common source of dropped marks; always use *weight*.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "Concept check: a sphere is dropped through oil and timed between two marks. The student reports a terminal velocity. The terminal velocity formula then yields a viscosity that turns out to be *too high*. What systematic error is the most likely cause? (3 steps)", "answer": "- Step 1: From $$\\eta \\propto 1/v$$ (other quantities fixed), an inflated $$\\eta$$ comes from a depressed $$v$$.\n- Step 2: A depressed $$v$$ most commonly arises because timing began before the sphere had truly reached terminal velocity — the sphere was still in its accelerating phase, so its average speed between marks was less than $$v_t$$.\n- Step 3: The fix is to ensure the top mark is far enough below the surface that the ball has had distance to accelerate up to $$v_t$$. A diagnostic is to mark several lines and check that the time per interval becomes constant — confirming terminal velocity has been reached before the official timing region.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "Looking only at units, how can you quickly check whether a candidate formula for terminal velocity makes sense? (3 steps)", "answer": "- Step 1: Velocity has units $$\\text{m s}^{-1}$$. Check that the proposed formula's units reduce to this.\n- Step 2: For $$v_t = \\dfrac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$: numerator units $$= \\text{m}^2 \\cdot \\text{m s}^{-2} \\cdot \\text{kg m}^{-3} = \\text{kg m}^{0}\\text{s}^{-2}$$ $$\\text{m}^2 \\cdot \\text{m s}^{-2} = \\text{m}^3 \\text{s}^{-2}$$, times $$\\text{kg m}^{-3}$$ gives $$\\text{kg s}^{-2}$$.\n- Step 3: Denominator units: $$\\eta$$ has units $$\\text{kg m}^{-1}\\text{s}^{-1}$$. Dividing: $$\\dfrac{\\text{kg s}^{-2}}{\\text{kg m}^{-1}\\text{s}^{-1}} = \\text{m s}^{-1}$$ ✓. The formula is dimensionally consistent — a strong sanity check. If you derive a formula and the units don't reduce to m/s, you've made an algebra error.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "Why is a graph of $$v_t$$ versus $$r^2$$ for many balls in the same fluid expected to be a straight line through the origin, and what does the gradient tell you? (3 steps)", "answer": "- Step 1: From $$v_t = \\dfrac{2(\\rho_s - \\rho_f)g}{9\\eta} \\cdot r^2$$, $$v_t$$ is directly proportional to $$r^2$$ with the constant prefactor depending on densities and viscosity.\n- Step 2: A straight line through the origin confirms $$v_t \\propto r^2$$, which is the signature of Stokes' Law holding (laminar flow). Curvature at large $$r$$ warns that the flow has turned turbulent.\n- Step 3: The gradient is $$k = \\dfrac{2(\\rho_s - \\rho_f)g}{9\\eta}$$. Knowing $$\\rho_s, \\rho_f, g$$, you can solve for $$\\eta = \\dfrac{2(\\rho_s - \\rho_f)g}{9k}$$. The graphical method averages out random errors and provides a built-in check of method validity.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "A small dust grain of radius $$\\sim 10\\,\\mu\\text{m}$$ settles in still air. Roughly how fast, and is Stokes' Law a good approximation? (3 steps)", "answer": "- Step 1: Use $$v_t = \\dfrac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$ with $$r \\approx 10^{-5}\\,\\text{m}$$, $$\\rho_s \\approx 2000$$ (dust), $$\\rho_f \\approx 1.2$$ (air, so $$\\rho_s - \\rho_f \\approx 2000$$), $$\\eta_{\\text{air}} \\approx 1.8 \\times 10^{-5}\\,\\text{Pa s}$$.\n- Step 2: Order of magnitude: numerator $$\\approx 2 \\cdot 10^{-10} \\cdot 10 \\cdot 2000 \\approx 4 \\times 10^{-6}$$; denominator $$\\approx 9 \\cdot 1.8 \\times 10^{-5} \\approx 1.6 \\times 10^{-4}$$; so $$v_t \\approx 0.025\\,\\text{m s}^{-1}$$ — a couple of cm per second.\n- Step 3: Stokes is valid here: tiny sphere, very low speed, definitely laminar flow (Reynolds number is well below 1). This is why fine dust takes minutes to settle in still air — and why Stokes' Law genuinely describes real-world drift of small particles.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "Concept check: if a falling sphere reached its terminal velocity *instantly* upon release, what would the velocity-time graph look like, and why does the real graph differ? (3 steps)", "answer": "- Step 1: If $$v_t$$ were reached instantly, the graph would jump vertically from 0 to $$v_t$$ at $$t=0$$ and then be a horizontal line.\n- Step 2: But drag grows only with speed — at $$v = 0$$, drag is 0. So just after release the net force is $$W - U$$ and the sphere accelerates. As it speeds up, drag grows, and acceleration decreases.\n- Step 3: The result is a smooth curve from the origin, asymptotically approaching $$v_t$$. It never reaches $$v_t$$ exactly (only asymptotically), and crucially it cannot overshoot — because at $$v_t$$ the resultant is zero, and beyond, the resultant would point backward, preventing further speed-up. This is why terminal velocity is a *stable* equilibrium.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "Two terminal velocities appear in the parachute story: $$v_{t1}$$ (before) and $$v_{t2}$$ (after). At each, what does the drag force equal? (3 steps)", "answer": "- Step 1: At any terminal velocity, the resultant force is zero: $$W = U + F_D$$. For a skydiver, upthrust from air is negligible, so $$W = F_D$$.\n- Step 2: Both before and after the parachute opens, the drag force equals the skydiver's weight $$W = mg$$ (the same value, since mass is unchanged).\n- Step 3: What differs is the *speed* at which this drag is achieved. With a small frontal area (Phase 2), drag reaches $$W$$ only at high speed $$v_{t1}$$. With a large area (Phase 5), drag reaches $$W$$ at a much lower speed $$v_{t2}$$. Same drag force, different speeds — the parachute simply makes drag grow faster with speed.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "A student writes \"the higher the viscosity, the faster the terminal velocity\" — explain the error and give the correct relationship. (3 steps)", "answer": "- Step 1: The error reverses the dependence. Higher viscosity means *more* resistance to motion at any given speed.\n- Step 2: From the terminal-velocity formula, $$v_t \\propto 1/\\eta$$. Doubling $$\\eta$$ halves $$v_t$$.\n- Step 3: Physically: in a more viscous fluid, you don't need to go as fast for drag to balance weight, because each m/s of speed produces more drag. So $$v_t$$ is *lower* in honey than in water for the same sphere, and *higher* in warm oil than in cold oil (for liquids).", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "Explain why the formula $$v_t = \\dfrac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$ involves $$(\\rho_s - \\rho_f)$$ rather than just $$\\rho_s$$. (3 steps)", "answer": "- Step 1: At terminal velocity, the *effective* downward driving force is not the sphere's full weight but the weight reduced by upthrust: $$W - U = (\\rho_s - \\rho_f)Vg$$.\n- Step 2: This effective force is what drag must balance, so drag $$= (\\rho_s - \\rho_f)Vg$$, and Stokes' Law gives $$v_t = (\\rho_s - \\rho_f)Vg / (6\\pi\\eta r)$$.\n- Step 3: Substituting $$V = \\tfrac{4}{3}\\pi r^3$$ and simplifying gives the formula. The density *difference* — not the sphere's density alone — is what drives the motion. If $$\\rho_s = \\rho_f$$, the difference is zero and $$v_t = 0$$: the sphere is neutrally buoyant and just sits there.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "Suppose you observe that a sphere in oil takes 3 seconds to fall a measured distance after seemingly reaching terminal velocity. You then double the radius (using a similar material). Roughly how long should the new fall take, and why? (3 steps)", "answer": "- Step 1: With material the same, $$\\rho_s$$ is unchanged. With the same fluid, $$\\rho_f$$ and $$\\eta$$ are unchanged.\n- Step 2: $$v_t \\propto r^2$$, so doubling $$r$$ quadruples $$v_t$$. Over the same distance, time $$t = s/v_t$$, so time falls to about $$3/4 = 0.75\\,\\text{s}$$.\n- Step 3: A four-fold reduction in time. This is a startlingly strong scaling — twice the radius, four times the speed — and it's why using very different ball sizes gives a wide spread of data points (useful for a $$v_t$$ vs $$r^2$$ graph).", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "A \"show that\" exam question asks you to demonstrate that for a steel sphere ($$\\rho_s = 7800$$) of diameter 4 mm in glycerine ($$\\rho_f = 1260$$, $$\\eta = 1.5\\,\\text{Pa s}$$), $$v_t \\approx 3.8 \\times 10^{-2}\\,\\text{m s}^{-1}$$. Walk through the conceptual approach (no number-crunching). (3 steps)", "answer": "- Step 1: First halve the diameter: $$r = 2.0 \\times 10^{-3}\\,\\text{m}$$. This is the most common slip — using diameter would give a $$v_t$$ four times too big.\n- Step 2: Identify each input in the formula $$v_t = \\dfrac{2r^2 g (\\rho_s - \\rho_f)}{9\\eta}$$: density difference is $$\\sim 6500$$, $$r^2 \\sim 4 \\times 10^{-6}$$, $$g \\sim 10$$.\n- Step 3: Order-of-magnitude estimate: numerator $$\\sim 2 \\cdot 4 \\times 10^{-6} \\cdot 10 \\cdot 6500 \\sim 0.5$$; denominator $$\\sim 9 \\cdot 1.5 \\sim 14$$; so $$v_t \\sim 0.04\\,\\text{m s}^{-1}$$. Matches the claimed value to within rounding. The \"show that\" mark depends on correctly setting up the formula and substituting carefully, not on the final figure.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": false}], "count": 60}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 32088, "out_tokens": 17763, "reasoning_chars": 5904, "cost_eur": 0.0882, "elapsed_s": 274, "content_chars": 57850}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 32088, "out_tokens": 12214, "reasoning_chars": 16226, "cost_eur": 0.0703, "elapsed_s": 214, "content_chars": 29338}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 1.0, "in_tokens": 32089, "out_tokens": 18792, "reasoning_chars": 6865, "cost_eur": 0.0915, "elapsed_s": 188, "content_chars": 62430}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 29689, "out_tokens": 14223, "reasoning_chars": 3369, "cost_eur": 0.0199, "elapsed_s": 178, "content_chars": 50098}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.95, "in_tokens": 29689, "out_tokens": 8559, "reasoning_chars": 1841, "cost_eur": 0.0141, "elapsed_s": 104, "content_chars": 28548}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 47720, "out_tokens": 22873, "reasoning_chars": 0, "cost_eur": 2.2368, "elapsed_s": 294, "content_chars": 54390}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 47720, "out_tokens": 23571, "reasoning_chars": 0, "cost_eur": 2.2849, "elapsed_s": 301, "content_chars": 54572}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 32857, "out_tokens": 4210, "reasoning_chars": 6083, "cost_eur": 0.0107, "elapsed_s": 88, "content_chars": 9052}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.95, "in_tokens": 32857, "out_tokens": 3417, "reasoning_chars": 4145, "cost_eur": 0.0098, "elapsed_s": 69, "content_chars": 8029}}};
const SK='phys_fluids';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
