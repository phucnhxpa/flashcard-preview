<script>
const DATA={"selected": [{"question": "What are the three validity conditions for Stokes’ Law, and why is each necessary? (3 steps)", "answer": "- Step 1: **Small, smooth sphere**: Turbulence arises with large/irregular shapes, invalidating the linear drag model.  \n  - Step 2: **Low speed**: High speeds create turbulent flow, where drag scales with $ v^2 $.  \n  - Step 3: **Laminar flow**: Smooth, non-turbulent flow is required. Turbulence introduces chaotic forces.  \n\n**Takeaway:** Stokes’ Law only applies where $ Re \\ll 1 $, ensuring no turbulence.", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "Why does heating a liquid *decrease* its viscosity but heating a gas *increase* its viscosity? (3 steps)", "answer": "- Step 1: In a liquid, molecules are close together and held by intermolecular attractions. These attractions are what produce the internal friction. Heating gives molecules more kinetic energy, so they overcome the attractions more easily and slip past one another — internal friction (and so $$\\eta$$) falls.\n- Step 2: In a gas, molecules are far apart and barely attract one another. Viscosity instead arises because molecules diffuse between layers, carrying momentum across the boundary. Heating makes them move faster, so they cross more often and transport more momentum per second — the layers \"grip\" each other harder and $$\\eta$$ rises.\n- Step 3: The two opposite trends come from completely different microscopic mechanisms: cohesion in liquids versus momentum-transport in gases.\n\nThe same temperature change pushes the two states in opposite directions — an unusual feature worth quoting if asked to explain.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "In the falling-ball experiment, you could find $$\\eta$$ from a single ball measurement, or from a graph of $$v_t$$ vs $$r^2$$ using several balls. Give two reasons why the graph method is more reliable. (2 steps)", "answer": "- Step 1: **Averaging out random errors.** A single measurement is sensitive to random errors (reaction time, slight misalignment of the ball, temperature fluctuations). A best-fit line through multiple data points averages out these random fluctuations, giving a more reliable gradient and hence a more reliable $$\\eta$$.\n- Step 2: **Testing the validity of Stokes' Law.** If the graph of $$v_t$$ vs $$r^2$$ is a straight line through the origin, it confirms that the flow was laminar across all the balls used. If the larger balls produce points that curve upward, it signals that turbulence has set in and Stokes' Law is failing — those points can be excluded. A single measurement gives no such diagnostic.", "source": "GLM 5.1 ③", "_id": "glm_3_57"}, {"question": "You need to verify that a steel ball's terminal velocity calculation is correct. Describe the cross-check method that doesn't require re-deriving the formula. (2 steps)", "answer": "- Step 1: From the force balance at terminal velocity, the drag must equal the weight minus the upthrust: $$F_D = W - U$$. Calculate $$W - U$$ independently using $$W = \\rho_s V g$$ and $$U = \\rho_f V g$$.\n- Step 2: Then calculate $$F_D$$ from Stokes' Law using the computed $$v_t$$: $$F_D = 6\\pi\\eta r v_t$$. If the two values agree, the terminal velocity is correct. If they disagree, there is an arithmetic error in the $$v_t$$ calculation. This is the fastest way to catch mistakes — it is essentially asking \"does the speed I found actually satisfy the force balance?\"", "source": "GLM 5.1 ③", "_id": "glm_3_63"}, {"question": "Convert $$1\\,\\text{cm}^3$$ to $$\\text{m}^3$$. A common mistake is to write $$10^{-2}\\,\\text{m}^3$$. Why is that wrong, and what is the correct conversion? (2 steps)", "answer": "- Step 1: $$1\\,\\text{cm} = 10^{-2}\\,\\text{m}$$, so $$1\\,\\text{cm}^3 = (10^{-2})^3\\,\\text{m}^3 = 10^{-6}\\,\\text{m}^3$$. You must *cube* the conversion factor.\n- Step 2: The common mistake is to write $$10^{-2}\\,\\text{m}^3$$ — this treats the volume as if it were a length, forgetting that the prefix is cubed. Similarly, $$1\\,\\text{litre} = 10^{-3}\\,\\text{m}^3$$. Getting this wrong in a density calculation ($$\\rho = m/V$$) would make the density off by a factor of $$10^4$$, which could turn water into something denser than lead.", "source": "GLM 5.1 ①", "_id": "glm_1_53"}, {"question": "From $$v_t = \\dfrac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$, predict how the terminal velocity scales with each of: sphere radius, fluid viscosity, density difference. (3 steps)", "answer": "- Step 1: $$v_t \\propto r^2$$: doubling the radius quadruples the terminal velocity. Bigger spheres fall *much* faster — this is the strongest dependence.\n- Step 2: $$v_t \\propto 1/\\eta$$: thicker fluid means proportionally slower fall. Warming the fluid (which lowers $$\\eta$$ for a liquid) speeds up the sphere.\n- Step 3: $$v_t \\propto (\\rho_s - \\rho_f)$$: denser sphere or thinner fluid increases the driving force. Note it's the *difference*, not just $$\\rho_s$$ — forgetting upthrust would slightly overestimate $$v_t$$.\n\nThese three scalings together explain qualitative behaviour without needing the full numerical calculation.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "Why does the upthrust on a fully submerged object NOT depend on how deep it is held in the fluid? (2 steps)", "answer": "- Step 1: Pushing the object deeper raises the pressure on *both* its top and bottom faces by the same amount, $$\\rho_f g \\Delta h$$, because the fluid is uniform.\n- Step 2: Upthrust is the *difference* in those pressures times area. Since both pressures rise equally, their difference is unchanged. So upthrust depends only on the displaced volume and the fluid density — not on the absolute depth.\n\nThis is why a diver at 5 m and at 30 m feels the same buoyant force on their body (ignoring gas-compression effects in the lungs).", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Why does an object falling through a viscous fluid eventually reach a *constant* maximum speed (terminal velocity), rather than just accelerating forever? (3 steps)", "answer": "- Step 1: At release ($$v = 0$$), drag is zero (since $$F \\propto v$$), and weight exceeds upthrust. Net downward force is large, so the object accelerates downward.\n- Step 2: As speed grows, the drag force $$F_D = 6\\pi \\eta r v$$ grows linearly with $$v$$. So the *net* downward force = $$W - U - F_D$$ shrinks. Acceleration is still downward but smaller.\n- Step 3: At one specific speed, drag has grown just enough that $$W = U + F_D$$ exactly — net force is zero, so acceleration is zero, and speed stops changing. This is terminal velocity. Beyond it, the net force would point upward and slow the object down, so the object can never overshoot — it asymptotes onto $$v_t$$.\n\nA drag force that *grows with speed* is what guarantees a stable terminal velocity. A constant retarding force could not.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "Derive the fraction of a floating object that is submerged, showing that it equals $$\\rho_s / \\rho_f$$. (3 steps)", "answer": "- Step 1: For a floating object, equilibrium gives $$W = U$$. Write both in terms of densities: $$\\rho_s V_{\\text{tot}} g = \\rho_f V_{\\text{sub}} g$$.\n- Step 2: Cancel $$g$$ from both sides: $$\\rho_s V_{\\text{tot}} = \\rho_f V_{\\text{sub}}$$.\n- Step 3: Rearrange: $$\\frac{V_{\\text{sub}}}{V_{\\text{tot}}} = \\frac{\\rho_s}{\\rho_f}$$. The fraction submerged equals the ratio of the object's density to the fluid's density. For ice in seawater ($$\\rho_s = 920$$, $$\\rho_f = 1025$$), about 90% is submerged — the origin of \"tip of the iceberg.\"", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "Why does upthrust not depend on depth (for a liquid of uniform density)? Pushing an object deeper increases the pressure on it — so shouldn't the force increase? Explain the flaw in this reasoning. (2 steps)", "answer": "- Step 1: Pushing the object deeper *does* increase the pressure on every face — but it increases the pressure on the **top** face and the **bottom** face by the *same amount* ($$\\Delta P = \\rho_f g \\, \\Delta h$$).\n- Step 2: Upthrust is the *difference* between the upward force on the bottom and the downward force on the top. Since both increase by the same amount, their *difference* is unchanged. Upthrust depends only on the displaced volume, not on how deep the object sits. The flawed reasoning focuses on the absolute pressure increasing, but it's the pressure *difference* that matters — and that difference is set by the object's height, not its depth.", "source": "GLM 5.1 ①", "_id": "glm_1_55"}, {"question": "State the three (or four) validity conditions for Stokes' Law and explain why each matters.", "answer": "Stokes' Law $$F = 6\\pi \\eta r v$$ applies only when:\n- **Small, smooth sphere** — the geometry assumed in the derivation; a rough or non-spherical object disturbs the flow differently.\n- **Low speed** — at high speeds, inertial forces in the fluid dominate viscous ones, and drag stops being linear in $$v$$.\n- **Laminar (non-turbulent) flow** — the fluid slides past in smooth parallel sheets that close up neatly behind the sphere. Once turbulence forms (chaotic eddying), the drag law changes character entirely (roughly $$F \\propto v^2$$).\n- (Bonus) **No wall effects** — container much wider than sphere, otherwise walls slow the fluid and inflate apparent drag.\n\nFailing any one condition invalidates the law. That's why Stokes can't model aeroplanes, footballs, or cyclists.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "A floating hydrometer (weighted stem) rides higher in salt water than in fresh water. Explain why in terms of the floating-rod relation. (2 steps)", "answer": "- Step 1: The hydrometer's mass is fixed, so the *submerged volume* in each fluid must satisfy $$m = \\rho_f V_{\\text{sub}}$$ (since $$W = U$$ at floating equilibrium). The required submerged volume is $$V_{\\text{sub}} = m/\\rho_f$$.\n- Step 2: Salt water has higher $$\\rho_f$$, so the required $$V_{\\text{sub}}$$ is *smaller* — less of the hydrometer needs to be under water to provide enough upthrust. The instrument rides higher, exposing more of the stem above the surface. This is precisely how the device measures density: the higher it floats, the denser the fluid.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "Derive the terminal velocity formula $$v_t = \\frac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$ from the force balance. Show every cancellation step. (5 steps)", "answer": "- Step 1: Start from the balance: $$W = U + F_D$$.\n- Step 2: Substitute the three force formulas. Sphere volume $$V = \\frac{4}{3}\\pi r^3$$, so $$W = \\rho_s \\frac{4}{3}\\pi r^3 g$$ and $$U = \\rho_f \\frac{4}{3}\\pi r^3 g$$. Drag: $$F_D = 6\\pi\\eta r v_t$$. The equation becomes: $$\\rho_s \\frac{4}{3}\\pi r^3 g = \\rho_f \\frac{4}{3}\\pi r^3 g + 6\\pi\\eta r v_t$$.\n- Step 3: Collect the drag term on one side: $$6\\pi\\eta r v_t = \\frac{4}{3}\\pi r^3 g (\\rho_s - \\rho_f)$$.\n- Step 4: Divide both sides by $$6\\pi\\eta r$$: $$v_t = \\frac{\\frac{4}{3}\\pi r^3 g(\\rho_s - \\rho_f)}{6\\pi\\eta r} = \\frac{4\\pi r^3 g(\\rho_s - \\rho_f)}{18\\pi\\eta r}$$.\n- Step 5: Cancel $$\\pi$$ and one power of $$r$$, simplify $$4/18 = 2/9$$: $$v_t = \\frac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$. This formula is NOT on the data sheet — you must be able to derive it.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "How does a skydiver’s acceleration change before and after opening a parachute? (4 steps)", "answer": "- Step 1: **Before opening**. Acceleration $ a $ decreases as drag $ F_D \\propto v $ grows until $ v = v_t $.  \n  - Step 2: **Terminal velocity**. $ W = U + F_D \\Rightarrow a = 0 $.  \n  - Step 3: **After opening**. Drag increases sharply, $ F_D > W $, causing upward net force and deceleration.  \n  - Step 4: **New terminal velocity**. Drag reduces with speed until $ W = F_D + U $, achieving a slower $ v_{t,\\text{new}} $.  \n\n**Takeaway:** Parachute increases surface area, boosting drag and reducing $ v_t $.", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "Why is upthrust independent of the depth of an object submerged in a fluid? (3 steps)", "answer": "- Step 1: **Pressure difference**. Fluid pressure increases with depth: $ P = \\rho_f g h $.  \n  - Step 2: **Net upward force**. The pressure on the bottom face ($ P_2 A = \\rho_f g h_2 A $) is greater than on the top ($ P_1 A = \\rho_f g h_1 A $). The difference $ U = \\rho_f g A (h_2 - h_1) = \\rho_f g V $ depends only on the *volume* of the submerged object, not absolute depth.  \n  - Step 3: **Archimedes’ Principle**. Upthrust $ U = \\rho_f V g $ is the weight of displaced fluid. Since $ h_2 - h_1 $ (height) is fixed for a submerged object, depth doesn’t affect $ U $.  \n\n**Takeaway:** Upthrust depends on displaced volume, not depth.", "source": "Qwen 3 ②", "_id": "qwen_2_0"}, {"question": "You have found upthrust $$U = W_1 - W_2$$ by the apparent-weight method, and you also know the displaced volume $$V$$ from the change in fluid level. Show how to find the fluid's density, and explain why the *object's* density is not needed. (3 steps)", "answer": "- Step 1: Start from the upthrust formula: $$U = \\rho_f V g$$.\n- Step 2: Rearrange for the fluid density: $$\\rho_f = U / (Vg) = (W_1 - W_2) / (Vg)$$.\n- Step 3: The object's density $$\\rho_s$$ never appears. Upthrust depends only on the *fluid* displaced, not on what the object is made of. The object could be brass, aluminium, or plastic — as long as you know the upthrust (from the weight difference) and the displaced volume, the fluid density follows. This is the power of the method: you can find $$\\rho_f$$ without knowing anything about the object's material.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "What is the Reynolds number, and how does it quantitatively explain *why* the Stokes' Law conditions exist? (3 steps)", "answer": "- Step 1: The Reynolds number $$Re = \\rho_f v L / \\eta$$ compares inertial forces (which tend to keep the fluid moving in chaotic patterns) with viscous forces (which tend to keep the flow smooth and orderly). For a sphere, the length scale $$L$$ is the diameter $$2r$$.\n- Step 2: When $$Re \\lesssim 1$$, viscous forces dominate — the flow is laminar and Stokes' Law holds. This is the regime of \"small, slow objects in viscous fluids.\" When $$Re \\gtrsim 1000$$, inertial forces dominate — the flow becomes turbulent and Stokes' Law fails.\n- Step 3: This single number explains all the Stokes conditions simultaneously: a small sphere (small $$L$$) gives small $$Re$$; a low speed gives small $$Re$$; a high viscosity gives small $$Re$$. The conditions \"small,\" \"slow,\" and \"viscous\" are all just ways of saying \"keep $$Re$$ small.\"", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "Why does a falling object reach a *maximum* speed at all? Why can't it just keep accelerating? Explain using the relationship between drag and speed. (3 steps)", "answer": "- Step 1: At the moment of release, speed is zero, so drag is zero. The only forces are weight (down) and upthrust (up). Since $$W > U$$, there is a large downward resultant and the object accelerates.\n- Step 2: As speed increases, drag *grows with speed* (in Stokes' regime, $$F_D \\propto v$$). This drag opposes the motion, so the downward resultant force *shrinks*: $$F_{\\text{net}} = W - U - F_D$$. The object still accelerates, but less and less.\n- Step 3: There is exactly one speed at which drag has grown enough that $$W = U + F_D$$. At this speed, the resultant is zero, acceleration is zero, and the speed stops changing. The object cannot overshoot because if it went faster, drag would exceed the driving force and push it back. A force that *grows with speed* is what guarantees a stable terminal velocity.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "A skydiver falls but has not yet reached terminal velocity. The resultant force is downward and decreasing. Is the skydiver speeding up, slowing down, or moving at constant speed? Explain. (3 steps)", "answer": "- Step 1: Acceleration is determined by *resultant force direction and magnitude*, not its rate of change. If the resultant is downward and the skydiver is moving downward, then the skydiver is speeding up.\n- Step 2: The fact that the resultant is *decreasing* means the rate of speeding up is slowing — acceleration is falling toward zero — but the skydiver is still gaining speed each second.\n- Step 3: Only when the resultant reverses direction (points upward, against motion) does the skydiver actually slow down. So \"decreasing acceleration\" ≠ \"slowing down.\" The skydiver is still accelerating, just less than before.\n\nConfusing decreasing acceleration with deceleration is the single most common mistake in this topic.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "Sketch a $$v$$–$$t$$ graph for a skydiver who falls, reaches a first terminal velocity, opens a parachute, then reaches a second (lower) terminal velocity. Describe the shape of each segment and what it tells you about the forces. (4 steps)", "answer": "- Step 1: **Initial fall**: the curve rises from the origin with a steep gradient that gradually flattens. Steep gradient = large acceleration (weight dominates). Flattening = drag growing, acceleration shrinking. The curve levels off at the first terminal velocity $$v_{t1}$$ (horizontal line).\n- Step 2: **Parachute opens**: the speed drops sharply — a steep *negative* gradient. Drag now far exceeds weight, giving a large upward resultant and strong deceleration.\n- Step 3: **Slowing phase**: the curve continues downward but the gradient becomes less steep (less negative). Drag is falling as speed drops, so the deceleration eases.\n- Step 4: **Second terminal velocity**: the curve flattens to a new horizontal line at $$v_{t2} < v_{t1}$$. Drag has decreased to equal weight again. The diver falls at this constant, slower speed. The graph never goes negative — the diver never flies upward.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "Why does the viscosity of a liquid *decrease* with rising temperature, while the viscosity of a gas *increases*? (3 steps)", "answer": "- Step 1: In a **liquid**, viscosity comes from intermolecular attractions. Heating gives molecules more kinetic energy, so they can more easily break free of neighbours and slide past them. The attractions matter less, internal friction falls, so $$\\eta$$ **decreases**. (Warm honey runs faster than cold honey.)\n- Step 2: In a **gas**, molecules are far apart and rarely attract. Viscosity here comes from molecules randomly *diffusing* across the boundary between fast- and slow-moving layers, carrying momentum with them. This momentum transfer is what makes layers \"grip\" each other.\n- Step 3: Heating a gas makes molecules move faster, so they cross between layers more frequently and transport *more* momentum per unit time. The layers grip more strongly — $$\\eta$$ **increases**.\n\nThe two trends look opposite but both follow from \"viscosity = whatever resists relative motion between layers,\" with different microscopic origins.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "Why does a submerged object experience a net upward force from the surrounding fluid, even though pressure pushes inward on all faces? (3 steps)", "answer": "- Step 1: Fluid pressure at a point depends on depth, $$P = \\rho_f g h$$. Horizontal pushes on opposite vertical faces sit at the same depth, so they cancel exactly.\n- Step 2: The top face of the object sits at a smaller depth $$h_1$$ than the bottom face at $$h_2 = h_1 + L$$. So the upward push on the bottom, $$P_2 A$$, is larger than the downward push on the top, $$P_1 A$$.\n- Step 3: The net (vertical) force is upward and equals $$(P_2 - P_1)A = \\rho_f g L A = \\rho_f g V$$, exactly the weight of fluid displaced. The horizontal cancellation plus the vertical mismatch *is* upthrust.\n\nThe asymmetry of pressure-with-depth is the entire origin of buoyancy.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "A hollow plastic ball of average density less than water is held fully submerged and released. Describe its initial acceleration qualitatively. (3 steps)", "answer": "- Step 1: At the moment of release, the ball has zero speed, so viscous drag is zero. Only weight (down) and upthrust (up) act.\n- Step 2: Since $$\\rho_s < \\rho_f$$, we have $$W < U$$, so the resultant force is upward and substantial.\n- Step 3: Acceleration is $$F_{\\text{net}}/m$$ upward, and because the mass is small (low density) and the net force is large, the upward acceleration can be much greater than $$g$$. The ball shoots upward — it does not just rise slowly. Drag then quickly builds up and (along with potential turbulence) limits the speed.\n\nA common mistake is to assume that buoyancy can only produce gentle motion; for low-density objects in dense fluids, initial accelerations can be many times $$g$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "A fully submerged object is pushed twice as deep in a liquid of uniform density. What happens to the upthrust — does it double, stay the same, or something else? Explain why. (2 steps)", "answer": "- Step 1: The upthrust **stays the same**. The formula $$U = \\rho_f V g$$ contains no depth variable — it depends only on the fluid density, the displaced volume, and $$g$$.\n- Step 2: Pushing the block deeper raises the pressure on *both* the top and bottom faces by the same amount ($$\\rho_f g \\, \\Delta h$$). Their *difference* — which is what produces upthrust — is unchanged. The cancelled $$h_1$$ in the derivation (Q8) confirms this mathematically. This holds provided the fluid's density is uniform (true for liquids; for gases, density increases with depth and the picture is more subtle).", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "An object floats in equilibrium on the surface of a liquid. Compare the weight of the object to the weight of the fluid it displaces, and compare the object's density to the fluid's density. (2 steps)", "answer": "- Step 1: Because the object is in equilibrium, the upward upthrust must balance the downward weight ($$W = U$$). By Archimedes' Principle, upthrust equals the weight of the displaced fluid, so the **weight of the object equals the weight of the displaced fluid**.\n- Step 2: Since the object floats, it must be partially above the surface, meaning its submerged volume is less than its total volume. For the weight of a small volume of fluid (displaced) to equal the weight of a larger volume of the object (total), the **object's density must be less than the fluid's density** ($$\\rho_s < \\rho_f$$).\n\nIf densities were equal, the object would hover neutrally at any depth; if greater, it would sink.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "Derive the upthrust formula $$U = \\rho_f V g$$ from the pressure-difference picture for a rectangular block of cross-section $$A$$ and height $$L$$ submerged with its top at depth $$h_1$$ and its bottom at depth $$h_2 = h_1 + L$$. (5 steps)", "answer": "- Step 1: Write the pressure at each face using $$P = \\rho_f g h$$. Top face: $$P_1 = \\rho_f g h_1$$. Bottom face: $$P_2 = \\rho_f g h_2$$.\n- Step 2: Convert each pressure to a force by multiplying by the cross-sectional area $$A$$: $$F_{\\text{down}} = P_1 A = \\rho_f g h_1 A$$ and $$F_{\\text{up}} = P_2 A = \\rho_f g h_2 A$$.\n- Step 3: The net upward force (upthrust) is the difference: $$U = F_{\\text{up}} - F_{\\text{down}} = \\rho_f g A (h_2 - h_1)$$.\n- Step 4: Recognise that $$h_2 - h_1 = L$$, the height (length) of the block, so $$U = \\rho_f g A L$$.\n- Step 5: Since $$A \\times L = V$$ (the submerged volume), we get $$U = \\rho_f V g$$. Notice: $$h_1$$ cancelled out entirely — upthrust does not depend on how deep the object is, only on the displaced volume.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "Why does a floating object ride higher in salt water than in fresh water? (3 steps)", "answer": "- Step 1: The object's mass and cross-section are unchanged. Only the fluid density has increased.\n- Step 2: From the floating-rod relation $$m = \\rho_f A \\Delta h$$, with $$m$$ and $$A$$ fixed, increasing $$\\rho_f$$ requires $$\\Delta h$$ to decrease.\n- Step 3: Less depth needs to be submerged to displace the same weight of (now denser) liquid. The object rides higher. This is exactly how a hydrometer works — measuring how high it floats tells you the density of the liquid.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "Pressure in a fluid increases linearly with depth: $$P = \\rho g h$$. Explain *why* this is the physical origin of upthrust — what would happen if pressure were the same at all depths? (3 steps)", "answer": "- Step 1: In a real fluid, a deeper point supports a taller column of fluid above it, so the pressure is higher. This means the bottom face of a submerged object sits at a higher pressure than its top face.\n- Step 2: The higher pressure on the bottom face pushes *up* harder than the lower pressure on the top face pushes *down*. The horizontal pressures cancel (left = right), but the vertical pressures do not — the net result is an upward force: upthrust.\n- Step 3: If pressure were the same at all depths (no $$\\rho g h$$ gradient), the forces on the top and bottom faces would be equal and opposite, cancelling completely. There would be no upthrust at all — objects would not float, and Archimedes' Principle would not exist. The pressure gradient is the *cause*; upthrust is the *consequence*.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "What is \"neutral buoyancy\" and what's the precise density condition for it? Give an example.", "answer": "Neutral buoyancy is the state where a fully submerged object neither rises nor sinks — it hovers at any depth. The condition is $$\\rho_s = \\rho_f$$, i.e. the object's density exactly equals the fluid's density. Then when fully submerged, $$W = \\rho_s V g = \\rho_f V g = U$$, and the resultant force is zero everywhere. A fish controls its buoyancy by adjusting the volume (and hence density) of its swim bladder to match water density precisely — that's how it can stay at any depth without constantly swimming. Submarines do the same by flooding/emptying ballast tanks.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "A sphere falls at terminal velocity through oil with drag $$F_D$$. The oil is then warmed. What happens to the terminal velocity? (3 steps)", "answer": "- Step 1: Warming a *liquid* decreases its viscosity $$\\eta$$ (intermolecular attractions are more easily overcome).\n- Step 2: From $$v_t \\propto 1/\\eta$$, decreasing $$\\eta$$ increases $$v_t$$.\n- Step 3: Physically: the warmer oil offers less resistance per unit speed, so the sphere must move faster before drag grows enough to balance weight. The terminal velocity is higher. (For a gas instead of a liquid, the trend would reverse: warming raises $$\\eta$$ and lowers $$v_t$$.)", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "A skydiver spreads into a \"star\" shape instead of diving head-first. Both positions are at terminal velocity, but the star position has a lower terminal velocity. Explain why, without doing any calculations. (2 steps)", "answer": "- Step 1: The star shape presents a much larger cross-sectional area to the air. At any given speed, the drag force is larger (more air molecules are hit per second, and the wake is wider).\n- Step 2: The weight is the same in both positions. Since drag balances weight at terminal velocity, a larger drag at every speed means the drag reaches the weight value at a *lower* speed. The star position therefore has a lower terminal velocity. The diver hasn't changed their weight — they've changed the drag-versus-speed relationship by changing their shape.", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "A fluid cell in a medical device uses a narrow tube to move fluid by applying pressure. The designer notices that at high flow rates, the pressure needed to maintain flow increases more than expected. Using your knowledge of fluid behaviour, explain what is happening and suggest how to address it. (2 steps)", "answer": "- Step 1: At low flow rates, the fluid moves in **laminar** flow — smooth, parallel layers. The pressure drop follows Poiseuille's law (which is essentially Stokes' Law applied to pipe flow): $\\Delta P \\propto v$. However, as the flow rate increases, the Reynolds number $Re = \\rho_f v L / \\eta$ increases. Once $Re$ exceeds a critical value (typically around 2000-4000 for pipes), the flow becomes **turbulent**.\n- Step 2: In turbulent flow, energy is dissipated not only by viscous friction but also by the chaotic formation of eddies and vortices. This creates a much larger pressure drop for a given flow rate. The relationship becomes $\\Delta P \\propto v^2$ or worse. To address this, the designer could: (a) increase the tube diameter (reduces velocity for same flow rate), (b) reduce the flow rate, (c) use a fluid with lower viscosity (if possible), or (d) ensure the entrance to the tube is designed to minimise turbulence. This is the same physics that limits how fast fluids can be pumped through pipelines — beyond certain speeds, you hit the turbulent regime and need exponentially more pressure.", "source": "MiniMax ①", "_id": "minimax_1_38"}, {"question": "A hollow plastic ball (average density less than water) is fully submerged and then released. Describe the motion of the ball from the moment of release, assuming it cannot escape the water surface. (3 steps)", "answer": "- Step 1: At release ($v = 0$), the ball experiences weight $W$ (down) and upthrust $U$ (up). Since $\\rho_{\\text{plastic}} < \\rho_{\\text{water}}$, we have $W < U_{\\max}$, and at full submersion $W < U$. There is an upward resultant force $U - W$, so the ball accelerates upward.\n- Step 2: As the ball rises, it emerges from the water. The submerged volume decreases, so upthrust $U = \\rho_f V_{\\text{sub}} g$ decreases. The weight remains constant. The upward resultant force decreases.\n- Step 3: Eventually, the ball reaches the surface and protrudes above. At some point, the submerged volume becomes just enough that $U = W$ (the weight of displaced water equals the ball's weight). At this equilibrium, the resultant force is zero, and the ball floats partially submerged with no further motion. The ball never overshoots because as soon as it rises higher, $V_{\\text{sub}}$ and $U$ decrease, creating a downward force pushing it back down.", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "A solid cone of base radius $R$, height $H$, and density $\\rho_s$ floats point-down in a liquid of density $\\rho_f$ (where $\\rho_s < \\rho_f$). Only the pointed tip is above the surface. Derive an expression for the fraction of the cone's volume that is submerged. (3 steps)", "answer": "- Step 1: For floating equilibrium, $W = U$. The weight is $W = \\rho_s V_{\\text{total}} g$, where $V_{\\text{total}} = \\frac{1}{3}\\pi R^2 H$ for a cone. The upthrust equals the weight of liquid displaced by the submerged portion.\n- Step 2: The submerged portion is a smaller, similar cone of height $h$, with base radius $r$ (where $r/R = h/H$). Its volume is $V_{\\text{sub}} = \\frac{1}{3}\\pi r^2 h = \\frac{1}{3}\\pi (R \\frac{h}{H})^2 h = \\frac{1}{3}\\pi R^2 \\frac{h^3}{H^2}$.\n- Step 3: Set $W = U$: $$\\rho_s \\left(\\frac{1}{3}\\pi R^2 H\\right) g = \\rho_f \\left(\\frac{1}{3}\\pi R^2 \\frac{h^3}{H^2}\\right) g$$ Cancel $\\frac{1}{3}\\pi R^2 g$: $$\\rho_s H = \\rho_f \\frac{h^3}{H^2}$$ Solve for the ratio $h/H$: $$\\frac{h}{H} = \\left(\\frac{\\rho_s}{\\rho_f}\\right)^{1/3}$$ The volume of a cone scales as $h^3$ (since $V \\propto r^2 h$ and $r \\propto h$), so the fraction submerged is: $$\\frac{V_{\\text{sub}}}{V_{\\text{total}}} = \\left(\\frac{h}{H}\\right)^3 = \\frac{\\rho_s}{\\rho_f}$$ Interestingly, this gives the same result as a fully submerged object: the fraction submerged equals the ratio of object density to fluid density. This holds for any similarly-shaped floating body.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "A student derives terminal velocity using only $$mg = 6\\pi\\eta r v_t$$ (ignoring upthrust). For a steel ball in oil, this gives a value about 13% too high. Explain why the error is in this direction, and when it would be *negligible*. (3 steps)", "answer": "- Step 1: The simplified balance $$mg = F_D$$ ignores upthrust, so it attributes *all* of the weight to drag. The correct balance is $$mg - U = F_D$$, where upthrust carries some of the weight.\n- Step 2: Since upthrust reduces the \"driving force\" from $$mg$$ to $$mg - U$$, the correct terminal velocity is lower. Ignoring upthrust overestimates the driving force and therefore overestimates $$v_t$$.\n- Step 3: The error is negligible when upthrust is tiny compared to weight — i.e. when the fluid density is much smaller than the object's density (e.g. a steel ball falling through *air*). For a dense ball in a dense liquid (steel in oil, where $$\\rho_f / \\rho_s \\approx 0.11$$), the error is significant (~13%) and must not be ignored.", "source": "GLM 5.1 ③", "_id": "glm_3_54"}, {"question": "Why does $$v_t$$ scale as $$r^2$$ rather than as $$r^3$$ (the volume) or as $$r$$ (the drag prefactor)? (3 steps)", "answer": "- Step 1: Weight grows as $$r^3$$, because it depends on volume. The driving (downward) force scales like $$r^3$$.\n- Step 2: Stokes drag at a *given speed* grows only as $$r$$, because $$F_D = 6\\pi\\eta r v$$. So the resistance per unit speed scales like $$r$$.\n- Step 3: For balance, $$r v_t \\propto r^3$$, so $$v_t \\propto r^2$$. The mismatch between $$r^3$$ (weight) and $$r^1$$ (drag-per-speed) is exactly what produces the $$r^2$$ scaling.\n\nBig things fall fast in viscous fluids because their weight grows faster with size than their viscous resistance.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "A spherical raindrop falls through air. As it falls, it collides with water vapour molecules and accumulates more mass. Explain how this affects its terminal velocity over time. (2 steps)", "answer": "- Step 1: As the raindrop falls and collects vapour, its mass increases. Since weight $W = mg$ increases, while the upthrust (negligible in air) stays tiny, the net driving force $W - U$ increases.\n- Step 2: However, as the drop grows, its radius increases too. This has two competing effects: (a) more weight pushes it toward higher $v_t$ (since $v_t \\propto r^2$ and also weight $\\propto r^3$), but (b) the drag coefficient also changes because the larger drop may experience turbulent flow (Stokes' Law no longer applies when $Re \\gtrsim 1$).\n+ In reality, larger raindrops fall faster than small ones (they reach higher terminal velocities), but they are also subject to aerodynamic breakup. The key point: increasing mass tends to increase terminal velocity, but the changing shape and flow regime complicate the picture.", "source": "MiniMax ①", "_id": "minimax_1_23"}, {"question": "Why is the linear dependence of Stokes drag on speed ($$F \\propto v$$) what *guarantees* that a falling sphere reaches a terminal velocity? (3 steps)", "answer": "- Step 1: At rest, drag is zero, so the net force on the sphere is large and downward. It accelerates.\n- Step 2: As it speeds up, drag grows in *direct* proportion to $$v$$. The net downward force shrinks, so acceleration decreases — but the sphere still speeds up.\n- Step 3: There is exactly one speed at which drag has grown just enough to cancel weight (minus upthrust). At that speed, resultant is zero and acceleration is zero. Crucially, if the sphere overshot, the resultant would point backward and slow it down, so it asymptotically settles at $$v_t$$.\n\nIf drag were constant (independent of speed), there would be no way for the force balance to \"find\" itself — the sphere would either always accelerate or always decelerate. A speed-dependent drag is what makes terminal velocity possible.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Why does upthrust exist at all? A submerged block has fluid pressing on every face — why don't all those pressures just cancel out? (3 steps)", "answer": "- Step 1: The horizontal pressures *do* cancel — the push from the left equals the push from the right because they act at the same depth.\n- Step 2: The vertical pressures do *not* cancel, because the bottom face sits at a *greater depth* than the top face. Since $$P = \\rho g h$$, deeper means higher pressure: $$P_{\\text{bottom}} > P_{\\text{top}}$$.\n- Step 3: The upward force on the bottom face ($$P_{\\text{bottom}} \\times A$$) exceeds the downward force on the top face ($$P_{\\text{top}} \\times A$$). The leftover is a net *upward* force — that is upthrust. Without the depth-dependent pressure gradient, upthrust would not exist.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "When a parachute opens, the acceleration points upward (deceleration). A student asks \"can the acceleration go below zero?\" Clarify what this means and whether the diver's velocity can reverse. (2 steps)", "answer": "- Step 1: \"Acceleration below zero\" in the coordinate system where down is positive means the acceleration is *negative* — i.e. directed upward. This is exactly what happens when the parachute opens: drag exceeds weight, so the net force and acceleration point upward. The diver decelerates. This is perfectly physical and expected.\n- Step 2: The diver's velocity *cannot* reverse (start going upward) because as the diver slows, drag decreases. By the time the speed reaches zero, drag would also be zero, and weight would pull the diver down again. In practice, the diver never reaches zero speed — they settle onto the second terminal velocity $$v_{t2}$$ which is still downward. The upward acceleration only exists while the speed is above $$v_{t2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "Three common numerical pitfalls in terminal velocity calculations are: using diameter instead of radius, using $$\\rho_s$$ instead of $$(\\rho_s - \\rho_f)$$, and leaving $$r$$ in mm. Estimate the error in each case. (3 steps)", "answer": "- Step 1: **Diameter for radius**: Since $$v_t \\propto r^2$$, substituting diameter $$d = 2r$$ gives $$(2r)^2 = 4r^2$$ — the answer is **4× too large**. Always halve the diameter first.\n- Step 2: **Using $$\\rho_s$$ instead of $$(\\rho_s - \\rho_f)$$**: This ignores upthrust. For a steel ball in oil ($$\\rho_s = 7800$$, $$\\rho_f = 880$$), using 7800 instead of 6920 overestimates by about $$\\frac{7800 - 6920}{6920} \\approx 13\\%$$. For objects in air the error is tiny, but in liquids it's significant.\n- Step 3: **Leaving $$r$$ in mm**: Since $$r$$ is squared and in metres, a $$1\\,\\text{mm}$$ radius should be $$1.0 \\times 10^{-3}\\,\\text{m}$$. Leaving it as $$1$$ gives $$r^2 = 1$$ instead of $$10^{-6}$$ — the answer is off by a factor of **one million**. Always convert to metres before squaring.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "Explain the following statement: \"A force that grows with speed is what guarantees a stable terminal velocity; a constant resistive force could not.\" What would happen if drag were constant regardless of speed? (2 steps)", "answer": "- Step 1: With speed-dependent drag, if the object accidentally goes *faster* than $$v_t$$, drag exceeds the driving force and pushes it back toward $$v_t$$. If it goes *slower*, drag is insufficient and it accelerates back up. The equilibrium is **self-correcting** — hence stable.\n- Step 2: If drag were constant (independent of speed), there would be only two possibilities: either the constant drag exactly equals the net driving force (unlikely coincidence, and unstable — any perturbation would send the object accelerating away), or it doesn't, and the object accelerates indefinitely. There's no mechanism to automatically find a balance. The speed-dependent nature of drag is essential for terminal velocity to exist at all.", "source": "GLM 5.1 ①", "_id": "glm_1_59"}, {"question": "Suppose you halve the radius of a sphere falling in a fluid (keeping all other quantities the same). Without computing exactly, what happens to the time it takes to reach (approximately) terminal velocity, and to the value of that terminal velocity itself?", "answer": "The terminal velocity drops by a factor of 4 (since $$v_t \\propto r^2$$, and $$(1/2)^2 = 1/4$$). The time to \"essentially reach\" terminal velocity is a more subtle question — but conceptually, a smaller ball has less mass and less drag both, scaling differently. The characteristic timescale to approach $$v_t$$ is roughly $$\\tau \\sim m/(6\\pi \\eta r) \\propto r^3/r = r^2$$. So halving $$r$$ quarters the time-constant — smaller spheres reach their (much lower) terminal velocities much *faster*. This is why fine dust settles slowly but reaches its tiny terminal velocity almost immediately, while a hailstone takes longer to plateau at its much higher one.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "Why does the terminal velocity formula v_t = 2r²g(ρ_s - ρ_f)/(9η) contain the density difference (ρ_s - ρ_f) rather than just the sphere's density? Explain conceptually.", "answer": "The driving force for motion is the **net** downward force: weight minus upthrust.\n\n- Weight ∝ ρ_s (the object's density)\n- Upthrust ∝ ρ_f (the fluid's density)\n\nWhat matters is the difference: the effective \"weight in the fluid\" — how much heavier the sphere is than the fluid it displaces. If ρ_s = ρ_f (neutral buoyancy), the sphere wouldn't sink at all (v_t = 0). The (ρ_s - ρ_f) term captures this physics correctly.\n\nUsing just ρ_s would ignore upthrust entirely and overestimate v_t.", "source": "MiniMax ②", "_id": "minimax_2_37"}, {"question": "Why is upthrust often (but not always) negligible for a small dense object falling through a gas, but never negligible for the same object falling through a liquid? (3 steps)", "answer": "- Step 1: Upthrust is $$U = \\rho_f V g$$, proportional to the fluid density. Weight is $$W = \\rho_s V g$$. Their ratio is $$U/W = \\rho_f/\\rho_s$$.\n- Step 2: For a steel ball ($$\\rho_s \\approx 7800$$) in air ($$\\rho_f \\approx 1.2$$): $$U/W \\approx 1.5 \\times 10^{-4}$$, truly negligible. In oil ($$\\rho_f \\approx 900$$): $$U/W \\approx 0.12$$, about 12% — not negligible.\n- Step 3: So in falling-ball viscometer analysis, the simplified $$mg = 6\\pi\\eta r v$$ form is okay for objects falling through gas but should be replaced by the full $$W = U + F_D$$ for liquids.\n\nThe discriminator is always the *ratio* of fluid density to object density.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Explain the three buoyancy outcomes (sink, float, hover) in terms of comparing densities, and link each to the force balance. (3 steps)", "answer": "- Step 1: Compare object density $$\\rho_s$$ with fluid density $$\\rho_f$$. The maximum possible upthrust is $$U_{\\max} = \\rho_f V_{\\text{obj}} g$$, achieved when fully submerged.\n- Step 2: Outcomes:\n+ **Sinks** if $$\\rho_s > \\rho_f$$: even fully submerged, $$W > U_{\\max}$$, so net downward force remains and the object descends until it hits the bottom.\n+ **Floats** (partly out) if $$\\rho_s < \\rho_f$$: $$W < U_{\\max}$$, so the object rises until the *submerged* volume displaces a fluid weight exactly equal to its own weight.\n+ **Hovers (neutral buoyancy)** if $$\\rho_s = \\rho_f$$: $$W = U_{\\max}$$ when fully submerged, so equilibrium is achieved at any depth.\n- Step 3: The deciding question is always $$\\rho_s$$ vs $$\\rho_f$$ — never \"is the object heavy?\" because a heavy steel ship floats while a tiny pebble sinks. Density, not weight, determines buoyancy outcome.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "A few seconds into a skydive, the resultant force is still downward but smaller than the weight. The student says \"the diver is slowing down.\" Why is this wrong? What's actually happening? (3 steps)", "answer": "- Step 1: A *downward* resultant force means the diver is still accelerating *downward*, by Newton's Second Law. So the speed is still increasing — the diver is still speeding up.\n- Step 2: What has changed is the *magnitude* of acceleration. As drag has grown, the net downward force has shrunk, so the diver is accelerating *less rapidly* than at the start. It feels like easing off, but speed is still rising.\n- Step 3: True deceleration would require the resultant force to point *upward* (against the direction of motion). For a falling skydiver pre-parachute, this never happens — drag never exceeds weight before terminal velocity.\n\nThe lesson: \"acceleration decreasing toward zero\" ≠ \"slowing down.\" It means speeding up ever more gently.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "Contrast laminar and turbulent flow around a moving sphere. What does each \"look like\" and how does drag scale with speed in each case?", "answer": "**Laminar flow:** the fluid moves in smooth, parallel sheets that slide past the sphere and close up neatly behind it. The wake is calm and predictable. Drag arises purely from viscosity and scales linearly: $$F \\propto v$$. This is the regime where Stokes' Law applies.\n\n**Turbulent flow:** the parallel sheets break into chaotic, swirling eddies, especially behind the sphere. The wake is messy. Drag arises mostly from the kinetic energy thrown into these eddies (an inertial effect), and scales roughly with the *square* of speed: $$F \\propto v^2$$.\n\nThe transition is governed by the Reynolds number $$Re = \\rho_f v L / \\eta$$ — small $$Re$$ means viscosity dominates (laminar), large $$Re$$ means inertia dominates (turbulent).", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Two spheres of the *same material* (same density) are dropped into the same fluid. Sphere Y has twice the radius of sphere X. By what factors do their weights and terminal velocities differ? Explain the mismatch. (3 steps)", "answer": "- Step 1: Weight scales with volume: $$W \\propto V \\propto r^3$$. So Y's weight is $$2^3 = 8$$ times X's.\n- Step 2: Terminal velocity scales as $$v_t \\propto r^2$$ (other quantities fixed). So Y's terminal velocity is $$2^2 = 4$$ times X's.\n- Step 3: Why the mismatch? Weight grows as $$r^3$$ but Stokes drag per unit speed grows only as $$r$$ (from $$F = 6\\pi\\eta r v$$). So the speed required for drag to match weight is determined by $$r \\cdot v \\propto r^3$$, giving $$v \\propto r^2$$. This $$r^3$$-vs-$$r^1$$ asymmetry between weight and drag-per-speed is the fundamental reason behind the $$r^2$$ scaling of $$v_t$$.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Using the \"imaginary fluid-shape\" intuition, explain why upthrust equals the weight of displaced fluid. (3 steps)", "answer": "- Step 1: Imagine removing the submerged part of the object and replacing that exact same shape with the surrounding fluid itself. This fluid-shape is in equilibrium with the rest of the fluid — it just sits there, not moving.\n- Step 2: For that fluid-shape to be in equilibrium, the surrounding fluid must push it up with a force equal to its weight, $$\\rho_f V g$$.\n- Step 3: The surrounding fluid cannot distinguish between the imagined fluid-shape and the real object — it only \"sees\" the boundary. So it pushes up on the real object with exactly the same force, $$\\rho_f V g$$. This is upthrust = weight of fluid displaced.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "Looking at $$v_t = \\dfrac{2 r^2 g (\\rho_s - \\rho_f)}{9 \\eta}$$, how does $$v_t$$ depend on each of $$r$$, $$\\eta$$, and $$(\\rho_s - \\rho_f)$$? Give physical reasoning.", "answer": "- **Radius:** $$v_t \\propto r^2$$. Doubling the radius quadruples $$v_t$$. Reason: weight scales as $$r^3$$ but Stokes drag per unit speed only scales as $$r^1$$ — so speed must rise as $$r^2$$ to make $$rv$$ match $$r^3$$.\n- **Viscosity:** $$v_t \\propto 1/\\eta$$. A \"thicker\" fluid produces more drag per unit speed, so balance is reached at a lower speed.\n- **Density difference:** $$v_t \\propto (\\rho_s - \\rho_f)$$. A denser sphere or thinner fluid means a larger net downward force ($$W - U$$) to overcome with drag, requiring higher $$v_t$$. Importantly, if $$\\rho_s < \\rho_f$$ this would be negative — the sphere rises rather than falls.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "The terminal velocity formula is $$v_t = \\frac{2r^2 g(\\rho_s - \\rho_f)}{9\\eta}$$. Explain each proportionality: (a) why $$r^2$$ and not just $$r$$? (b) why the *difference* of densities, not just $$\\rho_s$$? (c) why is $$\\eta$$ in the denominator? (3 steps)", "answer": "- Step 1: $$v_t \\propto r^2$$: Weight grows as $$r^3$$ (volume), but drag at a given speed grows only as $$r$$ (Stokes: $$F \\propto r v$$). To restore balance, speed must climb until $$r v \\propto r^3$$, giving $$v \\propto r^2$$. The mismatch between $$r^3$$ (weight) and $$r$$ (drag per unit speed) is exactly why bigger spheres fall *much* faster.\n- Step 2: $$v_t \\propto (\\rho_s - \\rho_f)$$: The *net downward force* driving the motion is $$W - U = (\\rho_s - \\rho_f)Vg$$. If $$\\rho_s = \\rho_f$$, there's no net driving force and $$v_t = 0$$ (neutral buoyancy — it doesn't fall at all). Using only $$\\rho_s$$ would ignore upthrust and overestimate $$v_t$$.\n- Step 3: $$v_t \\propto 1/\\eta$$: A more viscous fluid provides more drag at any given speed, so the drag catches up to the driving force at a *lower* speed. Thicker fluid → slower terminal velocity.", "source": "GLM 5.1 ①", "_id": "glm_1_30"}, {"question": "A skydiver falls, reaches terminal velocity, opens a parachute, and reaches a second (lower) terminal velocity. Describe the five phases in terms of force balance and the direction of the resultant force. (5 steps)", "answer": "- Step 1: **Initial fall:** $$W > U + F_D$$, resultant is *downward*. The diver accelerates downward — speed increases with a decreasing rate.\n- Step 2: **First terminal velocity:** $$W = U + F_D$$, resultant is *zero*. Acceleration is zero, speed is constant at $$v_{t1}$$ (the fast terminal velocity).\n- Step 3: **Parachute opens:** The surface area increases dramatically, so drag jumps to a much larger value: $$U + F_D \\gg W$$, resultant is *upward*. This causes a large *deceleration* — the diver slows down rapidly.\n- Step 4: **Slowing:** As the diver slows, drag decreases (since $$F_D \\propto v$$). The upward resultant shrinks but is still upward — the diver is still decelerating, just less vigorously.\n- Step 5: **Second terminal velocity:** Drag has fallen until $$U + F_D = W$$ again, resultant is *zero*. The diver now moves at a constant, lower speed $$v_{t2} < v_{t1}$$. At both terminal velocities, the drag equals the weight (assuming upthrust from air is negligible).", "source": "GLM 5.1 ③", "_id": "glm_3_37"}, {"question": "Which of these is a valid unit for viscosity $ \\eta $: N·s·m⁻², N·m⁻², or kg·m⁻²·s⁻¹? Justify with dimensional analysis.", "answer": "- Step 1: **Start with Stokes’ Law**: $ F = 6 \\pi \\eta r v $.  \n  - Step 2: **Units of force**: $ F $ has units $ \\text{kg·m/s²} $.  \n  - Step 3: **Solve for $ \\eta $**. Cancel $ r $ (m) and $ v $ (m/s):  \n  $ \\eta = \\frac{F}{6 \\pi r v} \\Rightarrow \\frac{\\text{kg·m/s²}}{\\text{m·m/s}} = \\text{kg/(m·s)} $.  \n  - Step 4: **Relate to options**. $ \\text{kg/(m·s)} = \\text{N·s/m²} = \\text{Pa·s} $. Reject $ \\text{N·m⁻²} $ (unit of pressure) and $ \\text{kg·m⁻²·s⁻¹} $ (dimensionally incorrect).  \n\n**Takeaway:** $ \\eta $ has units of viscosity = stress × time.", "source": "Qwen 3 ②", "_id": "qwen_2_7"}, {"question": "Compare laminar and turbulent flow, and explain what happens to Stokes' Law in each regime.", "answer": "In laminar flow, fluid slides past the object in smooth, parallel layers that close up cleanly behind it; drag is purely viscous and rises in *direct* proportion to speed — this is the regime where $$F = 6\\pi\\eta r v$$ holds. In turbulent flow, the layers break into chaotic, swirling eddies, the wake becomes disordered, and drag rises roughly with the *square* of speed — a completely different law. The transition is driven by speed and size: small/slow objects stay laminar, large/fast ones go turbulent. Stokes' Law is valid only in the laminar regime, which is why \"low speed\" and \"small sphere\" are essential conditions.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "Two identical-radius balls fall in the same oil. One is twice as dense as the other. Without computing exact numbers, qualitatively compare their $$v$$-$$t$$ graphs.", "answer": "Both curves start at the origin and asymptote onto horizontal lines (terminal velocities). The denser ball has a larger $$(\\rho_s - \\rho_f)$$, so:\n- Its initial gradient (acceleration) is steeper, since the net downward force $$W - U$$ is bigger.\n- Its plateau is higher — because $$v_t \\propto (\\rho_s - \\rho_f)$$, the denser ball reaches a higher terminal velocity.\n- The time to \"essentially reach\" terminal velocity depends on details (both how fast drag grows and how much it has to grow), but the higher curve sits entirely above the lower one throughout the asymptotic approach.\n\nQualitatively: same shape, denser ball's curve is steeper and higher.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "A sphere falls at terminal velocity in oil. Its weight is $$W$$ and the upthrust is $$U$$. Write an expression for the drag force $$F_D$$ at terminal velocity. Then explain how to cross-check your calculated $$v_t$$ — what two calculations should give the same answer? (2 steps)", "answer": "- Step 1: From the balance $$W = U + F_D$$, the drag at terminal velocity is $$F_D = W - U$$. This is the *net downward force* — the portion of weight not already balanced by upthrust.\n- Step 2: Cross-check method: (1) Calculate $$F_D$$ from the force balance: $$F_D = W - U$$. (2) Calculate $$F_D$$ from Stokes' Law using your computed $$v_t$$: $$F_D = 6\\pi\\eta r v_t$$. If the two values agree, your $$v_t$$ is correct. If they disagree, there's an arithmetic error somewhere. This is the fastest way to catch mistakes in terminal-velocity calculations.", "source": "GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "Explain *why* a falling object in a fluid must reach a terminal velocity — why can't it keep accelerating forever? (3 steps)", "answer": "- Step 1: The downward force (weight, minus upthrust) is constant — it doesn't change with speed. But the opposing drag force *grows with speed* (Stokes: $$F \\propto v$$; turbulent: $$F \\propto v^2$$).\n- Step 2: At low speed, drag is small, so the net force is large and downward — the object accelerates. As it speeds up, drag grows, so the net force shrinks. The acceleration decreases but the speed still increases.\n- Step 3: There is exactly one speed where drag (plus upthrust) has grown just enough to equal the weight. At that speed, the net force is zero, acceleration is zero, and the speed stops changing. Beyond that speed, drag would exceed weight, producing a net upward force that *slows the object back down*. So the object can never overshoot — it asymptotically approaches terminal velocity. A force that grows with speed is the essential ingredient; a constant resistive force could not guarantee a stable equilibrium.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "Imagine removing a submerged object and replacing it with fluid of the exact same shape and volume. Why does this thought experiment prove that upthrust equals the weight of the displaced fluid? (2 steps)", "answer": "- Step 1: If you replace the object with a \"body\" of fluid identical to the fluid surrounding it, that body of fluid would just sit there in static equilibrium. It is not accelerating up or down.\n- Step 2: For this fluid body to be in equilibrium, the surrounding fluid must be pushing up on it with a force exactly equal to the fluid body's weight ($$W_{fluid}$$). The surrounding fluid cannot tell the difference between the fluid body and a solid object of the same shape, so it pushes up on the solid object with the exact same force.\n\nThis is the intuitive proof of Archimedes' Principle: Upthrust is just the fluid supporting the \"ghost\" of the fluid you pushed out of the way.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "In some viscometers, instead of timing one ball, students time balls of several different radii and plot a graph of terminal velocity $v_t$ against radius squared $r^2$. Explain how this graphical method gives a more reliable value for viscosity than timing a single ball. (2 steps)", "answer": "- Step 1: From the terminal velocity formula (keeping everything else constant): $$v_t = \\frac{2g(\\rho_s - \\rho_f)}{9\\eta} \\, r^2 = k r^2$$ where $k$ is a constant for the experiment. This is a direct proportionality: $v_t \\propto r^2$. A graph of $v_t$ (y-axis) against $r^2$ (x-axis) should be a straight line through the origin.\n- Step 2: By plotting several points and drawing a best-fit line, random timing errors in individual runs are averaged out. The gradient of this line is $k = \\frac{2g(\\rho_s - \\rho_f)}{9\\eta}$. Rearranging: $$\\eta = \\frac{2g(\\rho_s - \\rho_f)}{9k}$$ Using the gradient rather than a single point means a single timing error has less impact on the final answer. Additionally, if the points show curvature at large $r^2$, this signals that Stokes' Law is breaking down (turbulent flow for larger/faster balls), which would alert the student to exclude those points or acknowledge the limitation.\n+ This method essentially uses the entire dataset to find $\\eta$, rather than trusting a single measurement.", "source": "MiniMax ①", "_id": "minimax_1_27"}, {"question": "Near Earth's surface, an object's weight is given by $$W = mg$$. But the deeper law is $$F = Gm_1 m_2 / r^2$$. Why do we use $$W = mg$$ in fluids problems instead of the gravitation law? (2 steps)", "answer": "- Step 1: The gravitation law is the *general* model — it works for any two masses at any separation. But near Earth's surface, $$r$$ is essentially constant (Earth's radius $$\\approx 6370\\,\\text{km}$$), so $$Gm_{\\text{Earth}}/r^2$$ collapses to a single constant we call $$g \\approx 9.81\\,\\text{N kg}^{-1}$$.\n- Step 2: Therefore $$W = mg$$ is the *practical simplification* for any object close to the ground. In fluids problems all objects are near the surface, so $$W = mg$$ is the correct tool. Using $$F = Gm_1 m_2/r^2$$ isn't wrong, but it's unnecessarily complicated and introduces extra variables that all cancel to give $$g$$ anyway.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "A vernier caliper has a main scale and a sliding vernier scale. What is the step-by-step procedure to read it, and why does reading the \"wrong part\" of the scale give a completely wrong integer part? (3 steps)", "answer": "- Step 1: Read the main scale at the mark *immediately to the left of* the vernier zero line. This gives the whole-number and first-decimal part of the measurement. The common mistake is reading from the vernier (sliding) scale instead — that scale only supplies the final decimal digit, and using it for the integer gives a value that can be off by over a centimetre.\n- Step 2: Find the single vernier line that aligns exactly with any main-scale line. The number of that vernier division is the next decimal place.\n- Step 3: Add the two readings together. For a 10-division vernier the resolution is $$0.1\\,\\text{mm}=0.01\\,\\text{cm}$$; for a 50-division vernier it is $$0.02\\,\\text{mm}$$.\n\nThe integer part *must* come from the main scale because the vernier scale is short (typically 1 cm for 10 divisions) and its numbers do not represent centimetres — they represent the fine decimal only.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "Two spheres of the same material but different sizes fall through oil. Sphere Y has twice the radius of sphere X. (a) By what factor is Y's weight larger? (b) By what factor is Y's terminal velocity larger? (c) Why isn't the answer to (b) the same as (a)? (3 steps)", "answer": "- Step 1: Weight $$\\propto V \\propto r^3$$. Doubling the radius multiplies weight by $$2^3 = \\mathbf{8}$$. Y is eight times heavier.\n- Step 2: Terminal velocity $$v_t \\propto r^2$$ (with $$\\rho_s$$, $$\\rho_f$$, $$\\eta$$ fixed). Doubling the radius multiplies $$v_t$$ by $$2^2 = \\mathbf{4}$$. Y's terminal velocity is four times X's.\n- Step 3: The answers differ because weight grows as $$r^3$$ but drag at a given speed grows only as $$r$$ (Stokes: $$F \\propto rv$$). The extra weight (factor 8) is partially compensated by the larger drag-per-speed (factor 2), so the speed only needs to increase by a factor of 4 to restore balance. If drag grew as fast as weight, the terminal velocity wouldn't change with size at all.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "Explain why a tennis ball reaches terminal velocity much faster than a bowling ball of similar size when both are dropped from a tall building. In your answer, discuss the relevant forces and the time scales involved. (2 steps)", "answer": "- Step 1: Both balls experience the same drag law ($F_D \\propto v$ at low speeds or $\\propto v^2$ at high speeds) and the same gravitational acceleration. However, the bowling ball has much greater mass, so its weight is larger. The net force $W - F_D$ at any given speed is therefore larger for the bowling ball.\n- Step 2: The time to reach terminal velocity depends on how quickly the accumulated drag can grow to match the weight. For the tennis ball (low mass), even a small drag force produces a significant deceleration, so it reaches equilibrium quickly. For the bowling ball (high mass), the same drag force produces only a tiny deceleration ( $a = F_{\\text{net}}/m$ is small), so it continues accelerating for much longer. The bowling ball takes far longer to approach its terminal velocity and reaches a much higher terminal speed (since $v_t \\propto W$, and $W$ is larger).\n+ In practical terms: the tennis ball \"feels\" the air resistance much more significantly relative to its weight, while the bowling ball's weight dominates until it reaches very high speeds.", "source": "MiniMax ①", "_id": "minimax_1_37"}, {"question": "A vertical floating rod has its diameter increased (so larger $$A$$), keeping its mass and the fluid density fixed. Does it float higher or lower? Why is the answer counterintuitive at first?", "answer": "It floats **higher** (smaller $$\\Delta h$$). From $$\\Delta h = m/(\\rho_f A)$$ with $$m$$ and $$\\rho_f$$ constant, larger $$A$$ means smaller $$\\Delta h$$. The intuitive trap is to think \"bigger rod = sinks more,\" but the relevant comparison is *how much fluid you displace per unit depth*: a wider rod displaces more fluid for each cm of submersion, so it only needs to dip in a small distance to support the same weight. This is exactly why ships are wide.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "A cube floats with 70% of its volume submerged. What is the cube’s density compared to water?", "answer": "- Step 1: **Floating condition**: $ W = U \\Rightarrow m_s g = \\rho_f V_{\\text{sub}} g $.  \n  - Step 2: **Mass-volume relations**: $ \\rho_s V = \\rho_f V_{\\text{sub}} \\Rightarrow \\rho_s = \\rho_f \\frac{V_{\\text{sub}}}{V} $.  \n  - Step 3: **Submerged fraction**: $ V_{\\text{sub}}/V = 0.70 \\Rightarrow \\rho_s = 0.70 \\rho_f $.  \n\n**Takeaway:** Submerged fraction equals density ratio.", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "In what way does the dependence of drag on velocity ($$F \\propto v$$ in Stokes' regime) *guarantee* the existence of a stable terminal velocity? What if drag were a constant force instead?", "answer": "Because Stokes drag *grows with speed*, there's exactly one speed at which it has grown enough to cancel the net weight. Below it, drag is too small and the object accelerates *toward* it; above it, drag is too large and the object would decelerate *back toward* it. So $$v_t$$ is a stable attractor — small perturbations correct themselves. If drag were a constant force (independent of speed), then either weight exceeds drag (object accelerates forever) or drag exceeds weight (object decelerates to a stop or never starts). There would be no stable balance at any non-trivial speed. The speed-dependence of drag is exactly what makes $$v_t$$ a robust equilibrium.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "On a velocity-time graph for the skydiver-with-parachute scenario, identify the five distinct phases and what the gradient looks like in each. (5 steps)", "answer": "- Step 1: Phase 1 (initial fall): positive gradient that gradually decreases — accelerating downward, but acceleration falling as drag builds.\n- Step 2: Phase 2 (first terminal velocity $$v_{t1}$$): zero gradient (horizontal line) — drag equals weight, constant high speed.\n- Step 3: Phase 3 (parachute opens): sudden steep *negative* gradient — large upward resultant decelerates the diver sharply.\n- Step 4: Phase 4 (slowing down): negative gradient easing toward zero — as speed falls, drag falls, so the upward resultant shrinks.\n- Step 5: Phase 5 (second terminal velocity $$v_{t2}$$): zero gradient again, at a *lower* horizontal line — new balance at lower speed because the larger area means less speed is needed for $$F_D = W$$.\n\nThe two terminal-velocity plateaus are at different heights, with $$v_{t2} < v_{t1}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "Terminal velocity is proportional to $$r^2$$, not $$r$$. Explain why doubling the radius more than doubles the terminal velocity, by comparing how weight and drag-per-unit-speed scale with radius. (3 steps)", "answer": "- Step 1: Weight scales as volume: $$W \\propto r^3$$ (since $$V = \\frac{4}{3}\\pi r^3$$). Doubling the radius multiplies the weight by 8.\n- Step 2: At a given speed, Stokes' drag scales as $$r$$: $$F_D \\propto r$$ (since $$F = 6\\pi\\eta r v$$). Doubling the radius only doubles the drag at the same speed.\n- Step 3: To restore balance ($$W = U + F_D$$), the speed must increase until the drag catches up with the extra weight. Since drag grows as $$r \\times v$$ but weight grows as $$r^3$$, we need $$v \\propto r^3 / r = r^2$$. The mismatch between $$r^3$$ (weight) and $$r$$ (drag per unit speed) is exactly why $$v_t \\propto r^2$$ — the speed must \"compensate\" for the extra factor of $$r^2$$ in weight.", "source": "GLM 5.1 ③", "_id": "glm_3_33"}, {"question": "In the falling-ball viscometer experiment (Core Practical 4), the ball is timed between two marker lines that are positioned a few centimetres below the surface of the liquid, not from the point of release. Explain why this is crucial for finding an accurate value of the viscosity. (2 steps)", "answer": "- Step 1: At the instant of release, the ball is at rest and the drag force is zero. The ball accelerates as it falls, with drag growing as speed increases. The ball only reaches its terminal velocity after it has fallen a certain distance — specifically, when the drag grows large enough to balance weight minus upthrust.\n- Step 2: The timed distance must be in the region where the ball is already moving at constant terminal velocity. If you timed from the release point, you would include the accelerating phase, measuring an average speed that is less than $v_t$. Using this too-low speed in $\\eta = \\frac{mg}{6\\pi r v}$ would give an overestimate of the viscosity. By timing only the constant-velocity region, you get the correct $v$ to use in the equation.\n+ This is analogous to measuring a car's top speed on a racetrack — you need a long enough straight section to reach and maintain maximum speed before timing begins.", "source": "MiniMax ①", "_id": "minimax_1_10"}, {"question": "In the terminal velocity derivation, the formula contains $$(\\rho_s - \\rho_f)$$ rather than just $$\\rho_s$$. Physically, what does this difference represent? What happens to $$v_t$$ if $$\\rho_s = \\rho_f$$, and why? (2 steps)", "answer": "- Step 1: The quantity $$(\\rho_s - \\rho_f)$$ represents the **net downward driving force per unit volume**. The sphere's weight pulls it down, but the upthrust pushes it up. Only the *difference* drives the motion through the fluid.\n- Step 2: If $$\\rho_s = \\rho_f$$, then $$(\\rho_s - \\rho_f) = 0$$ and $$v_t = 0$$. This is **neutral buoyancy**: the sphere's weight is exactly balanced by upthrust even at zero speed. There's no net force to start it moving, and no terminal velocity to reach — it simply hovers at whatever depth it's placed. This confirms that upthrust cannot be ignored in liquids; omitting it would falsely predict a terminal velocity for neutrally buoyant objects.", "source": "GLM 5.1 ①", "_id": "glm_1_56"}, {"question": "A balloon filled with helium floats in air. Explain, using Archimedes' Principle, why the balloon rises, and predict what would happen to the balloon if the surrounding air temperature increased significantly. (2 steps)", "answer": "- Step 1: The balloon experiences weight $W = m_{\\text{balloon}} g$ downward (including the helium mass plus the balloon skin). It experiences upthrust $U = \\rho_{\\text{air}} V g$ upward, where $V$ is the balloon's volume and $\\rho_{\\text{air}}$ is the density of surrounding air. Since helium is much less dense than air, for a given balloon volume, $\\rho_{\\text{air}} V g > m_{\\text{balloon}} g$, so $U > W$. The balloon rises.\n- Step 2: If the air temperature increases significantly, the density of air decreases (pressure constant, temperature up $\\Rightarrow$ density down, from the ideal gas law $\\rho = P/RT$). With lower $\\rho_{\\text{air}}$, the upthrust $U = \\rho_{\\text{air}} V g$ decreases. Eventually, if the air gets hot enough, $U$ may drop to equal $W$, and the balloon will stop rising. In extreme heating, $U < W$ and the balloon would begin to sink. This is why hot air balloons need to heat the air inside to stay aloft — they can't rely on ambient hot air.", "source": "MiniMax ①", "_id": "minimax_1_34"}, {"question": "A skydiver steps out of a plane. At the very first instant ($$v = 0$$), what are the forces, the resultant, and the acceleration? (2 steps)", "answer": "- Step 1: At $$v = 0$$, air resistance (drag) is zero since drag depends on speed. Upthrust from air is negligible compared to weight. So the only significant force is the diver's weight $$W = mg$$ acting downward.\n- Step 2: The resultant force is therefore the *full weight* downward — as large as it ever gets. By Newton's Second Law, the initial acceleration is $$a = W/m = g \\approx 9.81$$ m/s² downward (free fall). This is the steepest part of the velocity-time graph.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "What happens to a skydiver's motion the instant the parachute opens? Describe the forces, resultant, and the resulting motion. (3 steps)", "answer": "- Step 1: Just before the chute opens, the diver is at terminal velocity $$v_{t1}$$ with $$W = F_D$$. The chute suddenly multiplies the surface area presented to the air, so drag at that speed jumps enormously — far above the weight.\n- Step 2: The forces are now: weight (unchanged, downward) and a *much larger* drag (upward). Net resultant is large and *upward*. By Newton's Second Law, the diver now has a large *upward* acceleration — but since they're moving downward, this is a *deceleration*: they slow down rapidly.\n- Step 3: As speed drops, drag falls (since $$F_D \\propto v$$ roughly), so the upward resultant shrinks. Eventually drag has fallen enough that $$W = U + F_D$$ again, but at a *lower* speed $$v_{t2}$$. The diver reaches a new, slower terminal velocity. The chute hasn't changed weight — it's changed the drag-vs-speed relationship.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "In Core Practical 4, a more reliable method uses several ball bearings of different radii and plots a graph. What goes on each axis, what shape should the graph be, and how do you extract $$\\eta$$ from the gradient? (3 steps)", "answer": "- Step 1: Plot $$v_t$$ (vertical) against $$r^2$$ (horizontal). From $$v_t = \\frac{2(\\rho_s - \\rho_f)g}{9\\eta} r^2$$, the relationship is direct proportion — a straight line through the origin with gradient $$k = \\frac{2(\\rho_s - \\rho_f)g}{9\\eta}$$.\n- Step 2: The straight-line-through-origin shape is evidence that Stokes' Law held across the range of balls used. If the larger balls caused turbulence, the points would curve away from the line at high $$r^2$$.\n- Step 3: Measure the gradient $$k$$, then rearrange: $$\\eta = \\frac{2(\\rho_s - \\rho_f)g}{9k}$$. This single gradient value averages out random errors from individual runs, giving a more reliable estimate of $$\\eta$$ than any single ball measurement.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "When a gas is heated, its viscosity *increases* — the opposite trend to a liquid. Give the microscopic explanation for why this happens. (2 steps)", "answer": "- Step 1: In a gas, molecules are far apart and intermolecular attractions are negligible. Viscosity instead comes from molecules *diffusing between layers* and carrying momentum across. A molecule from a fast layer wanders into a slow layer and speeds it up; a slow-layer molecule entering a fast layer slows it down. This momentum transfer is the gas's internal friction.\n- Step 2: Heating makes gas molecules move faster, so they cross between layers more frequently and carry more momentum per crossing. The layers \"grip\" each other more strongly, and viscosity *increases*. This is why the viscosity-temperature graph slopes upward for gases but downward for liquids — the microscopic mechanisms are fundamentally different.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "Name three sources of error in the falling-ball viscosity experiment and state an improvement for each. (3 steps)", "answer": "- Step 1: **Ball not at terminal velocity** — if the starting mark is too high, the ball is still accelerating. *Improvement:* place several marks at different depths and verify that the time per interval is constant before the official timing region.\n- Step 2: **Wall (edge) effects** — a narrow cylinder constrains the flow and increases the drag beyond what Stokes' Law predicts. *Improvement:* use a wide cylinder where the ball's radius is much smaller than the cylinder's radius.\n- Step 3: **Temperature drift** — viscosity of a liquid changes strongly with temperature (and the experiment is typically done by hand, warming the liquid). *Improvement:* measure and record the liquid's temperature, keep it constant, and perform the experiment quickly or in a temperature-controlled environment.\n\nAdditional errors: reaction time in the stopwatch (use light gates or time over a long distance), and small errors in measuring $$r$$ which are magnified by the $$r^2$$ dependence (use a micrometer and average multiple readings).", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "A textbook problem asks you to apply Stokes' Law to a raindrop of radius 0.5 mm falling at 2 m/s in air. Why is this physically dubious even though you must answer as instructed?", "answer": "Checking the Reynolds number with $$\\rho_{\\text{air}} \\approx 1.2 \\text{ kg/m}^3$$, $$L = 2r = 10^{-3}$$ m, and $$\\eta_{\\text{air}} \\approx 1.8 \\times 10^{-5}$$ Pa s: $$Re = \\rho_f v L / \\eta \\approx 130$$, which is well above 1. Physically the flow around a real falling raindrop at that speed is **turbulent**, so Stokes' Law does not strictly apply — drag would be closer to $$F \\propto v^2$$ in reality. The exam question is a deliberate idealisation; you must answer using Stokes' formula as instructed, but understanding that \"low speed\" in the conditions is a real, restrictive requirement that this scenario quietly violates.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "A raindrop with radius $r = 0.50\\,\\text{mm}$ falls through air of viscosity $\\eta = 1.8 \\times 10^{-5}\\,\\text{Pa\\,s}$ at a speed of $v = 2.0\\,\\text{m\\,s}^{-1}$. Check whether Stokes' Law is valid for this situation by calculating the Reynolds number. What does your result tell you? (3 steps)", "answer": "- Step 1: Recall the Reynolds number formula for flow past a sphere: $$Re = \\frac{\\rho_f v L}{\\eta}$$ where $\\rho_f$ is the fluid density, $v$ is the speed, $L$ is the characteristic length (for a sphere, the diameter $2r$), and $\\eta$ is the viscosity.\n- Step 2: Substitute the values. Air density $\\rho_f \\approx 1.2\\,\\text{kg\\,m}^{-3}$, so: $$Re = \\frac{1.2 \\times 2.0 \\times (1.0 \\times 10^{-3})}{1.8 \\times 10^{-5}} = \\frac{2.4 \\times 10^{-3}}{1.8 \\times 10^{-5}} = \\mathbf{133}$$ (where $1.0 \\times 10^{-3}$ is the diameter in metres).\n- Step 3: Interpret the result. $Re \\approx 130$ is much greater than 1, meaning inertia dominates over viscosity. The flow is definitely turbulent, and Stokes' Law does **not** properly describe the drag on this raindrop. The textbook problem is a deliberate idealisation — in reality, raindrops experience drag proportional to $v^2$, not $v$. This illustrates that \"low speed\" in the Stokes conditions is doing real physical work.", "source": "MiniMax ①", "_id": "minimax_1_8"}, {"question": "Why is upthrust often (but not always) negligible for a
