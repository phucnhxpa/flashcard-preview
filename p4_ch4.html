$ and describe the sign pattern. (3 steps)", "answer": "- Step 1: Apply the formula with $$n=\\tfrac{1}{2}$$. Descending factors: $$\\tfrac{1}{2}, -\\tfrac{1}{2}, -\\tfrac{3}{2}, -\\tfrac{5}{2}, \\ldots$$\n- Step 2: Terms:\n+ $$1$$\n+ $$\\tfrac{1}{2}x$$ (positive)\n+ $$\\tfrac{(1/2)(-1/2)}{2!}x^2 = -\\tfrac{1}{8}x^2$$ (negative)\n+ $$\\tfrac{(1/2)(-1/2)(-3/2)}{3!}x^3 = \\tfrac{1}{16}x^3$$ (positive)\n- Step 3: Pattern: after the leading $$1$$, signs alternate $$+, -, +, -, \\ldots$$ because each new factor $$(n-k)$$ for $$k\\geq 1$$ is negative, flipping the sign each step.\n\nWorth memorising ‚ÄĒ $$\\sqrt{1+x}$$ appears constantly in physics and engineering.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_10", "judge_pick": false}, {"question": "In the expansion of $$(1+kx)^{-4}$$, if the coefficient of $$x$$ is 20, how do you set up an equation for $$k$$ without computing further terms? (2 steps)", "answer": "- Step 1: The coefficient of $$x$$ in $$(1+u)^n$$ is simply $$n$$. Here, $$u = kx$$, so the $$x$$ coefficient is $$n \\cdot k = -4k$$.\n- Step 2: Set $$-4k = 20$$, giving $$k = -5$$. You don't need to compute higher terms ‚ÄĒ only the linear coefficient is used.\n\nThis illustrates matching the **specific** coefficient you're told, rather than over-expanding.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_11", "judge_pick": true}, {"question": "In the expansion of $$(2+x)(1+5x)^{-1/2}$$, explain why two different terms from $$(1+5x)^{-1/2}$$ contribute to the $$x^2$$ term. (3 steps)", "answer": "- Step 1: Multiplying $$(2+x)$$ by a series $$a_0 + a_1x + a_2x^2 + \\cdots$$, you get $$x^2$$ contributions from: $$2 \\cdot a_2$$ (constant times the $$x^2$$ term) plus $$x \\cdot a_1$$ (the $$x$$ factor times the $$x$$ term).\n- Step 2: For the $$x^2$$ coefficient: $$2a_2 + a_1$$, where $$a_1, a_2$$ come from $$(1+5x)^{-1/2}$$.\n- Step 3: Concretely with $$a_1 = -\\tfrac{5}{2}$$ and $$a_2 = \\tfrac{75}{8}$$: $$2 \\cdot \\tfrac{75}{8} + 1 \\cdot (-\\tfrac{5}{2}) = \\tfrac{75}{4} - \\tfrac{5}{2} = \\tfrac{65}{4}$$.\n\nGeneral lesson: the $$x^k$$ coefficient of a product series is a **convolution** ‚ÄĒ sum over all pairs of indices adding to $$k$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_12", "judge_pick": true}, {"question": "Why do we factor $$a^n$$ out of $$(a+bx)^n$$ before expanding, rather than expanding directly? (3 steps)", "answer": "- Step 1: The generalised binomial series is stated only for $$(1+\\text{something})^n$$. Expanding $$(a+bx)^n$$ directly would need a different-form series centred at $$x=0$$.\n- Step 2: Writing $$(a+bx)^n = \\left(a\\left(1 + \\tfrac{b}{a}x\\right)\\right)^n = a^n\\left(1 + \\tfrac{b}{a}x\\right)^n$$, the bracket is now in standard form $$(1+u)^n$$ with $$u = \\tfrac{b}{a}x$$.\n- Step 3: Apply the standard series to the bracket, then multiply every term by $$a^n$$ as a constant scaling factor.\n\nCheckpoint: the factor $$a^n$$ must multiply **every** term in the expansion, not just the first ‚ÄĒ a common mistake is to forget this.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_13", "judge_pick": false}, {"question": "Derive the validity condition for $$(a+bx)^n$$ where $$n$$ is negative or fractional. (3 steps)", "answer": "- Step 1: After factoring, $$(a+bx)^n = a^n \\left(1 + \\tfrac{b}{a}x\\right)^n$$. The bracket expansion is valid when the substituted \"$$x$$-equivalent\" has absolute value less than 1.\n- Step 2: We need $$\\left|\\tfrac{b}{a}x\\right| < 1$$, i.e. $$|bx| < |a|$$.\n- Step 3: Solving: $$|x| < \\left|\\tfrac{a}{b}\\right|$$. The window width is set by the ratio $$a/b$$ ‚ÄĒ larger $$a$$ widens validity, larger $$b$$ narrows it.\n\nIntuition: $$a$$ is the \"nearly-constant\" part we pulled out; validity is set by how quickly $$bx$$ becomes comparable to $$a$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_14", "judge_pick": false}, {"question": "For $$\\sqrt{4+x}$$, state the validity range and explain why it's $$|x|<4$$ rather than $$|x|<1$$. (3 steps)", "answer": "- Step 1: Rewrite: $$\\sqrt{4+x} = (4+x)^{1/2} = 4^{1/2}(1+\\tfrac{x}{4})^{1/2} = 2(1+\\tfrac{x}{4})^{1/2}$$.\n- Step 2: Validity of the bracketed expansion: $$\\left|\\tfrac{x}{4}\\right|<1$$, i.e. $$|x|<4$$.\n- Step 3: It's not $$|x|<1$$ because the \"effective small quantity\" driving convergence is $$\\tfrac{x}{4}$$, not $$x$$. Factoring out $$a=4$$ rescales the window 4 times wider.\n\nSo a larger $$a$$ gives more room for $$x$$ to vary while the expansion remains valid.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_15", "judge_pick": true}, {"question": "Given the first few terms of the expansion of $$(a+bx)^n$$, describe a strategy to find $$a$$ and $$b$$. (3 steps)", "answer": "- Step 1: The constant term of the expansion (value at $$x=0$$) is $$a^n$$ ‚ÄĒ match to deduce $$a$$.\n- Step 2: The $$x$$ coefficient is $$a^n \\cdot n \\cdot \\tfrac{b}{a} = na^{n-1}b$$. With $$a$$ known, solve this for $$b$$.\n- Step 3: Verify consistency by checking the $$x^2$$ term ‚ÄĒ any mismatch indicates an arithmetic error.\n\nThe constant and linear terms together uniquely pin down two unknowns ‚ÄĒ a recurring theme in binomial problems.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_16", "judge_pick": true}, {"question": "Why can partial fractions \"simplify\" the binomial expansion of a rational function? (3 steps)", "answer": "- Step 1: A single complicated expression like $$\\tfrac{4-5x}{(1+x)(2-x)}$$ doesn't directly fit the binomial template $$(1+\\text{something})^n$$.\n- Step 2: Decomposing into partial fractions gives a sum like $$\\tfrac{3}{1+x} - \\tfrac{2}{2-x} = 3(1+x)^{-1} - 2(2-x)^{-1}$$. Each piece is individually of the form (constant) $$\\times (a+bx)^n$$, which expands by the standard formula.\n- Step 3: Add the resulting series term-by-term. The total expansion is the sum/difference of two \"clean\" expansions.\n\nThe power of the method: trades one hard expansion for two easy ones, at the cost of an algebraic decomposition.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_17", "judge_pick": true}, {"question": "When two partial fractions have validity ranges $$|x|<1$$ and $$|x|<2$$, what is the validity range of their sum, and why? (2 steps)", "answer": "- Step 1: The sum's expansion is valid only where **both** component expansions converge ‚ÄĒ the **intersection** of the two intervals. Here that's $$|x|<1 \\cap |x|<2 = |x|<1$$.\n- Step 2: If $$x$$ fell in $$1 \\leq |x| < 2$$, the second series would converge but the first would diverge, so the combined series would fail to represent the sum.\n\nTakeaway: **overall validity is bounded by the most restrictive piece** ‚ÄĒ the smallest interval wins.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_18", "judge_pick": false}, {"question": "Before decomposing $$\\tfrac{2x^2+7x-6}{(x+5)(x-4)}$$ into partial fractions for a binomial expansion, what preliminary step is needed and why? (3 steps)", "answer": "- Step 1: Compare degrees: numerator is degree 2, denominator $$(x+5)(x-4) = x^2 + x - 20$$ is also degree 2. This is an **improper** rational function.\n- Step 2: Divide the numerator by the denominator (polynomial long division) first, extracting a constant (or polynomial) quotient plus a proper rational remainder.\n- Step 3: Only the proper remainder gets decomposed into partial fractions. The polynomial quotient is already expanded (no series needed).\n\nSkipping the division would force an awkward partial-fraction form, complicating the algebra.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_19", "judge_pick": false}, {"question": "In a partial fraction like $$\\tfrac{B}{(1+4x)^2}$$, how do you expand it as a binomial series, and what is the key algebraic trick? (3 steps)", "answer": "- Step 1: Rewrite as $$B(1+4x)^{-2}$$, putting it in standard binomial form with $$n=-2$$.\n- Step 2: Apply the series: $$(1+4x)^{-2} = 1 + (-2)(4x) + \\tfrac{(-2)(-3)}{2!}(4x)^2 + \\cdots = 1 - 8x + 48x^2 - \\cdots$$\n- Step 3: Multiply every term by $$B$$. The key trick is converting the \"reciprocal of a squared bracket\" into \"bracket to a negative power\" ‚ÄĒ this unlocks the binomial machinery.\n\nSo $$\\tfrac{1}{(\\cdots)^k}$$ always becomes $$(\\cdots)^{-k}$$ to become expandable.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_20", "judge_pick": false}, {"question": "Does squaring a binomial bracket in a denominator, like $$(1+4x)^2$$, change the validity range compared to $$(1+4x)$$? (3 steps)", "answer": "- Step 1: Validity for $$(1+4x)^n$$ comes from $$|4x|<1$$, i.e. $$|x| < \\tfrac{1}{4}$$. This is **independent of $$n$$** ‚ÄĒ only the coefficient $$b=4$$ matters.\n- Step 2: So both $$(1+4x)^{-1}$$ and $$(1+4x)^{-2}$$ have the same validity interval $$|x|<\\tfrac{1}{4}$$ ‚ÄĒ the bracket determines the window.\n- Step 3: However, the **rate of convergence** is slower for higher $$|n|$$, because coefficients involve bigger products $$n(n-1)(n-2)\\ldots$$. So squaring slows convergence near the boundary but doesn't shrink the interval.\n\nCommon intuition \"higher powers are worse\" is partially right ‚ÄĒ they demand smaller $$|x|$$ for the same accuracy.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_21", "judge_pick": true}, {"question": "State two ways to approach expanding $$\\tfrac{1+x}{1-2x}$$ as a binomial series. (2 steps)", "answer": "- Step 1: Method A (product expansion): write as $$(1+x)(1-2x)^{-1}$$, expand $$(1-2x)^{-1}$$ via binomial series, then multiply by $$(1+x)$$ term-by-term (a convolution).\n- Step 2: Method B (long division first): divide to get $$\\tfrac{1+x}{1-2x} = -\\tfrac{1}{2} + \\tfrac{3/2}{1-2x}$$. Then expand only the fractional part.\n\nMethod A is usually quicker; Method B generalises better to more complex improper fractions. Both are valid and should give the same answer.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_22", "judge_pick": false}, {"question": "For $$\\tfrac{2x^2+5x+11}{(2x-1)^2(x+1)}$$, the partial fraction decomposition has the form $$\\tfrac{A}{2x-1} + \\tfrac{B}{(2x-1)^2} + \\tfrac{C}{x+1}$$. Explain structurally why $$(2x-1)$$ produces two terms but $$(x+1)$$ only one. (3 steps)", "answer": "- Step 1: The denominator has a **repeated** linear factor $$(2x-1)^2$$ and an unrepeated factor $$(x+1)$$.\n- Step 2: Rule: for a linear factor raised to power $$k$$, the decomposition contributes $$k$$ terms: $$\\tfrac{A_1}{(\\text{factor})} + \\tfrac{A_2}{(\\text{factor})^2} + \\cdots + \\tfrac{A_k}{(\\text{factor})^k}$$.\n- Step 3: So $$(2x-1)^2$$ gives 2 terms with denominators $$(2x-1)$$ and $$(2x-1)^2$$; $$(x+1)$$ gives 1. Total: $$2+1=3$$ unknowns.\n\nEach repeated factor contributes a \"tower\" of terms up to its multiplicity.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_23", "judge_pick": false}, {"question": "When you use a truncated binomial expansion to compute an approximation, what is the typical size of the error, and how does it depend on $$|x|$$? (3 steps)", "answer": "- Step 1: The error from truncating after the $$x^r$$ term is roughly the size of the next term $$x^{r+1}$$ multiplied by its coefficient ‚ÄĒ subsequent terms are typically even smaller.\n- Step 2: So error scales like $$|x|^{r+1}$$. Halving $$|x|$$ reduces error by a factor of $$2^{r+1}$$ ‚ÄĒ for $$r=3$$, error shrinks 16-fold.\n- Step 3: Smaller $$|x|$$ ‚áí faster convergence ‚áí more accurate truncation. Far from $$x=0$$ (but still within validity) ‚áí slow convergence ‚áí poor truncation.\n\nLesson: truncation is effective **near the expansion point** $$x=0$$; near the edge of validity, you need many terms.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_24", "judge_pick": true}, {"question": "What is \"percentage error\" when comparing a series approximation to the true value, and why is it a useful metric? (2 steps)", "answer": "- Step 1: Percentage error $$= \\frac{|\\text{approximation} - \\text{true value}|}{|\\text{true value}|} \\times 100\\%$$.\n- Step 2: It measures error **relative to the magnitude** of the true value ‚ÄĒ e.g., an absolute error of $$0.01$$ is catastrophic if the answer is $$0.1$$ (10% error) but negligible if the answer is $$1000$$ (0.001% error).\n\nPercentage error lets you compare accuracy fairly across problems with different scales.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_25", "judge_pick": false}, {"question": "If an expansion is valid for $$|x|<\\tfrac{1}{4}$$, can you use it to estimate the function at $$x=0.5$$? Why or why not? (3 steps)", "answer": "- Step 1: No. $$|0.5| = 0.5 > \\tfrac{1}{4}$$, so $$x=0.5$$ lies **outside** the interval of validity.\n- Step 2: At points outside validity, the series doesn't converge to the function. The truncated polynomial gives some number, but that number has no meaningful relationship to the true function value.\n- Step 3: To estimate at $$x=0.5$$, you'd need a different technique ‚ÄĒ either a different expansion centre or a completely different representation.\n\nValidity is not a suggestion ‚ÄĒ it's a strict prerequisite for the formula to mean anything.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_26", "judge_pick": true}, {"question": "Why does the validity region for $$(1+x)^n$$ always exclude $$x = -1$$, regardless of $$n$$? (3 steps)", "answer": "- Step 1: At $$x=-1$$, the function $$(1+x)^n = 0^n$$. For $$n < 0$$, this is $$\\tfrac{1}{0}$$ ‚ÄĒ undefined. For fractional $$n$$, the derivative blows up.\n- Step 2: Since $$(1+x)^n$$ is singular (or non-smooth) at $$x=-1$$, any Taylor series centred at $$x=0$$ can converge only up to but not including this nearest singularity ‚ÄĒ distance $$1$$.\n- Step 3: So the disc of convergence has radius 1, giving $$|x|<1$$. Symmetry about 0 means the positive side cuts off at $$+1$$ too.\n\nGeneral principle from complex analysis: **Taylor series converge up to the nearest singularity.**", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_27", "judge_pick": true}, {"question": "Derive why the coefficient of $$x^2$$ in $$(1+bx)^n$$ is $$\\tfrac{n(n-1)}{2}b^2$$. (3 steps)", "answer": "- Step 1: Start from the standard series: $$(1+u)^n = 1 + nu + \\tfrac{n(n-1)}{2!}u^2 + \\cdots$$\n- Step 2: Substitute $$u = bx$$: $$(1+bx)^n = 1 + n(bx) + \\tfrac{n(n-1)}{2}(bx)^2 + \\cdots$$\n- Step 3: The $$x^2$$ term is $$\\tfrac{n(n-1)}{2}b^2 x^2$$, so its coefficient is $$\\tfrac{n(n-1)}{2}b^2$$.\n\nStructure: the coefficient inherits $$n(n-1)/2$$ from the standard formula, and picks up $$b^2$$ from the substitution ‚ÄĒ each power of $$x$$ drags along a power of $$b$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_28", "judge_pick": false}, {"question": "What is the sign of the $$x^2$$ coefficient in $$(1-3x)^{3/2}$$, and what's the underlying reason? (3 steps)", "answer": "- Step 1: Coefficient: $$\\tfrac{n(n-1)}{2}(-3)^2 = \\tfrac{(3/2)(1/2)}{2} \\cdot 9 = \\tfrac{27}{8}$$.\n- Step 2: Both $$n=\\tfrac{3}{2}$$ and $$n-1=\\tfrac{1}{2}$$ are positive (since $$n>1$$), and $$(-3)^2$$ is positive ‚ÄĒ so coefficient is positive.\n- Step 3: More generally, the sign of the $$x^2$$ coefficient in $$(1+bx)^n$$ depends on the sign of $$n(n-1)$$: **negative if $$0<n<1$$** (one positive, one negative factor); **positive otherwise**.\n\n$$n(n-1)$$ is the sign-determining quantity ‚ÄĒ worth noting for mental sign-checks.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_29", "judge_pick": false}, {"question": "Critique this student reasoning: \"Since $$(1+4x)^{-2}$$ is valid for $$|x|<\\tfrac{1}{4}$$, the expansion of $$3(1+4x)^{-2}$$ should be valid for $$|x|<\\tfrac{3}{4}$$.\" (2 steps)", "answer": "- Step 1: This is wrong. Multiplying a series by a constant (like 3) does **not** change its interval of convergence. The \"3\" just scales every term ‚ÄĒ it doesn't affect when terms shrink to zero.\n- Step 2: Validity is determined **purely by the bracket structure** $$(1+\\text{something})^n$$, specifically $$|\\text{something}|<1$$. The prefactor is irrelevant.\n\nCorrect: the expansion of $$3(1+4x)^{-2}$$ is valid on exactly $$|x|<\\tfrac{1}{4}$$, same as $$(1+4x)^{-2}$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_30", "judge_pick": true}, {"question": "Describe the leading behaviour of $$\\tfrac{1}{2+x}$$ near $$x=0$$ and its validity range. (3 steps)", "answer": "- Step 1: Rewrite: $$\\tfrac{1}{2+x} = \\tfrac{1}{2}(1+\\tfrac{x}{2})^{-1} = \\tfrac{1}{2}\\left(1 - \\tfrac{x}{2} + \\tfrac{x^2}{4} - \\cdots\\right)$$.\n- Step 2: Leading behaviour: $$\\tfrac{1}{2+x} \\approx \\tfrac{1}{2} - \\tfrac{x}{4}$$. So it starts at $$\\tfrac{1}{2}$$ and decreases linearly with slope $$-\\tfrac{1}{4}$$.\n- Step 3: Validity: $$\\left|\\tfrac{x}{2}\\right|<1$$, i.e. $$|x|<2$$. The expansion fails as $$x \\to -2$$, where the function has a vertical asymptote.\n\nGeometrically: the expansion is a smooth polynomial approximation near the origin, which breaks down as you approach the pole at $$x=-2$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_31", "judge_pick": false}, {"question": "For $$f(x) = \\sqrt{\\tfrac{1+x}{1-x}}$$, explain the strategy to approximate it using binomial expansions for small $$x$$. (3 steps)", "answer": "- Step 1: Rewrite as $$(1+x)^{1/2}(1-x)^{-1/2}$$ ‚ÄĒ a product of two standard binomial expansions.\n- Step 2: Expand each factor separately up to desired order (say $$x^2$$):\n+ $$(1+x)^{1/2} \\approx 1 + \\tfrac{x}{2} - \\tfrac{x^2}{8}$$\n+ $$(1-x)^{-1/2} \\approx 1 + \\tfrac{x}{2} + \\tfrac{3x^2}{8}$$\n- Step 3: Multiply and collect up to $$x^2$$:\n+ Constant: $$1$$\n+ $$x$$: $$\\tfrac{1}{2} + \\tfrac{1}{2} = 1$$\n+ $$x^2$$: $$\\tfrac{3}{8} + \\tfrac{1}{4} - \\tfrac{1}{8} = \\tfrac{1}{2}$$\n\nSo $$f(x) \\approx 1 + x + \\tfrac{1}{2}x^2$$. The multiply-then-truncate technique handles products of binomial series efficiently.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_32", "judge_pick": false}, {"question": "What does \"ascending powers of $$x$$\" mean and why is this the natural ordering for a Maclaurin series? (2 steps)", "answer": "- Step 1: \"Ascending powers\" orders terms by increasing power: $$x^0, x^1, x^2, \\ldots$$. Constant first, then linear, then quadratic, etc.\n- Step 2: This is natural for Taylor/Maclaurin series because the **lowest-order terms dominate for small $$x$$**. You see the most important terms first and can truncate whenever the remaining terms fall below your precision threshold.\n\nThe opposite (descending) ordering fits polynomials with large $$x$$; ascending is the Taylor convention for local approximations.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_33", "judge_pick": false}, {"question": "Mental check: if $$|x|=0.01$$, what is the approximate magnitude of each term in $$(1+x)^{1/2}$$? (3 steps)", "answer": "- Step 1: Term 0: $$1$$. Term 1: $$\\tfrac{1}{2}(0.01) = 0.005$$. Term 2: $$-\\tfrac{1}{8}(0.01)^2 = -1.25 \\times 10^{-5}$$. Term 3: $$\\tfrac{1}{16}(0.01)^3 \\approx 6 \\times 10^{-9}$$.\n- Step 2: Each successive term is roughly **two orders of magnitude smaller** than the previous (because $$x=0.01$$, so each new $$x$$ factor drops by 100).\n- Step 3: Three terms ‚áí accuracy better than $$10^{-5}$$; four terms ‚áí better than $$10^{-8}$$. Short truncations are extremely accurate for small $$x$$.\n\nThis is why low-order expansions are so powerful in practice ‚ÄĒ they converge quickly when close to $$x=0$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_34", "judge_pick": false}, {"question": "A student writes: \"The expansion of $$(1-x)^{1/3}$$ has only the sign of $$x$$ changed from $$(1+x)^{1/3}$$.\" Is this correct? (3 steps)", "answer": "- Step 1: No ‚ÄĒ the mental model is too simple. Only **odd-power** terms flip sign; even-power terms are unchanged.\n- Step 2: Why: substituting $$-x$$ everywhere, odd powers $$(-x)^{2k+1} = -x^{2k+1}$$ flip; even powers $$(-x)^{2k} = x^{2k}$$ are unchanged.\n- Step 3: Concrete example: $$(1+x)^{1/3} = 1 + \\tfrac{1}{3}x - \\tfrac{1}{9}x^2 + \\tfrac{5}{81}x^3 - \\cdots$$, while $$(1-x)^{1/3} = 1 - \\tfrac{1}{3}x - \\tfrac{1}{9}x^2 - \\tfrac{5}{81}x^3 - \\cdots$$. Note $$x^2$$ coefficient is unchanged, but $$x$$ and $$x^3$$ flipped.\n\nSubstituting $$-x$$ is more nuanced than \"flip all signs\".", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_35", "judge_pick": true}, {"question": "Summarise in one line why $$(1+bx)^n$$ is an infinite series for fractional $$n$$ but a finite polynomial for positive integer $$n$$. (2 steps)", "answer": "- Step 1: The general coefficient involves the product $$n(n-1)(n-2)\\cdots(n-r+1)$$. If $$n$$ is a non-negative integer, one factor eventually equals zero (namely $$n-n=0$$), killing all subsequent coefficients.\n- Step 2: If $$n$$ is not a non-negative integer, none of $$n, n-1, n-2, \\ldots$$ ever hit zero, so coefficients keep being non-zero forever ‚ÄĒ the series is infinite.\n\nThe \"polynomial vs. infinite series\" split is an algebraic consequence of whether the descending integer sequence from $$n$$ passes through $$0$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_36", "judge_pick": true}, {"question": "Using the expansion of $$\\sqrt{1-2x}$$ at $$x=0.01$$, how does this give an approximation to $$\\sqrt{2}$$? (4 steps)", "answer": "- Step 1: Substituting $$x=0.01$$ gives $$\\sqrt{1-0.02} = \\sqrt{0.98}$$ ‚ÄĒ a decimal square root, not $$\\sqrt{2}$$.\n- Step 2: But $$0.98 = \\tfrac{98}{100} = \\tfrac{49 \\times 2}{100}$$, so $$\\sqrt{0.98} = \\tfrac{\\sqrt{49 \\cdot 2}}{\\sqrt{100}} = \\tfrac{7\\sqrt{2}}{10}$$.\n- Step 3: So the expansion value at $$x=0.01$$ equals $$\\tfrac{7\\sqrt{2}}{10}$$. Rearranging: $$\\sqrt{2} = \\tfrac{10}{7} \\times (\\text{expansion value})$$.\n- Step 4: The bootstrap: choose $$x$$ so that $$1-2x$$ factors into a perfect square times $$2$$, exposing $$\\sqrt{2}$$.\n\nClever choice of $$x$$ converts decimal computation into approximation of an irrational ‚ÄĒ a classical use of binomial expansions.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_37", "judge_pick": false}, {"question": "When using binomial expansion to estimate a surd, what determines the accuracy of the final decimal answer? (3 steps)", "answer": "- Step 1: Accuracy depends on three things: (a) how small $$|x|$$ is relative to the radius of convergence, (b) how many terms you keep, and (c) how the truncated polynomial propagates to the final answer (e.g. multiplication by constants doesn't change relative error much).\n- Step 2: Smaller $$|x|$$ and more terms ‚áí smaller truncation error ‚áí more accurate decimals.\n- Step 3: For well-chosen small $$x$$ (e.g. $$x=0.01$$), 4-term expansions routinely give 7+ decimal-place accuracy ‚ÄĒ impressive precision for light computation.\n\nPercentage error is the standard scale-invariant metric for judging approximation quality.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_38", "judge_pick": false}, {"question": "Why is it valid to differentiate a binomial series term-by-term within the interval of convergence?", "answer": "Within the interval of convergence, any power series (including the binomial series) can be differentiated and integrated term-by-term, and the resulting series represents the derivative/integral of the original function. This is because power series are **analytic functions** on their disc of convergence ‚ÄĒ they behave like infinitely-differentiable polynomials locally. Concretely, if $$(1+x)^n = \\sum a_r x^r$$, differentiating gives $$n(1+x)^{n-1} = \\sum r a_r x^{r-1}$$ ‚ÄĒ self-consistent. This property makes binomial series flexible in applications: you can treat them as smooth polynomials for calculus purposes.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_39", "judge_pick": true}, {"question": "For $$h(x) = \\tfrac{6}{1+5x} - \\tfrac{4}{1-3x}$$, each partial fraction has different validity. How do you determine where the combined expansion is valid? (3 steps)", "answer": "- Step 1: First piece $$\\tfrac{6}{1+5x} = 6(1+5x)^{-1}$$, valid for $$|5x|<1 \\Rightarrow |x|<\\tfrac{1}{5}$$.\n- Step 2: Second piece $$\\tfrac{4}{1-3x} = 4(1-3x)^{-1}$$, valid for $$|3x|<1 \\Rightarrow |x|<\\tfrac{1}{3}$$.\n- Step 3: Combined expansion is valid only where **both** pieces converge. Intersection: $$|x|<\\tfrac{1}{5} \\cap |x|<\\tfrac{1}{3} = |x|<\\tfrac{1}{5}$$. So $$x=0.5$$ is outside, and the combined expansion can't estimate $$h(0.5)$$.\n\nThe most restrictive condition wins: validity $$= \\min(\\tfrac{1}{5}, \\tfrac{1}{3}) = \\tfrac{1}{5}$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_40", "judge_pick": false}, {"question": "Consider a partial fraction like $$\\tfrac{A}{x+3}$$. Why can't this be directly expanded in ascending powers of $$x$$, and what must be done first? (3 steps)", "answer": "- Step 1: The binomial form requires $$(1+\\text{something})$$ inside the bracket. The factor $$(x+3)$$ doesn't start with \"1\".\n- Step 2: Rewrite by factoring out the constant: $$\\tfrac{A}{x+3} = \\tfrac{A}{3(1 + x/3)} = \\tfrac{A}{3}(1+x/3)^{-1}$$. Now it's in standard form with bracket $$(1 + x/3)$$.\n- Step 3: Apply the binomial series to $$(1+x/3)^{-1}$$ and multiply by the prefactor $$\\tfrac{A}{3}$$.\n\nAlways manipulate to $$(1 + \\text{small})$$ form before applying the binomial formula.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_41", "judge_pick": true}, {"question": "Compare the expansions of $$(1+x)^{-1}$$ and $$(1-x)^{-1}$$: in what sense are both the geometric series? (3 steps)", "answer": "- Step 1: $$(1+x)^{-1} = 1 - x + x^2 - x^3 + \\cdots$$ (alternating signs).\n- Step 2: $$(1-x)^{-1} = 1 + x + x^2 + x^3 + \\cdots$$ (all positive).\n- Step 3: Both are $$\\tfrac{1}{1-r} = \\sum r^k$$ with $$r=-x$$ and $$r=x$$ respectively. Both converge for $$|x|<1$$. The binomial series with $$n=-1$$ **is** the geometric series.\n\nValidity $$|x|<1$$ is the geometric convergence condition, inherited by the binomial series.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_42", "judge_pick": true}, {"question": "Suppose you find that $$\\tfrac{1}{\\sqrt{a+bx}}$$ has expansion beginning $$3 + \\tfrac{1}{3}x + \\tfrac{1}{18}x^2 + \\cdots$$. How do you find $$a$$ and $$b$$ efficiently? (4 steps)", "answer": "- Step 1: Constant term: the value at $$x=0$$ is $$\\tfrac{1}{\\sqrt{a}} = 3$$, giving $$\\sqrt{a} = \\tfrac{1}{3}$$, so $$a = \\tfrac{1}{9}$$.\n- Step 2: Write $$(a+bx)^{-1/2} = a^{-1/2}(1+\\tfrac{b}{a}x)^{-1/2}$$. We already know $$a^{-1/2} = 3$$.\n- Step 3: The $$x$$ coefficient is $$3 \\cdot (-\\tfrac{1}{2}) \\cdot \\tfrac{b}{a} = -\\tfrac{3b}{2a}$$.\n- Step 4: Setting this equal to given $$\\tfrac{1}{3}$$: $$-\\tfrac{3b}{2a} = \\tfrac{1}{3}$$. With $$a = \\tfrac{1}{9}$$, solve for $$b$$.\n\nShortcut: match constant + linear coefficients, two equations for two unknowns.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_43", "judge_pick": true}, {"question": "A cubic approximation of $$f(x)$$ is valid on $$|x|<1$$. A physicist uses it at $$x=0.9$$. What issues may arise? (3 steps)", "answer": "- Step 1: $$x=0.9$$ is **within** validity ($$0.9 < 1$$), so the full series does converge. But convergence near the edge is **very slow**.\n- Step 2: A 3-term truncation throws away $$x^4, x^5, \\ldots$$. At $$x=0.9$$: $$x^4 = 0.656$$, $$x^5 = 0.590$$ ‚ÄĒ these don't shrink much, so the truncation error is huge.\n- Step 3: Technically valid but **practically useless** ‚ÄĒ the cubic approximation has enormous error.\n\nLesson: within validity ‚Č† good approximation. You need $$|x|$$ comfortably small for short truncations to be accurate.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_44", "judge_pick": true}, {"question": "Why can power series be added and multiplied term-by-term within the intersection of their convergence regions? (3 steps)", "answer": "- Step 1: Adding: both series converge to their sums; by basic limit rules, $$\\sum a_n + \\sum b_n = \\sum (a_n + b_n)$$ whenever both converge.\n- Step 2: Multiplying: this is a **Cauchy product**: $$(\\sum a_n x^n)(\\sum b_m x^m) = \\sum_k\\left(\\sum_{n+m=k} a_n b_m\\right)x^k$$. Each coefficient is a finite sum (no convergence issue) and the result converges in the overlap region.\n- Step 3: This backs the mechanical rule of \"multiply series by collecting like powers\", which underpins product expansions like $$(2+x)(1+5x)^{-1/2}$$.\n\nSo the techniques you use in class are supported by deep analytic foundations.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_45", "judge_pick": true}, {"question": "In expanding the product $$(2+x)(1 - \\tfrac{5}{2}x + \\tfrac{75}{8}x^2 - \\tfrac{625}{16}x^3)$$ up to $$x^3$$, which cross-terms contribute and which don't? (3 steps)", "answer": "- Step 1: For the $$x^3$$ coefficient, we need pairs whose power sum is 3:\n+ $$2 \\cdot (\\text{coefficient of }x^3\\text{ in bracket})$$ ‚úď\n+ $$x \\cdot (\\text{coefficient of }x^2\\text{ in bracket})$$ ‚úď\n- Step 2: Higher sums like $$x \\cdot x^3$$ giving $$x^4$$ are irrelevant for the $$x^3$$ coefficient.\n- Step 3: So only two cross-terms matter for $$x^3$$: $$2 \\cdot (-\\tfrac{625}{16}) + 1 \\cdot \\tfrac{75}{8}$$.\n\n\"Truncation-aware multiplication\": when the target is a fixed order, only pairs summing to that order contribute.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_46", "judge_pick": true}, {"question": "When decomposing $$\\tfrac{25}{(3+2x)^2(1-x)}$$ into $$\\tfrac{A}{3+2x} + \\tfrac{B}{(3+2x)^2} + \\tfrac{C}{1-x}$$, why is this specific form needed? (3 steps)", "answer": "- Step 1: The denominator has a **repeated** linear factor $$(3+2x)^2$$ and an unrepeated linear factor $$(1-x)$$.\n- Step 2: Standard rule: for a repeated factor $$(ax+b)^k$$, include **all** fractions $$\\tfrac{A_1}{ax+b}, \\tfrac{A_2}{(ax+b)^2}, \\ldots, \\tfrac{A_k}{(ax+b)^k}$$. Each unrepeated factor contributes one term.\n- Step 3: So $$(3+2x)^2$$ gives $$\\tfrac{A}{3+2x} + \\tfrac{B}{(3+2x)^2}$$, and $$(1-x)$$ gives $$\\tfrac{C}{1-x}$$ ‚ÄĒ total 3 unknowns.\n\nOmitting $$\\tfrac{A}{3+2x}$$ would miss part of the true decomposition; the system becomes unsolvable.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_47", "judge_pick": false}, {"question": "Describe the dominant near-origin behaviour of $$\\tfrac{25}{(3+2x)^2(1-x)}$$ and its validity. (3 steps)", "answer": "- Step 1: At $$x=0$$: $$\\tfrac{25}{9 \\cdot 1} = \\tfrac{25}{9}$$. This is the constant term of the expansion.\n- Step 2: The function is smooth and finite at $$x=0$$, so it has a Taylor expansion starting at $$\\tfrac{25}{9}$$ with slope and curvature determined by the partial fractions.\n- Step 3: Validity: $$(3+2x)^2$$ needs $$|x|<\\tfrac{3}{2}$$, $$(1-x)$$ needs $$|x|<1$$. Minimum: $$|x|<1$$.\n\nBoth poles (at $$x=1$$ and $$x=-\\tfrac{3}{2}$$) sit beyond the expansion radius, set by the nearer one.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_48", "judge_pick": false}, {"question": "In a partial fraction $$\\tfrac{B}{(3+2x)^2}$$, how do you expand this as a binomial series? (3 steps)", "answer": "- Step 1: Write $$\\tfrac{B}{(3+2x)^2} = B(3+2x)^{-2} = B \\cdot 3^{-2}(1+\\tfrac{2x}{3})^{-2} = \\tfrac{B}{9}(1+\\tfrac{2x}{3})^{-2}$$.\n- Step 2: Expand $$(1+u)^{-2}$$ with $$u=\\tfrac{2x}{3}$$. Subtlety: $$n=-2$$ gives coefficients involving $$(-2)(-3)/2!=3$$, etc. ‚ÄĒ **larger magnitudes** than $$n=-1$$, so convergence is slower.\n- Step 3: Validity is still $$|\\tfrac{2x}{3}|<1$$, i.e. $$|x|<\\tfrac{3}{2}$$ ‚ÄĒ same as $$\\tfrac{B}{3+2x}$$, because validity depends on bracket only.\n\nDouble power doesn't shrink the interval, but slows convergence and enlarges coefficients.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_49", "judge_pick": false}, {"question": "For small $$x$$, why is $$\\sqrt{\\tfrac{1+x}{1-x}} \\approx 1 + x + \\tfrac{x^2}{2}$$ an especially elegant approximation? (3 steps)", "answer": "- Step 1: The first three terms match $$e^x$$'s expansion ($$1 + x + \\tfrac{x^2}{2!} + \\cdots$$) ‚ÄĒ a suggestive coincidence for small $$x$$.\n- Step 2: This reflects the identity $$\\sqrt{\\tfrac{1+x}{1-x}} = e^{\\text{arctanh}(x)}$$, where $$\\text{arctanh}(x) \\approx x$$ for small $$x$$. So to leading order, $$\\sqrt{\\tfrac{1+x}{1-x}} \\approx e^x$$.\n- Step 3: Higher-order agreement breaks down (the $$x^3$$ coefficients differ), but the low-order match reveals a deep relationship between hyperbolic tangent and this radical.\n\nBinomial expansions can uncover hidden connections across function families.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_50", "judge_pick": true}, {"question": "Why does increasing the order of a binomial truncation always improve accuracy *within* validity? (3 steps)", "answer": "- Step 1: Each additional term subtracts the next contribution from the omitted tail. Since tail terms shrink (within validity), each correction is smaller than the previous.\n- Step 2: Partial sums approach the true value with each additional term nudging the sum closer. For binomial series with $$|x|<1$$, this approach is **monotonic or near-monotonic**.\n- Step 3: So extending the truncation has diminishing returns (each term is smaller), but always in the direction of better accuracy. The cost is more arithmetic.\n\nUnlike outside-validity, where adding terms *worsens* the approximation ‚ÄĒ the direction reverses.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_51", "judge_pick": true}, {"question": "The question asks for the $$x^3$$ term of $$(16-3x)^{1/4}$$ expanded in ascending powers. What pre-flight checks should you do? (3 steps)", "answer": "- Step 1: Confirm validity: $$(a+bx)^n$$ with $$a=16$$, $$b=-3$$ requires $$|x|<\\tfrac{a}{|b|}=\\tfrac{16}{3}$$, matching the problem's stated domain.\n- Step 2: Factor out $$16^{1/4}$$: $$(16-3x)^{1/4} = 16^{1/4}(1 - \\tfrac{3x}{16})^{1/4} = 2(1 - \\tfrac{3x}{16})^{1/4}$$. Now in expansion-ready form.\n- Step 3: Plan: apply the binomial series with $$n=\\tfrac{1}{4}$$ and \"$$x$$-equivalent\" $$u = -\\tfrac{3x}{16}$$, target the $$x^3$$ coefficient.\n\nAlways check pre-factor extraction and validity before coefficient arithmetic.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_52", "judge_pick": false}, {"question": "Why is the series for $$\\tfrac{1+x}{1+3x}$$ centred at $$x=0$$ invalid at $$x=\\tfrac{1}{3}$$, even though the function itself is smooth there? (3 steps)", "answer": "- Step 1: Writing $$\\tfrac{1+x}{1+3x} = (1+x)(1+3x)^{-1}$$, the second factor expands as a binomial series valid for $$|3x|<1$$, i.e. $$|x|<\\tfrac{1}{3}$$.\n- Step 2: At $$x=\\tfrac{1}{3}$$: the denominator $$(1+3x)=2$$, so the **function** is fine ($$=\\tfrac{4/3}{2} = \\tfrac{2}{3}$$). But the **series representation** fails ‚ÄĒ the radius is strictly less than $$\\tfrac{1}{3}$$.\n- Step 3: The series senses the nearest singularity at $$x=-\\tfrac{1}{3}$$ (where denominator vanishes) and this sets the radius, not the behaviour at the test point.\n\nThe series radius is driven by the nearest bad point, not by how nicely the function behaves at the test value.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_53", "judge_pick": true}, {"question": "Why is the general coefficient $$\\tfrac{n(n-1)\\cdots(n-r+1)}{r!}$$ called the \"falling factorial\" form? (2 steps)", "answer": "- Step 1: The numerator is a product of $$r$$ factors, each one less than the previous, starting at $$n$$ and descending: $$n, n-1, \\ldots, n-r+1$$. This is often written $$n^{\\underline{r}}$$ (falling factorial).\n- Step 2: For integer $$n$$, this equals $$\\tfrac{n!}{(n-r)!}$$, recovering $$\\binom{n}{r}$$. For fractional $$n$$, factorial doesn't exist, but falling factorial still does ‚ÄĒ so the formula generalises.\n\nNewton's generalised binomial theorem works because the coefficient formula requires only descending subtraction, not factorials.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_54", "judge_pick": false}, {"question": "Critique: \"The expansion of $$(1+x)^{-1/2}$$ centred at $$x=0$$ is also valid near $$x=1$$ because the function is smooth there.\" (3 steps)", "answer": "- Step 1: The statement \"valid around $$x=0$$\" refers to the Maclaurin series **centred at $$x=0$$**, which converges in the disc $$|x|<1$$ ‚ÄĒ its radius of convergence.\n- Step 2: Being smooth at $$x=1$$ is irrelevant to convergence of the series *centred at 0*. The radius is determined by the distance from 0 to the nearest singularity (at $$x=-1$$), which is 1.\n- Step 3: To have a series representation valid near $$x=1$$, you'd need a Taylor expansion **centred at $$x=1$$**, not $$x=0$$. Different centres give different series with different convergence regions.\n\nValidity is always **with respect to a chosen centre**.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_55", "judge_pick": true}, {"question": "Given $$(1+x)^n = \\sum \\binom{n}{r}x^r$$, how do you deduce the series for $$(a+bx)^n$$ without redoing calculus? (2 steps)", "answer": "- Step 1: Rewrite $$(a+bx)^n = a^n(1+\\tfrac{b}{a}x)^n$$, having form $$a^n(1+u)^n$$ with $$u=\\tfrac{b}{a}x$$.\n- Step 2: Substitute into the known series: $$(a+bx)^n = a^n \\sum_r \\binom{n}{r}\\left(\\tfrac{b}{a}x\\right)^r = \\sum_r \\binom{n}{r}a^{n-r}b^r x^r$$, valid when $$|\\tfrac{b}{a}x|<1$$.\n\nThe general binomial series is just a substitution away from the standard one ‚ÄĒ no new theory required.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_56", "judge_pick": false}, {"question": "Show conceptually why a 2-term truncation is called the \"linearisation\" or \"first-order approximation\". (3 steps)", "answer": "- Step 1: Keeping $$1+nx$$ and dropping $$x^2, x^3, \\ldots$$ gives an approximation linear in $$x$$ ‚ÄĒ the equation of a line.\n- Step 2: By Maclaurin's theorem, this line is tangent to the function at $$x=0$$. Graphically, it's the best-fit straight line through the expansion point.\n- Step 3: In applied contexts, \"linearising\" a nonlinear function around an operating point means exactly this: use the first two Taylor terms, ignore higher orders. Accuracy is good for small perturbations.\n\nBinomial expansion underpins \"small signal analysis\" across physics and engineering.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_57", "judge_pick": true}, {"question": "Using $$(1-x)^{-1}$$, why can the geometric series be called a \"generating function\"? (2 steps)", "answer": "- Step 1: Each term $$x^k$$ in $$(1-x)^{-1} = 1 + x + x^2 + \\cdots$$ corresponds to \"choosing $$k$$ copies\". The series encodes all choices-of-multiplicity in one compact expression.\n- Step 2: Multiplying such expressions counts combined choices ‚ÄĒ foundation of **generating functions** in combinatorics. The binomial series for negative/fractional exponents extends this to rich combinatorial interpretations.\n\nBinomial expansions aren't just calculus ‚ÄĒ they're central to counting problems too.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_58", "judge_pick": true}, {"question": "In $$\\tfrac{12x+5}{(1+4x)^2} = \\tfrac{A}{1+4x} + \\tfrac{B}{(1+4x)^2}$$, the denominator has a single repeated factor. Why exactly two terms (no more, no less)? (3 steps)", "answer": "- Step 1: The denominator is $$(1+4x)^2$$, a single repeated linear factor with multiplicity 2.\n- Step 2: Rule: a linear factor $$(\\text{factor})^k$$ contributes $$k$$ terms: $$\\tfrac{A_1}{\\text{factor}}, \\tfrac{A_2}{(\\text{factor})^2}, \\ldots, \\tfrac{A_k}{(\\text{factor})^k}$$.\n- Step 3: With $$k=2$$, exactly 2 terms: $$\\tfrac{A}{1+4x}$$ and $$\\tfrac{B}{(1+4x)^2}$$. No more (we've covered all multiplicities), no fewer (both are needed to represent all proper fractions).\n\nCount of terms = multiplicity of each factor.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_59", "judge_pick": true}, {"question": "For $$f(x) = \\tfrac{25}{(3+2x)^2(1-x)}$$ partial-fractioned as $$\\tfrac{A}{3+2x} + \\tfrac{B}{(3+2x)^2} + \\tfrac{C}{1-x}$$, what is the constant term of its Maclaurin expansion? (2 steps)", "answer": "- Step 1: Substitute $$x=0$$ into $$f(x)$$: $$f(0) = \\tfrac{25}{3^2 \\cdot 1} = \\tfrac{25}{9}$$.\n- Step 2: Or equivalently, substitute $$x=0$$ into the partial fractions: $$\\tfrac{A}{3} + \\tfrac{B}{9} + C$$. Both give $$\\tfrac{25}{9}$$.\n\nThe constant term of any Maclaurin expansion is always $$f(0)$$ ‚ÄĒ a quick consistency check.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_60", "judge_pick": false}, {"question": "Beyond approximations, why is the binomial expansion a foundational technique in analysis? (3 steps)", "answer": "- Step 1: It's a concrete example of a **power series**, one of the most important objects in analysis. Many functions (exponential, sine, cosine) are defined or represented via power series.\n- Step 2: It introduces the ideas of **radius of convergence**, analytic continuation, and the tension between local behaviour and global structure ‚ÄĒ key themes in real and complex analysis.\n- Step 3: It connects to generating functions, combinatorics, and differential equations. Newton's insight (rational exponents ‚áí infinite series) was revolutionary ‚ÄĒ extending algebra into infinite processes.\n\nA seemingly computational technique is a gateway to deep mathematical ideas.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_61", "judge_pick": true}, {"question": "Consider $$\\tfrac{1}{(1+5x)(1-3x)}$$. Where are its poles, and what is the validity radius of its Maclaurin expansion? (3 steps)", "answer": "- Step 1: Poles where the denominator vanishes:\n+ $$1+5x=0 \\Rightarrow x=-\\tfrac{1}{5}$$\n+ $$1-3x=0 \\Rightarrow x=\\tfrac{1}{3}$$\n- Step 2: Distances from origin: $$\\tfrac{1}{5}$$ and $$\\tfrac{1}{3}$$.\n- Step 3: Radius of convergence = distance to nearest pole = $$\\min(\\tfrac{1}{5}, \\tfrac{1}{3}) = \\tfrac{1}{5}$$. So validity: $$|x|<\\tfrac{1}{5}$$.\n\nThis abstract view (poles ‚Üí radius) lets you predict validity at a glance, without partial fractions.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_62", "judge_pick": true}, {"question": "For the product $$(1+x)(1-2x)^{-1} = 1 + 3x + 6x^2 + 12x^3 + \\cdots$$, explain why coefficients grow geometrically. (3 steps)", "answer": "- Step 1: $$(1-2x)^{-1} = 1 + 2x + 4x^2 + 8x^3 + \\cdots$$ ‚ÄĒ geometric series with ratio 2.\n- Step 2: Multiplying by $$(1+x)$$ gives new coefficients $$b_n = a_n + a_{n-1}$$:\n+ Constant: $$1$$\n+ $$x$$: $$2+1=3$$\n+ $$x^2$$: $$4+2=6$$\n+ $$x^3$$: $$8+4=12$$\n- Step 3: Coefficients $$1, 3, 6, 12, 24, \\ldots$$ grow as $$3 \\cdot 2^{n-1}$$ for $$n\\geq 1$$ ‚ÄĒ still geometric, just scaled. This growth sets convergence radius at $$|x|<\\tfrac{1}{2}$$.\n\nCoefficient growth rate directly determines convergence behaviour.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_63", "judge_pick": true}, {"question": "If $$(1+ax)^n$$ has $$x^2$$ coefficient equal to 24, what inherent ambiguity arises when solving for $$a$$? (3 steps)", "answer": "- Step 1: The $$x^2$$ coefficient is $$\\tfrac{n(n-1)}{2}a^2$$. One equation, two unknowns ($$a, n$$) ‚ÄĒ many solutions.\n- Step 2: If $$n$$ is given, solve $$a^2 = \\tfrac{48}{n(n-1)}$$, so $$a = \\pm\\sqrt{(\\ldots)}$$ ‚ÄĒ two possibilities from the square root.\n- Step 3: This is why problems often say \"find the possible values of $$a$$\" ‚ÄĒ both signs are consistent unless extra constraints (like positivity) are imposed.\n\nSign ambiguity is inherent when constraints involve only even-degree coefficients.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_64", "judge_pick": true}, {"question": "True or false: \"In the expansion of $$(a+bx)^n$$, if we truncate after 3 terms, the error always scales as $$x^3$$ (regardless of $$a, b$$).\" (2 steps)", "answer": "- Step 1: Partially true. The error from truncating after $$x^2$$ scales as $$x^3$$ *in the variable $$x$$* ‚ÄĒ yes. But the **coefficient** of $$x^3$$ depends heavily on $$a, b$$, so absolute error size varies.\n- Step 2: Specifically, error $$\\sim c_3 x^3$$ where $$c_3 = \\binom{n}{3}a^{n-3}b^3$$. Different $$a, b$$ give wildly different $$c_3$$.\n\nScaling form is universal, but error size depends on the problem.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_65", "judge_pick": true}, {"question": "When a question asks for coefficients \"as simplified fractions\", what does this mean for your answers? (2 steps)", "answer": "- Step 1: Fractions must be in lowest terms ‚ÄĒ common factors cancelled between numerator and denominator.\n- Step 2: No mixed numbers or decimals: e.g., $$\\tfrac{15}{2}$$, not $$7.5$$ or $$7\\tfrac{1}{2}$$. Radicals may be left in simplified surd form.\n\nA presentation convention ensuring unique answer form.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_66", "judge_pick": false}, {"question": "For positive integer $$n$$, show that $$\\binom{-n}{r} = (-1)^r\\binom{n+r-1}{r}$$. (3 steps)", "answer": "- Step 1: Start with $$\\binom{-n}{r} = \\tfrac{(-n)(-n-1)(-n-2)\\cdots(-n-r+1)}{r!}$$.\n- Step 2: Factor $$(-1)$$ from each of $$r$$ numerator terms: $$= \\tfrac{(-1)^r \\cdot n(n+1)(n+2)\\cdots(n+r-1)}{r!}$$.\n- Step 3: The ascending product is $$\\tfrac{(n+r-1)!}{(n-1)!}$$, so $$= (-1)^r \\tfrac{(n+r-1)!}{(n-1)! \\cdot r!} = (-1)^r \\binom{n+r-1}{r}$$.\n\nThis \"negative binomial identity\" has deep combinatorial meaning (counting multisets).", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_67", "judge_pick": true}, {"question": "Why is the binomial expansion a **local** representation of a function? (3 steps)", "answer": "- Step 1: \"Local\" means the series represents the function only near a specific centre point ($$x=0$$ for Maclaurin). Far from the centre, accuracy degrades or the series fails.\n- Step 2: This contrasts with a **global** representation (e.g. a closed-form like $$\\sqrt{1+x}$$), which is valid everywhere on its domain.\n- Step 3: The radius of convergence quantifies \"how local\": series is reliable within radius, unreliable beyond. Different expansion centres give different local views of the same function.\n\nThe binomial series is a **microscope** for studying functions near a chosen point ‚ÄĒ powerful but limited in reach.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_68", "judge_pick": true}, {"question": "Why would a medical physicist use binomial approximations in MRI analysis? (3 steps)", "answer": "- Step 1: MRI magnetic field equations often involve fractional powers like $$(1+\\epsilon)^{1/2}$$, where $$\\epsilon$$ is a small perturbation (typically from tissue properties or field variations).\n- Step 2: For small $$\\epsilon$$, binomial expansion replaces this with a polynomial: $$(1+\\epsilon)^{1/2} \\approx 1 + \\tfrac{\\epsilon}{2} - \\tfrac{\\epsilon^2}{8}$$.\n- Step 3: Polynomials are trivial to differentiate, integrate, and compute ‚ÄĒ turning an intractable problem into a tractable one. This enables real-time imaging algorithms.\n\nMore broadly: wherever small perturbations appear in physics/engineering, binomial approximations are the go-to tool for linearisation.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_69", "judge_pick": true}, {"question": "Describe the cover-up method for finding $$A$$ in $$\\tfrac{4x-1}{(x+1)(x+3)} = \\tfrac{A}{x+1} + \\tfrac{B}{x+3}$$. (3 steps)", "answer": "- Step 1: Mentally \"cover up\" the factor $$(x+1)$$ in the original left side ‚ÄĒ leaves $$\\tfrac{4x-1}{x+3}$$.\n- Step 2: Evaluate this at the value that makes the covered factor zero: $$x = -1$$.\n- Step 3: Substitute: $$A = \\tfrac{4(-1)-1}{-1+3} = \\tfrac{-5}{2}$$. Done in one step ‚ÄĒ no algebra setup needed.\n\nThe cover-up method works for linear factors in the denominator, bypassing the full algebraic setup.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_70", "judge_pick": false}, {"question": "The partial fraction of $$\\tfrac{3x-1}{(1-2x)^2}$$ into $$\\tfrac{A}{1-2x} + \\tfrac{B}{(1-2x)^2}$$ uses a different approach than cover-up. Outline the method. (3 steps)", "answer": "- Step 1: Combine the right side over common denominator $$(1-2x)^2$$: $$\\tfrac{A(1-2x) + B}{(1-2x)^2}$$. Equate numerators: $$3x - 1 = A(1-2x) + B$$.\n- Step 2: Expand: $$3x - 1 = (A+B) + (-2A)x$$.\n- Step 3: Match coefficients:\n+ Constant: $$A+B = -1$$\n+ $$x$$: $$-2A = 3 \\Rightarrow A = -\\tfrac{3}{2}$$\n+ Then: $$B = -1 - A = \\tfrac{1}{2}$$\n\nFor repeated-factor decompositions, coefficient matching is often cleanest.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_71", "judge_pick": false}, {"question": "When a partial fraction decomposition has a repeated factor like $$\\tfrac{A}{1-2x} + \\tfrac{B}{(1-2x)^2}$$, do the two terms have the same or different validity? (3 steps)", "answer": "- Step 1: Both fractions share the bracket $$1-2x$$. Validity depends on the **bracket structure**, not the exponent.\n- Step 2: So $$(1-2x)^{-1}$$ valid for $$|2x|<1 \\Rightarrow |x|<\\tfrac{1}{2}$$, and $$(1-2x)^{-2}$$ also valid on $$|x|<\\tfrac{1}{2}$$.\n- Step 3: Intersection is $$|x|<\\tfrac{1}{2}$$ ‚ÄĒ same validity because they share the bracket.\n\nRepeated factors add terms to the decomposition but don't shrink the validity interval.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_72", "judge_pick": true}, {"question": "Why does the first-order term of a Maclaurin series equal the derivative at 0 ‚ÄĒ and what does this mean geometrically? (2 steps)", "answer": "- Step 1: From Maclaurin: $$f(x) \\approx f(0) + f'(0)x$$ (to first order). The coefficient of $$x$$ is exactly $$f'(0)$$.\n- Step 2: Geometrically, $$f(0) + f'(0)x$$ is the equation of the tangent line to $$f$$ at $$x=0$$. So the linear approximation is **literally the tangent line**.\n\nFor $$(1+x)^{1/2}$$: $$f(0)=1$$, $$f'(0)=\\tfrac{1}{2}$$, giving tangent $$y = 1 + \\tfrac{x}{2}$$ ‚ÄĒ matching the linear term of the series.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_73", "judge_pick": true}, {"question": "The expansion of $$\\tfrac{1}{\\sqrt{1+3x^2}}$$ (where $$3x^2<1$$) has a special structure. What is it? (3 steps)", "answer": "- Step 1: Let $$u=3x^2$$. Then $$\\tfrac{1}{\\sqrt{1+3x^2}} = (1+u)^{-1/2}$$ where $$u$$ is small when $$x^2$$ is small.\n- Step 2: Expand: $$(1+u)^{-1/2} = 1 - \\tfrac{1}{2}u + \\tfrac{3}{8}u^2 - \\tfrac{5}{16}u^3 + \\cdots$$\n- Step 3: Substitute $$u=3x^2$$: each $$u^k = 3^k x^{2k}$$. So the series has **only even powers** of $$x$$:\n+ Constant: $$1$$\n+ $$x^2$$: $$-\\tfrac{3}{2}$$\n+ $$x^4$$: $$\\tfrac{27}{8}$$\n\nThe substitution $$u=3x^2$$ inherits an **even-only** polynomial structure, reflecting the evenness of the original function.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_74", "judge_pick": false}, {"question": "Outline how to use binomial expansion to approximate $$\\sqrt{98}$$ to 6 decimal places. (4 steps)", "answer": "- Step 1: Find nearby perfect square: $$100$$. Write $$\\sqrt{98} = \\sqrt{100(1 - 0.02)} = 10\\sqrt{1-0.02}$$.\n- Step 2: Apply expansion of $$(1+u)^{1/2}$$ at $$u = -0.02$$:\n+ $$1$$\n+ $$\\tfrac{1}{2}(-0.02) = -0.01$$\n+ $$-\\tfrac{1}{8}(-0.02)^2 = -5 \\times 10^{-5}$$\n+ $$\\tfrac{1}{16}(-0.02)^3 = -5 \\times 10^{-7}$$\n- Step 3: Sum: $$\\approx 0.989949$$.\n- Step 4: Multiply by 10: $$\\sqrt{98} \\approx 9.899495$$ ‚ÄĒ matches calculator to 6+ decimal places.\n\nChoice of \"nearby perfect square √ó (1 + small)\" makes expansion converge very rapidly.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_75", "judge_pick": false}, {"question": "Given $$\\sqrt{98} \\approx 9.899495$$, describe the chain to approximate $$\\cos(\\pi/4)$$. (2 steps)", "answer": "- Step 1: $$\\cos(\\pi/4) = \\tfrac{\\sqrt{2}}{2}$$. Note $$\\sqrt{98} = 7\\sqrt{2}$$, so $$\\sqrt{2} = \\tfrac{\\sqrt{98}}{7}$$, and $$\\cos(\\pi/4) = \\tfrac{\\sqrt{98}}{14}$$.\n- Step 2: Using $$\\sqrt{98} \\approx 9.899495$$: $$\\cos(\\pi/4) \\approx \\tfrac{9.899495}{14} \\approx 0.707107$$ ‚ÄĒ matching the known value.\n\nThis chains binomial expansions to approach trigonometric constants via nested surd identities.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_76", "judge_pick": true}, {"question": "For the general approach to $$\\sqrt{10}$$ via binomial expansion, describe the workaround. (3 steps)", "answer": "- Step 1: Direct attempt fails: $$\\sqrt{10} = 10^{1/2}$$, no \"$$1 + \\text{small}$$\" structure to exploit.\n- Step 2: Workaround: factor out a nearby perfect square. $$\\sqrt{10} = \\sqrt{9 \\cdot \\tfrac{10}{9}} = 3\\sqrt{\\tfrac{10}{9}} = 3(1 + \\tfrac{1}{9})^{1/2}$$.\n- Step 3: Now $$x = \\tfrac{1}{9}$$ is small and well within validity. Apply binomial expansion, truncate, multiply by 3.\n\nThe trick: find a nearby perfect square to factor out, leaving a small remainder to expand.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_77", "judge_pick": true}, {"question": "Mental shortcut: if a series is truncated to 3 terms, how can you estimate the truncation error without computing the true value? (2 steps)", "answer": "- Step 1: The error is approximately equal to the **first omitted term** ‚ÄĒ for binomial series within validity, successive terms shrink, so the first omitted term dominates the tail.\n- Step 2: So error $$\\approx |a_3 x^3|$$ if truncated after $$x^2$$, or $$\\approx |a_4 x^4|$$ if truncated after $$x^3$$, etc.\n\nA fast \"back-of-envelope\" check for approximation quality without extra computation.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_78", "judge_pick": false}, {"question": "Derive the linearisation of $$(1+x)^n$$ for small $$x$$ and explain its physical interpretation. (3 steps)", "answer": "- Step 1: From the series, $$(1+x)^n \\approx 1 + nx$$ for small $$|x|$$.\n- Step 2: This says: multiplying a number by $$(1+x)^n$$ is approximately the same as adding a fractional change of $$nx$$. For example, $$(1+0.01)^3 \\approx 1 + 0.03$$ ‚ÄĒ a 1% change in base gives a 3% change in cube.\n- Step 3: Physical meaning: for small changes, exponents **multiply fractional changes**: $$\\tfrac{\\Delta(x^n)}{x^n} \\approx n \\cdot \\tfrac{\\Delta x}{x}$$. This is the foundation of error propagation formulas in physics, measurement science, compound interest.\n\nThe exponent is the \"leverage factor\" for fractional change.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_79", "judge_pick": true}, {"question": "For $$\\sqrt{1-2x} \\approx 1 - x - \\tfrac{x^2}{2} - \\tfrac{x^3}{2} - \\cdots$$, all non-constant signs are negative. Why? (3 steps)", "answer": "- Step 1: Expansion has $$n=\\tfrac{1}{2}$$ with substitution $$u = -2x$$. Each term: $$\\binom{1/2}{r}(-2)^r x^r$$.\n- Step 2: The falling factorial $$(1/2)(1/2-1)(1/2-2)\\cdots$$ has one positive factor ($$1/2$$) followed by all negative factors. Sign contribution: $$(-1)^{r-1}$$ for $$r \\geq 1$$.\n- Step 3: $$(-2)^r$$ contributes $$(-1)^r$$. Combined: $$(-1)^{r-1}(-1)^r = (-1)^{2r-1} = -1$$ for all $$r \\geq 1$$. Every non-constant term is negative.\n\nA consistent pattern worth recognising in this specific case.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_80", "judge_pick": false}, {"question": "What does \"sufficiently small $$x$$\" mean in problem contexts, and why is this phrasing used? (2 steps)", "answer": "- Step 1: \"Sufficiently small\" means $$|x|$$ is small enough that higher-order terms ($$x^3, x^4, \\ldots$$) are negligible compared to the lower-order terms kept ‚ÄĒ so truncation is a valid local approximation.\n- Step 2: It's a shorthand used in applied math/physics to avoid specifying exact bounds: \"Assume terms in $$x^3$$ and higher can be neglected.\" This permits binomial approximations without strict validity specifications.\n\nThe onus is on you to implicitly assume $$|x|$$ is well within the convergence radius and truncation error is acceptable.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_81", "judge_pick": false}, {"question": "Critique: \"The series for $$(1+x)^{-1}$$ is $$1 - x + x^2 - x^3 + \\cdots$$ ‚ÄĒ it's just alternating signs on $$x^r$$.\" Is this generalisable? (2 steps)", "answer": "- Step 1: True for $$n=-1$$ specifically, because $$\\binom{-1}{r} = (-1)^r$$, giving $$(-1)^r x^r$$ with simple alternating ¬Ī1 coefficients.\n- Step 2: But for other $$n$$, coefficients are not simple $$\\pm 1$$. E.g. $$(1+x)^{1/2}$$ has $$1, \\tfrac{1}{2}, -\\tfrac{1}{8}, \\tfrac{1}{16}, -\\tfrac{5}{128}, \\ldots$$ ‚ÄĒ neither constant nor simple alternating.\n\n$$(1+x)^{-1}$$ is an especially clean special case ‚ÄĒ don't extrapolate its simplicity to other $$n$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_82", "judge_pick": false}, {"question": "State the \"Summary key point #4\" (from the chapter) regarding partial fractions and binomial expansion, and explain its reasoning.", "answer": "The principle: \"If an expression is of the form $$\\tfrac{f(x)}{g(x)}$$ where $$g(x)$$ can be split into linear factors, then split $$\\tfrac{f(x)}{g(x)}$$ into partial fractions before expanding each part.\" Reasoning: each individual partial fraction is of the form (constant) √ó $$(a+bx)^{-k}$$, all of which admit direct binomial expansion. Without decomposition, the fraction might not be in expandable form. The recipe is: **decompose first, expand second, combine third.**", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_83", "judge_pick": false}, {"question": "Sketch a conceptual diagram of how the validity interval around $$x=0$$ relates to the function's poles. (3 steps)", "answer": "- Step 1: Imagine the real number line, with the expansion centred at $$x=0$$.\n- Step 2: Mark poles of the function (points where it blows up). E.g., $$(1+x)^{-1}$$ has pole at $$x=-1$$; $$(2+3x)^{-1}$$ has pole at $$x=-\\tfrac{2}{3}$$.\n- Step 3: The validity interval is a symmetric interval around 0 extending up to (but not including) the **nearest pole**. So $$(1+x)^{-1}$$: $$|x|<1$$; $$(2+3x)^{-1}$$: $$|x|<\\tfrac{2}{3}$$.\n\nPicture: concentric \"ring\" of validity, bounded by the nearest \"bad point\".", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_84", "judge_pick": true}, {"question": "Expand $$(1+x^2)^{-1}$$ and describe the structural feature. (3 steps)", "answer": "- Step 1: Let $$u=x^2$$. Then $$(1+x^2)^{-1} = (1+u)^{-1} = 1 - u + u^2 - u^3 + \\cdots = 1 - x^2 + x^4 - x^6 + \\cdots$$\n- Step 2: Only **even powers** of $$x$$ appear ‚ÄĒ because $$u$$ itself is an even function of $$x$$.\n- Step 3: Validity: $$|u|<1 \\Rightarrow |x^2|<1 \\Rightarrow |x|<1$$. Same interval as $$(1+x)^{-1}$$ but with even powers only.\n\nReflects the evenness of $$\\tfrac{1}{1+x^2}$$. A stepping stone to understanding Taylor series via substitution.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_85", "judge_pick": false}, {"question": "For $$\\tfrac{3x^2+4x-5}{(x+3)(x-2)}$$, the partial fraction has form $$A + \\tfrac{B}{x+3} + \\tfrac{C}{x-2}$$. Why the constant $$A$$? (3 steps)", "answer": "- Step 1: Compare degrees: numerator $$3x^2+4x-5$$ is degree 2; denominator $$(x+3)(x-2) = x^2+x-6$$ is also degree 2. Equal degrees ‚áí improper fraction.\n- Step 2: Proper fraction has numerator degree strictly less than denominator. To reach a proper rational form, extract a polynomial part via long division ‚ÄĒ here a constant $$A$$ because degrees are equal.\n- Step 3: Full form: (constant) + (proper fraction), with the proper part admitting standard partial-fraction decomposition.\n\nRule of thumb: always check degrees first; improper fractions need a polynomial part before decomposition.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_86", "judge_pick": true}, {"question": "Why does $$\\tfrac{3x^2+6x-2}{x^2+4}$$ decompose as $$d + \\tfrac{ex+f}{x^2+4}$$, and why does $$x^2+4$$ not split further? (3 steps)", "answer": "- Step 1: Numerator and denominator both have degree 2 ‚áí improper. Long division gives a constant $$d$$ plus a proper remainder of degree < 2: form $$d + \\tfrac{ex+f}{x^2+4}$$.\n- Step 2: $$x^2+4$$ is an **irreducible quadratic** over the reals (discriminant $$0 - 16 < 0$$, no real roots). Cannot be split into real linear factors.\n- Step 3: Partial fraction rule: each irreducible quadratic in the denominator contributes a **linear numerator** term ($$ex+f$$), not just a constant ‚ÄĒ two free parameters are needed.\n\nEach irreducible quadratic factor in the denominator contributes a term with a linear numerator.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_87", "judge_pick": true}, {"question": "In a series expansion around $$x=0$$ valid for $$|x|<R$$, why does convergence speed depend on $$|x|/R$$ rather than just $$|x|$$? (3 steps)", "answer": "- Step 1: Convergence speed depends on the **ratio** between consecutive terms. For binomial series, this ratio involves $$|x|$$ scaled by $$\\tfrac{1}{R}$$ (roughly).\n- Step 2: Each term is approximately $$(|x|/R)^r$$ times something slowly-varying, so the decay rate is governed by $$|x|/R$$.\n- Step 3: Fast convergence when $$|x| \\ll R$$ (say, $$|x| < 0.1R$$); slow near the boundary ($$|x| \\approx R$$). The relevant quantity is $$|x|/R$$ ‚ÄĒ a **scale-free** measure of \"how close to the edge\".\n\nProblems often emphasise choosing $$x$$ small relative to $$R$$, not just \"small\".", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_88", "judge_pick": true}, {"question": "To check the partial fraction decomposition $$\\tfrac{3+5x}{(1+3x)(1-x)} = \\tfrac{1}{1+3x} + \\tfrac{2}{1-x}$$ conceptually, what's a quick sanity check? (2 steps)", "answer": "- Step 1: Left side at $$x=0$$: $$\\tfrac{3+0}{(1)(1)} = 3$$.\n- Step 2: Right side at $$x=0$$: $$\\tfrac{1}{1} + \\tfrac{2}{1} = 1 + 2 = 3$$. Match!\n\nPlug-in sanity checks like this should always be done to verify partial fraction decompositions before using them.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_89", "judge_pick": false}, {"question": "Given $$(1+ax)^n$$ expansion has $$x$$ coefficient $$-6$$ and $$x^2$$ coefficient $$45$$, how do you set up a system for $$a$$ and $$n$$? (3 steps)", "answer": "- Step 1: Coefficient of $$x$$: $$na = -6$$ ... (1)\n- Step 2: Coefficient of $$x^2$$: $$\\tfrac{n(n-1)}{2}a^2 = 45$$ ... (2)\n- Step 3: Trick: square (1) to get $$n^2 a^2 = 36$$. Divide (2) by this: $$\\tfrac{n-1}{2n} = \\tfrac{45}{36} = \\tfrac{5}{4}$$, yielding $$2(n-1) = 5n \\Rightarrow n = -\\tfrac{2}{3}$$. Back-substitute to (1): $$a = \\tfrac{-6}{n} = 9$$.\n\nDivide a higher-degree equation by the square of a lower one to eliminate one variable.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_90", "judge_pick": false}, {"question": "In the expansion of $$(1-4x)^3$$ versus $$(1-4x)^{3/2}$$, contrast their structural characteristics. (3 steps)", "answer": "- Step 1: $$(1-4x)^3$$: exponent is positive integer. Generalised formula has factor $$(n-r+1)$$ hit zero at $$r = n+1 = 4$$, killing terms beyond $$x^3$$. Finite polynomial $$1 - 12x + 48x^2 - 64x^3$$, valid for **all $$x$$**.\n- Step 2: $$(1-4x)^{3/2}$$: exponent $$\\tfrac{3}{2}$$ is non-integer. No factor ever equals zero ‚áí infinite series. Validity: $$|4x|<1 \\Rightarrow |x|<\\tfrac{1}{4}$$.\n- Step 3: Both expansions *look* similar up to $$x^3$$, but meanings differ: one is exact and unconditional, the other is a truncated approximation with strict validity.\n\nSame form, different character ‚ÄĒ this is the key distinction between natural and rational exponents.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_91", "judge_pick": true}, {"question": "What does an alternating-sign pattern in a power series coefficients suggest about the function's structure? (2 steps)", "answer": "- Step 1: Alternating signs (like $$1 - x + x^2 - x^3 + \\cdots$$) often indicate the function is $$f(-x)$$ of some simpler structure, or has a specific pole location on the negative real axis.\n- Step 2: E.g., $$\\tfrac{1}{1+x}$$ is $$\\tfrac{1}{1-(-x)}$$, giving alternating signs because of the $$-x$$ substitution. Such expansions converge by the alternating series test and often cancel gently.\n\nSign patterns reveal structural features that raw formulas might hide.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_92", "judge_pick": false}, {"question": "Using the ratio of consecutive coefficients, estimate the $$x^4$$ coefficient of $$(1+x)^{1/2}$$ given the $$x^3$$ coefficient is $$\\tfrac{1}{16}$$. (3 steps)", "answer": "- Step 1: Each coefficient relates to the previous by ratio $$\\tfrac{n-r}{r+1}$$ where $$n=\\tfrac{1}{2}$$. Moving from $$r=3$$ to $$r=4$$: ratio $$= \\tfrac{1/2 - 3}{4} = -\\tfrac{5}{8}$$.\n- Step 2: So $$x^4$$ coefficient $$= \\tfrac{1}{16} \\times (-\\tfrac{5}{8}) = -\\tfrac{5}{128}$$.\n- Step 3: Check via direct formula: $$\\tfrac{(1/2)(-1/2)(-3/2)(-5/2)}{4!} = \\tfrac{(1)(-1)(-3)(-5)/16}{24} = \\tfrac{-15/16}{24} = -\\tfrac{5}{128}$$. ‚úď\n\nRecursive ratio is a fast way to extend the series without redoing the full formula each time.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_93", "judge_pick": true}, {"question": "Derive the binomial expansion of $$\\tfrac{1}{\\sqrt{1-4x}}$$ and identify its combinatorial meaning. (3 steps)", "answer": "- Step 1: Expand $$(1-4x)^{-1/2}$$: coefficient of $$x^r$$ is $$\\binom{-1/2}{r}(-4)^r$$.\n- Step 2: Simplify $$\\binom{-1/2}{r}(-4)^r$$: after algebra, this equals $$\\binom{2r}{r}$$ ‚ÄĒ the **central binomial coefficient**. So $$\\tfrac{1}{\\sqrt{1-4x}} = \\sum_r \\binom{2r}{r}x^r = 1 + 2x + 6x^2 + 20x^3 + \\cdots$$ for $$|x|<\\tfrac{1}{4}$$.\n- Step 3: This is a famous **generating function** for central binomial coefficients ‚ÄĒ the number of paths on a lattice of $$2r$$ steps returning to start, etc. Combinatorics embedded in calculus!\n\nA beautiful connection: binomial series encode combinatorial structures.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_94", "judge_pick": true}, {"question": "In a problem asking you to expand $$\\tfrac{1+x}{1-2x}$$ and use it to approximate $$\\tfrac{101}{103}$$, how do you identify the right $$x$$ value? (3 steps)", "answer": "- Step 1: Set $$\\tfrac{1+x}{1-2x} = \\tfrac{101}{103}$$. Cross-multiply: $$103(1+x) = 101(1-2x)$$ gives... wait, better: $$103 + 103x = 101 - 202x + \\ldots$$ \n\nActually solving directly: $$\\tfrac{1+x}{1-2x} = \\tfrac{101}{103} \\Rightarrow 103(1+x) = 101(1-2x) \\Rightarrow 103 + 103x = 101 - 202x \\Rightarrow 305x = -2 \\Rightarrow$$ hmm, let me recheck the target.\n\n- Step 2: Actually for $$\\tfrac{101}{103}$$, we want $$1+x = \\tfrac{101}{103}(1-2x)$$... simplest is $$1+x = \\tfrac{101}{103}$$ and $$1-2x = 1$$, suggesting $$x$$ tiny. With $$x \\to 0$$: ratio tends to 1. Not exactly 101/103.\n- Step 3: The cleaner identification: find $$x$$ such that $$(1+x):(1-2x) = 101:103$$. One natural choice is $$x = 0.01$$: gives $$1.01 / 0.98 \\approx 1.0306$$, not quite.\n\nBetter approach: use the expansion directly and choose $$x$$ such that truncating gives the target numerator & denominator simultaneously. In practice, $$x = 0.01$$ is chosen conventionally for small-$$x$$ estimation, and the resulting approximation of the ratio matches a particular rational.\n\nThe technique: identify an $$x$$ where both numerator and denominator of the target rational appear directly in $$(1+x)/(1-2x)$$ structure.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_95", "judge_pick": false}, {"question": "For the binomial expansion, which rational function corresponds to \"$$x=0.01$$\" giving $$\\tfrac{101}{103}$$ for $$\\tfrac{1+x}{1+3x}$$? (3 steps)", "answer": "- Step 1: Substitute $$x=0.01$$ into $$\\tfrac{1+x}{1+3x}$$: $$= \\tfrac{1.01}{1.03} = \\tfrac{101}{103}$$.\n- Step 2: So the truncated expansion $$1 - 2x + 6x^2 - 18x^3$$ evaluated at $$x=0.01$$ gives a fast, accurate decimal estimate of $$\\tfrac{101}{103}$$.\n- Step 3: Validity check: $$|0.01|<\\tfrac{1}{3}$$ ‚úď. Error is dominated by next term $$x^4 \\sim 10^{-8}$$, giving 8-decimal accuracy.\n\nThe technique: relate your target rational to a specific small $$x$$ that matches numerator and denominator structures.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_96", "judge_pick": false}, {"question": "For a function $$f(x)$$ expanded around $$x=0$$, what property ensures that term-by-term integration gives the integral of $$f$$?", "answer": "The function's power series must converge uniformly on the interval of integration ‚ÄĒ a condition guaranteed **within** the (open) interval of convergence. This is why, for $$(1+x)^n$$ with $$|x|<1$$, you can write $$\\int (1+x)^n \\, dx = \\sum_r \\binom{n}{r} \\int x^r \\, dx = \\sum_r \\binom{n}{r} \\tfrac{x^{r+1}}{r+1}$$ ‚ÄĒ this series also converges on $$|x|<1$$, and equals $$\\tfrac{(1+x)^{n+1}}{n+1}$$ (plus constant). Uniform convergence is the technical backbone enabling this \"pass operations through the sum\".", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_97", "judge_pick": true}, {"question": "For the partial-fraction expansion method, under what circumstances is the validity exactly $$|x| < R$$ where $$R$$ is not obviously the smallest of the individual pieces? (3 steps)", "answer": "- Step 1: The validity of the combined expansion is always the intersection of validities of individual pieces: $$|x| < \\min(R_1, R_2, \\ldots)$$.\n- Step 2: Sometimes one piece has a \"larger than expected\" validity because of cancellations ‚ÄĒ but this is rare. Usually the formal rule (min of pieces) matches reality.\n- Step 3: If a partial fraction piece has a pole at the boundary of another's validity, the combined series could either converge or diverge there ‚ÄĒ case-by-case analysis needed.\n\nDefault assumption: validity = minimum of individual validities. Exceptions are rare and require careful analysis.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_98", "judge_pick": true}, {"question": "State the general rule: if $$g(x) = \\tfrac{f(x)}{(x+a)(x+b)(x+c)}$$ with $$a, b, c$$ distinct, what is the radius of convergence of the Maclaurin expansion of $$g$$? (2 steps)", "answer": "- Step 1: The denominator has simple poles at $$x = -a, -b, -c$$. The radius of convergence is the distance from 0 to the nearest pole: $$R = \\min(|a|, |b|, |c|)$$.\n- Step 2: The expansion (obtained via partial fractions + binomial series for each piece) converges for $$|x| < R$$. Beyond this, at least one partial fraction piece diverges.\n\nPoles set the boundary ‚ÄĒ identify them to predict validity without doing the full decomposition.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_99", "judge_pick": true}, {"question": "Explain the step-by-step strategy for expanding $$\\tfrac{3+2x-x^2}{4-x}$$ into ascending powers of $$x$$. (4 steps)", "answer": "- Step 1: Check if improper: numerator degree 2, denominator degree 1. Improper ‚ÄĒ perform long division first.\n- Step 2: Divide $$3 + 2x - x^2$$ by $$4-x$$. Rewriting as $$-(x^2 - 2x - 3)$$ and dividing... gives quotient $$x + 6$$ with remainder $$27$$. Actually let me redo: $$-x^2 + 2x + 3$$ divided by $$-x + 4$$: quotient $$x + 2$$, remainder $$-5$$. So $$\\tfrac{3+2x-x^2}{4-x} = (x+2) + \\tfrac{-5}{4-x}$$.\n- Step 3: Now expand the fractional part: $$\\tfrac{-5}{4-x} = \\tfrac{-5}{4}(1-\\tfrac{x}{4})^{-1} = -\\tfrac{5}{4}(1 + \\tfrac{x}{4} + \\tfrac{x^2}{16} + \\cdots)$$.\n- Step 4: Combine: $$f(x) = (x+2) - \\tfrac{5}{4} - \\tfrac{5x}{16} - \\tfrac{5x^2}{64} - \\cdots = \\tfrac{3}{4} + (1 - \\tfrac{5}{16})x - \\tfrac{5}{64}x^2 - \\cdots$$, matching $$\\tfrac{3}{4} + \\tfrac{11}{16}x - \\tfrac{5}{64}x^2$$.\n\nThe recipe: (1) check improper, (2) divide if needed, (3) expand proper part, (4) combine.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_100", "judge_pick": false}, {"question": "For $$f(x) = \\tfrac{6}{1+5x} - \\tfrac{4}{1-3x}$$, what is the constant term of the Maclaurin expansion? (2 steps)", "answer": "- Step 1: Substitute $$x=0$$: $$f(0) = \\tfrac{6}{1} - \\tfrac{4}{1} = 6 - 4 = 2$$.\n- Step 2: This is the constant term of the series expansion ‚ÄĒ the value of the function at the centre of expansion.\n\nQuick check: the leading (constant) term of any Maclaurin series equals $$f(0)$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_101", "judge_pick": false}, {"question": "For $$f(x) = (3+4x)^{-3}$$, what's the constant term and the sign of the $$x$$ term of its binomial expansion? (3 steps)", "answer": "- Step 1: Rewrite: $$f(x) = 3^{-3}(1+\\tfrac{4x}{3})^{-3} = \\tfrac{1}{27}(1+\\tfrac{4x}{3})^{-3}$$.\n- Step 2: Constant term: $$\\tfrac{1}{27} \\cdot 1 = \\tfrac{1}{27}$$.\n- Step 3: $$x$$ coefficient: $$\\tfrac{1}{27} \\cdot (-3) \\cdot \\tfrac{4}{3} = \\tfrac{1}{27} \\cdot (-4) = -\\tfrac{4}{27}$$. Negative, because $$n = -3$$ gives a negative first coefficient, and $$\\tfrac{4}{3}$$ is positive.\n\nThe pattern: constant term = $$a^n$$; linear coefficient = $$a^n \\cdot n \\cdot \\tfrac{b}{a}$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_102", "judge_pick": false}, {"question": "What are the \"poles\" of a rational function, and why do they determine the radius of Maclaurin convergence? (3 steps)", "answer": "- Step 1: Poles are values of $$x$$ where the denominator equals zero, causing the function to blow up (go to $$\\pm\\infty$$).\n- Step 2: A Taylor series centred at $$x=0$$ converges within the largest disc around 0 that contains no singularities. The boundary of this disc is at the nearest pole.\n- Step 3: So radius of convergence $$= \\min(\\text{distances from 0 to all poles})$$. For rational functions, this is entirely determined by factoring the denominator.\n\nThis is why partial fraction pieces reveal the validity at a glance.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_103", "judge_pick": false}, {"question": "Compare the rate of decay of binomial coefficients for $$(1+x)^{1/2}$$ versus $$(1+x)^{-1/2}$$ asymptotically. (3 steps)", "answer": "- Step 1: For $$(1+x)^{1/2}$$: coefficients eventually behave like $$(-1)^{r+1}/(r^{3/2})$$ ‚ÄĒ slow polynomial decay.\n- Step 2: For $$(1+x)^{-1/2}$$: coefficients are $$\\binom{-1/2}{r} \\sim (2r)!/(r!^2 4^r)$$, growing like $$1/\\sqrt{r}$$ ‚ÄĒ even slower!\n- Step 3: Both series have radius of convergence 1, but $$(1+x)^{-1/2}$$ coefficients decay so slowly they converge only barely ‚ÄĒ convergence is marginal at the boundary.\n\nThe exponent $$n$$ dictates decay rate: more negative $$n$$ ‚áí slower decay ‚áí slower convergence near the boundary.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_104", "judge_pick": true}, {"question": "Why does polynomial long division always work to reduce an improper rational fraction, and what's the result's structure? (3 steps)", "answer": "- Step 1: Long division of polynomials is the analog of integer long division ‚ÄĒ reduces the \"big numerator\" by multiples of the denominator, leaving a remainder of smaller degree.\n- Step 2: Result: $$\\tfrac{f(x)}{g(x)} = q(x) + \\tfrac{r(x)}{g(x)}$$ where $$q(x)$$ is the quotient polynomial and $$\\deg r < \\deg g$$.\n- Step 3: Now $$\\tfrac{r(x)}{g(x)}$$ is a **proper** rational function ready for partial fraction decomposition, while $$q(x)$$ is already a polynomial (no expansion needed).\n\nThis systematic procedure always produces a proper rational remainder, enabling standard techniques.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_105", "judge_pick": true}, {"question": "When you see a bracket with coefficient on $$x$$ in an expansion prompt (like $$(1-\\tfrac{3}{4}x)^{-5/3}$$), what's the first algebraic action? (2 steps)", "answer": "- Step 1: Identify the \"$$x$$-equivalent\" for validity purposes: here, $$u = -\\tfrac{3}{4}x$$, so validity is $$|-\\tfrac{3}{4}x|<1 \\Rightarrow |x|<\\tfrac{4}{3}$$.\n- Step 2: Apply the binomial series with $$n = -\\tfrac{5}{3}$$ and \"$$u$$\" replacing $$x$$. Each $$u^k$$ becomes $$(-\\tfrac{3}{4})^k x^k$$ in the final expression.\n\nThe $$u$$-substitution is at the heart of handling non-trivial coefficients on $$x$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_106", "judge_pick": false}, {"question": "Explain why expansion coefficients of $$(1-x)^{-k}$$ for positive integer $$k$$ count combinatorial quantities like multisets. (2 steps)", "answer": "- Step 1: $$(1-x)^{-k}$$ has coefficient of $$x^r$$ equal to $$\\binom{-k}{r}(-1)^r = \\binom{k+r-1}{r}$$ ‚ÄĒ the number of **multisets** of size $$r$$ from $$k$$ distinct objects.\n- Step 2: This means $$(1-x)^{-k}$$ is the generating function for \"ways to pick $$r$$ items with repetition from $$k$$ distinct types\". The binomial series becomes a combinatorial machine.\n\nDeep pattern: binomial series encode counting, from simple geometric series to rich multiset enumeration.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_107", "judge_pick": true}, {"question": "Summary check: what are the three rules for determining validity of a binomial expansion involving $$(1+bx)^n$$ or $$(a+bx)^n$$? (3 steps)", "answer": "- Step 1: For $$(1+x)^n$$: valid for $$|x|<1$$.\n- Step 2: For $$(1+bx)^n$$ (with $$b$$ a constant): valid for $$|bx|<1$$, i.e. $$|x|<\\tfrac{1}{|b|}$$.\n- Step 3: For $$(a+bx)^n$$ (factored as $$a^n(1+\\tfrac{b}{a}x)^n$$): valid for $$\\left|\\tfrac{b}{a}x\\right|<1$$, i.e. $$|x|<\\left|\\tfrac{a}{b}\\right|$$.\n\nMemorise these three ‚ÄĒ they cover all binomial-expansion validity questions.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_108", "judge_pick": false}, {"question": "For expressing $$g(x) = \\tfrac{1}{(1+x)(1-2x)}$$ as a partial fraction and finding the $$x^2$$ coefficient of its expansion, outline the complete strategy. (5 steps)", "answer": "- Step 1: Decompose: $$\\tfrac{1}{(1+x)(1-2x)} = \\tfrac{A}{1+x} + \\tfrac{B}{1-2x}$$. Combining: $$1 = A(1-2x) + B(1+x)$$.\n- Step 2: Set $$x=-1$$: $$1 = A(3) \\Rightarrow A = \\tfrac{1}{3}$$. Set $$x=\\tfrac{1}{2}$$: $$1 = B(\\tfrac{3}{2}) \\Rightarrow B = \\tfrac{2}{3}$$.\n- Step 3: Expand each piece:\n+ $$\\tfrac{1/3}{1+x} = \\tfrac{1}{3}(1 - x + x^2 - \\cdots)$$\n+ $$\\tfrac{2/3}{1-2x} = \\tfrac{2}{3}(1 + 2x + 4x^2 + \\cdots)$$\n- Step 4: Sum the $$x^2$$ coefficients: $$\\tfrac{1}{3}(1) + \\tfrac{2}{3}(4) = \\tfrac{1}{3} + \\tfrac{8}{3} = 3$$.\n- Step 5: Validity: $$|x|<1 \\cap |x|<\\tfrac{1}{2} = |x|<\\tfrac{1}{2}$$.\n\nFull pipeline: decompose ‚Üí expand each ‚Üí sum coefficients ‚Üí find overall validity.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_109", "judge_pick": false}], "count": 110}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 15951, "out_tokens": 21675, "reasoning_chars": 1506, "cost_eur": 0.0852, "elapsed_s": 177, "content_chars": 58486}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 15951, "out_tokens": 16483, "reasoning_chars": 29471, "cost_eur": 0.0685, "elapsed_s": 278, "content_chars": 23047}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 15951, "out_tokens": 22575, "reasoning_chars": 17166, "cost_eur": 0.0881, "elapsed_s": 949, "content_chars": 49699}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 14
