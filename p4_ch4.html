ulus!\n\nA beautiful connection: binomial series encode combinatorial structures.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_94"}, {"question": "For a function $$f(x)$$ expanded around $$x=0$$, what property ensures that term-by-term integration gives the integral of $$f$$?", "answer": "The function's power series must converge uniformly on the interval of integration ‚ÄĒ a condition guaranteed **within** the (open) interval of convergence. This is why, for $$(1+x)^n$$ with $$|x|<1$$, you can write $$\\int (1+x)^n \\, dx = \\sum_r \\binom{n}{r} \\int x^r \\, dx = \\sum_r \\binom{n}{r} \\tfrac{x^{r+1}}{r+1}$$ ‚ÄĒ this series also converges on $$|x|<1$$, and equals $$\\tfrac{(1+x)^{n+1}}{n+1}$$ (plus constant). Uniform convergence is the technical backbone enabling this \"pass operations through the sum\".", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_97"}, {"question": "Why is the binomial expansion a **local** representation of a function? (3 steps)", "answer": "- Step 1: \"Local\" means the series represents the function only near a specific centre point ($$x=0$$ for Maclaurin). Far from the centre, accuracy degrades or the series fails.\n- Step 2: This contrasts with a **global** representation (e.g. a closed-form like $$\\sqrt{1+x}$$), which is valid everywhere on its domain.\n- Step 3: The radius of convergence quantifies \"how local\": series is reliable within radius, unreliable beyond. Different expansion centres give different local views of the same function.\n\nThe binomial series is a **microscope** for studying functions near a chosen point ‚ÄĒ powerful but limited in reach.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_68"}, {"question": "A cubic approximation of $$f(x)$$ is valid on $$|x|<1$$. A physicist uses it at $$x=0.9$$. What issues may arise? (3 steps)", "answer": "- Step 1: $$x=0.9$$ is **within** validity ($$0.9 < 1$$), so the full series does converge. But convergence near the edge is **very slow**.\n- Step 2: A 3-term truncation throws away $$x^4, x^5, \\ldots$$. At $$x=0.9$$: $$x^4 = 0.656$$, $$x^5 = 0.590$$ ‚ÄĒ these don't shrink much, so the truncation error is huge.\n- Step 3: Technically valid but **practically useless** ‚ÄĒ the cubic approximation has enormous error.\n\nLesson: within validity ‚Č† good approximation. You need $$|x|$$ comfortably small for short truncations to be accurate.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_44"}, {"question": "Exercise: For $$(1+3x)^{-1}$$ expanded up to $$x^3$$, find the expansion of $$\\frac{1+x}{1+3x}$$ up to $$x^3$$. Show how the product $$(1+x)(1+3x)^{-1}$$ generates each coefficient. (3 steps)", "answer": "- Step 1: Expand $$(1+3x)^{-1} = 1 - 3x + 9x^2 - 27x^3 + \\ldots$$ (valid $$|x|<\\frac{1}{3}$$).\n- Step 2: Multiply by $$(1+x)$$: $$(1+x)(1 - 3x + 9x^2 - 27x^3 + \\ldots)$$. Compute each power:\n+ Constant: $$1 \\times 1 = 1$$\n+ $$x$$: $$1 \\times (-3x) + x \\times 1 = -3x + x = -2x$$\n+ $$x^2$$: $$1 \\times 9x^2 + x \\times (-3x) = 9x^2 - 3x^2 = 6x^2$$\n+ $$x^3$$: $$1 \\times (-27x^3) + x \\times 9x^2 = -27x^3 + 9x^3 = -18x^3$$\n- Step 3: Result: $$\\frac{1+x}{1+3x} \\approx 1 - 2x + 6x^2 - 18x^3$$. Each coefficient comes from exactly two cross-products: the constant from the first bracket times the relevant term from the second, plus the $$x$$ from the first bracket times the previous term from the second.\n\nThe pattern of coefficients ($$1, -2, 6, -18$$) shows rapid growth in magnitude ‚ÄĒ a warning that $$x$$ must be small for this to be useful.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_44"}, {"question": "For $$\\sqrt{4+x}$$, state the validity range and explain why it's $$|x|<4$$ rather than $$|x|<1$$. (3 steps)", "answer": "- Step 1: Rewrite: $$\\sqrt{4+x} = (4+x)^{1/2} = 4^{1/2}(1+\\tfrac{x}{4})^{1/2} = 2(1+\\tfrac{x}{4})^{1/2}$$.\n- Step 2: Validity of the bracketed expansion: $$\\left|\\tfrac{x}{4}\\right|<1$$, i.e. $$|x|<4$$.\n- Step 3: It's not $$|x|<1$$ because the \"effective small quantity\" driving convergence is $$\\tfrac{x}{4}$$, not $$x$$. Factoring out $$a=4$$ rescales the window 4 times wider.\n\nSo a larger $$a$$ gives more room for $$x$$ to vary while the expansion remains valid.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_15"}, {"question": "For the product $$(1+x)(1-2x)^{-1} = 1 + 3x + 6x^2 + 12x^3 + \\cdots$$, explain why coefficients grow geometrically. (3 steps)", "answer": "- Step 1: $$(1-2x)^{-1} = 1 + 2x + 4x^2 + 8x^3 + \\cdots$$ ‚ÄĒ geometric series with ratio 2.\n- Step 2: Multiplying by $$(1+x)$$ gives new coefficients $$b_n = a_n + a_{n-1}$$:\n+ Constant: $$1$$\n+ $$x$$: $$2+1=3$$\n+ $$x^2$$: $$4+2=6$$\n+ $$x^3$$: $$8+4=12$$\n- Step 3: Coefficients $$1, 3, 6, 12, 24, \\ldots$$ grow as $$3 \\cdot 2^{n-1}$$ for $$n\\geq 1$$ ‚ÄĒ still geometric, just scaled. This growth sets convergence radius at $$|x|<\\tfrac{1}{2}$$.\n\nCoefficient growth rate directly determines convergence behaviour.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_63"}], "models": {"glm_1": {"label": "GLM 5.1 ‚Ď†", "cards": [{"question": "When $$n$$ is a natural number, the binomial expansion $$(a+b)^n$$ has a finite number of terms. When $$n$$ is negative or fractional, it produces an infinite series. Why, conceptually, does this happen? (2 steps)", "answer": "- Step 1: When $$n$$ is a natural number, the general coefficient is $$\\frac{n(n-1)(n-2)\\ldots(n-r+1)}{r!}$$. Once $$r$$ exceeds $$n$$, one of the factors in the numerator becomes zero (specifically when $$r = n+1$$, the factor $$(n - n) = 0$$ appears), and every subsequent coefficient is also zero. This truncates the series to exactly $$n+1$$ terms.\n- Step 2: When $$n$$ is negative or fractional, none of the factors $$(n-r+1)$$ ever equal zero ‚ÄĒ for example, if $$n=-2$$, the factors go $$-2, -3, -4, -5, \\ldots$$ indefinitely. No \"kill switch\" exists, so the series never terminates, producing infinitely many terms.\n\nFinite vs infinite is determined by whether the descending sequence $$n, n-1, n-2, \\ldots$$ ever hits zero.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_0", "judge_pick": false}, {"question": "Write the general binomial expansion of $$(1+x)^n$$ for any real $$n$$, and explain what each part of the general $$r$$-th term $$\\frac{n(n-1)\\ldots(n-r+1)}{r!}x^r$$ represents structurally. (3 steps)", "answer": "- Step 1: The full expansion is $$(1+x)^n = 1 + nx + \\frac{n(n-1)}{2!}x^2 + \\frac{n(n-1)(n-2)}{3!}x^3 + \\ldots + \\frac{n(n-1)\\ldots(n-r+1)}{r!}x^r + \\ldots$$\n- Step 2: The numerator $$n(n-1)(n-2)\\ldots(n-r+1)$$ is a \"falling factorial\" ‚ÄĒ it counts down from $$n$$ in steps of 1, taking exactly $$r$$ factors. The last factor is $$(n-r+1)$$ because we start at $$n$$ and take $$r$$ steps back: $$n, n-1, \\ldots, n-(r-1)$$.\n- Step 3: The denominator $$r!$$ normalises for the number of ways to choose $$r$$ items (it's the same combinatorial denominator as the integer case, but now extended to real $$n$$). The power $$x^r$$ tracks which term we're on.\n\nThe structure mirrors the integer-$$n$$ formula exactly ‚ÄĒ the only difference is $$n$$ can now be any real number.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_1", "judge_pick": true}, {"question": "The binomial expansion of $$(1+x)^n$$ is only valid when $$|x|<1$$. Intuitively, why must $$|x|$$ be small enough? What goes wrong if $$|x| \\geq 1$$? (3 steps)", "answer": "- Step 1: When $$n$$ is not a natural number, the expansion is an infinite series. For an infinite series to represent a finite function value, the series must converge ‚ÄĒ the terms must shrink toward zero fast enough that their sum approaches a limit.\n- Step 2: The $$r$$-th term has factor $$x^r$$. If $$|x| \\geq 1$$, then $$|x^r|$$ does not shrink as $$r$$ grows ‚ÄĒ in fact for $$|x|>1$$ it grows without bound. Even though the coefficient $$\\frac{n(n-1)\\ldots(n-r+1)}{r!}$$ eventually shrinks (it grows roughly like $$r^{n-1}$$), the exponential growth of $$|x|^r$$ dominates, and the terms don't approach zero, so the series diverges.\n- Step 3: When $$|x|<1$$, the factor $$x^r$$ forces terms to shrink exponentially fast, overwhelming the polynomial growth of the coefficient, ensuring convergence. The boundary $$|x|=1$$ requires careful analysis (conditional convergence possible for some $$n$$, but the guaranteed-valid region is $$|x|<1$$).\n\nConvergence requires the \"small\" quantity $$x$$ to be raised to higher and higher powers, which only works if $$|x|<1$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_2", "judge_pick": false}, {"question": "For the expansion of $$(1+bx)^n$$ where $$n$$ is not a natural number, state the validity condition and explain why the condition changes from the $$(1+x)^n$$ case. (2 steps)", "answer": "- Step 1: The expansion of $$(1+bx)^n$$ is valid when $$|bx|<1$$, i.e., $$|x|<\\frac{1}{|b|}$$. This is because the formula is applied with $$bx$$ replacing $$x$$, so the convergence requirement $$|x|<1$$ from the standard formula becomes $$|bx|<1$$.\n- Step 2: The logic is a direct substitution: the general term becomes $$\\frac{n(n-1)\\ldots(n-r+1)}{r!}(bx)^r$$, and for convergence we need $$|bx|^r \\to 0$$, which requires $$|bx|<1$$. A larger $$|b|$$ means $$x$$ must be smaller to compensate ‚ÄĒ the \"effective\" variable is $$bx$$, not $$x$$ alone.\n\nThe validity window for $$x$$ shrinks as $$|b|$$ grows, because the \"true\" quantity being raised to high powers is $$bx$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_3", "judge_pick": false}, {"question": "When expanding $$(1-x)^{1/3}$$, the sign pattern of the coefficients is not simply \"alternating.\" Why? Walk through the sign logic carefully. (3 steps)", "answer": "- Step 1: We substitute $$n = \\frac{1}{3}$$ and replace $$x$$ with $$(-x)$$ in the formula. The general term is $$\\frac{n(n-1)\\ldots(n-r+1)}{r!}(-x)^r$$.\n- Step 2: The sign of each term comes from two sources: the coefficient $$\\frac{n(n-1)\\ldots(n-r+1)}{r!}$$ and the factor $$(-x)^r = (-1)^r x^r$$. For $$n = \\frac{1}{3}$$, the coefficient signs are: $$r=0$$: positive (1), $$r=1$$: positive ($$\\frac{1}{3}$$), $$r=2$$: negative ($$\\frac{1}{3} \\cdot (-\\frac{2}{3}) / 2$$), $$r=3$$: positive ($$\\frac{1}{3} \\cdot (-\\frac{2}{3}) \\cdot (-\\frac{5}{3}) / 6$$).\n- Step 3: Now multiply by $$(-1)^r$$ from $$(-x)^r$$: $$r=0$$: positive √ó 1 = positive; $$r=1$$: positive √ó (‚ąí1) = negative; $$r=2$$: negative √ó 1 = negative; $$r=3$$: positive √ó (‚ąí1) = negative. The total count of negative signs in each term determines the sign ‚ÄĒ you must count all negative factors from both the coefficient and the $$(-x)^r$$.\n\nDon't assume simple alternation ‚ÄĒ count the total number of negative factors in each term to determine its sign.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_4", "judge_pick": false}, {"question": "Expand $$(1+x)^{-1}$$ up to the $$x^3$$ term. Then explain: what well-known infinite sum is this, and how can you verify it by multiplying back? (3 steps)", "answer": "- Step 1: Substituting $$n=-1$$: $$(1+x)^{-1} = 1 + (-1)x + \\frac{(-1)(-2)}{2!}x^2 + \\frac{(-1)(-2)(-3)}{3!}x^3 + \\ldots = 1 - x + x^2 - x^3 + \\ldots$$\n- Step 2: This is the geometric series $$1 - x + x^2 - x^3 + \\ldots$$ with common ratio $$-x$$, which converges to $$\\frac{1}{1-(-x)} = \\frac{1}{1+x}$$ for $$|x|<1$$ ‚ÄĒ exactly matching $$(1+x)^{-1}$$.\n- Step 3: Verification by multiplication: $$(1+x)(1 - x + x^2 - x^3 + \\ldots) = 1 - x + x^2 - x^3 + x - x^2 + x^3 - \\ldots = 1 + 0 + 0 + 0 + \\ldots = 1$$. So the product is indeed 1, confirming the series equals $$\\frac{1}{1+x}$$.\n\nThe binomial expansion of $$(1+x)^{-1}$$ reproduces the geometric series ‚ÄĒ a satisfying consistency check.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_5", "judge_pick": true}, {"question": "To expand $$(a+bx)^n$$ using the binomial series, you must first rewrite it in the form $$a^n(1+\\text{something})^n$$. Why is this necessary, and what is the \"something\"? (2 steps)", "answer": "- Step 1: The binomial expansion formula applies only to expressions of the form $$(1+y)^n$$, where the first term inside the parentheses is 1. We cannot directly apply it to $$(a+bx)^n$$ because the first term is $$a$$, not 1. So we factor out $$a$$: $$(a+bx)^n = \\left(a\\left(1+\\frac{b}{a}x\\right)\\right)^n = a^n\\left(1+\\frac{b}{a}x\\right)^n$$.\n- Step 2: The \"something\" is $$\\frac{b}{a}x$$, which plays the role of the variable in the standard formula. Now we expand $$\\left(1+\\frac{b}{a}x\\right)^n$$ using the standard formula, and then multiply every term by $$a^n$$. The validity condition becomes $$\\left|\\frac{b}{a}x\\right|<1$$, i.e., $$|x|<\\left|\\frac{a}{b}\\right|$$.\n\nThe key insight: always rearrange to the form $$a^n \\times (1 + \\text{small thing})^n$$, then expand the bracket with 1 as the leading term.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_6", "judge_pick": false}, {"question": "When expanding $$(a+bx)^n$$, a common error is forgetting to multiply $$a^n$$ through every term. Conceptually, why does $$a^n$$ affect every term, not just the first? (2 steps)", "answer": "- Step 1: We write $$(a+bx)^n = a^n\\left(1+\\frac{b}{a}x\\right)^n$$. The factor $$a^n$$ multiplies the entire expression $$\\left(1+\\frac{b}{a}x\\right)^n$$, which expands to a sum of many terms. By the distributive law, $$a^n$$ must be distributed to each term in that sum.\n- Step 2: For example, if $$a^n = 4$$ and the expansion inside is $$1 - \\frac{3}{2}x + \\frac{3}{2}x^2 - \\ldots$$, then the full expansion is $$4 \\cdot 1 - 4 \\cdot \\frac{3}{2}x + 4 \\cdot \\frac{3}{2}x^2 - \\ldots = 4 - 6x + 6x^2 - \\ldots$$. Missing the $$a^n$$ factor on any term gives an incorrect coefficient.\n\n$$a^n$$ is a common factor outside the entire bracket ‚ÄĒ it scales every term equally, like a multiplier on the whole function.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_7", "judge_pick": true}, {"question": "Find the expansion of $$\\sqrt{4+x}$$ up to and including the $$x^3$$ term, and state the validity condition for $$x$$. Walk through the factoring step carefully. (4 steps)", "answer": "- Step 1: Rewrite in index form: $$\\sqrt{4+x} = (4+x)^{1/2}$$. Factor out 4: $$(4+x)^{1/2} = \\left(4\\left(1+\\frac{x}{4}\\right)\\right)^{1/2} = 4^{1/2}\\left(1+\\frac{x}{4}\\right)^{1/2} = 2\\left(1+\\frac{x}{4}\\right)^{1/2}$$.\n- Step 2: Now expand $$\\left(1+\\frac{x}{4}\\right)^{1/2}$$ with $$n=\\frac{1}{2}$$ and variable $$\\frac{x}{4}$$: $$1 + \\frac{1}{2}\\cdot\\frac{x}{4} + \\frac{\\frac{1}{2}(-\\frac{1}{2})}{2!}\\cdot\\frac{x^2}{16} + \\frac{\\frac{1}{2}(-\\frac{1}{2})(-\\frac{3}{2})}{3!}\\cdot\\frac{x^3}{64} + \\ldots$$\n- Step 3: Simplify coefficients: $$= 1 + \\frac{x}{8} + \\frac{(-\\frac{1}{4})}{2}\\cdot\\frac{x^2}{16} + \\frac{(\\frac{3}{8})}{6}\\cdot\\frac{x^3}{64} + \\ldots = 1 + \\frac{x}{8} - \\frac{x^2}{128} + \\frac{x^3}{1024} + \\ldots$$\n- Step 4: Multiply every term by 2: $$\\sqrt{4+x} = 2 + \\frac{x}{4} - \\frac{x^2}{64} + \\frac{x^3}{512} + \\ldots$$ Validity: $$\\left|\\frac{x}{4}\\right|<1$$, so $$|x|<4$$.\n\nThe factoring step is the crucial setup ‚ÄĒ get the \"1+\" form, expand, then scale every term by $$a^n$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_8", "judge_pick": false}, {"question": "For the expansion of $$(2+3x)^{-2}$$, the validity condition is $$|x|<\\frac{2}{3}$$. Derive this condition and explain why it is tighter than $$|x|<1$$. (2 steps)", "answer": "- Step 1: We write $$(2+3x)^{-2} = 2^{-2}\\left(1+\\frac{3x}{2}\\right)^{-2} = \\frac{1}{4}\\left(1+\\frac{3x}{2}\\right)^{-2}$$. The standard binomial expansion requires the variable inside to satisfy $$\\left|\\frac{3x}{2}\\right| < 1$$, which gives $$|x| < \\frac{2}{3}$$.\n- Step 2: The condition is tighter than $$|x|<1$$ because the \"effective variable\" is $$\\frac{3x}{2}$$, not $$x$$. The factor $$\\frac{3}{2} > 1$$ amplifies $$x$$, so $$x$$ must be smaller (less than $$\\frac{2}{3}$$) to keep the effective variable within the convergence radius of 1. In general, for $$(a+bx)^n$$, the validity is $$|x|<\\left|\\frac{a}{b}\\right|$$, and a larger $$|b/a|$$ means a tighter constraint on $$x$$.\n\nThe convergence radius for $$x$$ is $$\\left|\\frac{a}{b}\\right|$$ ‚ÄĒ the ratio of the constant term to the coefficient of $$x$$ inside the original bracket.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_9", "judge_pick": false}, {"question": "A student expands $$\\frac{1}{(1+4x)^2}$$ and states the validity condition as $$|x|<1$$. What is wrong, and what is the correct condition? (2 steps)", "answer": "- Step 1: The student has forgotten that the variable in the binomial expansion is not $$x$$ but $$4x$$. The expression is $$(1+4x)^{-2}$$, so the expansion replaces $$x$$ with $$4x$$ in the standard formula. The convergence condition requires $$|4x|<1$$, not $$|x|<1$$.\n- Step 2: Solving $$|4x|<1$$ gives $$|x|<\\frac{1}{4}$$. This is a much tighter condition ‚ÄĒ the expansion is only valid for $$x$$ in the interval $$(-\\frac{1}{4}, \\frac{1}{4})$$, not $$(-1, 1)$$. Using $$x=0.5$$, for instance, would give a divergent series even though $$|0.5|<1$$.\n\nAlways check: the validity condition is $$|bx|<1$$ for $$(1+bx)^n$$, not $$|x|<1$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_10", "judge_pick": true}, {"question": "When expanding $$\\frac{1}{(2-x)^{-1}}$$, a student writes this as $$(2-x)^{-1}$$ and factors out 2 to get $$2^{-1}(1-\\frac{x}{2})^{-1}$$. They then expand $$(1-\\frac{x}{2})^{-1}$$ with $$n=-1$$ and variable $$\\frac{x}{2}$$. What is the validity condition, and what sign does the $$x$$ term have? (3 steps)", "answer": "- Step 1: The expression inside is $$\\left(1 + \\left(-\\frac{x}{2}\\right)\\right)^{-1}$$. The \"variable\" in the binomial formula is $$y = -\\frac{x}{2}$$. The validity condition is $$|y|<1$$, i.e., $$\\left|-\\frac{x}{2}\\right|<1$$, which gives $$|x|<2$$.\n- Step 2: Now expand: $$(1+y)^{-1} = 1 - y + y^2 - y^3 + \\ldots$$ where $$y = -\\frac{x}{2}$$. So $$(1-\\frac{x}{2})^{-1} = 1 - (-\\frac{x}{2}) + (-\\frac{x}{2})^2 - (-\\frac{x}{2})^3 + \\ldots = 1 + \\frac{x}{2} + \\frac{x^2}{4} + \\frac{x^3}{8} + \\ldots$$\n- Step 3: The $$x$$ term is positive ($$+\\frac{x}{2}$$) because the double negative ‚ÄĒ the minus sign in the formula and the minus sign in $$y = -\\frac{x}{2}$$ ‚ÄĒ cancel. Multiplying by $$2^{-1} = \\frac{1}{2}$$: the full expansion is $$\\frac{1}{2} + \\frac{x}{4} + \\frac{x^2}{8} + \\frac{x^3}{16} + \\ldots$$\n\nAll signs are positive here ‚ÄĒ the negative argument and negative index interact to produce no sign alternation.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_11", "judge_pick": false}, {"question": "Why do we use partial fractions before expanding a complex rational expression like $$\\frac{4-5x}{(1+x)(2-x)}$$? What advantage does this give over trying to expand directly? (3 steps)", "answer": "- Step 1: The expression $$\\frac{4-5x}{(1+x)(2-x)}$$ is not in the form $$(1+\\text{something})^n$$ ‚ÄĒ it's a quotient with a product in the denominator. There's no direct way to apply the binomial expansion to this as a single expression.\n- Step 2: Partial fractions decompose it into simpler pieces: $$\\frac{4-5x}{(1+x)(2-x)} = \\frac{3}{1+x} - \\frac{2}{2-x} = 3(1+x)^{-1} - 2(2-x)^{-1}$$. Each piece is now in a form $$(a+bx)^n$$ that we can expand individually using the binomial formula.\n- Step 3: After expanding each piece separately, we combine (add/subtract) the resulting series. This is far more manageable than attempting a direct expansion, which would require expanding $$(1+x)^{-1}$$ and $$(2-x)^{-1}$$ separately anyway ‚ÄĒ partial fractions just formalises and organises this process.\n\nPartial fractions turn one hard problem into two (or more) easy problems that we already know how to solve.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_12", "judge_pick": false}, {"question": "After splitting $$\\frac{4-5x}{(1+x)(2-x)}$$ into $$\\frac{3}{1+x} - \\frac{2}{2-x}$$, you expand each part and find that $$\\frac{3}{1+x}$$ requires $$|x|<1$$ and $$\\frac{2}{2-x}$$ requires $$|x|<2$$. What is the overall validity condition for the combined expansion? (2 steps)", "answer": "- Step 1: The combined expansion is the sum of two series. For the sum to be valid, both individual series must converge. $$\\frac{3}{1+x} = 3(1+x)^{-1}$$ requires $$|x|<1$$. $$\\frac{2}{2-x} = 2(2-x)^{-1} = (1-\\frac{x}{2})^{-1}$$ requires $$\\left|\\frac{x}{2}\\right|<1$$, i.e., $$|x|<2$$.\n- Step 2: Both conditions must hold simultaneously. The intersection of $$|x|<1$$ and $$|x|<2$$ is $$|x|<1$$ (the stricter condition). So the overall expansion is valid for $$|x|<1$$.\n\nWhen combining expansions from partial fractions, the overall validity is the intersection of all individual validity conditions ‚ÄĒ the most restrictive one wins.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_13", "judge_pick": false}, {"question": "When expanding $$\\frac{2}{2-x}$$ as part of a partial fractions problem, you write it as $$2(2-x)^{-1}$$. Show the factoring step and the first three terms of the expansion. (3 steps)", "answer": "- Step 1: Write $$2(2-x)^{-1} = 2\\left(2\\left(1-\\frac{x}{2}\\right)\\right)^{-1} = 2 \\cdot 2^{-1}\\left(1-\\frac{x}{2}\\right)^{-1} = 1 \\cdot \\left(1-\\frac{x}{2}\\right)^{-1}$$.\n- Step 2: Expand $$\\left(1-\\frac{x}{2}\\right)^{-1}$$ with $$n=-1$$ and variable $$-\\frac{x}{2}$$: $$1 + (-1)\\left(-\\frac{x}{2}\\right) + \\frac{(-1)(-2)}{2!}\\left(-\\frac{x}{2}\\right)^2 + \\ldots = 1 + \\frac{x}{2} + \\frac{x^2}{4} + \\frac{x^3}{8} + \\ldots$$\n- Step 3: Multiply by the outside factor of 1 (which was $$2 \\cdot 2^{-1}$$): the expansion is simply $$1 + \\frac{x}{2} + \\frac{x^2}{4} + \\frac{x^3}{8} + \\ldots$$ Validity: $$\\left|\\frac{x}{2}\\right|<1$$, so $$|x|<2$$.\n\nThe factoring step produces a clean coefficient of 1 outside, making the multiplication trivial.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_14", "judge_pick": false}, {"question": "Given $$f(x) = \\frac{2+x}{\\sqrt{1+5x}}$$, you need to find the $$x^2$$ term. Explain the strategy: why can't you expand this as a single binomial, and what two-step approach do you use instead? (3 steps)", "answer": "- Step 1: The expression is a product $$(2+x)(1+5x)^{-1/2}$$, not a single binomial. The numerator $$2+x$$ prevents direct application of the binomial formula to the whole expression.\n- Step 2: Strategy ‚ÄĒ expand the binomial part $$(1+5x)^{-1/2}$$ first, then multiply the result by $$(2+x)$$. Expanding: $$(1+5x)^{-1/2} = 1 - \\frac{5}{2}x + \\frac{75}{8}x^2 - \\frac{625}{16}x^3 + \\ldots$$\n- Step 3: Now multiply: $$(2+x)\\left(1 - \\frac{5}{2}x + \\frac{75}{8}x^2 - \\ldots\\right)$$. The $$x^2$$ term arises from two contributions: $$2 \\times \\frac{75}{8}x^2 = \\frac{75}{4}x^2$$ (constant from first bracket √ó $$x^2$$ from second) and $$x \\times \\left(-\\frac{5}{2}x\\right) = -\\frac{5}{2}x^2$$ ($$x$$ from first √ó $$x$$ from second). Total: $$\\frac{75}{4} - \\frac{5}{2} = \\frac{65}{4}$$.\n\nWhen a polynomial multiplies a binomial expansion, collect like terms from all cross-products that give the desired power of $$x$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_15", "judge_pick": false}, {"question": "In the expansion of $$(1+kx)^{-4}$$, the coefficient of $$x$$ is 20. Find $$k$$ by setting up the equation from the expansion, without doing heavy arithmetic. (3 steps)", "answer": "- Step 1: Write the expansion: $$(1+kx)^{-4} = 1 + (-4)(kx) + \\frac{(-4)(-5)}{2!}(kx)^2 + \\ldots = 1 - 4kx + 10k^2x^2 + \\ldots$$\n- Step 2: The coefficient of $$x$$ is $$-4k$$. We're told this equals 20, so $$-4k = 20$$, giving $$k = -5$$.\n- Step 3: Check: with $$k = -5$$, the coefficient of $$x^2$$ would be $$10k^2 = 10(25) = 250$$, which is positive (since the $$k^2$$ removes the sign). The key insight is that the coefficient of $$x$$ is simply $$nk$$ (with $$n=-4$$), making it straightforward to solve.\n\nFor the linear term, the coefficient is always $$nk$$ ‚ÄĒ the simplest coefficient to extract and solve for unknowns.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_16", "judge_pick": false}, {"question": "When $$(1+ax)^{1/2}$$ is expanded, the coefficient of $$x^2$$ is $$-2$$. Find the possible values of $$a$$ by setting up the relevant equation. (3 steps)", "answer": "- Step 1: Expand $$(1+ax)^{1/2} = 1 + \\frac{1}{2}(ax) + \\frac{\\frac{1}{2}(-\\frac{1}{2})}{2!}(ax)^2 + \\ldots = 1 + \\frac{a}{2}x + \\frac{-\\frac{1}{4}}{2}a^2x^2 + \\ldots = 1 + \\frac{a}{2}x - \\frac{a^2}{8}x^2 + \\ldots$$\n- Step 2: The coefficient of $$x^2$$ is $$-\\frac{a^2}{8}$$. Set this equal to $$-2$$: $$-\\frac{a^2}{8} = -2$$, so $$a^2 = 16$$, giving $$a = 4$$ or $$a = -4$$.\n- Step 3: Both values are valid ‚ÄĒ the coefficient of $$x^2$$ depends on $$a^2$$, so both signs of $$a$$ give the same $$x^2$$ coefficient. However, the $$x$$ coefficient ($$\\frac{a}{2}$$) would differ: $$+2$$ for $$a=4$$ and $$-2$$ for $$a=-4$$.\n\nThe $$x^2$$ coefficient involves $$a^2$$, so two values of $$a$$ can produce the same $$x^2$$ coefficient ‚ÄĒ always check for both signs.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_17", "judge_pick": false}, {"question": "You want to approximate $$\\sqrt{2}$$ using the expansion of $$\\sqrt{1-2x}$$ with $$x=0.01$$. Explain the strategy: how does substituting a small $$x$$ value connect to $$\\sqrt{2}$$? (3 steps)", "answer": "- Step 1: The expansion gives $$\\sqrt{1-2x} \\approx 1 - x - \\frac{x^2}{2} - \\frac{x^3}{2} + \\ldots$$ for small $$x$$. With $$x=0.01$$: $$\\sqrt{1-0.02} = \\sqrt{0.98} \\approx 1 - 0.01 - 0.00005 - 0.0000005 = 0.9899495$$.\n- Step 2: Now connect to $$\\sqrt{2}$$: $$0.98 = \\frac{98}{100} = \\frac{49 \\times 2}{100} = \\frac{7^2 \\times 2}{100}$$. So $$\\sqrt{0.98} = \\frac{7\\sqrt{2}}{10}$$.\n- Step 3: Therefore $$\\frac{7\\sqrt{2}}{10} \\approx 0.9899495$$, giving $$\\sqrt{2} \\approx \\frac{0.9899495 \\times 10}{7} \\approx 1.414213571$$. This is accurate to 7 decimal places because $$x=0.01$$ is very small, making the truncated terms negligible.\n\nThe trick is choosing $$x$$ so that the exact value involves the surd you want, then algebraically extracting it.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_18", "judge_pick": false}, {"question": "When using a binomial expansion to approximate a value, why is the percentage error smaller for smaller values of $$x$$? Give a qualitative explanation. (2 steps)", "answer": "- Step 1: The binomial expansion is a truncation of an infinite series. The error comes from the terms we omit ‚ÄĒ the \"tail\" starting at the first omitted term. The first omitted term (say the $$x^4$$ term) has magnitude proportional to $$|x|^4$$, the next to $$|x|^5$$, etc.\n- Step 2: When $$|x|$$ is small (like 0.01), $$|x|^4 = 10^{-8}$$ is extremely tiny, and subsequent terms are even smaller. The truncation error is dominated by the first omitted term, which shrinks rapidly as $$|x|$$ decreases. For larger $$|x|$$ (like 0.5), the omitted terms are much more significant, leading to larger percentage error.\n\nSmaller $$x$$ means higher powers of $$x$$ die faster, so the truncated series better approximates the true value.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_19", "judge_pick": true}, {"question": "A student wants to use the expansion of $$(1-2x)^{-1}$$ to estimate a value at $$x = 0.6$$. Explain why this is invalid. (2 steps)", "answer": "- Step 1: The expansion of $$(1-2x)^{-1}$$ is valid when $$|2x|<1$$, i.e., $$|x|<\\frac{1}{2}$$. The value $$x=0.6$$ violates this condition since $$0.6 > 0.5$$.\n- Step 2: At $$x=0.6$$, the effective variable is $$2(0.6) = 1.2 > 1$$. The series terms grow in magnitude rather than shrinking, so the partial sums diverge from the true value. Using the expansion here would give a meaningless result, not an approximation.\n\nAlways verify the validity condition before substituting ‚ÄĒ if $$x$$ is outside the convergence interval, the expansion gives nonsense.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_20", "judge_pick": false}, {"question": "For the expression $$\\frac{1}{(2+3x)^2}$$, show the complete factoring and setup for the binomial expansion, and state the validity condition. (4 steps)", "answer": "- Step 1: Write in index form: $$(2+3x)^{-2}$$.\n- Step 2: Factor out 2: $$\\left(2\\left(1+\\frac{3x}{2}\\right)\\right)^{-2} = 2^{-2}\\left(1+\\frac{3x}{2}\\right)^{-2} = \\frac{1}{4}\\left(1+\\frac{3x}{2}\\right)^{-2}$$.\n- Step 3: Now expand $$\\left(1+\\frac{3x}{2}\\right)^{-2}$$ with $$n=-2$$ and variable $$\\frac{3x}{2}$$: $$1 + (-2)\\frac{3x}{2} + \\frac{(-2)(-3)}{2!}\\left(\\frac{3x}{2}\\right)^2 + \\frac{(-2)(-3)(-4)}{3!}\\left(\\frac{3x}{2}\\right)^3 + \\ldots = 1 - 3x + \\frac{27}{4}x^2 - \\frac{27}{2}x^3 + \\ldots$$\n- Step 4: Multiply every term by $$\\frac{1}{4}$$: $$\\frac{1}{4} - \\frac{3}{4}x + \\frac{27}{16}x^2 - \\frac{27}{8}x^3 + \\ldots$$ Validity: $$\\left|\\frac{3x}{2}\\right|<1$$, so $$|x|<\\frac{2}{3}$$.\n\nThe outside factor $$\\frac{1}{4}$$ scales every coefficient ‚ÄĒ don't forget it.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_21", "judge_pick": false}, {"question": "The first three terms in the expansion of $$\\frac{1}{\\sqrt{a+bx}}$$ are given as $$3 + \\frac{1}{3}x + \\frac{1}{18}x^2 + \\ldots$$. Find $$a$$ and $$b$$ by matching coefficients. (3 steps)", "answer": "- Step 1: Write $$\\frac{1}{\\sqrt{a+bx}} = (a+bx)^{-1/2} = a^{-1/2}\\left(1+\\frac{b}{a}x\\right)^{-1/2}$$. The constant term is $$a^{-1/2}$$, which must equal 3, so $$a^{-1/2} = 3$$, giving $$a = \\frac{1}{9}$$.\n- Step 2: The $$x$$ term is $$a^{-1/2} \\cdot \\left(-\\frac{1}{2}\\right) \\cdot \\frac{b}{a} \\cdot x = 3 \\cdot \\left(-\\frac{1}{2}\\right) \\cdot \\frac{b}{1/9} \\cdot x = 3 \\cdot \\left(-\\frac{b}{2}\\right) \\cdot 9 \\cdot x = -\\frac{27b}{2}x$$. This must equal $$\\frac{1}{3}x$$, so $$-\\frac{27b}{2} = \\frac{1}{3}$$, giving $$b = -\\frac{2}{81}$$.\n- Step 3: Verify with the $$x^2$$ term: the coefficient should be $$a^{-1/2} \\cdot \\frac{(-\\frac{1}{2})(-\\frac{3}{2})}{2!} \\cdot \\left(\\frac{b}{a}\\right)^2 = 3 \\cdot \\frac{3}{8} \\cdot \\left(\\frac{-2/81}{1/9}\\right)^2 = 3 \\cdot \\frac{3}{8} \\cdot \\left(-\\frac{2}{9}\\right)^2 = 3 \\cdot \\frac{3}{8} \\cdot \\frac{4}{81} = \\frac{1}{18}$$. This matches, confirming our values.\n\nMatching coefficients systematically ‚ÄĒ start from the constant term and work outward.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_22", "judge_pick": false}, {"question": "Expand $$\\frac{1}{\\sqrt{5+2x}}$$ up to the $$x^2$$ term, giving coefficients in simplified surd form. State the validity. (4 steps)", "answer": "- Step 1: Write as $$(5+2x)^{-1/2} = 5^{-1/2}\\left(1+\\frac{2x}{5}\\right)^{-1/2} = \\frac{1}{\\sqrt{5}}\\left(1+\\frac{2x}{5}\\right)^{-1/2}$$.\n- Step 2: Expand $$\\left(1+\\frac{2x}{5}\\right)^{-1/2}$$: $$1 + \\left(-\\frac{1}{2}\\right)\\frac{2x}{5} + \\frac{(-\\frac{1}{2})(-\\frac{3}{2})}{2!}\\left(\\frac{2x}{5}\\right)^2 + \\ldots = 1 - \\frac{x}{5} + \\frac{3}{2} \\cdot \\frac{1}{2} \\cdot \\frac{4x^2}{25} + \\ldots = 1 - \\frac{x}{5} + \\frac{3x^2}{25} + \\ldots$$\n- Step 3: Multiply by $$\\frac{1}{\\sqrt{5}}$$: $$\\frac{1}{\\sqrt{5+2x}} = \\frac{1}{\\sqrt{5}} - \\frac{x}{5\\sqrt{5}} + \\frac{3x^2}{25\\sqrt{5}} + \\ldots$$\n- Step 4: Validity: $$\\left|\\frac{2x}{5}\\right| < 1$$, so $$|x| < \\frac{5}{2}$$.\n\nSurd form means leaving $$\\sqrt{5}$$ as-is rather than converting to decimals ‚ÄĒ exact form is preferred.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_23", "judge_pick": false}, {"question": "Given your expansion of $$\\frac{1}{\\sqrt{5+2x}}$$, find the first three terms in the expansion of $$\\frac{2x-1}{\\sqrt{5+2x}}$$. (3 steps)", "answer": "- Step 1: We have $$\\frac{2x-1}{\\sqrt{5+2x}} = (2x-1) \\cdot \\frac{1}{\\sqrt{5+2x}} = (2x-1)\\left(\\frac{1}{\\sqrt{5}} - \\frac{x}{5\\sqrt{5}} + \\frac{3x^2}{25\\sqrt{5}} + \\ldots\\right)$$.\n- Step 2: Multiply out, collecting terms by power of $$x$$:\n+ Constant term: $$(-1) \\cdot \\frac{1}{\\sqrt{5}} = -\\frac{1}{\\sqrt{5}}$$\n+ $$x$$ term: $$(-1)\\left(-\\frac{x}{5\\sqrt{5}}\\right) + 2x \\cdot \\frac{1}{\\sqrt{5}} = \\frac{x}{5\\sqrt{5}} + \\frac{2x}{\\sqrt{5}} = \\frac{x + 10x}{5\\sqrt{5}} = \\frac{11x}{5\\sqrt{5}}$$\n+ $$x^2$$ term: $$(-1) \\cdot \\frac{3x^2}{25\\sqrt{5}} + 2x \\cdot \\left(-\\frac{x}{5\\sqrt{5}}\\right) = -\\frac{3x^2}{25\\sqrt{5}} - \\frac{2x^2}{5\\sqrt{5}} = -\\frac{3x^2 + 10x^2}{25\\sqrt{5}} = -\\frac{13x^2}{25\\sqrt{5}}$$\n- Step 3: Result: $$\\frac{2x-1}{\\sqrt{5+2x}} = -\\frac{1}{\\sqrt{5}} + \\frac{11x}{5\\sqrt{5}} - \\frac{13x^2}{25\\sqrt{5}} + \\ldots$$\n\nMultiply the polynomial by the series term-by-term, then collect like powers of $$x$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_24", "judge_pick": false}, {"question": "To expand $$(16-3x)^{1/4}$$, you factor out 16. Show the setup and the first three terms. Why is $$x = \\frac{1}{10}$$ a valid choice for approximating $$\\sqrt[4]{15.7}$$? (4 steps)", "answer": "- Step 1: $$(16-3x)^{1/4} = 16^{1/4}\\left(1-\\frac{3x}{16}\\right)^{1/4} = 2\\left(1-\\frac{3x}{16}\\right)^{1/4}$$.\n- Step 2: Expand $$\\left(1-\\frac{3x}{16}\\right)^{1/4}$$: $$1 + \\frac{1}{4}\\left(-\\frac{3x}{16}\\right) + \\frac{\\frac{1}{4}(-\\frac{3}{4})}{2!}\\left(-\\frac{3x}{16}\\right)^2 + \\ldots = 1 - \\frac{3x}{64} - \\frac{3}{4}\\cdot\\frac{1}{2}\\cdot\\frac{9x^2}{256} + \\ldots = 1 - \\frac{3x}{64} - \\frac{27x^2}{8192} + \\ldots$$\n- Step 3: Multiply by 2: $$(16-3x)^{1/4} = 2 - \\frac{3x}{32} - \\frac{27x^2}{4096} + \\ldots$$ Validity: $$\\left|\\frac{3x}{16}\\right|<1$$, so $$|x|<\\frac{16}{3}$$.\n- Step 4: For $$\\sqrt[4]{15.7}$$: set $$16 - 3x = 15.7$$, so $$3x = 0.3$$, $$x = 0.1$$. Check: $$0.1 < \\frac{16}{3} \\approx 5.33$$, so valid. Substituting: $$\\approx 2 - \\frac{0.3}{32} - \\frac{0.27}{4096} \\approx 2 - 0.009375 - 0.000066 \\approx 1.99056$$.\n\nChoose $$x$$ so that $$(a+bx)$$ equals your target value, then verify $$x$$ is within the validity range.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_25", "judge_pick": false}, {"question": "When expanding $$\\frac{3+2x-x^2}{4-x}$$, a student tries to use partial fractions. What's a simpler approach, and why does it work? (3 steps)", "answer": "- Step 1: Observe that the degree of the numerator (2) is not less than the degree of the denominator (1). We should first perform polynomial division: $$\\frac{3+2x-x^2}{4-x}$$. Dividing: $$-x^2+2x+3$$ by $$-x+4$$ gives quotient $$x+2$$ with remainder $$-5$$, so $$\\frac{3+2x-x^2}{4-x} = x + 2 - \\frac{5}{4-x}$$.\n- Step 2: Alternatively (and more simply for small $$x$$): write $$\\frac{3+2x-x^2}{4-x} = (3+2x-x^2)(4-x)^{-1} = (3+2x-x^2) \\cdot \\frac{1}{4}(1-\\frac{x}{4})^{-1}$$. Expand $$(1-\\frac{x}{4})^{-1}$$ and multiply through.\n- Step 3: Using the second approach: $$\\frac{1}{4}(1-\\frac{x}{4})^{-1} = \\frac{1}{4}(1 + \\frac{x}{4} + \\frac{x^2}{16} + \\ldots) = \\frac{1}{4} + \\frac{x}{16} + \\frac{x^2}{64} + \\ldots$$ Multiply by $$(3+2x-x^2)$$ and collect terms to get $$\\frac{3}{4} + \\frac{11}{16}x - \\frac{5}{64}x^2 + \\ldots$$\n\nFor a polynomial times a binomial expansion, just expand the binomial part and multiply ‚ÄĒ no partial fractions needed.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_26", "judge_pick": false}, {"question": "A rational function has numerator of degree ‚Č• denominator degree (an improper fraction). Before expanding using partial fractions, what must you do first, and why? (2 steps)", "answer": "- Step 1: You must perform algebraic division first to write the expression as a polynomial plus a proper fraction (where the numerator degree is strictly less than the denominator degree). For example, $$\\frac{2x^2+7x-6}{(x+5)(x-4)} = \\frac{2x^2+7x-6}{x^2+x-20}$$. Dividing gives quotient 2 with remainder $$5x+34$$, so the expression equals $$2 + \\frac{5x+34}{(x+5)(x-4)}$$.\n- Step 2: The partial fraction method requires the fraction to be proper. The polynomial part (the \"2\" above) is already a simple term in the expansion ‚ÄĒ it contributes a constant. The proper fraction part can then be split into partial fractions and each expanded individually. Without division, the partial fraction decomposition would have the wrong form.\n\nAlways check degrees first: if numerator degree ‚Č• denominator degree, divide first, then decompose the remainder.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_27", "judge_pick": false}, {"question": "For $$\\frac{3x^2+4x-5}{(x+3)(x-2)}$$, the partial fraction form includes a constant $$A$$ separate from the fractions: $$A + \\frac{B}{x+3} + \\frac{C}{x-2}$$. Why is the constant $$A$$ needed here? (2 steps)", "answer": "- Step 1: The numerator $$3x^2+4x-5$$ has degree 2, while the denominator $$(x+3)(x-2) = x^2+x-6$$ also has degree 2. Since the degrees are equal, the partial fraction decomposition requires a constant term $$A$$ (the quotient from division) plus proper fractions.\n- Step 2: Performing the division: $$\\frac{3x^2+4x-5}{x^2+x-6} = 3 + \\frac{3x^2+4x-5 - 3(x^2+x-6)}{x^2+x-6} = 3 + \\frac{x+13}{(x+3)(x-2)}$$. So $$A=3$$, and the remaining proper fraction $$\\frac{x+13}{(x+3)(x-2)}$$ is then split into $$\\frac{B}{x+3} + \\frac{C}{x-2}$$.\n\nWhen numerator and denominator have the same degree, the \"whole part\" is a constant, not a higher-degree polynomial.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_28", "judge_pick": false}, {"question": "For the expansion of $$\\frac{A}{2x-1}$$, a student writes this as $$A(2x-1)^{-1}$$ and tries to expand directly. What's wrong, and how should it be rewritten? (2 steps)", "answer": "- Step 1: The binomial expansion requires the form $$(1+\\text{something})^n$$, where the constant term inside the bracket is 1. But $$(2x-1)^{-1}$$ has the constant term $$-1$$, not 1, and the variable term comes first.\n- Step 2: Rewrite: $$\\frac{A}{2x-1} = A(2x-1)^{-1} = A\\left(-1(1-2x)\\right)^{-1} = A \\cdot (-1)^{-1}(1-2x)^{-1} = -A(1-2x)^{-1}$$. Now expand $$(1-2x)^{-1}$$ with variable $$-2x$$, validity $$|2x|<1$$ i.e. $$|x|<\\frac{1}{2}$$. The negative sign from $$(-1)^{-1}$$ is crucial ‚ÄĒ forgetting it flips the sign of every term.\n\nAlways rearrange so the constant term is +1 (not -1), factoring out negatives carefully.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_29", "judge_pick": true}, {"question": "For the expansion of $$\\frac{B}{(2x-1)^2}$$, show how to rewrite it in the standard form $$(1+\\text{something})^n$$ and state the validity condition. (3 steps)", "answer": "- Step 1: Write $$\\frac{B}{(2x-1)^2} = B(2x-1)^{-2}$$. We need the constant term inside to be 1, so factor out $$-1$$: $$B(-1+2x)^{-2} = B\\left(-1(1-2x)\\right)^{-2} = B \\cdot (-1)^{-2}(1-2x)^{-2} = B(1-2x)^{-2}$$.\n- Step 2: Since $$(-1)^{-2} = 1$$ (even power), the sign is preserved. Now expand $$(1-2x)^{-2}$$ with $$n=-2$$ and variable $$-2x$$: $$1 + (-2)(-2x) + \\frac{(-2)(-3)}{2!}(-2x)^2 + \\ldots = 1 + 4x + 12x^2 + \\ldots$$\n- Step 3: Multiply by $$B$$: $$B + 4Bx + 12Bx^2 + \\ldots$$ Validity: $$|2x|<1$$, so $$|x|<\\frac{1}{2}$$.\n\nFor even powers of $$(2x-1)$$, the factored-out $$(-1)$$ disappears since $$(-1)^{\\text{even}} = 1$$. For odd powers, it contributes a minus sign.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_30", "judge_pick": true}, {"question": "Given $$f(x) = \\frac{2x^2+5x+11}{(2x-1)^2(x+1)}$$, the partial fraction form is $$\\frac{A}{2x-1} + \\frac{B}{(2x-1)^2} + \\frac{C}{x+1}$$. Why is there a separate term $$\\frac{B}{(2x-1)^2}$$? (2 steps)", "answer": "- Step 1: The denominator has a repeated linear factor $$(2x-1)^2$$. The rule for partial fractions states that a repeated factor of degree 2 requires two terms: one with the factor to the first power $$\\frac{A}{2x-1}$$ and one with the factor to the second power $$\\frac{B}{(2x-1)^2}$$.\n- Step 2: This ensures the decomposition has enough degrees of freedom. The original fraction has a denominator of degree 3, so we need 3 unknowns ($$A$$, $$B$$, $$C$$) to match. Without the $$\\frac{B}{(2x-1)^2}$$ term, we'd only have 2 unknowns for 3 conditions, which is insufficient.\n\nA repeated factor $$(ax+b)^k$$ requires $$k$$ separate terms in the partial fraction decomposition, with denominators $$(ax+b)$$, $$(ax+b)^2$$, ..., $$(ax+b)^k$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_31", "judge_pick": false}, {"question": "When combining expansions from partial fractions, you found that one part requires $$|x|<\\frac{1}{2}$$ and another requires $$|x|<1$$. A third part requires $$|x|<\\frac{1}{3}$$. What is the overall validity condition, and why? (2 steps)", "answer": "- Step 1: Each partial fraction expands into an infinite series that converges only within its own validity interval. The combined expansion (sum of all series) is valid only where ALL individual series converge simultaneously.\n- Step 2: The intersection of $$|x|<\\frac{1}{2}$$, $$|x|<1$$, and $$|x|<\\frac{1}{3}$$ is $$|x|<\\frac{1}{3}$$ ‚ÄĒ the most restrictive condition. Any $$x$$ with $$\\frac{1}{3} \\leq |x| < \\frac{1}{2}$$ would make the third series diverge, corrupting the entire sum even if the other two series still converge.\n\nThe overall validity is the intersection (most restrictive) of all individual validity conditions.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_32", "judge_pick": false}, {"question": "Show that if $$x$$ is small, $$\\sqrt{\\frac{1+x}{1-x}}$$ can be approximated by $$1+x+\\frac{1}{2}x^2$$. Walk through the key steps. (4 steps)", "answer": "- Step 1: Write $$\\sqrt{\\frac{1+x}{1-x}} = (1+x)^{1/2}(1-x)^{-1/2}$$. We expand each factor separately.\n- Step 2: $$(1+x)^{1/2} = 1 + \\frac{1}{2}x + \\frac{\\frac{1}{2}(-\\frac{1}{2})}{2!}x^2 + \\ldots = 1 + \\frac{x}{2} - \\frac{x^2}{8} + \\ldots$$\n- Step 3: $$(1-x)^{-1/2} = 1 + (-\\frac{1}{2})(-x) + \\frac{(-\\frac{1}{2})(-\\frac{3}{2})}{2!}(-x)^2 + \\ldots = 1 + \\frac{x}{2} + \\frac{3x^2}{8} + \\ldots$$\n- Step 4: Multiply: $$(1+\\frac{x}{2}-\\frac{x^2}{8}+\\ldots)(1+\\frac{x}{2}+\\frac{3x^2}{8}+\\ldots)$$. Constant: 1. $$x$$ term: $$\\frac{x}{2}+\\frac{x}{2} = x$$. $$x^2$$ term: $$\\frac{3x^2}{8} + \\frac{x}{2}\\cdot\\frac{x}{2} - \\frac{x^2}{8} = \\frac{3}{8}x^2 + \\frac{1}{4}x^2 - \\frac{1}{8}x^2 = \\frac{3+2-1}{8}x^2 = \\frac{1}{2}x^2$$. Result: $$1 + x + \\frac{1}{2}x^2 + \\ldots$$\n\nFor products of binomial expansions, expand each to sufficient order, then multiply and collect like terms.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_33", "judge_pick": false}, {"question": "The expression $$h(x) = \\frac{6}{1+5x} - \\frac{4}{1-3x}$$. Explain why it's not valid to use the expansion to find $$h(0.5)$$, even though each individual expansion might seem to have some validity range. (2 steps)", "answer": "- Step 1: For $$\\frac{6}{1+5x}$$, the validity is $$|5x|<1$$, so $$|x|<\\frac{1}{5}=0.2$$. For $$\\frac{4}{1-3x}$$, the validity is $$|3x|<1$$, so $$|x|<\\frac{1}{3}\\approx 0.333$$.\n- Step 2: The overall validity is $$|x|<0.2$$ (the stricter condition). Since $$x=0.5 > 0.2$$, the first series diverges at this point. Even though the second series would still converge at $$x=0.5$$ (since $$0.5 < \\frac{1}{3}$$ is false ‚ÄĒ actually $$0.5 > 0.333$$), BOTH series diverge. The expansion cannot be used.\n\nBoth validity conditions are violated at $$x=0.5$$ ‚ÄĒ the expansion gives meaningless results outside its convergence interval.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_34", "judge_pick": true}, {"question": "The challenge problem gives $$h(x) = \\left(1+\\frac{1}{x}\\right)^{-1/2}$$ with $$|x|>1$$. How do you expand this, given that the standard binomial expansion requires the variable part to be small? (3 steps)", "answer": "- Step 1: Rewrite: $$\\left(1+\\frac{1}{x}\\right)^{-1/2}$$. The variable here is $$\\frac{1}{x}$$, not $$x$$. The condition $$|x|>1$$ ensures $$\\left|\\frac{1}{x}\\right|<1$$, which is exactly what we need for convergence.\n- Step 2: Expand with $$n=-\\frac{1}{2}$$ and variable $$\\frac{1}{x}$$: $$1 + (-\\frac{1}{2})\\frac{1}{x} + \\frac{(-\\frac{1}{2})(-\\frac{3}{2})}{2!}\\frac{1}{x^2} + \\ldots = 1 - \\frac{1}{2x} + \\frac{3}{8x^2} - \\ldots$$\n- Step 3: This is an expansion in descending powers of $$x$$ (i.e., in powers of $$\\frac{1}{x}$$), valid for large $$|x|$$. When $$x=9$$: $$h(9) = \\left(1+\\frac{1}{9}\\right)^{-1/2} = \\left(\\frac{10}{9}\\right)^{-1/2} = \\frac{3}{\\sqrt{10}} = \\frac{3\\sqrt{10}}{10}$$, and the expansion gives $$1 - \\frac{1}{18} + \\frac{3}{648} \\approx 0.949...$$\n\nFor large $$|x|$$, expand in powers of $$\\frac{1}{x}$$ ‚ÄĒ the binomial expansion adapts to whatever variable is \"small.\"", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_35", "judge_pick": true}, {"question": "Conceptual synthesis: The expansion of $$(1+x)^n$$ for integer $$n$$ is exact (finite), while for non-integer $$n$$ it's an approximation (infinite, truncated). Does this mean the integer-$$n$$ expansion has no validity restriction on $$x$$? Why or why not? (2 steps)", "answer": "- Step 1: For integer $$n$$, the expansion $$(1+x)^n = \\sum_{r=0}^{n}\\binom{n}{r}x^r$$ is a polynomial identity ‚ÄĒ it holds for ALL values of $$x$$, not just $$|x|<1$$. This is because a finite sum doesn't have convergence issues; there's no infinite tail that could diverge.\n- Step 2: For non-integer $$n$$, the expansion is an infinite series that only converges (equals the function) when $$|x|<1$$. Outside this range, the series diverges and the equality breaks down entirely. The validity restriction $$|x|<1$$ is purely a convergence issue, which only arises for infinite series.\n\nFinite polynomial = exact for all $$x$$. Infinite series = valid only where it converges. The $$|x|<1$$ restriction is a consequence of infinity, not of the binomial theorem itself.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_36", "judge_pick": true}, {"question": "A student expands $$(1+9x)^{2/3}$$ and uses it to estimate $$(1.45)^{2/3}$$ by setting $$x = 0.05$$. Is this valid? Justify by checking the validity condition. (2 steps)", "answer": "- Step 1: The expansion of $$(1+9x)^{2/3}$$ requires $$|9x|<1$$, i.e., $$|x|<\\frac{1}{9}\\approx 0.111$$.\n- Step 2: With $$x=0.05$$, we have $$|9x| = 0.45 < 1$$, so the expansion IS valid here. However, $$x=0.05$$ is not very small relative to $$\\frac{1}{9}$$ (it's about 45% of the maximum), so the approximation may have noticeable error in higher-order terms. For better accuracy, we'd want $$x$$ closer to 0.\n\nValidity is satisfied, but being near the boundary of validity means more terms are needed for good accuracy.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_37", "judge_pick": false}, {"question": "When you expand $$(1+x)^{1/2}$$ and substitute $$x=\\frac{1}{4}$$, you can approximate $$\\sqrt{5}$$. Explain the algebraic connection: how does $$(1+\\frac{1}{4})^{1/2}$$ relate to $$\\sqrt{5}$$? (2 steps)", "answer": "- Step 1: $$(1+\\frac{1}{4})^{1/2} = \\left(\\frac{5}{4}\\right)^{1/2} = \\frac{\\sqrt{5}}{\\sqrt{4}} = \\frac{\\sqrt{5}}{2}$$. So $$\\sqrt{5} = 2 \\cdot \\left(\\frac{5}{4}\\right)^{1/2} = 2(1+\\frac{1}{4})^{1/2}$$.\n- Step 2: The expansion gives $$(1+\\frac{1}{4})^{1/2} \\approx 1 + \\frac{1}{2}\\cdot\\frac{1}{4} + \\frac{\\frac{1}{2}(-\\frac{1}{2})}{2}\\cdot\\frac{1}{16} + \\ldots = 1 + \\frac{1}{8} - \\frac{1}{128} + \\ldots \\approx 1.1179...$$ Then $$\\sqrt{5} \\approx 2 \\times 1.1179 = 2.2358...$$, compared to the true value $$2.2361...$$\n\nThe trick: choose $$x$$ so that $$(1+x)$$ equals a fraction whose numerator or denominator contains the target surd.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_38", "judge_pick": false}, {"question": "Exercise: Find the coefficient of $$x^3$$ in the expansion of $$(1-5x)^{7/3}$$. Walk through the computation of the general coefficient for $$r=3$$. (3 steps)", "answer": "- Step 1: The general term is $$\\frac{n(n-1)(n-2)\\ldots(n-r+1)}{r!}x^r$$ with $$n=\\frac{7}{3}$$ and the variable is $$-5x$$. For $$r=3$$: $$\\frac{\\frac{7}{3}(\\frac{7}{3}-1)(\\frac{7}{3}-2)}{3!}(-5x)^3 = \\frac{\\frac{7}{3}\\cdot\\frac{4}{3}\\cdot\\frac{1}{3}}{6}(-125x^3)$$.\n- Step 2: Simplify the coefficient: $$\\frac{7 \\cdot 4 \\cdot 1}{3 \\cdot 3 \\cdot 3 \\cdot 6} \\cdot (-125) = \\frac{28}{162} \\cdot (-125) = \\frac{14}{81} \\cdot (-125) = -\\frac{1750}{81}$$.\n- Step 3: So the coefficient of $$x^3$$ is $$-\\frac{1750}{81}$$. The sign is negative because $$(-5)^3 = -125$$ (odd power of a negative). Validity: $$|5x|<1$$, so $$|x|<\\frac{1}{5}$$.\n\nFor negative arguments, odd powers of the argument contribute a negative sign; even powers contribute positive.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_39", "judge_pick": false}, {"question": "Exercise: The expansion of $$\\frac{1}{\\sqrt{1+3x^2}}$$ is requested for $$3x^2<1$$. Why is the variable here $$3x^2$$ rather than $$3x$$, and how does this affect the expansion's structure? (3 steps)", "answer": "- Step 1: The expression is $$(1+3x^2)^{-1/2}$$. The term inside the bracket that replaces $$x$$ in the standard formula is $$3x^2$$, not $$3x$$. The formula requires the form $$(1+y)^n$$ where $$y = 3x^2$$.\n- Step 2: This means the expansion contains only even powers of $$x$$, since each term has factor $$(3x^2)^r = 3^r x^{2r}$$. The expansion looks like: $$1 + (-\\frac{1}{2})(3x^2) + \\frac{(-\\frac{1}{2})(-\\frac{3}{2})}{2!}(3x^2)^2 + \\ldots = 1 - \\frac{3x^2}{2} + \\frac{27x^4}{8} - \\frac{135x^6}{16} + \\ldots$$\n- Step 3: There are no odd-power terms ($$x$$, $$x^3$$, $$x^5$$, etc.) ‚ÄĒ they simply don't appear. The \"first four non-zero terms\" are the constant, $$x^2$$, $$x^4$$, and $$x^6$$ terms. Validity: $$|3x^2|<1$$, i.e., $$|x|<\\frac{1}{\\sqrt{3}}$$.\n\nWhen the variable is $$x^2$$ (or any even function), the expansion has only even powers of $$x$$ ‚ÄĒ a structural consequence of the substitution.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_40", "judge_pick": true}, {"question": "Synthesis question: You need to expand $$\\frac{x-3}{(1-x)(1-2x)}$$ in ascending powers of $$x$$. Describe the complete strategy from start to finish. (4 steps)", "answer": "- Step 1: Set up partial fractions: $$\\frac{x-3}{(1-x)(1-2x)} = \\frac{A}{1-x} + \\frac{B}{1-2x}$$. Multiply through: $$x-3 = A(1-2x) + B(1-x)$$. Substitute $$x=1$$: $$-2 = -B$$, so $$B=2$$. Substitute $$x=\\frac{1}{2}$$: $$-\\frac{5}{2} = \\frac{1}{2}A$$, so $$A=-5$$. Result: $$\\frac{-5}{1-x} + \\frac{2}{1-2x}$$.\n- Step 2: Write each in index form: $$-5(1-x)^{-1} + 2(1-2x)^{-1}$$.\n- Step 3: Expand each: $$(1-x)^{-1} = 1+x+x^2+x^3+\\ldots$$ (valid $$|x|<1$$), so $$-5(1-x)^{-1} = -5-5x-5x^2-5x^3-\\ldots$$ Also $$(1-2x)^{-1} = 1+2x+4x^2+8x^3+\\ldots$$ (valid $$|x|<\\frac{1}{2}$$), so $$2(1-2x)^{-1} = 2+4x+8x^2+16x^3+\\ldots$$\n- Step 4: Combine: $$(-5+2) + (-5+4)x + (-5+8)x^2 + (-5+16)x^3 + \\ldots = -3 - x + 3x^2 + 11x^3 + \\ldots$$ Overall validity: $$|x|<\\frac{1}{2}$$ (the stricter of $$|x|<1$$ and $$|x|<\\frac{1}{2}$$).\n\nPartial fractions ‚Üí index form ‚Üí expand each ‚Üí combine ‚Üí check validity intersection.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_41", "judge_pick": false}, {"question": "Misconception probe: A student claims that $$(1-2x)^{-1}$$ expands to $$1-2x+4x^2-8x^3+\\ldots$$ because \"you just replace $$x$$ with $$-2x$$ in $$(1+x)^{-1} = 1-x+x^2-x^3+\\ldots$$\" What's wrong with this reasoning? (2 steps)", "answer": "- Step 1: The student is half-right about the substitution but wrong about the signs. We replace $$x$$ with $$-2x$$ in $$(1+x)^{-1} = 1-x+x^2-x^3+\\ldots$$, giving $$1-(-2x)+(-2x)^2-(-2x)^3+\\ldots = 1+2x+4x^2+8x^3+\\ldots$$\n- Step 2: The student forgot that replacing $$x$$ with $$-2x$$ means each $$x^k$$ becomes $$(-2x)^k = (-2)^k x^k$$, which carries its own sign. The minus sign in $$-2x$$ interacts with the alternating signs in the original expansion, and they don't simply combine to give all negative coefficients. Count carefully: $$(-1)^k \\cdot (-2)^k = (-1 \\cdot -2)^k = 2^k$$, so all coefficients are positive.\n\nSubstituting a negative variable into an alternating-sign series requires careful sign tracking ‚ÄĒ the signs of the variable and the series formula interact.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_42", "judge_pick": true}, {"question": "Edge case: What happens to the binomial expansion $$(1+x)^n$$ when $$x=0$$? Does the expansion still \"work,\" and what does it tell you? (2 steps)", "answer": "- Step 1: When $$x=0$$: $$(1+0)^n = 1^n = 1$$. The expansion gives $$1 + n(0) + \\frac{n(n-1)}{2!}(0)^2 + \\ldots = 1 + 0 + 0 + \\ldots = 1$$. The expansion is trivially exact ‚ÄĒ all terms beyond the constant vanish.\n- Step 2: This confirms that the constant term in any binomial expansion is always 1 (or $$a^n$$ for the $$(a+bx)^n$$ form). It's a useful sanity check: if your expansion doesn't start with 1 (after factoring out $$a^n$$), something went wrong.\n\n$$x=0$$ is the trivial case where the expansion is exact with just the first term ‚ÄĒ a quick verification tool.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_43", "judge_pick": false}, {"question": "Exercise: For $$(1+3x)^{-1}$$ expanded up to $$x^3$$, find the expansion of $$\\frac{1+x}{1+3x}$$ up to $$x^3$$. Show how the product $$(1+x)(1+3x)^{-1}$$ generates each coefficient. (3 steps)", "answer": "- Step 1: Expand $$(1+3x)^{-1} = 1 - 3x + 9x^2 - 27x^3 + \\ldots$$ (valid $$|x|<\\frac{1}{3}$$).\n- Step 2: Multiply by $$(1+x)$$: $$(1+x)(1 - 3x + 9x^2 - 27x^3 + \\ldots)$$. Compute each power:\n+ Constant: $$1 \\times 1 = 1$$\n+ $$x$$: $$1 \\times (-3x) + x \\times 1 = -3x + x = -2x$$\n+ $$x^2$$: $$1 \\times 9x^2 + x \\times (-3x) = 9x^2 - 3x^2 = 6x^2$$\n+ $$x^3$$: $$1 \\times (-27x^3) + x \\times 9x^2 = -27x^3 + 9x^3 = -18x^3$$\n- Step 3: Result: $$\\frac{1+x}{1+3x} \\approx 1 - 2x + 6x^2 - 18x^3$$. Each coefficient comes from exactly two cross-products: the constant from the first bracket times the relevant term from the second, plus the $$x$$ from the first bracket times the previous term from the second.\n\nThe pattern of coefficients ($$1, -2, 6, -18$$) shows rapid growth in magnitude ‚ÄĒ a warning that $$x$$ must be small for this to be useful.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_44", "judge_pick": true}, {"question": "Using the expansion $$\\frac{1+x}{1+3x} \\approx 1 - 2x + 6x^2 - 18x^3$$, estimate $$\\frac{101}{103}$$ by choosing an appropriate $$x$$. Walk through the choice of $$x$$ and the calculation. (3 steps)", "answer": "- Step 1: We need $$\\frac{1+x}{1+3x} = \\frac{101}{103}$$. From the numerator: $$1+x = \\frac{101}{100}$$, so $$x = \\frac{1}{100} = 0.01$$. Check the denominator: $$1+3(0.01) = 1.03 = \\frac{103}{100}$$. Confirmed: $$\\frac{101/100}{103/100} = \\frac{101}{103}$$.\n- Step 2: Check validity: $$|x| = 0.01 < \\frac{1}{3}$$, so the expansion is valid. Substitute: $$1 - 2(0.01) + 6(0.01)^2 - 18(0.01)^3 = 1 - 0.02 + 0.0006 - 0.000018 = 0.980582$$.\n- Step 3: The exact value: $$\\frac{101}{103} \\approx 0.9805825...$$, so our approximation is accurate to 6 decimal places. The tiny $$x=0.01$$ makes higher-order terms negligible.\n\nChoose $$x$$ to match the target fraction, verify validity, then substitute ‚ÄĒ the smaller the $$x$$, the better the approximation.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_45", "judge_pick": false}, {"question": "Percentage error is defined as $$\\frac{|\\text{approximate} - \\text{exact}|}{|\\text{exact}|} \\times 100\\%$$. If the exact value is 0.980583 and the approximation (using 3 terms) is 0.9806, find the percentage error. (2 steps)", "answer": "- Step 1: The error is $$|0.9806 - 0.980583| = 0.000017$$. The percentage error is $$\\frac{0.000017}{0.980583} \\times 100\\% \\approx 0.0017\\%$$.\n- Step 2: This extremely small percentage error reflects the fact that $$x=0.01$$ is very small, making the omitted terms ($$x^3$$ and higher) contribute negligibly. In general, percentage error decreases as $$x$$ decreases and as more terms are included.\n\nPercentage error measures the relative accuracy of the approximation ‚ÄĒ for small $$x$$ and enough terms, it can be remarkably small.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_46", "judge_pick": false}, {"question": "For the expression $$\\left(\\frac{1+x}{1-x}\\right)^2$$, describe two different strategies for finding the expansion, and identify which is more efficient. (3 steps)", "answer": "- Step 1: Strategy A: Expand $$(1+x)^2 = 1+2x+x^2$$ and $$(1-x)^{-2} = 1+2x+3x^2+4x^3+\\ldots$$ separately, then multiply the two expansions.\n- Step 2: Strategy B: First simplify $$\\frac{(1+x)^2}{(1-x)^2} = \\left(\\frac{1+x}{1-x}\\right)^2$$. Expand $$\\frac{1+x}{1-x} = (1+x)(1-x)^{-1} = (1+x)(1+x+x^2+x^3+\\ldots) = 1+2x+2x^2+2x^3+\\ldots$$, then square this result.\n- Step 3: Strategy A is more efficient because $$(1+x)^2$$ is already a finite polynomial (only 3 terms), so multiplying it by the expansion of $$(1-x)^{-2}$$ is straightforward. Strategy B requires squaring an infinite series, which is more complex and error-prone.\n\nWhen one factor is a low-degree polynomial, expand the other factor and multiply ‚ÄĒ simpler than squaring an infinite series.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_47", "judge_pick": false}, {"question": "When expanding $$\\frac{5}{3+2x}$$, a student writes this as $$5(3+2x)^{-1}$$ and immediately applies the formula with $$n=-1$$. What crucial step is missing? (2 steps)", "answer": "- Step 1: The student has skipped the factoring step. The binomial expansion requires the form $$(1+\\text{something})^n$$, but $$(3+2x)^{-1}$$ has 3 as the leading term, not 1. You must factor out 3: $$(3+2x)^{-1} = \\left(3\\left(1+\\frac{2x}{3}\\right)\\right)^{-1} = 3^{-1}\\left(1+\\frac{2x}{3}\\right)^{-1} = \\frac{1}{3}\\left(1+\\frac{2x}{3}\\right)^{-1}$$.\n- Step 2: Now expand $$\\left(1+\\frac{2x}{3}\\right)^{-1}$$ and multiply every term by $$\\frac{5}{3}$$ (since the original has a 5 outside). The validity condition is $$\\left|\\frac{2x}{3}\\right|<1$$, i.e., $$|x|<\\frac{3}{2}$$.\n\nNever skip the factoring step ‚ÄĒ $$(a+bx)^n$$ must always be rewritten as $$a^n(1+\\frac{b}{a}x)^n$$ before expanding.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_48", "judge_pick": true}, {"question": "For $$\\frac{1+x}{2+x}$$, a hint suggests rewriting as $$1 - \\frac{1}{x+2}$$. Verify this algebraically and explain why this form is more convenient for expansion. (3 steps)", "answer": "- Step 1: Verify: $$1 - \\frac{1}{x+2} = \\frac{x+2-1}{x+2} = \\frac{x+1}{x+2} = \\frac{1+x}{2+x}$$. Confirmed.\n- Step 2: This form is convenient because we only need to expand one binomial, $$(x+2)^{-1} = (2+x)^{-1} = 2^{-1}(1+\\frac{x}{2})^{-1} = \\frac{1}{2}(1-\\frac{x}{2}+\\frac{x^2}{4}-\\frac{x^3}{8}+\\ldots)$$, rather than expanding and then multiplying two series.\n- Step 3: The full expansion: $$1 - \\frac{1}{2}(1-\\frac{x}{2}+\\frac{x^2}{4}-\\ldots) = 1 - \\frac{1}{2} + \\frac{x}{4} - \\frac{x^2}{8} + \\ldots = \\frac{1}{2} + \\frac{x}{4} - \\frac{x^2}{8} + \\ldots$$ Validity: $$|x|<2$$.\n\nAlgebraic simplification before expansion can reduce the number of series you need to compute.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_49", "judge_pick": false}, {"question": "For $$\\sqrt{\\frac{2+x}{1-x}}$$, describe the expansion strategy. What two binomial expansions are needed, and what's the validity? (3 steps)", "answer": "- Step 1: Write as $$(2+x)^{1/2}(1-x)^{-1/2}$$. Expand each separately.\n- Step 2: $$(2+x)^{1/2} = 2^{1/2}(1+\\frac{x}{2})^{1/2} = \\sqrt{2}(1+\\frac{x}{4}-\\frac{x^2}{64}+\\ldots)$$, valid for $$|x|<2$$. $$(1-x)^{-1/2} = 1+\\frac{x}{2}+\\frac{3x^2}{8}+\\ldots$$, valid for $$|x|<1$$.\n- Step 3: Multiply the two expansions: $$\\sqrt{2}\\left(1+\\frac{x}{4}-\\frac{x^2}{64}+\\ldots\\right)\\left(1+\\frac{x}{2}+\\frac{3x^2}{8}+\\ldots\\right)$$. Overall validity: $$|x|<1$$ (the stricter condition).\n\nTwo binomial expansions multiplied together ‚ÄĒ expand each to sufficient order, then collect like terms.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_50", "judge_pick": false}, {"question": "When coefficients of $$x$$ and $$x^2$$ in the expansion of $$(1+ax)^n$$ are given as $$-6$$ and $$27$$ respectively, you can set up two equations to find both $$a$$ and $$n$$. Set up these equations. (3 steps)", "answer": "- Step 1: The expansion is $$(1+ax)^n = 1 + n(ax) + \\frac{n(n-1)}{2!}(ax)^2 + \\ldots = 1 + nax + \\frac{n(n-1)a^2}{2}x^2 + \\ldots$$\n- Step 2: From the coefficient of $$x$$: $$na = -6$$. From the coefficient of $$x^2$$: $$\\frac{n(n-1)a^2}{2} = 27$$.\n- Step 3: From the first equation, $$a = \\frac{-6}{n}$$. Substitute into the second: $$\\frac{n(n-1) \\cdot 36/n^2}{2} = 27$$, giving $$\\frac{36(n-1)}{2n} = 27$$, so $$\\frac{18(n-1)}{n} = 27$$, thus $$18n - 18 = 27n$$, so $$-18 = 9n$$, giving $$n = -2$$. Then $$a = \\frac{-6}{-2} = 3$$. Validity: $$|3x|<1$$, so $$|x|<\\frac{1}{3}$$.\n\nTwo unknowns require two equations ‚ÄĒ the coefficients of consecutive powers of $$x$$ provide exactly the system needed.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_51", "judge_pick": false}, {"question": "Once you've found $$n=-2$$ and $$a=3$$ for $$(1+3x)^{-2}$$, find the coefficient of $$x^3$$. (2 steps)", "answer": "- Step 1: The general term for $$(1+3x)^{-2}$$ is $$\\frac{n(n-1)(n-2)\\ldots(n-r+1)}{r!}(3x)^r$$. For $$r=3$$ with $$n=-2$$: $$\\frac{(-2)(-3)(-4)}{3!}(3)^3 = \\frac{-24}{6} \\cdot 27 = -4 \\cdot 27 = -108$$.\n- Step 2: So the coefficient of $$x^3$$ is $$-108$$. The sign is negative because the product $$(-2)(-3)(-4) = -24$$ has three negative factors (odd number), and $$3^3 = 27$$ is positive.\n\nFor negative integer $$n$$, the numerator is a product of negative numbers ‚ÄĒ count the factors to determine the sign.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_52", "judge_pick": false}, {"question": "To approximate $$\\frac{\\sqrt{2}}{2}$$ using the expansion of $$(4+x)^{-1/2}$$, choose an appropriate $$x$$ value and explain the connection. (3 steps)", "answer": "- Step 1: We want $$(4+x)^{-1/2} = \\frac{1}{\\sqrt{4+x}}$$. For this to equal $$\\frac{\\sqrt{2}}{2} = \\frac{1}{\\sqrt{2}}$$, we need $$\\sqrt{4+x} = \\sqrt{2}$$, so $$4+x = 2$$, giving $$x = -2$$.\n- Step 2: But check validity: the expansion of $$(4+x)^{-1/2} = 4^{-1/2}(1+\\frac{x}{4})^{-1/2} = \\frac{1}{2}(1+\\frac{x}{4})^{-1/2}$$ requires $$\\left|\\frac{x}{4}\\right|<1$$, i.e., $$|x|<4$$. Since $$x=-2$$ satisfies $$|-2|<4$$, the expansion is valid.\n- Step 3: Expand and substitute: $$\\frac{1}{2}(1+\\frac{x}{4})^{-1/2} \\approx \\frac{1}{2}(1 - \\frac{x}{8} + \\frac{3x^2}{128} - \\ldots)$$. With $$x=-2$$: $$\\approx \\frac{1}{2}(1 + \\frac{2}{8} + \\frac{12}{128}) = \\frac{1}{2}(1 + 0.25 + 0.09375) = \\frac{1}{2}(1.34375) = 0.671875$$. True value: $$\\frac{\\sqrt{2}}{2} \\approx 0.7071$$ ‚ÄĒ the approximation with few terms is rough since $$|x/4| = 0.5$$ is not very small.\n\nLarger $$|x|$$ within the validity range gives poorer approximations ‚ÄĒ more terms are needed for accuracy.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_53", "judge_pick": false}, {"question": "A student needs to expand $$\\frac{25}{(3+2x)^2(1-x)}$$ using partial fractions of the form $$\\frac{A}{3+2x} + \\frac{B}{(3+2x)^2} + \\frac{C}{1-x}$$. Why are there three terms in this decomposition? (2 steps)", "answer": "- Step 1: The denominator $$(3+2x)^2(1-x)$$ has degree 3. The repeated factor $$(3+2x)^2$$ requires two terms (one with $$(3+2x)$$ and one with $$(3+2x)^2$$), and the distinct factor $$(1-x)$$ requires one term. Total: 3 unknowns for 3 conditions.\n- Step 2: After finding $$A$$, $$B$$, $$C$$, each fraction is expanded separately. $$\\frac{A}{3+2x}$$ and $$\\frac{B}{(3+2x)^2}$$ require factoring out 3 from the denominator, while $$\\frac{C}{1-x}$$ is already in $$(1-x)^{-1}$$ form. The overall validity is the intersection of all individual conditions.\n\nThe number of partial fraction terms equals the degree of the denominator ‚ÄĒ one term per factor, with repeated factors getting multiple terms.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_54", "judge_pick": false}, {"question": "Conceptual check: For $$(1+x)^{-1}$$, the expansion gives $$1-x+x^2-x^3+\\ldots$$ If you substitute $$x=1$$, you get $$1-1+1-1+\\ldots$$ Does this equal $$\\frac{1}{1+1}=\\frac{1}{2}$$? What's going on? (2 steps)", "answer": "- Step 1: The series $$1-1+1-1+\\ldots$$ is Grandi's series, which does not converge in the traditional sense ‚ÄĒ the partial sums alternate between 1 and 0 and never settle. So the series is divergent, and we cannot claim it equals $$\\frac{1}{2}$$.\n- Step 2: This is exactly why the validity condition $$|x|<1$$ exists. At $$x=1$$ (the boundary), the series diverges and the equality $$(1+x)^{-1} = 1-x+x^2-x^3+\\ldots$$ breaks down. The function value $$\\frac{1}{2}$$ exists, but the series representation does not converge to it at this point.\n\nThe validity condition isn't just a technicality ‚ÄĒ at the boundary, the series genuinely fails to converge, even though the function itself is well-defined.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_55", "judge_pick": true}], "count": 56}, "glm_2": {"label": "GLM 5.1 ‚Ď°", "cards": [{"question": "Why does the binomial expansion of $$(1+x)^n$$ result in a finite number of terms when $$n$$ is a natural number, but produce an infinite series when $$n$$ is a negative or fractional number? (3 steps)", "answer": "- Step 1: When $$n$$ is a natural number, the general coefficient involves the product $$n(n-1)(n-2)\\dots(n-r+1)$$. For any term where $$r > n$$, one of the factors in the numerator will be $$(n-n) = 0$$, making the entire coefficient for that term (and all subsequent terms) equal to zero.\n- Step 2: When $$n$$ is negative or fractional, the sequence of factors $$n, n-1, n-2, \\dots$$ will never hit zero. For example, if $$n = -2$$, the sequence of factors is $$-2, -3, -4, \\dots$$, none of which are zero.\n- Step 3: Because no term evaluates to zero, the series continues indefinitely, resulting in an infinite series that relies on convergence to have a meaningful sum.\n\nTakeaway: The termination of the binomial series at $$n+1$$ terms relies entirely on hitting a zero factor in the numerator, which only happens for natural numbers.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_0", "judge_pick": false}, {"question": "Recall the general binomial expansion formula for $$(1+x)^n$$ for any rational $$n$$. Write down the first four terms and the general $$r$$-th term. (3 steps)", "answer": "- Step 1: The expansion is $$(1+x)^n = 1 + nx + \\frac{n(n-1)}{2!}x^2 + \\frac{n(n-1)(n-2)}{3!}x^3 + \\dots$$\n- Step 2: The pattern in the coefficients involves a product of decreasing terms in the numerator ($$n$$, then $$n-1$$, then $$n-2$$) and factorials in the denominator ($$1!$$, $$2!$$, $$3!$$).\n- Step 3: The general $$r$$-th term is given by $$\\frac{n(n-1)\\dots(n-r+1)}{r!} x^r$$. Notice that the numerator has exactly $$r$$ factors, starting from $$n$$ and decreasing by 1 each time.\n\nTakeaway: The formula elegantly captures both finite and infinite cases; the only difference is whether the sequence of numerator factors eventually hits zero.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_1", "judge_pick": false}, {"question": "In earlier modules, the binomial coefficient was written as $$\\binom{n}{r} = \\frac{n!}{r!(n-r)!}$$. However, for the general binomial expansion with fractional $$n$$, we use $$\\frac{n(n-1)\\dots(n-r+1)}{r!}$$. Explain why the factorial formula cannot be used for fractional $$n$$, and why the product formula is the correct generalization. (3 steps)", "answer": "- Step 1: The factorial formula $$\\frac{n!}{r!(n-r)!}$$ requires calculating $$n!$$, which is defined as $$n(n-1)(n-2)\\dots(1)$$. For a fractional $$n$$ (like $$1/2$$), the product never reaches 1, so factorials of fractions are undefined in standard A-level mathematics.\n- Step 2: The product formula $$\\frac{n(n-1)\\dots(n-r+1)}{r!}$$ contains exactly $$r$$ terms in the numerator. This means we stop multiplying before we hit an undefined factorial endpoint, making it calculable for any real $$n$$.\n- Step 3: For natural numbers, the two formulas are identical because $$n(n-1)\\dots(n-r+1) = \\frac{n!}{(n-r)!}$$. Thus, the product formula is a perfect generalization that works for both natural and fractional/negative $$n$$.\n\nTakeaway: The product formula is the universal version of the binomial coefficient, bypassing the undefined nature of fractional factorials.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_2", "judge_pick": true}, {"question": "For the binomial expansion $$(1+x)^n$$ where $$n$$ is not a natural number, state the condition for $$x$$ that ensures the infinite series converges. Conceptually, why does the series diverge if $$|x| > 1$$? (3 steps)", "answer": "- Step 1: The expansion is valid, meaning the infinite series converges to the true value of $$(1+x)^n$$, if and only if $$|x| < 1$$.\n- Step 2: In an infinite series, for the sum to approach a finite limit, the individual terms must shrink to zero. The coefficients $$\\frac{n(n-1)\\dots}{r!}$$ may grow or shrink, but the dominant behavior for large $$r$$ is determined by the $$x^r$$ term.\n- Step 3: If $$|x| \\ge 1$$, the magnitude of $$x^r$$ does not shrink fast enough (or grows indefinitely), causing the terms to either stay large or grow, so the sum \"blows up\" and does not equal $$(1+x)^n$$.\n\nTakeaway: The condition $$|x| < 1$$ is a convergence requirement for infinite series; outside this radius, the polynomial approximation is meaningless.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_3", "judge_pick": false}, {"question": "If expanding $$(1+4x)^{-2}$$, the validity condition is not simply $$|x|<1$$. Explain how to find the correct validity condition and state it for this example. (3 steps)", "answer": "- Step 1: The standard binomial expansion $$(1+y)^n$$ is valid for $$|y| < 1$$. Here, the \"variable\" part added to 1 inside the bracket is $$y = 4x$$.\n- Step 2: We substitute $$y = 4x$$ into the validity condition: $$|4x| < 1$$.\n- Step 3: Solving $$|4x| < 1$$ for $$x$$ gives $$|x| < \\frac{1}{4}$$. This is a stricter condition than $$|x|<1$$ because the $$4x$$ term grows four times faster than $$x$$, so $$x$$ must be kept smaller to ensure the terms shrink and the series converges.\n\nTakeaway: The validity condition is determined by the absolute value of the entire term added to 1 inside the bracket.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_4", "judge_pick": false}, {"question": "When expanding $$(1-x)^{1/3}$$, the terms involve powers of $$(-x)$$. Explain how to track the sign of each term efficiently without fully calculating the fractional coefficients. Apply this to determine the sign of the $$x^3$$ term. (3 steps)", "answer": "- Step 1: The sign of the $$x^r$$ term comes from two sources: the sign of the coefficient product $$n(n-1)\\dots(n-r+1)$$, and the sign of $$(-x)^r$$.\n- Step 2: The factor $$(-x)^r = (-1)^r x^r$$. So, if $$r$$ is odd, $$(-x)^r$$ contributes a negative sign; if $$r$$ is even, it contributes a positive sign.\n- Step 3: For the $$x^3$$ term in $$(1-x)^{1/3}$$, $$r=3$$ (odd), so $$(-x)^3 = -x^3$$. The coefficient part is $$(1/3)(1/3 - 1)(1/3 - 2)$$, which is $$(+)(-)(-) = +$$. Multiplying the positive coefficient by the negative $$(-x^3)$$ yields a negative term overall.\n\nTakeaway: Always separate the sign from the magnitude. Count the total number of negative signs from both the coefficient product and the $$(-x)^r$$ term; an odd number of negatives means the term is negative.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_5", "judge_pick": true}, {"question": "To approximate $$\\sqrt{2}$$, one uses the expansion of $$\\sqrt{1-2x}$$ with $$x=0.01$$. Why must $$x=0.01$$ satisfy the validity condition, and what is the conceptual process for finding the approximation? (3 steps)", "answer": "- Step 1: The validity condition for $$\\sqrt{1-2x} = (1-2x)^{1/2}$$ is $$|-2x| < 1$$, so $$|x| < 1/2$$. The value $$x=0.01$$ satisfies this, ensuring the series converges to the true value.\n- Step 2: Substitute $$x=0.01$$ into both the exact expression and the polynomial expansion. The exact expression becomes $$\\sqrt{1 - 2(0.01)} = \\sqrt{0.98} = \\sqrt{49 \\times 2 / 100} = \\frac{7\\sqrt{2}}{10}$$.\n- Step 3: The expansion yields a decimal approximation for $$\\sqrt{0.98}$$. Equating the two allows solving for $$\\sqrt{2}$$. If $$x$$ were outside the validity range, the series sum would not equal $$\\sqrt{0.98}$$, making the approximation invalid.\n\nTakeaway: Substituting small values of $$x$$ leverages the convergence of the series to connect an algebraic expansion to a numerical approximation of a root.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_6", "judge_pick": false}, {"question": "If $$\\mathrm{f}(x) = (2+x)(1+5x)^{-1/2}$$, explain the strategy to find just the $$x^2$$ term in the series expansion of $$\\mathrm{f}(x)$$ without expanding the entire product. (3 steps)", "answer": "- Step 1: Expand the binomial part $$(1+5x)^{-1/2}$$ up to the required order. Since the other factor is $$(2+x)$$, to get the $$x^2$$ term of the product, we need terms up to $$x^2$$ from the binomial expansion.\n- Step 2: Set up the multiplication of the two expressions: $$(2 + x)(\\text{constant} + c_1 x + c_2 x^2 + \\dots)$$.\n- Step 3: To isolate the $$x^2$$ term in the product, we only need two combinations: multiply the constant (2) by the $$x^2$$ term from the expansion, and multiply the $$x$$ term (1) by the $$x$$ term from the expansion. Sum these two results to get the final $$x^2$$ coefficient.\n\nTakeaway: When multiplying a polynomial by a binomial expansion, use the distributive property selectively‚ÄĒonly multiply the term orders that combine to give the target power of $$x$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_7", "judge_pick": false}, {"question": "In the expansion of $$(1+kx)^{-4}$$, the coefficient of $$x$$ is 20. Explain the process to find the value of $$k$$ without expanding to all terms, and then how to find the $$x^2$$ coefficient. (3 steps)", "answer": "- Step 1: Identify the formula for the coefficient of $$x^1$$ in $$(1+kx)^n$$. It is given by $$n \\cdot (kx)^1$$, so the coefficient is $$n \\cdot k$$.\n- Step 2: Substitute the known values into this specific term's coefficient: $$n = -4$$ and the coefficient is 20. So, $$-4k = 20$$, which solves to $$k = -5$$.\n- Step 3: Now find the $$x^2$$ coefficient using the formula $$\\frac{n(n-1)}{2!}k^2$$. Substitute $$n=-4$$ and $$k=-5$$: $$\\frac{(-4)(-5)}{2}(-5)^2 = 10 \\times 25 = 250$$.\n\nTakeaway: To find an unknown constant in a binomial expansion, target the lowest power of $$x$$ where the constant appears, as higher terms will involve higher powers of the unknown and be more complex to solve.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_8", "judge_pick": false}, {"question": "To expand $$\\sqrt{4+x}$$, we rewrite it as $$(4+x)^{1/2} = 4^{1/2}(1 + x/4)^{1/2}$$. Why must we factor out $$a^n$$ instead of just any factor, and what would go wrong if we tried to expand $$(4+x)^{1/2}$$ directly using the binomial formula? (3 steps)", "answer": "- Step 1: The binomial expansion formula $$(1+y)^n = 1 + ny + \\dots$$ specifically requires a \"1\" as the constant term inside the parentheses. If we applied it directly to $$(4+x)^{1/2}$$, the formula would not match the required structure.\n- Step 2: Factoring out $$a^n$$ (here $$4^{1/2}$$) forces the expression into the required $$(1+y)^n$$ form, where $$y = (b/a)x = x/4$$.\n- Step 3: Once in $$a^n(1+y)^n$$ form, we can safely apply the standard expansion to the $$(1+y)^n$$ part, and then multiply every term of the resulting expansion by the constant $$a^n$$.\n\nTakeaway: The binomial expansion for non-integer powers is defined specifically for the form $$(1+\\text{something})^n$$. You must algebraically manipulate any $$(a+bx)^n$$ expression to fit this template.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_9", "judge_pick": true}, {"question": "For the expansion of $$(2+3x)^{-2}$$, the validity condition is $$|3x/2| < 1$$. Explain how this condition is derived from the standard $$(1+y)^n$$ validity condition, and state the validity condition in terms of $$|x|$$. (3 steps)", "answer": "- Step 1: When we rewrite $$(2+3x)^{-2}$$ as $$2^{-2}(1 + 3x/2)^{-2}$$, we identify the \"something\" added to 1 as $$y = 3x/2$$.\n- Step 2: The standard validity condition for $$(1+y)^n$$ is $$|y| < 1$$. Substituting $$y = 3x/2$$ gives $$|3x/2| < 1$$.\n- Step 3: To express this in terms of $$|x|$$, we solve the inequality: $$|x| < 2/3$$. This means $$x$$ must be strictly between $$-2/3$$ and $$2/3$$ for the series to converge.\n\nTakeaway: The validity condition for $$(a+bx)^n$$ is $$|(b/a)x| < 1$$, or $$|x| < |a/b|$$. The factor $$a^n$$ pulled outside the parenthesis does not affect convergence, only the $$b/a$$ ratio inside does.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_10", "judge_pick": true}, {"question": "Consider expanding $$(8-2x)^{1/3}$$. A student factors out $$8^{1/3}$$ to get $$2(1 - x/4)^{1/3}$$. Another student factors out $$(-2x)^{1/3}$$ to get $$(-2x)^{1/3}(1 - 4/x)^{1/3}$$. Why is the first student's approach correct and the second student's approach problematic for finding a standard ascending power series? (3 steps)", "answer": "- Step 1: A standard ascending power series is expressed as $$c_0 + c_1 x + c_2 x^2 + \\dots$$. The first student's approach yields a series in powers of $$x$$ (since the \"something\" is $$-x/4$$), which fits the standard form perfectly.\n- Step 2: The second student's approach yields a series where the \"something\" is $$-4/x$$. The powers will be $$(-4/x)^1, (-4/x)^2, \\dots$$, resulting in terms with $$x$$ in the denominator (e.g., $$1/x, 1/x^2$$).\n- Step 3: A series with negative powers of $$x$$ is not an ascending power series and does not provide a polynomial approximation suitable for small $$x$$. Furthermore, the validity $$|-4/x| < 1$$ means $$|x| > 4$$, which describes large $$x$$, not small $$x$$.\n\nTakeaway: Always factor out the constant term (the term without $$x$$) to ensure the remaining variable part is small when $$x$$ is small, producing a valid polynomial approximation for small $$x$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_11", "judge_pick": true}, {"question": "When asked to expand $$\\frac{4-5x}{(1+x)(2-x)}$$, we first split it into partial fractions $$\\frac{3}{1+x} - \\frac{2}{2-x}$$. What is the conceptual advantage of expanding these two simpler fractions separately rather than trying to expand the original expression directly? (3 steps)", "answer": "- Step 1: The original expression has a denominator $$(1+x)(2-x)$$. To expand it directly, we would have to expand $$(1+x)^{-1}(2-x)^{-1}$$, which involves multiplying two infinite series together‚ÄĒa complex and error-prone process.\n- Step 2: By splitting into partial fractions, we separate the complex denominator into two distinct, simpler fractions, each with a single linear denominator.\n- Step 3: Each simpler fraction, like $$(1+x)^{-1}$$ or $$(2-x)^{-1}$$, can be expanded individually using the standard binomial theorem, and then the two resulting series can be easily added or subtracted term by term.\n\nTakeaway: Partial fractions convert a difficult series multiplication problem into a much easier series addition problem.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_12", "judge_pick": true}, {"question": "After expanding $$\\frac{3}{1+x} - \\frac{2}{2-x}$$, the validity for the first fraction's expansion is $$|x|<1$$ and for the second is $$|x/2|<1 \\implies |x|<2$$. Why must the final combined expansion be valid only for $$|x|<1$$ instead of $$|x|<2$$? (3 steps)", "answer": "- Step 1: For a sum or difference of two series to be valid, both series must individually be converging. If one series diverges, the entire expression becomes meaningless.\n- Step 2: The first series diverges if $$|x| \\ge 1$$, and the second diverges if $$|x| \\ge 2$$. If we pick an $$x$$ value like $$x=1.5$$, the second series converges, but the first series diverges.\n- Step 3: Therefore, the combined expansion is only valid where their validity regions overlap (the intersection). The intersection of $$|x|<1$$ and $$|x|<2$$ is the stricter condition, $$|x|<1$$.\n\nTakeaway: The validity of a combined expansion is the intersection of the validity regions of all its component parts. Always choose the strictest condition.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_13", "judge_pick": false}, {"q
