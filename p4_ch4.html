uestion": "When expanding the partial fraction term $$\\frac{-2}{2-x}$$, a student rewrites it as $$-2(2-x)^{-1}$$. Explain the algebraic steps to convert this into a form suitable for the standard binomial expansion, and identify what replaces the $$x$$ in the $$(1+y)^n$$ formula. (3 steps)", "answer": "- Step 1: The expression is $$-2(2-x)^{-1}$$. We need the constant term inside the bracket to be 1, so we factor out 2 from the bracket: $$-2[2(1 - x/2)]^{-1}$$.\n- Step 2: Apply the power of $$-1$$ to both the 2 and the bracket: $$-2 \\cdot 2^{-1} (1 - x/2)^{-1}$$.\n- Step 3: Simplify the constants: $$-2 \\cdot (1/2) = -1$$. The expression is now $$-1 \\cdot (1 - x/2)^{-1}$$. The standard $$(1+y)^n$$ formula can now be used with $$y = -x/2$$ and $$n = -1$$. The constant $$-1$$ will multiply the entire expanded series.\n\nTakeaway: When a partial fraction has a constant term other than 1 in the denominator, factor it out, apply the power, and simplify the outside constant before expanding.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_14", "judge_pick": false}, {"question": "If you need to expand $$\\frac{2x^2+7x-6}{(x+5)(x-4)}$$, why must you perform algebraic long division before applying partial fractions and the binomial expansion? (3 steps)", "answer": "- Step 1: The degree of the numerator (2) is equal to the degree of the denominator (2), making it a top-heavy (or improper) algebraic fraction.\n- Step 2: Partial fractions can only be applied to proper fractions (where the numerator's degree is strictly less than the denominator's). If we tried partial fractions directly, we couldn't find constants $$A$$ and $$B$$ to satisfy the identity.\n- Step 3: Long division converts the improper fraction into a constant (or polynomial) plus a proper fraction. The constant can be expanded trivially, and the proper fraction can be split into partial fractions and expanded using the binomial theorem.\n\nTakeaway: Always check the degrees of the numerator and denominator first. If the numerator's degree is $$\\ge$$ the denominator's degree, long division is a mandatory first step.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_15", "judge_pick": false}, {"question": "Expand $$(1-2x)^{-1}$$ up to and including the $$x^3$$ term, and state the range of values of $$x$$ for which the expansion is valid. (3 steps)", "answer": "- Step 1: Apply the binomial expansion formula $$(1+y)^n = 1 + ny + \\frac{n(n-1)}{2!}y^2 + \\frac{n(n-1)(n-2)}{3!}y^3 + \\dots$$ with $$n=-1$$ and $$y=-2x$$.\n- Step 2: Calculate the terms:\n+ Term 1: $$1$$\n+ Term 2: $$(-1)(-2x) = 2x$$\n+ Term 3: $$\\frac{(-1)(-2)}{2}(-2x)^2 = (1)(4x^2) = 4x^2$$\n+ Term 4: $$\\frac{(-1)(-2)(-3)}{6}(-2x)^3 = (-1)(-8x^3) = 8x^3$$\nSo the expansion is $$1 + 2x + 4x^2 + 8x^3 + \\dots$$\n- Step 3: The validity condition requires $$|y| < 1$$, so $$|-2x| < 1$$, which simplifies to $$|2x| < 1$$, or $$|x| < \\frac{1}{2}$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_16", "judge_pick": false}, {"question": "Find the first three terms in the binomial expansion of $$\\frac{1}{\\sqrt{4+x}}$$ and state the validity condition. (3 steps)", "answer": "- Step 1: Rewrite the expression as $$(4+x)^{-1/2}$$. Factor out $$4^{-1/2}$$ to get the form $$(1+y)^n$$: $$4^{-1/2}(1 + x/4)^{-1/2} = \\frac{1}{2}(1 + \\frac{x}{4})^{-1/2}$$.\n- Step 2: Expand $$(1 + x/4)^{-1/2}$$ using $$n=-1/2$$ and $$y=x/4$$:\n+ Term 1: $$1$$\n+ Term 2: $$(-1/2)(x/4) = -x/8$$\n+ Term 3: $$\\frac{(-1/2)(-3/2)}{2}(x/4)^2 = \\frac{3}{8} \\cdot \\frac{x^2}{16} = \\frac{3x^2}{128}$$\nSo the expansion of the bracket is $$1 - \\frac{x}{8} + \\frac{3x^2}{128} + \\dots$$\n- Step 3: Multiply by the external factor $$1/2$$:\n$$\\frac{1}{2} - \\frac{x}{16} + \\frac{3x^2}{256} + \\dots$$\nThe validity condition is $$|x/4| < 1$$, so $$|x| < 4$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_17", "judge_pick": false}, {"question": "Express $$\\frac{2}{(1-x)(1+2x)}$$ as partial fractions, and hence find the expansion up to the $$x^2$$ term. State the validity. (4 steps)", "answer": "- Step 1: Set up partial fractions: $$\\frac{2}{(1-x)(1+2x)} = \\frac{A}{1-x} + \\frac{B}{1+2x}$$.\nMultiply by the denominator: $$2 = A(1+2x) + B(1-x)$$.\n+ Let $$x=1$$: $$2 = A(3) \\implies A = 2/3$$.\n+ Let $$x=-1/2$$: $$2 = B(3/2) \\implies B = 4/3$$.\nSo, $$\\frac{2}{(1-x)(1+2x)} = \\frac{2}{3}(1-x)^{-1} + \\frac{4}{3}(1+2x)^{-1}$$.\n- Step 2: Expand $$(1-x)^{-1}$$ up to $$x^2$$: $$1 + x + x^2 + \\dots$$\nExpand $$(1+2x)^{-1}$$ up to $$x^2$$: $$1 - 2x + 4x^2 + \\dots$$\n- Step 3: Multiply by the constants and add:\n$$\\frac{2}{3}(1 + x + x^2) + \\frac{4}{3}(1 - 2x + 4x^2) = \\frac{2}{3} + \\frac{2}{3}x + \\frac{2}{3}x^2 + \\frac{4}{3} - \\frac{8}{3}x + \\frac{16}{3}x^2$$\nCombine like terms: Constant $$= 6/3 = 2$$. $$x$$ term $$= -6/3x = -2x$$. $$x^2$$ term $$= 18/3x^2 = 6x^2$$.\nResult: $$2 - 2x + 6x^2$$.\n- Step 4: Validity for $$(1-x)^{-1}$$ is $$|x|<1$$. Validity for $$(1+2x)^{-1}$$ is $$|2x|<1 \\implies |x|<1/2$$. The intersection is the stricter condition: $$|x| < 1/2$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_18", "judge_pick": false}, {"question": "A student expands $$(1+5x)^{-1/2}$$ and multiplies it by $$(2+x)$$ to find the $$x^2$$ term of $$(2+x)(1+5x)^{-1/2}$$. They get $$2(\\frac{75}{8}) + 1(-\\frac{5}{2}) = \\frac{65}{4}$$. Explain the logic behind these two specific multiplications. (3 steps)", "answer": "- Step 1: To find the $$x^2$$ term of the entire product $$(2+x)(c_0 + c_1 x + c_2 x^2 + \\dots)$$, we must identify which combinations of terms from the first bracket and the second bracket will yield an $$x^2$$ term.\n- Step 2: The first combination is multiplying the constant term from the first bracket (2) by the $$x^2$$ term from the second bracket ($$c_2$$). This gives $$2 \\times \\frac{75}{8}x^2$$.\n- Step 3: The second combination is multiplying the $$x$$ term from the first bracket (1) by the $$x$$ term from the second bracket ($$c_1$$). This gives $$x \\times -\\frac{5}{2}x = -\\frac{5}{2}x^2$$. Adding these two contributions gives the final $$x^2$$ coefficient.\n\nTakeaway: When multiplying a binomial by a series, systematically pair terms whose powers sum to the target power.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_19", "judge_pick": true}], "count": 20}, "glm_3": {"label": "GLM 5.1 ‚ĎĘ", "cards": [{"question": "What is the binomial expansion formula for $$$(1+x)^n$$$ when $$$n$$$ is any real number (not necessarily a positive integer), and how does it compare structurally to the finite binomial theorem for positive integer $$$n$$$? (3 steps)", "answer": "- Step 1: The general binomial expansion for any real $$$n$$$ is: $$(1+x)^n = 1 + nx + \\frac{n(n-1)}{2!}x^2 + \\frac{n(n-1)(n-2)}{3!}x^3 + \\dots + \\frac{n(n-1)\\dots(n-r+1)}{r!}x^r + \\dots$$ The key structural feature is that each coefficient is formed by a descending product of factors $$$n, (n-1), (n-2), \\dots$$$ divided by a factorial.\n- Step 2: When $$$n$$$ is a positive integer, the descending product eventually hits zero: for example, if $$$n=3$$$, then the coefficient of $$$x^4$$$ involves the factor $$$(n-3) = 0$$$, so all subsequent terms vanish. This gives exactly $$$(n+1)$$$ terms ‚ÄĒ a finite polynomial.\n+ When $$$n=3$$$: the $$$x^4$$$ coefficient is $$$\\frac{3 \\cdot 2 \\cdot 1 \\cdot 0}{4!} = 0$$$, and every higher term is also zero.\n- Step 3: When $$$n$$$ is negative or fractional, none of the factors $$$n, (n-1), (n-2), \\dots$$$ are ever zero, so the series never terminates ‚ÄĒ it is an **infinite series**. This is the fundamental difference: positive integer $$$n$$$ gives a finite expansion; all other real $$$n$$$ give an infinite one.\n\nThe formula is the same in both cases, but the infinite-vs-finite distinction depends entirely on whether the descending product ever reaches zero.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_0", "judge_pick": false}, {"question": "Why does the binomial expansion of $$$(1+x)^n$$$ produce infinitely many terms when $$$n$$$ is not a natural number? What would happen to the general term if $$$n$$$ were a natural number? (2 steps)", "answer": "- Step 1: The general $$$r$$$-th term is $$$\\frac{n(n-1)(n-2)\\dots(n-r+1)}{r!}x^r$$$. When $$$n$$$ is not a natural number (e.g., $$$n = -1$$$ or $$$n = \\frac{1}{2}$$$), none of the factors in the numerator $$$n, (n-1), (n-2), \\dots$$$ ever equal zero. The descending chain $$$n, n-1, n-2, \\dots$$$ never lands on an integer zero, so no coefficient ever vanishes.\n+ For $$$n = -1$$$: the factors are $$$-1, -2, -3, \\dots$$$ ‚ÄĒ none are zero.\n+ For $$$n = \\frac{1}{2}$$$: the factors are $$$\\frac{1}{2}, -\\frac{1}{2}, -\\frac{3}{2}, \\dots$$$ ‚ÄĒ none are zero.\n- Step 2: When $$$n$$$ IS a natural number, the factor $$$(n - n) = 0$$$ appears in the numerator of the $$$(n+1)$$$-th term, making that coefficient zero. All subsequent terms also contain this zero factor, so they vanish too. This is why positive integer exponents produce exactly $$$(n+1)$$$ terms and then stop.\n\nA non-natural $$$n$$$ means the descending product never \"hits zero,\" so the series goes on forever.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_1", "judge_pick": true}, {"question": "For what values of $$$x$$$ is the infinite binomial expansion $$$(1+x)^n$$$ (with $$$n$$$ not a natural number) valid, and why is this restriction necessary? (2 steps)", "answer": "- Step 1: The expansion is valid when $$$|x| < 1$$$, i.e., $$$-1 < x < 1$$$. This is a condition for **convergence** ‚ÄĒ the infinite series only sums to the correct value of $$$(1+x)^n$$$ when $$$|x| < 1$$$.\n- Step 2: When $$$|x| \\geq 1$$$, the terms either do not decrease to zero (so the series diverges and the sum is meaningless) or the series converges to the wrong value. For example, $$$(1+2)^{-1} = \\frac{1}{3}$$$, but the series $$$1 - 2 + 4 - 8 + \\dots$$$ clearly diverges. The convergence condition ensures each successive term is smaller than the previous one, so the partial sums approach a limit.\n\nWithout $$$|x| < 1$$$, the infinite series does not represent the function ‚ÄĒ it is either divergent or meaningless.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_2", "judge_pick": false}, {"question": "Write the general $$$r$$$-th term in the binomial expansion of $$$(1+x)^n$$$. What pattern does each factor in the numerator follow, and how many factors does the numerator contain? (2 steps)", "answer": "- Step 1: The general $$$r$$$-th term (starting from $$$r=0$$$) is: $$\\frac{n(n-1)(n-2)\\dots(n-r+1)}{r!}x^r$$ The numerator contains exactly $$$r$$$ factors, starting at $$$n$$$ and stepping down by 1 each time.\n- Step 2: The pattern is: the first factor is $$$n$$$, the second is $$$(n-1)$$$, the third is $$$(n-2)$$$, and so on until the $$$r$$$-th factor which is $$$(n-r+1)$$$. So for:\n+ $$$r=0$$$: the term is $$$1$$$ (empty product in numerator, by convention)\n+ $$$r=1$$$: numerator is just $$$n$$$\n+ $$$r=2$$$: numerator is $$$n(n-1)$$$\n+ $$$r=3$$$: numerator is $$$n(n-1)(n-2)$$$\n\nThink of it as: \"start at $$$n$$$ and take $$$r$$$ steps down.\"", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_3", "judge_pick": false}, {"question": "Expand $$$(1+x)^{-1}$$$ up to and including the $$$x^3$$$ term, and describe the pattern in the coefficients. Why does this pattern emerge? (3 steps)", "answer": "- Step 1: Write in binomial expansion form with $$$n = -1$$$: $$(1+x)^{-1} = 1 + (-1)x + \\frac{(-1)(-2)}{2!}x^2 + \\frac{(-1)(-2)(-3)}{3!}x^3 + \\dots$$\n- Step 2: Simplify each coefficient:\n+ $$$x^1$$$ term: $$$(-1) \\cdot x = -x$$$\n+ $$$x^2$$$ term: $$$\\frac{(-1)(-2)}{2}x^2 = \\frac{2}{2}x^2 = x^2$$$\n+ $$$x^3$$$ term: $$$\\frac{(-1)(-2)(-3)}{6}x^3 = \\frac{-6}{6}x^3 = -x^3$$$\n- Step 3: So $$$(1+x)^{-1} = 1 - x + x^2 - x^3 + \\dots$$$ The pattern is **alternating signs** with all coefficients of magnitude 1. This happens because for $$$n=-1$$$, the numerator $$$(-1)(-2)(-3)\\dots(-r)$$$ has $$$r$$$ negative factors, giving $$$(-1)^r \\cdot r!$$$, which cancels the $$$r!$$$ in the denominator, leaving just $$$(-1)^r$$$.\n\nThis is the geometric series $$$1 - x + x^2 - x^3 + \\dots$$$ ‚ÄĒ the binomial expansion generalizes the geometric series!", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_4", "judge_pick": false}, {"question": "When expanding $$$(1-x)^{1/3}$$$, how do you determine the sign of each term? Give a rule for tracking signs, and illustrate with the first four terms. (3 steps)", "answer": "- Step 1: The expansion uses the formula $$$(1+bx)^n$$$ with $$$b = -1$$$ and $$$n = \\frac{1}{3}$$$. Each term contains a factor of $$$(-x)^r = (-1)^r x^r$$$. So the sign of each term depends on both the sign of the coefficient from $$$n(n-1)\\dots$$$ AND the sign from $$$(-x)^r$$$.\n- Step 2: Count the total number of minus signs in each term:\n+ The $$$x^1$$$ term: factor $$$n = \\frac{1}{3}$$$ (positive) and $$$(-x)^1$$$ (1 minus sign) ‚Üí **1 minus sign** ‚Üí **negative**\n+ The $$$x^2$$$ term: factors $$$\\frac{1}{3} \\cdot (-\\frac{2}{3})$$$ (1 minus sign from numerator) and $$$(-x)^2 = x^2$$$ (0 minus signs) ‚Üí **1 minus sign** ‚Üí **negative**\n+ The $$$x^3$$$ term: factors $$$\\frac{1}{3} \\cdot (-\\frac{2}{3}) \\cdot (-\\frac{5}{3})$$$ (2 minus signs from numerator) and $$$(-x)^3 = -x^3$$$ (1 minus sign) ‚Üí **3 minus signs** ‚Üí **negative**\n- Step 3: Rule: **count the total number of negative signs** in the coefficient and the $$$x$$$-power combined. An even number of negatives gives a positive term; an odd number gives a negative term. The expansion is: $$(1-x)^{1/3} = 1 - \\frac{1}{3}x - \\frac{1}{9}x^2 - \\frac{5}{81}x^3 + \\dots$$\n\nAlways count ALL sources of minus signs ‚ÄĒ both from the descending product in the coefficient and from the power of $$$(-x)$$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_5", "judge_pick": false}, {"question": "What is the validity condition for the expansion of $$$(1+bx)^n$$$ when $$$n$$$ is not a natural number, and how does it relate to the condition for $$$(1+x)^n$$$? (2 steps)", "answer": "- Step 1: The expansion $$$(1+bx)^n = 1 + n(bx) + \\frac{n(n-1)}{2!}(bx)^2 + \\dots$$$ is obtained by substituting $$$bx$$$ in place of $$$x$$$ in the formula for $$$(1+x)^n$$$. The original validity condition $$$|x| < 1$$$ becomes $$$|bx| < 1$$$.\n- Step 2: Therefore the expansion of $$$(1+bx)^n$$$ is valid when $$$|bx| < 1$$$, which is equivalent to $$$|x| < \\frac{1}{|b|}$$$. The larger the value of $$$|b|$$$, the smaller the interval of validity ‚ÄĒ adding a coefficient to $$$x$$$ \"squeezes\" the range of valid $$$x$$$ values.\n\nFor example, $$$(1+4x)^{-2}$$$ requires $$$|4x| < 1$$$, i.e., $$$|x| < \\frac{1}{4}$$$, while $$$(1+\\frac{1}{2}x)^{-5}$$$ requires $$$|x| < 2$$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_6", "judge_pick": false}, {"question": "Find the first four terms of the expansion of $$$(1+4x)^{-2}$$$ and state the validity condition. Walk through the sign handling carefully. (3 steps)", "answer": "- Step 1: Set $$$n = -2$$$ and replace $$$x$$$ with $$$4x$$$ in the binomial formula. The validity condition requires $$$|4x| < 1$$$, i.e., $$$|x| < \\frac{1}{4}$$$. Now compute: $$(1+4x)^{-2} = 1 + (-2)(4x) + \\frac{(-2)(-3)}{2!}(4x)^2 + \\frac{(-2)(-3)(-4)}{3!}(4x)^3 + \\dots$$\n- Step 2: Simplify each term:\n+ Constant: $$$1$$$\n+ $$$x$$$ term: $$$(-2)(4x) = -8x$$$\n+ $$$x^2$$$ term: $$$\\frac{6}{2}(16x^2) = 3 \\cdot 16x^2 = 48x^2$$$\n+ $$$x^3$$$ term: $$$\\frac{(-2)(-3)(-4)}{6}(64x^3) = \\frac{-24}{6} \\cdot 64x^3 = -4 \\cdot 64x^3 = -256x^3$$$\n- Step 3: So $$(1+4x)^{-2} = 1 - 8x + 48x^2 - 256x^3 + \\dots, \\quad |x| < \\frac{1}{4}$$ The signs alternate because each successive factor in the numerator contributes one more negative sign, and $$$(4x)^r$$$ is always positive.\n\nNote how the coefficients grow rapidly ‚ÄĒ this is because $$$(4x)^r$$$ amplifies each term. The series only converges because when $$$|x| < \\frac{1}{4}$$$, the powers of $$$4x$$$ shrink fast enough.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_7", "judge_pick": false}, {"question": "In the expansion of $$$(1+kx)^{-4}$$$, the coefficient of $$$x$$$ is found to be 20. How do you find $$$k$$$, and then how do you find the coefficient of $$$x^2$$$? (3 steps)", "answer": "- Step 1: Write the expansion with $$$n = -4$$$: $$(1+kx)^{-4} = 1 + (-4)(kx) + \\frac{(-4)(-5)}{2!}(kx)^2 + \\dots = 1 - 4kx + 10k^2x^2 + \\dots$$ The coefficient of $$$x$$$ is $$$-4k$$$. Set this equal to 20: $$$-4k = 20$$$, so $$$k = -5$$$.\n- Step 2: Now substitute $$$k = -5$$$ into the $$$x^2$$$ coefficient. The coefficient of $$$x^2$$$ is $$$10k^2 = 10 \\cdot 25 = 250$$$. Note that the sign is positive because $$$k^2 = (-5)^2 = 25$$$.\n- Step 3: Key insight: the coefficient of $$$x^r$$$ in $$$(1+kx)^n$$$ always involves $$$k^r$$$. So when finding the coefficient of $$$x$$$, you get a linear equation in $$$k$$$; for $$$x^2$$$, you get $$$k^2$$$. Since $$$k^2 = (-5)^2 = 25$$$, the sign of $$$k$$$ doesn't affect even-powered coefficients.\n\nIf the coefficient of $$$x^2$$$ had been given instead, you'd solve $$$10k^2 = c$$$ which gives two possible values for $$$k$$$ (positive and negative), whereas the linear equation for the $$$x$$$ coefficient uniquely determines $$$k$$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_8", "judge_pick": false}, {"question": "To approximate $$$\\sqrt{2}$$$, one strategy uses the expansion of $$$\\sqrt{1-2x}$$$ with $$$x = 0.01$$$. Explain the full strategy: how does substituting $$$x = 0.01$$$ give an approximation to $$$\\sqrt{2}$$$, and why is $$$x = 0.01$$$ valid? (3 steps)", "answer": "- Step 1: Expand $$$\\sqrt{1-2x} = (1-2x)^{1/2}$$$: $$(1-2x)^{1/2} = 1 + \\frac{1}{2}(-2x) + \\frac{\\frac{1}{2}(-\\frac{1}{2})}{2!}(-2x)^2 + \\dots = 1 - x - \\frac{1}{2}x^2 - \\frac{1}{2}x^3 - \\dots$$ The validity condition is $$$|{-2x}| < 1$$$, i.e., $$$|x| < \\frac{1}{2}$$$.\n- Step 2: Substitute $$$x = 0.01$$$ (which satisfies $$$|x| < \\frac{1}{2}$$$): $$\\sqrt{1 - 2(0.01)} = \\sqrt{0.98} \\approx 1 - 0.01 - \\frac{0.01^2}{2} - \\dots \\approx 0.9899495$$ Now relate this to $$$\\sqrt{2}$$$: since $$$\\sqrt{0.98} = \\sqrt{\\frac{98}{100}} = \\frac{\\sqrt{98}}{10} = \\frac{7\\sqrt{2}}{10}$$$, we get: $$\\frac{7\\sqrt{2}}{10} \\approx 0.9899495 \\implies \\sqrt{2} \\approx \\frac{0.9899495 \\times 10}{7} \\approx 1.4142$$\n- Step 3: The strategy works because we choose a small $$$x$$$ so that higher powers of $$$x$$$ are negligible (e.g., $$$0.01^2 = 0.0001$$$, $$$0.01^3 = 0.000001$$$), making the first few terms an excellent approximation. The key trick is recognizing that $$$\\sqrt{0.98}$$$ can be algebraically related to $$$\\sqrt{2}$$$.\n\nThe smaller the $$$x$$$ value, the fewer terms needed for a given accuracy ‚ÄĒ but the algebraic manipulation to reach the target surd may be more creative.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_9", "judge_pick": false}, {"question": "A student claims: \"The expansion of $$$(1+x)^{1/2}$$$ gives a valid approximation for $$$x = 2$$$.\" Explain why this is incorrect and what goes wrong conceptually. (2 steps)", "answer": "- Step 1: The expansion $$$(1+x)^{1/2} = 1 + \\frac{1}{2}x - \\frac{1}{8}x^2 + \\dots$$$ is only valid for $$$|x| < 1$$$. When $$$x = 2$$$, we have $$$|x| = 2 > 1$$$, so the validity condition is violated.\n- Step 2: When $$$|x| \\geq 1$$$, the successive terms of the series do not decrease to zero ‚ÄĒ in fact they grow. For example, with $$$x = 2$$$: the first few terms are $$$1 + 1 - \\frac{1}{2} + \\dots$$$, and the terms in the series alternate in sign and grow in magnitude. The partial sums oscillate wildly rather than converging. The actual value is $$$\\sqrt{3} \\approx 1.732$$$, but the series gives nonsense.\n\nThe expansion is a **power series** that only converges within its radius of convergence $$$|x| < 1$$$. Outside this interval, the series simply does not represent the function.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_10", "judge_pick": true}, {"question": "How does the general binomial expansion formula $$$(1+x)^n = 1 + nx + \\frac{n(n-1)}{2!}x^2 + \\dots$$$ reduce to the familiar finite binomial theorem when $$$n$$$ is a positive integer? Demonstrate with $$$n = 3$$$. (3 steps)", "answer": "- Step 1: When $$$n$$$ is a positive integer, the descending product in the numerator $$$n(n-1)(n-2)\\dots$$$ eventually reaches zero. Specifically, the $$$(n+1)$$$-th term contains the factor $$$(n-n) = 0$$$, making that term and all subsequent terms vanish.\n- Step 2: For $$$n = 3$$$, let's check each term:\n+ $$$r = 0$$$: $$$1$$$\n+ $$$r = 1$$$: $$$\\frac{3}{1!}x^1 = 3x$$$\n+ $$$r = 2$$$: $$$\\frac{3 \\cdot 2}{2!}x^2 = 3x^2$$$\n+ $$$r = 3$$$: $$$\\frac{3 \\cdot 2 \\cdot 1}{3!}x^3 = x^3$$$\n+ $$$r = 4$$$: $$$\\frac{3 \\cdot 2 \\cdot 1 \\cdot 0}{4!}x^4 = 0$$$\n- Step 3: So $$$(1+x)^3 = 1 + 3x + 3x^2 + x^3$$$, which matches the finite binomial theorem exactly. All terms from $$$r = 4$$$ onward contain the factor $$$0$$$. The general formula is completely consistent with the finite case ‚ÄĒ it just extends it to handle non-integer $$$n$$$ where the terms never reach zero.\n\nThis means you can think of the finite binomial theorem as a special case of the infinite series where the series \"conveniently terminates.\"", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_11", "judge_pick": false}, {"question": "If $$$\\mathrm{f}(x) = (2+x)(1+5x)^{-1/2}$$$, what is the validity condition on $$$x$$$, and how do you find the coefficient of $$$x^2$$$ in the expansion? (4 steps)", "answer": "- Step 1: The factor $$$(1+5x)^{-1/2}$$$ requires $$$|5x| < 1$$$, so the validity condition is $$$|x| < \\frac{1}{5}$$$. The factor $$$(2+x)$$$ is just a polynomial and doesn't impose any additional restriction.\n- Step 2: Expand $$$(1+5x)^{-1/2}$$$ up to $$$x^2$$$: $$(1+5x)^{-1/2} = 1 + (-\\tfrac{1}{2})(5x) + \\frac{(-\\tfrac{1}{2})(-\\tfrac{3}{2})}{2!}(5x)^2 + \\dots = 1 - \\frac{5}{2}x + \\frac{75}{8}x^2 + \\dots$$\n- Step 3: Now multiply by $$$(2+x)$$$: $$\\mathrm{f}(x) = (2+x)\\left(1 - \\frac{5}{2}x + \\frac{75}{8}x^2 + \\dots\\right)$$\n- Step 4: The $$$x^2$$$ term comes from two contributions:\n+ $$$2 \\times \\frac{75}{8}x^2 = \\frac{150}{8}x^2 = \\frac{75}{4}x^2$$$\n+ $$$x \\times (-\\frac{5}{2}x) = -\\frac{5}{2}x^2 = -\\frac{10}{4}x^2$$$\nAdding: $$$\\frac{75}{4} - \\frac{10}{4} = \\frac{65}{4}$$$. So the coefficient of $$$x^2$$$ is $$$\\frac{65}{4}$$$.\n\nWhen multiplying a polynomial by a series, each term in the result can come from multiple pairings ‚ÄĒ you must identify ALL ways to produce each power of $$$x$$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_12", "judge_pick": false}, {"question": "To expand $$$(a+bx)^n$$$ using the binomial series, what algebraic manipulation is required, and why? Walk through the key step. (2 steps)", "answer": "- Step 1: The binomial expansion formula applies to $$$(1+\\text{something})^n$$$. The expression $$$(a+bx)^n$$$ does not start with $$$1$$$, so we must factor out $$$a$$$ to create the required form: $$(a+bx)^n = \\left(a\\left(1+\\frac{b}{a}x\\right)\\right)^n = a^n\\left(1+\\frac{b}{a}x\\right)^n$$ Now the bracket has the form $$$(1+\\text{something})^n$$$ and we can apply the standard expansion.\n- Step 2: The critical point is that $$$a^n$$$ sits **outside** the expansion and must be multiplied through **every term** in the result. A common error is to compute the expansion of $$$(1+\\frac{b}{a}x)^n$$$ and forget to multiply by $$$a^n$$$ at the end.\n\nFor example, $$$\\sqrt{4+x} = (4+x)^{1/2} = 4^{1/2}(1+\\frac{x}{4})^{1/2} = 2(1+\\frac{x}{4})^{1/2}$$$. The factor of 2 must multiply every term.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_13", "judge_pick": true}, {"question": "Derive the validity condition $$$|x| < \\left|\\frac{a}{b}\\right|$$$ for the expansion of $$$(a+bx)^n$$$ from first principles. (3 steps)", "answer": "- Step 1: After factoring, we have $$$(a+bx)^n = a^n(1+\\frac{b}{a}x)^n$$$. The standard binomial expansion $$$(1+y)^n$$$ is valid for $$$|y| < 1$$$.\n- Step 2: In our expansion, the role of $$$y$$$ is played by $$$\\frac{b}{a}x$$$. So the validity condition is: $$\\left|\\frac{b}{a}x\\right| < 1$$\n- Step 3: Rearranging: $$|x| < \\frac{1}{|b/a|} = \\left|\\frac{a}{b}\\right|$$ For example, $$$(2+3x)^{-2} = \\frac{1}{4}(1+\\frac{3x}{2})^{-2}$$$ requires $$$|\\frac{3x}{2}| < 1$$$, i.e., $$$|x| < \\frac{2}{3}$$$.\n\nThe larger $$$|b|$| is relative to $$$|a|$$$, the smaller the valid range of $$$x$$$. This makes intuitive sense: if $$$bx$$$ grows quickly compared to $$$a$$$, the series diverges sooner.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_14", "judge_pick": false}, {"question": "Walk through the expansion of $$$\\sqrt{4+x}$$$ up to and including the $$$x^3$$$ term, and state the validity condition. (4 steps)", "answer": "- Step 1: Rewrite in index form and factor: $$\\sqrt{4+x} = (4+x)^{1/2} = \\left(4\\left(1+\\frac{x}{4}\\right)\\right)^{1/2} = 4^{1/2}\\left(1+\\frac{x}{4}\\right)^{1/2} = 2\\left(1+\\frac{x}{4}\\right)^{1/2}$$\n- Step 2: Expand $$$(1+\\frac{x}{4})^{1/2}$$$ using $$$n = \\frac{1}{2}$$$: $$= 1 + \\frac{1}{2}\\left(\\frac{x}{4}\\right) + \\frac{\\frac{1}{2}(-\\frac{1}{2})}{2!}\\left(\\frac{x}{4}\\right)^2 + \\frac{\\frac{1}{2}(-\\frac{1}{2})(-\\frac{3}{2})}{3!}\\left(\\frac{x}{4}\\right)^3 + \\dots$$\n- Step 3: Simplify:\n+ $$$x$$$ term: $$$\\frac{1}{2} \\cdot \\frac{x}{4} = \\frac{x}{8}$$$\n+ $$$x^2$$$ term: $$$\\frac{-1/4}{2} \\cdot \\frac{x^2}{16} = -\\frac{x^2}{128}$$$\n+ $$$x^3$$$ term: $$$\\frac{3/8}{6} \\cdot \\frac{x^3}{64} = \\frac{1}{16} \\cdot \\frac{x^3}{64} = \\frac{x^3}{1024}$$$\nSo $$$(1+\\frac{x}{4})^{1/2} = 1 + \\frac{x}{8} - \\frac{x^2}{128} + \\frac{x^3}{1024} + \\dots$$$\n- Step 4: Multiply through by 2: $$\\sqrt{4+x} = 2 + \\frac{x}{4} - \\frac{x^2}{64} + \\frac{x^3}{512} + \\dots$$ Validity condition: $$$|\\frac{x}{4}| < 1$$$, i.e., $$$|x| < 4$$$.\n\nNotice how factoring out the 4 converts the problem into a standard form, and the factor of 2 multiplies every coefficient in the final answer.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_15", "judge_pick": false}, {"question": "Expand $$$\\frac{1}{(2+3x)^2}$$$ up to and including the $$$x^3$$$ term, and state the validity condition. (3 steps)", "answer": "- Step 1: Rewrite and factor: $$\\frac{1}{(2+3x)^2} = (2+3x)^{-2} = \\left(2\\left(1+\\frac{3x}{2}\\right)\\right)^{-2} = 2^{-2}\\left(1+\\frac{3x}{2}\\right)^{-2} = \\frac{1}{4}\\left(1+\\frac{3x}{2}\\right)^{-2}$$\n- Step 2: Expand $$$(1+\\frac{3x}{2})^{-2}$$$ with $$$n = -2$$$: $$= 1 + (-2)\\left(\\frac{3x}{2}\\right) + \\frac{(-2)(-3)}{2!}\\left(\\frac{3x}{2}\\right)^2 + \\frac{(-2)(-3)(-4)}{3!}\\left(\\frac{3x}{2}\\right)^3 + \\dots$$ $$= 1 - 3x + \\frac{6}{2}\\cdot\\frac{9x^2}{4} + \\frac{(-24)}{6}\\cdot\\frac{27x^3}{8} + \\dots = 1 - 3x + \\frac{27x^2}{4} - \\frac{27x^3}{2} + \\dots$$\n- Step 3: Multiply by $$$\\frac{1}{4}$$$: $$\\frac{1}{(2+3x)^2} = \\frac{1}{4} - \\frac{3}{4}x + \\frac{27}{16}x^2 - \\frac{27}{8}x^3 + \\dots$$ Validity: $$$|\\frac{3x}{2}| < 1$$$, i.e., $$$|x| < \\frac{2}{3}$$$.\n\nThe common mistake is to forget the $$$\\frac{1}{4}$$$ factor ‚ÄĒ every term must be divided by 4.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_16", "judge_pick": false}, {"question": "The first three terms in the expansion of $$$\\frac{1}{\\sqrt{a+bx}}$$$ are $$$3 + \\frac{1}{3}x + \\frac{1}{18}x^2 + \\dots$$$. How do you find $$$a$$$ and $$$b$$$? (4 steps)", "answer": "- Step 1: Rewrite and factor: $$\\frac{1}{\\sqrt{a+bx}} = (a+bx)^{-1/2} = a^{-1/2}\\left(1+\\frac{b}{a}x\\right)^{-1/2}$$ The expansion starts: $$a^{-1/2}\\left(1 - \\frac{1}{2}\\cdot\\frac{b}{a}x + \\frac{(-\\frac{1}{2})(-\\frac{3}{2})}{2!}\\cdot\\frac{b^2}{a^2}x^2 + \\dots\\right)$$\n- Step 2: The constant term is $$$a^{-1/2} = \\frac{1}{\\sqrt{a}}$$$. Set this equal to 3: $$\\frac{1}{\\sqrt{a}} = 3 \\implies \\sqrt{a} = \\frac{1}{3} \\implies a = \\frac{1}{9}$$\n- Step 3: The $$$x$$$ coefficient is $$$a^{-1/2} \\cdot (-\\frac{1}{2}) \\cdot \\frac{b}{a} = 3 \\cdot (-\\frac{1}{2}) \\cdot \\frac{b}{1/9} = 3 \\cdot (-\\frac{1}{2}) \\cdot 9b = -\\frac{27b}{2}$$$. Set this equal to $$$\\frac{1}{3}$$$: $$-\\frac{27b}{2} = \\frac{1}{3} \\implies b = -\\frac{2}{81}$$\n- Step 4: Verify with the $$$x^2$$$ coefficient: it should be $$$a^{-1/2} \\cdot \\frac{3}{8} \\cdot \\frac{b^2}{a^2} = 3 \\cdot \\frac{3}{8} \\cdot \\frac{4/6561}{1/81} = 3 \\cdot \\frac{3}{8} \\cdot \\frac{4 \\cdot 81}{6561} = 3 \\cdot \\frac{3}{8} \\cdot \\frac{324}{6561}$$$. This approach of matching coefficients is systematic: always start with the constant term (which gives $$$a$$$), then use the $$$x$$$ term (which gives $$$b$$$).\n\nThe key strategy is to match the expansion coefficients to the given values, starting from the simplest (constant term) and working up.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_17", "judge_pick": false}, {"question": "A student expands $$$(3+x)^{-1}$$$ as $$$1 - \\frac{x}{3} + \\frac{x^2}{9} - \\dots$$$. Identify the error and explain what the correct expansion should be. (3 steps)", "answer": "- Step 1: The student forgot to factor out the leading coefficient. $$$(3+x)^{-1}$$$ must first be written as $$$(3(1+\\frac{x}{3}))^{-1} = 3^{-1}(1+\\frac{x}{3})^{-1} = \\frac{1}{3}(1+\\frac{x}{3})^{-1}$$$. The student expanded as if the expression were $$$(1+\\frac{x}{3})^{-1}$$$ and forgot the factor of $$$\\frac{1}{3}$$$.\n- Step 2: The correct expansion of $$$(1+\\frac{x}{3})^{-1}$$$ is: $$1 - \\frac{x}{3} + \\frac{x^2}{9} - \\frac{x^3}{27} + \\dots$$ But this must be multiplied by $$$\\frac{1}{3}$$$.\n- Step 3: The correct expansion is: $$\\frac{1}{3} - \\frac{x}{9} + \\frac{x^2}{27} - \\frac{x^3}{81} + \\dots$$ Every term must be divided by 3. The student's answer is 3 times too large for every coefficient.\n\nThis is one of the most common errors in binomial expansions: forgetting that the factor $$$a^n$$$ multiplies **every** term in the expansion, not just the first one.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_18", "judge_pick": true}, {"question": "If $$$\\mathrm{f}(x) = (2+x)(1+5x)^{-1/2}$$$, explain two different approaches to find the coefficient of $$$x^2$$$, and show they give the same answer. (4 steps)", "answer": "- Step 1: First approach ‚ÄĒ expand $$$(1+5x)^{-1/2}$$$ up to $$$x^2$$$, then multiply by $$$(2+x)$$$: $$(1+5x)^{-1/2} = 1 - \\frac{5}{2}x + \\frac{75}{8}x^2 + \\dots$$\n- Step 2: Multiply by $$$(2+x)$$$: $$\\mathrm{f}(x) = (2+x)\\left(1 - \\frac{5}{2}x + \\frac{75}{8}x^2 + \\dots\\right)$$ The $$$x^2$$$ contributions are: $$$2 \\times \\frac{75}{8}x^2 + x \\times (-\\frac{5}{2}x) = \\frac{75}{4}x^2 - \\frac{5}{2}x^2 = \\frac{65}{4}x^2$$$\n- Step 3: Second approach ‚ÄĒ expand further to $$$x^3$$$ and collect all terms systematically. This is really the same method but being more thorough about tracking all pairings. The key insight is that the product of a polynomial of degree 1 and a series produces the $$$x^2$$$ term from exactly two pairings: the constant from one factor times the $$$x^2$$$ from the other, plus the $$$x^1$$$ from one factor times the $$$x^1$$$ from the other.\n- Step 4: Both approaches give the coefficient of $$$x^2$$$ as $$$\\frac{65}{4}$$$. The method of systematically identifying all pairings (constant √ó $$$x^2$$$ term + $$$x$$$ √ó $$$x$$$ term) is foolproof and generalizable to any product of series.\n\nWhen multiplying a polynomial by a series, always ask: \"what pairs of terms produce the desired power of $$$x$$$?\"", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_19", "judge_pick": false}, {"question": "Why is the partial fraction technique useful for expanding rational expressions like $$$\\frac{4-5x}{(1+x)(2-x)}$$$? What advantage does it provide over direct expansion? (2 steps)", "answer": "- Step 1: The expression $$$\\frac{4-5x}{(1+x)(2-x)}$$$ cannot be expanded directly as a single binomial expansion because it is not of the form $$$(1+\\text{something})^n$$$. However, by splitting into partial fractions ‚ÄĒ $$\\frac{4-5x}{(1+x)(2-x)} = \\frac{3}{1+x} - \\frac{2}{2-x}$$ ‚ÄĒ each fraction IS of the form $$$(1+\\text{something})^n$$$ (or can be rearranged to be), so each can be expanded separately using the binomial theorem.\n- Step 2: The two separate expansions are then combined (added/subtracted term by term). This is much more manageable than trying to expand the original fraction directly, which would require messy long division or other techniques. Partial fractions convert one difficult problem into two (or more) straightforward binomial expansions.\n\nPartial fractions transform a single complicated expression into a sum of simpler ones, each of which is in the standard binomial expansion form.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_20", "judge_pick": false}, {"question": "State the step-by-step process for expanding a rational function $$$\\frac{f(x)}{g(x)}$$$ using partial fractions. (4 steps)", "answer": "- Step 1: **Check degrees** ‚ÄĒ if the degree of the numerator is greater than or equal to the degree of the denominator, perform polynomial long division first to write the expression in the form $$$\\text{polynomial} + \\frac{\\text{remainder}}{g(x)}$$$.\n- Step 2: **Express in partial fractions** ‚ÄĒ decompose $$$\\frac{\\text{remainder}}{g(x)}$$$ into a sum of simpler fractions. For example, $$$\\frac{A}{1+px} + \\frac{B}{1+qx}$$$ for distinct linear factors, or include terms like $$$\\frac{C}{(1+px)^2}$$$ for repeated factors.\n- Step 3: **Expand each partial fraction** using the binomial theorem. Each fraction like $$$\\frac{A}{1+px} = A(1+px)^{-1}$$$ is in the standard form $$$(1+\\text{something})^n$$$. Determine the validity condition for each.\n- Step 4: **Combine the expansions** by adding/subtracting term by term, collecting like powers of $$$x$$$. The overall validity condition is the **intersection** (most restrictive) of all the individual validity conditions.\n\nThe key insight: partial fractions break a hard problem into easy sub-problems, each solvable by the standard binomial expansion.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_21", "judge_pick": false}, {"question": "Express $$$\\frac{4-5x}{(1+x)(2-x)}$$$ as partial fractions, find the cubic approximation, and determine the validity condition. (5 steps)", "answer": "- Step 1: Set up partial fractions: $$\\frac{4-5x}{(1+x)(2-x)} = \\frac{A}{1+x} + \\frac{B}{2-x}$$ Multiply through by $$$(1+x)(2-x)$$$: $$$4-5x = A(2-x) + B(1+x)$$$. Substitute $$$x = -1$$$: $$$9 = 3A \\implies A = 3$$$. Substitute $$$x = 2$$$: $$$-6 = 3B \\implies B = -2$$$.\n- Step 2: So: $$\\frac{4-5x}{(1+x)(2-x)} = \\frac{3}{1+x} - \\frac{2}{2-x} = 3(1+x)^{-1} - 2(2-x)^{-1}$$\n- Step 3: Expand each term. For $$$3(1+x)^{-1}$$$: $$3(1 - x + x^2 - x^3 + \\dots) = 3 - 3x + 3x^2 - 3x^3 + \\dots$$ For $$$2(2-x)^{-1}$$$: $$2 \\cdot 2^{-1}(1-\\frac{x}{2})^{-1} = (1-\\frac{x}{2})^{-1} = 1 + \\frac{x}{2} + \\frac{x^2}{4} + \\frac{x^3}{8} + \\dots$$\n- Step 4: Combine: $$(3 - 3x + 3x^2 - 3x^3) - (1 + \\frac{x}{2} + \\frac{x^2}{4} + \\frac{x^3}{8}) = 2 - \\frac{7x}{2} + \\frac{11x^2}{4} - \\frac{25x^3}{8} + \\dots$$\n- Step 5: Validity conditions: $$$\\frac{3}{1+x}$$$ requires $$$|x| < 1$$$. $$$\\frac{2}{2-x}$$$ requires $$$|\\frac{x}{2}| < 1$$$, i.e., $$$|x| < 2$$$. The overall validity condition is the intersection: $$$|x| < 1$$$.\n\nThe most restrictive condition \"wins\" ‚ÄĒ both expansions must converge simultaneously.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_22", "judge_pick": false}, {"question": "When a rational function is split into partial fractions, each with its own validity condition, how do you determine the overall validity condition for the combined expansion? Give a concrete example. (2 steps)", "answer": "- Step 1: The overall validity condition is the **intersection** of all individual validity conditions. The expansion is only valid where ALL component series converge simultaneously. This means you take the **most restrictive** condition ‚ÄĒ the smallest interval.\n- Step 2: Example: If you have partial fractions $$$\\frac{A}{1+3x}$$$ (valid for $$$|x| < \\frac{1}{3}$$$) and $$$\\frac{B}{1-x}$$$ (valid for $$$|x| < 1$$$), then the combined expansion is valid for $$$|x| < \\frac{1}{3}$$$ ‚ÄĒ the more restrictive of the two conditions. Even though the second series converges for a wider range, the first diverges when $$$|x| \\geq \\frac{1}{3}$$$, making the whole sum unreliable beyond that point.\n\nThink of it as a \"weakest link\" principle: the overall expansion is only as valid as its most restrictive component.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_23", "judge_pick": true}, {"question": "When expanding $$$\\frac{2x^2+7x-6}{(x+5)(x-4)}$$$ using partial fractions, why must you perform polynomial long division first, and what does the result look like? (3 steps)", "answer": "- Step 1: The numerator has degree 2 and the denominator has degree 2. Since the degrees are equal, this is an **improper fraction**. You cannot directly express it as a sum of proper partial fractions (where each numerator has lower degree than its denominator).\n- Step 2: Perform polynomial long division: $$$\\frac{2x^2+7x-6}{(x+5)(x-4)} = \\frac{2x^2+7x-6}{x^2+x-20}$$$. Dividing: $$$2x^2+7x-6 = 2(x^2+x-20) + 5x + 34$$$, so: $$\\frac{2x^2+7x-6}{(x+5)(x-4)} = 2 + \\frac{5x+34}{(x+5)(x-4)}$$\n- Step 3: Now decompose the proper fraction: $$$\\frac{5x+34}{(x+5)(x-4)} = \\frac{A}{x+5} + \\frac{B}{x-4}$$$, and then expand each part. The constant \"2\" is already a polynomial and doesn't need expansion.\n\nThe rule: if degree(numerator) ‚Č• degree(denominator), divide first. The polynomial part is already \"expanded\" ‚ÄĒ you only need to expand the proper fraction remainder.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_24", "judge_pick": true}, {"question": "How do you calculate the percentage error when using a binomial expansion to approximate a function value? Walk through the formula and its meaning. (2 steps)", "answer": "- Step 1: The percentage error formula is: $$\\text{Percentage error} = \\frac{|\\text{exact value} - \\text{approximate value}|}{|\\text{exact value}|} \\times 100\\%$$ The absolute value ensures the error is always positive, and we divide by the exact value (not the approximation) to get a meaningful relative measure.\n- Step 2: For example, if the exact value is $$$1.4142$$$ and the approximation gives $$$1.4140$$$, then: $$\\text{Percentage error} = \\frac{|1.4142 - 1.4140|}{1.4142} \\times 100\\% = \\frac{0.0002}{1.4142} \\times 100\\% \\approx 0.014\\%$$ A small percentage error means the approximation is good. Using more terms in the binomial expansion typically reduces the percentage error.\n\nThe key principle: percentage error measures the relative accuracy of the approximation, not just the absolute difference.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_25", "judge_pick": false}, {"question": "When expanding an expression with a repeated linear factor in the denominator, like $$$\\frac{12x+5}{(1+4x)^2}$$$, how do you set up and use partial fractions? (3 steps)", "answer": "- Step 1: For a repeated factor $$$(1+4x)^2$$$, the partial fraction decomposition includes both $$$(1+4x)$$$ and $$$(1+4x)^2$$$: $$\\frac{12x+5}{(1+4x)^2} = \\frac{A}{1+4x} + \\frac{B}{(1+4x)^2}$$ Multiply through by $$$(1+4x)^2$$$: $$$12x+5 = A(1+4x) + B$$$\n- Step 2: Solve for $$$A$$$ and $$$B$$$: comparing coefficients, $$$12x + 5 = 4Ax + (A+B)$$$, so $$$4A = 12 \\implies A = 3$$$ and $$$A + B = 5 \\implies B = 2$$$.\n- Step 3: Now expand each term: $$\\frac{3}{1+4x} = 3(1+4x)^{-1} = 3(1 - 4x + 16x^2 - \\dots)$$ $$\\frac{2}{(1+4x)^2} = 2(1+4x)^{-2} = 2(1 - 8x + 48x^2 - \\dots)$$ Both expansions are valid for $$$|4x| < 1$$$, i.e., $$$|x| < \\frac{1}{4}$$$.\n\nFor a repeated factor $$$(1+px)^k$$$, you need terms with denominators $$$(1+px), (1+px)^2, \\dots, (1+px)^k$$$ ‚ÄĒ one for each power up to $$$k$$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_26", "judge_pick": false}, {"question": "Given $$$\\mathrm{g}(x) = \\frac{3+5x}{(1+3x)(1-x)}$$$, express in partial fractions, expand up to $$$x^2$$$, and state the validity condition. (4 steps)", "answer": "- Step 1: Set up: $$$\\frac{3+5x}{(1+3x)(1-x)} = \\frac{A}{1+3x} + \\frac{B}{1-x}$$$. Multiply by $$$(1+3x)(1-x)$$$: $$$3+5x = A(1-x) + B(1+3x)$$$. Set $$$x = 1$$$: $$$8 = 4B \\implies B = 2$$$. Set $$$x = -\\frac{1}{3}$$$: $$$3 - \\frac{5}{3} = A \\cdot \\frac{4}{3} \\implies \\frac{4}{3} = \\frac{4A}{3} \\implies A = 1$$$.\n- Step 2: So: $$$\\frac{3+5x}{(1+3x)(1-x)} = \\frac{1}{1+3x} + \\frac{2}{1-x} = (1+3x)^{-1} + 2(1-x)^{-1}$$$\n- Step 3: Expand each: $$$(1+3x)^{-1} = 1 - 3x + 9x^2 - \\dots$$$ (valid for $$$|x| < \\frac{1}{3}$$$) $$2(1-x)^{-1} = 2(1 + x + x^2 + \\dots) = 2 + 2x + 2x^2 + \\dots$$$ (valid for $$$|x| < 1$$$)\n- Step 4: Combine: $$3 + (2-3)x + (9+2)x^2 + \\dots = 3 - x + 11x^2 + \\dots$$ Validity: the intersection of $$$|x| < \\frac{1}{3}$$$ and $$$|x| < 1$$$ is $$$|x| < \\frac{1}{3}$$$.\n\nThe more restrictive condition (${|x| < \\frac{1}{3}|}$) governs the overall validity.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_27", "judge_pick": false}, {"question": "Given $$$\\mathrm{f}(x) = \\frac{12x-1}{(1+2x)(1-3x)}$$$, find the partial fractions, expand to $$$x^2$$$, and determine the validity condition. (4 steps)", "answer": "- Step 1: Set up: $$$\\frac{12x-1}{(1+2x)(1-3x)} = \\frac{A}{1+2x} + \\frac{B}{1-3x}$$$. Multiply: $$$12x-1 = A(1-3x) + B(1+2x)$$$. Set $$$x = \\frac{1}{3}$$$: $$$4-1 = B \\cdot \\frac{5}{3} \\implies 3 = \\frac{5B}{3} \\implies B = \\frac{9}{5}$$$. Set $$$x = -\\frac{1}{2}$$$: $$$-6-1 = A \\cdot \\frac{5}{2} \\implies -7 = \\frac{5A}{2} \\implies A = -\\frac{14}{5}$$$.\n- Step 2: So: $$$\\mathrm{f}(x) = -\\frac{14}{5}(1+2x)^{-1} + \\frac{9}{5}(1-3x)^{-1}$$$\n- Step 3: Expand each: $$-\\frac{14}{5}(1+2x)^{-1} = -\\frac{14}{5}(1 - 2x + 4x^2 - \\dots) = -\\frac{14}{5} + \\frac{28}{5}x - \\frac{56}{5}x^2 + \\dots$$ $$\\frac{9}{5}(1-3x)^{-1} = \\frac{9}{5}(1 + 3x + 9x^2 + \\dots) = \\frac{9}{5} + \\frac{27}{5}x + \\frac{81}{5}x^2 + \\dots$$\n- Step 4: Combine: $$\\left(-\\frac{14}{5} + \\frac{9}{5}\\right) + \\left(\\frac{28}{5} + \\frac{27}{5}\\right)x + \\left(-\\frac{56}{5} + \\frac{81}{5}\\right)x^2 + \\dots = -1 + 11x + 5x^2 + \\dots$$ Validity: $$$|2x| < 1$$$ gives $$$|x| < \\frac{1}{2}$$$; $$$|3x| < 1$$$ gives $$$|x| < \\frac{1}{3}$$$. Overall: $$$|x| < \\frac{1}{3}$$$.\n\nNote how the validity is determined by the tighter constraint. The expansion with the larger coefficient of $$$x$$$ (here $$$3x$$$) converges over a smaller range.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_28", "judge_pick": false}, {"question": "A student is asked to expand $$$\\frac{3x^2+4x-5}{(x+3)(x-2)}$$$ and writes it directly as partial fractions. What step must they do first, and why? (2 steps)", "answer": "- Step 1: The numerator $$$3x^2+4x-5$$$ has degree 2, and the denominator $$$(x+3)(x-2) = x^2+x-6$$$ also has degree 2. Since the degrees are equal, the fraction is **improper** and must be simplified by polynomial long division before partial fractions can be applied.\n- Step 2: Dividing: $$$\\frac{3x^2+4x-5}{x^2+x-6} = 3 + \\frac{x+13}{x^2+x-6}$$$. Now the remainder $$$\\frac{x+13}{(x+3)(x-2)}$$$ is a proper fraction (numerator degree 1 < denominator degree 2) and can be decomposed into partial fractions. The constant 3 is already a polynomial and needs no expansion.\n\nIf you skip this step, the partial fraction decomposition won't work correctly ‚ÄĒ you can't express an improper fraction as a sum of proper fractions alone.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_29", "judge_pick": true}, {"question": "The expression $$$\\mathrm{h}(x) = \\frac{6}{1+5x} - \\frac{4}{1-3x}$$$ is expanded up to $$$x^2$$$. If $$$x = 0.5$$$, explain why the expansion cannot be used, even though the exact function is well-defined. (3 steps)", "answer": "- Step 1: Check the validity conditions. The expansion of $$$\\frac{6}{1+5x} = 6(1+5x)^{-1}$$$ requires $$$|5x| < 1$$$, i.e., $$$|x| < \\frac{1}{5} = 0.2$$$. The expansion of $$$\\frac{4}{1-3x} = 4(1-3x)^{-1}$$$ requires $$$|3x| < 1$$$, i.e., $$$|x| < \\frac{1}{3} \\approx 0.33$$$.\n- Step 2: With $$$x = 0.5$$$, both validity conditions are violated. The series for $$$\\frac{6}{1+5(0.5)} = \\frac{6}{3.5}$$$ would involve terms like $$$6 \\cdot 5 \\cdot (0.5) = 15$$$, $$$6 \\cdot 25 \\cdot (0.5)^2 = 37.5$$$, etc. ‚ÄĒ the terms grow, not shrink, so the series diverges.\n- Step 3: Even though the original function $$$\\mathrm{h}(0.5) = \\frac{6}{3.5} - \\frac{4}{-0.5} = 1.714 + 8 = 9.714$$$ is perfectly well-defined, the binomial expansion series does not converge at $$$x = 0.5$$$. The expansion only approximates the function within its radius of convergence; outside that radius, the series is meaningless even though the function exists.\n\nThis is a crucial distinction: the function may exist everywhere (except at its poles), but the series representation only works within the convergence interval.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_30", "judge_pick": true}, {"question": "Expand $$$\\mathrm{f}(x) = \\frac{1+x}{1-2x}$$$ up to and including $$$x^3$$$, and state the validity condition. (4 steps)", "answer": "- Step 1: Write as a product: $$$\\mathrm{f}(x) = (1+x)(1-2x)^{-1}$$$. The factor $$$(1-2x)^{-1}$$$ requires $$$|2x| < 1$$$, i.e., $$$|x| < \\frac{1}{2}$$$.\n- Step 2: Expand $$$(1-2x)^{-1}$$$ up to $$$x^3$$$: $$(1-2x)^{-1} = 1 + (-1)(-2x) + \\frac{(-1)(-2)}{2!}(-2x)^2 + \\frac{(-1)(-2)(-3)}{3!}(-2x)^3 + \\dots$$ $$= 1 + 2x + 4x^2 + 8x^3 + \\dots$$ (This is a geometric series with common ratio $$$2x$$$.)\n- Step 3: Multiply by $$$(1+x)$$$: $$(1+x)(1 + 2x + 4x^2 + 8x^3 + \\dots)$$ Collecting terms:\n+ Constant: $$$1$$$\n+ $$$x$$$: $$$1 \\cdot 2x + x \\cdot 1 = 3x$$$\n+ $$$x^2$$$: $$$1 \\cdot 4x^2 + x \\cdot 2x = 6x^2$$$\n+ $$$x^3$$$: $$$1 \\cdot 8x^3 + x \\cdot 4x^2 = 12x^3$$$\n- Step 4: Result: $$$\\mathrm{f}(x) = 1 + 3x + 6x^2 + 12x^3 + \\dots$$$, valid for $$$|x| < \\frac{1}{2}$$$.\n\nNotice the pattern: each coefficient is $$$3 \\cdot 2^{n-1}$$$ for the $$$x^n$$$ term ‚ÄĒ this makes sense because the product of a geometric series and $$$(1+x)$$$ produces another geometric-like sequence.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_31", "judge_pick": false}, {"question": "Show that if $$$x$$$ is small, $$$\\sqrt{\\frac{1+x}{1-x}} \\approx 1 + x + \\frac{1}{2}x^2}$$$. Walk through the strategy and identify the validity condition. (4 steps)", "answer": "- Step 1: Write as a product: $$$\\sqrt{\\frac{1+x}{1-x}} = (1+x)^{1/2}(1-x)^{-1/2}$$$. We need to expand both factors.\n- Step 2: Expand each: $$$(1+x)^{1/2} = 1 + \\frac{1}{2}x + \\frac{\\frac{1}{2}(-\\frac{1}{2})}{2!}x^2 + \\dots = 1 + \\frac{x}{2} - \\frac{x^2}{8} + \\dots$$$\n$$(1-x)^{-1/2} = 1 + (-\\frac{1}{2})(-x) + \\frac{(-\\frac{1}{2})(-\\frac{3}{2})}{2!}(-x)^2 + \\dots = 1 + \\frac{x}{2} + \\frac{3x^2}{8} + \\dots$$ Both require $$$|x| < 1$$$.\n- Step 3: Multiply: $$(1 + \\frac{x}{2} - \\frac{x^2}{8} + \\dots)(1 + \\frac{x}{2} + \\frac{3x^2}{8} + \\dots)$$\n+ Constant: $$$1$$$\n+ $$$x$$$: $$$\\frac{x}{2} + \\frac{x}{2} = x$$$\n+ $$$x^2$$$: $$$-\\frac{x^2}{8} + \\frac{x}{2} \\cdot \\frac{x}{2} + \\frac{3x^2}{8} = -\\frac{1}{8} + \\frac{1}{4} + \\frac{3}{8} = \\frac{-1+2+3}{8} = \\frac{4}{8} = \\frac{1}{2}$$$\n- Step 4: So $$$\\sqrt{\\frac{1+x}{1-x}} \\approx 1 + x + \\frac{1}{2}x^2$$$, valid for $$$|x| < 1$$$. The phrase \"if $$$x$$$ is small\" means we can safely use the approximation because higher-order terms ($$$x^3, x^4, \\dots$$$) are negligible.\n\nThis is a powerful technique: when \"x is small,\" you can approximate complicated expressions using just the first few terms of their binomial expansions.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_32", "judge_pick": false}, {"question": "Use the expansion of $$$(1+x)^{1/2}$$$ with $$$x = \\frac{1}{4}$$$ to approximate $$$\\sqrt{5}$$$. First, explain why $$$x = \\frac{1}{4}$$$ gives $$$\\sqrt{5}$$$, then compute the approximation. (3 steps)", "answer": "- Step 1: When $$$x = \\frac{1}{4}$$$: $$$(1+x)^{1/2} = (1+\\frac{1}{4})^{1/2} = (\\frac{5}{4})^{1/2} = \\frac{\\sqrt{5}}{\\sqrt{4}} = \\frac{\\sqrt{5}}{2}$$$. So $$$(1+\\frac{1}{4})^{1/2} = \\frac{\\sqrt{5}}{2}$$$, which means $$$\\sqrt{5} = 2(1+\\frac{1}{4})^{1/2}$$$. Also, $$$x = \\frac{1}{4} < 1$$$, so the expansion is valid.\n- Step 2: Expand $$$(1+x)^{1/2}$$$ up to $$$x^3$$$: $$(1+x)^{1/2} = 1 + \\frac{1}{2}x - \\frac{1}{8}x^2 + \\frac{1}{16}x^3 + \\dots$$ Substitute $$$x = \\frac{1}{4}$$$: $$\\frac{\\sqrt{5}}{2} \\approx 1 + \\frac{1}{2} \\cdot \\frac{1}{4} - \\frac{1}{8} \\cdot \\frac{1}{16} + \\frac{1}{16} \\cdot \\frac{1}{64} = 1 + \\frac{1}{8} - \\frac{1}{128} + \\frac{1}{1024}$$ $$= 1 + 0.125 - 0.0078125 + 0.0009766 \\approx 1.1182$$\n- Step 3: Therefore $$$\\sqrt{5} \\approx 2 \\times 1.1182 = 2.2364$$$. The actual value is $$$\\sqrt{5} \\approx 2.2361$$$, so the approximation is excellent. Using more terms would improve accuracy further.\n\nThe strategy is always the same: choose $$$x$$$ so that $$$(1+x)^n$$$ relates algebraically to the target value, ensure $$$|x| < 1$$$, then substitute into the expansion.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_33", "judge_pick": false}, {"question": "What is the expansion of $$$\\frac{1}{\\sqrt{1+3x^2}}$$$ up to and including the $$$x^4$$$ term, and what is the validity condition? Note that the variable is $$$x^2$$$, not just $$$x$$$. (3 steps)", "answer": "- Step 1: We have $$$(1+3x^2)^{-1/2}$$$ with $$$n = -\\frac{1}{2}$$$ and the \"variable\" in the formula being $$$3x^2$$$ instead of $$$x$$$. The binomial expansion gives: $$(1+3x^2)^{-1/2} = 1 + (-\\frac{1}{2})(3x^2) + \\frac{(-\\frac{1}{2})(-\\frac{3}{2})}{2!}(3x^2)^2 + \\dots$$\n- Step 2: Simplify:\n+ $$$x^2$$$ term: $$$-\\frac{3}{2}x^2$$$\n+ $$$x^4$$$ term: $$$\\frac{3/4}{2} \\cdot 9x^4 = \\frac{3}{8} \\cdot 9x^4 = \\frac{27}{8}x^4$$$\nSo: $$\\frac{1}{\\sqrt{1+3x^2}} = 1 - \\frac{3}{2}x^2 + \\frac{27}{8}x^4 - \\dots$$\n- Step 3: The validity condition requires $$$|3x^2| < 1$$$, i.e., $$$x^2 < \\frac{1}{3}$$$, so $$$|x| < \\frac{1}{\\sqrt{3}}$$$. Notice that there are NO odd-powered terms ($$$x^1, x^3, x^5, \\dots$$$) because the expansion only involves powers of $$$x^2$$$.\n\nWhen the \"inner variable\" is $$$x^2$$$ (or any even power), the resulting expansion has only even powers of $$$x$$$, and the validity condition involves the constraint on $$$x^2$$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_34", "judge_pick": false}, {"question": "In the expansion of $$$(1+kx)^{-4}$$$, the coefficient of $$$x$$$ is 20. Find $$$k$$$, then find the coefficient of $$$x^2$$$. (3 steps)", "answer": "- Step 1: Write the expansion: $$$(1+kx)^{-4} = 1 + (-4)(kx) + \\frac{(-4)(-5)}{2!}(kx)^2 + \\dots = 1 - 4kx + 10k^2x^2 + \\dots$$$. The coefficient of $$$x$$$ is $$$-4k = 20$$$, so $$$k = -5$$$.\n- Step 2: The coefficient of $$$x^2$$$ involves $$$k^2$$$: $$$10k^2 = 10 \\times 25 = 250$$$. Note that the coefficient is positive regardless of whether $$$k = 5$$$ or $$$k = -5$$$, because it depends on $$$k^2$$$.\n- Step 3: Key observation: the coefficient of $$$x^r$$$ always involves $$$k^r$$$. So from the coefficient of $$$x$$$, you get a linear equation in $$$k$$$ (one solution), but from the coefficient of $$$x^2$$$ alone, you'd get a quadratic in $$$k$$$ (two possible solutions). Using both coefficients together, you can uniquely determine $$$k$$$.\n\nIf only the coefficient of $$$x^2$$$ were given, there would be two possible values of $$$k$$$ (positive and negative), and you'd need additional information to determine which one.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_35", "judge_pick": false}, {"question": "Expand $$$\\frac{1}{(2+3x)^2}$$$ up to and including $$$x^3$$$, showing each step of factoring and simplifying. (4 steps)", "answer": "- Step 1: Rewrite and factor: $$\\frac{1}{(2+3x)^2} = (2+3x)^{-2} = \\left(2\\left(1+\\frac{3x}{2}\\right)\\right)^{-2} = 2^{-2}\\left(1+\\frac{3x}{2}\\right)^{-2} = \\frac{1}{4}\\left(1+\\frac{3x}{2}\\right)^{-2}$$\n- Step 2: Expand $$$(1+\\frac{3x}{2})^{-2}$$$ with $$$n = -2$$$: $$1 + (-2)\\left(\\frac{3x}{2}\\right) + \\frac{(-2)(-3)}{2!}\\left(\\frac{3x}{2}\\right)^2 + \\frac{(-2)(-3)(-4)}{3!}\\left(\\frac{3x}{2}\\right)^3 + \\dots$$\n- Step 3: Simplify each term:\n+ $$$x$$$ term: $$$(-2) \\cdot \\frac{3x}{2} = -3x$$$\n+ $$$x^2$$$ term: $$$\\frac{6}{2} \\cdot \\frac{9x^2}{4} = 3 \\cdot \\frac{9x^2}{4} = \\frac{27x^2}{4}$$$\n+ $$$x^3$$$ term: $$$\\frac{-24}{6} \\cdot \\frac{27x^3}{8} = -4 \\cdot \\frac{27x^3}{8} = -\\frac{27x^3}{2}$$$\nSo $$$(1+\\frac{3x}{2})^{-2} = 1 - 3x + \\frac{27x^2}{4} - \\frac{27x^3}{2} + \\dots$$$\n- Step 4: Multiply every term by $$$\\frac{1}{4}$$$: $$\\frac{1}{(2+3x)^2} = \\frac{1}{4} - \\frac{3}{4}x + \\frac{27}{16}x^2 - \\frac{27}{8}x^3 + \\dots$$ Validity: $$$|\\frac{3x}{2}| < 1$$$, i.e., $$$|x| < \\frac{2}{3}$$$.\n\nNever forget to multiply the factor outside ($$$\\frac{1}{4}$$$) through ALL terms, not just the first one.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_36", "judge_pick": false}, {"question": "Expand $$$(16-3x)^{1/4}$$$ up to and including $$$x^2$$$, giving each coefficient as a simplified fraction, and state the validity condition. (4 steps)", "answer": "- Step 1: Factor out 16: $$(16-3x)^{1/4} = \\left(16\\left(1-\\frac{3x}{16}\\right)\\right)^{1/4} = 16^{1/4}\\left(1-\\frac{3x}{16}\\right)^{1/4} = 2\\left(1-\\frac{3x}{16}\\right)^{1/4}$$ since $$$16^{1/4} = 2$$$.\n- Step 2: Expand $$$(1-\\frac{3x}{16})^{1/4}$$$ with $$$n = \\frac{1}{4}$$$: $$1 + \\frac{1}{4}\\left(-\\frac{3x}{16}\\right) + \\frac{\\frac{1}{4}(-\\frac{3}{4})}{2!}\\left(-\\frac{3x}{16}\\right)^2 + \\dots$$\n- Step 3: Simplify:\n+ $$$x$$$ term: $$$\\frac{1}{4} \\cdot (-\\frac{3}{16})x = -\\frac{3x}{64}$$$\n+ $$$x^2$$$ term: $$$\\frac{-3/16}{2} \\cdot \\frac{9x^2}{256} = -\\frac{3}{32} \\cdot \\frac{9x^2}{256} = -\\frac{27x^2}{8192}$$$\nSo $$$(1-\\frac{3x}{16})^{1/4} = 1 - \\frac{3x}{64} - \\frac{27x^2}{8192} + \\dots$$$\n- Step 4: Multiply by 2: $$(16-3x)^{1/4} = 2 - \\frac{3x}{32} - \\frac{27x^2}{4096} + \\dots$$ Validity: $$$|\\frac{3x}{16}| < 1$$$, i.e., $$$|x| < \\frac{16}{3}$$$.\n\nTo approximate $$$\\sqrt[4]{15.7}$$$, set $$$16 - 3x = 15.7$$$, so $$$x = 0.1$$$, which satisfies $$$|x| < \\frac{16}{3}$$$. Then $$$\\sqrt[4]{15.7} \\approx 2 - \\frac{3(0.1)}{32} - \\frac{27(0.01)}{4096} \\approx 1.9906$$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_37", "judge_pick": false}, {"question": "When expanding $$$\\frac{2+x}{\\sqrt{1+5x}}$$$, you need to multiply two series. Explain why the validity condition is $$$|x| < \\frac{1}{5}$$$ and not a different value. (2 steps)", "answer": "- Step 1: The expression is $$$(2+x)(1+5x)^{-1/2}$$$. The factor $$$(2+x)$$$ is a polynomial ‚ÄĒ it has finitely many terms and is defined for all $$$x$$$, imposing no restriction. The factor $$$(1+5x)^{-1/2}$$$ is an infinite binomial series that converges only when $$$|5x| < 1$$$, i.e., $$$|x| < \\frac{1}{5}$$$.\n- Step 2: The overall validity is determined by the most restrictive condition among all factors. Since $$$(2+x)$$$ imposes no restriction, the only constraint comes from $$$(1+5x)^{-1/2}$$$. The expansion is valid for $$$|x| < \\frac{1}{5}$$$.\n\nA polynomial factor never restricts the validity ‚ÄĒ only infinite series do. The overall validity is always determined by the component with the tightest convergence requirement.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_38", "judge_pick": false}, {"question": "A student expands $$$(2+3x)^{-1}$$$ and writes the validity condition as $$$|x| < 1$$$. What is wrong with this reasoning, and what is the correct validity condition? (2 steps)", "answer": "- Step 1: The student has confused the validity condition for $$$(1+x)^{-1}$$$ (which is $$$|x| < 1$$$) with the condition for $$$(2+3x)^{-1}$$$. After factoring: $$$(2+3x)^{-1} = \\frac{1}{2}(1+\\frac{3x}{2})^{-1}$$$, the inner variable is $$$\\frac{3x}{2}$$$, not $$$x$$$.\n- Step 2: The correct validity condition requires $$$|\\frac{3x}{2}| < 1$$$, which gives $$$|x| < \\frac{2}{3}$$$. The factor of $$$\\frac{3}{2}$$$ \"squeezes\" the valid range from $$$|x| < 1$$$ down to $$$|x| < \\frac{2}{3}$$$. In general, for $$$(a+bx)^n$$$, the condition is $$$|x| < |\\frac{a}{b}|$$$.\n\nAlways remember: the validity condition applies to the entire expression inside the parentheses that replaces $$$x$$$ in the standard formula, not to $$$x$$$ itself. The coefficient of $$$x$$$ inside the brackets matters!", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_39", "judge_pick": false}], "count": 40}, "qwen_1": {"label": "Qwen 3 ‚Ď†", "cards": [{"question": "Why does the binomial expansion of $ (1 + x)^n $ become an infinite series when $ n $ is not a natural number? (3 steps)", "answer": "- Step 1: When $ n $ is a natural number, the expansion terminates because terms like $ \\binom{n}{r} $ become zero when $ r > n $.  \n- Step 2: For non-integer $ n $, the coefficients $ \\frac{n(n-1)(n-2)\\ldots(n - r + 1)}{r!} $ never equal zero.  \n- Step 3: Since no term is zero, the series continues infinitely. This is why expansions like $ (1 + x)^{-1} $ or $ (1 + x)^{1/2} $ have infinitely many terms.  \n\n**Takeaway:** Non-integer exponents eliminate zero coefficients, leading to infinite expansions.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_0", "judge_pick": false}, {"question": "What is the validity condition for the expansion of $ (1 + x)^n $, and why does it exist? (2 steps)", "answer": "- Step 1: The expansion is valid only when $ |x| < 1 $.  \n- Step 2: This ensures convergence. For $ |x| \\geq 1 $, terms in the infinite series grow in magnitude, causing divergence. For example, $ (1 + 1)^{-1} = 0.5 $, but the expansion $ 1 - 1 + 1 - 1 + \\ldots $ oscillates indefinitely.  \n\n**Takeaway:** The $ |x| < 1 $ condition guarantees the series converges to a finite value.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How does factoring out $ a $ from $ (a + bx)^n $ allow the use of the binomial expansion? (3 steps)", "answer": "- Step 1: Factor $ a $:  \n  $  \n  (a + bx)^n = a^n \\left(1 + \\frac{b}{a}x\\right)^n  \n  $  \n- Step 2: Apply the binomial expansion to $ \\left(1 + \\frac{b}{a}x\\right)^n $.  \n- Step 3: Multiply every term by $ a^n $.  \n  Example: $ \\sqrt{4 + x} = 2\\left(1 + \\frac{x}{4}\\right)^{1/2} $ expands to $ 2 + \\frac{x}{4} - \\frac{x^2}{64} + \\ldots $.  \n\n**Takeaway:** Factoring creates the $ (1 + \\text{small term})^n $ form required for the binomial series.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Derive the validity condition for $ (a + bx)^n $. (2 steps)", "answer": "- Step 1: The expansion of $ \\left(1 + \\frac{b}{a}x\\right)^n $ converges when $ \\left|\\frac{b}{a}x\\right| < 1 $.  \n- Step 2: Rearranging gives $ |x| < \\left|\\frac{a}{b}\\right| $.  \n  Example: $ \\frac{1}{(2 + 3x)^2} $ requires $ |3x/2| < 1 \\Rightarrow |x| < 2/3 $.  \n\n**Takeaway:** The validity depends on the ratio of the constants $ a $ and $ b $.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why are partial fractions used before expanding expressions like $ \\frac{4 - 5x}{(1 + x)(2 - x)} $? (2 steps)", "answer": "- Step 1: Partial fractions decompose the expression into simpler terms like $ \\frac{A}{1 + x} + \\frac{B}{2 - x} $, which can be individually expanded.  \n- Step 2: Each partial fraction expansion has its own validity range. The combined expansion is valid where both ranges overlap (e.g., $ |x| < 1 $ for $ \\frac{3}{1 + x} $ and $ |x| < 2 $ for $ \\frac{-2}{2 - x} $, so overall validity is $ |x| < 1 $).  \n\n**Takeaway:** Partial fractions simplify complex expansions and clarify validity conditions.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Expand $ (1 - 2x)^{1/2} $ up to $ x^3 $ and state its validity. (3 steps)", "answer": "- Step 1: Use the binomial formula:  \n  $  \n  (1 + x)^n = 1 + nx + \\frac{n(n-1)}{2!}x^2 + \\frac{n(n-1)(n-2)}{3!}x^3 + \\ldots  \n  $  \n  Substitute $ x \\rightarrow -2x $ and $ n = 1/2 $.  \n- Step 2: Compute terms:  \n  $  \n  1 + \\frac{1}{2}(-2x) + \\frac{\\frac{1}{2}(-\\frac{1}{2})}{2}(-2x)^2 + \\frac{\\frac{1}{2}(-\\frac{1}{2})(-\\frac{3}{2})}{6}(-2x)^3  \n  $  \n  Simplifies to $ 1 - x - \\frac{x^2}{2} - \\frac{x^3}{2} $.  \n- Step 3: Validity: $ |-2x| < 1 \\Rightarrow |x| < 0.5 $.  \n\n**Takeaway:** Substituting adjusted $ x $ and $ n $ into the binomial formula ensures correct expansion.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why does the expansion of $ \\sqrt{4 + x} $ involve multiplying each term by 2? (2 steps)", "answer": "- Step 1: Factor out 4:  \n  $  \n  \\sqrt{4 + x} = \\sqrt{4\\left(1 + \\frac{x}{4}\\right)} = 2\\left(1 + \\frac{x}{4}\\right)^{1/2}  \n  $  \n- Step 2: After expanding $ \\left(1 + \\frac{x}{4}\\right)^{1/2} $, multiply every term by 2.  \n  Example: The constant term becomes $ 2 \\times 1 = 2 $, linear term $ 2 \\times \\frac{x}{8} = \\frac{x}{4} $, etc.  \n\n**Takeaway:** Factoring introduces a scalar multiplier that scales the entire expansion.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What is the role of each partial fraction in determining the overall validity of an expansion? (2 steps)", "answer": "- Step 1: Each partial fraction has its own validity condition (e.g., $ |x| < 1 $ for $ \\frac{3}{1 + x} $, $ |x| < 2 $ for $ \\frac{-2}{2 - x} $).  \n- Step 2: The combined expansion is valid only where all individual conditions overlap. For $ \\frac{3}{1 + x} - \\frac{2}{2 - x} $, this is $ |x| < 1 $.  \n\n**Takeaway:** The narrowest validity range governs the entire expansion.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How can the expansion of $ \\frac{1}{(1 + 3x)^4} $ be approximated up to $ x^3 $? (3 steps)", "answer": "- Step 1: Express as $ (1 + 3x)^{-4} $.  \n- Step 2: Apply the binomial expansion:  \n  $  \n  1 + (-4)(3x) + \\frac{(-4)(-5)}{2}(3x)^2 + \\frac{(-4)(-5)(-6)}{6}(3x)^3  \n  $  \n  Simplifies to $ 1 - 12x + 90x^2 - 540x^3 $.  \n- Step 3: Validity: $ |3x| < 1 \\Rightarrow |x| < 1/3 $.  \n\n**Takeaway:** Adjust coefficients by multiplying $ b^r $ in $ (1 + bx)^n $.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why does the coefficient of $ x^2 $ in $ (1 + ax)^n $ depend on both $ a $ and $ n $? (2 steps)", "answer": "- Step 1: General term: $ \\frac{n(n-1)}{2} \\cdot (ax)^2 $.  \n- Step 2: Squaring $ a $ scales the coefficient, while $ n(n-1) $ accounts for combinatorial factors. Example: $ (1 + 5x)^3 $ has $ \\frac{3 \\cdot 2}{2} \\cdot 25x^2 = 75x^2 $.  \n\n**Takeaway:** Coefficients combine both the exponent and the linear term‚Äôs coefficient.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ‚Ď°", "cards": [{"question": "What is the general form of the binomial expansion for $(1+x)^n$ when $n$ is a rational number? Write the first three terms in the expansion and state the condition for validity. (3 steps)", "answer": "- Step 1: Start with the general formula for any real $n$: $(1+x)^n = 1 + nx + \\frac{n(n-1)}{2!}x^2 + \\frac{n(n-1)(n-2)}{3!}x^3 + \\ldots$.  \n- Step 2: Identify the first three terms:  \n  1. $1$ (constant term),  \n  2. $nx$ (linear term),  \n  3. $\\frac{n(n-1)}{2}x^2$ (quadratic term).  \n- Step 3: The expansion is valid only when $|x| < 1$, ensuring convergence of the infinite series.\n\n[Optional: one-sentence takeaway tying it together]  \nThe binomial expansion for non-integer $n$ produces an infinite series that converges only within $|x| < 1$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why does the binomial expansion of $(1+x)^n$ become infinite when $n$ is not a positive integer? Explain the role of the factorial denominator in the coefficients.", "answer": "- Step 1: When $n$ is a positive integer, the series terminates because $n - r + 1 = 0$ for some $r$, making all subsequent coefficients zero.  \n- Step 2: For non-integer $n$, $n - r + 1$ never equals zero, so terms continue infinitely.  \n- Step 3: The factorial in the denominator ($r!$) ensures terms decrease in magnitude for $|x| < 1$, allowing convergence despite being infinite.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_1", "judge_pick": false}, {"question": "What is the validity condition for the expansion of $(1+bx)^n$, and why does it depend on $b$? (2 steps)", "answer": "- Step 1: The expansion of $(1+bx)^n$ is valid when $|bx| < 1$, or $|x| < \\frac{1}{|b|}$.  \n- Step 2: The coefficient $b$ scales $x$, so the radius of convergence adjusts to prevent the series from diverging. Larger $|b|$ reduces the valid range of $x$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How do you rewrite $(a + bx)^n$ to apply the standard binomial expansion formula? Why is this necessary?", "answer": "- Step 1: Factor out $a^n$: $(a + bx)^n = a^n \\left(1 + \\frac{b}{a}x\\right)^n$.  \n- Step 2: This ensures the expression is in the form $(1 + \\text{something})^n$, matching the standard formula.  \n- Step 3: Without factoring, the expansion cannot be applied directly to expressions like $(a + bx)^n$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_3", "judge_pick": false}, {"question": "For the expansion of $(4 + x)^{1/2}$, what is the validity condition? (2 steps)", "answer": "- Step 1: Factor $4^{1/2}(1 + \\frac{x}{4})^{1/2} = 2(1 + \\frac{x}{4})^{1/2}$.  \n- Step 2: The validity condition is $|\\frac{x}{4}| < 1 \\Rightarrow |x| < 4$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How would you combine partial fractions with binomial expansion to approximate $\\frac{4-5x}{(1+x)(2-x)}$? (3 steps)", "answer": "- Step 1: Decompose into partial fractions: $\\frac{A}{1+x} + \\frac{B}{2-x}$.  \n- Step 2: Find constants $A=3$ and $B=-2$ via substitution or equating coefficients.  \n- Step 3: Expand each fraction separately: $3(1+x)^{-1} - 2(2-x)^{-1}$, then combine terms.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why is the validity range of a partial fraction-based expansion the intersection of individual ranges? (2 steps)", "answer": "- Step 1: Each partial fraction contributes its own validity condition (e.g., $|x| < 1$ for $\\frac{1}{1+x}$, $|x| < 2$ for $\\frac{1}{2-x}$).  \n- Step 2: The combined expansion is only valid where **all** individual conditions are satisfied (i.e., $|x| < 1$).", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_6", "judge_pick": false}, {"question": "What is the coefficient of $x^3$ in the expansion of $(1+x)^{-1}$, and how does its magnitude change in the series? (2 steps)", "answer": "- Step 1: Compute using the general formula: $\\frac{(-1)(-2)(-3)}{3!}x^3 = -1x^3$.  \n- Step 2: The magnitude remains constant (1), but the alternating sign ensures convergence since $|x| < 1$ reduces higher powers.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How does the expansion of $(1+x)^n$ for negative $n$ differ from that for positive $n$ in terms of convergence? (2 steps)", "answer": "- Step 1: For negative $n$, all coefficients are non-zero, leading to an infinite series.  \n- Step 2: The series converges only when $|x| < 1$; divergence occurs at $x = \\pm1$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_8", "judge_pick": false}, {"question": "What is the role of the factorial in the denominators of binomial coefficients? (2 steps)", "answer": "- Step 1: The factorial ($r!$) in the denominator ensures that terms decrease in magnitude for $|x| < 1$, even as $n(n-1)\\ldots(n-r+1)$ grows.  \n- Step 2: This decay allows infinite series to converge despite having infinitely many terms.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_9", "judge_pick": false}, {"question": "How would you approximate $\\sqrt{1-2x}$ up to $x^3$ and use it to estimate $\\sqrt{2}$? (3 steps)", "answer": "- Step 1: Rewrite $\\sqrt{1-2x} = (1-2x)^{1/2}$ and expand:  \n  $1 + \\frac{1}{2}(-2x) + \\frac{\\frac{1}{2}(-\\frac{1}{2})(-2x)^2}{2} + \\frac{\\frac{1}{2}(-\\frac{1}{2})(-\\frac{3}{2})(-2x)^3}{6}$.  \n- Step 2: Simplify to $1 - x - \\frac{x^2}{2} - \\frac{x^3}{2}$.  \n- Step 3: Substitute $x=0.01$: $\\sqrt{0.98} \\approx 1 - 0.01 - 0.00005 - 0.0000005$, then relate to $\\sqrt{2}$ via $\\frac{7\\sqrt{2}}{10} \\approx 0.9899495$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Why is the expansion of $(a+bx)^n$ valid when $|x| < \\frac{|a|}{|b|}$? (2 steps)", "answer": "- Step 1: Factor $a^n(1 + \\frac{b}{a}x)^n$. The validity requires $\\left|\\frac{b}{a}x\\right| < 1$.  \n- Step 2: Solve for $|x| < \\frac{|a|}{|b|}$, ensuring the scaled $x$ stays within the convergence radius.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_11", "judge_pick": false}, {"question": "How does the expansion of $\\frac{1}{(1+4x)^2}$ differ from $\\frac{1}{1+4x}$ in terms of coefficients and signs? (3 steps)", "answer": "- Step 1: For $\\frac{1}{1+4x} = (1+4x)^{-1}$, coefficients are $1 - 4x + 16x^2 - 64x^3 + \\ldots$.  \n- Step 2: For $\\frac{1}{(1+4x)^2} = (1+4x)^{-2}$, coefficients are $1 - 8x + 48x^2 - 256x^3 + \\ldots$.  \n- Step 3: The squared denominator increases the magnitude of coefficients faster and retains alternating signs.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_12", "judge_pick": false}, {"question": "What is the expansion of $(1+x)^{1/3}$ up to $x^3$, and how does fractionality affect the coefficients? (3 steps)", "answer": "- Step 1: Apply the binomial formula:  \n  $1 + \\frac{1}{3}x + \\frac{\\frac{1}{3}(-\\frac{2}{3})x^2}{2} + \\frac{\\frac{1}{3}(-\\frac{2}{3})(-\\frac{5}{3})x^3}{6}$.  \n- Step 2: Simplify to $1 + \\frac{1}{3}x - \\frac{1}{9}x^2 + \\frac{5}{81}x^3$.  \n- Step 3: Fractional exponents introduce negative and fractional coefficients, making the series more complex.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_13", "judge_pick": false}, {"question": "How does partial fraction decomposition simplify the expansion of $\\frac{2+x}{1-2x}$? (2 steps)", "answer": "- Step 1: Rewrite as $(2+x)(1-2x)^{-1}$, then expand $(1-2x)^{-1} = 1 + 2x + 4x^2 + 8x^3 + \\ldots$.  \n- Step 2: Multiply by $2+x$ and collect terms: $2(1 + 2x + 4x^2 + 8x^3) + x(1 + 2x + 4x^2 + 8x^3)$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_14", "judge_pick": false}, {"question": "What is the coefficient of $x^2$ in the expansion of $(2+x)(1-2x)^{-1}$? (3 steps)", "answer": "- Step 1: Expand $(1-2x)^{-1} = 1 + 2x + 4x^2 + 8x^3 + \\ldots$.  \n- Step 2: Multiply by $2+x$:  \n  $2 \\cdot 4x^2 + x \\cdot 2x = 8x^2 + 2x^2 = 10x^2$.  \n- Step 3: The coefficient is $10$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_15", "judge_pick": false}, {"question": "Why is the expansion of $(1+x)^{n}$ invalid at $x = 1$ when $n$ is negative? (2 steps)", "answer": "- Step 1: At $x=1$, the series becomes $1 + n + \\frac{n(n-1)}{2!} + \\ldots$, which diverges for negative $n$ (e.g., harmonic series for $n=-1$).  \n- Step 2: The validity condition $|x| < 1$ excludes $x=1$ to prevent divergence.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_16", "judge_pick": false}, {"question": "How does the expansion of $(1+x)^n$ behave as $n$ approaches infinity? (2 steps)", "answer": "- Step 1: For fixed $x$, the binomial coefficients grow rapidly as $n$ increases, but the factorial denominator keeps terms finite.  \n- Step 2: The expansion remains an infinite series, but the radius of convergence ($|x| < 1$) does not depend on $n$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_17", "judge_pick": false}, {"question": "How do you determine the validity range for a partial fraction decomposition like $\\frac{3}{1+x} - \\frac{2}{2-x}$? (2 steps)", "answer": "- Step 1: For $\\frac{3}{1+x}$, validity is $|x| < 1$. For $\\frac{2}{2-x} = \\frac{1}{1 - x/2}$, validity is $|x| < 2$.  \n- Step 2: The combined validity is the intersection: $|x| < 1$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_18", "judge_pick": false}, {"question": "What is the expansion of $(1+4x)^{-2}$ up to $x^3$, and why does the coefficient of $x^3$ become large? (3 steps)", "answer": "- Step 1: Apply the binomial formula:  \n  $1 + (-2)(4x) + \\frac{(-2)(-3)(4x)^2}{2} + \\frac{(-2)(-3)(-4)(4x)^3}{6}$.  \n- Step 2: Simplify to $1 - 8x + 48x^2 - 256x^3$.  \n- Step 3: The coefficient of $x^3$ is large because the negative exponent increases the magnitude of higher-order terms.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_19", "judge_pick": false}, {"question": "How does the expansion of $\\sqrt{1+x}$ differ from $\\frac{1}{\\sqrt{1+x}}$ in terms of coefficients? (2 steps)", "answer": "- Step 1: For $\\sqrt{1+x} = (1+x)^{1/2}$: $1 + \\frac{1}{2}x - \\frac{1}{8}x^2 + \\frac{1}{16}x^3 - \\ldots$.  \n- Step 2: For $\\frac{1}{\\sqrt{1+x}} = (1+x)^{-1/2}$: $1 - \\frac{1}{2}x + \\frac{3}{8}x^2 - \\frac{5}{16}x^3 + \\ldots$. The negative exponent introduces alternating signs and larger coefficients.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_20", "judge_pick": false}, {"question": "How would you approximate $\\sqrt[4]{15.7}$ using the expansion of $(16 - 3x)^{1/4}$? (3 steps)", "answer": "- Step 1: Factor $16^{1/4}(1 - \\frac{3x}{16})^{1/4} = 2(1 - \\frac{3x}{16})^{1/4}$.  \n- Step 2: Expand $2\\left[1 + \\frac{1}{4}(-\\frac{3x}{16}) + \\frac{\\frac{1}{4}(-\\frac{3}{4})(-\\frac{3x}{16})^2}{2} + \\ldots\\right]$.  \n- Step 3: Substitute $x = 0.1$ (since $16 - 3(0.1) = 15.7$) and simplify to approximate $\\sqrt[4]{15.7}$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_21", "judge_pick": false}, {"question": "Why is it necessary to use partial fractions before expanding $\\frac{4-5x}{(1+x)(2-x)}$? (2 steps)", "answer": "- Step 1: Direct expansion of the fraction is complex due to the product in the denominator.  \n- Step 2: Partial fractions decompose it into simpler terms $(\\frac{A}{1+x} + \\frac{B}{2-x})$, enabling straightforward binomial expansions.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_22", "judge_pick": false}, {"question": "What is the coefficient of $x^3$ in $(1+x)^{-4}$, and how is it calculated? (3 steps)", "answer": "- Step 1: Use the general term $\\frac{n(n-1)(n-2)}{3!}x^3$ for $n=-4$.  \n- Step 2: Compute $\\frac{(-4)(-5)(-6)}{6} = \\frac{-120}{6} = -20$.  \n- Step 3: The coefficient is $-20$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_23", "judge_pick": false}, {"question": "How does the expansion of $(1+x)^n$ differ for $n = -1$ vs. $n = -2$ in terms of coefficient growth? (2 steps)", "answer": "- Step 1: For $n=-1$, coefficients are $1, -1, 1, -1, \\ldots$ (magnitude constant).  \n- Step 2: For $n=-2$, coefficients are $1, -2, 3, -4, \\ldots$ (magnitude increases linearly). The negative exponent‚Äôs magnitude affects coefficient growth.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_24", "judge_pick": false}, {"question": "How do you handle repeated factors in partial fractions, such as $\\frac{1}{(1+2x)^2}$, before binomial expansion? (2 steps)", "answer": "- Step 1: Decompose into terms like $\\frac{A}{1+2x} + \\frac{B}{(1+2x)^2}$ to avoid repeated denominators.  \n- Step 2: Expand each term separately using the binomial formula.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_25", "judge_pick": false}, {"question": "How does the expansion of $(1+x)^{5/3}$ ensure convergence for $x=0.1$ but not for $x=2$? (2 steps)", "answer": "- Step 1: For $x=0.1$, $|0.1| < 1$ satisfies the validity condition.  \n- Step 2: For $x=2$, $|2| \\geq 1$ causes the series to diverge.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_26", "judge_pick": false}, {"question": "What is the expansion of $\\frac{1}{\\sqrt{4+x}}$ up to $x^2$, and how is it derived? (3 steps)", "answer": "- Step 1: Factor $4^{-1/2}(1 + \\frac{x}{4})^{-1/2} = \\frac{1}{2}(1 + \\frac{x}{4})^{-1/2}$.  \n- Step 2: Expand $(1 + \\frac{x}{4})^{-1/2} = 1 - \\frac{1}{2}(\\frac{x}{4}) + \\frac{(-1/2)(-3/2)}{2!}(\\frac{x}{4})^2 + \\ldots$.  \n- Step 3: Multiply by $\\frac{1}{2}$: $\\frac{1}{2} - \\frac{x}{16} + \\frac{3x^2}{256}$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_27", "judge_pick": false}, {"question": "How do you combine binomial expansions with multiplication, such as $(2+x)(1-2x)^{-1}$? (2 steps)", "answer": "- Step 1: Expand $(1-2x)^{-1} = 1 + 2x + 4x^2 + 8x^3 + \\ldots$.  \n- Step 2: Multiply by $2+x$: $2 \\cdot (1 + 2x + 4x^2 + 8x^3) + x \\cdot (1 + 2x + 4x^2 + 8x^3)$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_28", "judge_pick": false}, {"question": "How does the expansion of $(1+x)^n$ for $n=1/2$ compare to a Taylor series? (2 steps)", "answer": "- Step 1: The binomial expansion of $(1+x)^{1/2}$ is a special case of the Taylor series centered at $x=0$.  \n- Step 2: Both use derivatives to compute coefficients, but the binomial formula provides a closed-form expression for any $n$.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_29", "judge_pick": false}], "count": 30}, "minimax_1": {"label": "MiniMax ‚Ď†", "cards": [{"question": "What is the validity condition for the binomial expansion $(1+x)^n$? Why does this condition exist? (3 steps)", "answer": "- Step 1: The expansion is valid when $|x| < 1$ (or equivalently $-1 < x < 1$).\n\n- Step 2: This condition ensures the infinite series is convergent. For the terms to get progressively smaller (and the sum to approach a finite value), we need $|x| < 1$.\n\n- Step 3: Think of it this way: each term involves $x^r$. If $|x| \\geq 1$, the magnitude of terms either stays constant or grows, so the infinite sum cannot converge to a finite value. Only when $|x| < 1$ do higher powers ($x^3, x^4, ...$) become increasingly small.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Why does the binomial expansion $(1+x)^n$ produce an infinite number of terms when $n$ is not a positive integer? (2 steps)", "answer": "- Step 1: When $n$ is a positive integer, one of the factors in $n(n-1)(n-2)...(n-r+1)$ eventually becomes zero (specifically when $r = n+1$), causing all subsequent terms to be zero. This gives a finite expansion with $n+1$ terms.\n\n- Step 2: When $n$ is negative or fractional, none of these factors ever equals zero. The product $n(n-1)(n-2)...(n-r+1)$ continues indefinitely, producing an infinite series. For example, with $n = -1$: we get $(-1)(-2)(-3)...$ which never hits zero.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_1", "judge_pick": true}, {"question": "Expand $(1+x)^{-1}$ up to the $x^3$ term and state its validity condition. (3 steps)", "answer": "- Step 1: Write in index form: $(1+x)^{-1} = \\frac{1}{1+x}$\n\n- Step 2: Apply the binomial formula with $n = -1$:\n$$(1+x)^{-1} = 1 + (-1)x + \\frac{(-1)(-2)}{2!}x^2 + \\frac{(-1)(-2)(-3)}{3!}x^3 + \\ldots$$\n$$= 1 - x + x^2 - x^3 + \\ldots$$\n\n- Step 3: Validity: $|x| < 1$\n\nThis is the geometric series formula you should recognize!", "source": "MiniMax ‚Ď†", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What is the validity condition for $(1+bx)^n$? How does it differ from $(1+x)^n$? (2 steps)", "answer": "- Step 1: For $(1+bx)^n$ where $n$ is negative or fractional, the expansion is valid when $|bx| < 1$, which means $|x| < \\frac{1}{|b|}$.\n\n- Step 2: This is a direct consequence of substituting $x \\to bx$ in the original condition. For example, $(1+3x)^{-2}$ is valid when $|3x| < 1$, i.e., $|x| < \\frac{1}{3}$.\n\nThe key insight: The coefficient $b$ scales the validity range inversely.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Expand $(1+3x)^{-3}$ up to the $x^3$ term and state its validity condition. (4 steps)", "answer": "- Step 1: Use $n = -3$ and replace $x$ with $3x$ in the general formula.\n\n- Step 2: First term: $1$\n\n- Step 3: Second term: $(-3)(3x) = -9x$\n\n- Step 4: Third term: $\\frac{(-3)(-4)}{2!}(3x)^2 = \\frac{12}{2} \\cdot 9x^2 = 54x^2$\n\n- + Fourth term: $\\frac{(-3)(-4)(-5)}{3!}(3x)^3 = \\frac{-60}{6} \\cdot 27x^3 = -270x^3$\n\n- + Result: $(1+3x)^{-3} = 1 - 9x + 54x^2 - 270x^3 + \\ldots$\n\n- + Validity: $|3x| < 1$, so $|x| < \\frac{1}{3}$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_4", "judge_pick": false}, {"question": "How do you expand $(a+bx)^n$ where $n$ is negat
