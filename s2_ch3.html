ns at a rate of 21 per week. Using normal approximation to Poisson, find the probability of more than 27 breakdowns in a week. (3 steps)", "answer": "- Step 1: X ~ Po(21), so Y ~ N(21, 21) with σ = √21 ≈ 4.58. For P(X > 27), use continuity correction: P(Y > 27.5)\n- Step 2: Standardize: z = (27.5 - 21) / 4.58 = 1.42\n- Step 3: P(Z > 1.42) = 1 - 0.9222 = 0.0778", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A spinner lands on red 10% of the time. In 60 spins, what is the probability of fewer than 4 reds? Which approximation should be used and why? (2 steps)", "answer": "- Step 1: X ~ B(60, 0.1). Calculate mean: E(X) = 60 × 0.1 = 6, which is ≤ 10.\n- Step 2: Since the mean is ≤ 10, use Poisson approximation: X ≈ Po(6). P(X < 4) = P(X ≤ 3) = 0.1512\n\nWe use Poisson (not normal) because the mean is small (≤ 10), indicating p is small enough for Poisson to be accurate.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In the previous problem, if we had 150 spins instead of 60, what approximation would you use to find P(more than 20 reds)? Calculate using that approximation. (3 steps)", "answer": "- Step 1: X ~ B(150, 0.1). Mean = 150 × 0.1 = 15, which is > 10, so use normal approximation.\n- Step 2: μ = 15, σ² = 150 × 0.1 × 0.9 = 13.5, so σ ≈ 3.67. For P(X > 20), apply continuity correction: P(Y > 20.5)\n- Step 3: Standardize: z = (20.5 - 15) / 3.67 = 1.50. P(Z > 1.50) = 1 - 0.9332 = 0.0668", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "What is the general decision rule for choosing between Poisson and Normal approximation when approximating a binomial distribution? (2 steps)", "answer": "- Step 1: Calculate the mean μ = np.\n- Step 2: If μ ≤ 10, use Poisson approximation (since p is small). If μ > 10 and p is close to 0.5, use normal approximation. The rule \"calculate μ\" helps you decide which approximation table or method is appropriate.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Why should you never use a Poisson approximation first and then a normal approximation on the Poisson result when approximating a binomial distribution? (1 step)", "answer": "Each approximation introduces error. Using two approximations (binomial → Poisson → normal) compounds the error. Going directly from binomial to normal (binomial → normal) uses only one approximation and is therefore more accurate.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A company knows 2.5% of nails produced are faulty. A packet contains 200 nails. Using Poisson approximation, find the probability of more than 6 faulty nails in a packet. (2 steps)", "answer": "- Step 1: X ~ B(200, 0.025). λ = np = 200 × 0.025 = 5. Since n is large and p is small, use X ≈ Po(5).\n- Step 2: P(X > 6) = 1 - P(X ≤ 6) = 1 - 0.9995 = 0.0005 (approximately)\n\nThis avoids calculating the binomial probabilities directly for large n.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A fair coin is tossed 70 times. Estimate the probability of obtaining more than 45 heads using an appropriate approximation. (3 steps)", "answer": "- Step 1: X ~ B(70, 0.5). n is large and p = 0.5 (exactly symmetric), so use normal approximation. μ = 70 × 0.5 = 35, σ = √(70 × 0.5 × 0.5) = √17.5 ≈ 4.18\n- Step 2: For P(X > 45), apply continuity correction: P(Y > 45.5)\n- Step 3: Standardize: z = (45.5 - 35) / 4.18 = 2.51. P(Z > 2.51) = 1 - 0.9940 = 0.006", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "In a binomial distribution B(n,p) with p close to 0.5, why does the variance np(1-p) differ significantly from the mean when n is large? (2 steps)", "answer": "- Step 1: The mean is np. The variance is np(1-p).\n- Step 2: When p = 0.5, the variance is np(0.5) = np/2, which is half the mean. As n increases, both mean and variance increase proportionally, but the variance is question": "What is the relationship between the mean and variance for a Poisson distribution, and how does this relate to the binomial distribution when using Poisson approximation? (2 steps)", "answer": "- Step 1: For a Poisson distribution, the mean equals the variance, both equal to λ.\n- Step 2: For a binomial B(n,p), the mean is np and the variance is np(1-p). When p is small, (1-p) ≈ 1, so the variance ≈ np = mean. This is why Poisson approximation works well for binomial with small p — the key property of Poisson (mean ≈ variance) is approximately satisfied.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "A supermarket knows 40% of customers buy large bags of nuts. In a sample of 80 customers, estimate probability that more than 30 bought large bags using appropriate approximation. (3 steps)", "answer": "- Step 1: X ~ B(80, 0.4). Mean = 80 × 0.4 = 32. Since n is large and p is reasonably close to 0.5, use normal approximation.\n- Step 2: μ = 32, σ = √(80 × 0.4 × 0.6) = √19.2 ≈ 4.38. For P(X > 30), apply continuity correction: P(Y > 30.5)\n- Step 3: Standardize: z = (30.5 - 32) / 4.38 = -0.34. P(Z > -0.34) = P(Z < 0.34) = 0.6331", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "A researcher says 1 in 120 people catch a virus. In 900 people, estimate probability that fewer than 7 catch it using Poisson approximation. (2 steps)", "answer": "- Step 1: X ~ B(900, 1/120 ≈ 0.00833). λ = np = 900 × (1/120) = 7.5. Since n is large and p is small, use X ≈ Po(7.5)\n- Step 2: P(X < 7) = P(X ≤ 6) = 0.2414 (from Poisson tables with λ = 7.5)\n\nThis is much easier than calculating B(900, 0.00833) directly.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "When approximating a Poisson by normal, if λ = 11 (exactly the threshold), should we use normal or stick with Poisson? Explain. (1 step)", "answer": "The textbook says λ > 10 is considered \"large,\" so technically λ = 10 would not meet this criterion. However, the threshold of 10 is a guideline, not a strict rule. At λ = 11, the Poisson is reasonably symmetric, and normal approximation would give similar results to Poisson. In practice, either could be used, but if the question specifically asks for normal approximation or if λ is exactly 10, it's safer to use Poisson tables directly for better accuracy.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": true}, {"question": "A company sells apple-tree seedlings, claims 55% produce apples within 3 years. In a sample of 200 seedlings, 95 produce apples. Assuming the claim is true (p = 0.55), find probability of 95 or fewer using normal approximation. (3 steps)", "answer": "- Step 1: X ~ B(200, 0.55). μ = 200 × 0.55 = 110, σ = √(200 × 0.55 × 0.45) = √49.5 ≈ 7.04. For P(X ≤ 95), apply continuity correction: P(Y < 95.5)\n- Step 2: Standardize: z = (95.5 - 110) / 7.04 = -2.06\n- Step 3: P(Z < -2.06) = 0.0197\n\nThis is a very low probability (about 2%), suggesting the company's claim of 55% may be questionable if only 95 out of 200 (47.5%) produced apples.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "A doctor claims a remedy has 52% success rate. In a sample of 300, 170 were cured. Assuming the claim is true, find probability of at least 170 cures using normal approximation. (3 steps)", "answer": "- Step 1: X ~ B(300, 0.52). μ = 300 × 0.52 = 156, σ = √(300 × 0.52 × 0.48) = √74.88 ≈ 8.65. For P(X ≥ 170), apply continuity correction: P(Y > 169.5)\n- Step 2: Standardize: z = (169.5 - 156) / 8.65 = 1.56\n- Step 3: P(Z > 1.56) = 1 - 0.9406 = 0.0594\n\nThis is about 6%, which is not extremely unlikely but does cast some doubt on the claim.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "Explain why continuity correction is needed in both binomial-to-normal and Poisson-to-normal approximations but not in binomial-to-Poisson approximation. (2 steps)", "answer": "- Step 1: Both binomial and Poisson are discrete distributions. When we approximate them with the continuous normal distribution, we need to account for the \"width\" of each discrete point. This is done by extending each discrete value by 0.5 on either side.\n- Step 2: In binomial-to-Poisson approximation, both are discrete, so we don't need this correction — we simply evaluate the Poisson at the discrete points directly. The correction is only needed when crossing from discrete to continuous.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "A fair coin is spun 60 times. Estimate probability of fewer than 25 heads. Which approximation and why? (2 steps)", "answer": "- Step 1: X ~ B(60, 0.5). Mean = 60 × 0.5 = 30. n is large, p = 0.5 exactly (symmetric).\n- Step 2: Use normal approximation: μ = 30, σ = √(60 × 0.5 × 0.5) = √15 ≈ 3.87. For P(X < 25), apply continuity correction: P(Y < 24.5). z = (24.5 - 30)/3.87 = -1.42. P = 0.0778", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "In using normal approximation to Poisson, what happens if λ is very small (e.g., λ = 2)? Why is this problematic? (2 steps)", "answer": "- Step 1: When λ is small, the Poisson distribution is highly right-skewed, not symmetric. The normal distribution is symmetric and cannot capture this skewness.\n- Step 2: Additionally, the normal approximation might give probability to negative values, which is impossible for a count variable. For λ = 2, approximately P(X = 0) = 0.135 and P(X = 1) = 0.271 — these are the two most likely outcomes. A normal N(2,2) would give significant probability to negative values, badly approximating the true distribution.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}], "count": 50}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "If X ~ B(200, 0.03), what Poisson distribution would you use to approximate it, and why is this approximation valid? (2 steps)", "answer": "- Step 1: Calculate λ = np = 200 × 0.03 = **6**. So we use **Po(6)** as the approximation.\n- Step 2: This is valid because n = 200 (large) and p = 0.03 (small), giving np = 6 ≤ 10. Since p is small, (1-p) = 0.97 ≈ 1, making variance = np(1-p) = 200 × 0.03 × 0.97 = 5.82 ≈ 6 = mean. This matches the Poisson property that mean ≈ variance.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Why does the Poisson approximation to binomial fail when p is not small (e.g., B(100, 0.5))? (2 steps)", "answer": "- Step 1: When p = 0.5, the variance is np(1-p) = 100 × 0.5 × 0.5 = 25, but the mean is np = 50. These are **NOT equal** (variance ≠ mean).\n- Step 2: The Poisson distribution requires variance ≈ mean. When p is close to 0.5, the variance is significantly less than the mean, violating this core property. This is why we use a **normal approximation** instead when p ≈ 0.5.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "For a binomial distribution B(n,p), under what condition can it be approximated by a normal distribution N(μ,σ²)? What values of μ and σ are used? (2 steps)", "answer": "- Step 1: The conditions are **(1) n is large** and **(2) p is close to 0.5**. There is no strict rule, but typically n should be sufficiently large and |p - 0.5| should be small.\n- Step 2: The normal approximation uses **μ = np** and **σ = √(np(1-p))**, so we write **N(np, np(1-p))**.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Why must we apply a continuity correction when using a normal approximation to a binomial distribution? Give an example. (2 steps)", "answer": "- Step 1: The binomial is a **discrete** distribution (integer values only), while the normal is **continuous** (all real numbers). To account for this, we \"spread\" each discrete value by 0.5 in each direction.\n- Step 2: For example, P(X = 5) for discrete X becomes **P(4.5 < Y < 5.5)** for continuous Y ~ N(μ,σ²). Similarly, P(X ≤ 70) becomes **P(Y < 70.5)**, and P(X ≥ 8) becomes **P(Y > 7.5)**.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "For X ~ B(150, 0.48), write down the normal approximation parameters and convert P(80 ≤ X < 90) to an expression using the normal distribution with continuity correction. (3 steps)", "answer": "- Step 1: Calculate μ = np = 150 × 0.48 = **72**\n- Step 2: Calculate σ = √(np(1-p)) = √(150 × 0.48 × 0.52) = √(37.44) ≈ **6.12**\n- Step 3: For P(80 ≤ X < 90), apply continuity correction: **P(79.5 < Y < 89.5)** where Y ~ N(72, 6.12²)", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Why is the normal approximation to binomial only recommended when p is close to 0.5? What happens when p is very small or very large? (2 steps)", "answer": "- Step 1: The normal distribution is **symmetrical** around its mean. The binomial distribution is also symmetrical only when p = 0.5.\n- Step 2: When p is very small (e.g., 0.03), the binomial is **highly skewed right** (most values near 0). When p is very large (e.g., 0.97), it's **highly skewed left** (most values near n). Using a symmetrical normal in these cases gives poor results. This is why Poisson is preferred for small p instead.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "For a Poisson distribution Po(λ), under what condition can it be approximated by a normal distribution? What parameters are used? (2 steps)", "answer": "- Step 1: The condition is that **λ is large** (typically **λ > 10**). The larger λ is, the better the approximation.\n- Step 2: The normal approximation uses **N(λ, λ)** — meaning **μ = λ** and **σ² = λ** (so σ = √λ). This matches the Poisson property that both mean and variance equal λ.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "If X ~ Po(25), how would you use a normal approximation to find P(X > 30)? Show the continuity correction and standardization. (3 steps)", "answer": "- Step 1: Since λ = 25 > 10, use Y ~ N(25, 25), so σ = √25 = 5\n- Step 2: Apply continuity correction: P(X > 30) ≈ **P(Y > 30.5)**\n- Step 3: Standardize: P(Y > 30.5) = P(Z > (30.5 - 25)/5) = **P(Z > 1.1)** = 1 - 0.8643 = 0.1357", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "For X ~ Po(45), calculate P(43 < X ≤ 52) using normal approximation with continuity correction. Show your work. (3 steps)", "answer": "- Step 1: Y ~ N(45, 45), σ = √45 ≈ 6.71\n- Step 2: Apply continuity correction: P(43 < X ≤ 52) ≈ P(43.5 < Y < 52.5)\n- Step 3: Standardize: P((43.5-45)/6.71 < Z < (52.5-45)/6.71) = P(-0.22 < Z < 1.12) = 0.087 + 0.369 = **0.456** (approximately)", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "A company produces components with fault probability 0.025. In a batch of 120 components, find P(fewer than 4 are faulty) using Poisson approximation. Explain why this is valid. (2 steps)", "answer": "- Step 1: λ = np = 120 × 0.025 = **3**. So X ≈ Po(3). Then P(X < 4) = P(X ≤ 3) = **0.9810** (from Poisson tables)\n- Step 2: Valid because n = 120 (large) and p = 0.025 (small), with np = 3 ≤ 10. The variance = np(1-p) = 120 × 0.025 × 0.975 ≈ 2.93 ≈ 3 (mean), satisfying the Poisson condition.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "When approximating a binomial to a normal distribution, should you ever first approximate to Poisson then to Normal? Why or why not? (2 steps)", "answer": "- Step 1: **No** — you should go **directly from binomial to normal**.\n- Step 2: Going through Poisson would involve **two approximations** (binomial → Poisson → normal), each introducing error. The direct binomial → normal approximation involves only **one approximation** and is therefore more accurate.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A spinner lands on red with probability 0.1. In 60 spins, find P(fewer than 4 reds). In 150 spins, find P(more than 20 reds). Which approximation do you use for each and why? (3 steps)", "answer": "- Step 1: For 60 spins: X ~ B(60, 0.1), mean = 60 × 0.1 = 6 ≤ 10, so use **Poisson approximation**: X ≈ Po(6). P(X < 4) = P(X ≤ 3) = 0.1512\n- Step 2: For 150 spins: R ~ B(150, 0.1), mean = 15 > 10, so use **Normal approximation**: R ≈ N(15, 13.5)\n- Step 3: P(R > 20) ≈ P(Y > 20.5) = P(Z > (20.5-15)/√13.5) = P(Z > 1.50) = 0.0668", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "What is the key decision rule for choosing between Poisson and Normal approximation when approximating a binomial distribution? (2 steps)", "answer": "- Step 1: Calculate the mean **np**.\n- Step 2: If **np ≤ 10**, use **Poisson** approximation (for small p). If **np > 10**, use **Normal** approximation (for larger p, especially when p ≈ 0.5). The Normal approximation works best when p is close to 0.5.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A fair coin is tossed 100 times. Let X be the number of heads. Using normal approximation, find P(X ≥ 45). Show the full process. (3 steps)", "answer": "- Step 1: X ~ B(100, 0.5), μ = 100 × 0.5 = 50, σ = √(100 × 0.5 × 0.5) = √25 = 5\n- Step 2: Apply continuity correction: P(X ≥ 45) ≈ P(Y > 44.5) where Y ~ N(50, 25)\n- Step 3: Standardize: P(Z > (44.5-50)/5) = P(Z > -1.1) = P(Z < 1.1) = **0.8643**", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "For the binomial approximation to normal, why does the approximation improve as n increases, even if p stays the same? (2 steps)", "answer": "- Step 1: By the **Central Limit Theorem**, as n increases, the distribution of the sample mean (or sum) approaches a normal distribution regardless of the original distribution shape.\n- Step 2: Also, the **relative effect of the continuity correction decreases** as n increases. For large n, the discrete \"gaps\" between integers become negligible compared to the spread of the distribution.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "A production line has p = 0.16 for faulty items. In a sample of 20 items, why might you NOT use Poisson approximation? What would you use instead? (2 steps)", "answer": "- Step 1: For n = 20, p = 0.16, we get np = 20 × 0.16 = 3.2 ≤ 10, so Poisson is technically applicable. However, p = 0.16 is not particularly \"small\" — it's moderate.\n- Step 2: For n = 20 (not very large), the approximation may not be very accurate. With such a small n, it's often better to **calculate exact binomial probabilities** directly using calculators or tables rather than use any approximation.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": true}, {"question": "What percentage error formula is used to compare exact and approximate probabilities? Calculate the percentage error if exact P = 0.0365 and approximate P = 0.0362. (2 steps)", "answer": "- Step 1: Percentage error = |(exact - approximate)| / exact × 100%\n- Step 2: = |0.0365 - 0.0362| / 0.0365 × 100% = 0.0003/0.0365 × 100% = **0.82%**", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Why can we use N(λ, λ) to approximate Po(λ) when λ is large? What mathematical property makes this work? (2 steps)", "answer": "- Step 1: For Poisson, both the **mean and variance equal λ** (E(X) = Var(X) = λ).\n- Step 2: The normal distribution is defined by its mean and variance. By using N(λ, λ), we match both the mean and variance exactly. When λ is large, by the Central Limit Theorem, the Poisson distribution (which is discrete) becomes increasingly close to continuous and symmetric, matching the normal shape.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A call center receives on average 21 calls per day. Using normal approximation to Poisson, find P(more than 27 calls). Show the complete calculation. (3 steps)", "answer": "- Step 1: X ~ Po(21), so Y ~ N(21, 21), σ = √21 ≈ 4.58\n- Step 2: P(X > 27) ≈ P(Y > 27.5) (continuity correction)\n- Step 3: Standardize: P(Z > (27.5-21)/4.58) = P(Z > 1.42) = 1 - 0.9222 = **0.0778**", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "When using normal approximation to Poisson, what happens if λ is small (e.g., λ = 3)? Why is this a problem? (2 steps)", "answer": "- Step 1: When λ is small, the Poisson distribution is **highly skewed** (right-skewed) and not symmetric.\n- Step 2: The normal distribution is always symmetric. Using a symmetric normal to approximate a highly skewed distribution gives poor results. This is why we require **λ > 10** (or at least λ > 5) for the normal approximation to Poisson to work reasonably well.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "For B(n,p) with p very close to 0 or 1, why does the normal approximation perform poorly even when n is large? What should you use instead? (2 steps)", "answer": "- Step 1: When p → 0 or p → 1, the binomial distribution becomes **extremely skewed** (right-skewed for p → 0, left-skewed for p → 1). The normal distribution cannot capture this skewness.\n- Step 2: Instead, use the **Poisson approximation** when p is very small (regardless of n being large), since Poisson naturally models right-skewed data with low means.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "A factory produces bulbs with 5% breakage rate. In a batch of 140 bulbs, find P(6 ≤ X ≤ 9 broken) using Poisson approximation. (3 steps)", "answer": "- Step 1: X ~ B(140, 0.05), λ = np = 140 × 0.05 = **7**\n- Step 2: Approximate with Po(7): P(6 ≤ X ≤ 9) = P(X ≤ 9) - P(X ≤ 5)\n- Step 3: From Poisson tables with λ = 7: P(X ≤ 9) = 0.9012, P(X ≤ 5) = 0.5030, so P = **0.9012 - 0.5030 = 0.3982**", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Explain why the variance of a binomial B(n,p) equals np(1-p). How does this relate to when Poisson approximation becomes valid? (2 steps)", "answer": "- Step 1: For binomial, Var(X) = np(1-p). This can be derived from the sum of n independent Bernoulli trials: Var(ΣXi) = ΣVar(Xi) = np(1-p).\n- Step 2: For Poisson approximation to be valid, we need **Var ≈ Mean**, i.e., np(1-p) ≈ np, which requires **(1-p) ≈ 1**, meaning **p must be small**. This is exactly the condition for Poisson approximation.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "If X ~ B(400, 0.48), determine whether you should use Poisson or Normal approximation, then find the approximate parameters. (2 steps)", "answer": "- Step 1: Calculate np = 400 × 0.48 = **192** > 10, so use **Normal approximation** (not Poisson since np > 10)\n- Step 2: μ = np = 192, σ² = np(1-p) = 400 × 0.48 × 0.52 = 99.84, so **N(192, 99.84)** or N(192, (9.99)²)", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "In a Poisson approximation to binomial, if the exact probability is P(X=0), would the Poisson approximation always overestimate? Explain using the challenge result. (2 steps)", "answer": "- Step 1: Yes, the Poisson approximation **always overestimates P(X=0)** for binomial.\n- Step 2: For binomial: P(X=0) = (1-p)^n. For Poisson: P(X=0) = e^(-λ) = e^(-np). Since e^(-np) > (1-p)^n for p > 0 (due to the inequality e^x > 1+x for x ≠ 0), the Poisson approximation always gives a larger value than the true binomial probability.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": true}, {"question": "A supermarket finds 40% of customers buy large bags. In a random sample of 80 customers, find P(more than 30 buy large bags) using appropriate approximation. (3 steps)", "answer": "- Step 1: X ~ B(80, 0.4), mean = 80 × 0.4 = 32 > 10, so use **Normal approximation**\n- Step 2: σ = √(80 × 0.4 × 0.6) = √19.2 ≈ 4.38\n- Step 3: P(X > 30) ≈ P(Y > 30.5) = P(Z > (30.5-32)/4.38) = P(Z > -0.34) = P(Z < 0.34) = **0.6331**", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "What is the key difference between how continuity correction is applied when approximating Poisson vs approximating binomial by normal? (2 steps)", "answer": "- Step 1: The principle is the **same** for both — you adjust for the discrete-to-continuous change.\n- Step 2: For **binomial**, since X takes integer values 0 to n, P(X = k) becomes P(k-0.5 < Y < k+0.5). For **Poisson**, since X can be any non-negative integer, the same rule applies: P(X = k) → P(k-0.5 < Y < k+0.5). The only difference is the **range** (Poisson: 0 to ∞, Binomial: 0 to n).", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "A medical test has success probability 0.52. In a sample of 300 patients, 170 are cured. If the claim is true, find P(X ≥ 170) using approximation and comment on the claim. (3 steps)", "answer": "- Step 1: If p = 0.52, X ~ B(300, 0.52), mean = 300 × 0.52 = 156, variance = 300 × 0.52 × 0.48 = 74.88, σ ≈ 8.65\n- Step 2: Normal approximation: P(X ≥ 170) ≈ P(Y > 169.5) = P(Z > (169.5-156)/8.65) = P(Z > 1.56) = 1 - 0.9410 = **0.059**\n- Step 3: This probability is about 0.059 (roughly 6%), which is **not unusual** but is somewhat low. With 170 cures from 300 (56.7%), slightly above the claimed 52%, this could occur by chance about 6% of the time — moderate evidence against but not strong evidence.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "For the same binomial B(n,p), when np > 10 but p is very small (e.g., B(1000, 0.01)), should you use Poisson or Normal? Explain the dilemma. (2 steps)", "answer": "- Step 1: This presents a **dilemma**. The rule of thumb says np = 10 is the boundary: above 10 use Normal, below 10 use Poisson.\n- Step 2: With np = 10 exactly, either could work. However, when p is very small (like 0.01), even with large n, the distribution remains **skewed right**. The Poisson naturally handles this shape, while Normal may struggle. In practice, for np = 10, both may give similar results, but Poisson is often preferred when p is clearly small.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "If you're asked to \"use a suitable approximation\" without specifying which, how do you decide? Walk through the decision process for B(200, 0.98). (3 steps)", "answer": "- Step 1: First calculate np = 200 × 0.98 = **196** > 10. This tells us Poisson isn't ideal (np > 10).\n- Step 2: But p = 0.98 is **not** close to 0.5 — it's very close to 1, making the binomial **highly skewed left**.\n- Step 3: The best approach is to **transform the problem**: let Y = n - X (number of failures), then Y ~ B(200, 0.02). Now p = 0.02 (small), np = 4 ≤ 10, so use **Poisson approximation** Po(4) for Y, then convert back.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": true}, {"question": "Why might a student get different answers when using different approximation methods for the same binomial problem? What should they check? (2 steps)", "answer": "- Step 1: Different approximations involve different **assumptions and errors**. Poisson assumes variance = mean; Normal assumes symmetry. These hold differently depending on n, p, and the specific probability being calculated.\n- Step 2: Students should check: **(1)** Is the approximation condition satisfied (np ≤ 10 for Poisson, p ≈ 0.5 for Normal)? **(2)** Is the continuity correction applied correctly? **(3)** Should they use a different approximation entirely (e.g., transform the problem like Q31)?", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": true}, {"question": "A radioactive source has λ = 14 decays per second. Using normal approximation, find P(20 ≤ X ≤ 22). (3 steps)", "answer": "- Step 1: X ~ Po(14), use Y ~ N(14, 14), σ = √14 ≈ 3.74\n- Step 2: Apply continuity correction: P(20 ≤ X ≤ 22) ≈ P(19.5 < Y < 22.5)\n- Step 3: Standardize: P((19.5-14)/3.74 < Z < (22.5-14)/3.74) = P(1.47 < Z < 2.27) = 0.4884 - 0.4292 = **0.0592**", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In the normal approximation to binomial, what does it mean if σ is small (e.g., σ = 1)? What are the implications? (2 steps)", "answer": "- Step 1: A small σ means the distribution is **very narrow** — most values are clustered very close to the mean.\n- Step 2: This makes the **continuity correction crucial** because the discrete \"steps\" (gaps between integers) are large relative to the spread. Also, with small σ, the normal approximation may not be valid even if n is large, because the binomial may not be smooth enough. Consider using exact binomial or Poisson instead.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "A company knows λ = 15 for daily boat rentals. If they own 20 boats, find the probability they'll need to turn customers away (more than 20 rentals requested) on a given day using normal approximation. (3 steps)", "answer": "- Step 1: X ~ Po(15), use Y ~ N(15, 15), σ = √15 ≈ 3.87\n- Step 2: P(X > 20) ≈ P(Y > 20.5) (continuity correction for \"more than 20\")\n- Step 3: Standardize: P(Z > (20.5-15)/3.87) = P(Z > 1.42) = 1 - 0.9222 = **0.0778** (about 7.8% of days)", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}], "count": 34}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "Why do statisticians use Poisson or Normal approximations to a binomial distribution rather than computing binomial probabilities directly? (3 steps)", "answer": "- Step 1: Exact binomial probabilities require $$\\binom{n}{k}p^k(1-p)^{n-k}$$. When $$n$$ is large (e.g., 1000), the binomial coefficients become enormous and summation over many terms is impractical by hand.\n- Step 2: Cumulative binomial tables in exam formulae booklets only go up to $$n = 50$$. Beyond that, there is no quick lookup, and calculators may lose precision for extreme tail events.\n- Step 3: Approximating distributions (Poisson, Normal) have friendlier closed-form probabilities and standard tables. They trade tiny accuracy losses for enormous computational savings — essential for realistic \"big $$n$$\" problems.\n\nTakeaway: approximations aren't just convenience — they make probability tractable at scale.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "State the conditions under which $$X \\sim B(n, p)$$ can be approximated by a Poisson distribution, and specify the Poisson's parameter. (2 steps)", "answer": "- Step 1: The conditions are that $$n$$ is large AND $$p$$ is small. A practical working rule is $$np \\leq 10$$, which keeps the resulting Poisson mean modest.\n- Step 2: The Poisson parameter is chosen as $$\\lambda = np$$ — this preserves the mean of the original binomial exactly. So $$X \\approx Po(np)$$.\n\nThe choice $$\\lambda = np$$ isn't arbitrary: matching the mean is the first thing any approximation must get right.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Explain in terms of moments WHY a Poisson approximates a binomial when $$p$$ is small. (3 steps)", "answer": "- Step 1: Two distributions that share the same mean and variance will look similar over most of their support. Matching the first two moments is the key to a good approximation.\n- Step 2: For $$B(n,p)$$: mean $$= np$$ and variance $$= np(1-p)$$. For $$Po(\\lambda)$$: mean $$=$$ variance $$= \\lambda$$. Setting $$\\lambda = np$$ matches the means exactly.\n- Step 3: Variances match only if $$np(1-p) \\approx np$$, which requires $$(1-p) \\approx 1$$, i.e., $$p$$ is small. So \"small $$p$$\" is precisely the condition that makes the binomial's variance ≈ its mean, matching the Poisson's defining signature.\n\nInsight: \"small $$p$$\" isn't a random rule — it's what makes the binomial structurally resemble a Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "What rule of thumb governs when the Poisson approximation to a binomial is \"appropriate,\" and why is this numerical threshold chosen? (3 steps)", "answer": "- Step 1: The common rule of thumb is $$np \\leq 10$$. There is no exact mathematical cutoff — the approximation quality changes smoothly.\n- Step 2: Why 10? Poisson cumulative tables in exam formulae booklets typically list values up to about $$\\lambda = 10$$. If $$np > 10$$, you couldn't look up Poisson probabilities conveniently anyway.\n- Step 3: Additionally, when $$np$$ is small, $$p$$ is forced to be small (if $$n$$ is large), reinforcing the variance-mean matching condition.\n\nThe threshold is a practical convenience, not a mathematical law.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Why are BOTH \"$$n$$ large\" AND \"$$p$$ small\" required for the Poisson approximation? Can't one condition alone suffice? (3 steps)", "answer": "- Step 1: Small $$p$$ alone isn't enough. With tiny $$n$$ (say $$n = 5$$), the binomial has only a handful of outcomes and cannot be well matched by the Poisson, which has infinite support.\n- Step 2: Large $$n$$ alone isn't enough. If $$p$$ isn't small, the binomial variance $$np(1-p)$$ departs significantly from $$np$$, breaking the variance-mean equality the Poisson depends on.\n- Step 3: Together: large $$n$$ gives the Poisson enough \"room\" to represent possible outcomes, and small $$p$$ enforces variance ≈ mean, reproducing the Poisson's skewed shape.\n\nIntuition: Poisson = \"rare events in many trials.\" You need MANY trials (large $$n$$) AND events that are individually RARE (small $$p$$).", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "As $$n$$ grows and $$p$$ shrinks with $$np = \\lambda$$ fixed, what happens to the Poisson approximation's accuracy? (3 steps)", "answer": "- Step 1: Keeping $$\\lambda = np$$ fixed but letting $$n \\to \\infty$$ forces $$p \\to 0$$. Then $$(1-p) \\to 1$$, so binomial variance $$np(1-p) \\to np = \\lambda$$, exactly matching Poisson variance.\n- Step 2: Likewise, the higher-order moments of the binomial also converge to those of the Poisson. The distributions become identical in the limit.\n- Step 3: This is the formal Poisson limit theorem: $$B(n, \\lambda/n) \\to Po(\\lambda)$$ as $$n \\to \\infty$$. So the approximation keeps getting better as you move deeper into the \"rare events, many trials\" regime.\n\nConclusion: larger $$n$$ (with smaller $$p$$) tightens the approximation; the limit is exact.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "You have $$Y \\sim B(200, 0.98)$$. The direct Poisson approximation fails ($$p$$ is large, not small). How can you still exploit a Poisson approximation? (3 steps)", "answer": "- Step 1: Define $$X = 200 - Y$$, representing the number of \"failures\" rather than \"successes.\" Since $$Y$$'s failures are rare, $$X \\sim B(200, 0.02)$$.\n- Step 2: Now $$X$$ satisfies Poisson conditions: $$n = 200$$ large, $$p = 0.02$$ small, $$np = 4 \\leq 10$$. Approximate $$X \\approx Po(4)$$.\n- Step 3: Translate probabilities: $$P(Y = 197) = P(X = 3)$$, $$P(Y \\geq 198) = P(X \\leq 2)$$, etc. You work on $$X$$'s Poisson approximation, then read back.\n\nTrick: when successes are \"too common,\" swap perspectives — rare events don't have to be successes.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "Prove that the Poisson approximation to $$B(n,p)$$ always OVERESTIMATES $$P(X = 0)$$. (4 steps)", "answer": "- Step 1: Exact: $$P(X = 0) = (1-p)^n$$. Poisson approximation: $$P(X = 0) = e^{-np}$$. We want to show $$(1-p)^n < e^{-np}$$.\n- Step 2: Take natural logs: compare $$n\\ln(1-p)$$ with $$-np$$.\n- Step 3: Use the Taylor series $$\\ln(1-p) = -p - \\frac{p^2}{2} - \\frac{p^3}{3} - \\cdots$$ for $$0 < p < 1$$. Every term after $$-p$$ is negative, so $$\\ln(1-p) < -p$$.\n- Step 4: Therefore $$n\\ln(1-p) < -np$$, exponentiating gives $$(1-p)^n < e^{-np}$$. The Poisson value is strictly larger — an overestimate.\n\nIntuition: Poisson \"smears\" a bit more mass onto $$X = 0$$ than the binomial truly does.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "State the conditions under which $$X \\sim B(n, p)$$ can be approximated by a normal distribution, including the normal's parameters. (2 steps)", "answer": "- Step 1: Conditions: $$n$$ is large AND $$p$$ is close to 0.5. This is the regime where the binomial's shape is approximately symmetric and bell-like.\n- Step 2: The normal uses $$\\mu = np$$ (matching binomial mean) and $$\\sigma^2 = np(1-p)$$ (matching binomial variance exactly). So $$X \\approx N(np, np(1-p))$$.\n\nNote: unlike the Poisson case, here we match BOTH moments exactly — no structural \"near-equality\" needed.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Why is the condition \"$$p$$ close to 0.5\" necessary for the normal approximation to a binomial? What fails when $$p$$ drifts to the extremes? (3 steps)", "answer": "- Step 1: The normal distribution is perfectly symmetric about its mean. For a normal to be a good fit, the binomial must also be approximately symmetric.\n- Step 2: $$B(n, 0.5)$$ is exactly symmetric. As $$p$$ moves away from 0.5, the binomial becomes skewed — right-skewed for $$p < 0.5$$, left-skewed for $$p > 0.5$$ — because the mean $$np$$ drifts toward one edge of $$[0, n]$$.\n- Step 3: A skewed distribution has more probability mass on one side than the other. A symmetric normal can't reproduce this; it will systematically misestimate tail probabilities on both sides.\n\nFor extreme $$p$$, use Poisson (small $$p$$) or flip to $$n - X$$ (large $$p$$) instead.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Derive why the normal approximation to $$B(n, p)$$ uses exactly $$\\mu = np$$ and $$\\sigma^2 = np(1-p)$$ from first principles. (3 steps)", "answer": "- Step 1: The binomial $$X$$ is the sum of $$n$$ independent Bernoulli(p) trials: $$X = Y_1 + Y_2 + \\cdots + Y_n$$, where each $$Y_i$$ is 1 with probability $$p$$, else 0.\n- Step 2: For a single Bernoulli(p): $$E(Y_i) = p$$ and $$Var(Y_i) = p(1-p)$$. By linearity of expectation, $$E(X) = np$$. By independence, variances add: $$Var(X) = np(1-p)$$.\n- Step 3: The Central Limit Theorem says sums of many independent identically-distributed variables tend to normality. Matching mean and variance gives $$X \\approx N(np, np(1-p))$$.\n\nSo the normal approximation is the binomial's \"CLT limit\" with exact first two moments preserved.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "What is a continuity correction, and why is it needed when approximating a discrete distribution with a continuous one? (3 steps)", "answer": "- Step 1: Binomial and Poisson are discrete — probability is assigned to integer values. Normal is continuous — $$P(Y = k) = 0$$ for any specific value $$k$$, since probabilities come from integrating the density over an interval.\n- Step 2: Naively setting $$P(X \\leq k) \\approx P(Y \\leq k)$$ misses the \"rectangle\" of probability mass the binomial places at $$k$$. The cumulative normal cuts exactly through the middle of that rectangle.\n- Step 3: Continuity correction: treat each integer $$k$$ as occupying the unit interval $$(k - 0.5, k + 0.5)$$. Then $$P(X \\leq k) \\approx P(Y < k + 0.5)$$, and $$P(X = k) \\approx P(k - 0.5 < Y < k + 0.5)$$.\n\nVisually: each discrete bar has width 1 centered at the integer; the correction aligns the normal's integral with the bar's full area.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "List all the continuity correction rules for translating discrete $$X$$-probabilities into continuous $$Y$$-probabilities. (2 steps)", "answer": "- Step 1: For discrete $$X$$ and continuous $$Y$$:\n+ $$P(X \\leq k) \\approx P(Y < k + 0.5)$$\n+ $$P(X < k) \\approx P(Y < k - 0.5)$$\n+ $$P(X \\geq k) \\approx P(Y > k - 0.5)$$\n+ $$P(X > k) \\approx P(Y > k + 0.5)$$\n+ $$P(X = k) \\approx P(k - 0.5 < Y < k + 0.5)$$\n+ $$P(a \\leq X \\leq b) \\approx P(a - 0.5 < Y < b + 0.5)$$\n- Step 2: General principle: at each endpoint, ask \"is this integer INCLUDED?\" If yes, expand outward by 0.5 to include its full rectangle; if no, shrink inward by 0.5 to exclude it.\n\nMnemonic: \"Stretch to include, shrink to exclude.\"", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Explain the subtle difference between $$P(X \\leq k)$$ and $$P(X < k)$$ for a discrete $$X$$, and how continuity correction preserves this distinction. (3 steps)", "answer": "- Step 1: For discrete $$X$$, $$P(X \\leq k) = P(X < k) + P(X = k)$$. These differ by the probability mass AT $$k$$, which is nonzero.\n- Step 2: With continuity correction: $$P(X \\leq k) \\approx P(Y < k + 0.5)$$ (keeps the $$k$$-rectangle). $$P(X < k) \\approx P(Y < k - 0.5)$$ (drops the $$k$$-rectangle).\n- Step 3: The difference between these is $$P(k - 0.5 < Y < k + 0.5)$$ — exactly the normal's version of $$P(X = k)$$, the one-unit rectangle of mass at $$k$$.\n\nIf you ignored the $$\\leq$$ vs $$<$$ distinction, your error would be about $$P(X = k)$$ — potentially significant near the mean.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "For a continuous distribution, $$P(Y = k) = 0$$. So how do we compute $$P(X = k)$$ using a normal approximation? (2 steps)", "answer": "- Step 1: We cannot use $$P(Y = k)$$ directly — it's always zero, which is clearly wrong for any meaningful binomial point probability.\n- Step 2: Use continuity correction: $$P(X = k) \\approx P(k - 0.5 < Y < k + 0.5)$$. This integrates the normal density over a unit-wide interval centered at $$k$$, capturing the \"rectangle\" of mass the discrete distribution places there.\n\nSo the normal approximation to a point probability is an interval integral — never a point evaluation.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "You have $$X \\sim B(150, 0.48)$$ approximated by $$Y \\sim N(72, 6.12^2)$$. Write the correctly continuity-corrected normal expressions for $$P(X \\leq 70)$$ and $$P(80 \\leq X < 90)$$. (3 steps)", "answer": "- Step 1: $$P(X \\leq 70)$$: the inequality INCLUDES 70, so expand the upper bound by 0.5. Result: $$P(X \\leq 70) \\approx P(Y < 70.5)$$.\n- Step 2: $$P(80 \\leq X < 90)$$: the 80 is INCLUDED (expand down to 79.5), but 90 is EXCLUDED (shrink down to 89.5).\n- Step 3: So $$P(80 \\leq X < 90) \\approx P(79.5 < Y < 89.5)$$. Always ask at each endpoint: \"Is this integer included in the discrete event?\"\n\nThe key is treating the two endpoints independently — they can have different corrections (one include, one exclude).", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Why is the standard deviation in the normal approximation to $$B(n,p)$$ equal to $$\\sqrt{np(1-p)}$$ rather than $$\\sqrt{np}$$? (3 steps)", "answer": "- Step 1: $$\\sqrt{np}$$ would be the Poisson's standard deviation. The binomial's variance is $$np(1-p)$$, which is smaller than $$np$$ whenever $$0 < p < 1$$.\n- Step 2: Intuitively, the binomial is bounded above by $$n$$, which constrains variability. This boundedness reduces variance by a factor of $$(1-p)$$ compared to the Poisson (which has no upper bound).\n- Step 3: If you mistakenly used $$\\sqrt{np}$$, the normal approximation would be TOO SPREAD OUT, overestimating tail probabilities systematically.\n\nRule: always match the source distribution's variance exactly — never borrow a formula from a different distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "What does the normal approximation to a Poisson distribution require, and what parameters does it use? (2 steps)", "answer": "- Step 1: Condition: $$\\lambda$$ is large. In this course, the working rule is $$\\lambda > 10$$.\n- Step 2: Parameters: $$X \\approx N(\\lambda, \\lambda)$$ — both mean AND variance equal $$\\lambda$$, matching the Poisson's signature property that mean = variance. Continuity correction must be applied (Poisson is discrete, normal is continuous).\n\nUnlike the normal approximating a binomial, here the standard deviation is $$\\sqrt{\\lambda}$$ — the square root of the mean.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Why does a Poisson distribution start looking like a normal when $$\\lambda$$ is large? (3 steps)", "answer": "- Step 1: A Poisson with rate $$\\lambda$$ can be decomposed: $$Po(\\lambda)$$ equals the sum of $$n$$ independent $$Po(\\lambda/n)$$ variables for any $$n$$. So it's structurally a sum of many small independent pieces.\n- Step 2: By the Central Limit Theorem, sums of many independent variables approach a normal distribution. The CLT applies to Poisson in this \"subdivision\" sense.\n- Step 3: Visually: $$Po(1)$$ is heavily right-skewed (bunched near 0 with a long right tail). $$Po(10)$$ is slightly skewed but noticeably bell-ish. $$Po(50)$$ is visually indistinguishable from a normal curve.\n\nAs $$\\lambda$$ grows, the right tail extends enough to balance the support, and the shape smooths into a bell.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Why are both the mean AND variance of the approximating normal equal to $$\\lambda$$ when approximating a Poisson? (2 steps)", "answer": "- Step 1: The Poisson distribution has $$E(X) = \\lambda$$ and $$Var(X) = \\lambda$$ — mean and variance are identical. This is a defining feature of the Poisson.\n- Step 2: The normal approximation matches the first two moments exactly. So the mean of the normal is $$\\lambda$$, and the variance is also $$\\lambda$$. The Poisson dictates both values equal.\n\nConsequence: the normal approximating a Poisson always has standard deviation equal to the square root of its mean — an unusual constraint.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "For $$X \\sim Po(25)$$ and the event $$P(X > 30)$$, walk through the steps of the normal approximation. (3 steps)", "answer": "- Step 1: Verify condition: $$\\lambda = 25 > 10$$, so normal approximation is valid. Set up $$Y \\sim N(25, 25)$$ — both mean and variance equal 25.\n- Step 2: Apply continuity correction: $$P(X > 30)$$ excludes 30, so shift outward upward to 30.5. Thus $$P(X > 30) \\approx P(Y > 30.5)$$.\n- Step 3: Standardize: $$P(Y > 30.5) = P\\left(Z > \\frac{30.5 - 25}{\\sqrt{25}}\\right) = P(Z > 1.1)$$, then look up in standard normal tables.\n\nThe three-step ritual: verify condition → apply CC → standardize.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "You have a binomial $$B(n, p)$$ and must choose an approximation. Describe the full decision procedure. (4 steps)", "answer": "- Step 1: First check: is $$n$$ large? If $$n$$ is small (say, $$n < 30$$), use the exact binomial — no approximation warranted.\n- Step 2: If $$n$$ is large, compute $$\\mu = np$$.\n+ If $$np \\leq 10$$ AND $$p$$ is small: use Poisson approximation $$X \\approx Po(np)$$.\n+ If $$np > 10$$ AND $$p$$ close to 0.5: use normal approximation $$X \\approx N(np, np(1-p))$$ with continuity correction.\n- Step 3: Edge case: $$p$$ close to 1? Substitute $$Y = n - X$$ (counting rare failures) and apply Poisson to $$Y$$.\n- Step 4: If neither clearly applies (e.g., $$np$$ moderate, $$p$$ moderate), the normal is usually still acceptable due to the CLT — especially once $$np > 10$$.\n\nQuick heuristic: $$np \\leq 10$$ → Poisson; $$np > 10$$ → Normal.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "Your friend computes $$P(X \\geq 30)$$ for $$X \\sim B(500, 0.06)$$ by first approximating by Poisson, then approximating the Poisson by normal. Why is this suboptimal? (3 steps)", "answer": "- Step 1: For $$B(500, 0.06)$$: $$np = 30$$ and $$np(1-p) = 28.2$$. Close values, but not identical.\n- Step 2: Chaining introduces two errors:\n+ Binomial → Poisson substitutes variance 28.2 with 30 (introducing error).\n+ Poisson → Normal adds more error, especially because $$\\lambda = 30$$ retains some residual skewness.\n- Step 3: Going directly Binomial → Normal uses the exact binomial variance 28.2. Only one approximation step, with tighter error. The chained path's final normal has wrong variance (30 instead of 28.2).\n\nGeneral principle: every approximation costs accuracy. One good approximation beats two good ones chained.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "A manager computes binomial probabilities with $$n = 100$$. The two scenarios are $$p = 0.04$$ and $$p = 0.45$$. Which approximation and parameters for each? (3 steps)", "answer": "- Step 1: For $$p = 0.04$$: $$np = 4 \\leq 10$$, and $$p$$ is small. → Poisson $$Po(4)$$. No continuity correction needed (both are discrete).\n- Step 2: For $$p = 0.45$$: $$np = 45 > 10$$, and $$p$$ close to 0.5. → Normal $$N(45, 24.75)$$, since $$np(1-p) = 24.75$$. Continuity correction required.\n- Step 3: Summary: same $$n$$, but very different approximations. The choice is governed by $$p$$'s proximity to 0 (Poisson) vs. 0.5 (Normal), summarized by the $$np$$ threshold.\n\nDifferent $$p$$ regime → different approximation, even with the same $$n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Describe how the three distributions — Binomial, Poisson, and Normal — look visually, and when they resemble each other. (3 steps)", "answer": "- Step 1: $$B(n, 0.5)$$ for large $$n$$: symmetric bell, concentrated around $$n/2$$, roughly matching $$N(n/2, n/4)$$.\n- Step 2: $$B(n, p)$$ for large $$n$$, small $$p$$: right-skewed, concentrated near 0, tail to the right — looks like $$Po(np)$$.\n- Step 3: $$Po(\\lambda)$$ for large $$\\lambda$$: symmetric bell — looks like $$N(\\lambda, \\lambda)$$. For small $$\\lambda$$ (say $$\\lambda = 1$$), it's heavily skewed with a peak at 0 or 1.\n\nAll three share an underlying bell curve in appropriate limits, but differ in support: binomial is bounded, Poisson unbounded above, normal unbounded both directions.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Two distributions match a target's mean but differ in variance. Why does getting the VARIANCE right matter for probability calculations? (3 steps)", "answer": "- Step 1: Mean tells you where the distribution is centered. Variance tells you how spread out it is. Matching only mean is like matching only the hat: you've got the center but not the width.\n- Step 2: Tail probabilities like $$P(X > k)$$ depend crucially on spread. A wider distribution has more mass in the tails; a narrower one has less. Wrong variance → systematically wrong tail probabilities.\n- Step 3: Example: if you used $$\\sqrt{np}$$ (Poisson-style) for a binomial with $$p = 0.5$$, you'd overestimate $$\\sigma$$ by a factor of $$\\sqrt{2}$$, overestimating all tail events.\n\nMoral: both moments matter; mean gives location, variance gives scale. You need both.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "The rules \"$$np \\leq 10$$\" (for Poisson) and \"$$\\lambda > 10$$\" (for normal on Poisson) — are these hard mathematical boundaries or guidelines? (3 steps)", "answer": "- Step 1: These are guidelines, not theorems. Approximation quality improves smoothly as conditions are strengthened — no sudden jump at $$np = 10$$.\n- Step 2: At $$np = 10$$ exactly, both Poisson and normal approximations work reasonably well. The rule is calibrated so that Poisson tables (typically up to $$\\lambda = 10$$) cover the Poisson regime.\n- Step 3: In practice, exam conventions follow the rule strictly: $$np \\leq 10$$ → Poisson; $$np > 10$$ → Normal. If your answer uses the \"wrong\" approximation per this rule, you may lose marks even if the numerical answer is close.\n\nThe thresholds are pedagogical/practical conventions, not deep mathematics.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "For $$X \\sim B(n,p)$$ approximated by $$Y \\sim N(\\mu, \\sigma^2)$$, translate into $$Y$$-expressions with continuity correction: (a) $$P(X < 45)$$, (b) $$P(X \\geq 60)$$, (c) $$P(50 < X < 70)$$. (3 steps)", "answer": "- Step 1: (a) $$P(X < 45)$$ excludes 45. Shrink the upper bound inward: $$P(X < 45) \\approx P(Y < 44.5)$$.\n- Step 2: (b) $$P(X \\geq 60)$$ includes 60. Expand the lower bound outward (downward): $$P(X \\geq 60) \\approx P(Y > 59.5)$$.\n- Step 3: (c) $$P(50 < X < 70)$$ excludes both endpoints. Shrink both sides inward: $$P(50 < X < 70) \\approx P(50.5 < Y < 69.5)$$.\n\nTreat each bound independently: ask \"include this integer?\" and adjust ±0.5 accordingly.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why does the continuity correction use EXACTLY 0.5, not some other value like 0.3 or 0.7? (3 steps)", "answer": "- Step 1: The 0.5 arises from splitting the gap between consecutive integers in half. Each integer $$k$$ \"owns\" the interval $$(k - 0.5, k + 0.5)$$ on the real line.\n- Step 2: This tiling is seamless: integer 0 owns $$(-0.5, 0.5)$$, integer 1 owns $$(0.5, 1.5)$$, and so on. No gaps, no overlaps — every point on the real line is assigned to exactly one integer.\n- Step 3: If you used, say, 0.3, then points between 0.3 and 0.7 would belong to no integer — an \"unassigned gap\" of probability mass. Only 0.5 preserves the natural tiling of integers.\n\nThe half-unit is the unique choice that makes discrete-to-continuous translation consistent.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "What is \"percentage error\" of an approximation, and what makes it small or large? (3 steps)", "answer": "- Step 1: Definition: $$\\text{percentage error} = \\frac{|P_{\\text{exact}} - P_{\\text{approx}}|}{P_{\\text{exact}}} \\times 100\\%$$. It measures deviation as a fraction of the true value.\n- Step 2: Small error (under 1%) typically occurs when: $$n$$ is large, $$p$$ is close to 0.5, and the event of interest is not in an extreme tail.\n- Step 3: Large error occurs when: $$n$$ is small, $$p$$ is far from 0.5, or you're probing rare tail events (where the approximating distribution's shape diverges most from the exact).\n\nFor routine exam problems, well under 1% error is typical when conditions are met — showing the approximation is genuinely useful.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "Give an example where the normal approximation to a binomial would fail badly, and explain why. (3 steps)", "answer": "- Step 1: Example: $$B(20, 0.05)$$. Here $$n = 20$$ is borderline (not truly large), and $$p = 0.05$$ is far from 0.5.\n- Step 2: Why it fails: the binomial is heavily right-skewed, concentrated at $$X = 0, 1, 2$$, with essentially no mass above $$X = 6$$. A symmetric normal would assign positive density to NEGATIVE $$X$$-values (impossible) and miss the rightward skew entirely.\n- Step 3: Correct approach: $$np = 1$$, so the Poisson approximation $$Po(1)$$ is appropriate. Poisson has non-negative integer support and captures the right skew.\n\nRule: each approximation has its regime; applying normal when Poisson is called for produces wrong answers.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "For each binomial, decide if normal approximation is appropriate: (a) $$B(120, 0.6)$$; (b) $$B(20, 0.5)$$; (c) $$B(250, 0.52)$$; (d) $$B(300, 0.85)$$. (4 steps)", "answer": "- Step 1: (a) $$B(120, 0.6)$$: $$n$$ large, $$p$$ close to 0.5. ✓ Normal OK. $$\\mu = 72$$, $$\\sigma^2 = 28.8$$.\n- Step 2: (b) $$B(20, 0.5)$$: $$p = 0.5$$ is ideal but $$n = 20$$ is borderline — not truly large. Normal approximation is questionable; exact binomial is usually preferred.\n- Step 3: (c) $$B(250, 0.52)$$: $$n$$ large, $$p$$ very close to 0.5. ✓ Ideal normal case. $$\\mu = 130$$, $$\\sigma^2 = 62.4$$.\n- Step 4: (d) $$B(300, 0.85)$$: $$n$$ large, but $$p$$ far from 0.5 (close to 1). ✗ Normal inappropriate. Substitute $$Y = 300 - X$$ (Poisson on failures since $$p_{\\text{new}} = 0.15$$, $$np_{\\text{new}} = 45$$ — still large) or accept normal with caution.\n\nLesson: always check BOTH conditions. Passing one doesn't guarantee the approximation.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "A spinner lands on red 10% of the time. You spin 60 times and want to find the probability of getting fewer than 4 reds. Which approximation, and why not the alternative? (3 steps)", "answer": "- Step 1: Let $$X \\sim B(60, 0.1)$$. $$n = 60$$ is large, $$p = 0.1$$ is small (not near 0.5). $$np = 6 \\leq 10$$. Use Poisson: $$X \\approx Po(6)$$.\n- Step 2: Normal approximation would fail: $$p = 0.1$$ is far from 0.5, so the binomial is right-skewed. A symmetric normal would misrepresent the tail probabilities.\n- Step 3: Poisson value: $$P(X < 4) = P(X \\leq 3)$$, look up in Poisson tables with $$\\lambda = 6$$. No continuity correction needed since both distributions are discrete.\n\nLesson: choose the approximation whose shape matches the source.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "For the same spinner (10% red) but now 150 spins, which approximation — and why has the answer changed from 60 spins? (3 steps)", "answer": "- Step 1: Now $$X \\sim B(150, 0.1)$$. $$n$$ still large, $$p$$ still small. But $$np = 15 > 10$$.\n- Step 2: Poisson tables typically stop at $$\\lambda = 10$$, so Poisson lookup is inconvenient. Additionally, at $$\\lambda = 15$$, the Poisson itself is nearly symmetric — the normal approximation works well.\n- Step 3: Best route: go Binomial → Normal directly with $$N(15, 13.5)$$ since $$np(1-p) = 13.5$$. This uses the exact binomial variance — more accurate than chaining.\n\nInsight: as $$n$$ grows with $$p$$ fixed, $$np$$ grows and eventually exceeds the Poisson comfort zone. Switch to normal.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "Street light failures occur at a rate of 1 every 2 days. What distribution models weekly failures, and what approximation for a 10-week total? (3 steps)", "answer": "- Step 1: Daily rate = 0.5 failures/day. Weekly rate = 7 × 0.5 = 3.5. So weekly failures $$\\sim Po(3.5)$$. This is the standard Poisson process (independent events at constant rate).\n- Step 2: Over 10 weeks, the rate scales linearly: $$\\lambda = 10 \\times 3.5 = 35$$. So 10-week total $$\\sim Po(35)$$.\n- Step 3: Since $$\\lambda = 35 > 10$$, use normal approximation: $$N(35, 35)$$, with continuity correction for probability questions.\n\nScaling rule: Poisson rates add linearly across disjoint time intervals. Larger window → larger $$\\lambda$$.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "If $$\\lambda = 100$$ for a Poisson, why can you treat the normal approximation's negative-value tail as irrelevant? (3 steps)", "answer": "- Step 1: For $$Po(100)$$, mean is 100 and standard deviation is $$\\sqrt{100} = 10$$. The distribution is concentrated between roughly 70 and 130.\n- Step 2: The probability $$P(X < 0)$$ under $$N(100, 100)$$ corresponds to a $$z$$-score of $$-10$$, i.e., 10 standard deviations below the mean — astronomically small (on the order of $$10^{-23}$$).\n- Step 3: So the normal assigns essentially zero density to negative values. The theoretical flaw (normal extending to negatives, Poisson not) is practically irrelevant at large $$\\lambda$$.\n\nGeneral principle: approximations often have \"technical imperfections\" that are immaterial in realistic problem regions.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "Why don't you apply a continuity correction when approximating a binomial by a Poisson? (3 steps)", "answer": "- Step 1: Both binomial and Poisson are DISCRETE distributions. They both assign probability to individual integer values.\n- Step 2: Continuity correction specifically bridges discrete → continuous by treating discrete integers as unit-wide intervals. If both distributions are discrete, probabilities are compared directly at the same (integer) points.\n- Step 3: So $$P(X = k) \\approx P(Y = k)$$ and $$P(X \\leq k) \\approx P(Y \\leq k)$$ directly — no ±0.5 shift needed.\n\nRule: continuity correction applies only to discrete → continuous transitions (Binomial→Normal, Poisson→Normal), not discrete → discrete.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Why is a binomial with $$p = 0.1$$ right-skewed and one with $$p = 0.9$$ left-skewed? (3 steps)", "answer": "- Step 1: For $$p = 0.1$$, mean $$np$$ sits near the LEFT end of $$[0, n]$$. Most probability mass clusters around small values, but the distribution must still extend all the way up to $$n$$ (with tiny probability), creating a long right tail.\n- Step 2: For $$p = 0.9$$, mirror image: mean sits near the RIGHT end. Mass clusters at large values; the tail extends leftward toward 0.\n- Step 3: Only at $$p = 0.5$$ does the mean sit at the center ($$n/2$$), and the distribution is perfectly symmetric.\n\nWhy normal fails for extreme $$p$$: a symmetric bell cannot reproduce an asymmetric tail.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Starting from the fact that a Bernoulli(p) has mean $$p$$ and variance $$p(1-p)$$, derive the binomial mean and variance formulas. (3 steps)", "answer": "- Step 1: A binomial $$X \\sim B(n,p)$$ is the sum of $$n$$ independent Bernoulli(p) trials: $$X = Y_1 + Y_2 + \\cdots + Y_n$$.\n- Step 2: Linearity of expectation (works for any variables, independent or not): $$E(X) = E(Y_1) + E(Y_2) + \\cdots + E(Y_n) = p + p + \\cdots + p = np$$.\n- Step 3: Variance adds for INDEPENDENT variables: $$Var(X) = Var(Y_1) + \\cdots + Var(Y_n) = p(1-p) + \\cdots + p(1-p) = np(1-p)$$.\n\nThe additive structure of independent sums is exactly why the CLT (and hence the normal approximation) applies: binomial is \"many small pieces.\"", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Consider $$B(10, 0.5)$$. Even though $$p = 0.5$$ gives perfect symmetry, why is a normal approximation here still questionable? (3 steps)", "answer": "- Step 1: $$B(10, 0.5)$$ is perfectly symmetric but discrete, with only 11 possible values (0 to 10). The distribution is very \"chunky\" — not smooth.\n- Step 2: A normal approximation is a smooth curve. For only 11 integer \"bins,\" the smoothness of the normal doesn't track the coarse grain of the binomial well — each integer's probability is roughly 10% or more, too thick for a smooth bell to capture precisely.\n- Step 3: Rule: \"$$n$$ large\" in practice usually means $$n \\geq 30$$ or so. Small $$n$$ with $$p = 0.5$$ is easy to compute exactly; use the approximation only when the exact computation is a burden.\n\nTakeaway: \"$$p$$ close to 0.5\" is necessary but not sufficient — you also need $$n$$ genuinely large.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "If you forget to apply the continuity correction when approximating $$P(X = k)$$ with a normal, how badly wrong do you get? (3 steps)", "answer": "- Step 1: Without continuity correction: $$P(X = k) \\approx P(Y = k) = 0$$ for any continuous distribution. The approximation gives zero, which is catastrophically wrong.\n- Step 2: With continuity correction: $$P(X = k) \\approx P(k - 0.5 < Y < k + 0.5)$$, which captures a unit-wide strip of normal density around $$k$$ — roughly $$f(k) \\cdot 1$$ where $$f$$ is the normal density.\n- Step 3: Error from omitting CC is essentially 100% for single-point probabilities; for range probabilities it's smaller but still systematic, on the order of $$0.5 \\cdot f(\\text{boundary})$$.\n\nCC is not optional for discrete → continuous: skipping it produces fundamentally wrong answers.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "An exam says \"$$n$$ is very large, $$p$$ is unknown but small.\" What should you default to, and why? (2 steps)", "answer": "- Step 1: Default to Poisson approximation with $$\\lambda = np$$. The key signal is \"small $$p$$,\" which places us in the rare-events regime — Poisson's natural home.\n- Step 2: Normal approximation would need \"$$p$$ close to 0.5,\" which isn't implied here. Without symmetry, the normal would mishandle the skewed binomial.\n\nHeuristic: \"small $$p$$\" → Poisson; \"$$p \\approx 0.5$$\" → Normal; \"$$p$$ close to 1\" → swap to $$n - X$$ and apply Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Even if you have a calculator that does exact binomials, why might you use an approximation in an exam? (3 steps)", "answer": "- Step 1: Exam questions often explicitly demand an approximation (\"use a suitable approximation to estimate...\"). Using the exact binomial would score zero, even with a correct numerical answer.\n- Step 2: Approximations test your conceptual understanding: when does each distribution apply, why do they work, how to handle continuity correction.\n- Step 3: In practice (outside exams), approximations help you reason quickly about probabilities without heavy computation and give insights into parameter sensitivity.\n\nExam rule: if asked for an approximation, use one. Understanding when each applies is the examined skill.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "For $$X \\sim B(10000, 0.0005)$$, $$np = 5$$. Which approximation, and how good is it? (3 steps)", "answer": "- Step 1: $$np = 5 \\leq 10$$ and $$p = 0.0005$$ is extremely small. Both Poisson conditions are strongly satisfied. Use $$X \\approx Po(5)$$.\n- Step 2: The approximation is exceptionally accurate here because $$p$$ is so small that $$(1-p)^n$$ and $$e^{-np}$$ are nearly identical. Variance matching $$np(1-p) \\approx np$$ is nearly exact.\n- Step 3: $$n$$ being \"very large\" (10000) is fine — what matters is $$np$$ stays manageable. Don't let huge $$n$$ alone make you switch to normal; check $$np$$.\n\nPrinciple: the Poisson limit is most accurate when $$p$$ is genuinely tiny, not just \"somewhat small.\"", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "Visualize: how does $$B(14, 0.5)$$ relate to the normal $$N(7, 1.87^2)$$, and what role does continuity correction play? (3 steps)", "answer": "- Step 1: $$B(14, 0.5)$$ is a set of 15 vertical bars at integers 0 through 14, symmetric around 7. Each bar's height is $$P(X = k)$$.\n- Step 2: $$N(7, 1.87^2)$$ is a smooth bell curve centered at 7 with standard deviation ~1.87, overlaying the bars.\n- Step 3: CC idea: each integer-valued bar has effective width 1, from $$k - 0.5$$ to $$k + 0.5$$. The normal density integrated over this interval approximates the bar's probability. For $$P(X \\leq 7)$$, include the whole bar at 7, so the normal cutoff is 7.5, not 7.\n\nKey visual: CC matches \"box areas\" (discrete bars) to \"integrals\" (continuous regions).", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "For the binomial $$B(100, 0.05)$$, which approximation is appropriate, and what's the parameter? (3 steps)", "answer": "- Step 1: Check: $$n = 100$$ is large; $$p = 0.05$$ is small. Compute $$np = 5 \\leq 10$$.\n- Step 2: Both Poisson conditions hold. Normal would fail because $$p$$ is far from 0.5 (skewed binomial). Use Poisson.\n- Step 3: Parameters: $$\\lambda = np = 5$$. So $$X \\approx Po(5)$$. No continuity correction needed.\n\nDiagnostic: $$p = 0.05$$ flashes \"rare event\" — Poisson regime.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "A newspaper shop has 40% of customers buying a paper. In a sample of 100, what approximation for \"at least half buy a paper\"? (3 steps)", "answer": "- Step 1: $$X \\sim B(100, 0.40)$$. Check: $$n = 100$$ large ✓; $$p = 0.40$$ close to 0.5 ✓. Use normal.\n- Step 2: Parameters: $$\\mu = 40$$, $$\\sigma^2 = 24$$, $$\\sigma \\approx 4.90$$.\n- Step 3: $$P(X \\geq 50)$$ includes 50, so CC gives $$P(Y > 49.5)$$. Standardize: $$Z = (49.5 - 40)/\\sqrt{24} \\approx 1.94$$, then look up $$P(Z > 1.94)$$.\n\nConceptual: this is a straight \"normal approximation with CC\" setup — three conditions met, standard procedure.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "A factory's 55% of bulbs produce yellow flowers. You plant 80 and want $$P(X = 50)$$. Walk through the normal approximation setup (no final number). (4 steps)", "answer": "- Step 1: $$X \\sim B(80, 0.55)$$. Check: $$n = 80$$ large ✓, $$p = 0.55$$ close to 0.5 ✓. Use normal.\n- Step 2: Parameters: $$\\mu = 80 \\times 0.55 = 44$$. $$\\sigma^2 = 80 \\times 0.55 \\times 0.45 = 19.8$$, $$\\sigma \\approx 4.45$$.\n- Step 3: Continuity correction for $$P(X = 50)$$: the single discrete point 50 becomes the interval $$(49.5, 50.5)$$. So $$P(X = 50) \\approx P(49.5 < Y < 50.5)$$.\n- Step 4: Standardize both bounds: $$z_1 = (49.5 - 44)/\\sqrt{19.8}$$, $$z_2 = (50.5 - 44)/\\sqrt{19.8}$$. Then $$P(X = 50) \\approx P(z_1 < Z < z_2)$$ from tables.\n\nWorkflow: identify model → check conditions → approximate → apply CC → standardize.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "A box has 500 switches, each independently faulty with probability 0.005. For $$P(X < 2)$$, which method — exact, Poisson approx, or normal approx — is most accurate and convenient? (4 steps)", "answer": "- Step 1: $$X \\sim B(500, 0.005)$$. $$n$$ large, $$p$$ tiny, $$np = 2.5$$. Textbook Poisson regime.\n- Step 2: Exact: $$P(X = 0) + P(X = 1) = (0.995)^{500} + 500 \\times 0.005 \\times (0.995)^{499}$$. Computable but tedious.\n- Step 3: Poisson: $$P(X = 0) + P(X = 1) = e^{-2.5} + 2.5 e^{-2.5}$$. Fast, simple, and highly accurate since Poisson conditions strongly hold.\n- Step 4: Normal: $$np = 2.5$$ is FAR less than 10 (rule: $$\\lambda > 10$$). Normal approximation fails completely here — the distribution at this small mean is highly skewed, nowhere near symmetric.\n\nConclusion: Poisson wins on both accuracy and ease. Normal fails because the mean is too small.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "A doctor claims a 52% cure rate. In 300 patients, 170 are cured. Under the doctor's claim, what approximation would you use to compute $$P(X \\geq 170)$$? (3 steps)", "answer": "- Step 1: Under the claim, $$X \\sim B(300, 0.52)$$. $$n = 300$$ large ✓; $$p = 0.52$$ very close to 0.5 ✓. Normal approximation ideal.\n- Step 2: Parameters: $$\\mu = 300 \\times 0.52 = 156$$, $$\\sigma^2 = 300 \\times 0.52 \\times 0.48 = 74.88$$, $$\\sigma \\approx 8.65$$.\n- Step 3: $$P(X \\geq 170) \\approx P(Y > 169.5)$$ (CC includes 170). Standardize: $$Z = (169.5 - 156)/\\sqrt{74.88} \\approx 1.56$$. If $$P(Z > 1.56)$$ is small (~6%), the observation is consistent but somewhat on the high side of the claim.\n\nThis is essentially a one-sided hypothesis test performed via normal approximation.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "What does the Poisson parameter $$\\lambda$$ physically represent in real-world scenarios like accidents per day or calls per hour? (2 steps)", "answer": "- Step 1: $$\\lambda$$ is the expected (average) number of events in the specified time window. Uniquely for the Poisson, it's also the variance — the mean and variance coincide.\n- Step 2: It scales with the time window linearly: if events occur at 3 per hour and you look at a 2-hour window, $$\\lambda = 6$$. Independent windows are additive: $$Po(\\lambda_1) + Po(\\lambda_2) = Po(\\lambda_1 + \\lambda_2)$$ when independent.\n\n$$\\lambda$$ is literally \"rate × time\" — a number with intuitive physical meaning.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "Name two distinct ways a student might misapply the normal approximation to a binomial. (3 steps)", "answer": "- Step 1: Failure 1: Applying normal when $$p$$ is far from 0.5 (like $$p = 0.05$$). The binomial is skewed, but normal is symmetric — shape mismatch. Correct choice here is Poisson.\n- Step 2: Failure 2: Forgetting continuity correction. Gives systematically wrong cumulative probabilities and zero for point probabilities $$P(X = k)$$.\n- Step 3: Failure 3 (bonus): Using $$\\sqrt{np}$$ (Poisson-style variance) instead of $$\\sqrt{np(1-p)}$$ (correct binomial variance). Results in overly wide normal and wrong tail probabilities.\n\nEach failure reflects a misunderstanding of what the approximation actually preserves.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "Summarize all three chapter approximations in one coherent picture, with conditions and rationale. (3 steps)", "answer": "- Step 1: Binomial → Poisson: condition $$n$$ large, $$p$$ small ($$np \\leq 10$$). Parameter $$\\lambda = np$$. Rationale: rare-events limit; $$(1-p) \\approx 1$$ makes binomial variance $$\\approx$$ mean, matching Poisson.\n- Step 2: Binomial → Normal: condition $$n$$ large, $$p$$ close to 0.5. Parameters $$\\mu = np$$, $$\\sigma^2 = np(1-p)$$. Requires continuity correction. Rationale: CLT on a sum of Bernoullis, with symmetry when $$p \\approx 0.5$$.\n- Step 3: Poisson → Normal: condition $$\\lambda$$ large ($$\\lambda > 10$$). Parameters $$N(\\lambda, \\lambda)$$. Requires continuity correction. Rationale: Poisson = sum of many tiny Poissons, CLT makes large-$$\\lambda$$ Poisson symmetric and bell-shaped.\n\nMeta-rule: never chain Binomial → Poisson → Normal. Go direct to Normal, which uses exact binomial variance.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "Poisson $$Po(\\lambda)$$ has infinite support $$\\{0, 1, 2, ...\\}$$, but binomial is bounded by $$n$$. How can Poisson approximate binomial despite this mismatch? (3 steps)", "answer": "- Step 1: Technically, Poisson assigns positive probability to $$X > n$$, which is impossible for binomial. So in that sense, the Poisson DOES assign \"wrong\" probabilities.\n- Step 2: But when $$p$$ is small and $$\\lambda = np$$ is modest, $$P(X > n)$$ under $$Po(\\lambda)$$ is astronomically small. For $$B(1000, 0.007)$$, $$\\lambda = 7$$, and $$P(X > 1000)$$ under $$Po(7)$$ is essentially $$e^{-7000}$$ — zero to all practical precision.\n- Step 3: So the \"extra\" probability mass Poisson places at impossible values is immaterial. The approximation is accurate where it counts (the realistic range).\n\nLesson: approximations often have technical flaws that vanish in practice — don't confuse theoretical imperfection with practical inaccuracy.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "A cereal has prizes in 56% of boxes. You sample 100 boxes. Which approximation, and what parameters? (3 steps)", "answer": "- Step 1: Let $$X \\sim B(100, 0.56)$$. $$n = 100$$ large ✓, $$p = 0.56$$ close to 0.5 ✓. Normal applies.\n- Step 2: $$\\mu = 100 \\times 0.56 = 56$$. $$\\sigma^2 = 100 \\times 0.56 \\times 0.44 = 24.64$$, $$\\sigma \\approx 4.96$$.\n- Step 3: $$X \\approx N(56, 24.64)$$ or $$N(56, 4.96^2)$$. For any probability question, apply continuity correction.\n\nTypical normal-approximation-to-binomial scenario — directly passes both conditions.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "A factory makes pots; 5% are broken. For sample sizes 10, 140, and 10000, which computational approach for each? (3 steps)", "answer": "- Step 1: Sample of 10: $$B(10, 0.05)$$. $$n$$ not very large; computations are quick. Use exact binomial — no approximation needed.\n- Step 2: Sample of 140: $$B(140, 0.05)$$. $$np = 7 \\leq 10$$, $$p$$ small. Use Poisson: $$Po(7)$$.\n- Step 3: Sample of 10000: $$B(10000, 0.05)$$. $$np = 500 \\gg 10$$. Poisson tables stop at 10; use normal: $$N(500, 475)$$.\n\nScaling: small $$n$$ → exact; moderate $$n$$ with small $$p$$ → Poisson; large $$n$$ with $$np$$ moderate/large → Normal.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "For $$X \\sim Po(25)$$, estimate $$P(18 \\leq X < 35)$$ using a normal approximation (walk through the setup, no final arithmetic). (4 steps)", "answer": "- Step 1: Check: $$\\lambda = 25 > 10$$ ✓. Use $$Y \\sim N(25, 25)$$.\n- Step 2: Apply continuity correction:\n+ Lower bound: $$X \\geq 18$$ includes 18, so expand down to 17.5.\n+ Upper bound: $$X < 35$$ excludes 35, so shrink down to 34.5.\n- Step 3: So $$P(18 \\leq X < 35) \\approx P(17.5 \\leq Y < 34.5)$$.\n- Step 4: Standardize: $$z_1 = (17.5 - 25)/\\sqrt{25} = -1.5$$, $$z_2 = (34.5 - 25)/\\sqrt{25} = 1.9$$. Look up $$P(-1.5 \\leq Z < 1.9)$$ in tables.\n\nStandard procedure: verify condition → CC (treating each endpoint independently) → standardize.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "Suppose $$np = 50$$ and $$np(1-p) = 25$$. If you chain Binomial → Poisson → Normal, what variance would your final normal have, and why is that problematic? (3 steps)", "answer": "- Step 1: Binomial → Poisson forces variance = mean = 50. This already loses information about the true binomial variance (25).\n- Step 2: Poisson → Normal then yields $$N(50, 50)$$. Standard deviation $$\\sqrt{50} \\approx 7.07$$, whereas the true binomial has $$\\sqrt{25} = 5$$.\n- Step 3: Your final normal is about 40% too spread out. Tail probabilities are overestimated; standardized scores are smaller in magnitude. Directly using $$N(50, 25)$$ preserves exact variance.\n\nChaining loses information about variance. Always go Binomial → Normal directly when normal conditions hold.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "A company has 45% orchid yield; a sample of 240. How would you approximate \"fewer than 110 produce pink flowers\"? (3 steps)", "answer": "- Step 1: $$X \\sim B(240, 0.45)$$. $$n = 240$$ large, $$p = 0.45$$ close to 0.5. Normal applies.\n- Step 2: Parameters: $$\\mu = 108$$, $$\\sigma^2 = 59.4$$, $$\\sigma \\approx 7.71$$.\n- Step 3: \"Fewer than 110\" means $$X < 110$$, i.e., $$X \\leq 109$$. With CC: $$P(X \\leq 109) \\approx P(Y < 109.5)$$. Standardize: $$Z = (109.5 - 108)/\\sqrt{59.4}$$, then table lookup.\n\nAlternative (using $$X < 110$$ directly): exclude 110, so shift inward to 109.5 — same result.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "A fair coin is tossed 60 times. For the probability of fewer than 25 heads, which approximation and what parameters? (3 steps)", "answer": "- Step 1: $$X \\sim B(60, 0.5)$$. $$n = 60$$ is reasonably large; $$p = 0.5$$ is exactly 0.5 (best case). Normal approximation ideal.\n- Step 2: $$\\mu = 30$$, $$\\sigma^2 = 15$$, $$\\sigma \\approx 3.87$$.\n- Step 3: $$P(X < 25)$$ excludes 25, so CC: $$P(Y < 24.5)$$. Standardize: $$Z = (24.5 - 30)/\\sqrt{15} \\approx -1.42$$. Look up $$P(Z < -1.42)$$.\n\nNote the \"textbook-perfect\" setup: $$p = 0.5$$ ensures symmetry — no skew issues.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "The chapter covers three approximations. If a question gives you $$B(500, 0.06)$$ without specifying, what would you compute as $$np$$, and what choice does it suggest? (3 steps)", "answer": "- Step 1: Compute $$np = 500 \\times 0.06 = 30$$. This exceeds 10.\n- Step 2: Since $$np > 10$$, the normal approximation is suggested. Poisson tables stop around $$\\lambda = 10$$, and the binomial shape at $$np = 30$$ is fairly bell-shaped already.\n- Step 3: Normal with $$\\mu = 30$$, $$\\sigma^2 = np(1-p) = 28.2$$. Apply continuity correction.\n\nNote: even though $$p = 0.06$$ is \"small,\" $$np = 30$$ is large enough that the binomial has thickened up
