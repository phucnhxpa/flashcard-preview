<script>
const DATA={"selected": [{"question": "If $$X \\sim B(n, p)$$ is approximated by $$Po(np)$$, is the Poisson estimate of $$P(X = 0)$$ an overestimate or underestimate? Justify using the Taylor expansion. (5 steps)", "answer": "- Step 1: Exact: $$P(X = 0) = (1-p)^n$$ (binomial with $$k = 0$$).\n- Step 2: Poisson approximation: $$P(X = 0) \\approx e^{-np}$$ (Poisson with $$k = 0$$).\n- Step 3: Compare via logs: $$\\ln(1-p)^n = n\\ln(1-p)$$, and the Taylor series gives $$\\ln(1-p) = -p - \\tfrac{p^2}{2} - \\tfrac{p^3}{3} - \\dots < -p$$ for $$0 < p < 1$$.\n- Step 4: Therefore $$n\\ln(1-p) < -np$$, which means $$(1-p)^n < e^{-np}$$.\n- Step 5: Conclusion: the Poisson estimate $$e^{-np}$$ is *larger* than the true binomial probability $$(1-p)^n$$. So the Poisson approximation systematically **overestimates** $$P(X = 0)$$.\n\nTakeaway: the approximation has a small, consistent bias near $$k = 0$$ that vanishes as $$p \\to 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "Suppose you are approximating $$P(X \\leqslant 20)$$ for a Binomial variable using a Normal approximation, but you forget the continuity correction. Will your answer be an overestimate or an underestimate of the true probability, and why? (3 steps)", "answer": "- Step 1: The correct approximation is $$P(Y < 20.5)$$. Forgetting the continuity correction means you calculate $$P(Y < 20)$$.\n- Step 2: The interval $$(-\\infty, 20)$$ is strictly smaller than the interval $$(-\\infty, 20.5)$$ under the Normal curve, missing the area between 20 and 20.5.\n- Step 3: Since you are integrating over a smaller area, $$P(Y < 20) < P(Y < 20.5)$$. Therefore, forgetting the continuity correction for $$P(X \\leqslant 20)$$ will result in an underestimate.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "Why does the Poisson approximation to binomial fail when p is not small (e.g., B(100, 0.5))? (2 steps)", "answer": "- Step 1: When p = 0.5, the variance is np(1-p) = 100 × 0.5 × 0.5 = 25, but the mean is np = 50. These are **NOT equal** (variance ≠ mean).\n- Step 2: The Poisson distribution requires variance ≈ mean. When p is close to 0.5, the variance is significantly less than the mean, violating this core property. This is why we use a **normal approximation** instead when p ≈ 0.5.", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "What does it mean for a Poisson distribution to have a \"large\" value of λ, and why does the normal approximation improve as λ increases? (2 steps)", "answer": "- Step 1: In this course, λ > 10 is considered \"large\" for using normal approximation to Poisson.\n- Step 2: As λ increases, the Poisson distribution becomes increasingly symmetric. The Poisson distribution is right-skewed for small λ but approaches a normal shape as λ grows. By λ = 10, the distribution is nearly symmetric, making the normal approximation accurate.", "source": "MiniMax ①", "_id": "minimax_1_25"}, {"question": "Why does a Poisson distribution start looking like a normal when $$\\lambda$$ is large? (3 steps)", "answer": "- Step 1: A Poisson with rate $$\\lambda$$ can be decomposed: $$Po(\\lambda)$$ equals the sum of $$n$$ independent $$Po(\\lambda/n)$$ variables for any $$n$$. So it's structurally a sum of many small independent pieces.\n- Step 2: By the Central Limit Theorem, sums of many independent variables approach a normal distribution. The CLT applies to Poisson in this \"subdivision\" sense.\n- Step 3: Visually: $$Po(1)$$ is heavily right-skewed (bunched near 0 with a long right tail). $$Po(10)$$ is slightly skewed but noticeably bell-ish. $$Po(50)$$ is visually indistinguishable from a normal curve.\n\nAs $$\\lambda$$ grows, the right tail extends enough to balance the support, and the shape smooths into a bell.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "In the histogram of a discrete distribution, the bar at integer $$k$$ occupies the interval from $$k - 0.5$$ to $$k + 0.5$$ on the axis. How does this justify the continuity correction geometrically? (4 steps)", "answer": "- Step 1: Each bar has width 1 and height equal to the probability at that integer, so its *area* equals $$P(X = k)$$.\n- Step 2: When we overlay a smooth normal curve matched to the histogram's mean and variance, the curve traces the envelope of the bars.\n- Step 3: To approximate a discrete probability with the continuous normal, we integrate the curve over the region covering the relevant bars — their combined horizontal footprint.\n- Step 4: Example: event \"$$X \\leq 5$$\" includes integer bars for $$0, 1, 2, 3, 4, 5$$. Their combined region is $$(-\\infty, 5.5]$$, not $$(-\\infty, 5]$$. Hence the corrected expression $$P(Y < 5.5)$$.\n\nContinuity correction is really just \"compute the right area, matching the histogram's boundaries.\"", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "Why can a Poisson distribution be approximated by a Normal distribution when $$\\lambda$$ is large? Relate this to the visual shape of the distributions. (3 steps)", "answer": "- Step 1: A Poisson distribution with a small $$\\lambda$$ is heavily right-skewed because it is bounded below by 0 and has no upper bound.\n- Step 2: As $$\\lambda$$ increases, the distribution spreads out to the right. The \"left tail\" near 0 becomes less significant relative to the mean, and the distribution becomes more symmetric and bell-shaped.\n- Step 3: Since the Normal distribution is symmetric and bell-shaped, it becomes a good fit for the Poisson distribution when $$\\lambda$$ is sufficiently large (typically $$\\lambda > 10$$).", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "Derive why the normal approximation to $$B(n, p)$$ uses exactly $$\\mu = np$$ and $$\\sigma^2 = np(1-p)$$ from first principles. (3 steps)", "answer": "- Step 1: The binomial $$X$$ is the sum of $$n$$ independent Bernoulli(p) trials: $$X = Y_1 + Y_2 + \\cdots + Y_n$$, where each $$Y_i$$ is 1 with probability $$p$$, else 0.\n- Step 2: For a single Bernoulli(p): $$E(Y_i) = p$$ and $$Var(Y_i) = p(1-p)$$. By linearity of expectation, $$E(X) = np$$. By independence, variances add: $$Var(X) = np(1-p)$$.\n- Step 3: The Central Limit Theorem says sums of many independent identically-distributed variables tend to normality. Matching mean and variance gives $$X \\approx N(np, np(1-p))$$.\n\nSo the normal approximation is the binomial's \"CLT limit\" with exact first two moments preserved.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "List all the continuity correction rules for translating discrete $$X$$-probabilities into continuous $$Y$$-probabilities. (2 steps)", "answer": "- Step 1: For discrete $$X$$ and continuous $$Y$$:\n+ $$P(X \\leq k) \\approx P(Y < k + 0.5)$$\n+ $$P(X < k) \\approx P(Y < k - 0.5)$$\n+ $$P(X \\geq k) \\approx P(Y > k - 0.5)$$\n+ $$P(X > k) \\approx P(Y > k + 0.5)$$\n+ $$P(X = k) \\approx P(k - 0.5 < Y < k + 0.5)$$\n+ $$P(a \\leq X \\leq b) \\approx P(a - 0.5 < Y < b + 0.5)$$\n- Step 2: General principle: at each endpoint, ask \"is this integer INCLUDED?\" If yes, expand outward by 0.5 to include its full rectangle; if no, shrink inward by 0.5 to exclude it.\n\nMnemonic: \"Stretch to include, shrink to exclude.\"", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "In the normal approximation to binomial, what does it mean if σ is small (e.g., σ = 1)? What are the implications? (2 steps)", "answer": "- Step 1: A small σ means the distribution is **very narrow** — most values are clustered very close to the mean.\n- Step 2: This makes the **continuity correction crucial** because the discrete \"steps\" (gaps between integers) are large relative to the spread. Also, with small σ, the normal approximation may not be valid even if n is large, because the binomial may not be smooth enough. Consider using exact binomial or Poisson instead.", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "For a continuous distribution, $$P(Y = k) = 0$$. So how do we compute $$P(X = k)$$ using a normal approximation? (2 steps)", "answer": "- Step 1: We cannot use $$P(Y = k)$$ directly — it's always zero, which is clearly wrong for any meaningful binomial point probability.\n- Step 2: Use continuity correction: $$P(X = k) \\approx P(k - 0.5 < Y < k + 0.5)$$. This integrates the normal density over a unit-wide interval centered at $$k$$, capturing the \"rectangle\" of mass the discrete distribution places there.\n\nSo the normal approximation to a point probability is an interval integral — never a point evaluation.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "If $$p$$ is already small, why do we also need $$n$$ to be large for the Poisson approximation to the binomial to work well? (3 steps)", "answer": "- Step 1: With small $$p$$ and small $$n$$, we just have a tiny binomial — there's nothing to approximate; you can compute directly from the formula.\n- Step 2: The Poisson approximation is derived as a limit: as $$n \\to \\infty$$ and $$p \\to 0$$ while keeping $$np = \\lambda$$ fixed, binomial probabilities $$\\binom{n}{k}p^k(1-p)^{n-k}$$ converge to Poisson $$\\frac{e^{-\\lambda}\\lambda^k}{k!}$$. Large $$n$$ is needed to be \"close to\" that limit.\n- Step 3: Intuitively: Poisson assumes infinitely many chances with tiny individual probability. The larger $$n$$ is, the more the binomial looks like \"continuous opportunity\" with events at rate $$\\lambda$$ — which is the Poisson setup.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Conceptually, why does the condition \"$$p$$ is small\" mathematically justify using a Poisson approximation for a Binomial distribution? Think about the relationship between the mean and variance. (3 steps)", "answer": "- Step 1: For a Binomial distribution, the mean is $$E(X) = np$$ and the variance is $$Var(X) = np(1-p)$$.\n- Step 2: When $$p$$ is very small, the term $$(1-p)$$ is very close to 1. Therefore, the variance $$np(1-p)$$ becomes approximately equal to $$np$$.\n- Step 3: This means the mean and variance of the Binomial are approximately equal ($$E(X) \\approx Var(X)$$). The defining characteristic of a Poisson distribution is that its mean and variance are exactly equal to its parameter $$\\lambda$$, which is why the approximation is mathematically valid in this regime.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "Why is a binomial with $$p = 0.1$$ right-skewed and one with $$p = 0.9$$ left-skewed? (3 steps)", "answer": "- Step 1: For $$p = 0.1$$, mean $$np$$ sits near the LEFT end of $$[0, n]$$. Most probability mass clusters around small values, but the distribution must still extend all the way up to $$n$$ (with tiny probability), creating a long right tail.\n- Step 2: For $$p = 0.9$$, mirror image: mean sits near the RIGHT end. Mass clusters at large values; the tail extends leftward toward 0.\n- Step 3: Only at $$p = 0.5$$ does the mean sit at the center ($$n/2$$), and the distribution is perfectly symmetric.\n\nWhy normal fails for extreme $$p$$: a symmetric bell cannot reproduce an asymmetric tail.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "State the universal principle behind all three distribution approximations in this chapter. Why does matching two moments suffice? (4 steps)", "answer": "- Step 1: The principle: when approximating one distribution by another, match the first two moments — **mean** (location) and **variance** (spread).\n- Step 2: Worked instances:\n+ Binomial → Poisson: $$E_B = np$$ matches $$\\lambda_P = np$$; $$Var_B = np(1-p) \\approx np = Var_P$$ when $$p$$ is small.\n+ Binomial → Normal: $$\\mu_N = E_B = np$$; $$\\sigma^2_N = Var_B = np(1-p)$$.\n+ Poisson → Normal: $$\\mu_N = E_P = \\lambda$$; $$\\sigma^2_N = Var_P = \\lambda$$.\n- Step 3: Why two moments suffice to first order: a probability distribution is broadly characterised by where it sits (mean) and how wide it spreads (variance). Matching these ensures the bulk of the distribution lines up correctly.\n- Step 4: Higher moments (skew, kurtosis) account for residual mismatch — that's why extra conditions (like \"$$p$$ close to 0.5\" or \"$$\\lambda$$ large\") are needed: they ensure the shape beyond the second moment is also similar.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "A factory produces nails in packets of 200 with 2.5% faulty rate. A carpenter buys 6 packets. Describe the layered approach to estimate the probability more than half the packets contain more than 6 faulty nails. (5 steps)", "answer": "- Step 1: **Inner problem**: probability one packet has > 6 faulty nails. Let $$X$$ = faulty per packet, $$X \\sim B(200, 0.025)$$. $$np = 5 \\leq 10$$, so approximate $$X \\approx Po(5)$$. Compute $$p^* = P(X > 6)$$ from Poisson tables.\n- Step 2: **Outer problem**: out of 6 packets, count those with > 6 faulty nails. Let $$Y$$ = number of \"bad\" packets, $$Y \\sim B(6, p^*)$$.\n- Step 3: \"More than half\" means $$Y > 3$$, i.e. $$Y \\geq 4$$.\n- Step 4: Compute $$P(Y \\geq 4)$$ directly from the binomial formula (since $$n = 6$$ is small, no approximation needed). You'd evaluate $$P(Y = 4) + P(Y = 5) + P(Y = 6)$$.\n- Step 5: Lesson: nested problems may have different distributions at each level — apply the correct approximation per level. The outer layer often stays exact because $$n$$ is small.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Give a simple mental rule for applying continuity correction: how do you know whether to add or subtract 0.5? (3 steps)", "answer": "- Step 1: The core rule: \"**integer included → boundary moves outward** (away from the event's center); **integer excluded → boundary moves inward** (toward the center).\"\n- Step 2: For the upper boundary of a region:\n+ $$X \\leq k$$ (k included): use $$Y < k + 0.5$$.\n+ $$X < k$$ (k excluded): use $$Y < k - 0.5$$.\n- Step 3: For the lower boundary:\n+ $$X \\geq k$$ (k included): use $$Y > k - 0.5$$.\n+ $$X > k$$ (k excluded): use $$Y > k + 0.5$$.\n\nRemembering the direction of the $$\\pm 0.5$$ is easy if you think: \"the boundary swings by 0.5 to correctly include/exclude the integer $$k$$.\"", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "Why does the normal approximation to the Poisson distribution require a larger $ \\lambda $ than the Poisson approximation to the binomial? (3 steps)", "answer": "- Step 1: **Poisson shape**: The Poisson distribution is skewed for small $ \\lambda $, becoming symmetric as $ \\lambda \\uparrow $.  \n- Step 2: **Normal requirements**: The normal approximation relies on symmetry, requiring $ \\lambda > 10 $.  \n- Step 3: **Poisson approximation for binomial**: The binomial-to-Poisson approximation works for $ np \\leq 10 $, where the binomial is already skewed (matching Poisson’s skewness).  \n\n+ Example: For $ \\lambda = 25 $, the Poisson distribution is nearly normal, but for $ \\lambda = 6 $, it remains skewed.", "source": "Qwen 3 ②", "_id": "qwen_2_7"}, {"question": "A shop owner knows 40% of customers buy a newspaper and 4% spend over $10. Out of 100 customers, describe which approximation to use for: (a) $$P(\\text{at least half buy a newspaper})$$, (b) $$P(\\text{more than 5 spend over \\$10})$$. (4 steps)", "answer": "- Step 1: (a) Newspaper: $$X \\sim B(100, 0.4)$$, $$np = 40$$. $$p$$ is close to 0.5, $$n$$ is large. **Normal approximation**: $$X \\approx N(40, 24)$$. Continuity correction required.\n- Step 2: (b) Spend over $10: $$Y \\sim B(100, 0.04)$$, $$np = 4$$. $$p$$ is small. **Poisson approximation**: $$Y \\approx Po(4)$$. No continuity correction.\n- Step 3: Both involve the same sample size (100), but the character of the event — common vs. rare — drives the approximation choice.\n- Step 4: Lesson: the approximation depends on $$p$$ (and hence on the mean $$np$$), not just on $$n$$. Same sample size, two different approximations.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "Why does a binomial distribution with large $$n$$ look increasingly like a normal, regardless of $$p$$? What theoretical result underlies this? (4 steps)", "answer": "- Step 1: A binomial $$B(n, p)$$ is the sum of $$n$$ independent Bernoulli trials $$X_1 + X_2 + \\dots + X_n$$, each with outcomes in $$\\{0, 1\\}$$.\n- Step 2: The **Central Limit Theorem (CLT)** states: the sum of many independent, identically distributed random variables (with finite variance) tends toward a normal distribution, properly shifted and scaled.\n- Step 3: So as $$n$$ grows, the shape of $$B(n, p)$$ approaches normal. The *speed* of convergence depends on $$p$$: fastest at $$p = 0.5$$ (symmetry already matches), slower as $$p$$ moves toward 0 or 1 (more skew to overcome).\n- Step 4: In practice: for any fixed $$p$$ (except 0 or 1), there exists $$n$$ large enough for the normal to be a good fit. In S2, the simplified rule is \"$$n$$ large and $$p$$ close to 0.5.\"", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "It can be shown that a Poisson approximation to a Binomial distribution will always overestimate $$P(X = 0)$$. Why does this happen mathematically? Hint: Compare the exact Binomial formula for $$P(X=0)$$ with the Poisson approximation and use the inequality $$1+x \\leqslant e^x$$. (3 steps)", "answer": "- Step 1: For a Binomial distribution, the exact probability of zero successes is $$P(X=0) = (1-p)^n$$.\n- Step 2: The Poisson approximation gives $$P(Y=0) = e^{-\\lambda} = e^{-np}$$.\n- Step 3: Using the mathematical inequality $$1+x \\leqslant e^x$$ for all real $$x$$, substitute $$x = -p$$ to get $$1-p \\leqslant e^{-p}$$. Raising both sides to the power of $$n$$ (since $$n > 0$$, the inequality direction is preserved) gives $$(1-p)^n \\leqslant e^{-np}$$. Thus, the Poisson probability is always greater than or equal to the true Binomial probability for $$X=0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "Suppose $$np = 50$$ and $$np(1-p) = 25$$. If you chain Binomial → Poisson → Normal, what variance would your final normal have, and why is that problematic? (3 steps)", "answer": "- Step 1: Binomial → Poisson forces variance = mean = 50. This already loses information about the true binomial variance (25).\n- Step 2: Poisson → Normal then yields $$N(50, 50)$$. Standard deviation $$\\sqrt{50} \\approx 7.07$$, whereas the true binomial has $$\\sqrt{25} = 5$$.\n- Step 3: Your final normal is about 40% too spread out. Tail probabilities are overestimated; standardized scores are smaller in magnitude. Directly using $$N(50, 25)$$ preserves exact variance.\n\nChaining loses information about variance. Always go Binomial → Normal directly when normal conditions hold.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "If you forget to apply a continuity correction when using a normal approximation, what kind of error do you typically introduce, and when is it worst? (4 steps)", "answer": "- Step 1: Without correction, you under- or over-count by up to half a histogram bar at each boundary. For $$P(X = k)$$, you get zero — a complete loss.\n- Step 2: The error is *worst* when the probability event is narrow:\n+ Single-value: error catastrophic (true probability vs. zero).\n+ Narrow interval (e.g. 2–3 integers): each half-unit is a meaningful fraction of the window.\n- Step 3: The error is *smallest* for wide events like $$P(20 \\leq X \\leq 80)$$ — the missing 0.5 at each end is negligible against the wide span.\n- Step 4: Rule: always apply continuity correction. The cost is trivial; the benefit is sometimes large.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Why is continuity correction unnecessary when approximating a binomial distribution with a Poisson distribution but necessary when approximating with a normal distribution? (3 steps)", "answer": "- Step 1: The Poisson distribution is discrete, matching the discrete nature of the binomial distribution.  \n- Step 2: The normal distribution is continuous, while the binomial is discrete, requiring a correction (±0.5) to account for the gap between discrete and continuous probabilities.  \n+ Example: For P(X ≤ k) in binomial, use P(Y < k+0.5) in normal approximation.  \n- Step 3: Since Poisson and binomial are both discrete, no adjustment is needed between them.", "source": "Qwen 3 ①", "_id": "qwen_1_2"}, {"question": "You have $$Y \\sim B(200, 0.98)$$. The direct Poisson approximation fails ($$p$$ is large, not small). How can you still exploit a Poisson approximation? (3 steps)", "answer": "- Step 1: Define $$X = 200 - Y$$, representing the number of \"failures\" rather than \"successes.\" Since $$Y$$'s failures are rare, $$X \\sim B(200, 0.02)$$.\n- Step 2: Now $$X$$ satisfies Poisson conditions: $$n = 200$$ large, $$p = 0.02$$ small, $$np = 4 \\leq 10$$. Approximate $$X \\approx Po(4)$$.\n- Step 3: Translate probabilities: $$P(Y = 197) = P(X = 3)$$, $$P(Y \\geq 198) = P(X \\leq 2)$$, etc. You work on $$X$$'s Poisson approximation, then read back.\n\nTrick: when successes are \"too common,\" swap perspectives — rare events don't have to be successes.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "How do you apply the continuity correction for the following Binomial probabilities when approximating with a Normal distribution? a) $$P(X \\leq 10)$$, b) $$P(X > 15)$$, c) $$P(5 \\leq X \\leq 12)$$. (3 steps)", "answer": "- Step 1: For $$P(X \\leq 10)$$, we want all probability up to and including 10. On the continuous scale, the mass at 10 extends up to the halfway point to 11, so we use $$P(Y < 10.5)$$.\n- Step 2: For $$P(X > 15)$$, we want probability strictly greater than 15. On the continuous scale, the mass strictly above 15 starts from the halfway point above 15, so we use $$P(Y > 15.5)$$.\n- Step 3: For $$P(5 \\leq X \\leq 12)$$, we include the full probability mass at both 5 and 12. We extend from the lower bound of 5 (which is 4.5) to the upper bound of 12 (which is 12.5), so we use $$P(4.5 < Y < 12.5)$$.\n\nThe rule is simple: if the integer is included, go 0.5 outwards; if it is excluded, go 0.5 inwards.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "Explain the subtle difference between $$P(X \\leq k)$$ and $$P(X < k)$$ for a discrete $$X$$, and how continuity correction preserves this distinction. (3 steps)", "answer": "- Step 1: For discrete $$X$$, $$P(X \\leq k) = P(X < k) + P(X = k)$$. These differ by the probability mass AT $$k$$, which is nonzero.\n- Step 2: With continuity correction: $$P(X \\leq k) \\approx P(Y < k + 0.5)$$ (keeps the $$k$$-rectangle). $$P(X < k) \\approx P(Y < k - 0.5)$$ (drops the $$k$$-rectangle).\n- Step 3: The difference between these is $$P(k - 0.5 < Y < k + 0.5)$$ — exactly the normal's version of $$P(X = k)$$, the one-unit rectangle of mass at $$k$$.\n\nIf you ignored the $$\\leq$$ vs $$<$$ distinction, your error would be about $$P(X = k)$$ — potentially significant near the mean.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "Give an example where the normal approximation to a binomial would fail badly, and explain why. (3 steps)", "answer": "- Step 1: Example: $$B(20, 0.05)$$. Here $$n = 20$$ is borderline (not truly large), and $$p = 0.05$$ is far from 0.5.\n- Step 2: Why it fails: the binomial is heavily right-skewed, concentrated at $$X = 0, 1, 2$$, with essentially no mass above $$X = 6$$. A symmetric normal would assign positive density to NEGATIVE $$X$$-values (impossible) and miss the rightward skew entirely.\n- Step 3: Correct approach: $$np = 1$$, so the Poisson approximation $$Po(1)$$ is appropriate. Poisson has non-negative integer support and captures the right skew.\n\nRule: each approximation has its regime; applying normal when Poisson is called for produces wrong answers.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "Why does the continuity correction use EXACTLY 0.5, not some other value like 0.3 or 0.7? (3 steps)", "answer": "- Step 1: The 0.5 arises from splitting the gap between consecutive integers in half. Each integer $$k$$ \"owns\" the interval $$(k - 0.5, k + 0.5)$$ on the real line.\n- Step 2: This tiling is seamless: integer 0 owns $$(-0.5, 0.5)$$, integer 1 owns $$(0.5, 1.5)$$, and so on. No gaps, no overlaps — every point on the real line is assigned to exactly one integer.\n- Step 3: If you used, say, 0.3, then points between 0.3 and 0.7 would belong to no integer — an \"unassigned gap\" of probability mass. Only 0.5 preserves the natural tiling of integers.\n\nThe half-unit is the unique choice that makes discrete-to-continuous translation consistent.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "Imagine plotting $$B(n, 0.5)$$ for $$n = 5, 20, 100$$. How does the shape change, and what does this tell us about the normal approximation? (4 steps)", "answer": "- Step 1: $$B(5, 0.5)$$: 6 discrete points (0 through 5), symmetric but blocky — clearly not smooth; normal approximation crude.\n- Step 2: $$B(20, 0.5)$$: 21 points, symmetric, with a recognisable bell shape emerging; envelope is fairly smooth.\n- Step 3: $$B(100, 0.5)$$: 101 points, almost indistinguishable from a smooth bell curve.\n- Step 4: Lesson: as $$n$$ grows, bars become finer and the outline approaches a perfect bell. The normal approximation works well already by $$n = 20$$ for $$p = 0.5$$. For $$p$$ far from 0.5, larger $$n$$ is needed (CLT convergence is slower when the underlying Bernoulli is skewed).", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "A student argues that for $$X \\sim B(300, 0.85)$$, since $$n$$ is large, a normal approximation works. By the S2 criteria, critique this argument. (4 steps)", "answer": "- Step 1: The S2 rule says: normal approximation needs $$n$$ large AND $$p$$ close to 0.5. Here $$p = 0.85$$ is not close to 0.5, so the textbook rule is violated.\n- Step 2: Intuition: at $$p = 0.85$$, the binomial is left-skewed (mass near 300, long left tail). A symmetric normal would misfit that skew.\n- Step 3: Try the complement: $$Y = 300 - X \\sim B(300, 0.15)$$. But $$np = 45 > 10$$ — too large for Poisson either. So Poisson doesn't help.\n- Step 4: In S2, when neither approximation fits cleanly, either compute directly or use software/calculator. The student's argument — \"large $$n$$ is enough\" — ignores the second condition on $$p$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "If a binomial distribution satisfies conditions for both Poisson and normal approximations, which should you use and why is chaining (binomial → Poisson → normal) a bad idea? (4 steps)", "answer": "- Step 1: If both are valid, always use a single direct approximation — in this case, usually the binomial → normal.\n- Step 2: Chaining introduces two layers of approximation error. Each step distorts the distribution slightly; combining them compounds the error rather than cancels it.\n- Step 3: The binomial → normal path is backed by the CLT (strong theoretical grounding) and uses two steps (match mean, match variance) — no intermediate approximation.\n- Step 4: General rule: choose the shortest valid approximation path. Fewer approximations = more accurate result.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "What is a continuity correction, and why is it needed when approximating a discrete distribution with a continuous one? (3 steps)", "answer": "- Step 1: Binomial and Poisson are discrete — probability is assigned to integer values. Normal is continuous — $$P(Y = k) = 0$$ for any specific value $$k$$, since probabilities come from integrating the density over an interval.\n- Step 2: Naively setting $$P(X \\leq k) \\approx P(Y \\leq k)$$ misses the \"rectangle\" of probability mass the binomial places at $$k$$. The cumulative normal cuts exactly through the middle of that rectangle.\n- Step 3: Continuity correction: treat each integer $$k$$ as occupying the unit interval $$(k - 0.5, k + 0.5)$$. Then $$P(X \\leq k) \\approx P(Y < k + 0.5)$$, and $$P(X = k) \\approx P(k - 0.5 < Y < k + 0.5)$$.\n\nVisually: each discrete bar has width 1 centered at the integer; the correction aligns the normal's integral with the bar's full area.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Edge case: Suppose you have $$X \\sim B(10, 0.1)$$. You decide to use a Poisson approximation. Is this technically allowed by the rules, and would you expect it to be very accurate? Why or why not? (3 steps)", "answer": "- Step 1: Checking the rules: $$n = 10$$ (arguably not very large), $$p = 0.1$$ (small), and $$np = 1 \\leqslant 10$$. It technically meets the rule of thumb $$np \\leqslant 10$$.\n- Step 2: However, the rule also states \"the larger the $$n$$ and the smaller the $$p$$, the better the approximation.\" Here, $$n = 10$$ is quite small.\n- Step 3: With such a small $$n$$, the discrete nature of the Binomial is very pronounced, and the Poisson shape won't align perfectly. The approximation is technically permissible but will be less accurate than if $$n$$ were, say, 100. In an exam, you would only use it if explicitly told to or if calculating the Binomial directly is too difficult.", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "For a particular flower bulb, 55% produce yellow flowers. In a sample of 80 bulbs, describe how a normal approximation estimates the probability of exactly 50 yellow flowers, and why a direct binomial calculation would typically be preferred for accuracy. (4 steps)", "answer": "- Step 1: Let $$X \\sim B(80, 0.55)$$. Normal approximation: $$\\mu = 44$$, $$\\sigma^2 = 80(0.55)(0.45) = 19.8$$, so $$\\sigma \\approx 4.45$$. Thus $$Y \\sim N(44, 19.8)$$.\n- Step 2: Use continuity correction for a single value: $$P(X = 50) \\approx P(49.5 < Y < 50.5)$$.\n- Step 3: Standardise each end, compute $$\\Phi$$-values, subtract to get the area of the small window (the result is approximately 0.036).\n- Step 4: The exact binomial gives approximately 0.037 — a difference of only about 0.001. Percentage error is around 1%, which is typical for a well-behaved normal approximation on a single-value event.\n\nBecause the approximation is very close, the normal method is accepted; but for a single point, any error is a meaningful fraction, so exam questions often use this to probe percentage error.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "For B(n,p) with p very close to 0 or 1, why does the normal approximation perform poorly even when n is large? What should you use instead? (2 steps)", "answer": "- Step 1: When p → 0 or p → 1, the binomial distribution becomes **extremely skewed** (right-skewed for p → 0, left-skewed for p → 1). The normal distribution cannot capture this skewness.\n- Step 2: Instead, use the **Poisson approximation** when p is very small (regardless of n being large), since Poisson naturally models right-skewed data with low means.", "source": "MiniMax ②", "_id": "minimax_2_20"}, {"question": "For $$X \\sim B(10000, 0.0005)$$, $$np = 5$$. Which approximation, and how good is it? (3 steps)", "answer": "- Step 1: $$np = 5 \\leq 10$$ and $$p = 0.0005$$ is extremely small. Both Poisson conditions are strongly satisfied. Use $$X \\approx Po(5)$$.\n- Step 2: The approximation is exceptionally accurate here because $$p$$ is so small that $$(1-p)^n$$ and $$e^{-np}$$ are nearly identical. Variance matching $$np(1-p) \\approx np$$ is nearly exact.\n- Step 3: $$n$$ being \"very large\" (10000) is fine — what matters is $$np$$ stays manageable. Don't let huge $$n$$ alone make you switch to normal; check $$np$$.\n\nPrinciple: the Poisson limit is most accurate when $$p$$ is genuinely tiny, not just \"somewhat small.\"", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Why can't we use normal approximation to binomial when p is very small (e.g., p = 0.001) even with large n? (2 steps)", "answer": "- Step 1: When p is very small, the binomial distribution is extremely right-skewed, not symmetric. The normal distribution is symmetric and cannot accurately capture this skewness.\n- Step 2: Additionally, the variance np(1-p) ≈ np is very small compared to the mean np (they're actually equal), but the distribution is concentrated near 0 with a long right tail. For example, B(1000, 0.001) has mean = 1, and most probability is at 0, 1, 2 — the normal approximation would give significant probability to negative values, which makes no sense.", "source": "MiniMax ①", "_id": "minimax_1_39"}, {"question": "What does the Poisson parameter $$\\lambda$$ physically represent in real-world scenarios like accidents per day or calls per hour? (2 steps)", "answer": "- Step 1: $$\\lambda$$ is the expected (average) number of events in the specified time window. Uniquely for the Poisson, it's also the variance — the mean and variance coincide.\n- Step 2: It scales with the time window linearly: if events occur at 3 per hour and you look at a 2-hour window, $$\\lambda = 6$$. Independent windows are additive: $$Po(\\lambda_1) + Po(\\lambda_2) = Po(\\lambda_1 + \\lambda_2)$$ when independent.\n\n$$\\lambda$$ is literally \"rate × time\" — a number with intuitive physical meaning.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "Poisson $$Po(\\lambda)$$ has infinite support $$\\{0, 1, 2, ...\\}$$, but binomial is bounded by $$n$$. How can Poisson approximate binomial despite this mismatch? (3 steps)", "answer": "- Step 1: Technically, Poisson assigns positive probability to $$X > n$$, which is impossible for binomial. So in that sense, the Poisson DOES assign \"wrong\" probabilities.\n- Step 2: But when $$p$$ is small and $$\\lambda = np$$ is modest, $$P(X > n)$$ under $$Po(\\lambda)$$ is astronomically small. For $$B(1000, 0.007)$$, $$\\lambda = 7$$, and $$P(X > 1000)$$ under $$Po(7)$$ is essentially $$e^{-7000}$$ — zero to all practical precision.\n- Step 3: So the \"extra\" probability mass Poisson places at impossible values is immaterial. The approximation is accurate where it counts (the realistic range).\n\nLesson: approximations often have technical flaws that vanish in practice — don't confuse theoretical imperfection with practical inaccuracy.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "The rules \"$$np \\leq 10$$\" (for Poisson) and \"$$\\lambda > 10$$\" (for normal on Poisson) — are these hard mathematical boundaries or guidelines? (3 steps)", "answer": "- Step 1: These are guidelines, not theorems. Approximation quality improves smoothly as conditions are strengthened — no sudden jump at $$np = 10$$.\n- Step 2: At $$np = 10$$ exactly, both Poisson and normal approximations work reasonably well. The rule is calibrated so that Poisson tables (typically up to $$\\lambda = 10$$) cover the Poisson regime.\n- Step 3: In practice, exam conventions follow the rule strictly: $$np \\leq 10$$ → Poisson; $$np > 10$$ → Normal. If your answer uses the \"wrong\" approximation per this rule, you may lose marks even if the numerical answer is close.\n\nThe thresholds are pedagogical/practical conventions, not deep mathematics.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "In a box of 500 electrical switches with fault probability 0.005, find P(X < 2) using exact binomial, then using Poisson approximation, then using normal approximation. Compare percentage errors. (3 steps)", "answer": "- Step 1: Exact: X ~ B(500, 0.005). P(X < 2) = P(X = 0) + P(X = 1) = (0.995)⁵⁰⁰ + 500 × 0.005 × (0.995)⁴⁹⁹ ≈ 0.0337 + 0.0842 = 0.1179\n- Step 2: Poisson: λ = 500 × 0.005 = 2.5. P(X < 2) = P(X ≤ 1) = e⁻²·⁵ + e⁻²·⁵ × 2.5 = 0.0821 + 0.2052 = 0.2873. Error = (0.2873 - 0.1179)/0.1179 × 100% = 143.7%\n- Step 3: Normal: μ = 2.5, σ = √2.5 ≈ 1.58. P(X < 2) ≈ P(Y < 1.5). z = (1.5 - 2.5)/1.58 = -0.63. P = 0.2643. Error = (0.2643 - 0.1179)/0.1179 × 100% = 124.3%\n\nThe Poisson approximation actually has larger error here! This is because p = 0.005 is very small but n = 500 gives λ = 2.5, which is actually quite small for Poisson. Both approximations have significant error in this case, showing the importance of checking conditions.", "source": "MiniMax ①", "_id": "minimax_1_37"}, {"question": "Why might a student get different answers when using different approximation methods for the same binomial problem? What should they check? (2 steps)", "answer": "- Step 1: Different approximations involve different **assumptions and errors**. Poisson assumes variance = mean; Normal assumes symmetry. These hold differently depending on n, p, and the specific probability being calculated.\n- Step 2: Students should check: **(1)** Is the approximation condition satisfied (np ≤ 10 for Poisson, p ≈ 0.5 for Normal)? **(2)** Is the continuity correction applied correctly? **(3)** Should they use a different approximation entirely (e.g., transform the problem like Q31)?", "source": "MiniMax ②", "_id": "minimax_2_30"}, {"question": "For the same spinner (10% red) but now 150 spins, which approximation — and why has the answer changed from 60 spins? (3 steps)", "answer": "- Step 1: Now $$X \\sim B(150, 0.1)$$. $$n$$ still large, $$p$$ still small. But $$np = 15 > 10$$.\n- Step 2: Poisson tables typically stop at $$\\lambda = 10$$, so Poisson lookup is inconvenient. Additionally, at $$\\lambda = 15$$, the Poisson itself is nearly symmetric — the normal approximation works well.\n- Step 3: Best route: go Binomial → Normal directly with $$N(15, 13.5)$$ since $$np(1-p) = 13.5$$. This uses the exact binomial variance — more accurate than chaining.\n\nInsight: as $$n$$ grows with $$p$$ fixed, $$np$$ grows and eventually exceeds the Poisson comfort zone. Switch to normal.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "There are three distribution approximations in S2. Describe all three, including the direction of approximation and the distribution being approximated by. (3 steps)", "answer": "- Step 1: **Binomial → Poisson**: $$X \\sim B(n, p)$$ approximated by $$Po(np)$$, valid when $$n$$ is large and $$p$$ is small. No continuity correction (both discrete).\n- Step 2: **Binomial → Normal**: $$X \\sim B(n, p)$$ approximated by $$N(np, np(1-p))$$, valid when $$n$$ is large and $$p$$ is close to 0.5. Requires continuity correction.\n- Step 3: **Poisson → Normal**: $$X \\sim Po(\\lambda)$$ approximated by $$N(\\lambda, \\lambda)$$, valid when $$\\lambda$$ is large (typically $$\\lambda > 10$$). Requires continuity correction.\n\nCommon thread: in every case, we match the mean and variance of the original distribution to the approximating one.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "Misconception probe: For a Poisson to Normal approximation, is a continuity correction still necessary even though both distributions can take large values? (2 steps)", "answer": "- Step 1: Yes, a continuity correction is absolutely still necessary.\n- Step 2: The need for a continuity correction arises from the difference in data type, not the size of the values. The Poisson distribution is discrete (it can only take integer values like 21, 22), whereas the Normal distribution is continuous (it can take any real value like 21.3 or 22.8). To map an integer probability to a continuous area, you must use the 0.5 boundary adjustment.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "Consider $$B(10, 0.5)$$. Even though $$p = 0.5$$ gives perfect symmetry, why is a normal approximation here still questionable? (3 steps)", "answer": "- Step 1: $$B(10, 0.5)$$ is perfectly symmetric but discrete, with only 11 possible values (0 to 10). The distribution is very \"chunky\" — not smooth.\n- Step 2: A normal approximation is a smooth curve. For only 11 integer \"bins,\" the smoothness of the normal doesn't track the coarse grain of the binomial well — each integer's probability is roughly 10% or more, too thick for a smooth bell to capture precisely.\n- Step 3: Rule: \"$$n$$ large\" in practice usually means $$n \\geq 30$$ or so. Small $$n$$ with $$p = 0.5$$ is easy to compute exactly; use the approximation only when the exact computation is a burden.\n\nTakeaway: \"$$p$$ close to 0.5\" is necessary but not sufficient — you also need $$n$$ genuinely large.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "When approximating a Poisson by normal, if λ = 11 (exactly the threshold), should we use normal or stick with Poisson? Explain. (1 step)", "answer": "The textbook says λ > 10 is considered \"large,\" so technically λ = 10 would not meet this criterion. However, the threshold of 10 is a guideline, not a strict rule. At λ = 11, the Poisson is reasonably symmetric, and normal approximation would give similar results to Poisson. In practice, either could be used, but if the question specifically asks for normal approximation or if λ is exactly 10, it's safer to use Poisson tables directly for better accuracy.", "source": "MiniMax ①", "_id": "minimax_1_44"}, {"question": "Why is the standard deviation in the normal approximation to $$B(n,p)$$ equal to $$\\sqrt{np(1-p)}$$ rather than $$\\sqrt{np}$$? (3 steps)", "answer": "- Step 1: $$\\sqrt{np}$$ would be the Poisson's standard deviation. The binomial's variance is $$np(1-p)$$, which is smaller than $$np$$ whenever $$0 < p < 1$$.\n- Step 2: Intuitively, the binomial is bounded above by $$n$$, which constrains variability. This boundedness reduces variance by a factor of $$(1-p)$$ compared to the Poisson (which has no upper bound).\n- Step 3: If you mistakenly used $$\\sqrt{np}$$, the normal approximation would be TOO SPREAD OUT, overestimating tail probabilities systematically.\n\nRule: always match the source distribution's variance exactly — never borrow a formula from a different distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "For each binomial, decide if normal approximation is appropriate: (a) $$B(120, 0.6)$$; (b) $$B(20, 0.5)$$; (c) $$B(250, 0.52)$$; (d) $$B(300, 0.85)$$. (4 steps)", "answer": "- Step 1: (a) $$B(120, 0.6)$$: $$n$$ large, $$p$$ close to 0.5. ✓ Normal OK. $$\\mu = 72$$, $$\\sigma^2 = 28.8$$.\n- Step 2: (b) $$B(20, 0.5)$$: $$p = 0.5$$ is ideal but $$n = 20$$ is borderline — not truly large. Normal approximation is questionable; exact binomial is usually preferred.\n- Step 3: (c) $$B(250, 0.52)$$: $$n$$ large, $$p$$ very close to 0.5. ✓ Ideal normal case. $$\\mu = 130$$, $$\\sigma^2 = 62.4$$.\n- Step 4: (d) $$B(300, 0.85)$$: $$n$$ large, but $$p$$ far from 0.5 (close to 1). ✗ Normal inappropriate. Substitute $$Y = 300 - X$$ (Poisson on failures since $$p_{\\text{new}} = 0.15$$, $$np_{\\text{new}} = 45$$ — still large) or accept normal with caution.\n\nLesson: always check BOTH conditions. Passing one doesn't guarantee the approximation.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "What is \"percentage error\" of an approximation, and what makes it small or large? (3 steps)", "answer": "- Step 1: Definition: $$\\text{percentage error} = \\frac{|P_{\\text{exact}} - P_{\\text{approx}}|}{P_{\\text{exact}}} \\times 100\\%$$. It measures deviation as a fraction of the true value.\n- Step 2: Small error (under 1%) typically occurs when: $$n$$ is large, $$p$$ is close to 0.5, and the event of interest is not in an extreme tail.\n- Step 3: Large error occurs when: $$n$$ is small, $$p$$ is far from 0.5, or you're probing rare tail events (where the approximating distribution's shape diverges most from the exact).\n\nFor routine exam problems, well under 1% error is typical when conditions are met — showing the approximation is genuinely useful.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "Why is it a bad idea to approximate $$X \\sim B(100, 0.5)$$ using a Poisson distribution, even though $$n$$ is large? (2 steps)", "answer": "- Step 1: The Poisson distribution is inherently right-skewed, especially for small $$\\lambda$$. A Binomial distribution with $$p = 0.5$$ is perfectly symmetric.\n- Step 2: If you tried to approximate a symmetric distribution with a skewed one, the shape mismatch would result in massive errors. Furthermore, the mean would be $$np = 50$$, which is far beyond the $$np \\leqslant 10$$ rule of thumb. The variance of the Binomial is $$100(0.5)(0.5) = 25$$, but the Poisson variance would be forced to 50, severely misrepresenting the spread.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "Why is the normal approximation to the Poisson unreliable for low $$\\lambda$$, and what's a concrete symptom of its failure? (4 steps)", "answer": "- Step 1: For low $$\\lambda$$ (say $$\\lambda < 5$$), Poisson is heavily right-skewed with substantial mass at zero. A symmetric normal centered at $$\\lambda$$ can't mirror this.\n- Step 2: **Concrete symptom**: the approximating normal assigns nonzero probability to values below zero (impossible for a count). E.g. $$Po(3) \\approx N(3, 3)$$ gives $$P(Y < 0) = P(Z < -\\sqrt{3}) \\approx 0.042$$ — but $$X$$ cannot be negative.\n- Step 3: Another symptom: upper-tail probabilities are underestimated (Poisson has a heavier right tail than the matched normal).\n- Step 4: Resolution: for low $$\\lambda$$, compute Poisson probabilities directly from the formula $$\\frac{e^{-\\lambda}\\lambda^k}{k!}$$ or tables — it's entirely feasible.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "A factory makes pots; 5% are broken. For sample sizes 10, 140, and 10000, which computational approach for each? (3 steps)", "answer": "- Step 1: Sample of 10: $$B(10, 0.05)$$. $$n$$ not very large; computations are quick. Use exact binomial — no approximation needed.\n- Step 2: Sample of 140: $$B(140, 0.05)$$. $$np = 7 \\leq 10$$, $$p$$ small. Use Poisson: $$Po(7)$$.\n- Step 3: Sample of 10000: $$B(10000, 0.05)$$. $$np = 500 \\gg 10$$. Poisson tables stop at 10; use normal: $$N(500, 475)$$.\n\nScaling: small $$n$$ → exact; moderate $$n$$ with small $$p$$ → Poisson; large $$n$$ with $$np$$ moderate/large → Normal.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "Why do we bother using distribution approximations (Poisson for binomial, or normal for either) in S2 when exact formulas for binomial and Poisson probabilities exist?", "answer": "- Step 1: Exact binomial calculations use $$\\binom{n}{k}p^k(1-p)^{n-k}$$. When $$n$$ is large (say 200+), computing $$\\binom{200}{k}$$ and raising probabilities to high powers is tedious, error-prone, and slow by hand.\n- Step 2: The cumulative binomial tables in the S2 formula booklet only go up to $$n = 50$$, so for larger values (or non-tabulated $$p$$), look-up fails.\n- Step 3: Approximations replace hard combinatorics with either (a) a Poisson with one parameter $$\\lambda$$, easily looked up, or (b) a standardised normal, giving access to the universal $$Z$$ tables.\n- Step 4: They are fast, give probabilities to reasonable accuracy, and were historically the only way to handle large-sample problems before calculators — they remain pedagogically and theoretically important.\n\nApproximations trade a tiny amount of accuracy for huge computational simplicity, and are the gateway to large-sample statistics.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "A student has $$X \\sim B(15, 0.3)$$ and decides to use a normal approximation. Comment on this choice. (4 steps)", "answer": "- Step 1: $$n = 15$$ is *not* large — it's quite small. Normal approximation requires large $$n$$.\n- Step 2: $$p = 0.3$$ is only moderately close to 0.5 — the binomial is somewhat right-skewed, so the normal misfits noticeably.\n- Step 3: $$np = 4.5$$ is well within Poisson-approximation range, but even there, a binomial with $$n = 15$$ is tractable directly: use the exact formula or tables (which cover up to $$n = 50$$).\n- Step 4: Conclusion: with $$n = 15$$, direct binomial computation is the right approach — no approximation needed. Approximations are for *large* $$n$$ where direct computation is cumbersome.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "In a Poisson approximation to binomial, if the exact probability is P(X=0), would the Poisson approximation always overestimate? Explain using the challenge result. (2 steps)", "answer": "- Step 1: Yes, the Poisson approximation **always overestimates P(X=0)** for binomial.\n- Step 2: For binomial: P(X=0) = (1-p)^n. For Poisson: P(X=0) = e^(-λ) = e^(-np). Since e^(-np) > (1-p)^n for p > 0 (due to the inequality e^x > 1+x for x ≠ 0), the Poisson approximation always gives a larger value than the true binomial probability.", "source": "MiniMax ②", "_id": "minimax_2_24"}, {"question": "Why is there a distinction between \"large $$n$$\" for normal (usually $$n \\geq 30$$) and \"large $$n$$\" for Poisson (can be much smaller with very small $$p$$)? (3 steps)", "answer": "- Step 1: For normal approximation, we need the binomial to LOOK like a bell curve — enough bins on each side of the mean so the CLT is well-approximated. This typically requires $$n \\geq 30$$ or so.\n- Step 2: For Poisson approximation, \"large $$n$$\" really means \"large enough that $$\\lim_{n\\to\\infty, p\\to 0, np=\\lambda} B(n,p) = Po(\\lambda)$$ is well-approximated.\" With very small $$p$$ (say 0.001), even modest $$n$$ (like 100) gives excellent Poisson approximation.\n- Step 3: The two criteria probe different things: normal needs bell-shape clarity; Poisson needs variance-mean equality, which relaxes with small $$p$$ regardless of $$n$$.\n\nSame phrase \"large $$n$$,\" different operational meanings depending on context.", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "Why does \"sum of Poissons\" property help justify why a Poisson approaches normal for large $$\\lambda$$? (3 steps)", "answer": "- Step 1: A fundamental property of the Poisson: the sum of independent Poissons with rates $$\\lambda_1, \\dots, \\lambda_m$$ is itself Poisson with rate $$\\lambda_1 + \\dots + \\lambda_m$$.\n- Step 2: In particular, $$Po(\\lambda)$$ can be seen as the sum of, say, $$m$$ independent copies of $$Po(\\lambda/m)$$ for any $$m$$. So a large-$$\\lambda$$ Poisson is a sum of many small-rate Poissons.\n- Step 3: By the **Central Limit Theorem**, sums of many independent identically distributed variables (with finite variance) tend to a normal. So $$Po(\\lambda)$$ tends to a normal as $$\\lambda$$ grows — this is why $$\\lambda > 10$$ is a reasonable working threshold.\n\nThe Poisson → normal approximation is ultimately a CLT consequence in disguise.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Street light failures occur at a rate of 1 every 2 days. What distribution models weekly failures, and what approximation for a 10-week total? (3 steps)", "answer": "- Step 1: Daily rate = 0.5 failures/day. Weekly rate = 7 × 0.5 = 3.5. So weekly failures $$\\sim Po(3.5)$$. This is the standard Poisson process (independent events at constant rate).\n- Step 2: Over 10 weeks, the rate scales linearly: $$\\lambda = 10 \\times 3.5 = 35$$. So 10-week total $$\\sim Po(35)$$.\n- Step 3: Since $$\\lambda = 35 > 10$$, use normal approximation: $$N(35, 35)$$, with continuity correction for probability questions.\n\nScaling rule: Poisson rates add linearly across disjoint time intervals. Larger window → larger $$\\lambda$$.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "You have a binomial $$B(n, p)$$ and must choose an approximation. Describe the full decision procedure. (4 steps)", "answer": "- Step 1: First check: is $$n$$ large? If $$n$$ is small (say, $$n < 30$$), use the exact binomial — no approximation warranted.\n- Step 2: If $$n$$ is large, compute $$\\mu = np$$.\n+ If $$np \\leq 10$$ AND $$p$$ is small: use Poisson approximation $$X \\approx Po(np)$$.\n+ If $$np > 10$$ AND $$p$$ close to 0.5: use normal approximation $$X \\approx N(np, np(1-p))$$ with continuity correction.\n- Step 3: Edge case: $$p$$ close to 1? Substitute $$Y = n - X$$ (counting rare failures) and apply Poisson to $$Y$$.\n- Step 4: If neither clearly applies (e.g., $$np$$ moderate, $$p$$ moderate), the normal is usually still acceptable due to the CLT — especially once $$np > 10$$.\n\nQuick heuristic: $$np \\leq 10$$ → Poisson; $$np > 10$$ → Normal.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "Name two distinct ways a student might misapply the normal approximation to a binomial. (3 steps)", "answer": "- Step 1: Failure 1: Applying normal when $$p$$ is far from 0.5 (like $$p = 0.05$$). The binomial is skewed, but normal is symmetric — shape mismatch. Correct choice here is Poisson.\n- Step 2: Failure 2: Forgetting continuity correction. Gives systematically wrong cumulative probabilities and zero for point probabilities $$P(X = k)$$.\n- Step 3: Failure 3 (bonus): Using $$\\sqrt{np}$$ (Poisson-style variance) instead of $$\\sqrt{np(1-p)}$$ (correct binomial variance). Results in overly wide normal and wrong tail probabilities.\n\nEach failure reflects a misunderstanding of what the approximation actually preserves.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "Why specifically does the Poisson approximation to the binomial require $$p$$ to be small? What conceptual feature of the Poisson distribution drives this? (4 steps)", "answer": "- Step 1: A Poisson distribution has a defining property: $$E(X) = Var(X) = \\lambda$$. Any distribution we approximate with a Poisson should share this mean-equals-variance feature.\n- Step 2: For a binomial, $$E(X) = np$$ and $$Var(X) = np(1-p)$$. These are equal only if $$(1-p) = 1$$, requiring $$p = 0$$ — impossible in practice.\n- Step 3: If $$p$$ is small (say $$p = 0.01$$), then $$1 - p \\approx 0.99 \\approx 1$$, so $$Var(X) = np(1-p) \\approx np = E(X)$$. The binomial mean and variance become nearly equal — matching Poisson's profile.\n- Step 4: Conceptually: the Poisson models rare events in many independent trials. \"Rare\" = small $$p$$; \"many\" = large $$n$$. Small $$p$$ is essential because Poisson counts occurrences per unit time/trials, and the rarity is built into the model.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "When approximating $$X \\sim Po(25)$$ with a Normal distribution to find $$P(X > 30)$$, a student writes $$P(Y > 30)$$. What is wrong with this, and how should it be corrected? (2 steps)", "answer": "- Step 1: The student forgot the continuity correction. The Poisson distribution is discrete, so when approximating with the continuous Normal distribution, a continuity correction is required.\n- Step 2: For the strict inequality $$P(X > 30)$$, we want values strictly greater than 30. The integer 30 is not included, so we start from the upper boundary of 30, which is 30.5. The correct approximation is $$P(Y > 30.5)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "If $$\\lambda = 100$$ for a Poisson, why can you treat the normal approximation's negative-value tail as irrelevant? (3 steps)", "answer": "- Step 1: For $$Po(100)$$, mean is 100 and standard deviation is $$\\sqrt{100} = 10$$. The distribution is concentrated between roughly 70 and 130.\n- Step 2: The probability $$P(X < 0)$$ under $$N(100, 100)$$ corresponds to a $$z$$-score of $$-10$$, i.e., 10 standard deviations below the mean — astronomically small (on the order of $$10^{-23}$$).\n- Step 3: So the normal assigns essentially zero density to negative values. The theoretical flaw (normal extending to negatives, Poisson not) is practically irrelevant at large $$\\lambda$$.\n\nGeneral principle: approximations often have \"technical imperfections\" that are immaterial in realistic problem regions.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "Derive the variance formula $$Var(X) = np(1-p)$$ for $$X \\sim B(n, p)$$, and explain why the factor $$(1-p)$$ appears. (4 steps)", "answer": "- Step 1: Write $$X$$ as a sum: $$X = X_1 + X_2 + \\dots + X_n$$, where each $$X_i$$ is an independent Bernoulli trial with $$X_i \\in \\{0, 1\\}$$ and $$P(X_i = 1) = p$$.\n- Step 2: For one trial: $$E(X_i) = p$$ and $$E(X_i^2) = p$$ (since $$X_i^2 = X_i$$ for a 0/1 variable). So $$Var(X_i) = E(X_i^2) - E(X_i)^2 = p - p^2 = p(1-p)$$.\n- Step 3: Since the trials are independent, variances add: $$Var(X) = Var(X_1) + \\dots + Var(X_n) = n \\cdot p(1-p)$$.\n- Step 4: So $$Var(X) = np(1-p)$$. The factor $$(1-p)$$ is the \"shrinkage\" as $$p$$ approaches 0 or 1 — at extreme $$p$$, outcomes become more predictable (always 0 or always 1), so variance drops. Maximum variance is at $$p = 0.5$$.\n\nThis is exactly why Poisson approximation (which needs variance ≈ mean) requires $$p$$ small: only then does $$1 - p \\approx 1$$ kill the shrinkage factor.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Build the intuition: why does a binomial distribution converge to a Poisson distribution in the limit $$n \\to \\infty$$, $$p \\to 0$$, with $$np = \\lambda$$ fixed? (4 steps)", "answer": "- Step 1: Consider a time interval split into $$n$$ tiny sub-intervals, each with probability $$p = \\lambda/n$$ of containing an event. That's a Bernoulli trial per sub-slice — the count is binomial.\n- Step 2: As $$n$$ grows, each sub-interval shrinks and $$p = \\lambda/n$$ shrinks, but the total expected count $$np = \\lambda$$ stays fixed. Events become \"continuous-time\" random arrivals at rate $$\\lambda$$.\n- Step 3: Algebraically: $$\\binom{n}{k}\\left(\\frac{\\lambda}{n}\\right)^k\\left(1 - \\frac{\\lambda}{n}\\right)^{n-k} \\to \\frac{e^{-\\lambda}\\lambda^k}{k!}$$ as $$n \\to \\infty$$.\n+ The factor $$\\binom{n}{k}/n^k \\to 1/k!$$\n+ The factor $$(1 - \\lambda/n)^n \\to e^{-\\lambda}$$ (standard limit)\n+ The factor $$\\lambda^k$$ is unchanged\n- Step 4: So Poisson is the \"continuous-time limit\" of binomial with rare events — a rigorous mathematical fact, not a coincidence.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Sketch mentally the histogram of $$B(20, 0.1)$$ vs. $$B(20, 0.5)$$ vs. $$B(20, 0.9)$$. Which can be approximated by a normal? Which by a Poisson (possibly after reframing)? (4 steps)", "answer": "- Step 1: $$B(20, 0.1)$$: $$np = 2$$; probability piled near 0, long right tail — heavily right-skewed. **Poisson** is appropriate ($$Po(2)$$). Normal is not (symmetry violated).\n- Step 2: $$B(20, 0.5)$$: $$np = 10$$; symmetric bell centred at 10. **Normal** approximation could work, though $$n = 20$$ is on the small side. Poisson is not appropriate ($$p$$ is not small).\n- Step 3: $$B(20, 0.9)$$: $$np = 18$$; probability piled near 20, long left tail — left-skewed. Reframe as failures: $$Y = 20 - X \\sim B(20, 0.1)$$. Now apply **Poisson** $$Po(2)$$.\n- Step 4: Shape summary: $$p$$ near 0 → right-skew; $$p$$ near 1 → left-skew; $$p \\approx 0.5$$ → symmetric. Symmetry → normal; rare-event character → Poisson (possibly after complementing).", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "For each of the three approximations in S2, state what parameter change makes each approximation *more accurate*. (4 steps)", "answer": "- Step 1: **Binomial → Poisson**: improves as $$n$$ grows larger AND $$p$$ shrinks (with $$\\lambda = np$$ fixed). The binomial approaches Poisson in this double limit.\n- Step 2: **Binomial → Normal**: improves as $$n$$ grows. For $$p$$ near 0.5, convergence is fastest. For $$p$$ far from 0.5, larger $$n$$ compensates but convergence is slower.\n- Step 3: **Poisson → Normal**: improves as $$\\lambda$$ grows. Larger $$\\lambda$$ = more \"effective trials\" accumulating, so by CLT the sum is more bell-shaped.\n- Step 4: Common thread: all three approximations rely on large sample/count. The normal ones also rely on the distribution being symmetric enough for the bell to fit.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "As $$n$$ grows and $$p$$ shrinks with $$np = \\lambda$$ fixed, what happens to the Poisson approximation's accuracy? (3 steps)", "answer": "- Step 1: Keeping $$\\lambda = np$$ fixed but letting $$n \\to \\infty$$ forces $$p \\to 0$$. Then $$(1-p) \\to 1$$, so binomial variance $$np(1-p) \\to np = \\lambda$$, exactly matching Poisson variance.\n- Step 2: Likewise, the higher-order moments of the binomial also converge to those of the Poisson. The distributions become identical in the limit.\n- Step 3: This is the formal Poisson limit theorem: $$B(n, \\lambda/n) \\to Po(\\lambda)$$ as $$n \\to \\infty$$. So the approximation keeps getting better as you move deeper into the \"rare events, many trials\" regime.\n\nConclusion: larger $$n$$ (with smaller $$p$$) tightens the approximation; the limit is exact.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "If you're asked to \"use a suitable approximation\" without specifying which, how do you decide? Walk through the decision process for B(200, 0.98). (3 steps)", "answer": "- Step 1: First calculate np = 200 × 0.98 = **196** > 10. This tells us Poisson isn't ideal (np > 10).\n- Step 2: But p = 0.98 is **not** close to 0.5 — it's very close to 1, making the binomial **highly skewed left**.\n- Step 3: The best approach is to **transform the problem**: let Y = n - X (number of failures), then Y ~ B(200, 0.02). Now p = 0.02 (small), np = 4 ≤ 10, so use **Poisson approximation** Po(4) for Y, then convert back.", "source": "MiniMax ②", "_id": "minimax_2_29"}, {"question": "A box has 500 switches, each independently faulty with probability 0.005. For $$P(X < 2)$$, which method — exact, Poisson approx, or normal approx — is most accurate and convenient? (4 steps)", "answer": "- Step 1: $$X \\sim B(500, 0.005)$$. $$n$$ large, $$p$$ tiny, $$np = 2.5$$. Textbook Poisson regime.\n- Step 2: Exact: $$P(X = 0) + P(X = 1) = (0.995)^{500} + 500 \\times 0.005 \\times (0.995)^{499}$$. Computable but tedious.\n- Step 3: Poisson: $$P(X = 0) + P(X = 1) = e^{-2.5} + 2.5 e^{-2.5}$$. Fast, simple, and highly accurate since Poisson conditions strongly hold.\n- Step 4: Normal: $$np = 2.5$$ is FAR less than 10 (rule: $$\\lambda > 10$$). Normal approximation fails completely here — the distribution at this small mean is highly skewed, nowhere near symmetric.\n\nConclusion: Poisson wins on both accuracy and ease. Normal fails because the mean is too small.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "For $$X \\sim Po(3)$$, a student uses a normal approximation $$Y \\sim N(3, 3)$$. Why will this give poor results? (4 steps)", "answer": "- Step 1: $$\\lambda = 3$$ is small — the Poisson is heavily right-skewed here. $$P(X = 0) = e^{-3} \\approx 0.050$$, a noticeable mass at zero.\n- Step 2: The normal with mean 3 and $$\\sigma = \\sqrt{3} \\approx 1.73$$ puts significant probability below zero: $$P(Y < 0) = P(Z < -\\sqrt{3}) \\approx 0.042$$. But $$X$$ can never be negative! The approximation leaks probability into an impossible region.\n- Step 3: The normal also misestimates the tail shape — Poisson has a heavier right tail and a lighter left tail for small $$\\lambda$$.\n- Step 4: Conclusion: at $$\\lambda = 3$$, direct Poisson computation is both feasible and correct. The normal would misstate tail probabilities by large relative amounts.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "For which kind of probabilities does the continuity correction make the biggest difference? (4 steps)", "answer": "- Step 1: **Single-value probabilities** $$P(X = k)$$: without correction, the normal gives 0; with correction, $$P(k - 0.5 < Y < k + 0.5)$$ gives a sensible answer. Error is 100% without correction.\n- Step 2: **Narrow intervals** (few integers wide): the $$\\pm 0.5$$ on each side is a meaningful fraction of the event width.\n- Step 3: **Extreme-tail probabilities**: even small shifts in the boundary can change the standardised $$Z$$ noticeably, since the normal density drops off fast in the tails.\n- Step 4: **Wide intervals** (many integers): the 0.5 shifts are negligible relative to the span, so correction barely matters.\n\nPractical rule: always apply the correction — it's cheap insurance.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "Deep understanding: When approximating $$P(X = 50)$$ for $$X \\sim B(80, 0.55)$$ using a Normal distribution, what interval do you use for the continuity correction, and visually, what does this interval represent? (3 steps)", "answer": "- Step 1: The continuity correction for a single point $$P(X = a)$$ is the interval $$P(a - 0.5 < Y < a + 0.5)$$. So for $$X = 50$$, you use the interval $$P(49.5 < Y < 50.5)$$.\n- Step 2: Visually, the Binomial probability $$P(X = 50)$$ is represented by a single rectangular bar centered at 50 on the x-axis, with a width of 1 (from 49.5 to 50.5) and a height equal to the probability.\n- Step 3: The Normal approximation replaces this discrete bar with the area under the continuous Normal curve between 49.5 and 50.5. This area under the curve approximates the area of the original rectangular bar.", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "For the same binomial B(n,p), when np > 10 but p is very small (e.g., B(1000, 0.01)), should you use Poisson or Normal? Explain the dilemma. (2 steps)", "answer": "- Step 1: This presents a **dilemma**. The rule of thumb says np = 10 is the boundary: above 10 use Normal, below 10 use Poisson.\n- Step 2: With np = 10 exactly, either could work. However, when p is very small (like 0.01), even with large n, the distribution remains **skewed right**. The Poisson naturally handles this shape, while Normal may struggle. In practice, for np = 10, both may give similar results, but Poisson is often preferred when p is clearly small.", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "Visualize: how does $$B(14, 0.5)$$ relate to the normal $$N(7, 1.87^2)$$, and what role does continuity correction play? (3 steps)", "answer": "- Step 1: $$B(14, 0.5)$$ is a set of 15 vertical bars at integers 0 through 14, symmetric around 7. Each bar's height is $$P(X = k)$$.\n- Step 2: $$N(7, 1.87^2)$$ is a smooth bell curve centered at 7 with standard deviation ~1.87, overlaying the bars.\n- Step 3: CC idea: each integer-valued bar has effective width 1, from $$k - 0.5$$ to $$k + 0.5$$. The normal density integrated over this interval approximates the bar's probability. For $$P(X \\leq 7)$$, include the whole bar at 7, so the normal cutoff is 7.5, not 7.\n\nKey visual: CC matches \"box areas\" (discrete bars) to \"integrals\" (continuous regions).", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Why does the rule-of-thumb $$np \\leq 10$$ exist for Poisson approximation? What happens when $$np$$ exceeds 10? (4 steps)", "answer": "- Step 1: Practical reason: cumulative Poisson tables in the S2 formula booklet max out at $$\\lambda = 10$$. Values beyond may not be tabulated.\n- Step 2: Statistical reason: at $$np \\approx 10$$, the Poisson is moderately bell-shaped (not very skewed). For higher $$\\lambda$$, Poisson becomes nearly symmetric — now a *normal* approximation fits well (and $$\\lambda > 10$$ is precisely the normal-approximation threshold for Poisson).\n- Step 3: So $$np \\leq 10$$ is both the \"use Poisson\" boundary *and* roughly the \"don't use normal\" boundary — a neat transition.\n- Step 4: For $$np = 15$$ or higher, skip Poisson entirely and go directly $$B(n,p) \\approx N(np, np(1-p))$$.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Five hundred electrical switches are in a box, each independently faulty with probability 0.005. Compare the three ways to estimate $$P(X < 2)$$: exact binomial, Poisson approximation, and direct normal approximation. Which is most accurate and why? (5 steps)", "answer": "- Step 1: Exact: $$X \\sim B(500, 0.005)$$. Compute $$P(X < 2) = P(X=0) + P(X=1) = (0.995)^{500} + 500(0.005)(0.995)^{499}$$. Result: roughly 0.285.\n- Step 2: **Poisson approximation**: $$np = 2.5$$, so $$X \\approx Po(2.5)$$. Compute $$P(X < 2) = P(X = 0) + P(X = 1) = e^{-2.5} + 2.5 e^{-2.5} = e^{-2.5}(1 + 2.5) \\approx 0.287$$.\n- Step 3: **Normal approximation**: $$\\mu = 2.5$$, $$\\sigma^2 = np(1-p) = 2.4875$$, $$\\sigma \\approx 1.58$$. $$P(X < 2) \\approx P(Y < 1.5) = P(Z < -0.63) \\approx 0.264$$.\n- Step 4: Compare accuracy: Poisson is very close to exact (~0.5% error); normal is noticeably off (~7% error). Why? Because at $$np = 2.5$$, the binomial is highly right-skewed and $$p = 0.005$$ is very small — Poisson captures this perfectly, but normal's symmetry is a poor fit.\n- Step 5: Lesson: for rare-event binomials, Poisson beats normal handily. The normal approximation fails because its conditions ($$p$$ close to 0.5) aren't met — it's forcing symmetry on a skewed distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "A production line has p = 0.16 for faulty items. In a sample of 20 items, why might you NOT use Poisson approximation? What would you use instead? (2 steps)", "answer": "- Step 1: For n = 20, p = 0.16, we get np = 20 × 0.16 = 3.2 ≤ 10, so Poisson is technically applicable. However, p = 0.16 is not particularly \"small\" — it's moderate.\n- Step 2: For n = 20 (not very large), the approximation may not be very accurate. With such a small n, it's often better to **calculate exact binomial probabilities** directly using calculators or tables rather than use any approximation.", "source": "MiniMax ②", "_id": "minimax_2_15"}, {"question": "Is it always better to use a more sophisticated approximation (e.g. normal) over a simpler one (e.g. Poisson)? (4 steps)", "answer": "- Step 1: No — the best approximation is the one whose *conditions are satisfied*. Using a normal approximation where $$p$$ is far from 0.5 is usually less accurate than using a Poisson for rare events.\n- Step 2: Example: $$X \\sim B(200, 0.03)$$ has $$np = 6$$. Normal gives $$N(6, 5.82)$$ — symmetric, but the true distribution is right-skewed. Poisson $$Po(6)$$ captures the skew faithfully.\n- Step 3: Match the *shape* of the original: rare events → Poisson; near-symmetric bell → normal.\n- Step 4: The guideline $$np \\leq 10$$ (Poisson) vs. $$np > 10$$ (normal) exists precisely because the binomial's shape transitions from skewed to symmetric around that threshold.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Before calculators, why was the normal approximation to the binomial so important? And why does it still matter today? (4 steps)", "answer": "- Step 1: Computing $$\\binom{n}{k}$$ for large $$n$$ by hand is punishing — factorials grow explosively. For $$n = 100$$, $$100!$$ has 158 digits. Direct binomial computation was infeasible.\n- Step 2: Normal tables of $$\\Phi(z)$$ were widely available in the 20th century. Any reasonable binomial problem could be reduced to a $$Z$$-score look-up — a handful of arithmetic operations.\n- Step 3: The approximation \"linearised\" a combinatorial beast into standardised work, enabling widespread statistical practice in industry, medicine, and research.\n- Step 4: Today, despite computers, the approximation is still faster for quick estimates, gives qualitative insight (how does probability scale with $$n, p$$?), and is foundational for hypothesis testing, confidence intervals, and theoretical statistics.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "A manager computes binomial probabilities with $$n = 100$$. The two scenarios are $$p = 0.04$$ and $$p = 0.45$$. Which approximation and parameters for each? (3 steps)", "answer": "- Step 1: For $$p = 0.04$$: $$np = 4 \\leq 10$$, and $$p$$ is small. → Poisson $$Po(4)$$. No continuity correction needed (both are discrete).\n- Step 2: For $$p = 0.45$$: $$np = 45 > 10$$, and $$p$$ close to 0.5. → Normal $$N(45, 24.75)$$, since $$np(1-p) = 24.75$$. Continuity correction required.\n- Step 3: Summary: same $$n$$, but very different approximations. The choice is governed by $$p$$'s proximity to 0 (Poisson) vs. 0.5 (Normal), summarized by the $$np$$ threshold.\n\nDifferent $$p$$ regime → different approximation, even with the same $$n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "Under what conditions is a *normal distribution* a better approximation for a binomial distribution than a Poisson distribution? Explain.", "answer": "- Step 1: **Symmetry requirement**: Normal approximation is valid when the binomial distribution is symmetric, which occurs when $ p $ is close to 0.5.  \n- Step 2: **Large $ n $**: A large $ n $ ensures the binomial distribution is bell-shaped, satisfying the Central Limit Theorem (CLT).  \n- Step 3: **Mean vs. variance**: For normal approximation, $ np $ and $ n(1-p) $ must both be > 5 (or 10). Poisson approximation fails here because it assumes $ \\mathrm{Var}(X) \\approx \\mathrm{E}(X) $, which is not true when $ p $ is moderate (e.g., $ p = 0.5 $).  \n\n+ Example: $ X \\sim \\mathrm{B}(100, 0.48) $ is approximated by $ \\mathrm{N}(48, 6.12^2) $, while Poisson would overstate variance.", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "A spinner lands on red 10% of the time. Describe the approximations you'd use for: (i) fewer than 4 reds in 60 spins, (ii) more than 20 reds in 150 spins. (4 steps)", "answer": "- Step 1: Both are binomials with $$p = 0.1$$ (small, not close to 0.5). Scenario (i): $$X_1 \\sim B(60, 0.1)$$. Scenario (ii): $$X_2 \\sim B(150, 0.1)$$.\n- Step 2: For (i): $$np = 6 \\leq 10$$, so **Poisson approximation**: $$X_1 \\approx Po(6)$$. Compute $$P(X_1 < 4) = P(X_1 \\leq 3)$$ from Poisson tables. No continuity correction.\n- Step 3: For (ii): $$np = 15 > 10$$, so Poisson tables may be inadequate; also the Poisson at $$\\lambda = 15$$ is getting bell-shaped, so a **normal approximation** is better: $$X_2 \\approx N(15, 13.5)$$. Apply continuity correction.\n- Step 4: Lesson: same $$p$$, but different $$n$$ changes the scale $$np$$ — and hence the right approximation. Small $$np$$ → Poisson; large $$np$$ → normal.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Two distributions match a target's mean but differ in variance. Why does getting the VARIANCE right matter for probability calculations? (3 steps)", "answer": "- Step 1: Mean tells you where the distribution is centered. Variance tells you how spread out it is. Matching only mean is like matching only the hat: you've got the center but not the width.\n- Step 2: Tail probabilities like $$P(X > k)$$ depend crucially on spread. A wider distribution has more mass in the tails; a narrower one has less. Wrong variance → systematically wrong tail probabilities.\n- Step 3: Example: if you used $$\\sqrt{np}$$ (Poisson-style) for a binomial with $$p = 0.5$$, you'd overestimate $$\\sigma$$ by a factor of $$\\sqrt{2}$$, overestimating all tail events.\n\nMoral: both moments matter; mean gives location, variance gives scale. You need both.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "A student reasons: \"Since p is small, I must use Poisson, even if np = 50.\" Evaluate this reasoning. (2 steps)", "answer": "- Step 1: This reasoning is flawed. While $$p$$ being small initially suggests Poisson, when $$np$$ is very large (like 50), the Binomial distribution spreads out and becomes approximately symmetric.\n- Step 2: A Normal approximation is much more practical and accurate in this case because Poisson calculations with $$\\lambda = 50$$ are cumbersome, and the shape of the distribution is well-captured by the Normal curve. Thus, the magnitude of $$np$$ overrides the \"$$p$$ is small\" heuristic when $$np$$ is large.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "When calculating a percentage error for a normal approximation to a binomial probability, why does the exact value go in the denominator? (3 steps)", "answer": "- Step 1: Percentage error measures how far off the approximation is *relative to the truth*: $$\\%\\,\\text{error} = \\left|\\frac{\\text{true} - \\text{approx}}{\\text{true}}\\right| \\times 100\\%$$.\n- Step 2: Placing the true value in the denominator normalises: an absolute error of 0.001 on a true probability of 0.5 is tiny (0.2%), but on a true probability of 0.002 it's enormous (50%). Without normalising, we can't compare approximation quality across problems.\n- Step 3: Interpretation: a few percent error suggests the approximation is reliable; double-digit percentages warn that conditions (e.g. $$p$$ near 0.5, $$n$$ large) may be stretched — common in single-point or tail probabilities.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What are the two main conditions required to approximate a Binomial distribution $$X \\sim B(n, p)$$ using a Poisson distribution, and what is the typical rule of thumb for their product? (3 steps)", "answer": "- Step 1: The first condition is that the number of trials $$n$$ must be large. This ensures there are enough opportunities for the rare event to occur, allowing the discrete distribution to take a shape similar to Poisson.\n- Step 2: The second condition is that the probability of success $$p$$ must be small. This means the event is rare, which is the fundamental characteristic of a Poisson process.\n- Step 3: The rule of thumb is that the product $$np \\leqslant 10$$. If the mean is larger than 10, the Poisson distribution becomes too spread out and loses its characteristic \"rare event\" skew, making it a less accurate fit for the Binomial shape.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Conceptually, why does the condition \"$$p$$ is small\" mathematically justify using a Poisson approximation for a Binomial distribution? Think about the relationship between the mean and variance. (3 steps)", "answer": "- Step 1: For a Binomial distribution, the mean is $$E(X) = np$$ and the variance is $$Var(X) = np(1-p)$$.\n- Step 2: When $$p$$ is very small, the term $$(1-p)$$ is very close to 1. Therefore, the variance $$np(1-p)$$ becomes approximately equal to $$np$$.\n- Step 3: This means the mean and variance of the Binomial are approximately equal ($$E(X) \\approx Var(X)$$). The defining characteristic of a Poisson distribution is that its mean and variance are exactly equal to its paramet
