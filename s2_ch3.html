er $$\\lambda$$, which is why the approximation is mathematically valid in this regime.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "If $$X \\sim B(n, p)$$ is approximated by a Poisson distribution $$Y \\sim Po(\\lambda)$$, what is the value of $$\\lambda$$ and why is it chosen this way? (2 steps)", "answer": "- Step 1: The parameter $$\\lambda$$ is equal to $$np$$, which is the mean of the Binomial distribution.\n- Step 2: When approximating one distribution with another, we want to preserve the central tendency (mean) of the original distribution. Since the Poisson parameter $$\\lambda$$ represents both its mean and variance, setting $$\\lambda = np$$ ensures the approximating distribution is centered at the same location as the original Binomial distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Suppose $$X \\sim B(200, 0.98)$$ tracks the number of successes where the probability of success is very high. Can you use a Poisson approximation directly? If not, how can you reframe the problem to use one? (3 steps)", "answer": "- Step 1: You cannot use a Poisson approximation directly because $$p = 0.98$$ is very large, not small. The Poisson approximation requires the event to be rare.\n- Step 2: However, you can redefine what constitutes a \"success\" by looking at the number of \"failures\" instead. If success probability is $$p = 0.98$$, then failure probability is $$q = 1-p = 0.02$$.\n- Step 3: Let $$Y$$ be the number of failures. Then $$Y \\sim B(200, 0.02)$$. Now $$n$$ is large and $$q$$ is small, so $$Y$$ can be approximated by $$Po(\\lambda)$$ where $$\\lambda = nq = 200 \\times 0.02 = 4$$. You can then find probabilities for failures and convert them back to successes if needed.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Why is it a bad idea to approximate $$X \\sim B(100, 0.5)$$ using a Poisson distribution, even though $$n$$ is large? (2 steps)", "answer": "- Step 1: The Poisson distribution is inherently right-skewed, especially for small $$\\lambda$$. A Binomial distribution with $$p = 0.5$$ is perfectly symmetric.\n- Step 2: If you tried to approximate a symmetric distribution with a skewed one, the shape mismatch would result in massive errors. Furthermore, the mean would be $$np = 50$$, which is far beyond the $$np \\leqslant 10$$ rule of thumb. The variance of the Binomial is $$100(0.5)(0.5) = 25$$, but the Poisson variance would be forced to 50, severely misrepresenting the spread.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "It can be shown that a Poisson approximation to a Binomial distribution will always overestimate $$P(X = 0)$$. Why does this happen mathematically? Hint: Compare the exact Binomial formula for $$P(X=0)$$ with the Poisson approximation and use the inequality $$1+x \\leqslant e^x$$. (3 steps)", "answer": "- Step 1: For a Binomial distribution, the exact probability of zero successes is $$P(X=0) = (1-p)^n$$.\n- Step 2: The Poisson approximation gives $$P(Y=0) = e^{-\\lambda} = e^{-np}$$.\n- Step 3: Using the mathematical inequality $$1+x \\leqslant e^x$$ for all real $$x$$, substitute $$x = -p$$ to get $$1-p \\leqslant e^{-p}$$. Raising both sides to the power of $$n$$ (since $$n > 0$$, the inequality direction is preserved) gives $$(1-p)^n \\leqslant e^{-np}$$. Thus, the Poisson probability is always greater than or equal to the true Binomial probability for $$X=0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "What are the two main conditions required to approximate a Binomial distribution $$X \\sim B(n, p)$$ using a Normal distribution? (2 steps)", "answer": "- Step 1: The number of trials $$n$$ must be large. This is required for the Central Limit Theorem to take effect, smoothing out the discrete bars of the Binomial histogram into a continuous, bell-shaped curve.\n- Step 2: The probability of success $$p$$ must be close to 0.5. Since the Normal distribution is perfectly symmetric, the Binomial distribution must also be roughly symmetric for the approximation to be accurate. When $$p$$ is close to 0.5, the Binomial distribution is symmetric.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "If $$X \\sim B(n, p)$$ is approximated by a Normal distribution $$Y \\sim N(\\mu, \\sigma^2)$$, what are the values of $$\\mu$$ and $$\\sigma^2$$? (2 steps)", "answer": "- Step 1: The mean of the Normal approximation is $$\\mu = np$$, matching the mean of the Binomial distribution to preserve the center of the distribution.\n- Step 2: The variance of the Normal approximation is $$\\sigma^2 = np(1-p)$$, matching the variance of the Binomial distribution to preserve the spread. Note that the standard deviation is $$\\sigma = \\sqrt{np(1-p)}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Why is a continuity correction necessary when using a Normal distribution to approximate a Binomial probability? (3 steps)", "answer": "- Step 1: The Binomial distribution is discrete, meaning it only takes integer values (0, 1, 2, ...). The probability at a single point, like $$P(X=5)$$, is a finite, positive value represented by the area of a single bar on a histogram.\n- Step 2: The Normal distribution is continuous. The probability at any single exact point is zero. Probabilities are represented by the area under the curve over an interval.\n- Step 3: To approximate the area of a discrete bar at $$X=5$$ using a continuous curve, we must consider the interval from 4.5 to 5.5. This \"spreading out\" by 0.5 on each side is the continuity correction, bridging the gap between discrete points and continuous intervals.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Given a discrete random variable $$X$$ and its continuous Normal approximation $$Y$$, how do you apply the continuity correction for the following probabilities? a) $$P(X = a)$$ b) $$P(X \\leqslant a)$$ c) $$P(X < a)$$ d) $$P(X \\geqslant a)$$ e) $$P(X > a)$$ (2 steps)", "answer": "- Step 1: For equalities and inclusive inequalities, extend the boundary outward by 0.5 to include the entire discrete bar:\n+ a) $$P(X = a) \\approx P(a - 0.5 < Y < a + 0.5)$$\n+ b) $$P(X \\leqslant a) \\approx P(Y < a + 0.5)$$\n+ d) $$P(X \\geqslant a) \\approx P(Y > a - 0.5)$$\n- Step 2: For strict inequalities, shrink the boundary inward by 0.5 to exclude the discrete bar at the boundary:\n+ c) $$P(X < a) \\approx P(Y < a - 0.5)$$\n+ e) $$P(X > a) \\approx P(Y > a + 0.5)$$", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Suppose you are approximating $$P(X \\leqslant 20)$$ for a Binomial variable using a Normal approximation, but you forget the continuity correction. Will your answer be an overestimate or an underestimate of the true probability, and why? (3 steps)", "answer": "- Step 1: The correct approximation is $$P(Y < 20.5)$$. Forgetting the continuity correction means you calculate $$P(Y < 20)$$.\n- Step 2: The interval $$(-\\infty, 20)$$ is strictly smaller than the interval $$(-\\infty, 20.5)$$ under the Normal curve, missing the area between 20 and 20.5.\n- Step 3: Since you are integrating over a smaller area, $$P(Y < 20) < P(Y < 20.5)$$. Therefore, forgetting the continuity correction for $$P(X \\leqslant 20)$$ will result in an underestimate.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "What are the conditions for approximating a Poisson distribution $$X \\sim Po(\\lambda)$$ using a Normal distribution, and what is the rule of thumb for $$\\lambda$$? (2 steps)", "answer": "- Step 1: The condition is that the mean $$\\lambda$$ must be large. As $$\\lambda$$ increases, the Poisson distribution becomes less skewed and more symmetric, resembling the bell shape of a Normal distribution.\n- Step 2: The rule of thumb in this course is that $$\\lambda > 10$$ is considered large enough for the approximation to be reasonably accurate.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Why does a Poisson distribution with a large $$\\lambda$$ behave like a Normal distribution? Provide an intuitive argument based on the properties of Poisson variables. (3 steps)", "answer": "- Step 1: A key property of Poisson random variables is that the sum of independent Poisson variables is also Poisson, with its parameter being the sum of the individual parameters.\n- Step 2: A Poisson variable with a large $$\\lambda$$ can be thought of as the sum of many smaller, independent Poisson variables (e.g., $$Po(30)$$ is the sum of 30 independent $$Po(1)$$ variables).\n- Step 3: By the Central Limit Theorem, the sum of a large number of independent random variables will be approximately Normally distributed, regardless of the shape of the original variables. Thus, the sum approaches a Normal distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "If $$X \\sim Po(\\lambda)$$ is approximated by a Normal distribution $$Y \\sim N(\\mu, \\sigma^2)$$, what are the values of $$\\mu$$ and $$\\sigma^2$$? (2 steps)", "answer": "- Step 1: The mean of the Normal approximation is $$\\mu = \\lambda$$, matching the mean of the Poisson distribution.\n- Step 2: The variance of the Normal approximation is $$\\sigma^2 = \\lambda$$, matching the variance of the Poisson distribution. Notice that unlike the Binomial-to-Normal case, the mean and variance are the same because the Poisson distribution inherently has equal mean and variance.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "When approximating $$P(X \\geqslant 15)$$ for $$X \\sim Po(20)$$ using a Normal approximation, what probability do you actually calculate for the continuous variable $$Y$$? (2 steps)", "answer": "- Step 1: Since we are moving from a discrete distribution (Poisson) to a continuous one (Normal), we must apply a continuity correction.\n- Step 2: The inequality is \"greater than or equal to\" ($$\\geqslant$$), so we extend the boundary outward by 0.5 to include the bar at 15. Thus, we calculate $$P(Y \\geqslant 14.5)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "You have a Binomial distribution $$X \\sim B(n, p)$$ and need to choose an approximation. What is the decision rule for choosing between a Poisson and a Normal approximation? (3 steps)", "answer": "- Step 1: Calculate the mean of the Binomial distribution, $$np$$.\n- Step 2: If $$p$$ is small and $$np \\leqslant 10$$, use a Poisson approximation with $$\\lambda = np$$. This is because the event is rare, and the distribution is right-skewed, matching the Poisson shape.\n- Step 3: If $$p$$ is close to 0.5 and $$np > 10$$, use a Normal approximation with $$\\mu = np$$ and $$\\sigma^2 = np(1-p)$$. This is because the distribution is roughly symmetric and spread out enough to fit the Normal curve.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Suppose $$X \\sim B(200, 0.04)$$ and you want to approximate it using a Normal distribution. A friend suggests you should first approximate it as $$Po(8)$$, and then approximate that $$Po(8)$$ as a Normal distribution. Why is this a bad idea? (2 steps)", "answer": "- Step 1: Each time you apply an approximation, you introduce some error. Going from Binomial to Poisson introduces one layer of error, and then going from Poisson to Normal introduces a second layer.\n- Step 2: It is always more accurate to go directly from the original distribution to the final approximation. A two-step approximation compounds errors unnecessarily. (Note: For this specific $$X$$, $$p$$ is small and $$np=8 \\leqslant 10$$, so a direct Poisson approximation is the most appropriate single-step method anyway).", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Synthesis: A spinner lands on red 10% of the time. You spin it 60 times and want to find the probability of fewer than 4 reds. Which approximation should you use and what are the parameters? (3 steps)", "answer": "- Step 1: Identify the original distribution: $$X \\sim B(60, 0.1)$$.\n- Step 2: Check the conditions: $$n = 60$$ is large, $$p = 0.1$$ is small. The mean is $$np = 60 \\times 0.1 = 6$$, which is $$\\leqslant 10$$.\n- Step 3: Since $$p$$ is small and $$np \\leqslant 10$$, use a Poisson approximation. The parameter is $$\\lambda = 6$$, so approximate with $$Y \\sim Po(6)$$. No continuity correction is needed because Poisson is discrete.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Synthesis: Using the same spinner (10% red), you spin it 150 times and want to find the probability of more than 20 reds. Which approximation should you use and what are the parameters? (3 steps)", "answer": "- Step 1: Identify the original distribution: $$X \\sim B(150, 0.1)$$.\n- Step 2: Check the conditions: $$n = 150$$ is large, $$p = 0.1$$. The mean is $$np = 150 \\times 0.1 = 15$$, which is $$> 10$$.\n- Step 3: Since the mean is large, the distribution is spread enough to consider the Normal approximation. We use a Normal approximation with $$\\mu = 15$$ and $$\\sigma^2 = 150 \\times 0.1 \\times 0.9 = 13.5$$. So approximate with $$Y \\sim N(15, 13.5)$$, and remember the continuity correction.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Exercise: A random variable $$X \\sim B(1000, 0.005)$$. Use a Poisson approximation to estimate $$P(X = 2)$$. Walk through the steps conceptually. (3 steps)", "answer": "- Step 1: First, verify the Poisson approximation is valid. $$n = 1000$$ is large, $$p = 0.005$$ is small, and $$np = 1000 \\times 0.005 = 5 \\leqslant 10$$. So, we approximate with $$Y \\sim Po(5)$$.\n- Step 2: The Poisson probability formula is $$P(Y = k) = \\frac{e^{-\\lambda} \\lambda^k}{k!}$$. Here, $$\\lambda = 5$$ and $$k = 2$$.\n- Step 3: Substitute the values: $$P(Y = 2) = \\frac{e^{-5} \\times 5^2}{2!} = \\frac{e^{-5} \\times 25}{2} = 12.5 e^{-5}$$. (This evaluates to approximately 0.0842).", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Exercise: The random variable $$X \\sim B(100, 0.6)$$. Use a Normal approximation to estimate $$P(X \\leqslant 70)$$. Walk through the steps conceptually. (3 steps)", "answer": "- Step 1: Verify the Normal approximation is valid. $$n = 100$$ is large, $$p = 0.6$$ is close to 0.5. The parameters are $$\\mu = 100 \\times 0.6 = 60$$ and $$\\sigma^2 = 100 \\times 0.6 \\times 0.4 = 24$$. So we approximate with $$Y \\sim N(60, 24)$$.\n- Step 2: Apply the continuity correction. Since $$X$$ is discrete and we want $$P(X \\leqslant 70)$$, we expand the boundary to include the bar at 70. Thus, we calculate $$P(Y < 70.5)$$.\n- Step 3: Standardize to the Z-distribution: $$Z = \\frac{70.5 - 60}{\\sqrt{24}} = \\frac{10.5}{4.90} \\approx 2.14$$. We then find $$P(Z < 2.14)$$ using standard Normal tables, which is roughly 0.9838.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Exercise: The random variable $$X \\sim Po(30)$$. Use a Normal approximation to estimate $$P(X > 35)$$. Walk through the steps conceptually. (3 steps)", "answer": "- Step 1: Verify the Normal approximation is valid. $$\\lambda = 30 > 10$$, so the approximation is valid. The parameters are $$\\mu = 30$$ and $$\\sigma^2 = 30$$. We approximate with $$Y \\sim N(30, 30)$$.\n- Step 2: Apply the continuity correction. Since $$X$$ is discrete and we want $$P(X > 35)$$ (strict inequality), we shrink the boundary inward. Thus, we calculate $$P(Y > 35.5)$$.\n- Step 3: Standardize to the Z-distribution: $$Z = \\frac{35.5 - 30}{\\sqrt{30}} = \\frac{5.5}{5.48} \\approx 1.00$$. We then find $$P(Z > 1.00) = 1 - P(Z < 1.00) = 1 - 0.8413 = 0.1587$$.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Exercise: A breakfast cereal has prizes in 56% of the boxes. A random sample of 100 boxes is taken. The exact probability that exactly 55 boxes contain a prize is 0.0762. The Normal approximation gives 0.0756. Calculate the percentage error. (3 steps)", "answer": "- Step 1: The formula for percentage error is $$\\frac{|\\text{Exact} - \\text{Approximate}|}{\\text{Exact}} \\times 100\\%$$.\n- Step 2: Calculate the difference: $$|0.0762 - 0.0756| = 0.0006$$.\n- Step 3: Divide by the exact value and multiply by 100: $$\\frac{0.0006}{0.0762} \\times 100\\% \\approx 0.79\\%$$. This small percentage error indicates that the Normal approximation is highly accurate in this scenario.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Deep understanding: When approximating $$P(X = 50)$$ for $$X \\sim B(80, 0.55)$$ using a Normal distribution, what interval do you use for the continuity correction, and visually, what does this interval represent? (3 steps)", "answer": "- Step 1: The continuity correction for a single point $$P(X = a)$$ is the interval $$P(a - 0.5 < Y < a + 0.5)$$. So for $$X = 50$$, you use the interval $$P(49.5 < Y < 50.5)$$.\n- Step 2: Visually, the Binomial probability $$P(X = 50)$$ is represented by a single rectangular bar centered at 50 on the x-axis, with a width of 1 (from 49.5 to 50.5) and a height equal to the probability.\n- Step 3: The Normal approximation replaces this discrete bar with the area under the continuous Normal curve between 49.5 and 50.5. This area under the curve approximates the area of the original rectangular bar.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "Edge case: Suppose you have $$X \\sim B(10, 0.1)$$. You decide to use a Poisson approximation. Is this technically allowed by the rules, and would you expect it to be very accurate? Why or why not? (3 steps)", "answer": "- Step 1: Checking the rules: $$n = 10$$ (arguably not very large), $$p = 0.1$$ (small), and $$np = 1 \\leqslant 10$$. It technically meets the rule of thumb $$np \\leqslant 10$$.\n- Step 2: However, the rule also states \"the larger the $$n$$ and the smaller the $$p$$, the better the approximation.\" Here, $$n = 10$$ is quite small.\n- Step 3: With such a small $$n$$, the discrete nature of the Binomial is very pronounced, and the Poisson shape won't align perfectly. The approximation is technically permissible but will be less accurate than if $$n$$ were, say, 100. In an exam, you would only use it if explicitly told to or if calculating the Binomial directly is too difficult.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "Misconception probe: For a Poisson to Normal approximation, is a continuity correction still necessary even though both distributions can take large values? (2 steps)", "answer": "- Step 1: Yes, a continuity correction is absolutely still necessary.\n- Step 2: The need for a continuity correction arises from the difference in data type, not the size of the values. The Poisson distribution is discrete (it can only take integer values like 21, 22), whereas the Normal distribution is continuous (it can take any real value like 21.3 or 22.8). To map an integer probability to a continuous area, you must use the 0.5 boundary adjustment.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}], "count": 26}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "Why can we approximate a Binomial distribution with a Poisson distribution under certain conditions? What are those conditions, and what property of the Poisson distribution justifies this? (3 steps)", "answer": "- Step 1: Recall the parameters of the Binomial distribution: the mean is $$E(X) = np$$ and the variance is $$Var(X) = np(1-p)$$.\n- Step 2: When $$p$$ is small, the term $$(1-p)$$ is close to 1. Substituting this into the variance formula gives $$Var(X) = np(1-p) \\approx np(1) = np$$.\n- Step 3: Since the mean and variance are now approximately equal (both $$\\approx np$$), this satisfies the defining characteristic of a Poisson distribution, where mean = variance. Therefore, when $$n$$ is large and $$p$$ is small, the Binomial behaves like a Poisson distribution.\n\nThe core intuition is that rare events over many trials (large $$n$$, small $$p$$) naturally produce the \"mean equals variance\" property of the Poisson model.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "What parameter $$\\lambda$$ should be used when approximating $$X \\sim B(n, p)$$ with a Poisson distribution, and what is the typical rule of thumb for when this approximation is appropriate? (2 steps)", "answer": "- Step 1: The Poisson parameter is $$\\lambda = np$$. This ensures the approximating distribution has the same mean (and therefore the same expected number of successes) as the original Binomial distribution.\n- Step 2: The rule of thumb is that $$n$$ should be large and $$p$$ should be small, typically with $$np \\leq 10$$. This ensures the distribution is sufficiently skewed (like Poisson) rather than symmetric.\n\nThe $$np \\leq 10$$ guideline exists because Poisson tables in formula booklets typically only go up to $$\\lambda = 10$$, and for larger means, a Normal approximation becomes more suitable.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "If $$X \\sim B(200, 0.98)$$, can we directly use a Poisson approximation? How would we handle approximating a probability like $$P(X = 197)$$? (3 steps)", "answer": "- Step 1: No, we cannot directly use a Poisson approximation because $$p = 0.98$$ is large, not small. The condition \"p is small\" is violated, and the distribution is heavily left-skewed, not right-skewed like Poisson.\n- Step 2: We can redefine the random variable to count the \"failures\" instead of \"successes\". Let $$Y$$ be the number of non-faulty items, so $$Y \\sim B(200, 1 - 0.98) = B(200, 0.02)$$.\n- Step 3: Now $$p = 0.02$$ is small and $$n = 200$$ is large, so $$Y$$ can be approximated by $$Po(200 \\times 0.02) = Po(4)$$. The event $$X = 197$$ successes is equivalent to $$Y = 3$$ failures.\n\nAlways look at the rare event. The Poisson distribution models rare events; if your \"success\" is common, count the \"failures\" instead.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Misconception probe: A student claims that for $$X \\sim B(n, p)$$, the Poisson approximation will always give an exact match for $$P(X = 0)$$. Is this correct? Prove whether the approximation overestimates or underestimates $$P(X=0)$$. (4 steps)", "answer": "- Step 1: The claim is incorrect. The Poisson approximation is just that—an approximation, and it introduces error.\n- Step 2: Let's write the exact and approximated probabilities. For $$X \\sim B(n, p)$$, $$P(X=0) = (1-p)^n$$. For $$Y \\sim Po(np)$$, $$P(Y=0) = e^{-np}$$.\n- Step 3: To compare them, consider the inequality $$e^x \\geq 1 + x$$ (which is true for all real $$x$$, with equality only at $$x=0$$). Substituting $$x = -p$$, we get $$e^{-p} \\geq 1 - p$$.\n- Step 4: Since $$n$$ is a positive integer, we can raise both sides to the power of $$n$$: $$(e^{-p})^n > (1-p)^n$$, which simplifies to $$e^{-np} > (1-p)^n$$. Since the left side is the Poisson probability and the right is the Binomial probability, the Poisson approximation will always *overestimate* $$P(X=0)$$ for $$p > 0$$.\n\nThis mathematical proof confirms that the approximation is not exact and consistently leans towards overestimating the probability of zero successes.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Simple Exercise: A factory produces items where the probability of a defect is 0.01. In a batch of 200 items, we want to find the probability of exactly 2 defects. Write down the exact Binomial model and the approximating Poisson model. Do not calculate the final probabilities. (2 steps)", "answer": "- Step 1: Let $$X$$ be the number of defective items. The exact model is $$X \\sim B(200, 0.01)$$.\n- Step 2: Since $$n = 200$$ is large and $$p = 0.01$$ is small (with $$np = 2 \\leq 10$$), we can approximate using a Poisson distribution with parameter $$\\lambda = 200 \\times 0.01 = 2$$, so $$Y \\sim Po(2)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Why do we use a Normal distribution to approximate a Binomial distribution when $$p$$ is close to 0.5? What happens conceptually if $$p$$ is very small, like 0.05? (3 steps)", "answer": "- Step 1: The Normal distribution is perfectly symmetric. The Binomial distribution is symmetric when $$p = 0.5$$, and remains approximately symmetric when $$p$$ is close to 0.5.\n- Step 2: As $$p$$ moves away from 0.5 towards 0 or 1, the Binomial distribution becomes increasingly skewed (asymmetric). Since the Normal distribution cannot model skewness, the approximation breaks down.\n- Step 3: If $$p$$ is very small (e.g., 0.05), the Binomial distribution is heavily right-skewed, making the symmetric Normal distribution a very poor fit. In such cases, a Poisson approximation is the appropriate choice instead.\n\nShape matching is the key principle: Normal matches symmetric, Poisson matches skewed.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "What are the parameters of the Normal distribution used to approximate $$X \\sim B(n, p)$$, and why are they chosen this way? (2 steps)", "answer": "- Step 1: The approximating Normal distribution is $$Y \\sim N(\\mu, \\sigma^2)$$, where $$\\mu = np$$ and $$\\sigma^2 = np(1-p)$$.\n- Step 2: We match the mean and variance of the Normal distribution to the mean and variance of the Binomial distribution. This ensures that the center (location) and spread (variability) of the approximating distribution align with the original distribution, providing the best possible fit.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Conceptually, why is a continuity correction necessary when using a Normal (continuous) distribution to approximate a Binomial (discrete) distribution? (3 steps)", "answer": "- Step 1: In a discrete distribution like the Binomial, probability is concentrated at integer points. For example, $$P(X = 5)$$ has a positive, measurable probability.\n- Step 2: In a continuous distribution like the Normal, the probability at any single exact point is zero, i.e., $$P(Y = 5) = 0$$.\n- Step 3: To capture the probability mass of the discrete point $$X = 5$$, we must spread it over an interval in the continuous scale. We represent it as the area under the Normal curve from 4.5 to 5.5, effectively \"splitting the difference\" at the halfway points between integers.\n\nThe continuity correction bridges the gap between \"points of mass\" and \"areas under a curve\".", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "How do you apply the continuity correction for the following Binomial probabilities when approximating with a Normal distribution? a) $$P(X \\leq 10)$$, b) $$P(X > 15)$$, c) $$P(5 \\leq X \\leq 12)$$. (3 steps)", "answer": "- Step 1: For $$P(X \\leq 10)$$, we want all probability up to and including 10. On the continuous scale, the mass at 10 extends up to the halfway point to 11, so we use $$P(Y < 10.5)$$.\n- Step 2: For $$P(X > 15)$$, we want probability strictly greater than 15. On the continuous scale, the mass strictly above 15 starts from the halfway point above 15, so we use $$P(Y > 15.5)$$.\n- Step 3: For $$P(5 \\leq X \\leq 12)$$, we include the full probability mass at both 5 and 12. We extend from the lower bound of 5 (which is 4.5) to the upper bound of 12 (which is 12.5), so we use $$P(4.5 < Y < 12.5)$$.\n\nThe rule is simple: if the integer is included, go 0.5 outwards; if it is excluded, go 0.5 inwards.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "Edge case: A student approximates $$X \\sim B(50, 0.5)$$ with $$Y \\sim N(25, 12.5)$$ and calculates $$P(X = 25)$$ as $$P(Y = 25) = 0$$. What is the conceptual error, and how should it be properly calculated? (2 steps)", "answer": "- Step 1: The conceptual error is forgetting the continuity correction. As established, $$P(Y = 25) = 0$$ for a continuous variable, but $$P(X = 25)$$ is positive because the Binomial distribution is discrete.\n- Step 2: To properly capture the probability of the discrete integer 25, we must apply the continuity correction by finding the area under the Normal curve between 24.5 and 25.5. Thus, $$P(X = 25) \\approx P(24.5 < Y < 25.5)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Simple Exercise: A biased coin has P(Head) = 0.53. It is tossed 100 times. Write down the Normal approximation for the number of heads X, and state how you would estimate $$P(X \\leq 50)$$ using this approximation (set up the inequality with the continuity correction, do not solve). (3 steps)", "answer": "- Step 1: The Binomial model is $$X \\sim B(100, 0.53)$$. Since $$n$$ is large and $$p$$ is close to 0.5, a Normal approximation is appropriate.\n- Step 2: The parameters are $$\\mu = 100 \\times 0.53 = 53$$ and $$\\sigma^2 = 100 \\times 0.53 \\times 0.47 = 24.91$$. So, $$Y \\sim N(53, 24.91)$$.\n- Step 3: To estimate $$P(X \\leq 50)$$, we apply the continuity correction to include the mass at 50, giving $$P(Y < 50.5)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Why can a Poisson distribution be approximated by a Normal distribution when $$\\lambda$$ is large? Relate this to the visual shape of the distributions. (3 steps)", "answer": "- Step 1: A Poisson distribution with a small $$\\lambda$$ is heavily right-skewed because it is bounded below by 0 and has no upper bound.\n- Step 2: As $$\\lambda$$ increases, the distribution spreads out to the right. The \"left tail\" near 0 becomes less significant relative to the mean, and the distribution becomes more symmetric and bell-shaped.\n- Step 3: Since the Normal distribution is symmetric and bell-shaped, it becomes a good fit for the Poisson distribution when $$\\lambda$$ is sufficiently large (typically $$\\lambda > 10$$).", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "What are the parameters of the Normal distribution used to approximate $$X \\sim Po(\\lambda)$$? Why are the mean and variance equal in this approximation? (2 steps)", "answer": "- Step 1: The approximating Normal distribution is $$Y \\sim N(\\lambda, \\lambda)$$.\n- Step 2: The mean and variance are both equal to $$\\lambda$$ because this is the defining property of the Poisson distribution ($$E(X) = Var(X) = \\lambda$$). We match these parameters to preserve the center and spread of the original distribution.\n\nThis is a key difference from the Binomial approximation, where the variance is $$np(1-p)$$, not just $$np$$.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "When approximating $$X \\sim Po(25)$$ with a Normal distribution to find $$P(X > 30)$$, a student writes $$P(Y > 30)$$. What is wrong with this, and how should it be corrected? (2 steps)", "answer": "- Step 1: The student forgot the continuity correction. The Poisson distribution is discrete, so when approximating with the continuous Normal distribution, a continuity correction is required.\n- Step 2: For the strict inequality $$P(X > 30)$$, we want values strictly greater than 30. The integer 30 is not included, so we start from the upper boundary of 30, which is 30.5. The correct approximation is $$P(Y > 30.5)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "Simple Exercise: Breakdowns of a fleet of cars occur at a rate of 21 per week. Write down the Normal approximation for the number of breakdowns X in a week, and set up (do not solve) the expression to estimate the probability of more than 27 breakdowns. (3 steps)", "answer": "- Step 1: The exact model is $$X \\sim Po(21)$$. Since $$\\lambda = 21 > 10$$, a Normal approximation is appropriate.\n- Step 2: The approximating Normal distribution has the same mean and variance, so $$Y \\sim N(21, 21)$$.\n- Step 3: To estimate $$P(X > 27)$$, we apply the continuity correction for the discrete Poisson variable, giving $$P(Y > 27.5)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "You have $$X \\sim B(n, p)$$ and need to choose an approximation. Conceptually, what is the decision flowchart for choosing between Poisson and Normal? (3 steps)", "answer": "- Step 1: First, check the value of $$p$$. If $$p$$ is small (and $$n$$ is large), the Binomial distribution is skewed, and you should use a Poisson approximation.\n- Step 2: If $$p$$ is close to 0.5 (and $$n$$ is large), the Binomial distribution is symmetric, and you should use a Normal approximation.\n- Step 3: A helpful quantitative guide is to look at the mean, $$np$$. If $$np \\leq 10$$, the Poisson tables can typically be used, suggesting a Poisson approximation. If $$np > 10$$, a Normal approximation is usually more suitable.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Why should you NEVER approximate a Binomial distribution by first going to a Poisson distribution, and then from Poisson to Normal? (2 steps)", "answer": "- Step 1: Every time you apply an approximation, you introduce some error into your calculations.\n- Step 2: Going Binomial → Poisson → Normal introduces error twice (compounding the inaccuracies). Going Binomial → Normal directly introduces error only once. Therefore, the direct approximation is more accurate and should always be preferred when the conditions for a Normal approximation are met.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Synthesis question: A spinner lands on red 10% of the time. For 60 spins, we want to estimate P(fewer than 4 reds). For 150 spins, we want to estimate P(more than 20 reds). Which approximation is appropriate for each, and why? (4 steps)", "answer": "- Step 1: For 60 spins, $$X \\sim B(60, 0.1)$$. Here, $$n = 60$$ is large and $$p = 0.1$$ is small. The mean is $$np = 6$$.\n- Step 2: Since $$p$$ is small and $$np \\leq 10$$, a Poisson approximation is appropriate for the 60 spins.\n- Step 3: For 150 spins, $$R \\sim B(150, 0.1)$$. Here, $$n = 150$$ is large and $$p = 0.1$$ is small, but the mean is $$np = 15$$.\n- Step 4: Since $$np = 15 > 10$$, the Poisson tables may not cover it, and the distribution is spreading out enough to be approximately symmetric. Therefore, a Normal approximation is appropriate for the 150 spins.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "A student reasons: \"Since p is small, I must use Poisson, even if np = 50.\" Evaluate this reasoning. (2 steps)", "answer": "- Step 1: This reasoning is flawed. While $$p$$ being small initially suggests Poisson, when $$np$$ is very large (like 50), the Binomial distribution spreads out and becomes approximately symmetric.\n- Step 2: A Normal approximation is much more practical and accurate in this case because Poisson calculations with $$\\lambda = 50$$ are cumbersome, and the shape of the distribution is well-captured by the Normal curve. Thus, the magnitude of $$np$$ overrides the \"$$p$$ is small\" heuristic when $$np$$ is large.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "Simple Exercise: The probability of a customer buying a newspaper is 0.40. A random sample of 100 customers is taken. Write down the exact distribution, the appropriate approximating distribution and its parameters, and set up (do not solve) the continuity-corrected inequality to estimate the probability that at least half the customers bought a newspaper. (3 steps)", "answer": "- Step 1: The exact distribution is $$X \\sim B(100, 0.40)$$.\n- Step 2: Since $$n = 100$$ is large and $$p = 0.40$$ is close to 0.5, a Normal approximation is appropriate. The parameters are $$\\mu = 100 \\times 0.40 = 40$$ and $$\\sigma^2 = 100 \\times 0.40 \\times 0.60 = 24$$. So, $$Y \\sim N(40, 24)$$.\n- Step 3: To estimate P(at least half bought a newspaper), we need $$P(X \\geq 50)$$. Applying the continuity correction, this becomes $$P(Y > 49.5)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}], "count": 20}, "glm_3": {"label": "GLM 5.1 ③", "cards": [], "count": 0}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why is the Poisson distribution a valid approximation for the binomial distribution when n is large and p is small? (3 steps)", "answer": "- Step 1: For a binomial distribution B(n,p), the mean is μ=np and variance is σ²=np(1-p).  \n- Step 2: When p is small, (1-p) ≈ 1, so σ² ≈ np = μ.  \n+ This matches the Poisson property where mean and variance are equal.  \n- Step 3: As n increases, the binomial distribution becomes skewed (like Poisson), making the approximation valid for large n and small p.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "What conditions must be satisfied to approximate a binomial distribution with a Poisson distribution, and why is the condition on np important? (3 steps)", "answer": "- Step 1: Conditions are **n is large** and **p is small** (no strict thresholds, but np ≤ 10 is common).  \n- Step 2: The product np must be finite and moderate (≤10) to ensure the Poisson distribution remains tractable.  \n+ A small p ensures that (1-p) ≈ 1, making Var(X) ≈ E(X), which matches the Poisson requirement of equal mean and variance.  \n- Step 3: Larger n and smaller p improve the approximation because the binomial distribution approaches the Poisson shape.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why is continuity correction unnecessary when approximating a binomial distribution with a Poisson distribution but necessary when approximating with a normal distribution? (3 steps)", "answer": "- Step 1: The Poisson distribution is discrete, matching the discrete nature of the binomial distribution.  \n- Step 2: The normal distribution is continuous, while the binomial is discrete, requiring a correction (±0.5) to account for the gap between discrete and continuous probabilities.  \n+ Example: For P(X ≤ k) in binomial, use P(Y < k+0.5) in normal approximation.  \n- Step 3: Since Poisson and binomial are both discrete, no adjustment is needed between them.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": true}, {"question": "When approximating a binomial distribution with a normal distribution, why must p be close to 0.5 even if n is large? (3 steps)", "answer": "- Step 1: The binomial distribution is symmetric when p=0.5, matching the normal distribution's symmetry.  \n- Step 2: If p is far from 0.5 (e.g., p=0.1), the binomial distribution is skewed, making the normal approximation less accurate.  \n+ Example: For B(100,0.5), the distribution is bell-shaped; for B(100,0.1), it is right-skewed.  \n- Step 3: A normal distribution cannot capture skewness, so p must be near 0.5 for the approximation to work.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why is the normal distribution a valid approximation for the Poisson distribution when λ is large? (3 steps)", "answer": "- Step 1: For Po(λ), the mean and variance are both λ. As λ increases, the Poisson distribution becomes symmetric.  \n- Step 2: By the Central Limit Theorem, the sum of many independent Poisson variables (with large λ) approximates a normal distribution.  \n+ Example: Po(λ=100) ≈ N(100,100), since σ=√λ = 10.  \n- Step 3: The distribution smooths out as λ grows, making it resemble a normal curve.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What is the continuity correction when approximating a Poisson distribution with a normal distribution, and why is it necessary? (3 steps)", "answer": "- Step 1: For Po(λ) ≈ N(λ,λ), continuity correction involves adjusting discrete Poisson values by ±0.5 when calculating probabilities.  \n- Step 2: Example: P(X ≥ 10) becomes P(Y ≥ 9.5) in the normal approximation.  \n+ This accounts for the fact that the Poisson is discrete (e.g., X=10 is a single point) while the normal is continuous.  \n- Step 3: Without correction, probabilities would be less accurate due to the discrete-to-continuous mismatch.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How do you decide whether to approximate a binomial distribution with a Poisson or normal distribution? (3 steps)", "answer": "- Step 1: If **n is large** and **p is small** (λ=np ≤ 10), use Poisson.  \n+ Example: n=1000, p=0.005 → λ=5.  \n- Step 2: If **n is large** and **p is near 0.5**, use normal.  \n+ Example: n=200, p=0.45.  \n- Step 3: If p is moderate (e.g., p=0.25) and n is large enough for λ=np > 10, use normal.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why does the Poisson approximation tend to overestimate P(X=0) for a binomial distribution? (3 steps)", "answer": "- Step 1: For B(n,p), P(X=0) = (1-p)^n.  \n- Step 2: The Poisson approximation gives P(X=0) = e^{-λ} where λ=np.  \n+ Example: For B(100,0.01), exact P(X=0) = (0.99)^100 ≈ 0.366; Poisson gives e^{-1} ≈ 0.368.  \n- Step 3: The approximation overestimates because the Poisson formula simplifies the binomial expansion, introducing a small error.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How does the shape of the Poisson distribution change as λ increases, and how does this justify using a normal approximation? (3 steps)", "answer": "- Step 1: For small λ (e.g., λ=2), the Poisson is skewed right.  \n- Step 2: As λ increases (e.g., λ=50), the distribution becomes symmetric and bell-shaped.  \n+ Example: Po(50) is nearly normal.  \n- Step 3: The Central Limit Theorem explains that the sum of many Poisson events (large λ) approximates a normal distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "What is the percentage error when approximating a binomial probability with a normal or Poisson distribution, and why is it important? (3 steps)", "answer": "- Step 1: Percentage error = |(Approximate - Exact)/Exact| × 100%.  \n- Step 2: Example: Exact P(X=50) = 0.0365, Normal approximation = 0.0362 → error = 0.82%.  \n+ Small errors (e.g., <5%) validate the approximation's usefulness.  \n- Step 3: High errors (e.g., >10%) suggest the approximation is inappropriate (e.g., p far from 0.5 for normal).", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why is the normal approximation to the binomial distribution more accurate when n is large and p is near 0.5? (3 steps)", "answer": "- Step 1: The binomial distribution becomes symmetric when p=0.5, matching the normal distribution's symmetry.  \n- Step 2: For large n, the binomial distribution approaches a normal shape (Central Limit Theorem).  \n+ Example: B(100,0.5) is bell-shaped; B(100,0.1) is skewed.  \n- Step 3: When p is near 0.5, the variance np(1-p) is maximized, ensuring the normal curve fits well.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What is the maximum acceptable error when justifying the use of a Poisson approximation to the binomial distribution? (2 steps)", "answer": "- Step 1: There is no strict threshold, but errors <5% are generally acceptable.  \n+ Example: In Example 1, Poisson (0.1339) vs. binomial (0.1338) → error ≈ 0.07%.  \n- Step 2: Larger errors (e.g., >10%) suggest the approximation is invalid (e.g., n is not large enough or p is not small enough).", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Why is the normal approximation to the Poisson distribution valid when λ > 10? (3 steps)", "answer": "- Step 1: For λ > 10, the Poisson distribution's skewness becomes negligible, and the shape approaches normality.  \n- Step 2: The standard deviation σ=√λ grows slower than the mean λ, but the distribution smooths as λ increases.  \n+ Example: Po(15) ≈ N(15,15).  \n- Step 3: The Central Limit Theorem ensures that the sum of many Poisson events (large λ) approximates a normal distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How does the variance of the binomial distribution compare to the variance of its Poisson approximation, and what does this imply? (3 steps)", "answer": "- Step 1: Binomial variance σ² = np(1-p); Poisson variance = λ = np.  \n- Step 2: For small p, (1-p) ≈ 1, so σ² ≈ np = λ.  \n+ Example: B(100,0.05) → σ² ≈ 4.75; Po(5) → σ²=5.  \n- Step 3: The approximation assumes (1-p) ≈ 1, which becomes better as p decreases.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "What is the continuity correction for P(X ≤ 10) when approximating a binomial distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(X ≤ 10) becomes P(Y < 10.5) in the normal approximation.  \n+ Example: If X ~ B(100,0.5), approximate P(X ≤ 10) as P(Y < 10.5) where Y ~ N(50,5²).  \n- Step 2: This adjusts for the gap between discrete X=10 and continuous Y.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "Why is the normal approximation to the binomial distribution less accurate when p is close to 0 or 1? (3 steps)", "answer": "- Step 1: The binomial distribution becomes highly skewed when p is near 0 or 1, deviating from the symmetric normal distribution.  \n- Step 2: Example: B(100,0.1) is right-skewed; B(100,0.9) is left-skewed.  \n+ The normal distribution cannot capture this skewness, leading to poor approximations.  \n- Step 3: Continuity correction improves accuracy but cannot fix the fundamental mismatch in shape.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "What is the continuity correction for P(X ≥ 15) when approximating a Poisson distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(X ≥ 15) becomes P(Y ≥ 14.5) in the normal approximation.  \n+ Example: If X ~ Po(12), approximate P(X ≥ 15) as P(Y ≥ 14.5) where Y ~ N(12,12).  \n- Step 2: This adjusts for the fact that Y is continuous, while X is discrete.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "How does the choice of approximation (Poisson vs. normal) affect the computational complexity of solving a binomial probability problem? (3 steps)", "answer": "- Step 1: Poisson simplifies calculations when np ≤ 10, as Poisson tables or formulas are easier than binomial coefficients.  \n- Step 2: Normal approximation requires calculating z-scores and using tables or calculators, which may be faster for large n than summing binomial terms.  \n+ Example: For B(1000,0.01), Poisson (λ=10) requires fewer calculations than binomial (1000 choose k).  \n- Step 3: Poisson is computationally simpler for rare events (small p), while normal is better for moderate p and large n.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Why is the normal approximation to the Poisson distribution valid even though the Poisson is discrete and the normal is continuous? (3 steps)", "answer": "- Step 1: For large λ, the Poisson distribution's discrete steps become negligible due to the high number of possible values.  \n- Step 2: The normal distribution's continuity provides a smooth approximation to the Poisson's discrete probabilities.  \n+ Example: Po(50) has probabilities spread over many integers, resembling a normal curve.  \n- Step 3: Continuity correction bridges the discrete-continuous gap, improving approximation accuracy.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "What is the continuity correction for P(5 ≤ X ≤ 10) when approximating a binomial distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(5 ≤ X ≤ 10) becomes P(4.5 < Y < 10.5) in the normal approximation.  \n+ Example: If X ~ B(100,0.5), approximate P(5 ≤ X ≤ 10) as P(4.5 < Y < 10.5) where Y ~ N(50,5²).  \n- Step 2: This ensures the continuous Y covers the full range of discrete X values.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}, {"question": "How does the choice of approximation (Poisson vs. normal) depend on the value of np for a binomial distribution? (3 steps)", "answer": "- Step 1: If np ≤ 10, use Poisson approximation (rare events).  \n+ Example: n=1000, p=0.01 → np=10.  \n- Step 2: If np > 10 and p is near 0.5, use normal approximation.  \n+ Example: n=100, p=0.5 → np=50.  \n- Step 3: If p is moderate (e.g., p=0.25) and n is large enough for np > 10, use normal.", "source": "Qwen 3 ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "Why is the normal approximation to the binomial distribution considered more accurate than the Poisson approximation when p is near 0.5? (3 steps)", "answer": "- Step 1: The binomial distribution is symmetric when p=0.5, matching the normal distribution's symmetry.  \n- Step 2: Poisson distributions are inherently skewed (right), making them poor fits for symmetric binomial cases.  \n+ Example: B(100,0.5) is bell-shaped; Po(50) is still slightly skewed.  \n- Step 3: The normal approximation captures the symmetry and variance of the binomial distribution more accurately.", "source": "Qwen 3 ①", "_id": "qwen_1_21", "judge_pick": false}, {"question": "What is the continuity correction for P(X < 5) when approximating a Poisson distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(X < 5) becomes P(Y < 4.5) in the normal approximation.  \n+ Example: If X ~ Po(10), approximate P(X < 5) as P(Y < 4.5) where Y ~ N(10,10).  \n- Step 2: This accounts for the discrete nature of X in the continuous Y distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_22", "judge_pick": false}, {"question": "How does the variance of the normal approximation compare to the variance of the binomial distribution it approximates? (3 steps)", "answer": "- Step 1: The normal approximation uses σ² = np(1-p), matching the binomial variance exactly.  \n- Step 2: Example: For B(100,0.5), σ² = 100×0.5×0.5 = 25.  \n+ The normal distribution preserves the binomial's variance.  \n- Step 3: This ensures the spread of the normal curve matches the binomial distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_23", "judge_pick": false}, {"question": "Why is the Poisson approximation unsuitable for a binomial distribution when p is not small, even if n is large? (3 steps)", "answer": "- Step 1: When p is not small (e.g., p=0.5), the binomial variance σ² = np(1-p) ≈ np/2, while Poisson variance is λ = np.  \n- Step 2: The Poisson variance is larger than the binomial variance, leading to a poor fit.  \n+ Example: B(100,0.5) has σ²=25; Po(50) has σ²=50.  \n- Step 3: The Poisson distribution cannot capture the lower variance, making it unsuitable for moderate p.", "source": "Qwen 3 ①", "_id": "qwen_1_24", "judge_pick": false}, {"question": "What is the continuity correction for P(X ≤ 15) when approximating a Poisson distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(X ≤ 15) becomes P(Y < 15.5) in the normal approximation.  \n+ Example: If X ~ Po(12), approximate P(X ≤ 15) as P(Y < 15.5) where Y ~ N(12,12).  \n- Step 2: This adjusts for the fact that Y is continuous, while X is discrete.", "source": "Qwen 3 ①", "_id": "qwen_1_25", "judge_pick": false}, {"question": "How does the shape of the binomial distribution change as n increases while keeping p fixed at 0.5? (3 steps)", "answer": "- Step 1: As n increases, the binomial distribution becomes more symmetric and bell-shaped.  \n- Step 2: The distribution's spread (standard deviation) increases as √n, but the shape remains symmetric.  \n+ Example: B(10,0.5) is discrete and bell-shaped; B(1000,0.5) is nearly normal.  \n- Step 3: This justifies using the normal approximation for large n and p=0.5.", "source": "Qwen 3 ①", "_id": "qwen_1_26", "judge_pick": false}, {"question": "Why is the normal approximation to the Poisson distribution valid even though the Poisson has a different shape for small λ? (3 steps)", "answer": "- Step 1: For small λ (e.g., λ=2), the Poisson is skewed and discrete, unlike the normal.  \n- Step 2: As λ increases, the distribution becomes symmetric and smooth, matching the normal shape.  \n+ Example: Po(10) is still slightly skewed, but Po(50) is nearly normal.  \n- Step 3: The Central Limit Theorem ensures that the sum of many Poisson events (large λ) approximates a normal distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_27", "judge_pick": false}, {"question": "What is the continuity correction for P(X > 20) when approximating a binomial distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(X > 20) becomes P(Y > 20.5) in the normal approximation.  \n+ Example: If X ~ B(100,0.5), approximate P(X > 20) as P(Y > 20.5) where Y ~ N(50,5²).  \n- Step 2: This accounts for the discrete nature of X in the continuous Y distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_28", "judge_pick": false}, {"question": "How does the choice of approximation (Poisson vs. normal) affect the handling of continuity corrections? (3 steps)", "answer": "- Step 1: Poisson approximations do not require continuity corrections because both distributions are discrete.  \n- Step 2: Normal approximations require continuity corrections (±0.5) to adjust for the discrete-continuous mismatch.  \n+ Example: P(X ≤ 5) for binomial becomes P(Y < 5.5) in normal approximation.  \n- Step 3: Continuity corrections improve the accuracy of normal approximations but are irrelevant for Poisson.", "source": "Qwen 3 ①", "_id": "qwen_1_29", "judge_pick": false}, {"question": "Why is the normal approximation to the binomial distribution more accurate when n is large, even if p is not exactly 0.5? (3 steps)", "answer": "- Step 1: For large n, the binomial distribution becomes approximately normal (Central Limit Theorem), even if p is slightly skewed.  \n- Step 2: Example: B(100,0.4) is nearly normal despite p=0.4.  \n+ The skewness decreases as n increases, making the normal approximation valid for moderate p.  \n- Step 3: Continuity correction further improves accuracy for non-integer p.", "source": "Qwen 3 ①", "_id": "qwen_1_30", "judge_pick": false}, {"question": "What is the continuity correction for P(X < 10) when approximating a Poisson distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(X < 10) becomes P(Y < 9.5) in the normal approximation.  \n+ Example: If X ~ Po(15), approximate P(X < 10) as P(Y < 9.5) where Y ~ N(15,15).  \n- Step 2: This adjusts for the discrete nature of X in the continuous Y distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_31", "judge_pick": false}, {"question": "How does the variance of the normal approximation compare to the variance of the Poisson distribution it approximates? (3 steps)", "answer": "- Step 1: The normal approximation uses σ² = λ, matching the Poisson variance exactly.  \n- Step 2: Example: For Po(10), σ²=10; the normal approximation is N(10,10).  \n+ The normal distribution preserves the Poisson's variance.  \n- Step 3: This ensures the spread of the normal curve matches the Poisson distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_32", "judge_pick": false}, {"question": "Why is the Poisson approximation unsuitable for a binomial distribution when n is not large, even if p is small? (3 steps)", "answer": "- Step 1: When n is small (e.g., n=20), the binomial distribution is too discrete to match the Poisson's smoother shape.  \n- Step 2: Example: B(20,0.05) has λ=1 → Po(1) may not match probabilities for k=0,1,2.  \n+ The Poisson approximation improves as n increases, even with fixed p.  \n- Step 3: Small n leads to significant discrepancies between binomial and Poisson probabilities.", "source": "Qwen 3 ①", "_id": "qwen_1_33", "judge_pick": false}, {"question": "What is the continuity correction for P(X ≥ 5) when approximating a binomial distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(X ≥ 5) becomes P(Y > 4.5) in the normal approximation.  \n+ Example: If X ~ B(100,0.5), approximate P(X ≥ 5) as P(Y > 4.5) where Y ~ N(50,5²).  \n- Step 2: This accounts for the discrete nature of X in the continuous Y distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_34", "judge_pick": false}, {"question": "How does the shape of the Poisson distribution change as λ decreases, and how does this affect the normal approximation? (3 steps)", "answer": "- Step 1: For small λ (e.g., λ=2), the Poisson is highly skewed right.  \n- Step 2: As λ decreases, the distribution becomes more discrete and less bell-shaped.  \n+ Example: Po(2) is skewed; Po(50) is symmetric.  \n- Step 3: The normal approximation becomes invalid for λ ≤ 10 due to skewness and discreteness.", "source": "Qwen 3 ①", "_id": "qwen_1_35", "judge_pick": false}, {"question": "Why is the normal approximation to the binomial distribution considered more accurate than the Poisson approximation when λ=np > 10? (3 steps)", "answer": "- Step 1: For λ=np > 10 and p near 0.5, the binomial distribution is symmetric, matching the normal distribution.  \n- Step 2: The Poisson distribution remains skewed even for large λ, making it a poorer fit.  \n+ Example: B(100,0.5) ≈ N(50,25); Po(50) is skewed.  \n- Step 3: The normal approximation captures the symmetry and variance of the binomial distribution more accurately.", "source": "Qwen 3 ①", "_id": "qwen_1_36", "judge_pick": false}, {"question": "What is the continuity correction for P(10 ≤ X ≤ 20) when approximating a Poisson distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(10 ≤ X ≤ 20) becomes P(9.5 < Y < 20.5) in the normal approximation.  \n+ Example: If X ~ Po(15), approximate P(10 ≤ X ≤ 20) as P(9.5 < Y < 20.5) where Y ~ N(15,15).  \n- Step 2: This ensures the continuous Y covers the full range of discrete X values.", "source": "Qwen 3 ①", "_id": "qwen_1_37", "judge_pick": false}, {"question": "How does the choice of approximation (Poisson vs. normal) affect the handling of the mean and variance? (3 steps)", "answer": "- Step 1: Poisson approximation sets both mean and variance to λ=np, assuming Var(X) ≈ E(X).  \n- Step 2: Normal approximation preserves the binomial's mean μ=np and variance σ²=np(1-p).  \n+ Example: B(100,0.5) has μ=50 and σ²=25; normal approximation uses both.  \n- Step 3: The Poisson approximation forces Var(X)=E(X), which is only valid for small p.", "source": "Qwen 3 ①", "_id": "qwen_1_38", "judge_pick": false}, {"question": "What is the continuity correction for P(X > 5) when approximating a Poisson distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(X > 5) becomes P(Y > 5.5) in the normal approximation.  \n+ Example: If X ~ Po(10), approximate P(X > 5) as P(Y > 5.5) where Y ~ N(10,10).  \n- Step 2: This adjusts for the discrete nature of X in the continuous Y distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_39", "judge_pick": false}, {"question": "How does the shape of the binomial distribution change as n increases while keeping p=0.1 fixed? (3 steps)", "answer": "- Step 1: As n increases, the binomial distribution becomes more symmetric and bell-shaped.  \n- Step 2: Example: B(10,0.1) is right-skewed; B(1000,0.1) approximates a normal distribution.  \n+ For large n and small p, the binomial approaches Poisson (if np ≤ 10) or normal (if np > 10).  \n- Step 3: The shape depends on both n and p, guiding the choice of approximation.", "source": "Qwen 3 ①", "_id": "qwen_1_40", "judge_pick": false}, {"question": "Why is the normal approximation to the Poisson distribution valid even though the Poisson has a different shape for small λ? (3 steps)", "answer": "- Step 1: For small λ (e.g., λ=2), the Poisson is skewed and discrete, unlike the normal.  \n- Step 2: As λ increases, the distribution becomes symmetric and smooth, matching the normal shape.  \n+ Example: Po(10) is still slightly skewed, but Po(50) is nearly normal.  \n- Step 3: The Central Limit Theorem ensures that the sum of many Poisson events (large λ) approximates a normal distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_41", "judge_pick": false}, {"question": "What is the continuity correction for P(X < 15) when approximating a binomial distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(X < 15) becomes P(Y < 14.5) in the normal approximation.  \n+ Example: If X ~ B(100,0.5), approximate P(X < 15) as P(Y < 14.5) where Y ~ N(50,5²).  \n- Step 2: This accounts for the discrete nature of X in the continuous Y distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_42", "judge_pick": false}, {"question": "How does the variance of the normal approximation compare to the variance of the binomial distribution it approximates? (3 steps)", "answer": "- Step 1: The normal approximation uses σ² = np(1-p), matching the binomial variance exactly.  \n- Step 2: Example: For B(100,0.5), σ² = 100×0.5×0.5 = 25.  \n+ The normal distribution preserves the binomial's variance.  \n- Step 3: This ensures the spread of the normal curve matches the binomial distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_43", "judge_pick": false}, {"question": "Why is the Poisson approximation unsuitable for a binomial distribution when p is not small, even if n is large? (3 steps)", "answer": "- Step 1: When p is not small (e.g., p=0.5), the binomial variance σ² = np(1-p) ≈ np/2, while Poisson variance is λ = np.  \n- Step 2: The Poisson variance is larger than the binomial variance, leading to a poor fit.  \n+ Example: B(100,0.5) has σ²=25; Po(50) has σ²=50.  \n- Step 3: The Poisson distribution cannot capture the lower variance, making it unsuitable for moderate p.", "source": "Qwen 3 ①", "_id": "qwen_1_44", "judge_pick": false}, {"question": "What is the continuity correction for P(X ≤ 15) when approximating a Poisson distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(X ≤ 15) becomes P(Y < 15.5) in the normal approximation.  \n+ Example: If X ~ Po(12), approximate P(X ≤ 15) as P(Y < 15.5) where Y ~ N(12,12).  \n- Step 2: This adjusts for the fact that Y is continuous, while X is discrete.", "source": "Qwen 3 ①", "_id": "qwen_1_45", "judge_pick": false}, {"question": "How does the shape of the binomial distribution change as n increases while keeping p fixed at 0.5? (3 steps)", "answer": "- Step 1: As n increases, the binomial distribution becomes more symmetric and bell-shaped.  \n- Step 2: The distribution's spread (standard deviation) increases as √n, but the shape remains symmetric.  \n+ Example: B(10,0.5) is discrete and bell-shaped; B(1000,0.5) is nearly normal.  \n- Step 3: This justifies using the normal approximation for large n and p=0.5.", "source": "Qwen 3 ①", "_id": "qwen_1_46", "judge_pick": false}, {"question": "Why is the normal approximation to the Poisson distribution valid even though the Poisson has a different shape for small λ? (3 steps)", "answer": "- Step 1: For small λ (e.g., λ=2), the Poisson is skewed and discrete, unlike the normal.  \n- Step 2: As λ increases, the distribution becomes symmetric and smooth, matching the normal shape.  \n+ Example: Po(10) is still slightly skewed, but Po(50) is nearly normal.  \n- Step 3: The Central Limit Theorem ensures that the sum of many Poisson events (large λ) approximates a normal distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_47", "judge_pick": false}, {"question": "What is the continuity correction for P(X > 20) when approximating a binomial distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(X > 20) becomes P(Y > 20.5) in the normal approximation.  \n+ Example: If X ~ B(100,0.5), approximate P(X > 20) as P(Y > 20.5) where Y ~ N(50,5²).  \n- Step 2: This accounts for the discrete nature of X in the continuous Y distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_48", "judge_pick": false}, {"question": "How does the choice of approximation (Poisson vs. normal) affect the handling of continuity corrections? (3 steps)", "answer": "- Step 1: Poisson approximations do not require continuity corrections because both distributions are discrete.  \n- Step 2: Normal approximations require continuity corrections (±0.5) to adjust for the discrete-continuous mismatch.  \n+ Example: P(X ≤ 5) for binomial becomes P(Y < 5.5) in normal approximation.  \n- Step 3: Continuity corrections improve the accuracy of normal approximations but are irrelevant for Poisson.", "source": "Qwen 3 ①", "_id": "qwen_1_49", "judge_pick": false}, {"question": "Why is the normal approximation to the binomial distribution more accurate when n is large, even if p is not exactly 0.5? (3 steps)", "answer": "- Step 1: For large n, the binomial distribution becomes approximately normal (Central Limit Theorem), even if p is slightly skewed.  \n- Step 2: Example: B(100,0.4) is nearly normal despite p=0.4.  \n+ The skewness decreases as n increases, making the normal approximation valid for moderate p.  \n- Step 3: Continuity correction further improves accuracy for non-integer p.", "source": "Qwen 3 ①", "_id": "qwen_1_50", "judge_pick": false}, {"question": "What is the continuity correction for P(X < 10) when approximating a Poisson distribution with a normal distribution? (2 steps)", "answer": "- Step 1: For discrete X, P(X < 10) becomes P(Y < 9.5) in the normal approximation.  \n+ Example: If X ~ Po(15), approximate P(X < 10) as P(Y < 9.5) where Y ~ N(15,15).  \n- Step 2: This adjusts for the discrete nature of X in the continuous Y distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_51", "judge_pick": false}, {"question": "How does the variance of the normal approximation compare to the variance of the Poisson distribution it approximates? (3 steps)", "answer": "- Step 1: The normal approximation uses σ² = λ, matching the Poisson variance exactly.  \n- Step 2: Example: For Po(10), σ²=10; the normal approximation is N(10,10).  \n+ The normal distribution preserves the Poisson's variance.  \n-", "source": "Qwen 3 ①", "_id": "qwen_1_52", "judge_pick": false}], "count": 53}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is a Poisson distribution a valid approximation for a binomial distribution when $ n $ is large and $ p $ is small? Explain the intuition behind this approximation.", "answer": "- Step 1: **Large $ n $, small $ p $**: When $ n $ is large and $ p $ is small, the binomial distribution $ X \\sim \\mathrm{B}(n, p) $ models rare events occurring over many trials.  \n- Step 2: **Mean and variance relationship**: The binomial variance is $ \\mathrm{Var}(X) = np(1-p) $. If $ p $ is small, $ (1-p) \\approx 1 $, so $ \\mathrm{Var}(X) \\approx np $, matching the Poisson property where mean and variance are equal.  \n- Step 3: **Poisson conditions**: The Poisson distribution models rare events in continuous time/space. For rare events (small $ p $), the binomial process can be approximated by a Poisson process with $ \\lambda = np $.  \n\n+ Example: $ X \\sim \\mathrm{B}(200, 0.03) $ has $ \\lambda = 6 $, and $ \\mathrm{P}(X=4) \\approx \\frac{e^{-6}6^4}{4!} $, which closely matches the exact binomial probability.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "When approximating a binomial distribution with a Poisson distribution, why is continuity correction **not** required? (3 steps)", "answer": "- Step 1: **Discrete-to-discrete approximation**: Both binomial and Poisson distributions are discrete. Continuity correction is used when approximating a discrete distribution (e.g., binomial) with a continuous one (e.g., normal).  \n- Step 2: **No need for interval smoothing**: Since Poisson retains discrete outcomes, probabilities like $ \\mathrm{P}(X = k) $ are directly comparable without adjusting for gaps between discrete points.  \n- Step 3: **Direct parameter matching**: The Poisson approximation uses $ \\lambda = np $, which preserves the discrete structure of the original binomial distribution.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Under what conditions is a *normal distribution* a better approximation for a binomial distribution than a Poisson distribution? Explain.", "answer": "- Step 1: **Symmetry requirement**: Normal approximation is valid when the binomial distribution is symmetric, which occurs when $ p $ is close to 0.5.  \n- Step 2: **Large $ n $**: A large $ n $ ensures the binomial distribution is bell-shaped, satisfying the Central Limit Theorem (CLT).  \n- Step 3: **Mean vs. variance**: For normal approximation, $ np $ and $ n(1-p) $ must both be > 5 (or 10). Poisson approximation fails here because it assumes $ \\mathrm{Var}(X) \\approx \\mathrm{E}(X) $, which is not true when $ p $ is moderate (e.g., $ p = 0.5 $).  \n\n+ Example: $ X \\sim \\mathrm{B}(100, 0.48) $ is approximated by $ \\mathrm{N}(48, 6.12^2) $, while Poisson would overstate variance.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "Why is *continuity correction* necessary when approximating a binomial distribution with a normal distribution? (3 steps)", "answer": "- Step 1: **Discrete vs. continuous mismatch**: The binomial distribution is discrete, but the normal distribution is continuous. For example, $ \\mathrm{P}(X = 70) $ in binomial corresponds to $ \\mathrm{P}(69.5 < Y < 70.5) $ in the normal approximation.  \n- Step 2: **Preserving probability intervals**: Without continuity correction, the normal approximation would underestimate or misalign probabilities for discrete points. For example, $ \\mathrm{P}(X \\leq 70) $ becomes $ \\mathrm{P}(Y < 70.5) $.  \n- Step 3: **Accuracy improvement**: Continuity correction aligns the area under the normal curve with the discrete binomial probabilities, reducing approximation error (e.g., Example 5 shows a 0.82% error without correction).", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How does the normal approximation to the Poisson distribution work, and why is it valid for large $ \\lambda $? (4 steps)", "answer": "- Step 1: **Poisson shape as $ \\lambda \\uparrow $**: For large $ \\lambda $, the Poisson distribution becomes bell-shaped and symmetric, resembling a normal distribution.  \n- Step 2: **Matching parameters**: The normal distribution has mean $ \\mu = \\lambda $ and variance $ \\sigma^2 = \\lambda $, preserving the Poisson property $ \\mathrm{E}(X) = \\mathrm{Var}(X) $.  \n- Step 3: **Continuity correction**: Since Poisson is discrete, continuity correction adjusts probabilities (e.g., $ \\mathrm{P}(X \\leq 30) \\approx \\mathrm{P}(Y < 30.5) $).  \n- Step 4: **Practical threshold**: A rule of thumb is $ \\lambda > 10 $ for the normal approximation to be valid.  \n\n+ Example: $ X \\sim \\mathrm{Po}(25) $ is approximated by $ Y \\sim \\mathrm{N}(25, 25) $.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why is the Poisson approximation to the binomial distribution always an overestimate for $ \\mathrm{P}(X = 0) $? (4 steps)", "answer": "- Step 1: **Exact binomial**: $ \\mathrm{P}(X = 0) = (1-p)^n $.  \n- Step 2: **Poisson approximation**: $ \\mathrm{P}(Y = 0) = e^{-\\lambda} $, where $ \\lambda = np $.  \n- Step 3: **Inequality relationship**: The inequality $ (1-p)^n \\leq e^{-np} $ holds for all $ 0 < p < 1 $, because $ \\ln(1-p) \\leq -p $.  \n- Step 4: **Conclusion**: Since $ \\mathrm{P}(Y = 0) = e^{-\\lambda} \\geq \\mathrm{P}(X = 0) $, the Poisson approximation overestimates $ \\mathrm{P}(X = 0) $.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How do you decide whether to approximate a binomial distribution with a Poisson or a normal distribution? (3 steps)", "answer": "- Step 1: **Check $ p $**: If $ p $ is small (e.g., $ p < 0.1 $) and $ n $ is large, use Poisson ($ \\lambda = np \\leq 10 $).  \n- Step 2: **Check symmetry**: If $ p $ is near 0.5 and $ n $ is large, use normal ($ \\mu = np, \\sigma^2 = np(1-p) $).  \n- Step 3: **Use thresholds**: If $ np \\leq 10 $, prefer Poisson; if $ np > 10 $, prefer normal.  \n\n+ Example: For $ X \\sim \\mathrm{B}(150, 0.03) $, $ np = 4.5 $, so use Poisson. For $ X \\sim \\mathrm{B}(100, 0.6) $, $ np = 60 $, so use normal.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why does the normal approximation to the Poisson distribution require a larger $ \\lambda $ than the Poisson approximation to the binomial? (3 steps)", "answer": "- Step 1: **Poisson shape**: The Poisson distribution is skewed for small $ \\lambda $, becoming symmetric as $ \\lambda \\uparrow $.  \n- Step 2: **Normal requirements**: The normal approximation relies on symmetry, requiring $ \\lambda > 10 $.  \n- Step 3: **Poisson approximation for binomial**: The binomial-to-Poisson approximation works for $ np \\leq 10 $, where the binomial is already skewed (matching Poisson’s skewness).  \n\n+ Example: For $ \\lambda = 25 $, the Poisson distribution is nearly normal, but for $ \\lambda = 6 $, it remains skewed.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": true}], "count": 8}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What are the two key conditions required to approximate a binomial distribution B(n,p) using a Poisson distribution? (2 steps)", "answer": "- Step 1: The number of trials n must be large.\n- Step 2: The probability of success p must be small, typically with np ≤ 10.\n\nThe approximation works because when p is small, (1-p) ≈ 1, making the variance np(1-p) ≈ np, which equals the mean. This satisfies the Poisson condition where mean ≈ variance.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "If X ~ B(200, 0.03), what Poisson distribution would you use to approximate it, and why is this approximation appropriate? (2 steps)", "answer": "- Step 1: Calculate λ = np = 200 × 0.03 = 6\n- Step 2: Since n is large (200) and p is small (0.03), with np = 6 ≤ 10, we can use X ≈ Po(6).\n\nThe approximation is valid because n is large and p is small, satisfying the conditions for Poisson approximation. The mean and variance of the binomial are both approximately equal to 6.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Why does the Poisson approximation work better when p is very small rather than when p is close to 0.5? (2 steps)", "answer": "- Step 1: For a Poisson distribution, the mean equals the variance (both equal λ). For binomial B(n,p), the mean is np and the variance is np(1-p).\n- Step 2: When p is small, (1-p) ≈ 1, so the variance np(1-p) ≈ np = mean. This closeness between mean and variance is what makes the Poisson model appropriate. When p is close to 0.5, (1-p) is also close to 0.5, so the variance is significantly smaller than the mean, violating the Poisson assumption.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A factory produces components with fault probability p = 0.007. In a batch of 1000 components, what is the probability of exactly 6 faulty components? Use Poisson approximation. (2 steps)", "answer": "- Step 1: First find λ = np = 1000 × 0.007 = 7. Since n is large and p is small, Po(7) is appropriate.\n- Step 2: P(X=6) = e⁻⁷ × 7⁶ / 6! = 0.1490 (4 d.p.)\n\nThis avoids calculating the binomial coefficient C(1000,6) which would be computationally intensive.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "What is the key condition for using a normal distribution to approximate a binomial distribution, and why is this condition necessary? (2 steps)", "answer": "- Step 1: The binomial distribution B(n,p) can be approximated by N(μ, σ²) when n is large AND p is close to 0.5.\n- Step 2: The normal distribution is symmetric, so it can only approximate symmetric distributions. When p = 0.5, the binomial distribution is symmetric about its mean. The closer p is to 0.5, the more symmetric the distribution becomes, making the normal approximation more accurate.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "If X ~ B(100, 0.53), write down the normal approximation parameters μ and σ. (1 step)", "answer": "- μ = np = 100 × 0.53 = 53\n- σ = √(np(1-p)) = √(100 × 0.53 × 0.47) = √24.91 ≈ 4.99\n\nSo X ≈ N(53, 4.99²)", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Why must we apply a continuity correction when using a normal approximation to a binomial distribution? (2 steps)", "answer": "- Step 1: The binomial distribution is discrete — it takes only integer values. The normal distribution is continuous and can take any real value.\n- Step 2: When estimating P(X = k) for a discrete variable, we need to account for the area under the normal curve between k-0.5 and k+0.5. For P(X ≤ k), we use P(Y < k+0.5). This \"correction\" ensures we capture the correct probability by including half the interval on each side of the discrete value.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "If X ~ B(150, 0.48) is approximated by Y ~ N(72, 6.12²), find P(X ≤ 70) using this approximation with continuity correction. (3 steps)", "answer": "- Step 1: Since we want P(X ≤ 70), apply continuity correction: P(Y < 70.5)\n- Step 2: Standardize: z = (70.5 - 72) / 6.12 = -0.245\n- Step 3: P(Z < -0.245) = 0.4032 (4 d.p.)\n\nThe continuity correction shifts 70 to 70.5 to capture the probability up to the midpoint between 70 and 71.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick"
