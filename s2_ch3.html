sufficiently. The normal works; Poisson tables don't cover this $$\\lambda$$.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "Why is there a distinction between \"large $$n$$\" for normal (usually $$n \\geq 30$$) and \"large $$n$$\" for Poisson (can be much smaller with very small $$p$$)? (3 steps)", "answer": "- Step 1: For normal approximation, we need the binomial to LOOK like a bell curve — enough bins on each side of the mean so the CLT is well-approximated. This typically requires $$n \\geq 30$$ or so.\n- Step 2: For Poisson approximation, \"large $$n$$\" really means \"large enough that $$\\lim_{n\\to\\infty, p\\to 0, np=\\lambda} B(n,p) = Po(\\lambda)$$ is well-approximated.\" With very small $$p$$ (say 0.001), even modest $$n$$ (like 100) gives excellent Poisson approximation.\n- Step 3: The two criteria probe different things: normal needs bell-shape clarity; Poisson needs variance-mean equality, which relaxes with small $$p$$ regardless of $$n$$.\n\nSame phrase \"large $$n$$,\" different operational meanings depending on context.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "For a radioactive source emitting 14 counts per second on average, set up the normal approximation for the probability of between 12 and 16 counts (exclusive of both). (4 steps)", "answer": "- Step 1: Counts follow Poisson: $$X \\sim Po(14)$$. Since $$\\lambda = 14 > 10$$, use normal approximation: $$Y \\sim N(14, 14)$$.\n- Step 2: $$P(12 < X < 16)$$: both endpoints are EXCLUDED. For discrete: $$X$$ values 13, 14, 15 are included.\n- Step 3: CC: shrink both bounds inward. Lower 12 → 12.5. Upper 16 → 15.5. Result: $$P(12.5 < Y < 15.5)$$.\n- Step 4: Standardize: $$z_1 = (12.5 - 14)/\\sqrt{14} \\approx -0.40$$, $$z_2 = (15.5 - 14)/\\sqrt{14} \\approx 0.40$$. Look up $$P(-0.40 < Z < 0.40)$$.\n\nTip: when both endpoints are strict inequalities, shrink both by 0.5; this gives the narrowest interval.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "A company has 15 boat rentals per day on average with only 20 boats available. Why might a normal approximation matter for estimating lost customers? (3 steps)", "answer": "- Step 1: Daily rentals $$\\sim Po(15)$$. Since $$\\lambda = 15 > 10$$, normal approximation applies: $$Y \\sim N(15, 15)$$.\n- Step 2: Lost customers correspond to $$X > 20$$ (demand exceeds supply). This is a tail event. Using normal approximation gives a quick standardized estimate.\n- Step 3: CC: $$P(X > 20) \\approx P(Y > 20.5)$$. Standardize: $$Z = (20.5 - 15)/\\sqrt{15} \\approx 1.42$$. Look up $$P(Z > 1.42)$$ to estimate lost-customer frequency.\n\nPractical power: a capacity-planning question answered in three steps, no heavy Poisson summation needed.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "A student finds that the exact $$P(X = 65)$$ for $$X \\sim B(120, 0.46)$$ differs from the normal approximation by about 1%. What's the likely reason the approximation works so well here? (3 steps)", "answer": "- Step 1: Check conditions: $$n = 120$$ is large ✓. $$p = 0.46$$ is very close to 0.5 ✓. Both normal approximation conditions strongly satisfied.\n- Step 2: At $$p = 0.46$$, the binomial is only slightly skewed (barely detectable), and the bell shape is well-formed.\n- Step 3: $$P(X = 65)$$ is near the mean $$\\mu = 55.2$$ (within about 2 standard deviations, $$\\sigma \\approx 5.46$$). Approximations are most accurate near the mean, where the normal density matches the binomial PMF closely.\n\nGeneral lesson: \"textbook case\" conditions (large $$n$$, $$p \\approx 0.5$$, not extreme tail) produce excellent accuracy.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": false}], "count": 65}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Why do we bother using distribution approximations (Poisson for binomial, or normal for either) in S2 when exact formulas for binomial and Poisson probabilities exist?", "answer": "- Step 1: Exact binomial calculations use $$\\binom{n}{k}p^k(1-p)^{n-k}$$. When $$n$$ is large (say 200+), computing $$\\binom{200}{k}$$ and raising probabilities to high powers is tedious, error-prone, and slow by hand.\n- Step 2: The cumulative binomial tables in the S2 formula booklet only go up to $$n = 50$$, so for larger values (or non-tabulated $$p$$), look-up fails.\n- Step 3: Approximations replace hard combinatorics with either (a) a Poisson with one parameter $$\\lambda$$, easily looked up, or (b) a standardised normal, giving access to the universal $$Z$$ tables.\n- Step 4: They are fast, give probabilities to reasonable accuracy, and were historically the only way to handle large-sample problems before calculators — they remain pedagogically and theoretically important.\n\nApproximations trade a tiny amount of accuracy for huge computational simplicity, and are the gateway to large-sample statistics.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "There are three distribution approximations in S2. Describe all three, including the direction of approximation and the distribution being approximated by. (3 steps)", "answer": "- Step 1: **Binomial → Poisson**: $$X \\sim B(n, p)$$ approximated by $$Po(np)$$, valid when $$n$$ is large and $$p$$ is small. No continuity correction (both discrete).\n- Step 2: **Binomial → Normal**: $$X \\sim B(n, p)$$ approximated by $$N(np, np(1-p))$$, valid when $$n$$ is large and $$p$$ is close to 0.5. Requires continuity correction.\n- Step 3: **Poisson → Normal**: $$X \\sim Po(\\lambda)$$ approximated by $$N(\\lambda, \\lambda)$$, valid when $$\\lambda$$ is large (typically $$\\lambda > 10$$). Requires continuity correction.\n\nCommon thread: in every case, we match the mean and variance of the original distribution to the approximating one.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "Under what conditions can a binomial distribution $$X \\sim B(n, p)$$ be approximated by a Poisson distribution, and what is the parameter used? (3 steps)", "answer": "- Step 1: Two conditions: $$n$$ must be large AND $$p$$ must be small. A working rule is $$np \\leq 10$$ (so the mean is small enough to match Poisson's \"rare events\" profile).\n- Step 2: The Poisson parameter is $$\\lambda = np$$, matching the binomial mean $$E(X) = np$$.\n- Step 3: The approximation gets better as $$n$$ increases and $$p$$ decreases while keeping $$np$$ fixed — this is the limiting behaviour that defines the Poisson as the \"rare events in many trials\" distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why specifically does the Poisson approximation to the binomial require $$p$$ to be small? What conceptual feature of the Poisson distribution drives this? (4 steps)", "answer": "- Step 1: A Poisson distribution has a defining property: $$E(X) = Var(X) = \\lambda$$. Any distribution we approximate with a Poisson should share this mean-equals-variance feature.\n- Step 2: For a binomial, $$E(X) = np$$ and $$Var(X) = np(1-p)$$. These are equal only if $$(1-p) = 1$$, requiring $$p = 0$$ — impossible in practice.\n- Step 3: If $$p$$ is small (say $$p = 0.01$$), then $$1 - p \\approx 0.99 \\approx 1$$, so $$Var(X) = np(1-p) \\approx np = E(X)$$. The binomial mean and variance become nearly equal — matching Poisson's profile.\n- Step 4: Conceptually: the Poisson models rare events in many independent trials. \"Rare\" = small $$p$$; \"many\" = large $$n$$. Small $$p$$ is essential because Poisson counts occurrences per unit time/trials, and the rarity is built into the model.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "If $$p$$ is already small, why do we also need $$n$$ to be large for the Poisson approximation to the binomial to work well? (3 steps)", "answer": "- Step 1: With small $$p$$ and small $$n$$, we just have a tiny binomial — there's nothing to approximate; you can compute directly from the formula.\n- Step 2: The Poisson approximation is derived as a limit: as $$n \\to \\infty$$ and $$p \\to 0$$ while keeping $$np = \\lambda$$ fixed, binomial probabilities $$\\binom{n}{k}p^k(1-p)^{n-k}$$ converge to Poisson $$\\frac{e^{-\\lambda}\\lambda^k}{k!}$$. Large $$n$$ is needed to be \"close to\" that limit.\n- Step 3: Intuitively: Poisson assumes infinitely many chances with tiny individual probability. The larger $$n$$ is, the more the binomial looks like \"continuous opportunity\" with events at rate $$\\lambda$$ — which is the Poisson setup.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "Suppose $$Y \\sim B(200, 0.98)$$. Can you apply a Poisson approximation directly to $$Y$$? If not, how might you still use one? (4 steps)", "answer": "- Step 1: No — directly, $$p = 0.98$$ is close to 1, not small. Also $$np = 196$$ is far from the $$np \\leq 10$$ rule, and $$Var(Y) = 200 \\times 0.98 \\times 0.02 = 3.92$$, nowhere near the mean 196. Poisson conditions fail badly.\n- Step 2: Trick: look at the *complement*. Define $$X = 200 - Y$$, the count of failures. Then $$X \\sim B(200, 0.02)$$, where $$p = 0.02$$ is small.\n- Step 3: Now $$X$$ satisfies all conditions ($$p = 0.02$$ small, $$np = 4$$ small). So $$X \\approx Po(4)$$.\n- Step 4: Translate questions: $$P(Y = 197) = P(X = 3)$$, $$P(Y \\geq 198) = P(X \\leq 2)$$, etc. We're counting the *rare* thing (failures) instead of the common thing.\n\nRule: when $$p$$ is close to 1, reframe in terms of the rare event (the complement) so Poisson applies.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "When approximating a binomial by a Poisson, do you need to apply a continuity correction? Explain. (3 steps)", "answer": "- Step 1: No. Both the binomial and the Poisson are *discrete* distributions — they assign probability to integer outcomes like $$0, 1, 2, \\dots$$\n- Step 2: Continuity correction is only needed when bridging a *discrete* variable to a *continuous* one (like a normal). There's no discrete-to-continuous gap here.\n- Step 3: So to estimate $$P(X \\leq 3)$$ using the Poisson, you literally compute $$P(X \\leq 3)$$ with the Poisson — no half-unit shift, no adjustment.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Build the intuition: why does a binomial distribution converge to a Poisson distribution in the limit $$n \\to \\infty$$, $$p \\to 0$$, with $$np = \\lambda$$ fixed? (4 steps)", "answer": "- Step 1: Consider a time interval split into $$n$$ tiny sub-intervals, each with probability $$p = \\lambda/n$$ of containing an event. That's a Bernoulli trial per sub-slice — the count is binomial.\n- Step 2: As $$n$$ grows, each sub-interval shrinks and $$p = \\lambda/n$$ shrinks, but the total expected count $$np = \\lambda$$ stays fixed. Events become \"continuous-time\" random arrivals at rate $$\\lambda$$.\n- Step 3: Algebraically: $$\\binom{n}{k}\\left(\\frac{\\lambda}{n}\\right)^k\\left(1 - \\frac{\\lambda}{n}\\right)^{n-k} \\to \\frac{e^{-\\lambda}\\lambda^k}{k!}$$ as $$n \\to \\infty$$.\n+ The factor $$\\binom{n}{k}/n^k \\to 1/k!$$\n+ The factor $$(1 - \\lambda/n)^n \\to e^{-\\lambda}$$ (standard limit)\n+ The factor $$\\lambda^k$$ is unchanged\n- Step 4: So Poisson is the \"continuous-time limit\" of binomial with rare events — a rigorous mathematical fact, not a coincidence.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "A batch of 1000 components independently has each faulty with probability 0.007. Without doing the full calculation, describe how you would estimate the probability of more than 7 faulty components. (4 steps)", "answer": "- Step 1: Let $$X$$ = number of faulty components, so $$X \\sim B(1000, 0.007)$$. Exact computation is possible but involves huge combinatorials, and tables don't reach $$n = 1000$$.\n- Step 2: Check Poisson conditions: $$n = 1000$$ is large, $$p = 0.007$$ is small, and $$np = 7 \\leq 10$$. All satisfied.\n- Step 3: Approximate $$X \\approx Po(7)$$.\n- Step 4: Compute $$P(X > 7) = 1 - P(X \\leq 7)$$ from standard Poisson tables for $$\\lambda = 7$$. No continuity correction needed. Conceptually, since the mean is 7 and we want strictly greater than 7, it's roughly a right-tail probability — approximately 0.4 (a typical answer without memorising the table).", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "If $$X \\sim B(n, p)$$ is approximated by $$Po(np)$$, is the Poisson estimate of $$P(X = 0)$$ an overestimate or underestimate? Justify using the Taylor expansion. (5 steps)", "answer": "- Step 1: Exact: $$P(X = 0) = (1-p)^n$$ (binomial with $$k = 0$$).\n- Step 2: Poisson approximation: $$P(X = 0) \\approx e^{-np}$$ (Poisson with $$k = 0$$).\n- Step 3: Compare via logs: $$\\ln(1-p)^n = n\\ln(1-p)$$, and the Taylor series gives $$\\ln(1-p) = -p - \\tfrac{p^2}{2} - \\tfrac{p^3}{3} - \\dots < -p$$ for $$0 < p < 1$$.\n- Step 4: Therefore $$n\\ln(1-p) < -np$$, which means $$(1-p)^n < e^{-np}$$.\n- Step 5: Conclusion: the Poisson estimate $$e^{-np}$$ is *larger* than the true binomial probability $$(1-p)^n$$. So the Poisson approximation systematically **overestimates** $$P(X = 0)$$.\n\nTakeaway: the approximation has a small, consistent bias near $$k = 0$$ that vanishes as $$p \\to 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Under what conditions can a binomial distribution $$X \\sim B(n, p)$$ be approximated by a normal distribution, and what are the parameters of the normal? (4 steps)", "answer": "- Step 1: Two conditions: $$n$$ must be large, AND $$p$$ must be close to 0.5.\n- Step 2: Parameters: $$\\mu = np$$ (the binomial mean) and $$\\sigma = \\sqrt{np(1-p)}$$ (the binomial standard deviation), so $$\\sigma^2 = np(1-p)$$.\n- Step 3: We match both moments — this is the universal strategy when approximating one distribution with another: ensure mean (location) and variance (spread) align.\n- Step 4: So $$X \\approx Y \\sim N\\left(np,\\, np(1-p)\\right)$$. And because the binomial is discrete while the normal is continuous, probabilities must be computed with a **continuity correction**.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Why does the normal approximation to a binomial require $$p$$ to be close to 0.5? What geometric property of the normal distribution is at stake? (4 steps)", "answer": "- Step 1: The normal distribution is *symmetric* about its mean. A good approximation requires the binomial to also look (approximately) symmetric.\n- Step 2: A binomial $$B(n, p)$$ has probabilities $$\\binom{n}{k}p^k(1-p)^{n-k}$$, which are symmetric about $$n/2$$ only when $$p = 0.5$$. For $$p$$ far from 0.5, the distribution is *skewed* (e.g. $$p = 0.1$$ gives right-skew; $$p = 0.9$$ gives left-skew).\n- Step 3: If $$p$$ is close to 0.5, the binomial is nearly symmetric, so a symmetric bell curve fits well. When $$p$$ is extreme, fitting a symmetric normal misses the skew, producing large errors.\n- Step 4: Large $$n$$ also helps (CLT kicks in), but the approximation kicks in earliest and most reliably near $$p = 0.5$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Why does a binomial distribution with large $$n$$ look increasingly like a normal, regardless of $$p$$? What theoretical result underlies this? (4 steps)", "answer": "- Step 1: A binomial $$B(n, p)$$ is the sum of $$n$$ independent Bernoulli trials $$X_1 + X_2 + \\dots + X_n$$, each with outcomes in $$\\{0, 1\\}$$.\n- Step 2: The **Central Limit Theorem (CLT)** states: the sum of many independent, identically distributed random variables (with finite variance) tends toward a normal distribution, properly shifted and scaled.\n- Step 3: So as $$n$$ grows, the shape of $$B(n, p)$$ approaches normal. The *speed* of convergence depends on $$p$$: fastest at $$p = 0.5$$ (symmetry already matches), slower as $$p$$ moves toward 0 or 1 (more skew to overcome).\n- Step 4: In practice: for any fixed $$p$$ (except 0 or 1), there exists $$n$$ large enough for the normal to be a good fit. In S2, the simplified rule is \"$$n$$ large and $$p$$ close to 0.5.\"", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "Derive the variance formula $$Var(X) = np(1-p)$$ for $$X \\sim B(n, p)$$, and explain why the factor $$(1-p)$$ appears. (4 steps)", "answer": "- Step 1: Write $$X$$ as a sum: $$X = X_1 + X_2 + \\dots + X_n$$, where each $$X_i$$ is an independent Bernoulli trial with $$X_i \\in \\{0, 1\\}$$ and $$P(X_i = 1) = p$$.\n- Step 2: For one trial: $$E(X_i) = p$$ and $$E(X_i^2) = p$$ (since $$X_i^2 = X_i$$ for a 0/1 variable). So $$Var(X_i) = E(X_i^2) - E(X_i)^2 = p - p^2 = p(1-p)$$.\n- Step 3: Since the trials are independent, variances add: $$Var(X) = Var(X_1) + \\dots + Var(X_n) = n \\cdot p(1-p)$$.\n- Step 4: So $$Var(X) = np(1-p)$$. The factor $$(1-p)$$ is the \"shrinkage\" as $$p$$ approaches 0 or 1 — at extreme $$p$$, outcomes become more predictable (always 0 or always 1), so variance drops. Maximum variance is at $$p = 0.5$$.\n\nThis is exactly why Poisson approximation (which needs variance ≈ mean) requires $$p$$ small: only then does $$1 - p \\approx 1$$ kill the shrinkage factor.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "What is a continuity correction, and why is it needed when approximating a discrete distribution by a normal distribution? (4 steps)", "answer": "- Step 1: A continuity correction is a half-unit ($$\\pm 0.5$$) shift applied to the boundaries of an inequality when replacing a discrete variable (binomial, Poisson) with a continuous one (normal).\n- Step 2: Why needed: a discrete distribution assigns nonzero probability to integer values, e.g. $$P(X = 5) > 0$$. A continuous distribution has $$P(Y = 5) = 0$$ for any single point. Without correction, single-value probabilities vanish.\n- Step 3: Visual intuition: in a probability histogram, integer $$k$$ has a unit-wide bar from $$k - 0.5$$ to $$k + 0.5$$, with area equal to $$P(X = k)$$. When we overlay a smooth normal curve, the area under the curve from $$k - 0.5$$ to $$k + 0.5$$ approximates that bar's area.\n- Step 4: Without correction, you systematically under- or over-count probability mass at the boundaries — sometimes by a small amount, sometimes (for narrow events) by a lot.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "In the histogram of a discrete distribution, the bar at integer $$k$$ occupies the interval from $$k - 0.5$$ to $$k + 0.5$$ on the axis. How does this justify the continuity correction geometrically? (4 steps)", "answer": "- Step 1: Each bar has width 1 and height equal to the probability at that integer, so its *area* equals $$P(X = k)$$.\n- Step 2: When we overlay a smooth normal curve matched to the histogram's mean and variance, the curve traces the envelope of the bars.\n- Step 3: To approximate a discrete probability with the continuous normal, we integrate the curve over the region covering the relevant bars — their combined horizontal footprint.\n- Step 4: Example: event \"$$X \\leq 5$$\" includes integer bars for $$0, 1, 2, 3, 4, 5$$. Their combined region is $$(-\\infty, 5.5]$$, not $$(-\\infty, 5]$$. Hence the corrected expression $$P(Y < 5.5)$$.\n\nContinuity correction is really just \"compute the right area, matching the histogram's boundaries.\"", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "State the continuity-corrected version of each discrete probability, where $$Y$$ is the continuous approximator: $$P(X \\leq k)$$, $$P(X < k)$$, $$P(X \\geq k)$$, $$P(X > k)$$, $$P(X = k)$$, $$P(a \\leq X \\leq b)$$. (4 steps)", "answer": "- Step 1: The rule: \"grow the region by 0.5 on each side so that included integers stay inside, and excluded integers stay outside.\"\n- Step 2: Single-sided with upper bound:\n+ $$P(X \\leq k) \\approx P(Y < k + 0.5)$$ — integer $$k$$ is included, extend right past $$k$$.\n+ $$P(X < k) \\approx P(Y < k - 0.5)$$ — integer $$k$$ is excluded, stop short of $$k$$.\n- Step 3: Single-sided with lower bound:\n+ $$P(X \\geq k) \\approx P(Y > k - 0.5)$$ — $$k$$ included, extend left.\n+ $$P(X > k) \\approx P(Y > k + 0.5)$$ — $$k$$ excluded, stop short.\n- Step 4: Single value and interval:\n+ $$P(X = k) \\approx P(k - 0.5 < Y < k + 0.5)$$ — a unit-wide window centred at $$k$$.\n+ $$P(a \\leq X \\leq b) \\approx P(a - 0.5 < Y < b + 0.5)$$ — push each boundary outward by 0.5.\n\nMnemonic: \"integer included → boundary moves out; integer excluded → boundary moves in.\"", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "What is the continuity-corrected form of $$P(X < 50)$$ versus $$P(X \\leq 50)$$, when $$X$$ is discrete? Why is the difference exactly one unit wide? (3 steps)", "answer": "- Step 1: $$P(X < 50)$$ *excludes* 50 (the largest included integer is 49). So stop short of 50: $$P(Y < 49.5)$$.\n- Step 2: $$P(X \\leq 50)$$ *includes* 50 (the largest included integer is 50). So extend past 50: $$P(Y < 50.5)$$.\n- Step 3: The two corrected regions differ by the window $$(49.5, 50.5)$$, which under the normal approximates $$P(X = 50)$$ — exactly the single bar that differs between the two events.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Why is it that approximating $$P(X = k)$$ with a normal gives zero *unless* you apply a continuity correction? (4 steps)", "answer": "- Step 1: A continuous random variable has $$P(Y = k) = 0$$ for any single point — the integral of a density over a single point has zero width and thus zero area.\n- Step 2: But in the discrete world, $$P(X = k)$$ can be substantial (e.g. $$P(X = 53) \\approx 0.08$$ for a peaked binomial).\n- Step 3: The fix: interpret the discrete probability as the histogram bar centred at $$k$$, spanning $$(k - 0.5, k + 0.5)$$. Then $$P(X = k) \\approx P(k - 0.5 < Y < k + 0.5)$$ — integrating the normal density over a unit-wide window.\n- Step 4: This area is well-defined, nonzero, and matches the histogram bar's area to good accuracy.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "If you forget to apply a continuity correction when using a normal approximation, what kind of error do you typically introduce, and when is it worst? (4 steps)", "answer": "- Step 1: Without correction, you under- or over-count by up to half a histogram bar at each boundary. For $$P(X = k)$$, you get zero — a complete loss.\n- Step 2: The error is *worst* when the probability event is narrow:\n+ Single-value: error catastrophic (true probability vs. zero).\n+ Narrow interval (e.g. 2–3 integers): each half-unit is a meaningful fraction of the window.\n- Step 3: The error is *smallest* for wide events like $$P(20 \\leq X \\leq 80)$$ — the missing 0.5 at each end is negligible against the wide span.\n- Step 4: Rule: always apply continuity correction. The cost is trivial; the benefit is sometimes large.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "For which kind of probabilities does the continuity correction make the biggest difference? (4 steps)", "answer": "- Step 1: **Single-value probabilities** $$P(X = k)$$: without correction, the normal gives 0; with correction, $$P(k - 0.5 < Y < k + 0.5)$$ gives a sensible answer. Error is 100% without correction.\n- Step 2: **Narrow intervals** (few integers wide): the $$\\pm 0.5$$ on each side is a meaningful fraction of the event width.\n- Step 3: **Extreme-tail probabilities**: even small shifts in the boundary can change the standardised $$Z$$ noticeably, since the normal density drops off fast in the tails.\n- Step 4: **Wide intervals** (many integers): the 0.5 shifts are negligible relative to the span, so correction barely matters.\n\nPractical rule: always apply the correction — it's cheap insurance.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "A binomial $$X \\sim B(100, 0.6)$$ is approximated by $$Y \\sim N(60, 24)$$. Describe how you would compute $$P(X > 58)$$, including all standardisation steps. (4 steps)", "answer": "- Step 1: Event: $$P(X > 58)$$. Integer 58 is *excluded*, so continuity correction pulls inward: $$P(Y > 58.5)$$.\n- Step 2: Compute $$\\sigma = \\sqrt{24} \\approx 4.90$$.\n- Step 3: Standardise using $$Z = \\frac{Y - \\mu}{\\sigma}$$: $$P\\left(Z > \\frac{58.5 - 60}{4.90}\\right) = P(Z > -0.306)$$.\n- Step 4: Use symmetry: $$P(Z > -0.306) = P(Z < 0.306) = \\Phi(0.306) \\approx 0.62$$. So the probability is about 62%, which makes sense — 58 is just below the mean 60, so \"more than 58\" is slightly more than half.\n\nThe result is intuitive: the event crosses the mean, so probability ≈ 0.5, bumped up because the threshold is below the mean.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "For a particular flower bulb, 55% produce yellow flowers. In a sample of 80 bulbs, describe how a normal approximation estimates the probability of exactly 50 yellow flowers, and why a direct binomial calculation would typically be preferred for accuracy. (4 steps)", "answer": "- Step 1: Let $$X \\sim B(80, 0.55)$$. Normal approximation: $$\\mu = 44$$, $$\\sigma^2 = 80(0.55)(0.45) = 19.8$$, so $$\\sigma \\approx 4.45$$. Thus $$Y \\sim N(44, 19.8)$$.\n- Step 2: Use continuity correction for a single value: $$P(X = 50) \\approx P(49.5 < Y < 50.5)$$.\n- Step 3: Standardise each end, compute $$\\Phi$$-values, subtract to get the area of the small window (the result is approximately 0.036).\n- Step 4: The exact binomial gives approximately 0.037 — a difference of only about 0.001. Percentage error is around 1%, which is typical for a well-behaved normal approximation on a single-value event.\n\nBecause the approximation is very close, the normal method is accepted; but for a single point, any error is a meaningful fraction, so exam questions often use this to probe percentage error.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "When calculating a percentage error for a normal approximation to a binomial probability, why does the exact value go in the denominator? (3 steps)", "answer": "- Step 1: Percentage error measures how far off the approximation is *relative to the truth*: $$\\%\\,\\text{error} = \\left|\\frac{\\text{true} - \\text{approx}}{\\text{true}}\\right| \\times 100\\%$$.\n- Step 2: Placing the true value in the denominator normalises: an absolute error of 0.001 on a true probability of 0.5 is tiny (0.2%), but on a true probability of 0.002 it's enormous (50%). Without normalising, we can't compare approximation quality across problems.\n- Step 3: Interpretation: a few percent error suggests the approximation is reliable; double-digit percentages warn that conditions (e.g. $$p$$ near 0.5, $$n$$ large) may be stretched — common in single-point or tail probabilities.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "Under what condition can a Poisson distribution $$X \\sim Po(\\lambda)$$ be approximated by a normal distribution, and what are the parameters of the normal? (4 steps)", "answer": "- Step 1: Condition: $$\\lambda$$ must be large. In S2, the working threshold is $$\\lambda > 10$$.\n- Step 2: Parameters: $$Y \\sim N(\\lambda, \\lambda)$$. The normal has mean $$\\lambda$$ and variance $$\\lambda$$ — matching Poisson's property $$E(X) = Var(X) = \\lambda$$.\n- Step 3: So $$\\mu = \\lambda$$ and $$\\sigma = \\sqrt{\\lambda}$$.\n- Step 4: Continuity correction is required, because Poisson is discrete and normal is continuous.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Why is the normal approximation to a Poisson valid only when $$\\lambda$$ is large? Describe how the shape of the Poisson changes as $$\\lambda$$ grows. (4 steps)", "answer": "- Step 1: When $$\\lambda$$ is small (e.g. $$\\lambda = 1$$), the Poisson is heavily right-skewed — probability piles up near 0 with a long right tail. A symmetric normal bell cannot fit.\n- Step 2: As $$\\lambda$$ grows, the Poisson's peak moves right and the distribution becomes increasingly symmetric and bell-shaped. By $$\\lambda = 10$$ or so, it's visually almost normal.\n- Step 3: Why? Conceptually, $$Po(\\lambda)$$ can be written as the sum $$Po(\\lambda/m) + Po(\\lambda/m) + \\dots$$ ($$m$$ independent copies, by the additive property of Poissons). By the **Central Limit Theorem**, sums of many independent variables tend toward a normal.\n- Step 4: So \"$$\\lambda$$ large\" is a CLT-style condition: a Poisson with large rate is effectively a sum of many small-rate events, and sums tend to normal.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "For $$X \\sim Po(3)$$, a student uses a normal approximation $$Y \\sim N(3, 3)$$. Why will this give poor results? (4 steps)", "answer": "- Step 1: $$\\lambda = 3$$ is small — the Poisson is heavily right-skewed here. $$P(X = 0) = e^{-3} \\approx 0.050$$, a noticeable mass at zero.\n- Step 2: The normal with mean 3 and $$\\sigma = \\sqrt{3} \\approx 1.73$$ puts significant probability below zero: $$P(Y < 0) = P(Z < -\\sqrt{3}) \\approx 0.042$$. But $$X$$ can never be negative! The approximation leaks probability into an impossible region.\n- Step 3: The normal also misestimates the tail shape — Poisson has a heavier right tail and a lighter left tail for small $$\\lambda$$.\n- Step 4: Conclusion: at $$\\lambda = 3$$, direct Poisson computation is both feasible and correct. The normal would misstate tail probabilities by large relative amounts.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "For $$X \\sim Po(25)$$, conceptually walk through how a normal approximation estimates $$P(X > 30)$$. (5 steps)", "answer": "- Step 1: $$\\lambda = 25 > 10$$, so normal approximation is valid. Parameters: $$\\mu = 25$$, $$\\sigma = \\sqrt{25} = 5$$, so $$Y \\sim N(25, 25)$$.\n- Step 2: Event: $$P(X > 30)$$. Integer 30 is excluded. Continuity correction: $$P(Y > 30.5)$$.\n- Step 3: Standardise: $$P\\left(Z > \\frac{30.5 - 25}{5}\\right) = P(Z > 1.1)$$.\n- Step 4: Use tables: $$P(Z > 1.1) = 1 - \\Phi(1.1) \\approx 1 - 0.8643 = 0.1357$$. So about 14%.\n- Step 5: Sanity check: 30 is slightly above the mean 25 (about 1.1 standard deviations), so an upper-tail probability around 13–14% is expected — consistent.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Given $$X \\sim B(n, p)$$ with large $$n$$, state the decision rule for choosing between a Poisson and a normal approximation. (4 steps)", "answer": "- Step 1: Compute the mean $$np$$. This single number usually drives the decision.\n- Step 2: Branch based on $$np$$:\n+ If $$np \\leq 10$$: $$p$$ is relatively small, so use a **Poisson approximation** $$X \\approx Po(np)$$. Poisson tables cover $$\\lambda$$ up to 10.\n+ If $$np > 10$$ and $$p$$ is reasonably close to 0.5: use a **normal approximation** $$X \\approx N(np, np(1-p))$$ with continuity correction.\n- Step 3: Edge case — $$p$$ close to 1: reframe in terms of failures ($$n - X$$) so the rare event has small probability, then apply Poisson.\n- Step 4: If neither applies cleanly (small $$n$$), just compute the binomial directly.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "If a binomial distribution satisfies conditions for both Poisson and normal approximations, which should you use and why is chaining (binomial → Poisson → normal) a bad idea? (4 steps)", "answer": "- Step 1: If both are valid, always use a single direct approximation — in this case, usually the binomial → normal.\n- Step 2: Chaining introduces two layers of approximation error. Each step distorts the distribution slightly; combining them compounds the error rather than cancels it.\n- Step 3: The binomial → normal path is backed by the CLT (strong theoretical grounding) and uses two steps (match mean, match variance) — no intermediate approximation.\n- Step 4: General rule: choose the shortest valid approximation path. Fewer approximations = more accurate result.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "A student argues that for $$X \\sim B(300, 0.85)$$, since $$n$$ is large, a normal approximation works. By the S2 criteria, critique this argument. (4 steps)", "answer": "- Step 1: The S2 rule says: normal approximation needs $$n$$ large AND $$p$$ close to 0.5. Here $$p = 0.85$$ is not close to 0.5, so the textbook rule is violated.\n- Step 2: Intuition: at $$p = 0.85$$, the binomial is left-skewed (mass near 300, long left tail). A symmetric normal would misfit that skew.\n- Step 3: Try the complement: $$Y = 300 - X \\sim B(300, 0.15)$$. But $$np = 45 > 10$$ — too large for Poisson either. So Poisson doesn't help.\n- Step 4: In S2, when neither approximation fits cleanly, either compute directly or use software/calculator. The student's argument — \"large $$n$$ is enough\" — ignores the second condition on $$p$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "A spinner lands on red 10% of the time. Describe the approximations you'd use for: (i) fewer than 4 reds in 60 spins, (ii) more than 20 reds in 150 spins. (4 steps)", "answer": "- Step 1: Both are binomials with $$p = 0.1$$ (small, not close to 0.5). Scenario (i): $$X_1 \\sim B(60, 0.1)$$. Scenario (ii): $$X_2 \\sim B(150, 0.1)$$.\n- Step 2: For (i): $$np = 6 \\leq 10$$, so **Poisson approximation**: $$X_1 \\approx Po(6)$$. Compute $$P(X_1 < 4) = P(X_1 \\leq 3)$$ from Poisson tables. No continuity correction.\n- Step 3: For (ii): $$np = 15 > 10$$, so Poisson tables may be inadequate; also the Poisson at $$\\lambda = 15$$ is getting bell-shaped, so a **normal approximation** is better: $$X_2 \\approx N(15, 13.5)$$. Apply continuity correction.\n- Step 4: Lesson: same $$p$$, but different $$n$$ changes the scale $$np$$ — and hence the right approximation. Small $$np$$ → Poisson; large $$np$$ → normal.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "A shop owner knows 40% of customers buy a newspaper and 4% spend over $10. Out of 100 customers, describe which approximation to use for: (a) $$P(\\text{at least half buy a newspaper})$$, (b) $$P(\\text{more than 5 spend over \\$10})$$. (4 steps)", "answer": "- Step 1: (a) Newspaper: $$X \\sim B(100, 0.4)$$, $$np = 40$$. $$p$$ is close to 0.5, $$n$$ is large. **Normal approximation**: $$X \\approx N(40, 24)$$. Continuity correction required.\n- Step 2: (b) Spend over $10: $$Y \\sim B(100, 0.04)$$, $$np = 4$$. $$p$$ is small. **Poisson approximation**: $$Y \\approx Po(4)$$. No continuity correction.\n- Step 3: Both involve the same sample size (100), but the character of the event — common vs. rare — drives the approximation choice.\n- Step 4: Lesson: the approximation depends on $$p$$ (and hence on the mean $$np$$), not just on $$n$$. Same sample size, two different approximations.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "State the universal principle behind all three distribution approximations in this chapter. Why does matching two moments suffice? (4 steps)", "answer": "- Step 1: The principle: when approximating one distribution by another, match the first two moments — **mean** (location) and **variance** (spread).\n- Step 2: Worked instances:\n+ Binomial → Poisson: $$E_B = np$$ matches $$\\lambda_P = np$$; $$Var_B = np(1-p) \\approx np = Var_P$$ when $$p$$ is small.\n+ Binomial → Normal: $$\\mu_N = E_B = np$$; $$\\sigma^2_N = Var_B = np(1-p)$$.\n+ Poisson → Normal: $$\\mu_N = E_P = \\lambda$$; $$\\sigma^2_N = Var_P = \\lambda$$.\n- Step 3: Why two moments suffice to first order: a probability distribution is broadly characterised by where it sits (mean) and how wide it spreads (variance). Matching these ensures the bulk of the distribution lines up correctly.\n- Step 4: Higher moments (skew, kurtosis) account for residual mismatch — that's why extra conditions (like \"$$p$$ close to 0.5\" or \"$$\\lambda$$ large\") are needed: they ensure the shape beyond the second moment is also similar.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "Walk through the generic sequence of steps for computing a binomial probability via a normal approximation. (7 steps)", "answer": "- Step 1: Confirm the question allows/requires approximation (either stated, or check conditions are satisfied).\n- Step 2: Define $$X \\sim B(n, p)$$; compute $$\\mu = np$$ and $$\\sigma = \\sqrt{np(1-p)}$$.\n- Step 3: State the approximation: $$Y \\sim N(\\mu, \\sigma^2)$$.\n- Step 4: Restate the desired event in terms of $$X$$, e.g. $$P(X \\leq k)$$, $$P(X = k)$$, or $$P(a \\leq X \\leq b)$$.\n- Step 5: Apply the continuity correction to get a region on $$Y$$: e.g. $$P(Y < k + 0.5)$$.\n- Step 6: Standardise using $$Z = \\frac{Y - \\mu}{\\sigma}$$, converting to a statement about $$P(Z < \\text{value})$$.\n- Step 7: Look up the probability in the standard normal tables (or compute) and interpret the answer back in context.\n\nThis template is universal — just swap $$\\mu, \\sigma$$ values for the Poisson → normal case.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Imagine plotting $$B(n, 0.5)$$ for $$n = 5, 20, 100$$. How does the shape change, and what does this tell us about the normal approximation? (4 steps)", "answer": "- Step 1: $$B(5, 0.5)$$: 6 discrete points (0 through 5), symmetric but blocky — clearly not smooth; normal approximation crude.\n- Step 2: $$B(20, 0.5)$$: 21 points, symmetric, with a recognisable bell shape emerging; envelope is fairly smooth.\n- Step 3: $$B(100, 0.5)$$: 101 points, almost indistinguishable from a smooth bell curve.\n- Step 4: Lesson: as $$n$$ grows, bars become finer and the outline approaches a perfect bell. The normal approximation works well already by $$n = 20$$ for $$p = 0.5$$. For $$p$$ far from 0.5, larger $$n$$ is needed (CLT convergence is slower when the underlying Bernoulli is skewed).", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Sketch mentally the histogram of $$B(20, 0.1)$$ vs. $$B(20, 0.5)$$ vs. $$B(20, 0.9)$$. Which can be approximated by a normal? Which by a Poisson (possibly after reframing)? (4 steps)", "answer": "- Step 1: $$B(20, 0.1)$$: $$np = 2$$; probability piled near 0, long right tail — heavily right-skewed. **Poisson** is appropriate ($$Po(2)$$). Normal is not (symmetry violated).\n- Step 2: $$B(20, 0.5)$$: $$np = 10$$; symmetric bell centred at 10. **Normal** approximation could work, though $$n = 20$$ is on the small side. Poisson is not appropriate ($$p$$ is not small).\n- Step 3: $$B(20, 0.9)$$: $$np = 18$$; probability piled near 20, long left tail — left-skewed. Reframe as failures: $$Y = 20 - X \\sim B(20, 0.1)$$. Now apply **Poisson** $$Po(2)$$.\n- Step 4: Shape summary: $$p$$ near 0 → right-skew; $$p$$ near 1 → left-skew; $$p \\approx 0.5$$ → symmetric. Symmetry → normal; rare-event character → Poisson (possibly after complementing).", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Is it always better to use a more sophisticated approximation (e.g. normal) over a simpler one (e.g. Poisson)? (4 steps)", "answer": "- Step 1: No — the best approximation is the one whose *conditions are satisfied*. Using a normal approximation where $$p$$ is far from 0.5 is usually less accurate than using a Poisson for rare events.\n- Step 2: Example: $$X \\sim B(200, 0.03)$$ has $$np = 6$$. Normal gives $$N(6, 5.82)$$ — symmetric, but the true distribution is right-skewed. Poisson $$Po(6)$$ captures the skew faithfully.\n- Step 3: Match the *shape* of the original: rare events → Poisson; near-symmetric bell → normal.\n- Step 4: The guideline $$np \\leq 10$$ (Poisson) vs. $$np > 10$$ (normal) exists precisely because the binomial's shape transitions from skewed to symmetric around that threshold.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "A factory produces nails in packets of 200 with 2.5% faulty rate. A carpenter buys 6 packets. Describe the layered approach to estimate the probability more than half the packets contain more than 6 faulty nails. (5 steps)", "answer": "- Step 1: **Inner problem**: probability one packet has > 6 faulty nails. Let $$X$$ = faulty per packet, $$X \\sim B(200, 0.025)$$. $$np = 5 \\leq 10$$, so approximate $$X \\approx Po(5)$$. Compute $$p^* = P(X > 6)$$ from Poisson tables.\n- Step 2: **Outer problem**: out of 6 packets, count those with > 6 faulty nails. Let $$Y$$ = number of \"bad\" packets, $$Y \\sim B(6, p^*)$$.\n- Step 3: \"More than half\" means $$Y > 3$$, i.e. $$Y \\geq 4$$.\n- Step 4: Compute $$P(Y \\geq 4)$$ directly from the binomial formula (since $$n = 6$$ is small, no approximation needed). You'd evaluate $$P(Y = 4) + P(Y = 5) + P(Y = 6)$$.\n- Step 5: Lesson: nested problems may have different distributions at each level — apply the correct approximation per level. The outer layer often stays exact because $$n$$ is small.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Why does \"sum of Poissons\" property help justify why a Poisson approaches normal for large $$\\lambda$$? (3 steps)", "answer": "- Step 1: A fundamental property of the Poisson: the sum of independent Poissons with rates $$\\lambda_1, \\dots, \\lambda_m$$ is itself Poisson with rate $$\\lambda_1 + \\dots + \\lambda_m$$.\n- Step 2: In particular, $$Po(\\lambda)$$ can be seen as the sum of, say, $$m$$ independent copies of $$Po(\\lambda/m)$$ for any $$m$$. So a large-$$\\lambda$$ Poisson is a sum of many small-rate Poissons.\n- Step 3: By the **Central Limit Theorem**, sums of many independent identically distributed variables (with finite variance) tend to a normal. So $$Po(\\lambda)$$ tends to a normal as $$\\lambda$$ grows — this is why $$\\lambda > 10$$ is a reasonable working threshold.\n\nThe Poisson → normal approximation is ultimately a CLT consequence in disguise.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "What happens when you combine the binomial → Poisson approximation and then Poisson → normal? Why is this \"double approximation\" discouraged? (4 steps)", "answer": "- Step 1: In principle, if $$p$$ is small and $$np$$ is reasonably large, you could do $$B(n, p) \\approx Po(np) \\approx N(np, np)$$. But note the variance here is $$np$$, not $$np(1-p)$$.\n- Step 2: The direct $$B(n, p) \\approx N(np, np(1-p))$$ has variance $$np(1-p)$$, which is *correct* for the binomial. The chained approximation uses $$np$$, which underestimates when $$p$$ is not extremely tiny.\n- Step 3: Each approximation introduces error; chaining compounds it. One direct step is more accurate than two intermediate steps.\n- Step 4: Rule: if a direct approximation is valid, use it. Only chain if forced by circumstances — and even then, be aware of accumulated error.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "A student has $$X \\sim B(15, 0.3)$$ and decides to use a normal approximation. Comment on this choice. (4 steps)", "answer": "- Step 1: $$n = 15$$ is *not* large — it's quite small. Normal approximation requires large $$n$$.\n- Step 2: $$p = 0.3$$ is only moderately close to 0.5 — the binomial is somewhat right-skewed, so the normal misfits noticeably.\n- Step 3: $$np = 4.5$$ is well within Poisson-approximation range, but even there, a binomial with $$n = 15$$ is tractable directly: use the exact formula or tables (which cover up to $$n = 50$$).\n- Step 4: Conclusion: with $$n = 15$$, direct binomial computation is the right approach — no approximation needed. Approximations are for *large* $$n$$ where direct computation is cumbersome.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Why does the rule-of-thumb $$np \\leq 10$$ exist for Poisson approximation? What happens when $$np$$ exceeds 10? (4 steps)", "answer": "- Step 1: Practical reason: cumulative Poisson tables in the S2 formula booklet max out at $$\\lambda = 10$$. Values beyond may not be tabulated.\n- Step 2: Statistical reason: at $$np \\approx 10$$, the Poisson is moderately bell-shaped (not very skewed). For higher $$\\lambda$$, Poisson becomes nearly symmetric — now a *normal* approximation fits well (and $$\\lambda > 10$$ is precisely the normal-approximation threshold for Poisson).\n- Step 3: So $$np \\leq 10$$ is both the \"use Poisson\" boundary *and* roughly the \"don't use normal\" boundary — a neat transition.\n- Step 4: For $$np = 15$$ or higher, skip Poisson entirely and go directly $$B(n,p) \\approx N(np, np(1-p))$$.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Identify the appropriate approximation (if any) for each binomial, without computing: (i) $$B(20, 0.5)$$, (ii) $$B(250, 0.04)$$, (iii) $$B(1000, 0.5)$$. Also identify the approximation for $$Po(25)$$. (4 steps)", "answer": "- Step 1: (i) $$B(20, 0.5)$$: $$n = 20$$ is not large, so neither approximation is ideal. Compute directly from binomial tables or formula.\n- Step 2: (ii) $$B(250, 0.04)$$: $$n$$ large, $$p$$ small, $$np = 10$$. **Poisson approximation**: $$Po(10)$$. No continuity correction.\n- Step 3: (iii) $$B(1000, 0.5)$$: $$n$$ large, $$p = 0.5$$. **Normal approximation**: $$N(500, 250)$$ with continuity correction.\n- Step 4: $$Po(25)$$: $$\\lambda > 10$$. **Normal approximation**: $$N(25, 25)$$ with continuity correction.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "For each of the three approximations in S2, state what parameter change makes each approximation *more accurate*. (4 steps)", "answer": "- Step 1: **Binomial → Poisson**: improves as $$n$$ grows larger AND $$p$$ shrinks (with $$\\lambda = np$$ fixed). The binomial approaches Poisson in this double limit.\n- Step 2: **Binomial → Normal**: improves as $$n$$ grows. For $$p$$ near 0.5, convergence is fastest. For $$p$$ far from 0.5, larger $$n$$ compensates but convergence is slower.\n- Step 3: **Poisson → Normal**: improves as $$\\lambda$$ grows. Larger $$\\lambda$$ = more \"effective trials\" accumulating, so by CLT the sum is more bell-shaped.\n- Step 4: Common thread: all three approximations rely on large sample/count. The normal ones also rely on the distribution being symmetric enough for the bell to fit.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Before calculators, why was the normal approximation to the binomial so important? And why does it still matter today? (4 steps)", "answer": "- Step 1: Computing $$\\binom{n}{k}$$ for large $$n$$ by hand is punishing — factorials grow explosively. For $$n = 100$$, $$100!$$ has 158 digits. Direct binomial computation was infeasible.\n- Step 2: Normal tables of $$\\Phi(z)$$ were widely available in the 20th century. Any reasonable binomial problem could be reduced to a $$Z$$-score look-up — a handful of arithmetic operations.\n- Step 3: The approximation \"linearised\" a combinatorial beast into standardised work, enabling widespread statistical practice in industry, medicine, and research.\n- Step 4: Today, despite computers, the approximation is still faster for quick estimates, gives qualitative insight (how does probability scale with $$n, p$$?), and is foundational for hypothesis testing, confidence intervals, and theoretical statistics.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "One in 120 people catches a virus. Estimate the probability that in a random sample of 900 people, fewer than 7 catch it, conceptually. (4 steps)", "answer": "- Step 1: Let $$X$$ = number catching, $$X \\sim B(900, 1/120)$$.\n- Step 2: Check Poisson conditions: $$n = 900$$ is large, $$p = 1/120 \\approx 0.008$$ is small, $$np = 7.5 \\leq 10$$. All satisfied.\n- Step 3: Approximate $$X \\approx Po(7.5)$$.\n- Step 4: Compute $$P(X < 7) = P(X \\leq 6)$$ from Poisson tables for $$\\lambda = 7.5$$. Conceptually, since the mean is 7.5 and we want fewer than 7 (just below the mean), the probability is slightly less than half. No continuity correction (Poisson is discrete, like binomial).", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "For $$X \\sim Po(\\lambda)$$ approximated as $$Y \\sim N(\\lambda, \\lambda)$$, describe how $$P(18 \\leq X < 35)$$ for $$\\lambda = 25$$ is computed with the continuity correction. (4 steps)", "answer": "- Step 1: Event: $$18 \\leq X < 35$$. Lower bound 18 is included; upper bound 35 is excluded. Largest included integer is 34.\n- Step 2: Apply continuity correction: $$P(17.5 \\leq Y < 34.5)$$. (18 included → extend down to 17.5; 35 excluded → stop at 34.5.)\n- Step 3: Standardise: $$P\\left(\\frac{17.5 - 25}{5} \\leq Z < \\frac{34.5 - 25}{5}\\right) = P(-1.5 \\leq Z < 1.9)$$.\n- Step 4: Compute from $$Z$$ tables as $$\\Phi(1.9) - \\Phi(-1.5) = \\Phi(1.9) - (1 - \\Phi(1.5)) = 0.9713 + 0.4332 \\approx 0.90$$. So about 90% — as expected, since the interval 18 to 34 covers most of the probability mass around the mean 25.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "A 150-orchid sample with 45% producing pink flowers. Describe conceptually how to find $$P(X < 110)$$, where $$X$$ is the count of pink-producers. (4 steps)", "answer": "- Step 1: $$X \\sim B(150, 0.45)$$: $$p$$ is close to 0.5, $$n$$ is large. **Normal approximation**: $$\\mu = 67.5$$, $$\\sigma^2 = 150(0.45)(0.55) \\approx 37.1$$, $$\\sigma \\approx 6.09$$. So $$Y \\sim N(67.5, 37.1)$$.\n- Step 2: Event: $$X < 110$$, so largest included integer is 109. Continuity correction: $$P(Y < 109.5)$$.\n- Step 3: Standardise: $$Z = \\frac{109.5 - 67.5}{6.09} \\approx 6.9$$. This is extremely far above 0 — essentially all probability lies below.\n- Step 4: So $$P(X < 110) \\approx 1$$ (virtual certainty). The mean is 67.5, and 110 is more than 6 standard deviations above — it would take a wildly abnormal sample to approach 110 pink-producers.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Five hundred electrical switches are in a box, each independently faulty with probability 0.005. Compare the three ways to estimate $$P(X < 2)$$: exact binomial, Poisson approximation, and direct normal approximation. Which is most accurate and why? (5 steps)", "answer": "- Step 1: Exact: $$X \\sim B(500, 0.005)$$. Compute $$P(X < 2) = P(X=0) + P(X=1) = (0.995)^{500} + 500(0.005)(0.995)^{499}$$. Result: roughly 0.285.\n- Step 2: **Poisson approximation**: $$np = 2.5$$, so $$X \\approx Po(2.5)$$. Compute $$P(X < 2) = P(X = 0) + P(X = 1) = e^{-2.5} + 2.5 e^{-2.5} = e^{-2.5}(1 + 2.5) \\approx 0.287$$.\n- Step 3: **Normal approximation**: $$\\mu = 2.5$$, $$\\sigma^2 = np(1-p) = 2.4875$$, $$\\sigma \\approx 1.58$$. $$P(X < 2) \\approx P(Y < 1.5) = P(Z < -0.63) \\approx 0.264$$.\n- Step 4: Compare accuracy: Poisson is very close to exact (~0.5% error); normal is noticeably off (~7% error). Why? Because at $$np = 2.5$$, the binomial is highly right-skewed and $$p = 0.005$$ is very small — Poisson captures this perfectly, but normal's symmetry is a poor fit.\n- Step 5: Lesson: for rare-event binomials, Poisson beats normal handily. The normal approximation fails because its conditions ($$p$$ close to 0.5) aren't met — it's forcing symmetry on a skewed distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Give a simple mental rule for applying continuity correction: how do you know whether to add or subtract 0.5? (3 steps)", "answer": "- Step 1: The core rule: \"**integer included → boundary moves outward** (away from the event's center); **integer excluded → boundary moves inward** (toward the center).\"\n- Step 2: For the upper boundary of a region:\n+ $$X \\leq k$$ (k included): use $$Y < k + 0.5$$.\n+ $$X < k$$ (k excluded): use $$Y < k - 0.5$$.\n- Step 3: For the lower boundary:\n+ $$X \\geq k$$ (k included): use $$Y > k - 0.5$$.\n+ $$X > k$$ (k excluded): use $$Y > k + 0.5$$.\n\nRemembering the direction of the $$\\pm 0.5$$ is easy if you think: \"the boundary swings by 0.5 to correctly include/exclude the integer $$k$$.\"", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "A car hire firm has breakdowns at rate 21 per week, randomly and independently. Use a normal approximation to describe how to find the probability more than 27 breakdowns in a week. (4 steps)", "answer": "- Step 1: $$X$$ = weekly breakdowns, $$X \\sim Po(21)$$. Since $$\\lambda = 21 > 10$$, normal approximation valid: $$Y \\sim N(21, 21)$$, $$\\sigma = \\sqrt{21} \\approx 4.58$$.\n- Step 2: Event: $$P(X > 27)$$. Integer 27 is excluded. Continuity correction: $$P(Y > 27.5)$$.\n- Step 3: Standardise: $$Z = \\frac{27.5 - 21}{\\sqrt{21}} \\approx 1.42$$. So $$P(Z > 1.42) \\approx 1 - \\Phi(1.42) \\approx 1 - 0.9222 = 0.0778$$.\n- Step 4: About 8% probability. Makes sense: 27 is about 1.4 standard deviations above the mean, so this is a mild upper-tail event. The result is moderately unlikely but not rare.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "Why is the normal approximation to the Poisson unreliable for low $$\\lambda$$, and what's a concrete symptom of its failure? (4 steps)", "answer": "- Step 1: For low $$\\lambda$$ (say $$\\lambda < 5$$), Poisson is heavily right-skewed with substantial mass at zero. A symmetric normal centered at $$\\lambda$$ can't mirror this.\n- Step 2: **Concrete symptom**: the approximating normal assigns nonzero probability to values below zero (impossible for a count). E.g. $$Po(3) \\approx N(3, 3)$$ gives $$P(Y < 0) = P(Z < -\\sqrt{3}) \\approx 0.042$$ — but $$X$$ cannot be negative.\n- Step 3: Another symptom: upper-tail probabilities are underestimated (Poisson has a heavier right tail than the matched normal).\n- Step 4: Resolution: for low $$\\lambda$$, compute Poisson probabilities directly from the formula $$\\frac{e^{-\\lambda}\\lambda^k}{k!}$$ or tables — it's entirely feasible.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "A fair coin is spun 60 times. Describe how to estimate $$P(\\text{fewer than 25 heads})$$ using an appropriate approximation. (4 steps)", "answer": "- Step 1: $$X \\sim B(60, 0.5)$$. $$p$$ is exactly 0.5, $$n = 60$$ is large. **Normal approximation**: $$\\mu = 30$$, $$\\sigma^2 = 60(0.5)(0.5) = 15$$, $$\\sigma \\approx 3.87$$.\n- Step 2: Event: $$P(X < 25)$$. Integer 25 excluded; largest included is 24. Continuity correction: $$P(Y < 24.5)$$.\n- Step 3: Standardise: $$Z = \\frac{24.5 - 30}{3.87} \\approx -1.42$$. So $$P(Z < -1.42) \\approx 0.078$$.\n- Step 4: About 8% probability. Makes sense: 25 is about 1.4 standard deviations below the mean 30 — a mild lower-tail event.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "Street lights fail at rate 0.5 per day (i.e. one every two days). Use approximations to describe how to find (a) the probability of < 6 failures in a week, and (b) < 45 failures in a 10-week period. (5 steps)", "answer": "- Step 1: (a) Weekly rate: $$\\lambda_1 = 0.5 \\times 7 = 3.5$$ per week. Poisson model $$X_1 \\sim Po(3.5)$$. Since $$\\lambda_1 = 3.5 < 10$$, **no approximation needed** — compute from Poisson tables directly.\n- Step 2: For (a), $$P(X_1 < 6) = P(X_1 \\leq 5)$$ from standard tables. No continuity correction.\n- Step 3: (b) 10-week rate: $$\\lambda_2 = 0.5 \\times 70 = 35$$. Poisson model $$X_2 \\sim Po(35)$$. Since $$\\lambda_2 > 10$$, **normal approximation** valid: $$Y_2 \\sim N(35, 35)$$.\n- Step 4: For (b), event $$X_2 < 45$$; integer 45 excluded, largest included 44. Continuity correction: $$P(Y_2 < 44.5)$$. Standardise: $$Z = \\frac{44.5 - 35}{\\sqrt{35}} \\approx 1.61$$, so $$P(Z < 1.61) \\approx \\Phi(1.61) \\approx 0.946$$.\n- Step 5: About 95% probability. Since the expected count is 35 and 45 is above the mean, \"fewer than 45\" includes most of the distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "Match each scenario to the most appropriate approximation (Poisson, Normal, or None/direct computation): (i) $$B(40, 0.4)$$, (ii) $$B(5000, 0.0004)$$, (iii) $$Po(8)$$, (iv) $$B(600, 0.9)$$. (4 steps)", "answer": "- Step 1: (i) $$B(40, 0.4)$$: $$np = 16 > 10$$, $$p$$ near 0.5. **Normal approximation** $$N(16, 9.6)$$, with continuity correction.\n- Step 2: (ii) $$B(5000, 0.0004)$$: $$p$$ tiny, $$n$$ very large, $$np = 2$$. **Poisson approximation** $$Po(2)$$, no continuity correction.\n- Step 3: (iii) $$Po(8)$$: $$\\lambda = 8 < 10$$, so **no normal approximation** — compute directly from Poisson tables.\n- Step 4: (iv) $$B(600, 0.9)$$: $$p$$ close to 1 (not 0.5), but the complement $$Y = 600 - X \\sim B(600, 0.1)$$ has $$np = 60 > 10$$ — too large for Poisson. Since $$p = 0.1$$ on the complement is not near 0.5, strictly, neither S2 approximation applies cleanly. Compute directly or acknowledge the approximation is strained.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}], "count": 56}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 11182, "out_tokens": 14352, "reasoning_chars": 28895, "cost_eur": 0.057, "elapsed_s": 119, "content_chars": 22483}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 11182, "out_tokens": 10939, "reasoning_chars": 20516, "cost_eur": 0.046, "elapsed_s": 278, "content_chars": 18284}, "minimax_1": {"run": 1, "provide const SK='s2_ch3';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  fetch('/api/notion',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>r.json()).then(d=>{if(d.url){toast('Done!');window.open(d.url)}else toast('Error: '+(d.error||'?'))}).catch(e=>toast('Error: '+e.message))
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
