}{4}\\left[\\frac{x^4}{4}\\right]_1^3 = \\frac{1}{4}\\left(\\frac{81}{4} - \\frac{1}{4}\\right) = \\frac{1}{4} \\cdot 20 = 5$$.\n- Step 3: $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2 = 5 - \\left(\\frac{13}{6}\\right)^2 = 5 - \\frac{169}{36} = \\frac{180 - 169}{36} = \\frac{11}{36}$$.\n\nThe standard deviation is $$\\sigma = \\sqrt{\\frac{11}{36}} = \\frac{\\sqrt{11}}{6} \\approx 0.553$$. This gives a sense of the typical spread of $$X$$ around its mean of $$\\frac{13}{6} \\approx 2.17$$.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "A student is asked: \"Can a p.d.f. ever take a value greater than 1?\" The student says no, because probabilities can't exceed 1. Is the student correct? (2 steps)", "answer": "- Step 1: The student is **incorrect**. The p.d.f. $$\\mathrm{f}(x)$$ is a *density*, not a probability. It can certainly exceed 1, as long as the total area under the curve equals 1.\n- Step 2: For example, consider a uniform distribution on $$[0, 0.5]$$: $$\\mathrm{f}(x) = 2$$ for $$0 \\leq x \\leq 0.5$$. Here $$\\mathrm{f}(x) = 2 > 1$$, but the area is $$2 \\times 0.5 = 1$$. The p.d.f. is 2 because the probability of 1 is \"compressed\" into a short interval of width 0.5, so the density must be high. What *can't* exceed 1 is a probability (an area), not a density (a height).\n\nThink of it like population density: a city can have a very high population density (people per km²) even though the total population is finite. The density is the concentration, not the count.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": true}], "count": 55}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "Why is the probability of a continuous random variable taking any one specific value exactly zero? (2 steps)", "answer": "- Step 1: A continuous random variable can take infinitely many values within any interval. If you try to distribute a total probability of 1 across infinitely many specific points, the share for any single point becomes infinitesimally small, approaching zero.\n- Step 2: Mathematically, probability for a continuous variable is represented by the *area* under the probability density function (p.d.f.) curve. The area under a curve at a single point (a vertical line with zero width) is zero. Therefore, $$P(X = x) = 0$$.\n\nThis is the fundamental distinction between discrete and continuous variables; for continuous variables, probability only accumulates over intervals.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "What are the two essential mathematical conditions that any probability density function (p.d.f.) $$f(x)$$ must satisfy to be valid? (2 steps)", "answer": "- Step 1: The function must be non-negative: $$f(x) \\ge 0$$ for all $$x \\in \\mathbb{R}$$. Probabilities cannot be negative, and since the area under the curve represents probability, the \"height\" (density) cannot be negative.\n- Step 2: The total area under the curve must be exactly 1: $$\\int_{-\\infty}^{\\infty} f(x) dx = 1$$. This ensures that the total probability of all possible outcomes is 1 (certainty).\n+ In practice, if $$f(x) = 0$$ outside a finite interval $$[a,b]$$, you only need to check non-negativity on $$[a,b]$$ and integrate from $$a$$ to $$b$$ to verify the total area is 1.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "How do you calculate the probability $$P(a < X < b)$$ for a continuous random variable $$X$$ with p.d.f. $$f(x)$$, and what does this represent visually? (2 steps)", "answer": "- Step 1: The probability is found by integrating the p.d.f. between the limits $$a$$ and $$b$$: $$P(a < X < b) = \\int_a^b f(x) dx$$.\n- Step 2: Visually, this integral represents the area under the p.d.f. curve bounded by the vertical lines $$x=a$$ and $$x=b$$. This area corresponds to the proportion of the total probability mass that lies within that specific range.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A function is proposed as a p.d.f.: $$f(x) = kx(5-x)$$ for $$0 \\le x \\le 6$$, and 0 otherwise. Explain why, for any positive constant $$k$$, this cannot be a valid p.d.f. (2 steps)", "answer": "- Step 1: One of the fundamental conditions for a valid p.d.f. is that $$f(x) \\ge 0$$ for all $$x$$ in its domain.\n- Step 2: The function $$f(x) = kx(5-x)$$ is a downward-opening parabola with roots at $$x=0$$ and $$x=5$$. Between 0 and 5, the function is positive, but the domain extends to $$x=6$$.\n+ For $$5 < x \\le 6$$, the parabola dips below the x-axis, making $$f(x) < 0$$.\nSince no positive value of $$k$$ can fix the negative values in $$[5,6]$$ (it would just scale the negative part), the function violates the non-negativity condition and is invalid.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "When finding the normalizing constant $$k$$ for a p.d.f. defined on a finite interval, what equation must you solve? Walk through the conceptual setup for a p.d.f. $$f(x) = kx$$ on $$[0, 2]$$. (3 steps)", "answer": "- Step 1: To find the constant $$k$$, use the condition that the total area under the p.d.f. is 1. This means setting the integral of the p.d.f. over its entire domain equal to 1: $$\\int_0^2 kx dx = 1$$.\n- Step 2: Evaluating the integral gives $$k[\\frac{x^2}{2}]_0^2 = k(\\frac{4}{2} - 0) = 2k$$. Setting this equal to 1 yields $$2k = 1$$, so $$k = \\frac{1}{2}$$.\n- Step 3: Conceptually, the graph of $$f(x) = kx$$ on $$[0,2]$$ is a triangle with base 2 and height $$f(2) = 2k$$. The area of a triangle is $$\\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2} \\times 2 \\times 2k = 2k$$. Setting the area to 1 confirms $$k = \\frac{1}{2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "For a continuous random variable $$X$$, does it matter whether you write $$P(X < a)$$ or $$P(X \\le a)$$? Explain why or why not. (2 steps)", "answer": "- Step 1: No, it does not matter. For a continuous random variable, the probability of taking any one specific value is zero: $$P(X = a) = 0$$.\n- Step 2: Therefore, $$P(X \\le a) = P(X < a) + P(X = a) = P(X < a) + 0 = P(X < a)$$. The same logic applies to $$>$$ vs $$\\ge$$. The probability is carried entirely by the continuous intervals, not the single boundary points.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "What is the cumulative distribution function (c.d.f.) $$F(x)$$, and how is it mathematically constructed from the p.d.f. $$f(x)$$? (2 steps)", "answer": "- Step 1: The c.d.f. $$F(x)$$ gives the probability that the random variable $$X$$ takes a value less than or equal to $$x$$. It is defined as $$F(x) = P(X \\le x)$$.\n- Step 2: Mathematically, it is constructed by integrating the p.d.f. from the lower bound of the domain up to the variable $$x$$: $$F(x) = \\int_{-\\infty}^{x} f(t) dt$$. We use a dummy variable $$t$$ to avoid confusion with the upper limit $$x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Given a c.d.f. $$F(x)$$, how do you recover the p.d.f. $$f(x)$$? What is the p.d.f. for values of $$x$$ where $$F(x)$$ is constant? (2 steps)", "answer": "- Step 1: Since the c.d.f. is the integral of the p.d.f., the p.d.f. is the derivative of the c.d.f.: $$f(x) = \\frac{d}{dx}F(x)$$.\n- Step 2: If $$F(x)$$ is constant on a given interval, its derivative is zero. Therefore, the p.d.f. $$f(x) = 0$$ on that interval. This typically happens outside the defined range of the random variable (e.g., for $$x > b$$ where $$F(x) = 1$$, or $$x < a$$ where $$F(x) = 0$$).", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A random variable $$X$$ has c.d.f. $$F(x)$$. Write the expression for $$P(a < X \\le b)$$ entirely in terms of $$F$$. (2 steps)", "answer": "- Step 1: The probability $$P(a < X \\le b)$$ is the probability of $$X$$ being up to $$b$$ minus the probability of $$X$$ being up to $$a$$.\n- Step 2: Using the c.d.f., this is simply $$F(b) - F(a)$$. Because $$P(X=a) = 0$$ for continuous variables, this also equals $$F(b) - F(a)$$ regardless of whether the inequalities are strict ($$<$$) or non-strict ($$\\le$$) at the boundaries.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "The p.d.f. of $$X$$ is defined piecewise over two sections: $$[a, c]$$ and $$[c, d]$$. When integrating to find the c.d.f. for a value $$x$$ in the second section $$[c, d]$$, what crucial step must you remember regarding the first section? (3 steps)", "answer": "- Step 1: The c.d.f. is *cumulative*. For a value $$x$$ in the second section, the probability accumulated so far includes all the probability from the first section.\n- Step 2: When integrating the second section, you must add the total probability accumulated by the end of the first section. This is the value of the c.d.f. at the boundary point $$x = c$$.\n- Step 3: Mathematically, for $$c \\le x \\le d$$, the formula is $$F(x) = F(c) + \\int_c^x f(t) dt$$. You cannot just integrate the second section from $$c$$ to $$x$$ and call it $$F(x)$$; you must add the $$F(c)$$ base to ensure the function accumulates properly.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "For any valid c.d.f. $$F(x)$$, what are the values of $$F(x)$$ as $$x \\to -\\infty$$ (or below the range) and $$x \\to +\\infty$$ (or above the range)? Why? (2 steps)", "answer": "- Step 1: As $$x \\to -\\infty$$ (or below the lowest possible value of $$X$$), the probability of $$X$$ being less than or equal to that value is zero. So, $$F(x) \\to 0$$.\n- Step 2: As $$x \\to +\\infty$$ (or above the highest possible value), the probability of $$X$$ being less than or equal to that value includes all possible outcomes, which is certainty. So, $$F(x) \\to 1$$.\n\nThese boundary conditions are essential to specify a c.d.f. fully over all of $$\\mathbb{R}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "How does the formula for the expected value $$E(X)$$ of a continuous random variable conceptually derive from the discrete formula $$E(X) = \\sum x_i P(X=x_i)$$? (3 steps)", "answer": "- Step 1: For a discrete random variable, the expected value is a weighted average: each value $$x_i$$ is multiplied by its probability $$P(X=x_i)$$, and the results are summed.\n- Step 2: For a continuous random variable, the probability of a single value is zero, but the probability *density* at $$x$$ is $$f(x)$$. We replace the summation with an integration and the probability mass with the density function.\n- Step 3: This gives $$E(X) = \\int_{-\\infty}^{\\infty} x f(x) dx$$. The integral \"weighs\" each infinitesimal slice $$x$$ by its density $$f(x)$$, effectively finding the balance point (center of mass) of the distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "What is the computational formula for the variance $$Var(X)$$ of a continuous random variable, and why is it often preferred over the definition $$\\int (x-\\mu)^2 f(x) dx$$? (2 steps)", "answer": "- Step 1: The computational formula is $$Var(X) = E(X^2) - [E(X)]^2$$, where $$E(X^2) = \\int_{-\\infty}^{\\infty} x^2 f(x) dx$$.\n- Step 2: It is preferred over the definition $$\\int (x-\\mu)^2 f(x) dx$$ because the definition requires expanding $$(x-\\mu)^2 = x^2 - 2\\mu x + \\mu^2$$ and integrating, which involves dealing with the mean $$\\mu$$ during the calculation. The computational formula separates the calculation of $$E(X^2)$$ and $$E(X)$$, often simplifying the algebra and reducing arithmetic errors.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "You need to find the expected volume of a cube whose side length $$X$$ is a continuous random variable. Is $$E(\\text{Volume})$$ equal to $$(E(X))^3$$? Explain and provide the correct approach. (3 steps)", "answer": "- Step 1: No, $$E(\\text{Volume}) \\ne (E(X))^3$$. In general, for a non-linear function $$g$$, $$E(g(X)) \\ne g(E(X))$$. The expectation of a function is not the function of the expectation.\n- Step 2: The volume is $$X^3$$, so you must find $$E(X^3)$$ using the rule $$E(g(X)) = \\int_{-\\infty}^{\\infty} g(x) f(x) dx$$.\n- Step 3: Therefore, the expected volume is $$E(X^3) = \\int_{-\\infty}^{\\infty} x^3 f(x) dx$$. You must integrate $$x^3$$ multiplied by the p.d.f., not simply cube the mean.\n\nThis is a common misconception: averaging the side length and then cubing it gives a different result than averaging the cubed side lengths.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "If you know $$E(X)$$ and $$Var(X)$$, how do you quickly find $$E(3X-2)$$ and $$Var(3X-2)$$? Walk through the reasoning for the variance transformation. (3 steps)", "answer": "- Step 1: For linear transformations $$aX+b$$, use the rules: $$E(aX+b) = aE(X) + b$$ and $$Var(aX+b) = a^2Var(X)$$. Thus, $$E(3X-2) = 3E(X) - 2$$ and $$Var(3X-2) = 9Var(X)$$.\n- Step 2: The variance measures the spread or deviation from the mean. Adding a constant $$b$$ (like -2) shifts the entire distribution but does not change its spread, so the constant does not appear in the variance formula.\n- Step 3: Multiplying by a constant $$a$$ (like 3) scales the distribution. If $$a > 1$$, it stretches the spread; if $$0 < a < 1$$, it compresses it. Because variance is based on *squared* deviations $$(x-\\mu)^2$$, the scaling factor is squared. Thus, the variance is multiplied by $$a^2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "If the p.d.f. of $$X$$ is visually symmetric about a vertical line $$x=a$$, what can you immediately conclude about $$E(X)$$ without doing any integration? Why? (2 steps)", "answer": "- Step 1: You can conclude that $$E(X) = a$$.\n- Step 2: The expected value is the \"center of mass\" or balance point of the distribution. If the p.d.f. is perfectly symmetric about $$x=a$$, the distribution is balanced at that point. The integral of $$(x-a)f(x)$$ over the domain will be zero because the weighted deviations on the left perfectly cancel the weighted deviations on the right.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "How is the mode of a continuous random variable defined, and what are the two main scenarios for finding it? (2 steps)", "answer": "- Step 1: The mode is the value of $$x$$ at which the p.d.f. $$f(x)$$ is at its maximum. It represents the value where the variable is \"most dense\" or most likely to occur.\n- Step 2: To find it, there are two main scenarios:\n+ For a smooth, differentiable p.d.f. with an interior maximum, find the critical point by solving $$f'(x) = 0$$ and verify it's a maximum (e.g., sketch or second derivative test).\n+ For a piecewise linear p.d.f., the maximum will occur at a \"corner\" or a boundary point. Sketching the graph is the easiest way to identify it.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "A p.d.f. is strictly increasing on the interval $$[1, 5]$$ and zero elsewhere. Where is the mode? (2 steps)", "answer": "- Step 1: Since the p.d.f. is strictly increasing on $$[1, 5]$$, the highest point (maximum density) occurs at the rightmost end of the interval.\n- Step 2: Therefore, the mode is at the boundary $$x = 5$$. This highlights that the mode does not have to be in the \"middle\" of the distribution; it is simply wherever the density peaks, which can be at an endpoint.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "Define the median of a continuous random variable and explain how to find it using the c.d.f. (2 steps)", "answer": "- Step 1: The median $$m$$ is the value that splits the probability distribution in half, meaning half the data lies below it and half above. It is the 50th percentile.\n- Step 2: It is defined by the equation $$F(m) = 0.5$$. To find it, you use the c.d.f. (either given or found by integrating the p.d.f.), set it equal to 0.5, and solve for $$m$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "Define the lower quartile $$Q_1$$, upper quartile $$Q_3$$, and the $$n$$th percentile in terms of the c.d.f. (3 steps)", "answer": "- Step 1: The lower quartile $$Q_1$$ is the value below which 25% of the data lies. It satisfies $$F(Q_1) = 0.25$$.\n- Step 2: The upper quartile $$Q_3$$ is the value below which 75% of the data lies. It satisfies $$F(Q_3) = 0.75$$.\n- Step 3: The $$n$$th percentile $$P_n$$ is the value below which $$n\\%$$ of the data lies. It satisfies $$F(P_n) = \\frac{n}{100}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "When finding the median of a piecewise-defined c.d.f., what is a critical first step before setting $$F(x) = 0.5$$ and solving? (3 steps)", "answer": "- Step 1: Before solving, you must determine which section of the piecewise c.d.f. contains the value 0.5.\n- Step 2: Do this by evaluating the c.d.f. at the boundary points between the sections. For example, if the piecewise function changes at $$x=2$$, calculate $$F(2)$$.\n- Step 3: If $$F(2) = 0.2$$, then the median (0.5) must lie in the next section because 0.5 is between 0.2 and 1. You then use the formula for that specific section to set up and solve $$F(x) = 0.5$$.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "What is the interquartile range (IQR) and what does it measure about the distribution? (2 steps)", "answer": "- Step 1: The interquartile range is defined as $$IQR = Q_3 - Q_1$$.\n- Step 2: It measures the spread or dispersion of the middle 50% of the distribution. It is a measure of spread that is resistant to outliers, as it ignores the extreme 25% on either end.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "A p.d.f. $$f(x) = \\frac{3}{8}(x^2+1)$$ is defined on $$[-1, 1]$$. Without full calculation, what can you say about the median, and where are the modes? Explain using symmetry and maxima. (3 steps)", "answer": "- Step 1: The function $$f(x) = \\frac{3}{8}(x^2+1)$$ only involves $$x^2$$, which is an even function, plus a constant. It is defined on the symmetric interval $$[-1, 1]$$. Thus, the p.d.f. is perfectly symmetric about $$x = 0$$, which means the median must be 0.\n- Step 2: The mode is the maximum value of $$f(x)$$. Since $$x^2$$ is smallest at $$x=0$$ (where $$x^2=0$$), the function $$f(x)$$ actually has its *minimum* at $$x=0$$.\n- Step 3: The maximum values occur at the boundaries where $$x^2$$ is largest, so $$x = -1$$ and $$x = 1$$. Therefore, this distribution is bimodal, with modes at $$x = -1$$ and $$x = 1$$. This is a counterexample to the assumption that the mode is always in the center.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "A c.d.f. is given as $$F(x) = \\frac{1}{5}x - \\frac{1}{5}$$ for $$1 \\le x \\le 2$$, and a different formula for $$2 < x \\le 4$$. If you need to find the lower quartile $$Q_1$$, how do you decide which formula to use? (3 steps)", "answer": "- Step 1: Evaluate the c.d.f. at the boundary points. Here, the first section is for $$1 \\le x \\le 2$$. Calculate $$F(2) = \\frac{1}{5}(2) - \\frac{1}{5} = \\frac{1}{5} = 0.2$$.\n- Step 2: The lower quartile $$Q_1$$ corresponds to $$F(x) = 0.25$$.\n- Step 3: Since $$F(2) = 0.2$$, the value 0.25 has not been reached by the end of the first section. Therefore, the lower quartile must lie in the second section (for $$2 < x \\le 4$$), and you must use the formula from that section to solve for $$Q_1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "A continuous random variable $$X$$ has p.d.f. $$f(x) = \\frac{1}{8}x$$ for $$0 \\le x \\le 4$$ and 0 otherwise. Conceptually walk through finding $$P(2 < X < 4)$$ using the geometry of the shape. (3 steps)", "answer": "- Step 1: The probability is the area under the p.d.f. curve between $$x=2$$ and $$x=4$$. The function $$f(x) = \\frac{1}{8}x$$ is a straight line passing through the origin, so the area is a trapezoid.\n- Step 2: Identify the dimensions of the trapezoid. At $$x=2$$, the height is $$f(2) = \\frac{2}{8} = \\frac{1}{4}$$. At $$x=4$$, the height is $$f(4) = \\frac{4}{8} = \\frac{1}{2}$$. The width (base) is $$4 - 2 = 2$$.\n- Step 3: The area of a trapezoid is $$\\frac{1}{2} \\times \\text{width} \\times (\\text{height}_1 + \\text{height}_2) = \\frac{1}{2} \\times 2 \\times (\\frac{1}{4} + \\frac{1}{2}) = 1 \\times \\frac{3}{4} = \\frac{3}{4}$$. So the probability is 0.75.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "A continuous random variable $$X$$ has c.d.f. $$F(x) = \\frac{x^2}{4}$$ for $$0 \\le x \\le 2$$. Walk through finding the median. (3 steps)", "answer": "- Step 1: The median is the value $$m$$ such that the probability of $$X$$ being below it is 0.5. Using the c.d.f., this means we set $$F(m) = 0.5$$.\n- Step 2: Substitute the given c.d.f.: $$\\frac{m^2}{4} = 0.5$$.\n- Step 3: Multiply both sides by 4 to get $$m^2 = 2$$. Taking the positive square root (since the domain is $$0 \\le x \\le 2$$), we find $$m = \\sqrt{2} \\approx 1.414$$.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}], "count": 26}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why must the probability density function (pdf) $ f(x) $ satisfy $ f(x) \\geq 0 $ for all $ x $? (3 steps)", "answer": "- Step 1: Probabilities are non-negative by definition. For a continuous variable, the probability $ P(a \\leq X \\leq b) $ is the integral of $ f(x) $ over $[a,b]$.  \n- Step 2: If $ f(x) $ were negative anywhere, integrating over a region where $ f(x) < 0 $ would yield a negative probability, which is impossible.  \n- Step 3: Hence, $ f(x) \\geq 0 $ ensures all probabilities $ P(a \\leq X \\leq b) \\geq 0 $, aligning with probability axioms.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why must $ \\int_{-\\infty}^{\\infty} f(x) dx = 1 $ for a valid pdf? (2 steps)", "answer": "- Step 1: The total probability over the entire sample space must equal 1.  \n- Step 2: The integral of $ f(x) $ over all $ x $ represents the total probability of all possible outcomes, so it must equal 1.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "For the pdf $ f(x) = k(2 - x) $ on $ -2 \\leq x \\leq 2 $, why is $ k = \\frac{1}{8} $? (3 steps)", "answer": "- Step 1: Compute $ \\int_{-2}^{2} k(2 - x) dx $.  \n- Step 2: Integrate: $ k \\left[2x - \\frac{x^2}{2}\\right]_{-2}^{2} = k \\left[(4 - 2) - (-4 - 2)\\right] = k(8) $.  \n- Step 3: Set equal to 1: $ 8k = 1 \\Rightarrow k = \\frac{1}{8} $.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How does the cumulative distribution function (cdf) $ F(x) $ relate to the pdf $ f(x) $? (2 steps)", "answer": "- Step 1: By definition, $ F(x) = P(X \\leq x) = \\int_{-\\infty}^{x} f(t) dt $.  \n- Step 2: The cdf is the integral of the pdf up to $ x $, and $ f(x) = \\frac{d}{dx} F(x) $ by the Fundamental Theorem of Calculus.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": true}, {"question": "For the cdf $ F(x) $, why is $ P(a < X < b) = F(b) - F(a) $? (2 steps)", "answer": "- Step 1: $ F(b) = P(X \\leq b) $ and $ F(a) = P(X \\leq a) $.  \n- Step 2: Subtracting gives $ P(a < X \\leq b) = F(b) - F(a) $. For continuous variables, $ P(X = a) = 0 $, so $ P(a < X < b) = F(b) - F(a) $.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why is the median $ m $ of a continuous variable defined by $ F(m) = 0.5 $? (2 steps)", "answer": "- Step 1: The median divides the probability distribution into two equal parts.  \n- Step 2: $ F(m) = 0.5 $ means 50% of the probability lies to the left of $ m $, making it the midpoint.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How do you find the mode of a continuous variable from its pdf? (2 steps)", "answer": "- Step 1: The mode is the $ x $-value where $ f(x) $ reaches its global maximum.  \n- Step 2: Find critical points by solving $ f'(x) = 0 $ and check endpoints or points of discontinuity for maxima.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why does the expected value $ E(X) $ for a continuous variable involve integrating $ x f(x) $? (2 steps)", "answer": "- Step 1: In discrete cases, $ E(X) = \\sum x \\cdot P(X = x) $. For continuous variables, the sum becomes an integral.  \n- Step 2: The integral $ \\int x f(x) dx $ weights each $ x $ by its probability density $ f(x) dx $, analogous to discrete probabilities.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is $ \\text{Var}(X) = E(X^2) - [E(X)]^2 $? (3 steps)", "answer": "- Step 1: Expand $ \\text{Var}(X) = E[(X - \\mu)^2] $:  \n- Step 2: $ = E(X^2 - 2\\mu X + \\mu^2) = E(X^2) - 2\\mu^2 + \\mu^2 $.  \n- Step 3: Simplify to $ E(X^2) - \\mu^2 $, which gives the formula.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "How does the cdf of a piecewise pdf look? For example, if $ f(x) = \\frac{1}{8}(x - 2) $ on $ 2 \\leq x \\leq 6 $, what is $ F(x) $? (3 steps)", "answer": "- Step 1: For $ x < 2 $, $ F(x) = 0 $.  \n- Step 2: For $ 2 \\leq x \\leq 6 $, integrate $ \\frac{1}{8}(t - 2) $ from 2 to $ x $:  \n  $ F(x) = \\frac{1}{16}(x^2 - 4x + 4) $.  \n- Step 3: For $ x > 6 $, $ F(x) = 1 $.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is the probability that a continuous random variable takes a specific value zero? Explain using the relationship between probability density functions and probability calculation. (3 steps)", "answer": "- Step 1: **Definition of probability for continuous variables**  \n  Continuous probabilities are calculated as areas under the probability density function (PDF) between intervals:  \n  $$\n  \\mathrm{P}(a \\leq X \\leq b) = \\int_{a}^{b} f(x) dx\n  $$  \n  This area represents the probability.\n\n- Step 2: **Integral over a single point**  \n  If $a = b$, the integral becomes:  \n  $$\n  \\mathrm{P}(X = a) = \\int_{a}^{a} f(x) dx = 0\n  $$  \n  The width of the interval is zero, so the area (and thus probability) is zero.\n\n- Step 3: **Implication for continuous variables**  \n  Since individual points have zero width, their probability contribution is zero. This is a fundamental difference between discrete and continuous random variables.  \n\n  **Takeaway:** Continuous variables can only have non-zero probabilities over intervals, not exact points.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How can you verify if a function $f(x)$ is a valid probability density function (PDF)? List all necessary conditions and explain their significance. (3 steps)", "answer": "- Step 1: **Non-negativity**  \n  The function must satisfy $f(x) \\geq 0$ for all $x \\in \\mathbb{R}$. This ensures probabilities (areas under the curve) are non-negative.  \n\n- Step 2: **Total integral equals 1**  \n  The integral over the entire domain must equal 1:  \n  $$\n  \\int_{-\\infty}^{\\infty} f(x) dx = 1\n  $$  \n  This guarantees the total probability across all possible outcomes is 1.  \n\n- Step 3: **Defined over a real interval**  \n  The function is non-zero only over a specific interval (e.g., $a \\leq x \\leq b$), with $f(x) = 0$ elsewhere. This ensures the PDF is properly normalized.  \n\n  **Takeaway:** A valid PDF must be non-negative, integrate to 1, and be defined over a continuous interval.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Given a piecewise PDF $f(x) = k(2 - x)$ for $-2 \\leq x \\leq 2$, how would you determine the value of $k$ to make it a valid PDF? Show calculations. (4 steps)", "answer": "- Step 1: **Set up the integral**  \n  To normalize the PDF, ensure the total area equals 1:  \n  $$\n  \\int_{-2}^{2} k(2 - x) dx = 1\n  $$  \n\n- Step 2: **Compute the integral**  \n  Integrate term-by-term:  \n  $$\n  k \\int_{-2}^{2} (2 - x) dx = k \\left[ 2x - \\frac{x^2}{2} \\right]_{-2}^{2}\n  $$  \n  Evaluate at bounds:  \n  $$\n  k \\left[ (4 - 2) - (-4 - 2) \\right] = k(6 + 6) = 12k\n  $$  \n\n- Step 3: **Solve for $k$**  \n  Set $12k = 1$ → $k = \\frac{1}{12}$.  \n\n- Step 4: **Verify non-negativity**  \n  Check $f(x) = \\frac{1}{12}(2 - x)$ for $-2 \\leq x \\leq 2$:  \n  - At $x = -2$: $f(-2) = \\frac{1}{12}(4) = \\frac{1}{3} \\geq 0$.  \n  - At $x = 2$: $f(2) = 0$.  \n  The function is linear and non-negative in the interval.  \n\n  **Takeaway:** Normalize by integrating and solving for $k$, then confirm non-negativity.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How do you derive the cumulative distribution function (CDF) $F(x)$ from a given PDF $f(x)$? Apply this to $f(x) = \\frac{1}{4}x$ for $1 \\leq x \\leq 3$. (3 steps)", "answer": "- Step 1: **General definition of CDF**  \n  $$\n  F(x) = \\mathrm{P}(X \\leq x) = \\int_{-\\infty}^{x} f(t) dt\n  $$  \n  For the given PDF, focus on the interval $1 \\leq x \\leq 3$.  \n\n- Step 2: **Compute the integral**  \n  $$\n  F(x) = \\int_{1}^{x} \\frac{1}{4}t \\, dt = \\frac{1}{4} \\left[ \\frac{t^2}{2} \\right]_{1}^{x} = \\frac{1}{8}x^2 - \\frac{1}{8}\n  $$  \n\n- Step 3: **Define the CDF piecewise**  \n  - For $x < 1$: $F(x) = 0$.  \n  - For $1 \\leq x \\leq 3$: $F(x) = \\frac{1}{8}x^2 - \\frac{1}{8}$.  \n  - For $x > 3$: $F(x) = 1$ (total area).  \n\n  **Takeaway:** The CDF is the integral of the PDF up to $x$, defined piecewise to cover all $x \\in \\mathbb{R}$.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "What is the relationship between the derivative of the CDF $F(x)$ and the PDF $f(x)$? Demonstrate this with an example. (2 steps)", "answer": "- Step 1: **Fundamental relationship**  \n  By the Fundamental Theorem of Calculus:  \n  $$\n  \\frac{d}{dx} F(x) = f(x)\n  $$  \n  Differentiating the CDF gives the PDF.  \n\n- Step 2: **Example verification**  \n  If $F(x) = \\frac{1}{8}x^2 - \\frac{1}{8}$ for $1 \\leq x \\leq 3$, then:  \n  $$\n  \\frac{d}{dx} \\left( \\frac{1}{8}x^2 - \\frac{1}{8} \\right) = \\frac{1}{4}x = f(x)\n  $$  \n  This matches the given PDF $f(x) = \\frac{1}{4}x$.  \n\n  **Takeaway:** The PDF is the derivative of the CDF, confirming their inverse relationship.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "How do you calculate the expected value (mean) $\\mathrm{E}(X)$ for a continuous random variable with PDF $f(x)$? Apply this to $f(x) = \\frac{1}{4}x$ for $1 \\leq x \\leq 3$. (3 steps)", "answer": "- Step 1: **Definition of expectation**  \n  $$\n  \\mathrm{E}(X) = \\int_{-\\infty}^{\\infty} x f(x) dx\n  $$  \n  For the given PDF:  \n  $$\n  \\mathrm{E}(X) = \\int_{1}^{3} x \\cdot \\frac{1}{4}x dx = \\frac{1}{4} \\int_{1}^{3} x^2 dx\n  $$  \n\n- Step 2: **Compute the integral**  \n  $$\n  \\frac{1}{4} \\left[ \\frac{x^3}{3} \\right]_1^3 = \\frac{1}{4} \\left( \\frac{27}{3} - \\frac{1}{3} \\right) = \\frac{1}{4} \\cdot \\frac{26}{3} = \\frac{13}{6}\n  $$  \n\n- Step 3: **Interpretation**  \n  The expected value is $\\frac{13}{6} \\approx 2.167$, the \"center of mass\" of the distribution.  \n\n  **Takeaway:** Multiply $x$ by $f(x)$, integrate over the domain, and simplify.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How do you find the variance $\\operatorname{Var}(X)$ for a continuous random variable? Use the PDF $f(x) = \\frac{1}{4}x$ for $1 \\leq x \\leq 3$ to compute $\\operatorname{Var}(X)$. (4 steps)", "answer": "- Step 1: **Formula for variance**  \n  $$\n  \\operatorname{Var}(X) = \\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2\n  $$  \n\n- Step 2: **Compute $\\mathrm{E}(X^2)$**  \n  $$\n  \\mathrm{E}(X^2) = \\int_{1}^{3} x^2 \\cdot \\frac{1}{4}x dx = \\frac{1}{4} \\int_{1}^{3} x^3 dx = \\frac{1}{4} \\left[ \\frac{x^4}{4} \\right]_1^3 = \\frac{1}{4} \\left( \\frac{81}{4} - \\frac{1}{4} \\right) = \\frac{80}{16} = 5\n  $$  \n\n- Step 3: **Use $\\mathrm{E}(X) = \\frac{13}{6}$**  \n  $$\n  \\operatorname{Var}(X) = 5 - \\left( \\frac{13}{6} \\right)^2 = 5 - \\frac{169}{36} = \\frac{180 - 169}{36} = \\frac{11}{36}\n  $$  \n\n- Step 4: **Interpretation**  \n  Variance measures spread around the mean. Here, $\\sigma = \\sqrt{\\frac{11}{36}} \\approx 0.552$.  \n\n  **Takeaway:** Compute $\\mathrm{E}(X^2)$ and subtract the square of $\\mathrm{E}(X)$.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How do you determine the mode of a continuous random variable from its PDF? Apply this to $f(x) = 12x^2(1 - x)$ for $0 \\leq x \\leq 1$. (4 steps)", "answer": "- Step 1: **Definition of mode**  \n  The mode is the value of $x$ where $f(x)$ reaches its maximum.  \n\n- Step 2: **Differentiate $f(x)$**  \n  $$\n  f(x) = 12x^2 - 12x^3 \\\\\n  f'(x) = 24x - 36x^2\n  $$  \n\n- Step 3: **Solve $f'(x) = 0$**  \n  $$\n  24x - 36x^2 = 0 \\Rightarrow x(24 - 36x) = 0 \\Rightarrow x = 0 \\text{ or } x = \\frac{2}{3}\n  $$  \n  Discard $x = 0$ (minimum since $f(0) = 0$).  \n\n- Step 4: **Verify maximum at $x = \\frac{2}{3}$**  \n  Check second derivative or endpoints:  \n  $$\n  f''(x) = 24 - 72x \\Rightarrow f''\\left(\\frac{2}{3}\\right) = 24 - 48 = -24 < 0 \\quad \\text{(Maximum)}\n  $$  \n  Mode is at $x = \\frac{2}{3}$.  \n\n  **Takeaway:** Take derivative, solve for critical points, and confirm maximum.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How do you find the median of a continuous random variable using its CDF? Apply this to $F(x) = 2x^2 - x^4$ for $0 \\leq x \\leq 1$. (4 steps)", "answer": "- Step 1: **Definition of median**  \n  Solve $F(m) = 0.5$:  \n  $$\n  2m^2 - m^4 = 0.5\n  $$  \n\n- Step 2: **Rearrange equation**  \n  $$\n  m^4 - 2m^2 + 0.5 = 0\n  $$  \n  Let $u = m^2$:  \n  $$\n  u^2 - 2u + 0.5 = 0\n  $$  \n\n- Step 3: **Solve quadratic**  \n  $$\n  u = \\frac{2 \\pm \\sqrt{4 - 2}}{2} = \\frac{2 \\pm \\sqrt{2}}{2} \\Rightarrow u = 1 \\pm \\frac{\\sqrt{2}}{2}\n  $$  \n  Discard $u = 1 + \\frac{\\sqrt{2}}{2} \\approx 1.707$ (invalid since $m \\leq 1$). Valid root:  \n  $$\n  u = 1 - \\frac{\\sqrt{2}}{2} \\Rightarrow m = \\sqrt{1 - \\frac{\\sqrt{2}}{2}} \\approx 0.541\n  $$  \n\n- Step 4: **Interpretation**  \n  Median is approximately $0.541$, where half the probability lies to the left.  \n\n  **Takeaway:** Set CDF to 0.5 and solve for $x$, using algebraic manipulation and checking validity.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "What is the relationship between linear transformations of a continuous random variable and its mean and variance? Derive $\\mathrm{E}(aX + b)$ and $\\operatorname{Var}(aX + b)$. (4 steps)", "answer": "- Step 1: **Linearity of expectation**  \n  $$\n  \\mathrm{E}(aX + b) = a\\mathrm{E}(X) + b\n  $$  \n  Proof:  \n  $$\n  \\int_{-\\infty}^{\\infty} (a x + b)f(x) dx = a \\int x f(x) dx + b \\int f(x) dx = a\\mu + b\n  $$  \n\n- Step 2: **Variance under scaling**  \n  $$\n  \\operatorname{Var}(aX + b) = \\mathrm{E}[(aX + b - a\\mu - b)^2] = \\mathrm{E}[a^2(X - \\mu)^2] = a^2 \\operatorname{Var}(X)\n  $$  \n\n- Step 3: **Effect of constants**  \n  - $a$ scales the spread (variance by $a^2$), $b$ shifts location (no effect on variance).  \n  - Example: If $X$ has $\\mu = 2, \\sigma^2 = 4$, then $Y = 3X + 1$ has $\\mu = 7, \\sigma^2 = 36$.  \n\n- Step 4: **Application to normalization**  \n  Z-scores: $Z = \\frac{X - \\mu}{\\sigma}$ has $\\mathrm{E}(Z) = 0, \\operatorname{Var}(Z) = 1$.  \n\n  **Takeaway:** Expectation shifts by $b$ and scales by $a$; variance scales by $a^2$.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "State the two conditions that a function $\\mathrm{f}(x)$ must satisfy to be a valid probability density function (p.d.f.) for a continuous random variable.", "answer": "- Step 1: The function must be non-negative for all $x$: $\\mathrm{f}(x) \\geq 0$ for all $x \\in \\mathbb{R}$.\n- Step 2: The total area under the curve must equal 1: $\\int_{-\\infty}^{\\infty} \\mathrm{f}(x)\\,dx = 1$.\n\nThese ensure the function describes a valid probability distribution (probabilities are non-negative and sum to 1).", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "For a continuous random variable $X$ with p.d.f. $\\mathrm{f}(x)$, write down the formula for finding $\\mathrm{P}(a < X < b)$. Does it matter whether you use strict or non-strict inequalities? (2 steps)", "answer": "- Step 1: $\\mathrm{P}(a < X < b) = \\int_a^b \\mathrm{f}(x)\\,dx$\n- Step 2: For continuous distributions, it does NOT matter whether you use $<$ or $\\leq$ (or $>$ or $\\geq$). Since $\\mathrm{P}(X = a) = 0$ for any specific value $a$, we have $\\mathrm{P}(a < X < b) = \\mathrm{P}(a \\leq X \\leq b) = \\mathrm{P}(a < X \\leq b)$, etc.\n\nThis is a key property of continuous distributions that differs from discrete ones.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "The function $f(x) = \\frac{1}{4}x$ is defined for $-1 \\leq x \\leq 2$ and $0$ otherwise. Explain why this cannot be a valid probability density function. (2 steps)", "answer": "- Step 1: Check the non-negativity condition: For $x$ in $[-1, 0)$, the function gives $f(x) = \\frac{1}{4}x < 0$, which is negative.\n- Step 2: Since a p.d.f. must satisfy $f(x) \\geq 0$ for all $x$, this function fails the first condition and cannot be a valid p.d.f.\n\nEven if it were non-negative, you'd also need to check that $\\int_{-1}^2 \\frac{1}{4}x\\,dx = 1$.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A probability density function is defined as $f(x) = k(2-x)$ for $-2 \\leq x \\leq 2$, and $0$ otherwise. Find the value of $k$ that makes this a valid p.d.f. (3 steps)", "answer": "- Step 1: For a valid p.d.f., we need $\\int_{-\\infty}^{\\infty} f(x)\\,dx = 1$.\n- Step 2: Since $f(x) = 0$ outside $[-2, 2]$, we integrate only over this interval: $\\int_{-2}^{2} k(2-x)\\,dx = 1$.\n- Step 3: $k \\int_{-2}^{2} (2-x)\\,dx = k[2x - \\frac{x^2}{2}]_{-2}^{2} = k[(4-2) - (-4-2)] = k(2 + 6) = 8k = 1$, so $k = \\frac{1}{8}$.\n\nYou can verify: the function is non-negative on $[-2, 2]$ since $2-x \\geq 0$ in this range.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Explain why the probability density function $f(x) = kx(5-x)$ for $0 \\leq x \\leq 6$ can never be a valid p.d.f., regardless of the value of $k$. (2 steps)", "answer": "- Step 1: On the interval $0 \\leq x \\leq 6$, the function $x(5-x)$ takes both positive and negative values. Specifically, when $x > 5$, we have $5-x < 0$, so $x(5-x) < 0$.\n- Step 2: A p.d.f. must satisfy $f(x) \\geq 0$ for all $x$. Since $f(x)$ is negative for $x > 5$, no value of $k$ (even positive) can make this a valid p.d.f.\n\nThis shows that simply having total area equal to 1 isn't enough—the function must also be non-negative everywhere.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "What is the cumulative distribution function (c.d.f.) of a continuous random variable $X$? How is it related to the p.d.f.? (3 steps)", "answer": "- Step 1: The cumulative distribution function is defined as $F(x) = \\mathrm{P}(X \\leq x)$, representing the area under the p.d.f. to the left of $x$.\n- Step 2: Mathematically, $F(x) = \\int_{-\\infty}^{x} f(t)\\,dt$.\n- Step 3: They are related by differentiation/integration: $f(x) = \\frac{d}{dx}F(x)$ and $F(x) = \\int_{-\\infty}^{x} f(t)\\,dt$.\n\nThe p.d.f. is the derivative of the c.d.f., and the c.d.f. is the integral (antiderivative) of the p.d.f.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "For a continuous random variable with c.d.f. $F(x)$, what are the values of $F(-\\infty)$ and $F(\\infty)$? Explain why. (2 steps)", "answer": "- Step 1: $F(-\\infty) = 0$ and $F(\\infty) = 1$.\n- Step 2: Since $F(x) = \\mathrm{P}(X \\leq x)$, as $x \\to -\\infty$, the probability that $X \\leq x$ approaches 0. As $x \\to \\infty$, the probability approaches 1 (certainty).\n\nThis is true for all valid c.d.f.s and helps verify if a proposed c.d.f. is valid.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "The p.d.f. of $X$ is $f(x) = \\frac{1}{4}x$ for $1 \\leq x \\leq 3$. Find the c.d.f. $F(x)$ for all $x$. (4 steps)", "answer": "- Step 1: For $x < 1$, $F(x) = 0$ (no probability to the left).\n- Step 2: For $1 \\leq x \\leq 3$, $F(x) = \\int_{1}^{x} \\frac{1}{4}t\\,dt = [\\frac{t^2}{8}]_{1}^{x} = \\frac{x^2}{8} - \\frac{1}{8}$.\n- Step 3: For $x > 3$, $F(x) = 1$ (all probability to the left).\n- Step 4: $F(x) = \\begin{cases} 0 & x < 1 \\\\ \\frac{x^2}{8} - \\frac{1}{8} & 1 \\leq x \\leq 3 \\\\ 1 & x > 3 \\end{cases}$\n\nThe constant of integration is found using $F(1) = 0$ (lower boundary).", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "The c.d.f. of $X$ is given by $F(x) = 0$ for $x < 0$, $F(x) = \\frac{1}{5}x + \\frac{3}{20}x^2$ for $0 \\leq x \\leq 2$, and $F(x) = 1$ for $x > 2$. Find the p.d.f. $f(x)$. (2 steps)", "answer": "- Step 1: The p.d.f. is the derivative of the c.d.f.: $f(x) = \\frac{d}{dx}F(x)$.\n- Step 2: For $0 \\leq x \\leq 2$, $f(x) = \\frac{1}{5} + \\frac{3}{10}x$. Elsewhere, $f(x) = 0$.\nSo $f(x) = \\begin{cases} \\frac{1}{5} + \\frac{3}{10}x & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise} \\end{cases}$\n\nThis can be verified by integrating to check $F(2) = 1$.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A continuous random variable $X$ has p.d.f. $f(x) = k(4x - x^2)$ for $2 \\leq x \\leq 4$. Find $k$ and then calculate $\\mathrm{P}(2.5 < X < 3)$. (4 steps)", "answer": "- Step 1: Find $k$ using $\\int_{2}^{4} k(4x - x^2)\\,dx = 1$. This gives $k[\\frac{4x^2}{2} - \\frac{x^3}{3}]_{2}^{4} = k[\\frac{16}{3}] = 1$, so $k = \\frac{3}{16}$.\n- Step 2: The p.d.f. is $f(x) = \\frac{3}{16}(4x - x^2)$.\n- Step 3: $\\mathrm{P}(2.5 < X < 3) = \\int_{2.5}^{3} \\frac{3}{16}(4x - x^2)\\,dx = \\frac{3}{16}[2x^2 - \\frac{x^3}{3}]_{2.5}^{3}$.\n- Step 4: $= \\frac{3}{16} \\times \\frac{41}{24} = \\frac{41}{128} \\approx 0.320$.\n\nThis shows how to compute probabilities by integrating the p.d.f. over the desired range.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "For a continuous random variable $X$ with p.d.f. $f(x)$, what is the formula for the expected value (mean) $\\mathrm{E}(X)$? How does this compare to the discrete case? (2 steps)", "answer": "- Step 1: For continuous: $\\mathrm{E}(X) = \\int_{-\\infty}^{\\infty} x f(x)\\,dx$. Only integrate over where $f(x) > 0$.\n- Step 2: This is analogous to the discrete case $\\mathrm{E}(X) = \\sum x \\cdot \\mathrm{P}(X = x)$, but with summation replaced by integration and the probability function replaced by the p.d.f.\n\nThe expectation represents the \"center of mass\" of the probability distribution.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A continuous random variable $Y$ has p.d.f. $f(y) = \\frac{1}{4}y$ for $1 \\leq y \\leq 3$. Find $\\mathrm{E}(Y)$. (3 steps)", "answer": "- Step 1: $\\mathrm{E}(Y) = \\int_{1}^{3} y \\cdot \\frac{1}{4}y\\,dy = \\int_{1}^{3} \\frac{1}{4}y^2\\,dy$.\n- Step 2: $= [\\frac{1}{12}y^3]_{1}^{3} = \\frac{27}{12} - \\frac{1}{12} = \\frac{26}{12} = \\frac{13}{6}$.\n- Step 3: The mean is $\\frac{13}{6} \\approx 2.17$, which makes sense as it's between 1 and 3, weighted toward higher values since the p.d.f. increases with $y$.\n\nYou can verify by symmetry: if the p.d.f. were $y$ on $[0,2]$, the mean would be $4/3$, not 1.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "What are the two formulas for calculating the variance of a continuous random variable $X$? (2 steps)", "answer": "- Step 1: Direct definition: $\\operatorname{Var}(X) = \\int_{-\\infty}^{\\infty} (x - \\mu)^2 f(x)\\,dx$, where $\\mu = \\mathrm{E}(X)$.\n- Step 2: Computational formula: $\\operatorname{Var}(X) = \\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2 = \\int_{-\\infty}^{\\infty} x^2 f(x)\\,dx - \\mu^2$.\n\nThe second formula is usually easier to compute as it avoids expanding $(x - \\mu)^2$.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "For the random variable $Y$ in Q13 with p.d.f. $f(y) = \\frac{1}{4}y$ for $1 \\leq y \\leq 3$, find $\\operatorname{Var}(Y)$. (4 steps)", "answer": "- Step 1: We already have $\\mathrm{E}(Y) = \\frac{13}{6}$.\n- Step 2: Find $\\mathrm{E}(Y^2) = \\int_{1}^{3} y^2 \\cdot \\frac{1}{4}y\\,dy = \\int_{1}^{3} \\frac{1}{4}y^3\\,dy = [\\frac{1}{16}y^4]_{1}^{3} = \\frac{81}{16} - \\frac{1}{16} = \\frac{80}{16} = 5$.\n- Step 3: Use $\\operatorname{Var}(Y) = \\mathrm{E}(Y^2) - [\\mathrm{E}(Y)]^2 = 5 - (\\frac{13}{6})^2 = 5 - \\frac{169}{36} = \\frac{180 - 169}{36} = \\frac{11}{36}$.\n- Step 4: $\\operatorname{Var}(Y) = \\frac{11}{36} \\approx 0.306$.\n\nThe standard deviation would be $\\sqrt{11/36} \\approx 0.552$.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "State the formulas for $\\mathrm{E}(aX + b)$ and $\\operatorname{Var}(aX + b)$ where $X$ is a continuous random variable and $a, b$ are constants. (2 steps)", "answer": "- Step 1: $\\mathrm{E}(aX + b) = a\\mathrm{E}(X) + b$.\n- Step 2: $\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$.\n\nNote that variance is unaffected by adding a constant $b$, but is scaled by $a^2$ when multiplying by $a$.\n\nThese are identical to the discrete case—linear transformations affect mean and variance predictably.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "For the random variable $Y$ from Q13, find $\\mathrm{E}(2Y - 3)$ and $\\operatorname{Var}(2Y - 3)$. (2 steps)", "answer": "- Step 1: $\\mathrm{E}(2Y - 3) = 2\\mathrm{E}(Y) - 3 = 2 \\times \\frac{13}{6} - 3 = \\frac{26}{6} - \\frac{18}{6} = \\frac{8}{6} = \\frac{4}{3}$.\n- Step 2: $\\operatorname{Var}(2Y - 3) = 2^2 \\operatorname{Var}(Y) = 4 \\times \\frac{11}{36} = \\frac{44}{36} = \\frac{11}{9}$.\n\nThe $-3$ shifts the mean but doesn't affect variance; the $2$ doubles the standard deviation (variance scales by $2^2 = 4$).", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "If $X$ is a continuous random variable with p.d.f. $f(x)$, what is the formula for $\\mathrm{E}(g(X))$ where $g(X)$ is a function of $X$? (2 steps)", "answer": "- Step 1: $\\mathrm{E}(g(X)) = \\int_{-\\infty}^{\\infty} g(x) f(x)\\,dx$.\n- Step 2: This generalizes the expectation: for $g(X) = X$, we get $\\mathrm{E}(X)$; for $g(X) = X^2$, we get $\\mathrm{E}(X^2)$ needed for variance calculations.\n\nThis is essential for finding expectations of functions of random variables without using the distribution of the transformed variable.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A continuous random variable $X$ has p.d.f. $f(x) = \\frac{1}{800}(x + 10)$ for $20 \\leq x \\leq 40$. Find $\\mathrm{E}(X^3)$, the expected volume of a cube with side length $X$. (4 steps)", "answer": "- Step 1: $\\mathrm{E}(X^3) = \\int_{20}^{40} x^3 \\cdot \\frac{1}{800}(x + 10)\\,dx = \\frac{1}{800}\\int_{20}^{40} (x^4 + 10x^3)\\,dx$.\n- Step 2: $= \\frac{1}{800}[\\frac{x^5}{5} + \\frac{10x^4}{4}]_{20}^{40} = \\frac{1}{800}[\\frac{x^5}{5} + \\frac{5x^4}{2}]_{20}^{40}$.\n- Step 3: At $x = 40$: $\\frac{40^5}{5} + \\frac{5 \\times 40^4}{2} = \\frac{102400000}{5} + \\frac{5 \\times 2560000}{2} = 20480000 + 6400000 = 26880000$.\n- Step 4: At $x = 20$: $= \\frac{3200000}{5} + \\frac{5 \\times 160000}{2} = 640000 + 400000 = 1040000$. Difference $= 25840000$, divided by $800 = 32300$.\n\nThis demonstrates that $\\mathrm{E}(X^3) \\neq (\\mathrm{E}(X))^3$—the expectation of a function is not the function of the expectation.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "What is the mode of a continuous random variable? How do you find it? (3 steps)", "answer": "- Step 1: The mode is the value(s) of $x$ where the p.d.f. attains its maximum—that is, the most probable value(s) in the distribution.\n- Step 2: To find it, either sketch the p.d.f. and identify the peak, or differentiate $f(x)$ and set $f'(x) = 0$ to find critical points, then check which gives the maximum.\n- Step 3: A distribution can have no mode (e.g., uniform), one mode (unimodal), or multiple modes (multimodal).\n\nThe mode is the \"peak\" of the distribution; it's where probability density is highest.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "The p.d.f. of $X$ is $f(x) = 12x^2(1 - x)$ for $0 \\leq x \\leq 1$. Find the mode of $X$. (3 steps)", "answer": "- Step 1: $f(x) = 12x^2 - 12x^3$. Differentiate: $f'(x) = 24x - 36x^2 = 12x(2 - 3x)$.\n- Step 2: Set $f'(x) = 0$: $12x(2 - 3x) = 0$, so $x = 0$ or $x = \\frac{2}{3}$.\n- Step 3: At $x = 0$, $f(0) = 0$. At $x = \\frac{2}{3}$, $f(\\frac{2}{3}) = 12 \\times \\frac{4}{9} \\times \\frac{1}{3} = \\frac{16}{9} > 0$. So the mode is $x = \\frac{2}{3}$.\n\nYou can verify this is a maximum (not minimum) by checking the second derivative or the shape of the curve.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "The p.d.f. of $Y$ is $g(y) = 2y$ for $0 \\leq y \\leq 1$. Find the mode. (2 steps)", "answer": "- Step 1: Sketching shows $g(y) = 2y$ is strictly increasing on $[0, 1]$, so the maximum occurs at the right endpoint.\n- Step 2: The mode is $y = 1$ (at the boundary). The p.d.f. is highest there, even though $P(Y = 1) = 0$.\n\nThis illustrates that the mode doesn't need to be \"in the middle\" of the distribution—it can occur at a boundary.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "What is the median of a continuous random variable? How do you find it if you know the c.d.f.? (2 steps)", "answer": "- Step 1: The median $m$ is the value such that $\\mathrm{P}(X \\leq m) = 0.5$—half the probability lies below and half above.\n- Step 2: If you have the c.d.f. $F(x)$, solve $F(m) = 0.5$ for $m$.\n\nFor a symmetric distribution, the median equals the mean, but this is not true in general.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "The p.d.f. of $X$ is $f(x) = 4x - 4x^3$ for $0 \\leq x \\leq 1$. Find the c.d.f. and then the median. (4 steps)", "answer": "- Step 1: $F(x) = \\int_0^x (4t - 4t^3)\\,dt = [2t^2 - t^4]_0^x = 2x^2 - x^4$ for $0 \\leq x \\leq 1$.\n- Step 2: So $F(x) = 0$ for $x < 0$, $2x^2 - x^4$ for $0 \\leq x \\leq 1$, and $1$ for $x > 1$.\n- Step 3: To find median $m$, solve $F(m) = 0.5$: $2m^2 - m^4 = 0.5$.\n- Step 4: Rearranging: $m^4 - 2m^2 + 0.5 = 0$. Using quadratic formula in $m^2$: $m^2 = \\frac{2 \\pm \\sqrt{4 - 2}}{2} = 1 \\pm \\frac{\\sqrt{2}}{2}$. The valid solution in $[0, 1]$ is $m = \\sqrt{1 - \\frac{\\sqrt{2}}{2}} \\approx 0.541$.\n\nThe other root gives $m \\approx 1.31$, which is outside the valid range.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "What are the lower quartile $Q_1$ and upper quartile $Q_3$ of a continuous random variable? How do you find them? (2 steps)", "answer": "- Step 1: The lower quartile $Q_1$ satisfies $F(Q_1) = 0.25$ (25th percentile); the upper quartile $Q_3$ satisfies $F(Q_3) = 0.75$ (75th percentile).\n- Step 2: Solve $F(x) = 0.25$ and $F(x) = 0.75$ respectively for $x$ in the valid range.\n\nThe interquartile range (IQR) = $Q_3 - Q_1$ measures the spread of the middle 50% of the distribution.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "The c.d.f. of $X$ is given by $F(x) = 0$ for $x < 1$, $F(x) = \\frac{1}{5}(x - 1)$ for $1 \\leq x \\leq 2$, $F(x) = \\frac{x^2}{10} - \\frac{x}{5} + \\frac{1}{5}$ for $2 < x < 4$, and $F(x) = 1$ for $x \\geq 4$. Find the interquartile range. (4 steps)", "answer": "- Step 1: First check where $F(x)$ reaches boundaries: $F(2) = \\frac{1}{5}(1) = 0.2$.\n- Step 2: For $Q_1$ ($F = 0.25$), since $F(2) = 0.2 < 0.25$, use the second piece: $\\frac{Q_1^2}{10} - \\frac{Q_1}{5} + \\frac{1}{5} = 0.25$. Solving gives $Q_1 = 2.22$ (3 s.f.).\n- Step 3: For $Q_3$ ($F = 0.75$), use the same piece: $\\frac{Q_3^2}{10} - \\frac{Q_3}{5} + \\frac{1}{5} = 0.75$. Solving gives $Q_3 = 3.55$ (3 s.f.).\n- Step 4: $IQR = Q_3 - Q_1 = 3.55 - 2.22 = 1.33$.\n\nThe correct piece is identified by checking which region contains the solution.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "If a p.d.f. is symmetric about $x = a$, what can you say about the mean, median, and mode of the distribution? (2 steps)", "answer": "- Step 1: For a symmetric distribution about $x = a$, the mean and median are both equal to $a$.\n- Step 2: The mode is also at $a$ if the distribution is unimodal (has a single peak). However, if there are multiple peaks symmetrically placed, the mode(s) may differ from the mean/median.\n\nSymmetry implies the \"center\" of the distribution is at $a$, so all measures of central tendency coincide.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "What is the 90th percentile of a continuous random variable? How do you find it? (2 steps)", "answer": "- Step 1: The 90th percentile $P_{90}$ is the value $a$ such that $F(a) = 0.9$ (or $90/100$).\n- Step 2: In general, the $n$th percentile is found by solving $F(x) = n/100$.\n\nPercentiles generalize the concept of quartiles to any percentage.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "A continuous random variable $X$ has p.d.f. $f(x) = \\frac{1}{10}x$ for $0 \\leq x < 2$, and $f(x) = \\frac{1}{4} - \\frac{1}{40}x$ for $2 \\leq x < 10$. Find the 15th percentile. (4 steps)", "answer": "- Step 1: First find the c.d.f. For $0 \\leq x < 2$: $F(x) = \\int_0^x \\frac{1}{10}t\\,dt = \\frac{x^2}{20}$. At $x = 2$, $F(2) = \\frac{4}{20} = 0.2$.\n- Step 2: Since $F(2) = 0.2 > 0.15$, the 15th percentile lies in the first piece.\n- Step 3: Solve $\\frac{a^2}{20} = 0.15$, so $a^2 = 3$ and $a = \\sqrt{3} \\approx 1.41$.\n- Step 4: The 15th percentile is approximately $1.41$.\n\nWe identify which piece contains the solution by comparing $F$ at the boundary points.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Explain why for a continuous random variable, $\\mathrm{P}(X = a) = 0$ for any specific value $a$, but $\\mathrm{P}(X \\in [a, b])$ can still be positive. (2 steps)", "answer": "- Step 1: $\\mathrm{P}(X = a) = \\int_a^a f(x)\\,dx = 0$ because the integral over a single point (zero width) is zero.\n- Step 2: However, $\\mathrm{P}(X \\in [a, b]) = \\int_a^b f(x)\\,dx$ with $b > a$ gives a positive area under the curve.\n\nThis is why continuous distributions are described by areas under curves, not point probabilities.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": true}, {"question": "Why can we use either $<$ or $\\leq$ (and $>$ or $\\geq$) interchangeably when calculating probabilities for continuous random variables? Give an example. (2 steps)", "answer": "- Step 1: Because $\\mathrm{P}(X = a) = 0$ for any specific value $a$, the inclusion or exclusion of endpoints doesn't change the probability.\n- Step 2: For example, $\\mathrm{P}(1 < X < 3) = \\mathrm{P}(1 \\leq X \\leq 3) = \\mathrm{P}(1 < X \\leq 3) = \\mathrm{P}(1 \\leq X < 3)$.\n\nThis differs from discrete distributions where the distinction matters.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "The p.d.f. of $X$ is $f(x) = k$ for $0 \\leq x < 1$, $f(x) = k(x-1)^2$ for $1 \\leq x < 2$, and $f(x) = k(3-x)$ for $2 \\leq x < 3$. Find the value of $k$. (3 steps)", "answer": "- Step 1: The total area must equal 1: $\\int_0^1 k\\,dx + \\int_1^2 k(x-1)^2\\,dx + \\int_2^3 k(3-x)\\,dx = 1$.\n- Step 2: $= k[1] + k[\\frac{(x-1)^3}{3}]_1^2 + k[\\frac{3x - x^2}{2}]_2^3 = k + k(\\frac{1}{3}) + k(\\frac{1}{2}) = k(1 + \\frac{1}{3} + \\frac{1}{2}) = k(\\frac{6+2+3}{6}) = \\frac{11k}{6}$.\n- Step 3: Setting equal to 1: $\\frac{11k}{6} = 1$, so $k = \\frac{6}{11}$.\n\nThis is a piecewise p.d.f. with three different functional forms over three intervals.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "The p.d.f. of $X$ is $f(x) = \\frac{3}{8}(1 + x^2)$ for $-1 \\leq x \\leq 1$. Find the mode and explain your reasoning. (2 steps)", "answer": "- Step 1: The p.d.f. is $f(x) = \\frac{3}{8} + \\frac{3}{8}x^2$, which is symmetric about $x = 0$ and strictly increasing as $|x|$ increases.\n- Step 2: Since $x^2$ is minimized at $x = 0$ (giving the smallest value), the function actually has its minimum at $x = 0$ and maximum at the boundaries $x = \\pm 1$.\n- Step 3: This is a bimodal distribution with modes at $x = -1$ and $x = 1$.\n\nThis is an unusual case where the \"most probable\" values are at the boundaries of the range.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Why is the variance of a continuous random variable defined as $\\operatorname{Var}(X) = \\int (x - \\mu)^2 f(x)\\,dx$ rather than just the average of squared deviations? (2 steps)", "answer": "- Step 1: This is exactly the continuous analogue of the discrete formula. In the discrete case, we sum $p_i(x_i - \\mu)^2$; in continuous, we integrate $f(x)(x - \\mu)^2$.\n- Step 2: The expectation of squared deviations from the mean measures spread, and this definition captures how \"spread out\" the distribution is.\n\nThe formula naturally extends the discrete concept to continuous distributions.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A continuous random variable $X$ has p.d.f. $f(x) = \\frac{1}{2}x$ for $0 \\leq x \\leq 2$. Find: (a) $\\mathrm{P}(X < 1)$, (b) $\\mathrm{P}(X > 1.5)$, (c) $\\mathrm{P}(0.5 < X < 1.5)$. (4 steps)", "answer": "- Step 1: First verify it's valid: $\\int_0^2 \\frac{1}{2}x\\,dx = [\\frac{x^2}{4}]_0^2 = 1$, so it's a valid p.d.f.\n- Step 2: (a) $\\mathrm{P}(X < 1) = \\int_0^1 \\frac{1}{2}x\\,dx = \\frac{1}{4}$.\n- Step 3: (b) $\\mathrm{P}(X > 1.5) = \\int_{1.5}^2 \\frac{1}{2}x\\,dx = [\\frac{x^2}{4}]_{1.5}^2 = \\frac{4}{4} - \\frac{2.25}{4} = 1 - 0.5625 = 0.4375$.\n- Step 4: (c) $\\mathrm{P}(0.5 < X < 1.5) = \\int_{0.5}^{1.5} \\frac{1}{2}x\\,dx = [\\frac{x^2}{4}]_{0.5}^{1.5} = \\frac{2.25}{4} - \\frac{0.25}{4} = \\frac{2}{4} = 0.5$.\n\nThese demonstrate different probability calculations using the same p.d.f.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "If the c.d.f. is given by $F(x) = 0$ for $x < 0$, $F(x) = x^2/6$ for $0 \\leq x < 2$, $F(x) = -x^2/3 + 2x - 2$ for $2 \\leq x \\leq 3$, and $F(x) = 1$ for $x > 3$, find the median to 3 decimal places. (4 steps)", "answer": "- Step 1: Check boundaries: $F(2) = 4/6 = 0.667 > 0.5$. So median is in the first piece ($0 \\leq x < 2$).\n- Step 2: Solve $x^2/6 = 0.5$, giving $x^2 = 3$, so $x = \\sqrt{3} \\approx 1.732$.\n- Step 3: Verify: at $x = \\sqrt{3}$, $F = (\\sqrt{3})^2/6 = 3/6 = 0.5$, exactly the median.\n- Step 4: Median $= \\sqrt{3} \\approx 1.732$ to 3 d.p.\n\nThe correct piece is identified by checking where the solution lies relative to the boundaries.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "For a continuous random variable with p.d.f. $f(x) = k/x$ for $1 \\leq x \\leq 5$, find $k$ and $\\mathrm{E}(X)$. (3 steps)", "answer": "- Step 1: $\\int_1^5 \\frac{k}{x}\\,dx = k[\\ln x]_1^5 = k\\ln 5 = 1$, so $k = \\frac{1}{\\ln 5}$.\n- Step 2: $\\mathrm{E}(X) = \\int_1^5 x \\cdot \\frac{k}{x}\\,dx = \\int_1^5 k\\,dx = k(5-1) = 4k = \\frac{4}{\\ln 5}$.\n- Step 3: The expected value is $\\frac{4}{\\ln 5} \\approx 2.57$.\n\nInteresting: the $x$ terms cancel in the integrand, making $\\mathrm{E}(X)$ simple.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "What is the key property that distinguishes the exponential distribution from other continuous distributions? (2 steps)", "answer": "- Step 1: The exponential distribution has the memoryless property: $\\mathrm{P}(X > a + b \\mid X > a) = \\mathrm{P}(X > b)$ for any $a, b > 0$.\n- Step 2: This means the probability of surviving $b$ more units given survival to $a$ is the same as the probability of surviving $b$ units from the start.\n\nThis property makes it useful for modeling waiting times (e.g., time until a light bulb fails).", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "The p.d.f. of $X$ is $f(x) = 2.5e^{-2.5x}$ for $x \\geq 0$ (exponential distribution). Find the median and interquartile range. (4 steps)", "answer": "- Step 1: For exponential with parameter $\\lambda$, c.d.f. is $F(x) = 1 - e^{-\\lambda x}$.\n- Step 2: Median $m$: $1 - e^{-2.5m} = 0.5$, so $e^{-2.5m} = 0.5$, and $m = -\\frac{\\ln(0.5)}{2.5} = \\frac{\\ln 2}{2.5} \\approx 0.277$ (in thousands of hours).\n- Step 3: $Q_1$: $1 - e^{-2.5Q_1} = 0.25$, so $Q_1 = -\\frac{\\ln(0.75)}{2.5} \\approx 0.115$.\n- Step 4: $Q_3$: $1 - e^{-2.5Q_3} = 0.75$, so $Q_3 = -\\frac{\\ln(0.25)}{2.5} \\approx 0.554$. $IQR \\approx 0.554 - 0.115 = 0.439$.\n\nFor exponential, median < mean (since mean = 1/2.5 = 0.4), showing the right skew.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Why might using a continuous distribution be inappropriate for modeling some real-world quantities that seem continuous? (2 steps)", "answer": "- Step 1: If the quantity can only take discrete values (e.g., number of people, count data), a continuous model would give $\\mathrm{P}(X = k) = 0$ for any integer $k$, which is incorrect.\n- Step 2: Also, if measurements have finite precision or are rounded, the actual distribution may be better modeled as discrete or as a mixture.\n\nThe choice between discrete and continuous depends on the nature of the measurement and the precision required.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "The c.d.f. of $X$ is $F(x) = 0$ for $x < 2$, $F(x) = \\frac{1}{5}(x^2 - 4)$ for $2 \\leq x \\leq 3$, and $F(x) = 1$ for $x > 3$. Find the p.d.f. and verify it's valid. (3 steps)", "answer": "- Step 1: $f(x) = F'(x) = \\frac{d}{dx}[\\frac{1}{5}(x^2 - 4)] = \\frac{2x}{5}$ for $2 \\leq x \\leq 3$.\n- Step 2: So $f(x) = \\frac{2x}{5}$ for $2 \\leq x \\leq 3$, and $0$ otherwise.\n- Step 3: Verify: $\\int_2^3 \\frac{2x}{5}\\,dx = [\\frac{x^2}{5}]_2^3 = \\frac{9}{5} - \\frac{4}{5} = 1$. And $f(x) \\geq 0$ on $[2, 3]$, so it's valid.\n\nThe derivative of the c.d.f. gives the p.d.f., and integration back checks the normalization.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "A p.d.f. is defined as $f(x) = k\\sin(\\pi x)$ for $0 \\leq x \\leq 1$. Find $k$ and $\\mathrm{P}(0 < X < \\frac{1}{3})$. (3 steps)", "answer": "- Step 1: $\\int_0^1 k\\sin(\\pi x)\\,dx = k[-\\frac{\\cos(\\pi x)}{\\pi}]_0^1 = k[-\\frac{(-1)}{\\pi} - (-\\frac{1}{\\pi})] = k[\\frac{2}{\\pi}] = 1$, so $k = \\frac{\\pi}{2}$.\n- Step 2: $\\mathrm{P}(0 < X < \\frac{1}{3}) = \\int_0^{1/3} \\frac{\\pi}{2}\\sin(\\pi x)\\,dx = \\frac{\\pi}{2}[-\\frac{\\cos(\\pi x)}{\\pi}]_0^{1/3} = \\frac{1}{2}[-\\cos(\\frac{\\pi}{3}) + \\cos(0)] = \\frac{1}{2}[-\\frac{1}{2} + 1] = \\frac{1}{4}$.\n- Step 3: So the probability is $0.25$.\n\nThe sine function on $[0,1]$ with this scaling gives a valid p.d.f. (half-arc shape).", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Explain why the uniform distribution on $[a, b]$ has mean $(a+b)/2$ but constant p.d.f. value. (2 steps)", "answer": "- Step 1: For uniform on $[a, b]$, $f(x) = \\frac{1}{b-a}$ (constant). The mean is $\\int_a^b x \\cdot \\frac{1}{b-a}\\,dx = \\frac{1}{b-a}[\\frac{x^2}{2}]_a^b = \\frac{b^2 - a^2}{2(b-a)} = \\frac{a+b}{2}$.\n- Step 2: The p.d.f. is constant because every point in $[a, b]$ is equally likely—the \"density\" doesn't vary. But the expected value is the midpoint because it's symmetric.\n\nThe uniform distribution is the continuous analogue of equally likely outcomes in discrete probability.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "If $X$ and $Y$ are independent continuous random variables with c.d.f.s $F_X(x)$ and $F_Y(y)$, what is the probability that both $X < 1$ and $Y < 1$? (2 steps)", "answer": "- Step 1: Since $X$ and $Y$ are independent, $\\mathrm{P}(X < 1 \\text{ and } Y < 1) = \\mathrm{P}(X < 1) \\times \\mathrm{P}(Y < 1)$.\n- Step 2: $= F_X(1) \\times F_Y(1)$.\n\nIndependence allows factorization of the joint probability into the product of marginal probabilities.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "For a continuous random variable, the p.d.f. at a point doesn't represent probability. What does it represent, and how do you interpret it? (2 steps)", "answer": "- Step 1: The p.d.f. represents probability density—probability per unit of $x$. It's not a probability itself but a \"rate\" of probability accumulation.\n- Step 2: For a small interval $\\Delta x$, $\\mathrm{P}(x < X < x + \\Delta x) \\approx f(x) \\cdot \\Delta x$. Larger $f(x)$ means more probability concentrated near that point.\n\nThink of it as height: probability is area (height × width), so height alone isn't probability.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "Why can't a c.d.f. ever decrease as $x$ increases? (2 steps)", "answer": "- Step 1: The c.d.f. is defined as $F(x) = \\mathrm{P}(X \\leq x)$. As $x$ increases, we're including more of the sample space in the event $\\{X \\leq x\\}$.\n- Step 2: Since probabilities are non-negative and more events can't decrease probability, $F(x)$ is always non-decreasing. Formally, $F'(x) = f(x) \\geq 0$ for all $x$.\n\nThis is a fundamental property that any valid c.d.f. must satisfy.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "The p.d.f. of $X$ is $f(x) = \\frac{3}{32}(3 + 2x - x^2)$ for $-1 \\leq x \\leq 3$. Without integrating, what is $\\mathrm{E}(X)$? Explain. (2 steps)", "answer": "- Step 1: The p.d.f. is symmetric about $x = 1$ (the vertex of the quadratic $3 + 2x - x^2$).\n- Step 2: For a symmetric distribution, the mean equals the axis of symmetry. So $\\mathrm{E}(X) = 1$.\n\nThis uses the property that for symmetric p.d.f.s, the mean (and median) is the point of symmetry.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "When finding the mode of a piecewise linear p.d.f., what is the simplest method? (2 steps)", "answer": "- Step 1: Sketch the p.d.f. The mode is simply the $x$-value where the graph reaches its highest point.\n- Step 2: For piecewise linear sections, the maximum will occur either at a boundary between pieces or at a vertex within a piece where the slope changes from positive to negative.\n\nVisual inspection is often faster than calculus for simple piecewise linear p.d.f.s.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "A continuous random variable $X$ has c.d.f. $F(x)$. Express $\\mathrm{P}(a < X \\le b)$ in terms of $F$. Could you also use $F(a)$? (2 steps)", "answer": "- Step 1: $\\mathrm{P}(a < X \\le b) = F(b) - F(a)$.\n- Step 2: Since $X$ is continuous, $F(a) = \\mathrm{P}(X \\le a) = \\mathrm{P}(X < a)$ because $\\mathrm{P}(X = a) = 0$. So $F(a)$ can indeed be used: $\\mathrm{P}(a < X \\le b) = \\mathrm{P}(X \\le b) - \\mathrm{P}(X \\le a)$.\n\nThis is the continuous analogue of $P(a < X \\le b) = F(b) - F(a)$ for discrete distributions.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "Why might the variance be preferred over the standard deviation in some theoretical calculations, but the standard deviation preferred for interpretation? (2 steps)", "answer": "- Step 1: Variance is easier in calculations because it doesn't require square roots (e.g., $\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$ has a simple form).\n- Step 2: Standard deviation is in the same units as the original variable, making it easier to interpret (e.g., \"most values are within 2 standard deviations of the mean\").\n\nVariance measures spread in squared units; standard deviation brings it back to original units.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}], "count": 49}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What are the two key conditions that a function f(x) must satisfy to be a valid probability density function (p.d.f.) for a continuous random variable? (2 steps)", "answer": "- Step 1: The function must be non-negative for all x: f(x) ≥ 0 for all x ∈ ℝ. This ensures probabilities are never negative.\n- Step 2: The total area under the curve must equal 1: ∫₋∞^∞ f(x)dx = 1. This ensures the total probability across all possible outcomes sums to 1 (certain event).\n\n+ Common misconception: Some students think f(x) itself represents probability. It doesn't — f(x) is a density, and the actual probability comes from the integral (area) under the curve between two values.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Given a p.d.f. f(x) = kx² for 0 ≤ x ≤ 2 (and 0 otherwise), explain how to find the value of k and why k cannot be 1. (3 steps)", "answer": "- Step 1: Use the fact that the total area under the p.d.f. must equal 1: ∫₀² kx² dx = 1.\n- Step 2: Compute the integral: k[x³/3]₀² = k(8/3) = 1, which gives k = 3/8.\n+ If k = 1, the integral would equal 8/3 ≈ 2.67, which is greater than 1 — this cannot represent a valid probability distribution because total probability would exceed 1.\n- Step 3: The value of k normalizes the function so the total area equals exactly 1, making it a valid p.d.f.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A continuous random variable X has p.d.f. f(x) = 0.5 for 0 ≤ x ≤ 2. Without calculating, what is P(X = 1)? What is P(0.5 < X < 1.5)? Explain why. (2 steps)", "answer": "- Step 1: For any continuous random variable, P(X = a) = 0 for any specific value a. So P(X = 1) = 0, regardless of the p.d.f. This is because we're looking at a single point with no width.\n- Step 2: P(0.5 < X < 1.5) = ∫₀.₅^¹.⁵ 0.5 dx = 0.5 × (1.5 - 0.5) = 0.5. This equals the area of a rectangle with height 0.5 and width 1.\n\n+ Note: For continuous variables, P(a < X < b) = P(a ≤ X ≤ b) = P(a < X ≤ b) = P(a ≤ X < b) — the endpoints don't matter.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "The cumulative distribution function (c.d.f.) F(x) is defined as F(x) = P(X ≤ x). Explain what F(x) represents geometrically and give its relationship to the p.d.f. f(x). (2 steps)", "answer": "- Step 1: Geometrically, F(x) represents the area under the p.d.f. to the left of x. It's the total probability that the random variable takes a value less than or equal to x.\n- Step 2: The relationship between f(x) and F(x) is:\n$$F(x) = \\int_{-\\infty}^{x} f(t) dt$$\nand conversely:\n$$f(x) = \\frac{d}{dx}F(x)$$\n\n+ This is the Fundamental Theorem of Calculus applied to probability — differentiation and integration are inverse operations.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "For a continuous random variable X with p.d.f. f(x), write down the formula for E(X) and explain why it involves an integral rather than a sum. (2 steps)", "answer": "- Step 1: The expected value (mean) of a continuous random variable is:\n$$E(X) = \\int_{-\\infty}^{\\infty} x f(x) dx$$\n\n- Step 2: This replaces the discrete sum Σx·P(X = x) with an integral because X can take infinitely many values. The integral computes the \"weighted average\" of x, where f(x) serves as the weight (probability density).\n+ Think of it as: instead of summing x·p(x) for each discrete value, we \"sum\" (integrate) x·f(x) continuously across all possible values.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "For a continuous random variable X, prove that Var(X) = E(X²) - [E(X)]². Explain why we use this formula rather than the definition directly. (3 steps)", "answer": "- Step 1: By definition, Var(X) = E[(X - μ)²] where μ = E(X). Expanding: E[(X - μ)²] = E[X² - 2μX + μ²] = E[X²] - 2μE[X] + μ².\n- Step 2: Since E[X] = μ, this simplifies to: E[X²] - 2μ² + μ² = E[X²] - μ² = E[X²) - [E(X)]².\n- Step 3: This formula is often easier to use because it only requires computing E(X) and E(X²) separately, rather than computing (X - μ)² for every value. It's computationally simpler:\n$$\\text{Var}(X) = \\int_{-\\infty}^{\\infty} x^2 f(x) dx - \\left(\\int_{-\\infty}^{\\infty} x f(x) dx\\right)^2$$", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "If X is a continuous random variable and Y = aX + b (where a and b are constants), state the formulas for E(Y) and Var(Y) in terms of E(X) and Var(X). (2 steps)", "answer": "- Step 1: Expected value transforms linearly: E(aX + b) = aE(X) + b.\n+ This works because integration is a linear operation: ∫(ax + b)f(x)dx = a∫xf(x)dx + b∫f(x)dx = aE(X) + b(1).\n- Step 2: Variance scales by the square of the constant: Var(aX + b) = a²Var(X).\n+ The constant b doesn't affect variance because it just shifts all values by the same amount — variance measures spread, not location. The a² comes from the fact that variance involves squaring deviations.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "The mode of a continuous random variable is defined as the value of x where the p.d.f. is maximum. For the p.d.f. f(x) = 12x²(1 - x) for 0 ≤ x ≤ 1, find the mode. (3 steps)", "answer": "- Step 1: The mode occurs where f'(x) = 0 (and f''(x) < 0 for maximum). First, expand: f(x) = 12x² - 12x³.\n- Step 2: Differentiate: f'(x) = 24x - 36x² = 12x(2 - 3x). Set equal to zero: 12x(2 - 3x) = 0, giving x = 0 or x = 2/3.\n- Step 3: Check second derivative: f''(x) = 24 - 72x. At x = 2/3, f''(2/3) = 24 - 48 = -24 < 0, confirming a maximum. At x = 0, f''(0) = 24 > 0, indicating a minimum. Therefore, the mode is x = 2/3.\n\n+ The p.d.f. is zero at x = 0, so the endpoint cannot be the mode. The interior maximum at x = 2/3 is the unique mode.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "For a continuous random variable X with c.d.f. F(x), define the median m, the lower quartile Q₁, and the upper quartile Q₃. How do you find these values from F(x)? (3 steps)", "answer": "- Step 1: The median m satisfies F(m) = P(X ≤ m) = 0.5. It splits the distribution into two equal halves — half the probability lies below m, half above.\n- Step 2: The lower quartile Q₁ satisfies F(Q₁) = 0.25 — 25% of probability lies below Q₁. The upper quartile Q₃ satisfies F(Q₃) = 0.75 — 75% of probability lies below Q₃.\n- Step 3: To find these values, you set the c.d.f. equal to the appropriate probability (0.5, 0.25, or 0.75) and solve for x. The interquartile range is Q₃ - Q₁, containing the middle 50% of probability.\n\n+ For a symmetric distribution, the median equals the mean. But this is not true in general.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Why can we use symmetry arguments to find E(X) for some continuous distributions without performing integration? Give an example from the chapter. (2 steps)", "answer": "- Step 1: If the p.d.f. is symmetric about a vertical line x = a (i.e., f(a + d) = f(a - d) for all d), then the expected value equals the axis of symmetry, E(X) = a. This is because the \"weight\" on either side of a cancels out.\n- Step 2: For example, in Example 8 of the chapter, f(x) = (3/32)(3 + 2x - x²) for -1 ≤ x ≤ 3 is symmetric about x = 1, so E(X) = 1 without integration.\n+ This is a powerful shortcut: always sketch the p.d.f. first to check for symmetry before computing E(X) by integration.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A p.d.f. is defined piecewise: f(x) = k for 0 < x < 2, and f(x) = k(2x - 3) for 2 ≤ x ≤ 3. How do you find the c.d.f. F(x) in this case? (3 steps)", "answer": "- Step 1: For x ≤ 0: F(x) = 0 (no probability to the left). For x > 3: F(x) = 1 (all probability accounted for).\n- Step 2: For 0 < x < 2: F(x) = ∫₀^x k dt = kx. For 2 ≤ x ≤ 3: F(x) = F(2) + ∫₂^x k(2t - 3) dt = k(2) + [kt² - 3kt]₂^x = k(2) + k(x² - 3x) - k(4 - 6) = k(x² - 3x + 4).\n+ Note: The c.d.f. is cumulative — you add the probability from the previous interval.\n- Step 3: You would also need to find k by ensuring total probability = 1: ∫₀² k dx + ∫₂³ k(2x - 3) dx = 1.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "When finding the probability density function f(x) from a given cumulative distribution function F(x), what must you be careful about? (2 steps)", "answer": "- Step 1: You differentiate: f(x) = dF/dx. However, you must specify where f(x) is non-zero and include f(x) = 0 in regions where F(x) is constant.\n- Step 2: For example, if F(x) = 0 for x < 1, = (x² - 1)/8 for 1 ≤ x ≤ 3, = 1 for x > 1, then f(x) = x/4 for 1 ≤ x ≤ 3, and f(x) = 0 elsewhere.\n+ Common mistake: Students forget to include f(x) = 0 for x outside the support, or they incorrectly differentiate the constant sections.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Explain why E(g(X)) = ∫g(x)f(x)dx for a continuous random variable X. What does this formula allow us to calculate? (2 steps)", "answer": "- Step 1: This formula generalizes expectation to any function g(X) of the random variable. Instead of averaging x itself, we average g(x) — the function transformed values.\n- Step 2: For example, if X represents side length of a cube (from Example 10), and we want expected volume E(X³), we compute ∫x³f(x)dx. Similarly, to find E(X²) for variance calculations, we use this formula.\n+ Key insight: E(X²) is NOT the same as [E(X)]². The formula tells us to transform before taking the expectation, not after.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "For the exponential distribution with p.d.f. f(x) = λe^(-λx) for x ≥ 0, what is the mean and variance? How does the memoryless property manifest? (3 steps)", "answer": "- Step 1: For exponential distribution: E(X) = 1/λ and Var(X) = 1/λ². These can be derived using integration by parts.\n- Step 2: The memoryless property states: P(X > a + b | X > a) = P(X > b). The probability of surviving b more units given you've already survived a is the same as starting from scratch.\n+ This models scenarios like waiting times where \"the system doesn't age\" — a light bulb that's lasted 1000 hours has the same probability of lasting 100 more hours as a new bulb lasting 100 hours.\n- Step 3: In terms of c.d.f., F(x) = 1 - e^(-λx), and P(X > a + b | X > a) = e^(-λb) = P(X > b).", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A continuous random variable X has p.d.f. f(x) = 3/8(1 + x²) for -1 ≤ x ≤ 1. What is special about its mode? How does this relate to the median? (2 steps)", "answer": "- Step 1: The p.d.f. f(x) = 3/8(1 + x²) is symmetric about x = 0 (an even function). It increases from x = -1 to x = 1, so there's no unique interior maximum — the function is largest at the boundary x = 1.\n- Step 2: Because the p.d.f. is symmetric, the median equals 0 (the axis of symmetry). The mode is at x = 1 (the en
