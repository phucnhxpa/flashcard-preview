a continuous RV. (3 steps)", "answer": "- Step 1: A histogram estimates the p.d.f.: bin observations into intervals and plot frequencies (or relative frequencies scaled by bin width).\n- Step 2: As sample size grows (and bin widths shrink appropriately), the histogram converges to the p.d.f. The bars \"smooth out\" into the density curve.\n- Step 3: So the p.d.f. is the limiting shape — the idealisation — of what the histogram approximates. Each bar height estimates $$f(x)$$ at the bin's centre, measured as \"proportion per unit width\".\n\nThis is the practical link: p.d.f. is theoretical; histograms are how we see it in data.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": false}, {"question": "For two independent continuous random variables $$X$$ and $$Y$$, how do you compute $$\\mathrm{P}(X < 1 \\text{ and } Y < 1)$$? (2 steps)", "answer": "- Step 1: By independence: $$\\mathrm{P}(X < 1 \\text{ and } Y < 1) = \\mathrm{P}(X < 1) \\cdot \\mathrm{P}(Y < 1)$$. The joint probability factors into the product of marginals.\n- Step 2: Compute each marginal from the respective distribution's c.d.f. or p.d.f.: $$\\mathrm{P}(X < 1) = F_X(1)$$ and $$\\mathrm{P}(Y < 1) = F_Y(1)$$. Multiply.\n\nKey condition: independence. Without it, you cannot factor — you'd need the joint distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": false}, {"question": "A p.d.f. has the form $$f(x) = k/x$$ on $$[1, 5]$$. Why does the normalisation integral involve a logarithm, and how does this determine $$k$$? (3 steps)", "answer": "- Step 1: Set $$\\int_1^5 \\frac{k}{x}\\,dx = 1$$.\n- Step 2: The antiderivative of $$1/x$$ is $$\\ln|x|$$, so $$k[\\ln x]_1^5 = k(\\ln 5 - \\ln 1) = k \\ln 5$$.\n- Step 3: Set $$k \\ln 5 = 1$$, giving $$k = 1/\\ln 5$$.\n\nWhenever $$f$$ contains $$1/x$$, expect logarithms in the c.d.f. and normalisation. Probabilities over intervals often have forms like $$\\frac{\\ln a}{\\ln b}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": true}, {"question": "Why is the p.d.f. of a continuous random variable often zero outside a bounded interval, and when would it not be? (3 steps)", "answer": "- Step 1: Many real-world quantities are bounded: time durations are non-negative; angles lie in $$[0, 2\\pi]$$; proportions in $$[0, 1]$$. The p.d.f. naturally has bounded support.\n- Step 2: Some distributions have **unbounded** support:\n+ Exponential: $$[0, \\infty)$$.\n+ Normal: $$(-\\infty, \\infty)$$.\n+ Lifetimes, errors, waiting times.\n- Step 3: For unbounded support, the p.d.f. must **decay** fast enough for the integral to converge to 1. Exponential decay ($$e^{-\\lambda x}$$) and Gaussian decay ($$e^{-x^2/2}$$) ensure finite probability.\n\nBounded support = RV can't exceed certain limits; unbounded = possible but very unlikely at extremes.", "source": "Opus 4.7 ②", "_id": "opus_2_70", "judge_pick": true}, {"question": "What does the \"68-95-99.7 rule\" (probability within 1, 2, 3 SDs of the mean) apply to, and when does it fail? (3 steps)", "answer": "- Step 1: The rule — approximately 68%, 95%, 99.7% of probability within 1, 2, 3 SDs of the mean — is **exact** only for the normal distribution and approximately true for many symmetric, unimodal distributions.\n- Step 2: It fails or changes for:\n+ Heavy-tailed distributions: probabilities within 1 SD can be smaller.\n+ Skewed distributions: asymmetric around the mean.\n+ Bimodal distributions: different density structure.\n- Step 3: Universal guarantee (Chebyshev's inequality): $$\\mathrm{P}(|X - \\mu| < k\\sigma) \\geq 1 - 1/k^2$$. Weaker but distribution-free.\n\nDon't over-trust the 68-95-99.7 rule for arbitrary continuous distributions.", "source": "Opus 4.7 ②", "_id": "opus_2_71", "judge_pick": true}, {"question": "Why does the normalisation condition $$F(b) = 1$$ (at the upper support) provide a convenient equation for determining unknown constants in a c.d.f.? (2 steps)", "answer": "- Step 1: A valid c.d.f. must reach exactly 1 at the top of its support — this gives a clean, often-simple equation involving the unknown constant.\n- Step 2: Similarly, $$F(a) = 0$$ at the lower support provides a second condition, sometimes used together to determine multiple unknowns.\n\nExample: if $$F(x) = k(y^2 - y)$$ on $$[1, 2]$$, using $$F(2) = 1$$ gives $$2k = 1$$, so $$k = 1/2$$. The boundary at $$x = 1$$ automatically gives zero — consistent.", "source": "Opus 4.7 ②", "_id": "opus_2_72", "judge_pick": false}, {"question": "For the p.d.f. $$f(x) = k \\sin(\\pi x)$$ on $$[0, 1]$$, explain how to determine $$k$$ and what the density's shape looks like. (3 steps)", "answer": "- Step 1: Non-negativity: $$\\sin(\\pi x) \\geq 0$$ on $$[0, 1]$$ (since $$\\pi x \\in [0, \\pi]$$ where sine is non-negative). So $$k > 0$$ works.\n- Step 2: Normalisation: $$\\int_0^1 k \\sin(\\pi x)\\,dx = k \\cdot \\frac{2}{\\pi}$$ (using $$\\int \\sin = -\\cos$$ and the values $$\\cos 0 = 1$$, $$\\cos \\pi = -1$$).\n- Step 3: Setting $$2k/\\pi = 1$$ gives $$k = \\pi/2$$.\n\nShape: a half-sine bump, zero at both endpoints, peaked at $$x = 0.5$$ with peak value $$\\pi/2 \\approx 1.57$$. Notice $$f$$ exceeds 1 at the peak — fine for a density, not a probability.", "source": "Opus 4.7 ②", "_id": "opus_2_73", "judge_pick": false}, {"question": "A p.d.f. $$f(x) = 2x$$ on $$[0, 1]$$. Without calculating, predict whether the mean is greater than, less than, or equal to 0.5. (2 steps)", "answer": "- Step 1: The p.d.f. $$f(x) = 2x$$ is linearly increasing. More probability density is concentrated near $$x = 1$$ than near $$x = 0$$.\n- Step 2: Since more mass lies on the right, the balance point (mean) must be pulled toward larger $$x$$. So $$\\mathrm{E}(X) > 0.5$$.\n\nActual value (confirmation): $$\\mathrm{E}(X) = \\int_0^1 2x^2\\,dx = 2/3 \\approx 0.67$$. Consistent with the prediction.\n\nIntuition: the mean is the \"balance point\" of the density profile. Shifts in mass shift the balance.", "source": "Opus 4.7 ②", "_id": "opus_2_74", "judge_pick": true}, {"question": "For the p.d.f. $$f(x) = 2x$$ on $$[0, 1]$$, qualitatively compare the mode, median, and mean. (3 steps)", "answer": "- Step 1: **Mode**: $$f$$ is strictly increasing, so max is at right endpoint: mode = 1.\n- Step 2: **Median**: c.d.f. is $$F(x) = x^2$$ on $$[0, 1]$$. Solve $$m^2 = 0.5$$: $$m = 1/\\sqrt{2} \\approx 0.71$$.\n- Step 3: **Mean**: $$2/3 \\approx 0.67$$.\n\nOrdering: mean $$\\approx 0.67 < $$ median $$\\approx 0.71 < $$ mode $$= 1$$.\n\nThis is the characteristic pattern when support is bounded and density increases toward the boundary — the three measures separate, with mode at the boundary.", "source": "Opus 4.7 ②", "_id": "opus_2_75", "judge_pick": false}, {"question": "For a p.d.f. $$f(x) = 12x^2(1-x)$$ on $$[0, 1]$$, find the mode using calculus. (3 steps)", "answer": "- Step 1: Expand: $$f(x) = 12x^2 - 12x^3$$. Differentiate: $$f'(x) = 24x - 36x^2 = 12x(2 - 3x)$$.\n- Step 2: Set $$f'(x) = 0$$: either $$x = 0$$ (a minimum, $$f(0) = 0$$) or $$x = 2/3$$.\n- Step 3: Check $$x = 2/3$$ is the max: $$f(2/3) = 12 \\cdot (4/9) \\cdot (1/3) = 48/27 > 0$$. Second derivative confirms it's a maximum.\n\nSo mode = $$2/3$$ — not the midpoint $$0.5$$. The density is skewed by the $$x^2$$ factor, pulling the peak rightward.", "source": "Opus 4.7 ②", "_id": "opus_2_76", "judge_pick": false}, {"question": "A continuous RV has p.d.f. $$f(x) = \\frac{3}{32}(4 - x^2)$$ on $$[-2, 2]$$. Describe the shape and state the mean, median, and mode. (3 steps)", "answer": "- Step 1: **Symmetry**: $$f(-x) = f(x)$$ since $$(-x)^2 = x^2$$. So $$f$$ is symmetric about $$x = 0$$.\n- Step 2: **Mean and median**: by symmetry, both equal 0.\n- Step 3: **Mode**: $$f$$ is a downward-opening parabola, peaked at $$x = 0$$ where $$f(0) = 12/32 = 3/8$$. Zero at $$x = \\pm 2$$. So mode = 0.\n\nClassic symmetric unimodal distribution: mean = median = mode = 0.", "source": "Opus 4.7 ②", "_id": "opus_2_77", "judge_pick": true}, {"question": "A c.d.f. is given as $$F(y) = k(y^2 - y)$$ on $$[1, 2]$$. Find $$k$$, the p.d.f., and the median. (4 steps)", "answer": "- Step 1: Use $$F(2) = 1$$: $$k(4 - 2) = 2k = 1$$, so $$k = 1/2$$. Check $$F(1) = 0$$ ✓.\n- Step 2: P.d.f.: $$f(y) = F'(y) = \\frac{1}{2}(2y - 1)$$ for $$y \\in [1, 2]$$. Note $$f(y) \\geq 1/2 > 0$$ on this interval ✓.\n- Step 3: Median: solve $$F(m) = 0.5$$: $$\\frac{1}{2}(m^2 - m) = 0.5$$, giving $$m^2 - m - 1 = 0$$.\n- Step 4: Quadratic formula: $$m = \\frac{1 \\pm \\sqrt{5}}{2}$$. Take the root in $$[1, 2]$$: $$m = \\frac{1 + \\sqrt{5}}{2} \\approx 1.618$$ — the golden ratio!\n\nThe lower root $$\\frac{1 - \\sqrt{5}}{2} < 0$$ is outside the support and rejected.", "source": "Opus 4.7 ②", "_id": "opus_2_78", "judge_pick": false}, {"question": "A p.d.f. has the form $$f(x) = ax + b$$ on $$[0, 2]$$, and you're told $$\\mathrm{E}(X) = 9/8$$. How do you find $$a$$ and $$b$$? (4 steps)", "answer": "- Step 1: **Normalisation**: $$\\int_0^2 (ax + b)\\,dx = 2a + 2b = 1$$, so $$a + b = 1/2$$. (Equation 1.)\n- Step 2: **Mean constraint**: $$\\mathrm{E}(X) = \\int_0^2 x(ax + b)\\,dx = \\int_0^2 (ax^2 + bx)\\,dx = \\frac{8a}{3} + 2b = \\frac{9}{8}$$. (Equation 2.)\n- Step 3: From Eq. 1: $$b = 1/2 - a$$. Substitute into Eq. 2: $$\\frac{8a}{3} + 1 - 2a = \\frac{9}{8} \\Rightarrow \\frac{2a}{3} = \\frac{1}{8} \\Rightarrow a = \\frac{3}{16}$$.\n- Step 4: Then $$b = \\frac{1}{2} - \\frac{3}{16} = \\frac{5}{16}$$.\n\nTechnique: two unknown constants require two equations — typically normalisation and a moment constraint (mean, etc.).", "source": "Opus 4.7 ②", "_id": "opus_2_79", "judge_pick": true}, {"question": "For a continuous RV $$X$$ with p.d.f. $$f(x) = 2 - 2x$$ on $$[0, 1]$$, compute the c.d.f., mode, median, and mean. (5 steps)", "answer": "- Step 1: **C.d.f.**: $$F(x) = \\int_0^x (2 - 2t)\\,dt = 2x - x^2$$ on $$[0, 1]$$.\n- Step 2: **Mode**: $$f$$ is decreasing linear on $$[0, 1]$$, max at left endpoint. Mode = 0.\n- Step 3: **Median**: $$F(m) = 2m - m^2 = 0.5 \\Rightarrow m^2 - 2m + 0.5 = 0 \\Rightarrow m = 1 \\pm \\frac{\\sqrt{2}}{2}$$. Only $$m = 1 - \\frac{\\sqrt{2}}{2} \\approx 0.293$$ lies in $$[0, 1]$$.\n- Step 4: **Mean**: $$\\mathrm{E}(X) = \\int_0^1 x(2 - 2x)\\,dx = 1 - 2/3 = 1/3 \\approx 0.333$$.\n- Step 5: **Summary**: mode = 0, median ≈ 0.29, mean ≈ 0.33. Ordering: mode < median < mean — right-skewed-feeling (density highest on left, decaying).", "source": "Opus 4.7 ②", "_id": "opus_2_80", "judge_pick": false}, {"question": "A uniform distribution on $$[0, 10]$$ has $$f(x) = 1/10$$ on that interval. Without full calculation, find the mean, median, and variance. (3 steps)", "answer": "- Step 1: **Mean**: by symmetry about the midpoint, $$\\mathrm{E}(X) = 5$$.\n- Step 2: **Median**: by symmetry, equals the mean: $$m = 5$$. Check: $$F(5) = 5/10 = 0.5$$ ✓.\n- Step 3: **Variance**: for a uniform on $$[a, b]$$, $$\\mathrm{Var}(X) = \\frac{(b-a)^2}{12}$$. Here: $$\\frac{100}{12} = \\frac{25}{3} \\approx 8.33$$.\n\nThe $$(b-a)^2/12$$ comes from: spread scales with interval width squared; the factor 12 is the normalization for uniform distributions.", "source": "Opus 4.7 ②", "_id": "opus_2_81", "judge_pick": false}, {"question": "For a continuous RV with c.d.f. $$F(x) = 2x^2 - x^4$$ on $$[0, 1]$$, find the mode. (3 steps)", "answer": "- Step 1: Differentiate to get p.d.f.: $$f(x) = F'(x) = 4x - 4x^3$$ on $$[0, 1]$$.\n- Step 2: Maximum: solve $$f'(x) = 0$$: $$f'(x) = 4 - 12x^2 = 0 \\Rightarrow x^2 = 1/3 \\Rightarrow x = 1/\\sqrt{3}$$ (positive root).\n- Step 3: Verify maximum: $$f''(x) = -24x < 0$$ at $$x = 1/\\sqrt{3}$$ ✓.\n\nMode = $$1/\\sqrt{3} \\approx 0.577$$. Process: c.d.f. → p.d.f. (differentiate once) → mode (differentiate again and solve).", "source": "Opus 4.7 ②", "_id": "opus_2_82", "judge_pick": false}, {"question": "The life $$X$$ of a lightbulb (in thousands of hours) has p.d.f. $$f(x) = 2.5 e^{-2.5x}$$ for $$x \\geq 0$$. Find the median and interpret it. (3 steps)", "answer": "- Step 1: C.d.f.: $$F(x) = \\int_0^x 2.5 e^{-2.5t}\\,dt = 1 - e^{-2.5x}$$.\n- Step 2: Solve $$F(m) = 0.5$$: $$1 - e^{-2.5m} = 0.5 \\Rightarrow e^{-2.5m} = 0.5 \\Rightarrow m = \\frac{\\ln 2}{2.5} \\approx 0.277$$ thousand hours ($$\\approx 277$$ hours).\n- Step 3: Interpretation: half the bulbs fail by ~277 hours. But mean life = $$1/2.5 = 0.4$$ thousand hours = 400 hours. So mean > median, typical of right-skewed (exponential) distributions — a few long-lived bulbs pull the mean up.", "source": "Opus 4.7 ②", "_id": "opus_2_83", "judge_pick": true}, {"question": "A cube has randomly-generated side length $$X$$ with $$\\mathrm{E}(X) = 31$$ and $$\\mathrm{E}(X^2) = 983$$. Find the variance and explain why the expected volume cannot be computed from this info alone. (3 steps)", "answer": "- Step 1: **Variance**: $$\\mathrm{Var}(X) = 983 - 31^2 = 983 - 961 = 22$$. SD $$\\approx \\sqrt{22} \\approx 4.7$$.\n- Step 2: **Expected volume**: $$V = X^3$$, so $$\\mathrm{E}(V) = \\mathrm{E}(X^3)$$, requiring a separate integral $$\\int x^3 f(x)\\,dx$$.\n- Step 3: **Key point**: $$\\mathrm{E}(X^3) \\neq (\\mathrm{E}(X))^3 = 31^3$$. Cubing is non-linear — convexity means $$\\mathrm{E}(X^3) > (\\mathrm{E}(X))^3$$, with the excess reflecting $$X$$'s variability.\n\nTo find $$\\mathrm{E}(V)$$, you'd need the full p.d.f., not just two moments.", "source": "Opus 4.7 ②", "_id": "opus_2_84", "judge_pick": true}, {"question": "If you have a c.d.f. on $$[0, 10]$$ given by $$F(x) = x^2/100$$, find $$\\mathrm{E}(X^2)$$ — without just quoting a formula. (3 steps)", "answer": "- Step 1: First find the p.d.f. from $$F$$: $$f(x) = F'(x) = x/50$$ on $$[0, 10]$$.\n- Step 2: Apply the expectation formula for $$X^2$$: $$\\mathrm{E}(X^2) = \\int_0^{10} x^2 \\cdot \\frac{x}{50}\\,dx = \\frac{1}{50} \\int_0^{10} x^3\\,dx$$.\n- Step 3: Evaluate: $$\\frac{1}{50} \\cdot \\frac{10^4}{4} = \\frac{10000}{200} = 50$$.\n\nHigher-moment calculations always reduce to integrating $$x^n f(x)$$. From $$F$$, differentiate to get $$f$$, then integrate against $$x^n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_85", "judge_pick": false}, {"question": "For a p.d.f. defined by two pieces — $$f_1$$ on $$[a, c]$$ and $$f_2$$ on $$[c, b]$$ — with one piece linear and one constant, where could the mode lie? (3 steps)", "answer": "- Step 1: The mode is where $$f$$ achieves its maximum. A constant region has a fixed height; a linear region's extremum is at an endpoint.\n- Step 2: Compare:\n+ Constant piece: height $$= c_0$$ (some value).\n+ Linear piece: evaluate at its endpoints; max is at whichever endpoint is higher.\n- Step 3: The mode is wherever $$f$$ reaches its peak overall:\n+ If linear piece peaks above $$c_0$$: mode is at the linear piece's endpoint.\n+ If constant exceeds linear's maximum: mode is on the constant region (and is not unique — any point there is a mode).\n\nAlways sketch. The peak is usually obvious visually.", "source": "Opus 4.7 ②", "_id": "opus_2_86", "judge_pick": true}, {"question": "A p.d.f. is $$f(x) = k$$ on $$[1, 2]$$ and $$f(x) = k(x-1)$$ on $$[2, 4]$$, with $$k = 1/5$$. Find $$\\mathrm{P}(X > 3)$$ using geometry rather than integration. (3 steps)", "answer": "- Step 1: Sketch the p.d.f.:\n+ On $$[1, 2]$$: rectangle of height $$1/5$$.\n+ On $$[2, 4]$$: linearly increasing from $$1/5$$ at $$x = 2$$ to $$3/5$$ at $$x = 4$$.\n- Step 2: For $$\\mathrm{P}(X > 3)$$: need area under $$f$$ from $$x = 3$$ to $$x = 4$$. This is a trapezoid.\n+ At $$x = 3$$: $$f(3) = \\frac{1}{5}(3-1) = 2/5$$.\n+ At $$x = 4$$: $$f(4) = 3/5$$.\n+ Width = 1.\n- Step 3: Trapezoid area: $$\\frac{1}{2}(2/5 + 3/5)(1) = \\frac{1}{2} \\cdot 1 = 1/2$$.\n\nSo $$\\mathrm{P}(X > 3) = 1/2$$. Geometry is much faster than integration for piecewise-linear p.d.f.s.", "source": "Opus 4.7 ②", "_id": "opus_2_87", "judge_pick": false}, {"question": "If you're given $$\\mathrm{E}(X) = 3$$ and $$\\mathrm{Var}(X) = 4$$, what are $$\\mathrm{E}(2X - 5)$$ and $$\\mathrm{Var}(2X - 5)$$? (2 steps)", "answer": "- Step 1: **Mean**: $$\\mathrm{E}(2X - 5) = 2\\mathrm{E}(X) - 5 = 6 - 5 = 1$$. The linear rule pulls through: scale by 2, shift by $$-5$$.\n- Step 2: **Variance**: $$\\mathrm{Var}(2X - 5) = 2^2 \\cdot \\mathrm{Var}(X) = 4 \\cdot 4 = 16$$. The shift by $$-5$$ is invisible; scale of 2 becomes 4 in variance.\n\nSD: $$\\mathrm{SD}(2X - 5) = \\sqrt{16} = 4 = |2| \\cdot \\sqrt{4}$$. Consistent with $$\\mathrm{SD}(aX + b) = |a|\\mathrm{SD}(X)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_88", "judge_pick": false}, {"question": "Your data analysis shows $$\\mathrm{E}(X) = \\mu$$ and you want to evaluate $$\\mathrm{P}(X > \\mu)$$. Why can't you assume this equals 0.5 without more info? (3 steps)", "answer": "- Step 1: $$\\mathrm{P}(X > \\mu) = 0.5$$ would require $$\\mu$$ to be the median, not just the mean.\n- Step 2: Mean balances mass (center of mass), median balances probability (50/50 split). For symmetric distributions, mean = median. For skewed ones, they differ.\n- Step 3: Specifically:\n+ Right-skewed: mean > median, so $$\\mathrm{P}(X > \\mu) < 0.5$$.\n+ Left-skewed: mean < median, so $$\\mathrm{P}(X > \\mu) > 0.5$$.\n+ Symmetric: $$\\mathrm{P}(X > \\mu) = 0.5$$.\n\nWithout distribution info, you cannot assume anything about $$\\mathrm{P}(X > \\mu)$$ beyond the bounds $$(0, 1)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_89", "judge_pick": false}, {"question": "For a partial-fraction p.d.f. $$f(x) = \\frac{c}{x(3-x)}$$ on $$[1, 2]$$, describe the process for finding $$c$$. (3 steps)", "answer": "- Step 1: Normalisation: $$\\int_1^2 \\frac{c}{x(3-x)}\\,dx = 1$$.\n- Step 2: Partial fractions: $$\\frac{1}{x(3-x)} = \\frac{1}{3}\\left(\\frac{1}{x} + \\frac{1}{3-x}\\right)$$ (check: adding gives $$\\frac{(3-x)+x}{x(3-x)} = \\frac{3}{x(3-x)}$$, times $$\\frac{1}{3}$$ gives the original).\n- Step 3: Antiderivative: $$\\frac{1}{3}(\\ln x - \\ln(3-x)) = \\frac{1}{3}\\ln\\frac{x}{3-x}$$. Evaluate from 1 to 2:\n+ At 2: $$\\frac{1}{3}\\ln 2$$\n+ At 1: $$\\frac{1}{3}\\ln \\frac{1}{2} = -\\frac{1}{3}\\ln 2$$\n+ Difference: $$\\frac{2}{3}\\ln 2 = \\frac{\\ln 4}{3}$$.\nSetting $$c \\cdot \\frac{\\ln 4}{3} = 1$$: $$c = \\frac{3}{\\ln 4}$$.\n\nPartial fractions is the key technique for rational-function p.d.f.s.", "source": "Opus 4.7 ②", "_id": "opus_2_90", "judge_pick": false}, {"question": "How does the fundamental theorem of calculus apply to the relationship between p.d.f. and c.d.f.? (3 steps)", "answer": "- Step 1: FTC Part 1: $$\\frac{d}{dx} \\int_a^x f(t)\\,dt = f(x)$$ — differentiating an integral (as a function of its upper limit) recovers the integrand.\n- Step 2: Applied to probability: $$F(x) = \\int_{-\\infty}^x f(t)\\,dt$$. Differentiating: $$F'(x) = f(x)$$.\n- Step 3: FTC Part 2: $$\\int_a^b f(x)\\,dx = F(b) - F(a)$$ — integrating a function equals the change in its antiderivative. Applied: $$\\mathrm{P}(a < X < b) = F(b) - F(a)$$.\n\nThe FTC is what makes the p.d.f./c.d.f. relationship so clean — differentiation and integration as inverses give us two complementary views of the same distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_91", "judge_pick": true}, {"question": "Why is it sometimes said that the c.d.f. contains \"all the information\" about a distribution? (3 steps)", "answer": "- Step 1: The c.d.f. $$F$$ determines the p.d.f. via $$f = F'$$. So knowing $$F$$ gives you $$f$$.\n- Step 2: From $$F$$ (or $$f$$), you can compute:\n+ Any probability: $$\\mathrm{P}(a < X < b) = F(b) - F(a)$$.\n+ Any moment: $$\\mathrm{E}(X^n) = \\int x^n f(x)\\,dx$$.\n+ Any percentile: solve $$F(x) = p$$.\n+ Mode, median, variance, etc.\n- Step 3: Conversely, two distributions with different $$F$$s are different distributions. So the c.d.f. is a complete summary.\n\nThe p.d.f. (when it exists) is equally informative, since they're related by differentiation/integration. Either fully characterises the distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_92", "judge_pick": true}, {"question": "For a continuous RV with p.d.f. $$f(x) = \\frac{3}{8}(1 + x^2)$$ on $$[-1, 1]$$, find $$\\mathrm{E}(X)$$ without integrating. (2 steps)", "answer": "- Step 1: Check symmetry: $$f(-x) = \\frac{3}{8}(1 + (-x)^2) = \\frac{3}{8}(1 + x^2) = f(x)$$. So $$f$$ is symmetric about $$x = 0$$.\n- Step 2: By symmetry, $$\\mathrm{E}(X) = 0$$ (axis of symmetry).\n\nNo integration needed. Whenever a p.d.f. is even (symmetric about $$x = c$$), the mean is $$c$$. This shortcut should always be your first check.", "source": "Opus 4.7 ②", "_id": "opus_2_93", "judge_pick": false}, {"question": "A p.d.f. is the half-cosine $$f(x) = \\pi \\cos(\\pi x)$$ on $$[0, 1/2]$$. Find the c.d.f. and verify it's valid. (3 steps)", "answer": "- Step 1: C.d.f.: $$F(x) = \\int_0^x \\pi \\cos(\\pi t)\\,dt = [\\sin(\\pi t)]_0^x = \\sin(\\pi x)$$ for $$0 \\leq x \\leq 1/2$$.\n- Step 2: Check boundaries: $$F(0) = \\sin 0 = 0$$ ✓. $$F(1/2) = \\sin(\\pi/2) = 1$$ ✓.\n- Step 3: Check monotonicity: $$F'(x) = \\pi \\cos(\\pi x) = f(x)$$, which is $$\\geq 0$$ on $$[0, 1/2]$$ (since $$\\pi x \\in [0, \\pi/2]$$, cosine non-negative). ✓\n\nFull specification:\n+ $$F(x) = 0$$ for $$x < 0$$\n+ $$F(x) = \\sin(\\pi x)$$ for $$0 \\leq x \\leq 1/2$$\n+ $$F(x) = 1$$ for $$x > 1/2$$", "source": "Opus 4.7 ②", "_id": "opus_2_94", "judge_pick": false}, {"question": "What's the relationship between the p.d.f. value at a point $$f(x)$$ and the probability in a tiny neighbourhood of $$x$$? (3 steps)", "answer": "- Step 1: For a small interval $$[x, x + \\Delta x]$$: $$\\mathrm{P}(x < X < x + \\Delta x) \\approx f(x) \\cdot \\Delta x$$ (density times width).\n- Step 2: This is exact in the limit $$\\Delta x \\to 0$$, becoming the integrand $$f(x)\\,dx$$. So $$f(x)\\,dx$$ is the \"infinitesimal probability\" at $$x$$.\n- Step 3: Interpretation:\n+ Places where $$f$$ is large → probability accumulates quickly → more likely to observe values there.\n+ Places where $$f$$ is small → probability accumulates slowly → less likely.\n+ But no single point has positive probability on its own — only intervals.\n\nThis makes the p.d.f. a \"rate\" — analogous to velocity (rate of position change) or mass density.", "source": "Opus 4.7 ②", "_id": "opus_2_95", "judge_pick": true}, {"question": "For a c.d.f. $$F(x) = k(x - 1 + \\ln x)$$ on $$[1, 3]$$, find $$k$$ and the resulting p.d.f. (3 steps)", "answer": "- Step 1: Check $$F(1) = k(1 - 1 + \\ln 1) = k \\cdot 0 = 0$$ ✓ (automatically).\nUse $$F(3) = 1$$: $$k(3 - 1 + \\ln 3) = k(2 + \\ln 3) = 1$$, so $$k = \\frac{1}{2 + \\ln 3}$$.\n- Step 2: Differentiate: $$F'(x) = k(1 + 1/x) = k \\cdot \\frac{x + 1}{x}$$.\n- Step 3: So $$f(x) = \\frac{1}{2 + \\ln 3} \\cdot \\frac{x+1}{x}$$ for $$x \\in [1, 3]$$, and zero elsewhere.\n\nVerify non-negativity: on $$[1, 3]$$, $$(x+1)/x > 0$$ and $$k > 0$$, so $$f > 0$$ ✓.", "source": "Opus 4.7 ②", "_id": "opus_2_96", "judge_pick": false}, {"question": "If $$F$$ is a given c.d.f. and you want to determine which of several candidates is the p.d.f. $$f$$, what's the one-line test? (2 steps)", "answer": "- Step 1: Differentiate $$F$$ to get the unique p.d.f.: $$f = F'$$.\n- Step 2: Compare with candidates. The p.d.f. must:\n+ Equal $$F'(x)$$ on the support.\n+ Be zero outside the support.\n+ Be non-negative everywhere.\n\nThe inverse direction: integrating $$f$$ should give $$F$$ (up to a constant determined by $$F(a) = 0$$). The two functions are a differentiation/integration pair.", "source": "Opus 4.7 ②", "_id": "opus_2_97", "judge_pick": false}, {"question": "Suppose you have $$F(x) = 1 - e^{-\\lambda x}$$ for $$x \\geq 0$$. Verify this is a valid c.d.f. and find the p.d.f. (3 steps)", "answer": "- Step 1: **Boundaries**: $$F(0) = 1 - 1 = 0$$ ✓. $$F(x) \\to 1$$ as $$x \\to \\infty$$ (since $$e^{-\\lambda x} \\to 0$$) ✓.\n- Step 2: **Monotonicity**: $$F'(x) = \\lambda e^{-\\lambda x} > 0$$ for all $$x \\geq 0$$, so $$F$$ is increasing ✓.\n- Step 3: **P.d.f.**: $$f(x) = F'(x) = \\lambda e^{-\\lambda x}$$ for $$x \\geq 0$$, and $$f(x) = 0$$ for $$x < 0$$.\n\nThis is the exponential distribution — its c.d.f. is the simpler expression; its p.d.f. follows by differentiation.", "source": "Opus 4.7 ②", "_id": "opus_2_98", "judge_pick": true}, {"question": "What does the statement \"for continuous RVs, $$F$$ must be continuous\" really mean, and what distinguishes this from the discrete case? (3 steps)", "answer": "- Step 1: \"$$F$$ continuous\" means no vertical jumps — $$F$$ rises smoothly as $$x$$ increases.\n- Step 2: For a discrete RV, $$F$$ is a **step function** with jumps at each mass point. Jump size at $$x = c$$ equals $$\\mathrm{P}(X = c)$$.\n- Step 3: Between jumps, the discrete $$F$$ is flat (no mass). For continuous RVs, there are no jumps (all $$\\mathrm{P}(X = c) = 0$$), and $$F$$ is rising or flat (never jumping).\n+ Rising = probability accumulating (where $$f > 0$$).\n+ Flat = no probability there (where $$f = 0$$).\n\nThis is the geometric fingerprint distinguishing continuous from discrete.", "source": "Opus 4.7 ②", "_id": "opus_2_99", "judge_pick": true}, {"question": "For a continuous RV $$X$$ with p.d.f. $$f(x)$$, is it meaningful to write $$\\mathrm{P}(X = x) = f(x) \\cdot dx$$? (3 steps)", "answer": "- Step 1: Heuristically, yes — this is the \"infinitesimal probability\" in a tiny interval around $$x$$. Rigorously, $$dx$$ is an infinitesimal, not a number, so this expression is informal.\n- Step 2: The proper statement is: for small $$\\Delta x$$, $$\\mathrm{P}(x < X < x + \\Delta x) \\approx f(x) \\Delta x$$. The approximation becomes exact as $$\\Delta x \\to 0$$, giving $$f(x)\\,dx$$ inside the integral.\n- Step 3: This intuition is useful for building mental models:\n+ Density × width = probability (over small intervals).\n+ Integrating density = total probability.\n+ Density itself is not probability — probability emerges only when combined with a width.\n\nUse this intuition, but remember the formal statement requires limits/integrals.", "source": "Opus 4.7 ②", "_id": "opus_2_100", "judge_pick": true}, {"question": "For a piecewise-defined p.d.f. with three pieces, how many calculations do you need for the c.d.f.? (3 steps)", "answer": "- Step 1: You need **three pieces** of the c.d.f., plus the two extensions (0 below support, 1 above). So essentially 5 regions total.\n- Step 2: Each piece involves:\n+ Integrating the corresponding $$f_i$$ from the previous boundary up to $$x$$.\n+ Adding the cumulative value $$F$$(previous boundary).\n- Step 3: In detail, for pieces on $$[a, b]$$, $$[b, c]$$, $$[c, d]$$:\n+ $$F(x) = 0$$ for $$x < a$$.\n+ $$F(x) = \\int_a^x f_1$$ for $$a \\leq x \\leq b$$.\n+ $$F(x) = F(b) + \\int_b^x f_2$$ for $$b \\leq x \\leq c$$.\n+ $$F(x) = F(c) + \\int_c^x f_3$$ for $$c \\leq x \\leq d$$.\n+ $$F(x) = 1$$ for $$x > d$$.\n\nVerify $$F(d) = 1$$ as a sanity check.", "source": "Opus 4.7 ②", "_id": "opus_2_101", "judge_pick": false}, {"question": "A p.d.f. is $$f(x) = \\frac{1}{x \\ln 5}$$ on $$[2, 10]$$. Where is the mode, and why? (3 steps)", "answer": "- Step 1: $$f(x) = \\frac{1}{x \\ln 5}$$ is strictly decreasing on $$[2, 10]$$ (as $$x$$ increases, $$1/x$$ decreases).\n- Step 2: The maximum of a strictly decreasing function on a closed interval is at the **left endpoint**: $$x = 2$$. So mode = 2.\n- Step 3: Value at mode: $$f(2) = \\frac{1}{2 \\ln 5} \\approx 0.311$$. The derivative test ($$f' = 0$$) is useless here since $$f' < 0$$ throughout.\n\nSketching $$1/x$$: the decreasing hyperbola immediately shows the mode at the left. Always think about monotonicity first.", "source": "Opus 4.7 ②", "_id": "opus_2_102", "judge_pick": true}, {"question": "How would you compute the probability that a continuous RV $$X$$ with c.d.f. $$F$$ lies in two disjoint intervals, e.g., $$\\mathrm{P}(X \\in [1, 2] \\cup [4, 5])$$? (2 steps)", "answer": "- Step 1: Compute the probability for each interval separately using the c.d.f.:\n+ $$\\mathrm{P}(1 < X < 2) = F(2) - F(1)$$\n+ $$\\mathrm{P}(4 < X < 5) = F(5) - F(4)$$\n- Step 2: Since the intervals are disjoint, the total probability is the **sum**: $ does it matter to \"fully specify\" the c.d.f. over all of $$\\mathbb{R}$$, not just where the p.d.f. is non-zero? (3 steps)", "answer": "- Step 1: The c.d.f. is a function of $$x \\in \\mathbb{R}$$, not just over the support. For any real $$x$$, we want to ask \"what's the probability $$X \\leq x$$?\".\n- Step 2: For $$x$$ below the support: $$X$$ can never be there, so $$F(x) = 0$$. For $$x$$ above the support: $$X$$ is certainly there (or already past), so $$F(x) = 1$$.\n- Step 3: Omitting these regions gives an incomplete function. In exam work, \"fully specify $$F(x)$$\" means all three branches:\n+ $$F(x) = 0$$ below lower support\n+ Formula on the support\n+ $$F(x) = 1$$ above upper support\n\nWithout all three, the c.d.f. isn't \"fully specified\" and you lose marks.", "source": "Opus 4.7 ②", "_id": "opus_2_106", "judge_pick": true}, {"question": "Given a c.d.f., how can you verify quickly that you've derived the correct p.d.f.? (3 steps)", "answer": "- Step 1: **Differentiate check**: compute $$\\frac{d}{dx} F(x)$$ for the support region. This should match your p.d.f.\n- Step 2: **Integrate check**: integrate the p.d.f. over the full support. This should equal 1.\n- Step 3: **Sanity check**: verify the p.d.f. is non-negative everywhere and zero outside the support. Verify $$F$$ is continuous at boundaries (no jumps). Verify boundary values: $$F = 0$$ below, $$F = 1$$ above.\n\nIf all checks pass, you have a valid (p.d.f., c.d.f.) pair.", "source": "Opus 4.7 ②", "_id": "opus_2_107", "judge_pick": false}, {"question": "If a p.d.f. has the form $$f(x) = k \\sec^2(\\pi x)$$ on $$[0, 0.25]$$, explain how to find $$k$$ and compute the median. (4 steps)", "answer": "- Step 1: Antiderivative of $$\\sec^2(\\pi x)$$ is $$\\frac{\\tan(\\pi x)}{\\pi}$$.\n- Step 2: Normalisation: $$\\int_0^{0.25} k \\sec^2(\\pi x)\\,dx = k \\cdot \\frac{\\tan(\\pi/4) - \\tan 0}{\\pi} = \\frac{k}{\\pi}(1 - 0) = \\frac{k}{\\pi} = 1$$. So $$k = \\pi$$.\n- Step 3: C.d.f.: $$F(x) = \\tan(\\pi x)$$ on $$[0, 0.25]$$.\n- Step 4: Median: solve $$\\tan(\\pi m) = 0.5$$, so $$\\pi m = \\arctan(0.5)$$, giving $$m = \\frac{\\arctan(0.5)}{\\pi} \\approx 0.148$$.\n\nTechniques: recognise trigonometric antiderivative, apply normalisation to find constants, invert c.d.f. for median.", "source": "Opus 4.7 ②", "_id": "opus_2_108", "judge_pick": false}, {"question": "Why does the formula $$\\mathrm{E}(X) = \\int x f(x)\\,dx$$ always produce a value within the support of $$X$$ (assuming the support is connected)? (3 steps)", "answer": "- Step 1: Suppose the support is $$[a, b]$$. Then $$f(x) = 0$$ outside $$[a, b]$$, so only $$x$$-values in $$[a, b]$$ contribute to the integral.\n- Step 2: For $$x \\in [a, b]$$, we have $$a \\leq x \\leq b$$. Multiplying by $$f(x) \\geq 0$$ and integrating gives: $$a \\int f \\leq \\int x f \\leq b \\int f$$, i.e., $$a \\leq \\mathrm{E}(X) \\leq b$$.\n- Step 3: So the mean always lies within the support. Moreover, $$\\mathrm{E}(X) = a$$ or $$\\mathrm{E}(X) = b$$ only in degenerate cases (probability concentrated at an endpoint).\n\nThis is intuitive: a weighted average of values in $$[a, b]$$ must itself be in $$[a, b]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_109", "judge_pick": true}, {"question": "Suppose you're told $$\\mathrm{F}(x) = 0.05 a^x - b$$ on $$[1, 2]$$ for positive constants $$a, b$$. Outline the strategy for finding $$a$$ and $$b$$. (3 steps)", "answer": "- Step 1: Apply $$F(1) = 0$$: $$0.05a - b = 0$$ ⟹ $$b = 0.05a$$. (Equation 1.)\n- Step 2: Apply $$F(2) = 1$$: $$0.05 a^2 - b = 1$$. (Equation 2.)\n- Step 3: Substitute Equation 1 into 2: $$0.05 a^2 - 0.05 a = 1$$ ⟹ $$0.05a(a - 1) = 1$$ ⟹ $$a(a-1) = 20$$ ⟹ $$a^2 - a - 20 = 0$$. Factor: $$(a - 5)(a + 4) = 0$$. Positive root: $$a = 5$$. Then $$b = 0.25$$.\n\nMethod: always use both boundary conditions to form two equations in two unknowns.", "source": "Opus 4.7 ②", "_id": "opus_2_110", "judge_pick": false}, {"question": "What's the qualitative behaviour of the c.d.f.'s slope in regions where the p.d.f. is high vs low? (3 steps)", "answer": "- Step 1: $$F'(x) = f(x)$$ by the fundamental theorem of calculus.\n- Step 2: Where $$f(x)$$ is large: $$F$$ rises steeply (rapid accumulation of probability).\n- Step 3: Where $$f(x)$$ is small: $$F$$ rises gently (slow accumulation). Where $$f(x) = 0$$: $$F$$ is flat (no new probability).\n\nSo the \"steepness\" of the c.d.f. at any point visualises the density at that point. Peaks of $$f$$ correspond to steepest sections of $$F$$.", "source": "Opus 4.7 ②", "_id": "opus_2_111", "judge_pick": false}, {"question": "For a bimodal distribution (two peaks in the p.d.f.), what complications arise for mode, median, and mean? (3 steps)", "answer": "- Step 1: **Mode**: not unique — there are two (or more) local maxima. Typically we report the \"modes\" (plural) or the \"principal mode\" (highest peak). Some interval might even be \"as likely\" as another.\n- Step 2: **Median**: well-defined (the value at $$F = 0.5$$), but may fall in a \"valley\" between modes, where probability density is low. The median may be a poor summary of typical values in such cases.\n- Step 3: **Mean**: still well-defined as the centre of mass. But again may lie between the peaks, not close to either. The mean can be the most misleading single summary for bimodal distributions.\n\nBest approach for bimodal data: report both modes separately, or consider modelling as a mixture of two distributions.", "source": "Opus 4.7 ②", "_id": "opus_2_112", "judge_pick": true}, {"question": "A light bulb's lifetime (in years) has p.d.f. $$f(t) = 1.25 e^{-1.25t}$$ for $$t \\geq 0$$. Find the probability it lasts more than 3 years. (3 steps)", "answer": "- Step 1: Find $$F$$ first: $$F(t) = 1 - e^{-1.25 t}$$ for $$t \\geq 0$$ (standard exponential c.d.f.).\n- Step 2: Apply the complement: $$\\mathrm{P}(T > 3) = 1 - F(3) = 1 - (1 - e^{-3.75}) = e^{-3.75}$$.\n- Step 3: Numerically: $$e^{-3.75} \\approx 0.0235$$. So there's about a 2.3% chance const SK='s2_ch4';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('/api/notion',{method:'POST',signal:ctrl.signal,headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
