dpoint where maximum occurs).\n+ This illustrates an important point: for a symmetric distribution, mean = median, but mode can be different (especially at boundaries).", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": true}, {"question": "Why is it incorrect to treat a continuous random variable like a discrete one when calculating probabilities? What specifically goes wrong? (2 steps)", "answer": "- Step 1: For discrete variables, P(X = a) can be non-zero. For continuous variables, P(X = a) = 0. You cannot assign positive probability to individual points.\n- Step 2: If you tried to create a \"probability table\" like for discrete variables, you'd find every entry is zero, which is meaningless. The correct approach uses areas under curves (integrals), not point probabilities.\n+ Common misconception: Students sometimes try to find \"P(X = 2)\" for continuous distributions and get confused when the answer is always zero.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "When a p.d.f. is defined on a limited range (e.g., f(x) = kx for 2 ≤ x ≤ 4), why do we only integrate over that range when checking that total probability equals 1? (2 steps)", "answer": "- Step 1: By definition, f(x) = 0 outside the stated range. The integral over all real numbers splits into three parts: ∫₋∞² 0 dx + ∫₂⁴ f(x)dx + ∫₄^∞ 0 dx. The first and last terms are zero.\n- Step 2: So we only need ∫₂⁴ kx dx = 1 to find k. This is because the p.d.f. explicitly states f(x) = 0 otherwise — those regions contribute no probability.\n+ Important: Always check the \"otherwise\" clause in a p.d.f. definition — it tells you where f(x) = 0.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "The p.d.f. of a continuous random variable is f(x) = 3/16(4 - x²) for 0 ≤ x ≤ 2. Find the probability that X lies between 0.69 and 0.70, and explain why this is approximately f(0.695) × 0.01. (3 steps)", "answer": "- Step 1: The exact probability is ∫₀.₇⁰⁰⁰.₆⁹ f(x)dx. Computing this integral gives the exact answer.\n- Step 2: For very small intervals, the probability is approximately f(midpoint) × interval width. Here interval width = 0.01, midpoint ≈ 0.695.\n- Step 3: f(0.695) ≈ (3/16)(4 - 0.695²) ≈ (3/16)(4 - 0.483) ≈ (3/16)(3.517) ≈ 0.66. So P(0.69 < X < 0.70) ≈ 0.66 × 0.01 = 0.0066.\n+ This is a Riemann sum approximation: for narrow intervals, the p.d.f. is nearly constant, so area ≈ height × width.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "For a continuous random variable X with p.d.f. f(x), explain why P(a < X < b) = P(a ≤ X < b) = P(a < X ≤ b) = P(a ≤ X ≤ b). Why does this property not hold for discrete random variables? (2 steps)", "answer": "- Step 1: Since P(X = a) = P(X = b) = 0 for any continuous distribution, adding or removing the endpoints doesn't change the probability. The integral from a to b is the same whether you include the endpoints or not.\n- Step 2: For discrete variables, P(X = a) can be non-zero. So P(X ≤ a) differs from P(X < a) by exactly P(X = a). This makes a difference.\n+ This is why we can be \"sloppy\" with inequalities for continuous variables — it genuinely doesn't matter.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A continuous random variable X has c.d.f. F(x) = x²/100 for 0 ≤ x ≤ 10. How do you find the variance of X using this information? (3 steps)", "answer": "- Step 1: First find the p.d.f.: f(x) = dF/dx = 2x/100 = x/50 for 0 ≤ x ≤ 10.\n- Step 2: Find E(X): ∫₀¹⁰ x · (x/50) dx = (1/50)∫₀¹⁰ x² dx = (1/50)[x³/3]₀¹⁰ = 1000/150 = 20/3.\n- Step 3: Find E(X²): ∫₀¹⁰ x² · (x/50) dx = (1/50)∫₀¹⁰ x³ dx = (1/50)[x⁴/4]₀¹⁰ = 10000/200 = 50. Then Var(X) = E(X²) - [E(X)]² = 50 - (20/3)² = 50 - 400/9 = 50/9 ≈ 5.56.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "For a continuous random variable X, what does it mean if the p.d.f. has two equal local maxima? How would you describe the mode in this case? (2 steps)", "answer": "- Step 1: This is called a bimodal distribution — it has two modes (both local maxima). Each mode represents a peak in the probability density.\n- Step 2: Both peak values are called modes. For example, if f(x) = 1/4 for 0 ≤ x ≤ 1 and f(x) = 1/4 for 3 ≤ x ≤ 4 (with 0 elsewhere between), the modes are x = any value in [0,1] and x = any value in [3,4].\n+ In some contexts, the \"mode\" refers to the global maximum, but technically any local maximum is a mode. Most textbook problems have a unique mode for simplicity.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "Explain why the interquartile range (IQR) is often preferred over the range as a measure of spread for continuous distributions. What advantage does it have? (2 steps)", "answer": "- Step 1: The range (max - min) depends only on two extreme values and is very sensitive to outliers. The IQR uses the middle 50% of data, ignoring extremes.\n- Step 2: For continuous distributions, the \"range\" is often infinite or undefined, but the IQR is always well-defined as Q₃ - Q₁ from the c.d.f.\n+ The IQR is robust — it's not affected by whether the distribution has heavy tails or outliers, making it a more reliable measure of \"typical\" spread.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "The random variable X has p.d.f. f(x) = k/x for 1 ≤ x ≤ 7. Find k and explain why this p.d.f. is valid. (3 steps)", "answer": "- Step 1: Use the normalization condition: ∫₁⁷ k/x dx = 1. So k[ln x]₁⁷ = 1, giving k ln 7 = 1, so k = 1/ln 7.\n- Step 2: Check validity: f(x) = 1/(x ln 7) is positive for x ≥ 1, and the integral equals 1, so it's a valid p.d.f.\n+ This uses a logarithmic function — the integral of 1/x is ln x, which is why ln 7 appears in the denominator.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "If X is continuous with p.d.f. f(x), and you want to find P(X > μ) where μ = E(X), do you always get 0.5? Explain with an example. (2 steps)", "answer": "- Step 1: No! P(X > μ) = 0.5 only holds if the distribution is symmetric about the mean. The mean does not necessarily split probability in half.\n- Step 2: For example, in Exercise 4C question 3, with f(y) = y/8 for 0 ≤ y ≤ 4, E(Y) = 8/3 ≈ 2.67. Computing P(Y > 8/3) gives a value that is not 0.5 (the distribution is right-skewed, so P(Y > mean) < 0.5).\n+ Common misconception: Students confuse mean with median. Only for symmetric distributions are they equal.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "A continuous random variable T has p.d.f. f(t) = 1.25e^(-1.25t) for t ≥ 0 (exponential with λ = 1.25). Find: (a) F(t), (b) P(1 < T < 2), (c) P(T > 3). (3 steps)", "answer": "- Step 1: F(t) = ∫₀^t 1.25e^(-1.25u) du = [-e^(-1.25u)]₀^t = 1 - e^(-1.25t) for t ≥ 0.\n- Step 2: P(1 < T < 2) = F(2) - F(1) = (1 - e^(-2.5)) - (1 - e^(-1.25)) = e^(-1.25) - e^(-2.5) ≈ 0.221.\n+ Step 3: P(T > 3) = 1 - F(3) = e^(-1.25 × 3) = e^(-3.75) ≈ 0.023.\n\nThese are typical \"waiting time\" calculations for exponential distributions.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "When the p.d.f. is defined piecewise with different formulas on different intervals, explain how to compute E(X) correctly. (2 steps)", "answer": "- Step 1: You must integrate each piece separately over its interval, then add the results. The integral of xf(x) over the entire domain equals the sum of integrals over each sub-interval.\n- Step 2: For example, if f(x) = x/10 for 0 ≤ x < 2 and f(x) = (5 - x)/10 for 2 ≤ x ≤ 5, then:\nE(X) = ∫₀² x(x/10)dx + ∫₂⁵ x(5-x)/10 dx\nEach integral is computed over its specific range and results added together.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Why can't a function that takes negative values in its domain be a p.d.f.? What about a function that is positive everywhere but integrates to 0.5? (2 steps)", "answer": "- Step 1: A p.d.f. must satisfy f(x) ≥ 0 for all x. If f(x) < 0 anywhere, then negative probabilities would result from integration, which is impossible.\n- Step 2: A function that is positive everywhere but integrates to 0.5 cannot be a p.d.f. because the total area must equal 1 (certain event). It would need to be normalized by dividing by 0.5 to become valid.\n+ A valid p.d.f. requires BOTH conditions: non-negative AND integral equals 1.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "The random variable X has p.d.f. f(x) = 3/16(3 + 2x - x²) for -1 ≤ x ≤ 3. Without integrating, how can you find E(X)? Verify the result. (3 steps)", "answer": "- Step 1: By symmetry, the p.d.f. is symmetric about x = 1. This is because the quadratic -x² + 2x + 3 can be written as -(x - 1)² + 4, which is symmetric about x = 1.\n- Step 2: For any symmetric distribution about x = a, the mean equals the axis of symmetry: E(X) = 1.\n- Step 3: You can verify by computing: ∫₋₁³ x · (3/16)(3 + 2x - x²) dx. Due to symmetry, the positive and negative contributions around x = 1 balance, confirming E(X) = 1.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "For a continuous random variable, the 80th percentile is defined as the value p such that F(p) = 0.8. How do you find this from the c.d.f., and what does it represent? (2 steps)", "answer": "- Step 1: You solve F(p) = 0.8 for p. If the c.d.f. has a simple form, you solve algebraically. If not, you may need to use numerical methods or technology.\n- Step 2: The 80th percentile represents the value below which 80% of observations fall. It's a measure of location — like the median (50th percentile) or quartiles (25th, 75th), but for any desired percentage.\n+ The 10th to 90th percentile range contains the middle 80% of the distribution, useful for understanding spread independent of extremes.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A p.d.f. is defined as f(x) = kx³ for 1 ≤ x ≤ 4. Find k and compute P(1 < X < 2). (3 steps)", "answer": "- Step 1: Normalize: ∫₁⁴ kx³ dx = k[x⁴/4]₁⁴ = k(256/4 - 1/4) = k(255/4) = 1, so k = 4/255.\n- Step 2: P(1 < X < 2) = ∫₁² (4/255)x³ dx = (4/255)[x⁴/4]₁² = (1/255)(16 - 1) = 15/255 = 1/17.\n+ Step 3: This simplifies to approximately 0.0588. The probability is relatively small because the interval (1, 2) is much smaller than the full range (1, 4).", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "What is wrong with the following p.d.f. candidate? f(x) = x² for 1 ≤ x ≤ 3. Could it be modified to become a valid p.d.f.? (3 steps)", "answer": "- Step 1: The function is non-negative on [1, 3], so that condition is satisfied. However, ∫₁³ x² dx = [x³/3]₁³ = (27 - 1)/3 = 26/3 ≈ 8.67, which is not equal to 1.\n- Step 2: To make it valid, divide by the total area: f(x) = (3/26)x² for 1 ≤ x ≤ 3. Now ∫₁³ (3/26)x² dx = (3/26)(26/3) = 1.\n- Step 3: The constant 3/26 normalizes the distribution. The original function had the right shape but wrong \"height\" — scaling it down makes total probability equal 1.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A p.d.f. is f(x) = k/(x+2) for -1 ≤ x ≤ 4. Find k and explain why this distribution is likely to be skewed. (3 steps)", "answer": "- Step 1: Normalize: ∫₋₁⁴ k/(x+2) dx = k[ln(x+2)]₋₁⁴ = k(ln 6 - ln 1) = k ln 6 = 1, so k = 1/ln 6.\n- Step 2: The function decreases as x increases (1/(x+2) gets smaller), so probability is more concentrated toward the left (near -1).\n- Step 3: This creates right skew (long tail toward larger x values). The mean will be less than the median, and more probability mass lies below the mean than above it.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": true}, {"question": "How do you find the mode when the p.d.f. is piecewise linear? For example, f(x) = k for 0 < x < 1, f(x) = k(x-1)² for 1 ≤ x < 2, f(x) = k(3-x) for 2 ≤ x < 3. (3 steps)", "answer": "- Step 1: For piecewise linear p.d.f.s, the maximum occurs either at a boundary between pieces or at an endpoint. Sketch the p.d.f. first.\n- Step 2: In this case, the first piece increases from 0 to k at x = 1. The second piece starts at k and increases (since (x-1)² increases from 0). The third piece decreases from k to 0.\n+ Looking at the sketch: f(x) increases on (0,1), continues increasing on (1,2), then decreases on (2,3). The maximum occurs at the boundary between pieces 2 and 3, at x = 2 (or possibly the entire interval [1,2] if it's flat).\n- Step 3: After finding k, you verify which x gives the maximum f(x) value.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "Two continuous random variables X and Y are independent. If you're given their individual p.d.f.s, how would you find P(X < 1 AND Y < 1)? (2 steps)", "answer": "- Step 1: Since X and Y are independent, P(X < 1 AND Y < 1) = P(X < 1) × P(Y < 1).\n- Step 2: Each probability is found from its respective c.d.f.: P(X < 1) = F_X(1) = ∫ f_X(x) dx up to 1, and similarly for Y.\n+ If you only have p.d.f.s, you compute each integral separately, then multiply the results. This is the fundamental property of independence applied to continuous variables.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "The p.d.f. f(x) = k sin(πx) is defined for 0 ≤ x ≤ 1. Find k and explain the shape of this distribution. (3 steps)", "answer": "- Step 1: Normalize: ∫₀¹ k sin(πx) dx = k[-cos(πx)/π]₀¹ = k((-cos π + cos 0)/π) = k((1 + 1)/π) = 2k/π = 1, so k = π/2.\n- Step 2: The function sin(πx) starts at 0 (x = 0), rises to 1 at x = 0.5, then returns to 0 at x = 1. It's symmetric about x = 0.5.\n- Step 3: This creates a \"tent-shaped\" distribution that's symmetric, so mean = median = 0.5. It's a triangular distribution on [0,1].", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A continuous random variable X has p.d.f. f(x) = k/x² for 1 ≤ x ≤ 2. This is a member of the Pareto family. Find k and explain why the mean might not exist. (3 steps)", "answer": "- Step 1: Normalize: ∫₁² k/x² dx = k[-1/x]₁² = k(-1/2 + 1) = k/2 = 1, so k = 2.\n- Step 2: E(X) = ∫₁² x · (2/x²) dx = ∫₁² 2/x dx = 2[ln x]₁² = 2 ln 2 ≈ 1.386, which exists.\n- Step 3: However, for the Pareto distribution with different parameters, if the power is ≤ 1, the mean becomes infinite or undefined. Here the power is 2 (> 1), so the mean exists.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "When solving for the median from a quadratic c.d.f. like F(x) = 2x² - x⁴ for 0 ≤ x ≤ 1, how do you handle having two positive solutions? (3 steps)", "answer": "- Step 1: Set F(m) = 0.5: 2m² - m⁴ = 0.5, which rearranges to m⁴ - 2m² + 0.5 = 0. This is a quadratic in m²: (m²)² - 2m² + 0.5 = 0.\n- Step 2: Using the quadratic formula: m² = (2 ± √(4 - 2))/2 = 1 ± 1/√2. This gives m² ≈ 1.707 or m² ≈ 0.293.\n- Step 3: Taking square roots: m ≈ √1.707 ≈ 1.306 or m ≈ √0.293 ≈ 0.541. Only m ≈ 0.541 lies in the valid domain [0,1], so that's the median. The other solution is extraneous.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Explain why for a continuous random variable X, P(X ∈ ℝ) = 1 but P(X = any specific value) = 0. What does this tell us about how we should think about continuous probability? (2 steps)", "answer": "- Step 1: The sample space for a continuous variable is uncountably infinite (like all real numbers in an interval). The probability of any single point is infinitesimally small — essentially zero — but the probability of the entire space (the union of all points) is 1.\n- Step 2: This means continuous probability is about intervals and areas, not individual points. When we say \"X is equally likely to take any value,\" we mean the probability density is uniform, not that each exact value has positive probability.\n+ This is fundamentally different from discrete variables and requires a different intuition — think in terms of densities and areas, not masses and sums.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A p.d.f. is defined as f(x) = k sec²(πx) for 0 ≤ x ≤ 0.25. Find k and explain what type of distribution this creates. (3 steps)", "answer": "- Step 1: Normalize: ∫₀^0.25 k sec²(πx) dx = k[tan(πx)/π]₀^0.25 = k(tan(π/4)/π) = k(1/π) = 1, so k = π.\n- Step 2: sec²(πx) = 1/cos²(πx), which increases as x approaches 0.25 (where cos(π/4) = √2/2, so sec² = 2).\n- Step 3: This creates a p.d.f. that increases from f(0) = π to f(0.25) = 2π. The distribution is bounded and has no mode at the interior — the maximum occurs at the boundary x = 0.25.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "If X has p.d.f. f(x) = 3/10(3x - x²) for 0 ≤ x ≤ 2, find the mode. Then find the probability that X is less than the mode. Is it 0.5? (3 steps)", "answer": "- Step 1: f(x) = (9x - 3x²)/10. Differentiate: f'(x) = (9 - 6x)/10 = 0 gives x = 1.5. Second derivative: f''(x) = -6/10 < 0, confirming maximum.\n- Step 2: The mode is x = 1.5. To find P(X < 1.5), compute the c.d.f. at x = 1.5: F(1.5) = ∫₀^1.5 (3/10)(3x - x²) dx.\n- Step 3: F(1.5) = (3/10)[(3/2)x² - (1/3)x³]₀^1.5 = (3/10)(3/2 × 2.25 - 1/3 × 3.375) = (3/10)(3.375 - 1.125) = (3/10)(2.25) = 0.675. So P(X < mode) = 0.675, not 0.5 — the mode does NOT split probability in half!", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": true}, {"question": "A p.d.f. is given in challenge problem form: f(t) = k/t³ for t ≥ 1. Find k and compute P(T < 3), P(T > 20), and find p such that P(p < T < 2p) = 0.12. (3 steps)", "answer": "- Step 1: Given ∫₁^∞ (1/t³) dt = 1/2, we have ∫₁^∞ k/t³ dt = k(1/2) = 1, so k = 2.\n- Step 2: P(T < 3) = ∫₁³ 2/t³ dt = 2[-1/(2t²)]₁³ = -1/9 + 1 = 8/9 ≈ 0.889. P(T > 20) = ∫₂₀^∞ 2/t³ dt = 2[1/(2t²)]₂₀^∞ = 1/400 = 0.0025.\n- Step 3: For P(p < T < 2p) = 0.12: ∫ₚ^(2p) 2/t³ dt = 2[-1/(2t²)]ₚ^(2p) = -1/(4p²) + 1/p² = 3/(4p²) = 0.12. So p² = 3/(4×0.12) = 3/0.48 = 6.25, giving p = 2.5.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "For a continuous random variable X, if you know the c.d.f. F(x) is differentiable everywhere except at some points, what does this mean for the p.d.f.? How should you represent it? (2 steps)", "answer": "- Step 1: Where F(x) is not differentiable (at jump discontinuities), the p.d.f. has no derivative — these are points where probability \"concentrates\" in a discrete way even in an otherwise continuous distribution. However, for truly continuous distributions, f(x) = F'(x) exists almost everywhere.\n- Step 2: In practice, we define f(x) = 0 at points where F is not differentiable, or define it as the derivative in between. The p.d.f. is typically written piecewise to reflect these features.\n+ This matters when going from c.d.f. to p.d.f. — you need to check whether the derivative exists at all points in the domain.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "A continuous random variable has p.d.f. f(x) = k(4 - x²) for 0 ≤ x ≤ 2. Show that E(X) = 8/5 by explicit integration, then verify using a symmetry argument if possible. (3 steps)", "answer": "- Step 1: Normalize first: ∫₀² k(4 - x²)dx = k[4x - x³/3]₀² = k(8 - 8/3) = (16k/3) = 1, so k = 3/16.\n- Step 2: E(X) = ∫₀² x · (3/16)(4 - x²) dx = (3/16)∫₀² (4x - x³) dx = (3/16)[2x² - x⁴/4]₀² = (3/16)(8 - 4) = (3/16)(4) = 3/4 = 0.75? Wait, let me recalculate: [2x² - x⁴/4]₀² = 8 - 4 = 4, times 3/16 = 12/16 = 3/4. But the expected answer is 8/5 = 1.6...\n+ Let me fix: Actually, [2x² - x⁴/4]₀² = (2×4 - 16/4) = 8 - 4 = 4. (3/16)×4 = 12/16 = 3/4 = 0.75. Hmm, the answer should be 8/5... Let me check: Wait, the problem states k should be 3/16, let me recalculate E(X): ∫₀² x(4-x²)dx = [2x² - x⁴/4]₀² = 8 - 4 = 4. With k = 3/16: (3/16)×4 = 12/16 = 3/4. This doesn't match. The problem says E(T) = 1.6 = 8/5 for a different distribution. Let me check the original example in the notes: For f(t) = kt³ on 0 ≤ t ≤ 2, with k = 3/16? No, let me verify from Exercise 4C #7: f(t) = kt³ for 0 ≤ t ≤ 2. ∫₀² kt³ dt = k(16/4) = 4k = 1, so k = 1/4. Then E(T) = ∫₀² t·(t³/4) dt = (1/4)∫₀² t⁴ dt = (1/4)(32/5) = 8/5. So the problem was about t⁴, not (4-t²). For the distribution in my question, E(X) = 3/4 is correct.\n\nActually wait, I think I was asked about a different distribution. The result 8/5 = 1.6 applies to a specific distribution in the exercises. Let me move on.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "What is the key difference between how you find E(X) for a discrete random variable versus a continuous random variable? Write both formulas and explain the correspondence. (2 steps)", "answer": "- Step 1: Discrete: E(X) = Σ x · P(X = x). Continuous: E(X) = ∫ x · f(x) dx.\n- Step 2: The sum (Σ) is replaced by the integral (∫), and the probability mass P(X = x) is replaced by the probability density f(x). Both compute a weighted average, but one uses discrete weights and the other uses continuous weights (densities).\n+ The correspondence is: discrete probability mass ↔ continuous probability density, discrete sum ↔ continuous integral.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "If X is a continuous random variable and you transform it to Y = g(X) where g is strictly increasing, how does the p.d.f. of Y relate to that of X? (2 steps)", "answer": "- Step 1: If Y = g(X) where g is strictly monotonic (increasing), you can find f_Y(y) using the change of variable formula: f_Y(y) = f_X(g⁻¹(y)) · |d/dy[g⁻¹(y)]|, where g⁻¹ is the inverse function.\n- Step 2: Alternatively, you can find F_Y(y) = P(Y ≤ y) = P(g(X) ≤ y) = P(X ≤ g⁻¹(y)) = F_X(g⁻¹(y)), then differentiate to get f_Y.\n+ This is useful for transformations like Y = aX + b (linear) or Y = e^X (exponential transformation).", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "A p.d.f. is f(x) = k/(x+2) for -1 ≤ x ≤ 4. Find the median by solving F(m) = 0.5. (3 steps)", "answer": "- Step 1: First find the c.d.f.: F(x) = ∫₋₁^x k/(t+2) dt = k[ln(t+2)]₋₁^x = k(ln(x+2) - ln(1)) = k ln(x+2), where k = 1/ln 6.\n- Step 2: Set F(m) = 0.5: (1/ln 6) · ln(m+2) = 0.5, so ln(m+2) = 0.5 ln 6 = ln(6^0.5) = ln(√6).\n- Step 3: Therefore m + 2 = √6, so m = √6 - 2 ≈ 2.449 - 2 = 0.449. This is the median.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "For a uniform distribution on [a, b], what are the mean, variance, median, and mode? Explain why they're all the same or different. (2 steps)", "answer": "- Step 1: For X ~ Uniform(a, b): f(x) = 1/(b-a) for a ≤ x ≤ b. The mean is (a+b)/2, variance is (b-a)²/12, median is also (a+b)/2, and the mode is any value in [a, b] (no unique mode).\n- Step 2: Mean = median because the distribution is symmetric. Variance formula comes from integration. The mode is not unique because all values are equally likely — every point is a local maximum.\n+ This is the simplest continuous distribution — constant density over an interval.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "Why is it important to sketch the p.d.f. before attempting to find the mode? What common errors does this help avoid? (2 steps)", "answer": "- Step 1: A sketch reveals the overall shape — whether there's a unique interior maximum, endpoints are maxima, multiple peaks, or constant regions.\n- Step 2: Without sketching, students commonly: (a) mistake endpoints for interior points and solve wrong equations, (b) miss bimodal cases, (c) solve for minima instead of maxima, or (d) assume symmetry when it doesn't exist.\n+ Always sketch first — it's the single most important step for understanding the distribution's behavior.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "The random variable X has c.d.f. F(x) = 0 for x < 2, = (x² - 4)/5 for 2 ≤ x ≤ 3, = 1 for x > 3. Find: (a) f(x), (b) P(X > 2.4), (c) the median. (3 steps)", "answer": "- Step 1: f(x) = dF/dx = (2x)/5 for 2 ≤ x ≤ 3, and f(x) = 0 elsewhere. Verify: ∫₂³ (2x/5) dx = (1/5)[x²]₂³ = (1/5)(9-4) = 1 ✓\n- Step 2: P(X > 2.4) = 1 - F(2.4) = 1 - ((2.4)² - 4)/5 = 1 - (5.76 - 4)/5 = 1 - 1.76/5 = 1 - 0.352 = 0.648.\n- Step 3: For median m: F(m) = 0.5 gives (m² - 4)/5 = 0.5, so m² - 4 = 2.5, m² = 6.5, m = √6.5 ≈ 2.55. Check: 2 ≤ m ≤ 3 ✓", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "If X has p.d.f. f(x) = kx(5-x) for 0 ≤ x ≤ 6, why can this NOT be a valid probability density function? (2 steps)", "answer": "- Step 1: For x in [0, 6], the function x(5-x) = 5x - x² is a downward parabola that becomes negative for x > 5. Specifically, for 5 < x ≤ 6, f(x) < 0.\n- Step 2: A p.d.f. must satisfy f(x) ≥ 0 for ALL x. Since f(x) is negative for some x in the domain, it cannot be a valid p.d.f.\n+ The problem states k is positive. Even with negative k, you'd need to carefully check. But with k > 0 and f(x) < 0 somewhere, it's invalid.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "A p.d.f. is defined as f(x) = k(1+x²) for -1 ≤ x ≤ 2. Find k and determine whether this distribution is symmetric. (3 steps)", "answer": "- Step 1: Normalize: ∫₋₁² k(1+x²) dx = k[x + x³/3]₋₁² = k((2 + 8/3) - (-1 - 1/3)) = k(2 + 8/3 + 1 + 1/3) = k(3 + 9/3) = k(3 + 3) = 6k = 1, so k = 1/6.\n- Step 2: The function (1+x²) is not symmetric about any vertical line in the domain — x² is symmetric about x = 0, but the domain [-1, 2] is not symmetric.\n- Step 3: Check: f(-1 + d) = (1 + (d-1)²) vs f(1 + d) = (1 + (d+1)²), not equal. So the distribution is not symmetric. Mean ≠ Median.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "Find the 15th percentile for the distribution with p.d.f. f(x) = (1/10)x for 0 ≤ x < 2, and f(x) = (1/4 - (1/40)x) for 2 ≤ x < 10. (3 steps)", "answer": "- Step 1: First find F(x). For 0 ≤ x < 2: F(x) = ∫₀^x (1/10)t dt = x²/20. For 2 ≤ x < 10: F(x) = F(2) + ∫₂^x (1/4 - t/40) dt = (4/20) + [t/4 - t²/80]₂^x = 0.2 + (x/4 - x²/80 - (2/4 - 4/80)) = 0.2 + (x/4 - x²/80 - 0.475) = x/4 - x²/80 - 0.275.\n- Step 2: Check F(2) = 4/20 = 0.2, and F(10) = 10/4 - 100/80 - 0.275 = 2.5 - 1.25 - 0.275 = 0.975 ≈ 1 ✓ (very close, some rounding)\n- Step 3: For 15th percentile: F(p) = 0.15. Since 0.15 < F(2) = 0.2, use first branch: p²/20 = 0.15, p² = 3, p = √3 ≈ 1.73. But this is < 2, so it's in the first branch. Yes, p ≈ 1.73 is in [0,2), so the 15th percentile is √3 ≈ 1.73.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "What is the relationship between the mean, median, and mode for (a) a symmetric distribution, (b) a right-skewed distribution, (c) a left-skewed distribution? (2 steps)", "answer": "- Step 1: (a) Symmetric: mean = median = mode (all at the center of symmetry). (b) Right-skewed (long tail to right): mode < median < mean (the mean is \"pulled\" toward the tail). (c) Left-skewed: mean < median < mode.\n- Step 2: This happens because the mean is sensitive to extreme values (the tail), while the median and mode are more robust. In right skew, extreme high values pull the mean above the median.\n+ This is useful for assessing skewness: compare mean and median. If mean > median → right skew; mean < median → left skew.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": true}, {"question": "For a continuous random variable, if you randomly sample one value, what is the probability it falls within one standard deviation of the mean? Does the answer depend on the distribution? (2 steps)", "answer": "- Step 1: This is Chebyshev's inequality concept: For any distribution (discrete or continuous), P(|X - μ| < kσ) ≥ 1 - 1/k². For k = 1, this gives P(|X - μ| < σ) ≥ 0 — a trivial bound.\n- Step 2: For specific distributions, the probability varies. For normal distribution, approximately 68% falls within one standard deviation. For uniform, it's about 57%. For exponential, it's much lower. So yes, it heavily depends on the distribution.\n+ There's no universal \"68%\" rule for all continuous distributions — that's specific to normals.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": true}, {"question": "The p.d.f. f(x) = kx^n for 0 ≤ x ≤ 1 (where n > -1) represents a Beta distribution. Find k in terms of n, and find E(X). (2 steps)", "answer": "- Step 1: Normalize: ∫₀¹ kx^n dx = k/(n+1) = 1, so k = n + 1.\n- Step 2: E(X) = ∫₀¹ x · (n+1)x^n dx = (n+1)∫₀¹ x^{n+1} dx = (n+1)/(n+2).\n+ This is a family of distributions on [0,1] with different shapes depending on n. For n = 0, we get Uniform(0,1); for n = 1, triangular; for n > 0, the distribution is right-skewed.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "Why do we use integration limits carefully when computing probabilities for continuous random variables? What happens if you use wrong limits? (2 steps)", "answer": "- Step 1: The p.d.f. is zero outside its defined support. If you integrate from, say, 0 to 5 but the p.d.f. is only defined on [2, 4], you'd be integrating zeros from 0-2 and 4-5, which gives wrong answers.\n- Step 2: Always identify the correct range(s) where f(x) is non-zero. For piecewise p.d.f.s, you may need to split the integral across multiple intervals.\n+ A common error is forgetting that the \"otherwise\" part of the p.d.f. is zero and just integrating over the wrong range.", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "For the distribution in Example 3 with f(x) = k for 1 < x < 2, and f(x) = k(x-1) for 2 ≤ x ≤ 4, verify that k = 1/5 by both integration and geometry. (3 steps)", "answer": "- Step 1: By integration: ∫₁² k dx + ∫₂⁴ k(x-1) dx = k[x]₁² + k[x²/2 - x]₂⁴ = k(2-1) + k((16/2 - 4) - (4/2 - 2)) = k(1) + k((8-4) - (2-2)) = k(1 + 4) = 5k = 1, so k = 1/5.\n- Step 2: By geometry: First piece is rectangle: width 1, height k, area = k. Second piece is triangle with base 2, heights from k to 3k, area = ½ × 2 × (k + 3k) = 4k. Total = 5k = 1, so k = 1/5.\n- Step 3: Both methods give k = 1/5. The geometric approach is faster when the pieces form simple shapes.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "If X ~ Uniform(0, 1), what is the distribution of Y = -ln(X)? Show that Y follows an exponential distribution with parameter 1. (3 steps)", "answer": "- Step 1: X has f_X(x) = 1 for 0 < x < 1. For Y = -ln(X), the inverse is X = e^(-Y), and dX/dY = -e^(-Y).\n- Step 2: Using change of variable: f_Y(y) = f_X(g⁻¹(y)) · |d/dy(g⁻¹(y))| = 1 · e^(-y) = e^(-y), for y > 0.\n- Step 3: This is the exponential distribution with λ = 1. This transformation is useful because it generates exponential variables from uniform ones — a key method in simulation.", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": true}, {"question": "A continuous random variable has p.d.f. f(x) = kx²e^(-x/2) for x ≥ 0. Without computing the integral, explain how you would find the mode. (2 steps)", "answer": "- Step 1: You would differentiate f(x) and set f'(x) = 0. The function x²e^(-x/2) has derivative: d/dx[x²e^(-x/2)] = 2xe^(-x/2) - (1/2)x²e^(-x/2) = xe^(-x/2)(2 - x/2).\n- Step 2: Setting this equal to zero: xe^(-x/2)(2 - x/2) = 0 gives solutions x = 0 or x = 4. The mode is at x = 4 (positive, and f'' < 0 there). At x = 0, f(0) = 0, so that's actually a minimum.\n+ For gamma-like distributions, the mode often occurs at (α-1)/β for f(x) ∝ x^(α-1)e^(-βx).", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": true}], "count": 59}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What distinguishes a continuous random variable from a discrete one, and why does this force us to describe probabilities differently? (3 steps)", "answer": "- Step 1: A discrete r.v. takes values from a countable set (like the integers), so we can list each value $$x$$ with its probability $$P(X=x)$$ in a table, and every probability is positive.\n- Step 2: A continuous r.v. can take any value in an interval of the real line — uncountably many values with no gaps. Because we cannot list uncountably many values with positive probabilities that still sum to 1, we are forced to conclude $$P(X=x)=0$$ for every single exact value.\n- Step 3: Instead of pointwise probabilities, we describe continuous distributions via a **probability density function** $$f(x)$$, where probabilities are obtained as *areas under the curve*: $$P(a<X<b) = \\int_a^b f(x)\\,dx$$.\n\nDiscrete = \"dots with weights\"; continuous = \"curves whose area gives probability\".", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Why is $$P(X=a) = 0$$ for any specific value $$a$$ when $$X$$ is continuous? Give a formal and an intuitive reason. (3 steps)", "answer": "- Step 1: Formally, $$P(a < X < a+\\Delta) = \\int_a^{a+\\Delta} f(x)\\,dx$$. As $$\\Delta \\to 0$$ the interval shrinks to a single point and the integral (an area with zero width) collapses to 0.\n- Step 2: Intuitively, in any tiny neighbourhood of $$a$$ there are uncountably many real numbers. Distributing probability 1 across all of them means no single point can carry any positive share — the probability \"smears out\".\n- Step 3: This does *not* mean $$X=a$$ is impossible; it just means the probability is indistinguishable from zero. Practically, it's why $$P(a<X<b) = P(a\\leq X\\leq b)$$ — including or excluding endpoints changes the probability by exactly zero.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why is the p.d.f. $$f(x)$$ called a *density*, and why is it wrong to think of $$f(a)$$ as \"the probability that $$X = a$$\"? (3 steps)", "answer": "- Step 1: The name is by analogy with mass density in physics. Mass density $$\\rho(x)$$ is not \"mass at point $$x$$\" (which is 0), but mass *per unit length* around $$x$$. Total mass $$= \\int \\rho\\,dx$$.\n- Step 2: Similarly $$f(x)$$ is *probability per unit $$x$$*. You can read it as: $$P(x < X < x+dx) \\approx f(x)\\,dx$$. So $$f(x)$$ tells you how *concentrated* probability is near $$x$$, not the probability at $$x$$.\n- Step 3: Because $$f(x)$$ is a density — not a probability — it is NOT required to be $$\\leq 1$$. Example: uniform on $$[0, 0.1]$$ has $$f(x)=10$$. The concentration per unit length can exceed 1, as long as the total area is 1.\n\nMental model: height of the curve = how densely probability is packed there.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "State the three defining conditions a function must satisfy to be a valid probability density function, and explain the meaning of each. (3 steps)", "answer": "- Step 1: **Non-negativity**: $$f(x) \\geq 0$$ for all $$x \\in \\mathbb{R}$$. Reason: areas under $$f$$ give probabilities, and probabilities cannot be negative. A negative region would imply negative probability.\n- Step 2: **Normalisation**: $$\\int_{-\\infty}^{\\infty} f(x)\\,dx = 1$$. Reason: the total probability that $$X$$ takes *some* real value is 1 (certainty), so total area under the curve must be 1.\n- Step 3: **Interval probability**: $$P(a<X<b) = \\int_a^b f(x)\\,dx$$. This is how $$f$$ is *used* — integrating it over a range yields the probability of falling in that range.\n\nCollectively: non-negative, unit area, and integrates to give interval probabilities.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "A proposed p.d.f. is $$f(x) = x^3 - 2$$ on $$[-1, 3]$$ and zero elsewhere. Explain why this cannot be a valid p.d.f. (2 steps)", "answer": "- Step 1: Test non-negativity on the interval. At $$x=0$$, $$x^3 - 2 = -2 < 0$$. More generally, $$x^3 - 2 \\geq 0$$ only when $$x \\geq 2^{1/3} \\approx 1.26$$; on $$[-1, 1.26)$$ the function is negative.\n- Step 2: Since $$f$$ is negative somewhere on its stated support, no amount of multiplying by a positive constant $$k$$ can repair it (multiplying a negative number by $$k>0$$ stays negative). The function's sign changes on the interval, and that alone disqualifies it.\n\nAlways check the sign on the given interval *before* trying to solve for $$k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "A student is given $$f(x) = k(2-x)$$ on $$[-2,2]$$ with $$k>0$$ and asked if it can be a valid p.d.f. How would you verify this? (3 steps)", "answer": "- Step 1: Non-negativity check. On $$[-2, 2]$$, the factor $$2-x$$ ranges from $$4$$ (at $$x=-2$$) down to $$0$$ (at $$x=2$$), so $$2-x \\geq 0$$ throughout. Multiplying by $$k>0$$ keeps $$f \\geq 0$$ ✓.\n- Step 2: Find $$k$$ from normalisation. The graph is a triangle/trapezium; its area is $$\\int_{-2}^{2} k(2-x)\\,dx$$. Compute: $$k[2x - x^2/2]_{-2}^2 = k[(4-2) - (-4-2)] = 8k$$. Setting $$8k = 1$$ gives $$k = \\tfrac{1}{8}$$.\n- Step 3: With $$k = \\tfrac{1}{8}$$, both conditions hold, so yes it's valid. Contrast: on the wider interval $$[-2, 4]$$, $$2-x$$ would go negative for $$x > 2$$, and no positive $$k$$ could fix that.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "How do you find the constant $$k$$ so that $$f(x) = k\\cdot g(x)$$ on $$[a,b]$$ (zero elsewhere) is a valid p.d.f., assuming $$g(x) \\geq 0$$ on $$[a,b]$$? (3 steps)", "answer": "- Step 1: The only condition involving $$k$$ is normalisation: $$\\int_{-\\infty}^{\\infty} f(x)\\,dx = 1$$. Since $$f$$ is zero outside $$[a,b]$$, this reduces to $$k\\int_a^b g(x)\\,dx = 1$$.\n- Step 2: So $$k = \\dfrac{1}{\\int_a^b g(x)\\,dx}$$ — \"one over the unnormalised area\".\n- Step 3: Conceptually, $$k$$ is a *scaling factor* chosen to make the total area under $$g$$ over $$[a,b]$$ equal to 1. Whatever shape $$g$$ has, $$k$$ shrinks or stretches it vertically so the enclosed area is exactly 1.\n\nSanity check: if $$g \\geq 0$$, the integral is positive, so $$k > 0$$. A non-positive $$k$$ means something went wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "For a continuous random variable $$X$$, why is $$P(a < X < b)$$ equal to $$P(a \\leq X \\leq b)$$? Would this be true for a discrete random variable? (3 steps)", "answer": "- Step 1: The difference between these two probabilities is $$P(X=a) + P(X=b)$$ (the endpoints added or excluded).\n- Step 2: For a continuous r.v., $$P(X=a) = P(X=b) = 0$$, so including or excluding endpoints changes the probability by exactly zero. Both expressions are equal.\n- Step 3: For a discrete r.v., this is generally *not* true: $$P(X=a)$$ and $$P(X=b)$$ can be positive, so $$P(a<X<b) = P(a\\leq X \\leq b) - P(X=a) - P(X=b)$$ is strictly smaller.\n\nThis is a signature feature of continuous distributions: strict and non-strict inequalities are interchangeable.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Can a p.d.f. take values greater than 1? If so, explain why this doesn't violate any probability axiom. (3 steps)", "answer": "- Step 1: Yes. Example: uniform on $$[0, 0.5]$$ has $$f(x) = 2$$ on that interval. The value 2 exceeds 1.\n- Step 2: No axiom is violated because $$f(x)$$ is a *density*, not a probability. Probabilities must lie in $$[0,1]$$; densities can be any non-negative real number.\n- Step 3: What *is* constrained is the *area*: $$\\int_0^{0.5} 2\\,dx = 1$$. And any sub-interval gives a probability in $$[0,1]$$: e.g. $$P(0<X<0.1) = 0.2 \\leq 1$$.\n\nKey insight: $$f(x)$$ can be arbitrarily large, as long as its support is narrow enough that the total area remains 1.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "If $$f(x)$$ is a p.d.f. non-zero only on $$[a, b]$$, why can we integrate only from $$a$$ to $$b$$ instead of $$-\\infty$$ to $$\\infty$$? (2 steps)", "answer": "- Step 1: Outside $$[a,b]$$, $$f(x) = 0$$. So $$\\int_{-\\infty}^{a} f\\,dx = 0$$ and $$\\int_{b}^{\\infty} f\\,dx = 0$$.\n- Step 2: Splitting the full integral: $$\\int_{-\\infty}^{\\infty} f\\,dx = 0 + \\int_a^b f\\,dx + 0 = \\int_a^b f\\,dx$$. We're not changing the integral's value; we're ignoring regions contributing nothing.\n\nOnly the *support* of $$f$$ (where $$f \\neq 0$$) matters.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "For $$f(x) = k(4x - x^2)$$ on $$[2, 4]$$, explain the process (not the computation) for finding $$k$$. (3 steps)", "answer": "- Step 1: The normalisation condition $$\\int_2^4 f(x)\\,dx = 1$$ is a linear equation in $$k$$: $$k \\int_2^4 (4x-x^2)\\,dx = 1$$.\n- Step 2: Compute the unnormalised integral (a definite number, call it $$I$$). Then $$kI = 1$$, so $$k = 1/I$$.\n- Step 3: Conceptually, whatever shape $$4x-x^2$$ traces on $$[2,4]$$, we rescale it vertically so the area becomes exactly 1. The value of $$k$$ captures the ratio of \"target area 1\" to \"original area $$I$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Outline the procedure for sketching a p.d.f. clearly, and list the features that must be labelled. (3 steps)", "answer": "- Step 1: Identify the *support* — the interval(s) where $$f(x) > 0$$. Outside this support, draw $$f(x)=0$$ along the $$x$$-axis to show it's zero everywhere else.\n- Step 2: Plot key values: endpoints of the support on the $$x$$-axis, the $$f$$-values at endpoints and at any interior maxima/minima. For piecewise p.d.f.s, mark where the pieces change (often with dotted vertical lines).\n- Step 3: Draw the curve between endpoints with correct qualitative shape (linear, quadratic, sine-like, etc.). Watch out: students often forget to show the zero regions or incorrectly extend the curve outside the support.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Define the cumulative distribution function $$F(x)$$ for a continuous random variable, and explain its geometric meaning. (3 steps)", "answer": "- Step 1: $$F(x) = P(X \\leq x) = \\int_{-\\infty}^{x} f(t)\\,dt$$. It's the probability that $$X$$ is at most $$x$$.\n- Step 2: Geometrically, $$F(x)$$ is the *area under the p.d.f. to the left of the vertical line at $$x$$*. As $$x$$ moves from $$-\\infty$$ to $$\\infty$$, this area accumulates from 0 to 1.\n- Step 3: Think of $$F$$ as an \"area-so-far\" function: at each position $$x$$, $$F(x)$$ tells you what fraction of total probability has been swept up. Because areas only add (not subtract), $$F$$ is always non-decreasing.\n\nMental image: a running total of probability, like filling a container of total volume 1 as you move rightward.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "What is the relationship between $$F(x)$$ and $$f(x)$$, and why does the Fundamental Theorem of Calculus guarantee this? (3 steps)", "answer": "- Step 1: They are related by $$F(x) = \\int_{-\\infty}^{x} f(t)\\,dt$$ and $$f(x) = \\dfrac{d}{dx} F(x)$$. The c.d.f. is the integral (accumulation) of the p.d.f.; the p.d.f. is the derivative (rate of change) of the c.d.f.\n- Step 2: The Fundamental Theorem of Calculus says: if $$F(x) = \\int_c^x f(t)\\,dt$$, then $$F'(x) = f(x)$$. Differentiating the accumulation function returns the integrand.\n- Step 3: Intuition: $$f(x)$$ is how fast probability is accumulating at $$x$$. If $$f(x)$$ is large, $$F$$ rises steeply there; if $$f(x) = 0$$, $$F$$ is flat. So $$f$$ is literally the slope of $$F$$ at each point.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "What values must $$F(x)$$ take as $$x \\to -\\infty$$ and as $$x \\to \\infty$$, and what does this say about the shape of $$F$$? (3 steps)", "answer": "- Step 1: As $$x \\to -\\infty$$: $$F(x) \\to 0$$. There's no probability mass to the left of any sufficiently small number.\n- Step 2: As $$x \\to \\infty$$: $$F(x) \\to 1$$. Since $$X$$ certainly takes *some* real value, the total accumulated probability is 1.\n- Step 3: Combined with monotonicity (since $$f \\geq 0$$, $$F$$ is non-decreasing), $$F$$ climbs from 0 to 1 as $$x$$ sweeps left to right. For a p.d.f. supported on $$[a,b]$$: $$F(x)=0$$ for $$x \\leq a$$, and $$F(x)=1$$ for $$x \\geq b$$.\n\nEvery c.d.f. is an S-shape (or simpler) going monotonically from 0 to 1.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Why must $$F(x)$$ be a non-decreasing function, and how does this connect to a property of $$f(x)$$? (3 steps)", "answer": "- Step 1: $$F(x)$$ accumulates area under $$f$$ from $$-\\infty$$ to $$x$$. Moving $$x$$ to the right adds more area.\n- Step 2: Since $$f(x) \\geq 0$$ (non-negativity), all added area is non-negative. For $$x_1 < x_2$$: $$F(x_2) - F(x_1) = \\int_{x_1}^{x_2} f(t)\\,dt \\geq 0$$.\n- Step 3: Equivalently, $$F'(x) = f(x) \\geq 0$$, so $$F$$'s slope is never negative. $$F$$ can be flat (where $$f = 0$$) but never decrease.\n\nMonotonicity of $$F$$ is a direct consequence of $$f \\geq 0$$.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "How do you compute $$P(a < X < b)$$ using the c.d.f. $$F$$? Justify why this works. (3 steps)", "answer": "- Step 1: $$P(a < X < b) = F(b) - F(a)$$.\n- Step 2: Justification: $$P(X \\leq b)$$ covers \"everything up to $$b$$\", and $$P(X \\leq a)$$ covers \"everything up to $$a$$\". Subtracting the second from the first removes the overlap and leaves $$P(a < X \\leq b)$$.\n- Step 3: Because $$X$$ is continuous, $$P(X=a) = P(X=b) = 0$$, so $$P(a<X<b) = P(a\\leq X \\leq b) = F(b) - F(a)$$ all give the same result.\n\nOnce you have $$F$$, any range-probability question is a single subtraction — no integration.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Given a piecewise p.d.f. defined on $$[a,b] \\cup [b,c]$$ with different formulas on each sub-interval, describe the procedure for constructing the c.d.f. $$F(x)$$. (4 steps)", "answer": "- Step 1: For $$x < a$$: $$F(x) = 0$$ (no probability accumulated yet).\n- Step 2: For $$a \\leq x \\leq b$$: integrate the first piece: $$F(x) = \\int_a^x f(t)\\,dt$$. At the upper boundary $$x = b$$, $$F(b)$$ is the area of the entire first piece — a specific number.\n- Step 3: For $$b \\leq x \\leq c$$: start from $$F(b)$$ and add the area of the second piece from $$b$$ to $$x$$: $$F(x) = F(b) + \\int_b^x f(t)\\,dt$$. The $$F(b)$$ term ensures continuity.\n- Step 4: For $$x > c$$: $$F(x) = 1$$. Double-check: plugging $$x=c$$ into the Step 3 formula should yield exactly 1.\n\nEach piece of $$F$$ *adds on* to the previous piece's final value. Forgetting this leads to a discontinuous (and therefore invalid) $$F$$.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Why is the integration variable in $$F(x) = \\int_{-\\infty}^{x} f(t)\\,dt$$ written as $$t$$ rather than $$x$$?", "answer": "The integration variable is a \"dummy\" variable that sweeps through all values below the upper limit. Using $$x$$ for both the dummy variable *and* the upper limit would be ambiguous — the upper limit represents a specific value we're evaluating, while the dummy variable must range freely through the integrand's domain. By convention we rename the dummy variable (to $$t$$, $$s$$, or $$u$$) to avoid this conflict. So $$F(3) = \\int_{-\\infty}^{3} f(t)\\,dt$$ with $$t$$ sweeping through all reals $$\\leq 3$$, and 3 being the fixed upper limit. Purely notational but prevents confusion.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Given $$F(x)$$, how do you recover the p.d.f. $$f(x)$$, and why must we carefully define $$f$$ piecewise? (3 steps)", "answer": "- Step 1: $$f(x) = \\dfrac{d}{dx}F(x)$$. Differentiate each piece of $$F$$ separately.\n- Step 2: Where $$F$$ is constant (e.g., $$F = 0$$ before the support or $$F = 1$$ after), $$f = \\dfrac{d}{dx}(\\text{const}) = 0$$. So $$f$$ is zero outside the support — automatic from differentiation.\n- Step 3: If $$F$$ has different formulas on different sub-intervals, differentiating each gives a *piecewise* $$f$$. Watch out: $$f$$ may have jumps at the piece boundaries (even though $$F$$ does not).", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Define $$E(X)$$ for a continuous random variable, and explain why this formula is the \"right\" one for the mean. (3 steps)", "answer": "- Step 1: $$E(X) = \\int_{-\\infty}^{\\infty} x\\,f(x)\\,dx$$.\n- Step 2: For a discrete r.v., $$E(X) = \\sum x\\,P(X=x)$$ — each value weighted by its probability. The continuous version replaces the sum with an integral (summing over a continuum) and $$P(X=x)$$ with the *probability element* $$f(x)\\,dx$$.\n- Step 3: Intuitively, $$E(X)$$ is the *balance point* (centre of mass) of the p.d.f. If you treated $$f(x)$$ as a mass density along the number line, $$E(X)$$ is where the distribution balances on a fulcrum.\n\nNot arbitrary — the continuous version of \"weighted average\", with density replacing probability.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "For a p.d.f. symmetric about $$x = a$$, what is $$E(X)$$ and the median, and why? (3 steps)", "answer": "- Step 1: Symmetry about $$x = a$$ means $$f(a+h) = f(a-h)$$ for all $$h$$. Probability mass to the right of $$a$$ mirrors probability mass to the left.\n- Step 2: **Mean**: thinking of $$f$$ as a mass distribution, equal mass on both sides of $$a$$ pulling equally means the balance point is exactly at $$a$$. Thus $$E(X) = a$$.\n- Step 3: **Median**: by symmetry, exactly half the area under $$f$$ lies on each side of $$a$$. So $$F(a) = 0.5$$, making $$a$$ the median.\n\nFor symmetric distributions, mean = median = axis of symmetry. (The mode also equals $$a$$ only if the peak is at the axis — not guaranteed for all symmetric distributions.)", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "State two equivalent formulas for $$\\text{Var}(X)$$ and explain why the second is usually computationally easier. (3 steps)", "answer": "- Step 1: **Definition form**: $$\\text{Var}(X) = E((X-\\mu)^2) = \\int (x-\\mu)^2 f(x)\\,dx$$, where $$\\mu = E(X)$$.\n- Step 2: **Computational form**: $$\\text{Var}(X) = E(X^2) - (E(X))^2 = \\int x^2 f(x)\\,dx - \\mu^2$$.\n- Step 3: The second is easier because you integrate the simple polynomial $$x^2 f(x)$$, rather than expanding $$(x-\\mu)^2 = x^2 - 2\\mu x + \\mu^2$$ — which carries $$\\mu$$ (often an ugly fraction) throughout a messy integration. The two are algebraically identical: expand $$E(X^2 - 2\\mu X + \\mu^2) = E(X^2) - 2\\mu^2 + \\mu^2 = E(X^2) - \\mu^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "What does $$E(g(X))$$ mean, and how is it computed? Why is this useful? (3 steps)", "answer": "- Step 1: $$E(g(X))$$ is the expected value of the transformed variable $$g(X)$$ — e.g., $$g$$ could be squaring, cubing, or any function.\n- Step 2: The formula: $$E(g(X)) = \\int_{-\\infty}^{\\infty} g(x)\\,f(x)\\,dx$$. You weight the transformed value $$g(x)$$ by the *original* density $$f(x)$$ at $$x$$, and integrate.\n- Step 3: This is useful because you don't need to find the distribution of $$g(X)$$ separately (which can be difficult). For example, if $$X$$ is the side of a cube, the expected volume is $$E(X^3) = \\int x^3 f(x)\\,dx$$ — computed directly from $$f_X$$, not from the (harder-to-derive) density of $$X^3$$.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "Why is $$E(X^2) \\neq (E(X))^2$$ in general, and what does their difference represent? (3 steps)", "answer": "- Step 1: $$E(X^2)$$ averages the squared values; $$(E(X))^2$$ squares the averaged value. The order of \"average\" and \"square\" matters because squaring is not a linear operation.\n- Step 2: By the computational formula, $$\\text{Var}(X) = E(X^2) - (E(X))^2$$. So the difference *is* exactly the variance.\n- Step 3: Since variance is always $$\\geq 0$$, we always have $$E(X^2) \\geq (E(X))^2$$, with equality iff $$X$$ is constant. This is a case of Jensen's inequality: averaging a convex function is at least the function of the average.\n\nIntuition: unsquared deviations cancel by sign; squaring kills those cancellations, making $$E(X^2)$$ reflect variability that $$(E(X))^2$$ misses.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Derive $$E(aX+b) = aE(X) + b$$ from the definition, and explain intuitively why this holds. (3 steps)", "answer": "- Step 1: By definition, $$E(aX+b) = \\int (ax+b)f(x)\\,dx = a\\int x f(x)\\,dx + b\\int f(x)\\,dx$$, using linearity of integration.\n- Step 2: The first integral is $$E(X)$$; the second is $$\\int f(x)\\,dx = 1$$. So $$E(aX+b) = aE(X) + b$$.\n- Step 3: Intuitively, scaling every outcome by $$a$$ scales the average by $$a$$; shifting every outcome by $$b$$ shifts the average by $$b$$. Expectation is *linear* because integration is linear.\n\nExample: if $$E(X) = 5$$ and $$Y = 2X - 3$$, then $$E(Y) = 2(5) - 3 = 7$$ — no integration required.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Derive $$\\text{Var}(aX+b) = a^2\\,\\text{Var}(X)$$, and explain (a) why $$b$$ drops out and (b) why $$a$$ is *squared*. (4 steps)", "answer": "- Step 1: Let $$Y = aX + b$$. Then $$E(Y) = aE(X) + b = a\\mu + b$$, so $$Y - E(Y) = aX + b - a\\mu - b = a(X - \\mu)$$.\n- Step 2: $$\\text{Var}(Y) = E((Y - E(Y))^2) = E(a^2(X-\\mu)^2) = a^2 E((X-\\mu)^2) = a^2\\,\\text{Var}(X)$$.\n- Step 3: **Why $$b$$ drops out**: shifting everything by $$b$$ also shifts the mean by $$b$$, so deviations $$X - \\mu$$ are unchanged. Variance measures spread about the mean; a rigid shift preserves spread.\n- Step 4: **Why $$a$$ is squared**: variance has *squared* units of $$X$$. Scaling $$X$$ by $$a$$ scales every deviation by $$a$$, and every squared deviation by $$a^2$$. Equivalently, standard deviation scales by $$|a|$$, so variance = (SD)² scales by $$a^2$$.\n\nExpectation is linear; variance is quadratic (in scaling).", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "For a piecewise p.d.f. on two adjacent intervals, how do you compute $$E(X)$$ and $$\\text{Var}(X)$$? (3 steps)", "answer": "- Step 1: $$E(X) = \\int x\\,f(x)\\,dx$$ becomes a sum: $$E(X) = \\int_{\\text{piece 1}} x\\,f_1(x)\\,dx + \\int_{\\text{piece 2}} x\\,f_2(x)\\,dx$$.\n- Step 2: Similarly $$E(X^2) = \\sum_i \\int_{\\text{piece }i} x^2\\,f_i(x)\\,dx$$.\n- Step 3: Then apply $$\\text{Var}(X) = E(X^2) - (E(X))^2$$.\n\nIntegration is additive over disjoint intervals, so piecewise poses no new conceptual issue — just more bookkeeping.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Define the mode of a continuous random variable. How do you find it, and why might the derivative-equal-zero approach fail? (4 steps)", "answer": "- Step 1: The mode is the value of $$x$$ where $$f(x)$$ is maximised — the peak of the p.d.f.\n- Step 2: For a smooth p.d.f. with an interior maximum, solve $$f'(x) = 0$$ and verify it's a maximum (via second derivative or sketch).\n- Step 3: BUT if $$f$$ is monotonic on its support (strictly increasing or decreasing), the maximum is at a *boundary* — there's no interior critical point. Example: $$f(x) = 2x$$ on $$[0,1]$$ is increasing; mode is at $$x = 1$$, found by inspection.\n- Step 4: For piecewise or non-smooth p.d.f.s, the max may occur at a corner. Always **sketch first**, then use calculus or inspection appropriately.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Define the median, lower quartile ($$Q_1$$), and upper quartile ($$Q_3$$) of a continuous random variable in terms of $$F$$. (3 steps)", "answer": "- Step 1: **Median** $$m$$: satisfies $$F(m) = 0.5$$. Half the probability is below $$m$$, half above.\n- Step 2: **Lower quartile** $$Q_1$$: $$F(Q_1) = 0.25$$. **Upper quartile** $$Q_3$$: $$F(Q_3) = 0.75$$. These split the distribution into quarters by probability.\n- Step 3: To find them, invert the c.d.f.: solve $$F(x) = p$$ for $$x$$, with $$p = 0.25, 0.5, 0.75$$. For piecewise $$F$$, first check $$F$$ at piece boundaries to determine which piece contains the target.\n\nIntuitively, these slice the area under $$f$$ at specific probability levels — pouring in \"probability sand\" until half-full gives the median.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "A piecewise c.d.f. $$F(x)$$ has different formulas on $$[a,b]$$ and $$[b,c]$$. Why must you check $$F(b)$$ *before* solving for the median? (3 steps)", "answer": "- Step 1: The median $$m$$ satisfies $$F(m) = 0.5$$. You need to know which formula to use — the $$[a,b]$$ one or the $$[b,c]$$ one. This depends on where $$m$$ falls.\n- Step 2: Compute $$F(b)$$. If $$F(b) < 0.5$$, the median lies in $$[b,c]$$ (since $$F$$ hasn't reached 0.5 by $$b$$). If $$F(b) > 0.5$$, it lies in $$[a,b]$$. If $$F(b) = 0.5$$, then $$m = b$$ exactly.\n- Step 3: Use the correct piece of $$F$$ to solve $$F(x) = 0.5$$. Wrong piece yields a spurious solution outside its valid range.\n\nSame logic applies to quartiles and percentiles.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "What is the $$n$$-th percentile $$P_n$$, and how does it relate to the quartiles and median? (3 steps)", "answer": "- Step 1: $$P_n$$ is the value $$a$$ satisfying $$F(a) = \\dfrac{n}{100}$$. So $$n\\%$$ of the distribution lies at or below $$P_n$$.\n- Step 2: Special cases: $$P_{25} = Q_1$$, $$P_{50} = m$$ (median), $$P_{75} = Q_3$$. Quartiles are percentiles at specific levels.\n- Step 3: To compute, solve $$F(x) = n/100$$ — same machinery as quartiles, different target probability.\n\nPercentiles generalise quartiles to any fractional level.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "For a symmetric p.d.f. about $$x = a$$, which of {mean, median, mode} are guaranteed to equal $$a$$? (3 steps)", "answer": "- Step 1: **Mean $$= a$$**: always. Symmetry means mass on both sides balances at $$a$$.\n- Step 2: **Median $$= a$$**: always. Symmetry means half the area lies on each side of $$a$$, so $$F(a) = 0.5$$.\n- Step 3: **Mode $$= a$$**: only if $$f$$ is *unimodal* with peak at $$a$$. Symmetric distributions could be bimodal (two symmetric peaks away from $$a$$) or flat (uniform, no unique mode) or have the peak at $$a$$ (like the bell curve).\n\nSo: symmetric $$\\Rightarrow$$ mean = median always; mode coincides only for unimodal symmetric distributions.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "For $$f(x) = 2x$$ on $$[0,1]$$, where are the mean, median, and mode? Why are they all different? (4 steps)", "answer": "- Step 1: The p.d.f. is strictly increasing on $$[0,1]$$, so **mode $$= 1$$** (right boundary) — probability is densest near 1.\n- Step 2: $$E(X) = \\int_0^1 x(2x)\\,dx = \\int_0^1 2x^2\\,dx = \\tfrac{2}{3}$$. So **mean $$\\approx 0.667$$**.\n- Step 3: $$F(x) = x^2$$ on $$[0,1]$$. Solving $$m^2 = 0.5$$ gives $$m = 1/\\sqrt{2} \\approx 0.707$$. So **median $$\\approx 0.707$$**.\n- Step 4: All three differ because the distribution is asymmetric. The mode is at the peak (right end); the mean is pulled left by the low-density tail near 0; the median sits between. Ordering: mean < median < mode (for this *left-skewed* distribution, where the long tail stretches left).", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "Interpret: what does a \"steep\" part of $$F(x)$$ mean about the p.d.f.? What about a \"flat\" part? (3 steps)", "answer": "- Step 1: Since $$f(x) = F'(x)$$, the slope of $$F$$ at $$x$$ equals the density $$f(x)$$.\n- Step 2: **Steep part of $$F$$**: $$f(x)$$ is large — high probability density, i.e., values near this $$x$$ are \"likely\".\n+ Steepest point = mode of $$f$$\n+ Corresponds to a peak or tall region of $$f$$\n- Step 3: **Flat part of $$F$$**: $$f(x) = 0$$ — no probability density. The variable essentially doesn't take values there.\n+ Outside support of $$f$$, $$F$$ is constant (0 or 1)\n+ Internal zeros of $$f$$ mean $$F$$ plateaus mid-graph\n\nShape of $$F$$ ↔ where probability is concentrated.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "For a uniform distribution with $$f(x) = k$$ on $$[0, L]$$, conceptually find $$k$$, $$E(X)$$, the median, the mode, and $$\\text{Var}(X)$$. (5 steps)", "answer": "- Step 1: **$$k$$**: total area $$= kL = 1$$, so $$k = 1/L$$.\n- Step 2: **$$E(X)$$**: uniform is symmetric about $$L/2$$, so $$E(X) = L/2$$.\n- Step 3: **Median**: by symmetry, also $$L/2$$.\n- Step 4: **Mode**: $$f$$ is constant — *every* point in $$[0,L]$$ is a mode (non-unique). This is the uniform's distinctive feature.\n- Step 5: **$$\\text{Var}(X)$$**: $$E(X^2) = \\int_0^L x^2(1/L)\\,dx = L^2/3$$. So $$\\text{Var}(X) = L^2/3 - (L/2)^2 = L^2/12$$.\n\nMemorable: uniform variance = (range)² / 12. This is the minimum-variance shape for a bounded support.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "Compare qualitatively: uniform $$f_1 = \\tfrac{1}{2}$$ on $$[0,2]$$ vs triangular-rising $$f_2(x) = \\tfrac{1}{2}x$$ on $$[0,2]$$. How do their means, variances, and modes differ? (3 steps)", "answer": "- Step 1: **Means**: Uniform is symmetric about 1, so $$E_1 = 1$$. Triangular skews probability rightward (higher density near 2), so $$E_2 > 1$$ — in fact $$E_2 = 4/3$$. Mean is pulled toward higher-density region.\n- Step 2: **Variances**: Uniform: $$L^2/12 = 4/12 = 1/3$$. Triangular's probability is concentrated near 2, giving smaller spread about its (right-shifted) mean. Triangular variance is $$2/9 < 1/3$$.\n- Step 3: **Modes**: Uniform: non-unique (all points equally dense). Triangular: $$x = 2$$ (right boundary, where density is highest).\n\nReshaping the p.d.f. (even on the same support) moves the mean, alters variance, and can pin down a unique mode.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Misconception: a student says \"the mode of a continuous r.v. is the most probable value\". Why is this subtly wrong? (3 steps)", "answer": "- Step 1: For any specific value $$a$$, $$P(X = a) = 0$$. So no value is \"more probable\" than another in the pointwise sense — all pointwise probabilities are zero.\n- Step 2: What's actually true: near the mode, probability is most densely packed. $$f(\\text{mode})$$ is the largest, so $$P(\\text{mode} - \\epsilon < X < \\text{mode} + \\epsilon)$$ exceeds the same-width probability around any other point.\n- Step 3: Correct phrasing: \"the mode is the value around which probability density is highest\" (a statement about density, not probability).\n\nDensity, not probability, is what we're maximising.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "For $$f(x) = k\\sin(\\pi x)$$ on $$[0,1]$$, conceptually describe how to find $$k$$ and estimate $$P(0 < X < 1/3)$$. (3 steps)", "answer": "- Step 1: **Finding $$k$$**: $$\\int_0^1 \\sin(\\pi x)\\,dx = [-\\cos(\\pi x)/\\pi]_0^1 = 2/\\pi$$. So $$k = \\pi/2$$. Conceptually: $$k$$ rescales the sine bump so its area is 1.\n- Step 2: **Shape**: $$\\sin(\\pi x)$$ on $$[0,1]$$ is a smooth bump, zero at endpoints, peaking at $$x = 1/2$$ with value 1 (so $$f$$ peaks at $$\\pi/2 \\approx 1.57$$). It's symmetric about $$x = 1/2$$.\n- Step 3: **$$P(0 < X < 1/3)$$**: we're integrating the left third of a symmetric bump — a low-density region. So the probability is less than $$1/3$$, specifically $$\\tfrac{1}{2}(1 - \\cos(\\pi/3)) = \\tfrac{1}{2}(1 - 1/2) = 1/4$$.\n\nSanity check: symmetry gives $$P(0<X<1/2) = 1/2$$, and our answer $$1/4 < 1/2$$ ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Why do we require $$F(x) \\to 1$$ as $$x \\to \\infty$$? What fails if this doesn't hold? (2 steps)", "answer": "- Step 1: Total probability = 1 (certainty that $$X$$ takes some real value). Since $$F(\\infty) = \\int_{-\\infty}^{\\infty} f(x)\\,dx$$, if this isn't 1, the p.d.f. isn't normalised.\n- Step 2: A would-be $$F(\\infty) = 0.9$$ would mean there's 0.1 \"missing\" probability — as if the r.v. could fail to take any real value 10% of the time. Incoherent. Any candidate p.d.f. that doesn't integrate to 1 isn't a genuine probability distribution. This is why finding the normalising constant $$k$$ is always the first step.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "For $$f(x) = k/x$$ on $$[1, 5]$$, explain conceptually how to find $$k$$ and then the c.d.f. (3 steps)", "answer": "- Step 1: **Finding $$k$$**: $$\\int_1^5 k/x\\,dx = k[\\ln x]_1^5 = k\\ln 5 = 1$$, so $$k = 1/\\ln 5$$. The logarithm appears because $$1/x$$ integrates to $$\\ln x$$.\n- Step 2: **C.d.f. on $$[1,5]$$**: $$F(x) = \\int_1^x \\dfrac{1}{t\\ln 5}\\,dt = \\dfrac{\\ln x}{\\ln 5}$$.\n- Step 3: **Full definition**: $$F(x) = 0$$ for $$x < 1$$, $$F(x) = \\ln x / \\ln 5$$ on $$[1,5]$$, $$F(x) = 1$$ for $$x > 5$$. Sanity: $$F(1) = 0$$ ✓, $$F(5) = 1$$ ✓.\n\nLog-scale (Benford-like) distribution: equal log-widths carry equal probability.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "For $$P(2 < X < 4)$$ with $$f(x) = 1/(x\\ln 5)$$ on $$[1,5]$$, the answer has the form $$\\dfrac{\\ln a}{\\ln b}$$. Explain what $$a, b$$ are and why this form makes sense. (3 steps)", "answer": "- Step 1: $$P(2 < X < 4) = \\int_2^4 \\dfrac{1}{x\\ln 5}\\,dx = \\dfrac{\\ln 4 - \\ln 2}{\\ln 5}$$.\n- Step 2: By log rules, $$\\ln 4 - \\ln 2 = \\ln(4/2) = \\ln 2$$. So probability $$= \\dfrac{\\ln 2}{\\ln 5}$$ with $$a = 2$$, $$b = 5$$.\n- Step 3: Conceptually, the $$1/x$$ density gives each \"interval of equal log-width\" equal probability. $$[2,4]$$ has log-width $$\\ln 2$$; $$[1,5]$$ has log-width $$\\ln 5$$. The ratio $$\\ln 2 / \\ln 5$$ is exactly right.\n\nCharacteristic of logarithmic (Benford) distributions.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Why is computing the c.d.f. usually more efficient than computing probabilities directly from the p.d.f.? (3 steps)", "answer": "- Step 1: Each probability $$P(a<X<b)$$ from the p.d.f. requires a separate integral $$\\int_a^b f(x)\\,dx$$. Many such probabilities means many integrations.\n- Step 2: Once $$F$$ is computed (one integration), any probability becomes just $$F(b) - F(a)$$ — a simple subtraction.\n- Step 3: Additionally, quantiles (median, quartiles, percentiles) and the mode (via $$f = F'$$) all become easy. $$F$$ is a \"universal tool\" — worth the one-time effort.\n\nStrategy: if the question asks multiple things about the same distribution, compute $$F$$ first.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "What happens to the c.d.f. $$F$$ at values of $$x$$ where the p.d.f. is zero but still \"inside\" the stated support? (3 steps)", "answer": "- Step 1: If $$f(x) = 0$$ on some sub-interval $$[c,d]$$, then $$F'(x) = 0$$ there — so $$F$$ is *flat* (constant) on $$[c,d]$$.\n- Step 2: No probability accumulates: $$P(c < X < d) = F(d) - F(c) = 0$$. The variable effectively skips that region.\n- Step 3: $$F$$ is still non-decreasing overall, but with a horizontal plateau wherever $$f$$ is zero.\n\nFlat sections of $$F$$ tell you exactly where $$f$$ has zero density.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "A piecewise p.d.f. is a rectangle on $$[1,2]$$ and a linear ramp on $$[2,4]$$. Describe the shape of the corresponding c.d.f. on each interval. (3 steps)", "answer": "- Step 1: On $$[1,2]$$: $$f$$ constant $$\\Rightarrow$$ $$F$$ *linear* (integrating a constant gives a line). $$F$$ ramps up at uniform rate from 0 to some intermediate value at $$x = 2$$.\n- Step 2: On $$[2,4]$$: $$f$$ linear $$\\Rightarrow$$ $$F$$ *quadratic* (integrating a line gives a parabola). $$F$$ increases with changing slope from the intermediate value to 1 at $$x = 4$$.\n- Step 3: Overall: horizontal at 0 for $$x<1$$, linear on $$[1,2]$$, quadratic on $$[2,4]$$, horizontal at 1 for $$x>4$$. $$F$$ is continuous throughout; its slope increases/decreases following $$f$$.\n\nReading the p.d.f. shape gives you the qualitative shape of $$F$$ (one \"anti-derivative level\" up).", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "What does $$P(\\mu - \\sigma < X < \\mu + \\sigma)$$ tell you, and why do people care about this? (3 steps)", "answer": "- Step 1: This is the probability that $$X$$ lies within 1 standard deviation of its mean — a common \"typical range\".\n- Step 2: For bell-shaped (normal) distributions, this probability is about 0.68 (the \"empirical rule\"). For arbitrary distributions it varies, but Chebyshev's inequality guarantees at least $$1 - 1/k^2$$ within $$k$$ SDs.\n- Step 3: Why care: $$\\sigma$$ has the same units as $$X$$, making it directly interpretable. Saying \"$$X$$ is roughly $$\\mu \\pm \\sigma$$\" summarises where $$X$$ tends to land in a way anyone can grasp.\n\nVariance is in squared units ($$s^2$$, $$\\text{m}^2$$, etc.) so we use SD for interpretation, variance for calculation.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "If $$X$$ is the side length of a cube, explain why $$E(X^3) \\neq (E(X))^3$$, and what $$E(X^3)$$ represents. (3 steps)", "answer": "- Step 1: $$X^3$$ is the volume. By $$E(g(X)) = \\int g(x)f(x)\\,dx$$, $$E(X^3)$$ is the expected volume, averaging over the distribution of $$X$$.\n- Step 2: $$(E(X))^3$$ is the volume of a cube with side equal to the mean — NOT the same as the average volume. Cubing is nonlinear: averaging-then-cubing ≠ cubing-then-averaging.\n- Step 3: By Jensen's inequality (for the convex $$x^3$$ on $$x \\geq 0$$), $$E(X^3) \\geq (E(X))^3$$. Example: sides 2 and 4 equally likely: $$E(X) = 3$$, $$(E(X))^3 = 27$$; but $$E(X^3) = (8+64)/2 = 36$$.\n\nLarger cubes dominate the average volume in a way the cubed mean can't capture.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "What does the IQR measure, and how does it compare with standard deviation? (3 steps)", "answer": "- Step 1: $$\\text{IQR} = Q_3 - Q_1$$: range of the middle 50% of the distribution.\n- Step 2: Unlike $$\\sigma$$ (which squares deviations and so is heavily influenced by extremes), IQR ignores the outer 50% entirely — it's a *robust* measure of spread.\n- Step 3: For normal-ish distributions, $$\\text{IQR} \\approx 1.35\\sigma$$. For heavy-tailed distributions, $$\\sigma$$ can be much larger (or even infinite) while IQR stays finite.\n\nIQR is preferred when tails are uncertain or data has outliers; $$\\sigma$$ is preferred when you want to use all information.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "Synthesis: outline the full workflow for computing all standard quantities from an arbitrary p.d.f. on $$[a,b]$$. (5 steps)", "answer": "- Step 1: **Normalise** — verify $$\\int_a^b f = 1$$ or find $$k$$.\n- Step 2: **Find $$F(x)$$** — integrate $$f$$. Define fully: 0 before $$a$$, 1 after $$b$$. Reusable tool for later.\n- Step 3: **Mean**: $$E(X) = \\int_a^b xf\\,dx$$. Use symmetry if available to skip calculation.\n- Step 4: **Variance**: $$E(X^2) = \\int_a^b x^2 f\\,dx$$, then $$\\text{Var}(X) = E(X^2) - (E(X))^2$$. Take $$\\sigma = \\sqrt{\\text{Var}}$$ for SD.\n- Step 5: **Quantiles**: median solves $$F(m) = 0.5$$; quartiles $$F = 0.25, 0.75$$; percentiles $$F = n/100$$. **Mode**: solve $$f'(x) = 0$$ or check boundaries/sketch.\n\nAll reduces to integration and equation-solving. $$F$$ is the MVP.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Misconception: \"$$F(1) = 0.5$$ means the probability that $$X = 1$$ is 0.5\". What's wrong? (3 steps)", "answer": "- Step 1: $$F(1)$$ means $$P(X \\leq 1)$$, NOT $$P(X = 1)$$. These are fundamentally different: cumulative vs pointwise.\n- Step 2: For a continuous r.v., $$P(X = 1) = 0$$ — always. So $$F(1) = 0.5$$ tells you nothing about a point probability.\n- Step 3: What it *does* tell you: half the distribution lies at values $$\\leq 1$$, so 1 is the **median** of $$X$$.\n\n$$F(x)$$ = probability up to $$x$$; $$f(x)$$ = density at $$x$$. Neither is \"probability at $$x$$\" for continuous variables.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Why is the concept of a \"probability density function\" specific to continuous variables — why can't discrete ones use it? (3 steps)", "answer": "- Step 1: For discrete r.v.s, point probabilities $$P(X = x)$$ are positive and sum to 1. The probability mass function directly describes the distribution value-by-value.\n- Step 2: For continuous r.v.s, all point probabilities are zero, so a mass function would be \"all zeros\" — uninformative. We need a different object: density.\n- Step 3: Density = \"probability per unit length\", a *rate*. Integrating it over an interval recovers real probability. This rate-based formalism doesn't apply to discrete values (isolated points), which need direct probabilities.\n\nDifferent worlds, different tools: sums/masses for discrete; integrals/densities for continuous.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "Given the c.d.f. $$F(x) = \\tfrac{1}{2}(x-1)$$ on $$[1, 3]$$ (0 before, 1 after), find the p.d.f. and identify the distribution. (3 steps)", "answer": "- Step 1: Differentiate: $$f(x) = F'(x) = \\tfrac{1}{2}$$ on $$[1,3]$$; $$f(x) = 0$$ elsewhere.\n- Step 2: This is the **uniform distribution on $$[1,3]$$**. Constant density at height $$1/2$$; area $$= (1/2) \\times 2 = 1$$ ✓.\n- Step 3: Properties follow immediately: mean = median = 2 (midpoint), mode non-unique, $$\\text{Var}(X) = 2^2/12 = 1/3$$.\n\nDiagnostic: a **linear** c.d.f. always implies a **uniform** distribution (constant density).", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "For a piecewise p.d.f., explain why you must ensure the c.d.f. $$F$$ is *continuous* at piece boundaries. (3 steps)", "answer": "- Step 1: $$F$$ is always continuous as a mathematical fact — it's the integral of a bounded function, and integrals are continuous.\n- Step 2: When building $$F$$ piecewise, each piece's formula must start from the value $$F$$ reached at the end of the previous piece. This is what prevents $$F$$ from jumping.\n- Step 3: Forgetting this gives a $$F$$ with gaps — meaningless probabilities. Always double-check: formula of piece 1 at its upper boundary = formula of piece 2 at its lower boundary.\n\nEach piece: \"accumulated area so far + new area from boundary to $$x$$\". The first term is the continuity fix-up.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "If the p.d.f. has a jump discontinuity at $$x = c$$, what happens to the c.d.f. at $$x = c$$? (3 steps)", "answer": "- Step 1: $$F$$ is always continuous (integral of a bounded function), so $$F$$ has *no jump* at $$c$$.\n- Step 2: However, $$F$$ may not be *differentiable* at $$c$$: its slope jumps from $$f(c^-)$$ to $$f(c^+)$$. Visually, $$F$$ has a *corner*.\n- Step 3: Practical consequence: you can differentiate $$F$$ piecewise to recover $$f$$, but at the boundary $$c$$, $$f(c)$$ may be ambiguous (left and right limits differ). This doesn't affect probabilities (integrals ignore single-point values).\n\nJumps in $$f$$ become corners in $$F$$, but never jumps.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "For a cube with side $$X$$ having $$f(x) = \\tfrac{1}{800}(x+10)$$ on $$[20,40]$$, what's the correct way to find expected volume, and why might a student err? (3 steps)", "answer": "- Step 1: **Correct**: $$E(X^3) = \\int_{20}^{40} x^3 \\cdot \\tfrac{1}{800}(x+10)\\,dx$$ — directly applying $$E(g(X)) = \\int g(x)f(x)\\,dx$$.\n- Step 2: **Wrong approach**: computing $$E(X)$$ and cubing. That gives $$(E(X))^3$$, which isn't the average volume.\n- Step 3: Why it matters: larger cubes contribute disproportionately to average volume (volume $$\\propto$$ side³). Taking $$(E(X))^3$$ ignores the variation in $$X$$ and typically *underestimates* the true expected volume.\n\nExample: $$E(X) = 3$$ gives $$(E(X))^3 = 27$$; actual $$E(X^3) = 36$$ for sides 2,4 equally likely.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "A p.d.f. has a flat segment and a rising linear segment (both non-zero). Where's the mode? (3 steps)", "answer": "- Step 1: Mode = where $$f(x)$$ is maximised.\n- Step 2: Compare heights: flat segment has height $$h_1$$; linear segment peaks at its upper end, height $$h_2$$.\n- Step 3: \n+ If $$h_2 > h_1$$: mode is at the top of the linear segment (unique).\n+ If $$h_1 > h_2$$: mode is anywhere on the flat segment (non-unique!).\n+ If $$h_1 = h_2$$: mode is any point at that common height.\n\nA flat region + taller peak elsewhere gives a unique mode at the peak. Flat region alone gives non-uniqueness.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "Compute $$P(X > Q_1)$$ without first finding $$Q_1$$ explicitly. (2 steps)", "answer": "- Step 1: By definition, $$F(Q_1) = 0.25$$ — i.e., 25% of probability lies at or below $$Q_1$$.\n- Step 2: So $$P(X > Q_1) = 1 - F(Q_1) = 1 - 0.25 = 0.75$$.\n\nNo computation of $$Q_1$$ needed. Same logic: $$P(X > \\text{median}) = 0.5$$, $$P(X > P_n) = 1 - n/100$$. Often faster than computing the quantile itself.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "If $$Y = -X$$ is a new random variable, how does its p.d.f. relate to $$X$$'s? (3 steps)", "answer": "- Step 1: $$Y = -X$$ reflects the distribution across 0. If $$X \\in [a,b]$$, then $$Y \\in [-b, -a]$$.\n- Step 2: C.d.f.: $$F_Y(y) = P(Y \\leq y) = P(-X \\leq y) = P(X \\geq -y) = 1 - F_X(-y)$$.\n- Step 3: P.d.f.: $$f_Y(y) = \\dfrac{d}{dy}[1 - F_X(-y)] = f_X(-y)$$ — the density is just reflected.\n\nBasic example of distribution transformations. For $$Y = aX+b$$ (linear), expectation and variance rules cover most exam needs.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "For an unbounded p.d.f. like $$f(t) = k/t^3$$ on $$[1, \\infty)$$, explain how to find $$k$$ and why improper integration is needed. (3 steps)", "answer": "- Step 1: Normalisation: $$\\int_1^\\infty k/t^3\\,dt = 1$$ — improper because the upper limit is infinite.\n- Step 2: $$\\int_1^\\infty t^{-3}\\,dt = [-1/(2t^2)]_1^\\infty = 0 - (-1/2) = 1/2$$. So $$k \\cdot 1/2 = 1 \\Rightarrow k = 2$$.\n- Step 3: Convergence depends on the power: $$\\int_1^\\infty t^{-p}\\,dt$$ converges iff $$p > 1$$. Here $$p = 3 > 1$$ ✓. If $$f \\propto 1/t$$ instead, the integral diverges — no valid p.d.f.\n\nOn an infinite support, $$f$$ must decay faster than $$1/t$$ for a valid distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "For a right-skewed distribution (long tail extending right), order the mean, median, and mode. Why this ordering? (3 steps)", "answer": "- Step 1: **Mode $$\\leq$$ median $$\\leq$$ mean** for right-skewed distributions.\n- Step 2: Reasoning:\n+ Mode is at the peak of the density — on the *left* side where bulk of mass sits.\n+ Median splits area into halves; long right tail's area pushes median slightly right of mode.\n+ Mean is sensitive to *magnitude* — the long right tail contributes large values, pulling mean further right than median.\n- Step 3: For symmetric distributions, all three coincide. For left-skewed, reverse the ordering. So comparing mean vs median is a qualitative skew detector: mean > median ⟹ right-skewed.", "
