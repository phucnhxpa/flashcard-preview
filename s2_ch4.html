 probability mass, not density.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "What are the lower quartile $$Q_1$$, upper quartile $$Q_3$$, and interquartile range (IQR)? How do you find them using the CDF? (3 steps)", "answer": "- Step 1: $$Q_1$$ is the value such that $$\\mathrm{F}(Q_1) = 0.25$$ — 25% of the probability lies below it. $$Q_3$$ is the value such that $$\\mathrm{F}(Q_3) = 0.75$$ — 75% of the probability lies below it.\n- Step 2: To find each, set the appropriate section of $$\\mathrm{F}(x)$$ equal to 0.25 (or 0.75) and solve for the quartile value. You must first determine which piece of a piecewise CDF contains the quartile by checking boundary values.\n- Step 3: The IQR = $$Q_3 - Q_1$$, measuring the spread of the middle 50% of the distribution. It is resistant to outliers, unlike the full range.\n\n+ For example, if $$\\mathrm{F}(2) = 0.2$$, then since $$0.25 > 0.2$$, the lower quartile lies in the second piece of the CDF (for $$x > 2$$), not the first.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "What is the $$n$$th percentile $$P_n$$, and how do you find it? Give a concrete example. (2 steps)", "answer": "- Step 1: The $$n$$th percentile is the value $$a$$ such that $$\\mathrm{F}(a) = \\frac{n}{100}$$ — $$n$$ percent of the probability lies below it. For example, the 15th percentile satisfies $$\\mathrm{F}(a) = 0.15$$.\n- Step 2: To find it, first check boundary values of $$\\mathrm{F}(x)$$ to determine which piece of the CDF contains the percentile, then solve $$\\mathrm{F}(a) = \\frac{n}{100}$$ in that piece.\n\n+ The 15th percentile with $$\\mathrm{F}(x) = \\frac{x^2}{20}$$ on $$[0, 2]$$: $$\\mathrm{F}(2) = 0.2 > 0.15$$, so the 15th percentile is in this piece. Solve $$\\frac{a^2}{20} = 0.15$$ giving $$a = \\sqrt{3} \\approx 1.73$$.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "When finding the median or a quartile from a piecewise CDF, how do you decide which piece of $$\\mathrm{F}(x)$$ to use? Walk through the strategy. (3 steps)", "answer": "- Step 1: Evaluate $$\\mathrm{F}(x)$$ at each boundary point between pieces. For instance, if the CDF has pieces on $$[1, 2]$$ and $$[2, 4]$$, compute $$\\mathrm{F}(1)$$ and $$\\mathrm{F}(2)$$.\n- Step 2: Compare these boundary values with the target probability (0.5 for median, 0.25 for $$Q_1$$, etc.). The median lies in the piece where $$\\mathrm{F}$$ crosses 0.5 — i.e., the piece whose left boundary has $$\\mathrm{F} < 0.5$$ and whose right boundary has $$\\mathrm{F} > 0.5$$.\n- Step 3: Use the formula from that piece to solve for the unknown value.\n\n+ Example: If $$\\mathrm{F}(2) = 0.2$$ and $$\\mathrm{F}(4) = 1$$, then since $$0.5$$ lies between 0.2 and 1, the median is in the second piece ($$x > 2$$). You would never look in the first piece for the median.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "For a symmetric continuous distribution, what relationships hold between the mean, median, and mode? What about a non-symmetric (skewed) distribution? (3 steps)", "answer": "- Step 1: For a **symmetric** distribution: mean = median. The centre of symmetry is both the balance point (mean) and the 50% split point (median). If the PDF has a unique peak at the centre, then mode = mean = median.\n- Step 2: For a **positively skewed** distribution (long tail to the right): mode < median < mean. The mean is pulled toward the long tail by the extreme values, the median is less affected, and the mode sits at the peak near the left.\n- Step 3: For a **negatively skewed** distribution (long tail to the left): mean < median < mode. The mean is pulled left by the tail, while the mode sits at the peak near the right.\n\nThese orderings are typical but not universal laws — specific distributions can deviate.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "Can the mode and median be equal for a non-symmetric distribution? Give a conceptual argument. (2 steps)", "answer": "- Step 1: Yes, it is possible. The mode is the peak of the density, and the median is where 50% of area is on each side. These are different criteria, and they can coincide even without symmetry.\n- Step 2: For example, imagine a PDF that is very tall and narrow on the left (creating a mode there), with a long thin tail to the right. If the tall narrow section happens to contain exactly 50% of the total area, the median would also be in that region, potentially at or near the mode. The distribution is clearly non-symmetric, yet mode ≈ median.\n\nThe challenge exercise in the text asks you to construct such a PDF explicitly — it demonstrates that equality of mode and median does not imply symmetry.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "A student proposes $$\\mathrm{F}(x) = \\frac{1}{5}(16x - x^2 - 55)$$ for $$5 \\leq x \\leq 10$$ as a CDF. What must you check to determine if this is valid? (3 steps)", "answer": "- Step 1: Check boundary conditions: $$\\mathrm{F}(5)$$ should equal 0 and $$\\mathrm{F}(10)$$ should equal 1. Compute $$\\mathrm{F}(5) = \\frac{1}{5}(80 - 25 - 55) = \\frac{1}{5}(0) = 0$$ ✓. Compute $$\\mathrm{F}(10) = \\frac{1}{5}(160 - 100 - 55) = \\frac{1}{5}(5) = 1$$ ✓.\n- Step 2: Check that $$\\mathrm{F}(x)$$ is **non-decreasing** on $$[5, 10]$$ — a CDF must never decrease (probability can only accumulate). The derivative is $$\\mathrm{f}(x) = \\frac{1}{5}(16 - 2x)$$, which equals $$\\frac{1}{5}(16 - 2x)$$. At $$x = 8$$, $$\\mathrm{f}(8) = 0$$; for $$x > 8$$, $$\\mathrm{f}(x) < 0$$ — the PDF would be negative!\n- Step 3: Since $$\\mathrm{f}(x) < 0$$ for $$x > 8$$, the CDF would *decrease* on $$[8, 10]$$, meaning probability would be *lost* as $$x$$ increases. This violates the fundamental requirement that a CDF must be non-decreasing. Therefore, this cannot be a valid CDF.\n\nA valid CDF must be non-decreasing everywhere — equivalently, the derived PDF must be non-negative everywhere.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "What visual intuition connects the PDF and CDF? Describe how the graphs relate to each other. (3 steps)", "answer": "- Step 1: The PDF $$\\mathrm{f}(x)$$ is a curve whose height represents probability *density* — how \"concentrated\" probability is at each point. Areas under this curve give probabilities for intervals.\n- Step 2: The CDF $$\\mathrm{F}(x)$$ is the *running total* of area under the PDF from the left. At any point $$x$$, $$\\mathrm{F}(x)$$ equals the shaded area under $$\\mathrm{f}(x)$$ from the far left up to $$x$$. As you move right, the CDF climbs (accumulating area) until it reaches 1.\n- Step 3: Where the PDF is tall (high density), the CDF climbs steeply (rapid accumulation). Where the PDF is flat or zero, the CDF is flat (no accumulation). The CDF's slope at any point equals the PDF's height: $$\\mathrm{f}(x) = \\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{F}(x)$$.\n\nThink of the PDF as the \"speed\" of probability accumulation and the CDF as the \"distance traveled\" — they are related by differentiation/integration just like speed and distance.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "Why does the total area under the PDF equal 1? Connect this to the meaning of probability. (2 steps)", "answer": "- Step 1: The random variable $$X$$ must take *some* value — this is certain, so the probability is 1. The event \"$$X$$ takes a value in its entire range\" corresponds to integrating the PDF over all possible values.\n- Step 2: $$\\int_{-\\infty}^{\\infty}\\mathrm{f}(x)\\,\\mathrm{d}x = 1$$ because this integral represents $$\\mathrm{P}(X \\text{ takes some value})$$, which must equal 1 (certainty). This is the continuous analogue of $$\\sum \\mathrm{P}(X = x) = 1$$ for discrete variables.\n\nThe normalization condition is not arbitrary — it encodes the logical requirement that something must happen.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "When finding $$\\mathrm{F}(x)$$ from $$\\mathrm{f}(x)$$, two methods are available: definite integration and indefinite integration + constant. Contrast them. (3 steps)", "answer": "- Step 1: **Method 1 (Definite)**: $$\\mathrm{F}(x) = \\int_a^x \\mathrm{f}(t)\\,\\mathrm{d}t$$, where $$a$$ is the lower boundary of the PDF's range. This directly gives $$\\mathrm{F}(x)$$ with no unknown constant, since $$\\mathrm{F}(a) = 0$$ is built in.\n- Step 2: **Method 2 (Indefinite)**: $$\\mathrm{F}(x) = \\int \\mathrm{f}(x)\\,\\mathrm{d}x + c$$, then find $$c$$ using a boundary condition: either $$\\mathrm{F}(a) = 0$$ (at the lower boundary) or $$\\mathrm{F}(b) = 1$$ (at the upper boundary). You use $$\\mathrm{f}(x)$$ as the variable (no limits), which can feel more natural.\n- Step 3: Both methods yield the same result. Method 1 is more direct but requires identifying the correct lower limit. Method 2 requires an extra step to find $$c$$, but some students find the integration easier without limits.\n\nChoose whichever feels more natural — but always verify your answer satisfies $$\\mathrm{F}(a) = 0$$ and $$\\mathrm{F}(b) = 1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A PDF is defined as $$\\mathrm{f}(x) = k$$ on $$[0, 2]$$ and $$\\mathrm{f}(x) = k(x-1)$$ on $$[2, 4]$$, zero elsewhere. Describe the shape of this PDF and what geometric areas you'd compute to find $$k$$. (3 steps)", "answer": "- Step 1: On $$[0, 2]$$, $$\\mathrm{f}(x) = k$$ is a **rectangle** of height $$k$$ and width 2, giving area $$2k$$.\n- Step 2: On $$[2, 4]$$, $$\\mathrm{f}(x) = k(x-1)$$ is a **line** increasing from $$\\mathrm{f}(2) = k$$ to $$\\mathrm{f}(4) = 3k$$. This forms a **trapezium** with parallel sides of height $$k$$ and $$3k$$, and width 2, giving area $$\\frac{1}{2}(k + 3k) \\times 2 = 4k$$.\n- Step 3: Total area = $$2k + 4k = 5k = 1$$, so $$k = \\frac{1}{5}$$. For piecewise PDFs with linear sections, geometric area formulas (rectangles, triangles, trapezia) can replace integration — often faster and more intuitive.\n\nThis geometric shortcut works whenever the PDF pieces are linear (constant, straight lines). For curves, you must integrate.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "For the uniform-like PDF $$\\mathrm{f}(x) = \\frac{1}{8}(x-2)$$ on $$[2, 6]$$, zero elsewhere: without full calculation, what can you say about the relative positions of the mean, median, and mode? (3 steps)", "answer": "- Step 1: The PDF is a straight line increasing from $$\\mathrm{f}(2) = 0$$ to $$\\mathrm{f}(6) = \\frac{1}{2}$$ — a triangle with its peak at $$x = 6$$. The **mode** is at the right boundary, $$x = 6$$, since that's where the density is highest.\n- Step 2: The distribution is **positively skewed** (all the density is pushed toward the right). The median will be to the right of the midpoint (4) but less than 6, since more area accumulates on the right side.\n- Step 3: The mean will also be pulled rightward but less extremely than the mode. The ordering will be: mean < median < mode, which is characteristic of negative skew... Wait — actually, the tail is on the LEFT here (the density ramps up from left to right, meaning there's a long low-density region on the left). This is actually **negatively skewed** in the conventional sense? Let me reconsider: the mass is concentrated on the right, so the mean is pulled right — mean > midpoint. Actually for this triangular distribution increasing from left to right, the mean = $$\\frac{2+6+6}{3} = \\frac{14}{3} \\approx 4.67$$, median ≈ 4.83, mode = 6. So: mean < median < mode — this is **negatively skewed** (tail on the left, mass on the right).\n\nFor a right-ramping triangle, the ordering is mean < median < mode — opposite to what many students expect.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "Explain why $$\\mathrm{E}(X^2) \\geq [\\mathrm{E}(X)]^2$$ always holds for any random variable. What does this imply about variance? (3 steps)", "answer": "- Step 1: By definition, $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2$$. Since variance is the average of squared deviations and squared quantities are always non-negative, $$\\mathrm{Var}(X) \\geq 0$$.\n- Step 2: Therefore $$\\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2 \\geq 0$$, which rearranges to $$\\mathrm{E}(X^2) \\geq [\\mathrm{E}(X)]^2$$.\n- Step 3: Equality holds only when $$\\mathrm{Var}(X) = 0$$, meaning $$X$$ is a constant (no variability at all). For any non-degenerate random variable, $$\\mathrm{E}(X^2)$$ is strictly greater than $$[\\mathrm{E}(X)]^2$$.\n\nThis is why $$\\mathrm{E}(X^3) > [\\mathrm{E}(X)]^3$$ for distributions with positive skew and positive mean — the inequality compounds through higher powers.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "A continuous random variable $$X$$ has PDF $$\\mathrm{f}(x) = 2x$$ on $$[0, 1]$$, zero elsewhere. Without lengthy calculation, find $$\\mathrm{E}(X)$$ and the median conceptually. (2 steps)", "answer": "- Step 1: $$\\mathrm{E}(X) = \\int_0^1 x \\cdot 2x\\,\\mathrm{d}x = \\int_0^1 2x^2\\,\\mathrm{d}x = \\left[\\frac{2x^3}{3}\\right]_0^1 = \\frac{2}{3}$$. The mean is $$\\frac{2}{3}$$, pulled rightward from the midpoint $$\\frac{1}{2}$$ because the density is higher on the right (more weight on larger values).\n- Step 2: For the median, first find the CDF: $$\\mathrm{F}(x) = \\int_0^x 2t\\,\\mathrm{d}t = x^2$$. Set $$\\mathrm{F}(m) = 0.5$$: $$m^2 = 0.5$$, so $$m = \\frac{1}{\\sqrt{2}} \\approx 0.707$$. The median is between the midpoint (0.5) and the mean (0.667), consistent with the right-skewed shape.\n\nQuick mental check: mean ≈ 0.67, median ≈ 0.71 — wait, median > mean? Actually $$\\frac{1}{\\sqrt{2}} \\approx 0.707 > \\frac{2}{3} \\approx 0.667$$, so median > mean. For this distribution (density increasing rightward), the mode is at 1, and we get mean < median < mode — negatively skewed ordering.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "For a uniform distribution on $$[a, b]$$ (constant PDF), what are the mean, median, and mode? Explain why they're all equal. (3 steps)", "answer": "- Step 1: The PDF is $$\\mathrm{f}(x) = \\frac{1}{b-a}$$ on $$[a, b]$$ — a flat rectangle. Every value in the range is equally likely (in terms of density).\n- Step 2: The mean is $$\\mathrm{E}(X) = \\frac{a+b}{2}$$ — the midpoint, by symmetry. The median is also the midpoint since the CDF $$\\mathrm{F}(x) = \\frac{x-a}{b-a}$$ gives $$\\mathrm{F}\\left(\\frac{a+b}{2}\\right) = 0.5$$.\n- Step 3: The mode is technically any value in $$[a, b]$$ (since all have equal density), but conventionally we say the distribution has no unique mode, or we report the entire interval. The key point: for a perfectly symmetric, flat distribution, mean = median, and there's no single peak for a mode.\n\nThe uniform distribution is the simplest continuous distribution — all three location measures coincide at the centre.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "A student computes $$\\mathrm{E}(X)$$ for a piecewise PDF and gets a value outside the range of $$X$$. Is this possible? What does it tell you? (2 steps)", "answer": "- Step 1: No, this is impossible for a valid PDF. The mean $$\\mathrm{E}(X) = \\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$ is a weighted average of values of $$X$$, with weights given by the PDF. Since all values of $$X$$ lie within its range, and the weights are non-negative and sum to 1, the weighted average must also lie within the range.\n- Step 2: If you compute a mean outside the range, you've made an error — likely a calculation mistake in the integration, or you've used the wrong limits, or the function isn't actually a valid PDF.\n\nThe mean is always between the minimum and maximum possible values of $$X$$ — this is a useful sanity check.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": true}, {"question": "When going from CDF to PDF, you differentiate $$\\mathrm{F}(x)$$ to get $$\\mathrm{f}(x)$$. What must you remember about regions where $$\\mathrm{F}(x)$$ is defined as a constant (0 or 1)? (2 steps)", "answer": "- Step 1: Where $$\\mathrm{F}(x) = 0$$ (for $$x$$ below the range) or $$\\mathrm{F}(x) = 1$$ (for $$x$$ above the range), the derivative is zero: $$\\mathrm{f}(x) = 0$$ in these regions. This is correct — there's no probability density outside the range.\n- Step 2: You must include these regions in your piecewise definition of $$\\mathrm{f}(x)$$: write $$\\mathrm{f}(x) = 0$$ for $$x < a$$ and $$x > b$$ (or \"otherwise\"). A common mistake is to only state the formula for the active region and forget to specify that $$\\mathrm{f}(x) = 0$$ elsewhere.\n\nThe full definition of $$\\mathrm{f}(x)$$ must cover all real numbers, just as the full definition of $$\\mathrm{F}(x)$$ must.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "The CDF $$\\mathrm{F}(x) = \\frac{1}{81}(-2x^3 + 15x^2 - 44)$$ on $$[2, 5]$$ gives a PDF $$\\mathrm{f}(x) = \\frac{1}{81}(-6x^2 + 30x)$$ on $$[2, 5]$$, zero elsewhere. The mode is found by setting $$\\mathrm{f}'(x) = 0$$: $$-12x + 30 = 0$$, so $$x = 2.5$$. But $$\\mathrm{f}(2.5) = \\frac{1}{81}(30 \\times 2.5 - 6 \\times 6.25) > 0$$ while $$\\mathrm{f}(2) = \\frac{1}{81}(60-24) > 0$$ and $$\\mathrm{f}(5) = \\frac{1}{81}(150-150) = 0$$. Is $$x = 2.5$$ definitely the mode? (2 steps)", "answer": "- Step 1: Yes, $$x = 2.5$$ is the mode. We verified that $$\\mathrm{f}(2.5) > 0$$ (it's a genuine peak, not a minimum or point of inflection), and $$\\mathrm{f}(x)$$ decreases after $$x = 2.5$$ toward $$\\mathrm{f}(5) = 0$$. The second derivative $$\\mathrm{f}''(x) = -12 < 0$$ confirms concavity (a maximum).\n- Step 2: The boundary values confirm this: $$\\mathrm{f}(2) = \\frac{36}{81}$$, $$\\mathrm{f}(2.5) = \\frac{37.5}{81}$$ (larger), and $$\\mathrm{f}(5) = 0$$. The interior maximum at 2.5 exceeds both boundary values, so it is indeed the global maximum on $$[2, 5]$$.\n\nAlways compare interior stationary points with boundary values — the global maximum (mode) could be at a boundary even if there's an interior stationary point.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "Why is it important to sketch the PDF before finding the mode? Give two reasons. (2 steps)", "answer": "- Step 1: A sketch reveals whether the function is monotonic (always increasing or decreasing). If so, the mode is at a boundary, and setting $$\\mathrm{f}'(x) = 0$$ won't find it — there may be no interior stationary point at all.\n- Step 2: A sketch helps you distinguish between maxima and minima among the solutions to $$\\", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}], "count": 40}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A probability density function $$\\mathrm{f}(x)$$ must satisfy two conditions to be valid. One is that $$\\mathrm{f}(x) \\geq 0$$ for all $$x$$. What is the other condition, and intuitively, why must both hold? (2 steps)", "answer": "- Step 1: The second condition is that the total area under the p.d.f. must equal 1: $$\\int_{-\\infty}^{\\infty} \\mathrm{f}(x)\\,\\mathrm{d}x = 1$$. In practice, you only integrate over the range where $$\\mathrm{f}(x)$$ is non-zero.\n- Step 2: The intuition is that $$X$$ must take *some* value — the total probability over all possible outcomes must be exactly 1. The condition $$\\mathrm{f}(x) \\geq 0$$ ensures probabilities are never negative (you can't have negative area, and probabilities can't be negative). Together, these ensure the p.d.f. describes a valid probability distribution where areas correspond to probabilities between 0 and 1.\n\nThink of it like a blanket of total area 1 draped over the number line: the blanket can't dip below the floor (non-negativity), and it must cover exactly 1 unit of area (total probability = 1).", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A student says: \"The p.d.f. $$\\mathrm{f}(x)$$ gives the probability that $$X = x$$, just like a probability function for a discrete variable.\" Explain why this is wrong, and clarify what $$\\mathrm{f}(x)$$ actually represents. (3 steps)", "answer": "- Step 1: For a continuous random variable, $$\\mathrm{P}(X = x) = 0$$ for every value of $$x$$. So $$\\mathrm{f}(x)$$ is *not* a probability — it can even exceed 1 in some cases, which a probability never can.\n- Step 2: Instead, $$\\mathrm{f}(x)$$ is a **density**. It tells you how \"concentrated\" the probability is around the value $$x$$. A higher value of $$\\mathrm{f}(x)$$ means the variable is more likely to be found *near* $$x$$, not *at* $$x$$.\n- Step 3: Probabilities come from *areas* under $$\\mathrm{f}(x)$$, not from values of $$\\mathrm{f}(x)$$ itself. The probability of $$X$$ falling in a small interval $$[x, x + \\delta x]$$ is approximately $$\\mathrm{f}(x) \\cdot \\delta x$$ — the density times the width. Only when you accumulate (integrate) over a range do you get a non-zero probability.\n\nThe analogy: just as population density (people per km²) is not a number of people, but integrating it over an area gives the population — $$\\mathrm{f}(x)$$ is probability per unit length, and integrating gives probability.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "Consider $$\\mathrm{f}(x) = \\begin{cases} kx(5-x) & 0 \\leq x \\leq 6 \\\\ 0 & \\text{otherwise}\\end{cases}$$ where $$k$$ is a positive constant. Could this be a valid p.d.f. for any value of $$k$$? Explain why or why not. (3 steps)", "answer": "- Step 1: Check the non-negativity condition. The function $$kx(5-x)$$ has roots at $$x = 0$$ and $$x = 5$$. Between $$x = 5$$ and $$x = 6$$, the factor $$(5 - x)$$ is negative while $$x$$ is positive, so $$\\mathrm{f}(x) < 0$$ for $$5 < x \\leq 6$$.\n- Step 2: Since $$k$$ is given as a positive constant, there is no way to fix this — making $$k$$ negative would violate the condition on other parts of the domain. The negativity is a structural problem with the function, not a scaling problem.\n- Step 3: Therefore, for *any* positive value of $$k$$, there exist values of $$x$$ in $$[0, 6]$$ where $$\\mathrm{f}(x) < 0$$. This function **cannot** be a valid p.d.f. for any positive $$k$$.\n\nThis is a common exam trap: you must check *both* conditions (non-negativity AND total area = 1). A function can pass the area test but fail the non-negativity test.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "A function is proposed as a p.d.f.: $$\\mathrm{f}(x) = \\begin{cases} 2x+1 & 0 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise}\\end{cases}$$. It satisfies $$\\mathrm{f}(x) \\geq 0$$ on its domain. Why is it still not a valid p.d.f.? (2 steps)", "answer": "- Step 1: We must check the second condition: the total area under the curve must equal 1. Computing: $$\\int_0^3 (2x+1)\\,\\mathrm{d}x = \\left[x^2 + x\\right]_0^3 = 9 + 3 = 12$$.\n- Step 2: The total area is 12, not 1. Since the area under the p.d.f. represents total probability, this would imply a total probability of 12 — impossible. Without a scaling constant $$k$$ to adjust it (which would require $$k = \\frac{1}{12}$$), this function as written is not a valid p.d.f.\n\nA p.d.f. must satisfy *both* conditions simultaneously: non-negativity everywhere AND total area exactly 1.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "Given a p.d.f. with an unknown constant $$k$$, what is the general procedure to find $$k$$, and why does this work? (2 steps)", "answer": "- Step 1: Set up the equation $$\\int_a^b k \\cdot g(x)\\,\\mathrm{d}x = 1$$, where $$[a, b]$$ is the range where the p.d.f. is non-zero and $$g(x)$$ is the functional part. Factor out $$k$$: $$k \\int_a^b g(x)\\,\\mathrm{d}x = 1$$.\n- Step 2: Evaluate the integral to get a number, say $$A$$, so $$kA = 1$$, giving $$k = \\frac{1}{A}$$. This works because the total area under the p.d.f. must equal 1 (total probability = 1), and $$k$$ is the scaling factor that ensures this. The integral $$A$$ gives the \"raw\" area, and $$k$$ rescales it to exactly 1.\n\nAlways verify that the resulting $$\\mathrm{f}(x)$$ is non-negative everywhere after finding $$k$$.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "For a continuous random variable with p.d.f. $$\\mathrm{f}(x)$$, does it matter whether you write $$\\mathrm{P}(a < X < b)$$, $$\\mathrm{P}(a \\leq X < b)$$, $$\\mathrm{P}(a < X \\leq b)$$, or $$\\mathrm{P}(a \\leq X \\leq b)$$? Explain. (3 steps)", "answer": "- Step 1: For a continuous random variable, $$\\mathrm{P}(X = a) = 0$$ and $$\\mathrm{P}(X = b) = 0$$ for any specific values $$a$$ and $$b$$.\n- Step 2: Therefore, including or excluding the endpoints makes no difference: $$\\mathrm{P}(a \\leq X \\leq b) = \\mathrm{P}(a < X < b) + \\mathrm{P}(X = a) + \\mathrm{P}(X = b) = \\mathrm{P}(a < X < b) + 0 + 0$$.\n- Step 3: All four expressions are equal and are computed by the same integral: $$\\int_a^b \\mathrm{f}(x)\\,\\mathrm{d}x$$. This is a key difference from discrete random variables, where $$\\mathrm{P}(X = a)$$ can be non-zero and the strict vs. non-strict inequality matters.\n\nThis is why, for continuous variables, we freely switch between $$<$$ and $$\\leq$$ without changing the answer.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "The continuous random variable $$X$$ has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{5} & 1 < x < 2 \\\\ \\frac{1}{5}(x-1) & 2 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise}\\end{cases}$$. To find $$\\mathrm{P}(X > 3)$$, you could integrate or use geometry. Why can geometry work here, and what area are you finding? (2 steps)", "answer": "- Step 1: The p.d.f. consists of straight-line segments (a flat section and a linear section), so the region under the curve is made of simple geometric shapes — rectangles, triangles, and trapezia. The probability is the area of the region under $$\\mathrm{f}(x)$$ between $$x = 3$$ and $$x = 4$$.\n- Step 2: At $$x = 3$$, $$\\mathrm{f}(3) = \\frac{1}{5}(3-1) = \\frac{2}{5}$$; at $$x = 4$$, $$\\mathrm{f}(4) = \\frac{1}{5}(4-1) = \\frac{3}{5}$$. The region is a trapezium with parallel sides $$\\frac{2}{5}$$ and $$\\frac{3}{5}$$, and width 1. Its area is $$\\frac{1}{2}\\left(\\frac{2}{5} + \\frac{3}{5}\\right) \\times 1 = \\frac{1}{2}$$, so $$\\mathrm{P}(X > 3) = \\frac{1}{2}$$.\n\nGeometry is a useful shortcut when the p.d.f. is piecewise linear — it avoids integration entirely and can help you check your working.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "The cumulative distribution function (c.d.f.) $$\\mathrm{F}(x)$$ is defined as $$\\mathrm{F}(x) = \\mathrm{P}(X \\leq x)$$. How is it related to the p.d.f. $$\\mathrm{f}(x)$$, and what does this relationship look like visually? (3 steps)", "answer": "- Step 1: The c.d.f. is the integral of the p.d.f. up to the point $$x$$: $$\\mathrm{F}(x) = \\int_{-\\infty}^{x} \\mathrm{f}(t)\\,\\mathrm{d}t$$. We use a dummy variable $$t$$ (not $$x$$) in the integration because $$x$$ is the upper limit.\n- Step 2: Visually, $$\\mathrm{F}(x)$$ is the **area under the p.d.f. curve to the left of $$x$$**. As $$x$$ increases, more area accumulates, so $$\\mathrm{F}(x)$$ is a non-decreasing function starting at 0 (far left) and ending at 1 (far right).\n- Step 3: Conversely, the p.d.f. is the derivative of the c.d.f.: $$\\mathrm{f}(x) = \\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{F}(x)$$. The p.d.f. tells you the *rate* at which the c.d.f. is increasing — where the c.d.f. is steep, the p.d.f. is large (probability is dense); where the c.d.f. is flat, the p.d.f. is zero.\n\nNotation: p.d.f. uses lowercase $$\\mathrm{f}$$, c.d.f. uses uppercase $$\\mathrm{F}$$. This matches the normal distribution notation where $$\\Phi(z) = \\mathrm{P}(Z \\leq z)$$ is the c.d.f.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "When finding the c.d.f. from a p.d.f. that is defined on $$[a, b]$$ (and zero elsewhere), the c.d.f. must be fully specified for all real numbers. What does $$\\mathrm{F}(x)$$ equal for $$x < a$$ and for $$x > b$$, and why? (2 steps)", "answer": "- Step 1: For $$x < a$$: since $$\\mathrm{f}(x) = 0$$ for all values less than $$a$$, the area to the left of any such $$x$$ is 0. Therefore $$\\mathrm{F}(x) = 0$$ for $$x < a$$. Intuitively, there is no probability of $$X$$ being below the minimum possible value.\n- Step 2: For $$x > b$$: all the probability has been accumulated by the time we pass $$x = b$$, so $$\\mathrm{F}(x) = 1$$ for $$x > b$$. The total area under the p.d.f. is 1, and we've captured all of it. Intuitively, $$X$$ is certain to be at or below any value greater than the maximum.\n\nA fully specified c.d.f. always has three parts: 0 below the range, the integral formula within the range, and 1 above the range.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "To find the c.d.f. from a p.d.f., two methods are available. Method 1 uses a definite integral; Method 2 uses an indefinite integral plus a constant. Describe both methods for a p.d.f. defined on $$[a, b]$$. (3 steps)", "answer": "- Step 1: **Method 1 (Definite integral):** Compute $$\\mathrm{F}(x) = \\int_a^x \\mathrm{f}(t)\\,\\mathrm{d}t$$ for $$a \\leq x \\leq b$$. The lower limit is $$a$$ (where the p.d.f. starts being non-zero), and the upper limit is the variable $$x$$. This automatically gives $$\\mathrm{F}(a) = 0$$, which is correct.\n- Step 2: **Method 2 (Indefinite integral + constant):** Compute the antiderivative $$\\int \\mathrm{f}(x)\\,\\mathrm{d}x$$, giving a result plus \"$$+ c$$\". Then use a boundary condition to find $$c$$: either $$\\mathrm{F}(a) = 0$$ (at the lower limit, c.d.f. = 0) or $$\\mathrm{F}(b) = 1$$ (at the upper limit, c.d.f. = 1).\n- Step 3: Both methods give the same result. Method 1 is often cleaner because the constant is handled automatically. Method 2 can be quicker for simple integrals. Either way, always write the full piecewise definition: $$\\mathrm{F}(x) = 0$$ for $$x < a$$, the formula for $$a \\leq x \\leq b$$, and $$1$$ for $$x > b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "When a p.d.f. is defined piecewise over multiple intervals (e.g., different formulas on $$[a, b]$$ and $$[b, c]$$), how do you construct the c.d.f. for the second interval? What crucial step must you not forget? (3 steps)", "answer": "- Step 1: For the first interval, integrate the p.d.f. from the lower bound to $$x$$ as usual: $$\\mathrm{F}(x) = \\int_a^x \\mathrm{f}(t)\\,\\mathrm{d}t$$. Evaluate this at the upper boundary $$x = b$$ to get $$\\mathrm{F}(b)$$, the cumulative probability up to the end of the first piece.\n- Step 2: For the second interval, the c.d.f. must be *cumulative* — it includes all the probability from the first interval plus the new area. So: $$\\mathrm{F}(x) = \\mathrm{F}(b) + \\int_b^x \\mathrm{f}(t)\\,\\mathrm{d}t$$ for $$b \\leq x \\leq c$$.\n- Step 3: The crucial step you must not forget is **adding on $$\\mathrm{F}(b)$$** — the accumulated probability from the previous section. Without it, your c.d.f. would restart from 0 at $$x = b$$, which is wrong. The c.d.f. must be continuous and non-decreasing, always building upon what came before.\n\nEach piece of the c.d.f. \"stands on the shoulders\" of the previous piece. This is why it's called *cumulative*.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Given a c.d.f. $$\\mathrm{F}(x)$$, how do you recover the p.d.f. $$\\mathrm{f}(x)$$? What happens to $$\\mathrm{f}(x)$$ in regions where $$\\mathrm{F}(x)$$ is constant? (2 steps)", "answer": "- Step 1: Differentiate the c.d.f.: $$\\mathrm{f}(x) = \\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{F}(x)$$. This is the inverse of the integration relationship. For example, if $$\\mathrm{F}(x) = \\frac{1}{5}x + \\frac{3}{20}x^2$$ on $$[0, 2]$$, then $$\\mathrm{f}(x) = \\frac{1}{5} + \\frac{3}{10}x$$ on that interval, and 0 elsewhere.\n- Step 2: Where $$\\mathrm{F}(x)$$ is constant (e.g., $$\\mathrm{F}(x) = 0$$ for $$x < a$$, or $$\\mathrm{F}(x) = 1$$ for $$x > b$$), its derivative is 0, so $$\\mathrm{f}(x) = 0$$ there. This makes sense: if the cumulative probability isn't increasing, no probability is being accumulated, so the density is zero.\n\nThe p.d.f. is only non-zero on the interval where the c.d.f. is actively increasing.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Using the c.d.f. $$\\mathrm{F}(x)$$, how would you compute $$\\mathrm{P}(a \\leq X \\leq b)$$? Give the formula and explain the logic. (2 steps)", "answer": "- Step 1: The probability that $$X$$ falls between $$a$$ and $$b$$ is: $$\\mathrm{P}(a \\leq X \\leq b) = \\mathrm{F}(b) - \\mathrm{F}(a)$$. This is because $$\\mathrm{F}(b) = \\mathrm{P}(X \\leq b)$$ gives the total probability to the left of $$b$$, and $$\\mathrm{F}(a) = \\mathrm{P}(X \\leq a)$$ gives the total probability to the left of $$a$$.\n- Step 2: Subtracting removes the probability below $$a$$ and leaves only the probability between $$a$$ and $$b$$. Visually, it's the area under the p.d.f. from $$a$$ to $$b$$ — the total area to the left of $$b$$ minus the area to the left of $$a$$.\n\nThis is much faster than integrating the p.d.f. every time — one of the main advantages of having the c.d.f.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "A student computes $$\\mathrm{P}(X = 1)$$ using a c.d.f. and writes $$\\mathrm{P}(X = 1) = \\mathrm{F}(1) = 0.3$$. What is wrong with this reasoning? (2 steps)", "answer": "- Step 1: The c.d.f. gives $$\\mathrm{F}(1) = \\mathrm{P}(X \\leq 1)$$, the probability that $$X$$ is less than or equal to 1. This is *not* the same as $$\\mathrm{P}(X = 1)$$.\n- Step 2: For a continuous random variable, $$\\mathrm{P}(X = x) = 0$$ for every value of $$x$$. The correct answer is $$\\mathrm{P}(X = 1) = 0$$. The value $$\\mathrm{F}(1) = 0.3$$ is the probability that $$X \\leq 1$$, which involves a whole range of values, not just the single point $$x = 1$$.\n\nThis is a fundamental property of continuous distributions: individual points carry zero probability; only intervals have positive probability.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "The c.d.f. of $$X$$ is given as $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 2 \\\\ \\frac{1}{6}x^p + q & 2 \\leq x \\leq 4 \\\\ 1 & x > 4\\end{cases}$$. How can you find the unknown constants $$p$$ and $$q$$? (3 steps)", "answer": "- Step 1: Use the boundary condition at the lower limit: $$\\mathrm{F}(2) = 0$$, since the c.d.f. must equal 0 at the start of the range. Substituting: $$\\frac{1}{6}(2^p) + q = 0$$, giving equation (1): $$\\frac{2^p}{6} + q = 0$$.\n- Step 2: Use the boundary condition at the upper limit: $$\\mathrm{F}(4) = 1$$, since the c.d.f. must equal 1 at the end of the range. Substituting: $$\\frac{1}{6}(4^p) + q = 1$$, giving equation (2): $$\\frac{4^p}{6} + q = 1$$.\n- Step 3: Subtract equation (1) from equation (2): $$\\frac{4^p - 2^p}{6} = 1$$, so $$4^p - 2^p = 6$$. Since $$4^p = (2^p)^2$$, let $$u = 2^p$$: then $$u^2 - u - 6 = 0$$, giving $$(u-3)(u+2) = 0$$, so $$u = 3$$ (rejecting $$u = -2$$). Thus $$2^p = 3$$, so $$p = \\log_2 3$$. From equation (1): $$q = -\\frac{3}{6} = -\\frac{1}{2}$$.\n\nThe two boundary conditions of any c.d.f. — $$\\mathrm{F}(a) = 0$$ and $$\\mathrm{F}(b) = 1$$ — are always your primary tools for finding unknown constants.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "The mean (expected value) of a continuous random variable $$X$$ with p.d.f. $$\\mathrm{f}(x)$$ is given by $$\\mathrm{E}(X) = \\int_{-\\infty}^{\\infty} x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. Give an intuitive explanation of what this formula is computing. (2 steps)", "answer": "- Step 1: The integrand $$x \\cdot \\mathrm{f}(x)$$ weights each value of $$x$$ by how \"dense\" the probability is at that point. Values where $$\\mathrm{f}(x)$$ is large contribute more to the average; values where $$\\mathrm{f}(x)$$ is small contribute less.\n- Step 2: Integrating over all $$x$$ sums up all these weighted contributions, giving the \"centre of mass\" or balance point of the distribution. This is the continuous analogue of the discrete formula $$\\mathrm{E}(X) = \\sum x \\cdot \\mathrm{P}(X = x)$$, with the sum replaced by an integral and the probability function replaced by the p.d.f.\n\nVisually, if the p.d.f. curve were a physical sheet of uniform density, $$\\mathrm{E}(X)$$ is the $$x$$-coordinate where the sheet would balance on a fulcrum.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "The variance of a continuous random variable $$X$$ can be written in two equivalent forms. One is $$\\mathrm{Var}(X) = \\int_{-\\infty}^{\\infty} (x - \\mu)^2 \\mathrm{f}(x)\\,\\mathrm{d}x$$. What is the other, more practical form, and why is it preferred for calculations? (3 steps)", "answer": "- Step 1: The alternative form is: $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2 = \\int_{-\\infty}^{\\infty} x^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x - \\mu^2$$.\n- Step 2: This is preferred because the first form requires you to know $$\\mu$$ and then compute $$(x - \\mu)^2$$ for every value in the integral, which is algebraically messier. The second form splits the work: first compute $$$$\\mathrm{E}(X) = \\mu$$, then compute $$\\mathrm{E}(X^2) = \\int x^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$, and subtract $$\\mu^2$$.\n- Step 3: The equivalence comes from expanding $$(x - \\mu)^2 = x^2 - 2\\mu x + \\mu^2$$ and noting that $$\\int (2\\mu x)\\,\\mathrm{f}(x)\\,\\mathrm{d}x = 2\\mu^2$$ and $$\\int \\mu^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x = \\mu^2$$, so the cross terms simplify to give the cleaner form.\n\nThis is the same formula as for discrete random variables: $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$. The the replacement of $$\\sum$$ with $$\\int$$ is the only change.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "If $$X$$ is a continuous random variable and $$g$$ is any function, then $$\\mathrm{E}(g(X)) = \\int_{-\\infty}^{\\infty} g(x)\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. Using this, what is the formula for $$\\mathrm{E}(X^2)$$, and why is it important? (2 steps)", "answer": "- Step 1: Setting $$g(X) = X^2$$, we get $$\\mathrm{E}(X^2) = \\int_{-\\infty}^{\\infty} x^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. This is the expected value of the square of $$X$$, not the square of the expected value.\n- Step 2: It is important because $$\\mathrm{E}(X^2)$$ is needed to compute the variance via $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$. Note carefully: $$\\mathrm{E}(X^2) \\neq (\\mathrm{E}(X))^2$$ in general. They are only equal when $$\\mathrm{Var}(X) = 0$$, i.e., when $$X$$ is a constant.\n\nThe order of operations matters: square first then average ($$\\mathrm{E}(X^2)$$) vs. average first then square ($$(\\mathrm{E}(X))^2$$). By Jensen's inequality, $$\\mathrm{E}(X^2) \\geq (\\mathrm{E}(X))^2$$ always.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "For linear functions of a continuous random variable, two key results are $$\\mathrm{E}(aX + b) = a\\mathrm{E}(X) + b$$ and $$\\mathrm{Var}(aX + b) = a^2\\mathrm{Var}(X)$$. Explain intuitively why adding a constant $$b$$ affects the mean but not the variance. (3 steps)", "answer": "- Step 1: Adding $$b$$ shifts every possible value of $$X$$ by $$b$$, so the centre (mean) also shifts by $$b$$. If all data points move right by 5, the average moves right by 5. This is why $$\\mathrm{E}(X + b) = \\mathrm{E}(X) + b$$.\n- Step 2: However, variance measures *spread* — how far values are from the mean. Shifting all values by the same amount doesn't change their distances from each other or from the (equally shifted) mean. So $$\\mathrm{Var}(X + b) = \\mathrm{Var}(X)$$.\n- Step 3: Multiplying by $$a$$ *scales* the spread: if every distance from the mean is multiplied by $$a$$, then the variance (which involves squared distances) is multiplied by $$a^2$$. The mean is also scaled: $$\\mathrm{E}(aX) = a\\mathrm{E}(X)$$. Combining: $$\\mathrm{Var}(aX + b) = a^2\\mathrm{Var}(X)$$.\n\nThink of it like converting temperatures from °C to °F: $$F = 1.8C + 32$$. The +32 shifts the mean but not the spread; the ×1.8 scales both the mean and the spread.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "A random variable $$X$$ has p.d.f. that is symmetric about $$x = a$$, meaning $$\\mathrm{f}(a + h) = \\mathrm{f}(a - h)$$ for all $$h$$. What can you immediately conclude about $$\\mathrm{E}(X)$$, and why? (2 steps)", "answer": "- Step 1: If the p.d.f. is symmetric about $$x = a$$, then $$\\mathrm{E}(X) = a$$. No integration is needed. This is because the distribution \"balances\" at the point of symmetry — the weighted contributions to the left and right of $$a$$ cancel out perfectly.\n- Step 2: Formally, the integral $$\\int (x - a)\\,\\mathrm{f}(x)\\,\\mathrm{d}x = 0$$ by symmetry (for every positive contribution from $$x > a$$, there is an equal negative contribution from the mirror point below $$a$$). Therefore $$\\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x = a \\int \\mathrm{f}(x)\\,\\mathrm{d}x = a$$, so $$\\mathrm{E}(X) = a$$.\n\nThis is a powerful shortcut: always check for symmetry before integrating. For example, if $$\\mathrm{f}(x) = \\frac{3}{32}(3 + 2x - x^2)$$ on $$[-1, 3]$$, the axis of symmetry is $$x = 1$$ (midpoint), so $$\\mathrm{E}(X) = 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "A cube has side length $$X$$, where $$X$$ is a continuous random variable. A student reasons: \"The expected volume is $$\\mathrm{E}(X^3) = (\\mathrm{E}(X))^3$$.\" Is this correct? Explain. (3 steps)", "answer": "- Step 1: This is **incorrect**. In general, $$\\mathrm{E}(X^3) \\neq (\\mathrm{E}(X))^3$$. The expected value of a function of $$X$$ is not the same as the function applied to the expected value, unless the function is linear.\n- Step 2: The correct approach uses $$\\mathrm{E}(g(X)) = \\int g(x)\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. So the expected volume is $$\\mathrm{E}(X^3) = \\int x^3\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$, which must be computed by integrating $$x^3 \\mathrm{f}(x)$$.\n- Step 3: The reason for the inequality is Jensen's inequality: for a convex function like $$g(x) = x^3$$ (convex for $$x > 0$$), we have $$\\mathrm{E}(g(X)) \\geq g(\\mathrm{E}(X))$$. So actually $$\\mathrm{E}(X^3) \\geq (\\mathrm{E}(X))^3$$ when $$X > 0$$. The expected volume is *at least as large* as the cube of the expected side length.\n\nThe only functions where $$\\mathrm{E}(g(X)) = g(\\mathrm{E}(X))$$ always holds are linear functions $$g(X) = aX + b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "The p.d.f. of $$X$$ is piecewise: $$\\mathrm{f}(x) = \\begin{cases} \\frac{2}{15}x & 0 \\leq x < 3 \\\\ \\frac{1}{5}(5-x) & 3 \\leq x \\leq 5 \\\\ 0 & \\text{otherwise}\\end{cases}$$. To find $$\\mathrm{E}(X)$$, how do you set up the integral? (2 steps)", "answer": "- Step 1: Split the integral at the boundary point $$x = 3$$ where the p.d.f. changes formula: $$\\mathrm{E}(X) = \\int_0^3 x \\cdot \\frac{2}{15}x\\,\\mathrm{d}x + \\int_3^5 x \\cdot \\frac{1}{5}(5-x)\\,\\mathrm{d}x = \\int_0^3 \\frac{2}{15}x^2\\,\\mathrm{d}x + \\int_3^5 \\frac{1}{5}(5x - x^2)\\,\\mathrm{d}x$$.\n- Step 2: Evaluate each integral separately and add the results. The key principle is: for a piecewise p.d.f., integrate each piece over its own interval and sum. The same splitting applies for $$\\mathrm{E}(X^2)$$ and any $$\\mathrm{E}(g(X))$$.\n\nNever try to use one formula across the whole range when the p.d.f. changes — you must respect the piecewise boundaries.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "The mode of a continuous random variable is defined as the value of $$x$$ where the p.d.f. is maximised. For $$\\mathrm{f}(x) = 12x^2(1-x)$$ on $$[0, 1]$$, describe the procedure to find the mode. (3 steps)", "answer": "- Step 1: Expand the p.d.f.: $$\\mathrm{f}(x) = 12x^2 - 12x^3$$. Differentiate and set to zero: $$\\mathrm{f}'(x) = 24x - 36x^2 = 12x(2 - 3x) = 0$$, giving $$x = 0$$ or $$x = \\frac{2}{3}$$.\n- Step 2: Check which critical point is a maximum. At $$x = 0$$: $$\\mathrm{f}(0) = 0$$ (thisContinuing from where the cut off)\n\nminimum/endpoint). At $$x = \\frac{2}{3}$$: $$\\mathrm{f}\\left(\\frac{2}{3}\\right) = 12 \\cdot \\frac{4}{9} \\cdot \\frac{1}{3} = \\frac{48}{27} > 0$$. Also, $$\\mathrm{f}''(x) = 24 - 72x$$, and at $$x = \\frac{2}{3}$$: $$\\mathrm{f}''\\left(\\frac{2}{3}\\right) = 24 - 48 = -24 < 0$$, confirming a maximum.\n- Step 3: Check the endpoints: $$\\mathrm{f}(0) = 0$$ and $$\\mathrm{f}(1) = 0$$. The maximum value of $$\\mathrm{f}(x)$$ occurs at $$x = \\frac{2}{3}$$, so the mode is $$\\frac{2}{3}$$.\n\nAlways verify: (1) set $$\\mathrm{f}'(x) = 0$$ to find critical points, (2) confirm it's a maximum (second derivative test or sign change), (3) compare with endpoints. The mode can occur at an endpoint if the function is monotonic.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "The p.d.f. of $$Y$$ is $$\\mathrm{f}(y) = 2y$$ on $$[0, 1]$$. A find the mode of $$Y$$. What does this example illustrate about the mode? (2 steps)", "answer": "- Step 1: Differentiating: $$\\mathrm{f}'(y) = 2 > 0$$ for all $$y \\in [0, 1]$$. The p.d.f. is strictly increasing, so there is no interior critical point. The maximum must occur at the right endpoint $$y = 1$$, where $$\\mathrm{f}(1) = 2$$.\n- Step 2: The mode is $$y = 1$$. This illustrates that **the mode can occur at a boundary endpoint** of the domain, not just at an interior point where the derivative is zero. When the p.d.f. is monotonically increasing or decreasing, the mode is always at an endpoint.\n\nAlways sketch the p.d.f. when finding the mode — it immediately reveals whether the maximum is at an interior point or a boundary.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "The median of a continuous random variable $$X$$ with c.d.f. $$\\mathrm{F}(x)$$ is the value $$m$$ such that $$\\mathrm{F}(m) = 0.5$$. Explain what this means intuitively, and how you would find it. (2 steps)", "answer": "- Step 1: The median is the value that splits the distribution in half: there is a 50% probability of $$X$$ being below $$m$$ and a 50% probability of being above it. It is the \"middle value\" of the distribution in the probabilistic sense.\n- Step 2: To find it, set $$\\mathrm{F}(m) = 0.5$$ and solve for $$m$$. If you only have the p.d.f., first find the c.d.f. by integration, then solve. If the c.d.f. is piecewise, first check which piece contains the value 0.5 (by evaluating $$\\mathrm{F}$$ at the boundaries), then solve within that piece.\n\nThe median is more robust than the mean to outliers — it depends on the *position* of probability mass, not its magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "A c.d.f. is defined piecewise: $$\\mathrm{F}(x) = \\begin{cases} 0 & x \\leq 1 \\\\ \\frac{1}{5}x - \\frac{1}{5} & 1 < x < 2 \\\\ \\frac{x^2}{10} - \\frac{x}{5} + \\frac{1}{5} & 2 \\leq x \\leq 4 \\\\ 1 & x > 4\\end{cases}$$. To find the lower quartile $$Q_1$$, how do you decide which piece of the c.d.f. to use? (3 steps)", "answer": "- Step 1: The lower quartile satisfies $$\\mathrm{F}(Q_1) = 0.25$$. First, evaluate the c.d.f. at the boundary points. At $$x = 2$$: $$\\mathrm{F}(2) = \\frac{2}{5} - \\frac{1}{5} = 0.2$$ (using the first non-trivial piece).\n- Step 2: Since $$\\mathrm{F}(2) = 0.2 < 0.25$$, and the c.d.f. is non-decreasing, the value 0.25 must be reached in the *next* piece (where $$2 \\leq x \\leq 4$$). We need $$\\mathrm{F}(Q_1) = 0.25$$ with $$Q_1 > 2$$.\n- Step 3: Set $$\\frac{Q_1^2}{10} - \\frac{Q_1}{5} + \\frac{1}{5} = 0.25$$ and solve. This gives $$Q_1^2 - 2Q_1 - 0.5 = 0$$, and using the quadratic formula, selecting the root in the interval $$(2, 4)$$.\n\nAlways check boundary values of the c.d.f. first to determine which piece contains the target probability (0.25, 0.5, 0.75, etc.). This avoids solving the wrong equation.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "Define the lower quartile $$Q_1$$, upper quartile $$Q_3$$, and the interquartile range (IQR) in terms of the c.d.f. $$\\mathrm{F}(x)$$. What does the IQR measure? (2 steps)", "answer": "- Step 1: The lower quartile $$Q_1$$ satisfies $$\\mathrm{F}(Q_1) = 0.25$$ — it is the value below which 25% of the probability lies. The upper quartile $$Q_3$$ satisfies $$\\mathrm{F}(Q_3) = 0.75$$ — it is the value below which 75% of the probability lies. The interquartile range is $$\\mathrm{IQR} = Q_3 - Q_1$$.\n- Step 2: The IQR measures the spread of the middle 50% of the distribution. It is the range that contains the central half of the probability. Unlike the full range (max − min), the IQR is not affected by extreme tails and is a robust measure of spread.\n\nFor a uniform distribution on $$[a, b]$$, the IQR is exactly $$\\frac{b-a}{2}$$ (half the full range). For skewed distributions, the IQR can be quite different from half the range.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "The $$n$$th percentile $$P_n$$ of a continuous random variable $$X$$ is defined by $$\\mathrm{F}(P_n) = \\frac{n}{100}$$. If you need to find the 15th percentile, what equation do you solve, and how do you determine which piece of a piecewise c.d.f. to use? (2 steps)", "answer": "- Step 1: The 15th percentile satisfies $$\\mathrm{F}(P_{15}) = 0.15$$. You solve $$\\mathrm{F}(x) = 0.15$$ for $$x$$.\n- Step 2: To determine which piece of the c.d.f. to use, evaluate $$\\mathrm{F}$$ at the boundary points of each piece. Find which interval $$[\\mathrm{F}(a_i), \\mathrm{F}(a_{i+1})]$$ contains 0.15, where $$a_i$$ are the boundary points. Then use the corresponding piece of $$\\mathrm{F}$$ to solve.\n\nFor example, if $$\\mathrm{F}(2) = 0.2$$, then since $$0.15 < 0.2$$, the 15th percentile lies in the piece before $$x = 2$$, not after.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "For a continuous random variable, is it always true that mode = median = mean? If not, give an example of when they differ and explain the direction of the ordering for a right-skewed distribution. (3 steps)", "answer": "- Step 1: No, mode, median, and mean are generally *different* for non-symmetric distributions. They only all coincide for perfectly symmetric, unimodal distributions.\n- Step 2: For a **right-skewed** (positively skewed) distribution, the ordering is typically: **mode < median < mean**. The mode is at the peak (leftmost), the median is pulled right by the tail, and the mean is pulled even further right because it is affected by the magnitude of extreme values.\n- Step 3: For a **left-skewed** (negatively skewed) distribution, the reverse holds: **mean < median < mode**. The mean is pulled left by the long left tail. This ordering is a useful diagnostic: if you compute all three and find mean > median > mode, you know the distribution is right-skewed without even sketching it.\n\nThe median is always between the mode and the mean (for unimodal distributions), a result sometimes called the \"empirical rule\" of skewness.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A student claims: \"For any p.d.f., the mode must lie within the interquartile range.\" Is this claim true? Give a counterexample or explain why it holds. (2 steps)", "answer": "- Step 1: The claim is **false**. The mode can lie outside the interquartile range. Consider a p.d.f. that is very steeply increasing on a short interval near the left endpoint (giving a mode near the left) but has a long, slowly decreasing tail to the right (placing the quartiles far to the right of the mode).\n- Step 2: For a concrete sketch: imagine a p.d.f. that peaks sharply near $$x = 0.1$$ (mode = 0.1), but has enough probability mass spread out to the right that $$Q_1 \\approx 2$$ and $$Q_3 \\approx 5$$. The IQR is $$[2, 5]$$, but the mode is at 0.1, well outside it. This is possible with a heavily right-skewed distribution.\n\nThe mode, median, quartiles, and mean each capture different aspects of the distribution and need not coincide or even be close to each other.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "A p.d.f. is defined as $$\\mathrm{f}(x) = \\begin{cases} k & 0 \\leq x < 1 \\\\ k(x-1)^2 & 1 \\leq x < 2 \\\\ k(3-x) & 2 \\leq x < 3 \\\\ 0 & \\text{otherwise}\\end{cases}$$. When finding $$k$$, how many separate integrals do you need to compute, and what equation do they satisfy? (2 steps)", "answer": "- Step 1: You need three separate integrals, one for each piece: $$\\int_0^1 k\\,\\mathrm{d}x + \\int_1^2 k(x-1)^2\\,\\mathrm{d}x + \\int_2^3 k(3-x)\\,\\mathrm{d}x = 1$$.\n- Step 2: Factor out $$k$$: $$k\\left[\\int_0^1 1\\,\\mathrm{d}x + \\int_1^2 (x-1)^2\\,\\mathrm{d}x + \\int_2^3 (3-x)\\,\\mathrm{d}x\\right] = 1$$. The three integrals give the areas of: a rectangle of width 1 and height 1 (area = 1), the area under $$(x-1)^2$$ from 1 to 2 (area = $$\\frac{1}{3}$$), and the area under $$(3-x)$$ from 2 to 3 (area = $$\\frac{1}{2}$$). So $$k(1 + \\frac{1}{3} + \\frac{1}{2}) = k \\cdot \\frac{11}{6} = 1$$, giving $$k = \\frac{6}{11}$$.\n\nFor piecewise p.d.f.s, always split the integral at every boundary point and sum the contributions.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "A student proposes the following as a c.d.f.: $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 5 \\\\ \\frac{1}{5}(16x - x^2 - 55) & 5 \\leq x \\leq 10 \\\\ 1 & x > 10\\end{cases}$$. Without doing any integration, how can you tell this is NOT a valid c.d.f.? (3 steps)", "answer": "- Step 1: A c.d.f. must be non-decreasing — it can never decrease, because it represents accumulated probability. Check the derivative: $$\\mathrm{F}'(x) = \\frac{1}{5}(16 - 2x)$$.\n- Step 2: For $$x > 8$$, we have $$\\mathrm{F}'(x) = \\frac{1}{5}(16 - 2x) < 0$$, meaning the c.d.f. is *decreasing* on the interval $$(8, 10]$$. This is impossible for a valid c.d.f.\n- Step 3: Equivalently, since $$\\mathrm{f}(x) = \\mathrm{F}'(x)$$, the p.d.f. would be negative for $$x > 8$$, violating the requirement $$\\mathrm{f}(x) \\geq 0$$. You can also verify: $$\\mathrm{F}(10) = \\frac{1}{5}(160 - 100 - 55) = 1$$ (this checks out), but the function dips below 0 or decreases somewhere, making it invalid.\n\nA valid c.d.f. must satisfy three properties: (1) $$\\mathrm{F}(x) \\to 0$$ as $$x \\to -\\infty$$, (2) $$\\mathrm{F}(x) \\to 1$$ as $$x \\to +\\infty$$, (3) $$\\mathrm{F}$$ is non-decreasing everywhere.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "The p.d.f. of $$X$$ is $$\\mathrm{f}(x) = \\frac{1}{x \\ln 7}$$ on $$[1, 7]$$. This is an example of a continuous uniform-like distribution but with a logarithmic c.d.f. What is $$\\mathrm{F}(x)$$ for $$1 \\leq x \\leq 7$$? (2 steps)", "answer": "- Step 1: Integrate the p.d.f.: $$\\mathrm{F}(x) = \\int_1^x \\frac{1}{t \\ln 7}\\,\\mathrm{d}t = \\frac{1}{\\ln 7}\\left[\\ln t\\right]_1^x = \\frac{1}{\\ln 7}(\\ln x - \\ln 1) = \\frac{\\ln x}{\\ln 7}$$, since $$\\ln 1 = 0$$.\n- Step 2: Verify: $$\\mathrm{F}(1) = \\frac{\\ln 1}{\\ln 7} = 0$$ ✓ and $$\\mathrm{F}(7) = \\frac{\\ln 7}{\\ln 7} = 1$$ ✓. The full c.d.f. is: $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 1 \\\\ \\frac{\\ln x}{\\ln 7} & 1 \\leq x \\leq 7 \\\\ 1 & x > 7\\end{cases}$$.\n\nThis is related to the **log-uniform** (or reciprocal) distribution. The probability is spread non-uniformly: more density near smaller values, less near larger values.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "The p.d.f. of $$X$$ is $$\\mathrm{f}(x) = k\\sin(\\pi x)$$ on $$[0, 1]$$. Explain how to find $$k$$, and why the answer involves $$\\pi$$. (2 steps)", "answer": "- Step 1: Set the total area to 1: $$\\int_0^1 k\\sin(\\pi x)\\,\\mathrm{d}x = 1$$. Compute: $$k\\left[-\\frac{\\cos(\\pi x)}{\\pi}\\right]_0^1 = k\\left(-\\frac{\\cos\\pi}{\\pi} + \\frac{\\cos 0}{\\pi}\\right) = k\\left(\\frac{1}{\\pi} + \\frac{1}{\\pi}\\right) = \\frac{2k}{\\pi}$$.\n- Step 2: So $$\\frac{2k}{\\pi} = 1$$, giving $$k = \\frac{\\pi}{2}$$. The answer involves $$\\pi$$ because the integral of $$\\sin(\\pi x)$$ over one half-period introduces a factor of $$\\frac{2}{\\pi}$$ (the area under one arch of the sine curve). The p.d.f. is $$\\mathrm{f}(x) = \\frac{\\pi}{2}\\sin(\\pi x)$$ on $$[0, 1]$$.\n\nThis is a legitimate p.d.f.: $$\\sin(\\pi x) \\geq 0$$ on $$[0, 1]$$ ✓, and the area is 1 after scaling ✓.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "A continuous random variable $$X$$ has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{60}(x+1) & 0 \\leq x \\leq 10 \\\\ 0 & \\text{otherwise}\\end{cases}$$, modelling time spent on a website in minutes. To find the probability a visitor spends less than 30 seconds, what must you be careful about? (2 steps)", "answer": "- Step 1: 30 seconds = 0.5 minutes. The probability is $$\\mathrm{P}(X < 0.5) = \\int_0^{0.5} \\frac{1}{60}(x+1)\\,\\mathrm{d}x$$. The key thing to be careful about is **units**: the p.d.f. is defined in minutes, so you must convert 30 seconds to 0.5 minutes before integrating.\n- Step 2: Evaluating: $$\\frac{1}{60}\\left[\\frac{x^2}{2} + x\\right]_0^{0.5} = \\frac{1}{60}\\left(\\frac{0.25}{2} + 0.5\\right) = \\frac{1}{60} \\cdot \\frac{1.25}{2} = \\frac{1.25}{120} = \\frac{1}{96} \\approx 0.0104$$. About a 1% chance — most visitors stay longer than 30 seconds.\n\nUnit conversion is a common source of error in applied probability questions. Always check that the values you substitute match the units of the p.d.f.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "The length of a telephone call, $$T$$, has p.d.f. $$\\mathrm{f}(t) = \\frac{k}{t^3}$$ for $$t \\geq 1$$. This is defined on an infinite interval $$[1, \\infty)$$. Given that $$\\int_1^{\\infty} \\frac{1}{t^3}\\,\\mathrm{d}t = \\frac{1}{2}$$, find $$k$$. (2 steps)", "answer": "- Step 1: The total area must be 1: $$\\int_1^{\\infty} \\frac{k}{t^3}\\,\\mathrm{d}t = k\\int_1^{\\infty} \\frac{1}{t^3}\\,\\mathrm{d}t = k \\cdot \\frac{1}{2} = 1$$, using the given result.\n- Step 2: Therefore $$k = 2$$. The p.d.f. is $$\\mathrm{f}(t) = \\frac{2}{t^3}$$ for $$t \\geq 1$$. This is a valid p.d.f. on an infinite domain: the integral converges (the area is finite) because $$t^3$$ grows fast enough. If the power were $$t^1$$ instead of $$t^3$$, the integral would diverge and no valid p.d.f. would exist.\n\nFor improper integrals of the form $$\\int_1^{\\infty} \\frac{1}{t^p}\\,\\mathrm{d}t$$, the integral converges if and only if $$p > 1$$. The result is $$\\frac{1}{p-1}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "The p.d.f. of $$X$$ is $$\\mathrm{f}(x) = \\begin{cases} \\frac{3}{8}(1 + x^2) & -1 \\leq x \\leq 1 \\\\ 0 & \\text{otherwise}\\end{cases}$$. Without doing any integration, what can you say about $$\\mathrm{E}(X)$$, and what special property does the mode have? (3 steps)", "answer": "- Step 1: The p.d.f. is symmetric about $$x = 0$$, since $$\\mathrm{f}(-x) = \\frac{3}{8}(1 + (-x)^2) = \\frac{3}{8}(1 + x^2) = \\mathrm{f}(x)$$. By the symmetry shortcut, $$\\mathrm{E}(X) = 0$$.\n- Step 2: For the mode: $$\\mathrm{f}'(x) = \\frac{3}{8}(2x) = \\frac{3x}{4}$$. Setting this to zero gives $$x = 0$$. But also note $$\\mathrm{f}(x) = \\frac{3}{8}(1 + x^2)$$ is *minimised* at $$x = 0$$ (where $$\\mathrm{f}(0) = \\frac{3}{8}$$) and *maximised* at the endpoints $$x = \\pm 1$$ (where $$\\mathrm{f}(\\pm 1) = \\frac{3}{4}$$).\n- Step 3: So the mode is at $$x = \\pm 1$$ (both endpoints give the same maximum value). This is a **bimodal** distribution with modes at $$x = -1$$ and $$x = 1$$. The critical point at $$x = 0$$ is actually a *minimum*, not a maximum — always check whether a critical point is a max or min!\n\nThis is an important edge case: the p.d.f. is U-shaped (bathtub-shaped), with probability concentrated at the edges rather than the centre. The derivative being zero doesn't automatically mean \"mode\" — it means \"critical point,\" which could be a minimum.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "A random variable $$X$$ has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{4}(4-x) & 1 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise}\\end{cases}$$. Sketch the shape of this p.d.f. and determine whether the mode is at an interior point or an endpoint. (2 steps)", "answer": "- Step 1: $$\\mathrm{f}(x) = \\frac{1}{4}(4 - x) = 1 - \\frac{x}{4}$$ is a decreasing linear function on $$[1, 3]$$. At $$x = 1$$: $$\\mathrm{f}(1) = \\frac{3}{4}$$. At $$x = 3$$: $$\\mathrm{f}(3) = \\frac{1}{4}$$. The graph is a straight line sloping downward from $$(1, \\frac{3}{4})$$ to $$(3, \\frac{1}{4})$$.\n- Step 2: Since the p.d.f. is strictly decreasing, its maximum is at the left endpoint $$x = 1$$. The mode is $$x = 1$$. This is another example where the mode is at a boundary, not at an interior critical point.\n\nFor any monotonic p.d.f., the mode is always at one of the endpoints: the left endpoint if decreasing, the right endpoint if increasing.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "The c.d.f. of $$X$$ is $$\\mathrm{F}(x) = 2x^2 - x^3$$ on $$[0, 1]$$. To find the median, you set $$2m^2 - m^3 = 0.5$$, giving $$m^3 - 2m^2 + 0.5 = 0$$. This cubic can't be easily factored. How would you find the median in an exam? (2 steps)", "answer": "- Step 1: Use a numerical method. The simplest approach is **trial and improvement**: test values in $$[0, 1]$$. $$\\mathrm{F}(0.5) = 2(0.25) - 0.125 = 0.375 < 0.5$$. $$\\mathrm{F}(0.6) = 2(0.36) - 0.216 = 0.504 > 0.5$$. So the median is between 0.5 and 0.6.\n- Step 2: Continue refining: $$\\mathrm{F}(0.59) = 2(0.3481) - 0.2054 = 0.4908 < 0.5$$ and $$\\mathrm{F}(0.60) = 0.504 > 0.5$$. So the median lies between 0.59 and 0.60. If asked to show the median lies between two values, just demonstrate that $$\\mathrm{F}$$ crosses 0.5 between them.\n\nIn exams, you're often asked to \"show the median lies between $$a$$ and $$b$$\" — just verify $$\\mathrm{F}(a) < 0.5 < \\mathrm{F}(b)$$ (or vice versa). You rarely need to solve the equation exactly.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "A continuous random variable $$X$$ has c.d.f. $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 0 \\\\ \\frac{x^2}{100} & 0 \\leq x \\leq 10 \\\\ 1 & x > 10\\end{cases}$$. To find $$\\mathrm{Var}(X)$$ using the c.d.f., you could first find the p.d.f. by differentiating. What is the p.d.f., and what advantage does having the c.d.f. give for computing probabilities? (2 steps)", "answer": "- Step 1: Differentiate: $$\\mathrm{f}(x) = \\mathrm{F}'(x) = \\frac{2x}{100} = \\frac{x}{50}$$ for $$0 \\leq x \\leq 10$$, and 0 otherwise. You can then compute $$\\mathrm{E}(X) = \\int_0^{10} \\frac{x^2}{50}\\,\\mathrm{d}x$$ and $$\\mathrm{E}(X^2) = \\int_0^{10} \\frac{x^3}{50}\\,\\mathrm{d}x$$ to find $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$.\n- Step 2: The advantage of the c.d.f. is for computing probabilities: $$\\mathrm{P}(a \\leq X \\leq b) = \\mathrm{F}(b) - \\mathrm{F}(a)$$, which is just subtraction — no integration needed. For example, $$\\mathrm{P}(X > 7) = 1 - \\mathrm{F}(7) = 1 - \\frac{49}{100} = 0.51$$, found instantly.\n\nThe c.d.f. and p.d.f. are two sides of the same coin: the c.d.f. is best for probabilities, the p.d.f. is needed for expectations and variance.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "Prove that $$\\mathrm{E}(aX + b) = a\\mathrm{E}(X) + b$$ for a continuous random variable $$X$$. (3 steps)", "answer": "- Step 1: By definition, $$\\mathrm{E}(aX + b) = \\int_{-\\infty}^{\\infty} (ax + b)\\mathrm{f}(x)\\,\\mathrm{d}x$$, using the rule $$\\mathrm{E}(g(X)) = \\int g(x)\\mathrm{f}(x)\\,\\mathrm{d}x$$ with $$g(X) = aX + b$$.\n- Step 2: Split the integral: $$= \\int_{-\\infty}^{\\infty} ax\\,\\mathrm{f}(x)\\,\\mathrm{d}x + \\int_{-\\infty}^{\\infty} b\\,\\mathrm{f}(x)\\,\\mathrm{d}x = a\\int_{-\\infty}^{\\infty} x\\,\\mathrm{f}(x)\\,\\mathrm{d}x + b\\int_{-\\infty}^{\\infty} \\mathrm{f}(x)\\,\\mathrm{d}x$$.\n- Step 3: The first integral is $$\\mathrm{E}(X)$$ by definition, and the second integral is 1 (total area under p.d.f.). So $$\\mathrm{E}(aX + b) = a\\mathrm{E}(X) + b \\cdot 1 = a\\mathrm{E}(X) + b$$.\n\nThis proof works by linearity of integration. The same approach proves $$\\mathrm{Var}(aX + b) = a^2\\mathrm{Var}(X)$$: the $$+b$$ shifts the mean but not the deviations from the mean, and the $$\\times a$$ scales the squared deviations by $$a^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "The p.d.f. of $$X$$ is $$\\mathrm{f}(x) = \\begin{cases} \\frac{3}{10}(3x - x^2) & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise}\\end{cases}$$. Describe the steps to find the mode, without computing exact numbers. (3 steps)", "answer": "- Step 1: Expand: $$\\mathrm{f}(x) = \\frac{3}{10}(3x - x^2)$$. This is a downward-opening parabola (coefficient of $$x^2$$ is negative), so it has a unique maximum at its vertex.\n- Step 2: Differentiate: $$\\mathrm{f}'(x) = \\frac{3}{10}(3 - 2x)$$. Set to zero: $$3 - 2x = 0$$, so $$x = \\frac{3}{2} = 1.5$$. Check this is in $$[0, 2]$$ ✓ and that it's a maximum (second derivative is $$\\frac{-6}{10} < 0$$ ✓).\n- Step 3: Compare with endpoints: $$\\mathrm{f}(0) = 0$$ and $$\\mathrm{f}(2) = \\frac{3}{10}(6 - 4) = \\frac{6}{10}$$. Since the vertex of a downward parabola gives the global maximum, the mode is at $$x = 1.5$$, where $$\\mathrm{f}(1.5) = \\frac{3}{10}(4.5 - 2.25) = \\frac{3}{10} \\cdot 2.25 = 0.675 > 0.6$$, confirming it exceeds the endpoint values.\n\nFor quadratic p.d.f.s, the vertex formula gives the mode directly: for $$\\mathrm{f}(x) = A(x - \\alpha)(x - \\beta)$$, the vertex is at $$x = \\frac{\\alpha + \\beta}{2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "The life of a light bulb is modelled by $$\\mathrm{f}(x) = 2.5e^{-2.5x}$$ for $$x \\geq 0$$, where $$x$$ is in thousands of hours. Explain conceptually how to find the median, and what the median represents in this context. (3 steps)", "answer": "- Step 1: The c.d.f. is $$\\mathrm{F}(x) = \\int_0^x 2.5e^{-2.5t}\\,\\mathrm{d}t = \\left[-e^{-2.5t}\\right]_0^x = 1 - e^{-2.5x}$$. Set $$\\mathrm{F}(m) = 0.5$$: $$1 - e^{-2.5m} = 0.5$$, so $$e^{-2.5m} = 0.5$$.\n- Step 2: Take natural logs: $$-2.5m = \\ln(0.5) = -\\ln 2$$, so $$m = \\frac{\\ln 2}{2.5} \\approx 0.277$$ thousand hours ≈ 277 hours.\n- Step 3: The median represents the time by which half of all light bulbs have burned out. 50% of bulbs last less than 277 hours, and 50% last longer. This is the \"typical lifespan\" in the sense that it splits the population of bulbs into two equal halves.\n\nThis is an **exponential distribution**, commonly used to model lifetimes and waiting times. Note the median ($$\\approx 277$$ hours) is less than the mean ($$\\frac{1}{2.5} = 400$$ hours), reflecting the right-skew of the exponential distribution.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "A continuous random variable $$X$$ has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} kx^2(2-x) & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise}\\end{cases}$$. Explain why $$\\mathrm{P}(0 < X < 1)$$ must be less than 0.5, just by reasoning about the shape of the p.d.f., without computing the exact probability. (2 steps)", "answer": "- Step 1: The factor $$x^2$$ is 0 at $$x = 0$$ and increases, while $$(2-x)$$ is 2 at $$x = 0$$ and decreases to 0 at $$x = 2$$. The product $$x^2(2-x)$$ starts at 0, rises to a peak, then falls back to 0. The peak (mode) occurs where the derivative is zero: $$\\frac{\\mathrm{d}}{\\mathrm{d}x}[x^2(2-x)] = 4x - 3x^2 = x(4-3x) = 0$$, giving $$x = \\frac{4}{3} \\approx 1.33$$.\n- Step 2: Since the mode is at $$x = \\frac{4}{3} > 1$$, the p.d.f. is still increasing on $$[0, 1]$$. The area under the curve from 0 to 1 (where the function is lower and rising) is less than the area from 1 to 2 (where the function reaches its peak and then falls). More than half the total area lies to the right of $$x = 1$$, so $$\\mathrm{P}(0 < X < 1) < 0.5$$.\n\nQualitative reasoning about the shape of the p.d.f. (where is it rising? where is the peak?) can give you directional answers without any computation.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "Two independent continuous random variables $$X$$ and $$Y$$ have p.d.f.s $$\\mathrm{f}_X(x)$$ and $$\\mathrm{f}_Y(y)$$. How do you find $$\\mathrm{P}(X < 1 \\text{ and } Y < 1)$$? (2 steps)", "answer": "- Step 1: Since $$X$$ and $$Y$$ are **independent**, the joint probability factorises: $$\\mathrm{P}(X < 1 \\text{ and } Y < 1) = \\mathrm{P}(X < 1) \\times \\mathrm{P}(Y < 1)$$.\n- Step 2: Compute each probability separately using the respective p.d.f.s (or c.d.f.s if available): $$\\mathrm{P}(X < 1) = \\int_{-\\infty}^1 \\mathrm{f}_X(x)\\,\\mathrm{d}x$$ (or $$\\mathrm{F}_X(1)$$) and similarly for $$Y$$. Multiply the results.\n\nIndependence means the occurrence of one event doesn't affect the probability of the other. This is why we can multiply: the conditional probability $$\\mathrm{P}(Y < 1 \\mid X < 1) = \\mathrm{P}(Y < 1)$$, so the joint probability is the product.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "A student computes $$\\mathrm{E}(X) = 2$$ for some random variable $$X$$ and then writes $$\\mathrm{E}(X^2) = (\\mathrm{E}(X))^2 = 4$$. Explain why this is almost certainly wrong, and what it would imply about $$X$$. (2 steps)", "answer": "- Step 1: In general, $$\\mathrm{E}(X^2) \\neq (\\mathrm{E}(X))^2$$. By the variance formula, $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$. If $$\\mathrm{E}(X^2) = 4$$, then $$\\mathrm{Var}(X) = 4 - 4 = 0$$.\n- Step 2: A variance of 0 means $$X$$ is a constant — it always takes exactly the value 2 with no variation at all. For any non-trivial random variable, $$\\mathrm{Var}(X) > 0$$, so $$\\mathrm{E}(X^2) > (\\mathrm{E}(X))^2$$. You must compute $$\\mathrm{E}(X^2) = \\int x^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$ by integration, not by squaring the mean.\n\nThis is one of the most common student errors. The order of operations matters: averaging the squares ($$\\mathrm{E}(X^2)$$) versus squaring the average ($$(\\mathrm{E}(X))^2$$).", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "The p.d.f. of $$X$$ is $$\\mathrm{f}(x) = \\begin{cases} \\frac{3}{8}x^2 & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise}\\end{cases}$$. Find the c.d.f. $$\\mathrm{F}(x)$$ and then use it to find the median. (3 steps)", "answer": "- Step 1: Find the c.d.f. by integration: $$\\mathrm{F}(x) = \\int_0^x \\frac{3}{8}t^2\\,\\mathrm{d}t = \\frac{3}{8}\\left[\\frac{t^3}{3}\\right]_0^x = \\frac{x^3}{8}$$ for $$0 \\leq x \\leq 2$$. The full c.d.f. is $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 0 \\\\ \\frac{x^3}{8} & 0 \\leq x \\leq 2 \\\\ 1 & x > 2\\end{cases}$$.\n- Step 2: Set $$\\mathrm{F}(m) = 0.5$$: $$\\frac{m^3}{8} = 0.5$$, so $$m^3 = 4$$.\n- Step 3: Therefore $$m = 4^{1/3} = 2^{2/3} \\approx 1.587$$. The median is approximately 1.587. Note this is less than $$\\mathrm{E}(X) = \\int_0^2 \\frac{3}{8}x^3\\,\\mathrm{d}x = \\frac{3}{8} \\cdot 4 = 1.5$$... Actually, let me recompute: $$\\mathrm{E}(X) = \\frac{3}{8}\\left[\\frac{x^4}{4}\\right]_0^2 = \\frac{3}{8} \\cdot 4 = \\frac{3}{2} = 1.5$$. The median (≈1.587) exceeds the mean (1.5), indicating slight left-skew.\n\nThe median and mean provide complementary information about the centre of the distribution.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "The p.d.f. of $$X$$ is $$\\mathrm{f}(x) = \\begin{cases} \\frac{k}{x} & 1 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise}\\end{cases}$$. Find $$k$$, then find $$\\mathrm{E}(X)$$ conceptually — will it be closer to 1 or to 3? (3 steps)", "answer": "- Step 1: Find $$k$$: $$\\int_1^3 \\frac{k}{x}\\,\\mathrm{d}x = k\\left[\\ln x\\right]_1^3 = k(\\ln 3 - \\ln 1) = k\\ln 3 = 1$$, so $$k = \\frac{1}{\\ln 3}$$.\n- Step 2: To find $$\\mathrm{E}(X)$$: $$\\mathrm{E}(X) = \\int_1^3 x \\cdot \\frac{1}{x\\ln 3}\\,\\mathrm{d}x = \\int_1^3 \\frac{1}{\\ln 3}\\,\\mathrm{d}x = \\frac{1}{\\ln 3}[x]_1^3 = \\frac{2}{\\ln 3} \\approx \\frac{2}{1.099} \\approx 1.82$$.\n- Step 3: The mean is approximately 1.82, which is closer to 1 than to 3. This makes sense: the p.d.f. $$\\frac{1}{x\\ln 3}$$ is *decreasing* on $$[1, 3]$$ (larger values of $$x$$ have lower density), so more probability is concentrated near the lower end, pulling the mean left of centre (the midpoint is 2).\n\nFor a decreasing p.d.f., the mean is always below the midpoint of the range. For an increasing p.d.f., the mean is above the midpoint.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "A continuous random variable $$X$$ has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} \\frac{k}{x(5-x)} & 2 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise}\\end{cases}$$. What is the mode of $$X$$, and why? (2 steps)", "answer": "- Step 1: The function $$g(x) = \\frac{1}{x(5-x)}$$ on $$[2, 4]$$: note that $$x(5-x)$$ is a downward-opening parabola with roots at $$x = 0$$ and $$x = 5$$, maximised at $$x = 2.5$$ where it equals 6.25. Since $$g(x) = \\frac{1}{x(5-x)}$$, the *reciprocal* of a positive function that is maximised at $$x = 2.5$$ means $$g(x)$$ is *minimised* at $$x = 2.5$$.\n- Step 2: Therefore $$g(x)$$ (and hence $$\\mathrm{f}(x)$$) is maximised at the *endpoints* $$x = 2$$ and $$x = 4$$, where $$g(2) = g(4) = \\frac{1}{6}$$. At $$x = 2.5$$, $$g(2.5) = \\frac{1}{6.25} < \\frac{1}{6}$$. The distribution is **bimodal** with modes at $$x = 2$$ and $$x = 4$$. The p.d.f. is U-shaped, with probability concentrated at the edges.\n\nThis is another bathtub-shaped distribution. The key insight: when the denominator of the p.d.f. has a maximum in the interior, the p.d.f. itself has a minimum there.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "The exponential distribution has p.d.f. $$\\mathrm{f}(x) = \\lambda e^{-\\lambda x}$$ for $$x \\geq 0$$. It has the memoryless property: $$\\mathrm{P}(X > a + b \\mid X > a) = \\mathrm{P}(X > b)$$. Explain what this means in real-world terms, using the example of a light bulb's lifetime. (3 steps)", "answer": "- Step 1: The memoryless property says: given that the light bulb has already lasted $$a$$ hours, the probability it lasts another $$b$$ hours is the same as the probability that a brand new bulb lasts $$b$$ hours. The bulb \"forgets\" it has been running — it doesn't \"age.\"\n- Step 2: Mathematically: $$\\mathrm{P}(X > a + b \\mid X > a) = \\frac{\\mathrm{P}(X > a + b)}{\\mathrm{P}(X > a)} = \\frac{e^{-\\lambda(a+b)}}{e^{-\\lambda a}} = e^{-\\lambda b} = \\mathrm{P}(X > b)$$.\n- Step 3: In practice, this means a 5-year-old bulb has the same probability of lasting another year as a brand-new bulb. This is unrealistic for physical objects (which do wear out) but is a good model for certain processes like radioactive decay or random arrivals where the \"next event\" doesn't depend on how long you've been waiting.\n\nThe exponential distribution is the *only* continuous distribution with the memoryless property, just as the geometric distribution is the only discrete one.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}, {"question": "A continuous random variable $$X$$ has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} k & 0 \\leq x < 2 \\\\ k(2x - 3) & 2 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise}\\end{cases}$$. At $$x = 2$$, the p.d.f. jumps from $$k$$ to $$k(1) = k$$, and at $$x = 2.5$$, $$\\mathrm{f}(2.5) = k(2) = 2k$$. At what value of $$x$$ does the p.d.f. reach zero again within $$[2, 3]$$? (2 steps)", "answer": "- Step 1: On the interval $$[2, 3]$$, the p.d.f. is $$k(2x - 3)$$. Set this to zero: $$2x - 3 = 0$$, so $$x = 1.5$$. But $$x = 1.5$$ is *not* in the interval $$[2, 3]$$ — it's below the lower bound.\n- Step 2: At $$x = 2$$: $$\\mathrm{f}(2) = k(4-3) = k > 0$$. At $$x = 3$$: $$\\mathrm{f}(3) = k(6-3) = 3k > 0$$. The function $$k(2x-3)$$ is increasing on $$[2, 3]$$ (slope is $$2k > 0$$) and stays positive throughout. The p.d.f. never reaches zero within $$[2, 3]$$ — it is positive on the entire interval, reaching its maximum of $$3k$$ at $$x = 3$$.\n\nAlways check the sign of the p.d.f. within its stated domain, especially for linear functions that might cross zero inside the interval.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": true}, {"question": "Suppose you are told that a continuous random variable has $$\\mathrm{E}(X) = 3$$ and $$\\mathrm{Var}(X) = 4$$. Find $$ value of $$\\mathrm{E}(X^2)$$ and the value of $$\\mathrm{Var}(2X - 1)$$. (2 steps)", "answer": "- Step 1: Using $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$: $$4 = \\mathrm{E}(X^2) - 9$$, so $$\\mathrm{E}(X^2) = 13$$.\n- Step 2: Using the linear transformation rules: $$\\mathrm{Var}(2X - 1) = 2^2 \\cdot \\mathrm{Var}(X) = 4 \\times 4 = 16$$. The constant $$-1$$ has no effect on variance, and the factor 2 is squared because variance involves squared deviations.\n\nThese rules — $$\\mathrm{E}(aX + b) = a\\mathrm{E}(X) + b$$ and $$\\mathrm{Var}(aX + b) = a^2\\mathrm{Var}(X)$$ — are the same for both discrete and continuous random variables.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "A p.d.f. is given by $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{4}(4-x) & 1 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise}\\end{cases}$$. Find $$\\mathrm{F}(x)$$ for $$1 \\leq x \\leq 3$$ and verify that $$\\mathrm{F}(1) = 0$$ and $$\\mathrm{F}(3) = 1$$. (3 steps)", "answer": "- Step 1: Integrate: $$\\mathrm{F}(x) = \\int_1^x \\frac{1}{4}(4-t)\\,\\mathrm{d}t = \\frac{1}{4}\\left[4t - \\frac{t^2}{2}\\right]_1^x = \\frac{1}{4}\\left[\\left(4x - \\frac{x^2}{2}\\right) - \\left(4 - \\frac{1}{2}\\right)\\right] = \\frac{1}{4}\\left(4x - \\frac{x^2}{2} - \\frac{7}{2}\\right)$$.\n- Step 2: Simplify: $$\\mathrm{F}(x) = x - \\frac{x^2}{8} - \\frac{7}{8} = \\frac{8x - x^2 - 7}{8} = \\frac{-(x^2 - 8x + 7)}{8} = \\frac{-(x-1)(x-7)}{8} = \\frac{(x-1)(7-x)}{8}$$.\n- Step 3: Verify: $$\\mathrm{F}(1) = \\frac{(0)(6)}{8} = 0$$ ✓ and $$\\mathrm{F}(3) = \\frac{(2)(4)}{8} = 1$$ ✓. The factored form makes verification easy and confirms the c.d.f. is correct.\n\nAlways verify your c.d.f. at the boundary points — it's a quick check that catches integration errors.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "The p.d.f. of $$X$$ is $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{4}x & 1 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise}\\end{cases}$$. Find $$\\mathrm{E}(X)$$ and $$\\mathrm{Var}(X)$$. (3 steps)", "answer": "- Step 1: Find $$\\mathrm{E}(X) = \\int_1^3 x \\cdot \\frac{1}{4}x\\,\\mathrm{d}x = \\frac{1}{4}\\int_1^3 x^2\\,\\mathrm{d}x = \\frac{1}{4}\\left[\\frac{x^3}{3}\\right]_1^3 = \\frac{1}{4}\\left(9 - \\frac{1}{3}\\right) = \\frac{1}{4} \\cdot \\frac{26}{3} = \\frac{26}{12} = \\frac{13}{6}$$.\n- Step 2: Find $$\\mathrm{E}(X^2) = \\int_1^3 x^2 \\cdot \\frac{1}{4}x\\,\\mathrm{d}x = \\frac{1}{4}\\int_1^3 x^3\\,\\mathrm{d}x = \\frac{1
