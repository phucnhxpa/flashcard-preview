<script>
const DATA={"selected": [{"question": "When going from CDF to PDF, you differentiate $$\\mathrm{F}(x)$$ to get $$\\mathrm{f}(x)$$. What must you remember about regions where $$\\mathrm{F}(x)$$ is defined as a constant (0 or 1)? (2 steps)", "answer": "- Step 1: Where $$\\mathrm{F}(x) = 0$$ (for $$x$$ below the range) or $$\\mathrm{F}(x) = 1$$ (for $$x$$ above the range), the derivative is zero: $$\\mathrm{f}(x) = 0$$ in these regions. This is correct — there's no probability density outside the range.\n- Step 2: You must include these regions in your piecewise definition of $$\\mathrm{f}(x)$$: write $$\\mathrm{f}(x) = 0$$ for $$x < a$$ and $$x > b$$ (or \"otherwise\"). A common mistake is to only state the formula for the active region and forget to specify that $$\\mathrm{f}(x) = 0$$ elsewhere.\n\nThe full definition of $$\\mathrm{f}(x)$$ must cover all real numbers, just as the full definition of $$\\mathrm{F}(x)$$ must.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "A student says: \"The p.d.f. $$\\mathrm{f}(x)$$ gives the probability that $$X = x$$, just like a probability function for a discrete variable.\" Explain why this is wrong, and clarify what $$\\mathrm{f}(x)$$ actually represents. (3 steps)", "answer": "- Step 1: For a continuous random variable, $$\\mathrm{P}(X = x) = 0$$ for every value of $$x$$. So $$\\mathrm{f}(x)$$ is *not* a probability — it can even exceed 1 in some cases, which a probability never can.\n- Step 2: Instead, $$\\mathrm{f}(x)$$ is a **density**. It tells you how \"concentrated\" the probability is around the value $$x$$. A higher value of $$\\mathrm{f}(x)$$ means the variable is more likely to be found *near* $$x$$, not *at* $$x$$.\n- Step 3: Probabilities come from *areas* under $$\\mathrm{f}(x)$$, not from values of $$\\mathrm{f}(x)$$ itself. The probability of $$X$$ falling in a small interval $$[x, x + \\delta x]$$ is approximately $$\\mathrm{f}(x) \\cdot \\delta x$$ — the density times the width. Only when you accumulate (integrate) over a range do you get a non-zero probability.\n\nThe analogy: just as population density (people per km²) is not a number of people, but integrating it over an area gives the population — $$\\mathrm{f}(x)$$ is probability per unit length, and integrating gives probability.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "For a symmetric p.d.f. about $$x = a$$, which of {mean, median, mode} are guaranteed to equal $$a$$? (3 steps)", "answer": "- Step 1: **Mean $$= a$$**: always. Symmetry means mass on both sides balances at $$a$$.\n- Step 2: **Median $$= a$$**: always. Symmetry means half the area lies on each side of $$a$$, so $$F(a) = 0.5$$.\n- Step 3: **Mode $$= a$$**: only if $$f$$ is *unimodal* with peak at $$a$$. Symmetric distributions could be bimodal (two symmetric peaks away from $$a$$) or flat (uniform, no unique mode) or have the peak at $$a$$ (like the bell curve).\n\nSo: symmetric $$\\Rightarrow$$ mean = median always; mode coincides only for unimodal symmetric distributions.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Explain why for a continuous random variable, $\\mathrm{P}(X = a) = 0$ for any specific value $a$, but $\\mathrm{P}(X \\in [a, b])$ can still be positive. (2 steps)", "answer": "- Step 1: $\\mathrm{P}(X = a) = \\int_a^a f(x)\\,dx = 0$ because the integral over a single point (zero width) is zero.\n- Step 2: However, $\\mathrm{P}(X \\in [a, b]) = \\int_a^b f(x)\\,dx$ with $b > a$ gives a positive area under the curve.\n\nThis is why continuous distributions are described by areas under curves, not point probabilities.", "source": "MiniMax ①", "_id": "minimax_1_28"}, {"question": "If you know $$E(X)$$ and $$Var(X)$$, how do you quickly find $$E(3X-2)$$ and $$Var(3X-2)$$? Walk through the reasoning for the variance transformation. (3 steps)", "answer": "- Step 1: For linear transformations $$aX+b$$, use the rules: $$E(aX+b) = aE(X) + b$$ and $$Var(aX+b) = a^2Var(X)$$. Thus, $$E(3X-2) = 3E(X) - 2$$ and $$Var(3X-2) = 9Var(X)$$.\n- Step 2: The variance measures the spread or deviation from the mean. Adding a constant $$b$$ (like -2) shifts the entire distribution but does not change its spread, so the constant does not appear in the variance formula.\n- Step 3: Multiplying by a constant $$a$$ (like 3) scales the distribution. If $$a > 1$$, it stretches the spread; if $$0 < a < 1$$, it compresses it. Because variance is based on *squared* deviations $$(x-\\mu)^2$$, the scaling factor is squared. Thus, the variance is multiplied by $$a^2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "Why is computing the c.d.f. usually more efficient than computing probabilities directly from the p.d.f.? (3 steps)", "answer": "- Step 1: Each probability $$P(a<X<b)$$ from the p.d.f. requires a separate integral $$\\int_a^b f(x)\\,dx$$. Many such probabilities means many integrations.\n- Step 2: Once $$F$$ is computed (one integration), any probability becomes just $$F(b) - F(a)$$ — a simple subtraction.\n- Step 3: Additionally, quantiles (median, quartiles, percentiles) and the mode (via $$f = F'$$) all become easy. $$F$$ is a \"universal tool\" — worth the one-time effort.\n\nStrategy: if the question asks multiple things about the same distribution, compute $$F$$ first.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "What is the relationship between the mean, median, and mode for (a) a symmetric distribution, (b) a right-skewed distribution, (c) a left-skewed distribution? (2 steps)", "answer": "- Step 1: (a) Symmetric: mean = median = mode (all at the center of symmetry). (b) Right-skewed (long tail to right): mode < median < mean (the mean is \"pulled\" toward the tail). (c) Left-skewed: mean < median < mode.\n- Step 2: This happens because the mean is sensitive to extreme values (the tail), while the median and mode are more robust. In right skew, extreme high values pull the mean above the median.\n+ This is useful for assessing skewness: compare mean and median. If mean > median → right skew; mean < median → left skew.", "source": "MiniMax ②", "_id": "minimax_2_52"}, {"question": "A continuous random variable $$X$$ has PDF $$\\mathrm{f}(x) = 2x$$ on $$[0, 1]$$, zero elsewhere. Without lengthy calculation, find $$\\mathrm{E}(X)$$ and the median conceptually. (2 steps)", "answer": "- Step 1: $$\\mathrm{E}(X) = \\int_0^1 x \\cdot 2x\\,\\mathrm{d}x = \\int_0^1 2x^2\\,\\mathrm{d}x = \\left[\\frac{2x^3}{3}\\right]_0^1 = \\frac{2}{3}$$. The mean is $$\\frac{2}{3}$$, pulled rightward from the midpoint $$\\frac{1}{2}$$ because the density is higher on the right (more weight on larger values).\n- Step 2: For the median, first find the CDF: $$\\mathrm{F}(x) = \\int_0^x 2t\\,\\mathrm{d}t = x^2$$. Set $$\\mathrm{F}(m) = 0.5$$: $$m^2 = 0.5$$, so $$m = \\frac{1}{\\sqrt{2}} \\approx 0.707$$. The median is between the midpoint (0.5) and the mean (0.667), consistent with the right-skewed shape.\n\nQuick mental check: mean ≈ 0.67, median ≈ 0.71 — wait, median > mean? Actually $$\\frac{1}{\\sqrt{2}} \\approx 0.707 > \\frac{2}{3} \\approx 0.667$$, so median > mean. For this distribution (density increasing rightward), the mode is at 1, and we get mean < median < mode — negatively skewed ordering.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "The exponential distribution has p.d.f. $$\\mathrm{f}(x) = \\lambda e^{-\\lambda x}$$ for $$x \\geq 0$$. It has the memoryless property: $$\\mathrm{P}(X > a + b \\mid X > a) = \\mathrm{P}(X > b)$$. Explain what this means in real-world terms, using the example of a light bulb's lifetime. (3 steps)", "answer": "- Step 1: The memoryless property says: given that the light bulb has already lasted $$a$$ hours, the probability it lasts another $$b$$ hours is the same as the probability that a brand new bulb lasts $$b$$ hours. The bulb \"forgets\" it has been running — it doesn't \"age.\"\n- Step 2: Mathematically: $$\\mathrm{P}(X > a + b \\mid X > a) = \\frac{\\mathrm{P}(X > a + b)}{\\mathrm{P}(X > a)} = \\frac{e^{-\\lambda(a+b)}}{e^{-\\lambda a}} = e^{-\\lambda b} = \\mathrm{P}(X > b)$$.\n- Step 3: In practice, this means a 5-year-old bulb has the same probability of lasting another year as a brand-new bulb. This is unrealistic for physical objects (which do wear out) but is a good model for certain processes like radioactive decay or random arrivals where the \"next event\" doesn't depend on how long you've been waiting.\n\nThe exponential distribution is the *only* continuous distribution with the memoryless property, just as the geometric distribution is the only discrete one.", "source": "GLM 5.1 ②", "_id": "glm_2_49"}, {"question": "What is $$\\mathrm{P}(X = 1)$$ for a continuous random variable $$X$$? A student argues \"since $$\\mathrm{F}(1)$$ has a value, $$\\mathrm{P}(X = 1) = \\mathrm{F}(1)$$.\" Why is this wrong? (2 steps)", "answer": "- Step 1: For a continuous random variable, $$\\mathrm{P}(X = x) = 0$$ for any specific value $$x$$. This includes $$\\mathrm{P}(X = 1) = 0$$. The probability of landing on exactly one point out of infinitely many is zero.\n- Step 2: The student's confusion arises from misunderstanding what $$\\mathrm{F}(1)$$ represents. $$\\mathrm{F}(1) = \\mathrm{P}(X \\leq 1)$$, which is the probability of $$X$$ being in the *entire interval* up to 1, not the probability of $$X$$ being *exactly* 1. Formally, $$\\mathrm{P}(X = 1) = \\mathrm{P}(X \\leq 1) - \\mathrm{P}(X < 1) = \\mathrm{F}(1) - \\mathrm{F}(1) = 0$$ (since strict and non-strict inequalities give the same probability for continuous variables).\n\n$$\\mathrm{F}(x)$$ gives interval probabilities, never point probabilities for continuous variables.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "Why do we use the dummy variable $$t$$ (rather than $$x$$) inside the integral when writing $$F(x) = \\int_{-\\infty}^x f(t)\\,dt$$? (3 steps)", "answer": "- Step 1: The variable $$x$$ appears as the upper limit of integration — it's the value we're computing the cumulative probability *at*.\n- Step 2: The variable inside the integrand is a dummy — a placeholder for the variable being integrated over. If we reused $$x$$, we'd have $$x$$ playing two conflicting roles: the limit and the integration variable.\n- Step 3: To keep these distinct, we rename the integration variable to $$t$$ (or any other letter). This is convention, not necessity, but prevents real confusion in written work.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "Explain why the probability density function $f(x) = kx(5-x)$ for $0 \\leq x \\leq 6$ can never be a valid p.d.f., regardless of the value of $k$. (2 steps)", "answer": "- Step 1: On the interval $0 \\leq x \\leq 6$, the function $x(5-x)$ takes both positive and negative values. Specifically, when $x > 5$, we have $5-x < 0$, so $x(5-x) < 0$.\n- Step 2: A p.d.f. must satisfy $f(x) \\geq 0$ for all $x$. Since $f(x)$ is negative for $x > 5$, no value of $k$ (even positive) can make this a valid p.d.f.\n\nThis shows that simply having total area equal to 1 isn't enough—the function must also be non-negative everywhere.", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "For a continuous random variable $$X$$, does it matter whether you write $$P(X < a)$$ or $$P(X \\le a)$$? Explain why or why not. (2 steps)", "answer": "- Step 1: No, it does not matter. For a continuous random variable, the probability of taking any one specific value is zero: $$P(X = a) = 0$$.\n- Step 2: Therefore, $$P(X \\le a) = P(X < a) + P(X = a) = P(X < a) + 0 = P(X < a)$$. The same logic applies to $$>$$ vs $$\\ge$$. The probability is carried entirely by the continuous intervals, not the single boundary points.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "What must $$\\mathrm{F}(x)$$ equal at the lower boundary and upper boundary of the random variable's range? Why? (2 steps)", "answer": "- Step 1: At the lower boundary (say $$x = a$$, the smallest value $$X$$ can take), $$\\mathrm{F}(a) = 0$$ because there is no area accumulated to the left of $$a$$ — the probability of $$X$$ being less than or equal to the minimum possible value is 0 (since $$\\mathrm{f}(x) = 0$$ for $$x < a$$).\n- Step 2: At the upper boundary (say $$x = b$$, the largest value), $$\\mathrm{F}(b) = 1$$ because all the area has been accumulated — the probability of $$X$$ being less than or equal to the maximum possible value is 1 (certainty).\n\nThese boundary conditions are essential for defining $$\\mathrm{F}(x)$$ fully and for finding constants of integration when constructing the CDF.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "A continuous random variable $$X$$ has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} \\frac{k}{x(5-x)} & 2 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise}\\end{cases}$$. What is the mode of $$X$$, and why? (2 steps)", "answer": "- Step 1: The function $$g(x) = \\frac{1}{x(5-x)}$$ on $$[2, 4]$$: note that $$x(5-x)$$ is a downward-opening parabola with roots at $$x = 0$$ and $$x = 5$$, maximised at $$x = 2.5$$ where it equals 6.25. Since $$g(x) = \\frac{1}{x(5-x)}$$, the *reciprocal* of a positive function that is maximised at $$x = 2.5$$ means $$g(x)$$ is *minimised* at $$x = 2.5$$.\n- Step 2: Therefore $$g(x)$$ (and hence $$\\mathrm{f}(x)$$) is maximised at the *endpoints* $$x = 2$$ and $$x = 4$$, where $$g(2) = g(4) = \\frac{1}{6}$$. At $$x = 2.5$$, $$g(2.5) = \\frac{1}{6.25} < \\frac{1}{6}$$. The distribution is **bimodal** with modes at $$x = 2$$ and $$x = 4$$. The p.d.f. is U-shaped, with probability concentrated at the edges.\n\nThis is another bathtub-shaped distribution. The key insight: when the denominator of the p.d.f. has a maximum in the interior, the p.d.f. itself has a minimum there.", "source": "GLM 5.1 ②", "_id": "glm_2_48"}, {"question": "Why is it often useful to think of the probability distribution of a continuous RV as a \"blob of mass\" distributed along the x-axis? (3 steps)", "answer": "- Step 1: The analogy translates probability concepts into familiar physics:\n+ $$f(x)$$ is linear mass density (mass per unit length).\n+ Total probability = 1 is like total mass = 1.\n+ $$\\mathrm{E}(X) = \\int x f(x)\\,dx$$ is the centre of mass.\n+ $$\\mathrm{Var}(X)$$ is the moment of inertia about the centre.\n- Step 2: This makes intuition for mean, variance, and skewness tangible:\n+ Mean = balance point (where you'd balance the blob on a pivot).\n+ Variance = resistance to rotation about the centre.\n+ Skew → mean shifts toward the heavier tail.\n- Step 3: Many results follow naturally:\n+ \"Variance only scales, doesn't shift\" ↔ \"moment of inertia is translation-invariant\".\n+ \"Symmetric → mean = median = axis\" ↔ symmetric mass balances on its centre.\n\nA powerful analogy linking probability to mechanics.", "source": "Opus 4.7 ②", "_id": "opus_2_65"}, {"question": "State the general formula for $$\\mathrm{E}(g(X))$$ for a continuous random variable $$X$$, and give concrete examples of where this formula is used. (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(g(X)) = \\int_{-\\infty}^{\\infty} g(x) f(x)\\,dx$$ for any function $$g$$.\n- Step 2: This is the \"law of the unconscious statistician\" — you compute the mean of a transformed variable $$g(X)$$ without first finding the p.d.f. of $$Y = g(X)$$. Just integrate $$g(x)$$ against the original density $$f(x)$$.\n- Step 3: Applications:\n+ $$g(x) = x^2$$ gives $$\\mathrm{E}(X^2)$$, needed for variance.\n+ $$g(x) = x^3$$ gives $$\\mathrm{E}(X^3)$$, e.g., expected volume if $$X$$ is a side length.\n+ $$g(x) = aX + b$$ gives the mean of a linear transformation.\n+ $$g(x) = \\ln x$$ or $$g(x) = e^x$$ gives moments for log-based analyses.\n\nEvery value of $$X$$ gets transformed by $$g$$, then weighted by $$f(x)\\,dx$$.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "A cube has randomly-generated side length $$X$$ with $$\\mathrm{E}(X) = 31$$ and $$\\mathrm{E}(X^2) = 983$$. Find the variance and explain why the expected volume cannot be computed from this info alone. (3 steps)", "answer": "- Step 1: **Variance**: $$\\mathrm{Var}(X) = 983 - 31^2 = 983 - 961 = 22$$. SD $$\\approx \\sqrt{22} \\approx 4.7$$.\n- Step 2: **Expected volume**: $$V = X^3$$, so $$\\mathrm{E}(V) = \\mathrm{E}(X^3)$$, requiring a separate integral $$\\int x^3 f(x)\\,dx$$.\n- Step 3: **Key point**: $$\\mathrm{E}(X^3) \\neq (\\mathrm{E}(X))^3 = 31^3$$. Cubing is non-linear — convexity means $$\\mathrm{E}(X^3) > (\\mathrm{E}(X))^3$$, with the excess reflecting $$X$$'s variability.\n\nTo find $$\\mathrm{E}(V)$$, you'd need the full p.d.f., not just two moments.", "source": "Opus 4.7 ②", "_id": "opus_2_84"}, {"question": "A random variable $$X$$ has p.d.f. that is symmetric about $$x = a$$, meaning $$\\mathrm{f}(a + h) = \\mathrm{f}(a - h)$$ for all $$h$$. What can you immediately conclude about $$\\mathrm{E}(X)$$, and why? (2 steps)", "answer": "- Step 1: If the p.d.f. is symmetric about $$x = a$$, then $$\\mathrm{E}(X) = a$$. No integration is needed. This is because the distribution \"balances\" at the point of symmetry — the weighted contributions to the left and right of $$a$$ cancel out perfectly.\n- Step 2: Formally, the integral $$\\int (x - a)\\,\\mathrm{f}(x)\\,\\mathrm{d}x = 0$$ by symmetry (for every positive contribution from $$x > a$$, there is an equal negative contribution from the mirror point below $$a$$). Therefore $$\\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x = a \\int \\mathrm{f}(x)\\,\\mathrm{d}x = a$$, so $$\\mathrm{E}(X) = a$$.\n\nThis is a powerful shortcut: always check for symmetry before integrating. For example, if $$\\mathrm{f}(x) = \\frac{3}{32}(3 + 2x - x^2)$$ on $$[-1, 3]$$, the axis of symmetry is $$x = 1$$ (midpoint), so $$\\mathrm{E}(X) = 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "Explain the two common methods for finding the cumulative distribution function $$F(x)$$ given a p.d.f. $$f(x)$$, and when each is more convenient. (3 steps)", "answer": "- Step 1: **Method 1 (definite integral)**: Compute $$F(x) = \\int_{a}^{x} f(t)\\,dt$$ where $$a$$ is the lower limit of the p.d.f.'s support. This automatically gives $$F(a) = 0$$ at the lower end.\n- Step 2: **Method 2 (indefinite integral + constant)**: Compute $$\\int f(x)\\,dx = G(x) + c$$, then find $$c$$ using a boundary condition. Typically use $$F(a) = 0$$ at the lower end or $$F(b) = 1$$ at the upper end.\n- Step 3: Both give the same result. Method 1 is cleaner when limits are simple; Method 2 is often easier for piecewise p.d.f.s because you can solve for each piece's constant independently.\n\nWhichever method you use, remember to state $$F(x) = 0$$ below the support and $$F(x) = 1$$ above it — this is the \"full\" definition.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "What is the relationship between $$F(x)$$ and $$f(x)$$, and why does the Fundamental Theorem of Calculus guarantee this? (3 steps)", "answer": "- Step 1: They are related by $$F(x) = \\int_{-\\infty}^{x} f(t)\\,dt$$ and $$f(x) = \\dfrac{d}{dx} F(x)$$. The c.d.f. is the integral (accumulation) of the p.d.f.; the p.d.f. is the derivative (rate of change) of the c.d.f.\n- Step 2: The Fundamental Theorem of Calculus says: if $$F(x) = \\int_c^x f(t)\\,dt$$, then $$F'(x) = f(x)$$. Differentiating the accumulation function returns the integrand.\n- Step 3: Intuition: $$f(x)$$ is how fast probability is accumulating at $$x$$. If $$f(x)$$ is large, $$F$$ rises steeply there; if $$f(x) = 0$$, $$F$$ is flat. So $$f$$ is literally the slope of $$F$$ at each point.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "Why is variance always non-negative for any random variable, and when is it exactly zero? (3 steps)", "answer": "- Step 1: By definition, $$\\mathrm{Var}(X) = \\mathrm{E}((X - \\mu)^2)$$. The integrand $$(x - \\mu)^2$$ is always $$\\geq 0$$.\n- Step 2: An integral of a non-negative function against a non-negative density $$f(x)$$ is non-negative. Hence $$\\mathrm{Var}(X) \\geq 0$$.\n- Step 3: $$\\mathrm{Var}(X) = 0$$ only when $$(X - \\mu)^2 = 0$$ with probability 1 — i.e., $$X$$ is a constant (takes only one value). Any actual variation gives positive variance.\n\nThis also implies $$\\mathrm{E}(X^2) \\geq (\\mathrm{E}(X))^2$$ always — an important inequality.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "What values must $$F(x)$$ take as $$x \\to -\\infty$$ and as $$x \\to \\infty$$, and what does this say about the shape of $$F$$? (3 steps)", "answer": "- Step 1: As $$x \\to -\\infty$$: $$F(x) \\to 0$$. There's no probability mass to the left of any sufficiently small number.\n- Step 2: As $$x \\to \\infty$$: $$F(x) \\to 1$$. Since $$X$$ certainly takes *some* real value, the total accumulated probability is 1.\n- Step 3: Combined with monotonicity (since $$f \\geq 0$$, $$F$$ is non-decreasing), $$F$$ climbs from 0 to 1 as $$x$$ sweeps left to right. For a p.d.f. supported on $$[a,b]$$: $$F(x)=0$$ for $$x \\leq a$$, and $$F(x)=1$$ for $$x \\geq b$$.\n\nEvery c.d.f. is an S-shape (or simpler) going monotonically from 0 to 1.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "If $$\\mathrm{P}(X = c) = 0$$ for every specific value $$c$$, how can a continuous random variable produce any probabilities at all when we observe it? (3 steps)", "answer": "- Step 1: The paradox dissolves once you realise we never actually ask \"what is the probability of $$X$$ being *exactly* $$c$$?\" in a meaningful measurement — instruments have finite precision, so we're really asking about a small interval around $$c$$.\n- Step 2: Probability for a continuous RV is meaningful only over intervals: $$\\mathrm{P}(a < X < b) = \\int_a^b f(x)\\,dx$$ where $$f$$ is the probability density function. The width of the interval, combined with the height of the density, produces non-zero probability.\n- Step 3: Analogy: a line has zero area but a rectangle has non-zero area. Similarly, a single point has zero probability but an interval has positive probability. \"Density times width = probability\" is the mental picture.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "For a p.d.f. defined by two pieces — $$f_1$$ on $$[a, c]$$ and $$f_2$$ on $$[c, b]$$ — with one piece linear and one constant, where could the mode lie? (3 steps)", "answer": "- Step 1: The mode is where $$f$$ achieves its maximum. A constant region has a fixed height; a linear region's extremum is at an endpoint.\n- Step 2: Compare:\n+ Constant piece: height $$= c_0$$ (some value).\n+ Linear piece: evaluate at its endpoints; max is at whichever endpoint is higher.\n- Step 3: The mode is wherever $$f$$ reaches its peak overall:\n+ If linear piece peaks above $$c_0$$: mode is at the linear piece's endpoint.\n+ If constant exceeds linear's maximum: mode is on the constant region (and is not unique — any point there is a mode).\n\nAlways sketch. The peak is usually obvious visually.", "source": "Opus 4.7 ②", "_id": "opus_2_86"}, {"question": "How does the fundamental theorem of calculus apply to the relationship between p.d.f. and c.d.f.? (3 steps)", "answer": "- Step 1: FTC Part 1: $$\\frac{d}{dx} \\int_a^x f(t)\\,dt = f(x)$$ — differentiating an integral (as a function of its upper limit) recovers the integrand.\n- Step 2: Applied to probability: $$F(x) = \\int_{-\\infty}^x f(t)\\,dt$$. Differentiating: $$F'(x) = f(x)$$.\n- Step 3: FTC Part 2: $$\\int_a^b f(x)\\,dx = F(b) - F(a)$$ — integrating a function equals the change in its antiderivative. Applied: $$\\mathrm{P}(a < X < b) = F(b) - F(a)$$.\n\nThe FTC is what makes the p.d.f./c.d.f. relationship so clean — differentiation and integration as inverses give us two complementary views of the same distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_91"}, {"question": "Intuitively, why does adding a constant not change the variance of a random variable, while multiplying by $$a$$ multiplies the variance by $$a^2$$ (not $$|a|$$)? (3 steps)", "answer": "- Step 1: Variance measures spread — how far values typically deviate from the mean. Adding $$b$$ slides the entire distribution (and its mean) rightwards by $$b$$, but the shape and spread are unchanged. So $$\\mathrm{Var}(X+b) = \\mathrm{Var}(X)$$.\n- Step 2: Multiplying by $$a$$ stretches the distribution by factor $$a$$. Each deviation from the mean becomes $$a$$ times larger. But variance is the *average squared* deviation, so squared deviations scale by $$a^2$$.\n- Step 3: This is also why standard deviation scales by $$|a|$$ (not $$a^2$$): SD is the square root of variance, and $$\\sqrt{a^2} = |a|$$.\n+ $$\\mathrm{SD}(aX + b) = |a|\\,\\mathrm{SD}(X)$$\n+ $$\\mathrm{Var}(aX + b) = a^2\\,\\mathrm{Var}(X)$$\n\nLesson: shifts are invisible to variance; scales are magnified quadratically.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "If a continuous random variable has a c.d.f. that's constant on some interval (e.g., $$F(x) = 0.4$$ for $$x \\in [2, 3]$$), what does this say about the p.d.f., and is the distribution still valid? (3 steps)", "answer": "- Step 1: Since $$f(x) = \\frac{d}{dx} F(x)$$ and $$F$$ is constant on $$[2, 3]$$, we get $$f(x) = 0$$ there.\n- Step 2: This means $$X$$ can never take values in $$[2, 3]$$ — zero probability is assigned. It's a \"gap\" in the distribution's support.\n- Step 3: Yes, still valid — a p.d.f. can be zero on some intervals as long as it's non-negative everywhere and integrates to 1 over the total support. Such distributions arise with disjoint support regions (e.g., a mixture of non-overlapping ranges).\n\nLesson: flat segments of $$F$$ correspond to gaps where $$f = 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "A student is asked: \"Can a p.d.f. ever take a value greater than 1?\" The student says no, because probabilities can't exceed 1. Is the student correct? (2 steps)", "answer": "- Step 1: The student is **incorrect**. The p.d.f. $$\\mathrm{f}(x)$$ is a *density*, not a probability. It can certainly exceed 1, as long as the total area under the curve equals 1.\n- Step 2: For example, consider a uniform distribution on $$[0, 0.5]$$: $$\\mathrm{f}(x) = 2$$ for $$0 \\leq x \\leq 0.5$$. Here $$\\mathrm{f}(x) = 2 > 1$$, but the area is $$2 \\times 0.5 = 1$$. The p.d.f. is 2 because the probability of 1 is \"compressed\" into a short interval of width 0.5, so the density must be high. What *can't* exceed 1 is a probability (an area), not a density (a height).\n\nThink of it like population density: a city can have a very high population density (people per km²) even though the total population is finite. The density is the concentration, not the count.", "source": "GLM 5.1 ②", "_id": "glm_2_54"}, {"question": "A student claims: \"For any p.d.f., the mode must lie within the interquartile range.\" Is this claim true? Give a counterexample or explain why it holds. (2 steps)", "answer": "- Step 1: The claim is **false**. The mode can lie outside the interquartile range. Consider a p.d.f. that is very steeply increasing on a short interval near the left endpoint (giving a mode near the left) but has a long, slowly decreasing tail to the right (placing the quartiles far to the right of the mode).\n- Step 2: For a concrete sketch: imagine a p.d.f. that peaks sharply near $$x = 0.1$$ (mode = 0.1), but has enough probability mass spread out to the right that $$Q_1 \\approx 2$$ and $$Q_3 \\approx 5$$. The IQR is $$[2, 5]$$, but the mode is at 0.1, well outside it. This is possible with a heavily right-skewed distribution.\n\nThe mode, median, quartiles, and mean each capture different aspects of the distribution and need not coincide or even be close to each other.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "Why is $ \\text{Var}(X) = E(X^2) - [E(X)]^2 $? (3 steps)", "answer": "- Step 1: Expand $ \\text{Var}(X) = E[(X - \\mu)^2] $:  \n- Step 2: $ = E(X^2 - 2\\mu X + \\mu^2) = E(X^2) - 2\\mu^2 + \\mu^2 $.  \n- Step 3: Simplify to $ E(X^2) - \\mu^2 $, which gives the formula.", "source": "Qwen 3 ①", "_id": "qwen_1_8"}, {"question": "Why must the total area under a probability density function equal exactly 1, and what goes wrong if it doesn't? (3 steps)", "answer": "- Step 1: The total area represents the probability that $$X$$ takes *some* value — i.e., $$\\mathrm{P}(-\\infty < X < \\infty)$$. This must equal 1 because in every observation, $$X$$ takes *some* real value (the outcome space is certain to occur).\n- Step 2: If the area is less than 1, probability is \"missing\" — some outcomes aren't accounted for.\n- Step 3: If the area is greater than 1, we have \"excess probability\", which violates the basic rule that probability cannot exceed 1.\n\nThis is why we scale functions by a constant $$k$$ — to *force* the integral to equal 1.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "When finding the c.d.f. of a piecewise p.d.f., why must you \"carry over\" the value at the previous boundary when integrating each new piece? (3 steps)", "answer": "- Step 1: The c.d.f. is defined cumulatively: $$F(x) = \\mathrm{P}(X \\leq x)$$. It counts *all* probability up to $$x$$, not just the probability within the current piece.\n- Step 2: Suppose the p.d.f. is defined on $$[a, c] \\cup [c, b]$$. For $$x \\in [c, b]$$: $$F(x) = \\int_{a}^{c} f(t)\\,dt + \\int_{c}^{x} f(t)\\,dt = F(c) + \\int_{c}^{x} f(t)\\,dt$$.\n- Step 3: If you forget $$F(c)$$ and integrate only within the current piece, you undercount — missing probability from earlier pieces. The c.d.f. must be continuous across boundaries (since probability doesn't \"jump\" for continuous RVs), and carrying over $$F(c)$$ ensures this.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "For a continuous RV $$X$$ with p.d.f. $$f(x)$$, is it meaningful to write $$\\mathrm{P}(X = x) = f(x) \\cdot dx$$? (3 steps)", "answer": "- Step 1: Heuristically, yes — this is the \"infinitesimal probability\" in a tiny interval around $$x$$. Rigorously, $$dx$$ is an infinitesimal, not a number, so this expression is informal.\n- Step 2: The proper statement is: for small $$\\Delta x$$, $$\\mathrm{P}(x < X < x + \\Delta x) \\approx f(x) \\Delta x$$. The approximation becomes exact as $$\\Delta x \\to 0$$, giving $$f(x)\\,dx$$ inside the integral.\n- Step 3: This intuition is useful for building mental models:\n+ Density × width = probability (over small intervals).\n+ Integrating density = total probability.\n+ Density itself is not probability — probability emerges only when combined with a width.\n\nUse this intuition, but remember the formal statement requires limits/integrals.", "source": "Opus 4.7 ②", "_id": "opus_2_100"}, {"question": "Misconception: a student computes $$\\text{Var}(X)$$ and gets a negative number. Why does this indicate an error? (3 steps)", "answer": "- Step 1: $$\\text{Var}(X) = \\int (x-\\mu)^2 f(x)\\,dx$$ — the integrand is (non-negative)² × (non-negative density), so the integral is $$\\geq 0$$.\n- Step 2: Equivalently, $$\\text{Var}(X) = E(X^2) - (E(X))^2 \\geq 0$$ by Jensen's inequality.\n- Step 3: A negative result flags:\n+ Arithmetic slip in computing $$E(X^2)$$ or $$(E(X))^2$$, or\n+ $$f$$ is not a valid p.d.f. (negative somewhere or not normalised), or\n+ Confusion between $$E(X^2)$$ and $$(E(X))^2$$.\n\nVariance = 0 only for constant $$X$$. Always non-negative; never negative.", "source": "Opus 4.7 ①", "_id": "opus_1_65"}, {"question": "For $$f(x) = \\tfrac{3}{32}(4 - x^2)$$ on $$[-2, 2]$$, identify mode, mean, median, and sketch the shape — minimising integration. (4 steps)", "answer": "- Step 1: **Shape**: inverted parabola, zero at $$\\pm 2$$, peaks at $$x = 0$$ with $$f(0) = \\tfrac{3}{32}\\cdot 4 = \\tfrac{3}{8}$$. Symmetric about 0.\n- Step 2: **Mode = 0** (peak location).\n- Step 3: **Mean = Median = 0** by symmetry — no integration needed.\n- Step 4: **Support**: $$[-2,2]$$. C.d.f. is an S-curve from 0 at $$x=-2$$, passing through 0.5 at $$x=0$$, to 1 at $$x=2$$.\n\nTemplate: identify symmetry, read off mode from peak, deduce mean and median from symmetry axis.", "source": "Opus 4.7 ①", "_id": "opus_1_75"}, {"question": "Describe what you see when you superimpose the graphs of $$f(x)$$ and $$F(x)$$. What do key features correspond to? (4 steps)", "answer": "- Step 1: Where $$f(x) = 0$$ (outside support or gaps): $$F$$ is flat. Zero-density regions = horizontal plateaus of $$F$$.\n- Step 2: Where $$f(x)$$ is large: $$F$$ has steep positive slope. Mode of $$f$$ = steepest point of $$F$$.\n- Step 3: Inflection points of $$F$$ correspond to local extrema of $$f$$. At the mode, $$F$$ transitions from accelerating to decelerating.\n- Step 4: Quantiles: median = $$x$$ where $$F = 0.5$$; quartiles at 0.25 and 0.75; percentiles at any level. Just trace horizontally at the target probability and drop to the $$x$$-axis.\n\nInternalising these correspondences lets you read $$F$$ graphs directly for most quantities.", "source": "Opus 4.7 ①", "_id": "opus_1_74"}, {"question": "The CDF $$\\mathrm{F}(x) = \\frac{1}{81}(-2x^3 + 15x^2 - 44)$$ on $$[2, 5]$$ gives a PDF $$\\mathrm{f}(x) = \\frac{1}{81}(-6x^2 + 30x)$$ on $$[2, 5]$$, zero elsewhere. The mode is found by setting $$\\mathrm{f}'(x) = 0$$: $$-12x + 30 = 0$$, so $$x = 2.5$$. But $$\\mathrm{f}(2.5) = \\frac{1}{81}(30 \\times 2.5 - 6 \\times 6.25) > 0$$ while $$\\mathrm{f}(2) = \\frac{1}{81}(60-24) > 0$$ and $$\\mathrm{f}(5) = \\frac{1}{81}(150-150) = 0$$. Is $$x = 2.5$$ definitely the mode? (2 steps)", "answer": "- Step 1: Yes, $$x = 2.5$$ is the mode. We verified that $$\\mathrm{f}(2.5) > 0$$ (it's a genuine peak, not a minimum or point of inflection), and $$\\mathrm{f}(x)$$ decreases after $$x = 2.5$$ toward $$\\mathrm{f}(5) = 0$$. The second derivative $$\\mathrm{f}''(x) = -12 < 0$$ confirms concavity (a maximum).\n- Step 2: The boundary values confirm this: $$\\mathrm{f}(2) = \\frac{36}{81}$$, $$\\mathrm{f}(2.5) = \\frac{37.5}{81}$$ (larger), and $$\\mathrm{f}(5) = 0$$. The interior maximum at 2.5 exceeds both boundary values, so it is indeed the global maximum on $$[2, 5]$$.\n\nAlways compare interior stationary points with boundary values — the global maximum (mode) could be at a boundary even if there's an interior stationary point.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "Define the mode of a continuous random variable. How do you find it, and why might the derivative-equal-zero approach fail? (4 steps)", "answer": "- Step 1: The mode is the value of $$x$$ where $$f(x)$$ is maximised — the peak of the p.d.f.\n- Step 2: For a smooth p.d.f. with an interior maximum, solve $$f'(x) = 0$$ and verify it's a maximum (via second derivative or sketch).\n- Step 3: BUT if $$f$$ is monotonic on its support (strictly increasing or decreasing), the maximum is at a *boundary* — there's no interior critical point. Example: $$f(x) = 2x$$ on $$[0,1]$$ is increasing; mode is at $$x = 1$$, found by inspection.\n- Step 4: For piecewise or non-smooth p.d.f.s, the max may occur at a corner. Always **sketch first**, then use calculus or inspection appropriately.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "How does the formula for the expected value $$E(X)$$ of a continuous random variable conceptually derive from the discrete formula $$E(X) = \\sum x_i P(X=x_i)$$? (3 steps)", "answer": "- Step 1: For a discrete random variable, the expected value is a weighted average: each value $$x_i$$ is multiplied by its probability $$P(X=x_i)$$, and the results are summed.\n- Step 2: For a continuous random variable, the probability of a single value is zero, but the probability *density* at $$x$$ is $$f(x)$$. We replace the summation with an integration and the probability mass with the density function.\n- Step 3: This gives $$E(X) = \\int_{-\\infty}^{\\infty} x f(x) dx$$. The integral \"weighs\" each infinitesimal slice $$x$$ by its density $$f(x)$$, effectively finding the balance point (center of mass) of the distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "A student computes $$\\mathrm{E}(X) = 2$$ for some random variable $$X$$ and then writes $$\\mathrm{E}(X^2) = (\\mathrm{E}(X))^2 = 4$$. Explain why this is almost certainly wrong, and what it would imply about $$X$$. (2 steps)", "answer": "- Step 1: In general, $$\\mathrm{E}(X^2) \\neq (\\mathrm{E}(X))^2$$. By the variance formula, $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$. If $$\\mathrm{E}(X^2) = 4$$, then $$\\mathrm{Var}(X) = 4 - 4 = 0$$.\n- Step 2: A variance of 0 means $$X$$ is a constant — it always takes exactly the value 2 with no variation at all. For any non-trivial random variable, $$\\mathrm{Var}(X) > 0$$, so $$\\mathrm{E}(X^2) > (\\mathrm{E}(X))^2$$. You must compute $$\\mathrm{E}(X^2) = \\int x^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$ by integration, not by squaring the mean.\n\nThis is one of the most common student errors. The order of operations matters: averaging the squares ($$\\mathrm{E}(X^2)$$) versus squaring the average ($$(\\mathrm{E}(X))^2$$).", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "Can the mode and median be equal for a non-symmetric distribution? Give a conceptual argument. (2 steps)", "answer": "- Step 1: Yes, it is possible. The mode is the peak of the density, and the median is where 50% of area is on each side. These are different criteria, and they can coincide even without symmetry.\n- Step 2: For example, imagine a PDF that is very tall and narrow on the left (creating a mode there), with a long thin tail to the right. If the tall narrow section happens to contain exactly 50% of the total area, the median would also be in that region, potentially at or near the mode. The distribution is clearly non-symmetric, yet mode ≈ median.\n\nThe challenge exercise in the text asks you to construct such a PDF explicitly — it demonstrates that equality of mode and median does not imply symmetry.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "For a symmetric probability density function, explain why the median must equal the mean, and what that implies about the axis of symmetry. (3 steps)", "answer": "- Step 1: If $$f$$ is symmetric about $$x = c$$, the cumulative area to the left of $$c$$ exactly balances the area to the right (both equal 0.5).\n- Step 2: So $$F(c) = 0.5$$ — by definition, $$c$$ is the median.\n- Step 3: Also, by the symmetry argument for expectations, $$\\mathrm{E}(X) = c$$. Hence mean = median = $$c$$ = axis of symmetry. If there's a unique mode (e.g., at the axis), it's also at $$c$$.\n\nFor a symmetric unimodal distribution: the three classical measures of location coincide.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "A student computes $$\\mathrm{P}(X = 1)$$ using a c.d.f. and writes $$\\mathrm{P}(X = 1) = \\mathrm{F}(1) = 0.3$$. What is wrong with this reasoning? (2 steps)", "answer": "- Step 1: The c.d.f. gives $$\\mathrm{F}(1) = \\mathrm{P}(X \\leq 1)$$, the probability that $$X$$ is less than or equal to 1. This is *not* the same as $$\\mathrm{P}(X = 1)$$.\n- Step 2: For a continuous random variable, $$\\mathrm{P}(X = x) = 0$$ for every value of $$x$$. The correct answer is $$\\mathrm{P}(X = 1) = 0$$. The value $$\\mathrm{F}(1) = 0.3$$ is the probability that $$X \\leq 1$$, which involves a whole range of values, not just the single point $$x = 1$$.\n\nThis is a fundamental property of continuous distributions: individual points carry zero probability; only intervals have positive probability.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "A PDF is defined as $$\\mathrm{f}(x) = k$$ on $$[0, 2]$$ and $$\\mathrm{f}(x) = k(x-1)$$ on $$[2, 4]$$, zero elsewhere. Describe the shape of this PDF and what geometric areas you'd compute to find $$k$$. (3 steps)", "answer": "- Step 1: On $$[0, 2]$$, $$\\mathrm{f}(x) = k$$ is a **rectangle** of height $$k$$ and width 2, giving area $$2k$$.\n- Step 2: On $$[2, 4]$$, $$\\mathrm{f}(x) = k(x-1)$$ is a **line** increasing from $$\\mathrm{f}(2) = k$$ to $$\\mathrm{f}(4) = 3k$$. This forms a **trapezium** with parallel sides of height $$k$$ and $$3k$$, and width 2, giving area $$\\frac{1}{2}(k + 3k) \\times 2 = 4k$$.\n- Step 3: Total area = $$2k + 4k = 5k = 1$$, so $$k = \\frac{1}{5}$$. For piecewise PDFs with linear sections, geometric area formulas (rectangles, triangles, trapezia) can replace integration — often faster and more intuitive.\n\nThis geometric shortcut works whenever the PDF pieces are linear (constant, straight lines). For curves, you must integrate.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "If X ~ Uniform(0, 1), what is the distribution of Y = -ln(X)? Show that Y follows an exponential distribution with parameter 1. (3 steps)", "answer": "- Step 1: X has f_X(x) = 1 for 0 < x < 1. For Y = -ln(X), the inverse is X = e^(-Y), and dX/dY = -e^(-Y).\n- Step 2: Using change of variable: f_Y(y) = f_X(g⁻¹(y)) · |d/dy(g⁻¹(y))| = 1 · e^(-y) = e^(-y), for y > 0.\n- Step 3: This is the exponential distribution with λ = 1. This transformation is useful because it generates exponential variables from uniform ones — a key method in simulation.", "source": "MiniMax ②", "_id": "minimax_2_57"}, {"question": "Why is the cumulative distribution function $$F(x)$$ always non-decreasing, and what does this property encode about probability? (3 steps)", "answer": "- Step 1: As $$x$$ increases, the interval $$(-\\infty, x]$$ grows — it contains all earlier intervals. So the probability $$\\mathrm{P}(X \\leq x)$$ can only stay the same or grow.\n- Step 2: Formally: $$F'(x) = f(x) \\geq 0$$, since the p.d.f. is non-negative. A function with non-negative derivative is non-decreasing.\n- Step 3: Intuitively: you can only *add* probability as your window widens; you can never subtract probability. If $$f = 0$$ on some region, $$F$$ is flat there (no new probability accumulating).\n\nMonotonicity is the mathematical fingerprint of probability's non-negativity.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "For a cube with side $$X$$ having $$f(x) = \\tfrac{1}{800}(x+10)$$ on $$[20,40]$$, what's the correct way to find expected volume, and why might a student err? (3 steps)", "answer": "- Step 1: **Correct**: $$E(X^3) = \\int_{20}^{40} x^3 \\cdot \\tfrac{1}{800}(x+10)\\,dx$$ — directly applying $$E(g(X)) = \\int g(x)f(x)\\,dx$$.\n- Step 2: **Wrong approach**: computing $$E(X)$$ and cubing. That gives $$(E(X))^3$$, which isn't the average volume.\n- Step 3: Why it matters: larger cubes contribute disproportionately to average volume (volume $$\\propto$$ side³). Taking $$(E(X))^3$$ ignores the variation in $$X$$ and typically *underestimates* the true expected volume.\n\nExample: $$E(X) = 3$$ gives $$(E(X))^3 = 27$$; actual $$E(X^3) = 36$$ for sides 2,4 equally likely.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "A student is given $$f(x) = k(2-x)$$ on $$[-2,2]$$ with $$k>0$$ and asked if it can be a valid p.d.f. How would you verify this? (3 steps)", "answer": "- Step 1: Non-negativity check. On $$[-2, 2]$$, the factor $$2-x$$ ranges from $$4$$ (at $$x=-2$$) down to $$0$$ (at $$x=2$$), so $$2-x \\geq 0$$ throughout. Multiplying by $$k>0$$ keeps $$f \\geq 0$$ ✓.\n- Step 2: Find $$k$$ from normalisation. The graph is a triangle/trapezium; its area is $$\\int_{-2}^{2} k(2-x)\\,dx$$. Compute: $$k[2x - x^2/2]_{-2}^2 = k[(4-2) - (-4-2)] = 8k$$. Setting $$8k = 1$$ gives $$k = \\tfrac{1}{8}$$.\n- Step 3: With $$k = \\tfrac{1}{8}$$, both conditions hold, so yes it's valid. Contrast: on the wider interval $$[-2, 4]$$, $$2-x$$ would go negative for $$x > 2$$, and no positive $$k$$ could fix that.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "A common pitfall when finding the median by integration: setting up $$\\int_a^m f(x)\\,dx = 0.5$$ directly. How can this produce a wrong answer, and how do you avoid it? (3 steps)", "answer": "- Step 1: The pitfall: you might implicitly assume $$m$$ lies in the same piece of a piecewise p.d.f. that starts at $$a$$. If $$m$$ is in a later piece, the integral formula is wrong.\n- Step 2: Correct procedure:\n+ First, compute cumulative probability up to each piece boundary.\n+ Compare to 0.5 to identify which piece contains the median.\n+ Then integrate within that piece, carrying over probability from earlier pieces.\n- Step 3: Example: if $$F(c) = 0.3$$ at boundary $$c$$ and the next piece is $$[c, b]$$, the median satisfies $$0.3 + \\int_c^m f(x)\\,dx = 0.5$$, i.e., $$\\int_c^m f(x)\\,dx = 0.2$$.\n\nAlways locate the median's piece first; then set up the correct conditional integral.", "source": "Opus 4.7 ②", "_id": "opus_2_64"}, {"question": "Misconception: a student says \"the mode of a continuous r.v. is the most probable value\". Why is this subtly wrong? (3 steps)", "answer": "- Step 1: For any specific value $$a$$, $$P(X = a) = 0$$. So no value is \"more probable\" than another in the pointwise sense — all pointwise probabilities are zero.\n- Step 2: What's actually true: near the mode, probability is most densely packed. $$f(\\text{mode})$$ is the largest, so $$P(\\text{mode} - \\epsilon < X < \\text{mode} + \\epsilon)$$ exceeds the same-width probability around any other point.\n- Step 3: Correct phrasing: \"the mode is the value around which probability density is highest\" (a statement about density, not probability).\n\nDensity, not probability, is what we're maximising.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "Given the c.d.f. $$F(x) = \\tfrac{1}{2}(x-1)$$ on $$[1, 3]$$ (0 before, 1 after), find the p.d.f. and identify the distribution. (3 steps)", "answer": "- Step 1: Differentiate: $$f(x) = F'(x) = \\tfrac{1}{2}$$ on $$[1,3]$$; $$f(x) = 0$$ elsewhere.\n- Step 2: This is the **uniform distribution on $$[1,3]$$**. Constant density at height $$1/2$$; area $$= (1/2) \\times 2 = 1$$ ✓.\n- Step 3: Properties follow immediately: mean = median = 2 (midpoint), mode non-unique, $$\\text{Var}(X) = 2^2/12 = 1/3$$.\n\nDiagnostic: a **linear** c.d.f. always implies a **uniform** distribution (constant density).", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "What is the general formula for $$\\mathrm{E}(\\mathrm{g}(X))$$, and why is it crucial for computing things like expected volume from a side length? (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(\\mathrm{g}(X)) = \\int_{-\\infty}^{\\infty} \\mathrm{g}(x)\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$ — you multiply the function $$\\mathrm{g}(x)$$ by the PDF and integrate. This generalizes $$\\mathrm{E}(X)$$ (where $$\\mathrm{g}(x) = x$$) and $$\\mathrm{E}(X^2)$$ (where $$\\mathrm{g}(x) = x^2$$).\n- Step 2: This is crucial because **$$\\mathrm{E}(\\mathrm{g}(X)) \\neq \\mathrm{g}(\\mathrm{E}(X))$$** in general. If a cube has side length $$X$$, the expected volume is $$\\mathrm{E}(X^3) = \\int x^3\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$, which is NOT the same as $$[\\mathrm{E}(X)]^3$$.\n- Step 3: The inequality $$\\mathrm{E}(X^3) \\neq [\\mathrm{E}(X)]^3$$ arises because the average of cubes is not the cube of the average — variability in $$X$$ means larger values get cubed into even larger contributions, pulling $$\\mathrm{E}(X^3)$$ above $$[\\mathrm{E}(X)]^3$$ for non-degenerate distributions.\n\nNever substitute $$\\mathrm{E}(X)$$ into a nonlinear function to get $$\\mathrm{E}(\\mathrm{g}(X))$$ — you must integrate $$\\mathrm{g}(x)\\,\\mathrm{f}(x)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "The length of a telephone call, $$T$$, has p.d.f. $$\\mathrm{f}(t) = \\frac{k}{t^3}$$ for $$t \\geq 1$$. This is defined on an infinite interval $$[1, \\infty)$$. Given that $$\\int_1^{\\infty} \\frac{1}{t^3}\\,\\mathrm{d}t = \\frac{1}{2}$$, find $$k$$. (2 steps)", "answer": "- Step 1: The total area must be 1: $$\\int_1^{\\infty} \\frac{k}{t^3}\\,\\mathrm{d}t = k\\int_1^{\\infty} \\frac{1}{t^3}\\,\\mathrm{d}t = k \\cdot \\frac{1}{2} = 1$$, using the given result.\n- Step 2: Therefore $$k = 2$$. The p.d.f. is $$\\mathrm{f}(t) = \\frac{2}{t^3}$$ for $$t \\geq 1$$. This is a valid p.d.f. on an infinite domain: the integral converges (the area is finite) because $$t^3$$ grows fast enough. If the power were $$t^1$$ instead of $$t^3$$, the integral would diverge and no valid p.d.f. would exist.\n\nFor improper integrals of the form $$\\int_1^{\\infty} \\frac{1}{t^p}\\,\\mathrm{d}t$$, the integral converges if and only if $$p > 1$$. The result is $$\\frac{1}{p-1}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "Why is it important to sketch the PDF before finding the mode? Give two reasons. (2 steps)", "answer": "- Step 1: A sketch reveals whether the function is monotonic (always increasing or decreasing). If so, the mode is at a boundary, and setting $$\\mathrm{f}'(x) = 0$$ won't find it — there may be no interior stationary point at all.\n- Step 2: A sketch helps you distinguish between maxima and minima among the solutions to $$\\", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "For a probability density function $$f(y) = 2y$$ on $$[0, 1]$$, why is the mode at $$y = 1$$ (the endpoint) rather than where $$f'(y) = 0$$? (3 steps)", "answer": "- Step 1: Here $$f(y) = 2y$$ is linear and strictly increasing on $$[0, 1]$$. Its derivative $$f'(y) = 2$$ is never zero — there's no interior critical point.\n- Step 2: Since $$f$$ is strictly increasing on $$[0, 1]$$, it attains its maximum at the right endpoint: $$f(1) = 2$$ is the highest value.\n- Step 3: So the mode is $$y = 1$$. The critical-point method doesn't apply — we must check endpoints.\n\nGeneral lesson: the mode is simply where $$f$$ is largest. If $$f$$ is monotonic, the max is at an endpoint. Sketching $$f$$ avoids this pitfall.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "An exam asks: \"find the median given the piecewise c.d.f.\" What's your full strategy? (4 steps)", "answer": "- Step 1: Identify all pieces of $$F$$, including the 0 and 1 regions.\n- Step 2: Locate where $$F = 0.5$$: check $$F$$'s value at each boundary between pieces. If some boundary gives exactly 0.5, that's the median. Otherwise, identify the piece where $$F$$ crosses 0.5.\n- Step 3: Solve the equation $$F_i(x) = 0.5$$ using the correct piece's formula.\n- Step 4: Verify: the solution must lie in the intended interval for that piece. Discard any spurious solutions (e.g., from a quadratic giving two roots, only one valid).\n\nCommon pitfall: using the wrong piece yields a solution outside its range — signal to retry with the correct piece.", "source": "Opus 4.7 ①", "_id": "opus_1_79"}, {"question": "What does the IQR measure, and how does it compare with standard deviation? (3 steps)", "answer": "- Step 1: $$\\text{IQR} = Q_3 - Q_1$$: range of the middle 50% of the distribution.\n- Step 2: Unlike $$\\sigma$$ (which squares deviations and so is heavily influenced by extremes), IQR ignores the outer 50% entirely — it's a *robust* measure of spread.\n- Step 3: For normal-ish distributions, $$\\text{IQR} \\approx 1.35\\sigma$$. For heavy-tailed distributions, $$\\sigma$$ can be much larger (or even infinite) while IQR stays finite.\n\nIQR is preferred when tails are uncertain or data has outliers; $$\\sigma$$ is preferred when you want to use all information.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "For a continuous random variable X, what does it mean if the p.d.f. has two equal local maxima? How would you describe the mode in this case? (2 steps)", "answer": "- Step 1: This is called a bimodal distribution — it has two modes (both local maxima). Each mode represents a peak in the probability density.\n- Step 2: Both peak values are called modes. For example, if f(x) = 1/4 for 0 ≤ x ≤ 1 and f(x) = 1/4 for 3 ≤ x ≤ 4 (with 0 elsewhere between), the modes are x = any value in [0,1] and x = any value in [3,4].\n+ In some contexts, the \"mode\" refers to the global maximum, but technically any local maximum is a mode. Most textbook problems have a unique mode for simplicity.", "source": "MiniMax ②", "_id": "minimax_2_20"}, {"question": "The life $$X$$ of a lightbulb (in thousands of hours) has p.d.f. $$f(x) = 2.5 e^{-2.5x}$$ for $$x \\geq 0$$. Find the median and interpret it. (3 steps)", "answer": "- Step 1: C.d.f.: $$F(x) = \\int_0^x 2.5 e^{-2.5t}\\,dt = 1 - e^{-2.5x}$$.\n- Step 2: Solve $$F(m) = 0.5$$: $$1 - e^{-2.5m} = 0.5 \\Rightarrow e^{-2.5m} = 0.5 \\Rightarrow m = \\frac{\\ln 2}{2.5} \\approx 0.277$$ thousand hours ($$\\approx 277$$ hours).\n- Step 3: Interpretation: half the bulbs fail by ~277 hours. But mean life = $$1/2.5 = 0.4$$ thousand hours = 400 hours. So mean > median, typical of right-skewed (exponential) distributions — a few long-lived bulbs pull the mean up.", "source": "Opus 4.7 ②", "_id": "opus_2_83"}, {"question": "You're told $$\\mathrm{E}(Y) = 2$$ and $$\\mathrm{E}(Y^2) = 7$$ for some random variable $$Y$$. Without knowing the distribution, find $$\\mathrm{Var}(Y)$$ and $$\\mathrm{Var}(4Y - 2)$$. (3 steps)", "answer": "- Step 1: Use $$\\mathrm{Var}(Y) = \\mathrm{E}(Y^2) - (\\mathrm{E}(Y))^2 = 7 - 4 = 3$$.\n- Step 2: For linear transformations, $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$ — the shift $$b$$ is invisible.\n- Step 3: So $$\\mathrm{Var}(4Y - 2) = 16 \\cdot 3 = 48$$.\n\nConceptual insight: you don't need the distribution of $$Y$$ — just its first two moments. Mean and variance are sufficient for all linear transformations.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "Why does the formula $$\\mathrm{E}(X) = \\int x f(x)\\,dx$$ always produce a value within the support of $$X$$ (assuming the support is connected)? (3 steps)", "answer": "- Step 1: Suppose the support is $$[a, b]$$. Then $$f(x) = 0$$ outside $$[a, b]$$, so only $$x$$-values in $$[a, b]$$ contribute to the integral.\n- Step 2: For $$x \\in [a, b]$$, we have $$a \\leq x \\leq b$$. Multiplying by $$f(x) \\geq 0$$ and integrating gives: $$a \\int f \\leq \\int x f \\leq b \\int f$$, i.e., $$a \\leq \\mathrm{E}(X) \\leq b$$.\n- Step 3: So the mean always lies within the support. Moreover, $$\\mathrm{E}(X) = a$$ or $$\\mathrm{E}(X) = b$$ only in degenerate cases (probability concentrated at an endpoint).\n\nThis is intuitive: a weighted average of values in $$[a, b]$$ must itself be in $$[a, b]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_109"}, {"question": "A student finds the mode by solving $$\\mathrm{f}'(x) = 0$$ and gets $$x = \\frac{2}{3}$$ and $$x = 0$$ as solutions. How should they determine which is the actual mode? (2 steps)", "answer": "- Step 1: Not every solution to $$\\mathrm{f}'(x) = 0$$ is a maximum — it could be a minimum or a point of inflection. You must verify which solution gives the largest value of $$\\mathrm{f}(x)$$.\n- Step 2: Methods for verification:\n+ Evaluate $$\\mathrm{f}(x)$$ at each candidate and compare — the mode is where $$\\mathrm{f}(x)$$ is largest.\n+ Check the second derivative: $$\\mathrm{f}''(x) < 0$$ confirms a local maximum.\n+ Sketch the graph — the mode is visually the highest point.\n\n+ For example, with $$\\mathrm{f}(x) = 12x^2(1-x)$$ on $$[0,1]$$: $$\\mathrm{f}'(x) = 0$$ gives $$x = 0$$ and $$x = \\frac{2}{3}$$; $$\\mathrm{f}(0) = 0$$ (minimum at boundary) while $$\\mathrm{f}(\\frac{2}{3}) = \\frac{16}{9}$$ (true maximum), so the mode is $$\\frac{2}{3}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "A c.d.f. is given as $$F(x) = \\frac{1}{5}x - \\frac{1}{5}$$ for $$1 \\le x \\le 2$$, and a different formula for $$2 < x \\le 4$$. If you need to find the lower quartile $$Q_1$$, how do you decide which formula to use? (3 steps)", "answer": "- Step 1: Evaluate the c.d.f. at the boundary points. Here, the first section is for $$1 \\le x \\le 2$$. Calculate $$F(2) = \\frac{1}{5}(2) - \\frac{1}{5} = \\frac{1}{5} = 0.2$$.\n- Step 2: The lower quartile $$Q_1$$ corresponds to $$F(x) = 0.25$$.\n- Step 3: Since $$F(2) = 0.2$$, the value 0.25 has not been reached by the end of the first section. Therefore, the lower quartile must lie in the second section (for $$2 < x \\le 4$$), and you must use the formula from that section to solve for $$Q_1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "If X is continuous with p.d.f. f(x), and you want to find P(X > μ) where μ = E(X), do you always get 0.5? Explain with an example. (2 steps)", "answer": "- Step 1: No! P(X > μ) = 0.5 only holds if the distribution is symmetric about the mean. The mean does not necessarily split probability in half.\n- Step 2: For example, in Exercise 4C question 3, with f(y) = y/8 for 0 ≤ y ≤ 4, E(Y) = 8/3 ≈ 2.67. Computing P(Y > 8/3) gives a value that is not 0.5 (the distribution is right-skewed, so P(Y > mean) < 0.5).\n+ Common misconception: Students confuse mean with median. Only for symmetric distributions are they equal.", "source": "MiniMax ②", "_id": "minimax_2_23"}, {"question": "Define the cumulative distribution function $$F(x)$$ for a continuous random variable, and explain its geometric meaning. (3 steps)", "answer": "- Step 1: $$F(x) = P(X \\leq x) = \\int_{-\\infty}^{x} f(t)\\,dt$$. It's the probability that $$X$$ is at most $$x$$.\n- Step 2: Geometrically, $$F(x)$$ is the *area under the p.d.f. to the left of the vertical line at $$x$$*. As $$x$$ moves from $$-\\infty$$ to $$\\infty$$, this area accumulates from 0 to 1.\n- Step 3: Think of $$F$$ as an \"area-so-far\" function: at each position $$x$$, $$F(x)$$ tells you what fraction of total probability has been swept up. Because areas only add (not subtract), $$F$$ is always non-decreasing.\n\nMental image: a running total of probability, like filling a container of total volume 1 as you move rightward.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "In practical reporting of a continuous distribution, which of mean, median, or mode is most appropriate, and why might you use more than one? (3 steps)", "answer": "- Step 1: **Mean**: best when the distribution is roughly symmetric and outliers are informative. Also useful because of nice mathematical properties (linearity, additivity).\n- Step 2: **Median**: best when the distribution is skewed or has outliers. Describes \"typical\" experience better than mean in skewed settings.\n- Step 3: **Mode**: best when you want to describe \"most frequent value\" or \"peak\" — useful for multimodal distributions or when discussing the most likely outcome.\n\nIn practice, report multiple:\n+ Symmetric data: mean (+ SD for spread) is often sufficient.\n+ Skewed data: median and IQR, possibly supplemented by mean.\n+ Complex distributions: all three plus a picture.\n\nNo single summary captures everything.", "source": "Opus 4.7 ②", "_id": "opus_2_105"}, {"question": "What's the difference between $$\\mathrm{E}(X)$$ and $$\\mathrm{E}(X^2)$$ in terms of what they tell you about a distribution? (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(X)$$ weights each value of $$x$$ by $$f(x)$$ — it's the first moment, giving the centre of mass (location).\n- Step 2: $$\\mathrm{E}(X^2)$$ weights each *squared* value by $$f(x)$$ — it's the second raw moment. It doesn't directly measure spread, but combines with $$\\mathrm{E}(X)$$ to do so.\n- Step 3: Together:\n+ $$\\mathrm{E}(X)$$ → location.\n+ $$\\mathrm{E}(X^2)$$ → combined with $$\\mathrm{E}(X)$$ gives scale via $$\\mathrm{Var}(X)$$.\n+ Higher moments (third → skewness, fourth → kurtosis) capture further shape features.\n\nMoments build up a progressive characterisation of the distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_62"}, {"question": "What is the mode of the exponential distribution $$f(x) = \\lambda e^{-\\lambda x}$$ for $$x \\geq 0$$, and why is it at the boundary? (3 steps)", "answer": "- Step 1: For $$x \\geq 0$$, $$f(x) = \\lambda e^{-\\lambda x}$$ is strictly decreasing (exponential decay). Its maximum on $$[0, \\infty)$$ is at the left endpoint.\n- Step 2: At $$x = 0$$: $$f(0) = \\lambda$$. For all $$x > 0$$: $$f(x) < \\lambda$$.\n- Step 3: So mode = 0. The derivative test won't help — $$f'(x) = -\\lambda^2 e^{-\\lambda x} < 0$$ is never zero. The maximum is forced to the boundary because $$f$$ is monotonic.\n\nNotice the three location measures differ: mode = 0, median = $$(\\ln 2)/\\lambda$$, mean = $$1/\\lambda$$. Classic right-skew ordering.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "A p.d.f. is f(x) = k/(x+2) for -1 ≤ x ≤ 4. Find k and explain why this distribution is likely to be skewed. (3 steps)", "answer": "- Step 1: Normalize: ∫₋₁⁴ k/(x+2) dx = k[ln(x+2)]₋₁⁴ = k(ln 6 - ln 1) = k ln 6 = 1, so k = 1/ln 6.\n- Step 2: The function decreases as x increases (1/(x+2) gets smaller), so probability is more concentrated toward the left (near -1).\n- Step 3: This creates right skew (long tail toward larger x values). The mean will be less than the median, and more probability mass lies below the mean than above it.", "source": "MiniMax ②", "_id": "minimax_2_31"}, {"question": "Describe a real-world scenario where using the mean as a summary would be misleading, and what statistic is more appropriate. (3 steps)", "answer": "- Step 1: **Scenario**: a heavily right-skewed distribution — e.g., income, house prices, insurance claims — where a few very large values exist.\n- Step 2: **Problem with mean**: a handful of outliers pull the mean far from where most data sits. \"Average income\" suggests typical earnings are higher than reality for most people.\n- Step 3: **Alternatives**:\n+ **Median** (50th percentile): resistant to outliers; gives a better sense of typical experience.\n+ **IQR**: describes spread of the middle 50%, ignoring tails.\n\nRule of thumb: symmetric → mean and SD; skewed or outlier-prone → median and IQR.", "source": "Opus 4.7 ②", "_id": "opus_2_66"}, {"question": "What distinguishes a continuous random variable from a discrete one, and why does this force us to describe probabilities differently? (3 steps)", "answer": "- Step 1: A discrete r.v. takes values from a countable set (like the integers), so we can list each value $$x$$ with its probability $$P(X=x)$$ in a table, and every probability is positive.\n- Step 2: A continuous r.v. can take any value in an interval of the real line — uncountably many values with no gaps. Because we cannot list uncountably many values with positive probabilities that still sum to 1, we are forced to conclude $$P(X=x)=0$$ for every single exact value.\n- Step 3: Instead of pointwise probabilities, we describe continuous distributions via a **probability density function** $$f(x)$$, where probabilities are obtained as *areas under the curve*: $$P(a<X<b) = \\int_a^b f(x)\\,dx$$.\n\nDiscrete = \"dots with weights\"; continuous = \"curves whose area gives probability\".", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "For $$f(x) = k(4x - x^3)$$ on $$[0,2]$$, walk through the full workflow: check validity, find $$k$$, mode, $$F$$, and median. (5 steps)", "answer": "- Step 1: **Non-negativity**: $$4x - x^3 = x(4-x^2) = x(2-x)(2+x)$$. On $$[0,2]$$, all three factors are $$\\geq 0$$ ✓.\n- Step 2: **Find $$k$$**: $$\\int_0^2(4x-x^3)\\,dx = [2x^2 - x^4/4]_0^2 = 8 - 4 = 4$$. So $$k = 1/4$$.\n- Step 3: **Mode**: $$f'(x) = k(4 - 3x^2) = 0 \\Rightarrow x = 2/\\sqrt{3} \\approx 1.15$$. Second derivative $$-6kx < 0$$, so it's a max. **Mode = $$2/\\sqrt 3$$**.\n- Step 4: **C.d.f.**: $$F(x) = \\tfrac{1}{4}[2t^2 - t^4/4]_0^x = x^2/2 - x^4/16$$ on $$[0,2]$$.\n- Step 5: **Median**: $$m^2/2 - m^4/16 = 0.5 \\Rightarrow m^4 - 8m^2 + 8 = 0$$. Quadratic in $$m^2$$: $$m^2 = 4 - 2\\sqrt{2} \\approx 1.17$$. So $$m \\approx 1.08$$.\n\nNote: mode ≈ 1.15 > median ≈ 1.08, indicating slight left skew.", "source": "Opus 4.7 ①", "_id": "opus_1_84"}, {"question": "A continuous random variable $$X$$ has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} k & 0 \\leq x < 2 \\\\ k(2x - 3) & 2 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise}\\end{cases}$$. At $$x = 2$$, the p.d.f. jumps from $$k$$ to $$k(1) = k$$, and at $$x = 2.5$$, $$\\mathrm{f}(2.5) = k(2) = 2k$$. At what value of $$x$$ does the p.d.f. reach zero again within $$[2, 3]$$? (2 steps)", "answer": "- Step 1: On the interval $$[2, 3]$$, the p.d.f. is $$k(2x - 3)$$. Set this to zero: $$2x - 3 = 0$$, so $$x = 1.5$$. But $$x = 1.5$$ is *not* in the interval $$[2, 3]$$ — it's below the lower bound.\n- Step 2: At $$x = 2$$: $$\\mathrm{f}(2) = k(4-3) = k > 0$$. At $$x = 3$$: $$\\mathrm{f}(3) = k(6-3) = 3k > 0$$. The function $$k(2x-3)$$ is increasing on $$[2, 3]$$ (slope is $$2k > 0$$) and stays positive throughout. The p.d.f. never reaches zero within $$[2, 3]$$ — it is positive on the entire interval, reaching its maximum of $$3k$$ at $$x = 3$$.\n\nAlways check the sign of the p.d.f. within its stated domain, especially for linear functions that might cross zero inside the interval.", "source": "GLM 5.1 ②", "_id": "glm_2_50"}, {"question": "Define $$E(X)$$ for a continuous random variable, and explain why this formula is the \"right\" one for the mean. (3 steps)", "answer": "- Step 1: $$E(X) = \\int_{-\\infty}^{\\infty} x\\,f(x)\\,dx$$.\n- Step 2: For a discrete r.v., $$E(X) = \\sum x\\,P(X=x)$$ — each value weighted by its probability. The continuous version replaces the sum with an integral (summing over a continuum) and $$P(X=x)$$ with the *probability element* $$f(x)\\,dx$$.\n- Step 3: Intuitively, $$E(X)$$ is the *balance point* (centre of mass) of the p.d.f. If you treated $$f(x)$$ as a mass density along the number line, $$E(X)$$ is where the distribution balances on a fulcrum.\n\nNot arbitrary — the continuous version of \"weighted average\", with density replacing probability.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "Why is the p.d.f. $$f(x)$$ called a *density*, and why is it wrong to think of $$f(a)$$ as \"the probability that $$X = a$$\"? (3 steps)", "answer": "- Step 1: The name is by analogy with mass density in physics. Mass density $$\\rho(x)$$ is not \"mass at point $$x$$\" (which is 0), but mass *per unit length* around $$x$$. Total mass $$= \\int \\rho\\,dx$$.\n- Step 2: Similarly $$f(x)$$ is *probability per unit $$x$$*. You can read it as: $$P(x < X < x+dx) \\approx f(x)\\,dx$$. So $$f(x)$$ tells you how *concentrated* probability is near $$x$$, not the probability at $$x$$.\n- Step 3: Because $$f(x)$$ is a density — not a probability — it is NOT required to be $$\\leq 1$$. Example: uniform on $$[0, 0.1]$$ has $$f(x)=10$$. The concentration per unit length can exceed 1, as long as the total area is 1.\n\nMental model: height of the curve = how densely probability is packed there.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "How does the cumulative distribution function (cdf) $ F(x) $ relate to the pdf $ f(x) $? (2 steps)", "answer": "- Step 1: By definition, $ F(x) = P(X \\leq x) = \\int_{-\\infty}^{x} f(t) dt $.  \n- Step 2: The cdf is the integral of the pdf up to $ x $, and $ f(x) = \\frac{d}{dx} F(x) $ by the Fundamental Theorem of Calculus.", "source": "Qwen 3 ①", "_id": "qwen_1_3"}, {"question": "Why is it sometimes said that the c.d.f. contains \"all the information\" about a distribution? (3 steps)", "answer": "- Step 1: The c.d.f. $$F$$ determines the p.d.f. via $$f = F'$$. So knowing $$F$$ gives you $$f$$.\n- Step 2: From $$F$$ (or $$f$$), you can compute:\n+ Any probability: $$\\mathrm{P}(a < X < b) = F(b) - F(a)$$.\n+ Any moment: $$\\mathrm{E}(X^n) = \\int x^n f(x)\\,dx$$.\n+ Any percentile: solve $$F(x) = p$$.\n+ Mode, median, variance, etc.\n- Step 3: Conversely, two distributions with different $$F$$s are different distributions. So the c.d.f. is a complete summary.\n\nThe p.d.f. (when it exists) is equally informative, since they're related by differentiation/integration. Either fully characterises the distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_92"}, {"question": "When is it faster to compute $$F$$ first vs solve for the median directly? (3 steps)", "answer": "- Step 1: **Find $$F$$ first** if: you'll also need other quantities (quartiles, percentiles, probabilities), or $$f$$ is easy to integrate once-for-all.\n- Step 2: **Integrate directly** for the median if: you only need the median, and $$f$$ is simple enough that $$\\int_{-\\infty}^m f\\,dx = 0.5$$ is quickly solvable — essentially the same work, just without writing out the full $$F$$ definition.\n- Step 3: In exams, if multiple quantities are asked of one distribution, computing $$F$$ upfront is strategic. Solo-quantile questions go either way.", "source": "Opus 4.7 ①", "_id": "opus_1_77"}, {"question": "Can a p.d.f. take values greater than 1? If so, explain why this doesn't violate any probability axiom. (3 steps)", "answer": "- Step 1: Yes. Example: uniform on $$[0, 0.5]$$ has $$f(x) = 2$$ on that interval. The value 2 exceeds 1.\n- Step 2: No axiom is violated because $$f(x)$$ is a *density*, not a probability. Probabilities must lie in $$[0,1]$$; densities can be any non-negative real number.\n- Step 3: What *is* constrained is the *area*: $$\\int_0^{0.5} 2\\,dx = 1$$. And any sub-interval gives a probability in $$[0,1]$$: e.g. $$P(0<X<0.1) = 0.2 \\leq 1$$.\n\nKey insight: $$f(x)$$ can be arbitrarily large, as long as its support is narrow enough that the total area remains 1.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "How do you compute $$\\mathrm{E}(X)$$ and $$\\mathrm{Var}(X)$$ when the PDF is piecewise (defined differently on different intervals)? Walk through the principle. (3 steps)", "answer": "- Step 1: Split the integral at the boundaries. For $$\\mathrm{E}(X) = \\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$, if $$\\mathrm{f}(x)$$ has different formulas on $$[a, c]$$ and $$[c, b]$$, write: $$\\mathrm{E}(X) = \\int_a^c x\\,\\mathrm{f}_1(x)\\,\\mathrm{d}x + \\int_c^b x\\,\\mathrm{f}_2(x)\\,\\mathrm{d}x$$.\n- Step 2: Do the same for $$\\mathrm{E}(X^2) = \\int x^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$, splitting at the same boundaries: $$\\mathrm{E}(X^2) = \\int_a^c x^2\\,\\mathrm{f}_1(x)\\,\\mathrm{d}x + \\int_c^b x^2\\,\\mathrm{f}_2(x)\\,\\mathrm{d}x$$.\n- Step 3: Then compute $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2$$ using the results from Steps 1 and 2.\n\nEach piece must be integrated separately with its own formula for $$\\mathrm{f}(x)$$ — you cannot combine them into one integral with a single integrand.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "Why is the c.d.f. of a continuous random variable always continuous, even though the p.d.f. can have jumps?", "answer": "$$F(x) = \\int_{-\\infty}^x f(t)\\,dt$$ is an integral of a bounded function. Integrals of bounded functions are continuous — small changes in the upper limit produce small changes in the integral. Quantitatively, $$F(x+\\Delta) - F(x) = \\int_x^{x+\\Delta} f\\,dt \\leq \\Delta \\cdot \\max_t f(t)$$, which shrinks to 0 as $$\\Delta \\to 0$$. So $$F$$ cannot jump.\n\nHowever, $$F$$ need not be *differentiable* everywhere: at a jump in $$f$$, $$F$$ has a corner (different left and right slopes). Corner yes, jump no.\n\nContrast: discrete r.v.s have c.d.f.s with jumps at each value $$x$$ where $$P(X = x) > 0$$. Continuity of $$F$$ is a defining feature of continuous distributions.", "source": "Opus 4.7 ①", "_id": "opus_1_85"}, {"question": "Prove that $$\\mathrm{Var}(aX + b) = a^2 \\mathrm{Var}(X)$$, and explain why the constant $$b$$ disappears. (4 steps)", "answer": "- Step 1: Let $$Y = aX + b$$. Then $$\\mathrm{E}(Y) = a\\mathrm{E}(X) + b = a\\mu + b$$.\n- Step 2: Apply the definition: $$\\mathrm{Var}(Y) = \\mathrm{E}((Y - \\mathrm{E}(Y))^2)$$.\n- Step 3: Substitute: $$Y - \\mathrm{E}(Y) = (aX + b) - (a\\mu + b) = a(X - \\mu)$$. So $$(Y - \\mathrm{E}(Y))^2 = a^2(X - \\mu)^2$$.\n- Step 4: Take expectation: $$\\mathrm{Var}(Y) = \\mathrm{E}(a^2(X-\\mu)^2) = a^2 \\mathrm{E}((X-\\mu)^2) = a^2 \\mathrm{Var}(X)$$.\n\nWhy $$b$$ disappears: adding a constant shifts the whole distribution but doesn't change its *spread*. Variance measures spread, so it's shift-invariant. Scaling by $$a$$ stretches/squashes the spread, so variance scales by $$a^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "For the c.d.f. $$F(x) = x^n$$ on $$[0,1]$$ (zero before, one after), find general formulas for mode, median, mean — and how they change as $$n$$ increases. (4 steps)", "answer": "- Step 1: P.d.f.: $$f(x) = F'(x) = nx^{n-1}$$ on $$[0,1]$$, strictly increasing for $$n \\geq 1$$.\n- Step 2: **Mode**: since $$f$$ is increasing, mode is at right boundary $$x = 1$$. Independent of $$n$$.\n- Step 3: **Median**: solve $$m^n = 0.5$$, giving $$m = 2^{-1/n}$$. As $$n \\to \\infty$$, $$m \\to 1$$.\n- Step 4: **Mean**: $$E(X) = \\int_0^1 x \\cdot n x^{n-1}\\,dx = n/(n+1)$$. As $$n \\to \\infty$$, $$E(X) \\to 1$$.\n\nAs $$n$$ grows, density concentrates ever more at $$x = 1$$ — all three centre-measures approach 1. Mode jumps there immediately; mean and median approach gradually.", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "What does the statement \"for continuous RVs, $$F$$ must be continuous\" really mean, and what distinguishes this from the discrete case? (3 steps)", "answer": "- Step 1: \"$$F$$ continuous\" means no vertical jumps — $$F$$ rises smoothly as $$x$$ increases.\n- Step 2: For a discrete RV, $$F$$ is a **step function** with jumps at each mass point. Jump size at $$x = c$$ equals $$\\mathrm{P}(X = c)$$.\n- Step 3: Between jumps, the discrete $$F$$ is flat (no mass). For continuous RVs, there are no jumps (all $$\\mathrm{P}(X = c) = 0$$), and $$F$$ is rising or flat (never jumping).\n+ Rising = probability accumulating (where $$f > 0$$).\n+ Flat = no probability there (where $$f = 0$$).\n\nThis is the geometric fingerprint distinguishing continuous from discrete.", "source": "Opus 4.7 ②", "_id": "opus_2_99"}, {"question": "Synthesis: outline the full workflow for computing all standard quantities from an arbitrary p.d.f. on $$[a,b]$$. (5 steps)", "answer": "- Step 1: **Normalise** — verify $$\\int_a^b f = 1$$ or find $$k$$.\n- Step 2: **Find $$F(x)$$** — integrate $$f$$. Define fully: 0 before $$a$$, 1 after $$b$$. Reusable tool for later.\n- Step 3: **Mean**: $$E(X) = \\int_a^b xf\\,dx$$. Use symmetry if available to skip calculation.\n- Step 4: **Variance**: $$E(X^2) = \\int_a^b x^2 f\\,dx$$, then $$\\text{Var}(X) = E(X^2) - (E(X))^2$$. Take $$\\sigma = \\sqrt{\\text{Var}}$$ for SD.\n- Step 5: **Quantiles**: median solves $$F(m) = 0.5$$; quartiles $$F = 0.25, 0.75$$; percentiles $$F = n/100$$. **Mode**: solve $$f'(x) = 0$$ or check boundaries/sketch.\n\nAll reduces to integration and equation-solving. $$F$$ is the MVP.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "What happens to the c.d.f. $$F$$ at values of $$x$$ where the p.d.f. is zero but still \"inside\" the stated support? (3 steps)", "answer": "- Step 1: If $$f(x) = 0$$ on some sub-interval $$[c,d]$$, then $$F'(x) = 0$$ there — so $$F$$ is *flat* (constant) on $$[c,d]$$.\n- Step 2: No probability accumulates: $$P(c < X < d) = F(d) - F(c) = 0$$. The variable effectively skips that region.\n- Step 3: $$F$$ is still non-decreasing overall, but with a horizontal plateau wherever $$f$$ is zero.\n\nFlat sections of $$F$$ tell you exactly where $$f$$ has zero density.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Why is $$f(x) \\geq 0$$ a fundamental requirement for a probability density function, and what would go wrong if $$f$$ dipped below zero somewhere? (3 steps)", "answer": "- Step 1: The p.d.f. is not itself a probability — but the integral $$\\int_a^b f(x)\\,dx$$ must give a probability, which has to lie in $$[0, 1]$$.\n- Step 2: If $$f(x) < 0$$ on some interval, then $$\\mathrm{P}(X \\in \\text{that interval}) < 0$$ — a negative probability, which is meaningless.\n- Step 3: Even if the function's *total integral* equals 1, having a region where $$f < 0$$ would mean probability is \"cancelled out\" on some subinterval — there's no physical or mathematical interpretation. So $$f$$ must be non-negative everywhere.\n\nThis is why a function like $$f(x) = x^3 - 2$$ on $$[-1, 3]$$ cannot be a p.d.f. — it takes negative values near $$x = -1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Explain the difference between $$\\mathrm{E}(X + Y)$$ and $$\\mathrm{E}(X) + \\mathrm{E}(Y)$$, and between $$\\mathrm{Var}(X + Y)$$ and $$\\mathrm{Var}(X) + \\mathrm{Var}(Y)$$, for random variables $$X, Y$$. (3 steps)", "answer": "- Step 1: **Expectation**: $$\\mathrm{E}(X + Y) = \\mathrm{E}(X) + \\mathrm{E}(Y)$$ always, for any random variables (including dependent ones). This is called **linearity of expectation**.\n- Step 2: **Variance**: $$\\mathrm{Var}(X + Y) = \\mathrm{Var}(X) + \\mathrm{Var}(Y)$$ holds *only* when $$X, Y$$ are independent. Otherwise there's an additional covariance term: $$\\mathrm{Var}(X+Y) = \\mathrm{Var}(X) + \\mathrm{Var}(Y) + 2\\mathrm{Cov}(X, Y)$$.\n- Step 3: Contrast: expectation is always additive; variance is additive only under independence. This is why \"independence\" matters so much in statistical calculations — it makes variance easy.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "A p.d.f. has the form $$f(x) = k/x$$ on $$[1, 5]$$. Why does the normalisation integral involve a logarithm, and how does this determine $$k$$? (3 steps)", "answer": "- Step 1: Set $$\\int_1^5 \\frac{k}{x}\\,dx = 1$$.\n- Step 2: The antiderivative of $$1/x$$ is $$\\ln|x|$$, so $$k[\\ln x]_1^5 = k(\\ln 5 - \\ln 1) = k \\ln 5$$.\n- Step 3: Set $$k \\ln 5 = 1$$, giving $$k = 1/\\ln 5$$.\n\nWhenever $$f$$ contains $$1/x$$, expect logarithms in the c.d.f. and normalisation. Probabilities over intervals often have forms like $$\\frac{\\ln a}{\\ln b}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_69"}, {"question": "Given the c.d.f. $$F(x)$$, explain the general procedure for finding the 80th percentile. (3 steps)", "answer": "- Step 1: **Meaning**: the 80th percentile $$P_{80}$$ is the value below which 80% of probability lies.\n- Step 2: **Setup**: solve $$F(P_{80}) = 0.80$$ for the unknown.\n- Step 3: **Process**:\n+ Fo
