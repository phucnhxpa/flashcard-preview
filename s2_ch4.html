r piecewise $$F$$: first check boundary values to identify which piece contains $$P_{80}$$.\n+ Solve the equation within that piece.\n+ Discard any extraneous roots outside the support or wrong piece.\n\nAlso: $$P_{80}$$ is the \"upper 20% threshold\" — only 20% of values exceed it.", "source": "Opus 4.7 ②", "_id": "opus_2_60"}, {"question": "Explain why the result of finding $$\\mathrm{P}(X > \\mu)$$ is not always 0.5, even though $$\\mu$$ is the mean. (3 steps)", "answer": "- Step 1: The mean $$\\mu$$ is the balance point (centre of mass) of the distribution. Half the *probability* doesn't necessarily lie above/below it.\n- Step 2: The value that gives $$\\mathrm{P}(X > \\text{that value}) = 0.5$$ is the **median** — not the mean. Median balances *counts*; mean balances *mass*.\n- Step 3: For symmetric distributions, mean = median, so $$\\mathrm{P}(X > \\mu) = 0.5$$. But for skewed distributions:\n+ Right-skewed: mean > median, so $$\\mathrm{P}(X > \\mu) < 0.5$$ (long right tail pulls mean up beyond halfway point).\n+ Left-skewed: vice versa.\n\nLesson: always check whether you're asked about the mean or median — they're not interchangeable.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "A c.d.f. is $$F(x) = \\frac{1}{5}(16x - x^2 - 55)$$ on $$[5, 10]$$. How can you quickly spot that this cannot be a valid c.d.f.? (3 steps)", "answer": "- Step 1: Check monotonicity via the derivative: $$f(x) = F'(x) = \\frac{1}{5}(16 - 2x)$$.\n- Step 2: For $$f(x) \\geq 0$$: $$16 - 2x \\geq 0$$ ⟺ $$x \\leq 8$$. So on $$[8, 10]$$, $$f(x) < 0$$ — meaning $$F$$ is *decreasing* there.\n- Step 3: A c.d.f. that decreases implies negative probability for some interval — impossible. Hence invalid.\n\nSpecifically: $$\\mathrm{P}(8 < X < 10) = F(10) - F(8) < 0$$, a contradiction. Always check the p.d.f. you'd recover is non-negative.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "For an unbounded p.d.f. like $$f(t) = k/t^3$$ on $$[1, \\infty)$$, explain how to find $$k$$ and why improper integration is needed. (3 steps)", "answer": "- Step 1: Normalisation: $$\\int_1^\\infty k/t^3\\,dt = 1$$ — improper because the upper limit is infinite.\n- Step 2: $$\\int_1^\\infty t^{-3}\\,dt = [-1/(2t^2)]_1^\\infty = 0 - (-1/2) = 1/2$$. So $$k \\cdot 1/2 = 1 \\Rightarrow k = 2$$.\n- Step 3: Convergence depends on the power: $$\\int_1^\\infty t^{-p}\\,dt$$ converges iff $$p > 1$$. Here $$p = 3 > 1$$ ✓. If $$f \\propto 1/t$$ instead, the integral diverges — no valid p.d.f.\n\nOn an infinite support, $$f$$ must decay faster than $$1/t$$ for a valid distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "For a continuous random variable, if you randomly sample one value, what is the probability it falls within one standard deviation of the mean? Does the answer depend on the distribution? (2 steps)", "answer": "- Step 1: This is Chebyshev's inequality concept: For any distribution (discrete or continuous), P(|X - μ| < kσ) ≥ 1 - 1/k². For k = 1, this gives P(|X - μ| < σ) ≥ 0 — a trivial bound.\n- Step 2: For specific distributions, the probability varies. For normal distribution, approximately 68% falls within one standard deviation. For uniform, it's about 57%. For exponential, it's much lower. So yes, it heavily depends on the distribution.\n+ There's no universal \"68%\" rule for all continuous distributions — that's specific to normals.", "source": "MiniMax ②", "_id": "minimax_2_53"}, {"question": "A c.d.f. is defined piecewise: $$\\mathrm{F}(x) = \\begin{cases} 0 & x \\leq 1 \\\\ \\frac{1}{5}x - \\frac{1}{5} & 1 < x < 2 \\\\ \\frac{x^2}{10} - \\frac{x}{5} + \\frac{1}{5} & 2 \\leq x \\leq 4 \\\\ 1 & x > 4\\end{cases}$$. To find the lower quartile $$Q_1$$, how do you decide which piece of the c.d.f. to use? (3 steps)", "answer": "- Step 1: The lower quartile satisfies $$\\mathrm{F}(Q_1) = 0.25$$. First, evaluate the c.d.f. at the boundary points. At $$x = 2$$: $$\\mathrm{F}(2) = \\frac{2}{5} - \\frac{1}{5} = 0.2$$ (using the first non-trivial piece).\n- Step 2: Since $$\\mathrm{F}(2) = 0.2 < 0.25$$, and the c.d.f. is non-decreasing, the value 0.25 must be reached in the *next* piece (where $$2 \\leq x \\leq 4$$). We need $$\\mathrm{F}(Q_1) = 0.25$$ with $$Q_1 > 2$$.\n- Step 3: Set $$\\frac{Q_1^2}{10} - \\frac{Q_1}{5} + \\frac{1}{5} = 0.25$$ and solve. This gives $$Q_1^2 - 2Q_1 - 0.5 = 0$$, and using the quadratic formula, selecting the root in the interval $$(2, 4)$$.\n\nAlways check boundary values of the c.d.f. first to determine which piece contains the target probability (0.25, 0.5, 0.75, etc.). This avoids solving the wrong equation.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "The median of a continuous random variable $$X$$ with c.d.f. $$\\mathrm{F}(x)$$ is the value $$m$$ such that $$\\mathrm{F}(m) = 0.5$$. Explain what this means intuitively, and how you would find it. (2 steps)", "answer": "- Step 1: The median is the value that splits the distribution in half: there is a 50% probability of $$X$$ being below $$m$$ and a 50% probability of being above it. It is the \"middle value\" of the distribution in the probabilistic sense.\n- Step 2: To find it, set $$\\mathrm{F}(m) = 0.5$$ and solve for $$m$$. If you only have the p.d.f., first find the c.d.f. by integration, then solve. If the c.d.f. is piecewise, first check which piece contains the value 0.5 (by evaluating $$\\mathrm{F}$$ at the boundaries), then solve within that piece.\n\nThe median is more robust than the mean to outliers — it depends on the *position* of probability mass, not its magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "A p.d.f. is $$f(x) = \\frac{1}{x \\ln 5}$$ on $$[2, 10]$$. Where is the mode, and why? (3 steps)", "answer": "- Step 1: $$f(x) = \\frac{1}{x \\ln 5}$$ is strictly decreasing on $$[2, 10]$$ (as $$x$$ increases, $$1/x$$ decreases).\n- Step 2: The maximum of a strictly decreasing function on a closed interval is at the **left endpoint**: $$x = 2$$. So mode = 2.\n- Step 3: Value at mode: $$f(2) = \\frac{1}{2 \\ln 5} \\approx 0.311$$. The derivative test ($$f' = 0$$) is useless here since $$f' < 0$$ throughout.\n\nSketching $$1/x$$: the decreasing hyperbola immediately shows the mode at the left. Always think about monotonicity first.", "source": "Opus 4.7 ②", "_id": "opus_2_102"}, {"question": "A continuous random variable has p.d.f. f(x) = kx²e^(-x/2) for x ≥ 0. Without computing the integral, explain how you would find the mode. (2 steps)", "answer": "- Step 1: You would differentiate f(x) and set f'(x) = 0. The function x²e^(-x/2) has derivative: d/dx[x²e^(-x/2)] = 2xe^(-x/2) - (1/2)x²e^(-x/2) = xe^(-x/2)(2 - x/2).\n- Step 2: Setting this equal to zero: xe^(-x/2)(2 - x/2) = 0 gives solutions x = 0 or x = 4. The mode is at x = 4 (positive, and f'' < 0 there). At x = 0, f(0) = 0, so that's actually a minimum.\n+ For gamma-like distributions, the mode often occurs at (α-1)/β for f(x) ∝ x^(α-1)e^(-βx).", "source": "MiniMax ②", "_id": "minimax_2_58"}, {"question": "A function is proposed as a p.d.f.: $$\\mathrm{f}(x) = \\begin{cases} 2x+1 & 0 \\leq x \\leq 3 \\\\ 0 & \\text{otherwise}\\end{cases}$$. It satisfies $$\\mathrm{f}(x) \\geq 0$$ on its domain. Why is it still not a valid p.d.f.? (2 steps)", "answer": "- Step 1: We must check the second condition: the total area under the curve must equal 1. Computing: $$\\int_0^3 (2x+1)\\,\\mathrm{d}x = \\left[x^2 + x\\right]_0^3 = 9 + 3 = 12$$.\n- Step 2: The total area is 12, not 1. Since the area under the p.d.f. represents total probability, this would imply a total probability of 12 — impossible. Without a scaling constant $$k$$ to adjust it (which would require $$k = \\frac{1}{12}$$), this function as written is not a valid p.d.f.\n\nA p.d.f. must satisfy *both* conditions simultaneously: non-negativity everywhere AND total area exactly 1.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "For a piecewise p.d.f., how do you check whether it is *continuous* at the internal boundary, and does it matter if it isn't? (3 steps)", "answer": "- Step 1: At the boundary $$x = c$$, check whether the left formula and right formula give the same value: $$f(c^-) = f(c^+)$$? If yes, $$f$$ is continuous at $$c$$; if no, $$f$$ has a jump.\n- Step 2: A p.d.f. does *not* need to be continuous — only non-negative and integrating to 1. Jumps are allowed.\n- Step 3: What always matters is that $$F$$ (not $$f$$) be continuous. And $$f(c)$$ at any single point doesn't affect any probability (integrals ignore isolated points).\n\nIn exam contexts, pointwise value at boundaries is often irrelevant — focus on the integral.", "source": "Opus 4.7 ①", "_id": "opus_1_68"}, {"question": "For a uniform distribution with $$f(x) = k$$ on $$[0, L]$$, conceptually find $$k$$, $$E(X)$$, the median, the mode, and $$\\text{Var}(X)$$. (5 steps)", "answer": "- Step 1: **$$k$$**: total area $$= kL = 1$$, so $$k = 1/L$$.\n- Step 2: **$$E(X)$$**: uniform is symmetric about $$L/2$$, so $$E(X) = L/2$$.\n- Step 3: **Median**: by symmetry, also $$L/2$$.\n- Step 4: **Mode**: $$f$$ is constant — *every* point in $$[0,L]$$ is a mode (non-unique). This is the uniform's distinctive feature.\n- Step 5: **$$\\text{Var}(X)$$**: $$E(X^2) = \\int_0^L x^2(1/L)\\,dx = L^2/3$$. So $$\\text{Var}(X) = L^2/3 - (L/2)^2 = L^2/12$$.\n\nMemorable: uniform variance = (range)² / 12. This is the minimum-variance shape for a bounded support.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "The c.d.f. of $$X$$ is given as $$\\mathrm{F}(x) = \\begin{cases} 0 & x < 2 \\\\ \\frac{1}{6}x^p + q & 2 \\leq x \\leq 4 \\\\ 1 & x > 4\\end{cases}$$. How can you find the unknown constants $$p$$ and $$q$$? (3 steps)", "answer": "- Step 1: Use the boundary condition at the lower limit: $$\\mathrm{F}(2) = 0$$, since the c.d.f. must equal 0 at the start of the range. Substituting: $$\\frac{1}{6}(2^p) + q = 0$$, giving equation (1): $$\\frac{2^p}{6} + q = 0$$.\n- Step 2: Use the boundary condition at the upper limit: $$\\mathrm{F}(4) = 1$$, since the c.d.f. must equal 1 at the end of the range. Substituting: $$\\frac{1}{6}(4^p) + q = 1$$, giving equation (2): $$\\frac{4^p}{6} + q = 1$$.\n- Step 3: Subtract equation (1) from equation (2): $$\\frac{4^p - 2^p}{6} = 1$$, so $$4^p - 2^p = 6$$. Since $$4^p = (2^p)^2$$, let $$u = 2^p$$: then $$u^2 - u - 6 = 0$$, giving $$(u-3)(u+2) = 0$$, so $$u = 3$$ (rejecting $$u = -2$$). Thus $$2^p = 3$$, so $$p = \\log_2 3$$. From equation (1): $$q = -\\frac{3}{6} = -\\frac{1}{2}$$.\n\nThe two boundary conditions of any c.d.f. — $$\\mathrm{F}(a) = 0$$ and $$\\mathrm{F}(b) = 1$$ — are always your primary tools for finding unknown constants.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "For $$f(x) = k(4x - x^2)$$ on $$[2, 4]$$, explain the process (not the computation) for finding $$k$$. (3 steps)", "answer": "- Step 1: The normalisation condition $$\\int_2^4 f(x)\\,dx = 1$$ is a linear equation in $$k$$: $$k \\int_2^4 (4x-x^2)\\,dx = 1$$.\n- Step 2: Compute the unnormalised integral (a definite number, call it $$I$$). Then $$kI = 1$$, so $$k = 1/I$$.\n- Step 3: Conceptually, whatever shape $$4x-x^2$$ traces on $$[2,4]$$, we rescale it vertically so the area becomes exactly 1. The value of $$k$$ captures the ratio of \"target area 1\" to \"original area $$I$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "If a p.d.f. has a narrow, tall peak and symmetric heavy tails, how do variance and IQR compare? (3 steps)", "answer": "- Step 1: **Narrow peak**: most density is packed near the centre.\n- Step 2: **Heavy tails**: significant probability extends far from the centre, spread thinly. IQR captures only the middle 50% and is insensitive to this — IQR is small.\n- Step 3: Variance heavily penalises extremes (through squaring). Heavy tails inflate variance — potentially far more than IQR would suggest, and in extreme cases (e.g. Cauchy) variance is infinite while IQR stays finite.\n\nLesson: for heavy-tailed distributions, $$\\sigma$$ can mislead. IQR is more reliable as a \"typical scale\".", "source": "Opus 4.7 ①", "_id": "opus_1_73"}, {"question": "How do you find the mode when the p.d.f. is piecewise linear? For example, f(x) = k for 0 < x < 1, f(x) = k(x-1)² for 1 ≤ x < 2, f(x) = k(3-x) for 2 ≤ x < 3. (3 steps)", "answer": "- Step 1: For piecewise linear p.d.f.s, the maximum occurs either at a boundary between pieces or at an endpoint. Sketch the p.d.f. first.\n- Step 2: In this case, the first piece increases from 0 to k at x = 1. The second piece starts at k and increases (since (x-1)² increases from 0). The third piece decreases from k to 0.\n+ Looking at the sketch: f(x) increases on (0,1), continues increasing on (1,2), then decreases on (2,3). The maximum occurs at the boundary between pieces 2 and 3, at x = 2 (or possibly the entire interval [1,2] if it's flat).\n- Step 3: After finding k, you verify which x gives the maximum f(x) value.", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "Describe the conditions that a proposed c.d.f. must satisfy to represent a valid continuous random variable. (3 steps)", "answer": "- Step 1: **Boundary conditions**:\n+ $$F(x) \\to 0$$ as $$x \\to -\\infty$$ (or $$F = 0$$ at/below lower support).\n+ $$F(x) \\to 1$$ as $$x \\to \\infty$$ (or $$F = 1$$ at/above upper support).\n- Step 2: **Monotonicity**: $$F$$ must be non-decreasing — otherwise probabilities could be negative. Equivalent to $$f(x) = F'(x) \\geq 0$$.\n- Step 3: **Continuity**: For a continuous RV, $$F$$ must be continuous (no jumps). Jumps would indicate point masses, making the RV partially discrete.\n\nA c.d.f. violating any of these cannot represent a valid continuous distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "For a bimodal distribution (two peaks in the p.d.f.), what complications arise for mode, median, and mean? (3 steps)", "answer": "- Step 1: **Mode**: not unique — there are two (or more) local maxima. Typically we report the \"modes\" (plural) or the \"principal mode\" (highest peak). Some interval might even be \"as likely\" as another.\n- Step 2: **Median**: well-defined (the value at $$F = 0.5$$), but may fall in a \"valley\" between modes, where probability density is low. The median may be a poor summary of typical values in such cases.\n- Step 3: **Mean**: still well-defined as the centre of mass. But again may lie between the peaks, not close to either. The mean can be the most misleading single summary for bimodal distributions.\n\nBest approach for bimodal data: report both modes separately, or consider modelling as a mixture of two distributions.", "source": "Opus 4.7 ②", "_id": "opus_2_112"}, {"question": "What does the \"68-95-99.7 rule\" (probability within 1, 2, 3 SDs of the mean) apply to, and when does it fail? (3 steps)", "answer": "- Step 1: The rule — approximately 68%, 95%, 99.7% of probability within 1, 2, 3 SDs of the mean — is **exact** only for the normal distribution and approximately true for many symmetric, unimodal distributions.\n- Step 2: It fails or changes for:\n+ Heavy-tailed distributions: probabilities within 1 SD can be smaller.\n+ Skewed distributions: asymmetric around the mean.\n+ Bimodal distributions: different density structure.\n- Step 3: Universal guarantee (Chebyshev's inequality): $$\\mathrm{P}(|X - \\mu| < k\\sigma) \\geq 1 - 1/k^2$$. Weaker but distribution-free.\n\nDon't over-trust the 68-95-99.7 rule for arbitrary continuous distributions.", "source": "Opus 4.7 ②", "_id": "opus_2_71"}, {"question": "Derive the identity $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$ from the definition $$\\mathrm{Var}(X) = \\mathrm{E}((X-\\mu)^2)$$. (4 steps)", "answer": "- Step 1: Start from the definition: $$\\mathrm{Var}(X) = \\int (x-\\mu)^2 f(x)\\,dx$$.\n- Step 2: Expand the square: $$(x-\\mu)^2 = x^2 - 2\\mu x + \\mu^2$$.\n- Step 3: Split the integral using linearity:\n+ $$\\int x^2 f(x)\\,dx = \\mathrm{E}(X^2)$$\n+ $$\\int 2\\mu x f(x)\\,dx = 2\\mu \\int x f(x)\\,dx = 2\\mu \\cdot \\mu = 2\\mu^2$$\n+ $$\\int \\mu^2 f(x)\\,dx = \\mu^2 \\int f(x)\\,dx = \\mu^2 \\cdot 1 = \\mu^2$$\n- Step 4: Combine: $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - 2\\mu^2 + \\mu^2 = \\mathrm{E}(X^2) - \\mu^2$$.\n\nThe key tricks: $$\\int f(x)\\,dx = 1$$ and $$\\int x f(x)\\,dx = \\mu$$.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "What is the probability that a continuous random variable $$X$$ exactly equals its mean $$\\mu$$? (2 steps)", "answer": "- Step 1: For any continuous RV, $$\\mathrm{P}(X = c) = 0$$ for every specific value $$c$$. The mean $$\\mu$$ is just one particular real number.\n- Step 2: So $$\\mathrm{P}(X = \\mu) = 0$$. Unlike discrete RVs, where $$\\mathrm{P}(X = \\mu)$$ can be positive if $$\\mu$$ is in the sample space.\n\nIn continuous distributions, all probability is over intervals, not points — the mean is a descriptor, not an event.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "Interpret: what does a \"steep\" part of $$F(x)$$ mean about the p.d.f.? What about a \"flat\" part? (3 steps)", "answer": "- Step 1: Since $$f(x) = F'(x)$$, the slope of $$F$$ at $$x$$ equals the density $$f(x)$$.\n- Step 2: **Steep part of $$F$$**: $$f(x)$$ is large — high probability density, i.e., values near this $$x$$ are \"likely\".\n+ Steepest point = mode of $$f$$\n+ Corresponds to a peak or tall region of $$f$$\n- Step 3: **Flat part of $$F$$**: $$f(x) = 0$$ — no probability density. The variable essentially doesn't take values there.\n+ Outside support of $$f$$, $$F$$ is constant (0 or 1)\n+ Internal zeros of $$f$$ mean $$F$$ plateaus mid-graph\n\nShape of $$F$$ ↔ where probability is concentrated.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "For the uniform-like PDF $$\\mathrm{f}(x) = \\frac{1}{8}(x-2)$$ on $$[2, 6]$$, zero elsewhere: without full calculation, what can you say about the relative positions of the mean, median, and mode? (3 steps)", "answer": "- Step 1: The PDF is a straight line increasing from $$\\mathrm{f}(2) = 0$$ to $$\\mathrm{f}(6) = \\frac{1}{2}$$ — a triangle with its peak at $$x = 6$$. The **mode** is at the right boundary, $$x = 6$$, since that's where the density is highest.\n- Step 2: The distribution is **positively skewed** (all the density is pushed toward the right). The median will be to the right of the midpoint (4) but less than 6, since more area accumulates on the right side.\n- Step 3: The mean will also be pulled rightward but less extremely than the mode. The ordering will be: mean < median < mode, which is characteristic of negative skew... Wait — actually, the tail is on the LEFT here (the density ramps up from left to right, meaning there's a long low-density region on the left). This is actually **negatively skewed** in the conventional sense? Let me reconsider: the mass is concentrated on the right, so the mean is pulled right — mean > midpoint. Actually for this triangular distribution increasing from left to right, the mean = $$\\frac{2+6+6}{3} = \\frac{14}{3} \\approx 4.67$$, median ≈ 4.83, mode = 6. So: mean < median < mode — this is **negatively skewed** (tail on the left, mass on the right).\n\nFor a right-ramping triangle, the ordering is mean < median < mode — opposite to what many students expect.", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "Compute $$P(X > Q_1)$$ without first finding $$Q_1$$ explicitly. (2 steps)", "answer": "- Step 1: By definition, $$F(Q_1) = 0.25$$ — i.e., 25% of probability lies at or below $$Q_1$$.\n- Step 2: So $$P(X > Q_1) = 1 - F(Q_1) = 1 - 0.25 = 0.75$$.\n\nNo computation of $$Q_1$$ needed. Same logic: $$P(X > \\text{median}) = 0.5$$, $$P(X > P_n) = 1 - n/100$$. Often faster than computing the quantile itself.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "A p.d.f. $$f(x) = 2x$$ on $$[0, 1]$$. Without calculating, predict whether the mean is greater than, less than, or equal to 0.5. (2 steps)", "answer": "- Step 1: The p.d.f. $$f(x) = 2x$$ is linearly increasing. More probability density is concentrated near $$x = 1$$ than near $$x = 0$$.\n- Step 2: Since more mass lies on the right, the balance point (mean) must be pulled toward larger $$x$$. So $$\\mathrm{E}(X) > 0.5$$.\n\nActual value (confirmation): $$\\mathrm{E}(X) = \\int_0^1 2x^2\\,dx = 2/3 \\approx 0.67$$. Consistent with the prediction.\n\nIntuition: the mean is the \"balance point\" of the density profile. Shifts in mass shift the balance.", "source": "Opus 4.7 ②", "_id": "opus_2_74"}, {"question": "The c.d.f. of $$X$$ is $$\\mathrm{F}(x) = 2x^2 - x^3$$ on $$[0, 1]$$. To find the median, you set $$2m^2 - m^3 = 0.5$$, giving $$m^3 - 2m^2 + 0.5 = 0$$. This cubic can't be easily factored. How would you find the median in an exam? (2 steps)", "answer": "- Step 1: Use a numerical method. The simplest approach is **trial and improvement**: test values in $$[0, 1]$$. $$\\mathrm{F}(0.5) = 2(0.25) - 0.125 = 0.375 < 0.5$$. $$\\mathrm{F}(0.6) = 2(0.36) - 0.216 = 0.504 > 0.5$$. So the median is between 0.5 and 0.6.\n- Step 2: Continue refining: $$\\mathrm{F}(0.59) = 2(0.3481) - 0.2054 = 0.4908 < 0.5$$ and $$\\mathrm{F}(0.60) = 0.504 > 0.5$$. So the median lies between 0.59 and 0.60. If asked to show the median lies between two values, just demonstrate that $$\\mathrm{F}$$ crosses 0.5 between them.\n\nIn exams, you're often asked to \"show the median lies between $$a$$ and $$b$$\" — just verify $$\\mathrm{F}(a) < 0.5 < \\mathrm{F}(b)$$ (or vice versa). You rarely need to solve the equation exactly.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "The continuous random variable $$X$$ has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} \\frac{1}{5} & 1 < x < 2 \\\\ \\frac{1}{5}(x-1) & 2 \\leq x \\leq 4 \\\\ 0 & \\text{otherwise}\\end{cases}$$. To find $$\\mathrm{P}(X > 3)$$, you could integrate or use geometry. Why can geometry work here, and what area are you finding? (2 steps)", "answer": "- Step 1: The p.d.f. consists of straight-line segments (a flat section and a linear section), so the region under the curve is made of simple geometric shapes — rectangles, triangles, and trapezia. The probability is the area of the region under $$\\mathrm{f}(x)$$ between $$x = 3$$ and $$x = 4$$.\n- Step 2: At $$x = 3$$, $$\\mathrm{f}(3) = \\frac{1}{5}(3-1) = \\frac{2}{5}$$; at $$x = 4$$, $$\\mathrm{f}(4) = \\frac{1}{5}(4-1) = \\frac{3}{5}$$. The region is a trapezium with parallel sides $$\\frac{2}{5}$$ and $$\\frac{3}{5}$$, and width 1. Its area is $$\\frac{1}{2}\\left(\\frac{2}{5} + \\frac{3}{5}\\right) \\times 1 = \\frac{1}{2}$$, so $$\\mathrm{P}(X > 3) = \\frac{1}{2}$$.\n\nGeometry is a useful shortcut when the p.d.f. is piecewise linear — it avoids integration entirely and can help you check your working.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "Why is standard deviation often preferred over variance as a measure of spread, even though variance has nicer mathematical properties? (3 steps)", "answer": "- Step 1: Variance is in *squared* units of $$X$$. If $$X$$ is metres, $$\\mathrm{Var}(X)$$ is in square metres — hard to interpret as a spread of the variable.\n- Step 2: Standard deviation is in the *same units* as $$X$$. If $$X$$ is metres, SD is metres. So it directly quantifies \"typical deviation from the mean\".\n- Step 3: Practical interpretation: for many well-behaved distributions, roughly 68% of probability lies within one SD of the mean. So SD is a useful rough \"error bar\".\n\nHowever: to compute SD you usually compute variance first. Variance is mathematically cleaner (e.g., it's additive for independent sums); SD is more interpretable.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "A continuous random variable X has p.d.f. f(x) = 3/8(1 + x²) for -1 ≤ x ≤ 1. What is special about its mode? How does this relate to the median? (2 steps)", "answer": "- Step 1: The p.d.f. f(x) = 3/8(1 + x²) is symmetric about x = 0 (an even function). It increases from x = -1 to x = 1, so there's no unique interior maximum — the function is largest at the boundary x = 1.\n- Step 2: Because the p.d.f. is symmetric, the median equals 0 (the axis of symmetry). The mode is at x = 1 (the endpoint where maximum occurs).\n+ This illustrates an important point: for a symmetric distribution, mean = median, but mode can be different (especially at boundaries).", "source": "MiniMax ②", "_id": "minimax_2_14"}, {"question": "Misconception: \"$$F(1) = 0.5$$ means the probability that $$X = 1$$ is 0.5\". What's wrong? (3 steps)", "answer": "- Step 1: $$F(1)$$ means $$P(X \\leq 1)$$, NOT $$P(X = 1)$$. These are fundamentally different: cumulative vs pointwise.\n- Step 2: For a continuous r.v., $$P(X = 1) = 0$$ — always. So $$F(1) = 0.5$$ tells you nothing about a point probability.\n- Step 3: What it *does* tell you: half the distribution lies at values $$\\leq 1$$, so 1 is the **median** of $$X$$.\n\n$$F(x)$$ = probability up to $$x$$; $$f(x)$$ = density at $$x$$. Neither is \"probability at $$x$$\" for continuous variables.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Why is the concept of a \"probability density function\" specific to continuous variables — why can't discrete ones use it? (3 steps)", "answer": "- Step 1: For discrete r.v.s, point probabilities $$P(X = x)$$ are positive and sum to 1. The probability mass function directly describes the distribution value-by-value.\n- Step 2: For continuous r.v.s, all point probabilities are zero, so a mass function would be \"all zeros\" — uninformative. We need a different object: density.\n- Step 3: Density = \"probability per unit length\", a *rate*. Integrating it over an interval recovers real probability. This rate-based formalism doesn't apply to discrete values (isolated points), which need direct probabilities.\n\nDifferent worlds, different tools: sums/masses for discrete; integrals/densities for continuous.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "Conceptually, why does it matter to \"fully specify\" the c.d.f. over all of $$\\mathbb{R}$$, not just where the p.d.f. is non-zero? (3 steps)", "answer": "- Step 1: The c.d.f. is a function of $$x \\in \\mathbb{R}$$, not just over the support. For any real $$x$$, we want to ask \"what's the probability $$X \\leq x$$?\".\n- Step 2: For $$x$$ below the support: $$X$$ can never be there, so $$F(x) = 0$$. For $$x$$ above the support: $$X$$ is certainly there (or already past), so $$F(x) = 1$$.\n- Step 3: Omitting these regions gives an incomplete function. In exam work, \"fully specify $$F(x)$$\" means all three branches:\n+ $$F(x) = 0$$ below lower support\n+ Formula on the support\n+ $$F(x) = 1$$ above upper support\n\nWithout all three, the c.d.f. isn't \"fully specified\" and you lose marks.", "source": "Opus 4.7 ②", "_id": "opus_2_106"}, {"question": "Prove the memoryless property of the exponential distribution: $$P(X > a+b \\mid X > a) = P(X > b)$$. (3 steps)", "answer": "- Step 1: For $$f(x) = \\lambda e^{-\\lambda x}$$ on $$x \\geq 0$$: $$P(X > a) = 1 - F(a) = e^{-\\lambda a}$$.\n- Step 2: Since $$\\{X > a+b\\} \\subset \\{X > a\\}$$ (for $$b > 0$$), $$P(X > a+b \\cap X > a) = P(X > a+b) = e^{-\\lambda(a+b)}$$. By Bayes: \n$$P(X>a+b\\mid X>a) = \\dfrac{e^{-\\lambda(a+b)}}{e^{-\\lambda a}} = e^{-\\lambda b}.$$\n- Step 3: And $$e^{-\\lambda b} = P(X > b)$$. So the conditional survival probability equals the unconditional one — memoryless ✓.\n\nInterpretation: conditional on surviving past $$a$$, the remaining wait is distributed identically to a fresh wait. Exponential is the *only* continuous distribution with this property.", "source": "Opus 4.7 ①", "_id": "opus_1_80"}, {"question": "A student argues: \"$$E(X)$$ is a number, so $$E(X^2) = E(X) \\cdot E(X)$$.\" What's the flaw? (3 steps)", "answer": "- Step 1: The flaw is confusing $$E(X \\cdot X) = E(X^2)$$ with $$E(X) \\cdot E(X) = (E(X))^2$$.\n- Step 2: Expectation is linear but **not multiplicative** in general: $$E(XY) \\neq E(X)E(Y)$$ unless $$X$$ and $$Y$$ are independent. But $$X$$ is certainly not independent of itself (it's perfectly correlated with itself).\n- Step 3: Concrete example: $$X$$ takes values 1 or 3 with equal probability. $$E(X) = 2$$, $$(E(X))^2 = 4$$. But $$E(X^2) = (1+9)/2 = 5 \\neq 4$$. The difference, 1, is exactly $$\\text{Var}(X)$$.\n\nLinearity ≠ multiplicativity. Expectations of products require independence to factor.", "source": "Opus 4.7 ①", "_id": "opus_1_87"}, {"question": "For $$P(2 < X < 4)$$ with $$f(x) = 1/(x\\ln 5)$$ on $$[1,5]$$, the answer has the form $$\\dfrac{\\ln a}{\\ln b}$$. Explain what $$a, b$$ are and why this form makes sense. (3 steps)", "answer": "- Step 1: $$P(2 < X < 4) = \\int_2^4 \\dfrac{1}{x\\ln 5}\\,dx = \\dfrac{\\ln 4 - \\ln 2}{\\ln 5}$$.\n- Step 2: By log rules, $$\\ln 4 - \\ln 2 = \\ln(4/2) = \\ln 2$$. So probability $$= \\dfrac{\\ln 2}{\\ln 5}$$ with $$a = 2$$, $$b = 5$$.\n- Step 3: Conceptually, the $$1/x$$ density gives each \"interval of equal log-width\" equal probability. $$[2,4]$$ has log-width $$\\ln 2$$; $$[1,5]$$ has log-width $$\\ln 5$$. The ratio $$\\ln 2 / \\ln 5$$ is exactly right.\n\nCharacteristic of logarithmic (Benford) distributions.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Explain why $$\\mathrm{E}(X^2) \\geq [\\mathrm{E}(X)]^2$$ always holds for any random variable. What does this imply about variance? (3 steps)", "answer": "- Step 1: By definition, $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2$$. Since variance is the average of squared deviations and squared quantities are always non-negative, $$\\mathrm{Var}(X) \\geq 0$$.\n- Step 2: Therefore $$\\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2 \\geq 0$$, which rearranges to $$\\mathrm{E}(X^2) \\geq [\\mathrm{E}(X)]^2$$.\n- Step 3: Equality holds only when $$\\mathrm{Var}(X) = 0$$, meaning $$X$$ is a constant (no variability at all). For any non-degenerate random variable, $$\\mathrm{E}(X^2)$$ is strictly greater than $$[\\mathrm{E}(X)]^2$$.\n\nThis is why $$\\mathrm{E}(X^3) > [\\mathrm{E}(X)]^3$$ for distributions with positive skew and positive mean — the inequality compounds through higher powers.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "What visual intuition connects the PDF and CDF? Describe how the graphs relate to each other. (3 steps)", "answer": "- Step 1: The PDF $$\\mathrm{f}(x)$$ is a curve whose height represents probability *density* — how \"concentrated\" probability is at each point. Areas under this curve give probabilities for intervals.\n- Step 2: The CDF $$\\mathrm{F}(x)$$ is the *running total* of area under the PDF from the left. At any point $$x$$, $$\\mathrm{F}(x)$$ equals the shaded area under $$\\mathrm{f}(x)$$ from the far left up to $$x$$. As you move right, the CDF climbs (accumulating area) until it reaches 1.\n- Step 3: Where the PDF is tall (high density), the CDF climbs steeply (rapid accumulation). Where the PDF is flat or zero, the CDF is flat (no accumulation). The CDF's slope at any point equals the PDF's height: $$\\mathrm{f}(x) = \\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{F}(x)$$.\n\nThink of the PDF as the \"speed\" of probability accumulation and the CDF as the \"distance traveled\" — they are related by differentiation/integration just like speed and distance.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "Compare qualitatively: uniform $$f_1 = \\tfrac{1}{2}$$ on $$[0,2]$$ vs triangular-rising $$f_2(x) = \\tfrac{1}{2}x$$ on $$[0,2]$$. How do their means, variances, and modes differ? (3 steps)", "answer": "- Step 1: **Means**: Uniform is symmetric about 1, so $$E_1 = 1$$. Triangular skews probability rightward (higher density near 2), so $$E_2 > 1$$ — in fact $$E_2 = 4/3$$. Mean is pulled toward higher-density region.\n- Step 2: **Variances**: Uniform: $$L^2/12 = 4/12 = 1/3$$. Triangular's probability is concentrated near 2, giving smaller spread about its (right-shifted) mean. Triangular variance is $$2/9 < 1/3$$.\n- Step 3: **Modes**: Uniform: non-unique (all points equally dense). Triangular: $$x = 2$$ (right boundary, where density is highest).\n\nReshaping the p.d.f. (even on the same support) moves the mean, alters variance, and can pin down a unique mode.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Is it true that the mode of a continuous distribution must lie near the \"middle\" of the support? Explain. (3 steps)", "answer": "- Step 1: No — the mode can be anywhere: at the centre, at an endpoint, or off-centre. The mode is wherever $$f$$ is largest; it has no requirement to be geometrically central.\n- Step 2: Examples:\n+ For $$f(y) = 2y$$ on $$[0,1]$$: mode at $$y = 1$$ (right endpoint).\n+ For $$f(x) = 12x^2(1-x)$$ on $$[0,1]$$: mode at $$x = 2/3$$ (not at midpoint $$1/2$$).\n+ For a symmetric bell-shape: mode at the centre.\n- Step 3: Mode, mean, and median are three distinct measures of location. For non-symmetric distributions, they can be far apart. The mode tells you where density peaks; it doesn't indicate balance or a halfway point.\n\nAlways let the graph of $$f$$ — not intuition about \"middle\" — determine the mode.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Given $$f(x) = 2x$$ on $$[0,1]$$, compute $$E(\\ln X)$$ and interpret the result. (4 steps)", "answer": "- Step 1: $$E(\\ln X) = \\int_0^1 \\ln x \\cdot 2x\\,dx = 2\\int_0^1 x\\ln x\\,dx$$.\n- Step 2: By parts, with $$u = \\ln x$$, $$dv = x\\,dx$$: $$\\int x\\ln x\\,dx = \\tfrac{x^2}{2}\\ln x - \\tfrac{x^2}{4}$$.\n- Step 3: Evaluate 0 to 1. At $$x=1$$: $$0 - 1/4 = -1/4$$. At $$x\\to 0^+$$: both terms $$\\to 0$$ (since $$x^2\\ln x \\to 0$$ faster than $$\\ln x \\to -\\infty$$). Integral $$= -1/4$$.\n- Step 4: $$E(\\ln X) = 2(-1/4) = -1/2$$.\n\nSince $$X \\in (0,1)$$ means $$\\ln X < 0$$, a negative answer is expected. Negative $$E(\\ln X)$$ is characteristic of distributions supported below 1.", "source": "Opus 4.7 ①", "_id": "opus_1_62"}, {"question": "A student computes $$\\mathrm{E}(X)$$ for a piecewise PDF and gets a value outside the range of $$X$$. Is this possible? What does it tell you? (2 steps)", "answer": "- Step 1: No, this is impossible for a valid PDF. The mean $$\\mathrm{E}(X) = \\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$ is a weighted average of values of $$X$$, with weights given by the PDF. Since all values of $$X$$ lie within its range, and the weights are non-negative and sum to 1, the weighted average must also lie within the range.\n- Step 2: If you compute a mean outside the range, you've made an error — likely a calculation mistake in the integration, or you've used the wrong limits, or the function isn't actually a valid PDF.\n\nThe mean is always between the minimum and maximum possible values of $$X$$ — this is a useful sanity check.", "source": "GLM 5.1 ①", "_id": "glm_1_36"}, {"question": "Why is it often more informative to report median and IQR than mean and variance for real-world distributions? (3 steps)", "answer": "- Step 1: **Mean** is sensitive to extremes — a single huge outlier can shift it dramatically. For skewed or outlier-prone data, mean misleads about the \"typical\" value.\n- Step 2: **Median** is robust — it's the middle value, unaffected by extreme magnitudes (only positions relative to it). It always exists and is finite, even for heavy-tailed distributions with no finite mean.\n- Step 3: **Variance** is doubly sensitive to outliers (squaring); **IQR** ignores the outer 50% and is robust. Together, median + IQR give a robust centre-and-spread summary.\n\nPractical: income data, rainfall, waiting times — often reported as median/IQR, not mean/SD.", "source": "Opus 4.7 ①", "_id": "opus_1_82"}, {"question": "A continuous random variable $$X$$ has p.d.f. $$\\mathrm{f}(x) = \\begin{cases} kx^2(2-x) & 0 \\leq x \\leq 2 \\\\ 0 & \\text{otherwise}\\end{cases}$$. Explain why $$\\mathrm{P}(0 < X < 1)$$ must be less than 0.5, just by reasoning about the shape of the p.d.f., without computing the exact probability. (2 steps)", "answer": "- Step 1: The factor $$x^2$$ is 0 at $$x = 0$$ and increases, while $$(2-x)$$ is 2 at $$x = 0$$ and decreases to 0 at $$x = 2$$. The product $$x^2(2-x)$$ starts at 0, rises to a peak, then falls back to 0. The peak (mode) occurs where the derivative is zero: $$\\frac{\\mathrm{d}}{\\mathrm{d}x}[x^2(2-x)] = 4x - 3x^2 = x(4-3x) = 0$$, giving $$x = \\frac{4}{3} \\approx 1.33$$.\n- Step 2: Since the mode is at $$x = \\frac{4}{3} > 1$$, the p.d.f. is still increasing on $$[0, 1]$$. The area under the curve from 0 to 1 (where the function is lower and rising) is less than the area from 1 to 2 (where the function reaches its peak and then falls). More than half the total area lies to the right of $$x = 1$$, so $$\\mathrm{P}(0 < X < 1) < 0.5$$.\n\nQualitative reasoning about the shape of the p.d.f. (where is it rising? where is the peak?) can give you directional answers without any computation.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "Can the p.d.f. and c.d.f. ever have the same value at some point? Give an example and comment on the meaning. (3 steps)", "answer": "- Step 1: Yes. Example: uniform on $$[0,1]$$: $$f(x) = 1$$ (constant), $$F(x) = x$$. They're equal at $$x = 1$$ (both equal 1).\n- Step 2: In general, since $$F$$ climbs from 0 to 1 and $$f$$ is continuous, they can meet at isolated points by the intermediate value theorem — if the starting values differ.\n- Step 3: This equality has **no special meaning** — $$f$$ and $$F$$ are different kinds of objects (density vs cumulative probability). Comparing their numerical values is a curiosity; the meaningful relationship is $$F' = f$$.\n\nDon't over-interpret isolated pointwise equalities.", "source": "Opus 4.7 ①", "_id": "opus_1_76"}, {"question": "Why is the p.d.f. of a continuous random variable often zero outside a bounded interval, and when would it not be? (3 steps)", "answer": "- Step 1: Many real-world quantities are bounded: time durations are non-negative; angles lie in $$[0, 2\\pi]$$; proportions in $$[0, 1]$$. The p.d.f. naturally has bounded support.\n- Step 2: Some distributions have **unbounded** support:\n+ Exponential: $$[0, \\infty)$$.\n+ Normal: $$(-\\infty, \\infty)$$.\n+ Lifetimes, errors, waiting times.\n- Step 3: For unbounded support, the p.d.f. must **decay** fast enough for the integral to converge to 1. Exponential decay ($$e^{-\\lambda x}$$) and Gaussian decay ($$e^{-x^2/2}$$) ensure finite probability.\n\nBounded support = RV can't exceed certain limits; unbounded = possible but very unlikely at extremes.", "source": "Opus 4.7 ②", "_id": "opus_2_70"}, {"question": "Give an example of a p.d.f. for which the mean, median, and mode are all equal, and another where they're all different. (3 steps)", "answer": "- Step 1: **All equal**: symmetric unimodal distributions. E.g., $$f(x) = \\frac{3}{4}(1 - x^2)$$ on $$[-1, 1]$$ — symmetric about 0. Mean = median = mode = 0.\n- Step 2: **All different**: right-skewed distributions. E.g., exponential with $$\\lambda = 1$$:\n+ Mode = 0 (peak at left endpoint)\n+ Median = $$\\ln 2 \\approx 0.69$$\n+ Mean = 1\n- Step 3: The greater the skew, the more the three diverge. Symmetric ⟹ they coincide; asymmetric ⟹ they separate, usually in the ordering mode < median < mean (right skew) or reversed.", "source": "Opus 4.7 ②", "_id": "opus_2_63"}, {"question": "For $$f(t) = \\lambda e^{-\\lambda t}$$ on $$[0,\\infty)$$, why is the mode at $$t = 0$$, and how does this relate to the memoryless property? (3 steps)", "answer": "- Step 1: $$f(t) = \\lambda e^{-\\lambda t}$$ is strictly decreasing for $$t \\geq 0$$, starting at $$\\lambda$$ and going to 0. Mode = left boundary, $$t = 0$$.\n- Step 2: So the most densely-packed region is right at zero. Short waits are likeliest; long waits taper off exponentially.\n- Step 3: This matches memorylessness: the hazard (instantaneous rate of event) is constant. Nothing \"builds up\" over time (which would create an interior peak); every moment is as likely to be \"the moment\" as the first.\n\nMonotonic-decreasing density ⟹ mode at left boundary.", "source": "Opus 4.7 ①", "_id": "opus_1_67"}, {"question": "Why model quantities like heights and weights as continuous, even though measurements are actually discrete at some scale? (3 steps)", "answer": "- Step 1: In principle, heights in millimetres are discrete (5000 mm, 5001 mm, ...). So strictly, the true distribution is discrete.\n- Step 2: But the spacing is tiny compared to the natural variation, so modelling as continuous gives a smooth, elegant description (e.g. normal bell curve) that a high-resolution discrete pmf would clumsily approximate.\n- Step 3: Continuous models also enable calculus tools — integration, differentiation — for tractable closed-form results. Far more powerful than case-by-case discrete computation.\n\nRule of thumb: when granularity ≪ spread, continuous models are more natural and more powerful.", "source": "Opus 4.7 ①", "_id": "opus_1_72"}, {"question": "For $$f(x) = 2x$$ on $$[0,1]$$, where are the mean, median, and mode? Why are they all different? (4 steps)", "answer": "- Step 1: The p.d.f. is strictly increasing on $$[0,1]$$, so **mode $$= 1$$** (right boundary) — probability is densest near 1.\n- Step 2: $$E(X) = \\int_0^1 x(2x)\\,dx = \\int_0^1 2x^2\\,dx = \\tfrac{2}{3}$$. So **mean $$\\approx 0.667$$**.\n- Step 3: $$F(x) = x^2$$ on $$[0,1]$$. Solving $$m^2 = 0.5$$ gives $$m = 1/\\sqrt{2} \\approx 0.707$$. So **median $$\\approx 0.707$$**.\n- Step 4: All three differ because the distribution is asymmetric. The mode is at the peak (right end); the mean is pulled left by the low-density tail near 0; the median sits between. Ordering: mean < median < mode (for this *left-skewed* distribution, where the long tail stretches left).", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "Derive $$E(aX+b) = aE(X) + b$$ from the definition, and explain intuitively why this holds. (3 steps)", "answer": "- Step 1: By definition, $$E(aX+b) = \\int (ax+b)f(x)\\,dx = a\\int x f(x)\\,dx + b\\int f(x)\\,dx$$, using linearity of integration.\n- Step 2: The first integral is $$E(X)$$; the second is $$\\int f(x)\\,dx = 1$$. So $$E(aX+b) = aE(X) + b$$.\n- Step 3: Intuitively, scaling every outcome by $$a$$ scales the average by $$a$$; shifting every outcome by $$b$$ shifts the average by $$b$$. Expectation is *linear* because integration is linear.\n\nExample: if $$E(X) = 5$$ and $$Y = 2X - 3$$, then $$E(Y) = 2(5) - 3 = 7$$ — no integration required.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "What is the relationship between the derivative of the CDF $F(x)$ and the PDF $f(x)$? Demonstrate this with an example. (2 steps)", "answer": "- Step 1: **Fundamental relationship**  \n  By the Fundamental Theorem of Calculus:  \n  $$\n  \\frac{d}{dx} F(x) = f(x)\n  $$  \n  Differentiating the CDF gives the PDF.  \n\n- Step 2: **Example verification**  \n  If $F(x) = \\frac{1}{8}x^2 - \\frac{1}{8}$ for $1 \\leq x \\leq 3$, then:  \n  $$\n  \\frac{d}{dx} \\left( \\frac{1}{8}x^2 - \\frac{1}{8} \\right) = \\frac{1}{4}x = f(x)\n  $$  \n  This matches the given PDF $f(x) = \\frac{1}{4}x$.  \n\n  **Takeaway:** The PDF is the derivative of the CDF, confirming their inverse relationship.", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "What's the relationship between the p.d.f. value at a point $$f(x)$$ and the probability in a tiny neighbourhood of $$x$$? (3 steps)", "answer": "- Step 1: For a small interval $$[x, x + \\Delta x]$$: $$\\mathrm{P}(x < X < x + \\Delta x) \\approx f(x) \\cdot \\Delta x$$ (density times width).\n- Step 2: This is exact in the limit $$\\Delta x \\to 0$$, becoming the integrand $$f(x)\\,dx$$. So $$f(x)\\,dx$$ is the \"infinitesimal probability\" at $$x$$.\n- Step 3: Interpretation:\n+ Places where $$f$$ is large → probability accumulates quickly → more likely to observe values there.\n+ Places where $$f$$ is small → probability accumulates slowly → less likely.\n+ But no single point has positive probability on its own — only intervals.\n\nThis makes the p.d.f. a \"rate\" — analogous to velocity (rate of position change) or mass density.", "source": "Opus 4.7 ②", "_id": "opus_2_95"}, {"question": "For a c.d.f. of the form $$F(x) = \\frac{1}{6}x^p + q$$ on $$[2, 4]$$, what constraints determine $$p$$ and $$q$$? (3 steps)", "answer": "- Step 1: Boundary conditions:\n+ $$F(2) = 0$$: $$\\frac{1}{6} \\cdot 2^p + q = 0$$ ⟹ $$q = -\\frac{2^p}{6}$$.\n+ $$F(4) = 1$$: $$\\frac{1}{6} \\cdot 4^p + q = 1$$.\n- Step 2: Subtract the two equations: $$\\frac{1}{6}(4^p - 2^p) = 1$$ ⟹ $$4^p - 2^p = 6$$.\n- Step 3: Rewrite $$4^p = (2^p)^2$$. Let $$u = 2^p$$: $$u^2 - u - 6 = 0$$, factoring as $$(u - 3)(u + 2) = 0$$. Only $$u = 3$$ is positive, so $$2^p = 3$$, giving $$p = \\log_2 3$$.\n\nThen $$q = -\\frac{3}{6} = -\\frac{1}{2}$$.\n\nTwo unknowns, two boundary conditions — always the strategy for such problems.", "source": "Opus 4.7 ②", "_id": "opus_2_104"}, {"question": "A p.d.f. has the form $$f(x) = ax + b$$ on $$[0, 2]$$, and you're told $$\\mathrm{E}(X) = 9/8$$. How do you find $$a$$ and $$b$$? (4 steps)", "answer": "- Step 1: **Normalisation**: $$\\int_0^2 (ax + b)\\,dx = 2a + 2b = 1$$, so $$a + b = 1/2$$. (Equation 1.)\n- Step 2: **Mean constraint**: $$\\mathrm{E}(X) = \\int_0^2 x(ax + b)\\,dx = \\int_0^2 (ax^2 + bx)\\,dx = \\frac{8a}{3} + 2b = \\frac{9}{8}$$. (Equation 2.)\n- Step 3: From Eq. 1: $$b = 1/2 - a$$. Substitute into Eq. 2: $$\\frac{8a}{3} + 1 - 2a = \\frac{9}{8} \\Rightarrow \\frac{2a}{3} = \\frac{1}{8} \\Rightarrow a = \\frac{3}{16}$$.\n- Step 4: Then $$b = \\frac{1}{2} - \\frac{3}{16} = \\frac{5}{16}$$.\n\nTechnique: two unknown constants require two equations — typically normalisation and a moment constraint (mean, etc.).", "source": "Opus 4.7 ②", "_id": "opus_2_79"}, {"question": "Suppose you have $$F(x) = 1 - e^{-\\lambda x}$$ for $$x \\geq 0$$. Verify this is a valid c.d.f. and find the p.d.f. (3 steps)", "answer": "- Step 1: **Boundaries**: $$F(0) = 1 - 1 = 0$$ ✓. $$F(x) \\to 1$$ as $$x \\to \\infty$$ (since $$e^{-\\lambda x} \\to 0$$) ✓.\n- Step 2: **Monotonicity**: $$F'(x) = \\lambda e^{-\\lambda x} > 0$$ for all $$x \\geq 0$$, so $$F$$ is increasing ✓.\n- Step 3: **P.d.f.**: $$f(x) = F'(x) = \\lambda e^{-\\lambda x}$$ for $$x \\geq 0$$, and $$f(x) = 0$$ for $$x < 0$$.\n\nThis is the exponential distribution — its c.d.f. is the simpler expression; its p.d.f. follows by differentiation.", "source": "Opus 4.7 ②", "_id": "opus_2_98"}, {"question": "A continuous RV has p.d.f. $$f(x) = \\frac{3}{32}(4 - x^2)$$ on $$[-2, 2]$$. Describe the shape and state the mean, median, and mode. (3 steps)", "answer": "- Step 1: **Symmetry**: $$f(-x) = f(x)$$ since $$(-x)^2 = x^2$$. So $$f$$ is symmetric about $$x = 0$$.\n- Step 2: **Mean and median**: by symmetry, both equal 0.\n- Step 3: **Mode**: $$f$$ is a downward-opening parabola, peaked at $$x = 0$$ where $$f(0) = 12/32 = 3/8$$. Zero at $$x = \\pm 2$$. So mode = 0.\n\nClassic symmetric unimodal distribution: mean = median = mode = 0.", "source": "Opus 4.7 ②", "_id": "opus_2_77"}, {"question": "For a piecewise p.d.f., explain why you must ensure the c.d.f. $$F$$ is *continuous* at piece boundaries. (3 steps)", "answer": "- Step 1: $$F$$ is always continuous as a mathematical fact — it's the integral of a bounded function, and integrals are continuous.\n- Step 2: When building $$F$$ piecewise, each piece's formula must start from the value $$F$$ reached at the end of the previous piece. This is what prevents $$F$$ from jumping.\n- Step 3: Forgetting this gives a $$F$$ with gaps — meaningless probabilities. Always double-check: formula of piece 1 at its upper boundary = formula of piece 2 at its lower boundary.\n\nEach piece: \"accumulated area so far + new area from boundary to $$x$$\". The first term is the continuity fix-up.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "If X has p.d.f. f(x) = 3/10(3x - x²) for 0 ≤ x ≤ 2, find the mode. Then find the probability that X is less than the mode. Is it 0.5? (3 steps)", "answer": "- Step 1: f(x) = (9x - 3x²)/10. Differentiate: f'(x) = (9 - 6x)/10 = 0 gives x = 1.5. Second derivative: f''(x) = -6/10 < 0, confirming maximum.\n- Step 2: The mode is x = 1.5. To find P(X < 1.5), compute the c.d.f. at x = 1.5: F(1.5) = ∫₀^1.5 (3/10)(3x - x²) dx.\n- Step 3: F(1.5) = (3/10)[(3/2)x² - (1/3)x³]₀^1.5 = (3/10)(3/2 × 2.25 - 1/3 × 3.375) = (3/10)(3.375 - 1.125) = (3/10)(2.25) = 0.675. So P(X < mode) = 0.675, not 0.5 — the mode does NOT split probability in half!", "source": "MiniMax ②", "_id": "minimax_2_39"}, {"question": "A p.d.f. is strictly increasing on the interval $$[1, 5]$$ and zero elsewhere. Where is the mode? (2 steps)", "answer": "- Step 1: Since the p.d.f. is strictly increasing on $$[1, 5]$$, the highest point (maximum density) occurs at the rightmost end of the interval.\n- Step 2: Therefore, the mode is at the boundary $$x = 5$$. This highlights that the mode does not have to be in the \"middle\" of the distribution; it is simply wherever the density peaks, which can be at an endpoint.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "Conceptually, why does the integrand for $$\\mathrm{E}(X)$$ multiply $$x$$ by $$f(x)$$, and why not just integrate $$f(x)$$ or just $$x$$ alone? (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(X)$$ is a *weighted average* — values of $$x$$ weighted by how much probability mass is in their vicinity.\n- Step 2: Integrating $$f(x)$$ alone gives 1 (total probability) — no information about which values $$X$$ takes.\n- Step 3: Integrating $$x$$ alone treats all $$x$$-values as equally weighted, ignoring the distribution.\n+ Multiplying $$x \\cdot f(x)$$ ensures that values of $$x$$ where probability is concentrated contribute more to the average.\n+ The resulting integral is the \"centre of mass\" of the probability distribution, if you think of $$f(x)$$ as a mass density.\n\nMean is the balance point of the distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "Misconception: \"The mode is always at the centre of the distribution.\" Why is this wrong? When might it be true? (3 steps)", "answer": "- Step 1: The mode is wherever $$f$$ is maximum — no a priori connection to any \"centre\" concept (mean, median, or midpoint of support).\n- Step 2: Counterexamples:\n+ $$f(x) = 2x$$ on $$[0,1]$$: mode at right boundary $$x = 1$$.\n+ Exponential $$f(t) = e^{-t}$$: mode at left boundary $$t = 0$$.\n+ Skewed distributions: mode away from centre.\n- Step 3: Mode = centre only for specific symmetric unimodal distributions (like normal). In general, mode can be anywhere.\n\nCorrect model: mode = point of highest density, period.", "source": "Opus 4.7 ①", "_id": "opus_1_83"}, {"question": "A continuous random variable $$X$$ has p.d.f. $$f(x) = \\frac{1}{8}x$$ for $$0 \\le x \\le 4$$ and 0 otherwise. Conceptually walk through finding $$P(2 < X < 4)$$ using the geometry of the shape. (3 steps)", "answer": "- Step 1: The probability is the area under the p.d.f. curve between $$x=2$$ and $$x=4$$. The function $$f(x) = \\frac{1}{8}x$$ is a straight line passing through the origin, so the area is a trapezoid.\n- Step 2: Identify the dimensions of the trapezoid. At $$x=2$$, the height is $$f(2) = \\frac{2}{8} = \\frac{1}{4}$$. At $$x=4$$, the height is $$f(4) = \\frac{4}{8} = \\frac{1}{2}$$. The width (base) is $$4 - 2 = 2$$.\n- Step 3: The area of a trapezoid is $$\\frac{1}{2} \\times \\text{width} \\times (\\text{height}_1 + \\text{height}_2) = \\frac{1}{2} \\times 2 \\times (\\frac{1}{4} + \\frac{1}{2}) = 1 \\times \\frac{3}{4} = \\frac{3}{4}$$. So the probability is 0.75.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "How is the mode of a continuous random variable defined, and what are the two main scenarios for finding it? (2 steps)", "answer": "- Step 1: The mode is the value of $$x$$ at which the p.d.f. $$f(x)$$ is at its maximum. It represents the value where the variable is \"most dense\" or most likely to occur.\n- Step 2: To find it, there are two main scenarios:\n+ For a smooth, differentiable p.d.f. with an interior maximum, find the critical point by solving $$f'(x) = 0$$ and verify it's a maximum (e.g., sketch or second derivative test).\n+ For a piecewise linear p.d.f., the maximum will occur at a \"corner\" or a boundary point. Sketching the graph is the easiest way to identify it.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "State the rules for $$\\mathrm{E}(aX + b)$$ and $$\\mathrm{Var}(aX + b)$$, and give an intuitive explanation for why adding $$b$$ doesn't change the variance. (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(aX + b) = a\\,\\mathrm{E}(X) + b$$ — scaling by $$a$$ scales the mean, and shifting by $$b$$ shifts the mean. This makes sense: if you convert all measurements from cm to mm ($$a = 10$$) and add a baseline of 5 mm ($$b = 5$$), the average transforms the same way.\n- Step 2: $$\\mathrm{Var}(aX + b) = a^2\\,\\mathrm{Var}(X)$$ — scaling by $$a$$ scales the variance by $$a^2$$ (since variance involves squared deviations), but shifting by $$b$$ has **no effect**.\n- Step 3: Intuition for why $$b$$ doesn't affect variance: Variance measures *spread* — how far values are from their mean. Adding a constant $$b$$ shifts every value (and the mean) by the same amount, so all deviations from the mean stay identical. The spread hasn't changed at all.\n\n+ Example: If $$\\mathrm{E}(X) = 3$$ and $$\\mathrm{Var}(X) = 2$$, then $$\\mathrm{E}(2X - 1) = 2(3) - 1 = 5$$ and $$\\mathrm{Var}(2X - 1) = 4(2) = 8$$.", "source": "GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "If the p.d.f. has a jump discontinuity at $$x = c$$, what happens to the c.d.f. at $$x = c$$? (3 steps)", "answer": "- Step 1: $$F$$ is always continuous (integral of a bounded function), so $$F$$ has *no jump* at $$c$$.\n- Step 2: However, $$F$$ may not be *differentiable* at $$c$$: its slope jumps from $$f(c^-)$$ to $$f(c^+)$$. Visually, $$F$$ has a *corner*.\n- Step 3: Practical consequence: you can differentiate $$F$$ piecewise to recover $$f$$, but at the boundary $$c$$, $$f(c)$$ may be ambiguous (left and right limits differ). This doesn't affect probabilities (integrals ignore single-point values).\n\nJumps in $$f$$ become corners in $$F$$, but never jumps.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "What is the relationship between linear transformations of a continuous random variable and its mean and variance? Derive $\\mathrm{E}(aX + b)$ and $\\operatorname{Var}(aX + b)$. (4 steps)", "answer": "- Step 1: **Linearity of expectation**  \n  $$\n  \\mathrm{E}(aX + b) = a\\mathrm{E}(X) + b\n  $$  \n  Proof:  \n  $$\n  \\int_{-\\infty}^{\\infty} (a x + b)f(x) dx = a \\int x f(x) dx + b \\int f(x) dx = a\\mu + b\n  $$  \n\n- Step 2: **Variance under scaling**  \n  $$\n  \\operatorname{Var}(aX + b) = \\mathrm{E}[(aX + b - a\\mu - b)^2] = \\mathrm{E}[a^2(X - \\mu)^2] = a^2 \\operatorname{Var}(X)\n  $$  \n\n- Step 3: **Effect of constants**  \n  - $a$ scales the spread (variance by $a^2$), $b$ shifts location (no effect on variance).  \n  - Example: If $X$ has $\\mu = 2, \\sigma^2 = 4$, then $Y = 3X + 1$ has $\\mu = 7, \\sigma^2 = 36$.  \n\n- Step 4: **Application to normalization**  \n  Z-scores: $Z = \\frac{X - \\mu}{\\sigma}$ has $\\mathrm{E}(Z) = 0, \\operatorname{Var}(Z) = 1$.  \n\n  **Takeaway:** Expectation shifts by $b$ and scales by $a$; variance scales by $a^2$.", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "Suppose you have a piecewise p.d.f. with $$f = f_1$$ on $$[a, c]$$ and $$f = f_2$$ on $$[c, b]$$. Explain why computing $$\\mathrm{E}(X)$$ requires integrating each piece separately and then adding. (3 steps)", "answer": "- Step 1: The formula $$\\mathrm{E}(X) = \\int_{-\\infty}^{\\infty} x f(x)\\,dx$$ holds globally, but $$f$$ has different expressions on different intervals.\n- Step 2: Split the integral along boundaries: $$\\mathrm{E}(X) = \\int_a^c x f_1(x)\\,dx + \\int_c^b x f_2(x)\\,dx$$. Each sub-integral uses its own formula.\n- Step 3: After evaluating both and adding, the sum gives the full $$\\mathrm{E}(X)$$. The same approach works for $$\\mathrm{E}(X^2)$$, $$\\mathrm{Var}(X)$$, or $$\\mathrm{E}(g(X))$$ — integrate $$g(x) f(x)$$ piece by piece.\n\nMiss a piece or use the wrong formula on a sub-interval, and you get a wrong answer.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Why does the pointwise value of $$f$$ at the support boundary not matter for probability calculations? (3 steps)", "answer": "- Step 1: Probabilities are integrals. Changing $$f$$ at a single point (measure-zero set) doesn't change the integral — integrals \"don't see\" individual points.\n- Step 2: So $$f(c)$$ at any specific $$c$$ is irrelevant for probabilities. Two functions differing only at boundary points define the *same* probability distribution.\n- Step 3: This explains why strict vs non-strict inequalities don't matter for continuous r.v.s, and why jump discontinuities in $$f$$ cause no issues: integrals smooth over them.\n\nSingle-point values of $$f$$ are cosmetic, not essential.", "source": "Opus 4.7 ①", "_id": "opus_1_78"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "For a continuous random variable, why is $$\\mathrm{P}(X = x) = 0$$ for any specific value $$x$$? What does this mean for how we must describe its distribution? (3 steps)", "answer": "- Step 1: A continuous random variable can take infinitely many values in a range. If you tried to assign a positive probability to each specific value, the total probability would blow up to infinity — violating the requirement that total probability equals 1. The only way to distribute probability across infinitely many points while keeping the total finite is to assign zero probability to each individual point.\n- Step 2: This is analogous to measuring the length of a line segment: a single point has zero length, but an interval $$[a, b]$$ has positive length. Probabilities for continuous variables work the same way — individual points carry zero probability, but intervals carry positive probability.\n- Step 3: Because $$\\mathrm{P}(X = x) = 0$$, we cannot use a table of values (like we do for discrete random variables). Instead, we use a **probability density function** $$\\mathrm{f}(x)$$, where probabilities for ranges are found by integration: $$\\mathrm{P}(a < X < b) = \\int_a^b \\mathrm{f}(x)\\,\\mathrm{d}x$$.\n\nThis is the fundamental reason continuous and discrete random variables require different mathematical frameworks.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "What two conditions must a probability density function $$\\mathrm{f}(x)$$ satisfy to be valid? Explain why each is necessary. (2 steps)", "answer": "- Step 1: **Non-negativity**: $$\\mathrm{f}(x) \\geq 0$$ for all $$x \\in \\mathbb{R}$$. This is necessary because $$\\mathrm{f}(x)$$ represents probability *density* — areas under the curve give probabilities, and probabilities cannot be negative. If $$\\mathrm{f}(x)$$ were negative on some interval, integrating over that interval would yield a \"negative probability,\" which is meaningless.\n- Step 2: **Total area equals 1**: $$\\int_{-\\infty}^{\\infty} \\mathrm{f}(x)\\,\\mathrm{d}x = 1$$. This is necessary because the random variable must take *some* value — the total probability over all possible outcomes must be exactly 1. In practice, since $$\\mathrm{f}(x) = 0$$ outside a finite range, you only integrate over the region where $$\\mathrm{f}(x)$$ is non-zero.\n\nBoth conditions must hold simultaneously — neither alone is sufficient.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "For a continuous random variable, does it matter whether you write $$\\mathrm{P}(a < X < b)$$, $$\\mathrm{P}(a \\leq X < b)$$, $$\\mathrm{P}(a < X \\leq b)$$, or $$\\mathrm{P}(a \\leq X \\leq b)$$? Explain why. (2 steps)", "answer": "- Step 1: No, it does not matter — all four expressions give the same probability. The reason is that $$\\mathrm{P}(X = a) = 0$$ and $$\\mathrm{P}(X = b) = 0$$ for any specific values $$a$$ and $$b$$, since $$X$$ is continuous. Adding or removing single points from an interval does not change the integral (area under the curve).\n- Step 2: Formally, $$\\mathrm{P}(a \\leq X \\leq b) = \\mathrm{P}(a < X < b) + \\mathrm{P}(X = a) + \\mathrm{P}(X = b) = \\mathrm{P}(a < X < b) + 0 + 0 = \\mathrm{P}(a < X < b)$$.\n\nThis is a key difference from discrete random variables, where including or excluding endpoints changes the probability.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "A student proposes $$\\mathrm{f}(x) = \\frac{1}{4}x$$ for $$-1 \\leq x \\leq 2$$ as a PDF. The total area is 1 (you can verify this). Is this a valid PDF? Why or why not? (2 steps)", "answer": "- Step 1: Check non-negativity: For $$x$$ in $$[-1, 0]$$, $$\\mathrm{f}(x) = \\frac{1}{4}x$$ is negative (e.g., $$\\mathrm{f}(-1) = -\\frac{1}{4}$$). This violates the condition $$\\mathrm{f}(x) \\geq 0$$ for all $$x$$.\n- Step 2: Therefore, despite the total area being 1, this is **not** a valid PDF. A function must satisfy *both* conditions: non-negativity AND total area = 1. Meeting only one condition is insufficient.\n\nThis is a common exam trap: always check both conditions, especially non-negativity over the entire stated domain.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "The function $$\\mathrm{f}(x) = kx(5-x)$$ is proposed for $$0 \\leq x \\leq 6$$ with $$k > 0$. Explain why no positive value of $$k$$ can make this a valid PDF. (3 steps)", "answer": "- Step 1: The quadratic $$x(5-x) = 5x - x^2$$ has roots at $$x = 0$$ and $$x = 5$$. It is positive for $$0 < x < 5$$ but **negative** for $$x > 5$$.\n- Step 2: Since the domain extends to $$x = 6$$, there exist values in $$[5, 6]$$ where $$x(5-x) < 0$$, and therefore $$\\mathrm{f}(x) = kx(5-x) < 0$$ for any positive $$k$$.\n- Step 3: No matter what positive $$k$$ you choose, $$\\mathrm{f}(x)$$ will be negative on part of the domain. The non-negativity condition fails, so this cannot be a PDF for any positive $$k$$.\n\nThe lesson: always check where the function is non-negative *within the stated domain*, not just where it could theoretically be positive.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "How do you find the constant $$k$$ that makes a proposed function $$\\mathrm{f}(x) = k \\cdot g(x)$$ a valid PDF over a given range? Walk through the logic. (3 steps)", "answer": "- Step 1: For $$\\mathrm{f}(x)$$ to be a valid PDF, the total probability must equal 1: $$\\int_{\\text{range}} k \\cdot g(x)\\,\\mathrm{d}x = 1$$.\n- Step 2: Since $$k$$ is a constant, factor it out: $$k \\cdot \\int_{\\text{range}} g(x)\\,\\mathrm{d}x = 1$$. Compute the integral of $$g(x)$$ over the stated range — call this result $$A$$ (the area under $$g(x)$$).\n- Step 3: Solve for $$k$$: $$k = \\frac{1}{A}$$. This normalizes the function so the total area becomes exactly 1.\n\n+ For example, if $$g(x) = 4x - x^2$$ on $$[2, 4]$$ and the integral gives $$A = \\frac{16}{3}$$, then $$k = \\frac{3}{16}$$.\n\nAlways verify non-negativity *before* or *after* finding $$k$$ — both conditions must hold.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "What is the cumulative distribution function $$\\mathrm{F}(x)$$, and how is it related to the probability density function $$\\mathrm{f}(x)$$? Give both directions of the relationship. (3 steps)", "answer": "- Step 1: The CDF is defined as $$\\mathrm{F}(x) = \\mathrm{P}(X \\leq x)$$ — the probability that the random variable takes a value at or below $$x$$. Visually, it is the accumulated area under the PDF curve from the left up to the point $$x$$.\n- Step 2: Going from PDF to CDF: $$\\mathrm{F}(x) = \\int_{-\\infty}^{x} \\mathrm{f}(t)\\,\\mathrm{d}t$$. We use $$t$$ as the integration variable to avoid confusion with $$x$$ as the upper limit. In practice, since $$\\mathrm{f}(t) = 0$$ outside the defined range, the lower limit becomes the start of that range.\n- Step 3: Going from CDF to PDF: $$\\mathrm{f}(x) = \\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{F}(x)$$ — the PDF is the derivative of the CDF. Where $$\\mathrm{F}(x)$$ is constant (flat), $$\\mathrm{f}(x) = 0$$; where $$\\mathrm{F}(x)$$ increases, $$\\mathrm{f}(x)$$ is positive.\n\nThe CDF and PDF are two sides of the same coin — one accumulates, the other gives the rate of accumulation.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "What must $$\\mathrm{F}(x)$$ equal at the lower boundary and upper boundary of the random variable's range? Why? (2 steps)", "answer": "- Step 1: At the lower boundary (say $$x = a$$, the smallest value $$X$$ can take), $$\\mathrm{F}(a) = 0$$ because there is no area accumulated to the left of $$a$$ — the probability of $$X$$ being less than or equal to the minimum possible value is 0 (since $$\\mathrm{f}(x) = 0$$ for $$x < a$$).\n- Step 2: At the upper boundary (say $$x = b$$, the largest value), $$\\mathrm{F}(b) = 1$$ because all the area has been accumulated — the probability of $$X$$ being less than or equal to the maximum possible value is 1 (certainty).\n\nThese boundary conditions are essential for defining $$\\mathrm{F}(x)$$ fully and for finding constants of integration when constructing the CDF.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "Why must you define $$\\mathrm{F}(x)$$ for **all** real numbers, including regions where $$\\mathrm{f}(x) = 0$$? What happens to $$\\mathrm{F}(x)$$ in those regions? (2 steps)", "answer": "- Step 1: The CDF must be defined for all $$x \\in \\mathbb{R}$$ because it represents $$\\mathrm{P}(X \\leq x)$$, which must have a value for any real number $$x$$ — even values outside the range of $$X$$.\n- Step 2: In regions where $$\\mathrm{f}(x) = 0$$ (i.e., where $$X$$ cannot take values):\n+ For $$x$$ below the range (e.g., $$x < a$$): no area has accumulated, so $$\\mathrm{F}(x) = 0$$.\n+ For $$x$$ above the range (e.g., $$x > b$$): all area has been accumulated, so $$\\mathrm{F}(x) = 1$$.\n\nA common mistake is to only define $$\\mathrm{F}(x)$$ on the active range — you must always include $$\\mathrm{F}(x) = 0$$ for values below and $$\\mathrm{F}(x) = 1$$ for values above.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "When constructing $$\\mathrm{F}(x)$$ from a piecewise PDF, why must you add on the value of $$\\mathrm{F}$$ at the boundary of the previous section for each new piece? Walk through the logic. (3 steps)", "answer": "- Step 1: The CDF is *cumulative* — it represents the total probability accumulated from the left. When you move from one piece of the PDF to the next, the probability already accumulated from earlier pieces doesn't disappear.\n- Step 2: Suppose the PDF has two pieces: $$\\mathrm{f}(x)$$ on $$[a, c]$$ and $$\\mathrm{f}(x)$$ on $$[c, b]$$. For the second piece, $$\\mathrm{F}(x) = \\mathrm{F}(c) + \\int_c^x \\mathrm{f}(t)\\,\\mathrm{d}t$$ — you must include $$\\mathrm{F}(c)$$, the probability already accumulated up to the boundary $$c$$.\n- Step 3: Without adding $$\\mathrm{F}(c)$$, your CDF would restart from 0 at $$x = c$$, which would mean $$\\mathrm{P}(X \\leq c) = 0$$ — contradicting the fact that there is positive probability in $$[a, c]$$.\n\n+ For example, if $$\\mathrm{F}(2) = \\frac{1}{5}$$ from the first piece, then for $$x$$ in the second piece starting at 2, $$\\mathrm{F}(x) = \\frac{1}{5} + \\int_2^x \\mathrm{f}(t)\\,\\mathrm{d}t$$.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "How do you compute $$\\mathrm{P}(a \\leq X \\leq b)$$ using the CDF $$\\mathrm{F}(x)$$? Why does this work? (2 steps)", "answer": "- Step 1: $$\\mathrm{P}(a \\leq X \\leq b) = \\mathrm{F}(b) - \\mathrm{F}(a)$$. This works because $$\\mathrm{F}(b) = \\mathrm{P}(X \\leq b)$$ is the total area from the far left up to $$b$$, and $$\\mathrm{F}(a) = \\mathrm{P}(X \\leq a)$$ is the area from the far left up to $$a$$. Subtracting removes the area below $$a$$, leaving only the area between $$a$$ and $$b$$.\n- Step 2: This is far more convenient than integrating the PDF each time — once you have $$\\mathrm{F}(x)$$, probabilities are simple evaluations and subtraction, no integration needed.\n\nThis is the main practical advantage of the CDF: it converts probability calculations from integrals into simple arithmetic.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "What is $$\\mathrm{P}(X = 1)$$ for a continuous random variable $$X$$? A student argues \"since $$\\mathrm{F}(1)$$ has a value, $$\\mathrm{P}(X = 1) = \\mathrm{F}(1)$$.\" Why is this wrong? (2 steps)", "answer": "- Step 1: For a continuous random variable, $$\\mathrm{P}(X = x) = 0$$ for any specific value $$x$$. This includes $$\\mathrm{P}(X = 1) = 0$$. The probability of landing on exactly one point out of infinitely many is zero.\n- Step 2: The student's confusion arises from misunderstanding what $$\\mathrm{F}(1)$$ represents. $$\\mathrm{F}(1) = \\mathrm{P}(X \\leq 1)$$, which is the probability of $$X$$ being in the *entire interval* up to 1, not the probability of $$X$$ being *exactly* 1. Formally, $$\\mathrm{P}(X = 1) = \\mathrm{P}(X \\leq 1) - \\mathrm{P}(X < 1) = \\mathrm{F}(1) - \\mathrm{F}(1) = 0$$ (since strict and non-strict inequalities give the same probability for continuous variables).\n\n$$\\mathrm{F}(x)$$ gives interval probabilities, never point probabilities for continuous variables.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "If $$\\mathrm{F}(x)$$ is constant (flat) on some interval, what does this tell you about $$\\mathrm{f}(x)$$ and about where $$X$$ can take values? (2 steps)", "answer": "- Step 1: If $$\\mathrm{F}(x)$$ is constant on an interval, then its derivative is zero there: $$\\mathrm{f}(x) = \\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{F}(x) = 0$$. The PDF is zero, meaning there is zero probability density.\n- Step 2: This means $$X$$ **cannot** take values in that interval (or takes them with probability zero). For example, if $$\\mathrm{F}(x) = 1$$ for all $$x > b$$, then $$\\mathrm{f}(x) = 0$$ for $$x > b$$ — the variable never exceeds $$b$$.\n\nFlat regions in the CDF correspond to \"gaps\" in the distribution where no values occur.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "What are the defining formulas for $$\\mathrm{E}(X)$$ and $$\\mathrm{Var}(X)$$ for a continuous random variable, and how do they relate to the discrete versions? (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(X) = \\mu = \\int_{-\\infty}^{\\infty} x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$. This is the continuous analogue of $$\\mathrm{E}(X) = \\sum x\\,\\mathrm{P}(X=x)$$ for discrete variables — replace the sum with an integral and the probability function with the PDF.\n- Step 2: $$\\mathrm{Var}(X) = \\sigma^2 = \\int_{-\\infty}^{\\infty}(x - \\mu)^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$, which is the continuous analogue of $$\\sum(x-\\mu)^2\\,\\mathrm{P}(X=x)$$.\n- Step 3: The more convenient computational form is $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2 = \\int_{-\\infty}^{\\infty} x^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x - \\mu^2$$. This avoids expanding $$(x-\\mu)^2$$ and is the formula you'll almost always use in calculations.\n\nThe pattern is clear: for continuous variables, every $$\\sum$$ becomes $$\\int$$ and every $$\\mathrm{P}(X=x)$$ becomes $$\\mathrm{f}(x)\\,\\mathrm{d}x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "What is the general formula for $$\\mathrm{E}(\\mathrm{g}(X))$$, and why is it crucial for computing things like expected volume from a side length? (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(\\mathrm{g}(X)) = \\int_{-\\infty}^{\\infty} \\mathrm{g}(x)\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$ — you multiply the function $$\\mathrm{g}(x)$$ by the PDF and integrate. This generalizes $$\\mathrm{E}(X)$$ (where $$\\mathrm{g}(x) = x$$) and $$\\mathrm{E}(X^2)$$ (where $$\\mathrm{g}(x) = x^2$$).\n- Step 2: This is crucial because **$$\\mathrm{E}(\\mathrm{g}(X)) \\neq \\mathrm{g}(\\mathrm{E}(X))$$** in general. If a cube has side length $$X$$, the expected volume is $$\\mathrm{E}(X^3) = \\int x^3\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$, which is NOT the same as $$[\\mathrm{E}(X)]^3$$.\n- Step 3: The inequality $$\\mathrm{E}(X^3) \\neq [\\mathrm{E}(X)]^3$$ arises because the average of cubes is not the cube of the average — variability in $$X$$ means larger values get cubed into even larger contributions, pulling $$\\mathrm{E}(X^3)$$ above $$[\\mathrm{E}(X)]^3$$ for non-degenerate distributions.\n\nNever substitute $$\\mathrm{E}(X)$$ into a nonlinear function to get $$\\mathrm{E}(\\mathrm{g}(X))$$ — you must integrate $$\\mathrm{g}(x)\\,\\mathrm{f}(x)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "State the rules for $$\\mathrm{E}(aX + b)$$ and $$\\mathrm{Var}(aX + b)$$, and give an intuitive explanation for why adding $$b$$ doesn't change the variance. (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(aX + b) = a\\,\\mathrm{E}(X) + b$$ — scaling by $$a$$ scales the mean, and shifting by $$b$$ shifts the mean. This makes sense: if you convert all measurements from cm to mm ($$a = 10$$) and add a baseline of 5 mm ($$b = 5$$), the average transforms the same way.\n- Step 2: $$\\mathrm{Var}(aX + b) = a^2\\,\\mathrm{Var}(X)$$ — scaling by $$a$$ scales the variance by $$a^2$$ (since variance involves squared deviations), but shifting by $$b$$ has **no effect**.\n- Step 3: Intuition for why $$b$$ doesn't affect variance: Variance measures *spread* — how far values are from their mean. Adding a constant $$b$$ shifts every value (and the mean) by the same amount, so all deviations from the mean stay identical. The spread hasn't changed at all.\n\n+ Example: If $$\\mathrm{E}(X) = 3$$ and $$\\mathrm{Var}(X) = 2$$, then $$\\mathrm{E}(2X - 1) = 2(3) - 1 = 5$$ and $$\\mathrm{Var}(2X - 1) = 4(2) = 8$$.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": true}, {"question": "If the PDF of a continuous random variable $$X$$ is symmetric about the point $$x = a$$, what can you immediately conclude about $$\\mathrm{E}(X)$$? Why? (2 steps)", "answer": "- Step 1: $$\\mathrm{E}(X) = a$$ — the mean equals the centre of symmetry. No integration is needed.\n- Step 2: The reason is that in the integral $$\\mathrm{E}(X) = \\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$, symmetry about $$a$$ means every value $$a + d$$ (with density $$\\mathrm{f}(a+d)$$) is perfectly balanced by the value $$a - d$$ (with the same density $$\\mathrm{f}(a-d)$$). Their contributions to the mean average out to $$a$$, so the overall mean is exactly $$a$$.\n\nThis is a powerful shortcut: always check for symmetry before integrating to find the mean.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "How do you compute $$\\mathrm{E}(X)$$ and $$\\mathrm{Var}(X)$$ when the PDF is piecewise (defined differently on different intervals)? Walk through the principle. (3 steps)", "answer": "- Step 1: Split the integral at the boundaries. For $$\\mathrm{E}(X) = \\int x\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$, if $$\\mathrm{f}(x)$$ has different formulas on $$[a, c]$$ and $$[c, b]$$, write: $$\\mathrm{E}(X) = \\int_a^c x\\,\\mathrm{f}_1(x)\\,\\mathrm{d}x + \\int_c^b x\\,\\mathrm{f}_2(x)\\,\\mathrm{d}x$$.\n- Step 2: Do the same for $$\\mathrm{E}(X^2) = \\int x^2\\,\\mathrm{f}(x)\\,\\mathrm{d}x$$, splitting at the same boundaries: $$\\mathrm{E}(X^2) = \\int_a^c x^2\\,\\mathrm{f}_1(x)\\,\\mathrm{d}x + \\int_c^b x^2\\,\\mathrm{f}_2(x)\\,\\mathrm{d}x$$.\n- Step 3: Then compute $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - [\\mathrm{E}(X)]^2$$ using the results from Steps 1 and 2.\n\nEach piece must be integrated separately with its own formula for $$\\mathrm{f}(x)$$ — you cannot combine them into one integral with a single integrand.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "What is the **mode** of a continuous random variable, and how does its definition differ from the mode of a discrete variable? (2 steps)", "answer": "- Step 1: The mode of a continuous random variable is the value of $$x$$ for which the PDF $$\\mathrm{f}(x)$$ is a **maximum**. It is the point where the probability density is highest — where values of $$X$$ are \"most concentrated.\"\n- Step 2: For a discrete variable, the mode is the value with the highest probability $$\\mathrm{P}(X = x)$$. For a continuous variable, individual point probabilities are all zero, so we look for the peak of the *density* instead. The mode is found by solving $$\\frac{\\mathrm{d}}{\\mathrm{d}x}\\mathrm{f}(x) = 0$$ and verifying the result is a maximum (not a minimum).\n\nThe mode is about *density*, not *probability at a point* — a crucial distinction for continuous variables.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A student finds the mode by solving $$\\mathrm{f}'(x) = 0$$ and gets $$x = \\frac{2}{3}$$ and $$x = 0$$ as solutions. How should they determine which is the actual mode? (2 steps)", "answer": "- Step 1: Not every solution to $$\\mathrm{f}'(x) = 0$$ is a maximum — it could be a minimum or a point of inflection. You must verify which solution gives the largest value of $$\\mathrm{f}(x)$$.\n- Step 2: Methods for verification:\n+ Evaluate $$\\mathrm{f}(x)$$ at each candidate and compare — the mode is where $$\\mathrm{f}(x)$$ is largest.\n+ Check the second derivative: $$\\mathrm{f}''(x) < 0$$ confirms a local maximum.\n+ Sketch the graph — the mode is visually the highest point.\n\n+ For example, with $$\\mathrm{f}(x) = 12x^2(1-x)$$ on $$[0,1]$$: $$\\mathrm{f}'(x) = 0$$ gives $$x = 0$$ and $$x = \\frac{2}{3}$$; $$\\mathrm{f}(0) = 0$$ (minimum at boundary) while $$\\mathrm{f}(\\frac{2}{3}) = \\frac{16}{9}$$ (true maximum), so the mode is $$\\frac{2}{3}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "If $$\\mathrm{f}(x)$$ is strictly increasing on its entire domain (e.g., $$\\mathrm{f}(y) = 2y$$ on $$[0, 1]$$), where is the mode? Does the method \"set $$\\mathrm{f}'(x) = 0$$\" work here? (3 steps)", "answer": "- Step 1: The mode is the value of $$x$$ where $$\\mathrm{f}(x)$$ is largest. For a strictly increasing function, the largest value occurs at the **right boundary** of the domain — in this case, the mode is $$x = 1$$.\n- Step 2: The method \"set $$\\mathrm{f}'(x) = 0$$\" fails here because $$\\mathrm{f}'(x) = 2 > 0$$ everywhere — there is no interior stationary point. The maximum occurs at the boundary, not in the interior.\n- Step 3: This is why sketching the PDF is essential before finding the mode. If the function is monotonic (always increasing or always decreasing), the mode is at one of the boundaries. The derivative method only finds *interior* maxima.\n\nThe mode doesn't have to be \"in the middle\" — it can be at an edge.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "What is the **median** of a continuous random variable, and how do you find it using the CDF? (2 steps)", "answer": "- Step 1: The median $$m$$ is the value such that $$\\mathrm{P}(X \\leq m) = 0.5$$ — half the probability lies below $$m$$ and half above. It divides the area under the PDF into two equal halves.\n- Step 2: Using the CDF, the median satisfies $$\\mathrm{F}(m) = 0.5$$. You find it by setting the CDF equal to 0.5 and solving for $$m$$. This is typically much easier than integrating the PDF, since you already have $$\\mathrm{F}(x)$$ in closed form.\n\nThe median is a *location* measure — it tells you where the \"centre\" of the distribution is in terms of
