source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "For $$f(x) = \\tfrac{3}{8}x^2$$ on $$[0,2]$$, predict (conceptually) whether $$E(X)$$ is less than, equal to, or greater than 1, and explain. (3 steps)", "answer": "- Step 1: The midpoint of $$[0,2]$$ is 1. For $$E(X) = 1$$, the p.d.f. would need to be symmetric about 1.\n- Step 2: But $$f(x) = \\tfrac{3}{8}x^2$$ is *rising* on $$[0,2]$$: $$f(0) = 0$$, $$f(2) = 1.5$$. Probability concentrates near $$x = 2$$.\n- Step 3: So $$E(X) > 1$$. (Computation: $$E(X) = \\tfrac{3}{8}\\int_0^2 x^3\\,dx = \\tfrac{3}{8} \\cdot 4 = 1.5$$.) The mean sits well right of the midpoint, confirming the rightward skew of density.\n\nShape of $$f$$ predicts direction of mean deviation from midpoint.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "For the c.d.f. $$F(x) = x^n$$ on $$[0,1]$$ (zero before, one after), find general formulas for mode, median, mean — and how they change as $$n$$ increases. (4 steps)", "answer": "- Step 1: P.d.f.: $$f(x) = F'(x) = nx^{n-1}$$ on $$[0,1]$$, strictly increasing for $$n \\geq 1$$.\n- Step 2: **Mode**: since $$f$$ is increasing, mode is at right boundary $$x = 1$$. Independent of $$n$$.\n- Step 3: **Median**: solve $$m^n = 0.5$$, giving $$m = 2^{-1/n}$$. As $$n \\to \\infty$$, $$m \\to 1$$.\n- Step 4: **Mean**: $$E(X) = \\int_0^1 x \\cdot n x^{n-1}\\,dx = n/(n+1)$$. As $$n \\to \\infty$$, $$E(X) \\to 1$$.\n\nAs $$n$$ grows, density concentrates ever more at $$x = 1$$ — all three centre-measures approach 1. Mode jumps there immediately; mean and median approach gradually.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "Given $$f(x) = 2x$$ on $$[0,1]$$, compute $$E(\\ln X)$$ and interpret the result. (4 steps)", "answer": "- Step 1: $$E(\\ln X) = \\int_0^1 \\ln x \\cdot 2x\\,dx = 2\\int_0^1 x\\ln x\\,dx$$.\n- Step 2: By parts, with $$u = \\ln x$$, $$dv = x\\,dx$$: $$\\int x\\ln x\\,dx = \\tfrac{x^2}{2}\\ln x - \\tfrac{x^2}{4}$$.\n- Step 3: Evaluate 0 to 1. At $$x=1$$: $$0 - 1/4 = -1/4$$. At $$x\\to 0^+$$: both terms $$\\to 0$$ (since $$x^2\\ln x \\to 0$$ faster than $$\\ln x \\to -\\infty$$). Integral $$= -1/4$$.\n- Step 4: $$E(\\ln X) = 2(-1/4) = -1/2$$.\n\nSince $$X \\in (0,1)$$ means $$\\ln X < 0$$, a negative answer is expected. Negative $$E(\\ln X)$$ is characteristic of distributions supported below 1.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": true}, {"question": "What happens to the c.d.f. at the mode of the p.d.f.? (3 steps)", "answer": "- Step 1: The mode maximises $$f(x)$$. Since $$f = F'$$, the mode is where $$F$$'s slope is maximum.\n- Step 2: This corresponds to an **inflection point** of $$F$$ (where the second derivative changes sign). $$F$$ is \"rising fastest\" at the mode.\n- Step 3: The value $$F(\\text{mode})$$ has no universal meaning — it's some number between 0 and 1 depending on the distribution. For symmetric unimodal distributions, mode = median so $$F(\\text{mode}) = 0.5$$. In general it's arbitrary.\n\nMode = steepest slope of $$F$$, not any specific probability level.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "Given $$F(x) = k(x - 1 + \\ln x)$$ on $$[1,3]$$, explain how to find $$k$$ and then the p.d.f. (3 steps)", "answer": "- Step 1: **Find $$k$$**: Use $$F(3) = 1$$ (top boundary): $$k(3 - 1 + \\ln 3) = 1 \\Rightarrow k = \\dfrac{1}{2 + \\ln 3}$$.\n- Step 2: **Find $$f$$**: differentiate. $$\\dfrac{d}{dx}[k(x - 1 + \\ln x)] = k(1 + 1/x) = k \\cdot \\dfrac{x+1}{x}$$.\n- Step 3: **P.d.f.**: $$f(x) = \\dfrac{x+1}{x(2 + \\ln 3)}$$ on $$[1,3]$$, zero elsewhere. Check: at $$x=1$$, $$f(1) = 2/(2+\\ln 3) > 0$$; at $$x=3$$, $$f(3) = 4/(3(2+\\ln 3)) > 0$$ ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "Misconception: a student computes $$\\text{Var}(X)$$ and gets a negative number. Why does this indicate an error? (3 steps)", "answer": "- Step 1: $$\\text{Var}(X) = \\int (x-\\mu)^2 f(x)\\,dx$$ — the integrand is (non-negative)² × (non-negative density), so the integral is $$\\geq 0$$.\n- Step 2: Equivalently, $$\\text{Var}(X) = E(X^2) - (E(X))^2 \\geq 0$$ by Jensen's inequality.\n- Step 3: A negative result flags:\n+ Arithmetic slip in computing $$E(X^2)$$ or $$(E(X))^2$$, or\n+ $$f$$ is not a valid p.d.f. (negative somewhere or not normalised), or\n+ Confusion between $$E(X^2)$$ and $$(E(X))^2$$.\n\nVariance = 0 only for constant $$X$$. Always non-negative; never negative.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "What is the c.d.f. of an exponential distribution with rate $$\\lambda$$ (p.d.f. $$f(t) = \\lambda e^{-\\lambda t}$$ for $$t \\geq 0$$), and what distinctive property does it have? (3 steps)", "answer": "- Step 1: $$F(t) = \\int_0^t \\lambda e^{-\\lambda s}\\,ds = [-e^{-\\lambda s}]_0^t = 1 - e^{-\\lambda t}$$ for $$t \\geq 0$$; 0 otherwise.\n- Step 2: Survival function $$P(T > t) = 1 - F(t) = e^{-\\lambda t}$$ — exponentially decaying tail.\n- Step 3: **Memoryless property**: $$P(T > s+t \\mid T > s) = P(T > t)$$. Given \"event hasn't happened by time $$s$$\", the distribution of remaining waiting time is identical to a fresh draw. Makes exponentials natural for \"ageing-free\" waiting times.\n\nMean $$= 1/\\lambda$$ and variance $$= 1/\\lambda^2$$ (SD = mean — a fingerprint).", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": false}, {"question": "For $$f(t) = \\lambda e^{-\\lambda t}$$ on $$[0,\\infty)$$, why is the mode at $$t = 0$$, and how does this relate to the memoryless property? (3 steps)", "answer": "- Step 1: $$f(t) = \\lambda e^{-\\lambda t}$$ is strictly decreasing for $$t \\geq 0$$, starting at $$\\lambda$$ and going to 0. Mode = left boundary, $$t = 0$$.\n- Step 2: So the most densely-packed region is right at zero. Short waits are likeliest; long waits taper off exponentially.\n- Step 3: This matches memorylessness: the hazard (instantaneous rate of event) is constant. Nothing \"builds up\" over time (which would create an interior peak); every moment is as likely to be \"the moment\" as the first.\n\nMonotonic-decreasing density ⟹ mode at left boundary.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": true}, {"question": "For a piecewise p.d.f., how do you check whether it is *continuous* at the internal boundary, and does it matter if it isn't? (3 steps)", "answer": "- Step 1: At the boundary $$x = c$$, check whether the left formula and right formula give the same value: $$f(c^-) = f(c^+)$$? If yes, $$f$$ is continuous at $$c$$; if no, $$f$$ has a jump.\n- Step 2: A p.d.f. does *not* need to be continuous — only non-negative and integrating to 1. Jumps are allowed.\n- Step 3: What always matters is that $$F$$ (not $$f$$) be continuous. And $$f(c)$$ at any single point doesn't affect any probability (integrals ignore isolated points).\n\nIn exam contexts, pointwise value at boundaries is often irrelevant — focus on the integral.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": true}, {"question": "Why does shifting a random variable by a constant not change its variance? (3 steps)", "answer": "- Step 1: $$\\text{Var}(X)$$ measures expected squared deviation from the mean.\n- Step 2: If $$Y = X + b$$, then $$\\mu_Y = \\mu_X + b$$. Deviations: $$Y - \\mu_Y = (X+b) - (\\mu_X+b) = X - \\mu_X$$ — unchanged.\n- Step 3: Geometrically, you're sliding the whole distribution horizontally. Shape and width are preserved, only location changes. Variance (a width measure) is unaffected.\n\nContrast: scaling ($$Y = aX$$) stretches the distribution, so variance scales by $$a^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": false}, {"question": "\"Since $$F$$ is continuous and increases from 0 to 1, it's a probability itself.\" What's right and wrong about this? (3 steps)", "answer": "- Step 1: **Right**: For each fixed $$x$$, $$F(x) = P(X \\leq x)$$ is indeed a probability — a number in $$[0,1]$$.\n- Step 2: **Wrong (or confused)**: $$F$$ is a *function*, not a single probability. Different $$x$$ give different probabilities. And $$F$$ is not a p.d.f. — it yields probabilities directly rather than via integration.\n- Step 3: Correct phrasing: $$F(x)$$ is a cumulative probability for each $$x$$; $$F$$ as a function is the cumulative distribution function. It takes the integration step that $$f$$ requires.", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": false}, {"question": "How does symmetry of the p.d.f. about $$x = a$$ let you find the median without computing $$F$$? (2 steps)", "answer": "- Step 1: Symmetry about $$a$$ means the area to the left of $$a$$ equals the area to the right. Since total area = 1, each half is 0.5.\n- Step 2: So $$P(X \\leq a) = 0.5$$, i.e. $$F(a) = 0.5$$, i.e. **$$a$$ is the median** — *by definition*, no integration needed.\n\nSame argument also gives the mean. A massive shortcut for symmetric distributions.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": false}, {"question": "Why model quantities like heights and weights as continuous, even though measurements are actually discrete at some scale? (3 steps)", "answer": "- Step 1: In principle, heights in millimetres are discrete (5000 mm, 5001 mm, ...). So strictly, the true distribution is discrete.\n- Step 2: But the spacing is tiny compared to the natural variation, so modelling as continuous gives a smooth, elegant description (e.g. normal bell curve) that a high-resolution discrete pmf would clumsily approximate.\n- Step 3: Continuous models also enable calculus tools — integration, differentiation — for tractable closed-form results. Far more powerful than case-by-case discrete computation.\n\nRule of thumb: when granularity ≪ spread, continuous models are more natural and more powerful.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": true}, {"question": "If a p.d.f. has a narrow, tall peak and symmetric heavy tails, how do variance and IQR compare? (3 steps)", "answer": "- Step 1: **Narrow peak**: most density is packed near the centre.\n- Step 2: **Heavy tails**: significant probability extends far from the centre, spread thinly. IQR captures only the middle 50% and is insensitive to this — IQR is small.\n- Step 3: Variance heavily penalises extremes (through squaring). Heavy tails inflate variance — potentially far more than IQR would suggest, and in extreme cases (e.g. Cauchy) variance is infinite while IQR stays finite.\n\nLesson: for heavy-tailed distributions, $$\\sigma$$ can mislead. IQR is more reliable as a \"typical scale\".", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": true}, {"question": "Describe what you see when you superimpose the graphs of $$f(x)$$ and $$F(x)$$. What do key features correspond to? (4 steps)", "answer": "- Step 1: Where $$f(x) = 0$$ (outside support or gaps): $$F$$ is flat. Zero-density regions = horizontal plateaus of $$F$$.\n- Step 2: Where $$f(x)$$ is large: $$F$$ has steep positive slope. Mode of $$f$$ = steepest point of $$F$$.\n- Step 3: Inflection points of $$F$$ correspond to local extrema of $$f$$. At the mode, $$F$$ transitions from accelerating to decelerating.\n- Step 4: Quantiles: median = $$x$$ where $$F = 0.5$$; quartiles at 0.25 and 0.75; percentiles at any level. Just trace horizontally at the target probability and drop to the $$x$$-axis.\n\nInternalising these correspondences lets you read $$F$$ graphs directly for most quantities.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": true}, {"question": "For $$f(x) = \\tfrac{3}{32}(4 - x^2)$$ on $$[-2, 2]$$, identify mode, mean, median, and sketch the shape — minimising integration. (4 steps)", "answer": "- Step 1: **Shape**: inverted parabola, zero at $$\\pm 2$$, peaks at $$x = 0$$ with $$f(0) = \\tfrac{3}{32}\\cdot 4 = \\tfrac{3}{8}$$. Symmetric about 0.\n- Step 2: **Mode = 0** (peak location).\n- Step 3: **Mean = Median = 0** by symmetry — no integration needed.\n- Step 4: **Support**: $$[-2,2]$$. C.d.f. is an S-curve from 0 at $$x=-2$$, passing through 0.5 at $$x=0$$, to 1 at $$x=2$$.\n\nTemplate: identify symmetry, read off mode from peak, deduce mean and median from symmetry axis.", "source": "Opus 4.7 ①", "_id": "opus_1_75", "judge_pick": true}, {"question": "Can the p.d.f. and c.d.f. ever have the same value at some point? Give an example and comment on the meaning. (3 steps)", "answer": "- Step 1: Yes. Example: uniform on $$[0,1]$$: $$f(x) = 1$$ (constant), $$F(x) = x$$. They're equal at $$x = 1$$ (both equal 1).\n- Step 2: In general, since $$F$$ climbs from 0 to 1 and $$f$$ is continuous, they can meet at isolated points by the intermediate value theorem — if the starting values differ.\n- Step 3: This equality has **no special meaning** — $$f$$ and $$F$$ are different kinds of objects (density vs cumulative probability). Comparing their numerical values is a curiosity; the meaningful relationship is $$F' = f$$.\n\nDon't over-interpret isolated pointwise equalities.", "source": "Opus 4.7 ①", "_id": "opus_1_76", "judge_pick": true}, {"question": "When is it faster to compute $$F$$ first vs solve for the median directly? (3 steps)", "answer": "- Step 1: **Find $$F$$ first** if: you'll also need other quantities (quartiles, percentiles, probabilities), or $$f$$ is easy to integrate once-for-all.\n- Step 2: **Integrate directly** for the median if: you only need the median, and $$f$$ is simple enough that $$\\int_{-\\infty}^m f\\,dx = 0.5$$ is quickly solvable — essentially the same work, just without writing out the full $$F$$ definition.\n- Step 3: In exams, if multiple quantities are asked of one distribution, computing $$F$$ upfront is strategic. Solo-quantile questions go either way.", "source": "Opus 4.7 ①", "_id": "opus_1_77", "judge_pick": true}, {"question": "Why does the pointwise value of $$f$$ at the support boundary not matter for probability calculations? (3 steps)", "answer": "- Step 1: Probabilities are integrals. Changing $$f$$ at a single point (measure-zero set) doesn't change the integral — integrals \"don't see\" individual points.\n- Step 2: So $$f(c)$$ at any specific $$c$$ is irrelevant for probabilities. Two functions differing only at boundary points define the *same* probability distribution.\n- Step 3: This explains why strict vs non-strict inequalities don't matter for continuous r.v.s, and why jump discontinuities in $$f$$ cause no issues: integrals smooth over them.\n\nSingle-point values of $$f$$ are cosmetic, not essential.", "source": "Opus 4.7 ①", "_id": "opus_1_78", "judge_pick": true}, {"question": "An exam asks: \"find the median given the piecewise c.d.f.\" What's your full strategy? (4 steps)", "answer": "- Step 1: Identify all pieces of $$F$$, including the 0 and 1 regions.\n- Step 2: Locate where $$F = 0.5$$: check $$F$$'s value at each boundary between pieces. If some boundary gives exactly 0.5, that's the median. Otherwise, identify the piece where $$F$$ crosses 0.5.\n- Step 3: Solve the equation $$F_i(x) = 0.5$$ using the correct piece's formula.\n- Step 4: Verify: the solution must lie in the intended interval for that piece. Discard any spurious solutions (e.g., from a quadratic giving two roots, only one valid).\n\nCommon pitfall: using the wrong piece yields a solution outside its range — signal to retry with the correct piece.", "source": "Opus 4.7 ①", "_id": "opus_1_79", "judge_pick": true}, {"question": "Prove the memoryless property of the exponential distribution: $$P(X > a+b \\mid X > a) = P(X > b)$$. (3 steps)", "answer": "- Step 1: For $$f(x) = \\lambda e^{-\\lambda x}$$ on $$x \\geq 0$$: $$P(X > a) = 1 - F(a) = e^{-\\lambda a}$$.\n- Step 2: Since $$\\{X > a+b\\} \\subset \\{X > a\\}$$ (for $$b > 0$$), $$P(X > a+b \\cap X > a) = P(X > a+b) = e^{-\\lambda(a+b)}$$. By Bayes: \n$$P(X>a+b\\mid X>a) = \\dfrac{e^{-\\lambda(a+b)}}{e^{-\\lambda a}} = e^{-\\lambda b}.$$\n- Step 3: And $$e^{-\\lambda b} = P(X > b)$$. So the conditional survival probability equals the unconditional one — memoryless ✓.\n\nInterpretation: conditional on surviving past $$a$$, the remaining wait is distributed identically to a fresh wait. Exponential is the *only* continuous distribution with this property.", "source": "Opus 4.7 ①", "_id": "opus_1_80", "judge_pick": true}, {"question": "Given $$F(x) = 4x^3 - 3x^4$$ on $$[0,1]$$ (0 before, 1 after), find the p.d.f. and mode. (3 steps)", "answer": "- Step 1: **P.d.f.**: $$f(x) = F'(x) = 12x^2 - 12x^3 = 12x^2(1 - x)$$ on $$[0,1]$$.\n- Step 2: Verify: $$f \\geq 0$$ on $$[0,1]$$ ✓; integrates to $$F(1) - F(0) = 1$$ ✓.\n- Step 3: **Mode**: $$f'(x) = 24x - 36x^2 = 12x(2 - 3x) = 0$$ gives $$x = 0$$ or $$x = 2/3$$. At $$x = 0$$, $$f = 0$$ (not max); at $$x = 2/3$$, $$f > 0$$ (max). **Mode $$= 2/3$$**.\n\nQuick path: differentiate $$F$$ to get $$f$$; differentiate again to find critical points.", "source": "Opus 4.7 ①", "_id": "opus_1_81", "judge_pick": false}, {"question": "Why is it often more informative to report median and IQR than mean and variance for real-world distributions? (3 steps)", "answer": "- Step 1: **Mean** is sensitive to extremes — a single huge outlier can shift it dramatically. For skewed or outlier-prone data, mean misleads about the \"typical\" value.\n- Step 2: **Median** is robust — it's the middle value, unaffected by extreme magnitudes (only positions relative to it). It always exists and is finite, even for heavy-tailed distributions with no finite mean.\n- Step 3: **Variance** is doubly sensitive to outliers (squaring); **IQR** ignores the outer 50% and is robust. Together, median + IQR give a robust centre-and-spread summary.\n\nPractical: income data, rainfall, waiting times — often reported as median/IQR, not mean/SD.", "source": "Opus 4.7 ①", "_id": "opus_1_82", "judge_pick": true}, {"question": "Misconception: \"The mode is always at the centre of the distribution.\" Why is this wrong? When might it be true? (3 steps)", "answer": "- Step 1: The mode is wherever $$f$$ is maximum — no a priori connection to any \"centre\" concept (mean, median, or midpoint of support).\n- Step 2: Counterexamples:\n+ $$f(x) = 2x$$ on $$[0,1]$$: mode at right boundary $$x = 1$$.\n+ Exponential $$f(t) = e^{-t}$$: mode at left boundary $$t = 0$$.\n+ Skewed distributions: mode away from centre.\n- Step 3: Mode = centre only for specific symmetric unimodal distributions (like normal). In general, mode can be anywhere.\n\nCorrect model: mode = point of highest density, period.", "source": "Opus 4.7 ①", "_id": "opus_1_83", "judge_pick": true}, {"question": "For $$f(x) = k(4x - x^3)$$ on $$[0,2]$$, walk through the full workflow: check validity, find $$k$$, mode, $$F$$, and median. (5 steps)", "answer": "- Step 1: **Non-negativity**: $$4x - x^3 = x(4-x^2) = x(2-x)(2+x)$$. On $$[0,2]$$, all three factors are $$\\geq 0$$ ✓.\n- Step 2: **Find $$k$$**: $$\\int_0^2(4x-x^3)\\,dx = [2x^2 - x^4/4]_0^2 = 8 - 4 = 4$$. So $$k = 1/4$$.\n- Step 3: **Mode**: $$f'(x) = k(4 - 3x^2) = 0 \\Rightarrow x = 2/\\sqrt{3} \\approx 1.15$$. Second derivative $$-6kx < 0$$, so it's a max. **Mode = $$2/\\sqrt 3$$**.\n- Step 4: **C.d.f.**: $$F(x) = \\tfrac{1}{4}[2t^2 - t^4/4]_0^x = x^2/2 - x^4/16$$ on $$[0,2]$$.\n- Step 5: **Median**: $$m^2/2 - m^4/16 = 0.5 \\Rightarrow m^4 - 8m^2 + 8 = 0$$. Quadratic in $$m^2$$: $$m^2 = 4 - 2\\sqrt{2} \\approx 1.17$$. So $$m \\approx 1.08$$.\n\nNote: mode ≈ 1.15 > median ≈ 1.08, indicating slight left skew.", "source": "Opus 4.7 ①", "_id": "opus_1_84", "judge_pick": true}, {"question": "Why is the c.d.f. of a continuous random variable always continuous, even though the p.d.f. can have jumps?", "answer": "$$F(x) = \\int_{-\\infty}^x f(t)\\,dt$$ is an integral of a bounded function. Integrals of bounded functions are continuous — small changes in the upper limit produce small changes in the integral. Quantitatively, $$F(x+\\Delta) - F(x) = \\int_x^{x+\\Delta} f\\,dt \\leq \\Delta \\cdot \\max_t f(t)$$, which shrinks to 0 as $$\\Delta \\to 0$$. So $$F$$ cannot jump.\n\nHowever, $$F$$ need not be *differentiable* everywhere: at a jump in $$f$$, $$F$$ has a corner (different left and right slopes). Corner yes, jump no.\n\nContrast: discrete r.v.s have c.d.f.s with jumps at each value $$x$$ where $$P(X = x) > 0$$. Continuity of $$F$$ is a defining feature of continuous distributions.", "source": "Opus 4.7 ①", "_id": "opus_1_85", "judge_pick": true}, {"question": "For the uniform on $$[0, L]$$, derive the variance conceptually using the computational formula. (3 steps)", "answer": "- Step 1: $$E(X) = L/2$$ by symmetry. $$E(X^2) = \\int_0^L x^2 \\cdot (1/L)\\,dx = (1/L)(L^3/3) = L^2/3$$.\n- Step 2: $$\\text{Var}(X) = E(X^2) - (E(X))^2 = L^2/3 - L^2/4 = (4L^2 - 3L^2)/12 = L^2/12$$.\n- Step 3: For uniform on $$[a,b]$$, similarly $$\\text{Var} = (b-a)^2/12$$ — a memorable fingerprint. The uniform is the maximum-entropy distribution on $$[a,b]$$, i.e., it uses all available \"room\" to spread probability.", "source": "Opus 4.7 ①", "_id": "opus_1_86", "judge_pick": false}, {"question": "A student argues: \"$$E(X)$$ is a number, so $$E(X^2) = E(X) \\cdot E(X)$$.\" What's the flaw? (3 steps)", "answer": "- Step 1: The flaw is confusing $$E(X \\cdot X) = E(X^2)$$ with $$E(X) \\cdot E(X) = (E(X))^2$$.\n- Step 2: Expectation is linear but **not multiplicative** in general: $$E(XY) \\neq E(X)E(Y)$$ unless $$X$$ and $$Y$$ are independent. But $$X$$ is certainly not independent of itself (it's perfectly correlated with itself).\n- Step 3: Concrete example: $$X$$ takes values 1 or 3 with equal probability. $$E(X) = 2$$, $$(E(X))^2 = 4$$. But $$E(X^2) = (1+9)/2 = 5 \\neq 4$$. The difference, 1, is exactly $$\\text{Var}(X)$$.\n\nLinearity ≠ multiplicativity. Expectations of products require independence to factor.", "source": "Opus 4.7 ①", "_id": "opus_1_87", "judge_pick": true}], "count": 88}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What fundamentally distinguishes a continuous random variable from a discrete one, in terms of the values it can take and the probability assigned to any specific value? (3 steps)", "answer": "- Step 1: A discrete random variable can only take a countable set of values (e.g., 0, 1, 2, ..., or the integers in some range). For each such value, we can assign a non-zero probability, and these probabilities sum to 1.\n- Step 2: A continuous random variable can take any value in an interval (or union of intervals) of the real line — i.e., uncountably many values. Examples: the exact height of a person, the angle a dart lands at on a dartboard, the time a phone call lasts.\n- Step 3: The striking consequence is that for a continuous random variable $$X$$, the probability of taking any *specific* value is $$\\mathrm{P}(X=c) = 0$$. If you spread a total probability of 1 across an uncountable infinity of points, each point must get 0. Instead, probability is only meaningful for *ranges* of values, like $$\\mathrm{P}(a < X < b)$$.\n\nTakeaway: discrete = probability at each point; continuous = probability over intervals.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "For a continuous random variable $$X$$, why is $$\\mathrm{P}(X = c) = 0$$ for any specific value $$c$$, and what does this imply about using tables to describe such a distribution? (3 steps)", "answer": "- Step 1: A continuous RV can take uncountably many values in an interval. If we tried to assign a positive probability to each value, the total would be infinite — violating the requirement that probabilities sum to 1.\n- Step 2: Hence, each individual point is assigned probability zero. This is not the same as \"impossible\" — it just means the probability mass is infinitesimally thin at any one point.\n- Step 3: Because of this, we cannot describe the distribution with a table like we do for discrete RVs. Instead we need a *density* (probability per unit $$x$$) so that probability over an interval equals the integral (accumulated density) over that interval.\n\nThe key leap: from \"probability at a point\" to \"probability per unit length\", integrated over a range.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "If $$\\mathrm{P}(X = c) = 0$$ for every specific value $$c$$, how can a continuous random variable produce any probabilities at all when we observe it? (3 steps)", "answer": "- Step 1: The paradox dissolves once you realise we never actually ask \"what is the probability of $$X$$ being *exactly* $$c$$?\" in a meaningful measurement — instruments have finite precision, so we're really asking about a small interval around $$c$$.\n- Step 2: Probability for a continuous RV is meaningful only over intervals: $$\\mathrm{P}(a < X < b) = \\int_a^b f(x)\\,dx$$ where $$f$$ is the probability density function. The width of the interval, combined with the height of the density, produces non-zero probability.\n- Step 3: Analogy: a line has zero area but a rectangle has non-zero area. Similarly, a single point has zero probability but an interval has positive probability. \"Density times width = probability\" is the mental picture.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "State the three defining conditions for a function $$f(x)$$ to be a valid probability density function (p.d.f.) of a continuous random variable, and briefly explain the role of each. (3 steps)", "answer": "- Step 1: **Non-negativity**: $$f(x) \\geq 0$$ for all $$x \\in \\mathbb{R}$$. Since probabilities cannot be negative, and $$f$$ represents probability density (probability per unit $$x$$), it must be non-negative everywhere.\n- Step 2: **Normalisation**: $$\\int_{-\\infty}^{\\infty} f(x)\\,dx = 1$$. The total probability over all possible outcomes must be 1 — i.e., something must happen. The total area under the p.d.f. is 1.\n- Step 3: **Probability from area**: $$\\mathrm{P}(a < X < b) = \\int_a^b f(x)\\,dx$$. Probability over any interval equals the area under the density curve over that interval.\n\nIn practice, $$f$$ is often non-zero only on a bounded interval, so we only integrate where it matters.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Why is $$f(x) \\geq 0$$ a fundamental requirement for a probability density function, and what would go wrong if $$f$$ dipped below zero somewhere? (3 steps)", "answer": "- Step 1: The p.d.f. is not itself a probability — but the integral $$\\int_a^b f(x)\\,dx$$ must give a probability, which has to lie in $$[0, 1]$$.\n- Step 2: If $$f(x) < 0$$ on some interval, then $$\\mathrm{P}(X \\in \\text{that interval}) < 0$$ — a negative probability, which is meaningless.\n- Step 3: Even if the function's *total integral* equals 1, having a region where $$f < 0$$ would mean probability is \"cancelled out\" on some subinterval — there's no physical or mathematical interpretation. So $$f$$ must be non-negative everywhere.\n\nThis is why a function like $$f(x) = x^3 - 2$$ on $$[-1, 3]$$ cannot be a p.d.f. — it takes negative values near $$x = -1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "Why must the total area under a probability density function equal exactly 1, and what goes wrong if it doesn't? (3 steps)", "answer": "- Step 1: The total area represents the probability that $$X$$ takes *some* value — i.e., $$\\mathrm{P}(-\\infty < X < \\infty)$$. This must equal 1 because in every observation, $$X$$ takes *some* real value (the outcome space is certain to occur).\n- Step 2: If the area is less than 1, probability is \"missing\" — some outcomes aren't accounted for.\n- Step 3: If the area is greater than 1, we have \"excess probability\", which violates the basic rule that probability cannot exceed 1.\n\nThis is why we scale functions by a constant $$k$$ — to *force* the integral to equal 1.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "The p.d.f. $$f(x)$$ can take values greater than 1 (e.g., $$f(x) = 4$$ at some point). Why is this allowed, despite probabilities being bounded by 1? (3 steps)", "answer": "- Step 1: The p.d.f. is a *density* — probability per unit $$x$$ — not a probability itself.\n- Step 2: Only the integral $$\\int_a^b f(x)\\,dx$$ gives a probability, which is bounded by 1.\n- Step 3: A high density value over a narrow interval can still yield a small probability. For example, $$f(x) = 4$$ over an interval of width $$0.1$$ gives probability $$4 \\times 0.1 = 0.4$$ — well under 1.\n\nAnalogy: mass per unit volume (density) can be huge for a small dense object; only total mass is bounded by the object's total size.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "For a continuous random variable, why does it make no difference whether we write $$\\mathrm{P}(a < X < b)$$ or $$\\mathrm{P}(a \\leq X \\leq b)$$? (2 steps)", "answer": "- Step 1: The only difference between the two expressions is whether the endpoints $$a$$ and $$b$$ are included. This difference amounts to $$\\mathrm{P}(X = a)$$ and $$\\mathrm{P}(X = b)$$.\n- Step 2: For a continuous RV, $$\\mathrm{P}(X = a) = 0$$ and $$\\mathrm{P}(X = b) = 0$$, so including or excluding endpoints adds zero. Hence $$\\mathrm{P}(a < X < b) = \\mathrm{P}(a \\leq X \\leq b) = \\mathrm{P}(a < X \\leq b) = \\mathrm{P}(a \\leq X < b)$$.\n\nThis is a sharp contrast with discrete RVs, where including or excluding endpoints can change the probability significantly.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "A function is defined by $$f(x) = x^2$$ on $$[1, 3]$$ and zero elsewhere. Without elaborate calculation, explain why this cannot be a p.d.f. (3 steps)", "answer": "- Step 1: Check whether $$\\int_1^3 x^2\\,dx$$ equals 1. We have $$\\int_1^3 x^2\\,dx = \\frac{x^3}{3}\\Big|_1^3 = \\frac{27-1}{3} = \\frac{26}{3} \\approx 8.67$$.\n- Step 2: Since the total area is much greater than 1, this function cannot represent a valid probability distribution — total probability would exceed 1.\n- Step 3: To make it valid, we would need a scaling constant $$k$$ with $$k \\cdot \\frac{26}{3} = 1$$, i.e., $$k = \\frac{3}{26}$$. Only after scaling does the function integrate to 1.\n\nThe lesson: any non-negative function can be *rescaled* to become a p.d.f. — but the raw function rarely satisfies normalisation on its own.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "A student proposes $$f(x) = k(x^3 - 2)$$ for $$-1 \\leq x \\leq 3$$ as a p.d.f. for some positive constant $$k$$. Explain why no choice of $$k > 0$$ makes this valid. (3 steps)", "answer": "- Step 1: For $$f$$ to be valid, we need $$f(x) \\geq 0$$ for all $$x$$ in the support $$[-1, 3]$$.\n- Step 2: Check the sign of $$x^3 - 2$$ on this interval. At $$x = -1$$: $$-1 - 2 = -3 < 0$$. At $$x = 0$$: $$0 - 2 = -2 < 0$$. At $$x = \\sqrt[3]{2} \\approx 1.26$$: zero. Then positive for $$x > \\sqrt[3]{2}$$.\n- Step 3: So for any $$k > 0$$, $$f$$ is negative on part of the support. Multiplying by a positive constant preserves the sign of the output — no positive scaling can fix negativity. Hence no valid $$k$$ exists.\n\nTo salvage it, you'd need to shift the function so it's non-negative, or restrict the domain.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "For a piecewise-defined p.d.f., what does the normalisation condition $$\\int f(x)\\,dx = 1$$ look like in practice, and why can you usually ignore most of the real line? (3 steps)", "answer": "- Step 1: A p.d.f. is typically non-zero only on a bounded interval (say $$[a, b]$$). Outside this interval, $$f(x) = 0$$, contributing nothing to any integral.\n- Step 2: So $$\\int_{-\\infty}^\\infty f(x)\\,dx = 1$$ reduces to $$\\int_a^b f(x)\\,dx = 1$$ — only the \"active\" region matters.\n- Step 3: If the p.d.f. is piecewise, say $$f = f_1$$ on $$[a, c]$$ and $$f = f_2$$ on $$[c, b]$$, then $$\\int_a^c f_1(x)\\,dx + \\int_c^b f_2(x)\\,dx = 1$$. Each piece is integrated over its sub-interval and the results summed.\n\nAlways ask: where is $$f$$ non-zero? That's your integration range.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "How does the cumulative distribution function $$F(x)$$ relate to the probability density function $$f(x)$$ of a continuous random variable, both in definition and intuition? (3 steps)", "answer": "- Step 1: By definition, $$F(x) = \\mathrm{P}(X \\leq x) = \\int_{-\\infty}^x f(t)\\,dt$$. So $$F(x)$$ is the accumulated probability from $$-\\infty$$ up to $$x$$ — the area under $$f$$ to the left of $$x$$.\n- Step 2: As $$x$$ increases, more area is swept up, so $$F$$ is non-decreasing. It starts at $$F(-\\infty) = 0$$ (no area yet) and ends at $$F(\\infty) = 1$$ (total area captured).\n- Step 3: Intuitively, $$f$$ tells you \"how fast\" probability accumulates at each point, and $$F$$ tells you \"how much\" has accumulated up to that point. Mathematically, $$f$$ is the derivative of $$F$$: $$f(x) = \\frac{d}{dx}F(x)$$.\n\nDensity and cumulative are two views of the same distribution — rate vs total.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "What are the values of $$F(-\\infty)$$ and $$F(\\infty)$$ for any continuous random variable, and why must these hold? (2 steps)", "answer": "- Step 1: $$F(-\\infty) = \\mathrm{P}(X \\leq -\\infty) = 0$$. There's no way for $$X$$ to be less than or equal to something infinitely negative — no probability has accumulated yet.\n- Step 2: $$F(\\infty) = \\mathrm{P}(X \\leq \\infty) = 1$$. It is certain that $$X$$ is less than or equal to something infinitely large — all probability has been captured.\n\nThese are the two endpoints of any c.d.f. and reflect the total probability mass being 1.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Why is the cumulative distribution function $$F(x)$$ always non-decreasing, and what does this property encode about probability? (3 steps)", "answer": "- Step 1: As $$x$$ increases, the interval $$(-\\infty, x]$$ grows — it contains all earlier intervals. So the probability $$\\mathrm{P}(X \\leq x)$$ can only stay the same or grow.\n- Step 2: Formally: $$F'(x) = f(x) \\geq 0$$, since the p.d.f. is non-negative. A function with non-negative derivative is non-decreasing.\n- Step 3: Intuitively: you can only *add* probability as your window widens; you can never subtract probability. If $$f = 0$$ on some region, $$F$$ is flat there (no new probability accumulating).\n\nMonotonicity is the mathematical fingerprint of probability's non-negativity.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Explain the two common methods for finding the cumulative distribution function $$F(x)$$ given a p.d.f. $$f(x)$$, and when each is more convenient. (3 steps)", "answer": "- Step 1: **Method 1 (definite integral)**: Compute $$F(x) = \\int_{a}^{x} f(t)\\,dt$$ where $$a$$ is the lower limit of the p.d.f.'s support. This automatically gives $$F(a) = 0$$ at the lower end.\n- Step 2: **Method 2 (indefinite integral + constant)**: Compute $$\\int f(x)\\,dx = G(x) + c$$, then find $$c$$ using a boundary condition. Typically use $$F(a) = 0$$ at the lower end or $$F(b) = 1$$ at the upper end.\n- Step 3: Both give the same result. Method 1 is cleaner when limits are simple; Method 2 is often easier for piecewise p.d.f.s because you can solve for each piece's constant independently.\n\nWhichever method you use, remember to state $$F(x) = 0$$ below the support and $$F(x) = 1$$ above it — this is the \"full\" definition.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "When finding the c.d.f. of a piecewise p.d.f., why must you \"carry over\" the value at the previous boundary when integrating each new piece? (3 steps)", "answer": "- Step 1: The c.d.f. is defined cumulatively: $$F(x) = \\mathrm{P}(X \\leq x)$$. It counts *all* probability up to $$x$$, not just the probability within the current piece.\n- Step 2: Suppose the p.d.f. is defined on $$[a, c] \\cup [c, b]$$. For $$x \\in [c, b]$$: $$F(x) = \\int_{a}^{c} f(t)\\,dt + \\int_{c}^{x} f(t)\\,dt = F(c) + \\int_{c}^{x} f(t)\\,dt$$.\n- Step 3: If you forget $$F(c)$$ and integrate only within the current piece, you undercount — missing probability from earlier pieces. The c.d.f. must be continuous across boundaries (since probability doesn't \"jump\" for continuous RVs), and carrying over $$F(c)$$ ensures this.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "Given a cumulative distribution function $$F(x)$$, how do you recover the probability density function $$f(x)$$, and what does this say conceptually about the two functions? (3 steps)", "answer": "- Step 1: Use $$f(x) = \\frac{d}{dx}F(x)$$. Differentiate $$F$$ to get $$f$$.\n- Step 2: For a piecewise $$F$$, differentiate piece by piece. Where $$F$$ is constant (e.g., $$F = 0$$ for $$x < a$$, or $$F = 1$$ for $$x > b$$), the derivative is 0, so $$f(x) = 0$$ there.\n- Step 3: Conceptually, $$F$$ is the running total of probability and $$f$$ is the rate at which probability is being added. Differentiation recovers the rate from the total — this is the fundamental theorem of calculus applied to probability.\n\nA flat $$F$$ means no new probability is being added there — hence $$f = 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Why do we use the dummy variable $$t$$ (rather than $$x$$) inside the integral when writing $$F(x) = \\int_{-\\infty}^x f(t)\\,dt$$? (3 steps)", "answer": "- Step 1: The variable $$x$$ appears as the upper limit of integration — it's the value we're computing the cumulative probability *at*.\n- Step 2: The variable inside the integrand is a dummy — a placeholder for the variable being integrated over. If we reused $$x$$, we'd have $$x$$ playing two conflicting roles: the limit and the integration variable.\n- Step 3: To keep these distinct, we rename the integration variable to $$t$$ (or any other letter). This is convention, not necessity, but prevents real confusion in written work.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "If you know the c.d.f. $$F(x)$$ of a continuous random variable, how can you quickly compute $$\\mathrm{P}(a < X < b)$$ without needing the p.d.f.? (2 steps)", "answer": "- Step 1: Use the identity $$\\mathrm{P}(a < X < b) = F(b) - F(a)$$. Conceptually, this is \"total probability up to $$b$$\" minus \"total probability up to $$a$$\", leaving the probability between $$a$$ and $$b$$.\n- Step 2: This is much faster than integrating the p.d.f. from $$a$$ to $$b$$, since $$F$$ has already \"done the integration\". For multiple probability queries, it's especially efficient to derive $$F$$ once and reuse it.\n\nThink of $$F$$ as a pre-computed lookup table for cumulative area.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Why does $$\\mathrm{P}(X = c) = 0$$ for a continuous RV, when expressed using the c.d.f., and what does this look like geometrically? (3 steps)", "answer": "- Step 1: Using the c.d.f., $$\\mathrm{P}(X = c) = F(c) - F(c^-)$$, where $$F(c^-)$$ denotes the left-hand limit.\n- Step 2: For a continuous RV, $$F$$ is continuous (no jumps). So $$F(c) = F(c^-)$$, giving $$F(c) - F(c^-) = 0$$.\n- Step 3: Geometrically, a continuous c.d.f. rises smoothly — no vertical \"jumps\". Any single point has zero vertical extent on the graph. Discrete distributions, by contrast, have step-function c.d.f.s with jumps of size $$\\mathrm{P}(X = c)$$ at each mass point.\n\nContinuity of $$F$$ ⟺ no point masses ⟺ continuous RV.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Sketch the general shape of the c.d.f. of a continuous random variable whose p.d.f. is non-zero only on $$[a, b]$$. What are the key features? (3 steps)", "answer": "- Step 1: For $$x < a$$: $$F(x) = 0$$ (horizontal line along the x-axis).\n- Step 2: For $$a \\leq x \\leq b$$: $$F$$ rises smoothly from 0 to 1. The rate of rise at each point equals $$f(x)$$ — steep where the density is high, gentle where the density is low.\n- Step 3: For $$x > b$$: $$F(x) = 1$$ (horizontal line at height 1).\n+ $$F$$ is continuous (no jumps).\n+ $$F$$ is non-decreasing everywhere.\n+ The \"S-shaped\" region of rise between $$a$$ and $$b$$ captures the entire probability mass.\n\nThe c.d.f. is always bounded between 0 and 1 and never decreases.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "State the formula for the expected value (mean) of a continuous random variable $$X$$ with p.d.f. $$f(x)$$, and explain the intuition by analogy with the discrete case. (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(X) = \\int_{-\\infty}^{\\infty} x\\,f(x)\\,dx$$.\n- Step 2: Compare with discrete: $$\\mathrm{E}(X) = \\sum_i x_i\\,\\mathrm{P}(X = x_i)$$. Each value $$x_i$$ is weighted by its probability.\n- Step 3: In the continuous case, the sum becomes an integral, and the probability at each point becomes a *density* $$f(x)\\,dx$$. So $$x\\,f(x)\\,dx$$ is the contribution of the tiny interval around $$x$$, and we integrate all contributions.\n\nMean = average value, weighted by how likely each value is — same idea, different machinery.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Conceptually, why does the integrand for $$\\mathrm{E}(X)$$ multiply $$x$$ by $$f(x)$$, and why not just integrate $$f(x)$$ or just $$x$$ alone? (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(X)$$ is a *weighted average* — values of $$x$$ weighted by how much probability mass is in their vicinity.\n- Step 2: Integrating $$f(x)$$ alone gives 1 (total probability) — no information about which values $$X$$ takes.\n- Step 3: Integrating $$x$$ alone treats all $$x$$-values as equally weighted, ignoring the distribution.\n+ Multiplying $$x \\cdot f(x)$$ ensures that values of $$x$$ where probability is concentrated contribute more to the average.\n+ The resulting integral is the \"centre of mass\" of the probability distribution, if you think of $$f(x)$$ as a mass density.\n\nMean is the balance point of the distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "State the two equivalent formulas for the variance of a continuous random variable, and explain why the second form is usually preferred in practice. (3 steps)", "answer": "- Step 1: **Definitional form**: $$\\mathrm{Var}(X) = \\int_{-\\infty}^{\\infty} (x - \\mu)^2 f(x)\\,dx$$, where $$\\mu = \\mathrm{E}(X)$$. This directly captures \"average squared deviation from the mean\".\n- Step 2: **Computational form**: $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - \\mu^2 = \\int x^2 f(x)\\,dx - \\mu^2$$.\n- Step 3: The computational form is usually preferred because:\n+ It doesn't require computing $$(x - \\mu)^2$$ inside the integral, which is messier.\n+ You just compute two integrals: $$\\int x\\,f(x)\\,dx$$ and $$\\int x^2 f(x)\\,dx$$.\n+ Avoids errors from expanding $$(x - \\mu)^2$$ by hand.\n\nBoth give the same answer; choose based on which integrals are easier.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Derive the identity $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2$$ from the definition $$\\mathrm{Var}(X) = \\mathrm{E}((X-\\mu)^2)$$. (4 steps)", "answer": "- Step 1: Start from the definition: $$\\mathrm{Var}(X) = \\int (x-\\mu)^2 f(x)\\,dx$$.\n- Step 2: Expand the square: $$(x-\\mu)^2 = x^2 - 2\\mu x + \\mu^2$$.\n- Step 3: Split the integral using linearity:\n+ $$\\int x^2 f(x)\\,dx = \\mathrm{E}(X^2)$$\n+ $$\\int 2\\mu x f(x)\\,dx = 2\\mu \\int x f(x)\\,dx = 2\\mu \\cdot \\mu = 2\\mu^2$$\n+ $$\\int \\mu^2 f(x)\\,dx = \\mu^2 \\int f(x)\\,dx = \\mu^2 \\cdot 1 = \\mu^2$$\n- Step 4: Combine: $$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - 2\\mu^2 + \\mu^2 = \\mathrm{E}(X^2) - \\mu^2$$.\n\nThe key tricks: $$\\int f(x)\\,dx = 1$$ and $$\\int x f(x)\\,dx = \\mu$$.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "State the general formula for $$\\mathrm{E}(g(X))$$ for a continuous random variable $$X$$, and give concrete examples of where this formula is used. (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(g(X)) = \\int_{-\\infty}^{\\infty} g(x) f(x)\\,dx$$ for any function $$g$$.\n- Step 2: This is the \"law of the unconscious statistician\" — you compute the mean of a transformed variable $$g(X)$$ without first finding the p.d.f. of $$Y = g(X)$$. Just integrate $$g(x)$$ against the original density $$f(x)$$.\n- Step 3: Applications:\n+ $$g(x) = x^2$$ gives $$\\mathrm{E}(X^2)$$, needed for variance.\n+ $$g(x) = x^3$$ gives $$\\mathrm{E}(X^3)$$, e.g., expected volume if $$X$$ is a side length.\n+ $$g(x) = aX + b$$ gives the mean of a linear transformation.\n+ $$g(x) = \\ln x$$ or $$g(x) = e^x$$ gives moments for log-based analyses.\n\nEvery value of $$X$$ gets transformed by $$g$$, then weighted by $$f(x)\\,dx$$.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Prove that $$\\mathrm{E}(aX + b) = a\\mathrm{E}(X) + b$$ for a continuous random variable $$X$$. (3 steps)", "answer": "- Step 1: Apply the formula for $$\\mathrm{E}(g(X))$$ with $$g(x) = ax + b$$: $$\\mathrm{E}(aX+b) = \\int (ax+b) f(x)\\,dx$$.\n- Step 2: Split the integral: $$= a \\int x f(x)\\,dx + b \\int f(x)\\,dx$$.\n- Step 3: Recognise each integral:\n+ $$\\int x f(x)\\,dx = \\mathrm{E}(X)$$\n+ $$\\int f(x)\\,dx = 1$$ (total probability)\n+ So $$\\mathrm{E}(aX+b) = a\\mathrm{E}(X) + b$$.\n\nIntuition: scaling $$X$$ by $$a$$ scales the mean by $$a$$; shifting $$X$$ by $$b$$ shifts the mean by $$b$$. Mean responds linearly to linear transformations.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Prove that $$\\mathrm{Var}(aX + b) = a^2 \\mathrm{Var}(X)$$, and explain why the constant $$b$$ disappears. (4 steps)", "answer": "- Step 1: Let $$Y = aX + b$$. Then $$\\mathrm{E}(Y) = a\\mathrm{E}(X) + b = a\\mu + b$$.\n- Step 2: Apply the definition: $$\\mathrm{Var}(Y) = \\mathrm{E}((Y - \\mathrm{E}(Y))^2)$$.\n- Step 3: Substitute: $$Y - \\mathrm{E}(Y) = (aX + b) - (a\\mu + b) = a(X - \\mu)$$. So $$(Y - \\mathrm{E}(Y))^2 = a^2(X - \\mu)^2$$.\n- Step 4: Take expectation: $$\\mathrm{Var}(Y) = \\mathrm{E}(a^2(X-\\mu)^2) = a^2 \\mathrm{E}((X-\\mu)^2) = a^2 \\mathrm{Var}(X)$$.\n\nWhy $$b$$ disappears: adding a constant shifts the whole distribution but doesn't change its *spread*. Variance measures spread, so it's shift-invariant. Scaling by $$a$$ stretches/squashes the spread, so variance scales by $$a^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Intuitively, why does adding a constant not change the variance of a random variable, while multiplying by $$a$$ multiplies the variance by $$a^2$$ (not $$|a|$$)? (3 steps)", "answer": "- Step 1: Variance measures spread — how far values typically deviate from the mean. Adding $$b$$ slides the entire distribution (and its mean) rightwards by $$b$$, but the shape and spread are unchanged. So $$\\mathrm{Var}(X+b) = \\mathrm{Var}(X)$$.\n- Step 2: Multiplying by $$a$$ stretches the distribution by factor $$a$$. Each deviation from the mean becomes $$a$$ times larger. But variance is the *average squared* deviation, so squared deviations scale by $$a^2$$.\n- Step 3: This is also why standard deviation scales by $$|a|$$ (not $$a^2$$): SD is the square root of variance, and $$\\sqrt{a^2} = |a|$$.\n+ $$\\mathrm{SD}(aX + b) = |a|\\,\\mathrm{SD}(X)$$\n+ $$\\mathrm{Var}(aX + b) = a^2\\,\\mathrm{Var}(X)$$\n\nLesson: shifts are invisible to variance; scales are magnified quadratically.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "Why is $$\\mathrm{E}(X^2) \\neq (\\mathrm{E}(X))^2$$ in general, and what does the difference represent? (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(X^2)$$ is the average of $$X^2$$ (square first, then average), while $$(\\mathrm{E}(X))^2$$ is the square of the average (average first, then square). These are generally different.\n- Step 2: By Jensen's inequality, for any non-constant $$X$$: $$\\mathrm{E}(X^2) > (\\mathrm{E}(X))^2$$. Squaring is a convex function, so averaging after squaring gives a larger result.\n- Step 3: The difference is exactly the variance:\n$$\\mathrm{Var}(X) = \\mathrm{E}(X^2) - (\\mathrm{E}(X))^2 \\geq 0$$.\n+ If $$X$$ is a constant, both sides are equal (variance zero).\n+ The more spread out $$X$$, the larger the gap.\n\nPractical warning: never substitute $$\\mathrm{E}(X^2)$$ for $$(\\mathrm{E}(X))^2$$ — they differ by exactly the variance.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "If a continuous random variable $$X$$ has a probability density function symmetric about the line $$x = c$$, what can you immediately say about $$\\mathrm{E}(X)$$, and why? (3 steps)", "answer": "- Step 1: By symmetry of $$f$$ about $$x = c$$, for every value $$x = c + t$$ (at distance $$t$$ to the right of $$c$$), there is a matched value $$x = c - t$$ at equal distance to the left, with equal density: $$f(c+t) = f(c-t)$$.\n- Step 2: In the integral $$\\mathrm{E}(X) = \\int x f(x)\\,dx$$, each paired contribution averages to $$c$$: the value $$c+t$$ weighted by $$f(c+t)$$ and $$c-t$$ weighted by the same density together give $$\\frac{(c+t) + (c-t)}{2} = c$$.\n- Step 3: So $$\\mathrm{E}(X) = c$$ exactly. The mean is the axis of symmetry.\n\nThis shortcut saves significant work — always check symmetry first. It also implies median = mean for symmetric distributions.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Imagine a continuous RV $$X$$ models the random side length of a cube. You know the p.d.f. $$f(x)$$. What does the expected volume of the cube equal, and why is it *not* $$(\\mathrm{E}(X))^3$$? (3 steps)", "answer": "- Step 1: The volume is $$V = X^3$$, so the expected volume is $$\\mathrm{E}(V) = \\mathrm{E}(X^3) = \\int x^3 f(x)\\,dx$$ (using the formula for $$\\mathrm{E}(g(X))$$).\n- Step 2: In general, $$\\mathrm{E}(X^3) \\neq (\\mathrm{E}(X))^3$$. Cubing is non-linear, so \"average of the cube\" ≠ \"cube of the average\".\n+ Large values of $$X$$ get amplified disproportionately by cubing, pulling the average upward.\n- Step 3: Example: if $$X$$ takes values 1 and 3 with equal probability, $$\\mathrm{E}(X) = 2$$, so $$(\\mathrm{E}(X))^3 = 8$$. But $$\\mathrm{E}(X^3) = \\frac{1 + 27}{2} = 14$$. The two differ substantially.\n\nLesson: for any non-linear function, integrate $$g(x) f(x)$$ directly — you cannot just plug in the mean.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Define the mode of a continuous random variable, and describe the two main methods for finding it. (3 steps)", "answer": "- Step 1: **Definition**: The mode is the value(s) of $$x$$ at which the probability density function $$f(x)$$ attains its maximum. It's the \"most likely\" value in the sense of highest density.\n- Step 2: **Method 1 (calculus)**: If $$f$$ is differentiable, solve $$f'(x) = 0$$ and check $$f''(x) < 0$$ (or sign change) to confirm a maximum. Also check endpoints of the support.\n- Step 3: **Method 2 (sketch-based)**: For piecewise-linear or simple p.d.f.s, sketch the graph — the mode is at the peak. Often the mode lies at a boundary point where $$f$$ is highest (e.g., for $$f(y) = 2y$$ on $$[0,1]$$, the mode is $$y = 1$$).\n\nAlways check endpoints! If $$f$$ is monotonic, the max is at an endpoint — the derivative test won't find it.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "For a probability density function $$f(y) = 2y$$ on $$[0, 1]$$, why is the mode at $$y = 1$$ (the endpoint) rather than where $$f'(y) = 0$$? (3 steps)", "answer": "- Step 1: Here $$f(y) = 2y$$ is linear and strictly increasing on $$[0, 1]$$. Its derivative $$f'(y) = 2$$ is never zero — there's no interior critical point.\n- Step 2: Since $$f$$ is strictly increasing on $$[0, 1]$$, it attains its maximum at the right endpoint: $$f(1) = 2$$ is the highest value.\n- Step 3: So the mode is $$y = 1$$. The critical-point method doesn't apply — we must check endpoints.\n\nGeneral lesson: the mode is simply where $$f$$ is largest. If $$f$$ is monotonic, the max is at an endpoint. Sketching $$f$$ avoids this pitfall.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "Is it true that the mode of a continuous distribution must lie near the \"middle\" of the support? Explain. (3 steps)", "answer": "- Step 1: No — the mode can be anywhere: at the centre, at an endpoint, or off-centre. The mode is wherever $$f$$ is largest; it has no requirement to be geometrically central.\n- Step 2: Examples:\n+ For $$f(y) = 2y$$ on $$[0,1]$$: mode at $$y = 1$$ (right endpoint).\n+ For $$f(x) = 12x^2(1-x)$$ on $$[0,1]$$: mode at $$x = 2/3$$ (not at midpoint $$1/2$$).\n+ For a symmetric bell-shape: mode at the centre.\n- Step 3: Mode, mean, and median are three distinct measures of location. For non-symmetric distributions, they can be far apart. The mode tells you where density peaks; it doesn't indicate balance or a halfway point.\n\nAlways let the graph of $$f$$ — not intuition about \"middle\" — determine the mode.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Given the c.d.f. $$F(x)$$ of a continuous random variable, define the median, lower quartile, upper quartile, and $$n$$th percentile. (3 steps)", "answer": "- Step 1: **Median** $$m$$: the value such that $$F(m) = 0.5$$ — half the probability is at or below $$m$$, half above.\n- Step 2: **Quartiles**:\n+ Lower quartile $$Q_1$$: $$F(Q_1) = 0.25$$\n+ Upper quartile $$Q_3$$: $$F(Q_3) = 0.75$$\n+ Interquartile range: $$\\mathrm{IQR} = Q_3 - Q_1$$, measuring spread of the middle 50%.\n- Step 3: **$$n$$th percentile** $$P_n$$: the value such that $$F(P_n) = n/100$$. So the 10th percentile is where cumulative probability reaches 0.10, etc.\n\nThe unifying idea: these are all *inverse c.d.f.* values — given a probability, find the $$x$$ that captures that much area.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "For a piecewise c.d.f. $$F(x)$$, how do you determine which piece of the function contains the median, and why is this step important before solving $$F(x) = 0.5$$? (3 steps)", "answer": "- Step 1: Evaluate $$F$$ at each boundary of the piecewise definition. For example, if $$F$$ is piecewise on $$[a, c] \\cup [c, b]$$, compute $$F(c)$$.\n- Step 2: Compare $$F(c)$$ with 0.5:\n+ If $$F(c) < 0.5$$, the median lies in the *upper* piece.\n+ If $$F(c) > 0.5$$, the median lies in the *lower* piece.\n+ If $$F(c) = 0.5$$, the median is exactly $$c$$.\n- Step 3: If you use the wrong piece's expression, you'll get a solution outside that piece's range (which must be rejected) or a spurious answer. Identifying the correct piece first avoids error.\n\nThe same logic applies to quartiles and percentiles.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "When solving $$F(x) = 0.5$$ for the median of a continuous RV, if the resulting equation has multiple solutions (e.g., a quadratic with two roots), how do you decide which is correct? (2 steps)", "answer": "- Step 1: Only one root can lie within the support of the distribution (where $$F$$ is strictly increasing from 0 to 1). Roots outside this range are extraneous.\n- Step 2: Check each root against the interval where you expected the median to lie (using the piecewise analysis). The root in the valid interval is the median; the other is discarded.\n\nExample: solving a quadratic gives $$m = 1.31$$ or $$m = 0.541$$. If the support is $$[0, 1]$$, only $$m = 0.541$$ is valid.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "For a symmetric probability density function, explain why the median must equal the mean, and what that implies about the axis of symmetry. (3 steps)", "answer": "- Step 1: If $$f$$ is symmetric about $$x = c$$, the cumulative area to the left of $$c$$ exactly balances the area to the right (both equal 0.5).\n- Step 2: So $$F(c) = 0.5$$ — by definition, $$c$$ is the median.\n- Step 3: Also, by the symmetry argument for expectations, $$\\mathrm{E}(X) = c$$. Hence mean = median = $$c$$ = axis of symmetry. If there's a unique mode (e.g., at the axis), it's also at $$c$$.\n\nFor a symmetric unimodal distribution: the three classical measures of location coincide.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "For asymmetric (skewed) distributions, what is the typical ordering of mean, median, and mode, and what causes this ordering? (3 steps)", "answer": "- Step 1: For a **right-skewed** (positively skewed) distribution — long tail to the right:\n+ Mode is where density peaks (often leftward).\n+ Mean is pulled to the right by the long tail.\n+ Median is between them: $$\\text{mode} < \\text{median} < \\text{mean}$$.\n- Step 2: For a **left-skewed** distribution, the ordering reverses: $$\\text{mean} < \\text{median} < \\text{mode}$$.\n- Step 3: Intuition: the mean is sensitive to extreme values — any point far from the bulk pulls the mean. The median is resistant — only half-counts matter. The mode just finds the peak. Skew in either direction separates these three measures.\n\nThis is why mean and median can disagree significantly for asymmetric distributions.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Explain why, for a continuous random variable, $$\\mathrm{P}(X \\leq x) = \\mathrm{P}(X < x)$$, even though these events look different. (3 steps)", "answer": "- Step 1: The difference between \"$$\\leq$$\" and \"$$<$$\" is whether the endpoint $$x$$ is included. In event terms: $$\\{X \\leq x\\} = \\{X < x\\} \\cup \\{X = x\\}$$.\n- Step 2: Probabilities: $$\\mathrm{P}(X \\leq x) = \\mathrm{P}(X < x) + \\mathrm{P}(X = x)$$.\n- Step 3: For a continuous RV, $$\\mathrm{P}(X = x) = 0$$, so the two probabilities are equal.\n\nThis is why we don't distinguish between $$F(x) = \\mathrm{P}(X \\leq x)$$ and $$\\mathrm{P}(X < x)$$ for continuous distributions.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "You're told $$\\mathrm{E}(Y) = 2$$ and $$\\mathrm{E}(Y^2) = 7$$ for some random variable $$Y$$. Without knowing the distribution, find $$\\mathrm{Var}(Y)$$ and $$\\mathrm{Var}(4Y - 2)$$. (3 steps)", "answer": "- Step 1: Use $$\\mathrm{Var}(Y) = \\mathrm{E}(Y^2) - (\\mathrm{E}(Y))^2 = 7 - 4 = 3$$.\n- Step 2: For linear transformations, $$\\mathrm{Var}(aY + b) = a^2 \\mathrm{Var}(Y)$$ — the shift $$b$$ is invisible.\n- Step 3: So $$\\mathrm{Var}(4Y - 2) = 16 \\cdot 3 = 48$$.\n\nConceptual insight: you don't need the distribution of $$Y$$ — just its first two moments. Mean and variance are sufficient for all linear transformations.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Suppose you have a piecewise p.d.f. with $$f = f_1$$ on $$[a, c]$$ and $$f = f_2$$ on $$[c, b]$$. Explain why computing $$\\mathrm{E}(X)$$ requires integrating each piece separately and then adding. (3 steps)", "answer": "- Step 1: The formula $$\\mathrm{E}(X) = \\int_{-\\infty}^{\\infty} x f(x)\\,dx$$ holds globally, but $$f$$ has different expressions on different intervals.\n- Step 2: Split the integral along boundaries: $$\\mathrm{E}(X) = \\int_a^c x f_1(x)\\,dx + \\int_c^b x f_2(x)\\,dx$$. Each sub-integral uses its own formula.\n- Step 3: After evaluating both and adding, the sum gives the full $$\\mathrm{E}(X)$$. The same approach works for $$\\mathrm{E}(X^2)$$, $$\\mathrm{Var}(X)$$, or $$\\mathrm{E}(g(X))$$ — integrate $$g(x) f(x)$$ piece by piece.\n\nMiss a piece or use the wrong formula on a sub-interval, and you get a wrong answer.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "If a continuous random variable has a c.d.f. that's constant on some interval (e.g., $$F(x) = 0.4$$ for $$x \\in [2, 3]$$), what does this say about the p.d.f., and is the distribution still valid? (3 steps)", "answer": "- Step 1: Since $$f(x) = \\frac{d}{dx} F(x)$$ and $$F$$ is constant on $$[2, 3]$$, we get $$f(x) = 0$$ there.\n- Step 2: This means $$X$$ can never take values in $$[2, 3]$$ — zero probability is assigned. It's a \"gap\" in the distribution's support.\n- Step 3: Yes, still valid — a p.d.f. can be zero on some intervals as long as it's non-negative everywhere and integrates to 1 over the total support. Such distributions arise with disjoint support regions (e.g., a mixture of non-overlapping ranges).\n\nLesson: flat segments of $$F$$ correspond to gaps where $$f = 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Why is variance always non-negative for any random variable, and when is it exactly zero? (3 steps)", "answer": "- Step 1: By definition, $$\\mathrm{Var}(X) = \\mathrm{E}((X - \\mu)^2)$$. The integrand $$(x - \\mu)^2$$ is always $$\\geq 0$$.\n- Step 2: An integral of a non-negative function against a non-negative density $$f(x)$$ is non-negative. Hence $$\\mathrm{Var}(X) \\geq 0$$.\n- Step 3: $$\\mathrm{Var}(X) = 0$$ only when $$(X - \\mu)^2 = 0$$ with probability 1 — i.e., $$X$$ is a constant (takes only one value). Any actual variation gives positive variance.\n\nThis also implies $$\\mathrm{E}(X^2) \\geq (\\mathrm{E}(X))^2$$ always — an important inequality.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "A continuous RV $$X$$ has support $$[0, 2]$$. Without any further calculation, what can you say about the possible range of $$\\mathrm{E}(X)$$? (3 steps)", "answer": "- Step 1: The expected value is a weighted average of $$x$$-values over the support, with weights $$f(x) \\geq 0$$ summing (integrating) to 1.\n- Step 2: Since all $$x$$-values with positive weight lie in $$[0, 2]$$, the weighted average must also lie in $$[0, 2]$$.\n- Step 3: So $$0 \\leq \\mathrm{E}(X) \\leq 2$$. Extremes are approached when probability concentrates at an endpoint. A uniform distribution gives $$\\mathrm{E}(X) = 1$$; a left-heavy distribution gives $$\\mathrm{E}(X) < 1$$; a right-heavy one gives $$\\mathrm{E}(X) > 1$$.\n\nGeneral principle: the mean always lies within the support.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "Why is standard deviation often preferred over variance as a measure of spread, even though variance has nicer mathematical properties? (3 steps)", "answer": "- Step 1: Variance is in *squared* units of $$X$$. If $$X$$ is metres, $$\\mathrm{Var}(X)$$ is in square metres — hard to interpret as a spread of the variable.\n- Step 2: Standard deviation is in the *same units* as $$X$$. If $$X$$ is metres, SD is metres. So it directly quantifies \"typical deviation from the mean\".\n- Step 3: Practical interpretation: for many well-behaved distributions, roughly 68% of probability lies within one SD of the mean. So SD is a useful rough \"error bar\".\n\nHowever: to compute SD you usually compute variance first. Variance is mathematically cleaner (e.g., it's additive for independent sums); SD is more interpretable.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Explain the difference between $$\\mathrm{E}(X + Y)$$ and $$\\mathrm{E}(X) + \\mathrm{E}(Y)$$, and between $$\\mathrm{Var}(X + Y)$$ and $$\\mathrm{Var}(X) + \\mathrm{Var}(Y)$$, for random variables $$X, Y$$. (3 steps)", "answer": "- Step 1: **Expectation**: $$\\mathrm{E}(X + Y) = \\mathrm{E}(X) + \\mathrm{E}(Y)$$ always, for any random variables (including dependent ones). This is called **linearity of expectation**.\n- Step 2: **Variance**: $$\\mathrm{Var}(X + Y) = \\mathrm{Var}(X) + \\mathrm{Var}(Y)$$ holds *only* when $$X, Y$$ are independent. Otherwise there's an additional covariance term: $$\\mathrm{Var}(X+Y) = \\mathrm{Var}(X) + \\mathrm{Var}(Y) + 2\\mathrm{Cov}(X, Y)$$.\n- Step 3: Contrast: expectation is always additive; variance is additive only under independence. This is why \"independence\" matters so much in statistical calculations — it makes variance easy.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "A c.d.f. is $$F(x) = \\frac{1}{5}(16x - x^2 - 55)$$ on $$[5, 10]$$. How can you quickly spot that this cannot be a valid c.d.f.? (3 steps)", "answer": "- Step 1: Check monotonicity via the derivative: $$f(x) = F'(x) = \\frac{1}{5}(16 - 2x)$$.\n- Step 2: For $$f(x) \\geq 0$$: $$16 - 2x \\geq 0$$ ⟺ $$x \\leq 8$$. So on $$[8, 10]$$, $$f(x) < 0$$ — meaning $$F$$ is *decreasing* there.\n- Step 3: A c.d.f. that decreases implies negative probability for some interval — impossible. Hence invalid.\n\nSpecifically: $$\\mathrm{P}(8 < X < 10) = F(10) - F(8) < 0$$, a contradiction. Always check the p.d.f. you'd recover is non-negative.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Describe the conditions that a proposed c.d.f. must satisfy to represent a valid continuous random variable. (3 steps)", "answer": "- Step 1: **Boundary conditions**:\n+ $$F(x) \\to 0$$ as $$x \\to -\\infty$$ (or $$F = 0$$ at/below lower support).\n+ $$F(x) \\to 1$$ as $$x \\to \\infty$$ (or $$F = 1$$ at/above upper support).\n- Step 2: **Monotonicity**: $$F$$ must be non-decreasing — otherwise probabilities could be negative. Equivalent to $$f(x) = F'(x) \\geq 0$$.\n- Step 3: **Continuity**: For a continuous RV, $$F$$ must be continuous (no jumps). Jumps would indicate point masses, making the RV partially discrete.\n\nA c.d.f. violating any of these cannot represent a valid continuous distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Given a c.d.f. $$F$$, how do you compute $$\\mathrm{P}(X > k)$$, and why is this generally faster than direct integration of the p.d.f.? (2 steps)", "answer": "- Step 1: Use the complement: $$\\mathrm{P}(X > k) = 1 - \\mathrm{P}(X \\leq k) = 1 - F(k)$$. Just evaluate $$F$$ at $$k$$.\n- Step 2: This is far faster than integrating $$\\int_k^\\infty f(x)\\,dx$$ directly. Once $$F$$ is known (either given or derived once), every probability query reduces to arithmetic on $$F$$.\n\nQuick reference:\n+ $$\\mathrm{P}(X \\leq k) = F(k)$$\n+ $$\\mathrm{P}(X > k) = 1 - F(k)$$\n+ $$\\mathrm{P}(a < X < b) = F(b) - F(a)$$", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "If you have a p.d.f. that's piecewise linear — say, $$f$$ is constant $$k$$ on $$[1, 2]$$ and increases linearly on $$[2, 4]$$ — what's the fastest way to find $$k$$? (3 steps)", "answer": "- Step 1: Sketch the p.d.f. and compute the total area geometrically rather than by integration.\n- Step 2: On $$[1, 2]$$: rectangle of height $$k$$, width 1 → area $$= k$$.\nOn $$[2, 4]$$: trapezoid from height $$k$$ at $$x = 2$$ to (say) $$3k$$ at $$x = 4$$, width 2 → area $$= \\frac{1}{2}(k + 3k)(2) = 4k$$.\n- Step 3: Total area = $$k + 4k = 5k$$. Set equal to 1: $$k = 1/5$$.\n\nGeometry beats integration when pieces are simple shapes (rectangles, triangles, trapezoids). Always sketch first.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "Explain why the result of finding $$\\mathrm{P}(X > \\mu)$$ is not always 0.5, even though $$\\mu$$ is the mean. (3 steps)", "answer": "- Step 1: The mean $$\\mu$$ is the balance point (centre of mass) of the distribution. Half the *probability* doesn't necessarily lie above/below it.\n- Step 2: The value that gives $$\\mathrm{P}(X > \\text{that value}) = 0.5$$ is the **median** — not the mean. Median balances *counts*; mean balances *mass*.\n- Step 3: For symmetric distributions, mean = median, so $$\\mathrm{P}(X > \\mu) = 0.5$$. But for skewed distributions:\n+ Right-skewed: mean > median, so $$\\mathrm{P}(X > \\mu) < 0.5$$ (long right tail pulls mean up beyond halfway point).\n+ Left-skewed: vice versa.\n\nLesson: always check whether you're asked about the mean or median — they're not interchangeable.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "A student says: \"since the mode is the most likely value, if I observe $$X$$ many times, I'll see the mode most often.\" Is this correct for a continuous RV? (2 steps)", "answer": "- Step 1: Not quite. For a continuous RV, every specific value has probability zero, so you'll never see \"the mode exactly\" in any sample.\n- Step 2: What's true: in any small interval around the mode, more probability is concentrated than in equally-sized intervals elsewhere. So observed values will *cluster near* the mode, but the mode itself is a peak of density, not a guaranteed repeat value.\n\nPhrase it as: \"values near the mode appear more frequently than values equally far away from other points\" — a statement about density, not about specific outcomes.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "What is the probability that a continuous random variable $$X$$ exactly equals its mean $$\\mu$$? (2 steps)", "answer": "- Step 1: For any continuous RV, $$\\mathrm{P}(X = c) = 0$$ for every specific value $$c$$. The mean $$\\mu$$ is just one particular real number.\n- Step 2: So $$\\mathrm{P}(X = \\mu) = 0$$. Unlike discrete RVs, where $$\\mathrm{P}(X = \\mu)$$ can be positive if $$\\mu$$ is in the sample space.\n\nIn continuous distributions, all probability is over intervals, not points — the mean is a descriptor, not an event.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "What is the mode of the exponential distribution $$f(x) = \\lambda e^{-\\lambda x}$$ for $$x \\geq 0$$, and why is it at the boundary? (3 steps)", "answer": "- Step 1: For $$x \\geq 0$$, $$f(x) = \\lambda e^{-\\lambda x}$$ is strictly decreasing (exponential decay). Its maximum on $$[0, \\infty)$$ is at the left endpoint.\n- Step 2: At $$x = 0$$: $$f(0) = \\lambda$$. For all $$x > 0$$: $$f(x) < \\lambda$$.\n- Step 3: So mode = 0. The derivative test won't help — $$f'(x) = -\\lambda^2 e^{-\\lambda x} < 0$$ is never zero. The maximum is forced to the boundary because $$f$$ is monotonic.\n\nNotice the three location measures differ: mode = 0, median = $$(\\ln 2)/\\lambda$$, mean = $$1/\\lambda$$. Classic right-skew ordering.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "In the exponential distribution $$f(x) = \\lambda e^{-\\lambda x}$$, explain what $$\\lambda$$ represents and the property of \"memorylessness\". (3 steps)", "answer": "- Step 1: The mean is $$\\mathrm{E}(X) = 1/\\lambda$$. So $$\\lambda$$ is the **rate** (events per unit time), and its reciprocal is the **mean waiting time**.\n+ Higher $$\\lambda$$ ⟹ shorter typical waits.\n+ Lower $$\\lambda$$ ⟹ longer typical waits.\n- Step 2: **Memorylessness**: $$\\mathrm{P}(X > s + t \\mid X > s) = \\mathrm{P}(X > t)$$. Given you've waited $$s$$ units without the event, the remaining wait distribution is identical to a fresh start.\n- Step 3: The exponential \"forgets\" past waiting. This property is unique to the exponential among continuous distributions — a defining feature that makes it natural for random failure, radioactive decay, and Poisson-process waiting times.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "What's the conceptual meaning of saying \"the p.d.f. $$f(x)$$ is 'most dense' at the mode\"? (2 steps)", "answer": "- Step 1: \"Most dense\" means highest density — the most probability per unit $$x$$-width is concentrated near the mode.\n- Step 2: Practically: for any small interval $$[c - \\epsilon, c + \\epsilon]$$ centred at the mode $$c$$, the probability $$\\mathrm{P}(c - \\epsilon < X < c + \\epsilon)$$ exceeds the probability of any other equally-wide interval.\n\nDensity-wise, the mode is the \"hotspot\" of the distribution — not guaranteed to be observed exactly, but its neighbourhood is enriched.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "Why is the interquartile range (IQR = $$Q_3 - Q_1$$) sometimes preferred over the standard deviation as a measure of spread? (3 steps)", "answer": "- Step 1: IQR measures the spread of the *middle 50%*. It's insensitive to extreme values (outliers) because it ignores the top and bottom 25%.\n- Step 2: SD weights every deviation quadratically, so extreme values (tails) have outsized influence. A heavy-tailed distribution can have very large SD while most of its mass is concentrated.\n- Step 3: When to use each:\n+ **SD**: symmetric, well-behaved distributions where extreme values matter.\n+ **IQR**: skewed distributions or when outliers are possible and shouldn't dominate.\n\nRule of thumb: symmetric → mean and SD; skewed → median and IQR.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "When can't you solve $$F(x) = 0.5$$ (for the median) in closed form, and what do you do instead? (3 steps)", "answer": "- Step 1: If $$F$$ involves transcendental functions (exp, log, trig, etc.) or high-degree polynomials, the equation may have no algebraic solution.\n- Step 2: Numerical methods: calculator or iterative approach (bisection, Newton's method) to approximate.\n- Step 3: For exam work: often asked to \"show the median lies between $$a$$ and $$b$$\". Check that $$F(a) < 0.5$$ and $$F(b) > 0.5$$ and invoke the intermediate value theorem (valid because $$F$$ is continuous and increasing). This locates the median without explicitly solving.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": false}, {"question": "Given the c.d.f. $$F(x)$$, explain the general procedure for finding the 80th percentile. (3 steps)", "answer": "- Step 1: **Meaning**: the 80th percentile $$P_{80}$$ is the value below which 80% of probability lies.\n- Step 2: **Setup**: solve $$F(P_{80}) = 0.80$$ for the unknown.\n- Step 3: **Process**:\n+ For piecewise $$F$$: first check boundary values to identify which piece contains $$P_{80}$$.\n+ Solve the equation within that piece.\n+ Discard any extraneous roots outside the support or wrong piece.\n\nAlso: $$P_{80}$$ is the \"upper 20% threshold\" — only 20% of values exceed it.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": true}, {"question": "Compare the approaches for finding (a) the mean and (b) the median of a piecewise-defined continuous RV. (3 steps)", "answer": "- Step 1: **Mean** approach:\n+ Integrate $$x f(x)$$ over *each* piece of the support.\n+ Sum all contributions: $$\\mathrm{E}(X) = \\sum_i \\int_{a_i}^{b_i} x f_i(x)\\,dx$$.\n- Step 2: **Median** approach:\n+ Identify which piece contains the median by computing cumulative probability at each boundary.\n+ Set up $$F(m) = 0.5$$ using only the relevant piece (with running total from earlier pieces included).\n+ Solve.\n- Step 3: **Key difference**: mean uses *all* pieces (summed); median uses just *one* piece (with an offset). Mean depends on the whole distribution's mass; median depends only on crossing the 50% threshold.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": false}, {"question": "What's the difference between $$\\mathrm{E}(X)$$ and $$\\mathrm{E}(X^2)$$ in terms of what they tell you about a distribution? (3 steps)", "answer": "- Step 1: $$\\mathrm{E}(X)$$ weights each value of $$x$$ by $$f(x)$$ — it's the first moment, giving the centre of mass (location).\n- Step 2: $$\\mathrm{E}(X^2)$$ weights each *squared* value by $$f(x)$$ — it's the second raw moment. It doesn't directly measure spread, but combines with $$\\mathrm{E}(X)$$ to do so.\n- Step 3: Together:\n+ $$\\mathrm{E}(X)$$ → location.\n+ $$\\mathrm{E}(X^2)$$ → combined with $$\\mathrm{E}(X)$$ gives scale via $$\\mathrm{Var}(X)$$.\n+ Higher moments (third → skewness, fourth → kurtosis) capture further shape features.\n\nMoments build up a progressive characterisation of the distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": true}, {"question": "Give an example of a p.d.f. for which the mean, median, and mode are all equal, and another where they're all different. (3 steps)", "answer": "- Step 1: **All equal**: symmetric unimodal distributions. E.g., $$f(x) = \\frac{3}{4}(1 - x^2)$$ on $$[-1, 1]$$ — symmetric about 0. Mean = median = mode = 0.\n- Step 2: **All different**: right-skewed distributions. E.g., exponential with $$\\lambda = 1$$:\n+ Mode = 0 (peak at left endpoint)\n+ Median = $$\\ln 2 \\approx 0.69$$\n+ Mean = 1\n- Step 3: The greater the skew, the more the three diverge. Symmetric ⟹ they coincide; asymmetric ⟹ they separate, usually in the ordering mode < median < mean (right skew) or reversed.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": true}, {"question": "A common pitfall when finding the median by integration: setting up $$\\int_a^m f(x)\\,dx = 0.5$$ directly. How can this produce a wrong answer, and how do you avoid it? (3 steps)", "answer": "- Step 1: The pitfall: you might implicitly assume $$m$$ lies in the same piece of a piecewise p.d.f. that starts at $$a$$. If $$m$$ is in a later piece, the integral formula is wrong.\n- Step 2: Correct procedure:\n+ First, compute cumulative probability up to each piece boundary.\n+ Compare to 0.5 to identify which piece contains the median.\n+ Then integrate within that piece, carrying over probability from earlier pieces.\n- Step 3: Example: if $$F(c) = 0.3$$ at boundary $$c$$ and the next piece is $$[c, b]$$, the median satisfies $$0.3 + \\int_c^m f(x)\\,dx = 0.5$$, i.e., $$\\int_c^m f(x)\\,dx = 0.2$$.\n\nAlways locate the median's piece first; then set up the correct conditional integral.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": true}, {"question": "Why is it often useful to think of the probability distribution of a continuous RV as a \"blob of mass\" distributed along the x-axis? (3 steps)", "answer": "- Step 1: The analogy translates probability concepts into familiar physics:\n+ $$f(x)$$ is linear mass density (mass per unit length).\n+ Total probability = 1 is like total mass = 1.\n+ $$\\mathrm{E}(X) = \\int x f(x)\\,dx$$ is the centre of mass.\n+ $$\\mathrm{Var}(X)$$ is the moment of inertia about the centre.\n- Step 2: This makes intuition for mean, variance, and skewness tangible:\n+ Mean = balance point (where you'd balance the blob on a pivot).\n+ Variance = resistance to rotation about the centre.\n+ Skew → mean shifts toward the heavier tail.\n- Step 3: Many results follow naturally:\n+ \"Variance only scales, doesn't shift\" ↔ \"moment of inertia is translation-invariant\".\n+ \"Symmetric → mean = median = axis\" ↔ symmetric mass balances on its centre.\n\nA powerful analogy linking probability to mechanics.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": true}, {"question": "Describe a real-world scenario where using the mean as a summary would be misleading, and what statistic is more appropriate. (3 steps)", "answer": "- Step 1: **Scenario**: a heavily right-skewed distribution — e.g., income, house prices, insurance claims — where a few very large values exist.\n- Step 2: **Problem with mean**: a handful of outliers pull the mean far from where most data sits. \"Average income\" suggests typical earnings are higher than reality for most people.\n- Step 3: **Alternatives**:\n+ **Median** (50th percentile): resistant to outliers; gives a better sense of typical experience.\n+ **IQR**: describes spread of the middle 50%, ignoring tails.\n\nRule of thumb: symmetric → mean and SD; skewed or outlier-prone → median and IQR.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": true}, {"question": "Explain the relationship between a histogram of observed data and the idealised p.d.f. for
