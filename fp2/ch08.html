theta + \\sin\\theta)$$.\n- Step 2: $$\\tfrac{dx}{d\\theta} = a(-\\sin\\theta + \\cos\\theta) = a(\\cos\\theta - \\sin\\theta)$$.\n- Step 3: Set to zero: $$\\cos\\theta = \\sin\\theta$$, so $$\\tan\\theta = 1 \\Rightarrow \\theta = \\pi/4$$.\n- Step 4: At $$\\theta = \\pi/4$$: $$r = a(1 + \\tan(\\pi/4)) = a(1 + 1) = 2a$$.\n- Step 5: Point in polar is $$(2a, \\pi/4)$$. At this point, the vertical tangent passes through $$x = 2a\\cos(\\pi/4) = a\\sqrt{2}$$.\n\nPolar problems don't have to be trig-identity puzzles ŌĆö sometimes straightforward calculus suffices.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_85", "judge_pick": false}, {"question": "How can you tell immediately from the equation $$r = 2 + \\cos\\theta$$ that the curve doesn't pass through the origin? (3 steps)", "answer": "- Step 1: For the curve to pass through the origin, we need $$r = 0$$ for some $$\\theta$$.\n- Step 2: $$2 + \\cos\\theta = 0 \\Rightarrow \\cos\\theta = -2$$, which has no real solutions (since $$|\\cos\\theta| \\leq 1$$).\n- Step 3: So $$r$$ is always at least $$1$$ (minimum occurs at $$\\theta = \\pi$$) ŌĆö the curve never reaches the pole.\n\nQuick check: compute $$\\min r$$. If $$\\min r > 0$$, no origin passage; if $$\\min r = 0$$, curve touches origin; if $$\\min r < 0$$ (strict convention), curve has gaps.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_86", "judge_pick": true}, {"question": "Review: in one sentence per learning objective, state what you should now be able to do in polar coordinates. (4 steps)", "answer": "- Step 1: Convert between $$(x,y)$$ and $$(r, \\theta)$$, remembering to track quadrants via sketch.\n- Step 2: Sketch standard polar curves:\n+ Circles ($$r=a$$ and $$r = 2a\\cos\\theta$$).\n+ Spirals ($$r = a\\theta$$).\n+ Cardioids ($$r = a(1\\pm\\cos\\theta)$$).\n+ Lima├¦ons ($$r = a(p+q\\cos\\theta)$$).\n+ Rose curves ($$r = a\\sin(n\\theta)$$).\n+ Lemniscate ($$r^2 = a^2\\cos 2\\theta$$).\n- Step 3: Compute areas using $$\\tfrac{1}{2}\\int r^2 d\\theta$$, choosing limits where $$r \\geq 0$$, and using symmetry where possible.\n- Step 4: Find tangents by converting to parametric form and setting $$\\tfrac{dy}{d\\theta} = 0$$ (horizontal) or $$\\tfrac{dx}{d\\theta} = 0$$ (vertical).\n\nEach skill builds on the previous: convert, sketch, integrate, differentiate.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_87", "judge_pick": true}, {"question": "Why is sketching the polar curve before computing an area always recommended? (3 steps)", "answer": "- Step 1: The sketch reveals the shape: number of petals, loops, and any symmetry ŌĆö guiding the choice of integration limits.\n- Step 2: It shows which regions correspond to which $$\\theta$$-intervals, preventing accidental inclusion of phantom regions (from $$r<0$$) or missed regions.\n- Step 3: It gives a sanity check on the final answer: a tiny petal shouldn't have huge area; a big lobe shouldn't have tiny area.\n\n\"Plot first, integrate later\" ŌĆö the sketch is your map through the problem.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_88", "judge_pick": false}, {"question": "Compute the area of one loop of the lemniscate $$r^2 = a^2\\cos 2\\theta$$. (4 steps)", "answer": "- Step 1: One loop exists on $$\\theta \\in [-\\pi/4, \\pi/4]$$ (where $$\\cos 2\\theta \\geq 0$$).\n- Step 2: Area $$= \\tfrac{1}{2}\\int_{-\\pi/4}^{\\pi/4}r^2\\, d\\theta = \\tfrac{1}{2}\\int_{-\\pi/4}^{\\pi/4}a^2\\cos 2\\theta\\, d\\theta$$.\n- Step 3: Use symmetry: $$= a^2\\int_0^{\\pi/4}\\cos 2\\theta\\, d\\theta = a^2\\left[\\tfrac{\\sin 2\\theta}{2}\\right]_0^{\\pi/4} = a^2\\cdot\\tfrac{1}{2} = \\tfrac{a^2}{2}$$.\n- Step 4: Full lemniscate (two loops): $$a^2$$.\n\nA clean example ŌĆö no double-angle substitution needed because $$r^2$$ is already linear in $$\\cos 2\\theta$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_89", "judge_pick": false}, {"question": "What is the polar equation of the circle $$|z - 3i| = 3$$ (circle of radius 3 centred at $$3i$$ in Argand diagram)? (4 steps)", "answer": "- Step 1: In Cartesian: $$x^2 + (y-3)^2 = 9 \\Rightarrow x^2 + y^2 = 6y$$.\n- Step 2: Substitute $$x^2 + y^2 = r^2, y = r\\sin\\theta$$: $$r^2 = 6r\\sin\\theta$$.\n- Step 3: Divide by $$r$$ (accounting for origin being on the circle): $$r = 6\\sin\\theta$$.\n- Step 4: Verification: circle through origin, centred at $$(0, 3)$$, radius $$3$$ ŌĆö matches.\n\nPattern: $$r = A\\sin\\theta$$ is a circle through origin with centre on $$y$$-axis at height $$A/2$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_90", "judge_pick": false}, {"question": "Why doesn't division by $$r$$ (in simplifying $$r^2 = \\text{const}\\cdot r$$) cause issues when the origin is on the curve? (3 steps)", "answer": "- Step 1: Division by $$r$$ is only problematic at $$r = 0$$. At every other point, the two equations $$r^2 = ar$$ and $$r = a$$ are equivalent.\n- Step 2: At $$r = 0$$, both sides of $$r^2 = ar$$ are zero ŌĆö a trivial solution. The divided equation $$r = a$$ (where $$a$$ is a function of $$\\theta$$) may still admit $$r = 0$$ at specific $$\\theta$$.\n- Step 3: For circles through the origin like $$r^2 = 2ar\\cos\\theta$$, the simplified $$r = 2a\\cos\\theta$$ recovers the origin at $$\\theta = \\pi/2$$, so nothing is lost.\n\nRule of thumb: after dividing by $$r$$, check whether $$r = 0$$ still belongs to the simplified solution set.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_91", "judge_pick": true}, {"question": "Imagine the cross-section of a snail shell modelled by $$r = k\\theta$$ on $$0 \\leq \\theta \\leq 4\\pi$$, with \"horizontal diameter\" 3 cm. How do you set up the equation for $$k$$? (4 steps)", "answer": "- Step 1: The spiral crosses the positive $$x$$-axis at $$\\theta = 0$$ (point $$O$$), $$\\theta = 2\\pi$$ (point $$x = 2k\\pi$$), and $$\\theta = 4\\pi$$ (point $$x = 4k\\pi$$).\n- Step 2: It crosses the negative $$x$$-axis at $$\\theta = \\pi$$ (point $$x = -k\\pi$$) and $$\\theta = 3\\pi$$ (point $$x = -3k\\pi$$).\n- Step 3: The outermost extent on the right: $$\\theta = 4\\pi$$, giving $$x = 4k\\pi$$. The outermost on the left: $$\\theta = 3\\pi$$, giving $$x = -3k\\pi$$.\n- Step 4: Horizontal diameter = $$4k\\pi - (-3k\\pi) = 7k\\pi = 3$$, so $$k = \\tfrac{3}{7\\pi}$$.\n\nThe tricky part: carefully identifying which $$\\theta$$ values give the horizontal extrema ŌĆö each spiral arm pokes out further than the previous.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_92", "judge_pick": false}, {"question": "What does the polar equation $$r = 1 + 3\\cos\\theta$$ represent, and why is it different from a cardioid/dimpled lima├¦on? (4 steps)", "answer": "- Step 1: Here $$p = 1, q = 3$$, so $$p < q$$. The curve goes negative: when $$\\cos\\theta < -1/3$$, $$r$$ is negative.\n- Step 2: Under Edexcel $$r \\geq 0$$ convention: curve doesn't exist in negative intervals. Under alternative conventions: the point is traced on the opposite side ŌĆö creating an *inner loop*.\n- Step 3: This is fundamentally different from the $$p \\geq q$$ family where $$r$$ stays non-negative: those are simple closed loops (cardioid, dimpled, convex).\n- Step 4: So the parameter comparison is: $$p > q$$ convex or dimpled; $$p = q$$ cardioid (cusp); $$p < q$$ lima├¦on with inner loop (or partial curve).\n\nEdexcel focuses on $$p \\geq q$$ cases, but understanding the full picture explains why the \"$$p \\geq q$$\" restriction is standard.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_93", "judge_pick": true}, {"question": "Visual intuition: why are cardioids and lima├¦ons sometimes confused with \"constant-angle\" curves, and why is that characterization actually wrong? (3 steps)", "answer": "- Step 1: A constant-angle curve is one where the angle between the tangent and the radial direction is fixed everywhere ŌĆö this describes the logarithmic spiral $$r = ae^{b\\theta}$$.\n- Step 2: For cardioids and lima├¦ons, the tangent-radius angle varies with position ŌĆö they are *not* constant-angle curves.\n- Step 3: The distinctive property of cardioids is their generating mechanism: epicycloid of one circle rolling on another of equal size. That's a rotational/kinematic property, not a tangent-angle property.\n\nEach family of polar curves has its own geometric signature; the logarithmic spiral's is constant tangent-radius angle.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_94", "judge_pick": true}, {"question": "Imagine a region bounded below by the initial line and above by the polar curve $$r = 2 + \\cos\\theta$$, for $$0 \\leq \\theta \\leq \\pi/2$$. Describe and set up the area. (3 steps)", "answer": "- Step 1: This is a \"polar wedge\": for each $$\\theta \\in [0, \\pi/2]$$, $$r$$ goes from the pole out to the curve.\n- Step 2: Area $$= \\tfrac{1}{2}\\int_0^{\\pi/2}(2+\\cos\\theta)^2\\, d\\theta$$ ŌĆö standard sector formula integrated over the given $$\\theta$$-range.\n- Step 3: Qualitatively: it's a \"quarter-lima├¦on wedge\", bounded by the polar curve on the outside, the initial line below, and the half-line $$\\theta = \\pi/2$$ on the side.\n\nOnce you identify the outer boundary, the sector formula takes over.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_95", "judge_pick": false}, {"question": "Why does \"$$r^2 \\geq 0$$\" produce a stronger restriction than simply writing an $$r$$ equation? (3 steps)", "answer": "- Step 1: An equation like $$r = f(\\theta)$$ requires $$f(\\theta) \\geq 0$$ for the curve to exist ŌĆö but $$f$$ might naturally take negative values, giving gaps.\n- Step 2: An equation like $$r^2 = g(\\theta)$$ requires $$g(\\theta) \\geq 0$$ ŌĆö because the left side is a square.\n- Step 3: Additionally, $$r^2 = g(\\theta)$$ gives $$r = \\pm\\sqrt{g(\\theta)}$$, but under $$r \\geq 0$$ we take only $$r = +\\sqrt{g(\\theta)}$$.\n\nSo $$r^2 = g(\\theta)$$ curves (like lemniscates) have restricted domain AND a natural square-root structure.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_96", "judge_pick": true}, {"question": "For a polar curve that is traced *twice* as $$\\theta$$ ranges over its natural interval, how does this affect area computation? (3 steps)", "answer": "- Step 1: If the curve is traced exactly once, integrating $$\\tfrac{1}{2}r^2$$ over the full interval gives the true area.\n- Step 2: If traced twice (retraced), the integral over $$[0, 2\\pi]$$ would double-count the area.\n- Step 3: Fix: either restrict the limits to a sub-range where the curve is traced once, or compute the full integral and divide by 2.\n\nWhen in doubt, sketch and trace a small range of $$\\theta$$ to see how many times you sweep around.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_97", "judge_pick": true}, {"question": "Final synthesis: how are a cardioid and a circle through the origin related via their polar equations? (3 steps)", "answer": "- Step 1: Circle through origin: $$r = 2a\\cos\\theta$$ (centred at $$(a, 0)$$, radius $$a$$).\n- Step 2: Cardioid: $$r = a(1 + \\cos\\theta)$$.\n- Step 3: Both are in the family $$r = A + B\\cos\\theta$$, but with different roles: circle has $$A=0$$ (no constant offset), cardioid has $$A = B$$ (offset equals amplitude). The constant $$A$$ controls \"distance from origin to closest approach\" ŌĆö zero for the circle (touches origin), $$A = B$$ gives cardioid (touches origin tangentially at cusp).\n\nCircle is \"pure oscillation\"; cardioid is \"oscillation + constant\", where the constant creates the heart shape.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_98", "judge_pick": true}, {"question": "Why is the polar system particularly well-suited to describing orbital mechanics? (3 steps)", "answer": "- Step 1: Orbits are driven by central forces (gravitation from a point source). Central forces depend only on distance from the source ŌĆö exactly the polar $$r$$ coordinate.\n- Step 2: Angular momentum conservation in a central field gives $$r^2\\tfrac{d\\theta}{dt} = $$ const ŌĆö which is the polar area sweep rate. Kepler's second law falls out immediately.\n- Step 3: Kepler orbits (ellipses/parabolas/hyperbolas) have the compact polar form $$r = \\tfrac{p}{1 + e\\cos\\theta}$$ where $$e$$ is eccentricity ŌĆö reminiscent of a lima├¦on but with denominator, matching conic geometry.\n\nPolar coordinates respect the rotational symmetry of gravity ŌĆö that's why they appear naturally in celestial mechanics.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_99", "judge_pick": true}], "count": 100}, "opus_2": {"label": "Opus 4.7 ŌæĪ", "cards": [{"question": "What information does a polar coordinate $$(r, \\theta)$$ specify about a point's location, and how does this differ in philosophy from Cartesian coordinates? (3 steps)", "answer": "- Step 1: $$r$$ is the radial distance from the pole $$O$$ to the point $$P$$ ŌĆö it tells you \"how far\".\n- Step 2: $$\\theta$$ is the angle (measured anticlockwise) from the initial line (positive $$x$$-axis) to the line $$OP$$ ŌĆö it tells you \"in which direction\".\n- Step 3: Cartesian coordinates ask \"how far across, how far up?\" referencing two perpendicular axes. Polar coordinates ask \"how far away, at what bearing?\" ŌĆö referencing a single point and a direction.\n+ This makes polar natural for problems with rotational symmetry (circles, spirals, rosettes).\n+ Cartesian is natural for grids and translations.\n\nThe two systems describe the same plane; they just slice it up differently.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_0", "judge_pick": false}, {"question": "Starting from a right triangle with hypotenuse $$r$$ and angle $$\\theta$$ to the $$x$$-axis, derive the conversion formulas from polar to Cartesian. (3 steps)", "answer": "- Step 1: Place point $$P$$ at polar coordinates $$(r, \\theta)$$ in the first quadrant. Drop a perpendicular from $$P$$ to the $$x$$-axis, forming a right triangle with hypotenuse $$OP = r$$ and angle $$\\theta$$ at $$O$$.\n- Step 2: The horizontal leg (adjacent to $$\\theta$$) is $$x$$, so $$\\cos\\theta = x/r$$ giving $$x = r\\cos\\theta$$.\n- Step 3: The vertical leg (opposite to $$\\theta$$) is $$y$$, so $$\\sin\\theta = y/r$$ giving $$y = r\\sin\\theta$$.\n\nThese extend to all quadrants because $$\\cos\\theta$$ and $$\\sin\\theta$$ carry the correct sign automatically ŌĆö when $$\\theta$$ is in the second quadrant, $$\\cos\\theta$$ becomes negative, so $$x$$ becomes negative.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_1", "judge_pick": false}, {"question": "Why does the relationship $$r^2 = x^2 + y^2$$ hold for any point in any quadrant? (3 steps)", "answer": "- Step 1: From $$x = r\\cos\\theta$$ and $$y = r\\sin\\theta$$, square and add: $$x^2 + y^2 = r^2\\cos^2\\theta + r^2\\sin^2\\theta = r^2(\\cos^2\\theta + \\sin^2\\theta) = r^2$$.\n- Step 2: Geometrically, the distance from origin to point $$(x,y)$$ is $$\\sqrt{x^2 + y^2}$$, which is exactly the radial distance $$r$$.\n- Step 3: Squares of negative numbers are positive, so this works in any quadrant ŌĆö sign info about position is carried by $$\\theta$$, while $$r$$ is the unsigned distance.\n\nThis is why $$r$$ is conventionally taken to be non-negative.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why is $$\\theta = \\arctan(y/x)$$ inadequate on its own when converting Cartesian to polar coordinates, and what must you do instead? (3 steps)", "answer": "- Step 1: $$\\arctan$$ has range $$(-\\pi/2, \\pi/2)$$, so it can only return angles in the first or fourth quadrants. But $$(x,y)$$ might lie in any of the four quadrants.\n- Step 2: For example, $$(1, 1)$$ and $$(-1, -1)$$ both give $$y/x = 1$$, so $$\\arctan(y/x) = \\pi/4$$ for both ŌĆö yet they lie in opposite quadrants.\n- Step 3: To fix this, always sketch the point first to identify the quadrant:\n+ Compute the acute reference angle $$\\alpha = \\arctan|y/x|$$.\n+ Place the angle correctly: 1st quadrant ŌåÆ $$\\alpha$$; 2nd ŌåÆ $$\\pi - \\alpha$$; 3rd ŌåÆ $$\\pi + \\alpha$$; 4th ŌåÆ $$-\\alpha$$ or $$2\\pi - \\alpha$$.\n\nThe arctan formula gives a magnitude; the sketch gives the orientation.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_3", "judge_pick": false}, {"question": "A point lies in the third quadrant with acute angle $$\\alpha$$ to the negative $$x$$-axis. What is the polar angle $$\\theta$$ measured anticlockwise from the positive $$x$$-axis? (3 steps)", "answer": "- Step 1: Starting from the positive $$x$$-axis and rotating anticlockwise, you sweep through the entire upper half ($$\\pi$$) just to reach the negative $$x$$-axis.\n- Step 2: From there, you continue rotating into the third quadrant by the additional angle $$\\alpha$$.\n- Step 3: Total angle: $$\\theta = \\pi + \\alpha$$.\n+ Equivalently, you could rotate clockwise (negative direction) by $$\\pi - \\alpha$$, giving $$\\theta = -(\\pi - \\alpha) = \\alpha - \\pi$$.\n+ Both describe the same point ŌĆö polar angles are not unique, only equivalent modulo $$2\\pi$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_4", "judge_pick": true}, {"question": "Are polar coordinates unique for a given point? Give two ways to write the same point.", "answer": "No ŌĆö polar coordinates are not unique because adding $$2\\pi$$ to $$\\theta$$ rotates by a full turn, returning to the same point. So $$(r, \\theta)$$ and $$(r, \\theta + 2\\pi k)$$ describe the same point for any integer $$k$$. For example, $$(13, -1.176)$$ is the same point as $$(13, -1.176 + 2\\pi) = (13, 5.107)$$. Additionally, the pole itself ($$r = 0$$) corresponds to every angle ŌĆö $$(0, \\theta)$$ is the origin for any $$\\theta$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_5", "judge_pick": true}, {"question": "When converting the polar equation $$r = a\\cos\\theta$$ to Cartesian form, why does multiplying both sides by $$r$$ help, and what curve does it produce? (4 steps)", "answer": "- Step 1: The polar equation has $$r$$ on the left and $$\\cos\\theta$$ on the right ŌĆö these need to become Cartesian variables. We know $$r\\cos\\theta = x$$ and $$r^2 = x^2 + y^2$$, but we have a \"lone\" $$r$$ and a \"lone\" $$\\cos\\theta$$, not yet usable.\n- Step 2: Multiply both sides by $$r$$: $$r^2 = ar\\cos\\theta$$. Now LHS is $$x^2 + y^2$$ and RHS becomes $$ax$$.\n- Step 3: This gives $$x^2 + y^2 = ax$$. Complete the square: $$(x - a/2)^2 + y^2 = (a/2)^2$$.\n- Step 4: A circle of radius $$a/2$$ centred at $$(a/2, 0)$$ ŌĆö passing through the origin.\n\nThe \"multiply by $$r$$\" trick: every term picks up either an $$r^2$$ or an $$r\\cos\\theta$$/$$r\\sin\\theta$$, all of which translate directly to Cartesian.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_6", "judge_pick": true}, {"question": "Why does the polar equation $$r = a$$ describe a circle of radius $$a$$ centred at the origin, with no further work needed?", "answer": "The equation $$r = a$$ says: \"the distance from the pole is constantly $$a$$ for every direction $$\\theta$$.\" This is exactly the geometric definition of a circle. Squaring confirms it: $$r^2 = a^2$$ becomes $$x^2 + y^2 = a^2$$, the standard Cartesian circle. The polar form is more economical because it directly encodes the defining property (constant distance from a centre).", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_7", "judge_pick": false}, {"question": "What does the polar equation $$\\theta = \\alpha$$ represent geometrically, and how does it differ from the Cartesian line $$y = x\\tan\\alpha$$? (3 steps)", "answer": "- Step 1: $$\\theta = \\alpha$$ says: the direction from the origin is fixed at angle $$\\alpha$$, but $$r$$ is unconstrained (and $$r \\geq 0$$ in our convention).\n- Step 2: This traces only the half-line starting from the origin in the direction $$\\alpha$$ ŌĆö not the full line through origin.\n- Step 3: $$y = x\\tan\\alpha$$ describes the entire line through origin (both halves).\n+ The other half (in the opposite direction) corresponds to $$\\theta = \\alpha + \\pi$$.\n+ So $$\\theta = \\pi/4$$ gives only the half-line in the first quadrant; $$\\theta = 5\\pi/4$$ gives the other half in the third quadrant.\n\nThis is a key distinction: polar angle equations are directional, not bidirectional.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_8", "judge_pick": false}, {"question": "For the spiral $$r = a\\theta$$ (with $$a > 0$$, $$\\theta \\geq 0$$), describe its visual structure and why it spirals outward. (3 steps)", "answer": "- Step 1: At $$\\theta = 0$$, $$r = 0$$ ŌĆö the curve starts at the pole.\n- Step 2: As $$\\theta$$ increases, $$r$$ increases linearly. So at every full rotation ($$2\\pi$$), the radius has grown by $$2\\pi a$$.\n- Step 3: The result is a curve winding around the pole, getting steadily farther away with each turn ŌĆö an Archimedean spiral.\n+ Crosses positive $$x$$-axis at $$r = 0, 2\\pi a, 4\\pi a, \\ldots$$\n+ Crosses positive $$y$$-axis at $$r = a\\pi/2, 5a\\pi/2, \\ldots$$\n+ Successive turns are equally spaced (radial gap is constant $$2\\pi a$$).\n\nThe \"constant spacing between turns\" distinguishes Archimedean spirals from logarithmic spirals (where $$r = ae^{k\\theta}$$ grows exponentially).", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_9", "judge_pick": false}, {"question": "Sketch the cardioid $$r = a(1 + \\cos\\theta)$$ mentally and explain why it's heart-shaped and symmetric about the initial line. (4 steps)", "answer": "- Step 1: Build a small table of key values:\n+ $$\\theta = 0$$: $$r = 2a$$ (rightmost point)\n+ $$\\theta = \\pi/2$$: $$r = a$$ (top)\n+ $$\\theta = \\pi$$: $$r = 0$$ (curve passes through pole)\n+ $$\\theta = 3\\pi/2$$: $$r = a$$ (bottom)\n- Step 2: Symmetry: replace $$\\theta$$ with $$-\\theta$$. Since $$\\cos(-\\theta) = \\cos\\theta$$, the equation is unchanged, so the curve is symmetric about the initial line.\n- Step 3: As $$\\theta$$ increases from 0 to $$\\pi$$, $$r$$ smoothly decreases from $$2a$$ to 0 ŌĆö the upper half of the heart traced.\n- Step 4: At the pole ($$\\theta = \\pi$$), the curve forms a cusp (sharp inward point), not a smooth pass-through, because both $$dx/d\\theta$$ and $$dy/d\\theta$$ vanish there.\n\nThe shape arises because the radius grows from 0 (when angle \"points back\") to maximum (when angle \"points forward\").", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_10", "judge_pick": false}, {"question": "For a \"rose curve\" $$r = a\\sin(n\\theta)$$ with the $$r \\geq 0$$ convention, how many petals does it have, and why does $$n$$ control the count? (3 steps)", "answer": "- Step 1: A petal is traced when $$r$$ rises from 0, peaks at $$a$$, and returns to 0 ŌĆö between consecutive zeros of $$\\sin(n\\theta)$$ where $$\\sin$$ stays non-negative.\n- Step 2: $$\\sin(n\\theta) = 0$$ when $$n\\theta = k\\pi$$, i.e. at $$\\theta = k\\pi/n$$. Petals occur in intervals of length $$\\pi/n$$.\n- Step 3: Within $$[0, 2\\pi)$$, there are exactly $$n$$ intervals where $$\\sin(n\\theta) \\geq 0$$ ŌĆö each gives one petal.\n+ The petals are symmetrically arranged around the pole.\n+ The \"skipped\" intervals (where $$\\sin(n\\theta) < 0$$) correspond to where $$r$$ would be negative ŌĆö no curve drawn.\n\nSo $$r = a\\sin(n\\theta)$$ has $$n$$ symmetrically arranged petals.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_11", "judge_pick": true}, {"question": "For the curve $$r^2 = a^2\\cos 2\\theta$$ (a lemniscate), why does $$\\theta$$ have restricted ranges, and what are they? (3 steps)", "answer": "- Step 1: We need $$r^2 \\geq 0$$, but $$r^2 = a^2\\cos 2\\theta$$, which is non-negative only when $$\\cos 2\\theta \\geq 0$$.\n- Step 2: $$\\cos 2\\theta \\geq 0$$ when $$2\\theta \\in [-\\pi/2, \\pi/2] \\cup [3\\pi/2, 5\\pi/2]$$, giving $$\\theta \\in [-\\pi/4, \\pi/4] \\cup [3\\pi/4, 5\\pi/4]$$.\n- Step 3: Within $$[0, 2\\pi)$$ these are two intervals: one giving the right loop, one giving the left loop.\n+ The curve doesn't exist outside these ranges ŌĆö there are \"forbidden\" angular sectors where $$r$$ would be imaginary.\n+ The lemniscate looks like a horizontal figure-8 with two loops on the $$x$$-axis and empty sectors above/below.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_12", "judge_pick": false}, {"question": "For the family $$r = a(p + q\\cos\\theta)$$ with $$p > q > 0$$, what determines whether the curve is a smooth convex \"egg\" or has a \"dimple\"? (3 steps)", "answer": "- Step 1: The curve is defined for all $$\\theta$$ when $$p \\geq q$$ (since then $$p + q\\cos\\theta \\geq 0$$).\n- Step 2: Shape depends on $$p$$ vs $$2q$$:\n+ $$p \\geq 2q$$: convex (smooth egg, no inward curvature).\n+ $$q < p < 2q$$: dimple (inward concavity around $$\\theta = \\pi$$).\n+ $$p = q$$: dimple becomes a cusp at the pole ŌĆö the cardioid.\n- Step 3: Intuition: the dimple appears when the curve's radius shrinks fast enough near $$\\theta = \\pi$$ to bend inward visibly. The threshold $$p = 2q$$ is where this just stops happening.\n\nThis can be rigorously shown by counting how many tangents are perpendicular to the initial line (>2 means dimpled).", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_13", "judge_pick": false}, {"question": "Compare the shapes of $$r = a(5 + 2\\cos\\theta)$$ and $$r = a(3 + 2\\cos\\theta)$$. Why is one convex and the other dimpled? (3 steps)", "answer": "- Step 1: Both are lima├¦ons of form $$r = a(p + q\\cos\\theta)$$.\n- Step 2: For $$r = a(5 + 2\\cos\\theta)$$: $$p = 5$$, $$q = 2$$, $$2q = 4$$. Since $$p = 5 > 4 = 2q$$, it's convex (smooth egg).\n- Step 3: For $$r = a(3 + 2\\cos\\theta)$$: $$p = 3$$, $$q = 2$$, $$2q = 4$$. Since $$p = 3 < 4 = 2q$$, it has a dimple at $$\\theta = \\pi$$.\n+ The dimple appears because the inner part shrinks fast enough relative to the outer.\n+ Smaller $$p/q$$ ratio ŌåÆ more pronounced inward curvature.\n\nThe boundary $$p = 2q$$ is where convexity transitions to having a dimple.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_14", "judge_pick": false}, {"question": "Why is the polar curve $$r = a\\sin\\theta$$ a circle (not a half-line or spiral), and what are its centre and radius? (3 steps)", "answer": "- Step 1: Multiply both sides by $$r$$: $$r^2 = ar\\sin\\theta$$.\n- Step 2: Substitute $$r^2 = x^2 + y^2$$ and $$r\\sin\\theta = y$$: $$x^2 + y^2 = ay$$.\n- Step 3: Complete the square in $$y$$: $$x^2 + (y - a/2)^2 = (a/2)^2$$.\n+ Circle of radius $$a/2$$ centred at $$(0, a/2)$$.\n+ Passes through origin (at $$\\theta = 0, \\pi$$).\n+ Maximum $$r = a$$ occurs at $$\\theta = \\pi/2$$ (top of circle).\n\nSo $$r = a\\sin\\theta$$ traces a circle in the upper half-plane, tangent to the $$x$$-axis at the origin.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_15", "judge_pick": true}, {"question": "Why does any equation of the form $$r = a\\cos\\theta + b\\sin\\theta$$ (with constants $$a, b$$) always represent a circle through the origin? (3 steps)", "answer": "- Step 1: Multiply by $$r$$: $$r^2 = ar\\cos\\theta + br\\sin\\theta$$, giving $$x^2 + y^2 = ax + by$$.\n- Step 2: Rearrange and complete the square: $$(x - a/2)^2 + (y - b/2)^2 = (a/2)^2 + (b/2)^2$$.\n- Step 3: This is a circle of radius $$\\frac{1}{2}\\sqrt{a^2 + b^2}$$ centred at $$(a/2, b/2)$$.\n+ The origin is on the circle: substituting $$(0, 0)$$ gives $$(a/2)^2 + (b/2)^2$$, matching the RHS.\n+ The diameter from origin to centre direction has length equal to the radius times 2.\n\nSo $$r = a\\cos\\theta + b\\sin\\theta$$ is the canonical polar form for \"circle through origin\".", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_16", "judge_pick": true}, {"question": "Why is the polar curve $$r = 2\\sec\\theta$$ a vertical straight line, and at what distance from the origin? (3 steps)", "answer": "- Step 1: Rewrite: $$r\\cos\\theta = 2$$.\n- Step 2: But $$r\\cos\\theta = x$$, so this becomes $$x = 2$$ ŌĆö a vertical line.\n- Step 3: The line is at perpendicular distance 2 from the origin (in the positive $$x$$ direction).\n+ General pattern: $$r = a\\sec\\theta$$ gives the vertical line $$x = a$$.\n+ Similarly $$r = a\\csc\\theta$$ gives the horizontal line $$y = a$$.\n\nThese are useful templates ŌĆö they convert quickly between polar and Cartesian for vertical/horizontal lines.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_17", "judge_pick": false}, {"question": "What is the polar equation of the line $$y = 2x$$, and why does it simplify to a fixed angle? (3 steps)", "answer": "- Step 1: Substitute $$y = r\\sin\\theta$$, $$x = r\\cos\\theta$$: $$r\\sin\\theta = 2r\\cos\\theta$$.\n- Step 2: Divide by $$r\\cos\\theta$$ (assuming non-zero): $$\\tan\\theta = 2$$.\n- Step 3: This says the angle is fixed: $$\\theta = \\arctan 2$$ (and $$\\theta = \\arctan 2 + \\pi$$ for the other direction along the line).\n+ Lines through the origin always reduce to $$\\theta = \\alpha$$ in polar.\n+ Their length isn't constrained ŌĆö only their direction.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_18", "judge_pick": true}, {"question": "How do you write the line $$y\\sqrt{3} = x + 4$$ in polar form, and why use the angle subtraction formula? (4 steps)", "answer": "- Step 1: Substitute $$x = r\\cos\\theta$$, $$y = r\\sin\\theta$$: $$r\\sqrt{3}\\sin\\theta = r\\cos\\theta + 4$$, giving $$r(\\sqrt{3}\\sin\\theta - \\cos\\theta) = 4$$.\n- Step 2: Divide both sides by 2 to match standard angle ratios: $$r\\left(\\frac{\\sqrt{3}}{2}\\sin\\theta - \\frac{1}{2}\\cos\\theta\\right) = 2$$.\n- Step 3: Recognise $$\\sin(\\theta - \\pi/6) = \\sin\\theta\\cos(\\pi/6) - \\cos\\theta\\sin(\\pi/6) = \\frac{\\sqrt{3}}{2}\\sin\\theta - \\frac{1}{2}\\cos\\theta$$.\n- Step 4: So $$r\\sin(\\theta - \\pi/6) = 2$$, giving $$r = 2\\csc(\\theta - \\pi/6)$$.\n\nThis compact form reveals the geometry: the perpendicular from origin makes a particular angle with the line.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_19", "judge_pick": false}, {"question": "Why is $$r^2 = 5\\sec 2\\theta$$ a polar form of the hyperbola $$x^2 - y^2 = 5$$? (3 steps)", "answer": "- Step 1: Substitute $$x = r\\cos\\theta$$ and $$y = r\\sin\\theta$$: $$r^2\\cos^2\\theta - r^2\\sin^2\\theta = 5$$.\n- Step 2: Factor: $$r^2(\\cos^2\\theta - \\sin^2\\theta) = 5$$. Use the identity $$\\cos^2\\theta - \\sin^2\\theta = \\cos 2\\theta$$: $$r^2\\cos 2\\theta = 5$$.\n- Step 3: Rearrange: $$r^2 = 5/\\cos 2\\theta = 5\\sec 2\\theta$$.\n+ The curve only exists where $$\\cos 2\\theta > 0$$, i.e. $$\\theta \\in (-\\pi/4, \\pi/4) \\cup (3\\pi/4, 5\\pi/4)$$.\n+ Corresponds to two hyperbola branches ŌĆö one extending right, one left.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_20", "judge_pick": false}, {"question": "Why does the polar equation derivation $$y^2 = 4x$$ ŌåÆ $$r = 4\\cot\\theta\\csc\\theta$$ involve dividing by $$r$$, and what's the pattern? (4 steps)", "answer": "- Step 1: Start with Cartesian $$y^2 = 4x$$.\n- Step 2: Substitute $$y = r\\sin\\theta$$, $$x = r\\cos\\theta$$: $$r^2\\sin^2\\theta = 4r\\cos\\theta$$.\n- Step 3: Divide by $$r$$ (curve passes through origin so $$r = 0$$ is included separately): $$r\\sin^2\\theta = 4\\cos\\theta$$.\n- Step 4: Solve for $$r$$: $$r = \\frac{4\\cos\\theta}{\\sin^2\\theta} = 4\\cot\\theta\\csc\\theta$$.\n\nThe pattern: when Cartesian has higher powers in one variable, the polar form picks up trig denominators because we isolate $$r$$ from a power-mismatched substitution.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_21", "judge_pick": true}, {"question": "Why does converting an Argand locus like $$|z - 3 - 4i| = 5$$ to polar form give $$r = 6\\cos\\theta + 8\\sin\\theta$$ with no constant? (4 steps)", "answer": "- Step 1: $$|z - (3+4i)| = 5$$ describes points at distance 5 from $$3+4i$$ ŌĆö a circle of radius 5 centred at $$(3, 4)$$.\n- Step 2: This circle passes through the origin (since $$3^2 + 4^2 = 25$$).\n- Step 3: Cartesian: $$(x-3)^2 + (y-4)^2 = 25$$ expands to $$x^2 + y^2 = 6x + 8y$$.\n- Step 4: Substitute $$x^2 + y^2 = r^2$$, $$x = r\\cos\\theta$$, $$y = r\\sin\\theta$$: $$r^2 = 6r\\cos\\theta + 8r\\sin\\theta$$. Divide by $$r$$: $$r = 6\\cos\\theta + 8\\sin\\theta$$.\n\nThe absence of a constant term is the signature of a circle passing through the origin.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_22", "judge_pick": true}, {"question": "Why does the locus $$|z + 4 + 3i| = 5$$ on an Argand diagram give a polar equation $$r = -8\\cos\\theta - 6\\sin\\theta$$ with negative coefficients? (3 steps)", "answer": "- Step 1: $$|z - (-4 - 3i)| = 5$$ is a circle of radius 5 centred at $$(-4, -3)$$, passing through origin (distance from origin to centre is $$\\sqrt{16+9} = 5$$).\n- Step 2: Cartesian: $$(x+4)^2 + (y+3)^2 = 25$$ expands to $$x^2 + y^2 = -8x - 6y$$. In polar: $$r = -8\\cos\\theta - 6\\sin\\theta$$.\n- Step 3: Negative coefficients reflect the centre being in the third quadrant (negative $$x$$ and $$y$$).\n+ For $$r \\geq 0$$, we need $$-8\\cos\\theta - 6\\sin\\theta \\geq 0$$, restricting to angular sectors pointing toward the centre.\n+ The signs encode the direction from origin to circle centre.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_23", "judge_pick": false}, {"question": "Conceptually, why does the polar distance formula $$d = \\sqrt{r_1^2 + r_2^2 - 2r_1r_2\\cos(\\theta_1 - \\theta_2)}$$ look like the cosine rule? (4 steps)", "answer": "- Step 1: This IS the cosine rule. For a triangle with sides $$a$$, $$b$$, and included angle $$C$$, the opposite side is $$c = \\sqrt{a^2 + b^2 - 2ab\\cos C}$$.\n- Step 2: For points $$(r_1, \\theta_1)$$ and $$(r_2, \\theta_2)$$, form a triangle with the pole:\n+ Side from origin to first point: length $$r_1$$.\n+ Side from origin to second point: length $$r_2$$.\n+ Angle between them at origin: $$|\\theta_1 - \\theta_2|$$.\n- Step 3: The third side connects the two points, with length $$d$$.\n- Step 4: Apply cosine rule directly: $$d^2 = r_1^2 + r_2^2 - 2r_1r_2\\cos(\\theta_1 - \\theta_2)$$.\n\nPolar coordinates naturally express distances in terms of triangles based at the pole.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_24", "judge_pick": true}, {"question": "Geometrically, what is the area formula $$\\text{Area} = \\frac{1}{2}\\int_\\alpha^\\beta r^2 \\, d\\theta$$ computing, and how is it derived from the area of a sector? (3 steps)", "answer": "- Step 1: A circular sector of radius $$r$$ and angle $$d\\theta$$ has area $$\\frac{1}{2}r^2 \\, d\\theta$$ (from the sector formula $$\\frac{1}{2}r^2\\theta$$ applied to a tiny angle).\n- Step 2: For a polar curve $$r = f(\\theta)$$, slice the bounded region into infinitely thin \"pie slices\" between angles $$\\theta$$ and $$\\theta + d\\theta$$. Each is a tiny sector of radius $$r(\\theta)$$.\n- Step 3: Sum (integrate) the infinitesimal sector areas from $$\\alpha$$ to $$\\beta$$: $$\\text{Area} = \\int_\\alpha^\\beta \\frac{1}{2}r^2 \\, d\\theta$$.\n\nThe formula is fundamentally a sum of pie-slice areas ŌĆö this is why $$r^2$$ (not $$r$$) appears, and why areas can never be \"negative\" in this setup.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_25", "judge_pick": true}, {"question": "Why does polar area integration not produce \"negative areas\" the way Cartesian integration does for curves below the $$x$$-axis? (3 steps)", "answer": "- Step 1: In Cartesian, $$\\int_a^b f(x)\\,dx$$ subtracts area below the axis because $$f(x)$$ takes negative values.\n- Step 2: In polar, the integrand is $$\\frac{1}{2}r^2$$, always non-negative. The angle $$\\theta$$ orients the slice; $$r^2$$ measures size.\n- Step 3: Integrating around a closed polar curve genuinely sums all sector areas without cancellation.\n+ Convenient: integrate from 0 to $$2\\pi$$ for any closed curve and get the enclosed area directly.\n+ Caveat: with rose curves where $$r < 0$$ for some intervals, blindly squaring still gives positive contributions ŌĆö must restrict ranges.\n\nThe \"always positive\" $$r^2$$ is both a blessing (no sign tracking) and a curse (must avoid double-counting).", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_26", "judge_pick": false}, {"question": "For the rose curve $$r = a\\sin(n\\theta)$$, why is it incorrect to find one petal's area by computing $$\\frac{1}{2}\\int_0^{2\\pi} r^2 \\, d\\theta$$ and dividing by $$n$$? (3 steps)", "answer": "- Step 1: When $$\\sin(n\\theta) < 0$$, $$r = a\\sin(n\\theta)$$ would be negative ŌĆö but with $$r \\geq 0$$ convention, we draw nothing in those intervals.\n- Step 2: However, $$r^2 = a^2\\sin^2(n\\theta)$$ is positive everywhere, so integrating over $$[0, 2\\pi]$$ also counts \"phantom petals\" where the curve isn't actually drawn.\n- Step 3: The integral effectively double-counts: actual $$n$$ petals + $$n$$ \"ghost petals\" reflected through the pole.\n+ Correct: integrate over a single petal's range (e.g., $$\\theta \\in [0, \\pi/n]$$) where $$\\sin(n\\theta) \\geq 0$$.\n+ One petal area = $$\\frac{1}{2}\\int_0^{\\pi/n} a^2\\sin^2(n\\theta)\\,d\\theta$$.\n\nThis is the most common mistake in polar area problems ŌĆö always check the range where $$r \\geq 0$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_27", "judge_pick": false}, {"question": "Why does using the trig identity $$\\cos^2\\theta = (1 + \\cos 2\\theta)/2$$ make polar area computations tractable? (3 steps)", "answer": "- Step 1: Polar area integrals always involve $$r^2$$, which expands to terms with $$\\cos^2$$, $$\\sin^2$$, or $$\\cos\\theta\\sin\\theta$$. Direct integration of these isn't immediate.\n- Step 2: Double-angle identities convert these \"second-power\" trig functions into linear combinations of $$1$$ and $$\\cos(2\\theta)$$ (or $$\\sin(2\\theta)$$) ŌĆö both of which integrate trivially.\n- Step 3: The identities come from $$\\cos 2\\theta = 2\\cos^2\\theta - 1 = 1 - 2\\sin^2\\theta$$ (using $$\\cos^2 + \\sin^2 = 1$$):\n+ $$\\cos^2\\theta = (1 + \\cos 2\\theta)/2$$\n+ $$\\sin^2\\theta = (1 - \\cos 2\\theta)/2$$\n\nWithout these, polar area calculations would need special techniques. With them, everything collapses to constants and single trig functions.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_28", "judge_pick": true}, {"question": "Why does the area integral of the cardioid $$r = a(1 + \\cos\\theta)$$ over $$[0, 2\\pi]$$ yield $$3\\pi a^2/2$$, and what is the \"$$3/2$$\" factor reflecting? (4 steps)", "answer": "- Step 1: Setup: $$\\text{Area} = \\frac{1}{2}\\int_0^{2\\pi} a^2(1 + \\cos\\theta)^2 d\\theta$$. Expand: $$(1+\\cos\\theta)^2 = 1 + 2\\cos\\theta + \\cos^2\\theta$$.\n- Step 2: Use $$\\cos^2\\theta = (1+\\cos 2\\theta)/2$$: integrand becomes $$\\frac{3}{2} + 2\\cos\\theta + \\frac{\\cos 2\\theta}{2}$$.\n- Step 3: Integrate over $$[0, 2\\pi]$$. Oscillating terms ($$\\cos\\theta$$, $$\\cos 2\\theta$$) integrate to zero. Only constant $$3/2$$ contributes: $$3/2 \\cdot 2\\pi = 3\\pi$$.\n- Step 4: Multiply by $$a^2/2$$: $$3\\pi a^2/2$$.\n+ The \"$$3/2$$\" is the average value of $$(1 + \\cos\\theta)^2$$ over a full period.\n+ The cardioid's area is exactly 3/2 times that of a circle of radius $$a$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_29", "judge_pick": false}, {"question": "Conceptually, why does the area enclosed by $$r = a(p + q\\cos\\theta)$$ (with $$p \\geq q > 0$$) equal $$\\frac{(2p^2 + q^2)\\pi a^2}{2}$$? (5 steps)", "answer": "- Step 1: Use the area formula: $$A = \\frac{1}{2}\\int_0^{2\\pi} a^2(p + q\\cos\\theta)^2 \\, d\\theta$$.\n- Step 2: Expand: $$(p + q\\cos\\theta)^2 = p^2 + 2pq\\cos\\theta + q^2\\cos^2\\theta$$.\n- Step 3: Apply $$\\cos^2\\theta = (1 + \\cos 2\\theta)/2$$: $$p^2 + 2pq\\cos\\theta + \\frac{q^2}{2} + \\frac{q^2}{2}\\cos 2\\theta$$.\n- Step 4: Integrate over $$[0, 2\\pi]$$: both $$\\cos\\theta$$ and $$\\cos 2\\theta$$ integrate to zero over full period. Only constants survive: $$p^2 + q^2/2$$ times $$2\\pi$$.\n- Step 5: $$A = \\frac{a^2}{2} \\cdot (p^2 + q^2/2) \\cdot 2\\pi = \\frac{(2p^2 + q^2)\\pi a^2}{2}$$.\n\nThe cosine terms vanish because of full-period integration ŌĆö only the \"average squared radius\" contributes.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_30", "judge_pick": false}, {"question": "When finding the area of overlap between two polar curves, why must you split the integral into pieces, and how do you determine which curve \"binds\" each piece? (4 steps)", "answer": "- Step 1: The overlap region at angle $$\\theta$$ is bounded by the *closer* curve (smaller $$r$$) ŌĆö being inside the closer one automatically means inside the farther one.\n- Step 2: Find intersection angles by setting $$r_1(\\theta) = r_2(\\theta)$$ and solving.\n- Step 3: For each angular sub-interval between intersections, identify which curve has the smaller $$r$$ there (test a midpoint).\n- Step 4: Integrate $$\\frac{1}{2}r_{\\min}^2$$ over each sub-interval using the bounding curve, then sum.\n+ Often, by symmetry, you can integrate over half the region and double.\n\nThis is the central technique for \"inside both curves\" problems.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_31", "judge_pick": true}, {"question": "When you find the area \"inside one polar curve and outside another\", what's the conceptual setup using the polar area formula? (3 steps)", "answer": "- Step 1: At angle $$\\theta$$, the \"inside one outside other\" region is the annular sliver between inner $$r_{\\text{in}}(\\theta)$$ and outer $$r_{\\text{out}}(\\theta)$$.\n- Step 2: Sliver area per angle increment: $$\\frac{1}{2}r_{\\text{out}}^2 \\, d\\theta - \\frac{1}{2}r_{\\text{in}}^2 \\, d\\theta$$ ŌĆö outer pie slice minus inner pie slice.\n- Step 3: Integrate the difference: $$\\text{Area} = \\frac{1}{2}\\int_\\alpha^\\beta (r_{\\text{out}}^2 - r_{\\text{in}}^2)\\,d\\theta$$.\n\nThis is analogous to \"upper minus lower\" in Cartesian, but with squared radii because each contribution is a pie slice.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_32", "judge_pick": false}, {"question": "Why is recognising symmetry the key first step when sketching or finding areas of polar curves? (3 steps)", "answer": "- Step 1: Symmetry simplifies sketching: draw half (or a quarter) and reflect.\n- Step 2: Symmetry simplifies area calculation: integrate over a smaller range and multiply.\n- Step 3: Common symmetries:\n+ About initial line: $$f(-\\theta) = f(\\theta)$$ (cosine-only functions like cardioid).\n+ About $$y$$-axis: $$f(\\pi - \\theta) = f(\\theta)$$ (sine-only functions).\n+ Rotational ($$n$$-fold): $$f(\\theta + 2\\pi/n) = f(\\theta)$$ (rose curves).\n\nRecognising symmetry up front saves significant effort and reveals structure.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_33", "judge_pick": false}, {"question": "A common mistake: a student computes the area enclosed by $$r = a\\sin\\theta$$ as $$\\frac{1}{2}\\int_0^{2\\pi} a^2\\sin^2\\theta \\, d\\theta$$. Why is this wrong, and what's correct? (4 steps)", "answer": "- Step 1: $$r = a\\sin\\theta$$ traces a circle in upper half-plane (radius $$a/2$$, centred at $$(0, a/2)$$).\n- Step 2: Circle is fully traced as $$\\theta$$ goes from 0 to $$\\pi$$ (where $$\\sin\\theta \\geq 0$$). For $$\\theta \\in [\\pi, 2\\pi]$$, $$\\sin\\theta < 0$$, so $$r$$ would be negative ŌĆö no curve drawn.\n- Step 3: But integrand $$a^2\\sin^2\\theta$$ is always positive. Integrating over $$[0, 2\\pi]$$ counts the circle twice.\n- Step 4: Correct: $$\\text{Area} = \\frac{1}{2}\\int_0^\\pi a^2\\sin^2\\theta \\, d\\theta = \\frac{a^2}{2} \\cdot \\frac{\\pi}{2} = \\frac{\\pi a^2}{4}$$. This matches the circle area $$\\pi(a/2)^2 = \\pi a^2/4$$. Ō£ō\n\nAlways identify the actual range where $$r \\geq 0$$ before integrating.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_34", "judge_pick": false}, {"question": "Why is $$r = a\\cos\\theta$$ traced out completely as $$\\theta$$ varies over $$[-\\pi/2, \\pi/2]$$, rather than $$[0, 2\\pi]$$? (3 steps)", "answer": "- Step 1: This is a circle of radius $$a/2$$ centred at $$(a/2, 0)$$, passing through the pole at $$\\theta = \\pm\\pi/2$$ (where $$r = 0$$).\n- Step 2: For $$\\theta \\in [-\\pi/2, \\pi/2]$$, $$\\cos\\theta \\geq 0$$, so $$r \\geq 0$$. Curve sweeps from pole at $$\\theta = -\\pi/2$$, through $$(a, 0)$$ at $$\\theta = 0$$, back to pole at $$\\theta = \\pi/2$$ ŌĆö one complete circle.\n- Step 3: For $$\\theta \\in (\\pi/2, 3\\pi/2)$$, $$\\cos\\theta < 0$$, $$r$$ would be negative. Those angles correspond to \"phantom\" passes that retrace the same circle (under $$r < 0$$ extension).\n+ Integrating over $$[0, 2\\pi]$$ would count the circle's area twice ŌĆö a common pitfall.\n\nIntegrate only over $$[-\\pi/2, \\pi/2]$$ to avoid double counting.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_35", "judge_pick": false}, {"question": "Why do we use the substitution $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$ when converting the polar equation $$r^2 = \\sin 2\\theta$$ to Cartesian form? (3 steps)", "answer": "- Step 1: We want every term to translate cleanly. We have $$r\\cos\\theta = x$$ and $$r\\sin\\theta = y$$ ŌĆö but $$\\sin 2\\theta$$ alone matches neither.\n- Step 2: Using $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$, the equation becomes $$r^2 = 2\\sin\\theta\\cos\\theta$$. Multiply both sides by $$r^2$$: $$r^4 = 2(r\\sin\\theta)(r\\cos\\theta)$$.\n- Step 3: Now RHS = $$2 \\cdot y \\cdot x = 2xy$$ and LHS = $$(x^2 + y^2)^2$$, giving $$(x^2 + y^2)^2 = 2xy$$.\n\nThe trick: factor the trig function until each piece pairs with an $$r$$ to give an $$x$$ or $$y$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_36", "judge_pick": true}, {"question": "To find tangents to a polar curve $$r = f(\\theta)$$, why do we convert to parametric Cartesian form $$x = f(\\theta)\\cos\\theta$$, $$y = f(\\theta)\\sin\\theta$$ before differentiating? (3 steps)", "answer": "- Step 1: A \"tangent\" means a line touching the curve with a well-defined gradient $$dy/dx$$. Polar coordinates don't directly give a gradient ŌĆö they give $$r$$ as a function of $$\\theta$$, which isn't the same as a slope.\n- Step 2: By writing $$x$$ and $$y$$ as functions of parameter $$\\theta$$, we use the parametric chain rule: $$\\frac{dy}{dx} = \\frac{dy/d\\theta}{dx/d\\theta}$$.\n- Step 3: This converts polar form into a setup where standard calculus applies, allowing us to identify horizontal tangents ($$dy/d\\theta = 0$$) and vertical tangents ($$dx/d\\theta = 0$$).\n\nThe substitutions embed the polar curve into Cartesian space in a way that calculus can handle.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_37", "judge_pick": true}, {"question": "Why does $$dy/d\\theta = 0$$ correspond to a tangent parallel to the initial line, not perpendicular to it? (3 steps)", "answer": "- Step 1: A tangent is parallel to the $$x$$-axis (initial line) when its slope $$dy/dx = 0$$ ŌĆö i.e., $$y$$ is momentarily not changing as we move along the curve.\n- Step 2: In parametric form, $$\\frac{dy}{dx} = \\frac{dy/d\\theta}{dx/d\\theta}$$ equals zero when the numerator $$dy/d\\theta = 0$$ (provided $$dx/d\\theta \\neq 0$$).\n- Step 3: So $$dy/d\\theta = 0$$ marks where $$y$$ has a critical point as a function of $$\\theta$$ ŌĆö these are the highest/lowest points the curve reaches, where the tangent is horizontal.\n\nBy symmetry, $$dx/d\\theta = 0$$ marks the leftmost/rightmost points, where the tangent is vertical.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_38", "judge_pick": true}, {"question": "A common mistake is to differentiate $$r$$ directly with respect to $$\\theta$$ and equate to zero to find tangent points. Why does this find the wrong thing? (3 steps)", "answer": "- Step 1: $$dr/d\\theta = 0$$ marks where the radial distance has a local extremum ŌĆö the curve momentarily stops moving radially (moves only tangentially around the pole).\n- Step 2: This is NOT the same as the tangent being horizontal or vertical relative to the initial line.\n- Step 3: For tangent direction relative to the initial line, use parametric Cartesian $$dy/d\\theta$$ or $$dx/d\\theta$$, not $$dr/d\\theta$$.\n+ Concrete counter-example: on a circle $$r = a$$, $$dr/d\\theta = 0$$ everywhere, but the tangent direction varies all around ŌĆö clearly $$dr/d\\theta = 0$$ doesn't tell us tangent direction.\n\nAlways set up the parametric equations $$x = r\\cos\\theta$$, $$y = r\\sin\\theta$$ first, then differentiate.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_39", "judge_pick": true}, {"question": "For the cardioid $$r = a(1 + \\cos\\theta)$$, derive the condition for the tangent to be parallel to the initial line. (5 steps)", "answer": "- Step 1: Write $$y = r\\sin\\theta = a(1 + \\cos\\theta)\\sin\\theta = a(\\sin\\theta + \\sin\\theta\\cos\\theta)$$.\n- Step 2: Differentiate using product rule: $$\\frac{dy}{d\\theta} = a(\\cos\\theta + \\cos^2\\theta - \\sin^2\\theta) = a(\\cos\\theta + \\cos 2\\theta)$$.\n- Step 3: Use $$\\cos 2\\theta = 2\\cos^2\\theta - 1$$: $$\\frac{dy}{d\\theta} = a(2\\cos^2\\theta + \\cos\\theta - 1)$$.\n- Step 4: Set to zero: $$2\\cos^2\\theta + \\cos\\theta - 1 = 0$$. Factor: $$(2\\cos\\theta - 1)(\\cos\\theta + 1) = 0$$.\n- Step 5: Solutions: $$\\cos\\theta = 1/2$$ giving $$\\theta = \\pm\\pi/3$$ (with $$r = 3a/2$$), or $$\\cos\\theta = -1$$ giving $$\\theta = \\pi$$ (with $$r = 0$$ at the pole).\n\nThe horizontal tangents are at $$(3a/2, \\pm\\pi/3)$$ and at the cusp at the pole.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_40", "judge_pick": false}, {"question": "Using the family $$r = a(p + q\\cos\\theta)$$ with $$p > q > 0$$, prove that the condition $$p \\geq 2q$$ ensures the curve is convex. (5 steps)", "answer": "- Step 1: For a vertical tangent, set $$dx/d\\theta = 0$$. Compute $$x = r\\cos\\theta = a(p\\cos\\theta + q\\cos^2\\theta)$$, so $$\\frac{dx}{d\\theta} = -a\\sin\\theta(p + 2q\\cos\\theta)$$.\n- Step 2: Setting equal to zero gives two cases: $$\\sin\\theta = 0$$ (i.e., $$\\theta = 0$$ or $$\\pi$$) and $$\\cos\\theta = -p/(2q)$$.\n- Step 3: First case gives 2 vertical tangents (at $$\\theta = 0$$ and $$\\theta = \\pi$$).\n- Step 4: Second case has solutions only if $$|-p/(2q)| \\leq 1$$, i.e. $$p \\leq 2q$$.\n+ If $$p < 2q$$: two extra solutions in $$(\\pi/2, 3\\pi/2)$$ ŌåÆ 4 vertical tangents ŌåÆ not convex (dimple).\n+ If $$p = 2q$$: $$\\cos\\theta = -1$$, giving $$\\theta = \\pi$$ (already counted) ŌåÆ still 2 distinct tangents ŌåÆ convex.\n+ If $$p > 2q$$: no solution ŌåÆ only 2 tangents from case 1 ŌåÆ convex.\n- Step 5: A convex closed curve has exactly 2 tangents perpendicular to any given direction. So $$p \\geq 2q$$ ensures convexity.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_41", "judge_pick": false}, {"question": "For a polar curve passing through the pole at $$\\theta = \\alpha$$, why is the line $$\\theta = \\alpha$$ automatically the tangent at the pole? (3 steps)", "answer": "- Step 1: When the curve passes through the pole at parameter $$\\theta = \\alpha$$, the curve approaches the origin along a specific direction.\n- Step 2: As $$\\theta$$ approaches $$\\alpha$$, $$r \\to 0$$ so the point $$(r\\cos\\theta, r\\sin\\theta)$$ approaches the origin. But the *direction* of approach is determined by $$\\theta$$ ŌĆö and as $$\\theta \\to \\alpha$$, the direction approaches angle $$\\alpha$$.\n- Step 3: Therefore the tangent at the pole is the line $$\\theta = \\alpha$$.\n+ This is a useful shortcut: instead of computing $$dy/dx$$ via parametric methods at $$r = 0$$, just identify the angle where $$r = 0$$.\n\nSo finding values of $$\\theta$$ where $$r(\\theta) = 0$$ tells you the tangent directions through the pole.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_42", "judge_pick": true}, {"question": "When the cardioid $$r = a(1+\\cos\\theta)$$ touches the pole at $$\\theta = \\pi$$, why does it form a cusp rather than smoothly passing through? (3 steps)", "answer": "- Step 1: At $$\\theta = \\pi$$, $$r = 0$$ (curve at pole). As $$\\theta$$ moves through $$\\pi$$, $$r$$ instantaneously becomes 0 then grows again.\n- Step 2: For the cardioid, both $$dx/d\\theta = 0$$ and $$dy/d\\theta = 0$$ at $$\\theta = \\pi$$ ŌĆö the parameterisation has a stationary point. The curve momentarily comes to rest.\n- Step 3: The two branches approaching $$\\theta = \\pi$$ from below and above approach the pole with the *same* tangent direction (along the negative $$x$$-axis), then turn back.\n+ This makes a cusp ŌĆö a sharp inward point.\n+ Cusps appear when both parametric derivatives vanish simultaneously and the curve \"reverses\".", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_43", "judge_pick": true}, {"question": "For a polar curve $$r = f(\\theta)$$, what is the geometric meaning of $$dr/d\\theta$$? Is it the same as the slope of the tangent? (3 steps)", "answer": "- Step 1: $$dr/d\\theta$$ is the rate at which radial distance changes per unit angle. It tells you how fast the curve is spiralling outward (positive) or inward (negative).\n- Step 2: It's NOT the slope of the tangent. The tangent slope is $$dy/dx = (dy/d\\theta)/(dx/d\\theta)$$, which depends on both $$f(\\theta)$$ and $$f'(\\theta)$$.\n- Step 3: The angle $$\\psi$$ between tangent and radius vector is $$\\tan\\psi = r/(dr/d\\theta)$$.\n+ When $$dr/d\\theta = 0$$: tangent perpendicular to radius (curve moves tangentially, like on a circle).\n+ When $$dr/d\\theta$$ is large vs $$r$$: tangent points more along radius (curve moves primarily outward/inward).\n\nSo $$dr/d\\theta$$ is fundamentally a \"radial velocity\" ŌĆö different from tangent slope but related.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_44", "judge_pick": true}, {"question": "When we write the equation of a tangent in polar form (e.g., $$r = (4a/3\\sqrt{3})\\csc\\theta$$), what does this represent in Cartesian terms? (3 steps)", "answer": "- Step 1: $$r = c\\csc\\theta$$ means $$r\\sin\\theta = c$$, but $$r\\sin\\theta = y$$, so $$y = c$$ ŌĆö a horizontal line at height $$c$$.\n- Step 2: Similarly, $$r = c\\sec\\theta$$ means $$r\\cos\\theta = c$$, i.e., $$x = c$$ ŌĆö a vertical line.\n- Step 3: So $$r = (4a/3\\sqrt{3})\\csc\\theta$$ is the horizontal line $$y = 4a/(3\\sqrt{3})$$.\n+ All horizontal lines have form $$r = c\\csc\\theta$$.\n+ All vertical lines have form $$r = c\\sec\\theta$$.\n\nThe csc/sec polar forms are the natural way to express horizontal/vertical tangent lines in polar.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_45", "judge_pick": true}, {"question": "What's the difference between the curve $$r = a$$ and $$r = a\\sec\\theta$$? (3 steps)", "answer": "- Step 1: $$r = a$$ is a circle of radius $$a$$ centred at the pole ŌĆö radial distance is constant $$a$$.\n- Step 2: $$r = a\\sec\\theta$$ rearranges to $$r\\cos\\theta = a$$, i.e., $$x = a$$ ŌĆö a vertical line at horizontal position $$a$$.\n- Step 3: Difference: in $$r = a$$, the radius $$r$$ is fixed; in $$r = a\\sec\\theta$$, the projection of $$r$$ onto the initial line (= $$x$$) is fixed.\n+ As $$\\theta$$ rotates, $$r$$ in the second equation must increase to keep $$x$$ constant ŌĆö $$r$$ blows up as $$\\theta \\to \\pm\\pi/2$$.\n\nThese two equations highlight different invariants: total distance vs horizontal projection.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_46", "judge_pick": false}, {"question": "Why does a polar curve $$r = a(1 + \\cos\\theta)$$ over $$[0, 2\\pi]$$ enclose its area without any need to split or restrict the integration limits? (3 steps)", "answer": "- Step 1: $$r = a(1 + \\cos\\theta) \\geq 0$$ for all $$\\theta$$ (since $$\\cos\\theta \\geq -1$$). The curve is always defined and non-negative.\n- Step 2: At $$\\theta = \\pi$$, $$r = 0$$ (curve touches pole), but it doesn't go negative. The integration formula sums pie-slice areas, and a slice with $$r = 0$$ contributes nothing.\n- Step 3: The whole curve is traced once as $$\\theta$$ goes from 0 to $$2\\pi$$, with no double-counting or missing pieces.\n+ Compare with rose curves where $$r$$ goes negative ŌĆö those need careful range selection.\n\nSingle-loop, non-negative-$$r$$ curves can always be integrated over $$[0, 2\\pi]$$ directly.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_47", "judge_pick": false}, {"question": "For the curve $$r = e^{2\\theta}$$ over $$0 \\leq \\theta \\leq \\pi$$, conceptually explain how to find points where the tangent is perpendicular to the initial line. (4 steps)", "answer": "- Step 1: Perpendicular to initial line means vertical tangent, requiring $$dx/d\\theta = 0$$.\n- Step 2: Set up $$x = r\\cos\\theta = e^{2\\theta}\\cos\\theta$$. Differentiate using product rule: $$\\frac{dx}{d\\theta} = 2e^{2\\theta}\\cos\\theta - e^{2\\theta}\\sin\\theta = e^{2\\theta}(2\\cos\\theta - \\sin\\theta)$$.\n- Step 3: Since $$e^{2\\theta} > 0$$, set $$2\\cos\\theta - \\sin\\theta = 0$$, giving $$\\tan\\theta = 2$$.\n- Step 4: Solve in $$[0, \\pi]$$: $$\\theta = \\arctan 2 \\approx 1.107$$. Corresponding $$r = e^{2 \\cdot 1.107}$$.\n\nThe exponential growth means $$r$$ explodes, but the tangent direction depends only on the ratio $$dy/d\\theta : dx/d\\theta$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_48", "judge_pick": true}, {"question": "When solving for the intersection of two polar curves, why might setting $$r_1(\\theta) = r_2(\\theta)$$ miss some intersection points? (3 steps)", "answer": "- Step 1: Two curves intersect at a point if they reach the same physical location, possibly at different parameter values.\n- Step 2: $$r_1(\\theta) = r_2(\\theta)$$ finds points where both curves give the same $$r$$ at the same $$\\theta$$ ŌĆö but polar coordinates aren't unique.\n- Step 3: Two main pitfalls:\n+ The pole: both curves might pass through the pole at *different* values of $$\\theta$$. The algebraic equation might miss this. Always check $$r = 0$$ separately for both.\n+ Multiple representations: the same point can have $$\\theta$$ on one curve and $$\\theta + 2\\pi k$$ on another.\n\nSo set equal AND independently check whether both curves hit the pole.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_49", "judge_pick": true}, {"question": "Visualise the curve $$r = a(4 + 3\\cos\\theta)$$. Without computing exact tangent points, why does it have a dimple, and roughly where? (3 steps)", "answer": "- Step 1: Identify $$p = 4$$, $$q = 3$$. Since $$p < 2q = 6$$, the curve has a dimple.\n- Step 2: The dimple occurs near $$\\theta = \\pi$$ ŌĆö that's where $$r$$ is smallest. At $$\\theta = \\pi$$, $$r = a(4-3) = a$$. At $$\\theta = 0$$, $$r = a(4+3) = 7a$$.\n- Step 3: So the curve bulges to the right (max $$7a$$) and dimples on the left (min $$a$$). The dimple is a local concavity in the boundary near the negative $$x$$-axis.\n\nThe qualitative test ($$p$$ vs $$2q$$) immediately tells you the shape without integrating.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_50", "judge_pick": true}, {"question": "Sketch differences: how does $$r = a(1 - \\cos\\theta)$$ differ from $$r = a(1 + \\cos\\theta)$$? (3 steps)", "answer": "- Step 1: Both are cardioids, but reflected. $$r = a(1 + \\cos\\theta)$$ has cusp at $$\\theta = \\pi$$ (negative $$x$$-axis) and bulges right (max $$r = 2a$$ at $$\\theta = 0$$).\n- Step 2: $$r = a(1 - \\cos\\theta)$$ has cusp at $$\\theta = 0$$ ($$r = 0$$) and bulges left (max $$r = 2a$$ at $$\\theta = \\pi$$).\n- Step 3: This is a reflection through the $$y$$-axis, equivalent to $$\\theta \\to \\pi - \\theta$$ (since $$\\cos(\\pi - \\theta) = -\\cos\\theta$$).\n+ Similarly, $$r = a(1 + \\sin\\theta)$$ has cusp on negative $$y$$-axis and bulges upward.\n+ $$r = a(1 - \\sin\\theta)$$ has cusp at top and bulges downward.\n\nSign and trig function rotate the cardioid orientation.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_51", "judge_pick": false}, {"question": "Visualise $$r = a(2 + \\sin\\theta)$$. Where is the maximum $$r$$, and is the curve convex? (3 steps)", "answer": "- Step 1: Apply rule $$p \\geq 2q$$: $$p = 2$$, $$q = 1$$, $$2q = 2$$, so $$p = 2q$$ ŌĆö borderline convex (no dimple).\n- Step 2: Maximum $$r$$ where $$\\sin\\theta = 1$$, i.e., $$\\theta = \\pi/2$$, giving $$r = 3a$$. The curve bulges upward.\n- Step 3: Minimum $$r$$ where $$\\sin\\theta = -1$$, i.e., $$\\theta = 3\\pi/2$$, giving $$r = a$$. Curve narrowest at bottom.\n+ Symmetric about the $$y$$-axis (since $$\\sin(\\pi - \\theta) = \\sin\\theta$$).\n\nSin in the equation orients the egg vertically, compared to cos which orients horizontally.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_52", "judge_pick": true}, {"question": "When sketching $$r = a\\cos 3\\theta$$ for $$-\\pi/4 \\leq \\theta \\leq \\pi/4$$, why might this NOT show all 3 petals? (3 steps)", "answer": "- Step 1: $$r = a\\cos 3\\theta$$ has 3 petals total over $$[0, 2\\pi]$$ with $$r \\geq 0$$ convention.\n- Step 2: $$\\cos(3\\theta) \\geq 0$$ requires $$3\\theta \\in [-\\pi/2, \\pi/2]$$, i.e., $$\\theta \\in [-\\pi/6, \\pi/6]$$ ŌĆö only ONE petal (the central one).\n- Step 3: The interval $$[-\\pi/4, \\pi/4]$$ slightly extends beyond $$[-\\pi/6, \\pi/6]$$ where $$\\cos 3\\theta < 0$$ ŌĆö no curve drawn there.\n+ To see all 3 petals, $$\\theta$$ must range over $$[-\\pi/6, \\pi/6] \\cup [\\pi/2, 5\\pi/6] \\cup [7\\pi/6, 9\\pi/6]$$.\n\nThe sketching range determines which petals are visible.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_53", "judge_pick": true}, {"question": "For one loop of $$r = a\\sin 4\\theta$$, why is the integration range $$0 \\leq \\theta \\leq \\pi/4$$ correct, and what does the area integral evaluate to? (4 steps)", "answer": "- Step 1: A loop starts where $$r = 0$$, peaks at $$r = a$$, returns to $$r = 0$$. So we need consecutive zeros of $$\\sin(4\\theta)$$ with $$\\sin > 0$$ between.\n- Step 2: $$\\sin(4\\theta) = 0$$ when $$4\\theta = k\\pi$$, i.e., $$\\theta = k\\pi/4$$. For $$\\theta \\in [0, \\pi/4]$$, $$4\\theta \\in [0, \\pi]$$ where $$\\sin$$ is non-negative.\n- Step 3: Set up: $$\\text{Area} = \\frac{1}{2}\\int_0^{\\pi/4} a^2\\sin^2(4\\theta)\\,d\\theta$$. Use $$\\sin^2(4\\theta) = (1 - \\cos 8\\theta)/2$$.\n- Step 4: Integral becomes $$\\frac{a^2}{4}\\int_0^{\\pi/4}(1 - \\cos 8\\theta)\\,d\\theta$$. The constant gives $$\\pi/4$$; the cosine integrates to $$\\sin 8\\theta / 8$$ which vanishes at both limits. Result: $$\\frac{a^2}{4} \\cdot \\frac{\\pi}{4} = \\pi a^2/16$$.\n\nAlways start at one zero of $$r$$ and end at the next.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_54", "judge_pick": true}, {"question": "Two polar curves are $$r = 2 + \\cos\\theta$$ (a lima├¦on) and $$r = 5\\cos\\theta$$ (a circle). Why must the area inside both be computed by splitting the integration at $$\\theta = \\pi/3$$? (4 steps)", "answer": "- Step 1: The \"inside both\" region is bounded by the inner curve at each angle.\n- Step 2: Find intersections: $$2 + \\cos\\theta = 5\\cos\\theta$$ gives $$\\cos\\theta = 1/2$$, so $$\\theta = \\pm\\pi/3$$.\n- Step 3: Test which curve is inner in each interval:\n+ At $$\\theta = 0$$: $$r_1 = 3$$, $$r_2 = 5$$. Lima├¦on is inside.\n+ At $$\\theta = \\pi/2$$: $$r_1 = 2$$, $$r_2 = 0$$. Circle is inside.\n- Step 4: So integrate using the lima├¦on for $$|\\theta| \\leq \\pi/3$$ and the circle for $$\\pi/3 \\leq |\\theta| \\leq \\pi/2$$.\n\nTwo integrals are needed because the inner curve switches at the intersection.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_55", "judge_pick": true}, {"question": "A polar curve has equation $$r = a + 5\\sin\\theta$$ for $$a > 5$$. The total enclosed area is $$\\frac{187\\pi}{2}$$. Use the lima├¦on area formula to find $$a$$. (4 steps)", "answer": "- Step 1: Use the closed-lima├¦on formula: $$\\text{Area} = \\frac{(2p^2 + q^2)\\pi}{2}$$ where $$p = a$$, $$q = 5$$.\n- Step 2: Substitute: $$\\frac{(2a^2 + 25)\\pi}{2} = \\frac{187\\pi}{2}$$.\n- Step 3: Cancel $$\\pi/2$$: $$2a^2 + 25 = 187$$, so $$2a^2 = 162$$, giving $$a^2 = 81$$.\n- Step 4: Since $$a > 5 > 0$$, take positive root: $$a = 9$$. Check: $$9 > 5$$ Ō£ō.\n\nThis uses the general lima├¦on area formula directly ŌĆö much faster than integrating from scratch.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_56", "judge_pick": false}, {"question": "Why does a polar curve $$r = f(\\theta)$$ become \"closed\" when $$f$$ is periodic, but spirals like $$r = a\\theta$$ are open? (3 steps)", "answer": "- Step 1: A closed curve returns to its start as $$\\theta$$ varies over some period $$T$$. This requires $$f(\\theta + T) = f(\\theta)$$.\n- Step 2: For $$f$$ involving only $$\\sin\\theta$$, $$\\cos\\theta$$, etc., the period is $$2\\pi$$ ŌĆö curves close after one rotation. Examples: cardioid, lima├¦on, circle.\n- Step 3: For $$f(\\theta) = a\\theta$$ or $$f(\\theta) = e^{k\\theta}$$, $$f$$ is monotonically increasing and never returns to a previous value ŌĆö the curve never closes.\n+ Adding periodic to non-periodic ($$r = a\\theta + b\\sin\\theta$$) gives a \"wavy spiral\" ŌĆö still not closed.\n\nClosedness Ōåö periodicity of $$f(\\theta)$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_57", "judge_pick": true}, {"question": "A polar curve $$r = a(1 + \\tan\\theta)$$ for $$0 \\leq \\theta < \\pi/2$$ has unusual behaviour as $$\\theta \\to \\pi/2$$. What happens, and why? (3 steps)", "answer": "- Step 1: As $$\\theta \\to \\pi/2$$, $$\\tan\\theta \\to \\infty$$, so $$r \\to \\infty$$. The curve grows unboundedly.\n- Step 2: But $$x = r\\cos\\theta = a(1 + \\tan\\theta)\\cos\\theta = a(\\cos\\theta + \\sin\\theta)$$, which approaches $$a(0 + 1) = a$$ ŌĆö finite.\n- Step 3: So the curve has a vertical asymptote at $$x = a$$: as $$r \\to \\infty$$ in direction $$\\theta \\to \\pi/2$$, the curve approaches the vertical line $$x = a$$.\n+ Sketching requires showing the asymptote.\n+ Asymptotes in polar curves often arise where $$r$$ diverges at a finite angle ŌĆö the resulting Cartesian point can still be finite.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_58", "judge_pick": true}, {"question": "Suppose you want to verify that $$r = 6\\cos\\theta + 8\\sin\\theta$$ describes a circle of diameter 10. Use the polar form to find the maximum value of $$r$$. (3 steps)", "answer": "- Step 1: Maximum of $$r = 6\\cos\\theta + 8\\sin\\theta$$ occurs when the linear combination is maximised.\n- Step 2: Use the standard identity: $$a\\cos\\theta + b\\sin\\theta = R\\cos(\\theta - \\phi)$$ where $$R = \\sqrt{a^2 + b^2}$$. Here $$R = \\sqrt{36 + 64} = 10$$.\n- Step 3: So $$r_{\\max} = 10$$ ŌĆö equals the diameter of the circle.\n+ For a circle through origin, $$r_{\\max}$$ from origin equals the diameter (pole is on circle, farthest point is diametrically opposite).\n+ Diameter = 10 ŌåÆ radius = 5. Ō£ō\n\nThe polar coefficient magnitude $$\\sqrt{a^2 + b^2}$$ for a circle-through-origin form gives the diameter.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_59", "judge_pick": false}, {"question": "Why does the polar area formula $$\\frac{1}{2}\\int r^2 d\\theta$$ give exactly half the answer if you forget the factor of $$\\frac{1}{2}$$? (3 steps)", "answer": "- Step 1: The $$\\frac{1}{2}$$ comes from the area of an infinitesimal circular sector of radius $$r$$ and angle $$d\\theta$$, which is $$\\frac{1}{2}r^2 d\\theta$$.\n- Step 2: This sector formula comes from: full circle area $$\\pi r^2$$, full angle $$2\\pi$$, so a sector of angle $$\\theta$$ has area $$\\pi r^2 \\cdot (\\theta/2\\pi) = \\frac{1}{2}r^2\\theta$$.\n- Step 3: Forgetting $$\\frac{1}{2}$$ would treat each sector as a \"double sector\" ŌĆö equivalently a parallelogram of sides $$r$$ and $$r\\,d\\theta$$ instead of a triangle.\n+ The triangular nature of pie slices is what introduces the $$\\frac{1}{2}$$.\n\nAlways include the $$\\frac{1}{2}$$; it's geometric, not a quirk.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_60", "judge_pick": true}, {"question": "Visualise the cross-section of a shell modelled by $$r = k\\theta$$ for $$0 \\leq \\theta \\leq 4\\pi$$ (2 full turns). What does \"horizontal diameter\" mean, and how is it related to $$k$$? (3 steps)", "answer": "- Step 1: Horizontal diameter is the total horizontal extent: from leftmost point of outer loop to rightmost point.\n- Step 2: At $$\\theta = 4\\pi$$, the spiral is on the positive $$x$$-axis at $$r = 4k\\pi$$ (rightmost point). At $$\\theta = 3\\pi$$ (outer turn pointing left), $$r = 3k\\pi$$ on the negative $$x$$-axis, so $$x = -3k\\pi$$ (leftmost).\n- Step 3: Horizontal diameter $$= 4k\\pi - (-3k\\pi) = 7k\\pi$$. If given as 3 cm: $$7k\\pi = 3$$, so $$k = 3/(7\\pi)$$.\n\nThe spacing parameter $$k$$ controls the diameter, given the number of turns.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_61", "judge_pick": false}, {"question": "Argand diagrams use the same plane as polar coordinates if pole = origin and initial line = positive real axis. Why is this useful for problems involving complex moduli? (3 steps)", "answer": "- Step 1: A complex number $$z = x + iy$$ corresponds to point $$(x, y)$$. In polar form, $$z = re^{i\\theta}$$ with $$r = |z|$$ and $$\\theta = \\arg z$$.\n- Step 2: Loci described in terms of $$|z|$$ and $$\\arg z$$ translate directly to polar:\n+ $$|z| = a$$ means $$r = a$$ ŌĆö circle centred at origin.\n+ $$\\arg z = \\alpha$$ means $$\\theta = \\alpha$$ ŌĆö half-line from origin.\n+ $$|z - z_0| = r_0$$ means a circle around $$z_0$$, expressible in polar.\n- Step 3: This equivalence lets us use polar techniques (area integrals, tangent finding) on regions defined by complex modulus and argument constraints.\n\nSo Argand-defined loci can be tackled using polar geometry/calculus ŌĆö a powerful unification.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_62", "judge_pick": true}, {"question": "When computing area in an Argand region $$\\arg z \\in [\\alpha, \\beta] \\cap |z - z_0| \\leq r_0$$, why use polar coordinates centred at the origin (not at $$z_0$$)? (3 steps)", "answer": "- Step 1: The constraint $$\\arg z \\in [\\alpha, \\beta]$$ is naturally expressed as $$\\theta \\in [\\alpha, \\beta]$$ in polar centred at origin.\n- Step 2: The constraint $$|z - z_0| \\leq r_0$$ describes points within a circle around $$z_0$$, which can be converted to a polar inequality $$r \\leq f(\\theta)$$ in origin-centred polar.\n- Step 3: Both constraints in the same polar system allow direct application of the area formula: $$\\text{Area} = \\frac{1}{2}\\int_\\alpha^\\beta f(\\theta)^2 d\\theta$$.\n\nUsing coordinates centred at $$z_0$$ would make the angular constraint messy. Origin-centred polar aligns with both constraints naturally.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_63", "judge_pick": true}, {"question": "What does the polar equation $$r = 2\\sec(\\theta - \\pi/3)$$ describe geometrically? (3 steps)", "answer": "- Step 1: Rewrite: $$r\\cos(\\theta - \\pi/3) = 2$$. The expression $$r\\cos(\\theta - \\alpha)$$ is the projection of position vector onto direction $$\\alpha$$.\n- Step 2: Setting projection = constant gives a line perpendicular to direction $$\\alpha$$, at distance constant from origin.\n- Step 3: Here, line is perpendicular to direction $$\\pi/3$$, at perpendicular distance 2 from origin.\n+ In Cartesian: $$x\\cos(\\pi/3) + y\\sin(\\pi/3) = 2$$, i.e., $$x/2 + y\\sqrt{3}/2 = 2$$, or $$x + y\\sqrt{3} = 4$$.\n+ It's an oblique line, not vertical or horizontal.\n\nThe general form $$r = c\\sec(\\theta - \\alpha)$$ describes lines: vertical for $$\\alpha = 0$$, horizontal for $$\\alpha = \\pi/2$$, oblique for other $$\\alpha$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_64", "judge_pick": true}, {"question": "Polar coordinates often produce closed curves more naturally than Cartesian. Why? (3 steps)", "answer": "- Step 1: A polar curve $$r = f(\\theta)$$ takes input from a continuous range and outputs a non-negative distance. Since $$\\theta$$ wraps around, the curve naturally returns to its start when $$f$$ is periodic.\n- Step 2: Cartesian $$y = f(x)$$ is single-valued vertically, so curves don't loop unless described implicitly (like $$x^2 + y^2 = 1$$).\n- Step 3: Polar's natural rotational structure makes it easier to express rotationally-symmetric curves: rose curves, cardioids, lemniscates, spirals.\n+ These are difficult Cartesian implicit equations but natural polar functions.\n\nSo polar is preferable for \"round\" or rotationally-structured curves.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_65", "judge_pick": false}, {"question": "When a polar curve $$r = f(\\theta)$$ has $$dy/d\\theta = 0$$ AND $$dx/d\\theta = 0$$ at the same $$\\theta_0$$, what does this geometrically indicate? (3 steps)", "answer": "- Step 1: Both derivatives vanishing means the parametric \"velocity\" $$(dx/d\\theta, dy/d\\theta)$$ is zero ŌĆö the parametrisation has a stationary point.\n- Step 2: The curve momentarily comes to rest at this parameter value, but the curve is still defined; it just isn't moving.\n- Step 3: This typically signals a cusp ŌĆö a sharp point where the curve reverses direction. The tangent at this point isn't well-defined by $$dy/dx$$ (since $$0/0$$), but a limit calculation can recover it.\n+ Example: Cardioid $$r = a(1 + \\cos\\theta)$$ at $$\\theta = \\pi$$ ŌĆö both vanish, and the cardioid has a cusp at the pole.\n\nCusps in polar curves often arise where the curve passes through the pole.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_66", "judge_pick": true}, {"question": "Why does the polar curve $$r = a + 5\\sin\\theta$$ require $$a > 5$$ for the area formula derivation to apply directly? (3 steps)", "answer": "- Step 1: $$a > 5$$ ensures $$r = a + 5\\sin\\theta > 0$$ for all $$\\theta$$ (since $$\\sin\\theta \\geq -1$$). The curve is defined everywhere and traces a closed loop.\n- Step 2: With $$r$$ always positive, the area formula applies cleanly over $$[0, 2\\pi]$$ ŌĆö every $$\\theta$$ contributes a non-degenerate sector.\n- Step 3: If $$a < 5$$, $$r$$ would go negative for some $$\\theta$$ ŌĆö the curve would have a self-intersecting \"inner loop\", and area calculation would need careful handling.\n+ For $$a = 5$$: $$r$$ touches 0 at $$\\theta = -\\pi/2$$ (cardioid case).\n+ For $$a > 5$$: smooth lima├¦on (convex if $$a \\geq 10$$, dimpled if $$5 < a < 10$$).\n\nThe constraint ensures the curve is a single, simple, closed loop.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_67", "judge_pick": true}, {"question": "Two polar curves $$r = 1 + \\sin\\theta$$ (a cardioid) and $$r = 3\\sin\\theta$$ (a circle through origin). Where do they intersect, and why does the geometric configuration make sense? (3 steps)", "answer": "- Step 1: Set radii equal: $$1 + \\sin\\theta = 3\\sin\\theta$$, giving $$\\sin\\theta = 1/2$$, so $$\\theta = \\pi/6$$ or $$5\\pi/6$$.\n- Step 2: At these angles, $$r = 3 \\cdot 1/2 = 3/2$$. So intersections are at $$(3/2, \\pi/6)$$ and $$(3/2, 5\\pi/6)$$.\n- Step 3: Geometric intuition: at top ($$\\theta = \\pi/2$$), cardioid reaches $$r = 2$$ but circle reaches $$r = 3$$ ŌĆö circle is \"outside\" near top. At sides, the cardioid is larger than circle (since the circle shrinks faster as $$\\theta$$ approaches horizontal). So they cross.\n+ Both curves also pass through the pole ŌĆö algebraically a \"shared point\" but achieved at different $$\\theta$$.\n\nIntersections separate regions where each curve is the inner boundary.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_68", "judge_pick": true}, {"question": "When converting Cartesian to polar, why do circles through the origin admit particularly compact polar forms compared to off-centre circles? (3 steps)", "answer": "- Step 1: Cartesian equation is symmetric in how it treats $$(x, y)$$ ŌĆö no preferred origin or angle. Different polar pole choices give different polar forms.\n- Step 2: When the pole is *on* the curve (e.g., circle through origin), the curve passes through $$r = 0$$ at some angle. This makes the polar form lose its \"constant\" term: $$r = a\\cos\\theta + b\\sin\\theta$$ (no constant).\n- Step 3: Off-centre circles (not through origin) have $$r > 0$$ everywhere ŌĆö their polar forms are messier, e.g., requiring $$r^2 - 2ar\\cos\\theta\\cos\\alpha + a^2 = R^2$$ type expressions.\n+ The \"nicest\" polar form is obtained when the pole has geometric significance (on the curve, or at a focus/centre).\n\nPolar form is \"natural\" when the chosen pole has geometric meaning for the curve.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_69", "judge_pick": true}, {"question": "When you draw the curve $$r = 4\\cos 2\\theta$$ for $$0 \\leq \\theta \\leq \\pi/4$$, why is the resulting figure a half-petal? (3 steps)", "answer": "- Step 1: A full petal of $$r = 4\\cos 2\\theta$$ corresponds to one interval where $$\\cos 2\\theta \\geq 0$$, e.g., $$\\theta \\in [-\\pi/4, \\pi/4]$$.\n- Step 2: Restricting to $$0 \\leq \\theta \\leq \\pi/4$$ takes only half of this petal ŌĆö the part above the initial line.\n- Step 3: The curve starts at $$\\theta = 0, r = 4$$ (rightmost point) and ends at $$\\theta = \\pi/4, r = 0$$ (the pole).\n+ This half-petal is bounded on one side by the curve and on the other by the initial line edge.\n+ Useful for areas: half-petal symmetric to the other half about the initial line.\n\nThe bounding range $$[0, \\pi/4]$$ gives exactly the upper half of one petal.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_70", "judge_pick": true}, {"question": "Why might it be useful to use the reflection symmetry of a polar curve to compute its area? Give a concrete halving example. (3 steps)", "answer": "- Step 1: If a polar curve is symmetric about the initial line, the upper half ($$0 \\leq \\theta \\leq \\pi$$) mirrors the lower half ($$\\pi \\leq \\theta \\leq 2\\pi$$).\n- Step 2: Such symmetry holds when $$f(-\\theta) = f(\\theta)$$, true for cosine-only functions like $$r = 1 + \\cos\\theta$$ (cardioid).\n- Step 3: For these curves: $$\\text{Area} = 2 \\times \\frac{1}{2}\\int_0^\\pi r^2 d\\theta = \\int_0^\\pi r^2 d\\theta$$.\n+ Half the integration range, so half the work.\n+ Especially helpful when the integrand has more symmetric structure on $$[0, \\pi]$$.\n\nRecognising symmetry is one of the most useful \"first looks\" in polar problems.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_71", "judge_pick": true}, {"question": "A polar curve has $$r$$ that takes negative values for some $$\\theta$$. With $$r \\geq 0$$ convention, what happens? (3 steps)", "answer": "- Step 1: If $$r(\\theta) < 0$$ for some interval, the curve is simply not drawn there in our convention. Those values contribute no points.\n- Step 2: Geometrically: the equation says \"go in direction $$\\theta$$ a distance $$r$$\" ŌĆö negative $$r$$ doesn't make physical sense as distance.\n- Step 3: Some other conventions interpret negative $$r$$ as \"go backwards\", placing the point at $$(-r, \\theta + \\pi)$$. This adds extra petals in some rose curves but introduces ambiguity.\n\nIn Edexcel convention, always identify ranges where $$r \\geq 0$$ before sketching or integrating.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_72", "judge_pick": false}, {"question": "When you derive a polar equation of a circle through the origin from $$|z - z_0| = r_0$$ (with $$|z_0| = r_0$$), why does the result always have the form $$r = \\alpha\\cos\\theta + \\beta\\sin\\theta$$? (4 steps)", "answer": "- Step 1: $$|z - z_0|^2 = r_0^2$$ means $$(x - x_0)^2 + (y - y_0)^2 = r_0^2$$. Expand: $$x^2 - 2x_0 x + x_0^2 + y^2 - 2y_0 y + y_0^2 = r_0^2$$.\n- Step 2: Since circle passes through origin: $$x_0^2 + y_0^2 = r_0^2$$. Constants cancel: $$x^2 + y^2 = 2x_0 x + 2y_0 y$$.\n- Step 3: Substitute $$x^2 + y^2 = r^2$$, $$x = r\\cos\\theta$$, $$y = r\\sin\\theta$$: $$r^2 = 2x_0 r\\cos\\theta + 2y_0 r\\sin\\theta$$.\n- Step 4: Divide by $$r$$: $$r = 2x_0\\cos\\theta + 2y_0\\sin\\theta$$.\n\nForm: $$r = \\alpha\\cos\\theta + \\beta\\sin\\theta$$ with $$\\alpha = 2x_0$$, $$\\beta = 2y_0$$. The pole-on-curve condition kills the constant.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_73", "judge_pick": true}, {"question": "A polar curve has $$r = 1 + \\cos 3\\theta$$. At what values of $$\\theta$$ does the curve pass through the pole, and what does this tell us about tangents? (3 steps)", "answer": "- Step 1: Curve passes through pole when $$r = 0$$: $$1 + \\cos 3\\theta = 0$$, giving $$\\cos 3\\theta = -1$$.\n- Step 2: $$\\cos 3\\theta = -1$$ when $$3\\theta = \\pi + 2k\\pi$$. Within $$\\theta \\in [0, 2\\pi)$$: $$3\\theta \\in \\{ \\pi, 3\\pi, 5\\pi \\}$$, giving $$\\theta = \\pi/3, \\pi, 5\\pi/3$$.\n- Step 3: At each of these angles, the line $$\\theta = \\pi/3$$, $$\\theta = \\pi$$, or $$\\theta = 5\\pi/3$$ is tangent to the curve at the pole.\n+ Three pole-tangencies spaced $$2\\pi/3$$ apart ŌĆö reflecting 3-fold symmetry of $$\\cos 3\\theta$$.\n\nThe number of pole-tangencies often relates to the symmetry order of the trig argument.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_74", "judge_pick":
