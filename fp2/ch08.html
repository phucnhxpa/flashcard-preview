raight line parallel to the initial line, at a distance $$a$$ from the pole.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_22", "judge_pick": false}, {"question": "What does the polar curve $$r = a\\operatorname{cosec}\\theta$$ look like, and how is it derived?", "answer": "Since $$r = a\\operatorname{cosec}\\theta$$ means $$r\\sin\\theta = a$$, and we know $$y = r\\sin\\theta$$, this immediately simplifies to the Cartesian equation $$y = a$$. Thus, the curve is a horizontal straight line perpendicular to the initial line, at a distance $$a$$ from the pole.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_23", "judge_pick": false}, {"question": "A curve has equation $$r = a(1 + \\cos\\theta)$$. Find the exact value of the area enclosed by the curve. Walk through the conceptual integration steps without performing the full algebraic expansion, but state the key identities and limits used. (3 steps)", "answer": "- Step 1: The curve is a cardioid, symmetric about the initial line. To find the total area, integrate from $$0$$ to $$\\pi$$ and double it: Area = $$2 \\times \\frac{1}{2} \\int_0^\\pi a^2(1+\\cos\\theta)^2 d\\theta = a^2 \\int_0^\\pi (1 + 2\\cos\\theta + \\cos^2\\theta) d\\theta$$.\n- Step 2: The terms $$1$$ and $$2\\cos\\theta$$ integrate easily. For the $$\\cos^2\\theta$$ term, use the double angle identity $$\\cos^2\\theta = \\frac{1 + \\cos 2\\theta}{2}$$ to make it integrable.\n- Step 3: Evaluate the definite integral from $$0$$ to $$\\pi$$. The $$\\sin$$ terms evaluate to 0 at both limits. The remaining terms yield $$a^2 \\left[\\frac{3}{2}\\theta\\right]_0^\\pi = \\frac{3\\pi a^2}{2}$$. The total area is $$\\frac{3\\pi a^2}{2}$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_24", "judge_pick": false}, {"question": "Find the polar coordinates of the points on the cardioid $$r = a(1 + \\cos\\theta)$$ where the tangents are parallel to the initial line. (3 steps)", "answer": "- Step 1: Set $$\\frac{dy}{d\\theta} = 0$$. Express $$y = r\\sin\\theta = a(\\sin\\theta + \\sin\\theta\\cos\\theta)$$. Differentiate using the product rule: $$\\frac{dy}{d\\theta} = a(\\cos\\theta + \\cos^2\\theta - \\sin^2\\theta)$$.\n- Step 2: Set to zero and use identities: $$\\cos\\theta + \\cos 2\\theta = 0$$. Use $$\\cos 2\\theta = 2\\cos^2\\theta - 1$$ to get a quadratic in $$\\cos\\theta$$: $$2\\cos^2\\theta + \\cos\\theta - 1 = 0$$. Factor as $$(2\\cos\\theta - 1)(\\cos\\theta + 1) = 0$$.\n- Step 3: Solve for $$\\theta$$: $$\\cos\\theta = \\frac{1}{2} \\Rightarrow \\theta = \\pm \\frac{\\pi}{3}$$, giving $$r = a(1 + \\frac{1}{2}) = \\frac{3a}{2}$$. Also $$\\cos\\theta = -1 \\Rightarrow \\theta = \\pi$$, giving $$r = 0$$. The points are $$\\left(\\frac{3a}{2}, \\pm \\frac{\\pi}{3}\\right)$$ and $$(0, \\pi)$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_25", "judge_pick": false}], "count": 26}, "glm_3": {"label": "GLM 5.1 Ōæó", "cards": [{"question": "What are the two measurements required to define the position of a point P in polar coordinates, and what do they represent relative to the pole and initial line?", "answer": "Polar coordinates $$(r, \\theta)$$ define a point using two pieces of information:\n- $$r$$: the radial distance from the pole (origin) to the point $$P$$.\n- $$\\theta$$: the angle measured anticlockwise from the initial line (positive $$x$$-axis) to the line segment $$OP$$.\n\nThis system is particularly useful for describing curves with rotational symmetry or loci defined by distances from a central point, avoiding the more complex Cartesian equations such shapes can produce.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_0", "judge_pick": false}, {"question": "When converting Cartesian coordinates $$(x, y)$$ to polar coordinates $$(r, \\theta)$$, why is it essential to draw a sketch of the point's quadrant, rather than just calculating $$\\theta = \\arctan\\left(\\frac{y}{x}\\right)$$? (2 steps)", "answer": "- Step 1: The $$\\arctan$$ function typically only returns principal values in the range $$\\left(-\\frac{\\pi}{2}, \\frac{\\pi}{2}\\right)$$, which corresponds to the first and fourth quadrants. If the point lies in the second or third quadrant (where $$x < 0$$), $$\\arctan\\left(\\frac{y}{x}\\right)$$ will give an angle that points in the diagonally opposite direction.\n- Step 2: A sketch immediately reveals the true quadrant, allowing you to adjust the angle by adding or subtracting $$\\pi$$ to find the correct $$\\theta$$ measured anticlockwise from the positive $$x$$-axis. For example, a point in the third quadrant requires $$\\theta = \\pi + \\alpha$$, where $$\\alpha$$ is the acute reference angle.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_1", "judge_pick": false}, {"question": "A point has polar coordinates $$(r, \\theta)$$. What are the two formulas to convert this directly into Cartesian coordinates $$(x, y)$$?", "answer": "The conversions are $$x = r \\cos \\theta$$ and $$y = r \\sin \\theta$$. These come directly from right-angled triangle trigonometry, treating $$r$$ as the hypotenuse and $$x, y$$ as the adjacent and opposite sides to the angle $$\\theta$$ respectively.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_2", "judge_pick": false}, {"question": "How do you convert the simple polar equation $$r = a$$ into a Cartesian equation, and what shape does it represent? (2 steps)", "answer": "- Step 1: To eliminate $$\\theta$$ and get an equation in $$x$$ and $$y$$, square both sides to get $$r^2 = a^2$$.\n- Step 2: Substitute $$r^2$$ with $$x^2 + y^2$$, yielding $$x^2 + y^2 = a^2$$. This represents a circle centered at the origin with radius $$a$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_3", "judge_pick": false}, {"question": "Convert the polar equation $$r = 2 + \\cos 2\\theta$$ into a Cartesian equation. (3 steps)", "answer": "- Step 1: Use the double angle identity $$\\cos 2\\theta \\equiv 2\\cos^2\\theta - 1$$ to rewrite the equation entirely in terms of $$\\cos\\theta$$: $$r = 2 + 2\\cos^2\\theta - 1 = 1 + 2\\cos^2\\theta$$.\n- Step 2: To introduce $$r$$ into the $$\\cos^2\\theta$$ term, multiply the entire equation by $$r^2$$. This gives $$r^3 = r^2 + 2r^2\\cos^2\\theta$$.\n- Step 3: Substitute $$r^2 = x^2 + y^2$$ and $$r\\cos\\theta = x$$. Thus $$r^3 = (x^2+y^2)^{\\frac{3}{2}}$$, and $$2(r\\cos\\theta)^2 = 2x^2$$. The Cartesian equation is $$(x^2+y^2)^{\\frac{3}{2}} = x^2+y^2 + 2x^2 = 3x^2 + y^2$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_4", "judge_pick": false}, {"question": "Convert the polar equation $$r^2 = \\sin 2\\theta$$ into a Cartesian equation. (3 steps)", "answer": "- Step 1: Use the double angle identity $$\\sin 2\\theta \\equiv 2\\sin\\theta\\cos\\theta$$ to rewrite the equation as $$r^2 = 2\\sin\\theta\\cos\\theta$$.\n- Step 2: Multiply both sides by $$r^2$$ to introduce the Cartesian substitutions $$x$$ and $$y$$. This yields $$r^4 = 2(r\\sin\\theta)(r\\cos\\theta)$$.\n- Step 3: Substitute $$r^2 = x^2 + y^2$$, $$r\\sin\\theta = y$$, and $$r\\cos\\theta = x$$. This gives the Cartesian equation $$(x^2+y^2)^2 = 2xy$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_5", "judge_pick": true}, {"question": "Convert the Cartesian equation $$y^2 = 4x$$ into a polar equation. (2 steps)", "answer": "- Step 1: Substitute $$y = r\\sin\\theta$$ and $$x = r\\cos\\theta$$ to get $$(r\\sin\\theta)^2 = 4(r\\cos\\theta)$$, which simplifies to $$r^2\\sin^2\\theta = 4r\\cos\\theta$$.\n- Step 2: Divide by $$r$$ (assuming $$r \\neq 0$$) and rearrange for $$r$$: $$r\\sin^2\\theta = 4\\cos\\theta$$, so $$r = \\frac{4\\cos\\theta}{\\sin^2\\theta} = 4\\cot\\theta\\csc\\theta$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_6", "judge_pick": false}, {"question": "Convert the Cartesian equation $$x^2 - y^2 = 5$$ into a polar equation. (2 steps)", "answer": "- Step 1: Substitute $$x = r\\cos\\theta$$ and $$y = r\\sin\\theta$$ to get $$r^2\\cos^2\\theta - r^2\\sin^2\\theta = 5$$.\n- Step 2: Factor out $$r^2$$ and use the identity $$\\cos^2\\theta - \\sin^2\\theta \\equiv \\cos 2\\theta$$. This gives $$r^2\\cos 2\\theta = 5$$, which rearranges to $$r^2 = 5\\sec 2\\theta$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_7", "judge_pick": false}, {"question": "Convert the Cartesian equation $$y\\sqrt{3} = x + 4$$ into a polar equation using harmonic form. (3 steps)", "answer": "- Step 1: Substitute $$x = r\\cos\\theta$$ and $$y = r\\sin\\theta$$ to get $$r\\sqrt{3}\\sin\\theta = r\\cos\\theta + 4$$. Rearrange to $$r(\\sqrt{3}\\sin\\theta - \\cos\\theta) = 4$$.\n- Step 2: To simplify the bracket, express it in the form $$R\\sin(\\theta - \\alpha)$$. Divide the equation by 2: $$r\\left(\\frac{\\sqrt{3}}{2}\\sin\\theta - \\frac{1}{2}\\cos\\theta\\right) = 2$$.\n- Step 3: Recognize $$\\frac{\\sqrt{3}}{2} = \\cos\\frac{\\pi}{6}$$ and $$\\frac{1}{2} = \\sin\\frac{\\pi}{6}$$. Thus, the bracket becomes $$\\sin(\\theta - \\frac{\\pi}{6})$$, giving the polar equation $$r\\sin(\\theta - \\frac{\\pi}{6}) = 2$$, or $$r = 2\\csc(\\theta - \\frac{\\pi}{6})$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_8", "judge_pick": false}, {"question": "Describe the shape of the standard polar curve $$r = a$$ and explain why the equation $$\\theta = \\alpha$$ only represents a half-line. (2 steps)", "answer": "- Step 1: $$r = a$$ represents a circle centered at the pole (origin) with radius $$a$$, because every point on the curve is a constant distance $$a$$ from the pole.\n- Step 2: $$\\theta = \\alpha$$ represents a half-line because $$r$$ represents radial distance, which is conventionally taken as non-negative ($$r \\geq 0$$). Therefore, points on this line only extend from the pole in the anticlockwise direction of angle $$\\alpha$$, not the opposite direction. The opposite half-line would require $$\\theta = \\alpha + \\pi$$ or a negative $$r$$ value.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_9", "judge_pick": false}, {"question": "What is the shape of the polar curve $$r = a\\theta$$, and what happens to the radial distance between successive loops as $$\\theta$$ increases?", "answer": "The curve $$r = a\\theta$$ is an Archimedean spiral starting at the pole. As $$\\theta$$ increases, the radius $$r$$ increases proportionally. This means the radial distance between successive loops of the spiral remains constant; for each full rotation of $$2\\pi$$, the radius increases by exactly $$2\\pi a$$. This constant spacing distinguishes it from a logarithmic spiral.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_10", "judge_pick": false}, {"question": "When sketching the polar curve $$r = a\\sin 3\\theta$$, how do you determine the angular range for the first loop, and how many loops does the complete curve have? (2 steps)", "answer": "- Step 1: A loop begins and ends where $$r = 0$$. Setting $$a\\sin 3\\theta = 0$$ gives $$3\\theta = 0 \\implies \\theta = 0$$, and $$3\\theta = \\pi \\implies \\theta = \\frac{\\pi}{3}$$. So the first loop exists for $$0 \\leq \\theta \\leq \\frac{\\pi}{3}$$.\n- Step 2: In the range $$0 \\leq \\theta \\leq \\pi$$, $$\\sin 3\\theta$$ completes 3 half-cycles, giving 3 loops. Since we only draw the curve where $$r \\geq 0$$, the complete curve consists of exactly 3 loops symmetrically arranged around the pole. (Generally, $$r = a\\sin n\\theta$$ or $$r = a\\cos n\\theta$$ has $$n$$ loops if $$n$$ is odd, and $$2n$$ loops if $$n$$ is even).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_11", "judge_pick": false}, {"question": "For the polar curve $$r^2 = a^2\\cos 2\\theta$$, why does the curve only exist in certain sectors, and what are those sectors? (2 steps)", "answer": "- Step 1: Since $$r^2$$ must be non-negative, we require $$a^2\\cos 2\\theta \\geq 0$$, which means $$\\cos 2\\theta \\geq 0$$.\n- Step 2: $$\\cos 2\\theta \\geq 0$$ when $$2\\theta$$ is in the first or fourth quadrant, so $$-\\frac{\\pi}{2} \\leq 2\\theta \\leq \\frac{\\pi}{2}$$, meaning $$-\\frac{\\pi}{4} \\leq \\theta \\leq \\frac{\\pi}{4}$$. It also holds when $$2\\theta$$ is in the third/fourth quadrants, giving $$\\frac{3\\pi}{4} \\leq \\theta \\leq \\frac{5\\pi}{4}$$. This creates a lemniscate (figure-eight) shape oriented along the initial line.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_12", "judge_pick": false}, {"question": "For curves of the form $$r = a(p + q\\cos\\theta)$$ where $$p \\geq q > 0$$, what is the visual difference between an \"egg-shaped\" (convex) curve and a curve with a \"dimple\", and what is the boundary condition between them? (2 steps)", "answer": "- Step 1: An egg-shaped curve is entirely convex (bulging outwards at all points), whereas a dimpled curve has a concave indentation near $$\\theta = \\pi$$ (where $$r$$ is smallest).\n- Step 2: The boundary condition is $$p = 2q$$. If $$p \\geq 2q$$, the curve is convex (egg-shaped). If $$p < 2q$$, the curve has a dimple. When $$p = q$$, the dimple reaches all the way to the pole, forming a cusp (a cardioid).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_13", "judge_pick": false}, {"question": "How can a locus on an Argand diagram, such as $$|z - 3 - 4i| = 5$$, be represented as a polar curve? (3 steps)", "answer": "- Step 1: Write the Cartesian equation of the locus: $$(x-3)^2 + (y-4)^2 = 25$$.\n- Step 2: Substitute $$x = r\\cos\\theta$$ and $$y = r\\sin\\theta$$: $$(r\\cos\\theta - 3)^2 + (r\\sin\\theta - 4)^2 = 25$$.\n- Step 3: Expand and use $$\\cos^2\\theta + \\sin^2\\theta = 1$$: $$r^2 - 6r\\cos\\theta - 8r\\sin\\theta + 25 = 25 \\implies r^2 = r(6\\cos\\theta + 8\\sin\\theta)$$. Dividing by $$r$$ gives the polar curve $$r = 6\\cos\\theta + 8\\sin\\theta$$. This works because on an Argand diagram, $$z = re^{i\\theta}$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_14", "judge_pick": true}, {"question": "What is the formula for the area enclosed by a polar curve $$r = f(\\theta)$$ between the half-lines $$\\theta = \\alpha$$ and $$\\theta = \\beta$$, and intuitively, why does the $$\\frac{1}{2}r^2$$ term make sense? (2 steps)", "answer": "- Step 1: The formula is Area $$= \\frac{1}{2}\\int_{\\alpha}^{\\beta} r^2 \\, d\\theta$$.\n- Step 2: Intuitively, the area of a full circle is $$\\pi r^2$$. A tiny sector swept out by a small angle $$d\\theta$$ is a fraction $$\\frac{d\\theta}{2\\pi}$$ of a full circle. Multiplying $$\\pi r^2$$ by $$\\frac{d\\theta}{2\\pi}$$ gives the area of the infinitesimal sector as $$\\frac{1}{2}r^2 d\\theta$$. Integrating these thin sectors from $$\\alpha$$ to $$\\beta$$ sums them to the total area.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_15", "judge_pick": false}, {"question": "When calculating the area enclosed by a cardioid $$r = a(1+\\cos\\theta)$$, how can symmetry be used to simplify the integration? (2 steps)", "answer": "- Step 1: The cardioid $$r = a(1+\\cos\\theta)$$ is symmetric about the initial line ($$\\theta = 0$$). This means the area above the initial line ($$0 \\leq \\theta \\leq \\pi$$) is exactly equal to the area below it ($$\\pi \\leq \\theta \\leq 2\\pi$$).\n- Step 2: Instead of integrating from $$0$$ to $$2\\pi$$, you can calculate the area for $$0 \\leq \\theta \\leq \\pi$$ and double the result. This simplifies the calculation and reduces the chance of sign errors, yielding $$2 \\times \\frac{1}{2}\\int_{0}^{\\pi} a^2(1+\\cos\\theta)^2 d\\theta$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_16", "judge_pick": false}, {"question": "To find the area of one loop of $$r = a\\sin 4\\theta$$, why can't you simply integrate $$\\frac{1}{2}r^2$$ from $$0$$ to $$2\\pi$$ and divide by 4? (2 steps)", "answer": "- Step 1: The curve $$r = a\\sin 4\\theta$$ has 4 loops where $$r > 0$$, but it also has 4 loops where $$r < 0$$ (which are drawn in the opposite direction). Integrating $$\\frac{1}{2}r^2$$ from $$0$$ to $$2\\pi$$ calculates the area of *all 8 loops* because $$r^2$$ is positive regardless of the sign of $$r$$.\n- Step 2: Dividing this total area by 4 gives an incorrect answer because it effectively averages the positive $$r$$ loops and the negative $$r$$ loops. You must instead find the exact angular bounds where $$r \\geq 0$$ for one specific loop (e.g., $$0 \\leq \\theta \\leq \\frac{\\pi}{4}$$) and integrate over just that range.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_17", "judge_pick": true}, {"question": "How do you find the area of a region that lies inside two intersecting polar curves, say $$r_1 = f(\\theta)$$ and $$r_2 = g(\\theta)$$? (3 steps)", "answer": "- Step 1: Find the angles of intersection $$\\theta_1$$ and $$\\theta_2$$ by solving $$f(\\theta) = g(\\theta)$$.\n- Step 2: Determine which curve forms the outer boundary and which forms the inner boundary in the region of interest between $$\\theta_1$$ and $$\\theta_2$$.\n- Step 3: Calculate the area as the difference of two integrals: $$\\frac{1}{2}\\int_{\\theta_1}^{\\theta_2} r_{outer}^2 \\, d\\theta - \\frac{1}{2}\\int_{\\theta_1}^{\\theta_2} r_{inner}^2 \\, d\\theta$$, or equivalently $$\\frac{1}{2}\\int_{\\theta_1}^{\\theta_2} (r_{outer}^2 - r_{inner}^2) \\, d\\theta$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_18", "judge_pick": false}, {"question": "To find tangents to a polar curve $$r = f(\\theta)$$, how do you express the curve in parametric form using $$\\theta$$ as the parameter? (2 steps)", "answer": "- Step 1: Use the polar-to-Cartesian conversion formulas $$x = r\\cos\\theta$$ and $$y = r\\sin\\theta$$.\n- Step 2: Substitute the polar equation $$r = f(\\theta)$$ into these to get the parametric equations in terms of $$\\theta$$: $$x = f(\\theta)\\cos\\theta$$ and $$y = f(\\theta)\\sin\\theta$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_19", "judge_pick": false}, {"question": "For a polar curve given parametrically by $$x = f(\\theta)\\cos\\theta$$ and $$y = f(\\theta)\\sin\\theta$$, what condition must be met for the tangent to be parallel to the initial line, and why? (2 steps)", "answer": "- Step 1: The tangent is parallel to the initial line (the $$x$$-axis) when the gradient $$\\frac{dy}{dx} = 0$$.\n- Step 2: Since $$\\frac{dy}{dx} = \\frac{dy/d\\theta}{dx/d\\theta}$$, the gradient is zero when the numerator is zero and the denominator is non-zero. Therefore, you must set $$\\frac{dy}{d\\theta} = 0$$ and solve for $$\\theta$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_20", "judge_pick": false}, {"question": "For a polar curve given parametrically by $$x = f(\\theta)\\cos\\theta$$ and $$y = f(\\theta)\\sin\\theta$$, what condition must be met for the tangent to be perpendicular to the initial line? (2 steps)", "answer": "- Step 1: The tangent is perpendicular to the initial line (parallel to the $$y$$-axis, i.e., vertical) when the gradient $$\\frac{dy}{dx}$$ is undefined.\n- Step 2: This occurs when the denominator of the parametric gradient is zero while the numerator is non-zero. Therefore, you must set $$\\frac{dx}{d\\theta} = 0$$ and solve for $$\\theta$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_21", "judge_pick": false}, {"question": "How does the condition for a \"dimple\" in the curve $$r = p + q\\cos\\theta$$ relate to the number of tangents perpendicular to the initial line? (3 steps)", "answer": "- Step 1: A tangent perpendicular to the initial line occurs where $$\\frac{dx}{d\\theta} = 0$$. For $$r = p + q\\cos\\theta$$, we have $$x = r\\cos\\theta = p\\cos\\theta + q\\cos^2\\theta$$. Differentiating gives $$\\frac{dx}{d\\theta} = -p\\sin\\theta - 2q\\cos\\theta\\sin\\theta = -\\sin\\theta(p + 2q\\cos\\theta) = 0$$.\n- Step 2: One solution is $$\\sin\\theta = 0 \\implies \\theta = 0, \\pi$$, which always gives two vertical tangents at the ends of the curve. The other solution is $$\\cos\\theta = -\\frac{p}{2q}$$.\n- Step 3: If $$p < 2q$$, then $$-\\frac{p}{2q}$$ is strictly between -1 and 0, so $$\\cos\\theta = -\\frac{p}{2q}$$ has two solutions (in QII and QIII). This creates two *extra* vertical tangents, meaning the curve bends inward to go around them (a dimple). If $$p \\geq 2q$$, there are no extra solutions, so only two vertical tangents exist, meaning the curve is convex (egg-shaped).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_22", "judge_pick": false}, {"question": "A point has Cartesian coordinates $$(-1, -1)$$. Without doing exact calculations, which quadrant is it in, and is its polar angle $$\\theta$$ closer to $$\\frac{\\pi}{4}$$, $$\\frac{3\\pi}{4}$$, $$\\frac{5\\pi}{4}$$, or $$\\frac{7\\pi}{4}$$? (2 steps)", "answer": "- Step 1: The point $$(-1, -1)$$ has negative $$x$$ and negative $$y$$ coordinates, placing it in the third quadrant.\n- Step 2: A polar angle must be measured anticlockwise from the positive $$x$$-axis. An angle in QIII is between $$\\pi$$ and $$\\frac{3\\pi}{2}$$. The angle $$\\frac{5\\pi}{4}$$ ($$225^\\circ$$) points exactly into the middle of QIII along the line $$y=x$$, so $$\\theta$$ is closest to $$\\frac{5\\pi}{4}$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_23", "judge_pick": true}, {"question": "The polar equation of a curve is $$r = 2\\cos\\theta$$. To find the area enclosed by this curve, what are the correct limits of integration for $$\\theta$$? (2 steps)", "answer": "- Step 1: The curve only exists where $$r \\geq 0$$. We need $$2\\cos\\theta \\geq 0$$, which means $$\\cos\\theta \\geq 0$$.\n- Step 2: Cosine is non-negative in the first and fourth quadrants. The standard continuous domain for this is $$-\\frac{\\pi}{2} \\leq \\theta \\leq \\frac{\\pi}{2}$$. Thus, the limits of integration are $$\\theta = -\\frac{\\pi}{2}$$ to $$\\theta = \\frac{\\pi}{2}$$. (Using $$0$$ to $$2\\pi$$ would incorrectly include the negative $$r$$ loop).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_24", "judge_pick": false}, {"question": "For the polar curve $$r = a(1+\\cos\\theta)$$, set up the equation to find the values of $$\\theta$$ where the tangent is parallel to the initial line. Do not solve. (2 steps)", "answer": "- Step 1: Express $$y$$ in terms of $$\\theta$$: $$y = r\\sin\\theta = a(\\sin\\theta + \\sin\\theta\\cos\\theta)$$.\n- Step 2: Set the derivative $$\\frac{dy}{d\\theta}$$ to zero. Using the product rule on the second term, $$\\frac{dy}{d\\theta} = a(\\cos\\theta + \\cos^2\\theta - \\sin^2\\theta) = 0$$. Using the identity $$\\cos^2\\theta - \\sin^2\\theta = \\cos 2\\theta$$, this simplifies to the equation $$a(\\cos 2\\theta + \\cos\\theta) = 0$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_25", "judge_pick": false}, {"question": "Two points in polar coordinates are $$A = (4, \\frac{\\pi}{6})$$ and $$B = (4, \\frac{5\\pi}{6})$$. Without converting to Cartesian, describe the geometric relationship between these two points relative to the initial line. (2 steps)", "answer": "- Step 1: Both points have the same radial distance $$r = 4$$, meaning they lie on a circle of radius 4 centered at the pole.\n- Step 2: Their angles are $$\\frac{\\pi}{6}$$ and $$\\pi - \\frac{\\pi}{6} = \\frac{5\\pi}{6}$$. Because their angles add up to $$\\pi$$ and they have the same radius, they are symmetric with respect to the vertical line $$\\theta = \\frac{\\pi}{2}$$ (the $$y$$-axis).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_26", "judge_pick": true}], "count": 27}, "qwen_1": {"label": "Qwen 3 ŌæĀ", "cards": [{"question": "Compare polar and Cartesian coordinate systems. How do you convert between them? (3 steps)", "answer": "- Step 1: **Coordinate Definitions**  \n  Polar coordinates $(r, \\theta)$ define a point by distance from the origin $r$ and angle $\\theta$ from the positive $x$-axis. Cartesian coordinates $(x, y)$ use perpendicular distances.  \n- Step 2: **Conversion Formulas**  \n  $x = r\\cos\\theta$, $y = r\\sin\\theta$. Conversely, $r = \\sqrt{x^2 + y^2}$, $\\theta = \\arctan\\left(\\frac{y}{x}\\right)$ (adjusted for quadrant).  \n- Step 3: **Quadrant Adjustment**  \n  Always sketch the point to determine the correct quadrant for $\\theta$, as $\\arctan$ alone gives only $-\\frac{\\pi}{2}$ to $\\frac{\\pi}{2}$.  \n\n+ Example: $(3, 4)$ converts to $r = 5$, $\\theta \\approx 0.927$, but $(-3, -4)$ requires $\\theta = \\pi + 0.927$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why does the polar equation $r = 2\\cos\\theta$ represent a circle? Derive its Cartesian form. (4 steps)", "answer": "- Step 1: **Multiply Both Sides by $r$**  \n  $r = 2\\cos\\theta \\Rightarrow r^2 = 2r\\cos\\theta$.  \n- Step 2: **Substitute Cartesian Coordinates**  \n  $r^2 = x^2 + y^2$, $r\\cos\\theta = x$. Substitute: $x^2 + y^2 = 2x$.  \n- Step 3: **Complete the Square**  \n  $x^2 - 2x + y^2 = 0 \\Rightarrow (x-1)^2 + y^2 = 1$.  \n- Step 4: **Interpret Geometrically**  \n  A circle with center $(1, 0)$ and radius $1$. This shows polar equations can simplify to familiar Cartesian shapes.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How does the number of loops in $r = a\\sin n\\theta$ depend on $n$? Explain with examples.", "answer": "- Step 1: **Basic Pattern**  \n  If $n$ is an integer, $r = a\\sin n\\theta$ has $n$ loops if $n$ is odd, and $2n$ loops if $n$ is even.  \n- Step 2: **Odd $n$ Case**  \n  Example: $r = a\\sin3\\theta$ has 3 loops. Each loop forms as $\\theta$ varies over $\\frac{\\pi}{3}$, and the graph repeats every $\\pi$ (not $2\\pi$).  \n- Step 3: **Even $n$ Case**  \n  Example: $r = a\\sin2\\theta$ has 4 loops. Each loop spans $\\frac{\\pi}{2}$, and the graph repeats every $2\\pi$, creating overlapping petals.  \n- Step 4: **Negative Radius**  \n  When $r$ becomes negative, the plot reflects to the opposite quadrant, creating additional loops for even $n$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_2", "judge_pick": false}, {"question": "What does the polar curve $r = a(1 + \\cos\\theta)$ look like? Why is it called a cardioid? (3 steps)", "answer": "- Step 1: **Key Shape**  \n  A heart-shaped curve symmetric about the initial line (positive $x$-axis).  \n- Step 2: **Critical Points**  \n  At $\\theta = 0$, $r = 2a$; $\\theta = \\pi$, $r = 0$. The curve reaches maximum radius at $0$ and closes smoothly at $\\theta = 2\\pi$.  \n- Step 3: **Naming Reason**  \n  \"Cardioid\" comes from the Greek \"heart-shaped.\" It arises from the path of a point on a circle rolling around another of equal radius.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you find the area enclosed by a polar curve $r = f(\\theta)$ between $\\theta = \\alpha$ and $\\beta$? (3 steps)", "answer": "- Step 1: **Formula Derivation**  \n  The area is a sum of infinitesimal sectors: $\\text{Area} = \\frac{1}{2}\\int_{\\alpha}^{\\beta} r^2 d\\theta$.  \n- Step 2: **Why Squaring Works**  \n  Each sector's area $dA$ approximates a triangle with height $r$ and base $r d\\theta$, so $dA = \\frac{1}{2}r^2 d\\theta$.  \n- Step 3: **Symmetry Application**  \n  Example: For $r = a(1 + \\cos\\theta)$, integrate from $0$ to $\\pi$ and double due to symmetry, avoiding redundant computation.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Explain why the distance between two polar points $(r_1, \\theta_1)$ and $(r_2, \\theta_2)$ is $d = \\sqrt{r_1^2 + r_2^2 - 2r_1r_2\\cos(\\theta_1 - \\theta_2)}$. (3 steps)", "answer": "- Step 1: **Law of Cosines**  \n  Treat the points as vectors from the origin. The triangle formed has sides $r_1$, $r_2$, and angle $\\Delta\\theta = \\theta_1 - \\theta_2$ between them.  \n- Step 2: **Apply Cosine Rule**  \n  For triangle with sides $a$, $b$, and angle $C$ opposite side $c$: $c^2 = a^2 + b^2 - 2ab\\cos C$. Substitute $a = r_1$, $b = r_2$, $C = \\Delta\\theta$.  \n- Step 3: **Interpretation**  \n  This generalizes the Cartesian distance formula, accounting for angular separation.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What determines the shape of $r = a(p + q\\cos\\theta)$? When does it have a dimple? (4 steps)", "answer": "- Step 1: **General Form**  \n  This is a lima├¦on. Shape depends on the ratio $p:q$:  \n  - $p > q$: Convex (no dimple)  \n  - $p = q$: Cardioid  \n  - $p < q$: Dimple  \n- Step 2: **Critical Condition**  \n  A dimple occurs when $p < 2q$. For $p \\geq 2q$, the curve is convex.  \n- Step 3: **Derivative Insight**  \n  By finding $\\frac{dx}{d\\theta} = 0$, you get solutions $\\cos\\theta = -\\frac{p}{2q}$. If $p < 2q$, $\\cos\\theta$ falls within valid bounds, creating additional tangents (dimple).  \n- Step 4: **Graphical Example**  \n  $r = 3 + 2\\cos\\theta$ ($p = 3$, $q = 2$) has a dimple since $3 < 4$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How do you find the equation of a tangent to a polar curve $r = f(\\theta)$ that is parallel to the initial line? (3 steps)", "answer": "- Step 1: **Parametric Equations**  \n  Convert to Cartesian: $x = r\\cos\\theta$, $y = r\\sin\\theta$.  \n- Step 2: **Derivative Condition**  \n  For horizontal tangents, $\\frac{dy}{d\\theta} = 0$. Compute $\\frac{dy}{d\\theta} = f'(\\theta)\\sin\\theta + f(\\theta)\\cos\\theta$.  \n- Step 3: **Solve for $\\theta$**  \n  Example: For $r = a(1 + \\cos\\theta)$, solve $\\frac{dy}{d\\theta} = 0$ to find $\\theta = \\pm\\frac{\\pi}{3}$, giving tangent points $\\left(\\frac{3a}{2}, \\pm\\frac{\\pi}{3}\\right)$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Compare the sketches of $r = 2 + \\cos\\theta$ and $r = 5\\cos\\theta$. How do they intersect? (3 steps)", "answer": "- Step 1: **Curve Shapes**  \n  $r = 2 + \\cos\\theta$ is a lima├¦on with no dimple. $r = 5\\cos\\theta$ is a circle centered at $(2.5, 0)$ with radius $2.5$.  \n- Step 2: **Find Intersections**  \n  Solve $2 + \\cos\\theta = 5\\cos\\theta \\Rightarrow \\cos\\theta = 0.5 \\Rightarrow \\theta = \\pm\\frac{\\pi}{3}$.  \n- Step 3: **Polar Coordinates**  \n  Substitute $\\theta$ into either equation: $\\left(\\frac{5}{2}, \\pm\\frac{\\pi}{3}\\right)$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why does the polar equation $r^2 = a^2\\cos2\\theta$ form a lemniscate? Describe its symmetry. (3 steps)", "answer": "- Step 1: **Equation Transformation**  \n  Square both sides: $r^4 = a^4\\cos^2 2\\theta$. Multiply by $r^2$: $(x^2 + y^2)^2 = a^2(x^2 - y^2)$.  \n- Step 2: **Shape and Symmetry**  \n  The curve has two loops symmetric about both the initial line and $\\theta = \\frac{\\pi}{2}$ (like a figure-eight).  \n- Step 3: **Domain Restrictions**  \n  Defined only where $\\cos2\\theta \\geq 0$, i.e., $-\\frac{\\pi}{4} \\leq \\theta \\leq \\frac{\\pi}{4}$ and $\\frac{3\\pi}{4} \\leq \\theta \\leq \\frac{5\\pi}{4}$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_9", "judge_pick": false}, {"question": "How do you find the area of a region common to two polar curves? Use $r = 2 + \\cos\\theta$ and $r = 5\\cos\\theta$ as an example. (4 steps)", "answer": "- Step 1: **Find Intersections**  \n  Solve $2 + \\cos\\theta = 5\\cos\\theta \\Rightarrow \\theta = \\pm\\frac{\\pi}{3}$.  \n- Step 2: **Set Up Integrals**  \n  Integrate $r = 2 + \\cos\\theta$ from $0$ to $\\frac{\\pi}{3}$ and $r = 5\\cos\\theta$ from $\\frac{\\pi}{3}$ to $\\frac{\\pi}{2}$, doubling for symmetry.  \n- Step 3: **Compute Integrals**  \n  $\\text{Area} = \\int_0^{\\frac{\\pi}{3}} (2 + \\cos\\theta)^2 d\\theta + \\int_{\\frac{\\pi}{3}}^{\\frac{\\pi}{2}} (5\\cos\\theta)^2 d\\theta$.  \n- Step 4: **Combine Results**  \n  Use trigonometric identities to simplify and calculate the sum, yielding $\\frac{43\\pi}{12} - \\sqrt{3}$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What is the significance of the spiral $r = a\\theta$? How does its rate of turn relate to $a$? (3 steps)", "answer": "- Step 1: **Basic Shape**  \n  Starts at the origin and winds outward as $\\theta$ increases. Each loop increases in radius by $2\\pi a$.  \n- Step 2: **Rate of Turn**  \n  Larger $a$ causes a more loosely wound spiral. The spacing between successive turns is $2\\pi a$.  \n- Step 3: **Calculus Connection**  \n  The derivative $\\frac{dr}{d\\theta} = a$ shows constant radial growth per angle, unlike logarithmic spirals where $r = ae^{b\\theta}$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Explain why the polar equation $r = \\sec\\theta$ represents a vertical line. Convert it to Cartesian form. (3 steps)", "answer": "- Step 1: **Start with Equation**  \n  $r = \\sec\\theta \\Rightarrow r\\cos\\theta = 1$.  \n- Step 2: **Substitute Cartesian Coordinates**  \n  $r\\cos\\theta = x \\Rightarrow x = 1$. This is a vertical line at $x = 1$.  \n- Step 3: **Geometric Interpretation**  \n  The curve is all points where the $x$-coordinate equals 1, independent of $y$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How do you sketch $r = 2\\sin3\\theta$? What is the range of $\\theta$ needed for one full cycle? (3 steps)", "answer": "- Step 1: **Determine Periodicity**  \n  The function $\\sin3\\theta$ repeats every $\\frac{2\\pi}{3}$. However, negative $r$ values reflect the graph, creating 3 loops in $[0, \\pi]$.  \n- Step 2: **Critical Angles**  \n  $r = 0$ at $\\theta = 0, \\frac{\\pi}{3}, \\frac{2\\pi}{3}$. Maximum $r = 2$ at $\\theta = \\frac{\\pi}{6}, \\frac{\\pi}{2}, \\frac{5\\pi}{6}$.  \n- Step 3: **Plot the Curve**  \n  Draw 3 petals between $0$ and $\\pi$, each spanning $\\frac{\\pi}{3}$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why does the polar equation $r = \\frac{1}{1 + \\cos\\theta}$ represent a parabola? Derive its Cartesian form. (4 steps)", "answer": "- Step 1: **Multiply Both Sides by Denominator**  \n  $r(1 + \\cos\\theta) = 1 \\Rightarrow r + r\\cos\\theta = 1$.  \n- Step 2: **Substitute Cartesian Coordinates**  \n  $r = \\sqrt{x^2 + y^2}$, $r\\cos\\theta = x$. Substitute: $\\sqrt{x^2 + y^2} + x = 1$.  \n- Step 3: **Isolate and Square**  \n  $\\sqrt{x^2 + y^2} = 1 - x \\Rightarrow x^2 + y^2 = 1 - 2x + x^2 \\Rightarrow y^2 = 1 - 2x$.  \n- Step 4: **Interpret as Parabola**  \n  This is a parabola opening to the left with vertex at $(\\frac{1}{2}, 0)$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_14", "judge_pick": true}, {"question": "How does the polar equation $r = 2a\\cos\\theta$ relate to circles in Cartesian coordinates? (3 steps)", "answer": "- Step 1: **Multiply by $r$**  \n  $r = 2a\\cos\\theta \\Rightarrow r^2 = 2ar\\cos\\theta$.  \n- Step 2: **Substitute Coordinates**  \n  $x^2 + y^2 = 2a x$.  \n- Step 3: **Complete the Square**  \n  $(x - a)^2 + y^2 = a^2$. This is a circle with center $(a, 0)$ and radius $a$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_15", "judge_pick": false}, {"question": "What is the area enclosed by one petal of $r = a\\sin4\\theta$? (3 steps)", "answer": "- Step 1: **Determine Petal Range**  \n  $r = 0$ when $\\sin4\\theta = 0 \\Rightarrow \\theta = 0, \\frac{\\pi}{4}, \\frac{\\pi}{2}, ...$. One petal spans $\\theta = 0$ to $\\frac{\\pi}{4}$.  \n- Step 2: **Set Up Integral**  \n  $\\text{Area} = \\frac{1}{2}\\int_0^{\\frac{\\pi}{4}} (a\\sin4\\theta)^2 d\\theta$.  \n- Step 3: **Evaluate Using Identity**  \n  Use $\\sin^2x = \\frac{1 - \\cos2x}{2}$:  \n  $\\text{Area} = \\frac{a^2}{4}\\int_0^{\\frac{\\pi}{4}} (1 - \\cos8\\theta)d\\theta = \\frac{a^2\\pi}{16}$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_16", "judge_pick": false}, {"question": "How does the polar equation $r = 3 + 2\\cos\\theta$ differ from $r = 2 + 3\\cos\\theta$ in shape? (4 steps)", "answer": "- Step 1: **General Lima├¦on Form**  \n  $r = a + b\\cos\\theta$. Shape depends on $a/b$ ratio.  \n- Step 2: **Case 1: $r = 3 + 2\\cos\\theta$**  \n  $a = 3$, $b = 2$: $a > b$, so convex (no dimple).  \n- Step 3: **Case 2: $r = 2 + 3\\cos\\theta$**  \n  $a = 2$, $b = 3$: $a < b$, so dimpled. For $a < 2b$, dimple; if $a < b$, looped.  \n- Step 4: **Critical Angle**  \n  Dimple appears when $\\cos\\theta = -\\frac{a}{2b}$ has a solution. For $r = 2 + 3\\cos\\theta$, this is $\\cos\\theta = -\\frac{1}{3}$, valid.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Why is the formula for the gradient of a polar curve $\\frac{dy}{dx} = \\frac{f'(\\theta)\\sin\\theta + f(\\theta)\\cos\\theta}{f'(\\theta)\\cos\\theta - f(\\theta)\\sin\\theta}$? (3 steps)", "answer": "- Step 1: **Parametric Derivatives**  \n  $x = r\\cos\\theta = f(\\theta)\\cos\\theta$, $y = f(\\theta)\\sin\\theta$.  \n- Step 2: **Chain Rule Application**  \n  $\\frac{dy}{d\\theta} = f'(\\theta)\\sin\\theta + f(\\theta)\\cos\\theta$, $\\frac{dx}{d\\theta} = f'(\\theta)\\cos\\theta - f(\\theta)\\sin\\theta$.  \n- Step 3: **Divide Derivatives**  \n  $\\frac{dy}{dx} = \\frac{dy/d\\theta}{dx/d\\theta}$, giving the required formula.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_18", "judge_pick": false}, {"question": "How does the polar equation $r = \\frac{ed}{1 + e\\cos\\theta}$ represent conic sections? What role does $e$ play? (4 steps)", "answer": "- Step 1: **Eccentricity Definition**  \n  $e$ (eccentricity) determines the conic type:  \n  - $e = 0$: Circle  \n  - $0 < e < 1$: Ellipse  \n  - $e = 1$: Parabola  \n  - $e > 1$: Hyperbola  \n- Step 2: **Directrix and Focus**  \n  $d$ is the distance from the directrix to the focus (at the origin).  \n- Step 3: **Conversion to Cartesian**  \n  Multiply by denominator: $r + er\\cos\\theta = ed$. Substitute $r = \\sqrt{x^2 + y^2}$, $r\\cos\\theta = x$:  \n  $\\sqrt{x^2 + y^2} = ed - ex$. Square both sides and simplify to standard conic forms.  \n- Step 4: **Geometric Insight**  \n  The equation defines a conic as the locus of points where the ratio of distance to focus and directrix is $e$.", "source": "Qwen 3 ŌæĀ", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ŌæĪ", "cards": [{"question": "Why is quadrant consideration necessary when converting Cartesian coordinates to polar coordinates?", "answer": "- Step 1: Cartesian coordinates (x, y) determine the angle ╬Ė via tan╬Ė = y/x, but arctan only returns angles between -ŽĆ/2 and ŽĆ/2.  \n- Step 2: The actual angle ╬Ė must account for the quadrant where (x, y) lies. For example, (-1, -1) has ╬Ė = 5ŽĆ/4, not ŽĆ/4, to reflect the third quadrant.  \n- Step 3: Ignoring quadrant leads to incorrect ╬Ė values, misplacing the point. A sketch is essential to visualize the correct direction from the pole.  \n\n**Key Insight:** The reference angle from arctan(y/x) is adjusted by adding ŽĆ or -ŽĆ based on the signs of x and y.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How do you derive the polar area formula $ \\text{Area} = \\frac{1}{2} \\int_{\\alpha}^{\\beta} r^2 d\\theta $?", "answer": "- Step 1: In polar coordinates, a small sector with angle $ d\\theta $ and radius $ r $ approximates a triangle with area $ \\frac{1}{2} r^2 d\\theta $.  \n- Step 2: Summing all sectors from $ \\theta = \\alpha $ to $ \\beta $ gives the total area via integration.  \n- Step 3: This avoids negative areas unlike Cartesian integrals, as $ r^2 $ is always positive.  \n\n**Example:** For $ r = a $, the area becomes $ \\frac{1}{2} \\int_0^{2\\pi} a^2 d\\theta = \\pi a^2 $, consistent with a circle's area.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why does $ r = a \\sin n\\theta $ have $ n $ loops for integer $ n $?", "answer": "- Step 1: The function $ \\sin n\\theta $ completes $ n $ periods as $ \\theta $ varies from 0 to $ 2\\pi $.  \n- Step 2: Each period creates a \"lobe\" where $ r $ transitions from 0 to a maximum back to 0.  \n- Step 3: For even $ n $, loops are symmetrically distributed. For odd $ n $, loops overlap at the origin due to phase shifts.  \n\n**Edge Case:** If $ n $ is not an integer, the curve becomes non-closed and lacks loops.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why is $ \\frac{dy}{d\\theta} = 0 $ the condition for a tangent parallel to the initial line?", "answer": "- Step 1: The slope $ dy/dx $ of a polar curve is $ \\frac{dy/d\\theta}{dx/d\\theta} $.  \n- Step 2: A horizontal tangent (parallel to the x-axis) occurs when $ dy/d\\theta = 0 $, as the vertical rate of change halts.  \n- Step 3: In polar terms, this aligns with the initial line (╬Ė = 0), making the tangent parallel to it.  \n\n**Contrast:** $ dx/d\\theta = 0 $ corresponds to vertical tangents (perpendicular to the initial line).", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How does the \"dimple\" condition in $ r = a(p + q \\cos \\theta) $ arise?", "answer": "- Step 1: The curve has a dimple when $ \\frac{p}{q} < 2 $.  \n- Step 2: This occurs because the second derivative $ d^2r/d\\theta^2 $ changes sign at ╬Ė = ŽĆ, causing concavity.  \n- Step 3: If $ p \\geq 2q $, the curve remains convex as $ d^2r/d\\theta^2 \\geq 0 $ for all ╬Ė.  \n\n**Visual Intuition:** A dimple resembles a \"dent\" in the polar curve, visible when the ratio $ p/q $ drops below 2.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why use symmetry to simplify area calculations for polar curves?", "answer": "- Step 1: Symmetry reduces computation by integrating over a smaller interval and multiplying.  \n- Step 2: For example, $ r = a(1 + \\cos \\theta) $ is symmetric about ╬Ė = 0, so integrating from 0 to ŽĆ and doubling avoids redundant work.  \n- Step 3: This leverages the curve's periodicity and avoids cancellation errors from negative $ r $ values.  \n\n**Efficiency:** Symmetry cuts computation time and minimizes error risk in manual calculations.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How does the polar curve $ r = 6 \\cos \\theta + 8 \\sin \\theta $ represent a circle not centered at the origin?", "answer": "- Step 1: Convert to Cartesian form using $ r = 6 \\cos \\theta + 8 \\sin \\theta $ ŌåÆ $ r = \\frac{6x + 8y}{r} $.  \n- Step 2: Multiply both sides by $ r $: $ x^2 + y^2 = 6x + 8y $.  \n- Step 3: Complete the square: $ (x-3)^2 + (y-4)^2 = 5^2 $, a circle centered at (3, 4) with radius 5.  \n\n**Geometric Insight:** Polar equations of circles not centered at the pole generally take the form $ r = A \\cos \\theta + B \\sin \\theta $.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why does the distance formula between two polar points $ (r_1, \\theta_1) $ and $ (r_2, \\theta_2) $ involve $ \\cos(\\theta_1 - \\theta_2) $?", "answer": "- Step 1: Use the law of cosines on the triangle formed by the pole and the two points.  \n- Step 2: The angle between the vectors is $ \\theta_1 - \\theta_2 $, so the distance $ d $ is $ \\sqrt{r_1^2 + r_2^2 - 2r_1 r_2 \\cos(\\theta_1 - \\theta_2)} $.  \n- Step 3: This generalizes the Pythagorean theorem for non-right triangles in polar coordinates.  \n\n**Special Case:** If $ \\theta_1 = \\theta_2 $, the points lie on the same line, reducing distance to $ |r_1 - r_2| $.", "source": "Qwen 3 ŌæĪ", "_id": "qwen_2_7", "judge_pick": false}], "count": 8}, "minimax_1": {"label": "MiniMax ŌæĀ", "cards": [{"question": "Write down the conversion formulas from polar coordinates (r, ╬Ė) to Cartesian coordinates (x, y). (1 step)", "answer": "- Step 1: The conversions use right-angled triangle trigonometry:\n$$x = r \\cos \\theta$$\n$$y = r \\sin \\theta$$\nThese follow directly from the definitions of cosine and sine in a right triangle where r is the hypotenuse.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Write down the conversion formulas from Cartesian coordinates (x, y) to polar coordinates (r, ╬Ė). What must you be careful about when finding ╬Ė? (2 steps)", "answer": "- Step 1: The formulas are:\n$$r = \\sqrt{x^2 + y^2}$$\n$$\\theta = \\arctan\\left(\\frac{y}{x}\\right)$$\n- Step 2: You must draw a sketch to check which quadrant the point lies in, because arctan only gives angles in the range (-ŽĆ/2, ŽĆ/2). The formula ╬Ė = arctan(y/x) gives the correct angle only in the 1st and 4th quadrants; in other quadrants, you need to add ŽĆ or adjust accordingly.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_1", "judge_pick": false}, {"question": "A point has Cartesian coordinates (-5, -12). Find its polar coordinates, giving ╬Ė in radians. Explain why your answer is not (13, -1.176). (3 steps)", "answer": "- Step 1: First find r using Pythagoras: r = ŌłÜ((-5)┬▓ + (-12)┬▓) = ŌłÜ(25 + 144) = ŌłÜ169 = 13\n- Step 2: Calculate the reference angle: ╬▒ = arctan(12/5) = arctan(2.4) Ōēł 1.176 radians. Since the point (-5, -12) is in the 3rd quadrant (both x and y are negative), ╬Ė = ŽĆ + ╬▒ = ŽĆ + 1.176 = 4.318 radians (or 7ŽĆ/6 in exact form).\n- Step 3: While (13, -1.176) is mathematically equivalent (since -1.176 + 2ŽĆ = 4.318), polar coordinates are typically given with ╬Ė in the range [0, 2ŽĆ) for consistency, so (13, 4.318) or (13, 7ŽĆ/6) is preferred.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Convert the polar point (10, 4ŽĆ/3) to Cartesian coordinates. (2 steps)", "answer": "- Step 1: Use x = r cos ╬Ė and y = r sin ╬Ė.\n- Step 2: x = 10 ├Ś cos(4ŽĆ/3) = 10 ├Ś (-1/2) = -5; y = 10 ├Ś sin(4ŽĆ/3) = 10 ├Ś (-ŌłÜ3/2) = -5ŌłÜ3. So the Cartesian coordinates are (-5, -5ŌłÜ3).", "source": "MiniMax ŌæĀ", "_id": "minimax_1_3", "judge_pick": false}, {"question": "What does the polar equation r = 5 represent in Cartesian form? What about r = 2 + cos 2╬Ė? (2 steps)", "answer": "- Step 1: For r = 5, square both sides: r┬▓ = 25. Since r┬▓ = x┬▓ + y┬▓, this gives x┬▓ + y┬▓ = 25, which is a circle centered at the origin with radius 5.\n- Step 2: For r = 2 + cos 2╬Ė, first use the identity cos 2╬Ė = 2cos┬▓╬Ė - 1: r = 2 + 2cos┬▓╬Ė - 1 = 1 + 2cos┬▓╬Ė. Multiply by r┬▓: r┬│ = r┬▓ + 2r┬▓cos┬▓╬Ė = r┬▓ + 2x┬▓. Since r┬▓ = x┬▓ + y┬▓ and r┬│ = (x┬▓ + y┬▓)^(3/2), we get (x┬▓ + y┬▓)^(3/2) = 3x┬▓ + y┬▓.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Convert the Cartesian equation y┬▓ = 4x to polar form. (2 steps)", "answer": "- Step 1: Substitute x = r cos ╬Ė and y = r sin ╬Ė: (r sin ╬Ė)┬▓ = 4(r cos ╬Ė)\n- Step 2: Simplify: r┬▓ sin┬▓╬Ė = 4r cos ╬Ė. Divide by r (assuming r ŌēĀ 0): r sin┬▓╬Ė = 4 cos ╬Ė. So r = 4 cos ╬Ė / sin┬▓╬Ė = 4 cot ╬Ė cosec ╬Ė.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Convert the Cartesian equation x┬▓ - y┬▓ = 5 to polar form. (2 steps)", "answer": "- Step 1: Substitute x = r cos ╬Ė and y = r sin ╬Ė: r┬▓ cos┬▓╬Ė - r┬▓ sin┬▓╬Ė = 5\n- Step 2: Factor: r┬▓(cos┬▓╬Ė - sin┬▓╬Ė) = 5. Using cos 2╬Ė = cos┬▓╬Ė - sin┬▓╬Ė, we get r┬▓ cos 2╬Ė = 5, so r┬▓ = 5 sec 2╬Ė.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What are the three standard polar curves that you should recognize immediately, and what do they represent? (1 step)", "answer": "- Step 1: (1) r = a is a circle with centre at the pole O and radius a. (2) ╬Ė = ╬▒ is a half-line (ray) through O making angle ╬▒ with the initial line. (3) r = a╬Ė is a spiral starting at O, where r increases linearly with ╬Ė.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Sketch the polar curve r = a(1 + cos ╬Ė), where a > 0. What is this curve called, and what is its shape? (2 steps)", "answer": "- Step 1: This is a cardioid (heart-shaped curve). At ╬Ė = 0, r = 2a (maximum). At ╬Ė = ŽĆ/2, r = a. At ╬Ė = ŽĆ, r = 0 (the cusp at the origin). At ╬Ė = 3ŽĆ/2, r = a. At ╬Ė = 2ŽĆ, r = 2a again.\n- Step 2: The curve is symmetric about the initial line (the horizontal axis). The curve gets its \"heart\" shape with the cusp at the origin pointing to the left.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_8", "judge_pick": false}, {"question": "The curve r = a sin 3╬Ė is a rose curve. How many loops does it have, and what is the range of ╬Ė needed to draw one complete loop? (2 steps)", "answer": "- Step 1: For r = a sin n╬Ė (or r = a cos n╬Ė), the curve has n loops if n is odd, and 2n loops if n is even. Since n = 3 (odd), there are 3 loops.\n- Step 2: Each loop is traced out as ╬Ė goes through an interval of length ŽĆ/n = ŽĆ/3. To draw one complete loop, use 0 Ōēż ╬Ė Ōēż ŽĆ/3 (or any interval of length ŽĆ/3 where r Ōēź 0).", "source": "MiniMax ŌæĀ", "_id": "minimax_1_9", "judge_pick": false}, {"question": "What is the difference between a convex limacon and a dimpled limacon? How can you determine which type r = a(p + q cos ╬Ė) represents just by looking at p and q? (2 steps)", "answer": "- Step 1: A convex limacon is \"egg-shaped\" with no indentation. A dimpled limacon has an indentation (a \"dent\") on one side.\n- Step 2: For r = a(p + q cos ╬Ė) with p > 0, q > 0: If p Ōēź 2q, the curve is convex. If p < 2q, the curve has a dimple. The boundary case p = 2q is the borderline where the dimple just becomes a point.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Sketch r = a(3 + 2 cos ╬Ė) where a > 0. Does this have a dimple or is it convex? How do you know without drawing it? (2 steps)", "answer": "- Step 1: Using the condition p Ōēź 2q for convexity: here p = 3, q = 2, so 2q = 4. Since p = 3 < 4 = 2q, we have p < 2q, so the curve has a dimple.\n- Step 2: At key points: ╬Ė = 0 gives r = 5a; ╬Ė = ŽĆ/2 gives r = 3a; ╬Ė = ŽĆ gives r = a. The \"dimple\" appears near ╬Ė = ŽĆ where r reaches its minimum value a.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Explain why when sketching polar curves, we typically only consider values of ╬Ė that give r Ōēź 0. What happens when r is negative? (2 steps)", "answer": "- Step 1: When r is negative in polar coordinates, the point is plotted in the opposite direction from ╬Ė. For example, the point (r, ╬Ė) with r < 0 is equivalent to the point (|r|, ╬Ė + ŽĆ).\n- Step 2: Many graph-drawing programs handle negative r automatically by \"reflecting\" the point, but this can create confusion. For sketching by hand, it's clearer to only use ╬Ė values where r Ōēź 0, or to explicitly account for the reflection when r < 0.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_12", "judge_pick": true}, {"question": "How do you find the area enclosed by a polar curve r = f(╬Ė) between ╬Ė = ╬▒ and ╬Ė = ╬▓? (2 steps)", "answer": "- Step 1: The area is given by the formula:\n$$\\text{Area} = \\frac{1}{2} \\int_{\\alpha}^{\\beta} r^2 \\, d\\theta = \\frac{1}{2} \\int_{\\alpha}^{\\beta} [f(\\theta)]^2 \\, d\\theta$$\n- Step 2: This formula comes from considering the area as a sum of infinitesimally small sectors. Each sector has area (1/2)r┬▓ d╬Ė, and integrating gives the total area. Note: In polar integration, areas in the \"third\" and \"fourth\" quadrants don't produce negative integrals as they do in Cartesian integration.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Find the area enclosed by the cardioid r = a(1 + cos ╬Ė). (4 steps)", "answer": "- Step 1: The cardioid is symmetric about the initial line (╬Ė = 0). We can find the area above the initial line (0 Ōēż ╬Ė Ōēż ŽĆ) and double it.\n- Step 2: Area = 2 ├Ś (1/2) ├Ś Ōł½ŌéĆ^ŽĆ a┬▓(1 + cos ╬Ė)┬▓ d╬Ė = a┬▓ Ōł½ŌéĆ^ŽĆ (1 + 2cos ╬Ė + cos┬▓╬Ė) d╬Ė\n- Step 3: Use cos┬▓╬Ė = (1 + cos 2╬Ė)/2: = a┬▓ Ōł½ŌéĆ^ŽĆ (1 + 2cos ╬Ė + (1 + cos 2╬Ė)/2) d╬Ė = a┬▓ Ōł½ŌéĆ^ŽĆ (3/2 + 2cos ╬Ė + (1/2)cos 2╬Ė) d╬Ė\n- Step 4: Integrate: = a┬▓[3╬Ė/2 + 2sin ╬Ė + (1/4)sin 2╬Ė]ŌéĆ^ŽĆ = a┬▓(3ŽĆ/2 + 0 + 0) = 3ŽĆa┬▓/2", "source": "MiniMax ŌæĀ", "_id": "minimax_1_14", "judge_pick": false}, {"question": "One loop of the rose curve r = a sin 4╬Ė is bounded by what values of ╬Ė? Find the area of one loop. (3 steps)", "answer": "- Step 1: A loop occurs when r Ōēź 0. Solve r = a sin 4╬Ė = 0: sin 4╬Ė = 0, so 4╬Ė = 0, ŽĆ, 2ŽĆ, 3ŽĆ, ... giving ╬Ė = 0, ŽĆ/4, ŽĆ/2, 3ŽĆ/4, ... The first loop is between ╬Ė = 0 and ╬Ė = ŽĆ/4.\n- Step 2: Area = (1/2) Ōł½ŌéĆ^(ŽĆ/4) a┬▓ sin┬▓4╬Ė d╬Ė\n- Step 3: Use sin┬▓4╬Ė = (1 - cos 8╬Ė)/2: = (a┬▓/2) ├Ś (1/2) Ōł½ŌéĆ^(ŽĆ/4) (1 - cos 8╬Ė) d╬Ė = (a┬▓/4)[╬Ė - sin 8╬Ė/8]ŌéĆ^(ŽĆ/4) = (a┬▓/4)(ŽĆ/4 - sin 2ŽĆ/8) = a┬▓ŽĆ/16", "source": "MiniMax ŌæĀ", "_id": "minimax_1_15", "judge_pick": false}, {"question": "When finding the area between two polar curves r = f(╬Ė) and r = g(╬Ė) that intersect, what is the key principle you must follow? (2 steps)", "answer": "- Step 1: You must split the integral at the intersection points and use the appropriate curve as the outer boundary in each interval.\n- Step 2: The area is found by integrating (1/2)(outer radius)┬▓ - (1/2)(inner radius)┬▓ over each interval. The \"outer\" curve is the one with the larger r value in that interval.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Two curves r = 2 + cos ╬Ė and r = 5 cos ╬Ė intersect at ╬Ė = ┬▒ŽĆ/3. Explain how to find the area of the region that lies inside both curves. (3 steps)", "answer": "- Step 1: First, sketch both curves. r = 2 + cos ╬Ė is a limacon; r = 5 cos ╬Ė is a circle. They intersect at ╬Ė = ┬▒ŽĆ/3.\n- Step 2: For -ŽĆ/3 Ōēż ╬Ė Ōēż ŽĆ/3, the circle (r = 5 cos ╬Ė) is outside (has larger r), so this is the outer curve. For the other regions, the limacon is outside.\n- Step 3: Use symmetry about the initial line. Area = 2 ├Ś [(1/2)Ōł½ŌéĆ^(ŽĆ/3)(5 cos ╬Ė)┬▓ d╬Ė + (1/2)Ōł½_(ŽĆ/3)^(ŽĆ/2)(2 + cos ╬Ė)┬▓ d╬Ė]. Then simplify and evaluate.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Why can't you simply find the area of r = a sin n╬Ė by computing (1/2)Ōł½ŌéĆ^(2ŽĆ) r┬▓ d╬Ė and dividing by n to get the area of one loop? (2 steps)", "answer": "- Step 1: When you square r to get r┬▓, you lose the sign information. The integral (1/2)Ōł½ŌéĆ^(2ŽĆ) r┬▓ d╬Ė counts all loops, including those traced when r < 0 (which would otherwise be reflected).\n- Step 2: To find the area of exactly one loop, you must choose limits that correspond to r Ōēź 0 throughout, such as 0 Ōēż ╬Ė Ōēż ŽĆ/n for r = a sin n╬Ė when n is odd.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_18", "judge_pick": false}, {"question": "How do you find tangents to a polar curve r = f(╬Ė) that are parallel to the initial line (horizontal)? What about tangents perpendicular to the initial line (vertical)? (3 steps)", "answer": "- Step 1: Write the curve in parametric form using ╬Ė as the parameter: x = r cos ╬Ė = f(╬Ė) cos ╬Ė, y = r sin ╬Ė = f(╬Ė) sin ╬Ė.\n- Step 2: Differentiate with respect to ╬Ė: dy/d╬Ė and dx/d╬Ė. The gradient of the tangent is dy/dx = (dy/d╬Ė)/(dx/d╬Ė).\n- Step 3: For tangents parallel to the initial line (╬Ė = 0, the x-axis), set dy/d╬Ė = 0 (but dx/d╬Ė ŌēĀ 0). For tangents perpendicular to the initial line, set dx/d╬Ė = 0 (but dy/d╬Ė ŌēĀ 0). Then solve for ╬Ė and find the corresponding r values.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Find the points on the cardioid r = a(1 + cos ╬Ė) where the tangents are parallel to the initial line. (4 steps)", "answer": "- Step 1: Write y = r sin ╬Ė = a(1 + cos ╬Ė) sin ╬Ė = a(sin ╬Ė + sin ╬Ė cos ╬Ė). Differentiate: dy/d╬Ė = a(cos ╬Ė + cos┬▓╬Ė - sin┬▓╬Ė) = a(2cos┬▓╬Ė + cos ╬Ė - 1).\n- Step 2: Set dy/d╬Ė = 0: 2cos┬▓╬Ė + cos ╬Ė - 1 = 0. Factor: (2cos ╬Ė - 1)(cos ╬Ė + 1) = 0.\n- Step 3: So cos ╬Ė = 1/2 or cos ╬Ė = -1. This gives ╬Ė = ┬▒ŽĆ/3 (for cos ╬Ė = 1/2) and ╬Ė = ŽĆ (for cos ╬Ė = -1).\n- Step 4: Find r: at ╬Ė = ┬▒ŽĆ/3, r = a(1 + 1/2) = 3a/2. At ╬Ė = ŽĆ, r = a(1 - 1) = 0. So the points are (3a/2, ŽĆ/3), (3a/2, -ŽĆ/3), and (0, ŽĆ).", "source": "MiniMax ŌæĀ", "_id": "minimax_1_20", "judge_pick": false}, {"question": "For the curve r = a sin 2╬Ė (0 Ōēż ╬Ė Ōēż ŽĆ/2), find where the tangents are perpendicular to the initial line. (4 steps)", "answer": "- Step 1: Write x = r cos ╬Ė = a sin 2╬Ė cos ╬Ė = 2a sin ╬Ė cos┬▓╬Ė. Differentiate: dx/d╬Ė = 2a(cos ╬Ė cos┬▓╬Ė + sin ╬Ė ├Ś 2cos ╬Ė ├Ś (-sin ╬Ė)) = 2a(cos┬│╬Ė - 2sin┬▓╬Ė cos ╬Ė).\n- Step 2: Simplify: dx/d╬Ė = 2a cos ╬Ė(cos┬▓╬Ė - 2sin┬▓╬Ė) = 2a cos ╬Ė(cos┬▓╬Ė - 2(1 - cos┬▓╬Ė)) = 2a cos ╬Ė(3cos┬▓╬Ė - 2).\n- Step 3: Set dx/d╬Ė = 0: either cos ╬Ė = 0 (giving ╬Ė = ŽĆ/2) or 3cos┬▓╬Ė - 2 = 0 (giving cos┬▓╬Ė = 2/3, so cos ╬Ė = ŌłÜ(2/3), ╬Ė Ōēł 0.615 rad).\n- Step 4: At ╬Ė = ŽĆ/2, r = a sin ŽĆ = 0 (the origin). At ╬Ė Ōēł 0.615, r = a sin(2 ├Ś 0.615) = a sin 1.23 Ōēł a ├Ś 0.943. Using exact values: if tan ╬▒ = 1/ŌłÜ2, then sin ╬▒ = 1/ŌłÜ3, cos ╬▒ = ŌłÜ(2/3), giving r = 2a ├Ś (1 itive area.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_30", "judge_pick": true}, {"question": "Explain why r = a(1 - cos ╬Ė) looks different from r = a(1 + cos ╬Ė) despite being similar equations. (2 steps)", "answer": "- Step 1: r = a(1 + cos ╬Ė) is a cardioid with its cusp at the origin pointing to the left (toward ╬Ė = ŽĆ), and its maximum extent (r = 2a) at ╬Ė = 0.\n- Step 2: r = a(1 - cos ╬Ė) is also a cardioid, but reflected about the y-axis. It has its cusp at the origin pointing to the right (toward ╬Ė = 0), and its maximum extent (r = 2a) at ╬Ė = ŽĆ. The difference in sign of cos ╬Ė flips the cardioid horizontally.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_31", "judge_pick": true}, {"question": "The curve r┬▓ = a┬▓ cos 2╬Ė is called a lemniscate. For what values of ╬Ė does this curve exist (i.e., where is r real)? (2 steps)", "answer": "- Step 1: Since r┬▓ must be non-negative, we need cos 2╬Ė Ōēź 0.\n- Step 2: cos 2╬Ė Ōēź 0 when 2╬Ė is in the intervals [-ŽĆ/2, ŽĆ/2] + 2kŽĆ or [3ŽĆ/2, 5ŽĆ/2] + 2kŽĆ. This gives ╬Ė in the ranges [-ŽĆ/4, ŽĆ/4] + kŽĆ and [3ŽĆ/4, 5ŽĆ/4] + kŽĆ. Within 0 Ōēż ╬Ė < 2ŽĆ, the curve exists for 0 Ōēż ╬Ė Ōēż ŽĆ/4, 3ŽĆ/4 Ōēż ╬Ė Ōēż 5ŽĆ/4, and 7ŽĆ/4 Ōēż ╬Ė < 2ŽĆ.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_32", "judge_pick": false}, {"question": "How do you determine the points of intersection between two polar curves r = f(╬Ė) and r = g(╬Ė)? (2 steps)", "answer": "- Step 1: To find intersection points, set f(╬Ė) = g(╬Ė) and solve for ╬Ė. This gives the angles where the two curves meet.\n- Step 2: However, curves may also intersect at the pole (origin). Check if r = 0 satisfies either equation at the other's ╬Ė values. Also be aware that the same point may be represented by different (r, ╬Ė) pairs (e.g., (r, ╬Ė) and (-r, ╬Ė + ŽĆ) represent the same point).", "source": "MiniMax ŌæĀ", "_id": "minimax_1_33", "judge_pick": false}, {"question": "For r = a(p + q cos ╬Ė), what determines whether the curve passes through the pole (origin)? (1 step)", "answer": "- Step 1: The curve passes through the pole if there exists a ╬Ė such that r = 0, i.e., p + q cos ╬Ė = 0. This requires p Ōēż q (so that cos ╬Ė = -p/q is in the range [-1, 1]). If p > q, then p + q cos ╬Ė > 0 for all ╬Ė, and the curve does not pass through the pole.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_34", "judge_pick": true}, {"question": "Why can polar coordinates be more convenient than Cartesian coordinates for certain engineering applications like GPS? (1 step)", "answer": "- Step 1: In polar coordinates, position is naturally described by a distance and direction from a reference point ŌĆö exactly how we think about navigation. A ship or aircraft's position is naturally given by its distance from a reference point (range) and its bearing (angle). Cartesian coordinates, while mathematically equivalent, don't match this natural description as well.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_35", "judge_pick": false}, {"question": "What is special about the curve r = e^(k╬Ė) and what is its shape called? (1 step)", "answer": "- Step 1: r = e^(k╬Ė) is an exponential spiral. As ╬Ė increases, r grows exponentially. If k > 0, the spiral winds outward; if k < 0, it spirals inward toward the origin. These spirals appear frequently in nature (shells, galaxies) and physics.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_36", "judge_pick": false}, {"question": "Find the exact area bounded by the curve r = a(1 + (1/2) sin ╬Ė) for 0 Ōēż ╬Ė < 2ŽĆ. (3 steps)", "answer": "- Step 1: Use Area = (1/2)Ōł½ŌéĆ^(2ŽĆ) r┬▓ d╬Ė = (a┬▓/2)Ōł½ŌéĆ^(2ŽĆ) (1 + (1/2) sin ╬Ė)┬▓ d╬Ė.\n- Step 2: Expand: = (a┬▓/2)Ōł½ŌéĆ^(2ŽĆ) (1 + sin ╬Ė + (1/4) sin┬▓╬Ė) d╬Ė = (a┬▓/2)Ōł½ŌéĆ^(2ŽĆ) (1 + sin ╬Ė + (1/4)(1 - cos 2╬Ė)/2) d╬Ė = (a┬▓/2)Ōł½ŌéĆ^(2ŽĆ) (1 + sin ╬Ė + 1/8 - (1/8)cos 2╬Ė) d╬Ė = (a┬▓/2)Ōł½ŌéĆ^(2ŽĆ) (9/8 + sin ╬Ė - (1/8)cos 2╬Ė) d╬Ė.\n- Step 3: Integrate: = (a┬▓/2)[9╬Ė/8 - cos ╬Ė + (-1/16)sin 2╬Ė]ŌéĆ^(2ŽĆ) = (a┬▓/2)(9ŽĆ/4 - 0 - 0 - 0) = 9ŽĆa┬▓/8. Since Ōł½ sin ╬Ė d╬Ė = 0 over full period, and Ōł½ cos 2╬Ė d╬Ė = 0 as well.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A student says that r = sin ╬Ė and r = cos ╬Ė represent the same circle. Explain why this is a misconception and what the correct relationship is. (2 steps)", "answer": "- Step 1: This is a common misconception. While both are circles of radius 1/2, they are not the same ŌĆö they are the same circle rotated by 90┬░.\n- Step 2: r = a cos ╬Ė has its center on the positive x-axis at (a/2, 0). r = a sin ╬Ė has its center on the positive y-axis at (0, a/2). For a = 1, the first circle is centered at (0.5, 0), the second at (0, 0.5). They intersect at the origin and at (ŌłÜ2/2, ŌłÜ2/2), but they are distinct circles.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_38", "judge_pick": true}, {"question": "When finding tangents to polar curves, why do we set dy/d╬Ė = 0 for tangents parallel to the initial line rather than setting dy/dx = 0 directly? (2 steps)", "answer": "- Step 1: In polar coordinates, we're given r as a function of ╬Ė, not y as a function of x. We can't directly find dy/dx without first converting to parametric form.\n- Step 2: By treating ╬Ė as the parameter, we have x(╬Ė) and y(╬Ė). The chain rule gives dy/dx = (dy/d╬Ė)/(dx/d╬Ė). For a horizontal tangent (parallel to the initial line, which is the x-axis), we need the numerator dy/d╬Ė to be zero (while dx/d╬Ė ŌēĀ 0), which makes the gradient zero.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_39", "judge_pick": true}, {"question": "The polar curve r = 4 cos 2╬Ė is shown for 0 Ōēż ╬Ė Ōēż ŽĆ/4. At point A where r = 2, point B lies on the initial line vertically below A. Find the area bounded by the curve, the line segment AB, and the initial line. (3 steps)", "answer": "- Step 1: When r = 2: 2 = 4 cos 2╬Ė ŌåÆ cos 2╬Ė = 1/2 ŌåÆ 2╬Ė = ŽĆ/3 ŌåÆ ╬Ė = ŽĆ/6. So point A is at (2, ŽĆ/6). Point B is at (2, 0) on the initial line directly below.\n- Step 2: The region is bounded by: the curve from ╬Ė = 0 to ╬Ė = ŽĆ/6, the line segment from (2, ŽĆ/6) to (2, 0) (a vertical line at x = 2, which is r = 2 sec ╬Ė), and the initial line from ╬Ė = 0 to ╬Ė = ŽĆ/6.\n- Step 3: Area = (1/2)Ōł½ŌéĆ^(ŽĆ/6) (4 cos 2╬Ė)┬▓ d╬Ė - area of triangle OAB. The integral gives (1/2)Ōł½ŌéĆ^(ŽĆ/6) 16 cos┬▓2╬Ė d╬Ė = 8Ōł½ŌéĆ^(ŽĆ/6) (1 + cos 4╬Ė)/2 d╬Ė = 4[╬Ė + sin 4╬Ė/4]ŌéĆ^(ŽĆ/6) = 4(ŽĆ/6 + sin(2ŽĆ)/4) = 2ŽĆ/3. Then subtract the triangular area (1/2)(base)(height) = (1/2)(2)(2 sin(ŽĆ/6)) = (1/2)(2)(1) = 1. So total area = 2ŽĆ/3 - 1.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_40", "judge_pick": false}, {"question": "For r = a sin ╬Ė, what happens to the area formula when you integrate from 0 to ŽĆ versus from 0 to 2ŽĆ? Why does this happen? (2 steps)", "answer": "- Step 1: From 0 to ŽĆ: Area = (1/2)Ōł½ŌéĆ^ŽĆ a┬▓ sin┬▓╬Ė d╬Ė = (a┬▓/2) ├Ś (ŽĆ/2) = a┬▓ŽĆ/4. From 0 to 2ŽĆ: Area = (1/2)Ōł½ŌéĆ^(2ŽĆ) a┬▓ sin┬▓╬Ė d╬Ė = a┬▓ŽĆ/2.\n- Step 2: The 0 to 2ŽĆ integral gives twice the area because r = a sin ╬Ė traces the full circle twice (once in the positive r direction from 0 to ŽĆ, and again from ŽĆ to 2ŽĆ, but with negative r values that reflect to the same physical location). The correct area of the circle is a┬▓ŽĆ/2, but you get the same result from either 0 to ŽĆ (counting it once) or 0 to 2ŽĆ (counting the reflections).", "source": "MiniMax ŌæĀ", "_id": "minimax_1_41", "judge_pick": false}, {"question": "What is the key difference in approach when finding the area of a region bounded by a polar curve and a line (like a tangent) compared to two polar curves? (2 steps)", "answer": "- Step 1: When bounding a region with a polar curve and a line (such as a tangent or the initial line), one boundary is given in polar form (r = f(╬Ė)) and the other in Cartesian form (like x = constant or y = 0).\n- Step 2: You need to convert the line equation to polar form. For the initial line (the x-axis), y = 0, which gives r sin ╬Ė = 0, so either r = 0 or sin ╬Ė = 0 (╬Ė = 0 or ŽĆ). The area calculation then becomes an integral of r┬▓/2 minus (or plus) the area of a triangle formed with the line.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_42", "judge_pick": false}, {"question": "Why might converting a polar equation to Cartesian form make it harder to sketch the curve? Give an example. (2 steps)", "answer": "- Step 1: Many polar curves have elegant, simple shapes (cardioids, spirals, rose curves) that are easy to visualize from their polar form, but become complicated, implicit Cartesian equations.\n- Step 2: For example, r = a(1 + cos ╬Ė) (a simple cardioid) becomes (x┬▓ + y┬▓ - ax)┬▓ = a┬▓(x┬▓ + y┬▓) in Cartesian form ŌĆö much harder to recognize and sketch. The polar form immediately tells you it's heart-shaped and symmetric about the x-axis.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_43", "judge_pick": true}], "count": 44}, "minimax_2": {"label": "MiniMax ŌæĪ", "cards": [{"question": "Convert the Cartesian point (-ŌłÜ3, -1) into polar coordinates, explaining how you determine the correct quadrant. (3 steps)", "answer": "- Step 1: First find r using Pythagoras: r = ŌłÜ((-ŌłÜ3)┬▓ + (-1)┬▓) = ŌłÜ(3 + 1) = ŌłÜ4 = 2\n- Step 2: Find the reference angle ╬▒ = arctan(|y/x|) = arctan(1/ŌłÜ3) = ŽĆ/6\n- Step 3: Since the point (-ŌłÜ3, -1) is in the 3rd quadrant (both x and y negative), ╬Ė = ŽĆ + ╬▒ = ŽĆ + ŽĆ/6 = 7ŽĆ/6. Alternative representations are possible (e.g., -5ŽĆ/6)", "source": "MiniMax ŌæĪ", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Why must you always draw a sketch when converting from Cartesian to polar coordinates, rather than just using ╬Ė = arctan(y/x)? (2 steps)", "answer": "- Step 1: The formula ╬Ė = arctan(y/x) only gives the reference angle in the range (-ŽĆ/2, ŽĆ/2), which only covers the 1st and 4th quadrants.\n- Step 2: A sketch ensures you place ╬Ė in the correct quadrant. For example, the point (-5, 12) gives arctan(-12/5) Ōēł -1.176 (4th quadrant reference), but the actual point is in the 2nd quadrant, so ╬Ė = ŽĆ - 1.176 Ōēł 1.966 radians, or equivalently 5.317 radians.", "source": "MiniMax ŌæĪ", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Convert the polar coordinates (10, 4ŽĆ/3) into Cartesian form. (2 steps)", "answer": "- Step 1: Use x = r cos ╬Ė and y = r sin ╬Ė. Compute cos(4ŽĆ/3) = cos(ŽĆ + ŽĆ/3) = -cos(ŽĆ/3) = -1/2, and sin(4ŽĆ/3) = sin(ŽĆ + ŽĆ/3) = -sin(ŽĆ/3) = -ŌłÜ3/2\n- Step 2: So x = 10 ├Ś (-1/2) = -5, and y = 10 ├Ś (-ŌłÜ3/2) = -5ŌłÜ3. The Cartesian coordinates are (-5, -5ŌłÜ3)", "source": "MiniMax ŌæĪ", "_id": "minimax_2_2", "judge_pick": false}, {"question": "The polar curve r = 2 + cos 2╬Ė is given. Explain how to convert this into a Cartesian equation, and why the result is complex. (3 steps)", "answer": "- Step 1: First use the double-angle identity: cos 2╬Ė = 2 cos┬▓╬Ė - 1, so r = 2 + 2 cos┬▓╬Ė - 1 = 1 + 2 cos┬▓╬Ė\n- Step 2: Multiply both sides by r┬▓: r┬│ = r┬▓ + 2r┬▓ cos┬▓╬Ė. Now substitute r┬▓ = x┬▓ + y┬▓ and r cos ╬Ė = x: (x┬▓ + y┬▓)^(3/2) = x┬▓ + y┬▓ + 2x┬▓\n- Step 3: This simplifies to (x┬▓ + y┬▓)^(3/2) = 3x┬▓ + y┬▓. The presence of the 3/2 power makes this difficult to write in the simple form y = f(x), which is why polar equations often yield complicated Cartesian forms", "source": "MiniMax ŌæĪ", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Convert the Cartesian equation x┬▓ - y┬▓ = 5 into a polar equation. (3 steps)", "answer": "- Step 1: Substitute x = r cos ╬Ė and y = r sin ╬Ė: (r cos ╬Ė)┬▓ - (r sin ╬Ė)┬▓ = 5\n- Step 2: Simplify: r┬▓(cos┬▓╬Ė - sin┬▓╬Ė) = 5. Using the identity cos┬▓╬Ė - sin┬▓╬Ė = cos 2╬Ė, we get r┬▓ cos 2╬Ė = 5\n- Step 3: Solving for r: r┬▓ = 5 sec 2╬Ė, so r = ŌłÜ(5 sec 2╬Ė) = ŌłÜ5 sec^(1/2) 2╬Ė (or more neatly, r = ŌłÜ(5 sec 2╬Ė))", "source": "MiniMax ŌæĪ", "_id": "minimax_2_4", "judge_pick": false}, {"question": "The line yŌłÜ3 = x + 4 is given. Convert this to a polar equation in the form r = f(╬Ė), showing how the trigonometric simplification works. (4 steps)", "answer": "- Step 1: Substitute x = r cos ╬Ė, y = r sin ╬Ė: rŌłÜ3 sin ╬Ė = r cos ╬Ė + 4\n- Step 2: Rearrange: r(ŌłÜ3 sin ╬Ė - cos ╬Ė) = 4\n- Step 3: To simplify the bracket, express it as R sin(╬Ė - ╬▒). We need R sin(╬Ė - ╬▒) = R(sin ╬Ė cos ╬▒ - cos ╬Ė sin ╬▒) = ŌłÜ3 sin ╬Ė - cos ╬Ė. So R cos ╬▒ = ŌłÜ3 and R sin ╬▒ = 1, giving R = ŌłÜ(3 + 1) = 2, and ╬▒ = arctan(1/ŌłÜ3) = ŽĆ/6\n- Step 4: So 2 sin(╬Ė - ŽĆ/6) = 4/2 = 2, giving r sin(╬Ė - ŽĆ/6) = 2, and thus r = 2 cosec(╬Ė - ŽĆ/6)", "source": "MiniMax ŌæĪ", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Sketch the polar curves r = 5, ╬Ė = 3ŽĆ/4, and r = a╬Ė (for a > 0). Describe the key features of each. (3 steps)", "answer": "- Step 1: r = 5 is a circle with centre at the pole O and radius 5. This is independent of ╬Ė.\n- Step 2: ╬Ė = 3ŽĆ/4 is a half-line (ray) starting from O at angle 3ŽĆ/4 to the positive x-axis (45┬░ above the negative x-axis, in the 2nd quadrant). Only half is shown; the other half would be ╬Ė = -ŽĆ/4 or 7ŽĆ/4.\n- Step 3: r = a╬Ė is a spiral starting at O. As ╬Ė increases, r increases linearly. For ╬Ė from 0 to 2ŽĆ, it winds around the origin, crossing the horizontal axis at ╬Ė = ŽĆ (r = aŽĆ) and ╬Ė = 2ŽĆ (r = 2aŽĆ), and the vertical axis at ╬Ė = ŽĆ/2 (r = aŽĆ/2)", "source": "MiniMax ŌæĪ", "_id": "minimax_2_6", "judge_pick": false}, {"question": "For the cardioid r = a(1 + cos ╬Ė), create a table of values for ╬Ė = 0, ŽĆ/2, ŽĆ, 3ŽĆ/2, 2ŽĆ and describe the resulting shape. (3 steps)", "answer": "- Step 1: Compute r for each ╬Ė: At ╬Ė = 0, r = a(1 + 1) = 2a; at ╬Ė = ŽĆ/2, r = a(1 + 0) = a; at ╬Ė = ŽĆ, r = a(1 - 1) = 0; at ╬Ė = 3ŽĆ/2, r = a(1 + 0) = a; at ╬Ė = 2ŽĆ, r = a(1 + 1) = 2a\n- Step 2: The curve is symmetric about the horizontal axis (the initial line). It starts at the origin (╬Ė = ŽĆ), goes out to r = 2a at ╬Ė = 0, loops around, and returns to the origin.\n- Step 3: The shape resembles a heart (hence the name \"cardioid\"). It's a \"limacon with a cusp\" where p = q in r = a(p + q cos ╬Ė)", "source": "MiniMax ŌæĪ", "_id": "minimax_2_7", "judge_pick": false}, {"question": "For the curve r = a sin 3╬Ė, determine the range of ╬Ė needed to draw one complete loop, and explain why. (3 steps)", "answer": "- Step 1: r = a sin 3╬Ė has period 2ŽĆ/3, so one complete pattern (three loops) completes in ╬Ė from 0 to 2ŽĆ. For one loop, we need r Ōēź 0 throughout.\n- Step 2: Solve r = 0: a sin 3╬Ė = 0 means sin 3╬Ė = 0, so 3╬Ė = 0, ŽĆ, 2ŽĆ, ..., giving ╬Ė = 0, ŽĆ/3, 2ŽĆ/3, ...\n- Step 3: One loop occurs for ╬Ė between 0 and ŽĆ/3 (where sin 3╬Ė Ōēź 0). Similarly, other loops occur for ╬Ė in [ŽĆ/3, 2ŽĆ/3] and [2ŽĆ/3, ŽĆ], then repeats. Each loop has angular width ŽĆ/3", "source": "MiniMax ŌæĪ", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Explain why the curve r = a sin 3╬Ė has three loops symmetrically arranged around the pole, whereas r = a sin ╬Ė has only one loop. (2 steps)", "answer": "- Step 1: For r = a sin n╬Ė, there are n equally-spaced loops when n is odd, and 2n loops when n is even (counting only the r Ōēź 0 portion). This is because sin(n╬Ė) completes n half-cycles in the interval ╬Ė Ōłł [0, 2ŽĆ], and each positive half-cycle (where r Ōēź 0) produces one loop.\n- Step 2: For n = 1 (r = a sin ╬Ė), one positive half-cycle from ╬Ė = 0 to ╬Ė = ŽĆ gives one loop. For n = 3 (r = a sin 3╬Ė), three positive half-cycles from ╬Ė Ōłł [0, ŽĆ/3], [ŽĆ/3, 2ŽĆ/3], [2ŽĆ/3, ŽĆ] give three loops", "source": "MiniMax ŌæĪ", "_id": "minimax_2_9", "judge_pick": false}, {"question": "For curves of the form r = a(p + q cos ╬Ė), what conditions determine whether the curve is convex or has a dimple? Explain intuitively why this works. (3 steps)", "answer": "- Step 1: The curve is convex when p Ōēź 2q, and has a dimple (concave region near ╬Ė = ŽĆ) when p < 2q.\n- Step 2: Intuition: The term q cos ╬Ė causes the radius to vary between p - q (at ╬Ė = ŽĆ) and p + q (at ╬Ė = 0). The \"dimple\" occurs when the variation is large relative to pŌĆöspecifically, when the radius decreases enough near ╬Ė = ŽĆ to create an indentation. The condition p < 2q means the minimum radius (p - q) is less than half the maximum radius (p + q), allowing the curve to bend inward.\n- Step 3: At the boundary case p = 2q, the curve just transitions between convex and dimpledŌĆöthe \"dimple\" point is exactly at ╬Ė = ŽĆ", "source": "MiniMax ŌæĪ", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Sketch r = a(5 + 2 cos ╬Ė) and r = a(3 + 2 cos ╬Ė), explaining how the different parameter values affect the shape. (3 steps)", "answer": "- Step 1: For r = a(5 + 2 cos ╬Ė): p = 5, q = 2. Since p = 5 Ōēź 2q = 4, the curve is convex (no dimple). At ╬Ė = 0, r = 7a; at ╬Ė = ŽĆ, r = 3a; at ╬Ė = ŽĆ/2, r = 5a.\n- Step 2: For r = a(3 + 2 cos ╬Ė): p = 3, q = 2. Since p = 3 < 2q = 4, the curve has a dimple. At ╬Ė = 0, r = 5a; at ╬Ė = ŽĆ, r = a (significantly smaller); at ╬Ė = ŽĆ/2, r = 3a.\n- Step 3: The key difference is visible near ╬Ė = ŽĆ: when p < 2q, the radius shrinks enough to create an inward curvature (the dimple). When p Ōēź 2q, the curve smoothly bulges outward everywhere", "source": "MiniMax ŌæĪ", "_id": "minimax_2_11", "judge_pick": false}, {"question": "The locus |z - 3 - 4i| = 5 on an Argand diagram represents a circle. How do you represent this circle in polar form? (3 steps)", "answer": "- Step 1: In Cartesian form, this is (x - 3)┬▓ + (y - 4)┬▓ = 25, a circle with centre (3, 4) and radius 5.\n- Step 2: Substitute x = r cos ╬Ė, y = r sin ╬Ė: (r cos ╬Ė - 3)┬▓ + (r sin ╬Ė - 4)┬▓ = 25. Expand: r┬▓ cos┬▓╬Ė - 6r cos╬Ė + 9 + r┬▓ sin┬▓╬Ė - 8r sin╬Ė + 16 = 25\n- Step 3: Using cos┬▓╬Ė + sin┬▓╬Ė = 1, simplify: r┬▓ - 6r cos╬Ė - 8r sin╬Ė = 0, so r = 6 cos╬Ė + 8 sin╬Ė. This is the polar form", "source": "MiniMax ŌæĪ", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Prove the distance formula in polar coordinates: the distance between points (rŌéü, ╬ĖŌéü) and (rŌéé, ╬ĖŌéé) is d = ŌłÜ(rŌéü┬▓ + rŌéé┬▓ - 2rŌéürŌéé cos(╬ĖŌéü - ╬ĖŌéé)). (4 steps)", "answer": "- Step 1: Convert both polar points to Cartesian: Point 1: (rŌéü cos ╬ĖŌéü, rŌéü sin ╬ĖŌéü); Point 2: (rŌéé cos ╬ĖŌéé, rŌéé sin ╬ĖŌéé)\n- Step 2: Use the Cartesian distance formula: d┬▓ = (rŌéü cos ╬ĖŌéü - rŌéé cos ╬ĖŌéé)┬▓ + (rŌéü sin ╬ĖŌéü - rŌéé sin ╬ĖŌéé)┬▓\n- Step 3: Expand: = rŌéü┬▓(cos┬▓╬ĖŌéü + sin┬▓╬ĖŌéü) + rŌéé┬▓(cos┬▓╬ĖŌéé + sin┬▓╬ĖŌéé) - 2rŌéürŌéé(cos ╬ĖŌéü cos ╬ĖŌéé + sin ╬ĖŌéü sin ╬ĖŌéé)\n- Step 4: Using cos┬▓ + sin┬▓ = 1 and cos(A - B) = cos A cos B + sin A sin B, we get d┬▓ = rŌéü┬▓ + rŌéé┬▓ - 2rŌéürŌéé cos(╬ĖŌéü - ╬ĖŌéé), so d = ŌłÜ(rŌéü┬▓ + rŌéé┬▓ - 2rŌéürŌéé cos(╬ĖŌéü - ╬ĖŌéé))", "source": "MiniMax ŌæĪ", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Find the area enclosed by the cardioid r = a(1 + cos ╬Ė). Explain why you can integrate from 0 to ŽĆ and double, rather than 0 to 2ŽĆ. (4 steps)", "answer": "- Step 1: The formula for area bounded by a polar curve r = f(╬Ė) from ╬Ė = ╬▒ to ╬Ė = ╬▓ is A = (1/2)Ōł½[╬▒ to ╬▓] r┬▓ d╬Ė\n- Step 2: The cardioid is symmetric about the initial line (the horizontal axis). For ╬Ė from 0 to ŽĆ, we get the upper half; for ╬Ė from ŽĆ to 2ŽĆ, we get the lower half (mirror image).\n- Step 3: Compute A = 2 ├Ś (1/2)Ōł½[0 to ŽĆ] a┬▓(1 + cos ╬Ė)┬▓ d╬Ė = a┬▓Ōł½[0 to ŽĆ] (1 + 2 cos ╬Ė + cos┬▓╬Ė) d╬Ė. Using cos┬▓╬Ė = (1 + cos 2╬Ė)/2: = a┬▓Ōł½[0 to ŽĆ] (3/2 + 2 cos ╬Ė + (1/2) cos 2╬Ė) d╬Ė\n- Step 4: Integrate: = a┬▓[3╬Ė/2 + 2 sin ╬Ė + (1/4) sin 2╬Ė] from 0 to ŽĆ = a┬▓(3ŽĆ/2) = 3ŽĆa┬▓/2", "source": "MiniMax ŌæĪ", "_id": "minimax_2_14", "judge_pick": false}, {"question": "For the curve r = a sin 4╬Ė, find the area of one loop. Why can't you simply divide the total area by 4? (3 steps)", "answer": "- Step 1: One loop occurs when r Ōēź 0, which is for ╬Ė from 0 to ŽĆ/4. The area is A = (1/2)Ōł½[0 to ŽĆ/4] a┬▓ sin┬▓(4╬Ė) d╬Ė\n- Step 2: Using sin┬▓(4╬Ė) = (1 - cos 8╬Ė)/2: A = (a┬▓/4)Ōł½[0 to ŽĆ/4] (1 - cos 8╬Ė) d╬Ė = (a┬▓/4)[╬Ė - (sin 8╬Ė)/8] from 0 to ŽĆ/4 = (a┬▓/4)(ŽĆ/4 - 0) = ŽĆa┬▓/16\n- Step 3: If you computed (1/2)Ōł½[0 to 2ŽĆ] r┬▓ d╬Ė = (a┬▓/2)Ōł½[0 to 2ŽĆ] sin┬▓(4╬Ė) d╬Ė and divided by 4, you'd get ŽĆa┬▓/8, which is double the correct answer. This is because r┬▓ includes contributions from r < 0 regions (the \"other half\" of each loop). You must restrict to regions where r Ōēź 0", "source": "MiniMax ŌæĪ", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Two curves r = 2 + cos ╬Ė and r = 5 cos ╬Ė intersect. Find their points of intersection and explain how to find the area of the region that lies inside both curves. (4 steps)", "answer": "- Step 1: Find intersection: set 2 + cos ╬Ė = 5 cos ╬Ė, so 4 cos ╬Ė = 2, giving cos ╬Ė = 1/2, so ╬Ė = ┬▒ŽĆ/3 (within the relevant domain)\n- Step 2: At ╬Ė = ŽĆ/3, r = 5 cos(ŽĆ/3) = 5 ├Ś 1/2 = 5/2. At ╬Ė = -ŽĆ/3, r = 5/2. So intersections are at (5/2, ┬▒ŽĆ/3)\n- Step 3: Sketching shows the region inside both curves is symmetric about the initial line. The region consists of two parts: for |╬Ė| Ōēż ŽĆ/3, the inner curve is r = 2 + cos ╬Ė; for ŽĆ/3 Ōēż |╬Ė| Ōēż ŽĆ/2, the inner curve is r = 5 cos ╬Ė\n- Step 4: Area = 2 ├Ś [ (1/2)Ōł½[0 to ŽĆ/3] (2 + cos ╬Ė)┬▓ d╬Ė + (1/2)Ōł½[ŽĆ/3 to ŽĆ/2] (5 cos ╬Ė)┬▓ d╬Ė ] = Ōł½[0 to ŽĆ/3] (4 + 4 cos ╬Ė + cos┬▓╬Ė) d╬Ė + Ōł½[ŽĆ/3 to ŽĆ/2] 25 cos┬▓╬Ė d╬Ė. Compute to get (43ŽĆ/12 - ŌłÜ3)a┬▓ (if a = 1)", "source": "MiniMax ŌæĪ", "_id": "minimax_2_16", "judge_pick": false}, {"question": "For the polar curve r = f(╬Ė), how do you find points where the tangent is parallel to the initial line (horizontal)? How do you find points where it's perpendicular (vertical)? (2 steps)", "answer": "- Step 1: Treat the curve parametrically with ╬Ė as the parameter: x = r cos ╬Ė = f(╬Ė) cos ╬Ė, y = r sin ╬Ė = f(╬Ė) sin ╬Ė. Then dy/dx = (dy/d╬Ė) / (dx/d╬Ė). Tangents parallel to the initial line (╬Ė = 0, the horizontal axis) occur when dy/d╬Ė = 0 (but dx/d╬Ė ŌēĀ 0). Tangents perpendicular to the initial line occur when dx/d╬Ė = 0 (but dy/d╬Ė ŌēĀ 0).\n- Step 2: The key insight is that horizontal tangents (dy/d╬Ė = 0) mean the curve's vertical motion momentarily stops; vertical tangents (dx/d╬Ė = 0) mean horizontal motion stops. At points where both derivatives are zero, you may have a cusp or singular point", "source": "MiniMax ŌæĪ", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Find points on the cardioid r = a(1 + cos ╬Ė) where tangents are parallel to the initial line. (3 steps)", "answer": "- Step 1: Write y = r sin ╬Ė = a(1 + cos ╬Ė) sin ╬Ė = a(sin ╬Ė + sin ╬Ė cos ╬Ė). Differentiate: dy/d╬Ė = a(cos ╬Ė + cos┬▓╬Ė - sin┬▓╬Ė) = a(2cos┬▓╬Ė + cos ╬Ė - 1)\n- Step 2: Set dy/d╬Ė = 0: 2cos┬▓╬Ė + cos ╬Ė - 1 = 0. Solve: (2cos ╬Ė - 1)(cos ╬Ė + 1) = 0, so cos ╬Ė = 1/2 or cos ╬Ė = -1\n- Step 3: For cos ╬Ė = 1/2, ╬Ė = ┬▒ŽĆ/3, giving r = a(1 + 1/2) = 3a/2. For cos ╬Ė = -1, ╬Ė = ŽĆ, giving r = 0 (the cusp). So the points are (3a/2, ŽĆ/3), (3a/2, -ŽĆ/3), and (0, ŽĆ)", "source": "MiniMax ŌæĪ", "_id": "minimax_2_18", "judge_pick": false}, {"question": "For the curve r = a sin 2╬Ė in the first quadrant (0 Ōēż ╬Ė Ōēż ŽĆ/2), find where the tangents are parallel and perpendicular to the initial line. (4 steps)", "answer": "- Step 1: For parallel (horizontal): y = r sin ╬Ė = a sin 2╬Ė sin ╬Ė = a(2 sin ╬Ė cos ╬Ė) sin ╬Ė = 2a sin┬▓╬Ė cos ╬Ė. Then dy/d╬Ė = 2a(2 sin ╬Ė cos┬▓╬Ė - sin┬│╬Ė) = 2a sin ╬Ė(2 cos┬▓╬Ė - sin┬▓╬Ė) = 0\n- Step 2: Solutions: sin ╬Ė = 0 gives ╬Ė = 0, r = 0 (the pole). Or 2 cos┬▓╬Ė = sin┬▓╬Ė, so tan┬▓╬Ė = 2, giving tan ╬Ė = ŌłÜ2, so ╬Ė = arctan(ŌłÜ2) Ōēł 0.955 rad. Then r = a sin(2 ├Ś 0.955) = a sin(1.91) Ōēł 1.49a = (2aŌłÜ2)/3\n- Step 3: For perpendicular (vertical): x = r cos ╬Ė = a sin 2╬Ė cos ╬Ė = 2a sin┬▓╬Ė cos ╬Ė. Then dx/d╬Ė = 2a(2 sin ╬Ė cos┬▓╬Ė - sin┬│╬Ė) as above (same expression, interestingly!). Set dx/d╬Ė = 0: cos ╬Ė = 0 gives ╬Ė = ŽĆ/2 (r = 0), or tan┬▓╬Ė = 1/2, giving tan ╬Ė = 1/ŌłÜ2, so ╬Ė Ōēł 0.615 rad\n- Step 4: At ╬Ė Ōēł 0.615 rad, r = a sin(2 ├Ś 0.615) = a sin(1.23) Ōēł 0.943a = (2aŌłÜ2)/3. So horizontal tangent at (0.955, (2aŌłÜ2)/3); vertical tangents at (0.615, (2aŌłÜ2)/3) and at the pole"
