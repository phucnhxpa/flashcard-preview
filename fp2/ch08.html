, "source": "MiniMax ŌæĪ", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Prove that for the curve r = a(p + q cos ╬Ė), it's convex when p Ōēź 2q and has a dimple when p < 2q. (4 steps)", "answer": "- Step 1: Write x = r cos ╬Ė = a(p cos ╬Ė + q cos┬▓╬Ė). Differentiate: dx/d╬Ė = a(-p sin ╬Ė - 2q cos ╬Ė sin ╬Ė) = -a sin ╬Ė(p + 2q cos ╬Ė)\n- Step 2: Vertical tangents (perpendicular to initial line) occur when dx/d╬Ė = 0, giving sin ╬Ė = 0 (╬Ė = 0 or ŽĆ) or cos ╬Ė = -p/(2q)\n- Step 3: If p < 2q, then -p/(2q) > -1, so cos ╬Ė = -p/(2q) has two solutions in the 2nd and 3rd quadrants, giving two additional vertical tangents. This creates the \"dimple\"ŌĆöthe curve bends inward between these tangents.\n- Step 4: If p Ōēź 2q, then -p/(2q) Ōēż -1, so cos ╬Ė = -p/(2q) has no valid solutions. Only the tangents at ╬Ė = 0 and ╬Ė = ŽĆ exist, meaning the curve is convex (no inward bending). At p = 2q, the solution is exactly at ╬Ė = ŽĆ (the boundary case)", "source": "MiniMax ŌæĪ", "_id": "minimax_2_20", "judge_pick": true}, {"question": "The curve r = k╬Ė from ╬Ė = 0 to ╬Ė = 4ŽĆ models a shell cross-section. If the horizontal diameter is 3 cm, find k. Then find the total area enclosed. (4 steps)", "answer": "- Step 1: The horizontal diameter means the maximum horizontal extent. At ╬Ė = 2ŽĆ, r = k(2ŽĆ) = 2kŽĆ gives the rightmost point at x = 2kŽĆ. At ╬Ė = 3ŽĆ, r = 3kŽĆ gives the leftmost point at x = -3kŽĆ. WaitŌĆöthis is wrong. The spiral goes positive x, then crosses to negative x. Actually: at ╬Ė = ŽĆ, r = kŽĆ and x = -kŽĆ; at ╬Ė = 2ŽĆ, r = 2kŽĆ and x = 2kŽĆ. The total horizontal width = 2kŽĆ - (-kŽĆ) = 3kŽĆ = 3 cm, so k = 1/ŽĆ\n- Step 2: Verify: from ╬Ė = ŽĆ to 2ŽĆ, x goes from negative to positive, with extreme at ╬Ė where cos ╬Ė = -1 (╬Ė = ŽĆ gives x = -kŽĆ, ╬Ė = 2ŽĆ gives x = 2kŽĆ). The span is 2kŽĆ - (-kŽĆ) = 3kŽĆ = 3, so k = 1/ŽĆ cm/rad\n- Step 3: Total area = (1/2)Ōł½[0 to 4ŽĆ] r┬▓ d╬Ė = (1/2)Ōł½[0 to 4ŽĆ] k┬▓╬Ė┬▓ d╬Ė = (k┬▓/2)[╬Ė┬│/3] from 0 to 4ŽĆ = (k┬▓/2) ├Ś (64ŽĆ┬│/3) = (32k┬▓ŽĆ┬│)/3\n- Step 4: Substitute k = 1/ŽĆ: Area = (32 ├Ś ŽĆ┬▓ ├Ś ŽĆ)/(3ŽĆ┬▓) = 32/3 cm┬▓. WaitŌĆök┬▓ = 1/ŽĆ┬▓, so area = (32ŽĆ┬│)/(3ŽĆ┬▓) = 32ŽĆ/3 cm┬▓ Ōēł 33.5 cm┬▓", "source": "MiniMax ŌæĪ", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Why does the polar area formula A = (1/2)Ōł½ r┬▓ d╬Ė give the correct area, unlike Cartesian integration where you need to account for negative areas? (2 steps)", "answer": "- Step 1: In polar coordinates, the \"area element\" is a small sector with radius r and angle d╬Ė. Its area is (1/2)r┬▓ d╬ĖŌĆöthis is always positive regardless of whether r is positive or negative in a technical sense (we restrict to r Ōēź 0 when sketching). The sector sweeps out area monotonically as ╬Ė increases.\n- Step 2: In Cartesian integration y = f(x), the area under the curve can be negative when the curve is below the x-axis, requiring you to handle signs carefully. In polar, we're not computing \"signed area\" in the same wayŌĆöwe're summing sectors that always add positively as we sweep around the pole. However, when r goes negative (which polar plots handle by reflecting through the pole), you need to be careful and only integrate over regions where r Ōēź 0", "source": "MiniMax ŌæĪ", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Sketch r = a(1 - cos ╬Ė). How does this compare to r = a(1 + cos ╬Ė), and what's the maximum value of r? (3 steps)", "answer": "- Step 1: This is another cardioid, but shifted. Create a table: at ╬Ė = 0, r = a(1 - 1) = 0; at ╬Ė = ŽĆ/2, r = a(1 - 0) = a; at ╬Ė = ŽĆ, r = a(1 - (-1)) = 2a; at ╬Ė = 3ŽĆ/2, r = a; at ╬Ė = 2ŽĆ, r = 0.\n- Step 2: The curve is symmetric about the horizontal axis, but the cusp is now at ╬Ė = 0 (the rightmost point), and the \"belly\" extends to r = 2a at ╬Ė = ŽĆ (the leftmost point). Compared to r = a(1 + cos ╬Ė), which has its cusp at ╬Ė = ŽĆ and maximum at ╬Ė = 0, this one is flipped horizontally.\n- Step 3: The maximum r is 2a, occurring at ╬Ė = ŽĆ. This is where the cardioid is furthest from the pole", "source": "MiniMax ŌæĪ", "_id": "minimax_2_23", "judge_pick": false}, {"question": "For the curve r┬▓ = a┬▓ cos 2╬Ė (a lemniscate), determine the values of ╬Ė for which the curve exists, and explain why r┬▓ rather than r matters here. (3 steps)", "answer": "- Step 1: Since r┬▓ Ōēź 0, we need cos 2╬Ė Ōēź 0. This occurs when 2╬Ė is in [-ŽĆ/2, ŽĆ/2] or [3ŽĆ/2, 5ŽĆ/2] modulo 2ŽĆ, giving ╬Ė in [-ŽĆ/4, ŽĆ/4] and [3ŽĆ/4, 5ŽĆ/4] (mod ŽĆ).\n- Step 2: So the curve exists in four ranges: from -ŽĆ/4 to ŽĆ/4, and from 3ŽĆ/4 to 5ŽĆ/4 (which is -ŽĆ/4 to ŽĆ/4 shifted by ŽĆ). These produce two perpendicular loops (a figure-8 shape).\n- Step 3: Using r┬▓ means r can be positive or negative within these regions. The equation r = ┬▒aŌłÜ(cos 2╬Ė) gives both halves. Taking r┬▓ avoids having to piece together positive and negative branches; it automatically captures the full curve", "source": "MiniMax ŌæĪ", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Find the area of one loop of the lemniscate r┬▓ = a┬▓ cos 2╬Ė. (3 steps)", "answer": "- Step 1: One loop exists for ╬Ė from -ŽĆ/4 to ŽĆ/4 (where cos 2╬Ė Ōēź 0 and r is real). The area is A = (1/2)Ōł½[-ŽĆ/4 to ŽĆ/4] r┬▓ d╬Ė = (1/2)Ōł½[-ŽĆ/4 to ŽĆ/4] a┬▓ cos 2╬Ė d╬Ė\n- Step 2: A = (a┬▓/2)Ōł½[-ŽĆ/4 to ŽĆ/4] cos 2╬Ė d╬Ė = (a┬▓/2)[(sin 2╬Ė)/2] from -ŽĆ/4 to ŽĆ/4 = (a┬▓/4)[sin(ŽĆ/2) - sin(-ŽĆ/2)] = (a┬▓/4)[1 - (-1)] = (a┬▓/4)(2) = a┬▓/2\n- Step 3: So one loop has area a┬▓/2, and the complete lemniscate has total area a┬▓", "source": "MiniMax ŌæĪ", "_id": "minimax_2_25", "judge_pick": false}, {"question": "The curve r = a(1 + (1/2) sin ╬Ė) is given. Without computing the full integral, determine whether the enclosed area will be greater or less than that of r = a(1 + sin ╬Ė), and explain why. (2 steps)", "answer": "- Step 1: The area formula is A = (1/2)Ōł½[0 to 2ŽĆ] r┬▓ d╬Ė. Since we're integrating r┬▓, a larger average value of r gives a larger area.\n- Step 2: The term (1/2) sin ╬Ė has amplitude half that of sin ╬Ė. This reduces the variation in r throughout the cycle, making the curve more \"circle-like\" and closer to r = a. The original r = a(1 + sin ╬Ė) has r ranging from 0 to 2a; the new one ranges from a/2 to 3a/2. Since (3a/2)┬▓ averaged with (a/2)┬▓ is less than (2a)┬▓ averaged with 0┬▓ (due to the squaring), the area will be smaller", "source": "MiniMax ŌæĪ", "_id": "minimax_2_26", "judge_pick": true}, {"question": "When finding tangents to polar curves, what special consideration must you make at the pole (origin)? (2 steps)", "answer": "- Step 1: At the pole, r = 0. Here, both dx/d╬Ė and dy/d╬Ė may be zero simultaneously, leading to an indeterminate form for dy/dx. The curve passes through the pole, and the tangent direction there is given by the direction of the ray ╬Ė = constant.\n- Step 2: For example, for r = a sin 2╬Ė, at ╬Ė = 0 we have r = 0. The tangent is along ╬Ė = 0 (the initial line itself). More generally, when r = 0, the curve passes through the pole, and the tangent line makes an angle equal to the value of ╬Ė at that point", "source": "MiniMax ŌæĪ", "_id": "minimax_2_27", "judge_pick": false}], "count": 28}, "opus_1": {"label": "Opus 4.7 ŌæĀ", "cards": [{"question": "What information does the polar coordinate pair $$(r, \\theta)$$ carry, and how does it differ in spirit from Cartesian $$(x, y)$$? (3 steps)", "answer": "- Step 1: Polar coordinates give a point's location by two \"directional\" facts: $$r$$ is the distance from a fixed point $$O$$ called the **pole**, and $$\\theta$$ is the angle measured anticlockwise from a fixed reference ray called the **initial line** (usually the positive $$x$$-axis).\n- Step 2: Cartesian coordinates describe position as \"how far east, how far north\" ŌĆö a rectangular grid. Polar coordinates describe position as \"how far out, in what direction\" ŌĆö a radial grid.\n- Step 3: This matters because some curves are radially natural: circles about the origin, spirals, rotationally-symmetric shapes. Polar coordinates expose a symmetry that Cartesian coordinates hide.\n\nThe choice of coordinate system should follow the symmetry of the problem.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_0", "judge_pick": true}, {"question": "Starting from a right-angled triangle with hypotenuse of length $$r$$ meeting the positive $$x$$-axis at angle $$\\theta$$, derive the conversion formulas from polar to Cartesian. (3 steps)", "answer": "- Step 1: Drop a perpendicular from $$P$$ to the $$x$$-axis. This creates a right triangle with hypotenuse $$OP = r$$ and interior angle $$\\theta$$ at the origin.\n- Step 2: By the definition of cosine (adjacent/hypotenuse): $$\\cos\\theta = \\tfrac{x}{r}$$, so $$x = r\\cos\\theta$$. By the definition of sine (opposite/hypotenuse): $$\\sin\\theta = \\tfrac{y}{r}$$, so $$y = r\\sin\\theta$$.\n- Step 3: These formulas are not tricks ŌĆö they are just sine and cosine applied to a right triangle with the polar data labelled on it.\n\nThe conversion $$x=r\\cos\\theta$$, $$y=r\\sin\\theta$$ is just \"triangle trigonometry dressed up\".", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_1", "judge_pick": true}, {"question": "Derive the reverse formulas that recover $$r$$ and $$\\theta$$ from $$(x,y)$$. (2 steps)", "answer": "- Step 1: Square and add: $$x^2 + y^2 = r^2\\cos^2\\theta + r^2\\sin^2\\theta = r^2(\\cos^2\\theta + \\sin^2\\theta) = r^2$$. So $$r = \\sqrt{x^2 + y^2}$$.\n- Step 2: Divide: $$\\tfrac{y}{x} = \\tfrac{r\\sin\\theta}{r\\cos\\theta} = \\tan\\theta$$, giving $$\\theta = \\arctan(y/x)$$ ŌĆö but with an important caveat about quadrants.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_2", "judge_pick": false}, {"question": "Why is it dangerous to compute $$\\theta = \\arctan(y/x)$$ mechanically without thinking about the quadrant? (3 steps)", "answer": "- Step 1: The function $$\\arctan$$ has range $$(-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2})$$ ŌĆö it only gives answers in the right half-plane.\n- Step 2: But $$\\tan\\theta$$ is $$\\pi$$-periodic, so $$(x,y)$$ and $$(-x,-y)$$ give the same ratio $$y/x$$. For example, $$(1,1)$$ and $$(-1,-1)$$ both give $$\\arctan(1) = \\pi/4$$, but they sit in opposite quadrants.\n- Step 3: The remedy is to always draw a sketch and, if the point is in the second or third quadrant, add $$\\pi$$ (or subtract it) to the raw $$\\arctan$$ output. Think of $$\\arctan(y/x)$$ as giving the \"acute-angle direction\" that must then be corrected to the actual quadrant.\n\nAlways sketch first; never trust $$\\arctan$$ alone.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_3", "judge_pick": true}, {"question": "For the Cartesian point $$(-\\sqrt{3}, -1)$$, walk through the thought process to find polar coordinates, without mechanically plugging in. (4 steps)", "answer": "- Step 1: Find $$r$$: $$r = \\sqrt{3 + 1} = 2$$. Always positive ŌĆö it's a distance.\n- Step 2: Identify the quadrant: both coordinates negative means the third quadrant.\n- Step 3: Compute the reference (acute) angle using magnitudes only: $$\\alpha = \\arctan\\tfrac{1}{\\sqrt{3}} = \\tfrac{\\pi}{6}$$. This is the angle from the *nearest* portion of the $$x$$-axis.\n- Step 4: Convert to a true anticlockwise angle from the positive $$x$$-axis: in the third quadrant, $$\\theta = \\pi + \\alpha = \\tfrac{7\\pi}{6}$$. Equally valid would be $$-\\tfrac{5\\pi}{6}$$ (subtract $$2\\pi$$).\n\nSo the answer is $$\\left(2, \\tfrac{7\\pi}{6}\\right)$$ ŌĆö same distance, direction pointing into the third quadrant.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_4", "judge_pick": true}, {"question": "How many polar-coordinate pairs $$(r,\\theta)$$ represent the same point? How does this compare to Cartesian coordinates? (3 steps)", "answer": "- Step 1: In Cartesian, each point has exactly one pair $$(x,y)$$. In polar, every point has infinitely many representations because adding $$2\\pi$$ to $$\\theta$$ returns to the same direction.\n- Step 2: For instance $$(5, 0.927)$$ and $$(5, 0.927 + 2\\pi)$$ and $$(5, 0.927 - 2\\pi)$$ are all the same point.\n- Step 3: The pole $$(r=0)$$ is even more degenerate: $$(0, \\theta)$$ is the pole for *any* $$\\theta$$ because zero distance makes direction irrelevant.\n\nPolar representation is not unique ŌĆö when answering questions, be aware multiple valid answers exist.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_5", "judge_pick": false}, {"question": "What is a compact way to find the distance between two polar points $$(r_1,\\theta_1)$$ and $$(r_2,\\theta_2)$$ without converting to Cartesian? (3 steps)", "answer": "- Step 1: In the triangle $$OP_1P_2$$ the two sides from $$O$$ have lengths $$r_1$$ and $$r_2$$, and the included angle is $$\\theta_1 - \\theta_2$$ (the difference of the two polar angles).\n- Step 2: Apply the cosine rule: $$d^2 = r_1^2 + r_2^2 - 2r_1 r_2 \\cos(\\theta_1 - \\theta_2)$$.\n- Step 3: Taking the square root gives $$d = \\sqrt{r_1^2 + r_2^2 - 2r_1 r_2 \\cos(\\theta_1 - \\theta_2)}$$.\n\nThis is just the cosine rule in its most natural habitat ŌĆö the triangle polar coordinates hand you for free.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_6", "judge_pick": false}, {"question": "Explain the general strategy for converting a polar equation $$r = f(\\theta)$$ into a Cartesian equation. (3 steps)", "answer": "- Step 1: Your toolkit is: $$r\\cos\\theta = x$$, $$r\\sin\\theta = y$$, $$r^2 = x^2 + y^2$$.\n- Step 2: Manipulate the equation so these expressions appear. Useful tactics:\n+ Multiply both sides by $$r$$ (so $$r$$'s match up with $$r\\cos\\theta$$ or $$r\\sin\\theta$$).\n+ Use identities to rewrite $$\\cos(n\\theta)$$ or $$\\sin(n\\theta)$$ in terms of $$\\sin\\theta$$ and $$\\cos\\theta$$.\n- Step 3: Substitute and simplify. Accept that the Cartesian form is often messy ŌĆö polar curves are simple *because* they are written radially.\n\nThe \"multiply by $$r$$\" trick is the single most useful move in polar-to-Cartesian conversion.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_7", "judge_pick": false}, {"question": "Convert the polar equation $$r = 2a\\cos\\theta$$ to Cartesian form and identify the curve. (4 steps)", "answer": "- Step 1: Multiply both sides by $$r$$: $$r^2 = 2ar\\cos\\theta$$.\n- Step 2: Substitute $$r^2 = x^2 + y^2$$ and $$r\\cos\\theta = x$$: $$x^2 + y^2 = 2ax$$.\n- Step 3: Rearrange and complete the square: $$x^2 - 2ax + y^2 = 0 \\Rightarrow (x-a)^2 + y^2 = a^2$$.\n- Step 4: This is a circle of radius $$a$$ centred at $$(a, 0)$$ ŌĆö a circle passing through the origin, tangent to the $$y$$-axis at $$O$$.\n\nThe geometric picture: $$r = 2a\\cos\\theta$$ traces a circle because of chord geometry ŌĆö for any line through the origin at angle $$\\theta$$, the chord length is exactly $$2a\\cos\\theta$$ (Thales's theorem).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_8", "judge_pick": false}, {"question": "Convert $$r^2 = \\sin 2\\theta$$ to a Cartesian equation. (3 steps)", "answer": "- Step 1: Use the double-angle identity: $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$. So $$r^2 = 2\\sin\\theta\\cos\\theta$$.\n- Step 2: Multiply both sides by $$r^2$$ so we can make $$x$$'s and $$y$$'s appear: $$r^4 = 2(r\\sin\\theta)(r\\cos\\theta) = 2xy$$.\n- Step 3: Since $$r^2 = x^2 + y^2$$, we get $$(x^2+y^2)^2 = 2xy$$.\n\nMultiplying by $$r^2$$ (rather than just $$r$$) was needed because there are two trig factors to absorb ŌĆö one for each of $$x$$ and $$y$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_9", "judge_pick": false}, {"question": "Why does the polar equation of a shape that is simple in polar form (like a cardioid) often become complicated in Cartesian form? (3 steps)", "answer": "- Step 1: A cardioid's defining property is naturally rotational: $$r$$ varies sinusoidally with angle. Written as $$r = a(1+\\cos\\theta)$$ it is compact.\n- Step 2: To translate this to Cartesian you must express $$r$$ and $$\\cos\\theta$$ both in terms of $$x,y$$, which involves square roots and squaring, so the polynomial form becomes nonlinear.\n- Step 3: The deeper reason: Cartesian coordinates are aligned to a rectangular grid, which doesn't match the rotational symmetry of the cardioid. Each coordinate system has its comfort zone; asking for the \"Cartesian equation\" of a rotational object forces the grid to describe something it's badly suited for.\n\nEquations are simple when written in a system that respects the symmetry of the object.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_10", "judge_pick": true}, {"question": "Convert the Cartesian equation $$x^2 - y^2 = 5$$ into a polar equation. (3 steps)", "answer": "- Step 1: Substitute $$x = r\\cos\\theta$$ and $$y = r\\sin\\theta$$: $$r^2\\cos^2\\theta - r^2\\sin^2\\theta = 5$$.\n- Step 2: Factor out $$r^2$$: $$r^2(\\cos^2\\theta - \\sin^2\\theta) = 5$$.\n- Step 3: Recognise the double-angle identity $$\\cos 2\\theta = \\cos^2\\theta - \\sin^2\\theta$$: $$r^2\\cos 2\\theta = 5$$, or equivalently $$r^2 = 5\\sec 2\\theta$$.\n\nPattern: wherever you see $$\\cos^2\\theta - \\sin^2\\theta$$ or $$2\\sin\\theta\\cos\\theta$$, look for double-angle identities to compactify.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_11", "judge_pick": false}, {"question": "Convert the line $$y\\sqrt{3} = x + 4$$ into polar form. (4 steps)", "answer": "- Step 1: Substitute $$x = r\\cos\\theta, y = r\\sin\\theta$$: $$r\\sqrt{3}\\sin\\theta = r\\cos\\theta + 4$$.\n- Step 2: Collect $$r$$ terms: $$r(\\sqrt{3}\\sin\\theta - \\cos\\theta) = 4$$.\n- Step 3: Recognize $$\\sqrt{3}\\sin\\theta - \\cos\\theta$$ as $$2\\left(\\tfrac{\\sqrt{3}}{2}\\sin\\theta - \\tfrac{1}{2}\\cos\\theta\\right) = 2\\sin\\left(\\theta - \\tfrac{\\pi}{6}\\right)$$ using $$\\sin(A-B) = \\sin A\\cos B - \\cos A\\sin B$$.\n- Step 4: This gives $$2r\\sin\\left(\\theta - \\tfrac{\\pi}{6}\\right) = 4$$, i.e. $$r = 2\\csc\\left(\\theta - \\tfrac{\\pi}{6}\\right)$$.\n\nGeneral trick for a line's polar form: combine $$\\sin\\theta$$ and $$\\cos\\theta$$ terms into a single shifted sine/cosine ŌĆö it encodes the perpendicular distance and direction from $$O$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_12", "judge_pick": false}, {"question": "What curve does the polar equation $$r = a$$ represent, and why is this the natural shape? (2 steps)", "answer": "- Step 1: $$r = a$$ means \"the distance from the origin is always $$a$$\", which is the definition of a circle centred at the origin with radius $$a$$.\n- Step 2: In Cartesian this becomes $$r^2 = a^2 \\Rightarrow x^2 + y^2 = a^2$$. The polar form is minimal because circles centred at the pole are defined purely by a radial condition ŌĆö no angular information is needed.\n\nA circle centred at the pole is the \"simplest\" polar curve because it uses only the radial coordinate.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_13", "judge_pick": false}, {"question": "What does $$\\theta = \\alpha$$ represent, and why is it only a half-line, not a full line? (3 steps)", "answer": "- Step 1: $$\\theta = \\alpha$$ says the direction from the origin is fixed at angle $$\\alpha$$, while $$r$$ is free to take any non-negative value.\n- Step 2: Because we conventionally require $$r \\geq 0$$, only the points in the direction $$\\alpha$$ are included ŌĆö the ray starting at $$O$$ going outward.\n- Step 3: The opposite half of the line lies in direction $$\\alpha + \\pi$$, which is a *different* polar equation. To get the full line, you would write $$\\theta = \\alpha$$ AND $$\\theta = \\alpha + \\pi$$ together.\n\nHalf-line vs full line is the price of the convention $$r \\geq 0$$ ŌĆö the geometry remembers direction.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_14", "judge_pick": true}, {"question": "Describe the shape of the Archimedean spiral $$r = a\\theta$$ and its key features as $$\\theta$$ varies. (4 steps)", "answer": "- Step 1: As $$\\theta$$ increases from $$0$$, $$r$$ increases linearly, so the curve spirals outward from the pole ŌĆö this is the **Archimedean spiral**.\n- Step 2: For every full turn ($$\\theta$$ increases by $$2\\pi$$), $$r$$ increases by $$2\\pi a$$. So successive arms are *equally spaced* radially ŌĆö unlike a logarithmic spiral which grows geometrically.\n- Step 3: At $$\\theta = 0$$: curve at pole. At $$\\theta = \\pi/2$$: height $$a\\pi/2$$ on $$y$$-axis. At $$\\theta = \\pi$$: on negative $$x$$-axis at $$-a\\pi$$. At $$\\theta = 2\\pi$$: back on positive $$x$$-axis at $$2a\\pi$$.\n- Step 4: Over $$\\theta \\in [0, 2\\pi]$$, the spiral makes one full outward turn.\n\nConstant radial spacing between turns is the hallmark of $$r$$ being linear in $$\\theta$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_15", "judge_pick": false}, {"question": "For the cardioid $$r = a(1 + \\cos\\theta)$$, describe how $$r$$ varies as $$\\theta$$ goes from $$0$$ to $$2\\pi$$ and why this gives a heart shape. (4 steps)", "answer": "- Step 1: At $$\\theta = 0$$: $$r = 2a$$ (furthest point, on positive $$x$$-axis).\n- Step 2: At $$\\theta = \\pi/2$$: $$r = a$$ (at top).\n- Step 3: At $$\\theta = \\pi$$: $$r = 0$$ ŌĆö the curve touches the pole, creating the cusp of the heart.\n- Step 4: At $$3\\pi/2$$ and $$2\\pi$$, $$r$$ grows back through $$a$$ to $$2a$$, symmetric to the upper half (since $$\\cos\\theta = \\cos(-\\theta)$$).\n\nThe curve has one \"dip\" where it touches the pole, giving the characteristic cusp. Symmetry about the $$x$$-axis comes from $$\\cos$$ being an even function.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_16", "judge_pick": false}, {"question": "For a polar curve of the form $$r = a\\sin(n\\theta)$$ with integer $$n$$, how many loops (\"petals\") does it have, and why does the answer differ for odd and even $$n$$? (4 steps)", "answer": "- Step 1: Each time $$\\sin(n\\theta)$$ goes from $$0$$ up to $$1$$ and back to $$0$$, the curve traces a petal. This happens over a $$\\theta$$-interval of length $$\\pi/n$$.\n- Step 2: In the next interval, $$\\sin(n\\theta)$$ goes negative, which we *exclude* because we require $$r \\geq 0$$. So petals alternate with \"off\" intervals.\n- Step 3: If $$n$$ is odd: going $$\\theta$$ from $$0$$ to $$2\\pi$$, the positive half-cycles cover every angular direction exactly once, giving $$n$$ distinct petals.\n- Step 4: If $$n$$ is even: the \"negative half-cycles\" fall into directions not yet covered, so they trace new petals ŌĆö giving $$2n$$ petals.\n\nRule of thumb: $$r = \\sin(n\\theta)$$ or $$\\cos(n\\theta)$$ gives $$n$$ petals if $$n$$ odd, $$2n$$ petals if $$n$$ even.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_17", "judge_pick": true}, {"question": "For $$r = a\\sin 3\\theta$$, identify the three ranges of $$\\theta$$ that give the three petals. (3 steps)", "answer": "- Step 1: We need $$r \\geq 0$$, i.e. $$\\sin 3\\theta \\geq 0$$.\n- Step 2: $$\\sin 3\\theta \\geq 0$$ when $$3\\theta \\in [0,\\pi] \\cup [2\\pi, 3\\pi] \\cup [4\\pi, 5\\pi]$$, giving $$\\theta \\in [0, \\tfrac{\\pi}{3}] \\cup [\\tfrac{2\\pi}{3}, \\pi] \\cup [\\tfrac{4\\pi}{3}, \\tfrac{5\\pi}{3}]$$.\n- Step 3: On each interval, the curve traces one petal. The three petals are symmetrically arranged about the pole, separated by $$\\tfrac{2\\pi}{3}$$.\n\nThe forbidden intervals (where $$r$$ would be negative) are exactly the \"gaps\" between the petals.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_18", "judge_pick": false}, {"question": "For the lima├¦on family $$r = a(p + q\\cos\\theta)$$ with $$p, q > 0$$ and $$p \\geq q$$, how do you classify the resulting shape into three visual types? (4 steps)", "answer": "- Step 1: The curve is defined for all $$\\theta$$ because $$p + q\\cos\\theta \\geq p - q \\geq 0$$. It's a closed loop.\n- Step 2: If $$p = q$$: curve touches the pole when $$\\theta = \\pi$$ (since $$r = 0$$ there), producing a **cardioid** with cusp.\n- Step 3: If $$q < p < 2q$$: curve is **dimpled** ŌĆö concave near $$\\theta = \\pi$$, looking like a lopsided egg with a dent.\n- Step 4: If $$p \\geq 2q$$: curve is **convex** (egg-shaped, no dimple). As $$p \\gg q$$, shape approaches a circle of radius $$p$$.\n\nThe ratio $$p/q$$ controls how pronounced the asymmetry between \"close\" and \"far\" sides is: $$=1$$ cusp, between $$1$$ and $$2$$ dimple, $$\\geq 2$$ smooth egg.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_19", "judge_pick": false}, {"question": "Prove that the lima├¦on $$r = p + q\\cos\\theta$$ (with $$p,q>0$$) is convex for $$p \\geq 2q$$ and has a dimple for $$p < 2q$$, using tangents perpendicular to the initial line. (5 steps)", "answer": "- Step 1: Write $$x = r\\cos\\theta = p\\cos\\theta + q\\cos^2\\theta$$. A vertical tangent occurs where $$\\tfrac{dx}{d\\theta} = 0$$.\n- Step 2: Differentiate: $$\\tfrac{dx}{d\\theta} = -p\\sin\\theta - 2q\\cos\\theta\\sin\\theta = -\\sin\\theta(p + 2q\\cos\\theta)$$.\n- Step 3: Setting this to zero: either $$\\sin\\theta = 0$$ (giving $$\\theta = 0, \\pi$$), or $$\\cos\\theta = -\\tfrac{p}{2q}$$.\n- Step 4: The equation $$\\cos\\theta = -\\tfrac{p}{2q}$$ has solutions only if $$\\tfrac{p}{2q} \\leq 1$$, i.e. $$p \\leq 2q$$.\n- Step 5: A convex closed curve has exactly two vertical tangents. If $$p > 2q$$: only $$\\theta = 0, \\pi$$ work ŌĆö 2 tangents, convex. If $$p < 2q$$: two additional symmetric solutions arise in the left half-plane ŌĆö 4 tangents, so the curve wraps back on itself creating a dimple. The boundary $$p = 2q$$ is \"just smooth\".\n\nExtra vertical tangents are the geometric fingerprint of a dimple.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_20", "judge_pick": false}, {"question": "For the curve $$r^2 = a^2 \\cos 2\\theta$$ (a lemniscate), what determines the range of $$\\theta$$ for which the curve exists? (3 steps)", "answer": "- Step 1: We need $$r^2 \\geq 0$$, i.e. $$\\cos 2\\theta \\geq 0$$.\n- Step 2: $$\\cos 2\\theta \\geq 0$$ when $$2\\theta \\in [-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}] \\cup [\\tfrac{3\\pi}{2}, \\tfrac{5\\pi}{2}]$$, i.e. $$\\theta \\in [-\\tfrac{\\pi}{4}, \\tfrac{\\pi}{4}] \\cup [\\tfrac{3\\pi}{4}, \\tfrac{5\\pi}{4}]$$.\n- Step 3: On each interval, $$r$$ grows from $$0$$ (at the edges) to $$a$$ (in the middle) and back to $$0$$ ŌĆö forming a single petal. Two petals sit symmetrically along the $$x$$-axis, making the classic figure-of-eight (lemniscate).\n\nThe condition $$r^2 \\geq 0$$ is a genuine constraint when you have $$r^2 = \\ldots$$ equations; it carves out where the curve actually lives.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_21", "judge_pick": true}, {"question": "A point $$z$$ in the complex plane has polar form $$re^{i\\theta}$$. What is the polar curve corresponding to the locus $$|z - 3 - 4i| = 5$$, and why? (4 steps)", "answer": "- Step 1: $$|z - 3 - 4i| = 5$$ is a circle in the Argand diagram: centre $$3 + 4i$$, radius $$5$$. In Cartesian, $$(x-3)^2 + (y-4)^2 = 25$$.\n- Step 2: Expand: $$x^2 - 6x + 9 + y^2 - 8y + 16 = 25$$, so $$x^2 + y^2 = 6x + 8y$$.\n- Step 3: Substitute $$x^2 + y^2 = r^2$$, $$x = r\\cos\\theta$$, $$y = r\\sin\\theta$$: $$r^2 = 6r\\cos\\theta + 8r\\sin\\theta$$.\n- Step 4: Divide by $$r$$ (valid except at the pole, which lies on the circle anyway): $$r = 6\\cos\\theta + 8\\sin\\theta$$.\n\nAny circle through the origin has polar equation of form $$r = A\\cos\\theta + B\\sin\\theta$$, where $$(A/2, B/2)$$ is the centre ŌĆö worth memorising.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_22", "judge_pick": false}, {"question": "Derive the formula for the area of a region swept out by a polar curve from $$\\theta = \\alpha$$ to $$\\theta = \\beta$$. (4 steps)", "answer": "- Step 1: Imagine slicing the region into tiny angular wedges at angle $$\\theta$$ and thickness $$d\\theta$$. Each wedge is approximately a circular sector of radius $$r(\\theta)$$.\n- Step 2: The area of a circular sector with radius $$R$$ and angle $$d\\theta$$ (in radians) is $$\\tfrac{1}{2}R^2\\, d\\theta$$. This comes from taking a fraction of the disc area: $$\\tfrac{d\\theta}{2\\pi}\\cdot \\pi R^2 = \\tfrac{1}{2}R^2\\,d\\theta$$.\n- Step 3: Substitute $$R = r(\\theta)$$ and add up (integrate) all the wedges: $$\\text{Area} = \\tfrac{1}{2}\\int_\\alpha^\\beta r^2\\, d\\theta$$.\n- Step 4: The $$r^2$$ and the $$\\tfrac{1}{2}$$ are both geometric consequences of the sector formula ŌĆö neither is an arbitrary constant.\n\nThe polar area formula is just \"sum of sector areas\" in the limit.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_23", "judge_pick": true}, {"question": "Why does the polar area integral $$\\tfrac{1}{2}\\int r^2 d\\theta$$ always give a positive area, unlike Cartesian $$\\int y\\, dx$$ which can give \"signed\" areas? (3 steps)", "answer": "- Step 1: The integrand is $$r^2$$, which is always non-negative. Contrast with $$\\int y\\, dx$$ where $$y$$ can be negative, causing regions below the $$x$$-axis to contribute negative area.\n- Step 2: Geometrically, each wedge has positive area regardless of which quadrant $$\\theta$$ lies in ŌĆö it's a sector, and sectors have positive area.\n- Step 3: You don't need to worry about subtracting areas for different quadrants. But beware: if the curve retraces itself (e.g., multi-loop curves), the integral may double-count ŌĆö so choose limits carefully.\n\nPolar trades \"sign bookkeeping\" for \"limit bookkeeping\".", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_24", "judge_pick": true}, {"question": "When finding the area of *one* petal of $$r = a\\sin(n\\theta)$$, why can't you simply compute $$\\tfrac{1}{2}\\int_0^{2\\pi} r^2 d\\theta$$ and divide by the number of petals? (4 steps)", "answer": "- Step 1: Under Edexcel convention, when $$\\sin(n\\theta) < 0$$, the formal value of $$r$$ is negative ŌĆö we exclude those intervals, so no curve exists there.\n- Step 2: However, $$r^2 = a^2\\sin^2(n\\theta)$$ is always non-negative in the integrand, so the integral $$\\tfrac{1}{2}\\int_0^{2\\pi} r^2 d\\theta$$ naively counts the \"would-be negative-$$r$$\" regions as if they had real area.\n- Step 3: These extra phantom regions aren't actual petals ŌĆö so dividing by the petal count doesn't give the right per-petal area.\n- Step 4: The correct method: identify the $$\\theta$$-interval where $$r \\geq 0$$ for one specific petal (e.g., $$[0, \\pi/n]$$ for $$r = \\sin n\\theta$$), and integrate only there.\n\nMoral: the limits of integration must match the $$\\theta$$-range over which the actual curve exists.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_25", "judge_pick": false}, {"question": "Derive conceptually the area of one petal of $$r = a\\sin 4\\theta$$, explaining each step. (5 steps)", "answer": "- Step 1: Identify the $$\\theta$$-range for one petal. $$r = a\\sin 4\\theta \\geq 0$$ when $$4\\theta \\in [0,\\pi]$$, i.e. $$\\theta \\in [0, \\pi/4]$$.\n- Step 2: Area $$= \\tfrac{1}{2}\\int_0^{\\pi/4} a^2 \\sin^2 4\\theta\\, d\\theta$$.\n- Step 3: Use the identity $$\\sin^2 u = \\tfrac{1 - \\cos 2u}{2}$$, so $$\\sin^2 4\\theta = \\tfrac{1 - \\cos 8\\theta}{2}$$.\n- Step 4: The integral becomes $$\\tfrac{a^2}{4}\\int_0^{\\pi/4}(1 - \\cos 8\\theta)d\\theta = \\tfrac{a^2}{4}\\left[\\theta - \\tfrac{\\sin 8\\theta}{8}\\right]_0^{\\pi/4}$$.\n- Step 5: Evaluate: at $$\\theta = \\pi/4$$, $$\\sin(2\\pi) = 0$$, giving $$\\tfrac{\\pi}{4}$$; minus $$0$$ at $$\\theta=0$$. So area $$= \\tfrac{a^2\\pi}{16}$$.\n\nThis is *not* equal to $$\\tfrac{1}{8}$$ of the total integrated \"area\" ŌĆö confirming naive division fails.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_26", "judge_pick": true}, {"question": "Two polar curves $$r = 2 + \\cos\\theta$$ and $$r = 5\\cos\\theta$$ cross each other. Conceptually, how do you find the region that lies inside both? (5 steps)", "answer": "- Step 1: Find intersection angles by setting the two $$r$$'s equal: $$2 + \\cos\\theta = 5\\cos\\theta \\Rightarrow \\cos\\theta = \\tfrac{1}{2} \\Rightarrow \\theta = \\pm\\tfrac{\\pi}{3}$$.\n- Step 2: Sketch both curves. The region inside *both* is bounded by whichever curve is closer to the origin at each angle.\n- Step 3: For $$|\\theta| < \\pi/3$$: $$5\\cos\\theta > 2 + \\cos\\theta$$, so the lima├¦on $$r = 2+\\cos\\theta$$ is *closer* to the origin ŌĆö it bounds the common region here.\n- Step 4: For $$\\pi/3 < \\theta < \\pi/2$$: the circle $$r = 5\\cos\\theta$$ is closer and bounds the common region.\n- Step 5: Use symmetry about the $$x$$-axis (multiply by 2): $$\\text{Area} = 2\\left[\\tfrac{1}{2}\\int_0^{\\pi/3}(2+\\cos\\theta)^2 d\\theta + \\tfrac{1}{2}\\int_{\\pi/3}^{\\pi/2}(5\\cos\\theta)^2 d\\theta\\right]$$.\n\nThe guiding principle: at each angle, the common region is bounded by the curve with the *smaller* $$r$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why is the formula $$\\tfrac{1}{2}\\int_\\alpha^\\beta r^2 d\\theta$$ NOT the right tool for finding the area *between* two polar curves? How do you adapt it? (3 steps)", "answer": "- Step 1: The formula gives the area of a sector between the pole and the curve ŌĆö it's always \"pole-to-curve\" area, not \"curve-to-curve\" area.\n- Step 2: To find the area between an outer curve $$r_1(\\theta)$$ and inner curve $$r_2(\\theta)$$ from $$\\alpha$$ to $$\\beta$$, compute the *difference* of sector areas: $$\\text{Area} = \\tfrac{1}{2}\\int_\\alpha^\\beta (r_1^2 - r_2^2)\\, d\\theta$$.\n- Step 3: This works because both sectors share the same angular limits ŌĆö you're effectively subtracting the smaller \"inner\" pie slice from the larger \"outer\" pie slice.\n\nThink of it as \"outer sector minus inner sector\", not \"top function minus bottom function\".", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_28", "judge_pick": true}, {"question": "How do you convert a polar curve $$r = f(\\theta)$$ into a parametric curve in Cartesian form, and why is this useful? (3 steps)", "answer": "- Step 1: Using $$x = r\\cos\\theta$$ and $$y = r\\sin\\theta$$, substitute $$r = f(\\theta)$$ to get $$x(\\theta) = f(\\theta)\\cos\\theta$$ and $$y(\\theta) = f(\\theta)\\sin\\theta$$. Now $$\\theta$$ plays the role of a parameter.\n- Step 2: This allows you to use all your parametric calculus machinery ŌĆö chain rule, derivatives, arc length ŌĆö on the polar curve.\n- Step 3: In particular, the gradient of the tangent to the curve is $$\\tfrac{dy}{dx} = \\tfrac{dy/d\\theta}{dx/d\\theta}$$, a formula that would be awkward to get directly from $$r = f(\\theta)$$.\n\nPolar curves aren't separate beasts ŌĆö they're parametric curves in disguise.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_29", "judge_pick": false}, {"question": "Why is a tangent parallel to the initial line characterised by $$\\tfrac{dy}{d\\theta} = 0$$, and a tangent perpendicular to the initial line by $$\\tfrac{dx}{d\\theta} = 0$$? (4 steps)", "answer": "- Step 1: A tangent line's direction is captured by $$\\tfrac{dy}{dx} = \\tfrac{dy/d\\theta}{dx/d\\theta}$$.\n- Step 2: A tangent parallel to the initial line (horizontal) has $$\\tfrac{dy}{dx} = 0$$, which happens when $$\\tfrac{dy}{d\\theta} = 0$$ (with $$\\tfrac{dx}{d\\theta} \\neq 0$$ to keep the ratio well-defined).\n- Step 3: A tangent perpendicular to the initial line (vertical) has $$\\tfrac{dy}{dx} = \\infty$$, which happens when $$\\tfrac{dx}{d\\theta} = 0$$ (with $$\\tfrac{dy}{d\\theta} \\neq 0$$).\n- Step 4: Cases where both are zero simultaneously are singular points (e.g., cusps) and need special treatment.\n\nHorizontal tangent Ōåö $$y$$ momentarily stationary in $$\\theta$$; vertical tangent Ōåö $$x$$ momentarily stationary in $$\\theta$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_30", "judge_pick": true}, {"question": "Find the points on the cardioid $$r = a(1+\\cos\\theta)$$ where the tangent is parallel to the initial line. Work through the derivation. (5 steps)", "answer": "- Step 1: Compute $$y = r\\sin\\theta = a(1+\\cos\\theta)\\sin\\theta = a(\\sin\\theta + \\sin\\theta\\cos\\theta)$$.\n- Step 2: Differentiate using product rule: $$\\tfrac{dy}{d\\theta} = a(\\cos\\theta + \\cos^2\\theta - \\sin^2\\theta) = a(2\\cos^2\\theta + \\cos\\theta - 1)$$ using $$\\sin^2\\theta = 1-\\cos^2\\theta$$.\n- Step 3: Set to zero: $$2\\cos^2\\theta + \\cos\\theta - 1 = 0$$. Factor as $$(2\\cos\\theta - 1)(\\cos\\theta + 1) = 0$$.\n- Step 4: Either $$\\cos\\theta = \\tfrac{1}{2}$$ giving $$\\theta = \\pm\\tfrac{\\pi}{3}$$ with $$r = \\tfrac{3a}{2}$$; or $$\\cos\\theta = -1$$ giving $$\\theta = \\pi$$ with $$r = 0$$ (the cusp/pole).\n- Step 5: The two genuine horizontal tangent points are $$\\left(\\tfrac{3a}{2}, \\pm\\tfrac{\\pi}{3}\\right)$$; at $$(0, \\pi)$$ we have a singular cusp.\n\nThe topmost/bottommost points of the cardioid are at $$\\theta = \\pm\\pi/3$$, not at $$\\theta = \\pm\\pi/2$$ as one might naively guess.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_31", "judge_pick": true}, {"question": "For the curve $$r = a\\sin 2\\theta$$ on $$0 \\leq \\theta \\leq \\pi/2$$, outline how to find tangents perpendicular to the initial line. (5 steps)", "answer": "- Step 1: Form $$x = r\\cos\\theta = a\\sin 2\\theta\\cos\\theta$$.\n- Step 2: Differentiate (product rule): $$\\tfrac{dx}{d\\theta} = 2a\\cos 2\\theta\\cos\\theta - a\\sin 2\\theta\\sin\\theta$$.\n- Step 3: Expand using $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$ and $$\\cos 2\\theta = \\cos^2\\theta - \\sin^2\\theta$$: factor to get $$2a\\cos\\theta(\\cos^2\\theta - 2\\sin^2\\theta)$$.\n- Step 4: Set equal to zero. Either:\n+ $$\\cos\\theta = 0 \\Rightarrow \\theta = \\pi/2$$ (pole limit, $$y$$-axis as tangent), or\n+ $$\\tan^2\\theta = 1/2 \\Rightarrow \\tan\\theta = 1/\\sqrt{2}$$, so $$\\theta \\approx 0.615$$.\n- Step 5: Use the triangle ($$\\sin\\alpha = 1/\\sqrt{3}, \\cos\\alpha = \\sqrt{2}/\\sqrt{3}$$) to back-compute $$r$$ at this $$\\theta$$. The vertical tangent touches the curve at $$r = \\tfrac{2a\\sqrt{2}}{3}$$.\n\nThe standard structure: form $$x(\\theta)$$ or $$y(\\theta)$$, differentiate, set to zero, solve, back-substitute for $$r$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_32", "judge_pick": false}, {"question": "Given the point of tangency $$\\left(\\tfrac{2a\\sqrt{2}}{3}, 0.955\\right)$$ at which the tangent to $$r = a\\sin 2\\theta$$ is horizontal, derive the equation of this tangent line in polar form. (3 steps)", "answer": "- Step 1: A horizontal tangent has equation $$y = y_0$$ where $$y_0$$ is the $$y$$-coordinate of the tangency point. Compute $$y_0 = r\\sin\\theta$$.\n- Step 2: Using $$\\sin(0.955) = \\sqrt{2}/\\sqrt{3}$$: $$y_0 = \\tfrac{2a\\sqrt{2}}{3}\\cdot\\tfrac{\\sqrt{2}}{\\sqrt{3}} = \\tfrac{4a}{3\\sqrt{3}}$$.\n- Step 3: Convert $$y = y_0$$ to polar: $$r\\sin\\theta = y_0$$, so $$r = y_0\\csc\\theta = \\tfrac{4a}{3\\sqrt{3}}\\csc\\theta$$.\n\nGeneral: horizontal line $$y=c$$ Ōåö $$r = c\\csc\\theta$$; vertical line $$x=c$$ Ōåö $$r = c\\sec\\theta$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_33", "judge_pick": false}, {"question": "Conceptually, why does a cardioid have exactly three points where the tangent is horizontal (counting the cusp at the pole)? (4 steps)", "answer": "- Step 1: The cardioid is a smooth closed curve except at one cusp (at the pole, where $$\\theta = \\pi$$).\n- Step 2: A smooth *convex* closed curve has exactly two horizontal tangents (topmost and bottommost), but the cardioid is *not* convex ŌĆö it has a dimple/cusp.\n- Step 3: The cusp \"bends\" the curve extra, creating two symmetric bulges on top and bottom, each with its own horizontal tangent (at $$\\theta = \\pm\\pi/3$$).\n- Step 4: Plus the cusp at $$\\theta = \\pi$$ itself, where the curve's tangent direction jumps ŌĆö a singular \"tangent\" point.\n\nSo: 2 genuine horizontal tangents + 1 singular cusp = 3 points.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_34", "judge_pick": true}, {"question": "Explain intuitively what \"tangent to a polar curve\" means, without writing any formulas. (3 steps)", "answer": "- Step 1: Imagine travelling along the curve as $$\\theta$$ increases. At each instant you have a velocity vector pointing in some direction ŌĆö this is the tangent direction.\n- Step 2: The tangent line at a point is the line that best approximates the curve near that point, just as in Cartesian calculus. It captures the instantaneous direction of motion.\n- Step 3: \"Parallel to the initial line\" means velocity is purely horizontal at that instant (no up/down motion), so $$y$$ is momentarily at a peak or trough. \"Perpendicular to the initial line\" means velocity is purely vertical, so $$x$$ is at its extreme.\n\nTangent directions are snapshots of motion; stationary components of motion correspond to tangents along or across the axes.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_35", "judge_pick": true}, {"question": "State the key trig identities needed to integrate $$\\sin^2\\theta$$ or $$\\cos^2\\theta$$, and explain why they are essential in polar area problems. (2 steps)", "answer": "- Step 1: The identities are $$\\sin^2\\theta = \\tfrac{1-\\cos 2\\theta}{2}$$ and $$\\cos^2\\theta = \\tfrac{1+\\cos 2\\theta}{2}$$, derived from $$\\cos 2\\theta = 1 - 2\\sin^2\\theta = 2\\cos^2\\theta - 1$$.\n- Step 2: In polar area problems, you square the polar equation to get $$r^2$$, which often introduces $$\\sin^2$$ or $$\\cos^2$$. These identities convert squared trig functions into simple cosines which integrate directly (since $$\\int \\cos 2\\theta\\, d\\theta = \\tfrac{\\sin 2\\theta}{2}$$).\n\nEvery polar area involving $$\\cos\\theta$$ or $$\\sin\\theta$$ terms will sooner or later require these identities.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_36", "judge_pick": false}, {"question": "Compare the three cases of $$r = a(p + q\\cos\\theta)$$ with $$p,q>0$$: what happens for $$p = q$$, $$q < p < 2q$$, and $$p \\geq 2q$$? (4 steps)", "answer": "- Step 1: $$p = q$$ gives a **cardioid**: $$r = q(1 + \\cos\\theta)$$. Curve touches the pole at $$\\theta = \\pi$$, creating a sharp cusp ŌĆö heart-shaped.\n- Step 2: $$q < p < 2q$$ gives a **dimpled lima├¦on**: concave near $$\\theta = \\pi$$ but doesn't reach the pole. Looks like a squashed egg with a dent on the back.\n- Step 3: $$p = 2q$$ is the critical boundary: curve still smooth everywhere, just barely ŌĆö incrementally increasing $$p$$ removes the dimple.\n- Step 4: $$p > 2q$$ gives a **convex lima├¦on**: no dimple, egg-shaped. As $$p \\gg q$$, approaches a circle of radius $$p$$.\n\nThe parameter $$p/q$$ controls how dominant the constant term is versus the oscillation term.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_37", "judge_pick": true}, {"question": "Explain why a circle passing through the origin has polar equation of the form $$r = A\\cos\\theta + B\\sin\\theta$$, and what $$A, B$$ encode geometrically. (4 steps)", "answer": "- Step 1: A general circle through the origin has Cartesian equation $$x^2 + y^2 = Ax + By$$ (complete the square to confirm: centre $$(A/2, B/2)$$, radius $$\\tfrac{1}{2}\\sqrt{A^2+B^2}$$).\n- Step 2: Substitute polar: $$r^2 = Ar\\cos\\theta + Br\\sin\\theta$$.\n- Step 3: Divide by $$r$$: $$r = A\\cos\\theta + B\\sin\\theta$$. (Division by $$r$$ is fine because $$r=0$$ corresponds to the origin, which lies on the circle.)\n- Step 4: So $$(A/2, B/2)$$ is the centre and the radius is $$\\tfrac{1}{2}\\sqrt{A^2 + B^2}$$. The polar form is extraordinarily compact.\n\nMemorise: $$r = A\\cos\\theta + B\\sin\\theta$$ Ōåö circle through origin, centre $$(A/2, B/2)$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_38", "judge_pick": false}, {"question": "Conceptually, why is the polar formula for area $$\\tfrac{1}{2}\\int r^2 d\\theta$$ exactly *half* of what someone might naively write ($$\\int r^2 d\\theta$$)? (3 steps)", "answer": "- Step 1: Consider a tiny wedge at angle $$\\theta$$, spanning angular width $$d\\theta$$, bounded radially by $$r(\\theta)$$. This is approximately a circular sector.\n- Step 2: The area of a circular sector with radius $$R$$ and angle $$d\\theta$$ is $$\\tfrac{1}{2}R^2\\,d\\theta$$ ŌĆö derived from the full disc: angle $$2\\pi$$ gives $$\\pi R^2$$, so fraction $$\\tfrac{d\\theta}{2\\pi}$$ gives $$\\tfrac{1}{2}R^2\\,d\\theta$$.\n- Step 3: Summing (integrating) all wedges: $$\\text{Area} = \\tfrac{1}{2}\\int r(\\theta)^2 d\\theta$$. The factor $$\\tfrac{1}{2}$$ is the geometric fingerprint of the sector formula, not arbitrary.\n\n\"Why the $$\\tfrac{1}{2}$$?\" ŌĆö because half of $$R^2 d\\theta$$ is a sector area.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_39", "judge_pick": false}, {"question": "Sanity check: for $$r = 2a$$ (constant), the polar area formula should give the area of a disc. Verify. (3 steps)", "answer": "- Step 1: For $$r = 2a$$ constant, sweeping through $$\\theta \\in [0, 2\\pi]$$: $$\\text{Area} = \\tfrac{1}{2}\\int_0^{2\\pi}(2a)^2 d\\theta = \\tfrac{1}{2}\\cdot 4a^2\\cdot 2\\pi = 4\\pi a^2$$.\n- Step 2: The disc of radius $$2a$$ has area $$\\pi(2a)^2 = 4\\pi a^2$$.\n- Step 3: They match ŌĆö the polar area formula correctly reproduces the classical disc area.\n\nWhenever learning a new area formula, test it on a known case (disc, sector, triangle) to build confidence.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_40", "judge_pick": true}, {"question": "For the curve with equation $$r = a(1+\\cos\\theta)$$, what is the geometric meaning of the tangent at the pole (where $$r = 0$$)? (3 steps)", "answer": "- Step 1: At the cusp/pole, both $$\\tfrac{dx}{d\\theta}$$ and $$\\tfrac{dy}{d\\theta}$$ are zero ŌĆö no well-defined tangent in the usual parametric sense.\n- Step 2: However, we can ask about the *limiting* tangent direction. For a curve $$r = f(\\theta)$$ touching the pole at $$\\theta = \\theta_0$$ (meaning $$f(\\theta_0) = 0$$), the tangent line *at the pole* is in the direction $$\\theta = \\theta_0$$.\n- Step 3: For the cardioid, $$r = 0$$ at $$\\theta = \\pi$$, so the tangent at the cusp is along the negative $$x$$-axis ŌĆö horizontal. This matches \"tangent parallel to initial line at $$(0, \\pi)$$\".\n\nHeuristic: *if $$r = 0$$ at $$\\theta = \\theta_0$$, the curve's tangent at the pole points in direction $$\\theta_0$$.*", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_41", "judge_pick": true}, {"question": "Why would you ever need *both* polar and Cartesian coordinates in one problem? Give a concrete example type. (3 steps)", "answer": "- Step 1: Some problems combine a rotational/circular constraint (naturally polar) with a linear/angular constraint (naturally handled in either). Example: find area of region inside the circle $$|z - 3i|=3$$ AND in the angular sector $$0 \\leq \\arg z \\leq \\pi/2$$.\n- Step 2: The circle is easy in Cartesian, the sector is trivial in polar.\n- Step 3: Strategy: convert the circle's Cartesian equation to polar, then integrate in polar over the sector's angular range. Each constraint gets expressed in whichever system is simplest.\n\nEngineering and physics constantly mix the two ŌĆö use whichever is locally most convenient.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_42", "judge_pick": true}, {"question": "A student says: \"since $$\\int_0^{2\\pi} r\\, d\\theta$$ has units of length ├Ś angle, that's how we get area in polar.\" What's wrong with this reasoning? (3 steps)", "answer": "- Step 1: Length ├Ś angle does *not* give area ŌĆö angle is dimensionless in radians, so the units would be just (length), not area.\n- Step 2: The correct formula $$\\tfrac{1}{2}\\int r^2 d\\theta$$ has units (length)┬▓ ├Ś (dimensionless) = (length)┬▓, which is correct.\n- Step 3: Dimensionally, the $$r^2$$ factor is essential ŌĆö it comes from the sector area $$\\tfrac{1}{2}r^2 \\theta$$, which scales as (length)┬▓. Each wedge's area grows as $$r^2$$, not $$r$$.\n\nAlways check units: polar area needs $$r^2 d\\theta$$, not $$r\\, d\\theta$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_43", "judge_pick": true}, {"question": "Misconception: \"negative $$r$$ values represent points in the opposite direction, so I should include them when sketching $$r = \\sin 3\\theta$$.\" Why does Edexcel FP2 reject this interpretation? (3 steps)", "answer": "- Step 1: Some textbooks allow $$r < 0$$: $$(r, \\theta)$$ with $$r < 0$$ means the point $$(|r|, \\theta + \\pi)$$. This creates extra petals in $$r = \\sin 3\\theta$$.\n- Step 2: Edexcel FP2 convention is $$r \\geq 0$$: if $$f(\\theta) < 0$$, the curve simply doesn't exist at that $$\\theta$$. So $$r = \\sin 3\\theta$$ has only 3 petals, not 6.\n- Step 3: The choice affects the petal count: under $$r \\geq 0$$ convention, $$r = \\sin(n\\theta)$$ gives $$n$$ petals (odd $$n$$) or $$2n$$ petals (even $$n$$); under the relaxed convention, always $$2n$$.\n\nKnow your textbook's convention ŌĆö it changes the answer, not just the phrasing.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_44", "judge_pick": true}, {"question": "For the lima├¦on $$r = a(3 + 2\\cos\\theta)$$, determine whether it is dimpled or convex without sketching. (3 steps)", "answer": "- Step 1: Identify $$p = 3, q = 2$$ (from the form $$r = a(p + q\\cos\\theta)$$).\n- Step 2: Compare $$p$$ and $$2q$$: $$p = 3$$, $$2q = 4$$, so $$p < 2q$$.\n- Step 3: By the classification rule, the curve has a dimple. Specifically, the dimple occurs near $$\\theta = \\pi$$ (where the radial function is smallest, $$r = a$$).\n\nQuick test: compute $$p/q$$. Between 1 and 2 ŌćÆ dimpled; $$\\geq 2$$ ŌćÆ convex; $$= 1$$ ŌćÆ cardioid.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_45", "judge_pick": false}, {"question": "When is a polar curve $$r = f(\\theta)$$ symmetric about the initial line ($$x$$-axis), and what symmetry test corresponds? (3 steps)", "answer": "- Step 1: Symmetry about the initial line means $$(r, \\theta)$$ on the curve Ōåö $$(r, -\\theta)$$ on the curve.\n- Step 2: This requires $$f(\\theta) = f(-\\theta)$$, i.e., $$f$$ is an even function of $$\\theta$$.\n- Step 3: Equations involving only $$\\cos\\theta$$ (e.g., cardioid $$r = a(1+\\cos\\theta)$$, lima├¦on $$r = p + q\\cos\\theta$$, circle $$r = 2a\\cos\\theta$$) are automatically symmetric about the initial line because $$\\cos$$ is even.\n\nSimilarly, $$\\theta \\to \\pi - \\theta$$ tests symmetry about the $$y$$-axis; $$r = f(\\sin\\theta)$$ curves are $$y$$-axis symmetric.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_46", "judge_pick": true}, {"question": "When computing the area enclosed by $$r = a(p + q\\cos\\theta)$$ for one full rotation, show why it comes out to $$\\tfrac{(2p^2 + q^2)\\pi a^2}{2}$$. (5 steps)", "answer": "- Step 1: Area $$= \\tfrac{1}{2}\\int_0^{2\\pi} a^2(p + q\\cos\\theta)^2 d\\theta = \\tfrac{a^2}{2}\\int_0^{2\\pi}(p^2 + 2pq\\cos\\theta + q^2\\cos^2\\theta)d\\theta$$.\n- Step 2: The $$p^2$$ term integrates to $$2\\pi p^2$$.\n- Step 3: The $$2pq\\cos\\theta$$ term integrates to $$0$$ (full cosine cycle averages to zero).\n- Step 4: The $$q^2\\cos^2\\theta$$ term: use $$\\cos^2\\theta = \\tfrac{1+\\cos 2\\theta}{2}$$; the $$\\cos 2\\theta$$ part integrates to zero, leaving $$\\tfrac{q^2}{2}\\cdot 2\\pi = \\pi q^2$$.\n- Step 5: Total: $$\\tfrac{a^2}{2}(2\\pi p^2 + \\pi q^2) = \\tfrac{\\pi a^2(2p^2 + q^2)}{2}$$.\n\nThe result is a weighted \"average radius-squared\" times the angular range ŌĆö exactly what you'd expect.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_47", "judge_pick": true}, {"question": "What is a cardioid conceptually, and why is the name \"cardioid\" apt? (3 steps)", "answer": "- Step 1: A cardioid is a curve of the form $$r = a(1\\pm\\cos\\theta)$$ or $$r = a(1\\pm\\sin\\theta)$$ ŌĆö a lima├¦on in the critical case $$p = q$$.\n- Step 2: The name comes from Greek \"kardia\" (heart). The curve has a single cusp (at the pole) and two symmetric lobes, resembling a stylised heart.\n- Step 3: Its geometric origin: trace a point on the boundary of a circle as it rolls around another circle of the same radius ŌĆö this produces a cardioid. It's an *epicycloid* with one cusp.\n\nCardioids appear in engineering (e.g., certain microphone pickup patterns) due to their unique directional sensitivity.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_48", "judge_pick": true}, {"question": "Explain why the polar form $$r = 2\\sec(\\pi/4 - \\theta)$$ represents a straight line, and identify which line. (4 steps)", "answer": "- Step 1: Write the equation as $$r\\cos(\\pi/4 - \\theta) = 2$$.\n- Step 2: Expand: $$r(\\cos(\\pi/4)\\cos\\theta + \\sin(\\pi/4)\\sin\\theta) = 2$$, so $$\\tfrac{\\sqrt{2}}{2}(r\\cos\\theta + r\\sin\\theta) = 2$$.\n- Step 3: Substitute $$x = r\\cos\\theta, y = r\\sin\\theta$$: $$\\tfrac{\\sqrt{2}}{2}(x + y) = 2$$, so $$x + y = 2\\sqrt{2}$$.\n- Step 4: Straight line with $$x$$-intercept $$2\\sqrt{2}$$ and $$y$$-intercept $$2\\sqrt{2}$$ ŌĆö perpendicular distance from origin is $$2$$, direction of normal is at angle $$\\pi/4$$.\n\nGeneral pattern: $$r = d\\sec(\\theta - \\alpha)$$ is a line at perpendicular distance $$d$$ from the pole, with perpendicular in direction $$\\alpha$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_49", "judge_pick": false}, {"question": "How can you tell from a polar equation whether the curve passes through the origin, without sketching? (2 steps)", "answer": "- Step 1: A curve passes through the pole (origin) if $$r = 0$$ is achievable for some valid $$\\theta$$. Solve $$f(\\theta) = 0$$ and check.\n- Step 2: Examples:\n+ $$r = a(1 + \\cos\\theta)$$: passes through origin (at $$\\theta = \\pi$$).\n+ $$r = 2 + \\cos\\theta$$: does *not* (since $$2 + \\cos\\theta \\geq 1 > 0$$ always).\n+ $$r = a\\sin 2\\theta$$: does (at $$\\theta = 0, \\pi/2, \\pi, \\ldots$$).\n\nThis quick check tells you whether the curve has a cusp or loop at the pole.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_50", "judge_pick": false}, {"question": "On the cardioid $$r = a(1 + \\cos\\theta)$$, where are the points with tangents *perpendicular* to the initial line? (4 steps)", "answer": "- Step 1: Form $$x = r\\cos\\theta = a\\cos\\theta(1+\\cos\\theta) = a(\\cos\\theta + \\cos^2\\theta)$$.\n- Step 2: Differentiate: $$\\tfrac{dx}{d\\theta} = a(-\\sin\\theta - 2\\cos\\theta\\sin\\theta) = -a\\sin\\theta(1 + 2\\cos\\theta)$$.\n- Step 3: Set to zero:\n+ $$\\sin\\theta = 0 \\Rightarrow \\theta = 0$$ or $$\\pi$$.\n+ $$\\cos\\theta = -\\tfrac{1}{2} \\Rightarrow \\theta = \\pm\\tfrac{2\\pi}{3}$$.\n- Step 4: At $$\\theta = \\pm 2\\pi/3$$: $$r = a(1 - 1/2) = a/2$$. At $$\\theta = 0$$: $$r = 2a$$ (rightmost point). At $$\\theta = \\pi$$: $$r = 0$$ (cusp).\n\nVertical tangents: at $$\\left(\\tfrac{a}{2}, \\pm\\tfrac{2\\pi}{3}\\right)$$ and rightmost point $$(2a, 0)$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_51", "judge_pick": false}, {"question": "Why does the polar equation $$r = 4\\cos\\theta$$ (a circle) give $$r = 0$$ at $$\\theta = \\pi/2$$, but the circle doesn't have a \"sharp point\" there? (3 steps)", "answer": "- Step 1: Tracing: at $$\\theta = 0$$, $$r = 4$$ (rightmost point of circle, at $$(4,0)$$). As $$\\theta$$ rotates toward $$\\pi/2$$, $$r$$ shrinks to $$0$$.\n- Step 2: At $$\\theta = \\pi/2$$, the curve reaches the origin ŌĆö not as a cusp, but tangentially: the circle passes *through* the origin smoothly.\n- Step 3: For $$\\pi/2 < \\theta < \\pi$$, $$\\cos\\theta < 0$$, so $$r < 0$$ ŌĆö outside Edexcel convention. The circle is entirely traced for $$\\theta \\in [-\\pi/2, \\pi/2]$$.\n\nSo \"$$r = 0$$\" just means \"the curve happens to pass through the origin at this parameter value\" ŌĆö not necessarily a cusp.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_52", "judge_pick": true}, {"question": "Sketch mentally and describe the curve $$r = 2\\sec\\theta$$ ŌĆö what is it? (4 steps)", "answer": "- Step 1: Rewrite as $$r\\cos\\theta = 2$$.\n- Step 2: Since $$r\\cos\\theta = x$$, this gives $$x = 2$$ ŌĆö a vertical line!\n- Step 3: The convention $$\\sec\\theta$$ being positive restricts $$\\theta \\in (-\\pi/2, \\pi/2)$$, corresponding to the right half-plane.\n- Step 4: All points on the vertical line $$x=2$$ satisfy $$r\\cos\\theta = 2$$; as $$\\theta$$ varies, $$r$$ adjusts accordingly.\n\nGeneral: $$r = c\\sec\\theta$$ is vertical line $$x=c$$; $$r = c\\csc\\theta$$ is horizontal line $$y=c$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_53", "judge_pick": false}, {"question": "What does $$r = a(1 - \\cos\\theta)$$ look like, and how does it differ from $$r = a(1+\\cos\\theta)$$? (3 steps)", "answer": "- Step 1: Both are cardioids ŌĆö same shape, but mirror images.\n- Step 2: $$r = a(1 + \\cos\\theta)$$: maximum ($$r = 2a$$) at $$\\theta = 0$$, cusp at $$\\theta = \\pi$$ (pointing left). Heart opens to the right.\n- Step 3: $$r = a(1 - \\cos\\theta)$$: maximum at $$\\theta = \\pi$$, cusp at $$\\theta = 0$$ (pointing right). Heart opens to the left.\n\nThe sign of the cosine term controls which direction the cardioid's cusp faces.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_54", "judge_pick": false}, {"question": "Why does it suffice to integrate from $$0$$ to $$\\pi$$ and double when finding the cardioid's area, rather than integrating from $$0$$ to $$2\\pi$$ directly? (3 steps)", "answer": "- Step 1: The cardioid $$r = a(1+\\cos\\theta)$$ is symmetric about the initial line because $$\\cos(-\\theta) = \\cos\\theta$$, so $$f(-\\theta) = f(\\theta)$$.\n- Step 2: Integrating $$\\tfrac{1}{2}\\int_{-\\pi}^{\\pi} r^2 d\\theta$$ gives the full area. By symmetry, $$\\int_{-\\pi}^{0} = \\int_{0}^{\\pi}$$, so the full area is $$2\\cdot\\tfrac{1}{2}\\int_0^\\pi r^2 d\\theta = \\int_0^\\pi r^2 d\\theta$$.\n- Step 3: This simplifies integration: limits of $$[0,\\pi]$$ produce cleaner boundary values and the integrand is easier to manipulate over a half-period.\n\nUsing symmetry cuts calculation work in half and often makes antiderivative bounds nicer.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_55", "judge_pick": false}, {"question": "For $$r = a\\cos 2\\theta$$, identify the $$\\theta$$-intervals where $$r \\geq 0$$ and thus where the four petals lie. (3 steps)", "answer": "- Step 1: $$\\cos 2\\theta \\geq 0$$ when $$2\\theta \\in [-\\pi/2, \\pi/2] + 2k\\pi$$, i.e. $$\\theta \\in [-\\pi/4, \\pi/4] + k\\pi$$.\n- Step 2: In a full $$[0, 2\\pi]$$ range, the intervals are $$[0, \\pi/4] \\cup [3\\pi/4, 5\\pi/4] \\cup [7\\pi/4, 2\\pi]$$ (plus the symmetric $$[-\\pi/4, 0]$$ wrapping).\n- Step 3: These give four petals (since $$n = 2$$ is even, we get $$2n = 4$$), centred along the positive/negative $$x$$-axis and positive/negative $$y$$-axis.\n\nThe \"valid\" intervals for $$r \\geq 0$$ define where each petal exists.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_56", "judge_pick": false}, {"question": "How would you find the area of the region *outside* one polar curve and *inside* another? (4 steps)", "answer": "- Step 1: Let inner boundary be $$r = g(\\theta)$$ and outer boundary $$r = f(\\theta)$$, with $$f > g$$ on the relevant $$\\theta$$-range.\n- Step 2: The area of a wedge is \"sector to $$f$$ minus sector to $$g$$\" $$= \\tfrac{1}{2}(f^2 - g^2)d\\theta$$.\n- Step 3: Integrate: $$\\text{Area} = \\tfrac{1}{2}\\int_\\alpha^\\beta (f(\\theta)^2 - g(\\theta)^2)\\, d\\theta$$.\n- Step 4: Check: if $$g = 0$$ (region reaches the pole), this reduces to $$\\tfrac{1}{2}\\int f^2 d\\theta$$, the standard formula.\n\nAlways ensure $$f > g$$ on the $$\\theta$$-interval; otherwise split the integral.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_57", "judge_pick": true}, {"question": "Convert the point $$(3, 4)$$ in Cartesian coordinates to polar form. (3 steps)", "answer": "- Step 1: Compute $$r = \\sqrt{3^2 + 4^2} = \\sqrt{25} = 5$$.\n- Step 2: Both coordinates positive ŌåÆ first quadrant. No adjustment to $$\\arctan$$ needed.\n- Step 3: $$\\theta = \\arctan(4/3) \\approx 0.927$$ rad. Polar: $$(5, 0.927)$$.\n\nThe first quadrant is the \"easy case\": $$\\arctan(y/x)$$ gives the answer directly.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_58", "judge_pick": false}, {"question": "Convert the polar point $$\\left(6, \\tfrac{\\pi}{6}\\right)$$ to Cartesian. (2 steps)", "answer": "- Step 1: $$x = r\\cos\\theta = 6\\cos(\\pi/6) = 6\\cdot\\tfrac{\\sqrt{3}}{2} = 3\\sqrt{3}$$.\n- Step 2: $$y = r\\sin\\theta = 6\\sin(\\pi/6) = 6\\cdot\\tfrac{1}{2} = 3$$.\n\nCartesian: $$(3\\sqrt{3}, 3)$$ ŌĆö first quadrant, as expected from $$\\theta = \\pi/6$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_59", "judge_pick": false}, {"question": "Find the polar equation of the circle $$(x-2)^2 + y^2 = 4$$. (4 steps)", "answer": "- Step 1: Expand: $$x^2 - 4x + 4 + y^2 = 4 \\Rightarrow x^2 + y^2 = 4x$$.\n- Step 2: Substitute $$x^2 + y^2 = r^2$$ and $$x = r\\cos\\theta$$: $$r^2 = 4r\\cos\\theta$$.\n- Step 3: Divide by $$r$$ (valid except at $$r = 0$$, which is a single point on the curve): $$r = 4\\cos\\theta$$.\n- Step 4: Sanity check: circle through origin, centred at $$(2, 0)$$, radius $$2$$. Matches the given equation.\n\nThe polar form $$r = 2a\\cos\\theta$$ generally represents a circle of radius $$a$$ centred at $$(a, 0)$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_60", "judge_pick": false}, {"question": "Find the area of a single loop of $$r = a\\cos 3\\theta$$. (4 steps)", "answer": "- Step 1: $$r = a\\cos 3\\theta \\geq 0$$ on $$[-\\pi/6, \\pi/6]$$ (one petal centred on the initial line).\n- Step 2: By symmetry, loop area $$= 2\\cdot \\tfrac{1}{2}\\int_0^{\\pi/6}a^2\\cos^2 3\\theta\\, d\\theta = a^2\\int_0^{\\pi/6}\\cos^2 3\\theta\\, d\\theta$$.\n- Step 3: Use $$\\cos^2 3\\theta = \\tfrac{1+\\cos 6\\theta}{2}$$: integral becomes $$\\tfrac{a^2}{2}\\left[\\theta + \\tfrac{\\sin 6\\theta}{6}\\right]_0^{\\pi/6}$$.\n- Step 4: At $$\\theta = \\pi/6$$: $$\\sin\\pi = 0$$, giving $$\\tfrac{a^2}{2}\\cdot\\tfrac{\\pi}{6} = \\tfrac{a^2\\pi}{12}$$.\n\nThree loops total, so combined area = $$\\tfrac{a^2\\pi}{4}$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_61", "judge_pick": false}, {"question": "For $$r = a(1+\\sin\\theta)$$ (cardioid), find and describe the tangent where $$\\theta = \\pi/2$$. (4 steps)", "answer": "- Step 1: At $$\\theta = \\pi/2$$, $$r = 2a$$. Point: $$x = r\\cos\\theta = 0, y = r\\sin\\theta = 2a$$ ŌĆö i.e. $$(0, 2a)$$, the top of the cardioid.\n- Step 2: $$y = r\\sin\\theta = a(1+\\sin\\theta)\\sin\\theta$$, so $$\\tfrac{dy}{d\\theta} = a(\\cos\\theta + 2\\sin\\theta\\cos\\theta) = a\\cos\\theta(1+2\\sin\\theta)$$.\n- Step 3: At $$\\theta = \\pi/2$$: $$\\cos(\\pi/2) = 0$$, so $$\\tfrac{dy}{d\\theta} = 0$$ ŌĆö horizontal tangent!\n- Step 4: Verify $$\\tfrac{dx}{d\\theta} \\neq 0$$ (not a cusp): at $$\\theta = \\pi/2$$, $$\\tfrac{dx}{d\\theta} = -2a \\neq 0$$. Genuine horizontal tangent at $$(0, 2a)$$.\n\nMakes geometric sense: $$\\theta = \\pi/2$$ is \"topmost\" direction, and the top is a peak.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_62", "judge_pick": false}, {"question": "If $$r = f(\\theta)$$ has both $$\\tfrac{dx}{d\\theta} = 0$$ and $$\\tfrac{dy}{d\\theta} = 0$$ at some $$\\theta = \\theta_0$$, what does this indicate geometrically? (3 steps)", "answer": "- Step 1: Both derivatives vanishing means the parametric velocity vector is zero ŌĆö the curve \"stops\" at that point.\n- Step 2: This typically corresponds to a cusp, corner, or singular point, where the curve is not smooth.\n- Step 3: Example: cardioid at $$\\theta = \\pi$$ has both stationary derivatives; the cusp is at the pole.\n\nAt such points, usual tangent analysis fails ŌĆö the direction of approach is given by the angle $$\\theta_0$$ itself if $$r(\\theta_0) = 0$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_63", "judge_pick": false}, {"question": "Derive the polar equation of a line passing through the pole at angle $$\\alpha$$. (3 steps)", "answer": "- Step 1: Every point on the line through the pole at angle $$\\alpha$$ has polar angle $$\\alpha$$ (or $$\\alpha + \\pi$$ on the other side).\n- Step 2: So the polar equation is simply $$\\theta = \\alpha$$, with $$r$$ free to be any non-negative real.\n- Step 3: Note: under $$r \\geq 0$$ convention, this gives only a *half-line* (ray) from the origin. For the full line, use $$\\theta = \\alpha$$ OR $$\\theta = \\alpha + \\pi$$.\n\nLines through the origin are exceptionally simple in polar: one equation, $$\\theta = $$ const.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_64", "judge_pick": false}, {"question": "Derive the polar equation of a general line NOT passing through the pole. (3 steps)", "answer": "- Step 1: Drop a perpendicular from pole $$O$$ to the line. Let $$p$$ = perpendicular distance, $$\\alpha$$ = angle the perpendicular makes with the positive $$x$$-axis.\n- Step 2: For any point $$(r, \\theta)$$ on the line, the angle between $$OP$$ and the perpendicular is $$\\theta - \\alpha$$. The projection of $$OP$$ onto the perpendicular equals $$p$$: $$r\\cos(\\theta - \\alpha) = p$$.\n- Step 3: So the polar equation is $$r\\cos(\\theta - \\alpha) = p$$, or $$r = p\\sec(\\theta - \\alpha)$$.\n\nThis is the \"normal form\" of a line in polar: $$p$$ is perpendicular distance, $$\\alpha$$ is direction of nearest point from $$O$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_65", "judge_pick": true}, {"question": "Connect the polar form $$r = 2a\\cos\\theta$$ of a circle to its geometric meaning via Thales's theorem. (3 steps)", "answer": "- Step 1: $$r = 2a\\cos\\theta$$ represents a circle of radius $$a$$ centred at $$(a, 0)$$ ŌĆö a circle with diameter along the $$x$$-axis, passing through the origin.\n- Step 2: Thales's theorem: any triangle inscribed in a circle with one side as diameter has a right angle at the opposite vertex. So for any point $$P$$ on this circle, the triangle $$O,P,D$$ (where $$D=(2a,0)$$ is the diameter endpoint) is right-angled at $$P$$.\n- Step 3: In that right triangle, $$OP = OD\\cos\\theta = 2a\\cos\\theta$$ where $$\\theta = \\angle POD$$. So $$r = 2a\\cos\\theta$$ literally *is* the chord length of the circle from the origin at angle $$\\theta$$.\n\nPolar form makes the \"diameter-through-origin\" chord structure of the circle explicit.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_66", "judge_pick": true}, {"question": "Why is the polar form so natural for circles passing through the origin, compared to circles not passing through the origin? (3 steps)", "answer": "- Step 1: Circles through origin: polar equation is linear in $$\\cos\\theta, \\sin\\theta$$: $$r = A\\cos\\theta + B\\sin\\theta$$. Very clean.\n- Step 2: Circles NOT through origin: polar equation is quadratic in $$r$$, requiring the full Cartesian expansion. The polar form is no cleaner than the Cartesian.\n- Step 3: The reason: a circle through origin naturally \"radiates\" from the origin ŌĆö each ray through the origin intersects it in a chord starting at the origin, and the chord length varies sinusoidally with angle. Circles not through origin don't have this radial privilege.\n\nPassing through the pole is the \"magic ingredient\" that simplifies the polar equation.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_67", "judge_pick": false}, {"question": "Does \"area enclosed by a polar curve\" have any ambiguity if the curve is not a simple closed loop? (3 steps)", "answer": "- Step 1: For a simple closed loop (cardioid, single lima├¦on), \"area enclosed\" unambiguously means the bounded region inside.\n- Step 2: For multi-loop curves (rose curve $$r = \\sin 3\\theta$$), one might mean: total of all petals, a single petal, or the convex hull ŌĆö all different.\n- Step 3: The formula $$\\tfrac{1}{2}\\int r^2 d\\theta$$ gives *whatever is swept by the radius vector* in the given range ŌĆö so the choice of limits encodes which region is meant.\n\nDon't trust \"the area\" ŌĆö figure out which region is intended by the problem context.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_68", "judge_pick": true}, {"question": "When must you be extra careful using a calculator or graphing software to sketch polar curves? (3 steps)", "answer": "- Step 1: Many graphing tools (Desmos, GeoGebra) automatically allow $$r < 0$$, using the convention $$(r, \\theta) = (|r|, \\theta + \\pi)$$.\n- Step 2: This produces *extra* branches/petals that Edexcel FP2 ignores (strict $$r \\geq 0$$ convention).\n- Step 3: Always cross-check your sketch against a hand-drawn table of values, and only include points where your conventional $$r$$ is non-negative.\n\nSoftware-generated polar plots are a useful guide but may show curves your exam won't accept.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_69", "judge_pick": true}, {"question": "In the polar area formula $$\\tfrac{1}{2}\\int r^2 d\\theta$$, does $$d\\theta$$ refer to a tiny angular change in radians or degrees? (3 steps)", "answer": "- Step 1: It *must* be radians. The derivation of the sector area $$\\tfrac{1}{2}R^2 \\theta$$ assumes $$\\theta$$ is in radians (so that $$\\theta = 2\\pi$$ gives the full disc).\n- Step 2: If $$\\theta$$ were in degrees, the full disc would correspond to $$\\theta = 360┬░$$, not $$2\\pi$$, and the formula would need a conversion factor.\n- Step 3: Radians make $$\\tfrac{d(\\text{arc length})}{d\\theta} = r$$, yielding clean formulas. Always use radians in polar problems.\n\nSame warning for tangent problems: derivatives of $$\\sin\\theta$$ and $$\\cos\\theta$$ only behave nicely in radians.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_70", "judge_pick": true}, {"question": "Connect: the \"area swept by the radius\" interpretation, Kepler's second law, and the polar area formula. (3 steps)", "answer": "- Step 1: In classical mechanics, Kepler's second law says a planet's position vector from the sun sweeps out equal areas in equal times.\n- Step 2: Naturally captured in polar coordinates: the rate of area sweep is $$\\tfrac{dA}{dt} = \\tfrac{1}{2}r^2 \\tfrac{d\\theta}{dt}$$.\n- Step 3: Constant $$\\tfrac{dA}{dt}$$ Ōåö conservation of angular momentum. The factor $$\\tfrac{1}{2}r^2$$ is the same quantity as in our static area formula!\n\nThe polar area formula is, in physics terms, the \"areal sweep rate\" ŌĆö same math, different interpretation.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_71", "judge_pick": true}, {"question": "Qualitatively compare the three polar curves $$r = 1 + \\cos\\theta$$, $$r = 2 + \\cos\\theta$$, $$r = 3 + \\cos\\theta$$. (4 steps)", "answer": "- Step 1: All three are lima├¦ons of form $$r = p + q\\cos\\theta$$ with $$q = 1$$.\n- Step 2: $$r = 1 + \\cos\\theta$$ ($$p=q$$): cardioid with cusp at the pole.\n- Step 3: $$r = 2 + \\cos\\theta$$ ($$1 < p < 2$$): dimpled lima├¦on ŌĆö no cusp, but concave on the back side.\n- Step 4: $$r = 3 + \\cos\\theta$$ ($$p \\geq 2$$): convex lima├¦on ŌĆö egg-shaped, no dimple.\n\nAs $$p$$ grows relative to $$q$$: cardioid ŌåÆ dimple ŌåÆ convex ŌåÆ (limit) circle.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_72", "judge_pick": false}, {"question": "Outline a 4-step method to compute the area of a region bounded by two polar curves with intersection points. (4 steps)", "answer": "- Step 1: Sketch both curves and identify the region of interest and its boundary segments.\n- Step 2: Find intersection angles by solving $$r_1(\\theta) = r_2(\\theta)$$.\n- Step 3: Split the area into sub-regions, each bounded by one of the curves on the outside and the other (or the pole) on the inside. For each sub-region, identify which curve bounds it on which side.\n- Step 4: For each sub-region, compute $$\\tfrac{1}{2}\\int r_{\\text{outer}}^2 d\\theta$$ (if going out to the pole) or $$\\tfrac{1}{2}\\int (r_{\\text{outer}}^2 - r_{\\text{inner}}^2) d\\theta$$ (between two curves). Sum, using symmetry where applicable.\n\nThis template handles all \"region enclosed by two polar curves\" problems.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_73", "judge_pick": false}, {"question": "Describe the curve $$r = e^{2\\theta}$$ qualitatively on $$0 \\leq \\theta \\leq \\pi$$. (3 steps)", "answer": "- Step 1: This is a *logarithmic spiral* ŌĆö $$r$$ grows exponentially with $$\\theta$$, so successive arms are spaced geometrically (not arithmetically like Archimedean).\n- Step 2: At $$\\theta = 0$$: $$r = 1$$. At $$\\theta = \\pi/2$$: $$r = e^{\\pi} \\approx 23.1$$. At $$\\theta = \\pi$$: $$r = e^{2\\pi} \\approx 535$$.\n- Step 3: Spiral starts at $$(1, 0)$$ and spirals outward rapidly; each quarter turn multiplies the radius by $$e^{\\pi/2} \\approx 4.81$$.\n\nLogarithmic spirals appear in nature (nautilus shells, galaxy arms) ŌĆö they preserve shape under scaling.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_74", "judge_pick": true}, {"question": "In the formula $$y = r\\sin\\theta$$, when we compute $$\\tfrac{dy}{d\\theta}$$ for finding horizontal tangents, why do we need the product rule? (3 steps)", "answer": "- Step 1: $$y = r\\sin\\theta$$ is a product of *two* functions of $$\\theta$$: $$r$$ itself depends on $$\\theta$$ (since $$r = f(\\theta)$$), and $$\\sin\\theta$$ obviously depends on $$\\theta$$.\n- Step 2: Product rule: $$\\tfrac{dy}{d\\theta} = \\tfrac{dr}{d\\theta}\\sin\\theta + r\\cos\\theta$$.\n- Step 3: Forgetting the product rule (treating $$r$$ as a constant) misses how the curve's radial motion contributes to $$y$$'s rate of change.\n\nIn polar, $$r$$ is not a constant ŌĆö it's a function of $$\\theta$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_75", "judge_pick": true}, {"question": "For the curve $$r = a(7 + 2\\cos\\theta)$$, at which values of $$\\theta$$ are the tangents parallel to the initial line? (4 steps)", "answer": "- Step 1: $$y = r\\sin\\theta = a(7\\sin\\theta + 2\\sin\\theta\\cos\\theta) = a(7\\sin\\theta + \\sin 2\\theta)$$.\n- Step 2: $$\\tfrac{dy}{d\\theta} = a(7\\cos\\theta + 2\\cos 2\\theta) = a(7\\cos\\theta + 2(2\\cos^2\\theta - 1)) = a(4\\cos^2\\theta + 7\\cos\\theta - 2)$$.\n- Step 3: Set to zero with $$c = \\cos\\theta$$: $$4c^2 + 7c - 2 = 0$$. Factor: $$(4c - 1)(c + 2) = 0$$, so $$\\cos\\theta = \\tfrac{1}{4}$$ (rejecting $$c = -2$$).\n- Step 4: $$\\theta = \\pm\\arccos(1/4) \\approx \\pm 1.318$$ rad. Then $$r = a(7 + 1/2) = \\tfrac{15a}{2}$$.\n\nPoints: $$\\left(\\tfrac{15a}{2}, \\pm\\arccos(1/4)\\right)$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_76", "judge_pick": false}, {"question": "Explain why \"setting $$dy/d\\theta = 0$$\" finds points of horizontal tangency but not necessarily the \"top\" or \"bottom\" of the curve. (3 steps)", "answer": "- Step 1: $$\\tfrac{dy}{d\\theta} = 0$$ finds any point where $$y$$ is instantaneously stationary ŌĆö this includes local maxima, local minima, and inflection points of $$y(\\theta)$$.\n- Step 2: The \"top\" of the curve is the *global* maximum of $$y$$; this is one specific point among possibly several with horizontal tangents.\n- Step 3: For complicated curves with multiple bulges, there can be multiple horizontal tangents, each at a local extremum of $$y$$ along the curve.\n\nFinding tangents gives candidates; identifying global extremes requires examining all candidates.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_77", "judge_pick": false}, {"question": "Derive why the equation of a horizontal tangent line $$y = y_0$$ has polar form $$r = y_0 \\csc\\theta$$. (3 steps)", "answer": "- Step 1: Horizontal line $$y = y_0$$ in Cartesian.\n- Step 2: Substitute $$y = r\\sin\\theta$$: $$r\\sin\\theta = y_0$$.\n- Step 3: Solve for $$r$$: $$r = \\tfrac{y_0}{\\sin\\theta} = y_0\\csc\\theta$$.\n\nSimilarly: vertical line $$x = x_0$$ Ōåö $$r = x_0 \\sec\\theta$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_78", "judge_pick": false}, {"question": "What's the conceptual role of $$\\cos 2\\theta = 1 - 2\\sin^2\\theta = 2\\cos^2\\theta - 1$$ in polar area problems? (3 steps)", "answer": "- Step 1: Polar area formulas square the radius, producing $$r^2$$. If $$r$$ involves $$\\sin\\theta$$ or $$\\cos\\theta$$, then $$r^2$$ involves $$\\sin^2\\theta$$ or $$\\cos^2\\theta$$.\n- Step 2: These squared functions don't have elementary antiderivatives directly. The double-angle identity rewrites them as $$\\sin^2\\theta = \\tfrac{1-\\cos 2\\theta}{2}$$ and $$\\cos^2\\theta = \\tfrac{1+\\cos 2\\theta}{2}$$.\n- Step 3: Now the expression is linear in a single cosine, which integrates directly: $$\\int \\cos 2\\theta\\, d\\theta = \\tfrac{\\sin 2\\theta}{2}$$.\n\nThe double-angle identity is the bridge between squared trig and integrable trig.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_79", "judge_pick": true}, {"question": "Intuitively, why does $$d\\theta$$ appear in the polar area element (rather than, say, $$dr$$)? (3 steps)", "answer": "- Step 1: At each angle $$\\theta$$, an infinitesimal change $$d\\theta$$ spans an angular range. The wedge formed has a fixed outer curve.\n- Step 2: The slice's width (measured at outer edge) is $$r\\, d\\theta$$ (arc length); its radial depth is $$r$$ (from pole to curve).\n- Step 3: So the slice's area is like a thin sector: $$\\tfrac{1}{2}r\\cdot(r\\, d\\theta) = \\tfrac{1}{2}r^2\\, d\\theta$$. The \"density\" in $$\\theta$$ determines how much angular territory each piece covers.\n\nThe sector formula is \"arc length ├Ś half-depth\" in the infinitesimal limit.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_80", "judge_pick": true}, {"question": "For the curve $$r = a\\sin 4\\theta$$, why is there a subtle issue with counting \"one period\" of the underlying trig function? (3 steps)", "answer": "- Step 1: The function $$\\sin 4\\theta$$ has period $$\\pi/2$$. In each period, $$\\sin 4\\theta$$ is positive on half, negative on half.\n- Step 2: Under $$r \\geq 0$$: only positive halves give actual curve. Over $$\\theta \\in [0, 2\\pi]$$, there are 8 positive intervals (since $$n = 4$$ is even, giving $$2n = 8$$ petals).\n- Step 3: The subtlety: the \"period\" of $$\\sin 4\\theta$$ is $$\\pi/2$$, but the \"period\" of the *curve* is $$2\\pi$$ ŌĆö different $$\\theta$$ values place the curve at different rotational positions.\n\nDistinguish: period of underlying trig function vs. period of the polar curve (as a set of points).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_81", "judge_pick": true}, {"question": "On the cardioid $$r = 2(1+\\cos\\theta)$$, where is the leftmost vertical tangent line? (4 steps)", "answer": "- Step 1: Form $$x = r\\cos\\theta = 2\\cos\\theta(1+\\cos\\theta)$$.\n- Step 2: Differentiate: $$\\tfrac{dx}{d\\theta} = -2\\sin\\theta - 4\\cos\\theta\\sin\\theta = -2\\sin\\theta(1 + 2\\cos\\theta)$$.\n- Step 3: Setting to zero: $$\\sin\\theta = 0$$ gives $$\\theta = 0$$ or $$\\pi$$; $$\\cos\\theta = -\\tfrac{1}{2}$$ gives $$\\theta = \\pm\\tfrac{2\\pi}{3}$$.\n- Step 4: At $$\\theta = 2\\pi/3$$: $$r = 1$$, $$x = 1\\cdot\\cos(2\\pi/3) = -1/2$$. At $$\\theta = \\pi$$: $$r = 0$$ (cusp). So leftmost vertical tangent is $$x = -1/2$$.\n\nNote: the cusp at $$\\theta = \\pi$$ is also at $$x = 0$$ but is a singular point, not a smooth vertical tangent.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_82", "judge_pick": false}, {"question": "How can you derive the \"sector area\" $$\\tfrac{1}{2}r^2\\theta$$ without calculus, using just the disc area formula? (3 steps)", "answer": "- Step 1: A full disc of radius $$r$$ has area $$\\pi r^2$$. It corresponds to angle $$2\\pi$$ (full rotation).\n- Step 2: A sector of angle $$\\theta$$ (in radians) occupies fraction $$\\tfrac{\\theta}{2\\pi}$$ of the disc.\n- Step 3: So its area is $$\\tfrac{\\theta}{2\\pi}\\cdot \\pi r^2 = \\tfrac{1}{2}r^2\\theta$$ ŌĆö a pure ratio argument.\n\nThis derivation requires no calculus ŌĆö just the disc formula and proportional reasoning.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_83", "judge_pick": false}, {"question": "What happens in $$r = a(p + q\\cos\\theta)$$ if $$q > p$$ (both still positive)? (3 steps)", "answer": "- Step 1: $$r$$ becomes negative when $$\\cos\\theta < -p/q$$. The range of valid $$\\theta$$ is restricted.\n- Step 2: Under Edexcel $$r \\geq 0$$ convention: the curve only exists where $$p + q\\cos\\theta \\geq 0$$, so the curve is not a full closed loop ŌĆö it has gaps.\n- Step 3: Under the general convention (allowing $$r<0$$): the curve develops an inner loop ŌĆö the \"negative $$r$$\" part corresponds to a small loop inside the main one.\n\nThe relative size of $$p$$ and $$q$$ determines topology: $$p \\geq q$$ simple loop; $$p < q$$ inner loop (in relaxed convention) or partial curve (strict).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_84", "judge_pick": true}, {"question": "For the curve $$r = a(1 + \\tan\\theta)$$ on $$0 \\leq \\theta < \\pi/2$$, find where the tangent is perpendicular to the initial line. (5 steps)", "answer": "- Step 1: $$x = r\\cos\\theta = a(\\cos\\theta + \\tan\\theta\\cos\\theta) = a(\\cos\\
