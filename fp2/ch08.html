<script>
const DATA={"selected": [{"question": "When a polar curve $$r = f(\\theta)$$ has $$dy/d\\theta = 0$$ AND $$dx/d\\theta = 0$$ at the same $$\\theta_0$$, what does this geometrically indicate? (3 steps)", "answer": "- Step 1: Both derivatives vanishing means the parametric \"velocity\" $$(dx/d\\theta, dy/d\\theta)$$ is zero ŌĆö the parametrisation has a stationary point.\n- Step 2: The curve momentarily comes to rest at this parameter value, but the curve is still defined; it just isn't moving.\n- Step 3: This typically signals a cusp ŌĆö a sharp point where the curve reverses direction. The tangent at this point isn't well-defined by $$dy/dx$$ (since $$0/0$$), but a limit calculation can recover it.\n+ Example: Cardioid $$r = a(1 + \\cos\\theta)$$ at $$\\theta = \\pi$$ ŌĆö both vanish, and the cardioid has a cusp at the pole.\n\nCusps in polar curves often arise where the curve passes through the pole.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_66"}, {"question": "In the formula $$y = r\\sin\\theta$$, when we compute $$\\tfrac{dy}{d\\theta}$$ for finding horizontal tangents, why do we need the product rule? (3 steps)", "answer": "- Step 1: $$y = r\\sin\\theta$$ is a product of *two* functions of $$\\theta$$: $$r$$ itself depends on $$\\theta$$ (since $$r = f(\\theta)$$), and $$\\sin\\theta$$ obviously depends on $$\\theta$$.\n- Step 2: Product rule: $$\\tfrac{dy}{d\\theta} = \\tfrac{dr}{d\\theta}\\sin\\theta + r\\cos\\theta$$.\n- Step 3: Forgetting the product rule (treating $$r$$ as a constant) misses how the curve's radial motion contributes to $$y$$'s rate of change.\n\nIn polar, $$r$$ is not a constant ŌĆö it's a function of $$\\theta$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_75"}, {"question": "Visualise the curve $$r = a(4 + 3\\cos\\theta)$$. Without computing exact tangent points, why does it have a dimple, and roughly where? (3 steps)", "answer": "- Step 1: Identify $$p = 4$$, $$q = 3$$. Since $$p < 2q = 6$$, the curve has a dimple.\n- Step 2: The dimple occurs near $$\\theta = \\pi$$ ŌĆö that's where $$r$$ is smallest. At $$\\theta = \\pi$$, $$r = a(4-3) = a$$. At $$\\theta = 0$$, $$r = a(4+3) = 7a$$.\n- Step 3: So the curve bulges to the right (max $$7a$$) and dimples on the left (min $$a$$). The dimple is a local concavity in the boundary near the negative $$x$$-axis.\n\nThe qualitative test ($$p$$ vs $$2q$$) immediately tells you the shape without integrating.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_50"}, {"question": "Why doesn't division by $$r$$ (in simplifying $$r^2 = \\text{const}\\cdot r$$) cause issues when the origin is on the curve? (3 steps)", "answer": "- Step 1: Division by $$r$$ is only problematic at $$r = 0$$. At every other point, the two equations $$r^2 = ar$$ and $$r = a$$ are equivalent.\n- Step 2: At $$r = 0$$, both sides of $$r^2 = ar$$ are zero ŌĆö a trivial solution. The divided equation $$r = a$$ (where $$a$$ is a function of $$\\theta$$) may still admit $$r = 0$$ at specific $$\\theta$$.\n- Step 3: For circles through the origin like $$r^2 = 2ar\\cos\\theta$$, the simplified $$r = 2a\\cos\\theta$$ recovers the origin at $$\\theta = \\pi/2$$, so nothing is lost.\n\nRule of thumb: after dividing by $$r$$, check whether $$r = 0$$ still belongs to the simplified solution set.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_91"}, {"question": "For the curve with equation $$r = a(1+\\cos\\theta)$$, what is the geometric meaning of the tangent at the pole (where $$r = 0$$)? (3 steps)", "answer": "- Step 1: At the cusp/pole, both $$\\tfrac{dx}{d\\theta}$$ and $$\\tfrac{dy}{d\\theta}$$ are zero ŌĆö no well-defined tangent in the usual parametric sense.\n- Step 2: However, we can ask about the *limiting* tangent direction. For a curve $$r = f(\\theta)$$ touching the pole at $$\\theta = \\theta_0$$ (meaning $$f(\\theta_0) = 0$$), the tangent line *at the pole* is in the direction $$\\theta = \\theta_0$$.\n- Step 3: For the cardioid, $$r = 0$$ at $$\\theta = \\pi$$, so the tangent at the cusp is along the negative $$x$$-axis ŌĆö horizontal. This matches \"tangent parallel to initial line at $$(0, \\pi)$$\".\n\nHeuristic: *if $$r = 0$$ at $$\\theta = \\theta_0$$, the curve's tangent at the pole points in direction $$\\theta_0$$.*", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_41"}, {"question": "Conceptually, why does the area formula give the correct answer regardless of orientation (clockwise vs anticlockwise) for a polar curve? (3 steps)", "answer": "- Step 1: In Cartesian (Green's theorem), area depends on orientation ŌĆö clockwise gives negative, anticlockwise positive.\n- Step 2: In polar, the integrand is $$\\frac{1}{2}r^2$$, always positive. The element is positive whenever $$r$$ is real and $$d\\theta > 0$$.\n- Step 3: As long as you integrate with $$\\beta > \\alpha$$ (anticlockwise sweep), the result is automatically positive ŌĆö sum of pie slices.\n+ Sweeping clockwise ($$d\\theta < 0$$) makes the integral negative, but you'd take absolute value.\n+ The formula's symmetry comes from $$r^2 \\geq 0$$ unconditionally.\n\nSo polar integration is \"orientation-independent\" up to sign on $$d\\theta$$ ŌĆö simpler than Cartesian.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_87"}, {"question": "Why does a polar curve $$r = f(\\theta)$$ become \"closed\" when $$f$$ is periodic, but spirals like $$r = a\\theta$$ are open? (3 steps)", "answer": "- Step 1: A closed curve returns to its start as $$\\theta$$ varies over some period $$T$$. This requires $$f(\\theta + T) = f(\\theta)$$.\n- Step 2: For $$f$$ involving only $$\\sin\\theta$$, $$\\cos\\theta$$, etc., the period is $$2\\pi$$ ŌĆö curves close after one rotation. Examples: cardioid, lima├¦on, circle.\n- Step 3: For $$f(\\theta) = a\\theta$$ or $$f(\\theta) = e^{k\\theta}$$, $$f$$ is monotonically increasing and never returns to a previous value ŌĆö the curve never closes.\n+ Adding periodic to non-periodic ($$r = a\\theta + b\\sin\\theta$$) gives a \"wavy spiral\" ŌĆö still not closed.\n\nClosedness Ōåö periodicity of $$f(\\theta)$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_57"}, {"question": "When converting the polar equation $$r = a\\cos\\theta$$ to Cartesian form, why does multiplying both sides by $$r$$ help, and what curve does it produce? (4 steps)", "answer": "- Step 1: The polar equation has $$r$$ on the left and $$\\cos\\theta$$ on the right ŌĆö these need to become Cartesian variables. We know $$r\\cos\\theta = x$$ and $$r^2 = x^2 + y^2$$, but we have a \"lone\" $$r$$ and a \"lone\" $$\\cos\\theta$$, not yet usable.\n- Step 2: Multiply both sides by $$r$$: $$r^2 = ar\\cos\\theta$$. Now LHS is $$x^2 + y^2$$ and RHS becomes $$ax$$.\n- Step 3: This gives $$x^2 + y^2 = ax$$. Complete the square: $$(x - a/2)^2 + y^2 = (a/2)^2$$.\n- Step 4: A circle of radius $$a/2$$ centred at $$(a/2, 0)$$ ŌĆö passing through the origin.\n\nThe \"multiply by $$r$$\" trick: every term picks up either an $$r^2$$ or an $$r\\cos\\theta$$/$$r\\sin\\theta$$, all of which translate directly to Cartesian.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_6"}, {"question": "What does $$\\theta = \\alpha$$ represent, and why is it only a half-line, not a full line? (3 steps)", "answer": "- Step 1: $$\\theta = \\alpha$$ says the direction from the origin is fixed at angle $$\\alpha$$, while $$r$$ is free to take any non-negative value.\n- Step 2: Because we conventionally require $$r \\geq 0$$, only the points in the direction $$\\alpha$$ are included ŌĆö the ray starting at $$O$$ going outward.\n- Step 3: The opposite half of the line lies in direction $$\\alpha + \\pi$$, which is a *different* polar equation. To get the full line, you would write $$\\theta = \\alpha$$ AND $$\\theta = \\alpha + \\pi$$ together.\n\nHalf-line vs full line is the price of the convention $$r \\geq 0$$ ŌĆö the geometry remembers direction.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_14"}, {"question": "Derive conceptually the area of one petal of $$r = a\\sin 4\\theta$$, explaining each step. (5 steps)", "answer": "- Step 1: Identify the $$\\theta$$-range for one petal. $$r = a\\sin 4\\theta \\geq 0$$ when $$4\\theta \\in [0,\\pi]$$, i.e. $$\\theta \\in [0, \\pi/4]$$.\n- Step 2: Area $$= \\tfrac{1}{2}\\int_0^{\\pi/4} a^2 \\sin^2 4\\theta\\, d\\theta$$.\n- Step 3: Use the identity $$\\sin^2 u = \\tfrac{1 - \\cos 2u}{2}$$, so $$\\sin^2 4\\theta = \\tfrac{1 - \\cos 8\\theta}{2}$$.\n- Step 4: The integral becomes $$\\tfrac{a^2}{4}\\int_0^{\\pi/4}(1 - \\cos 8\\theta)d\\theta = \\tfrac{a^2}{4}\\left[\\theta - \\tfrac{\\sin 8\\theta}{8}\\right]_0^{\\pi/4}$$.\n- Step 5: Evaluate: at $$\\theta = \\pi/4$$, $$\\sin(2\\pi) = 0$$, giving $$\\tfrac{\\pi}{4}$$; minus $$0$$ at $$\\theta=0$$. So area $$= \\tfrac{a^2\\pi}{16}$$.\n\nThis is *not* equal to $$\\tfrac{1}{8}$$ of the total integrated \"area\" ŌĆö confirming naive division fails.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_26"}, {"question": "For a polar curve that is traced *twice* as $$\\theta$$ ranges over its natural interval, how does this affect area computation? (3 steps)", "answer": "- Step 1: If the curve is traced exactly once, integrating $$\\tfrac{1}{2}r^2$$ over the full interval gives the true area.\n- Step 2: If traced twice (retraced), the integral over $$[0, 2\\pi]$$ would double-count the area.\n- Step 3: Fix: either restrict the limits to a sub-range where the curve is traced once, or compute the full integral and divide by 2.\n\nWhen in doubt, sketch and trace a small range of $$\\theta$$ to see how many times you sweep around.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_97"}, {"question": "Why might converting a polar equation to Cartesian form make it harder to sketch the curve? Give an example. (2 steps)", "answer": "- Step 1: Many polar curves have elegant, simple shapes (cardioids, spirals, rose curves) that are easy to visualize from their polar form, but become complicated, implicit Cartesian equations.\n- Step 2: For example, r = a(1 + cos ╬Ė) (a simple cardioid) becomes (x┬▓ + y┬▓ - ax)┬▓ = a┬▓(x┬▓ + y┬▓) in Cartesian form ŌĆö much harder to recognize and sketch. The polar form immediately tells you it's heart-shaped and symmetric about the x-axis.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_43"}, {"question": "Prove that for the curve r = a(p + q cos ╬Ė), it's convex when p Ōēź 2q and has a dimple when p < 2q. (4 steps)", "answer": "- Step 1: Write x = r cos ╬Ė = a(p cos ╬Ė + q cos┬▓╬Ė). Differentiate: dx/d╬Ė = a(-p sin ╬Ė - 2q cos ╬Ė sin ╬Ė) = -a sin ╬Ė(p + 2q cos ╬Ė)\n- Step 2: Vertical tangents (perpendicular to initial line) occur when dx/d╬Ė = 0, giving sin ╬Ė = 0 (╬Ė = 0 or ŽĆ) or cos ╬Ė = -p/(2q)\n- Step 3: If p < 2q, then -p/(2q) > -1, so cos ╬Ė = -p/(2q) has two solutions in the 2nd and 3rd quadrants, giving two additional vertical tangents. This creates the \"dimple\"ŌĆöthe curve bends inward between these tangents.\n- Step 4: If p Ōēź 2q, then -p/(2q) Ōēż -1, so cos ╬Ė = -p/(2q) has no valid solutions. Only the tangents at ╬Ė = 0 and ╬Ė = ŽĆ exist, meaning the curve is convex (no inward bending). At p = 2q, the solution is exactly at ╬Ė = ŽĆ (the boundary case)", "source": "MiniMax ŌæĪ", "_id": "minimax_2_20"}, {"question": "To find the area of one loop of $$r = a\\sin 4\\theta$$, why can't you simply integrate $$\\frac{1}{2}r^2$$ from $$0$$ to $$2\\pi$$ and divide by 4? (2 steps)", "answer": "- Step 1: The curve $$r = a\\sin 4\\theta$$ has 4 loops where $$r > 0$$, but it also has 4 loops where $$r < 0$$ (which are drawn in the opposite direction). Integrating $$\\frac{1}{2}r^2$$ from $$0$$ to $$2\\pi$$ calculates the area of *all 8 loops* because $$r^2$$ is positive regardless of the sign of $$r$$.\n- Step 2: Dividing this total area by 4 gives an incorrect answer because it effectively averages the positive $$r$$ loops and the negative $$r$$ loops. You must instead find the exact angular bounds where $$r \\geq 0$$ for one specific loop (e.g., $$0 \\leq \\theta \\leq \\frac{\\pi}{4}$$) and integrate over just that range.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_17"}, {"question": "For the curve $$r^2 = a^2 \\cos 2\\theta$$ (a lemniscate), what determines the range of $$\\theta$$ for which the curve exists? (3 steps)", "answer": "- Step 1: We need $$r^2 \\geq 0$$, i.e. $$\\cos 2\\theta \\geq 0$$.\n- Step 2: $$\\cos 2\\theta \\geq 0$$ when $$2\\theta \\in [-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}] \\cup [\\tfrac{3\\pi}{2}, \\tfrac{5\\pi}{2}]$$, i.e. $$\\theta \\in [-\\tfrac{\\pi}{4}, \\tfrac{\\pi}{4}] \\cup [\\tfrac{3\\pi}{4}, \\tfrac{5\\pi}{4}]$$.\n- Step 3: On each interval, $$r$$ grows from $$0$$ (at the edges) to $$a$$ (in the middle) and back to $$0$$ ŌĆö forming a single petal. Two petals sit symmetrically along the $$x$$-axis, making the classic figure-of-eight (lemniscate).\n\nThe condition $$r^2 \\geq 0$$ is a genuine constraint when you have $$r^2 = \\ldots$$ equations; it carves out where the curve actually lives.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_21"}, {"question": "For curves of the form $$r = a(p + q\\cos\\theta)$$, explain the visual difference between the cases where $$p > 2q$$, $$q < p < 2q$$, and $$p = q$$. (3 steps)", "answer": "- Step 1: If $$p = q$$, the curve is a **cardioid** (heart-shaped), coming to a sharp point (cusp) at the pole when $$\\theta = \\pi$$.\n- Step 2: If $$p > 2q$$, the curve is convex (egg-shaped) because it bulges outward smoothly and never indents.\n- Step 3: If $$q < p < 2q$$, the curve has a **dimple** near $$\\theta = \\pi$$. It is concave at the point opposite the initial line, causing a small inward indentation. The boundary case $$p = 2q$$ is convex but flat at $$\\theta = \\pi$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_9"}, {"question": "Geometrically, what is the area formula $$\\text{Area} = \\frac{1}{2}\\int_\\alpha^\\beta r^2 \\, d\\theta$$ computing, and how is it derived from the area of a sector? (3 steps)", "answer": "- Step 1: A circular sector of radius $$r$$ and angle $$d\\theta$$ has area $$\\frac{1}{2}r^2 \\, d\\theta$$ (from the sector formula $$\\frac{1}{2}r^2\\theta$$ applied to a tiny angle).\n- Step 2: For a polar curve $$r = f(\\theta)$$, slice the bounded region into infinitely thin \"pie slices\" between angles $$\\theta$$ and $$\\theta + d\\theta$$. Each is a tiny sector of radius $$r(\\theta)$$.\n- Step 3: Sum (integrate) the infinitesimal sector areas from $$\\alpha$$ to $$\\beta$$: $$\\text{Area} = \\int_\\alpha^\\beta \\frac{1}{2}r^2 \\, d\\theta$$.\n\nThe formula is fundamentally a sum of pie-slice areas ŌĆö this is why $$r^2$$ (not $$r$$) appears, and why areas can never be \"negative\" in this setup.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_25"}, {"question": "What happens in $$r = a(p + q\\cos\\theta)$$ if $$q > p$$ (both still positive)? (3 steps)", "answer": "- Step 1: $$r$$ becomes negative when $$\\cos\\theta < -p/q$$. The range of valid $$\\theta$$ is restricted.\n- Step 2: Under Edexcel $$r \\geq 0$$ convention: the curve only exists where $$p + q\\cos\\theta \\geq 0$$, so the curve is not a full closed loop ŌĆö it has gaps.\n- Step 3: Under the general convention (allowing $$r<0$$): the curve develops an inner loop ŌĆö the \"negative $$r$$\" part corresponds to a small loop inside the main one.\n\nThe relative size of $$p$$ and $$q$$ determines topology: $$p \\geq q$$ simple loop; $$p < q$$ inner loop (in relaxed convention) or partial curve (strict).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_84"}, {"question": "Why does using the trig identity $$\\cos^2\\theta = (1 + \\cos 2\\theta)/2$$ make polar area computations tractable? (3 steps)", "answer": "- Step 1: Polar area integrals always involve $$r^2$$, which expands to terms with $$\\cos^2$$, $$\\sin^2$$, or $$\\cos\\theta\\sin\\theta$$. Direct integration of these isn't immediate.\n- Step 2: Double-angle identities convert these \"second-power\" trig functions into linear combinations of $$1$$ and $$\\cos(2\\theta)$$ (or $$\\sin(2\\theta)$$) ŌĆö both of which integrate trivially.\n- Step 3: The identities come from $$\\cos 2\\theta = 2\\cos^2\\theta - 1 = 1 - 2\\sin^2\\theta$$ (using $$\\cos^2 + \\sin^2 = 1$$):\n+ $$\\cos^2\\theta = (1 + \\cos 2\\theta)/2$$\n+ $$\\sin^2\\theta = (1 - \\cos 2\\theta)/2$$\n\nWithout these, polar area calculations would need special techniques. With them, everything collapses to constants and single trig functions.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_28"}, {"question": "Are polar coordinates unique for a given point? Give two ways to write the same point.", "answer": "No ŌĆö polar coordinates are not unique because adding $$2\\pi$$ to $$\\theta$$ rotates by a full turn, returning to the same point. So $$(r, \\theta)$$ and $$(r, \\theta + 2\\pi k)$$ describe the same point for any integer $$k$$. For example, $$(13, -1.176)$$ is the same point as $$(13, -1.176 + 2\\pi) = (13, 5.107)$$. Additionally, the pole itself ($$r = 0$$) corresponds to every angle ŌĆö $$(0, \\theta)$$ is the origin for any $$\\theta$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_5"}, {"question": "Find the points on the cardioid $$r = a(1+\\cos\\theta)$$ where the tangent is parallel to the initial line. Work through the derivation. (5 steps)", "answer": "- Step 1: Compute $$y = r\\sin\\theta = a(1+\\cos\\theta)\\sin\\theta = a(\\sin\\theta + \\sin\\theta\\cos\\theta)$$.\n- Step 2: Differentiate using product rule: $$\\tfrac{dy}{d\\theta} = a(\\cos\\theta + \\cos^2\\theta - \\sin^2\\theta) = a(2\\cos^2\\theta + \\cos\\theta - 1)$$ using $$\\sin^2\\theta = 1-\\cos^2\\theta$$.\n- Step 3: Set to zero: $$2\\cos^2\\theta + \\cos\\theta - 1 = 0$$. Factor as $$(2\\cos\\theta - 1)(\\cos\\theta + 1) = 0$$.\n- Step 4: Either $$\\cos\\theta = \\tfrac{1}{2}$$ giving $$\\theta = \\pm\\tfrac{\\pi}{3}$$ with $$r = \\tfrac{3a}{2}$$; or $$\\cos\\theta = -1$$ giving $$\\theta = \\pi$$ with $$r = 0$$ (the cusp/pole).\n- Step 5: The two genuine horizontal tangent points are $$\\left(\\tfrac{3a}{2}, \\pm\\tfrac{\\pi}{3}\\right)$$; at $$(0, \\pi)$$ we have a singular cusp.\n\nThe topmost/bottommost points of the cardioid are at $$\\theta = \\pm\\pi/3$$, not at $$\\theta = \\pm\\pi/2$$ as one might naively guess.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_31"}, {"question": "Misconception: \"negative $$r$$ values represent points in the opposite direction, so I should include them when sketching $$r = \\sin 3\\theta$$.\" Why does Edexcel FP2 reject this interpretation? (3 steps)", "answer": "- Step 1: Some textbooks allow $$r < 0$$: $$(r, \\theta)$$ with $$r < 0$$ means the point $$(|r|, \\theta + \\pi)$$. This creates extra petals in $$r = \\sin 3\\theta$$.\n- Step 2: Edexcel FP2 convention is $$r \\geq 0$$: if $$f(\\theta) < 0$$, the curve simply doesn't exist at that $$\\theta$$. So $$r = \\sin 3\\theta$$ has only 3 petals, not 6.\n- Step 3: The choice affects the petal count: under $$r \\geq 0$$ convention, $$r = \\sin(n\\theta)$$ gives $$n$$ petals (odd $$n$$) or $$2n$$ petals (even $$n$$); under the relaxed convention, always $$2n$$.\n\nKnow your textbook's convention ŌĆö it changes the answer, not just the phrasing.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_44"}, {"question": "When converting the Cartesian line equation $$y\\sqrt{3} = x + 4$$ to a polar equation, how does expressing the line in the harmonic form $$R\\sin(\\theta - \\alpha)$$ help simplify the result? (3 steps)", "answer": "- Step 1: Substitute $$x = r\\cos\\theta$$ and $$y = r\\sin\\theta$$ to get $$r\\sqrt{3}\\sin\\theta = r\\cos\\theta + 4$$. Isolate the terms with $$r$$: $$r(\\sqrt{3}\\sin\\theta - \\cos\\theta) = 4$$.\n- Step 2: To combine the trig terms, divide by the amplitude $$R = \\sqrt{(\\sqrt{3})^2 + (-1)^2} = 2$$. This gives $$r\\left(\\frac{\\sqrt{3}}{2}\\sin\\theta - \\frac{1}{2}\\cos\\theta\\right) = 2$$.\n- Step 3: Recognize the angle subtraction identity: $$\\sin(\\theta - \\alpha) = \\sin\\theta\\cos\\alpha - \\cos\\theta\\sin\\alpha$$. Matching coefficients gives $$\\cos\\alpha = \\frac{\\sqrt{3}}{2}$$ and $$\\sin\\alpha = \\frac{1}{2}$$, so $$\\alpha = \\frac{\\pi}{6}$$. The polar equation becomes $$r\\sin\\left(\\theta - \\frac{\\pi}{6}\\right) = 2$$, or $$r = 2\\operatorname{cosec}\\left(\\theta - \\frac{\\pi}{6}\\right)$$.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_4"}, {"question": "When converting Cartesian to polar, why do circles through the origin admit particularly compact polar forms compared to off-centre circles? (3 steps)", "answer": "- Step 1: Cartesian equation is symmetric in how it treats $$(x, y)$$ ŌĆö no preferred origin or angle. Different polar pole choices give different polar forms.\n- Step 2: When the pole is *on* the curve (e.g., circle through origin), the curve passes through $$r = 0$$ at some angle. This makes the polar form lose its \"constant\" term: $$r = a\\cos\\theta + b\\sin\\theta$$ (no constant).\n- Step 3: Off-centre circles (not through origin) have $$r > 0$$ everywhere ŌĆö their polar forms are messier, e.g., requiring $$r^2 - 2ar\\cos\\theta\\cos\\alpha + a^2 = R^2$$ type expressions.\n+ The \"nicest\" polar form is obtained when the pole has geometric significance (on the curve, or at a focus/centre).\n\nPolar form is \"natural\" when the chosen pole has geometric meaning for the curve.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_69"}, {"question": "Why is it dangerous to compute $$\\theta = \\arctan(y/x)$$ mechanically without thinking about the quadrant? (3 steps)", "answer": "- Step 1: The function $$\\arctan$$ has range $$(-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2})$$ ŌĆö it only gives answers in the right half-plane.\n- Step 2: But $$\\tan\\theta$$ is $$\\pi$$-periodic, so $$(x,y)$$ and $$(-x,-y)$$ give the same ratio $$y/x$$. For example, $$(1,1)$$ and $$(-1,-1)$$ both give $$\\arctan(1) = \\pi/4$$, but they sit in opposite quadrants.\n- Step 3: The remedy is to always draw a sketch and, if the point is in the second or third quadrant, add $$\\pi$$ (or subtract it) to the raw $$\\arctan$$ output. Think of $$\\arctan(y/x)$$ as giving the \"acute-angle direction\" that must then be corrected to the actual quadrant.\n\nAlways sketch first; never trust $$\\arctan$$ alone.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_3"}, {"question": "Conceptually, why does a cardioid have exactly three points where the tangent is horizontal (counting the cusp at the pole)? (4 steps)", "answer": "- Step 1: The cardioid is a smooth closed curve except at one cusp (at the pole, where $$\\theta = \\pi$$).\n- Step 2: A smooth *convex* closed curve has exactly two horizontal tangents (topmost and bottommost), but the cardioid is *not* convex ŌĆö it has a dimple/cusp.\n- Step 3: The cusp \"bends\" the curve extra, creating two symmetric bulges on top and bottom, each with its own horizontal tangent (at $$\\theta = \\pm\\pi/3$$).\n- Step 4: Plus the cusp at $$\\theta = \\pi$$ itself, where the curve's tangent direction jumps ŌĆö a singular \"tangent\" point.\n\nSo: 2 genuine horizontal tangents + 1 singular cusp = 3 points.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_34"}, {"question": "Convert the polar equation $$r^2 = \\sin 2\\theta$$ into a Cartesian equation. (3 steps)", "answer": "- Step 1: Use the double angle identity $$\\sin 2\\theta \\equiv 2\\sin\\theta\\cos\\theta$$ to rewrite the equation as $$r^2 = 2\\sin\\theta\\cos\\theta$$.\n- Step 2: Multiply both sides by $$r^2$$ to introduce the Cartesian substitutions $$x$$ and $$y$$. This yields $$r^4 = 2(r\\sin\\theta)(r\\cos\\theta)$$.\n- Step 3: Substitute $$r^2 = x^2 + y^2$$, $$r\\sin\\theta = y$$, and $$r\\cos\\theta = x$$. This gives the Cartesian equation $$(x^2+y^2)^2 = 2xy$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_5"}, {"question": "Derive the formula for the area of a region swept out by a polar curve from $$\\theta = \\alpha$$ to $$\\theta = \\beta$$. (4 steps)", "answer": "- Step 1: Imagine slicing the region into tiny angular wedges at angle $$\\theta$$ and thickness $$d\\theta$$. Each wedge is approximately a circular sector of radius $$r(\\theta)$$.\n- Step 2: The area of a circular sector with radius $$R$$ and angle $$d\\theta$$ (in radians) is $$\\tfrac{1}{2}R^2\\, d\\theta$$. This comes from taking a fraction of the disc area: $$\\tfrac{d\\theta}{2\\pi}\\cdot \\pi R^2 = \\tfrac{1}{2}R^2\\,d\\theta$$.\n- Step 3: Substitute $$R = r(\\theta)$$ and add up (integrate) all the wedges: $$\\text{Area} = \\tfrac{1}{2}\\int_\\alpha^\\beta r^2\\, d\\theta$$.\n- Step 4: The $$r^2$$ and the $$\\tfrac{1}{2}$$ are both geometric consequences of the sector formula ŌĆö neither is an arbitrary constant.\n\nThe polar area formula is just \"sum of sector areas\" in the limit.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_23"}, {"question": "Conceptually, why are the two formulas ŌĆö Cartesian distance $$\\sqrt{(x_1-x_2)^2+(y_1-y_2)^2}$$ and polar distance $$\\sqrt{r_1^2+r_2^2-2r_1r_2\\cos(\\theta_1-\\theta_2)}$$ ŌĆö fundamentally describing the same thing? (4 steps)", "answer": "- Step 1: Both compute Euclidean distance between two points in the plane, just expressed in different coordinate systems.\n- Step 2: Cartesian uses coordinate differences in two perpendicular directions.\n- Step 3: Polar uses the cosine rule from the triangle formed by the two points and the origin.\n- Step 4: To verify equivalence, substitute $$x_i = r_i\\cos\\theta_i$$, $$y_i = r_i\\sin\\theta_i$$ into the Cartesian formula:\n+ Expand and use $$\\cos^2 + \\sin^2 = 1$$: $$d^2 = r_1^2 + r_2^2 - 2r_1r_2(\\cos\\theta_1\\cos\\theta_2 + \\sin\\theta_1\\sin\\theta_2)$$.\n+ Recognise: $$\\cos\\theta_1\\cos\\theta_2 + \\sin\\theta_1\\sin\\theta_2 = \\cos(\\theta_1 - \\theta_2)$$.\n+ So $$d^2 = r_1^2 + r_2^2 - 2r_1r_2\\cos(\\theta_1-\\theta_2)$$. Ō£ō\n\nEquivalent ŌĆö same geometric truth in different languages.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_75"}, {"question": "Conceptually, why does the polar distance formula $$d = \\sqrt{r_1^2 + r_2^2 - 2r_1r_2\\cos(\\theta_1 - \\theta_2)}$$ look like the cosine rule? (4 steps)", "answer": "- Step 1: This IS the cosine rule. For a triangle with sides $$a$$, $$b$$, and included angle $$C$$, the opposite side is $$c = \\sqrt{a^2 + b^2 - 2ab\\cos C}$$.\n- Step 2: For points $$(r_1, \\theta_1)$$ and $$(r_2, \\theta_2)$$, form a triangle with the pole:\n+ Side from origin to first point: length $$r_1$$.\n+ Side from origin to second point: length $$r_2$$.\n+ Angle between them at origin: $$|\\theta_1 - \\theta_2|$$.\n- Step 3: The third side connects the two points, with length $$d$$.\n- Step 4: Apply cosine rule directly: $$d^2 = r_1^2 + r_2^2 - 2r_1r_2\\cos(\\theta_1 - \\theta_2)$$.\n\nPolar coordinates naturally express distances in terms of triangles based at the pole.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_24"}, {"question": "Why does any equation of the form $$r = a\\cos\\theta + b\\sin\\theta$$ (with constants $$a, b$$) always represent a circle through the origin? (3 steps)", "answer": "- Step 1: Multiply by $$r$$: $$r^2 = ar\\cos\\theta + br\\sin\\theta$$, giving $$x^2 + y^2 = ax + by$$.\n- Step 2: Rearrange and complete the square: $$(x - a/2)^2 + (y - b/2)^2 = (a/2)^2 + (b/2)^2$$.\n- Step 3: This is a circle of radius $$\\frac{1}{2}\\sqrt{a^2 + b^2}$$ centred at $$(a/2, b/2)$$.\n+ The origin is on the circle: substituting $$(0, 0)$$ gives $$(a/2)^2 + (b/2)^2$$, matching the RHS.\n+ The diameter from origin to centre direction has length equal to the radius times 2.\n\nSo $$r = a\\cos\\theta + b\\sin\\theta$$ is the canonical polar form for \"circle through origin\".", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_16"}, {"question": "Connect the polar form $$r = 2a\\cos\\theta$$ of a circle to its geometric meaning via Thales's theorem. (3 steps)", "answer": "- Step 1: $$r = 2a\\cos\\theta$$ represents a circle of radius $$a$$ centred at $$(a, 0)$$ ŌĆö a circle with diameter along the $$x$$-axis, passing through the origin.\n- Step 2: Thales's theorem: any triangle inscribed in a circle with one side as diameter has a right angle at the opposite vertex. So for any point $$P$$ on this circle, the triangle $$O,P,D$$ (where $$D=(2a,0)$$ is the diameter endpoint) is right-angled at $$P$$.\n- Step 3: In that right triangle, $$OP = OD\\cos\\theta = 2a\\cos\\theta$$ where $$\\theta = \\angle POD$$. So $$r = 2a\\cos\\theta$$ literally *is* the chord length of the circle from the origin at angle $$\\theta$$.\n\nPolar form makes the \"diameter-through-origin\" chord structure of the circle explicit.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_66"}, {"question": "Intuitively, why does $$d\\theta$$ appear in the polar area element (rather than, say, $$dr$$)? (3 steps)", "answer": "- Step 1: At each angle $$\\theta$$, an infinitesimal change $$d\\theta$$ spans an angular range. The wedge formed has a fixed outer curve.\n- Step 2: The slice's width (measured at outer edge) is $$r\\, d\\theta$$ (arc length); its radial depth is $$r$$ (from pole to curve).\n- Step 3: So the slice's area is like a thin sector: $$\\tfrac{1}{2}r\\cdot(r\\, d\\theta) = \\tfrac{1}{2}r^2\\, d\\theta$$. The \"density\" in $$\\theta$$ determines how much angular territory each piece covers.\n\nThe sector formula is \"arc length ├Ś half-depth\" in the infinitesimal limit.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_80"}, {"question": "How can a locus on an Argand diagram, such as $$|z - 3 - 4i| = 5$$, be represented as a polar curve? (3 steps)", "answer": "- Step 1: Write the Cartesian equation of the locus: $$(x-3)^2 + (y-4)^2 = 25$$.\n- Step 2: Substitute $$x = r\\cos\\theta$$ and $$y = r\\sin\\theta$$: $$(r\\cos\\theta - 3)^2 + (r\\sin\\theta - 4)^2 = 25$$.\n- Step 3: Expand and use $$\\cos^2\\theta + \\sin^2\\theta = 1$$: $$r^2 - 6r\\cos\\theta - 8r\\sin\\theta + 25 = 25 \\implies r^2 = r(6\\cos\\theta + 8\\sin\\theta)$$. Dividing by $$r$$ gives the polar curve $$r = 6\\cos\\theta + 8\\sin\\theta$$. This works because on an Argand diagram, $$z = re^{i\\theta}$$.", "source": "GLM 5.1 Ōæó", "_id": "glm_3_14"}, {"question": "Why does $$dy/d\\theta = 0$$ correspond to a tangent parallel to the initial line, not perpendicular to it? (3 steps)", "answer": "- Step 1: A tangent is parallel to the $$x$$-axis (initial line) when its slope $$dy/dx = 0$$ ŌĆö i.e., $$y$$ is momentarily not changing as we move along the curve.\n- Step 2: In parametric form, $$\\frac{dy}{dx} = \\frac{dy/d\\theta}{dx/d\\theta}$$ equals zero when the numerator $$dy/d\\theta = 0$$ (provided $$dx/d\\theta \\neq 0$$).\n- Step 3: So $$dy/d\\theta = 0$$ marks where $$y$$ has a critical point as a function of $$\\theta$$ ŌĆö these are the highest/lowest points the curve reaches, where the tangent is horizontal.\n\nBy symmetry, $$dx/d\\theta = 0$$ marks the leftmost/rightmost points, where the tangent is vertical.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_38"}, {"question": "Visual intuition: why are cardioids and lima├¦ons sometimes confused with \"constant-angle\" curves, and why is that characterization actually wrong? (3 steps)", "answer": "- Step 1: A constant-angle curve is one where the angle between the tangent and the radial direction is fixed everywhere ŌĆö this describes the logarithmic spiral $$r = ae^{b\\theta}$$.\n- Step 2: For cardioids and lima├¦ons, the tangent-radius angle varies with position ŌĆö they are *not* constant-angle curves.\n- Step 3: The distinctive property of cardioids is their generating mechanism: epicycloid of one circle rolling on another of equal size. That's a rotational/kinematic property, not a tangent-angle property.\n\nEach family of polar curves has its own geometric signature; the logarithmic spiral's is constant tangent-radius angle.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_94"}, {"question": "When solving for the intersection of two polar curves, why might setting $$r_1(\\theta) = r_2(\\theta)$$ miss some intersection points? (3 steps)", "answer": "- Step 1: Two curves intersect at a point if they reach the same physical location, possibly at different parameter values.\n- Step 2: $$r_1(\\theta) = r_2(\\theta)$$ finds points where both curves give the same $$r$$ at the same $$\\theta$$ ŌĆö but polar coordinates aren't unique.\n- Step 3: Two main pitfalls:\n+ The pole: both curves might pass through the pole at *different* values of $$\\theta$$. The algebraic equation might miss this. Always check $$r = 0$$ separately for both.\n+ Multiple representations: the same point can have $$\\theta$$ on one curve and $$\\theta + 2\\pi k$$ on another.\n\nSo set equal AND independently check whether both curves hit the pole.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_49"}, {"question": "Starting from a right-angled triangle with hypotenuse of length $$r$$ meeting the positive $$x$$-axis at angle $$\\theta$$, derive the conversion formulas from polar to Cartesian. (3 steps)", "answer": "- Step 1: Drop a perpendicular from $$P$$ to the $$x$$-axis. This creates a right triangle with hypotenuse $$OP = r$$ and interior angle $$\\theta$$ at the origin.\n- Step 2: By the definition of cosine (adjacent/hypotenuse): $$\\cos\\theta = \\tfrac{x}{r}$$, so $$x = r\\cos\\theta$$. By the definition of sine (opposite/hypotenuse): $$\\sin\\theta = \\tfrac{y}{r}$$, so $$y = r\\sin\\theta$$.\n- Step 3: These formulas are not tricks ŌĆö they are just sine and cosine applied to a right triangle with the polar data labelled on it.\n\nThe conversion $$x=r\\cos\\theta$$, $$y=r\\sin\\theta$$ is just \"triangle trigonometry dressed up\".", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_1"}, {"question": "Why is a tangent parallel to the initial line characterised by $$\\tfrac{dy}{d\\theta} = 0$$, and a tangent perpendicular to the initial line by $$\\tfrac{dx}{d\\theta} = 0$$? (4 steps)", "answer": "- Step 1: A tangent line's direction is captured by $$\\tfrac{dy}{dx} = \\tfrac{dy/d\\theta}{dx/d\\theta}$$.\n- Step 2: A tangent parallel to the initial line (horizontal) has $$\\tfrac{dy}{dx} = 0$$, which happens when $$\\tfrac{dy}{d\\theta} = 0$$ (with $$\\tfrac{dx}{d\\theta} \\neq 0$$ to keep the ratio well-defined).\n- Step 3: A tangent perpendicular to the initial line (vertical) has $$\\tfrac{dy}{dx} = \\infty$$, which happens when $$\\tfrac{dx}{d\\theta} = 0$$ (with $$\\tfrac{dy}{d\\theta} \\neq 0$$).\n- Step 4: Cases where both are zero simultaneously are singular points (e.g., cusps) and need special treatment.\n\nHorizontal tangent Ōåö $$y$$ momentarily stationary in $$\\theta$$; vertical tangent Ōåö $$x$$ momentarily stationary in $$\\theta$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_30"}, {"question": "For a polar curve passing through the pole at $$\\theta = \\alpha$$, why is the line $$\\theta = \\alpha$$ automatically the tangent at the pole? (3 steps)", "answer": "- Step 1: When the curve passes through the pole at parameter $$\\theta = \\alpha$$, the curve approaches the origin along a specific direction.\n- Step 2: As $$\\theta$$ approaches $$\\alpha$$, $$r \\to 0$$ so the point $$(r\\cos\\theta, r\\sin\\theta)$$ approaches the origin. But the *direction* of approach is determined by $$\\theta$$ ŌĆö and as $$\\theta \\to \\alpha$$, the direction approaches angle $$\\alpha$$.\n- Step 3: Therefore the tangent at the pole is the line $$\\theta = \\alpha$$.\n+ This is a useful shortcut: instead of computing $$dy/dx$$ via parametric methods at $$r = 0$$, just identify the angle where $$r = 0$$.\n\nSo finding values of $$\\theta$$ where $$r(\\theta) = 0$$ tells you the tangent directions through the pole.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_42"}, {"question": "A polar curve $$r = a(1 + \\tan\\theta)$$ for $$0 \\leq \\theta < \\pi/2$$ has unusual behaviour as $$\\theta \\to \\pi/2$$. What happens, and why? (3 steps)", "answer": "- Step 1: As $$\\theta \\to \\pi/2$$, $$\\tan\\theta \\to \\infty$$, so $$r \\to \\infty$$. The curve grows unboundedly.\n- Step 2: But $$x = r\\cos\\theta = a(1 + \\tan\\theta)\\cos\\theta = a(\\cos\\theta + \\sin\\theta)$$, which approaches $$a(0 + 1) = a$$ ŌĆö finite.\n- Step 3: So the curve has a vertical asymptote at $$x = a$$: as $$r \\to \\infty$$ in direction $$\\theta \\to \\pi/2$$, the curve approaches the vertical line $$x = a$$.\n+ Sketching requires showing the asymptote.\n+ Asymptotes in polar curves often arise where $$r$$ diverges at a finite angle ŌĆö the resulting Cartesian point can still be finite.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_58"}, {"question": "For the curve $$r = e^{2\\theta}$$ over $$0 \\leq \\theta \\leq \\pi$$, conceptually explain how to find points where the tangent is perpendicular to the initial line. (4 steps)", "answer": "- Step 1: Perpendicular to initial line means vertical tangent, requiring $$dx/d\\theta = 0$$.\n- Step 2: Set up $$x = r\\cos\\theta = e^{2\\theta}\\cos\\theta$$. Differentiate using product rule: $$\\frac{dx}{d\\theta} = 2e^{2\\theta}\\cos\\theta - e^{2\\theta}\\sin\\theta = e^{2\\theta}(2\\cos\\theta - \\sin\\theta)$$.\n- Step 3: Since $$e^{2\\theta} > 0$$, set $$2\\cos\\theta - \\sin\\theta = 0$$, giving $$\\tan\\theta = 2$$.\n- Step 4: Solve in $$[0, \\pi]$$: $$\\theta = \\arctan 2 \\approx 1.107$$. Corresponding $$r = e^{2 \\cdot 1.107}$$.\n\nThe exponential growth means $$r$$ explodes, but the tangent direction depends only on the ratio $$dy/d\\theta : dx/d\\theta$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_48"}, {"question": "When you derive a polar equation of a circle through the origin from $$|z - z_0| = r_0$$ (with $$|z_0| = r_0$$), why does the result always have the form $$r = \\alpha\\cos\\theta + \\beta\\sin\\theta$$? (4 steps)", "answer": "- Step 1: $$|z - z_0|^2 = r_0^2$$ means $$(x - x_0)^2 + (y - y_0)^2 = r_0^2$$. Expand: $$x^2 - 2x_0 x + x_0^2 + y^2 - 2y_0 y + y_0^2 = r_0^2$$.\n- Step 2: Since circle passes through origin: $$x_0^2 + y_0^2 = r_0^2$$. Constants cancel: $$x^2 + y^2 = 2x_0 x + 2y_0 y$$.\n- Step 3: Substitute $$x^2 + y^2 = r^2$$, $$x = r\\cos\\theta$$, $$y = r\\sin\\theta$$: $$r^2 = 2x_0 r\\cos\\theta + 2y_0 r\\sin\\theta$$.\n- Step 4: Divide by $$r$$: $$r = 2x_0\\cos\\theta + 2y_0\\sin\\theta$$.\n\nForm: $$r = \\alpha\\cos\\theta + \\beta\\sin\\theta$$ with $$\\alpha = 2x_0$$, $$\\beta = 2y_0$$. The pole-on-curve condition kills the constant.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_73"}, {"question": "Explain why when sketching polar curves, we typically only consider values of ╬Ė that give r Ōēź 0. What happens when r is negative? (2 steps)", "answer": "- Step 1: When r is negative in polar coordinates, the point is plotted in the opposite direction from ╬Ė. For example, the point (r, ╬Ė) with r < 0 is equivalent to the point (|r|, ╬Ė + ŽĆ).\n- Step 2: Many graph-drawing programs handle negative r automatically by \"reflecting\" the point, but this can create confusion. For sketching by hand, it's clearer to only use ╬Ė values where r Ōēź 0, or to explicitly account for the reflection when r < 0.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_12"}, {"question": "Why do we use the substitution $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$ when converting the polar equation $$r^2 = \\sin 2\\theta$$ to Cartesian form? (3 steps)", "answer": "- Step 1: We want every term to translate cleanly. We have $$r\\cos\\theta = x$$ and $$r\\sin\\theta = y$$ ŌĆö but $$\\sin 2\\theta$$ alone matches neither.\n- Step 2: Using $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$, the equation becomes $$r^2 = 2\\sin\\theta\\cos\\theta$$. Multiply both sides by $$r^2$$: $$r^4 = 2(r\\sin\\theta)(r\\cos\\theta)$$.\n- Step 3: Now RHS = $$2 \\cdot y \\cdot x = 2xy$$ and LHS = $$(x^2 + y^2)^2$$, giving $$(x^2 + y^2)^2 = 2xy$$.\n\nThe trick: factor the trig function until each piece pairs with an $$r$$ to give an $$x$$ or $$y$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_36"}, {"question": "When finding tangents to polar curves, why do we set dy/d╬Ė = 0 for tangents parallel to the initial line rather than setting dy/dx = 0 directly? (2 steps)", "answer": "- Step 1: In polar coordinates, we're given r as a function of ╬Ė, not y as a function of x. We can't directly find dy/dx without first converting to parametric form.\n- Step 2: By treating ╬Ė as the parameter, we have x(╬Ė) and y(╬Ė). The chain rule gives dy/dx = (dy/d╬Ė)/(dx/d╬Ė). For a horizontal tangent (parallel to the initial line, which is the x-axis), we need the numerator dy/d╬Ė to be zero (while dx/d╬Ė ŌēĀ 0), which makes the gradient zero.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_39"}, {"question": "To find tangents to a polar curve $$r = f(\\theta)$$, why do we convert to parametric Cartesian form $$x = f(\\theta)\\cos\\theta$$, $$y = f(\\theta)\\sin\\theta$$ before differentiating? (3 steps)", "answer": "- Step 1: A \"tangent\" means a line touching the curve with a well-defined gradient $$dy/dx$$. Polar coordinates don't directly give a gradient ŌĆö they give $$r$$ as a function of $$\\theta$$, which isn't the same as a slope.\n- Step 2: By writing $$x$$ and $$y$$ as functions of parameter $$\\theta$$, we use the parametric chain rule: $$\\frac{dy}{dx} = \\frac{dy/d\\theta}{dx/d\\theta}$$.\n- Step 3: This converts polar form into a setup where standard calculus applies, allowing us to identify horizontal tangents ($$dy/d\\theta = 0$$) and vertical tangents ($$dx/d\\theta = 0$$).\n\nThe substitutions embed the polar curve into Cartesian space in a way that calculus can handle.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_37"}, {"question": "Why does the polar area integral $$\\tfrac{1}{2}\\int r^2 d\\theta$$ always give a positive area, unlike Cartesian $$\\int y\\, dx$$ which can give \"signed\" areas? (3 steps)", "answer": "- Step 1: The integrand is $$r^2$$, which is always non-negative. Contrast with $$\\int y\\, dx$$ where $$y$$ can be negative, causing regions below the $$x$$-axis to contribute negative area.\n- Step 2: Geometrically, each wedge has positive area regardless of which quadrant $$\\theta$$ lies in ŌĆö it's a sector, and sectors have positive area.\n- Step 3: You don't need to worry about subtracting areas for different quadrants. But beware: if the curve retraces itself (e.g., multi-loop curves), the integral may double-count ŌĆö so choose limits carefully.\n\nPolar trades \"sign bookkeeping\" for \"limit bookkeeping\".", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_24"}, {"question": "Two polar curves are $$r = 2 + \\cos\\theta$$ (a lima├¦on) and $$r = 5\\cos\\theta$$ (a circle). Why must the area inside both be computed by splitting the integration at $$\\theta = \\pi/3$$? (4 steps)", "answer": "- Step 1: The \"inside both\" region is bounded by the inner curve at each angle.\n- Step 2: Find intersections: $$2 + \\cos\\theta = 5\\cos\\theta$$ gives $$\\cos\\theta = 1/2$$, so $$\\theta = \\pm\\pi/3$$.\n- Step 3: Test which curve is inner in each interval:\n+ At $$\\theta = 0$$: $$r_1 = 3$$, $$r_2 = 5$$. Lima├¦on is inside.\n+ At $$\\theta = \\pi/2$$: $$r_1 = 2$$, $$r_2 = 0$$. Circle is inside.\n- Step 4: So integrate using the lima├¦on for $$|\\theta| \\leq \\pi/3$$ and the circle for $$\\pi/3 \\leq |\\theta| \\leq \\pi/2$$.\n\nTwo integrals are needed because the inner curve switches at the intersection.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_55"}, {"question": "In the polar area formula $$\\tfrac{1}{2}\\int r^2 d\\theta$$, does $$d\\theta$$ refer to a tiny angular change in radians or degrees? (3 steps)", "answer": "- Step 1: It *must* be radians. The derivation of the sector area $$\\tfrac{1}{2}R^2 \\theta$$ assumes $$\\theta$$ is in radians (so that $$\\theta = 2\\pi$$ gives the full disc).\n- Step 2: If $$\\theta$$ were in degrees, the full disc would correspond to $$\\theta = 360┬░$$, not $$2\\pi$$, and the formula would need a conversion factor.\n- Step 3: Radians make $$\\tfrac{d(\\text{arc length})}{d\\theta} = r$$, yielding clean formulas. Always use radians in polar problems.\n\nSame warning for tangent problems: derivatives of $$\\sin\\theta$$ and $$\\cos\\theta$$ only behave nicely in radians.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_70"}, {"question": "What is the geometric significance of the point $$r = 0$$ on a polar curve, and why is it often a critical point for sketching? (2 steps)", "answer": "- Step 1: The point $$r = 0$$ is the pole (origin). Geometrically, it is the single point where the curve passes through the center of the coordinate system.\n- Step 2: It is critical for sketching because it often marks the boundary of a loop or the cusp of a cardioid. Finding the values of $$\\theta$$ for which $$r = 0$$ tells you the exact angles at which the curve hits the origin, which helps in accurately drawing the \"start\" and \"end\" of loops.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_25"}, {"question": "Suppose you sketch $$r = a + 5\\sin\\theta$$ for various $$a$$. How does the qualitative shape change as $$a$$ varies from 5 to 10 to above 10? (3 steps)", "answer": "- Step 1: Minimum $$r$$ at $$\\theta = -\\pi/2$$ (where $$\\sin\\theta = -1$$): $$r_{\\min} = a - 5$$.\n- Step 2: Cases:\n+ $$a = 5$$: $$r_{\\min} = 0$$ ŌĆö curve becomes a cardioid (cusp at pole).\n+ $$5 < a < 10$$: $$r_{\\min} > 0$$ but $$p = a < 2q = 10$$ ŌĆö lima├¦on with dimple.\n+ $$a = 10$$: borderline convex.\n+ $$a > 10$$: convex smooth egg.\n- Step 3: As $$a$$ grows from 5 upward: cardioid ŌåÆ dimpled lima├¦on ŌåÆ smooth egg.\n\nThe trajectory through these shapes shows how the parameter controls the qualitative geometry.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_77"}, {"question": "Why does the polar area formula $$\\frac{1}{2}\\int r^2 d\\theta$$ give exactly half the answer if you forget the factor of $$\\frac{1}{2}$$? (3 steps)", "answer": "- Step 1: The $$\\frac{1}{2}$$ comes from the area of an infinitesimal circular sector of radius $$r$$ and angle $$d\\theta$$, which is $$\\frac{1}{2}r^2 d\\theta$$.\n- Step 2: This sector formula comes from: full circle area $$\\pi r^2$$, full angle $$2\\pi$$, so a sector of angle $$\\theta$$ has area $$\\pi r^2 \\cdot (\\theta/2\\pi) = \\frac{1}{2}r^2\\theta$$.\n- Step 3: Forgetting $$\\frac{1}{2}$$ would treat each sector as a \"double sector\" ŌĆö equivalently a parallelogram of sides $$r$$ and $$r\\,d\\theta$$ instead of a triangle.\n+ The triangular nature of pie slices is what introduces the $$\\frac{1}{2}$$.\n\nAlways include the $$\\frac{1}{2}$$; it's geometric, not a quirk.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_60"}, {"question": "For r = a(p + q cos ╬Ė), what determines whether the curve passes through the pole (origin)? (1 step)", "answer": "- Step 1: The curve passes through the pole if there exists a ╬Ė such that r = 0, i.e., p + q cos ╬Ė = 0. This requires p Ōēż q (so that cos ╬Ė = -p/q is in the range [-1, 1]). If p > q, then p + q cos ╬Ė > 0 for all ╬Ė, and the curve does not pass through the pole.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_34"}, {"question": "Explain why r = a(1 - cos ╬Ė) looks different from r = a(1 + cos ╬Ė) despite being similar equations. (2 steps)", "answer": "- Step 1: r = a(1 + cos ╬Ė) is a cardioid with its cusp at the origin pointing to the left (toward ╬Ė = ŽĆ), and its maximum extent (r = 2a) at ╬Ė = 0.\n- Step 2: r = a(1 - cos ╬Ė) is also a cardioid, but reflected about the y-axis. It has its cusp at the origin pointing to the right (toward ╬Ė = 0), and its maximum extent (r = 2a) at ╬Ė = ŽĆ. The difference in sign of cos ╬Ė flips the cardioid horizontally.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_31"}, {"question": "A point lies in the third quadrant with acute angle $$\\alpha$$ to the negative $$x$$-axis. What is the polar angle $$\\theta$$ measured anticlockwise from the positive $$x$$-axis? (3 steps)", "answer": "- Step 1: Starting from the positive $$x$$-axis and rotating anticlockwise, you sweep through the entire upper half ($$\\pi$$) just to reach the negative $$x$$-axis.\n- Step 2: From there, you continue rotating into the third quadrant by the additional angle $$\\alpha$$.\n- Step 3: Total angle: $$\\theta = \\pi + \\alpha$$.\n+ Equivalently, you could rotate clockwise (negative direction) by $$\\pi - \\alpha$$, giving $$\\theta = -(\\pi - \\alpha) = \\alpha - \\pi$$.\n+ Both describe the same point ŌĆö polar angles are not unique, only equivalent modulo $$2\\pi$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_4"}, {"question": "For the Cartesian point $$(-\\sqrt{3}, -1)$$, walk through the thought process to find polar coordinates, without mechanically plugging in. (4 steps)", "answer": "- Step 1: Find $$r$$: $$r = \\sqrt{3 + 1} = 2$$. Always positive ŌĆö it's a distance.\n- Step 2: Identify the quadrant: both coordinates negative means the third quadrant.\n- Step 3: Compute the reference (acute) angle using magnitudes only: $$\\alpha = \\arctan\\tfrac{1}{\\sqrt{3}} = \\tfrac{\\pi}{6}$$. This is the angle from the *nearest* portion of the $$x$$-axis.\n- Step 4: Convert to a true anticlockwise angle from the positive $$x$$-axis: in the third quadrant, $$\\theta = \\pi + \\alpha = \\tfrac{7\\pi}{6}$$. Equally valid would be $$-\\tfrac{5\\pi}{6}$$ (subtract $$2\\pi$$).\n\nSo the answer is $$\\left(2, \\tfrac{7\\pi}{6}\\right)$$ ŌĆö same distance, direction pointing into the third quadrant.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_4"}, {"question": "For a polar curve $$r = f(\\theta)$$, what is the geometric meaning of $$dr/d\\theta$$? Is it the same as the slope of the tangent? (3 steps)", "answer": "- Step 1: $$dr/d\\theta$$ is the rate at which radial distance changes per unit angle. It tells you how fast the curve is spiralling outward (positive) or inward (negative).\n- Step 2: It's NOT the slope of the tangent. The tangent slope is $$dy/dx = (dy/d\\theta)/(dx/d\\theta)$$, which depends on both $$f(\\theta)$$ and $$f'(\\theta)$$.\n- Step 3: The angle $$\\psi$$ between tangent and radius vector is $$\\tan\\psi = r/(dr/d\\theta)$$.\n+ When $$dr/d\\theta = 0$$: tangent perpendicular to radius (curve moves tangentially, like on a circle).\n+ When $$dr/d\\theta$$ is large vs $$r$$: tangent points more along radius (curve moves primarily outward/inward).\n\nSo $$dr/d\\theta$$ is fundamentally a \"radial velocity\" ŌĆö different from tangent slope but related.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_44"}, {"question": "For one loop of $$r = a\\sin 4\\theta$$, why is the integration range $$0 \\leq \\theta \\leq \\pi/4$$ correct, and what does the area integral evaluate to? (4 steps)", "answer": "- Step 1: A loop starts where $$r = 0$$, peaks at $$r = a$$, returns to $$r = 0$$. So we need consecutive zeros of $$\\sin(4\\theta)$$ with $$\\sin > 0$$ between.\n- Step 2: $$\\sin(4\\theta) = 0$$ when $$4\\theta = k\\pi$$, i.e., $$\\theta = k\\pi/4$$. For $$\\theta \\in [0, \\pi/4]$$, $$4\\theta \\in [0, \\pi]$$ where $$\\sin$$ is non-negative.\n- Step 3: Set up: $$\\text{Area} = \\frac{1}{2}\\int_0^{\\pi/4} a^2\\sin^2(4\\theta)\\,d\\theta$$. Use $$\\sin^2(4\\theta) = (1 - \\cos 8\\theta)/2$$.\n- Step 4: Integral becomes $$\\frac{a^2}{4}\\int_0^{\\pi/4}(1 - \\cos 8\\theta)\\,d\\theta$$. The constant gives $$\\pi/4$$; the cosine integrates to $$\\sin 8\\theta / 8$$ which vanishes at both limits. Result: $$\\frac{a^2}{4} \\cdot \\frac{\\pi}{4} = \\pi a^2/16$$.\n\nAlways start at one zero of $$r$$ and end at the next.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_54"}, {"question": "What's the conceptual role of $$\\cos 2\\theta = 1 - 2\\sin^2\\theta = 2\\cos^2\\theta - 1$$ in polar area problems? (3 steps)", "answer": "- Step 1: Polar area formulas square the radius, producing $$r^2$$. If $$r$$ involves $$\\sin\\theta$$ or $$\\cos\\theta$$, then $$r^2$$ involves $$\\sin^2\\theta$$ or $$\\cos^2\\theta$$.\n- Step 2: These squared functions don't have elementary antiderivatives directly. The double-angle identity rewrites them as $$\\sin^2\\theta = \\tfrac{1-\\cos 2\\theta}{2}$$ and $$\\cos^2\\theta = \\tfrac{1+\\cos 2\\theta}{2}$$.\n- Step 3: Now the expression is linear in a single cosine, which integrates directly: $$\\int \\cos 2\\theta\\, d\\theta = \\tfrac{\\sin 2\\theta}{2}$$.\n\nThe double-angle identity is the bridge between squared trig and integrable trig.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_79"}, {"question": "When converting Cartesian coordinates $$(x, y)$$ to polar coordinates $$(r, \\theta)$$, the formula $$\\theta = \\arctan\\left(\\frac{y}{x}\\right)$$ is often used. Why is it dangerous to rely solely on this formula without a sketch, and how do you correct it for a point in the third quadrant like $$(-\\sqrt{3}, -1)$$? (3 steps)", "answer": "- Step 1: The arctangent function typically only returns principal values in the range $$\\left(-\\frac{\\pi}{2}, \\frac{\\pi}{2}\\right)$$, meaning it can only distinguish between the first and fourth quadrants. It cannot inherently detect the signs of both $$x$$ and $$y$$, so it might place the angle in the wrong quadrant.\n- Step 2: For the point $$(-\\sqrt{3}, -1)$$, both coordinates are negative, placing it in the third quadrant. If you blindly compute $$\\arctan\\left(\\frac{-1}{-\\sqrt{3}}\\right) = \\arctan\\left(\\frac{1}{\\sqrt{3}}\\right)$$, you get $$\\frac{\\pi}{6}$$, which is in the first quadrant.\n- Step 3: To correct this, you must add $$\\pi$$ to the calculated angle to rotate it into the third quadrant. The correct polar angle is $$\\theta = \\pi + \\frac{\\pi}{6} = \\frac{7\\pi}{6}$$. The radius is $$r = \\sqrt{(-\\sqrt{3})^2 + (-1)^2} = 2$$, giving the polar coordinates $$\\left(2, \\frac{7\\pi}{6}\\right)$$.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_1"}, {"question": "Why do polar coordinates appear in real-world applications like GPS, radar, and astronomy? (3 steps)", "answer": "- Step 1: These applications fundamentally measure positions relative to a central reference point ŌĆö distance and bearing ŌĆö which is exactly what polar coordinates encode.\n- Step 2: GPS receivers measure distances to satellites (radial); radars sweep an angle and measure echo distance; telescopes track objects by angle and depth.\n- Step 3: For these natural setups, converting to Cartesian would lose information or require unnecessary trigonometry. Polar matches the physics of \"distance from observer in a direction\".\n+ Astronomical objects are described in polar form (right ascension and declination ŌĆö angles, with distance separately).\n+ Spirals, rotations, and rotationally symmetric phenomena are naturally polar.\n\nSo the \"rotational structure\" of many real situations makes polar the most economical description.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_76"}, {"question": "Two points in polar coordinates are $$A = (4, \\frac{\\pi}{6})$$ and $$B = (4, \\frac{5\\pi}{6})$$. Without converting to Cartesian, describe the geometric relationship between these two points relative to the initial line. (2 steps)", "answer": "- Step 1: Both points have the same radial distance $$r = 4$$, meaning they lie on a circle of radius 4 centered at the pole.\n- Step 2: Their angles are $$\\frac{\\pi}{6}$$ and $$\\pi - \\frac{\\pi}{6} = \\frac{5\\pi}{6}$$. Because their angles add up to $$\\pi$$ and they have the same radius, they are symmetric with respect to the vertical line $$\\theta = \\frac{\\pi}{2}$$ (the $$y$$-axis).", "source": "GLM 5.1 Ōæó", "_id": "glm_3_26"}, {"question": "A common mistake is to differentiate $$r$$ directly with respect to $$\\theta$$ and equate to zero to find tangent points. Why does this find the wrong thing? (3 steps)", "answer": "- Step 1: $$dr/d\\theta = 0$$ marks where the radial distance has a local extremum ŌĆö the curve momentarily stops moving radially (moves only tangentially around the pole).\n- Step 2: This is NOT the same as the tangent being horizontal or vertical relative to the initial line.\n- Step 3: For tangent direction relative to the initial line, use parametric Cartesian $$dy/d\\theta$$ or $$dx/d\\theta$$, not $$dr/d\\theta$$.\n+ Concrete counter-example: on a circle $$r = a$$, $$dr/d\\theta = 0$$ everywhere, but the tangent direction varies all around ŌĆö clearly $$dr/d\\theta = 0$$ doesn't tell us tangent direction.\n\nAlways set up the parametric equations $$x = r\\cos\\theta$$, $$y = r\\sin\\theta$$ first, then differentiate.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_39"}, {"question": "When must you be extra careful using a calculator or graphing software to sketch polar curves? (3 steps)", "answer": "- Step 1: Many graphing tools (Desmos, GeoGebra) automatically allow $$r < 0$$, using the convention $$(r, \\theta) = (|r|, \\theta + \\pi)$$.\n- Step 2: This produces *extra* branches/petals that Edexcel FP2 ignores (strict $$r \\geq 0$$ convention).\n- Step 3: Always cross-check your sketch against a hand-drawn table of values, and only include points where your conventional $$r$$ is non-negative.\n\nSoftware-generated polar plots are a useful guide but may show curves your exam won't accept.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_69"}, {"question": "What does the polar equation $$r = 1 + 3\\cos\\theta$$ represent, and why is it different from a cardioid/dimpled lima├¦on? (4 steps)", "answer": "- Step 1: Here $$p = 1, q = 3$$, so $$p < q$$. The curve goes negative: when $$\\cos\\theta < -1/3$$, $$r$$ is negative.\n- Step 2: Under Edexcel $$r \\geq 0$$ convention: curve doesn't exist in negative intervals. Under alternative conventions: the point is traced on the opposite side ŌĆö creating an *inner loop*.\n- Step 3: This is fundamentally different from the $$p \\geq q$$ family where $$r$$ stays non-negative: those are simple closed loops (cardioid, dimpled, convex).\n- Step 4: So the parameter comparison is: $$p > q$$ convex or dimpled; $$p = q$$ cardioid (cusp); $$p < q$$ lima├¦on with inner loop (or partial curve).\n\nEdexcel focuses on $$p \\geq q$$ cases, but understanding the full picture explains why the \"$$p \\geq q$$\" restriction is standard.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_93"}, {"question": "A student says: \"since $$\\int_0^{2\\pi} r\\, d\\theta$$ has units of length ├Ś angle, that's how we get area in polar.\" What's wrong with this reasoning? (3 steps)", "answer": "- Step 1: Length ├Ś angle does *not* give area ŌĆö angle is dimensionless in radians, so the units would be just (length), not area.\n- Step 2: The correct formula $$\\tfrac{1}{2}\\int r^2 d\\theta$$ has units (length)┬▓ ├Ś (dimensionless) = (length)┬▓, which is correct.\n- Step 3: Dimensionally, the $$r^2$$ factor is essential ŌĆö it comes from the sector area $$\\tfrac{1}{2}r^2 \\theta$$, which scales as (length)┬▓. Each wedge's area grows as $$r^2$$, not $$r$$.\n\nAlways check units: polar area needs $$r^2 d\\theta$$, not $$r\\, d\\theta$$.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_43"}, {"question": "For a \"rose curve\" $$r = a\\sin(n\\theta)$$ with the $$r \\geq 0$$ convention, how many petals does it have, and why does $$n$$ control the count? (3 steps)", "answer": "- Step 1: A petal is traced when $$r$$ rises from 0, peaks at $$a$$, and returns to 0 ŌĆö between consecutive zeros of $$\\sin(n\\theta)$$ where $$\\sin$$ stays non-negative.\n- Step 2: $$\\sin(n\\theta) = 0$$ when $$n\\theta = k\\pi$$, i.e. at $$\\theta = k\\pi/n$$. Petals occur in intervals of length $$\\pi/n$$.\n- Step 3: Within $$[0, 2\\pi)$$, there are exactly $$n$$ intervals where $$\\sin(n\\theta) \\geq 0$$ ŌĆö each gives one petal.\n+ The petals are symmetrically arranged around the pole.\n+ The \"skipped\" intervals (where $$\\sin(n\\theta) < 0$$) correspond to where $$r$$ would be negative ŌĆö no curve drawn.\n\nSo $$r = a\\sin(n\\theta)$$ has $$n$$ symmetrically arranged petals.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_11"}, {"question": "When finding the area of overlap between two polar curves, why must you split the integral into pieces, and how do you determine which curve \"binds\" each piece? (4 steps)", "answer": "- Step 1: The overlap region at angle $$\\theta$$ is bounded by the *closer* curve (smaller $$r$$) ŌĆö being inside the closer one automatically means inside the farther one.\n- Step 2: Find intersection angles by setting $$r_1(\\theta) = r_2(\\theta)$$ and solving.\n- Step 3: For each angular sub-interval between intersections, identify which curve has the smaller $$r$$ there (test a midpoint).\n- Step 4: Integrate $$\\frac{1}{2}r_{\\min}^2$$ over each sub-interval using the bounding curve, then sum.\n+ Often, by symmetry, you can integrate over half the region and double.\n\nThis is the central technique for \"inside both curves\" problems.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_31"}, {"question": "When sketching $$r = a\\cos 3\\theta$$ for $$-\\pi/4 \\leq \\theta \\leq \\pi/4$$, why might this NOT show all 3 petals? (3 steps)", "answer": "- Step 1: $$r = a\\cos 3\\theta$$ has 3 petals total over $$[0, 2\\pi]$$ with $$r \\geq 0$$ convention.\n- Step 2: $$\\cos(3\\theta) \\geq 0$$ requires $$3\\theta \\in [-\\pi/2, \\pi/2]$$, i.e., $$\\theta \\in [-\\pi/6, \\pi/6]$$ ŌĆö only ONE petal (the central one).\n- Step 3: The interval $$[-\\pi/4, \\pi/4]$$ slightly extends beyond $$[-\\pi/6, \\pi/6]$$ where $$\\cos 3\\theta < 0$$ ŌĆö no curve drawn there.\n+ To see all 3 petals, $$\\theta$$ must range over $$[-\\pi/6, \\pi/6] \\cup [\\pi/2, 5\\pi/6] \\cup [7\\pi/6, 9\\pi/6]$$.\n\nThe sketching range determines which petals are visible.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_53"}, {"question": "Sanity check: for $$r = 2a$$ (constant), the polar area formula should give the area of a disc. Verify. (3 steps)", "answer": "- Step 1: For $$r = 2a$$ constant, sweeping through $$\\theta \\in [0, 2\\pi]$$: $$\\text{Area} = \\tfrac{1}{2}\\int_0^{2\\pi}(2a)^2 d\\theta = \\tfrac{1}{2}\\cdot 4a^2\\cdot 2\\pi = 4\\pi a^2$$.\n- Step 2: The disc of radius $$2a$$ has area $$\\pi(2a)^2 = 4\\pi a^2$$.\n- Step 3: They match ŌĆö the polar area formula correctly reproduces the classical disc area.\n\nWhenever learning a new area formula, test it on a known case (disc, sector, triangle) to build confidence.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_40"}, {"question": "How does the number of vertical tangents (perpendicular to the initial line) prove whether the curve $$r = a(p + q\\cos\\theta)$$ is convex or has a dimple? (3 steps)", "answer": "- Step 1: Find vertical tangents by setting $$\\frac{dx}{d\\theta} = 0$$. With $$x = r\\cos\\theta = p\\cos\\theta + q\\cos^2\\theta$$, differentiating gives $$\\frac{dx}{d\\theta} = -\\sin\\theta(p + 2q\\cos\\theta)$$.\n- Step 2: The solutions are $$\\sin\\theta = 0$$ (giving $$\\theta = 0, \\pi$$) and $$\\cos\\theta = -\\frac{p}{2q}$$. The number of solutions to $$\\cos\\theta = -\\frac{p}{2q}$$ determines the shape.\n- Step 3: If $$p \\ge 2q$$, then $$\\frac{p}{2q} \\ge 1$$, so $$\\cos\\theta = -\\frac{p}{2q}$$ has no valid solutions (or one solution at $$\\pi$$ if $$p=2q$$). There are only two vertical tangents, meaning the curve is convex. If $$p < 2q$$, then $$\\frac{p}{2q} < 1$$, so $$\\cos\\theta = -\\frac{p}{2q}$$ has two solutions in the 2nd and 3rd quadrants. These extra vertical tangents indicate the curve indents inward, creating a dimple.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_20"}, {"question": "Why is the polar system particularly well-suited to describing orbital mechanics? (3 steps)", "answer": "- Step 1: Orbits are driven by central forces (gravitation from a point source). Central forces depend only on distance from the source ŌĆö exactly the polar $$r$$ coordinate.\n- Step 2: Angular momentum conservation in a central field gives $$r^2\\tfrac{d\\theta}{dt} = $$ const ŌĆö which is the polar area sweep rate. Kepler's second law falls out immediately.\n- Step 3: Kepler orbits (ellipses/parabolas/hyperbolas) have the compact polar form $$r = \\tfrac{p}{1 + e\\cos\\theta}$$ where $$e$$ is eccentricity ŌĆö reminiscent of a lima├¦on but with denominator, matching conic geometry.\n\nPolar coordinates respect the rotational symmetry of gravity ŌĆö that's why they appear naturally in celestial mechanics.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_99"}, {"question": "What is the conceptual difference between curves like $$r^2 = a^2 \\sin 2\\theta$$ vs $$r^2 = a^2\\cos 2\\theta$$? (3 steps)", "answer": "- Step 1: Both are \"lemniscates\" ŌĆö figure-8 shaped curves with two loops, but oriented differently.\n- Step 2: $$r^2 = a^2\\cos 2\\theta$$ exists where $$\\cos 2\\theta \\geq 0$$, namely $$\\theta \\in [-\\pi/4, \\pi/4] \\cup [3\\pi/4, 5\\pi/4]$$. Loops on the *horizontal* axis (right and left lobes).\n- Step 3: $$r^2 = a^2\\sin 2\\theta$$ exists where $$\\sin 2\\theta \\geq 0$$, namely $$\\theta \\in [0, \\pi/2] \\cup [\\pi, 3\\pi/2]$$. Loops in the *first and third quadrants* ŌĆö \"diagonal\" figure-8.\n+ The trig function determines orientation: cos ŌåÆ horizontal; sin ŌåÆ diagonal (45┬░-rotated).\n\nLemniscates are \"two-loop\" curves; the trig function chooses the loop orientation.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_86"}, {"question": "What information does the polar coordinate pair $$(r, \\theta)$$ carry, and how does it differ in spirit from Cartesian $$(x, y)$$? (3 steps)", "answer": "- Step 1: Polar coordinates give a point's location by two \"directional\" facts: $$r$$ is the distance from a fixed point $$O$$ called the **pole**, and $$\\theta$$ is the angle measured anticlockwise from a fixed reference ray called the **initial line** (usually the positive $$x$$-axis).\n- Step 2: Cartesian coordinates describe position as \"how far east, how far north\" ŌĆö a rectangular grid. Polar coordinates describe position as \"how far out, in what direction\" ŌĆö a radial grid.\n- Step 3: This matters because some curves are radially natural: circles about the origin, spirals, rotationally-symmetric shapes. Polar coordinates expose a symmetry that Cartesian coordinates hide.\n\nThe choice of coordinate system should follow the symmetry of the problem.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_0"}, {"question": "Why does the formula Area = (1/2)Ōł½ r┬▓ d╬Ė give the correct area even when r is negative? (2 steps)", "answer": "- Step 1: When r is negative, the point is plotted in the opposite direction from ╬Ė, which effectively means the area is being traced on the \"other side\" of the origin. However, when we square r to get r┬▓, we get a positive value regardless of the sign of r.\n- Step 2: The physical interpretation is that the formula gives the area of the sector swept out, and the sign of r doesn't affect the magnitude of the area ŌĆö the sector has the same area whether we consider it positively or negatively traced. The squaring ensures we always add positive area.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_30"}, {"question": "Why might it be useful to use the reflection symmetry of a polar curve to compute its area? Give a concrete halving example. (3 steps)", "answer": "- Step 1: If a polar curve is symmetric about the initial line, the upper half ($$0 \\leq \\theta \\leq \\pi$$) mirrors the lower half ($$\\pi \\leq \\theta \\leq 2\\pi$$).\n- Step 2: Such symmetry holds when $$f(-\\theta) = f(\\theta)$$, true for cosine-only functions like $$r = 1 + \\cos\\theta$$ (cardioid).\n- Step 3: For these curves: $$\\text{Area} = 2 \\times \\frac{1}{2}\\int_0^\\pi r^2 d\\theta = \\int_0^\\pi r^2 d\\theta$$.\n+ Half the integration range, so half the work.\n+ Especially helpful when the integrand has more symmetric structure on $$[0, \\pi]$$.\n\nRecognising symmetry is one of the most useful \"first looks\" in polar problems.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_71"}, {"question": "For the curve $$r = a\\sin 4\\theta$$, why is there a subtle issue with counting \"one period\" of the underlying trig function? (3 steps)", "answer": "- Step 1: The function $$\\sin 4\\theta$$ has period $$\\pi/2$$. In each period, $$\\sin 4\\theta$$ is positive on half, negative on half.\n- Step 2: Under $$r \\geq 0$$: only positive halves give actual curve. Over $$\\theta \\in [0, 2\\pi]$$, there are 8 positive intervals (since $$n = 4$$ is even, giving $$2n = 8$$ petals).\n- Step 3: The subtlety: the \"period\" of $$\\sin 4\\theta$$ is $$\\pi/2$$, but the \"period\" of the *curve* is $$2\\pi$$ ŌĆö different $$\\theta$$ values place the curve at different rotational positions.\n\nDistinguish: period of underlying trig function vs. period of the polar curve (as a set of points).", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_81"}, {"question": "When converting the polar equation $$r = 2 + \\cos 2\\theta$$ to a Cartesian equation, why is it necessary to multiply by $$r^2$$ at some point, and what identities are essential for this process? (3 steps)", "answer": "- Step 1: To eliminate $$\\theta$$, you need terms involving $$r \\cos \\theta$$ (which is $$x$$) and $$r \\sin \\theta$$ (which is $$y$$). The current equation has $$\\cos 2\\theta$$, which cannot be directly replaced by $$x$$ or $$y$$.\n- Step 2: Use the double angle identity $$\\cos 2\\theta \\equiv 2\\cos^2 \\theta - 1$$ to rewrite the equation as $$r = 2 + 2\\cos^2 \\theta - 1 = 1 + 2\\cos^2 \\theta$$. Now you have $$\\cos^2 \\theta$$, but you need $$r^2 \\cos^2 \\theta$$ to substitute $$(r \\cos \\theta)^2 = x^2$$.\n- Step 3: Multiply the entire equation by $$r^2$$ to get $$r^3 = r^2 + 2r^2 \\cos^2 \\theta$$. Now substitute $$r^2 = x^2 + y^2$$ and $$r^2 \\cos^2 \\theta = x^2$$. Since $$r = \\sqrt{x^2+y^2}$$, then $$r^3 = (x^2+y^2)^{\\frac{3}{2}}$$. The Cartesian equation is $$(x^2 + y^2)^{\\frac{3}{2}} = x^2 + y^2 + 2x^2 = 3x^2 + y^2$$.", "source": "GLM 5.1 ŌæĀ", "_id": "glm_1_4"}, {"question": "What is the polar equation of the line $$y = 2x$$, and why does it simplify to a fixed angle? (3 steps)", "answer": "- Step 1: Substitute $$y = r\\sin\\theta$$, $$x = r\\cos\\theta$$: $$r\\sin\\theta = 2r\\cos\\theta$$.\n- Step 2: Divide by $$r\\cos\\theta$$ (assuming non-zero): $$\\tan\\theta = 2$$.\n- Step 3: This says the angle is fixed: $$\\theta = \\arctan 2$$ (and $$\\theta = \\arctan 2 + \\pi$$ for the other direction along the line).\n+ Lines through the origin always reduce to $$\\theta = \\alpha$$ in polar.\n+ Their length isn't constrained ŌĆö only their direction.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_18"}, {"question": "A student says that r = sin ╬Ė and r = cos ╬Ė represent the same circle. Explain why this is a misconception and what the correct relationship is. (2 steps)", "answer": "- Step 1: This is a common misconception. While both are circles of radius 1/2, they are not the same ŌĆö they are the same circle rotated by 90┬░.\n- Step 2: r = a cos ╬Ė has its center on the positive x-axis at (a/2, 0). r = a sin ╬Ė has its center on the positive y-axis at (0, a/2). For a = 1, the first circle is centered at (0.5, 0), the second at (0, 0.5). They intersect at the origin and at (ŌłÜ2/2, ŌłÜ2/2), but they are distinct circles.", "source": "MiniMax ŌæĀ", "_id": "minimax_1_38"}, {"question": "Why does \"$$r^2 \\geq 0$$\" produce a stronger restriction than simply writing an $$r$$ equation? (3 steps)", "answer": "- Step 1: An equation like $$r = f(\\theta)$$ requires $$f(\\theta) \\geq 0$$ for the curve to exist ŌĆö but $$f$$ might naturally take negative values, giving gaps.\n- Step 2: An equation like $$r^2 = g(\\theta)$$ requires $$g(\\theta) \\geq 0$$ ŌĆö because the left side is a square.\n- Step 3: Additionally, $$r^2 = g(\\theta)$$ gives $$r = \\pm\\sqrt{g(\\theta)}$$, but under $$r \\geq 0$$ we take only $$r = +\\sqrt{g(\\theta)}$$.\n\nSo $$r^2 = g(\\theta)$$ curves (like lemniscates) have restricted domain AND a natural square-root structure.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_96"}, {"question": "Two polar curves $$r = 1 + \\sin\\theta$$ (a cardioid) and $$r = 3\\sin\\theta$$ (a circle through origin). Where do they intersect, and why does the geometric configuration make sense? (3 steps)", "answer": "- Step 1: Set radii equal: $$1 + \\sin\\theta = 3\\sin\\theta$$, giving $$\\sin\\theta = 1/2$$, so $$\\theta = \\pi/6$$ or $$5\\pi/6$$.\n- Step 2: At these angles, $$r = 3 \\cdot 1/2 = 3/2$$. So intersections are at $$(3/2, \\pi/6)$$ and $$(3/2, 5\\pi/6)$$.\n- Step 3: Geometric intuition: at top ($$\\theta = \\pi/2$$), cardioid reaches $$r = 2$$ but circle reaches $$r = 3$$ ŌĆö circle is \"outside\" near top. At sides, the cardioid is larger than circle (since the circle shrinks faster as $$\\theta$$ approaches horizontal). So they cross.\n+ Both curves also pass through the pole ŌĆö algebraically a \"shared point\" but achieved at different $$\\theta$$.\n\nIntersections separate regions where each curve is the inner boundary.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_68"}, {"question": "If a region on an Argand diagram is defined by a circle locus and an argument restriction (e.g., $$0 \\le \\arg z \\le \\frac{\\pi}{2}$$), how do you determine the limits of integration for finding its area? (2 steps)", "answer": "- Step 1: The argument restriction $$0 \\le \\arg z \\le \\frac{\\pi}{2}$$ directly translates to the angular bounds for the polar coordinates: $$0 \\le \\theta \\le \\frac{\\pi}{2}$$.\n- Step 2: The circle locus provides the polar equation $$r = f(\\theta)$$ for the boundary curve. You simply integrate the area formula $$\\frac{1}{2} \\int r^2 \\, d\\theta$$ using the angle limits given by the argument restriction.", "source": "GLM 5.1 ŌæĪ", "_id": "glm_2_16"}, {"question": "Why is the formula $$\\tfrac{1}{2}\\int_\\alpha^\\beta r^2 d\\theta$$ NOT the right tool for finding the area *between* two polar curves? How do you adapt it? (3 steps)", "answer": "- Step 1: The formula gives the area of a sector between the pole and the curve ŌĆö it's always \"pole-to-curve\" area, not \"curve-to-curve\" area.\n- Step 2: To find the area between an outer curve $$r_1(\\theta)$$ and inner curve $$r_2(\\theta)$$ from $$\\alpha$$ to $$\\beta$$, compute the *difference* of sector areas: $$\\text{Area} = \\tfrac{1}{2}\\int_\\alpha^\\beta (r_1^2 - r_2^2)\\, d\\theta$$.\n- Step 3: This works because both sectors share the same angular limits ŌĆö you're effectively subtracting the smaller \"inner\" pie slice from the larger \"outer\" pie slice.\n\nThink of it as \"outer sector minus inner sector\", not \"top function minus bottom function\".", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_28"}, {"question": "Explain intuitively what \"tangent to a polar curve\" means, without writing any formulas. (3 steps)", "answer": "- Step 1: Imagine travelling along the curve as $$\\theta$$ increases. At each instant you have a velocity vector pointing in some direction ŌĆö this is the tangent direction.\n- Step 2: The tangent line at a point is the line that best approximates the curve near that point, just as in Cartesian calculus. It captures the instantaneous direction of motion.\n- Step 3: \"Parallel to the initial line\" means velocity is purely horizontal at that instant (no up/down motion), so $$y$$ is momentarily at a peak or trough. \"Perpendicular to the initial line\" means velocity is purely vertical, so $$x$$ is at its extreme.\n\nTangent directions are snapshots of motion; stationary components of motion correspond to tangents along or across the axes.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_35"}, {"question": "When is a polar curve $$r = f(\\theta)$$ symmetric about the initial line ($$x$$-axis), and what symmetry test corresponds? (3 steps)", "answer": "- Step 1: Symmetry about the initial line means $$(r, \\theta)$$ on the curve Ōåö $$(r, -\\theta)$$ on the curve.\n- Step 2: This requires $$f(\\theta) = f(-\\theta)$$, i.e., $$f$$ is an even function of $$\\theta$$.\n- Step 3: Equations involving only $$\\cos\\theta$$ (e.g., cardioid $$r = a(1+\\cos\\theta)$$, lima├¦on $$r = p + q\\cos\\theta$$, circle $$r = 2a\\cos\\theta$$) are automatically symmetric about the initial line because $$\\cos$$ is even.\n\nSimilarly, $$\\theta \\to \\pi - \\theta$$ tests symmetry about the $$y$$-axis; $$r = f(\\sin\\theta)$$ curves are $$y$$-axis symmetric.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_46"}, {"question": "Describe the curve $$r = e^{2\\theta}$$ qualitatively on $$0 \\leq \\theta \\leq \\pi$$. (3 steps)", "answer": "- Step 1: This is a *logarithmic spiral* ŌĆö $$r$$ grows exponentially with $$\\theta$$, so successive arms are spaced geometrically (not arithmetically like Archimedean).\n- Step 2: At $$\\theta = 0$$: $$r = 1$$. At $$\\theta = \\pi/2$$: $$r = e^{\\pi} \\approx 23.1$$. At $$\\theta = \\pi$$: $$r = e^{2\\pi} \\approx 535$$.\n- Step 3: Spiral starts at $$(1, 0)$$ and spirals outward rapidly; each quarter turn multiplies the radius by $$e^{\\pi/2} \\approx 4.81$$.\n\nLogarithmic spirals appear in nature (nautilus shells, galaxy arms) ŌĆö they preserve shape under scaling.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_74"}, {"question": "Compare the three cases of $$r = a(p + q\\cos\\theta)$$ with $$p,q>0$$: what happens for $$p = q$$, $$q < p < 2q$$, and $$p \\geq 2q$$? (4 steps)", "answer": "- Step 1: $$p = q$$ gives a **cardioid**: $$r = q(1 + \\cos\\theta)$$. Curve touches the pole at $$\\theta = \\pi$$, creating a sharp cusp ŌĆö heart-shaped.\n- Step 2: $$q < p < 2q$$ gives a **dimpled lima├¦on**: concave near $$\\theta = \\pi$$ but doesn't reach the pole. Looks like a squashed egg with a dent on the back.\n- Step 3: $$p = 2q$$ is the critical boundary: curve still smooth everywhere, just barely ŌĆö incrementally increasing $$p$$ removes the dimple.\n- Step 4: $$p > 2q$$ gives a **convex lima├¦on**: no dimple, egg-shaped. As $$p \\gg q$$, approaches a circle of radius $$p$$.\n\nThe parameter $$p/q$$ controls how dominant the constant term is versus the oscillation term.", "source": "Opus 4.7 ŌæĀ", "_id": "opus_1_37"}, {"question": "How would you find the area of the region *outside* one polar curve and *inside* another? (4 steps)", "answer": "- Step 1: Let inner boundary be $$r = g(\\theta)$$ and outer boundary $$r = f(\\theta)$$, with $$f > g$$ on the relevant $$\\theta$$-range.\n- Step 2: The area of a wedge is \"sector to $$f$$ minus sector to $$g$$\" $$= \\tfrac{1}{2}(f^2 - g^2)d\\theta$$.\n- Step 3: Integrate: $$\\text{Area} = \\tfrac{1}{2}\\int_\\alpha^\\beta (f(\\theta)^2 - g(\\theta)^2)\\, d\\theta$$.\n- Step 4: Check: if $$g = 0$$ (region reaches the pole), this reduces to $$\\tfrac{1}{2}\\int f^2 d\\theta$$, the standard formula.\n\nAlways en
