true}, {"question": "Conceptually, why are the two formulas ŌĆö Cartesian distance $$\\sqrt{(x_1-x_2)^2+(y_1-y_2)^2}$$ and polar distance $$\\sqrt{r_1^2+r_2^2-2r_1r_2\\cos(\\theta_1-\\theta_2)}$$ ŌĆö fundamentally describing the same thing? (4 steps)", "answer": "- Step 1: Both compute Euclidean distance between two points in the plane, just expressed in different coordinate systems.\n- Step 2: Cartesian uses coordinate differences in two perpendicular directions.\n- Step 3: Polar uses the cosine rule from the triangle formed by the two points and the origin.\n- Step 4: To verify equivalence, substitute $$x_i = r_i\\cos\\theta_i$$, $$y_i = r_i\\sin\\theta_i$$ into the Cartesian formula:\n+ Expand and use $$\\cos^2 + \\sin^2 = 1$$: $$d^2 = r_1^2 + r_2^2 - 2r_1r_2(\\cos\\theta_1\\cos\\theta_2 + \\sin\\theta_1\\sin\\theta_2)$$.\n+ Recognise: $$\\cos\\theta_1\\cos\\theta_2 + \\sin\\theta_1\\sin\\theta_2 = \\cos(\\theta_1 - \\theta_2)$$.\n+ So $$d^2 = r_1^2 + r_2^2 - 2r_1r_2\\cos(\\theta_1-\\theta_2)$$. Ō£ō\n\nEquivalent ŌĆö same geometric truth in different languages.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_75", "judge_pick": true}, {"question": "Why do polar coordinates appear in real-world applications like GPS, radar, and astronomy? (3 steps)", "answer": "- Step 1: These applications fundamentally measure positions relative to a central reference point ŌĆö distance and bearing ŌĆö which is exactly what polar coordinates encode.\n- Step 2: GPS receivers measure distances to satellites (radial); radars sweep an angle and measure echo distance; telescopes track objects by angle and depth.\n- Step 3: For these natural setups, converting to Cartesian would lose information or require unnecessary trigonometry. Polar matches the physics of \"distance from observer in a direction\".\n+ Astronomical objects are described in polar form (right ascension and declination ŌĆö angles, with distance separately).\n+ Spirals, rotations, and rotationally symmetric phenomena are naturally polar.\n\nSo the \"rotational structure\" of many real situations makes polar the most economical description.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_76", "judge_pick": true}, {"question": "Suppose you sketch $$r = a + 5\\sin\\theta$$ for various $$a$$. How does the qualitative shape change as $$a$$ varies from 5 to 10 to above 10? (3 steps)", "answer": "- Step 1: Minimum $$r$$ at $$\\theta = -\\pi/2$$ (where $$\\sin\\theta = -1$$): $$r_{\\min} = a - 5$$.\n- Step 2: Cases:\n+ $$a = 5$$: $$r_{\\min} = 0$$ ŌĆö curve becomes a cardioid (cusp at pole).\n+ $$5 < a < 10$$: $$r_{\\min} > 0$$ but $$p = a < 2q = 10$$ ŌĆö lima├¦on with dimple.\n+ $$a = 10$$: borderline convex.\n+ $$a > 10$$: convex smooth egg.\n- Step 3: As $$a$$ grows from 5 upward: cardioid ŌåÆ dimpled lima├¦on ŌåÆ smooth egg.\n\nThe trajectory through these shapes shows how the parameter controls the qualitative geometry.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_77", "judge_pick": true}, {"question": "Two polar curves are sketched: $$r = a\\sin 4\\theta$$ and $$r = a\\sin 2\\theta$$ for $$0 \\leq \\theta \\leq \\pi/2$$. Identify the structure of each and where they intersect. (4 steps)", "answer": "- Step 1: $$r = a\\sin 4\\theta$$ over $$[0, \\pi/2]$$: each petal occupies $$\\pi/4$$, so 2 full petals appear, centred near $$\\theta = \\pi/8$$ and $$3\\pi/8$$.\n- Step 2: $$r = a\\sin 2\\theta$$ over $$[0, \\pi/2]$$: each petal occupies $$\\pi/2$$, so 1 full petal, centred at $$\\theta = \\pi/4$$.\n- Step 3: Intersections: $$\\sin 4\\theta = \\sin 2\\theta$$. Use $$\\sin 4\\theta = 2\\sin 2\\theta\\cos 2\\theta$$: either $$\\sin 2\\theta = 0$$ ($$\\theta = 0, \\pi/2$$) or $$\\cos 2\\theta = 1/2$$ ($$\\theta = \\pi/6$$).\n- Step 4: At $$\\theta = \\pi/6$$: $$r = a\\sin(\\pi/3) = a\\sqrt{3}/2$$. So they meet at $$(a\\sqrt{3}/2, \\pi/6)$$ (and pole).\n\nThe \"inside both\" region is bounded by the 4-petal curve in some intervals and the 2-petal in others.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_78", "judge_pick": false}, {"question": "Visualise the half-petal of $$r = 4\\cos 2\\theta$$ from $$\\theta = 0$$ to $$\\theta = \\pi/4$$. As $$\\theta$$ varies, where exactly are the start and end? (3 steps)", "answer": "- Step 1: At $$\\theta = 0$$: $$r = 4\\cos 0 = 4$$. The point is $$(4, 0)$$ in Cartesian ŌĆö rightmost point on the initial line.\n- Step 2: At $$\\theta = \\pi/4$$: $$r = 4\\cos(\\pi/2) = 0$$. The point is at the pole (origin).\n- Step 3: As $$\\theta$$ moves from 0 to $$\\pi/4$$, $$r$$ decreases monotonically from 4 to 0; the curve sweeps from initial line up into first quadrant, ending at origin.\n+ At intermediate $$\\theta = \\pi/6$$: $$r = 4\\cos(\\pi/3) = 2$$, so point at $$(2, \\pi/6)$$ polar.\n\nThis half-petal is the \"first quadrant lobe\" of the symmetric rose curve.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_79", "judge_pick": false}, {"question": "Why does the polar equation $$r^2 = a^2\\sin\\theta$$ for $$0 \\leq \\theta \\leq \\pi$$ produce a \"leaf\" shape rather than a circle? (3 steps)", "answer": "- Step 1: For real $$r$$, need $$\\sin\\theta \\geq 0$$, restricting to $$\\theta \\in [0, \\pi]$$ (upper half-plane).\n- Step 2: At $$\\theta = 0$$: $$r = 0$$. As $$\\theta$$ rises to $$\\pi/2$$: $$r$$ peaks at $$a$$. As $$\\theta$$ continues to $$\\pi$$: $$r$$ returns to 0.\n- Step 3: This traces a \"leaf\" passing through the pole at start and end, bulging outward in upper half-plane.\n+ Note: relationship is $$r^2 = a^2\\sin\\theta$$, not $$r = a\\sin\\theta$$. So $$r$$ grows like $$\\sqrt{\\sin\\theta}$$ ŌĆö sharper rise near endpoints than a sinusoid.\n+ The square root shape distinguishes this from the simple circle $$r = a\\sin\\theta$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_80", "judge_pick": true}, {"question": "When a polar curve's tangent through the pole has direction $$\\theta = \\alpha$$, why don't you need to compute $$dy/dx$$ to find this tangent? (3 steps)", "answer": "- Step 1: As $$\\theta \\to \\alpha$$ where $$r \\to 0$$, the point approaches the pole along direction $$\\theta$$ ŌĆö and direction tends to $$\\alpha$$.\n- Step 2: So the tangent at the pole is automatically the half-line $$\\theta = \\alpha$$. No parametric calculus needed.\n- Step 3: Why? Computing $$dy/dx$$ at a pole-passing point gives $$0/0$$ ambiguity. But the *limit* of the curve's direction approaches the angle $$\\alpha$$ ŌĆö recoverable from the polar parameterisation directly.\n+ This shortcut is exclusive to pole-tangents; for non-pole points, you still need parametric methods.\n\nA great efficiency: for tangents at pole, just find $$\\theta$$ values where $$r = 0$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_81", "judge_pick": false}, {"question": "Conceptually, when integrating to find areas in polar, why is the integrand sometimes split using $$\\int (r_{\\text{outer}}^2 - r_{\\text{inner}}^2)/2 \\, d\\theta$$? (3 steps)", "answer": "- Step 1: When the region is bounded between two curves at the same angles, the radial extent at each $$\\theta$$ goes from $$r_{\\text{inner}}$$ to $$r_{\\text{outer}}$$.\n- Step 2: The \"annular pie slice\" at angle $$\\theta$$ has area = (outer sector) ŌłÆ (inner sector) = $$\\frac{1}{2}r_{\\text{outer}}^2 d\\theta - \\frac{1}{2}r_{\\text{inner}}^2 d\\theta$$.\n- Step 3: Integrate the difference over the relevant angular range to get the total area between the curves.\n+ This is the polar analogue of \"upper minus lower\" in Cartesian, but with squared radii.\n\nParticularly useful for \"between two curves\" regions like crescents.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_82", "judge_pick": false}, {"question": "A polar curve $$r = 1 + 3\\cos\\theta$$ on $$0 \\leq \\theta \\leq \\pi/2$$ has a tangent parallel to the initial line at some point $$A$$. What does the $$y$$-coordinate of $$A$$ represent geometrically? (3 steps)", "answer": "- Step 1: As $$\\theta$$ moves from 0 to $$\\pi/2$$, $$y = r\\sin\\theta = (1 + 3\\cos\\theta)\\sin\\theta$$ starts at 0, rises to a maximum, then approaches 1 at $$\\theta = \\pi/2$$.\n- Step 2: At the max, $$dy/d\\theta = 0$$ ŌĆö that's where the tangent is parallel to the initial line.\n- Step 3: The $$y$$-coordinate at $$A$$ is the maximum height the curve reaches above the initial line in this interval.\n+ Geometrically: the topmost point of the curve in the upper half-plane.\n+ Equivalently, the $$y$$-component of the position at $$A$$ gives the vertical extent.\n\nSo horizontal tangents physically correspond to extreme $$y$$-values.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_83", "judge_pick": false}, {"question": "Verify the polar area formula by computing the area of the unit circle $$r = 1$$ over $$[0, 2\\pi]$$. Why does this confirm the formula? (3 steps)", "answer": "- Step 1: Apply the formula: $$\\text{Area} = \\frac{1}{2}\\int_0^{2\\pi} 1^2 d\\theta = \\frac{1}{2} \\cdot 2\\pi = \\pi$$.\n- Step 2: This matches the known area of a unit circle: $$\\pi r^2 = \\pi \\cdot 1^2 = \\pi$$. Ō£ō\n- Step 3: This sanity check builds confidence in the formula:\n+ The formula reduces to the standard area for a known shape.\n+ If we had forgotten the $$\\frac{1}{2}$$, we'd have gotten $$2\\pi$$ ŌĆö clearly wrong by a factor of 2.\n\nA successful sanity check helps cement why the formula is structured the way it is.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_84", "judge_pick": false}, {"question": "When sketching the polar curve $$r = 4(1 - \\cos 2\\theta)$$, what's a key first step that makes the equation easier to handle? (3 steps)", "answer": "- Step 1: Use the identity $$1 - \\cos 2\\theta = 2\\sin^2\\theta$$ to rewrite: $$r = 4 \\cdot 2\\sin^2\\theta = 8\\sin^2\\theta$$.\n- Step 2: Now $$r$$ is expressed purely in terms of $$\\sin\\theta$$, making the dependence clearer.\n- Step 3: Properties:\n+ $$r$$ is non-negative for all $$\\theta$$ (square is always positive).\n+ $$r$$ reaches maximum $$8$$ at $$\\theta = \\pi/2$$ and $$3\\pi/2$$ (where $$\\sin\\theta = \\pm 1$$).\n+ $$r = 0$$ at $$\\theta = 0$$ and $$\\pi$$ (cusps at the pole on the initial line).\n\nThis is a \"two-lobed\" curve, symmetric about the $$y$$-axis, with the lobes pointing up and down.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_85", "judge_pick": true}, {"question": "What is the conceptual difference between curves like $$r^2 = a^2 \\sin 2\\theta$$ vs $$r^2 = a^2\\cos 2\\theta$$? (3 steps)", "answer": "- Step 1: Both are \"lemniscates\" ŌĆö figure-8 shaped curves with two loops, but oriented differently.\n- Step 2: $$r^2 = a^2\\cos 2\\theta$$ exists where $$\\cos 2\\theta \\geq 0$$, namely $$\\theta \\in [-\\pi/4, \\pi/4] \\cup [3\\pi/4, 5\\pi/4]$$. Loops on the *horizontal* axis (right and left lobes).\n- Step 3: $$r^2 = a^2\\sin 2\\theta$$ exists where $$\\sin 2\\theta \\geq 0$$, namely $$\\theta \\in [0, \\pi/2] \\cup [\\pi, 3\\pi/2]$$. Loops in the *first and third quadrants* ŌĆö \"diagonal\" figure-8.\n+ The trig function determines orientation: cos ŌåÆ horizontal; sin ŌåÆ diagonal (45┬░-rotated).\n\nLemniscates are \"two-loop\" curves; the trig function chooses the loop orientation.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_86", "judge_pick": true}, {"question": "Conceptually, why does the area formula give the correct answer regardless of orientation (clockwise vs anticlockwise) for a polar curve? (3 steps)", "answer": "- Step 1: In Cartesian (Green's theorem), area depends on orientation ŌĆö clockwise gives negative, anticlockwise positive.\n- Step 2: In polar, the integrand is $$\\frac{1}{2}r^2$$, always positive. The element is positive whenever $$r$$ is real and $$d\\theta > 0$$.\n- Step 3: As long as you integrate with $$\\beta > \\alpha$$ (anticlockwise sweep), the result is automatically positive ŌĆö sum of pie slices.\n+ Sweeping clockwise ($$d\\theta < 0$$) makes the integral negative, but you'd take absolute value.\n+ The formula's symmetry comes from $$r^2 \\geq 0$$ unconditionally.\n\nSo polar integration is \"orientation-independent\" up to sign on $$d\\theta$$ ŌĆö simpler than Cartesian.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_87", "judge_pick": true}, {"question": "Find the area of one loop of $$r = a\\cos 3\\theta$$. What's the integration setup, and why? (4 steps)", "answer": "- Step 1: $$r = a\\cos 3\\theta$$ has 3 petals. One petal corresponds to one interval where $$\\cos 3\\theta \\geq 0$$.\n- Step 2: $$\\cos 3\\theta \\geq 0$$ when $$3\\theta \\in [-\\pi/2, \\pi/2]$$, i.e., $$\\theta \\in [-\\pi/6, \\pi/6]$$. This is the central petal along the initial line.\n- Step 3: Set up: $$\\text{Area} = \\frac{1}{2}\\int_{-\\pi/6}^{\\pi/6} a^2\\cos^2(3\\theta)\\, d\\theta$$. Use $$\\cos^2(3\\theta) = (1 + \\cos 6\\theta)/2$$.\n- Step 4: Integrand becomes $$a^2(1 + \\cos 6\\theta)/4$$. Integrate: constant gives $$a^2 \\cdot \\pi/3 / 4 = \\pi a^2/12$$; $$\\cos 6\\theta$$ vanishes at limits. Result: $$\\pi a^2/12$$ per petal.\n\nEach petal area is $$\\pi a^2/12$$; total area for all 3 is $$\\pi a^2/4$$.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_88", "judge_pick": false}, {"question": "Suppose you want the area of the region inside one polar loop of $$r = 1 + \\cos\\theta$$ but outside another loop of $$r = 3\\cos\\theta$$. What's the conceptual difficulty? (3 steps)", "answer": "- Step 1: Both curves cross at certain angles; the \"inside one outside other\" region depends on the relative positions of the two curves at each angle.\n- Step 2: You need to identify intervals where $$r = 1 + \\cos\\theta > 3\\cos\\theta$$ (cardioid is outside circle) and where the inequality reverses.\n- Step 3: For each such interval, the area is computed as $$\\frac{1}{2}\\int (r_{\\text{larger}}^2 - r_{\\text{smaller}}^2)\\,d\\theta$$ ŌĆö taking the larger as outer, smaller as inner.\n+ Boundary occurs at intersections: $$1 + \\cos\\theta = 3\\cos\\theta$$ gives $$\\cos\\theta = 1/2$$, so $$\\theta = \\pm \\pi/3$$.\n+ Test in each angular interval to see which curve is larger.\n\nThe conceptual difficulty: identify which curve is \"inner\" vs \"outer\" at each angular range, possibly switching at intersections.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_89", "judge_pick": false}, {"question": "When converting an Argand region $$A = \\{z: -\\pi/4 \\leq \\arg z \\leq 0\\} \\cap \\{z: |z - 4 + 3i| \\leq 5\\}$$ to a polar area integral, what limits do you use? (4 steps)", "answer": "- Step 1: The region is the intersection of an angular sector ($$\\theta \\in [-\\pi/4, 0]$$) and a disk centred at $$(4, -3)$$ with radius 5.\n- Step 2: The disk passes through origin (since distance from $$(4,-3)$$ to origin is $$\\sqrt{16+9} = 5$$). Its polar equation is $$r = 8\\cos\\theta - 6\\sin\\theta$$.\n- Step 3: For the sector $$\\theta \\in [-\\pi/4, 0]$$, the disk's polar function $$r = 8\\cos\\theta - 6\\sin\\theta$$ gives the outer boundary at each $$\\theta$$.\n- Step 4: Area: $$\\text{Area} = \\frac{1}{2}\\int_{-\\pi/4}^0 (8\\cos\\theta - 6\\sin\\theta)^2 d\\theta$$.\n+ Verify the entire sector lies within the disk (otherwise need to split).\n+ Compute and round per problem.\n\nThe polar formula handles wedge-disk intersections elegantly when both are based at the origin.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_90", "judge_pick": false}, {"question": "A polar curve has $$r = 2(1 + \\cos\\theta)$$. Where does it have a vertical tangent on the right (positive $$x$$ side)? (4 steps)", "answer": "- Step 1: Vertical tangent requires $$dx/d\\theta = 0$$. With $$x = 2(1+\\cos\\theta)\\cos\\theta = 2\\cos\\theta + 2\\cos^2\\theta$$:\n- Step 2: $$dx/d\\theta = -2\\sin\\theta - 4\\cos\\theta\\sin\\theta = -2\\sin\\theta(1 + 2\\cos\\theta)$$.\n- Step 3: Setting to zero: $$\\sin\\theta = 0$$ ($$\\theta = 0$$ or $$\\pi$$) or $$\\cos\\theta = -1/2$$ ($$\\theta = 2\\pi/3$$ or $$4\\pi/3$$).\n- Step 4: At $$\\theta = 0$$: $$x = 4$$ (rightmost point ŌĆö vertical tangent here).\n+ Other vertical tangents: at $$\\theta = 2\\pi/3, 4\\pi/3$$, $$x = 2(-1/2) + 2(1/4) = -1/2$$ ŌĆö left-side vertical tangents.\n+ At $$\\theta ute $$x^2 + y^2 = r^2$$, $$x = r\\cos\\theta$$: $$r^2 - 2ar\\cos\\theta = 0$$.\n- Step 3: Factor: $$r(r - 2a\\cos\\theta) = 0$$. Either $$r = 0$$ (the pole ŌĆö included as a point on the circle) or $$r = 2a\\cos\\theta$$.\n+ Final polar form: $$r = 2a\\cos\\theta$$.\n+ \"Multiplying by $$r$$\" is preferred over \"dividing by $$r$$\" because the multiplied equation includes $$r = 0$$ automatically.\n+ At $$\\theta = 0$$: $$r = 2a$$ (rightmost, diameter); at $$\\theta = \\pm\\pi/2$$: $$r = 0$$ (origin).", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_96", "judge_pick": true}, {"question": "For the curve $$r^2 = a^2\\sin 2\\theta$$, why does it lie only in the first and third quadrants, not the second and fourth? (3 steps)", "answer": "- Step 1: For real $$r$$, need $$\\sin 2\\theta \\geq 0$$: $$2\\theta \\in [0, \\pi] \\cup [2\\pi, 3\\pi] \\cup \\ldots$$, so $$\\theta \\in [0, \\pi/2] \\cup [\\pi, 3\\pi/2]$$.\n- Step 2: First range $$[0, \\pi/2]$$ is the first quadrant. Second range $$[\\pi, 3\\pi/2]$$ is the third quadrant. Second and fourth quadrants are excluded since $$\\sin 2\\theta < 0$$ there.\n- Step 3: One loop in first quadrant, the other in third ŌĆö diagonally opposite, forming a \"tilted figure-8\".\n+ Compare $$r^2 = a^2\\cos 2\\theta$$: lies in horizontal lobes (around $$x$$-axis).\n+ The trig function determines orientation.\n\nThe lemniscate is structurally a two-loop curve with orientation determined by the trig function's sign pattern.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_97", "judge_pick": false}, {"question": "Conceptually, when you set $$dx/d\\theta = 0$$ to find vertical tangents on a polar curve, what is geometrically happening? (3 steps)", "answer": "- Step 1: $$dx/d\\theta = 0$$ means $$x$$ is at a local maximum or minimum as a function of $$\\theta$$ ŌĆö the curve is \"turning around\" horizontally.\n- Step 2: At such points, the curve is momentarily moving only vertically (in $$y$$), with no change in $$x$$.\n- Step 3: This is exactly the condition for a vertical tangent ŌĆö the leftmost or rightmost points of the curve.\n+ For a convex lima├¦on, only two such points exist.\n+ For a dimpled lima├¦on, there are four (the two extremes plus two \"interior\" tangents bounding the dimple).\n\nVertical tangents = leftmost/rightmost points = extreme $$x$$-values.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_98", "judge_pick": true}, {"question": "For the cross-section model $$r = k\\theta$$ for $$0 \\leq \\theta \\leq 4\\pi$$ with horizontal diameter 3 cm, find the total shaded area between the spiral and itself. (4 steps)", "answer": "- Step 1: From $$7k\\pi = 3$$, we have $$k = 3/(7\\pi)$$.\n- Step 2: The total shaded area is the difference between the area enclosed by the outer turn and the area enclosed by the inner turn.\n- Step 3: Area of outer turn (from $$\\theta = 0$$ to $$4\\pi$$): $$\\frac{1}{2}\\int_0^{4\\pi} (k\\theta)^2 d\\theta = \\frac{k^2}{2} \\cdot \\frac{(4\\pi)^3}{3} = \\frac{32\\pi^3 k^2}{3}$$.\n- Step 4: Area of inner turn (from $$\\theta = 0$$ to $$2\\pi$$): $$\\frac{1}{2}\\int_0^{2\\pi} (k\\theta)^2 d\\theta = \\frac{k^2}{2} \\cdot \\frac{(2\\pi)^3}{3} = \\frac{4\\pi^3 k^2}{3}$$.\n+ Shaded area = outer ŌłÆ inner = $$\\frac{32\\pi^3 k^2}{3} - \\frac{4\\pi^3 k^2}{3} = \\frac{28\\pi^3 k^2}{3}$$.\n+ Substitute $$k^2 = 9/(49\\pi^2)$$: shaded area = $$\\frac{28\\pi^3 \\cdot 9}{3 \\cdot 49\\pi^2} = \\frac{252\\pi}{147} = \\frac{12\\pi}{7}$$.\n\nConceptually: the spiral's \"loops\" stack, and the shaded region between them is the difference of two integrals.", "source": "Opus 4.7 ŌæĪ", "_id": "opus_2_99", "judge_pick": false}], "count": 100}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 13130, "out_tokens": 17328, "reasoning_chars": 36896, "cost_eur": 0.0685, "elapsed_s": 738, "content_chars": 30112}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_t const SK='fp2_ch8';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">ŌĆó ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">ŌĆó ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}

function fC(n){return n!=null?'Ōé¼'+n.toFixed(4):'ŌĆö'}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">­¤ōī My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">Ō£© Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'ŌĆö'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'ŌĆö'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'ŌĆö'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">­¤ōŗ</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('­¤ōŗ '+myCards.length+' cards copied ŌĆö paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('/api/notion',{method:'POST',signal:ctrl.signal,headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('ŌĆö')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error ŌåÆ clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
