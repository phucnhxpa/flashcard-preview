B$$\nSo the product simplifies to $$\\cos(k+1)\\theta + i\\sin(k+1)\\theta$$.\n\nDeep insight: the angle-addition formulas and the exponential law $$e^a e^b = e^{a+b}$$ are two faces of the SAME fact — this is exactly why Euler's relation makes trigonometry so much cleaner.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "How would you simplify $$\\dfrac{(\\cos\\alpha + i\\sin\\alpha)^5}{(\\cos\\beta - i\\sin\\beta)^3}$$ using de Moivre's theorem? (Note the minus sign in the denominator!) (4 steps)", "answer": "- Step 1: Spot the trap: the denominator has $$-i\\sin\\beta$$, which is NOT standard form. Rewrite using parity: $$\\cos\\beta - i\\sin\\beta = \\cos(-\\beta) + i\\sin(-\\beta)$$.\n- Step 2: Apply de Moivre to numerator and denominator:\n+ Numerator: $$(\\cos\\alpha + i\\sin\\alpha)^5 = \\cos 5\\alpha + i\\sin 5\\alpha$$\n+ Denominator: $$(\\cos(-\\beta) + i\\sin(-\\beta))^3 = \\cos(-3\\beta) + i\\sin(-3\\beta)$$\n- Step 3: Divide using the quotient rule (subtract arguments):\n$$\\frac{\\cos 5\\alpha + i\\sin 5\\alpha}{\\cos(-3\\beta) + i\\sin(-3\\beta)} = \\cos(5\\alpha - (-3\\beta)) + i\\sin(5\\alpha - (-3\\beta))$$\n$$= \\cos(5\\alpha + 3\\beta) + i\\sin(5\\alpha + 3\\beta)$$\n- Step 4: Observe: the minus sign on $$\\sin$$ in the denominator effectively flipped a subtraction into an addition of arguments — a common pattern.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Compute $$(1 + i\\sqrt{3})^7$$ using de Moivre's theorem at a conceptual level (no heavy computation). (4 steps)", "answer": "- Step 1: Convert $$1 + i\\sqrt{3}$$ to polar form. Modulus: $$\\sqrt{1 + 3} = 2$$. Argument: $$\\arctan(\\sqrt{3}/1) = \\pi/3$$ (first quadrant). So $$1 + i\\sqrt{3} = 2e^{i\\pi/3}$$.\n- Step 2: Apply de Moivre: $$(2e^{i\\pi/3})^7 = 2^7 e^{i\\cdot 7\\pi/3}$$.\n- Step 3: Reduce argument to principal range: $$\\tfrac{7\\pi}{3} - 2\\pi = \\tfrac{\\pi}{3}$$. So the result is $$128\\, e^{i\\pi/3}$$.\n- Step 4: Convert back if needed: $$128\\left(\\cos\\tfrac{\\pi}{3} + i\\sin\\tfrac{\\pi}{3}\\right) = 128\\left(\\tfrac{1}{2} + i\\tfrac{\\sqrt{3}}{2}\\right) = 64 + 64i\\sqrt{3}$$.\n\nTakeaway: raising to the $$n$$th power is EASY in polar form — just multiply the argument by $$n$$. The hard work is converting between forms.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Why would raising $$1 + i\\sqrt{3}$$ to a high integer power by direct rectangular-form multiplication be impractical compared to using de Moivre? (3 steps)", "answer": "- Step 1: Rectangular multiplication needs expanding $$(a+bi)(c+di)$$ for each step. Computing $$(1 + i\\sqrt{3})^7$$ by repeated multiplication takes 6 separate complex multiplications, each with 4 real multiplications + 2 additions.\n- Step 2: This is $$O(n)$$ operations, each generating a growing tangle of $$\\sqrt{3}$$-terms requiring simplification.\n- Step 3: De Moivre: one polar conversion + one argument-scaling + one rectangular conversion back. The polar representation INSULATES you from the combinatorial explosion of cross terms.\n\nAnalogy: logarithms make multiplication easy because they turn multiplicative structure into additive structure. Polar form + de Moivre does the same for complex exponentiation.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "Describe the general strategy for using de Moivre plus the binomial expansion to express $$\\cos n\\theta$$ in terms of powers of $$\\cos\\theta$$. (4 steps)", "answer": "- Step 1: Start with the identity $$\\cos n\\theta + i\\sin n\\theta = (\\cos\\theta + i\\sin\\theta)^n$$ from de Moivre.\n- Step 2: Expand the RHS using the binomial theorem:\n$$\\sum_{k=0}^n \\binom{n}{k}\\cos^{n-k}\\theta\\,(i\\sin\\theta)^k$$\n- Step 3: Simplify powers of $$i$$: $$i^k$$ cycles through $$1, i, -1, -i$$, separating the expansion into REAL (even $$k$$) and IMAGINARY (odd $$k$$) parts.\n- Step 4: Equate real parts to get $$\\cos n\\theta$$ in terms of $$\\cos^{n-k}\\theta\\,\\sin^k\\theta$$ (even $$k$$). Then replace $$\\sin^{2m}\\theta = (1-\\cos^2\\theta)^m$$ to get a PURE cosine polynomial in $$\\cos\\theta$$.\n\nDeep insight: the imaginary unit $$i$$ acts as a \"bookkeeping tag\" that keeps sine-terms and cosine-terms separated. Equating real and imaginary parts is a clever way to extract one family of identities at a time.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Walk through the derivation of $$\\cos 6\\theta = 32\\cos^6\\theta - 48\\cos^4\\theta + 18\\cos^2\\theta - 1$$ using de Moivre's theorem. (5 steps)", "answer": "- Step 1: By de Moivre, $$(\\cos\\theta + i\\sin\\theta)^6 = \\cos 6\\theta + i\\sin 6\\theta$$.\n- Step 2: Binomial expand the LHS:\n$$= \\cos^6\\theta + 6i\\cos^5\\theta\\sin\\theta + 15i^2\\cos^4\\theta\\sin^2\\theta + 20i^3\\cos^3\\theta\\sin^3\\theta$$\n$$+ 15i^4\\cos^2\\theta\\sin^4\\theta + 6i^5\\cos\\theta\\sin^5\\theta + i^6\\sin^6\\theta$$\n- Step 3: Simplify powers of $$i$$: $$i^2 = -1, i^3 = -i, i^4 = 1, i^5 = i, i^6 = -1$$. Take REAL PART (even powers of $$i$$ only):\n$$\\cos 6\\theta = \\cos^6\\theta - 15\\cos^4\\theta\\sin^2\\theta + 15\\cos^2\\theta\\sin^4\\theta - \\sin^6\\theta$$\n- Step 4: Replace every $$\\sin^{2k}\\theta$$ with $$(1-\\cos^2\\theta)^k$$ to get a polynomial purely in $$\\cos\\theta$$:\n$$= \\cos^6\\theta - 15\\cos^4\\theta(1-\\cos^2\\theta) + 15\\cos^2\\theta(1-\\cos^2\\theta)^2 - (1-\\cos^2\\theta)^3$$\n- Step 5: Expand and combine like terms. The $$\\cos^6$$ coefficient is $$1 + 15 + 15 + 1 = 32$$. The $$\\cos^4$$ coefficient collects to $$-48$$. The $$\\cos^2$$ coefficient to $$18$$. The constant: $$-1$$. Result: $$\\cos 6\\theta = 32\\cos^6\\theta - 48\\cos^4\\theta + 18\\cos^2\\theta - 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Why, in the final step of deriving a pure-cosine identity for $$\\cos n\\theta$$, do we ONLY need to use the substitution $$\\sin^2\\theta = 1 - \\cos^2\\theta$$ (and not $$\\sin\\theta = \\sqrt{1-\\cos^2\\theta}$$)? (3 steps)", "answer": "- Step 1: After equating real parts of $$(\\cos\\theta + i\\sin\\theta)^n$$, only EVEN powers of $$\\sin\\theta$$ appear (because odd-$$k$$ terms have odd powers of $$i$$ and are imaginary).\n- Step 2: Every $$\\sin^{2m}\\theta$$ can be written as $$(1-\\cos^2\\theta)^m$$ — a polynomial in $$\\cos\\theta$$, no square root needed.\n- Step 3: If ODD powers of $$\\sin\\theta$$ remained, we'd need $$\\sin\\theta = \\pm\\sqrt{1-\\cos^2\\theta}$$ (messy sign dependence). But the structure of the REAL part guarantees no odd $$\\sin$$ powers.\n\nThis is why \"$$\\cos n\\theta$$ in terms of $$\\cos\\theta$$\" gives a CLEAN POLYNOMIAL identity — the Chebyshev polynomial of the first kind, $$T_n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "Derive $$\\sin 3\\theta = 3\\sin\\theta - 4\\sin^3\\theta$$ using de Moivre's theorem. (4 steps)", "answer": "- Step 1: By de Moivre, $$\\cos 3\\theta + i\\sin 3\\theta = (\\cos\\theta + i\\sin\\theta)^3$$.\n- Step 2: Expand the RHS:\n$$= \\cos^3\\theta + 3i\\cos^2\\theta\\sin\\theta - 3\\cos\\theta\\sin^2\\theta - i\\sin^3\\theta$$\n(using $$i^2 = -1, i^3 = -i$$).\n- Step 3: Equate IMAGINARY parts: $$\\sin 3\\theta = 3\\cos^2\\theta\\sin\\theta - \\sin^3\\theta$$.\n- Step 4: Replace $$\\cos^2\\theta = 1 - \\sin^2\\theta$$ to get a pure-$$\\sin$$ polynomial:\n$$\\sin 3\\theta = 3(1-\\sin^2\\theta)\\sin\\theta - \\sin^3\\theta = 3\\sin\\theta - 3\\sin^3\\theta - \\sin^3\\theta = 3\\sin\\theta - 4\\sin^3\\theta$$", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "When deriving $$\\sin n\\theta$$ in terms of $$\\sin\\theta$$ via de Moivre, why is the result \"clean\" (pure $$\\sin$$) for odd $$n$$ but \"mixed\" (involving $$\\cos$$) for even $$n$$? (3 steps)", "answer": "- Step 1: In the binomial expansion of $$(\\cos\\theta + i\\sin\\theta)^n$$, the imaginary part collects terms with ODD $$k$$ in $$\\cos^{n-k}\\theta\\,(i\\sin\\theta)^k$$ — so $$k$$ odd.\n- Step 2: If $$n$$ is ODD: $$n-k$$ is EVEN when $$k$$ is odd, so $$\\cos^{n-k}\\theta = (1-\\sin^2\\theta)^{(n-k)/2}$$ — a polynomial in $$\\sin^2\\theta$$. Everything reduces to pure powers of $$\\sin\\theta$$.\n- Step 3: If $$n$$ is EVEN: $$n-k$$ is ODD when $$k$$ is odd, so $$\\cos^{n-k}\\theta$$ has an odd power of $$\\cos\\theta$$ that can't be cleanly eliminated. Example: $$\\sin 4\\theta = 4\\cos^3\\theta\\sin\\theta - 4\\cos\\theta\\sin^3\\theta$$ — a single factor of $$\\cos\\theta$$ remains.\n\nThe parity of $$n$$ determines whether you get a \"clean\" $$T_n$$-style or a \"mixed\" identity.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "If $$z = \\cos\\theta + i\\sin\\theta$$ (a unit complex number), prove that $$\\dfrac{1}{z} = \\cos\\theta - i\\sin\\theta$$. Why does this matter for deriving power identities? (4 steps)", "answer": "- Step 1: By de Moivre with $$n = -1$$: $$z^{-1} = (\\cos\\theta + i\\sin\\theta)^{-1} = \\cos(-\\theta) + i\\sin(-\\theta)$$.\n- Step 2: Apply parity: $$\\cos(-\\theta) = \\cos\\theta$$, $$\\sin(-\\theta) = -\\sin\\theta$$, giving $$\\dfrac{1}{z} = \\cos\\theta - i\\sin\\theta$$.\n- Step 3: So $$z$$ and $$1/z$$ differ only in the sign of the imaginary part — they are COMPLEX CONJUGATES (when $$|z| = 1$$).\n- Step 4: It matters because we get clean identities: $$z + \\tfrac{1}{z} = 2\\cos\\theta$$ (real parts add) and $$z - \\tfrac{1}{z} = 2i\\sin\\theta$$ (imaginary parts double). These are the launching pads for expressing $$\\cos^n\\theta$$ and $$\\sin^n\\theta$$ as sums of multiple angles.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "State the four core identities that follow from $$z = \\cos\\theta + i\\sin\\theta$$ being a unit complex number, in BOTH forms (with $$z$$ and with exponentials). (3 steps)", "answer": "- Step 1: The identities with $$z$$:\n+ $$z + \\tfrac{1}{z} = 2\\cos\\theta$$\n+ $$z - \\tfrac{1}{z} = 2i\\sin\\theta$$\n+ $$z^n + \\tfrac{1}{z^n} = 2\\cos n\\theta$$\n+ $$z^n - \\tfrac{1}{z^n} = 2i\\sin n\\theta$$\n- Step 2: In exponential form (substituting $$z = e^{i\\theta}$$):\n+ $$\\cos n\\theta = \\tfrac{1}{2}(e^{in\\theta} + e^{-in\\theta})$$\n+ $$\\sin n\\theta = \\tfrac{1}{2i}(e^{in\\theta} - e^{-in\\theta})$$\n- Step 3: Derivation: $$z$$ and $$1/z = \\bar{z}$$ are conjugates when $$|z|=1$$, so sum doubles the real part, difference doubles $$i$$ times the imaginary part. The $$n$$ versions come from de Moivre: $$z^n = e^{in\\theta}$$ and $$z^{-n} = e^{-in\\theta}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Explain the key strategic idea behind expressing $$\\cos^n\\theta$$ as a sum of $$\\cos k\\theta$$ terms. Why is this \"linearization\" useful? (4 steps)", "answer": "- Step 1: Start with $$z + \\tfrac{1}{z} = 2\\cos\\theta$$, so $$(2\\cos\\theta)^n = \\left(z + \\tfrac{1}{z}\\right)^n$$.\n- Step 2: Expand $$\\left(z + \\tfrac{1}{z}\\right)^n$$ binomially. Each term looks like $$\\binom{n}{k}z^{n-2k}$$, so you get $$z^n, z^{n-2}, \\ldots, z^{-(n-2)}, z^{-n}$$.\n- Step 3: Pair terms with opposite powers: $$z^m + z^{-m} = 2\\cos m\\theta$$. The full expansion becomes a SUM of $$\\cos(k\\theta)$$'s.\n- Step 4: Useful because $$\\int\\cos k\\theta\\,d\\theta = \\tfrac{\\sin k\\theta}{k}$$ is trivial, whereas $$\\int\\cos^n\\theta\\,d\\theta$$ is hard. This \"linearization\" turns a NONLINEAR integrand into a linear combination of easy ones.\n\nDeep connection: the map $$\\cos^n \\leftrightarrow \\{\\cos k\\theta\\}$$ is the heart of FOURIER analysis — functions on a circle are naturally expressed as sums of $$\\cos k\\theta$$ and $$\\sin k\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "Derive $$\\cos^5\\theta = \\tfrac{1}{16}\\cos 5\\theta + \\tfrac{5}{16}\\cos 3\\theta + \\tfrac{5}{8}\\cos\\theta$$ using the $$(z + 1/z)^n$$ method. (5 steps)", "answer": "- Step 1: Let $$z = \\cos\\theta + i\\sin\\theta$$, so $$z + \\tfrac{1}{z} = 2\\cos\\theta$$. Then $$(2\\cos\\theta)^5 = 32\\cos^5\\theta = \\left(z + \\tfrac{1}{z}\\right)^5$$.\n- Step 2: Binomial expand:\n$$\\left(z + \\tfrac{1}{z}\\right)^5 = z^5 + 5z^3 + 10z + \\tfrac{10}{z} + \\tfrac{5}{z^3} + \\tfrac{1}{z^5}$$\n- Step 3: Group each $$z^m$$ with $$z^{-m}$$:\n$$= \\left(z^5 + \\tfrac{1}{z^5}\\right) + 5\\left(z^3 + \\tfrac{1}{z^3}\\right) + 10\\left(z + \\tfrac{1}{z}\\right)$$\n- Step 4: Apply $$z^n + z^{-n} = 2\\cos n\\theta$$:\n$$= 2\\cos 5\\theta + 10\\cos 3\\theta + 20\\cos\\theta$$\n- Step 5: Divide both sides of $$32\\cos^5\\theta = 2\\cos 5\\theta + 10\\cos 3\\theta + 20\\cos\\theta$$ by 32 to get $$\\cos^5\\theta = \\tfrac{1}{16}\\cos 5\\theta + \\tfrac{5}{16}\\cos 3\\theta + \\tfrac{5}{8}\\cos\\theta$$.\n\nConceptual takeaway: binomial coefficients are symmetric ($$\\binom{n}{k} = \\binom{n}{n-k}$$), which is exactly WHY $$z^m$$ and $$z^{-m}$$ terms pair up so cleanly.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Derive the linearization of $$\\sin^4\\theta$$ as a sum of cosines using the $$z - 1/z$$ technique. (5 steps)", "answer": "- Step 1: Set $$z = \\cos\\theta + i\\sin\\theta$$. Then $$z - \\tfrac{1}{z} = 2i\\sin\\theta$$, so $$(2i\\sin\\theta)^4 = \\left(z - \\tfrac{1}{z}\\right)^4$$.\n- Step 2: LHS: $$(2i)^4\\sin^4\\theta = 16\\sin^4\\theta$$ (since $$i^4 = 1$$).\n- Step 3: Binomial-expand RHS:\n$$\\left(z - \\tfrac{1}{z}\\right)^4 = z^4 - 4z^2 + 6 - \\tfrac{4}{z^2} + \\tfrac{1}{z^4}$$\n- Step 4: Group $$z^m + z^{-m}$$ pairs:\n$$= (z^4 + z^{-4}) - 4(z^2 + z^{-2}) + 6 = 2\\cos 4\\theta - 8\\cos 2\\theta + 6$$\n- Step 5: Set LHS = RHS: $$16\\sin^4\\theta = 2\\cos 4\\theta - 8\\cos 2\\theta + 6$$, so $$\\sin^4\\theta = \\tfrac{1}{8}(\\cos 4\\theta - 4\\cos 2\\theta + 3)$$.\n\nNote: no SINE terms appear on the RHS — because $$\\sin^4\\theta$$ is an even function (even power means all-cosine linearization).", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Why does the expansion of $$\\left(z - \\tfrac{1}{z}\\right)^n$$ introduce a factor of $$(2i)^n$$ on the LHS, and how does this affect the result for different $$n \\mod 4$$? (3 steps)", "answer": "- Step 1: $$z - \\tfrac{1}{z} = 2i\\sin\\theta$$, so $$\\left(z - \\tfrac{1}{z}\\right)^n = (2i)^n\\sin^n\\theta = 2^n i^n \\sin^n\\theta$$.\n- Step 2: The $$i^n$$ factor cycles based on $$n \\mod 4$$:\n+ $$n \\equiv 0\\pmod{4}$$: $$i^n = 1$$, LHS is real positive.\n+ $$n \\equiv 2\\pmod{4}$$: $$i^n = -1$$, LHS is real negative.\n+ Odd $$n$$: $$i^n = \\pm i$$, LHS is purely imaginary.\n- Step 3: Even $$n$$ gives all-COSINE linearizations (LHS real); odd $$n$$ gives all-SINE linearizations (LHS imaginary). The sign pattern from $$i^n$$ propagates into the final coefficients.\n\nThe subtle sign bookkeeping is what makes $$\\sin^n$$ linearization slightly trickier than $$\\cos^n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Imagine you need to evaluate $$\\int_0^{\\pi/2}\\sin^4\\theta\\,d\\theta$$. Give the conceptual roadmap using de Moivre-style linearization. (4 steps)", "answer": "- Step 1: Linearize $$\\sin^4\\theta = \\tfrac{1}{8}(\\cos 4\\theta - 4\\cos 2\\theta + 3)$$ (derived via $$(z - 1/z)^4$$).\n- Step 2: Integrate term-by-term:\n$$\\int_0^{\\pi/2}\\sin^4\\theta\\,d\\theta = \\tfrac{1}{8}\\int_0^{\\pi/2}(\\cos 4\\theta - 4\\cos 2\\theta + 3)\\,d\\theta$$\n- Step 3: Each term integrates trivially using $$\\int\\cos k\\theta\\,d\\theta = \\tfrac{\\sin k\\theta}{k}$$:\n$$= \\tfrac{1}{8}\\left[\\tfrac{\\sin 4\\theta}{4} - 2\\sin 2\\theta + 3\\theta\\right]_0^{\\pi/2}$$\n- Step 4: At $$\\theta = \\pi/2$$: $$\\sin 4\\theta = \\sin 2\\pi = 0$$, $$\\sin 2\\theta = \\sin\\pi = 0$$, $$3\\theta = 3\\pi/2$$. At $$\\theta = 0$$: all zero. Result: $$\\tfrac{1}{8}\\cdot\\tfrac{3\\pi}{2} = \\tfrac{3\\pi}{16}$$.\n\nTakeaway: linearization's whole point is to convert a NONLINEAR integrand into a LINEAR combination of elementary ones.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Explain the high-level strategy to derive a formula for $$\\tan n\\theta$$ in terms of $$\\tan\\theta$$. (4 steps)", "answer": "- Step 1: From de Moivre: $$(\\cos\\theta + i\\sin\\theta)^n = \\cos n\\theta + i\\sin n\\theta$$.\n- Step 2: Binomial-expand the LHS and equate REAL and IMAGINARY parts separately:\n+ Real part = $$\\cos n\\theta$$ (even powers of $$i$$)\n+ Imaginary part = $$\\sin n\\theta$$ (odd powers of $$i$$)\n- Step 3: Compute $$\\tan n\\theta = \\dfrac{\\sin n\\theta}{\\cos n\\theta}$$, a ratio of two polynomials in $$\\cos\\theta$$ and $$\\sin\\theta$$.\n- Step 4: Divide numerator and denominator by $$\\cos^n\\theta$$ to convert every $$\\sin^k\\theta\\,\\cos^{n-k}\\theta$$ into $$\\tan^k\\theta$$. Result: $$\\tan n\\theta$$ as a rational function of $$\\tan\\theta$$.\n\nExample: $$\\tan 3\\theta = \\dfrac{3\\tan\\theta - \\tan^3\\theta}{1 - 3\\tan^2\\theta}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "Explain why the equation $$z^n = w$$ (with $$w \\ne 0$$) has exactly $$n$$ distinct complex solutions — never more, never fewer. (4 steps)", "answer": "- Step 1: Write $$w = \\rho e^{i\\phi}$$ (polar form) and $$z = re^{i\\theta}$$.\n- Step 2: Then $$z^n = r^n e^{in\\theta}$$. Equation becomes: $$r^n = \\rho$$ (one unique positive real root: $$r = \\rho^{1/n}$$), and $$n\\theta \\equiv \\phi \\pmod{2\\pi}$$.\n- Step 3: The congruence gives $$\\theta = \\dfrac{\\phi + 2k\\pi}{n}$$ for integer $$k$$. Advancing $$k$$ by 1 advances $$\\theta$$ by $$\\tfrac{2\\pi}{n}$$; advancing $$k$$ by $$n$$ advances $$\\theta$$ by $$2\\pi$$ — back to the SAME complex number.\n- Step 4: So as $$k$$ ranges over any $$n$$ CONSECUTIVE integers, we get exactly $$n$$ distinct values of $$\\theta$$ (hence distinct $$z$$'s). Beyond that, we repeat. Hence exactly $$n$$ solutions.\n\nDeep reason: this is the Fundamental Theorem of Algebra at work — the polynomial $$z^n - w$$ has degree $$n$$ with all simple roots (its derivative $$nz^{n-1}$$ is nonzero away from 0).", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Why is the trick \"$$\\cos\\theta = \\cos(\\theta + 2k\\pi)$$\" absolutely essential when solving $$z^n = w$$? What goes wrong without it? (4 steps)", "answer": "- Step 1: Setting $$n\\theta = \\phi$$ gives only ONE solution $$\\theta = \\phi/n$$. But $$z^n = w$$ has $$n$$ solutions — we're missing $$n-1$$.\n- Step 2: The key fact: the argument of a complex number isn't unique — it's defined modulo $$2\\pi$$. So $$z^n$$ has argument $$n\\theta$$ which could equal $$\\phi$$ OR $$\\phi + 2\\pi$$ OR $$\\phi - 2\\pi$$, etc.\n- Step 3: Writing $$n\\theta = \\phi + 2k\\pi$$ captures all these possibilities. Dividing by $$n$$ gives $$\\theta = \\tfrac{\\phi}{n} + \\tfrac{2k\\pi}{n}$$, and different $$k$$'s give genuinely different $$\\theta$$'s (until $$k$$ advances by $$n$$).\n- Step 4: Without this trick, you'd find only the \"principal\" root and miss the rest. It's the same reason why $$\\sqrt{4} = \\pm 2$$ (not just $$+2$$) — a square root has two branches.\n\nMisconception probe: We don't get INFINITE roots because adding $$n$$ to $$k$$ adds $$2\\pi$$ to $$\\theta$$, recovering the SAME complex number. All \"extra\" solutions are captured within $$n$$ consecutive $$k$$-values.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Describe the full step-by-step method for solving $$z^n = w$$. (5 steps)", "answer": "- Step 1: Express $$w$$ in polar form: $$w = \\rho(\\cos\\phi + i\\sin\\phi) = \\rho e^{i\\phi}$$, finding $$\\rho = |w|$$ and $$\\phi = \\arg w$$.\n- Step 2: Let $$z = r(\\cos\\theta + i\\sin\\theta) = re^{i\\theta}$$. By de Moivre, $$z^n = r^n e^{in\\theta}$$.\n- Step 3: On the RHS, write the argument generally as $$\\phi + 2k\\pi$$ to capture all branches:\n$$r^n e^{in\\theta} = \\rho e^{i(\\phi + 2k\\pi)}$$\n- Step 4: Equate moduli: $$r^n = \\rho \\Rightarrow r = \\rho^{1/n}$$. Equate arguments: $$n\\theta = \\phi + 2k\\pi \\Rightarrow \\theta = \\tfrac{\\phi + 2k\\pi}{n}$$.\n- Step 5: Choose $$n$$ consecutive integer values of $$k$$ (typically centered around 0 so arguments stay in $$(-\\pi, \\pi]$$) to get the $$n$$ distinct roots.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "For the equation $$z^n = 1$$, what are the $$n$$ distinct roots, and what is their collective name? (3 steps)", "answer": "- Step 1: Writing $$1 = e^{i\\cdot 0} = e^{i\\cdot 2k\\pi}$$, we get $$z = e^{i\\cdot 2k\\pi/n}$$ for $$k = 0, 1, \\ldots, n-1$$.\n- Step 2: Equivalently: $$z = \\cos\\left(\\tfrac{2k\\pi}{n}\\right) + i\\sin\\left(\\tfrac{2k\\pi}{n}\\right)$$ for $$k = 0, 1, \\ldots, n-1$$.\n- Step 3: These are the $$n$$th ROOTS OF UNITY. All have modulus 1 (they lie on the unit circle) and are evenly spaced by angle $$\\tfrac{2\\pi}{n}$$ — forming the vertices of a regular $$n$$-gon inscribed in the unit circle.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Define the \"primitive $$n$$th root of unity\" $$\\omega = e^{2\\pi i/n}$$, and explain its role among the $$n$$th roots of unity. (3 steps)", "answer": "- Step 1: $$\\omega = e^{2\\pi i/n}$$ is the $$n$$th root of unity with the SMALLEST positive argument.\n- Step 2: All $$n$$ roots of unity can be generated as POWERS of $$\\omega$$: $$1, \\omega, \\omega^2, \\omega^3, \\ldots, \\omega^{n-1}$$.\n- Step 3: Geometrically, starting from $$1$$ on the Argand plane, multiplying by $$\\omega$$ rotates by $$\\tfrac{2\\pi}{n}$$ — so the list $$1, \\omega, \\omega^2, \\ldots$$ traces out the regular $$n$$-gon's vertices in anticlockwise order. $$\\omega$$ is \"primitive\" because it generates the entire cyclic group of roots.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Prove that the sum of all $$n$$th roots of unity is zero, for $$n \\ge 2$$. Give two different justifications. (4 steps)", "answer": "- Step 1 (Geometric series approach): The sum is $$S = 1 + \\omega + \\omega^2 + \\cdots + \\omega^{n-1} = \\dfrac{\\omega^n - 1}{\\omega - 1}$$.\n- Step 2: Since $$\\omega^n = e^{2\\pi i} = 1$$, the numerator is zero. And $$\\omega \\ne 1$$ (as $$\\omega = e^{2\\pi i/n}, n \\ge 2$$), so the denominator is nonzero. Hence $$S = 0$$.\n- Step 3 (Vieta's approach): The roots of $$z^n - 1 = 0$$ are exactly the $$n$$th roots of unity. By Vieta's formulas, the sum of roots equals $$-\\tfrac{\\text{coefficient of } z^{n-1}}{\\text{leading coefficient}} = -\\tfrac{0}{1} = 0$$ — because $$z^n - 1$$ has NO $$z^{n-1}$$ term.\n- Step 4 (Geometric intuition): The roots sit symmetrically around the origin at equal angles, so their vector sum cancels by symmetry — like $$n$$ equal forces acting at $$n$$ equally-spaced directions produce zero net force.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Why is it important to choose $$n$$ CONSECUTIVE values of $$k$$ when finding the $$n$$ roots of $$z^n = w$$? Does it matter WHICH $$n$$? (3 steps)", "answer": "- Step 1: The roots are $$\\theta_k = \\tfrac{\\phi + 2k\\pi}{n}$$. Advancing $$k$$ by 1 advances $$\\theta$$ by $$\\tfrac{2\\pi}{n}$$; advancing $$k$$ by $$n$$ advances $$\\theta$$ by $$2\\pi$$ — a full revolution, returning to the same complex number.\n- Step 2: Any $$n$$ consecutive integers give the full set of distinct roots. You could pick $$k = 0, 1, \\ldots, n-1$$, or $$k = 1, 2, \\ldots, n$$, or $$k = -\\lfloor n/2 \\rfloor, \\ldots, \\lceil n/2 \\rceil - 1$$.\n- Step 3: The USUAL CONVENTION is to pick $$k$$ symmetrically around 0 so that arguments land in the principal range $$(-\\pi, \\pi]$$. This gives cleaner \"principal-argument\" answers. If an argument lands outside, add or subtract $$2\\pi$$.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "The three cube roots of unity are $$1, \\omega, \\omega^2$$ where $$\\omega = e^{2\\pi i/3}$$. Show that $$\\omega^2 = \\bar{\\omega}$$ (the complex conjugate), and explain geometrically why. (3 steps)", "answer": "- Step 1: $$\\omega = e^{2\\pi i/3}$$ has argument $$2\\pi/3$$. Its conjugate is $$\\bar\\omega = e^{-2\\pi i/3}$$, argument $$-2\\pi/3$$.\n- Step 2: Compute $$\\omega^2 = e^{4\\pi i/3}$$. Reduce: $$4\\pi/3 - 2\\pi = -2\\pi/3$$. So $$\\omega^2 = e^{-2\\pi i/3} = \\bar\\omega$$. ✓\n- Step 3: Geometrically: $$1, \\omega, \\omega^2$$ form an equilateral triangle on the unit circle with $$1$$ on the positive real axis. The other two vertices are MIRROR IMAGES across the real axis — hence complex conjugates of each other. So $$\\omega^2 = \\bar\\omega$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Explain why the $$n$$th roots of unity form the vertices of a regular $$n$$-gon inscribed in the unit circle. (3 steps)", "answer": "- Step 1: Each root has modulus 1, so they all lie on the UNIT CIRCLE.\n- Step 2: Adjacent roots have arguments differing by $$\\tfrac{2\\pi}{n}$$ (i.e., $$\\theta_{k+1} - \\theta_k = \\tfrac{2\\pi}{n}$$), so they're separated by EQUAL angles around the circle.\n- Step 3: $$n$$ points on a circle separated by equal angles are precisely the vertices of a REGULAR $$n$$-GON — a triangle for $$n=3$$, square for $$n=4$$, etc.\n\nTakeaway: roots of unity are the most symmetric possible arrangement of $$n$$ points on a circle. This symmetry is why they appear everywhere in math (group theory, Fourier transforms, cyclotomic polynomials, tiling theory).", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "Walk through how to solve $$z^4 = 2 + 2i\\sqrt{3}$$ conceptually (without heavy arithmetic). (5 steps)", "answer": "- Step 1: Convert RHS to polar. Modulus: $$|2 + 2i\\sqrt{3}| = \\sqrt{4 + 12} = 4$$. Argument: $$\\arctan(\\sqrt{3}) = \\pi/3$$. So $$2 + 2i\\sqrt{3} = 4e^{i\\pi/3}$$.\n- Step 2: Write $$z = re^{i\\theta}$$ so $$z^4 = r^4 e^{i4\\theta}$$. Set $$r^4 = 4 \\Rightarrow r = 4^{1/4} = \\sqrt{2}$$.\n- Step 3: Set $$4\\theta = \\tfrac{\\pi}{3} + 2k\\pi$$, giving $$\\theta = \\tfrac{\\pi}{12} + \\tfrac{k\\pi}{2}$$.\n- Step 4: Pick 4 consecutive $$k$$'s (e.g., $$k = 0, 1, -1, -2$$): arguments $$\\tfrac{\\pi}{12}, \\tfrac{7\\pi}{12}, -\\tfrac{5\\pi}{12}, -\\tfrac{11\\pi}{12}$$.\n- Step 5: The four roots $$\\sqrt{2}\\,e^{i\\theta_k}$$ are equally spaced at intervals of $$\\tfrac{\\pi}{2}$$ around a circle of radius $$\\sqrt{2}$$ — a SQUARE rotated by $$\\tfrac{\\pi}{12}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Geometrically, the solutions of $$z^n = w$$ are always arranged how on the Argand plane? Why? (3 steps)", "answer": "- Step 1: All $$n$$ solutions lie on a CIRCLE of radius $$|w|^{1/n}$$ centered at the origin — because they all share the same modulus.\n- Step 2: Their arguments are $$\\theta_k = \\tfrac{\\arg w + 2k\\pi}{n}$$, so successive arguments differ by exactly $$\\tfrac{2\\pi}{n}$$ — they're EQUALLY SPACED on the circle.\n- Step 3: Hence they form the vertices of a REGULAR $$n$$-GON inscribed in the circle, rotated so one vertex (at $$k=0$$) makes angle $$\\tfrac{\\arg w}{n}$$ with the positive real axis.\n\nUNIVERSAL pattern: solving any $$z^n = w$$ always produces a regular $$n$$-gon.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Once you find ONE particular $$n$$th root $$z_0$$ of $$w$$, how can you express ALL $$n$$th roots using $$z_0$$ and the $$n$$th roots of unity? (3 steps)", "answer": "- Step 1: Claim: the $$n$$ roots of $$z^n = w$$ are $$z_0, z_0\\omega, z_0\\omega^2, \\ldots, z_0\\omega^{n-1}$$, where $$\\omega = e^{2\\pi i/n}$$.\n- Step 2: Verify: $$(z_0\\omega^k)^n = z_0^n\\,\\omega^{nk} = w \\cdot 1 = w$$ (since $$z_0^n = w$$ and $$\\omega^n = 1$$). ✓\n- Step 3: These are $$n$$ distinct values because multiplying by $$\\omega^k$$ rotates $$z_0$$ by $$\\tfrac{2k\\pi}{n}$$, giving $$n$$ different angles.\n\nDeep insight: once you find ONE $$n$$th root of $$w$$, all others come from multiplying by $$n$$th roots of unity. The roots of $$w$$ are a rotated/scaled copy of the roots of unity.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "Using the fact that the sum of the five 5th roots of unity is zero, derive $$\\cos\\left(\\tfrac{2\\pi}{5}\\right) + \\cos\\left(\\tfrac{4\\pi}{5}\\right) = -\\tfrac{1}{2}$$. (4 steps)", "answer": "- Step 1: The five 5th roots of unity are $$1, e^{\\pm 2\\pi i/5}, e^{\\pm 4\\pi i/5}$$ (using symmetric range).\n- Step 2: Their sum is 0: $$1 + e^{2\\pi i/5} + e^{4\\pi i/5} + e^{-4\\pi i/5} + e^{-2\\pi i/5} = 0$$.\n- Step 3: Pair conjugates: $$e^{2\\pi i/5} + e^{-2\\pi i/5} = 2\\cos(2\\pi/5)$$ and $$e^{4\\pi i/5} + e^{-4\\pi i/5} = 2\\cos(4\\pi/5)$$.\n- Step 4: Substitute: $$1 + 2\\cos(2\\pi/5) + 2\\cos(4\\pi/5) = 0 \\Rightarrow \\cos(2\\pi/5) + \\cos(4\\pi/5) = -\\tfrac{1}{2}$$.\n\nTakeaway: algebraic identities about roots of unity translate DIRECTLY into trigonometric identities via Euler's relation.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "MISCONCEPTION PROBE: A student claims: \"since $$e^{2\\pi i} = 1$$, we have $$re^{i\\theta} = re^{i\\theta}\\cdot 1 = re^{i(\\theta + 2\\pi)}$$, so $$\\theta$$ and $$\\theta + 2\\pi$$ must represent different numbers.\" Where's the error? (3 steps)", "answer": "- Step 1: The chain $$re^{i\\theta} = re^{i(\\theta + 2\\pi)}$$ is correct — but it shows these two EXPRESSIONS are EQUAL, not that they represent different numbers.\n- Step 2: A complex number is identified with its VALUE (a point in the Argand plane), not with a particular expression for it. The argument $$\\theta$$ is not unique — infinitely many values differing by multiples of $$2\\pi$$ represent the same complex number.\n- Step 3: The principal argument convention picks the unique $$\\theta \\in (-\\pi, \\pi]$$ to give a canonical form. The identity $$e^{i\\theta} = e^{i(\\theta + 2\\pi)}$$ isn't a paradox — it's the source of multi-valuedness for ROOTS (and thus why $$z^n = w$$ has $$n$$ solutions).", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "MISCONCEPTION PROBE: A student finds square roots of $$i$$ by writing $$i = e^{i\\pi/2}$$, then concludes $$\\sqrt{i} = e^{i\\pi/4}$$ — just ONE answer. What's missing? (4 steps)", "answer": "- Step 1: A square root should give TWO solutions, not one. The student forgot the $$+2k\\pi$$ trick.\n- Step 2: Correctly: $$i = e^{i(\\pi/2 + 2k\\pi)}$$, so $$\\sqrt{i} = e^{i(\\pi/4 + k\\pi)}$$.\n- Step 3: For $$k = 0$$: $$e^{i\\pi/4} = \\tfrac{\\sqrt{2}}{2}(1 + i)$$. For $$k = 1$$: $$e^{i5\\pi/4} = -\\tfrac{\\sqrt{2}}{2}(1 + i)$$.\n- Step 4: The two square roots differ by a factor of $$-1 = e^{i\\pi}$$ — the non-trivial second root of unity.\n\nGeneral lesson: raising to fractional powers inherently introduces multi-valuedness. NEVER skip the $$+2k\\pi$$ when extracting roots.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Derive the product-to-sum formula $$\\cos A\\cos B = \\tfrac{1}{2}[\\cos(A+B) + \\cos(A-B)]$$ from Euler's relation. (4 steps)", "answer": "- Step 1: Use $$\\cos\\theta = \\tfrac{1}{2}(e^{i\\theta} + e^{-i\\theta})$$ twice:\n$$\\cos A\\cos B = \\tfrac{1}{4}(e^{iA} + e^{-iA})(e^{iB} + e^{-iB})$$\n- Step 2: Expand the product:\n$$= \\tfrac{1}{4}(e^{i(A+B)} + e^{i(A-B)} + e^{-i(A-B)} + e^{-i(A+B)})$$\n- Step 3: Group as pairs of conjugates:\n$$= \\tfrac{1}{4}\\left[(e^{i(A+B)} + e^{-i(A+B)}) + (e^{i(A-B)} + e^{-i(A-B)})\\right]$$\n$$= \\tfrac{1}{4}[2\\cos(A+B) + 2\\cos(A-B)]$$\n- Step 4: Simplify: $$= \\tfrac{1}{2}[\\cos(A+B) + \\cos(A-B)]$$.\n\nTakeaway: many trigonometric identities fall out of complex exponentials by pure algebra — much easier than angle-addition-formula manipulations.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "MISCONCEPTION PROBE: When converting $$5\\left(\\cos\\tfrac{\\pi}{8} - i\\sin\\tfrac{\\pi}{8}\\right)$$ to exponential form, a student writes $$5e^{i\\pi/8}$$. What's wrong? (3 steps)", "answer": "- Step 1: The standard exponential form $$re^{i\\theta}$$ corresponds to $$r(\\cos\\theta + i\\sin\\theta)$$ — with a PLUS sign on $$i\\sin$$.\n- Step 2: In $$5(\\cos\\tfrac{\\pi}{8} - i\\sin\\tfrac{\\pi}{8})$$, the minus sign indicates reflection across the real axis. Using parity: $$\\cos\\theta - i\\sin\\theta = \\cos(-\\theta) + i\\sin(-\\theta)$$.\n- Step 3: So the correct conversion is $$5(\\cos(-\\tfrac{\\pi}{8}) + i\\sin(-\\tfrac{\\pi}{8})) = 5e^{-i\\pi/8}$$.\n\nThe student incorrectly kept the $$+\\tfrac{\\pi}{8}$$ argument, ignoring the sign flip.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "Given $$z = \\sqrt{2}(\\cos\\tfrac{\\pi}{4} + i\\sin\\tfrac{\\pi}{4})$$ and $$w = 3(\\cos\\tfrac{5\\pi}{6} + i\\sin\\tfrac{5\\pi}{6})$$, find $$zw$$ in exponential form and interpret it geometrically relative to $$z$$. (4 steps)", "answer": "- Step 1: Convert: $$z = \\sqrt{2}\\,e^{i\\pi/4}$$, $$w = 3e^{i5\\pi/6}$$.\n- Step 2: Multiply: $$zw = 3\\sqrt{2}\\,e^{i(\\pi/4 + 5\\pi/6)} = 3\\sqrt{2}\\,e^{i(3\\pi/12 + 10\\pi/12)} = 3\\sqrt{2}\\,e^{i\\cdot 13\\pi/12}$$.\n- Step 3: Reduce to principal range: $$\\tfrac{13\\pi}{12} - 2\\pi = -\\tfrac{11\\pi}{12}$$. So $$zw = 3\\sqrt{2}\\,e^{-i\\cdot 11\\pi/12}$$.\n- Step 4: Geometrically: $$zw$$ is $$z$$ SCALED by factor 3 (modulus goes from $$\\sqrt{2}$$ to $$3\\sqrt{2}$$) and ROTATED anticlockwise by $$\\tfrac{5\\pi}{6}$$ (the argument of $$w$$). This is a \"spiral similarity\".", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "Use de Moivre's theorem to show that $$(a + bi)^n + (a - bi)^n$$ is always real for any integer $$n$$. (4 steps)", "answer": "- Step 1: Write $$a + bi = re^{i\\theta}$$ in polar form, where $$r = \\sqrt{a^2 + b^2}$$. Then $$a - bi = re^{-i\\theta}$$ (complex conjugate).\n- Step 2: By de Moivre: $$(a+bi)^n = r^n e^{in\\theta}$$ and $$(a-bi)^n = r^n e^{-in\\theta}$$.\n- Step 3: Add: $$(a+bi)^n + (a-bi)^n = r^n(e^{in\\theta} + e^{-in\\theta}) = 2r^n\\cos(n\\theta)$$.\n- Step 4: Since $$r$$ and $$\\cos(n\\theta)$$ are real, the sum is real. QED.\n\nKey principle: a number plus its complex conjugate equals TWICE the real part — always real. This generalizes to powers because $$(\\bar z)^n = \\overline{z^n}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "Verify $$\\cos^2\\theta + \\sin^2\\theta = 1$$ using Euler's relation (not the unit-circle Pythagorean argument). (4 steps)", "answer": "- Step 1: From $$e^{i\\theta} = \\cos\\theta + i\\sin\\theta$$ and $$e^{-i\\theta} = \\cos\\theta - i\\sin\\theta$$, multiply them:\n$$e^{i\\theta}\\cdot e^{-i\\theta} = (\\cos\\theta + i\\sin\\theta)(\\cos\\theta - i\\sin\\theta)$$\n- Step 2: LHS simplifies using index law: $$e^{i\\theta - i\\theta} = e^0 = 1$$.\n- Step 3: RHS is a difference of squares: $$\\cos^2\\theta - (i\\sin\\theta)^2 = \\cos^2\\theta - i^2\\sin^2\\theta = \\cos^2\\theta + \\sin^2\\theta$$.\n- Step 4: Equating: $$\\cos^2\\theta + \\sin^2\\theta = 1$$. ✓\n\nElegant insight: the Pythagorean identity is equivalent to $$e^{i\\theta}$$ lying on the unit circle. It's baked into the very definition of the complex exponential.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "What does the identity $$1 + \\omega + \\omega^2 + \\cdots + \\omega^{n-1} = 0$$ (for primitive $$n$$th root of unity $$\\omega$$) look like geometrically on the Argand plane? (3 steps)", "answer": "- Step 1: Each $$\\omega^k$$ is a unit-circle point at angle $$\\tfrac{2k\\pi}{n}$$ — treating these as vectors from origin.\n- Step 2: The vectors point equally in $$n$$ different directions — like $$n$$ arrows of equal length spread at angles $$\\tfrac{2\\pi}{n}$$ apart.\n- Step 3: By the symmetry of this \"starburst\" arrangement, every vector's contribution is balanced by others — the vector SUM cancels to zero. Physically: like $$n$$ equal-magnitude forces applied in $$n$$ equally-spaced directions produce zero net force.\n\nVisual analog: a Mercedes logo (3-pronged star) has its arms balanced; so does a 5-pointed star, a hexagon spoke pattern, etc.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "Explain the strategy for solving $$(z+1)^6 = z^6$$ and why it reduces to finding 6th roots of unity. (4 steps)", "answer": "- Step 1: Rearrange: $$\\left(\\tfrac{z+1}{z}\\right)^6 = 1$$ (valid for $$z \\ne 0$$).\n- Step 2: Let $$u = \\tfrac{z+1}{z}$$. Then $$u^6 = 1$$, so $$u$$ is a 6th root of unity: $$u \\in \\{1, e^{i\\pi/3}, e^{i2\\pi/3}, -1, e^{i4\\pi/3}, e^{i5\\pi/3}\\}$$.\n- Step 3: Exclude $$u = 1$$ (gives $$z + 1 = z$$, no solution). For each other $$u$$, solve $$z + 1 = uz$$, giving $$z = \\tfrac{1}{u - 1}$$.\n- Step 4: Five solutions result (the equation is effectively degree 5 because $$z^6$$ cancels). The substitution $$u = (z+1)/z$$ turned a messy polynomial equation into a standard roots-of-unity problem.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "In the problem \"find the smallest positive integer $$n$$ such that $$\\left(\\dfrac{1 + i\\sqrt{3}}{1 - i\\sqrt{3}}\\right)^n$$ is real and positive\", what's the conceptual approach? (4 steps)", "answer": "- Step 1: Convert both numerator and denominator to polar form. Numerator: $$1 + i\\sqrt{3} = 2e^{i\\pi/3}$$. Denominator: $$1 - i\\sqrt{3} = 2e^{-i\\pi/3}$$.\n- Step 2: Divide: $$\\tfrac{2e^{i\\pi/3}}{2e^{-i\\pi/3}} = e^{i(\\pi/3 - (-\\pi/3))} = e^{i\\cdot 2\\pi/3}$$.\n- Step 3: Raise to power $$n$$: $$(e^{i\\cdot 2\\pi/3})^n = e^{i\\cdot 2n\\pi/3}$$.\n- Step 4: For this to be real positive, argument $$\\tfrac{2n\\pi}{3}$$ must be a multiple of $$2\\pi$$: $$\\tfrac{2n\\pi}{3} = 2k\\pi \\Rightarrow n = 3k$$. Smallest positive: $$n = 3$$.\n\nConceptual insight: \"real and positive\" means \"argument $$\\equiv 0 \\pmod{2\\pi}$$\". Raising to a power multiplies the argument. So we solve when an angle becomes a multiple of $$2\\pi$$ — pure modular arithmetic on angles.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "EXERCISE: Find the modulus and argument of $$-3$$ (a real negative number) and express it in exponential form. (3 steps)", "answer": "- Step 1: Modulus: $$|-3| = 3$$.\n- Step 2: Argument: $$-3$$ lies on the NEGATIVE real axis, so its argument is $$\\pi$$ (using principal range $$(-\\pi, \\pi]$$).\n- Step 3: Exponential form: $$-3 = 3e^{i\\pi}$$. Sanity check: $$3e^{i\\pi} = 3(\\cos\\pi + i\\sin\\pi) = 3(-1 + 0) = -3$$. ✓", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "EXERCISE: Simplify $$\\dfrac{\\cos 5\\theta + i\\sin 5\\theta}{(\\cos 3\\theta - i\\sin 3\\theta)^2}$$ into a single trig expression. (3 steps)", "answer": "- Step 1: Convert to exponential form: numerator is $$e^{i5\\theta}$$; denominator is $$(\\cos 3\\theta - i\\sin 3\\theta)^2 = (e^{-i3\\theta})^2 = e^{-i6\\theta}$$.\n- Step 2: Divide: $$\\dfrac{e^{i5\\theta}}{e^{-i6\\theta}} = e^{i(5\\theta - (-6\\theta))} = e^{i\\cdot 11\\theta}$$.\n- Step 3: Convert back: $$= \\cos 11\\theta + i\\sin 11\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "EXERCISE: Find the modulus and argument of $$z = -8 + i$$ to set up its exponential form. (3 steps)", "answer": "- Step 1: Modulus: $$|z| = \\sqrt{64 + 1} = \\sqrt{65}$$.\n- Step 2: Argument: The point $$(-8, 1)$$ is in the SECOND quadrant (negative $$x$$, positive $$y$$). The reference angle is $$\\arctan(1/8)$$. The principal argument is $$\\pi - \\arctan(1/8) \\approx \\pi - 0.124 \\approx 3.017$$ rad.\n- Step 3: So $$z = \\sqrt{65}\\,e^{i(\\pi - \\arctan(1/8))}$$.\n\nKey mental model: $$\\arctan$$ alone gives a value in $$(-\\pi/2, \\pi/2)$$; you must adjust based on the quadrant.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": false}, {"question": "COUNTEREXAMPLE: Is the identity $$(e^{i\\alpha})^\\beta = e^{i\\alpha\\beta}$$ always valid? Explore with $$\\alpha = 2\\pi, \\beta = 1/2$$. (3 steps)", "answer": "- Step 1: If it held naively: $$(e^{i\\cdot 2\\pi})^{1/2} = (1)^{1/2} = 1$$, AND $$e^{i\\cdot 2\\pi \\cdot 1/2} = e^{i\\pi} = -1$$. But $$1 \\ne -1$$ — CONTRADICTION.\n- Step 2: Resolution: when $$\\beta$$ is non-integer, $$(e^{i\\alpha})^\\beta$$ is MULTI-VALUED. The identity only holds up to branch choice.\n- Step 3: A square root has two values ($$\\pm 1$$), both \"valid\" but on different branches. Writing $$1 = e^{i\\cdot 2\\pi}$$ first accesses a different branch than $$1 = e^{i\\cdot 0}$$.\n\nLesson: de Moivre is guaranteed for INTEGER exponents. Fractional exponents require explicit branch choice.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": true}, {"question": "SYNTHESIS: You're given $$z = 1 + i\\sqrt{3}$$ and asked to find all $$w$$ such that $$w^3 = z^4$$. Describe the solution strategy and geometric picture. (5 steps)", "answer": "- Step 1: Compute $$z^4$$. Modulus of $$z$$ is 2, argument $$\\pi/3$$, so $$z = 2e^{i\\pi/3}$$ and $$z^4 = 16\\,e^{i4\\pi/3}$$.\n- Step 2: Reduce: $$\\tfrac{4\\pi}{3} - 2\\pi = -\\tfrac{2\\pi}{3}$$, so $$z^4 = 16\\,e^{-i2\\pi/3}$$.\n- Step 3: Now solve $$w^3 = 16\\,e^{-i2\\pi/3}$$. Let $$w = re^{i\\theta}$$. Then $$r^3 = 16 \\Rightarrow r = 16^{1/3} = 2\\sqrt[3]{2}$$.\n- Step 4: Argument: $$3\\theta = -\\tfrac{2\\pi}{3} + 2k\\pi$$, so $$\\theta = -\\tfrac{2\\pi}{9} + \\tfrac{2k\\pi}{3}$$. Pick $$k = 0, 1, -1$$: arguments $$-\\tfrac{2\\pi}{9}, \\tfrac{4\\pi}{9}, -\\tfrac{8\\pi}{9}$$.\n- Step 5: Three solutions $$w_k = 2\\sqrt[3]{2}\\,e^{i\\theta_k}$$ lie on a circle of radius $$2\\sqrt[3]{2}$$, forming an equilateral triangle.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": true}, {"question": "Why is the sum $$1 + z + z^2 + z^3 + z^4 + z^5 + z^6 + z^7 = 0$$ equivalent to finding the 8th roots of unity EXCLUDING $$z = 1$$? (4 steps)", "answer": "- Step 1: By the geometric-series formula: $$1 + z + z^2 + \\cdots + z^7 = \\dfrac{z^8 - 1}{z - 1}$$ (valid for $$z \\ne 1$$).\n- Step 2: The fraction is zero iff numerator is zero: $$z^8 = 1$$ (with $$z \\ne 1$$).\n- Step 3: Solutions to $$z^8 = 1$$ are the 8th roots of unity. Removing $$z = 1$$ leaves 7 roots.\n- Step 4: These are $$e^{ik\\pi/4}$$ for $$k = 1, 2, 3, 4, 5, 6, 7$$. The polynomial has degree 7 and factors as the product $$\\prod_{k=1}^{7}(z - e^{ik\\pi/4})$$.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": false}, {"question": "Deduce the real factorization of $$1 + z + z^2 + \\cdots + z^7$$ using the 8th roots of unity. (4 steps)", "answer": "- Step 1: The non-trivial 8th roots of unity are $$e^{\\pm i\\pi/4}, \\pm i, e^{\\pm i3\\pi/4}, -1$$.\n- Step 2: Pair conjugates to form real quadratics:\n+ $$(z - i)(z + i) = z^2 + 1$$\n+ $$(z - e^{i\\pi/4})(z - e^{-i\\pi/4}) = z^2 - \\sqrt{2}z + 1$$\n+ $$(z - e^{i3\\pi/4})(z - e^{-i3\\pi/4}) = z^2 + \\sqrt{2}z + 1$$\n- Step 3: Real root $$z = -1$$ gives linear factor $$(z + 1)$$.\n- Step 4: So $$1 + z + z^2 + \\cdots + z^7 = (z+1)(z^2+1)(z^2-\\sqrt{2}z+1)(z^2+\\sqrt{2}z+1)$$.\nIn particular, $$(z^2+1)$$ and $$(z^4 + 1) = (z^2 - \\sqrt{2}z + 1)(z^2 + \\sqrt{2}z + 1)$$ are both factors.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": true}, {"question": "EXERCISE: Solve $$z^4 + 64 = 0$$ and describe the geometric arrangement of its roots. (4 steps)", "answer": "- Step 1: Rearrange: $$z^4 = -64 = 64e^{i\\pi}$$. Modulus 64, argument $$\\pi$$.\n- Step 2: Write $$z = re^{i\\theta}$$, so $$r^4 = 64 \\Rightarrow r = 2\\sqrt{2}$$. And $$4\\theta = \\pi + 2k\\pi \\Rightarrow \\theta = \\tfrac{\\pi}{4} + \\tfrac{k\\pi}{2}$$.\n- Step 3: For $$k = 0, 1, -1, -2$$: $$\\theta = \\tfrac{\\pi}{4}, \\tfrac{3\\pi}{4}, -\\tfrac{\\pi}{4}, -\\tfrac{3\\pi}{4}$$.\n- Step 4: Four roots at corners of a SQUARE rotated by $$\\tfrac{\\pi}{4}$$, on a circle of radius $$2\\sqrt{2}$$. Rectangular form: $$\\pm 2 \\pm 2i$$ (all four sign combinations).", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": false}, {"question": "COUNTEREXAMPLE: Is it true that for ANY complex number $$z$$, $$z + \\tfrac{1}{z} = 2\\cos\\theta$$ where $$\\theta = \\arg z$$? (4 steps)", "answer": "- Step 1: NO. The identity $$z + \\tfrac{1}{z} = 2\\cos\\theta$$ is only valid when $$|z| = 1$$ (i.e., $$z$$ on the unit circle).\n- Step 2: For general $$z = re^{i\\theta}$$:\n$$z + \\tfrac{1}{z} = re^{i\\theta} + \\tfrac{1}{r}e^{-i\\theta} = \\left(r + \\tfrac{1}{r}\\right)\\cos\\theta + i\\left(r - \\tfrac{1}{r}\\right)\\sin\\theta$$\n- Step 3: Not generally real — has nonzero imaginary part unless $$\\sin\\theta = 0$$ or $$r = 1/r$$, i.e., $$r = 1$$.\n- Step 4: Only when $$r = 1$$: $$r + 1/r = 2$$ and $$r - 1/r = 0$$, giving $$z + 1/z = 2\\cos\\theta$$.\n\nLesson: always check $$|z| = 1$$ before applying these identities. The \"standard\" power-trig identities implicitly assume $$z$$ is on the unit circle.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": true}, {"question": "EXERCISE: Compute $$(1+i)^{16}$$ using de Moivre and explain why the answer is a pure real number. (4 steps)", "answer": "- Step 1: Convert $$1 + i$$ to polar: modulus $$\\sqrt{2}$$, argument $$\\pi/4$$. So $$1 + i = \\sqrt{2}\\,e^{i\\pi/4}$$.\n- Step 2: Apply de Moivre: $$(1+i)^{16} = (\\sqrt{2})^{16}\\cdot e^{i\\cdot 16\\cdot \\pi/4} = 2^8\\cdot e^{i4\\pi}$$.\n- Step 3: $$2^8 = 256$$; and $$e^{i4\\pi} = 1$$ (two full revolutions = identity).\n- Step 4: So $$(1+i)^{16} = 256$$, real. Why real? Because $$16\\cdot \\pi/4 = 4\\pi$$ is a multiple of $$2\\pi$$, landing on the positive real axis.\n\nInsight: powers of simple complex numbers often reduce to real exactly when $$n\\theta$$ is a multiple of $$\\pi$$.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": false}, {"question": "MISCONCEPTION PROBE: A student writes \"$$(\\cos\\theta + i\\sin\\theta)^n = \\cos^n\\theta + i^n\\sin^n\\theta$$\". What's the error, and what's the correct formula? (3 steps)", "answer": "- Step 1: This treats $$(\\cos\\theta + i\\sin\\theta)^n$$ as a direct distributive expansion. But $$(a+b)^n \\ne a^n + b^n$$ in general — exponentiation doesn't distribute over addition.\n- Step 2: Correct formula (de Moivre): $$(\\cos\\theta + i\\sin\\theta)^n = \\cos n\\theta + i\\sin n\\theta$$.\n- Step 3: Expanded using BINOMIAL theorem:\n$$(\\cos\\theta + i\\sin\\theta)^n = \\sum_{k=0}^n\\binom{n}{k}\\cos^{n-k}\\theta\\,(i\\sin\\theta)^k$$\nThis equals $$\\cos n\\theta + i\\sin n\\theta$$. Equating real and imaginary parts gives trig identities.\n\nPervasive error: exponentiation distributes over MULTIPLICATION, not ADDITION. $$(ab)^n = a^n b^n$$ but $$(a+b)^n \\ne a^n + b^n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": true}, {"question": "CONNECTION: How does the formula $$e^{i\\theta} = \\cos\\theta + i\\sin\\theta$$ relate to \"rotation\" as a linear transformation in 2D? (4 steps)", "answer": "- Step 1: Multiplying by $$e^{i\\theta}$$ takes $$z \\to ze^{i\\theta}$$, which rotates about the origin by angle $$\\theta$$ (modulus preserved).\n- Step 2: In $$2\\times 2$$ real matrix form, rotation by $$\\theta$$ is:\n$$R(\\theta) = \\begin{pmatrix}\\cos\\theta & -\\sin\\theta \\\\ \\sin\\theta & \\cos\\theta\\end{pmatrix}$$\n- Step 3: Action of $$e^{i\\theta}$$ on $$z = x + iy$$:\n$$(x+iy)(\\cos\\theta + i\\sin\\theta) = (x\\cos\\theta - y\\sin\\theta) + i(x\\sin\\theta + y\\cos\\theta)$$\nThis matches $$R(\\theta)\\begin{pmatrix}x\\\\y\\end{pmatrix} = \\begin{pmatrix}x\\cos\\theta - y\\sin\\theta\\\\x\\sin\\theta + y\\cos\\theta\\end{pmatrix}$$.\n- Step 4: So $$e^{i\\theta}$$ is the \"complex-number avatar\" of the rotation matrix. Complex multiplication on the Argand plane IS rotation.\n\nDeep insight: the unit circle is a group under multiplication, identical to the rotation group $$SO(2)$$ — a foundational observation in group theory.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": true}, {"question": "EDGE CASE: What are the \"nth roots of unity\" when $$n = 1$$ or $$n = 2$$? (3 steps)", "answer": "- Step 1: For $$n = 1$$: the equation is $$z^1 = 1$$, with only solution $$z = 1$$. The \"regular 1-gon\" is a degenerate single point.\n- Step 2: For $$n = 2$$: $$z^2 = 1$$, solutions $$z = \\pm 1$$. The \"regular 2-gon\" is a line segment.\n- Step 3: For $$n \\ge 3$$, the $$n$$-gon is genuinely 2D (triangle, square, etc.) with vertices on the unit circle.\n\nEdge cases work formally, but the \"regular polygon\" interpretation is most meaningful for $$n \\ge 3$$.", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": true}, {"question": "Summarize the DUALITY between \"$$\\cos n\\theta$$ in terms of $$\\cos\\theta$$\" and \"$$\\cos^n\\theta$$ in terms of $$\\cos k\\theta$$\". Which tool do you use for each direction? (3 steps)", "answer": "- Step 1: For $$\\cos n\\theta = f(\\cos\\theta)$$ (multiple-angle → power polynomial): use $$(\\cos\\theta + i\\sin\\theta)^n = \\cos n\\theta + i\\sin n\\theta$$, binomial expand, equate REAL parts, use $$\\sin^2 = 1 - \\cos^2$$.\n- Step 2: For $$\\cos^n\\theta = g(\\cos k\\theta)$$ (power → linear combination of multiples): use $$(z + 1/z)^n = (2\\cos\\theta)^n$$, binomial expand, pair $$z^m$$ with $$z^{-m}$$ to get $$2\\cos m\\theta$$.\n- Step 3: These are INVERSE problems. One EXPANDS an angle into higher multiples; the other CONTRACTS a power into a linear combination. Using the wrong tool leads to dead ends.", "source": "Opus 4.7 ②", "_id": "opus_2_70", "judge_pick": true}, {"question": "EXERCISE: Compute $$(-2 + 2i)^8$$ using de Moivre's theorem step by step. (4 steps)", "answer": "- Step 1: Convert $$-2 + 2i$$ to polar:\n+ Modulus: $$\\sqrt{4 + 4} = 2\\sqrt{2}$$.\n+ Argument: point $$(-2, 2)$$ in second quadrant, reference angle $$\\pi/4$$, so principal argument $$= \\pi - \\pi/4 = 3\\pi/4$$.\n+ So $$-2 + 2i = 2\\sqrt{2}\\,e^{i3\\pi/4}$$.\n- Step 2: Raise to 8th: $$(2\\sqrt{2})^8\\cdot e^{i\\cdot 8\\cdot 3\\pi/4} = (2\\sqrt{2})^8\\cdot e^{i6\\pi}$$.\n- Step 3: Modulus: $$(2\\sqrt{2})^8 = 2^8 \\cdot 2^4 = 256 \\cdot 16 = 4096$$.\n- Step 4: Argument: $$6\\pi = 3\\cdot 2\\pi$$ is 3 full rotations ≡ $$0$$. So result: $$4096\\cdot e^{i\\cdot 0} = 4096$$.\n\nThe 8th power brought the argument back to 0 — result is pure real.", "source": "Opus 4.7 ②", "_id": "opus_2_71", "judge_pick": false}, {"question": "Explain how the formula $$1 + \\omega + \\omega^2 + \\cdots + \\omega^{n-1} = 0$$ connects to the structure of a geometric series. (3 steps)", "answer": "- Step 1: The sum of $$n$$th roots of unity is $$S = 1 + \\omega + \\omega^2 + \\cdots + \\omega^{n-1}$$: a geometric series, first term 1, common ratio $$\\omega$$, $$n$$ terms. Formula: $$S = \\tfrac{1 - \\omega^n}{1 - \\omega}$$.\n- Step 2: Since $$\\omega^n = 1$$, the numerator is zero. Since $$\\omega \\ne 1$$ (for $$n \\ge 2$$), denominator is nonzero. So $$S = 0$$.\n- Step 3: This isn't coincidence — it's foundational: for ANY geometric series whose common ratio is a non-trivial root of unity, summing over a full \"cycle\" yields zero. This underlies the DISCRETE FOURIER TRANSFORM and cancellation properties throughout number theory.", "source": "Opus 4.7 ②", "_id": "opus_2_72", "judge_pick": true}, {"question": "Derive $$\\cos 5\\theta = 16\\cos^5\\theta - 20\\cos^3\\theta + 5\\cos\\theta$$ conceptually. (4 steps)", "answer": "- Step 1: $$(\\cos\\theta + i\\sin\\theta)^5$$ expanded binomially has 6 terms. Real part picks up even powers of $$i$$ ($$k = 0, 2, 4$$):\n$$\\cos 5\\theta = \\cos^5\\theta - \\binom{5}{2}\\cos^3\\theta\\sin^2\\theta + \\binom{5}{4}\\cos\\theta\\sin^4\\theta$$\n$$= \\cos^5\\theta - 10\\cos^3\\theta\\sin^2\\theta + 5\\cos\\theta\\sin^4\\theta$$\n- Step 2: Replace $$\\sin^2\\theta = 1 - \\cos^2\\theta$$ and $$\\sin^4\\theta = (1-\\cos^2\\theta)^2 = 1 - 2\\cos^2\\theta + \\cos^4\\theta$$.\n- Step 3: Substitute and expand:\n$$= \\cos^5\\theta - 10\\cos^3\\theta(1-\\cos^2\\theta) + 5\\cos\\theta(1 - 2\\cos^2\\theta + \\cos^4\\theta)$$\n$$= \\cos^5\\theta - 10\\cos^3\\theta + 10\\cos^5\\theta + 5\\cos\\theta - 10\\cos^3\\theta + 5\\cos^5\\theta$$\n- Step 4: Combine: coefficients of $$\\cos^5\\theta$$: $$1 + 10 + 5 = 16$$. $$\\cos^3\\theta$$: $$-10 - 10 = -20$$. $$\\cos\\theta$$: $$5$$. Result: $$\\cos 5\\theta = 16\\cos^5\\theta - 20\\cos^3\\theta + 5\\cos\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_73", "judge_pick": false}, {"question": "Using $$\\cos 5\\theta = 16\\cos^5\\theta - 20\\cos^3\\theta + 5\\cos\\theta$$, find the EXACT value of $$\\cos^2(\\pi/10)$$ by solving an equation. (4 steps)", "answer": "- Step 1: Set $$\\theta = \\pi/10$$, so $$5\\theta = \\pi/2$$ and $$\\cos 5\\theta = \\cos(\\pi/2) = 0$$.\n- Step 2: Substitute into the identity: $$0 = 16\\cos^5(\\pi/10) - 20\\cos^3(\\pi/10) + 5\\cos(\\pi/10)$$.\n- Step 3: Factor out $$\\cos(\\pi/10) \\ne 0$$ (since $$\\pi/10 \\in (0, \\pi/2)$$):\n$$16\\cos^4(\\pi/10) - 20\\cos^2(\\pi/10) + 5 = 0$$\n- Step 4: Quadratic in $$\\cos^2(\\pi/10)$$: $$\\cos^2(\\pi/10) = \\tfrac{20 \\pm \\sqrt{400 - 320}}{32} = \\tfrac{20 \\pm \\sqrt{80}}{32} = \\tfrac{5 \\pm \\sqrt{5}}{8}$$. Since $$\\cos(\\pi/10) > \\cos(\\pi/4) = \\tfrac{1}{\\sqrt{2}}$$, the correct root is the \"+\", giving $$\\cos^2(\\pi/10) = \\tfrac{5 + \\sqrt{5}}{8}$$.\n\nTakeaway: de Moivre's polynomial identity converts trig-value questions into algebraic polynomial problems.", "source": "Opus 4.7 ②", "_id": "opus_2_74", "judge_pick": false}, {"question": "Why is the identity $$|e^{i\\theta}| = 1$$ true for all real $$\\theta$$? (3 steps)", "answer": "- Step 1: By Euler: $$e^{i\\theta} = \\cos\\theta + i\\sin\\theta$$.\n- Step 2: Modulus: $$|e^{i\\theta}| = \\sqrt{\\cos^2\\theta + \\sin^2\\theta}$$.\n- Step 3: Pythagorean identity gives $$\\cos^2\\theta + \\sin^2\\theta = 1$$, so $$|e^{i\\theta}| = 1$$.\n\nGeometric: $$e^{i\\theta}$$ traces the unit circle as $$\\theta$$ varies. \"Modulus 1\" means \"distance from origin = 1\" — the very definition of the unit circle.", "source": "Opus 4.7 ②", "_id": "opus_2_75", "judge_pick": false}, {"question": "The equation $$z^6 = 1$$ has 6 solutions. Describe them and show how they pair into REAL quadratic factors of $$z^6 - 1$$. (4 steps)", "answer": "- Step 1: Six roots: $$z_k = e^{ik\\pi/3}$$ for $$k = 0, 1, 2, 3, 4, 5$$:\n+ $$z_0 = 1, z_3 = -1$$ (real)\n+ $$z_1 = e^{i\\pi/3} = \\tfrac{1}{2} + i\\tfrac{\\sqrt{3}}{2}$$, $$z_5 = \\bar z_1$$\n+ $$z_2 = e^{i2\\pi/3} = -\\tfrac{1}{2} + i\\tfrac{\\sqrt{3}}{2}$$, $$z_4 = \\bar z_2$$\n- Step 2: Real roots give linear factors: $$(z - 1)(z + 1) = z^2 - 1$$.\n- Step 3: Pair conjugates into real quadratics:\n+ $$(z - z_1)(z - z_5) = z^2 - 2\\cos(\\pi/3)z + 1 = z^2 - z + 1$$\n+ $$(z - z_2)(z - z_4) = z^2 - 2\\cos(2\\pi/3)z + 1 = z^2 + z + 1$$\n- Step 4: Full factorization: $$z^6 - 1 = (z-1)(z+1)(z^2 - z + 1)(z^2 + z + 1)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_76", "judge_pick": false}, {"question": "Give a strategy for solving $$16x^5 - 20x^3 + 5x + 1 = 0$$ using a de Moivre-style substitution. (4 steps)", "answer": "- Step 1: Recognize LHS (minus the $$+1$$) as $$\\cos 5\\theta = 16\\cos^5\\theta - 20\\cos^3\\theta + 5\\cos\\theta$$.\n- Step 2: Substitute $$x = \\cos\\theta$$: equation becomes $$\\cos 5\\theta + 1 = 0$$, so $$\\cos 5\\theta = -1$$.\n- Step 3: Solve: $$5\\theta = \\pi + 2k\\pi \\Rightarrow \\theta = \\tfrac{\\pi}{5} + \\tfrac{2k\\pi}{5}$$. For $$k = 0, 1, 2, 3, 4$$: $$\\theta = \\tfrac{\\pi}{5}, \\tfrac{3\\pi}{5}, \\pi, \\tfrac{7\\pi}{5}, \\tfrac{9\\pi}{5}$$.\n- Step 4: Each $$\\theta$$ gives one $$x = \\cos\\theta$$; multiple $$\\theta$$'s can give same $$x$$ (since $$\\cos$$ is even). The DISTINCT $$x$$-values are the five roots of the original polynomial.\n\nGeneral lesson: Chebyshev-like polynomials $$T_n(\\cos\\theta) = \\cos n\\theta$$ let you convert certain polynomial equations into trigonometric ones, solvable via inverse trig.", "source": "Opus 4.7 ②", "_id": "opus_2_77", "judge_pick": true}, {"question": "EXERCISE: Evaluate $$(1 + i)^2$$, then use induction to prove $$(1+i)^n = 2^{n/2}e^{in\\pi/4}$$ for $$n \\in \\mathbb{Z}^+$$. (5 steps)", "answer": "- Step 1: $$1 + i = \\sqrt{2}\\,e^{i\\pi/4}$$. So $$(1+i)^2 = 2\\,e^{i\\pi/2} = 2i$$.\n- Step 2 (Base $$n=1$$): $$(1+i)^1 = \\sqrt{2}\\,e^{i\\pi/4} = 2^{1/2}e^{i\\cdot 1\\cdot \\pi/4}$$. ✓\n- Step 3 (Inductive hypothesis): Assume $$(1+i)^k = 2^{k/2}e^{ik\\pi/4}$$.\n- Step 4 (Inductive step): $$(1+i)^{k+1} = (1+i)^k \\cdot (1+i) = 2^{k/2}e^{ik\\pi/4}\\cdot \\sqrt{2}\\,e^{i\\pi/4}$$\n$$= 2^{k/2}\\cdot 2^{1/2}\\cdot e^{i(k\\pi/4 + \\pi/4)} = 2^{(k+1)/2}\\cdot e^{i(k+1)\\pi/4}$$. ✓\n- Step 5 (Conclusion): By induction, $$(1+i)^n = 2^{n/2}e^{in\\pi/4}$$ for all $$n \\in \\mathbb{Z}^+$$. Corollary: $$(1+i)^{16} = 2^8 \\cdot e^{i\\cdot 4\\pi} = 256$$.", "source": "Opus 4.7 ②", "_id": "opus_2_78", "judge_pick": false}, {"question": "Explain what \"de Moivre's theorem linearizes complex exponentiation\" means conceptually. (3 steps)", "answer": "- Step 1: In rectangular form, $$(a + bi)^n$$ has growing complexity: each multiplication creates cross-terms $$ac, bd, ad, bc$$ that tangle together.\n- Step 2: In polar form, $$(re^{i\\theta})^n = r^n e^{in\\theta}$$: exponentiation becomes the LINEAR operation $$\\theta \\mapsto n\\theta$$ on the argument (and $$r \\mapsto r^n$$ on the modulus).\n- Step 3: \"Linearization\" = de Moivre decouples complex multiplication into TWO INDEPENDENT SIMPLE operations (modulus scaling + argument scaling). Modulus and argument evolve separately in polar form.\n\nAnalogy: logarithms linearize multiplication ($$\\log(ab) = \\log a + \\log b$$). Polar form does the same for complex multiplication.", "source": "Opus 4.7 ②", "_id": "opus_2_79", "judge_pick": true}, {"question": "Why does Euler's relation pop up naturally in electrical engineering (AC circuit analysis)? (4 steps)", "answer": "- Step 1: AC voltages/currents oscillate as $$V(t) = V_0\\cos(\\omega t + \\phi)$$. Engineers need to add, multiply, and differentiate such oscillations.\n- Step 2: Euler's relation lets us write $$V_0\\cos(\\omega t + \\phi) = \\text{Re}(V_0 e^{i(\\omega t + \\phi)})$$ — replacing real oscillations with rotating complex \"phasors\" $$V_0 e^{i\\phi}$$ (the $$e^{i\\omega t}$$ factor is universal and can be suppressed).\n- Step 3: Phasor operations are simple: phase shift = multiplication, differentiation = multiplication by $$i\\omega$$, IMPEDANCE (complex resistance) unifies resistors, capacitors, and inductors under one $$V = IZ$$ formula.\n- Step 4: Complex-exponential algebra is VASTLY simpler than trigonometric algebra — this is why Euler's relation revolutionized circuit analysis (Charles Proteus Steinmetz, early 20th century).", "source": "Opus 4.7 ②", "_id": "opus_2_80", "judge_pick": true}, {"question": "Given $$z$$ complex with $$\\text{Im}(zw) = 0$$ and $$|zw| = 3|z|$$, how do you translate the conditions into geometric constraints to find $$w$$? (4 steps)", "answer": "- Step 1: $$|zw| = 3|z|$$ means $$|z||w| = 3|z|$$, so $$|w| = 3$$ (assuming $$z \\ne 0$$). This fixes the MODULUS of $$w$$ (a circle of radius 3).\n- Step 2: $$\\text{Im}(zw) = 0$$ means $$zw$$ is real, so $$\\arg(zw) = 0$$ or $$\\pi$$. This is a LINE constraint for $$zw$$.\n- Step 3: Since $$\\arg(zw) = \\arg z + \\arg w$$: $$\\arg w = -\\arg z$$ (if $$\\arg zw = 0$$) or $$\\arg w = \\pi - \\arg z$$ (if $$\\arg zw = \\pi$$).\n- Step 4: Two possibilities for $$w$$: one rotates $$z$$ to positive real axis, the other to negative real axis. Each has modulus 3.\n\nConceptual takeaway: conditions on imaginary parts = \"lies on a line\"; conditions on modulus = \"lies on a circle\". Their intersections give finitely many solutions.", "source": "Opus 4.7 ②", "_id": "opus_2_81", "judge_pick": false}, {"question": "Derive an identity for $$\\cos^6\\theta$$ as a sum of cosines by using the substitution $$\\alpha = \\pi/2 - \\theta$$ applied to a known identity for $$\\sin^6\\theta$$. (4 steps)", "answer": "- Step 1: Given $$\\sin^6\\theta = -\\tfrac{1}{32}(\\cos 6\\theta - 6\\cos 4\\theta + 15\\cos 2\\theta - 10)$$.\n- Step 2: Substitution $$\\alpha = \\pi/2 - \\theta$$ converts $$\\sin\\theta = \\cos\\alpha$$, so $$\\sin^6\\theta = \\cos^6\\alpha$$. Rewrite each $$\\cos k\\theta$$ in terms of $$\\alpha$$: $$\\cos k(\\pi/2 - \\alpha) = \\cos(k\\pi/2 - k\\alpha) = $$ (some sign) $$\\cos k\\alpha$$ depending on $$k$$.\n+ $$\\cos 6(\\pi/2 - \\alpha) = \\cos(3\\pi - 6\\alpha) = -\\cos 6\\alpha$$\n+ $$\\cos 4(\\pi/2 - \\alpha) = \\cos(2\\pi - 4\\alpha) = \\cos 4\\alpha$$\n+ $$\\cos 2(\\pi/2 - \\alpha) = \\cos(\\pi - 2\\alpha) = -\\cos 2\\alpha$$\n- Step 3: Substitute: $$\\cos^6\\alpha = -\\tfrac{1}{32}(-\\cos 6\\alpha - 6\\cos 4\\alpha - 15\\cos 2\\alpha - 10)$$\n$$= \\tfrac{1}{32}(\\cos 6\\alpha + 6\\cos 4\\alpha + 15\\cos 2\\alpha + 10)$$.\n- Step 4: Relabel $$\\alpha \\to \\theta$$: $$\\cos^6\\theta = \\tfrac{1}{32}(\\cos 6\\theta + 6\\cos 4\\theta + 15\\cos 2\\theta + 10)$$.\n\nElegant observation: $$\\pi/2 - \\theta$$ swaps $$\\sin$$ and $$\\cos$$, so derivations for one automatically give derivations for the other.", "source": "Opus 4.7 ②", "_id": "opus_2_82", "judge_pick": false}, {"question": "Summarize in one sentence: why is Euler's relation the \"Rosetta stone\" of trigonometry and complex analysis? (3 steps)", "answer": "- Step 1: Euler's relation $$e^{i\\theta} = \\cos\\theta + i\\sin\\theta$$ provides a DICTIONARY between:\n+ Trigonometry (angle-addition, product-to-sum, power identities) on one side\n+ Algebra of complex exponentials ($$e^a e^b = e^{a+b}$$, binomial expansion) on the other\n- Step 2: Nearly every trig identity has a ONE-LINE proof via Euler's relation — because manipulating exponentials is far easier than manipulating sines and cosines.\n- Step 3: The \"Rosetta stone\" metaphor: one formula translates between two different languages (trig and exponentials), revealing they're both notations for the same underlying mathematical reality — ROTATION IN THE PLANE.", "source": "Opus 4.7 ②", "_id": "opus_2_83", "judge_pick": true}, {"question": "What's the qualitative difference between $$\\cos n\\theta$$ (as a polynomial in $$\\cos\\theta$$) for small $$n$$ (say $$n = 2, 3$$) versus large $$n$$ (say $$n = 7$$)? (3 steps)", "answer": "- Step 1: For small $$n$$, the expansion has few terms: $$\\cos 2\\theta = 2\\cos^2\\theta - 1$$, $$\\cos 3\\theta = 4\\cos^3\\theta - 3\\cos\\theta$$.\n- Step 2: For large $$n$$, you get $$n+1$$ binomial terms which, after $$\\sin^{2k} = (1-\\cos^2)^k$$ expansion, condense into a degree-$$n$$ polynomial in $$\\cos\\theta$$ — the $$n$$th CHEBYSHEV POLYNOMIAL $$T_n(x)$$.\n- Step 3: Coefficients grow rapidly: $$\\cos 7\\theta = 64\\cos^7\\theta - 112\\cos^5\\theta + 56\\cos^3\\theta - 7\\cos\\theta$$. Coefficients like 112 and 56 come from binomial coefficients and combinatorial cancellation.\n\nThe PATTERN is always the same (only even powers for even $$n$$, odd for odd $$n$$) — just more terms to manage.", "source": "Opus 4.7 ②", "_id": "opus_2_84", "judge_pick": true}, {"question": "MISCONCEPTION PROBE: A student computes $$\\cos 5\\theta$$ by writing $$\\cos^5\\theta$$. What's the confusion? (4 steps)", "answer": "- Step 1: $$\\cos 5\\theta \\ne (\\cos\\theta)^5 = \\cos^5\\theta$$. They are fundamentally different functions.\n- Step 2: $$\\cos 5\\theta$$ = cosine of 5 times the angle (a single number, oscillates 5 times as fast as $$\\cos\\theta$$).\n- Step 3: $$\\cos^5\\theta$$ = fifth power of $$\\cos\\theta$$ (stays in $$[-1, 1]$$ like $$\\cos\\theta$$ but with narrower peaks).\n- Step 4: Correct relationship (from de Moivre + binomial): $$\\cos 5\\theta = 16\\cos^5\\theta - 20\\cos^3\\theta + 5\\cos\\theta$$ — they're related POLYNOMIALLY, not by simple exponentiation.\n\nAnalogy: \"distance to 5th house\" is not \"5 times distance to 1st house\".", "source": "Opus 4.7 ②", "_id": "opus_2_85", "judge_pick": true}, {"question": "Sketch the broad approach for evaluating $$\\int_0^{\\pi/6}\\cos^6\\theta\\, d\\theta$$ using de Moivre's linearization. (4 steps)", "answer": "- Step 1: Linearize $$\\cos^6\\theta$$ using $$(z + 1/z)^6 = (2\\cos\\theta)^6 = 64\\cos^6\\theta$$: after binomial expansion and pairing $$z^m + z^{-m}$$, you get $$32\\cos^6\\theta = \\cos 6\\theta + 6\\cos 4\\theta + 15\\cos 2\\theta + 10$$.\n- Step 2: So $$\\int_0^{\\pi/6}\\cos^6\\theta\\,d\\theta = \\tfrac{1}{32}\\int_0^{\\pi/6}(\\cos 6\\theta + 6\\cos 4\\theta + 15\\cos 2\\theta + 10)\\,d\\theta$$.\n- Step 3: Each term integrates trivially: $$\\int\\cos k\\theta\\,d\\theta = \\tfrac{\\sin k\\theta}{k}$$; constant integrates to $$10\\theta$$.\n- Step 4: Evaluating at $$\\pi/6$$: the $$\\sin$$ terms pick up fractions of $$\\sqrt{3}$$ (since $$\\sin(4\\pi/6) = \\sin(2\\pi/3) = \\sqrt{3}/2$$, etc.); the $$10\\theta$$ term contributes $$10\\pi/6$$. Result fits the form $$a\\pi + b\\sqrt{3}$$.\n\nConceptual takeaway: linearization converts a hard nonlinear integral into a sum of elementary ones.", "source": "Opus 4.7 ②", "_id": "opus_2_86", "judge_pick": false}, {"question": "Use de Moivre's theorem to show $$\\sin 6\\theta \\equiv \\sin 2\\theta(16\\cos^4\\theta - 16\\cos^2\\theta + 3)$$ at a conceptual level. (4 steps)", "answer": "- Step 1: From $$(\\cos\\theta + i\\sin\\theta)^6 = \\cos 6\\theta + i\\sin 6\\theta$$, take the imaginary part:\n$$\\sin 6\\theta = 6\\cos^5\\theta\\sin\\theta - 20\\cos^3\\theta\\sin^3\\theta + 6\\cos\\theta\\sin^5\\theta$$\n- Step 2: Factor $$\\sin\\theta$$ out: $$\\sin 6\\theta = \\sin\\theta\\,(6\\cos^5\\theta - 20\\cos^3\\theta\\sin^2\\theta + 6\\cos\\theta\\sin^4\\theta)$$.\n- Step 3: Replace $$\\sin^2\\theta = 1 - \\cos^2\\theta$$ inside the parenthesis. After algebra, everything combines into $$\\cos\\theta\\,(16\\cos^4\\theta - 16\\cos^2\\theta + 3)$$ (the $$\\cos\\theta$$ factors from the $$\\sin\\theta\\cos\\theta$$ grouping).\n- Step 4: Use $$\\sin 2\\theta = 2\\sin\\theta\\cos\\theta$$: $$\\sin 6\\theta = \\sin 2\\theta\\,(16\\cos^4\\theta - 16\\cos^2\\theta + 3)$$.\n\nTakeaway: factoring into $$\\sin 2\\theta \\cdot P(\\cos\\theta)$$ reveals when $$\\sin 6\\theta = 0$$: either $$\\sin 2\\theta = 0$$ or $$P(\\cos\\theta) = 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_87", "judge_pick": false}, {"question": "In the equation $$32x^6 - 48x^4 + 18x^2 - \\tfrac{3}{2} = 0$$, what substitution invokes de Moivre's theorem, and why? (4 steps)", "answer": "- Step 1: Recognize the LHS shape as a multiple of $$\\cos 6\\theta = 32\\cos^6\\theta - 48\\cos^4\\theta + 18\\cos^2\\theta - 1$$.\n- Step 2: Rewrite: $$32x^6 - 48x^4 + 18x^2 - \\tfrac{3}{2} = 0$$ $$\\iff$$ $$32x^6 - 48x^4 + 18x^2 - 1 = \\tfrac{1}{2}$$.\n- Step 3: Substitute $$x = \\cos\\theta$$: LHS becomes $$\\cos 6\\theta$$. So $$\\cos 6\\theta = \\tfrac{1}{2}$$.\n- Step 4: Solve: $$6\\theta = \\pm\\pi/3 + 2k\\pi \\Rightarrow \\theta = \\pm\\pi/18 + k\\pi/3$$. Each valid $$\\theta$$ yields $$x = \\cos\\theta$$. Pick $$k$$ values to get 6 distinct $$x$$-values.\n\nWhy it works: de Moivre PACKAGES a degree-6 polynomial in $$\\cos\\theta$$ into a single quantity $$\\cos 6\\theta$$, making the sextic equation solvable via inverse trigonometry.", "source": "Opus 4.7 ②", "_id": "opus_2_88", "judge_pick": true}, {"question": "Describe how the \"geometric series trick\" $$\\sum_{k=0}^{n-1}z^k = \\tfrac{z^n - 1}{z - 1}$$ gives a POLYNOMIAL reason why the sum of the $$n$$th roots of unity is zero. (3 steps)", "answer": "- Step 1: Alternative viewpoint: $$z^n - 1 = 0$$ is a degree-$$n$$ polynomial with roots being the $$n$$th roots of unity.\n- Step 2: By Vieta's formulas (sum of roots = $$-\\tfrac{\\text{coefficient of }z^{n-1}}{\\text{leading coefficient}}$$), the sum = $$-\\tfrac{0}{1} = 0$$, because $$z^n - 1$$ has NO $$z^{n-1}$$ term.\n- Step 3: So the sum is zero for a FUNDAMENTAL REASON: the polynomial's coefficient structure. The geometric-series calculation is just a constructive proof of the same fact. Both agree.", "source": "Opus 4.7 ②", "_id": "opus_2_89", "judge_pick": true}, {"question": "MISCONCEPTION: A student claims the sum of 3rd roots of unity is zero \"because they cancel geometrically, but for 4th roots (1, $$i$$, $$-1$$, $$-i$$) it's also zero by the same geometric reason\". Is this generalization valid, and for which $$n$$? (3 steps)", "answer": "- Step 1: YES — the sum of the $$n$$th roots of unity is zero for ALL $$n \\ge 2$$ (not just $$n = 3$$ or $$n = 4$$).\n- Step 2: Geometric reason: the roots are evenly spaced on the unit circle, so they form a centrally-symmetric configuration whose vector sum cancels.\n- Step 3: For $$n = 1$$, the sum is just $$1$$ (not zero) — only root is 1. So the identity requires $$n \\ge 2$$. Proofs via geometric series and Vieta's formulas both require $$\\omega \\ne 1$$, i.e., $$n \\ge 2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_90", "judge_pick": true}, {"question": "Explain the solution strategy for $$(z + 1)^n = $$ (some complex number) — how does a translation simplify things? (3 steps)", "answer": "- Step 1: Substitute $$u = z + 1$$. Equation becomes $$u^n = w$$, standard form.\n- Step 2: Solve the standard equation: $$u = \\rho^{1/n}\\cdot e^{i(\\arg w + 2k\\pi)/n}$$ for $$k = 0, 1, \\ldots, n-1$$.\n- Step 3: Transform back: $$z = u - 1$$. Geometrically: the solutions of $$(z+1)^n = w$$ form a regular $$n$$-gon (just like for $$u^n = w$$), but translated by $$-1$$ on the Argand plane. The circle of roots is centered at $$-1$$ instead of $$0$$; radius and spacing unchanged.", "source": "Opus 4.7 ②", "_id": "opus_2_91", "judge_pick": false}, {"question": "EDGE CASE: What happens when applying de Moivre to $$(re^{i\\theta})^n$$ with $$r = 0$$? (3 steps)", "answer": "- Step 1: $$0 = 0\\cdot e^{i\\theta}$$ for ANY $$\\theta$$ — the argument of 0 is undefined (multi-valued).\n- Step 2: For $$n > 0$$: $$(0)^n = 0$$, regardless of $$\\theta$$. De Moivre trivially gives $$0^n e^{in\\theta} = 0$$.\n- Step 3: For $$n \\le 0$$: $$0^0$$ is indeterminate; $$0^{-n}$$ is undefined (division by zero). De Moivre breaks down.\n\nTakeaway: de Moivre is well-defined for $$z \\ne 0$$ or for $$n > 0$$. The origin is a \"degenerate\" point because it has no well-defined argument.", "source": "Opus 4.7 ②", "_id": "opus_2_92", "judge_pick": true}, {"question": "SYNTHESIS: Starting from the 4th roots of unity, show how $$z^4 + 1 = 0$$ factors over the reals. (4 steps)", "answer": "- Step 1: Solve $$z^4 = -1$$. Write $$-1 = e^{i\\pi}$$, so $$z = e^{i(\\pi + 2k\\pi)/4} = e^{i(\\pi/4 + k\\pi/2)}$$.\n- Step 2: For $$k = 0, 1, 2, 3$$ (or symmetric): $$z = e^{\\pm i\\pi/4}, e^{\\pm i3\\pi/4}$$. Rectangular: $$\\tfrac{\\pm 1 \\pm i}{\\sqrt{2}}$$.\n- Step 3: Pair conjugates into real quadratics:\n+ $$(z - e^{i\\pi/4})(z - e^{-i\\pi/4}) = z^2 - 2\\cos(\\pi/4)z + 1 = z^2 - \\sqrt{2}z + 1$$\n+ $$(z - e^{i3\\pi/4})(z - e^{-i3\\pi/4}) = z^2 + \\sqrt{2}z + 1$$\n- Step 4: Full real factorization: $$z^4 + 1 = (z^2 - \\sqrt{2}z + 1)(z^2 + \\sqrt{2}z + 1)$$.\n\nVerification: expand to check — the cross terms cancel.", "source": "Opus 4.7 ②", "_id": "opus_2_93", "judge_pick": true}, {"question": "Why is the CONVERSION step (from polar back to rectangular form) often the hardest part of de Moivre computations? (3 steps)", "answer": "- Step 1: De Moivre makes exponentiation trivial in polar: $$r^n$$ and $$n\\theta$$. But to express the answer as $$a + ib$$, you need to evaluate $$\\cos(n\\theta)$$ and $$\\sin(n\\theta)$$.\n- Step 2: If $$n\\theta$$ is a \"nice\" angle (multiple of $$\\pi/4, \\pi/6, \\pi/3, \\pi/2$$), you get exact values. Otherwise, only decimal approximations.\n- Step 3: The reduction of $$n\\theta$$ modulo $$2\\pi$$ (adding/subtracting $$2\\pi$$) is also a common source of error — easy to miscount.\n\nPractical tip: keep answers in exponential or polar form unless a specific rectangular form is required.", "source": "Opus 4.7 ②", "_id": "opus_2_94", "judge_pick": true}, {"question": "SYNTHESIS: Why is \"solving $$z^n = w$$\" and \"finding all $$n$$th roots of unity\" essentially the SAME problem structurally? (4 steps)", "answer": "- Step 1: Both problems have the same multi-valued argument structure: $$\\arg z = \\tfrac{\\arg w + 2k\\pi}{n}$$ or $$\\tfrac{2k\\pi}{n}$$.\n- Step 2: Both produce $$n$$ distinct roots equally spaced on a circle (regular $$n$$-gon arrangement).\n- Step 3: Concrete connection: if $$z_0$$ is ONE root of $$z^n = w$$, then ALL roots are $$z_0, z_0\\omega, z_0\\omega^2, \\ldots, z_0\\omega^{n-1}$$, where $$\\omega = e^{2\\pi i/n}$$ is the primitive root of unity.\n- Step 4: So finding roots of $$w$$ reduces to: find one root, then multiply by roots of unity. Roots of unity are the \"universal building block\".\n\nDeep insight: multiplication by $$\\omega^k$$ rotates by $$k\\cdot \\tfrac{2\\pi}{n}$$ — the roots of unity form a \"rotation lattice\" that generates all other root configurations.", "source": "Opus 4.7 ②", "_id": "opus_2_95", "judge_pick": true}, {"question": "Suppose $$w^3 = z^4$$ where $$z = 1 + i\\sqrt{3}$$. How many values of $$w$$ are there, and why is it not 4 or 12? (3 steps)", "answer": "- Step 1: First, $$z^4$$ is a SINGLE complex number (not a set). Computing: $$z^4 = 16\\,e^{-i2\\pi/3}$$ (one value).\n- Step 2: The equation $$w^3 = (\\text{single complex number})$$ is a standard cube-root problem, giving exactly 3 solutions.\n- Step 3: It's NOT 4 (that's the number of roots of $$z^4 = w$$ for fixed $$w$$) nor 12 (the product would confuse power direction). The answer is 3 because we're taking CUBE roots of a single target.\n\nTakeaway: always identify the degree of the equation in $$w$$ — it tells you how many solutions to expect.", "source": "Opus 4.7 ②", "_id": "opus_2_96", "judge_pick": true}, {"question": "MISCONCEPTION PROBE: A student computes $$(1+i)^{1/2}$$ by writing $$(1+i)^{1/2} = \\sqrt{2}\\,e^{i\\pi/8}$$ and claims this is THE square root. What's missing? (3 steps)", "answer": "- Step 1: A square root has TWO values, not one. The student hasn't applied the $$+2k\\pi$$ trick.\n- Step 2: Correctly: $$1+i = 2^{1/2}\\,e^{i(\\pi/4 + 2k\\pi)}$$, so $$(1+i)^{1/2} = 2^{1/4}\\,e^{i(\\pi/8 + k\\pi)}$$.\n- Step 3: For $$k = 0$$: $$2^{1/4}\\,e^{i\\pi/8}$$. For $$k = 1$$: $$2^{1/4}\\,e^{i9\\pi/8}$$ (or equivalently $$-2^{1/4}\\,e^{i\\pi/8}$$). The two square roots are negatives of each other.\n\nLesson: for ANY fractional power, remember that the answer has multiple values.", "source": "Opus 4.7 ②", "_id": "opus_2_97", "judge_pick": true}, {"question": "BIG PICTURE: Why does the theory of complex numbers naturally unify trigonometry, rotation geometry, and exponential growth under one formalism? (4 steps)", "answer": "- Step 1: Complex numbers $$\\mathbb{C}$$ come with two natural operations: ADDITION (translation in the plane) and MULTIPLICATION.\n- Step 2: Multiplication in polar form SEPARATES into (a) real scaling (modulus) and (b) rotation (argument). This reveals that rotation and exponential growth are ALGEBRAICALLY two sides of the same coin.\n- Step 3: Euler's relation $$e^{i\\theta} = \\cos\\theta + i\\sin\\theta$$ shows how:\n+ Trig functions emerge from pure algebra of complex exponentials\n+ Rotation (angular) emerges from complex multiplication\n+ Exponential growth (typically real) extends to OSCILLATION when the exponent is imaginary\n- Step 4: This unification is why complex numbers are indispensable in physics (wave equations, quantum mechanics), engineering (signal processing, control theory), and pure mathematics (algebraic geometry, number theory). The Argand plane, circular motion, and exponential decay are all facets of ONE concept: the complex exponential $$e^z$$.", "source": "Opus 4.7 ②", "_id": "opus_2_98", "judge_pick": true}, {"question": "EXERCISE: Verify that $$(1 + i)^8 = 16$$ using de Moivre, and explain why the answer is a positive real. (4 steps)", "answer": "- Step 1: $$1 + i = \\sqrt{2}\\,e^{i\\pi/4}$$.\n- Step 2: $$(1+i)^8 = (\\sqrt{2})^8\\cdot e^{i\\cdot 8\\cdot \\pi/4} = 2^4\\cdot e^{i2\\pi} = 16\\cdot e^{i2\\pi}$$.\n- Step 3: $$e^{i2\\pi} = 1$$ (one full revolution returns to start). So $$(1+i)^8 = 16$$.\n- Step 4: The reason it's POSITIVE REAL: the argument multiplication $$8 \\cdot \\pi/4 = 2\\pi$$ lands exactly on the positive real axis. For $$n = 4$$, argument would be $$\\pi$$ giving $$-4$$; for $$n = 2$$, argument $$\\pi/2$$ giving $$2i$$; pattern continues cyclically with period 8.", "source": "Opus 4.7 ②", "_id": "opus_2_99", "judge_pick": false}, {"question": "Given $$z_1 = r_1 e^{i\\theta_1}$$ and $$z_2 = r_2 e^{i\\theta_2}$$, why does $$\\arg(z_1/z_2) = \\arg(z_1) - \\arg(z_2)$$ (rather than some more complex expression)? (3 steps)", "answer": "- Step 1: From the division rule: $$\\dfrac{z_1}{z_2} = \\dfrac{r_1}{r_2}\\,e^{i(\\theta_1 - \\theta_2)}$$. The argument is just $$\\theta_1 - \\theta_2$$.\n- Step 2: Why so clean? Because $$e^{i\\theta}$$ lives in the UNIT CIRCLE group under multiplication, which is isomorphic to $$\\mathbb{R}/2\\pi\\mathbb{Z}$$ under addition (the circle group $$U(1)$$). Multiplication of unit-circle elements is ADDITION of angles.\n- Step 3: Division reverses multiplication: if multiplying adds arguments, dividing subtracts them. The modulus part ($$r_1/r_2$$) is separate.\n\nNote: $$\\arg(z_1/z_2)$$ might lie outside the principal range $$(-\\pi, \\pi]$$; adjust by $$\\pm 2\\pi$$ if needed.", "source": "Opus 4.7 ②", "_id": "opus_2_100", "judge_pick": true}, {"question": "Apply the identity $$z^n + \\tfrac{1}{z^n} = 2\\cos n\\theta$$ to write $$2\\cos(7\\theta)$$ in terms of $$z = e^{i\\theta}$$. Why is this identity useful? (3 steps)", "answer": "- Step 1: Set $$n = 7$$: $$z^7 + \\tfrac{1}{z^7} = 2\\cos(7\\theta)$$.\n- Step 2: The identity lets us convert trigonometric multiples into pure algebraic expressions in $$z$$. This is crucial when expanding $$(2\\cos\\theta)^n$$ and needing to group terms into $$\\cos(k\\theta)$$.\n- Step 3: In integrals or derivatives, having a clean algebraic form (vs. nested trig) often simplifies computations dramatically. It's also foundational for FOURIER series, where functions are written as sums of $$e^{ik\\theta}$$ terms.", "source": "Opus 4.7 ②", "_id": "opus_2_101", "judge_pick": false}, {"question": "SYNTHESIS: Given the identity $$(z^2 + 1/z^2)^3 = (2\\cos 2\\theta)^3 = 8\\cos^3 2\\theta$$, derive an expression for $$\\cos^3 2\\theta$$ in terms of $$\\cos 6\\theta$$ and $$\\cos 2\\theta$$. (4 steps)", "answer": "- Step 1: Expand $$(z^2 + 1/z^2)^3$$ binomially:\n$$= z^6 + 3z^2 + \\tfrac{3}{z^2} + \\tfrac{1}{z^6}$$\n- Step 2: Group pairs: $$= (z^6 + z^{-6}) + 3(z^2 + z^{-2}) = 2\\cos 6\\theta + 6\\cos 2\\theta$$.\n- Step 3: Set equal to LHS: $$8\\cos^3 2\\theta = 2\\cos 6\\theta + 6\\cos 2\\theta$$.\n- Step 4: Solve: $$\\cos^3 2\\theta = \\tfrac{1}{4}\\cos 6\\theta + \\tfrac{3}{4}\\cos 2\\theta$$. So $$a = \\tfrac{1}{4}, b = \\tfrac{3}{4}$$ in the form $$a\\cos 6\\theta + b\\cos 2\\theta$$.\n\nIntegration application: $$\\int\\cos^3 2\\theta\\,d\\theta$$ now splits into two trivial integrals.", "source": "Opus 4.7 ②", "_id": "opus_2_102", "judge_pick": false}], "count": 103}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 25348, "out_tokens": 12948, "reasoning_chars": 20225, "cost_eur": 0.0662, "elapsed_s": 327, "content_chars": 18007}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 25348, "out_tokens": 13441, "reasoning_chars": 16360, "cost_eur": 0.0678, "elapsed_s": 203, "content_chars": 23601}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 25348, "out_tokens": 25821, "reasoning_chars": 1777, "cost_eur": 0.1076, "ela
