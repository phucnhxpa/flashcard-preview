sin 3x)$$. General form: $$y = A\\cos 3x + B\\sin 3x + x(\\lambda \\cos 3x + \\mu \\sin 3x)$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_18"}, {"question": "Build the intuition for why $$xe^{\\alpha x}$$ is the \"limit\" of $$\\frac{e^{\\beta x} - e^{\\alpha x}}{\\beta - \\alpha}$$ as $$\\beta \\to \\alpha$$. (3 steps)", "answer": "- Step 1: Start with two distinct roots $$\\alpha, \\beta$$. Both $$e^{\\alpha x}$$ and $$e^{\\beta x}$$ solve the DE, so any linear combination does too ‚ÄĒ in particular, $$y_\\beta(x) = \\frac{e^{\\beta x} - e^{\\alpha x}}{\\beta - \\alpha}$$ is a solution.\n- Step 2: As $$\\beta \\to \\alpha$$, both numerator and denominator go to zero ‚ÄĒ this is a 0/0 limit, reminiscent of a derivative. In fact, $$\\lim_{\\beta \\to \\alpha}\\frac{e^{\\beta x} - e^{\\alpha x}}{\\beta - \\alpha} = \\frac{\\partial}{\\partial \\beta}e^{\\beta x}\\Big|_{\\beta = \\alpha} = x e^{\\alpha x}$$.\n- Step 3: So $$xe^{\\alpha x}$$ is the \"derivative w.r.t. the root\" of $$e^{\\alpha x}$$ ‚ÄĒ it naturally emerges as the second independent solution when two roots merge. Not a coincidence.\n\nTakeaway: $$xe^{\\alpha x}$$ is the \"infinitesimal difference\" between two nearby exponential solutions as they merge into one.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_60"}, {"question": "Why do we often see differential equations written $$y'' + y = 0$$ in textbooks rather than using the full Leibniz notation $$\\frac{d^2y}{dx^2} + y = 0$$? What does each notation emphasise? (3 steps)", "answer": "- Step 1: Leibniz notation $$\\frac{d^2y}{dx^2}$$ explicitly shows the **independent variable** $$x$$ with respect to which differentiation occurs. This is crucial when multiple variables are present (partial derivatives, substitutions).\n- Step 2: Prime notation $$y''$$ is more **compact** and emphasises the structural form of the equation ‚ÄĒ the algebraic relationship between $$y$$, $$y'$$, $$y''$$. It's preferred when the independent variable is unambiguous.\n- Step 3: Both convey the same mathematical meaning. Use Leibniz when clarity about variables matters (especially in substitution problems); use primes when compactness is preferred.\n\nExam answers should be consistent ‚ÄĒ whichever notation you start with, stick with it throughout.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_69"}, {"question": "Why does critical damping (repeated root, e.g., $$m = -\\lambda$$ of multiplicity 2) represent the fastest return to equilibrium without oscillation? (3 steps)", "answer": "- Step 1: Three regimes for a damped oscillator:\n+ Underdamped (complex roots, real part $$<0$$): oscillates about equilibrium while decaying ‚ÄĒ takes time to settle.\n+ Overdamped (two distinct negative real roots $$m_1 < m_2 < 0$$): pure exponential decay, dominated by the slower root $$m_2$$ ‚ÄĒ slow return.\n+ Critically damped (repeated root $$m = -\\lambda$$): decay rate $$\\lambda$$, lies exactly at the boundary ‚ÄĒ fastest pure-exponential decay.\n- Step 2: Decreasing damping from critical ‚Üí underdamping + overshoot: oscillation increases settling time. Increasing damping from critical ‚Üí overdamping: the slow exponential becomes a bottleneck.\n- Step 3: Critical damping optimises \"return to equilibrium\" ‚ÄĒ no oscillation, no slow leftover exponential. Why shock absorbers and gauges are designed to be critically damped or slightly underdamped.\n\nTakeaway: Critical damping is the goldilocks zone ‚ÄĒ fastest non-oscillating return to equilibrium.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_78"}, {"question": "Consider the equation $$y'' + 4y = \\sin 2x$$. The auxiliary equation has roots $$\\pm 2i$$. What is the form of the general solution, and what does this imply about the long-term behavior (as $$x \\to \\infty$$) of the system? (3 steps)", "answer": "- Step 1: The C.F. is $$A\\cos 2x + B\\sin 2x$$. Because the standard P.I. guess $$\\lambda \\cos 2x + \\mu \\sin 2x$$ is entirely contained within the C.F., we must multiply by $$x$$. The P.I. guess becomes $$x(\\lambda \\cos 2x + \\mu \\sin 2x)$$.\n- Step 2: The general solution is therefore $$y = A\\cos 2x + B\\sin 2x + x(\\lambda \\cos 2x + \\mu \\sin 2x)$$. \n- Step 3: The presence of the $$x$$ multiplier in the P.I. means the amplitude of the oscillations will grow linearly with time. As $$x \\to \\infty$$, $$y \\to \\infty$$. This phenomenon is called **resonance**: the driving frequency ($$\\omega=2$$) perfectly matches the natural frequency of the system.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_11"}, {"question": "Conceptually, why does the Cauchy-Euler substitution $$x = e^u$$ turn a variable-coefficient equation into a constant-coefficient one? (3 steps)", "answer": "- Step 1: In $$x^2 y'' + bxy' + cy = 0$$, the $$x$$-dependence of coefficients scales perfectly with derivative order: $$x^2$$ with $$y''$$, $$x$$ with $$y'$$, $$1$$ with $$y$$. This homogeneous structure is \"scale-invariant.\"\n- Step 2: The logarithmic substitution $$u = \\ln x$$ turns multiplicative structure into additive structure: scaling $$x$$ by a factor corresponds to translating $$u$$. Derivatives w.r.t. $$u$$ involve only additive shifts ‚ÄĒ exactly what constant-coefficient equations do.\n- Step 3: Concretely, the operator $$x\\frac{d}{dx}$$ becomes $$\\frac{d}{du}$$, and $$x^2\\frac{d^2}{dx^2}$$ becomes $$\\frac{d^2}{du^2} - \\frac{d}{du}$$ ‚ÄĒ both constant-coefficient operators in $$u$$.\n\nTakeaway: Euler equations are \"log-translation-invariant\" ‚ÄĒ the logarithm reveals their hidden constant-coefficient nature.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_66"}, {"question": "For a second-order linear homogeneous DE, what conditions on the two roots of the auxiliary equation guarantee that *all* solutions decay to zero as $$x \\to \\infty$$? (3 steps)", "answer": "- Step 1: Solutions involve factors $$e^{\\alpha x}$$, $$e^{\\beta x}$$, or $$e^{px}\\cos/\\sin$$. For these to decay, the real part of the exponent must be **negative**.\n- Step 2: Case by case:\n+ Real distinct roots: need both $$\\alpha < 0$$ AND $$\\beta < 0$$.\n+ Repeated real root: need $$\\alpha < 0$$ (the $$x$$ factor grows polynomially but is beaten by the decaying exponential).\n+ Complex roots $$p \\pm qi$$: need $$p < 0$$.\n- Step 3: In every case the condition is: **both roots must have negative real part**. If either has positive real part, that component grows without bound and dominates.\n\nEquivalently, for the mass-spring analogy: damping $$b > 0$$ and stiffness $$c > 0$$ guarantee asymptotic stability.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_10"}, {"question": "How does the sign of the real part of the roots of the auxiliary equation determine whether solutions grow, decay, or stay bounded as $$x \\to \\infty$$? (3 steps)", "answer": "- Step 1: For each root $$m = p + qi$$ (real or complex), the associated term in the general solution contains the factor $$e^{px}$$.\n+ If $$p > 0$$: $$e^{px} \\to \\infty$$, the term grows unboundedly.\n+ If $$p < 0$$: $$e^{px} \\to 0$$, the term decays to zero.\n+ If $$p = 0$$: $$e^{px} = 1$$, the amplitude stays constant (pure oscillation if $$q \\neq 0$$).\n- Step 2: The overall solution is a sum of such terms. If any root has $$p > 0$$, the whole solution typically blows up. If all roots have $$p < 0$$, the solution decays.\n- Step 3: So stability of a second-order linear system is determined entirely by the signs of the real parts of the auxiliary equation's roots.\n\nTakeaway: All roots with negative real part ‚áí system is asymptotically stable.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_16"}, {"question": "What does it mean for a solution to \"remain finite as $$x \\to \\infty$$\", and how does this constrain the arbitrary constants in the general solution? (3 steps)", "answer": "- Step 1: \"Finite as $$x \\to \\infty$$\" means the solution stays bounded (or decays). If the general solution contains a term like $$Ae^{kx}$$ with $$k > 0$$, this term explodes unless $$A = 0$$.\n- Step 2: To enforce finiteness, we must set the coefficients of all growing exponential or growing-trig-envelope terms to zero. This reduces the number of free constants.\n- Step 3: Example: if $$y = Ae^{2x} + Be^{-3x} + P(x)$$, finiteness forces $$A = 0$$, leaving $$y = Be^{-3x} + P(x)$$. Combined with a single boundary condition, this can uniquely pin down $$B$$ ‚ÄĒ serving as the \"second condition\" for the particular solution.\n\nTakeaway: Finiteness conditions kill growing modes, effectively acting like a boundary condition at infinity.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_57"}, {"question": "If the function $$y(x) = 2e^{3x}$$ satisfies $$y'' - 5y' + 6y = f(x)$$, what must $$f(x)$$ be? (3 steps)", "answer": "- Step 1: Compute derivatives: $$y = 2e^{3x}$$, $$y' = 6e^{3x}$$, $$y'' = 18e^{3x}$$.\n- Step 2: Substitute into LHS: $$18e^{3x} - 5(6e^{3x}) + 6(2e^{3x}) = (18 - 30 + 12)e^{3x} = 0$$.\n- Step 3: We get zero! This happens because $$m = 3$$ is a root of the auxiliary equation $$m^2 - 5m + 6 = 0$$, so $$2e^{3x}$$ is actually a C.F. (homogeneous solution), and $$f(x) = 0$$. It cannot be a P.I. for any non-zero forcing ‚ÄĒ a proper P.I. for $$f(x) = pe^{3x}$$ would be $$\\lambda x e^{3x}$$.\n\nTakeaway: Always check: is the proposed P.I. actually in the C.F.? If yes, it solves the homogeneous equation, not a non-homogeneous one.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_64"}, {"question": "What is the conceptual reason that a linear combination of ANY two linearly independent solutions to a homogeneous 2nd-order linear DE gives the *general* solution? (3 steps)", "answer": "- Step 1: Solutions of $$Ly = 0$$ form a **vector space**: closed under addition and scalar multiplication. The dimension of this vector space equals the order of the DE ‚ÄĒ for 2nd-order, dimension 2.\n- Step 2: Any basis of a 2D vector space consists of 2 linearly independent vectors (functions, here). Every vector (solution) in the space can be written as a unique linear combination of the basis.\n- Step 3: So if we find two linearly independent solutions $$f_1(x), f_2(x)$$, then $$y = Af_1(x) + Bg_1(x)$$ ‚ÄĒ with $$A, B$$ arbitrary ‚ÄĒ parametrises the entire solution space. Every solution is captured.\n\n**Linear independence check**: $$f_1, f_2$$ are linearly independent iff one is not a constant multiple of the other (equivalently, iff the Wronskian $$W = f_1 g_1' - f_1' g_1 \\neq 0$$).", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_68"}, {"question": "If the auxiliary equation has a repeated real root $$\\alpha$$, the general solution is $$y = (A + Bx)e^{\\alpha x}$$. Why isn't $$y = Ae^{\\alpha x}$$ sufficient, and conceptually, why does multiplying by $$x$$ provide the second independent solution? (3 steps)", "answer": "- Step 1: $$y = Ae^{\\alpha x}$$ only contains one arbitrary constant, which is insufficient for a second-order differential equation. We need a second, *linearly independent* solution. Just adding another $$e^{\\alpha x}$$ term (like $$(A+B)e^{\\alpha x}$$) doesn't work because $$A+B$$ just collapses into a single new constant.\n- Step 2: Conceptually, imagine the two roots are distinct but approaching each other: $$\\alpha$$ and $$\\alpha + \\epsilon$$. The general solution is $$y = Ae^{\\alpha x} + Be^{(\\alpha+\\epsilon)x} = e^{\\alpha x}(A + Be^{\\epsilon x})$$.\n- Step 3: As $$\\epsilon \\to 0$$, we can use the approximation $$e^{\\epsilon x} \\approx 1 + \\epsilon x$$. The solution becomes $$e^{\\alpha x}(A + B(1 + \\epsilon x)) = e^{\\alpha x}((A+B) + B\\epsilon x)$$. Renaming the constants gives $$(C + Dx)e^{\\alpha x}$$. The $$x$$ emerges from the limit of two merging exponential behaviors.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_3"}], "models": {"glm_1": {"label": "GLM 5.1 ‚Ď†", "cards": [{"question": "Why do we guess a solution of the form $$y = e^{\\lambda x}$$ for the homogeneous equation $$a y'' + b y' + c y = 0$$, and how does substituting this guess lead to the auxiliary equation? (3 steps)", "answer": "- Step 1: We guess $$y = e^{\\lambda x}$$ because the derivative of an exponential function is a scaled version of itself. Specifically, $$y' = \\lambda e^{\\lambda x}$$ and $$y'' = \\lambda^2 e^{\\lambda x}$$. This property means that when we substitute $$y$$, $$y'$$, and $$y''$$ into the differential equation, the common factor $$e^{\\lambda x}$$ can be factored out, reducing the calculus problem to an algebraic one.\n- Step 2: Substituting the derivatives into the equation gives $$a(\\lambda^2 e^{\\lambda x}) + b(\\lambda e^{\\lambda x}) + c(e^{\\lambda x}) = 0$$. Factoring out the non-zero term $$e^{\\lambda x}$$ yields $$e^{\\lambda x}(a\\lambda^2 + b\\lambda + c) = 0$$.\n- Step 3: Since $$e^{\\lambda x} \\neq 0$$ for any real $$x$$, the bracket must equal zero: $$a\\lambda^2 + b\\lambda + c = 0$$. This quadratic equation is the **auxiliary equation**, and its roots determine the behavior of the general solution.\n\nThis transforms the problem from solving a differential equation to solving a quadratic equation.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_0", "judge_pick": false}, {"question": "If $$y_1(x)$$ and $$y_2(x)$$ are both solutions to the homogeneous equation $$a y'' + b y' + c y = 0$$, why is the linear combination $$y = A y_1(x) + B y_2(x)$$ also a solution? What fundamental property makes this true? (2 steps)", "answer": "- Step 1: This relies on the **linearity** of the differential operator. The operator $$L[y] = a y'' + b y' + c y$$ is linear, meaning it distributes over addition and respects scalar multiplication: $$L[A y_1 + B y_2] = A L[y_1] + B L[y_2]$$.\n- Step 2: Since $$y_1$$ and $$y_2$$ are solutions, $$L[y_1] = 0$$ and $$L[y_2] = 0$$. Therefore, $$L[A y_1 + B y_2] = A(0) + B(0) = 0$$. This is known as the **principle of superposition**, and it allows us to construct a general solution with two arbitrary constants from two independent specific solutions.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_1", "judge_pick": true}, {"question": "For the auxiliary equation $$am^2 + bm + c = 0$$ with two distinct real roots $$\\alpha$$ and $$\\beta$$, the general solution is $$y = Ae^{\\alpha x} + Be^{\\beta x}$$. Why must there be exactly two arbitrary constants, and what would go wrong if we only used one root? (2 steps)", "answer": "- Step 1: A second-order differential equation requires integrating twice to solve, which inherently introduces two arbitrary constants. To find a *particular* solution, we need two boundary conditions; a solution with only one constant can only satisfy one condition.\n- Step 2: If we only used $$y = Ae^{\\alpha x}$$, we would only have one constant, and more importantly, we would be missing all solution curves that feature the behavior governed by the root $$\\beta$$. The principle of superposition guarantees that combining both independent solutions gives the most general family of curves.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_2", "judge_pick": false}, {"question": "If the auxiliary equation has a repeated real root $$\\alpha$$, the general solution is $$y = (A + Bx)e^{\\alpha x}$$. Why isn't $$y = Ae^{\\alpha x}$$ sufficient, and conceptually, why does multiplying by $$x$$ provide the second independent solution? (3 steps)", "answer": "- Step 1: $$y = Ae^{\\alpha x}$$ only contains one arbitrary constant, which is insufficient for a second-order differential equation. We need a second, *linearly independent* solution. Just adding another $$e^{\\alpha x}$$ term (like $$(A+B)e^{\\alpha x}$$) doesn't work because $$A+B$$ just collapses into a single new constant.\n- Step 2: Conceptually, imagine the two roots are distinct but approaching each other: $$\\alpha$$ and $$\\alpha + \\epsilon$$. The general solution is $$y = Ae^{\\alpha x} + Be^{(\\alpha+\\epsilon)x} = e^{\\alpha x}(A + Be^{\\epsilon x})$$.\n- Step 3: As $$\\epsilon \\to 0$$, we can use the approximation $$e^{\\epsilon x} \\approx 1 + \\epsilon x$$. The solution becomes $$e^{\\alpha x}(A + B(1 + \\epsilon x)) = e^{\\alpha x}((A+B) + B\\epsilon x)$$. Renaming the constants gives $$(C + Dx)e^{\\alpha x}$$. The $$x$$ emerges from the limit of two merging exponential behaviors.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_3", "judge_pick": true}, {"question": "If the auxiliary equation has complex roots $$p \\pm qi$$, the general solution is $$y = e^{px}(C\\cos qx + D\\sin qx)$$. Walk through the intuition of how Euler's formula connects the complex exponential form $$Ae^{(p+qi)x} + Be^{(p-qi)x}$$ to this real trigonometric form. (3 steps)", "answer": "- Step 1: Start with the complex form: $$y = A e^{(p+qi)x} + B e^{(p-qi)x}$$. Using the law of exponents, this splits into $$y = e^{px}(A e^{iqx} + B e^{-iqx})$$.\n- Step 2: Apply Euler's formula ($$e^{i\\theta} = \\cos \\theta + i\\sin \\theta$$) to the imaginary exponentials: $$e^{iqx} = \\cos qx + i\\sin qx$$ and $$e^{-iqx} = \\cos qx - i\\sin qx$$.\n- Step 3: Substituting these in gives $$e^{px}[ (A+B)\\cos qx + i(A-B)\\sin qx ]$$. For the solution to be a real-valued function, $$A$$ and $$B$$ must be complex conjugates such that $$(A+B)$$ and $$i(A-B)$$ are real numbers. Renaming these real combinations as $$C$$ and $$D$$ yields the real form $$y = e^{px}(C\\cos qx + D\\sin qx)$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_4", "judge_pick": false}, {"question": "If the auxiliary equation has purely imaginary roots $$\\pm qi$$ (i.e., $$p=0$$), what is the general solution, and what does this imply about the physical behavior of the system being modeled? (2 steps)", "answer": "- Step 1: The general solution reduces to $$y = C\\cos qx + D\\sin qx$$. This can also be written as $$y = R\\sin(qx + \\phi)$$ or $$y = R\\cos(qx + \\phi)$$ using harmonic addition formulas, where $$R$$ is amplitude and $$\\phi$$ is phase.\n- Step 2: Physically, this implies **simple harmonic motion**‚ÄĒthe system oscillates indefinitely with a constant amplitude $$R$$ and a fixed angular frequency $$q$$. There is no exponential decay or growth because the $$e^{px}$$ term is simply $$e^0 = 1$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_5", "judge_pick": true}, {"question": "For the non-homogeneous equation $$a y'' + b y' + c y = f(x)$$, the general solution is $$y = \\text{C.F.} + \\text{P.I.}$$. Explain the conceptual roles of the Complementary Function (C.F.) and the Particular Integral (P.I.), and why they are simply added together. (3 steps)", "answer": "- Step 1: The **Complementary Function (C.F.)** is the general solution to the homogeneous equation ($$=0$$). It represents the *natural, unforced* behavior of the system (like a spring vibrating on its own). It contains the arbitrary constants $$A$$ and $$B$$.\n- Step 2: The **Particular Integral (P.I.)** is *any one* specific solution that satisfies the non-homogeneous equation ($$=f(x)$$). It represents the *forced response* of the system to the external driving function $$f(x)$$.\n- Step 3: They are added because of linearity. If $$y_c$$ solves the homogeneous equation and $$y_p$$ solves the non-homogeneous equation, then $$L[y_c + y_p] = L[y_c] + L[y_p] = 0 + f(x) = f(x)$$. The total response is the superposition of the natural response and the forced response.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_6", "judge_pick": false}, {"question": "When solving $$a y'' + b y' + c y = pe^{kx}$$, the standard guess for the P.I. is $$\\lambda e^{kx}$$. Why must this guess be modified if $$k$$ is a root of the auxiliary equation, and what is the modified form? (2 steps)", "answer": "- Step 1: If $$k$$ is a root of the auxiliary equation, then $$y = \\lambda e^{kx}$$ is already a solution to the *homogeneous* equation. If you substitute it into the LHS, it will yield 0, not $$pe^{kx}$$. It is \"absorbed\" into the C.F. and cannot act as a forced response.\n- Step 2: To find a function that is *not* absorbed by the C.F., we multiply our guess by $$x$$, just as we did for repeated roots. The modified guess becomes $$\\lambda x e^{kx}$$. This new function has the right form to generate an $$e^{kx}$$ term when operated on by the LHS.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_7", "judge_pick": false}, {"question": "For the equation $$y'' - 4y' + 4y = e^{2x}$$, the auxiliary equation has a repeated root $$m=2$$. Why is $$\\lambda x e^{2x}$$ still an insufficient guess for the P.I., and what is the correct form? (3 steps)", "answer": "- Step 1: The C.F. for a repeated root $$m=2$$ is $$(A + Bx)e^{2x}$$. Notice that the term $$Bxe^{2x}$$ is already part of the C.F.\n- Step 2: If we guess the P.I. as $$\\lambda x e^{2x}$$, this term will simply behave like the $$Bx e^{2x}$$ part of the C.F. When substituted into the LHS, it will yield 0, failing to produce the required $$e^{2x}$$ on the RHS.\n- Step 3: We must multiply by $$x$$ again to escape the shadow of the C.F. The correct guess is $$\\lambda x^2 e^{2x}$$. This ensures the P.I. is linearly independent from both $$e^{2x}$$ and $$xe^{2x}$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_8", "judge_pick": false}, {"question": "When solving $$y'' - 2y' = 3$$, the auxiliary equation has roots $$m=0$$ and $$m=2$$. Why can't we guess a constant P.I. like $$y = \\lambda$$, and what should we guess instead? (2 steps)", "answer": "- Step 1: The root $$m=0$$ means the C.F. contains the term $$Ae^{0x} = A$$, which is a constant. If we guess a constant P.I. $$y = \\lambda$$, its first and second derivatives are 0. Substituting into the LHS gives $$0 - 2(0) = 0 \\neq 3$$. The constant is absorbed by the C.F.\n- Step 2: Because $$m=0$$ is a root, any constant satisfies the homogeneous equation. We must multiply our standard guess by $$x$$. Instead of guessing $$\\lambda$$, we guess $$\\lambda x$$. Taking the derivative of $$\\lambda x$$ gives a non-zero constant $$\\lambda$$, which allows the LHS ($$-2y'$$) to equal 3.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_9", "judge_pick": true}, {"question": "When the RHS is $$f(x) = p\\cos \\omega x + q\\sin \\omega x$$, we guess a P.I. of $$\\lambda \\cos \\omega x + \\mu \\sin \\omega x$$. Why must we include *both* sine and cosine terms even if $$f(x)$$ only contains cosine? (2 steps)", "answer": "- Step 1: The derivative of cosine is (negative) sine, and the derivative of sine is cosine. When you substitute $$y = \\lambda \\cos \\omega x + \\mu \\sin \\omega x$$ into the LHS, the $$y'$$ and $$y''$$ terms will mix the sines and cosines together.\n- Step 2: If you only guessed $$\\lambda \\cos \\omega x$$, its derivatives would generate sine terms on the LHS that have nothing to cancel out with, making it impossible to equal a RHS that lacks sine terms. The $$\\mu \\sin \\omega x$$ term is necessary to produce the sine terms that balance out the cross-contamination from the derivatives.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_10", "judge_pick": true}, {"question": "Consider the equation $$y'' + 4y = \\sin 2x$$. The auxiliary equation has roots $$\\pm 2i$$. What is the form of the general solution, and what does this imply about the long-term behavior (as $$x \\to \\infty$$) of the system? (3 steps)", "answer": "- Step 1: The C.F. is $$A\\cos 2x + B\\sin 2x$$. Because the standard P.I. guess $$\\lambda \\cos 2x + \\mu \\sin 2x$$ is entirely contained within the C.F., we must multiply by $$x$$. The P.I. guess becomes $$x(\\lambda \\cos 2x + \\mu \\sin 2x)$$.\n- Step 2: The general solution is therefore $$y = A\\cos 2x + B\\sin 2x + x(\\lambda \\cos 2x + \\mu \\sin 2x)$$. \n- Step 3: The presence of the $$x$$ multiplier in the P.I. means the amplitude of the oscillations will grow linearly with time. As $$x \\to \\infty$$, $$y \\to \\infty$$. This phenomenon is called **resonance**: the driving frequency ($$\\omega=2$$) perfectly matches the natural frequency of the system.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_11", "judge_pick": true}, {"question": "A second-order differential equation general solution contains two arbitrary constants. Explain the process of using boundary conditions to find a particular solution, and why we often need the first derivative of the general solution. (2 steps)", "answer": "- Step 1: To find two unknown constants ($$A$$ and $$B$$), we need two independent equations. Boundary conditions provide these by specifying the state of the system at specific points, e.g., $$y(x_0) = y_0$$ and $$y'(x_0) = y_1$$.\n- Step 2: We substitute the point into the general solution to get the first equation. We then differentiate the general solution to get $$y'$$, and substitute the point into $$y'$$ to get the second equation. Solving these simultaneous equations yields the specific values of $$A$$ and $$B$$ that fit the initial state.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_12", "judge_pick": false}, {"question": "Given the substitution $$x = e^u$$, show how to express $$x \\frac{dy}{dx}$$ entirely in terms of derivatives with respect to $$u$$. (2 steps)", "answer": "- Step 1: We want to convert $$\\frac{dy}{dx}$$ to a derivative with respect to $$u$$. Using the chain rule, we write $$\\frac{dy}{dx} = \\frac{dy}{du} \\cdot \\frac{du}{dx}$$.\n- Step 2: Since $$x = e^u$$, we differentiate to find $$\\frac{dx}{du} = e^u = x$$. Therefore, $$\\frac{du}{dx} = \\frac{1}{x}$$. Substituting this into the chain rule gives $$\\frac{dy}{dx} = \\frac{dy}{du} \\cdot \\frac{1}{x}$$. Multiplying both sides by $$x$$ yields the clean result: $$x \\frac{dy}{dx} = \\frac{dy}{du}$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_13", "judge_pick": false}, {"question": "Continuing from $$x = e^u$$ and knowing $$x \\frac{dy}{dx} = \\frac{dy}{du}$$, derive the expression for $$x^2 \\frac{d^2 y}{dx^2}$$ in terms of $$u$$. (3 steps)", "answer": "- Step 1: Start with the relationship we just proved: $$\\frac{dy}{dx} = \\frac{1}{x} \\frac{dy}{du}$$. We need to differentiate this with respect to $$x$$ to find $$\\frac{d^2y}{dx^2}$$.\n- Step 2: Use the product rule on the RHS: $$\\frac{d}{dx}\\left( x^{-1} \\frac{dy}{du} \\right) = -x^{-2}\\frac{dy}{du} + x^{-1}\\frac{d}{dx}\\left(\\frac{dy}{du}\\right)$$. Using the chain rule, $$\\frac{d}{dx}\\left(\\frac{dy}{du}\\right) = \\frac{d^2y}{du^2}\\frac{du}{dx} = \\frac{1}{x}\\frac{d^2y}{du^2}$$. So, $$\\frac{d^2y}{dx^2} = -\\frac{1}{x^2}\\frac{dy}{du} + \\frac{1}{x^2}\\frac{d^2y}{du^2}$$.\n- Step 3: Multiply the entire equation by $$x^2$$ to isolate the target expression: $$x^2 \\frac{d^2y}{dx^2} = -\\frac{dy}{du} + \\frac{d^2y}{du^2}$$, or $$\\frac{d^2y}{du^2} - \\frac{dy}{du}$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_14", "judge_pick": false}, {"question": "A Cauchy-Euler equation has the form $$x^2 y'' + ax y' + by = 0$$. Using the Euler substitution results, explain how this transforms into a constant-coefficient equation, and what the new auxiliary equation looks like. (2 steps)", "answer": "- Step 1: Substitute the Euler results: $$x^2 y''$$ becomes $$\\frac{d^2y}{du^2} - \\frac{dy}{du}$$, and $$x y'$$ becomes $$\\frac{dy}{du}$$. The equation transforms to $$\\left(\\frac{d^2y}{du^2} - \\frac{dy}{du}\\right) + a\\left(\\frac{dy}{du}\\right) + by = 0$$.\n- Step 2: Simplifying, we get $$\\frac{d^2y}{du^2} + (a-1)\\frac{dy}{du} + by = 0$$. This is a standard second-order linear equation with constant coefficients in terms of the variable $$u$$. The new auxiliary equation is $$m^2 + (a-1)m + b = 0$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_15", "judge_pick": false}, {"question": "When using a substitution like $$y = \\frac{z}{x}$$ to reduce a second-order DE, what is the systematic process for transforming the derivatives $$y'$$ and $$y''$$ into terms of $$z$$? (3 steps)", "answer": "- Step 1: Differentiate the substitution using the quotient rule to find $$y'$$: $$y' = \\frac{z'x - z}{x^2}$$.\n- Step 2: Differentiate again using the quotient rule (and product rule for the numerator) to find $$y''$$: $$y'' = \\frac{d}{dx}\\left(\\frac{xz' - z}{x^2}\\right) = \\frac{(z' + xz'' - z')x^2 - 2x(xz' - z)}{x^4}$$, which simplifies to $$\\frac{xz'' - 2z'}{x^2} + \\frac{2z}{x^3}$$.\n- Step 3: Substitute $$y$$, $$y'$$, and $$y''$$ into the original DE. The goal is that the $$x$$ terms will cancel out, leaving a new, solvable DE in terms of $$z$$ and $$x$$ (or $$z$$ and $$u$$).", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_16", "judge_pick": false}, {"question": "Without solving for constants, write down the general form of the solution for $$y'' - 5y' + 6y = 10e^{4x}$$. (2 steps)", "answer": "- Step 1: Find the C.F. The auxiliary equation is $$m^2 - 5m + 6 = 0$$, which factors to $$(m-2)(m-3) = 0$$. Roots are 2 and 3. Thus, C.F. = $$Ae^{2x} + Be^{3x}$$.\n- Step 2: Find the P.I. form. The RHS is $$10e^{4x}$$. Since $$e^{4x}$$ is not in the C.F., we guess $$\\lambda e^{4x}$$. The general form is $$y = Ae^{2x} + Be^{3x} + \\lambda e^{4x}$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_17", "judge_pick": false}, {"question": "Without solving for constants, write down the general form of the solution for $$y'' + 9y = \\cos 3x$$. (2 steps)", "answer": "- Step 1: Find the C.F. The auxiliary equation is $$m^2 + 9 = 0 \\implies m = \\pm 3i$$. Thus, C.F. = $$A\\cos 3x + B\\sin 3x$$.\n- Step 2: Find the P.I. form. The RHS is $$\\cos 3x$$. Normally we guess $$\\lambda \\cos 3x + \\mu \\sin 3x$$, but this is entirely contained in the C.F. We must multiply by $$x$$ to avoid resonance. The P.I. form is $$x(\\lambda \\cos 3x + \\mu \\sin 3x)$$. General form: $$y = A\\cos 3x + B\\sin 3x + x(\\lambda \\cos 3x + \\mu \\sin 3x)$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_18", "judge_pick": true}, {"question": "Given the differential equation $$x^2 \\frac{d^2 y}{dx^2} + 4x \\frac{dy}{dx} + 2y = 0$$, use the Euler substitution $$x = e^u$$ to find the general solution in terms of $$x$$. (3 steps)", "answer": "- Step 1: Substitute the Euler derivatives. $$x^2 y'' \\to \\frac{d^2y}{du^2} - \\frac{dy}{du}$$ and $$xy' \\to \\frac{dy}{du}$$. The equation becomes $$\\left(\\frac{d^2y}{du^2} - \\frac{dy}{du}\\right) + 4\\frac{dy}{du} + 2y = 0$$, which simplifies to $$\\frac{d^2y}{du^2} + 3\\frac{dy}{du} + 2y = 0$$.\n- Step 2: Solve the constant-coefficient equation. The auxiliary equation is $$m^2 + 3m + 2 = 0 \\implies (m+1)(m+2) = 0 \\implies m=-1, -2$$. The general solution in terms of $$u$$ is $$y = Ae^{-u} + Be^{-2u}$$.\n- Step 3: Convert back to $$x$$. Since $$x = e^u$$, we have $$u = \\ln x$$, so $$e^{-u} = x^{-1}$$ and $$e^{-2u} = x^{-2}$$. The general solution in terms of $$x$$ is $$y = Ax^{-1} + Bx^{-2}$$, or $$y = \\frac{A}{x} + \\frac{B}{x^2}$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_19", "judge_pick": false}], "count": 20}, "glm_2": {"label": "GLM 5.1 ‚Ď°", "cards": [{"question": "Why does a general solution to a second-order differential equation require two arbitrary constants, and what does this imply about the information needed to find a particular solution? (2 steps)", "answer": "- Step 1: Solving a second-order differential equation fundamentally involves integrating twice. Each integration introduces an arbitrary constant (e.g., integrating $$\\frac{d^2y}{dx^2}$$ to $$\\frac{dy}{dx}$$ introduces $$A$$, and integrating again to $$y$$ introduces $$B$$).\n- Step 2: Because the general solution contains two independent arbitrary constants, you need exactly two independent pieces of information (boundary or initial conditions) to pin down their values and find a unique particular solution. For example, knowing both the starting position ($$y$$) and the starting velocity ($$\\frac{dy}{dx}$$) at a given time.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_0", "judge_pick": false}, {"question": "In solving the first-order homogeneous ODE $$a\\frac{dy}{dx} + by = 0$$, the solution is $$y = Ae^{kx}$$ where $$k = -b/a$$. How does this observation motivate the trial solution for the second-order homogeneous ODE $$a\\frac{d^2y}{dx^2} + b\\frac{dy}{dx} + cy = 0$$, and why must it contain two exponential terms? (4 steps)", "answer": "- Step 1: In the first-order case, the exponential form $$e^{kx}$$ works because the derivative of an exponential is a scaled version of itself ($$\\frac{d}{dx}e^{kx} = ke^{kx}$$). This allows the ODE to factor out $$e^{kx}$$ and collapse into an algebraic equation for $$k$$.\n- Step 2: For a second-order ODE, we expect the same \"self-similar\" property to work, so we guess a similar exponential form. However, a single exponential $$y = Ae^{\\lambda x}$$ only contains one arbitrary constant.\n- Step 3: Because integrating twice requires two constants, a single exponential is insufficient to represent the full family of solutions.\n- Step 4: Therefore, we try a linear combination of two distinct exponential functions: $$y = Ae^{\\lambda x} + Be^{\\mu x}$$. This provides the two required arbitrary constants ($$A$$ and $$B$$) while maintaining the property that all terms are exponentials, allowing the ODE to collapse into an algebraic condition on $$\\lambda$$ and $$\\mu$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_1", "judge_pick": true}, {"question": "When solving $$a\\frac{d^2y}{dx^2} + b\\frac{dy}{dx} + cy = 0$$, what is the auxiliary equation, and what is the conceptual justification for setting it up this way? (2 steps)", "answer": "- Step 1: The auxiliary equation is the quadratic algebraic equation $$am^2 + bm + c = 0$$. \n- Step 2: The justification comes from substituting the trial solution $$y = Ae^{\\lambda x} + Be^{\\mu x}$$ into the ODE. Because the derivatives of $$e^{\\lambda x}$$ just pull down powers of $$\\lambda$$, the left-hand side factors as $$Ae^{\\lambda x}(a\\lambda^2 + b\\lambda + c) + Be^{\\mu x}(a\\mu^2 + b\\mu + c) = 0$$. For this to hold for all $$x$$ and arbitrary $$A, B$$, the coefficients in the parentheses must be zero. Thus, $$\\lambda$$ and $$\\mu$$ must be roots of the polynomial $$am^2 + bm + c = 0$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_2", "judge_pick": false}, {"question": "If the auxiliary equation of a second-order homogeneous ODE has two distinct real roots $$\\alpha$$ and $$\\beta$$, what is the form of the general solution, and why are both terms necessary? (2 steps)", "answer": "- Step 1: The general solution is $$y = Ae^{\\alpha x} + Be^{\\beta x}$$.\n- Step 2: Both terms are necessary because $$e^{\\alpha x}$$ and $$e^{\\beta x}$$ are linearly independent functions; one cannot be written as a constant multiple of the other. Together, they form a basis for the solution space, providing the two distinct degrees of freedom (arbitrary constants $$A$$ and $$B$$) required to satisfy any pair of boundary conditions.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_3", "judge_pick": false}, {"question": "Misconception probe: If the auxiliary equation has a repeated real root $$\\alpha$$, why is $$y = Ae^{\\alpha x} + Be^{\\alpha x}$$ an incorrect way to write the general solution? How is this resolved? (3 steps)", "answer": "- Step 1: Writing $$y = Ae^{\\alpha x} + Be^{\\alpha x}$$ is flawed because the terms can be factorised into $$y = (A+B)e^{\\alpha x}$$. Letting $$C = A+B$$, this simplifies to $$y = Ce^{\\alpha x}$$.\n- Step 2: This effectively collapses the two arbitrary constants into one, which is insufficient for a second-order ODE. We have lost a degree of freedom because $$e^{\\alpha x}$$ alone does not provide two linearly independent solutions.\n- Step 3: To find a second independent solution, we multiply by $$x$$. The correct general solution is $$y = (A + Bx)e^{\\alpha x}$$. The term $$xe^{\\alpha x}$$ is linearly independent from $$e^{\\alpha x}$$, restoring the second arbitrary constant and satisfying the ODE.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_4", "judge_pick": true}, {"question": "If the auxiliary equation has complex conjugate roots $$p \\pm qi$$, the general solution can be written as $$y = e^{px}(A\\cos qx + B\\sin qx)$$. Walk through the intuition of how the complex exponential $$e^{(p+qi)x}$$ transforms into real trigonometric functions. (4 steps)", "answer": "- Step 1: Start with the raw general solution using the complex roots: $$y = C_1e^{(p+qi)x} + C_2e^{(p-qi)x}$$, where $$C_1$$ and $$C_2$$ could be complex constants.\n- Step 2: Split the exponential using index laws: $$e^{(p+qi)x} = e^{px} \\cdot e^{iqx}$$.\n- Step 3: Apply Euler's formula, $$e^{iqx} = \\cos(qx) + i\\sin(qx)$$, to both terms. This converts the complex exponentials into oscillating trigonometric functions multiplied by the real exponential $$e^{px}$$.\n- Step 4: When you expand and group the terms, the imaginary parts cancel out (assuming we want real-valued solutions), leaving $$y = e^{px}(A\\cos qx + B\\sin qx)$$ where $$A$$ and $$B$$ are new real arbitrary constants. The $$e^{px}$$ acts as an envelope controlling the amplitude, while $$\\cos qx$$ and $$\\sin qx$$ provide the oscillation.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_5", "judge_pick": false}, {"question": "Edge case: For the ODE $$\\frac{d^2y}{dx^2} + 16y = 0$$, the auxiliary equation has purely imaginary roots $$\\pm 4i$$. How does this physically interpret the system's behavior, and what is the form of the solution? (2 steps)", "answer": "- Step 1: Purely imaginary roots mean $$p = 0$$ and $$q = 4$$. The absence of the $$e^{px}$$ term means there is no exponential growth or decay (no damping or driving). Physically, this represents pure, sustained simple harmonic motion (oscillation) that repeats indefinitely.\n- Step 2: The general solution reduces to $$y = A\\cos 4x + B\\sin 4x$$, a pure linear combination of sine and cosine waves with constant amplitude.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_6", "judge_pick": false}, {"question": "The principle of superposition states that if $$y = f(x)$$ and $$y = g(x)$$ are solutions to a linear homogeneous ODE, then $$y = Af(x) + Bg(x)$$ is also a solution. Prove why this holds for $$a\\frac{d^2y}{dx^2} + b\\frac{dy}{dx} + cy = 0$$. (2 steps)", "answer": "- Step 1: Define the linear differential operator $$L(y) = a\\frac{d^2y}{dx^2} + b\\frac{dy}{dx} + cy$$. Linearity means that differentiation distributes across addition and scalar multiplication: $$L(Af + Bg) = A\\cdot L(f) + B\\cdot L(g)$$.\n- Step 2: Since $$f$$ and $$g$$ are given as solutions to the homogeneous ODE, $$L(f) = 0$$ and $$L(g) = 0$$. Therefore, $$L(Af + Bg) = A(0) + B(0) = 0$$. This proves the linear combination is also a solution, allowing us to construct the general solution from independent basis functions.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_7", "judge_pick": false}, {"question": "Synthesis: Given the ODE $$\\frac{d^2y}{dx^2} + k^2y = 0$$ where $$k$$ is a real constant, qualitatively describe the difference in the solution's behavior if $$k$$ were an imaginary number instead of a real number. (2 steps)", "answer": "- Step 1: If $$k$$ is real, the auxiliary equation $$m^2 + k^2 = 0$$ has purely imaginary roots $$m = \\pm ki$$. The solution $$y = A\\cos kx + B\\sin kx$$ is purely oscillatory (simple harmonic motion).\n- Step 2: If $$k$$ is imaginary, say $$k = iq$$ where $$q$$ is real, then $$k^2 = -q^2$$. The auxiliary equation becomes $$m^2 - q^2 = 0$$, yielding distinct real roots $$m = \\pm q$$. The solution shifts to $$y = Ae^{qx} + Be^{-qx}$$, which exhibits exponential growth and decay rather than oscillation. Changing the nature of the constant fundamentally shifts the physics from oscillation to exponential behavior.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_8", "judge_pick": false}, {"question": "For a non-homogeneous ODE $$a\\frac{d^2y}{dx^2} + b\\frac{dy}{dx} + cy = f(x)$$, conceptually distinguish between the Complementary Function (C.F.) and the Particular Integral (P.I.) in terms of what physical aspects of the system they represent. (2 steps)", "answer": "- Step 1: The Complementary Function (C.F.) solves the homogeneous equation (where $$f(x) = 0$$). It represents the system's **natural, transient behavior**‚ÄĒhow it responds to its initial conditions when left to its own devices (e.g., natural oscillations and damping). It always contains the arbitrary constants.\n- Step 2: The Particular Integral (P.I.) is any single specific solution to the full non-homogeneous equation. It represents the **forced, steady-state behavior**‚ÄĒhow the system is forced to behave due to the external driving function $$f(x)$$. It contains no arbitrary constants.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_9", "judge_pick": true}, {"question": "Why is the general solution to a non-homogeneous linear ODE given by the sum $$y = \\text{C.F.} + \\text{P.I.}$$? Walk through the logical justification using the linearity of the differential operator. (3 steps)", "answer": "- Step 1: Let the ODE be $$L(y) = f(x)$$, where $$L$$ is the linear differential operator. Let $$y_c$$ be the C.F., so by definition $$L(y_c) = 0$$. Let $$y_p$$ be the P.I., so by definition $$L(y_p) = f(x)$$.\n- Step 2: We want to find a general $$y$$ such that $$L(y) = f(x)$$. Try the sum $$y = y_c + y_p$$. By the linearity of the operator, $$L(y_c + y_p) = L(y_c) + L(y_p)$$.\n- Step 3: Substituting the definitions gives $$L(y_c + y_p) = 0 + f(x) = f(x)$$. Thus, the sum satisfies the original ODE. Furthermore, since $$y_p$$ has no arbitrary constants and $$y_c$$ has two, the sum contains exactly the two constants required for a general solution.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_10", "judge_pick": false}, {"question": "When choosing the form of a Particular Integral (P.I.) for $$f(x)$$, what is the standard trial form for each of these RHS functions: a constant, a polynomial of degree $$n$$, an exponential $$pe^{kx}$$, and a trigonometric combination $$p\\cos \\omega x + q\\sin \\omega x$$?", "answer": "The standard trial forms are chosen to mimic the structure of $$f(x)$$ and its derivatives:\n+ For a constant, use a constant: $$\\lambda$$\n+ For a polynomial of degree $$n$$, use a general polynomial of degree $$n$$: $$\\lambda + \\mu x + \\dots + \\nu x^n$$\n+ For an exponential $$pe^{kx}$$, use an exponential with the same power: $$\\lambda e^{kx}$$\n+ For a trigonometric mix, use a full mix of sine and cosine at the same frequency: $$\\lambda \\cos \\omega x + \\mu \\sin \\omega x$$ (even if $$f(x)$$ only contains sine or only cosine, you must include both because the derivative of sine is cosine, and vice versa).", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_11", "judge_pick": false}, {"question": "Misconception probe: When solving $$y'' - 5y' + 6y = e^{2x}$$, the auxiliary equation roots are 2 and 3. Why does choosing a P.I. of the form $$y = \\lambda e^{2x}$$ inevitably fail? (2 steps)", "answer": "- Step 1: The term $$\\lambda e^{2x}$$ is already part of the Complementary Function (which is $$y = Ae^{2x} + Be^{3x}$$). \n- Step 2: Because $$Ae^{2x}$$ solves the homogeneous equation, substituting $$\\lambda e^{2x}$$ into the left-hand side of the ODE will yield exactly 0, not $$e^{2x}$$. It is a solution to the \"unforced\" system, so it cannot satisfy the \"forced\" equation. You will end up with the impossible statement $$0 = e^{2x}$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_12", "judge_pick": true}, {"question": "How do you modify the trial Particular Integral when it overlaps with a term in the Complementary Function? When would you need to multiply by $$x^2$$ instead of just $$x$$? (2 steps)", "answer": "- Step 1: When the standard trial P.I. overlaps with a term in the C.F., you must multiply the trial P.I. by $$x$$ to make it linearly independent from the C.F. For example, if $$e^{2x}$$ is in the C.F., try $$\\lambda x e^{2x}$$ instead.\n- Step 2: You must multiply by $$x^2$$ if the C.F. contains a repeated root that causes both the standard trial P.I. and the $$x$$-multiplied version to overlap. For instance, if the C.F. is $$(A + Bx)e^{2x}$$ and the standard P.I. would be $$\\lambda e^{2x}$$, then $$\\lambda x e^{2x}$$ still overlaps with the $$Bx e^{2x}$$ term. Thus, you must escalate to $$\\lambda x^2 e^{2x}$$ to break free from the C.F.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_13", "judge_pick": true}, {"question": "Exercise: Determine only the *form* of the Particular Integral (do not solve for coefficients) for the ODE $$\\frac{d^2y}{dx^2} - 2\\frac{dy}{dx} + y = e^x$$. (3 steps)", "answer": "- Step 1: Find the Complementary Function. The auxiliary equation is $$m^2 - 2m + 1 = 0$$, which factors to $$(m-1)^2 = 0$$. This gives a repeated root $$m=1$$, so the C.F. is $$y = (A + Bx)e^x$$.\n- Step 2: Look at the right-hand side $$f(x) = e^x$$. The standard trial P.I. would be $$\\lambda e^x$$. However, this overlaps with the $$Ae^x$$ term in the C.F.\n- Step 3: Multiplying by $$x$$ gives $$\\lambda x e^x$$, but this still overlaps with the $$Bx e^x$$ term in the C.F. We must multiply by $$x$$ again. The correct form for the P.I. is $$y = \\lambda x^2 e^x$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_14", "judge_pick": false}, {"question": "For a damped non-homogeneous system modeled by $$y'' + 5y' + 6y = 10$$, what does the solution approximate as $$x \\to \\infty$$? Explain why the C.F. terms vanish. (2 steps)", "answer": "- Step 1: The solution is $$y = \\text{C.F.} + \\text{P.I.}$$. The C.F. solves $$m^2 + 5m + 6 = 0$$, giving roots $$m = -2, -3$$. Thus, the C.F. is $$Ae^{-2x} + Be^{-3x}$$. As $$x \\to \\infty$$, these exponential terms decay to zero because the roots are negative (representing dissipation/damping).\n- Step 2: The P.I. for a constant $$10$$ is just a constant $$\\lambda$$. Substituting gives $$6\\lambda = 10 \\implies \\lambda = \\frac{5}{3}$$. Since the C.F. (transient) dies out, the long-term behavior (steady-state) is dominated entirely by the P.I., meaning $$y \\approx \\frac{5}{3}$$ as $$x \\to \\infty$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_15", "judge_pick": true}, {"question": "Why exactly are two boundary conditions required to find a particular solution to a second-order ODE, and what types of conditions are typically given? (2 steps)", "answer": "- Step 1: The general solution $$y = \\text{C.F.} + \\text{P.I.}$$ contains exactly two arbitrary constants (inherited from the C.F.). To solve for two unknown constants, a system of two simultaneous equations is required, which necessitates two independent boundary conditions.\n- Step 2: Typically, conditions are given at a single point (initial conditions), such as the initial position $$y(x_0) = y_0$$ and the initial velocity $$y'(x_0) = v_0$$. Alternatively, they can be given at two different points (boundary value problems), such as the position at two different times $$y(x_0) = a$$ and $$y(x_1) = b$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_16", "judge_pick": false}, {"question": "When applying boundary conditions, should you substitute them into the Complementary Function, the Particular Integral, or the full General Solution? Why? (2 steps)", "answer": "- Step 1: You must substitute them into the full General Solution ($$y = \\text{C.F.} + \\text{P.I.}$$). \n- Step 2: The arbitrary constants $$A$$ and $$B$$ belong to the entire solution, not just the C.F. in isolation. The physical state (e.g., initial position) is the sum of the natural behavior and the forced behavior. Substituting into only the C.F. would ignore the contribution of the P.I. at the boundary point, leading to incorrect values for the constants.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_17", "judge_pick": true}, {"question": "Edge case: Given the general solution $$y = Ae^{-x} + Be^{-2x} + 3$$, what is the value of $$y$$ as $$x \\to \\infty$$, and does this limit depend on the specific boundary conditions applied? (2 steps)", "answer": "- Step 1: As $$x \\to \\infty$$, the exponential terms $$e^{-x}$$ and $$e^{-2x}$$ approach zero. Therefore, the solution approaches $$y \\to 3$$.\n- Step 2: This limit does **not** depend on the boundary conditions. The boundary conditions only determine the values of the arbitrary constants $$A$$ and $$B$$, which scale the transient (decaying) terms. Since those terms vanish regardless of their initial magnitude, the steady-state limit of 3 is robust and independent of initial conditions.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_18", "judge_pick": true}, {"question": "Simple exercise: The general solution to an ODE is $$y = Ae^x + Be^{-x} + xe^x$$. Set up (but do not solve) the simultaneous equations required to find the particular solution given that $$y=0$$ and $$y'=0$$ at $$x=0$$. (3 steps)", "answer": "- Step 1: Apply the first condition $$y(0) = 0$$ to the general solution. Substituting $$x=0$$ gives $$Ae^0 + Be^0 + 0\\cdot e^0 = 0$$, which simplifies to $$A + B = 0$$.\n- Step 2: Find the derivative of the general solution: $$y' = Ae^x - Be^{-x} + e^x + xe^x$$. \n- Step 3: Apply the second condition $$y'(0) = 0$$ to the derivative. Substituting $$x=0$$ gives $$Ae^0 - Be^0 + e^0 + 0 = 0$$, which simplifies to $$A - B + 1 = 0$$. The simultaneous equations are $$A+B=0$$ and $$A-B=-1$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_19", "judge_pick": false}, {"question": "What structural feature of an ODE (e.g., $$x^2\\frac{d^2y}{dx^2} + ax\\frac{dy}{dx} + by = 0$$) indicates that the substitution $$x = e^u$$ will reduce it to a constant-coefficient ODE?", "answer": "The ODE is a Cauchy-Euler (or equidimensional) equation, where each term has the same total \"dimension\" or power of $$x$$ matching the order of the derivative it multiplies. Specifically, a second derivative is multiplied by $$x^2$$, a first derivative by $$x^1$$, and the function by $$x^0 = 1$$. The substitution $$x = e^u$$ perfectly converts these scaling factors into constant coefficients because differentiating with respect to $$u$$ pulls down factors of $$x$$ that cancel the polynomial weights.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_20", "judge_pick": false}, {"question": "Derive the relationship $$x\\frac{dy}{dx} = \\frac{dy}{du}$$ given the substitution $$x = e^u$$. (2 steps)", "answer": "- Step 1: Differentiate the substitution $$x = e^u$$ with respect to $$u$$ to find the relationship between the differentials: $$\\frac{dx}{du} = e^u$$. Since $$x = e^u$$, this can be written as $$\\frac{dx}{du} = x$$.\n- Step 2: Apply the chain rule $$\\frac{dy}{du} = \\frac{dy}{dx} \\cdot \\frac{dx}{du}$$. Substituting our result from Step 1 gives $$\\frac{dy}{du} = \\frac{dy}{dx} \\cdot x$$, which rearranges to the required $$x\\frac{dy}{dx} = \\frac{dy}{du}$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_21", "judge_pick": false}, {"question": "Derive the relationship $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$ given the substitution $$x = e^u$$. (5 steps)", "answer": "- Step 1: Start with the result from the first derivative: $$\\frac{dy}{du} = e^u \\frac{dy}{dx}$$. We need to differentiate this with respect to $$u$$ to find $$\\frac{d^2y}{du^2}$$.\n- Step 2: Apply the product rule to the right side: $$\\frac{d^2y}{du^2} = \\frac{d}{du}\\left(e^u \\frac{dy}{dx}\\right) = e^u\\frac{dy}{dx} + e^u\\frac{d}{du}\\left(\\frac{dy}{dx}\\right)$$.\n- Step 3: Handle the second term using the chain rule. $$\\frac{dy}{dx}$$ is a function of $$x$$, so its derivative with respect to $$u$$ is $$\\frac{d}{du}\\left(\\frac{dy}{dx}\\right) = \\frac{d}{dx}\\left(\\frac{dy}{dx}\\right) \\cdot \\frac{dx}{du} = \\frac{d^2y}{dx^2} \\cdot e^u$$.\n- Step 4: Substitute this back into the product rule expression: $$\\frac{d^2y}{du^2} = e^u\\frac{dy}{dx} + e^u \\cdot \\left(\\frac{d^2y}{dx^2} \\cdot e^u\\right) = e^u\\frac{dy}{dx} + e^{2u}\\frac{d^2y}{dx^2}$$.\n- Step 5: Recognize that $$e^u\\frac{dy}{dx} = \\frac{dy}{du}$$ and $$e^{2u} = x^2$$. Substituting these gives $$\\frac{d^2y}{du^2} = \\frac{dy}{du} + x^2\\frac{d^2y}{dx^2}$$. Rearranging yields the required $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_22", "judge_pick": false}, {"question": "Substitution strategy: If an ODE contains terms like $$\\cos x \\frac{d^2y}{dx^2} + \\sin x \\frac{dy}{dx}$$, what substitution $$z = f(x)$$ might simplify the derivatives, and why? (2 steps)", "answer": "- Step 1: The substitution $$z = \\sin x$$ (or $$z = \\cos x$$) would simplify the equation. \n- Step 2: Using the chain rule, $$\\frac{dy}{dx} = \\frac{dy}{dz}\\frac{dz}{dx} = \\cos x \\frac{dy}{dz}$$. Notice that the $$\\cos x$$ coefficient naturally absorbs into the derivative operator. Similarly, the second derivative substitution will absorb the remaining trig functions, transforming the variable-coefficient ODE into a polynomial or constant-coefficient ODE in terms of $$z$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_23", "judge_pick": false}, {"question": "Exercise: Using the substitution $$x = e^u$$, transform the Cauchy-Euler ODE $$x^2\\frac{d^2y}{dx^2} + 3x\\frac{dy}{dx} + y = 0$$ into an ODE in terms of $$u$$. State the new ODE and the form of its general solution in terms of $$u$$. (3 steps)", "answer": "- Step 1: Apply the derivative substitution rules. We know $$x\\frac{dy}{dx} = \\frac{dy}{du}$$ and $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$. Substitute these directly into the ODE: $$\\left(\\frac{d^2y}{du^2} - \\frac{dy}{du}\\right) + 3\\left(\\frac{dy}{du}\\right) + y = 0$$.\n- Step 2: Simplify the transformed equation. The $$-\\frac{dy}{du}$$ and $$+3\\frac{dy}{du}$$ combine to $$+2\\frac{dy}{du}$$. The new constant-coefficient ODE is $$\\frac{d^2y}{du^2} + 2\\frac{dy}{du} + y = 0$$.\n- Step 3: Solve the new auxiliary equation: $$m^2 + 2m + 1 = 0 \\implies (m+1)^2 = 0$$. This has a repeated root $$m = -1$$. Therefore, the general solution in terms of $$u$$ is $$y = (A + Bu)e^{-u}$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_24", "judge_pick": false}], "count": 25}, "qwen_1": {"label": "Qwen 3 ‚Ď†", "cards": [{"question": "Why does the general solution to a second-order homogeneous differential equation with constant coefficients depend on the roots of the auxiliary equation? (3 steps)", "answer": "- Step 1: The differential equation $a \\frac{d^2y}{dx^2} + b \\frac{dy}{dx} + cy = 0$ assumes a trial solution $y = e^{mx}$, leading to the auxiliary equation $am^2 + bm + c = 0$.  \n- Step 2: The roots $m_1$ and $m_2$ determine the form of the solution:  \n  + **Real distinct roots**: $y = Ae^{m_1 x} + Be^{m_2 x}$.  \n  + **Repeated root**: $y = (A + Bx)e^{m x}$.  \n  + **Complex roots $p \\pm qi$**: $y = e^{px}(A \\cos qx + B \\sin qx)$.  \n- Step 3: This structure arises from linear independence and the need to span the solution space with two arbitrary constants (from the second-order equation).", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_0", "judge_pick": true}, {"question": "Why does a repeated root $m = \\alpha$ in the auxiliary equation lead to a solution of the form $y = (A + Bx)e^{\\alpha x}$? (3 steps)", "answer": "- Step 1: For a repeated root $m = \\alpha$, the trial solution $e^{\\alpha x}$ satisfies the differential equation but only provides one solution.  \n- Step 2: To find a second linearly independent solution, assume a solution of the form $v(x)e^{\\alpha x}$.  \n- Step 3: Substituting into the differential equation forces $v''(x) = 0$, so $v(x) = A + Bx$, giving the general solution $y = (A + Bx)e^{\\alpha x}$.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_1", "judge_pick": true}, {"question": "How do complex roots $m = p \\pm qi$ of the auxiliary equation translate into a real-valued solution involving sine and cosine? (3 steps)", "answer": "- Step 1: Complex roots $m = p \\pm qi$ give solutions $e^{(p+qi)x}$ and $e^{(p-qi)x}$.  \n- Step 2: Using Euler‚Äôs formula, these expand to $e^{px}(\\cos qx + i \\sin qx)$ and $e^{px}(\\cos qx - i \\sin qx)$.  \n- Step 3: Taking linear combinations (real and imaginary parts) yields the real-valued solution $y = e^{px}(A \\cos qx + B \\sin qx)$.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why is the complementary function (C.F.) the general solution to the homogeneous equation when solving non-homogeneous differential equations? (2 steps)", "answer": "- Step 1: The differential equation $a \\frac{d^2y}{dx^2} + b \\frac{dy}{dx} + cy = f(x)$ is linear, so solutions can be split into homogeneous and particular parts.  \n- Step 2: The C.F. accounts for all solutions to the homogeneous equation, while the particular integral (P.I.) addresses the non-homogeneous term $f(x)$.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_3", "judge_pick": false}, {"question": "What determines the form of the particular integral (P.I.) for a non-homogeneous differential equation? (2 steps)", "answer": "- Step 1: The form of $f(x)$ dictates the trial P.I. (e.g., polynomial, exponential, sinusoidal).  \n- Step 2: If the trial P.I. overlaps with the C.F., multiply by $x$ (or $x^2$ for repeated overlaps) to ensure linear independence.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does a polynomial $f(x)$ require a polynomial P.I. of the same degree when solving non-homogeneous equations? (2 steps)", "answer": "- Step 1: Substituting a polynomial P.I. into the differential equation preserves the degree after differentiation.  \n- Step 2: Matching coefficients of like terms ensures the equation balances, solving for the P.I.‚Äôs coefficients.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How do boundary conditions determine the constants in the general solution of a second-order differential equation? (2 steps)", "answer": "- Step 1: Two boundary conditions (e.g., $y(a)$ and $y'(a)$) provide two equations to solve for the arbitrary constants $A$ and $B$.  \n- Step 2: Substitute the conditions into the general solution and its derivative to form a system of equations.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why does the differential equation $x^2 \\frac{d^2y}{dx^2} + x \\frac{dy}{dx} + y = 0$ transform into a constant-coefficient equation via substitution $x = e^u$? (3 steps)", "answer": "- Step 1: Substitute $x = e^u$ to change variables to $u = \\ln x$, simplifying derivatives via the chain rule.  \n- Step 2: Compute $\\frac{dy}{du} = x \\frac{dy}{dx}$ and $\\frac{d^2y}{du^2} = x^2 \\frac{d^2y}{dx^2} + x \\frac{dy}{dx}$ (from Example 13).  \n- Step 3: The transformed equation $\\frac{d^2y}{du^2} + y = 0$ has constant coefficients, solvable via standard methods.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What is the significance of the principle of superposition in solving linear differential equations? (1 step)", "answer": "- Step 1: If $y_1$ and $y_2$ solve $a \\frac{d^2y}{dx^2} + b \\frac{dy}{dx} + cy = 0$, then any linear combination $y = A y_1 + B y_2$ is also a solution, forming the general solution.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why does the method of undetermined coefficients fail for $f(x) = \\ln x$, and what alternative approach is used? (2 steps)", "answer": "- Step 1: Polynomials, exponentials, and sinusoids (covered in the method of undetermined coefficients) cannot represent $\\ln x$, so trial P.I. forms don‚Äôt apply.  \n- Step 2: Use variation of parameters or other methods (e.g., power series) to find a particular integral.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ‚Ď°", "cards": [{"question": "Explain why the general solution to a second-order homogeneous differential equation requires two arbitrary constants.", "answer": "- Step 1: A second-order differential equation involves the second derivative of the solution.  \n- Step 2: Integrating the equation twice introduces two constants of integration.  \n- Step 3: For example, integrating $ \\frac{d^2y}{dx^2} = 12x $:  \n  $$\n  \\frac{dy}{dx} = 6x^2 + A \\quad \\text{(adds constant } A\\text{)},\n  $$  \n  $$\n  y = 2x^3 + Ax + B \\quad \\text{(adds constant } B\\text{)}.\n  $$  \n- Step 4: These constants are determined by boundary conditions (e.g., $ y $ and $ \\frac{dy}{dx} $ at a point).  \n\n**Key Insight:** The number of arbitrary constants equals the order of the differential equation, reflecting the degrees of freedom in the solution.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Derive the auxiliary equation for the differential equation $ a \\frac{d^2y}{dx^2} + b \\frac{dy}{dx} + cy = 0 $. Why is this substitution valid?", "answer": "- Step 1: Assume a solution of the form $ y = e^{mx} $, as exponential functions are eigenfunctions of differentiation.  \n- Step 2: Substitute $ y = e^{mx} $ into the DE:  \n  $$\n  a m^2 e^{mx} + b m e^{mx} + c e^{mx} = 0.\n  $$  \n- Step 3: Factor out $ e^{mx} $ (non-zero):  \n  $$\n  am^2 + bm + c = 0.\n  $$  \n- Step 4: This quadratic in $ m $ is the auxiliary equation.  \n+ Sub-case: Why $ e^{mx} $? Exponentials simplify differentiation to multiplication by constants, making the DE algebraic.  \n\n**Key Insight:** The auxiliary equation links the DE to its characteristic roots, which determine the solution's behavior (exponential growth/decay, oscillation, etc.).", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Compare the three cases for the roots of the auxiliary equation and their corresponding general solutions. Include the reasoning behind each form.", "answer": "- Case 1: **Distinct real roots** $ \\alpha, \\beta $  \n  $$\n  y = Ae^{\\alpha x} + Be^{\\beta x}.\n  $$  \n  Why? Each root contributes an independent exponential solution.  \n- Case 2: **Repeated real root** $ \\alpha $:  \n  $$\n  y = (A + Bx)e^{\\alpha x}.\n  $$  \n  Why? To maintain independence, multiply by $ x $ to account for the repeated root.  \n- Case 3: **Complex roots** $ p \\pm qi $:  \n  $$\n  y = e^{px}(A \\cos qx + B \\sin qx).\n  $$  \n  Why? Euler's formula $ e^{(p\\pm qi)x} = e^{px}(\\cos qx \\pm i \\sin qx) $ ensures real-valued solutions.  \n\n**Key Insight:** The roots' nature dictates the solution's structure, balancing linearity and independence.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why does a repeated root in the auxiliary equation require a solution of the form $ y = (A + Bx)e^{\\alpha x} $? (3 steps)", "answer": "- Step 1: For a repeated root $ \\alpha $, $ e^{\\alpha x} $ is one solution, but a second independent solution is needed.  \n- Step 2: Multiply by $ x $ to create a second solution $ xe^{\\alpha x} $, verified by substituting into the DE:  \n  $$\n  \\frac{d^2}{dx^2}(xe^{\\alpha x}) = \\alpha^2 xe^{\\alpha x} + 2\\alpha e^{\\alpha x}, \\quad \\frac{d}{dx}(xe^{\\alpha x}) = \\alpha xe^{\\alpha x} + e^{\\alpha x}.\n  $$  \n- Step 3: Substituting into $ a \\frac{d^2y}{dx^2} + b \\frac{dy}{dx} + cy = 0 $, terms involving $ xe^{\\alpha x} $ vanish due to the repeated root, leaving $ e^{\\alpha x} $ terms that cancel via the auxiliary equation.  \n\n**Key Insight:** Multiplying by $ x $ ensures linear independence when a repeated root reduces the solution space.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How do complex roots in the auxiliary equation lead to oscillatory solutions? (3 steps)", "answer": "- Step 1: Complex roots $ p \\pm qi $ arise when $ b^2 < 4ac $, yielding $ e^{(p \\pm qi)x} $.  \n- Step 2: Apply Euler‚Äôs formula:  \n  $$\n  e^{(p + qi)x} = e^{px}(\\cos qx + i \\sin qx), \\quad e^{(p - qi)x} = e^{px}(\\cos qx - i \\sin qx).\n  $$  \n- Step 3: Combine these to form real solutions $ e^{px} \\cos qx $ and $ e^{px} \\sin qx $, giving:  \n  $$\n  y = e^{px}(A \\cos qx + B \\sin qx).\n  $$  \n\n**Key Insight:** Complex roots introduce sinusoidal components due to Euler's formula, leading to damped or undamped oscillations.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_4", "judge_pick": false}, {"question": "For a non-homogeneous DE $ a \\frac{d^2y}{dx^2} + b \\frac{dy}{dx} + cy = f(x) $, why is the general solution $ y = \\text{C.F.} + \\text{P.I.} $? (3 steps)", "answer": "- Step 1: The **complementary function (C.F.)** solves the homogeneous equation $ a \\frac{d^2y}{dx^2} + b \\frac{dy}{dx} + cy = 0 $.  \n- Step 2: The **particular integral (P.I.)** is any solution to the non-homogeneous equation $ a \\frac{d^2y}{dx^2} + b \\frac{dy}{dx} + cy = f(x) $.  \n- Step 3: The general solution combines C.F. and P.I. because:  \n  - Linear operators preserve superposition:  \n    $$\n    a \\frac{d^2}{dx^2}(C.F. + P.I.) + b \\frac{d}{dx}(C.F. + P.I.) + c(C.F. + P.I.) = f(x).\n    $$  \n  - C.F. accounts for homogeneous behavior, while P.I. incorporates the forcing term.  \n\n**Key Insight:** Superposition allows decomposing the solution into free and forced responses.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why must the particular integral (P.I.) not overlap with the complementary function (C.F.)? How is this resolved?", "answer": "- Step 1: If the trial P.I. form is part of the C.F., substituting it into the DE yields zero (since C.F. solves the homogeneous equation).  \n- Step 2: For example, if $ f(x) = e^{\\alpha x} $ and $ \\alpha $ is a root of the auxiliary equation, trial P.I. $ \\lambda e^{\\alpha x} $ fails.  \n- Step 3: Resolve by multiplying the trial P.I. by $ x $ (or $ x^2 $ for repeated roots):  \n  - Original trial: $ \\lambda e^{\\alpha x} \\rightarrow \\lambda x e^{\\alpha x} $.  \n  - This ensures linear independence.  \n\n**Key Insight:** Overlap violates uniqueness; multiplying by $ x $ adjusts the P.I. to account for resonance in the homogeneous solution.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How do boundary conditions determine the constants in the general solution of a second-order DE? (2 steps)", "answer": "- Step 1: Apply two conditions (e.g., $ y = y_0 $ at $ x = x_0 $, $ \\frac{dy}{dx} = y'_0 $ at $ x = x_0 $) to the general solution.  \n- Step 2: Solve the resulting system of equations for constants $ A $ and $ B $. For example:  \n  - General solution: $ y = Ae^{3x} + Be^{2x} $.  \n  - Boundary conditions: $ y(0) = 0 \\Rightarrow A + B = 0 $; $ \\frac{dy}{dx}(0) = 1 \\Rightarrow 3A + 2B = 1 $.  \n  - Solve: $ A = 1, B = -1 $.  \n\n**Key Insight:** Boundary conditions constrain the solution to a specific initial state, eliminating arbitrary constants.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Explain how the substitution $ x = e^u $ transforms an Euler-Cauchy equation $ x^2 \\frac{d^2y}{dx^2} + ax \\frac{dy}{dx} + by = 0 $ into a constant-coefficient DE. (3 steps)", "answer": "- Step 1: Compute derivatives via the chain rule:  \n  $$\n  \\frac{dy}{dx} = \\frac{dy}{du} \\cdot \\frac{du}{dx} = \\frac{1}{x} \\frac{dy}{du}, \\quad \\frac{d^2y}{dx^2} = \\frac{1}{x^2} \\left( \\frac{d^2y}{du^2} - \\frac{dy}{du} \\right).\n  $$  \n- Step 2: Substitute into the Euler-Cauchy equation:  \n  $$\n  x^2 \\cdot \\frac{1}{x^2} \\left( \\frac{d^2y}{du^2} - \\frac{dy}{du} \\right) + ax \\cdot \\frac{1}{x} \\frac{dy}{du} + by = 0.\n  $$  \n- Step 3: Simplify:  \n  $$\n  \\frac{d^2y}{du^2} + (a-1) \\frac{dy}{du} + by = 0.\n  $$  \n  This is a constant-coefficient DE in $ u $.  \n\n**Key Insight:** The substitution linearizes the variable coefficients, reducing the equation to a solvable form with constant coefficients.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How does the form of $ f(x) $ in a non-homogeneous DE determine the trial particular integral (P.I.)? Provide examples.", "answer": "- Step 1: The trial P.I. mirrors $ f(x) $‚Äôs functional form to ensure substitution yields solvable equations.  \n- Step 2: Examples:  \n  - $ f(x) = 3 \\rightarrow \\lambda $ (constant).  \n  - $ f(x) = 2x \\rightarrow \\lambda x + \\mu $ (linear).  \n  - $ f(x) = e^{kx} \\rightarrow \\lambda e^{kx} $ (exponential).  \n  - $ f(x) = \\sin \\omega x \\rightarrow \\lambda \\cos \\omega x + \\mu \\sin \\omega x $ (trigonometric).  \n- Step 3: If $ f(x) $ overlaps with C.F., multiply by $ x $ (e.g., $ f(x) = e^{2x} $ with C.F. $ Ae^{2x} \\rightarrow \\lambda x e^{2x} $).  \n\n**Key Insight:** The trial P.I. must capture the forcing function‚Äôs structure while avoiding overlap with the C.F.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ‚Ď†", "cards": [{"question": "If the auxiliary equation $$am^2 + bm + c = 0$$ has two distinct real roots $$\\alpha$$ and $$\\beta$$, what is the form of the general solution to the homogeneous differential equation? (1 step)", "answer": "- The general solution is $$y = A e^{\\alpha x} + B e^{\\beta x}$$ where $$A$$ and $$B$$ are arbitrary constants. Each exponential term corresponds to one root of the auxiliary equation.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_0", "judge_pick": false}, {"question": "If the auxiliary equation has a repeated (equal) root $$\\alpha$$, what is the general solution form? Explain why we need the $$x$$ term. (2 steps)", "answer": "- Step 1: The general solution is $$y = (A + Bx)e^{\\alpha x}$$\n- Step 2: We need the $$Bx$$ term because a second-order differential equation requires two linearly independent solutions. With a repeated root, $$e^{\\alpha x}$$ and $$xe^{\\alpha x}$$ are linearly independent ‚ÄĒ they cannot be written as scalar multiples of each other. The term $$Bx$$ accounts for the second independent solution.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_1", "judge_pick": false}, {"question": "If the auxiliary equation has complex conjugate roots $$\\alpha = p + iq$$ and $$\\beta = p - iq$$, what is the general solution form? (1 step)", "answer": "- The general solution is $$y = e^{px}(A \\cos qx + B \\sin qx)$$ where $$A$$ and $$B$$ are arbitrary constants. Euler's formula $$e^{i\\theta} = \\cos\\theta + i\\sin\\theta$$ converts the complex exponentials into real trigonometric form.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Why does the solution $$y = e^{px}(A \\cos qx + B \\sin qx)$$ represent simple harmonic motion when $$p = 0$$? (2 steps)", "answer": "- Step 1: When $$p = 0$$, the solution becomes $$y = A \\cos qx + B \\sin qx$$, which can be rewritten as $$R \\sin(qx + \\phi)$$ ‚ÄĒ a pure sinusoidal function.\n- Step 2: This describes undamped simple harmonic motion where the amplitude $$R$$ remains constant and the motion repeats periodically with frequency $$q$$. There is no exponential decay or growth.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_3", "judge_pick": false}, {"question": "For the differential equation $$4\\frac{d^2y}{dx^2} + 4\\frac{dy}{dx} + y = 0$$, find the general solution. (3 steps)", "answer": "- Step 1: Write the auxiliary equation: $$4m^2 + 4m + 1 = 0$$\n- Step 2: Solve: $$(2m+1)^2 = 0$$, so $$m = -\\frac{1}{2}$$ (repeated root)\n- Step 3: The general solution is $$y = (A + Bx)e^{-\\frac{1}{2}x}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_4", "judge_pick": false}, {"question": "For the differential equation $$\\frac{d^2y}{dx^2} + 8\\frac{dy}{dx} + 17y = 0$$, find the general solution. (3 steps)", "answer": "- Step 1: The auxiliary equation is $$m^2 + 8m + 17 = 0$$\n- Step 2: Using the quadratic formula: $$m = \\frac{-8 \\pm \\sqrt{64 - 68}}{2} = \\frac{-8 \\pm \\sqrt{-4}}{2} = -4 \\pm i$$\n- Step 3: So $$p = -4$$ and $$q = 1$$, giving $$y = e^{-4x}(A \\cos x + B \\sin x)$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_5", "judge_pick": false}, {"question": "What is the difference between a complementary function and a particular integral in solving non-homogeneous differential equations? (2 steps)", "answer": "- Step 1: The complementary function (C.F.) is the general solution to the homogeneous equation $$ay'' + by' + cy = 0$$. It contains the arbitrary constants.\n- Step 2: The particular integral (P.I.) is any specific function that satisfies the original non-homogeneous equation $$ay'' + by' + cy = f(x)$$. The general solution is $$y = \\text{C.F.} + \\text{P.I.}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_6", "judge_pick": false}, {"question": "For the differential equation $$\\frac{d^2y}{dx^2} - 5\\frac{dy}{dx} + 6y = 3$$, state the form of particular integral you would try and find the values. (3 steps)", "answer": "- Step 1: Since the right-hand side is a constant (3), we try a constant form: $$y = \\lambda$$\n- Step 2: Then $$\\frac{dy}{dx} = 0$$ and $$\\frac{d^2y}{dx^2} = 0$$. Substituting: $$0 - 5(0) + 6\\lambda = 3$$\n- Step 3: So $$\\lambda = \\frac{1}{2}$$, giving P.I. = $$\\frac{1}{2}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_7", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dx^2} - 5\\frac{dy}{dx} + 6y = 2x$$, what form of particular integral would you try and why? (3 steps)", "answer": "- Step 1: Since the right-hand side is linear ($$2x$$), we try a linear form: $$y = \\lambda x + \\mu$$\n- Step 2: Then $$\\frac{dy}{dx} = \\lambda$$ and $$\\frac{d^2y}{dx^2} = 0$$. Substituting: $$0 - 5\\lambda + 6(\\lambda x + \\mu) = 2x$$\n- Step 3: Equating coefficients: $$6\\lambda = 2$$ (coefficient of $$x$$) gives $$\\lambda = \\frac{1}{3}$$, and $$-5\\lambda + 6\\mu = 0$$ gives $$\\mu = \\frac{5}{18}$$. So P.I. = $$\\frac{1}{3}x + \\frac{5}{18}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_8", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dx^2} - 5\\frac{dy}{dx} + 6y = e^x$$, what form of particular integral would you try? (3 steps)", "answer": "- Step 1: Since the right-hand side is an exponential ($$e^x$$), we try an exponential form: $$y = \\lambda e^x$$\n- Step 2: Then $$\\frac{dy}{dx} = \\lambda e^x$$ and $$\\frac{d^2y}{dx^2} = \\lambda e^x$$. Substituting: $$\\lambda e^x - 5\\lambda e^x + 6\\lambda e^x = e^x$$\n- Step 3: This gives $$(1 - 5 + 6)\\lambda = 1$$, so $$\\lambda = \\frac{1}{2}$$. P.I. = $$\\frac{1}{2}e^x$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_9", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dx^2} - 5\\frac{dy}{dx} + 6y = e^{2x}$$, explain why you cannot use $$y = \\lambda e^{2x}$$ as the particular integral form, and state what form you should use instead. (3 steps)", "answer": "- Step 1: The auxiliary equation is $$m^2 - 5m + 6 = 0$$, which factors as $$(m-3)(m-2) = 0$$, giving roots $$m = 3$$ and $$m = 2$$\n- Step 2: The complementary function contains the term $$Be^{2x}$$. Since $$e^{2x}$$ is already part of the C.F., using $$y = \\lambda e^{2x}$$ would give zero on the left-hand side, not $$e^{2x}$$\n- Step 3: To avoid overlap, multiply by $$x$$: try $$y = \\lambda x e^{2x}$$. This ensures the P.I. is linearly independent from the C.F.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Find the general solution to $$\\frac{d^2y}{dx^2} - 5\\frac{dy}{dx} + 6y = e^{2x}$$. (4 steps)", "answer": "- Step 1: C.F.: solve $$m^2 - 5m + 6 = 0$$ ‚Üí $$(m-3)(m-2)=0$$ ‚Üí $$m = 3, 2$$. So C.F. = $$Ae^{3x} + Be^{2x}$$\n- Step 2: For P.I., try $$y = \\lambda x e^{2x}$$ (since $$e^{2x}$$ is in C.F.)\n- Step 3: Then $$\\frac{dy}{dx} = 2\\lambda x e^{2x} + \\lambda e^{2x}$$, $$\\frac{d^2y}{dx^2} = 4\\lambda x e^{2x} + 4\\lambda e^{2x}$$\n- Step 4: Substitute: $$(4\\lambda x + 4\\lambda) - 5(2\\lambda x + \\lambda) + 6(\\lambda x) = e^{2x}$$ ‚Üí $$-\\lambda e^{2x} = e^{2x}$$ ‚Üí $$\\lambda = -1$$. So P.I. = $$-x e^{2x}$$. General solution: $$y = Ae^{3x} + Be^{2x} - x e^{2x}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_11", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dx^2} - 2\\frac{dy}{dx} = 3$$, find the general solution. Explain why the P.I. cannot be a constant. (4 steps)", "answer": "- Step 1: C.F.: solve $$m^2 - 2m = 0$$ ‚Üí $$m(m-2) = 0$$ ‚Üí $$m = 0, 2$$. So C.F. = $$A + Be^{2x}$$\n- Step 2: The C.F. contains a constant term $$A$$. If we try P.I. = $$\\lambda$$ (constant), substituting gives $$0 - 0 = 3$$, which is impossible\n- Step 3: So multiply by $$x$$: try $$y = \\lambda x$$. Then $$\\frac{dy}{dx} = \\lambda$$, $$\\frac{d^2y}{dx^2} = 0$$. Substituting: $$0 - 2\\lambda = 3$$ ‚Üí $$\\lambda = -\\frac{3}{2}$$\n- Step 4: P.I. = $$-\\frac{3}{2}x$$. General solution: $$y = A + Be^{2x} - \\frac{3}{2}x$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_12", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dx^2} + y = 13\\sin 3x$$, find an appropriate form for the particular integral. (3 steps)", "answer": "- Step 1: Since the right-hand side is $$\\sin 3x$$ (a trigonometric function), we try a linear combination of $$\\sin 3x$$ and $$\\cos 3x$$: $$y = \\lambda \\sin 3x + \\mu \\cos 3x$$\n- Step 2: Then $$\\frac{dy}{dx} = 3\\lambda \\cos 3x - 3\\mu \\sin 3x$$, $$\\frac{d^2y}{dx^2} = -9\\lambda \\sin 3x - 9\\mu \\cos 3x$$\n- Step 3: Substitute and equate coefficients of $$\\sin 3x$$ and $$\\cos 3x$$ to solve for $$\\lambda$$ and $$\\mu$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Why do we need TWO boundary conditions to determine a particular solution for a second-order differential equation? (1 step)", "answer": "- The general solution of a second-order differential equation contains TWO arbitrary constants ($$A$$ and $$B$$). Each boundary condition provides one equation, so we need TWO conditions to solve for both constants uniquely.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Find the particular solution to $$\\frac{d^2y}{dx^2} - y = 2e^x$$ given that $$y = 0$$ and $$\\frac{dy}{dx} = 0$$ at $$x = 0$$. (5 steps)", "answer": "- Step 1: C.F.: solve $$m^2 - 1 = 0$$ ‚Üí $$m = \\pm 1$$. So C.F. = $$Ae^x + Be^{-x}$$\n- Step 2: P.I.: try $$y = \\lambda x e^x$$ (since $$e^x$$ is in C.F.). Substituting gives $$\\lambda = 1$$, so P.I. = $$xe^x$$\n- Step 3: General solution: $$y = Ae^x + Be^{-x} + xe^x$$\n- Step 4: Using $$y(0) = 0$$: $$0 = A + B$$ ‚Üí $$A + B = 0$$\n- Step 5: Using $$y'(0) = 0$$: $$y' = Ae^x - Be^{-x} + e^x + xe^x$$, so $$0 = A - B + 1$$ ‚Üí $$A - B = -1$$. Solving: $$A = -\\frac{1}{2}$$, $$B = \\frac{1}{2}$$. Particular solution: $$y = -\\frac{1}{2}e^x + \\frac{1}{2}e^{-x} + xe^x$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Given the substitution $$x = e^u$$, show that $$x\\frac{dy}{dx} = \\frac{dy}{du}$$. (2 steps)", "answer": "- Step 1: By chain rule, $$\\frac{dy}{du} = \\frac{dy}{dx} \\cdot \\frac{dx}{du}$$. Since $$x = e^u$$, $$\\frac{dx}{du} = e^u = x$$\n- Step 2: Therefore, $$\\frac{dy}{du} = \\frac{dy}{dx} \\cdot x$$, so $$x\\frac{dy}{dx} = \\frac{dy}{du}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Given $$x = e^u$$, show that $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$. (3 steps)", "answer": "- Step 1: From the previous result, $$\\frac{dy}{du} = x\\frac{dy}{dx}$$\n- Step 2: Differentiate with respect to $$u$$: $$\\frac{d^2y}{du^2} = \\frac{d}{du}\\left(x\\frac{dy}{dx}\\right) = \\frac{dx}{du}\\frac{dy}{dx} + x\\frac{d}{du}\\left(\\frac{dy}{dx}\\right)$$\n- Step 3: Since $$\\frac{dx}{du} = x$$ and $$\\frac{d}{du}\\left(\\frac{dy}{dx}\\right) = \\frac{d^2y}{dx^2}\\frac{dx}{du} = x\\frac{d^2y}{dx^2}$$, we get $$\\frac{d^2y}{du^2} = x\\frac{dy}{dx} + x^2\\frac{d^2y}{dx^2}$$. Rearranging: $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Using the substitution $$x = e^u$$, find the general solution to $$x^2\\frac{d^2y}{dx^2} + x\\frac{dy}{dx} + y = 0$$. (4 steps)", "answer": "- Step 1: Substitute: using $$x\\frac{dy}{dx} = \\frac{dy}{du}$$ and $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$\n- Step 2: The equation becomes: $$\\left(\\frac{d^2y}{du^2} - \\frac{dy}{du}\\right) + \\frac{dy}{du} + y = 0$$ ‚Üí $$\\frac{d^2y}{du^2} + y = 0$$\n- Step 3: Auxiliary equation: $$m^2 + 1 = 0$$ ‚Üí $$m = \\pm i$$. So in $$u$$: $$y = A\\cos u + B\\sin u$$\n- Step 4: Since $$u = \\ln x$$, the general solution is $$y = A\\cos(\\ln x) + B\\sin(\\ln x)$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_18", "judge_pick": false}, {"question": "What type of differential equation is $$x^2\\frac{d^2y}{dx^2} + ax\\frac{dy}{dx} + by = 0$$ called, and what substitution is used to solve it? (1 step)", "answer": "- This is called an Euler equation (or Cauchy-Eu
