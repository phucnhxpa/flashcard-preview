n back to $$x$$? Illustrate with a typical form. (3 steps)", "answer": "- Step 1: Invert the substitution: $$x = e^u \\Rightarrow u = \\ln x$$.\n- Step 2: Replace every occurrence of $$u$$ in the solution with $$\\ln x$$. For example, if the solution in $$u$$ is $$y = Ae^{2u} + Be^{-u}$$, then substituting gives $$y = Ae^{2\\ln x} + Be^{-\\ln x} = Ax^2 + Bx^{-1}$$.\n- Step 3: For trigonometric forms: if $$y = A\\cos u + B\\sin u$$ in $$u$$, it becomes $$y = A\\cos(\\ln x) + B\\sin(\\ln x)$$ in $$x$$. These unusual-looking functions are perfectly valid solutions ‚ÄĒ they oscillate on a logarithmic scale of $$x$$.\n\nThe substitution process turns simple exponentials/trig in $$u$$ into power-of-$$x$$ or $$\\log$$-argument forms in $$x$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_32", "judge_pick": false}, {"question": "For the DE $$\\cos x \\frac{d^2y}{dx^2} + \\sin x \\frac{dy}{dx} - 2y\\cos^3 x = 2\\cos^5 x$$, what is the motivation for using the substitution $$z = \\sin x$$, and what's the structural key? (3 steps)", "answer": "- Step 1: Notice the DE contains $$\\sin x$$, $$\\cos x$$, and powers of $$\\cos x$$ in awkward ways. A substitution that simplifies these trigonometric expressions would help.\n- Step 2: Setting $$z = \\sin x$$ gives $$\\frac{dz}{dx} = \\cos x$$. Then $$\\frac{dy}{dx} = \\frac{dy}{dz}\\cdot \\cos x$$, and applying the chain rule again produces $$\\frac{d^2y}{dx^2}$$ in terms of $$\\frac{d^2y}{dz^2}$$. After simplification (using $$\\cos^2 x = 1 - z^2$$), many trig factors cancel cleanly.\n- Step 3: The transformed DE becomes $$\\frac{d^2y}{dz^2} - 2y = 2(1 - z^2)$$ ‚ÄĒ a standard constant-coefficient non-homogeneous DE solvable by C.F. + P.I.\n\nThe choice of substitution matches the \"natural coordinate\" implicit in the original equation's structure.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_33", "judge_pick": false}, {"question": "When you see a second-order DE and need to decide which substitution to try, what cues guide the choice? (3 scenarios)", "answer": "- Step 1: **Look at the coefficients' pattern**:\n+ $$x^2 y''$$ + $$xy'$$ + $$y$$ patterns (Cauchy-Euler) ‚Üí use $$x = e^u$$.\n+ Coefficients involving $$\\sin, \\cos$$ ‚Üí try $$z = \\sin x$$ or $$z = \\cos x$$.\n- Step 2: **Look at what the problem hints at**: exam questions often tell you \"use the substitution...\". Take it as a gift ‚ÄĒ your job is to execute the algebra correctly.\n- Step 3: **Goal-directed substitutions**:\n+ $$y = z/x^n$$ ‚ÄĒ useful when the original DE has variable coefficients that simplify if $$y$$ is scaled by a power of $$x$$.\n+ $$u = dy/dx$$ ‚ÄĒ reduces a 2nd-order DE missing $$y$$ to a 1st-order DE in $$u$$.\n\n**Deep principle**: substitutions exploit *hidden structure* ‚ÄĒ scaling, symmetry, or natural coordinates ‚ÄĒ embedded in the original equation.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_34", "judge_pick": true}, {"question": "Verify that $$y = A e^{-\\frac{3}{2}x} + Be^{-x}$$ satisfies the DE $$2y'' + 5y' + 3y = 0$$ and explain what this verification demonstrates. (4 steps)", "answer": "- Step 1: Compute derivatives: $$y' = -\\tfrac{3}{2}Ae^{-\\frac{3}{2}x} - Be^{-x}$$ and $$y'' = \\tfrac{9}{4}Ae^{-\\frac{3}{2}x} + Be^{-x}$$.\n- Step 2: Substitute into LHS: $$2y'' + 5y' + 3y = 2(\\tfrac{9}{4}A\\cdots + B\\cdots) + 5(-\\tfrac{3}{2}A\\cdots - B\\cdots) + 3(A\\cdots + B\\cdots)$$.\n- Step 3: Collect the $$Ae^{-\\frac{3}{2}x}$$ terms: $$\\tfrac{9}{2}A - \\tfrac{15}{2}A + 3A = 0$$. Collect the $$Be^{-x}$$ terms: $$2B - 5B + 3B = 0$$. Both groups vanish.\n- Step 4: So LHS = 0, verifying $$y$$ is a solution. **Insight**: this confirms that if $$\\lambda$$ satisfies the auxiliary equation, then $$e^{\\lambda x}$$ automatically zeroes out the LHS ‚ÄĒ the exponents $$-\\tfrac{3}{2}$$ and $$-1$$ were chosen as roots of $$2m^2 + 5m + 3 = 0$$.\n\nThe verification is not just a check ‚ÄĒ it reveals *why* the method works.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_35", "judge_pick": false}, {"question": "Conceptually, for the equation $$y'' - 2y' = 3$$, explain why a constant trial P.I. fails and how the fix emerges naturally. (4 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 - 2m = m(m-2) = 0$$, giving roots $$m = 0, 2$$. So the C.F. is $$A + Be^{2x}$$ ‚ÄĒ importantly, it contains the constant $$A$$.\n- Step 2: Standard trial for constant RHS is $$\\lambda$$ (constant). But a constant is already in the C.F., meaning any constant is annihilated by the operator $$L = \\frac{d^2}{dx^2} - 2\\frac{d}{dx}$$ (both derivatives give zero). Plugging $$\\lambda$$ gives 0, not 3.\n- Step 3: Escape by multiplying by $$x$$: try $$y_{PI} = \\lambda x$$. Now $$y_{PI}' = \\lambda$$ is not zero, so the $$-2y'$$ term contributes $$-2\\lambda$$ on the LHS.\n- Step 4: Setting $$-2\\lambda = 3$$ gives $$\\lambda = -\\tfrac{3}{2}$$, so $$y_{PI} = -\\tfrac{3}{2}x$$. General solution: $$y = A + Be^{2x} - \\tfrac{3}{2}x$$.\n\nThis illustrates the universal rule: whenever the standard trial sits in the null space of $$L$$, multiply by $$x$$ to lift it out.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_36", "judge_pick": false}, {"question": "Find the form of the general solution of $$\\frac{d^2y}{dx^2} + 5\\frac{dy}{dx} + 6y = 0$$ without computing arbitrary numerical constants ‚ÄĒ focus on what case it is and why. (3 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 + 5m + 6 = 0$$ factors as $$(m+2)(m+3) = 0$$, giving two distinct real roots $$m = -2, -3$$. Discriminant $$= 25 - 24 = 1 > 0$$ confirms Case 1.\n- Step 2: Since both roots are negative and real, solutions are two decaying exponentials ‚ÄĒ the overdamped regime of a mass-spring system.\n- Step 3: General form: $$y = Ae^{-2x} + Be^{-3x}$$. Qualitatively, as $$x \\to \\infty$$, both exponential components decay to zero, and the $$e^{-3x}$$ component decays faster than $$e^{-2x}$$, so for large $$x$$ the solution is dominated by $$Ae^{-2x}$$.\n\nTwo arbitrary constants allow matching any two boundary conditions.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_37", "judge_pick": false}, {"question": "Describe conceptually what happens when solving $$\\frac{d^2y}{dx^2} + 9y = 15e^{3x}$$: what's the C.F., what type of P.I. do we try, and how do the two parts combine? (4 steps)", "answer": "- Step 1: **C.F.**: Auxiliary equation $$m^2 + 9 = 0$$ gives $$m = \\pm 3i$$. Complex roots with zero real part produce undamped sinusoidal oscillation: $$y_{CF} = A\\cos 3x + B\\sin 3x$$.\n- Step 2: **P.I. trial**: RHS is $$15e^{3x}$$, so try $$y_{PI} = \\lambda e^{3x}$$. Check: is $$e^{3x}$$ in the C.F.? No ‚ÄĒ the C.F. contains $$\\cos 3x$$ and $$\\sin 3x$$, not $$e^{3x}$$. So no modification needed.\n- Step 3: Substituting gives $$\\lambda\\cdot 9 e^{3x} + 9\\lambda e^{3x} = 18\\lambda e^{3x} = 15e^{3x}$$, so $$\\lambda = \\tfrac{15}{18} = \\tfrac{5}{6}$$.\n- Step 4: General solution: $$y = A\\cos 3x + B\\sin 3x + \\tfrac{5}{6}e^{3x}$$. The oscillation comes from the C.F. (natural frequency), and the growing exponential comes from the forcing.\n\nPhysically: an undamped oscillator being driven by an exponentially increasing external force.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_38", "judge_pick": false}, {"question": "For $$y'' + 4y = \\sin x$$, conceptually walk through how to find the general solution. Note the forcing frequency differs from the natural frequency. (4 steps)", "answer": "- Step 1: **C.F.**: Auxiliary equation $$m^2 + 4 = 0$$ gives $$m = \\pm 2i$$. So $$y_{CF} = A\\cos 2x + B\\sin 2x$$ ‚ÄĒ natural frequency is 2.\n- Step 2: **P.I. trial**: RHS is $$\\sin x$$ (frequency 1, different from natural frequency 2). Try $$y_{PI} = \\lambda\\cos x + \\mu\\sin x$$. No modification needed because $$\\cos x, \\sin x$$ are NOT in the C.F.\n- Step 3: Substituting and equating coefficients of $$\\cos x$$ and $$\\sin x$$ gives specific values for $$\\lambda, \\mu$$ (both finite).\n- Step 4: General solution: $$y = A\\cos 2x + B\\sin 2x + \\lambda\\cos x + \\mu\\sin x$$. Two frequencies coexist ‚ÄĒ the natural and forced.\n\n**Contrast**: if the forcing frequency *matched* the natural frequency ($$\\sin 2x$$ instead of $$\\sin x$$), the standard trial would be in the C.F., and we'd need to multiply by $$x$$ ‚ÄĒ giving rise to **resonance**, where the amplitude grows without bound.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_39", "judge_pick": false}, {"question": "Given $$\\frac{d^2y}{dx^2} + k^2 y = 0$$ with $$y(0) = 1$$ and $$y'(0) = 1$$, conceptually find $$y$$ in terms of $$k$$ and $$x$$. (4 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 + k^2 = 0$$ gives $$m = \\pm ki$$ (pure imaginary). General solution: $$y = A\\cos kx + B\\sin kx$$.\n- Step 2: Apply $$y(0) = 1$$: $$y(0) = A\\cos 0 + B\\sin 0 = A$$. So $$A = 1$$.\n- Step 3: Differentiate: $$y'(x) = -Ak\\sin kx + Bk\\cos kx$$. Apply $$y'(0) = 1$$: $$y'(0) = -Ak\\cdot 0 + Bk \\cdot 1 = Bk$$. So $$B = 1/k$$.\n- Step 4: Particular solution: $$y = \\cos kx + \\tfrac{1}{k}\\sin kx$$. The system oscillates with angular frequency $$k$$ and amplitude $$\\sqrt{1 + 1/k^2}$$.\n\nAs $$k \\to \\infty$$, the solution's amplitude approaches 1 and its frequency grows; as $$k \\to 0$$, the $$\\tfrac{1}{k}\\sin kx$$ term dominates and is highly sensitive to $$k$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_40", "judge_pick": false}, {"question": "For the DE $$\\frac{d^2x}{dt^2} + 2k\\frac{dx}{dt} + 9x = 0$$ (with constant $$k \\geq 0$$), explain how the qualitative behaviour of $$x(t)$$ changes as $$k$$ increases from 0 through to large values. (4 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + 2km + 9 = 0$$, roots $$m = -k \\pm \\sqrt{k^2 - 9}$$. The discriminant is $$4k^2 - 36$$.\n- Step 2: **Case $$|k| < 3$$** (underdamped): Discriminant negative, complex roots $$-k \\pm i\\sqrt{9-k^2}$$. Solution: $$x = e^{-kt}(A\\cos\\omega t + B\\sin\\omega t)$$ where $$\\omega = \\sqrt{9-k^2}$$. Oscillates with exponentially decaying amplitude.\n- Step 3: **Case $$|k| = 3$$** (critically damped): Repeated root $$m = -3$$. Solution: $$x = (A + Bt)e^{-3t}$$. Fastest non-oscillatory return to equilibrium.\n- Step 4: **Case $$|k| > 3$$** (overdamped): Two distinct negative real roots. Solution is sum of two decaying exponentials, no oscillation, slower return than critical damping.\n\nIn all three cases (for $$k>0$$), $$x \\to 0$$ as $$t \\to \\infty$$: the system always returns to equilibrium, but the *manner* of return changes dramatically.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_41", "judge_pick": true}, {"question": "For the equation $$\\frac{d^2y}{dx^2} - y = 2e^x$$ with $$y(0) = 0$$ and $$y'(0) = 0$$, conceptually walk through finding the particular solution. (5 steps)", "answer": "- Step 1: **C.F.**: Auxiliary $$m^2 - 1 = 0$$ gives $$m = \\pm 1$$. So $$y_{CF} = Ae^x + Be^{-x}$$.\n- Step 2: **P.I.**: Try $$\\lambda e^x$$ ‚ÄĒ but $$e^x$$ is in the C.F. Modify: try $$\\lambda x e^x$$. Substituting and simplifying gives $$\\lambda = 1$$, so $$y_{PI} = xe^x$$.\n- Step 3: **General solution**: $$y = Ae^x + Be^{-x} + xe^x$$.\n- Step 4: **Apply BCs**:\n+ $$y(0) = 0 \\Rightarrow A + B = 0$$.\n+ Differentiate: $$y'(x) = Ae^x - Be^{-x} + e^x + xe^x$$. Then $$y'(0) = A - B + 1 = 0$$, so $$A - B = -1$$.\n- Step 5: **Solve simultaneously**: $$A = -\\tfrac{1}{2}$$, $$B = \\tfrac{1}{2}$$. Particular solution: $$y = -\\tfrac{1}{2}e^x + \\tfrac{1}{2}e^{-x} + xe^x$$.\n\nThe forced term $$xe^x$$ dominates for large $$x$$; the C.F. contribution has been chosen to satisfy the initial conditions.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_42", "judge_pick": false}, {"question": "What is the logic behind the principle of superposition's role in non-homogeneous DEs ‚ÄĒ why does the solution contain exactly ONE particular integral (not a family) plus the ENTIRE C.F.? (3 steps)", "answer": "- Step 1: The homogeneous operator $$L$$ has a **2-dimensional null space** (solutions satisfying $$L[y] = 0$$) ‚ÄĒ this is the C.F. with its two free parameters.\n- Step 2: For the inhomogeneous problem $$L[y] = f(x)$$, the solution set is not a vector space but an **affine** set: pick any one solution $$y_p$$, and the full solution set is $$\\{y_p + y_c : y_c \\in \\text{null space}\\}$$.\n- Step 3: This is why we need just *one* particular integral (to \"anchor\" ourselves in the solution set) plus the *full* two-parameter C.F. (to reach every other solution from that anchor).\n\nGeometric analogy: finding all points on a plane not through origin. You need one point on the plane, plus all vectors parallel to the plane.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_43", "judge_pick": true}, {"question": "Explain why the particular integral for $$f(x) = p + qx + rx^2$$ must include ALL terms $$\\lambda + \\mu x + \\nu x^2$$, even if, say, the linear or constant term isn't obviously needed. (3 steps)", "answer": "- Step 1: Derivatives of $$x^2$$ produce lower-order terms: $$\\frac{d}{dx}(x^2) = 2x$$ and $$\\frac{d^2}{dx^2}(x^2) = 2$$. So when we substitute $$\\nu x^2$$ into the DE, constants and linear terms are generated.\n- Step 2: To match the RHS coefficient by coefficient (constant, $$x$$, $$x^2$$), we need $$\\lambda$$ and $$\\mu x$$ in the trial to absorb these extra generated terms and leave exactly the required polynomial.\n- Step 3: If we omitted $$\\lambda$$ or $$\\mu x$$, we couldn't match the RHS's constant or linear coefficients ‚ÄĒ the system of equations would be inconsistent.\n\n**Rule**: For polynomial RHS of degree $$n$$, the P.I. trial is a full polynomial of degree $$n$$, with *every* lower power included.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_44", "judge_pick": true}, {"question": "For the DE $$\\frac{d^2y}{dt^2} + 4y = 5\\cos 3t$$ with initial conditions $$y(0) = 1$$, $$y'(0) = 2$$, conceptually determine what the particular solution looks like. (5 steps)", "answer": "- Step 1: **C.F.**: $$m^2 + 4 = 0$$ gives $$m = \\pm 2i$$. $$y_{CF} = A\\cos 2t + B\\sin 2t$$.\n- Step 2: **P.I.**: Forcing frequency 3 ‚Č† natural frequency 2, so no resonance. Try $$\\lambda\\cos 3t + \\mu\\sin 3t$$. Substitute; since the DE has no $$y'$$ term, the cross-coupling between sin and cos is absent ‚ÄĒ we find $$\\mu = 0$$ and $$\\lambda$$ from matching $$\\cos 3t$$: $$-9\\lambda + 4\\lambda = 5 \\Rightarrow \\lambda = -1$$. So $$y_{PI} = -\\cos 3t$$.\n- Step 3: **General solution**: $$y = A\\cos 2t + B\\sin 2t - \\cos 3t$$.\n- Step 4: **Apply $$y(0) = 1$$**: $$A - 1 = 1 \\Rightarrow A = 2$$.\n- Step 5: **Apply $$y'(0) = 2$$**: Differentiate: $$y' = -2A\\sin 2t + 2B\\cos 2t + 3\\sin 3t$$. At $$t=0$$: $$2B = 2 \\Rightarrow B = 1$$. Solution: $$y = 2\\cos 2t + \\sin 2t - \\cos 3t$$.\n\nTwo frequencies (2 and 3) combine ‚ÄĒ the output is not a simple sinusoid but a superposition of natural and driven oscillations.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_45", "judge_pick": false}, {"question": "What conceptually happens in a driven oscillator when the forcing frequency matches the natural frequency? (3 steps)", "answer": "- Step 1: Natural frequency corresponds to the roots of the homogeneous equation. If the forcing function has the *same* frequency, the standard trial P.I. ($$\\lambda\\cos\\omega x + \\mu\\sin\\omega x$$) coincides with the C.F. ‚ÄĒ it's in the null space of $$L$$.\n- Step 2: The standard trial fails. We must multiply by $$x$$, so the P.I. becomes $$x(\\lambda\\cos\\omega x + \\mu\\sin\\omega x)$$ ‚ÄĒ an oscillation with **linearly growing amplitude**.\n- Step 3: Physically this is **resonance**: a swing pushed at its natural frequency accumulates energy each cycle, and its amplitude grows without bound. In real systems, damping eventually limits this growth, but the mathematical idealisation (no damping) predicts unlimited growth.\n\nResonance emerges directly from the mathematical need to modify the P.I. trial.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_46", "judge_pick": false}, {"question": "Why does the substitution $$u = \\frac{dy}{dx}$$ \"reduce the order\" of a second-order DE where $$y$$ does not appear explicitly? (3 steps)", "answer": "- Step 1: Consider a DE of the form $$f\\left(x, \\frac{dy}{dx}, \\frac{d^2y}{dx^2}\\right) = 0$$ ‚ÄĒ no $$y$$ appears.\n- Step 2: Let $$u = \\frac{dy}{dx}$$. Then $$\\frac{d^2y}{dx^2} = \\frac{du}{dx}$$. Substituting transforms the DE into $$f(x, u, \\frac{du}{dx}) = 0$$ ‚ÄĒ a **first-order** DE in $$u$$.\n- Step 3: Solve this first-order DE for $$u$$ (using first-order techniques like separation or integrating factor), then integrate once more $$y = \\int u\\, dx$$ to recover $$y$$. Each stage introduces one arbitrary constant, giving the required two.\n\n**Why it works**: If $$y$$ doesn't appear, the DE only \"cares\" about $$y'$$ as a unit ‚ÄĒ we can treat $$y'$$ as the unknown.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_47", "judge_pick": false}, {"question": "For the Cauchy‚ÄďEuler equation $$x^2\\frac{d^2y}{dx^2} + 6x\\frac{dy}{dx} + 4y = 0$$, use the substitution $$x = e^u$$ to find the general solution conceptually. (5 steps)", "answer": "- Step 1: Apply the substitution formulas: $$x^2 y'' = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$ and $$xy' = \\frac{dy}{du}$$.\n- Step 2: Transformed equation: $$\\left(\\frac{d^2y}{du^2} - \\frac{dy}{du}\\right) + 6\\frac{dy}{du} + 4y = 0 \\Rightarrow \\frac{d^2y}{du^2} + 5\\frac{dy}{du} + 4y = 0$$.\n- Step 3: Solve the constant-coefficient equation: auxiliary $$m^2 + 5m + 4 = (m+1)(m+4) = 0$$, so $$m = -1, -4$$.\n- Step 4: General solution in $$u$$: $$y = Ae^{-u} + Be^{-4u}$$.\n- Step 5: Convert back using $$u = \\ln x$$: $$y = Ae^{-\\ln x} + Be^{-4\\ln x} = Ax^{-1} + Bx^{-4}$$ ‚ÄĒ a sum of power functions of $$x$$.\n\nEuler-type equations always give power-function solutions in $$x$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_48", "judge_pick": false}, {"question": "A common approach claim: \"If the trial P.I. is in the C.F., just multiply by $$x$$.\" But for the DE $$y'' - 2y' + y = e^x$$, this na√Įve application fails. Explain what happens and how to handle it properly. (4 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 - 2m + 1 = (m-1)^2 = 0$$ has repeated root $$m = 1$$, so C.F. is $$(A + Bx)e^x$$.\n- Step 2: Standard trial $$\\lambda e^x$$ is in the C.F. The na√Įve fix: multiply by $$x$$ to get $$\\lambda xe^x$$.\n- Step 3: But $$xe^x$$ is **also** in the C.F.! (Because of the repeated root, both $$e^x$$ and $$xe^x$$ are homogeneous solutions.) The na√Įve trial is still killed by the operator.\n- Step 4: Proper fix: multiply by $$x^2$$ to get $$\\lambda x^2 e^x$$. This is genuinely outside the C.F. Substituting and computing yields a valid $$\\lambda$$.\n\n**General principle**: For each multiplicity of the offending root in the auxiliary, multiply by an extra factor of $$x$$. Simple root ‚Üí multiply by $$x$$; double root ‚Üí multiply by $$x^2$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_49", "judge_pick": true}, {"question": "What conceptual role does each piece of the particular solution play in a driven, damped physical system like $$ay'' + by' + cy = f(t)$$? (3 steps)", "answer": "- Step 1: The **complementary function** is the **transient response**: the \"natural\" behaviour of the system if left alone (no forcing). With positive damping ($$b>0$$), it decays to zero as $$t \\to \\infty$$.\n- Step 2: The **particular integral** is the **steady-state response**: the long-term behaviour driven by the forcing $$f(t)$$. If $$f(t)$$ is sinusoidal, the steady-state is sinusoidal (possibly phase-shifted).\n- Step 3: The two arbitrary constants in the C.F. are chosen to satisfy initial conditions ‚ÄĒ they adjust the transient so that at $$t=0$$ everything matches up. After the transient dies out, only the steady-state remains.\n\nThis is why engineers often focus on the P.I. for long-term behaviour and on the full solution for the startup period.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_50", "judge_pick": true}, {"question": "Given the DE $$\\frac{d^2y}{dt^2} + 4\\frac{dy}{dt} + 3y = kt + 5$$ (with $$k$$ constant), and noting that for large $$t$$ the solution approaches a linear function, what is that linear asymptote when $$k = 6$$? (4 steps)", "answer": "- Step 1: **C.F.**: $$m^2 + 4m + 3 = (m+1)(m+3) = 0$$, roots $$m = -1, -3$$. So $$y_{CF} = Ae^{-t} + Be^{-3t}$$, which decays to 0 as $$t \\to \\infty$$.\n- Step 2: **P.I.** for polynomial RHS of degree 1: try $$y_{PI} = \\lambda + \\mu t$$. Substitute: $$0 + 4\\mu + 3(\\lambda + \\mu t) = kt + 5$$, giving $$3\\mu = k$$ and $$4\\mu + 3\\lambda = 5$$.\n- Step 3: With $$k = 6$$: $$\\mu = 2$$ and $$3\\lambda = 5 - 8 = -3$$, so $$\\lambda = -1$$. Thus $$y_{PI} = -1 + 2t$$.\n- Step 4: For large $$t$$, the C.F. has decayed away, so $$y \\approx y_{PI} = 2t - 1$$. This is the linear asymptote.\n\nThe transient fades; the steady-state polynomial response (which must match the polynomial RHS) dominates.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_51", "judge_pick": true}, {"question": "For the equation $$\\frac{d^2x}{dt^2} + 8\\frac{dx}{dt} + 16x = \\cos 4t$$, describe the long-term ($$t \\to \\infty$$) behaviour conceptually. (4 steps)", "answer": "- Step 1: **C.F.**: $$m^2 + 8m + 16 = (m+4)^2 = 0$$, repeated root $$m = -4$$. So $$y_{CF} = (A + Bt)e^{-4t}$$ ‚ÄĒ decays to 0 as $$t \\to \\infty$$ (critically damped).\n- Step 2: **P.I.**: Try $$\\lambda\\cos 4t + \\mu\\sin 4t$$ (neither in C.F., so no modification). Substituting and solving gives specific values for $$\\lambda, \\mu$$ ‚ÄĒ the result is an oscillation at frequency 4 with constant amplitude.\n- Step 3: General solution: transient $$(A + Bt)e^{-4t}$$ + steady-state oscillation.\n- Step 4: **Long-term behaviour**: the transient dies out (no matter what the initial conditions), and the solution settles into pure oscillation at the forcing frequency 4. The system \"forgets\" its initial conditions.\n\nThis is characteristic of damped, stably-driven systems in engineering: after enough time, behaviour is entirely determined by the driving force, not the starting state.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_52", "judge_pick": false}, {"question": "For the equation $$\\frac{d^2x}{dt^2} + 5\\frac{dx}{dt} + 6x = 2e^{-t}$$ with $$x(0) = 0$$ and $$x'(0) = 2$$, conceptually explain what the solution looks like and why it eventually reaches a maximum. (5 steps)", "answer": "- Step 1: **C.F.**: $$m^2 + 5m + 6 = (m+2)(m+3) = 0$$, roots $$-2, -3$$. $$y_{CF} = Ae^{-2t} + Be^{-3t}$$.\n- Step 2: **P.I.**: Try $$\\lambda e^{-t}$$ (note: $$-1$$ is NOT a root, so no modification). Substituting: $$\\lambda(1 - 5 + 6)e^{-t} = 2e^{-t}$$, so $$\\lambda = 1$$. P.I. is $$e^{-t}$$.\n- Step 3: General solution: $$x = Ae^{-2t} + Be^{-3t} + e^{-t}$$. All three components decay, but at different rates.\n- Step 4: Apply BCs to find $$A, B$$. The specific numerical values matter less than this: we have a sum of decaying exponentials with different rates. Depending on signs of $$A, B$$, the solution may first rise (because $$e^{-t}$$ decays slowest and dominates early) before eventually decaying to zero.\n- Step 5: A maximum occurs where $$dx/dt = 0$$, which exists when the growing contribution (from starting at $$x=0$$ with positive velocity) is balanced by eventual decay. The maximum is finite and occurs at a specific $$t$$.\n\nEverything decays in the long run, but not monotonically ‚ÄĒ the interplay between different decay rates creates the \"bump\".", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_53", "judge_pick": false}, {"question": "Explain carefully why the DE $$\\frac{d^2y}{dx^2} + 9y = \\sin 3x$$ represents a **resonance** situation, and what form the particular integral must take. (4 steps)", "answer": "- Step 1: Natural frequency from C.F.: $$m^2 + 9 = 0$$ gives $$m = \\pm 3i$$. C.F. is $$A\\cos 3x + B\\sin 3x$$ ‚ÄĒ natural frequency 3.\n- Step 2: Forcing function $$\\sin 3x$$ has frequency 3, **matching** the natural frequency. Both $$\\cos 3x$$ and $$\\sin 3x$$ are in the C.F.\n- Step 3: Standard trial $$\\lambda\\cos 3x + \\mu\\sin 3x$$ would be annihilated by the operator (it's entirely in C.F.). So multiply by $$x$$: try $$y_{PI} = x(\\lambda\\cos 3x + \\mu\\sin 3x)$$.\n- Step 4: After substitution, find the constants. The resulting P.I. has amplitude growing linearly with $$x$$ ‚ÄĒ this is the hallmark of **resonance**: energy accumulates in the oscillator at its natural frequency, and the amplitude grows without bound (in this undamped model).\n\nIn reality, physical systems have damping, which bounds the resonant response.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_54", "judge_pick": false}, {"question": "For the DE $$\\frac{d^2y}{dx^2} - 4\\frac{dy}{dx} + 4y = 4e^{2x}$$, why can neither $$\\lambda e^{2x}$$ nor $$\\lambda xe^{2x}$$ serve as a particular integral? What's the correct trial, and what's the physical/mathematical intuition? (4 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 - 4m + 4 = (m-2)^2 = 0$$ has **repeated root** $$m = 2$$. C.F. is $$(A + Bx)e^{2x}$$.\n- Step 2: Both $$e^{2x}$$ AND $$xe^{2x}$$ are in the C.F. ‚ÄĒ both are killed by the differential operator. Neither can produce a non-zero RHS.\n- Step 3: Correct trial: $$\\lambda x^2 e^{2x}$$. This function is NOT in the C.F. and applying the operator leaves something non-zero proportional to $$e^{2x}$$. Determine $$\\lambda$$ by substitution.\n- Step 4: **Deep intuition**: the null space of the operator $$(D-2)^2$$ is spanned by $$e^{2x}$$ and $$xe^{2x}$$. To escape the null space, we need a function outside this 2-dimensional subspace ‚ÄĒ $$x^2 e^{2x}$$ qualifies.\n\n**General pattern**: multiplicity of the offending root = extra factors of $$x$$ needed in the trial.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_55", "judge_pick": true}, {"question": "Compare the natural qualitative behaviours of solutions to these three DEs: $$(a)\\ y'' + y = 0$$, $$(b)\\ y'' + y' + y = 0$$, $$(c)\\ y'' - y = 0$$. (3 cases)", "answer": "- Step 1: **(a) $$y'' + y = 0$$**: Auxiliary $$m^2 + 1 = 0$$ gives $$m = \\pm i$$. Pure imaginary roots ‚Üí undamped oscillation $$y = A\\cos x + B\\sin x$$. No decay, no growth ‚ÄĒ perfect SHM.\n- Step 2: **(b) $$y'' + y' + y = 0$$**: Auxiliary $$m^2 + m + 1 = 0$$, discriminant $$1 - 4 = -3 < 0$$, roots $$-\\tfrac{1}{2} \\pm \\tfrac{\\sqrt{3}}{2}i$$. Negative real part ‚Üí **damped oscillation**: amplitude decays exponentially while oscillating.\n- Step 3: **(c) $$y'' - y = 0$$**: Auxiliary $$m^2 - 1 = 0$$ gives $$m = \\pm 1$$. Real distinct roots (one positive!). Solution $$y = Ae^x + Be^{-x}$$ ‚ÄĒ generally grows exponentially (unless $$A = 0$$, a special \"pure decay\" case).\n\nThe three DEs illustrate pure oscillation, stable decay with oscillation, and exponential instability. The sign/nature of auxiliary roots entirely determines long-term behaviour.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_56", "judge_pick": true}, {"question": "Why is the complementary function's role analogous to a \"homogeneous coordinate system\" that helps express the full solution of a non-homogeneous equation? (3 steps)", "answer": "- Step 1: The C.F. is a 2-dimensional vector space (spanned by two linearly independent solutions). Every element $$y_c$$ in this space satisfies the homogeneous equation.\n- Step 2: The set of all solutions to the non-homogeneous equation is an **affine translate** of this vector space ‚ÄĒ like a plane that doesn't pass through the origin. Pick any point on it ($$y_p$$, the P.I.), and you can reach every other point by adding something from the C.F.\n- Step 3: The P.I. provides a fixed \"reference point\" in the solution set; the C.F. provides all the \"directions\" you can move from there. Together they parametrise the full affine solution set.\n\nBoundary conditions then pick out the specific point in the affine set that satisfies your constraints.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_57", "judge_pick": true}, {"question": "What is the **resonance amplification** phenomenon in the context of non-homogeneous second-order DEs, and how does it arise from the mathematics? (3 steps)", "answer": "- Step 1: When the forcing frequency equals the natural frequency (undamped case), the standard trig trial $$\\lambda\\cos\\omega x + \\mu\\sin\\omega x$$ is in the C.F. and is annihilated by the operator.\n- Step 2: The modified trial $$x(\\lambda\\cos\\omega x + \\mu\\sin\\omega x)$$ has amplitude $$\\propto x$$ ‚ÄĒ it grows linearly in time. This represents energy accumulating in the oscillator.\n- Step 3: In a real damped system ($$b > 0$$), complete resonance doesn't occur (the natural frequency has nonzero real part in the complex roots), but near-resonance produces a large finite amplitude steady-state ‚ÄĒ the amplification is limited by damping.\n\n**Engineering takeaway**: avoid driving systems at their natural frequency; destructive resonance is the reason bridges have collapsed and buildings shake in earthquakes.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_58", "judge_pick": true}, {"question": "In the context of substitutions to reduce DE order or transform to constant coefficients, what makes a \"good\" substitution, and how do you recognise when one will help? (3 steps)", "answer": "- Step 1: A good substitution exploits **hidden structure** in the equation ‚ÄĒ scaling symmetry (Cauchy‚ÄďEuler), trigonometric relationships (DEs with $$\\sin, \\cos$$ coefficients), or absence of a variable (for $$u = y'$$ order reduction).\n- Step 2: Recognise it when:\n+ Coefficients are powers of $$x$$ matching derivative orders ‚Üí try $$x = e^u$$.\n+ The DE contains $$\\sin, \\cos$$ coefficients ‚Üí try $$z = \\sin x$$ (or $$\\cos x$$).\n+ The DE has no $$y$$ term (only $$y'$$ and $$y''$$) ‚Üí try $$u = y'$$.\n+ A given power factor $$y = z/x^k$$ suggests the problem has a specific scaling.\n- Step 3: The substitution succeeds when after substitution, the equation becomes one with constant coefficients (or lower order) ‚ÄĒ a form you know how to solve.\n\nIn exams, the substitution is usually provided; your job is the algebra.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_59", "judge_pick": true}, {"question": "For the DE $$\\frac{d^2y}{dx^2} + 2y\\frac{dy}{dx} = \\ldots$$ ‚ÄĒ wait, what's the fundamental difference between this non-linear DE and a linear one like $$y'' + 2y' + y = 0$$, and why can't we apply auxiliary equation techniques to the non-linear one? (3 steps)", "answer": "- Step 1: A **linear** DE has each term involving $$y$$ or its derivatives to the first power only: $$y$$, $$y'$$, $$y''$$ ‚ÄĒ but never products like $$yy'$$ or $$(y')^2$$ or $$y^2$$.\n- Step 2: The auxiliary-equation method relies on the fact that $$e^{\\lambda x}$$ scales all its derivatives by powers of $$\\lambda$$, and linearity allows us to factor out the $$e^{\\lambda x}$$ and get a polynomial in $$\\lambda$$.\n- Step 3: For non-linear DEs, this factoring fails ‚ÄĒ a product like $$yy'$$ involves $$e^{\\lambda x} \\cdot \\lambda e^{\\lambda x} = \\lambda e^{2\\lambda x}$$, which doesn't combine algebraically with $$e^{\\lambda x}$$ terms. No auxiliary equation exists; different techniques (substitutions, series, numerical methods) are needed.\n\nThe auxiliary-equation technique is a powerful tool *specifically* for linear constant-coefficient equations.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_60", "judge_pick": true}, {"question": "Given $$\\frac{d^2y}{dx^2} - 3\\frac{dy}{dx} + 2y = 3e^{2x}$$ with $$y(0) = 0$$ and $$y'(0) = 0$$, conceptually walk through finding the particular solution. (5 steps)", "answer": "- Step 1: **C.F.**: $$m^2 - 3m + 2 = (m-1)(m-2) = 0$$, so $$y_{CF} = Ae^x + Be^{2x}$$.\n- Step 2: **P.I.**: Forcing $$3e^{2x}$$ would normally suggest $$\\lambda e^{2x}$$, but $$e^{2x}$$ is in the C.F.! Multiply by $$x$$: try $$\\lambda xe^{2x}$$. Substitute and equate: $$\\lambda = 3$$. So $$y_{PI} = 3xe^{2x}$$.\n- Step 3: **General solution**: $$y = Ae^x + Be^{2x} + 3xe^{2x}$$.\n- Step 4: Apply $$y(0) = 0$$: $$A + B = 0$$. Differentiate: $$y' = Ae^x + 2Be^{2x} + 3e^{2x} + 6xe^{2x}$$. Apply $$y'(0) = 0$$: $$A + 2B + 3 = 0$$.\n- Step 5: Solve: $$A = 3$$, $$B = -3$$. Particular solution: $$y = 3e^x - 3e^{2x} + 3xe^{2x}$$. For large $$x$$, the $$3xe^{2x}$$ term dominates (both because of the linear factor and the faster exponential).\n\nWithout resonance-style modification, this problem wouldn't have a finite-amplitude P.I.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_61", "judge_pick": false}, {"question": "For the equation $$25\\frac{d^2x}{dt^2} + 36x = 18$$ with $$x(0) = 1$$ and $$x'(0) = 0.6$$, conceptually describe the solution's form. (4 steps)", "answer": "- Step 1: Divide by 25 to standardise: $$x'' + \\tfrac{36}{25}x = \\tfrac{18}{25}$$. Auxiliary $$m^2 + \\tfrac{36}{25} = 0$$ gives $$m = \\pm \\tfrac{6}{5}i$$. C.F.: $$A\\cos\\tfrac{6t}{5} + B\\sin\\tfrac{6t}{5}$$.\n- Step 2: P.I. for constant RHS: try $$\\lambda$$. Substitute: $$\\tfrac{36}{25}\\lambda = \\tfrac{18}{25}$$, so $$\\lambda = \\tfrac{1}{2}$$. P.I. $$= \\tfrac{1}{2}$$.\n- Step 3: General solution: $$x = A\\cos\\tfrac{6t}{5} + B\\sin\\tfrac{6t}{5} + \\tfrac{1}{2}$$. Apply BCs to get specific $$A, B$$.\n- Step 4: Qualitatively: the system oscillates with angular frequency $$\\tfrac{6}{5}$$ around an **equilibrium position** of $$x = \\tfrac{1}{2}$$ (not 0). The constant forcing term shifts the center of oscillation.\n\n**Interpretation**: it's SHM about a displaced equilibrium ‚ÄĒ like a spring with gravity pulling a mass; the mass oscillates about the stretched equilibrium, not the natural length.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_62", "judge_pick": false}, {"question": "For $$4\\frac{d^2y}{dx^2} + 4\\frac{dy}{dx} + 5y = \\sin x + 4\\cos x$$ with $$y(0) = 0, y'(0) = 0$$, conceptually explain the structure of the solution. (4 steps)", "answer": "- Step 1: **C.F.**: Auxiliary $$4m^2 + 4m + 5 = 0$$, discriminant $$16 - 80 = -64 < 0$$, roots $$-\\tfrac{1}{2} \\pm i$$. So $$y_{CF} = e^{-x/2}(A\\cos x + B\\sin x)$$ ‚ÄĒ damped oscillation at angular frequency 1.\n- Step 2: **P.I.**: Forcing at frequency 1, matching the imaginary part of the roots but NOT the full complex roots (because of damping). The C.F. doesn't contain pure $$\\sin x, \\cos x$$ ‚ÄĒ it contains $$e^{-x/2}\\sin x, e^{-x/2}\\cos x$$. No modification needed. Try $$\\lambda\\cos x + \\mu\\sin x$$.\n- Step 3: Substitute and solve for $$\\lambda, \\mu$$. Result: a steady-state sinusoid at frequency 1, with phase shift relative to the forcing.\n- Step 4: Full solution: transient decaying oscillation (from C.F.) + steady-state sinusoid (from P.I.). As $$t \\to \\infty$$, only the steady-state survives. BCs adjust $$A, B$$ so the initial conditions are met.\n\nThis is the classic driven damped oscillator: transient plus permanent response at forcing frequency.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_63", "judge_pick": false}, {"question": "In solving $$\\frac{d^2y}{dx^2} - 4\\frac{dy}{dx} + 4y = 4e^{2x}$$ with the P.I. trial $$\\lambda x^2 e^{2x}$$, what is the key reason that the P.I. must be $$\\propto x^2 e^{2x}$$ specifically, not $$x^2$$ or $$x^2 e^x$$ or anything else? (3 steps)", "answer": "- Step 1: The P.I. trial form must match the **functional shape of the RHS**, $$e^{2x}$$, so that after applying the linear operator, we produce something of that same shape to match the RHS.\n- Step 2: Polynomial factors ($$x^2$$) are added because of the C.F. conflict ‚ÄĒ $$e^{2x}$$ and $$xe^{2x}$$ are already in C.F. (from the repeated root $$m=2$$).\n- Step 3: Any other functional factor (like $$x^2 e^x$$) would not, under the operator $$L$$, produce $$e^{2x}$$ on the RHS ‚ÄĒ it would produce $$e^x$$ or something else entirely, mismatching the required forcing.\n\n**General rule**: the trial P.I. combines the RHS's functional shape ($$e^{2x}$$) with the minimum polynomial factor needed to escape the C.F.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_64", "judge_pick": true}, {"question": "Given the general solution $$y = Ae^{3x} + Be^{2x} + \\tfrac{1}{2}e^x$$ to a second-order DE, state the complementary function and particular integral and verify by conceptual consistency. (3 steps)", "answer": "- Step 1: The **complementary function** consists of the terms with arbitrary constants: $$y_{CF} = Ae^{3x} + Be^{2x}$$. These come from the auxiliary equation $$(m-3)(m-2) = 0$$.\n- Step 2: The **particular integral** is the remaining term with fixed coefficient: $$y_{PI} = \\tfrac{1}{2}e^x$$. This is a specific (no arbitrary constant) solution of the non-homogeneous equation.\n- Step 3: **Consistency check**: the P.I. must be a function that, when substituted into the DE, produces a constant multiple of $$e^x$$ (matching the RHS). Since $$e^x$$ is NOT in the C.F. (roots are 2, 3), the trial $$\\lambda e^x$$ was appropriate ‚ÄĒ no modification needed. So the structure $$y_{CF} + y_{PI}$$ is consistent with standard non-homogeneous solution procedure.\n\nThe C.F. provides flexibility (2 constants); the P.I. handles the forcing term.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_65", "judge_pick": false}, {"question": "Explain the qualitative difference between the solutions of $$y'' + y = \\cos 2x$$ (non-resonant) and $$y'' + y = \\cos x$$ (resonant), even though the equations look very similar. (4 steps)", "answer": "- Step 1: Both equations have the same C.F.: $$A\\cos x + B\\sin x$$ (natural frequency 1).\n- Step 2: **Non-resonant ($$\\cos 2x$$)**: forcing frequency 2 differs from natural frequency 1. Standard trial $$\\lambda\\cos 2x + \\mu\\sin 2x$$ is NOT in C.F. P.I. has **bounded** amplitude. Solution is two superimposed oscillations at frequencies 1 and 2 ‚ÄĒ a complex but bounded pattern.\n- Step 3: **Resonant ($$\\cos x$$)**: forcing frequency 1 matches natural frequency 1. The standard trial IS in the C.F. Must use $$x(\\lambda\\cos x + \\mu\\sin x)$$ instead. P.I. has amplitude growing **linearly with $$x$$**.\n- Step 4: **Long-term**: non-resonant stays bounded (solutions move in a finite region); resonant grows unboundedly. The forcing at the natural frequency pumps energy into the system perfectly, cycle after cycle.\n\nA tiny change in forcing frequency leads to a fundamentally different solution behaviour ‚ÄĒ this is the mathematical origin of resonance.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_66", "judge_pick": true}, {"question": "In $$16\\frac{d^2y}{dx^2} + 8\\frac{dy}{dx} + 5y = 5x + 23$$, show conceptually why for large $$x$$, $$y \\approx x + 3$$. (4 steps)", "answer": "- Step 1: **C.F.**: $$16m^2 + 8m + 5 = 0$$, discriminant $$64 - 320 = -256$$, complex roots with real part $$-8/(2\\cdot 16) = -\\tfrac{1}{4}$$. So $$y_{CF} = e^{-x/4}(A\\cos\\omega x + B\\sin\\omega x)$$ for some $$\\omega$$. **This decays** as $$x \\to \\infty$$.\n- Step 2: **P.I.** for polynomial RHS of degree 1: try $$y_{PI} = \\lambda + \\mu x$$. Substitute: $$16\\cdot 0 + 8\\mu + 5(\\lambda + \\mu x) = 5x + 23$$. Match $$x$$: $$5\\mu = 5 \\Rightarrow \\mu = 1$$. Match constants: $$8 + 5\\lambda = 23 \\Rightarrow \\lambda = 3$$.\n- Step 3: So $$y_{PI} = x + 3$$. General solution: $$y = e^{-x/4}(A\\cos\\omega x + B\\sin\\omega x) + x + 3$$.\n- Step 4: For large $$x$$, the transient $$e^{-x/4}(\\ldots) \\to 0$$, leaving just $$y \\approx x + 3$$. The system's transient response dies out; what remains is the \"driven\" linear response.\n\nThe forcing is linear, so the long-term behaviour must also be linear ‚ÄĒ the equilibrium is a line, not a point.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_67", "judge_pick": false}, {"question": "What is the conceptual reason that a linear combination of ANY two linearly independent solutions to a homogeneous 2nd-order linear DE gives the *general* solution? (3 steps)", "answer": "- Step 1: Solutions of $$Ly = 0$$ form a **vector space**: closed under addition and scalar multiplication. The dimension of this vector space equals the order of the DE ‚ÄĒ for 2nd-order, dimension 2.\n- Step 2: Any basis of a 2D vector space consists of 2 linearly independent vectors (functions, here). Every vector (solution) in the space can be written as a unique linear combination of the basis.\n- Step 3: So if we find two linearly independent solutions $$f_1(x), f_2(x)$$, then $$y = Af_1(x) + Bg_1(x)$$ ‚ÄĒ with $$A, B$$ arbitrary ‚ÄĒ parametrises the entire solution space. Every solution is captured.\n\n**Linear independence check**: $$f_1, f_2$$ are linearly independent iff one is not a constant multiple of the other (equivalently, iff the Wronskian $$W = f_1 g_1' - f_1' g_1 \\neq 0$$).", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_68", "judge_pick": true}, {"question": "Why do we often see differential equations written $$y'' + y = 0$$ in textbooks rather than using the full Leibniz notation $$\\frac{d^2y}{dx^2} + y = 0$$? What does each notation emphasise? (3 steps)", "answer": "- Step 1: Leibniz notation $$\\frac{d^2y}{dx^2}$$ explicitly shows the **independent variable** $$x$$ with respect to which differentiation occurs. This is crucial when multiple variables are present (partial derivatives, substitutions).\n- Step 2: Prime notation $$y''$$ is more **compact** and emphasises the structural form of the equation ‚ÄĒ the algebraic relationship between $$y$$, $$y'$$, $$y''$$. It's preferred when the independent variable is unambiguous.\n- Step 3: Both convey the same mathematical meaning. Use Leibniz when clarity about variables matters (especially in substitution problems); use primes when compactness is preferred.\n\nExam answers should be consistent ‚ÄĒ whichever notation you start with, stick with it throughout.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_69", "judge_pick": true}, {"question": "For the DE $$\\frac{d^2y}{dx^2} - 3\\frac{dy}{dx} + 2y = 4x + e^{2x}$$, suppose a particular integral has the form $$y_{PI} = \\lambda + \\mu x + kxe^{2x}$$. Explain why this combined form arises. (4 steps)", "answer": "- Step 1: The RHS is a sum of two types: a polynomial $$4x$$ and an exponential $$e^{2x}$$. By linearity, find P.I. for each separately and add them.\n- Step 2: **For $$4x$$**: standard polynomial trial is $$\\lambda + \\mu x$$. Check: the C.F. (from $$m^2 - 3m + 2 = 0$$, roots 1, 2) doesn't contain constants or $$x$$ (since 0 isn't a root), so no modification needed.\n- Step 3: **For $$e^{2x}$$**: standard exponential trial is $$\\nu e^{2x}$$. But $$e^{2x}$$ IS in the C.F. (root $$m=2$$). Multiply by $$x$$: try $$kxe^{2x}$$.\n- Step 4: Combine: $$y_{PI} = \\lambda + \\mu x + kxe^{2x}$$. Determine $$\\lambda, \\mu, k$$ by substitution and matching coefficients of each function type (constants, $$x$$, $$e^{2x}$$).\n\n**Principle of superposition for P.I.**: for summed forcing, take the sum of the individual P.I.s.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_70", "judge_pick": true}, {"question": "In the DE $$\\frac{d^2y}{dx^2} + y = 5xe^{2x}$$, explain conceptually what form of P.I. to try. The forcing involves a product ‚ÄĒ does this require modification? (3 steps)", "answer": "- Step 1: The forcing is $$5xe^{2x}$$ ‚ÄĒ a product of a polynomial and an exponential. Standard trial is a general polynomial-times-exponential of the same \"shape\": $$y_{PI} = (\\lambda + \\mu x)e^{2x}$$, where both constant and linear terms are included because differentiating $$xe^{2x}$$ produces both $$e^{2x}$$ and $$xe^{2x}$$ terms.\n- Step 2: Check the C.F.: auxiliary $$m^2 + 1 = 0$$, roots $$\\pm i$$. C.F. is $$A\\cos x + B\\sin x$$. The exponential $$e^{2x}$$ and $$xe^{2x}$$ are NOT in the C.F. ‚ÄĒ no modification needed.\n- Step 3: So try $$(\\lambda + \\mu x)e^{2x}$$, substitute, equate coefficients of $$e^{2x}$$ and $$xe^{2x}$$ separately, and solve the resulting 2x2 system for $$\\lambda, \\mu$$.\n\n**Pattern**: for products $$P(x)e^{kx}$$, use a general polynomial of the same degree times $$e^{kx}$$, with each coefficient allowed to be free.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_71", "judge_pick": true}, {"question": "Why does a second-order DE with constant coefficients and polynomial forcing have a polynomial P.I. of the *same degree* (unless modification is needed)? (3 steps)", "answer": "- Step 1: The linear differential operator $$L = aD^2 + bD + c$$ maps polynomials to polynomials. Specifically, $$L$$ applied to a polynomial of degree $$n$$ produces a polynomial of degree at most $$n$$.\n- Step 2: For the DE $$L[y] = P(x)$$ where $$P$$ has degree $$n$$, we need $$L[y_{PI}]$$ to have degree exactly $$n$$. Since $$L$$ doesn't increase degree, $$y_{PI}$$ must have degree at least $$n$$. The leading coefficient of $$L[y_{PI}]$$ comes from the $$c$$-times-leading-term of $$y_{PI}$$ (assuming $$c \\neq 0$$), which matches the leading term of $$P(x)$$.\n- Step 3: **Exception**: if $$c = 0$$ (root $$m=0$$ in auxiliary), then the $$c\\cdot y$$ term vanishes, and degree decreases by 1 upon applying $$L$$. So $$y_{PI}$$ needs to be degree $$n+1$$ ‚ÄĒ equivalent to multiplying the standard trial by $$x$$.\n\nThis is the polynomial analogue of the general \"modify when trial is in C.F.\" rule.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_72", "judge_pick": true}, {"question": "For the substitution $$y = z/x^2$$ in a DE, what structural change to the equation should we expect, and why might someone use this particular substitution? (3 steps)", "answer": "- Step 1: The substitution $$y = z/x^2$$ implies $$z = x^2 y$$, so the equation relating $$z$$ and $$x$$ is obtained by expressing $$y, y', y''$$ in terms of $$z, z', z''$$ using the product rule.\n- Step 2: **Why use it?** When the original DE has variable coefficients involving powers of $$x$$ that suggest $$y$$ itself scales like $$1/x^2$$, this substitution can \"absorb\" the problematic coefficients, producing a simpler equation in $$z$$.\n- Step 3: Typically the transformed equation in $$z$$ has cleaner coefficients ‚ÄĒ often constant ‚ÄĒ enabling standard techniques. The exam will tell you what substitution to use; your job is the algebra.\n\nMore broadly, substitutions $$y = z/x^k$$ or $$y = z \\cdot \\phi(x)$$ aim to **factor out** the \"asymptotic behaviour\" of $$y$$, leaving the residual dynamics in $$z$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_73", "judge_pick": true}, {"question": "Summarise the entire solution strategy for a general second-order linear DE $$ay'' + by' + cy = f(x)$$ with boundary conditions, as a step-by-step algorithm. (6 steps)", "answer": "- Step 1: **Identify the type**: Is it homogeneous ($$f=0$$) or non-homogeneous? Constant coefficients or variable? If variable, is there a substitution that reduces it to constant coefficients?\n- Step 2: **Form the auxiliary equation** from the homogeneous part: $$am^2 + bm + c = 0$$. Solve for $$m$$. Identify which of the three cases (distinct real, repeated real, complex conjugate) applies.\n- Step 3: **Write the C.F.** using the appropriate form for the case:\n+ Distinct real $$\\alpha, \\beta$$: $$Ae^{\\alpha x} + Be^{\\beta x}$$.\n+ Repeated $$\\alpha$$: $$(A + Bx)e^{\\alpha x}$$.\n+ Complex $$p \\pm qi$$: $$e^{px}(A\\cos qx + B\\sin qx)$$.\n- Step 4: **Choose a P.I. trial** matching the form of $$f(x)$$. Modify (multiply by $$x$$ or $$x^2$$) if any term is in the C.F. Substitute into the DE and solve for coefficients.\n- Step 5: **Write the general solution**: $$y = y_{CF} + y_{PI}$$.\n- Step 6: **Apply boundary conditions** to fix $$A, B$$. Differentiate the general solution first if a derivative condition is given. Solve the resulting 2x2 system.\n\n**Sanity check**: verify by substitution that the final particular solution satisfies both the DE and the boundary conditions.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_74", "judge_pick": false}], "count": 75}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 19500, "out_tokens": 10430, "reasoning_chars": 12720, "cost_eur": 0.0524, "elapsed_s": 356, "content_chars": 21269}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 19500, "out_tokens": 14351, "reasoning_chars": 21178, "cost_eur": 0.065, "elapsed_s": 279, "content_chars": 24723}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 17303, "out_tokens": 12929, "reasoning_chars": 1789, "cost_eur": 0.0163, "elapsed_s": 105, "content_chars": 36519}, "opus_1": {"run": 1, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 29472, "out_tokens": 104099, "reasoning_chars": 0, "cost_eur": 7.5895, "elapsed_s": 1217, "content_chars": 101209}, "opus_2": {"run": 2, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 29472, "out_tokens": 45079, "reasoning_chars": 0, "cost_eur": 3.5172, "elapsed_s": 544, "content_chars": 80119}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 19635, "out_tokens": 3173, "reasoning_chars": 5428, "cost_eur": 0.0071, "elapsed_s": 68, "content_chars": 6783}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 19635, "out_tokens": 4490, "reasoning_chars": 7007, "cost_eur": 0.0086, "elapsed_s": 120, "content_chars": 9425}}};
const SK='fp2_ch6';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">‚ÄĘ ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">‚ÄĘ ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'‚ÄĒ'}
function fC(n){return n!=null?'‚ā¨'+n.toFixed(4):'‚ÄĒ'}
function fT(s){if(!s)return'‚ÄĒ';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">ūüďĆ My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">‚ú® Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'‚ÄĒ'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'‚ÄĒ'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'‚ÄĒ'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">ūüďč</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('ūüďč '+myCards.length+' cards copied ‚ÄĒ paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('‚ÄĒ')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error ‚Üí clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
