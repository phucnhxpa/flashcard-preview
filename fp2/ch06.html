<script>
const DATA={"selected": [{"question": "Explain why the differential equation $$\\frac{d^2y}{dx^2} + y = 0$$ has periodic solutions while $$\\frac{d^2y}{dx^2} - y = 0$$ does not, even though they differ only in the sign of one term. (2 steps)", "answer": "- Step 1: For $$y'' + y = 0$$, the auxiliary equation is $$m^2 + 1 = 0$$, giving pure imaginary roots $$\\pm i$$. The solution is $$y = A\\cos x + B\\sin x$$ ‚ÄĒ periodic with period $$2\\pi$$\n- Step 2: For $$y'' - y = 0$$, the auxiliary equation is $$m^2 - 1 = 0$$, giving real roots $$\\pm 1$$. The solution is $$y = Ae^x + Be^{-x}$$ ‚ÄĒ exponential growth/decay, no periodicity. The sign change switches between oscillatory and non-oscillatory behavior.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_41"}, {"question": "Why is it possible to write the form of a Case-3 solution either as $$Ae^{\\alpha x} + Be^{\\beta x}$$ with complex $$\\alpha, \\beta$$, or equivalently as $$e^{px}(C\\cos qx + D\\sin qx)$$ with real $$C, D$$? Which is preferable in practice? (3 steps)", "answer": "- Step 1: The two forms are mathematically equivalent ‚ÄĒ both express the same two-dimensional solution space, just in different bases. The conversion uses Euler's formula $$e^{i\\theta} = \\cos\\theta + i\\sin\\theta$$.\n- Step 2: The complex-exponential form $$Ae^{\\alpha x} + Be^{\\beta x}$$ requires $$A, B$$ to be complex conjugates to make $$y$$ real, which is inconvenient.\n- Step 3: The trigonometric form $$e^{px}(C\\cos qx + D\\sin qx)$$ keeps both constants $$C, D$$ real and makes the physical behaviour transparent ‚ÄĒ you can directly read off amplitude growth/decay from $$p$$ and oscillation frequency from $$q$$.\n\n**Preference**: Always convert to the real trigonometric form for Case 3 answers.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_14"}, {"question": "When applying boundary conditions, should you substitute them into the Complementary Function, the Particular Integral, or the full General Solution? Why? (2 steps)", "answer": "- Step 1: You must substitute them into the full General Solution ($$y = \\text{C.F.} + \\text{P.I.}$$). \n- Step 2: The arbitrary constants $$A$$ and $$B$$ belong to the entire solution, not just the C.F. in isolation. The physical state (e.g., initial position) is the sum of the natural behavior and the forced behavior. Substituting into only the C.F. would ignore the contribution of the P.I. at the boundary point, leading to incorrect values for the constants.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_17"}, {"question": "Misconception probe: When solving $$y'' - 5y' + 6y = e^{2x}$$, the auxiliary equation roots are 2 and 3. Why does choosing a P.I. of the form $$y = \\lambda e^{2x}$$ inevitably fail? (2 steps)", "answer": "- Step 1: The term $$\\lambda e^{2x}$$ is already part of the Complementary Function (which is $$y = Ae^{2x} + Be^{3x}$$). \n- Step 2: Because $$Ae^{2x}$$ solves the homogeneous equation, substituting $$\\lambda e^{2x}$$ into the left-hand side of the ODE will yield exactly 0, not $$e^{2x}$$. It is a solution to the \"unforced\" system, so it cannot satisfy the \"forced\" equation. You will end up with the impossible statement $$0 = e^{2x}$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_12"}, {"question": "Why does a second-order differential equation need two arbitrary constants in its general solution, and what is the deeper reason behind this? (3 steps)", "answer": "- Step 1: Each time you integrate, you pick up one constant of integration. A second-order DE conceptually requires two integrations to recover $$y$$ from $$y''$$, so two constants accumulate.\n- Step 2: More fundamentally, the solution space of a homogeneous linear $$n$$-th order DE is an $$n$$-dimensional vector space. For $$n=2$$ we need 2 linearly independent solutions, and any general solution is a linear combination $$Af_1(x) + Bg_1(x)$$ ‚ÄĒ hence 2 free parameters.\n- Step 3: To pin down a unique particular solution we therefore need exactly 2 pieces of information, typically the value of $$y$$ and $$y'$$ at a single point (initial conditions), or the value of $$y$$ at two different points (boundary conditions).\n\nTakeaway: Dimension of solution space = order of the equation = number of arbitrary constants = number of conditions needed.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_1"}, {"question": "What structural features define a *second-order linear homogeneous* differential equation with constant coefficients, and what makes the word \"homogeneous\" earn its place in the name? (3 steps)", "answer": "- Step 1: The equation has the form $$a\\frac{d^2y}{dx^2} + b\\frac{dy}{dx} + cy = 0$$ where $$a, b, c$$ are real constants (not functions of $$x$$). \"Second-order\" refers to the highest derivative present being the second.\n- Step 2: It is \"linear\" because $$y$$, $$y'$$, and $$y''$$ appear only to the first power ‚ÄĒ no terms like $$y^2$$, $$(y')^3$$, or $$yy'$$. Each term is a constant times one of $$y$$, $$y'$$, $$y''$$.\n- Step 3: \"Homogeneous\" means the right-hand side is zero. This matters because it gives a crucial property: if $$y_1$$ and $$y_2$$ are solutions, then so is $$Ay_1 + By_2$$ (superposition). That's only true when RHS = 0.\n\nThe zero RHS is what enables the clean \"linear combination of two basic solutions\" structure of the general solution.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_0"}, {"question": "Misconception probe: If the auxiliary equation has a repeated real root $$\\alpha$$, why is $$y = Ae^{\\alpha x} + Be^{\\alpha x}$$ an incorrect way to write the general solution? How is this resolved? (3 steps)", "answer": "- Step 1: Writing $$y = Ae^{\\alpha x} + Be^{\\alpha x}$$ is flawed because the terms can be factorised into $$y = (A+B)e^{\\alpha x}$$. Letting $$C = A+B$$, this simplifies to $$y = Ce^{\\alpha x}$$.\n- Step 2: This effectively collapses the two arbitrary constants into one, which is insufficient for a second-order ODE. We have lost a degree of freedom because $$e^{\\alpha x}$$ alone does not provide two linearly independent solutions.\n- Step 3: To find a second independent solution, we multiply by $$x$$. The correct general solution is $$y = (A + Bx)e^{\\alpha x}$$. The term $$xe^{\\alpha x}$$ is linearly independent from $$e^{\\alpha x}$$, restoring the second arbitrary constant and satisfying the ODE.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_4"}, {"question": "For the DE $$\\frac{d^2y}{dx^2} - 3\\frac{dy}{dx} + 2y = 4x + e^{2x}$$, suppose a particular integral has the form $$y_{PI} = \\lambda + \\mu x + kxe^{2x}$$. Explain why this combined form arises. (4 steps)", "answer": "- Step 1: The RHS is a sum of two types: a polynomial $$4x$$ and an exponential $$e^{2x}$$. By linearity, find P.I. for each separately and add them.\n- Step 2: **For $$4x$$**: standard polynomial trial is $$\\lambda + \\mu x$$. Check: the C.F. (from $$m^2 - 3m + 2 = 0$$, roots 1, 2) doesn't contain constants or $$x$$ (since 0 isn't a root), so no modification needed.\n- Step 3: **For $$e^{2x}$$**: standard exponential trial is $$\\nu e^{2x}$$. But $$e^{2x}$$ IS in the C.F. (root $$m=2$$). Multiply by $$x$$: try $$kxe^{2x}$$.\n- Step 4: Combine: $$y_{PI} = \\lambda + \\mu x + kxe^{2x}$$. Determine $$\\lambda, \\mu, k$$ by substitution and matching coefficients of each function type (constants, $$x$$, $$e^{2x}$$).\n\n**Principle of superposition for P.I.**: for summed forcing, take the sum of the individual P.I.s.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_70"}, {"question": "Find the particular solution to $$\\frac{d^2y}{dx^2} + 9y = \\sin 3x$$ with $$y = 0$$ and $$y' = 0$$ at $$x = 0$$. Why does this exhibit \"resonance\"? (4 steps)", "answer": "- Step 1: C.F.: $$m^2 + 9 = 0$$ ‚Üí $$m = \\pm 3i$$, so C.F. = $$A\\cos 3x + B\\sin 3x$$\n- Step 2: P.I. try $$y = \\lambda x \\cos 3x + \\mu x \\sin 3x$$ (since $$\\sin 3x$$ is in C.F., multiply by $$x$$)\n- Step 3: Solving gives P.I. = $$-\\frac{x}{6}\\cos 3x$$. General: $$y = A\\cos 3x + B\\sin 3x - \\frac{x}{6}\\cos 3x$$\n- Step 4: Using conditions: $$A = 0$$, $$B = \\frac{1}{6}$$. Solution: $$y = \\frac{1}{6}\\sin 3x - \\frac{x}{6}\\cos 3x$$. The term $$-\\frac{x}{6}\\cos 3x$$ grows unbounded ‚ÄĒ this is resonance, where the forcing frequency equals the natural frequency, causing ever-increasing amplitude.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_38"}, {"question": "Why does a second-order DE with constant coefficients and polynomial forcing have a polynomial P.I. of the *same degree* (unless modification is needed)? (3 steps)", "answer": "- Step 1: The linear differential operator $$L = aD^2 + bD + c$$ maps polynomials to polynomials. Specifically, $$L$$ applied to a polynomial of degree $$n$$ produces a polynomial of degree at most $$n$$.\n- Step 2: For the DE $$L[y] = P(x)$$ where $$P$$ has degree $$n$$, we need $$L[y_{PI}]$$ to have degree exactly $$n$$. Since $$L$$ doesn't increase degree, $$y_{PI}$$ must have degree at least $$n$$. The leading coefficient of $$L[y_{PI}]$$ comes from the $$c$$-times-leading-term of $$y_{PI}$$ (assuming $$c \\neq 0$$), which matches the leading term of $$P(x)$$.\n- Step 3: **Exception**: if $$c = 0$$ (root $$m=0$$ in auxiliary), then the $$c\\cdot y$$ term vanishes, and degree decreases by 1 upon applying $$L$$. So $$y_{PI}$$ needs to be degree $$n+1$$ ‚ÄĒ equivalent to multiplying the standard trial by $$x$$.\n\nThis is the polynomial analogue of the general \"modify when trial is in C.F.\" rule.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_72"}, {"question": "Explain the qualitative difference between the solutions of $$y'' + y = \\cos 2x$$ (non-resonant) and $$y'' + y = \\cos x$$ (resonant), even though the equations look very similar. (4 steps)", "answer": "- Step 1: Both equations have the same C.F.: $$A\\cos x + B\\sin x$$ (natural frequency 1).\n- Step 2: **Non-resonant ($$\\cos 2x$$)**: forcing frequency 2 differs from natural frequency 1. Standard trial $$\\lambda\\cos 2x + \\mu\\sin 2x$$ is NOT in C.F. P.I. has **bounded** amplitude. Solution is two superimposed oscillations at frequencies 1 and 2 ‚ÄĒ a complex but bounded pattern.\n- Step 3: **Resonant ($$\\cos x$$)**: forcing frequency 1 matches natural frequency 1. The standard trial IS in the C.F. Must use $$x(\\lambda\\cos x + \\mu\\sin x)$$ instead. P.I. has amplitude growing **linearly with $$x$$**.\n- Step 4: **Long-term**: non-resonant stays bounded (solutions move in a finite region); resonant grows unboundedly. The forcing at the natural frequency pumps energy into the system perfectly, cycle after cycle.\n\nA tiny change in forcing frequency leads to a fundamentally different solution behaviour ‚ÄĒ this is the mathematical origin of resonance.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_66"}, {"question": "Edge case: Given the general solution $$y = Ae^{-x} + Be^{-2x} + 3$$, what is the value of $$y$$ as $$x \\to \\infty$$, and does this limit depend on the specific boundary conditions applied? (2 steps)", "answer": "- Step 1: As $$x \\to \\infty$$, the exponential terms $$e^{-x}$$ and $$e^{-2x}$$ approach zero. Therefore, the solution approaches $$y \\to 3$$.\n- Step 2: This limit does **not** depend on the boundary conditions. The boundary conditions only determine the values of the arbitrary constants $$A$$ and $$B$$, which scale the transient (decaying) terms. Since those terms vanish regardless of their initial magnitude, the steady-state limit of 3 is robust and independent of initial conditions.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_18"}, {"question": "What is the strategy when a substitution like $$z = \\sin x$$ is given to transform a DE ‚ÄĒ i.e., a substitution of the independent variable (not the dependent variable)? (3 steps)", "answer": "- Step 1: Here we're changing the \"input\" variable: the new independent variable is $$z = \\sin x$$. We treat $$y$$ as a function of $$z$$, and we need to express $$\\frac{dy}{dx}$$ and $$\\frac{d^2y}{dx^2}$$ in terms of $$\\frac{dy}{dz}$$ and $$\\frac{d^2y}{dz^2}$$.\n- Step 2: By the chain rule: $$\\frac{dy}{dx} = \\cos x \\cdot \\frac{dy}{dz}$$. For the second derivative: $$\\frac{d^2y}{dx^2} = -\\sin x \\cdot \\frac{dy}{dz} + \\cos^2 x \\cdot \\frac{d^2y}{dz^2}$$.\n- Step 3: Substitute into the DE and use $$\\sin x = z$$, $$\\cos^2 x = 1 - z^2$$ to express everything purely in $$z$$. If well-chosen, the $$\\sin, \\cos$$ mess cancels neatly.\n\nTakeaway: For independent-variable substitutions, chain rule converts $$\\frac{d}{dx}$$ derivatives into $$\\frac{d}{dz}$$ derivatives.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_39"}, {"question": "What condition on boundary conditions allows the solution of a 2nd-order linear DE to be determined uniquely, and when might it fail? (3 steps)", "answer": "- Step 1: Normally, specifying two independent pieces of information gives two equations in two unknowns ‚ÄĒ unique solution.\n- Step 2: Failure can occur for boundary value problems: if the two equations happen to be dependent, there's either no solution (inconsistent) or infinitely many (consistent but one parameter free). This is tied to the system matrix being singular.\n- Step 3: Example: for $$y'' + y = 0$$ with $$y(0) = 0$$ and $$y(\\pi) = 0$$, any $$y = B\\sin x$$ works ‚ÄĒ infinitely many solutions. This is related to eigenvalue problems.\n\nTakeaway: 2 independent conditions usually give unique solutions, but special configurations can yield 0 or infinitely many.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_54"}, {"question": "When does the standard trial form for a particular integral **fail**, and what's the modification rule? (3 steps)", "answer": "- Step 1: The trial fails whenever it (or any part of it) is already a solution of the **homogeneous equation** ‚ÄĒ i.e. it appears in the complementary function. Then substituting the trial into the LHS gives 0, which cannot equal a non-zero RHS.\n- Step 2: **Modification rule:** multiply the trial by $$x$$. If that's still in the C.F. (because of a repeated root in the auxiliary equation), multiply by $$x^2$$.\n- Step 3: Examples:\n+ If C.F. contains $$Ae^{2x}$$ and RHS is $$e^{2x}$$, use $$\\lambda x e^{2x}$$ (not $$\\lambda e^{2x}$$).\n+ If C.F. contains $$(A + Bx)e^{2x}$$ (repeated root) and RHS is $$e^{2x}$$, use $$\\lambda x^2 e^{2x}$$.\n+ If the auxiliary has root 0 (so C.F. contains a constant $$A$$) and RHS is a constant, use $$\\lambda x$$ instead of $$\\lambda$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_20"}, {"question": "If $$y_1(x)$$ and $$y_2(x)$$ are both solutions to the homogeneous equation $$a y'' + b y' + c y = 0$$, why is the linear combination $$y = A y_1(x) + B y_2(x)$$ also a solution? What fundamental property makes this true? (2 steps)", "answer": "- Step 1: This relies on the **linearity** of the differential operator. The operator $$L[y] = a y'' + b y' + c y$$ is linear, meaning it distributes over addition and respects scalar multiplication: $$L[A y_1 + B y_2] = A L[y_1] + B L[y_2]$$.\n- Step 2: Since $$y_1$$ and $$y_2$$ are solutions, $$L[y_1] = 0$$ and $$L[y_2] = 0$$. Therefore, $$L[A y_1 + B y_2] = A(0) + B(0) = 0$$. This is known as the **principle of superposition**, and it allows us to construct a general solution with two arbitrary constants from two independent specific solutions.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_1"}, {"question": "A common mistake: a student finds the C.F. and P.I. separately, applies the boundary conditions to the C.F. alone, then adds the P.I. afterwards. What goes wrong? (3 steps)", "answer": "- Step 1: The boundary conditions constrain the *full* solution $$y = y_{CF} + y_{PI}$$, not just $$y_{CF}$$ on its own. If at $$x = 0$$ the condition is $$y(0) = 0$$, this means $$y_{CF}(0) + y_{PI}(0) = 0$$, not $$y_{CF}(0) = 0$$.\n- Step 2: Applying the condition to $$y_{CF}$$ alone ignores the contribution from $$y_{PI}$$ and gives wrong values of $$A$$ and $$B$$.\n- Step 3: Correct procedure: first *form* the general solution, then apply the conditions to the complete expression. This automatically accounts for both the natural and forced responses.\n\nThe P.I. \"shifts\" the solution away from the pure homogeneous behaviour, so the constants must be chosen to compensate.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_26"}, {"question": "Conceptually, why does adding the particular integral to the complementary function capture all possible solutions of a non-homogeneous DE? (3 steps)", "answer": "- Step 1: The C.F. describes a 2-dimensional family of solutions to the homogeneous equation ‚ÄĒ the \"kernel\" of the differential operator $$L$$, i.e. all $$y$$ with $$L[y] = 0$$.\n- Step 2: The P.I. is a single solution to $$L[y] = f$$. By linearity, if $$y_{\\text{any}}$$ is any solution, then $$y_{\\text{any}} - y_p$$ satisfies $$L[y_{\\text{any}} - y_p] = 0$$, so $$y_{\\text{any}} - y_p$$ is in the C.F.\n- Step 3: Rearranging: every solution has the form $$y_{\\text{any}} = y_p + (\\text{some C.F.})$$. Adding the C.F. (with its two free constants) parametrises all possible choices, covering the entire solution set.\n\nTakeaway: The P.I. \"lifts\" us into the non-homogeneous solution space; the C.F. provides the freedom within it.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_25"}, {"question": "Intuitively, why does multiplying the trial P.I. by $$x$$ \"fix\" the problem when the standard trial is part of the complementary function? (3 steps)", "answer": "- Step 1: If $$e^{kx}$$ is already annihilated by the operator $$L$$ (i.e. it's in the C.F.), then $$L[\\lambda e^{kx}] = 0$$, which can't match a non-zero RHS.\n- Step 2: Multiplying by $$x$$ breaks the exact structure: $$xe^{kx}$$ is NOT in the C.F. (unless the root is repeated). Applying $$L$$ to $$xe^{kx}$$ leaves a non-zero result because the product rule generates extra terms.\n- Step 3: The deeper reason: when $$k$$ is a simple root of the auxiliary, the \"first-order\" perturbation $$xe^{kx}$$ is linearly independent of $$e^{kx}$$ and not in the null space of $$L$$, so it can produce the required RHS.\n\nAnalogy: if the homogeneous operator \"eats\" $$e^{kx}$$ perfectly, you need a function that's \"nearly\" an exponential but not quite, so the operator leaves something behind.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_21"}, {"question": "If the auxiliary equation has purely imaginary roots $$\\pm qi$$ (i.e., $$p=0$$), what is the general solution, and what does this imply about the physical behavior of the system being modeled? (2 steps)", "answer": "- Step 1: The general solution reduces to $$y = C\\cos qx + D\\sin qx$$. This can also be written as $$y = R\\sin(qx + \\phi)$$ or $$y = R\\cos(qx + \\phi)$$ using harmonic addition formulas, where $$R$$ is amplitude and $$\\phi$$ is phase.\n- Step 2: Physically, this implies **simple harmonic motion**‚ÄĒthe system oscillates indefinitely with a constant amplitude $$R$$ and a fixed angular frequency $$q$$. There is no exponential decay or growth because the $$e^{px}$$ term is simply $$e^0 = 1$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_5"}, {"question": "What is the **resonance amplification** phenomenon in the context of non-homogeneous second-order DEs, and how does it arise from the mathematics? (3 steps)", "answer": "- Step 1: When the forcing frequency equals the natural frequency (undamped case), the standard trig trial $$\\lambda\\cos\\omega x + \\mu\\sin\\omega x$$ is in the C.F. and is annihilated by the operator.\n- Step 2: The modified trial $$x(\\lambda\\cos\\omega x + \\mu\\sin\\omega x)$$ has amplitude $$\\propto x$$ ‚ÄĒ it grows linearly in time. This represents energy accumulating in the oscillator.\n- Step 3: In a real damped system ($$b > 0$$), complete resonance doesn't occur (the natural frequency has nonzero real part in the complex roots), but near-resonance produces a large finite amplitude steady-state ‚ÄĒ the amplification is limited by damping.\n\n**Engineering takeaway**: avoid driving systems at their natural frequency; destructive resonance is the reason bridges have collapsed and buildings shake in earthquakes.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_58"}, {"question": "What is the significance of the discriminant $$b^2 - 4ac$$ of the auxiliary equation in determining the qualitative behaviour of solutions? (3 steps)", "answer": "- Step 1: The discriminant classifies the roots of $$am^2 + bm + c = 0$$ into three regimes, each giving qualitatively different solutions.\n+ If $$b^2 > 4ac$$: two distinct real roots $$\\alpha, \\beta$$. Solutions are pure exponentials, no oscillation.\n+ If $$b^2 = 4ac$$: a repeated real root $$\\alpha$$. Solutions are exponential but with an extra $$x$$ factor ‚ÄĒ borderline behaviour.\n+ If $$b^2 < 4ac$$: complex conjugate roots $$p \\pm qi$$. Solutions oscillate (imaginary part) with an exponential envelope $$e^{px}$$ (real part).\n- Step 2: Physically (for a mass-spring-damper), the three cases correspond to overdamped, critically damped, and underdamped motion ‚ÄĒ the same discriminant determines whether you see exponential decay only or decaying oscillations.\n- Step 3: So one quadratic discriminant tells you everything about the structure of the solution without solving the DE explicitly.\n\nTakeaway: One sign check $$b^2 - 4ac$$ distinguishes exponential decay vs oscillation vs the critical transition.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_4"}, {"question": "Show that when the auxiliary equation has a repeated root $$m = \\alpha$$, the function $$y = xe^{\\alpha x}$$ is a solution of the homogeneous DE $$ay'' + by' + cy = 0$$. (4 steps)", "answer": "- Step 1: Compute $$y = xe^{\\alpha x}$$, $$y' = e^{\\alpha x} + \\alpha x e^{\\alpha x}$$, $$y'' = 2\\alpha e^{\\alpha x} + \\alpha^2 x e^{\\alpha x}$$.\n- Step 2: Substitute into LHS: $$a(2\\alpha e^{\\alpha x} + \\alpha^2 x e^{\\alpha x}) + b(e^{\\alpha x} + \\alpha x e^{\\alpha x}) + c(x e^{\\alpha x})$$.\n- Step 3: Separate by functional form:\n$$= xe^{\\alpha x}(a\\alpha^2 + b\\alpha + c) + e^{\\alpha x}(2a\\alpha + b)$$\n- Step 4: The first bracket is zero because $$\\alpha$$ satisfies the auxiliary equation. The second bracket, $$2a\\alpha + b$$, is zero precisely because for a repeated root of $$am^2 + bm + c$$, Vieta tells us $$\\alpha = -b/(2a)$$, giving $$2a\\alpha + b = 0$$. Both vanish, so $$y = xe^{\\alpha x}$$ is a solution.\n\nSo the general solution combines both linearly independent solutions: $$y = (A + Bx)e^{\\alpha x}$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_6"}, {"question": "Why might we want to use a **substitution** to convert a second-order DE with variable coefficients into one with constant coefficients? (3 steps)", "answer": "- Step 1: The methods we developed (auxiliary equation, trial P.I. table) only work for equations with *constant* coefficients $$a, b, c$$. Variable coefficients like $$x^2 y'' + xy' + y = 0$$ don't fit this framework directly.\n- Step 2: A clever substitution (like $$x = e^u$$, so $$u = \\ln x$$) can transform the equation into one with constant coefficients in the new variable $$u$$, which we *can* solve by standard methods.\n- Step 3: After solving in $$u$$, we convert back using $$u = \\ln x$$ to get the solution in $$x$$.\n\nThis is a powerful pattern in mathematics: **if a problem is hard in one coordinate system, find a change of variables that makes it easy**.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_28"}, {"question": "Given the DE $$\\frac{d^2y}{dt^2} + 4\\frac{dy}{dt} + 3y = kt + 5$$ (with $$k$$ constant), and noting that for large $$t$$ the solution approaches a linear function, what is that linear asymptote when $$k = 6$$? (4 steps)", "answer": "- Step 1: **C.F.**: $$m^2 + 4m + 3 = (m+1)(m+3) = 0$$, roots $$m = -1, -3$$. So $$y_{CF} = Ae^{-t} + Be^{-3t}$$, which decays to 0 as $$t \\to \\infty$$.\n- Step 2: **P.I.** for polynomial RHS of degree 1: try $$y_{PI} = \\lambda + \\mu t$$. Substitute: $$0 + 4\\mu + 3(\\lambda + \\mu t) = kt + 5$$, giving $$3\\mu = k$$ and $$4\\mu + 3\\lambda = 5$$.\n- Step 3: With $$k = 6$$: $$\\mu = 2$$ and $$3\\lambda = 5 - 8 = -3$$, so $$\\lambda = -1$$. Thus $$y_{PI} = -1 + 2t$$.\n- Step 4: For large $$t$$, the C.F. has decayed away, so $$y \\approx y_{PI} = 2t - 1$$. This is the linear asymptote.\n\nThe transient fades; the steady-state polynomial response (which must match the polynomial RHS) dominates.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_51"}, {"question": "What is the logic behind the principle of superposition's role in non-homogeneous DEs ‚ÄĒ why does the solution contain exactly ONE particular integral (not a family) plus the ENTIRE C.F.? (3 steps)", "answer": "- Step 1: The homogeneous operator $$L$$ has a **2-dimensional null space** (solutions satisfying $$L[y] = 0$$) ‚ÄĒ this is the C.F. with its two free parameters.\n- Step 2: For the inhomogeneous problem $$L[y] = f(x)$$, the solution set is not a vector space but an **affine** set: pick any one solution $$y_p$$, and the full solution set is $$\\{y_p + y_c : y_c \\in \\text{null space}\\}$$.\n- Step 3: This is why we need just *one* particular integral (to \"anchor\" ourselves in the solution set) plus the *full* two-parameter C.F. (to reach every other solution from that anchor).\n\nGeometric analogy: finding all points on a plane not through origin. You need one point on the plane, plus all vectors parallel to the plane.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_43"}, {"question": "Conceptually, what happens to the structure of solutions near $$x = 0$$ for the Euler equation $$x^2 y'' + xy' + y = 0$$ whose solutions are $$A\\cos(\\ln x) + B\\sin(\\ln x)$$? (3 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, $$\\ln x \\to -\\infty$$, so the oscillations $$\\cos(\\ln x)$$ and $$\\sin(\\ln x)$$ oscillate infinitely many times in any small neighbourhood of $$x = 0$$.\n- Step 2: However, the amplitude stays bounded (between $$-1$$ and $$1$$) ‚ÄĒ so the solution oscillates wildly but doesn't blow up.\n- Step 3: This reflects how Euler equations have a \"singular point\" at $$x = 0$$: derivatives are ill-defined there (the coefficient $$x^2$$ of $$y''$$ vanishes), and we can't extend the solution through that point. The logarithmic substitution $$u = \\ln x$$ only makes sense for $$x > 0$$.\n\nTakeaway: Euler equations have singularities at $$x = 0$$; solutions may oscillate pathologically near it.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_40"}, {"question": "Why must the general solution of the reducible DE $$x^2 y'' + xy' + y = 0$$ necessarily be expressed using $$\\ln x$$ rather than just $$x$$? (3 steps)", "answer": "- Step 1: The substitution $$u = \\ln x$$ transforms the equation into $$\\frac{d^2y}{du^2} + y = 0$$, whose solution is $$y = A\\cos u + B\\sin u$$.\n- Step 2: To go back to the original variable, substitute $$u = \\ln x$$. The trig functions now have $$\\ln x$$ as their argument: $$y = A\\cos(\\ln x) + B\\sin(\\ln x)$$.\n- Step 3: Necessary because the Euler equation is \"log-translation-invariant\" ‚ÄĒ its natural variable is $$\\ln x$$, not $$x$$. Solutions oscillate in $$\\ln x$$ (infinitely many oscillations as $$x \\to 0^+$$), a characteristic signature.\n\nTakeaway: Euler equations have solutions whose arguments are $$\\ln x$$ ‚ÄĒ reflecting the equation's natural logarithmic symmetry.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_89"}, {"question": "Explain why the particular integral for $$f(x) = p + qx + rx^2$$ must include ALL terms $$\\lambda + \\mu x + \\nu x^2$$, even if, say, the linear or constant term isn't obviously needed. (3 steps)", "answer": "- Step 1: Derivatives of $$x^2$$ produce lower-order terms: $$\\frac{d}{dx}(x^2) = 2x$$ and $$\\frac{d^2}{dx^2}(x^2) = 2$$. So when we substitute $$\\nu x^2$$ into the DE, constants and linear terms are generated.\n- Step 2: To match the RHS coefficient by coefficient (constant, $$x$$, $$x^2$$), we need $$\\lambda$$ and $$\\mu x$$ in the trial to absorb these extra generated terms and leave exactly the required polynomial.\n- Step 3: If we omitted $$\\lambda$$ or $$\\mu x$$, we couldn't match the RHS's constant or linear coefficients ‚ÄĒ the system of equations would be inconsistent.\n\n**Rule**: For polynomial RHS of degree $$n$$, the P.I. trial is a full polynomial of degree $$n$$, with *every* lower power included.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_44"}, {"question": "Using the substitution $$x = e^u$$, show that $$x \\frac{dy}{dx} = \\frac{dy}{du}$$. (3 steps)", "answer": "- Step 1: Since $$x = e^u$$, we have $$\\frac{dx}{du} = e^u = x$$.\n- Step 2: By the chain rule, $$\\frac{dy}{du} = \\frac{dy}{dx} \\cdot \\frac{dx}{du} = \\frac{dy}{dx} \\cdot x$$.\n- Step 3: So $$\\frac{dy}{du} = x\\frac{dy}{dx}$$, which rearranges to $$x \\frac{dy}{dx} = \\frac{dy}{du}$$. This is the first key identity that transforms first-derivative terms into constant-coefficient form.\n\nTakeaway: Under $$x = e^u$$, the operator $$x\\frac{d}{dx}$$ is equivalent to $$\\frac{d}{du}$$ ‚ÄĒ this is why Euler equations linearise.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_34"}, {"question": "In the context of substitutions to reduce DE order or transform to constant coefficients, what makes a \"good\" substitution, and how do you recognise when one will help? (3 steps)", "answer": "- Step 1: A good substitution exploits **hidden structure** in the equation ‚ÄĒ scaling symmetry (Cauchy‚ÄďEuler), trigonometric relationships (DEs with $$\\sin, \\cos$$ coefficients), or absence of a variable (for $$u = y'$$ order reduction).\n- Step 2: Recognise it when:\n+ Coefficients are powers of $$x$$ matching derivative orders ‚Üí try $$x = e^u$$.\n+ The DE contains $$\\sin, \\cos$$ coefficients ‚Üí try $$z = \\sin x$$ (or $$\\cos x$$).\n+ The DE has no $$y$$ term (only $$y'$$ and $$y''$$) ‚Üí try $$u = y'$$.\n+ A given power factor $$y = z/x^k$$ suggests the problem has a specific scaling.\n- Step 3: The substitution succeeds when after substitution, the equation becomes one with constant coefficients (or lower order) ‚ÄĒ a form you know how to solve.\n\nIn exams, the substitution is usually provided; your job is the algebra.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_59"}, {"question": "Explain why, in $$\\frac{d^2y}{dx^2} + \\tan x \\frac{dy}{dx} + y\\cos^2 x = \\cos^2 x \\cdot e^{\\sin x}$$, the substitution $$z = \\sin x$$ is well-motivated. (3 steps)", "answer": "- Step 1: The DE has $$\\tan x$$ and $$\\cos^2 x$$ as coefficients ‚ÄĒ \"messy\" trigonometric functions. The RHS $$\\cos^2 x \\cdot e^{\\sin x}$$ contains $$e^{\\sin x}$$, suggesting that $$\\sin x$$ is playing the role of a natural variable.\n- Step 2: Letting $$z = \\sin x$$, we have $$\\frac{dz}{dx} = \\cos x$$, and many terms involving $$\\sin x$$ and $$\\cos x$$ will simplify. For instance, $$\\cos^2 x = 1 - z^2$$, and the forcing $$e^{\\sin x}$$ becomes $$e^z$$.\n- Step 3: After computing $$\\frac{dy}{dx}$$ and $$\\frac{d^2y}{dx^2}$$ in terms of $$\\frac{dy}{dz}$$ and $$\\frac{d^2 y}{dz^2}$$ (via chain rule), the trigonometric mess consolidates, and the equation reduces to a constant-coefficient equation in $$z$$.\n\nTakeaway: The \"right\" substitution is often visible in the structure of the nonlinearities ‚ÄĒ $$e^{\\sin x}$$ screams \"let $$z = \\sin x$$.\"", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_70"}, {"question": "When the auxiliary equation has complex conjugate roots $$p \\pm qi$$, derive why the general solution can be written in the real form $$y = e^{px}(A\\cos qx + B\\sin qx)$$. (4 steps)", "answer": "- Step 1: Start from the Case 1 form using complex roots: $$y = C_1 e^{(p+qi)x} + C_2 e^{(p-qi)x}$$, where $$C_1, C_2 \\in \\mathbb{C}$$.\n- Step 2: Factor the common $$e^{px}$$: $$y = e^{px}(C_1 e^{iqx} + C_2 e^{-iqx})$$.\n- Step 3: Apply Euler's formula $$e^{i\\theta} = \\cos\\theta + i\\sin\\theta$$:\n$$y = e^{px}\\big[C_1(\\cos qx + i\\sin qx) + C_2(\\cos qx - i\\sin qx)\\big]$$\n$$= e^{px}\\big[(C_1 + C_2)\\cos qx + i(C_1 - C_2)\\sin qx\\big]$$\n- Step 4: For $$y$$ to be real, choose $$C_1$$ and $$C_2$$ complex conjugates. Let $$A = C_1 + C_2$$ and $$B = i(C_1 - C_2)$$ ‚ÄĒ these turn out to be real. We get $$y = e^{px}(A\\cos qx + B\\sin qx)$$.\n\nThe $$e^{px}$$ controls amplitude growth/decay; $$q$$ controls the oscillation frequency.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_7"}, {"question": "Why does a repeated root $m = \\alpha$ in the auxiliary equation lead to a solution of the form $y = (A + Bx)e^{\\alpha x}$? (3 steps)", "answer": "- Step 1: For a repeated root $m = \\alpha$, the trial solution $e^{\\alpha x}$ satisfies the differential equation but only provides one solution.  \n- Step 2: To find a second linearly independent solution, assume a solution of the form $v(x)e^{\\alpha x}$.  \n- Step 3: Substituting into the differential equation forces $v''(x) = 0$, so $v(x) = A + Bx$, giving the general solution $y = (A + Bx)e^{\\alpha x}$.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_1"}, {"question": "What is the **Cauchy‚ÄďEuler** form of a second-order DE, and what does the substitution $$x = e^u$$ do to it? (3 steps)", "answer": "- Step 1: A Cauchy‚ÄďEuler equation has the form $$Ax^2\\frac{d^2y}{dx^2} + Bx\\frac{dy}{dx} + Cy = g(x)$$ ‚ÄĒ each derivative's coefficient is a power of $$x$$ matching the order of differentiation.\n- Step 2: Using $$x\\frac{dy}{dx} = \\frac{dy}{du}$$ and $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$:\n$$A\\left(\\frac{d^2y}{du^2} - \\frac{dy}{du}\\right) + B\\frac{dy}{du} + Cy = g(e^u)$$\n$$\\Rightarrow A\\frac{d^2y}{du^2} + (B-A)\\frac{dy}{du} + Cy = g(e^u)$$\n- Step 3: This is now a standard **constant-coefficient** DE in $$u$$, solvable by the auxiliary-equation method. Convert back at the end using $$u = \\ln x$$.\n\nThe trick exploits the fact that powers of $$x$$ scale with derivatives in a very specific way.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_31"}, {"question": "State the **principle of superposition** for second-order linear homogeneous DEs and explain why it fails for non-homogeneous equations. (3 steps)", "answer": "- Step 1: **Superposition principle**: If $$y_1 = f(x)$$ and $$y_2 = g(x)$$ are both solutions of $$ay'' + by' + cy = 0$$, then any linear combination $$y = Af(x) + Bg(x)$$ is also a solution.\n- Step 2: The reason is linearity of differentiation and the zero RHS: substituting $$Af + Bg$$ gives $$a(Af + Bg)'' + b(Af + Bg)' + c(Af + Bg) = A(af''+bf'+cf) + B(ag''+bg'+cg) = A\\cdot 0 + B\\cdot 0 = 0$$.\n- Step 3: For non-homogeneous $$ay'' + by' + cy = h(x)$$: if $$y_1, y_2$$ are solutions, then $$Ay_1 + By_2$$ substituted gives $$Ah(x) + Bh(x) = (A+B)h(x) \\neq h(x)$$ in general. Superposition fails because combining two solutions doesn't reproduce the required RHS.\n\nThis is why for non-homogeneous problems we instead combine **one** particular integral with the full two-parameter C.F.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_11"}, {"question": "Why is the exponential function the natural \"ansatz\" (trial guess) for constant-coefficient linear DEs? What property of $$e^{\\lambda x}$$ makes it special? (3 steps)", "answer": "- Step 1: The equation $$ay'' + by' + cy = 0$$ mixes $$y$$, its first derivative, and its second derivative. For this combination to equal zero for all $$x$$, the terms must have a consistent \"shape\" that can cancel.\n- Step 2: The exponential $$e^{\\lambda x}$$ has the magical property that its derivative is proportional to itself: $$\\frac{d}{dx}e^{\\lambda x} = \\lambda e^{\\lambda x}$$ and $$\\frac{d^2}{dx^2}e^{\\lambda x} = \\lambda^2 e^{\\lambda x}$$. All derivatives have the same functional shape, just with different constant multipliers.\n- Step 3: So if $$y = e^{\\lambda x}$$, substituting gives $$a\\lambda^2 e^{\\lambda x} + b\\lambda e^{\\lambda x} + c e^{\\lambda x} = 0$$, i.e. $$e^{\\lambda x}(a\\lambda^2 + b\\lambda + c) = 0$$. Since $$e^{\\lambda x} \\neq 0$$, the entire problem reduces to an algebraic equation $$a\\lambda^2 + b\\lambda + c = 0$$.\n\nThe exponential turns a differential equation (hard) into an algebraic equation (easy).", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_2"}, {"question": "When solving $$y'' - 2y' = 3$$, the auxiliary equation has roots $$m=0$$ and $$m=2$$. Why can't we guess a constant P.I. like $$y = \\lambda$$, and what should we guess instead? (2 steps)", "answer": "- Step 1: The root $$m=0$$ means the C.F. contains the term $$Ae^{0x} = A$$, which is a constant. If we guess a constant P.I. $$y = \\lambda$$, its first and second derivatives are 0. Substituting into the LHS gives $$0 - 2(0) = 0 \\neq 3$$. The constant is absorbed by the C.F.\n- Step 2: Because $$m=0$$ is a root, any constant satisfies the homogeneous equation. We must multiply our standard guess by $$x$$. Instead of guessing $$\\lambda$$, we guess $$\\lambda x$$. Taking the derivative of $$\\lambda x$$ gives a non-zero constant $$\\lambda$$, which allows the LHS ($$-2y'$$) to equal 3.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_9"}, {"question": "What conceptual role does each piece of the particular solution play in a driven, damped physical system like $$ay'' + by' + cy = f(t)$$? (3 steps)", "answer": "- Step 1: The **complementary function** is the **transient response**: the \"natural\" behaviour of the system if left alone (no forcing). With positive damping ($$b>0$$), it decays to zero as $$t \\to \\infty$$.\n- Step 2: The **particular integral** is the **steady-state response**: the long-term behaviour driven by the forcing $$f(t)$$. If $$f(t)$$ is sinusoidal, the steady-state is sinusoidal (possibly phase-shifted).\n- Step 3: The two arbitrary constants in the C.F. are chosen to satisfy initial conditions ‚ÄĒ they adjust the transient so that at $$t=0$$ everything matches up. After the transient dies out, only the steady-state remains.\n\nThis is why engineers often focus on the P.I. for long-term behaviour and on the full solution for the startup period.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_50"}, {"question": "For the DE $$\\frac{d^2x}{dt^2} + 2k\\frac{dx}{dt} + 9x = 0$$ (with constant $$k \\geq 0$$), explain how the qualitative behaviour of $$x(t)$$ changes as $$k$$ increases from 0 through to large values. (4 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + 2km + 9 = 0$$, roots $$m = -k \\pm \\sqrt{k^2 - 9}$$. The discriminant is $$4k^2 - 36$$.\n- Step 2: **Case $$|k| < 3$$** (underdamped): Discriminant negative, complex roots $$-k \\pm i\\sqrt{9-k^2}$$. Solution: $$x = e^{-kt}(A\\cos\\omega t + B\\sin\\omega t)$$ where $$\\omega = \\sqrt{9-k^2}$$. Oscillates with exponentially decaying amplitude.\n- Step 3: **Case $$|k| = 3$$** (critically damped): Repeated root $$m = -3$$. Solution: $$x = (A + Bt)e^{-3t}$$. Fastest non-oscillatory return to equilibrium.\n- Step 4: **Case $$|k| > 3$$** (overdamped): Two distinct negative real roots. Solution is sum of two decaying exponentials, no oscillation, slower return than critical damping.\n\nIn all three cases (for $$k>0$$), $$x \\to 0$$ as $$t \\to \\infty$$: the system always returns to equilibrium, but the *manner* of return changes dramatically.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_41"}, {"question": "For the SHM-style DE $$\\frac{d^2 x}{dt^2} + x = 3\\sin 2t$$ with $$x(0) = 0$$ and $$x'(0) = 1$$, why does the natural frequency differ from the forcing frequency, and what qualitative feature does this produce? (3 steps)", "answer": "- Step 1: The homogeneous equation $$x'' + x = 0$$ has auxiliary equation $$m^2 + 1 = 0$$, giving $$m = \\pm i$$. So the natural (unforced) angular frequency is $$\\omega_n = 1$$.\n- Step 2: The forcing term $$3\\sin 2t$$ has angular frequency $$\\omega_f = 2$$. Since $$\\omega_f \\neq \\omega_n$$, the forcing is \"off-resonance\" ‚ÄĒ the trial P.I. $$\\lambda\\sin 2t$$ does NOT overlap with the C.F., so no modification is needed.\n- Step 3: The general solution is a superposition of the natural oscillation (frequency 1) and the forced oscillation (frequency 2), giving a \"beating\" pattern. If frequencies were equal, we'd get resonance and the P.I. would need an extra $$t$$ factor, causing amplitude to grow unboundedly.\n\nTakeaway: Off-resonance forcing produces a steady superposition of two frequencies; on-resonance forcing produces unbounded growth.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_32"}, {"question": "What is a common misconception when solving a non-homogeneous 2nd-order DE, and how can it be avoided? (3 steps)", "answer": "- Step 1: Common misconception #1: applying boundary conditions to the C.F. instead of the full general solution. Students forget that the P.I. contributes to $$y(x_0)$$ and $$y'(x_0)$$.\n- Step 2: Common misconception #2: failing to modify the P.I. trial when it overlaps with the C.F. (e.g., using $$\\lambda e^{kx}$$ when $$k$$ is a root). This gives $$L[y_p] = 0$$, and you get stuck matching a non-zero forcing to zero.\n- Step 3: Avoidance: always (a) solve the auxiliary equation first to find the C.F., (b) check whether the P.I. trial overlaps, and modify by multiplying by $$x$$ if needed, (c) write the FULL general solution, (d) apply conditions to the full solution and its derivative.\n\nTakeaway: Two most frequent pitfalls are C.F.-only boundary application and missing P.I. modification.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_103"}, {"question": "What is the difference between initial conditions and boundary conditions for a second-order differential equation? (3 steps)", "answer": "- Step 1: Initial conditions specify the value of $$y$$ AND its derivative $$y'$$ at a single point $$x_0$$: e.g. $$y(0) = 1$$ and $$y'(0) = 2$$. This is the natural setup for time-evolution problems where you know the initial state.\n- Step 2: Boundary conditions specify values (usually of $$y$$) at two DIFFERENT points: e.g. $$y(0) = 0$$ and $$y(L) = 0$$. This is natural for spatial problems like the shape of a beam with fixed endpoints.\n- Step 3: Both pin down the two constants $$A, B$$, but they can behave very differently: initial-value problems for linear DEs always have a unique solution, while boundary-value problems can sometimes have no solution or infinitely many.\n\nTakeaway: Initial conditions = state at one instant; boundary conditions = state at two positions.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_29"}, {"question": "In reducible DEs, what does the presence of the substitution $$y = \\frac{z}{x}$$ (instead of $$x = e^u$$) suggest about the expected structure of the original DE? (3 steps)", "answer": "- Step 1: The substitution $$y = \\frac{z}{x}$$ is \"stripping a factor\" ‚ÄĒ we anticipate that the solution has an overall $$\\frac{1}{x}$$ factor, and we solve for the \"rest\" $$z$$.\n- Step 2: Useful when the original DE has a known particular power-law solution like $$y = \\frac{1}{x}$$, or when coefficient structure suggests a $$\\frac{1}{x}$$ scaling.\n- Step 3: After substitution, the transformed equation for $$z$$ is typically simpler ‚ÄĒ constant-coefficient or at least easier. Once $$z$$ is found, recover $$y = z/x$$.\n\nTakeaway: \"Strip a factor\" substitutions separate out a known power-law piece so the residual equation is simpler.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_91"}, {"question": "Contrast how a repeated root of the auxiliary equation arises algebraically versus what it means for the solution structure. (3 steps)", "answer": "- Step 1: Algebraically: a repeated root of $$am^2 + bm + c = 0$$ means discriminant is zero: $$b^2 = 4ac$$. The quadratic factors as $$a(m - \\alpha)^2 = 0$$. Only one root value, counted twice.\n- Step 2: Geometrically on the $$m$$-line: the two complex/real roots have \"collided\" at a single point ‚ÄĒ the critical transition between distinct real roots and complex conjugate pairs.\n- Step 3: For the solution: the two independent basis functions become $$e^{\\alpha x}$$ and $$xe^{\\alpha x}$$ instead of $$e^{\\alpha x}$$ and $$e^{\\beta x}$$. The \"$$xe^{\\alpha x}$$\" encodes the \"missing\" second exponential ‚ÄĒ it's literally the limit of $$\\frac{e^{\\beta x} - e^{\\alpha x}}{\\beta - \\alpha}$$ as $$\\beta \\to \\alpha$$.\n\nTakeaway: Repeated roots are the critical transition ‚ÄĒ they \"pinch off\" a dimension of the solution space that's rescued by multiplying by $$x$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_58"}, {"question": "Prove that if $$y_p$$ is a particular integral and $$y_c$$ is the general complementary function of $$ay'' + by' + cy = f(x)$$, then $$y = y_c + y_p$$ gives *every* solution. (3 steps)", "answer": "- Step 1: First verify $$y_c + y_p$$ is a solution: $$L[y_c + y_p] = L[y_c] + L[y_p] = 0 + f(x) = f(x)$$. ‚úď\n- Step 2: Now show no other solutions exist. Suppose $$Y$$ is any solution. Consider $$Y - y_p$$: applying $$L$$ gives $$L[Y] - L[y_p] = f(x) - f(x) = 0$$. So $$Y - y_p$$ satisfies the homogeneous equation.\n- Step 3: Since $$y_c$$ is the general solution of the homogeneous equation, $$Y - y_p = y_c$$ for some choice of the constants in $$y_c$$. Therefore $$Y = y_c + y_p$$.\n\nEvery solution is captured ‚ÄĒ and the two arbitrary constants in $$y_c$$ provide the complete flexibility needed to match any boundary conditions.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_16"}, {"question": "Explain why, in $$\\frac{d^2x}{dt^2} + 5\\frac{dx}{dt} + 6x = 2e^{-t}$$, the forcing term $$2e^{-t}$$ drives a damped response rather than resonance. (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + 5m + 6 = (m+2)(m+3) = 0$$, so $$m = -2, -3$$. Both roots negative and real.\n- Step 2: The forcing $$2e^{-t}$$ corresponds to rate $$k = -1$$, which is NOT a root of the auxiliary equation. So the trial $$\\lambda e^{-t}$$ does not overlap with the C.F. $$Ae^{-2t} + Be^{-3t}$$.\n- Step 3: Hence no $$t$$-factor is needed ‚ÄĒ the P.I. is simply $$\\lambda e^{-t}$$ for some $$\\lambda$$. Both C.F. and P.I. decay to zero, so there's no resonance; the solution damps out.\n\nTakeaway: No overlap of forcing rate with auxiliary roots + all roots negative = damped response, no resonance.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_42"}, {"question": "How do you modify the trial Particular Integral when it overlaps with a term in the Complementary Function? When would you need to multiply by $$x^2$$ instead of just $$x$$? (2 steps)", "answer": "- Step 1: When the standard trial P.I. overlaps with a term in the C.F., you must multiply the trial P.I. by $$x$$ to make it linearly independent from the C.F. For example, if $$e^{2x}$$ is in the C.F., try $$\\lambda x e^{2x}$$ instead.\n- Step 2: You must multiply by $$x^2$$ if the C.F. contains a repeated root that causes both the standard trial P.I. and the $$x$$-multiplied version to overlap. For instance, if the C.F. is $$(A + Bx)e^{2x}$$ and the standard P.I. would be $$\\lambda e^{2x}$$, then $$\\lambda x e^{2x}$$ still overlaps with the $$Bx e^{2x}$$ term. Thus, you must escalate to $$\\lambda x^2 e^{2x}$$ to break free from the C.F.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_13"}, {"question": "In solving the first-order homogeneous ODE $$a\\frac{dy}{dx} + by = 0$$, the solution is $$y = Ae^{kx}$$ where $$k = -b/a$$. How does this observation motivate the trial solution for the second-order homogeneous ODE $$a\\frac{d^2y}{dx^2} + b\\frac{dy}{dx} + cy = 0$$, and why must it contain two exponential terms? (4 steps)", "answer": "- Step 1: In the first-order case, the exponential form $$e^{kx}$$ works because the derivative of an exponential is a scaled version of itself ($$\\frac{d}{dx}e^{kx} = ke^{kx}$$). This allows the ODE to factor out $$e^{kx}$$ and collapse into an algebraic equation for $$k$$.\n- Step 2: For a second-order ODE, we expect the same \"self-similar\" property to work, so we guess a similar exponential form. However, a single exponential $$y = Ae^{\\lambda x}$$ only contains one arbitrary constant.\n- Step 3: Because integrating twice requires two constants, a single exponential is insufficient to represent the full family of solutions.\n- Step 4: Therefore, we try a linear combination of two distinct exponential functions: $$y = Ae^{\\lambda x} + Be^{\\mu x}$$. This provides the two required arbitrary constants ($$A$$ and $$B$$) while maintaining the property that all terms are exponentials, allowing the ODE to collapse into an algebraic condition on $$\\lambda$$ and $$\\mu$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_1"}, {"question": "For the DE $$\\frac{d^2y}{dx^2} - 4\\frac{dy}{dx} + 4y = 4e^{2x}$$, why can neither $$\\lambda e^{2x}$$ nor $$\\lambda xe^{2x}$$ serve as a particular integral? What's the correct trial, and what's the physical/mathematical intuition? (4 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 - 4m + 4 = (m-2)^2 = 0$$ has **repeated root** $$m = 2$$. C.F. is $$(A + Bx)e^{2x}$$.\n- Step 2: Both $$e^{2x}$$ AND $$xe^{2x}$$ are in the C.F. ‚ÄĒ both are killed by the differential operator. Neither can produce a non-zero RHS.\n- Step 3: Correct trial: $$\\lambda x^2 e^{2x}$$. This function is NOT in the C.F. and applying the operator leaves something non-zero proportional to $$e^{2x}$$. Determine $$\\lambda$$ by substitution.\n- Step 4: **Deep intuition**: the null space of the operator $$(D-2)^2$$ is spanned by $$e^{2x}$$ and $$xe^{2x}$$. To escape the null space, we need a function outside this 2-dimensional subspace ‚ÄĒ $$x^2 e^{2x}$$ qualifies.\n\n**General pattern**: multiplicity of the offending root = extra factors of $$x$$ needed in the trial.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_55"}, {"question": "Why does writing a linear homogeneous DE as $$L[y] = 0$$ (where $$L = a\\frac{d^2}{dx^2} + b\\frac{d}{dx} + c$$) make superposition obvious? (3 steps)", "answer": "- Step 1: $$L$$ is a linear operator: $$L[\\alpha y_1 + \\beta y_2] = \\alpha L[y_1] + \\beta L[y_2]$$ for any constants $$\\alpha, \\beta$$ and any functions $$y_1, y_2$$. This follows from linearity of derivatives.\n- Step 2: Suppose $$L[y_1] = 0$$ and $$L[y_2] = 0$$. Then $$L[\\alpha y_1 + \\beta y_2] = \\alpha \\cdot 0 + \\beta \\cdot 0 = 0$$.\n- Step 3: So any linear combination of solutions is itself a solution ‚ÄĒ this is the superposition principle, now seen as a trivial consequence of $$L$$ being a linear operator.\n\nTakeaway: Operator notation makes the key property ‚ÄĒ linearity ‚ÄĒ visible, and superposition becomes automatic.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_85"}, {"question": "When the RHS is $$f(x) = p\\cos \\omega x + q\\sin \\omega x$$, we guess a P.I. of $$\\lambda \\cos \\omega x + \\mu \\sin \\omega x$$. Why must we include *both* sine and cosine terms even if $$f(x)$$ only contains cosine? (2 steps)", "answer": "- Step 1: The derivative of cosine is (negative) sine, and the derivative of sine is cosine. When you substitute $$y = \\lambda \\cos \\omega x + \\mu \\sin \\omega x$$ into the LHS, the $$y'$$ and $$y''$$ terms will mix the sines and cosines together.\n- Step 2: If you only guessed $$\\lambda \\cos \\omega x$$, its derivatives would generate sine terms on the LHS that have nothing to cancel out with, making it impossible to equal a RHS that lacks sine terms. The $$\\mu \\sin \\omega x$$ term is necessary to produce the sine terms that balance out the cross-contamination from the derivatives.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_10"}, {"question": "Compare the natural qualitative behaviours of solutions to these three DEs: $$(a)\\ y'' + y = 0$$, $$(b)\\ y'' + y' + y = 0$$, $$(c)\\ y'' - y = 0$$. (3 cases)", "answer": "- Step 1: **(a) $$y'' + y = 0$$**: Auxiliary $$m^2 + 1 = 0$$ gives $$m = \\pm i$$. Pure imaginary roots ‚Üí undamped oscillation $$y = A\\cos x + B\\sin x$$. No decay, no growth ‚ÄĒ perfect SHM.\n- Step 2: **(b) $$y'' + y' + y = 0$$**: Auxiliary $$m^2 + m + 1 = 0$$, discriminant $$1 - 4 = -3 < 0$$, roots $$-\\tfrac{1}{2} \\pm \\tfrac{\\sqrt{3}}{2}i$$. Negative real part ‚Üí **damped oscillation**: amplitude decays exponentially while oscillating.\n- Step 3: **(c) $$y'' - y = 0$$**: Auxiliary $$m^2 - 1 = 0$$ gives $$m = \\pm 1$$. Real distinct roots (one positive!). Solution $$y = Ae^x + Be^{-x}$$ ‚ÄĒ generally grows exponentially (unless $$A = 0$$, a special \"pure decay\" case).\n\nThe three DEs illustrate pure oscillation, stable decay with oscillation, and exponential instability. The sign/nature of auxiliary roots entirely determines long-term behaviour.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_56"}, {"question": "In the DE $$\\frac{d^2y}{dx^2} + y = 5xe^{2x}$$, explain conceptually what form of P.I. to try. The forcing involves a product ‚ÄĒ does this require modification? (3 steps)", "answer": "- Step 1: The forcing is $$5xe^{2x}$$ ‚ÄĒ a product of a polynomial and an exponential. Standard trial is a general polynomial-times-exponential of the same \"shape\": $$y_{PI} = (\\lambda + \\mu x)e^{2x}$$, where both constant and linear terms are included because differentiating $$xe^{2x}$$ produces both $$e^{2x}$$ and $$xe^{2x}$$ terms.\n- Step 2: Check the C.F.: auxiliary $$m^2 + 1 = 0$$, roots $$\\pm i$$. C.F. is $$A\\cos x + B\\sin x$$. The exponential $$e^{2x}$$ and $$xe^{2x}$$ are NOT in the C.F. ‚ÄĒ no modification needed.\n- Step 3: So try $$(\\lambda + \\mu x)e^{2x}$$, substitute, equate coefficients of $$e^{2x}$$ and $$xe^{2x}$$ separately, and solve the resulting 2x2 system for $$\\lambda, \\mu$$.\n\n**Pattern**: for products $$P(x)e^{kx}$$, use a general polynomial of the same degree times $$e^{kx}$$, with each coefficient allowed to be free.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_71"}, {"question": "A student claims that the general solution of $$y'' + y' - 6y = 4$$ is $$y = Ae^{2x} + Be^{-3x} - \\frac{2}{3}$$. Does the constant $$-2/3$$ come from the C.F. or the P.I., and why is it there? (3 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 + m - 6 = (m-2)(m+3) = 0$$ gives roots $$m = 2, -3$$. C.F. is $$Ae^{2x} + Be^{-3x}$$ ‚ÄĒ no constant term.\n- Step 2: Forcing is $$4$$ (constant), neither root is $$0$$, so no overlap: try $$y_p = \\lambda$$. Substituting: $$0 + 0 - 6\\lambda = 4 \\Rightarrow \\lambda = -\\frac{2}{3}$$.\n- Step 3: So the $$-\\frac{2}{3}$$ is the particular integral ‚ÄĒ the steady-state shift in $$y$$ due to the constant forcing. Full solution: $$y = Ae^{2x} + Be^{-3x} - \\frac{2}{3}$$, combining transient (C.F.) and steady-state (P.I.).\n\nTakeaway: A constant at the end of a general solution is typically the P.I. for a constant forcing ‚ÄĒ representing the equilibrium shift.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_51"}, {"question": "Why does the general solution to a second-order homogeneous differential equation with constant coefficients depend on the roots of the auxiliary equation? (3 steps)", "answer": "- Step 1: The differential equation $a \\frac{d^2y}{dx^2} + b \\frac{dy}{dx} + cy = 0$ assumes a trial solution $y = e^{mx}$, leading to the auxiliary equation $am^2 + bm + c = 0$.  \n- Step 2: The roots $m_1$ and $m_2$ determine the form of the solution:  \n  + **Real distinct roots**: $y = Ae^{m_1 x} + Be^{m_2 x}$.  \n  + **Repeated root**: $y = (A + Bx)e^{m x}$.  \n  + **Complex roots $p \\pm qi$**: $y = e^{px}(A \\cos qx + B \\sin qx)$.  \n- Step 3: This structure arises from linear independence and the need to span the solution space with two arbitrary constants (from the second-order equation).", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_0"}, {"question": "Conceptually, what does each part of the solution $$y = e^{px}(A\\cos qx + B\\sin qx)$$ tell you about the physical behaviour of the system? (3 steps)", "answer": "- Step 1: The factor $$e^{px}$$ is a pure exponential envelope. If $$p > 0$$, amplitude grows unboundedly; if $$p < 0$$, amplitude decays to zero (damping); if $$p = 0$$, amplitude is constant (pure oscillation).\n- Step 2: The factor $$(A\\cos qx + B\\sin qx)$$ is a sinusoid with angular frequency $$q$$. By the harmonic-combination identity, it can be rewritten as $$R\\cos(qx - \\phi)$$ ‚ÄĒ so $$q$$ is the frequency and $$\\sqrt{A^2 + B^2}$$ is the initial amplitude.\n- Step 3: Combined: $$e^{px}$$ slowly scales the amplitude while the sinusoid wiggles. This is exactly what you'd expect from a mass on a damped spring ‚ÄĒ oscillation at the natural frequency, decaying (or growing) exponentially.\n\nTakeaway: Real part = decay/growth rate; imaginary part = angular frequency of oscillation.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_9"}, {"question": "If the auxiliary equation has a root at $$m = 0$$ (so the C.F. contains a constant term) and the RHS is a constant like $$f(x) = 3$$, why must we NOT use a constant P.I., and what do we use instead? (3 steps)", "answer": "- Step 1: Having $$m = 0$$ as an auxiliary root means the DE has no $$y$$ term directly (it's like $$y'' - 2y' = 3$$). The C.F. already includes an arbitrary constant $$A$$.\n- Step 2: If we tried $$y_{PI} = \\lambda$$ (constant), differentiating gives 0 for both $$y'$$ and $$y''$$, so the LHS contributes nothing from those terms. The constant gets absorbed into the C.F.'s $$A$$, and we cannot match the RHS.\n- Step 3: **Fix:** use $$y_{PI} = \\lambda x$$ instead. Then $$y' = \\lambda$$ appears in the DE and can match the constant RHS.\n\nGeneral principle: whenever the \"natural\" trial is killed by the operator (i.e. part of C.F.), multiply by $$x$$ to lift it out of the null space.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_22"}, {"question": "Why can't the particular integral of $$\\frac{d^2y}{dx^2} - 4\\frac{dy}{dx} + 4y = 4e^{2x}$$ be of the form $$\\lambda e^{2x}$$ OR $$\\lambda x e^{2x}$$? (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 - 4m + 4 = (m-2)^2 = 0$$, so $$m = 2$$ is a repeated root. C.F. is $$(A + Bx)e^{2x}$$ ‚ÄĒ contains BOTH $$e^{2x}$$ AND $$xe^{2x}$$.\n- Step 2: Therefore $$\\lambda e^{2x}$$ gives $$L[y_p] = 0$$ (C.F. term), and $$\\lambda x e^{2x}$$ also gives $$L[y_p] = 0$$ (also C.F. term) ‚ÄĒ neither can equal $$4e^{2x}$$.\n- Step 3: We need to multiply by $$x$$ twice: try $$y_p = \\lambda x^2 e^{2x}$$. This is NOT in the C.F., so $$L[y_p]$$ will be non-zero and we can solve for $$\\lambda$$. Answer: $$\\lambda = 2$$.\n\nTakeaway: For a double root, you need TWO extra factors of $$x$$ in the P.I. ‚ÄĒ multiply by $$x^{\\text{multiplicity}}$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_65"}, {"question": "For a non-homogeneous ODE $$a\\frac{d^2y}{dx^2} + b\\frac{dy}{dx} + cy = f(x)$$, conceptually distinguish between the Complementary Function (C.F.) and the Particular Integral (P.I.) in terms of what physical aspects of the system they represent. (2 steps)", "answer": "- Step 1: The Complementary Function (C.F.) solves the homogeneous equation (where $$f(x) = 0$$). It represents the system's **natural, transient behavior**‚ÄĒhow it responds to its initial conditions when left to its own devices (e.g., natural oscillations and damping). It always contains the arbitrary constants.\n- Step 2: The Particular Integral (P.I.) is any single specific solution to the full non-homogeneous equation. It represents the **forced, steady-state behavior**‚ÄĒhow the system is forced to behave due to the external driving function $$f(x)$$. It contains no arbitrary constants.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_9"}, {"question": "What goes wrong if the trial particular integral $$\\lambda e^{kx}$$ overlaps with the complementary function (i.e. $$k$$ is a root of the auxiliary equation)? How do we fix it? (3 steps)", "answer": "- Step 1: If $$k$$ is a root, then $$e^{kx}$$ satisfies the homogeneous equation: $$ak^2 + bk + c = 0$$, so $$L[e^{kx}] = 0$$. This means $$L[\\lambda e^{kx}] = \\lambda \\cdot 0 = 0$$, which can never equal $$f(x) = pe^{kx} \\neq 0$$.\n- Step 2: The fix: try $$y_p = \\lambda x e^{kx}$$ instead (multiply by $$x$$). This function is NOT a solution of the homogeneous equation (unless $$k$$ is a repeated root), so plugging it in gives a non-zero result that can be equated to $$pe^{kx}$$.\n- Step 3: If $$k$$ is also a repeated root (multiplicity 2), even $$xe^{kx}$$ is already in the C.F., so we need $$\\lambda x^2 e^{kx}$$ ‚ÄĒ multiply by $$x$$ once for each time $$k$$ is a root.\n\nTakeaway: Overlap with the C.F. means the naive trial gives zero; multiplying by $$x$$ \"shifts it out\" of the homogeneous solution space.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_22"}, {"question": "For the DE $$\\frac{d^2y}{dx^2} + 2y\\frac{dy}{dx} = \\ldots$$ ‚ÄĒ wait, what's the fundamental difference between this non-linear DE and a linear one like $$y'' + 2y' + y = 0$$, and why can't we apply auxiliary equation techniques to the non-linear one? (3 steps)", "answer": "- Step 1: A **linear** DE has each term involving $$y$$ or its derivatives to the first power only: $$y$$, $$y'$$, $$y''$$ ‚ÄĒ but never products like $$yy'$$ or $$(y')^2$$ or $$y^2$$.\n- Step 2: The auxiliary-equation method relies on the fact that $$e^{\\lambda x}$$ scales all its derivatives by powers of $$\\lambda$$, and linearity allows us to factor out the $$e^{\\lambda x}$$ and get a polynomial in $$\\lambda$$.\n- Step 3: For non-linear DEs, this factoring fails ‚ÄĒ a product like $$yy'$$ involves $$e^{\\lambda x} \\cdot \\lambda e^{\\lambda x} = \\lambda e^{2\\lambda x}$$, which doesn't combine algebraically with $$e^{\\lambda x}$$ terms. No auxiliary equation exists; different techniques (substitutions, series, numerical methods) are needed.\n\nThe auxiliary-equation technique is a powerful tool *specifically* for linear constant-coefficient equations.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_60"}, {"question": "For $$\\frac{d^2y}{dx^2} + 4\\frac{dy}{dx} = 24x^2$$ (note: constant $$c = 0$$ term missing), what is the correct form of the particular integral and why? (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + 4m = m(m+4) = 0$$, roots $$m = 0, -4$$. C.F. is $$A + Be^{-4x}$$ ‚ÄĒ the constant \"$$A$$\" comes from the $$m = 0$$ root.\n- Step 2: Since the C.F. contains a constant (degree-0 polynomial), the standard polynomial P.I. trial $$\\lambda x^2 + \\mu x + \\nu$$ would overlap in the constant term $$\\nu$$.\n- Step 3: Multiply by $$x$$: try $$y_p = \\lambda x^3 + \\mu x^2 + \\nu x$$. This is a 3-term polynomial with NO constant term (so no overlap). Substituting and matching coefficients of $$x^2, x^1, x^0$$ determines $$\\lambda, \\mu, \\nu$$.\n\nTakeaway: If the auxiliary equation has root $$0$$, the C.F. contains a constant ‚ÄĒ so polynomial P.I.s must be multiplied by $$x$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_47"}, {"question": "A common approach claim: \"If the trial P.I. is in the C.F., just multiply by $$x$$.\" But for the DE $$y'' - 2y' + y = e^x$$, this na√Įve application fails. Explain what happens and how to handle it properly. (4 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 - 2m + 1 = (m-1)^2 = 0$$ has repeated root $$m = 1$$, so C.F. is $$(A + Bx)e^x$$.\n- Step 2: Standard trial $$\\lambda e^x$$ is in the C.F. The na√Įve fix: multiply by $$x$$ to get $$\\lambda xe^x$$.\n- Step 3: But $$xe^x$$ is **also** in the C.F.! (Because of the repeated root, both $$e^x$$ and $$xe^x$$ are homogeneous solutions.) The na√Įve trial is still killed by the operator.\n- Step 4: Proper fix: multiply by $$x^2$$ to get $$\\lambda x^2 e^x$$. This is genuinely outside the C.F. Substituting and computing yields a valid $$\\lambda$$.\n\n**General principle**: For each multiplicity of the offending root in the auxiliary, multiply by an extra factor of $$x$$. Simple root ‚Üí multiply by $$x$$; double root ‚Üí multiply by $$x^2$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_49"}, {"question": "What happens to the solution of $$16\\frac{d^2y}{dx^2} + 8\\frac{dy}{dx} + 5y = 5x + 23$$ as $$x \\to \\infty$$? (2 steps)", "answer": "- Step 1: The complementary function $$e^{-x/4}(A\\cos x + B\\sin x)$$ decays to zero as $$x \\to \\infty$$ because of the exponential decay factor $$e^{-x/4}$$\n- Step 2: Therefore, for large $$x$$, the solution approaches the particular integral, so $$y \\approx x + 3$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_33"}, {"question": "For the substitution $$y = z/x^2$$ in a DE, what structural change to the equation should we expect, and why might someone use this particular substitution? (3 steps)", "answer": "- Step 1: The substitution $$y = z/x^2$$ implies $$z = x^2 y$$, so the equation relating $$z$$ and $$x$$ is obtained by expressing $$y, y', y''$$ in terms of $$z, z', z''$$ using the product rule.\n- Step 2: **Why use it?** When the original DE has variable coefficients involving powers of $$x$$ that suggest $$y$$ itself scales like $$1/x^2$$, this substitution can \"absorb\" the problematic coefficients, producing a simpler equation in $$z$$.\n- Step 3: Typically the transformed equation in $$z$$ has cleaner coefficients ‚ÄĒ often constant ‚ÄĒ enabling standard techniques. The exam will tell you what substitution to use; your job is the algebra.\n\nMore broadly, substitutions $$y = z/x^k$$ or $$y = z \\cdot \\phi(x)$$ aim to **factor out** the \"asymptotic behaviour\" of $$y$$, leaving the residual dynamics in $$z$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_73"}, {"question": "For a P.I., when $$f(x) = p e^{kx}$$ and $$k$$ is NOT a root of the auxiliary equation, confirm that the trial $$y_p = \\lambda e^{kx}$$ gives $$\\lambda = \\frac{p}{ak^2 + bk + c}$$. (3 steps)", "answer": "- Step 1: Substitute $$y_p = \\lambda e^{kx}$$ into $$ay'' + by' + cy = pe^{kx}$$: $$y_p' = \\lambda k e^{kx}$$, $$y_p'' = \\lambda k^2 e^{kx}$$. LHS becomes $$\\lambda e^{kx}(ak^2 + bk + c)$$.\n- Step 2: Equate to RHS: $$\\lambda e^{kx}(ak^2 + bk + c) = pe^{kx}$$. Cancel $$e^{kx}$$: $$\\lambda (ak^2 + bk + c) = p$$.\n- Step 3: Solve for $$\\lambda$$: $$\\lambda = \\frac{p}{ak^2 + bk + c}$$. Well-defined precisely when $$ak^2 + bk + c \\neq 0$$ ‚ÄĒ i.e. when $$k$$ is NOT a root. If $$k$$ IS a root, the denominator vanishes, and we must use a modified trial.\n\nTakeaway: The formula $$\\lambda = \\frac{p}{\\text{aux}(k)}$$ works unless $$k$$ is a root (then C.F.-overlap modification kicks in).", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_63"}, {"question": "The substitution $$z = y^2$$ can transform certain first-order DEs. Conceptually, why might this substitution be useful, and what class of equations does it often solve? (3 steps)", "answer": "- Step 1: If $$z = y^2$$, then $$\\frac{dz}{dx} = 2y\\frac{dy}{dx}$$. This \"absorbs\" a factor of $$y\\frac{dy}{dx}$$ from the original DE into a single derivative of $$z$$.\n- Step 2: Equations of the form $$yy' + (\\text{functions of x}) y^2 = (\\text{functions of x})$$ can be rewritten in terms of $$z, z', x$$, typically as linear first-order equations in $$z$$, solvable with an integrating factor.\n- Step 3: This is a manifestation of a general principle: \"quadratic in $$y$$\" structures often linearise under a power substitution. Similar trick works for Bernoulli equations $$y' + Py = Qy^n$$, where $$z = y^{1-n}$$ linearises them.\n\nTakeaway: Power substitutions linearise equations that are \"polynomial in $$y$$\" ‚ÄĒ part of the broader Bernoulli class.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_69"}, {"question": "What is a non-homogeneous second-order linear differential equation, and how does its structure differ from the homogeneous version? (3 steps)", "answer": "- Step 1: A non-homogeneous 2nd-order linear DE has the form $$ay'' + by' + cy = f(x)$$ where the right-hand side $$f(x)$$ is not identically zero.\n- Step 2: Key difference: in the homogeneous case ($$f = 0$$), any linear combination of solutions is still a solution. In the non-homogeneous case, the sum of two solutions satisfies $$L[y_1 + y_2] = 2f(x)$$, not $$f(x)$$ ‚ÄĒ so linear superposition doesn't directly give new solutions.\n- Step 3: Instead, solutions decompose as \"general solution of homogeneous + one particular solution of non-homogeneous.\" The non-homogeneous term $$f(x)$$ is often called the \"forcing function\" ‚ÄĒ an external driver of the system.\n\nTakeaway: Non-zero RHS = \"forced\" equation; solutions = homogeneous solutions + a particular response to the forcing.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_18"}, {"question": "When you see a second-order DE and need to decide which substitution to try, what cues guide the choice? (3 scenarios)", "answer": "- Step 1: **Look at the coefficients' pattern**:\n+ $$x^2 y''$$ + $$xy'$$ + $$y$$ patterns (Cauchy-Euler) ‚Üí use $$x = e^u$$.\n+ Coefficients involving $$\\sin, \\cos$$ ‚Üí try $$z = \\sin x$$ or $$z = \\cos x$$.\n- Step 2: **Look at what the problem hints at**: exam questions often tell you \"use the substitution...\". Take it as a gift ‚ÄĒ your job is to execute the algebra correctly.\n- Step 3: **Goal-directed substitutions**:\n+ $$y = z/x^n$$ ‚ÄĒ useful when the original DE has variable coefficients that simplify if $$y$$ is scaled by a power of $$x$$.\n+ $$u = dy/dx$$ ‚ÄĒ reduces a 2nd-order DE missing $$y$$ to a 1st-order DE in $$u$$.\n\n**Deep principle**: substitutions exploit *hidden structure* ‚ÄĒ scaling, symmetry, or natural coordinates ‚ÄĒ embedded in the original equation.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_34"}, {"question": "For a damped non-homogeneous system modeled by $$y'' + 5y' + 6y = 10$$, what does the solution approximate as $$x \\to \\infty$$? Explain why the C.F. terms vanish. (2 steps)", "answer": "- Step 1: The solution is $$y = \\text{C.F.} + \\text{P.I.}$$. The C.F. solves $$m^2 + 5m + 6 = 0$$, giving roots $$m = -2, -3$$. Thus, the C.F. is $$Ae^{-2x} + Be^{-3x}$$. As $$x \\to \\infty$$, these exponential terms decay to zero because the roots are negative (representing dissipation/damping).\n- Step 2: The P.I. for a constant $$10$$ is just a constant $$\\lambda$$. Substituting gives $$6\\lambda = 10 \\implies \\lambda = \\frac{5}{3}$$. Since the C.F. (transient) dies out, the long-term behavior (steady-state) is dominated entirely by the P.I., meaning $$y \\approx \\frac{5}{3}$$ as $$x \\to \\infty$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_15"}, {"question": "A student tries to solve $$\\frac{d^2y}{dx^2} - 4y = e^{2x}$$ and obtains $$y = Ae^{2x} + Be^{-2x} + \\frac{1}{4}e^{2x}$$. Is this correct? If not, identify the error. (3 steps)", "answer": "- Step 1: This is NOT correct. The auxiliary equation is $$m^2 - 4 = 0$$ ‚Üí $$m = \\pm 2$$, so C.F. = $$Ae^{2x} + Be^{-2x}$$\n- Step 2: The student used $$y = \\lambda e^{2x}$$ as the P.I. form, but $$e^{2x}$$ is already in the C.F.! This term would give zero on the LHS\n- Step 3: The correct approach is to multiply by $$x$$: try $$y = \\lambda x e^{2x}$$. Substituting gives $$\\lambda = \\frac{1}{4}$$, so the correct solution is $$y = Ae^{2x} + Be^{-2x} + \\frac{1}{4}x e^{2x}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_52"}, {"question": "Why is the complementary function's role analogous to a \"homogeneous coordinate system\" that helps express the full solution of a non-homogeneous equation? (3 steps)", "answer": "- Step 1: The C.F. is a 2-dimensional vector space (spanned by two linearly independent solutions). Every element $$y_c$$ in this space satisfies the homogeneous equation.\n- Step 2: The set of all solutions to the non-homogeneous equation is an **affine translate** of this vector space ‚ÄĒ like a plane that doesn't pass through the origin. Pick any point on it ($$y_p$$, the P.I.), and you can reach every other point by adding something from the C.F.\n- Step 3: The P.I. provides a fixed \"reference point\" in the solution set; the C.F. provides all the \"directions\" you can move from there. Together they parametrise the full affine solution set.\n\nBoundary conditions then pick out the specific point in the affine set that satisfies your constraints.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_57"}, {"question": "Conceptually, why is the substitution $$u = \\frac{dy}{dx}$$ useful for DEs where $$y$$ does not appear explicitly, such as $$x \\frac{d^2 y}{dx^2} + \\frac{dy}{dx} = 12x$$? (3 steps)", "answer": "- Step 1: The equation contains $$\\frac{d^2 y}{dx^2}$$ and $$\\frac{dy}{dx}$$, but NOT $$y$$ itself. Letting $$u = \\frac{dy}{dx}$$ means $$\\frac{du}{dx} = \\frac{d^2 y}{dx^2}$$.\n- Step 2: Substituting, the 2nd-order DE in $$y$$ becomes a 1st-order DE in $$u$$: $$x\\frac{du}{dx} + u = 12x$$ ‚ÄĒ a much easier problem (linear first-order).\n- Step 3: Solve for $$u$$ as a function of $$x$$, then integrate one more time to recover $$y = \\int u\\,dx$$ ‚ÄĒ yielding a general solution with two arbitrary constants.\n\nTakeaway: If $$y$$ is missing from the DE, setting $$u = y'$$ drops the order by one ‚ÄĒ a classic \"order-reduction\" trick.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_48"}, {"question": "For a non-homogeneous DE, is the particular integral unique? Explain. (3 steps)", "answer": "- Step 1: No ‚ÄĒ the particular integral is not unique. If $$y_p$$ is any particular solution and $$y_h$$ is any homogeneous solution, then $$y_p + y_h$$ is also a particular solution: $$L[y_p + y_h] = L[y_p] + L[y_h] = f + 0 = f$$.\n- Step 2: So there are infinitely many possible P.I.s, differing from each other by C.F. contributions.\n- Step 3: However, the final general solution $$y = \\text{C.F.} + \\text{P.I.}$$ is the same regardless of which P.I. you pick ‚ÄĒ the \"extra\" C.F. piece just gets absorbed into the arbitrary constants of the C.F. term. That's why we only need to find ONE P.I.\n\nTakeaway: Many P.I.s exist; they differ by C.F. pieces, but the final general solution is unique.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_26"}, {"question": "In solving $$\\frac{d^2y}{dx^2} - 4\\frac{dy}{dx} + 4y = 4e^{2x}$$ with the P.I. trial $$\\lambda x^2 e^{2x}$$, what is the key reason that the P.I. must be $$\\propto x^2 e^{2x}$$ specifically, not $$x^2$$ or $$x^2 e^x$$ or anything else? (3 steps)", "answer": "- Step 1: The P.I. trial form must match the **functional shape of the RHS**, $$e^{2x}$$, so that after applying the linear operator, we produce something of that same shape to match the RHS.\n- Step 2: Polynomial factors ($$x^2$$) are added because of the C.F. conflict ‚ÄĒ $$e^{2x}$$ and $$xe^{2x}$$ are already in C.F. (from the repeated root $$m=2$$).\n- Step 3: Any other functional factor (like $$x^2 e^x$$) would not, under the operator $$L$$, produce $$e^{2x}$$ on the RHS ‚ÄĒ it would produce $$e^x$$ or something else entirely, mismatching the required forcing.\n\n**General rule**: the trial P.I. combines the RHS's functional shape ($$e^{2x}$$) with the minimum polynomial factor needed to escape the C.F.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_64"}, {"question": "A spring-mass system is modelled by $$\\ddot{x} + \\dot{x} + 25x = 0$$. Is this over-, under-, or critically damped, and what does the solution look like? (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + m + 25 = 0$$. Discriminant $$= 1 - 100 = -99 < 0$$, so complex conjugate roots.\n- Step 2: Roots: $$m = -\\frac{1}{2} \\pm \\frac{\\sqrt{99}}{2}i$$. Real part negative ($$-1/2$$), imaginary part $$\\approx 4.97$$.\n- Step 3: Underdamped. Solution $$x = e^{-t/2}\\left(A\\cos(\\tfrac{\\sqrt{99}}{2}t) + B\\sin(\\tfrac{\\sqrt{99}}{2}t)\\right)$$ oscillates at angular frequency $$\\approx 5$$ while amplitude envelope $$e^{-t/2}$$ decays ‚ÄĒ mass oscillates back and forth several times before motion dies out.\n\nTakeaway: Underdamped systems oscillate at a frequency slightly less than the undamped natural frequency, with exponentially decaying amplitude.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_79"}, {"question": "Given the general solution $$y = Ae^{3x} + Be^{-3x} + x^2 + 2x + 1$$, identify the C.F., the P.I., and the corresponding auxiliary equation. (3 steps)", "answer": "- Step 1: Terms with arbitrary constants are the C.F.: $$y_c = Ae^{3x} + Be^{-3x}$$. Remaining terms form the P.I.: $$y_p = x^2 + 2x + 1$$.\n- Step 2: The C.F. form $$Ae^{3x} + Be^{-3x}$$ indicates two distinct real roots $$m = \\pm 3$$. Auxiliary equation: $$(m-3)(m+3) = m^2 - 9 = 0$$.\n- Step 3: The homogeneous DE is $$\\frac{d^2y}{dx^2} - 9y = 0$$, or with the P.I.: $$\\frac{d^2y}{dx^2} - 9y = f(x)$$ where substituting gives $$f(x) = 2 - 9(x^2 + 2x + 1) = -9x^2 - 18x - 7$$.\n\nTakeaway: Reading off the C.F. structure gives you the auxiliary roots; everything else in the general solution is the P.I.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_77"}, {"question": "Interpret the differential equation $$a\\frac{d^2y}{dt^2} + b\\frac{dy}{dt} + cy = 0$$ as a damped mass-on-spring system. What do $$a$$, $$b$$, $$c$$ physically represent, and how do the three cases map to physical regimes? (3 steps)", "answer": "- Step 1: Identify the physics: $$a$$ is **mass** (inertia); $$b$$ is the **damping coefficient** (friction proportional to velocity); $$c$$ is the **spring stiffness** (restoring force proportional to displacement). So the equation is Newton's second law: $$ma + b v + cx = 0$$.\n- Step 2: The discriminant $$b^2 - 4ac$$ compares damping-squared against the product of inertia and stiffness:\n+ $$b^2 > 4ac$$ (**overdamped**): Large friction dominates; system returns to equilibrium slowly without oscillating ‚ÄĒ two decaying exponentials.\n+ $$b^2 = 4ac$$ (**critically damped**): Fastest return to equilibrium with no overshoot ‚ÄĒ the borderline case.\n+ $$b^2 < 4ac$$ (**underdamped**): Friction too weak to prevent oscillation; system oscillates with decaying amplitude $$e^{px}$$, $$p<0$$.\n- Step 3: The special case $$b = 0$$ (no friction) gives $$p = 0$$, i.e. pure undamped SHM. This beautifully connects the mathematical structure of the auxiliary equation to intuitive physical behaviour.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_9"}, {"question": "Without solving for constants, write down the general form of the solution for $$y'' + 9y = \\cos 3x$$. (2 steps)", "answer": "- Step 1: Find the C.F. The auxiliary equation is $$m^2 + 9 = 0 \\implies m = \\pm 3i$$. Thus, C.F. = $$A\\cos 3x + B\\sin 3x$$.\n- Step 2: Find the P.I. form. The RHS is $$\\cos 3x$$. Normally we guess $$\\lambda \\cos 3x + \\mu \\sin 3x$$, but this is entirely contained in the C.F. We must multiply by $$x$$ to avoid resonance. The P.I. form is $$x(\\lambda \\cos 3x + \\mu \\
