ler equation). The substitution $$x = e^u$$ (or equivalently $$u = \\ln x$$) transforms it into a linear differential equation with constant coefficients.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_19", "judge_pick": false}, {"question": "The auxiliary equation of a homogeneous second-order ODE has roots $$m_1$$ and $$m_2$$. Under what condition does the system exhibit overdamping, underdamping, and critical damping? (2 steps)", "answer": "- Step 1: Let the ODE be $$\\frac{d^2y}{dt^2} + 2k\\frac{dy}{dt} + \\omega_0^2 y = 0$$. The auxiliary equation is $$m^2 + 2km + \\omega_0^2 = 0$$ with discriminant $$D = 4(k^2 - \\omega_0^2)$$\n- Step 2: Overdamping: $$k > \\omega_0$$ (two distinct real roots, system returns to equilibrium without oscillating). Underdamping: $$k < \\omega_0$$ (complex conjugate roots, system oscillates with decaying amplitude). Critical damping: $$k = \\omega_0$$ (equal real roots, fastest return without oscillating).", "source": "MiniMax ‚Ď†", "_id": "minimax_1_20", "judge_pick": false}, {"question": "For the non-homogeneous equation $$\\frac{d^2y}{dx^2} - 4\\frac{dy}{dx} + 4y = 4e^{2x}$$, explain why neither $$\\lambda e^{2x}$$ nor $$\\lambda x e^{2x}$$ can be used as a particular integral. (3 steps)", "answer": "- Step 1: The auxiliary equation is $$m^2 - 4m + 4 = 0$$ ‚Üí $$(m-2)^2 = 0$$, giving a repeated root $$m = 2$$\n- Step 2: The complementary function is $$y = (A + Bx)e^{2x}$$, which already contains both $$e^{2x}$$ and $$xe^{2x}$$\n- Step 3: Both $$\\lambda e^{2x}$$ and $$\\lambda x e^{2x}$$ would satisfy the homogeneous equation (giving zero on the LHS), so neither can produce the required $$4e^{2x}$$ on the RHS. We need to multiply by $$x^2$$: try $$y = \\lambda x^2 e^{2x}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_21", "judge_pick": false}, {"question": "What is the principle of superposition for linear differential equations? (1 step)", "answer": "- If $$y = f(x)$$ and $$y = g(x)$$ are both solutions to the homogeneous linear differential equation $$ay'' + by' + cy = 0$$, then $$y = Af(x) + Bg(x)$$ (where $$A$$ and $$B$$ are constants) is also a solution. This is because linear combinations of solutions to linear homogeneous equations are also solutions.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Find the general solution to $$\\frac{d^2y}{dx^2} + 4\\frac{dy}{dx} = 24x^2$$. (4 steps)", "answer": "- Step 1: C.F.: solve $$m^2 + 4m = 0$$ ‚Üí $$m(m+4) = 0$$ ‚Üí $$m = 0, -4$$. So C.F. = $$A + Be^{-4x}$$\n- Step 2: For P.I., since RHS is $$24x^2$$, try $$y = \\lambda x^2 + \\mu x + \\nu$$\n- Step 3: Then $$\\frac{dy}{dx} = 2\\lambda x + \\mu$$, $$\\frac{d^2y}{dx^2} = 2\\lambda$$. Substitute: $$2\\lambda + 4(2\\lambda x + \\mu) = 24x^2$$\n- Step 4: This gives no $$x^2$$ term on LHS! There's a mismatch. Actually, since C.F. has a constant, we need to multiply by $$x$$: try $$y = \\lambda x^3 + \\mu x^2 + \\nu x$$. Solving gives $$\\lambda = 2$$, $$\\mu = -3$$, $$\\nu = \\frac{3}{2}$$. General solution: $$y = A + Be^{-4x} + 2x^3 - 3x^2 + \\frac{3}{2}x$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_23", "judge_pick": false}, {"question": "For the differential equation $$\\frac{d^2x}{dt^2} + x = 3\\sin 2t$$ with initial conditions $$x = 0$$ and $$\\frac{dx}{dt} = 1$$ at $$t = 0$$, find the particular solution. (4 steps)", "answer": "- Step 1: C.F.: solve $$m^2 + 1 = 0$$ ‚Üí $$m = \\pm i$$. So C.F. = $$A\\cos t + B\\sin t$$\n- Step 2: P.I.: try $$x = \\lambda \\sin 2t$$ (given form). Then $$\\frac{dx}{dt} = 2\\lambda \\cos 2t$$, $$\\frac{d^2x}{dt^2} = -4\\lambda \\sin 2t$$\n- Step 3: Substitute: $$-4\\lambda \\sin 2t + \\lambda \\sin 2t = 3\\sin 2t$$ ‚Üí $$-3\\lambda = 3$$ ‚Üí $$\\lambda = -1$$. So P.I. = $$-\\sin 2t$$\n- Step 4: General: $$x = A\\cos t + B\\sin t - \\sin 2t$$. Using $$x(0) = 0$$: $$0 = A$$. Using $$x'(0) = 1$$: $$x' = -A\\sin t + B\\cos t - 2\\cos 2t$$, so $$1 = B - 2$$ ‚Üí $$B = 3$$. Solution: $$x = 3\\sin t - \\sin 2t$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A mass-spring system is modeled by $$\\frac{d^2x}{dt^2} + 2k\\frac{dx}{dt} + 9x = 0$$. Describe the motion for cases: (i) $$k > 3$$, (ii) $$k < 3$$, (iii) $$k = 3$$. (3 steps)", "answer": "- Step 1: The auxiliary equation is $$m^2 + 2km + 9 = 0$$ with discriminant $$4(k^2 - 9)$$\n- Step 2: (i) If $$k > 3$$: two distinct real negative roots ‚Üí overdamped ‚Üí exponential decay to equilibrium without oscillation. (ii) If $$k < 3$$: complex roots with negative real part ‚Üí underdamped ‚Üí oscillatory decay (damped simple harmonic motion). (iii) If $$k = 3$$: repeated real root ‚Üí critically damped ‚Üí fastest return to equilibrium without oscillation.\n- Step 3: For large $$t$$, all cases approach zero (equilibrium), but the rate and oscillatory nature differ.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_25", "judge_pick": false}, {"question": "When solving $$x^2\\frac{d^2y}{dx^2} + 6x\\frac{dy}{dx} + 4y = 0$$ using $$x = e^u$$, what is the transformed equation and its solution? (3 steps)", "answer": "- Step 1: Using substitutions: $$x\\frac{dy}{dx} = \\frac{dy}{du}$$, $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$\n- Step 2: The equation becomes: $$(\\frac{d^2y}{du^2} - \\frac{dy}{du}) + 6\\frac{dy}{du} + 4y = 0$$ ‚Üí $$\\frac{d^2y}{du^2} + 5\\frac{dy}{du} + 4y = 0$$\n- Step 3: Auxiliary: $$m^2 + 5m + 4 = 0$$ ‚Üí $$(m+1)(m+4) = 0$$ ‚Üí $$m = -1, -4$$. So $$y = Ae^{-u} + Be^{-4u} = Ax^{-1} + Bx^{-4}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Why might we choose the substitution $$y = \\frac{z}{x}$$ in a differential equation, and what does it accomplish? (2 steps)", "answer": "- Step 1: This substitution is useful when the original equation contains terms that simplify when divided by $$x$$. It effectively reduces the order or simplifies the coefficients.\n- Step 2: For example, in the equation $$x^2y'' + (2-4x)y' - 4y = 0$$, substituting $$y = \\frac{z}{x}$$ transforms it into $$z'' - 4z' = 0$$, which is a first-order equation in $$z'$$ and easily solvable.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_27", "judge_pick": false}, {"question": "For the equation $$\\frac{d^2y}{dx^2} + k^2 y = 0$$ with initial conditions $$y(0) = 1$$ and $$y'(0) = 1$$, find the solution in terms of $$k$$. (3 steps)", "answer": "- Step 1: The auxiliary equation is $$m^2 + k^2 = 0$$ ‚Üí $$m = \\pm ik$$. So C.F. = $$A\\cos(kx) + B\\sin(kx)$$\n- Step 2: Using $$y(0) = 1$$: $$A = 1$$\n- Step 3: Using $$y'(0) = 1$$: $$y' = -Ak\\sin(kx) + Bk\\cos(kx)$$, so $$y'(0) = Bk = 1$$ ‚Üí $$B = \\frac{1}{k}$$. Solution: $$y = \\cos(kx) + \\frac{1}{k}\\sin(kx)$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_28", "judge_pick": false}, {"question": "What is a \"particular integral\" in the context of solving non-homogeneous differential equations, and why do we need to find one? (2 steps)", "answer": "- Step 1: A particular integral is a specific function $$y_p$$ that satisfies the full non-homogeneous equation $$ay'' + by' + cy = f(x)$$. It's not the general solution ‚ÄĒ it's one particular solution.\n- Step 2: The general solution to a non-homogeneous ODE is the sum of the complementary function (the general solution to the homogeneous part) and any particular integral: $$y = y_c + y_p$$. The C.F. captures all homogeneous solutions, and the P.I. captures the effect of the forcing function.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In the table of particular integral forms, if $$f(x) = 5\\cos 2x + 3\\sin 2x$$, what form would you try for the particular integral? (1 step)", "answer": "- You would try $$y = \\lambda \\cos 2x + \\mu \\sin 2x$$, using the same angular frequency ($$2$$) as the forcing function, with undetermined coefficients $$\\lambda$$ and $$\\mu$$.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_30", "judge_pick": false}, {"question": "Explain why the case $$b^2 < 4ac$$ in the auxiliary equation leads to oscillatory solutions (trigonometric functions), while $$b^2 > 4ac$$ leads to non-oscillatory (exponential) solutions. (2 steps)", "answer": "- Step 1: When $$b^2 < 4ac$$, the discriminant is negative, giving complex conjugate roots $$m = p \\pm iq$$. Using Euler's formula, $$e^{(p+iq)x} = e^{px}(\\cos qx + i\\sin qx)$$, which produces sinusoidal oscillations with exponential envelope if $$p \\neq 0$$.\n- Step 2: When $$b^2 > 4ac$$, the discriminant is positive, giving two distinct real roots. The solution is a linear combination of pure exponentials $$Ae^{\\alpha x} + Be^{\\beta x}$$, which are monotonic functions ‚ÄĒ no oscillation occurs.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Find the general solution to $$16\\frac{d^2y}{dx^2} + 8\\frac{dy}{dx} + 5y = 5x + 23$$. (4 steps)", "answer": "- Step 1: C.F.: solve $$16m^2 + 8m + 5 = 0$$. Using quadratic formula: $$m = \\frac{-8 \\pm \\sqrt{64 - 320}}{32} = \\frac{-8 \\pm \\sqrt{-256}}{32} = -\\frac{1}{4} \\pm i$$. So C.F. = $$e^{-x/4}(A\\cos x + B\\sin x)$$\n- Step 2: For RHS $$5x + 23$$ (linear), try P.I. = $$\\lambda x + \\mu$$\n- Step 3: Then $$y' = \\lambda$$, $$y'' = 0$$. Substituting: $$8\\lambda + 5(\\lambda x + \\mu) = 5x + 23$$ ‚Üí $$5\\lambda x + (8\\lambda + 5\\mu) = 5x + 23$$\n- Step 4: Equating: $$5\\lambda = 5$$ ‚Üí $$\\lambda = 1$$; $$8(1) + 5\\mu = 23$$ ‚Üí $$\\mu = 3$$. So P.I. = $$x + 3$$. General solution: $$y = e^{-x/4}(A\\cos x + B\\sin x) + x + 3$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_32", "judge_pick": false}, {"question": "What happens to the solution of $$16\\frac{d^2y}{dx^2} + 8\\frac{dy}{dx} + 5y = 5x + 23$$ as $$x \\to \\infty$$? (2 steps)", "answer": "- Step 1: The complementary function $$e^{-x/4}(A\\cos x + B\\sin x)$$ decays to zero as $$x \\to \\infty$$ because of the exponential decay factor $$e^{-x/4}$$\n- Step 2: Therefore, for large $$x$$, the solution approaches the particular integral, so $$y \\approx x + 3$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_33", "judge_pick": true}, {"question": "For the differential equation $$\\frac{d^2y}{dx^2} - \\frac{dy}{dx} - 6y = 3\\sin 3x - 2\\cos 3x$$, find a suitable form for the particular integral. (2 steps)", "answer": "- Step 1: The RHS is a linear combination of $$\\sin 3x$$ and $$\\cos 3x$$. Try P.I. in the form $$y = \\lambda \\sin 3x + \\mu \\cos 3x$$\n- Step 2: This is safe because the C.F. will involve exponentials (roots from $$m^2 - m - 6 = 0$$ ‚Üí $$m = 3, -2$$), not trigonometric functions, so there's no overlap to worry about.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_34", "judge_pick": false}, {"question": "The differential equation $$\\frac{d^2x}{dt^2} + 8\\frac{dx}{dt} + 16x = \\cos 4t$$ models a forced damped system. What is the complementary function and what behavior does it represent? (3 steps)", "answer": "- Step 1: Solve the homogeneous equation: $$\\frac{d^2x}{dt^2} + 8\\frac{dx}{dt} + 16x = 0$$. Auxiliary: $$m^2 + 8m + 16 = 0$$ ‚Üí $$(m+4)^2 = 0$$ ‚Üí $$m = -4$$ (repeated)\n- Step 2: C.F. = $$(A + Bt)e^{-4t}$$\n- Step 3: This represents the transient response ‚ÄĒ the system's natural response that dies out over time due to the damping (exponential decay). The particular integral represents the steady-state forced response at frequency 4.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_35", "judge_pick": false}, {"question": "Using the substitution $$z = \\sin x$$, show how to transform $$\\cos x \\frac{d^2y}{dx^2} + \\sin x \\frac{dy}{dx} - 2y\\cos^3 x = 2\\cos^5 x$$ into a simpler form. (3 steps)", "answer": "- Step 1: Given $$z = \\sin x$$, we have $$\\frac{dz}{dx} = \\cos x$$ and $$\\frac{d^2z}{dx^2} = -\\sin x$$\n- Step 2: Using chain rule: $$\\frac{dy}{dx} = \\frac{dy}{dz} \\cdot \\frac{dz}{dx} = \\cos x \\frac{dy}{dz}$$\n- Step 3: And $$\\frac{d^2y}{dx^2} = \\frac{d}{dx}\\left(\\cos x \\frac{dy}{dz}\\right) = -\\sin x \\frac{dy}{dz} + \\cos^2 x \\frac{d^2y}{dz^2}$$. Substituting these into the original equation and simplifying gives $$\\frac{d^2y}{dz^2} - 2y = 2(1 - z^2)$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_36", "judge_pick": false}, {"question": "Why is it important to check whether the \"standard\" form of a particular integral overlaps with terms in the complementary function before substituting? (2 steps)", "answer": "- Step 1: If the trial P.I. form is already a solution to the homogeneous equation (i.e., it's part of the C.F.), then substituting it will give zero on the LHS, not the required $$f(x)$$ on the RHS\n- Step 2: This would make it impossible to find coefficients to satisfy the equation. The remedy is to multiply the trial P.I. by $$x$$ (or $$x^2$$ for repeated roots) to make it linearly independent from the C.F. terms.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Find the particular solution to $$\\frac{d^2y}{dx^2} + 9y = \\sin 3x$$ with $$y = 0$$ and $$y' = 0$$ at $$x = 0$$. Why does this exhibit \"resonance\"? (4 steps)", "answer": "- Step 1: C.F.: $$m^2 + 9 = 0$$ ‚Üí $$m = \\pm 3i$$, so C.F. = $$A\\cos 3x + B\\sin 3x$$\n- Step 2: P.I. try $$y = \\lambda x \\cos 3x + \\mu x \\sin 3x$$ (since $$\\sin 3x$$ is in C.F., multiply by $$x$$)\n- Step 3: Solving gives P.I. = $$-\\frac{x}{6}\\cos 3x$$. General: $$y = A\\cos 3x + B\\sin 3x - \\frac{x}{6}\\cos 3x$$\n- Step 4: Using conditions: $$A = 0$$, $$B = \\frac{1}{6}$$. Solution: $$y = \\frac{1}{6}\\sin 3x - \\frac{x}{6}\\cos 3x$$. The term $$-\\frac{x}{6}\\cos 3x$$ grows unbounded ‚ÄĒ this is resonance, where the forcing frequency equals the natural frequency, causing ever-increasing amplitude.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_38", "judge_pick": true}, {"question": "What is the general solution of the reducible second-order ODE $$\\frac{d^2y}{dx^2} = \\left(\\frac{dy}{dx}\\right)^2$$? (3 steps)", "answer": "- Step 1: Let $$u = \\frac{dy}{dx}$$, then $$\\frac{du}{dx} = u^2$$. This is separable: $$\\frac{du}{u^2} = dx$$\n- Step 2: Integrating: $$-\\frac{1}{u} = x + C_1$$, so $$\\frac{dy}{dx} = -\\frac{1}{x + C_1}$$\n- Step 3: Integrating again: $$y = -\\ln|x + C_1| + C_2$$. Letting $$C_1 = B$$ and $$C_2 = A$$, we get $$y = A - \\ln|x + B|$$, which can be written as $$y = A - \\ln(x + B)$$ for $$x + B > 0$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_39", "judge_pick": false}, {"question": "For the differential equation $$x^2\\frac{d^2y}{dx^2} + 4x\\frac{dy}{dx} + 2y = \\ln x$$ ($$x > 0$$), find the general solution using $$x = e^u$$. (4 steps)", "answer": "- Step 1: Substitute: $$x^2y'' = y''_u - y'_u$$, $$xy' = y'_u$$. The equation becomes: $$(y''_u - y'_u) + 4y'_u + 2y = \\ln(e^u) = u$$ ‚Üí $$y''_u + 3y'_u + 2y = u$$\n- Step 2: C.F.: solve $$m^2 + 3m + 2 = 0$$ ‚Üí $$(m+1)(m+2) = 0$$ ‚Üí $$m = -1, -2$$. So C.F. = $$Ae^{-u} + Be^{-2u}$$\n- Step 3: For P.I., since RHS is linear ($$u$$), try $$y = \\lambda u + \\mu$$. But C.F. has no constant term overlap, so this works. Substituting gives $$\\lambda = \\frac{1}{2}$$, $$\\mu = -\\frac{3}{4}$$. P.I. = $$\\frac{u}{2} - \\frac{3}{4}$$\n- Step 4: General solution in $$u$$: $$y = Ae^{-u} + Be^{-2u} + \\frac{u}{2} - \\frac{3}{4}$$. Converting back: $$y = Ax^{-1} + Bx^{-2} + \\frac{1}{2}\\ln x - \\frac{3}{4}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Explain why the differential equation $$\\frac{d^2y}{dx^2} + y = 0$$ has periodic solutions while $$\\frac{d^2y}{dx^2} - y = 0$$ does not, even though they differ only in the sign of one term. (2 steps)", "answer": "- Step 1: For $$y'' + y = 0$$, the auxiliary equation is $$m^2 + 1 = 0$$, giving pure imaginary roots $$\\pm i$$. The solution is $$y = A\\cos x + B\\sin x$$ ‚ÄĒ periodic with period $$2\\pi$$\n- Step 2: For $$y'' - y = 0$$, the auxiliary equation is $$m^2 - 1 = 0$$, giving real roots $$\\pm 1$$. The solution is $$y = Ae^x + Be^{-x}$$ ‚ÄĒ exponential growth/decay, no periodicity. The sign change switches between oscillatory and non-oscillatory behavior.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_41", "judge_pick": true}, {"question": "What are the three cases for the roots of the auxiliary equation, and how do you determine which case applies without fully solving? (2 steps)", "answer": "- Step 1: Compute the discriminant $$\\Delta = b^2 - 4ac$$ from the auxiliary equation $$am^2 + bm + c = 0$$\n- Step 2: If $$\\Delta > 0$$: two distinct real roots ‚Üí exponential solution. If $$\\Delta = 0$$: one repeated real root ‚Üí exponential times polynomial ($$xe^{\\alpha x}$$). If $$\\Delta < 0$$: complex conjugate roots ‚Üí sinusoidal solution with possible exponential envelope.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_42", "judge_pick": false}, {"question": "A second-order ODE is given as $$\\frac{d^2y}{dx^2} + 2\\frac{dy}{dx} + 5y = e^{-x}\\cos 2x$$. Describe how you would find a particular integral for this equation. (3 steps)", "answer": "- Step 1: The C.F. comes from $$m^2 + 2m + 5 = 0$$ ‚Üí $$m = -1 \\pm 2i$$, giving $$e^{-x}(A\\cos 2x + B\\sin 2x)$$\n- Step 2: The RHS is $$e^{-x}\\cos 2x$$. This has the same form as part of the C.F. (same exponential decay and oscillation frequency)\n- Step 3: Since there's overlap, we need to multiply by $$x$$. Try P.I. in the form $$y = \\lambda x e^{-x}\\cos 2x + \\mu x e^{-x}\\sin 2x$$. Substitute and solve for $$\\lambda$$ and $$\\mu$$.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_43", "judge_pick": false}, {"question": "For the equation $$\\frac{d^2y}{dx^2} + 4y = \\sin x$$ with boundary conditions $$y(0) = 0$$ and $$y(\\pi) = 0$$, how many solutions exist? Explain. (3 steps)", "answer": "- Step 1: C.F.: $$m^2 + 4 = 0$$ ‚Üí $$m = \\pm 2i$$, so C.F. = $$A\\cos 2x + B\\sin 2x$$\n- Step 2: For P.I., try $$y = \\lambda \\sin x + \\mu \\cos x$$. Substituting gives $$\\lambda = \\frac{1}{3}$$, $$\\mu = 0$$. So P.I. = $$\\frac{1}{3}\\sin x$$\n- Step 3: General solution: $$y = A\\cos 2x + B\\sin 2x + \\frac{1}{3}\\sin x$$. Applying both boundary conditions gives two equations in $$A$$ and $$B$$. There will be a unique solution (or none, depending on consistency), not infinite, because we have two conditions for two unknowns.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_44", "judge_pick": false}, {"question": "What is meant by the \"order\" of a differential equation, and why is the order important for the number of arbitrary constants in the general solution? (1 step)", "answer": "- The order of a differential equation is the highest order derivative that appears. For a linear ODE, the general solution contains as many arbitrary constants as the order. Thus a second-order equation needs two constants, which is why we need two boundary conditions to find a unique particular solution.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_45", "judge_pick": false}, {"question": "In the context of mechanical vibrations modeled by second-order ODEs, what physical quantity does each term in $$m\\frac{d^2x}{dt^2} + c\\frac{dx}{dt} + kx = F\\cos(\\omega t)$$ represent? (2 steps)", "answer": "- Step 1: $$m$$ is the mass (inertia), $$c$$ is the damping coefficient, $$k$$ is the spring constant (restoring force), and $$F\\cos(\\omega t)$$ is the external periodic force\n- Step 2: The equation represents a forced damped harmonic oscillator. The left-hand side describes the system's natural behavior, while the right-hand side drives the system at frequency $$\\omega$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_46", "judge_pick": false}, {"question": "For the equation $$\\frac{d^2y}{dx^2} + \\frac{dy}{dx} + y = 0$$, find the general solution. (3 steps)", "answer": "- Step 1: The auxiliary equation is $$m^2 + m + 1 = 0$$\n- Step 2: Using the quadratic formula: $$m = \\frac{-1 \\pm \\sqrt{1-4}}{2} = \\frac{-1 \\pm i\\sqrt{3}}{2}$$\n- Step 3: So $$p = -\\frac{1}{2}$$, $$q = \\frac{\\sqrt{3}}{2}$$. The general solution is $$y = e^{-x/2}\\left(A\\cos\\frac{\\sqrt{3}}{2}x + B\\sin\\frac{\\sqrt{3}}{2}x\\right)$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_47", "judge_pick": false}, {"question": "What modification to the particular integral is needed if the forcing term is of the form $$P(x)e^{kx}$$ where $$k$$ is a root of the auxiliary equation? (2 steps)", "answer": "- Step 1: If $$k$$ is a simple root of the auxiliary equation (appears once in the C.F.), multiply the standard trial form by $$x$$ to get $$x \\cdot P(x)e^{kx}$$\n- Step 2: If $$k$$ is a repeated root (appears twice), multiply by $$x^2$$ to get $$x^2 \\cdot P(x)e^{kx}$$. This ensures the P.I. is linearly independent from all terms in the C.F.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_48", "judge_pick": false}, {"question": "Find the solution to $$25\\frac{d^2x}{dt^2} + 36x = 18$$ with initial conditions $$x = 1$$ and $$\\frac{dx}{dt} = 0.6$$ at $$t = 0$$. (4 steps)", "answer": "- Step 1: C.F.: solve $$25m^2 + 36 = 0$$ ‚Üí $$m = \\pm \\frac{6}{5}i$$. So C.F. = $$A\\cos\\left(\\frac{6}{5}t\\right) + B\\sin\\left(\\frac{6}{5}t\\right)$$\n- Step 2: For RHS = 18 (constant), P.I. = $$\\lambda$$. Substituting: $$25(0) + 36\\lambda = 18$$ ‚Üí $$\\lambda = \\frac{1}{2}$$\n- Step 3: General: $$x = A\\cos\\left(\\frac{6}{5}t\\right) + B\\sin\\left(\\frac{6}{5}t\\right) + \\frac{1}{2}$$\n- Step 4: Using $$x(0) = 1$$: $$A + \\frac{1}{2} = 1$$ ‚Üí $$A = \\frac{1}{2}$$. Using $$x'(0) = 0.6$$: $$x' = -\\frac{6}{5}A\\sin\\left(\\frac{6}{5}t\\right) + \\frac{6}{5}B\\cos\\left(\\frac{6}{5}t\\right)$$, so $$0.6 = \\frac{6}{5}B$$ ‚Üí $$B = 0.5$$. Solution: $$x = \\frac{1}{2}\\cos\\left(\\frac{6}{5}t\\right) + \\frac{1}{2}\\sin\\left(\\frac{6}{5}t\\right) + \\frac{1}{2}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_49", "judge_pick": false}, {"question": "Prove that if the auxiliary equation has equal roots $$m = \\alpha$$, then $$y = (A + Bx)e^{\\alpha x}$$ is indeed a solution to $$a\\frac{d^2y}{dx^2} + b\\frac{dy}{dx} + cy = 0$$. (3 steps)", "answer": "- Step 1: Since $$m = \\alpha$$ is a repeated root, we have $$\\alpha = -\\frac{b}{2a}$$ and the discriminant is zero: $$b^2 = 4ac$$\n- Step 2: Let $$y = (A + Bx)e^{\\alpha x}$$. Compute $$y' = \\alpha(A + Bx)e^{\\alpha x} + Be^{\\alpha x}$$ and $$y'' = \\alpha^2(A + Bx)e^{\\alpha x} + 2\\alpha Be^{\\alpha x}$$\n- Step 3: Substitute into LHS: $$a[\\alpha^2(A+Bx) + 2\\alpha B]e^{\\alpha x} + b[\\alpha(A+Bx) + B]e^{\\alpha x} + c(A+Bx)e^{\\alpha x}$$ = $$e^{\\alpha x}[(A+Bx)(a\\alpha^2 + b\\alpha + c) + B(2a\\alpha + b)]$$. Since $$\\alpha$$ satisfies $$a\\alpha^2 + b\\alpha + c = 0$$ (root of auxiliary eq) and $$2a\\alpha + b = 0$$ (derivative condition for repeated root), the whole expression equals zero. Hence it's a solution.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_50", "judge_pick": false}, {"question": "Using the substitution $$x = e^u$$, find the general solution to $$x^2\\frac{d^2y}{dx^2} + 5x\\frac{dy}{dx} + 4y = 0$$. (3 steps)", "answer": "- Step 1: Substitute: $$x\\frac{dy}{dx} = \\frac{dy}{du}$$, $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$\n- Step 2: Equation becomes: $$\\left(\\frac{d^2y}{du^2} - \\frac{dy}{du}\\right) + 5\\frac{dy}{du} + 4y = 0$$ ‚Üí $$\\frac{d^2y}{du^2} + 4\\frac{dy}{du} + 4y = 0$$\n- Step 3: Auxiliary: $$m^2 + 4m + 4 = 0$$ ‚Üí $$(m+2)^2 = 0$$ ‚Üí $$m = -2$$ (repeated). So $$y = (A + Bu)e^{-2u}$$ = $$(A + B\\ln x)x^{-2}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_51", "judge_pick": false}, {"question": "A student tries to solve $$\\frac{d^2y}{dx^2} - 4y = e^{2x}$$ and obtains $$y = Ae^{2x} + Be^{-2x} + \\frac{1}{4}e^{2x}$$. Is this correct? If not, identify the error. (3 steps)", "answer": "- Step 1: This is NOT correct. The auxiliary equation is $$m^2 - 4 = 0$$ ‚Üí $$m = \\pm 2$$, so C.F. = $$Ae^{2x} + Be^{-2x}$$\n- Step 2: The student used $$y = \\lambda e^{2x}$$ as the P.I. form, but $$e^{2x}$$ is already in the C.F.! This term would give zero on the LHS\n- Step 3: The correct approach is to multiply by $$x$$: try $$y = \\lambda x e^{2x}$$. Substituting gives $$\\lambda = \\frac{1}{4}$$, so the correct solution is $$y = Ae^{2x} + Be^{-2x} + \\frac{1}{4}x e^{2x}$$", "source": "MiniMax ‚Ď†", "_id": "minimax_1_52", "judge_pick": true}, {"question": "What is the relationship between the Wronskian of two solutions and the existence of two linearly independent solutions for a second-order homogeneous ODE? (2 steps)", "answer": "- Step 1: For two solutions $$y_1$$ and $$y_2$$ of a second-order linear homogeneous ODE, the Wronskian is $$W(y_1, y_2) = y_1 y_2' - y_1' y_2$$\n- Step 2: If $$W \\neq 0$$ at some point, the two solutions are linearly independent, and they form the fundamental set of solutions. This ensures the general solution $$y = C_1 y_1 + C_2 y_2$$ captures all possible solutions. For the three cases we study (distinct real, repeated real, complex), the Wronskian is indeed non-zero.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_53", "judge_pick": false}], "count": 54}, "opus_1": {"label": "Opus 4.7 ‚Ď†", "cards": [{"question": "What characterises a second-order linear differential equation with constant coefficients, and why is the \"order\" called second? (3 steps)", "answer": "- Step 1: The \"order\" refers to the highest derivative that appears. A second-order equation contains $$\\frac{d^2 y}{dx^2}$$ (the second derivative), so the name tells us the equation involves up to the second derivative.\n- Step 2: \"Linear\" means the unknown function $$y$$ and all its derivatives appear only to the first power and are never multiplied together. Terms like $$y\\frac{dy}{dx}$$, $$y^2$$, or $$\\left(\\frac{dy}{dx}\\right)^2$$ are forbidden ‚ÄĒ only $$y$$, $$\\frac{dy}{dx}$$, and $$\\frac{d^2 y}{dx^2}$$ appear by themselves.\n- Step 3: \"Constant coefficients\" means the numbers multiplying $$y$$, $$y'$$, and $$y''$$ are real constants $$a, b, c$$ ‚ÄĒ not functions of $$x$$. General form: $$a\\frac{d^2 y}{dx^2} + b\\frac{dy}{dx} + cy = f(x)$$.\n\nTakeaway: Second-order + linear + constant coefficients together guarantee we can use the auxiliary equation technique.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why does a second-order differential equation need two arbitrary constants in its general solution, and what is the deeper reason behind this? (3 steps)", "answer": "- Step 1: Each time you integrate, you pick up one constant of integration. A second-order DE conceptually requires two integrations to recover $$y$$ from $$y''$$, so two constants accumulate.\n- Step 2: More fundamentally, the solution space of a homogeneous linear $$n$$-th order DE is an $$n$$-dimensional vector space. For $$n=2$$ we need 2 linearly independent solutions, and any general solution is a linear combination $$Af_1(x) + Bg_1(x)$$ ‚ÄĒ hence 2 free parameters.\n- Step 3: To pin down a unique particular solution we therefore need exactly 2 pieces of information, typically the value of $$y$$ and $$y'$$ at a single point (initial conditions), or the value of $$y$$ at two different points (boundary conditions).\n\nTakeaway: Dimension of solution space = order of the equation = number of arbitrary constants = number of conditions needed.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_1", "judge_pick": true}, {"question": "What motivates trying $$y = e^{\\lambda x}$$ as a candidate solution for the homogeneous equation $$ay'' + by' + cy = 0$$? (3 steps)", "answer": "- Step 1: The hallmark of the exponential is that differentiating it just multiplies by a constant: $$\\frac{d}{dx}e^{\\lambda x} = \\lambda e^{\\lambda x}$$. Every derivative of $$e^{\\lambda x}$$ is proportional to $$e^{\\lambda x}$$ itself.\n- Step 2: When we plug $$e^{\\lambda x}$$ into the DE, every term ‚ÄĒ $$y, y', y''$$ ‚ÄĒ becomes a multiple of $$e^{\\lambda x}$$. We factor $$e^{\\lambda x}$$ out, and since $$e^{\\lambda x} \\neq 0$$, the equation reduces to a purely algebraic condition on $$\\lambda$$.\n- Step 3: This is the only elementary function whose derivatives stay the same functional form ‚ÄĒ so it's the natural ansatz that turns a differential equation into an algebraic one (the auxiliary equation).\n\nTakeaway: The DE \"just sees $$\\lambda$$\" because differentiation acts on $$e^{\\lambda x}$$ as multiplication, reducing calculus to algebra.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_2", "judge_pick": false}, {"question": "Derive the auxiliary equation $$am^2 + bm + c = 0$$ starting from substituting $$y = e^{mx}$$ into $$ay'' + by' + cy = 0$$. (3 steps)", "answer": "- Step 1: Compute derivatives: $$y = e^{mx}$$, $$y' = m e^{mx}$$, $$y'' = m^2 e^{mx}$$.\n- Step 2: Substitute into the DE: $$a(m^2 e^{mx}) + b(m e^{mx}) + c(e^{mx}) = 0$$. Factor the common $$e^{mx}$$: $$e^{mx}(am^2 + bm + c) = 0$$.\n- Step 3: Since $$e^{mx} > 0$$ for all real $$x$$, it cannot be zero. Therefore the bracket must vanish: $$am^2 + bm + c = 0$$. This is the auxiliary (or characteristic) equation.\n\nTakeaway: The exponential factor never vanishes, so the whole problem collapses onto finding roots of a quadratic ‚ÄĒ that's the core trick.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_3", "judge_pick": false}, {"question": "What is the significance of the discriminant $$b^2 - 4ac$$ of the auxiliary equation in determining the qualitative behaviour of solutions? (3 steps)", "answer": "- Step 1: The discriminant classifies the roots of $$am^2 + bm + c = 0$$ into three regimes, each giving qualitatively different solutions.\n+ If $$b^2 > 4ac$$: two distinct real roots $$\\alpha, \\beta$$. Solutions are pure exponentials, no oscillation.\n+ If $$b^2 = 4ac$$: a repeated real root $$\\alpha$$. Solutions are exponential but with an extra $$x$$ factor ‚ÄĒ borderline behaviour.\n+ If $$b^2 < 4ac$$: complex conjugate roots $$p \\pm qi$$. Solutions oscillate (imaginary part) with an exponential envelope $$e^{px}$$ (real part).\n- Step 2: Physically (for a mass-spring-damper), the three cases correspond to overdamped, critically damped, and underdamped motion ‚ÄĒ the same discriminant determines whether you see exponential decay only or decaying oscillations.\n- Step 3: So one quadratic discriminant tells you everything about the structure of the solution without solving the DE explicitly.\n\nTakeaway: One sign check $$b^2 - 4ac$$ distinguishes exponential decay vs oscillation vs the critical transition.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_4", "judge_pick": true}, {"question": "For $$ay'' + by' + cy = 0$$, when the auxiliary equation has two distinct real roots $$\\alpha$$ and $$\\beta$$, what is the general solution and why does this form arise? (3 steps)", "answer": "- Step 1: Each root $$\\alpha$$ and $$\\beta$$ individually gives a solution $$e^{\\alpha x}$$ and $$e^{\\beta x}$$ that satisfies the DE (this is how the auxiliary equation was set up).\n- Step 2: By linearity (principle of superposition), any linear combination $$y = Ae^{\\alpha x} + Be^{\\beta x}$$ is also a solution.\n- Step 3: Because $$\\alpha \\neq \\beta$$, the functions $$e^{\\alpha x}$$ and $$e^{\\beta x}$$ are linearly independent, so together they span the full 2-dimensional solution space ‚ÄĒ no other linearly independent solution exists. Thus $$y = Ae^{\\alpha x} + Be^{\\beta x}$$ is the complete general solution.\n\nTakeaway: Two distinct roots ‚Üí two independent exponential \"modes\" ‚Üí their linear combination is all there is.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_5", "judge_pick": false}, {"question": "When the auxiliary equation has a single repeated real root $$\\alpha$$, why can't the general solution be $$y = Ae^{\\alpha x} + Be^{\\alpha x}$$ (just two copies of $$e^{\\alpha x}$$)? (3 steps)", "answer": "- Step 1: If we tried $$y = Ae^{\\alpha x} + Be^{\\alpha x}$$, the two terms combine into $$(A+B)e^{\\alpha x}$$, effectively a single constant times $$e^{\\alpha x}$$ ‚ÄĒ only one independent constant, not two.\n- Step 2: A second-order equation has a 2-dimensional solution space ‚ÄĒ we need two linearly independent solutions. Two copies of the same function are linearly dependent.\n- Step 3: We therefore need a second, genuinely different, solution. Multiplying by $$x$$ gives the trick: $$xe^{\\alpha x}$$ turns out to also satisfy the DE when $$\\alpha$$ is a repeated root. So the general solution is $$y = (A + Bx)e^{\\alpha x}$$ ‚ÄĒ $$e^{\\alpha x}$$ and $$xe^{\\alpha x}$$ are linearly independent.\n\nTakeaway: Repeated roots \"lose\" one independent solution; multiplying by $$x$$ gives it back.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_6", "judge_pick": false}, {"question": "Verify that $$y = xe^{\\alpha x}$$ is a solution to $$ay'' + by' + cy = 0$$ when $$\\alpha$$ is a repeated root of the auxiliary equation $$am^2 + bm + c = 0$$. (4 steps)", "answer": "- Step 1: Compute derivatives: $$y = xe^{\\alpha x}$$, so $$y' = e^{\\alpha x}(1 + \\alpha x)$$ and $$y'' = e^{\\alpha x}(2\\alpha + \\alpha^2 x)$$.\n- Step 2: Plug into the DE: $$ay'' + by' + cy = e^{\\alpha x}\\left[a(2\\alpha + \\alpha^2 x) + b(1 + \\alpha x) + cx\\right]$$.\n- Step 3: Expand and group by powers of $$x$$: coefficient of $$x$$ is $$a\\alpha^2 + b\\alpha + c$$, and constant term is $$2a\\alpha + b$$.\n- Step 4: Since $$\\alpha$$ is a root, $$a\\alpha^2 + b\\alpha + c = 0$$. Since $$\\alpha$$ is a repeated root, $$\\alpha = -b/(2a)$$, i.e. $$2a\\alpha + b = 0$$. Both brackets vanish, so $$ay'' + by' + cy = 0$$.\n\nTakeaway: The repeated-root condition makes both the \"$$x$$-coefficient\" and \"constant\" pieces vanish simultaneously, so $$xe^{\\alpha x}$$ slips through as an extra independent solution.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_7", "judge_pick": false}, {"question": "When the auxiliary equation has complex conjugate roots $$\\alpha = p + qi$$ and $$\\beta = p - qi$$, what is the real-valued general solution and how is it derived from $$Ae^{\\alpha x} + Be^{\\beta x}$$? (3 steps)", "answer": "- Step 1: Start from the complex form $$y = Ae^{(p+qi)x} + Be^{(p-qi)x} = e^{px}\\left[Ae^{iqx} + Be^{-iqx}\\right]$$.\n- Step 2: Use Euler's identity $$e^{i\\theta} = \\cos\\theta + i\\sin\\theta$$:\n$$Ae^{iqx} + Be^{-iqx} = (A+B)\\cos qx + i(A-B)\\sin qx.$$\n- Step 3: Define new (real) arbitrary constants $$C = A + B$$ and $$D = i(A - B)$$. The general solution becomes $$y = e^{px}(C\\cos qx + D\\sin qx)$$ ‚ÄĒ the exponential envelope $$e^{px}$$ from the real part $$p$$, and the oscillation $$\\cos qx, \\sin qx$$ from the imaginary part $$q$$.\n\nTakeaway: Real part of roots controls exponential envelope; imaginary part controls oscillation frequency.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_8", "judge_pick": false}, {"question": "Conceptually, what does each part of the solution $$y = e^{px}(A\\cos qx + B\\sin qx)$$ tell you about the physical behaviour of the system? (3 steps)", "answer": "- Step 1: The factor $$e^{px}$$ is a pure exponential envelope. If $$p > 0$$, amplitude grows unboundedly; if $$p < 0$$, amplitude decays to zero (damping); if $$p = 0$$, amplitude is constant (pure oscillation).\n- Step 2: The factor $$(A\\cos qx + B\\sin qx)$$ is a sinusoid with angular frequency $$q$$. By the harmonic-combination identity, it can be rewritten as $$R\\cos(qx - \\phi)$$ ‚ÄĒ so $$q$$ is the frequency and $$\\sqrt{A^2 + B^2}$$ is the initial amplitude.\n- Step 3: Combined: $$e^{px}$$ slowly scales the amplitude while the sinusoid wiggles. This is exactly what you'd expect from a mass on a damped spring ‚ÄĒ oscillation at the natural frequency, decaying (or growing) exponentially.\n\nTakeaway: Real part = decay/growth rate; imaginary part = angular frequency of oscillation.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_9", "judge_pick": true}, {"question": "Why does the solution simplify to $$y = A\\cos qx + B\\sin qx$$ (no exponential) when the auxiliary equation has purely imaginary roots $$\\pm qi$$? (3 steps)", "answer": "- Step 1: Purely imaginary roots correspond to $$p = 0$$ in the form $$p \\pm qi$$ ‚ÄĒ there is no real part.\n- Step 2: The general complex-root formula is $$y = e^{px}(A\\cos qx + B\\sin qx)$$. With $$p = 0$$, the envelope becomes $$e^{0 \\cdot x} = 1$$.\n- Step 3: The exponential factor disappears entirely, leaving $$y = A\\cos qx + B\\sin qx$$ ‚ÄĒ pure undamped sinusoidal oscillation with no amplitude decay or growth. Physically this is simple harmonic motion.\n\nTakeaway: No real part means no damping ‚ÄĒ the oscillation continues forever at constant amplitude.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_10", "judge_pick": false}, {"question": "What does the principle of superposition say about linear homogeneous DEs, and why does it hold? (3 steps)", "answer": "- Step 1: If $$f(x)$$ and $$g(x)$$ are both solutions of a linear homogeneous DE, then any linear combination $$Af(x) + Bg(x)$$ is also a solution.\n- Step 2: The reason is the linearity of differentiation. If $$L$$ denotes the operator $$L[y] = ay'' + by' + cy$$, then $$L[Af + Bg] = AL[f] + BL[g] = A \\cdot 0 + B \\cdot 0 = 0$$ whenever $$L[f] = L[g] = 0$$.\n- Step 3: This is exactly why the general solution is a linear combination of two independent basis solutions ‚ÄĒ it guarantees we can build every solution by superposing the fundamental modes.\n\nTakeaway: Linearity of the operator + homogeneity (RHS = 0) = linear combinations of solutions are still solutions.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_11", "judge_pick": false}, {"question": "Given $$\\frac{d^2y}{dx^2} + 5\\frac{dy}{dx} + 6y = 0$$, conceptually explain how to find the general solution and predict its qualitative behaviour. (3 steps)", "answer": "- Step 1: Write down the auxiliary equation by replacing each derivative with a power of $$m$$: $$m^2 + 5m + 6 = 0$$.\n- Step 2: Factor: $$(m+2)(m+3) = 0$$, giving roots $$m = -2$$ and $$m = -3$$. Both are distinct and real ‚ÄĒ Case 1.\n- Step 3: The general solution is $$y = Ae^{-2x} + Be^{-3x}$$. Qualitatively, both exponentials decay (both roots negative), so every solution tends to zero as $$x \\to \\infty$$ ‚ÄĒ no oscillation, pure decay.\n\nTakeaway: Both roots negative ‚Üí all solutions decay; no complex parts ‚Üí no oscillation.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_12", "judge_pick": false}, {"question": "Consider $$\\frac{d^2y}{dx^2} - 6\\frac{dy}{dx} + 9y = 0$$. Why does this correspond to the repeated-root case, and what is the general solution? (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 - 6m + 9 = 0$$. The discriminant is $$36 - 36 = 0$$ ‚ÄĒ zero discriminant means the quadratic is a perfect square: $$(m-3)^2 = 0$$.\n- Step 2: So there is one repeated root $$m = 3$$. In this case the solution space is still 2-dimensional, but the two basis solutions must be $$e^{3x}$$ and $$xe^{3x}$$ (the extra $$x$$ factor rescues the missing second dimension).\n- Step 3: General solution: $$y = (A + Bx)e^{3x}$$. Qualitatively, $$e^{3x}$$ grows, and $$xe^{3x}$$ grows even faster, so the solution blows up as $$x \\to \\infty$$ unless $$A, B$$ are chosen very specifically.\n\nTakeaway: Zero discriminant = perfect-square factoring = repeated root = polynomial-times-exponential form.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_13", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dx^2} - 6\\frac{dy}{dx} + 34y = 0$$, find the general solution and interpret it physically. (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 - 6m + 34 = 0$$. Discriminant $$= 36 - 136 = -100 < 0$$, so complex conjugate roots.\n- Step 2: Quadratic formula: $$m = \\frac{6 \\pm \\sqrt{-100}}{2} = 3 \\pm 5i$$. Here $$p = 3$$ and $$q = 5$$.\n- Step 3: General solution: $$y = e^{3x}(A\\cos 5x + B\\sin 5x)$$. Physically: a growing exponential envelope ($$e^{3x}$$ since $$p=3 > 0$$) wrapped around a sinusoid with angular frequency 5 ‚ÄĒ oscillation with amplitude that keeps growing (unstable).\n\nTakeaway: Positive real part of complex roots ‚áí oscillations that grow without bound; negative real part ‚áí damped oscillations.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_14", "judge_pick": false}, {"question": "What is the general solution to $$\\frac{d^2 y}{dx^2} + 16y = 0$$, and what classic physical system does this equation describe? (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + 16 = 0 \\Rightarrow m = \\pm 4i$$. Roots are purely imaginary ($$p=0$$, $$q=4$$).\n- Step 2: General solution: $$y = A\\cos 4x + B\\sin 4x$$ (no exponential factor because $$p=0$$).\n- Step 3: This is the equation of simple harmonic motion. It describes an undamped mass on a spring (or a small-angle pendulum, or an LC circuit) oscillating forever at angular frequency $$\\omega = 4$$.\n\nTakeaway: $$y'' + \\omega^2 y = 0$$ is the SHM equation; its solutions are pure sinusoids of angular frequency $$\\omega$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_15", "judge_pick": false}, {"question": "How does the sign of the real part of the roots of the auxiliary equation determine whether solutions grow, decay, or stay bounded as $$x \\to \\infty$$? (3 steps)", "answer": "- Step 1: For each root $$m = p + qi$$ (real or complex), the associated term in the general solution contains the factor $$e^{px}$$.\n+ If $$p > 0$$: $$e^{px} \\to \\infty$$, the term grows unboundedly.\n+ If $$p < 0$$: $$e^{px} \\to 0$$, the term decays to zero.\n+ If $$p = 0$$: $$e^{px} = 1$$, the amplitude stays constant (pure oscillation if $$q \\neq 0$$).\n- Step 2: The overall solution is a sum of such terms. If any root has $$p > 0$$, the whole solution typically blows up. If all roots have $$p < 0$$, the solution decays.\n- Step 3: So stability of a second-order linear system is determined entirely by the signs of the real parts of the auxiliary equation's roots.\n\nTakeaway: All roots with negative real part ‚áí system is asymptotically stable.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_16", "judge_pick": true}, {"question": "For $$\\frac{d^2x}{dt^2} + 2k\\frac{dx}{dt} + 9x = 0$$ modelling a damped oscillator, how does $$|k|$$ determine the nature of the motion? (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + 2km + 9 = 0$$. Discriminant $$= 4k^2 - 36 = 4(k^2 - 9)$$. Sign depends on $$|k|$$ vs $$3$$.\n- Step 2: Three regimes:\n+ $$|k| > 3$$ (discriminant > 0): two distinct real roots ‚Üí overdamped, pure exponential behaviour, no oscillation.\n+ $$|k| = 3$$ (discriminant = 0): one repeated real root ‚Üí critically damped, boundary case with fastest return to equilibrium.\n+ $$|k| < 3$$ (discriminant < 0): complex conjugate roots ‚Üí underdamped, oscillation with exponential envelope.\n- Step 3: When $$k = 2$$: roots $$m = -2 \\pm i\\sqrt{5}$$. Since the real part is $$-2 < 0$$, solution $$x = e^{-2t}(A\\cos\\sqrt{5}t + B\\sin\\sqrt{5}t)$$ oscillates with decaying amplitude, so $$x \\to 0$$ as $$t \\to \\infty$$.\n\nTakeaway: The damping parameter controls whether a system oscillates or simply returns to equilibrium ‚ÄĒ $$|k|=3$$ is the transition.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_17", "judge_pick": false}, {"question": "What is a non-homogeneous second-order linear differential equation, and how does its structure differ from the homogeneous version? (3 steps)", "answer": "- Step 1: A non-homogeneous 2nd-order linear DE has the form $$ay'' + by' + cy = f(x)$$ where the right-hand side $$f(x)$$ is not identically zero.\n- Step 2: Key difference: in the homogeneous case ($$f = 0$$), any linear combination of solutions is still a solution. In the non-homogeneous case, the sum of two solutions satisfies $$L[y_1 + y_2] = 2f(x)$$, not $$f(x)$$ ‚ÄĒ so linear superposition doesn't directly give new solutions.\n- Step 3: Instead, solutions decompose as \"general solution of homogeneous + one particular solution of non-homogeneous.\" The non-homogeneous term $$f(x)$$ is often called the \"forcing function\" ‚ÄĒ an external driver of the system.\n\nTakeaway: Non-zero RHS = \"forced\" equation; solutions = homogeneous solutions + a particular response to the forcing.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_18", "judge_pick": true}, {"question": "Why is the general solution of $$ay'' + by' + cy = f(x)$$ given by $$y = \\text{C.F.} + \\text{P.I.}$$, and why does any particular integral work? (3 steps)", "answer": "- Step 1: Suppose $$y_p$$ is any particular solution, so $$L[y_p] = f$$. Let $$y$$ be any other solution, so $$L[y] = f$$. Then $$L[y - y_p] = L[y] - L[y_p] = f - f = 0$$, meaning $$y - y_p$$ satisfies the homogeneous equation.\n- Step 2: Therefore $$y - y_p$$ is a C.F. ‚ÄĒ a linear combination of the homogeneous solutions. Rearranging: $$y = y_p + \\text{C.F.}$$\n- Step 3: This means: the C.F. provides the two arbitrary constants (covering the full 2-D space of homogeneous solutions), while the P.I. is any one fixed response to the forcing. Different P.I. choices differ only by C.F. contributions ‚ÄĒ absorbed into the arbitrary constants.\n\nTakeaway: The C.F. gives the \"free\" behaviour and the P.I. gives the \"forced\" response ‚ÄĒ the split is guaranteed by linearity.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_19", "judge_pick": false}, {"question": "When $$f(x)$$ in a non-homogeneous DE is a polynomial, exponential, or trigonometric function, what is the general strategy for choosing the form of the particular integral? (3 steps)", "answer": "- Step 1: The philosophy is: try a function of the same general form as $$f(x)$$, with undetermined coefficients ‚ÄĒ because differentiation keeps these families closed (polynomial stays polynomial, exponential stays exponential, sin/cos stay sin/cos).\n- Step 2: Concrete trial forms:\n+ $$f(x) = p$$ (constant) ‚Üí try $$y_p = \\lambda$$.\n+ $$f(x) = p + qx$$ ‚Üí try $$y_p = \\lambda + \\mu x$$.\n+ $$f(x) = p + qx + rx^2$$ ‚Üí try $$y_p = \\lambda + \\mu x + \\nu x^2$$.\n+ $$f(x) = pe^{kx}$$ ‚Üí try $$y_p = \\lambda e^{kx}$$.\n+ $$f(x) = p\\cos\\omega x + q\\sin\\omega x$$ ‚Üí try $$y_p = \\lambda\\cos\\omega x + \\mu\\sin\\omega x$$.\n- Step 3: Plug the trial into the DE, collect coefficients of like terms, and solve for the undetermined constants. Only works cleanly when the trial is not already part of the complementary function.\n\nTakeaway: Match the form of $$f(x)$$ in the trial ‚ÄĒ differentiation preserves the family, so the unknowns can be solved by matching coefficients.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_20", "judge_pick": false}, {"question": "When trying a trigonometric particular integral for $$f(x) = 13\\sin 3x$$, why do we always include BOTH $$\\lambda \\sin 3x$$ AND $$\\mu \\cos 3x$$, even if $$f(x)$$ contains only sine? (3 steps)", "answer": "- Step 1: Differentiating $$\\sin 3x$$ produces $$3\\cos 3x$$ (sine becomes cosine), and differentiating again gives $$-9\\sin 3x$$ (back to sine). So the first-derivative term in the DE, $$by'$$, generates a $$\\cos$$ contribution from a $$\\sin$$ trial.\n- Step 2: If the trial were just $$\\lambda\\sin 3x$$, the equation would contain both $$\\sin 3x$$ AND $$\\cos 3x$$ terms on the LHS, but only $$\\sin 3x$$ on the RHS ‚ÄĒ the $$\\cos 3x$$ terms wouldn't balance. You'd be unable to find any consistent $$\\lambda$$.\n- Step 3: Including $$\\mu\\cos 3x$$ gives enough freedom to cancel the spurious cosine contribution. The two unknowns $$\\lambda, \\mu$$ are determined by separately matching $$\\sin$$ and $$\\cos$$ coefficients ‚ÄĒ exactly two equations for two unknowns.\n\nTakeaway: $$\\sin$$ and $$\\cos$$ are coupled by differentiation, so you always carry both even if only one appears in $$f(x)$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_21", "judge_pick": false}, {"question": "What goes wrong if the trial particular integral $$\\lambda e^{kx}$$ overlaps with the complementary function (i.e. $$k$$ is a root of the auxiliary equation)? How do we fix it? (3 steps)", "answer": "- Step 1: If $$k$$ is a root, then $$e^{kx}$$ satisfies the homogeneous equation: $$ak^2 + bk + c = 0$$, so $$L[e^{kx}] = 0$$. This means $$L[\\lambda e^{kx}] = \\lambda \\cdot 0 = 0$$, which can never equal $$f(x) = pe^{kx} \\neq 0$$.\n- Step 2: The fix: try $$y_p = \\lambda x e^{kx}$$ instead (multiply by $$x$$). This function is NOT a solution of the homogeneous equation (unless $$k$$ is a repeated root), so plugging it in gives a non-zero result that can be equated to $$pe^{kx}$$.\n- Step 3: If $$k$$ is also a repeated root (multiplicity 2), even $$xe^{kx}$$ is already in the C.F., so we need $$\\lambda x^2 e^{kx}$$ ‚ÄĒ multiply by $$x$$ once for each time $$k$$ is a root.\n\nTakeaway: Overlap with the C.F. means the naive trial gives zero; multiplying by $$x$$ \"shifts it out\" of the homogeneous solution space.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_22", "judge_pick": true}, {"question": "Why must the particular integral for $$\\frac{d^2y}{dx^2} - 2\\frac{dy}{dx} = 3$$ be modified from a constant $$\\lambda$$ to $$\\lambda x$$? (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 - 2m = m(m-2) = 0$$, roots $$m = 0, 2$$. So the complementary function is $$y = A + Be^{2x}$$ ‚ÄĒ crucially, it already contains a constant term (from $$m = 0$$, since $$e^{0\\cdot x} = 1$$).\n- Step 2: The usual trial for a constant RHS would be $$y_p = \\lambda$$. But any constant already satisfies $$y'' - 2y' = 0$$, so $$L[\\lambda] = 0 \\neq 3$$.\n- Step 3: Multiply by $$x$$: try $$y_p = \\lambda x$$. Then $$y_p' = \\lambda$$, $$y_p'' = 0$$, and substituting gives $$0 - 2\\lambda = 3 \\Rightarrow \\lambda = -3/2$$. So $$y_p = -\\frac{3}{2}x$$ works.\n\nTakeaway: Whenever $$m = 0$$ is a root, the C.F. includes a constant, and polynomial P.I.s must be multiplied by $$x$$ to avoid overlap.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_23", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dx^2} - 2\\frac{dy}{dx} + y = e^x$$, explain why neither $$\\lambda e^x$$ nor $$\\lambda x e^x$$ works as a particular integral, and what must be used instead. (4 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 - 2m + 1 = (m-1)^2 = 0$$. So $$m = 1$$ is a repeated root, and the complementary function is $$y = (A + Bx)e^x$$.\n- Step 2: Both $$e^x$$ AND $$xe^x$$ already appear in the C.F. Any multiple of $$\\lambda e^x$$ satisfies $$L[y] = 0$$, and likewise any multiple of $$\\lambda x e^x$$ satisfies $$L[y] = 0$$. Neither can equal $$e^x$$.\n- Step 3: Because $$m = 1$$ is a double root, we need to multiply by $$x$$ twice ‚ÄĒ try $$y_p = \\lambda x^2 e^x$$. This is NOT in the C.F.\n- Step 4: Substituting $$\\lambda x^2 e^x$$, computing derivatives and collecting, one finds $$\\lambda = \\frac{1}{2}$$, giving $$y_p = \\frac{1}{2}x^2 e^x$$.\n\nTakeaway: Root multiplicity $$k$$ means the P.I. needs an extra $$x^k$$ factor ‚ÄĒ generalising the \"multiply by $$x$$\" rule.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_24", "judge_pick": false}, {"question": "Conceptually, why does adding the particular integral to the complementary function capture all possible solutions of a non-homogeneous DE? (3 steps)", "answer": "- Step 1: The C.F. describes a 2-dimensional family of solutions to the homogeneous equation ‚ÄĒ the \"kernel\" of the differential operator $$L$$, i.e. all $$y$$ with $$L[y] = 0$$.\n- Step 2: The P.I. is a single solution to $$L[y] = f$$. By linearity, if $$y_{\\text{any}}$$ is any solution, then $$y_{\\text{any}} - y_p$$ satisfies $$L[y_{\\text{any}} - y_p] = 0$$, so $$y_{\\text{any}} - y_p$$ is in the C.F.\n- Step 3: Rearranging: every solution has the form $$y_{\\text{any}} = y_p + (\\text{some C.F.})$$. Adding the C.F. (with its two free constants) parametrises all possible choices, covering the entire solution set.\n\nTakeaway: The P.I. \"lifts\" us into the non-homogeneous solution space; the C.F. provides the freedom within it.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_25", "judge_pick": true}, {"question": "For a non-homogeneous DE, is the particular integral unique? Explain. (3 steps)", "answer": "- Step 1: No ‚ÄĒ the particular integral is not unique. If $$y_p$$ is any particular solution and $$y_h$$ is any homogeneous solution, then $$y_p + y_h$$ is also a particular solution: $$L[y_p + y_h] = L[y_p] + L[y_h] = f + 0 = f$$.\n- Step 2: So there are infinitely many possible P.I.s, differing from each other by C.F. contributions.\n- Step 3: However, the final general solution $$y = \\text{C.F.} + \\text{P.I.}$$ is the same regardless of which P.I. you pick ‚ÄĒ the \"extra\" C.F. piece just gets absorbed into the arbitrary constants of the C.F. term. That's why we only need to find ONE P.I.\n\nTakeaway: Many P.I.s exist; they differ by C.F. pieces, but the final general solution is unique.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_26", "judge_pick": true}, {"question": "Solve $$\\frac{d^2y}{dx^2} - 5\\frac{dy}{dx} + 6y = 3$$ conceptually, explaining the structure of each step. (3 steps)", "answer": "- Step 1: Find the C.F.: auxiliary equation $$m^2 - 5m + 6 = (m-2)(m-3) = 0$$, so $$m = 2, 3$$. C.F. is $$y_c = Ae^{2x} + Be^{3x}$$.\n- Step 2: Find a P.I.: RHS is a constant, try $$y_p = \\lambda$$. Then $$y_p' = y_p'' = 0$$, and substituting gives $$6\\lambda = 3 \\Rightarrow \\lambda = \\frac{1}{2}$$.\n- Step 3: Combine: $$y = Ae^{2x} + Be^{3x} + \\frac{1}{2}$$. The $$\\frac{1}{2}$$ is the \"steady-state\" response to the constant forcing, while $$Ae^{2x} + Be^{3x}$$ represents the \"transient\" behaviour set by initial conditions.\n\nTakeaway: Constant forcing ‚Üí constant steady-state (shift in equilibrium), plus homogeneous transients.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why must a second-order differential equation need exactly two boundary/initial conditions to determine a unique particular solution? (3 steps)", "answer": "- Step 1: The general solution has two arbitrary constants $$A, B$$ (from the 2-dimensional solution space of the homogeneous part).\n- Step 2: Each boundary or initial condition is an equation involving $$A$$ and $$B$$. Two independent conditions give a system of two equations in two unknowns, which typically has a unique solution.\n- Step 3: One condition leaves one unknown free ‚ÄĒ not a unique solution. Three or more conditions are generally over-determined and may be inconsistent unless conditions happen to be redundant.\n\nTakeaway: Number of conditions = number of arbitrary constants = order of DE, so a 2nd-order DE needs exactly 2 conditions.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_28", "judge_pick": false}, {"question": "What is the difference between initial conditions and boundary conditions for a second-order differential equation? (3 steps)", "answer": "- Step 1: Initial conditions specify the value of $$y$$ AND its derivative $$y'$$ at a single point $$x_0$$: e.g. $$y(0) = 1$$ and $$y'(0) = 2$$. This is the natural setup for time-evolution problems where you know the initial state.\n- Step 2: Boundary conditions specify values (usually of $$y$$) at two DIFFERENT points: e.g. $$y(0) = 0$$ and $$y(L) = 0$$. This is natural for spatial problems like the shape of a beam with fixed endpoints.\n- Step 3: Both pin down the two constants $$A, B$$, but they can behave very differently: initial-value problems for linear DEs always have a unique solution, while boundary-value problems can sometimes have no solution or infinitely many.\n\nTakeaway: Initial conditions = state at one instant; boundary conditions = state at two positions.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_29", "judge_pick": true}, {"question": "Given $$\\frac{d^2y}{dx^2} - y = 2e^x$$ with $$y(0) = 0$$ and $$y'(0) = 0$$, outline the procedure to find the particular solution. (5 steps)", "answer": "- Step 1: Solve the auxiliary equation: $$m^2 - 1 = 0$$ gives $$m = \\pm 1$$. So C.F. is $$y_c = Ae^x + Be^{-x}$$.\n- Step 2: Choose P.I.: since $$e^x$$ is in the C.F., don't try $$\\lambda e^x$$; try $$y_p = \\lambda x e^x$$.\n- Step 3: Substitute $$y_p$$ into the DE, find $$\\lambda$$. Result: $$\\lambda = 1$$, so $$y_p = xe^x$$.\n- Step 4: General solution: $$y = Ae^x + Be^{-x} + xe^x$$. Compute $$y' = Ae^x - Be^{-x} + e^x + xe^x$$.\n- Step 5: Apply conditions:\n+ $$y(0) = 0$$: $$A + B = 0$$.\n+ $$y'(0) = 0$$: $$A - B + 1 = 0$$.\n+ Solve: $$A = -\\tfrac{1}{2}$$, $$B = \\tfrac{1}{2}$$. Particular solution: $$y = -\\tfrac{1}{2}e^x + \\tfrac{1}{2}e^{-x} + xe^x$$.\n\nTakeaway: Always (1) find C.F., (2) find P.I. (modifying if overlap), (3) write general solution, (4) differentiate it, (5) apply conditions.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_30", "judge_pick": false}, {"question": "A common mistake is to apply the initial conditions to the C.F. alone, not the full general solution. Why is this wrong? (3 steps)", "answer": "- Step 1: The boundary/initial conditions are conditions on $$y$$ ‚ÄĒ the actual solution to the original DE. They must be satisfied by the full solution $$y = \\text{C.F.} + \\text{P.I.}$$, not just by the C.F.\n- Step 2: The P.I. contributes to the values of both $$y$$ and $$y'$$ at the boundary point, so ignoring it would give incorrect values for $$A$$ and $$B$$.\n- Step 3: Always find the P.I. first, write the full general solution, then substitute the conditions into that full expression (and its derivative) ‚ÄĒ the P.I. is part of the \"output\" at any given point.\n\nTakeaway: Apply conditions to the total solution, not just the C.F. ‚ÄĒ the P.I. contributes to the value of $$y$$ at the boundary.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_31", "judge_pick": false}, {"question": "For the SHM-style DE $$\\frac{d^2 x}{dt^2} + x = 3\\sin 2t$$ with $$x(0) = 0$$ and $$x'(0) = 1$$, why does the natural frequency differ from the forcing frequency, and what qualitative feature does this produce? (3 steps)", "answer": "- Step 1: The homogeneous equation $$x'' + x = 0$$ has auxiliary equation $$m^2 + 1 = 0$$, giving $$m = \\pm i$$. So the natural (unforced) angular frequency is $$\\omega_n = 1$$.\n- Step 2: The forcing term $$3\\sin 2t$$ has angular frequency $$\\omega_f = 2$$. Since $$\\omega_f \\neq \\omega_n$$, the forcing is \"off-resonance\" ‚ÄĒ the trial P.I. $$\\lambda\\sin 2t$$ does NOT overlap with the C.F., so no modification is needed.\n- Step 3: The general solution is a superposition of the natural oscillation (frequency 1) and the forced oscillation (frequency 2), giving a \"beating\" pattern. If frequencies were equal, we'd get resonance and the P.I. would need an extra $$t$$ factor, causing amplitude to grow unboundedly.\n\nTakeaway: Off-resonance forcing produces a steady superposition of two frequencies; on-resonance forcing produces unbounded growth.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_32", "judge_pick": true}, {"question": "Why do we use a substitution like $$x = e^u$$ to solve Euler (equidimensional) equations of the form $$x^2 y'' + bxy' + cy = f(x)$$? (3 steps)", "answer": "- Step 1: The equation has variable coefficients ‚ÄĒ the multipliers $$x^2$$, $$x$$ aren't constants ‚ÄĒ so we can't apply the auxiliary-equation method directly. Each term, however, has \"degree\" matching the derivative order ($$x^2$$ with $$y''$$, $$x$$ with $$y'$$, $$1$$ with $$y$$), a special equidimensional structure.\n- Step 2: Substituting $$x = e^u$$ (i.e. $$u = \\ln x$$) converts the variable-coefficient equation into a constant-coefficient equation in the new variable $$u$$.\n- Step 3: The transformed equation can then be solved by the standard auxiliary equation method. Finally, substitute back $$u = \\ln x$$ to express the solution in terms of $$x$$.\n\nTakeaway: Exponential substitution turns $$x$$-multiplication structure into constant coefficients ‚ÄĒ a trick for this specific family of DEs.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_33", "judge_pick": false}, {"question": "Using the substitution $$x = e^u$$, show that $$x \\frac{dy}{dx} = \\frac{dy}{du}$$. (3 steps)", "answer": "- Step 1: Since $$x = e^u$$, we have $$\\frac{dx}{du} = e^u = x$$.\n- Step 2: By the chain rule, $$\\frac{dy}{du} = \\frac{dy}{dx} \\cdot \\frac{dx}{du} = \\frac{dy}{dx} \\cdot x$$.\n- Step 3: So $$\\frac{dy}{du} = x\\frac{dy}{dx}$$, which rearranges to $$x \\frac{dy}{dx} = \\frac{dy}{du}$$. This is the first key identity that transforms first-derivative terms into constant-coefficient form.\n\nTakeaway: Under $$x = e^u$$, the operator $$x\\frac{d}{dx}$$ is equivalent to $$\\frac{d}{du}$$ ‚ÄĒ this is why Euler equations linearise.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_34", "judge_pick": true}, {"question": "Using the substitution $$x = e^u$$, derive $$x^2 \\frac{d^2 y}{dx^2} = \\frac{d^2 y}{du^2} - \\frac{dy}{du}$$. (4 steps)", "answer": "- Step 1: Start from $$\\frac{dy}{du} = x\\frac{dy}{dx}$$ (derived previously).\n- Step 2: Differentiate both sides with respect to $$u$$: $$\\frac{d^2 y}{du^2} = \\frac{d}{du}\\left(x\\frac{dy}{dx}\\right)$$. Use the product rule, noting both $$x$$ and $$\\frac{dy}{dx}$$ depend on $$u$$.\n- Step 3: $$\\frac{d^2 y}{du^2} = \\frac{dx}{du}\\cdot\\frac{dy}{dx} + x\\cdot\\frac{d}{du}\\left(\\frac{dy}{dx}\\right)$$. Now $$\\frac{dx}{du} = x$$, and $$\\frac{d}{du}\\left(\\frac{dy}{dx}\\right) = \\frac{d^2 y}{dx^2}\\cdot\\frac{dx}{du} = x\\frac{d^2 y}{dx^2}$$.\n- Step 4: So $$\\frac{d^2 y}{du^2} = x\\cdot\\frac{dy}{dx} + x^2\\frac{d^2 y}{dx^2} = \\frac{dy}{du} + x^2\\frac{d^2 y}{dx^2}$$. Rearranging: $$x^2\\frac{d^2 y}{dx^2} = \\frac{d^2 y}{du^2} - \\frac{dy}{du}$$.\n\nTakeaway: The operator $$x^2\\frac{d^2}{dx^2}$$ becomes $$\\frac{d^2}{du^2} - \\frac{d}{du}$$ after exponential substitution.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_35", "judge_pick": false}, {"question": "Using the substitution $$x = e^u$$, find the general solution to the Cauchy-Euler equation $$x^2 \\frac{d^2y}{dx^2} + x\\frac{dy}{dx} + y = 0$$. (4 steps)", "answer": "- Step 1: Apply the two substitution identities: $$x\\frac{dy}{dx} = \\frac{dy}{du}$$ and $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$.\n- Step 2: Substitute: $$\\left(\\frac{d^2y}{du^2} - \\frac{dy}{du}\\right) + \\frac{dy}{du} + y = 0$$, simplifying to $$\\frac{d^2y}{du^2} + y = 0$$ ‚ÄĒ a pure constant-coefficient equation.\n- Step 3: Auxiliary equation $$m^2 + 1 = 0$$ gives $$m = \\pm i$$. So $$y = A\\cos u + B\\sin u$$.\n- Step 4: Substitute back $$u = \\ln x$$: $$y = A\\cos(\\ln x) + B\\sin(\\ln x)$$. This is the general solution in terms of $$x$$.\n\nTakeaway: An Euler equation in $$x$$ becomes a simple constant-coefficient equation in $$u = \\ln x$$; solutions in $$x$$ involve $$\\cos(\\ln x), \\sin(\\ln x), x^k$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_36", "judge_pick": false}, {"question": "What is the general philosophy for using a substitution to reduce a complicated second-order DE to the standard constant-coefficient form $$ay'' + by' + cy = f(x)$$? (3 steps)", "answer": "- Step 1: The idea is to find a change of variable that \"absorbs\" the variable coefficients, leaving a cleaner equation you already know how to solve.\n- Step 2: Common substitutions:\n+ $$x = e^u$$ for Euler-type equations $$x^2 y'' + bxy' + cy = \\cdots$$ (turns $$x^n \\frac{d^n}{dx^n}$$ into constant-coefficient operators).\n+ $$y = \\frac{z}{x^n}$$ to strip off a known power-law factor so the new $$z$$ satisfies a simpler equation.\n+ $$z = \\sin x$$ (or another function of $$x$$) to re-coordinatise so the derivatives become nicer.\n- Step 3: The procedure is: (1) compute $$\\frac{dy}{dx}, \\frac{d^2y}{dx^2}$$ in terms of the new variable; (2) substitute; (3) simplify to standard form; (4) solve; (5) substitute back.\n\nTakeaway: Every reducible DE has a \"secret\" simpler equation hiding underneath ‚ÄĒ the right substitution reveals it.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_37", "judge_pick": false}, {"question": "When given the substitution $$y = \\frac{z}{x}$$ to transform a DE, how does this affect the computation of $$\\frac{dy}{dx}$$ and $$\\frac{d^2y}{dx^2}$$? (3 steps)", "answer": "- Step 1: Express $$y = z x^{-1}$$ where $$z$$ is a new function of $$x$$.\n- Step 2: Differentiate using the product rule: $$\\frac{dy}{dx} = \\frac{1}{x}\\frac{dz}{dx} - \\frac{z}{x^2}$$.\n- Step 3: Differentiate again: $$\\frac{d^2y}{dx^2} = \\frac{1}{x}\\frac{d^2z}{dx^2} - \\frac{2}{x^2}\\frac{dz}{dx} + \\frac{2z}{x^3}$$. Substitute into the original DE and simplify ‚ÄĒ the \"nasty\" $$z$$-and-$$x$$ terms cancel if the substitution has been well-chosen.\n\nTakeaway: The substitution is designed so the cross-terms cancel, leaving a simpler equation in $$z$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_38", "judge_pick": false}, {"question": "What is the strategy when a substitution like $$z = \\sin x$$ is given to transform a DE ‚ÄĒ i.e., a substitution of the independent variable (not the dependent variable)? (3 steps)", "answer": "- Step 1: Here we're changing the \"input\" variable: the new independent variable is $$z = \\sin x$$. We treat $$y$$ as a function of $$z$$, and we need to express $$\\frac{dy}{dx}$$ and $$\\frac{d^2y}{dx^2}$$ in terms of $$\\frac{dy}{dz}$$ and $$\\frac{d^2y}{dz^2}$$.\n- Step 2: By the chain rule: $$\\frac{dy}{dx} = \\cos x \\cdot \\frac{dy}{dz}$$. For the second derivative: $$\\frac{d^2y}{dx^2} = -\\sin x \\cdot \\frac{dy}{dz} + \\cos^2 x \\cdot \\frac{d^2y}{dz^2}$$.\n- Step 3: Substitute into the DE and use $$\\sin x = z$$, $$\\cos^2 x = 1 - z^2$$ to express everything purely in $$z$$. If well-chosen, the $$\\sin, \\cos$$ mess cancels neatly.\n\nTakeaway: For independent-variable substitutions, chain rule converts $$\\frac{d}{dx}$$ derivatives into $$\\frac{d}{dz}$$ derivatives.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_39", "judge_pick": true}, {"question": "Conceptually, what happens to the structure of solutions near $$x = 0$$ for the Euler equation $$x^2 y'' + xy' + y = 0$$ whose solutions are $$A\\cos(\\ln x) + B\\sin(\\ln x)$$? (3 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, $$\\ln x \\to -\\infty$$, so the oscillations $$\\cos(\\ln x)$$ and $$\\sin(\\ln x)$$ oscillate infinitely many times in any small neighbourhood of $$x = 0$$.\n- Step 2: However, the amplitude stays bounded (between $$-1$$ and $$1$$) ‚ÄĒ so the solution oscillates wildly but doesn't blow up.\n- Step 3: This reflects how Euler equations have a \"singular point\" at $$x = 0$$: derivatives are ill-defined there (the coefficient $$x^2$$ of $$y''$$ vanishes), and we can't extend the solution through that point. The logarithmic substitution $$u = \\ln x$$ only makes sense for $$x > 0$$.\n\nTakeaway: Euler equations have singularities at $$x = 0$$; solutions may oscillate pathologically near it.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_40", "judge_pick": true}, {"question": "What is resonance in the context of a forced linear second-order DE, and when does it occur? (3 steps)", "answer": "- Step 1: Consider a forced oscillator $$y'' + \\omega_n^2 y = F\\cos\\omega_f x$$. Resonance is the phenomenon where the response amplitude grows without bound because the forcing frequency matches the system's natural frequency.\n- Step 2: Mathematically, resonance occurs when the forcing function matches a homogeneous solution. For $$\\omega_f = \\omega_n$$, the trial P.I. $$\\lambda\\cos\\omega_f x + \\mu\\sin\\omega_f x$$ overlaps with the C.F., so we must multiply by $$x$$: P.I. becomes $$x(\\lambda\\cos\\omega_n x + \\mu\\sin\\omega_n x)$$.\n- Step 3: The factor of $$x$$ makes amplitude grow linearly with $$x$$ ‚ÄĒ the hallmark of resonance: sustained forcing at natural frequency leads to unbounded response (until nonlinearities or damping intervene).\n\nTakeaway: Overlap of P.I. trial with C.F. is the mathematical signature of resonance ‚ÄĒ the $$x$$-factor captures growing response.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_41", "judge_pick": false}, {"question": "Explain why, in $$\\frac{d^2x}{dt^2} + 5\\frac{dx}{dt} + 6x = 2e^{-t}$$, the forcing term $$2e^{-t}$$ drives a damped response rather than resonance. (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + 5m + 6 = (m+2)(m+3) = 0$$, so $$m = -2, -3$$. Both roots negative and real.\n- Step 2: The forcing $$2e^{-t}$$ corresponds to rate $$k = -1$$, which is NOT a root of the auxiliary equation. So the trial $$\\lambda e^{-t}$$ does not overlap with the C.F. $$Ae^{-2t} + Be^{-3t}$$.\n- Step 3: Hence no $$t$$-factor is needed ‚ÄĒ the P.I. is simply $$\\lambda e^{-t}$$ for some $$\\lambda$$. Both C.F. and P.I. decay to zero, so there's no resonance; the solution damps out.\n\nTakeaway: No overlap of forcing rate with auxiliary roots + all roots negative = damped response, no resonance.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_42", "judge_pick": true}, {"question": "If the general solution to a homogeneous 2nd-order DE is $$y = e^{-2x}(A\\cos 3x + B\\sin 3x)$$, what does this tell you about the auxiliary equation and physical interpretation? (3 steps)", "answer": "- Step 1: The factor $$e^{-2x}$$ with arguments $$\\cos 3x, \\sin 3x$$ means the roots of the auxiliary equation are $$-2 \\pm 3i$$ (real part $$-2$$, imaginary part $$\\pm 3$$).\n- Step 2: So the auxiliary equation is $$(m-(-2+3i))(m-(-2-3i)) = m^2 + 4m + 13 = 0$$.\n- Step 3: Physical interpretation: an underdamped oscillator. The $$e^{-2x}$$ factor gives exponential decay (damping), the $$\\cos 3x/\\sin 3x$$ gives oscillation at angular frequency 3 ‚ÄĒ the system oscillates while its amplitude decays, eventually settling to equilibrium.\n\nTakeaway: Real part of complex roots ‚Üí decay rate; imaginary part ‚Üí oscillation frequency.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_43", "judge_pick": false}, {"question": "If I tell you that the general solution to $$ay'' + by' + cy = 0$$ is $$y = (A + Bx)e^{2x}$$, what can you deduce about $$a, b, c$$? (3 steps)", "answer": "- Step 1: This form tells us the auxiliary equation has a REPEATED root at $$m = 2$$ (because of the $$(A + Bx)e^{2x}$$ structure).\n- Step 2: A quadratic with repeated root at 2 has the form $$a(m-2)^2 = 0$$, i.e. $$am^2 - 4am + 4a = 0$$. So $$b = -4a$$ and $$c = 4a$$.\n- Step 3: The DE is any constant multiple of $$m^2 - 4m + 4 = 0$$, e.g. $$y'' - 4y' + 4y = 0$$ (taking $$a=1$$). Any positive scalar multiple works ‚ÄĒ the DE is not unique, only the auxiliary polynomial up to scaling.\n\nTakeaway: The solution form encodes the auxiliary equation uniquely (up to scalar multiplication).", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_44", "judge_pick": false}, {"question": "What is the superposition principle for non-homogeneous equations, and how does it help when $$f(x) = f_1(x) + f_2(x)$$? (3 steps)", "answer": "- Step 1: If $$y_1$$ is a particular solution of $$L[y] = f_1$$ and $$y_2$$ is a particular solution of $$L[y] = f_2$$, then by linearity $$L[y_1 + y_2] = L[y_1] + L[y_2] = f_1 + f_2$$.\n- Step 2: So $$y_p = y_1 + y_2$$ is a particular integral for the combined equation $$L[y] = f_1 + f_2$$.\n- Step 3: This lets us split a complicated forcing into simpler pieces, find a P.I. for each, and add them ‚ÄĒ avoiding having to guess one big combined trial form.\n\nTakeaway: Non-homogeneous linearity lets us decompose forcing terms and solve each piece separately.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_45", "judge_pick": false}, {"question": "If $$f(x) = x^2$$, what form should the particular integral take for $$y'' - 5y' + 6y = x^2$$, and why does it need THREE undetermined coefficients despite $$f$$ having only one term? (3 steps)", "answer": "- Step 1: Even though $$f(x) = x^2$$ has one term, differentiation produces lower-order polynomial terms: $$\\frac{d}{dx}x^2 = 2x$$, $$\\frac{d^2}{dx^2}x^2 = 2$$. Substituting $$\\lambda x^2$$ into $$y'' - 5y' + 6y$$ gives $$2\\lambda - 10\\lambda x + 6\\lambda x^2$$ ‚ÄĒ terms in all powers $$x^0, x^1, x^2$$.\n- Step 2: The RHS has only $$x^2$$, so the $$x^1$$ and $$x^0$$ coefficients of the LHS must separately cancel to zero ‚ÄĒ you need them as additional unknowns.\n- Step 3: The correct trial is the full polynomial of the same degree: $$y_p = \\lambda x^2 + \\mu x + \\nu$$. Three undetermined coefficients let you independently match the $$x^2, x^1, x^0$$ coefficients.\n\nTakeaway: A trial P.I. must contain every term that differentiation might generate ‚ÄĒ always use the complete polynomial.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_46", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dx^2} + 4\\frac{dy}{dx} = 24x^2$$ (note: constant $$c = 0$$ term missing), what is the correct form of the particular integral and why? (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + 4m = m(m+4) = 0$$, roots $$m = 0, -4$$. C.F. is $$A + Be^{-4x}$$ ‚ÄĒ the constant \"$$A$$\" comes from the $$m = 0$$ root.\n- Step 2: Since the C.F. contains a constant (degree-0 polynomial), the standard polynomial P.I. trial $$\\lambda x^2 + \\mu x + \\nu$$ would overlap in the constant term $$\\nu$$.\n- Step 3: Multiply by $$x$$: try $$y_p = \\lambda x^3 + \\mu x^2 + \\nu x$$. This is a 3-term polynomial with NO constant term (so no overlap). Substituting and matching coefficients of $$x^2, x^1, x^0$$ determines $$\\lambda, \\mu, \\nu$$.\n\nTakeaway: If the auxiliary equation has root $$0$$, the C.F. contains a constant ‚ÄĒ so polynomial P.I.s must be multiplied by $$x$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_47", "judge_pick": true}, {"question": "Conceptually, why is the substitution $$u = \\frac{dy}{dx}$$ useful for DEs where $$y$$ does not appear explicitly, such as $$x \\frac{d^2 y}{dx^2} + \\frac{dy}{dx} = 12x$$? (3 steps)", "answer": "- Step 1: The equation contains $$\\frac{d^2 y}{dx^2}$$ and $$\\frac{dy}{dx}$$, but NOT $$y$$ itself. Letting $$u = \\frac{dy}{dx}$$ means $$\\frac{du}{dx} = \\frac{d^2 y}{dx^2}$$.\n- Step 2: Substituting, the 2nd-order DE in $$y$$ becomes a 1st-order DE in $$u$$: $$x\\frac{du}{dx} + u = 12x$$ ‚ÄĒ a much easier problem (linear first-order).\n- Step 3: Solve for $$u$$ as a function of $$x$$, then integrate one more time to recover $$y = \\int u\\,dx$$ ‚ÄĒ yielding a general solution with two arbitrary constants.\n\nTakeaway: If $$y$$ is missing from the DE, setting $$u = y'$$ drops the order by one ‚ÄĒ a classic \"order-reduction\" trick.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_48", "judge_pick": true}, {"question": "For $$\\frac{d^2y}{dx^2} + \\frac{dy}{dx} + y = 0$$, find the auxiliary equation and determine whether solutions oscillate or decay. (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + m + 1 = 0$$. Discriminant = $$1 - 4 = -3 < 0$$, so complex conjugate roots.\n- Step 2: Roots: $$m = -\\frac{1}{2} \\pm \\frac{\\sqrt{3}}{2}i$$. Real part $$p = -\\frac{1}{2}$$, imaginary part $$q = \\frac{\\sqrt{3}}{2}$$.\n- Step 3: General solution: $$y = e^{-x/2}\\left(A\\cos\\frac{\\sqrt{3}}{2}x + B\\sin\\frac{\\sqrt{3}}{2}x\\right)$$. Since $$p < 0$$, amplitude decays; since $$q \\neq 0$$, it oscillates ‚ÄĒ damped oscillation that tends to 0 as $$x \\to \\infty$$.\n\nTakeaway: Negative real part + nonzero imaginary part = damped oscillations that decay to zero.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_49", "judge_pick": false}, {"question": "Verify the principle of superposition: if $$y = f(x)$$ and $$y = g(x)$$ both satisfy $$ay'' + by' + cy = 0$$, then $$y = Af(x) + Bg(x)$$ also satisfies it. (3 steps)", "answer": "- Step 1: Let $$y = Af + Bg$$. Then $$y' = Af' + Bg'$$ and $$y'' = Af'' + Bg''$$ ‚ÄĒ differentiation is linear.\n- Step 2: Substitute into the LHS: $$a(Af'' + Bg'') + b(Af' + Bg') + c(Af + Bg) = A(af'' + bf' + cf) + B(ag'' + bg' + cg)$$.\n- Step 3: By hypothesis, $$af'' + bf' + cf = 0$$ and $$ag'' + bg' + cg = 0$$. So the whole expression equals $$A \\cdot 0 + B \\cdot 0 = 0$$. Hence $$y = Af + Bg$$ satisfies the DE.\n\nTakeaway: Superposition is a direct consequence of differentiation being linear ‚ÄĒ it works for any linear homogeneous DE.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_50", "judge_pick": false}, {"question": "A student claims that the general solution of $$y'' + y' - 6y = 4$$ is $$y = Ae^{2x} + Be^{-3x} - \\frac{2}{3}$$. Does the constant $$-2/3$$ come from the C.F. or the P.I., and why is it there? (3 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 + m - 6 = (m-2)(m+3) = 0$$ gives roots $$m = 2, -3$$. C.F. is $$Ae^{2x} + Be^{-3x}$$ ‚ÄĒ no constant term.\n- Step 2: Forcing is $$4$$ (constant), neither root is $$0$$, so no overlap: try $$y_p = \\lambda$$. Substituting: $$0 + 0 - 6\\lambda = 4 \\Rightarrow \\lambda = -\\frac{2}{3}$$.\n- Step 3: So the $$-\\frac{2}{3}$$ is the particular integral ‚ÄĒ the steady-state shift in $$y$$ due to the constant forcing. Full solution: $$y = Ae^{2x} + Be^{-3x} - \\frac{2}{3}$$, combining transient (C.F.) and steady-state (P.I.).\n\nTakeaway: A constant at the end of a general solution is typically the P.I. for a constant forcing ‚ÄĒ representing the equilibrium shift.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_51", "judge_pick": true}, {"question": "Why is the particular integral not unique, but the general solution IS unique up to boundary conditions? (3 steps)", "answer": "- Step 1: A particular integral is any specific solution to the non-homogeneous equation. If $$y_p$$ is one, then $$y_p + h$$ is another, where $$h$$ is any homogeneous solution ‚ÄĒ they differ by something whose $$L[h] = 0$$.\n- Step 2: But when we write the general solution $$y = \\text{C.F.} + \\text{P.I.}$$, the C.F. already contains ALL homogeneous solutions. So any P.I. we pick ‚ÄĒ the shifts between different P.I.s ‚ÄĒ gets absorbed into the arbitrary constants of the C.F.\n- Step 3: Hence the SET of all solutions is the same regardless of P.I. choice. Once we apply boundary conditions, the arbitrary constants are fixed, and the particular solution that matches those conditions is unique.\n\nTakeaway: The P.I. is not unique, but the full solution SET is unique, and boundary conditions pick out one element.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_52", "judge_pick": false}, {"question": "Solve $$\\frac{d^2y}{dx^2} + 4y = \\sin x$$ showing the general strategy. (4 steps)", "answer": "- Step 1: C.F.: $$m^2 + 4 = 0 \\Rightarrow m = \\pm 2i$$. So $$y_c = A\\cos 2x + B\\sin 2x$$ (pure undamped oscillation at frequency 2).\n- Step 2: P.I.: forcing frequency is 1, natural frequency is 2 ‚ÄĒ no overlap, so try $$y_p = \\lambda\\cos x + \\mu\\sin x$$.\n- Step 3: Differentiate: $$y_p'' = -\\lambda\\cos x - \\mu\\sin x$$. Substitute: $$3\\lambda\\cos x + 3\\mu\\sin x = \\sin x$$. So $$\\lambda = 0$$, $$\\mu = \\frac{1}{3}$$.\n- Step 4: General solution: $$y = A\\cos 2x + B\\sin 2x + \\frac{1}{3}\\sin x$$ ‚ÄĒ natural oscillation at frequency 2 plus forced response at frequency 1.\n\nTakeaway: A forced oscillator responds at the forcing frequency, superposed on its natural oscillation.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_53", "judge_pick": false}, {"question": "What condition on boundary conditions allows the solution of a 2nd-order linear DE to be determined uniquely, and when might it fail? (3 steps)", "answer": "- Step 1: Normally, specifying two independent pieces of information gives two equations in two unknowns ‚ÄĒ unique solution.\n- Step 2: Failure can occur for boundary value problems: if the two equations happen to be dependent, there's either no solution (inconsistent) or infinitely many (consistent but one parameter free). This is tied to the system matrix being singular.\n- Step 3: Example: for $$y'' + y = 0$$ with $$y(0) = 0$$ and $$y(\\pi) = 0$$, any $$y = B\\sin x$$ works ‚ÄĒ infinitely many solutions. This is related to eigenvalue problems.\n\nTakeaway: 2 independent conditions usually give unique solutions, but special configurations can yield 0 or infinitely many.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_54", "judge_pick": true}, {"question": "Solve the initial value problem $$y'' + 9y = 16\\sin x$$, $$y(0) = 1$$, $$y'(0) = 8$$. Give a conceptual walkthrough. (5 steps)", "answer": "- Step 1: C.F.: $$m^2 + 9 = 0 \\Rightarrow m = \\pm 3i$$, so $$y_c = A\\cos 3x + B\\sin 3x$$.\n- Step 2: P.I.: forcing frequency 1 ‚Č† natural frequency 3, no overlap. Try $$y_p = \\lambda\\cos x + \\mu\\sin x$$. After substituting and matching: $$8\\lambda = 0$$ and $$8\\mu = 16$$, giving $$\\lambda = 0$$, $$\\mu = 2$$. Hence $$y_p = 2\\sin x$$.\n- Step 3: General solution: $$y = A\\cos 3x + B\\sin 3x + 2\\sin x$
