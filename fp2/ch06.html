$.\n- Step 4: Apply $$y(0) = 1$$: $$A + 0 + 0 = 1 \\Rightarrow A = 1$$. Differentiate: $$y' = -3A\\sin 3x + 3B\\cos 3x + 2\\cos x$$. Apply $$y'(0) = 8$$: $$3B + 2 = 8 \\Rightarrow B = 2$$.\n- Step 5: Particular solution: $$y = \\cos 3x + 2\\sin 3x + 2\\sin x$$.\n\nTakeaway: C.F. ‚Üí P.I. ‚Üí general solution ‚Üí apply conditions ‚ÄĒ always in this order.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_55", "judge_pick": false}, {"question": "Describe what happens to the solution of $$\\frac{d^2x}{dt^2} + 8\\frac{dx}{dt} + 16x = \\cos 4t$$ as $$t \\to \\infty$$. (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + 8m + 16 = (m+4)^2 = 0$$, so $$m = -4$$ (repeated). C.F. is $$(A + Bt)e^{-4t}$$.\n- Step 2: Both terms in the C.F. ‚ÄĒ $$Ae^{-4t}$$ and $$Bte^{-4t}$$ ‚ÄĒ decay to zero as $$t \\to \\infty$$ (since $$e^{-4t}$$ dominates polynomial growth). So the \"transient\" part vanishes.\n- Step 3: What remains is the P.I. (the \"steady state\" response to $$\\cos 4t$$), which oscillates at angular frequency 4 forever. The system \"forgets\" its initial conditions over time and approaches a purely forced oscillation.\n\nTakeaway: Damped system + bounded forcing = transient decays, steady-state P.I. dominates long-time behaviour.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_56", "judge_pick": false}, {"question": "What does it mean for a solution to \"remain finite as $$x \\to \\infty$$\", and how does this constrain the arbitrary constants in the general solution? (3 steps)", "answer": "- Step 1: \"Finite as $$x \\to \\infty$$\" means the solution stays bounded (or decays). If the general solution contains a term like $$Ae^{kx}$$ with $$k > 0$$, this term explodes unless $$A = 0$$.\n- Step 2: To enforce finiteness, we must set the coefficients of all growing exponential or growing-trig-envelope terms to zero. This reduces the number of free constants.\n- Step 3: Example: if $$y = Ae^{2x} + Be^{-3x} + P(x)$$, finiteness forces $$A = 0$$, leaving $$y = Be^{-3x} + P(x)$$. Combined with a single boundary condition, this can uniquely pin down $$B$$ ‚ÄĒ serving as the \"second condition\" for the particular solution.\n\nTakeaway: Finiteness conditions kill growing modes, effectively acting like a boundary condition at infinity.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_57", "judge_pick": true}, {"question": "Contrast how a repeated root of the auxiliary equation arises algebraically versus what it means for the solution structure. (3 steps)", "answer": "- Step 1: Algebraically: a repeated root of $$am^2 + bm + c = 0$$ means discriminant is zero: $$b^2 = 4ac$$. The quadratic factors as $$a(m - \\alpha)^2 = 0$$. Only one root value, counted twice.\n- Step 2: Geometrically on the $$m$$-line: the two complex/real roots have \"collided\" at a single point ‚ÄĒ the critical transition between distinct real roots and complex conjugate pairs.\n- Step 3: For the solution: the two independent basis functions become $$e^{\\alpha x}$$ and $$xe^{\\alpha x}$$ instead of $$e^{\\alpha x}$$ and $$e^{\\beta x}$$. The \"$$xe^{\\alpha x}$$\" encodes the \"missing\" second exponential ‚ÄĒ it's literally the limit of $$\\frac{e^{\\beta x} - e^{\\alpha x}}{\\beta - \\alpha}$$ as $$\\beta \\to \\alpha$$.\n\nTakeaway: Repeated roots are the critical transition ‚ÄĒ they \"pinch off\" a dimension of the solution space that's rescued by multiplying by $$x$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_58", "judge_pick": true}, {"question": "If a DE has auxiliary roots $$m = 2$$ (repeated), and the forcing is $$f(x) = e^{2x}$$, what form of P.I. should you use, and why? (3 steps)", "answer": "- Step 1: The C.F. is $$(A + Bx)e^{2x}$$, so it contains BOTH $$e^{2x}$$ AND $$xe^{2x}$$ as basis functions.\n- Step 2: Neither $$\\lambda e^{2x}$$ nor $$\\lambda x e^{2x}$$ can serve as a P.I. ‚ÄĒ both are C.F. terms and yield $$L[y] = 0$$, never $$e^{2x}$$.\n- Step 3: We must multiply by $$x$$ one more time: try $$y_p = \\lambda x^2 e^{2x}$$. This is genuinely NOT in the C.F. (which stops at $$xe^{2x}$$), so it can yield a non-zero $$L[y_p]$$ that we equate to $$e^{2x}$$.\n\nTakeaway: For a root of multiplicity $$k$$, P.I. needs the factor $$x^k$$ to clear the C.F.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_59", "judge_pick": false}, {"question": "Build the intuition for why $$xe^{\\alpha x}$$ is the \"limit\" of $$\\frac{e^{\\beta x} - e^{\\alpha x}}{\\beta - \\alpha}$$ as $$\\beta \\to \\alpha$$. (3 steps)", "answer": "- Step 1: Start with two distinct roots $$\\alpha, \\beta$$. Both $$e^{\\alpha x}$$ and $$e^{\\beta x}$$ solve the DE, so any linear combination does too ‚ÄĒ in particular, $$y_\\beta(x) = \\frac{e^{\\beta x} - e^{\\alpha x}}{\\beta - \\alpha}$$ is a solution.\n- Step 2: As $$\\beta \\to \\alpha$$, both numerator and denominator go to zero ‚ÄĒ this is a 0/0 limit, reminiscent of a derivative. In fact, $$\\lim_{\\beta \\to \\alpha}\\frac{e^{\\beta x} - e^{\\alpha x}}{\\beta - \\alpha} = \\frac{\\partial}{\\partial \\beta}e^{\\beta x}\\Big|_{\\beta = \\alpha} = x e^{\\alpha x}$$.\n- Step 3: So $$xe^{\\alpha x}$$ is the \"derivative w.r.t. the root\" of $$e^{\\alpha x}$$ ‚ÄĒ it naturally emerges as the second independent solution when two roots merge. Not a coincidence.\n\nTakeaway: $$xe^{\\alpha x}$$ is the \"infinitesimal difference\" between two nearby exponential solutions as they merge into one.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_60", "judge_pick": true}, {"question": "Show that complex exponentials $$Ae^{\\alpha x} + Be^{\\bar\\alpha x}$$ with $$\\alpha = p + qi$$ can be rewritten as $$e^{px}(C\\cos qx + D\\sin qx)$$ with real $$C, D$$. (4 steps)", "answer": "- Step 1: Expand: $$Ae^{(p+qi)x} + Be^{(p-qi)x} = e^{px}\\left[Ae^{iqx} + Be^{-iqx}\\right]$$.\n- Step 2: Apply Euler: $$e^{iqx} = \\cos qx + i\\sin qx$$, $$e^{-iqx} = \\cos qx - i\\sin qx$$. So $$Ae^{iqx} + Be^{-iqx} = (A + B)\\cos qx + i(A - B)\\sin qx$$.\n- Step 3: Set $$C = A + B$$ and $$D = i(A - B)$$. For $$C, D$$ to be real, we need $$A + B \\in \\mathbb{R}$$ and $$A - B$$ purely imaginary.\n- Step 4: These conditions together mean $$B = \\bar{A}$$ (complex conjugates). For any real $$C, D$$, we can solve $$A = \\frac{1}{2}(C - iD)$$, $$B = \\frac{1}{2}(C + iD)$$, which are conjugates. So $$A, B$$ can be chosen to make $$C, D$$ real.\n\nTakeaway: The real-valued trig form is just the complex-exponential form with conjugate coefficients ‚ÄĒ both describe the same 2-parameter real solution space.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_61", "judge_pick": false}, {"question": "For the differential equation $$9\\frac{d^2y}{dx^2} - 6\\frac{dy}{dx} + 5y = 0$$, find the general solution conceptually. (3 steps)", "answer": "- Step 1: Auxiliary equation: $$9m^2 - 6m + 5 = 0$$. Discriminant: $$36 - 180 = -144 < 0$$ ‚ÄĒ complex conjugate roots.\n- Step 2: Quadratic formula: $$m = \\frac{6 \\pm \\sqrt{-144}}{18} = \\frac{1}{3} \\pm \\frac{2}{3}i$$. Real part $$p = \\frac{1}{3}$$, imaginary part $$q = \\frac{2}{3}$$.\n- Step 3: General solution: $$y = e^{x/3}\\left(A\\cos\\tfrac{2x}{3} + B\\sin\\tfrac{2x}{3}\\right)$$. Growing oscillations, since $$p > 0$$.\n\nTakeaway: For 3-term auxiliary equations, compute the discriminant first to classify, then apply the quadratic formula.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_62", "judge_pick": false}, {"question": "For a P.I., when $$f(x) = p e^{kx}$$ and $$k$$ is NOT a root of the auxiliary equation, confirm that the trial $$y_p = \\lambda e^{kx}$$ gives $$\\lambda = \\frac{p}{ak^2 + bk + c}$$. (3 steps)", "answer": "- Step 1: Substitute $$y_p = \\lambda e^{kx}$$ into $$ay'' + by' + cy = pe^{kx}$$: $$y_p' = \\lambda k e^{kx}$$, $$y_p'' = \\lambda k^2 e^{kx}$$. LHS becomes $$\\lambda e^{kx}(ak^2 + bk + c)$$.\n- Step 2: Equate to RHS: $$\\lambda e^{kx}(ak^2 + bk + c) = pe^{kx}$$. Cancel $$e^{kx}$$: $$\\lambda (ak^2 + bk + c) = p$$.\n- Step 3: Solve for $$\\lambda$$: $$\\lambda = \\frac{p}{ak^2 + bk + c}$$. Well-defined precisely when $$ak^2 + bk + c \\neq 0$$ ‚ÄĒ i.e. when $$k$$ is NOT a root. If $$k$$ IS a root, the denominator vanishes, and we must use a modified trial.\n\nTakeaway: The formula $$\\lambda = \\frac{p}{\\text{aux}(k)}$$ works unless $$k$$ is a root (then C.F.-overlap modification kicks in).", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_63", "judge_pick": true}, {"question": "If the function $$y(x) = 2e^{3x}$$ satisfies $$y'' - 5y' + 6y = f(x)$$, what must $$f(x)$$ be? (3 steps)", "answer": "- Step 1: Compute derivatives: $$y = 2e^{3x}$$, $$y' = 6e^{3x}$$, $$y'' = 18e^{3x}$$.\n- Step 2: Substitute into LHS: $$18e^{3x} - 5(6e^{3x}) + 6(2e^{3x}) = (18 - 30 + 12)e^{3x} = 0$$.\n- Step 3: We get zero! This happens because $$m = 3$$ is a root of the auxiliary equation $$m^2 - 5m + 6 = 0$$, so $$2e^{3x}$$ is actually a C.F. (homogeneous solution), and $$f(x) = 0$$. It cannot be a P.I. for any non-zero forcing ‚ÄĒ a proper P.I. for $$f(x) = pe^{3x}$$ would be $$\\lambda x e^{3x}$$.\n\nTakeaway: Always check: is the proposed P.I. actually in the C.F.? If yes, it solves the homogeneous equation, not a non-homogeneous one.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_64", "judge_pick": true}, {"question": "Why can't the particular integral of $$\\frac{d^2y}{dx^2} - 4\\frac{dy}{dx} + 4y = 4e^{2x}$$ be of the form $$\\lambda e^{2x}$$ OR $$\\lambda x e^{2x}$$? (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 - 4m + 4 = (m-2)^2 = 0$$, so $$m = 2$$ is a repeated root. C.F. is $$(A + Bx)e^{2x}$$ ‚ÄĒ contains BOTH $$e^{2x}$$ AND $$xe^{2x}$$.\n- Step 2: Therefore $$\\lambda e^{2x}$$ gives $$L[y_p] = 0$$ (C.F. term), and $$\\lambda x e^{2x}$$ also gives $$L[y_p] = 0$$ (also C.F. term) ‚ÄĒ neither can equal $$4e^{2x}$$.\n- Step 3: We need to multiply by $$x$$ twice: try $$y_p = \\lambda x^2 e^{2x}$$. This is NOT in the C.F., so $$L[y_p]$$ will be non-zero and we can solve for $$\\lambda$$. Answer: $$\\lambda = 2$$.\n\nTakeaway: For a double root, you need TWO extra factors of $$x$$ in the P.I. ‚ÄĒ multiply by $$x^{\\text{multiplicity}}$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_65", "judge_pick": true}, {"question": "Conceptually, why does the Cauchy-Euler substitution $$x = e^u$$ turn a variable-coefficient equation into a constant-coefficient one? (3 steps)", "answer": "- Step 1: In $$x^2 y'' + bxy' + cy = 0$$, the $$x$$-dependence of coefficients scales perfectly with derivative order: $$x^2$$ with $$y''$$, $$x$$ with $$y'$$, $$1$$ with $$y$$. This homogeneous structure is \"scale-invariant.\"\n- Step 2: The logarithmic substitution $$u = \\ln x$$ turns multiplicative structure into additive structure: scaling $$x$$ by a factor corresponds to translating $$u$$. Derivatives w.r.t. $$u$$ involve only additive shifts ‚ÄĒ exactly what constant-coefficient equations do.\n- Step 3: Concretely, the operator $$x\\frac{d}{dx}$$ becomes $$\\frac{d}{du}$$, and $$x^2\\frac{d^2}{dx^2}$$ becomes $$\\frac{d^2}{du^2} - \\frac{d}{du}$$ ‚ÄĒ both constant-coefficient operators in $$u$$.\n\nTakeaway: Euler equations are \"log-translation-invariant\" ‚ÄĒ the logarithm reveals their hidden constant-coefficient nature.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_66", "judge_pick": true}, {"question": "What is the general shape of the P.I. to try if the forcing is $$f(x) = xe^{kx}$$ (where $$k$$ is NOT a root of the auxiliary equation)? (3 steps)", "answer": "- Step 1: The family of functions that includes $$xe^{kx}$$ under differentiation is $$\\{e^{kx}, xe^{kx}\\}$$ ‚ÄĒ differentiating a (polynomial)$$\\cdot e^{kx}$$ keeps both parts around.\n- Step 2: The correct trial is the full family: $$y_p = (\\lambda + \\mu x)e^{kx}$$ ‚ÄĒ two undetermined coefficients.\n- Step 3: Plug in, match coefficients of $$e^{kx}$$ and $$xe^{kx}$$ separately (they're linearly independent) ‚ÄĒ two equations for $$\\lambda, \\mu$$. If $$k$$ IS a root, multiply everything by $$x^{\\text{multiplicity}}$$ first.\n\nTakeaway: For $$f(x) = (\\text{polynomial}) \\cdot e^{kx}$$, the trial is (polynomial of same degree) $$\\cdot e^{kx}$$ with all lower-degree terms.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_67", "judge_pick": false}, {"question": "A DE has the solution $$y(x) = 3e^{-x} + 2xe^{-x}$$ satisfying $$y(0) = 3$$ and $$y'(0) = -1$$. What is the DE, and do the initial conditions check out? (3 steps)", "answer": "- Step 1: The solution form $$(A + Bx)e^{-x}$$ with $$A = 3, B = 2$$ indicates the auxiliary equation has a repeated root at $$m = -1$$, giving $$(m+1)^2 = m^2 + 2m + 1 = 0$$. So DE is $$y'' + 2y' + y = 0$$.\n- Step 2: $$y(0)$$: substitute $$x = 0$$ into $$(A+Bx)e^{-x}$$, getting $$A = 3$$. ‚úď\n- Step 3: $$y'(0)$$: differentiate $$y$$ to get $$y' = Be^{-x} - (A + Bx)e^{-x}$$. At $$x = 0$$: $$B - A = 2 - 3 = -1$$. ‚úď Both conditions consistent.\n\nTakeaway: The solution form reveals the DE (via the auxiliary equation), and the initial conditions fix the arbitrary constants.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_68", "judge_pick": false}, {"question": "The substitution $$z = y^2$$ can transform certain first-order DEs. Conceptually, why might this substitution be useful, and what class of equations does it often solve? (3 steps)", "answer": "- Step 1: If $$z = y^2$$, then $$\\frac{dz}{dx} = 2y\\frac{dy}{dx}$$. This \"absorbs\" a factor of $$y\\frac{dy}{dx}$$ from the original DE into a single derivative of $$z$$.\n- Step 2: Equations of the form $$yy' + (\\text{functions of x}) y^2 = (\\text{functions of x})$$ can be rewritten in terms of $$z, z', x$$, typically as linear first-order equations in $$z$$, solvable with an integrating factor.\n- Step 3: This is a manifestation of a general principle: \"quadratic in $$y$$\" structures often linearise under a power substitution. Similar trick works for Bernoulli equations $$y' + Py = Qy^n$$, where $$z = y^{1-n}$$ linearises them.\n\nTakeaway: Power substitutions linearise equations that are \"polynomial in $$y$$\" ‚ÄĒ part of the broader Bernoulli class.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_69", "judge_pick": true}, {"question": "Explain why, in $$\\frac{d^2y}{dx^2} + \\tan x \\frac{dy}{dx} + y\\cos^2 x = \\cos^2 x \\cdot e^{\\sin x}$$, the substitution $$z = \\sin x$$ is well-motivated. (3 steps)", "answer": "- Step 1: The DE has $$\\tan x$$ and $$\\cos^2 x$$ as coefficients ‚ÄĒ \"messy\" trigonometric functions. The RHS $$\\cos^2 x \\cdot e^{\\sin x}$$ contains $$e^{\\sin x}$$, suggesting that $$\\sin x$$ is playing the role of a natural variable.\n- Step 2: Letting $$z = \\sin x$$, we have $$\\frac{dz}{dx} = \\cos x$$, and many terms involving $$\\sin x$$ and $$\\cos x$$ will simplify. For instance, $$\\cos^2 x = 1 - z^2$$, and the forcing $$e^{\\sin x}$$ becomes $$e^z$$.\n- Step 3: After computing $$\\frac{dy}{dx}$$ and $$\\frac{d^2y}{dx^2}$$ in terms of $$\\frac{dy}{dz}$$ and $$\\frac{d^2 y}{dz^2}$$ (via chain rule), the trigonometric mess consolidates, and the equation reduces to a constant-coefficient equation in $$z$$.\n\nTakeaway: The \"right\" substitution is often visible in the structure of the nonlinearities ‚ÄĒ $$e^{\\sin x}$$ screams \"let $$z = \\sin x$$.\"", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_70", "judge_pick": true}, {"question": "When you're asked to show that a particular integral of the form $$\\lambda e^{-x}$$ solves an ODE, what is the systematic procedure? (3 steps)", "answer": "- Step 1: Compute derivatives of the trial: $$y_p = \\lambda e^{-x}$$, $$y_p' = -\\lambda e^{-x}$$, $$y_p'' = \\lambda e^{-x}$$.\n- Step 2: Substitute into LHS. All terms contain $$e^{-x}$$, which factors out.\n- Step 3: Remaining algebraic equation is (something in $$\\lambda$$) $$\\cdot e^{-x}$$ = RHS. If RHS has form (constant) $$\\cdot e^{-x}$$, divide through by $$e^{-x}$$ and solve for $$\\lambda$$. If RHS doesn't match, trial is wrong (overlap with C.F., or wrong family).\n\nTakeaway: Substitute, factor the common exponential, match coefficients ‚ÄĒ standard recipe for exponential P.I.s.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_71", "judge_pick": false}, {"question": "For a mechanical oscillator modelled by $$m\\ddot{x} + c\\dot{x} + kx = F_0\\cos\\omega t$$, what does the homogeneous solution represent, and what does the particular integral represent? (3 steps)", "answer": "- Step 1: The homogeneous solution (C.F.) represents the \"free\" or \"natural\" response ‚ÄĒ how the system would oscillate without forcing. In the damped case (roots with negative real part), this represents transients that die out over time.\n- Step 2: The particular integral (P.I.) represents the \"forced\" or \"steady-state\" response ‚ÄĒ the sustained oscillation driven by the external force. Its frequency matches the forcing frequency; its amplitude depends on how close the forcing is to resonance.\n- Step 3: Physically: if you pluck a damped guitar string while playing a different note, the C.F. is the (decaying) tone of the string's natural frequency, while the P.I. is the continuously driven tone. Eventually only the P.I. remains audibly.\n\nTakeaway: C.F. = transients (from initial conditions, dying out); P.I. = steady-state response to forcing.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_72", "judge_pick": false}, {"question": "In what sense is the form $$y = e^{px}(A\\cos qx + B\\sin qx)$$ equivalent to $$y = Re^{px}\\cos(qx - \\phi)$$ with $$R, \\phi$$ real? (3 steps)", "answer": "- Step 1: Using the harmonic addition formula: $$A\\cos qx + B\\sin qx = R\\cos(qx - \\phi)$$ where $$R = \\sqrt{A^2 + B^2}$$ and $$\\tan\\phi = B/A$$.\n- Step 2: So $$y = e^{px}(A\\cos qx + B\\sin qx) = Re^{px}\\cos(qx - \\phi)$$.\n- Step 3: Both forms use two arbitrary parameters. The $$(A, B)$$ form is convenient for applying initial conditions (linear algebra), while $$(R, \\phi)$$ form gives physical insight: $$R$$ is amplitude at $$x = 0$$, $$\\phi$$ is phase shift. They describe identical motion.\n\nTakeaway: $$(A, B)$$ and $$(R, \\phi)$$ are alternative parametrisations of the same 2-parameter family of damped/growing oscillations.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_73", "judge_pick": false}, {"question": "If you know the general solution to a 2nd-order homogeneous DE has form $$y = Ae^{-x} + Be^{-4x}$$, can you immediately write the DE? (3 steps)", "answer": "- Step 1: From the solution form, the roots of the auxiliary equation are $$m = -1$$ and $$m = -4$$.\n- Step 2: The auxiliary equation (leading coefficient 1) is $$(m + 1)(m + 4) = m^2 + 5m + 4 = 0$$.\n- Step 3: Therefore the corresponding DE is $$\\frac{d^2y}{dx^2} + 5\\frac{dy}{dx} + 4y = 0$$ (or any constant multiple thereof).\n\nTakeaway: The auxiliary equation's roots are the \"$$\\lambda$$\" values in the solution ‚ÄĒ reverse-engineer the DE by reconstructing the quadratic.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_74", "judge_pick": false}, {"question": "Consider a DE whose general solution has the form $$y = e^{-2x}(A\\cos 3x + B\\sin 3x) + \\frac{1}{2}e^x$$. Identify the C.F., P.I., and the roots of the auxiliary equation. (3 steps)", "answer": "- Step 1: The part with arbitrary constants $$A, B$$ is the C.F.: $$y_c = e^{-2x}(A\\cos 3x + B\\sin 3x)$$. The constant-free leftover is the P.I.: $$y_p = \\frac{1}{2}e^x$$.\n- Step 2: The C.F. structure identifies the roots of the auxiliary equation as $$m = -2 \\pm 3i$$ (real part $$-2$$, imag part $$\\pm 3$$).\n- Step 3: Therefore the auxiliary equation is $$(m+2)^2 + 9 = m^2 + 4m + 13 = 0$$, and the DE is $$\\frac{d^2y}{dx^2} + 4\\frac{dy}{dx} + 13y = f(x)$$ for some $$f(x)$$ yielding this P.I. Check: $$L[\\frac{1}{2}e^x] = \\frac{1}{2}(1 + 4 + 13)e^x = 9e^x$$, so $$f(x) = 9e^x$$.\n\nTakeaway: Reading the C.F. gives the auxiliary roots; the \"leftover\" is the P.I., from which you can recover the forcing function.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_75", "judge_pick": false}, {"question": "Describe what happens to the solution of $$y'' + y = \\sin x$$ as $$x \\to \\infty$$ ‚ÄĒ the resonance case. (3 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 + 1 = 0$$ gives $$m = \\pm i$$. C.F.: $$y_c = A\\cos x + B\\sin x$$. Forcing has frequency 1, matching the natural frequency ‚ÄĒ RESONANCE.\n- Step 2: The trial $$\\lambda\\sin x + \\mu\\cos x$$ is in the C.F., so multiply by $$x$$: try $$y_p = x(\\lambda\\cos x + \\mu\\sin x)$$. After substituting and matching, $$\\lambda = -\\frac{1}{2}$$, $$\\mu = 0$$, giving $$y_p = -\\frac{x}{2}\\cos x$$.\n- Step 3: Solution $$y = A\\cos x + B\\sin x - \\frac{x}{2}\\cos x$$ has amplitude growing linearly in $$x$$ (from the $$x\\cos x$$ term). As $$x \\to \\infty$$, the oscillation amplitude blows up ‚ÄĒ pure resonant growth.\n\nTakeaway: Forcing at the natural frequency yields solutions with linearly growing amplitude ‚ÄĒ the system \"pumps up\" indefinitely.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_76", "judge_pick": false}, {"question": "Given the general solution $$y = Ae^{3x} + Be^{-3x} + x^2 + 2x + 1$$, identify the C.F., the P.I., and the corresponding auxiliary equation. (3 steps)", "answer": "- Step 1: Terms with arbitrary constants are the C.F.: $$y_c = Ae^{3x} + Be^{-3x}$$. Remaining terms form the P.I.: $$y_p = x^2 + 2x + 1$$.\n- Step 2: The C.F. form $$Ae^{3x} + Be^{-3x}$$ indicates two distinct real roots $$m = \\pm 3$$. Auxiliary equation: $$(m-3)(m+3) = m^2 - 9 = 0$$.\n- Step 3: The homogeneous DE is $$\\frac{d^2y}{dx^2} - 9y = 0$$, or with the P.I.: $$\\frac{d^2y}{dx^2} - 9y = f(x)$$ where substituting gives $$f(x) = 2 - 9(x^2 + 2x + 1) = -9x^2 - 18x - 7$$.\n\nTakeaway: Reading off the C.F. structure gives you the auxiliary roots; everything else in the general solution is the P.I.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_77", "judge_pick": true}, {"question": "Why does critical damping (repeated root, e.g., $$m = -\\lambda$$ of multiplicity 2) represent the fastest return to equilibrium without oscillation? (3 steps)", "answer": "- Step 1: Three regimes for a damped oscillator:\n+ Underdamped (complex roots, real part $$<0$$): oscillates about equilibrium while decaying ‚ÄĒ takes time to settle.\n+ Overdamped (two distinct negative real roots $$m_1 < m_2 < 0$$): pure exponential decay, dominated by the slower root $$m_2$$ ‚ÄĒ slow return.\n+ Critically damped (repeated root $$m = -\\lambda$$): decay rate $$\\lambda$$, lies exactly at the boundary ‚ÄĒ fastest pure-exponential decay.\n- Step 2: Decreasing damping from critical ‚Üí underdamping + overshoot: oscillation increases settling time. Increasing damping from critical ‚Üí overdamping: the slow exponential becomes a bottleneck.\n- Step 3: Critical damping optimises \"return to equilibrium\" ‚ÄĒ no oscillation, no slow leftover exponential. Why shock absorbers and gauges are designed to be critically damped or slightly underdamped.\n\nTakeaway: Critical damping is the goldilocks zone ‚ÄĒ fastest non-oscillating return to equilibrium.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_78", "judge_pick": true}, {"question": "A spring-mass system is modelled by $$\\ddot{x} + \\dot{x} + 25x = 0$$. Is this over-, under-, or critically damped, and what does the solution look like? (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + m + 25 = 0$$. Discriminant $$= 1 - 100 = -99 < 0$$, so complex conjugate roots.\n- Step 2: Roots: $$m = -\\frac{1}{2} \\pm \\frac{\\sqrt{99}}{2}i$$. Real part negative ($$-1/2$$), imaginary part $$\\approx 4.97$$.\n- Step 3: Underdamped. Solution $$x = e^{-t/2}\\left(A\\cos(\\tfrac{\\sqrt{99}}{2}t) + B\\sin(\\tfrac{\\sqrt{99}}{2}t)\\right)$$ oscillates at angular frequency $$\\approx 5$$ while amplitude envelope $$e^{-t/2}$$ decays ‚ÄĒ mass oscillates back and forth several times before motion dies out.\n\nTakeaway: Underdamped systems oscillate at a frequency slightly less than the undamped natural frequency, with exponentially decaying amplitude.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_79", "judge_pick": true}, {"question": "A simple exercise: find the general solution to $$\\frac{d^2y}{dx^2} + 25y = 0$$. (3 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 + 25 = 0$$ gives $$m^2 = -25$$, so $$m = \\pm 5i$$ (purely imaginary).\n- Step 2: This corresponds to $$p = 0$$, $$q = 5$$ in the complex-roots general form.\n- Step 3: Since $$p = 0$$, no exponential envelope ‚ÄĒ general solution is $$y = A\\cos 5x + B\\sin 5x$$. Undamped SHM of angular frequency 5.\n\nTakeaway: $$y'' + \\omega^2 y = 0$$ is the pure SHM equation ‚ÄĒ solution is $$A\\cos\\omega x + B\\sin\\omega x$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_80", "judge_pick": false}, {"question": "Find the general solution to $$4\\frac{d^2y}{dx^2} - 4\\frac{dy}{dx} + y = 0$$ and explain what type of root arises. (3 steps)", "answer": "- Step 1: Auxiliary equation $$4m^2 - 4m + 1 = 0$$. Factors as $$(2m - 1)^2 = 0$$, giving $$m = \\frac{1}{2}$$ as a REPEATED root.\n- Step 2: Repeated root ‚Üí general solution is $$y = (A + Bx)e^{mx} = (A + Bx)e^{x/2}$$.\n- Step 3: Qualitatively: both $$Ae^{x/2}$$ and $$Bxe^{x/2}$$ grow without bound as $$x \\to \\infty$$ (since $$m = 1/2 > 0$$). No oscillation, just exponential-polynomial growth.\n\nTakeaway: Perfect-square auxiliary equation ‚Üí repeated root ‚Üí $$(A + Bx)e^{mx}$$ general solution.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_81", "judge_pick": false}, {"question": "Conceptually explain the modified P.I. for $$\\frac{d^2y}{dx^2} - y = 2e^x$$: why must it be $$xe^x$$ (with a specific coefficient), not just $$\\lambda e^x$$? (3 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 - 1 = 0$$ gives $$m = \\pm 1$$. C.F. is $$Ae^x + Be^{-x}$$ ‚ÄĒ and $$e^x$$ is part of the C.F.!\n- Step 2: Trying $$y_p = \\lambda e^x$$ yields $$L[\\lambda e^x] = \\lambda(1 - 1)e^x = 0$$, not $$2e^x$$ ‚ÄĒ so no value of $$\\lambda$$ can work.\n- Step 3: Try instead $$y_p = \\lambda x e^x$$. Differentiate: $$y_p' = \\lambda(xe^x + e^x)$$, $$y_p'' = \\lambda(xe^x + 2e^x)$$. Substitute: $$\\lambda(xe^x + 2e^x) - \\lambda xe^x = 2\\lambda e^x = 2e^x$$, giving $$\\lambda = 1$$. So $$y_p = xe^x$$.\n\nTakeaway: Overlap with C.F. forces $$x$$-multiplication; the resulting P.I. is linearly independent from C.F. and can absorb the forcing.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_82", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dx^2} + y = 5xe^{2x}$$, outline how to find a suitable P.I. (3 steps)", "answer": "- Step 1: Forcing $$5xe^{2x}$$ combines a polynomial of degree 1 with an exponential of rate 2. The complete family under differentiation is $$\\{e^{2x}, xe^{2x}\\}$$. Check overlap: auxiliary $$m^2 + 1 = 0$$ gives $$m = \\pm i$$, and $$2$$ is NOT a root. No overlap.\n- Step 2: Trial: $$y_p = (\\lambda + \\mu x)e^{2x}$$ ‚ÄĒ two coefficients for the two family members.\n- Step 3: Compute $$y_p', y_p''$$ using product rule, substitute into DE, and match coefficients of $$e^{2x}$$ and $$xe^{2x}$$ separately ‚ÄĒ two equations for $$\\lambda, \\mu$$.\n\nTakeaway: For $$f(x) = (\\text{polynomial}) \\cdot e^{kx}$$, trial is (polynomial of same degree) $$\\cdot e^{kx}$$ ‚ÄĒ include all lower terms.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_83", "judge_pick": false}, {"question": "In a boundary value problem, what role does each of the two conditions $$y(x_0) = \\alpha$$ and $$y(x_1) = \\beta$$ play in determining the arbitrary constants $$A$$ and $$B$$? (3 steps)", "answer": "- Step 1: Each boundary condition becomes a linear equation in $$A$$ and $$B$$ after substituting the general solution at the corresponding point.\n- Step 2: Specifically, $$y(x_0) = \\alpha$$ gives one linear equation, and $$y(x_1) = \\beta$$ gives another. This is a 2√ó2 linear system.\n- Step 3: If the coefficient matrix is non-singular (determinant $$\\neq 0$$), unique solution for $$(A, B)$$. If singular, either no solution (if $$\\alpha, \\beta$$ are incompatible) or infinitely many ‚ÄĒ eigenvalue-like situations.\n\nTakeaway: Each boundary condition ‚Üí one linear equation ‚Üí together they form a solvable system (usually).", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_84", "judge_pick": false}, {"question": "Why does writing a linear homogeneous DE as $$L[y] = 0$$ (where $$L = a\\frac{d^2}{dx^2} + b\\frac{d}{dx} + c$$) make superposition obvious? (3 steps)", "answer": "- Step 1: $$L$$ is a linear operator: $$L[\\alpha y_1 + \\beta y_2] = \\alpha L[y_1] + \\beta L[y_2]$$ for any constants $$\\alpha, \\beta$$ and any functions $$y_1, y_2$$. This follows from linearity of derivatives.\n- Step 2: Suppose $$L[y_1] = 0$$ and $$L[y_2] = 0$$. Then $$L[\\alpha y_1 + \\beta y_2] = \\alpha \\cdot 0 + \\beta \\cdot 0 = 0$$.\n- Step 3: So any linear combination of solutions is itself a solution ‚ÄĒ this is the superposition principle, now seen as a trivial consequence of $$L$$ being a linear operator.\n\nTakeaway: Operator notation makes the key property ‚ÄĒ linearity ‚ÄĒ visible, and superposition becomes automatic.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_85", "judge_pick": true}, {"question": "Find the general solution of $$\\frac{d^2y}{dx^2} + 4\\frac{dy}{dx} + 13y = 0$$ and identify the damping regime. (3 steps)", "answer": "- Step 1: Auxiliary: $$m^2 + 4m + 13 = 0$$. Discriminant $$= 16 - 52 = -36 < 0$$ ‚ÄĒ complex conjugate roots.\n- Step 2: Roots: $$m = \\frac{-4 \\pm \\sqrt{-36}}{2} = -2 \\pm 3i$$. Real part $$p = -2$$ (negative, decay), imaginary part $$q = 3$$ (oscillation).\n- Step 3: General solution: $$y = e^{-2x}(A\\cos 3x + B\\sin 3x)$$. Underdamped ‚ÄĒ oscillations with exponentially decaying envelope, decaying to zero.\n\nTakeaway: Negative real part + nonzero imaginary = underdamped; solution is a damped sinusoid.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_86", "judge_pick": false}, {"question": "When you see $$y = e^{-x}$$ appearing in the P.I. for a DE, but the DE also has $$e^{-x}$$ in its C.F., what should trigger in your mind and why? (3 steps)", "answer": "- Step 1: Red flag: \"overlap\" between P.I. trial and C.F. A naive $$\\lambda e^{-x}$$ would yield $$L[\\lambda e^{-x}] = 0$$, never matching any non-zero forcing $$pe^{-x}$$.\n- Step 2: Check the auxiliary equation: $$-1$$ is one of its roots. So I need to multiply my trial by $$x$$ to get OUT of the C.F.: try $$\\lambda x e^{-x}$$.\n- Step 3: If $$-1$$ turns out to be a repeated root, even $$xe^{-x}$$ is in the C.F., and I'd need $$\\lambda x^2 e^{-x}$$. General rule: multiply by $$x^{\\text{multiplicity of }-1}$$.\n\nTakeaway: Same function in forcing and C.F. means \"modify the trial\" ‚ÄĒ multiply by the right power of $$x$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_87", "judge_pick": false}, {"question": "For the DE $$\\frac{d^2x}{dt^2} + 5\\frac{dx}{dt} + 6x = 2e^{-t}$$ with $$x(0) = 0$$ and $$x'(0) = 2$$, predict the long-term behavior without computing $$A, B$$ fully. (3 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 + 5m + 6 = (m+2)(m+3) = 0$$ gives $$m = -2, -3$$ ‚ÄĒ both negative. C.F. is $$Ae^{-2t} + Be^{-3t}$$, which decays to 0.\n- Step 2: The forcing rate is $$-1$$, not a root, so P.I. is $$\\lambda e^{-t}$$, which also decays (since $$-1 < 0$$) ‚ÄĒ but slower than C.F. terms.\n- Step 3: All contributions decay to 0 as $$t \\to \\infty$$. The P.I., decaying at rate $$1$$ rather than $$2$$ or $$3$$, dominates the tail ‚ÄĒ so $$x(t) \\sim \\lambda e^{-t}$$ for large $$t$$.\n\nTakeaway: In a damped system, all parts decay; the slowest-decaying component dominates the long-time tail.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_88", "judge_pick": false}, {"question": "Why must the general solution of the reducible DE $$x^2 y'' + xy' + y = 0$$ necessarily be expressed using $$\\ln x$$ rather than just $$x$$? (3 steps)", "answer": "- Step 1: The substitution $$u = \\ln x$$ transforms the equation into $$\\frac{d^2y}{du^2} + y = 0$$, whose solution is $$y = A\\cos u + B\\sin u$$.\n- Step 2: To go back to the original variable, substitute $$u = \\ln x$$. The trig functions now have $$\\ln x$$ as their argument: $$y = A\\cos(\\ln x) + B\\sin(\\ln x)$$.\n- Step 3: Necessary because the Euler equation is \"log-translation-invariant\" ‚ÄĒ its natural variable is $$\\ln x$$, not $$x$$. Solutions oscillate in $$\\ln x$$ (infinitely many oscillations as $$x \\to 0^+$$), a characteristic signature.\n\nTakeaway: Euler equations have solutions whose arguments are $$\\ln x$$ ‚ÄĒ reflecting the equation's natural logarithmic symmetry.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_89", "judge_pick": true}, {"question": "Using $$x = e^u$$, set up the transformed equation corresponding to $$x^2 \\frac{d^2y}{dx^2} + 6x\\frac{dy}{dx} + 4y = 0$$. (3 steps)", "answer": "- Step 1: Recall substitution identities: $$x\\frac{dy}{dx} = \\frac{dy}{du}$$ and $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$.\n- Step 2: Substitute into the DE: $$\\left(\\frac{d^2y}{du^2} - \\frac{dy}{du}\\right) + 6\\left(\\frac{dy}{du}\\right) + 4y = 0$$, simplifying to $$\\frac{d^2y}{du^2} + 5\\frac{dy}{du} + 4y = 0$$.\n- Step 3: Standard constant-coefficient equation. Auxiliary $$m^2 + 5m + 4 = (m+1)(m+4) = 0$$, roots $$m = -1, -4$$. So $$y = Ae^{-u} + Be^{-4u}$$. Back-substitute: $$y = \\frac{A}{x} + \\frac{B}{x^4}$$.\n\nTakeaway: $$x = e^u$$ converts multi-$$x$$ coefficients into constant coefficients; exponentials in $$u$$ become powers of $$x$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_90", "judge_pick": false}, {"question": "In reducible DEs, what does the presence of the substitution $$y = \\frac{z}{x}$$ (instead of $$x = e^u$$) suggest about the expected structure of the original DE? (3 steps)", "answer": "- Step 1: The substitution $$y = \\frac{z}{x}$$ is \"stripping a factor\" ‚ÄĒ we anticipate that the solution has an overall $$\\frac{1}{x}$$ factor, and we solve for the \"rest\" $$z$$.\n- Step 2: Useful when the original DE has a known particular power-law solution like $$y = \\frac{1}{x}$$, or when coefficient structure suggests a $$\\frac{1}{x}$$ scaling.\n- Step 3: After substitution, the transformed equation for $$z$$ is typically simpler ‚ÄĒ constant-coefficient or at least easier. Once $$z$$ is found, recover $$y = z/x$$.\n\nTakeaway: \"Strip a factor\" substitutions separate out a known power-law piece so the residual equation is simpler.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_91", "judge_pick": true}, {"question": "Solve the initial-value problem $$\\frac{d^2y}{dx^2} + k^2 y = 0$$ with $$y(0) = 1$$ and $$y'(0) = 1$$, where $$k$$ is a positive constant. (4 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 + k^2 = 0$$ gives $$m = \\pm ki$$ ‚ÄĒ purely imaginary. C.F.: $$y = A\\cos kx + B\\sin kx$$.\n- Step 2: Apply $$y(0) = 1$$: $$A = 1$$.\n- Step 3: Differentiate: $$y' = -Ak\\sin kx + Bk\\cos kx$$. Apply $$y'(0) = 1$$: $$Bk = 1 \\Rightarrow B = 1/k$$.\n- Step 4: Particular solution: $$y = \\cos kx + \\frac{1}{k}\\sin kx$$. SHM at angular frequency $$k$$, starting at value 1 with initial slope 1.\n\nTakeaway: For pure SHM with I.C.s $$y(0), y'(0)$$, the constants are easy ‚ÄĒ read off $$A = y(0)$$ and $$Bk = y'(0)$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_92", "judge_pick": false}, {"question": "When would you expect the solution of a 2nd-order DE to behave like a product $$x \\cdot e^{kx}$$ or $$x^2 \\cdot e^{kx}$$ instead of a pure exponential? (3 steps)", "answer": "- Step 1: $$x e^{kx}$$ terms appear whenever $$k$$ is a repeated root of the auxiliary equation ‚ÄĒ the \"second linearly independent solution\" when roots collide.\n- Step 2: $$x^2 e^{kx}$$ terms appear in P.I.s when forcing $$f(x) = pe^{kx}$$ AND $$k$$ is a double root ‚ÄĒ we've multiplied by $$x$$ twice to get OUT of the C.F. (which contains both $$e^{kx}$$ and $$xe^{kx}$$).\n- Step 3: More generally, powers of $$x$$ act as \"level-raisers\" ‚ÄĒ each time the trial P.I. overlaps with the C.F., multiply by $$x$$ again until you break free.\n\nTakeaway: Polynomial factors on exponentials are symptoms of root repetition ‚ÄĒ either in the C.F. or in forcing overlap.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_93", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dx^2} - y = 4e^x$$ with $$y(0) = 0$$ and $$y'(0) = 0$$, find a conceptual outline of the solution. (5 steps)", "answer": "- Step 1: C.F.: auxiliary $$m^2 - 1 = 0 \\Rightarrow m = \\pm 1$$. So $$y_c = Ae^x + Be^{-x}$$.\n- Step 2: P.I.: overlap (since $$m = 1$$ matches forcing rate). Try $$y_p = \\lambda x e^x$$. Substituting: $$y_p'' - y_p = 2\\lambda e^x = 4e^x$$, so $$\\lambda = 2$$. So $$y_p = 2xe^x$$.\n- Step 3: General solution: $$y = Ae^x + Be^{-x} + 2x e^x$$.\n- Step 4: Apply $$y(0) = 0$$: $$A + B = 0$$. Differentiate: $$y' = Ae^x - Be^{-x} + 2e^x + 2xe^x$$. Apply $$y'(0) = 0$$: $$A - B + 2 = 0 \\Rightarrow A - B = -2$$.\n- Step 5: Solve simultaneously: $$A = -1, B = 1$$. Particular solution: $$y = -e^x + e^{-x} + 2xe^x$$.\n\nTakeaway: Even with non-standard P.I. (overlap), procedure is the same: corrected P.I., apply boundary conditions to full general solution.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_94", "judge_pick": false}, {"question": "The equation $$\\frac{d^2y}{dx^2} + 9y = \\sin 3x$$ involves resonance. Explain why and what the solution form tells us. (4 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 + 9 = 0$$ gives $$m = \\pm 3i$$. C.F.: $$y_c = A\\cos 3x + B\\sin 3x$$ ‚ÄĒ oscillation at frequency 3.\n- Step 2: Forcing frequency is also 3 ‚ÄĒ MATCHES the natural frequency. Resonance. Trial $$\\lambda\\sin 3x + \\mu\\cos 3x$$ is in the C.F., so multiply by $$x$$: $$y_p = x(\\lambda\\sin 3x + \\mu\\cos 3x)$$.\n- Step 3: Differentiating and substituting yields coefficients with one of them non-zero (typically $$\\mu = -\\frac{1}{6}$$, $$\\lambda = 0$$), giving a P.I. containing $$x\\cos 3x$$.\n- Step 4: General solution has a term growing linearly with $$x$$: $$y$$ oscillates at frequency 3 but with amplitude that grows unboundedly ‚ÄĒ the classic resonance catastrophe.\n\nTakeaway: Resonance identified by forcing frequency = natural frequency; resulting P.I. has $$x$$-factor, causing linear amplitude growth.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_95", "judge_pick": false}, {"question": "For the differential equation $$9\\frac{d^2y}{dx^2} + 16y = 0$$, what is the angular frequency of the oscillation? (3 steps)", "answer": "- Step 1: Rearrange to standard form: $$\\frac{d^2y}{dx^2} + \\frac{16}{9}y = 0$$.\n- Step 2: Compare with general SHM form $$y'' + \\omega^2 y = 0$$. Here $$\\omega^2 = \\frac{16}{9}$$, so $$\\omega = \\frac{4}{3}$$.\n- Step 3: General solution: $$y = A\\cos\\frac{4x}{3} + B\\sin\\frac{4x}{3}$$ ‚ÄĒ SHM at angular frequency $$\\omega = 4/3$$.\n\nTakeaway: For $$ay'' + cy = 0$$ (no damping), angular frequency is $$\\omega = \\sqrt{c/a}$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_96", "judge_pick": false}, {"question": "Rapid conceptual recap: for each case of the auxiliary equation roots, what is the general solution form, and what does it mean physically? (3 steps)", "answer": "- Step 1: Three cases:\n+ Distinct real roots $$\\alpha, \\beta$$: $$y = Ae^{\\alpha x} + Be^{\\beta x}$$ ‚ÄĒ pure exponentials, no oscillation (overdamped if both negative).\n+ Repeated real root $$\\alpha$$: $$y = (A + Bx)e^{\\alpha x}$$ ‚ÄĒ exponential with polynomial factor; critical transition (critically damped if $$\\alpha < 0$$).\n+ Complex conjugate roots $$p \\pm qi$$: $$y = e^{px}(A\\cos qx + B\\sin qx)$$ ‚ÄĒ oscillation with exponential envelope (underdamped if $$p < 0$$).\n- Step 2: Physical meaning: the real part controls the decay/growth rate; the imaginary part controls the oscillation angular frequency.\n- Step 3: So one quadratic classifies ALL possible behaviours: pure exponentials, marginal exponential-polynomial, or damped/growing oscillations ‚ÄĒ an elegant trichotomy.\n\nTakeaway: Three cases: real + real, real = real, and real ¬Ī imaginary ‚ÄĒ each with distinct physical signatures.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_97", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dx^2} - 3\\frac{dy}{dx} + 2y = 3e^{2x}$$ with $$y(0) = 0, y'(0) = 0$$, conceptually walk through finding the solution. (5 steps)", "answer": "- Step 1: C.F.: auxiliary $$m^2 - 3m + 2 = (m-1)(m-2) = 0$$ gives $$m = 1, 2$$. So $$y_c = Ae^x + Be^{2x}$$.\n- Step 2: P.I.: forcing $$3e^{2x}$$, rate $$2$$ matches a C.F. root. Overlap! Multiply by $$x$$: try $$y_p = \\lambda xe^{2x}$$. Substituting, collecting, $$\\lambda = 3$$. So $$y_p = 3xe^{2x}$$.\n- Step 3: General solution: $$y = Ae^x + Be^{2x} + 3xe^{2x}$$.\n- Step 4: Apply $$y(0) = 0$$: $$A + B = 0$$. Differentiate: $$y' = Ae^x + 2Be^{2x} + 3e^{2x} + 6xe^{2x}$$. At $$x = 0$$: $$A + 2B + 3 = 0$$.\n- Step 5: Solve: $$A = -B$$; substitute: $$-B + 2B + 3 = 0 \\Rightarrow B = -3$$, $$A = 3$$. Particular solution: $$y = 3e^x - 3e^{2x} + 3xe^{2x}$$.\n\nTakeaway: For overlap P.I., follow $$x$$-multiplication rule, then apply boundary conditions to the full general solution.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_98", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dt^2} + 4\\frac{dy}{dt} + 3y = kt + 5$$ with constant $$k$$, conceptually describe the approximation of $$y$$ for large $$t$$. (3 steps)", "answer": "- Step 1: Auxiliary equation $$m^2 + 4m + 3 = (m+1)(m+3) = 0$$, roots $$m = -1, -3$$. C.F.: $$Ae^{-t} + Be^{-3t}$$. Both decay as $$t \\to \\infty$$, so C.F. ‚Üí 0.\n- Step 2: P.I.: forcing $$kt + 5$$ is a degree-1 polynomial. Neither root is 0, so no overlap with constants. Try $$y_p = \\lambda + \\mu t$$. Substituting and matching: $$\\mu = k/3$$; $$\\lambda = (15 - 4k)/9$$.\n- Step 3: For large $$t$$, C.F. ‚Üí 0, so $$y \\approx y_p = \\frac{k}{3}t + \\frac{15 - 4k}{9}$$. For $$k = 6$$: $$y \\approx 2t - 1$$.\n\nTakeaway: Damped system + polynomial forcing = linear steady-state response for large $$t$$; transients decay away.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_99", "judge_pick": false}, {"question": "Given the substitution $$u = \\frac{dy}{dx}$$ for $$x\\frac{d^2y}{dx^2} + \\frac{dy}{dx} = 12x$$, outline how to solve the equation. (4 steps)", "answer": "- Step 1: Let $$u = \\frac{dy}{dx}$$, so $$\\frac{du}{dx} = \\frac{d^2y}{dx^2}$$. DE becomes $$x\\frac{du}{dx} + u = 12x$$ ‚ÄĒ a first-order linear equation in $$u$$.\n- Step 2: Notice the LHS is exactly $$\\frac{d}{dx}(xu)$$ (product rule in reverse). So $$\\frac{d}{dx}(xu) = 12x$$.\n- Step 3: Integrate: $$xu = 6x^2 + C$$, so $$u = 6x + C/x$$.\n- Step 4: Integrate once more: $$y = \\int u\\, dx = 3x^2 + C\\ln|x| + D$$. Two arbitrary constants $$C, D$$ ‚ÄĒ matching what a 2nd-order DE needs.\n\nTakeaway: Order-reduction via $$u = y'$$ works when $$y$$ is absent; two integrations give two arbitrary constants.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_100", "judge_pick": false}, {"question": "Exercise: Find the general solution of $$\\frac{d^2y}{dx^2} + 2\\sqrt{3}\\frac{dy}{dx} + 3y = 0$$. (3 steps)", "answer": "- Step 1: Auxiliary equation: $$m^2 + 2\\sqrt{3}m + 3 = 0$$. Discriminant $$= (2\\sqrt{3})^2 - 12 = 12 - 12 = 0$$ ‚ÄĒ repeated root!\n- Step 2: The perfect square factors as $$(m + \\sqrt{3})^2 = 0$$, so $$m = -\\sqrt{3}$$ (repeated).\n- Step 3: General solution: $$y = (A + Bx)e^{-\\sqrt{3}x}$$. Both terms decay to 0 as $$x \\to \\infty$$.\n\nTakeaway: Recognise perfect-square discriminants: $$b^2 = 4ac$$ ‚áí repeated root ‚áí $$(A+Bx)e^{\\alpha x}$$ form.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_101", "judge_pick": false}, {"question": "Exercise: Find a particular integral for $$\\frac{d^2y}{dx^2} - 5\\frac{dy}{dx} + 4y = x^2 - 3x + 2$$. (3 steps)", "answer": "- Step 1: Forcing is a degree-2 polynomial; auxiliary $$m^2 - 5m + 4 = (m-1)(m-4) = 0$$ has roots $$1, 4$$, neither 0. No overlap. Try $$y_p = \\lambda x^2 + \\mu x + \\nu$$.\n- Step 2: Compute $$y_p' = 2\\lambda x + \\mu$$, $$y_p'' = 2\\lambda$$. Substitute: $$2\\lambda - 5(2\\lambda x + \\mu) + 4(\\lambda x^2 + \\mu x + \\nu) = x^2 - 3x + 2$$. Group: $$4\\lambda x^2 + (-10\\lambda + 4\\mu)x + (2\\lambda - 5\\mu + 4\\nu) = x^2 - 3x + 2$$.\n- Step 3: Match coefficients:\n+ $$4\\lambda = 1 \\Rightarrow \\lambda = 1/4$$.\n+ $$-10(1/4) + 4\\mu = -3 \\Rightarrow 4\\mu = -1/2 \\Rightarrow \\mu = -1/8$$.\n+ $$2(1/4) - 5(-1/8) + 4\\nu = 2 \\Rightarrow 4\\nu = 7/8 \\Rightarrow \\nu = 7/32$$.\n\nTakeaway: Polynomial P.I. requires matching coefficients of each power; work from highest power down.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_102", "judge_pick": false}, {"question": "What is a common misconception when solving a non-homogeneous 2nd-order DE, and how can it be avoided? (3 steps)", "answer": "- Step 1: Common misconception #1: applying boundary conditions to the C.F. instead of the full general solution. Students forget that the P.I. contributes to $$y(x_0)$$ and $$y'(x_0)$$.\n- Step 2: Common misconception #2: failing to modify the P.I. trial when it overlaps with the C.F. (e.g., using $$\\lambda e^{kx}$$ when $$k$$ is a root). This gives $$L[y_p] = 0$$, and you get stuck matching a non-zero forcing to zero.\n- Step 3: Avoidance: always (a) solve the auxiliary equation first to find the C.F., (b) check whether the P.I. trial overlaps, and modify by multiplying by $$x$$ if needed, (c) write the FULL general solution, (d) apply conditions to the full solution and its derivative.\n\nTakeaway: Two most frequent pitfalls are C.F.-only boundary application and missing P.I. modification.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_103", "judge_pick": true}, {"question": "Using $$z = \\sin x$$, show how the DE $$\\cos x \\frac{d^2y}{dx^2} + \\sin x\\frac{dy}{dx} - 2y\\cos^3 x = 2\\cos^5 x$$ transforms into $$\\frac{d^2y}{dz^2} - 2y = 2(1 - z^2)$$. (4 steps)", "answer": "- Step 1: Chain rule: $$\\frac{dy}{dx} = \\cos x \\frac{dy}{dz}$$ (since $$dz/dx = \\cos x$$).\n- Step 2: $$\\frac{d^2y}{dx^2} = \\frac{d}{dx}\\left(\\cos x \\frac{dy}{dz}\\right) = -\\sin x \\frac{dy}{dz} + \\cos^2 x \\frac{d^2y}{dz^2}$$.\n- Step 3: Substitute into the original DE: $$\\cos x \\left[-\\sin x \\frac{dy}{dz} + \\cos^2 x \\frac{d^2y}{dz^2}\\right] + \\sin x \\left[\\cos x \\frac{dy}{dz}\\right] - 2y\\cos^3 x = 2\\cos^5 x$$.\n- Step 4: The $$\\sin x \\cos x \\frac{dy}{dz}$$ terms cancel! Divide throughout by $$\\cos^3 x$$: $$\\frac{d^2y}{dz^2} - 2y = \\frac{2\\cos^5 x}{\\cos^3 x} = 2\\cos^2 x = 2(1 - \\sin^2 x) = 2(1 - z^2)$$. ‚úď\n\nTakeaway: The substitution is designed so the \"messy\" mixed terms cancel ‚ÄĒ leaving a clean constant-coefficient equation in $$z$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_104", "judge_pick": false}, {"question": "Summarise in one flow the procedure to solve a general non-homogeneous 2nd-order linear DE with constant coefficients and two boundary conditions. (5 steps)", "answer": "- Step 1: Write the auxiliary equation by replacing $$y''$$ with $$m^2$$, $$y'$$ with $$m$$, $$y$$ with $$1$$. Solve this quadratic for roots $$m_1, m_2$$.\n- Step 2: Based on nature of roots, write the complementary function:\n+ Distinct real $$\\alpha, \\beta$$: $$y_c = Ae^{\\alpha x} + Be^{\\beta x}$$.\n+ Repeated real $$\\alpha$$: $$y_c = (A + Bx)e^{\\alpha x}$$.\n+ Complex $$p \\pm qi$$: $$y_c = e^{px}(A\\cos qx + B\\sin qx)$$.\n- Step 3: Guess a P.I. $$y_p$$ based on the form of $$f(x)$$. If $$y_p$$ overlaps with $$y_c$$, multiply by $$x^k$$ where $$k$$ is the multiplicity of the overlap. Substitute, equate coefficients, solve.\n- Step 4: Write general solution $$y = y_c + y_p$$. This has two arbitrary constants $$A, B$$.\n- Step 5: Apply the two boundary/initial conditions: one to $$y$$, one to $$y'$$. Solve the 2√ó2 linear system for $$A, B$$. The final expression is the particular solution.\n\nTakeaway: Master this 5-step flow and you can handle any problem of this type ‚ÄĒ the details are variations on the theme.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_105", "judge_pick": false}], "count": 106}, "opus_2": {"label": "Opus 4.7 ‚Ď°", "cards": [{"question": "What structural features define a *second-order linear homogeneous* differential equation with constant coefficients, and what makes the word \"homogeneous\" earn its place in the name? (3 steps)", "answer": "- Step 1: The equation has the form $$a\\frac{d^2y}{dx^2} + b\\frac{dy}{dx} + cy = 0$$ where $$a, b, c$$ are real constants (not functions of $$x$$). \"Second-order\" refers to the highest derivative present being the second.\n- Step 2: It is \"linear\" because $$y$$, $$y'$$, and $$y''$$ appear only to the first power ‚ÄĒ no terms like $$y^2$$, $$(y')^3$$, or $$yy'$$. Each term is a constant times one of $$y$$, $$y'$$, $$y''$$.\n- Step 3: \"Homogeneous\" means the right-hand side is zero. This matters because it gives a crucial property: if $$y_1$$ and $$y_2$$ are solutions, then so is $$Ay_1 + By_2$$ (superposition). That's only true when RHS = 0.\n\nThe zero RHS is what enables the clean \"linear combination of two basic solutions\" structure of the general solution.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_0", "judge_pick": true}, {"question": "Why must the general solution of a second-order differential equation contain exactly two arbitrary constants ‚ÄĒ not one, not three? (3 steps)", "answer": "- Step 1: Think about the simplest case: $$\\frac{d^2y}{dx^2} = f(x)$$. To recover $$y$$, you integrate once (introducing constant $$A$$) to get $$\\frac{dy}{dx}$$, then integrate again (introducing constant $$B$$) to get $$y$$.\n- Step 2: Each integration undoes one derivative and introduces one constant of integration. A second-order DE has *two* derivatives to undo, so two constants appear.\n- Step 3: Geometrically, this means the family of solution curves has two degrees of freedom ‚ÄĒ you can shift it vertically ($$B$$) and adjust its slope/rate ($$A$$). To pick out one specific curve, you need two independent pieces of information (two boundary conditions).\n\nThe rule is: **order of DE = number of arbitrary constants in general solution = number of conditions needed for a unique particular solution.**", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_1", "judge_pick": false}, {"question": "Why is the exponential function the natural \"ansatz\" (trial guess) for constant-coefficient linear DEs? What property of $$e^{\\lambda x}$$ makes it special? (3 steps)", "answer": "- Step 1: The equation $$ay'' + by' + cy = 0$$ mixes $$y$$, its first derivative, and its second derivative. For this combination to equal zero for all $$x$$, the terms must have a consistent \"shape\" that can cancel.\n- Step 2: The exponential $$e^{\\lambda x}$$ has the magical property that its derivative is proportional to itself: $$\\frac{d}{dx}e^{\\lambda x} = \\lambda e^{\\lambda x}$$ and $$\\frac{d^2}{dx^2}e^{\\lambda x} = \\lambda^2 e^{\\lambda x}$$. All derivatives have the same functional shape, just with different constant multipliers.\n- Step 3: So if $$y = e^{\\lambda x}$$, substituting gives $$a\\lambda^2 e^{\\lambda x} + b\\lambda e^{\\lambda x} + c e^{\\lambda x} = 0$$, i.e. $$e^{\\lambda x}(a\\lambda^2 + b\\lambda + c) = 0$$. Since $$e^{\\lambda x} \\neq 0$$, the entire problem reduces to an algebraic equation $$a\\lambda^2 + b\\lambda + c = 0$$.\n\nThe exponential turns a differential equation (hard) into an algebraic equation (easy).", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_2", "judge_pick": true}, {"question": "Derive the auxiliary equation by substituting the trial solution $$y = Ae^{\\lambda x} + Be^{\\mu x}$$ into $$a y'' + by' + cy = 0$$. (4 steps)", "answer": "- Step 1: Compute derivatives: $$y' = A\\lambda e^{\\lambda x} + B\\mu e^{\\mu x}$$ and $$y'' = A\\lambda^2 e^{\\lambda x} + B\\mu^2 e^{\\mu x}$$.\n- Step 2: Substitute into the LHS of the DE:\n$$a(A\\lambda^2 e^{\\lambda x} + B\\mu^2 e^{\\mu x}) + b(A\\lambda e^{\\lambda x} + B\\mu e^{\\mu x}) + c(Ae^{\\lambda x} + Be^{\\mu x}) = 0$$\n- Step 3: Group terms by exponential:\n$$Ae^{\\lambda x}(a\\lambda^2 + b\\lambda + c) + Be^{\\mu x}(a\\mu^2 + b\\mu + c) = 0$$\n- Step 4: Since $$e^{\\lambda x}$$ and $$e^{\\mu x}$$ are linearly independent (for $$\\lambda \\neq \\mu$$), each coefficient must separately vanish: both $$\\lambda$$ and $$\\mu$$ must satisfy $$am^2 + bm + c = 0$$. This quadratic is the **auxiliary equation**.\n\nThe trial solution works precisely when $$\\lambda, \\mu$$ are its roots.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_3", "judge_pick": false}, {"question": "What are the three cases for the roots of the auxiliary equation $$am^2 + bm + c = 0$$, and what determines which case occurs? (3 steps)", "answer": "- Step 1: The discriminant $$\\Delta = b^2 - 4ac$$ determines the nature of the roots, exactly as in any quadratic.\n- Step 2: Three possibilities:\n+ **Case 1** ($$b^2 > 4ac$$): Two distinct real roots $$\\alpha, \\beta$$. General solution: $$y = Ae^{\\alpha x} + Be^{\\beta x}$$.\n+ **Case 2** ($$b^2 = 4ac$$): One repeated real root $$\\alpha$$. General solution: $$y = (A + Bx)e^{\\alpha x}$$.\n+ **Case 3** ($$b^2 < 4ac$$): Two complex conjugate roots $$p \\pm qi$$. General solution: $$y = e^{px}(A\\cos qx + B\\sin qx)$$.\n- Step 3: The discriminant's sign controls whether solutions are purely exponential (decay/growth), involve a polynomial factor, or oscillate. Physically this corresponds to overdamped, critically damped, and underdamped systems.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_4", "judge_pick": false}, {"question": "When the auxiliary equation has a repeated root $$\\alpha$$, why can we NOT just write the general solution as $$y = Ae^{\\alpha x} + Be^{\\alpha x}$$? (2 steps)", "answer": "- Step 1: If we use the same exponential twice, $$Ae^{\\alpha x} + Be^{\\alpha x} = (A+B)e^{\\alpha x} = Ce^{\\alpha x}$$ where $$C = A+B$$ is a single arbitrary constant.\n- Step 2: This collapses our two-constant general solution into a one-constant family ‚ÄĒ but a second-order DE *requires* two arbitrary constants for its general solution. We'd be missing half the solution space.\n\nThe two basic solutions in the linear combination must be **linearly independent** (one is not just a multiple of the other); identical exponentials fail this test.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_5", "judge_pick": false}, {"question": "Show that when the auxiliary equation has a repeated root $$m = \\alpha$$, the function $$y = xe^{\\alpha x}$$ is a solution of the homogeneous DE $$ay'' + by' + cy = 0$$. (4 steps)", "answer": "- Step 1: Compute $$y = xe^{\\alpha x}$$, $$y' = e^{\\alpha x} + \\alpha x e^{\\alpha x}$$, $$y'' = 2\\alpha e^{\\alpha x} + \\alpha^2 x e^{\\alpha x}$$.\n- Step 2: Substitute into LHS: $$a(2\\alpha e^{\\alpha x} + \\alpha^2 x e^{\\alpha x}) + b(e^{\\alpha x} + \\alpha x e^{\\alpha x}) + c(x e^{\\alpha x})$$.\n- Step 3: Separate by functional form:\n$$= xe^{\\alpha x}(a\\alpha^2 + b\\alpha + c) + e^{\\alpha x}(2a\\alpha + b)$$\n- Step 4: The first bracket is zero because $$\\alpha$$ satisfies the auxiliary equation. The second bracket, $$2a\\alpha + b$$, is zero precisely because for a repeated root of $$am^2 + bm + c$$, Vieta tells us $$\\alpha = -b/(2a)$$, giving $$2a\\alpha + b = 0$$. Both vanish, so $$y = xe^{\\alpha x}$$ is a solution.\n\nSo the general solution combines both linearly independent solutions: $$y = (A + Bx)e^{\\alpha x}$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_6", "judge_pick": true}, {"question": "When the auxiliary equation has complex conjugate roots $$p \\pm qi$$, derive why the general solution can be written in the real form $$y = e^{px}(A\\cos qx + B\\sin qx)$$. (4 steps)", "answer": "- Step 1: Start from the Case 1 form using complex roots: $$y = C_1 e^{(p+qi)x} + C_2 e^{(p-qi)x}$$, where $$C_1, C_2 \\in \\mathbb{C}$$.\n- Step 2: Factor the common $$e^{px}$$: $$y = e^{px}(C_1 e^{iqx} + C_2 e^{-iqx})$$.\n- Step 3: Apply Euler's formula $$e^{i\\theta} = \\cos\\theta + i\\sin\\theta$$:\n$$y = e^{px}\\big[C_1(\\cos qx + i\\sin qx) + C_2(\\cos qx - i\\sin qx)\\big]$$\n$$= e^{px}\\big[(C_1 + C_2)\\cos qx + i(C_1 - C_2)\\sin qx\\big]$$\n- Step 4: For $$y$$ to be real, choose $$C_1$$ and $$C_2$$ complex conjugates. Let $$A = C_1 + C_2$$ and $$B = i(C_1 - C_2)$$ ‚ÄĒ these turn out to be real. We get $$y = e^{px}(A\\cos qx + B\\sin qx)$$.\n\nThe $$e^{px}$$ controls amplitude growth/decay; $$q$$ controls the oscillation frequency.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_7", "judge_pick": true}, {"question": "If the auxiliary equation has purely imaginary roots $$\\pm qi$$ (i.e. $$p = 0$$), what form does the general solution take and what does this describe physically? (2 steps)", "answer": "- Step 1: Setting $$p = 0$$ in the general complex form, the amplitude factor $$e^{px} = e^0 = 1$$. The solution reduces to $$y = A\\cos qx + B\\sin qx$$.\n- Step 2: This is **simple harmonic motion**: pure sinusoidal oscillation with angular frequency $$q$$, constant amplitude, and no decay or growth. The term $$\\frac{d^2y}{dx^2} + q^2 y = 0$$ is the archetypal SHM equation ‚ÄĒ think of an idealised frictionless pendulum or a spring with no damping.\n\nWithout the $$y'$$ (damping) term, energy is conserved and oscillations persist forever.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_8", "judge_pick": false}, {"question": "Interpret the differential equation $$a\\frac{d^2y}{dt^2} + b\\frac{dy}{dt} + cy = 0$$ as a damped mass-on-spring system. What do $$a$$, $$b$$, $$c$$ physically represent, and how do the three cases map to physical regimes? (3 steps)", "answer": "- Step 1: Identify the physics: $$a$$ is **mass** (inertia); $$b$$ is the **damping coefficient** (friction proportional to velocity); $$c$$ is the **spring stiffness** (restoring force proportional to displacement). So the equation is Newton's second law: $$ma + b v + cx = 0$$.\n- Step 2: The discriminant $$b^2 - 4ac$$ compares damping-squared against the product of inertia and stiffness:\n+ $$b^2 > 4ac$$ (**overdamped**): Large friction dominates; system returns to equilibrium slowly without oscillating ‚ÄĒ two decaying exponentials.\n+ $$b^2 = 4ac$$ (**critically damped**): Fastest return to equilibrium with no overshoot ‚ÄĒ the borderline case.\n+ $$b^2 < 4ac$$ (**underdamped**): Friction too weak to prevent oscillation; system oscillates with decaying amplitude $$e^{px}$$, $$p<0$$.\n- Step 3: The special case $$b = 0$$ (no friction) gives $$p = 0$$, i.e. pure undamped SHM. This beautifully connects the mathematical structure of the auxiliary equation to intuitive physical behaviour.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_9", "judge_pick": true}, {"question": "For a second-order linear homogeneous DE, what conditions on the two roots of the auxiliary equation guarantee that *all* solutions decay to zero as $$x \\to \\infty$$? (3 steps)", "answer": "- Step 1: Solutions involve factors $$e^{\\alpha x}$$, $$e^{\\beta x}$$, or $$e^{px}\\cos/\\sin$$. For these to decay, the real part of the exponent must be **negative**.\n- Step 2: Case by case:\n+ Real distinct roots: need both $$\\alpha < 0$$ AND $$\\beta < 0$$.\n+ Repeated real root: need $$\\alpha < 0$$ (the $$x$$ factor grows polynomially but is beaten by the decaying exponential).\n+ Complex roots $$p \\pm qi$$: need $$p < 0$$.\n- Step 3: In every case the condition is: **both roots must have negative real part**. If either has positive real part, that component grows without bound and dominates.\n\nEquivalently, for the mass-spring analogy: damping $$b > 0$$ and stiffness $$c > 0$$ guarantee asymptotic stability.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_10", "judge_pick": true}, {"question": "State the **principle of superposition** for second-order linear homogeneous DEs and explain why it fails for non-homogeneous equations. (3 steps)", "answer": "- Step 1: **Superposition principle**: If $$y_1 = f(x)$$ and $$y_2 = g(x)$$ are both solutions of $$ay'' + by' + cy = 0$$, then any linear combination $$y = Af(x) + Bg(x)$$ is also a solution.\n- Step 2: The reason is linearity of differentiation and the zero RHS: substituting $$Af + Bg$$ gives $$a(Af + Bg)'' + b(Af + Bg)' + c(Af + Bg) = A(af''+bf'+cf) + B(ag''+bg'+cg) = A\\cdot 0 + B\\cdot 0 = 0$$.\n- Step 3: For non-homogeneous $$ay'' + by' + cy = h(x)$$: if $$y_1, y_2$$ are solutions, then $$Ay_1 + By_2$$ substituted gives $$Ah(x) + Bh(x) = (A+B)h(x) \\neq h(x)$$ in general. Superposition fails because combining two solutions doesn't reproduce the required RHS.\n\nThis is why for non-homogeneous problems we instead combine **one** particular integral with the full two-parameter C.F.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_11", "judge_pick": true}, {"question": "For the differential equation $$\\frac{d^2y}{dx^2} + 8\\frac{dy}{dx} + 16y = 0$$, walk through how the structure of its solution arises ‚ÄĒ don't just quote the answer. (3 steps)", "answer": "- Step 1: Form the auxiliary equation: $$m^2 + 8m + 16 = 0$$, which factors as $$(m+4)^2 = 0$$. So $$m = -4$$ is a **repeated root**.\n- Step 2: A single exponential $$Ae^{-4x}$$ alone has only one constant ‚ÄĒ insufficient for a 2nd-order DE. We need a second, linearly independent solution. The trick (Case 2) is to introduce a polynomial factor: $$xe^{-4x}$$ also solves the DE.\n- Step 3: Combine them linearly: $$y = (A + Bx)e^{-4x}$$. Qualitatively, the solution decays exponentially but with a slight \"bump\" from the $$Bx$$ factor ‚ÄĒ initially the $$Bx$$ can grow, but $$e^{-4x}$$ wins eventually, driving $$y \\to 0$$.\n\nThis is the critically damped regime: fastest approach to equilibrium.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_12", "judge_pick": false}, {"question": "For $$\\frac{d^2y}{dx^2} - 6\\frac{dy}{dx} + 34y = 0$$, describe conceptually what the solution looks like and why. (3 steps)", "answer": "- Step 1: The auxiliary equation $$m^2 - 6m + 34 = 0$$ has discriminant $$36 - 136 = -100 < 0$$, so roots are complex: $$m = 3 \\pm 5i$$.\n- Step 2: The general solution takes the form $$y = e^{3x}(A\\cos 5x + B\\sin 5x)$$. The real part $$p = 3$$ governs amplitude; the imaginary part $$q = 5$$ governs oscillation frequency.\n- Step 3: Qualitatively, this is an **unstable oscillator**: the solution oscillates with angular frequency 5, but the amplitude envelope $$e^{3x}$$ grows exponentially. Imagine a spring-mass system with \"negative damping\" pumping energy in ‚ÄĒ oscillations blow up.\n\nContrast with $$e^{-3x}$$ prefactor: that would be stable underdamped oscillation that dies out.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_13", "judge_pick": false}, {"question": "Why is it possible to write the form of a Case-3 solution either as $$Ae^{\\alpha x} + Be^{\\beta x}$$ with complex $$\\alpha, \\beta$$, or equivalently as $$e^{px}(C\\cos qx + D\\sin qx)$$ with real $$C, D$$? Which is preferable in practice? (3 steps)", "answer": "- Step 1: The two forms are mathematically equivalent ‚ÄĒ both express the same two-dimensional solution space, just in different bases. The conversion uses Euler's formula $$e^{i\\theta} = \\cos\\theta + i\\sin\\theta$$.\n- Step 2: The complex-exponential form $$Ae^{\\alpha x} + Be^{\\beta x}$$ requires $$A, B$$ to be complex conjugates to make $$y$$ real, which is inconvenient.\n- Step 3: The trigonometric form $$e^{px}(C\\cos qx + D\\sin qx)$$ keeps both constants $$C, D$$ real and makes the physical behaviour transparent ‚ÄĒ you can directly read off amplitude growth/decay from $$p$$ and oscillation frequency from $$q$$.\n\n**Preference**: Always convert to the real trigonometric form for Case 3 answers.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_14", "judge_pick": true}, {"question": "What is a *non-homogeneous* second-order linear DE, and conceptually why is its solution built from two distinct parts? (3 steps)", "answer": "- Step 1: The equation has form $$a\\frac{d^2y}{dx^2} + b\\frac{dy}{dx} + cy = f(x)$$ where $$f(x)$$ is not identically zero. The RHS is called the **forcing term**.\n- Step 2: We split the general solution as $$y = y_{CF} + y_{PI}$$ where:\n+ The **complementary function (C.F.)** $$y_{CF}$$ is the general solution of the associated homogeneous equation (RHS = 0). It contains the two arbitrary constants.\n+ The **particular integral (P.I.)** $$y_{PI}$$ is any one specific function that makes the LHS equal $$f(x)$$.\n- Step 3: This split works because of linearity: if $$L$$ denotes the linear differential operator, $$L[y_{CF}] = 0$$ and $$L[y_{PI}] = f(x)$$. Adding: $$L[y_{CF} + y_{PI}] = 0 + f(x) = f(x)$$. The C.F. supplies the flexibility (two constants); the P.I. pins down the forced response.\n\nPhysically: the C.F. is the \"natural response\" (transient), the P.I. is the \"driven response\" (steady-state).", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_15", "judge_pick": false}, {"question": "Prove that if $$y_p$$ is a particular integral and $$y_c$$ is the general complementary function of $$ay'' + by' + cy = f(x)$$, then $$y = y_c + y_p$$ gives *every* solution. (3 steps)", "answer": "- Step 1: First verify $$y_c + y_p$$ is a solution: $$L[y_c + y_p] = L[y_c] + L[y_p] = 0 + f(x) = f(x)$$. ‚úď\n- Step 2: Now show no other solutions exist. Suppose $$Y$$ is any solution. Consider $$Y - y_p$$: applying $$L$$ gives $$L[Y] - L[y_p] = f(x) - f(x) = 0$$. So $$Y - y_p$$ satisfies the homogeneous equation.\n- Step 3: Since $$y_c$$ is the general solution of the homogeneous equation, $$Y - y_p = y_c$$ for some choice of the constants in $$y_c$$. Therefore $$Y = y_c + y_p$$.\n\nEvery solution is captured ‚ÄĒ and the two arbitrary constants in $$y_c$$ provide the complete flexibility needed to match any boundary conditions.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_16", "judge_pick": true}, {"question": "Why does a *particular integral* contain no arbitrary constants, even though it's a solution to a DE? (2 steps)", "answer": "- Step 1: A particular integral is any single specific function that makes the LHS equal the forcing term $$f(x)$$. We just need one ‚ÄĒ we don't need a family.\n- Step 2: The flexibility (the constants) is already supplied by the complementary function. Adding arbitrary constants to the P.I. would duplicate what the C.F. already does. So we fix specific numerical values (e.g., $$\\lambda = \\tfrac{1}{2}$$) to produce one concrete solution of the inhomogeneous equation.\n\nThink of it this way: the P.I. does the \"matching the RHS\" job; the C.F. does the \"matching boundary conditions\" job. They have separate roles.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_17", "judge_pick": false}, {"question": "For each common form of forcing function $$f(x)$$, state the standard trial form for the particular integral and briefly justify the choice. (5 scenarios)", "answer": "- Step 1: **Constant $$f(x) = p$$** ‚Üí trial $$y_{PI} = \\lambda$$. Plugging a constant into a linear DE produces only a constant on the LHS, so a constant P.I. can match.\n- Step 2: **Polynomial $$f(x) = p + qx + rx^2$$** ‚Üí trial $$y_{PI} = \\lambda + \\mu x + \\nu x^2$$. Derivatives of polynomials are polynomials of lower degree, so a polynomial of the same degree covers all terms produced. Must include **all lower-order terms**, not just the highest.\n- Step 3: **Exponential $$f(x) = pe^{kx}$$** ‚Üí trial $$y_{PI} = \\lambda e^{kx}$$. Derivatives of $$e^{kx}$$ are multiples of $$e^{kx}$$, so an exponential trial produces an exponential on LHS.\n- Step 4: **Trigonometric $$f(x) = p\\cos\\omega x + q\\sin\\omega x$$** ‚Üí trial $$y_{PI} = \\lambda\\cos\\omega x + \\mu\\sin\\omega x$$. Differentiating sine gives cosine and vice versa, so both must be present in the trial.\n- Step 5: **General rule:** the trial form must be *closed under differentiation* (up to the order of the DE) so that the LHS lands in the same functional space as the RHS.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_18", "judge_pick": false}, {"question": "If the forcing term is just $$f(x) = 5\\sin 2x$$ (no cosine term present), why does the trial particular integral still need to include BOTH $$\\cos 2x$$ and $$\\sin 2x$$? (3 steps)", "answer": "- Step 1: Differentiating $$\\sin 2x$$ once gives $$2\\cos 2x$$ ‚ÄĒ so as soon as we apply $$\\frac{dy}{dx}$$ (which appears in the DE when $$b \\neq 0$$), cosine terms appear on the LHS.\n- Step 2: For those cosine terms to cancel each other out so that the LHS reduces to $$5\\sin 2x$$ (only sine on RHS), we need the trial to supply $$\\cos 2x$$ too ‚ÄĒ with a coefficient $$\\mu$$ chosen so the cosines cancel.\n- Step 3: Only in the special case $$b = 0$$ (no $$y'$$ term) does the first derivative not appear, and you could get away with $$\\lambda\\sin 2x$$ alone. In general, both must be included.\n\nThis is why the standard trial form for any trig RHS is always $$\\lambda\\cos\\omega x + \\mu\\sin\\omega x$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_19", "judge_pick": false}, {"question": "When does the standard trial form for a particular integral **fail**, and what's the modification rule? (3 steps)", "answer": "- Step 1: The trial fails whenever it (or any part of it) is already a solution of the **homogeneous equation** ‚ÄĒ i.e. it appears in the complementary function. Then substituting the trial into the LHS gives 0, which cannot equal a non-zero RHS.\n- Step 2: **Modification rule:** multiply the trial by $$x$$. If that's still in the C.F. (because of a repeated root in the auxiliary equation), multiply by $$x^2$$.\n- Step 3: Examples:\n+ If C.F. contains $$Ae^{2x}$$ and RHS is $$e^{2x}$$, use $$\\lambda x e^{2x}$$ (not $$\\lambda e^{2x}$$).\n+ If C.F. contains $$(A + Bx)e^{2x}$$ (repeated root) and RHS is $$e^{2x}$$, use $$\\lambda x^2 e^{2x}$$.\n+ If the auxiliary has root 0 (so C.F. contains a constant $$A$$) and RHS is a constant, use $$\\lambda x$$ instead of $$\\lambda$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_20", "judge_pick": true}, {"question": "Intuitively, why does multiplying the trial P.I. by $$x$$ \"fix\" the problem when the standard trial is part of the complementary function? (3 steps)", "answer": "- Step 1: If $$e^{kx}$$ is already annihilated by the operator $$L$$ (i.e. it's in the C.F.), then $$L[\\lambda e^{kx}] = 0$$, which can't match a non-zero RHS.\n- Step 2: Multiplying by $$x$$ breaks the exact structure: $$xe^{kx}$$ is NOT in the C.F. (unless the root is repeated). Applying $$L$$ to $$xe^{kx}$$ leaves a non-zero result because the product rule generates extra terms.\n- Step 3: The deeper reason: when $$k$$ is a simple root of the auxiliary, the \"first-order\" perturbation $$xe^{kx}$$ is linearly independent of $$e^{kx}$$ and not in the null space of $$L$$, so it can produce the required RHS.\n\nAnalogy: if the homogeneous operator \"eats\" $$e^{kx}$$ perfectly, you need a function that's \"nearly\" an exponential but not quite, so the operator leaves something behind.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_21", "judge_pick": true}, {"question": "If the auxiliary equation has a root at $$m = 0$$ (so the C.F. contains a constant term) and the RHS is a constant like $$f(x) = 3$$, why must we NOT use a constant P.I., and what do we use instead? (3 steps)", "answer": "- Step 1: Having $$m = 0$$ as an auxiliary root means the DE has no $$y$$ term directly (it's like $$y'' - 2y' = 3$$). The C.F. already includes an arbitrary constant $$A$$.\n- Step 2: If we tried $$y_{PI} = \\lambda$$ (constant), differentiating gives 0 for both $$y'$$ and $$y''$$, so the LHS contributes nothing from those terms. The constant gets absorbed into the C.F.'s $$A$$, and we cannot match the RHS.\n- Step 3: **Fix:** use $$y_{PI} = \\lambda x$$ instead. Then $$y' = \\lambda$$ appears in the DE and can match the constant RHS.\n\nGeneral principle: whenever the \"natural\" trial is killed by the operator (i.e. part of C.F.), multiply by $$x$$ to lift it out of the null space.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_22", "judge_pick": true}, {"question": "For the equation $$y'' - 2y' + y = e^x$$, why is $$\\lambda xe^x$$ an unsuitable trial P.I., and what *is* the correct form? (3 steps)", "answer": "- Step 1: The auxiliary equation $$m^2 - 2m + 1 = 0$$ has a **repeated root** $$m = 1$$. Therefore the C.F. is $$(A + Bx)e^x$$ ‚ÄĒ containing both $$e^x$$ and $$xe^x$$.\n- Step 2: Neither $$e^x$$ (killed by operator) nor $$xe^x$$ (also killed because it's in C.F.) can serve as the P.I. trial ‚ÄĒ both give zero when plugged in.\n- Step 3: Multiply by another factor of $$x$$: use $$\\lambda x^2 e^x$$. This function is NOT in the C.F. and, when substituted, produces a non-zero result proportional to $$e^x$$, which can match the RHS.\n\n**Rule of thumb:** for each \"conflict\" with the C.F., multiply the trial by an additional $$x$$. One conflict ‚Üí multiply by $$x$$; repeated root conflict ‚Üí multiply by $$x^2$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_23", "judge_pick": false}, {"question": "Why do we need exactly **two** boundary conditions to determine a particular solution of a second-order DE, and what can go wrong with only one or too many? (3 steps)", "answer": "- Step 1: The general solution contains two arbitrary constants $$A$$ and $$B$$ (from the two integrations or, equivalently, the two-dimensional C.F. solution space). Each boundary condition gives one equation relating these constants.\n- Step 2: Two boundary conditions ‚Üí two simultaneous equations ‚Üí unique values for $$A$$ and $$B$$ (provided the conditions are independent).\n- Step 3: If only one condition is given, you have a one-parameter family of solutions (under-determined). If three independent conditions are given, usually no solution exists (over-determined) ‚ÄĒ unless one happens to be consistent with the others.\n\nTypical conditions: specifying $$y$$ at two points, or specifying $$y$$ and $$y'$$ at one point (an **initial value problem**).", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_24", "judge_pick": false}, {"question": "Outline the step-by-step procedure for solving a non-homogeneous second-order DE with given boundary conditions. (5 steps)", "answer": "- Step 1: Write down the **auxiliary equation** from the homogeneous part and solve for its roots to find the **complementary function**.\n- Step 2: Examine the RHS $$f(x)$$ and choose an appropriate **trial form for the particular integral** ‚ÄĒ modifying by multiplying by $$x$$ (or $$x^2$$) if any piece of the trial is already in the C.F.\n- Step 3: Substitute the trial P.I. into the DE and equate coefficients to find the unknown constants in the P.I.\n- Step 4: Write the **general solution** $$y = y_{CF} + y_{PI}$$. At this stage two arbitrary constants $$A, B$$ remain.\n- Step 5: **Apply the boundary conditions**. Usually one condition goes to $$y$$ directly, and one to $$y'$$ (so differentiate the general solution first). Solve the resulting simultaneous equations for $$A$$ and $$B$$.\n\n**Critical order**: Never apply the conditions before forming the *general* solution ‚ÄĒ the C.F. constants must be present when the conditions are imposed.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_25", "judge_pick": false}, {"question": "A common mistake: a student finds the C.F. and P.I. separately, applies the boundary conditions to the C.F. alone, then adds the P.I. afterwards. What goes wrong? (3 steps)", "answer": "- Step 1: The boundary conditions constrain the *full* solution $$y = y_{CF} + y_{PI}$$, not just $$y_{CF}$$ on its own. If at $$x = 0$$ the condition is $$y(0) = 0$$, this means $$y_{CF}(0) + y_{PI}(0) = 0$$, not $$y_{CF}(0) = 0$$.\n- Step 2: Applying the condition to $$y_{CF}$$ alone ignores the contribution from $$y_{PI}$$ and gives wrong values of $$A$$ and $$B$$.\n- Step 3: Correct procedure: first *form* the general solution, then apply the conditions to the complete expression. This automatically accounts for both the natural and forced responses.\n\nThe P.I. \"shifts\" the solution away from the pure homogeneous behaviour, so the constants must be chosen to compensate.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_26", "judge_pick": true}, {"question": "When applying two boundary conditions where one specifies $$y'(0)$$ (a derivative), what must you do before applying it? (2 steps)", "answer": "- Step 1: You must **differentiate the general solution** $$y = y_{CF} + y_{PI}$$ with respect to $$x$$ *first*, to get an expression for $$y'(x)$$ that still contains the constants $$A$$ and $$B$$.\n- Step 2: Only then substitute the value of $$x$$ at which the derivative is specified. You'll get a linear equation in $$A$$ and $$B$$; combined with the $$y$$-condition equation, solve the $$2\\times 2$$ system.\n\nSkipping the differentiation step is one of the most common procedural errors in this topic.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_27", "judge_pick": false}, {"question": "Why might we want to use a **substitution** to convert a second-order DE with variable coefficients into one with constant coefficients? (3 steps)", "answer": "- Step 1: The methods we developed (auxiliary equation, trial P.I. table) only work for equations with *constant* coefficients $$a, b, c$$. Variable coefficients like $$x^2 y'' + xy' + y = 0$$ don't fit this framework directly.\n- Step 2: A clever substitution (like $$x = e^u$$, so $$u = \\ln x$$) can transform the equation into one with constant coefficients in the new variable $$u$$, which we *can* solve by standard methods.\n- Step 3: After solving in $$u$$, we convert back using $$u = \\ln x$$ to get the solution in $$x$$.\n\nThis is a powerful pattern in mathematics: **if a problem is hard in one coordinate system, find a change of variables that makes it easy**.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_28", "judge_pick": true}, {"question": "Given the substitution $$x = e^u$$, derive the rule $$x\\frac{dy}{dx} = \\frac{dy}{du}$$. (3 steps)", "answer": "- Step 1: Since $$x = e^u$$, differentiating gives $$\\frac{dx}{du} = e^u = x$$.\n- Step 2: By the chain rule, $$\\frac{dy}{du} = \\frac{dy}{dx} \\cdot \\frac{dx}{du} = \\frac{dy}{dx} \\cdot x$$.\n- Step 3: Rearranging: $$x\\frac{dy}{dx} = \\frac{dy}{du}$$.\n\nThis result is the key simplification: it says that multiplying $$y'$$ by $$x$$ is equivalent to differentiating with respect to $$u$$. The factor of $$x$$ in Euler-type equations disappears in the new variable.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_29", "judge_pick": false}, {"question": "Given $$x = e^u$$, derive the second-derivative rule $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$. (4 steps)", "answer": "- Step 1: From the first-derivative result, $$\\frac{dy}{du} = x\\frac{dy}{dx}$$.\n- Step 2: Differentiate both sides with respect to $$u$$, using the product rule on the right:\n$$\\frac{d^2y}{du^2} = \\frac{d}{du}\\left(x\\frac{dy}{dx}\\right) = \\frac{dx}{du}\\cdot \\frac{dy}{dx} + x\\cdot \\frac{d}{du}\\left(\\frac{dy}{dx}\\right)$$\n- Step 3: Use $$\\frac{dx}{du} = x$$, and apply the chain rule to the second term: $$\\frac{d}{du}\\left(\\frac{dy}{dx}\\right) = \\frac{d^2y}{dx^2}\\cdot \\frac{dx}{du} = x\\frac{d^2y}{dx^2}$$.\n- Step 4: Putting it together: $$\\frac{d^2y}{du^2} = x\\frac{dy}{dx} + x^2\\frac{d^2y}{dx^2} = \\frac{dy}{du} + x^2\\frac{d^2y}{dx^2}$$. Rearrange: $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_30", "judge_pick": false}, {"question": "What is the **Cauchy‚ÄďEuler** form of a second-order DE, and what does the substitution $$x = e^u$$ do to it? (3 steps)", "answer": "- Step 1: A Cauchy‚ÄďEuler equation has the form $$Ax^2\\frac{d^2y}{dx^2} + Bx\\frac{dy}{dx} + Cy = g(x)$$ ‚ÄĒ each derivative's coefficient is a power of $$x$$ matching the order of differentiation.\n- Step 2: Using $$x\\frac{dy}{dx} = \\frac{dy}{du}$$ and $$x^2\\frac{d^2y}{dx^2} = \\frac{d^2y}{du^2} - \\frac{dy}{du}$$:\n$$A\\left(\\frac{d^2y}{du^2} - \\frac{dy}{du}\\right) + B\\frac{dy}{du} + Cy = g(e^u)$$\n$$\\Rightarrow A\\frac{d^2y}{du^2} + (B-A)\\frac{dy}{du} + Cy = g(e^u)$$\n- Step 3: This is now a standard **constant-coefficient** DE in $$u$$, solvable by the auxiliary-equation method. Convert back at the end using $$u = \\ln x$$.\n\nThe trick exploits the fact that powers of $$x$$ scale with derivatives in a very specific way.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_31", "judge_pick": true}, {"question": "After solving a transformed DE in the variable $$u$$ where $$x = e^u$$, how do we convert the solutio
