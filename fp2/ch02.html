(f(3)-f(4))+\\dots+(f(n)-f(n+1))$$. What visual intuition explains why nearly everything cancels? (3 steps)", "answer": "- Step 1: Focus on a middle value like $$f(2)$$. It appears as $$-f(2)$$ in the first bracket and as $$+f(2)$$ in the second bracket. These contributions sum to zero.\n- Step 2: This same pattern repeats for every intermediate $$f(k)$$ for $$k=2, 3, \\ldots, n$$ — each one appears twice with opposite signs and contributes nothing to the total.\n- Step 3: The unmatched terms are $$+f(1)$$ at the very start (its would-be negative partner lives in a $$(f(0)-f(1))$$ bracket that doesn't exist) and $$-f(n+1)$$ at the end (its would-be positive partner is in a non-existent $$(f(n+1)-f(n+2))$$ bracket).\n\nThis is the \"telescope collapsing\" image: the middle segments slide into each other and only the two ends stick out.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "If $$u_r = f(r) - f(r+1)$$, what does $$\\sum_{r=1}^{n} u_r$$ simplify to, and why?", "answer": "It simplifies to $$f(1) - f(n+1)$$. The reason is that writing the brackets in a column reveals $$f(2), f(3), \\dots, f(n)$$ each appearing once with a plus sign (from the $$r$$-th bracket's $$f(r)$$ when $$r=2,3,\\dots,n$$) and once with a minus sign (from the previous bracket's $$-f(r+1)$$). Every middle value thus cancels, leaving only the $$f(1)$$ from the first bracket and the $$-f(n+1)$$ from the last bracket. This is the fundamental payoff of the method: an $$n$$-term sum becomes a 2-term expression.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "If the general term is instead $$u_r = f(r+1) - f(r)$$, what does $$\\sum_{r=1}^{n} u_r$$ equal, and how does it differ from the $$f(r)-f(r+1)$$ case? (3 steps)", "answer": "- Step 1: The sum becomes $$f(n+1) - f(1)$$ — the negative of the previous result, because every term has flipped sign.\n- Step 2: The reasoning is identical: $$f(2), f(3), \\dots, f(n)$$ each appear once positively (as $$f(r+1)$$ when $$r=1,\\dots,n-1$$) and once negatively (as $$-f(r)$$ when $$r=2,\\dots,n$$), so they cancel.\n- Step 3: The surviving boundary terms are $$+f(n+1)$$ (from the last bracket) and $$-f(1)$$ (from the first bracket). Which orientation you use depends on how the algebra naturally falls out; neither is \"better.\"\n\nTakeaway: the method doesn't care which way the difference is oriented — only that consecutive terms match for cancellation.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "When the method of differences is applied to $$\\sum_{r=1}^{n} [f(r) - f(r+1)]$$, how many terms survive cancellation, and which specific ones? (3 steps)", "answer": "- Step 1: Exactly two terms survive — one at each end of the range.\n- Step 2: The surviving \"leading\" term is $$f(1)$$ — the first positive contribution, which has no negative partner before it to cancel it.\n- Step 3: The surviving \"trailing\" term is $$-f(n+1)$$ — the last negative contribution, which has no positive partner after it. Every other $$f(k)$$ for $$k=2,\\dots,n$$ appears twice with opposite signs and cancels.\n\nThe sum collapses from $$n$$ terms to $$2$$ boundary terms — this is exactly what makes the method so powerful.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Suppose $$u_r = f(r) - f(r+2)$$ instead of $$f(r) - f(r+1)$$. When summing from $$r=1$$ to $$n$$, which terms survive and which cancel? (4 steps)", "answer": "- Step 1: Write out a few terms: $$r=1$$ gives $$f(1) - f(3)$$; $$r=2$$ gives $$f(2) - f(4)$$; $$r=3$$ gives $$f(3) - f(5)$$; $$r=4$$ gives $$f(4) - f(6)$$; and so on.\n- Step 2: The cancellation now happens two rows apart: the $$+f(3)$$ from $$r=3$$ cancels the $$-f(3)$$ from $$r=1$$; $$+f(4)$$ from $$r=4$$ cancels $$-f(4)$$ from $$r=2$$; etc.\n- Step 3: Because the \"stride\" is 2, there are TWO unmatched leading positives ($$f(1)$$ and $$f(2)$$, whose negative partners would live in non-existent rows $$r=-1$$ and $$r=0$$) and TWO unmatched trailing negatives ($$-f(n+1)$$ and $$-f(n+2)$$).\n- Step 4: So the sum equals $$f(1) + f(2) - f(n+1) - f(n+2)$$ — four surviving terms instead of two.\n\nKey lesson: the stride $$k$$ in $$f(r)-f(r+k)$$ controls how many boundary terms survive on each side.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Generalise: if $$u_r = f(r) - f(r+k)$$ for a positive integer $$k$$, how many boundary terms survive in $$\\sum_{r=1}^{n} u_r$$, and what is the exact form of the closed sum? (2 steps)", "answer": "- Step 1: In a grid of the terms, the negative part of row $$r$$ is $$-f(r+k)$$, which cancels with the positive part $$+f(r+k)$$ that appears $$k$$ rows later. So cancellation pairs across a \"gap\" of $$k$$ rows.\n- Step 2: This leaves $$k$$ surviving positives at the start — $$f(1), f(2), \\ldots, f(k)$$ — and $$k$$ surviving negatives at the end — $$-f(n+1), -f(n+2), \\ldots, -f(n+k)$$, giving $$2k$$ surviving terms total. Formally: $$\\sum_{r=1}^{n} [f(r) - f(r+k)] = \\sum_{j=1}^{k} f(j) - \\sum_{j=n+1}^{n+k} f(j)$$.\n\nStride $$k$$ gives $$k$$ terms at each end — a crucial generalisation for higher-order telescopes.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Given a series $$\\sum u_r$$, what are the practical signals that the method of differences might apply? (3 steps)", "answer": "- Step 1: Inspect the structure of $$u_r$$. Products of linear factors in the denominator like $$\\frac{1}{(ar+b)(ar+c)}$$ scream \"partial fractions\" and are prime candidates for telescoping.\n- Step 2: Watch for explicit question cues: \"show that $$u_r \\equiv f(r) - f(r+1)$$,\" or \"express in partial fractions and hence find the sum\" — both are strong hints that differences are intended.\n- Step 3: If the term is a polynomial like $$r$$, $$r^2$$, or $$r^3$$, look for an algebraic identity that creates a difference, e.g. $$4r^3 \\equiv r^2(r+1)^2 - (r-1)^2 r^2$$.\n\nShort version: either partial fractions are invited, or you manufacture a difference via a clever identity.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Why are partial fractions the natural tool for setting up the method of differences on fractions like $$\\frac{1}{(ar+b)(ar+c)}$$? (3 steps)", "answer": "- Step 1: Telescoping requires each $$u_r$$ to be a *difference* of two simpler pieces. A compound fraction $$\\frac{1}{(ar+b)(ar+c)}$$ can't telescope as a single unit.\n- Step 2: Partial fractions split it into $$\\frac{A}{ar+b} + \\frac{B}{ar+c}$$ where $$A$$ and $$B$$ have opposite signs (otherwise the two pieces wouldn't combine back to a single fraction). That sign structure is exactly the difference form we need.\n- Step 3: If the two denominators are shifts of each other in $$r$$ — e.g. $$2r-1$$ and $$2r+1$$ shift to each other when $$r \\to r+1$$ — then the piece from row $$r$$ cancels the piece from row $$r+1$$. The shift is what creates the telescoping.\n\nPartial fractions is the bridge from \"a product in the denominator\" to \"a telescoping difference.\"", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Verify that $$\\frac{1}{r(r+1)} \\equiv \\frac{1}{r} - \\frac{1}{r+1}$$ and explain how this immediately sets up a telescope. (2 steps)", "answer": "- Step 1: Combine the right side over a common denominator: $$\\frac{1}{r} - \\frac{1}{r+1} = \\frac{(r+1) - r}{r(r+1)} = \\frac{1}{r(r+1)}$$. Confirmed.\n- Step 2: This is in the form $$f(r) - f(r+1)$$ with $$f(r) = \\frac{1}{r}$$. So $$\\sum_{r=1}^{n} \\frac{1}{r(r+1)} = f(1) - f(n+1) = 1 - \\frac{1}{n+1} = \\frac{n}{n+1}$$.\n\nWhy it works: the $$-\\frac{1}{r+1}$$ from row $$r$$ exactly matches $$+\\frac{1}{r+1}$$ from row $$r+1$$, so adjacent rows cancel.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Why does factoring the denominator of $$\\frac{1}{4r^2 - 1}$$ unlock the method of differences, and what partial-fraction form emerges? (3 steps)", "answer": "- Step 1: $$4r^2 - 1$$ is a difference of squares: $$4r^2 - 1 = (2r-1)(2r+1)$$. Until it's factored, the telescoping structure is hidden.\n- Step 2: Set up $$\\frac{1}{(2r-1)(2r+1)} = \\frac{A}{2r-1} + \\frac{B}{2r+1}$$ and solve: using the cover-up trick, $$A = \\tfrac{1}{2}$$ and $$B = -\\tfrac{1}{2}$$. So $$\\frac{1}{4r^2-1} = \\frac{1}{2}\\!\\left(\\frac{1}{2r-1} - \\frac{1}{2r+1}\\right)$$.\n- Step 3: This is $$\\tfrac{1}{2}[f(r) - f(r+1)]$$ with $$f(r) = \\frac{1}{2r-1}$$ — because $$f(r+1) = \\frac{1}{2(r+1)-1} = \\frac{1}{2r+1}$$. A clean stride-1 telescope.\n\nLesson: recognising difference-of-squares (or any product structure) in the denominator is the first step to unlocking the method.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Using the identity $$4r^3 \\equiv r^2(r+1)^2 - (r-1)^2 r^2$$, outline how the method of differences produces the closed form for $$\\sum_{r=1}^{n} r^3$$. (4 steps)", "answer": "- Step 1: Let $$g(r) = (r-1)^2 r^2$$. Then $$g(r+1) = r^2 (r+1)^2$$, so the identity reads $$4r^3 = g(r+1) - g(r)$$ — a $$f(r+1) - f(r)$$ telescope.\n- Step 2: Sum both sides from $$r=1$$ to $$n$$: $$\\sum_{r=1}^{n} 4r^3 = \\sum_{r=1}^{n} [g(r+1) - g(r)]$$. The right-hand side telescopes to $$g(n+1) - g(1)$$.\n- Step 3: Plug in the boundary values: $$g(n+1) = n^2(n+1)^2$$ and $$g(1) = 0^2 \\cdot 1^2 = 0$$. So $$4\\sum r^3 = n^2(n+1)^2 - 0$$.\n- Step 4: Divide by 4: $$\\sum_{r=1}^{n} r^3 = \\tfrac{1}{4} n^2 (n+1)^2$$.\n\nBig-picture insight: no induction, no guessing — the identity encodes the answer, and the telescope extracts it.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Starting from $$(r+1)^3 - (r-1)^3 = 6r^2 + 2$$, outline how the method of differences derives $$\\sum_{r=1}^{n} r^2$$. (5 steps)", "answer": "- Step 1: The left side has the form $$f(r+1) - f(r-1)$$ with $$f(r) = r^3$$ — this is a stride-2 telescope.\n- Step 2: Writing rows: $$r=1$$: $$2^3 - 0^3$$; $$r=2$$: $$3^3 - 1^3$$; $$r=3$$: $$4^3 - 2^3$$; ...; $$r=n$$: $$(n+1)^3 - (n-1)^3$$. Each $$k^3$$ for $$k = 2,\\dots,n-1$$ appears once positively and once negatively.\n- Step 3: Surviving positives: $$n^3$$ and $$(n+1)^3$$ (the two top \"unmatched\" rows). Surviving negatives: $$-0^3$$ and $$-1^3 = -1$$ (the two bottom unmatched rows). Telescoped left side: $$n^3 + (n+1)^3 - 1$$.\n- Step 4: Sum the right side: $$\\sum(6r^2 + 2) = 6\\sum r^2 + 2n$$. Equate: $$n^3 + (n+1)^3 - 1 = 6\\sum r^2 + 2n$$.\n- Step 5: Solve for $$\\sum r^2$$: after algebra, $$\\sum_{r=1}^{n} r^2 = \\tfrac{1}{6} n(n+1)(2n+1)$$.\n\nCrucial idea: a stride-2 identity gives a telescope where *four* boundary terms survive, not two.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Use the identity $$r \\equiv \\tfrac{1}{2}\\bigl[r(r+1) - r(r-1)\\bigr]$$ to show via telescoping why $$\\sum_{r=1}^{n} r = \\tfrac{1}{2} n(n+1)$$. (3 steps)", "answer": "- Step 1: Set $$g(r) = r(r-1)$$. Then $$g(r+1) = (r+1)r = r(r+1)$$, so the identity becomes $$r = \\tfrac{1}{2}[g(r+1) - g(r)]$$.\n- Step 2: Sum from $$r=1$$ to $$n$$. The right side telescopes: $$\\sum_{r=1}^{n} \\tfrac{1}{2}[g(r+1) - g(r)] = \\tfrac{1}{2}[g(n+1) - g(1)]$$.\n- Step 3: Compute boundaries: $$g(n+1) = (n+1)n = n(n+1)$$ and $$g(1) = 1 \\cdot 0 = 0$$. So $$\\sum_{r=1}^{n} r = \\tfrac{1}{2} n(n+1)$$.\n\nThe classic arithmetic-series formula falls straight out of a one-line telescoping identity — no pairing-terms trick needed.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Without doing numerical calculation, explain why $$\\sum_{r=1}^{n} \\frac{1}{r(r+1)}$$ must be slightly less than 1 for large $$n$$, and give the exact closed form. (3 steps)", "answer": "- Step 1: Partial fractions: $$\\frac{1}{r(r+1)} = \\frac{1}{r} - \\frac{1}{r+1}$$. Each term measures the \"drop\" in $$\\frac{1}{r}$$ from one step to the next.\n- Step 2: Summing these drops from $$r=1$$ to $$n$$ gives the total drop from $$\\frac{1}{1}$$ down to $$\\frac{1}{n+1}$$, which is $$1 - \\frac{1}{n+1}$$.\n- Step 3: As $$n \\to \\infty$$, $$\\frac{1}{n+1} \\to 0$$, so the sum approaches but never reaches 1. The exact closed form is $$\\frac{n}{n+1}$$.\n\nIntuition: the series is a \"height drop\" telescope — each term is one step of descent, and the total sum is the overall height descended.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "For $$\\sum_{r=1}^{n} \\frac{1}{r(r+2)}$$, what makes this a \"stride-2\" telescope, and how does that change the cancellation pattern? (3 steps)", "answer": "- Step 1: Partial fractions give $$\\frac{1}{r(r+2)} = \\frac{1}{2}\\!\\left(\\frac{1}{r} - \\frac{1}{r+2}\\right)$$. The two denominators differ by a shift of 2 in $$r$$, not 1.\n- Step 2: Letting $$f(r) = \\frac{1}{r}$$, the term is $$\\tfrac{1}{2}[f(r) - f(r+2)]$$. Cancellation now pairs row $$r$$'s negative $$-\\frac{1}{r+2}$$ with row $$r+2$$'s positive $$+\\frac{1}{r+2}$$ — two rows apart, not adjacent.\n- Step 3: Four terms survive: two leading positives $$f(1) = 1$$ and $$f(2) = \\tfrac{1}{2}$$, and two trailing negatives $$-f(n+1) = -\\frac{1}{n+1}$$ and $$-f(n+2) = -\\frac{1}{n+2}$$.\n\nFinal form: $$\\tfrac{1}{2}\\!\\left(1 + \\tfrac{1}{2} - \\tfrac{1}{n+1} - \\tfrac{1}{n+2}\\right)$$, which simplifies to a compact rational in $$n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "If you need $$\\sum_{r=a}^{b} u_r$$ where $$a > 1$$, and you already have a closed form $$S_n = \\sum_{r=1}^{n} u_r$$, what's the standard move? (3 steps)", "answer": "- Step 1: Rewrite the partial-range sum as a difference of two full-range sums: $$\\sum_{r=a}^{b} u_r = S_b - S_{a-1}$$.\n- Step 2: Intuition: the sum from $$a$$ to $$b$$ equals \"everything up to $$b$$\" minus \"everything before $$a$$\" (i.e., everything up to $$a-1$$).\n- Step 3: Crucial detail — use $$a-1$$ (not $$a$$) as the upper limit of what you subtract, otherwise you accidentally remove the $$r=a$$ term itself. Then simplify the arithmetic of two closed-form values.\n\nThis lets one closed-form derivation handle infinitely many partial-range questions.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Why do teachers insist on writing out several explicit terms (e.g. $$r=1, 2, 3, \\ldots, n-1, n$$) when applying the method of differences, rather than jumping to the answer? (3 steps)", "answer": "- Step 1: The cancellation pattern can be subtle, especially for stride-2 or stride-3 telescopes. Writing out explicit rows makes it visually obvious which values pair up and which survive at the boundary.\n- Step 2: Without listing terms, it's easy to miscount surviving contributions — e.g. forgetting that in a stride-2 telescope, BOTH $$f(1)$$ and $$f(2)$$ survive, not just $$f(1)$$.\n- Step 3: Listing the first few and last few rows (with dots for the middle) also serves as proof for a marker: you've shown the cancellation, not just asserted it. Cancel in pencil so the original terms remain legible.\n\nIn exam contexts, \"insufficient working\" costs real marks — list enough rows to make the pattern unambiguous.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "A student claims $$\\sum_{r=1}^{n} \\frac{2r+1}{r(r+1)} = 1 - \\frac{1}{n+1}$$ by writing $$\\frac{2r+1}{r(r+1)} = \\frac{1}{r} + \\frac{1}{r+1}$$ and then \"applying the method of differences.\" What's the critical error? (3 steps)", "answer": "- Step 1: The partial-fraction decomposition itself is correct: $$\\frac{2r+1}{r(r+1)} = \\frac{1}{r} + \\frac{1}{r+1}$$. But this is a SUM of two positive fractions, not a difference.\n- Step 2: The method of differences requires $$u_r = f(r) - f(r+1)$$ — a DIFFERENCE. A sum like $$\\frac{1}{r} + \\frac{1}{r+1}$$ doesn't telescope: when consecutive rows are lined up, shared values reinforce each other (add) rather than cancel.\n- Step 3: Sanity-check: $$\\frac{2r+1}{r(r+1)} \\approx \\frac{2}{r}$$ for large $$r$$, so the series behaves like the harmonic series and DIVERGES. But $$1 - \\frac{1}{n+1} < 1$$ is bounded — so the claimed answer can't possibly be right.\n\nRule: only DIFFERENCES telescope. Always verify sign structure before invoking cancellation.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Verify that $$\\frac{r}{(r+1)!} \\equiv \\frac{1}{r!} - \\frac{1}{(r+1)!}$$ and describe the closed form of $$\\sum_{r=1}^{n} \\frac{r}{(r+1)!}$$. (3 steps)", "answer": "- Step 1: Combine the right side: using $$(r+1)! = (r+1)\\cdot r!$$, we get $$\\frac{1}{r!} - \\frac{1}{(r+1)!} = \\frac{r+1}{(r+1)!} - \\frac{1}{(r+1)!} = \\frac{(r+1) - 1}{(r+1)!} = \\frac{r}{(r+1)!}$$. ✓\n- Step 2: This is $$f(r) - f(r+1)$$ with $$f(r) = \\frac{1}{r!}$$. The telescope gives $$f(1) - f(n+1) = \\frac{1}{1!} - \\frac{1}{(n+1)!}$$.\n- Step 3: Closed form: $$\\sum_{r=1}^{n} \\frac{r}{(r+1)!} = 1 - \\frac{1}{(n+1)!}$$.\n\nNeat insight: as $$n \\to \\infty$$, this sum converges to exactly 1 — extremely rapidly, because factorials explode.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Given the identity $$\\frac{2r+1}{r^2(r+1)^2} \\equiv \\frac{1}{r^2} - \\frac{1}{(r+1)^2}$$, describe what $$\\sum_{r=1}^{n} \\frac{2r+1}{r^2(r+1)^2}$$ simplifies to and why. (2 steps)", "answer": "- Step 1: The identity gives $$u_r$$ directly in the form $$f(r) - f(r+1)$$ with $$f(r) = \\frac{1}{r^2}$$. So the sum telescopes to $$f(1) - f(n+1) = 1 - \\frac{1}{(n+1)^2}$$.\n- Step 2: Sanity check via algebra: $$\\frac{1}{r^2} - \\frac{1}{(r+1)^2} = \\frac{(r+1)^2 - r^2}{r^2(r+1)^2} = \\frac{2r+1}{r^2(r+1)^2}$$. ✓\n\nPattern recognition: \"$$\\frac{\\text{difference of squares}}{\\text{product of squares}}$$\" is a giveaway for a $$\\frac{1}{r^2} - \\frac{1}{(r+1)^2}$$ telescope.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "How does the method of differences compare to mathematical induction as a proof technique for sum identities? (3 steps)", "answer": "- Step 1: Both methods can prove identities like $$\\sum_{r=1}^{n} r^3 = \\tfrac{1}{4} n^2(n+1)^2$$. The method of differences DERIVES the formula constructively from a given identity; induction VERIFIES a pre-known formula by base case + induction step.\n- Step 2: Induction requires you to *already know* the answer to check. The method of differences can build the closed form from scratch if you can spot or are given the right difference structure.\n- Step 3: Exam-phrasing cues: \"show that $$u_r \\equiv \\ldots$$\" hints at differences (constructive); \"prove that $$\\sum u_r = \\ldots$$\" is neutral (induction is the default \"prove it\" hammer, but differences also works).\n\nBig picture: induction proves, differences derive. They're complementary tools.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "How can $$\\sum_{r=1}^{n} \\ln\\!\\left(1 + \\frac{1}{r+2}\\right)$$ be evaluated using the method of differences? (3 steps)", "answer": "- Step 1: Simplify the logarithm's argument: $$1 + \\frac{1}{r+2} = \\frac{(r+2)+1}{r+2} = \\frac{r+3}{r+2}$$.\n- Step 2: Use $$\\ln \\frac{a}{b} = \\ln a - \\ln b$$ to rewrite the term as $$\\ln(r+3) - \\ln(r+2)$$ — exactly the form $$f(r+1) - f(r)$$ with $$f(r) = \\ln(r+2)$$.\n- Step 3: Telescope: $$f(n+1) - f(1) = \\ln(n+3) - \\ln(3) = \\ln\\!\\left(\\frac{n+3}{3}\\right)$$. A sum of many logs collapses to a single log.\n\nElegance: logs convert products to sums, and telescoping converts sums to two surviving logs, which recombine into a single log.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "If partial fractions on $$\\frac{1}{(r+1)(r+3)}$$ give $$\\frac{A}{r+1} + \\frac{B}{r+3}$$, what stride-$$k$$ telescope do you expect, and what are $$A$$ and $$B$$? (3 steps)", "answer": "- Step 1: The denominators $$r+1$$ and $$r+3$$ differ by 2, so the shift $$r \\to r+2$$ takes one to the other. This sets up a stride-2 telescope: $$f(r) - f(r+2)$$.\n- Step 2: Solve the partial fractions: multiplying out gives $$1 = A(r+3) + B(r+1)$$. Setting $$r=-1$$ gives $$1 = 2A \\Rightarrow A = \\tfrac{1}{2}$$. Setting $$r=-3$$ gives $$1 = -2B \\Rightarrow B = -\\tfrac{1}{2}$$.\n- Step 3: So $$\\frac{1}{(r+1)(r+3)} = \\tfrac{1}{2}\\!\\left(\\frac{1}{r+1} - \\frac{1}{r+3}\\right) = \\tfrac{1}{2}[f(r) - f(r+2)]$$ with $$f(r) = \\frac{1}{r+1}$$ — confirming the stride-2 structure.\n\nKey insight: the gap between the two denominators tells you the stride *before* you even solve for $$A, B$$.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Which four specific terms survive the cancellation in $$\\sum_{r=1}^{n} [f(r) - f(r+2)]$$, and in what form? (2 steps)", "answer": "- Step 1: The stride is 2, so two positive leaders survive at the start (no negative partners to cancel them) and two negative trailers survive at the end (no positive partners).\n- Step 2: Surviving terms: positives $$f(1)$$ and $$f(2)$$, negatives $$-f(n+1)$$ and $$-f(n+2)$$. Total: $$f(1) + f(2) - f(n+1) - f(n+2)$$.\n\nMemorise this \"box of four corners\" — it's the most common stride-2 pattern in FP2 exam questions.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "For $$\\sum_{r=1}^{n} \\frac{4}{(4r-1)(4r+3)}$$, the method gives $$\\frac{4n}{3(4n+3)}$$. Conceptually, why does the answer take this specific shape rather than having an additive constant? (3 steps)", "answer": "- Step 1: Partial fractions: $$\\frac{4}{(4r-1)(4r+3)} = \\frac{1}{4r-1} - \\frac{1}{4r+3}$$ (the numerator $$4$$ equals $$(4r+3)-(4r-1)$$, which makes the constants work out cleanly).\n- Step 2: With $$f(r) = \\frac{1}{4r-1}$$, we have $$f(r+1) = \\frac{1}{4(r+1)-1} = \\frac{1}{4r+3}$$, so this is a stride-1 telescope. The sum is $$f(1) - f(n+1) = \\frac{1}{3} - \\frac{1}{4n+3}$$.\n- Step 3: Combining over a common denominator: $$\\frac{(4n+3) - 3}{3(4n+3)} = \\frac{4n}{3(4n+3)}$$. The \"$$\\tfrac{1}{3}$$\" from $$f(1)$$ absorbs into the combined fraction cleanly — it doesn't remain as a separate additive constant.\n\nPattern: $$f(1)$$ and the trailing term almost always combine cleanly via a common denominator into a single compact fraction.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Mental exercise: compute $$\\frac{1}{1 \\cdot 2} + \\frac{1}{2 \\cdot 3} + \\frac{1}{3 \\cdot 4} + \\frac{1}{4 \\cdot 5}$$ using the telescoping trick, without tedious common-denominator arithmetic. (3 steps)", "answer": "- Step 1: Rewrite each term using $$\\frac{1}{k(k+1)} = \\frac{1}{k} - \\frac{1}{k+1}$$.\n- Step 2: The sum becomes $$\\left(\\tfrac{1}{1} - \\tfrac{1}{2}\\right) + \\left(\\tfrac{1}{2} - \\tfrac{1}{3}\\right) + \\left(\\tfrac{1}{3} - \\tfrac{1}{4}\\right) + \\left(\\tfrac{1}{4} - \\tfrac{1}{5}\\right)$$. The middle $$\\tfrac{1}{2}, \\tfrac{1}{3}, \\tfrac{1}{4}$$ all cancel.\n- Step 3: Left with $$1 - \\tfrac{1}{5} = \\tfrac{4}{5}$$. Matches the general formula $$\\frac{n}{n+1}$$ with $$n=4$$. ✓\n\nThe telescoping trick works instantly — no need to hunt for a common denominator across four fractions.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "From the shape of $$\\frac{1}{(3r+1)(3r+4)}$$, how would you know this is a method-of-differences problem, and what stride should you expect? (3 steps)", "answer": "- Step 1: Product of two linear factors in the denominator $$\\Rightarrow$$ partial fractions will produce opposite-sign fractions — the classic telescope setup.\n- Step 2: Examine the factors: $$3r+1$$ and $$3r+4$$ differ numerically by 3, but the relevant $$r$$-shift is $$3(r+1)+1 = 3r+4$$. Shifting $$r \\to r+1$$ maps one factor to the other — a stride-1 telescope in $$r$$.\n- Step 3: Expect $$\\frac{1}{(3r+1)(3r+4)} = \\tfrac{1}{3}[f(r) - f(r+1)]$$ with $$f(r) = \\frac{1}{3r+1}$$. Only two surviving terms: $$f(1) = \\tfrac{1}{4}$$ and $$-f(n+1) = -\\frac{1}{3n+4}$$.\n\nLesson: the \"stride\" is measured in $$r$$-steps, not in the raw numerical gap between constants. Always check which shift of $$r$$ maps one factor to the other.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Does it matter whether you orient your partial fractions as $$\\frac{1}{r} - \\frac{1}{r+1}$$ versus $$\\frac{1}{r+1} - \\frac{1}{r}$$ when applying the method of differences? (3 steps)", "answer": "- Step 1: Validity: both orientations telescope correctly — the method is indifferent to direction.\n- Step 2: Sign: but the closed form differs. $$u_r = f(r)-f(r+1)$$ gives $$f(1)-f(n+1)$$; $$u_r = f(r+1)-f(r)$$ gives $$f(n+1)-f(1)$$. The two closed forms differ by an overall sign.\n- Step 3: Match the orientation to the actual sign of $$u_r$$. If $$u_r > 0$$ (the typical case), the closed form should be positive — pick the orientation that makes the boundary subtraction come out positive.\n\nPractical tip: for $$\\sum \\frac{1}{r(r+1)}$$, since $$u_r > 0$$, the orientation $$\\frac{1}{r} - \\frac{1}{r+1}$$ gives the correct positive result $$1 - \\frac{1}{n+1}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "In the standard worked example $$\\sum_{r=1}^{n} \\frac{2}{(r+1)(r+3)} = \\frac{n(5n+13)}{6(n+2)(n+3)}$$, which four \"surviving\" fractions produce this result, and why does a factor of $$\\frac{1}{6}$$ appear? (3 steps)", "answer": "- Step 1: Partial fractions: $$\\frac{2}{(r+1)(r+3)} = \\frac{1}{r+1} - \\frac{1}{r+3}$$ — a stride-2 telescope. Surviving terms: $$f(1), f(2)$$ as leaders and $$-f(n+1), -f(n+2)$$ as trailers, where $$f(r) = \\frac{1}{r+1}$$.\n- Step 2: Evaluate boundaries: $$f(1) = \\tfrac{1}{2}$$, $$f(2) = \\tfrac{1}{3}$$, $$f(n+1) = \\frac{1}{n+2}$$, $$f(n+2) = \\frac{1}{n+3}$$. Sum: $$\\tfrac{1}{2} + \\tfrac{1}{3} - \\frac{1}{n+2} - \\frac{1}{n+3}$$.\n- Step 3: Combining the constant leaders: $$\\tfrac{1}{2} + \\tfrac{1}{3} = \\tfrac{5}{6}$$ — this is exactly where the 6 in the denominator of the closed form originates. The final common denominator $$6(n+2)(n+3)$$ then follows naturally.\n\nPattern recognition: the \"leading sum\" $$\\tfrac{1}{2} + \\tfrac{1}{3} = \\tfrac{5}{6}$$ dictates the form of the constants in the final closed expression.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Under what condition does an infinite series $$\\sum_{r=1}^{\\infty} [f(r) - f(r+1)]$$ converge, and what is its value? (2 steps)", "answer": "- Step 1: The partial sum $$S_n = f(1) - f(n+1)$$. Taking $$n \\to \\infty$$, convergence requires $$\\lim_{n \\to \\infty} f(n+1)$$ to exist (be finite).\n- Step 2: If $$\\lim f(n) = L$$, then $$\\sum_{r=1}^{\\infty} [f(r) - f(r+1)] = f(1) - L$$. If $$f(n) \\to 0$$ specifically, the sum equals $$f(1)$$. If $$f(n)$$ has no finite limit, the series diverges.\n\nExample: $$\\sum_{r=1}^{\\infty} \\frac{1}{r(r+1)} = 1$$ because $$f(r) = \\frac{1}{r} \\to 0$$, so the infinite sum is $$f(1) - 0 = 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "For $$\\sum_{r=1}^{n} \\frac{18}{r(r+3)}$$, what is the stride, and how many boundary terms survive? (3 steps)", "answer": "- Step 1: Partial fractions: $$\\frac{18}{r(r+3)} = \\frac{A}{r} + \\frac{B}{r+3}$$. Solving: $$A=6, B=-6$$, so the term is $$6\\!\\left(\\frac{1}{r} - \\frac{1}{r+3}\\right)$$.\n- Step 2: The denominators differ by a shift of 3, making this a stride-3 telescope: $$6[f(r) - f(r+3)]$$ with $$f(r) = \\frac{1}{r}$$.\n- Step 3: Stride 3 means THREE surviving terms at each end: leaders $$f(1), f(2), f(3)$$ and trailers $$-f(n+1), -f(n+2), -f(n+3)$$, for six surviving terms total. Sum: $$6\\!\\left[1 + \\tfrac{1}{2} + \\tfrac{1}{3} - \\frac{1}{n+1} - \\frac{1}{n+2} - \\frac{1}{n+3}\\right]$$.\n\nPattern: stride $$k$$ → $$k$$ terms per end → $$2k$$ boundary terms in total.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "In the partial fraction setup $$\\frac{1}{(2r-1)(2r+1)} = \\frac{A}{2r-1} + \\frac{B}{2r+1}$$, why does substituting $$r = -\\tfrac{1}{2}$$ efficiently pick out $$B$$? (3 steps)", "answer": "- Step 1: Multiplying by $$(2r-1)(2r+1)$$ gives the polynomial identity $$1 = A(2r+1) + B(2r-1)$$, which holds for all $$r$$ (including non-integers).\n- Step 2: To isolate $$B$$, pick $$r$$ that makes the $$A$$ term vanish: $$2r+1 = 0 \\Rightarrow r = -\\tfrac{1}{2}$$. Substituting: $$1 = A(0) + B(-2)$$, so $$B = -\\tfrac{1}{2}$$.\n- Step 3: Symmetrically, $$r = \\tfrac{1}{2}$$ kills the $$B$$ term and gives $$A = \\tfrac{1}{2}$$.\n\nThis is the \"cover-up\" trick: plug in the root of one factor, and only the coefficient of the *other* factor survives. Fast and avoids solving a system.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "If you need $$\\sum_{r=21}^{30} u_r$$ and you have the closed form $$S_n = \\sum_{r=1}^{n} u_r$$, walk through the approach using only the closed form. (3 steps)", "answer": "- Step 1: Express the partial-range sum as a difference: $$\\sum_{r=21}^{30} u_r = S_{30} - S_{20}$$. Note: subtract $$S_{20}$$, NOT $$S_{21}$$, so the $$r=21$$ term is kept in.\n- Step 2: Plug $$n=30$$ into the closed form to get $$S_{30}$$; plug $$n=20$$ to get $$S_{20}$$.\n- Step 3: Subtract the two values. Usually you then simplify to a single fraction or a decimal to the required precision.\n\nThis is enormously practical — one closed-form derivation handles arbitrarily many partial-range queries.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Quick sanity check: if you've derived $$\\sum_{r=1}^{n} u_r = \\frac{n}{2n+1}$$ where $$u_r = \\frac{1}{4r^2-1}$$, what does plugging $$n=1$$ give, and why does that check work? (3 steps)", "answer": "- Step 1: Plugging $$n=1$$: $$\\frac{1}{2(1)+1} = \\frac{1}{3}$$.\n- Step 2: This must equal $$u_1$$, since for $$n=1$$ the sum has just one term. Compute $$u_1 = \\frac{1}{4(1)^2 - 1} = \\frac{1}{3}$$. ✓ Matches.\n- Step 3: The $$n=1$$ check is a fast, low-cost verification that catches sign errors and miscounts of surviving terms instantly. If it fails, revisit the partial fractions or the cancellation count.\n\nAlways do this check before finalising an exam answer — it costs nothing and catches the vast majority of algebra slips.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Why is the method of differences dramatically faster than \"standard formula\" methods for sums like $$\\sum \\frac{1}{r(r+1)}$$, and what general principle underlies its efficiency? (3 steps)", "answer": "- Step 1: Standard formulas give closed forms for $$\\sum r, \\sum r^2, \\sum r^3$$ — but these only apply to polynomial summands. $$\\frac{1}{r(r+1)}$$ isn't a polynomial, so standard formulas are useless.\n- Step 2: The method of differences bypasses standard formulas entirely by transforming the sum into a telescoping structure. Cancellation delivers the closed form directly.\n- Step 3: Efficiency comes from collapsing an $$n$$-term sum into a 2-term (or $$2k$$-term) evaluation. The effort is front-loaded into finding the right difference form; after that, the sum is essentially free.\n\nPrinciple: *change representation so the problem becomes trivial*. Here, representing $$u_r$$ as a difference makes the sum collapse instantly.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "A student sees $$\\sum_{r=1}^{n} [(r+1)^2 - (r-1)^2]$$ and wants to apply the method of differences. What structural feature of this sum determines the cancellation pattern, and what closed form emerges? (3 steps)", "answer": "- Step 1: The general term is $$(r+1)^2 - (r-1)^2$$, which is $$g(r+1) - g(r-1)$$ with $$g(r) = r^2$$. The argument shift is 2, so this is a stride-2 telescope.\n- Step 2: Write rows: $$r=1$$: $$2^2 - 0^2$$; $$r=2$$: $$3^2 - 1^2$$; $$r=3$$: $$4^2 - 2^2$$; ...; $$r=n$$: $$(n+1)^2 - (n-1)^2$$. Each $$k^2$$ for $$k=2,\\dots,n-1$$ appears once positively, once negatively, and cancels.\n- Step 3: Surviving: positives $$n^2 + (n+1)^2$$; negatives $$-0^2 - 1^2 = -1$$. Total: $$(n+1)^2 + n^2 - 1 = 2n^2 + 2n = 2n(n+1)$$.\n\nThe stride-2 \"four-corner\" survival pattern is a recurring motif — train your eye to spot it.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Given the identity $$(r+1)^3 - (r-1)^3 = 6r^2 + 2$$, why is the coefficient \"6\" on the right side the key ingredient that unlocks the formula for $$\\sum r^2$$? (3 steps)", "answer": "- Step 1: The left side $$(r+1)^3 - (r-1)^3$$ telescopes when summed — it's $$g(r+1) - g(r-1)$$ with $$g(r) = r^3$$, so summing gives a computable closed value.\n- Step 2: The right side $$6r^2 + 2$$ contains $$\\sum r^2$$ (scaled by 6) plus the trivial $$\\sum 2 = 2n$$. So the equation becomes $$(\\text{telescoping value}) = 6\\sum r^2 + 2n$$.\n- Step 3: The \"6\" is the crucial bridge: it lets you isolate $$\\sum r^2$$ by dividing both sides, giving $$\\sum r^2 = \\frac{(\\text{telescoping value}) - 2n}{6}$$.\n\nBig idea: an identity is useful for method of differences when its left side telescopes AND its right side contains the target sum, up to easy extras.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "Summarise in a clean checklist: what are the steps to solve a typical \"find the sum using the method of differences\" exam question? (5 steps)", "answer": "- Step 1: Identify the structure of $$u_r$$. Product of linear factors in denominator $$\\Rightarrow$$ partial fractions. Polynomial $$\\Rightarrow$$ look for an algebraic identity.\n- Step 2: Rewrite $$u_r$$ in the form $$f(r) - f(r+k)$$ for some stride $$k \\geq 1$$. Verify by combining the right side back to $$u_r$$.\n- Step 3: Write out the first few terms ($$r=1, 2, 3$$) and the last few ($$r=n-1, n$$), cancelling visibly in pencil.\n- Step 4: Identify the $$k$$ surviving leading terms ($$f(1), \\ldots, f(k)$$) and the $$k$$ surviving trailing terms ($$-f(n+1), \\ldots, -f(n+k)$$). Sum them.\n- Step 5: Combine over a common denominator, simplify, and perform an $$n=1$$ sanity check.\n\nBonus: if the sum starts from $$r=a > 1$$, compute $$S_b - S_{a-1}$$ using the closed form.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "What are the three most common errors students make when applying the method of differences? (3 steps)", "answer": "- Step 1: **Confusing sum with difference.** Partial fractions sometimes give $$\\frac{1}{r} + \\frac{1}{r+1}$$ (a sum), and students wrongly assume it telescopes. It doesn't — only differences cancel.\n- Step 2: **Miscounting surviving terms.** For stride-2 or stride-3 telescopes, students often keep only one leading and one trailing term instead of $$k$$ each. Always write out enough rows to see how many go unmatched.\n- Step 3: **Sign errors from orientation.** Writing $$f(r) - f(r+1)$$ vs. $$f(r+1) - f(r)$$ gives answers differing by sign; choose the orientation that matches the actual sign of $$u_r$$.\n\nA quick $$n=1$$ check catches all three instantly — it should be the last step of every derivation.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "For the identity $$\\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2$$, which method (differences or induction) is \"discovery-like\" and which is \"verification-like\"? (3 steps)", "answer": "- Step 1: The method of differences is **discovery-like**: starting from an algebraic identity like $$4r^3 = r^2(r+1)^2 - (r-1)^2 r^2$$, summing both sides, and telescoping produces the closed form $$\\tfrac{1}{4}n^2(n+1)^2$$ — you didn't need to guess the answer in advance.\n- Step 2: Induction is **verification-like**: you must know (or guess) the closed form first, then verify it holds for $$n=1$$ and that it propagates from $$n$$ to $$n+1$$.\n- Step 3: Exam question phrasing steers you: \"show that $$u_r \\equiv \\ldots$$ and hence deduce...\" → differences (constructive); \"prove by induction that $$\\sum = \\ldots$$\" → induction. Either is usually acceptable unless specified.\n\nDifferences constructs, induction confirms — they're complementary sides of the proof toolbox.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}], "count": 41}}, "meta": {"glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 6832, "out_tokens": 38313, "reasoning_chars": 73010, "cost_eur": 0.13, "elapsed_s": 391, "content_chars": 27019}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 5400, "out_tokens": 13098, "reasoning_chars": 22228, "cost_eur": 0.0474, "elapsed_s": 301, "content_chars": 27367}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 6325, "out_tokens": 12026, "reasoning_chars": 1493, "cost_eur": 0.0133, "elapsed_s": 98, "content_chars": 28372}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 6325, "out_tokens": 11423, "reasoning_chars": 2026, "cost_eur": 0.0127, "elapsed_s": 109, "content_chars": 32372}, "opus_1": {"run": 1, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 9964, "out_tokens": 58000, "reasoning_chars": 0, "cost_eur": 4.1395, "elapsed_s": 669, "content_chars": 48643}, "opus_2": {"run": 2, "provider": "opus", "model": "claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 9964, "out_tokens": 51628, "reasoning_chars": 0, "cost_eur": 3.6998, "elapsed_s": 612, "content_chars": 39295}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": const SK='fp2_ch2';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
