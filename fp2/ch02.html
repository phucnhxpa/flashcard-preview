<script>
const DATA={"selected": [{"question": "Prove that $$\\sum_{r=1}^{n}((r+1)^2 - (r-1)^2) = an(n+1)$$ for some constant $$a$$, and determine $$a$$. (3 steps)", "answer": "- Step 1: Expand the identity: $$(r+1)^2 - (r-1)^2 = (r^2 + 2r + 1) - (r^2 - 2r + 1) = 4r$$. Alternatively, use gap-2 telescoping.\n- Step 2: By gap-2 telescoping with $$f(r) = (r-1)^2$$: the sum equals $$f(n+1) + f(n+2) - f(1) - f(2) = n^2 + (n+1)^2 - 0 - 1 = 2n^2 + 2n$$.\n- Step 3: Factor: $$2n^2 + 2n = 2n(n+1)$$. Comparing with $$an(n+1)$$, we get $$a = 2$$.\n\nBoth routes (expand-then-sum and telescope-directly) give the same result — a reassuring consistency check.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "Picture the sum $$(f(1)-f(2))+(f(2)-f(3))+(f(3)-f(4))+\\dots+(f(n)-f(n+1))$$. What visual intuition explains why nearly everything cancels? (3 steps)", "answer": "- Step 1: Focus on a middle value like $$f(2)$$. It appears as $$-f(2)$$ in the first bracket and as $$+f(2)$$ in the second bracket. These contributions sum to zero.\n- Step 2: This same pattern repeats for every intermediate $$f(k)$$ for $$k=2, 3, \\ldots, n$$ — each one appears twice with opposite signs and contributes nothing to the total.\n- Step 3: The unmatched terms are $$+f(1)$$ at the very start (its would-be negative partner lives in a $$(f(0)-f(1))$$ bracket that doesn't exist) and $$-f(n+1)$$ at the end (its would-be positive partner is in a non-existent $$(f(n+1)-f(n+2))$$ bracket).\n\nThis is the \"telescope collapsing\" image: the middle segments slide into each other and only the two ends stick out.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "Both the method of differences and mathematical induction can prove series identities. What's the conceptual difference between them? (3 steps)", "answer": "- Step 1: Induction is a \"verify-and-propagate\" method: guess a formula first, verify at $$n=1$$, then show the step $$n=k \\Rightarrow n=k+1$$. You need to already know (or guess) the target formula.\n- Step 2: Method of differences is constructive: you decompose each term as $$f(r) - f(r+1)$$, and the closed form emerges from telescoping. You don't have to guess the answer in advance.\n- Step 3: Induction is broadly applicable but gives no structural insight; method of differences reveals *why* the formula looks the way it does, by exposing the hidden cancellation.\n\nRule of thumb: use method of differences when you see telescoping structure; use induction when you're verifying a given formula without algebraic insight.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Why is method of differences so much more efficient than brute-force summation for something like $$\\sum_{r=1}^{1000} \\frac{1}{r(r+1)}$$? (3 steps)", "answer": "- Step 1: Brute-force requires adding 1000 fractions, each with a different denominator. Enormous arithmetic work.\n- Step 2: Method of differences derives the formula $$\\frac{n}{n+1}$$ once (a finite algebraic effort), then computes $$\\frac{1000}{1001}$$ with a single division.\n- Step 3: Scaling contrast: brute-force is $$O(n)$$ work; telescoping is $$O(1)$$ once the formula is known. For $$n = 10^6$$ or larger, the difference is game-changing.\n\nThis is why the method is so valued: it converts summation into evaluation.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "Given $$\\frac{1}{r(r+1)(r+2)} \\equiv \\frac{1}{2r(r+1)} - \\frac{1}{2(r+1)(r+2)}$$, explain why this decomposition is *more useful* than the standard three-term partial fraction for method of differences. (3 steps)", "answer": "- Step 1: Standard partial fractions give $$\\frac{A}{r} + \\frac{B}{r+1} + \\frac{C}{r+2}$$ — three terms that don't align into a single gap-1 telescope.\n- Step 2: The two-term form groups adjacent factors: set $$f(r) = \\frac{1}{2r(r+1)}$$, then $$f(r+1) = \\frac{1}{2(r+1)(r+2)}$$, matching the second piece. This is a direct gap-1 telescope.\n- Step 3: Sum: $$\\sum = f(1) - f(n+1) = \\frac{1}{4} - \\frac{1}{2(n+1)(n+2)}$$. As $$n \\to \\infty$$, the sum approaches $$\\frac{1}{4}$$.\n\nPattern: for $$\\frac{1}{r(r+1)(r+2)\\cdots(r+k)}$$, the \"combine-adjacent-factors\" form gives a clean telescope.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "For $\\sum_{r=1}^{n} \\frac{18}{r(r+3)}$, the text states the result is $\\frac{n(an^2+bn+c)}{(n+1)(n+2)(n+3)}$. Why does the denominator have three factors, while earlier simpler series like $\\frac{1}{r(r+1)}$ gave only two factors in the denominator? (2 steps)", "answer": "- Step 1: The denominator complexity reflects how many \"boundary terms\" survive the telescoping. For 1/[r(r+1)], only f(1) and f(n+1) survive, giving denominator (n+1). For the more complex 18/[r(r+3)], we have terms like 1/r - 1/(r+3), a difference spanning 3 positions.\n- Step 2: This means f(1), f(2), f(3) survive at the start, and f(n+1), f(n+2), f(n+3) survive at the end—six boundary terms total. After combining and simplifying, the denominator becomes (n+1)(n+2)(n+3).\n\nThe number of surviving boundary terms equals the \"span\" of the telescoping difference (how far apart r and r+k are in the difference), which determines denominator complexity.", "source": "MiniMax ②", "_id": "minimax_2_15"}, {"question": "The derivation of $\\sum r^2$ in the chapter review uses $(r+1)^3 - (r-1)^3 = 6r^2 + 2$. Explain how this identity is derived and why we can use it to find $\\sum r^2$ despite the extra \"+2\" term. (3 steps)", "answer": "- Step 1: Expand using the binomial formula: $(r+1)^3 = r^3 + 3r^2 + 3r + 1$, and $(r-1)^3 = r^3 - 3r^2 + 3r - 1$. Their difference is $(r+1)^3 - (r-1)^3 = (r^3 + 3r^2 + 3r + 1) - (r^3 - 3r^2 + 3r - 1) = 6r^2 + 2$.\n- Step 2: Rearranging: $6r^2 = (r+1)^3 - (r-1)^3 - 2$. Summing both sides from r=1 to n:\n$$6\\sum_{r=1}^{n} r^2 = \\sum_{r=1}^{n}[(r+1)^3 - (r-1)^3] - \\sum_{r=1}^{n} 2$$\n- Step 3: The first sum telescopes: $(2^3 - 0^3) + (3^3 - 1^3) + ... + ((n+1)^3 - (n-1)^3) = (2^3 + 3^3 + ... + n^3 + (n+1)^3) - (0^3 + 1^3 + ... + (n-1)^3) = (n+1)^3 + n^3 - 1^3 - 0^3$. Then subtract $2n$, giving the standard formula $\\sum r^2 = \\frac{1}{6}n(n+1)(2n+1)$.\n\nThe key insight is that when your target expression isn't exactly a telescoping difference, you can introduce extra terms and then handle them separately.", "source": "MiniMax ②", "_id": "minimax_2_8"}, {"question": "Why does $$\\sum_{r=1}^{N} \\ln\\left(1 + \\frac{1}{r+2}\\right)$$ telescope, and what structural trick makes it work? (3 steps)", "answer": "- Step 1: Rewrite the fraction: $$1 + \\frac{1}{r+2} = \\frac{r+3}{r+2}$$. Then apply the logarithm property: $$\\ln\\left(\\frac{r+3}{r+2}\\right) = \\ln(r+3) - \\ln(r+2)$$.\n- Step 2: Set $$f(r) = \\ln(r+2)$$. Then the summand equals $$f(r+1) - f(r)$$ — the sign-flipped telescoping form.\n- Step 3: The sum telescopes to $$f(N+1) - f(1) = \\ln(N+3) - \\ln(3) = \\ln\\left(\\frac{N+3}{3}\\right)$$.\n\nThe beautiful trick: logarithms convert products of ratios into telescoping sums of differences.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "Given that $$\\sum_{r=1}^{n} u_r = S(n)$$ for some closed-form formula $S(n)$, how do you find $$\\sum_{r=a}^{b} u_r$$? (3 steps)", "answer": "- Step 1: The key insight: $\\sum_{r=a}^{b}$ means \"all terms from $r=a$ to $r=b$,\" which equals \"all terms from $r=1$ to $r=b$\" minus \"all terms from $r=1$ to $r=a-1$.\" The subtraction removes everything before $r=a$.\n- Step 2: In symbols:\n$$\\sum_{r=a}^{b} u_r = S(b) - S(a-1)$$\n+ For example, $\\sum_{r=21}^{30} u_r = S(30) - S(20)$.\n+ A common mistake is to write $S(b) - S(a)$, which incorrectly removes the $r=a$ term as well.\n- Step 3: This is far easier than re-applying the method of differences directly over the range $r=a$ to $r=b$. You simply substitute two values into $S(n)$ and subtract.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "What is the connection between the shift amount $$k$$ and the difficulty of simplifying the final answer in a method-of-differences problem? Why does $$k=1$$ often give cleaner results than $$k=2$$? (2 steps)", "answer": "- Step 1: For $$k=1$$, only two terms survive: $$\\mathrm{f}(1) - \\mathrm{f}(n+1)$$ (or $$\\mathrm{f}(n+1) - \\mathrm{f}(1)$$). Combining two fractions over a common denominator is straightforward — one addition/subtraction, one simplification.\n- Step 2: For $$k=2$$, four terms survive: $$\\mathrm{f}(1) + \\mathrm{f}(2) - \\mathrm{f}(n+1) - \\mathrm{f}(n+2)$$. Combining four fractions requires finding a common denominator for all four, expanding, collecting like terms, and then factorising the numerator. As seen in Example 4, this produces expressions like $$\\frac{5}{6} - \\frac{1}{n+2} - \\frac{1}{n+3}$$, which requires combining into $$\\frac{n(5n+13)}{6(n+2)(n+3)}$$ — significantly more algebra. For $$k=3$$ or higher, six or more terms must be combined, making simplification increasingly tedious. The telescoping cancellation itself is no harder, but the algebraic simplification of the surviving terms grows with $$k$$.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "Verify the identity $4r^3 \\equiv r^2(r+1)^2 - (r-1)^2 r^2$ by expanding both sides. Why is this identity useful for summing $\\sum r^3$? (4 steps)", "answer": "- Step 1: Expand the first term on the right: $r^2(r+1)^2 = r^2(r^2 + 2r + 1) = r^4 + 2r^3 + r^2$.\n- Step 2: Expand the second term: $(r-1)^2 r^2 = (r^2 - 2r + 1)r^2 = r^4 - 2r^3 + r^2$.\n- Step 3: Subtract: $(r^4 + 2r^3 + r^2) - (r^4 - 2r^3 + r^2) = 4r^3$. ✓\n- Step 4: This identity is useful because the right side is $f(r) - f(r-1)$ where $f(x) = x^2(x+1)^2 = [x(x+1)]^2$. So $\\sum_{r=1}^{n} 4r^3 = \\sum_{r=1}^{n}(f(r) - f(r-1))$, which telescopes to $f(n) - f(0)$. This converts the hard sum $\\sum r^3$ into a simple evaluation.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "In the partial fraction setup $$\\frac{1}{(2r-1)(2r+1)} = \\frac{A}{2r-1} + \\frac{B}{2r+1}$$, why does substituting $$r = -\\tfrac{1}{2}$$ efficiently pick out $$B$$? (3 steps)", "answer": "- Step 1: Multiplying by $$(2r-1)(2r+1)$$ gives the polynomial identity $$1 = A(2r+1) + B(2r-1)$$, which holds for all $$r$$ (including non-integers).\n- Step 2: To isolate $$B$$, pick $$r$$ that makes the $$A$$ term vanish: $$2r+1 = 0 \\Rightarrow r = -\\tfrac{1}{2}$$. Substituting: $$1 = A(0) + B(-2)$$, so $$B = -\\tfrac{1}{2}$$.\n- Step 3: Symmetrically, $$r = \\tfrac{1}{2}$$ kills the $$B$$ term and gives $$A = \\tfrac{1}{2}$$.\n\nThis is the \"cover-up\" trick: plug in the root of one factor, and only the coefficient of the *other* factor survives. Fast and avoids solving a system.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "For the closed form $$\\sum_{r=1}^{n} \\frac{2}{(r+1)(r+3)} = \\frac{n(5n+13)}{6(n+2)(n+3)}$$, what does the formula approach as $$n \\to \\infty$$, and is that plausible? (3 steps)", "answer": "- Step 1: For large $$n$$: numerator $$\\sim 5n^2$$, denominator $$\\sim 6n^2$$. The ratio approaches $$\\frac{5}{6}$$.\n- Step 2: From the telescoping structure, the \"constant part\" came from $$f(1) + f(2) = \\frac{1}{2} + \\frac{1}{3} = \\frac{5}{6}$$, and the end terms $$\\frac{1}{n+2} + \\frac{1}{n+3} \\to 0$$.\n- Step 3: Match: the limit of the closed form is $$\\frac{5}{6}$$, consistent with the expected boundary contribution. This cross-check confirms the derivation.\n\nSanity check: if the asymptote doesn't equal $$f(1)$$ (gap-1) or $$f(1) + f(2)$$ (gap-2), you've made an error somewhere.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "Under what condition does an infinite series $$\\sum_{r=1}^{\\infty} [f(r) - f(r+1)]$$ converge, and what is its value? (2 steps)", "answer": "- Step 1: The partial sum $$S_n = f(1) - f(n+1)$$. Taking $$n \\to \\infty$$, convergence requires $$\\lim_{n \\to \\infty} f(n+1)$$ to exist (be finite).\n- Step 2: If $$\\lim f(n) = L$$, then $$\\sum_{r=1}^{\\infty} [f(r) - f(r+1)] = f(1) - L$$. If $$f(n) \\to 0$$ specifically, the sum equals $$f(1)$$. If $$f(n)$$ has no finite limit, the series diverges.\n\nExample: $$\\sum_{r=1}^{\\infty} \\frac{1}{r(r+1)} = 1$$ because $$f(r) = \\frac{1}{r} \\to 0$$, so the infinite sum is $$f(1) - 0 = 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "If $u_r = f(r) - f(r+2)$, write out the terms for $r = 1, 2, 3, \\ldots, n$ and determine which terms survive after cancellation. (4 steps)", "answer": "- Step 1: Write out each term:\n$$r=1:\\ f(1) - f(3),\\quad r=2:\\ f(2) - f(4),\\quad r=3:\\ f(3) - f(5),\\quad r=4:\\ f(4) - f(6),\\quad \\ldots,\\quad r=n:\\ f(n) - f(n+2)$$\n- Step 2: Collect all positive terms: $f(1), f(2), f(3), f(4), \\ldots, f(n)$. Collect all negative terms: $-f(3), -f(4), -f(5), -f(6), \\ldots, -f(n+2)$.\n- Step 3: The overlap (which cancels) runs from $f(3)$ to $f(n)$. The positive terms $f(1)$ and $f(2)$ have no matching negatives. The negative terms $-f(n+1)$ and $-f(n+2)$ have no matching positives.\n- Step 4: Therefore:\n$$\\sum_{r=1}^{n}(f(r) - f(r+2)) = f(1) + f(2) - f(n+1) - f(n+2)$$\n\nWith a gap of $k=2$, exactly **two** terms survive at each end. This is the \"higher-order differences\" case.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "Edge case verification: when $$n=1$$ in a method of differences sum with $$u_r = \\mathrm{f}(r) - \\mathrm{f}(r+1)$$, does the formula $$\\mathrm{f}(1) - \\mathrm{f}(n+1)$$ still hold? Verify with a concrete example. (2 steps)", "answer": "- Step 1: When $$n=1$$, the sum is just $$u_1 = \\mathrm{f}(1) - \\mathrm{f}(2)$$, and the formula gives $$\\mathrm{f}(1) - \\mathrm{f}(1+1) = \\mathrm{f}(1) - \\mathrm{f}(2)$$ — identical. There are no interior terms to cancel (the \"overlap\" is empty), so the single term is both the first and last term, and the formula holds trivially.\n- Step 2: Concrete example: $$\\sum_{r=1}^{1} \\frac{1}{r(r+1)} = \\frac{1}{1 \\times 2} = \\frac{1}{2}$$. The formula gives $$1 - \\frac{1}{1+1} = 1 - \\frac{1}{2} = \\frac{1}{2}$$. Matches. For $$n=2$$: $$\\frac{1}{1 \\times 2} + \\frac{1}{2 \\times 3} = \\frac{1}{2} + \\frac{1}{6} = \\frac{2}{3}$$,", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "For $u_r = f(r) - f(r+k)$ where $k$ is a positive integer, how many terms survive at each end after telescoping? State the general result. (2 steps)", "answer": "- Step 1: The positive terms are $f(1), f(2), \\ldots, f(n)$ and the negative terms are $-f(k+1), -f(k+2), \\ldots, -f(n+k)$. The overlap (which cancels) runs from $f(k+1)$ to $f(n)$. The uncancelled positive terms are $f(1)$ through $f(k)$, and the uncancelled negative terms are $-f(n+1)$ through $-f(n+k)$.\n- Step 2: Therefore:\n$$\\sum_{r=1}^{n}(f(r) - f(r+k)) = \\sum_{j=1}^{k} f(j) - \\sum_{j=1}^{k} f(n+j)$$\n\n**Exactly $k$ terms survive at the start and $k$ terms at the end.** For $k=1$: $f(1) - f(n+1)$. For $k=2$: $f(1) + f(2) - f(n+1) - f(n+2)$. For $k=3$: three terms at each end, and so on.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "Why can $$\\frac{r}{(r+1)!}$$ be written as $$\\frac{1}{r!} - \\frac{1}{(r+1)!}$$, and what does this tell us about summing that series? (3 steps)", "answer": "- Step 1: Verify from the RHS: $$\\frac{1}{r!} - \\frac{1}{(r+1)!} = \\frac{(r+1) - 1}{(r+1)!} = \\frac{r}{(r+1)!}$$, using $$(r+1)! = (r+1) \\cdot r!$$. Identity confirmed.\n- Step 2: This puts the term in the telescoping form $$f(r) - f(r+1)$$ with $$f(r) = \\frac{1}{r!}$$, so the series telescopes immediately.\n- Step 3: The sum is $$f(1) - f(n+1) = 1 - \\frac{1}{(n+1)!}$$. As $$n \\to \\infty$$, $$\\frac{1}{(n+1)!} \\to 0$$ rapidly, so the infinite sum approaches 1.\n\nFactorials telescope naturally because of their multiplicative recursion $$(r+1)! = (r+1) \\cdot r!$$.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Quick sanity check: if you've derived $$\\sum_{r=1}^{n} u_r = \\frac{n}{2n+1}$$ where $$u_r = \\frac{1}{4r^2-1}$$, what does plugging $$n=1$$ give, and why does that check work? (3 steps)", "answer": "- Step 1: Plugging $$n=1$$: $$\\frac{1}{2(1)+1} = \\frac{1}{3}$$.\n- Step 2: This must equal $$u_1$$, since for $$n=1$$ the sum has just one term. Compute $$u_1 = \\frac{1}{4(1)^2 - 1} = \\frac{1}{3}$$. ✓ Matches.\n- Step 3: The $$n=1$$ check is a fast, low-cost verification that catches sign errors and miscounts of surviving terms instantly. If it fails, revisit the partial fractions or the cancellation count.\n\nAlways do this check before finalising an exam answer — it costs nothing and catches the vast majority of algebra slips.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Why is partial fractions such a common tool when setting up a method-of-differences problem? (3 steps)", "answer": "- Step 1: Many series have general terms of the form $$\\frac{1}{(\\text{linear factor})(\\text{linear factor})}$$, e.g., $$\\frac{1}{r(r+1)}$$ or $$\\frac{1}{(2r-1)(2r+1)}$$. These don't immediately look like a difference $$f(r) - f(r+1)$$.\n- Step 2: Partial fractions splits such a product of factors into a *difference* of reciprocals, e.g., $$\\frac{1}{r(r+1)} = \\frac{1}{r} - \\frac{1}{r+1}$$. Now the telescoping structure is visible with $$f(r) = \\frac{1}{r}$$.\n- Step 3: Without partial fractions, there's no obvious $$f$$ to choose, and the method can't start. With them, any rational expression with a factorable denominator becomes a candidate for telescoping.\n\nPartial fractions is the algebraic \"unlocker\" that converts products into differences.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Explain why partial fraction expansions of certain expressions (like $$\\frac{2r+1}{r(r+1)}$$) do NOT give a telescoping form, even though the denominator factors nicely. (3 steps)", "answer": "- Step 1: For $$\\frac{2r+1}{r(r+1)}$$: standard partial fractions give $$\\frac{A}{r} + \\frac{B}{r+1}$$ with $$A = 1, B = 1$$. So it equals $$\\frac{1}{r} + \\frac{1}{r+1}$$ — a *sum* of positive terms.\n- Step 2: Method of differences requires a *difference* $$f(r) - f(r+1)$$, because cancellation needs opposite signs. A sum can't telescope.\n- Step 3: The signs of the coefficients in the partial-fraction expansion determine whether telescoping applies. If they have the same sign, you have to handle the sum differently (e.g., split into two known series).\n\nLitmus test: after partial fractions, check that the two coefficients have opposite signs.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "Use the identity $$r \\equiv \\tfrac{1}{2}\\bigl[r(r+1) - r(r-1)\\bigr]$$ to show via telescoping why $$\\sum_{r=1}^{n} r = \\tfrac{1}{2} n(n+1)$$. (3 steps)", "answer": "- Step 1: Set $$g(r) = r(r-1)$$. Then $$g(r+1) = (r+1)r = r(r+1)$$, so the identity becomes $$r = \\tfrac{1}{2}[g(r+1) - g(r)]$$.\n- Step 2: Sum from $$r=1$$ to $$n$$. The right side telescopes: $$\\sum_{r=1}^{n} \\tfrac{1}{2}[g(r+1) - g(r)] = \\tfrac{1}{2}[g(n+1) - g(1)]$$.\n- Step 3: Compute boundaries: $$g(n+1) = (n+1)n = n(n+1)$$ and $$g(1) = 1 \\cdot 0 = 0$$. So $$\\sum_{r=1}^{n} r = \\tfrac{1}{2} n(n+1)$$.\n\nThe classic arithmetic-series formula falls straight out of a one-line telescoping identity — no pairing-terms trick needed.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "If your telescoping formula involves $$f(r) = \\frac{1}{r}$$ (which is undefined at $$r=0$$), does it matter for the final result? (3 steps)", "answer": "- Step 1: The telescoping formula $$\\sum_{r=1}^{n} u_r = f(1) - f(n+1)$$ only evaluates $$f$$ at arguments $$1, 2, \\ldots, n+1$$.\n- Step 2: It never touches $$f(0)$$, so $$f$$ being undefined there is fine — as long as we don't extend the sum to $$r=0$$ or use a reformulation that accidentally calls $$f(0)$$.\n- Step 3: The takeaway: check your $$f$$'s domain and match it against the indices actually used. Stay inside the valid range.\n\nSubtle point: issues can arise with shifted reformulations; always double-check the endpoints you're evaluating.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "In Example 1, the identity $$4r^3 \\equiv r^2(r+1)^2 - (r-1)^2r^2$$ was used to sum $$r^3$$. Explain the intuition behind choosing this particular form. (3 steps)", "answer": "- Step 1: We want to sum $$r^3$$ using differences. The pattern suggests looking at differences of consecutive \"square of triangular number\" expressions: $$(r(r+1))^2 = r^2(r+1)^2$$.\n- Step 2: Compute the difference: $$(r+1)^2r^2 - r^2(r-1)^2$$. Expanding both: $$r^2(r^2+2r+1) = r^4+2r^3+r^2$$ and $$(r^2-2r+1)r^2 = r^4-2r^3+r^2$$.\n- Step 3: Subtracting: $$(r^4+2r^3+r^2) - (r^4-2r^3+r^2) = 4r^3$$. This clever choice creates a telescoping sum where $$\\sum_{r=1}^{n} 4r^3 = n^2(n+1)^2$$, giving $$\\sum r^3 = \\frac{1}{4}n^2(n+1)^2$$.", "source": "MiniMax ①", "_id": "minimax_1_7"}, {"question": "Why is \"factoring the denominator\" an essential preliminary step before applying method of differences to an expression like $$\\frac{1}{4r^2-1}$$? (3 steps)", "answer": "- Step 1: The unfactored form $$\\frac{1}{4r^2-1}$$ hides the telescoping structure. It looks like a random rational expression with no obvious decomposition.\n- Step 2: Factoring $$4r^2 - 1 = (2r-1)(2r+1)$$ reveals two linear factors whose product fills the denominator — now partial fractions can act to split into a difference.\n- Step 3: Without factoring, there's no algebraic handle: you can't see what $$f$$ to choose, and the method cannot start.\n\nGeneral pattern: recognizing difference of squares or grouping into linear factors is a prerequisite for partial fractions, which is a prerequisite for telescoping.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "What is the method of differences, and what form must the general term of a series take for this method to apply?", "answer": "The method of differences is a technique for summing finite series by exploiting cancellation. It applies when the general term $u_r$ can be written as a **difference of two function values at offset arguments**, such as $u_r = f(r) - f(r+1)$ or $u_r = f(r) - f(r+k)$. When you sum these terms from $r=1$ to $n$, the intermediate values of $f$ cancel in a chain (each $-f(k)$ is matched by a $+f(k)$ from an adjacent term), collapsing the entire sum down to just a few surviving terms at the start and end. This converts a difficult summation into a simple evaluation of $f$ at specific points.", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "For method-of-differences problems, why is it crucial to distinguish between the \"indexing gap\" in $$f$$ and the \"factor gap\" in the denominator? (3 steps)", "answer": "- Step 1: The factor gap is how much the two linear factors in the denominator differ, e.g., in $$(r+1)(r+3)$$ the factor gap is 2.\n- Step 2: The indexing gap of $$f$$ is how many steps of $$r$$ are needed for $$f$$ to progress from the first factor to the second. For $$f(r) = \\frac{1}{r+1}$$: $$f(r+2) = \\frac{1}{r+3}$$, so indexing gap = 2. For $$\\frac{1}{(2r+3)(2r+5)}$$ with $$f(r) = \\frac{1}{2r+3}$$: $$f(r+1) = \\frac{1}{2r+5}$$, so indexing gap = 1.\n- Step 3: The indexing gap (not the factor gap) determines how many boundary terms survive. Always verify by computing $$f(r+1)$$ explicitly.\n\nKey rule: indexing gap = (factor gap) ÷ (coefficient of $$r$$ in the factor).", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "Without doing numerical calculation, explain why $$\\sum_{r=1}^{n} \\frac{1}{r(r+1)}$$ must be slightly less than 1 for large $$n$$, and give the exact closed form. (3 steps)", "answer": "- Step 1: Partial fractions: $$\\frac{1}{r(r+1)} = \\frac{1}{r} - \\frac{1}{r+1}$$. Each term measures the \"drop\" in $$\\frac{1}{r}$$ from one step to the next.\n- Step 2: Summing these drops from $$r=1$$ to $$n$$ gives the total drop from $$\\frac{1}{1}$$ down to $$\\frac{1}{n+1}$$, which is $$1 - \\frac{1}{n+1}$$.\n- Step 3: As $$n \\to \\infty$$, $$\\frac{1}{n+1} \\to 0$$, so the sum approaches but never reaches 1. The exact closed form is $$\\frac{n}{n+1}$$.\n\nIntuition: the series is a \"height drop\" telescope — each term is one step of descent, and the total sum is the overall height descended.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "A student sees $$\\sum_{r=1}^{n} [(r+1)^2 - (r-1)^2]$$ and wants to apply the method of differences. What structural feature of this sum determines the cancellation pattern, and what closed form emerges? (3 steps)", "answer": "- Step 1: The general term is $$(r+1)^2 - (r-1)^2$$, which is $$g(r+1) - g(r-1)$$ with $$g(r) = r^2$$. The argument shift is 2, so this is a stride-2 telescope.\n- Step 2: Write rows: $$r=1$$: $$2^2 - 0^2$$; $$r=2$$: $$3^2 - 1^2$$; $$r=3$$: $$4^2 - 2^2$$; ...; $$r=n$$: $$(n+1)^2 - (n-1)^2$$. Each $$k^2$$ for $$k=2,\\dots,n-1$$ appears once positively, once negatively, and cancels.\n- Step 3: Surviving: positives $$n^2 + (n+1)^2$$; negatives $$-0^2 - 1^2 = -1$$. Total: $$(n+1)^2 + n^2 - 1 = 2n^2 + 2n = 2n(n+1)$$.\n\nThe stride-2 \"four-corner\" survival pattern is a recurring motif — train your eye to spot it.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "For $$\\sum_{r=1}^{n} \\frac{18}{r(r+3)}$$, how many boundary terms survive the telescoping, and what's the structure? (3 steps)", "answer": "- Step 1: Partial fractions: $$\\frac{18}{r(r+3)} = 6\\left(\\frac{1}{r} - \\frac{1}{r+3}\\right)$$. This has form $$6(f(r) - f(r+3))$$ with $$f(r) = \\frac{1}{r}$$ — a gap-3 telescope.\n- Step 2: With gap 3, six boundary terms survive: $$f(1), f(2), f(3)$$ (positives, no earlier cancellers) and $$f(n+1), f(n+2), f(n+3)$$ (negatives, no later cancellers).\n- Step 3: Sum equals $$6\\left[1 + \\frac{1}{2} + \\frac{1}{3} - \\frac{1}{n+1} - \\frac{1}{n+2} - \\frac{1}{n+3}\\right] = 11 - 6\\left[\\frac{1}{n+1} + \\frac{1}{n+2} + \\frac{1}{n+3}\\right]$$.\n\nPattern: the number of boundary survivors is $$2 \\times \\text{gap}$$, directly reflecting the gap width.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "What does \"$$u_r = f(r) - f(r+1)$$\" say intuitively about the relationship between $$\\{u_r\\}$$ and $$f$$, and how does this parallel calculus? (3 steps)", "answer": "- Step 1: $$f(r) - f(r+1)$$ is the (negative) forward-difference of $$f$$: it measures how much $$f$$ changes as $$r$$ advances by 1.\n- Step 2: So $$\\{u_r\\}$$ encodes the \"instantaneous decrease\" of $$f$$ at each step. Summing all these decreases from $$r=1$$ to $$n$$ must recover the total decrease: $$f(1) - f(n+1)$$.\n- Step 3: Parallel: in calculus, if $$u = -\\frac{dF}{dx}$$, then $$\\int_a^b u\\, dx = F(a) - F(b)$$. Same structure — method of differences is the discrete fundamental theorem of calculus.\n\nThis explains why telescoping feels so \"clean\": it's discrete integration.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Mental exercise: compute $$\\frac{1}{1 \\cdot 2} + \\frac{1}{2 \\cdot 3} + \\frac{1}{3 \\cdot 4} + \\frac{1}{4 \\cdot 5}$$ using the telescoping trick, without tedious common-denominator arithmetic. (3 steps)", "answer": "- Step 1: Rewrite each term using $$\\frac{1}{k(k+1)} = \\frac{1}{k} - \\frac{1}{k+1}$$.\n- Step 2: The sum becomes $$\\left(\\tfrac{1}{1} - \\tfrac{1}{2}\\right) + \\left(\\tfrac{1}{2} - \\tfrac{1}{3}\\right) + \\left(\\tfrac{1}{3} - \\tfrac{1}{4}\\right) + \\left(\\tfrac{1}{4} - \\tfrac{1}{5}\\right)$$. The middle $$\\tfrac{1}{2}, \\tfrac{1}{3}, \\tfrac{1}{4}$$ all cancel.\n- Step 3: Left with $$1 - \\tfrac{1}{5} = \\tfrac{4}{5}$$. Matches the general formula $$\\frac{n}{n+1}$$ with $$n=4$$. ✓\n\nThe telescoping trick works instantly — no need to hunt for a common denominator across four fractions.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "Given a closed-form formula $S(n)$ for $$\\sum_{r=1}^{n} u_r$$, explain the strategy for finding $$\\sum_{r=n}^{2n} u_r$$. What is the key identity, and what is a common sign error? (3 steps)", "answer": "- Step 1: The key identity is $\\sum_{r=n}^{2n} u_r = S(2n) - S(n-1)$. This works because \"all terms from $r=n$ to $r=2n$\" equals \"all terms from $r=1$ to $r=2n$\" minus \"all terms from $r=1$ to $r=n-1$.\"\n- Step 2: You substitute $2n$ and $n-1$ into $S(n)$ and subtract. For example, if $S(n) = \\frac{3n}{4(3n+4)}$, then $\\sum_{r=n}^{2n} = \\frac{6n}{4(6n+4)} - \\frac{3(n-1)}{4(3n+1)}$, which simplifies to $\\frac{3(n+1)}{2(3n+1)(3n+2)}$.\n- Step 3: The common error is writing $S(2n) - S(n)$ instead of $S(2n) - S(n-1)$. Using $S(n)$ subtracts one too many terms — it removes the $r=n$ term as well. Always use $S(a-1)$ when the lower limit is $a$.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "You're given a new series $$\\sum_{r=1}^{n} u_r$$ and need to evaluate it by method of differences. Describe a general strategy when $$u_r$$ isn't obviously in telescoping form. (4 steps)", "answer": "- Step 1: Examine the structure. If $$u_r$$ is a rational function, factor the denominator (including difference-of-squares patterns if needed).\n- Step 2: Apply partial fractions. Ensure you get a signed *difference*, not a sum. Verify by recombining.\n- Step 3: Identify the telescoping form $$f(r) - f(r+k)$$: determine the gap $$k$$ by computing $$f(r+1), f(r+2), \\ldots$$ until it matches the subtracted piece.\n- Step 4: Apply the gap-$$k$$ formula: $$\\sum_{r=1}^{n} u_r = \\sum_{j=1}^{k} f(j) - \\sum_{j=n+1}^{n+k} f(j)$$. Write out a few terms to confirm.\n\nStrategy tree: **factor → partial-fraction → identify $$f$$ and gap → apply formula → verify**.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "The identity $\\frac{2r+1}{r^2(r+1)^2} \\equiv \\frac{1}{r^2} - \\frac{1}{(r+1)^2}$ is used to sum the series. Explain why this partial fraction takes this particular form (difference of squares) rather than the standard A/r + B/(r+1) form, and how this leads to cancellation. (3 steps)", "answer": "- Step 1: The denominator r²(r+1)² is a perfect square: [r(r+1)]². This suggests looking for a difference of reciprocals of squares, which is exactly what works.\n- Step 2: To verify, compute the RHS: $\\frac{1}{r^2} - \\frac{1}{(r+1)^2} = \\frac{(r+1)^2 - r^2}{r^2(r+1)^2} = \\frac{r^2 + 2r + 1 - r^2}{r^2(r+1)^2} = \\frac{2r+1}{r^2(r+1)^2}$. This matches the LHS.\n- Step 3: This is a telescoping difference with f(r) = 1/r². Summing from r=1 to n: $\\sum_{r=1}^{n} \\left(\\frac{1}{r^2} - \\frac{1}{(r+1)^2}\\right) = \\frac{1}{1^2} - \\frac{1}{(n+1)^2} = 1 - \\frac{1}{(n+1)^2}$.\n\nThe insight is recognizing special denominator structures (perfect squares, differences of squares) and matching them with appropriate telescoping forms.", "source": "MiniMax ②", "_id": "minimax_2_17"}, {"question": "What are the three most common errors students make when applying the method of differences? (3 steps)", "answer": "- Step 1: **Confusing sum with difference.** Partial fractions sometimes give $$\\frac{1}{r} + \\frac{1}{r+1}$$ (a sum), and students wrongly assume it telescopes. It doesn't — only differences cancel.\n- Step 2: **Miscounting surviving terms.** For stride-2 or stride-3 telescopes, students often keep only one leading and one trailing term instead of $$k$$ each. Always write out enough rows to see how many go unmatched.\n- Step 3: **Sign errors from orientation.** Writing $$f(r) - f(r+1)$$ vs. $$f(r+1) - f(r)$$ gives answers differing by sign; choose the orientation that matches the actual sign of $$u_r$$.\n\nA quick $$n=1$$ check catches all three instantly — it should be the last step of every derivation.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Given $$\\sum_{r=1}^{n} \\frac{1}{r(r+1)} = \\frac{n}{n+1}$$, what can we say about the infinite sum $$\\sum_{r=1}^{\\infty} \\frac{1}{r(r+1)}$$ qualitatively? (3 steps)", "answer": "- Step 1: The formula $$\\frac{n}{n+1}$$ is monotonically increasing and bounded above by 1. As $$n$$ grows, it approaches 1 from below.\n- Step 2: So the infinite series converges, and its sum is exactly 1.\n- Step 3: Comparison perspective: $$\\sum \\frac{1}{r}$$ diverges (harmonic series), but $$\\sum \\frac{1}{r(r+1)} \\approx \\sum \\frac{1}{r^2}$$ converges because the extra factor of $$(r+1)$$ gives enough decay.\n\nConceptual point: method of differences often exposes convergence behavior by giving us explicit partial sums.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "Is it true that *every* finite series $$\\sum u_r$$ can be put into telescoping form? If so, why isn't method of differences always practical? (3 steps)", "answer": "- Step 1: Technically yes: define $$f(r) = -\\sum_{k=1}^{r-1} u_k$$ (the partial sum with a sign). Then $$f(r) - f(r+1) = u_r$$ by construction.\n- Step 2: But this definition is circular — $$f$$ is defined *through* the sum we're trying to compute, so it gives no new information.\n- Step 3: The *useful* version of the method requires $$f$$ to have a simple, explicit closed form independent of the sum. That's why the method succeeds for certain algebraic forms (partial fractions, factorials, polynomials) but not all series.\n\nPhilosophical point: telescoping is a tool for structured series, not a universal shortcut.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "In the method of differences, what distinguishes a series that can be summed in closed form (like $\\sum \\frac{1}{r(r+1)}$) from one that cannot be expressed in elementary terms? (2 steps)", "answer": "- Step 1: All the series in this chapter can be summed because they reduce to telescoping series through partial fractions. A telescoping series always has a closed form: it's simply the difference between two evaluations of f at the boundaries.\n- Step 2: The key requirement is that the general term can be expressed as f(r) - f(r+k) for some function f and constant k. This requires the term to be a rational function where partial fraction decomposition produces denominators that are linear in r and differ by constants. If partial fractions produce terms like $\\ln r$, $\\sqrt{r}$, or other non-rational functions, the \"telescoping\" might not produce elementary closed forms.\n\nEvery example in this chapter is carefully constructed to be telescoping—the method of differences is powerful precisely because it reduces complex summations to simple boundary evaluations, but this only works when such a telescoping structure exists.", "source": "MiniMax ②", "_id": "minimax_2_16"}, {"question": "Given that $$\\frac{1}{(2r-1)(2r+1)} = \\frac{1}{2}\\left(\\frac{1}{2r-1} - \\frac{1}{2r+1}\\right)$$, how do you correctly identify $$f(r)$$ for telescoping, and why check $$f(r+1)$$? (3 steps)", "answer": "- Step 1: Choose $$f(r) = \\frac{1}{2r-1}$$ (the first term of the difference, taken as-is).\n- Step 2: Verify: compute $$f(r+1) = \\frac{1}{2(r+1) - 1} = \\frac{1}{2r+1}$$. This matches the second term of the difference exactly.\n- Step 3: Confirmation means $$u_r = \\frac{1}{2}(f(r) - f(r+1))$$ — a gap-1 telescope. Sum: $$\\frac{1}{2}[f(1) - f(n+1)] = \\frac{1}{2}\\left[1 - \\frac{1}{2n+1}\\right] = \\frac{n}{2n+1}$$.\n\nThe lesson: always validate your candidate $$f$$ by computing $$f(r+1)$$ and checking it reproduces the subtracted piece.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "Why does ∑1/(4r²−1) require a modified approach compared to ∑1/[r(r+1)]? (4 steps)", "answer": "- Step 1: Factor denominator: 4r²−1 = (2r−1)(2r+1). Use partial fractions: 1/(4r²−1) = ½[1/(2r−1) − 1/(2r+1)].\n- Step 2: Observe the spacing: The denominators differ by 2 (2r−1 and 2r+1), not 1. This creates a step-2 difference.\n- Step 3: Expand the sum:\n  + ½[(1/1−1/3) + (1/3−1/5) + ... + (1/(2n−1)−1/(2n+1))] ⇒ Terms cancel two apart.\n- Step 4: Remaining terms are first (1/1) and last (−1/(2n+1)), giving ½(1 − 1/(2n+1)) = n/(2n+1)\n\n**Takeaway:** When the difference spans multiple steps, more initial/final terms remain. Here, step-2 differences leave two unpaired terms.", "source": "Qwen 3 ①", "_id": "qwen_1_3"}, {"question": "Why does the constant $$+2$$ matter when using $$(r+1)^3 - (r-1)^3 = 6r^2 + 2$$ to derive $$\\sum r^2$$? (3 steps)", "answer": "- Step 1: The LHS $$(r+1)^3 - (r-1)^3$$ is the \"telescoping part.\" Its sum from $$r=1$$ to $$n$$ is a closed form depending only on boundary $$f$$-values.\n- Step 2: The RHS $$6r^2 + 2$$, summed term-by-term, is $$6\\sum r^2 + 2n$$. The constant 2 contributes $$2n$$ to the total — it doesn't vanish.\n- Step 3: When isolating $$\\sum r^2$$, you must subtract the $$2n$$ contribution. Forgetting it gives $$\\sum r^2$$ wrong by a linear term $$\\frac{n}{3}$$.\n\nConstants do not telescope — they accumulate linearly and must be tracked explicitly.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "Robin decomposes $$\\frac{2r+1}{r(r+1)}$$ into partial fractions as $$\\frac{1}{r} + \\frac{1}{r+1}$$, then attempts the method of differences, claiming the sum telescopes to $1 - \\frac{1}{n+1}$. What is fundamentally wrong with this reasoning? (4 steps)", "answer": "- Step 1: Robin's partial fractions are correct: $\\frac{2r+1}{r(r+1)} = \\frac{1}{r} + \\frac{1}{r+1}$. However, notice the signs — **both terms are positive**. This is $f(r) + f(r+1)$, not $f(r) - f(r+1)$.\n- Step 2: The method of differences requires **opposite signs** so that terms cancel when summed. With the same sign, terms **accumulate**. Writing out: $r=1$: $\\frac{1}{1} + \\frac{1}{2}$, $r=2$: $\\frac{1}{2} + \\frac{1}{3}$, $r=3$: $\\frac{1}{3} + \\frac{1}{4}$, etc.\n- Step 3: When added, $\\frac{1}{2}$ appears **twice** (positive from $r=1$ and positive from $r=2$), $\\frac{1}{3}$ appears twice, etc. Nothing cancels — every term adds. The sum is $\\sum_{r=1}^{n}\\frac{1}{r} + \\sum_{r=1}^{n}\\frac{1}{r+1}$, which involves harmonic series and has no simple closed form.\n- Step 4: Robin's error: assuming that because partial fractions \"split up\" the term, telescoping automatically follows. The crucial check is: **do the partial fractions have opposite signs?** If both signs are the same, the method of differences does NOT apply. Only a *difference* can telescope; a *sum* accumulates.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "In the standard worked example $$\\sum_{r=1}^{n} \\frac{2}{(r+1)(r+3)} = \\frac{n(5n+13)}{6(n+2)(n+3)}$$, which four \"surviving\" fractions produce this result, and why does a factor of $$\\frac{1}{6}$$ appear? (3 steps)", "answer": "- Step 1: Partial fractions: $$\\frac{2}{(r+1)(r+3)} = \\frac{1}{r+1} - \\frac{1}{r+3}$$ — a stride-2 telescope. Surviving terms: $$f(1), f(2)$$ as leaders and $$-f(n+1), -f(n+2)$$ as trailers, where $$f(r) = \\frac{1}{r+1}$$.\n- Step 2: Evaluate boundaries: $$f(1) = \\tfrac{1}{2}$$, $$f(2) = \\tfrac{1}{3}$$, $$f(n+1) = \\frac{1}{n+2}$$, $$f(n+2) = \\frac{1}{n+3}$$. Sum: $$\\tfrac{1}{2} + \\tfrac{1}{3} - \\frac{1}{n+2} - \\frac{1}{n+3}$$.\n- Step 3: Combining the constant leaders: $$\\tfrac{1}{2} + \\tfrac{1}{3} = \\tfrac{5}{6}$$ — this is exactly where the 6 in the denominator of the closed form originates. The final common denominator $$6(n+2)(n+3)$$ then follows naturally.\n\nPattern recognition: the \"leading sum\" $$\\tfrac{1}{2} + \\tfrac{1}{3} = \\tfrac{5}{6}$$ dictates the form of the constants in the final closed expression.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "Contrast $$\\frac{1}{(r+1)(r+3)}$$ (gap-2 in $$r$$) with $$\\frac{1}{(2r+3)(2r+5)}$$ (gap-1 in $$r$$). Why do they differ, even though both have factors differing by 2? (3 steps)", "answer": "- Step 1: For $$\\frac{1}{(r+1)(r+3)}$$: coefficient of $$r$$ in each factor is 1. Shifting $$r \\to r+1$$ changes $$r+1$$ to $$r+2$$ and $$r+3$$ to $$r+4$$ — only bridges 1 of the needed 2 units. So $$f(r+2) = \\frac{1}{r+3}$$, giving gap-2.\n- Step 2: For $$\\frac{1}{(2r+3)(2r+5)}$$: coefficient of $$r$$ in each factor is 2. Shifting $$r \\to r+1$$ changes $$2r+3$$ to $$2r+5$$ directly — exactly what we need. So $$f(r+1) = \\frac{1}{2r+5}$$, giving gap-1.\n- Step 3: Rule: \"factor gap ÷ coefficient of $$r$$\" = the $$r$$-gap in $$f$$. Always compute $$f(r+1)$$ to verify.\n\nThis is why identical-looking problems can have very different telescoping structures.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "In the method of differences, we freely rearrange many $$u_r$$ terms to pair them up and cancel. Why is this legitimate? (2 steps)", "answer": "- Step 1: Finite sums are both commutative and associative: we can reorder or regroup terms without changing the sum's value.\n- Step 2: So rewriting $$u_1 + u_2 + \\cdots + u_n$$ as $$f(1) + [-f(2) + f(2)] + [-f(3) + f(3)] + \\cdots + [-f(n+1)]$$ and then cancelling bracketed pairs is just a reorganization — valid for any $$n$$.\n\nCaveat for intuition: this argument breaks for *infinite* series (where absolute convergence is needed). FP2 deals only with finite sums, so rearrangement is always safe.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "A student writes $$\\sum_{r=1}^{n} (f(r) - f(r+1)) = f(1) - f(n)$$. What's wrong, and why does this error matter? (2 steps)", "answer": "- Step 1: The last term of the sum is $$u_n = f(n) - f(n+1)$$. So the final unpaired negative value has index $$n+1$$, not $$n$$. The correct answer is $$f(1) - f(n+1)$$.\n- Step 2: The \"off-by-one\" is easy to make because the indexing feels asymmetric. Always explicitly write out $$u_n$$ and check what survives: \"the negative part of $$u_n$$ is $$-f(n+1)$$.\"\n\nThe cost: a boundary term is missed, so the final closed form is wrong in exactly the way that's hardest to spot by inspection.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "What happens to $$\\sum_{r=1}^{n} \\frac{1}{r(r+1)}$$ and $$\\sum_{r=1}^{n} \\frac{1}{4r^2-1}$$ as $n \\to \\infty$? What general principle determines whether a telescoping sum converges? (3 steps)", "answer": "- Step 1: For $\\sum \\frac{1}{r(r+1)} = 1 - \\frac{1}{n+1}$, as $n \\to \\infty$, $\\frac{1}{n+1} \\to 0$, so the sum converges to **1**.\n- Step 2: For $\\sum \\frac{1}{4r^2-1} = \\frac{n}{2n+1}$, as $n \\to \\infty$, $\\frac{n}{2n+1} \\to \\frac{1}{2}$, so the sum converges to **$\\frac{1}{2}$**.\n- Step 3: General principle: a telescoping sum $\\sum_{r=1}^{n}(f(r) - f(r+k))$ converges as $n \\to \\infty$ if and only if **$f(n) \\to 0$** as $n \\to \\infty$ (so the \"tail\" terms $f(n+1), \\ldots, f(n+k)$ all vanish). If $f(n)$ does not approach 0, the sum diverges.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "For the identity $$\\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2$$, which method (differences or induction) is \"discovery-like\" and which is \"verification-like\"? (3 steps)", "answer": "- Step 1: The method of differences is **discovery-like**: starting from an algebraic identity like $$4r^3 = r^2(r+1)^2 - (r-1)^2 r^2$$, summing both sides, and telescoping produces the closed form $$\\tfrac{1}{4}n^2(n+1)^2$$ — you didn't need to guess the answer in advance.\n- Step 2: Induction is **verification-like**: you must know (or guess) the closed form first, then verify it holds for $$n=1$$ and that it propagates from $$n$$ to $$n+1$$.\n- Step 3: Exam question phrasing steers you: \"show that $$u_r \\equiv \\ldots$$ and hence deduce...\" → differences (constructive); \"prove by induction that $$\\sum = \\ldots$$\" → induction. Either is usually acceptable unless specified.\n\nDifferences constructs, induction confirms — they're complementary sides of the proof toolbox.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "When partial-fractioning, why must you carefully track the sign of each coefficient? Give an example of what can go wrong. (3 steps)", "answer": "- Step 1: Solving $$\\frac{2}{(r+1)(r+3)} = \\frac{A}{r+1} + \\frac{B}{r+3}$$ by cover-up: $$r=-1$$ gives $$2 = 2A$$ so $$A=1$$; $$r=-3$$ gives $$2 = -2B$$ so $$B=-1$$.\n- Step 2: The decomposition is $$\\frac{1}{r+1} - \\frac{1}{r+3}$$ — a signed difference. If you mistakenly write $$+\\frac{1}{r+3}$$, you get a sum, not a telescoping form.\n- Step 3: Sanity check by recombining: $$\\frac{(r+3) - (r+1)}{(r+1)(r+3)} = \\frac{2}{(r+1)(r+3)}$$ ✓. If recombining doesn't match the original, a sign is wrong.\n\nAlways verify by recombining — it catches sign errors that can derail the whole problem.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Before attempting the method of differences on a series, what two key checks should you make? (2 steps)", "answer": "- Step 1: **Check that the partial fractions have opposite signs.** After decomposing $u_r$, verify you have something like $\\frac{A}{g(r)} - \\frac{B}{g(r+k)}$, not $\\frac{A}{g(r)} + \\frac{B}{g(r+k)}$. Same-sign partial fractions do NOT telescope — they accumulate. If both signs are positive, the method of differences does not apply directly.\n- Step 2: **Check the gap $k$ to determine how many terms survive.** If $u_r = f(r) - f(r+k)$, then exactly $k$ terms survive at the start and $k$ terms at the end. Write out at least $k+1$ terms at the beginning and $k$ terms at the end to correctly identify all survivors.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "How does the method of differences compare to mathematical induction as a proof technique for sum identities? (3 steps)", "answer": "- Step 1: Both methods can prove identities like $$\\sum_{r=1}^{n} r^3 = \\tfrac{1}{4} n^2(n+1)^2$$. The method of differences DERIVES the formula constructively from a given identity; induction VERIFIES a pre-known formula by base case + induction step.\n- Step 2: Induction requires you to *already know* the answer to check. The method of differences can build the closed form from scratch if you can spot or are given the right difference structure.\n- Step 3: Exam-phrasing cues: \"show that $$u_r \\equiv \\ldots$$\" hints at differences (constructive); \"prove that $$\\sum u_r = \\ldots$$\" is neutral (induction is the default \"prove it\" hammer, but differences also works).\n\nBig picture: induction proves, differences derive. They're complementary tools.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "For $$\\sum_{r=1}^{n} \\frac{4}{(4r-1)(4r+3)}$$, the method gives $$\\frac{4n}{3(4n+3)}$$. Conceptually, why does the answer take this specific shape rather than having an additive constant? (3 steps)", "answer": "- Step 1: Partial fractions: $$\\frac{4}{(4r-1)(4r+3)} = \\frac{1}{4r-1} - \\frac{1}{4r+3}$$ (the numerator $$4$$ equals $$(4r+3)-(4r-1)$$, which makes the constants work out cleanly).\n- Step 2: With $$f(r) = \\frac{1}{4r-1}$$, we have $$f(r+1) = \\frac{1}{4(r+1)-1} = \\frac{1}{4r+3}$$, so this is a stride-1 telescope. The sum is $$f(1) - f(n+1) = \\frac{1}{3} - \\frac{1}{4n+3}$$.\n- Step 3: Combining over a common denominator: $$\\frac{(4n+3) - 3}{3(4n+3)} = \\frac{4n}{3(4n+3)}$$. The \"$$\\tfrac{1}{3}$$\" from $$f(1)$$ absorbs into the combined fraction cleanly — it doesn't remain as a separate additive constant.\n\nPattern: $$f(1)$$ and the trailing term almost always combine cleanly via a common denominator into a single compact fraction.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "Qualitatively, describe how $$\\sum_{r=1}^{n} \\frac{4}{(4r-1)(4r+3)} = \\frac{4n}{3(4n+3)}$$ behaves as $$n \\to \\infty$$ and reconcile this with the telescoping boundary terms. (3 steps)", "answer": "- Step 1: For large $$n$$: numerator $$\\sim 4n$$, denominator $$\\sim 12n$$. Ratio $$\\to \\frac{4}{12} = \\frac{1}{3}$$.\n- Step 2: From telescoping: the summand is $$\\frac{1}{(4r-1)(4r+3)} = \\frac{1}{4}\\left(\\frac{1}{4r-1} - \\frac{1}{4r+3}\\right)$$, so $$\\frac{4}{(4r-1)(4r+3)} = f(r) - f(r+1)$$ with $$f(r) = \\frac{1}{4r-1}$$ (gap-1). Boundary: $$f(1) = \\frac{1}{3}$$ and $$f(n+1) \\to 0$$.\n- Step 3: Infinite sum equals $$f(1) = \\frac{1}{3}$$, matching the asymptotic behavior. ✓\n\nCross-check: the limit of the closed form must equal $$f(1)$$ for a gap-1 telescope with vanishing end.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "If $u_r = f(r) - f(r+1)$, derive an expression for $$\\sum_{r=1}^{n} u_r$$ by writing out terms and showing the cancellation pattern. (4 steps)", "answer": "- Step 1: Substitute $r = 1, 2, 3, \\ldots, n$ into $u_r = f(r) - f(r+1)$:\n$$u_1 = f(1) - f(2),\\quad u_2 = f(2) - f(3),\\quad u_3 = f(3) - f(4),\\quad \\ldots,\\quad u_n = f(n) - f(n+1)$$\n- Step 2: Add all terms:\n$$\\sum_{r=1}^{n} u_r = f(1) - f(2) + f(2) - f(3) + f(3) - f(4) + \\cdots + f(n) - f(n+1)$$\n- Step 3: Observe the cancellation: each $-f(k)$ for $k = 2, 3, \\ldots, n$ is immediately matched by $+f(k)$ from the previous term. Every intermediate value cancels completely. The only terms without partners are the very first positive term $f(1)$ and the very last negative term $-f(n+1)$.\n- Step 4: The sum collapses to:\n$$\\sum_{r=1}^{n}(f(r) - f(r+1)) = f(1) - f(n+1)$$\n\nAn entire sum of $n$ terms reduces to evaluating $f$ at just two points — this is the power of telescoping.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "A student sees $$\\sum_{r=1}^{n}(2r+1)$$ and thinks \"this isn't a difference — the method of differences doesn't apply.\" Is the student right? (3 steps)", "answer": "- Step 1: The student's instinct is partly correct: $$2r+1$$ is a single expression, not visibly a difference of two $$f$$-values.\n- Step 2: But we can *look* for $$f$$ such that $$f(r+1) - f(r) = 2r+1$$. Try $$f(r) = r^2$$: then $$f(r+1) - f(r) = (r+1)^2 - r^2 = 2r+1$$. ✓ So yes, the method does apply.\n- Step 3: Applying: $$\\sum(2r+1) = f(n+1) - f(1) = (n+1)^2 - 1 = n^2 + 2n$$ — the familiar arithmetic-series result in disguise.\n\nTakeaway: telescoping isn't magic — it still needs the right $$f$$, but many more series admit it than you'd first think.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "A student tries to use method of differences on $$\\sum_{r=1}^{n} \\frac{1}{r^2}$$. What's the obstacle, and why doesn't the method resolve this famous sum? (3 steps)", "answer": "- Step 1: To apply method of differences, we'd need to find $$f$$ such that $$\\frac{1}{r^2} = f(r) - f(r+1)$$. No elementary closed-form $$f$$ satisfies this.\n- Step 2: The sum $$\\sum \\frac{1}{r^2}$$ (the Basel problem) does have a closed form as $$n \\to \\infty$$: $$\\frac{\\pi^2}{6}$$. But this is derived by entirely different methods (Fourier analysis, complex integration, etc.), not telescoping.\n- Step 3: Moral: not every series with an algebraic-looking general term is telescopeable. Method of differences works when the algebraic structure cooperates — which isn't guaranteed.\n\nLesson in humility: telescoping is powerful but not universal. Many famous sums require other tools.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "Define the forward difference operator $$\\Delta f(r) = f(r+1) - f(r)$$. What does the method of differences say in this notation, and how does it parallel the fundamental theorem of calculus? (3 steps)", "answer": "- Step 1: Method of differences: if $$u_r = \\Delta f(r)$$, then $$\\sum_{r=1}^{n} u_r = f(n+1) - f(1)$$.\n- Step 2: Calculus parallel: if $$u(x) = F'(x)$$, then $$\\int_a^b u\\, dx = F(b) - F(a)$$. Exactly the same structure: sum/integral of \"derivative\" recovers boundary values of the antiderivative.\n- Step 3: So $$\\Delta$$ plays the role of differentiation, and \"finding $$f$$ such that $$\\Delta f = u$$\" plays the role of antidifferentiation. Method of differences is discrete integration.\n\nThis lens makes the entire method feel natural — it's calculus for sequences.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Summarise in a clean checklist: what are the steps to solve a typical \"find the sum using the method of differences\" exam question? (5 steps)", "answer": "- Step 1: Identify the structure of $$u_r$$. Product of linear factors in denominator $$\\Rightarrow$$ partial fractions. Polynomial $$\\Rightarrow$$ look for an algebraic identity.\n- Step 2: Rewrite $$u_r$$ in the form $$f(r) - f(r+k)$$ for some stride $$k \\geq 1$$. Verify by combining the right side back to $$u_r$$.\n- Step 3: Write out the first few terms ($$r=1, 2, 3$$) and the last few ($$r=n-1, n$$), cancelling visibly in pencil.\n- Step 4: Identify the $$k$$ surviving leading terms ($$f(1), \\ldots, f(k)$$) and the $$k$$ surviving trailing terms ($$-f(n+1), \\ldots, -f(n+k)$$). Sum them.\n- Step 5: Combine over a common denominator, simplify, and perform an $$n=1$$ sanity check.\n\nBonus: if the sum starts from $$r=a > 1$$, compute $$S_b - S_{a-1}$$ using the closed form.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Before plugging an identity like $$4r^3 \\equiv r^2(r+1)^2 - (r-1)^2 r^2$$ into a telescoping proof, why should you verify it by algebraic expansion? (3 steps)", "answer": "- Step 1: If the identity has a sign error or a typo, the telescoping will produce a wrong closed form — and the error can be silent, hard to spot later.\n- Step 2: Expansion: $$r^2(r+1)^2 = r^4 + 2r^3 + r^2$$; $$(r-1)^2 r^2 = r^4 - 2r^3 + r^2$$; subtracting: $$4r^3$$. ✓\n- Step 3: Verification takes only a few lines of algebra but catches mistakes that would invalidate the entire proof. Always do it, especially in exam settings.\n\nBonus: expansion also shows *why* the identity works — revealing structure rather than just rote substitution.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "The expression $4r^2 - 1$ can be factored using a specific algebraic identity. What identity is used, and what are the resulting factors? (2 steps)", "answer": "- Step 1: Recognize that $4r^2 - 1$ has the form $a^2 - b^2$ where $a = 2r$ and $b = 1$. This is the **difference of two squares**: $a^2 - b^2 = (a-b)(a+b)$.\n- Step 2: Applying this: $4r^2 - 1 = (2r)^2 - 1^2 = (2r-1)(2r+1)$. This factorization is essential because it reveals the two linear factors needed for partial fractions, which then expose the telescoping pattern in $\\frac{1}{4r^2-1}$. Many method-of-differences problems require you to spot this factorization first.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "Show why $$\\frac{1}{r(r+1)} = \\frac{1}{r} - \\frac{1}{r+1}$$ and explain why this is the prototypical telescoping example. (3 steps)", "answer": "- Step 1: Verify: $$\\frac{1}{r} - \\frac{1}{r+1} = \\frac{(r+1) - r}{r(r+1)} = \\frac{1}{r(r+1)}$$. ✓\n- Step 2: This has exact form $$f(r) - f(r+1)$$ with $$f(r) = \\frac{1}{r}$$, so $$\\sum_{r=1}^{n} \\frac{1}{r(r+1)}$$ telescopes to $$f(1) - f(n+1) = 1 - \\frac{1}{n+1} = \\frac{n}{n+1}$$.\n- Step 3: It's prototypical because the product $$r(r+1)$$ sits exactly \"between\" consecutive integers, and differences of reciprocals of consecutive integers naturally have that product downstairs.\n\nAs $$n \\to \\infty$$, the sum approaches 1 — a famous elementary convergence.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "Given the identity $$(r+1)^3 - (r-1)^3 = 6r^2 + 2$$, why is the coefficient \"6\" on the right side the key ingredient that unlocks the formula for $$\\sum r^2$$? (3 steps)", "answer": "- Step 1: The left side $$(r+1)^3 - (r-1)^3$$ telescopes when summed — it's $$g(r+1) - g(r-1)$$ with $$g(r) = r^3$$, so summing gives a computable closed value.\n- Step 2: The right side $$6r^2 + 2$$ contains $$\\sum r^2$$ (scaled by 6) plus the trivial $$\\sum 2 = 2n$$. So the equation becomes $$(\\text{telescoping value}) = 6\\sum r^2 + 2n$$.\n- Step 3: The \"6\" is the crucial bridge: it lets you isolate $$\\sum r^2$$ by dividing both sides, giving $$\\sum r^2 = \\frac{(\\text{telescoping value}) - 2n}{6}$$.\n\nBig idea: an identity is useful for method of differences when its left side telescopes AND its right side contains the target sum, up to easy extras.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "The identity $$(r+1)^2 - (r-1)^2 = 4r$$ allows you to derive $$\\sum_{r=1}^{n}((r+1)^2 - (r-1)^2)$$ by method of differences. What's the surviving form, and how does it connect to $$\\sum r$$? (4 steps)", "answer": "- Step 1: Let $$f(r) = (r-1)^2$$; then the summand is $$f(r+2) - f(r)$$, a gap-2 telescope.\n- Step 2: Sum from $$r=1$$ to $$n$$: survivors are $$f(n+1) + f(n+2) - f(1) - f(2) = n^2 + (n+1)^2 - 0 - 1 = 2n^2 + 2n = 2n(n+1)$$.\n- Step 3: But the LHS is also $$\\sum 4r = 4 \\sum r$$. So $$4 \\sum r = 2n(n+1)$$, giving $$\\sum_{r=1}^{n} r = \\frac{n(n+1)}{2}$$.\n- Step 4: Same Gauss formula, now arrived at via a gap-2 telescoping of squares — the method is flexible in how it reaches the same answer.\n\nDeeper point: any polynomial summation can be tackled with a suitable \"stride\" of differences.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "Given the identity $$\\frac{1}{r(r+1)(r+2)} = \\frac{1}{2r(r+1)} - \\frac{1}{2(r+1)(r+2)}$$, identify $f(r)$ and the gap, then find $$\\sum_{r=1}^{n} \\frac{1}{r(r+1)(r+2)}$$. (3 steps)", "answer": "- Step 1: Define $f(x) = \\frac{1}{2x(x+1)}$. Then $f(r) = \\frac{1}{2r(r+1)}$ and $f(r+1) = \\frac{1}{2(r+1)(r+2)}$. The identity is $f(r) - f(r+1)$ — gap 1, so one term survives at each end.\n- Step 2: Write out terms:\n$$r=1:\\ \\tfrac{1}{2 \\cdot 1 \\cdot 2} - \\tfrac{1}{2 \\cdot 2 \\cdot 3},\\quad r=2:\\ \\tfrac{1}{2 \\cdot 2 \\cdot 3} - \\tfrac{1}{2 \\cdot 3 \\cdot 4},\\quad \\ldots,\\quad r=n:\\ \\tfrac{1}{2n(n+1)} - \\tfrac{1}{2(n+1)(n+2)}$$\n- Step 3: Telescoping gives:\n$$\\sum_{r=1}^{n} \\frac{1}{r(r+1)(r+2)} = f(1) - f(n+1) = \\frac{1}{4} - \\frac{1}{2(n+1)(n+2)} = \\frac{n(n+3)}{4(n+1)(n+2)}$$\n\nThe key insight: even though the original fraction has **three** linear factors in the denominator, it still telescopes with gap 1 because $f(r)$ itself contains a product of two factors.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "When $$u_r = \\mathrm{f}(r) - \\mathrm{f}(r+1)$$, the sum $$\\sum_{r=1}^{n} u_r = \\mathrm{f}(1) - \\mathrm{f}(n+1)$$. If instead $$u_r = \\mathrm{f}(r+1) - \\mathrm{f}(r)$$, what is the sum, and why does the sign flip? (2 steps)", "answer": "- Step 1: Write out the terms for $$u_r = \\mathrm{f}(r+1) - \\mathrm{f}(r)$$:\n$$u_1 = \\mathrm{f}(2) - \\mathrm{f}(1), \\quad u_2 = \\mathrm{f}(3) - \\mathrm{f}(2), \\quad u_3 = \\mathrm{f}(4) - \\mathrm{f}(3), \\ldots, u_n = \\mathrm{f}(n+1) - \\mathrm{f}(n)$$\nNow the cancellation pattern is reversed: each $$\\mathrm{f}(k)$$ for $$k = 2, \\ldots, n$$ appears as $$+\\mathrm{f}(k)$$ in one term and $$-\\mathrm{f}(k)$$ in the adjacent term, so they still cancel.\n- Step 2: The unpaired endpoints are now $$\\mathrm{f}(n+1)$$ (positive, from the last term) and $$\\mathrm{f}(1)$$ (negative, from the first term), giving:\n$$\\sum_{r=1}^{n} u_r = \\mathrm{f}(n+1) - \\mathrm{f}(1)$$\nThe sign flips because swapping the order of the difference reverses every term: $$\\mathrm{f}(r+1) - \\mathrm{f}(r) = -(\\mathrm{f}(r) - \\mathrm{f}(r+1))$$, so the entire sum changes sign. Both forms are correct; choose whichever matches your decomposition.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "Why does the closed form for a method-of-differences sum typically look like \"a fixed constant minus something that depends on $$n$$\"? (3 steps)", "answer": "- Step 1: The structure $$\\sum_{r=1}^{n} u_r = f(1) - f(n+1)$$ has two parts: $$f(1)$$ (independent of $$n$$) and $$-f(n+1)$$ (depends on $$n$$).\n- Step 2: $$f(1)$$ is a fixed constant — it represents \"how much accumulated at the starting boundary.\" $$-f(n+1)$$ represents \"what hasn't yet cancelled out at the upper boundary,\" which changes as $$n$$ grows.\n- Step 3: Often $$f(n+1) \\to 0$$ as $$n \\to \\infty$$ (e.g., $$\\frac{1}{n+1}, \\frac{1}{(n+1)!}$$). In that case the infinite sum equals $$f(1)$$ exactly — a striking fact that telescoping makes transparent.\n\nTakeaway: the form \"constant − vanishing term\" is diagnostic of a telescoping origin.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [], "count": 0}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "What is the method of differences, and what form must the general term of a series take for this method to apply?", "answer": "The method of differences is a technique for summing finite series by exploiting cancellation. It applies when the general term $u_r$ can be written as a **difference of two function values at offset arguments**, such as $u_r = f(r) - f(r+1)$ or $u_r = f(r) - f(r+k)$. When you sum these terms from $r=1$ to $n$, the intermediate values of $f$ cancel in a chain (each $-f(k)$ is matched by a $+f(k)$ from an adjacent term), collapsing the entire sum down to just a few surviving terms at the start and end. This converts a difficult summation into a simple evaluation of $f$ at specific points.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "If $u_r = f(r) - f(r+1)$, derive an expression for $$\\sum_{r=1}^{n} u_r$$ by writing out terms and showing the cancellation pattern. (4 steps)", "answer": "- Step 1: Substitute $r = 1, 2, 3, \\ldots, n$ into $u_r = f(r) - f(r+1)$:\n$$u_1 = f(1) - f(2),\\quad u_2 = f(2) - f(3),\\quad u_3 = f(3) - f(4),\\quad \\ldots,\\quad u_n = f(n) - f(n+1)$$\n- Step 2: Add all terms:\n$$\\sum_{r=1}^{n} u_r = f(1) - f(2) + f(2) - f(3) + f(3) - f(4) + \\cdots + f(n) - f(n+1)$$\n- Step 3: Observe the cancellation: each $-f(k)$ for $k = 2, 3, \\ldots, n$ is immediately matched by $+f(k)$ from the previous term. Every intermediate value cancels completely. The only terms without partners are the very first positive term $f(1)$ and the very last negative term $-f(n+1)$.\n- Step 4: The sum collapses to:\n$$\\sum_{r=1}^{n}(f(r) - f(r+1)) = f(1) - f(n+1)$$\n\nAn entire sum of $n$ terms reduces to evaluating $f$ at just two points — this is the power of telescoping.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "If $u_r = f(r+1) - f(r)$, what is $$\\sum_{r=1}^{n} u_r$$? Derive this by writing out the terms. (2 steps)", "answer": "- Step 1: Write out the sum:\n$$\\sum_{r=1}^{n}(f(r+1) - f(r)) = (f(2)-f(1)) + (f(3)-f(2)) + (f(4)-f(3)) + \\cdots + (f(n+1)-f(n))$$\n- Step 2: All intermediate terms cancel ($+f(2)$ cancels $-f(2)$, $+f(3)$ cancels $-f(3)$, etc.), leaving only the last positive term and the first negative term:\n$$\\sum_{r=1}^{n}(f(r+1) - f(r)) = f(n+1) - f(1)$$\n\nNotice this is the **negative** of the result from $u_r = f(r) - f(r+1)$. The sign pattern in the original expression determines which end contributes the positive surviving term and which contributes the negative.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Why is the method of differences also called \"telescoping\"? What is the visual analogy that helps you remember which terms survive?", "answer": "The name comes from the analogy of a telescoping tube (like a pirate's telescope or a radio antenna). When extended, each segment is visible; when you push it closed, every middle segment slides inside its neighbor and disappears — you're left with just the outermost shell and the innermost core. In the sum $f(1) - f(2) + f(2) - f(3) + f(3) - f(4) + \\cdots + f(n) - f(n+1)$, each pair $-f(k) + f(k)$ collapses like a tube segment sliding into its neighbor. The entire chain \"telescopes down\" to just $f(1) - f(n+1)$. The rule to remember: **the first positive term and the last negative term always survive** — they're the \"outer shell\" and \"inner core\" of the collapsed tube.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "If $u_r = f(r) - f(r+2)$, write out the terms for $r = 1, 2, 3, \\ldots, n$ and determine which terms survive after cancellation. (4 steps)", "answer": "- Step 1: Write out each term:\n$$r=1:\\ f(1) - f(3),\\quad r=2:\\ f(2) - f(4),\\quad r=3:\\ f(3) - f(5),\\quad r=4:\\ f(4) - f(6),\\quad \\ldots,\\quad r=n:\\ f(n) - f(n+2)$$\n- Step 2: Collect all positive terms: $f(1), f(2), f(3), f(4), \\ldots, f(n)$. Collect all negative terms: $-f(3), -f(4), -f(5), -f(6), \\ldots, -f(n+2)$.\n- Step 3: The overlap (which cancels) runs from $f(3)$ to $f(n)$. The positive terms $f(1)$ and $f(2)$ have no matching negatives. The negative terms $-f(n+1)$ and $-f(n+2)$ have no matching positives.\n- Step 4: Therefore:\n$$\\sum_{r=1}^{n}(f(r) - f(r+2)) = f(1) + f(2) - f(n+1) - f(n+2)$$\n\nWith a gap of $k=2$, exactly **two** terms survive at each end. This is the \"higher-order differences\" case.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "For $u_r = f(r) - f(r+k)$ where $k$ is a positive integer, how many terms survive at each end after telescoping? State the general result. (2 steps)", "answer": "- Step 1: The positive terms are $f(1), f(2), \\ldots, f(n)$ and the negative terms are $-f(k+1), -f(k+2), \\ldots, -f(n+k)$. The overlap (which cancels) runs from $f(k+1)$ to $f(n)$. The uncancelled positive terms are $f(1)$ through $f(k)$, and the uncancelled negative terms are $-f(n+1)$ through $-f(n+k)$.\n- Step 2: Therefore:\n$$\\sum_{r=1}^{n}(f(r) - f(r+k)) = \\sum_{j=1}^{k} f(j) - \\sum_{j=1}^{k} f(n+j)$$\n\n**Exactly $k$ terms survive at the start and $k$ terms at the end.** For $k=1$: $f(1) - f(n+1)$. For $k=2$: $f(1) + f(2) - f(n+1) - f(n+2)$. For $k=3$: three terms at each end, and so on.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "Why are partial fractions often a necessary first step before applying the method of differences? (2 steps)", "answer": "- Step 1: The method of differences requires $u_r$ to be expressed as a **difference** $f(r) - f(r+k)$. However, many series have general terms given as single compound fractions like $\\frac{1}{r(r+1)}$ or $\\frac{2}{(r+1)(r+3)}$, which are not in difference form. The telescoping structure is hidden inside these fractions.\n- Step 2: Partial fractions decompose these into sums of simpler fractions with offset denominators. For example, $\\frac{1}{r(r+1)}$ splits into $\\frac{1}{r} - \\frac{1}{r+1}$, which is immediately $f(r) - f(r+1)$ with $f(x) = \\frac{1}{x}$. Without this decomposition step, the telescoping pattern remains invisible and the method cannot be applied.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Express $$\\frac{1}{r(r+1)}$$ in partial fractions and explain why the resulting form is suitable for the method of differences. (3 steps)", "answer": "- Step 1: Set up: $\\frac{1}{r(r+1)} = \\frac{A}{r} + \\frac{B}{r+1}$. Multiply through by $r(r+1)$: $1 = A(r+1) + Br$.\n- Step 2: Substitute convenient values. Let $r = 0$: $1 = A$, so $A = 1$. Let $r = -1$: $1 = B(-1)$, so $B = -1$.\n- Step 3: Therefore $\\frac{1}{r(r+1)} = \\frac{1}{r} - \\frac{1}{r+1}$. This is exactly $f(r) - f(r+1)$ where $f(x) = \\frac{1}{x}$, with **opposite signs** and a gap of 1 — perfect for telescoping. The partial fraction decomposition has revealed the hidden difference structure.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "The expression $4r^2 - 1$ can be factored using a specific algebraic identity. What identity is used, and what are the resulting factors? (2 steps)", "answer": "- Step 1: Recognize that $4r^2 - 1$ has the form $a^2 - b^2$ where $a = 2r$ and $b = 1$. This is the **difference of two squares**: $a^2 - b^2 = (a-b)(a+b)$.\n- Step 2: Applying this: $4r^2 - 1 = (2r)^2 - 1^2 = (2r-1)(2r+1)$. This factorization is essential because it reveals the two linear factors needed for partial fractions, which then expose the telescoping pattern in $\\frac{1}{4r^2-1}$. Many method-of-differences problems require you to spot this factorization first.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "Express $$\\frac{1}{4r^2-1}$$ in partial fractions and show that the result is a difference of the form $f(r) - f(r+1)$. (4 steps)", "answer": "- Step 1: Using $4r^2 - 1 = (2r-1)(2r+1)$, set up: $\\frac{1}{(2r-1)(2r+1)} = \\frac{A}{2r-1} + \\frac{B}{2r+1}$.\n- Step 2: Multiply through: $1 = A(2r+1) + B(2r-1)$.\n- Step 3: Substitute values. Let $r = \\frac{1}{2}$: $1 = 2A$, so $A = \\frac{1}{2}$. Let $r = -\\frac{1}{2}$: $1 = -2B$, so $B = -\\frac{1}{2}$.\n- Step 4: Therefore $\\frac{1}{4r^2-1} = \\frac{1}{2}\\!\\left(\\frac{1}{2r-1} - \\frac{1}{2r+1}\\right)$. Define $f(x) = \\frac{1}{2x-1}$; then $f(r) = \\frac{1}{2r-1}$ and $f(r+1) = \\frac{1}{2(r+1)-1} = \\frac{1}{2r+1}$. So this is $\\frac{1}{2}(f(r) - f(r+1))$ — a standard telescoping form, just with an extra constant factor of $\\frac{1}{2}$ out front.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Using the method of differences, find $$\\sum_{r=1}^{n} \\frac{1}{r(r+1)}$$. (4 steps)", "answer": "- Step 1: From partial fractions, $\\frac{1}{r(r+1)} = \\frac{1}{r} - \\frac{1}{r+1}$, which is $f(r) - f(r+1)$ with $f(x) = \\frac{1}{x}$.\n- Step 2: Write out the terms:\n$$r=1:\\ \\tfrac{1}{1} - \\tfrac{1}{2},\\quad r=2:\\ \\tfrac{1}{2} - \\tfrac{1}{3},\\quad r=3:\\ \\tfrac{1}{3} - \\tfrac{1}{4},\\quad \\ldots,\\quad r=n:\\ \\tfrac{1}{n} - \\tfrac{1}{n+1}$$\n- Step 3: All intermediate terms cancel ($-\\frac{1}{2}$ cancels $+\\frac{1}{2}$, etc.), leaving only the first and last:\n$$\\sum_{r=1}^{n} \\frac{1}{r(r+1)} = 1 - \\frac{1}{n+1}$$\n- Step 4: Simplify: $1 - \\frac{1}{n+1} = \\frac{n+1-1}{n+1} = \\frac{n}{n+1}$.\n\nThe sum of $n$ terms is $\\frac{n}{n+1}$ — it approaches 1 as $n \\to \\infty$ but never reaches it.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Using the method of differences, find $$\\sum_{r=1}^{n} \\frac{1}{4r^2-1}$$. (5 steps)", "answer": "- Step 1: From partial fractions, $\\frac{1}{4r^2-1} = \\frac{1}{2}\\!\\left(\\frac{1}{2r-1} - \\frac{1}{2r+1}\\right)$.\n- Step 2: Write out the terms (temporarily ignoring the $\\frac{1}{2}$ factor):\n$$r=1:\\ \\tfrac{1}{1} - \\tfrac{1}{3},\\quad r=2:\\ \\tfrac{1}{3} - \\tfrac{1}{5},\\quad r=3:\\ \\tfrac{1}{5} - \\tfrac{1}{7},\\quad \\ldots,\\quad r=n:\\ \\tfrac{1}{2n-1} - \\tfrac{1}{2n+1}$$\n- Step 3: All intermediate terms cancel ($-\\frac{1}{3}$ cancels $+\\frac{1}{3}$, etc.), leaving:\n$$\\sum_{r=1}^{n}\\!\\left(\\frac{1}{2r-1} - \\frac{1}{2r+1}\\right) = 1 - \\frac{1}{2n+1}$$\n- Step 4: Multiply back by the $\\frac{1}{2}$ factor:\n$$\\sum_{r=1}^{n} \\frac{1}{4r^2-1} = \\frac{1}{2}\\!\\left(1 - \\frac{1}{2n+1}\\right)$$\n- Step 5: Simplify: $\\frac{1}{2} \\cdot \\frac{2n+1-1}{2n+1} = \\frac{1}{2} \\cdot \\frac{2n}{2n+1} = \\frac{n}{2n+1}$.\n\nThe sum is $\\frac{n}{2n+1}$, which approaches $\\frac{1}{2}$ as $n \\to \\infty$.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Find $$\\sum_{r=1}^{n} \\frac{2}{(r+1)(r+3)}$$ using the method of differences. Why does this require the \"higher-order\" version of the method? (5 steps)", "answer": "- Step 1: Partial fractions give $\\frac{2}{(r+1)(r+3)} = \\frac{1}{r+1} - \\frac{1}{r+3}$. With $f(x) = \\frac{1}{x}$, this is $f(r+1) - f(r+3)$, a gap of **2** — hence \"higher-order.\"\n- Step 2: Write out the terms:\n$$r=1:\\ \\tfrac{1}{2} - \\tfrac{1}{4},\\quad r=2:\\ \\tfrac{1}{3} - \\tfrac{1}{5},\\quad r=3:\\ \\tfrac{1}{4} - \\tfrac{1}{6},\\quad r=4:\\ \\tfrac{1}{5} - \\tfrac{1}{7},\\quad \\ldots,\\quad r=n:\\ \\tfrac{1}{n+1} - \\tfrac{1}{n+3}$$\n- Step 3: Positive terms: $\\frac{1}{2}, \\frac{1}{3}, \\frac{1}{4}, \\frac{1}{5}, \\ldots, \\frac{1}{n+1}$. Negative terms: $\\frac{1}{4}, \\frac{1}{5}, \\frac{1}{6}, \\ldots, \\frac{1}{n+3}$. The overlap runs from $\\frac{1}{4}$ to $\\frac{1}{n+1}$ — all of these cancel.\n- Step 4: The two positive terms at the start ($\\frac{1}{2}$ and $\\frac{1}{3}$) and the two negative terms at the end ($-\\frac{1}{n+2}$ and $-\\frac{1}{n+3}$) survive:\n$$\\sum_{r=1}^{n} \\frac{2}{(r+1)(r+3)} = \\frac{1}{2} + \\frac{1}{3} - \\frac{1}{n+2} - \\frac{1}{n+3} = \\frac{5}{6} - \\frac{1}{n+2} - \\frac{1}{n+3}$$\n- Step 5: Combining over a common denominator $6(n+2)(n+3)$ and simplifying the numerator gives $\\frac{n(5n+13)}{6(n+2)(n+3)}$.\n\nWith gap $k=2$, exactly 2 terms survive at each end — confirming the general rule from Q6.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Given that $$\\sum_{r=1}^{n} u_r = S(n)$$ for some closed-form formula $S(n)$, how do you find $$\\sum_{r=a}^{b} u_r$$? (3 steps)", "answer": "- Step 1: The key insight: $\\sum_{r=a}^{b}$ means \"all terms from $r=a$ to $r=b$,\" which equals \"all terms from $r=1$ to $r=b$\" minus \"all terms from $r=1$ to $r=a-1$.\" The subtraction removes everything before $r=a$.\n- Step 2: In symbols:\n$$\\sum_{r=a}^{b} u_r = S(b) - S(a-1)$$\n+ For example, $\\sum_{r=21}^{30} u_r = S(30) - S(20)$.\n+ A common mistake is to write $S(b) - S(a)$, which incorrectly removes the $r=a$ term as well.\n- Step 3: This is far easier than re-applying the method of differences directly over the range $r=a$ to $r=b$. You simply substitute two values into $S(n)$ and subtract.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "Robin decomposes $$\\frac{2r+1}{r(r+1)}$$ into partial fractions as $$\\frac{1}{r} + \\frac{1}{r+1}$$, then attempts the method of differences, claiming the sum telescopes to $1 - \\frac{1}{n+1}$. What is fundamentally wrong with this reasoning? (4 steps)", "answer": "- Step 1: Robin's partial fractions are correct: $\\frac{2r+1}{r(r+1)} = \\frac{1}{r} + \\frac{1}{r+1}$. However, notice the signs — **both terms are positive**. This is $f(r) + f(r+1)$, not $f(r) - f(r+1)$.\n- Step 2: The method of differences requires **opposite signs** so that terms cancel when summed. With the same sign, terms **accumulate**. Writing out: $r=1$: $\\frac{1}{1} + \\frac{1}{2}$, $r=2$: $\\frac{1}{2} + \\frac{1}{3}$, $r=3$: $\\frac{1}{3} + \\frac{1}{4}$, etc.\n- Step 3: When added, $\\frac{1}{2}$ appears **twice** (positive from $r=1$ and positive from $r=2$), $\\frac{1}{3}$ appears twice, etc. Nothing cancels — every term adds. The sum is $\\sum_{r=1}^{n}\\frac{1}{r} + \\sum_{r=1}^{n}\\frac{1}{r+1}$, which involves harmonic series and has no simple closed form.\n- Step 4: Robin's error: assuming that because partial fractions \"split up\" the term, telescoping automatically follows. The crucial check is: **do the partial fractions have opposite signs?** If both signs are the same, the method of differences does NOT apply. Only a *difference* can telescope; a *sum* accumulates.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "When applying the method of differences, why must you write out enough terms to clearly show which terms cancel? What specific risk arises when the gap $k > 1$? (2 steps)", "answer": "- Step 1: When $k=1$, the pattern is simple: every middle term cancels. But when $k > 1$, not every term cancels its immediate neighbor. For example, with $u_r = f(r) - f(r+2)$, the term $-f(3)$ (from $r=1$) is cancelled by $+f(3)$ (from $r=3$), but $+f(2)$ (from $r=2$) has no matching negative at all. If you only write $r=1$ and $r=n$, you might miss that $f(2)$ survives.\n- Step 2: By writing out at least $k+1$ terms at the start and $k$ terms at the end, you can see exactly which terms have matching partners and which don't. Exam mark schemes require clear evidence of the cancellation pattern — crossing out terms in pencil is recommended so they remain readable.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Verify the identity $4r^3 \\equiv r^2(r+1)^2 - (r-1)^2 r^2$ by expanding both sides. Why is this identity useful for summing $\\sum r^3$? (4 steps)", "answer": "- Step 1: Expand the first term on the right: $r^2(r+1)^2 = r^2(r^2 + 2r + 1) = r^4 + 2r^3 + r^2$.\n- Step 2: Expand the second term: $(r-1)^2 r^2 = (r^2 - 2r + 1)r^2 = r^4 - 2r^3 + r^2$.\n- Step 3: Subtract: $(r^4 + 2r^3 + r^2) - (r^4 - 2r^3 + r^2) = 4r^3$. ✓\n- Step 4: This identity is useful because the right side is $f(r) - f(r-1)$ where $f(x) = x^2(x+1)^2 = [x(x+1)]^2$. So $\\sum_{r=1}^{n} 4r^3 = \\sum_{r=1}^{n}(f(r) - f(r-1))$, which telescopes to $f(n) - f(0)$. This converts the hard sum $\\sum r^3$ into a simple evaluation.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "Using the identity $4r^3 = r^2(r+1)^2 - (r-1)^2 r^2$, derive $$\\sum_{r=1}^{n} r^3$$ by the method of differences. (4 steps)", "answer": "- Step 1: Let $f(x) = x^2(x+1)^2$. Then $4r^3 = f(r) - f(r-1)$, so $4\\sum_{r=1}^{n} r^3 = \\sum_{r=1}^{n}(f(r) - f(r-1))$.\n- Step 2: Write out the terms:\n$$r=1:\\ f(1) - f(0),\\quad r=2:\\ f(2) - f(1),\\quad r=3:\\ f(3) - f(2),\\quad \\ldots,\\quad r=n:\\ f(n) - f(n-1)$$\n- Step 3: All intermediate terms cancel, and $f(0) = 0^2(0+1)^2 = 0$, so:\n$$4\\sum_{r=1}^{n} r^3 = f(n) - f(0) = n^2(n+1)^2 - 0 = n^2(n+1)^2$$\n- Step 4: Divide by 4:\n$$\\sum_{r=1}^{n} r^3 = \\frac{1}{4}n^2(n+1)^2 = \\left[\\frac{n(n+1)}{2}\\right]^2$$\n\nThis is the famous formula for the sum of cubes — it equals the **square** of the sum of the first $n$ integers, a beautiful result.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "What happens to $$\\sum_{r=1}^{n} \\frac{1}{r(r+1)}$$ and $$\\sum_{r=1}^{n} \\frac{1}{4r^2-1}$$ as $n \\to \\infty$? What general principle determines whether a telescoping sum converges? (3 steps)", "answer": "- Step 1: For $\\sum \\frac{1}{r(r+1)} = 1 - \\frac{1}{n+1}$, as $n \\to \\infty$, $\\frac{1}{n+1} \\to 0$, so the sum converges to **1**.\n- Step 2: For $\\sum \\frac{1}{4r^2-1} = \\frac{n}{2n+1}$, as $n \\to \\infty$, $\\frac{n}{2n+1} \\to \\frac{1}{2}$, so the sum converges to **$\\frac{1}{2}$**.\n- Step 3: General principle: a telescoping sum $\\sum_{r=1}^{n}(f(r) - f(r+k))$ converges as $n \\to \\infty$ if and only if **$f(n) \\to 0$** as $n \\to \\infty$ (so the \"tail\" terms $f(n+1), \\ldots, f(n+k)$ all vanish). If $f(n)$ does not approach 0, the sum diverges.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "Given a closed-form formula $S(n)$ for $$\\sum_{r=1}^{n} u_r$$, explain the strategy for finding $$\\sum_{r=n}^{2n} u_r$$. What is the key identity, and what is
