g losses.\n\nHigh voltage means low current, and low current means drastically reduced $$I^2R$$ heating losses.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Walk through the sequence of transformers and voltage changes as electricity travels from a power station to a home in the National Grid. (3 steps)", "answer": "- Step 1: At the power station, a **step-up transformer** increases the voltage to a very high level (e.g., ≥ 132 kV) and decreases the current for transmission through the grid cables, minimizing $$I^2R$$ losses.\n- Step 2: The electricity travels at this high voltage / low current through the long-distance transmission lines.\n- Step 3: Before reaching homes/buildings, a **step-down transformer** decreases the voltage to a safe, usable level (e.g., 230 V in the UK) and increases the current for consumer use.\n\nStep-up for efficient travel, step-down for safe use.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "What is the purpose of the iron core in a transformer, and why is it specifically made of iron rather than being a permanent magnet? (2 steps)", "answer": "- Step 1: The iron core acts as a pathway to efficiently carry (guide) the changing magnetic field from the primary coil to the secondary coil. Iron is used because it is easily magnetized, meaning it can concentrate the field lines.\n- Step 2: It is NOT a permanent magnet. It must be able to magnetize and demagnetize rapidly with the changing a.c. field. A permanent magnet would provide a static field, which cannot induce a PD in the secondary coil.\n\nThe core links the fields; it must be easily magnetized/demagnetized, not permanently magnetic.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A primary coil has 10 turns and is supplied with 5 V a.c. The secondary coil has 50 turns. What is the induced PD in the secondary coil, and is this a step-up or step-down transformer? (3 steps)", "answer": "- Step 1: Use the turns ratio: $$\\frac{V_s}{V_p} = \\frac{n_s}{n_p}$$, which gives $$\\frac{V_s}{5} = \\frac{50}{10}$$.\n- Step 2: Simplify the ratio: $$\\frac{50}{10} = 5$$. So, $$V_s = 5 \\times 5 = 25 \\text{ V}$$.\n- Step 3: Since the secondary voltage (25 V) is greater than the primary voltage (5 V), and $$n_s > n_p$$, this is a **step-up** transformer.\n\nTurns ratio directly dictates the voltage ratio.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "An ideal transformer has a primary voltage of 20 V and a primary current of 2 A. The secondary voltage is 40 V. What is the secondary current, and what is the power in the secondary coil? (3 steps)", "answer": "- Step 1: For an ideal transformer, power in equals power out: $$V_p I_p = V_s I_s$$.\n- Step 2: Calculate input power: $$P_{in} = 20 \\text{ V} \\times 2 \\text{ A} = 40 \\text{ W}$$. Therefore, $$P_{out} = 40 \\text{ W}$$.\n- Step 3: Solve for secondary current: $$I_s = \\frac{P_{out}}{V_s} = \\frac{40 \\text{ W}}{40 \\text{ V}} = 1 \\text{ A}$$. The current steps down because the voltage stepped up.\n\nPower conservation links voltage and current inversely.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "A strong magnet is held completely stationary inside a coil so that the magnet is fully inside but not moving. A sensitive voltmeter is connected to the coil. What will the voltmeter read, and why? (2 steps)", "answer": "- Step 1: The voltmeter will read **zero**.\n- Step 2: Electromagnetic induction requires *relative motion* between the conductor and the magnetic field such that field lines are *cut*. Because the magnet is stationary, no field lines are being cut, so no PD is induced. The strength of the magnet does not matter if there is no motion.\n\nStatic fields don't induce PD; only changing fields or relative motion does.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "A student says \"A bigger magnet will induce a larger PD in a spinning coil.\" Why is this statement technically inaccurate, and what should they have said instead? (2 steps)", "answer": "- Step 1: The physical size of the magnet is not the determining factor; the **strength** of the magnetic field (field line density) is what matters.\n- Step 2: A physically large but weak magnet might induce a smaller PD than a small, powerful neodymium magnet, because the denser field lines of the strong magnet are cut at a greater rate. The correct phrasing is \"A **stronger** magnet will induce a larger PD.\"\n\nField strength (density of lines) dictates induction rate, not physical magnet size.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}], "count": 18}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What is the fundamental requirement for a potential difference (PD) to be induced in a conductor within a magnetic field, and what happens if this condition is not met? (3 steps)", "answer": "- Step 1: The conductor and the magnetic field must have relative motion such that the conductor is *cutting* the magnetic field lines.\n- Step 2: If there is no relative motion (e.g., a magnet sitting completely still inside a coil), or if the motion is perfectly parallel to the field lines so no lines are crossed, no PD is induced.\n- Step 3: This is why a stationary magnetic field or a conductor moving along the field lines yields zero induced PD—there is no change in the magnetic environment (flux) of the conductor, and induction requires a rate of change.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "How does the generator effect fundamentally differ from the motor effect in terms of their inputs and outputs? (2 steps)", "answer": "- Step 1: The motor effect requires an *existing* current supplied to a conductor in a magnetic field to produce a force (Input: Electrical current + Magnetic field → Output: Force/Motion).\n- Step 2: The generator effect requires *motion* of a conductor through a magnetic field to produce an induced PD (Input: Motion + Magnetic field → Output: Induced PD/Current). They are essentially inverse processes.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "If you want to increase the induced PD in a coil rotating in a magnetic field, how do increasing the speed of rotation and increasing the number of turns achieve this? (2 steps)", "answer": "- Step 1: Increasing speed means the coil cuts the magnetic field lines at a greater rate (more lines cut per second), which directly increases the induced PD.\n- Step 2: Increasing the number of turns means each turn contributes its own induced PD. Because the turns are in series, the total induced PD is the sum of all individual turns' contributions.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A student claims \"using a coil with more loops will increase the induced PD because there are more coils.\" What is the conceptual error in their phrasing, and how should it be corrected? (3 steps)", "answer": "- Step 1: The error is using the term \"more coils\" instead of \"more turns on a coil.\"\n- Step 2: A \"coil\" refers to the entire solenoid structure, while a \"turn\" refers to a single loop of wire within that coil. Adding a separate, disconnected coil does not automatically add the voltages together.\n- Step 3: The correct phrasing is that an increase in the number of *turns* on the same coil increases the induced PD, because the PDs from each loop add up in series.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "If a magnet is pushed N-pole first into a coil and the voltmeter deflects to the right, what two specific actions could the experimenter take to make the voltmeter deflect to the left, assuming the magnet is still moving? (2 steps)", "answer": "- Step 1: Reversing the direction of motion (pulling the magnet out instead of pushing it in) reverses the rate of change of flux, which reverses the direction of the induced PD.\n- Step 2: Alternatively, flipping the magnet so the opposite pole enters the coil first (e.g., S-pole instead of N-pole) reverses the direction of the magnetic field interaction, which also reverses the induced PD direction.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "Aside from speed and number of turns, how do increasing the area of the coil and using a stronger magnet affect the induced PD, and what is the shared underlying reason? (2 steps)", "answer": "- Step 1: Increasing the coil area increases the induced PD because a larger area sweeps through more field lines per second. Increasing the magnetic field strength (using a stronger magnet) increases the induced PD because denser field lines mean more lines are cut per second of motion.\n- Step 2: The shared underlying reason is that both changes increase the *rate at which field lines are cut*. Induction depends entirely on this rate of change, so anything that pushes more field lines through the coil per second will increase the induced PD.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "When a magnet is pushed N-pole first into a coil, the near end of the coil becomes a north pole. Conceptually, why must the coil repel the magnet, and what fundamental principle does this demonstrate? (2 steps)", "answer": "- Step 1: If the coil attracted the magnet, it would pull the magnet in faster, which would induce an even larger current, creating a stronger attraction, and would result in infinite acceleration—creating energy from nothing. The coil must repel the magnet to resist the change and require external work to be done.\n- Step 2: This demonstrates Lenz's law behavior, which is a consequence of the conservation of energy. The work done to push the magnet against the repulsive magnetic force is exactly what provides the energy for the induced current.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Both alternators and dynamos use a coil spinning in a magnetic field, yet one produces AC and the other DC. What specific component difference causes this divergence in output? (2 steps)", "answer": "- Step 1: An alternator uses **slip rings**, which are continuous metal rings maintaining the same connection between the spinning coil and the external circuit. As the coil rotates, the induced PD naturally reverses every half-turn, creating an alternating output.\n- Step 2: A dynamo uses a **split-ring commutator**, which is a ring split into two halves. Every half-turn, the connections to the external circuit swap, effectively rectifying the reversed current back into the same direction, creating a direct current output.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "If you were to view the output PD of an alternator and a dynamo on an oscilloscope as their coils rotate at the same speed, how would the visual traces differ, and why? (2 steps)", "answer": "- Step 1: The alternator trace would show a sine wave that swings both above and below the zero line (positive and negative regions). This is because the slip rings allow the induced PD to naturally reverse direction every half-turn.\n- Step 2: The dynamo trace would show a bumpy positive-only trace (varying from zero to a maximum, never crossing into negative). This is because the split-ring commutator swaps the connections every half-turn, flipping the negative half-cycles into positive ones so the current always leaves in the same direction.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "Despite being called a \"dynamo,\" a bicycle dynamo actually produces alternating current (a.c.). Why does it produce a.c. instead of d.c. like a conventional dynamo? (3 steps)", "answer": "- Step 1: A conventional dynamo spins a coil inside a fixed magnet and uses a split-ring commutator to produce d.c.\n- Step 2: A bicycle dynamo has a *fixed coil* and a *rotating magnet* driven by the wheel. As the magnet spins, its magnetic field direction continuously reverses relative to the fixed coil.\n- Step 3: Because there is no commutator to swap the connections, this continuously reversing magnetic field induces an alternating PD in the coil, resulting in a.c. output.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "A moving-coil microphone and a loudspeaker look structurally similar (coil, magnet, diaphragm/cone). Which physical effect does each device rely on to function, and what is the direction of energy conversion? (2 steps)", "answer": "- Step 1: A microphone relies on the **generator effect**. Sound waves move the diaphragm and attached coil, cutting the magnetic field lines and inducing an alternating current (Motion/Sound → Electrical signal).\n- Step 2: A loudspeaker relies on the **motor effect**. An alternating current flows through the coil, interacting with the permanent magnetic field to produce a force that vibrates the cone and creates sound (Electrical signal → Motion/Sound).", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Why does a transformer use an easily magnetised iron core instead of a permanent magnet, and why would the transformer fail to work if the core were made of wood? (2 steps)", "answer": "- Step 1: A permanent magnet provides a static magnetic field, but a transformer requires a *changing* magnetic field to induce a PD in the secondary coil. The iron core is not permanently magnetic; it magnetises and demagnetises in exact sync with the alternating current in the primary coil.\n- Step 2: Wood cannot be magnetised. If a wood core were used, the changing magnetic field from the primary coil would not be efficiently carried (linked) to the secondary coil. The iron core ensures the magnetic flux from the primary effectively reaches and cuts the secondary coil.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "A student connects a d.c. battery to the primary coil of a transformer and expects a continuous output from the secondary coil. What actually happens, and why? (2 steps)", "answer": "- Step 1: When the switch is first closed, there is a momentary change in current from zero to a steady value. This brief change creates a momentary changing magnetic field, which induces a brief spike of PD in the secondary coil.\n- Step 2: Once the d.c. current is steady, the magnetic field becomes constant. Because there is no *changing* magnetic field cutting the secondary coil, the induced PD drops to zero. Therefore, transformers do not work with steady d.c.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "In a step-up transformer, how do the number of turns and the current in the secondary coil compare to the primary coil, and why must this relationship hold? (2 steps)", "answer": "- Step 1: A step-up transformer increases PD, so it must have **more turns** on the secondary coil than the primary ($$n_s > n_p$$). Each turn adds a bit of PD, so more turns mean a higher total secondary PD.\n- Step 2: Because an ideal transformer conserves power ($$V_p I_p = V_s I_s$$), if the voltage steps up ($$V_s > V_p$$), the current must step down ($$I_s < I_p$$). You cannot get more power out than you put in, so a higher voltage forces a lower current.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "The transformer equation is $$\\frac{V_s}{V_p} = \\frac{n_s}{n_p}$$. Conceptually, why is the ratio of voltages exactly equal to the ratio of turns? (2 steps)", "answer": "- Step 1: The changing magnetic flux in the iron core links both coils equally. Each turn of wire on the core experiences the same rate of change of magnetic flux, and thus has the same induced PD per turn.\n- Step 2: The total PD across a coil is simply the PD per turn multiplied by the number of turns. Therefore, if the secondary has twice as many turns as the primary, it will have twice the total PD, making the ratio of PDs strictly equal to the ratio of turns.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "A transformer has 100 turns on its primary coil and 500 turns on its secondary coil. If the input PD is 20 V, what is the approximate output PD, and is this a step-up or step-down transformer? (2 steps)", "answer": "- Step 1: The turns ratio is $$\\frac{n_s}{n_p} = \\frac{500}{100} = 5$$. Since the voltage ratio equals the turns ratio, the output voltage is $$V_s = V_p \\times 5$$.\n- Step 2: $$V_s = 20 \\text{ V} \\times 5 = 100 \\text{ V}$$. Because the secondary PD is higher than the primary PD, and it has more turns, this is a step-up transformer.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "If an ideal transformer steps down the voltage from 200 V to 10 V, and the current in the secondary coil is 4 A, what is the current in the primary coil? Walk through the logic without complex algebra. (2 steps)", "answer": "- Step 1: The voltage has been stepped down by a factor of 20 (from 200 V to 10 V). For power to be conserved ($$P = VI$$), if voltage goes down by a factor of 20, current must go up by a factor of 20 to keep power the same.\n- Step 2: The primary current must be $$\\frac{1}{20}$$ of the secondary current. Since $$I_s = 4 \\text{ A}$$, the primary current $$I_p = \\frac{4}{20} = 0.2 \\text{ A}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "The National Grid transmits electrical power over long distances. Explain the chain of reasoning for why electricity is transmitted at very high voltages, starting from the equation for power loss in cables. (3 steps)", "answer": "- Step 1: The power lost as heat in transmission cables is due to resistance and is given by $$P_{\\text{loss}} = I^2 R$$. To minimize this loss, we must make the current $$I$$ as small as possible.\n- Step 2: The total power to be transmitted is given by $$P = IV$$. For a fixed amount of power, if we increase the voltage $$V$$, the current $$I$$ must decrease proportionally ($$I = \\frac{P}{V}$$).\n- Step 3: By using a step-up transformer to raise the voltage to hundreds of kilovolts, the current is drastically reduced. Because power loss depends on $$I^2$$, even halving the current quarters the power loss, making high-voltage transmission highly efficient.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "Where are step-up and step-down transformers located in the National Grid, and what is the specific purpose of each? (2 steps)", "answer": "- Step 1: A **step-up transformer** is located immediately after the power station. Its purpose is to raise the voltage (and lower the current) for the long-distance transmission lines to minimize $$I^2R$$ heating losses.\n- Step 2: **Step-down transformers** are located near consumers (homes, buildings) or inside device adapters. Their purpose is to lower the high transmission voltage back down to safe, usable levels (like 230 V in the UK) for domestic appliances.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "Transmission cable A carries a current of 100 A, while transmission cable B carries a current of 20 A. Both cables have the same resistance. How many times greater is the power loss in cable A compared to cable B? (2 steps)", "answer": "- Step 1: The power loss formula is $$P_{\\text{loss}} = I^2 R$$. Since resistance is the same for both cables, the ratio of power losses depends only on the square of the currents.\n- Step 2: The current ratio is $$\\frac{100}{20} = 5$$. Because power loss is proportional to the square of the current, the power loss ratio is $$5^2 = 25$$. Cable A loses 25 times more power than cable B.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "A transmission cable has a resistance of $$2 \\Omega$$ and carries a current of $$5 \\text{ A}$$. If the electricity is transmitted for 10 seconds, how much energy is dissipated as heat in the cable? (3 steps)", "answer": "- Step 1: First, find the power loss using $$P = I^2 R$$. The current is $$5 \\text{ A}$$ and resistance is $$2 \\Omega$$, so $$P = 5^2 \\times 2 = 25 \\times 2 = 50 \\text{ W}$$.\n- Step 2: Power is the rate of energy transfer ($$P = \\frac{E}{t}$$). To find the total energy lost, rearrange and multiply power by time: $$E = P \\times t$$.\n- Step 3: $$E = 50 \\text{ W} \\times 10 \\text{ s} = 500 \\text{ J}$$. Therefore, 500 Joules of energy are wasted as heat in the cable over the 10 seconds.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "A student takes a conventional d.c. dynamo and connects a battery to its output terminals instead of mechanically spinning the coil. What will happen, and what does this reveal about the underlying physics? (2 steps)", "answer": "- Step 1: A dynamo contains a coil in a magnetic field connected via a split-ring commutator. By supplying a d.c. current from a battery, the student is applying the motor effect, not the generator effect.\n- Step 2: The current-carrying coil will experience a force in the magnetic field (following Fleming's left-hand rule), causing it to spin. The device now functions as a d.c. electric motor, demonstrating that generators and motors are structurally identical but operate via inverse physical effects.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}], "count": 22}, "qwen_1": {"label": "Qwen 3 235B ①", "cards": [{"question": "What is electromagnetic induction (the generator effect), and what is the minimal condition required for it to occur? (3 steps)", "answer": "- Step 1: Electromagnetic induction is the process where a **potential difference (voltage)** is induced across a conductor when it moves through a magnetic field or when the magnetic field through it changes.  \n- Step 2: The **key condition** is **relative motion** between the conductor and the magnetic field such that the conductor \"cuts\" through magnetic field lines. If there’s no movement, no voltage is induced.  \n- Step 3: This differs from the motor effect, which occurs when a **current-carrying conductor** experiences a force in a magnetic field. The generator effect does NOT require an initial current.  \n\n**Takeaway:** Movement cuts field lines → induced PD (generator); current in field → force (motor).", "source": "Qwen 3 235B ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why does reversing the direction of a magnet’s motion or flipping its poles reverse the direction of the induced potential difference? (3 steps)", "answer": "- Step 1: The direction of the induced PD depends on **how the magnetic field lines are cut** (Fleming’s Right-Hand Rule).  \n- Step 2: Reversing motion or pole orientation changes the **direction of the rate of change of magnetic flux**, which flips the induced PD.  \n- Step 3: Example: A north pole inserted into a coil induces a PD; pulling it out reverses the direction. This aligns with Lenz’s Law — the induced field opposes the change causing it.  \n\n**Takeaway:** Direction of change → direction of PD; Lenz’s Law ensures opposition.", "source": "Qwen 3 235B ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How does a **step-up transformer** increase voltage, and why does this reduce current in the secondary coil? (4 steps)", "answer": "- Step 1: A step-up transformer has **more turns on the secondary coil** ($n_s > n_p$), so the turns ratio $\\frac{n_s}{n_p} > 1$.  \n- Step 2: The transformer equation $\\frac{V_s}{V_p} = \\frac{n_s}{n_p}$ means $V_s > V_p$. For example, doubling turns doubles voltage.  \n- Step 3: Assuming ideal efficiency ($V_p I_p = V_s I_s$), increasing $V_s$ forces $I_s$ to **decrease proportionally** ($I_s = \\frac{V_p}{V_s} I_p$).  \n- Step 4: This is why high-voltage transmission uses step-up transformers: lower current reduces $I^2R$ power losses.  \n\n**Takeaway:** More turns → higher voltage; conservation of energy ensures lower current.", "source": "Qwen 3 235B ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why won’t a transformer work with a direct current (d.c.) supply in the primary coil? (3 steps)", "answer": "- Step 1: Transformers rely on a **changing magnetic field** in the primary coil to induce a PD in the secondary.  \n- Step 2: d.c. creates a **steady current**, producing a constant magnetic field. No change in flux → no induction in the secondary coil.  \n- Step 3: Alternating current (a.c.) is required because it continuously reverses direction, creating a **varying magnetic field** that couples through the iron core.  \n\n**Takeaway:** No change in field → no induction; transformers need AC.", "source": "Qwen 3 235B ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Explain how a **split-ring commutator** in a dynamo ensures the output current always flows in one direction. (3 steps)", "answer": "- Step 1: In a rotating coil, the induced current reverses every half-turn (like an alternator).  \n- Step 2: The split-ring commutator **switches the connections** to the external circuit every half-turn, flipping the polarity of the output.  \n- Step 3: This ensures the current direction remains constant (d.c.), even though the induced PD in the coil alternates. The output is **pulsed d.c.**, varying from zero to max.  \n\n**Takeaway:** Commutator inverts connections → steady d.c. direction.", "source": "Qwen 3 235B ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does increasing the **number of turns** in a coil amplify the induced potential difference?", "answer": "Each turn of the coil contributes its own induced PD. When turns are connected in series, the total PD is the **sum of all individual contributions**. For example:  \n- A coil with 10 turns induces 0.1 V per turn → total PD = 1 V.  \n- Doubling turns to 20 → total PD doubles to 2 V.  \n\n**Takeaway:** More turns → more PD; additive effect of each turn’s contribution.", "source": "Qwen 3 235B ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How does a **moving-coil microphone** convert sound into an electrical signal? (3 steps)", "answer": "- Step 1: Sound waves vibrate a diaphragm attached to a coil of wire.  \n- Step 2: The coil moves within a permanent magnet’s field, cutting field lines → electromagnetic induction occurs.  \n- Step 3: The induced PD varies with the **vibration pattern** of the sound, producing an alternating current (a.c.) signal that mirrors the audio.  \n\n**Takeaway:** Sound → motion → induced a.c. (generator effect); reverse of a loudspeaker.", "source": "Qwen 3 235B ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is **high-voltage transmission** used in the National Grid, and how is this achieved? (4 steps)", "answer": "- Step 1: Power loss in cables is calculated as $P_{\\text{loss}} = I^2 R$. Lower current ($I$) reduces heating losses quadratically.  \n- Step 2: For fixed power ($P = IV$), increasing voltage ($V$) allows current ($I$) to decrease.  \n- Step 3: Step-up transformers at power stations raise voltage (e.g., to 400 kV) for efficient long-distance transmission.  \n- Step 4: Step-down transformers reduce voltage to 230 V for safe domestic use after transmission.  \n\n**Takeaway:** High $V$ → low $I$ → less loss; transformers enable this trade-off.", "source": "Qwen 3 235B ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What is the role of the **iron core** in a transformer, and why is it not a permanent magnet?", "answer": "- The iron core provides a **low-reluctance path** for magnetic field lines, concentrating the changing field from the primary to the secondary coil.  \n- It is **not a permanent magnet** because it must magnetize and demagnetize rapidly (e.g., 50 times per second for 50 Hz AC). A permanent magnet would resist this change, causing energy loss.  \n\n**Takeaway:** Easily magnetized/demagnetized → efficient field transfer; avoids energy loss.", "source": "Qwen 3 235B ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How does Lenz’s Law explain the **opposing magnetic field** created when a magnet moves into a coil? (3 steps)", "answer": "- Step 1: Lenz’s Law states the induced current creates a magnetic field that **opposes the change causing it**.  \n- Step 2: Pushing a north pole into a coil induces a current that makes the coil’s near end a north pole (repelling the magnet).  \n- Step 3: Pulling the magnet away induces a current that makes the coil’s near end a south pole (attracting the magnet back).  \n\n**Takeaway:** Opposition ensures conservation of energy; motion → induced field resists the motion.", "source": "Qwen 3 235B ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 235B ②", "cards": [{"question": "What is the fundamental condition required for electromagnetic induction to occur? Explain why this condition is necessary. (3 steps)", "answer": "- Step 1: A conductor and magnetic field must move relative to one another. This motion causes the conductor to \"cut\" magnetic field lines, which is essential for induction.\n- Step 2: The induced potential difference (PD) arises from the rate at which field lines are cut. Stationary systems (no relative motion) result in zero field lines being cut, so no PD is induced.\n+ Example: A magnet held still inside a coil creates no induced PD. Moving the magnet or coil generates the effect.\n- Step 3: This distinguishes EM induction (generator effect) from the motor effect, which requires an existing current. Induction creates current from motion without prior flow.\n\n[Takeaway: Relative motion = key to cutting field lines and causing induction.]", "source": "Qwen 3 235B ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How does increasing the number of turns in a coil affect the induced PD during electromagnetic induction? Explain the underlying principle. (2 steps)", "answer": "- Step 1: Each turn contributes independently to the total induced PD. Doubling the turns doubles the PD because each loop adds its own induction effect.\n+ Analogy: Imagine two flashlights shining on the same spot—their combined light is brighter than one alone.\n- Step 2: This follows Faraday’s Law of Induction: $$ \\mathcal{E} = -N \\frac{d\\Phi}{dt} $$, where $N$ is the number of turns and $\\frac{d\\Phi}{dt}$ is the rate of flux change.\n\n[Takeaway: More turns (N) → stronger EMF for same flux change.]", "source": "Qwen 3 235B ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why does a step-up transformer reduce current in the secondary coil while increasing voltage? Use power conservation to explain. (3 steps)", "answer": "- Step 1: In an ideal transformer, input power equals output power: $V_p I_p = V_s I_s$.\n- Step 2: If $V_s > V_p$ (step-up), then $I_s$ must be less than $I_p$ to keep power constant. For example, doubling $V$ halves $I$.\n+ Real-world case: Power stations step up voltage to reduce current, minimizing $I^2R$ losses in transmission lines.\n- Step 3: The iron core ensures efficient magnetic coupling between coils, but real transformers lose some energy as heat, so actual $V_s I_s < V_p I_p$.\n\n[Takeaway: Voltage and current change inversely to conserve energy.]", "source": "Qwen 3 235B ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why does a bicycle dynamo produce alternating current (AC) even though it resembles a DC dynamo in construction? (2 steps)", "answer": "- Step 1: A bicycle dynamo uses a rotating magnet *inside* a stationary coil, unlike a conventional dynamo with a rotating coil and split-ring commutator.\n- Step 2: As the magnet spins, its field direction alternates (N→S→N) relative to the coil, inducing a PD that reverses direction periodically. This naturally creates AC without requiring a commutator.\n\n[Takeaway: Changing magnetic polarity in the coil generates alternating current.]", "source": "Qwen 3 235B ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "What is the role of the iron core in a transformer, and why can’t a transformer work with direct current (DC)? (3 steps)", "answer": "- Step 1: The iron core provides a low-reluctance path for magnetic field lines, ensuring efficient transfer from primary to secondary coil.\n- Step 2: Transformers rely on a **changing** magnetic field to induce PD in the secondary coil. DC produces a steady field, so no induction occurs.\n+ Exception: A DC pulse (e.g., switching on/off) can cause brief induction, but sustained operation requires AC.\n- Step 3: During AC operation, the core magnetizes/demagnetizes rapidly, following the input current’s frequency. DC would cause saturation and no alternating field.\n\n[Takeaway: Iron core enhances field transfer; AC’s changing field is essential.]", "source": "Qwen 3 235B ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How does Lenz’s Law explain the direction of induced current in a coil when a magnet is pushed into it? (3 steps)", "answer": "- Step 1: Lenz’s Law states the induced current opposes the change causing it. This is a consequence of energy conservation.\n- Step 2: Pushing a magnet’s N-pole into a coil induces a current that creates a magnetic N-pole at the coil’s end, repelling the incoming magnet.\n+ Visual: Grab the coil with your right hand—induced current’s magnetic field direction follows the right-hand grip rule.\n- Step 3: Pulling the magnet out induces a S-pole at the coil’s end, attracting the receding magnet. This opposition explains energy conversion from mechanical motion to electrical energy.\n\n[Takeaway: Induced magnetic fields resist motion to prevent perpetual motion.]", "source": "Qwen 3 235B ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why is high-voltage transmission used in the National Grid? Explain the relationship between current, voltage, and power loss. (3 steps)", "answer": "- Step 1: Power transmitted: $P = IV$. For fixed $P$, increasing $V$ reduces $I$.\n- Step 2: Power loss in cables depends on $P_{loss} = I^2 R$. Halving $I$ quarters the loss, even if resistance $R$ remains constant.\n+ Example: Transmitting 1 MW at 100 A causes 100× more loss than at 10 A.\n- Step 3: Step-up transformers raise voltage (e.g., from 25 kV to 400 kV) before long-distance transmission. Step-down transformers then lower voltage for safe use.\n\n[Takeaway: High $V$ → low $I$ → minimal heat loss.]", "source": "Qwen 3 235B ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How does a moving-coil microphone convert sound waves into electrical signals? Compare it to a loudspeaker. (2 steps)", "answer": "- Step 1: Sound waves vibrate a diaphragm attached to a coil in a permanent magnet’s field. The moving coil cuts field lines, inducing an alternating PD via electromagnetic induction.\n+ This is the generator effect—motion → current.\n- Step 2: A loudspeaker reverses the process: Alternating current in a coil creates a changing magnetic field that interacts with a permanent magnet, causing the coil/cone to vibrate (motor effect). Motion → sound.\n\n[Takeaway: Microphone = generator effect; loudspeaker = motor effect.]", "source": "Qwen 3 235B ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why does reversing the direction of motion of a conductor in a magnetic field reverse the induced potential difference? (2 steps)", "answer": "- Step 1: Reversing motion changes the rate of magnetic flux change ($\\frac{d\\Phi}{dt}$) in sign, which flips the direction of the induced EMF.\n- Step 2: According to Faraday’s Law: $$ \\mathcal{E} = -N \\frac{d\\Phi}{dt} $$. A positive $\\frac{d\\Phi}{dt}$ yields a negative $\\mathcal{E}$, and vice versa.\n\n[Takeaway: Direction of induced EMF depends on flux change direction.]", "source": "Qwen 3 235B ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why can’t a step-up transformer increase the power of an electrical system? Use the ideal transformer equation to justify. (2 steps)", "answer": "- Step 1: The ideal transformer equation states $V_p I_p = V_s I_s$, meaning input power equals output power.\n- Step 2: Increasing $V_s$ forces $I_s$ to decrease proportionally. For example, doubling voltage halves current, keeping power constant (assuming 100% efficiency).\n\n[Takeaway: Transformers change voltage/current but not power.]", "source": "Qwen 3 235B ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax M1 ①", "cards": [{"question": "A magnet is held stationary inside a coil. The coil is connected to a sensitive voltmeter. The voltmeter reads zero. Why? (1 step)", "answer": "No induced potential difference is produced because there is no *relative motion* between the magnet and the coil. Electromagnetic induction requires field lines to be *cut* — the conductor must move through the field, or the magnetic field through the coil must change. A stationary magnet produces a static field that, even if strong, induces nothing in a stationary coil. The coil is not cutting any field lines, so no electrons are pushed to create a PD.", "source": "MiniMax M1 ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A wire is moved vertically upward through a horizontal magnetic field. State TWO factors that would increase the induced potential difference, and explain why each factor works. (2 factors)", "answer": "- **Increasing the speed of motion:** Faster movement cuts field lines at a greater rate per second. More lines cut per second → more charge separation → higher induced PD.\n- **Using a stronger magnetic field:** A stronger magnet has denser field lines. When the wire moves through it, more lines are cut per second for the same speed, increasing the induced PD.\n- (Other valid factors: increasing the number of turns on a coil, or increasing the area of the coil — both increase the total wire length cutting through field lines.)", "source": "MiniMax M1 ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "A coil with 50 turns is rotated in a magnetic field, producing an induced PD of 2 V across its ends. If the same coil is replaced with one having 100 turns (all else equal), what induced PD would you expect, and why? (2 steps)", "answer": "- Step 1: Each individual turn of wire cuts through the magnetic field and contributes its own induced PD. The total PD is the *sum* of all turns' contributions.\n- Step 2: Doubling the number of turns from 50 to 100 means twice as many wire segments are cutting field lines. Therefore the induced PD should roughly double, to approximately 4 V.\n- This assumes all other factors (speed, field strength, area) remain the same. The relationship is directly proportional.", "source": "MiniMax M1 ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A wire is moved through a magnetic field at constant speed. If you reverse the direction of motion (move the opposite way), what happens to the induced PD, and why? (2 steps)", "answer": "- Step 1: The direction of the induced potential difference reverses.\n- Step 2: Reversing the direction of motion reverses the *rate of change of magnetic flux* — the wire now cuts field lines in the opposite sense. This reverses the direction of charge separation within the conductor, flipping the polarity of the induced PD. On a voltmeter, the needle that previously deflected right would now deflect left.\n- This follows from the opposing-field rule: the induced field always opposes the change that produces it.", "source": "MiniMax M1 ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "State Lenz's law (the opposing-field rule) in your own words, and explain why it must be true based on energy conservation. (2 steps)", "answer": "- Step 1: **Lenz's law / opposing-field rule:** The direction of the induced PD (and current, if the circuit is complete) always *opposes* the change that produces it. A magnet pushed N-pole-first into a coil makes the near end of the coil become a north pole (repelling the magnet). Pulling the magnet out makes that end a south pole (attracting it back).\n- Step 2: This must be true for **energy conservation.** If the induced field *aided* the motion (e.g., a north pole attracting an approaching north pole), you would get \"something for nothing\" — the induced current would do work *and* the magnet would accelerate without any input energy. That violates conservation of energy. The induced field must do work *against* the motion, requiring energy input to keep the motion going.", "source": "MiniMax M1 ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "What is the key structural difference between an alternator and a dynamo, and how does this affect their output? (2 steps)", "answer": "- Step 1: An **alternator** uses **two continuous slip rings** connected to the rotating coil. The external brushes maintain contact with these rings, but the connection does NOT swap every half-turn.\n- A **dynamo** uses a **split-ring commutator** — a single ring split into two halves. Every half-turn, the commutator swaps which brush connects to which end of the coil.\n- Step 2: Because the split-ring commutator reverses the external connections every half-turn, the output current always leaves in the same direction — it produces d.c. (always positive, varying from zero to max). The alternator's slip rings preserve the alternating polarity, producing a.c. (swings positive and negative).", "source": "MiniMax M1 ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A bicycle dynamo is often called a \"dynamo\" but actually produces alternating current. Explain why, and contrast it with a conventional d.c. dynamo. (2 steps)", "answer": "- Step 1: A bicycle dynamo works by a **rotating magnet** inside (or next to) a fixed coil. The wheel turns a magnet via a friction wheel; as the magnet spins, its magnetic field repeatedly reverses direction relative to the stationary coil. This changing field cuts the coil wires, inducing an alternating PD.\n- Step 2: This output is inherently **a.c.** — the field direction flips as the magnet rotates. In contrast, a conventional d.c. dynamo has a rotating *coil* in a fixed magnetic field, with a split-ring commutator that mechanically converts the internal a.c. to d.c. by swapping connections every half-turn. The bicycle dynamo has no commutator at all; it's essentially an alternator with a rotating magnet rather than a rotating coil.", "source": "MiniMax M1 ①", "_id": "minimax_1_6", "judge_pick": true}, {"question": "A moving-coil microphone and a loudspeaker both contain a coil and a magnet. Explain how one uses the generator effect and the other uses the motor effect, despite looking structurally similar. (2 steps)", "answer": "- Step 1: The **microphone** uses the **generator effect** (EM induction). Sound waves vibrate the diaphragm, which moves the attached coil through the permanent magnet's field. This motion cuts field lines, inducing an alternating PD (and therefore a.c.) in the coil. Input: sound → Output: electrical signal.\n- Step 2: The **loudspeaker** uses the **motor effect**. An a.c. signal passes through a coil wrapped around one pole of a permanent magnet. This current produces a changing magnetic field that interacts with the permanent field, exerting a force (Fleming's left-hand rule) that oscillates the coil and cone. Input: electrical signal → Output: sound.\n- They are *inverse* processes — one converts motion to current, the other converts current to motion.", "source": "MiniMax M1 ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Why can't a transformer work with direct current (d.c.)? (2 steps)", "answer": "- Step 1: A transformer works by using the **changing magnetic field** produced by alternating current in the primary coil. This changing field is carried by the iron core into the secondary coil, where it cuts the secondary windings and induces an alternating PD.\n- Step 2: With **d.c.**, the current is steady and constant. A steady d.c. produces a *steady* (unchanging) magnetic field — not a changing one. Since there is no change in magnetic flux through the secondary coil, no induction occurs. The iron core would simply magnetise once and stay magnetised, doing nothing more. Therefore, transformers require a.c. — they do not work with d.c. inputs.", "source": "MiniMax M1 ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A step-up transformer has 100 turns on the primary coil and 500 turns on the secondary coil. If the input voltage is 230 V, what is the output voltage? Explain whether this is a step-up or step-down transformer. (2 steps)", "answer": "- Step 1: Using the transformer turns equation: $$\\frac{V_p}{V_s} = \\frac{n_p}{n_s}$$ Rearranging: $$V_s = V_p \\times \\frac{n_s}{n_p} = 230 \\times \\frac{500}{100} = 230 \\times 5 = 1150 \\text{ V}$$\n- Step 2: This is a **step-up transformer** because the secondary has *more turns* (500 > 100), so the output voltage (1150 V) is higher than the input (230 V). The voltage has been \"stepped up\" by a factor of 5.\n- Note: For an ideal (100% efficient) transformer, power is conserved ($V_p I_p = V_s I_s$), so the output current would drop by the same factor of 5.", "source": "MiniMax M1 ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "An ideal (100% efficient) transformer steps up voltage from 120 V to 240 V. If the device connected to the output draws a current of 2 A, what is the current in the primary coil, and why can't this transformer increase power? (2 steps)", "answer": "- Step 1: For an ideal transformer, **power is conserved**: $$V_p I_p = V_s I_s$$ Substituting: $$120 \\times I_p = 240 \\times 2 = 480$$ $$I_p = \\frac{480}{120} = 4 \\text{ A}$$\n- Step 2: The primary current is 4 A. Notice that while voltage doubled (120 → 240 V), current halved (4 → 2 A). The **power remains the same**: $$P = V \\times I = 120 \\times 4 = 480 \\text{ W} = 240 \\times 2$$\n- A transformer **cannot create energy** — it can only convert electrical energy from one voltage-current combination to another. It steps up voltage only by stepping down current (and vice versa). Power = energy per second, and energy is conserved.", "source": "MiniMax M1 ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Electricity is transmitted through the National Grid at very high voltage (e.g., 400 kV). Explain why this is done in terms of power loss in the cables. (3 steps)", "answer": "- Step 1: Power transmitted through cables is $P = IV$, where $I$ is the current and $V$ is the voltage. For a given amount of *useful* power to deliver (say, 100 MW from a power station), you can choose different $I$-$V$ combinations: high $V$ with low $I$, or low $V$ with high $I$.\n- Step 2: The cables themselves have resistance $R$. Power *lost* as heat in the cables is given by: $$P_{\\text{loss}} = I^2 R$$\n- Step 3: This loss depends on current **squared**, not voltage. Doubling the current would quadruple the loss. So by using a *high transmission voltage* (achieved by a step-up transformer after the power station), the current is kept *low* for the same transmitted power. Since $I$ is small, $I^2 R$ is very small, and most of the power reaches consumers. At the consumer end, step-down transformers reduce the voltage back to safe levels.", "source": "MiniMax M1 ①", "_id": "minimax_1_11", "judge_pick": true}, {"question": "A power station delivers 10 MW of power to a town through cables with total resistance of 10 Ω. Compare the power loss if transmitted at 10 kV versus 100 kV. Which is more efficient? (3 steps)", "answer": "- Step 1: **At 10 kV:** Using $P = IV$, the current is $I = \\frac{P}{V} = \\frac{10{,}000{,}000}{10{,}000} = 1000$ A. Power loss: $P_{\\text{loss}} = I^2 R = (1000)^2 \\times 10 = 10{,}000{,}000$ W = **10 MW**. Half the power is lost!\n- Step 2: **At 100 kV:** Current is $I = \\frac{10{,}000{,}000}{100{,}000} = 100$ A. Power loss: $P_{\\text{loss}} = (100)^2 \\times 10 = 100{,}000$ W = **0.1 MW** (100 kW).\n- Step 3: At 100 kV, only 0.1% of the power is lost; at 10 kV, 50% is lost. The higher voltage transmission is **far more efficient** because power loss scales with $I^2$, and increasing $V$ by 10× reduces $I$ by 10× (reducing loss by 100×).", "source": "MiniMax M1 ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In the National Grid, what is the sequence of voltage transformation from power station to home? (3 steps)", "answer": "- Step 1: **At the power station:** A step-up transformer increases voltage from generator output (typically ~25 kV) to transmission voltage (≥132 kV, often 275–400 kV in the UK). This high voltage enables low-current, low-loss transmission.\n- Step 2: **Along the transmission lines:** Electricity travels at high voltage (low current) through the grid. No further transformation happens in the wires themselves.\n- Step 3: **Near consumers:** A step-down transformer reduces the voltage from grid voltage (e.g., 11 kV or 33 kV at local substations) to the domestic mains voltage (230 V in the UK). This safe, low voltage is what enters homes.", "source": "MiniMax M1 ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "What are slip rings, and why does an alternator need them? (2 steps)", "answer": "- Step 1: **Slip rings** are two continuous metal rings mounted on the rotating axle of a generator (alternator). Brushes press against these rings to maintain electrical contact with the external circuit while the coil spins.\n- Step 2: Unlike a split-ring commutator, slip rings do NOT swap the connection every half-turn. They simply provide a continuous connection that rotates with the coil. Because the induced PD in a spinning coil reverses polarity each half-rotation, and slip rings preserve the connection, the external output also reverses — producing alternating current (a.c.). This is exactly what an alternator needs.", "source": "MiniMax M1 ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "What is the purpose of the iron core in a transformer? (2 steps)", "answer": "- Step 1: The iron core is **easily magnetised and demagnetised**. When alternating current flows in the primary coil, it produces a changing magnetic field. The iron core concentrates and carries this changing magnetic flux from the primary coil to the secondary coil with minimal loss.\n- Step 2: The core itself does not act as a magnet (it is not a permanent magnet) — it simply provides a high-permeability path for the rapidly reversing magnetic field. This ensures that almost all of the changing flux from the primary passes through the secondary, maximizing induction efficiency. Without the core, much of the field would leak away into the surrounding air.", "source": "MiniMax M1 ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "A student says: \"A transformer increases power because it steps up the voltage.\" Explain why this statement is wrong. (2 steps)", "answer": "- Step 1: A transformer **does not increase power.** For an ideal (100% efficient) transformer, input power equals output power: $P_{\\text{in}} = P_{\\text{out}}$ or $V_p I_p = V_s I_s$. The product of voltage and current remains constant.\n- Step 2: What the transformer *does* is trade voltage for current. If voltage is stepped *up* ($V_s > V_p$), the current must step *down* proportionally ($I_s < I_p$) so that $V \\times I$ stays the same. In reality, real transformers are slightly less than 100% efficient (some power lost as heat), so output power is actually *slightly less* than input power. The student's statement confuses voltage transformation with power generation — transformers are not power sources.", "source": "MiniMax M1 ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Explain why long-distance power transmission uses high-voltage a.c. rather than high-voltage d.c. (2 steps)", "answer": "- Step 1: High-voltage a.c. allows the use of **transformers** to easily change voltage levels. After the power station, a step-up transformer raises voltage for efficient transmission; near consumers, step-down transformers lower it to safe levels. This voltage transformation is simple and efficient with a.c.\n- Step 2: While high-voltage d.c. would also reduce $I^2R$ losses, converting between d.c. voltage levels is technically complex and expensive (requires rectifier/converter circuits). Additionally, a.c. is easier to generate with rotating machines (alternators). Modern systems do use some d.c. transmission (HVDC), but a.c. with transformers remains the standard for the National Grid because it's cheaper and simpler to implement.", "source": "MiniMax M1 ①", "_id": "minimax_1_17", "judge_pick": true}, {"question": "Two identical magnets are dropped at the same speed: one falls through empty space, the other falls through a copper pipe. The fall through the copper pipe is much slower. Explain this using electromagnetic induction. (3 steps)", "answer": "- Step 1: As the magnet falls through the copper pipe, its motion cuts through the atoms of the copper (a conductor). This induces currents in the pipe — called **eddy currents** — which themselves create their own magnetic field.\n- Step 2: By Lenz's law, this induced magnetic field **opposes the change** that created it. The induced field opposes the magnet's motion, creating an upward force that slows the magnet's fall.\n- Step 3: In contrast, the magnet falling through empty space has no conductor to induce currents in, so no opposing field is created — it falls freely (accelerating due to gravity). The copper pipe acts as a \"magnetic brake\" purely through electromagnetic induction. This is also why some braking systems use electromagnetic induction — the kinetic energy is converted to heat in the conductor.", "source": "MiniMax M1 ①", "_id": "minimax_1_18", "judge_pick": true}, {"question": "A transformer has 1000 turns on the primary and 50 turns on the secondary. Is this a step-up or step-down transformer? What happens to the current in the secondary compared to the primary? (2 steps)", "answer": "- Step 1: This is a **step-down transformer** because the secondary has *fewer turns* (50 < 1000). The voltage is reduced: $$V_s = V_p \\times \\frac{n_s}{n_p} = V_p \\times \\frac{50}{1000} = V_p \\times 0.05$$ The output voltage is 5% of the input.\n- Step 2: For an ideal transformer ($V_p I_p = V_s I_s$), since voltage drops by a factor of 20, current *increases* by a factor of 20. So $I_s = I_p \\times \\frac{n_p}{n_s} = I_p \\times 20$. The secondary delivers higher current at lower voltage, but power (VI) is (ideally) the same.", "source": "MiniMax M1 ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Why are the primary and secondary coils of a transformer physically separated but linked magnetically? (2 steps)", "answer": "- Step 1: The coils are electrically isolated (no direct wire connection) because they operate at different voltages. Direct connection would either short the circuit or expose low-voltage devices to dangerously high voltages.\n- Step 2: They are linked **magnetically** through the iron core. The primary's alternating current creates a changing magnetic field; the iron core channels this changing flux directly through the secondary coil. This \"magnetic coupling\" induces the output voltage without any physical electrical connection. It's a key safety feature — it breaks the circuit while transferring energy.", "source": "MiniMax M1 ①", "_id": "minimax_1_20", "judge_pick": true}, {"question": "A magnet is pushed quickly into a coil, then held stationary, then pulled out. Describe how the voltmeter reading changes at each stage, and explain why. (3 steps)", "answer": "- Step 1: **Pushing in quickly:** The magnet's motion cuts field lines through the coil — an induced PD is created. The voltmeter shows a reading (deflects one way). The faster the push, the larger the PD.\n- Step 2: **Held stationary:** No motion = no cutting of field lines = no change in magnetic flux through the coil. The voltmeter reads **zero**. Even though a strong magnetic field is present, induction requires *change*, not just presence.\n- Step 3: **Pulling out:** The magnet moving in the opposite direction cuts field lines again, but now in the reverse sense. The induced PD reverses polarity — the voltmeter deflects the opposite way. The magnitude depends on the speed of withdrawal.", "source": "MiniMax M1 ①", "_id": "minimax_1_21", "judge_pick": true}, {"question": "What would happen if you tried to use a transformer with the input connected to a 9 V battery (d.c.)? Would there be any output voltage? Explain your answer. (2 steps)", "answer": "- Step 1: No significant output voltage would be produced after the initial brief moment.\n- Step 2: A battery provides **steady direct current** — the current flows in one direction and doesn't change magnitude over time. This produces a *constant* magnetic field from the primary coil. Since the field is not changing, there is no changing magnetic flux through the secondary coil, so **no induction occurs**. The only exception is the brief instant when you connect or disconnect the battery (when the current changes from zero to steady, or vice versa), creating a fleeting pulse — but once the current is steady, the output stops. Transformers fundamentally require **alternating current** to work.", "source": "MiniMax M1 ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In a simple a.c. generator, the coil rotates at constant speed in a uniform magnetic field. Sketch qualitatively how the output voltage varies with time, and explain why it has this shape. (2 steps)", "answer": "- Step 1: The output voltage traces a **sine wave** — it starts at zero, rises to a maximum positive value when the coil is perpendicular to the field lines, passes through zero again when parallel, reaches maximum negative, and returns to zero. This repeats every full rotation.\n- Step 2: This shape arises because the induced PD depends on the *rate of cutting* field lines. When the coil plane is parallel to the field (cutting most directly), the rate of flux change is maximum → maximum PD. When the coil plane is perpendicular to the field (moving *along* field lines), it cuts no lines → zero PD. Since the coil rotates at constant speed, the rate of cutting follows a sinusoidal pattern, giving a sinusoidal a.c. output.", "source": "MiniMax M1 ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "A generator produces 50 A at 240 V. It is connected to a step-up transformer with 200 primary turns and 1000 secondary turns. What is the output voltage and current after the transformer, assuming an ideal transformer? (2 steps)", "answer": "- Step 1: **Output voltage:** Using $\\frac{V_p}{V_s} = \\frac{n_p}{n_s}$: $$V_s = V_p \\times \\frac{n_s}{n_p} = 240 \\times \\frac{1000}{200} = 240 \\times 5 = 1200 \\text{ V}$$\n- Step 2: **Output current:** Using $V_p I_p = V_s I_s$ (power conservation): $$240 \\times 50 = 1200 \\times I_s$$ $$12{,}000 = 1200 I_s$$ $$I_s = 10 \\text{ A}$$\n- The step-up transformer increased voltage 5× and decreased current 5×. Power is conserved: $P = 240 \\times 50 = 12{,}000$ W = $1200 \\times 10$ W.", "source": "MiniMax M1 ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A microphone converts sound to electricity. A loudspeaker converts electricity to sound. A student claims these are the same device working in reverse. Are they correct? Explain. (2 steps)", "answer": "- The student is partially correct — they are *inverse* processes, but they use **different physical principles**, so they are not the same device.\n- A **microphone** uses the **generator effect**: sound vibrates a coil in a magnetic field, inducing an alternating electrical signal. The input is mechanical (sound), output is electrical.\n- A **loudspeaker** uses the **motor effect**: an electrical signal passes through a coil in a magnetic field, creating a force that moves the cone and produces sound. The input is electrical, output is mechanical (sound).\n- Both contain coils and magnets, but one generates current from motion, the other generates motion from current. They are functional inverses but physically distinct.", "source": "MiniMax M1 ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Why do power lines hum at 50 Hz (or 60 Hz in some countries)? (2 steps)", "answer": "- Step 1: The alternating current in the power grid reverses direction 50 times per second (in the UK and many other countries; 60 times in the US). This is the **frequency** of the mains supply.\n- Step 2: In transformers and electric motors, the rapidly reversing magnetic forces cause tiny mechanical vibrations in the iron cores and windings. These vibrations at 50 Hz are heard as a characteristic electrical hum. The sound frequency directly corresponds to the a.c. frequency — it's literally the sound of the alternating magnetic fields at work.", "source": "MiniMax M1 ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "If you double the number of turns on both the primary and secondary coils of a transformer (keeping all other factors the same), what happens to the output voltage? Explain your reasoning. (2 steps)", "answer": "- Step 1: The output voltage stays the **same**.\n- Step 2: The transformer turns equation is $\\frac{V_p}{V_s} = \\frac{n_p}{n_s}$. If you *double* both $n_p$ and $n_s$ (e.g., from 100/500 to 200/1000), the **ratio** $\\frac{n_p}{n_s}$ remains unchanged. Since the voltage ratio depends only on the *ratio of turns*, not their absolute numbers, the input-to-output voltage relationship is unchanged.\n- Practically, however, a transformer with more turns of thicker wire might handle more *power* (more current) without overheating, but the voltage transformation ratio is determined purely by the turns ratio.", "source": "MiniMax M1 ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "What would happen to the efficiency of the National Grid if we transmitted at very low voltage instead of high voltage? Use the concept of $I^2R$ losses to explain. (2 steps)", "answer": "- Step 1: Transmitting at low voltage means transmitting at **high current** for the same power (since $P = IV$, to deliver a given $P$, lower $V$ requires larger $I$).\n- Step 2: Power lost in the cables is $P_{\\text{loss}} = I^2 R$. Since this depends on $I^2$, even a modest increase in current causes a *much larger* increase in losses. For example, halving the transmission voltage would *double* the current, causing a *fourfold* increase in heating losses. At low voltage, most of the power would be wasted as heat in the cables before reaching consumers, making the system extremely inefficient and impractical.", "source": "MiniMax M1 ①", "_id": "minimax_1_28", "judge_pick": false}], "count": 29}, "minimax_2": {"label": "MiniMax M1 ②", "cards": [{"question": "A student says \"electromagnetic induction is the opposite of the motor effect.\" Explain whether this statement is correct and clarify what each effect describes. (3 steps)", "answer": "- Step 1: The statement is essentially correct — the motor effect and generator effect are reverse processes of each other.\n- Step 2: The **motor effect** describes how a current-carrying conductor in a magnetic field experiences a force (this drives electric motors).\n- Step 3: The **generator effect** (electromagnetic induction) describes how moving a conductor through a magnetic field induces a voltage and potentially a current (this drives generators).\n+ Key distinction: Motor effect needs an existing current to produce motion; generator effect produces a current from motion.\n\n**Takeaway:** Motor = current → force → motion. Generator = motion → induced current.", "source": "MiniMax M1 ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A wire is moved through a magnetic field at different speeds. How does the speed of motion affect the induced potential difference, and why? (2 steps)", "answer": "- Step 1: Faster motion through the magnetic field produces a larger induced potential difference.\n- Step 2: This is because faster motion means magnetic field lines are being cut at a greater rate per second — more flux change per unit time directly translates to a larger induced voltage.\n+ Example: Spinning a generator coil slowly gives a low output voltage; spinning it faster produces a higher output voltage.\n\n**Takeaway:** Speed ↑ → Induced PD ↑ (for the same magnetic field and conductor).", "source": "MiniMax M1 ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A coil with 50 turns is replaced by an identical coil with 100 turns, and both are moved through the same magnetic field at the same speed. What happens to the induced potential difference, and why? (2 steps)", "answer": "- Step 1: The induced potential difference doubles (approximately doubles, assuming all other factors remain equal).\n- Step 2: Each turn of wire cuts through the magnetic field lines and contributes its own induced voltage. With twice as many turns, the total voltage induced across the coil is the sum of all individual turns — twice as many turns means twice the voltage.\n+ Note: The correct term is \"turns\" or \"windings,\" not \"coils\" — a coil consists of multiple turns.\n\n**Takeaway:** More turns → More voltage (proportional relationship).", "source": "MiniMax M1 ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Two identical coils are moved at the same speed through identical magnetic fields, but one coil has a larger area. Which coil induces a larger voltage, and why? (2 steps)", "answer": "- Step 1: The larger-area coil induces a larger potential difference.\n- Step 2: A larger area means more wire is available to cut through the magnetic field lines during motion. More of the conductor is actively intersecting field lines per second, so a greater rate of flux cutting occurs, producing a larger induced voltage.\n+ Visual intuition: Imagine sweeping a longer wire through a field — more of it crosses field lines.\n\n**Takeaway:** Area ↑ → Induced PD ↑ (more wire cutting field lines).", "source": "MiniMax M1 ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A wire is moved through the same magnetic field at the same speed, but using a stronger magnet (denser field lines). How does this affect the induced voltage, and why? (2 steps)", "answer": "- Step 1: The induced voltage increases when using a stronger magnetic field.\n- Step 2: A stronger magnet has denser magnetic field lines. When the wire moves through it at the same speed, the wire now cuts *more field lines per second* — more flux change per unit time means a larger induced voltage.\n+ Warning: Say \"stronger magnet\" or \"stronger magnetic field,\" not \"bigger magnet\" (size doesn't necessarily mean stronger).\n\n**Takeaway:** Field strength ↑ → Induced PD ↑ (more lines cut per second).", "source": "MiniMax M1 ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A magnet is pushed N-pole-first into a coil, and the voltmeter deflects in a certain direction. What would you observe if you reversed the direction of motion (pulled the magnet out at the same speed), and why? (3 steps)", "answer": "- Step 1: The voltmeter would deflect in the *opposite direction* compared to when the magnet was pushed in.\n- Step 2: Reversing the direction of motion reverses the direction in which field lines are being cut. This reverses the direction of the induced potential difference (and hence the induced current direction if the circuit is complete).\n- Step 3: This follows from the opposing-field rule (Lenz's law behavior): the induced field always opposes the change that produces it — repelling the magnet when it enters, attracting it when it leaves.\n\n**Takeaway:** Reverse motion → Reverse direction of induced PD.", "source": "MiniMax M1 ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "A magnet is held stationary inside a coil. What does the voltmeter read, and why? (2 steps)", "answer": "- Step 1: The voltmeter reads zero — no potential difference is induced.\n- Step 2: Electromagnetic induction requires *relative motion* between the conductor and magnetic field so that field lines are being cut. With no motion, no field lines are being cut, regardless of how strong the magnet or how many turns the coil has.\n+ Misconception: Many think a strong magnet near a coil should induce voltage — it does not unless there's motion.\n\n**Takeaway:** No motion → No cutting of field lines → No induced voltage.", "source": "MiniMax M1 ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Explain what is meant by the \"opposing-field rule\" (Lenz's law behavior) in electromagnetic induction, using the example of pushing a magnet into a coil. (3 steps)", "answer": "- Step 1: The direction of the induced potential difference (and current) always creates a magnetic field that *opposes* the change producing it.\n- Step 2: When you push a north pole of a magnet *into* a coil, the induced current in the coil creates a north pole at the near end, which repels the incoming magnet — it \"fights back\" against the motion.\n- Step 3: When you *pull* the magnet *out* of the coil, the induced current creates a south pole at the near end, attracting the magnet back — it opposes the removal.\n+ This is a consequence of energy conservation: the induced current does work to oppose the motion, so you must do mechanical work to move the magnet (this work becomes the electrical energy induced).\n\n**Takeaway:** The induced field always tries to *stop* the motion that created it.", "source": "MiniMax M1 ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "An alternator produces alternating current. Explain how it works and what component(s) distinguish it from a dynamo. (3 steps)", "answer": "- Step 1: In an alternator, a rectangular coil spins in a uniform magnetic field. As the coil rotates, different sides of the coil cut through the magnetic field lines in different directions.\n- Step 2: This causes the induced potential difference to repeatedly reverse direction — one half-turn it is positive, the next half-turn it is negative, producing alternating current (a.c.).\n- Step 3: The key component is the **two slip rings** (continuous metal rings) that connect the spinning coil to the external circuit via brushes. These rings maintain continuous contact but do *not* swap the connection each half-turn, allowing the alternating polarity to reach the external circuit.\n+ The output is a sine wave, swinging between positive and negative.\n\n**Takeaway:** Slip rings → continuous connection, no polarity swap → a.c. output.", "source": "MiniMax M1 ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "A dynamo produces direct current (d.c.). Explain how it achieves this and what component distinguishes it from an alternator. (3 steps)", "answer": "- Step 1: A dynamo operates on the same principle as an alternator — a coil spins in a magnetic field to induce a voltage.\n- Step 2: However, instead of slip rings, it uses a **split-ring commutator** — a single ring split into two halves, mounted on the axle.\n- Step 3: Every half-turn, as the coil passes through the vertical position, the split-ring commutator swaps which brush connects to which end of the coil. This reversal keeps the output current always leaving by the same brush, so the voltage is always positive (or always negative), never reversing polarity.\n+ The output is \"bumpy d.c.\" — it varies from zero to maximum twice per cycle but never goes negative.\n\n**Takeaway:** Split-ring commutator → swaps connection every half-turn → keeps current direction the same → d.c.", "source": "MiniMax M1 ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A bicycle dynamo is often described as producing a.c., even though the word \"dynamo\" usually means d.c. Explain why a bicycle dynamo actually outputs alternating current. (3 steps)", "answer": "- Step 1: A bicycle dynamo contains a rotating magnet inside (or next to) a fixed coil. The wheel drives the magnet via a friction wheel or spindle.\n- Step 2: As the magnet spins, its magnetic field direction continuously changes relative to the fixed coil. This changing field cuts through the coil's wires, inducing a potential difference that reverses direction twice per revolution.\n- Step 3: Because the *magnet* rotates (rather than a coil rotating between magnet poles), the induced current in the fixed coil alternates — there is no commutator to rectify it. Hence it produces a.c., not d.c.\n+ This is why bicycle lights actually flicker slightly at low speeds (the a.c. waveform).\n\n**Takeaway:** Rotating magnet = field direction reverses → a.c. output (no commutator to rectify).", "source": "MiniMax M1 ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "What is the difference between slip rings and a split-ring commutator, and how does each affect the type of output current produced? (2 steps)", "answer": "- Step 1: **Slip rings** are two continuous metal rings that maintain continuous electrical contact with the external circuit. They do NOT swap connections during rotation.\n- **Split-ring commutator** is a single ring split into two halves that reverses the external circuit connection every half-turn.\n- Step 2: Slip rings allow the induced polarity to reach the external circuit unchanged → **a.c.** output. Split-ring commutator swaps the connection every half-turn, keeping current flowing in the same external direction → **d.c.** output.\n\n**Takeaway:** Slip rings = keep connection same → a.c. Commutator = swap connection → d.c.", "source": "MiniMax M1 ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "A moving-coil microphone converts sound waves into electrical signals. Explain how it works and whether it uses the motor effect or generator effect. (3 steps)", "answer": "- Step 1: Sound waves hit a diaphragm, which is attached to a coil. The coil sits in the field of a permanent magnet.\n- Step 2: As the sound waves cause the diaphragm (and coil) to vibrate, the coil moves back and forth through the magnetic field, cutting magnetic field lines.\n- Step 3: This cutting of field lines induces an alternating potential difference in the coil (generator effect). When connected to a circuit, this produces an alternating current that matches the frequency and amplitude of the sound wave.\n+ It is essentially the reverse of a loudspeaker: microphone = sound → induced current; loudspeaker = current → sound.\n\n**Takeaway:** Moving-coil microphone uses the **generator effect** (motion → induced current).", "source": "MiniMax M1 ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A loudspeaker converts electrical signals into sound waves. Explain how it works and whether it uses the motor effect or generator effect. (3 steps)", "answer": "- Step 1: An alternating current flows through a coil that is wrapped around one pole of a permanent magnet. This coil is attached to a flexible cone.\n- Step 2: The a.c. in the coil creates a changing magnetic field that interacts with the permanent magnet's field. By Fleming's left-hand rule, this produces a force on the coil that oscillates back and forth.\n- Step 3: The oscillating coil pushes the attached cone backwards and forwards, pushing air molecules to create sound waves.\n+ This is the **motor effect** — it requires an existing current to produce motion (the opposite of a microphone).\n\n**Takeaway:** Loudspeaker uses the **motor effect** (current → force → motion → sound).", "source": "MiniMax M1 ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A student claims that a microphone and a loudspeaker work in the same way because they look similar (both have a coil and a magnet). Explain why this is a misconception. (2 steps)", "answer": "- Step 1: While they have similar components (coil, magnet), they operate on *opposite* principles and the energy conversion goes in opposite directions.\n- Step 2: A **microphone** uses the **generator effect** — sound waves cause motion, motion cuts field lines, inducing a current. A **loudspeaker** uses the **motor effect** — a current in a coil creates a force, causing motion that produces sound.\n+ Misconception: They're not the same process — they're inverses of each other.\n\n**Takeaway:** Microphone: sound → electricity (generator). Loudspeaker: electricity → sound (motor).", "source": "MiniMax M1 ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "What are the three essential components of a transformer, and what is the function of each? (3 steps)", "answer": "- Step 1: **Primary coil** — receives the input alternating voltage (a.c.). The alternating current in this coil produces a changing magnetic field.\n- Step 2: **Iron core** — easily magnetised material that carries the changing magnetic field from the primary to the secondary coil. It does not conduct electricity between the coils; it just channels the magnetic flux.\n- Step 3: **Secondary coil** — the changing magnetic field from the core cuts the wires of this coil, inducing an alternating output voltage.\n+ Key: All three are required; without the iron core, the changing field wouldn't reach the secondary efficiently.\n\n**Takeaway:** Primary coil (input a.c.) → Iron core (carries flux) → Secondary coil (output a.c.).", "source": "MiniMax M1 ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Why does a transformer NOT work with direct current (d.c.)? (2 steps)", "answer": "- Step 1: A transformer requires a *changing* magnetic field to induce a voltage in the secondary coil.\n- Step 2: With d.c., the current is steady and direction doesn't change, so the magnetic field produced by the primary coil is constant (not changing). A constant field through the secondary coil cuts no field lines (no rate of change), so no voltage is induced.\n+ This is why transformers only work with alternating current — the constantly reversing current creates a constantly reversing (changing) magnetic field.\n\n**Takeaway:** Steady d.c. → steady magnetic field → no induction in secondary.", "source": "MiniMax M1 ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "What is the difference between a step-up transformer and a step-down transformer in terms of the number of turns on the coils and the resulting voltage? (2 steps)", "answer": "- Step 1: A **step-up transformer** has **more turns on the secondary coil** than on the primary coil ($n_s > n_p$). This increases the voltage — the output voltage is higher than the input voltage ($V_s > V_p$).\n- Step 2: A **step-down transformer** has **fewer turns on the secondary coil** than on the primary coil ($n_s < n_p$). This decreases the voltage — the output voltage is lower than the input voltage ($V_s < V_p$).\n+ Example: If primary has 100 turns and secondary has 1000 turns, it's a step-up (×10 voltage).\n\n**Takeaway:** More secondary turns = step-up (V ↑). Fewer secondary turns = step-down (V ↓).", "source": "MiniMax M1 ②", "_id": "minimax_2_17", "judge_pick": true}, {"question": "A transformer has 100 turns on the primary coil and 400 turns on the secondary coil. If 230 V is applied to the primary, what is the output voltage from the secondary? Is this a step-up or step-down transformer? (3 steps)", "answer": "- Step 1: Use the transformer turns equation: $\\frac{V_p}{V_s} = \\frac{n_p}{n_s}$\n- Step 2: Rearrange: $V_s = V_p \\times \\frac{n_s}{n_p} = 230 \\times \\frac{400}{100} = 230 \\times 4 = 920\\,\\text{V}$\n- Step 3: Since $n_s > n_p$ (400 > 100), this is a **step-up transformer
