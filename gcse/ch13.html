<script>
const DATA={"selected": [{"id": "glm_1_24", "question": "Where are the step-up and step-down transformers located in the National Grid, and what is the specific purpose of each location? (3 steps)", "answer": "- Step 1: The **step-up transformer** is located immediately *after* the power station. Its purpose is to raise the voltage to a very high level (e.g., ≥ 132 kV) for long-distance transmission, which forces the current down and minimises $$I^2R$$ heat loss in the cables.\n- Step 2: The **step-down transformer** is located *before* homes, buildings, or inside device adapters. Its purpose is to lower the high transmission voltage to a safe, usable level (e.g., 230 V mains, or 5–12 V for electronics).\n- Step 3: This two-stage process ensures that energy waste is minimised over the long transmission lines, while keeping the end-user voltage safe for domestic use.\n\nThe grid sacrifices high current for efficiency on the lines, then trades back for safe voltage at the destination.", "source": "GLM 5.1 ①", "blind_id": 2}, {"id": "glm_1_19", "question": "An ideal step-up transformer converts 100 V to 200 V. If a device on the secondary side draws 2 A, what current must flow in the primary coil? (3 steps)", "answer": "- Step 1: For an ideal transformer, input power equals output power: $$V_p I_p = V_s I_s$$.\n- Step 2: Substitute the known values: $$100 \\times I_p = 200 \\times 2 = 400$$.\n- Step 3: Solve for $$I_p$$: $$I_p = \\frac{400}{100} = 4$$ A.\n\nNotice that because the voltage doubled, the current was halved (4 A → 2 A). The transformer trades voltage for current to conserve power.", "source": "GLM 5.1 ①", "blind_id": 3}, {"id": "minimax_1_6", "question": "A bicycle dynamo is often called a \"dynamo\" but actually produces alternating current. Explain why, and contrast it with a conventional d.c. dynamo. (2 steps)", "answer": "- Step 1: A bicycle dynamo works by a **rotating magnet** inside (or next to) a fixed coil. The wheel turns a magnet via a friction wheel; as the magnet spins, its magnetic field repeatedly reverses direction relative to the stationary coil. This changing field cuts the coil wires, inducing an alternating PD.\n- Step 2: This output is inherently **a.c.** — the field direction flips as the magnet rotates. In contrast, a conventional d.c. dynamo has a rotating *coil* in a fixed magnetic field, with a split-ring commutator that mechanically converts the internal a.c. to d.c. by swapping connections every half-turn. The bicycle dynamo has no commutator at all; it's essentially an alternator with a rotating magnet rather than a rotating coil.", "source": "MiniMax M1 ①", "blind_id": 9}, {"id": "minimax_1_11", "question": "Electricity is transmitted through the National Grid at very high voltage (e.g., 400 kV). Explain why this is done in terms of power loss in the cables. (3 steps)", "answer": "- Step 1: Power transmitted through cables is $P = IV$, where $I$ is the current and $V$ is the voltage. For a given amount of *useful* power to deliver (say, 100 MW from a power station), you can choose different $I$-$V$ combinations: high $V$ with low $I$, or low $V$ with high $I$.\n- Step 2: The cables themselves have resistance $R$. Power *lost* as heat in the cables is given by: $$P_{\\text{loss}} = I^2 R$$\n- Step 3: This loss depends on current **squared**, not voltage. Doubling the current would quadruple the loss. So by using a *high transmission voltage* (achieved by a step-up transformer after the power station), the current is kept *low* for the same transmitted power. Since $I$ is small, $I^2 R$ is very small, and most of the power reaches consumers. At the consumer end, step-down transformers reduce the voltage back to safe levels.", "source": "MiniMax M1 ①", "blind_id": 14}, {"id": "gflash_2_17", "question": "The \"Opposing-field rule\" or Lenz's Law states that the direction of the induced PD always opposes the change that produces it. Provide an intuitive explanation for *why* this opposition must occur, linking it to a fundamental conservation law. (2 steps)", "answer": "- Step 1: **Intuitive Understanding of Opposition:** Imagine pushing the North pole of a magnet into a coil. According to Lenz's Law, the induced current in the coil will flow in a direction that creates its own magnetic field, making the end of the coil facing the magnet become a North pole. These two North poles will then repel each other, pushing back against your initial motion. If you then try to pull the North pole *out* of the coil, the induced current will reverse, making the end of the coil a South pole to attract the magnet back, again opposing your action. The induced field always \"fights\" the change you are trying to make.\n- Step 2: **Link to Conservation of Energy:** This opposition is not arbitrary; it is a direct consequence of the **law of conservation of energy**.\n    + If the induced current's magnetic field *aided* the change (e.g., if pushing a North pole into a coil created a South pole at the coil's end, attracting the magnet), then the magnet would be accelerated into the coil without any work needing to be done. The system would generate electrical energy (induced current) and kinetic energy (accelerated magnet) seemingly from nothing.\n    + This would be a perpetual motion machine, creating energy out of nowhere, which violates the conservation of energy.\n    + Therefore, the induced field *must* oppose the change. This opposition ensures that work must be done (mechanical energy must be expended) to move the magnet against the repulsive or attractive force of the induced field. It is this mechanical energy input that is then converted into the electrical energy of the induced current. The opposition is nature's way of ensuring energy balance.\n\nLenz's Law ensures that electromagnetic induction adheres to the fundamental principle of energy conservation.", "source": "Gemini 2.5 Flash ②", "blind_id": 22}, {"id": "glm_1_5", "question": "A coil spins inside a magnetic field and connects to an external circuit via two continuous, unbroken metal rings pressed by brushes. What type of current is produced, and what is the function of these rings? (3 steps)", "answer": "- Step 1: The device is an **alternator**, and it produces **alternating current (a.c.)**.\n- Step 2: The continuous metal rings are called **slip rings**. Their function is to maintain a continuous electrical connection between the spinning coil and the stationary external circuit (via the brushes).\n- Step 3: Because the rings do *not* swap the connections every half-turn, as the coil rotates past the halfway point, the induced PD reverses direction. This causes the output current to swing between positive and negative, creating the alternating current.\n\nSlip rings preserve the raw alternating output of a spinning coil.", "source": "GLM 5.1 ①", "blind_id": 24}, {"id": "gemini_4_13", "question": "Explain, from fundamental principles, why a transformer will not work if a steady direct current (d.c.) is supplied to its primary coil. (4 steps)", "answer": "- Step 1: A transformer works by electromagnetic induction. A potential difference is only induced in the secondary coil if it experiences a *changing* magnetic field.\n- Step 2: The magnetic field is produced by the current in the primary coil. A steady direct current (d.c.) is a current that flows continuously in one direction at a constant value.\n- Step 3: This steady primary current will produce a steady, unchanging magnetic field in the iron core.\n- Step 4: Because the magnetic field in the core is not changing, it does not cut the secondary coil's wires. With no changing magnetic flux, there is no induction, and therefore the output voltage at the secondary coil is zero.", "source": "Gemini 2.5 Pro ④", "blind_id": 28}, {"id": "gemini_3_4", "question": "If moving a wire through a magnetic field induces a potential difference across its ends, what one additional condition must be met for an **induced current** to flow?", "answer": "For an induced current to flow, the conductor must be part of a **complete electrical circuit**. An induced potential difference (voltage) is like the \"push\" available, but a current (the flow of charge) can only happen if there is an unbroken path for the charge to travel around. If the wire is not connected in a loop, a voltage will still exist across its ends, but no current will flow.", "source": "Gemini 2.5 Pro ③", "blind_id": 32}, {"id": "gflash_2_11", "question": "An ideal transformer is said to conserve power. Explain what \"ideal\" implies in this context and how the relationship $$V_p I_p = V_s I_s$$ for an ideal transformer arises from the principle of energy conservation. (3 steps)", "answer": "- Step 1: **Meaning of an \"Ideal Transformer\":** An ideal transformer is a theoretical construct that assumes 100% efficiency in energy transfer. This means that no energy is lost as heat, sound, or electromagnetic radiation during the transformation process. In a real transformer, some energy is always lost, primarily due to resistance in the coils ($$I^2R$$ heating), eddy currents in the core, and hysteresis losses in the core.\n- Step 2: **Principle of Energy Conservation:** The law of conservation of energy states that energy cannot be created or destroyed, only transformed from one form to another. If a transformer is ideal, then all the electrical energy supplied to the primary coil per unit time (i.e., the input power) must be exactly equal to the electrical energy delivered by the secondary coil per unit time (i.e., the output power).\n- Step 3: **Deriving $$V_p I_p = V_s I_s$$:**\n    + We know that electrical power ($$P$$) is given by the product of voltage ($$V$$) and current ($$I$$), i.e., $$P = VI$$.\n    + For the primary coil, the input power is $$P_p = V_p I_p$$.\n    + For the secondary coil, the output power is $$P_s = V_s I_s$$.\n    + Since an ideal transformer has 100% efficiency, there is no power loss, meaning:\n        $$P_{\\text{input}} = P_{\\text{output}}$$\n        $$V_p I_p = V_s I_s$$\n    This equation demonstrates that while a transformer can change voltage and current levels, it cannot change the total electrical power. If voltage is stepped up, current must be stepped down proportionally, and vice versa, to maintain constant power.\n\nThis relationship is crucial for understanding the trade-offs in voltage and current transformation, especially in the context of the National Grid.", "source": "Gemini 2.5 Flash ②", "blind_id": 36}, {"id": "gemini_4_16", "question": "A simple step-down transformer has 400 turns on its primary coil and 100 turns on its secondary. If the input a.c. voltage is $$12\\,\\text{V}$$, what is the output voltage? (3 steps)", "answer": "- Step 1: The relationship between voltages and turns in a transformer is given by the equation $$\\frac{V_s}{V_p} = \\frac{n_s}{n_p}$$.\n- Step 2: The ratio of the turns is $$\\frac{n_s}{n_p} = \\frac{100}{400} = \\frac{1}{4}$$. This means the voltage will be \"stepped down\" by a factor of 4.\n- Step 3: The output voltage $$V_s$$ will therefore be one-quarter of the input voltage $$V_p$$.\n$$V_s = V_p \\times \\frac{1}{4} = 12\\,\\text{V} \\times \\frac{1}{4} = 3\\,\\text{V}$$", "source": "Gemini 2.5 Pro ④", "blind_id": 40}, {"id": "gflash_2_4", "question": "Why is there no induced potential difference when a magnet is held stationary inside a coil, even though there is a strong magnetic field present? (2 steps)", "answer": "- Step 1: **Condition for Induction:** Electromagnetic induction fundamentally requires a *change* in the magnetic field passing through a conductor, or that the conductor *cuts* magnetic field lines. It's not the presence of a magnetic field alone, but the *interaction* involving relative motion or a changing field, that causes induction.\n- Step 2: **Absence of Relative Motion/Change:** When a magnet is held stationary inside a coil:\n    + There is **no relative motion** between the coil and the magnet. The coil's wires are not moving through the magnet's field lines.\n    + The magnetic field passing through the coil is **constant**; it is not changing in strength or direction.\n    + Consequently, no magnetic field lines are being cut by the conductor, and there is no change in the magnetic flux through the coil.\n    Without this essential condition of changing magnetic flux or cutting field lines, no potential difference is induced across the coil, and therefore no current will flow, even if a complete circuit is present.\n\nThis highlights that induction is a dynamic process, not a static one.", "source": "Gemini 2.5 Flash ②", "blind_id": 41}, {"id": "gflash_2_15", "question": "A transformer has 200 turns on its primary coil and is connected to a 10 V AC supply. If it needs to produce an output of 50 V, how many turns must the secondary coil have? (2 steps)", "answer": "- Step 1: **Identify Knowns and Unknowns:**\n    + Primary voltage ($$V_p$$) = 10 V\n    + Primary turns ($$n_p$$) = 200 turns\n    + Secondary voltage ($$V_s$$) = 50 V\n    + Secondary turns ($$n_s$$) = ? (unknown)\n- Step 2: **Apply the Transformer Turns Equation and Solve:**\n    + The transformer turns equation relates voltages and turns: $$\\dfrac{V_p}{V_s} = \\dfrac{n_p}{n_s}$$\n    + Substitute the known values: $$\\dfrac{10\\,\\text{V}}{50\\,\\text{V}} = \\dfrac{200\\,\\text{turns}}{n_s}$$\n    + Rearrange to solve for $$n_s$$:\n        $$n_s = 200\\,\\text{turns} \\times \\dfrac{50\\,\\text{V}}{10\\,\\text{V}}$$\n        $$n_s = 200\\,\\text{turns} \\times 5$$\n        $$n_s = 1000\\,\\text{turns}$$\n    The secondary coil must have 1000 turns. Since the output voltage (50 V) is higher than the input voltage (10 V), this is a step-up transformer, which is consistent with the secondary coil having more turns than the primary (1000 > 200).\n\nThis simple calculation demonstrates the direct relationship between coil turns and voltage transformation.", "source": "Gemini 2.5 Flash ②", "blind_id": 53}, {"id": "glm_2_9", "question": "Why does the transformer equation $$\\frac{V_s}{V_p} = \\frac{n_s}{n_p}$$ make physical sense based on how a coil cuts magnetic field lines? (3 steps)", "answer": "- Step 1: The changing magnetic field in the core cuts through the turns of both the primary and secondary coils.\n- Step 2: Each turn in a coil experiences the same changing magnetic field and thus has the same induced PD across it.\n- Step 3: The total PD across a coil is simply the sum of the PDs across each individual turn. Therefore, if the secondary coil has twice as many turns as the primary, it cuts twice as many field lines (per coil), and the total induced PD will be twice as large. The ratio of voltages equals the ratio of turns.\n\nVoltage is proportional to turns because each turn contributes an equal slice of induced PD.", "source": "GLM 5.1 ②", "blind_id": 55}, {"id": "gemini_4_21", "question": "A power station needs to transmit a certain amount of power. It uses a step-up transformer that increases the voltage by a factor of 20. By what factor does this reduce the power lost to heat in the transmission cables? (4 steps)", "answer": "- Step 1: For a constant amount of power being transmitted ($$P = VI$$), if the voltage ($$V$$) is increased by a factor of 20, the current ($$I$$) must decrease by a factor of 20 to keep the product $$VI$$ the same.\n- Step 2: The power lost as heat in the cables is calculated using the formula $$P_{loss} = I^2R$$. The loss depends on the square of the current.\n- Step 3: Since the current has been reduced to $$1/20$$ of its original value, the new power loss will be $$(\\frac{1}{20})^2$$ of the original loss.\n- Step 4: $$(\\frac{1}{20})^2 = \\frac{1}{400}$$. Therefore, the power lost to heat is reduced by a factor of **400**. This demonstrates the huge efficiency gain from using high-voltage transmission.", "source": "Gemini 2.5 Pro ④", "blind_id": 59}, {"id": "gemini_1_2", "question": "What happens if a straight wire is moved perfectly *parallel* to the magnetic field lines between two magnets? Is a potential difference induced? Why or why not?", "answer": "No potential difference is induced.\n\nThis is an important edge case that tests the core principle. For electromagnetic induction to occur, the conductor must *cut* magnetic field lines. Moving parallel to the field lines means the wire is sliding alongside them, not crossing them. Since no field lines are cut, the magnetic field exerts no force to push the charges to one end of the wire, and therefore no potential difference is generated.", "source": "Gemini 2.5 Pro ①", "blind_id": 62}, {"id": "glm_2_17", "question": "A student says \"A bigger magnet will induce a larger PD in a spinning coil.\" Why is this statement technically inaccurate, and what should they have said instead? (2 steps)", "answer": "- Step 1: The physical size of the magnet is not the determining factor; the **strength** of the magnetic field (field line density) is what matters.\n- Step 2: A physically large but weak magnet might induce a smaller PD than a small, powerful neodymium magnet, because the denser field lines of the strong magnet are cut at a greater rate. The correct phrasing is \"A **stronger** magnet will induce a larger PD.\"\n\nField strength (density of lines) dictates induction rate, not physical magnet size.", "source": "GLM 5.1 ②", "blind_id": 63}, {"id": "gflash_2_19", "question": "Imagine you are designing a small, hand-cranked generator to power an LED light. What design choices would you make to maximize the brightness of the LED (i.e., maximize the induced PD and current), considering the factors affecting electromagnetic induction? (3 steps)", "answer": "- Step 1: **Maximizing the Rate of Cutting Field Lines:** The brightness of the LED depends on the power delivered, which in turn depends on the induced voltage and current. To maximize the induced PD, we need to maximize the rate at which magnetic field lines are cut.\n    + **Increase Speed of Rotation:** Design the hand crank mechanism with gears to allow the coil (or magnet) to spin at a very high rotational speed for a given hand-crank speed. Faster spinning means field lines are cut more rapidly.\n    + **Use a Stronger Magnet:** Incorporate a powerful permanent magnet (e.g., neodymium magnet) to create a denser magnetic field. A stronger field means more field lines are cut per second for the same motion.\n- Step 2: **Optimizing the Coil Design:**\n    + **Increase Number of Turns:** Use a coil with a very large number of turns. Each turn contributes to the total induced PD, so more turns lead to a higher overall voltage.\n    + **Increase Coil Area:** Design the coil to have a larger cross-sectional area. A wider coil ensures that more magnetic field lines pass through it and a greater length of wire is effectively cutting these lines.\n- Step 3: **Practical Considerations and Trade-offs:**\n    + **Type of Generator:** An alternator is generally simpler to build than a dynamo with a commutator, and an LED can be powered by AC (though it will flicker rapidly, or require a rectifier circuit). For maximum power, an alternator-like design is suitable.\n    + **Ergonomics vs. Output:** There's a practical limit to how fast a person can crank and the size/weight of the generator. The design would need to balance these factors to provide sufficient power while remaining portable and operable.\n    + **LED Characteristics:** An LED has a specific forward voltage. The generator must induce a PD at least equal to this voltage for the LED to light up, and ideally higher for brighter operation within the LED's current limits.\n\nBy considering these factors, the design aims to generate the highest possible voltage and current from a given mechanical input.", "source": "Gemini 2.5 Flash ②", "blind_id": 79}, {"id": "gflash_1_20", "question": "What are the three essential components of a transformer, and what is the specific material property required for one of these components to function effectively? (2 steps)", "answer": "- Step 1: **Essential Components:** The three essential components of a transformer are:\n    + **Primary coil:** The coil connected to the input alternating current (AC) source.\n    + **Secondary coil:** The coil from which the output alternating potential difference (PD) is drawn.\n    + **Iron core:** A closed loop of magnetic material that links the primary and secondary coils.\n- Step 2: **Material Property of the Iron Core:** The iron core must be made of a material that is **easily magnetised and demagnetised**. This property is crucial because the transformer relies on a *changing* magnetic field. The alternating current in the primary coil creates a continuously changing magnetic field, and the iron core needs to efficiently carry (and concentrate) this changing field from the primary to the secondary coil without retaining significant magnetism itself (i.e., it should be a \"soft\" magnetic material).\n\nThe iron core acts as an efficient conduit for the changing magnetic flux between the two coils.", "source": "Gemini 2.5 Flash ①", "blind_id": 82}, {"id": "glm_3_8", "question": "If you were to view the output PD of an alternator and a dynamo on an oscilloscope as their coils rotate at the same speed, how would the visual traces differ, and why? (2 steps)", "answer": "- Step 1: The alternator trace would show a sine wave that swings both above and below the zero line (positive and negative regions). This is because the slip rings allow the induced PD to naturally reverse direction every half-turn.\n- Step 2: The dynamo trace would show a bumpy positive-only trace (varying from zero to a maximum, never crossing into negative). This is because the split-ring commutator swaps the connections every half-turn, flipping the negative half-cycles into positive ones so the current always leaves in the same direction.", "source": "GLM 5.1 ③", "blind_id": 83}, {"id": "minimax_1_20", "question": "Why are the primary and secondary coils of a transformer physically separated but linked magnetically? (2 steps)", "answer": "- Step 1: The coils are electrically isolated (no direct wire connection) because they operate at different voltages. Direct connection would either short the circuit or expose low-voltage devices to dangerously high voltages.\n- Step 2: They are linked **magnetically** through the iron core. The primary's alternating current creates a changing magnetic field; the iron core channels this changing flux directly through the secondary coil. This \"magnetic coupling\" induces the output voltage without any physical electrical connection. It's a key safety feature — it breaks the circuit while transferring energy.", "source": "MiniMax M1 ①", "blind_id": 104}, {"id": "minimax_2_17", "question": "What is the difference between a step-up transformer and a step-down transformer in terms of the number of turns on the coils and the resulting voltage? (2 steps)", "answer": "- Step 1: A **step-up transformer** has **more turns on the secondary coil** than on the primary coil ($n_s > n_p$). This increases the voltage — the output voltage is higher than the input voltage ($V_s > V_p$).\n- Step 2: A **step-down transformer** has **fewer turns on the secondary coil** than on the primary coil ($n_s < n_p$). This decreases the voltage — the output voltage is lower than the input voltage ($V_s < V_p$).\n+ Example: If primary has 100 turns and secondary has 1000 turns, it's a step-up (×10 voltage).\n\n**Takeaway:** More secondary turns = step-up (V ↑). Fewer secondary turns = step-down (V ↓).", "source": "MiniMax M1 ②", "blind_id": 110}, {"id": "minimax_1_18", "question": "Two identical magnets are dropped at the same speed: one falls through empty space, the other falls through a copper pipe. The fall through the copper pipe is much slower. Explain this using electromagnetic induction. (3 steps)", "answer": "- Step 1: As the magnet falls through the copper pipe, its motion cuts through the atoms of the copper (a conductor). This induces currents in the pipe — called **eddy currents** — which themselves create their own magnetic field.\n- Step 2: By Lenz's law, this induced magnetic field **opposes the change** that created it. The induced field opposes the magnet's motion, creating an upward force that slows the magnet's fall.\n- Step 3: In contrast, the magnet falling through empty space has no conductor to induce currents in, so no opposing field is created — it falls freely (accelerating due to gravity). The copper pipe acts as a \"magnetic brake\" purely through electromagnetic induction. This is also why some braking systems use electromagnetic induction — the kinetic energy is converted to heat in the conductor.", "source": "MiniMax M1 ①", "blind_id": 111}, {"id": "minimax_1_21", "question": "A magnet is pushed quickly into a coil, then held stationary, then pulled out. Describe how the voltmeter reading changes at each stage, and explain why. (3 steps)", "answer": "- Step 1: **Pushing in quickly:** The magnet's motion cuts field lines through the coil — an induced PD is created. The voltmeter shows a reading (deflects one way). The faster the push, the larger the PD.\n- Step 2: **Held stationary:** No motion = no cutting of field lines = no change in magnetic flux through the coil. The voltmeter reads **zero**. Even though a strong magnetic field is present, induction requires *change*, not just presence.\n- Step 3: **Pulling out:** The magnet moving in the opposite direction cuts field lines again, but now in the reverse sense. The induced PD reverses polarity — the voltmeter deflects the opposite way. The magnitude depends on the speed of withdrawal.", "source": "MiniMax M1 ①", "blind_id": 112}, {"id": "glm_3_3", "question": "A student claims \"using a coil with more loops will increase the induced PD because there are more coils.\" What is the conceptual error in their phrasing, and how should it be corrected? (3 steps)", "answer": "- Step 1: The error is using the term \"more coils\" instead of \"more turns on a coil.\"\n- Step 2: A \"coil\" refers to the entire solenoid structure, while a \"turn\" refers to a single loop of wire within that coil. Adding a separate, disconnected coil does not automatically add the voltages together.\n- Step 3: The correct phrasing is that an increase in the number of *turns* on the same coil increases the induced PD, because the PDs from each loop add up in series.", "source": "GLM 5.1 ③", "blind_id": 114}, {"id": "minimax_2_32", "question": "A simple a.c. generator produces a sine-wave output. Sketch what the output voltage would look like over time, and explain why it is sinusoidal rather than a flat d.c. waveform. (3 steps)", "answer": "- Step 1: The output voltage rises from zero to a maximum positive value, falls back through zero to a maximum negative value, and returns to zero — repeating this pattern in a smooth wave (sine wave).\n- Step 2: As the coil rotates, the rate at which it cuts field lines changes continuously. When the coil is moving *parallel* to the field lines (vertical position), it cuts none — voltage is zero. When moving *perpendicular* (horizontal position), it cuts most rapidly — voltage is maximum.\n- Step 3: This continuous change in cutting rate produces the smooth sinusoidal shape — neither a sudden jump nor a constant value.\n+ This is why a.c. generators naturally produce smooth alternating waveforms.\n\n**Takeaway:** Continuous change in cutting angle → smooth sinusoidal output (not sudden jumps).", "source": "MiniMax M1 ②", "blind_id": 122}, {"id": "gemini_3_10", "question": "Explain, step-by-step, how a **split-ring commutator** in a dynamo turns the naturally alternating voltage of a spinning coil into a direct current output. (3 steps)", "answer": "- Step 1: As one side of the coil (let's call it the red side) moves up through the magnetic field, a current is induced in one direction. This current flows out through one half of the commutator to a brush and into the external circuit.\n- Step 2: After the coil rotates 180 degrees, the red side is now moving *down* through the magnetic field. This reverses the direction of the induced current *within the coil itself*.\n- Step 3: Crucially, at the exact same moment the current in the coil reverses, the split-ring commutator has also rotated 180 degrees. The other half of the commutator is now touching the original brush. This reversal of connection cancels out the reversal of current in the coil, so the current in the *external circuit* continues to flow in the same direction as before.\n\nThe commutator acts as a mechanical switch, reversing the connections every half turn to keep the external current flowing one way.", "source": "Gemini 2.5 Pro ③", "blind_id": 126}, {"id": "gemini_1_13", "question": "Describe the output voltage graph of a simple dynamo and explain why it appears \"bumpy\" rather than being a flat, constant d.c. voltage.", "answer": "The output graph of a simple dynamo is a series of positive \"humps\". The voltage rises from zero to a maximum, falls back to zero, and then immediately repeats this positive pulse. It never becomes negative.\n\nIt is \"bumpy\" because the voltage induced in the spinning coil is naturally alternating (sinusoidal). The dynamo's commutator flips the negative parts of the wave into positive ones, but it doesn't smooth them out. The voltage is still at a maximum when the coil is horizontal (cutting field lines fastest) and drops to zero every time the coil passes through the vertical position (moving parallel to the field).", "source": "Gemini 2.5 Pro ①", "blind_id": 129}, {"id": "gflash_1_31", "question": "A household appliance needs 12V DC. Why does its adapter typically contain a step-down transformer, and what other components might be needed to achieve the required DC output? (3 steps)", "answer": "- Step 1: **Step-down Transformer for Voltage Reduction:** The adapter contains a step-down transformer because household mains electricity is typically supplied as high-voltage AC (e.g., $$230\\,\\text{V}$$ AC in the UK). The appliance, however, requires a much lower voltage (12V). The step-down transformer efficiently *reduces this high AC voltage* to a lower AC voltage (close to 12V AC) that is more suitable for the internal electronics of the appliance.\n- Step 2: **Rectifier for AC to DC Conversion:** Since the appliance requires **DC** (direct current) and the transformer only outputs a lower **AC** voltage, additional components are needed. A **rectifier** circuit, typically made of diodes, is used to convert the alternating current into pulsating direct current. Diodes allow current to flow in only one direction, effectively \"chopping off\" or \"inverting\" the negative half-cycles of the AC waveform.\n- Step 3: **Smoothing Circuit for Stable DC:** The output from a rectifier is not a perfectly smooth DC; it's a pulsating DC. To achieve a stable, smooth 12V DC, a **smoothing circuit** (often involving capacitors) is added. Capacitors store charge during the peaks of the pulsating DC and discharge it during the dips, effectively smoothing out the voltage ripples to produce a more constant DC output, which is then suitable for the sensitive electronics of the appliance.\n\nThe transformer handles voltage scaling, while rectification and smoothing convert the AC to the required stable DC.", "source": "Gemini 2.5 Flash ①", "blind_id": 139}, {"id": "gflash_2_1", "question": "Differentiate between the motor effect and the generator effect, specifically contrasting the input, output, and underlying physical interaction for each. (3 steps)", "answer": "- Step 1: **Motor Effect (Input, Output, Interaction):**\n    + **Input:** An electrical current flowing through a conductor placed within a magnetic field.\n    + **Output:** A mechanical force exerted on the conductor, causing it to move.\n    + **Underlying Interaction:** The magnetic field produced by the current in the conductor interacts with the external magnetic field, resulting in a force. This is governed by Fleming's Left-Hand Rule.\n    + **Purpose:** Converts electrical energy into mechanical energy (e.g., in electric motors).\n- Step 2: **Generator Effect (Input, Output, Interaction):**\n    + **Input:** Relative mechanical motion between a conductor and a magnetic field (i.e., the conductor \"cuts\" magnetic field lines).\n    + **Output:** An induced potential difference (voltage) across the conductor, which can drive an induced current if a complete circuit is formed.\n    + **Underlying Interaction:** The motion of the conductor through the magnetic field causes the free charges within the conductor to experience a force, separating positive and negative charges to create a potential difference. This is governed by Fleming's Right-Hand Rule (for the direction of induced current/PD).\n    + **Purpose:** Converts mechanical energy into electrical energy (e.g., in generators, alternators).\n- Step 3: **Core Distinction and Inverse Relationship:** The motor effect and generator effect are essentially inverse processes.\n    + The motor effect *uses* current to *create motion*.\n    + The generator effect *uses motion* to *create current/voltage*.\n    They highlight the fundamental interplay between electricity and magnetism, where one can be transformed into the other.\n\nUnderstanding this distinction is crucial for comprehending how devices like motors, generators, and microphones function.", "source": "Gemini 2.5 Flash ②", "blind_id": 143}, {"id": "glm_3_21", "question": "A student takes a conventional d.c. dynamo and connects a battery to its output terminals instead of mechanically spinning the coil. What will happen, and what does this reveal about the underlying physics? (2 steps)", "answer": "- Step 1: A dynamo contains a coil in a magnetic field connected via a split-ring commutator. By supplying a d.c. current from a battery, the student is applying the motor effect, not the generator effect.\n- Step 2: The current-carrying coil will experience a force in the magnetic field (following Fleming's left-hand rule), causing it to spin. The device now functions as a d.c. electric motor, demonstrating that generators and motors are structurally identical but operate via inverse physical effects.", "source": "GLM 5.1 ③", "blind_id": 150}, {"id": "gemini_1_1", "question": "What does it mean for a conductor to \"cut\" magnetic field lines, and why is this essential for inducing a voltage?", "answer": "- **Step 1:** Imagine magnetic field lines as invisible threads stretching from the north pole to the south pole of a magnet. \"Cutting\" these lines means the conductor is moving in a way that it crosses through them, like a knife slicing through strings.\n- **Step 2:** The induction of a voltage is caused by the magnetic field exerting a force on the free electrons within the conductor. This force only acts when the electrons are moving *across* the field lines. This force pushes the electrons to one end of the conductor, creating an excess of negative charge at that end and a deficit at the other.\n- **Step 3:** This separation of charge is what we call a potential difference (or voltage). Without the cutting motion, the magnetic force doesn't act to separate the charges, so no voltage is induced.", "source": "Gemini 2.5 Pro ①", "blind_id": 173}, {"id": "minimax_2_29", "question": "When a magnet is pushed into a coil, the induced current creates a magnetic field that repels the magnet. Where does the energy for this \"repulsion\" come from? (2 steps)", "answer": "- Step 1: The energy comes from the mechanical work you do when pushing the magnet into the coil.\n- Step 2: As you push the magnet in, you have to overcome the repulsive force from the induced magnetic field. This mechanical work is converted into electrical energy (the induced current does work in the circuit).\n+ This is why moving the magnet feels \"harder\" when the circuit is complete (current flows) compared to when it's open (no current, no resistance to motion).\n\n**Takeaway:** Mechanical work → Electrical energy (via Lenz's law / opposing field).", "source": "MiniMax M1 ②", "blind_id": 176}, {"id": "gflash_2_2", "question": "What factors determine the magnitude (size) of the induced potential difference (PD) in a conductor or coil, and how does each factor influence it? (4 steps)", "answer": "- Step 1: **Rate of Cutting Magnetic Field Lines:** The fundamental principle is that the induced PD is directly proportional to the rate at which magnetic field lines are cut by the conductor. The faster the lines are cut, the larger the induced PD.\n- Step 2: **Factors Influencing the Rate of Cutting Field Lines:**\n    + **Speed of Relative Motion:** If the conductor or magnet moves faster, it cuts through more field lines per unit time. Therefore, **increasing the speed of relative motion increases the induced PD.**\n    + **Strength of the Magnetic Field:** A stronger magnetic field means the magnetic field lines are denser (closer together). If the conductor moves at the same speed through a stronger field, it will cut through more field lines in the same amount of time. Therefore, **increasing the strength of the magnetic field increases the induced PD.**\n- Step 3: **Factors Specific to Coils:**\n    + **Number of Turns on the Coil:** When a coil is used, each individual turn acts as a conductor. The PD induced in each turn adds up. Therefore, **increasing the number of turns on the coil increases the total induced PD.** For instance, doubling the turns would roughly double the induced PD, assuming all other factors remain constant.\n    + **Area / Size of the Coil:** A larger coil area means that more magnetic field lines can pass through it, and a larger length of wire is available to cut through the field lines as it moves. Therefore, **increasing the area or size of the coil increases the induced PD.** This factor is more directly related to how much magnetic *flux* (total number of field lines) can change through the coil.\n- Step 4: **Summary and Practical Implication:** All these factors essentially boil down to increasing the \"effectiveness\" or \"intensity\" of the interaction between the conductor and the magnetic field. In practical generators, engineers design devices to maximize these factors (e.g., using strong magnets, many coil turns, and high rotational speeds) to produce a significant output voltage.\n\nThese factors allow for control over the electrical output generated from mechanical input.", "source": "Gemini 2.5 Flash ②", "blind_id": 183}, {"id": "gflash_1_19", "question": "Describe how a loudspeaker converts an electrical signal back into sound waves, detailing the role of the alternating current. (3 steps)", "answer": "- Step 1: **Electrical Signal Input:** A loudspeaker receives an alternating electrical current (AC) signal from an amplifier. This AC signal represents the original sound waves. The coil of the loudspeaker is typically wrapped around one pole of a permanent magnet or placed within a strong magnetic field. The coil is attached to a cone or diaphragm.\n- Step 2: **Motor Effect and Force Generation:** As the alternating current flows through the coil, it experiences a force due to the **motor effect**. According to Fleming's Left-Hand Rule, a current-carrying conductor in a magnetic field experiences a force. Because the input current is *alternating*, its direction continuously reverses. This means the force exerted on the coil also continuously reverses its direction.\n- Step 3: **Sound Wave Production:** This oscillating force causes the coil and the attached cone to vibrate rapidly back and forth. The vibrating cone then pushes and pulls on the surrounding air, creating compressions and rarefactions that propagate outwards as **sound waves**, effectively converting the electrical signal back into audible sound. The frequency and amplitude of the alternating current determine the pitch and loudness of the sound produced.\n\nThe loudspeaker uses the motor effect to translate the electrical signal's fluctuations into physical vibrations that generate sound.", "source": "Gemini 2.5 Flash ①", "blind_id": 187}, {"id": "gflash_1_17", "question": "Explain how a moving-coil microphone converts sound waves into an electrical signal, identifying the core physical principle involved. (3 steps)", "answer": "- Step 1: **Sound Wave Interaction:** A moving-coil microphone consists of a diaphragm (a thin, flexible membrane) attached to a coil of wire. This coil is positioned within the magnetic field of a permanent magnet. When sound waves, which are pressure variations in the air, hit the diaphragm, they cause it to vibrate back and forth.\n- Step 2: **Coil Movement and Field Line Cutting:** As the diaphragm vibrates in response to the sound waves, the attached coil also moves back and forth within the stationary magnetic field of the permanent magnet. This motion causes the coil to continuously cut the magnetic field lines.\n- Step 3: **Induced Electrical Signal:** According to the principle of **electromagnetic induction** (also known as the generator effect), when a conductor (the coil) cuts magnetic field lines, a potential difference is induced across it. Since the sound waves cause the coil to oscillate back and forth, the direction and magnitude of the induced PD continuously change, resulting in an **alternating potential difference** (and thus an alternating current) that mirrors the pattern of the incoming sound waves. This electrical signal is then sent for amplification or recording.\n\nThe microphone uses the generator effect to transform mechanical vibrations into an analogous electrical signal.", "source": "Gemini 2.5 Flash ①", "blind_id": 188}, {"id": "gflash_2_9", "question": "Explain the basic structure of a transformer and the full sequence of steps by which it changes an input alternating potential difference (PD) into an output alternating PD. Why is an alternating current essential for its operation? (4 steps)", "answer": "- Step 1: **Structure of a Transformer:** A transformer consists of two separate coils of wire, called the **primary coil** and the **secondary coil**. These coils are wound around a common, closed **iron core**. The iron core is made of a soft magnetic material that is easily magnetized and demagnetized.\n- Step 2: **Operation Sequence (Input to Magnetic Field):**\n    + An **alternating current (a.c.)** is supplied to the **primary coil**.\n    + This alternating current constantly changes its direction and magnitude.\n    + A changing current in the primary coil produces a continually **changing magnetic field** around the primary coil. The magnetic field lines expand and collapse, and their direction reverses with the a.c.\n- Step 3: **Operation Sequence (Magnetic Field to Output):**\n    + The **iron core** is designed to be highly permeable to magnetic fields. It effectively \"channels\" or \"carries\" this changing magnetic field from the primary coil through its material and into the secondary coil.\n    + As this changing magnetic field passes through the secondary coil, the magnetic field lines are continuously cut by the turns of the secondary coil.\n    + According to the principle of electromagnetic induction (generator effect), this continuous cutting of field lines induces an **alternating potential difference (PD)** across the secondary coil. The induced PD has the same frequency as the input a.c.\n    + If the secondary coil is connected to a complete circuit, an alternating current will flow through it.\n- Step 4: **Why AC is Essential:** A transformer **does NOT work with direct current (d.c.)**.\n    + If direct current were supplied to the primary coil, it would produce a **constant (non-changing) magnetic field**.\n    + A constant magnetic field does not involve any cutting of magnetic field lines by the secondary coil, nor does it represent a *change* in magnetic flux through the secondary coil.\n    + Without a changing magnetic field, there is no electromagnetic induction in the secondary coil, and therefore no potential difference or current would be induced.\n    The dynamic nature of alternating current is the fundamental requirement for a transformer to function.\n\nTransformers are crucial for efficient power transmission and voltage conversion in electrical systems.", "source": "Gemini 2.5 Flash ②", "blind_id": 191}, {"id": "minimax_1_17", "question": "Explain why long-distance power transmission uses high-voltage a.c. rather than high-voltage d.c. (2 steps)", "answer": "- Step 1: High-voltage a.c. allows the use of **transformers** to easily change voltage levels. After the power station, a step-up transformer raises voltage for efficient transmission; near consumers, step-down transformers lower it to safe levels. This voltage transformation is simple and efficient with a.c.\n- Step 2: While high-voltage d.c. would also reduce $I^2R$ losses, converting between d.c. voltage levels is technically complex and expensive (requires rectifier/converter circuits). Additionally, a.c. is easier to generate with rotating machines (alternators). Modern systems do use some d.c. transmission (HVDC), but a.c. with transformers remains the standard for the National Grid because it's cheaper and simpler to implement.", "source": "MiniMax M1 ①", "blind_id": 193}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A straight wire is moved through a region with a uniform magnetic field, and a voltmeter attached to the wire registers a reading. What specific condition must be satisfied for this reading to occur, and what is this phenomenon called? (2 steps)", "answer": "- Step 1: The phenomenon is called **electromagnetic (EM) induction** (or the generator effect). It occurs when a conductor and a magnetic field move relative to one another such that the conductor *cuts* the magnetic field lines.\n- Step 2: The specific condition is that there must be **relative motion** causing field lines to be cut. If the wire moves parallel to the field lines, or if the wire and magnet are both stationary, no potential difference (PD) is induced, and the voltmeter reads zero.\n\nThe core principle: no field lines cut → no induced PD.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A physics teacher states: \"The motor effect and the generator effect are opposites.\" In terms of inputs and outputs, what does she mean? (2 steps)", "answer": "- Step 1: The **motor effect** converts electrical energy into mechanical motion. Its input is a *current* already flowing in a conductor placed in a magnetic field, and its output is a *force* (and thus motion) on that conductor.\n- Step 2: The **generator effect** does the reverse: it converts mechanical motion into electrical energy. Its input is the *motion* of a conductor through a magnetic field, and its output is an *induced potential difference* (and current, if in a complete circuit).\n\nThink of them as inverse processes: Motor = Current → Force; Generator = Motion → Induced PD.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "A student pushes a magnet into a coil faster and notices the induced potential difference increases. Why does a higher speed cause a larger induced PD? (2 steps)", "answer": "- Step 1: Induced PD depends on the *rate* at which magnetic field lines are cut. Speed is a measure of how fast this cutting happens.\n- Step 2: Moving the magnet (or coil) faster means more field lines are cut per second. Because the rate of change of the magnetic field through the coil is greater, a larger induced PD is produced.\n\nIt is the *rate of change* that matters, not just the change itself.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Two identical magnets are pushed at the exact same speed into two different coils. Coil A has 50 turns; Coil B has 100 turns. Which coil produces a larger induced PD, and why? (2 steps)", "answer": "- Step 1: Coil B (with 100 turns) produces the larger induced PD.\n- Step 2: Each individual turn of wire cuts the same magnetic field lines, inducing a small PD. The total PD across the whole coil is the sum of the PDs from each turn. Therefore, doubling the number of turns doubles the total induced PD (assuming all else is equal).\n\nRemember to say \"more *turns*\", not \"more *coils*\"—a coil is the whole object, turns are the individual loops that add up the voltage.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A magnet is pushed N-pole-first into a coil, and the coil's near end becomes a North pole, repelling the magnet. If the magnet is then pulled away from the coil, what magnetic pole appears at the near end of the coil, and why? (3 steps)", "answer": "- Step 1: The direction of the induced PD always *opposes* the change that produces it (Lenz's law behavior).\n- Step 2: When the N-pole is pushed *in*, the coil opposes this approach by becoming a North pole (like poles repel), pushing back against the motion.\n- Step 3: When the N-pole is pulled *away*, the coil opposes this departure by becoming a **South pole** at the near end. Opposite poles attract, so the coil tries to attract the magnet back to stop it from leaving.\n\nThe induced field always acts as a brake on whatever relative motion is causing the induction, conserving energy.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "A coil spins inside a magnetic field and connects to an external circuit via two continuous, unbroken metal rings pressed by brushes. What type of current is produced, and what is the function of these rings? (3 steps)", "answer": "- Step 1: The device is an **alternator**, and it produces **alternating current (a.c.)**.\n- Step 2: The continuous metal rings are called **slip rings**. Their function is to maintain a continuous electrical connection between the spinning coil and the stationary external circuit (via the brushes).\n- Step 3: Because the rings do *not* swap the connections every half-turn, as the coil rotates past the halfway point, the induced PD reverses direction. This causes the output current to swing between positive and negative, creating the alternating current.\n\nSlip rings preserve the raw alternating output of a spinning coil.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "A coil spins in a magnetic field, but this time it connects to the external circuit via a single ring split into two halves. How does this change the output compared to using slip rings, and what is the name of this component? (3 steps)", "answer": "- Step 1: The component is a **split-ring commutator**, and the device is a **dynamo** (d.c. generator).\n- Step 2: The split-ring commutator reverses the connections between the coil and the external circuit every half-turn, exactly when the coil's induced PD would naturally reverse direction.\n- Step 3: Because the connection swaps at the exact moment the current would flip, the current in the external circuit is forced to always flow in the *same direction*. The output is **direct current (d.c.)**, varying from zero to a maximum but never crossing into negative values.\n\nThe split-ring commutator acts as an automatic switch that \"corrects\" the alternating current into a direct current.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "A bicycle dynamo is often assumed to produce direct current because of its name. What is the actual output of a typical bicycle dynamo, and why does its unique design cause this? (3 steps)", "answer": "- Step 1: A bicycle dynamo actually produces **alternating current (a.c.)**.\n- Step 2:** Unlike a conventional dynamo (which spins a coil inside a fixed magnet using a split-ring commutator), a bicycle dynamo spins a *magnet* inside (or next to) a fixed coil.\n- Step 3: As the magnet rotates, its magnetic field direction through the fixed coil continually reverses. This alternating field direction induces a PD that swings positive and negative, resulting in a.c. There is no commutator to flip this into d.c.\n\nThe name \"dynamo\" is historically misleading here; the rotating-magnet mechanism guarantees an alternating output.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "A moving-coil microphone picks up sound and converts it into an electrical signal. Which physics effect does it rely on—the motor effect or the generator effect—and how does the sound create the signal? (3 steps)", "answer": "- Step 1: It relies on the **generator effect** (electromagnetic induction).\n- Step 2: Sound waves consist of varying air pressure. When they hit the microphone, they vibrate a diaphragm, which is attached to a coil of wire.\n- Step 3: The coil sits in a permanent magnetic field. As the diaphragm vibrates, the coil moves back and forth, cutting the magnetic field lines. This motion induces an alternating potential difference (and thus an a.c. signal) in the coil, matching the sound wave's pattern.\n\nThe microphone is essentially a tiny generator powered by sound vibrations.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "A loudspeaker converts an alternating electrical signal into sound waves. Which physics effect drives the cone's motion, and why can't the generator effect do this? (3 steps)", "answer": "- Step 1: A loudspeaker relies on the **motor effect**.\n- Step 2: An a.c. signal flows through a coil wrapped around one pole of a permanent magnet. The current in the coil creates its own changing magnetic field, which interacts with the permanent field, exerting a force on the coil (governed by Fleming's left-hand rule).\n- Step 3: The generator effect cannot do this because it *creates* a voltage from motion; it does not *create* motion from a voltage. The motor effect is the exact inverse: it takes an electrical current and produces a mechanical force, oscillating the coil and the attached cone to push air and create sound.\n\nMicrophone = motion → current (generator). Loudspeaker = current → motion (motor).", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Inside a transformer, the primary and secondary coils are wrapped around a core made of iron, not plastic or a permanent magnet. Why is iron specifically required, and why would a permanent magnet fail? (3 steps)", "answer": "- Step 1: The core must carry a **changing** magnetic field from the primary coil to the secondary coil. Iron is \"soft\" magnetically, meaning it is **easily magnetised and demagnetised**.\n- Step 2: As the a.c. in the primary coil alternates, the iron core magnetises, demagnetises, and remagnetises in the opposite direction in perfect sync. This efficiently transfers the changing field to the secondary coil.\n- Step 3: A permanent magnet would fail because it has a fixed, unchanging magnetic field. It cannot constantly reverse its polarity in sync with the alternating current, so it cannot deliver a *changing* field to the secondary coil. Plastic would fail as it is not magnetic at all.\n\nThe iron core is a dynamic magnetic bridge, not a static magnet.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "A student connects a battery (pure d.c.) to the primary coil of a transformer and expects a continuous output from the secondary coil. Why will the transformer fail to produce a sustained output? (3 steps)", "answer": "- Step 1: A transformer only works with **alternating current (a.c.)**.\n- Step 2: EM induction requires a *changing* magnetic field. When the battery is first connected, there is a brief change in current (from 0 to steady), which induces a momentary pulse of PD in the secondary coil.\n- Step 3: Once the d.c. current reaches its steady state, the current and therefore the magnetic field in the primary coil become constant. A constant field does not cut the secondary coil's turns, so no further PD is induced. The output immediately drops to zero.\n\nSteady d.c. provides no rate of change, starving the generator effect.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "A transformer has 100 turns on its primary coil and 500 turns on its secondary coil. Is this a step-up or step-down transformer, and how do the voltage and current change from primary to secondary? (3 steps)", "answer": "- Step 1: It is a **step-up transformer** because the secondary coil has more turns ($$n_s > n_p$$; 500 > 100).\n- Step 2: Because $$n_s > n_p$$, the voltage steps up: $$V_s > V_p$$. The PD is increased by the same ratio as the turns (here, 5 times larger).\n- Step 3: However, an ideal transformer cannot create energy. By conservation of power ($$V_p I_p = V_s I_s$$), if the voltage goes up, the current must go down. Therefore, $$I_s < I_p$$. The current in the secondary coil is lower.\n\nStep-up = more turns, higher voltage, lower current.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Why does the equation $$\\frac{V_p}{V_s} = \\frac{n_p}{n_s}$$ make intuitive sense when thinking about how a transformer works? (3 steps)", "answer": "- Step 1: The alternating current in the primary coil creates a changing magnetic field, which passes through the iron core and cuts through *every single turn* on both the primary and secondary coils.\n- Step 2: Because each turn is cut by the same changing magnetic field, each turn induces roughly the same amount of PD. The total voltage in a coil is simply the \"voltage per turn\" multiplied by the number of turns.\n- Step 3: Therefore, the ratio of the total voltages ($$V_p$$ to $$V_s$$) must exactly equal the ratio of the number of turns ($$n_p$$ to $$n_s$$), since the \"voltage per turn\" is the shared baseline for both coils.\n\nThe turns ratio is a direct scaling factor for the voltage because each loop acts as an identical generator wired in series.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Why must an ideal transformer obey the equation $$V_p I_p = V_s I_s$$? What fundamental physics principle forces this to be true? (3 steps)", "answer": "- Step 1: This equation is a statement of **conservation of energy**.\n- Step 2: Power is the rate of energy transfer ($$P = VI$$). The input power ($$V_p I_p$$) is the energy entering the transformer per second from the primary coil.\n- Step 3: An ideal transformer is defined as 100% efficient—no energy is lost to heat in the wires or core. Therefore, the energy leaving the transformer per second (output power, $$V_s I_s$$) must exactly equal the energy entering it. If $$V$$ is stepped up, $$I$$ must be stepped down to keep the product (power) constant.\n\nA transformer changes voltage and current, but it cannot multiply energy.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "The National Grid transmits electricity at very high voltages (e.g., 132 kV or more). Why is a low transmission current essential for efficiency, and how does high voltage guarantee a low current? (3 steps)", "answer": "- Step 1: Transmission cables have electrical resistance. When current flows through resistance, some electrical energy is converted to heat ($$P_{loss} = I^2R$$). To minimise this wasted energy, the current $$I$$ must be kept as low as possible.\n- Step 2: The power to be delivered to consumers is fixed ($$P = IV$$). For a given power $$P$$, the equation rearranges to $$I = \\frac{P}{V}$$.\n- Step 3: Therefore, to transmit the same power, increasing the voltage $$V$$ forces the current $$I$$ to decrease. A step-up transformer raises the voltage after the power station, ensuring the current in the grid cables is very low, which minimises resistive heating losses.\n\nHigh V → Low I (for the same power) → Low $$I^2R$$ heat loss.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Why is the power loss in a transmission cable proportional to the *square* of the current ($$P = I^2R$$), rather than just the current? Derive this from a more basic power equation. (3 steps)", "answer": "- Step 1: The general formula for electrical power dissipated in a component is $$P = VI$$, where $$V$$ is the potential difference across the component and $$I$$ is the current.\n- Step 2: For a transmission cable, the PD across it is purely due to its resistance, so Ohm's law applies: $$V = IR$$.\n- Step 3: Substitute the Ohm's law expression for $$V$$ into the power equation: $$P = (IR) \\times I = I^2R$$. Because the current $$I$$ is multiplied by itself, doubling the current doesn't just double the power loss—it quadruples it.\n\nThis squared relationship is why even a small reduction in transmission current yields a massive saving in energy lost as heat.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A transmission cable carries a current of 100 A and loses a certain amount of power as heat. If a step-up transformer reduces the current in the cable to 50 A, by what factor does the power loss decrease? (2 steps)", "answer": "- Step 1: Power loss is given by $$P_{loss} = I^2R$$. The resistance $$R$$ of the cable remains constant.\n- Step 2: The current is halved (from 100 A to 50 A). Because power loss depends on the *square* of the current, the new power loss is $$(0.5I)^2R = 0.25I^2R$$. The power loss decreases by a factor of **4** (it is quartered).\n\nHalving the current quarters the heat loss—this is the core economic justification for high-voltage grid transmission.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "A transformer is used to convert mains voltage (230 V) to a lower voltage (12 V) for a device. If the primary coil has 1150 turns, how many turns does the secondary coil have? (3 steps)", "answer": "- Step 1: Use the transformer turns equation: $$\\frac{V_p}{V_s} = \\frac{n_p}{n_s}$$. Identify the knowns: $$V_p = 230$$ V, $$V_s = 12$$ V, $$n_p = 1150$$ turns.\n- Step 2: Rearrange the equation to solve for $$n_s$$: $$n_s = n_p \\times \\frac{V_s}{V_p}$$.\n- Step 3: Substitute the values: $$n_s = 1150 \\times \\frac{12}{230} = 1150 \\times \\frac{12}{230} = 5 \\times 12 = 60$$ turns.\n\nBecause it is a step-down transformer, the secondary must have fewer turns (60 < 1150), consistent with the lower voltage.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "An ideal step-up transformer converts 100 V to 200 V. If a device on the secondary side draws 2 A, what current must flow in the primary coil? (3 steps)", "answer": "- Step 1: For an ideal transformer, input power equals output power: $$V_p I_p = V_s I_s$$.\n- Step 2: Substitute the known values: $$100 \\times I_p = 200 \\times 2 = 400$$.\n- Step 3: Solve for $$I_p$$: $$I_p = \\frac{400}{100} = 4$$ A.\n\nNotice that because the voltage doubled, the current was halved (4 A → 2 A). The transformer trades voltage for current to conserve power.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "What is the sequence of events inside a transformer that allows an alternating PD in the primary coil to induce an alternating PD in the secondary coil? (4 steps)", "answer": "- Step 1: An alternating current is supplied to the **primary coil**, which continually changes direction.\n- Step 2: This alternating current produces a **changing magnetic field** around the primary coil.\n- Step 3: The **iron core** carries (links) this changing magnetic field into the **secondary coil**.\n- Step 4: The changing magnetic field cuts through the turns of the secondary coil, inducing an **alternating potential difference** in it (at the same frequency as the input).\n\nThe iron core ensures the magnetic link is tight, making the energy transfer highly efficient.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "A magnet is held completely still inside the hollow center of a coil. A sensitive voltmeter is attached to the coil. What will the voltmeter read, and why? (2 steps)", "answer": "- Step 1: The voltmeter will read **zero**.\n- Step 2: For EM induction to occur, the conductor must *cut* magnetic field lines, which requires relative motion between the conductor and the field. Because the magnet is stationary, no field lines are being cut, so there is no rate of change of flux and no induced PD.\n\nA static field induces nothing; induction demands change.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "A student says: \"A step-up transformer increases the voltage, so it gives you more energy out than you put in.\" Evaluate this statement. (2 steps)", "answer": "- Step 1: The statement is **false**. A transformer cannot create energy; it must obey the conservation of energy.\n- Step 2: While a step-up transformer increases the potential difference ($$V_s > V_p$$), it simultaneously decreases the current ($$I_s < I_p$$). The output power ($$V_s I_s$$) can never exceed the input power ($$V_p I_p$$), and in real transformers, output power is slightly less due to energy lost as heat.\n\nVoltage and current are traded off against each other; total energy is never amplified.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A student says: \"A bigger magnet will always induce a larger PD.\" Correct this statement using the proper terminology from the generator effect. (2 steps)", "answer": "- Step 1: The statement is incorrect because physical *size* does not determine the strength of the magnetic field. A large, weak ceramic magnet may induce less PD than a small, strong neodymium magnet.\n- Step 2: The correct statement is: \"A **stronger** magnetic field will induce a larger PD.\" A stronger field has denser field lines, meaning more lines are cut per second for the same speed, leading to a greater rate of change of flux and a higher induced PD.\n\nAlways refer to field *strength* (density of lines), not magnet *size*.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Where are the step-up and step-down transformers located in the National Grid, and what is the specific purpose of each location? (3 steps)", "answer": "- Step 1: The **step-up transformer** is located immediately *after* the power station. Its purpose is to raise the voltage to a very high level (e.g., ≥ 132 kV) for long-distance transmission, which forces the current down and minimises $$I^2R$$ heat loss in the cables.\n- Step 2: The **step-down transformer** is located *before* homes, buildings, or inside device adapters. Its purpose is to lower the high transmission voltage to a safe, usable level (e.g., 230 V mains, or 5–12 V for electronics).\n- Step 3: This two-stage process ensures that energy waste is minimised over the long transmission lines, while keeping the end-user voltage safe for domestic use.\n\nThe grid sacrifices high current for efficiency on the lines, then trades back for safe voltage at the destination.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}], "count": 25}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "What two conditions must be met for a potential difference to be induced in a conductor, and what happens if that conductor forms a complete circuit? (3 steps)", "answer": "- Step 1: There must be relative motion between the conductor and a magnetic field such that the conductor is physically *cutting* the magnetic field lines.\n- Step 2: If the conductor is stationary relative to the field (or moving parallel to the field lines without cutting them), no potential difference is induced. The key is the *rate of change* of the magnetic field experienced by the conductor.\n- Step 3: If the conductor cutting the field lines is part of a complete circuit, the induced potential difference drives an induced current around that circuit. If the circuit is open, there is still an induced PD, but no current flows.\n\nNo cutting of field lines = no induced PD; closed loop = induced current.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "How do the initial conditions and outcomes of the generator effect differ from those of the motor effect? (2 steps)", "answer": "- Step 1: The generator effect starts with *motion* (a conductor moving through a magnetic field) and *results* in an induced potential difference (and current if closed). There is no initial current in the conductor; it is created by the interaction.\n- Step 2: The motor effect starts with a *current already flowing* in a conductor within a magnetic field and *results* in a force (motion).\n+ Generator effect: Motion → Induced PD/Current.\n+ Motor effect: Current → Force/Motion.\n\nThey are inverse processes; one creates electricity from motion, the other creates motion from electricity.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "If you want to increase the magnitude of the induced potential difference in a generator, what four physical changes could you make to the setup? (2 steps)", "answer": "- Step 1: Increase the *rate* at which field lines are cut. This means either increasing the **speed** of the relative motion (spinning the coil faster) or increasing the **strength of the magnetic field** (denser field lines = more lines cut per second).\n- Step 2: Increase the *amount* of conductor cutting the field lines. This means increasing the **number of turns** on the coil or increasing the **area/size** of the coils.\n\nInduced PD scales up with speed, field strength, turns, and coil area.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "If you push a magnet's North pole into a coil, what magnetic pole is induced at the near end of the coil, and why does this happen? (3 steps)", "answer": "- Step 1: The near end of the coil becomes a **North pole**.\n- Step 2: Like poles repel, so this induced North pole repels the approaching North pole of the magnet, opposing the motion of the magnet being pushed in.\n- Step 3: If you were pulling the magnet away, the near end would become a **South pole** to attract the magnet back, again opposing the change (the motion of pulling away). This is Lenz's law behaviour: the direction of the induced PD always opposes the change that produces it.\n\nThe induced field always acts to resist the motion causing the induction.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Both an alternator and a dynamo involve a coil spinning in a magnetic field. What key structural difference causes one to output a.c. and the other d.c.? (3 steps)", "answer": "- Step 1: An alternator uses **slip rings** and brushes. These are continuous rings, so they maintain the same connection between the spinning coil and the external circuit as the coil rotates.\n- Step 2: Because the connection never swaps, as the coil rotates past the halfway point, the induced PD reverses direction naturally, producing an alternating current (a.c.) that swings positive and negative.\n- Step 3: A dynamo uses a **split-ring commutator**. This ring is split into two halves, and every half-turn, the connections to the external circuit swap. This swapping reverses the reversed PD, forcing the current to always leave in the same direction, producing a direct current (d.c.) that is always positive (varying from zero to max).\n\nSlip rings = natural alternating reversal (a.c.); Split-ring commutator = forced connection swap to keep current one-way (d.c.).", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "A conventional dynamo outputs d.c., but a bicycle dynamo outputs a.c. Given that a bicycle dynamo uses a fixed coil, what must be rotating, and why does this result in a.c. output? (2 steps)", "answer": "- Step 1: In a bicycle dynamo, the wheel drives a **rotating magnet** inside or next to a fixed coil, rather than a coil rotating in a fixed magnet.\n- Step 2: As the magnet spins, its magnetic field direction continually reverses relative to the fixed coil. This constantly changing field direction induces a PD that repeatedly reverses, resulting in alternating current (a.c.).\n\nA spinning magnet's reversing field naturally creates a.c., regardless of the device's name.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "A moving-coil microphone and a loudspeaker look physically similar (coil + magnet + diaphragm/cone). Which effect (motor or generator) does each use, and what is the input vs output for each? (2 steps)", "answer": "- Step 1: A **microphone** uses the **generator effect**. The input is sound waves (pressure variations), which vibrate the diaphragm and attached coil. The coil moves through the magnet's field, cutting lines and inducing an alternating current (the output).\n- Step 2: A **loudspeaker** uses the **motor effect**. The input is an alternating current, which creates a changing magnetic field in the coil. This interacts with the permanent magnet, exerting a force that oscillates the coil and attached cone, pushing air to create sound waves (the output).\n+ Microphone: Sound → Electricity (Generator)\n+ Loudspeaker: Electricity → Sound (Motor)\n\nMicrophone = sound → electricity (generator); Loudspeaker = electricity → sound (motor).", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "A transformer requires an alternating current in the primary coil. Conceptually walk through how this produces a PD in the secondary coil, and explain why a d.c. supply would fail. (4 steps)", "answer": "- Step 1: An alternating current flows into the primary coil, which continually changes direction and magnitude.\n- Step 2: This changing current produces a **changing magnetic field** around the primary coil.\n- Step 3: The **iron core** carries (guides) this changing magnetic field into the secondary coil. The changing field cuts the secondary coil's turns, inducing an alternating PD (via the generator effect).\n- Step 4: A d.c. supply produces a *steady*, unchanging magnetic field. Because the field is not changing, it does not cut the secondary coil's turns at a changing rate, so no PD is induced.\n\nTransformers only work with a.c. because they rely on a *changing* magnetic field to induce a PD.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "If a transformer is designed to step voltage down from mains to a phone charger, how must the number of turns on its secondary coil compare to its primary coil, and what happens to the current? (2 steps)", "answer": "- Step 1: To step voltage *down*, the secondary coil must have **fewer turns** than the primary coil ($$n_s < n_p$$). The induced PD is directly proportional to the turns ratio.\n- Step 2: Because power must be conserved ($$V_p I_p = V_s I_s$$ for an ideal transformer), if the voltage steps down, the current in the secondary coil must step **up** ($$I_s > I_p$$) to maintain equal power on both sides.\n\nStep-down = fewer secondary turns, lower voltage, higher current.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Why does the transformer equation $$\\frac{V_s}{V_p} = \\frac{n_s}{n_p}$$ make physical sense based on how a coil cuts magnetic field lines? (3 steps)", "answer": "- Step 1: The changing magnetic field in the core cuts through the turns of both the primary and secondary coils.\n- Step 2: Each turn in a coil experiences the same changing magnetic field and thus has the same induced PD across it.\n- Step 3: The total PD across a coil is simply the sum of the PDs across each individual turn. Therefore, if the secondary coil has twice as many turns as the primary, it cuts twice as many field lines (per coil), and the total induced PD will be twice as large. The ratio of voltages equals the ratio of turns.\n\nVoltage is proportional to turns because each turn contributes an equal slice of induced PD.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "An ideal transformer is 100% efficient. If a step-up transformer increases the voltage by a factor of 10, what must happen to the current, and why is it impossible for a transformer to increase both voltage and current simultaneously? (3 steps)", "answer": "- Step 1: By conservation of energy, power input must equal power output ($$V_p I_p = V_s I_s$$).\n- Step 2: If voltage increases by a factor of 10 ($$V_s = 10 V_p$$), then to keep power equal, current must decrease by a factor of 10 ($$I_s = \\frac{1}{10} I_p$$).\n- Step 3: Increasing both voltage and current simultaneously would mean output power ($$V_s I_s$$) exceeds input power ($$V_p I_p$$), violating the law of conservation of energy. A transformer cannot create energy.\n\nYou can't get something for nothing; stepping up V means stepping down I.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Electricity is transmitted through the National Grid at very high voltages. Explain why this reduces power lost as heat in the cables, using the relationship between power, current, and resistance. (3 steps)", "answer": "- Step 1: The power transmitted is $$P = IV$$. For a fixed amount of transmitted power, increasing the voltage ($$V$$) forces the current ($$I$$) to decrease proportionally.\n- Step 2: The cables have resistance ($$R$$), and the power dissipated as heat in the cables is given by $$P_{loss} = I^2 R$$.\n- Step 3: Because power loss depends on the *square* of the current, halving the current reduces the power loss by a factor of four. Thus, transmitting at high V (low I) dramatically reduces resistive heatin
