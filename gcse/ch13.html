** — voltage increased from 230 V to 920 V.\n+ Mental check: More secondary turns → step-up → higher output voltage. ✓\n\n**Takeaway:** Use $\\frac{V_p}{V_s} = \\frac{n_p}{n_s}$; verify step-up/step-down by comparing turn counts.", "source": "MiniMax M1 ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "An ideal transformer steps up voltage from 120 V to 240 V. If the device connected to the output draws 5 A, what current flows in the primary coil? (3 steps)", "answer": "- Step 1: For an ideal transformer, power is conserved: input power = output power, so $V_p I_p = V_s I_s$.\n- Step 2: Rearrange for primary current: $I_p = \\frac{V_s I_s}{V_p} = \\frac{240 \\times 5}{120} = \\frac{1200}{120} = 10\\,\\text{A}$\n- Step 3: Notice that when voltage doubles (step-up), current halves — this is the trade-off in an ideal transformer.\n+ Physical meaning: The higher voltage output must come at the cost of lower current to keep power constant.\n\n**Takeaway:** $V_p I_p = V_s I_s$ (power conservation in ideal transformer).", "source": "MiniMax M1 ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Why is electrical power transmitted through the National Grid at very high voltages (e.g., 132 kV or more) rather than at mains voltage (230 V)? (3 steps)", "answer": "- Step 1: Power loss in the transmission cables is given by $P_{\\text{loss}} = I^2 R$ — the current flowing through the cables causes resistive heating.\n- Step 2: For a fixed amount of power to be transmitted ($P = IV$), a higher voltage allows the same power to be carried with a lower current. Since loss depends on $I^2$, halving the current quarters the power loss.\n- Step 3: Therefore, transmitting at high voltage (and correspondingly low current) dramatically reduces energy wasted as heat in the cables over long distances.\n+ A step-up transformer after the power station raises the voltage for transmission; a step-down transformer lowers it before it reaches homes.\n\n**Takeaway:** High V → Low I → Low $I^2 R$ loss → efficient transmission.", "source": "MiniMax M1 ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "If the transmission voltage is increased by a factor of 10 (e.g., from 11 kV to 110 kV), by what factor does the power loss in the cables change, assuming the same transmitted power? (2 steps)", "answer": "- Step 1: Since $P = IV$ must stay constant, if voltage increases by 10×, the current decreases by 10×.\n- Step 2: Power loss depends on $I^2$, so if current decreases by 10×, the power loss decreases by $10^2 = 100$ times.\n+ Example: At 11 kV, if $I = 1000$ A, loss ∝ $1000^2 = 10^6$. At 110 kV, $I = 100$ A, loss ∝ $100^2 = 10^4$ — exactly 100× less.\n\n**Takeaway:** Increase voltage by factor of $n$ → decrease current by $n$ → decrease loss by $n^2$.", "source": "MiniMax M1 ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Where on the National Grid would you find a step-up transformer, and where would you find a step-down transformer? Explain the purpose of each location. (2 steps)", "answer": "- Step 1: **Step-up transformer** is placed *after* the power station, just before the transmission lines. It raises the voltage from the generator's output (typically ~11-25 kV) to the high transmission voltage (132 kV or higher).\n- Step 2: **Step-down transformers** are placed *before* consumers — near towns and cities, and also inside buildings and device adapters. They lower the high grid voltage to the safe mains voltage (230 V in the UK) for domestic use.\n+ The sequence: Power station → Step-up → High-voltage transmission lines → Step-down → Homes.\n\n**Takeaway:** Step-up: power station → grid (raise V for efficiency). Step-down: grid → consumers (lower V for safety).", "source": "MiniMax M1 ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "A transformer is described as \"ideal.\" What does this mean, and what fundamental principle does it illustrate? (2 steps)", "answer": "- Step 1: An ideal transformer is 100% efficient — no energy is lost in the transformation process.\n- Step 2: By the law of conservation of energy, the input power must equal the output power: $V_p I_p = V_s I_s$. This means if you step up the voltage, you must step down the current (and vice versa), so power stays constant.\n+ Real transformers always lose some energy as heat in the wires (copper losses) and in the core (eddy currents/hysteresis), so they're never perfectly ideal.\n\n**Takeaway:** Ideal transformer: 100% efficient → $V_p I_p = V_s I_s$ (power conserved).", "source": "MiniMax M1 ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Explain the complete sequence of how a transformer operates, starting from an alternating voltage applied to the primary coil. (4 steps)", "answer": "- Step 1: An alternating voltage is applied to the **primary coil**, causing an alternating current to flow in it.\n- Step 2: This alternating current produces a constantly changing magnetic field around the primary coil (the field builds up and collapses with each reversal of current direction).\n- Step 3: The **iron core** (easily magnetised) channels this changing magnetic field efficiently to the **secondary coil**.\n- Step 4: The changing magnetic field in the core cuts the wires of the secondary coil, inducing an alternating potential difference across it. If connected to a complete circuit, an alternating current flows in the secondary.\n+ The output has the same frequency as the input a.c.\n\n**Takeaway:** a.c. in primary → changing field → iron core carries it → induction in secondary.", "source": "MiniMax M1 ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Why do step-up transformers also cause the current to decrease, and why do step-down transformers cause the current to increase? (2 steps)", "answer": "- Step 1: In an ideal transformer, power is conserved: $P_{\\text{in}} = P_{\\text{out}}$, so $V_p I_p = V_s I_s$.\n- Step 2: If voltage is stepped up ($V_s > V_p$), the only way to keep power equal is for the current to decrease ($I_s < I_p$). Conversely, stepping down voltage means current must increase.\n+ This is a direct consequence of energy conservation — you cannot get more power out than you put in.\n\n**Takeaway:** Step-up: V ↑, I ↓. Step-down: V ↓, I ↑. Power stays the same (ideal case).", "source": "MiniMax M1 ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A power station generates electrical power at 20 kV and 500 A. Calculate the power output, and estimate what the current would be if this power were transmitted at 400 kV instead (assuming an ideal transformer). (3 steps)", "answer": "- Step 1: Power output: $P = IV = 500 \\times 20{,}000 = 10{,}000{,}000\\,\\text{W} = 10\\,\\text{MW}$\n- Step 2: Using power conservation ($P = IV$), at 400 kV: $I = \\frac{P}{V} = \\frac{10{,}000{,}000}{400{,}000} = 25\\,\\text{A}$\n- Step 3: The current dropped from 500 A to just 25 A — a 20× reduction. The $I^2 R$ losses in the cables would drop by a factor of $20^2 = 400$!\n+ This dramatically shows why high-voltage transmission is so efficient.\n\n**Takeaway:** Same power, 20× higher voltage → 20× lower current → 400× lower loss.", "source": "MiniMax M1 ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Why are the iron cores of transformers often made from laminated sheets of iron rather than a solid block? (2 steps)", "answer": "- Step 1: A changing magnetic field in the core induces \"eddy currents\" — circular currents flowing within the iron itself.\n- Step 2: These eddy currents cause energy loss as heat. By laminating the core (thin sheets separated by insulating layers), the loops of eddy currents are broken up and confined to smaller paths, dramatically reducing the eddy current losses.\n+ This lamination is why transformer cores are made of stacked thin sheets rather than solid metal.\n\n**Takeaway:** Laminated core → reduces eddy currents → reduces energy loss as heat.", "source": "MiniMax M1 ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A transformer is used to charge a phone from the mains. The mains is 230 V and the phone needs 5 V. Is this a step-up or step-down transformer, and what would you expect the ratio of turns to be (approximately)? (2 steps)", "answer": "- Step 1: This is a **step-down transformer** — the voltage is being reduced from 230 V to 5 V (much lower).\n- Step 2: Since $V_s < V_p$, we need $n_s < n_p$. The ratio is approximately $5:230$ or about $1:46$. So roughly 1 turn on the secondary for every 46 turns on the primary.\n+ In practice, phone chargers often use electronic circuits rather than pure transformers, but the principle remains: step-down to a low voltage.\n\n**Takeaway:** Step-down for phone charging; roughly 1:50 turns ratio (5 V from 230 V).", "source": "MiniMax M1 ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "When a magnet is pushed into a coil, the induced current creates a magnetic field that repels the magnet. Where does the energy for this \"repulsion\" come from? (2 steps)", "answer": "- Step 1: The energy comes from the mechanical work you do when pushing the magnet into the coil.\n- Step 2: As you push the magnet in, you have to overcome the repulsive force from the induced magnetic field. This mechanical work is converted into electrical energy (the induced current does work in the circuit).\n+ This is why moving the magnet feels \"harder\" when the circuit is complete (current flows) compared to when it's open (no current, no resistance to motion).\n\n**Takeaway:** Mechanical work → Electrical energy (via Lenz's law / opposing field).", "source": "MiniMax M1 ②", "_id": "minimax_2_29", "judge_pick": true}, {"question": "Two identical magnets are dropped at the same speed — one through a coil connected to an open circuit (no current can flow), and one through an identical coil connected to a closed circuit (current can flow). Which magnet falls through more slowly, and why? (3 steps)", "answer": "- Step 1: The magnet falling through the **closed circuit** falls more slowly.\n- Step 2: In the closed circuit, the induced current creates a magnetic field that opposes the motion (Lenz's law), producing an upward force on the magnet that slows its fall.\n- Step 3: In the open circuit, no current flows, so no opposing magnetic field is created — the magnet falls freely.\n+ This is similar to magnetic braking — the energy is dissipated as heat in the closed circuit.\n\n**Takeaway:** Closed circuit → induced current → opposing field → magnetic braking → falls slower.", "source": "MiniMax M1 ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A student connects a galvanometer (sensitive current indicator) to a coil and notices the needle jumps when they first close the switch connecting the coil to a battery, then settles back to zero. Explain why there is a jump but then no reading. (3 steps)", "answer": "- Step 1: When the switch closes, the current in the circuit changes from zero to a steady value — this creates a *changing* magnetic field.\n- Step 2: This changing field cuts the coil's own wires, inducing a brief voltage (self-inductance). The galvanometer detects this brief induced current.\n- Step 3: Once the current reaches a steady value, the magnetic field stops changing. With no changing field, no further induction occurs, so the galvanometer returns to zero.\n+ This is why inductors \"resist\" changes in current — they produce a back-emf when current tries to change.\n\n**Takeaway:** Only a *changing* current induces voltage; steady current produces steady field → no induction.", "source": "MiniMax M1 ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "A simple a.c. generator produces a sine-wave output. Sketch what the output voltage would look like over time, and explain why it is sinusoidal rather than a flat d.c. waveform. (3 steps)", "answer": "- Step 1: The output voltage rises from zero to a maximum positive value, falls back through zero to a maximum negative value, and returns to zero — repeating this pattern in a smooth wave (sine wave).\n- Step 2: As the coil rotates, the rate at which it cuts field lines changes continuously. When the coil is moving *parallel* to the field lines (vertical position), it cuts none — voltage is zero. When moving *perpendicular* (horizontal position), it cuts most rapidly — voltage is maximum.\n- Step 3: This continuous change in cutting rate produces the smooth sinusoidal shape — neither a sudden jump nor a constant value.\n+ This is why a.c. generators naturally produce smooth alternating waveforms.\n\n**Takeaway:** Continuous change in cutting angle → smooth sinusoidal output (not sudden jumps).", "source": "MiniMax M1 ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "In a d.c. dynamo's output, why does the voltage vary from zero to maximum twice per revolution rather than staying constant? (2 steps)", "answer": "- Step 1: Even though the split-ring commutator keeps the output polarity always positive, the magnitude (size) of the induced voltage still depends on how fast the coil is cutting field lines.\n- Step 2: As the coil rotates, twice per revolution it passes through the position where its sides move *parallel* to the field lines (vertical) — here cutting rate is zero, so voltage is zero. Twice per revolution it passes through where it cuts *perpendicularly* (horizontal) — maximum voltage.\n+ The commutator fixes the *direction* but can't fix the *magnitude* — the underlying physics of induction still causes the variation.\n\n**Takeaway:** Direction fixed by commutator, but magnitude varies with coil orientation → bumpy d.c.", "source": "MiniMax M1 ②", "_id": "minimax_2_33", "judge_pick": false}], "count": 34}}, "meta": {"gemini_1": {"run": 1, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.7, "in_tokens": 5797, "out_tokens": 6385, "reasoning_chars": 0, "cost_ const SK='gcse_ch13_cards';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
