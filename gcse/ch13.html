<script>
const DATA={"selected": [{"id": "gemini_4_11", "question": "Explain the energy conversions and the core physics principle at work in a moving-coil microphone. (4 steps)", "answer": "- Step 1: **Input:** Sound waves, which are variations in air pressure, arrive at the microphone. This is a form of kinetic/mechanical energy.\n- Step 2: The pressure variations cause a thin diaphragm to vibrate back and forth, matching the frequency of the sound waves.\n- Step 3: A small coil of wire is attached to this diaphragm. The coil is positioned in the magnetic field of a permanent magnet. As the diaphragm vibrates, the coil is forced to move back and forth through the magnetic field, cutting the field lines.\n- Step 4: **Core Principle & Output:** This cutting of field lines induces an alternating potential difference across the ends of the coil. This is the **generator effect**. The resulting electrical signal has the same frequency as the original sound waves. The energy conversion is from sound/kinetic energy to electrical energy.", "source": "Gemini 2.5 Pro ④", "blind_id": 0}, {"id": "gemini_1_9", "question": "A bar magnet is pushed north-pole-first towards a coil of wire. What magnetic pole is induced at the end of the coil nearest the magnet, and why does this happen? (2 steps)", "answer": "- **Step 1:** An induced **north pole** is created at the end of the coil nearest the magnet.\n- **Step 2:** This happens because the direction of the induced current always creates a magnetic field that **opposes the change that caused it** (Lenz's Law). The \"change\" is the north pole moving closer. To oppose this, the coil must create its own north pole to **repel** the incoming magnet, trying to stop it from moving. If it created a south pole, it would attract the magnet, accelerating it and creating energy from nothing, which violates the conservation of energy.", "source": "Gemini 2.5 Pro ①", "blind_id": 3}, {"id": "gemini_2_4", "question": "Why does adding more turns to a coil increase the total induced potential difference when it moves through a magnetic field? (2 steps)", "answer": "- **Step 1: Induction in a single wire.** When a single loop of wire cuts through magnetic field lines, a certain potential difference is induced across its ends. This happens because the free electrons in the wire are forced to one end by the interaction with the magnetic field.\n- **Step 2: The additive effect of turns.** When you have a coil with many turns, each turn acts like a separate wire loop connected in series. The potential difference induced in each individual turn adds up. Therefore, a coil with 200 turns will produce 200 times the voltage of a single turn moving under the same conditions.", "source": "Gemini 2.5 Pro ②", "blind_id": 4}, {"id": "gemini_1_26", "question": "Describe the journey of electrical energy from a power station to a home, identifying where and why step-up and step-down transformers are used. (3 steps)", "answer": "- **Step 1: At the Power Station:** After electricity is generated (e.g., at 25,000 V), it immediately passes through a **step-up transformer**. This increases the voltage to a very high level (e.g., 400,000 V) for transmission across the National Grid. This is done to reduce the current and therefore minimise power loss ($$P=I^2R$$) in the long-distance cables.\n- **Step 2: Across the National Grid:** The electricity travels at this high voltage through the network of pylons and cables across the country.\n- **Step 3: Near Towns and Homes:** Before the electricity reaches consumers, it goes through one or more **step-down transformers**. These reduce the voltage to much safer and more usable levels. A large substation might step it down to 33,000 V for local industry, and smaller transformers on poles or in cabinets will step it down further to the 230 V used in homes.", "source": "Gemini 2.5 Pro ①", "blind_id": 5}, {"id": "gemini_3_12", "question": "Describe the shape of the voltage-time graph for an **alternator** versus a **dynamo**. What does each shape tell you? (2 steps)", "answer": "- Step 1: The graph for an **alternator** is a **sine wave**. It goes smoothly from zero up to a positive maximum, back down through zero to a negative minimum, and then back to zero. This shows that the voltage and current are constantly changing magnitude and are periodically reversing direction (positive to negative), which is the definition of a.c.\n- Step 2: The graph for a **dynamo** looks like a series of **positive \"humps\"**. The voltage rises from zero to a maximum and then falls back to zero, but it *never goes negative*. It then immediately starts the next positive hump. This shows that the current is always flowing in the same direction (it's always positive), but its magnitude is pulsating, which is characteristic of d.c. from a simple dynamo.", "source": "Gemini 2.5 Pro ③", "blind_id": 9}, {"id": "gemini_1_10", "question": "How does an alternator generate alternating current (a.c.)? Explain the role of the slip rings in this process. (3 steps)", "answer": "- **Step 1:** An alternator consists of a coil of wire rotating in a constant magnetic field. As one side of the coil (e.g., side A) moves up through the field, it cuts the field lines in one direction, inducing a PD. As the other side (side B) moves down, it cuts the lines in the opposite direction, also inducing a PD. These effects add up.\n- **Step 2:** After half a rotation (180°), side A is now moving down, and side B is moving up. The direction of motion for each side has reversed, so the direction of the induced PD in the entire coil also reverses.\n- **Step 3:** The coil is connected to the external circuit via two **slip rings**. Each end of the coil is permanently connected to its own separate, continuous ring. The brushes maintain contact with these rings as they spin. Because the connection isn't swapped, the external circuit receives the fully reversing potential difference from the coil, resulting in an alternating current (a.c.) that flows first one way, then the other.", "source": "Gemini 2.5 Pro ①", "blind_id": 11}, {"id": "gemini_4_16", "question": "A simple step-down transformer has 400 turns on its primary coil and 100 turns on its secondary. If the input a.c. voltage is $$12\\,\\text{V}$$, what is the output voltage? (3 steps)", "answer": "- Step 1: The relationship between voltages and turns in a transformer is given by the equation $$\\frac{V_s}{V_p} = \\frac{n_s}{n_p}$$.\n- Step 2: The ratio of the turns is $$\\frac{n_s}{n_p} = \\frac{100}{400} = \\frac{1}{4}$$. This means the voltage will be \"stepped down\" by a factor of 4.\n- Step 3: The output voltage $$V_s$$ will therefore be one-quarter of the input voltage $$V_p$$.\n$$V_s = V_p \\times \\frac{1}{4} = 12\\,\\text{V} \\times \\frac{1}{4} = 3\\,\\text{V}$$", "source": "Gemini 2.5 Pro ④", "blind_id": 15}, {"id": "gemini_3_17", "question": "Misconception Probe: You connect a 12V car battery (a d.c. source) to the primary coil of a step-up transformer. Why will you measure 0V on the secondary coil, even though there is a current flowing in the primary?", "answer": "You will measure 0V because a transformer requires a **changing magnetic field** to induce a voltage in the secondary coil.\n- A battery provides a direct current (d.c.), which is steady and flows in only one direction.\n- This steady current creates a steady, unchanging magnetic field in the iron core.\n- Since the magnetic field is not changing, it does not \"cut\" the wires of the secondary coil.\n- With no cutting of field lines, there is no electromagnetic induction, and therefore no potential difference is induced in the secondary coil. (Note: A tiny blip of voltage might be induced for a split second when the battery is first connected or disconnected, as the current changes from zero, but not while it's steadily connected).", "source": "Gemini 2.5 Pro ③", "blind_id": 18}, {"id": "gemini_3_7", "question": "Edge Case: A powerful bar magnet is held completely stationary inside a large coil of wire. Why is the induced voltage in the coil exactly zero?", "answer": "The induced voltage is zero because there is **no change** in the magnetic field passing through the coil. Electromagnetic induction is caused by a conductor cutting magnetic field lines, which requires *relative motion* between the conductor and the magnet, or a *change* in the magnetic field's strength. Even though the coil is filled with a strong magnetic field, if that field is not changing, no field lines are being cut, and therefore no potential difference is induced.", "source": "Gemini 2.5 Pro ③", "blind_id": 20}, {"id": "gemini_2_16", "question": "Why is electrical power transmitted across the National Grid at extremely high voltages? Explain using the formula for power loss in cables. (3 steps)", "answer": "- **Step 1: Identify the source of power loss.** Power is lost in transmission cables primarily due to the resistance of the wires. As current flows, the wires heat up, dissipating energy into the surroundings. The formula for this power loss is $$P_{loss} = I^2 R$$, where $$I$$ is the current and $$R$$ is the resistance of the cable.\n- **Step 2: Relate Power, Voltage, and Current.** The total power being transmitted is given by $$P_{transmitted} = V I$$. To transmit a certain amount of power, if you use a very high voltage ($$V$$), you only need a very small current ($$I$$).\n- **Step 3: Connect to the Power Loss Formula.** The power loss formula ($$P_{loss} = I^2 R$$) shows that the energy wasted as heat is proportional to the *square* of the current. By transmitting power at a high voltage and therefore a low current, the power loss is dramatically reduced. For example, halving the current reduces the power loss to one-quarter of its original value. This makes the National Grid far more efficient.", "source": "Gemini 2.5 Pro ②", "blind_id": 22}, {"id": "gemini_2_3", "question": "You want to maximize the voltage induced in a spinning coil inside a generator. What four factors could you change to achieve this?", "answer": "To maximize the induced potential difference (voltage), you can:\n1.  **Increase the speed of rotation:** Spinning the coil faster means it cuts magnetic field lines at a greater rate.\n2.  **Increase the number of turns on the coil:** Each turn contributes to the total induced voltage. More turns mean more lengths of wire are cutting the field, and their individual induced voltages add up.\n3.  **Increase the strength of the magnetic field:** Using a stronger magnet creates a denser magnetic field (more field lines in a given area), so more lines are cut per second for the same speed of rotation.\n4.  **Increase the area of the coil:** A larger coil area means that for a given rotation, the sides of the coil are moving faster or sweeping through a larger portion of the field, increasing the rate at which field lines are cut.", "source": "Gemini 2.5 Pro ②", "blind_id": 23}, {"id": "gemini_4_18", "question": "Why is soft iron, an easily magnetised material, the ideal choice for a transformer's core?", "answer": "A soft iron core is used because its purpose is to efficiently guide the magnetic field from the primary coil to the secondary coil.\n- Step 1: Soft iron can be very easily and strongly magnetised by the current in the primary coil. This ensures that almost all of the magnetic field created is contained within the core.\n- Step 2: Crucially, it also *demagnetises* very easily. Since the primary current is alternating (a.c.), it is rapidly changing direction. The core's magnetic field must be able to change and reverse just as rapidly. A material that stayed permanently magnetised would not work.\n- Step 3: This property of being easily magnetised and demagnetised concentrates and channels the *changing* magnetic flux through the secondary coil, maximising the induced potential difference and making the transformer efficient.", "source": "Gemini 2.5 Pro ④", "blind_id": 26}, {"id": "gemini_1_8", "question": "You move a wire downwards through a magnetic field, and a voltmeter connected to it deflects to the right. What two changes could you make to cause the voltmeter to deflect to the left instead?", "answer": "To reverse the direction of the induced potential difference (and current), you can either:\n1.  **Reverse the direction of motion:** Instead of moving the wire downwards, move it upwards through the field.\n2.  **Reverse the direction of the magnetic field:** Swap the north and south poles of the magnet.\n\nDoing both at the same time (e.g., moving upwards through a reversed field) would cancel the effect out, and the voltmeter would deflect to the right again.", "source": "Gemini 2.5 Pro ①", "blind_id": 27}, {"id": "gemini_2_13", "question": "What is the key structural difference that determines whether a transformer is 'step-up' or 'step-down'?", "answer": "The key structural difference is the **ratio of the number of turns on the secondary coil ($$n_s$$) to the number of turns on the primary coil ($$n_p$$)**.\n+ A **step-up** transformer has *more turns on the secondary coil* than the primary ($$n_s > n_p$$), which increases the voltage.\n+ A **step-down** transformer has *fewer turns on the secondary coil* than the primary ($$n_s < n_p$$), which decreases the voltage.", "source": "Gemini 2.5 Pro ②", "blind_id": 33}, {"id": "gemini_4_21", "question": "A power station needs to transmit a certain amount of power. It uses a step-up transformer that increases the voltage by a factor of 20. By what factor does this reduce the power lost to heat in the transmission cables? (4 steps)", "answer": "- Step 1: For a constant amount of power being transmitted ($$P = VI$$), if the voltage ($$V$$) is increased by a factor of 20, the current ($$I$$) must decrease by a factor of 20 to keep the product $$VI$$ the same.\n- Step 2: The power lost as heat in the cables is calculated using the formula $$P_{loss} = I^2R$$. The loss depends on the square of the current.\n- Step 3: Since the current has been reduced to $$1/20$$ of its original value, the new power loss will be $$(\\frac{1}{20})^2$$ of the original loss.\n- Step 4: $$(\\frac{1}{20})^2 = \\frac{1}{400}$$. Therefore, the power lost to heat is reduced by a factor of **400**. This demonstrates the huge efficiency gain from using high-voltage transmission.", "source": "Gemini 2.5 Pro ④", "blind_id": 34}, {"id": "gemini_3_2", "question": "A straight wire is moved through a uniform magnetic field. In which direction of motion relative to the field will **zero** potential difference be induced across the wire?", "answer": "Zero potential difference will be induced if the wire is moved **parallel** to the magnetic field lines.\n\nElectromagnetic induction relies on the wire \"cutting\" magnetic field lines. When the wire moves parallel to the field lines, it slides alongside them without cutting through them. Since the rate of cutting field lines is zero, the induced potential difference is also zero.", "source": "Gemini 2.5 Pro ③", "blind_id": 35}, {"id": "gemini_1_23", "question": "A phone charger is a step-down transformer converting 230V mains to 5V. Conceptually, how do its coil turns compare, and how does the current it supplies to the phone compare to the current it draws from the wall? (Assume 100% efficiency). (2 steps)", "answer": "- **Step 1: Turns Ratio:** To step the voltage down from 230V to 5V, the **secondary coil must have far fewer turns than the primary coil**. The turns ratio ($$n_s / n_p$$) will be the same as the voltage ratio ($$5 / 230$$).\n- **Step 2: Current Relationship:** Since the voltage is stepped down, the current must be **stepped up** by the same factor to conserve power ($$V_p I_p = V_s I_s$$). The current supplied to the phone ($$I_s$$) will be much larger than the small current the charger draws from the wall socket ($$I_p$$). For example, if the phone draws 2A, the charger only needs to draw about $$2A \\times (5/230) \\approx 0.043A$$ from the mains.", "source": "Gemini 2.5 Pro ①", "blind_id": 39}, {"id": "gemini_2_10", "question": "Explain, step-by-step, how a loudspeaker converts an electrical signal back into sound, naming the key physics principle. (3 steps)", "answer": "- **Step 1: An Alternating Current is Supplied.** An alternating electrical signal (like the one from a microphone or amplifier) is fed into a coil of wire. This coil is attached to a cone and is wrapped around one pole of a permanent magnet.\n- **Step 2: The Motor Effect Creates a Force.** The alternating current flowing through the coil creates its own changing magnetic field. This field interacts with the field of the permanent magnet, producing a rapidly changing force on the coil. This is the **motor effect**.\n- **Step 3: Motion Creates Sound Waves.** The force causes the coil and the attached cone to vibrate back and forth. The vibrations of the cone push and pull on the surrounding air, creating pressure variations that travel outwards as sound waves, reproducing the original sound.", "source": "Gemini 2.5 Pro ②", "blind_id": 40}, {"id": "gemini_1_18", "question": "Describe the role of the three main components of a transformer: the primary coil, the secondary coil, and the soft iron core. (3 steps)", "answer": "- **Step 1: Primary Coil:** This is the input coil. An alternating potential difference is applied across it, which drives an alternating current through it. This current produces a continuously changing magnetic field.\n- **Step 2: Soft Iron Core:** This component links the two coils. It is made of a material that is easily magnetised and demagnetised. Its job is to concentrate the changing magnetic field produced by the primary coil and guide it efficiently through the secondary coil, ensuring maximum magnetic flux linkage.\n- **Step 3: Secondary Coil:** This is the output coil. The changing magnetic field from the core cuts through the turns of the secondary coil. By electromagnetic induction, this induces an alternating potential difference of the same frequency across the ends of the secondary coil.", "source": "Gemini 2.5 Pro ①", "blind_id": 42}, {"id": "gemini_3_10", "question": "Explain, step-by-step, how a **split-ring commutator** in a dynamo turns the naturally alternating voltage of a spinning coil into a direct current output. (3 steps)", "answer": "- Step 1: As one side of the coil (let's call it the red side) moves up through the magnetic field, a current is induced in one direction. This current flows out through one half of the commutator to a brush and into the external circuit.\n- Step 2: After the coil rotates 180 degrees, the red side is now moving *down* through the magnetic field. This reverses the direction of the induced current *within the coil itself*.\n- Step 3: Crucially, at the exact same moment the current in the coil reverses, the split-ring commutator has also rotated 180 degrees. The other half of the commutator is now touching the original brush. This reversal of connection cancels out the reversal of current in the coil, so the current in the *external circuit* continues to flow in the same direction as before.\n\nThe commutator acts as a mechanical switch, reversing the connections every half turn to keep the external current flowing one way.", "source": "Gemini 2.5 Pro ③", "blind_id": 55}, {"id": "gemini_1_5", "question": "How does increasing the speed at which a conductor cuts magnetic field lines affect the size of the induced potential difference, and why?", "answer": "Increasing the speed **increases** the size of the induced potential difference.\n\nThe reason is that the magnitude of the induced PD is directly proportional to the *rate* at which magnetic field lines are cut. Moving the conductor faster means it cuts through more field lines in the same amount of time. This faster rate of cutting causes a larger force on the electrons inside the wire, separating them more forcefully and thus creating a larger voltage across the ends.", "source": "Gemini 2.5 Pro ①", "blind_id": 57}, {"id": "gemini_1_21", "question": "Explain the physical meaning of the transformer equation, $$V_s / V_p = n_s / n_p$$. (2 steps)", "answer": "- **Step 1:** This equation states that the ratio of the secondary voltage ($$V_s$$) to the primary voltage ($$V_p$$) is equal to the ratio of the number of turns on the secondary coil ($$n_s$$) to the number of turns on the primary coil ($$n_p$$).\n- **Step 2:** The physical meaning is that the voltage induced in each single turn of the wire is the same for both coils (as they are linked by the same changing magnetic field). The total voltage across a coil is simply this voltage-per-turn multiplied by the number of turns. Therefore, if the secondary coil has 10 times more turns, it will have 10 times the total voltage.", "source": "Gemini 2.5 Pro ①", "blind_id": 59}, {"id": "gemini_3_0", "question": "What is the fundamental principle of **electromagnetic induction**?", "answer": "Electromagnetic induction is the process of generating a potential difference (voltage) across an electrical conductor in a changing magnetic field. This happens when a conductor, like a wire or a coil, moves through a magnetic field, or when the magnetic field around a stationary conductor changes. The key idea is that there must be *relative motion* between the conductor and the magnetic field.\n\nThis phenomenon is also called the **generator effect** because it's the principle behind electrical generators.", "source": "Gemini 2.5 Pro ③", "blind_id": 60}, {"id": "gemini_2_14", "question": "An ideal transformer is 100% efficient. What fundamental law of physics does this imply for the power in its coils, and what does this mean for the current when voltage is stepped up? (2 steps)", "answer": "- **Step 1: Conservation of Energy.** An ideal transformer must obey the principle of conservation of energy. This means that the power supplied to the primary coil must eaning the electrical power put into the primary coil must equal the electrical power delivered by the secondary coil. The formula for power is $$P = VI$$.\n- Step 3: Therefore, $$P_{in} = P_{out}$$, which means $$V_p I_p = V_s I_s$$. We can rearrange this to find the secondary current:\n$$I_s = \\frac{V_p I_p}{V_s} = \\frac{10\\,\\text{V} \\times 2\\,\\text{A}}{50\\,\\text{V}} = \\frac{20}{50}\\,\\text{A} = 0.4\\,\\text{A}$$\nSince the voltage was stepped up by a factor of 5, the current must be stepped down by a factor of 5.", "source": "Gemini 2.5 Pro ④", "blind_id": 71}, {"id": "gemini_3_16", "question": "Explain, step-by-step, how a transformer works, starting from an a.c. supply to the primary coil. (4 steps)", "answer": "- Step 1: An alternating current (a.c.) is supplied to the **primary coil**. Because the current is constantly changing direction and magnitude, it produces a **continuously changing magnetic field** in and around the coil.\n- Step 2: The **soft iron core** becomes magnetised by this field. Because it's a \"soft\" magnetic material, its magnetism changes in sync with the current. The core's job is to concentrate and guide this changing magnetic field through the secondary coil.\n- Step 3: The changing magnetic field from the core passes through (or \"cuts\") the windings of the **secondary coil**.\n- Step 4: This changing magnetic field induces an alternating potential difference (voltage) across the ends of the secondary coil, via **electromagnetic induction**. The frequency of this induced voltage is the same as the frequency of the input a.c.", "source": "Gemini 2.5 Pro ③", "blind_id": 77}, {"id": "gemini_1_4", "question": "Explain the fundamental difference between the generator effect (electromagnetic induction) and the motor effect. (2 steps)", "answer": "- **Step 1:** The **Generator Effect** describes converting kinetic energy into electrical energy. It starts with **motion** in a magnetic field, which then **induces a potential difference** (and a current if there's a circuit). The sequence is: **Motion → Induced PD/Current**.\n- **Step 2:** The **Motor Effect** describes converting electrical energy into kinetic energy. It starts with a **current** already flowing in a conductor placed in a magnetic field. This current then causes the field to exert a **force**, producing **motion**. The sequence is: **Current → Force → Motion**.\n\nThey are essentially the reverse of each other. A generator uses motion to make electricity; a motor uses electricity to make motion.", "source": "Gemini 2.5 Pro ①", "blind_id": 82}, {"id": "gemini_1_28", "question": "If high voltage is so efficient for transmitting power, why is the voltage stepped down to a much lower value like 230V before being supplied to homes?", "answer": "The voltage is stepped down primarily for **safety**. High voltages like the 400,000V used in transmission lines are extremely dangerous and would be lethal if used in a domestic environment. A lower voltage of 230V is still dangerous but is significantly safer to use for everyday appliances. Additionally, designing and insulating domestic appliances to handle extremely high voltages would make them impractically large, expensive, and hazardous.", "source": "Gemini 2.5 Pro ①", "blind_id": 90}, {"id": "gemini_2_6", "question": "What is the key structural difference between an alternator and a dynamo, and how does this single difference change their electrical output? (3 steps)", "answer": "- **Step 1: The Key Component.** The key structural difference is the component that connects the rotating coil to the external circuit. An **alternator** uses two separate, continuous **slip rings**. A **dynamo** uses a single ring that is split in two, called a **split-ring commutator**.\n- **Step 2: How an Alternator Works.** As the coil spins, each slip ring stays connected to the same end of the coil. When the coil rotates past the vertical position, the direction in which it cuts the magnetic field lines reverses. This reverses the direction of the induced potential difference. The slip rings pass this reversal directly to the output, creating an **alternating current (a.c.)** that swings between positive and negative.\n- **Step 3: How a Dynamo Works.** The split-ring commutator's job is to reverse the connection to the external circuit every half-turn. It does this at the exact moment the induced potential difference in the coil is about to reverse. This clever switch ensures that the current in the external circuit always flows in the same direction, creating a pulsating **direct current (d.c.)**.", "source": "Gemini 2.5 Pro ②", "blind_id": 92}, {"id": "gemini_1_3", "question": "What is the difference between an *induced potential difference* and an *induced current*? (2 steps)", "answer": "- **Step 1:** An **induced potential difference (PD)** is the voltage created across the ends of a conductor whenever it cuts magnetic field lines. This voltage is generated regardless of whether the conductor is part of a complete circuit. Think of it as the \"electrical pressure\" that is ready to push charge.\n- **Step 2:** An **induced current** is the flow of charge that results from an induced potential difference *if and only if* the conductor is part of a complete, closed circuit. If there is no complete path for the charge to flow (e.g., the ends of the wire are not connected), you will have an induced PD, but zero induced current.", "source": "Gemini 2.5 Pro ①", "blind_id": 93}], "models": {}, "meta": {"gemini_1": {"run": 1, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.7, "in_tokens": 5797, "out_tokens": 6385, "reasoning_chars": 0, "cost_eur": 0.0654, "elapsed_s": 72, "content_chars": 26718}, "gemini_2": {"run": 2, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.8, "in_tokens": 5797, "out_tokens": 4770, "reasoning_chars": 0, "cost_eur": 0.0506, "elapsed_s": 54, "cont const SK='gcse_ch13_cards';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
