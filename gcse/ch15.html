aterial) is less than the weight of the same volume of cold air displaced. The upthrust (weight of displaced cold air) exceeds the total weight, so the balloon rises.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "What is the difference between a fluid's pressure and a solid's pressure on a surface? (2 steps)", "answer": "- Step 1: A solid exerts pressure only on surfaces it's directly touching — the direction depends on how the solid is oriented.\n- Step 2: A fluid (liquid or gas) exerts pressure at any point within it and in all directions. At any given depth in a fluid, pressure is the same in all directions. This is fundamentally different from solids, which transmit force only along their structure.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "If you place a sealed empty bottle underwater, will it float or sink? What about the same bottle full of air but sealed? (2 steps)", "answer": "- Step 1: A sealed empty bottle contains air (at atmospheric pressure) plus the glass/plastic of the bottle itself. The bottle's material is denser than water, but the air inside makes the average density less than water — so it floats.\n- Step 2: The key is the average density of the whole object (bottle + contents). Air has very low density (~1.2 kg/m³), so a sealed container mostly full of air has an average density close to that of air, much less than water (1000 kg/m³), and floats.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Why does a sharp knife cut better than a dull knife, even though you're applying the same force? (2 steps)", "answer": "- Step 1: Pressure = force/area. A sharp blade has an extremely small contact area with the material being cut.\n- Step 2: With the same force F, a smaller area A produces much higher pressure (p = F/A). This high pressure concentrates the force on a tiny region, exceeding the material's strength and allowing the blade to separate the material.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "When measuring extension in the Hooke's Law experiment, why might you get a systematically low value if you don't use a fiducial marker? (2 steps)", "answer": "- Step 1: Without a fiducial marker, you're reading the position of the bottom of the spring directly against the ruler. This requires aligning your eye precisely with the bottom of the spring.\n- Step 2: If your eye is above or below the level of the spring, you get a parallax error — the apparent position differs from the actual position. This error is consistent (systematic) in one direction, making all your measurements either too high or too low. The fiducial marker gives a precise pointer point that you can align with the ruler at eye level.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A common misconception is that \"heavier objects sink, lighter objects float.\" Give a concrete counterexample and explain why this is wrong. (2 steps)", "answer": "- Step 1: A huge wooden log (mass hundreds of kg) floats in water. A small iron nail (mass only a few grams) sinks in water.\n- Step 2: What matters is density, not mass. The wooden log has density ~0.6-0.8 g/cm³ (less than water's 1.0 g/cm³), so it displaces enough water to float. The iron nail has density ~7.9 g/cm³ (much greater than water), so even fully submerged it can't displace enough water to equal its weight — it sinks. Mass is irrelevant; density determines floating and sinking.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "Why does the pressure at the bottom of a swimming pool NOT depend on the pool's surface area, only on the depth? (2 steps)", "answer": "- Step 1: Liquid pressure p = hρg depends on depth h, not on how wide the container is.\n- Step 2: The pressure at a given depth comes from the weight of the liquid directly above that point. A wider pool has more total water weight, but that weight is spread over a larger area. At any particular depth, the pressure is determined only by how much \"column\" of water is above that point — depth — not by the total amount of water in the pool.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "If you hold a piece of paper and blow over the top surface, the paper lifts up. Explain this using fluid pressure concepts. (2 steps)", "answer": "- Step 1: When you blow over the top of the paper, you're moving air quickly. Fast-moving air has lower pressure than still air (Bernoulli's principle).\n- Step 2: The bottom of the paper is exposed to still air at atmospheric pressure (higher). The pressure difference (higher below, lower above) creates a net upward force that lifts the paper. This is the same principle that allows airplane wings to generate lift.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": true}, {"question": "Why is it dangerous to stand directly behind a car window if it's slightly open during high-speed motorway driving? (2 steps)", "answer": "- Step 1: When air flows rapidly past a small opening, the pressure inside the vehicle drops (Bernoulli's principle — fast-moving air has lower pressure).\n- Step 2: This creates a pressure difference: higher pressure outside the vehicle (at the opening) versus lower pressure inside. This can violently slam the door or window shut, or pull objects (and people) out through the opening. The narrow gap accelerates the airflow, intensifying the pressure drop.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "What happens to the limit of proportionality if you use a stiffer spring (higher k)? Does it change, stay the same, or is the concept not applicable? (2 steps)", "answer": "- Step 1: The limit of proportionality is a property of the material, not of k. It marks where the force-extension relationship stops being linear.\n- Step 2: A stiffer spring (higher k) will reach larger forces at smaller extensions. It may reach its limit of proportionality at a different extension, but whether it bends or breaks depends on the material's internal structure, not on k alone. Different springs made of different materials can have different limits of proportionality even with the same k.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "In the Core Practical 7, why do we repeat measurements at each mass three times and then take an average? (2 steps)", "answer": "- Step 1: Random errors (like the spring oscillating slightly, or slight parallax when reading) cause each measurement to vary slightly around the true value.\n- Step 2: Taking multiple readings and averaging reduces the effect of random errors — the true value is more likely to be close to the average. It doesn't fix systematic errors (like a consistently misaligned ruler), but it does make your final result more reliable and reduces uncertainty.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Two identical beakers are filled to the same depth with different liquids. One contains water (density 1000 kg/m³), the other contains oil (density 800 kg/m³). Which exerts greater pressure on the bottom, and why? (2 steps)", "answer": "- Step 1: Using p = hρg, both beakers have the same depth h and same g.\n- Step 2: The water has higher density (1000 > 800), so water exerts greater pressure on the bottom. This is because at the same depth, the water column weighs more per unit volume — more mass above creates more force per area.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "Why can't you use a vacuum to lift heavy objects the same way you use water to float objects? (2 steps)", "answer": "- Step 1: Floating works because upthrust equals the weight of displaced fluid. The fluid pushes in from all sides.\n- Step 2: In a vacuum, there's no fluid to displace and create pressure. You could create a partial vacuum inside a container, but the atmospheric pressure on the outside would crush it unless the container is extremely strong. There's no \"upthrust\" from a vacuum — you'd need air or liquid to push upward on the object.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "A climber notices that it's harder to breathe at high altitudes. Use pressure concepts to explain why. (2 steps)", "answer": "- Step 1: Atmospheric pressure decreases with altitude because there's less air above you.\n- Step 2: At lower pressure, each breath takes in fewer air molecules per breath. Your lungs still expand to the same volume, but the partial pressure of oxygen is lower, so less oxygen diffuses into your bloodstream. This is why climbers use supplemental oxygen at high altitudes.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In the force-extension graph for a spring, the line is straight through the origin in the elastic region. What physical quantity does the gradient of this line represent? (1 step)", "answer": "The gradient = force/extension = k (the spring constant). It tells you how stiff the spring is — a steeper gradient means a stiffer spring requiring more force per unit extension.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "Why is it incorrect to say \"the limit of proportionality is where the spring breaks\"? (1 step)", "answer": "The limit of proportionality is where the graph stops being a straight line — the relationship is no longer linear. The spring may still be elastic (return to original shape) well past this point. Breaking is a separate phenomenon that occurs at much larger extensions, often after permanent deformation has begun.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": true}, {"question": "A block of wood is placed on top of a block of metal of the same size. The wood floats but the metal sinks. Explain in terms of density. (2 steps)", "answer": "- Step 1: Both blocks have the same volume, so they displace the same volume of water when fully submerged.\n- Step 2: Upthrust = weight of water displaced = V × ρ_water × g. This is identical for both blocks. But the metal has higher density, so its weight (m × g = ρ_metal × V × g) is greater than the upthrust — it sinks. The wood has lower density, so its weight is less than upthrust — it floats.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "If you double the mass hanging from a spring (within the proportional region), what happens to the elastic potential energy stored? Explain using the equation. (2 steps)", "answer": "- Step 1: Within the proportional region, F = kx. If mass doubles, force doubles (F = mg). Since F doubles, extension x also doubles (because x = F/k).\n- Step 2: EPE = ½kx². If x doubles, then x² becomes 4 times larger. So EPE increases by a factor of 4. Doubling the force more than doubles the stored energy — because you're stretching the spring further, not just applying more force.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": true}, {"question": "Why does a balloon inflated at sea level expand when taken to high altitude? (2 steps)", "answer": "- Step 1: At sea level, the balloon is inflated against atmospheric pressure (~101 kPa). The rubber skin pushes outward, and the internal air pressure equals atmospheric pressure plus the rubber's tension.\n- Step 2: At high altitude, atmospheric pressure is lower. The external pressure on the balloon decreases, but the internal pressure initially stays the same. This pressure difference causes the rubber to expand until internal and external pressures balance again. The balloon grows larger.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "A ship is made of steel (density ~7,800 kg/m³), which is much denser than water. Explain how such a dense material can still float. (2 steps)", "answer": "- Step 1: The ship is not solid steel — it's a hollow hull filled with air. The average density of the entire ship (steel hull + air inside) is what matters.\n- Step 2: The volume of the ship is mostly air, which has very low density. The average density of (steel + air) can be less than water, so the ship floats. It displaces a huge volume of water, and the weight of displaced water (upthrust) exceeds the weight of the steel hull plus contents.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "When you push a drinking straw into water and cover the top with your finger, water stays in the straw. Explain this. (2 steps)", "answer": "- Step 1: When you cover the top, you trap air at atmospheric pressure inside the straw.\n- Step 2: The water column is pulled down by gravity, creating a pressure difference. The trapped air pressure (atmospheric) pushes down on the water at the top, while atmospheric pressure pushes up on the water at the bottom of the straw. These balance, holding the water up. The water stays in because there's no air bubble to replace the water's weight.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "If you had two springs in series (one hanging from the other) versus the same two springs in parallel (both attached side by side), how would the effective spring constant compare? (2 steps)", "answer": "- Step 1: Springs in series: the effective k is lower (more stretchy). The extensions add: x_total = x₁ + x₂ = F/k₁ + F/k₂ = F(1/k₁ + 1/k₂). So 1/k_effective = 1/k₁ + 1/k₂.\n- Step 2: Springs in parallel: the effective k is higher (stiffer). Both springs share the load: F_total = F₁ + F₂ = k₁x + k₂x = (k₁ + k₂)x. So k_effective = k₁ + k₂. More springs in parallel means stiffer.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "Why is it physically impossible for a solid object to have zero pressure inside it? (1 step)", "answer": "Even in a \"weightless\" environment, all matter is held together by intermolecular forces and atomic bonds. These create internal stresses (pressure) even without gravity. At the atomic level, molecules are constantly moving and colliding, creating internal pressure. Removing all internal pressure would mean the material would fly apart.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": true}, {"question": "Explain why the EPE stored in a spring is sometimes called \"work done\" and relates to the area under the force-extension graph. (2 steps)", "answer": "- Step 1: When you stretch a spring, you apply a force over a distance. Work = force × distance moved in the direction of the force.\n- Step 2: As you stretch, the force increases from zero to F. The average force during the stretch is F/2 (for linear region). Total work done = average force × distance = (F/2) × x = ½kx². This work becomes stored as elastic potential energy. Graphically, this is the area under the F-x curve.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "A diver descends from the surface to a depth of 20m in fresh water, then continues to 20m depth in the Dead Sea. Where is the pressure greater, and why? (2 steps)", "answer": "- Step 1: In fresh water at 20m: p = hρg = 20 × 1000 × 9.8 = 196,000 Pa (plus atmospheric).\n- Step 2: In the Dead Sea at 20m: p = hρg = 20 × 1240 × 9.8 = 243,000 Pa. The Dead Sea has higher density (~1240 kg/m³), so at the same depth, pressure is higher because the column of liquid above weighs more per unit volume.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "When a cloud forms in the atmosphere, air pressure at ground level often drops. Use fluid concepts to explain why. (2 steps)", "answer": "- Step 1: Clouds form when warm, moist air rises and expands. As the air rises, it encounters lower atmospheric pressure (due to less air above).\n- Step 2: This expansion causes the air to cool and the water vapor to condense into visible droplets (clouds). The rising air creates a local area of lower density, reducing the weight of air above the surface — hence lower atmospheric pressure at ground level in that region.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "A submarine is neutrally buoyant at a certain depth. If it slightly compresses (by taking in a small amount of water into ballast), what happens to its motion? (2 steps)", "answer": "- Step 1: Neutral buoyancy means weight = upthrust. At this balance point, the submarine stays at that depth.\n- Step 2: Taking in water increases the submarine's mass, making its weight slightly greater than the upthrust. The submarine will slowly sink (negatively buoyant). It must then pump water out to become buoyant again and rise or maintain depth.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "Why does an object weigh less in water than in air? Use the concept of upthrust in your explanation. (1 step)", "answer": "In water, there's an upward force (upthrust) acting on the object, caused by the pressure difference between the top and bottom. This upthrust opposes the object's weight. The apparent weight = true weight − upthrust. Since upthrust is positive (upward), the measured weight in water is always less than in air.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}], "count": 49}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "Why can't a single force applied to an isolated free object cause it to change shape? (3 steps)", "answer": "- Step 1: A single force on a free object would cause it to accelerate according to Newton's Second Law (F = ma) — the object moves rather than deforms.\n- Step 2: To change shape, forces must act in *opposing directions* on different parts of the object, creating internal stresses.\n+ For example, to stretch a spring you need one force pulling up and another (like your hand or a fixed support) pulling down in the opposite direction.\n- Step 3: These opposing forces create internal tension or compression within the material, which is what actually causes the distortion.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A steel rod is firmly clamped at one end and pulled from the other. Is this an example of stretching or bending?", "answer": "This is **bending**, not stretching. True stretching requires forces acting *along the same axis* but in opposite directions at the two ends (like hanging a mass from a spring). In this case, the clamp provides a reaction force at one point, and you apply a force at a different point — creating a *turning effect* (torque) that curves the rod. One side of the rod experiences tension, the other side compression, which is characteristic of bending.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "Why does Hooke's Law eventually stop working even for a material that remains elastic (doesn't permanently deform)?", "answer": "- Step 1: Hooke's Law ($F = kx$) assumes the internal structure of the material behaves like perfect springs — each atomic bond stretches linearly with force.\n- Step 2: At small deformations, the bonds act like ideal springs. But as extension increases, the bonds start to behave non-linearly — they stiffen as atomic bonds approach their maximum stretch limit.\n- Step 3: The relationship curves because the material becomes progressively harder to stretch further. The spring constant effectively increases — it takes *more* force per additional mm of extension beyond the proportional limit.\n- The key distinction: the elastic limit (point of permanent deformation) comes *after* the limit of proportionality — a material can still be elastic but non-linear.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "What is the difference between the *limit of proportionality* and the *elastic limit*? Can a material pass one but not the other?", "answer": "The **limit of proportionality** is where the force-extension graph stops being a straight line — the linear relationship ($F \\propto x$) breaks down. The **elastic limit** is where permanent (plastic) deformation begins — the material will not return to its original length when the force is removed.\n\n+ Yes, a material can pass the limit of proportionality but still be within the elastic limit — the graph curves but the material remains elastic (returns to original shape when unloaded). Steel typically behaves this way.\n+ Some materials (like rubber) can pass the elastic limit while still showing a roughly linear relationship — they'd permanently deform even while the graph is still roughly straight (unusual but possible).", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "On a force-extension graph, what does the area under the line represent, and why does this matter beyond the limit of proportionality?", "answer": "The area under the force-extension graph represents the **work done** (energy transferred) in stretching the spring. \n\n- Below the limit of proportionality: This area = $\\frac{1}{2}kx^2$ (the elastic potential energy stored).\n- Beyond the limit of proportionality: The $\\frac{1}{2}kx^2$ formula no longer applies because the relationship is non-linear. However, the area under the *actual* graph still equals the total work done — you just can't calculate it with the simple formula. Some of this energy is dissipated as heat during permanent deformation.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": true}, {"question": "If you stretch a spring twice as far, does it store twice as much energy? Explain using the EPE formula.", "answer": "No — it stores **four times** the energy, not twice. The elastic potential energy equation is $E = \\frac{1}{2}kx^2$. Since $x$ is **squared**, doubling the extension multiplies the energy by $2^2 = 4$.\n\n+ This is a quadratic relationship, not linear.\n+ Example: Stretching by 5 cm might store 1 J. Stretching by 10 cm (doubled) stores 4 J, not 2 J.\n+ Intuition: It takes progressively more force to stretch the spring further (as you approach the limit of proportionality), so each additional cm stores more energy than the previous one.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Two springs have spring constants $k_1 = 100$ N/m and $k_2 = 200$ N/m. Which stores more energy when both are stretched by the same amount, and by what factor?", "answer": "Using $E = \\frac{1}{2}kx^2$, the energy is directly proportional to $k$ (for the same $x$). Since $k_2 = 2k_1$, the stiffer spring ($k_2$) stores **twice** the energy for the same extension.\n\n+ Intuition: The stiffer spring requires twice the force for the same extension ($F = kx$). Since work = force × distance, and you apply twice the force over the same distance, you do twice the work, storing twice the energy.\n+ Note: A stiffer spring *under the same load* actually extends less, so the situation flips if comparing under the same force rather than same extension.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "A rubber band and a steel spring both obey Hooke's Law in their initial region. Why does the rubber band feel \"easier\" to stretch initially, yet can still snap suddenly?", "answer": "- Step 1: A rubber band has a much lower spring constant $k$ than a steel spring (it's more compliant), so for the same force, it extends more initially — feeling \"easier.\"\n- Step 2: However, rubber's molecular structure is different — long polymer chains that can unravel. As you stretch further, more chains straighten out, and eventually you reach a point where all chains are fully extended.\n- Step 3: At this point, the rubber suddenly resists further stretching enormously (rapidly increasing $k$) and snaps. The steel spring, by contrast, has a more uniform atomic lattice that gradually stiffens — it doesn't have this dramatic \"sudden snap\" failure mode.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": true}, {"question": "Why does atmospheric pressure exist even though air molecules are moving in random directions?", "answer": "- Step 1: Although individual molecular collisions are random, collectively they create a net force on any surface.\n- Step 2: In a column of air, there are billions of molecules above any surface. Their combined weight (due to gravity) pushes downward on molecules below, creating pressure throughout the column.\n- Step 3: The pressure at any point equals the weight of the air column above that point, divided by the area. At sea level, this weight pressing down on each m² equals approximately 101,000 N — hence 101 kPa.\n+ This is analogous to liquid pressure ($p = h\\rho g$) — just with a much less dense \"fluid\" (air) creating a smaller pressure.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": true}, {"question": "Why does your ear \"pop\" when ascending a mountain or taking off in an airplane?", "answer": "As you go higher, atmospheric pressure decreases because there's less air above you. Your middle ear contains air at the previous (higher) pressure. \n\n- The higher pressure inside your ear pushes outward against the eardrum, causing discomfort.\n- Swallowing or yawning opens the Eustachian tube, allowing ear air to escape (or enter), equalising the pressure — hence the \"pop.\"\n+ The reverse happens when descending — outside pressure increases, pushing the eardrum inward.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": true}, {"question": "Why does pressure in a liquid increase with depth even though liquids are nearly incompressible?", "answer": "Pressure in a liquid comes from the **weight** of the liquid above, not from compression. \n\n- At 1 m depth, you have the weight of a 1 m column of water pressing down. At 2 m depth, you have a 2 m column — twice the weight, hence twice the pressure.\n+ It's the same reason pressure increases in the atmosphere with altitude (but reversed) — more \"stuff\" above pushing down.\n+ Liquids are nearly incompressible *because* their molecules are already close together; the pressure increase comes from accumulated weight, not from squeezing molecules closer.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "In the equation $p = h\\rho g$, what does each variable physically represent, and why is it multiplied together this way?", "answer": "- $h$ (depth in m): The height of the fluid column above the point — more height = more weight pressing down.\n- $\\rho$ (density in kg/m³): Mass per unit volume — for the same volume, denser fluids have more mass and thus more weight.\n- $g$ (gravitational field strength in N/kg): Converts mass to weight (force).\n- Mathematically: $h \\times \\rho$ gives mass per unit area (kg/m²). Multiplying by $g$ converts to weight per unit area (N/m²), which is pressure.\n+ Think of it as: (height) × (mass per volume) × (weight per mass) = weight per area = pressure.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": true}, {"question": "If you dive deeper into a swimming pool, does the pressure on your ears increase at the same rate at all depths, or does it change?", "answer": "The pressure increases **linearly** with depth — it increases by the same amount for each additional meter you descend. \n\n- Going from 1 m to 2 m depth adds the same pressure increase as going from 9 m to 10 m (approximately 10 kPa each in water).\n+ This is because $p = h\\rho g$ is a linear equation — depth $h$ appears to the first power, not squared or in a denominator.\n+ This is different from gravitational field strength, which decreases with altitude (inverse square law).", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": true}, {"question": "Why does a submarine need increasingly thick hull walls as it dives deeper?", "answer": "Pressure increases with depth ($p = h\\rho g$). At 100 m depth in water, the liquid pressure alone is ~1 MPa (10 atmospheres). The hull must withstand this external pressure crushing inward.\n\n+ The deeper the submarine, the greater the pressure difference between outside (high) and inside (low). The hull experiences compressive stress — if too thin, it buckles or collapses.\n+ This is why deep-sea submersibles like the Trieste (which reached the Mariana Trench at ~11 km) had massive steel spheres — to distribute the pressure evenly and resist collapse.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Two containers have the same height of water but different shapes. Which creates more pressure at the bottom? Why?", "answer": "Both create the **same pressure** at the bottom — the pressure depends only on depth, not the shape or total volume of the container.\n\n+ This is a key property of fluids in equilibrium (Pascal's principle). The pressure at a given depth depends only on $h$, not on the horizontal extent or shape.\n+ Intuition: The weight of water in the wider container is greater, but it's distributed over a larger area — the weight per unit area (pressure) at the bottom is the same.\n+ This is why water towers create pressure based on height alone, not on how much water is in the tower.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Why doesn't water spill out of a straw when you hold your finger over the top, even when the straw is inverted?", "answer": "- Step 1: The water is held up by atmospheric pressure pushing up on the water at the bottom of the straw (through the straw, up to your finger).\n- Step 2: Your finger seals the top, preventing air from pushing down on the water surface inside the straw.\n- Step 3: Atmospheric pressure outside the straw (pushing up on the water at the bottom open end) is sufficient to support the weight of the water column, as long as the column isn't taller than ~10.3 m (which would require pressure exceeding 1 atm to support).\n+ This demonstrates that atmospheric pressure can support a column of water ~10 m tall — the basis for barometers.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": true}, {"question": "Why is it easier to float in the Dead Sea than in a freshwater lake?", "answer": "The Dead Sea has an extremely high salinity, giving it a density of about 1,240 kg/m³ (compared to ~1,000 kg/m³ for freshwater).\n\n+ Upthrust = weight of displaced fluid = $V_{\\text{displaced}} \\times \\rho_{\\text{fluid}} \\times g$.\n+ For the same body volume submerged, the saltier water provides more upthrust (because $\\rho$ is higher).\n+ Therefore, you float higher (more of your body above water) in the Dead Sea. You can even float on your back without swimming!\n+ This is why people float more easily in ocean water (ρ ≈ 1025 kg/m³) than in freshwater pools.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": true}, {"question": "A wooden block and an iron block of exactly the same volume are both lowered into water. Which experiences greater upthrust? Explain.", "answer": "Both experience **exactly the same upthrust**, because upthrust depends only on the **volume of fluid displaced**, not on the material of the object.\n\n+ Upthrust = weight of displaced fluid = $V_{\\text{displaced}} \\times \\rho_{\\text{fluid}} \\times g$.\n+ Since both blocks have the same volume and are fully submerged, they displace the same volume of water.\n+ However, the iron block sinks (its weight > upthrust), while the wooden block may float (its weight < upthrust, if wood density < water). The upthrust is the same, but the *weight* of each object differs.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": true}, {"question": "An object is in equilibrium floating partially submerged in water. What can you say about the forces acting on it?", "answer": "The object is in **dynamic equilibrium** — the forces balance:\n\n- **Upthrust** (upward) = **Weight** (downward).\n- The object is stationary (not accelerating up or down).\n+ Since upthrust = weight of displaced fluid, this also means: weight of object = weight of displaced water.\n+ From this, you can find what fraction of the object's volume is submerged: $V_{\\text{submerged}} / V_{\\text{total}} = \\rho_{\\text{object}} / \\rho_{\\text{fluid}}$.\n+ For example, ice (ρ ≈ 917 kg/m³) in water (ρ ≈ 1000 kg/m³) has 91.7% of its volume submerged.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": true}, {"question": "Why do hot air balloons rise and float in the air?", "answer": "- Step 1: A hot air balloon contains air that is **less dense** than the surrounding cool air (because heating reduces density).\n- Step 2: The balloon displaces a volume of air equal to its own volume. The upthrust equals the weight of this displaced cool air.\n- Step 3: Since the balloon (including the hot air inside) weighs **less** than the cool air it displaces, the upthrust exceeds the weight — causing it to rise.\n+ This is exactly the same principle as objects floating in water, just with air as the fluid. It's \"floating\" in the atmosphere!", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": true}, {"question": "Why does an object weigh less when fully submerged in water? Where does this \"lost weight\" go?", "answer": "- Step 1: The \"lost weight\" is actually the upthrust force acting upward, reducing the net force you feel.\n- Step 2: The object's true weight (mg) remains unchanged — gravity still pulls down with the same force.\n- Step 3: The water pushes up with a force equal to the weight of water displaced. This upward force partially cancels the downward weight.\n+ The \"lost weight\" isn't transferred anywhere specific — it's simply that the water is pushing up, reducing the net force the object exerts on whatever is holding it (like a weighing scale).\n+ This is why a weighing scale reads less for an object submerged in water — it's measuring *apparent weight*, not true weight.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "Could a very dense object like gold float in mercury? Given that gold density ≈ 19,300 kg/m³ and mercury density ≈ 13,600 kg/m³.", "answer": "Yes! Since gold's density (19,300 kg/m³) is **greater** than mercury (13,600 kg/m³), pure gold would **sink** in mercury.\n\n+ Wait — I need to reconsider the question. The answer is actually **no, gold sinks in mercury** because gold is denser.\n+ However, some **alloys** or hollow gold objects could float if their average density is less than mercury.\n+ This demonstrates that whether something floats depends on **average density** (including any hollow spaces), not the density of the material itself. A metal ship floats because it contains air (low average density), even though the steel itself is denser than water.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "If you gently place a metal needle flat on water, it floats despite steel being much denser than water. Why?", "answer": "- Step 1: This is not \"floating\" in the same sense as buoyancy — it's **surface tension** at work.\n- Step 2: Water molecules at the surface are pulled inward by other water molecules, creating a \"skin\" of tension that can support small objects if they're placed gently.\n- Step 3: The needle's weight is small enough that surface tension forces (acting upward around the needle's circumference) can support it.\n+ If you push the needle through the surface, it will sink — you've broken the surface tension.\n+ This effect is why some insects can \"walk\" on water.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Why does lying on a bed of nails not hurt (as much as you might expect)?", "answer": "- Step 1: Pressure = force ÷ area ($p = F/A$).\n- Step 2: Your weight (force) is spread across hundreds of nails, each with a tiny point — greatly increasing the total contact area.\n- Step 3: The pressure on any single nail point is low enough that it doesn't puncture the skin. The force is distributed!\n+ This is the same principle as snowshoes — spread the force over a large area to reduce pressure.\n+ Key insight: It's not the *force* that causes damage (your weight doesn't change), it's the *pressure* (force per area).", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Why are balloon Catheters (medical devices) designed with a long narrow tube ending in a small balloon?", "answer": "- Step 1: The narrow tube has a small cross-sectional area, so when fluid is pumped through it, it creates high pressure ($p = F/A$) at the tip.\n- Step 2: This high pressure inflates the small balloon inside a blocked artery or organ.\n- Step 3: The small inflated balloon can then open up a blockage (like in angioplasty), with the force concentrated exactly where needed.\n+ The narrow tube allows doctors to reach precise locations in the body through small blood vessels, while the balloon expands only at the treatment site.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Why does the same force create different pressures on different surfaces, and why does this matter in practical applications?", "answer": "Because pressure depends on the **area** over which the force acts: $p = F/A$.\n\n- Same force, smaller area → higher pressure (knives, needles, spikes).\n- Same force, larger area → lower pressure (tyres, snowshoes, elephant feet).\n+ This is why:\n+ Cutting tools have sharp edges (small A → high p → cuts easily).\n+ Heavy vehicles have wide tracks (large A → low p → doesn't sink).\n+ A 10 N knife can exert more pressure than a 10,000 N elephant because of the dramatic difference in contact area.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A student says: \"Since pressure is force per unit area, a larger force always means larger pressure.\" Is this correct? Explain.", "answer": "This is **incorrect** — the statement ignores the area term.\n\n- Pressure also depends on the area over which the force acts. A *larger force applied over an even larger area* could result in *lower* pressure.\n+ Example: An elephant (weight ~50,000 N) standing on four wide feet creates less pressure than a person (weight ~600 N) standing on the sharp point of a nail.\n+ The correct relationship: Pressure is proportional to force *and inversely proportional to area*. You must consider both factors.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "Why does holding your breath allow you to dive deeper underwater without feeling the pressure as much?", "answer": "This is actually a misconception — the pressure still increases with depth regardless of whether you hold your breath.\n\n+ However, air in your lungs compresses slightly as you dive deeper (air is compressible), which:\n  - Reduces your overall density slightly, making you more buoyant.\n  - The air in your lungs pushes outward against your chest, partially counteracting the external water pressure.\n+ But the key limit is that your lungs will compress to their minimum volume (~residual volume) around 30-40 m depth — below this, you cannot hold any more air, and the pressure difference becomes painful.\n+ Free divers train to equalise pressure in their ears (by swallowing) to dive deeper without pain.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A sealed plastic bottle floats in water. What happens to it if you push it underwater and release it? Does it stay submerged, rise, or what?", "answer": "It **bobs back up** and floats.\n\n- Step 1: When fully submerged, the bottle displaces a volume of water equal to its own volume.\n- Step 2: The upthrust = weight of this displaced water. Since the bottle is less dense than water (plastic + air inside), the upthrust exceeds its weight.\n- Step 3: The net upward force makes it rise until it's partially submerged enough that the displaced water weight exactly equals the bottle's weight — then it floats at equilibrium.\n+ This is like a Cartesian diver — push it down, and the upward net force pushes it back up.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "What happens if you fill a plastic bottle completely with water (no air) and then try to make it float? Does it sink or float?", "answer": "It **sinks**.\n\n- A sealed bottle filled with water has the same density as water (~1000 kg/m³).\n- When fully submerged, it displaces its own volume of water, creating upthrust equal to its own weight — so it's in neutral equilibrium (neither rising nor sinking).\n- If you push it below the surface and release, it stays suspended where you leave it (neutral buoyancy).\n+ Compare this to an empty bottle (contains air, lower average density) which floats.\n+ This is why hollow objects float — the air inside reduces average density.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": true}, {"question": "A submarine can float on the surface, submerge, or sit on the ocean floor. How does it control its depth?", "answer": "- Step 1: The submarine has **ballast tanks** that can be filled with water or emptied with compressed air.\n- Step 2: When the tanks are filled with air, the submarine's average density is less than water → it **floats**.\n- Step 3: When the tanks are flooded with water, average density increases. When weight = upthrust, it **hovers** (neutral buoyancy). When flooded further, it **sinks**.\n- Step 4: To rise again, compressed air is used to blow the water out of the ballast tanks, reducing density again.\n+ This is exactly controlling the average density of the entire submarine to be less than, equal to, or greater than seawater.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A student claims: \"Objects float because they're light, and sink because they're heavy.\" How would you correct this misconception?", "answer": "This is incorrect — **density**, not mass or weight, determines floating and sinking.\n\n+ Counterexamples:\n  - A huge wooden log (very heavy, maybe 500 kg) floats.\n  - A small iron nail (very light, maybe 5 g) sinks.\n+ The key is comparing densities:\n  - Object density < fluid density → floats.\n  - Object density > fluid density → sinks.\n+ A heavy aircraft carrier floats because it's mostly hollow (air inside), giving it an average density much less than water. A small gold ring sinks because gold is much denser than water.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "If you turn a glass of water upside down (sealed against a table), why does the water not fall out? What keeps it in place?", "answer": "Atmospheric pressure pushes up on the water from below, against the table.\n\n- Step 1: The glass is sealed against the table, so no air can get in to push down on the water from above.\n- Step 2: Atmospheric pressure outside (about 101 kPa) pushes up on the water through the table's surface.\n- Step 3: This upward pressure is enough to support the weight of the water column (as long as the glass isn't taller than ~10.3 m — the maximum height water can be lifted by atmospheric pressure alone).\n+ This is essentially the same principle as the straw experiment — atmospheric pressure can support a column of fluid against gravity.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Why is the pressure at the bottom of a dam much greater than at the top, even though the dam wall is the same thickness throughout?", "answer": "Pressure depends on **depth**, not the thickness of the container wall.\n\n- At the top of the reservoir (say, 10 m deep), the pressure is $p = h\\rho g$ = 10 × 1000 × 10 = 100 kPa.\n- At the bottom (say, 30 m deep), the pressure is 30 × 1000 × 10 = 300 kPa — three times greater.\n+ The dam wall must be thick enough to withstand the maximum pressure at the base. The upper parts have less pressure, so they don't need as much material.\n+ Some dams are built with a *triangular* cross-section — thicker at the bottom where pressure is greatest — exactly matching the pressure distribution.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "Why does a balloon inflated at sea level expand when it rises to high altitude?", "answer": "- Step 1: At sea level, the balloon is inflated against atmospheric pressure (~101 kPa). The rubber skin exerts inward pressure, and the air inside pushes outward.\n- Step 2: As the balloon rises, atmospheric pressure decreases (fewer air molecules above).\n- Step 3: The lower external pressure means less force pushing in on the balloon. The internal pressure (from the air inside) is now greater relative to the outside.\n- Step 4: The balloon expands until either the rubber provides enough counter-pressure, or it bursts.\n+ This is why weather balloons are partially inflated on the ground — they expand as they rise.\n+ The same effect happens in aircraft cabins — they must be pressurised at high altitudes to prevent the air inside from expanding dangerously.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": true}, {"question": "Explain why the spring constant $k$ in Hooke's Law can be thought of as a \"stiffness constant.\"", "answer": "The spring constant $k$ tells you how much force is needed to produce a given extension:\n\n- High $k$ → large force needed for small extension → **stiff** spring.\n- Low $k$ → small force needed for large extension → **soft** or **stretchy** spring.\n\n+ Units: N/m (newtons per metre) — force needed per metre of extension.\n+ Example: A car suspension spring might have $k$ = 50,000 N/m (very stiff). A rubber band might have $k$ ≈ 100 N/m (very stretchy).\n+ The \"stiffness\" is intrinsic to the material and geometry — a thick steel wire coil is stiffer than a thin one, giving a higher $k$.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "Why do springs in pogo sticks feel \"bouncy\" but eventually stop bouncing as high?", "answer": "- Step 1: When you compress the spring, you do work on it, storing elastic potential energy ($E = \\frac{1}{2}kx^2$).\n- Step 2: This energy is released as the spring expands, pushing you upward.\n- Step 3: However, some energy is lost with each bounce: to air resistance, internal heating in the spring, and friction at the hinges.\n- Step 4: Eventually, the stored energy each bounce is less than the energy lost, so the bounce height decreases until the spring just settles.\n+ The damping is intentional in pogo sticks (using a plunger or damper) to prevent endless bouncing and give control.\n+ A perfectly elastic system with no energy loss would bounce forever (in theory).", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A spring is hanging vertically with a mass attached. When the mass is removed, does the spring return to its original length immediately, and what determines this?", "answer": "- Step 1: For an ideal elastic spring obeying Hooke's Law, it should return to its original length immediately (no delay).\n- Step 2: In practice, springs oscillate — they extend beyond the rest length, then contract, oscillating until energy is dissipated and they settle.\n- Step 3: The \"springiness\" (bounciness) depends on the spring constant and the mass. A light spring with a small mass oscillates rapidly (high frequency).\n+ Real springs have some internal friction and air resistance, causing the oscillations to dampen over time.\n+ The time to settle depends on how much energy is dissipated each cycle.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "When calculating pressure in a liquid using $p = h\\rho g$, does $h$ mean the total depth of the liquid or the depth below the surface?", "answer": "$h$ is the **depth below the free surface** of the liquid — the vertical distance from the surface to the point in question.\n\n- If you're 2 m below the water surface, $h$ = 2 m.\n- The total depth of the container (e.g., a 10 m deep pool) doesn't matter for calculating pressure at a given point — only how deep that point is *below the surface*.\n+ This is why pressure is the same at the bottom of both a shallow wide lake and a deep narrow well, if the depth below the surface is the same.\n+ Atmospheric pressure acts *on top* of the liquid surface, so total pressure at depth $h$ = $p_{\\text{atm}} + h\\rho g$.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": true}, {"question": "Two identical blocks are placed in water — one floats, one sinks. Which block experiences the greater upthrust?", "answer": "The block that **sinks** experiences the **greater upthrust** (assuming both are fully submerged).\n\n- Step 1: Upthrust = weight of displaced fluid = $V_{\\text{displaced}} \\times \\rho_{\\text{fluid}} \\times g$.\n- Step 2: Both blocks have the same volume, and if fully submerged, displace the same volume of water.\n- Step 3: Therefore, the upthrust on both is the same! Wait — but the floating block is only *partially* submerged.\n+ Correction: If comparing:\n  - Floating block (partially submerged): upthrust = weight of block (less water displaced).\n  - Sinking block (fully submerged): upthrust = weight of *full* volume of displaced water.\n+ If the sinking block is fully submerged while floating block is partially, the sinking block displaces *more* water → **sinking block has greater upthrust**.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": true}, {"question": "Why do ice cubes float in a drink with about 90% of their volume submerged?", "answer": "Ice has a density of about 917 kg/m³, while water (the liquid) has a density p 5: Eventually, the air density equals the balloon's average density. At this point, upthrust = weight, and the balloon reaches maximum altitude (neutral buoyancy) — it stops rising.\n+ Weather balloons expand as they rise for the same reason — external air density decreases.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": true}, {"question": "A student says, \"The pressure at the bottom of a swimming pool is greater because there's more water above.\" Is this correct? Explain.", "answer": "Yes, this is correct — but it's worth unpacking why.\n\n- Pressure at any depth = weight of fluid above that point, per unit area.\n- At the bottom, there's a taller column of water above — more weight pushing down → higher pressure.\n- At 2 m depth, you have 2 m of water pressing down. At 4 m depth, you have 4 m pressing down — twice the weight, twice the pressure.\n+ This is exactly what the equation $p = h\\rho g$ tells us: pressure is proportional to depth $h$.\n+ The key insight is that pressure comes from the *weight* of the fluid above, distributed over the area.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "When a force is applied to a spring, describe the energy transformations from start to end.", "answer": "- Step 1: **Chemical potential energy** in your muscles (from food) is converted to **mechanical work** as you pull.\n- Step 2: This work is transferred as **elastic potential energy** stored in the stretched spring ($E = \\frac{1}{2}kx^2$).\n- Step 3: When you release the spring, the elastic potential energy converts to **kinetic energy** of the spring recoiling.\n- Step 4: Eventually, this kinetic energy may: \n  + Be transferred to another object (launching a ball).\n  + Convert to thermal energy (internal heating in the spring due to friction).\n  + Radiate as sound.\n+ No energy is created or destroyed — it transforms from one form to another (Conservation of Energy).", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": true}, {"question": "In the Core Practical investigating force and extension, why is it important to zero the ruler before measuring extension?", "answer": "- Step 1: The extension $x$ is defined as *change in length* from the original (unstretched) length.\n- Step 2: If the ruler isn't zeroed properly, you're measuring absolute length, not extension.\n- Step 3: By zeroing the ruler at the spring's original length (or setting the fiducial marker to read zero at the start), each subsequent reading directly gives extension without needing to subtract the original length each time.\n+ This reduces calculation steps and potential for error.\n+ It also helps identify systematic errors — if your graph doesn't go through the origin, you know there's a zeroing error.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": true}, {"question": "Why is it important that the fiducial marker (pointer) is attached to the spring, not just the clamp, in the Hooke's Law experiment?", "answer": "- Step 1: The pointer must move *with* the spring as it stretches, to accurately show the extension.\n- Step 2: If the pointer were fixed to the clamp, it wouldn't move when the spring extends — you'd just see the spring slide past it.\n- Step 3: By attaching the pointer to the spring, it indicates exactly where the end of the spring is, allowing you to read the extension directly from the ruler.\n+ This eliminates parallax error when reading the ruler, as you can focus on the tip of the moving pointer rather than trying to estimate where the spring ends.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "If you plotted force vs extension and got a straight line that *doesn't* go through the origin, what does this tell you about your experiment?", "answer": "- Step 1: In a correct Hooke's Law relationship, the line should be straight *and* pass through the origin (directly proportional).\n- Step 2: A straight line that doesn't pass through the origin is **linear** but not **proportional**.\n- Step 3: This could indicate a **systematic error** in your zeroing — you may have started measuring from the wrong original length.\n+ Alternatively, the spring may have had some pre-existing tension or compression even without added masses.\n+ Common cause: Not accounting for the weight of the spring itself or the weight of the initial mass hanger when you \"zeroed\" the apparatus.\n+ The gradient (slope) would still give you the spring constant $k$, but the intercept reveals a zeroing error.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": true}, {"question": "In the force-extension experiment, if you added masses and then removed them, should the spring return to exactly its original length? What does it mean if it doesn't?", "answer": "- If the spring obeys Hooke's Law and you're within the limit of proportionality, it **should return** to its original length (elastic behavior).\n- If it **doesn't return** (stays longer than before), you've stretched it past its **elastic limit** — permanent (plastic) deformation has occurred.\n+ The spring has been permanently stretched.\n+ This means you've exceeded the maximum elastic extension for that particular spring.\n+ Going forward, the original length for calculating extension has changed — you'd need to measure from the new \"rest\" length.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": true}, {"question": "Why do thick steel cables stretch less than thin steel cables of the same material when the same force is applied?", "answer": "- Step 1: The spring constant $k$ depends on both the material (its stiffness) AND the geometry of the object.\n- Step 2: For a spring or wire, $k$ is proportional to the **cross-sectional area** — a thicker wire has more material to resist stretching.\n- Step 3: A thicker cable has a larger cross-sectional area $A$, so for the same applied force, the stress ($F/A$) is lower, resulting in less strain (extension per unit length).\n+ Think of it this way: instead of one thin wire, you effectively have many parallel \"springs\" sharing the load, each stretching less.\n+ This is why structural steel beams are thick — they need high $k$ (low extension) under load.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": true}], "count": 50}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 10237, "out_tokens": 16432, "reasoning_chars": 45519, "cost_eur": 0.0628, "elapsed_s": 142, "content_chars": 20691}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 10237, "out_tokens": 14489, "reasoning_chars": 30110, "cost_eur": 0.0565, "elapsed_s": 438, "content_chars": 27040}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 10237, "out_tokens": 17135, "reasoning_chars": 40614, "cost_eur": 0.0651, "elapsed_s": 117, "content_chars": 26749}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 9973, "out_tokens": 9544, "reasoning_chars": 3202, "cost_eur": 0.0115, "elapsed_s": 135, "content_chars": 37645}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 9973, "out_tokens": 10288, "reasoning_chars": 2363, "cost_eur": 0.0122, "elapsed_s": 153, "content_chars": 41747}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 10546, "out_tokens": 2845, "reasoning_chars": 3640, "cost_eur": 0.0051, "elapsed_s": 52, "content_chars": 8435}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 10546, "out_tokens": 2622, "reasoning_chars": 2423, "cost_eur": 0.0048, "elapsed_s": 48, "content_chars": 8129}}};
const SK='ch15_forces_matter';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
