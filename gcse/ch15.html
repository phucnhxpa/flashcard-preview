<script>
const DATA={"selected": [{"question": "A diving board bends when someone stands on the end. What two microscopic distortions combine to create this macroscopic bending? (2 steps)", "answer": "- Step 1: The top surface of the diving board experiences stretching (tension), as the bending pulls the particles further apart from each other.\n- Step 2: The bottom surface experiences compression, as the bending pushes the particles closer together. The combination of these two opposing distortions across the thickness of the board results in the overall bend.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "In a solid elastic material, what is happening at the atomic level that causes the restoring force to be directly proportional to extension (Hooke's Law)? (2 steps)", "answer": "- Step 1: Atoms in a solid are held together by electromagnetic forces that act like tiny springs. When stretched a small amount, the restoring force from each atomic bond increases linearly with the distance pulled.\n- Step 2: Since the total macroscopic force is just the sum of these microscopic bond forces, the total force is also directly proportional to the total extension, giving $$F = kx$$.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "If you stretch a spring beyond its limit of proportionality, why can you no longer use $$E = \\frac{1}{2}kx^2$$ to find the energy stored, and how would you find it instead? (2 steps)", "answer": "- Step 1: The formula assumes a linear relationship (a straight line on the graph) to form a triangle area. Beyond the limit, the relationship is non-linear (curved), so the area under the graph is no longer a simple triangle.\n- Step 2: You must instead find the energy stored by calculating the total area under the force-extension curve up to that extension, which includes the triangular Hooke's law region plus the additional curved region.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "In Core Practical 7, a student adds $$100 \\text{ g}$$ masses one by one and records the ruler reading each time. Why is it a critical error to calculate each extension as the difference from the *previous* reading, rather than from the *original* reading? (2 steps)", "answer": "- Step 1: The true extension is the total change in length from the original, unstretched length. If calculated from the previous reading, you are only finding the incremental stretch caused by the last mass added.\n- Step 2: According to Hooke's Law, each equal mass increment should cause an equal increment in extension. Therefore, if your calculated extensions are all roughly the same small value instead of cumulatively growing, you have made this error.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "Why does the pressure in a fluid act at $$90^\\circ$$ (normal) to the surface of a submerged object, rather than at some other angle? (2 steps)", "answer": "- Step 1: Fluid molecules move randomly in all directions, colliding with the surface. Their parallel velocity components cancel out over time due to the vast number of random collisions.\n- Step 2: Only the perpendicular components of the molecular momenta transfer force into the surface, resulting in a net push that is exactly at right angles (normal) to the surface.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "How does the pressure difference between the top and bottom of a submerged object result in an upward force (upthrust) equal to the weight of the fluid displaced? (3 steps)", "answer": "- Step 1: The bottom of the object is at a greater depth ($$h_{bottom}$$) than the top ($$h_{top}$$), so by $$p = h\\rho g$$, the upward pressure on the bottom is greater than the downward pressure on the top.\n- Step 2: The net upward force is the pressure difference times the cross-sectional area: $$F_{net} = (p_{bottom} - p_{top}) \\times A = (h_{bottom} - h_{top})\\rho g \\times A$$.\n- Step 3: The height difference $$(h_{bottom} - h_{top})$$ times the area $$A$$ is exactly the volume of the object $$V$$. So $$F_{net} = V\\rho g$$, which is the mass of the displaced fluid times gravity—exactly the weight of the displaced fluid.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "A sealed, flexible helium balloon is released at sea level and rises. As it gains altitude, the atmospheric pressure drops. Explain what happens to the volume of the balloon and the upthrust acting on it. (3 steps)", "answer": "- Step 1: The pressure outside the balloon decreases with altitude, while the internal gas pressure remains initially higher, causing the balloon to expand until internal and external pressures balance.\n- Step 2: As the volume increases, it displaces more air, which would increase the upthrust. However, the air density also decreases significantly with altitude.\n- Step 3: The upthrust depends on the weight of the displaced fluid ($$\\rho \\times V \\times g$$). Because the air density drops faster than the volume increases, the weight of the displaced air eventually decreases, reducing the upthrust until it matches the balloon's weight at a new equilibrium altitude.", "source": "GLM 5.1 ①", "_id": "glm_1_22"}, {"question": "When we talk about \"compression\" in the context of forces and matter (Chapter 15), how does it differ from compressing a gas? (2 steps)", "answer": "- Step 1: In forces and matter, compression refers to a solid object being squeezed by two opposing forces towards its center, changing its macroscopic shape (like a spring or a sponge).\n- Step 2: Compressing a gas involves reducing the volume of a fluid by forcing its free-moving molecules closer together, increasing the pressure. The solid compression is about structural shape change, while gas compression is about reducing fluid volume and increasing pressure.", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "A diver is at a depth where the liquid pressure is $$300 \\text{ kPa}$$. If the total pressure on the diver is roughly $$400 \\text{ kPa}$$, where does the extra $$100 \\text{ kPa}$$ come from, and why must it be included? (2 steps)", "answer": "- Step 1: The extra pressure comes from the atmosphere above the water's surface (atmospheric pressure, roughly $$101 \\text{ kPa}$$ at sea level).\n- Step 2: The atmosphere pushes down on the surface of the water, and this pressure is transmitted throughout the liquid. Therefore, the total pressure on the diver is the sum of the weight of the water above AND the weight of the air above.", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "When a spring is stretched beyond its elastic limit and permanently deformed, where does the extra work done on the spring go, compared to stretching it within the elastic limit? (3 steps)", "answer": "- Step 1: Within the elastic limit, all work done on the spring is stored as recoverable elastic potential energy.\n- Step 2: Beyond the elastic limit, the atomic bonds in the material start to permanently rearrange or slip past each other.\n- Step 3: The work done to cause this permanent rearrangement is dissipated to the surroundings (usually as thermal energy/heat) and cannot be recovered as mechanical energy.\n\nInelastic distortion converts useful mechanical energy into heat; the energy is \"lost\" to the spring's internal structure.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "Why is the elastic potential energy stored in a spring given by $$E = \\frac{1}{2}kx^2$$ instead of just $$E = kx^2$$ or $$E = Fx$$? Walk through the reasoning using the force-extension graph. (3 steps)", "answer": "- Step 1: Work done equals force × distance. However, as you stretch the spring, the force isn't constant — it starts at 0 and increases linearly up to the final force $$F$$.\n- Step 2: On a force-extension graph, work done is the area under the graph. For the Hooke's Law region, this area is a triangle.\n- Step 3: The area of a triangle is $$\\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2} \\times x \\times F$$. Since $$F = kx$$, substituting gives $$E = \\frac{1}{2} \\times x \\times (kx) = \\frac{1}{2}kx^2$$. The $$\\frac{1}{2}$$ comes from using the *average* force during the stretch.\n\nThe 1/2 factor is a direct consequence of the force ramping up linearly from zero.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "If you hang a weight on two identical springs end-to-end (in series), how does the total extension compare to using just one spring, and what does this imply about the effective spring constant? (3 steps)", "answer": "- Step 1: In a series arrangement, each spring experiences the full weight (force) individually. Therefore, each spring extends by the same amount it would if it were hanging alone.\n- Step 2: The total extension of the system is the sum of the individual extensions: $$x_{total} = x + x = 2x$$.\n- Step 3: Since $$F = k_{eff}x_{total}$$ and the total extension has doubled for the same force, the effective spring constant $$k_{eff}$$ must be halved ($$k_{eff} = k/2$$). Adding springs in series makes the system less stiff.\n\nSprings in series are softer; the combined spring constant is lower than any individual spring's constant.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "In the Hooke's Law core practical, why is it best to plot Force (F) on the y-axis and Extension (x) on the x-axis, rather than the other way around? (2 steps)", "answer": "- Step 1: The standard equation for a straight line is $$y = mx + c$$. Hooke's Law is $$F = kx$$.\n- Step 2: If $$F$$ is on the y-axis and $$x$$ is on the x-axis, this matches $$y = mx$$ perfectly, meaning the gradient directly equals the spring constant $$k$$. If the axes were swapped, the gradient would be $$1/k$$, which requires an extra calculation step and is less intuitive.\n\nPlot F vs x so the gradient is the physically meaningful spring constant.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "In the Hooke's Law experiment, if you measure the spring's original length before adding any masses, but the spring is already slightly stretched under its own weight, how does this affect your force-extension graph? (3 steps)", "answer": "- Step 1: The extension must always be measured from the *unstretched* (zero force) position. If the spring stretches under its own weight, its natural hanging length is your true \"original length\" baseline.\n- Step 2: If you incorrectly use the coiled (un-hung) length as the original length, your first data point will have a non-zero extension for zero added force.\n- Step 3: This shifts the entire graph to the right, but the gradient (spring constant) remains unchanged. The line will not pass through the origin, but it will still be parallel to the true line.\n\nA non-zero starting extension shifts the line but doesn't change the stiffness (gradient).", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "Three containers with different shapes (narrow, wide, and funnel-shaped) are filled with water to the exact same depth. How do the pressures at the bottom of each container compare? (2 steps)", "answer": "- Step 1: Liquid pressure depends *only* on depth, liquid density, and gravity ($$p = h\\rho g$$). It does not depend on the volume of water or the shape of the container.\n- Step 2: Since depth $$h$$, density $$\\rho$$, and $$g$$ are identical in all three, the pressure at the bottom is identical in all three. This is known as the **hydrostatic paradox**.\n\nDepth alone dictates liquid pressure, not the total weight of water above.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "Where does the liquid pressure equation $$p = h\\rho g$$ come from? Walk through the logic of why these three variables multiply together. (3 steps)", "answer": "- Step 1: Pressure is force per area ($$p = F/A$$). The force here is the weight of the liquid column above the point, and weight is $$W = mg$$.\n- Step 2: The mass of this liquid column is its volume times its density ($$m = V \\times \\rho$$). For a column of height $$h$$ and base area $$A$$, the volume is $$V = A \\times h$$. So, mass $$m = A \\times h \\times \\rho$$.\n- Step 3: Substituting into the pressure equation: $$p = \\frac{F}{A} = \\frac{mg}{A} = \\frac{(A h \\rho) g}{A}$$. The area $$A$$ cancels out top and bottom, leaving $$p = h \\rho g$$.\n\nThe area cancels out, which is why pressure at a depth doesn't depend on the container's width, only the height of liquid above.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Why does atmospheric pressure decrease *more rapidly* near sea level compared to high up in the atmosphere? (2 steps)", "answer": "- Step 1: Air is a compressible fluid. Near sea level, the weight of all the air above compresses the air below, making it much denser.\n- Step 2: Because the air near sea level is denser, a small increase in altitude removes a large mass of air, causing a large drop in pressure. Higher up, the air is already sparse (low density), so going up a bit further removes very little mass, and pressure drops slowly.\n\nAir density decreases with altitude, causing the non-linear (exponential) drop in atmospheric pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "Why is the upthrust on a submerged object exactly equal to the weight of the fluid it displaces, rather than the weight of the object itself? (3 steps)", "answer": "- Step 1: Imagine a \"hole\" in the fluid exactly the size and shape of the object. The fluid that would normally fill this hole is in equilibrium — it just floats there, so its weight must be perfectly balanced by the upward pressure forces (upthrust) from the surrounding fluid.\n- Step 2: The upward pressure forces from the surrounding fluid depend *only* on the shape of the hole and the depth, not on what material is actually inside it.\n- Step 3: When you replace that fluid with the object, the upward pressure forces from the surroundings don't change. Therefore, the upthrust remains exactly equal to the weight of the fluid that was displaced.\n\nUpthrust is a property of the fluid and the hole's volume, not the object's weight.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "An object floats with exactly 30% of its volume submerged in water. What can you deduce about the object's density, and why? (3 steps)", "answer": "- Step 1: For an object to float, upthrust must equal its weight. Upthrust equals the weight of the displaced fluid.\n- Step 2: Since only 30% of the volume is submerged, the weight of the displaced fluid is only 30% of what it would be if the whole object were submerged.\n- Step 3: Therefore, the object's total weight must equal 30% of the weight of a same-sized volume of water. This means the object's mass (and density) is 30% of water's density. The object's density is $$0.3 \\, \\text{g/cm}^3$$ (or $$300 \\, \\text{kg/m}^3$$).\n\nThe fraction of an object submerged equals the ratio of its density to the fluid's density.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "A solid iron cube is fully submerged 1 metre deep in water, and then lowered to 10 metres deep. Assuming it remains fully submerged, how does the upthrust change? (2 steps)", "answer": "- Step 1: Upthrust is the difference between the upward pressure force on the bottom face and the downward pressure force on the top face of the cube.\n- Step 2: While the absolute pressures on both top and bottom increase significantly at 10 m, the *difference* in pressure between the top and bottom depends only on the height of the cube itself (which hasn't changed). Therefore, the upthrust remains exactly the same.\n\nUpthrust on a fully submerged object depends on its volume and fluid density, NOT on the depth of submersion.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "If a spring is stretched beyond its limit of proportionality, why can't you use $$E = \\frac{1}{2}kx^2$$ to find the stored energy? What must you do instead? (2 steps)", "answer": "- Step 1: The formula $$E = \\frac{1}{2}kx^2$$ is derived from the area of a triangle, which assumes the force-extension graph is a straight line through the origin ($$F=kx$$).\n- Step 2: Beyond the limit of proportionality, the graph curves, so the area is no longer a simple triangle. To find the energy stored, you must calculate the total area under the curved graph (usually by counting squares on graph paper).\n\n$$E = \\frac{1}{2}kx^2$$ is strictly a Hooke's Law result; for non-linear regions, use graphical area.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "When calculating the pressure a brick exerts on the ground using $$p = F/A$$, what area $$A$$ should you use: the total surface area of the brick, or the area of the face touching the ground? (2 steps)", "answer": "- Step 1: Pressure is force per unit area *over which the force is distributed*.\n- Step 2: The weight of the brick only pushes down on the area of the face in contact with the ground. The sides and top face are not supporting the weight against the ground. Therefore, you must use the cross-sectional area of the contact face, not the total surface area.\n\n$$A$$ in $$p = F/A$$ is always the contact area normal to the force.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "An object is fully submerged first in water, then in a much denser liquid like mercury. In which liquid is the upthrust greater, and why? (2 steps)", "answer": "- Step 1: Upthrust equals the weight of the displaced fluid. The object displaces the same volume in both liquids because it is fully submerged.\n- Step 2: Mercury has a much higher density, so the same displaced volume has a much greater mass and therefore a much greater weight. The upthrust in mercury is significantly greater.\n\nUpthrust increases with the density of the fluid for the same submerged volume.", "source": "GLM 5.1 ②", "_id": "glm_2_27"}, {"question": "A spring is compressed and then released, launching a ball. If you double the compression of the spring, how does the launch speed of the ball change? (Assume all EPE transfers to the ball's kinetic energy). (3 steps)", "answer": "- Step 1: Doubling the compression quadruples the stored elastic potential energy ($$E = \\frac{1}{2}kx^2$$, so $$2^2 = 4$$ times the energy).\n- Step 2: All this energy becomes kinetic energy ($$E_k = \\frac{1}{2}mv^2$$). So the ball's kinetic energy is 4 times greater.\n- Step 3: Since kinetic energy is proportional to $$v^2$$, for $$E_k$$ to increase by a factor of 4, the velocity $$v$$ must increase by a factor of 2 (since $$2^2 = 4$$). The launch speed doubles.\n\nDoubling spring compression doubles the launch speed (not quadruples, because of the square root relationship between energy and speed).", "source": "GLM 5.1 ②", "_id": "glm_2_28"}, {"question": "In physics, the word \"elastic\" appears in both \"elastic distortion\" and \"elastic collision\". Do these two uses of \"elastic\" mean the same thing? (2 steps)", "answer": "- Step 1: No, they refer to different physical concepts, though they share the broad idea of \"recovery.\"\n- Step 2: \"Elastic distortion\" means the object's *shape* fully recovers after the force is removed. \"Elastic collision\" means *kinetic energy* is conserved during the impact. A rubber ball can have an inelastic collision (losing KE as heat/sound) while still undergoing elastic distortion (bouncing back to its original shape).\n\nElastic shape recovery ≠ elastic energy conservation in collisions.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "A rubber band returns to its original shape after being stretched, making it elastic. However, its force-extension graph is a curve, not a straight line through the origin. Does it obey Hooke's Law? Explain the distinction. (2 steps)", "answer": "- Step 1: It does NOT obey Hooke's Law. Hooke's Law requires the extension to be *directly proportional* to the force, which means a straight line through the origin on a force-extension graph.\n- Step 2: Being \"elastic\" only means the object can recover its original shape once the force is removed. An object can be perfectly elastic but have a non-linear relationship between force and extension, meaning it is elastic but not \"Hookean.\"", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "On a force-extension graph for a metal wire, the line starts to curve slightly, but when the force is removed, the wire still returns to its original length. Differentiate between the \"limit of proportionality\" and the \"elastic limit\" using this scenario. (2 steps)", "answer": "- Step 1: The **limit of proportionality** is the exact point where the graph stops being a straight line. Past this point, force and extension are no longer directly proportional (Hooke's Law fails), but the material might still recover its shape.\n- Step 2: The **elastic limit** is the point beyond which the material suffers permanent deformation. Between the two limits, the material is non-linear but still elastic. Past the elastic limit, it becomes inelastic (plastic).\n+ Example: Think of a spring that gets harder to stretch the more you pull it (past limit of proportionality) but still bounces back perfectly when you let go (before elastic limit).", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "Two identical springs are placed side-by-side (in parallel) supporting a single weight. Compared to a single spring, how does the extension change, and what does this imply about the effective spring constant? (3 steps)", "answer": "- Step 1: If you place two identical springs side-by-side (in parallel) supporting a weight, the weight is shared equally between them. Each spring only supports half the total weight.\n- Step 2: Because each spring only feels half the force, each one extends only half as much as it would if it were supporting the weight alone.\n- Step 3: Since the whole system only extends half as much for the same applied force, it takes twice the force to achieve the same extension as a single spring. Therefore, the effective spring constant is doubled ($$k_{\\text{parallel}} = 2k$$). The system is stiffer.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "In Core Practical 7, a student adds 100 g masses one by one to a spring. A common mistake is to record the \"increase in length from the previous reading\" as the extension. Why must extension always be calculated from the *original* length, and what would the graph look like if the student made this mistake? (2 steps)", "answer": "- Step 1: Extension ($$x$$) is defined as the total change from the un-stretched original length ($$x = \\text{final} - \\text{original}$$). Adding masses cumulatively increases the total extension, not just the incremental step.\n- Step 2: If the student recorded only the incremental increase for each mass, they would get a flat, constant value for each step (because each 100 g adds the same $$\\Delta x$$ in the Hooke's Law region). Plotting this would give a horizontal line, entirely missing the directly proportional relationship $$F = kx$$.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "In the Hooke's Law practical, a fiducial marker is used alongside a ruler. Distinguish between how the fiducial marker reduces *random error* and how reading at eye level reduces *systematic error*. (2 steps)", "answer": "- Step 1: The fiducial marker is a precise pointer attached to the spring. It gives a sharp, consistent edge to read against, reducing the *random error* of guessing where the spring's coil aligns with the ruler markings each time.\n- Step 2: Reading the ruler at eye level avoids *parallax error*, which is a systematic error. If you read from an angle above or below, the apparent position shifts consistently in one direction, causing all your measurements to be skewed too high or too low in a predictable way.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "Before adding any masses in Core Practical 7, a student notices the spring is already slightly stretched because the mass hanger itself has weight. If they forget to account for this \"zero error,\" how will this affect their force-extension graph, and will it affect their calculation of the spring constant? (2 steps)", "answer": "- Step 1: If the initial stretch from the hanger is ignored, all extension readings will be too large by a constant amount. This shifts the entire force-extension line to the right, meaning it will not pass through the origin (it will have a positive x-intercept).\n- Step 2: However, the *gradient* of the straight line (which represents the spring constant $$k$$) will remain unchanged. The error adds a constant offset, but the rate of change (stiffness) is unaffected.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "Why is pressure defined as force divided by area ($$p = \\frac{F}{A}$$) rather than just force alone? Use the example of pressing your thumb versus pressing a needle into your skin with the same force. (2 steps)", "answer": "- Step 1: Force alone doesn't tell you how concentrated the effect is. The same force spread over a large area (your thumb) might just cause a dull push, but concentrated over a tiny area (the needle tip) it breaks the skin.\n- Step 2: Pressure quantifies this concentration. The needle tip has a much smaller area ($$A$$), so dividing the force by a tiny area yields a massive pressure, explaining why the physical effect (breaking the skin) is so different despite the same force.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "A solid steel ball sinks in water, but a massive steel ship floats. Explain this using the concept of upthrust and displaced fluid. (2 steps)", "answer": "- Step 1: Upthrust equals the weight of the fluid displaced. The solid ball has a small volume and displaces very little water, so the upthrust is less than its weight—it sinks.\n- Step 2: The ship's hull is shaped to enclose a huge volume of air, giving it a much larger overall volume. When placed in water, it sinks deep enough to displace a massive volume of water whose weight equals the ship's weight, so upthrust equals weight, and it floats.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "A heavy cube rests on the bottom of a dry swimming pool. Water is then poured in, fully submerging the cube, but water cannot seep under the cube to touch its bottom face. Does the cube experience upthrust? Explain why or why not. (2 steps)", "answer": "- Step 1: Upthrust is caused by the pressure difference between the bottom and top faces of the object.\n- Step 2: If water cannot reach the bottom face, there is no upward pressure from the water acting on the cube. The top face experiences downward pressure, and the bottom face only experiences the normal contact force from the pool floor. Therefore, there is no resultant upward force, and the cube experiences no upthrust.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "A diver is at a depth where the water pressure is 2 times atmospheric pressure. If she dives twice as deep, will the *total* pressure be 4 times atmospheric pressure? Explain using the components of total pressure. (2 steps)", "answer": "- Step 1: Total pressure = atmospheric pressure + liquid pressure ($$p_{\\text{total}} = p_{\\text{atm}} + h\\rho g$$). At the first depth, $$p_{\\text{total}} = p_{\\text{atm}} + h\\rho g = 2 p_{\\text{atm}}$$.\n- Step 2: If she dives twice as deep, the liquid pressure doubles ($$2h\\rho g$$), but the atmospheric pressure component remains constant. The new total pressure is $$p_{\\text{atm}} + 2h\\rho g = p_{\\text{atm}} + 2(p_{\\text{atm}}) = 3 p_{\\text{atm}}$$. It does not quadruple because the atmospheric pressure doesn't scale with depth.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "A student says \"pressure in a liquid pushes down on objects.\" Explain why this is a misconception and what the correct picture is. (2 steps)", "answer": "- Step 1: Pressure in a fluid is not a vector with a single direction — it's a scalar quantity that acts equally in all directions at any given depth.\n- Step 2: The confusion comes from thinking about weight pushing down, but pressure at any point in a liquid acts perpendicular to any surface it touches (in all directions). An underwater object feels pressure pushing up on its bottom, sideways on its sides, and down on its top.\n\n**A:** This is incorrect. Pressure at a point in a fluid acts equally in all directions — up, down, and sideways. What creates the upward force (upthrust) is the difference in pressure between the bottom (higher pressure, deeper) and top (lower pressure, shallower) of a submerged object. Pressure doesn't \"push down\" — it pushes perpendicular to every surface.", "source": "MiniMax ①", "_id": "minimax_1_2"}, {"question": "If gravity were suddenly halved, would an object that floats in water now sink, rise higher, or stay the same? What about a sinking object? (2 steps)", "answer": "- Step 1: For a floating object, upthrust = weight of displaced fluid. Both upthrust (ρ_fluid × V_displaced × g) and weight (m_object × g) depend on g. If g halves, both forces halve proportionally — the balance point stays the same. The object floats at the same level.\n- Step 2: For a sinking object, the condition depends on density: if object density > fluid density, it sinks regardless of g. Halving g doesn't change the density ratio, so a sinking object still sinks (just more slowly, because net force is smaller).", "source": "MiniMax ①", "_id": "minimax_1_7"}, {"question": "A hydraulic car lift uses a small force on a small piston to lift a heavy car on a large piston. Use the pressure equation to explain why this works. (2 steps)", "answer": "- Step 1: Pressure is transmitted equally throughout a fluid (Pascal's principle). If you apply force F₁ on area A₁, the pressure created is p = F₁/A₁.\n- Step 2: This same pressure acts on the larger piston with area A₂, creating force F₂ = p × A₂ = F₁ × (A₂/A₁). If A₂ is much larger than A₁, the output force is multiplied proportionally. The work is still conserved — you push the small piston a larger distance to move the big piston a smaller distance.", "source": "MiniMax ①", "_id": "minimax_1_11"}, {"question": "When you push a balloon underwater and release it, it shoots back up. Explain this in terms of forces and pressure. (2 steps)", "answer": "- Step 1: The balloon experiences weight (downward) and upthrust (upward). When submerged, upthrust = weight of water displaced (ρ_water × V × g). Since the balloon is compressible, pushing it underwater compresses the air inside, reducing the volume displaced.\n- Step 2: As it rises and the water pressure decreases, the air expands, increasing the volume displaced and thus increasing upthrust. The upthrust becomes greater than the weight, accelerating the balloon upward. This continues until it breaks the surface and the displaced volume (and thus upthrust) decreases.", "source": "MiniMax ①", "_id": "minimax_1_16"}, {"question": "Explain why a steel needle can float on water's surface despite steel being much denser than water. (2 steps)", "answer": "- Step 1: This isn't true floating (upthrust from submersion) — it's surface tension. Water molecules at the surface have stronger cohesive forces, creating a \"skin\" that can support small objects.\n- Step 2: The needle sits on top of the water surface, deforming it slightly. The upward force from surface tension acts along the edges of the needle, balancing its weight. This is different from upthrust in a submerged object.", "source": "MiniMax ①", "_id": "minimax_1_17"}, {"question": "In a submarine, how does it control whether it floats, sinks, or stays neutrally buoyant? (2 steps)", "answer": "- Step 1: A submarine has ballast tanks that can be filled with water or air. When the tanks are full of water, the submarine's average density increases — it becomes heavier than the displaced water and sinks.\n- Step 2: When the tanks are filled with air, the overall density decreases — the submarine becomes less dense than water, so upthrust exceeds weight and it rises. At neutral buoyancy, the weight of the submarine exactly equals the upthrust (weight of displaced water), so it stays at any depth.", "source": "MiniMax ①", "_id": "minimax_1_20"}, {"question": "What is the difference between a fluid's pressure and a solid's pressure on a surface? (2 steps)", "answer": "- Step 1: A solid exerts pressure only on surfaces it's directly touching — the direction depends on how the solid is oriented.\n- Step 2: A fluid (liquid or gas) exerts pressure at any point within it and in all directions. At any given depth in a fluid, pressure is the same in all directions. This is fundamentally different from solids, which transmit force only along their structure.", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "A common misconception is that \"heavier objects sink, lighter objects float.\" Give a concrete counterexample and explain why this is wrong. (2 steps)", "answer": "- Step 1: A huge wooden log (mass hundreds of kg) floats in water. A small iron nail (mass only a few grams) sinks in water.\n- Step 2: What matters is density, not mass. The wooden log has density ~0.6-0.8 g/cm³ (less than water's 1.0 g/cm³), so it displaces enough water to float. The iron nail has density ~7.9 g/cm³ (much greater than water), so even fully submerged it can't displace enough water to equal its weight — it sinks. Mass is irrelevant; density determines floating and sinking.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "If you hold a piece of paper and blow over the top surface, the paper lifts up. Explain this using fluid pressure concepts. (2 steps)", "answer": "- Step 1: When you blow over the top of the paper, you're moving air quickly. Fast-moving air has lower pressure than still air (Bernoulli's principle).\n- Step 2: The bottom of the paper is exposed to still air at atmospheric pressure (higher). The pressure difference (higher below, lower above) creates a net upward force that lifts the paper. This is the same principle that allows airplane wings to generate lift.", "source": "MiniMax ①", "_id": "minimax_1_28"}, {"question": "Why is it incorrect to say \"the limit of proportionality is where the spring breaks\"? (1 step)", "answer": "The limit of proportionality is where the graph stops being a straight line — the relationship is no longer linear. The spring may still be elastic (return to original shape) well past this point. Breaking is a separate phenomenon that occurs at much larger extensions, often after permanent deformation has begun.", "source": "MiniMax ①", "_id": "minimax_1_36"}, {"question": "If you double the mass hanging from a spring (within the proportional region), what happens to the elastic potential energy stored? Explain using the equation. (2 steps)", "answer": "- Step 1: Within the proportional region, F = kx. If mass doubles, force doubles (F = mg). Since F doubles, extension x also doubles (because x = F/k).\n- Step 2: EPE = ½kx². If x doubles, then x² becomes 4 times larger. So EPE increases by a factor of 4. Doubling the force more than doubles the stored energy — because you're stretching the spring further, not just applying more force.", "source": "MiniMax ①", "_id": "minimax_1_38"}, {"question": "Why is it physically impossible for a solid object to have zero pressure inside it? (1 step)", "answer": "Even in a \"weightless\" environment, all matter is held together by intermolecular forces and atomic bonds. These create internal stresses (pressure) even without gravity. At the atomic level, molecules are constantly moving and colliding, creating internal pressure. Removing all internal pressure would mean the material would fly apart.", "source": "MiniMax ①", "_id": "minimax_1_43"}, {"question": "A steel rod is firmly clamped at one end and pulled from the other. Is this an example of stretching or bending?", "answer": "This is **bending**, not stretching. True stretching requires forces acting *along the same axis* but in opposite directions at the two ends (like hanging a mass from a spring). In this case, the clamp provides a reaction force at one point, and you apply a force at a different point — creating a *turning effect* (torque) that curves the rod. One side of the rod experiences tension, the other side compression, which is characteristic of bending.", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "Why does Hooke's Law eventually stop working even for a material that remains elastic (doesn't permanently deform)?", "answer": "- Step 1: Hooke's Law ($F = kx$) assumes the internal structure of the material behaves like perfect springs — each atomic bond stretches linearly with force.\n- Step 2: At small deformations, the bonds act like ideal springs. But as extension increases, the bonds start to behave non-linearly — they stiffen as atomic bonds approach their maximum stretch limit.\n- Step 3: The relationship curves because the material becomes progressively harder to stretch further. The spring constant effectively increases — it takes *more* force per additional mm of extension beyond the proportional limit.\n- The key distinction: the elastic limit (point of permanent deformation) comes *after* the limit of proportionality — a material can still be elastic but non-linear.", "source": "MiniMax ②", "_id": "minimax_2_2"}, {"question": "On a force-extension graph, what does the area under the line represent, and why does this matter beyond the limit of proportionality?", "answer": "The area under the force-extension graph represents the **work done** (energy transferred) in stretching the spring. \n\n- Below the limit of proportionality: This area = $\\frac{1}{2}kx^2$ (the elastic potential energy stored).\n- Beyond the limit of proportionality: The $\\frac{1}{2}kx^2$ formula no longer applies because the relationship is non-linear. However, the area under the *actual* graph still equals the total work done — you just can't calculate it with the simple formula. Some of this energy is dissipated as heat during permanent deformation.", "source": "MiniMax ②", "_id": "minimax_2_4"}, {"question": "A rubber band and a steel spring both obey Hooke's Law in their initial region. Why does the rubber band feel \"easier\" to stretch initially, yet can still snap suddenly?", "answer": "- Step 1: A rubber band has a much lower spring constant $k$ than a steel spring (it's more compliant), so for the same force, it extends more initially — feeling \"easier.\"\n- Step 2: However, rubber's molecular structure is different — long polymer chains that can unravel. As you stretch further, more chains straighten out, and eventually you reach a point where all chains are fully extended.\n- Step 3: At this point, the rubber suddenly resists further stretching enormously (rapidly increasing $k$) and snaps. The steel spring, by contrast, has a more uniform atomic lattice that gradually stiffens — it doesn't have this dramatic \"sudden snap\" failure mode.", "source": "MiniMax ②", "_id": "minimax_2_7"}, {"question": "Why does atmospheric pressure exist even though air molecules are moving in random directions?", "answer": "- Step 1: Although individual molecular collisions are random, collectively they create a net force on any surface.\n- Step 2: In a column of air, there are billions of molecules above any surface. Their combined weight (due to gravity) pushes downward on molecules below, creating pressure throughout the column.\n- Step 3: The pressure at any point equals the weight of the air column above that point, divided by the area. At sea level, this weight pressing down on each m² equals approximately 101,000 N — hence 101 kPa.\n+ This is analogous to liquid pressure ($p = h\\rho g$) — just with a much less dense \"fluid\" (air) creating a smaller pressure.", "source": "MiniMax ②", "_id": "minimax_2_8"}, {"question": "Why does your ear \"pop\" when ascending a mountain or taking off in an airplane?", "answer": "As you go higher, atmospheric pressure decreases because there's less air above you. Your middle ear contains air at the previous (higher) pressure. \n\n- The higher pressure inside your ear pushes outward against the eardrum, causing discomfort.\n- Swallowing or yawning opens the Eustachian tube, allowing ear air to escape (or enter), equalising the pressure — hence the \"pop.\"\n+ The reverse happens when descending — outside pressure increases, pushing the eardrum inward.", "source": "MiniMax ②", "_id": "minimax_2_9"}, {"question": "In the equation $p = h\\rho g$, what does each variable physically represent, and why is it multiplied together this way?", "answer": "- $h$ (depth in m): The height of the fluid column above the point — more height = more weight pressing down.\n- $\\rho$ (density in kg/m³): Mass per unit volume — for the same volume, denser fluids have more mass and thus more weight.\n- $g$ (gravitational field strength in N/kg): Converts mass to weight (force).\n- Mathematically: $h \\times \\rho$ gives mass per unit area (kg/m²). Multiplying by $g$ converts to weight per unit area (N/m²), which is pressure.\n+ Think of it as: (height) × (mass per volume) × (weight per mass) = weight per area = pressure.", "source": "MiniMax ②", "_id": "minimax_2_11"}, {"question": "If you dive deeper into a swimming pool, does the pressure on your ears increase at the same rate at all depths, or does it change?", "answer": "The pressure increases **linearly** with depth — it increases by the same amount for each additional meter you descend. \n\n- Going from 1 m to 2 m depth adds the same pressure increase as going from 9 m to 10 m (approximately 10 kPa each in water).\n+ This is because $p = h\\rho g$ is a linear equation — depth $h$ appears to the first power, not squared or in a denominator.\n+ This is different from gravitational field strength, which decreases with altitude (inverse square law).", "source": "MiniMax ②", "_id": "minimax_2_12"}, {"question": "Why doesn't water spill out of a straw when you hold your finger over the top, even when the straw is inverted?", "answer": "- Step 1: The water is held up by atmospheric pressure pushing up on the water at the bottom of the straw (through the straw, up to your finger).\n- Step 2: Your finger seals the top, preventing air from pushing down on the water surface inside the straw.\n- Step 3: Atmospheric pressure outside the straw (pushing up on the water at the bottom open end) is sufficient to support the weight of the water column, as long as the column isn't taller than ~10.3 m (which would require pressure exceeding 1 atm to support).\n+ This demonstrates that atmospheric pressure can support a column of water ~10 m tall — the basis for barometers.", "source": "MiniMax ②", "_id": "minimax_2_15"}, {"question": "Why is it easier to float in the Dead Sea than in a freshwater lake?", "answer": "The Dead Sea has an extremely high salinity, giving it a density of about 1,240 kg/m³ (compared to ~1,000 kg/m³ for freshwater).\n\n+ Upthrust = weight of displaced fluid = $V_{\\text{displaced}} \\times \\rho_{\\text{fluid}} \\times g$.\n+ For the same body volume submerged, the saltier water provides more upthrust (because $\\rho$ is higher).\n+ Therefore, you float higher (more of your body above water) in the Dead Sea. You can even float on your back without swimming!\n+ This is why people float more easily in ocean water (ρ ≈ 1025 kg/m³) than in freshwater pools.", "source": "MiniMax ②", "_id": "minimax_2_16"}, {"question": "A wooden block and an iron block of exactly the same volume are both lowered into water. Which experiences greater upthrust? Explain.", "answer": "Both experience **exactly the same upthrust**, because upthrust depends only on the **volume of fluid displaced**, not on the material of the object.\n\n+ Upthrust = weight of displaced fluid = $V_{\\text{displaced}} \\times \\rho_{\\text{fluid}} \\times g$.\n+ Since both blocks have the same volume and are fully submerged, they displace the same volume of water.\n+ However, the iron block sinks (its weight > upthrust), while the wooden block may float (its weight < upthrust, if wood density < water). The upthrust is the same, but the *weight* of each object differs.", "source": "MiniMax ②", "_id": "minimax_2_17"}, {"question": "An object is in equilibrium floating partially submerged in water. What can you say about the forces acting on it?", "answer": "The object is in **dynamic equilibrium** — the forces balance:\n\n- **Upthrust** (upward) = **Weight** (downward).\n- The object is stationary (not accelerating up or down).\n+ Since upthrust = weight of displaced fluid, this also means: weight of object = weight of displaced water.\n+ From this, you can find what fraction of the object's volume is submerged: $V_{\\text{submerged}} / V_{\\text{total}} = \\rho_{\\text{object}} / \\rho_{\\text{fluid}}$.\n+ For example, ice (ρ ≈ 917 kg/m³) in water (ρ ≈ 1000 kg/m³) has 91.7% of its volume submerged.", "source": "MiniMax ②", "_id": "minimax_2_18"}, {"question": "Why do hot air balloons rise and float in the air?", "answer": "- Step 1: A hot air balloon contains air that is **less dense** than the surrounding cool air (because heating reduces density).\n- Step 2: The balloon displaces a volume of air equal to its own volume. The upthrust equals the weight of this displaced cool air.\n- Step 3: Since the balloon (including the hot air inside) weighs **less** than the cool air it displaces, the upthrust exceeds the weight — causing it to rise.\n+ This is exactly the same principle as objects floating in water, just with air as the fluid. It's \"floating\" in the atmosphere!", "source": "MiniMax ②", "_id": "minimax_2_19"}, {"question": "Why does an object weigh less when fully submerged in water? Where does this \"lost weight\" go?", "answer": "- Step 1: The \"lost weight\" is actually the upthrust force acting upward, reducing the net force you feel.\n- Step 2: The object's true weight (mg) remains unchanged — gravity still pulls down with the same force.\n- Step 3: The water pushes up with a force equal to the weight of water displaced. This upward force partially cancels the downward weight.\n+ The \"lost weight\" isn't transferred anywhere specific — it's simply that the water is pushing up, reducing the net force the object exerts on whatever is holding it (like a weighing scale).\n+ This is why a weighing scale reads less for an object submerged in water — it's measuring *apparent weight*, not true weight.", "source": "MiniMax ②", "_id": "minimax_2_20"}, {"question": "A student says: \"Since pressure is force per unit area, a larger force always means larger pressure.\" Is this correct? Explain.", "answer": "This is **incorrect** — the statement ignores the area term.\n\n- Pressure also depends on the area over which the force acts. A *larger force applied over an even larger area* could result in *lower* pressure.\n+ Example: An elephant (weight ~50,000 N) standing on four wide feet creates less pressure than a person (weight ~600 N) standing on the sharp point of a nail.\n+ The correct relationship: Pressure is proportional to force *and inversely proportional to area*. You must consider both factors.", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "What happens if you fill a plastic bottle completely with water (no air) and then try to make it float? Does it sink or float?", "answer": "It **sinks**.\n\n- A sealed bottle filled with water has the same density as water (~1000 kg/m³).\n- When fully submerged, it displaces its own volume of water, creating upthrust equal to its own weight — so it's in neutral equilibrium (neither rising nor sinking).\n- If you push it below the surface and release, it stays suspended where you leave it (neutral buoyancy).\n+ Compare this to an empty bottle (contains air, lower average density) which floats.\n+ This is why hollow objects float — the air inside reduces average density.", "source": "MiniMax ②", "_id": "minimax_2_29"}, {"question": "Why is the pressure at the bottom of a dam much greater than at the top, even though the dam wall is the same thickness throughout?", "answer": "Pressure depends on **depth**, not the thickness of the container wall.\n\n- At the top of the reservoir (say, 10 m deep), the pressure is $p = h\\rho g$ = 10 × 1000 × 10 = 100 kPa.\n- At the bottom (say, 30 m deep), the pressure is 30 × 1000 × 10 = 300 kPa — three times greater.\n+ The dam wall must be thick enough to withstand the maximum pressure at the base. The upper parts have less pressure, so they don't need as much material.\n+ Some dams are built with a *triangular* cross-section — thicker at the bottom where pressure is greatest — exactly matching the pressure distribution.", "source": "MiniMax ②", "_id": "minimax_2_33"}, {"question": "Why does a balloon inflated at sea level expand when it rises to high altitude?", "answer": "- Step 1: At sea level, the balloon is inflated against atmospheric pressure (~101 kPa). The rubber skin exerts inward pressure, and the air inside pushes outward.\n- Step 2: As the balloon rises, atmospheric pressure decreases (fewer air molecules above).\n- Step 3: The lower external pressure means less force pushing in on the balloon. The internal pressure (from the air inside) is now greater relative to the outside.\n- Step 4: The balloon expands until either the rubber provides enough counter-pressure, or it bursts.\n+ This is why weather balloons are partially inflated on the ground — they expand as they rise.\n+ The same effect happens in aircraft cabins — they must be pressurised at high altitudes to prevent the air inside from expanding dangerously.", "source": "MiniMax ②", "_id": "minimax_2_34"}, {"question": "When calculating pressure in a liquid using $p = h\\rho g$, does $h$ mean the total depth of the liquid or the depth below the surface?", "answer": "$h$ is the **depth below the free surface** of the liquid — the vertical distance from the surface to the point in question.\n\n- If you're 2 m below the water surface, $h$ = 2 m.\n- The total depth of the container (e.g., a 10 m deep pool) doesn't matter for calculating pressure at a given point — only how deep that point is *below the surface*.\n+ This is why pressure is the same at the bottom of both a shallow wide lake and a deep narrow well, if the depth below the surface is the same.\n+ Atmospheric pressure acts *on top* of the liquid surface, so total pressure at depth $h$ = $p_{\\text{atm}} + h\\rho g$.", "source": "MiniMax ②", "_id": "minimax_2_38"}, {"question": "Two identical blocks are placed in water — one floats, one sinks. Which block experiences the greater upthrust?", "answer": "The block that **sinks** experiences the **greater upthrust** (assuming both are fully submerged).\n\n- Step 1: Upthrust = weight of displaced fluid = $V_{\\text{displaced}} \\times \\rho_{\\text{fluid}} \\times g$.\n- Step 2: Both blocks have the same volume, and if fully submerged, displace the same volume of water.\n- Step 3: Therefore, the upthrust on both is the same! Wait — but the floating block is only *partially* submerged.\n+ Correction: If comparing:\n  - Floating block (partially submerged): upthrust = weight of block (less water displaced).\n  - Sinking block (fully submerged): upthrust = weight of *full* volume of displaced water.\n+ If the sinking block is fully submerged while floating block is partially, the sinking block displaces *more* water → **sinking block has greater upthrust**.", "source": "MiniMax ②", "_id": "minimax_2_39"}, {"question": "Why do ice cubes float in a drink with about 90% of their volume submerged?", "answer": "Ice has a density of about 917 kg/m³, while water (the liquid) has a density of 1000 kg/m³.\n\n- For a floating object: upthrust = weight → weight of displaced water = weight of ice.\n- Dividing both sides by $g$: mass of displaced water = mass of ice.\n- Since density = mass/volume, this means: $\\rho_{\\text{water}} \\times V_{\\text{submerged}} = \\rho_{\\text{ice}} \\times V_{\\text{total}}$.\n- Solving: $V_{\\text{submerged}} / V_{\\text{total}} = \\rho_{\\text{ice}} / \\rho_{\\text{water}} = 917/1000 = 0.917$.\n- So 91.7% of the ice's volume is submerged — roughly 90%.\n\n+ This is why icebergs are so dangerous for ships — most of their mass is hidden underwater.", "source": "MiniMax ②", "_id": "minimax_2_40"}, {"question": "Why does crushing a plastic bottle (reducing its volume) change whether it floats or sinks?", "answer": "- Step 1: Whether an object floats depends on its **average density** compared to the fluid.\n- Step 2: An empty sealed plastic bottle floats because the air inside makes its average density much less than water (~1000 kg/m³).\n- Step 3: If you crush the bottle, you reduce its volume but keep the same mass (the plastic + air inside). Average density = mass/volume increases.\n- Step 4: If you crush it enough that average density exceeds water's density, it will sink.\n+ This is the same principle as a submarine taking on water (ballast) to dive — reducing the volume of air (or increasing mass) increases average density.", "source": "MiniMax ②", "_id": "minimax_2_41"}, {"question": "Why does a helium balloon float upward in air but eventually stops rising?", "answer": "- Step 1: Helium has lower density than air (~1.8 kg/m³ vs ~1.2 kg/m³ for air at sea level).\n- Step 2: The balloon displaces a volume of air. Upthrust = weight of displaced air.\n- Step 3: Since the helium inside weighs less than the displaced air, there's a net upward force → the balloon rises.\n- Step 4: As the balloon rises, air density **decreases** (at higher altitude, the atmosphere is thinner).\n- Step 5: Eventually, the air density equals the balloon's average density. At this point, upthrust = weight, and the balloon reaches maximum altitude (neutral buoyancy) — it stops rising.\n+ Weather balloons expand as they rise for the same reason — external air density decreases.", "source": "MiniMax ②", "_id": "minimax_2_42"}, {"question": "When a force is applied to a spring, describe the energy transformations from start to end.", "answer": "- Step 1: **Chemical potential energy** in your muscles (from food) is converted to **mechanical work** as you pull.\n- Step 2: This work is transferred as **elastic potential energy** stored in the stretched spring ($E = \\frac{1}{2}kx^2$).\n- Step 3: When you release the spring, the elastic potential energy converts to **kinetic energy** of the spring recoiling.\n- Step 4: Eventually, this kinetic energy may: \n  + Be transferred to another object (launching a ball).\n  + Convert to thermal energy (internal heating in the spring due to friction).\n  + Radiate as sound.\n+ No energy is created or destroyed — it transforms from one form to another (Conservation of Energy).", "source": "MiniMax ②", "_id": "minimax_2_44"}, {"question": "In the Core Practical investigating force and extension, why is it important to zero the ruler before measuring extension?", "answer": "- Step 1: The extension $x$ is defined as *change in length* from the original (unstretched) length.\n- Step 2: If the ruler isn't zeroed properly, you're measuring absolute length, not extension.\n- Step 3: By zeroing the ruler at the spring's original length (or setting the fiducial marker to read zero at the start), each subsequent reading directly gives extension without needing to subtract the original length each time.\n+ This reduces calculation steps and potential for error.\n+ It also helps identify systematic errors — if your graph doesn't go through the origin, you know there's a zeroing error.", "source": "MiniMax ②", "_id": "minimax_2_45"}, {"question": "If you plotted force vs extension and got a straight line that *doesn't* go through the origin, what does this tell you about your experiment?", "answer": "- Step 1: In a correct Hooke's Law relationship, the line should be straight *and* pass through the origin (directly proportional).\n- Step 2: A straight line that doesn't pass through the origin is **linear** but not **proportional**.\n- Step 3: This could indicate a **systematic error** in your zeroing — you may have started measuring from the wrong original length.\n+ Alternatively, the spring may have had some pre-existing tension or compression even without added masses.\n+ Common cause: Not accounting for the weight of the spring itself or the weight of the initial mass hanger when you \"zeroed\" the apparatus.\n+ The gradient (slope) would still give you the spring constant $k$, but the intercept reveals a zeroing error.", "source": "MiniMax ②", "_id": "minimax_2_47"}, {"question": "In the force-extension experiment, if you added masses and then removed them, should the spring return to exactly its original length? What does it mean if it doesn't?", "answer": "- If the spring obeys Hooke's Law and you're within the limit of proportionality, it **should return** to its original length (elastic behavior).\n- If it **doesn't return** (stays longer than before), you've stretched it past its **elastic limit** — permanent (plastic) deformation has occurred.\n+ The spring has been permanently stretched.\n+ This means you've exceeded the maximum elastic extension for that particular spring.\n+ Going forward, the original length for calculating extension has changed — you'd need to measure from the new \"rest\" length.", "source": "MiniMax ②", "_id": "minimax_2_48"}, {"question": "Why do thick steel cables stretch less than thin steel cables of the same material when the same force is applied?", "answer": "- Step 1: The spring constant $k$ depends on both the material (its stiffness) AND the geometry of the object.\n- Step 2: For a spring or wire, $k$ is proportional to the **cross-sectional area** — a thicker wire has more material to resist stretching.\n- Step 3: A thicker cable has a larger cross-sectional area $A$, so for the same applied force, the stress ($F/A$) is lower, resulting in less strain (extension per unit length).\n+ Think of it this way: instead of one thin wire, you effectively have many parallel \"springs\" sharing the load, each stretching less.\n+ This is why structural steel beams are thick — they need high $k$ (low extension) under load.", "source": "MiniMax ②", "_id": "minimax_2_49"}, {"question": "Explain why atmospheric pressure decreases exponentially with altitude, unlike liquid pressure which decreases linearly with height (3 steps)", "answer": "- Step 1: Liquids are incompressible — density $\\rho$ stays constant, so pressure $p = h\\rho g$ decreases linearly with decreasing depth.  \n- Step 2: Gases are compressible — air density decreases exponentially with altitude as molecules spread out.  \n- Step 3: Fewer molecules above → less weight → pressure drops faster than linearly (exponential decay model).  \n\n*Takeaway: Density constancy vs variability determines pressure-altitude relationship.*", "source": "Qwen 3 ①", "_id": "qwen_1_6"}, {"question": "What misconception arises from calling the \"spring constant\" a \"stiffness constant\"? Clarify using $k$'s physical meaning (2 steps)", "answer": "- Step 1: \"Stiffness\" implies a material property, but $k$ depends on both material (Young's modulus) AND geometry (length, thickness).  \n- Step 2: A steel spring and steel wire have same material stiffness but different $k$ values — longer/coiled springs have lower $k$.  \n\n*Takeaway: $k$ is a system-specific parameter, not a pure material constant.*", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "In Core Practical 7, why must you wait for the spring to stop moving before measuring extension?", "answer": "- Dynamic stretching introduces inertia — the spring oscillates around the equilibrium point.  \n- Measuring during motion gives false readings due to kinetic energy temporarily altering position.  \n- Analogy: Weighing yourself on a scale while jumping — the reading fluctuates.  \n\n*Takeaway: Static equilibrium ensures the measured extension corresponds to the applied force.*", "source": "Qwen 3 ①", "_id": "qwen_1_8"}, {"question": "A student plots force vs extension and gets a straight line through the origin with gradient 200 N/m, but the spring doesn't follow Hooke's Law. Is this possible? Explain (2 steps)", "answer": "- Step 1: Hooke's Law ($F = kx$) requires proportionality (straight line through origin), but this is only valid for elastic deformation below the limit.  \n- Step 2: If the spring is inelastically deforming (e.g., after unloading), the graph might show a straight line during compression but not return to zero — violating Hooke's Law's recovery requirement.  \n\n*Takeaway: Proportionality ≠ Hooke's Law — elasticity is also required.*", "source": "Qwen 3 ①", "_id": "qwen_1_9"}, {"question": "Why do *multiple* forces need to be applied for shape distortion, rather than a single force? (3 steps)", "answer": "- Step 1: A single force on a free object causes *acceleration* (Newton's 2nd Law), not shape change. For example, a brick on ice would slide if pushed.  \n- Step 2: Distortion requires *internal stress* – forces must act on different parts of the object in opposing directions. This creates tension/compression within the material.  \n- Step 3: Example: Stretching a spring requires two forces – one pulling the top up, another pulling the bottom down (e.g., hanging mass and fixed support).  \n+ Compression: Forces act inward (e.g., weight on a spring).  \n+ Bending: Opposing forces at different points (e.g., diving board).  \n\n**Takeaway:** Shape change requires forces acting in different locations/directions to create internal strain.", "source": "Qwen 3 ②", "_id": "qwen_2_0"}, {"question": "What’s the difference between *proportional* and *linear* relationships on a graph? (2 steps)", "answer": "- Proportional: $F = kx$ – straight line through the origin. Example: Hooke’s Law region.  \n- Linear: Any straight line, even without passing through origin. Example: A spring with pre-tension (non-zero force at zero extension).  \n\n**Misconception:** Not all straight lines are proportional – check if (0,0) is on the line.", "source": "Qwen 3 ②", "_id": "qwen_2_8"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "Why must at least two forces act on an object to change its shape, rather than just one? (2 steps)", "answer": "- Step 1: A single unbalanced force acting on an object will cause it to accelerate (change its motion) according to Newton's first law, rather than distort it.\n- Step 2: To deform an object, forces must act in opposing directions on different parts of the object. This creates internal stress that forces the atomic or molecular layers to shift relative to each other, resulting in a change of shape.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A diving board bends when someone stands on the end. What two microscopic distortions combine to create this macroscopic bending? (2 steps)", "answer": "- Step 1: The top surface of the diving board experiences stretching (tension), as the bending pulls the particles further apart from each other.\n- Step 2: The bottom surface experiences compression, as the bending pushes the particles closer together. The combination of these two opposing distortions across the thickness of the board results in the overall bend.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "When an object undergoes inelastic distortion, where does the energy go, and why can't it be fully recovered as kinetic energy when the force is removed? (2 steps)", "answer": "- Step 1: The work done to deform the object is mostly dissipated as thermal energy (heat) due to internal friction as atomic layers slide past each other and overcome intermolecular forces.\n- Step 2: Because this energy is dissipated into the surroundings as heat, it cannot be fully converted back into kinetic energy or elastic potential energy when the deforming force is removed, leaving the object permanently deformed.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "In a solid elastic material, what is happening at the atomic level that causes the restoring force to be directly proportional to extension (Hooke's Law)? (2 steps)", "answer": "- Step 1: Atoms in a solid are held together by electromagnetic forces that act like tiny springs. When stretched a small amount, the restoring force from each atomic bond increases linearly with the distance pulled.\n- Step 2: Since the total macroscopic force is just the sum of these microscopic bond forces, the total force is also directly proportional to the total extension, giving $$F = kx$$.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "On a force-extension graph, what is the crucial difference between the \"limit of proportionality\" and the \"elastic limit\", and what happens to the spring between these two points? (3 steps)", "answer": "- Step 1: The limit of proportionality is the point where the graph stops being a straight line; force is no longer directly proportional to extension ($$F = kx$$ no longer applies).\n- Step 2: The elastic limit is the point beyond which the object suffers permanent deformation and will not return to its original length when the force is removed.\n- Step 3: Between these two points, the graph curves (non-linear), but the object still returns to its original shape—it obeys elasticity but not proportionality.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "How does the formula for elastic potential energy $$E = \\frac{1}{2}kx^2$$ arise from the work done in stretching a spring, assuming we are below the limit of proportionality? (3 steps)", "answer": "- Step 1: Work done is equal to the force multiplied by the distance moved, but since the force increases linearly from $$0$$ to $$F$$, the average force applied is $$\\frac{F}{2}$$.\n- Step 2: The work done (energy stored) is this average force times the extension $$x$$, so $$E = \\frac{F}{2} \\times x$$.\n- Step 3: Substituting Hooke's Law $$F = kx$$ gives $$E = \\frac{kx}{2} \\times x = \\frac{1}{2}kx^2$$, which geometrically corresponds to the area of a triangle under the force-extension graph.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "If you stretch a spring beyond its limit of proportionality, why can you no longer use $$E = \\frac{1}{2}kx^2$$ to find the energy stored, and how would you find it instead? (2 steps)", "answer": "- Step 1: The formula assumes a linear relationship (a straight line on the graph) to form a triangle area. Beyond the limit, the relationship is non-linear (curved), so the area under the graph is no longer a simple triangle.\n- Step 2: You must instead find the energy stored by calculating the total area under the force-extension curve up to that extension, which includes the triangular Hooke's law region plus the additional curved region.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "In Core Practical 7, a student adds $$100 \\text{ g}$$ masses one by one and records the ruler reading each time. Why is it a critical error to calculate each extension as the difference from the *previous* reading, rather than from the *original* reading? (2 steps)", "answer": "- Step 1: The true extension is the total change in length from the original, unstretched length. If calculated from the previous reading, you are only finding the incremental stretch caused by the last mass added.\n- Step 2: According to Hooke's Law, each equal mass increment should cause an equal increment in extension. Therefore, if your calculated extensions are all roughly the same small value instead of cumulatively growing, you have made this error.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "Why is a fiducial marker (a thin pointer) attached to the spring in the Hooke's Law experiment, and how does it specifically reduce measurement errors? (2 steps)", "answer": "- Step 1: The fiducial marker provides a sharp, definite edge to align against the ruler's scale, replacing the ambiguous edge of the spring itself.\n- Step 2: It reduces parallax error by allowing the observer to line up the pointer exactly with the ruler marking at eye level, and it reduces random error by ensuring the exact same point on the spring is measured every time.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Why does the pressure in a fluid act at $$90^\\circ$$ (normal) to the surface of a submerged object, rather than at some other angle? (2 steps)", "answer": "- Step 1: Fluid molecules move randomly in all directions, colliding with the surface. Their parallel velocity components cancel out over time due to the vast number of random collisions.\n- Step 2: Only the perpendicular components of the molecular momenta transfer force into the surface, resulting in a net push that is exactly at right angles (normal) to the surface.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "Why does a sharp knife cut much more easily than a blunt knife, even when the exact same pushing force is applied by the person? (2 steps)", "answer": "- Step 1: Pressure is defined as force per unit area ($$p = \\frac{F}{A}$$), representing how concentrated a force is.\n- Step 2: The sharp knife has a much smaller contact area with the material, so the same force produces a much larger pressure, overcoming the material's bonding forces more easily and allowing it to cut.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "How does the equation for liquid pressure $$p = h\\rho g$$ logically derive from the concept of the weight of a fluid column? (3 steps)", "answer": "- Step 1: Pressure is force per area, $$p = \\frac{F}{A}$$. The force at the bottom of a liquid column is the weight of the liquid above it, $$F = mg$$.\n- Step 2: The mass of the column is volume times density, $$m = V\\rho$$, and the volume is the base area times the height, $$V = Ah$$. Substituting gives $$F = Ah\\rho g$$.\n- Step 3: Dividing by the area $$A$$ gives $$p = \\frac{Ah\\rho g}{A} = h\\rho g$$. The area cancels out, showing pressure only depends on depth, density, and gravity.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "A tall, narrow test tube and a wide beaker are both filled with water to the exact same depth. Why is the pressure at the bottom of both containers exactly the same, despite the beaker holding much more water? (2 steps)", "answer": "- Step 1: As derived from $$p = h\\rho g$$, the pressure depends only on the depth ($$h$$), density ($$\\rho$$), and gravity ($$g$$), and does not depend on the total volume or shape of the container.\n- Step 2: In the wider beaker, although there is more water (more weight), that weight is spread over a proportionally larger base area. The ratio of force to area remains exactly the same as in the narrow tube.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Why does atmospheric pressure decrease as you go higher up a mountain, and why is the rate of decrease faster near sea level than at the summit? (2 steps)", "answer": "- Step 1: Atmospheric pressure is caused by the weight of the air column above a point. At higher altitudes, there are fewer air molecules above, meaning less weight and thus lower pressure.\n- Step 2: Air is compressible; it is denser near sea level because the weight of the upper atmosphere compresses it. Because the air is denser at the bottom, the pressure drops faster per meter of altitude gained near sea level than it does at the top where the air is much thinner.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "How does the pressure difference between the top and bottom of a submerged object result in an upward force (upthrust) equal to the weight of the fluid displaced? (3 steps)", "answer": "- Step 1: The bottom of the object is at a greater depth ($$h_{bottom}$$) than the top ($$h_{top}$$), so by $$p = h\\rho g$$, the upward pressure on the bottom is greater than the downward pressure on the top.\n- Step 2: The net upward force is the pressure difference times the cross-sectional area: $$F_{net} = (p_{bottom} - p_{top}) \\times A = (h_{bottom} - h_{top})\\rho g \\times A$$.\n- Step 3: The height difference $$(h_{bottom} - h_{top})$$ times the area $$A$$ is exactly the volume of the object $$V$$. So $$F_{net} = V\\rho g$$, which is the mass of the displaced fluid times gravity—exactly the weight of the displaced fluid.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "An object floats when placed in a fluid. What does this tell you about the relationship between the object's average density and the fluid's density, and why? (2 steps)", "answer": "- Step 1: For an object to float, its weight must equal the upthrust. Upthrust equals the weight of the fluid displaced, so the object's weight equals the weight of the fluid it pushes aside.\n- Step 2: Since weight = volume × density × g, and the volume of fluid displaced is less than or equal to the object's total volume, the object's density must be less than or equal to the fluid's density for the weights to balance.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Solid steel sinks in water, yet a massive steel ship floats. How does the shape of the ship alter the physics to allow it to float? (2 steps)", "answer": "- Step 1: The ship's hull is hollow, enclosing a massive volume of air. This drastically increases the total volume of the ship without significantly increasing its mass.\n- Step 2: Because average density is mass divided by volume, the ship's overall average density becomes much less than the density of water, allowing it to displace enough water to generate an upthrust equal to its massive weight.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A scuba diver adjusts her buoyancy vest so she is \"neutrally buoyant\"—neither sinking nor floating, just hovering in mid-water. What is the exact relationship between her weight and upthrust, and what is her average density? (2 steps)", "answer": "- Step 1: Since she is in equilibrium (not accelerating up or down), Newton's first law dictates that the upward upthrust must exactly equal her downward weight.\n- Step 2: Because her weight equals the upthrust, and upthrust equals the weight of the water she displaces, her average density must be exactly equal to the density of the surrounding water.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "When you lift a heavy rock from the bottom of a pool, it feels much lighter while it is underwater than when it breaks the surface. Why does the apparent weight increase as it leaves the water? (2 steps)", "answer": "- Step 1: Underwater, the rock experiences an upward upthrust equal to the weight of the water it displaces, which partially counteracts its downward weight, making it feel lighter.\n- Step 2: As the rock leaves the water, the displaced water volume decreases to zero, meaning the upthrust vanishes. The full force of gravity now acts unopposed, so you must support its entire true weight.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A spring stores $$4 \\text{ J}$$ of elastic potential energy when stretched by a certain force. If the extension is doubled (staying within the limit of proportionality), how much energy is now stored? (2 steps)", "answer": "- Step 1: The elastic potential energy formula is $$E = \\frac{1}{2}kx^2$$, meaning energy is directly proportional to the *square* of the extension.\n- Step 2: If extension is doubled ($$x \\to 2x$$), the energy scales by $$2^2 = 4$$. Therefore, the new energy stored is $$4 \\times 4 \\text{ J} = 16 \\text{ J}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "The pressure at the bottom of a freshwater lake is $$200 \\text{ kPa}$$ (ignoring atmospheric pressure). If the density of seawater is roughly $$5\\%$$ greater than freshwater, what would the pressure be at the same depth in the sea? (2 steps)", "answer": "- Step 1: Liquid pressure is directly proportional to density ($$p = h\\rho g$$). If density increases by $$5\\%$$, pressure also increases by $$5\\%$$.\n- Step 2: $$5\\%$$ of $$200 \\text{ kPa}$$ is $$10 \\text{ kPa}$$. Therefore, the pressure in seawater at the same depth is $$200 + 10 = 210 \\text{ kPa}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "A friend claims that a massive, $$1000 \\text{ kg}$$ wooden log will sink, while a tiny $$10 \\text{ g}$$ iron ball will float. Explain the specific physical property that proves them wrong. (2 steps)", "answer": "- Step 1: Whether an object floats or sinks is determined by its average density relative to the fluid, not its total mass. The log has a large mass but a much larger volume, giving it a low density (less than water).\n- Step 2: The iron ball has a tiny mass but an even tinier volume, giving it a very high density (much greater than water). Therefore, the low-density log floats, and the high-density iron ball sinks.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "A sealed, flexible helium balloon is released at sea level and rises. As it gains altitude, the atmospheric pressure drops. Explain what happens to the volume of the balloon and the upthrust acting on it. (3 steps)", "answer": "- Step 1: The pressure outside the balloon decreases with altitude, while the internal gas pressure remains initially hi
