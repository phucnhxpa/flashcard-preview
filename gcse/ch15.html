gher, causing the balloon to expand until internal and external pressures balance.\n- Step 2: As the volume increases, it displaces more air, which would increase the upthrust. However, the air density also decreases significantly with altitude.\n- Step 3: The upthrust depends on the weight of the displaced fluid ($$\\rho \\times V \\times g$$). Because the air density drops faster than the volume increases, the weight of the displaced air eventually decreases, reducing the upthrust until it matches the balloon's weight at a new equilibrium altitude.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": true}, {"question": "When we talk about \"compression\" in the context of forces and matter (Chapter 15), how does it differ from compressing a gas? (2 steps)", "answer": "- Step 1: In forces and matter, compression refers to a solid object being squeezed by two opposing forces towards its center, changing its macroscopic shape (like a spring or a sponge).\n- Step 2: Compressing a gas involves reducing the volume of a fluid by forcing its free-moving molecules closer together, increasing the pressure. The solid compression is about structural shape change, while gas compression is about reducing fluid volume and increasing pressure.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "A diver is at a depth where the liquid pressure is $$300 \\text{ kPa}$$. If the total pressure on the diver is roughly $$400 \\text{ kPa}$$, where does the extra $$100 \\text{ kPa}$$ come from, and why must it be included? (2 steps)", "answer": "- Step 1: The extra pressure comes from the atmosphere above the water's surface (atmospheric pressure, roughly $$101 \\text{ kPa}$$ at sea level).\n- Step 2: The atmosphere pushes down on the surface of the water, and this pressure is transmitted throughout the liquid. Therefore, the total pressure on the diver is the sum of the weight of the water above AND the weight of the air above.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "A force of $$400 \\text{ N}$$ is applied to a surface with an area of $$2 \\text{ m}^2$$. If the area is reduced to $$0.5 \\text{ m}^2$$ while the force stays the same, how does the pressure change? (2 steps)", "answer": "- Step 1: Pressure is inversely proportional to area ($$p = \\frac{F}{A}$$). The new area is one quarter of the original area ($$0.5 \\text{ m}^2$$ vs $$2 \\text{ m}^2$$).\n- Step 2: Because the area is quartered, the pressure becomes 4 times larger. The original pressure was $$200 \\text{ Pa}$$, so the new pressure is $$800 \\text{ Pa}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}], "count": 26}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When a diving board bends under a swimmer's weight, what specific distortions are occurring inside the board material, and where? (3 steps)", "answer": "- Step 1: Consider the shape of a bent board. The top surface curves and becomes longer than its resting length, while the bottom surface curves and becomes shorter.\n- Step 2: Therefore, the top surface is experiencing **stretching** (tension), and the bottom surface is experiencing **compression**.\n- Step 3: There is also a \"neutral axis\" running through the middle of the board's thickness where the length doesn't change at all — this layer is neither stretched nor compressed.\n\nBending is never a single type of distortion; it is always a simultaneous stretch + compression across the cross-section.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "On a force-extension graph for a spring, what is the physical difference between the \"limit of proportionality\" and the \"elastic limit\"? Can a spring be stretched past one but not the other? (3 steps)", "answer": "- Step 1: The **limit of proportionality** is the point where the force-extension graph stops being a straight line. Past this, Hooke's Law ($$F = kx$$) fails, but the spring might still return to its original length when the force is removed.\n- Step 2: The **elastic limit** is the point beyond which the spring suffers permanent (inelastic) deformation and will *not* return to its original length.\n- Step 3: Yes, there is a region between them. If you stretch a spring into this intermediate region, the graph curves (non-linear), but the distortion is still elastic (it recovers). Past the elastic limit, it becomes inelastic.\n\nProportionality fails first; elasticity fails slightly later.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "When a spring is stretched beyond its elastic limit and permanently deformed, where does the extra work done on the spring go, compared to stretching it within the elastic limit? (3 steps)", "answer": "- Step 1: Within the elastic limit, all work done on the spring is stored as recoverable elastic potential energy.\n- Step 2: Beyond the elastic limit, the atomic bonds in the material start to permanently rearrange or slip past each other.\n- Step 3: The work done to cause this permanent rearrangement is dissipated to the surroundings (usually as thermal energy/heat) and cannot be recovered as mechanical energy.\n\nInelastic distortion converts useful mechanical energy into heat; the energy is \"lost\" to the spring's internal structure.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "Why is the elastic potential energy stored in a spring given by $$E = \\frac{1}{2}kx^2$$ instead of just $$E = kx^2$$ or $$E = Fx$$? Walk through the reasoning using the force-extension graph. (3 steps)", "answer": "- Step 1: Work done equals force × distance. However, as you stretch the spring, the force isn't constant — it starts at 0 and increases linearly up to the final force $$F$$.\n- Step 2: On a force-extension graph, work done is the area under the graph. For the Hooke's Law region, this area is a triangle.\n- Step 3: The area of a triangle is $$\\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2} \\times x \\times F$$. Since $$F = kx$$, substituting gives $$E = \\frac{1}{2} \\times x \\times (kx) = \\frac{1}{2}kx^2$$. The $$\\frac{1}{2}$$ comes from using the *average* force during the stretch.\n\nThe 1/2 factor is a direct consequence of the force ramping up linearly from zero.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "If you hang a weight on two identical springs end-to-end (in series), how does the total extension compare to using just one spring, and what does this imply about the effective spring constant? (3 steps)", "answer": "- Step 1: In a series arrangement, each spring experiences the full weight (force) individually. Therefore, each spring extends by the same amount it would if it were hanging alone.\n- Step 2: The total extension of the system is the sum of the individual extensions: $$x_{total} = x + x = 2x$$.\n- Step 3: Since $$F = k_{eff}x_{total}$$ and the total extension has doubled for the same force, the effective spring constant $$k_{eff}$$ must be halved ($$k_{eff} = k/2$$). Adding springs in series makes the system less stiff.\n\nSprings in series are softer; the combined spring constant is lower than any individual spring's constant.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "If you hang a weight from two identical springs side-by-side (in parallel), sharing the load equally, how does the extension compare to using one spring, and what is the effective spring constant? (3 steps)", "answer": "- Step 1: In a parallel arrangement, the total weight is shared equally between the two springs, so each spring only carries half the force ($$F/2$$).\n- Step 2: Because each spring carries half the force, each extends by only half the amount it would if it carried the full force alone.\n- Step 3: Since the system extends by half as much for the same total force, it is twice as stiff. The effective spring constant is $$k_{eff} = 2k$$.\n\nSprings in parallel are stiffer; the combined spring constant is the sum of the individual constants.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "In the Hooke's Law core practical, why is it best to plot Force (F) on the y-axis and Extension (x) on the x-axis, rather than the other way around? (2 steps)", "answer": "- Step 1: The standard equation for a straight line is $$y = mx + c$$. Hooke's Law is $$F = kx$$.\n- Step 2: If $$F$$ is on the y-axis and $$x$$ is on the x-axis, this matches $$y = mx$$ perfectly, meaning the gradient directly equals the spring constant $$k$$. If the axes were swapped, the gradient would be $$1/k$$, which requires an extra calculation step and is less intuitive.\n\nPlot F vs x so the gradient is the physically meaningful spring constant.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "In the Hooke's Law experiment, if you measure the spring's original length before adding any masses, but the spring is already slightly stretched under its own weight, how does this affect your force-extension graph? (3 steps)", "answer": "- Step 1: The extension must always be measured from the *unstretched* (zero force) position. If the spring stretches under its own weight, its natural hanging length is your true \"original length\" baseline.\n- Step 2: If you incorrectly use the coiled (un-hung) length as the original length, your first data point will have a non-zero extension for zero added force.\n- Step 3: This shifts the entire graph to the right, but the gradient (spring constant) remains unchanged. The line will not pass through the origin, but it will still be parallel to the true line.\n\nA non-zero starting extension shifts the line but doesn't change the stiffness (gradient).", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "Three containers with different shapes (narrow, wide, and funnel-shaped) are filled with water to the exact same depth. How do the pressures at the bottom of each container compare? (2 steps)", "answer": "- Step 1: Liquid pressure depends *only* on depth, liquid density, and gravity ($$p = h\\rho g$$). It does not depend on the volume of water or the shape of the container.\n- Step 2: Since depth $$h$$, density $$\\rho$$, and $$g$$ are identical in all three, the pressure at the bottom is identical in all three. This is known as the **hydrostatic paradox**.\n\nDepth alone dictates liquid pressure, not the total weight of water above.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "Why does liquid pressure act in *all directions* on a submerged object, rather than just acting downwards due to gravity? (3 steps)", "answer": "- Step 1: In a solid, molecules are locked in place, so a downward push only transmits downwards. In a liquid, molecules are free to move and slide past each other.\n- Step 2: When gravity pushes down on a liquid, the molecules cannot escape the container; they push against whatever constrains them — the bottom, the sides, and the top.\n- Step 3: Because liquids flow, any pressure difference causes movement until pressure equalizes in all directions at a given depth. This is why water spurts out of a hole in the side of a barrel, not just out the bottom.\n\nFluidity allows pressure to transmit equally in all directions at a given depth.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Where does the liquid pressure equation $$p = h\\rho g$$ come from? Walk through the logic of why these three variables multiply together. (3 steps)", "answer": "- Step 1: Pressure is force per area ($$p = F/A$$). The force here is the weight of the liquid column above the point, and weight is $$W = mg$$.\n- Step 2: The mass of this liquid column is its volume times its density ($$m = V \\times \\rho$$). For a column of height $$h$$ and base area $$A$$, the volume is $$V = A \\times h$$. So, mass $$m = A \\times h \\times \\rho$$.\n- Step 3: Substituting into the pressure equation: $$p = \\frac{F}{A} = \\frac{mg}{A} = \\frac{(A h \\rho) g}{A}$$. The area $$A$$ cancels out top and bottom, leaving $$p = h \\rho g$$.\n\nThe area cancels out, which is why pressure at a depth doesn't depend on the container's width, only the height of liquid above.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "Why does atmospheric pressure decrease *more rapidly* near sea level compared to high up in the atmosphere? (2 steps)", "answer": "- Step 1: Air is a compressible fluid. Near sea level, the weight of all the air above compresses the air below, making it much denser.\n- Step 2: Because the air near sea level is denser, a small increase in altitude removes a large mass of air, causing a large drop in pressure. Higher up, the air is already sparse (low density), so going up a bit further removes very little mass, and pressure drops slowly.\n\nAir density decreases with altitude, causing the non-linear (exponential) drop in atmospheric pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "Why is the upthrust on a submerged object exactly equal to the weight of the fluid it displaces, rather than the weight of the object itself? (3 steps)", "answer": "- Step 1: Imagine a \"hole\" in the fluid exactly the size and shape of the object. The fluid that would normally fill this hole is in equilibrium — it just floats there, so its weight must be perfectly balanced by the upward pressure forces (upthrust) from the surrounding fluid.\n- Step 2: The upward pressure forces from the surrounding fluid depend *only* on the shape of the hole and the depth, not on what material is actually inside it.\n- Step 3: When you replace that fluid with the object, the upward pressure forces from the surroundings don't change. Therefore, the upthrust remains exactly equal to the weight of the fluid that was displaced.\n\nUpthrust is a property of the fluid and the hole's volume, not the object's weight.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "An object floats with exactly 30% of its volume submerged in water. What can you deduce about the object's density, and why? (3 steps)", "answer": "- Step 1: For an object to float, upthrust must equal its weight. Upthrust equals the weight of the displaced fluid.\n- Step 2: Since only 30% of the volume is submerged, the weight of the displaced fluid is only 30% of what it would be if the whole object were submerged.\n- Step 3: Therefore, the object's total weight must equal 30% of the weight of a same-sized volume of water. This means the object's mass (and density) is 30% of water's density. The object's density is $$0.3 \\, \\text{g/cm}^3$$ (or $$300 \\, \\text{kg/m}^3$$).\n\nThe fraction of an object submerged equals the ratio of its density to the fluid's density.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "A solid iron cube is fully submerged 1 metre deep in water, and then lowered to 10 metres deep. Assuming it remains fully submerged, how does the upthrust change? (2 steps)", "answer": "- Step 1: Upthrust is the difference between the upward pressure force on the bottom face and the downward pressure force on the top face of the cube.\n- Step 2: While the absolute pressures on both top and bottom increase significantly at 10 m, the *difference* in pressure between the top and bottom depends only on the height of the cube itself (which hasn't changed). Therefore, the upthrust remains exactly the same.\n\nUpthrust on a fully submerged object depends on its volume and fluid density, NOT on the depth of submersion.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "A submarine needs to dive from the surface. How does it change its overall density to achieve this, and what physical principle allows this? (3 steps)", "answer": "- Step 1: To dive, the submarine's weight must exceed the upthrust. Since it's fully submerged, the maximum upthrust is fixed (equal to the weight of water displaced by its volume).\n- Step 2: To increase its weight without changing its volume, the submarine opens ballast tanks to flood them with seawater, replacing air (low density) with water (high density).\n- Step 3: This increases the submarine's average density to be greater than water, so weight > upthrust, and it sinks. To surface, it blows the water out with compressed air, decreasing its average density below water's.\n\nA submarine alters its mass (and thus average density) while keeping volume constant to control buoyancy.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "If you double the diameter of a circular piston pushing on a fluid, how does the pressure change for the same applied force? (3 steps)", "answer": "- Step 1: Pressure is $$p = F/A$$. If the force $$F$$ is unchanged, the pressure depends inversely on the area $$A$$.\n- Step 2: The area of a circle is $$A = \\pi r^2$$ or $$A = \\pi (d/2)^2$$. If diameter doubles, the radius doubles, and the area increases by a factor of $$2^2 = 4$$.\n- Step 3: Because the area is 4 times larger, the force is spread over 4 times the area, so the pressure becomes 1/4 of the original.\n\nPressure scales inversely with the *square* of the linear dimension (like diameter or radius).", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Spring A has a spring constant of 100 N/m and Spring B has a spring constant of 400 N/m. Both are stretched by the same amount. Which stores more elastic potential energy, and how much more? (2 steps)", "answer": "- Step 1: The EPE equation is $$E = \\frac{1}{2}kx^2$$. Both springs have the same extension $$x$$, so the energy depends directly on the spring constant $$k$$.\n- Step 2: Since Spring B's $$k$$ is 4 times larger than Spring A's, Spring B stores 4 times more elastic potential energy.\n\nFor the same extension, a stiffer spring stores proportionally more energy.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "Spring A and Spring B have the same spring constant. Spring A is stretched twice as far as Spring B. Which stores more energy, and how much more? (2 steps)", "answer": "- Step 1: The EPE equation is $$E = \\frac{1}{2}kx^2$$. Both springs have the same $$k$$, so energy depends on the square of the extension $$x$$.\n- Step 2: Since Spring A's extension is 2 times Spring B's, Spring A stores $$2^2 = 4$$ times more energy.\n\nExtension is squared in the EPE formula, so small extra stretches add a disproportionate amount of energy.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "In the Hooke's Law practical, a student adds 1 N, records the new length, adds another 1 N, and records the *change* in length from the previous reading. Why is this method wrong for plotting a force-extension graph? (3 steps)", "answer": "- Step 1: Hooke's Law relates the *total* applied force to the *total* extension from the natural length: $$F = kx$$.\n- Step 2: If the student records the incremental change for each 1 N added, they are effectively measuring the gradient piece by piece, not the total extension.\n- Step 3: In the linear region, the increment is constant, so they would just get identical numbers for each step, missing the direct proportionality (straight line through origin) that proves Hooke's Law. The x-axis must be total extension from zero force.\n\nExtension is cumulative; always subtract from the original, unstretched length.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "If a spring is stretched beyond its limit of proportionality, why can't you use $$E = \\frac{1}{2}kx^2$$ to find the stored energy? What must you do instead? (2 steps)", "answer": "- Step 1: The formula $$E = \\frac{1}{2}kx^2$$ is derived from the area of a triangle, which assumes the force-extension graph is a straight line through the origin ($$F=kx$$).\n- Step 2: Beyond the limit of proportionality, the graph curves, so the area is no longer a simple triangle. To find the energy stored, you must calculate the total area under the curved graph (usually by counting squares on graph paper).\n\n$$E = \\frac{1}{2}kx^2$$ is strictly a Hooke's Law result; for non-linear regions, use graphical area.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "A rock is suspended from a weighing scale in air, and then lowered into a bucket of water. The scale reading decreases. Why? (2 steps)", "answer": "- Step 1: The scale measures the tension in the string, which equals the rock's weight when in air (ignoring air upthrust).\n- Step 2: In water, the rock experiences an upward upthrust force. The forces are now: Weight (down) = Tension (up) + Upthrust (up). Therefore, Tension = Weight - Upthrust. The scale reads this reduced tension, which is the \"apparent weight\".\n\nUpthrust partially supports the object, reducing the force needed to hold it (apparent weight).", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "When calculating the pressure a brick exerts on the ground using $$p = F/A$$, what area $$A$$ should you use: the total surface area of the brick, or the area of the face touching the ground? (2 steps)", "answer": "- Step 1: Pressure is force per unit area *over which the force is distributed*.\n- Step 2: The weight of the brick only pushes down on the area of the face in contact with the ground. The sides and top face are not supporting the weight against the ground. Therefore, you must use the cross-sectional area of the contact face, not the total surface area.\n\n$$A$$ in $$p = F/A$$ is always the contact area normal to the force.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "A ship made of steel (density ~8000 kg/m³) floats on water (density 1000 kg/m³). How is this possible if steel is much denser than water? (2 steps)", "answer": "- Step 1: Whether something floats depends on its *overall average* density compared to the fluid, not the density of the material it's made from.\n- Step 2: The ship's hull is mostly empty space filled with air. The total mass of the steel divided by the huge total volume of the ship gives an average density much less than 1000 kg/m³. Because its average density is less than water, it floats.\n\nFloating depends on overall average density (mass/volume), not the material density alone.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Why is the bottom of a dam built thicker than the top? (2 steps)", "answer": "- Step 1: Liquid pressure increases with depth according to $$p = h\\rho g$$. At the bottom of the reservoir, the water is deepest, so the pressure exerted on the dam wall is at its maximum.\n- Step 2: The wall must be thicker at the bottom to withstand this greater pressure without failing. At the top, the water is shallow, pressure is low, and the wall can be thinner.\n\nDam thickness varies with depth to counteract the increasing liquid pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "A spring has a spring constant of 50 N/m. How much force is required to stretch it by 4 cm? (2 steps)", "answer": "- Step 1: First, convert the extension to metres: $$x = 4 \\, \\text{cm} = 0.04 \\, \\text{m}$$. (A common pitfall is using 4 directly).\n- Step 2: Apply Hooke's Law: $$F = kx = 50 \\times 0.04 = 2 \\, \\text{N}$$.\n\nAlways convert cm to m before using $$F = kx$$ when $$k$$ is in N/m.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "What is the pressure due to the water at a depth of 2 m in a swimming pool? (Density of water = 1000 kg/m³, g = 10 N/kg) (2 steps)", "answer": "- Step 1: Identify the variables: $$h = 2 \\, \\text{m}$$, $$\\rho = 1000 \\, \\text{kg/m}^3$$, $$g = 10 \\, \\text{N/kg}$$.\n- Step 2: Apply the liquid pressure equation: $$p = h\\rho g = 2 \\times 1000 \\times 10 = 20,000 \\, \\text{Pa} = 20 \\, \\text{kPa}$$.\n\nLiquid pressure increases by roughly 10 kPa for every metre of water depth.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "An object is fully submerged first in water, then in a much denser liquid like mercury. In which liquid is the upthrust greater, and why? (2 steps)", "answer": "- Step 1: Upthrust equals the weight of the displaced fluid. The object displaces the same volume in both liquids because it is fully submerged.\n- Step 2: Mercury has a much higher density, so the same displaced volume has a much greater mass and therefore a much greater weight. The upthrust in mercury is significantly greater.\n\nUpthrust increases with the density of the fluid for the same submerged volume.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": true}, {"question": "A spring is compressed and then released, launching a ball. If you double the compression of the spring, how does the launch speed of the ball change? (Assume all EPE transfers to the ball's kinetic energy). (3 steps)", "answer": "- Step 1: Doubling the compression quadruples the stored elastic potential energy ($$E = \\frac{1}{2}kx^2$$, so $$2^2 = 4$$ times the energy).\n- Step 2: All this energy becomes kinetic energy ($$E_k = \\frac{1}{2}mv^2$$). So the ball's kinetic energy is 4 times greater.\n- Step 3: Since kinetic energy is proportional to $$v^2$$, for $$E_k$$ to increase by a factor of 4, the velocity $$v$$ must increase by a factor of 2 (since $$2^2 = 4$$). The launch speed doubles.\n\nDoubling spring compression doubles the launch speed (not quadruples, because of the square root relationship between energy and speed).", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": true}, {"question": "In physics, the word \"elastic\" appears in both \"elastic distortion\" and \"elastic collision\". Do these two uses of \"elastic\" mean the same thing? (2 steps)", "answer": "- Step 1: No, they refer to different physical concepts, though they share the broad idea of \"recovery.\"\n- Step 2: \"Elastic distortion\" means the object's *shape* fully recovers after the force is removed. \"Elastic collision\" means *kinetic energy* is conserved during the impact. A rubber ball can have an inelastic collision (losing KE as heat/sound) while still undergoing elastic distortion (bouncing back to its original shape).\n\nElastic shape recovery ≠ elastic energy conservation in collisions.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}], "count": 30}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "A single push on a free cardboard box makes it slide across the floor, not bend. Explain *why* multiple forces are required to cause distortion (a change in shape) rather than just motion. (2 steps)", "answer": "- Step 1: According to Newton's first law, a single resultant force acting on a free object causes it to accelerate (change its state of motion), not deform.\n- Step 2: To change an object's shape while keeping it in place, you need opposing forces acting on different parts of the object. These forces create internal stresses that overcome the object's structural integrity, forcing it to distort without the whole object accelerating away.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "When a diving board bends under a diver's weight, the top surface of the board stretches while the bottom surface compresses. Explain why bending is considered a combination of stretching and compression. (2 steps)", "answer": "- Step 1: When forces push down on the board at one point while it is supported at another, the board curves.\n- Step 2: This curve forces the outer edge (top) to become longer than its rest length (stretching) and the inner edge (bottom) to become shorter than its rest length (compression). Thus, bending inherently involves both distortions simultaneously across different regions of the object.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "When you stretch a piece of clay beyond its elastic limit and it stays deformed, the elastic potential energy you put in doesn't just vanish. Where does this energy go, and why can't it be recovered to snap the clay back? (2 steps)", "answer": "- Step 1: The work done to permanently deform the object is used to break or permanently rearrange the molecular bonds within the material.\n- Step 2: This rearrangement dissipates the energy as thermal energy (heat) and sometimes sound. Because the energy is dispersed into the surroundings as heat, it cannot be fully recovered to do work or return the object to its original shape.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A rubber band returns to its original shape after being stretched, making it elastic. However, its force-extension graph is a curve, not a straight line through the origin. Does it obey Hooke's Law? Explain the distinction. (2 steps)", "answer": "- Step 1: It does NOT obey Hooke's Law. Hooke's Law requires the extension to be *directly proportional* to the force, which means a straight line through the origin on a force-extension graph.\n- Step 2: Being \"elastic\" only means the object can recover its original shape once the force is removed. An object can be perfectly elastic but have a non-linear relationship between force and extension, meaning it is elastic but not \"Hookean.\"", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "On a force-extension graph for a metal wire, the line starts to curve slightly, but when the force is removed, the wire still returns to its original length. Differentiate between the \"limit of proportionality\" and the \"elastic limit\" using this scenario. (2 steps)", "answer": "- Step 1: The **limit of proportionality** is the exact point where the graph stops being a straight line. Past this point, force and extension are no longer directly proportional (Hooke's Law fails), but the material might still recover its shape.\n- Step 2: The **elastic limit** is the point beyond which the material suffers permanent deformation. Between the two limits, the material is non-linear but still elastic. Past the elastic limit, it becomes inelastic (plastic).\n+ Example: Think of a spring that gets harder to stretch the more you pull it (past limit of proportionality) but still bounces back perfectly when you let go (before elastic limit).", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "The elastic potential energy ($$E$$) stored in a spring is given by $$E = \\frac{1}{2}kx^2$$. Derive this formula by calculating the area under a force-extension graph for a spring obeying Hooke's Law. (3 steps)", "answer": "- Step 1: Work done on the spring is stored as elastic potential energy. On a force-extension graph, work done is the area under the curve. For a spring obeying Hooke's Law, the graph is a straight line through the origin, so the area under it is a right-angled triangle.\n- Step 2: The base of this triangle is the extension $$x$$, and the height is the force $$F$$. The area of a triangle is $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$, which gives us $$E = \\frac{1}{2} \\times x \\times F$$.\n- Step 3: We know from Hooke's Law that $$F = kx$$. Substituting this into our area equation gives $$E = \\frac{1}{2} \\times x \\times (kx) = \\frac{1}{2}kx^2$$. The formula is just the area of a triangle because the force builds up linearly from zero.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "When you stretch a spring by $$x$$, the force isn't constant—it starts at 0 and ends at $$kx$$. Explain why the elastic potential energy formula $$E = \\frac{1}{2}kx^2$$ contains a $$\\frac{1}{2}$$ by using the concept of \"average force.\" (2 steps)", "answer": "- Step 1: Because the force increases linearly from 0 to $$kx$$, the average force you apply over the entire stretch is exactly halfway between the start and end values: $$F_{\\text{avg}} = \\frac{0 + kx}{2} = \\frac{1}{2}kx$$.\n- Step 2: Work done (energy stored) is average force times distance moved. So, $$E = F_{\\text{avg}} \\times x = \\frac{1}{2}kx \\times x = \\frac{1}{2}kx^2$$. If the force were constant at its maximum the whole time, the energy would be $$kx^2$$, but since it ramps up from zero, you only use half.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "If you stretch a spring to three times its original extension, how many times more elastic potential energy does it store, and why? (2 steps)", "answer": "- Step 1: The elastic potential energy formula is $$E = \\frac{1}{2}kx^2$$. The extension $$x$$ is squared, meaning energy scales with the *square* of the extension.\n- Step 2: If the new extension is $$3x$$, the new energy is $$E_{\\text{new}} = \\frac{1}{2}k(3x)^2 = \\frac{1}{2}k(9x^2) = 9E$$. The energy increases by the square of the extension factor, so it stores 9 times more energy.\n+ Takeaway: Small increases in extension require disproportionately large amounts of work.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "You hang a weight on a spring and it extends by 2 cm. You then attach an identical spring to the bottom of the first one (in series) and hang the same weight on the bottom of the second. How much does the total system extend, and what does this imply about the effective spring constant? (3 steps)", "answer": "- Step 1: The spring constant $$k$$ tells us how much force is needed for a certain extension. When you hang a weight on one spring, it extends by, say, 2 cm.\n- Step 2: If you attach a second identical spring to the end of the first one (in series), the weight pulls on *both* springs with the exact same force. Each spring individually extends by 2 cm.\n- Step 3: The total extension of the system is the sum of both extensions (2 cm + 2 cm = 4 cm). Because the same force produces double the total extension, the effective spring constant is halved ($$k_{\\text{series}} = k/2$$). The system is less stiff because the force has more material to stretch.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Two identical springs are placed side-by-side (in parallel) supporting a single weight. Compared to a single spring, how does the extension change, and what does this imply about the effective spring constant? (3 steps)", "answer": "- Step 1: If you place two identical springs side-by-side (in parallel) supporting a weight, the weight is shared equally between them. Each spring only supports half the total weight.\n- Step 2: Because each spring only feels half the force, each one extends only half as much as it would if it were supporting the weight alone.\n- Step 3: Since the whole system only extends half as much for the same applied force, it takes twice the force to achieve the same extension as a single spring. Therefore, the effective spring constant is doubled ($$k_{\\text{parallel}} = 2k$$). The system is stiffer.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "In Core Practical 7, a student adds 100 g masses one by one to a spring. A common mistake is to record the \"increase in length from the previous reading\" as the extension. Why must extension always be calculated from the *original* length, and what would the graph look like if the student made this mistake? (2 steps)", "answer": "- Step 1: Extension ($$x$$) is defined as the total change from the un-stretched original length ($$x = \\text{final} - \\text{original}$$). Adding masses cumulatively increases the total extension, not just the incremental step.\n- Step 2: If the student recorded only the incremental increase for each mass, they would get a flat, constant value for each step (because each 100 g adds the same $$\\Delta x$$ in the Hooke's Law region). Plotting this would give a horizontal line, entirely missing the directly proportional relationship $$F = kx$$.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "In the Hooke's Law practical, a fiducial marker is used alongside a ruler. Distinguish between how the fiducial marker reduces *random error* and how reading at eye level reduces *systematic error*. (2 steps)", "answer": "- Step 1: The fiducial marker is a precise pointer attached to the spring. It gives a sharp, consistent edge to read against, reducing the *random error* of guessing where the spring's coil aligns with the ruler markings each time.\n- Step 2: Reading the ruler at eye level avoids *parallax error*, which is a systematic error. If you read from an angle above or below, the apparent position shifts consistently in one direction, causing all your measurements to be skewed too high or too low in a predictable way.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "Before adding any masses in Core Practical 7, a student notices the spring is already slightly stretched because the mass hanger itself has weight. If they forget to account for this \"zero error,\" how will this affect their force-extension graph, and will it affect their calculation of the spring constant? (2 steps)", "answer": "- Step 1: If the initial stretch from the hanger is ignored, all extension readings will be too large by a constant amount. This shifts the entire force-extension line to the right, meaning it will not pass through the origin (it will have a positive x-intercept).\n- Step 2: However, the *gradient* of the straight line (which represents the spring constant $$k$$) will remain unchanged. The error adds a constant offset, but the rate of change (stiffness) is unaffected.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "Why is pressure defined as force divided by area ($$p = \\frac{F}{A}$$) rather than just force alone? Use the example of pressing your thumb versus pressing a needle into your skin with the same force. (2 steps)", "answer": "- Step 1: Force alone doesn't tell you how concentrated the effect is. The same force spread over a large area (your thumb) might just cause a dull push, but concentrated over a tiny area (the needle tip) it breaks the skin.\n- Step 2: Pressure quantifies this concentration. The needle tip has a much smaller area ($$A$$), so dividing the force by a tiny area yields a massive pressure, explaining why the physical effect (breaking the skin) is so different despite the same force.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "Derive the formula for pressure in a liquid, $$p = h\\rho g$$, by considering the weight of a column of liquid with cross-sectional area $$A$$ and height $$h$$. (5 steps)", "answer": "- Step 1: To find the pressure at the bottom of a liquid, we need to know the force pushing down on a specific area. Let's imagine a vertical column of liquid with height $$h$$ and a cross-sectional area $$A$$.\n- Step 2: First, find the volume of this column: $$V = \\text{area} \\times \\text{height} = A \\times h$$.\n- Step 3: Next, find the mass of this column using the liquid's density: $$m = \\rho \\times V = \\rho \\times (Ah) = \\rho Ah$$.\n- Step 4: Now, convert mass to weight (force), because weight is the force causing the pressure at the base: $$W = m \\times g = \\rho Ahg$$.\n- Step 5: Finally, pressure is force per unit area: $$p = \\frac{W}{A} = \\frac{\\rho Ahg}{A}$$. The area $$A$$ cancels out completely, leaving $$p = \\rho hg$$. This proves that the pressure at a given depth depends only on depth and density, not on the shape or width of the container.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Three containers with different shapes (one narrow, one wide, one slanted) are filled with water to the exact same depth. A pressure sensor at the bottom of each reads the same pressure. Explain why the wide container with much more water doesn't exert more pressure at the bottom. (2 steps)", "answer": "- Step 1: Pressure at a depth is given by $$p = h\\rho g$$, which depends only on depth ($$h$$), density ($$\\rho$$), and gravity ($$g$$). It does not depend on the total volume or mass of water.\n- Step 2: In the wide container, the extra water is supported by the wider walls of the container, not just the base. Only the vertical column of water directly above the base contributes to the pressure at that base. Thus, depth is the sole determinant of liquid pressure.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "A common misconception is that liquid pressure only acts downwards. Explain why liquid pressure actually acts in *all directions*, and what property of liquids makes this possible. (2 steps)", "answer": "- Step 1: Liquids are fluids, meaning their particles can flow and move past each other. They cannot sustain a shear stress without flowing.\n- Step 2: Because the particles can move freely, the weight of the liquid above pushes down, but the particles then push sideways against the container walls and in all directions to distribute the force. If pressure only acted downwards, a dam would only need to be strong on its bottom edge, not across its whole face—which is false.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "As you climb a mountain, atmospheric pressure decreases, but it does not decrease linearly with altitude. Explain why the pressure drops more rapidly at lower altitudes compared to higher altitudes. (2 steps)", "answer": "- Step 1: The atmosphere is a gas, which is compressible. Near sea level, the air is heavily compressed by the weight of all the air above it, making it denser.\n- Step 2: Because the air at lower altitudes is denser, it contributes more weight (and thus more pressure drop) per unit of height climbed. At higher altitudes, the air is much less dense, so each metre of altitude adds very little weight, causing the pressure to decrease more slowly.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "A fully submerged cube has water above it and water below it. Explain how the difference in liquid pressure between the top and bottom faces of the cube creates an upward resultant force called upthrust. (3 steps)", "answer": "- Step 1: Liquid pressure increases with depth ($$p = h\\rho g$$). The bottom face of the cube is at a greater depth than the top face.\n- Step 2: Therefore, the water exerts a larger upward force on the bottom face than the downward force it exerts on the top face.\n- Step 3: The horizontal forces on the sides cancel out, but the vertical forces do not. The resultant of these pressure forces is an upward push, which is the upthrust.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "Show that the upthrust on a submerged object is equal to the weight of the fluid displaced. Imagine the space the object occupies filled entirely with the same fluid. (4 steps)", "answer": "- Step 1: Imagine removing the submerged object and filling the exact hole it left with the same fluid. This new \"fluid block\" is identical in volume and shape to the object.\n- Step 2: This fluid block is stationary, meaning the forces on it are balanced. The downward force is its weight, and the upward force is the upthrust from the surrounding fluid. Therefore, Upthrust = Weight of the fluid block.\n- Step 3: Now, put the object back into that same space. Because it occupies the exact same volume at the exact same depth, the surrounding fluid pushes on it with the exact same pressure difference. Thus, the object experiences the exact same upthrust as the fluid block did.\n- Step 4: Since the upthrust on the fluid block equaled its own weight, the upthrust on the submerged object must equal the weight of the fluid that would have been there—i.e., the weight of the fluid displaced.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "A solid steel ball sinks in water, but a massive steel ship floats. Explain this using the concept of upthrust and displaced fluid. (2 steps)", "answer": "- Step 1: Upthrust equals the weight of the fluid displaced. The solid ball has a small volume and displaces very little water, so the upthrust is less than its weight—it sinks.\n- Step 2: The ship's hull is shaped to enclose a huge volume of air, giving it a much larger overall volume. When placed in water, it sinks deep enough to displace a massive volume of water whose weight equals the ship's weight, so upthrust equals weight, and it floats.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "A heavy cube rests on the bottom of a dry swimming pool. Water is then poured in, fully submerging the cube, but water cannot seep under the cube to touch its bottom face. Does the cube experience upthrust? Explain why or why not. (2 steps)", "answer": "- Step 1: Upthrust is caused by the pressure difference between the bottom and top faces of the object.\n- Step 2: If water cannot reach the bottom face, there is no upward pressure from the water acting on the cube. The top face experiences downward pressure, and the bottom face only experiences the normal contact force from the pool floor. Therefore, there is no resultant upward force, and the cube experiences no upthrust.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "Prove that an object will float if and only if its average density is less than the density of the fluid it is placed in. Start from the condition for floating (upthrust = weight). (4 steps)", "answer": "- Step 1: For an object to float, the upward force must balance the downward force. This means Upthrust must equal the object's Weight. Upthrust is the weight of the fluid displaced, so: $$\\text{Weight of displaced fluid} = \\text{Weight of object}$$.\n- Step 2: Substitute the formula for weight ($$W = mg$$) on both sides: $$m_{\\text{fluid}}g = m_{\\text{object}}g$$. The $$g$$ cancels out, leaving $$m_{\\text{fluid}} = m_{\\text{object}}$$.\n- Step 3: Now, substitute mass using density and volume ($$m = \\rho V$$): $$\\rho_{\\text{fluid}} V_{\\text{displaced}} = \\rho_{\\text{object}} V_{\\text{object}}$$.\n- Step 4: For an object to float without being fully submerged, the volume of fluid it displaces must be less than or equal to its own total volume ($$V_{\\text{displaced}} \\le V_{\\text{object}}$$). Rearranging the equation, we get $$\\frac{\\rho_{\\text{object}}}{\\rho_{\\text{fluid}}} = \\frac{V_{\\text{displaced}}}{V_{\\text{object}}}$$. For this ratio to be 1 or less, $$\\rho_{\\text{object}}$$ must be less than or equal to $$\\rho_{\\text{fluid}}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "When you carry a heavy stone in air, it feels very heavy, but when you carry it underwater, it feels much lighter. Explain what the \"apparent weight\" of the stone is underwater. (2 steps)", "answer": "- Step 1: The stone's true weight acts downwards, but the water exerts an upthrust force upwards.\n- Step 2: The apparent weight is the resultant of these two forces: $$\\text{Apparent weight} = \\text{True weight} - \\text{Upthrust}$$. It feels lighter because the upthrust partially cancels out the weight.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "A force of 100 N is applied to a small piston of area $$0.01 \\text{ m}^2$$. If the same force were applied to a piston with double the area ($$0.02 \\text{ m}^2$$), qualitatively how would the pressure change, and by what factor? (2 steps)", "answer": "- Step 1: Pressure is force per unit area ($$p = \\frac{F}{A}$$). If the force is the same but the area doubles, the force is spread over a larger surface.\n- Step 2: The pressure is halved. Since $$p \\propto \\frac{1}{A}$$, doubling the area halves the pressure. The new pressure would be 5000 Pa compared to the original 10000 Pa.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "Spring A has a spring constant of 20 N/m, and Spring B has a spring constant of 40 N/m. Both are stretched by 0.1 m. Which stores more elastic potential energy, and by what factor? (2 steps)", "answer": "- Step 1: Elastic potential energy is $$E = \\frac{1}{2}kx^2$$. Since both are stretched the same distance ($$x$$ is constant), the energy is directly proportional to the spring constant $$k$$.\n- Step 2: Spring B has double the spring constant of Spring A, so it stores double the elastic potential energy.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A diver is at a depth where the water pressure is 2 times atmospheric pressure. If she dives twice as deep, will the *total* pressure be 4 times atmospheric pressure? Explain using the components of total pressure. (2 steps)", "answer": "- Step 1: Total pressure = atmospheric pressure + liquid pressure ($$p_{\\text{total}} = p_{\\text{atm}} + h\\rho g$$). At the first depth, $$p_{\\text{total}} = p_{\\text{atm}} + h\\rho g = 2 p_{\\text{atm}}$$.\n- Step 2: If she dives twice as deep, the liquid pressure doubles ($$2h\\rho g$$), but the atmospheric pressure component remains constant. The new total pressure is $$p_{\\text{atm}} + 2h\\rho g = p_{\\text{atm}} + 2(p_{\\text{atm}}) = 3 p_{\\text{atm}}$$. It does not quadruple because the atmospheric pressure doesn't scale with depth.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "A student says \"Heavy objects sink and light objects float.\" Give a counterexample that disproves this, and explain the correct physical principle. (2 steps)", "answer": "- Step 1: A massive wooden log (heavy) floats, while a small iron nail (light) sinks. This directly contradicts the student's claim.\n- Step 2: Whether an object floats or sinks depends on its *average density* relative to the fluid, not its mass. If the object's density is less than the fluid's density, it floats, because it can displace enough fluid to match its weight before it is fully submerged.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}], "count": 28}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Explain why Hooke's Law only applies up to the limit of proportionality, and what happens beyond this point (3 steps)", "answer": "- Step 1: Below the limit of proportionality, the spring's atomic structure remains in a stable, elastic state — bonds stretch but don't break.  \n- Step 2: Beyond this limit, the material undergoes plastic deformation as atomic layers slide past each other, creating permanent displacement.  \n- Step 3: The relationship becomes non-linear because the spring constant $k$ effectively changes — the same force now causes disproportionately larger extensions.  \n\n*Takeaway: Hooke's Law is a linear approximation only for small deformations where the material's microstructure remains intact.*", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is the elastic potential energy formula $E = \\frac{1}{2}kx^2$ different from the kinetic energy formula $E = \\frac{1}{2}mv^2$? (2 steps)", "answer": "- Step 1: For springs, force varies with extension ($F = kx$), so energy is the area under the $F$ vs $x$ graph (a triangle: $\\frac{1}{2} \\times \\text{base} \\times \\text{height}$).  \n- Step 2: For kinetic energy, force isn't variable — it's derived from constant acceleration, leading to $v^2$ dependence.  \n\n*Takeaway: The $\\frac{1}{2}$ arises mathematically from integrating linearly increasing force (spring) vs constant force (kinetic motion).*", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "A student claims the limit of proportionality is where a spring breaks. Why is this incorrect?", "answer": "- The limit of proportionality is where $F$ vs $x$ stops being linear, but the spring may still recover its shape (elastic deformation).  \n- The breaking point (ultimate tensile strength) occurs much later, after extensive plastic deformation.  \n- Example: Steel springs often exceed the proportional limit during normal use (e.g., car suspensions) but don't snap.  \n\n*Takeaway: Proportionality loss ≠ failure — it's about the onset of non-linear behavior, not structural collapse.*", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does pressure in a liquid act equally in all directions, even though gravity pulls downward? (3 steps)", "answer": "- Step 1: Liquid molecules are in constant random motion, transferring force via collisions in all directions.  \n- Step 2: Gravity creates a pressure gradient (higher pressure at depth), but this pressure is transmitted isotropically (Pascal's principle).  \n- Step 3: The fluid's inability to support shear stress ensures pressure normalizes to equal all directions at a point.  \n\n*Takeaway: Pressure direction reflects molecular motion, not just gravity vector.*", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "A diver feels 201 kPa of total pressure underwater. Is this measurement at sea level or high altitude? Explain using pressure concepts (2 steps)", "answer": "- Step 1: Total pressure = atmospheric + liquid pressure. At sea level, atmospheric ≈ 101 kPa → 100 kPa from water (10 m depth).  \n- Step 2: At high altitude, atmospheric pressure would be lower (e.g., 80 kPa), making liquid pressure contribution larger (121 kPa) for the same total of 201 kPa.  \n\n*Takeaway: Without knowing altitude, we can't determine depth — total pressure depends on both atmospheric and fluid factors.*", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does a ship float higher in saltwater vs freshwater? Use density and displacement concepts (2 steps)", "answer": "- Step 1: Saltwater ($\\approx 1025$ kg/m³) is denser than freshwater (1000 kg/m³), so displacing 1 m³ of saltwater provides more upthrust (weight = $1025 \\times g$ vs $1000 \\times g$).  \n- Step 2: To balance the ship's weight, less volume needs to be submerged in saltwater, making it float higher.  \n\n*Takeaway: Higher fluid density reduces required submerged volume for buoyancy.*", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Explain why atmospheric pressure decreases exponentially with altitude, unlike liquid pressure which decreases linearly with height (3 steps)", "answer": "- Step 1: Liquids are incompressible — density $\\rho$ stays constant, so pressure $p = h\\rho g$ decreases linearly with decreasing depth.  \n- Step 2: Gases are compressible — air density decreases exponentially with altitude as molecules spread out.  \n- Step 3: Fewer molecules above → less weight → pressure drops faster than linearly (exponential decay model).  \n\n*Takeaway: Density constancy vs variability determines pressure-altitude relationship.*", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": true}, {"question": "What misconception arises from calling the \"spring constant\" a \"stiffness constant\"? Clarify using $k$'s physical meaning (2 steps)", "answer": "- Step 1: \"Stiffness\" implies a material property, but $k$ depends on both material (Young's modulus) AND geometry (length, thickness).  \n- Step 2: A steel spring and steel wire have same material stiffness but different $k$ values — longer/coiled springs have lower $k$.  \n\n*Takeaway: $k$ is a system-specific parameter, not a pure material constant.*", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}, {"question": "In Core Practical 7, why must you wait for the spring to stop moving before measuring extension?", "answer": "- Dynamic stretching introduces inertia — the spring oscillates around the equilibrium point.  \n- Measuring during motion gives false readings due to kinetic energy temporarily altering position.  \n- Analogy: Weighing yourself on a scale while jumping — the reading fluctuates.  \n\n*Takeaway: Static equilibrium ensures the measured extension corresponds to the applied force.*", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "A student plots force vs extension and gets a straight line through the origin with gradient 200 N/m, but the spring doesn't follow Hooke's Law. Is this possible? Explain (2 steps)", "answer": "- Step 1: Hooke's Law ($F = kx$) requires proportionality (straight line through origin), but this is only valid for elastic deformation below the limit.  \n- Step 2: If the spring is inelastically deforming (e.g., after unloading), the graph might show a straight line during compression but not return to zero — violating Hooke's Law's recovery requirement.  \n\n*Takeaway: Proportionality ≠ Hooke's Law — elasticity is also required.*", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": true}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why do *multiple* forces need to be applied for shape distortion, rather than a single force? (3 steps)", "answer": "- Step 1: A single force on a free object causes *acceleration* (Newton's 2nd Law), not shape change. For example, a brick on ice would slide if pushed.  \n- Step 2: Distortion requires *internal stress* – forces must act on different parts of the object in opposing directions. This creates tension/compression within the material.  \n- Step 3: Example: Stretching a spring requires two forces – one pulling the top up, another pulling the bottom down (e.g., hanging mass and fixed support).  \n+ Compression: Forces act inward (e.g., weight on a spring).  \n+ Bending: Opposing forces at different points (e.g., diving board).  \n\n**Takeaway:** Shape change requires forces acting in different locations/directions to create internal strain.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": true}, {"question": "What is the *key difference* between elastic and inelastic distortion, and how does energy storage differ?", "answer": "- **Elastic distortion**: Object returns to original shape (e.g., steel spring). Energy is stored as elastic potential energy (EPE) and fully recoverable.  \n- **Inelastic distortion**: Object remains permanently deformed (e.g., clay). Energy is dissipated as heat/irreversible structural changes and not recoverable.  \n- **Graph insight**: Elastic follows Hooke’s Law (linear region); inelastic occurs beyond the limit of proportionality (curved region).", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why does Hooke’s Law ($F = kx$) only apply *below* the limit of proportionality? (3 steps)", "answer": "- Step 1: Below the limit, atomic bonds stretch *linearly* – restoring forces are proportional to displacement.  \n- Step 2: Beyond the limit, bonds begin to slide past each other (plastic deformation), causing non-linear behavior.  \n- Step 3: Example: A spring returns to shape when gently stretched (elastic), but bends permanently if pulled too hard (inelastic).  \n+ Misconception: The limit isn’t the breaking point – the spring may still be elastic past this point!  \n\n**Takeaway:** Hooke’s Law reflects atomic-scale elasticity; beyond it, material structure fails to return to original.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why is elastic potential energy ($E = \\frac{1}{2}kx^2$) proportional to *x²*, not just x? (3 steps)", "answer": "- Step 1: Work done to stretch a spring increases as the spring gets longer – early force stretches easily, later force fights more resistance.  \n- Step 2: The area under the force-extension graph (which gives energy) forms a triangle: $ \\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2}kx^2 $.  \n- Step 3: Doubling extension requires *quadruple* the energy because both force and distance increase. Example: Stretching a rubber band 2 cm stores 4× more energy than 1 cm.  \n\n**Takeaway:** Energy scales with $x^2$ because both force and distance increase during stretching.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "In Core Practical 7, why is a *fiducial marker* crucial for accurate extension measurements? (2 steps)", "answer": "- Step 1: Human eye parallax errors occur when viewing a ruler at an angle. A fiducial marker (pointer) aligns with the spring’s end at eye level, eliminating this.  \n- Step 2: Consistent reference point ensures repeatable measurements – without it, small shifts in spring position create large random errors.  \n+ Example: A paper clip attached to the spring gives a sharp edge to align with the ruler.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why does pressure in a liquid ($p = h\\rho g$) depend on *depth*, not volume? (3 steps)", "answer": "- Step 1: Pressure arises from the *weight of the liquid column* above a point. Deeper points have more liquid above them.  \n- Step 2: Liquid is incompressible – density $ρ$ is constant, so weight increases linearly with depth $h$.  \n- Step 3: Containers of different shapes (e.g., narrow vase vs. wide tank) with the same depth have equal pressure at the bottom.  \n+ Misconception: More total water ≠ more pressure – only depth and density matter!  \n\n**Takeaway:** Pressure in fluids is a function of depth and density, not the total amount of liquid.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why does atmospheric pressure decrease with altitude? (3 steps)", "answer": "- Step 1: Air density decreases with height – fewer molecules per unit volume at higher altitudes.  \n- Step 2: Weight of air column (from a point to the top of the atmosphere) diminishes as altitude increases.  \n- Step 3: Example: At 5,500 meters (Everest base camp), pressure is ~50 kPa vs. 101 kPa at sea level. Boiling point of water drops accordingly.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why does a steel ship float, even though steel is denser than water? (3 steps)", "answer": "- Step 1: Ship displaces a large volume of water, creating massive upthrust ($F_{\\text{upthrust}} = \\text{weight of displaced fluid}$).  \n- Step 2: Average density of the ship (steel + air) is less than water. Even though steel’s density is ~7,900 kg/m³, air reduces the average to ~1,000 kg/m³.  \n- Step 3: When loaded, the ship sinks deeper until displaced water matches total weight. If cargo makes average density > water, it sinks.  \n\n**Takeaway:** Floating depends on *average density*, not the material’s intrinsic density.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "What’s the difference between *proportional* and *linear* relationships on a graph? (2 steps)", "answer": "- Proportional: $F = kx$ – straight line through the origin. Example: Hooke’s Law region.  \n- Linear: Any straight line, even without passing through origin. Example: A spring with pre-tension (non-zero force at zero extension).  \n\n**Misconception:** Not all straight lines are proportional – check if (0,0) is on the line.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": true}, {"question": "Why does a hydraulic press multiply force? (2 steps)", "answer": "- Step 1: Pressure is transmitted equally in a fluid ($p = F/A$). Smaller input area ($A_1$) creates higher pressure for same force.  \n- Step 2: Larger output area ($A_2$) feels the same pressure, so force is multiplied: $F_2 = F_1 \\times (A_2/A_1)$.  \n+ Analogy: Bicycle pump (small area) creates enough pressure to lift a car on a large hydraulic piston.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is the difference between the limit of proportionality and the elastic limit — can a material be past one but not the other? (2 steps)", "answer": "- Step 1: The limit of proportionality is where the force-extension graph stops being a straight line — the relationship is no longer directly proportional. This is a geometric/graphical definition.\n- Step 2: The elastic limit is where permanent (inelastic) deformation begins — the material will not return to its original length when the force is removed. For many materials, the elastic limit is slightly beyond the limit of proportionality, meaning you can stretch past where the graph curves but still be in the elastic region.\n+ Example: A copper wire may curve slightly before the limit of proportionality but still spring back when released.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Why does the area under a force-extension graph equal the elastic potential energy stored? (2 steps)", "answer": "- Step 1: Work done = force × distance moved. On a force-extension graph, the force isn't constant — it varies with extension.\n- Step 2: The area under the graph (∫F dx) adds up all the tiny amounts of work done at each small increment of extension. For a straight line through origin (F = kx), this area is a triangle: ½ × base × height = ½ × x × (kx) = ½kx².\n\n**A:** Work done on a spring equals force multiplied by distance moved. On a force-extension graph, the force changes as extension increases. Adding up all the tiny bits of work (the area under the graph) gives the total energy stored. For Hooke's Law region, this forms a triangle: ½ × extension × maximum force = ½kx².", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "A student says \"pressure in a liquid pushes down on objects.\" Explain why this is a misconception and what the correct picture is. (2 steps)", "answer": "- Step 1: Pressure in a fluid is not a vector with a single direction — it's a scalar quantity that acts equally in all directions at any given depth.\n- Step 2: The confusion comes from thinking about weight pushing down, but pressure at any point in a liquid acts perpendicular to any surface it touches (in all directions). An underwater object feels pressure pushing up on its bottom, sideways on its sides, and down on its top.\n\n**A:** This is incorrect. Pressure at a point in a fluid acts equally in all directions — up, down, and sideways. What creates the upward force (upthrust) is the difference in pressure between the bottom (higher pressure, deeper) and top (lower pressure, shallower) of a submerged object. Pressure doesn't \"push down\" — it pushes perpendicular to every surface.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": true}, {"question": "Derive the liquid pressure equation p = hρg from first principles — why does pressure depend on depth, density, and g? (3 steps)", "answer": "- Step 1: Consider a column of liquid with height h and cross-sectional area A. Its volume is V = Ah.\n- Step 2: The mass of this column is m = ρV = ρAh. The weight (force due to gravity) is W = mg = ρAhg.\n- Step 3: This weight is distributed over the area A at the bottom, so pressure = force/area = (ρAhg)/A = hρg. The pressure depends on h because more weight sits above when you go deeper; it depends on ρ because denser liquids weigh more per volume; it depends on g because weight is what creates the force.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Why do dams get thicker at the bottom than at the top? Use the concept of pressure in your explanation. (2 steps)", "answer": "- Step 1: Water pressure increases with depth (p = hρg). At the surface, pressure is near zero; at the bottom, it's maximum.\n- Step 2: The dam must withstand the maximum force from water at the bottom. A thicker section at the bottom provides a larger cross-sectional area to spread out that large force, reducing the stress on the material. The structure must be strongest where pressure (and thus force) is greatest.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Explain why upthrust equals the weight of displaced fluid — what is the fundamental reason behind Archimedes' principle? (3 steps)", "answer": "- Step 1: Consider a submerged object. The pressure on its top surface is p_top = h_top × ρ_fluid × g. The pressure on its bottom surface is p_bottom = h_bottom × ρ_fluid × g.\n- Step 2: Since the bottom is deeper, p_bottom > p_top. The upward force on the bottom is F_bottom = p_bottom × A, and downward force on top is F_top = p_top × A. The net upward force (upthrust) = (p_bottom − p_top) × A.\n- Step 3: (p_bottom − p_top) = (h_bottom − h_top)ρg = h_object × ρg, where h_object is the object's height. So upthrust = h_object × A × ρg = V × ρg = (m_displaced)g = weight of displaced fluid.\n\n**A:** When an object is submerged, the pressure difference between its top and bottom creates a net upward force. The bottom is deeper, so pressure there is higher. This pressure difference exactly equals the weight of fluid that would have occupied that space — because the pressure at each depth comes from the weight of the fluid above. That's why upthrust = weight of displaced fluid.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A helium balloon rises in air, but a soap bubble of the same size doesn't. Both contain air inside. What's going on? (2 steps)", "answer": "- Step 1: A helium balloon contains helium (density ~0.18 kg/m³), which is less dense than air (~1.2 kg/m³). The balloon plus its contents is less dense than air, so the weight of displaced air (upthrust) exceeds the balloon's weight — it rises.\n- Step 2: A soap bubble has air inside but also the soap film itself. The combined density of the film + trapped air is greater than air's density. Even though it contains air, the heavy soap skin makes it denser than air, so it sinks or falls.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "If gravity were suddenly halved, would an object that floats in water now sink, rise higher, or stay the same? What about a sinking object? (2 steps)", "answer": "- Step 1: For a floating object, upthrust = weight of displaced fluid. Both upthrust (ρ_fluid × V_displaced × g) and weight (m_object × g) depend on g. If g halves, both forces halve proportionally — the balance point stays the same. The object floats at the same level.\n- Step 2: For a sinking object, the condition depends on density: if object density > fluid density, it sinks regardless of g. Halving g doesn't change the density ratio, so a sinking object still sinks (just more slowly, because net force is smaller).", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": true}, {"question": "Why can't you use E = ½kx² to calculate elastic potential energy beyond the limit of proportionality? (2 steps)", "answer": "- Step 1: The equation E = ½kx² comes from integrating F = kx (the area under a straight line through the origin). This only applies where Hooke's Law is valid.\n- Step 2: Beyond the limit of proportionality, the relationship is non-linear — the graph curves. The simple ½kx² formula no longer describes the actual force-extension relationship, so you can't use it. Instead, you must find the actual area under the curved graph.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Two springs have the same spring constant k but different natural lengths. If you apply the same force to both, which stretches more? What does this tell you about what \"spring constant\" actually measures? (2 steps)", "answer": "- Step 1: Using Hooke's Law: x = F/k. Since k is the same for both, the extension x is the same regardless of original length.\n- Step 2: This shows that k measures the stiffness of the spring material itself, not its length. A longer spring with the same k will be longer after stretching (original + extension), but the extension per unit force is identical. k is a property of the spring's material and construction, not its size.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Why does atmospheric pressure decrease with altitude, and why does it change faster near sea level than at high mountains? (2 steps)", "answer": "- Step 1: Atmospheric pressure is caused by the weight of air above a surface. At higher altitude, there's less air above you, so less weight pressing down — hence lower pressure.\n- Step 2: Air is compressible — it's denser at lower altitudes where it's compressed by all the air above. So near sea level, each meter of altitude removes a lot of air weight. At high altitudes, the air is already thin, so climbing further removes less air weight per meter — pressure drops more slowly with height.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A hydraulic car lift uses a small force on a small piston to lift a heavy car on a large piston. Use the pressure equation to explain why this works. (2 steps)", "answer": "- Step 1: Pressure is transmitted equally throughout a fluid (Pascal's principle). If you apply force F₁ on area A₁, the pressure created is p = F₁/A₁.\n- Step 2: This same pressure acts on the larger piston with area A₂, creating force F₂ = p × A₂ = F₁ × (A₂/A₁). If A₂ is much larger than A₁, the output force is multiplied proportionally. The work is still conserved — you push the small piston a larger distance to move the big piston a smaller distance.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": true}, {"question": "Why is it easier to float in the Dead Sea than in a freshwater lake? (2 steps)", "answer": "- Step 1: The Dead Sea has an extremely high salt concentration, giving it a density around 1,240 kg/m³ (compared to freshwater at 1,000 kg/m³).\n- Step 2: Upthrust = weight of displaced fluid = V × ρ_fluid × g. With higher ρ_fluid, you displace less water to equal your weight. You float higher and more easily because the denser water provides more upthrust per unit volume displaced.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "What would happen to a perfectly rigid object (one that doesn't deform at all) submerged in a fluid? Would it experience upthrust? (2 steps)", "answer": "- Step 1: Upthrust arises from pressure difference between the top and bottom of a submerged object. Even a rigid object has a top and bottom at different depths, so there would still be a pressure difference.\n- Step 2: However, the magnitude of upthrust depends on the volume of fluid displaced. A rigid object displaces exactly its volume. So yes, it would experience upthrust equal to the weight of fluid displaced — same as any submerged object. The rigidity doesn't change the pressure difference.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "A spring is hung vertically and a mass is attached. The spring stretches and comes to rest. Draw a free body diagram showing all the forces on the mass, and explain why it stops moving. (2 steps)", "answer": "- Step 1: Forces on the mass: weight (W = mg) downward, tension in the spring (T) upward. The spring stretches until the upward tension equals the downward weight.\n- Step 2: When T = W, the net force is zero (ΣF = 0). According to Newton's First Law, an object with zero net force remains at rest or moves at constant velocity. Since it's at rest, it stays at that extension. This is the equilibrium position.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Why do skyscrapers have deep foundations? Use pressure concepts. (2 steps)", "answer": "- Step 1: Pressure = force/area. A tall building exerts a huge weight (force) on the ground beneath it.\n- Step 2: If this force were applied to a small area, the pressure would be enormous and the building would sink into the ground. By spreading the force over a large foundation area (deep and wide footings), the pressure on the soil is reduced to a level the ground can support.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "When you push a balloon underwater and release it, it shoots back up. Explain this in terms of forces and pressure. (2 steps)", "answer": "- Step 1: The balloon experiences weight (downward) and upthrust (upward). When submerged, upthrust = weight of water displaced (ρ_water × V × g). Since the balloon is compressible, pushing it underwater compresses the air inside, reducing the volume displaced.\n- Step 2: As it rises and the water pressure decreases, the air expands, increasing the volume displaced and thus increasing upthrust. The upthrust becomes greater than the weight, accelerating the balloon upward. This continues until it breaks the surface and the displaced volume (and thus upthrust) decreases.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": true}, {"question": "Explain why a steel needle can float on water's surface despite steel being much denser than water. (2 steps)", "answer": "- Step 1: This isn't true floating (upthrust from submersion) — it's surface tension. Water molecules at the surface have stronger cohesive forces, creating a \"skin\" that can support small objects.\n- Step 2: The needle sits on top of the water surface, deforming it slightly. The upward force from surface tension acts along the edges of the needle, balancing its weight. This is different from upthrust in a submerged object.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": true}, {"question": "Why does a rubber band feel different from a steel spring when you stretch them? They both obey Hooke's Law initially. (2 steps)", "answer": "- Step 1: Both materials have a spring constant k, but rubber typically has a much smaller k (easier to stretch initially), while steel has a much larger k (harder to stretch).\n- Step 2: More fundamentally, rubber stores energy differently — the molecular chains unwind when stretched. Steel stores energy through bond distortion between atoms. The energy storage mechanisms differ, giving different \"feel\" — rubber is more compliant (lower k) while steel is stiff (higher k).", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "If you compress a spring and then release it, where does the stored elastic potential energy go? (2 steps)", "answer": "- Step 1: When you release a compressed spring, the stored EPE is converted into kinetic energy of the spring (and whatever it's pushing).\n- Step 2: This kinetic energy then transforms into other forms — sound (if it clatters), heat (internal friction in the spring material), and possibly gravitational potential energy if it launches something upward. In an ideal perfectly elastic spring with no friction, all EPE converts to kinetic, then back to EPE on the rebound.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In a submarine, how does it control whether it floats, sinks, or stays neutrally buoyant? (2 steps)", "answer": "- Step 1: A submarine has ballast tanks that can be filled with water or air. When the tanks are full of water, the submarine's average density increases — it becomes heavier than the displaced water and sinks.\n- Step 2: When the tanks are filled with air, the overall density decreases — the submarine becomes less dense than water, so upthrust exceeds weight and it rises. At neutral buoyancy, the weight of the submarine exactly equals the upthrust (weight of displaced water), so it stays at any depth.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": true}, {"question": "Why can a hot air balloon rise even though the material of the balloon is heavier than air? (2 steps)", "answer": "- Step 1: The balloon rises because of the air inside it, not the balloon material. The air inside the balloon is heated, making it less dense than the surrounding cool air.\n- Step 2: The total weight of (hot air + balloon m
