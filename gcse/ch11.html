 refuelling vehicles or aeroplanes, and how does a bonding line prevent this danger? (3 steps)", "answer": "- Step 1: As fuel flows rapidly through pipes, friction between the fuel (a liquid insulator) and the pipe causes electrons to transfer, building up a large static charge on the fuel and pipe.\n- Step 2: This charge creates a strong electric field that could cause a spark to jump through the fuel vapour, igniting the highly flammable fuel and causing an explosion.\n- Step 3: A bonding line (copper wire) connects the vehicle to Earth, earthing it. This allows the excess electrons to flow safely to Earth, preventing charge build-up and eliminating the spark risk.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Explain how lightning is formed, linking the concepts of friction, charge build-up, electric fields, and sparks. (3 steps)", "answer": "- Step 1: As storm clouds move and rub against each other, friction causes electrons to transfer, building up a massive static charge within the clouds.\n- Step 2: This charge creates an extremely strong electric field between the cloud and the ground.\n- Step 3: When the field is strong enough, it forces electrons through the insulating air, creating a giant spark (lightning) that discharges the built-up static electricity.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Why can walking on a nylon carpet with rubber shoes cause you to experience a small electric shock when you touch a metal door handle? (3 steps)", "answer": "- Step 1: Friction between your shoes and the carpet transfers electrons to your body, building up a static charge (you become charged because the charge cannot easily flow away through your rubber shoes).\n- Step 2: When your hand approaches the metal door handle (a conductor), a strong electric field is created in the small gap between your finger and the handle.\n- Step 3: The field forces electrons to jump across the air gap (a spark), resulting in a brief current that you feel as a shock.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "To avoid getting a sharp static shock from a door handle after walking on a carpet, you can touch a metal wall or door frame first with the back of your hand. How does this prevent the sharp shock? (2 steps)", "answer": "- Step 1: Touching the larger metal surface provides a path for the excess charge on your body to discharge to Earth gradually.\n- Step 2: Because the contact area is larger and the discharge happens more gradually over a wider area, the current does not concentrate into a single small spark at your fingertip, preventing the sharp, painful sensation.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "In an inkjet printer, how does static electricity direct the ink to the correct position on the page? (2 steps)", "answer": "- Step 1: Small jets of coloured ink are given a negative charge as they are ejected from the nozzle.\n- Step 2: Charged plates within the printer create an electric field that exerts an electrostatic force on the ink droplets, attracting them to the precise position on the page. Opposite charges attract, steering the ink accurately.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "A student says: \"Earthing a charged object works because positive charges flow from the object into the ground to neutralize it.\" Critically evaluate this statement. (3 steps)", "answer": "- Step 1: The statement is incorrect because positive charges (protons) are fixed in the nuclei of atoms and do not flow; only electrons are mobile charge carriers in electrostatic situations.\n- Step 2: If the object is positively charged, earthing works because electrons flow FROM the Earth TO the object to cancel the positive charge.\n- Step 3: If the object is negatively charged, earthing works because electrons flow FROM the object TO the Earth. Earthing always involves the movement of electrons, never protons.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "Compare the electric field strength as you move away from a single point charge versus moving between two parallel plates in a uniform field. (2 steps)", "answer": "- Step 1: For a single point charge, the field is radial, and the field lines spread further apart as distance increases. Therefore, the field strength decreases as you move away from the point charge.\n- Step 2: For a uniform field between parallel plates, the field lines are parallel and equally spaced everywhere. Therefore, the field strength remains constant regardless of where you are between the plates.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A positive test charge is placed at point X in an electric field, where the field lines are very close together. It is then moved to point Y, where the field lines are far apart. Compare the electrostatic force on the charge at X and Y. (2 steps)", "answer": "- Step 1: The spacing of field lines indicates the strength of the electric field; closer lines mean a stronger field.\n- Step 2: Since point X has closer field lines, the electric field is stronger there, meaning the positive test charge will experience a greater electrostatic force at X than at Y.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "During the refuelling of an aeroplane, the fuel truck and the plane must be bonded together with a conducting wire before fuel flows. If the truck builds up a negative charge from the fuel friction, what is the purpose of the bonding wire, and which way do electrons flow through it? (2 steps)", "answer": "- Step 1: The bonding wire ensures both the truck and the plane are at the same electrical potential, preventing a voltage difference that could cause a spark between them.\n- Step 2: Since the truck is negatively charged, excess electrons will repel each other and flow through the bonding wire onto the plane (and to Earth if the plane is earthed), safely neutralizing the charge difference without a spark.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}], "count": 25}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When two insulating materials are rubbed together and become electrically charged, which subatomic particle is physically transferred, and why is the other major charged particle unable to move? (2 steps)", "answer": "- Step 1: Electrons are the only subatomic particles that are physically transferred during charging by friction. They are located on the outer shells of atoms and are loosely bound enough to be dislodged by friction.\n- Step 2: Protons are unable to move because they are tightly bound inside the nucleus of the atom. Therefore, an object becoming positively charged is purely due to the *loss* of electrons, not the gain of protons.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Why must the materials involved in charging by friction be insulators rather than conductors for the static charge to remain on the objects? (2 steps)", "answer": "- Step 1: Insulators do not allow electric charge to flow freely through them. When electrons are transferred to a specific spot on an insulator, they stay localized in that area, creating a localized static charge buildup.\n- Step 2: Conductors allow electrons to flow freely. If electrons were transferred to a conductor, they would immediately spread out across the entire object and likely flow to the ground or dissipate, preventing any localized static charge from building up.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "An object gains a net positive charge after being rubbed. Does it now have more protons than it did before? Explain precisely how it became positive. (2 steps)", "answer": "- Step 1: No, it does not have more protons. The number of protons in an object is fixed because they are locked in the nuclei of the atoms and cannot move.\n- Step 2: The object became positive because it *lost* electrons. Since it now has fewer negatively charged electrons than positively charged protons, the overall net charge of the object shifts from neutral to positive.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "A negatively charged plastic rod is brought near a small, neutral piece of paper, and the paper is attracted to the rod. Why does a charged object attract a neutral object? (3 steps)", "answer": "- Step 1: Although the paper is neutral overall, it contains both positive protons and negative electrons, which can shift slightly within their atoms.\n- Step 2: The electric field from the negatively charged rod repels the electrons in the paper and attracts the positive nuclei, causing a slight separation of charge (polarization) within the paper.\n- Step 3: The negative electrons in the paper are pushed slightly away, while the positive charges are pulled slightly closer to the rod. Because the attractive force is stronger at the closer distance, the net force is attractive, pulling the paper to the rod.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "How does a charged object exert a force on another charged object without physically touching it? (2 steps)", "answer": "- Step 1: Any charged object creates an electric field in the space surrounding it. This field is a region of influence.\n- Step 2: When another charge enters this electric field, it interacts with the field and experiences a force. The field acts as the mediator of the force, allowing the charges to interact at a distance without physical contact.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "What physically is a spark, and what condition must the electric field meet for a spark to jump across a gap of air? (2 steps)", "answer": "- Step 1: A spark is a sudden, momentary flow of electrons (a brief current) through an insulator like air. It is not a continuous current, but a rapid discharge.\n- Step 2: For a spark to occur, the electric field between two oppositely charged regions must become strong enough to rip electrons off air molecules, temporarily turning the air from an insulator into a conductor and allowing electrons to flood across the gap.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "A negatively charged object is connected to the Earth with a metal wire. Explain the direction of electron flow and how this neutralizes the object. (2 steps)", "answer": "- Step 1: The negatively charged object has an excess of electrons. Because like charges repel, these excess electrons strongly repel each other.\n- Step 2: When a conducting path to the Earth is provided, the repelled electrons flow down the wire into the Earth (which acts as a vast electron reservoir). This flow continues until the object has no excess electrons and is neutral.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "A positively charged object is earthed. Explain the direction of electron flow and how this neutralizes the object. (2 steps)", "answer": "- Step 1: The positively charged object has a deficit of electrons, meaning it has an overall positive charge that attracts negative charges.\n- Step 2: Electrons are attracted up from the Earth (the vast electron reservoir) through the conducting wire to the object. They flow into the object until the deficit is filled and the object becomes neutral.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "When refuelling an aeroplane, a bonding line (copper wire) must connect the fuel truck, the plane, and the Earth before any fuel flows. What danger does this prevent, and why must the line be made of copper rather than plastic? (3 steps)", "answer": "- Step 1: The danger is that friction between the fast-flowing fuel and the pipes causes a buildup of static charge. If a spark occurs, it could ignite the highly flammable fuel vapour and cause an explosion.\n- Step 2: The bonding line prevents this by earthing the system, allowing any built-up excess charge to flow safely to the ground before it can create a strong enough electric field to spark.\n- Step 3: The line must be copper (a conductor) because electrons must be able to flow freely through it to the Earth. A plastic (insulating) line would block the flow of electrons, defeating the purpose of earthing.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "In a photocopier, an image of the document is projected onto a positively charged copying plate. Why do the light areas of the image lose their positive charge, while the dark areas keep it? (2 steps)", "answer": "- Step 1: The copying plate is made of a photoconductive material, which conducts electricity when exposed to light but acts as an insulator in the dark.\n- Step 2: In the light areas, light hits the plate, making it conductive. The positive charge on these areas is neutralized as electrons flow in. In the dark areas (corresponding to the text), the plate remains an insulator, so the positive charge stays trapped there.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "After the light/dark pattern is formed on the copying plate, negatively charged toner is applied. Why does the toner stick only to the dark (text) areas and not the light areas? (2 steps)", "answer": "- Step 1: Opposite electric charges attract each other.\n- Step 2: The dark areas retained their positive charge, so the negatively charged toner is strongly attracted and sticks to these areas. The light areas lost their charge and became neutral, so there is no electrostatic force to attract the toner.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "An insecticide sprayer gives the droplets an electrostatic charge as they leave the nozzle. How does this charge improve the spray coverage compared to an uncharged spray? (2 steps)", "answer": "- Step 1: Because all the droplets are given the same type of charge (e.g., all negative), they experience a repulsive electrostatic force between each other.\n- Step 2: This mutual repulsion forces the droplets to spread apart as they leave the nozzle, forming a wider, finer mist that covers a much larger and more even area than an uncharged spray, which would clump together.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Besides spreading the mist, how does the electrostatic charge on insecticide droplets ensure they actually hit the target plant rather than drifting away in the wind? (2 steps)", "answer": "- Step 1: The target (plant or ground) is either oppositely charged or induces an opposite charge when the spray approaches.\n- Step 2: Because opposite charges attract, the charged droplets are actively pulled toward the plant by an electrostatic force. This non-contact attraction ensures they deposit quickly onto the target, reducing drift and waste.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "What is the rule for the direction of electric field lines, and what does this direction represent physically? (2 steps)", "answer": "- Step 1: Electric field lines always point away from a positive charge and towards a negative charge. For parallel plates, they point from the positive plate to the negative plate.\n- Step 2: This direction represents the direction of the force that would act on a small positive test charge placed in the field. A positive charge is pushed away from positive and pulled towards negative.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "How does the spacing between electric field lines indicate the strength of the electric field? What is a common misconception about the number of lines versus spacing? (2 steps)", "answer": "- Step 1: Closer spacing between field lines indicates a stronger electric field, while further spacing indicates a weaker field. The concentration of lines represents field strength.\n- Step 2: A common misconception is that simply drawing more lines makes the field stronger. The key is the *spacing* (density) of the lines. Two lines very close together represent a stronger field than ten lines spread very far apart.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "Can two electric field lines ever cross or intersect? Explain the physical reasoning behind this rule. (2 steps)", "answer": "- Step 1: No, electric field lines can never cross.\n- Step 2: The direction of a field line at any point shows the direction of the force on a positive test charge. If two lines crossed, it would imply that a test charge at that exact point would experience two different forces in two different directions simultaneously, which is physically impossible.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Contrast the shape and strength of the electric field around a single point charge with the field between two oppositely charged parallel plates. (3 steps)", "answer": "- Step 1: Around a single point charge, the field is radial. The lines radiate outward (if positive) or inward (if negative) like spokes on a wheel.\n- Step 2: Because the lines spread further apart as they get further from the point charge, the field strength decreases with distance.\n- Step 3: Between two parallel plates, the field is uniform. The lines are straight, parallel, and equally spaced. Because the spacing does not change, the field strength is constant everywhere between the plates.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "How does lightning demonstrate the concept of a field-induced spark, and what acts as the \"gap\" for the spark to jump? (2 steps)", "answer": "- Step 1: As storm clouds move, friction causes a massive buildup of static charge, creating an incredibly strong electric field between the cloud and the ground (or another cloud).\n- Step 2: When this electric field becomes strong enough, it forces electrons to travel through the air—the \"gap\"—turning the air temporarily into a conductor. This giant, momentary discharge of electrons through an insulator is the lightning strike.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "An exam question asks how a polythene rod becomes negatively charged when rubbed with a cloth. A student writes, \"Charge is transferred from the cloth to the rod.\" Why is this answer marked down, and what should they write instead? (2 steps)", "answer": "- Step 1: The phrase \"transfer of charge\" is too vague and does not specify the mechanism. It could incorrectly imply that positive charge moved to the rod.\n- Step 2: To be precise and score full marks, the student must specify that \"electrons are transferred from the cloth to the rod,\" because only electrons are mobile and physically transferred during friction.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Two objects are observed to attract each other. Does this prove that both objects are electrically charged? Explain. (2 steps)", "answer": "- Step 1: No, attraction does not prove both are charged. Attraction occurs between opposite charges, but it also occurs between a charged object and a neutral object (due to polarization/induced charge separation).\n- Step 2: However, if two objects are observed to *repel* each other, they must both be carrying the same type of charge (both positive or both negative). Repulsion is the only true proof that an object is charged.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "If a positively charged rod is brought near a neutral, hanging metal sphere, the sphere is attracted. If the sphere is grounded while the rod is still near, what happens to the sphere's overall charge after the ground wire is removed and the rod is taken away? (3 steps)", "answer": "- Step 1: The positive rod repels positive charges (or attracts electrons) in the neutral sphere, making the near side negative and the far side positive.\n- Step 2: When the sphere is grounded, the repelled positive charges flow to the Earth (or electrons flow from the Earth to the sphere), leaving the sphere with a net negative charge.\n- Step 3: If the ground wire is removed first, the excess negative charge is trapped on the sphere. When the rod is finally taken away, the negative charge redistributes evenly, leaving the sphere permanently negatively charged. This is charging by induction.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "Object X has an excess of 100 electrons, Object Y has a deficit of 50 electrons (compared to neutral), and Object Z is neutral. Which objects will experience an attractive force toward each other? (2 steps)", "answer": "- Step 1: Object X is negatively charged (excess electrons), and Object Y is positively charged (deficit of electrons). Opposite charges attract, so X and Y attract each other.\n- Step 2: Both X and Y are charged, so they will also attract the neutral Object Z due to induced charge separation (polarization). Therefore, X attracts Y and Z; Y attracts X and Z.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "A test charge is placed at Point A, close to a point charge. It is then moved to Point B, which is twice as far from the point charge. How does the electric field strength at Point B compare to Point A? (2 steps)", "answer": "- Step 1: In a radial electric field (like that around a point charge), the field lines spread out as distance increases, meaning the field strength decreases.\n- Step 2: As a qualitative rule, moving further away significantly weakens the field. While the exact inverse-square law $$E \\propto \\frac{1}{r^2}$$ means doubling the distance makes the field 4 times weaker, conceptually you just need to know it becomes substantially weaker, not just half as strong.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "What two conditions must be met for an electric field to exist in a region of space? (2 steps)", "answer": "- Step 1: There must be a charged object present creating the field in that region of space.\n- Step 2: A second charge placed in that region must experience a non-contact electric force. If a charge feels no force, there is no electric field at that point.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "To create a uniform electric field, two parallel metal plates are used. If the top plate is connected to the negative terminal of a power supply and the bottom to the positive, describe the direction of the electric field lines between them. (2 steps)", "answer": "- Step 1: Electric field lines always point away from positive charges and towards negative charges.\n- Step 2: Therefore, the field lines will be straight, parallel lines pointing upwards, from the bottom positive plate to the top negative plate.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "Walking on a nylon carpet with rubber shoes can cause you to get a shock when touching a metal door handle. Why do rubber shoes specifically contribute to the buildup of charge on your body, rather than preventing it? (2 steps)", "answer": "- Step 1: Friction between your shoes and the carpet transfers electrons to your body, giving you a net charge.\n- Step 2: Rubber is an insulator, so it prevents the excess electrons on your body from flowing through your shoes down to the Earth. The charge builds up on your body until you touch the metal conductor (the door handle), at which point the electrons rapidly discharge through your hand, causing a shock.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}], "count": 26}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When two insulating materials are rubbed together, they acquire opposite charges. Explain the subatomic mechanism of this charge transfer, and clarify a common misconception about what physically moves. (3 steps)", "answer": "- Step 1: All matter is made of atoms containing protons (positively charged, locked in the nucleus) and electrons (negatively charged, orbiting the nucleus). In insulating materials, electrons are bound to their atoms but some are held more loosely than others.\n- Step 2: When friction is applied, energy is provided that allows these loosely-bound electrons to be scraped off one material and transferred to the other. The material that gains electrons now has an excess of negative charge, becoming negatively charged.\n- Step 3: The material that loses electrons has a deficit of negative charge, leaving its positive protons uncompensated, so it becomes positively charged. A common misconception is that positive charge moves or that protons are transferred; however, protons are fixed in the nucleus and never move in electrostatics. Only electrons are mobile.\n\nThe fundamental rule of electrostatics: charge transfer is always the transfer of electrons.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "In an exam, explaining static electricity by saying \"charge is transferred\" will lose marks. Why is this phrasing too vague, and what specific terminology must be used instead? (2 steps)", "answer": "- Step 1: The word \"charge\" describes a property of matter (like mass), not a physical substance or particle that can flow on its own. Saying \"charge is transferred\" implies that some nebulous \"charge fluid\" moved, which is scientifically inaccurate.\n- Step 2: Because charge is a property carried by specific particles, you must state exactly what is carrying it. In electrostatic situations, the only mobile particles are electrons. Therefore, to be precise and secure marks, you must always say \"electrons are transferred\" or \"transfer of electrons.\"\n\nPrecision in language reflects precision in physical understanding; always name the particle.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "A negatively charged rod is brought near a small, neutral piece of paper, and the paper is attracted to the rod. Explain how a neutral object can experience an electrostatic force without gaining or losing electrons. (3 steps)", "answer": "- Step 1: A neutral object has equal numbers of positive protons and negative electrons, resulting in a net charge of zero. However, these charges are still present and can be influenced by external electric fields.\n- Step 2: When the negative rod approaches, its electric field repels the electrons in the paper to the far side and attracts the positive nuclei to the near side. This separation of charge within the neutral object is called polarization.\n- Step 3: Because the positive charges are now physically closer to the negative rod than the repelled negative charges, the attractive force ($$F_{attract}$$) is stronger than the repulsive force ($$F_{repel}$$) due to distance (force increases as distance decreases). The net force is attractive.\n\nNeutral objects are attracted to *any* charged object because polarization always places the opposite charges closer to the source.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A cloth rubs a polythene rod, causing the rod to become positively charged. What is the charge on the cloth, and what fundamental principle guarantees this relationship? (2 steps)", "answer": "- Step 1: The rod became positively charged because it lost electrons. Those electrons did not vanish; they were physically transferred to the cloth. Therefore, the cloth gains exactly those electrons and becomes negatively charged.\n- Step 2: This is guaranteed by the conservation of charge. Charge cannot be created or destroyed in an isolated system. The total charge before rubbing (zero, as both were neutral) must equal the total charge after rubbing. If the rod is $$+x$$, the cloth must be $$-x$$ so that $$+x + (-x) = 0$$.\n\nIn any friction charging event, the two materials involved always acquire equal and opposite charges.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "A spark is often described simply as \"electricity jumping,\" but this lacks physical precision. Explain the exact conditions that cause a spark, identifying what particles are moving and through what medium they travel. (3 steps)", "answer": "- Step 1: A spark is a sudden, momentary flow of electrons (a brief current) between two regions of opposite charge. It is not a continuous current, but a rapid discharge.\n- Step 2: Normally, the gap between the charges (such as air) is an insulator, meaning electrons cannot travel through it. However, if the charge build-up is large enough, the electric field in the gap becomes extremely strong.\n- Step 3: This intense field forces electrons to rip through the insulating medium (e.g., air), temporarily making it conductive. The electrons jump the gap to neutralize the charge difference, creating the flash of light and heat we observe as a spark.\n\nA spark is essentially an insulator failing under the stress of a massive electric field, allowing electrons to brute-force their way through.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "Earthing removes excess charge from a charged object. Explain how the Earth acts as a reservoir, and describe the direction of electron flow when earthing a positively charged object versus a negatively charged object. (3 steps)", "answer": "- Step 1: The Earth is an effectively infinite conductor. Because it is so massive, it can accept or donate millions of electrons without its own overall charge changing noticeably. It acts as a vast reservoir of charge.\n- Step 2: When a negatively charged object (excess electrons) is earthed, the mutual repulsion between the excess electrons drives them down the conducting wire into the Earth. Electrons flow from the object to the Earth.\n- Step 3: When a positively charged object (deficit of electrons) is earthed, the object's positive charge attracts electrons from the Earth's vast reservoir. Electrons flow up the wire from the Earth to the object, neutralizing the positive charge.\n\nIn both cases, electrons move to neutralize the object—away from negatives, towards positives.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "During the refuelling of an aeroplane, a bonding line must connect the fuel truck, the plane, and the Earth. Explain the sequence of danger, cause, and prevention, detailing the role of the bonding line. (4 steps)", "answer": "- Step 1: Danger: Aviation fuel is highly flammable. A single spark could ignite the fuel vapour and cause an explosion.\n- Step 2: Cause: As fuel flows rapidly through the pipes, friction between the fuel (a liquid insulator) and the pipe causes electrons to transfer, leading to a massive build-up of static charge on the fuel and the vehicle.\n- Step 3: Prevention: A bonding line (a thick copper conductor) is connected from the truck/plane to the Earth before fuelling begins.\n- Step 4: Resolution: The bonding line provides a low-resistance path for excess electrons to flow safely to the Earth (earthing). Because the charge can continuously drain away, no significant charge builds up, meaning the electric field never becomes strong enough to force a spark through the air.\n\nBonding ensures that the electric potential between the truck, plane, and ground is equalized, eliminating the possibility of a spark jumping across any gap.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A photocopier relies on static electricity to reproduce an image. Explain how the distribution of charge on the copying plate and the charge on the toner work together to transfer the image. (3 steps)", "answer": "- Step 1: The copying plate is given a uniform positive charge. An image of the document is then projected onto the plate. Light hits the \"white\" (non-text) areas, providing energy for electrons to move and neutralize the positive charge there. The dark \"text\" areas remain positively charged because light doesn't hit them.\n- Step 2: Negatively charged black toner powder is rolled over the plate. Because opposite charges attract, the toner sticks exclusively to the remaining positively charged dark areas.\n- Step 3: The toner is then transferred onto a blank piece of paper and heated to melt and fix it in place. The entire process relies on the principle that opposite charges attract to direct the toner precisely where the image exists.\n\nLight acts as the \"eraser\" of charge, while electrostatic attraction acts as the \"glue\" for the toner.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "In electrostatic spray painting, the paint droplets are given a charge, and the car body is given the opposite charge. Explain why both *like charges repelling* and *opposite charges attracting* are necessary for an even, efficient coat. (3 steps)", "answer": "- Step 1: As the paint leaves the nozzle, the droplets are given the same charge (e.g., negative). Because like charges repel, the droplets push away from each other as they travel through the air.\n- Step 2: This repulsion forces the paint to spread out into a fine, even mist rather than clumping into thick, uneven droplets. This ensures a smooth coat.\n- Step 3: The car body is given the opposite charge (e.g., positive). The oppositely charged droplets are strongly attracted to the car, ensuring they hit the metal rather than drifting away. This also causes the mist to wrap around the car, coating edges and the back efficiently.\n\nRepulsion creates the even spread; attraction ensures the paint sticks to the target with minimal waste.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "An electric field is defined as a region where a charge experiences a force. Explain how the direction of the electric field is determined using a \"test charge,\" and specify what sign (positive or negative) this test charge must have by convention. (2 steps)", "answer": "- Step 1: To map the direction of an electric field, we imagine placing a small charge into the field and observing the direction of the force it experiences. This imaginary charge is called the test charge.\n- Step 2: By strict convention, the test charge used to define field direction is always a positive charge. Therefore, the direction of an electric field at any point is the direction of the force that a positive charge would experience at that point. This is why field lines point away from positive sources and towards negative sources.\n\nIf we used a negative test charge, the field lines would point in the opposite direction, causing massive confusion; the positive convention keeps all physics diagrams consistent.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "Electric field lines are a visual model used to represent the field. State the rule regarding whether field lines can cross each other, and explain the physical reasoning behind this rule using the concept of force direction. (2 steps)", "answer": "- Step 1: Electric field lines can never cross each other. If you draw a field diagram, no two lines should ever intersect.\n- Step 2: The reasoning is that a field line represents the direction of the force on a test charge. If two lines crossed at a single point, it would imply that a test charge placed at that exact point would experience two different forces in two different directions simultaneously. Since forces combine into a single resultant force (vector addition), there can only be one resultant direction, and thus only one field line, at any given point in space.\n\nCrossing lines imply a physically impossible scenario: an object accelerating in two different directions at the same time.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "A student draws an electric field diagram and makes the lines longer to show a stronger field. Identify the student's misconception and explain the correct visual representation of field strength. (2 steps)", "answer": "- Step 1: The misconception is that the *length* of the field lines indicates the strength of the field. In reality, field lines are typically drawn extending from the charge to infinity (or to another charge), so their length is arbitrary and does not represent strength.\n- Step 2: The correct visual representation of field strength is the *spacing* (or density) of the lines. Closer spacing (lines packed tightly together) indicates a stronger field where the force on a test charge would be greater. Further spacing (lines spread apart) indicates a weaker field.\n\nThink of it like a topographic map: the concentration of lines shows the \"steepness\" or strength of the field, not how far it stretches.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "Describe the shape and direction of the electric field lines around a single, isolated positive point charge. How does the field strength change as you move away from the charge, and how is this represented visually? (3 steps)", "answer": "- Step 1: The field lines around an isolated positive point charge radiate outward in all directions, forming a spherical (radial) pattern. By convention, the arrows on the lines must point away from the positive charge.\n- Step 2: As you move further away from the point charge, the field strength decreases. This is because the force is spreading out over a larger area.\n- Step 3: Visually, this is represented by the spacing of the lines. Close to the charge, the lines are packed tightly together (strong field). As they radiate outward, they spread further and further apart, visually indicating that the field is weakening with distance.\n\nA radial field is non-uniform because its strength changes with distance, unlike the field between parallel plates.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Describe the electric field pattern produced by two equal but opposite point charges ($$+$$ and $$-$$) placed near each other. Where are the field lines densest, and what does this indicate? (3 steps)", "answer": "- Step 1: The field lines emerge from the positive charge and curve smoothly through space to enter the negative charge. They do not loop back on themselves or go to infinity.\n- Step 2: The field lines are densest (closest together) in the region directly between the two opposite charges.\n- Step 3: This dense spacing indicates that the electric field is strongest in the region between the charges. Here, the fields from both the positive charge (pushing out) and the negative charge (pulling in) act in the same direction, reinforcing each other to create a very strong combined field.\n\nThe field between opposite charges is highly concentrated, which is why parallel plates (which mimic this setup across a flat surface) produce a strong, uniform field.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "Describe the electric field pattern produced by two equal positive point charges placed near each other. Identify the specific point in space between them where the electric field strength is zero, and explain why. (3 steps)", "answer": "- Step 1: The field lines emerge from both positive charges and curve outward, away from each other. No field lines connect the two like charges because they repel.\n- Step 2: In the exact middle between the two charges, there is a region where the field lines diverge and leave a gap. This gap contains a specific \"neutral point.\"\n- Step 3: At this exact center point, the repulsive force from the left charge pushing a test charge to the right is exactly cancelled by the repulsive force from the right charge pushing the test charge to the left. Because the forces are equal and opposite, the net force—and thus the net electric field—is zero.\n\nThis neutral point only exists because like charges repel symmetrically; opposite charges have no such neutral point between them.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "A uniform electric field is produced between two parallel plates. Describe the appearance of the field lines in this setup, and contrast its properties with the radial field around a point charge. (3 steps)", "answer": "- Step 1: The field lines between two oppositely charged parallel plates are straight, parallel, and equally spaced, running directly from the positive plate to the negative plate.\n- Step 2: Because the lines are equally spaced and parallel, the field strength and direction are constant at every point between the plates. This is what makes it a \"uniform\" field.\n- Step 3: This contrasts with the radial field around a point charge, where the lines diverge and the spacing increases with distance, causing the field strength to decrease. A parallel plate field does not weaken as you move from one plate to the other.\n\nUniform fields are ideal for controlled experiments (like deflecting charged particles) because the force on a charge is constant everywhere in the field.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Lightning is an extreme example of a spark. Explain the sequence of events from charge build-up in storm clouds to the lightning strike, explicitly linking the concept of electric field strength to the moment the air breaks down. (3 steps)", "answer": "- Step 1: Inside storm clouds, violent friction between moving ice crystals and water droplets causes a massive transfer of electrons, creating huge regions of positive and negative charge.\n- Step 2: This immense charge separation creates an incredibly strong electric field between the clouds and the ground (or between different clouds).\n- Step 3: Air is normally an insulator, but it has a \"dielectric strength\" (a maximum electric field it can withstand). When the electric field exceeds this limit, the air undergoes dielectric breakdown—it ionizes and becomes a conductor. Electrons forcefully travel through the ionized air to neutralize the charge difference, resulting in the giant spark we call lightning.\n\nLightning is nature's earthing mechanism, acting the moment the electric field overpowers the insulating properties of air.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "A neutral acetate rod is rubbed with a neutral cloth. If the rod loses $$2$$ electrons, what is the resulting charge type on the rod, and what is the charge type on the cloth? (2 steps)", "answer": "- Step 1: The rod was initially neutral (equal protons and electrons). By losing $$2$$ electrons, it now has $$2$$ more protons than electrons. Therefore, the rod becomes positively charged.\n- Step 2: Those $$2$$ electrons did not vanish; they were physically transferred to the cloth. The cloth, which was neutral, now has $$2$$ more electrons than protons, making it negatively charged. The total charge of the system remains zero (conserved).\n\nLosing electrons always results in a positive charge; gaining electrons always results in a negative charge.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "A metal can has gained excess electrons and is negatively charged. It is then earthed using a wire. In which direction do the electrons move through the wire, and why? (2 steps)", "answer": "- Step 1: The metal can is negatively charged, meaning it has an excess of electrons. These excess electrons strongly repel each other and are seeking a way to spread out to a region of lower electric potential.\n- Step 2: When the wire connects the can to the Earth, the repulsion drives the excess electrons down the wire and into the Earth (the vast electron reservoir). The electrons move from the can to the Earth until the can is neutral.\n\nElectrons will always flow from a region of high electron concentration (negative charge) towards a region of lower concentration (Earth) if a conductive path is provided.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "Static charge builds up easily on insulating materials but not on conducting materials (unless they are isolated). Explain this difference based on the mobility of electrons in each type of material. (3 steps)", "answer": "- Step 1: In insulating materials, electrons are tightly bound to their atoms and cannot move freely throughout the material. When friction adds or removes electrons at a specific spot, the charge stays localized there because the electrons cannot flow away to neutralize it. This allows a large static charge to build up.\n- Step 2: In conducting materials, electrons are delocalized (free to move). If friction attempts to add charge to a conductor, the mutual repulsion between the like charges causes the electrons to instantly spread out and distribute themselves across the entire surface of the conductor.\n- Step 3: If the conductor is touching the ground, these mobile electrons will simply flow to or from the Earth, instantly neutralizing the object. Therefore, static charge cannot build up on a conductor unless it is isolated from the ground (e.g., by an insulating stand).\n\nStatic electricity requires a material that \"traps\" electrons in place; conductors let electrons escape, preventing static build-up.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}], "count": 20}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Explain why static electricity only occurs in insulators when rubbed, and why electrons—not protons—are the charge carriers. (3 steps)", "answer": "- Step 1: **Insulators prevent charge flow**: When two insulators are rubbed, electrons transfer between them, but the charges remain localized because insulators do not allow free movement of electrons.  \n- Step 2: **Electrons are mobile**: Protons are bound in atomic nuclei, so only electrons (negative) can move during friction. A material losing electrons becomes positively charged; gaining electrons makes it negative.  \n+ Example: Rubbing a polythene rod with a cloth transfers electrons from the rod to the cloth, leaving the rod positive and the cloth negative.  \n- Step 3: **Conductors neutralize charge**: In conductors, excess charge redistributes across the surface and can flow away, preventing static buildup.  \n\nOne-sentence takeaway: Static electricity requires insulators to trap charges, and electrons are the sole mobile carriers.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": true}, {"question": "How does an object become positively charged, and why is this not due to gaining \"positive charge\"?", "answer": "- Step 1: **Electron loss**: A positive charge arises when an object loses electrons. Since protons are fixed in nuclei, the net positive charge is due to missing electrons.  \n- Step 2: **Charge conservation**: The lost electrons transfer to the other material, ensuring equal and opposite charges.  \n+ Misconception: Protons do not move; \"positive charge\" is a deficit of electrons, not an active gain.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Compare the electric field lines around a positive point charge and a negative point charge. Why do the arrows point in opposite directions? (2 steps)", "answer": "- Step 1: **Direction convention**: Field lines around a positive charge point outward (repulsion if a positive test charge is placed there); for a negative charge, inward (attraction).  \n- Step 2: **Test charge logic**: The direction of the field is defined by the force a positive test charge would experience. A positive charge repels another positive, but attracts a negative.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does lightning occur during a thunderstorm, and how does earthing prevent damage? (3 steps)", "answer": "- Step 1: **Charge separation**: Ice and water particles in clouds collide, transferring electrons (negative) to the cloud base, leaving the top positive.  \n- Step 2: **Strong field creation**: The negative base induces a positive charge on the ground, creating a massive electric field between cloud and ground.  \n- Step 3: **Spark discharge**: When the field exceeds air’s insulating limit, electrons ionize the air, forming a conductive path (lightning bolt). Earthing rods provide a low-resistance path to safely dissipate charge.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": true}, {"question": "In a photocopier, how does static electricity ensure toner sticks only to the text/image areas? (3 steps)", "answer": "- Step 1: **Charging the plate**: A uniform positive charge is applied to the copying plate.  \n- Step 2: **Light discharge**: Light reflected from the document’s light areas discharges the plate, leaving positive charge only on dark (text) areas.  \n- Step 3: **Electrostatic attraction**: Negatively charged toner is attracted to the remaining positive regions, transferring the image to paper.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why are electric field lines closer together near a point charge and farther apart farther away? What does this spacing signify? (2 steps)", "answer": "- Step 1: **Field strength indicator**: Closer lines represent a stronger electric field (higher force per unit charge). For a point charge, field strength decreases with distance ($$E \\propto \\frac{1}{r^2}$$).  \n- Step 2: **Visualizing intensity**: Spacing直观ly shows how the field weakens with distance. Uniform fields (parallel plates) have equal spacing, indicating constant strength.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Contrast \"charging by friction\" and \"charging by induction\" in terms of charge transfer and electron movement.", "answer": "- Step 1: **Friction requires contact**: Two materials are rubbed, physically transferring electrons.  \n- Step 2: **Induction requires proximity**: A charged object near another object redistributes its charges without contact. For example, a negatively charged rod near a neutral conductor repels electrons to the far side.  \n+ Key distinction: Friction causes permanent charge; induction creates temporary polarization.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How does an insecticide sprayer use static electricity to improve efficiency, and what are the safety benefits? (3 steps)", "answer": "- Step 1: **Charging droplets**: Insecticide droplets are given a positive charge as they exit the nozzle.  \n- Step 2: **Repulsion and spread**: Like charges repel, creating a fine, even mist.  \n- Step 3: **Attraction to ground**: Opposite charges on the ground (negative) attract droplets, reducing drift and ensuring coverage.  \n+ Safety: Minimizes chemical waste and prevents ignition risks by avoiding flammable charge buildup.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is a bonding line used during fueling, and how does it prevent sparks? (2 steps)", "answer": "- Step 1: **Charge buildup risk**: Fuel flowing rapidly through pipes generates static due to friction.  \n- Step 2: **Earthing via bonding**: The copper wire connects the fuel tank and delivery system to Earth, allowing excess charge to flow safely to ground instead of sparking.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Explain the direction of electric field lines between two parallel plates with opposite charges. How does this differ from a radial field?", "answer": "- Step 1: **Uniform field direction**: Lines go straight from the positive plate to the negative plate, equally spaced (uniform strength).  \n- Step 2: **Radial vs. uniform**: A radial field (point charge) has lines spreading outward/inward, weakening with distance. Uniform fields maintain constant strength.  \n+ Application: Parallel plates are used in capacitors for consistent electric fields.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why does rubbing an insulator cause it to become charged? Explain the process using electron transfer and material properties. (3 steps)", "answer": "- Step 1: **Only electrons move** during friction. Protons are fixed in atomic nuclei, so charging occurs when electrons are transferred between materials.  \n- Step 2: **Insulators prevent charge flow.** Unlike conductors, insulators (like plastic or rubber) hold onto charges, preventing them from redistributing or escaping.  \n+ Example: Rubbing a polythene rod with cloth strips electrons from the rod, leaving it positively charged.  \n- Step 3: **Charge imbalance results.** One object gains electrons (becomes negative), while the other loses them (becomes positive), with equal magnitudes.  \n+ Contrast: Conductors would immediately neutralize charges via electron flow.  \n\nKey takeaway: Static charging requires *insulators* to trap charges after *electron transfer* via friction.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "If a positively charged rod attracts a nearby neutral object, what physically happens to charges in the neutral object? Draw field lines for this scenario.", "answer": "- Step 1: **Electrons in the neutral object move.** The positive rod repels electrons in the neutral object away from the rod, creating a region of positive charge closer to the rod.  \n+ This is called *induced charge separation*.  \n- Step 2: **Attraction occurs.** The rod’s positive charge attracts the induced negative side of the neutral object more strongly than it repels the opposite positive side (since the induced negative charges are closer).  \n- Step 3: **Field line diagram.**  \n+ Draw radial field lines from the rod toward the neutral object, bending slightly toward the positive rod near the object’s surface.  \n+ Field lines end on induced negative charges (closer to the rod) and originate from the rod.  \n\nKey takeaway: Neutral objects are attracted to charged objects because the closer induced charges create a net attractive force.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "In a photocopier, why is the copying plate positively charged, and how does light neutralize it? Explain the role of charge attraction here. (2 steps)", "answer": "- Step 1: **Positive plate holds toner.** The copying plate is positively charged so that negatively charged toner particles stick to it via electrostatic attraction.  \n+ Light areas on the document reflect light onto the plate, causing photoconductive discharge (neutralizing the positive charge in those regions).  \n- Step 2: **Toner only sticks to dark areas.** The unneutralized positive regions (corresponding to dark/text areas) retain toner, while neutralized regions (light areas) do not.  \n+ This creates a toner image that’s transferred to paper.  \n\nKey takeaway: Charge attraction ensures toner adheres only where needed (dark areas), while light discharges the plate to prevent adhesion where it’s not.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why is a bonding line used during aircraft refueling? Contrast the role of electric fields and sparks in this danger. (2 steps)", "answer": "- Step 1: **Fuel friction builds charge.** As fuel flows through pipes, friction causes electrons to transfer between the fuel and pipe, creating a charge imbalance.  \n- Step 2: **Sparks ignite fuel.** The resulting electric field between the charged fuel and grounded aircraft grows strong enough to ionize air, causing a spark that can ignite fuel vapors.  \n+ Bonding lines (copper wires) connect the aircraft and fuel truck to Earth, allowing electrons to flow between them and neutralize charges.  \n\nKey takeaway: Bonding prevents field buildup by earthing charges before they can create sparks.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "How do electric field lines between two parallel plates differ from those around a point charge? Explain how field strength varies in each case. (3 steps)", "answer": "- Step 1: **Parallel plates create a uniform field.** Field lines are straight, parallel, and equally spaced, showing constant strength and direction (from positive to negative plate).  \n+ Uniform strength means the force on a charge is the same anywhere between plates.  \n- Step 2: **Point charge fields are radial.** Field lines radiate outward (positive) or inward (negative) in all directions, with spacing increasing with distance.  \n+ Field strength decreases with distance (closer lines = stronger field).  \n- Step 3: **Strength comparison.**  \n+ Uniform fields: Strength depends on voltage and plate separation (E = V/d).  \n+ Radial fields: Strength follows inverse-square law (E ∝ 1/r²).  \n\nKey takeaway: Uniform fields (plates) vs. radial fields (point charges) represent contrasting spatial dependencies of electric field strength.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why can sparks jump through air if static charges are large enough? Connect this to electric field strength and insulator breakdown. (2 steps)", "answer": "- Step 1: **Air normally insulates.** Dry air is an insulator because its molecules are neutral, preventing charge flow.  \n- Step 2: **Strong fields ionize air.** A large electric field (from high charge concentration) strips electrons from air molecules, creating ions and free electrons that conduct, forming a spark.  \n+ Example: Lightning occurs when the field between cloud and ground exceeds ~3 million V/m, ionizing air.  \n\nKey takeaway: Sparks happen when the electric field exceeds the *dielectric strength* of the insulator (air), causing sudden conduction.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "If two identical balloons are charged by rubbing with the same cloth, will they attract or repel? Explain the electron transfer and resulting charge interaction. (2 steps)", "answer": "- Step 1: **Same material transfer.** Rubbing identical balloons with the same cloth causes electrons to move in the same direction (e.g., cloth to balloon).  \n+ Both balloons gain electrons, becoming negatively charged.  \n- Step 2: **Like charges repel.** The balloons repel because their identical negative charges create a mutual repulsive electrostatic force.  \n+ Contrast: Different materials (e.g., wool and silk) might lead to opposite charges.  \n\nKey takeaway: Charging by friction between identical materials results in like charges and repulsion.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "Why is earthing effective for neutralizing both positively and negatively charged objects? Describe electron flow in each case. (2 steps)", "answer": "- Step 1: **Earth is an electron reservoir.** The Earth can supply or accept electrons due to its vast size.  \n- Step 2: **Electron flow depends on object’s charge.**  \n+ Positive object: Electrons flow *from Earth to object* to neutralize its excess positive charge.  \n+ Negative object: Electrons flow *from object to Earth* to eliminate excess negative charge.  \n+ This creates a brief current that dissipates the charge safely.  \n\nKey takeaway: Earthing balances charges by allowing electron flow, regardless of initial polarity.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How does an insecticide sprayer use static electricity to reduce waste? Contrast the roles of like and opposite charges in this application. (2 steps)", "answer": "- Step 1: **Droplets repel via like charges.** Charging all droplets the same (e.g., positive) causes them to repel each other, spreading into a fine mist.  \n+ This increases coverage area.  \n- Step 2: **Opposite charges attract droplets to target.** The ground or plants have opposite charges, pulling droplets downward and reducing drift.  \n+ Combined effect: Even coverage with minimal chemical use.  \n\nKey takeaway: Repulsion spreads droplets; attraction ensures deposition on the target.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why do field lines never cross in an electric field diagram? Use force direction and charge behavior to justify. (2 steps)", "answer": "- Step 1: **Field lines show force direction.** At any point, the tangent to the field line indicates the force direction on a positive test charge.  \n- Step 2: **Conflicting forces at crossings.** If lines cross, a charge at that point would experience two different force directions simultaneously, which is physically impossible.  \n+ Example: Between two like charges, field lines curve away, never meeting.  \n\nKey takeaway: Field lines are a visual tool representing the *unique* force direction at each point.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "A negatively charged balloon is brought near a neutral metal sphere (not touching). The sphere gets attracted to the balloon. Explain why this happens using the concept of charge distribution. (3 steps)", "answer": "- Step 1: The negatively charged balloon creates an electric field around itself that exerts forces on charges within it.\n- Step 2: In the neutral metal sphere, the negative balloon repels the free electrons in the metal, pushing them to the far side of the sphere. This leaves the near side with a surplus of positive charge (fewer electrons).\n+ This is called \"induced charge separation\" — no charge is transferred, just redistributed.\n- Step 3: The balloon now has negative charge on its near surface and positive charge (electron deficiency) on its far surface. The near-side positive charges are closer to the balloon's negative charge, so the attractive force outweighs the repulsive force on the far-side electrons. Net result: attraction.\n\n**Takeaway:** Charged objects attract neutral objects by inducing opposite charge on the near side.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Two small plastic balls are both given a negative charge and suspended from threads. If you bring another negatively charged object near them, what happens to the balls? Explain your reasoning. (3 steps)", "answer": "- Step 1: Both balls are negatively charged, so they initially repel each other and hang apart.\n- Step 2: When you bring another negative charge nearby, each ball experiences an additional repulsive force from this new charge. This pushes both balls further away from the external charge.\n+ The direction of the force on each ball is directly away from the external negative charge.\n- Step 3: Since the external charge is the same sign (negative), both balls are repelled. Their separation increases on the side facing the external charge. If the external charge is between them, they may both be pushed in the same direction.\n\n**Takeaway:** Like charges always repel — the presence of additional like charge increases the repulsive forces.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "Draw the electric field pattern around a single positive point charge. What do the arrows indicate, and how would you modify the diagram for a negative point charge? (3 steps)", "answer": "- Step 1: For a positive point charge, field lines radiate *outward* from the charge in all directions, like spokes of a wheel. The arrows on the lines point *away* from the positive charge.\n- Step 2: The field lines should be drawn as straight lines radiating from the centre, with arrowheads pointing outward. They should be equally spaced angularly (e.g., every 45°) to show spherical symmetry.\n- Step 3: For a negative point charge, everything is reversed — the field lines point *inward* toward the charge from all directions. The arrowheads point toward the negative charge, showing the direction of force on a positive test charge.\n\n**Takeaway:** Field lines always point in the direction of force on a positive test charge — away from positive, toward negative.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Explain why the electric field strength gets weaker as you move away from a charged object. What does this tell you about the spacing of field lines at different distances? (3 steps)", "answer": "- Step 1: A charged object creates an electric field that extends outward in all directions. The strength of this field represents the force per unit charge that would be experienced by a test charge placed in the field.\n- Step 2: As you move further away from the source charge, the same amount of \"field influence\" is spread over a larger surface area (like the surface area of an expanding sphere, which increases with r²). Therefore, the field strength decreases with the square of the distance.\n+ This follows the inverse square law: field strength ∝ 1/r² for a point charge.\n- Step 3: In field line diagrams, this is represented by spacing the lines further apart as you move away from the charge. Closer lines = stronger field; wider spacing = weaker field. The number of lines stays the same, but their density decreases.\n\n**Takeaway:** Field line spacing visually represents field strength — more concentrated lines mean stronger force on charges.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": true}, {"question": "A student draws electric field lines between two parallel plates, with the left plate marked positive and the right plate marked negative. Describe what the correct field pattern should look like, including the direction of the arrows. (3 steps)", "answer": "- Step 1: Between two oppositely charged parallel plates, the electric field is *uniform* — it has the same strength and direction at every point in the region between the plates.\n- Step 2: The field lines should be drawn as straight, parallel lines running from the positive plate to the negative plate. Use a ruler to ensure they're straight. The arrows must point from the positive plate toward the negative plate.\n- Step 3: The lines should be equally spaced throughout to show that the field strength is constant everywhere in this region. This uniform field is different from the radial field around a point charge.\n\n**Takeaway:** Uniform fields between parallel plates are represented by equally-spaced parallel lines with arrows from + to −.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "Two opposite point charges (+Q and −Q) are placed a short distance apart. Sketch the electric field pattern between them and explain why the field lines curve rather than go straight from one charge to the other. (3 steps)", "answer": "- Step 1: Field lines connect from the positive charge to the negative charge, but they curve outward because each charge creates its own radial field, and the combined (superposed) field is the vector sum of both fields.\n- Step 2: At any point between the charges, the force on a positive test charge would be the sum of: (a) the repulsive push away from the positive charge, and (b) the attractive pull toward the negative charge. These two forces aren't opposite in direction except exactly on the centre line, so the resultant force (and thus field direction) curves.\n+ The lines are most densely packed in the region directly between the charges, where the field is strongest.\n- Step 3: The field lines never cross (that would imply two different field directions at one point). They start at the positive charge and end at the negative charge, curving outward in the middle region.\n\n**Takeaway:** Curved field lines between opposite charges result from vector addition of the individual radial fields.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": true}, {"question": "Two small spheres carry the same type of charge (both positive). Draw the electric field pattern and explain why there's a \"neutral point\" between them where a test charge would feel no net force. (3 steps)", "answer": "- Step 1: With two like charges (both positive), the field lines from each charge point away from both charges. The lines push outward and diverge — there is no connection between the two positive charges.\n- Step 2: At a specific point exactly between the two positive charges, the repulsive force from the left charge exactly balances the repulsive force from the right charge (if the charges are equal). This is the neutral point (also called the null point).\n+ The forces are equal in magnitude (because distance is equal) and opposite in direction, so they cancel.\n- Step 3: For equal charges, the neutral point lies on the line joining them, at the midpoint. For unequal charges, it lies closer to the smaller charge. Outside this region, one force dominates and there's a net force.\n\n**Takeaway:** Neutral points occur where equal and opposite forces cancel — they exist between like charges and outside opposite charges.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "A photocopier uses static electricity to reproduce documents. Explain the step-by-step process, focusing on how charges attract toner particles to the correct areas. (4 steps)", "answer": "- Step 1: A photoconductive drum is given a uniform positive charge in the dark. This charge will remain on areas not exposed to light.\n- Step 2: Light is projected onto the drum. In bright areas (white paper), the light causes the drum to conduct, allowing positive charge to leak away to Earth. In dark areas (text/images), the light is blocked, so positive charge remains on the drum.\n+ This creates a hidden \"charge image\" matching the original document.\n- Step 3: Negatively charged toner particles are sprayed onto the drum. They are attracted only to the areas that still have positive charge (the dark/text regions), because opposite charges attract.\n- Step 4: A positively charged paper is pressed against the drum. The toner transfers to the paper (attracted to the paper's positive charge), then is heated to melt and fix the toner permanently.\n\n**Takeaway:** Photocopiers work by creating a charge pattern that selectively attracts toner — static electricity does the \"writing.\"", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": true}, {"question": "An insecticide sprayer gives the spray droplets a positive charge. Explain why this makes the spray more effective: (a) why the droplets spread out to cover a large area, and (b) why they are attracted to the plants. (3 steps)", "answer": "- Step 1: As the droplets leave the nozzle, they become similarly charged (all positive, for example). Like charges repel each other, so the droplets push apart from one another, forming a fine mist rather than a concentrated stream.\n+ This is the \"like charges repel\" principle — the repulsion spreads the spray.\n- Step 2: The plants and ground are neutral or may have induced negative charges on their surfaces (from the electric field of the positive droplets). Opposite charges attract, so the positive droplets are drawn toward the plants.\n- Step 3: This electrostatic attraction means the droplets don't drift away in the wind as easily — they're pulled toward their target. Less pesticide is wasted, and coverage is more even. The same principle is used in car spray painting.\n\n**Takeaway:** Electrostatic sprayers use repulsion to create fine mist and attraction to direct droplets to targets.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Why is there a danger of explosion when refuelling aircraft, and what safety measure prevents this danger? Explain the role of electrons in this process. (3 steps)", "answer": "- Step 1: As fuel flows through the insulated fuel pipes, friction between the fuel and the pipe walls causes electrons to be transferred, building up charge on the fuel and the pipe. Since fuel is an insulator, this charge cannot flow away.\n- Step 2: If enough charge builds up, the electric field becomes strong enough to cause a spark through the air. Fuel vapours are highly flammable — the spark can ignite them, causing an explosion.\n+ This is the same principle as static shocks from walking on carpets, but on a much larger scale.\n- Step 3: A bonding line (copper wire) connects the aircraft (or vehicle) to Earth before refuelling. This provides a path for electrons to flow safely to or from the Earth, preventing charge accumulation. The Earth acts as a vast reservoir — it can accept or supply electrons without becoming significantly charged.\n\n**Takeaway:** Earthing (bonding) prevents dangerous charge build-up by providing a path for electrons to flow to the Earth.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "A person touches a metal door handle after walking on a nylon carpet and feels a shock. Explain what happens in terms of electron flow and why this is called a \"spark.\" (3 steps)", "answer": "- Step 1: Walking on the carpet transfers electrons from the carpet to the person (or vice versa, depending on the materials). The person's body becomes charged, building up excess electrons.\n- Step 2: These excess electrons create an electric field around the person's body. When they approach the metal door handle (a conductor), the electric field becomes strong enough to push electrons through the air gap — this is the spark.\n+ A spark is a momentary current — electrons flowing briefly through an insulator (air) that has become ionised by the strong electric field.\n- Step 3: The electrons jump across the air gap to reach the positively charged handle (or to distribute into the larger Earth-connected metal object). This sudden flow of electrons is the shock you feel. Once the charge is equalised, no more current flows.\n\n**Takeaway:** A spark is a brief current — charge flowing momentarily through an insulator when the field is strong enough.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Lightning is a giant spark. Explain how charge builds up in storm clouds and why the spark chooses to go from cloud to ground (rather than just staying in the cloud). (3 steps)", "answer": "- Step 1: Inside storm clouds, ice crystals and water droplets collide and rub together. This charging by friction transfers electrons between particles — some become positively charged, others negatively charged.\n- Step 2: The positive charges (lighter) tend to rise to the top of the cloud, while negative charges (heavier) sink to the bottom. This separation creates a huge charge build-up, with the bottom of the cloud becoming heavily negatively charged.\n- Step 3: This negative charge induces a positive charge on the ground below (charge separation in the Earth). The electric field between cloud and ground becomes enormous. Eventually, the field strength exceeds the insulating strength of air, and electrons rush downward in a giant spark — lightning. The spark travels toward the region of opposite charge (the ground), where the field is strongest.\n\n**Takeaway:** Lightning is charge separation in clouds followed by a massive spark when the field exceeds air's breakdown strength.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Earthing a charged object removes the danger of sparks. Explain what happens to the excess electrons when you connect a negatively charged object to Earth with a wire. Which direction do the electrons flow? (3 steps)", "answer": "- Step 1: A negatively charged object has excess electrons on its surface. These electrons repel each other, wanting to get as far apart as possible.\n- Step 2: When you connect a conducting wire from the object to Earth, the electrons now have a pathway to the Earth, which is a massive reservoir of electrons. Because like charges repel, the excess electrons are pushed *down the wire* into the Earth.\n+ The Earth is so large that adding or removing electrons doesn't change its charge significantly — it acts as an infinite sink/source.\n- Step 3: For a positively charged object, the opposite happens — electrons are *attracted up* from the Earth onto the object, neutralizing the positive charge. In both cases, earthing removes the charge imbalance, eliminating the electric field and preventing sparks.\n\n**Takeaway:** Earthing allows charge to flow to/from the Earth — electrons leave negative objects and enter positive objects.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "What is the key difference between \"charging by friction\" and \"charging by induction\"? In induction, no contact is required — explain how a charged object can still cause another object to become charged without touching it. (3 steps)", "answer": "- Step 1: Charging by friction involves rubbing two insulators together so that electrons physically transfer from one material to the other. The materials must be in direct contact for electron transfer to occur.\n- Step 2: Charging by induction brings a charged object near (but not touching) a conductor. The charged object exerts forces on the free electrons in the conductor, pushing them to one side. This creates charge separation within the conductor.\n- Step 3: If the conductor is then connected to Earth while the charged object is still nearby, electrons can flow to/from Earth. When the external charge and the Earth connection are removed, the conductor is left with a net charge of the opposite sign to the original — but no electrons were transferred directly between the objects.\n\n**Takeaway:** Induction charges a conductor indirectly through charge redistribution and Earth connection, not direct electron transfer.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "Why can't static electricity be \"held\" on a conductor? What would happen if you tried to charge a metal rod by rubbing it? (2 steps)", "answer": "- Step 1: In a metal (conductor), electrons are free to move throughout the material. When you rub a metal rod, any electrons transferred to or from it will immediately flow through the rod and away through your hand (which is also connected to your body and ultimately to Earth through the floor).\n+ The charge cannot accumulate because it keeps flowing away through the conducting path to Earth.\n- Step 2: This is why we use insulating materials (plastic, glass, polythene) for static electricity experiments — insulators trap electrons in place because electrons cannot flow through them. The charge stays where you put it.\n\n**Takeaway:** Conductors can't hold static charge because electrons flow freely to Earth; insulators trap charge.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A student says, \"Static electricity is when electrons build up and flow around a circuit.\" Identify two misconceptions in this statement and explain the correct idea. (2 steps)", "answer": "- Step 1: Misconception 1 — \"electrons build up\": In static electricity, charge *does* build up (accumulate) on insulating surfaces. The term \"static\" means the charge stays still — it doesn't flow. In current electricity, charges flow continuously.\n+ The key distinction is: static = charge at rest; current = charge in motion.\n- Step 2: Misconception 2 — \"flow around a circuit\": Static charge doesn't
