 flow in a circuit. It accumulates, stays in place, and may discharge suddenly as a spark. There's no continuous loop like in circuit electricity. The electrons don't \"go around\" — they either stay stuck on the insulator or jump across a gap in a brief spark.\n\n**Takeaway:** Static electricity is stationary charge buildup, not flowing current. \"Static\" literally means \"not moving.\"", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": true}, {"question": "When drawing electric field lines, why must they never cross? What would it physically mean if two field lines crossed at a point? (2 steps)", "answer": "- Step 1: Electric field lines represent the direction of the electric force on a positive test charge at any point. At any location in space, the electric field has one specific direction — the net force direction on a positive test charge.\n- Step 2: If two field lines crossed, it would imply that at that same point, a test charge could be pushed in two different directions simultaneously — which is physically impossible. The field has a unique direction at each point.\n+ This is similar to how contour lines on a map never cross — each point has one elevation.\n\n**Takeaway:** Field lines never cross because the electric field has a single, unique direction at every point in space.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "You have two parallel metal plates connected to a high-voltage power supply. One plate is positive, the other negative. A tiny positively charged particle is placed in the field between them. Describe the motion of this particle. (3 steps)", "answer": "- Step 1: In a uniform electric field between parallel plates, the field lines are straight, parallel, and point from the positive plate to the negative plate.\n- Step 2: Since the particle is positive, it experiences a force in the *same direction* as the field lines — from the positive plate toward the negative plate. The force is constant (same strength at all points) because the field is uniform.\n+ This is different from gravitational force (constant downward) — but the principle is similar: constant force = constant acceleration.\n- Step 3: The particle will accelerate in a straight line toward the negative plate. It will keep accelerating (speed increasing) until it hits the negative plate or is removed from the field.\n\n**A positive charge moves *with* the field lines; a negative charge moves *against* them.**", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": true}, {"question": "Explain why it's safer to touch a metal wall (rather than a door handle) first when getting out of a car on a dry day to avoid a static shock. (2 steps)", "answer": "- Step 1: When you get out of a car, your body may have accumulated static charge from sliding across the seat. Touching a small pointed object (like a door handle) creates a small gap for charge to jump through — you feel a shock.\n- Step 2: Touching a large metal surface like a wall provides a broader path to Earth. The charge can flow off more gradually through the larger contact area, rather than concentrating at a small point where a spark jumps. The larger contact area reduces the charge density and the intensity of the spark.\n\n**Takeaway:** Larger contact area allows gradual discharge; pointed objects concentrate charge and cause sharper sparks.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": true}, {"question": "In an inkjet printer, how do electric charges help position the ink droplets precisely on the paper? Explain the principle involved. (2 steps)", "answer": "- Step 1: Ink droplets are given a specific electric charge as they are ejected from tiny nozzles. The droplets pass through electric plates that can be switched on and off rapidly.\n- Step 2: By varying the charge on the plates, the printer can deflect the charged ink droplets (using electrostatic forces) so that each droplet lands at exactly the right position on the paper. Droplets with different charges are deflected different amounts.\n+ This is the same principle as in old TV cathode-ray tubes, where electrons were deflected by electric plates.\n\n**Takeaway:** Charged ink droplets are precisely directed by varying electric fields — control of charge = control of motion.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": true}, {"question": "A negatively charged rod is brought close to (but not touching) an insulated metal sphere. The sphere is then earthed (touched with a finger) while the rod is still nearby. Finally, the rod is removed. What charge does the sphere end up with? Explain the process. (3 steps)", "answer": "- Step 1: The negative rod repels electrons in the metal sphere, pushing them to the far side (away from the rod). This leaves the near side of the sphere with a positive charge (electron deficiency).\n- Step 2: While the rod is still there (keeping electrons pushed away), you touch the far side of the sphere with your finger (earthing). Electrons flow from the sphere down to Earth through your body. The positive charge on the near side remains — it's held there by the rod's presence.\n+ Think of it as \"trapping\" the positive charge by temporarily grounding while the repulsion keeps the electrons away.\n- Step 3: When you remove your finger (breaking the Earth connection) and then remove the rod, the positive charge has no electrons to attract it back — it's now stuck on the sphere. The sphere ends up with a *positive* charge, even though you never touched it with a charged object!\n\n**Takeaway:** Charging by induction can create charge without direct contact — use a charged object to separate, then ground to trap the opposite charge.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "What is the relationship between electric field strength and the distance from a point charge? If you triple the distance from a charged sphere, what happens to the field strength? (2 steps)", "answer": "- Step 1: The electric field strength around a point charge follows an inverse square law: $$E \\propto \\frac{1}{r^2}$$. This means field strength decreases with the square of the distance.\n- Step 2: If you triple the distance (r → 3r), the field strength decreases by a factor of 3² = 9. The field strength becomes 1/9 of its original value. The field spreads out over a larger spherical surface area (which increases with r²), so the field \"thins out.\"\n\n**Takeaway:** Field strength follows inverse square law — doubling distance quarters the field; tripling distance makes it 1/9.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": true}, {"question": "In some factories, explosive powders are handled with great care to avoid static sparks. Why is the danger particularly high with powders compared to solid objects? (2 steps)", "answer": "- Step 1: Powders have an enormous surface area compared to the same mass of solid material. This means there's much more surface available for friction to transfer electrons.\n- Step 2: Each tiny particle can become charged, and these charges can accumulate across many particles. When the powder becomes airborne (as a dust cloud), the charged particles are suspended throughout the air. A single spark can ignite the entire cloud at once — like a fuel-air explosive.\n+ This is why flour mills have explosion risks and must use earthing and antistatic precautions.\n\n**Takeaway:** High surface area of powders makes them charge more easily and disperses charge throughout a volume — explosive risk.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "Why do electric field lines from a positive charge go outward in all directions equally, rather than just in one direction? What does this tell us about the nature of the charge distribution? (2 steps)", "answer": "- Step 1: A point charge is an idealisation where all charge is concentrated at a single point. From this single point, there's no reason to prefer any direction over another — the field extends equally in all directions (spherical symmetry).\n- Step 2: This tells us the charge is radially symmetric. The field strength depends only on distance from the charge, not direction. If you draw a sphere around the charge, the same number of field lines pass through every point on that sphere — the field \"spreads out\" uniformly.\n\n**Takeaway:** Radial field symmetry around a point charge means field strength depends only on distance, not direction.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": true}, {"question": "A car being refuelled is connected to Earth with a copper wire (bonding line). Explain why this wire must be a conductor (not an insulator) to be effective. (2 steps)", "answer": "- Step 1: The purpose of the bonding line is to provide a *path* for electrons to flow between the car and the Earth. If charge builds up on the car, electrons need to flow away to Earth to prevent the electric field from building up.\n- Step 2: An insulator would block this electron flow — charge couldn't move through it. By connecting with a conductor (like copper), electrons can flow freely along the wire whenever there's a charge imbalance, safely neutralising the car. The wire must conduct for earthing to work.\n\n**Takeaway:** Earthing requires a conducting path — insulators trap charge; conductors allow it to flow to Earth.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In the uniform field between two parallel plates, what does the uniform spacing of field lines tell you about the force experienced by a charge at any point in the field? (2 steps)", "answer": "- Step 1: Uniform spacing means the electric field has the same strength at every point between the plates. There's no \"stronger\" or \"weaker\" region.\n- Step 2: Therefore, any charge placed in this field experiences a constant force regardless of where it is (as long as it's between the plates). The force doesn't change with position — unlike the radial field around a point charge where force changes with distance.\n+ This is why parallel plates create a \"uniform\" field — the field strength is constant.\n\n**Takeaway:** Uniform field line spacing means constant force on any charge at any point in the field.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": true}, {"question": "A student draws electric field lines for two opposite charges but forgets to add arrowheads. Why is this a serious error, and what do the arrows specifically indicate? (2 steps)", "answer": "- Step 1: Without arrowheads, you can't tell which direction the force would push a positive test charge. The arrowheads are essential — they show the *direction* of the electric field (and thus the force on a positive charge).\n- Step 2: Field lines must always point away from positive charges and toward negative charges. This follows from the definition: the field direction is the direction of force on a positive test charge. Without arrows, you lose this crucial information about attraction vs. repulsion.\n\n**Takeaway:** Arrowheads show force direction on positive charges — away from positive, toward negative. Missing arrows = incomplete information.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "Why is the danger from static electricity greater on dry days than on humid days? (2 steps)", "answer": "- Step 1: Dry air is a good insulator — it doesn't conduct electricity well. This means charge can accumulate on objects and build up to very high levels without any way to leak away gradually.\n- Step 2: On humid days, water vapour in the air can conduct a tiny bit of charge, allowing charge to slowly leak away to the atmosphere. This prevents large charge build-ups. Dry air removes this gradual discharge pathway, so when discharge finally happens (as a spark), it's more dramatic and dangerous.\n\n**Takeaway:** Humid air provides a slight conducting path for gradual charge leakage; dry air insulates and allows dangerous buildup.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": true}, {"question": "You're an engineer designing a lightning rod for a building. Where should the rod be placed and what should it do when a charged cloud passes overhead? Explain the physics. (3 steps)", "answer": "- Step 1: Lightning rods are placed at the highest points of buildings. They have a sharp metal point that extends into the air.\n- Step 2: The sharp point creates a very strong electric field at its tip because charge accumulates at pointed ends (charge density is highest at sharp curvature). This strong field ionises the air around the tip, creating a conductive path.\n- Step 3: When a charged cloud passes overhead, the induced opposite charge on the rod's tip can gradually leak away through this ionised path, preventing the huge charge buildup that would cause a destructive lightning strike. If lightning does strike, the rod provides a safe path for the massive current to flow directly into the ground, protecting the building.\n\n**Takeaway:** Sharp points create strong fields that can quietly discharge charge, preventing sparks, or provide a safe path if lightning strikes.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": true}], "count": 29}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "During charging by friction between two insulating materials, which particle actually moves, and why can't the other charged particle move? (2 steps)", "answer": "- Step 1: Electrons (negative) are the particles that physically transfer from one material to the other during charging by friction.\n- Step 2: Protons do NOT move because they are fixed in the atomic nucleus — only electrons have the freedom to move between atoms and between materials. This is why an object becomes positively charged by losing electrons, not by \"gaining positive charge.\"\n\n**Misconception alert:** Positive charge does not move — it results from electron loss only.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A polythene rod rubbed with a cloth becomes positively charged. Explain exactly what happens at the atomic level to make it positive. (2 steps)", "answer": "- Step 1: When the polythene rod is rubbed against the cloth, electrons transfer from the rod to the cloth (the exact direction depends on the materials' electron affinity).\n- Step 2: The rod loses electrons — since electrons carry negative charge, losing them leaves an excess of protons (positive charge) in the rod. The cloth gains those electrons and becomes negatively charged.\n\n**Important:** The charge magnitudes are always equal and opposite (conservation of charge).", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Why is static electricity considered a \"non-contact force\"? Give an example to illustrate this. (2 steps)", "answer": "- Step 1: A non-contact force is a force that acts on an object without physical contact between the objects involved.\n- Step 2: Electrostatic attraction and repulsion are non-contact because a charged object creates an electric field around itself, and any other charge entering that field experiences a force — even across empty space. For example, a negatively charged balloon can attract neutral paper pieces without touching them, because the balloon's electric field polarizes the paper's charges.\n\n**Contrast:** This is NOT like friction or normal contact forces, which require physical touch.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "State the fundamental rule for how two charged objects interact. What happens when the charges are alike versus opposite? (2 steps)", "answer": "- Step 1: Opposite charges attract each other; like charges repel each other.\n- Step 2: This is the electrostatic force — it is strongest when the distance between charges is small, and it acts at a distance through the electric field without the objects needing to touch.\n\n**Remember:** The force direction depends on whether you're dealing with attraction (pulling together) or repulsion (pushing apart).", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A negatively charged object is brought near a neutral insulating object. Explain why attraction occurs even though the neutral object has no net charge. (2 steps)", "answer": "- Step 1: The neutral object contains both positive and negative charges (protons and electrons) in equal numbers.\n- Step 2: When a charged object is brought near, it polarizes the neutral object — it attracts the opposite charges in the neutral object to the near surface while repelling the like charges to the far surface. This separation of charge creates induced charges that are closer to the source, so the attractive force outweighs the repulsive force, resulting in net attraction.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "What is earthing (also called grounding), and how does it remove dangerous static charge from a charged object? (2 steps)", "answer": "- Step 1: Earthing is the process of connecting a charged object to Earth using a conductor (like a wire), allowing excess charge to flow safely away.\n- Step 2: Earth acts as a giant reservoir of electrons. If the object is positively charged, it attracts electrons up from Earth through the wire, neutralizing the object. If the object is negatively charged, it repels electrons down into Earth. This prevents the electric field from building up to dangerous levels that could cause a spark.\n\n**Key point:** A conductor (not an insulator) is used precisely so charge can flow to/from Earth.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Why does touching a metal door handle after walking on a nylon carpet sometimes give you a shock? Explain the sequence of events. (3 steps)", "answer": "- Step 1: Walking on nylon carpet with rubber soles causes friction between your shoes and the carpet, transferring electrons to your body (or from it, depending on the materials).\n- Step 2: These electrons cannot flow away through your insulating shoes, so charge builds up on your body, creating an electric field around you.\n- Step 3: When you touch the metal door handle (a conductor), the built-up charge jumps through the small air gap as a spark — a momentary current — to reach the opposite charge on the handle, causing a shock. The spark is the discharge of static electricity through air (an insulator).", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": true}, {"question": "Explain why a bonding line (copper wire) is connected from a fuel tanker to an aircraft during refuelling. What danger does this prevent, and how does it work? (3 steps)", "answer": "- Step 1: As fuel flows through the pipes at high speed, friction between the fuel (an insulator) and the pipe walls causes charge to build up on the fuel and the vehicle/aircraft.\n- Step 2: If the accumulated charge becomes large enough, it could spark across the gap to the aircraft, igniting the highly flammable fuel and causing an explosion.\n- Step 3: The bonding line connects the aircraft to Earth, acting as an earthing wire. This allows any excess charge to flow safely to Earth, preventing dangerous charge build-up and eliminating the spark risk.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "What is an electric field, and how do we define its direction? (2 steps)", "answer": "- Step 1: An electric field is a region around a charged object where another electric charge experiences a force.\n- Step 2: The direction of an electric field is defined as the direction of the force that would act on a positive test charge placed in the field. This means field lines point away from positive charges and toward negative charges.\n\n**Note:** This is similar to how magnetic fields are defined, but electric fields act on electric charges, not magnets.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "For a single positive point charge, how do the electric field lines appear, and what do they indicate about field strength? (2 steps)", "answer": "- Step 1: Electric field lines radiate outward from a positive point charge in all directions, pointing away from the charge (like spikes on a spherical star).\n- Step 2: The field is strongest near the charge (where lines are dense) and weakens with distance (where lines spread out). Field strength decreases as you move farther from the charge because the lines become more spaced apart.\n\n**Remember:** Always draw arrows pointing AWAY from positive charges.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "For a single negative point charge, how do the electric field lines appear, and what do they indicate about field strength? (2 steps)", "answer": "- Step 1: Electric field lines radiate inward toward a negative point charge from all directions, pointing toward the charge (like arrows all aiming at a center point).\n- Step 2: The field is strongest near the charge (lines are dense close to it) and weakens with distance (lines spread out farther away). This is because field strength follows the same inverse-square relationship as gravitational and magnetic fields.\n\n**Remember:** Always draw arrows pointING TOWARD negative charges.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Draw and describe the electric field pattern between two opposite point charges (one positive, one negative). What happens to field line density? (2 steps)", "answer": "- Step 1: Field lines curve from the positive charge toward the negative charge, connecting them. The lines are densest in the region directly between the two charges, showing the strongest field there.\n- Step 2: The curved pattern shows attraction — lines go FROM positive TO negative. The density of lines between the charges indicates the field is strongest in this region, and the lines never cross each other.\n\n**Key rule:** Field lines always go from + to − for opposite charges.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Draw and describe the electric field pattern between two like charges (both positive or both negative). What is the \"neutral point\"? (2 steps)", "answer": "- Step 1: For two like charges, field lines curve outward away from each charge, pushing away from each other. There is a region between the charges where no field lines exist.\n- Step 2: This region is called the neutral point (or null point), where the forces from the two like charges cancel out exactly. No field lines pass through this point because the repulsive forces balance.\n\n**Important:** Like charges always repel — field lines diverge outward.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "What is a uniform electric field, and how is it represented with field lines? Give an example of how such a field is created. (2 steps)", "answer": "- Step 1: A uniform electric field has the same strength and direction at every point within it. It is represented by equally-spaced parallel straight field lines with arrows pointing from the positive side to the negative side.\n- Step 2: This type of field is created between two parallel conducting plates that are oppositely charged. As long as the plates are large compared to the gap between them, the field in the middle region is uniform — same strength everywhere.\n\n**Visual clue:** Equal spacing = constant field strength.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": true}, {"question": "How can you determine the relative strength of an electric field by looking at a field line diagram? What is the common mistake students make? (2 steps)", "answer": "- Step 1: In field line diagrams, CLOSER together the lines are, the STRONGER the field. FURTHER apart lines are, the WEAKER the field.\n- Step 2: A common mistake is thinking that more lines means stronger field everywhere — but it's the spacing (concentration) that matters, not the total number of lines. Even a diagram with few lines can show a strong field if those lines are very close together.\n\n**Key insight:** Field strength is shown by line density, not line length or count.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": true}, {"question": "How does a photocopier use static electricity to produce copies of documents? Explain the step-by-step process. (4 steps)", "answer": "- Step 1: A photoconductive drum is given a uniform positive charge in the dark.\n- Step 2: An image of the original document is projected onto the drum. In light areas, the drum loses its charge (becomes conductive when light hits it); in dark areas (text), the charge remains.\n- Step 3: Negatively charged toner particles are attracted to the remaining positive charges on the drum — they stick only to the charged (dark) areas.\n- Step 4: A sheet of paper is pressed against the drum, transferring the toner to the paper. The paper then passes through heated rollers that melt and fix the toner, creating a permanent copy.\n\n**Core principle:** Opposite charges attract — toner sticks only to charged regions.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Explain how an insecticide sprayer uses static electricity to improve spray coverage and deposition. What two electrostatic effects are utilized? (3 steps)", "answer": "- Step 1: As the insecticide droplets leave the nozzle, they are given an electrostatic charge (e.g., all positive).\n- Step 2: First effect — LIKE CHARGES REPEL: The similarly charged droplets repel each other, breaking up into a fine mist that spreads out and covers a much larger area than ordinary spraying.\n- Step 3: Second effect — OPPOSITE CHARGES ATTRACT: The droplets are attracted to opposite charges on the plants and ground below, so they are pulled downward rather than drifting in the wind. This means less chemical waste and better target coverage.\n\n**Note:** The same principle is used in spray painting cars.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": true}, {"question": "Lightning is described as a \"giant spark.\" Explain how charge builds up in storm clouds and what causes the lightning strike. (3 steps)", "answer": "- Step 1: Inside storm clouds, movement of water droplets and ice crystals against each other causes electrons to be transferred between different parts of the cloud, building up regions of positive and negative charge.\n- Step 2: This creates a huge electric field between the cloud and the ground (or between different parts of the cloud).\n- Step 3: When the electric field becomes strong enough to overcome air's insulating properties, electrons force their way through the air in a massive discharge — a giant spark we see as lightning. The air is temporarily ionized, becoming a conductor along the lightning path.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Why can't protons be transferred during charging by friction? What would need to be true for protons to move? (2 steps)", "answer": "- Step 1: Protons are bound tightly in the atomic nucleus and are not free to move between atoms or between materials under normal conditions.\n- Step 2: For protons to move, you'd need to break apart the nuclei (nuclear reactions), which requires enormous energy far beyond what's involved in rubbing materials together. Electrons, being on the outer edges of atoms, are the only particles that can be transferred by simple friction.\n\n**Fundamental point:** Only electrons transfer in electrostatic charging — this is why negative charge \"moves\" but positive charge is really just the absence of electrons.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "In the context of electric fields, what is a \"point charge\" and why is it a useful idealization? (2 steps)", "answer": "- Step 1: A point charge is a charge imagined to be concentrated at a single mathematical point, with no physical size.\n- Step 2: It's a useful idealization because the electric field pattern around a small charged sphere is identical to that around a true point charge of the same charge. This simplifies field diagrams significantly — the field radiates spherically outward (positive) or inward (negative) from the point, making it easy to draw and understand.\n\n**Real-world note:** No real object is truly a point, but small charged spheres behave like point charges.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": true}, {"question": "Compare the electric field around a point charge with the uniform field between parallel plates. What are the key differences in field strength and direction? (2 steps)", "answer": "- Step 1: Around a point charge, the field strength decreases with distance from the charge (following an inverse-square relationship), and the direction is radial (pointing straight toward or away from the charge).\n- Step 2: Between parallel plates, the field is uniform — same strength and same direction at every point. Field lines are parallel and equally spaced, showing that the force on a charge would be identical anywhere in the field.\n\n**Key contrast:** Radial (varying) vs. uniform (constant).", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "A student says, \"Static electricity is caused by transferring positive charge from one object to another.\" Explain why this statement is incorrect and what the correct explanation is. (2 steps)", "answer": "- Step 1: This statement is incorrect because positive charge cannot move — protons are fixed in the nucleus.\n- Step 2: The correct explanation is that static electricity is caused by the TRANSFER OF ELECTRONS. An object becomes positively charged by LOSING electrons (not by gaining positive charge), and becomes negatively charged by GAINING electrons. The \"positive charge\" is actually a deficit of electrons.\n\n**Exam tip:** Always say \"transfer of electrons\" rather than \"transfer of charge\" for full marks.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Why does the electric force increase dramatically when you bring two charged objects closer together? What's the mathematical relationship? (2 steps)", "answer": "- Step 1: The electrostatic force follows an inverse-square law: $$F \\propto \\frac{1}{r^2}$$, where r is the distance between the charges.\n- Step 2: This means if you halve the distance between two charges, the force increases by a factor of 2² = 4. If you reduce the distance to one-third, the force increases by 3² = 9. The force gets stronger much faster than the distance gets smaller — this is why sparks occur at very small separations where the field is extremely strong.\n\n**Note:** The same inverse-square relationship applies to gravitational and magnetic forces.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": true}, {"question": "What safety procedure should you follow if you feel yourself building up static charge while walking on a synthetic carpet? Explain why this works. (2 steps)", "answer": "- Step 1: Before touching a metal object like a door handle, touch a metal wall or door frame first (or use a key to touch the handle).\n- Step 2: This works because you're gradually discharging through the metal instead of all at once. The metal provides a path for the charge to flow away slowly, preventing the sudden spark that causes the shock. The key trick works because the small metal point allows charge to transfer gradually through an initial small contact.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "In an inkjet printer, how are charged ink droplets directed to the correct positions on the paper? (2 steps)", "answer": "- Step 1: Small jets of coloured ink are given an electrostatic charge as they are ejected from the print head.\n- Step 2: Charged plates in the printer create electric fields that attract or repel the charged ink droplets, steering them precisely to the correct positions on the paper. By controlling the charge on each droplet, the printer can create precise patterns — this is opposite charges attracting (electrostatically pulling the ink where needed).", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Why is it dangerous to refuel a car during a thunderstorm? What specific hazard exists beyond the normal static electricity risks? (2 steps)", "answer": "- Step 1: During thunderstorms, there's a heightened risk of lightning strikes, which could directly hit the fuel dispensing area.\n- Step 2: Even without a direct strike, the charged clouds create a strong electric field in the atmosphere that can induce additional charge on the vehicle and fuel system, making the normal static discharge risk much greater. The overall danger is amplified — a spark could ignite the fuel vapours, causing explosion or fire.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": true}, {"question": "When you look at an electric field line diagram, you notice the lines are much closer together near one charged plate than the other. What does this tell you about the field? (2 steps)", "answer": "- Step 1: Closer field lines indicate a stronger electric field in that region.\n- Step 2: This means the force on any charge placed in the region with denser lines would be greater. This can happen near the edges of parallel plates where the field \"fringes\" — it isn't perfectly uniform there. The spacing of field lines is the visual representation of field strength.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Explain why electric field lines never cross each other. What would happen if they did? (2 steps)", "answer": "- Step 1: At any given point in space, an electric field has one specific direction — the direction of the force on a positive test charge placed there.\n- Step 2: If field lines crossed, that would imply two different directions for the field at the same point, which is impossible. Field lines are a visual model showing field direction, and they are drawn so that at any crossing point, there would be ambiguity about which way the force would point — hence crossing is physically impossible in a correct diagram.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A飞机在加油时为什么要连接接地线? 解释放电荷和防止火花的具体过程。(3 steps)", "answer": "- Step 1: 接地线将飞机连接到地球(地面),充当安全 conductor。\n- Step 2: 当燃料在管道中快速流动时,电荷会在飞机和燃料系统上积累。如果没有接地,这些电荷就无法释放。\n- Step 3: 接地线提供了一条电荷流向地球的 pathway, 使过量电荷能够安全地流走。这样就防止了电荷积累到足以产生火花点燃易燃燃料的水平。\n\n**安全要点:** 接地线在整个加油过程中必须保持连接。", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "What would happen if you tried to use an insulator (like a plastic rod) as an earthing wire? Would it work? Why or why not? (2 steps)", "answer": "- Step 1: No, it would not work — an insulator prevents the flow of charge.\n- Step 2: Earthing works by providing a pathway for electrons to flow to or from Earth. An insulator (like plastic, rubber, or glass) has no free electrons that can move, so charge cannot flow through it. You need a conductor (like copper wire) specifically so charge can flow along it to Earth.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": true}, {"question": "When explaining the danger of static electricity in refuelling, what four-part structure should your answer follow for maximum clarity and exam credit? (2 steps)", "answer": "- Step 1: Structure your answer as: (1) State the danger → (2) Explain the cause → (3) Explain how earthing prevents it → (4) State which way electrons flow.\n- Step 2: For example: \"The danger is that a spark could ignite fuel vapours. This is caused by charge building up on the vehicle as fuel flows through pipes. Earthing the vehicle with a bonding wire prevents this by providing a path for charge to flow to Earth. Electrons flow from the negatively charged vehicle down the wire to Earth (or up from Earth to neutralize positive charge).\"", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Why do negatively charged particles experience a force in the opposite direction to the electric field lines, while positively charged particles follow the field lines? (2 steps)", "answer": "- Step 1: Electric field direction is defined as the direction of force on a POSITIVE test charge.\n- Step 2: Therefore, a positive charge placed in a field experiences a force IN THE DIRECTION of the field lines. A negative charge experiences the OPPOSITE force (against the field lines), because opposite charges attract and like charges repel. Since electrons are negative, they move against the direction of field lines.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": true}, {"question": "In the context of static electricity, why is it more accurate to say an object \"loses\" or \"gains\" electrons rather than \"gaining positive charge\"? (2 steps)", "answer": "- Step 1: Protons never move in electrostatic charging, so \"gaining positive charge\" implies something is added, which is misleading.\n- Step 2: The reality is that positive charge is a deficit of electrons. When an object becomes positive, it has LOST electrons — it hasn't \"gained\" anything positive. The total number of protons hasn't changed. Similarly, becoming negative means GAINING electrons. This is why \"loss/gain of electrons\" is the precise, accurate terminology.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "If you bring a charged rod near small pieces of neutral paper, the paper pieces first jump up to touch the rod, then fall away. Explain this two-stage process. (3 steps)", "answer": "- Step 1: Initially, the charged rod polarizes the paper — opposite charges are induced on the near surface of each paper piece.\n- Step 2: These induced opposite charges are closer to the rod than the repelled like charges, so there is a net attractive force. The paper jumps up and touches the rod (attraction).\n- Step 3: Once the paper touches the rod, some of the rod's charge transfers to the paper (or electrons flow between them). Now the paper has the same charge as the rod, so they repel each other — the paper is pushed away and falls.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "In an electric field diagram, what does the arrow direction on each field line represent, and why must arrows always be included in exam answers? (2 steps)", "answer": "- Step 1: The arrow direction shows which way a POSITIVE test charge would move if placed in the field — away from positive charges and toward negative charges.\n- Step 2: Arrows must be included because they demonstrate understanding of field direction. Forgetting arrows loses marks because the diagram no longer shows the crucial information about field direction — it's incomplete and could be interpreted incorrectly.\n\n**Exam tip:** Always include arrows pointing away from + and toward −.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Two parallel metal plates are connected to a high-voltage supply and become oppositely charged. If you place a proton exactly halfway between them, what happens? What if you placed an electron there instead? (3 steps)", "answer": "- Step 1: In the uniform field between parallel plates, a positive charge (proton) experiences a force toward the negative plate.\n- Step 2: Since the field is uniform, the proton halfway between experiences equal attraction to the negative plate and repulsion from the positive plate — but the net force is toward the negative plate (the direction of the field).\n- Step 3: An electron (negative charge) experiences the opposite — a force toward the positive plate, AGAINST the direction of the field lines. The electron feels a force in the opposite direction to a proton.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": true}, {"question": "What is the fundamental difference between charging by friction and charging by induction? (2 steps)", "answer": "- Step 1: Charging by friction involves actual transfer of electrons between two materials when they are rubbed together — physical contact is required.\n- Step 2: Charging by induction involves bringing a charged object near (but not touching) a conductor, which causes charge separation within the conductor. The side nearest the charged object develops opposite charge (by induction), and if the conductor is then earthed, it can be left with a net charge — all without any electron transfer from the original charged object.\n\n**Key distinction:** Friction = physical transfer; Induction = charge separation via proximity (no transfer from the source).", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A car painter using electrostatic spray painting reports that the paint wraps around the car body better on curved surfaces. Why does this happen? (2 steps)", "answer": "- Step 1: In electrostatic spray painting, paint droplets are given a charge (say, negative) as they leave the nozzle.\n- Step 2: The car body is grounded (earthed) or given the opposite charge (positive). Since opposite charges attract, the negative paint droplets are attracted to all surfaces of the car — including the back and sides — not just the front-facing surfaces. This \"wrapping\" effect results from the electrostatic attraction between the charged paint and the oppositely charged car body, even on curved surfaces.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "Why can static electricity be a particular problem in environments with flammable vapours or gases, such as near fuel farms or chemical storage? (2 steps)", "answer": "- Step 1: Flammable vapours and gases can ignite when exposed to a spark, and static electricity provides that spark.\n- Step 2: The problem is amplified because many chemicals and fuels are insulators themselves, so charge can build up as they flow through pipes or as vapours move through the air. This charge can then discharge as a spark, igniting the flammable atmosphere. This is why earthing and bonding are critical safety measures in such environments.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": true}], "count": 39}}, "meta": {"gemini_1": {"run": "1", "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini gemini-2.5-pro run 1", "temperature": 0.7, "in_tokens": 5182, "out_tokens": 5440, "cost_eur": 0.056, "elapsed_s": 60, "content_chars": 24391}, "gflash_1": {"run": "1", "provider": "gflash", "model": "gemini-2.5-flash", "display": "Gemini gemini-2.5-flash run 1", "temperature": 0.7, "in_tokens": 5182, "out_tokens": 8213, "cost_eur": 0.0052, "elapsed_s": 47, "content_chars": 40312}, "glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 5138, "out_tokens": 11506, "reasoning_chars": 32821, "cost_eur": 0.042, "elapsed_s": 234, "content_chars": 18794}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 5138, "out_tokens": 9609, "reasoning_chars": 23553, "cost_eur": 0.0359, "elapsed_s": 143, "content_chars": 19672}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 5138, "out_tokens": 10667, "reasoning_chars": 24818, "cost_eur": 0.0393, "elapsed_s": 216, "content_chars": 24309}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 5016, "out_tokens": 7825, "reasoning_chars": 1970, "cost_eur": 0.0088, "elapsed_s": 115, "content_chars": 35131}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 5016, "out_tokens": 6959, "reasoning_chars": 1944, "cost_eur": 0.008, "elapsed_s": 105, "content_chars": 30672}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 5165, "out_tokens": 2201, "reasoning_chars": 2517, "cost_eur": 0.0034, "elapsed_s": 47, "content_chars": 7688}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 5165, "out_tokens": 2852, "reasoning_chars": 3415, "cost_eur": 0.0041, "elapsed_s": 61, "content_chars": 9869}}};
const SK='gcse_ch11_cards';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
