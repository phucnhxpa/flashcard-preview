tion. Identify three separate changes you could make to increase the speed of rotation. (3 steps)", "answer": "- Step 1: **Increase the current** through the coil. From $$F = BIL$$, more current means more force on each side of the coil, producing a greater torque and faster rotation. You could do this by increasing the power supply voltage.\n- Step 2: **Use stronger magnets** (increase $$B$$). A stronger magnetic field also increases the force on the current-carrying sides, producing greater torque and faster rotation. Stronger permanent magnets or electromagnets would work.\n- Step 3: **Add more turns to the coil**. More turns means a greater total length of wire carrying current in the magnetic field, effectively increasing the total $$L$$ in $$F = BIL$$. More turns → more total force → greater torque → faster rotation.\n\nTakeaway: Speed up a motor: ↑current, ↑magnetic field strength, ↑coil turns.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "You reverse the polarity of the battery connected to a d.c. motor. What happens to the direction of rotation, and why? (2 steps)", "answer": "- Step 1: Reversing the battery reverses the direction of current through the coil. In Fleming's left-hand rule, the second finger (current) now points in the opposite direction, while the first finger (field) stays the same. The thumb (force) therefore points in the **opposite** direction.\n- Step 2: With the forces on each side of the coil reversed, the torque now acts in the opposite rotational direction. The motor spins **in reverse**. The split-ring commutator still functions correctly — it still reverses the current every half-turn — but because the initial current direction is reversed, the overall rotation direction is reversed too.\n\nTakeaway: Reverse current → reverse rotation. The commutator still works; it just maintains the new (reversed) direction.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "A student says: \"Magnetic field lines are real physical lines in space, like strings, that you could grab.\" Is this correct? If not, what are field lines really? (2 steps)", "answer": "- Step 1: This is incorrect. Magnetic field lines are a **visual model** — a human-invented tool for representing the direction and strength of the magnetic field. They are not physical objects. You cannot see them, touch them, or grab them.\n- Step 2: What IS real is the magnetic field itself — the region where a force acts on magnets or magnetic materials. The field exists at every point in space around a magnet, not just along the drawn lines. The lines are simply a convenient way to show the field's direction (arrows) and relative strength (spacing) on a diagram. Iron filings align with the field, but they're revealing the field's influence, not \"making\" the lines visible as physical objects.\n\nTakeaway: Field lines are a model, not physical objects. The field itself is real and exists everywhere, not just on the lines.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "Two north poles face each other across a small gap. Sketch the field line pattern in and around the gap. How does this differ from the pattern between a north and south pole facing each other? (3 steps)", "answer": "- Step 1: Between two **like poles** (N–N), the field lines from each pole curve **away** from each other in the gap. No field lines connect the two poles directly. The field in the gap is weak because the two fields partially cancel — each north pole's field points outward, and where they meet head-on, they oppose.\n- Step 2: Between **unlike poles** (N–S), the field lines run straight across the gap from N to S. The fields reinforce each other in the gap, creating a strong, uniform field with parallel, equally spaced lines.\n- Step 3: The key visual difference: N–S gap has straight, parallel lines crossing directly; N–N gap has lines that curve outward away from each other, leaving a weak region in the centre. This is why like poles repel (field pressure pushes them apart) and unlike poles attract (field tension pulls them together).\n\nTakeaway: Unlike poles → straight parallel lines across gap (strong, uniform); like poles → lines curve away from each other (weak, no connection).", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "You have a wire carrying current vertically upward. A second parallel wire nearby carries current vertically downward. Do the magnetic fields between the wires reinforce or cancel, and will the wires attract or repel each other? (3 steps)", "answer": "- Step 1: Using the right-hand thumb rule for each wire: for the upward current, the field circles anticlockwise as viewed from above; for the downward current, the field circles clockwise as viewed from above.\n- Step 2: In the region **between** the wires, both fields point in the **same direction** (e.g., both pointing from left to right if the wires are side by side). The fields reinforce between the wires, creating a stronger field there. Outside the wires (on the far sides), the fields partially cancel.\n- Step 3: When fields reinforce between two current-carrying wires (opposite currents), the wires **attract** each other. This is analogous to unlike poles attracting. Conversely, if both currents flowed in the same direction, the fields would cancel between the wires and reinforce outside, and the wires would repel — analogous to like poles repelling.\n\nTakeaway: Opposite-direction currents → fields reinforce between → wires attract. Same-direction currents → fields cancel between → wires repel.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "Why does an electromagnet with an iron core produce a much stronger field than the same solenoid with no core? Explain in terms of domains. (3 steps)", "answer": "- Step 1: A solenoid without a core produces a magnetic field solely from the current flowing through its turns. This field is relatively weak because it depends only on the number of turns and the current.\n- Step 2: When an iron core is inserted, the solenoid's field passes through the iron. This external field **aligns the magnetic domains** in the iron — tiny regions where atomic magnets are already aligned in groups but point in random directions overall. The aligned domains produce their own field.\n- Step 3: The iron core's field adds to the solenoid's field, producing a **combined field** that can be hundreds or thousands of times stronger. Iron is particularly effective because it has a high permeability — its domains align very easily with an external field, maximising the amplification effect.\n\nTakeaway: Iron core amplifies the solenoid field because its domains align and contribute their own field on top.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "A wire 5 cm long carries 3 A of current in a 0.4 T magnetic field at 90°. Without doing the full calculation, estimate whether the force is closer to 0.006 N, 0.06 N, or 0.6 N. (2 steps)", "answer": "- Step 1: Use $$F = BIL$$ with approximate mental math. Convert 5 cm to 0.05 m. Now compute: $$F = 0.4 \\times 3 \\times 0.05$$. First, $$0.4 \\times 3 = 1.2$$. Then $$1.2 \\times 0.05 = 0.06$$.\n- Step 2: The force is **0.06 N**. This is a small but tangible force — enough to deflect a lightweight wire visibly. Notice the order of magnitude: the short length (0.05 m) and moderate field (0.4 T) give a force in the hundredths of newtons range for a few amps of current.\n\nTakeaway: Quick estimation: $$0.4 \\times 3 \\times 0.05 \\approx 0.06 \\, \\text{N}$$. Short wires in moderate fields give small but real forces.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "A student measures a force of 0.03 N on a 0.02 m wire carrying 2 A in a magnetic field. They calculate $$B$$ and get 750 T. Is this reasonable? If not, where did they likely go wrong? (3 steps)", "answer": "- Step 1: The correct calculation is $$B = \\frac{F}{IL} = \\frac{0.03}{2 \\times 0.02} = \\frac{0.03}{0.04} = 0.75 \\, \\text{T}$$. The field should be 0.75 T, which is a perfectly reasonable lab magnet strength.\n- Step 2: The student got 750 T, which is absurdly large — the strongest sustained magnetic fields ever produced in labs are around 45 T, and 750 T is only achieved in extremely short pulses during specialized experiments. This should immediately signal an error.\n- Step 3: The likely mistake: the student used the length as 2 cm but forgot to convert to metres, using $$L = 2$$ instead of $$L = 0.02$$. This gives $$B = \\frac{0.03}{2 \\times 2} = 0.0075 \\, \\text{T}$$ — still wrong. More likely, they did $$\\frac{0.03}{2 \\times 0.02}$$ but misplaced a decimal, or they used cm directly: $$\\frac{0.03}{2 \\times 0.002}$$. The key takeaway: **always convert cm to m** before using $$F = BIL$$.\n\nTakeaway: 750 T is impossible in a school lab. Forgetting to convert cm to m is the classic source of absurd answers.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "You are told that the force on a wire in a magnetic field is given by $$F = BIL\\sin\\theta$$, where $$\\theta$$ is the angle between the wire and the field. At GCSE, you only use $$F = BIL$$. What value of $$\\theta$$ does this assume, and what happens to the force as $$\\theta$$ decreases from this value? (2 steps)", "answer": "- Step 1: The formula $$F = BIL$$ assumes $$\\theta = 90°$$, where the wire is **perpendicular** to the field. At this angle, $$\\sin 90° = 1$$, so $$F = BIL \\times 1 = BIL$$. This is the maximum possible force for given values of $$B$$, $$I$$, and $$L$$.\n- Step 2: As $$\\theta$$ decreases from 90° towards 0°, $$\\sin\\theta$$ decreases from 1 towards 0. The force gets smaller and smaller, reaching zero when $$\\theta = 0°$$ (wire parallel to the field). At GCSE, you only need to know the two extreme cases: maximum force at 90° ($$F = BIL$$) and zero force at 0° (parallel).\n\nTakeaway: $$F = BIL$$ is the maximum force case ($$\\theta = 90°$$). Any other angle gives less force; parallel gives zero.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "A common misconception: \"The magnetic field lines coming out of the north pole of a magnet start at the north pole and end at the south pole.\" Why is this description misleading? (2 steps)", "answer": "- Step 1: Field lines don't have a starting or ending point in the way a physical path does. They are **continuous closed loops**. Outside the magnet, they go from N to S; inside the magnet, they continue from S back to N, completing the loop. There is no gap — the lines never begin or end at a pole.\n- Step 2: This is fundamentally different from electric field lines, which DO start on positive charges and end on negative charges (because electric monopoles exist). Magnetic field lines have no start or end because magnetic monopoles don't exist — they always form closed loops. Saying they \"start\" at N and \"end\" at S only describes the direction of the arrows outside the magnet, not the full picture.\n\nTakeaway: Magnetic field lines are closed loops — they continue through the magnet's interior from S back to N. They never start or end.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": true}, {"question": "A student claims that a compass points north because there is a giant bar magnet buried inside the Earth at the geographic North Pole. Why is this explanation wrong, and what is the actual source of Earth's magnetic field? (2 steps)", "answer": "- Step 1: There is no literal bar magnet inside the Earth. The Earth's interior is far too hot for any magnetic material to remain permanently magnetised — above the Curie temperature (about 770°C for iron), materials lose their permanent magnetism, and the Earth's core is well above this temperature.\n- Step 2: Earth's magnetic field is generated by **convection currents of molten iron and nickel in the outer core**, driven by heat from the inner core. These circulating conducting fluids act like a dynamo (a self-sustaining electromagnetic generator), producing the magnetic field. The field shape resembles a bar magnet's field, which is why we use the bar magnet as a simplified model, but the actual mechanism involves moving conducting fluids, not a solid magnet.\n\nTakeaway: Earth's field is produced by circulating molten metals in the core (geodynamo), not a buried bar magnet. The bar magnet is just a convenient model.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": true}, {"question": "You want to use Fleming's left-hand rule to find the direction of force on a wire. The magnetic field points from left to right, and the current flows out of the page towards you. Which way does the force act? (3 steps)", "answer": "- Step 1: Position your left hand: first finger (field, N→S) points from left to right.\n- Step 2: Second finger (current, +→−) points out of the page towards you. Your middle finger must be perpendicular to your index finger, which it is when pointing towards you while the index points right.\n- Step 3: Your thumb (force) now points **upwards**. The force on the wire acts vertically upward.\n\nTakeaway: Field right + current out of page → force upward. Practice the 3D orientation with your actual left hand.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "A student says: \"Electromagnetism and electromagnetic induction are the same thing — both involve magnets and electricity.\" Explain why they are NOT the same, and identify the key distinction. (2 steps)", "answer": "- Step 1: **Electromagnetism** (as covered in this chapter) is the process where an **electric current produces a magnetic field**. You supply electrical energy (current), and a magnetic field is the output. This is the principle behind electromagnets and solenoids.\n- Step 2: **Electromagnetic induction** is the reverse process: a **changing magnetic field induces a voltage (and current) in a conductor**. You supply magnetic change (motion of a magnet near a wire), and electrical energy is the output. This is the principle behind generators. The two are related (both involve the interaction of electricity and magnetism) but are opposite in direction of energy conversion: electromagnetism converts electrical → magnetic; induction converts magnetic → electrical.\n\nTakeaway: Electromagnetism: current → magnetic field. Electromagnetic induction: changing field → current. They are reverse processes.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": true}, {"question": "A coil in a d.c. motor has 50 turns instead of 1 turn. How does this affect the force, and how does it affect the role of the split-ring commutator? (3 steps)", "answer": "- Step 1: More turns means more total length of wire carrying current in the magnetic field. If each turn has length $$L$$ in the field, 50 turns gives an effective length of $$50L$$. The total force is $$F = BI(50L) = 50 \\times BIL$$ — fifty times the force of a single turn. This produces a greater torque and faster, more powerful rotation.\n- Step 2: The split-ring commutator still performs the same function: it reverses the current direction in the coil every half-turn. The number of turns doesn't change the need for current reversal; it only changes the magnitude of the force.\n- Step 3: However, with more turns, the commutator must be designed to handle the connections to all 50 turns correctly. The coil is typically wound as a single continuous wire with 50 loops, and the two ends of this wire connect to the two halves of the split ring. The commutator still has just two halves regardless of the number of turns.\n\nTakeaway: More turns → more force (effective $$L$$ increases). The commutator's function (current reversal) is unchanged.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "A wire carries current eastward in a region where Earth's magnetic field points northward (horizontal). Which direction is the force on the wire — up, down, north, south, east, or west? (3 steps)", "answer": "- Step 1: Apply Fleming's left-hand rule. First finger: magnetic field direction is northward (N→S direction means field points north, so the \"south pole\" that attracts the compass N is further north... wait, let's be careful. The field direction is given as northward, so first finger points north).\n- Step 2: Second finger: conventional current direction is eastward. Your middle finger points east.\n- Step 3: With your left hand: first finger north, second finger east, your thumb points **upward** (out of the ground). The force on the wire acts vertically upward.\n\nTakeaway: Field north + current east → force upward. This is a real effect (very small due to Earth's weak field ~50 μT) but measurable with sensitive equipment.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "A student asks: \"If I put a magnet near a wooden ruler, nothing happens. Does this mean the magnetic field doesn't reach the ruler?\" Explain what's really going on. (2 steps)", "answer": "- Step 1: The magnetic field **does** reach the ruler — the field extends throughout space around the magnet, weakening with distance but never abruptly stopping. The field is definitely present at the ruler's location.\n- Step 2: The reason nothing happens is that wood is **not a magnetic material**. The magnetic field only produces a force on magnets, magnetic materials (iron, cobalt, nickel, and alloys containing them like steel), and current-carrying wires. Wood contains no magnetic domains and no free currents, so it doesn't respond to the field. The field is there; the wood just doesn't interact with it.\n\nTakeaway: The field extends everywhere around a magnet; non-magnetic materials simply don't interact with it — the field doesn't \"skip\" them.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "You want to determine the direction of the magnetic field at a point near a current-carrying wire. A friend tells you to use Fleming's left-hand rule. Are they correct? If not, what should you use? (2 steps)", "answer": "- Step 1: The friend is **incorrect**. Fleming's left-hand rule is for finding the direction of **force** on a current-carrying conductor in an external magnetic field. It requires you to know two of the three quantities (field, current, force) to find the third.\n- Step 2: To find the direction of the magnetic field around a current-carrying wire, you use the **right-hand thumb rule**: point your right thumb in the direction of conventional current, and your curled fingers show the direction of the magnetic field lines (concentric circles) around the wire. These are two different rules for two different purposes — don't confuse them.\n\nTakeaway: Right-hand thumb rule → field direction around a wire. Fleming's left-hand rule → force direction on a wire in a field.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": true}, {"question": "A solenoid is connected to a variable power supply. The current is slowly increased from zero. Describe what happens to the magnetic field inside and outside the solenoid as the current rises. (3 steps)", "answer": "- Step 1: At zero current, there is no magnetic field — neither inside nor outside the solenoid. The wire carries no current, so it produces no field.\n- Step 2: As current increases from zero, a magnetic field appears. Inside the solenoid, the field is **strong and uniform**, with parallel field lines running along the axis from S to N (inside the magnet). The field strength inside increases proportionally with current.\n- Step 3: Outside the solenoid, a **weaker** field appears, curving from the N pole around to the S pole (like a bar magnet). This external field also strengthens as current increases, but it's always much weaker and less uniform than the internal field. If an iron core were present, both internal and external fields would be dramatically amplified at every current level.\n\nTakeaway: ↑current → ↑field strength everywhere. Inside: strong and uniform. Outside: weak and curved (bar magnet shape).", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "Two identical electromagnets are placed with their north poles facing each other across a gap. If the current in one is reversed, what happens to the force between them — does it change from repulsive to attractive, or stay the same? (3 steps)", "answer": "- Step 1: Initially, both are N poles facing each other. Like poles repel, so there is a repulsive force between them.\n- Step 2: Reversing the current in one electromagnet reverses its polarity. The end that was N becomes S. Now the facing poles are N–S — unlike poles.\n- Step 3: Unlike poles attract, so the force changes from **repulsive to attractive**. This is one of the key advantages of electromagnets over permanent magnets — you can reverse the force direction simply by reversing the current, which you cannot do with a permanent magnet.\n\nTakeaway: Reverse current → reverse polarity → reverse force direction (repulsion ↔ attraction). Electromagnets are controllable.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "A simple conceptual exercise: A 0.1 m wire carries 4 A in a 0.5 T field at 90°. If you double the current and halve the field strength simultaneously, what happens to the force? (2 steps)", "answer": "- Step 1: Original force: $$F_1 = BIL = 0.5 \\times 4 \\times 0.1 = 0.2 \\, \\text{N}$$. New values: $$I_{new} = 8 \\, \\text{A}$$, $$B_{new} = 0.25 \\, \\text{T}$$.\n- Step 2: New force: $$F_2 = 0.25 \\times 8 \\times 0.1 = 0.2 \\, \\text{N}$$. The force is **unchanged**. Doubling current doubles the force, but halving the field halves it — the two changes cancel exactly. This demonstrates the direct proportionality: $$F \\propto B$$ and $$F \\propto I$$, so scaling one up and the other down by the same factor leaves $$F$$ unchanged.\n\nTakeaway: $$F \\propto BI$$. If you multiply $$B$$ by $$k$$ and $$I$$ by $$1/k$$, the force stays the same.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "A student claims: \"The force on a wire in a magnetic field is always in the direction of the current.\" Explain why this is fundamentally wrong using the concept of perpendicularity. (2 steps)", "answer": "- Step 1: Fleming's left-hand rule shows that the force (thumb), current (second finger), and field (first finger) are **mutually perpendicular** — each at 90° to the other two. The force can never be in the same direction as the current because they must be at right angles.\n- Step 2: The force is always perpendicular to both the current and the field. If current flows east and the field points north, the force acts either up or down (perpendicular to both), never east. This perpendicularity is what makes the motor effect produce rotation rather than linear motion — the force is always \"sideways\" relative to the current direction.\n\nTakeaway: Force ⊥ current and force ⊥ field. The three quantities form a right-handed (well, left-handed for the motor effect) orthogonal system.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": true}, {"question": "You observe that when current flows through a wire near a compass, the compass needle deflects. If you increase the current, the needle deflects more. If you move the compass further from the wire, the needle deflects less. What do these observations tell you about the magnetic field around the wire? (3 steps)", "answer": "- Step 1: The compass deflection confirms that a current-carrying wire produces a magnetic field — this is electromagnetism. Without current, there's no deflection; with current, the needle aligns with the new field direction.\n- Step 2: Increasing the current causes greater deflection, meaning the field is **stronger**. The wire's magnetic field strength is proportional to the current — more current produces a stronger field, which exerts a larger torque on the compass needle.\n- Step 3: Moving the compass further away causes less deflection, meaning the field **weakens with distance**. The concentric circular field lines are closest together near the wire (strong field) and spread further apart at greater distances (weaker field). This distance dependence is why the field from a single wire falls off rapidly.\n\nTakeaway: ↑current → ↑field strength; ↑distance from wire → ↓field strength. Both confirmed by compass deflection.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": true}, {"question": "A d.c. motor is running, and you suddenly reverse the magnetic field (swap the N and S poles of the permanent magnets) while keeping the current the same. What happens to the direction of rotation? (2 steps)", "answer": "- Step 1: Reversing the field direction means the first finger in Fleming's left-hand rule now points the opposite way. With the current (second finger) unchanged, the thumb (force) reverses direction. The forces on each side of the coil now push in the opposite directions.\n- Step 2: The motor's direction of rotation **reverses**. This is the second way to change rotation direction (the first being reversing the current). The commutator still functions correctly — it continues to ensure continuous rotation — but now in the opposite direction.\n\nTakeaway: Reverse field → reverse rotation. Reverse current → reverse rotation. Either change flips the force direction.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "Why can't a permanent magnet be \"switched off\" like an electromagnet, even temporarily? Explain in terms of domain theory. (2 steps)", "answer": "- Step 1: In a permanent magnet (e.g., made of steel), the magnetic domains are **locked in alignment** by the material's structure. The domain walls are difficult to move — this is what makes it a \"hard\" magnetic material. Once aligned (during manufacture), the domains stay aligned permanently, producing a continuous field.\n- Step 2: In an electromagnet, the field comes from the current in the solenoid (and the induced magnetism of the iron core). Switch off the current, and the solenoid's field disappears instantly; the iron's domains, being in a \"soft\" material, quickly randomise, and the total field drops to near zero. There's no way to \"unlock\" a permanent magnet's domains without heating it above its Curie temperature or hitting it hard — you can't simply switch them off.\n\nTakeaway: Permanent magnets have locked domains; electromagnets have current-dependent domains (in the core) + current-dependent field (from the coil). Only the latter can be switched off.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "You have a horseshoe magnet (U-shaped) with N on one tip and S on the other. Where is the field strongest, and why is this shape useful compared to a bar magnet? (2 steps)", "answer": "- Step 1: The field is **strongest in the gap between the two poles**. Here, the field lines run straight from N to S across a short distance, and they are closely packed (high flux density). This region is also very uniform — parallel, equally spaced lines.\n- Step 2: This shape is useful because it concentrates the field into a compact, accessible region. A bar magnet's strongest field is at its poles, but they're at opposite ends of a long bar, making it hard to use both simultaneously. The horseshoe shape brings N and S close together, creating a strong, uniform field in the gap — ideal for placing a coil (as in a motor or meter) or for picking up objects (as in an electromagnet crane).\n\nTakeaway: Horseshoe magnet concentrates field between close poles — strong, uniform, and practical for devices.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "A wire carries current perpendicular to a 0.2 T magnetic field. The force on 0.3 m of the wire is 0.12 N. What is the current, and how would the force change if the wire were tilted to 45° to the field? (Conceptual answer for the angle part.) (3 steps)", "answer": "- Step 1: Rearrange $$F = BIL$$ to solve for current: $$I = \\frac{F}{BL} = \\frac{0.12}{0.2 \\times 0.3} = \\frac{0.12}{0.06} = 2 \\, \\text{A}$$. The current is 2 A.\n- Step 2: If the wire is tilted to 45° (no longer perpendicular to the field), the force **decreases**. At GCSE you only calculate for 90°, but conceptually, tilting the wire reduces the component of the wire's interaction with the field.\n- Step 3: The full formula $$F = BIL\\sin\\theta$$ shows that at 45°, $$\\sin 45° \\approx 0.707$$, so the force would be about 70.7% of the maximum — roughly $$0.085 \\, \\text{N}$$ instead of $$0.12 \\, \\text{N}$$. At 0° (parallel), the force would be zero. The key insight: any angle other than 90° gives a smaller force than the maximum.\n\nTakeaway: At 90°: $$F = BIL$$ (maximum). At any other angle, force is reduced; at 0° (parallel), force is zero.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "Synthesis question: A d.c. motor has its coil in a uniform magnetic field between two permanent magnets. The current is supplied via carbon brushes and a split-ring commutator. Explain how ALL of these components work together to produce continuous rotation, referencing the underlying physics at each stage. (5 steps)", "answer": "- Step 1: **Current flows** from the power supply through the carbon brushes, into the split-ring commutator, and through the coil. The current-carrying coil now has its own magnetic field (electromagnetism — current produces a field).\n- Step 2: The coil's field **interacts with the external field** from the permanent magnets. This interaction (the motor effect) produces a force on each side of the coil where current flows perpendicular to the field. The forces on opposite sides are in opposite directions (determined by Fleming's left-hand rule), creating a couple that produces a turning effect (torque).\n- Step 3: The coil begins to **rotate**. The permanent magnets provide the uniform field needed for consistent forces. The carbon brushes maintain electrical contact while allowing the coil to spin freely — they are the \"sliding contacts\" that solve the problem of connecting stationary wires to a rotating coil.\n- Step 4: As the coil rotates past the vertical position, the **split-ring commutator reverses the current** direction in the coil. The split in the ring means that the side of the coil that was connected to the positive brush now connects to the negative brush, and vice versa. Without this reversal, the forces would oppose the rotation after the vertical position.\n- Step 5: With the current reversed, the forces on each side of the coil continue to act in the **same rotational direction** as before, ensuring continuous one-directional rotation. The momentum of the coil carries it through the brief moment near the vertical position where forces are minimal. The cycle repeats: current flows → motor effect → rotation → commutator reverses current → continued rotation.\n\nTakeaway: Power supply → current through brushes → commutator → coil → motor effect force → rotation → commutator reverses current → continuous rotation. Every component is essential.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": true}], "count": 50}, "qwen_1": {"label": "Qwen 3 235B ①", "cards": [{"question": "Why can't magnetic field lines ever cross each other? (3 steps)", "answer": "- Step 1: Field lines represent the direction of the magnetic force at any point. At any given location, the direction of the field is unique because magnetic fields are vector fields with a single net direction.  \n- Step 2: If two field lines were to cross, that point would have two different directions of force simultaneously, which contradicts the principle of vector addition in physics.  \n+ Example: Imagine two field lines intersecting – a compass needle at the intersection would point in two directions at once, which is physically impossible.  \n- Step 3: This uniqueness of direction is a fundamental property of magnetic fields, ensuring field lines never intersect.  \n\nTakeaway: Magnetic field lines cannot cross because the field direction at any point is singular.", "source": "Qwen 3 235B ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Explain why Earth's geographic North Pole is actually a magnetic south pole. (3 steps)", "answer": "- Step 1: Magnetic field lines emerge from the magnetic north pole and enter the magnetic south pole.  \n- Step 2: A compass needle’s north pole points toward Earth’s geographic North Pole. For this to happen, the geographic North Pole must be a magnetic south pole (opposite poles attract).  \n+ Analogy: Like a bar magnet, Earth’s magnetic field behaves as if a giant bar magnet is flipped inside Earth.  \n- Step 3: This means Earth’s magnetic south pole is located near its geographic North Pole, and vice versa.  \n\nTakeaway: The compass needle’s alignment confirms Earth’s geographic poles are opposite to their magnetic counterparts.", "source": "Qwen 3 235B ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why is attraction alone insufficient to determine if an object is a magnet? (3 steps)", "answer": "- Step 1: Magnetic materials like iron are attracted to both poles of a magnet, even if they are not themselves magnets.  \n- Step 2: A permanent magnet can either attract or repel another magnet depending on pole orientation.  \n+ Misconception: A non-magnetized iron bar will always be attracted to a magnet, but cannot repel it.  \n- Step 3: To confirm an object is a magnet, it must repel a known magnet. Attraction alone only indicates it’s a magnetic material.  \n\nTakeaway: Only repulsion confirms magnetism; attraction only confirms magnetic material status.", "source": "Qwen 3 235B ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How does a split-ring commutator ensure continuous rotation in a DC motor? (4 steps)", "answer": "- Step 1: The commutator reverses the current direction in the coil every half-rotation to maintain torque in the same direction.  \n- Step 2: When the coil is vertical (90° rotation), the commutator temporarily breaks contact with the brushes, stopping current flow.  \n- Step 3: As the coil continues rotating past vertical, the split ring reconnects with the brushes, but the current now flows in the opposite direction through the coil.  \n+ Analogy: Like a car engine’s timing belt, the commutator ensures forces always push the coil in the same rotational direction.  \n- Step 4: This reversal keeps the torque (force × perpendicular distance) aligned for continuous rotation.  \n\nTakeaway: The commutator inverts current direction at the vertical point to sustain unidirectional rotation.", "source": "Qwen 3 235B ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "What happens to the force on a current-carrying wire if the wire is aligned parallel to the magnetic field? Why? (2 steps)", "answer": "- Step 1: The force becomes zero because the interaction between the magnetic fields does not produce a perpendicular thrust.  \n+ Example: Imagine a wire aligned with Earth’s magnetic field lines – no sideways force acts on it.  \n- Step 2: The motor effect (F = BIL) only applies when the current and field are perpendicular. At parallel alignment, there’s no component of the magnetic field acting across the wire.  \n\nTakeaway: Force is maximized at 90° and zero when parallel due to field interaction geometry.", "source": "Qwen 3 235B ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why is iron used as a core in electromagnets instead of, say, aluminum? (3 steps)", "answer": "- Step 1: Iron is a magnetic material that becomes strongly magnetized when placed in a magnetic field.  \n- Step 2: An electromagnet’s solenoid generates a magnetic field, which the iron core amplifies by aligning its own magnetic domains.  \n+ Contrast: Aluminum is not a magnetic material and does not contribute to field strength.  \n- Step 3: The iron core increases the magnetic flux density (B), making the electromagnet much stronger than a solenoid alone.  \n\nTakeaway: Iron enhances field strength by becoming an induced magnet; non-magnetic metals like aluminum do not.", "source": "Qwen 3 235B ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "How does the right-hand thumb rule for electromagnetism differ from Fleming’s left-hand rule for the motor effect? (3 steps)", "answer": "- Step 1: The right-hand thumb rule determines the **direction of the magnetic field** around a current-carrying wire (thumb = current, fingers = field).  \n- Step 2: Fleming’s left-hand rule determines the **direction of force** on a current-carrying conductor in a magnetic field (first finger = field, second = current, thumb = motion).  \n+ Misconception: Confusing the two rules leads to errors in predicting field vs. force direction.  \n- Step 3: The right-hand rule applies to electromagnetism (current → field), while the left-hand rule applies to the motor effect (field + current → force).  \n\nTakeaway: Right hand → field direction around a wire; left hand → force direction in a motor.", "source": "Qwen 3 235B ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why does increasing the number of turns in a solenoid increase its magnetic field strength? (3 steps)", "answer": "- Step 1: Each turn of the solenoid contributes its own magnetic field. More turns mean additive contributions from individual loops.  \n- Step 2: The total field strength (B) is proportional to the number of turns per unit length (B ∝ N/L). More turns in the same length increase N/L.  \n+ Example: Doubling turns while keeping length the same doubles the field strength.  \n- Step 3: Adding turns also increases the effective length of wire in the magnetic field, enhancing the overall flux density.  \n\nTakeaway: More turns = stronger field because individual loop fields superimpose constructively.", "source": "Qwen 3 235B ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What would happen to a DC motor if the split-ring commutator were replaced with a solid ring? (3 steps)", "answer": "- Step 1: A solid ring would allow current to flow continuously in the same direction through the coil as it rotates.  \n- Step 2: After 180° of rotation, the forces on the coil would reverse direction, causing torque to oppose the rotation.  \n+ Analogy: Like pedaling a bicycle backward, the motor would stall or oscillate.  \n- Step 3: The motor would stop rotating after half a turn because the reversed forces would act to reverse the direction of motion.  \n\nTakeaway: The split-ring commutator is essential for reversing current and sustaining unidirectional rotation.", "source": "Qwen 3 235B ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How does a uniform magnetic field differ from a non-uniform field in terms of field line spacing and strength? (2 steps)", "answer": "- Step 1: In a uniform field (e.g., between magnet poles), field lines are equally spaced and parallel, indicating constant strength and direction.  \n+ Example: The force on a compass needle is the same everywhere in a uniform field.  \n- Step 2: In a non-uniform field (e.g., around a bar magnet), field lines are closer together near poles (strong field) and spread out elsewhere (weak field).  \n\nTakeaway: Uniform fields have evenly spaced lines; non-uniform fields have varying spacing reflecting strength changes.", "source": "Qwen 3 235B ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why does reversing the current in an electromagnet reverse its polarity? (3 steps)", "answer": "- Step 1: The direction of current in a solenoid determines the orientation of its magnetic field (using the right-hand grip rule).  \n- Step 2: Reversing the current flips the direction of the field lines, swapping the north and south poles.  \n+ Analogy: Like a bar magnet flipped end-to-end, the polarity inverts.  \n- Step 3: This is critical in applications like electric motors, where reversing current changes rotation direction.  \n\nTakeaway: Current direction defines pole orientation; reversal inverts the field.", "source": "Qwen 3 235B ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What is the role of carbon brushes in a DC motor, and why are they made of carbon? (3 steps)", "answer": "- Step 1: Carbon brushes conduct electricity between the stationary circuit and the rotating split-ring commutator.  \n- Step 2: Carbon is used because it is a good conductor and has low friction, allowing smooth rotation without excessive wear.  \n+ Contrast: Metal brushes would cause sparking and rapid wear due to high friction.  \n- Step 3: The brushes maintain contact with the commutator as it spins, ensuring continuous current flow to the coil.  \n\nTakeaway: Carbon brushes enable electrical connection while minimizing friction and wear.", "source": "Qwen 3 235B ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Compare permanent magnets and induced magnets in terms of pole behavior and field duration.", "answer": "- Step 1: Permanent magnets have fixed poles (N/S) and retain magnetism indefinitely (e.g., steel bar).  \n- Step 2: Induced magnets (e.g., iron paperclip) only become magnetized in an external field; their nearest end always becomes the opposite pole.  \n- Step 3: Induced magnets lose their magnetism quickly when removed from the field, while permanent magnets retain theirs.  \n\nTakeaway: Permanent magnets have fixed poles and lasting fields; induced magnets only react to external fields.", "source": "Qwen 3 235B ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Why is the right-hand thumb rule used for electromagnetism, and why can’t Fleming’s left-hand rule be used instead?", "answer": "- Step 1: The right-hand thumb rule determines the **direction of the magnetic field** around a current-carrying wire (thumb = current, fingers = field).  \n- Step 2: Fleming’s left-hand rule determines the **direction of force** on a conductor in a magnetic field (first finger = field, second = current, thumb = motion).  \n+ Misconception: Confusing the two rules leads to errors in predicting field vs. force direction.  \n- Step 3: They serve different purposes: one for field generation (right hand), the other for force prediction (left hand).  \n\nTakeaway: Use right hand for field direction, left hand for force direction.", "source": "Qwen 3 235B ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "How does the motor effect demonstrate the interaction between two magnetic fields? (3 steps)", "answer": "- Step 1: A current-carrying wire produces a circular magnetic field around it (electromagnetism).  \n- Step 2: When placed in an external magnetic field (e.g., between magnet poles), the two fields interact.  \n- Step 3: The interaction creates a net force due to field line compression/repulsion, pushing the wire perpendicular to both fields (Fleming’s left-hand rule).  \n\nTakeaway: The motor effect arises from the physical interaction of the wire’s field and the external field.", "source": "Qwen 3 235B ①", "_id": "qwen_1_14", "judge_pick": true}, {"question": "Why does a solenoid with an iron core produce a stronger magnetic field than one without? (3 steps)", "answer": "- Step 1: The solenoid generates a magnetic field when current flows, with field lines shaped like a bar magnet.  \n- Step 2: The iron core becomes an induced magnet, aligning its domains with the solenoid’s field.  \n+ Analogy: Like stacking multiple bar magnets inside the solenoid, the iron amplifies the field.  \n- Step 3: The combined field of the solenoid and the induced magnet creates a much stronger overall magnetic flux density (B).  \n\nTakeaway: Iron core enhances field strength by becoming an induced magnet.", "source": "Qwen 3 235B ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "What is the difference between magnetic flux density (B) and magnetic field lines?", "answer": "- Step 1: Magnetic flux density (B) is a quantitative measure of field strength, with units of tesla (T), representing force per unit current and length (B = F/IL).  \n- Step 2: Magnetic field lines are a visual model showing the direction and relative strength of the field (closer lines = stronger field).  \n+ Misconception: Field lines are not physical objects but a conceptual tool.  \n- Step 3: While field lines help visualize the field, B provides a numerical value for its strength.  \n\nTakeaway: B is a measurable quantity; field lines are a visual representation.", "source": "Qwen 3 235B ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "How does a plotting compass trace the direction of a magnetic field line? (2 steps)", "answer": "- Step 1: The compass needle aligns with the magnetic field direction at its location (north pole of needle points along field lines).  \n- Step 2: By placing the compass at multiple points and marking the needle’s direction, you can trace the field line’s path from N to S.  \n\nTakeaway: The compass needle shows the local field direction, allowing reconstruction of field lines.", "source": "Qwen 3 235B ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Why is the force on a current-carrying wire in a magnetic field maximum when the wire is perpendicular to the field? (3 steps)", "answer": "- Step 1: The force depends on the component of the current perpendicular to the magnetic field.  \n- Step 2: When the wire is perpendicular, the entire current contributes to producing a force (F = BIL).  \n+ Contrast: If the wire is parallel, there’s no perpendicular component, so F = 0.  \n- Step 3: At intermediate angles, the force is proportional to sinθ, where θ is the angle between the wire and the field.  \n\nTakeaway: Perpendicular alignment maximizes the effective interaction between current and field.", "source": "Qwen 3 235B ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "How does a DC motor convert electrical energy into kinetic energy? (3 steps)", "answer": "- Step 1: Current flows through a coil in a magnetic field, creating forces on opposite sides of the coil (Fleming’s left-hand rule).  \n- Step 2: These forces act in opposite directions, creating a torque that rotates the coil.  \n- Step 3: The split-ring commutator reverses current direction every half-turn, ensuring continuous rotation in the same direction.  \n\nTakeaway: Electrical energy → magnetic field interaction → mechanical rotation via torque.", "source": "Qwen 3 235B ①", "_id": "qwen_1_19", "judge_pick": false}, {"question": "Why does a compass needle point north? (3 steps)", "answer": "- Step 1: The compass needle is a small magnet with a north pole that aligns with Earth’s magnetic field.  \n- Step 2: Earth’s geographic North Pole is a magnetic south pole, so the compass’s north pole is attracted to it.  \n+ Analogy: Like a bar magnet, Earth’s field pulls the compass needle’s poles in opposite directions.  \n- Step 3: The needle settles in the N-S direction, aligning with Earth’s magnetic field lines.  \n\nTakeaway: The compass needle aligns with Earth’s magnetic field, pointing toward the magnetic south pole (geographic North).", "source": "Qwen 3 235B ①", "_id": "qwen_1_20", "judge_pick": false}, {"question": "What is the role of the magnetic field in the motor effect? (3 steps)", "answer": "- Step 1: The magnetic field provides the external influence that interacts with the current-carrying wire’s own field.  \n- Step 2: Without the external field, there would be no force on the wire; the interaction between the two fields generates the force.  \n+ Example: A wire with current in a vacuum (no external field) experiences no force.  \n- Step 3: The direction and strength of the external field determine the magnitude and direction of the force (F = BIL).  \n\nTakeaway: The external magnetic field is essential for the motor effect to occur.", "source": "Qwen 3 235B ①", "_id": "qwen_1_21", "judge_pick": false}, {"question": "How does the right-hand grip rule determine the polarity of a solenoid? (3 steps)", "answer": "- Step 1: Grasp the solenoid with your right hand, fingers pointing in the direction of conventional current.  \n- Step 2: Your thumb points toward the north pole of the solenoid.  \n+ Analogy: Like a bar magnet, the end where the thumb points is the N pole.  \n- Step 3: Reversing the current or the direction of the grip swaps the poles.  \n\nTakeaway: The right-hand grip rule links current direction to solenoid polarity.", "source": "Qwen 3 235B ①", "_id": "qwen_1_22", "judge_pick": false}, {"question": "Why does a magnetic material like iron always get attracted to a magnet? (3 steps)", "answer": "- Step 1: Magnetic materials (iron, nickel, cobalt) are attracted to magnets because their domains align with the external field.  \n- Step 2: The end of the material nearest the magnet becomes the opposite pole, leading to attraction.  \n+ Example: A paperclip near a magnet’s north pole becomes a south pole at the closest end.  \n- Step 3: This attraction occurs regardless of the magnet’s orientation, so the material is always attracted, never repelled.  \n\nTakeaway: Magnetic materials are attracted because they become induced magnets with opposite poles.", "source": "Qwen 3 235B ①", "_id": "qwen_1_23", "judge_pick": false}, {"question": "How does the motor effect depend on the length of the wire in the magnetic field? (3 steps)", "answer": "- Step 1: The force (F) on the wire is directly proportional to the length (L) of the wire in the magnetic field (F = BIL).  \n- Step 2: A longer wire increases the number of moving charges interacting with the magnetic field, enhancing the force.  \n+ Example: Doubling the length of the wire in the field doubles the force.  \n- Step 3: Only the portion of the wire inside the field contributes to the force; external parts do not.  \n\nTakeaway: Longer wires in the field produce greater force due to increased interaction.", "source": "Qwen 3 235B ①", "_id": "qwen_1_24", "judge_pick": false}], "count": 25}, "qwen_2": {"label": "Qwen 3 235B ②", "cards": [{"question": "Why do magnetic field lines never cross each other, and how does this relate to the uniqueness of magnetic field direction at any point? (2 steps)", "answer": "- Step 1: **Field direction uniqueness**  \nMagnetic field lines represent the direction of the magnetic force at any point. If two lines crossed, there would be two different directions of the force at the intersection point, which is physically impossible. The magnetic field at a point must have a single net direction due to vector addition of overlapping fields.\n\n- Step 2: **Visualizing field interactions**  \nImagine two bar magnets repelling. Their field lines deform but never cross. Instead, they combine to create a new resultant direction at every point. This behavior reflects how magnetic fields superimpose rather than intersect, maintaining a single field direction.\n\n+ Example: Between opposite poles of a magnet, field lines run straight from N to S, creating a uniform field with consistent direction.  \n+ Example: Around a current-carrying wire, concentric circles never intersect because the direction of the field is tangential at every radius.", "source": "Qwen 3 235B ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why is attraction alone insufficient proof that an object is a permanent magnet, and what test would confirm it? (2 steps)", "answer": "- Step 1: **Magnetic material vs. magnet distinction**  \nMagnetic materials (iron, cobalt, etc.) are attracted to both poles of a permanent magnet regardless of orientation. For example, an unmagnetized iron nail is attracted to either end of a bar magnet, but it is not itself a magnet. Attraction proves the object is magnetic, not necessarily a magnet.\n\n- Step 2: **Repulsion as definitive proof**  \nOnly two like poles (N-N or S-S) repel each other. To test if an object is a magnet, bring it near a known magnet’s pole. If repulsion occurs, the object is confirmed a magnet. Attraction only confirms it’s magnetic material or an induced magnet.\n\n+ Misconception: A compass needle pointing north is attracted to Earth's geographic North Pole, which is a magnetic south pole. This attraction alone doesn’t prove Earth is a magnet — repulsion from the opposite pole would.  \n+ Practical case: A scrapyard electromagnet attracts iron without being permanently magnetized. Repulsion isn’t possible unless the iron itself becomes an induced magnet.", "source": "Qwen 3 235B ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How does a split-ring commutator ensure continuous rotation in a d.c. motor, and what would happen if it were replaced with a solid ring? (3 steps)", "answer": "- Step 1: **Current reversal mechanism**  \nAt 90° rotation, the split-ring commutator disconnects from the carbon brushes, momentarily breaking the circuit. As the coil continues past vertical due to inertia, the commutator reconnects in reverse: the brush previously touching the left segment now contacts the right segment. This reverses current direction in the coil every half-turn.\n\n- Step 2: **Force direction preservation**  \nFleming’s left-hand rule dictates that reversing current in the coil flips the force direction. However, because the coil has rotated 180°, the side that was previously on the left is now on the right. The combination of reversed current and physical position maintains the thrust in the original rotational direction.\n\n- Step 3: **Solid ring consequences**  \nA solid ring would maintain continuous electrical contact but never reverse current. The force on the coil would reverse direction when the coil aligns vertically (current path unchanged), causing it to oscillate around the equilibrium position instead of rotating. The motor would stall.\n\n+ Visual analogy: A seesaw that flips direction every time it reaches the horizontal position keeps swinging, whereas a rigid seesaw without direction reversal would lock in place.  \n+ Real-world design: The gap in the commutator must be precisely sized — too large, and the motor stalls; too small, and arcing damages the brushes.", "source": "Qwen 3 235B ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Explain why the motor effect force $F = BIL$ depends on magnetic flux density $B$, current $I$, and length $L$, but not on the angle between the wire and the field in GCSE Physics. (3 steps)", "answer": "- Step 1: **Physical meaning of each variable**  \n- $B$: The magnetic field strength determines how much force a given current experiences (higher $B$ means stronger field).  \n- $I$: More current means more moving charges in the wire, each experiencing a force due to the magnetic field.  \n- $L$: A longer conductor has more charges interacting with the field, amplifying the total force.\n\n- Step 2: **Angle dependency in advanced physics**  \nIn reality, the full formula is $F = BIL \\sin \\theta$, where $\\theta$ is the angle between the wire and the magnetic field. At 90°, $\\sin \\theta = 1$ (maximum force); at 0°, $\\sin \\theta = 0$ (no force). GCSE simplifies this by only considering the case where the wire is perpendicular ($\\theta = 90°$), so $\\sin \\theta$ is omitted.\n\n- Step 3: **Design implications**  \nMotors and generators are engineered to keep wires/loops perpendicular to the magnetic field for maximum efficiency. If the wire were angled (e.g., 30°), the effective force would be halved ($\\sin 30° = 0.5$), requiring adjustments to achieve the same torque.\n\n+ Edge case: A wire parallel to the field experiences zero force, explaining why the coil in a motor must have a split-ring commutator to reverse current before aligning with the field.  \n+ Practical example: Doubling the number of turns in a motor’s coil doubles $L$, directly doubling the force without changing $B$ or $I$.", "source": "Qwen 3 235B ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How does the Earth’s magnetic field compare to a bar magnet’s field, and why does a compass needle point north? (2 steps)", "answer": "- Step 1: **Field shape and source**  \nEarth’s magnetic field resembles a bar magnet’s field: field lines emerge from the magnetic south (geographic North Pole) and enter the magnetic north (geographic South Pole). However, Earth’s core generates the field through dynamo action (movement of molten iron) rather than a permanent magnet.\n\n- Step 2: **Compass needle alignment**  \nA compass needle is a permanent magnet with a north pole. By definition, it aligns with Earth’s magnetic field lines, pointing toward the magnetic south (geographic North Pole). This direction is called “magnetic north,” and the angle between true north and magnetic north is known as declination.\n\n+ Visual paradox: The geographic North Pole is a magnetic south because magnetic field lines emerge from it (N→S outside the Earth).  \n+ Navigation impact: Pilots and hikers must account for declination to convert compass readings to true geographic headings.", "source": "Qwen 3 235B ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why does a solenoid with an iron core produce a much stronger magnetic field than one without, and how does this compare to a permanent magnet? (2 steps)", "answer": "- Step 1: **Iron core’s role**  \nAn iron core becomes an induced magnet when placed in the solenoid’s field. The solenoid’s magnetic field aligns the iron’s atomic dipoles, and the core’s high permeability concentrates magnetic flux. This creates a combined field much stronger than the solenoid alone.\n\n- Step 2: **Contrast with permanent magnets**  \nA permanent magnet (e.g., a steel bar) maintains its field without an external current because its atomic dipoles are permanently aligned. An electromagnet’s field vanishes when the current stops, but its strength can be controlled by adjusting current, turns, or core material.\n\n+ Practical use: Scrapyard electromagnets use iron cores to lift heavy machinery, switching on/off as needed.  \n+ Limitation: Iron cores eventually saturate — increasing current beyond a point no longer amplifies $B$.", "source": "Qwen 3 235B ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "How does Fleming’s left-hand rule determine the direction of force on a current-carrying wire in a magnetic field, and why must all three quantities (field, current, force) be mutually perpendicular? (2 steps)", "answer": "- Step 1: **Finger assignments and 3D orientation**  \nFleming’s left-hand rule assigns:  \n- First finger = Magnetic Field (N→S),  \n- Second finger = Conventional Current (+→−),  \n- Thumb = Force (Motion).  \nThese must be mutually perpendicular because the force arises from the vector cross product $ \\vec{F} = I \\vec{L} \\times \\vec{B} $, which is maximized when the vectors are at 90° to each other.\n\n- Step 2: **Consequences of non-perpendicular alignment**  \nIf the current or field is not aligned with the rule’s directions (e.g., wire at 45° to the field), the force direction still follows the cross product but its magnitude decreases ($F = BIL \\sin \\theta$). At GCSE, this angle factor is ignored by always using 90° orientation.\n\n+ Common error: Using the right hand instead of the left reverses the force direction.  \n+ Real-world example: In a motor, the coil is designed to keep its sides perpendicular to the field for maximum torque.", "source": "Qwen 3 235B ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "Why is the magnetic field inside a solenoid uniform, and how does this compare to the field around a straight current-carrying wire? (2 steps)", "answer": "- Step 1: **Solenoid field mechanism**  \nInside a solenoid, the field from each loop reinforces the field of adjacent loops. The combined effect is a uniform field along the solenoid’s axis, similar to a bar magnet. The field strength is given by $ B = \\mu_0 \\frac{NI}{L} $, where $ N $ is the number of turns, $ I $ the current, and $ L $ the solenoid’s length.\n\n- Step 2: **Wire field vs. solenoid**  \nA straight wire’s field forms concentric circles with strength $ B = \\frac{\\mu_0 I}{2\\pi r} $, decreasing with distance $ r $. The solenoid’s uniform field contrasts with the wire’s radially decreasing field, making solenoids ideal for creating controlled magnetic environments.\n\n+ Engineering application: MRI machines use solenoids to produce stable, uniform magnetic fields for imaging.  \n+ Visualization: Iron filings inside a solenoid align uniformly; filings around a wire form circular patterns.", "source": "Qwen 3 235B ②", "_id": "qwen_2_7", "judge_pick": false}], "count": 8}, "minimax_1": {"label": "MiniMax M1 ①", "cards": [{"question": "A student says, \"My iron nail is a magnet because it attracts paperclips.\" Explain why this statement is incorrect and what the correct term is for this phenomenon. (2 steps)", "answer": "- Step 1: The nail is not acting as a magnet — it is a **magnetic material** (iron) being temporarily turned into an **induced magnet**. When placed near a magnet (or the permanent magnet's field), the domains inside the iron align, causing attraction.\n- Step 2: An induced magnet only exhibits magnetism while in an external field and loses it when removed. True magnets (permanent magnets) have fixed poles and can repel like poles — something the iron nail cannot do.\n\n**Takeaway:** All magnets attract magnetic materials, but that doesn't make those materials magnets themselves.", "source": "MiniMax M1 ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "You have two metal bars. One is a permanent magnet, the other is just iron (not magnetised). Describe a method using only these two bars to determine which is the permanent magnet, without any other equipment. (2 steps)", "answer": "- Step 1: Bring one end of bar A close to the middle of bar B. If they attract, this tells you bar B is magnetic material (iron), but this alone doesn't prove bar A is a magnet — it could also be magnetic material.\n- Step 2: Now bring the end of bar A to one end of bar B. If they **repel**, then bar A must be a permanent magnet (because repulsion only occurs between two magnets with like poles). If they only attract, bar A is also just iron. The key test is **repulsion**, not attraction.\n\n**Takeaway:** Attraction alone cannot distinguish a magnet from magnetic material — repulsion is the definitive test.", "source": "MiniMax M1 ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Why are there no magnetic monopoles? Explain using the concept of magnetic field lines. (2 steps)", "answer": "- Step 1: Magnetic field lines always form **closed loops** — they emerge from the north pole, travel through the external space, and enter the south pole, then continue **inside** the magnet back to the north pole.\n- Step 2: If you cut a bar magnet in half, you don't get isolated north and south poles. Instead, each half becomes its own complete magnet with both north and south poles, because the internal field lines continue through the cut. Every piece always has two poles.\n\n**Takeaway:** Magnetic poles always exist in pairs because field lines must form complete closed loops.", "source": "MiniMax M1 ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A plotting compass is placed at point P near a bar magnet. The compass needle points with its N-pole towards the south pole of the magnet. Is point P inside or outside the magnet's field? Explain your reasoning. (2 steps)", "answer": "- Step 1: A compass needle aligns with the magnetic field direction — its N-pole points in the direction that field lines are *going*.\n- Step 2: Field lines go **from N to S** outside the magnet. Since the compass N-pole points toward the magnet's S-pole, the field at P is directed toward the S-pole — this is the external field region. If P were inside the magnet (where field goes from S to N), the compass would point the opposite way.\n\n**Takeaway:** Outside a magnet, field lines go N→S; the compass N-pole shows the field direction.", "source": "MiniMax M1 ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "In a uniform magnetic field between two opposite poles, the field lines are equally spaced. What does this tell you about the field strength, and how would this compare to the field strength near the poles themselves? (2 steps)", "answer": "- Step 1: **Equal spacing = equal strength**. In a uniform field, the magnetic flux density (B) is the same at every point — that's why the lines are evenly parallel.\n- Step 2: Near the poles themselves, field lines are much closer together (denser), indicating a **stronger** field. The density of field lines directly represents field strength: close together = strong, far apart = weak.\n\n**Takeaway:** Uniform field = equally spaced parallel lines = constant strength everywhere in that region.", "source": "MiniMax M1 ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A wire carrying current is held parallel to the Earth's magnetic field. Will it experience a force? Explain why or why not using the motor effect principle. (2 steps)", "answer": "- Step 1: The motor effect produces a force **only when the wire is perpendicular (90°) to the magnetic field lines**. The force is zero when the wire is parallel to the field.\n- Step 2: If the wire is held parallel to Earth's field, the two magnetic fields (the one around the wire and Earth's field) interact **along the same line**, producing no net sideways force. For a force to exist, the wire must \"cut across\" the field lines.\n\n**Takeaway:** Wire parallel to field → F = 0; wire perpendicular to field → maximum force.", "source": "MiniMax M1 ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A current-carrying wire produces a circular magnetic field. If you reverse the direction of the current, what happens to the direction of the magnetic field lines? (1 step)", "answer": "- The magnetic field circles **reverse direction**. Using the right-hand thumb rule: point thumb in the new current direction, and your curled fingers show the new field direction. Since current reversed, the field circles are now anticlockwise instead of clockwise (or vice versa). The field strength stays the same, but the direction flips.\n\n**Takeaway:** Reverse current → reverse field direction; the field always circles perpendicular to the current.", "source": "MiniMax M1 ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "You are looking at the end of a solenoid. You observe the current flowing clockwise around the coil as seen from your position. Is this end a north pole or a south pole? Explain using the solenoid polarity rule. (1 step)", "answer": "- **Clockwise current = South pole**. The rule is: look along the solenoid from one end — if the current flows **clockwise**, that end is the **S pole**; if it flows **anticlockwise**, that end is the **N pole**. This is essentially the right-hand thumb rule applied to the whole coil (thumb points through the coil = N pole direction).\n\n**Takeaway:** Clockwise = S, Anticlockwise = N when viewing the end of a solenoid.", "source": "MiniMax M1 ①", "_id": "minimax_1_7", "judge_pick": true}, {"question": "A solenoid is producing a magnetic field. State four ways to increase the strength of this magnetic field, and explain why each works. (4 steps)", "answer": "- **Step 1:** Increase the current — more electrons flowing means a stronger magnetic field is produced around each turn.\n- **Step 2:** Increase the number of turns (N) — more turns means the field contributions add up over a greater length, creating a stronger combined field.\n- **Step 3:** Decrease the length of the solenoid (while keeping turns constant) — this concentrates the same number of turns into a shorter space, making the field denser inside.\n- **Step 4:** Add an iron core — the iron becomes an induced magnet, and its magnetic field adds to (and greatly amplifies) the solenoid's field.\n\n**Takeaway:** All four methods increase the total magnetic flux density inside the solenoid.", "source": "MiniMax M1 ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "An electromagnet used in a scrapyard crane can lift heavy cars, but when the power is switched off, the cars fall. Explain why the electromagnet loses its magnetism when the current stops. (2 steps)", "answer": "- Step 1: An electromagnet is a **solenoid with an iron core**. The iron core is an induced magnet — it becomes magnetic only because it's in the external field produced by the solenoid's current.\n- Step 2: When the current stops, the solenoid's field disappears. Without this external field, the iron's induced magnetism disappears too (the domains randomly reorient). The \"magnet\" was never a permanent magnet — it was entirely dependent on current flow.\n\n**Takeaway:** Electromagnets are temporary magnets controlled by current; cut the current, lose the magnet.", "source": "MiniMax M1 ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "A wire carrying current is placed in a magnetic field. Using Fleming's left-hand rule, if the field points from left to right and the current points into the page, in which direction does the force act? (2 steps)", "answer": "- **Step 1:** Orient your left hand: First finger (field) points left→right, Second finger (current) points into the page (away from you).\n- **Step 2:** Your thumb now points **downward**. This is the direction of the force (motion) on the wire. All three directions are mutually perpendicular.\n\n**Takeaway:** Fleming's left-hand rule gives the force direction when you know field and current directions.", "source": "MiniMax M1 ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A student argues that Fleming's left-hand rule and the right-hand thumb rule are the same thing. Explain why this is a misconception and distinguish what each rule is used for. (2 steps)", "answer": "- **Step 1:** The **right-hand thumb rule** tells you the **direction of the magnetic field** around a current-carrying wire. It's about field direction, using your thumb for current and fingers for field.\n- **Step 2:** **Fleming's left-hand rule** tells you the **direction of force** on a current-carrying wire in an external magnetic field. It's about motion/force, using different fingers: first finger = field, second finger = current, thumb = force. They are completely different rules for different purposes — one is for field direction, the other for force direction.\n\n**Takeaway:** Right-hand thumb rule → field direction; Fleming's left-hand rule → force/motion direction.", "source": "MiniMax M1 ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "The magnetic flux density B is measured in tesla (T). Using the formula F = BIL, explain what 1 tesla physically represents — what must be true for a field to have B = 1 T? (2 steps)", "answer": "- **Step 1:** From F = BIL, rearranged: B = F/(IL). The units are N/(A·m), which defines 1 tesla.\n- **Step 2:** **1 tesla** = a magnetic field such that a 1-metre wire carrying 1 ampere of current (perpendicular to the field) experiences a force of 1 newton. So B = 1 T means: 1 m × 1 A → 1 N force.\n\n**Takeaway:** 1 T = 1 N/(A·m); a 1m wire with 1A in the field experiences 1N of force.", "source": "MiniMax M1 ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In a simple d.c. motor, what would happen if the split-ring commutator were replaced with a continuous metal ring (no split)? Would the motor still rotate continuously? Explain. (2 steps)", "answer": "- **Step 1:** Without the split, the current direction in the coil would **never reverse**. When the coil passes the vertical position, the forces would now oppose the rotation (one pushes up, the other pushes down), causing the coil to slow and eventually stop — or vibrate back and forth.\n- **Step 2:** The split-ring commutator is essential because it **reverses the current** every half-turn, ensuring the forces always act in the same rotational direction. A continuous ring cannot do this.\n\n**Takeaway:** The split is essential — it reverses current to maintain continuous rotation in one direction.", "source": "MiniMax M1 ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In a d.c. motor, at the exact moment when the coil is vertical (perpendicular to the magnetic field), what happens to the forces on the coil and why does rotation continue anyway? (2 steps)", "answer": "- **Step 1:** At the vertical position, the coil's sides are moving **parallel** to the magnetic field lines. Since force = BIL requires the wire to be perpendicular to the field, at this exact position the forces are **zero** — no thrust.\n- **Step 2:** However, the coil has **momentum** from its previous rotation. It carries on moving past the vertical position. Just after passing vertical, the split-ring commutator reverses the current, so new forces kick in to continue pushing in the same rotational direction.\n\n**Takeaway:** The zero-force position is brief; momentum carries the coil through, and current reversal keeps it rotating.", "source": "MiniMax M1 ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A d.c. motor is running but rotating too slowly. State three ways to increase its speed, and explain the physics behind each. (3 steps)", "answer": "- **Step 1:** Increase the current — more current means greater force on the coil sides (F ∝ I), so faster acceleration and higher top speed.\n- **Step 2:** Use stronger permanent magnets — stronger B field means greater force (F ∝ B), producing more torque.\n- **Step 3:** Reduce friction in the bearings — less energy lost to friction means more of the electrical energy converts to kinetic rotation.\n\n**Takeaway:** Motor speed increases with stronger magnetic field, higher current, and reduced mechanical losses.", "source": "MiniMax M1 ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "If you reverse the direction of current in a d.c. motor, what happens to its rotation? Explain why this occurs. (1 step)", "answer": "- The motor rotates in the **opposite direction**. Reversing the current reverses the direction of the force on each side of the coil (Fleming's left-hand rule). What was \"push up\" becomes \"push down\" and vice versa, so the coil spins the other way.\n\n**Takeaway:** Reverse current → reverse rotation; the motor's direction depends on current direction.", "source": "MiniMax M1 ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Two students are discussing electromagnets. Student A says, \"Electromagnets are better than permanent magnets because they're stronger.\" Student B says, \"No, permanent magnets are better because they never lose their magnetism.\" Evaluate both statements and give a scenario where each type is more appropriate. (3 steps)", "answer": "- **Step 1:** Student A is partially right — electromagnets *can* be made very strong (high current, many turns, iron core), and their strength is controllable. But they're not inherently \"better\" — they require power and cease working when current stops.\n- **Step 2:** Student B is also partially right — permanent magnets maintain their field indefinitely without power. However, they cannot be turned off or adjusted, and their strength is fixed.\n- **Step 3:** **Appropriate uses:** Electromagnets are better for **controlled, temporary** applications (scrapyard cranes, electric bells, particle accelerators). Permanent magnets are better for **always-on, fixed** applications (compasses, fridge magnets, speakers).\n\n**Takeaway:** Neither is universally \"better\" — the choice depends on whether you need controllable/temporary magnetism or always-on fixed magnetism.", "source": "MiniMax M1 ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A wire of length 0.1 m carrying 2 A of current is placed perpendicular to a magnetic field of flux density 0.5 T. Calculate the force on the wire. (1 step)", "answer": "- Using F = BIL:\n- F = 0.5 × 2 × 0.1 = **0.1 N**\n\nThe force is 0.1 newtons. This is a straightforward substitution: B (0.5 T) × I (2 A) × L (0.1 m) = F.\n\n**Takeaway:** F = BIL with all values in SI units (tesla, amperes, metres).", "source": "MiniMax M1 ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A wire experiences a force of 0.24 N when carrying 3 A of current in a magnetic field. If the length of wire in the field is 0.08 m, what is the magnetic flux density B? (1 step)", "answer": "- Rearranging F = BIL: B = F/(IL)\n- B = 0.24 / (3 × 0.08) = 0.24 / 0.24 = **1.0 T**\n\nThe magnetic flux density is 1 tesla. Simply divide the force by the product of current and length.\n\n**Takeaway:** B = F/(IL); remember to convert all lengths to metres first.", "source": "MiniMax M1 ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In the Earth's magnetic field, a compass points toward the geographic North Pole. However, the geographic North Pole is actually a magnetic south pole. Explain this apparent contradiction. (2 steps)", "answer": "- **Step 1:** The compass needle's **north pole** points in the direction that magnetic field lines are *going*. Field lines point **out of** magnetic south poles and **into** magnetic north poles.\n- **Step 2:** The geographic North Pole (where all longitude lines meet) is actually a **magnetic south pole** — magnetic field lines point *out* of it toward the geographic north. Therefore, the compass N-pole is attracted to this magnetic south, pointing toward the geographic North. The naming convention is historical, not logical.\n\n**Takeaway:** Geographic North = magnetic South (field lines point out); compass N-pole points to it.", "source": "MiniMax M1 ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Explain why a solenoid produces a stronger magnetic field inside than a single straight wire carrying the same current, even though the same current flows through both. (2 steps)", "answer": "- **Step 1:** In a straight wire, the field circles the wire once and spreads out. At any point inside, you get only the contribution from that single path.\n- **Step 2:** In a solenoid, **N turns** of wire are wound close together. Each turn produces a field in the same direction inside the coil. These fields **add up** (superpose), so the total field inside is approximately N times stronger than a single turn. With an iron core, the field is amplified even further.\n\n**Takeaway:** Multiple turns add their fields constructively; more turns = stronger combined field.", "source": "MiniMax M1 ①", "_id": "minimax_1_21", "judge_pick": true}, {"question": "A plotting compass is placed at three different positions: (A) far from any magnet, (B) near the north pole of a bar magnet, (C) between two unlike poles (N–S) that are facing each other. Describe what the compass shows in each case. (3 steps)", "answer": "- **Step 1:** (A) Far away → compass aligns with **Earth's field**, pointing roughly north-south (N-pole toward geographic north/magnetic south).\n- **Step 2:** (B) Near N-pole → compass N-pole points **away** from the magnet's N-pole (repels), so it points opposite to the magnet, following field lines out of N-pole toward S.\n- **Step 3:** (C) Between unlike poles → field lines go **straight across** from N to S, so the compass needle points directly from the N-pole toward the S-pole (the field is uniform in the gap).\n\n**Takeaway:** Compass aligns with local field direction; its N-pole shows where field li
