o find $$B$$. Therefore, we must rearrange the formula to isolate $$B$$:\n        $$B = \\frac{F}{IL}$$\n- Step 2: **Ensure all quantities are in their correct SI units.**\n    +   The force $$F$$ is given in Newtons (N), which is the correct SI unit.\n    +   The current $$I$$ is given in Amperes (A), which is the correct SI unit.\n    +   The length $$L$$ is given in centimeters (cm). This must be converted to meters (m), the correct SI unit for length in this formula, by dividing by 100 (or multiplying by $$10^{-2}$$). So, $$20 \\text{ cm}$$ becomes $$0.20 \\text{ m}$$.\n- Step 3: **Substitute the values and conceptually understand the outcome.**\n    +   Once all values are in their correct SI units, they would be substituted into the rearranged formula:\n        $$B = \\frac{0.12 \\text{ N}}{(3 \\text{ A}) \\times (0.20 \\text{ m})}$$\n    +   The result would be a value in Tesla (T), which represents the strength of the magnetic field. Conceptually, we are determining how strong the magnetic field must be to produce the observed force given the current and the length of the wire.\n\nTo find the magnetic flux density, rearrange $$F=BIL$$ to $$B=F/IL$$, ensure all units are SI, and then substitute the given values.", "source": "Gemini 2.5 Flash ①", "blind_id": 136}, {"id": "gflash_2_18", "question": "Consider a d.c. motor. If you want to make the motor spin faster, what two parameters could you change, and why? If you want to reverse the direction of rotation, what two independent changes could you make? (4 steps)", "answer": "- Step 1: **Parameters to Increase Motor Speed (and Force).** To make the motor spin faster, you need to increase the magnitude of the turning effect (torque) on the coil. This can be achieved by increasing the force on the current-carrying sides of the coil. Based on $$F = BIL$$, the two primary parameters you can change are:\n    + **Increase the Current (I):** A larger current flowing through the coil means more moving charges interacting with the magnetic field. This directly leads to a greater force on the coil's sides, resulting in a larger turning effect and thus a faster rotation.\n    + **Increase the Magnetic Field Strength (B):** Using stronger permanent magnets (or a more powerful electromagnet) increases the magnetic flux density ($$B$$) through which the coil's wires pass. A stronger field interacts more forcefully with the current in the wire, producing a greater force and faster rotation.\n- Step 2: **Other ways to Increase Force (but not necessarily speed up motor *design*).**\n    + **Increase the number of turns in the coil:** More turns effectively increase the total length ($$L$$) of wire interacting with the field, leading to a greater overall force and turning effect.\n    + **Increase the area of the coil:** A larger coil area (and thus longer sides $$L$$) can increase the torque for the same forces.\n- Step 3: **Independent Changes to Reverse Direction of Rotation.** To reverse the direction of the motor's rotation, you need to reverse the direction of the force acting on the coil. According to Fleming's Left-Hand Rule, if the direction of the magnetic field or the current is reversed, the direction of the force will also reverse. Therefore, two independent changes you could make are:\n    + **Reverse the Direction of the Current:** This can be done by reversing the polarity of the power supply (e.g., swapping the positive and negative terminals of the battery). Reversing the current direction reverses the force on both sides of the coil, causing it to spin in the opposite direction.\n- Step 4: **Second independent change to reverse direction.**\n    + **Reverse the Direction of the Magnetic Field:** This can be done by swapping the North and South poles of the permanent magnets that provide the external magnetic field (e.g., physically flipping the magnets around). Reversing the field direction also reverses the force on the coil, leading to rotation in the opposite direction.\n    + **Important Note:** If you reverse *both* the current and the magnetic field simultaneously, the direction of the force (and thus rotation) will revert to the original direction, as two reversals cancel each other out.", "source": "Gemini 2.5 Flash ②", "blind_id": 137}, {"id": "minimax_2_23", "question": "A wire carrying current perpendicularly into the page sits in a magnetic field pointing LEFT. Using Fleming's left-hand rule, determine the force direction and explain how you would represent this in a 2D diagram. (2 steps)", "answer": "- Step 1: First finger = field (left), second finger = current (into page). With your left hand, first finger pointing left, second finger pointing into the page, your thumb points UP.\n- Step 2: To represent this in 2D: we use standard conventions. Current INTO the page is shown as a cross (×) (like the tail of an arrow). Current OUT OF the page is shown as a dot (•). The force direction (up) would be shown with an arrow. If force is into the page, you'd draw a cross in a circle.\n\n**Takeaway:** Fleming's rule gives 3D directions; 2D diagrams use × (into page) and • (out of page) conventions.", "source": "MiniMax M1 ②", "blind_id": 143}, {"id": "gflash_2_16", "question": "Explain the function of 'carbon brushes' in a d.c. electric motor. Why are they typically made of carbon, and what would happen if they were made of a highly rigid, unyielding material? (3 steps)", "answer": "- Step 1: **Function of Carbon Brushes.** Carbon brushes are stationary electrical contacts that press against the rotating split-ring commutator of a d.c. motor. Their main function is to conduct electrical current from the stationary external power supply (e.g., a battery) into the rotating coil, and then back out of the coil to complete the circuit. They maintain a continuous electrical connection even as the coil and commutator spin.\n- Step 2: **Why Carbon?** Carbon is used for several reasons:\n    + **Electrical Conductivity:** Carbon is a good electrical conductor, allowing current to flow efficiently into and out of the coil.\n    + **Lubrication/Low Friction:** Carbon is a relatively soft material and has self-lubricating properties. This means it creates low friction when rubbing against the metal commutator, reducing wear on both the brushes and the commutator itself, and preventing excessive heat generation.\n    + **Wear Resistance (Sacrificial):** While soft, carbon brushes are designed to wear down gradually over time. They act as sacrificial components that are easier and cheaper to replace than the commutator, protecting the more expensive and complex rotating parts.\n- Step 3: **Consequences of Rigid, Unyielding Brushes.** If the brushes were made of a highly rigid, unyielding material (e.g., hard metal):\n    + **Excessive Wear:** There would be significantly increased friction and wear on both the brushes and the commutator, leading to rapid degradation of the motor's components.\n    + **Sparking and Poor Contact:** A rigid material would be less able to maintain consistent contact with the commutator, especially if there are minor imperfections or vibrations during rotation. This could lead to intermittent electrical contact, causing sparks, arcing, and inefficient current transfer, potentially damaging the motor and reducing its performance.\n    + **Noise and Heat:** High friction would also generate more noise and heat, reducing the motor's efficiency and potentially leading to overheating.", "source": "Gemini 2.5 Flash ②", "blind_id": 153}, {"id": "qwen_2_5", "question": "Why does a solenoid with an iron core produce a much stronger magnetic field than one without, and how does this compare to a permanent magnet? (2 steps)", "answer": "- Step 1: **Iron core’s role**  \nAn iron core becomes an induced magnet when placed in the solenoid’s field. The solenoid’s magnetic field aligns the iron’s atomic dipoles, and the core’s high permeability concentrates magnetic flux. This creates a combined field much stronger than the solenoid alone.\n\n- Step 2: **Contrast with permanent magnets**  \nA permanent magnet (e.g., a steel bar) maintains its field without an external current because its atomic dipoles are permanently aligned. An electromagnet’s field vanishes when the current stops, but its strength can be controlled by adjusting current, turns, or core material.\n\n+ Practical use: Scrapyard electromagnets use iron cores to lift heavy machinery, switching on/off as needed.  \n+ Limitation: Iron cores eventually saturate — increasing current beyond a point no longer amplifies $B$.", "source": "Qwen 3 235B ②", "blind_id": 154}, {"id": "minimax_2_2", "question": "An iron nail is placed near a strong bar magnet but not touching it. Describe what happens at the atomic level and why the nail becomes an induced magnet. (3 steps)", "answer": "- Step 1: Iron is a magnetic material — its atoms have unpaired electrons that act as tiny atomic magnets (domains).\n- Step 2: In an unmagnetised iron piece, these domains point in random directions, cancelling each other out. When placed in an external field, the domains align with the field.\n- Step 3: The end of the iron nearest the external magnet's north pole becomes a south pole (opposite), because the aligned domains create their own field opposing the external field. This always causes attraction — an induced magnet is NEVER repelled.\n\n**Takeaway:** Induced magnets temporarily become magnets ONLY while in an external field, always with the opposite pole facing the inducing magnet.", "source": "MiniMax M1 ②", "blind_id": 155}, {"id": "minimax_1_21", "question": "Explain why a solenoid produces a stronger magnetic field inside than a single straight wire carrying the same current, even though the same current flows through both. (2 steps)", "answer": "- **Step 1:** In a straight wire, the field circles the wire once and spreads out. At any point inside, you get only the contribution from that single path.\n- **Step 2:** In a solenoid, **N turns** of wire are wound close together. Each turn produces a field in the same direction inside the coil. These fields **add up** (superpose), so the total field inside is approximately N times stronger than a single turn. With an iron core, the field is amplified even further.\n\n**Takeaway:** Multiple turns add their fields constructively; more turns = stronger combined field.", "source": "MiniMax M1 ①", "blind_id": 162}, {"id": "glm_3_37", "question": "A wire carries current eastward in a region where Earth's magnetic field points northward (horizontal). Which direction is the force on the wire — up, down, north, south, east, or west? (3 steps)", "answer": "- Step 1: Apply Fleming's left-hand rule. First finger: magnetic field direction is northward (N→S direction means field points north, so the \"south pole\" that attracts the compass N is further north... wait, let's be careful. The field direction is given as northward, so first finger points north).\n- Step 2: Second finger: conventional current direction is eastward. Your middle finger points east.\n- Step 3: With your left hand: first finger north, second finger east, your thumb points **upward** (out of the ground). The force on the wire acts vertically upward.\n\nTakeaway: Field north + current east → force upward. This is a real effect (very small due to Earth's weak field ~50 μT) but measurable with sensitive equipment.", "source": "GLM 5.1 ③", "blind_id": 166}, {"id": "gemini_4_0", "question": "What are the two fundamental sources of magnetic fields discussed in this topic?", "answer": "The two fundamental sources are:\n1.  **Permanent Magnets:** These are materials like iron, cobalt, nickel, and steel that have been magnetised. They produce their own persistent magnetic field due to the alignment of their internal atomic-level magnetic domains.\n2.  **Electric Currents:** Any moving electric charge creates a magnetic field. In a wire, this results in a circular magnetic field around it. When the wire is coiled into a solenoid, it creates a field very similar to a bar magnet. This phenomenon is called electromagnetism.", "source": "Gemini 2.5 Pro ④", "blind_id": 170}, {"id": "glm_3_41", "question": "Two identical electromagnets are placed with their north poles facing each other across a gap. If the current in one is reversed, what happens to the force between them — does it change from repulsive to attractive, or stay the same? (3 steps)", "answer": "- Step 1: Initially, both are N poles facing each other. Like poles repel, so there is a repulsive force between them.\n- Step 2: Reversing the current in one electromagnet reverses its polarity. The end that was N becomes S. Now the facing poles are N–S — unlike poles.\n- Step 3: Unlike poles attract, so the force changes from **repulsive to attractive**. This is one of the key advantages of electromagnets over permanent magnets — you can reverse the force direction simply by reversing the current, which you cannot do with a permanent magnet.\n\nTakeaway: Reverse current → reverse polarity → reverse force direction (repulsion ↔ attraction). Electromagnets are controllable.", "source": "GLM 5.1 ③", "blind_id": 171}, {"id": "minimax_1_29", "question": "Two wires run parallel to each other, both carrying current in the same direction. Do they attract, repel, or exert no force on each other? Explain using magnetic field interaction. (2 steps)", "answer": "- **Step 1:** Each wire produces its own magnetic field that circles around it. The field of wire A passes through wire B (and vice versa).\n- **Step 2:** These fields interact. Using Fleming's left-hand rule (or considering field alignment), the result is that **parallel currents attract**. If currents flow in opposite directions, they repel. This is the principle behind how electric motors experience forces.\n\n**Takeaway:** Parallel currents attract; antiparallel currents repel.", "source": "MiniMax M1 ①", "blind_id": 172}, {"id": "gemini_1_23", "question": "What is the primary energy conversion that takes place in a D.C. motor?", "answer": "A D.C. motor is a device designed to convert **electrical energy** into **rotational kinetic energy** (mechanical energy). It uses the motor effect to create continuous rotation from an electrical current.", "source": "Gemini 2.5 Pro ①", "blind_id": 174}, {"id": "glm_3_35", "question": "A student says: \"Electromagnetism and electromagnetic induction are the same thing — both involve magnets and electricity.\" Explain why they are NOT the same, and identify the key distinction. (2 steps)", "answer": "- Step 1: **Electromagnetism** (as covered in this chapter) is the process where an **electric current produces a magnetic field**. You supply electrical energy (current), and a magnetic field is the output. This is the principle behind electromagnets and solenoids.\n- Step 2: **Electromagnetic induction** is the reverse process: a **changing magnetic field induces a voltage (and current) in a conductor**. You supply magnetic change (motion of a magnet near a wire), and electrical energy is the output. This is the principle behind generators. The two are related (both involve the interaction of electricity and magnetism) but are opposite in direction of energy conversion: electromagnetism converts electrical → magnetic; induction converts magnetic → electrical.\n\nTakeaway: Electromagnetism: current → magnetic field. Electromagnetic induction: changing field → current. They are reverse processes.", "source": "GLM 5.1 ③", "blind_id": 183}, {"id": "gflash_1_27", "question": "A simple d.c. motor has a coil with 50 turns. If the current through the coil is $$2 \\text{ A}$$ and the magnetic flux density is $$0.4 \\text{ T}$$, and each active side of the coil is $$5 \\text{ cm}$$ long, conceptually estimate how the total force on one side of the coil changes if you increase the number of turns to 100. (3 steps)", "answer": "- Step 1: **Identify the relevant formula and initial parameters.**\n    +   The force on a single wire segment in a magnetic field is $$F = BIL$$.\n    +   For a coil with multiple turns, the total force on one \"side\" (which consists of multiple wire segments stacked together) is the sum of the forces on each individual turn. So, if a coil has $$N$$ turns, the total force on one side is $$F_{\\text{total}} = N \\times (BIL)$$, assuming $$L$$ is the length of one turn's side.\n    +   Initial parameters: $$N_{\\text{initial}} = 50$$ turns, $$I = 2 \\text{ A}$$, $$B = 0.4 \\text{ T}$$, $$L = 5 \\text{ cm} = 0.05 \\text{ m}$$.\n- Step 2: **Calculate the initial total force (conceptually).**\n    +   First, calculate the force on a single turn's side: $$F_{\\text{single}} = 0.4 \\text{ T} \\times 2 \\text{ A} \\times 0.05 \\text{ m} = 0.04 \\text{ N}$$.\n    +   Then, the total force on one side with 50 turns: $$F_{\\text{total, initial}} = 50 \\times 0.04 \\text{ N} = 2 \\text{ N}$$.\n    +   This helps establish a baseline for comparison.\n- Step 3: **Analyze the effect of increasing the number of turns.**\n    +   The problem states the number of turns increases to 100. This means the number of turns is doubled ($$N_{\\text{new}} = 2 \\times N_{\\text{initial}} = 2 \\times 50 = 100$$).\n    +   Since the total force is directly proportional to the number of turns ($$F_{\\text{total}} \\propto N$$), doubling the number of turns will double the total force on that side of the coil, assuming $$B$$, $$I$$, and $$L$$ remain constant for each turn.\n    +   Therefore, the new total force $$F_{\\text{total, new}} = 100 \\times 0.04 \\text{ N} = 4 \\text{ N}$$.\n\nDoubling the number of turns from 50 to 100 will double the total force on one side of the coil, from $$2 \\text{ N}$$ to $$4 \\text{ N}$$, leading to a greater turning effect.", "source": "Gemini 2.5 Flash ①", "blind_id": 193}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A bar magnet is snapped in half. What magnetic poles do the two new pieces have, and what does this imply about the existence of magnetic monopoles? (2 steps)", "answer": "- Step 1: Each broken piece becomes a new, smaller magnet with its own North and South poles. The break does not isolate a single pole; the end that was originally closer to the North pole becomes the new North, and the opposite end becomes the new South.\n- Step 2: This demonstrates that magnetic monopoles (an isolated N or S pole) do not exist in nature. Unlike electric charges, which can be isolated as purely positive or negative, magnetic poles always come in inseparable pairs (dipoles).", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A metal rod is attracted to both the N pole and the S pole of a known bar magnet. Is the rod definitely a permanent magnet? Explain the alternative scenario. (3 steps)", "answer": "- Step 1: No, the rod is not definitely a permanent magnet. It could simply be an unmagnetised magnetic material (like iron, cobalt, or nickel).\n- Step 2: A magnetic material will be attracted to both poles of a magnet because of induced magnetism. When placed near the N pole, the nearest end of the rod becomes an induced S pole (attraction). When placed near the S pole, the nearest end becomes an induced N pole (attraction).\n- Step 3: To prove the rod is a true permanent magnet, it must be repelled by one of the poles of the known magnet. Repulsion only occurs between like poles (N-N or S-S), which requires both objects to have their own fixed poles.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Steel is used for permanent magnets, while soft iron is used for the core of electromagnets. Based on the concepts of permanent vs. induced magnetism, why is this distinction critical? (3 steps)", "answer": "- Step 1: A permanent magnet must retain its magnetism indefinitely. Steel is a \"hard\" magnetic material that keeps its domains aligned once magnetized, making it ideal for permanent magnets.\n- Step 2: An electromagnet core must lose its magnetism immediately when the current stops so it can release whatever it is holding. Soft iron is a \"soft\" magnetic material that loses its induced magnetism almost instantly when the external field is removed.\n- Step 3: If steel were used in an electromagnet, it would become permanently magnetized after the first use. A scrapyard crane using a steel core wouldn't be able to drop the scrap metal when the current is switched off. Iron allows the magnetism to be strictly temporary and controllable.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Two magnetic field lines are drawn on a diagram and they cross at a point P. Why is this diagram physically impossible? (2 steps)", "answer": "- Step 1: A magnetic field line represents the direction of the force on a N pole at that point. If two lines crossed at point P, it would imply the magnetic field points in two different directions at the exact same point in space simultaneously.\n- Step 2: This is physically impossible because a compass needle placed at point P could only point in one definitive direction. Therefore, magnetic field lines can never touch or cross.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Where is the magnetic field uniform in a setup with two opposite magnetic poles facing each other, and what happens to the field outside this region? (2 steps)", "answer": "- Step 1: The magnetic field is uniform in the gap directly between the opposite poles (N and S). Here, the field lines are parallel and equally spaced, indicating constant strength and a single direction.\n- Step 2: Outside the gap, the field lines spread out and curve around from N to S. This means the field becomes non-uniform—it weakens and changes direction with distance. The uniform region is strictly confined between the poles.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "The geographic North Pole of the Earth is actually near a magnetic south pole. Explain why this naming paradox doesn't contradict the behavior of a compass needle pointing \"North\". (3 steps)", "answer": "- Step 1: The fundamental law of magnetism states that unlike poles attract. A compass needle's \"North\" pointing end is a magnetic north pole.\n- Step 2: For the compass's north pole to be attracted to the geographic North, the region near the geographic North must effectively act as a magnetic south pole (where Earth's internal field lines return into the Earth).\n- Step 3: Historically, the \"North Pole\" was named for its geographic direction before the physics of Earth's magnetic field was understood. The compass needle's north pole is simply attracted to the Earth's magnetic south, which happens to be near the geographic North.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "A straight wire carries a conventional current upwards. Describe the shape and direction of the magnetic field produced around this wire using the right-hand thumb rule. (2 steps)", "answer": "- Step 1: The shape of the field is concentric circles centered on the wire. The field has no distinct poles; it forms closed loops around the current path and weakens with distance from the wire.\n- Step 2: Using the right-hand thumb rule: point the right thumb in the direction of conventional current (upwards). The curled fingers wrap in the direction of the field lines. Looking from above, the field lines circle in an anticlockwise direction. If the current stops, this field disappears entirely.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "How does the magnetic field inside a solenoid differ from the field outside it, and why is the solenoid's overall field described as \"like a bar magnet\"? (3 steps)", "answer": "- Step 1: Inside the solenoid, the field lines are parallel and equally spaced, creating a strong, uniform magnetic field. Outside, the field lines spread out and loop from one end of the coil to the other, creating a much weaker, non-uniform field.\n- Step 2: The external field lines emerge from one end of the solenoid, loop around, and enter the other end, exactly mimicking the external field shape of a bar magnet.\n- Step 3: Because the field emerges from one end (acting as a North pole) and enters the other (acting as a South pole), the solenoid behaves identically to a bar magnet in terms of its external field shape, while offering a highly uniform internal field that a bar magnet lacks.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Looking at one end of a solenoid, you observe the conventional current flowing in an anticlockwise direction. What magnetic pole is at that end, and how does the field line direction confirm this? (2 steps)", "answer": "- Step 1: That end is the North pole. A helpful mnemonic is that an anticlockwise current looks like the letter \"N\" (for North), while a clockwise current looks like an \"S\" (for South).\n- Step 2: By definition, magnetic field lines emerge from a North pole. Since the field lines are exiting that end of the solenoid to loop externally back to the South pole, the anticlockwise current must correspond to the North pole.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "An electromagnet is made by placing an iron core inside a solenoid. Conceptually, how does the iron core multiply the strength of the magnetic field compared to the empty solenoid? (3 steps)", "answer": "- Step 1: When the solenoid's magnetic field is switched on (by passing a current), the iron core is placed inside this external field and becomes an induced magnet.\n- Step 2: The magnetic domains inside the iron align with the solenoid's field. The iron core now generates its own strong magnetic field, which adds to the solenoid's pre-existing field.\n- Step 3: Because the iron's induced field and the solenoid's field are aligned and superimposed, the total combined magnetic field is much stronger than the solenoid's field alone. When the current stops, the iron quickly loses its induced magnetism, and the total field drops to zero.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A wire carrying a current is placed in an external magnetic field. Explain conceptually why a force acts on the wire, and why this force is zero if the wire is parallel to the field lines. (3 steps)", "answer": "- Step 1: The current in the wire generates its own circular magnetic field. The external magnetic field and the wire's magnetic field interact and superimpose on each other.\n- Step 2: On one side of the wire, the fields point in the same direction and reinforce each other (creating a stronger field), while on the other side, they point in opposite directions and cancel out (creating a weaker field). This field asymmetry creates a magnetic pressure that pushes the wire away from the stronger field towards the weaker field.\n- Step 3: If the wire is parallel to the external field, its circular field lines intersect the external field symmetrically all around the wire. There is no asymmetry (no \"strong side\" vs \"weak side\"), so the net magnetic pressure is zero, resulting in no force.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "In the formula $$F = BIL$$, explain the physical reasoning for why the force depends proportionally on the magnetic flux density ($$B$$), the current ($$I$$), and the length ($$L$$). (3 steps)", "answer": "- Step 1: $$B$$ (magnetic flux density) represents the strength of the external field. A stronger external field creates a greater asymmetry when interacting with the wire's field, leading to a larger magnetic pressure (force) on the wire.\n- Step 2: $$I$$ (current) determines the strength of the wire's own magnetic field. More current means a stronger field around the wire, which creates a greater asymmetry against the external field, increasing the force.\n- Step 3: $$L$$ (length in the field) represents the amount of wire experiencing this interaction. A longer wire in the field means more moving charges are subjected to the magnetic pressure, multiplying the total force proportionally.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "A wire of length $$0.1 \\text{ m}$$ carries a current of $$2 \\text{ A}$$ perpendicular to a magnetic field of flux density $$0.5 \\text{ T}$$. Calculate the force and state its direction relative to both the current and the field. (2 steps)", "answer": "- Step 1: Using $$F = BIL$$, substitute the values: $$F = 0.5 \\text{ T} \\times 2 \\text{ A} \\times 0.1 \\text{ m} = 0.1 \\text{ N}$$. (Mental math: $$0.5 \\times 2 = 1$$, and $$1 \\times 0.1 = 0.1$$).\n- Step 2: According to Fleming's left-hand rule, the force must be mutually perpendicular to both the magnetic field and the current. It acts at exactly $$90^\\circ$$ to both the wire and the field lines.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "When using Fleming's left-hand rule, what physical quantities do the first finger, second finger, and thumb represent? Why must it be the left hand and not the right hand? (3 steps)", "answer": "- Step 1: First finger = Magnetic Field direction (N to S). Second finger = Conventional Current direction (+ to -). Thumb = Motion/Force/Thrust direction.\n- Step 2: The three quantities are mutually perpendicular. The left hand establishes a specific 3D coordinate system that correctly models the cross-product of the magnetic field and current vectors yielding the force vector.\n- Step 3: The right hand is used for the right-hand thumb rule (which finds the direction of the magnetic field around a current-carrying wire). Using the right hand for the motor effect would yield a force in the opposite, incorrect direction, violating the physics of the motor effect.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "In a d.c. motor, what is the specific role of the split-ring commutator, and what would happen if a continuous unsplit ring were used instead? (3 steps)", "answer": "- Step 1: The split-ring commutator reverses the direction of the current in the coil every half-rotation (when the coil passes the vertical position).\n- Step 2: This reversal ensures that the force on each side of the coil always pushes in the same rotational direction (e.g., up on the left, down on the right), maintaining continuous one-directional rotation.\n- Step 3: If a continuous unsplit ring were used, the current direction in the coil would never reverse. After passing the vertical position, the forces would push in the opposite rotational direction, causing the motor to oscillate back and forth and stop at the vertical equilibrium position.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "When the coil of a d.c. motor is exactly vertical ($$90^\\circ$$ to the horizontal), the forces on the coil are zero. Explain why the motor doesn't just stop dead at this point. (2 steps)", "answer": "- Step 1: At the vertical position, the split-ring commutator gaps align with the carbon brushes. The circuit is briefly broken, so no current flows, and $$F = BIL$$ yields zero force.\n- Step 2: However, the coil has rotational momentum from the previous half-turn. This momentum carries the coil past the vertical \"dead zone.\" As soon as it passes vertical, the brushes reconnect to the opposite halves of the commutator, current flows again (now in the reversed direction within the coil), and the force resumes in the correct rotational direction.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Why are carbon brushes used to connect the external circuit to the rotating commutator, rather than fixed metal wires? (2 steps)", "answer": "- Step 1: The coil must be free to rotate continuously. Fixed metal wires would twist, tangle, and eventually snap as the coil spins.\n- Step 2: Carbon brushes are conducting blocks that press against the rotating split-ring commutator via spring tension. They maintain electrical contact through physical friction while allowing the ring to spin freely beneath them. Carbon is also self-lubricating and wear-resistant, making it ideal for this sliding contact.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A d.c. motor is running too slowly. Identify two distinct physical modifications (other than increasing the voltage) that would increase the rotational speed, and explain why. (3 steps)", "answer": "- Step 1: Increase the magnetic flux density ($$B$$) by using stronger permanent magnets. A stronger field increases the force ($$F = BIL$$) on the coil, leading to greater torque and faster rotation.\n- Step 2: Increase the number of turns on the coil. More turns effectively increase the total length of wire ($$L$$) carrying current in the field, which proportionally increases the total force and torque.\n- Step 3: (Alternative) Reduce friction in the bearings or commutator contact, allowing the motor to reach a higher equilibrium speed for the same driving force.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "A wire carries a current of $$5 \\text{ A}$$ in a uniform magnetic field of $$0.2 \\text{ T}$$. The wire is aligned exactly parallel to the magnetic field lines. What is the magnitude of the force on the wire, and why? (2 steps)", "answer": "- Step 1: The force is exactly zero ($$F = 0 \\text{ N}$$).\n- Step 2: The motor effect relies on the interaction of the wire's circular magnetic field with the external field to create an asymmetry (a \"push\"). When the wire is parallel to the external field, the circular field around the wire is symmetrical relative to the external field lines, resulting in no net sideways push on the moving charges. The formula $$F = BIL$$ applies only to the perpendicular component of the current.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}], "count": 19}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A bar magnet is cut perfectly in half. Does this isolate a single North pole on one piece and a single South pole on the other? Why or why not? (2 steps)", "answer": "- Step 1: No, cutting a magnet does not isolate a single pole (a monopole). Every magnet inherently has exactly two poles—a North and a South. This is a fundamental rule of magnetism: magnetic monopoles do not exist in isolation.\n- Step 2: When you cut the bar magnet, the newly created ends instantly become new poles. The piece with the original North pole gets a new South pole at the cut, and the piece with the original South pole gets a new North pole at the cut. You end up with two smaller, complete magnets, not isolated poles.\n\nTakeaway: Magnets are always dipoles; cutting them just creates more, smaller dipoles.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A bar of unknown material is brought near the North pole of a known magnet, and attraction occurs. Is the unknown material definitely a magnet? Why or why not? (3 steps)", "answer": "- Step 1: No, attraction alone is insufficient proof that the unknown material is a magnet. This is a very common misconception.\n- Step 2: Attraction could happen for two reasons:\n+ The material is simply a magnetic material (like unmagnetized iron) which is always attracted to a magnet regardless of orientation.\n+ The material is a magnet with its South pole facing the known North pole (unlike poles attract).\n- Step 3: To prove the material is a magnet, you must observe **repulsion**. If the unknown material is brought near the North pole and repelled, it must have a North pole facing it. Only a magnet (with fixed poles) can repel; a mere magnetic material cannot be repelled.\n\nTakeaway: Attraction is ambiguous; repulsion is the only definitive test for a magnet.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "When a piece of unmagnetized iron is placed near the North pole of a permanent magnet, what pole is induced at the nearest end of the iron, and why does this always result in an attractive force? (2 steps)", "answer": "- Step 1: The nearest end of the iron becomes a South pole. This happens because the external magnetic field from the permanent magnet forces the randomly oriented magnetic domains in the iron to align in a specific direction.\n- Step 2: Because the nearest end is South and the inducing magnet's end is North, they attract (unlike poles attract). This is why induced magnets are always attracted to the inducing field and never repelled—attraction is the energetically favorable alignment.\n\nTakeaway: Induction always creates an opposite pole at the closest point, guaranteeing attraction.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "An electromagnet uses a solenoid with an iron core, while a permanent magnet is typically made of steel. Why is iron strongly preferred over steel for the core of an electromagnet? (2 steps)", "answer": "- Step 1: Iron is a \"soft\" magnetic material, meaning it easily magnetizes and demagnetizes. When the current in the electromagnet is switched off, the iron core quickly loses its induced magnetism, turning the electromagnet off effectively.\n- Step 2: Steel is a \"hard\" magnetic material. If steel were used as the core, it would retain its magnetism even after the current stops, meaning the electromagnet would stay partially magnetized and could not be easily switched off. Thus, iron provides the temporary, controllable magnetism required for an electromagnet.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Why can magnetic field lines never cross or touch each other? (2 steps)", "answer": "- Step 1: Field lines represent the direction of the magnetic field at a given point in space. If two field lines were to cross, it would imply that at the exact intersection point, the magnetic field points in two different directions simultaneously.\n- Step 2: This is physically impossible. A compass needle placed at any single point in a magnetic field will align to exactly one resultant direction. Therefore, field lines cannot cross.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "The North pole of a compass needle points towards the Geographic North Pole of the Earth. Explain why this observation implies the Geographic North Pole is actually a magnetic South Pole. (2 steps)", "answer": "- Step 1: The North pole of a compass needle is attracted to a South pole (law of magnetism: unlike poles attract). It aligns itself along the Earth's field lines, pointing towards the Earth's magnetic pole.\n- Step 2: Since the compass North points towards the Geographic North, the Earth's magnetic pole located there must be a South pole. Similarly, the Geographic South Pole is a magnetic North pole. The Earth's internal field acts as if a giant bar magnet is inside with its South pole pointing geographically North.\n\nTakeaway: Geographic and magnetic poles are flipped; \"North\" on a map is \"South\" magnetically.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "A straight wire carries a conventional current flowing straight upwards. Using the right-hand thumb rule, what is the direction of the magnetic field on the east side of the wire, and what happens to the field if the current reverses? (3 steps)", "answer": "- Step 1: Point your right thumb in the direction of conventional current (upwards). Your curled fingers represent the direction of the magnetic field circling the wire.\n- Step 2: Looking from above, the fingers curl anticlockwise. This means the field lines circle from North to East to South to West. On the east side of the wire, the field direction is pointing towards you (out of the page if viewed horizontally).\n- Step 3: If the current reverses (flows downwards), the right-hand thumb points down. The fingers now curl clockwise from above. On the east side, the field direction reverses (into the page). Reversing current always reverses the magnetic field direction.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "Why is the magnetic field inside a solenoid strong and uniform, while the field outside is relatively weak and non-uniform? (3 steps)", "answer": "- Step 1: Inside the solenoid, the circular magnetic fields from each individual loop of wire overlap and reinforce each other, creating a combined field that points straight down the core.\n- Step 2: Because the loops are evenly spaced and parallel, the reinforcement is constant throughout the core, resulting in parallel, equally-spaced field lines—which represents a uniform field.\n- Step 3: Outside the solenoid, the fields from the top and bottom halves of the loops point in opposite directions and largely cancel each other out. The remaining external field resembles a bar magnet's field, spreading out and weakening rapidly with distance.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Looking at one end of a solenoid, you observe the conventional current flowing anticlockwise. Is this end a North or South pole, and how does this relate to the right-hand thumb rule? (2 steps)", "answer": "- Step 1: This end is a North pole. The standard mnemonic is: anticlockwise current = North (N) pole, clockwise current = South (S) pole.\n- Step 2: This directly follows from the right-hand thumb rule. If you curl your right hand in the anticlockwise direction of the current, your thumb points away from the end you are looking at. By convention, the direction your thumb points is the direction of the magnetic field inside the solenoid (which goes from S to N inside the magnet). Thus, the far end is S, and the end you are looking at is N.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "What is the fundamental cause of the force experienced by a current-carrying wire in an external magnetic field (the motor effect)? (2 steps)", "answer": "- Step 1: The force is caused by the interaction of two magnetic fields: the external magnetic field (e.g., from permanent magnets) and the circular magnetic field generated around the current-carrying wire.\n- Step 2: These two fields distort each other. The field lines are pushed together on one side (creating a region of stronger field, like a compressed spring) and spread apart on the other side (weaker field). The field lines effectively \"push\" the wire from the region of stronger field to weaker field, resulting in the motor effect force.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "A wire carries a current of 5 A and sits in a magnetic field of flux density 0.2 T. Under what orientation of the wire will it experience zero force, and why? (2 steps)", "answer": "- Step 1: The wire will experience zero force when it is parallel to the magnetic field lines.\n- Step 2: When parallel, the wire's circular magnetic field is symmetrical relative to the external field lines. There is no distortion that pushes field lines closer on one side compared to the other. The forces cancel out, resulting in no net thrust. (Force is maximum only when the wire is perpendicular, at $$90^\\circ$$, to the field).", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "A wire carries a conventional current flowing East. An external magnetic field points vertically Downwards. Using Fleming's left-hand rule, determine the direction of the force on the wire. (3 steps)", "answer": "- Step 1: Set up your left hand. The First finger represents the Field (N to S). Point your first finger Downwards.\n- Step 2: The seCond finger represents the Current (+ to -). Point your second finger Eastwards (it must be perpendicular to your first finger).\n- Step 3: Your thuMb will now point naturally in the direction of the Motion/Force. In this orientation, your thumb will point Southwards. The wire is pushed South.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "In the formula $$F = BIL$$ for the motor effect, why is the force directly proportional to the magnetic flux density ($$B$$), current ($$I$$), and length ($$L$$)? (3 steps)", "answer": "- Step 1: $$F \\propto B$$: A stronger external field (higher $$B$$) distorts the wire's field more aggressively, causing a stronger \"push\" from the uneven field line density.\n- Step 2: $$F \\propto I$$: A higher current creates a stronger magnetic field around the wire, leading to a stronger interaction and distortion with the external field.\n- Step 3: $$F \\propto L$$: A longer length of wire in the field means more of the wire's field is interacting with the external field. It's like having more parallel wires experiencing the same push; the total force adds up over the length.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "A wire of length 0.2 m carries a current of 2 A perpendicular to a magnetic field of flux density 0.5 T. What is the magnitude of the force on the wire? (2 steps)", "answer": "- Step 1: Use the formula $$F = BIL$$. Identify the values: $$B = 0.5$$ T, $$I = 2$$ A, $$L = 0.2$$ m. (Note: if length were in cm, you must convert to m first).\n- Step 2: Substitute into the formula: $$F = 0.5 \\times 2 \\times 0.2 = 0.2$$ N. The force is 0.2 Newtons.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "In a simple DC motor, a rectangular coil is placed in a uniform magnetic field. Why does the coil rotate instead of just being pushed linearly out of the field? (3 steps)", "answer": "- Step 1: Current flows around the coil. On one side of the coil, current flows in one direction (e.g., up), and on the opposite side, it flows in the opposite direction (e.g., down).\n- Step 2: According to Fleming's Left-Hand Rule, the force on the side with current flowing up will act in one direction (e.g., forwards), while the force on the opposite side with current flowing down will act in the reverse direction (e.g., backwards).\n- Step 3: These two equal and opposite forces are not acting along the same line; they act on opposite sides of the coil. This creates a \"couple\" (a turning effect or torque), causing the coil to spin rather than translate linearly.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "In a DC motor, when the coil rotates to the vertical position (90° to the horizontal start), the forces acting on the sides of the coil try to push it back. Why doesn't the motor just oscillate and stop at this vertical position? (2 steps)", "answer": "- Step 1: As the coil passes the vertical position, the split-ring commutator swaps the contacts. This reverses the direction of the current in the coil just as the forces are about to push it backwards.\n- Step 2: Because the current is reversed, the forces now push the coil forward in the same rotational direction it was already spinning. Additionally, the coil's own rotational momentum carries it past the exact vertical dead point where the commutator breaks contact. This ensures continuous, one-directional spin.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "What would happen to the rotation of a DC motor coil if the split-ring commutator were replaced with a continuous solid ring (slip rings)? (2 steps)", "answer": "- Step 1: A continuous ring would never reverse the direction of current in the coil. The current would keep flowing the same way around the coil throughout the entire rotation.\n- Step 2: As a result, the forces on the coil sides would remain in fixed directions in space. When the coil passes the vertical position, the forces would push it backwards. The coil would simply oscillate back and forth around the vertical position (like a seesaw) rather than completing full rotations. The split is essential to swap the current and keep the torque pushing in one rotational direction.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "How can you increase the speed of a DC motor, and how can you reverse its direction of rotation? (2 steps)", "answer": "- Step 1: To increase speed, you must increase the force (torque) on the coil. This can be done by increasing the current (more current = stronger field interaction), increasing the magnetic flux density (stronger permanent magnets), or increasing the number of turns on the coil (effectively increases total length of wire in the field).\n- Step 2: To reverse the direction of rotation, you must reverse the direction of the force. According to Fleming's Left-Hand Rule, you can achieve this by either reversing the direction of the current (swap battery polarity) or reversing the direction of the magnetic field (swap the permanent magnet poles).", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "The unit of magnetic flux density $$B$$ is the Tesla (T). Based on the formula $$F = BIL$$, express a Tesla in terms of Newtons, Amperes, and metres. Why does this combination make physical sense? (2 steps)", "answer": "- Step 1: Rearranging $$F = BIL$$ for $$B$$ gives $$B = \\frac{F}{IL}$$. Substituting the units: $$T = \\frac{N}{A \\cdot m}$$.\n- Step 2: This makes physical sense because flux density is defined as the force per unit of current per unit of length. A 1 T field exerts 1 N of force on a 1 m wire carrying 1 A of current (perpendicular to the field). It directly quantifies how much \"push\" a field delivers to a standard current-carrying conductor.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "Besides adding an iron core, what are three ways to increase the strength of an electromagnet, and why does each work? (3 steps)", "answer": "- Step 1: Increase the current: More current means a stronger magnetic field around each loop of wire, which directly amplifies the overall field of the solenoid.\n- Step 2: Increase the number of turns (loops): More turns means more overlapping magnetic fields reinforcing each other inside the solenoid, creating a denser, stronger field.\n- Step 3: Decrease the length of the solenoid (packing the turns closer together): This increases the density of the turns per unit length. More field-generating loops packed into a smaller space results in a stronger, more concentrated internal field.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "How can you use a small plotting compass to map the shape of a magnetic field, and why does the compass needle align the way it does? (2 steps)", "answer": "- Step 1: Place the plotting compass near the magnet. The North pole of the compass needle is attracted to the South pole of the magnet and repelled by the North pole, causing the needle to align tangent to the local field line. Mark a dot at the North end of the needle.\n- Step 2: Move the compass so the South end of the needle sits on the dot you just made. Mark a new dot at the North end. Repeat this process. By connecting the dots, you trace the exact path of a magnetic field line, visualizing the field's direction and shape.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Describe the shape of the magnetic field in the gap between two North poles facing each other. Why are there no field lines directly connecting the two poles? (2 steps)", "answer": "- Step 1: The field lines push away from each other, curving outward from both poles. In the exact center between the two like poles, the field is very weak (a neutral point) because the fields from the two poles are equal in strength but opposite in direction, cancelling out.\n- Step 2: Field lines always go from North to South. Since both surfaces are North poles, lines must emerge from both. They cannot cross, and they cannot go from North to North. Therefore, they repel each other and curve back around to find a South pole (or infinity), leaving a void in the direct gap between them.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}], "count": 22}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "You cut a bar magnet perfectly in half. Do you now hold a north piece and a south piece separately, or something else? What does this reveal about the fundamental nature of magnets? (3 steps)", "answer": "- Step 1: When you cut the magnet, each half immediately becomes a complete magnet with its own north and south pole. The face where you made the cut becomes the opposite pole on each piece — if the original north end is on the left piece, the freshly cut right face of that piece becomes a new south pole, and the freshly cut left face of the right piece becomes a new north pole.\n- Step 2: This happens because magnetism arises from the alignment of microscopic magnetic domains within the material. Each domain is itself a tiny magnet with two poles. Cutting the macroscopic magnet doesn't isolate single poles — it just separates groups of domains, each group still having two poles.\n- Step 3: This reveals that **magnetic monopoles do not exist**. You can never isolate a single north or a single south pole. This is a fundamental difference from electrostatics, where you *can* have isolated positive or negative charges. Every magnet, no matter how small, always has exactly two poles.\n\nTakeaway: Magnetism is fundamentally dipolar — poles always come in inseparable pairs.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "A paperclip is attracted to a bar magnet. Can you conclude the paperclip is a magnet? If not, what single test would prove it IS a magnet rather than just a magnetic material? (3 steps)", "answer": "- Step 1: No, attraction alone is insufficient proof. A magnetic material (like iron in the paperclip) will be attracted to a magnet even when the paperclip itself is not magnetised — the bar magnet's field *induces* temporary magnetism in the paperclip, and since the induced pole nearest the magnet is always opposite, attraction always occurs.\n- Step 2: The crucial test is **repulsion**. If the paperclip is repelled by a known magnet at some orientation, then the paperclip must already have its own fixed poles — it must be a permanent magnet. Repulsion can only happen between like poles, which requires both objects to have their own magnetic poles.\n- Step 3: In practice, you would bring the known magnet near the paperclip in different orientations. If you only ever observe attraction (the paperclip flips to attract), it's just a magnetic material. If at some orientation the paperclip pushes away, it has its own fixed poles and is a magnet.\n\nTakeaway: Attraction is ambiguous; only repulsion proves something is a magnet.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "Steel is used for permanent magnets, while soft iron is used for electromagnet cores. Why can't you swap them — what goes wrong in each case? (3 steps)", "answer": "- Step 1: Steel is a \"hard\" magnetic material — its domains, once aligned, resist returning to random orientation. This makes it excellent for a permanent magnet that must retain its field for years. But if you put a steel core inside a solenoid and switch the current off, the steel *stays magnetised*. You can no longer switch the electromagnet off, which defeats the entire purpose.\n- Step 2: Soft iron is a \"soft\" magnetic material — its domains align easily when an external field is applied, but they also return to random orientation the moment the field is removed. This means the iron core becomes a strong induced magnet when current flows (amplifying the solenoid's field dramatically) but loses nearly all magnetism when current stops — giving you a switchable electromagnet.\n- Step 3: If you used soft iron for a permanent magnet, it would lose its magnetism almost immediately after being magnetised — useless for a fridge magnet or compass needle. If you used steel for an electromagnet core, the electromagnet would never fully switch off — dangerous and impractical for scrapyard cranes that must release their load.\n\nTakeaway: Hard magnetic materials → permanent magnets; soft magnetic materials → electromagnet cores. Domain mobility is the key difference.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "An induced magnet is placed near the north pole of a permanent magnet. Which pole forms on the induced magnet's nearest face, and why does this guarantee attraction rather than repulsion? (2 steps)", "answer": "- Step 1: The nearest face of the induced magnet becomes a **south pole**. The external field from the permanent magnet aligns the domains in the induced material such that the end closest to the N pole has its domains pointing with their S poles facing outward — opposite to the inducing pole.\n- Step 2: Because the nearest pole is always the opposite type to the inducing pole, the force between them is always attractive (unlike poles attract). This is why an induced magnet can **never be repelled** — the induction process itself guarantees the opposite pole forms, ensuring attraction. This is also why attraction alone can't prove something is a magnet.\n\nTakeaway: Induction always creates the opposite pole on the near side, so attraction is inevitable — induced magnets can never repel.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "Two magnetic field lines are drawn crossing at a single point. Why is this physically impossible? (2 steps)", "answer": "- Step 1: A magnetic field line represents the direction of the magnetic field at each point in space. The direction is defined as the direction in which the north pole of a small compass would point at that location. If two field lines crossed, a compass placed at the crossing point would need to point in two directions simultaneously — which is impossible.\n- Step 2: At any point in space, the net magnetic field has exactly one direction (the vector sum of all contributing fields). Field lines can only merge, spread, or curve, but they can never intersect because the field at any point has a unique direction.\n\nTakeaway: Field lines never cross because the magnetic field at any point has exactly one direction.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "You see a region on a diagram where magnetic field lines are drawn equally spaced and parallel with arrows pointing left. What does this tell you about the field, and where might you find such a region in a real setup? (2 steps)", "answer": "- Step 1: Equally spaced, parallel field lines with arrows indicate a **uniform magnetic field** — one with the same strength (indicated by equal spacing) and the same direction (indicated by parallel lines and arrows) at every point. The arrows pointing left show the field direction, from N pole towards S pole.\n- Step 2: You would find such a region **in the gap between two opposite magnetic poles** (N and S) placed facing each other. Between the poles, the field lines run straight from N to S and are roughly equally spaced. Outside this gap, the field lines curve and spread out, becoming non-uniform.\n\nTakeaway: Uniform field = equally spaced parallel lines; found between opposite poles.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "A plotting compass is placed at a point on a magnetic field. The needle points northeast. What does this tell you about the field at that point, and how would you use this compass to trace out a complete field line? (3 steps)", "answer": "- Step 1: The compass needle aligns with the direction of the magnetic field at that point. The arrow (north pole) of the needle points in the direction of the field line — northeast. This means the field line passing through that point runs in the northeast direction.\n- Step 2: To trace a complete field line, place the compass at a starting point and mark a dot at each end of the needle. Then move the compass so that the tail end of the needle sits on the dot where the arrow tip was, and mark the new position of the arrow tip. Repeat this process, \"leap-frogging\" the compass along.\n- Step 3: Connect all the dots with a smooth curve and add an arrow in the direction the compass needle pointed (N to S). This gives you one complete field line. Repeat from a different starting point to map additional lines and build up a picture of the entire field shape.\n\nTakeaway: The compass needle IS a tiny bar magnet — it shows field direction at a point; leap-frogging traces the full line.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "The geographic North Pole of Earth is actually a magnetic south pole. If it were a magnetic north pole instead, what would happen to a compass needle? (2 steps)", "answer": "- Step 1: A compass needle's north pole is attracted to a magnetic south pole. Currently, the geographic North Pole is a magnetic south, so the needle's N end points north — matching our maps and navigation conventions.\n- Step 2: If the geographic North Pole were a magnetic north pole, the compass needle's N end would be **repelled** by it and attracted to the geographic South Pole (which would then be magnetic south). The needle would point south instead of north. All compasses would effectively be reversed — \"north\" on a compass would point towards geographic south.\n\nTakeaway: Compasses point north only because the geographic North Pole is a magnetic south — it's the opposite of what most people assume.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "A wire carries no current, then the switch is closed and current flows. Describe what appears around the wire that wasn't there before, including its shape and what happens if the current is reversed. (3 steps)", "answer": "- Step 1: When current flows, a **magnetic field** appears around the wire. This is the phenomenon of electromagnetism — a moving charge (current) generates a magnetic field. With no current, there is no field around the wire.\n- Step 2: The field shape is **concentric circles** centred on the wire. There are no poles (unlike a bar magnet). The circles are closest together near the wire (strongest field) and become more widely spaced further away (weaker field).\n- Step 3: If the current is reversed, the field circles remain concentric and the same spacing, but their **direction reverses** — the circles now point the opposite way around the wire. You can determine the direction using the right-hand thumb rule: thumb points in conventional current direction, curled fingers show field direction.\n\nTakeaway: Current → circular magnetic field; reverse current → field direction reverses; no current → no field.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "You grip a straight wire with your right hand. Your thumb points away from you, and your fingers curl clockwise as viewed from your perspective. What is the direction of conventional current in the wire? (2 steps)", "answer": "- Step 1: The right-hand thumb rule states: point your right thumb in the direction of conventional current (+ to −), and your curled fingers show the direction of the magnetic field lines around the wire. Your fingers curling clockwise means the field goes clockwise.\n- Step 2: Since your thumb points in the direction of current, and your thumb points **away from you**, the conventional current flows away from you. The clockwise curl of your fingers is consistent with this — looking along the direction of current flow (away from you), the field circles go clockwise.\n\nTakeaway: Right hand: thumb = current, fingers = field. Thumb away from you + clockwise curl are self-consistent.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Looking end-on at a solenoid, the current flows anticlockwise around the coil as seen from your position. Which magnetic pole faces you, and why does this rule work? (3 steps)", "answer": "- Step 1: The rule is: anticlockwise current viewed from an end → that end is the **N pole**. Clockwise current viewed from an end → that end is the **S pole**.\n- Step 2: So if current is anticlockwise as viewed from your position, the end facing you is the **north pole**. The other end (where current would appear clockwise) is the south pole.\n- Step 3: This rule works because it's equivalent to applying the right-hand thumb rule to each individual turn of the coil. Each circular loop of current produces a field pointing along the solenoid axis. When you curl your right hand fingers in the anticlockwise direction (matching the current), your thumb points towards you — meaning the field inside the solenoid points towards you, which is the direction from S to N inside the magnet, confirming your end is N.\n\nTakeaway: Anticlockwise = N facing you; clockwise = S facing you. It's just the right-hand rule applied to the coil loops.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "A solenoid produces a weak field. Four changes are suggested: (a) increase current, (b) remove the iron core, (c) unwind some turns to make the coil longer, (d) add more turns keeping the coil the same length. Which changes actually strengthen the field? (3 steps)", "answer": "- Step 1: **Increasing current** strengthens the field. More current means each moving charge contributes more to the field, and the field inside a solenoid is directly proportional to current. So (a) works.\n- Step 2: **Removing the iron core** weakens the field. The iron core becomes an induced magnet when current flows, and its field adds to the solenoid's field, greatly amplifying it. Removing it loses this boost. So (b) does NOT strengthen the field — it weakens it. **Unwinding turns to make the coil longer** also weakens the field because the same number of turns spread over a greater length means fewer turns per unit length, and field strength depends on turn density. Even if you remove turns entirely, you directly reduce the field. So (c) does NOT strengthen the field.\n- Step 3: **Adding more turns keeping the coil the same length** strengthens the field. This increases the turn density (turns per metre), and more turns per metre means more contributions to the field per unit length. So (d) works.\n\nTakeaway: Strengthen solenoid: ↑current, ↑turn density, ↓length, add iron core.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "A solenoid with an iron core is switched on, and it lifts a heavy iron block. When the current is switched off, the block falls. But when the same solenoid uses a steel core instead of iron, the block doesn't fall after switching off. Explain why. (3 steps)", "answer": "- Step 1: With an **iron core**, when current flows, the iron's domains align and it becomes a strong induced magnet, adding to the solenoid's field. When current stops, the iron's domains quickly return to random orientation (soft magnetic material), the induced magnetism disappears, and the combined field drops to near zero — the block is no longer attracted and falls.\n- Step 2: With a **steel core**, when current flows, the steel also becomes magnetised and the combined field is strong. But when current stops, steel is a hard magnetic material — its domains remain locked in their aligned orientation. The steel core retains its magnetism and continues to attract the iron block.\n- Step 3: This is exactly why steel is unsuitable for an electromagnet core. An electromagnet must be switchable — on when you need it, off when you don't. Steel's retentivity means the \"off\" state doesn't work properly. Iron's low retentivity makes it ideal.\n\nTakeaway: Iron = temporary induced magnet (good for electromagnets); steel = permanent magnet (bad for electromagnets).", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "A current-carrying wire sits inside a magnetic field. Explain the fundamental cause of the force on the wire — what two things are interacting, and why does a wire parallel to the field lines experience no force? (3 steps)", "answer": "- Step 1: The force arises from the **interaction of two magnetic fields**: the circular magnetic field produced by the current in the wire, and the external magnetic field (e.g., from permanent magnets). Where these two fields overlap, they combine — reinforcing on one side of the wire and partially cancelling on the other.\n- Step 2: This asymmetry in the combined field creates a pressure difference: the field is stronger on one side of the wire than the other. The wire is effectively \"pushed\" from the region of stronger field towards the region of weaker field. This push is the motor effect force.\n- Step 3: When the wire is **parallel** to the external field lines, the wire's circular field is perpendicular to the external field at every point. The two fields don't reinforce or cancel asymmetrically — there's no \"strong side\" versus \"weak side\" of the wire. Without this field asymmetry, there's no net force. The force is maximum only when the wire is at 90° to the field, where the reinforcement/cancellation asymmetry is greatest.\n\nTakeaway: Motor effect = two fields interacting asymmetrically; parallel wire → symmetric fields → zero force.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "A wire of length $$L = 0.10 \\, \\text{m}$$ carries current $$I = 2 \\, \\text{A}$$ perpendicular to a magnetic field of flux density $$B = 0.5 \\, \\text{T}$$. Calculate the force and state what would happen to this force if the wire were rotated to be parallel to the field. (2 steps)", "answer": "- Step 1: Using $$F = BIL$$: $$F = 0.5 \\times 2 \\times 0.10 = 0.10 \\, \\text{N}$$. The force on the wire is 0.10 N, directed perpendicular to both the field and the current (determined by Fleming's left-hand rule).\n- Step 2: If the wire is rotated to be **parallel** to the field lines, the force drops to **zero**. At GCSE, $$F = BIL$$ only applies when the wire is at 90° to the field. When parallel, the two magnetic fields don't interact asymmetrically, so no net force is produced. The force smoothly decreases from its maximum (at 90°) to zero (at 0°) as you rotate the wire.\n\nTakeaway: $$F = BIL$$ for perpendicular wire; parallel → $$F = 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "The tesla (T) is the unit of magnetic flux density. In terms of other units, 1 T = 1 N/(A·m). Explain what this means physically — if you have a 1 T field, what exactly does that tell you? (2 steps)", "answer": "- Step 1: Rearranging $$F = BIL$$ to $$B = \\frac{F}{IL}$$ shows that magnetic flux density is the **force per unit current per unit length**. A field of 1 T means that a wire carrying 1 A of current, with 1 m of its length in the field at 90°, experiences a force of 1 N.\n- Step 2: Physically, the tesla tells you how \"strong\" the field is at producing force on a current-carrying conductor. A 2 T field would produce twice the force on the same wire compared to a 1 T field. It's a measure of the field's \"pushing power\" on currents — not the same as field line density (which is a visual representation), but closely related.\n\nTakeaway: 1 T = the field that produces 1 N of force on 1 m of wire carrying 1 A at 90°.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "You want to double the force on a current-carrying wire in a magnetic field. Three students suggest: (a) double the magnetic flux density, (b) double the current, (c) double the length of wire in the field. How many of these suggestions actually work? (2 steps)", "answer": "- Step 1: From $$F = BIL$$, the force is directly proportional to each variable: $$F \\propto B$$, $$F \\propto I$$, and $$F \\propto L$$. This means doubling any one of these quantities while keeping the others constant will double the force.\n- Step 2: All three suggestions work. Doubling $$B$$ (using a stronger magnet) doubles $$F$$. Doubling $$I$$ (increasing the power supply) doubles $$F$$. Doubling $$L$$ (using a longer wire in the field, or adding more turns to a coil so the effective length doubles) doubles $$F$$. Each variable independently and linearly affects the force.\n\nTakeaway: $$F \\propto B$$, $$F \\propto I$$, $$F \\propto L$$ — all three independently scale the force.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "A student applies Fleming's left-hand rule using their RIGHT hand by mistake. Their first finger points from N to S, and their second finger points in the correct current direction. Will their thumb point in the correct force direction? Explain. (3 steps)", "answer": "- Step 1: Fleming's left-hand rule requires the left hand because the three quantities (field, current, force) are mutually perpendicular in a specific orientation that is a left-handed coordinate system. The first finger (field, N→S), second finger (current, +→−), and thumb (force) on the left hand are arranged so that each is 90° from the other two in a specific chirality.\n- Step 2: If you use your right hand with the first finger pointing from N to S and the second finger in the same current direction, your right thumb will point in the **opposite** direction to what the left thumb would point. This is because the right hand has the opposite chirality (mirror image) to the left hand.\n- Step 3: So the student would predict the force in the wrong direction — exactly opposite to the true direction. This could lead to predicting a wire moves up when it actually moves down, or into the page instead of out. The wrong hand gives the wrong answer.\n\nTakeaway: Left hand for force on a current-carrying conductor. Right hand is for a completely different purpose (field direction around a wire). Using the wrong hand reverses the force direction.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "Using Fleming's left-hand rule: your first finger points to the right (field N→S), and your second finger points into the page (current). Which way does the force on the wire act? (3 steps)", "answer": "- Step 1: Set up your left hand: first finger (index) points to the right — this is the magnetic field direction from N to S.\n- Step 2: Second finger (middle) points into the page — this is the conventional current direction. Your middle finger must be perpendicular to your index finger, which it is when pointing into the page while the index points right.\n- Step 3: Your thumb now points **downwards** (perpendicular to both the field and the current). The force on the wire acts vertically downward.\n\nTakeaway: Field right + current into page → force downward. The three directions are always mutually perpendicular.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "In a d.c. motor, the coil rotates because forces act on opposite sides in opposite directions. Why don't the forces just cancel out and produce no motion? (2 steps)", "answer": "- Step 1: The forces on opposite sides of the coil are indeed equal and opposite in **direction** (one side pushed up, the other pushed down), but they act on **different sides** of the coil, separated by a distance. They don't act on the same point.\n- Step 2: Because the forces act on different sides of the coil, they form a **couple** — a pair of equal and opposite forces whose lines of action don't coincide. A couple produces a **turning effect (torque)**, causing the coil to rotate rather than translate. If both forces acted on the same point, they would cancel; acting on different sides, they produce rotation.\n\nTakeaway: Equal and opposite forces on different sides of a coil → couple → rotation, not cancellation.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "In a d.c. motor, when the coil is exactly vertical (perpendicular to its starting horizontal position), the forces on each side still act in the same directions as before. Why doesn't the motor stop or reverse at this point? (3 steps)", "answer": "- Step 1: When the coil is vertical, the current-carrying sides are now moving parallel (or nearly parallel) to the magnetic field lines. At this instant, the force on each side would be zero (or very small) because the motor effect only produces maximum force when the wire is perpendicular to the field.\n- Step 2: Even if the forces were briefly zero, the coil has **momentum** from the previous half-rotation. This angular momentum carries the coil past the vertical position, like a wheel rolling over the top of a hill.\n- Step 3: The split-ring commutator ensures that as the coil passes through the vertical position, the current direction in the coil reverses. This means the force on each side now acts in the direction that **continues** the rotation rather than opposing it. The combination of momentum and current reversal keeps the motor spinning smoothly.\n\nTakeaway: Momentum carries the coil through the \"dead point,\" and the commutator reverses the current so forces continue to drive rotation.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "What would happen to a d.c. motor if the split-ring commutator were replaced with a continuous (unsplit) ring? Describe the motion of the coil. (3 steps)", "answer": "- Step 1: With a continuous ring, the current would always flow through the coil in the same direction, regardless of the coil's orientation. There would be no current reversal at any point during rotation.\n- Step 2: In the first half-turn, the forces on opposite sides of the coil cause it to rotate (say, clockwise). But when the coil passes the vertical position, the same current still flows in the same direction, and the same forces still act on the same sides.\n- Step 3: After passing vertical, the coil's orientation has flipped relative to the field. The force that was pushing one side up now pushes it down (because the side has moved to the other position), and vice versa. The forces now **oppose** the rotation. The coil would oscillate back and forth around the vertical position, eventually coming to rest — it would **not** rotate continuously.\n\nTakeaway: Without the split-ring commutator reversing current every half-turn, the motor would oscillate and stop, not spin continuously.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "The carbon brushes in a d.c. motor press against the commutator but are not glued or soldered to it. Why must they maintain this \"sliding contact\" rather than a fixed connection? (2 steps)", "answer": "- Step 1: The coil (and the commutator attached to it) must be **free to rotate** continuously. If the brushes were fixed to the commutator, the wires connecting the power supply to the coil would twist and tangle after just a few rotations, eventually snapping or preventing further rotation.\n- Step 2: The sliding contact allows the brushes to remain stationary (connected to the external circuit) while the commutator spins against them. Current flows across the contact surface from brush to commutator and into the coil. Carbon is used because it conducts electricity, has low friction (allowing smooth rotation), and is self-lubricating, reducing wear.\n\nTakeaway: Sliding contact = current flows in while the coil spins freely. Fixed connections would tangle and break.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "A d.c. motor runs too slowly for your applica
