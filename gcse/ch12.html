<script>
const DATA={"selected": [{"id": "minimax_2_8", "question": "A solenoid has 100 turns, carries 2 A of current, and is 10 cm long. If you double the current to 4 A, what happens to the magnetic field strength inside? If you add an iron core instead, what happens? (2 steps)", "answer": "- Step 1: Doubling current doubles the magnetic field strength ($$B \\propto I$$), since more charge flow per second creates a stronger magnetic field around each turn.\n- Step 2: Adding an iron core dramatically increases field strength. The iron becomes an induced magnet (the domains align with the solenoid's field), adding its own field to the total. This can increase field strength by hundreds or thousands of times. Both effects combine — more current AND an iron core gives the strongest electromagnet.\n\n**Takeaway:** Field strength increases with: more current, more turns, shorter length (concentrates field), and especially adding a magnetic core (iron).", "source": "MiniMax M1 ②", "blind_id": 0}, {"id": "minimax_2_16", "question": "A DC motor is running normally. Describe what happens at the exact moment the coil passes through the vertical (90°) position, and why the motor doesn't stop even though forces are momentarily zero. (3 steps)", "answer": "- Step 1: At the vertical position, the coil's plane is parallel to the magnetic field lines — the wires are running ALONG the field, not perpendicular.\n- Step 2: Since force $$F = BIL$$ requires the wire to be perpendicular to the field, at this exact position the forces are zero (parallel = no motor effect). There's a brief moment with no driving force.\n- Step 3: However, the coil has rotational momentum (kinetic energy) from its previous acceleration, so it carries on moving past the vertical position. By the time it slows slightly, the split-ring commutator has reversed the current, forces reappear, and rotation continues.\n\n**Takeaway:** The coil needs momentum to get past the dead zone at 90°, where F = 0 because wire is parallel to field.", "source": "MiniMax M1 ②", "blind_id": 1}, {"id": "glm_3_31", "question": "You are told that the force on a wire in a magnetic field is given by $$F = BIL\\sin\\theta$$, where $$\\theta$$ is the angle between the wire and the field. At GCSE, you only use $$F = BIL$$. What value of $$\\theta$$ does this assume, and what happens to the force as $$\\theta$$ decreases from this value? (2 steps)", "answer": "- Step 1: The formula $$F = BIL$$ assumes $$\\theta = 90°$$, where the wire is **perpendicular** to the field. At this angle, $$\\sin 90° = 1$$, so $$F = BIL \\times 1 = BIL$$. This is the maximum possible force for given values of $$B$$, $$I$$, and $$L$$.\n- Step 2: As $$\\theta$$ decreases from 90° towards 0°, $$\\sin\\theta$$ decreases from 1 towards 0. The force gets smaller and smaller, reaching zero when $$\\theta = 0°$$ (wire parallel to the field). At GCSE, you only need to know the two extreme cases: maximum force at 90° ($$F = BIL$$) and zero force at 0° (parallel).\n\nTakeaway: $$F = BIL$$ is the maximum force case ($$\\theta = 90°$$). Any other angle gives less force; parallel gives zero.", "source": "GLM 5.1 ③", "blind_id": 5}, {"id": "gflash_1_4", "question": "What is a \"magnetic field,\" and what does it act upon? How are \"magnetic field lines\" used to visually represent this field, and what crucial information do they convey? (4 steps)", "answer": "- Step 1: **Definition of a Magnetic Field**\n    +   A magnetic field is an invisible region of influence that surrounds a magnet or a current-carrying conductor. Within this region, a magnetic force can be experienced.\n    +   It acts upon other magnets or on magnetic materials (like iron, steel, cobalt, and nickel), causing them to experience a force. It does not act on static electric charges, unlike an electric field.\n- Step 2: **Purpose of Magnetic Field Lines**\n    +   Magnetic field lines (also known as flux lines) are a visual model used to represent both the strength and the direction of a magnetic field at various points in space. They are not physical objects but conceptual tools.\n- Step 3: **Rules for Drawing and Interpreting Field Lines**\n    +   **Direction:** Field lines always originate from the North pole of a magnet and terminate at its South pole (conventionally, arrows are drawn midway along the lines to indicate this direction). Outside the magnet, they loop from N to S. Inside the magnet, they are considered to go from S to N, forming continuous loops.\n    +   **Never Touch or Cross:** Field lines never intersect or cross each other. If they did, it would imply two different directions for the magnetic field at a single point, which is physically impossible.\n    +   **Strength Indication:** The density of the field lines (how close together they are) indicates the strength of the magnetic field. Where lines are closer together, the field is stronger (e.g., at the poles of a bar magnet). Where lines are further apart, the field is weaker.\n- Step 4: **Information Conveyed**\n    +   By observing the field lines, you can determine:\n        +   The **direction** of the magnetic force a North pole would experience at any given point (tangent to the line, in the direction of the arrow).\n        +   The **relative strength** of the magnetic field at different locations (by line density).\n        +   The **shape** or pattern of the magnetic field around a source.\n\nMagnetic field lines are a powerful graphical tool that convey the invisible strength and direction of magnetic influence.", "source": "Gemini 2.5 Flash ①", "blind_id": 7}, {"id": "glm_1_8", "question": "Looking at one end of a solenoid, you observe the conventional current flowing in an anticlockwise direction. What magnetic pole is at that end, and how does the field line direction confirm this? (2 steps)", "answer": "- Step 1: That end is the North pole. A helpful mnemonic is that an anticlockwise current looks like the letter \"N\" (for North), while a clockwise current looks like an \"S\" (for South).\n- Step 2: By definition, magnetic field lines emerge from a North pole. Since the field lines are exiting that end of the solenoid to loop externally back to the South pole, the anticlockwise current must correspond to the North pole.", "source": "GLM 5.1 ①", "blind_id": 8}, {"id": "gemini_3_28", "question": "You want to make a D.C. motor spin faster and with more force. Describe three distinct ways to achieve this, explaining the physical principle for each. (3 steps)", "answer": "- Step 1: **Increase the current ($$I$$) in the coil.** According to the motor effect equation ($$F=BIL$$), the force on the wires of the coil is directly proportional to the current. A larger force creates a larger turning effect (torque), causing the coil to accelerate more quickly and spin faster.\n- Step 2: **Use stronger permanent magnets.** This increases the magnetic flux density ($$B$$). Again, according to $$F=BIL$$, a stronger magnetic field results in a greater force on the coil wires for the same current, leading to faster rotation.\n- Step 3: **Increase the number of turns on the coil.** While this doesn't change the formula $$F=BIL$$ for a single wire, adding more turns (or loops) to the coil means the force is applied to many wires at once. If you have a coil with $$N$$ turns, the total force is effectively multiplied by $$N$$. This significantly increases the torque and thus the speed of the motor.", "source": "Gemini 2.5 Pro ③", "blind_id": 9}, {"id": "gemini_1_12", "question": "How do you determine the direction of the circular magnetic field around a straight, current-carrying wire? State the rule and explain how to apply it.", "answer": "You use the **Right-Hand Thumb Rule** (also called the Right-Hand Grip Rule).\n- Step 1: Point the thumb of your right hand in the direction of the **conventional current** (from positive to negative).\n- Step 2: Curl your fingers around the wire.\n- Step 3: The direction your fingers curl indicates the direction of the magnetic field lines. For example, if the current is flowing upwards, the field lines will circle anti-clockwise when viewed from above.", "source": "Gemini 2.5 Pro ①", "blind_id": 10}, {"id": "minimax_2_24", "question": "A student investigates a solenoid's field with a plotting compass. They note the compass points in different directions at different points around the solenoid. Explain why the field inside a solenoid is UNIFORM (same direction everywhere), but outside it's not. (2 steps)", "answer": "- Step 1: Inside the solenoid, the field lines from all the individual coil turns run parallel to the axis in the same direction, adding together. Since they're parallel and don't spread out, the field has the same strength and direction at every point inside — uniform.\n- Step 2: Outside the solenoid, the field lines must return from one end to the other, curving around to complete the loop. Different points are at different distances and angles from the \"magnet-like\" shape, so field direction and strength vary — non-uniform.\n\n**Takeaway:** Inside = parallel field lines from many turns add → uniform. Outside = lines must curve back → non-uniform.", "source": "MiniMax M1 ②", "blind_id": 11}, {"id": "gemini_3_24", "question": "In a simple D.C. motor, a rectangular coil is placed in a magnetic field. Explain why one side of the coil is pushed up while the other side is pushed down. (3 steps)", "answer": "- Step 1: A direct current from a power supply flows through the coil. The current flows in one direction along one side of the coil (e.g., away from the battery) and in the opposite direction along the other side (e.g., back towards the battery).\n- Step 2: Both sides of the coil are in the same external magnetic field (which runs from North to South). However, since the current direction is opposite on each side, the resulting force from the motor effect will also be in opposite directions.\n- Step 3: Using Fleming's Left-Hand Rule on each side confirms this. If the field is left-to-right, and the current on the top wire is 'into the page', the force is down. For the bottom wire, the current is 'out of the page', so the force is up. This pair of opposing forces (one up, one down) creates a turning effect, or torque, causing the coil to rotate.", "source": "Gemini 2.5 Pro ③", "blind_id": 12}, {"id": "glm_3_5", "question": "You see a region on a diagram where magnetic field lines are drawn equally spaced and parallel with arrows pointing left. What does this tell you about the field, and where might you find such a region in a real setup? (2 steps)", "answer": "- Step 1: Equally spaced, parallel field lines with arrows indicate a **uniform magnetic field** — one with the same strength (indicated by equal spacing) and the same direction (indicated by parallel lines and arrows) at every point. The arrows pointing left show the field direction, from N pole towards S pole.\n- Step 2: You would find such a region **in the gap between two opposite magnetic poles** (N and S) placed facing each other. Between the poles, the field lines run straight from N to S and are roughly equally spaced. Outside this gap, the field lines curve and spread out, becoming non-uniform.\n\nTakeaway: Uniform field = equally spaced parallel lines; found between opposite poles.", "source": "GLM 5.1 ③", "blind_id": 14}, {"id": "minimax_2_26", "question": "A magnet is brought near a steel paperclip. The paperclip is attracted and clings to the magnet. Later, the magnet is removed but the paperclip can still weakly attract other paperclips. Explain this observation. (2 steps)", "answer": "- Step 1: Initially, the paperclip becomes an induced magnet — its domains align with the external field, making it temporarily magnetic. This causes attraction.\n- Step 2: After removing the magnet, steel (unlike soft iron) retains much of its magnetism because its domains don't easily randomise — steel has \"memory.\" This makes the paperclip a weak permanent magnet, able to attract other magnetic materials. This is called residual magnetism. (If it were pure iron, it would lose almost all magnetism immediately.)\n\n**Takeaway:** Steel retains induced magnetism (becomes weakly permanent); soft iron does not. This is why steel is used for permanent magnets.", "source": "MiniMax M1 ②", "blind_id": 16}, {"id": "glm_3_47", "question": "You have a horseshoe magnet (U-shaped) with N on one tip and S on the other. Where is the field strongest, and why is this shape useful compared to a bar magnet? (2 steps)", "answer": "- Step 1: The field is **strongest in the gap between the two poles**. Here, the field lines run straight from N to S across a short distance, and they are closely packed (high flux density). This region is also very uniform — parallel, equally spaced lines.\n- Step 2: This shape is useful because it concentrates the field into a compact, accessible region. A bar magnet's strongest field is at its poles, but they're at opposite ends of a long bar, making it hard to use both simultaneously. The horseshoe shape brings N and S close together, creating a strong, uniform field in the gap — ideal for placing a coil (as in a motor or meter) or for picking up objects (as in an electromagnet crane).\n\nTakeaway: Horseshoe magnet concentrates field between close poles — strong, uniform, and practical for devices.", "source": "GLM 5.1 ③", "blind_id": 18}, {"id": "minimax_2_0", "question": "A bar magnet is cut in half. What would you find at the two new ends? (2 steps)", "answer": "- Step 1: You get TWO new magnets, each with its own north and south pole.\n- Step 2: This is because there are no magnetic monopoles — every magnet must have both a north and south pole. The \"cut\" end that was originally the middle becomes the new pole of each half. No matter how many times you cut a magnet, you always get smaller dipoles, not isolated poles.\n\n**Takeaway:** Magnetic poles always come in pairs — you can never isolate a single north or south pole.", "source": "MiniMax M1 ②", "blind_id": 19}, {"id": "glm_3_36", "question": "A coil in a d.c. motor has 50 turns instead of 1 turn. How does this affect the force, and how does it affect the role of the split-ring commutator? (3 steps)", "answer": "- Step 1: More turns means more total length of wire carrying current in the magnetic field. If each turn has length $$L$$ in the field, 50 turns gives an effective length of $$50L$$. The total force is $$F = BI(50L) = 50 \\times BIL$$ — fifty times the force of a single turn. This produces a greater torque and faster, more powerful rotation.\n- Step 2: The split-ring commutator still performs the same function: it reverses the current direction in the coil every half-turn. The number of turns doesn't change the need for current reversal; it only changes the magnitude of the force.\n- Step 3: However, with more turns, the commutator must be designed to handle the connections to all 50 turns correctly. The coil is typically wound as a single continuous wire with 50 loops, and the two ends of this wire connect to the two halves of the split ring. The commutator still has just two halves regardless of the number of turns.\n\nTakeaway: More turns → more force (effective $$L$$ increases). The commutator's function (current reversal) is unchanged.", "source": "GLM 5.1 ③", "blind_id": 21}, {"id": "gemini_1_20", "question": "A wire is placed in a magnetic field that is directed from left to right. If the current in the wire is flowing directly into the page (represented by the symbol ⊗), what is the direction of the force on the wire? (3 steps)", "answer": "We use Fleming's Left-Hand Rule to solve this.\n- Step 1: **Field (First Finger):** Point your first finger from left to right, in the direction of the magnetic field.\n- Step 2: **Current (Second Finger):** Point your second finger into the page, in the direction of the current. You will need to rotate your wrist to do this while keeping your first finger pointing right.\n- Step 3: **Motion (Thumb):** Observe the direction your thumb is pointing. It will be pointing **upwards**. Therefore, the force on the wire is upwards.", "source": "Gemini 2.5 Pro ①", "blind_id": 23}, {"id": "gflash_1_18", "question": "Describe the specific condition under which a current-carrying wire placed in a magnetic field will experience *zero* magnetic force. Why does this occur, based on the interaction of magnetic fields? (3 steps)", "answer": "- Step 1: **Condition for Zero Force**\n    +   A current-carrying wire placed in a magnetic field will experience zero magnetic force when the direction of the current flow in the wire is **parallel** to the direction of the external magnetic field lines.\n    +   This means the angle between the current direction and the magnetic field direction is $$0°$$ or $$180°$$.\n- Step 2: **Explanation based on Field Interaction**\n    +   The motor effect arises from the interaction between two magnetic fields: the external field and the field produced by the current-carrying wire itself.\n    +   When the wire is parallel to the external field lines, the magnetic field lines produced by the current around the wire do not effectively \"cut across\" or interact with the external field lines in a way that creates a net imbalance of field pressure perpendicular to the wire.\n    +   There is no resultant region of significantly stronger or weaker combined field on one side of the wire compared to the other in the direction perpendicular to both the wire and the field.\n- Step 3: **Conceptual Analogy (Optional but helpful)**\n    +   Imagine trying to push a boat through water. If you push the water parallel to the boat's direction of travel, you don't generate much sideways force to move it across the stream. But if you push the water perpendicular to the boat, you get a strong sideways push. Similarly, for the motor effect, the interaction needs a \"sideways\" component.\n\nZero force occurs when the current direction is parallel to the magnetic field, as the two fields align without creating the necessary pressure difference for a perpendicular force.", "source": "Gemini 2.5 Flash ①", "blind_id": 25}, {"id": "gflash_1_10", "question": "What is a \"solenoid\"? Describe the magnetic field it produces, both inside and outside the coil, and identify the factors that influence the strength of this field. (4 steps)", "answer": "- Step 1: **Definition of a Solenoid**\n    +   A solenoid is a long coil of wire, consisting of many turns, through which an electric current can flow. It's essentially a cylindrical helix of wire.\n- Step 2: **Magnetic Field Inside the Solenoid**\n    +   When current flows through the solenoid, it produces a magnetic field that is remarkably similar in shape to the field of a permanent bar magnet.\n    +   **Inside the solenoid:** The magnetic field is strong and almost perfectly uniform. The field lines are straight, parallel, and closely spaced, running along the central axis of the coil.\n    +   One end of the solenoid acts as a North pole, and the other end acts as a South pole.\n- Step 3: **Magnetic Field Outside the Solenoid**\n    +   **Outside the solenoid:** The magnetic field is much weaker and non-uniform. The field lines curve around from the North pole end to the South pole end, just like those of a bar magnet.\n- Step 4: **Factors Affecting Field Strength**\n    +   The strength of the magnetic field produced by a solenoid can be significantly increased by:\n        +   **Increasing the current ($$I$$):** A larger current means a stronger field.\n        +   **Increasing the number of turns ($$N$$):** More loops of wire (per unit length) contribute to a stronger field.\n        +   **Decreasing the length of the solenoid:** For a given number of turns, making the coil shorter (increasing turns *density*) concentrates the field and makes it stronger.\n        +   **Adding an iron core:** Placing a core made of a soft magnetic material (like iron) inside the solenoid greatly enhances the field strength, turning it into an electromagnet. The iron core itself becomes an induced magnet, adding its field to that of the coil.\n\nA solenoid effectively transforms a circular current's magnetic field into a powerful, bar-magnet-like field, whose strength is controllable by several key parameters.", "source": "Gemini 2.5 Flash ①", "blind_id": 28}, {"id": "gflash_1_8", "question": "What is \"electromagnetism\"? How does the magnetic field produced by a current-carrying wire differ from that of a permanent bar magnet in terms of shape and the presence of distinct poles? (3 steps)", "answer": "- Step 1: **Definition of Electromagnetism**\n    +   Electromagnetism is the phenomenon where an electric current flowing through a conductor (like a wire) generates a magnetic field around it. This field exists only as long as the current flows; if the current stops, the magnetic field disappears.\n- Step 2: **Magnetic Field of a Current-Carrying Wire**\n    +   **Shape:** The magnetic field around a straight current-carrying wire consists of concentric circles centered on the wire. These circles lie in planes perpendicular to the wire.\n    +   **Poles:** Unlike a bar magnet, a straight current-carrying wire does *not* have distinct North and South poles. The field is continuous and circular around the wire.\n    +   **Strength:** The field is strongest closest to the wire and weakens as you move further away (the concentric circles become further apart).\n- Step 3: **Comparison with a Permanent Bar Magnet**\n    +   **Shape:** A bar magnet produces a field with distinct loops that emerge from its North pole and enter its South pole, extending significantly into the surrounding space. A current-carrying wire produces circular fields *around* the wire.\n    +   **Poles:** A bar magnet has fixed North and South poles at its ends. A current-carrying wire does not have these distinct poles; its field is purely circular.\n    +   **Controllability:** The magnetic field of a current-carrying wire can be switched on or off, and its strength and direction can be easily controlled by adjusting the current. A permanent magnet's field is fixed.\n\nElectromagnetism reveals that electricity can create magnetism, but the resulting field around a wire is distinct from a permanent magnet's field, lacking poles and having a circular configuration.", "source": "Gemini 2.5 Flash ①", "blind_id": 29}, {"id": "gemini_1_22", "question": "Using the formula $$F=BIL$$, explain intuitively why a longer wire ($$L$$) or a stronger current ($$I$$) results in a larger force. (2 steps)", "answer": "- Step 1: **Current ($$I$$):** The current represents the amount of charge moving through the wire per second. A stronger current means more moving charges are present in the field at any given time. Since the force acts on each moving charge, having more of them (a higher $$I$$) results in a larger total force.\n- Step 2: **Length ($$L$$):** The length $$L$$ is the portion of the wire inside the magnetic field. A longer wire means that more of the current-carrying charges are simultaneously inside the field and experiencing the force. The total force is the sum of the forces on all the charges within the field, so a greater length ($$L$$) leads to a greater total force.", "source": "Gemini 2.5 Pro ①", "blind_id": 30}, {"id": "minimax_1_23", "question": "Why is it impossible for a magnetic field line to cross another magnetic field line? (1 step)", "answer": "- If two field lines crossed, a compass placed at the intersection would have to point in **two different directions simultaneously** — impossible. At any point in space, the magnetic field has one definite direction. Field lines are a visual model representing this single direction at each point, so they can never cross.\n\n**Takeaway:** Crossing lines would mean two field directions at one point — the field model prohibits this.", "source": "MiniMax M1 ①", "blind_id": 31}, {"id": "gflash_2_2", "question": "Describe what constitutes a 'magnetic material' and explain how one would definitively test if an unknown object is a *permanent magnet* rather than just a magnetic material. (3 steps)", "answer": "- Step 1: **Definition of Magnetic Material.** A magnetic material is a substance that is attracted to a magnet but does not necessarily produce its own magnetic field. These are typically certain metals and their alloys, such as iron, cobalt, nickel, and steel (which contains iron). When placed in an existing magnetic field, these materials experience a force of attraction.\n- Step 2: **The Challenge of Attraction.** If you bring a known magnet near an unknown object and they attract, you cannot definitively conclude that the unknown object is a permanent magnet. This is because both a permanent magnet and a simple magnetic material (like a steel paperclip) would be attracted to the known magnet. The steel paperclip, being a magnetic material, would become an *induced magnet* and its nearest end would develop an opposite pole to the inducing magnet, resulting in attraction.\n- Step 3: **Definitive Test: Repulsion.** To confirm if an unknown object is a *permanent magnet*, you must observe repulsion. Bring a known permanent magnet near the unknown object.\n    + If **attraction** occurs, the object could be a permanent magnet or just a magnetic material.\n    + If **repulsion** occurs, the object *must* be a permanent magnet. Repulsion can only happen between two like poles (e.g., N-N or S-S) of two existing magnets. A simple magnetic material cannot generate a repelling field on its own; it will always be attracted to an external magnet.", "source": "Gemini 2.5 Flash ②", "blind_id": 32}, {"id": "glm_2_18", "question": "The unit of magnetic flux density $$B$$ is the Tesla (T). Based on the formula $$F = BIL$$, express a Tesla in terms of Newtons, Amperes, and metres. Why does this combination make physical sense? (2 steps)", "answer": "- Step 1: Rearranging $$F = BIL$$ for $$B$$ gives $$B = \\frac{F}{IL}$$. Substituting the units: $$T = \\frac{N}{A \\cdot m}$$.\n- Step 2: This makes physical sense because flux density is defined as the force per unit of current per unit of length. A 1 T field exerts 1 N of force on a 1 m wire carrying 1 A of current (perpendicular to the field). It directly quantifies how much \"push\" a field delivers to a standard current-carrying conductor.", "source": "GLM 5.1 ②", "blind_id": 37}, {"id": "glm_3_7", "question": "The geographic North Pole of Earth is actually a magnetic south pole. If it were a magnetic north pole instead, what would happen to a compass needle? (2 steps)", "answer": "- Step 1: A compass needle's north pole is attracted to a magnetic south pole. Currently, the geographic North Pole is a magnetic south, so the needle's N end points north — matching our maps and navigation conventions.\n- Step 2: If the geographic North Pole were a magnetic north pole, the compass needle's N end would be **repelled** by it and attracted to the geographic South Pole (which would then be magnetic south). The needle would point south instead of north. All compasses would effectively be reversed — \"north\" on a compass would point towards geographic south.\n\nTakeaway: Compasses point north only because the geographic North Pole is a magnetic south — it's the opposite of what most people assume.", "source": "GLM 5.1 ③", "blind_id": 40}, {"id": "gflash_2_13", "question": "Define 'magnetic flux density' ($$B$$) and explain its significance in the formula for the motor effect, $$F = BIL$$. Include its units. (3 steps)", "answer": "- Step 1: **Definition of Magnetic Flux Density ($$B$$).** Magnetic flux density, symbolized by $$B$$, is a quantitative measure of the strength of a magnetic field. It can be thought of as the concentration of magnetic field lines in a given area. A higher magnetic flux density means the magnetic field is stronger.\n- Step 2: **Units of Magnetic Flux Density.** The standard unit for magnetic flux density is the **tesla (T)**. One tesla is defined as one Newton per ampere-meter ($$1 \\text{ T} = 1 \\text{ N/(A} \\cdot \\text{m})$$). This unit directly relates to the force experienced by a current-carrying conductor in the field.\n- Step 3: **Significance in $$F = BIL$$ Formula.** The formula $$F = BIL$$ calculates the force ($$F$$) experienced by a current-carrying wire of length $$L$$ carrying current $$I$$ in a magnetic field with flux density $$B$$, assuming the wire is perpendicular to the field.\n    + **Direct Proportionality:** $$B$$'s presence in the formula highlights that the force ($$F$$) is *directly proportional* to the magnetic flux density. This means:\n        + If you double the magnetic flux density ($$B$$) while keeping current ($$I$$) and length ($$L$$) constant, the force ($$F$$) on the wire will also double.\n    + **Physical Interpretation:** A larger value of $$B$$ signifies a stronger external magnetic field, which interacts more intensely with the magnetic field generated by the current in the wire. This greater interaction leads to a proportionally larger force exerted on the wire. Essentially, $$B$$ quantifies how \"effective\" the magnetic field is at generating a force on a current.", "source": "Gemini 2.5 Flash ②", "blind_id": 41}, {"id": "minimax_2_5", "question": "A student says \"magnetic field lines are real things that exist around magnets.\" Is this correct? Explain what field lines actually represent. (2 steps)", "answer": "- Step 1: No — magnetic field lines are a MODEL, not physical objects. They don't actually exist as threads or wires in space.\n- Step 2: Field lines are a visualisation tool that shows: (a) direction — the direction a north pole would move if free to move (N→S), and (b) strength — closer together = stronger field, further apart = weaker field. They're useful mental constructs that help us predict magnetic behaviour.\n\n**Takeaway:** Field lines are a human-created model to represent invisible magnetic fields — they're tools for thinking, not physical reality.", "source": "MiniMax M1 ②", "blind_id": 42}, {"id": "glm_3_33", "question": "A student claims that a compass points north because there is a giant bar magnet buried inside the Earth at the geographic North Pole. Why is this explanation wrong, and what is the actual source of Earth's magnetic field? (2 steps)", "answer": "- Step 1: There is no literal bar magnet inside the Earth. The Earth's interior is far too hot for any magnetic material to remain permanently magnetised — above the Curie temperature (about 770°C for iron), materials lose their permanent magnetism, and the Earth's core is well above this temperature.\n- Step 2: Earth's magnetic field is generated by **convection currents of molten iron and nickel in the outer core**, driven by heat from the inner core. These circulating conducting fluids act like a dynamo (a self-sustaining electromagnetic generator), producing the magnetic field. The field shape resembles a bar magnet's field, which is why we use the bar magnet as a simplified model, but the actual mechanism involves moving conducting fluids, not a solid magnet.\n\nTakeaway: Earth's field is produced by circulating molten metals in the core (geodynamo), not a buried bar magnet. The bar magnet is just a convenient model.", "source": "GLM 5.1 ③", "blind_id": 43}, {"id": "gflash_2_10", "question": "Explain what an 'electromagnet' is and outline its primary advantage over a permanent magnet in practical applications. (2 steps)", "answer": "- Step 1: **Definition of an Electromagnet.** An electromagnet is essentially a solenoid that has a core made of a soft magnetic material, typically iron. When an electric current flows through the coil of the solenoid, the iron core becomes an *induced magnet*. This induced magnetism in the core combines with the magnetic field produced by the solenoid's coils, resulting in a much stronger overall magnetic field than the solenoid alone would produce.\n- Step 2: **Primary Advantage over a Permanent Magnet.** The key advantage of an electromagnet over a permanent magnet lies in its **controllability**.\n    + **On/Off Functionality:** An electromagnet can be switched 'on' or 'off' simply by controlling the flow of electric current through its coils. When the current is on, it's a magnet; when the current is off, it loses its magnetism (or most of it if the core retains some residual magnetism). Permanent magnets, by definition, are always 'on' and cannot be easily demagnetized.\n    + **Adjustable Strength:** The strength of an electromagnet's magnetic field can be easily varied by changing the magnitude of the current flowing through its coils. A higher current generally means a stronger field. This adjustability is not possible with permanent magnets, whose strength is fixed by their material and manufacturing.\n    + **Reversible Polarity:** The polarity (North and South poles) of an electromagnet can be reversed by simply reversing the direction of the current in the coil. This is not possible with permanent magnets.\n    + **Practical Applications:** These properties make electromagnets crucial in applications like scrapyard cranes (lifting and releasing metal), electric bells, relays, and electric motors, where controlled magnetic forces are required.", "source": "Gemini 2.5 Flash ②", "blind_id": 46}, {"id": "gemini_2_9", "question": "How does coiling a wire into a solenoid change the magnetic field compared to a single straight wire? (3 steps)", "answer": "- Step 1: A single straight wire produces a relatively weak circular magnetic field around it.\n- Step 2: When the wire is coiled into a solenoid (a tight spring-like coil), the circular magnetic fields from each individual loop of wire add together.\n- Step 3: This superposition of fields creates a much stronger and more useful magnetic field shape: inside the solenoid, the field becomes strong, straight, and uniform (like a bar magnet's field), while outside the solenoid, the field is much weaker and loops around from one end to the other, also just like a bar magnet.\n\nThis effectively concentrates the magnetic field into a well-defined and powerful region inside the coil.", "source": "Gemini 2.5 Pro ②", "blind_id": 47}, {"id": "gemini_2_12", "question": "Visually, how does the interaction of a wire's circular magnetic field and an external uniform magnetic field result in a force? (3 steps)", "answer": "Imagine a wire with current flowing into the page, placed in a uniform magnetic field from permanent magnets pointing left to right.\n- Step 1: The external field lines point from left to right. The wire's field lines are clockwise circles around it (by the right-hand rule).\n- Step 2: **Above the wire**, the wire's field lines point to the right, in the *same direction* as the external field. The fields add together, creating a stronger, more concentrated magnetic field.\n- Step 3: **Below the wire**, the wire's field lines point to the left, in the *opposite direction* to the external field. The fields oppose and partially cancel each other, creating a weaker magnetic field.\nThe wire is then pushed from the area of high field strength (above) to the area of low field strength (below). This net push is the motor effect force. This is often called the \"catapult field\" effect.", "source": "Gemini 2.5 Pro ②", "blind_id": 48}, {"id": "gflash_2_14", "question": "A straight wire of length $$0.1 \\text{ m}$$ carrying a current of $$2.0 \\text{ A}$$ is placed perpendicularly in a uniform magnetic field. If the wire experiences a force of $$0.04 \\text{ N}$$, conceptually determine how the force would change if the current were halved and the magnetic field strength were doubled. (3 steps)", "answer": "- Step 1: **Initial Force Relationship.** The force experienced by the wire is given by the motor effect formula: $$F = BIL$$. In the initial scenario, we have an initial force $$F_1 = B_1 I_1 L_1$$. We know $$F_1 = 0.04 \\text{ N}$$, $$L_1 = 0.1 \\text{ m}$$, and $$I_1 = 2.0 \\text{ A}$$. We can conceptually deduce the initial magnetic field strength: $$B_1 = \\frac{F_1}{I_1 L_1} = \\frac{0.04 \\text{ N}}{2.0 \\text{ A} \\times 0.1 \\text{ m}} = \\frac{0.04}{0.2} = 0.2 \\text{ T}$$.\n- Step 2: **Analyzing the Changes.**\n    + **Current Halved:** The new current $$I_2$$ will be half of the original current $$I_1$$. So, $$I_2 = \\frac{1}{2} I_1$$.\n    + **Magnetic Field Doubled:** The new magnetic flux density $$B_2$$ will be double the original $$B_1$$. So, $$B_2 = 2 B_1$$.\n    + The length of the wire $$L$$ remains unchanged: $$L_2 = L_1$$.\n- Step 3: **Calculating the New Force Conceptually.** The new force $$F_2$$ will be given by $$F_2 = B_2 I_2 L_2$$.\n    + Substitute the changed values in terms of the original values: $$F_2 = (2 B_1) \\times (\\frac{1}{2} I_1) \\times L_1$$.\n    + Rearrange the terms: $$F_2 = (2 \\times \\frac{1}{2}) \\times (B_1 I_1 L_1)$$.\n    + Simplify the coefficient: $$F_2 = 1 \\times (B_1 I_1 L_1)$$.\n    + Since $$F_1 = B_1 I_1 L_1$$, this means $$F_2 = F_1$$.\n    + Therefore, the new force $$F_2$$ will be equal to the initial force $$F_1$$, which is $$0.04 \\text{ N}$$.\n    + Conceptually, the doubling of the magnetic field strength exactly compensates for the halving of the current, resulting in no net change in the force.", "source": "Gemini 2.5 Flash ②", "blind_id": 52}, {"id": "glm_3_49", "question": "Synthesis question: A d.c. motor has its coil in a uniform magnetic field between two permanent magnets. The current is supplied via carbon brushes and a split-ring commutator. Explain how ALL of these components work together to produce continuous rotation, referencing the underlying physics at each stage. (5 steps)", "answer": "- Step 1: **Current flows** from the power supply through the carbon brushes, into the split-ring commutator, and through the coil. The current-carrying coil now has its own magnetic field (electromagnetism — current produces a field).\n- Step 2: The coil's field **interacts with the external field** from the permanent magnets. This interaction (the motor effect) produces a force on each side of the coil where current flows perpendicular to the field. The forces on opposite sides are in opposite directions (determined by Fleming's left-hand rule), creating a couple that produces a turning effect (torque).\n- Step 3: The coil begins to **rotate**. The permanent magnets provide the uniform field needed for consistent forces. The carbon brushes maintain electrical contact while allowing the coil to spin freely — they are the \"sliding contacts\" that solve the problem of connecting stationary wires to a rotating coil.\n- Step 4: As the coil rotates past the vertical position, the **split-ring commutator reverses the current** direction in the coil. The split in the ring means that the side of the coil that was connected to the positive brush now connects to the negative brush, and vice versa. Without this reversal, the forces would oppose the rotation after the vertical position.\n- Step 5: With the current reversed, the forces on each side of the coil continue to act in the **same rotational direction** as before, ensuring continuous one-directional rotation. The momentum of the coil carries it through the brief moment near the vertical position where forces are minimal. The cycle repeats: current flows → motor effect → rotation → commutator reverses current → continued rotation.\n\nTakeaway: Power supply → current through brushes → commutator → coil → motor effect force → rotation → commutator reverses current → continuous rotation. Every component is essential.", "source": "GLM 5.1 ③", "blind_id": 55}, {"id": "gflash_1_19", "question": "What is a \"split-ring commutator\" and what is its essential role in the continuous, unidirectional rotation of a d.c. electric motor? (3 steps)", "answer": "- Step 1: **Description of a Split-Ring Commutator**\n    +   A split-ring commutator is a crucial component in a d.c. electric motor. It is a circular metal tube that is divided into two (or more) insulated segments or halves.\n    +   Each half of the commutator is permanently connected to one end of the rotating coil of the motor.\n    +   It rotates along with the coil.\n- Step 2: **Essential Role: Reversing Current Direction**\n    +   The primary role of the split-ring commutator is to **reverse the direction of the current flowing through the motor coil every half-rotation (every $$180°$$)**.\n    +   As the coil rotates, the carbon brushes (which are stationary and provide electrical contact) slide from one commutator segment to the other. This switching action causes the current to reverse direction in the coil itself.\n- Step 3: **Ensuring Continuous Unidirectional Rotation**\n    +   Consider a coil rotating in a magnetic field. Forces on the two sides of the coil act in opposite directions, creating a turning effect (torque).\n    +   Without a commutator, once the coil rotates past the vertical position (or $$180°$$), the sides would be in a position where the forces would try to push the coil back in the opposite direction, causing it to oscillate or stop.\n    +   By reversing the current direction in the coil every half-turn, the split-ring commutator ensures that the forces on each side of the coil *always* act in the correct direction to maintain the turning effect and keep the coil rotating in the *same continuous direction*.\n\nThe split-ring commutator is the ingenious mechanism that continuously flips the current direction in a motor coil, converting oscillating forces into sustained, unidirectional rotation.", "source": "Gemini 2.5 Flash ①", "blind_id": 57}, {"id": "glm_3_39", "question": "You want to determine the direction of the magnetic field at a point near a current-carrying wire. A friend tells you to use Fleming's left-hand rule. Are they correct? If not, what should you use? (2 steps)", "answer": "- Step 1: The friend is **incorrect**. Fleming's left-hand rule is for finding the direction of **force** on a current-carrying conductor in an external magnetic field. It requires you to know two of the three quantities (field, current, force) to find the third.\n- Step 2: To find the direction of the magnetic field around a current-carrying wire, you use the **right-hand thumb rule**: point your right thumb in the direction of conventional current, and your curled fingers show the direction of the magnetic field lines (concentric circles) around the wire. These are two different rules for two different purposes — don't confuse them.\n\nTakeaway: Right-hand thumb rule → field direction around a wire. Fleming's left-hand rule → force direction on a wire in a field.", "source": "GLM 5.1 ③", "blind_id": 58}, {"id": "glm_2_6", "question": "A straight wire carries a conventional current flowing straight upwards. Using the right-hand thumb rule, what is the direction of the magnetic field on the east side of the wire, and what happens to the field if the current reverses? (3 steps)", "answer": "- Step 1: Point your right thumb in the direction of conventional current (upwards). Your curled fingers represent the direction of the magnetic field circling the wire.\n- Step 2: Looking from above, the fingers curl anticlockwise. This means the field lines circle from North to East to South to West. On the east side of the wire, the field direction is pointing towards you (out of the page if viewed horizontally).\n- Step 3: If the current reverses (flows downwards), the right-hand thumb points down. The fingers now curl clockwise from above. On the east side, the field direction reverses (into the page). Reversing current always reverses the magnetic field direction.", "source": "GLM 5.1 ②", "blind_id": 59}, {"id": "gemini_3_7", "question": "How would you use a plotting compass to map the magnetic field lines around a bar magnet? (3 steps)", "answer": "- Step 1: Place a bar magnet on a large sheet of paper. Place a small plotting compass near one of the poles (e.g., the North pole). The needle of the compass, which is itself a tiny magnet, will align with the magnetic field at that point. Mark a dot on the paper at the North and South ends of the compass needle.\n- Step 2: Move the compass so that its South pole is now exactly where the North pole's dot was. The compass needle will swing to a new position, again aligning with the field. Mark a new dot at the tip of the needle (its North pole).\n- Step 3: Repeat this process of \"following the North pole\" by moving the compass and marking dots. Eventually, you will have a series of dots that trace a path from the North pole to the South pole. Connecting these dots reveals one of the magnetic field lines. Repeat this process starting from different points around the North pole to map out the entire field pattern.", "source": "Gemini 2.5 Pro ③", "blind_id": 63}, {"id": "qwen_1_5", "question": "Why is iron used as a core in electromagnets instead of, say, aluminum? (3 steps)", "answer": "- Step 1: Iron is a magnetic material that becomes strongly magnetized when placed in a magnetic field.  \n- Step 2: An electromagnet’s solenoid generates a magnetic field, which the iron core amplifies by aligning its own magnetic domains.  \n+ Contrast: Aluminum is not a magnetic material and does not contribute to field strength.  \n- Step 3: The iron core increases the magnetic flux density (B), making the electromagnet much stronger than a solenoid alone.  \n\nTakeaway: Iron enhances field strength by becoming an induced magnet; non-magnetic metals like aluminum do not.", "source": "Qwen 3 235B ①", "blind_id": 64}, {"id": "minimax_1_7", "question": "You are looking at the end of a solenoid. You observe the current flowing clockwise around the coil as seen from your position. Is this end a north pole or a south pole? Explain using the solenoid polarity rule. (1 step)", "answer": "- **Clockwise current = South pole**. The rule is: look along the solenoid from one end — if the current flows **clockwise**, that end is the **S pole**; if it flows **anticlockwise**, that end is the **N pole**. This is essentially the right-hand thumb rule applied to the whole coil (thumb points through the coil = N pole direction).\n\n**Takeaway:** Clockwise = S, Anticlockwise = N when viewing the end of a solenoid.", "source": "MiniMax M1 ①", "blind_id": 68}, {"id": "glm_3_48", "question": "A wire carries current perpendicular to a 0.2 T magnetic field. The force on 0.3 m of the wire is 0.12 N. What is the current, and how would the force change if the wire were tilted to 45° to the field? (Conceptual answer for the angle part.) (3 steps)", "answer": "- Step 1: Rearrange $$F = BIL$$ to solve for current: $$I = \\frac{F}{BL} = \\frac{0.12}{0.2 \\times 0.3} = \\frac{0.12}{0.06} = 2 \\, \\text{A}$$. The current is 2 A.\n- Step 2: If the wire is tilted to 45° (no longer perpendicular to the field), the force **decreases**. At GCSE you only calculate for 90°, but conceptually, tilting the wire reduces the component of the wire's interaction with the field.\n- Step 3: The full formula $$F = BIL\\sin\\theta$$ shows that at 45°, $$\\sin 45° \\approx 0.707$$, so the force would be about 70.7% of the maximum — roughly $$0.085 \\, \\text{N}$$ instead of $$0.12 \\, \\text{N}$$. At 0° (parallel), the force would be zero. The key insight: any angle other than 90° gives a smaller force than the maximum.\n\nTakeaway: At 90°: $$F = BIL$$ (maximum). At any other angle, force is reduced; at 0° (parallel), force is zero.", "source": "GLM 5.1 ③", "blind_id": 70}, {"id": "glm_3_29", "question": "A wire 5 cm long carries 3 A of current in a 0.4 T magnetic field at 90°. Without doing the full calculation, estimate whether the force is closer to 0.006 N, 0.06 N, or 0.6 N. (2 steps)", "answer": "- Step 1: Use $$F = BIL$$ with approximate mental math. Convert 5 cm to 0.05 m. Now compute: $$F = 0.4 \\times 3 \\times 0.05$$. First, $$0.4 \\times 3 = 1.2$$. Then $$1.2 \\times 0.05 = 0.06$$.\n- Step 2: The force is **0.06 N**. This is a small but tangible force — enough to deflect a lightweight wire visibly. Notice the order of magnitude: the short length (0.05 m) and moderate field (0.4 T) give a force in the hundredths of newtons range for a few amps of current.\n\nTakeaway: Quick estimation: $$0.4 \\times 3 \\times 0.05 \\approx 0.06 \\, \\text{N}$$. Short wires in moderate fields give small but real forces.", "source": "GLM 5.1 ③", "blind_id": 71}, {"id": "gemini_1_21", "question": "What is the formula for the force on a current-carrying conductor in a magnetic field, and what does each symbol ($$F$$, $$B$$, $$I$$, $$L$$) represent?", "answer": "The formula is $$F = BIL$$.\n- **$$F$$** is the **Force** on the conductor, measured in newtons (N).\n- **$$B$$** is the **Magnetic Flux Density**, which is a measure of the strength of the magnetic field. It is measured in tesla (T).\n- **$$I$$** is the **Current** flowing through the conductor, measured in amperes (A).\n- **$$L$$** is the **Length** of the conductor that is inside the magnetic field, measured in metres (m).\n\nThis formula applies when the conductor is perpendicular to the magnetic field.", "source": "Gemini 2.5 Pro ①", "blind_id": 72}, {"id": "qwen_2_6", "question": "How does Fleming’s left-hand rule determine the direction of force on a current-carrying wire in a magnetic field, and why must all three quantities (field, current, force) be mutually perpendicular? (2 steps)", "answer": "- Step 1: **Finger assignments and 3D orientation**  \nFleming’s left-hand rule assigns:  \n- First finger = Magnetic Field (N→S),  \n- Second finger = Conventional Current (+→−),  \n- Thumb = Force (Motion).  \nThese must be mutually perpendicular because the force arises from the vector cross product $ \\vec{F} = I \\vec{L} \\times \\vec{B} $, which is maximized when the vectors are at 90° to each other.\n\n- Step 2: **Consequences of non-perpendicular alignment**  \nIf the current or field is not aligned with the rule’s directions (e.g., wire at 45° to the field), the force direction still follows the cross product but its magnitude decreases ($F = BIL \\sin \\theta$). At GCSE, this angle factor is ignored by always using 90° orientation.\n\n+ Common error: Using the right hand instead of the left reverses the force direction.  \n+ Real-world example: In a motor, the coil is designed to keep its sides perpendicular to the field for maximum torque.", "source": "Qwen 3 235B ②", "blind_id": 73}, {"id": "gemini_3_1", "question": "What is the fundamental \"law of magnetism\" that governs how magnets interact?", "answer": "The law of magnetism describes the non-contact forces between the poles of two magnets. It states:\n- **Like poles repel:** Two North poles will push each other away, and two South poles will push each other away.\n- **Unlike poles attract:** A North pole and a South pole will pull towards each other.\n\nThis is analogous to the law of electrostatics (like charges repel, unlike attract), but it applies specifically to magnetic poles, not electric charges.", "source": "Gemini 2.5 Pro ③", "blind_id": 75}, {"id": "gemini_2_10", "question": "You have a solenoid connected to a power supply. What are four distinct ways you could increase the strength of its magnetic field? Explain the reasoning for each. (4 steps)", "answer": "- Step 1: **Increase the current ($I$) in the wire.** A larger current means more charge is flowing per second, which generates a stronger magnetic field for each loop. The total field strength is directly proportional to the current.\n- Step 2: **Increase the number of turns ($N$) on the coil.** Each turn of wire contributes to the total magnetic field. More turns mean more individual fields are being added together, creating a stronger overall field.\n- Step 3: **Decrease the length ($L$) of the solenoid (pack the turns closer).** By concentrating the same number of turns into a smaller length, you increase the density of the field lines, making the field inside stronger.\n- Step 4: **Add a soft iron core inside the solenoid.** The iron core becomes a strong induced magnet when the current is on. Its magnetic field aligns with and adds to the solenoid's field, dramatically increasing the total magnetic field strength.", "source": "Gemini 2.5 Pro ②", "blind_id": 77}, {"id": "gflash_1_24", "question": "You observe a current-carrying wire producing a magnetic field. How can you determine the direction of the current in the wire, given the direction of its circular magnetic field lines? (2 steps)", "answer": "- Step 1: **Recall the Right-Hand Thumb Rule**\n    +   The Right-Hand Thumb Rule establishes a direct relationship between the direction of conventional current and the direction of the magnetic field lines around a straight wire.\n    +   It states: If you point your right thumb in the direction of the conventional current, your curled fingers indicate the direction of the magnetic field lines.\n- Step 2: **Apply the Rule in Reverse**\n    +   Since you are given the direction of the magnetic field lines (your curled fingers), you need to position your right hand such that your fingers curl in that observed direction.\n    +   Once your fingers are correctly aligned with the field lines, your extended right thumb will then point in the direction of the conventional current flowing through the wire.\n    +   For example, if the field lines are observed to be clockwise around the wire (when viewed from above), you would curl your right fingers clockwise. Your thumb would then point downwards, indicating that the current is flowing downwards in the wire.\n\nBy aligning your right fingers with the observed magnetic field, your thumb will reveal the direction of the current in the wire.", "source": "Gemini 2.5 Flash ①", "blind_id": 78}, {"id": "qwen_1_14", "question": "How does the motor effect demonstrate the interaction between two magnetic fields? (3 steps)", "answer": "- Step 1: A current-carrying wire produces a circular magnetic field around it (electromagnetism).  \n- Step 2: When placed in an external magnetic field (e.g., between magnet poles), the two fields interact.  \n- Step 3: The interaction creates a net force due to field line compression/repulsion, pushing the wire perpendicular to both fields (Fleming’s left-hand rule).  \n\nTakeaway: The motor effect arises from the physical interaction of the wire’s field and the external field.", "source": "Qwen 3 235B ①", "blind_id": 83}, {"id": "gflash_1_3", "question": "Explain the difference between a \"permanent magnet\" and an \"induced magnet,\" focusing on their source of magnetism, field duration, and pole characteristics. (3 steps)", "answer": "- Step 1: **Permanent Magnet**\n    +   **Source of Magnetism:** A permanent magnet is made from specific permanent magnetic materials (e.g., steel, certain alloys of iron, nickel, and cobalt) that inherently produce their own persistent magnetic field. Their magnetism arises from the alignment of magnetic domains within their structure, which remains stable.\n    +   **Field Duration:** Its magnetic field is permanent; it does not lose its magnetism under normal conditions and always has fixed North and South poles.\n    +   **Pole Characteristics:** It always possesses distinct, fixed North and South poles that cannot be easily changed or reversed without extreme measures like strong demagnetization or remagnetization.\n- Step 2: **Induced Magnet**\n    +   **Source of Magnetism:** An induced magnet is a magnetic material (like iron) that temporarily becomes a magnet when placed within an existing external magnetic field. Its magnetism is \"induced\" by the external field, causing its internal magnetic domains to align temporarily.\n    +   **Field Duration:** Its magnetism is temporary. It loses most or all of its magnetic properties quickly once the external magnetic field is removed.\n    +   **Pole Characteristics:** The poles of an induced magnet are not fixed. The end of the induced magnet nearest the inducing magnet *always* becomes the opposite pole. This ensures that an induced magnet is always attracted to the inducing magnet, never repelled.\n- Step 3: **Key Contrast**\n    +   The fundamental difference lies in their autonomy: a permanent magnet generates its own field independently, while an induced magnet relies entirely on an external field to exhibit magnetic properties.\n\nPermanent magnets produce their own enduring fields with fixed poles, whereas induced magnets are temporary and their poles depend on the external field.", "source": "Gemini 2.5 Flash ①", "blind_id": 84}, {"id": "glm_3_2", "question": "Steel is used for permanent magnets, while soft iron is used for electromagnet cores. Why can't you swap them — what goes wrong in each case? (3 steps)", "answer": "- Step 1: Steel is a \"hard\" magnetic material — its domains, once aligned, resist returning to random orientation. This makes it excellent for a permanent magnet that must retain its field for years. But if you put a steel core inside a solenoid and switch the current off, the steel *stays magnetised*. You can no longer switch the electromagnet off, which defeats the entire purpose.\n- Step 2: Soft iron is a \"soft\" magnetic material — its domains align easily when an external field is applied, but they also return to random orientation the moment the field is removed. This means the iron core becomes a strong induced magnet when current flows (amplifying the solenoid's field dramatically) but loses nearly all magnetism when current stops — giving you a switchable electromagnet.\n- Step 3: If you used soft iron for a permanent magnet, it would lose its magnetism almost immediately after being magnetised — useless for a fridge magnet or compass needle. If you used steel for an electromagnet core, the electromagnet would never fully switch off — dangerous and impractical for scrapyard cranes that must release their load.\n\nTakeaway: Hard magnetic materials → permanent magnets; soft magnetic materials → electromagnet cores. Domain mobility is the key difference.", "source": "GLM 5.1 ③", "blind_id": 86}, {"id": "minimax_1_22", "question": "A plotting compass is placed at three different positions: (A) far from any magnet, (B) near the north pole of a bar magnet, (C) between two unlike poles (N–S) that are facing each other. Describe what the compass shows in each case. (3 steps)", "answer": "- **Step 1:** (A) Far away → compass aligns with **Earth's field**, pointing roughly north-south (N-pole toward geographic north/magnetic south).\n- **Step 2:** (B) Near N-pole → compass N-pole points **away** from the magnet's N-pole (repels), so it points opposite to the magnet, following field lines out of N-pole toward S.\n- **Step 3:** (C) Between unlike poles → field lines go **straight across** from N to S, so the compass needle points directly from the N-pole toward the S-pole (the field is uniform in the gap).\n\n**Takeaway:** Compass aligns with local field direction; its N-pole shows where field lines are going.", "source": "MiniMax M1 ①", "blind_id": 87}, {"id": "minimax_2_17", "question": "A DC motor is powered by a 12 V battery. What would happen to the motor's speed if you: (a) replace with a 6 V battery, (b) reverse the connections (swap + and -)? Explain each. (2 steps)", "answer": "- Step 1: (a) A 6 V battery provides HALF the current (assuming same resistance), so force $$F = BIL$$ is halved. Less force means less acceleration → slower maximum speed. Halve voltage → roughly half speed.\n- Step 2: (b) Reversing the battery connections reverses the current direction. This reverses the force direction on each side of the coil, so the motor spins the opposite way. In a DC motor, reversing the polarity reverses rotation direction.\n\n**Takeaway:** Motor speed depends on current (voltage); reversing current reverses rotation direction.", "source": "MiniMax M1 ②", "blind_id": 90}, {"id": "gemini_3_29", "question": "In a D.C. motor, you reverse the polarity of the power supply, and you also swap the North and South poles of the permanent magnets. What is the overall effect on the motor's rotation? (3 steps)", "answer": "- Step 1: **Consider reversing the current alone.** Reversing the current in the coil would, according to Fleming's Left-Hand Rule, reverse the direction of the forces on the sides of the coil. If it was rotating clockwise, it would now rotate anti-clockwise.\n- Step 2: **Consider reversing the magnetic field alone.** Reversing the magnetic field (swapping N and S poles) would also, according to Fleming's Left-Hand Rule, reverse the direction of the forces. If it was rotating clockwise, it would now rotate anti-clockwise.\n- Step 3: **Consider doing both simultaneously.** Since each change *independently* causes a reversal, making two reversals cancels each other out. Reversing the current flips the force direction, but then reversing the field flips it *back* to the original direction. Therefore, the overall effect is that the motor continues to rotate in the **same direction** as it did originally. This is a \"double negative\" effect.", "source": "Gemini 2.5 Pro ③", "blind_id": 91}, {"id": "minimax_2_33", "question": "In a d.c. motor, the coil is wound on a soft iron armature (the rotating part). Why is soft iron used rather than steel or a non-magnetic material? (2 steps)", "answer": "- Step 1: Soft iron has high magnetic permeability — it concentrates and strengthens the magnetic field from the permanent magnets, increasing the force on the current-carrying coil (F = BIL, so stronger B = stronger force).\n- Step 2: Soft iron does NOT retain magnetism when the field is removed (low remanence). This is crucial — if steel were used, it would become a weak permanent magnet itself, creating unwanted permanent forces that would interfere with the motor's controlled operation. Non-magnetic material wouldn't concentrate the field at all. Soft iron is the optimal choice: strengthens field temporarily, then releases it completely.\n\n**Takeaway:** Soft iron strengthens the field during operation but doesn't become permanently magnetised — perfect for motor armatures.", "source": "MiniMax M1 ②", "blind_id": 98}, {"id": "glm_3_14", "question": "A wire of length $$L = 0.10 \\, \\text{m}$$ carries current $$I = 2 \\, \\text{A}$$ perpendicular to a magnetic field of flux density $$B = 0.5 \\, \\text{T}$$. Calculate the force and state what would happen to this force if the wire were rotated to be parallel to the field. (2 steps)", "answer": "- Step 1: Using $$F = BIL$$: $$F = 0.5 \\times 2 \\times 0.10 = 0.10 \\, \\text{N}$$. The force on the wire is 0.10 N, directed perpendicular to both the field and the current (determined by Fleming's left-hand rule).\n- Step 2: If the wire is rotated to be **parallel** to the field lines, the force drops to **zero**. At GCSE, $$F = BIL$$ only applies when the wire is at 90° to the field. When parallel, the two magnetic fields don't interact asymmetrically, so no net force is produced. The force smoothly decreases from its maximum (at 90°) to zero (at 0°) as you rotate the wire.\n\nTakeaway: $$F = BIL$$ for perpendicular wire; parallel → $$F = 0$$.", "source": "GLM 5.1 ③", "blind_id": 99}, {"id": "glm_3_43", "question": "A student claims: \"The force on a wire in a magnetic field is always in the direction of the current.\" Explain why this is fundamentally wrong using the concept of perpendicularity. (2 steps)", "answer": "- Step 1: Fleming's left-hand rule shows that the force (thumb), current (second finger), and field (first finger) are **mutually perpendicular** — each at 90° to the other two. The force can never be in the same direction as the current because they must be at right angles.\n- Step 2: The force is always perpendicular to both the current and the field. If current flows east and the field points north, the force acts either up or down (perpendicular to both), never east. This perpendicularity is what makes the motor effect produce rotation rather than linear motion — the force is always \"sideways\" relative to the current direction.\n\nTakeaway: Force ⊥ current and force ⊥ field. The three quantities form a right-handed (well, left-handed for the motor effect) orthogonal system.", "source": "GLM 5.1 ③", "blind_id": 100}, {"id": "glm_3_19", "question": "In a d.c. motor, the coil rotates because forces act on opposite sides in opposite directions. Why don't the forces just cancel out and produce no motion? (2 steps)", "answer": "- Step 1: The forces on opposite sides of the coil are indeed equal and opposite in **direction** (one side pushed up, the other pushed down), but they act on **different sides** of the coil, separated by a distance. They don't act on the same point.\n- Step 2: Because the forces act on different sides of the coil, they form a **couple** — a pair of equal and opposite forces whose lines of action don't coincide. A couple produces a **turning effect (torque)**, causing the coil to rotate rather than translate. If both forces acted on the same point, they would cancel; acting on different sides, they produce rotation.\n\nTakeaway: Equal and opposite forces on different sides of a coil → couple → rotation, not cancellation.", "source": "GLM 5.1 ③", "blind_id": 109}, {"id": "glm_3_32", "question": "A common misconception: \"The magnetic field lines coming out of the north pole of a magnet start at the north pole and end at the south pole.\" Why is this description misleading? (2 steps)", "answer": "- Step 1: Field lines don't have a starting or ending point in the way a physical path does. They are **continuous closed loops**. Outside the magnet, they go from N to S; inside the magnet, they continue from S back to N, completing the loop. There is no gap — the lines never begin or end at a pole.\n- Step 2: This is fundamentally different from electric field lines, which DO start on positive charges and end on negative charges (because electric monopoles exist). Magnetic field lines have no start or end because magnetic monopoles don't exist — they always form closed loops. Saying they \"start\" at N and \"end\" at S only describes the direction of the arrows outside the magnet, not the full picture.\n\nTakeaway: Magnetic field lines are closed loops — they continue through the magnet's interior from S back to N. They never start or end.", "source": "GLM 5.1 ③", "blind_id": 111}, {"id": "minimax_2_3", "question": "A compass is placed at point X halfway between two bar magnets arranged with their north poles facing each other. Describe the shape and direction of the net magnetic field at X. (3 steps)", "answer": "- Step 1: Two north poles facing each other create repelling fields — field lines curve away from each pole, pushing outward.\n- Step 2: At the midpoint X, both fields point away from their respective north poles, so they point OPPOSITE directions (toward the magnets on each side).\n- Step 3: Since the magnets are identical and symmetric, the two field contributions cancel at X — the net field is zero (or very close to zero). A plotting compass needle would not point in any particular direction.\n\n**Takeaway:** Like poles (N–N or S–S) create a \"dead zone\" between them where fields oppose and cancel.", "source": "MiniMax M1 ②", "blind_id": 114}, {"id": "glm_3_28", "question": "Why does an electromagnet with an iron core produce a much stronger field than the same solenoid with no core? Explain in terms of domains. (3 steps)", "answer": "- Step 1: A solenoid without a core produces a magnetic field solely from the current flowing through its turns. This field is relatively weak because it depends only on the number of turns and the current.\n- Step 2: When an iron core is inserted, the solenoid's field passes through the iron. This external field **aligns the magnetic domains** in the iron — tiny regions where atomic magnets are already aligned in groups but point in random directions overall. The aligned domains produce their own field.\n- Step 3: The iron core's field adds to the solenoid's field, producing a **combined field** that can be hundreds or thousands of times stronger. Iron is particularly effective because it has a high permeability — its domains align very easily with an external field, maximising the amplification effect.\n\nTakeaway: Iron core amplifies the solenoid field because its domains align and contribute their own field on top.", "source": "GLM 5.1 ③", "blind_id": 115}, {"id": "glm_3_21", "question": "What would happen to a d.c. motor if the split-ring commutator were replaced with a continuous (unsplit) ring? Describe the motion of the coil. (3 steps)", "answer": "- Step 1: With a continuous ring, the current would always flow through the coil in the same direction, regardless of the coil's orientation. There would be no current reversal at any point during rotation.\n- Step 2: In the first half-turn, the forces on opposite sides of the coil cause it to rotate (say, clockwise). But when the coil passes the vertical position, the same current still flows in the same direction, and the same forces still act on the same sides.\n- Step 3: After passing vertical, the coil's orientation has flipped relative to the field. The force that was pushing one side up now pushes it down (because the side has moved to the other position), and vice versa. The forces now **oppose** the rotation. The coil would oscillate back and forth around the vertical position, eventually coming to rest — it would **not** rotate continuously.\n\nTakeaway: Without the split-ring commutator reversing current every half-turn, the motor would oscillate and stop, not spin continuously.", "source": "GLM 5.1 ③", "blind_id": 117}, {"id": "glm_3_44", "question": "You observe that when current flows through a wire near a compass, the compass needle deflects. If you increase the current, the needle deflects more. If you move the compass further from the wire, the needle deflects less. What do these observations tell you about the magnetic field around the wire? (3 steps)", "answer": "- Step 1: The compass deflection confirms that a current-carrying wire produces a magnetic field — this is electromagnetism. Without current, there's no deflection; with current, the needle aligns with the new field direction.\n- Step 2: Increasing the current causes greater deflection, meaning the field is **stronger**. The wire's magnetic field strength is proportional to the current — more current produces a stronger field, which exerts a larger torque on the compass needle.\n- Step 3: Moving the compass further away causes less deflection, meaning the field **weakens with distance**. The concentric circular field lines are closest together near the wire (strong field) and spread further apart at greater distances (weaker field). This distance dependence is why the field from a single wire falls off rapidly.\n\nTakeaway: ↑current → ↑field strength; ↑distance from wire → ↓field strength. Both confirmed by compass deflection.", "source": "GLM 5.1 ③", "blind_id": 118}, {"id": "gflash_2_1", "question": "State the 'Law of Magnetism' and clarify how it differs conceptually from electrostatic attraction and repulsion. (2 steps)", "answer": "- Step 1: **Statement of the Law of Magnetism.** The Law of Magnetism states that like magnetic poles repel each other (e.g., North-North or South-South), while unlike magnetic poles attract each other (e.g., North-South). This interaction is a non-contact force, meaning the magnets do not need to physically touch to exert a force on each other.\n- Step 2: **Conceptual Difference from Electrostatics.** While both involve attraction and repulsion of 'like' and 'unlike' entities, the Law of Magnetism applies specifically to *magnetic poles*. Electrostatic attraction/repulsion, governed by Coulomb's Law, applies to *electric charges* (positive and negative).\n    + **Magnetic Poles vs. Electric Charges:** Magnetic poles are always found in pairs (dipoles), whereas electric charges can exist in isolation (monopoles, like a single electron or proton).\n    + **Nature of Force:** The magnetic force acts on magnets or magnetic materials, influencing their alignment or movement within a magnetic field. The electrostatic force acts on charged particles, causing them to accelerate or creating electric current. A stationary electric charge will produce an electric field but not a magnetic field, while a moving electric charge produces both.", "source": "Gemini 2.5 Flash ②", "blind_id": 124}, {"id": "gflash_1_12", "question": "Define the \"motor effect.\" Explain the fundamental cause of this effect and the conditions under which the force experienced by the conductor is maximized or zero. (3 steps)", "answer": "- Step 1: **Definition of the Motor Effect**\n    +   The motor effect is the phenomenon where a current-carrying conductor (such as a wire) experiences a force when it is placed within an external magnetic field. This force can cause the conductor to move.\n- Step 2: **Fundamental Cause: Interaction of Magnetic Fields**\n    +   The motor effect arises from the interaction of *two* magnetic fields:\n        +   One field is the **external magnetic field** provided by a permanent magnet (or another electromagnet).\n        +   The second field is the **magnetic field generated around the current-carrying wire itself** (due to electromagnetism).\n    +   When these two magnetic fields overlap, they interact. Where the fields are in the same direction, they reinforce each other, creating a stronger field. Where they are in opposite directions, they cancel out, creating a weaker field. This imbalance in field strength results in a net force pushing the conductor from the region of stronger field towards the region of weaker field.\n- Step 3: **Conditions for Maximum and Zero Force**\n    +   **Maximum Force:** The force on the conductor is maximum when the current-carrying wire is placed **perpendicular** (at $$90°$$) to the direction of the external magnetic field lines. This orientation maximizes the interaction between the two fields.\n    +   **Zero Force:** The force on the conductor is zero when the current-carrying wire is placed **parallel** to the direction of the external magnetic field lines. In this orientation, the fields do not interact in a way that produces a net force perpendicular to the wire.\n\nThe motor effect is a direct consequence of two magnetic fields pushing against each other, with the force's magnitude depending critically on their relative orientation.", "source": "Gemini 2.5 Flash ①", "blind_id": 126}, {"id": "glm_3_17", "question": "A student applies Fleming's left-hand rule using their RIGHT hand by mistake. Their first finger points from N to S, and their second finger points in the correct current direction. Will their thumb point in the correct force direction? Explain. (3 steps)", "answer": "- Step 1: Fleming's left-hand rule requires the left hand because the three quantities (field, current, force) are mutually perpendicular in a specific orientation that is a left-handed coordinate system. The first finger (field, N→S), second finger (current, +→−), and thumb (force) on the left hand are arranged so that each is 90° from the other two in a specific chirality.\n- Step 2: If you use your right hand with the first finger pointing from N to S and the second finger in the same current direction, your right thumb will point in the **opposite** direction to what the left thumb would point. This is because the right hand has the opposite chirality (mirror image) to the left hand.\n- Step 3: So the student would predict the force in the wrong direction — exactly opposite to the true direction. This could lead to predicting a wire moves up when it actually moves down, or into the page instead of out. The wrong hand gives the wrong answer.\n\nTakeaway: Left hand for force on a current-carrying conductor. Right hand is for a completely different purpose (field direction around a wire). Using the wrong hand reverses the force direction.", "source": "GLM 5.1 ③", "blind_id": 133}, {"id": "glm_3_45", "question": "A d.c. motor is running, and you suddenly reverse the magnetic field (swap the N and S poles of the permanent magnets) while keeping the current the same. What happens to the direction of rotation? (2 steps)", "answer": "- Step 1: Reversing the field direction means the first finger in Fleming's left-hand rule now points the opposite way. With the current (second finger) unchanged, the thumb (force) reverses direction. The forces on each side of the coil now push in the opposite directions.\n- Step 2: The motor's direction of rotation **reverses**. This is the second way to change rotation direction (the first being reversing the current). The commutator still functions correctly — it continues to ensure continuous rotation — but now in the opposite direction.\n\nTakeaway: Reverse field → reverse rotation. Reverse current → reverse rotation. Either change flips the force direction.", "source": "GLM 5.1 ③", "blind_id": 135}, {"id": "gflash_1_17", "question": "A straight wire segment of length $$20 \\text{ cm}$$ carrying a current of $$3 \\text{ A}$$ experiences a force of $$0.12 \\text{ N}$$ when placed perpendicular to a uniform magnetic field. Conceptually explain how you would determine the magnetic flux density ($$B$$) of the field, outlining the necessary steps without performing the final calculation. (3 steps)", "answer": "- Step 1: **Identify the relevant formula and rearrange it for the unknown.**\n    +   The fundamental formula for the force on a current-carrying wire in a perpendicular magnetic field is $$F = BIL$$.\n    +   We are given $$F$$, $$I$$, and $$L$$, and we need t
