<script>
const DATA={"selected": [{"id": "gemini_3_14", "question": "What is a solenoid, and how does its magnetic field compare to that of a simple bar magnet?", "answer": "A solenoid is a long coil of wire, often wrapped around a cylindrical core.\n\nWhen a current flows through the wire, the solenoid produces a magnetic field that is strikingly similar to that of a bar magnet.\n- **Inside the solenoid:** The magnetic field is very strong, straight, and uniform (represented by parallel, equally spaced field lines).\n- **Outside the solenoid:** The field loops around from one end to the other, becoming weaker and spreading out, exactly like the field of a bar magnet.\n\nOne end of the solenoid acts as a North pole and the other as a South pole. The key difference is that the solenoid's magnetism is temporary and controllable—it only exists when current is flowing.", "source": "Gemini 2.5 Pro ③", "blind_id": 1}, {"id": "gemini_1_9", "question": "A compass needle's north pole points towards the Earth's geographic North Pole. What does this tell us about the magnetic polarity of the region near the geographic North Pole?", "answer": "Since the north pole of a magnet (the compass needle) is attracted to a south pole, the fact that it points to the geographic North Pole means that the Earth's magnetic pole located there is actually a **magnetic south pole**. Similarly, the Earth's geographic South Pole is a magnetic north pole.", "source": "Gemini 2.5 Pro ①", "blind_id": 3}, {"id": "gemini_4_23", "question": "Describe the complete sequence of events for one half-rotation of a D.C. motor, starting from when the coil is horizontal. (4 steps)", "answer": "- Step 1: **Horizontal Position.** Current flows from the power supply, through a brush and one side of the commutator, into one side of the coil (e.g., the left side). It flows out the other side (right side) and back to the supply. Using Fleming's Left-Hand Rule, the force on the left side is upwards, and the force on the right side is downwards. This pair of forces creates a turning effect (torque), causing the coil to rotate (e.g., clockwise).\n- Step 2: **Rotating towards Vertical.** As the coil rotates, the forces continue to act up on the left and down on the right, maintaining the turning effect. The speed of rotation increases.\n- Step 3: **Vertical Position.** The coil is now vertical. The gaps in the split-ring commutator are aligned with the brushes, so the current is momentarily cut off. The force on the wires becomes zero. However, the coil's momentum carries it past this point.\n- Step 4: **Past Vertical.** As the coil moves just past the vertical position, the commutator halves make contact with the *opposite* brushes. The direction of the current *in the coil itself* is now reversed. The side of the coil that is now on the left (previously on the right) experiences an upward force, and the side now on the right experiences a downward force. The turning effect continues in the same rotational direction (clockwise).\n\nThis process ensures continuous rotation in a single direction.", "source": "Gemini 2.5 Pro ④", "blind_id": 4}, {"id": "gemini_1_1", "question": "State the \"law of magnetism\" regarding how poles interact, and explain how this interaction is fundamentally different from electrostatic forces.", "answer": "- Step 1: The law of magnetism states that **like poles repel** (e.g., North repels North, South repels South) and **unlike poles attract** (e.g., North attracts South). This is a non-contact force.\n- Step 2: This is different from electrostatic forces (between charges) because magnetic forces only act on other magnets or magnetic materials. Electrostatic forces act on charged objects. A north pole has no effect on a stationary positive or negative charge, and vice versa. The forces are distinct phenomena mediated by different fields (magnetic vs. electric).", "source": "Gemini 2.5 Pro ①", "blind_id": 6}, {"id": "gemini_3_21", "question": "A 10 cm wire in a magnetic field of strength $$B$$ carries a current $$I$$ and experiences a force $$F$$. Without calculation, state what would happen to the force if:\na) The current is tripled to $$3I$$.\nb) The wire is replaced with a 5 cm wire.\nc) The magnetic field strength is halved to $$B/2$$.", "answer": "This question tests the proportional relationships in the formula $$F = BIL$$.\n\n- **a) Tripled Current:** Since force is directly proportional to current ($$F \\propto I$$), tripling the current will **triple the force** to $$3F$$.\n- **b) Halved Length:** Force is directly proportional to the length of the wire in the field ($$F \\propto L$$). Replacing the 10 cm wire with a 5 cm wire halves the length, so the force will be **halved** to $$F/2$$.\n- **c) Halved Field Strength:** Force is directly proportional to the magnetic field strength ($$F \\propto B$$). Halving the field strength will **halve the force** to $$F/2$$.", "source": "Gemini 2.5 Pro ③", "blind_id": 7}, {"id": "gemini_3_5", "question": "Explain the process of \"induced magnetism\" and why it always results in a force of attraction, never repulsion. (2 steps)", "answer": "- Step 1: Induced magnetism occurs when a magnetic material (like a paperclip) is placed within the magnetic field of a permanent magnet. The external field causes the magnetic domains within the material to align, temporarily turning the material into a magnet itself.\n- Step 2: The alignment always happens in a way that creates an opposite pole on the end of the material closest to the permanent magnet. For example, if you bring the North pole of a bar magnet near a paperclip, the end of the paperclip closer to the magnet will become a South pole, and the farther end will become a North pole. According to the law of magnetism, unlike poles attract (N-S). Since induction *always* creates an opposite pole nearby, the resulting force is *always* one of attraction.", "source": "Gemini 2.5 Pro ③", "blind_id": 8}, {"id": "gemini_1_26", "question": "When the coil of a D.C. motor is perfectly vertical, the gaps in the split-ring commutator mean that no current flows for a brief moment. Why does the motor keep turning instead of stopping?", "answer": "The motor keeps turning due to its **rotational momentum** (or inertia). Although the force disappears for an instant when the coil is vertical, the coil is already spinning. This momentum is enough to carry it past the vertical position, at which point the commutator reconnects to the brushes (with reversed polarity), the current flows again, and the motor effect forces take over to continue pushing it around.", "source": "Gemini 2.5 Pro ①", "blind_id": 10}, {"id": "gemini_2_3", "question": "Why is attraction not a definitive test for determining if an object is a permanent magnet, while repulsion is? (2 steps)", "answer": "- Step 1: **Attraction can be caused by induced magnetism.** Any magnetic material (like iron, steel, nickel, or cobalt) will be attracted to a magnet. When a magnet is brought near a piece of iron, it induces an opposite pole in the part of the iron closest to it (e.g., a North pole induces a South pole). This N-S attraction pulls the iron towards the magnet, even though the iron was not a magnet itself to begin with.\n- Step 2: **Repulsion can only occur between two permanent magnets.** Induced magnetism *always* results in attraction. Therefore, if you bring an unknown object near a known magnet and it repels, the unknown object *must* have its own permanent magnetic field with a like pole facing the known magnet. Repulsion is the only unambiguous proof that an object is a permanent magnet.", "source": "Gemini 2.5 Pro ②", "blind_id": 11}, {"id": "gemini_2_7", "question": "What is the fundamental principle of electromagnetism?", "answer": "The fundamental principle of electromagnetism is that an electric current produces a magnetic field. Whenever charge flows through a conductor (like a wire), a magnetic field is generated in the space around that conductor. If there is no current, there is no magnetic field. This discovery showed that electricity and magnetism are not separate phenomena but are deeply linked.", "source": "Gemini 2.5 Pro ②", "blind_id": 15}, {"id": "gemini_2_22", "question": "What are the two ways to reverse the direction of rotation of a D.C. motor? Explain why each method works using Fleming's Left-Hand Rule.", "answer": "- Step 1: **Reverse the direction of the current.** If you swap the terminals of the power supply, the direction of the current (Second finger) in the coil reverses. According to Fleming's Left-Hand Rule, if the Field (First finger) stays the same but the Current (Second finger) is reversed, the Motion (Thumb) must also reverse.\n- Step 2: **Reverse the direction of the magnetic field.** If you swap the North and South poles of the permanent magnets, the direction of the Field (First finger) reverses. According to Fleming's Left-Hand Rule, if the Current (Second finger) stays the same but the Field (First finger) is reversed, the Motion (Thumb) must also reverse.\n\nNote: If you do both at the same time, the two reversals cancel each other out, and the motor will continue to spin in the original direction.", "source": "Gemini 2.5 Pro ②", "blind_id": 17}, {"id": "gemini_3_26", "question": "A student suggests building a D.C. motor using continuous metal slip rings instead of a split-ring commutator. Why would this design fail to produce continuous rotation?", "answer": "This design would fail because it wouldn't reverse the current in the coil.\n- **First half-turn:** The motor would start to rotate as normal. For example, the left side is pushed up and the right side is pushed down, causing a clockwise rotation.\n- **After 180 degrees:** The side that was on the left is now on the right, and vice versa. With continuous slip rings, the current direction *in the coil itself* would remain the same. This means the force on the wire that is now on the right would *still* be upwards, and the force on the wire on the left would be downwards.\n- **Result:** These forces would now oppose the rotation, trying to turn the coil back anti-clockwise. The coil would simply oscillate back and forth around the vertical position instead of rotating continuously. The split is the key innovation that fixes this problem.", "source": "Gemini 2.5 Pro ③", "blind_id": 18}, {"id": "gemini_3_6", "question": "What are the key rules for drawing magnetic field lines to represent a magnetic field? (3 rules)", "answer": "Magnetic field lines are a visual tool to model the invisible magnetic field. They follow three main rules:\n1.  **Direction:** The lines always point away from a North pole and towards a South pole. An arrowhead is drawn on the line (usually midway) to show this direction.\n2.  **Strength:** The density of the lines represents the strength of the field. Where the lines are close together, the field is strong (e.g., at the poles). Where they are far apart, the field is weak.\n3.  **Non-crossing:** Magnetic field lines can never touch or cross each other. If they did, it would imply the field points in two different directions at the same point, which is impossible.", "source": "Gemini 2.5 Pro ③", "blind_id": 19}, {"id": "gemini_2_11", "question": "What is the \"motor effect,\" and what is the fundamental interaction that causes it? (2 steps)", "answer": "- Step 1: The motor effect is the phenomenon where a conductor carrying an electric current experiences a force when it is placed in an external magnetic field.\n- Step 2: The fundamental cause is the **interaction between two magnetic fields**:\n    + The external magnetic field (from, say, permanent magnets).\n    + The magnetic field produced by the current flowing through the conductor itself.\nWhere these two fields interact, they exert a force on each other, which is felt by the wire. The wire is pushed from the region where the fields are reinforced (stronger) to the region where they are weakened (cancelled out).", "source": "Gemini 2.5 Pro ②", "blind_id": 22}, {"id": "gemini_3_20", "question": "The force on a current-carrying wire in a magnetic field is given by the equation $$F = BIL$$. Explain what each symbol represents and why it makes intuitive sense for each to be in the formula. (3 steps)", "answer": "The formula describes the magnitude of the force ($$F$$) on a straight conductor at $$90°$$ to a uniform magnetic field.\n\n- Step 1: **$$B$$ is the Magnetic Flux Density.** This is a measure of the strength of the external magnetic field, in units of Tesla ($$T$$). It makes sense that a stronger external magnet ($$B$$) would interact more forcefully with the wire's field, producing a larger force $$F$$. So, $$F \\propto B$$.\n- Step 2: **$$I$$ is the Current.** This is the electric current flowing through the wire, in Amperes ($$A$$). A larger current produces a stronger magnetic field around the wire itself. This stronger wire-field will then interact more forcefully with the external field, producing a larger force $$F$$. So, $$F \\propto I$$.\n- Step 3: **$$L$$ is the Length.** This is the length of the wire that is actually inside the magnetic field, in meters ($$m$$). A longer section of wire within the field means there is more wire for the force to act upon. The total force is the sum of the small forces on each part of the wire, so a greater length results in a greater total force $$F$$. So, $$F \\propto L$$.", "source": "Gemini 2.5 Pro ③", "blind_id": 23}, {"id": "gemini_3_7", "question": "How would you use a plotting compass to map the magnetic field lines around a bar magnet? (3 steps)", "answer": "- Step 1: Place a bar magnet on a large sheet of paper. Place a small plotting compass near one of the poles (e.g., the North pole). The needle of the compass, which is itself a tiny magnet, will align with the magnetic field at that point. Mark a dot on the paper at the North and South ends of the compass needle.\n- Step 2: Move the compass so that its South pole is now exactly where the North pole's dot was. The compass needle will swing to a new position, again aligning with the field. Mark a new dot at the tip of the needle (its North pole).\n- Step 3: Repeat this process of \"following the North pole\" by moving the compass and marking dots. Eventually, you will have a series of dots that trace a path from the North pole to the South pole. Connecting these dots reveals one of the magnetic field lines. Repeat this process starting from different points around the North pole to map out the entire field pattern.", "source": "Gemini 2.5 Pro ③", "blind_id": 25}, {"id": "gemini_2_14", "question": "**Misconception Probe:** When would you use the Right-Hand Thumb Rule versus Fleming's Left-Hand Rule?", "answer": "- **Use the Right-Hand Thumb Rule** when you want to find the direction of the **magnetic field produced by a current**. For example, to find the direction of the circular field lines around a single wire or to determine which end of a solenoid becomes the North pole. It relates just two quantities: current and the field it creates.\n- **Use Fleming's Left-Hand Rule** when you have a current-carrying wire already placed inside an *external* magnetic field and you want to find the direction of the resulting **force** on that wire. It relates three quantities: external field, current, and the force they produce.\n\nIn short: Right hand for *making* a field, Left hand for the *force* within a field.", "source": "Gemini 2.5 Pro ②", "blind_id": 28}, {"id": "gemini_4_16", "question": "Explain each part of Fleming's Left-Hand Rule, assigning a physical quantity to each finger.", "answer": "Fleming's Left-Hand Rule is a mnemonic for finding the direction of the force in the motor effect. You hold your left hand so your thumb, first finger, and second finger are all mutually perpendicular (at 90° to each other).\n\n-   **ThuMb** represents the direction of **M**otion (the Force or Thrust) on the wire.\n-   **First finger** (index finger) represents the direction of the magnetic **F**ield, which is always from North to South.\n-   **seCond finger** (middle finger) represents the direction of the conventional **C**urrent, which is from the positive terminal to the negative terminal.", "source": "Gemini 2.5 Pro ④", "blind_id": 34}, {"id": "gemini_1_23", "question": "What is the primary energy conversion that takes place in a D.C. motor?", "answer": "A D.C. motor is a device designed to convert **electrical energy** into **rotational kinetic energy** (mechanical energy). It uses the motor effect to create continuous rotation from an electrical current.", "source": "Gemini 2.5 Pro ①", "blind_id": 45}, {"id": "gemini_2_10", "question": "You have a solenoid connected to a power supply. What are four distinct ways you could increase the strength of its magnetic field? Explain the reasoning for each. (4 steps)", "answer": "- Step 1: **Increase the current ($I$) in the wire.** A larger current means more charge is flowing per second, which generates a stronger magnetic field for each loop. The total field strength is directly proportional to the current.\n- Step 2: **Increase the number of turns ($N$) on the coil.** Each turn of wire contributes to the total magnetic field. More turns mean more individual fields are being added together, creating a stronger overall field.\n- Step 3: **Decrease the length ($L$) of the solenoid (pack the turns closer).** By concentrating the same number of turns into a smaller length, you increase the density of the field lines, making the field inside stronger.\n- Step 4: **Add a soft iron core inside the solenoid.** The iron core becomes a strong induced magnet when the current is on. Its magnetic field aligns with and adds to the solenoid's field, dramatically increasing the total magnetic field strength.", "source": "Gemini 2.5 Pro ②", "blind_id": 47}, {"id": "gemini_1_5", "question": "What does a magnetic field represent, and how do we use magnetic field lines to visualize it?", "answer": "A magnetic field is a region of space around a magnet (or a current-carrying wire) where another magnet or a magnetic material will experience a non-contact force. We cannot see the field itself, so we use a model called **magnetic field lines** to visualize its direction and strength. The lines represent the path a \"free\" north pole would take if placed in the field.", "source": "Gemini 2.5 Pro ①", "blind_id": 50}, {"id": "gemini_2_4", "question": "Explain the difference between a \"permanent magnet\" and an \"induced magnet\".", "answer": "A **permanent magnet** is made from a \"magnetically hard\" material (like steel) that produces its own persistent magnetic field. It has fixed North and South poles and does not need an external field to be magnetic.\n\nAn **induced magnet**, on the other hand, is a \"magnetically soft\" material (like iron) that becomes a magnet only when it is placed within an external magnetic field. It temporarily gains poles, but it loses most or all of its magnetism as soon as the external field is removed. The induced pole nearest the external magnet is always the opposite pole, which is why induced magnets are always attracted.", "source": "Gemini 2.5 Pro ②", "blind_id": 53}, {"id": "gemini_2_16", "question": "A wire carrying a current is placed in a magnetic field. What orientation of the wire relative to the field lines results in the maximum possible force, and what orientation results in zero force? Why? (2 steps)", "answer": "- Step 1: **Maximum force occurs when the wire is perpendicular ($$90^\\circ$$) to the magnetic field lines.** This is because the interaction between the wire's circular field and the external field is most effective at creating a \"strong side\" and a \"weak side\", leading to the largest possible push (the \"catapult effect\" is strongest). The formula $$F = BIL$$ applies directly in this case.\n- Step 2: **Zero force occurs when the wire is parallel ($$0^\\circ$$) to the magnetic field lines.** In this orientation, the wire's circular magnetic field does not create a region of reinforcement on one side and cancellation on the other. The wire's field lines are at right angles to the external field lines all around the wire, leading to no net push in any direction. There is no interaction that can produce a net force.", "source": "Gemini 2.5 Pro ②", "blind_id": 55}, {"id": "gemini_1_2", "question": "You have two identical-looking metal bars. You know one is a permanent magnet and the other is just an unmagnetised piece of iron. How can you determine which is the magnet using only the two bars? (2 steps)", "answer": "- Step 1: Bring one end of the first bar (Bar A) towards the middle of the second bar (Bar B). If there is an attractive force, then Bar A must be the magnet and Bar B is the iron. A magnet's poles are at its ends, so its field is weakest at its center, while an unmagnetised piece of iron will be attracted to any part of a magnet.\n- Step 2: The definitive test is **repulsion**. Bring an end of Bar A to an end of Bar B. If they attract, the result is ambiguous – it could be N-S attraction or a magnet attracting a piece of iron. Now, flip Bar A around and bring its other end to the same end of Bar B. If they now repel, you have found two like poles. This proves that **both bars are magnets**. If you only ever observe attraction no matter the orientation, then one bar is a magnet and the other is simply a magnetic material (iron).\n\n**Takeaway:** Attraction is not proof of magnetism, but repulsion is.", "source": "Gemini 2.5 Pro ①", "blind_id": 56}, {"id": "gemini_2_21", "question": "You want to make a D.C. motor spin faster and with more turning force. State three distinct modifications you could make and explain the physics for each.", "answer": "- Step 1: **Increase the current ($$I$$) from the power supply.** According to $$F = BIL$$, a larger current results in a larger force on the sides of the coil. A larger force produces a larger turning effect (torque), causing the coil to accelerate to a higher rotational speed.\n- Step 2: **Use stronger permanent magnets (increase $$B$$).** A stronger magnetic field (higher magnetic flux density, $$B$$) also increases the force on the coil as per $$F = BIL$$. This again results in a greater torque and faster rotation.\n- Step 3: **Increase the number of turns on the coil.** While the formula is for a single wire length $$L$$, a coil with $$N$$ turns effectively multiplies the length of the wire in the field. The total force is closer to $$F = N \\times BIL$$. More turns mean a much larger turning force, leading to faster rotation.", "source": "Gemini 2.5 Pro ②", "blind_id": 57}, {"id": "gemini_2_8", "question": "Describe the shape and direction of the magnetic field around a long, straight, current-carrying wire. How is its direction determined?", "answer": "- Step 1: The magnetic field lines around a long, straight wire are a series of **concentric circles** centered on the wire. The wire is at the very center of these circles.\n- Step 2: The strength of the field is greatest near the wire (where the circles would be drawn closest together) and decreases as the distance from the wire increases (circles are spaced further apart).\n- Step 3: The direction of the field lines (clockwise or anticlockwise) is determined by the **Right-Hand Thumb Rule**. If you point your right thumb in the direction of the conventional current (from + to -), your fingers will curl in the direction of the magnetic field lines.", "source": "Gemini 2.5 Pro ②", "blind_id": 59}, {"id": "gemini_3_29", "question": "In a D.C. motor, you reverse the polarity of the power supply, and you also swap the North and South poles of the permanent magnets. What is the overall effect on the motor's rotation? (3 steps)", "answer": "- Step 1: **Consider reversing the current alone.** Reversing the current in the coil would, according to Fleming's Left-Hand Rule, reverse the direction of the forces on the sides of the coil. If it was rotating clockwise, it would now rotate anti-clockwise.\n- Step 2: **Consider reversing the magnetic field alone.** Reversing the magnetic field (swapping N and S poles) would also, according to Fleming's Left-Hand Rule, reverse the direction of the forces. If it was rotating clockwise, it would now rotate anti-clockwise.\n- Step 3: **Consider doing both simultaneously.** Since each change *independently* causes a reversal, making two reversals cancels each other out. Reversing the current flips the force direction, but then reversing the field flips it *back* to the original direction. Therefore, the overall effect is that the motor continues to rotate in the **same direction** as it did originally. This is a \"double negative\" effect.", "source": "Gemini 2.5 Pro ③", "blind_id": 67}, {"id": "gemini_1_0", "question": "What are the two fundamental properties of the poles of any magnet?", "answer": "- Step 1: Every magnet has two poles, which we label **north pole** (or north-seeking pole) and **south pole** (or south-seeking pole). These are the regions where the magnetic effect is strongest.\n- Step 2: It is impossible to have a magnetic monopole. If you cut a bar magnet in half, you don't get a separate north and south pole. Instead, you get two smaller magnets, each with its own north and south pole. This is a key difference from electric charges, which can exist as isolated positive or negative charges.", "source": "Gemini 2.5 Pro ①", "blind_id": 74}, {"id": "gemini_1_25", "question": "What is the crucial role of the split-ring commutator in a D.C. motor, and why is it essential for continuous rotation? (3 steps)", "answer": "- Step 1: The split-ring commutator is a split metal ring that connects the external circuit (via brushes) to the rotating coil. Its primary role is to **reverse the direction of the current in the coil every half rotation**.\n- Step 2: As the coil rotates, the forces on its sides cause it to turn. After half a turn ($$180°$$), the side that was moving up is now on the side that needs to move down to continue the rotation.\n- Step 3: At this half-turn point, the two halves of the commutator swap contact with the brushes. This reverses the current's direction relative to the coil's sides. The side that just moved up now has its current reversed, so the force on it is now downwards. This ensures the turning force (torque) always acts in the same rotational direction (e.g., always clockwise), producing continuous rotation instead of just rocking back and forth.", "source": "Gemini 2.5 Pro ①", "blind_id": 81}, {"id": "gemini_3_18", "question": "Explain, in terms of interacting magnetic fields, *why* a current-carrying wire in a magnetic field experiences a force. (3 steps)", "answer": "- Step 1: A wire with a current flowing through it generates its own circular magnetic field around it (according to the Right-Hand Thumb Rule).\n- Step 2: This wire is then placed inside an external magnetic field (e.g., between the N and S poles of two magnets). Now there are two magnetic fields in the same region of space, and they must interact.\n- Step 3: On one side of the wire, the two fields will be pointing in a similar direction, so they reinforce each other, creating a stronger combined field. On the other side of the wire, the fields will be pointing in opposite directions, so they partially cancel, creating a weaker combined field. The wire is then pushed by a force from the area of the stronger field towards the area of the weaker field. This imbalance of field strength is the origin of the motor effect force.", "source": "Gemini 2.5 Pro ③", "blind_id": 82}, {"id": "gemini_4_6", "question": "Imagine the gap between the North and South poles of two strong, flat magnets placed close to each other. How would you describe the magnetic field in this gap, and how would you represent it with field lines?", "answer": "The magnetic field in the gap between two opposite poles is a **uniform magnetic field**. This means the field has the same strength and the same direction at every point within that gap.\n\nIt is represented by drawing a series of **parallel, equally-spaced straight lines** pointing directly from the North pole to the South pole. The equal spacing signifies uniform strength, and the parallel straight lines signify uniform direction.", "source": "Gemini 2.5 Pro ④", "blind_id": 83}, {"id": "gemini_1_29", "question": "**Exercise:** In a D.C. motor, the magnetic field points from left (N) to right (S). The current on the top side of the coil flows *into* the page. What is the direction of the force on this top side, and what is the direction of the force on the bottom side where the current flows *out of* the page? What is the resulting motion? (3 steps)", "answer": "- Step 1: **Analyze the top side.** Using Fleming's Left-Hand Rule:\n    + **Field (First finger):** Point from left to right.\n    + **Current (Second finger):** Point into the page.\n    + **Motion (Thumb):** Your thumb points **downwards**. So the top side of the coil is forced down.\n- Step 2: **Analyze the bottom side.** The current is now *out of* the page. Using the rule again:\n    + **Field (First finger):** Point from left to right.\n    + **Current (Second finger):** Point out of the page.\n    + **Motion (Thumb):** Your thumb points **upwards**. So the bottom side of the coil is forced up.\n- Step 3: **Determine the resulting motion.** With the top side pushed down and the bottom side pushed up, these two forces create a turning effect, causing the coil to rotate in an **anti-clockwise** direction.", "source": "Gemini 2.5 Pro ①", "blind_id": 86}, {"id": "gemini_3_16", "question": "Why does inserting a soft iron core into a current-carrying solenoid dramatically increase the strength of its magnetic field? (2 steps)", "answer": "- Step 1: The initial magnetic field is produced by the current flowing in the solenoid's coils. This field, while present, might be relatively weak on its own.\n- Step 2: When the soft iron core (a magnetic material) is placed inside this field, it becomes a very strong **induced magnet**. The magnetic domains inside the iron align with the solenoid's field. The now-magnetised iron core produces its own powerful magnetic field, which adds to the original field from the coil. The total magnetic field is the sum of the field from the coil and the much stronger field from the magnetised core, resulting in a significantly more powerful electromagnet.", "source": "Gemini 2.5 Pro ③", "blind_id": 94}, {"id": "gemini_4_15", "question": "A wire in a magnetic field experiences an upward force. If the direction of the current is reversed, but the magnetic field remains the same, what happens to the force?", "answer": "Reversing the direction of the current will **reverse the direction of the force**.\n\nIf the original force was upwards, the new force will be downwards. This can be predicted using Fleming's Left-Hand Rule: if you keep your first finger (Field) pointing in the same direction but reverse your second finger (Current), your thumb (Motion/Force) must point in the opposite direction.", "source": "Gemini 2.5 Pro ④", "blind_id": 95}, {"id": "gemini_4_20", "question": "Why are the brushes in a D.C. motor typically made of carbon, and what is their function?", "answer": "The brushes have two main functions:\n1.  **Electrical Contact:** They provide a continuous electrical connection between the stationary external circuit (the battery) and the rotating split-ring commutator.\n2.  **Allowing Rotation:** They are fixed in place and press against the commutator, allowing it to spin freely beneath them without the wires getting tangled.\n\nThey are made of carbon (specifically, graphite) because it is a good electrical conductor, but it is also soft and has low friction (it's a natural lubricant). This allows it to maintain good contact without wearing down the commutator too quickly.", "source": "Gemini 2.5 Pro ④", "blind_id": 98}, {"id": "gemini_1_28", "question": "**Exercise:** A straight wire of length $$20$$ cm is in a uniform magnetic field of $$2$$ T. A current of $$5$$ A flows through it, perpendicular to the field. Provide a conceptual walkthrough to find the force on the wire. (3 steps)", "answer": "- Step 1: **Identify the formula and variables.** The force is given by the motor effect formula, $$F = BIL$$. We have the magnetic flux density $$B = 2$$ T, the current $$I = 5$$ A, and the length $$L$$.\n- Step 2: **Check and convert units.** The length is given as $$20$$ cm. The formula requires length in metres. So, we convert $$L = 20 \\text{ cm} = 0.2 \\text{ m}$$. This is a critical step that is often missed.\n- Step 3: **Substitute and calculate.** Now we apply the formula: $$F = (2 \\text{ T}) \\times (5 \\text{ A}) \\times (0.2 \\text{ m})$$. Conceptually, this is $$2 \\times 5 = 10$$, and then $$10 \\times 0.2 = 2$$. The force on the wire is $$2$$ N.", "source": "Gemini 2.5 Pro ①", "blind_id": 100}], "models": {}, "meta": {"gemini_1": {"run": 1, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.7, "in_tokens": 5927, "out_tokens": 5845, "reasoning_chars": 0, "cost_eur": 0.0606, "elapsed_s": 62, "content_chars": 24235}, "gemini_2": {"run": 2, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.8, "in_tokens": 5927, "out_tokens": 5152, "reasoning_chars": 0, "cost_eur": 0.0542, "elapsed_s": 61, "content_chars": 21824}, "gemini_3": {"run": 3, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.85, "in_tokens": 0, "out_tokens": 0, "cost_eur": 0.0, "elapsed_s": 0, "content_chars": 29600}, "gemini_4": {"run": 4, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.9, "in_tokens": 0, "out_tokens": 0, "cost_eur": 0.0, "elapsed_s": 0, "content_chars": 21810}}};
const SK='gcse_ch12_cards';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
