nes are going.", "source": "MiniMax M1 ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "Why is it impossible for a magnetic field line to cross another magnetic field line? (1 step)", "answer": "- If two field lines crossed, a compass placed at the intersection would have to point in **two different directions simultaneously** — impossible. At any point in space, the magnetic field has one definite direction. Field lines are a visual model representing this single direction at each point, so they can never cross.\n\n**Takeaway:** Crossing lines would mean two field directions at one point — the field model prohibits this.", "source": "MiniMax M1 ①", "_id": "minimax_1_23", "judge_pick": true}, {"question": "A student places a compass at point X, halfway between the N and S poles of a bar magnet. The compass needle points directly from the N pole toward the S pole. The student then brings a second identical bar magnet and places its N pole near the first magnet's N pole. Describe what happens to the compass reading at point X. (2 steps)", "answer": "- Step 1: The new N pole creates a **repulsive field** in the region between the two N poles. The resultant field at X is now a combination of the original field (toward S) and the new repulsive field (pushing away from the new N pole).\n- Step 2: The compass needle will no longer point directly toward the original S pole — it will deflect, likely pointing somewhere between the original direction and the direction away from the new N pole. The exact direction depends on the relative strengths of the two fields.\n\n**Takeaway:** Adding another magnet changes the field geometry; compasses show the net (combined) field direction.", "source": "MiniMax M1 ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Compare the magnetic field inside a solenoid with the magnetic field between two flat opposite poles (N–S). How are they similar and how do they differ? (2 steps)", "answer": "- **Step 1:** **Similarity:** Both are **uniform** — the field has the same strength and direction at all points within the region. Field lines are parallel and equally spaced in both cases.\n- **Step 2:** **Difference:** Inside the solenoid, the field goes from one end to the other (N→S along the coil's axis). Between two poles, the field goes directly across the gap from the N-pole to the S-pole. The solenoid's field is confined mostly inside the coil; the pole gap field extends across the open gap.\n\n**Takeaway:** Both are uniform, but solenoid field is along the coil axis; pole-gap field is across the gap.", "source": "MiniMax M1 ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "An electromagnet is made by wrapping wire around an iron core. If you double the number of turns while keeping the current the same, what happens to the magnetic field strength? If you instead double the current while keeping the turns the same, what happens? (2 steps)", "answer": "- Step 1: **Doubling turns (N)** → magnetic field **doubles**. The field from each turn adds, so twice as many turns = twice the total field (B ∝ N, assuming same length).\n- Step 2: **Doubling current (I)** → magnetic field **doubles**. The field produced by each turn is proportional to current, so twice the current = twice the field (B ∝ I). Both changes produce the same doubling effect.\n\n**Takeaway:** B ∝ NI; both increasing turns and increasing current increase field strength proportionally.", "source": "MiniMax M1 ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In a d.c. motor, what is the purpose of the carbon brushes? Why are they made of carbon rather than a better conductor like copper? (2 steps)", "answer": "- **Step 1:** The carbon brushes press against the rotating split-ring commutator, providing a **sliding electrical contact** that allows current to flow from the external circuit into the rotating coil.\n- **Step 2:** Carbon is used because it is **conducting but produces less sparking** than copper when contacting a moving surface. Carbon also wears down gradually and is self-lubricating. Copper would cause excessive sparking and wear at the contact point during rapid rotation.\n\n**Takeaway:** Carbon brushes conduct while minimizing sparking and wear on the rotating commutator.", "source": "MiniMax M1 ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A current-carrying conductor is placed in a magnetic field. The wire is at 45° to the field lines, not 90°. Would the force be zero, maximum, or somewhere in between? Explain. (1 step)", "answer": "- The force is **somewhere in between** zero and maximum. At GCSE, we only calculate using F = BIL for wires at exactly 90° to the field. The force is **maximum at 90°** and **zero when parallel (0°)**. At 45°, the force is less than maximum but greater than zero — specifically, F = BIL·sin(θ), though this formula is not required at GCSE level.\n\n**Takeaway:** The force decreases as the angle from 90° decreases; only perpendicular (90°) gives maximum F at GCSE.", "source": "MiniMax M1 ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Two wires run parallel to each other, both carrying current in the same direction. Do they attract, repel, or exert no force on each other? Explain using magnetic field interaction. (2 steps)", "answer": "- **Step 1:** Each wire produces its own magnetic field that circles around it. The field of wire A passes through wire B (and vice versa).\n- **Step 2:** These fields interact. Using Fleming's left-hand rule (or considering field alignment), the result is that **parallel currents attract**. If currents flow in opposite directions, they repel. This is the principle behind how electric motors experience forces.\n\n**Takeaway:** Parallel currents attract; antiparallel currents repel.", "source": "MiniMax M1 ①", "_id": "minimax_1_29", "judge_pick": true}], "count": 30}, "minimax_2": {"label": "MiniMax M1 ②", "cards": [{"question": "A bar magnet is cut in half. What would you find at the two new ends? (2 steps)", "answer": "- Step 1: You get TWO new magnets, each with its own north and south pole.\n- Step 2: This is because there are no magnetic monopoles — every magnet must have both a north and south pole. The \"cut\" end that was originally the middle becomes the new pole of each half. No matter how many times you cut a magnet, you always get smaller dipoles, not isolated poles.\n\n**Takeaway:** Magnetic poles always come in pairs — you can never isolate a single north or south pole.", "source": "MiniMax M1 ②", "_id": "minimax_2_0", "judge_pick": true}, {"question": "Explain why two bar magnets might attract OR repel, and describe what determines which happens. (2 steps)", "answer": "- Step 1: The Law of Magnetism states: like poles repel (N–N or S–S), unlike poles attract (N–S).\n- Step 2: The key is which ends (poles) face each other. If north faces north → repel. If north faces south → attract. The force is non-contact, acting at a distance through the magnetic field.\n\n**Takeaway:** Always identify which poles are facing each other before predicting attraction or repulsion.", "source": "MiniMax M1 ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "An iron nail is placed near a strong bar magnet but not touching it. Describe what happens at the atomic level and why the nail becomes an induced magnet. (3 steps)", "answer": "- Step 1: Iron is a magnetic material — its atoms have unpaired electrons that act as tiny atomic magnets (domains).\n- Step 2: In an unmagnetised iron piece, these domains point in random directions, cancelling each other out. When placed in an external field, the domains align with the field.\n- Step 3: The end of the iron nearest the external magnet's north pole becomes a south pole (opposite), because the aligned domains create their own field opposing the external field. This always causes attraction — an induced magnet is NEVER repelled.\n\n**Takeaway:** Induced magnets temporarily become magnets ONLY while in an external field, always with the opposite pole facing the inducing magnet.", "source": "MiniMax M1 ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "A compass is placed at point X halfway between two bar magnets arranged with their north poles facing each other. Describe the shape and direction of the net magnetic field at X. (3 steps)", "answer": "- Step 1: Two north poles facing each other create repelling fields — field lines curve away from each pole, pushing outward.\n- Step 2: At the midpoint X, both fields point away from their respective north poles, so they point OPPOSITE directions (toward the magnets on each side).\n- Step 3: Since the magnets are identical and symmetric, the two field contributions cancel at X — the net field is zero (or very close to zero). A plotting compass needle would not point in any particular direction.\n\n**Takeaway:** Like poles (N–N or S–S) create a \"dead zone\" between them where fields oppose and cancel.", "source": "MiniMax M1 ②", "_id": "minimax_2_3", "judge_pick": true}, {"question": "In the gap between opposite poles of two bar magnets (N facing S), the field lines are parallel and equally spaced. Why is this called a \"uniform\" field, and why does this configuration matter for the motor effect? (2 steps)", "answer": "- Step 1: Uniform means the field has the SAME strength AND same direction at every point in the region. Parallel equally-spaced lines indicate this — if you moved a compass anywhere in the gap, it would point in the same direction with equal force.\n- Step 2: For the motor effect ($$F = BIL$$), we need the wire perpendicular to a field of known strength B. A uniform field between opposite poles gives us a constant B value that doesn't depend on where the wire sits in the gap — essential for predictable force calculations.\n\n**Takeaway:** Uniform fields are created between opposite poles (N–S), and this consistency is crucial for the motor effect formula.", "source": "MiniMax M1 ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A student says \"magnetic field lines are real things that exist around magnets.\" Is this correct? Explain what field lines actually represent. (2 steps)", "answer": "- Step 1: No — magnetic field lines are a MODEL, not physical objects. They don't actually exist as threads or wires in space.\n- Step 2: Field lines are a visualisation tool that shows: (a) direction — the direction a north pole would move if free to move (N→S), and (b) strength — closer together = stronger field, further apart = weaker field. They're useful mental constructs that help us predict magnetic behaviour.\n\n**Takeaway:** Field lines are a human-created model to represent invisible magnetic fields — they're tools for thinking, not physical reality.", "source": "MiniMax M1 ②", "_id": "minimax_2_5", "judge_pick": true}, {"question": "A wire carries current directly toward you (out of the page). Using the right-hand thumb rule, what is the direction of the magnetic field around the wire? (2 steps)", "answer": "- Step 1: Point your right thumb in the direction of conventional current (toward you / out of the page).\n- Step 2: Your curled fingers show the direction of the magnetic field — this would be anticlockwise around the wire (as viewed from you). The field forms concentric circles around the wire.\n\n**Takeaway:** No poles exist around a straight current-carrying wire — the field circles the wire. Reversing current reverses field direction.", "source": "MiniMax M1 ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "You are looking at the end of a solenoid. The current appears to flow clockwise. Which pole is this end — north or south? (2 steps)", "answer": "- Step 1: The solenoid end rule: if you look along the solenoid and see current flowing clockwise, that end is a south pole.\n- Step 2: This is the opposite of what you might expect. Anticlockwise current gives a north pole. The mnemonic is: Clockwise = \"S\" (both start with C), or think of it as wrapping your fingers around — your fingers curl in the direction of the field, and your thumb points to the north pole inside the solenoid.\n\n**Takeaway:** Solenoid polarity: Clockwise current = S pole; Anticlockwise current = N pole (when viewed from that end).", "source": "MiniMax M1 ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A solenoid has 100 turns, carries 2 A of current, and is 10 cm long. If you double the current to 4 A, what happens to the magnetic field strength inside? If you add an iron core instead, what happens? (2 steps)", "answer": "- Step 1: Doubling current doubles the magnetic field strength ($$B \\propto I$$), since more charge flow per second creates a stronger magnetic field around each turn.\n- Step 2: Adding an iron core dramatically increases field strength. The iron becomes an induced magnet (the domains align with the solenoid's field), adding its own field to the total. This can increase field strength by hundreds or thousands of times. Both effects combine — more current AND an iron core gives the strongest electromagnet.\n\n**Takeaway:** Field strength increases with: more current, more turns, shorter length (concentrates field), and especially adding a magnetic core (iron).", "source": "MiniMax M1 ②", "_id": "minimax_2_8", "judge_pick": true}, {"question": "A student builds an electromagnet using a solenoid with an iron core but notices the magnetism disappears almost immediately when they disconnect the battery. Explain why this happens and contrast with a permanent magnet. (3 steps)", "answer": "- Step 1: An electromagnet works ONLY when current flows. The magnetic field is produced by moving charges (current) in the wire — no current, no field.\n- Step 2: The iron core is an induced magnet. It only becomes magnetic while in the external field from the solenoid. When current stops, the external field disappears, the iron domains quickly randomise, and most magnetism is lost (some residual magnetism may remain).\n- Step 3: A permanent magnet (e.g., steel) maintains its magnetism because the magnetic domains are \"locked\" in alignment even without an external field. The material itself has inherent magnetic properties that persist.\n\n**Takeaway:** Electromagnets are temporary magnets (on/off controllable); permanent magnets are always magnetic (cannot be switched off).", "source": "MiniMax M1 ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A current-carrying wire is placed in a uniform magnetic field. When is the force on the wire maximum, and when is it zero? Explain why using the motor effect concept. (3 steps)", "answer": "- Step 1: Maximum force ($$F = BIL$$) occurs when the wire is PERPENDICULAR (90°) to the magnetic field lines. The two magnetic fields (one around the wire, one external) interact most strongly when they're at right angles.\n- Step 2: Zero force occurs when the wire is PARALLEL to the field lines. In this case, the field around the wire runs along the same \"path\" as the external field — they don't interact; there's no net force.\n- Step 3: This is why we use the formula $$F = BIL$$ only for the perpendicular case at GCSE. The force depends on the component of current perpendicular to the field — if current flows parallel to field, no thrust.\n\n**Takeaway:** The motor effect requires the current to cross the field lines — perpendicular = maximum force, parallel = zero force.", "source": "MiniMax M1 ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A wire of length 0.1 m carrying 3 A of current is placed perpendicular to a magnetic field of strength 0.5 T. Calculate the force on the wire using F = BIL. (2 steps)", "answer": "- Step 1: Identify the values: B = 0.5 T, I = 3 A, L = 0.1 m. All units are SI (tesla, amperes, metres), so we can directly apply the formula.\n- Step 2: $$F = BIL = 0.5 \\times 3 \\times 0.1 = 0.15 \\text{ N}$$. The force is 0.15 newtons, directed according to Fleming's left-hand rule (perpendicular to both the field and current).\n\n**Takeaway:** F = BIL gives force in newtons when B is in tesla, I in amps, L in metres. Always check units before calculating.", "source": "MiniMax M1 ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "In the formula F = BIL, what does the B represent, and how is it different from simply \"magnetic field\"? (2 steps)", "answer": "- Step 1: B is the magnetic FLUX DENSITY — a quantitative measure of field strength, measured in tesla (T). One tesla equals one newton per ampere-metre: $$1 \\text{ T} = 1 \\text{ N/(A·m)}$$.\n- Step 2: \"Magnetic field\" is the general concept — the region where forces act on magnets. B specifically tells us HOW STRONG that field is. Field lines are the visual representation; B is the numerical measurement. A stronger magnet has field lines drawn closer together, which corresponds to a higher B value.\n\n**Takeaway:** B (magnetic flux density) is the measurable quantity; magnetic field lines are the visual model of that field.", "source": "MiniMax M1 ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A wire carrying current is placed in a magnetic field pointing from left to right. The current flows upward. Using Fleming's left-hand rule, determine the direction of the force on the wire. (3 steps)", "answer": "- Step 1: Point your first finger in the direction of the field (left to right).\n- Step 2: Point your second finger in the direction of conventional current (upward).\n- Step 3: Your thumb now points in the direction of the force/motion — this would be OUT OF THE PAGE (toward you). The three directions are all mutually perpendicular.\n\n**Takeaway:** Fleming's left-hand rule always gives a perpendicular result — force is perpendicular to both field and current.", "source": "MiniMax M1 ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A student tries to use their LEFT hand for the right-hand thumb rule (to find field direction around a wire), and their RIGHT hand for Fleming's left-hand rule (to find force direction). What is wrong with this approach? (2 steps)", "answer": "- Step 1: The right-hand thumb rule specifically uses the RIGHT hand because it's a right-handed coordinate system convention — thumb = current, fingers = field (around the wire).\n- Step 2: Fleming's left-hand rule specifically uses the LEFT hand because it's derived from the physical interaction of fields — reversing which hand you use would give the wrong direction. The mnemonic itself tells you which hand: \"First finger = Field\" uses the finger next to the thumb on the LEFT hand. These are fundamentally different physical situations (field around wire vs. force on wire), requiring different hands.\n\n**Takeaway:** Mnemonic: Right-hand thumb rule = THumb for cuRrent → uses RIGHT hand. Fleming's LEFT-hand rule = F (First finger = Field) → uses LEFT hand.", "source": "MiniMax M1 ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "In a simple DC motor, a rectangular coil of wire is placed in a magnetic field and carries current. At one instant, side A of the coil has an upward current and experiences an outward force, while side B has a downward current and experiences an inward force. Describe the resulting motion of the coil. (3 steps)", "answer": "- Step 1: The two forces on opposite sides of the coil are in OPPOSITE directions (outward vs. inward), but they're not opposite ends of the same line — they create a COUPLE (a pair of equal parallel forces not acting along the same line).\n- Step 2: This couple produces rotation — the coil spins about its central axis. Side A pushes one way, side B pushes the opposite way, causing continuous rotation.\n- Step 3: Without a split-ring commutator, the coil would only rotate 180° before the forces reversed (now opposing rotation), stopping it. The commutator is what allows continuous one-directional rotation.\n\n**Takeaway:** The motor effect on opposite sides of a coil creates a turning effect (torque) — the basis of rotational motion in motors.", "source": "MiniMax M1 ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A DC motor is running normally. Describe what happens at the exact moment the coil passes through the vertical (90°) position, and why the motor doesn't stop even though forces are momentarily zero. (3 steps)", "answer": "- Step 1: At the vertical position, the coil's plane is parallel to the magnetic field lines — the wires are running ALONG the field, not perpendicular.\n- Step 2: Since force $$F = BIL$$ requires the wire to be perpendicular to the field, at this exact position the forces are zero (parallel = no motor effect). There's a brief moment with no driving force.\n- Step 3: However, the coil has rotational momentum (kinetic energy) from its previous acceleration, so it carries on moving past the vertical position. By the time it slows slightly, the split-ring commutator has reversed the current, forces reappear, and rotation continues.\n\n**Takeaway:** The coil needs momentum to get past the dead zone at 90°, where F = 0 because wire is parallel to field.", "source": "MiniMax M1 ②", "_id": "minimax_2_16", "judge_pick": true}, {"question": "A DC motor is powered by a 12 V battery. What would happen to the motor's speed if you: (a) replace with a 6 V battery, (b) reverse the connections (swap + and -)? Explain each. (2 steps)", "answer": "- Step 1: (a) A 6 V battery provides HALF the current (assuming same resistance), so force $$F = BIL$$ is halved. Less force means less acceleration → slower maximum speed. Halve voltage → roughly half speed.\n- Step 2: (b) Reversing the battery connections reverses the current direction. This reverses the force direction on each side of the coil, so the motor spins the opposite way. In a DC motor, reversing the polarity reverses rotation direction.\n\n**Takeaway:** Motor speed depends on current (voltage); reversing current reverses rotation direction.", "source": "MiniMax M1 ②", "_id": "minimax_2_17", "judge_pick": true}, {"question": "Two students discuss how to make a DC motor spin faster. Student A says \"use stronger magnets.\" Student B says \"add more turns to the coil.\" Who is correct, and why might BOTH help? (3 steps)", "answer": "- Step 1: Both can help, but work differently. Stronger magnets increase B (magnetic flux density) in the formula $$F = BIL$$.\n- Step 2: More turns of wire effectively increase L (the total length of conductor in the field). If coil has N turns, each turn experiences force, so total force is multiplied by N — effectively using N × L in the formula.\n- Step 3: Student A is correct — stronger B gives more force per turn. Student B is correct — more turns gives more force overall. Combined, they give even stronger turning effect. Both increase torque, leading to faster rotation (up to a point, when friction and other losses matter).\n\n**Takeaway:** Force (and thus motor speed) increases with stronger field (B) and more coil turns (effectively L).", "source": "MiniMax M1 ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A plotting compass is placed on a bench. The needle aligns pointing roughly north-south. Explain why this happens, and why the geographic \"North Pole\" is actually a magnetic \"South Pole.\" (3 steps)", "answer": "- Step 1: Earth acts as a giant magnet, producing a magnetic field around the planet. A compass needle (a small permanent magnet) aligns with this field, with its north pole pointing toward Earth's magnetic south.\n- Step 2: The geographic North Pole (Arctic) is actually a magnetic SOUTH pole — field lines emerge from Earth's geographic south, travel through space, and enter the geographic north. This is why the north pole of a compass is attracted to geographic north.\n- Step 3: This is not because there's a literal bar magnet inside Earth — the field originates from electric currents in Earth's molten iron outer core (the geodynamo effect), which creates a field similar to a bar magnet in shape.\n\n**Takeaway:** Compass north points to geographic north because Earth's geographic north is a magnetic south pole. Field lines outside a magnet always go N→S.", "source": "MiniMax M1 ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A wire is placed in a magnetic field but no force is observed even when current flows. List THREE possible reasons why no force is produced. (3 steps)", "answer": "- Step 1: The wire is PARALLEL to the magnetic field lines. In this orientation, $$F = BIL$$ gives zero (the component of current perpendicular to field is zero).\n- Step 2: The magnetic field might be too weak (small B) to produce a measurable force with the given current and length — the force exists but is tiny.\n- Step 3: There may be no complete circuit — current isn't actually flowing through the wire (open circuit, broken connection). Also possible: the wire is not actually in the field region (outside the gap between poles).\n\n**Takeaway:** Most likely: wire parallel to field (most common student error). Also check: B too small, or no current flowing.", "source": "MiniMax M1 ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Why are carbon brushes used in DC motors rather than fixed metal contacts that are permanently connected? (2 steps)", "answer": "- Step 1: The coil must ROTATE, but we need to maintain electrical contact to supply current. Fixed contacts would tangle or break.\n- **Step 2:** Carbon brushes are soft enough to maintain contact against the spinning split-ring without wearing out quickly, while allowing rotation. They conduct electricity but have low friction. Permanent metal contacts would seize or wear rapidly. The brush design allows continuous electrical connection with physical rotation.\n\n**Takeaway:** Brushes allow current transfer while permitting rotation — essential for a working motor.", "source": "MiniMax M1 ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Compare and contrast: What are the SIMILARITIES and DIFFERENCES between a solenoid with an iron core (electromagnet) and a bar magnet? (3 steps)", "answer": "- Step 1: SIMILARITIES: Both produce a bar-magnet-shaped field — strong and uniform inside, weaker outside. Both have distinct north and south poles. Both can attract magnetic materials.\n- Step 2: DIFFERENCES in CONTROL: An electromagnet's strength is adjustable (current, turns) and it can be switched ON/OFF. A permanent magnet's strength is fixed and cannot be turned off. An electromagnet's polarity reverses when current reverses; a bar magnet's polarity is fixed.\n- Step 3: DIFFERENCES in ORIGIN: Electromagnet's field comes from current in wires; bar magnet's field comes from aligned atomic domains in the material itself. Electromagnets can be much stronger.\n\n**Takeaway:** Same field shape, but electromagnets are controllable (on/off, reversible, adjustable strength), while permanent magnets are not.", "source": "MiniMax M1 ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "A wire carrying current perpendicularly into the page sits in a magnetic field pointing LEFT. Using Fleming's left-hand rule, determine the force direction and explain how you would represent this in a 2D diagram. (2 steps)", "answer": "- Step 1: First finger = field (left), second finger = current (into page). With your left hand, first finger pointing left, second finger pointing into the page, your thumb points UP.\n- Step 2: To represent this in 2D: we use standard conventions. Current INTO the page is shown as a cross (×) (like the tail of an arrow). Current OUT OF the page is shown as a dot (•). The force direction (up) would be shown with an arrow. If force is into the page, you'd draw a cross in a circle.\n\n**Takeaway:** Fleming's rule gives 3D directions; 2D diagrams use × (into page) and • (out of page) conventions.", "source": "MiniMax M1 ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "A student investigates a solenoid's field with a plotting compass. They note the compass points in different directions at different points around the solenoid. Explain why the field inside a solenoid is UNIFORM (same direction everywhere), but outside it's not. (2 steps)", "answer": "- Step 1: Inside the solenoid, the field lines from all the individual coil turns run parallel to the axis in the same direction, adding together. Since they're parallel and don't spread out, the field has the same strength and direction at every point inside — uniform.\n- Step 2: Outside the solenoid, the field lines must return from one end to the other, curving around to complete the loop. Different points are at different distances and angles from the \"magnet-like\" shape, so field direction and strength vary — non-uniform.\n\n**Takeaway:** Inside = parallel field lines from many turns add → uniform. Outside = lines must curve back → non-uniform.", "source": "MiniMax M1 ②", "_id": "minimax_2_24", "judge_pick": true}, {"question": "If you wanted to pick up scrap metal with an electromagnet, would you use a solenoid with an iron core or an air core (no iron)? Explain your reasoning. (2 steps)", "answer": "- Step 1: You would use an iron core. Iron is a magnetic material with high permeability — it concentrates and amplifies magnetic field lines dramatically.\n- Step 2: When current flows in the solenoid, the iron core becomes an induced magnet, adding its own field to the solenoid's field. This combination can be hundreds to thousands of times stronger than the solenoid alone. An air core would produce a much weaker field and couldn't pick up heavy scrap. The iron essentially \"channels\" and strengthens the field.\n\n**Takeaway:** Iron core dramatically increases magnetic field strength through induced magnetism — essential for practical electromagnets.", "source": "MiniMax M1 ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A magnet is brought near a steel paperclip. The paperclip is attracted and clings to the magnet. Later, the magnet is removed but the paperclip can still weakly attract other paperclips. Explain this observation. (2 steps)", "answer": "- Step 1: Initially, the paperclip becomes an induced magnet — its domains align with the external field, making it temporarily magnetic. This causes attraction.\n- Step 2: After removing the magnet, steel (unlike soft iron) retains much of its magnetism because its domains don't easily randomise — steel has \"memory.\" This makes the paperclip a weak permanent magnet, able to attract other magnetic materials. This is called residual magnetism. (If it were pure iron, it would lose almost all magnetism immediately.)\n\n**Takeaway:** Steel retains induced magnetism (becomes weakly permanent); soft iron does not. This is why steel is used for permanent magnets.", "source": "MiniMax M1 ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "When designing a DC motor, why is it important that the carbon brushes press against the split-ring commutator with the right amount of force? What happens if they press too lightly or too hard? (2 steps)", "answer": "- Step 1: If too LIGHT: electrical contact becomes poor or intermittent — current may not flow consistently, causing erratic motor operation or stopping. The brush may also bounce off the ring during rotation.\n- Step 2: If too HARD: excessive friction causes rapid wear of both the brushes and the commutator, overheating, and energy loss. The motor would stall or wear out quickly. There's an optimal contact pressure that balances good electrical connection with reasonable friction.\n\n**Takeaway:** Good motor design requires proper contact pressure: enough for electrical connection, not so much that it causes excessive friction and wear.", "source": "MiniMax M1 ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A student connects a voltmeter across a coil of wire and moves a magnet toward the coil. The voltmeter shows a reading. The student then holds the magnet stationary inside the coil — the reading drops to zero. Explain this observation. (2 steps)", "answer": "- Step 1: Moving the magnet creates a CHANGING magnetic field through the coil. This changing field induces a voltage (electromagnetic induction — the reverse of the motor effect).\n- Step 2: When the magnet is stationary, the field is constant — no change, no induced voltage. Only MOTION (change) produces induction. This is Faraday's law — you need a changing magnetic field to induce a voltage. This is fundamentally different from the motor effect (current in a wire produces force in a field).\n\n**Takeaway:** Electromagnetic induction requires motion/change — stationary magnet = no induced voltage. This is distinct from the motor effect.", "source": "MiniMax M1 ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "In a d.c. motor, what is the difference between the \"speed\" of the motor and the \"turning effect\" (torque) it produces? What parameters affect each? (2 steps)", "answer": "- Step 1: Speed (rotational speed) is how fast it spins — affected by the net force driving rotation minus opposing forces (friction, air resistance). Higher current → more force → faster acceleration → higher top speed. Stronger magnets also increase speed.\n- Step 2: Turning effect (torque) is the rotational force itself — the product of force and the radius at which it acts. Torque increases with: more current, stronger field, more turns in the coil, or a larger coil radius. Speed is the RESULT of torque minus losses; torque is the CAUSE of rotation.\n\n**Takeaway:** Torque is the cause (force × radius); speed is the effect (torque minus friction). Both increase with current and field strength, but torque specifically depends on coil geometry (radius, turns).", "source": "MiniMax M1 ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "A wire of length 0.2 m carrying 5 A of current is placed in a magnetic field. The force measured is 0.5 N. Calculate the magnetic flux density B. (2 steps)", "answer": "- Step 1: Rearrange the formula: $$B = \\frac{F}{IL}$$. Identify values: F = 0.5 N, I = 5 A, L = 0.2 m.\n- Step 2: $$B = \\frac{0.5}{5 \\times 0.2} = \\frac{0.5}{1} = 0.5 \\text{ T}$$. The magnetic flux density is 0.5 tesla.\n\n**Takeaway:** Rearranging F = BIL allows you to find B when you know F, I, and L. Always check units.", "source": "MiniMax M1 ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Explain why there are no magnetic monopoles, and how this fundamental property shapes all magnetic field line diagrams. (2 steps)", "answer": "- Step 1: All known magnets (bar magnets, electromagnets, Earth's field) have both north and south poles together — you can never separate them. If you cut a magnet in half, you get two smaller dipoles, not isolated north and south.\n- Step 2: This is why ALL field line diagrams show lines emerging from one end (north) and entering the other (south) — they must form closed loops. There's always a \"pair\" of poles. The concept of magnetic monopoles remains theoretical in physics — if they existed, field lines could start at a single point and not return.\n\n**Takeaway:** All magnetic fields are dipolar — field lines must form complete loops from N to S because no isolated poles exist.", "source": "MiniMax M1 ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "A solenoid with an iron core is used as an electromagnet to lift heavy objects. The objects fall off when the current is switched off, but sometimes a weak attraction remains even with no current. Explain. (2 steps)", "answer": "- Step 1: With current ON, the iron core becomes a strong induced magnet due to domain alignment. This creates the strong attractive force.\n- Step 2: When current is OFF, the external field disappears and most domains randomise — the core loses most magnetism. However, some materials (especially steel or certain irons) retain residual magnetism — a weak \"memory\" of being magnetised. This residual field can weakly attract objects even with no current. This is usually unwanted in electromagnets — pure iron (not steel) is used to minimise this effect.\n\n**Takeaway:** Residual magnetism (remanence) causes weak attraction after current stops — minimised by using soft iron, not steel.", "source": "MiniMax M1 ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In a d.c. motor, the coil is wound on a soft iron armature (the rotating part). Why is soft iron used rather than steel or a non-magnetic material? (2 steps)", "answer": "- Step 1: Soft iron has high magnetic permeability — it concentrates and strengthens the magnetic field from the permanent magnets, increasing the force on the current-carrying coil (F = BIL, so stronger B = stronger force).\n- Step 2: Soft iron does NOT retain magnetism when the field is removed (low remanence). This is crucial — if steel were used, it would become a weak permanent magnet itself, creating unwanted permanent forces that would interfere with the motor's controlled operation. Non-magnetic material wouldn't concentrate the field at all. Soft iron is the optimal choice: strengthens field temporarily, then releases it completely.\n\n**Takeaway:** Soft iron strengthens the field during operation but doesn't become permanently magnetised — perfect for motor armatures.", "source": "MiniMax M1 ②", "_id": "minimax_2_33", "judge_pick": true}], "count": 34}}, "meta": {"gemini_1": {"run": 1, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.7, "in_tokens": 5927, "out_tokens": 5845, "reasoning_chars": 0, "cost_eur": 0.0606, "elapsed_s": 62, "content_chars": 24235}, "gemini_2": {"run": 2, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.8, "in_tokens": 5927, "out_tokens": 5152, "reasoning_chars": 0, "cost_eur": 0.0542, "elapsed_s": 61, "cont const SK='gcse_ch12_cards';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
