<script>
const DATA={"selected": [{"id": "gemini_1_9", "question": "What is ionisation, and how is it fundamentally different from the process of an atom emitting a photon? (2 steps)", "answer": "- Step 1: **Ionisation** is the process where an atom gains or loses one or more electrons, resulting in a net electrical charge. This happens when an electron is given enough energy to be completely knocked out of the atom, not just moved to a higher shell. The atom becomes a positive ion if it loses an electron.\n- Step 2: **Photon emission** is an internal process where an excited electron moves between energy levels *within* the atom, releasing a specific amount of energy as a photon. The atom remains electrically neutral throughout this process. Ionisation is a more energetic event that breaks the electron away from the atom entirely.", "source": "Gemini 2.5 Pro ①", "blind_id": 0}, {"id": "minimax_1_16", "question": "Why is a PET scan fundamentally different from a standard gamma scan, and what makes the positron so useful for imaging? (3 steps)", "answer": "- Step 1: In a PET (Positron Emission Tomography) scan, the patient is given a positron-emitting tracer (like carbon-11 or oxygen-15). The positron travels a short distance, then annihilates with an electron — both particles disappear and produce TWO gamma photons travelling in opposite directions (180° apart).\n- Step 2: Detectors around the body pick up these gamma pairs. Because the gammas travel in exactly opposite directions, the scanner can trace back along the line between the two detection points to locate where the annihilation occurred. This gives 3D images of metabolic activity.\n+ This is fundamentally different from a standard gamma scan where the nucleus emits a single gamma directly\n+ The coincidence detection (two gammas at once) provides much better spatial localisation\n- Step 3: PET is especially useful because it tracks biological processes (like glucose metabolism in the brain) rather than just anatomy.", "source": "MiniMax M1 ①", "blind_id": 2}, {"id": "gflash_1_9", "question": "Define \"ionisation\" and explain how it differs conceptually from \"radioactive decay.\"", "answer": "- Step 1: **Ionisation:** Ionisation is the process by which an atom (or molecule) gains or loses one or more electrons, resulting in it acquiring a net electrical charge and becoming an ion.\n    +   **Cause:** It is typically caused by the atom interacting with energetic particles (like alpha or beta particles) or high-energy electromagnetic radiation (like gamma rays or X-rays) which knock electrons out of their orbits or, less commonly, add electrons.\n    +   **Effect:** Only the electron cloud is affected; the nucleus remains unchanged. The atom's chemical identity (defined by its protons) does not change.\n- Step 2: **Radioactive Decay:** Radioactive decay is a spontaneous, random process where an unstable atomic nucleus transforms into a more stable configuration by emitting radiation (alpha particles, beta particles, gamma rays, or neutrons).\n    +   **Cause:** It is driven by an imbalance of protons and neutrons within the nucleus, making the nucleus inherently unstable.\n    +   **Effect:** The nucleus itself changes, often altering the number of protons and/or neutrons, which can transform the parent nucleus into a different element (transmutation). The electron cloud may subsequently adjust, but the fundamental change is nuclear.\n\nIn essence, ionisation is an *atomic* process involving electrons and the electron cloud, leaving the nucleus untouched, while radioactive decay is a *nuclear* process involving the nucleus itself, often leading to a change in elemental identity.", "source": "Gemini 2.5 Flash ①", "blind_id": 6}, {"id": "gflash_1_24", "question": "Describe one medical application and one industrial/domestic application of alpha radiation, explaining why alpha is particularly suited for each use. (2 steps)", "answer": "- Step 1: **Medical Application (e.g., Targeted Alpha Therapy - TAT):**\n    +   **Description:** In TAT, alpha-emitting isotopes (e.g., Actinium-225 or Radium-223) are attached to molecules that specifically target cancer cells (e.g., in prostate cancer). Once the alpha emitter binds to the cancer cell, it decays, releasing alpha particles directly into the cell.\n    +   **Why Alpha is Suited:** Alpha particles have very high ionising power and extremely short ranges (only a few cell diameters). This means they can deliver a highly concentrated, lethal dose of radiation directly to the cancerous cell while causing minimal damage to surrounding healthy tissue. Their short range prevents widespread collateral damage, which would occur with more penetrating radiation.\n- Step 2: **Domestic Application (Smoke Detector):**\n    +   **Description:** Many smoke detectors contain a small amount of Americium-241, an alpha emitter. This alpha source ionises the air in a chamber, creating a small electric current. When smoke particles enter the chamber, they attach to the ions, reducing the current and triggering the alarm.\n    +   **Why Alpha is Suited:** Alpha particles are ideal here because of their high ionising power, which is necessary to create a detectable current in the air. Crucially, their very short range ensures that the alpha particles are easily contained within the detector's chamber and do not escape into the room, making the device safe for household use. They are stopped by the plastic casing and even a few centimeters of air.\n\nAlpha radiation's combination of high ionisation and low penetration makes it useful for very localized effects.", "source": "Gemini 2.5 Flash ①", "blind_id": 8}, {"id": "minimax_1_35", "question": "In a chain reaction, what does it mean for the reactor to be \"critical,\" \"subcritical,\" or \"supercritical\"? (3 steps)", "answer": "- Step 1: Critical: on average, exactly one neutron from each fission goes on to cause another fission. The reaction is self-sustaining at a steady rate. This is the desired state for power generation.\n- Step 2: Subcritical: fewer than one neutron per fission causes another fission. The reaction dies out over time. This is what happens when control rods are inserted to shut down a reactor.\n+ Example: if each fission releases 2.3 neutrons on average, but only 1 is needed for criticality, then 1.3 are \"lost\" (absorbed without causing fission, escape, etc.)\n- Step 3: Supercritical: more than one neutron per fission causes another fission. The reaction grows exponentially. This is:\n+ Deliberate in nuclear weapons (supercritical for rapid energy release)\n+ Controlled in reactor startup (slightly supercritical to increase power gradually, then brought to critical)", "source": "MiniMax M1 ①", "blind_id": 9}, {"id": "minimax_2_33", "question": "If you discovered a material that had zero activity above background after a week, what can you infer about its half-life? What if it still showed activity after a year? (2 steps)", "answer": "- Step 1: If a sample becomes indistinguishable from background after **one week**, its half-life must be **very short**—on the order of days or less. After 5-6 half-lives (~one week), activity is <3% of original. Likely the isotope has a half-life of ≤1-2 days.\n\n- Step 2: If activity is still measurable above background after **one year**, the half-life must be **at least several months to years**. For an isotope to survive a year with measurable activity, its half-life is likely >>1 year. (If it were shorter, it would have decayed away.)\n\n+ Key inference: The time it takes for activity to drop to negligible levels gives a rough estimate of the half-life—shorter observable activity → shorter half-life.", "source": "MiniMax M1 ②", "blind_id": 11}, {"id": "minimax_1_25", "question": "Why is radon gas considered a significant natural source of radiation exposure, and how does it enter buildings? (2 steps)", "answer": "- Step 1: Radon-222 is an alpha-emitting isotope produced naturally in the decay chain of uranium-222, which is present in small amounts in rocks and soils worldwide. Radon is a gas, so it can be inhaled.\n- Step 2: As a gas, radon seeps up from the ground through foundations, cracks, and gaps in buildings, where it can accumulate to elevated concentrations. It is the largest single source of natural background radiation in the UK.\n+ Once inhaled, radon isotopes decay further, producing solid radioactive daughters that can lodge in lung tissue\n+ This is why radon exposure is linked to lung cancer (especially in smokers)", "source": "MiniMax M1 ①", "blind_id": 12}, {"id": "gemini_2_24", "question": "What is nuclear fusion, and what two conditions are required to make it happen?", "answer": "Nuclear fusion is the process of joining (or fusing) two light atomic nuclei together to form a single, heavier nucleus. In this process, a small amount of mass is converted into a vast amount of energy. This is the process that powers the Sun and other stars.\n\nThe two essential conditions are:\n1.  **Extremely High Temperatures:** On the order of millions of degrees Celsius. This is needed to give the nuclei enough kinetic energy to overcome their powerful electrostatic repulsion (since both nuclei are positively charged and repel each other).\n2.  **Extremely High Pressures/Densities:** This is needed to force the nuclei close enough together for the strong nuclear force to take over and bind them, increasing the rate of fusion reactions.", "source": "Gemini 2.5 Pro ②", "blind_id": 14}, {"id": "gemini_2_18", "question": "A doctor needs to use a radioactive tracer to study a patient's kidney function. What are the two most important properties the chosen radioisotope should have, and why? (2 steps)", "answer": "- Step 1: **It should be a gamma (γ) emitter.** This is because gamma rays are highly penetrating, so they can easily pass out of the patient's body to be detected by an external scanner (like a gamma camera). Alpha and beta radiation would be absorbed by the body's tissues and would not be detectable from the outside.\n- Step 2: **It should have a short half-life.** A short half-life (e.g., a few hours) is ideal because the tracer needs to be active long enough for the scan to be completed, but it should decay away quickly afterwards. This minimizes the radiation dose to the patient and ensures they do not remain radioactive for a long time.", "source": "Gemini 2.5 Pro ②", "blind_id": 16}, {"id": "gflash_1_18", "question": "You are given an unknown radioactive source. Describe a simple experiment using common materials to determine whether the source primarily emits alpha, beta, or gamma radiation. (3 steps)", "answer": "- Step 1: **Initial Setup:** Place a Geiger-Müller (GM) tube at a fixed, safe distance from the unknown source. Take a background count rate measurement with no source present, then measure the count rate with the source in place. Subtract the background count from the source reading to get the corrected count rate. This initial reading gives a baseline of the total radiation detected.\n- Step 2: **Testing with Paper:** Place a single sheet of paper (e.g., a piece of card) between the source and the GM tube.\n    +   **Observation:** If the count rate drops significantly (close to background levels), the source is likely an **alpha emitter**. Alpha particles have very low penetrating power and are stopped by paper.\n    +   **If not:** If the count rate remains high, proceed to the next step.\n- Step 3: **Testing with Aluminum:** Remove the paper and place a thin sheet (a few millimeters) of aluminum between the source and the GM tube.\n    +   **Observation:** If the count rate drops significantly (but was not stopped by paper), the source is likely a **beta emitter**. Beta particles have moderate penetrating power and are stopped by aluminum.\n    +   **If not:** If the count rate is still high, then the source is likely a **gamma emitter**. Gamma rays have high penetrating power and would pass through both paper and aluminum with minimal reduction. To further confirm, you could try placing a thick lead sheet, which would significantly reduce the gamma count.\n\nThis sequential shielding experiment allows for qualitative identification of the primary radiation type based on its penetrating power.", "source": "Gemini 2.5 Flash ①", "blind_id": 18}, {"id": "minimax_1_26", "question": "Why is carbon-14 dating limited to relatively recent organic samples (tens of thousands of years), and what would happen if you tried to date a dinosaur bone? (3 steps)", "answer": "- Step 1: Carbon-14 has a half-life of ~5730 years. After about 50,000 years (~9 half-lives), the remaining C-14 activity becomes indistinguishable from background radiation, making accurate dating impossible.\n- Step 2: Dinosaur bones are ~65 million years old — vastly older than the limit for C-14 dating. Any C-14 would have long since decayed to undetectable levels.\n+ At 9 half-lives: activity = (1/512) ≈ 0.2% of original\n+ At 65 million years (~11,000 half-lives): virtually zero C-14 remains\n- Step 3: For older samples, scientists use other radioactive isotopes with much longer half-lives (like uranium-lead dating) that can date rocks and fossils hundreds of millions of years old.", "source": "MiniMax M1 ①", "blind_id": 19}, {"id": "gemini_3_8", "question": "Why do different isotopes of the same element, such as Carbon-12 and Carbon-14, share the same chemical properties?", "answer": "An element's chemical properties—how it bonds, reacts, and forms compounds—are determined almost entirely by the configuration of its **electrons**, particularly the electrons in its outermost energy level. Since all isotopes of an element have the same number of protons, a neutral atom of each isotope will have the same number of electrons to balance the nuclear charge. With identical electron structures, they behave identically in chemical reactions. The extra neutrons in the nucleus of a heavier isotope add mass but do not affect the electron cloud.", "source": "Gemini 2.5 Pro ③", "blind_id": 25}, {"id": "gemini_1_41", "question": "Briefly describe the main energy conversion steps in a typical nuclear power station, starting from the fission in the reactor core. (4 steps)", "answer": "- Step 1: **Nuclear to Thermal:** Nuclear energy stored in uranium atoms is released as thermal energy (heat) during the controlled fission chain reaction in the reactor core.\n- Step 2: **Thermal to Kinetic (in steam):** This heat is transferred by a coolant (like pressurised water) to a heat exchanger, where it boils a separate loop of water, producing high-pressure steam. The thermal energy is now stored in the kinetic energy of the steam molecules.\n- Step 3: **Kinetic (steam) to Kinetic (turbine):** The high-pressure steam is directed at the blades of a turbine, causing it to spin at high speed. The kinetic energy of the steam is converted into the rotational kinetic energy of the turbine.\n- Step 4: **Kinetic (turbine) to Electrical:** The spinning turbine is connected to a generator. The generator uses electromagnetic induction to convert the rotational kinetic energy into electrical energy, which is then supplied to the grid.", "source": "Gemini 2.5 Pro ①", "blind_id": 26}, {"id": "gflash_1_0", "question": "Describe the fundamental components of an atom and how they are spatially arranged, including their relative sizes and charges. (3 steps)", "answer": "- Step 1: **Central Nucleus:** At the very heart of the atom is a tiny, dense, positively charged nucleus. This nucleus contains two types of subatomic particles:\n    +   **Protons:** These carry a positive charge ($$+1$$ relative charge) and have a relative mass of $$1$$. The number of protons defines the element.\n    +   **Neutrons:** These are electrically neutral ($$0$$ relative charge) and also have a relative mass of $$1$$. Neutrons contribute to the atom's mass and nuclear stability but not its elemental identity.\n- Step 2: **Orbiting Electrons:** Surrounding the nucleus, at much greater distances, are negatively charged electrons. These electrons have a negligible relative mass (approximately $$\\frac{1}{2000}$$ of a proton) and a relative charge of $$-1$$. In a neutral atom, the number of electrons equals the number of protons.\n- Step 3: **Spatial Arrangement and Scale:** The nucleus is incredibly small compared to the overall size of the atom. If an atom were the size of a football stadium, its nucleus would be like a pea in the center. The electrons occupy distinct energy levels or \"shells\" around this tiny nucleus, meaning the vast majority of an atom's volume is empty space.\n\nThis arrangement means the atom's mass is concentrated in its tiny, positively charged nucleus, while its volume is defined by the much larger electron cloud.", "source": "Gemini 2.5 Flash ①", "blind_id": 29}, {"id": "gflash_2_13", "question": "Describe how a Geiger-Müller (GM) tube detects ionising radiation and explain the difference between the \"count rate\" it measures and the \"activity\" of a radioactive source. (3 steps)", "answer": "- Step 1: **How a GM Tube Works:** A Geiger-Müller tube is a common device for detecting ionising radiation. It typically consists of a metal tube with a thin mica window at one end, filled with a low-pressure inert gas (like argon) and a central wire electrode. A high voltage is applied across the tube, with the wire being positive and the tube wall negative.\n    +   **Ionisation:** When ionising radiation (alpha, beta, or gamma) enters the tube, it collides with the gas atoms, knocking out electrons and causing ionisation. This creates positive gas ions and free electrons.\n    +   **Cascade:** The free electrons are accelerated towards the positive central wire, gaining enough energy to ionise other gas atoms on their way. This creates an avalanche or cascade of electrons and ions.\n    +   **Pulse and Count:** This cascade generates a brief, measurable electrical pulse or current, which is amplified and registered as a \"count\" (often an audible click or a digital display). Each pulse corresponds to one detected ionising event.\n- Step 2: **Count Rate:** The GM tube measures the **count rate**, which is the number of ionising events detected per unit time (e.g., counts per second, cps, or counts per minute, cpm).\n    +   **Detection Events:** It represents how many particles or photons *hit the detector and cause an ionisation event*.\n    +   **Factors Affecting Count Rate:** The count rate depends on several factors: the actual activity of the source, the distance from the source to the detector, the type of radiation (some are more easily absorbed by air or the tube's window), and the presence of background radiation.\n- Step 3: **Activity ($$A$$):** The **activity** of a radioactive source, measured in Becquerels (Bq), is the true rate at which unstable nuclei within the source are decaying. One Becquerel (1 Bq) means one nucleus decays per second.\n    +   **Decays in Source:** Activity refers to the intrinsic rate of decay *within the source itself*, regardless of whether the emitted radiation is detected.\n    +   **Difference:** The count rate measured by a GM tube is almost always *less than* the actual activity of the source. This is because:\n        +   **Geometry:** Not all radiation emitted by the source travels in the direction of the detector.\n        +   **Absorption:** Some radiation is absorbed by the air, the detector's window, or other materials before reaching the detector's sensitive volume.\n        +   **Efficiency:** The detector itself isn't 100% efficient at detecting every particle that enters it.\n\nThe GM tube provides a convenient proxy for radioactivity, but its count rate is a measure of detected events, not the fundamental decay rate of the source.", "source": "Gemini 2.5 Flash ②", "blind_id": 30}, {"id": "gemini_3_39", "question": "Describe the process of nuclear fission, starting from a slow neutron hitting a Uranium-235 nucleus. (3 steps)", "answer": "- Step 1: A large, unstable nucleus, such as Uranium-235 ($$^{235}U$$), absorbs a slow-moving (thermal) neutron. This makes it even more unstable, briefly forming Uranium-236 ($$^{236}U$$).\n- Step 2: This highly unstable $$^{236}U$$ nucleus immediately splits apart into two smaller, lighter daughter nuclei (e.g., Barium and Krypton). A huge amount of energy is released in this splitting process.\n- Step 3: Crucially, the fission also releases two or three high-speed neutrons. These neutrons can then go on to be absorbed by other $$^{235}U$$ nuclei, causing them to undergo fission as well, potentially leading to a self-sustaining **chain reaction**.", "source": "Gemini 2.5 Pro ③", "blind_id": 35}, {"id": "gflash_1_16", "question": "Write the general nuclear equation for beta-plus decay and explain how the atomic number ($$Z$$) and mass number ($$A$$) of the parent nucleus change. What fundamental particle conversion occurs within the nucleus? Provide an example. (4 steps)", "answer": "- Step 1: **Fundamental Particle Conversion:** In beta-plus decay, a proton ($^{1}_{1}p$) within the nucleus transforms into a neutron ($^{1}_{0}n$), emitting a beta-plus particle (a positron, $$^{0}_{+1}\\beta^+$$) and a neutrino (usually ignored in GCSE equations).\n    $$^{1}_{1}p \\rightarrow {}^{1}_{0}n + {}^{0}_{+1}\\beta^+$$\n- Step 2: **General Nuclear Equation for Beta-plus Decay:**\n    $$^{A}_{Z}X \\rightarrow {}^{A}_{Z-1}Y + {}^{0}_{+1}\\beta^+$$\n    Here:\n    +   $$X$$ is the parent nucleus.\n    +   $$Y$$ is the daughter nucleus.\n    +   $$\\beta^+$$ represents a beta-plus particle (positron).\n- Step 3: **Changes to $$A$$ and $$Z$$:**\n    +   **Mass Number ($$A$$):** The mass number remains unchanged ($$A \\rightarrow A$$). This is because a proton is replaced by a neutron, so the total number of nucleons (protons + neutrons) stays the same.\n    +   **Atomic Number ($$Z$$):** The atomic number decreases by $$1$$ ($$Z \\rightarrow Z-1$$). This is because a proton (charge $$+1$$) converts into a neutron (charge $$0$$), decreasing the positive charge in the nucleus.\n    Since the atomic number changes, the daughter nucleus ($$Y$$) is a different element from the parent nucleus ($$X$$).\n- Step 4: **Example (e.g., Sodium-22):**\n    Sodium-22 ($^{22}_{11}Na$) undergoes beta-plus decay to form Neon-22 ($^{22}_{10}Ne$).\n    $$^{22}_{11}Na \\rightarrow {}^{22}_{10}Ne + {}^{0}_{+1}\\beta^+$$\n    Here, the mass number remained $$22$$, and the atomic number decreased from $$11$$ to $$10$$.\n\nBeta-plus decay occurs in proton-rich nuclei, converting one into a neutron to achieve greater stability.", "source": "Gemini 2.5 Flash ①", "blind_id": 36}, {"id": "glm_2_7", "question": "During beta-minus decay, the mass number ($$A$$) of the nucleus stays the same, but the atomic number ($$Z$$) increases by 1. Explain the internal nuclear process that causes this. (3 steps)", "answer": "- Step 1: In beta-minus decay, a neutron inside the nucleus is unstable and converts into a proton.\n- Step 2: To conserve charge and lepton number, this conversion also creates an electron (the beta-minus particle) and an antineutrino, which are ejected from the nucleus.\n- Step 3: Since a neutron (mass 1, charge 0) became a proton (mass 1, charge +1), the total number of nucleons remains the same ($$A$$ unchanged), but the total positive charge increases by 1 ($$Z$$ increases by 1).\n\nA neutron turns into a proton, ejecting an electron.", "source": "GLM 5.1 ②", "blind_id": 37}, {"id": "gflash_2_5", "question": "Describe the concept of electron energy levels within an atom and explain how electrons interact with electromagnetic (EM) radiation through absorption and emission processes. (3 steps)", "answer": "- Step 1: **Quantised Energy Levels:** Electrons in an atom do not orbit the nucleus at just any random distance or energy. Instead, they are confined to specific, discrete orbital paths, each associated with a particular, fixed amount of energy. These are called **energy levels** or electron shells. Electrons in lower energy levels are closer to the nucleus and are more tightly bound, requiring more energy to remove them. Higher energy levels are further away from the nucleus.\n    +   **Quantisation:** This means energy is \"quantised\" – it can only exist in these specific packages, not continuously.\n- Step 2: **Absorption of EM Radiation:** An electron can jump from a lower energy level to a higher one if it absorbs a photon of electromagnetic radiation.\n    +   **Exact Energy Match:** The key condition is that the photon's energy must precisely match the energy difference between the two energy levels. If the photon's energy is too high or too low, it will generally not be absorbed by that specific electron.\n    +   **Excited State:** When an electron absorbs energy and moves to a higher level, the atom is said to be in an \"excited state.\" This state is typically unstable.\n- Step 3: **Emission of EM Radiation:** An excited electron will eventually fall back down to a lower, more stable energy level. When it does, it releases the excess energy in the form of a photon of electromagnetic radiation.\n    +   **Specific Wavelengths:** The energy of the emitted photon exactly corresponds to the energy difference between the higher and lower levels. This is why elements produce unique \"line spectra\" – specific colours (wavelengths) of light are emitted, corresponding to the allowed energy transitions.\n    +   **Energy Conservation:** This process conserves energy, as the electron's potential energy decrease is converted into the energy of the emitted photon.\n\nThe dance of electrons between discrete energy levels, driven by the absorption and emission of specific packets of EM energy, underpins the characteristic spectra and chemical behaviour of elements.", "source": "Gemini 2.5 Flash ②", "blind_id": 40}, {"id": "glm_2_27", "question": "Rutherford's nuclear model showed a dense nucleus with orbiting electrons, but it had a fatal physical flaw. What did Bohr add to fix this, and what experimental evidence supported Bohr's addition? (3 steps)", "answer": "- Step 1: The flaw was that classical physics dictates an orbiting electron should continuously emit electromagnetic radiation, lose energy, and spiral into the nucleus. Atoms are clearly stable.\n- Step 2: Bohr added the constraint that electrons can only orbit in discrete, fixed energy levels (shells) where they do NOT radiate energy.\n- Step 3: Bohr's model was supported by the observation of line spectra—atoms only emit/absorb photons at specific, discrete frequencies, which perfectly matches electrons jumping between these fixed energy levels.\n\nBohr quantised electron orbits, explaining atomic stability and line spectra.", "source": "GLM 5.1 ②", "blind_id": 42}, {"id": "gemini_1_38", "question": "How do the control rods in a nuclear reactor differ in function from the moderator?", "answer": "The functions are opposite and complementary:\n- **Moderator:** Its job is to **slow neutrons down** without absorbing them, making them more effective at causing the next fission. It *promotes* the chain reaction.\n- **Control Rods:** Their job is to **absorb neutrons completely**, removing them from the reaction. They are used to *slow down or stop* the chain reaction.\n\nYou need the moderator to make the reaction possible, and you need the control rods to prevent it from running out of control.", "source": "Gemini 2.5 Pro ①", "blind_id": 48}, {"id": "gemini_3_7", "question": "How does an **isotope** of an element differ from an **ion** of the same element?", "answer": "The difference lies in which subatomic particles are gained or lost.\n- An **isotope** is defined by a change in the **nucleus**. Specifically, it involves a different number of **neutrons**. The number of protons and electrons (in a neutral atom) remains the same, so the element's identity and chemical properties are unchanged, but its mass and nuclear stability can differ.\n- An **ion** is defined by a change in the **electron cloud**. It is formed when a neutral atom gains or loses one or more **electrons**. This gives the atom a net electrical charge (negative if electrons are gained, positive if lost) and dramatically changes its chemical reactivity, but the nucleus (protons and neutrons) is completely unaffected.\n\n**Takeaway:** Isotopes are about nuclear composition (neutrons), while ions are about electrical charge (electrons).", "source": "Gemini 2.5 Pro ③", "blind_id": 52}, {"id": "minimax_1_17", "question": "What is the difference between the activity unit (becquerel), the absorbed dose unit (gray), and the equivalent dose unit (sievert)? (3 steps)", "answer": "- Step 1: Becquerel (Bq) measures activity — the number of decays per second in a source. 1 Bq = 1 decay per second. It tells us about the source, not the biological effect.\n- Step 2: Gray (Gy) measures absorbed dose — the amount of energy deposited per kilogram of tissue. 1 Gy = 1 joule per kg. It tells us the physical energy absorbed, but not the biological damage.\n- Step 3: Sievert (Sv) measures equivalent dose — it accounts for the type of radiation and its biological effectiveness. Different radiations cause different damage per Gy:\n+ Alpha particles are ~20 times more damaging per Gy than gamma/X-rays\n+ So 1 Gy of alpha = 20 Sv; 1 Gy of gamma = 1 Sv\n+ The sievert is what matters for health risk.", "source": "MiniMax M1 ①", "blind_id": 54}, {"id": "gflash_1_25", "question": "Describe one medical application and one industrial/domestic application of gamma radiation, explaining why gamma is particularly suited for each use. (2 steps)", "answer": "- Step 1: **Medical Application (Radiotherapy for Cancer Treatment):**\n    +   **Description:** Focused beams of high-energy gamma rays (or X-rays) are directed at cancerous tumors from multiple angles. The beams are rotated around the patient to maximize the radiation dose delivered to the tumor while minimizing the dose to healthy surrounding tissues.\n    +   **Why Gamma is Suited:** Gamma rays are highly penetrating, allowing them to reach deep-seated tumors within the body without being significantly absorbed by superficial tissues. Their lower ionising power compared to alpha particles means the damage is spread out, and with careful targeting, the healthy tissue can often repair itself while the concentrated dose at the tumor is lethal to cancer cells.\n- Step 2: **Industrial Application (Sterilisation of Medical Equipment or Food):**\n    +   **Description:** Medical instruments (e.g., syringes, bandages) or certain food products (e.g., spices, fruits) are exposed to intense gamma radiation from a Cobalt-60 source. This kills bacteria, viruses, and other microorganisms.\n    +   **Why Gamma is Suited:** Gamma rays are extremely penetrating, meaning they can sterilize items *after* they have been sealed in their final packaging. This prevents recontamination. Importantly, gamma irradiation does not make the treated materials radioactive and does not significantly heat them, preserving the integrity of heat-sensitive items.\n\nGamma radiation's high penetrating power makes it suitable for applications requiring deep penetration or sterilisation of packaged goods.", "source": "Gemini 2.5 Flash ①", "blind_id": 62}, {"id": "gflash_1_23", "question": "Clearly distinguish between \"radioactive contamination\" and \"irradiation.\" Why is understanding this difference crucial for safety protocols when handling radioactive materials? (3 steps)", "answer": "- Step 1: **Radioactive Contamination:**\n    +   **Definition:** Contamination occurs when unwanted radioactive atoms or material are physically deposited on or inside an object, person, or environment. The radioactive source itself is *present* on or in the material.\n    +   **Hazard:** The contaminated material itself becomes radioactive and continuously emits radiation. This presents a hazard as long as the radioactive material remains present, and it can be ingested, inhaled, or absorbed, leading to internal exposure.\n    +   **Safety:** Requires physical removal of the radioactive material (e.g., washing, decontamination procedures, isolating contaminated items).\n- Step 2: **Irradiation:**\n    +   **Definition:** Irradiation occurs when an object or person is simply exposed to radiation from an external source. The radiation passes through the material, but the radioactive source *does not* touch or become part of the material.\n    +   **Hazard:** The irradiated material itself *does not* become radioactive (unless it's bombarded with neutrons, which is specific to nuclear reactors, not general exposure). The hazard exists only while the material is being exposed to the external source. Once the source is removed, the material is no longer being irradiated and is safe (though it may have suffered damage from the exposure).\n    +   **Safety:** Requires shielding, increasing distance from the source, and limiting exposure time.\n- Step 3: **Crucial for Safety Protocols:** The distinction is critical because the safety measures are entirely different:\n    +   **Contamination:** Focuses on preventing the spread of radioactive material and physically removing it. You must contain the source.\n    +   **Irradiation:** Focuses on minimizing exposure to the radiation *from* an external source using the \"ALARA\" principles (As Low As Reasonably Achievable): **A**lways **L**imit **A**ccess, **R**educe **A**ll **R**adiation, **A**lways **R**emove **A**ll **R**adiation (Time, Distance, Shielding). You control the radiation, not the material. Misunderstanding this could lead to ineffective or dangerous safety practices.\n\nContamination means the problem is *with* the material; irradiation means the problem is *from* a source *external* to the material.", "source": "Gemini 2.5 Flash ①", "blind_id": 63}, {"id": "minimax_1_6", "question": "What does it mean that radioactive decay is \"random but predictable\"? (3 steps)", "answer": "- Step 1: Random — for any individual unstable nucleus, we cannot predict when it will decay. Each nucleus has the same probability of decaying at any moment, and the exact timing for any single atom is completely unpredictable.\n- Step 2: Predictable — for a large collection of nuclei, the statistical behaviour is highly predictable. The half-life is a constant for each isotope, meaning after a fixed time, exactly half the remaining undecayed nuclei will have decayed.\n+ We can predict what happens to millions of nuclei, but not to any one nucleus\n+ This is like flipping a coin: you can't predict one flip, but over thousands of flips you know ~50% will be heads\n- Step 3: This is why half-life is defined for large samples and is independent of the starting amount.", "source": "MiniMax M1 ①", "blind_id": 65}, {"id": "glm_2_18", "question": "In a factory manufacturing aluminium foil, beta radiation is passed through the foil to a detector. Why is beta ideal for this, rather than alpha or gamma? (3 steps)", "answer": "- Step 1: Alpha is too easily absorbed; it would be completely stopped even by thin foil, so it couldn't measure varying thicknesses.\n- Step 2: Gamma is too penetrating; it would pass through the foil almost unaffected, making it insensitive to small changes in thickness.\n- Step 3: Beta has moderate penetration. It is partially absorbed by the foil. If the foil gets thicker, more beta is absorbed and the detector count drops; if thinner, the count rises. This provides a sensitive, real-time feedback signal to control the rollers.\n\nBeta's moderate penetration makes it sensitive to small thickness changes.", "source": "GLM 5.1 ②", "blind_id": 67}, {"id": "gflash_2_1", "question": "Why is the radius of an atom approximately $$1 \\times 10^{-10} \\text{ m}$$, while its nucleus is roughly 10,000 times smaller? What is the significance of this vast difference in size for understanding interactions with matter? (2 steps)", "answer": "- Step 1: **Size Discrepancy:** The nucleus, composed of protons and neutrons, is incredibly dense and contains almost all of the atom's mass within a very small volume. The electrons, while much lighter, occupy a much larger volume as they orbit the nucleus in electron \"shells\" or energy levels. These electron orbits define the effective boundary of the atom. The electrostatic attraction between the positively charged nucleus and the negatively charged electrons holds them in these orbits, establishing the atomic radius. The actual particles (protons, neutrons, electrons) are point-like or extremely small, so the \"size\" of the atom is primarily defined by the extent of the electron cloud.\n- Step 2: **Significance for Interactions:** This vast emptiness within the atom means that most of the space an atom \"occupies\" is actually void.\n    +   **Chemical Reactions:** Chemical reactions primarily involve the interaction and rearrangement of these outer electrons, which are relatively far from the nucleus. The nucleus remains largely unaffected.\n    +   **Radiation Interaction:** When radiation (like alpha particles or gamma rays) passes through matter, there's a high probability it will pass straight through atoms without directly hitting a nucleus. However, because electrons occupy a larger volume, the radiation is more likely to interact with and ionise electrons, or be deflected by the electric fields of the nucleus. The tiny, dense nucleus explains why most alpha particles pass straight through gold foil in Rutherford's experiment, but a very small fraction are strongly deflected or even bounce back if they happen to hit the minuscule, heavy nucleus head-on.\n\nThe empty space dictates how atoms interact with each other chemically and physically, especially with high-energy particles like radiation.", "source": "Gemini 2.5 Flash ②", "blind_id": 72}, {"id": "gflash_2_2", "question": "Explain the distinct roles of the atomic number ($$Z$$) and mass number ($$A$$) in defining an atom, and how they relate to the number of protons, neutrons, and electrons. (3 steps)", "answer": "- Step 1: **Atomic Number ($$Z$$):** The atomic number, or proton number, represents the exact count of **protons** within an atom's nucleus.\n    +   **Element Identity:** This number is fundamental because it uniquely defines which chemical element the atom belongs to. Every atom of carbon, for example, has 6 protons ($$Z=6$$). If the number of protons changes, the element changes.\n    +   **Neutral Atom:** In a neutral atom, the number of electrons orbiting the nucleus is equal to the number of protons, ensuring a net charge of zero. So, for a neutral atom, $$Z$$ also equals the electron count.\n- Step 2: **Mass Number ($$A$$):** The mass number, or nucleon number, represents the total count of **protons and neutrons** (collectively called nucleons) in the nucleus.\n    +   **Atomic Mass:** Since protons and neutrons have approximately the same mass (and electrons have negligible mass), the mass number gives a good indication of the atom's total mass.\n    +   **Neutron Count:** The number of neutrons ($$N$$) can be determined by subtracting the atomic number from the mass number: $$N = A - Z$$.\n- Step 3: **Distinction and Relation:** While the atomic number ($$Z$$) identifies the element and its chemical properties, the mass number ($$A$$) accounts for its total nuclear mass. Atoms of the same element (same $$Z$$) can have different mass numbers ($$A$$) if they have different numbers of neutrons. These are called isotopes. Both numbers are crucial for describing a specific nuclide (a specific type of nucleus).\n\n$$Z$$ tells you 'what' element it is, while $$A$$ tells you 'how heavy' a particular version of that element is.", "source": "Gemini 2.5 Flash ②", "blind_id": 73}, {"id": "minimax_2_21", "question": "What is a chain reaction in the context of nuclear fission? Why must the reactor be \"exactly critical\"—not subcritical or supercritical? (3 steps)", "answer": "- Step 1: A **chain reaction** occurs when neutrons from one fission event cause additional fissions in nearby fuel nuclei, releasing more neutrons, which cause more fissions, and so on. One fission can cascade into millions.\n\n- Step 2: The **reproduction factor (k)** describes the average number of neutrons from each fission that cause another fission:\n  - **k < 1 (subcritical)**: Reaction dies out—too many neutrons lost\n  - **k = 1 (critical)**: Steady, controlled power—each fission produces exactly one further fission\n  - **k > 1 (supercritical)**: Exponential growth—uncontrolled, explosive (a nuclear bomb)\n\n- Step 3: A power reactor must operate **exactly critical (k = 1)** for steady, sustainable power output. Control rods maintain this balance by absorbing just enough neutrons to keep k = 1.", "source": "MiniMax M1 ②", "blind_id": 74}, {"id": "gemini_3_30", "question": "At a microscopic level, how does ionising radiation cause damage to living cells?", "answer": "Ionising radiation damages living cells by depositing energy that **knocks electrons out of atoms and molecules**, a process called ionisation. This creates highly reactive ions and free radicals. These can then:\n1.  **Break chemical bonds:** This can damage or destroy important molecules within the cell, such as proteins or lipids in the cell membrane, leading to cell death.\n2.  **Damage DNA:** Most critically, the radiation can cause single or double-strand breaks in the DNA molecule. If the cell's repair mechanisms fail to fix this damage correctly, it can lead to a **mutation**. This mutation may cause the cell to die, or worse, cause it to divide uncontrollably, leading to the formation of a **cancerous tumour**.", "source": "Gemini 2.5 Pro ③", "blind_id": 75}, {"id": "gflash_1_14", "question": "Write the general nuclear equation for alpha decay and explain how the atomic number ($$Z$$) and mass number ($$A$$) of the parent nucleus change to form the daughter nucleus. Provide an example using Uranium-238. (3 steps)", "answer": "- Step 1: **General Nuclear Equation for Alpha Decay:**\n    $$^{A}_{Z}X \\rightarrow {}^{A-4}_{Z-2}Y + {}^{4}_{2}\\alpha$$\n    Here:\n    +   $$X$$ is the parent nucleus.\n    +   $$Y$$ is the daughter nucleus.\n    +   $$\\alpha$$ represents an alpha particle ($^{4}_{2}He$).\n- Step 2: **Changes to $$A$$ and $$Z$$:**\n    +   **Mass Number ($$A$$):** The mass number decreases by $$4$$ ($$A \\rightarrow A-4$$). This is because an alpha particle consists of $$4$$ nucleons (2 protons + 2 neutrons).\n    +   **Atomic Number ($$Z$$):** The atomic number decreases by $$2$$ ($$Z \\rightarrow Z-2$$). This is because an alpha particle carries away $$2$$ protons.\n    Since the atomic number changes, the daughter nucleus ($$Y$$) is a different element from the parent nucleus ($$X$$).\n- Step 3: **Example using Uranium-238:**\n    Uranium-238 ($^{238}_{92}U$) undergoes alpha decay to form Thorium-234 ($^{234}_{90}Th$).\n    $$^{238}_{92}U \\rightarrow {}^{234}_{90}Th + {}^{4}_{2}\\alpha$$\n    Here, the mass number decreased from $$238$$ to $$234$$ (a change of $$4$$), and the atomic number decreased from $$92$$ to $$90$$ (a change of $$2$$).\n\nAlpha decay is a common mode for very heavy nuclei to shed mass and become more stable.", "source": "Gemini 2.5 Flash ①", "blind_id": 76}, {"id": "gemini_3_21", "question": "The radioactive isotope Carbon-14 ($$^{14}_{6}C$$) undergoes beta-minus decay. Write down the nuclear equation for this decay and identify the daughter nucleus. (3 steps)", "answer": "- Step 1: First, write down the parent nucleus: $$^{14}_{6}C$$. We know it undergoes beta-minus decay, so it will emit a beta particle, which is an electron with the symbol $$^{0}_{-1}e$$ or $$^{0}_{-1}\\beta$$.\n- Step 2: In beta-minus decay, the mass number ($$A$$) stays the same, and the atomic number ($$Z$$) increases by 1. So, for the daughter nucleus:\n    + New mass number $$A' = 14$$.\n    + New atomic number $$Z' = 6 + 1 = 7$$.\n- Step 3: The element with atomic number 7 is Nitrogen (N). So, the daughter nucleus is $$^{14}_{7}N$$. The complete nuclear equation is:\n$$^{14}_{6}C \\rightarrow {}^{14}_{7}N + {}^{0}_{-1}e$$", "source": "Gemini 2.5 Pro ③", "blind_id": 77}, {"id": "gemini_3_14", "question": "How is a gamma ray ($$\\gamma$$) fundamentally different from both alpha and beta radiation?", "answer": "The fundamental difference is that gamma radiation is a form of **electromagnetic radiation**, while alpha and beta are **particles**.\n- **Alpha ($$\\alpha$$) and Beta ($$\\beta$$) radiation** consist of particles with mass and charge (a helium nucleus and an electron, respectively).\n- **Gamma ($$\\gamma$$) radiation** is a high-energy photon, a packet of pure energy with no mass and no charge. It is a form of light, just like X-rays or visible light, but with a much higher frequency and energy. Gamma emission doesn't change the number of protons or neutrons in a nucleus; it only releases excess energy, often after a nucleus has undergone alpha or beta decay and is left in an \"excited\" state.", "source": "Gemini 2.5 Pro ③", "blind_id": 78}, {"id": "gemini_3_46", "question": "A decay curve graph plots the activity (or count rate) of a sample on the y-axis against time on the x-axis. How would you use this graph to find the half-life of the isotope? (2 steps)", "answer": "- Step 1: Read the initial activity of the sample from the graph at time $$t=0$$. Let's call this value $$A_0$$.\n- Step 2: Calculate half of this initial activity ($$A_0 / 2$$). Find this value on the y-axis, then move horizontally across to the decay curve and then vertically down to the x-axis. The time value you read from the x-axis at this point is the half-life ($$t_{1/2}$$). You can verify this by starting at any point on the curve, halving its activity, and checking if the time elapsed is the same.", "source": "Gemini 2.5 Pro ③", "blind_id": 79}, {"id": "minimax_1_39", "question": "Why do we say that background radiation is \"always present\" even in a completely sealed underground bunker, and what are its main natural sources? (2 steps)", "answer": "- Step 1: Even in a shielded environment, background radiation cannot be eliminated because some sources are everywhere:\n+ Cosmic rays: high-energy particles from space that penetrate deep underground (though reduced)\n+ Naturally occurring radioactive materials (NORM): trace uranium, thorium, potassium-40 in rocks, soil, and building materials\n+ Radon gas: seeps up from the ground through foundations\n+ Internal radioactivity: carbon-14 and potassium-40 in your own body\n- Step 2: The worldwide average background dose is ~3 mSv/year, with variation based on location, altitude, and local geology.", "source": "MiniMax M1 ①", "blind_id": 80}, {"id": "minimax_1_48", "question": "What is the fundamental reason that nuclear energy density is roughly one million times greater than chemical energy density? (2 steps)", "answer": "- Step 1: Chemical reactions involve rearranging electrons in the outer shells — the energy differences between different electron configurations are on the order of electronvolts (eV) per reaction.\n- Step 2: Nuclear reactions involve the strong nuclear force binding nucleons together — the energy differences are millions of times greater because the binding energy per nucleon is in the millions of electronvolts (MeV).\n+ A typical fission releases ~200 MeV; a typical chemical reaction releases a few eV\n+ Since E=mc², this larger energy release corresponds to a larger mass defect\n+ This is why a small amount of nuclear fuel can produce enormous energy compared to the same mass of chemical fuel", "source": "MiniMax M1 ①", "blind_id": 85}, {"id": "minimax_2_34", "question": "Contrast radiotherapy (treating cancer with radiation) with the mechanism by which radiation causes cancer. How can the same agent (ionising radiation) be used to both cause and cure cancer? (2 steps)", "answer": "- Step 1: **Radiation causes cancer** by ionising DNA, causing mutations. If a mutation activates an oncogene or disables a tumour suppressor gene, the cell may divide uncontrollably → cancer. This is a stochastic (probabilistic) effect—higher dose = higher probability.\n\n- Step 2: **Radiation treats cancer** by exploiting the fact that rapidly dividing cancer cells are more sensitive to DNA damage than most healthy cells. High, focused doses of radiation cause so much DNA damage in tumour cells that they undergo apoptosis (cell death) or lose reproductive ability. Healthy cells can repair better or are in the lower-dose regions.\n\n+ Paradox: Both rely on DNA damage, but controlled, targeted, high-dose radiation kills tumours; uncontrolled, whole-body, low-dose radiation may cause tumours. Dose, fractionation, and precise targeting are everything.", "source": "MiniMax M1 ②", "blind_id": 87}, {"id": "minimax_2_24", "question": "Why can't we use the naturally abundant uranium-238 (U-238) directly as fuel in a thermal neutron reactor, but uranium-235 can fission with thermal neutrons? (2 steps)", "answer": "- Step 1: **U-235** absorbs a thermal (slow) neutron, becomes U-236* (excited), and splits (fissions) with high probability. This is why U-235 is \"fissile.\"\n\n- Step 2: **U-238** absorbs a thermal neutron but does NOT fission—instead it becomes U-239, which then undergoes beta decay to plutonium-239 (Pu-239). Pu-239 IS fissile, so it can be \"bred\" and used as fuel, but U-238 itself cannot sustain a chain reaction with thermal neutrons. U-238 is \"fissionable but not fissile.\"\n\n+ Practical: Natural uranium is only 0.7% U-235. Reactors use enriched uranium (3-5% U-235) to ensure enough U-235 fissions. The \"spent fuel\" still contains U-238 and generated Pu-239.", "source": "MiniMax M1 ②", "blind_id": 89}, {"id": "qwen_2_5", "question": "Why is nuclear fusion both more energy-dense and potentially cleaner than fission, yet harder to achieve? (4 steps)", "answer": "- Step 1: **Energy per unit mass**  \nFusion of light nuclei (H isotopes → He) releases ~24 MeV per reaction vs. ~200 MeV per fission (U-235). However, hydrogen's low mass means fusion delivers **~4× more energy per kg** than fission.  \n- Step 2: **Fuel abundance**  \nDeuterium (oceans) and lithium (crust) for tritium breeding are abundant; fission relies on rare U-235.  \n- Step 3: **Waste challenges**  \nFusion produces helium (non-radioactive) and neutron-activated reactor walls (short-lived isotopes). Fission generates long-lived radioactive waste from split products.  \n- Step 4: **Technical barriers**  \nRequires 100+ million K temperatures to overcome Coulomb repulsion (plasma state). Confinement via magnetic (tokamaks) or inertial (laser) methods remains unproven at commercial scale.  \n\n+ Sun uses gravitational confinement—unavailable on Earth  \n+ Fusion breakeven (Q=1) achieved in lab settings (e.g., JET 1997: Q≈0.7) but sustained net gain remains elusive", "source": "Qwen 3 235B ②", "blind_id": 90}, {"id": "gemini_3_37", "question": "What is the fundamental difference between a nuclear reaction (like fission or fusion) and a chemical reaction (like burning fuel)?", "answer": "The fundamental difference lies in which part of the atom is involved and the scale of the energy released.\n- A **chemical reaction** involves the rearrangement of **electrons** in the outer shells of atoms to form or break chemical bonds. The atomic nuclei are completely unchanged. The energy released per atom is relatively small (on the order of electron volts, eV).\n- A **nuclear reaction** involves changes **within the atomic nucleus** itself—either splitting it (fission) or joining it with another (fusion). This can change the element's identity. The energy released is due to the conversion of a small amount of nuclear mass into energy ($$E=mc^2$$) and is about a **million times greater** per atom than in a chemical reaction.", "source": "Gemini 2.5 Pro ③", "blind_id": 94}, {"id": "gemini_4_10", "question": "During beta-minus ($$\\beta^{-}$$) decay, an electron is emitted from the nucleus. Why is this surprising, and what is actually happening inside the nucleus to make it possible? (2 steps)", "answer": "- Step 1: **The Surprise.** This is surprising because we are taught that the nucleus contains only protons and neutrons, not electrons. The electron that is emitted is *not* one of the atom's orbital electrons.\n- Step 2: **The Nuclear Process.** Inside a neutron-rich nucleus, a **neutron transforms into a proton and an electron.** The new proton stays in the nucleus, increasing the atomic number ($$Z$$) by 1. The newly created electron is immediately ejected from the nucleus at high speed. We call this ejected electron a beta-minus particle.\n\nThe transformation can be written as:\n$$^{1}_{0}n \\rightarrow {}^{1}_{1}p + {}^{0}_{-1}e^{-}$$\n\n**Takeaway:** The beta particle is *created* in the nucleus at the moment of decay; it doesn't exist there beforehand.", "source": "Gemini 2.5 Pro ④", "blind_id": 97}, {"id": "minimax_2_20", "question": "In a nuclear reactor, what is the purpose of: (a) the moderator, (b) the control rods, (c) the coolant? (3 steps)", "answer": "- Step 1: **(a) Moderator** (graphite or water): Slows down the fast neutrons produced by fission to \"thermal neutrons\" (~room temperature energy). Thermal neutrons are much more likely to cause fission in U-235—fast neutrons mostly pass through without reacting.\n\n- Step 2: **(b) Control rods** (boron or cadmium): Absorb neutrons. Raised or lowered to control the chain reaction rate. Insert fully to shut down the reactor; withdraw partially to increase power. They REMOVE neutrons from the system.\n\n- Step 3: **(c) Coolant** (pressurised water, liquid sodium): Carries away the heat generated by fission, transferring it to a secondary loop to make steam for turbines. Without cooling, the core would overheat and melt.\n\n+ Key: Moderator SLOWS neutrons; control rods ABSORB neutrons; coolant REMOVES HEAT. All three are essential for controlled, safe power generation.", "source": "MiniMax M1 ②", "blind_id": 102}, {"id": "gflash_2_3", "question": "Using nuclear notation, explain how to quickly determine the number of protons, neutrons, and nucleons in a given atom. Provide an example for Uranium-238. (3 steps)", "answer": "- Step 1: **Understanding Nuclear Notation:** Nuclear notation is a compact way to represent a specific isotope of an element, typically written as $$^{A}_{Z}X$$.\n    +   $$X$$: This is the chemical symbol for the element (e.g., U for Uranium, C for Carbon).\n    +   $$A$$ (Superscript): This is the **mass number**, representing the total count of protons and neutrons (nucleons) in the nucleus.\n    +   $$Z$$ (Subscript): This is the **atomic number**, representing the count of protons in the nucleus.\n- Step 2: **Extracting Information:** From the notation $$^{A}_{Z}X$$:\n    +   **Number of Protons:** This is directly given by the atomic number, $$Z$$.\n    +   **Number of Nucleons (Protons + Neutrons):** This is directly given by the mass number, $$A$$.\n    +   **Number of Neutrons:** Since $$A$$ is the total of protons and neutrons, and $$Z$$ is the number of protons, the number of neutrons ($$N$$) can be found by subtracting the atomic number from the mass number: $$N = A - Z$$.\n- Step 3: **Example: Uranium-238:** The nuclear notation for Uranium-238 is $$^{238}_{92}\\text{U}$$.\n    +   **Protons:** From the subscript, $$Z = 92$$. So, Uranium-238 has 92 protons.\n    +   **Nucleons:** From the superscript, $$A = 238$$. So, Uranium-238 has 238 nucleons in total.\n    +   **Neutrons:** Using the formula $$N = A - Z$$, we get $$N = 238 - 92 = 146$$. So, Uranium-238 has 146 neutrons.\n\nNuclear notation provides a concise summary of the nuclear composition, allowing for quick determination of an atom's fundamental particles.", "source": "Gemini 2.5 Flash ②", "blind_id": 108}, {"id": "glm_2_24", "question": "Both fission of heavy nuclei and fusion of light nuclei release energy. Conceptually, why do both processes move toward lower mass per nucleon? (3 steps)", "answer": "- Step 1: The binding energy per nucleon (a measure of nuclear stability) peaks around iron (Fe-56). Nuclei near iron have the lowest mass per nucleon.\n- Step 2: For nuclei lighter than iron, fusion moves them up the curve toward iron, increasing their binding energy per nucleon and releasing energy.\n- Step 3: For nuclei heavier than iron, fission splits them into smaller nuclei that are also closer to iron, similarly increasing their binding energy per nucleon and releasing energy. Both processes slide \"downhill\" toward the most stable element.\n\nBoth processes increase stability by moving nuclei toward the peak of the binding energy curve.", "source": "GLM 5.1 ②", "blind_id": 110}, {"id": "gflash_2_4", "question": "Define \"isotope\" and explain why isotopes of the same element have identical chemical properties but can exhibit different nuclear stabilities. Provide an example. (3 steps)", "answer": "- Step 1: **Definition of Isotope:** Isotopes are atoms of the same chemical element that have the same number of protons (and thus the same atomic number, $$Z$$) but a different number of neutrons (and therefore a different mass number, $$A$$). For example, Carbon-12 ($^{12}_{6}\\text{C}$) has 6 protons and 6 neutrons, while Carbon-14 ($^{14}_{6}\\text{C}$) has 6 protons and 8 neutrons. Both are carbon because they both have 6 protons.\n- Step 2: **Identical Chemical Properties:** An atom's chemical properties are almost entirely determined by the configuration of its electrons, particularly the number of electrons in its outermost shell. Since isotopes of the same element have the same number of protons, in a neutral atom, they also have the same number of electrons. This identical electron configuration means they will participate in chemical reactions in the same way, form the same types of bonds, and exhibit the same chemical behavior. The extra neutrons do not significantly affect the electron cloud or the electromagnetic forces governing chemical interactions.\n- Step 3: **Different Nuclear Stabilities:** While chemically identical, the different neutron counts in isotopes can significantly impact the stability of their nuclei. The balance between protons and neutrons is critical for nuclear stability.\n    +   **Strong Nuclear Force:** Protons repel each other due to their positive charge (electrostatic repulsion). Neutrons, being neutral, help to \"glue\" the nucleus together via the strong nuclear force, which acts over very short distances between all nucleons (protons and neutrons).\n    +   **Balance:** If there are too many or too few neutrons relative to protons, this balance is disrupted, making the nucleus unstable. Unstable isotopes are radioactive and undergo radioactive decay to achieve a more stable configuration. For example, Carbon-12 is stable, but Carbon-14 is unstable and undergoes beta-minus decay.\n\nIsotopes highlight the crucial distinction between an atom's electron-driven chemistry and its nucleus-driven radioactivity.", "source": "Gemini 2.5 Flash ②", "blind_id": 111}, {"id": "gflash_1_19", "question": "Define \"background radiation\" and identify its main natural and artificial sources. Why is it crucial to account for background radiation when measuring the activity of a specific radioactive source? (3 steps)", "answer": "- Step 1: **Definition of Background Radiation:** Background radiation is the low level of ionising radiation that is always present in our environment, coming from various natural and artificial sources. It's a constant, unavoidable exposure to radiation that everyone experiences.\n- Step 2: **Sources of Background Radiation:**\n    +   **Natural Sources:**\n        +   **Radon Gas:** The largest natural contributor, seeping from rocks and soil, especially granite, into buildings.\n        +   **Cosmic Rays:** High-energy particles from space that bombard Earth's atmosphere, producing secondary radiation.\n        +   **Rocks and Soil:** Naturally occurring radioactive isotopes (like uranium, thorium, potassium-40) in the Earth's crust.\n        +   **Food and Drink:** Trace amounts of radioactive isotopes (e.g., potassium-40, carbon-14) are naturally present in our bodies and consumed items.\n    +   **Artificial Sources:**\n        +   **Medical Uses:** X-rays, CT scans, radioactive tracers for diagnosis and treatment.\n        +   **Nuclear Industry:** Emissions from nuclear power plants, processing plants, and waste disposal (usually very small for the public).\n        +   **Nuclear Weapons Fallout:** Residual radiation from past nuclear weapons testing.\n- Step 3: **Importance of Accounting for Background Radiation:** When using a detector (like a GM tube) to measure the activity of a specific radioactive source, the detector will register counts from *both* the source *and* the ever-present background radiation. To determine the true activity of *only* the source, the background count rate must be measured separately (with the source removed or shielded) and then subtracted from the total measured count rate (source + background). This gives the \"corrected count rate,\" which accurately reflects the emissions from the source alone ($$C_{\\text{corr}} = C_{\\text{meas}} - C_{\\text{bg}}$$). Failing to do so would lead to an overestimation of the source's activity.\n\nBackground radiation is a baseline that must be removed to isolate the signal from the source of interest.", "source": "Gemini 2.5 Flash ①", "blind_id": 120}, {"id": "gflash_1_17", "question": "Explain why gamma decay does not change the atomic number ($$Z$$) or mass number ($$A$$) of a nucleus, and describe its typical timing relative to alpha or beta decay. (2 steps)", "answer": "- Step 1: **No Change in $$A$$ or $$Z$$:** Gamma rays are high-energy electromagnetic waves (photons), not particles with mass or charge. When a nucleus emits a gamma ray, it is simply shedding excess energy, much like an excited electron emits light. No protons or neutrons are gained, lost, or converted. Therefore, the number of protons ($$Z$$) and the total number of nucleons ($$A$$) remain unchanged. The nucleus simply transitions from an excited state to a lower energy state of the *same* isotope.\n- Step 2: **Timing Relative to Alpha or Beta Decay:** Gamma emission often occurs *immediately following* alpha or beta decay. After an alpha or beta particle is emitted, the newly formed daughter nucleus may still be in an \"excited state\" (meaning its nucleons are in higher energy configurations). To reach its most stable, ground state, this excited daughter nucleus then emits one or more gamma photons to release this excess energy. So, it's common to see alpha decay followed by gamma emission, or beta decay followed by gamma emission.\n\nGamma decay is a mechanism for energy release from the nucleus, not a fundamental change in its composition.", "source": "Gemini 2.5 Flash ①", "blind_id": 122}, {"id": "minimax_2_28", "question": "Compare the radiation dose from: (a) a typical chest X-ray (~0.1 mSv), (b) a CT scan (~10 mSv), (c) background radiation (~3 mSv/year), (d) the nuclear industry dose limit (20 mSv/year). Rank them from lowest to highest dose. (2 steps)", "answer": "- Step 1: Convert all to millisieverts (mSv):\n  - Chest X-ray: 0.1 mSv\n  - Background: ~3000 μSv/year = 3 mSv/year\n  - CT scan: 10 mSv\n  - Nuclear limit: 20 mSv/year\n\n- Step 2: **Ranking (lowest to highest)**:\n  1. Chest X-ray (0.1 mSv)\n  2. Background radiation (3 mSv/year)\n  3. CT scan (10 mSv)\n  4. Nuclear industry limit (20 mSv/year)\n\n+ Insight: One CT scan (~10 mSv) delivers roughly 3× your annual background dose in seconds. Medical imaging is the largest artificial source of radiation exposure for most people. The dose limit for nuclear workers (20 mSv) is set ~6× above background to allow useful work while keeping risk low.", "source": "MiniMax M1 ②", "blind_id": 126}, {"id": "minimax_1_30", "question": "Why does the same dose of alpha radiation cause more biological damage than the same dose of gamma radiation? (2 steps)", "answer": "- Step 1: Alpha particles have a much higher linear energy transfer (LET) than gamma — they deposit their energy in a much shorter track through tissue, creating a dense trail of ionisation.\n- Step 2: This concentrated damage is harder for cells to repair than the more dispersed damage from gamma. The biological effect per unit of absorbed energy (measured in sieverts per gray) is about 20 times greater for alpha than for gamma/X-rays.\n+ One alpha particle can damage many molecules along its short, dense path\n+ Gamma rays spread their energy more sparsely, giving cells a better chance to repair damage", "source": "MiniMax M1 ①", "blind_id": 130}, {"id": "minimax_2_10", "question": "What does half-life mean? If a sample has a half-life of 5 hours and initially contains 8000 radioactive nuclei, how many remain after 15 hours? Explain your reasoning. (3 steps)", "answer": "- Step 1: **Half-life (t½)** = the time taken for half of the undecayed nuclei in a sample to decay (or for activity to halve). It's a constant for a given isotope—independent of how much you start with.\n\n- Step 2: Starting with 8000 nuclei:\n  - After 5 hours (1 half-life): 8000 → 4000\n  - After 10 hours (2 half-lives): 4000 → 2000\n  - After 15 hours (3 half-lives): 2000 → 1000\n\n- Step 3: After 15 hours (3 half-lives), **1000 nuclei** remain undecayed. Each half-life halves what's left—it never reaches zero in finite time, but gets infinitely close.\n\n+ Misconception: Half-life is NOT the time for ALL nuclei to decay—that would take forever. It's always \"half of whatever is left.\"", "source": "MiniMax M1 ②", "blind_id": 131}, {"id": "minimax_2_8", "question": "A radiation worker wears a film badge. Explain how it works to monitor radiation dose, and why does it have different windows (paper, aluminium, lead)? (3 steps)", "answer": "- Step 1: A **photographic film badge** contains film that darkens when exposed to radiation. The degree of darkening indicates the total radiation dose received over the wearing period (days/weeks). It acts as a cumulative dosimeter.\n\n- Step 2: Different windows let different types of radiation reach the film:\n  - **Paper window**: Stops alpha, lets beta + gamma through (alpha darkens film little anyway)\n  - **Aluminium window**: Stops alpha, reduces beta, lets gamma through\n  - **Lead window**: Stops alpha + beta, only gamma reaches the film\n\n- Step 3: By comparing darkening in each section, you can determine which types of radiation were present and estimate the dose from each. This helps ensure workers stay below safe limits and identify exposure patterns.\n\n+ Not a real-time detector: The badge must be developed chemically to read the dose—it doesn't give instant readings like a GM tube.", "source": "MiniMax M1 ②", "blind_id": 139}, {"id": "minimax_2_23", "question": "Write the fusion reaction between deuterium and tritium, and identify what is produced besides energy. Why is this reaction particularly attractive for future power generation? (2 steps)", "answer": "- Step 1: The deuterium-tritium fusion reaction is:\n$$^{2}_{1}\\text{H} + ^{3}_{1}\\text{H} \\rightarrow ^{4}_{2}\\text{He} + ^{1}_{0}n + \\text{energy}$$\n\n- Step 2: Products: **Helium-4** (an alpha particle, completely inert and safe) + **one fast neutron** + energy. The helium poses no radioactive hazard; the neutron activates some reactor materials but far less than fission waste.\n\n+ Attractive for power: Abundant fuel (deuterium from seawater, tritium bred from lithium); no long-lived radioactive waste; no chain reaction risk (reaction stops if plasma cools); impossible to make weapons from power plant output. Still technically challenging—achieving and maintaining the 100 million°C plasma required.", "source": "MiniMax M1 ②", "blind_id": 140}, {"id": "minimax_2_26", "question": "In a smoke detector, americium-241 decays by alpha emission (half-life 432 years). Why is this alpha source safe inside the detector, but would be dangerous if the detector were dismantled and the source inhaled? (2 steps)", "answer": "- Step 1: **Inside the sealed detector**: The alpha particles are contained by the plastic casing—they cannot penetrate it. The source is sealed, and the radiation stays inside. No contamination, no exposure.\n\n- Step 2: **If dismantled and inhaled**: Alpha is the most ionising radiation. If radioactive atoms get inside your body (inhaled, ingested, or in a wound), the alpha particles deposit all their energy directly into nearby cells, causing severe, concentrated damage. The dead cells can't \"wash away\" the radiation—it's physically there. Additionally, americium-241 has a 432-year half-life, so it remains radioactive for centuries inside your body.\n\n+ Critical principle: **Internal contamination** (radioactive material inside you) is far more dangerous than **external exposure** (radiation passing through from outside) because the radiation source is right next to your cells.", "source": "MiniMax M1 ②", "blind_id": 144}, {"id": "gflash_2_22", "question": "Einstein's famous equation is $$E=mc^2$$. Explain, in conceptual terms, how this equation relates to the immense energy released during nuclear fission and fusion, given that mass appears to be conserved in everyday chemical reactions. (3 steps)", "answer": "- Step 1: **Mass-Energy Equivalence ($$E=mc^2$$):** This equation, proposed by Albert Einstein, states that mass ($$m$$) and energy ($$E$$) are fundamentally interchangeable and are two forms of the same entity. The term $$c^2$$ (where $$c$$ is the speed of light, approximately $$3 \\times 10^8 \\text{ m/s}$$) is an enormous constant, meaning that even a tiny amount of mass can be converted into a colossal amount of energy, and vice-versa.\n- Step 2: **\"Missing Mass\" or Mass Defect in Nuclear Reactions:**\n    +   **Chemical Reactions:** In everyday chemical reactions (like burning fuel), the energy changes involve the rearrangement of electrons, and the masses of reactants and products are conserved to an extremely high degree. Any change in mass is far too small to be measured.\n    +   **Nuclear Reactions:** In nuclear reactions (fission and fusion), there is a *measurable* difference between the total mass of the reactants (the initial nuclei) and the total mass of the products (the daughter nuclei plus emitted particles like neutrons, alpha, or beta particles). The total mass of the products is slightly *less* than the total mass of the reactants. This \"missing mass\" is called the **mass defect**.\n- Step 3: **Conversion of Mass to Energy:** It is this small amount of \"missing mass\" (the mass defect) that has been directly converted into the enormous amount of energy released during the nuclear reaction, according to $$E=mc^2$$.\n    +   **Why \"Immense\" Energy:** Because $$c^2$$ is such a huge number ($$(3 \\times 10^8)^2 = 9 \\times 10^{16} \\text{ m}^2/\\text{s}^2$$), even a minuscule mass defect (e.g., a few atomic mass units) results in a vast quantity of energy. This is why nuclear energy is roughly a million times more potent per kilogram than chemical energy. In fission, a heavy nucleus splits into lighter, more stable fragments, and the difference in binding energy between the initial and final states is released as kinetic energy of the fragments and gamma rays. Similarly in fusion, light nuclei combine to form a heavier, more stable nucleus, releasing energy.\n\n$$E=mc^2$$ reveals that the universe's most powerful energy sources reside not in chemical bonds, but in the very fabric of matter itself.", "source": "Gemini 2.5 Flash ②", "blind_id": 155}, {"id": "gemini_3_26", "question": "A common misconception is that if an isotope has a half-life of 10 years, all of it will have decayed after 20 years. Explain why this is incorrect. (2 steps)", "answer": "- Step 1: This is incorrect because the half-life applies to the **remaining undecayed nuclei** at the start of each half-life period. It doesn't mean the whole sample decays in two half-lives.\n- Step 2: Let's follow the decay process:\n    + At time $$t=0$$, we have 100% of the sample.\n    + After one half-life (10 years), 50% of the sample will have decayed, leaving **50%**.\n    + After a second half-life (another 10 years, so 20 years total), half of the *remaining* 50% will decay. Half of 50% is 25%. So, an additional 25% decays, leaving **25%** of the original sample.\n    + The decay is exponential; it approaches zero but never theoretically reaches it.", "source": "Gemini 2.5 Pro ③", "blind_id": 160}, {"id": "gflash_1_20", "question": "Explain the concept of \"radioactive half-life\" ($$t_{1/2}$$) and why it is a constant value for a given isotope, despite the random nature of individual nuclear decays. (3 steps)", "answer": "- Step 1: **Definition of Half-life:** The half-life ($$t_{1/2}$$) of a radioactive isotope is the time it takes for half of the undecayed (radioactive) nuclei in a sample to undergo radioactive decay. Equivalently, it is the time taken for the activity of a radioactive source to halve.\n- Step 2: **Random Nature of Decay:** Individual radioactive decays are entirely random and unpredictable. It is impossible to know *when* a specific nucleus will decay. Each unstable nucleus has a constant probability of decaying per unit time, regardless of its age or external conditions (temperature, pressure, chemical state).\n- Step 3: **Constant Half-life (Statistical Predictability):** Despite the randomness of individual decays, the half-life is a constant value for a given isotope because it applies to a *very large number* of nuclei. When dealing with a macroscopic sample containing billions of radioactive nuclei, the statistical probability of decay becomes highly predictable. While you can't predict *which* half will decay, you can reliably predict that *half* of the total population will decay in one half-life period. It's like flipping a coin many times: you can't predict a single flip, but you can predict that roughly half will be heads over many flips. This constant statistical probability leads to a constant half-life, independent of the initial amount of the substance.\n\nThe half-life provides a reliable clock for the decay of a large sample, even though the underlying process is fundamentally random at the individual nuclear level.", "source": "Gemini 2.5 Flash ①", "blind_id": 163}, {"id": "gemini_4_2", "question": "What is the critical difference between the \"plum pudding\" model of the atom and the \"nuclear\" model proposed by Rutherford? (2 steps)", "answer": "- Step 1: **Plum Pudding Model (Thomson).** This model imagined the atom as a sphere of diffuse, positively charged \"pudding\" with negatively charged electrons (\"plums\") embedded throughout. In this model, both mass and positive charge are spread out evenly across the entire atom.\n- Step 2: **Nuclear Model (Rutherford).** This model, based on the alpha scattering experiment, proposed a radically different structure. It stated that all the positive charge and almost all the mass are concentrated in a tiny, dense core called the nucleus. The small, negative electrons orbit this nucleus at a great distance, with empty space in between.\n\n**Takeaway:** The key change was the concentration of positive charge and mass into a central nucleus, which replaced the idea of a uniform, charged sphere.", "source": "Gemini 2.5 Pro ④", "blind_id": 169}, {"id": "gemini_2_7", "question": "In Rutherford's alpha-scattering experiment, what were the three key observations, and what did each one imply about the structure of the atom? (3 steps)", "answer": "- Step 1: **Observation 1:** Most alpha particles passed straight through the thin gold foil with no deflection.\n    + **Implication:** This suggested that the atom is mostly empty space, not a solid \"pudding.\"\n- Step 2: **Observation 2:** A small number of alpha particles were deflected by a small angle as they passed through the foil.\n    + **Implication:** This suggested there is a concentration of positive charge somewhere in the atom. When a positive alpha particle passed near this region, it was repelled and its path was bent.\n- Step 3: **Observation 3:** A very small number of alpha particles (about 1 in 8000) were deflected by large angles, some even bouncing straight back.\n    + **Implication:** This was the most surprising result. It implied that the positive charge and mass must be concentrated in a tiny, dense core (the nucleus). A direct collision with this nucleus was required to cause such a massive repulsion.", "source": "Gemini 2.5 Pro ②", "blind_id": 170}, {"id": "glm_2_23", "question": "Why must high-level nuclear waste from fission reactors be stored deep underground for thousands of years, unlike ordinary industrial waste? (2 steps)", "answer": "- Step 1: The fission products (daughter nuclei) are often highly radioactive isotopes with very long half-lives, meaning they will continue to emit dangerous ionising radiation for millennia.\n- Step 2: This radiation can cause severe biological damage (mutations, cancer) if it leaks into the biosphere. Deep geological isolation in shielded containers ensures the radiation is absorbed by rock and cannot reach groundwater or the surface.\n\nLong half-lives require long-term geological isolation to protect the biosphere.", "source": "GLM 5.1 ②", "blind_id": 171}, {"id": "gflash_1_12", "question": "Explain the concept of \"ionising power\" for radiation, and rank alpha, beta, and gamma radiation from most to least ionising. Why does this ranking rela
