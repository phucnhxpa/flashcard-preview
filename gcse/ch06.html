te inversely to their penetrating power? (3 steps)", "answer": "- Step 1: **Definition of Ionising Power:** Ionising power refers to the ability of radiation to knock electrons out of atoms, thereby creating ions (charged atoms or molecules). When radiation passes through matter, it interacts with the atoms it encounters. If it has sufficient energy and interacts strongly enough, it can dislodge an electron from an atom, turning the neutral atom into a positive ion and the freed electron into a negative ion.\n- Step 2: **Ranking of Ionising Power:**\n    +   **Alpha particles ($$\\alpha$$):** Most ionising.\n    +   **Beta particles ($$\\beta$$):** Moderately ionising.\n    +   **Gamma rays ($$\\gamma$$):** Least ionising.\n    This is because alpha particles are relatively large, heavy, and have a $$+2$$ charge, making them highly effective at interacting with and stripping electrons from atoms. Beta particles are lighter and have a $$-1$$ charge, making them less effective than alphas. Gamma rays have no charge or mass, so they interact much less frequently and powerfully with electrons.\n- Step 3: **Inverse Relationship with Penetrating Power:** Ionising power is inversely related to penetrating power.\n    +   **High Ionising Power = Low Penetrating Power:** Alpha particles, being highly ionising, lose their energy very quickly as they collide with and ionise many atoms in a short distance. This rapid energy deposition means they are stopped by very thin materials (like a sheet of paper) and have a short range in air (a few cm).\n    +   **Low Ionising Power = High Penetrating Power:** Gamma rays, being weakly ionising, pass through many atoms without interacting. They deposit their energy slowly over a longer path, allowing them to penetrate much further through materials (like several cm of lead or metres of concrete). Beta particles are in between.\n\nRadiation that is good at ripping electrons out of atoms quickly exhausts its energy, hence it cannot penetrate far.", "source": "Gemini 2.5 Flash ①", "blind_id": 175}, {"id": "minimax_2_30", "question": "What is \"enriched uranium,\" and why is enrichment necessary for most commercial reactors? What enrichment level is typically used? (2 steps)", "answer": "- Step 1: Natural uranium is only **0.7% U-235** (the fissile isotope); the rest is U-238. Most reactors need a higher proportion of U-235 to sustain a chain reaction with thermal neutrons.\n\n- Step 2: **Enrichment** increases the U-235 concentration to typically **3-5%** for commercial power reactors. This is enough to maintain criticality with a moderator. Weapons-grade uranium is >90% U-235.\n\n+ Note: Enrichment is technically challenging (gaseous diffusion, centrifuges) because U-235 and U-238 are chemically identical—only the small mass difference allows separation.", "source": "MiniMax M1 ②", "blind_id": 192}, {"id": "minimax_2_32", "question": "A Geiger-Müller tube reads 200 cpm with a source, and 30 cpm with the source removed (background). After 6 hours, the same source gives a reading of 100 cpm (background still 30 cpm). Has the source's half-life elapsed? Explain. (3 steps)", "answer": "- Step 1: Initial corrected count = 200 - 30 = **170 cpm**. After 6 hours: 100 - 30 = **70 cpm**.\n\n- Step 2: The ratio is 170 → 70, which is roughly 170/70 ≈ 2.4. This is NOT exactly halved (which would be 85 cpm), but close.\n\n- Step 3: If exactly one half-life (t½) had passed, the activity would have halved. The result of ~70 cpm is close to half of 170 cpm, suggesting **approximately one half-life has elapsed**. The small discrepancy could be due to counting statistics (random error in GM measurements) or a slightly different half-life.\n\n+ Insight: GM tube measurements have inherent statistical uncertainty (±√N), so exact halving is rare. You need many counts for accuracy.", "source": "MiniMax M1 ②", "blind_id": 201}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What is the fundamental structure of an atom, and how do its components compare in terms of size and charge? (3 steps)", "answer": "- Step 1: An atom consists of a tiny, dense nucleus at its center surrounded by electrons in orbitals. The nucleus contains protons and neutrons, while electrons occupy specific energy levels outside the nucleus.\n- Step 2: In terms of size, the atom has a radius of approximately 1×10⁻¹⁰ m, while the nucleus is about 10,000 times smaller (radius ≈ 10⁻¹⁴ m). This means the atom is mostly empty space.\n- Step 3: In terms of charge, the nucleus is positively charged due to protons (+1 each), while electrons have a negative charge (-1 each). In a neutral atom, the number of protons equals the number of electrons, balancing the charges.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "Compare and contrast protons, neutrons, and electrons in terms of their properties and locations within an atom. (3 steps)", "answer": "- Step 1: Protons are positively charged particles (+1 relative charge) found in the nucleus, with a relative mass of 1. They determine the element's identity through the atomic number Z.\n- Step 2: Neutrons are neutral particles (0 relative charge) also found in the nucleus, with a relative mass of 1. They contribute to nuclear stability and mass but do not affect the element's identity.\n- Step 3: Electrons have a negative charge (-1 relative charge) and negligible relative mass (about 1/2000 of a proton's mass). They orbit the nucleus in discrete energy levels, determining the atom's chemical properties but not its nuclear identity.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Explain how the atomic number (Z) and mass number (A) define an isotope and how they relate to the number of neutrons in a nucleus. (2 steps)", "answer": "- Step 1: The atomic number Z represents the number of protons in a nucleus, which uniquely identifies the element. The mass number A represents the total number of nucleons (protons plus neutrons) in the nucleus.\n- Step 2: Isotopes are atoms of the same element (same Z) with different numbers of neutrons. The number of neutrons N can be calculated as N = A - Z. For example, carbon-12 (¹²₆C) has 6 protons and 6 neutrons, while carbon-14 (¹⁴₆C) has 6 protons and 8 neutrons.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "What is nuclear notation, and how can you determine the number of protons, neutrons, and electrons in a neutral atom from the symbol ²³⁸₉₂U? (3 steps)", "answer": "- Step 1: Nuclear notation uses the format ᴬZX, where X is the element symbol, A is the mass number (top), and Z is the atomic number (bottom). For ²³⁸₉₂U, U is uranium.\n- Step 2: The atomic number Z = 92 tells us there are 92 protons in the nucleus. Since this is a neutral atom, there must also be 92 electrons orbiting the nucleus.\n- Step 3: The mass number A = 238 represents the total number of nucleons (protons + neutrons). Therefore, the number of neutrons is A - Z = 238 - 92 = 146 neutrons.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "How do electrons behave in atoms according to the Bohr model, and what happens when they absorb or emit electromagnetic radiation? (2 steps)", "answer": "- Step 1: In the Bohr model, electrons can only exist in specific energy levels (orbits) at fixed distances from the nucleus. These energy levels are quantized, meaning electrons cannot be between these levels.\n- Step 2: When an electron absorbs a photon with exactly the right energy, it jumps to a higher energy level (excited state). When it falls back to a lower level, it emits a photon with energy equal to the difference between the levels, producing characteristic line spectra for each element.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Explain the key differences between the plum pudding model, the nuclear model, and the Bohr model of the atom. (3 steps)", "answer": "- Step 1: The plum pudding model (proposed by J.J. Thomson) depicted atoms as a uniform positive \"pudding\" with negatively charged electrons embedded throughout, with no concentrated nucleus.\n- Step 2: The nuclear model (proposed by Rutherford after his scattering experiment) showed that atoms have a tiny, dense, positively charged nucleus at the center with electrons orbiting in mostly empty space.\n- Step 3: The Bohr model (refined by Niels Bohr) added the concept of quantized energy levels to the nuclear model, explaining why electrons only exist at specific distances from the nucleus and how atoms emit characteristic line spectra.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "What was the significance of Rutherford's alpha particle scattering experiment, and what unexpected results led to the nuclear model of the atom? (2 steps)", "answer": "- Step 1: In Rutherford's 1909 experiment, alpha particles were fired at a thin sheet of gold foil. The expectation based on the plum pudding model was that most particles would pass through with slight deflections.\n- Step 2: The surprising results were that while most alpha particles did pass straight through, some were deflected at large angles, and a few even bounced back completely. This indicated that the atom's positive charge and most of its mass were concentrated in a tiny nucleus, with most of the atom being empty space.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Why are isotopes of the same element chemically similar but potentially different in their nuclear properties? (2 steps)", "answer": "- Step 1: Isotopes have the same number of protons and electrons, which determine an element's chemical properties. Since chemical reactions involve the outer electrons, isotopes behave identically chemically.\n- Step 2: However, isotopes have different numbers of neutrons, affecting nuclear stability. Some isotopes are stable, while others are radioactive and undergo decay. The neutron count influences the nucleus's binding energy and can make certain configurations unstable.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "What happens when an atom becomes ionized, and how does this process differ from radioactive decay? (2 steps)", "answer": "- Step 1: When an atom is ionized, it gains or loses electrons, resulting in a net electrical charge. This affects the electron cloud but does not change the nucleus or the element's identity.\n- Step 2: Radioactive decay, in contrast, involves changes to the nucleus itself, where an unstable nucleus emits radiation and transforms into a different element or isotope. Ionization is a process affecting electrons, while radioactive decay is a nuclear process.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "How does the excitation of an atom differ from ionization, and what are the possible outcomes of each process? (2 steps)", "answer": "- Step 1: Excitation occurs when an electron absorbs energy and jumps to a higher energy level within the same atom, but remains bound to the nucleus. Ionization occurs when an electron gains enough energy to escape the atom completely, creating a free electron and a positive ion.\n- Step 2: The outcome of excitation is typically the emission of electromagnetic radiation as the electron returns to a lower energy level. Ionization results in a charged species (ion) and a free electron, which can participate in chemical reactions or electrical conduction.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Compare the properties of alpha particles, beta particles, and gamma rays in terms of their composition, charge, mass, and ionizing power. (3 steps)", "answer": "- Step 1: Alpha particles (α) are identical to helium-4 nuclei, consisting of 2 protons and 2 neutrons, giving them a charge of +2 and a relative mass of 4.\n- Step 2: Beta particles (β) are high-speed electrons emitted from the nucleus during decay. Beta-minus particles (β⁻) have a charge of -1 and negligible mass, while beta-plus particles (β⁺) are positrons with a charge of +1 and negligible mass.\n- Step 3: Gamma rays (γ) are high-energy electromagnetic photons with no mass and no charge. In terms of ionizing power, alpha particles are the most ionizing but least penetrating, beta particles have moderate ionizing and penetrating power, and gamma rays are the least ionizing but most penetrating.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Explain the penetrating power of different types of radiation and how this affects their detection and shielding requirements. (3 steps)", "answer": "- Step 1: Alpha particles have low penetrating power and can be stopped by a sheet of paper or a few centimeters of air. They deposit their energy quickly over a short distance, making them highly ionizing but easily shielded.\n- Step 2: Beta particles have moderate penetrating power and can be stopped by a few millimeters of aluminum or plastic. They travel further than alpha particles but still require thin shielding.\n- Step 3: Gamma rays have high penetrating power and require several centimeters of lead or several meters of concrete for effective shielding. Their ability to penetrate materials makes them difficult to stop but also useful for applications like medical imaging and industrial radiography.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "What is the random nature of radioactive decay, and how does this randomness relate to the predictability of half-life? (2 steps)", "answer": "- Step 1: Radioactive decay is fundamentally random at the individual nucleus level. Each unstable nucleus has the same probability of decaying per unit time, but it's impossible to predict which specific nucleus will decay or when it will decay.\n- Step 2: Despite this randomness, large samples follow predictable statistical patterns. The half-life (time for half the nuclei to decay) is a constant for each radioactive isotope, allowing us to predict decay rates for macroscopic samples even though individual decay events are random.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "How does the concept of activity differ from count rate in radiation measurements, and why is background radiation important to consider? (3 steps)", "answer": "- Step 1: Activity refers to the actual rate of radioactive decay in a source, measured in becquerels (Bq), where 1 Bq equals one decay per second. It represents the intrinsic property of the radioactive material.\n- Step 2: Count rate is the number of radiation events detected per unit time by a detector like a Geiger-Müller tube. It is always less than the true activity because not all emissions from the source reach the detector.\n- Step 3: Background radiation is the radiation present from natural and artificial sources that is not from the source being measured. To get an accurate measurement of a source's activity, we must subtract the background count rate from the total measured count rate to get the corrected count rate.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "What happens during beta-minus decay and beta-plus decay, and how do these processes affect the atomic number and mass number of the parent nucleus? (3 steps)", "answer": "- Step 1: In beta-minus decay, a neutron in the nucleus converts into a proton and emits an electron (β⁻ particle) and an antineutrino. This process increases the atomic number by 1 (since a proton is added) while keeping the mass number the same.\n- Step 2: In beta-plus decay, a proton converts into a neutron and emits a positron (β⁺ particle) and a neutrino. This decreases the atomic number by 1 while keeping the mass number the same.\n- Step 3: For both types of beta decay, the mass number remains unchanged because the total number of nucleons (protons + neutrons) stays the same. Only the ratio of protons to neutrons changes, which can make the nucleus more stable.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Write and balance the nuclear equations for alpha decay of radium-226 and beta-minus decay of carbon-14, showing the parent and daughter nuclei. (3 steps)", "answer": "- Step 1: For alpha decay of radium-226 (²²⁶₈₈Ra), an alpha particle (²⁴₂He) is emitted. The balanced equation is: ²²⁶₈₈Ra → ²²²₈₆Rn + ²⁴₂He. The mass numbers (226 = 222 + 4) and atomic numbers (88 = 86 + 2) balance on both sides.\n- Step 2: For beta-minus decay of carbon-14 (¹⁴₆C), a neutron converts to a proton, emitting an electron. The equation is: ¹⁴₆C → ¹⁴₇N + ⁰₋₁e. The mass number remains 14 on both sides, while the atomic number increases from 6 to 7.\n- Step 3: In both cases, the parent nucleus transforms into a daughter nucleus of a different element. In the alpha decay, radium (Ra) becomes radon (Rn), while in the beta decay, carbon (C) becomes nitrogen (N).", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "How is a Geiger-Müller tube used to detect radiation, and what are its limitations compared to other detection methods? (2 steps)", "answer": "- Step 1: A Geiger-Müller tube detects radiation by containing a gas that becomes ionized when radiation passes through it. This ionization creates an electrical pulse that is counted, producing clicks or digital readings. It can detect alpha, beta, and gamma radiation, though with different efficiencies.\n- Step 2: Limitations include its inability to distinguish between different types of radiation without additional shielding, its \"dead time\" where it cannot detect new events immediately after detecting one, and its inability to measure the energy of the radiation. Photographic film badges can identify radiation types by which section darkens, and semiconductor detectors can provide energy information.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "What is the relationship between activity, the number of undecayed nuclei, and the decay constant? (2 steps)", "answer": "- Step 1: Activity (A) is directly proportional to the number of undecayed nuclei (N) in a sample. The relationship is given by A = λN, where λ is the decay constant (probability of decay per nucleus per unit time).\n- Step 2: The decay constant λ represents the fraction of nuclei that decay per unit time. A larger λ means a higher probability of decay, leading to a shorter half-life. Activity decreases over time as N decreases, following the exponential decay law A = A₀e^(-λt).", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Explain the concept of half-life and how it can be determined experimentally using a Geiger-Müller tube. (3 steps)", "answer": "- Step 1: Half-life (t₁/₂) is the time taken for half of the radioactive nuclei in a sample to decay, or equivalently for the activity to reduce to half its initial value. It is a characteristic property of each radioactive isotope.\n- Step 2: To determine half-life experimentally, one would measure the count rate of a radioactive sample at regular intervals using a Geiger-Müller tube, subtracting background radiation to get the corrected count rate.\n- Step 3: By plotting the corrected count rate against time on a logarithmic scale, one can determine the half-life by finding the time it takes for the count rate to halve. Alternatively, from the slope of the linear portion of a log(count rate) vs. time graph, the decay constant λ can be found, and half-life calculated using t₁/₂ = ln(2)/λ ≈ 0.693/λ.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}], "count": 19}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In Rutherford's alpha scattering experiment, most alpha particles passed straight through the gold foil. What fundamental feature of the atom does this observation prove, and why? (3 steps)", "answer": "- Step 1: Identify that \"passing straight through\" means the alpha particles encountered virtually no resistance or interaction over the entire width of the foil.\n- Step 2: Conclude that the vast majority of the atom's volume must be empty space, not a solid \"pudding\" of charge as Thomson's model suggested.\n- Step 3: Note that if the plum pudding model were correct, the positive charge spread throughout the atom would have deflected all alpha particles to some degree. The straight-through passage directly disproves it.\n\nThe atom is mostly empty space.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A few alpha particles in Rutherford's experiment bounced straight back from the gold foil. What does this tell us about the nucleus's charge and mass relative to the alpha particle? (3 steps)", "answer": "- Step 1: For an alpha particle to bounce back (reverse direction), it must encounter a concentrated electrostatic repulsion.\n- Step 2: This requires the repelling region (the nucleus) to have a much larger positive charge than the alpha particle itself, creating a strong enough Coulomb force to push it backwards.\n- Step 3: It also requires the repelling region to contain most of the atom's mass. If the nucleus were light, the alpha particle would simply push it aside; the fact that the alpha bounces back shows the nucleus is massive and densely packed.\n\nThe nucleus is tiny, massive, and positively charged.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "A subatomic particle has a relative mass of 1 and a relative charge of 0. Where is this particle located, and what is it called? Why can't it be an electron or a proton? (2 steps)", "answer": "- Step 1: The particle is a neutron, located inside the nucleus.\n- Step 2: It cannot be a proton because the proton has a charge of +1, not 0. It cannot be an electron because the electron has a negligible mass (approx $$\\frac{1}{2000}$$) and a charge of -1, whereas this particle has a mass of 1.\n\nNeutrons provide nuclear mass without adding charge.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Two atoms have the same number of protons but different numbers of neutrons. Are they the same element? Do they have the same chemical properties? Explain why. (3 steps)", "answer": "- Step 1: Yes, they are the same element. The number of protons (atomic number $$Z$$) uniquely defines the element's identity.\n- Step 2: They will have the same chemical properties because chemical reactions involve the exchange or sharing of outer electrons, which are determined by the proton count.\n- Step 3: Neutrons contribute to mass and nuclear stability but do not affect the electron cloud or the electromagnetic interactions that govern chemistry. These atoms are isotopes of the same element.\n\nIsotopes share chemistry but differ in nuclear physics.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "An atom is represented as $$^{23}_{11}Na$$. How many neutrons are in its nucleus, and why can't this number just be read off the bottom left? (2 steps)", "answer": "- Step 1: The number of neutrons $$N$$ is found by subtracting the atomic number (protons, bottom left) from the mass number (nucleons, top left): $$N = A - Z = 23 - 11 = 12$$.\n- Step 2: The bottom left number is the atomic number $$Z$$, which only counts protons. Since neutrons have no charge but do have mass, they contribute to the top number (mass number) but not the bottom number (charge number).\n\nThe top number is total mass; the bottom is just charge.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "An electron in an atom drops from a higher energy level to a lower energy level. What is emitted, and how is its energy determined? (2 steps)", "answer": "- Step 1: An electromagnetic radiation photon is emitted as the electron loses energy and falls inward.\n- Step 2: The energy of the emitted photon is exactly equal to the difference in energy between the two levels ($$E_{photon} = E_{higher} - E_{lower}$$). If the gap is large, a high-frequency (e.g., ultraviolet) photon is emitted; if small, a low-frequency (e.g., infrared) photon is emitted.\n\nPhotons bridge the exact energy gap between shells.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "When a nucleus undergoes alpha decay, how do its mass number ($$A$$) and atomic number ($$Z$$) change, and why? (3 steps)", "answer": "- Step 1: An alpha particle is identical to a helium nucleus, consisting of 2 protons and 2 neutrons, represented as $$^{4}_{2}\\alpha$$.\n- Step 2: Because the parent nucleus loses 2 protons, the atomic number $$Z$$ decreases by 2. This means the element transmutates into a different element two places to the left on the periodic table.\n- Step 3: Because the parent nucleus loses 4 nucleons in total (2 protons + 2 neutrons), the mass number $$A$$ decreases by 4.\n\nAlpha decay sheds 2 protons and 2 neutrons.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "During beta-minus decay, the mass number ($$A$$) of the nucleus stays the same, but the atomic number ($$Z$$) increases by 1. Explain the internal nuclear process that causes this. (3 steps)", "answer": "- Step 1: In beta-minus decay, a neutron inside the nucleus is unstable and converts into a proton.\n- Step 2: To conserve charge and lepton number, this conversion also creates an electron (the beta-minus particle) and an antineutrino, which are ejected from the nucleus.\n- Step 3: Since a neutron (mass 1, charge 0) became a proton (mass 1, charge +1), the total number of nucleons remains the same ($$A$$ unchanged), but the total positive charge increases by 1 ($$Z$$ increases by 1).\n\nA neutron turns into a proton, ejecting an electron.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "How does beta-plus decay differ from beta-minus decay in terms of the particle emitted and the change in atomic number ($$Z$$)? (2 steps)", "answer": "- Step 1: In beta-plus decay, a proton converts into a neutron, emitting a positron (the beta-plus particle, charge +1, negligible mass) and a neutrino.\n- Step 2: Because a proton is lost and a neutron is gained, the mass number $$A$$ remains unchanged, but the atomic number $$Z$$ *decreases* by 1. (Contrast with beta-minus, where a neutron becomes a proton and $$Z$$ increases by 1).\n\nBeta-plus ejects a positron and lowers the atomic number.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Why is alpha radiation highly ionising but poorly penetrating, while gamma radiation is poorly ionising but highly penetrating? (3 steps)", "answer": "- Step 1: Alpha particles have a large mass and a +2 charge, meaning they strongly interact with atomic electrons, pulling them off atoms over a very short distance. This dumps energy quickly (high ionisation) and stops the alpha particle rapidly (low penetration).\n- Step 2: Gamma rays are uncharged, massless photons. They have a low probability of interacting with any given atom, so they travel vast distances without being stopped (high penetration).\n- Step 3: Because gamma rays interact infrequently, they leave relatively few ions per unit length of travel, making them weakly ionising compared to alpha.\n\nIonisation and penetration are inversely related for a given energy.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "If radioactive decay is a completely random process at the level of individual nuclei, how can we confidently predict the \"half-life\" of a sample? (2 steps)", "answer": "- Step 1: While we cannot predict *which* specific nucleus will decay or *when*, every unstable nucleus has an identical, constant probability of decaying per unit time.\n- Step 2: In a macroscopic sample containing trillions of nuclei, statistical averages become extremely precise. The half-life is the time for half of these nuclei to decay, which emerges as a perfectly reproducible constant from these large-scale probability statistics.\n\nRandom individual events yield predictable statistical averages.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "A sample has a half-life of 2 hours. If the initial activity is 800 Bq, what is the activity after 6 hours? (3 steps)", "answer": "- Step 1: Determine the number of half-lives that have passed: 6 hours / 2 hours per half-life = 3 half-lives.\n- Step 2: Halve the activity three times:\n+ After 1st half-life (2 hrs): 800 / 2 = 400 Bq\n+ After 2nd half-life (4 hrs): 400 / 2 = 200 Bq\n+ After 3rd half-life (6 hrs): 200 / 2 = 100 Bq\n- Step 3: The activity after 6 hours is 100 Bq. (Notice that activity never reaches zero, it just keeps halving).\n\nActivity decays exponentially, halving every half-life.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Before measuring the activity of a radioactive source in a lab, you take a reading with the source removed. Why is this essential, and what is the reading called? (2 steps)", "answer": "- Step 1: The reading is called the background count rate. It measures the ever-present radiation from natural sources (like radon gas and cosmic rays) and artificial sources.\n- Step 2: It is essential because the GM tube detects all radiation hitting it. To find the activity *only* from your source, you must subtract this background count from your total measured count (Corrected count = Measured count - Background count).\n\nAlways subtract background to isolate the source's true count.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "A medical worker stands next to a gamma source for a procedure, then walks away. Another worker accidentally gets radioactive dust on their hands. Which one is irradiated and which is contaminated, and who continues to receive a dose after the incident? (3 steps)", "answer": "- Step 1: The first worker is *irradiated*—exposed to radiation from an external source. Once they walk away, the exposure stops completely; they do not become radioactive themselves.\n- Step 2: The second worker is *contaminated*—radioactive material is physically on their skin.\n- Step 3: The contaminated worker continues to receive a radiation dose as long as the dust remains on them (or inside them), because the radioactive atoms themselves are emitting radiation continuously.\n\nIrradiation stops when the source is removed; contamination stays with you.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Why are gamma-emitting isotopes with short half-lives chosen as medical tracers, rather than alpha emitters with long half-lives? (3 steps)", "answer": "- Step 1: Gamma radiation is chosen because it is highly penetrating, allowing it to escape the patient's body and be detected by external cameras. Alpha would be absorbed internally and undetectable outside.\n- Step 2: A short half-life is chosen so the radioactivity inside the patient decreases rapidly, minimising the radiation dose and risk of tissue damage once the diagnostic image is taken.\n- Step 3: An alpha emitter inside the body would be highly ionising and cause significant local tissue damage, making it dangerously unsuitable for a tracer.\n\nTracers must escape the body (gamma) and clear quickly (short half-life).", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "In radiotherapy, high-energy gamma or X-ray beams are often rotated around the patient, intersecting at the tumour. Why is this rotational technique used instead of a single, static beam? (2 steps)", "answer": "- Step 1: A static beam would deposit its maximum dose at the skin and underlying healthy tissue on its way to the tumour, causing unacceptable collateral damage.\n- Step 2: By rotating the beam, the dose to healthy tissue is spread thinly over a large volume, but the tumour (at the intersection point of all beams) receives the cumulative, concentrated dose needed to destroy the cancer cells.\n\nRotation minimises healthy tissue damage while maximising tumour dose.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "How does a PET scan use the physics of positrons to locate a tracer in the body, and why are two detectors needed simultaneously? (3 steps)", "answer": "- Step 1: A positron-emitting tracer is introduced. When a positron meets an electron in the body, they annihilate each other (matter-antimatter destruction).\n- Step 2: This annihilation converts their combined mass into energy, producing two gamma photons that travel in exactly opposite directions (180 degrees apart).\n- Step 3: Two detectors on opposite sides of the body must register these gamma photons at the exact same time (in coincidence). The line connecting the two detectors passes through the annihilation point, allowing a computer to pinpoint the tracer's location in 3D.\n\nPositron annihilation creates back-to-back gamma rays for precise 3D localisation.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Why is an alpha emitter (like Americium-241) used in a smoke detector, rather than a beta or gamma emitter? (3 steps)", "answer": "- Step 1: Alpha radiation is highly ionising, meaning it easily ionises the air in the detector chamber, creating a small electric current.\n- Step 2: Alpha has a very short range (a few cm in air). This means the radiation stays safely inside the detector and doesn't escape to irradiate people in the room.\n- Step 3: When smoke enters, the smoke particles absorb the alpha ions, reducing the current and triggering the alarm. Beta or gamma would be too penetrating (not absorbed by smoke) and would pass through the plastic casing, posing a hazard.\n\nAlpha ionises air effectively but is safely contained by the detector casing.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "In a factory manufacturing aluminium foil, beta radiation is passed through the foil to a detector. Why is beta ideal for this, rather than alpha or gamma? (3 steps)", "answer": "- Step 1: Alpha is too easily absorbed; it would be completely stopped even by thin foil, so it couldn't measure varying thicknesses.\n- Step 2: Gamma is too penetrating; it would pass through the foil almost unaffected, making it insensitive to small changes in thickness.\n- Step 3: Beta has moderate penetration. It is partially absorbed by the foil. If the foil gets thicker, more beta is absorbed and the detector count drops; if thinner, the count rises. This provides a sensitive, real-time feedback signal to control the rollers.\n\nBeta's moderate penetration makes it sensitive to small thickness changes.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "Why does Uranium-235 require a neutron to initiate fission, and what is the critical feature of the neutrons released afterwards? (3 steps)", "answer": "- Step 1: A neutron is absorbed by the U-235 nucleus, forming a highly unstable U-236 nucleus. This extra mass/energy causes the nucleus to vibrate violently and split apart (fission).\n- Step 2: The split releases 2-3 new, fast-moving neutrons.\n- Step 3: These released neutrons are the critical feature because they can go on to be absorbed by other U-235 nuclei, causing them to fission in turn. This creates a self-sustaining chain reaction.\n\nFission requires a neutron to destabilise the nucleus; the released neutrons sustain the chain.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "In a nuclear reactor, what is the distinct difference in function between the *moderator* and the *control rods*? (3 steps)", "answer": "- Step 1: The *moderator* (e.g., water, graphite) slows down the fast neutrons produced by fission to thermal speeds.\n- Step 2: Slowing neutrons is necessary because U-235 has a much higher probability of absorbing slow (thermal) neutrons than fast ones, sustaining the chain reaction.\n- Step 3: The *control rods* (e.g., boron, cadmium) absorb neutrons entirely, removing them from the reactor. They are raised or lowered to control the reaction rate—pushed in to absorb more neutrons and slow the reaction down, pulled out to allow it to speed up.\n\nModerators slow neutrons; control rods remove them.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Why does nuclear fusion require extremely high temperatures and pressures, unlike fission? (3 steps)", "answer": "- Step 1: Both nuclei involved in fusion (e.g., hydrogen isotopes) are positively charged.\n- Step 2: Like charges repel each other with a strong electrostatic force (Coulomb barrier). To get close enough for the strong nuclear force to bind them together, they must overcome this repulsion.\n- Step 3: High temperature gives the nuclei immense kinetic energy to overcome the repulsion; high pressure forces them close enough together to increase the probability of collision and fusion.\n\nFusion demands extreme conditions to overcome electrostatic repulsion between nuclei.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "During both fission and fusion, the total mass of the products is slightly less than the total mass of the reactants. What happens to this \"lost\" mass? (2 steps)", "answer": "- Step 1: The lost mass is called the mass defect. It is not destroyed; it is converted into energy according to Einstein's mass-energy equivalence equation, $$E = mc^2$$.\n- Step 2: Because the speed of light $$c$$ is a huge number ($$3 \\times 10^8$$ m/s), squaring it makes $$c^2$$ enormous. Thus, even a tiny mass defect releases a massive amount of kinetic energy (carried by the products), which is why nuclear reactions yield millions of times more energy per kg than chemical ones.\n\nLost mass transforms into vast amounts of energy via $$E=mc^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Why must high-level nuclear waste from fission reactors be stored deep underground for thousands of years, unlike ordinary industrial waste? (2 steps)", "answer": "- Step 1: The fission products (daughter nuclei) are often highly radioactive isotopes with very long half-lives, meaning they will continue to emit dangerous ionising radiation for millennia.\n- Step 2: This radiation can cause severe biological damage (mutations, cancer) if it leaks into the biosphere. Deep geological isolation in shielded containers ensures the radiation is absorbed by rock and cannot reach groundwater or the surface.\n\nLong half-lives require long-term geological isolation to protect the biosphere.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": true}, {"question": "Both fission of heavy nuclei and fusion of light nuclei release energy. Conceptually, why do both processes move toward lower mass per nucleon? (3 steps)", "answer": "- Step 1: The binding energy per nucleon (a measure of nuclear stability) peaks around iron (Fe-56). Nuclei near iron have the lowest mass per nucleon.\n- Step 2: For nuclei lighter than iron, fusion moves them up the curve toward iron, increasing their binding energy per nucleon and releasing energy.\n- Step 3: For nuclei heavier than iron, fission splits them into smaller nuclei that are also closer to iron, similarly increasing their binding energy per nucleon and releasing energy. Both processes slide \"downhill\" toward the most stable element.\n\nBoth processes increase stability by moving nuclei toward the peak of the binding energy curve.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "A source has an activity of 10,000 Bq, but a GM tube next to it only reads 100 counts per second. Why is the count rate so much lower than the activity? (2 steps)", "answer": "- Step 1: Activity is the total number of decays happening in the entire source in all directions (1 Bq = 1 decay per second).\n- Step 2: Count rate is only the number of emissions that actually hit the detector. Most radiation misses the GM tube entirely, some is absorbed by the air, and the detector is not 100% efficient. Thus, count rate is always a fraction of the true activity.\n\nCount rate is a subset of total activity due to geometry and absorption.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "A positron and a proton both have a positive charge (+1). Why can't a positron be classified as a proton? (2 steps)", "answer": "- Step 1: Their masses are vastly different. A proton has a relative mass of 1 (found in the nucleus), while a positron is the antiparticle of the electron and has a negligible relative mass (approx $$\\frac{1}{2000}$$).\n- Step 2: Their locations and roles differ. Protons are stable nucleons that define the element; positrons are created temporarily in beta-plus decay and annihilate almost instantly upon meeting an electron.\n\nMass and stability distinguish protons from positrons.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "Rutherford's nuclear model showed a dense nucleus with orbiting electrons, but it had a fatal physical flaw. What did Bohr add to fix this, and what experimental evidence supported Bohr's addition? (3 steps)", "answer": "- Step 1: The flaw was that classical physics dictates an orbiting electron should continuously emit electromagnetic radiation, lose energy, and spiral into the nucleus. Atoms are clearly stable.\n- Step 2: Bohr added the constraint that electrons can only orbit in discrete, fixed energy levels (shells) where they do NOT radiate energy.\n- Step 3: Bohr's model was supported by the observation of line spectra—atoms only emit/absorb photons at specific, discrete frequencies, which perfectly matches electrons jumping between these fixed energy levels.\n\nBohr quantised electron orbits, explaining atomic stability and line spectra.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": true}, {"question": "How does ionising radiation ultimately lead to DNA mutations and potential cancer in human tissue? (3 steps)", "answer": "- Step 1: Ionising radiation (alpha, beta, gamma) carries enough energy to strip electrons from atoms in biological tissue, turning them into ions and breaking chemical bonds.\n- Step 2: If this ionisation occurs within a DNA molecule, it can break the DNA strands or alter the base sequence.\n- Step 3: When the cell attempts to repair or replicate this damaged DNA, it may do so incorrectly, resulting in a mutation. If the mutation affects genes controlling cell division, it can lead to uncontrolled replication (cancer).\n\nIonisation breaks bonds, damages DNA, and causes erroneous cell replication.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "Uranium-238 ($$^{238}_{92}U$$) emits an alpha particle. What are the mass number and atomic number of the daughter nucleus? (2 steps)", "answer": "- Step 1: Alpha particle is $$^{4}_{2}\\alpha$$. Conservation of mass means $$A_{daughter} = 238 - 4 = 234$$.\n- Step 2: Conservation of charge means $$Z_{daughter} = 92 - 2 = 90$$. The daughter is $$^{234}_{90}Th$$.\n\nSubtract 4 from the top and 2 from the bottom.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "Why is gamma radiation used to sterilise medical equipment, and why does this process not make the equipment radioactive? (2 steps)", "answer": "- Step 1: Gamma rays are highly penetrating, allowing them to pass through sealed packaging and reach all surfaces of the equipment, killing microbes by breaking their DNA.\n- Step 2: The equipment does not become radioactive because irradiation only passes energy through the material. To become radioactive, nuclei must capture neutrons and change identity, which gamma irradiation does not induce in typical materials.\n\nGamma penetrates deeply to kill microbes without inducing radioactivity in the target.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Why is radon gas specifically highlighted as a dangerous source of background radiation in buildings, compared to cosmic rays? (3 steps)", "answer": "- Step 1: Radon is an alpha emitter. While alpha is weakly penetrating, it is highly ionising, making it very dangerous if inhaled directly into the lungs.\n- Step 2: Radon is a gas produced by the decay of uranium in underground rocks, so it seeps out of the ground and accumulates inside enclosed buildings.\n- Step 3: Cosmic rays are mostly absorbed by the atmosphere and come from above, so they don't accumulate indoors. Radon's indoor accumulation and internal alpha hazard make it the largest natural background dose for many people.\n\nInhaled alpha-emitting gas accumulates indoors, posing a severe internal hazard.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "In a nuclear reactor, why is the coolant necessary, and why is water often used as both the coolant and the moderator in Pressurised Water Reactors (PWRs)? (2 steps)", "answer": "- Step 1: The coolant is necessary to carry the immense thermal energy produced by fission away from the reactor core to a heat exchanger, where it boils water to drive turbines. Without it, the core would melt down.\n- Step 2: Water is excellent at both absorbing thermal energy (coolant) and slowing down neutrons via elastic collisions (moderator). Using one material for both jobs simplifies the reactor design.\n\nWater efficiently transfers heat and moderates neutrons simultaneously.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}], "count": 33}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "If an atom were scaled up so that its nucleus was the size of a marble (1 cm in diameter), roughly how far away would the outermost electrons be, and what does this imply about the structure of the atom? (3 steps)", "answer": "- Step 1: Recall the size ratio. The atom's radius ($$ \\approx 1 \\times 10^{-10} $$ m) is about 10,000 times larger than the nucleus's radius ($$ \\approx 1 \\times 10^{-14} $$ m).\n- Step 2: Apply the scaling. If the nucleus is 1 cm, the atom's radius is $$ 1 \\text{ cm} \\times 10,000 = 10,000 \\text{ cm} = 100 $$ metres. That is roughly the length of a football pitch.\n- Step 3: Conclusion. This means the atom is overwhelmingly empty space; the electrons orbit at a vast distance relative to the tiny, dense central nucleus.\n\nTakeaway: Atoms are mostly vacuum—solid matter is an illusion created by electromagnetic forces.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "In Rutherford's alpha scattering experiment, a tiny fraction of alpha particles bounced back towards the source. What specific conclusion did this \"back-scattering\" allow about the structure of the atom, and why couldn't the plum pudding model explain it? (3 steps)", "answer": "- Step 1: Consider the momentum of an alpha particle. An alpha has significant mass and a +2 charge. To make it reverse direction requires a massive repulsive force.\n- Step 2: Implication for the atom. The repulsion must come from a concentrated positive charge with most of the atom's mass, because a diffuse charge (like", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}], "count": 2}, "qwen_1": {"label": "Qwen 3 235B ①", "cards": [{"question": "Describe the structure of an atom, including the location, charge, and relative mass of protons, neutrons, and electrons. (3 steps)", "answer": "- Step 1: **Protons** are positively charged particles in the nucleus with a relative mass of 1. The number of protons (atomic number Z) defines the element.  \n- Step 2: **Neutrons** are neutral particles in the nucleus with a relative mass of 1. They contribute to mass and nuclear stability but not elemental identity.  \n+ Example: Carbon-12 has 6 protons and 6 neutrons; Carbon-14 has 6 protons and 8 neutrons.  \n- Step 3: **Electrons** are negatively charged particles orbiting the nucleus in discrete energy levels. They have negligible mass (~1/2000) and determine chemical properties.  \n+ Example: A neutral oxygen atom has 8 electrons balancing 8 protons.  \n\n**Takeaway:** The nucleus (protons + neutrons) contains most of the mass, while electrons occupy empty space in quantized shells.", "source": "Qwen 3 235B ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is the nuclear model of the atom (Rutherford) superior to the plum pudding model? (3 steps)", "answer": "- Step 1: Rutherford’s alpha scattering experiment revealed a **dense, positively charged nucleus** where most mass is concentrated, contradicting Thomson’s diffuse model.  \n+ Sub-case: Most alphas passed through gold foil (atom is mostly empty space), but some deflected sharply (concentrated positive charge).  \n- Step 2: The **plum pudding model** incorrectly assumed electrons are embedded in a uniform positive charge, unable to explain large-angle scattering.  \n- Step 3: The nuclear model explains why atoms are mostly empty space and how electrons orbit a central nucleus, later refined by Bohr’s energy levels.  \n\n**Takeaway:** Rutherford’s model introduced the concept of a nucleus, a paradigm shift in understanding atomic structure.", "source": "Qwen 3 235B ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How do isotopes of an element differ in terms of stability and nuclear notation? (3 steps)", "answer": "- Step 1: **Isotopes** have the same atomic number Z (protons) but different neutron counts and mass numbers A.  \n+ Example: Carbon-12 ($^{12}_{6}\\text{C}$) vs. Carbon-14 ($^{14}_{6}\\text{C}$).  \n- Step 2: **Stability** depends on the neutron-to-proton ratio. Lighter elements prefer 1:1, while heavier ones require more neutrons for balance.  \n+ Sub-case: Carbon-12 is stable; Carbon-14 is radioactive (decays via β⁻).  \n- Step 3: Nuclear notation ($^{A}_{Z}X$) explicitly shows protons (Z) and nucleons (A), allowing calculation of neutrons (N = A - Z).  \n\n**Takeaway:** Isotopes share chemical properties but vary in nuclear stability due to neutron count differences.", "source": "Qwen 3 235B ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Explain how an atom becomes an ion, and contrast it with nuclear transformation. (2 steps)", "answer": "- Step 1: **Ionization** involves gaining/losing electrons (e.g., Na → Na⁺ + e⁻), altering charge but not elemental identity.  \n+ Example: Sodium loses an electron to form a +1 ion; remains sodium (Z unchanged).  \n- Step 2: **Nuclear transformation** (radioactive decay) changes the nucleus (Z and/or A), producing a new element.  \n+ Example: Uranium-238 ($^{238}_{92}\\text{U}$) decays to Thorium-234 ($^{234}_{90}\\text{Th}$) via alpha emission.  \n\n**Takeaway:** Ionization affects only electrons; nuclear decay alters the nucleus itself.", "source": "Qwen 3 235B ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why is alpha radiation more ionizing but less penetrating than gamma rays? (3 steps)", "answer": "- Step 1: **Alpha particles** (helium nuclei, +2 charge) have high mass (4 amu) and strong electric field, stripping electrons vigorously.  \n+ Example: Ionizes ~10,000 atoms per cm in air.  \n- Step 2: **Gamma rays** are massless, chargeless photons with high energy but weak ionization. Interaction requires Compton scattering or pair production.  \n- Step 3: **Penetration** depends on interaction strength: Alphas stop after short distance (paper), gammas pass through dense materials (cm of lead).  \n\n**Takeaway:** Ionization power and penetration are inversely related; alphas deposit energy densely but gammas travel far.", "source": "Qwen 3 235B ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How does a beta-minus decay transform a nucleus? Write the nuclear equation. (3 steps)", "answer": "- Step 1: A neutron converts to a proton via weak nuclear force, emitting a β⁻ (electron) and antineutrino.  \n- Step 2: The **daughter nucleus** gains +1 in atomic number (Z+1) but keeps mass number (A).  \n- Step 3: Equation: $^{A}_{Z}X \\rightarrow {}^{A}_{Z+1}Y + {}^{0}_{-1}\\beta^- + \\bar{\\nu}_e$  \n+ Example: Carbon-14 ($^{14}_{6}\\text{C}$) decays to Nitrogen-14 ($^{14}_{7}\\text{N}$) via β⁻.  \n\n**Takeaway:** Beta decay increases proton count, changing the element.", "source": "Qwen 3 235B ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why does the activity of a radioactive sample decrease over time, and what is half-life? (3 steps)", "answer": "- Step 1: **Activity (A)** is the number of decays per second (Bq). As unstable nuclei decay, fewer remain to decay, so A decreases exponentially.  \n- Step 2: **Half-life $t_{1/2}$** is the time for half the remaining nuclei (or activity) to decay. It’s constant for a given isotope.  \n+ Example: 1000 Bq → 500 Bq after 1 half-life; 250 Bq after 2.  \n- Step 3: The decay curve never reaches zero but becomes negligible after ~10 half-lives.  \n\n**Takeaway:** Half-life governs the rate of decay statistically, regardless of sample size.", "source": "Qwen 3 235B ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Contrast contamination and irradiation. Why is contamination more hazardous? (2 steps)", "answer": "- Step 1: **Contamination** involves radioactive material physically present on/in a person (e.g., dust on skin). It emits radiation continuously until removed.  \n- Step 2: **Irradiation** is exposure to radiation (e.g., X-rays), which stops when the source is removed. The person doesn’t become radioactive.  \n+ Example: Smoke detector (alpha source) is safe unless the americium leaks (contamination).  \n\n**Takeaway:** Contamination creates a persistent internal hazard; irradiation is a temporary external exposure.", "source": "Qwen 3 235B ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How does a nuclear fission chain reaction work in uranium-235? (4 steps)", "answer": "- Step 1: A **thermal neutron** (slow) is absorbed by U-235, forming unstable U-236.  \n- Step 2: U-236 undergoes fission, splitting into two smaller nuclei (e.g., Kr-92 and Ba-141), releasing 2–3 neutrons and energy.  \n- Step 3: Released neutrons strike other U-235 nuclei, sustaining the chain reaction.  \n- Step 4: **Criticality** occurs when 1 neutron per fission on average continues the reaction (steady power in reactors).  \n\n**Takeaway:** The chain reaction relies on neutron absorption and precise moderation to sustain controlled energy release.", "source": "Qwen 3 235B ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why is nuclear fusion more energetic per kilogram than fission, and why doesn’t it occur spontaneously on Earth? (3 steps)", "answer": "- Step 1: **Fusion** combines light nuclei (e.g., deuterium + tritium), releasing energy via mass defect (E=mc²). The binding energy per nucleon is higher for intermediate-mass nuclei (like He-4).  \n- Step 2: **Fission** releases energy by splitting heavy nuclei (e.g., U-235), but the per-nucleon energy gain is smaller.  \n- Step 3: Fusion requires extreme temperatures (100 MK) and pressures to overcome electrostatic repulsion (Coulomb barrier), found only in stars or reactors.  \n\n**Takeaway:** Fusion maximizes binding energy per nucleon but demands stellar conditions for initiation.", "source": "Qwen 3 235B ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 235B ②", "cards": [{"question": "Why does the nucleus occupy such a tiny fraction of the atom's volume yet contain almost all its mass? (3 steps)", "answer": "- Step 1: **Atomic structure basics**  \nThe atom consists of a central nucleus (protons + neutrons) surrounded by electrons in orbitals. Electrons have negligible mass (≈1/2000th of a proton) but occupy vastly more space due to their quantum mechanical wave-like behavior.  \n- Step 2: **Mass distribution**  \nProtons and neutrons (nucleons) have almost identical mass (~1 atomic mass unit each), so the nucleus contains 99.97%+ of the atom's mass.  \n- Step 3: **Size paradox**  \nDespite dominating mass, the nucleus is ~100,000× smaller in radius than the atom because nucleons are densely packed (density ≈2×10¹⁷ kg/m³), while electron orbitals define the atom's expansive volume.  \n\n+ Electrons occupy \"probability clouds\" with large spatial extent  \n+ Nuclear forces bind nucleons tightly, unlike the weaker electromagnetic forces governing electron orbitals", "source": "Qwen 3 235B ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How does beta-minus decay transform a nucleus, and why doesn't this process occur in isolation? (4 steps)", "answer": "- Step 1: **Neutron conversion**  \nA neutron converts into a proton via the weak nuclear force: $ n \\rightarrow p^+ + e^- + \\bar{\\nu}_e $ (emits beta-minus particle, antineutrino).  \n- Step 2: **Nuclear changes**  \nAtomic number $ Z $ increases by 1 (new element), mass number $ A $ remains same. Example: Carbon-14 → Nitrogen-14 + β⁻  \n- Step 3: **Energy requirement**  \nFree neutrons (outside nucleus) are unstable (half-life ~10 mins), but in nuclei, neutron decay requires energy balance—only occurs in neutron-rich isotopes.  \n- Step 4: **Conservation laws**  \nAntineutrino emission ensures lepton number conservation. Without it, decay would violate quantum mechanical rules.  \n\n+ Beta-minus decay often follows neutron capture in reactors  \n+ Daughter nucleus may emit gamma rays to reach ground state", "source": "Qwen 3 235B ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why is gamma radiation the most penetrating but least ionizing? (3 steps)", "answer": "- Step 1: **Nature of gamma rays**  \nGamma radiation is high-energy EM photons (no charge/mass), interacting minimally with matter—unlike charged particles (α/β) that lose energy rapidly via ionization.  \n- Step 2: **Penetration mechanism**  \nGamma photons are absorbed probabilistically via three effects:  \n+ Photoelectric effect (dominant at low energies)  \n+ Compton scattering (mid-energies)  \n+ Pair production (>1.02 MeV)  \nRequires thick shielding (lead/concrete) to reduce intensity exponentially.  \n- Step 3: **Ionization inefficiency**  \nSince photons carry no charge, they don't directly ionize atoms. Secondary electrons (via Compton/photoelectric effects) cause limited ionization per interaction.  \n\n+ Gamma often follows α/β decay to release nuclear energy excess  \n+ Penetration power inversely correlates with ionization density—key safety consideration", "source": "Qwen 3 235B ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How does the half-life concept reconcile randomness at the nucleus level with predictability in measurements? (4 steps)", "answer": "- Step 1: **Quantum randomness**  \nIndividual nuclei decay randomly—no physical trigger, only probability per unit time. Even identical nuclei have unpredictable decay times.  \n- Step 2: **Statistical regularity**  \nWith ~10²² nuclei in a sample, random fluctuations average out. Half-life ($t_{1/2}$) becomes a precise statistical measure: time for 50% decay.  \n- Step 3: **Exponential decay formula**  \n$ N(t) = N_0 e^{-\\lambda t} $, where $ \\lambda = \\ln(2)/t_{1/2} $. Predictable bulk behavior emerges from random individual events.  \n- Step 4: **Measurement implications**  \nActivity (decays/sec) decreases exponentially, but half-life remains constant regardless of sample size or environmental conditions.  \n\n+ Example: Carbon-14 dating uses known $t_{1/2}$ (5730 yrs) to clock decay ratios in organic matter  \n+ Short-lived isotopes (e.g., Tc-99m, $t_{1/2}$=6hrs) decay rapidly, minimizing patient dose in medical scans", "source": "Qwen 3 235B ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why do control rods in nuclear reactors need neutron-absorbing materials like boron? (3 steps)", "answer": "- Step 1: **Neutron economy**  \nFission releases 2–3 neutrons per U-235 split. Uncontrolled chain reactions (e.g., bombs) require 1+ neutrons per fission to sustain; reactors maintain criticality (1 neutron → 1 fission).  \n- Step 2: **Role of control rods**  \nAbsorbing excess neutrons prevents supercriticality (increasing reaction rate). Lowering rods increases absorption, reducing fission rate; raising allows more neutrons to induce fission.  \n- Step 3: **Contrast with moderator**  \nModerator (water/graphite) slows neutrons to thermal speeds for efficient U-235 capture. Control rods *remove* neutrons, not slow them.  \n\n+ Emergency \"scram\" rods drop rapidly to absorb all neutrons and halt the reaction  \n+ Boron/neodymium chosen for high thermal neutron absorption cross-section", "source": "Qwen 3 235B ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why is nuclear fusion both more energy-dense and potentially cleaner than fission, yet harder to achieve? (4 steps)", "answer": "- Step 1: **Energy per unit mass**  \nFusion of light nuclei (H isotopes → He) releases ~24 MeV per reaction vs. ~200 MeV per fission (U-235). However, hydrogen's low mass means fusion delivers **~4× more energy per kg** than fission.  \n- Step 2: **Fuel abundance**  \nDeuterium (oceans) and lithium (crust) for tritium breeding are abundant; fission relies on rare U-235.  \n- Step 3: **Waste challenges**  \nFusion produces helium (non-radioactive) and neutron-activated reactor walls (short-lived isotopes). Fission generates long-lived radioactive waste from split products.  \n- Step 4: **Technical barriers**  \nRequires 100+ million K temperatures to overcome Coulomb repulsion (plasma state). Confinement via magnetic (tokamaks) or inertial (laser) methods remains unproven at commercial scale.  \n\n+ Sun uses gravitational confinement—unavailable on Earth  \n+ Fusion breakeven (Q=1) achieved in lab settings (e.g., JET 1997: Q≈0.7) but sustained net gain remains elusive", "source": "Qwen 3 235B ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "How do smoke detectors exploit both the ionizing power and short range of alpha particles? (3 steps)", "answer": "- Step 1: **Ionization chamber**  \nAm-241 emits alpha particles that ionize air molecules in a chamber: N₂/O₂ → N₂⁺/O₂⁺ + e⁻, creating a small measurable current.  \n- Step 2: **Smoke disruption**  \nSmoke particles (combustion products) attach to ions, reducing current flow. This drop triggers the alarm.  \n- Step 3: **Alpha's advantages**  \n+ High ionization density ensures reliable current  \n+ Short range (5 cm in air) keeps radiation confined to chamber  \n+ Alpha can't penetrate detector walls—no external hazard  \n\n+ Beta/gamma would pass through smoke and chamber without significant interaction  \n+ Americium's 432-year half-life ensures detector longevity (10–20 years)", "source": "Qwen 3 235B ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why does background radiation subtraction matter for accurate radiation measurements? (3 steps)", "answer": "- Step 1: **Ubiquitous radiation**  \nNatural sources (radon, cosmic rays, rocks) and artificial sources (medical, fallout) contribute ~3 mSv/year globally. Detectors always register these counts.  \n- Step 2: **Net activity calculation**  \nCorrected count rate: $ C_{\\text{corr}} = C_{\\text{measured}} - C_{\\text{background}} $. Without this, low-activity samples could be obscured by background noise.  \n- Step 3: **Experimental impact**  \nExample: A sample reading 120 cps with background 20 cps has true activity 100 cps. Ignoring subtraction could lead to 20% error.  \n\n+ Radon contributes ~50% of background in many regions  \n+ Long-duration measurements (hours) improve statistical accuracy for low sources", "source": "Qwen 3 235B ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Explain how PET scans rely on beta-plus decay and gamma detection. (3 steps)", "answer": "- Step 1: **Positron emission**  \nRadionuclide (e.g., Fluorine-18) decays via β⁺ emission: $ ^{18}_9F \\rightarrow ^{18}_8O + ^0_{+1}β^+ + \\nu_e $. Positron annihilates with electron.  \n- Step 2: **Gamma photon production**  \nAnnihilation: $ β^+ + e^- \\rightarrow 2\\gamma $ photons (511 keV each) moving in opposite directions.  \n- Step 3: **Coincidence detection**  \nDetectors register both photons simultaneously, triangulating the decay origin. 3D images map metabolic activity (e.g., cancer glucose uptake).  \n\n+ Fluorodeoxyglucose (FDG) tracer accumulates in glucose-hungry tumor cells  \n+ Gamma's penetration allows external detectors—no need to insert probes", "source": "Qwen 3 235B ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why do nuclear reactors use water as both moderator and coolant, but fusion reactors avoid this combination? (4 steps)", "answer": "- Step 1: **Fission reactor design**  \nPressurized Water Reactors (PWRs):  \n+ Moderator (slows neutrons) and coolant (transfers heat) in one system  \n+ Water's hydrogen nuclei (protons) efficiently slow neutrons via elastic collisions  \n- Step 2: **Fission-water synergy**  \nThermal neutron spectrum matches U-235's resonance—ideal for sustained chain reactions  \n- Step 3: **Fusion challenges**  \nHydrogen isotopes require temperatures >10⁸ K (10x hotter than core of Sun). Water would dissociate/absorb neutrons, and hydrogen is a neutron poison.  \n- Step 4: **Fusion alternatives**  \nMagnetic confinement (tokamaks) or liquid lithium blankets for neutron capture/blanket breeding. Water used only in reactor shielding, not plasma zone.  \n\n+ PWR coolant at 325°C remains liquid due to high pressure (150 atm)  \n+ Fusion's fast neutrons (14 MeV) require advanced materials like helium-cooled beryllium", "source": "Qwen 3 235B ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax M1 ①", "cards": [{"question": "If an atom has 6 protons and 8 neutrons, how would you write its nuclear notation, and what is its mass number? (2 steps)", "answer": "- Step 1: The atomic number (Z) is the number of protons = 6, which identifies the element as carbon (C).\n- Step 2: The mass number (A) is protons + neutrons = 6 + 8 = 14. The nuclear notation is $^{14}_{6}\\text{C}$, and this carbon isotope is called carbon-14.", "source": "MiniMax M1 ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What is the key difference between isotopes of the same element, and why do some isotopes undergo radioactive decay while others are stable? (3 steps)", "answer": "- Step 1: Isotopes are atoms of the same element (same atomic number Z) but with different numbers of neutrons, giving them different mass numbers (A). For example, carbon-12 ($^{12}_{6}\\text{C}$) has 6 neutrons, carbon-14 has 8 neutrons.\n- Step 2: The stability of a nucleus depends on the balance between the strong nuclear force (which binds nucleons together) and the electrostatic repulsion between protons. Too many or too few neutrons relative to protons creates an unstable nucleus.\n+ Stable isotopes have the \"right\" neutron-to-proton ratio for their size\n+ Unstable isotopes have excess energy and will decay to reach a more stable configuration\n- Step 3: There is no stable isotope above atomic number 83 (bismuth), so all heavier elements are radioactive.", "source": "MiniMax M1 ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Why do alpha particles have such strong ionising power but very weak penetrating power? (3 steps)", "answer": "- Step 1: Alpha particles are helium nuclei: 2 protons + 2 neutrons, giving them a charge of +2 and relatively large mass. This means they strongly attract and can knock electrons out of atoms (high ionising power).\n- Step 2: However, because they are heavy and doubly charged, they interact intensely with matter and lose energy quickly. They can only travel a few centimetres in air before being stopped — they cannot penetrate even a sheet of paper.\n+ The same property that makes them good ionisers (large charge, large mass) also makes them poor penetrators\n+ They dump all their energy in a short distance because they collide frequently with atoms\n- Step 3: This is why alpha radiation is dangerous inside the body (from inhaled or ingested alpha emitters like radon) but easily blocked outside.", "source": "MiniMax M1 ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "In beta-minus decay, a neutron in the nucleus turns into a proton. Explain how this happens and why the emitted particle is an electron (not from the electron shells). (3 steps)", "answer": "- Step 1: Inside the nucleus, a neutron can convert into a proton by emitting an electron (the beta particle). This is represented: $n \\rightarrow p + e^-$.\n- Step 2: The key point is that this electron is created at the moment of decay — it did not previously exist in the atom's electron shells. It is created from the conversion of a down quark to an up quark (though at GCSE level, we simply say a neutron becomes a proton + electron).\n+ The electron is ejected from the nucleus at high speed\n+ The daughter nucleus has one more proton (Z increases by 1) but the same mass number (A unchanged)\n- Step 3: This is why beta-minus decay transmutes one element into the next element up the periodic table, e.g., carbon-14 ($^{14}_{6}\\text{C}$) → nitrogen-14 ($^{14}_{7}\\text{N}$) + electron.", "source": "MiniMax M1 ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Why is gamma radiation emitted after alpha or beta decay, and what does it tell us about the state of the daughter nucleus? (2 steps)", "answer": "- Step 1: After alpha or beta decay, the daughter nucleus is often left in an excited state — it has excess energy because the rearrangement of nucleons didn't leave it in the most stable configuration.\n- Step 2: To shed this excess energy and reach a stable (ground) state, the nucleus emits a gamma ray — a high-energy photon. Gamma emission does not change the mass number or atomic number; it simply releases energy.\n+ Think of gamma decay as the nucleus \"cooling down\" after the violent alpha or beta transformation\n+ Gamma rays have no mass and no charge, so they penetrate deeply but ionise weakly", "source": "MiniMax M1 ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A radioactive source is measured to have a count rate of 320 counts per second. The background count rate is measured as 20 counts per second. What is the corrected count rate, and why must we subtract background radiation? (2 steps)", "answer": "- Step 1: The corrected count rate = measured count rate − background count rate = 320 − 20 = 300 counts per second.\n- Step 2: Background radiation comes from natural sources (radon gas, cosmic rays, rocks, food) and is always present. If we don't subtract it, we would attribute background emissions to our source, giving an artificially high reading.\n+ The GM tube detects ALL radiation hitting it, not just from our source\n+ Background varies with location and altitude, so it must be measured separately for each experiment", "source": "MiniMax M1 ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "What does it mean that radioactive decay is \"random but predictable\"? (3 steps)", "answer": "- Step 1: Random — for any individual unstable nucleus, we cannot predict when it will decay. Each nucleus has the same probability of decaying at any moment, and the exact timing for any single atom is completely unpredictable.\n- Step 2: Predictable — for a large collection of nuclei, the statistical behaviour is highly predictable. The half-life is a constant for each isotope, meaning after a fixed time, exactly half the remaining undecayed nuclei will have decayed.\n+ We can predict what happens to millions of nuclei, but not to any one nucleus\n+ This is like flipping a coin: you can't predict one flip, but over thousands of flips you know ~50% will be heads\n- Step 3: This is why half-life is defined for large samples and is independent of the starting amount.", "source": "MiniMax M1 ①", "_id": "minimax_1_6", "judge_pick": true}, {"question": "The half-life of carbon-14 is 5730 years. A sample has activity of 80 Bq initially. What would its activity be after 3 half-lives, and why doesn't the \"3 half-lives = all decayed\" misconception apply? (3 steps)", "answer": "- Step 1: After each half-life, activity halves: 80 → 40 → 20 → 10 Bq. After 3 half-lives, activity = 10 Bq.\n- Step 2: The misconception \"3 half-lives = all decayed\" is wrong because half-life only halves what's left, it never reaches zero mathematically (it approaches zero asymptotically). Each half-life period reduces the remaining activity by half, not to zero.\n+ After n half-lives: activity = initial × (1/2)^n\n+ After 10 half-lives, activity is still ~0.1% of original — not zero\n- Step 3: In practice, after about 10 half-lives the activity becomes indistinguishable from background radiation, but mathematically there are always a few nuclei left.", "source": "MiniMax M1 ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Why is the activity of a radioactive sample measured in becquerels (Bq) different from the count rate measured by a Geiger-Müller tube? (2 steps)", "answer": "- Step 1: Activity (in Bq) is the actual number of nuclei decaying per second in the source — it is a property of the source itself.\n- Step 2: Count rate (in counts per second, cps) is what the detector registers — it is always lower than the true activity because:\n+ Not all emissions travel toward the detector (they go in all directions)\n+ Some are absorbed by the source casing or air\n+ The detector has a finite detection efficiency (typically < 50%)\n+ So: count rate < activity, and you need calibration to relate them", "source": "MiniMax M1 ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Distinguish between irradiation and contamination, giving an example of each. Why is contamination particularly dangerous? (3 steps)", "answer": "- Step 1: Irradiation = exposing something to radiation from an external source. The radiation passes through but does not make the material radioactive. Example: medical equipment sterilised with gamma rays.\n- Step 2: Contamination = unwanted radioactive material physically present on or in a surface, person, or object. Example: radioactive dust on skin or clothing from a spill.\n+ Contaminated material continues to emit radiation directly next to you\n+ You cannot \"turn off\" contamination — the radioactive atoms are now part of your environment\n- Step 3: Contamination is particularly dangerous because the radioactive source is now inside or on your body, delivering radiation continuously to your tissues (alpha emitters inside are especially dangerous).", "source": "MiniMax M1 ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Why does a smoke detector use an alpha emitter (americium-241) rather than beta or gamma radiation? (3 steps)", "answer": "- Step 1: Alpha particles are highly ionising, so they can effectively ionise the air in the detector chamber, creating a small electric current.\n- Step 2: The alpha source is sealed and the particles cannot penetrate the casing — this keeps the radiation safely contained. If the smoke (particles) enters the chamber, they attach to the ions, disrupting the current and triggering the alarm.\n+ Alpha is ideal because it ionises strongly but cannot escape the detector\n+ Beta or gamma would be less effective at ionising the air, and gamma would be harder to contain safely\n- Step 3: The half-life of Am-241 is 432 years, so the source lasts the lifetime of the detector with minimal activity change.", "source": "MiniMax M1 ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In nuclear fission of uranium-235, what is a chain reaction, and why must it be carefully controlled in a nuclear reactor? (3 steps)", "answer": "- Step 1: When U-235 absorbs a neutron, it splits (fissions) into two smaller nuclei and releases 2–3 neutrons. These neutrons can go on to cause further fissions in nearby U-235 nuclei, creating a self-sustaining chain reaction.\n- Step 2: In a controlled reactor, the chain reaction proceeds at a steady, manageable rate. Control rods (made of boron or cadmium) absorb excess neutrons to keep exactly one neutron per fission causing another fission (critical state).\n+ If too few neutrons are absorbed → the reaction dies out (subcritical)\n+ If too many neutrons cause fissions → exponential growth leading to meltdown (supercritical)\n- Step 3: In an atomic bomb, the reaction is allowed to go supercritical intentionally, releasing energy catastrophically fast.", "source": "MiniMax M1 ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "What is the role of the moderator in a nuclear reactor, and why can't fast neutrons efficiently cause fission in U-235? (3 steps)", "answer": "- Step 1: The moderator (graphite or water) slows down the fast neutrons produced by fission to thermal neutrons (slow-moving neutrons at \"room temperature\" energy).\n- Step 2: Fast neutrons are too energetic — they tend to pass straight through U-235 nuclei without being absorbed efficiently. Thermal (slow) neutrons have a much higher probability of causing fission when they collide with U-235 nuclei.\n+ This is a cross-section issue: the probability of fission depends on neutron speed\n+ U-235 is \"fissile\" (can fission with neutrons of any speed) but prefers slow neutrons\n- Step 3: Without a moderator, a reactor couldn't sustain a chain reaction using natural uranium or low-enriched fuel — too many fast neutrons would escape or pass through without causing fission.", "source": "MiniMax M1 ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Why does nuclear fusion release more energy per kilogram than nuclear fission, and why is fusion so difficult to achieve on Earth? (3 steps)", "answer": "- Step 1: Fusion joins light nuclei (like hydrogen isotopes) to form heavier ones. The mass of the fused nucleus is slightly less than the sum of the original nuclei — this \"mass defect\" is converted to energy via $E=mc^2$. Because fusion involves lighter nuclei, a larger fraction of the mass is converted to energy per kg compared to fission.\n- Step 2: The strong nuclear force is very short-range — it only binds nucleons when they are extremely close (about 1 femtometre). To overcome electrostatic repulsion between positively charged nuclei, the particles must have enormous kinetic energy.\n+ This requires temperatures of ~100 million°C — hot enough for hydrogen nuclei to overcome repulsion\n+ At these temperatures, matter is plasma (ionised gas), which is extremely difficult to contain\n- Step 3: The Sun achieves fusion because its massive gravity provides the necessary pressure to confine the plasma. On Earth, we must create these conditions artificially, which is why controlled fusion remains challenging.", "source": "MiniMax M1 ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In the fusion reaction: $^{2}_{1}\\text{H} + ^{3}_{1}\\text{H} \\rightarrow ^{4}_{2}\\text{He} + ^{1}_{0}n$, identify the particles on both sides and explain why mass is not conserved (but energy is). (3 steps)", "answer": "- Step 1: Left side: deuterium (1 proton, 1 neutron) + tritium (1 proton, 2 neutrons) = 2 protons, 3 neutrons. Right side: helium-4 (2 protons, 2 neutrons) + neutron (1 neutron) = 2 protons, 3 neutrons.\n- Step 2: The total number of protons (2) and neutrons (3) is the same on both sides — nucleon number is conserved. However, the mass is NOT the same: the helium-4 + neutron mass is slightly less than the deuterium + tritium mass.\n+ This \"mass defect\" (~0.018 atomic mass units) is converted to energy\n+ The energy rel
