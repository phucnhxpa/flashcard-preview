eased = mass defect × c² (from Einstein's E=mc²)\n- Step 3: Mass appears not to be conserved in nuclear reactions because mass is converted to energy. Energy, however, IS conserved — the energy released equals the mass lost.", "source": "MiniMax M1 ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Why is medical radiotherapy able to kill cancer cells while minimising damage to healthy tissue? (2 steps)", "answer": "- Step 1: Radiotherapy uses focused beams of gamma rays (or X-rays) directed at a tumour from multiple angles. The beams are rotated around the body so that each individual beam passes through healthy tissue, but all beams converge on the tumour.\n- Step 2: At the tumour site, the radiation dose accumulates to a high enough level to damage the DNA of the cancer cells (killing them or stopping their division), while the healthy tissue along each beam path receives a much lower, survivable dose.\n+ This is the key principle: many low-dose paths converge to one high-dose target\n+ Advanced techniques like IMRT (intensity-modulated radiotherapy) shape beams to match tumour contours", "source": "MiniMax M1 ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Why is a PET scan fundamentally different from a standard gamma scan, and what makes the positron so useful for imaging? (3 steps)", "answer": "- Step 1: In a PET (Positron Emission Tomography) scan, the patient is given a positron-emitting tracer (like carbon-11 or oxygen-15). The positron travels a short distance, then annihilates with an electron — both particles disappear and produce TWO gamma photons travelling in opposite directions (180° apart).\n- Step 2: Detectors around the body pick up these gamma pairs. Because the gammas travel in exactly opposite directions, the scanner can trace back along the line between the two detection points to locate where the annihilation occurred. This gives 3D images of metabolic activity.\n+ This is fundamentally different from a standard gamma scan where the nucleus emits a single gamma directly\n+ The coincidence detection (two gammas at once) provides much better spatial localisation\n- Step 3: PET is especially useful because it tracks biological processes (like glucose metabolism in the brain) rather than just anatomy.", "source": "MiniMax M1 ①", "_id": "minimax_1_16", "judge_pick": true}, {"question": "What is the difference between the activity unit (becquerel), the absorbed dose unit (gray), and the equivalent dose unit (sievert)? (3 steps)", "answer": "- Step 1: Becquerel (Bq) measures activity — the number of decays per second in a source. 1 Bq = 1 decay per second. It tells us about the source, not the biological effect.\n- Step 2: Gray (Gy) measures absorbed dose — the amount of energy deposited per kilogram of tissue. 1 Gy = 1 joule per kg. It tells us the physical energy absorbed, but not the biological damage.\n- Step 3: Sievert (Sv) measures equivalent dose — it accounts for the type of radiation and its biological effectiveness. Different radiations cause different damage per Gy:\n+ Alpha particles are ~20 times more damaging per Gy than gamma/X-rays\n+ So 1 Gy of alpha = 20 Sv; 1 Gy of gamma = 1 Sv\n+ The sievert is what matters for health risk.", "source": "MiniMax M1 ①", "_id": "minimax_1_17", "judge_pick": true}, {"question": "A worker receives a radiation dose of 5 mSv in a year. The legal limit for nuclear industry workers is 20 mSv/year. Is this dose dangerous, and what factors determine whether a radiation dose causes harm? (3 steps)", "answer": "- Step 1: 5 mSv is below the annual limit and roughly comparable to natural background radiation (~3 mSv/year). At this level, the additional cancer risk is very small but not zero — there is no completely \"safe\" threshold.\n- Step 2: Whether harm occurs depends on:\n+ Total dose: higher doses = higher risk (though single doses below ~100 mSv are hard to link to observable effects)\n+ Dose rate: receiving 5 mSv slowly (over a year) is less harmful than receiving it all at once\n+ Type of radiation: alpha is more damaging per Gy than gamma/X-rays (the quality factor)\n+ Area exposed: whole-body exposure is more serious than a small area\n+ Individual sensitivity: some people are more vulnerable\n- Step 3: Radiation protection principles (ALARA: As Low As Reasonably Achievable) aim to keep exposures as low as possible, not just below limits.", "source": "MiniMax M1 ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Why can't uranium-238 be used as fuel in the same way as uranium-235, even though both are radioactive? (2 steps)", "answer": "- Step 1: U-235 is fissile — it can undergo fission when it absorbs a neutron of any energy, including slow (thermal) neutrons. U-238 is fissionable but not fissile — it can only undergo fission with very fast, high-energy neutrons.\n- Step 2: In a typical reactor, the neutrons are slowed to thermal energies by the moderator. U-238 absorbs these slow neutrons without fissioning (it just becomes U-239), so it cannot sustain a chain reaction on its own.\n+ U-238 can still contribute to reactor operation by capturing neutrons and eventually decaying to plutonium-239 (which IS fissile)\n+ Natural uranium is only 0.7% U-235 — it must be enriched to ~3-5% U-235 for reactor fuel", "source": "MiniMax M1 ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In a nuclear power station, describe the energy conversion chain from nuclear fission to electricity at the grid. (3 steps)", "answer": "- Step 1: Nuclear fission in the reactor core releases heat energy as the heavy nuclei split.\n- Step 2: This heat is absorbed by coolant (usually pressurised water) circulating through the core. The hot coolant then transfers its heat to a separate water circuit, producing high-pressure steam.\n- Step 3: The steam drives a turbine (converting thermal → kinetic energy), which spins a generator (converting kinetic → electrical energy via electromagnetic induction). The electricity then goes to the grid.", "source": "MiniMax M1 ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Why does radioactive waste from nuclear reactors remain dangerous for thousands of years, and what are the main categories of nuclear waste? (3 steps)", "answer": "- Step 1: Spent fuel contains fission products (the two nuclei formed when U-235 splits) and transuranic elements (plutonium, americium). Many of these isotopes have half-lives ranging from decades to thousands of years, meaning they remain radioactive for very long periods.\n- Step 2: The waste is categorised by radioactivity level:\n+ Low-level waste (LLW): mildly radioactive, e.g., gloves, clothing — can be disposed of in shallow burial\n+ Intermediate-level waste (LLW): higher activity, e.g., reactor components — requires concrete shielding\n+ High-level waste (HLW): highly radioactive, e.g., spent fuel — generates heat, requires deep geological storage\n- Step 3: High-level waste must be isolated for tens of thousands of years until radioactivity decays to safe levels.", "source": "MiniMax M1 ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "If Rutherford's gold foil experiment showed that most alpha particles passed straight through but some deflected at large angles, what did this prove about the structure of the atom? (2 steps)", "answer": "- Step 1: The fact that most alphas passed straight through proved that the atom is mostly empty space — the positive charge and mass are not spread throughout like Thomson's \"plum pudding\" model.\n- Step 2: The fact that some alphas were deflected at large angles (even a few bouncing straight back) proved that there is a tiny, dense, positively charged nucleus at the centre. The alphas that hit this nucleus head-on were violently repelled, showing all the positive charge was concentrated in a very small volume.\n+ This was the birth of the nuclear model of the atom\n+ The nucleus is ~10,000 times smaller than the atom but contains all the positive charge and nearly all the mass", "source": "MiniMax M1 ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "What evidence from absorption and emission spectra supports the Bohr model of the atom? (2 steps)", "answer": "- Step 1: When electrons jump TO higher energy levels (absorbing photons), they absorb only specific wavelengths — this creates dark lines in the absorption spectrum. When electrons jump DOWN to lower levels (emitting photons), they emit only specific wavelengths — this creates bright lines in the emission spectrum.\n- Step 2: The Bohr model explains this by proposing that electrons occupy only certain allowed energy levels (quantised orbits). The energy of a photon must exactly match the gap between two levels, so only certain wavelengths (corresponding to specific energy gaps) are absorbed or emitted.\n+ Each element has a unique line spectrum because its electron energy levels are unique\n+ This was strong evidence that electrons have quantised, discrete energy levels — not arbitrary orbits", "source": "MiniMax M1 ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Why is it impossible for electrons to exist inside the nucleus, and what does this tell us about the origin of beta particles? (2 steps)", "answer": "- Step 1: Electrons cannot exist as stable particles inside the nucleus because of quantum mechanics — the nucleus is far too small (femtometre scale) to accommodate electrons in stable orbits. Electrons are governed by wave-like behaviour at these scales, and the mathematics doesn't allow them to be bound within such a tiny region.\n- Step 2: This is why beta particles (electrons) are not \"pre-existing\" in the nucleus — they are created at the instant of decay when a neutron transforms into a proton. The electron is created and immediately ejected, rather than being an orbital electron that somehow got trapped in the nucleus.\n+ This is fundamentally different from alpha particles, where the alpha is a pre-existing cluster of 2p+2n that existed before decay", "source": "MiniMax M1 ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Why is radon gas considered a significant natural source of radiation exposure, and how does it enter buildings? (2 steps)", "answer": "- Step 1: Radon-222 is an alpha-emitting isotope produced naturally in the decay chain of uranium-222, which is present in small amounts in rocks and soils worldwide. Radon is a gas, so it can be inhaled.\n- Step 2: As a gas, radon seeps up from the ground through foundations, cracks, and gaps in buildings, where it can accumulate to elevated concentrations. It is the largest single source of natural background radiation in the UK.\n+ Once inhaled, radon isotopes decay further, producing solid radioactive daughters that can lodge in lung tissue\n+ This is why radon exposure is linked to lung cancer (especially in smokers)", "source": "MiniMax M1 ①", "_id": "minimax_1_25", "judge_pick": true}, {"question": "Why is carbon-14 dating limited to relatively recent organic samples (tens of thousands of years), and what would happen if you tried to date a dinosaur bone? (3 steps)", "answer": "- Step 1: Carbon-14 has a half-life of ~5730 years. After about 50,000 years (~9 half-lives), the remaining C-14 activity becomes indistinguishable from background radiation, making accurate dating impossible.\n- Step 2: Dinosaur bones are ~65 million years old — vastly older than the limit for C-14 dating. Any C-14 would have long since decayed to undetectable levels.\n+ At 9 half-lives: activity = (1/512) ≈ 0.2% of original\n+ At 65 million years (~11,000 half-lives): virtually zero C-14 remains\n- Step 3: For older samples, scientists use other radioactive isotopes with much longer half-lives (like uranium-lead dating) that can date rocks and fossils hundreds of millions of years old.", "source": "MiniMax M1 ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "Why do different radiation types (alpha, beta, gamma) require different shielding materials, and what does this tell us about their penetrating mechanisms? (3 steps)", "answer": "- Step 1: Alpha particles (charge +2, mass 4) interact strongly with matter through electrostatic forces and ionise heavily in a short distance. They are stopped by paper — any thin material with electrons will absorb them.\n- Step 2: Beta particles (charge −1, negligible mass) penetrate further but are stopped by a few mm of aluminium. Being lighter, they don't ionise as densely as alpha but travel farther before losing energy.\n- Step 3: Gamma rays (no mass, no charge) interact only weakly with matter — they may travel metres without interaction. They require dense shielding (cm of lead or metres of concrete) to reduce intensity significantly.\n+ The penetration mechanism is fundamentally different: charged particles interact continuously and lose energy quickly; uncharged gamma interacts rarely but when it does, it ionises strongly", "source": "MiniMax M1 ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In the equation $^{A}_{Z}X \\rightarrow ^{A}_{Z+1}Y + ^{0}_{-1}\\beta^-$, explain how this nuclear equation is balanced in terms of mass number and atomic number. (2 steps)", "answer": "- Step 1: Mass number (top): parent A → daughter A + emitted particle 0. So A = A + 0 — the mass number is conserved (no nucleons lost or gained overall).\n- Step 2: Atomic number (bottom): parent Z → daughter (Z+1) + emitted particle (−1). So Z = (Z+1) + (−1) — the total charge is conserved. The neutron has converted to a proton + electron, so the total positive charge increases by 1 (from Z to Z+1), and the electron carries away charge −1, balancing the equation.", "source": "MiniMax M1 ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Why does a Geiger-Müller tube give a \"count\" but not a direct measurement of activity in becquerels? (2 steps)", "answer": "- Step 1: A GM tube detects individual radiation events that reach its sensitive volume and cause ionisation. Each event produces one electrical pulse, which is counted.\n- Step 2: However, the GM tube does not detect every decay in the source because:\n+ Most emissions miss the detector entirely (emitted in wrong direction)\n+ Some are absorbed by the source casing or air between source and detector\n+ The detector has less than 100% efficiency even for particles heading straight at it\n+ So the count rate is always less than the true activity, and conversion requires calibration", "source": "MiniMax M1 ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Why does the same dose of alpha radiation cause more biological damage than the same dose of gamma radiation? (2 steps)", "answer": "- Step 1: Alpha particles have a much higher linear energy transfer (LET) than gamma — they deposit their energy in a much shorter track through tissue, creating a dense trail of ionisation.\n- Step 2: This concentrated damage is harder for cells to repair than the more dispersed damage from gamma. The biological effect per unit of absorbed energy (measured in sieverts per gray) is about 20 times greater for alpha than for gamma/X-rays.\n+ One alpha particle can damage many molecules along its short, dense path\n+ Gamma rays spread their energy more sparsely, giving cells a better chance to repair damage", "source": "MiniMax M1 ①", "_id": "minimax_1_30", "judge_pick": true}, {"question": "What is the difference between a fission reactor and a fusion reactor in terms of fuel availability, waste products, and long-term radioactivity? (3 steps)", "answer": "- Step 1: Fuel: Fission uses scarce uranium (need enrichment); fusion uses abundant deuterium from seawater (virtually unlimited).\n- Step 2: Waste: Fission produces long-lived radioactive waste (spent fuel, fission products lasting thousands of years); fusion produces short-lived waste (the reactor walls become activated but decay within ~100 years).\n- Step 3: No chain reaction risk: Fusion cannot sustain itself without extreme conditions — if the plasma cools, fusion stops immediately. Fission reactors risk meltdown if cooling fails.\n+ Fusion produces helium (non-radioactive) as the main product\n+ Fusion releases more energy per kg than fission", "source": "MiniMax M1 ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "If you were designing a thickness gauge to monitor the thickness of aluminium foil during manufacturing, what type of radiation would you use and why? (2 steps)", "answer": "- Step 1: You would use beta radiation. Beta particles have moderate penetrating power — enough to pass through thin aluminium foil but be absorbed proportionally to the foil's thickness.\n- Step 2: Alpha would be stopped too easily (even very thin foil stops it all); gamma would penetrate too much (too little absorption to measure thickness differences). Beta's intermediate penetration makes it ideal:\n+ Thinner foil → less absorption → higher count at detector\n+ Thicker foil → more absorption → lower count at detector\n+ The detector reading feeds back to adjust the rollers in real time", "source": "MiniMax M1 ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "Why do radioactive tracers used in medical diagnosis typically have short half-lives, and what would be the problem if they had long half-lives? (2 steps)", "answer": "- Step 1: Medical tracers (like technetium-99m with a 6-hour half-life) need to be produced on-site or delivered quickly. Short half-lives mean high activity for imaging while limiting the patient's long-term radiation exposure.\n- Step 2: If a tracer had a long half-life, it would remain radioactive in the body for much longer after the scan, unnecessarily exposing the patient to radiation long after the diagnostic information has been collected.\n+ Short half-life = high initial activity for good imaging + rapid decay to safe levels\n+ The tracer should clear from the body (via excretion or decay) within hours to days", "source": "MiniMax M1 ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Why does a photon have no rest mass but still carry energy, and why does this make gamma radiation penetrating but weakly ionising? (3 steps)", "answer": "- Step 1: Photons are particles of electromagnetic radiation — they have energy (E = hf) but no rest mass. They always travel at the speed of light and cannot be at rest.\n- Step 2: Because they have no charge, photons do not interact via electrostatic forces with electrons the way charged particles do. They can pass through many atoms without any interaction at all.\n- Step 3: However, when a gamma photon does interact (via the photoelectric effect, Compton scattering, or pair production), it transfers ALL its energy to an electron, creating one heavily ionising secondary electron. Since most gammas pass through without interacting, the overall ionising effect per unit path length is low — but when interaction occurs, it's concentrated.\n+ This is why gamma is penetrating (most escape) but weakly ionising per unit distance (low interaction probability)", "source": "MiniMax M1 ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In a chain reaction, what does it mean for the reactor to be \"critical,\" \"subcritical,\" or \"supercritical\"? (3 steps)", "answer": "- Step 1: Critical: on average, exactly one neutron from each fission goes on to cause another fission. The reaction is self-sustaining at a steady rate. This is the desired state for power generation.\n- Step 2: Subcritical: fewer than one neutron per fission causes another fission. The reaction dies out over time. This is what happens when control rods are inserted to shut down a reactor.\n+ Example: if each fission releases 2.3 neutrons on average, but only 1 is needed for criticality, then 1.3 are \"lost\" (absorbed without causing fission, escape, etc.)\n- Step 3: Supercritical: more than one neutron per fission causes another fission. The reaction grows exponentially. This is:\n+ Deliberate in nuclear weapons (supercritical for rapid energy release)\n+ Controlled in reactor startup (slightly supercritical to increase power gradually, then brought to critical)", "source": "MiniMax M1 ①", "_id": "minimax_1_35", "judge_pick": true}, {"question": "Why can radioactive contamination be spread more easily than irradiation, and what precautions prevent contamination spread? (2 steps)", "answer": "- Step 1: Contamination is radioactive material physically present on surfaces, skin, or in the air. It can be spread by touch, air currents, or water — the radioactive atoms can travel wherever they go.\n- Step 2: Precautions include:\n+ Wearing protective gloves, gowns, and respirators\n+ Working in designated controlled areas\n+ Decontaminating surfaces and equipment regularly\n+ Proper waste disposal of contaminated materials\n+ Monitoring personnel and equipment with contamination detectors\n+ Unlike irradiation, contamination doesn't stop when you walk away from the source", "source": "MiniMax M1 ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "Why is it scientifically incorrect to say \"this source emits radiation at 500 Bq\" in a context where you're measuring with a GM tube? (2 steps)", "answer": "- Step 1: Activity (Bq) is the number of decays per second occurring in the source itself. It's a property of the source and doesn't depend on how you're measuring it.\n- Step 2: The count rate (cps) from a GM tube is what the detector registers. Unless you've calibrated your setup to account for geometry and detector efficiency, you cannot directly quote the source activity from the count rate.\n+ 500 Bq source might give 50 cps if only 10% of emissions reach the detector\n+ Saying \"the source produces 500 Bq\" vs \"we measure 50 cps\" are two different statements\n+ The count rate is always less than the true activity", "source": "MiniMax M1 ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Einstein's equation $E=mc^2$ explains why nuclear reactions release enormous amounts of energy. If the mass defect in a particular fission reaction is 0.1% of the original mass, estimate the energy released per kilogram of fuel. (2 steps)", "answer": "- Step 1: The speed of light c ≈ 3 × 10⁸ m/s, so c² ≈ 9 × 10¹⁶ m²/s².\n- Step 2: If 0.1% of 1 kg (0.001 kg) is converted to energy: E = mc² = 0.001 × 9 × 10¹⁶ = 9 × 10¹³ joules.\n+ This is ~200,000,000 MJ per kg — about 10 million times more than chemical fuels (coal ~30 MJ/kg)\n+ Even a small mass loss (0.1%) yields enormous energy because c² is so huge", "source": "MiniMax M1 ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Why do we say that background radiation is \"always present\" even in a completely sealed underground bunker, and what are its main natural sources? (2 steps)", "answer": "- Step 1: Even in a shielded environment, background radiation cannot be eliminated because some sources are everywhere:\n+ Cosmic rays: high-energy particles from space that penetrate deep underground (though reduced)\n+ Naturally occurring radioactive materials (NORM): trace uranium, thorium, potassium-40 in rocks, soil, and building materials\n+ Radon gas: seeps up from the ground through foundations\n+ Internal radioactivity: carbon-14 and potassium-40 in your own body\n- Step 2: The worldwide average background dose is ~3 mSv/year, with variation based on location, altitude, and local geology.", "source": "MiniMax M1 ①", "_id": "minimax_1_39", "judge_pick": true}, {"question": "What is the key difference between a nuclear transformation (radioactive decay) and a chemical reaction? (2 steps)", "answer": "- Step 1: In radioactive decay, the nucleus changes — protons and/or neutrons are rearranged, creating a different element. The identity of the atom changes.\n- Step 2: In a chemical reaction, only the electron shells are involved — atoms gain, lose, or share electrons, but the nuclei remain unchanged. The element identity is preserved.\n+ Radioactive decay: nucleus is modified (α, β, γ emissions change Z and/or A)\n+ Chemical reaction: electrons are transferred or shared, nucleus unchanged", "source": "MiniMax M1 ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "In radiotherapy, why is it important to rotate the radiation source around the patient rather than delivering the beam from one direction? (2 steps)", "answer": "- Step 1: If a single beam were used, it would pass through healthy tissue to reach the tumour, delivering a high dose to that healthy tissue on the way in.\n- Step 2: By rotating the source (or multiple beams from different angles), each beam enters through different healthy tissue, spreading the dose across many healthy cells (each receiving a low dose), while all beams converge on the tumour (receiving the full cumulative dose).\n+ This maximises damage to the tumour while minimising damage to any single area of healthy tissue\n+ Modern techniques like IMRT create even more complex beam shapes to conform to tumour geometry", "source": "MiniMax M1 ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "Why is it fundamentally impossible to use a GM tube to directly measure the energy of a gamma photon? (2 steps)", "answer": "- Step 1: A GM tube is a particle counter — it detects whether radiation hit it and produces a standard pulse for each detection event. The pulse size is essentially the same regardless of whether an alpha, beta, or gamma caused it.\n- Step 2: To measure energy, you need a detector that produces a signal proportional to the energy deposited (like a scintillation detector or semiconductor detector). A GM tube operates in \"Geiger region\" where the output is saturated — it gives maximum pulse for any ionising event.\n+ Different gamma photons (different energies) produce the same \"click\" in a GM tube\n+ GM tubes tell you \"something hit\" but not \"how much energy it had\"", "source": "MiniMax M1 ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "Why are neutrons particularly difficult to shield against compared to alpha, beta, and gamma radiation? (2 steps)", "answer": "- Step 1: Neutrons have no electric charge, so they don't interact with electrons through electrostatic forces. They only interact with atomic nuclei, and nuclei are tiny targets — most neutrons pass through matter without interaction.\n- Step 2: Once a neutron does interact, the outcome depends on its energy:\n+ Fast neutrons transfer energy efficiently to light nuclei (like hydrogen in water or paraffin)\n+ Slow neutrons may be absorbed by certain nuclei, potentially making them radioactive\n+ Unlike charged particles, there's no \"one-size-fits-all\" shield — the best neutron shielding uses materials rich in hydrogen (water, concrete, paraffin) PLUS materials that absorb activated products\n+ Neutrons are uniquely penetrating because they lack charge", "source": "MiniMax M1 ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "A sample of radioactive material has a half-life of 2 hours. If you start with 1000 undecayed nuclei, approximately how many remain after 6 hours, and what is the key assumption behind this calculation? (2 steps)", "answer": "- Step 1: After 2 hours: 500 remain. After 4 hours: 250 remain. After 6 hours: 125 remain.\n- Step 2: The key assumption is that the decay is described by a fixed half-life, meaning each nucleus has the same probability of decay per unit time, regardless of how long the sample has been decaying.\n+ We assume the sample is large enough that statistical fluctuations are negligible\n+ For small numbers, actual results may deviate from the predicted half-life pattern", "source": "MiniMax M1 ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "Why does the strong nuclear force have a very short range, and what does this imply for the stability of very large nuclei? (3 steps)", "answer": "- Step 1: The strong nuclear force acts only between neighbouring nucleons (range ~1 femtometre). Unlike electromagnetism, it does not extend across large distances.\n- Step 2: In small nuclei, every nucleon is close to every other nucleon, so the strong force (attractive) easily overcomes electromagnetic repulsion (repulsive between all protons). In very large nuclei, protons on opposite sides are too far apart for the strong force to bind them together directly.\n+ The strong force is short-range but very strong when nucleons touch\n+ The electromagnetic repulsion is long-range and grows with more protons\n- Step 3: This is why there's an upper limit to stable nuclei — beyond a certain size (around Z=83, bismuth), electromagnetic repulsion wins and the nucleus becomes unstable (radioactive).", "source": "MiniMax M1 ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "Why can food and medical equipment be sterilised by gamma irradiation without making them radioactive? (2 steps)", "answer": "- Step 1: Irradiation involves exposing items to gamma rays from an external source (usually cobalt-60 or caesium-137). The gamma photons pass through the material, damaging DNA of microorganisms but not penetrating nuclei.\n- Step 2: For an object to become radioactive, its own atomic nuclei would need to absorb neutrons or other particles and undergo nuclear transmutation. Gamma photons are not captured by nuclei in a way that makes them radioactive — they simply deposit energy and leave.\n+ The gamma source stays outside the items; nothing \"gets into\" the items\n+ The items are merely exposed to radiation, not contaminated with radioactive material", "source": "MiniMax M1 ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "If the count rate from a sample decreases when a sheet of paper is placed between the source and the detector, but does not decrease further when a thin aluminium sheet is added, what can you conclude about the type of radiation emitted? (2 steps)", "answer": "- Step 1: Paper stops the radiation, but aluminium doesn't reduce it further. This is the characteristic behaviour of alpha particles:\n+ Paper (or even a few cm of air) stops alpha\n+ Aluminium (a few mm) would be needed to stop beta, but it doesn't further reduce the count\n+ Gamma would pass through both paper and thin aluminium\n- Step 2: Therefore, the source is emitting alpha radiation (or possibly very low-energy beta, but the paper stopping effect strongly suggests alpha).", "source": "MiniMax M1 ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "What is the fundamental reason that nuclear energy density is roughly one million times greater than chemical energy density? (2 steps)", "answer": "- Step 1: Chemical reactions involve rearranging electrons in the outer shells — the energy differences between different electron configurations are on the order of electronvolts (eV) per reaction.\n- Step 2: Nuclear reactions involve the strong nuclear force binding nucleons together — the energy differences are millions of times greater because the binding energy per nucleon is in the millions of electronvolts (MeV).\n+ A typical fission releases ~200 MeV; a typical chemical reaction releases a few eV\n+ Since E=mc², this larger energy release corresponds to a larger mass defect\n+ This is why a small amount of nuclear fuel can produce enormous energy compared to the same mass of chemical fuel", "source": "MiniMax M1 ①", "_id": "minimax_1_48", "judge_pick": true}], "count": 49}, "minimax_2": {"label": "MiniMax M1 ②", "cards": [{"question": "Distinguish between atomic number (Z) and mass number (A). If an atom has 26 protons and 30 neutrons, what are its Z and A values, and what element is it? (3 steps)", "answer": "- Step 1: **Atomic number (Z)** = number of protons in the nucleus. This defines the element's identity—all atoms with Z = 26 are iron. **Mass number (A)** = total number of protons + neutrons (nucleons) in the nucleus.\n\n- Step 2: Given 26 protons and 30 neutrons: Z = 26, A = 26 + 30 = 56.\n\n- Step 3: Using the periodic table, Z = 26 corresponds to the element **iron (Fe)**. This isotope would be written as $^{56}_{26}$Fe.\n\n+ Note: Different isotopes of iron (e.g., $^{54}$Fe, $^{57}$Fe) have the same Z but different numbers of neutrons, hence different A values.", "source": "MiniMax M1 ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Why do isotopes of the same element have identical chemical behaviour but different nuclear stability? (2 steps)", "answer": "- Step 1: Chemical behaviour is determined by the **electron cloud**—specifically, the number and arrangement of electrons in orbit. Since isotopes have the same atomic number Z, they have the same number of electrons in a neutral atom, so they form identical chemical bonds.\n\n- Step 2: Nuclear stability depends on the **balance between protons and neutrons** in the nucleus. Adding neutrons changes the nuclear mass and the strong nuclear force-to-electrostatic repulsion ratio. Too many or too few neutrons makes the nucleus unstable, leading to radioactivity. The electrons don't \"feel\" the neutron count.", "source": "MiniMax M1 ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Write the nuclear notation for uranium-235 and use it to determine: (a) the number of protons, (b) the number of neutrons, (c) the number of electrons in a neutral atom. (3 steps)", "answer": "- Step 1: Uranium-235 is written as $^{235}_{92}$U. The top number is mass number A = 235; the bottom number is atomic number Z = 92.\n\n- Step 2: (a) Number of protons = Z = 92. (b) Number of neutrons = A - Z = 235 - 92 = 143 neutrons.\n\n- Step 3: (c) In a neutral uranium atom, the number of electrons equals the number of protons (to balance charge), so there are 92 electrons orbiting the nucleus.\n\n+ Edge case: In ions, the electron count differs from Z. U⁴⁺ would have 92 - 4 = 88 electrons.", "source": "MiniMax M1 ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "An electron in an atom drops from the third energy level to the second energy level, emitting a photon. Why must the photon have exactly the right energy, and what determines this energy value? (2 steps)", "answer": "- Step 1: Electrons can only occupy **discrete energy levels** (quantised orbits)—they cannot exist between levels. When an electron drops, it must release energy equal to exactly the **difference in energy** between the two levels.\n\n- Step 2: This energy difference (ΔE) determines the **frequency (and wavelength)** of the emitted photon via E = hf, where h is Planck's constant. Each element has a unique set of energy level gaps, producing a characteristic line spectrum—essentially a \"fingerprint\" for identifying the element.\n\n+ Misconception probe: The photon energy is NOT arbitrary—it must match the exact level gap, which is why each element produces specific spectral lines rather than a continuous rainbow.", "source": "MiniMax M1 ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Compare alpha, beta-minus, and gamma radiation in terms of: (a) what each particle/wave actually is, (b) its charge, (c) its relative mass. (3 steps)", "answer": "- Step 1: **(a) Identity**: α = alpha particle = helium-4 nucleus (2 protons + 2 neutrons); β⁻ = beta-minus = fast electron emitted from the nucleus when a neutron converts to proton; γ = gamma ray = high-frequency electromagnetic wave (photon), no mass.\n\n- Step 2: **(b) Charge**: α = +2; β⁻ = −1; γ = 0 (no charge).\n\n- Step 3: **(c) Relative mass**: α ≈ 4 (in atomic mass units, same as helium-4 nucleus); β⁻ ≈ 1/2000 (electron mass—negligible compared to nucleons); γ = 0 (massless).\n\n+ Key insight: Alpha is heavy and doubly positive; beta is a tiny negative particle created in the nucleus; gamma is pure energy with no mass or charge.", "source": "MiniMax M1 ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Explain why alpha radiation is the most ionising but the least penetrating, while gamma is the least ionising but the most penetrating. (3 steps)", "answer": "- Step 1: **Ionising power** depends on how effectively the radiation can knock electrons out of atoms. Alpha particles are heavy (+2 charge), so they travel relatively slowly and dump their huge energy into a short distance, colliding frequently with atoms and causing intense ionisation along a short track.\n\n- Step 2: **Penetrating power** depends on how far the radiation travels before being stopped. Because alpha ionises so effectively, it loses energy quickly and is stopped by just a sheet of paper (or a few cm of air). It cannot go far because it interacts too strongly.\n\n- Step 3: Gamma rays are massless, uncharged photons. They interact weakly with matter, so they can pass through many centimeters of material before being absorbed. Their low interaction rate means they cause fewer ions per unit distance (least ionising), but they penetrate furthest.\n\n+ Counterintuitive insight: Strong ionising power and strong penetrating power are INVERSELY related—radiation that interacts a lot (high ionisation) stops quickly (low penetration).", "source": "MiniMax M1 ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Write the nuclear equation for beta-minus decay of carbon-14, where carbon-14 decays to nitrogen-14. Identify the parent, daughter, and the emitted particle. (3 steps)", "answer": "- Step 1: Beta-minus decay occurs when a neutron in an unstable nucleus converts into a proton, emitting an electron (β⁻). The process: $^{14}_{6}$C → $^{14}_{7}$N + $^{0}_{-1}$β⁻\n\n- Step 2: **Parent nucleus**: $^{14}_{6}$C (carbon-14, unstable). **Daughter nucleus**: $^{14}_{7}$N (nitrogen-14, more stable). **Emitted particle**: $^{0}_{-1}$β⁻ (the beta particle—actually an electron).\n\n- Step 3: Check balance: Mass numbers: 14 = 14 + 0 ✓. Atomic numbers (charges): 6 = 7 + (−1) ✓. Note that A stays the same (neutron became proton), but Z increases by 1—transforming the element from carbon to nitrogen.\n\n+ Note: The beta electron is created during the decay—it did not exist in the nucleus beforehand.", "source": "MiniMax M1 ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "What is the key difference between contamination and irradiation? Why does contamination pose a continuing danger while irradiation does not leave material radioactive? (2 steps)", "answer": "- Step 1: **Contamination** = unwanted radioactive atoms physically present on or inside a material (skin, equipment). The radioactive material is NOW ON YOU and continues to decay, emitting radiation directly into your surroundings. It can spread.\n\n- Step 2: **Irradiation** = exposing a material to radiation from an external source (e.g., gamma rays sterilising medical equipment). The source stays outside—the radiation passes through but does not deposit radioactive atoms. Once the source is removed, the material is NOT radioactive.\n\n+ Key distinction: Contamination = radioactive material IS THERE; irradiation = radioactive source is EXTERNAL. Contamination continues because each unstable nucleus continues to decay on its own clock; irradiation ends when you remove the external source.", "source": "MiniMax M1 ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A radiation worker wears a film badge. Explain how it works to monitor radiation dose, and why does it have different windows (paper, aluminium, lead)? (3 steps)", "answer": "- Step 1: A **photographic film badge** contains film that darkens when exposed to radiation. The degree of darkening indicates the total radiation dose received over the wearing period (days/weeks). It acts as a cumulative dosimeter.\n\n- Step 2: Different windows let different types of radiation reach the film:\n  - **Paper window**: Stops alpha, lets beta + gamma through (alpha darkens film little anyway)\n  - **Aluminium window**: Stops alpha, reduces beta, lets gamma through\n  - **Lead window**: Stops alpha + beta, only gamma reaches the film\n\n- Step 3: By comparing darkening in each section, you can determine which types of radiation were present and estimate the dose from each. This helps ensure workers stay below safe limits and identify exposure patterns.\n\n+ Not a real-time detector: The badge must be developed chemically to read the dose—it doesn't give instant readings like a GM tube.", "source": "MiniMax M1 ②", "_id": "minimax_2_8", "judge_pick": true}, {"question": "A GM tube reads 45 counts per minute in a laboratory with a radioactive sample. The background count rate is measured as 12 counts per minute. What is the corrected count rate, and why must we subtract background radiation? (2 steps)", "answer": "- Step 1: **Corrected count rate** = measured count rate − background count rate = 45 − 12 = **33 counts per minute**.\n\n- Step 2: Background radiation comes from natural sources (radon gas, cosmic rays, rocks, food) and is always present—it's not from your sample. The GM tube detects ALL radiation hitting it, so you must subtract the background to get the count attributable ONLY to your source. Otherwise, you'd overestimate the source's activity.\n\n+ Note: Background is typically ~20-30 cpm in a school lab; always measure it before starting an experiment.", "source": "MiniMax M1 ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "What does half-life mean? If a sample has a half-life of 5 hours and initially contains 8000 radioactive nuclei, how many remain after 15 hours? Explain your reasoning. (3 steps)", "answer": "- Step 1: **Half-life (t½)** = the time taken for half of the undecayed nuclei in a sample to decay (or for activity to halve). It's a constant for a given isotope—independent of how much you start with.\n\n- Step 2: Starting with 8000 nuclei:\n  - After 5 hours (1 half-life): 8000 → 4000\n  - After 10 hours (2 half-lives): 4000 → 2000\n  - After 15 hours (3 half-lives): 2000 → 1000\n\n- Step 3: After 15 hours (3 half-lives), **1000 nuclei** remain undecayed. Each half-life halves what's left—it never reaches zero in finite time, but gets infinitely close.\n\n+ Misconception: Half-life is NOT the time for ALL nuclei to decay—that would take forever. It's always \"half of whatever is left.\"", "source": "MiniMax M1 ②", "_id": "minimax_2_10", "judge_pick": true}, {"question": "A radioactive source has an activity of 400 Bq. What does this mean in terms of nuclei decaying per second? If you measure with a GM tube, why might your count rate be less than 400 counts per second? (2 steps)", "answer": "- Step 1: An activity of **400 Bq** means **400 nuclei decay per second** on average (1 Bq = 1 decay per second). This is the true rate of nuclear decays occurring in the source.\n\n- Step 2: The GM tube does NOT detect every decay. Reasons:\n  - Radiation is emitted in all directions (4π steradians); only a tiny fraction travels toward the detector\n  - Some radiation passes through without hitting the tube's window\n  - The detector has finite efficiency\n\n+ Key distinction: **Activity** = decays per second in the SOURCE (measured in Bq). **Count rate** = detections per second by the DETECTOR (measured in cps or cpm). Always: count rate < true activity.", "source": "MiniMax M1 ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Explain why radioactive decay is described as \"random but predictable.\" (2 steps)", "answer": "- Step 1: **Random** = For ANY individual nucleus, you cannot predict WHEN it will decay or IF it will decay in the next moment. Each unstable nucleus has the same probability of decaying per unit time, but chance determines exactly when.\n\n- Step 2: **Predictable** = For a LARGE population of nuclei, the statistical behaviour is highly predictable. The half-life is constant and reproducible—every sample of carbon-14 has the same 5730-year half-life. With millions of nuclei, the average decay rate (activity) follows a precise exponential curve.\n\n+ Philosophical insight: Random at the individual level, deterministic at the population level—the same mathematics that governs radioactive decay also applies to insurance statistics and diffusion.", "source": "MiniMax M1 ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Why is carbon-14 dating limited to relatively young specimens (tens of thousands of years), while uranium-lead dating can date rocks billions of years old? (2 steps)", "answer": "- Step 1: Carbon-14 has a half-life of ~5730 years. After ~5-6 half-lives (~30,000 years), so little $^{14}$C remains that it's barely detectable above background. The uncertainty becomes huge.\n\n- Step 2: Uranium-238 has a half-life of ~4.5 billion years—far longer. This allows dating of geological timescales (Earth is ~4.5 billion years). The very long half-life means the decay rate is slow, but there are still measurable amounts of both parent uranium and daughter lead after billions of years.\n\n+ Key principle: Match the half-life to the timescale. Short half-lives for recent events; long half-lives for ancient events. If the half-life is too short compared to the object's age, all the parent has already decayed.", "source": "MiniMax M1 ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "In radiotherapy, how are gamma beams directed at a tumour while minimising damage to healthy tissue? (2 steps)", "answer": "- Step 1: Multiple gamma beams are directed at the tumour from **different angles** around the patient's body. Each individual beam passes through healthy tissue, but the dose is low (spread over a large volume).\n\n- Step 2: All beams **converge at the tumour** from different directions, depositing a high, lethal dose precisely at the cancer while keeping the total dose to any piece of healthy tissue below the damage threshold. This is like focusing multiple flashlight beams through different windows onto one spot.\n\n+ Real-world note: Modern techniques use CT/MRI imaging to precisely target the tumour in 3D, and the treatment couch rotates while the gantry stays fixed.", "source": "MiniMax M1 ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "A patient receives a radioactive iodine tracer for thyroid imaging. The tracer is iodine-131, which emits both beta and gamma radiation. Why is gamma radiation better for diagnostic imaging, while beta would be harmful inside the body? (3 steps)", "answer": "- Step 1: For **diagnostic imaging** (seeing where the tracer went), you need radiation that can exit the body and reach the external detector. Gamma rays are highly penetrating—they pass through body tissues and can be detected outside.\n\n- Step 2: **Beta particles** are stopped within a few millimetres of tissue. If emitted inside the body, they deposit all their energy locally, causing intense ionisation and tissue damage to whatever cells are nearby—the thyroid in this case.\n\n- Step 3: Ideal medical tracers are **gamma emitters with short half-lives**: gamma escapes the body for imaging; short half-life means radioactivity clears quickly, minimising dose. Iodine-131 is actually less ideal (beta emission) compared to technetium-99m, but was historically used.", "source": "MiniMax M1 ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Explain why a smoke detector uses an alpha source (americium-241) rather than a beta or gamma source. (2 steps)", "answer": "- Step 1: The smoke detector works by **ionising air** in a small chamber. Alpha particles are highly ionising—perfect for creating a steady ion current in the air chamber.\n\n- Step 2: Alpha's very short range is actually an advantage here: the source is sealed inside the detector, and the alpha particles cannot escape the casing. If beta or gamma were used, they would penetrate the casing (gamma) or cause different ionisation patterns (beta). Additionally, alpha is the cheapest and simplest for this application.\n\n+ Safety note: The alpha source is sealed and shielded by the plastic case—safe in normal use. Only if the detector is dismantled would there be a contamination risk.", "source": "MiniMax M1 ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Why is beta radiation used in thickness gauges for paper and foil production, rather than alpha or gamma? (2 steps)", "answer": "- Step 1: **Alpha** is stopped by even a thin sheet of paper—it cannot penetrate through the material being measured. You wouldn't detect anything on the other side.\n\n- Step 2: **Gamma** is too penetrating—most gamma photons pass straight through thin materials regardless of thickness, so there's little change in intensity to measure. **Beta** (especially high-energy beta) has moderate penetration: the amount absorbed depends sensitively on material thickness. This allows precise control.\n\n+ Practical: A beta source and detector on opposite sides of the material; as thickness increases, more beta is absorbed, reducing count rate. This signal feeds back to adjust the rollers in real time.", "source": "MiniMax M1 ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "What is PET scanning, and why does it require positron-emitting isotopes? How does it produce images? (3 steps)", "answer": "- Step 1: **PET = Positron Emission Tomography**. The patient is injected with a positron-emitting tracer (e.g., fluorine-18 labelled to glucose).\n\n- Step 2: The emitted **positron** travels a short distance, then annihilates when it meets an electron. This annihilation produces **two gamma photons** travelling in exactly opposite directions (180° apart).\n\n- Step 3: Detectors around the ring pick up the simultaneous gamma pairs. By tracing back along the line connecting the detection points, the computer builds a 3D image showing where the tracer accumulated (e.g., high glucose uptake in tumours). The \"coincidence detection\" gives excellent spatial resolution.\n\n+ Unique: PET is the only modality that detects positrons—other scans use gamma emission or X-ray attenuation directly.", "source": "MiniMax M1 ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Distinguish between fission and fusion. In terms of energy release per kilogram and radioactive waste, which is \"cleaner,\" and why? (3 steps)", "answer": "- Step 1: **Nuclear fission** = splitting a heavy nucleus (U-235, Pu-239) into two medium nuclei, releasing 2-3 neutrons and energy. Example: $^{235}$U + n → $^{236}$U* → fission fragments + energy + neutrons.\n\n- Step 2: **Nuclear fusion** = joining two light nuclei (e.g., deuterium + tritium → helium + neutron + energy). Requires extreme temperature/pressure to overcome electrostatic repulsion.\n\n- Step 3: **Fusion is \"cleaner\"**: roughly 4× more energy per kilogram than fission; produces helium (inert, non-radioactive) instead of fission fragments; the small amount of radioactive tritium fuel decays relatively quickly. Fission produces long-lived radioactive waste (thousands of years). Fusion has no chain reaction risk and no weapons-grade materials.", "source": "MiniMax M1 ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In a nuclear reactor, what is the purpose of: (a) the moderator, (b) the control rods, (c) the coolant? (3 steps)", "answer": "- Step 1: **(a) Moderator** (graphite or water): Slows down the fast neutrons produced by fission to \"thermal neutrons\" (~room temperature energy). Thermal neutrons are much more likely to cause fission in U-235—fast neutrons mostly pass through without reacting.\n\n- Step 2: **(b) Control rods** (boron or cadmium): Absorb neutrons. Raised or lowered to control the chain reaction rate. Insert fully to shut down the reactor; withdraw partially to increase power. They REMOVE neutrons from the system.\n\n- Step 3: **(c) Coolant** (pressurised water, liquid sodium): Carries away the heat generated by fission, transferring it to a secondary loop to make steam for turbines. Without cooling, the core would overheat and melt.\n\n+ Key: Moderator SLOWS neutrons; control rods ABSORB neutrons; coolant REMOVES HEAT. All three are essential for controlled, safe power generation.", "source": "MiniMax M1 ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "What is a chain reaction in the context of nuclear fission? Why must the reactor be \"exactly critical\"—not subcritical or supercritical? (3 steps)", "answer": "- Step 1: A **chain reaction** occurs when neutrons from one fission event cause additional fissions in nearby fuel nuclei, releasing more neutrons, which cause more fissions, and so on. One fission can cascade into millions.\n\n- Step 2: The **reproduction factor (k)** describes the average number of neutrons from each fission that cause another fission:\n  - **k < 1 (subcritical)**: Reaction dies out—too many neutrons lost\n  - **k = 1 (critical)**: Steady, controlled power—each fission produces exactly one further fission\n  - **k > 1 (supercritical)**: Exponential growth—uncontrolled, explosive (a nuclear bomb)\n\n- Step 3: A power reactor must operate **exactly critical (k = 1)** for steady, sustainable power output. Control rods maintain this balance by absorbing just enough neutrons to keep k = 1.", "source": "MiniMax M1 ②", "_id": "minimax_2_21", "judge_pick": true}, {"question": "Use the mass-energy equivalence (E = mc²) to explain why a tiny mass loss in nuclear reactions releases enormous amounts of energy. Calculate the energy released if 1 kg of uranium-235 undergoes complete fission, given c = 3 × 10⁸ m/s. (3 steps)", "answer": "- Step 1: **E = mc²** means mass and energy are equivalent. A small mass loss (Δm) converts to a huge amount of energy (E) because c² is enormous: (3 × 10⁸)² = 9 × 10¹⁶ m²/s².\n\n- Step 2: For 1 kg of uranium fissioned, the mass deficit is roughly 0.1% of the original mass (about 1 gram). Using E = mc²:\n  E = 0.001 kg × (3 × 10⁸ m/s)² = 0.001 × 9 × 10¹⁶ J = 9 × 10¹³ J\n\n- Step 3: That's approximately **90 TJ (terajoules)**—equivalent to about 21,000 tonnes of TNT or the energy from burning 2.5 million tonnes of coal. One kilogram of uranium releases about as much energy as 10,000 tonnes of oil. This is why nuclear energy is ~million times more dense than chemical energy.\n\n+ Compare: Chemical reactions (burning coal) convert ~10⁻⁹ kg per kg into energy (~10⁻⁹ × c²). Nuclear fission converts ~10⁻³ kg per kg—about a million times more.", "source": "MiniMax M1 ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Write the fusion reaction between deuterium and tritium, and identify what is produced besides energy. Why is this reaction particularly attractive for future power generation? (2 steps)", "answer": "- Step 1: The deuterium-tritium fusion reaction is:\n$$^{2}_{1}\\text{H} + ^{3}_{1}\\text{H} \\rightarrow ^{4}_{2}\\text{He} + ^{1}_{0}n + \\text{energy}$$\n\n- Step 2: Products: **Helium-4** (an alpha particle, completely inert and safe) + **one fast neutron** + energy. The helium poses no radioactive hazard; the neutron activates some reactor materials but far less than fission waste.\n\n+ Attractive for power: Abundant fuel (deuterium from seawater, tritium bred from lithium); no long-lived radioactive waste; no chain reaction risk (reaction stops if plasma cools); impossible to make weapons from power plant output. Still technically challenging—achieving and maintaining the 100 million°C plasma required.", "source": "MiniMax M1 ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "Why can't we use the naturally abundant uranium-238 (U-238) directly as fuel in a thermal neutron reactor, but uranium-235 can fission with thermal neutrons? (2 steps)", "answer": "- Step 1: **U-235** absorbs a thermal (slow) neutron, becomes U-236* (excited), and splits (fissions) with high probability. This is why U-235 is \"fissile.\"\n\n- Step 2: **U-238** absorbs a thermal neutron but does NOT fission—instead it becomes U-239, which then undergoes beta decay to plutonium-239 (Pu-239). Pu-239 IS fissile, so it can be \"bred\" and used as fuel, but U-238 itself cannot sustain a chain reaction with thermal neutrons. U-238 is \"fissionable but not fissile.\"\n\n+ Practical: Natural uranium is only 0.7% U-235. Reactors use enriched uranium (3-5% U-235) to ensure enough U-235 fissions. The \"spent fuel\" still contains U-238 and generated Pu-239.", "source": "MiniMax M1 ②", "_id": "minimax_2_24", "judge_pick": true}, {"question": "A radioactive source has a half-life of 30 years. In year 2020, its activity was measured at 1000 Bq. What will be its activity in year 2050? In year 2120? (3 steps)", "answer": "- Step 1: Half-life = 30 years. Each 30-year period halves the activity.\n\n- Step 2: 2020 → 2050 is 30 years (1 half-life):\n  Activity = 1000 Bq ÷ 2 = **500 Bq**\n\n- Step 3: 2020 → 2120 is 100 years (100 ÷ 30 ≈ 3.33 half-lives):\n  - After 1 half-life (30 yrs): 1000 → 500\n  - After 2 half-lives (60 yrs): 500 → 250\n  - After 3 half-lives (90 yrs): 250 → 125\n  - After ~3.33 half-lives: between 125 Bq and 62.5 Bq, roughly **~80-90 Bq**\n\n+ Note: We can calculate exactly using exponential decay: A = A₀ × (1/2)^(t/t½) = 1000 × (1/2)^(100/30) ≈ 1000 × 0.095 ≈ 95 Bq", "source": "MiniMax M1 ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "In a smoke detector, americium-241 decays by alpha emission (half-life 432 years). Why is this alpha source safe inside the detector, but would be dangerous if the detector were dismantled and the source inhaled? (2 steps)", "answer": "- Step 1: **Inside the sealed detector**: The alpha particles are contained by the plastic casing—they cannot penetrate it. The source is sealed, and the radiation stays inside. No contamination, no exposure.\n\n- Step 2: **If dismantled and inhaled**: Alpha is the most ionising radiation. If radioactive atoms get inside your body (inhaled, ingested, or in a wound), the alpha particles deposit all their energy directly into nearby cells, causing severe, concentrated damage. The dead cells can't \"wash away\" the radiation—it's physically there. Additionally, americium-241 has a 432-year half-life, so it remains radioactive for centuries inside your body.\n\n+ Critical principle: **Internal contamination** (radioactive material inside you) is far more dangerous than **external exposure** (radiation passing through from outside) because the radiation source is right next to your cells.", "source": "MiniMax M1 ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "Why do nuclear power plants require thick concrete containment buildings, while coal-fired plants do not? (2 steps)", "answer": "- Step 1: Nuclear reactors contain **highly radioactive materials**: fission products (short-lived but intensely radioactive), transuranic elements, and fuel. These emit alpha, beta, and gamma radiation. Uncontrolled release would contaminate the environment.\n\n- Step 2: The **containment building** provides:\n  - Biological shielding (thick concrete) to protect workers and public from gamma/neutron radiation\n  - Physical barrier to prevent release of radioactive gases/aerosols\n  - Redundancy against accidents (e.g., loss-of-coolant, hydrogen explosion)\n\n+ Coal plants: They burn chemical fuel (carbon)—no radioactive material is created or handled. Even the ash contains only trace natural radioactivity (from uranium/thorium in coal), orders of magnitude less than a reactor.", "source": "MiniMax M1 ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Compare the radiation dose from: (a) a typical chest X-ray (~0.1 mSv), (b) a CT scan (~10 mSv), (c) background radiation (~3 mSv/year), (d) the nuclear industry dose limit (20 mSv/year). Rank them from lowest to highest dose. (2 steps)", "answer": "- Step 1: Convert all to millisieverts (mSv):\n  - Chest X-ray: 0.1 mSv\n  - Background: ~3000 μSv/year = 3 mSv/year\n  - CT scan: 10 mSv\n  - Nuclear limit: 20 mSv/year\n\n- Step 2: **Ranking (lowest to highest)**:\n  1. Chest X-ray (0.1 mSv)\n  2. Background radiation (3 mSv/year)\n  3. CT scan (10 mSv)\n  4. Nuclear industry limit (20 mSv/year)\n\n+ Insight: One CT scan (~10 mSv) delivers roughly 3× your annual background dose in seconds. Medical imaging is the largest artificial source of radiation exposure for most people. The dose limit for nuclear workers (20 mSv) is set ~6× above background to allow useful work while keeping risk low.", "source": "MiniMax M1 ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "Why must radioactive waste from nuclear reactors be stored for thousands of years, while the waste from a hospital using radioisotopes for diagnostics can be disposed of after a few days? (2 steps)", "answer": "- Step 1: **Reactor waste** contains fission products and transuranic elements (plutonium, americium). Many of these have **very long half-lives** (e.g., Pu-239 = 24,100 years, Cs-137 = 30 years). They remain hazardous for thousands of years until they decay to safe levels.\n\n- Step 2: **Medical diagnostic tracers** (e.g., Tc-99m, half-life 6 hours; I-131, half-life 8 days) have **short half-lives**. After waiting a few days to weeks (several half-lives), the activity drops to negligible levels—the waste is simply safe to discard. They decay away completely.\n\n+ Key: The disposal method depends entirely on half-life. Long half-life = long storage; short half-life = quick decay to background.", "source": "MiniMax M1 ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "What is \"enriched uranium,\" and why is enrichment necessary for most commercial reactors? What enrichment level is typically used? (2 steps)", "answer": "- Step 1: Natural uranium is only **0.7% U-235** (the fissile isotope); the rest is U-238. Most reactors need a higher proportion of U-235 to sustain a chain reaction with thermal neutrons.\n\n- Step 2: **Enrichment** increases the U-235 concentration to typically **3-5%** for commercial power reactors. This is enough to maintain criticality with a moderator. Weapons-grade uranium is >90% U-235.\n\n+ Note: Enrichment is technically challenging (gaseous diffusion, centrifuges) because U-235 and U-238 are chemically identical—only the small mass difference allows separation.", "source": "MiniMax M1 ②", "_id": "minimax_2_30", "judge_pick": true}, {"question": "In the Sun, hydrogen nuclei fuse into helium. Why does this require temperatures of ~15 million degrees Celsius, and why can't we achieve this at room temperature? (2 steps)", "answer": "- Step 1: Fusion requires two positively charged nuclei to get close enough for the **strong nuclear force** to overcome electrostatic repulsion. At room temperature, atoms (including their nuclei) are too slow—electrostatic repulsion keeps them apart.\n\n- Step 2: At ~15 million °C, nuclei have enormous kinetic energy (thermal motion). This allows them to overcome the Coulomb barrier and collide with enough energy for fusion to occur. On Earth, achieving and maintaining such temperatures (plasma confinement) is the central challenge of fusion research.\n\n+ Quantum tunnelling helps at lower temperatures, but still requires extreme conditions for significant reaction rates.", "source": "MiniMax M1 ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "A Geiger-Müller tube reads 200 cpm with a source, and 30 cpm with the source removed (background). After 6 hours, the same source gives a reading of 100 cpm (background still 30 cpm). Has the source's half-life elapsed? Explain. (3 steps)", "answer": "- Step 1: Initial corrected count = 200 - 30 = **170 cpm**. After 6 hours: 100 - 30 = **70 cpm**.\n\n- Step 2: The ratio is 170 → 70, which is roughly 170/70 ≈ 2.4. This is NOT exactly halved (which would be 85 cpm), but close.\n\n- Step 3: If exactly one half-life (t½) had passed, the activity would have halved. The result of ~70 cpm is close to half of 170 cpm, suggesting **approximately one half-life has elapsed**. The small discrepancy could be due to counting statistics (random error in GM measurements) or a slightly different half-life.\n\n+ Insight: GM tube measurements have inherent statistical uncertainty (±√N), so exact halving is rare. You need many counts for accuracy.", "source": "MiniMax M1 ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "If you discovered a material that had zero activity above background after a week, what can you infer about its half-life? What if it still showed activity after a year? (2 steps)", "answer": "- Step 1: If a sample becomes indistinguishable from background after **one week**, its half-life must be **very short**—on the order of days or less. After 5-6 half-lives (~one week), activity is <3% of original. Likely the isotope has a half-life of ≤1-2 days.\n\n- Step 2: If activity is still measurable above background after **one year**, the half-life must be **at least several months to years**. For an isotope to survive a year with measurable activity, its half-life is likely >>1 year. (If it were shorter, it would have decayed away.)\n\n+ Key inference: The time it takes for activity to drop to negligible levels gives a rough estimate of the half-life—shorter observable activity → shorter half-life.", "source": "MiniMax M1 ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "Contrast radiotherapy (treating cancer with radiation) with the mechanism by which radiation causes cancer. How can the same agent (ionising radiation) be used to both cause and cure cancer? (2 steps)", "answer": "- Step 1: **Radiation causes cancer** by ionising DNA, causing mutations. If a mutation activates an oncogene or disables a tumour suppressor gene, the cell may divide uncontrollably → cancer. This is a stochastic (probabilistic) effect—higher dose = higher probability.\n\n- Step 2: **Radiation treats cancer** by exploiting the fact that rapidly dividing cancer cells are more sensitive to DNA damage than most healthy cells. High, focused doses of radiation cause so much DNA damage in tumour cells that they undergo apoptosis (cell death) or lose reproductive ability. Healthy cells can repair better or are in the lower-dose regions.\n\n+ Paradox: Both rely on DNA damage, but controlled, targeted, high-dose radiation kills tumours; uncontrolled, whole-body, low-dose radiation may cause tumours. Dose, fractionation, and precise targeting are everything.", "source": "MiniMax M1 ②", "_id": "minimax_2_34", "judge_pick": true}, {"question": "Why is it important that the tracer isotope used in medical imaging has a short half-life? Give an example of such an isotope and its half-life. (2 steps)", "answer": "- Step 1: A **short half-life** means:\n  - The isotope decays quickly after the procedure, minimising the patient's radiation dose\n  - High activity can be administered initially (since it will decay away fast)\n  - The patient doesn't walk around radioactive after leaving the hospital\n\n- Step 2: Example: **Technetium-99m** (Tc-99m) is the most common medical tracer. Half-life = **6 hours**. After 24 hours (~4 half-lives), activity is down to <6% of the initial dose—essentially background.\n\n+ Other examples: Fluorine-18 (110 minutes), Iodine-123 (13 hours), Carbon-11 (20 minutes). All are produced in cyclotrons on-site because they can't be stored.", "source": "MiniMax M1 ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In a nuclear fission reaction of U-235, what happens to the total mass of the system after the reaction compared to before? Where does the released energy come from? (2 steps)", "answer": "- Step 1: The **total mass after fission is less** than the mass before. The daughter nuclei + neutrons together weigh slightly less than the original uranium nucleus + the neutron that triggered fission. This mass difference (Δm) is called the **mass defect**.\n\n- Step 2: This lost mass is converted to energy via **E = mc²**. The energy is released as kinetic energy of the fission fragments (heat), gamma rays, and neutron kinetic energy. This is why nuclear reactions release millions of times more energy than chemical reactions—the \"missing mass\" represents binding energy released when nucleons rearrange into more stable configurations.\n\n+ Note: Mass is not \"lost\" in a conservation sense—it is converted to energy. The total (mass + energy converted to mass-equivalent) is conserved.", "source": "MiniMax M1 ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Why are fast neutrons from fission not very effective at causing further fission in U-235, and how does the moderator solve this problem? (2 steps)", "answer": "- Step 1: Fast neutrons (produced at ~2 MeV energy) have such high velocity that when they approach a U-235 nucleus, the **interaction time is too short**. They are more likely to pass right through the nucleus without being absorbed and causing fission—they have a low fission cross-section for U-235.\n\n- Step 2: The **moderator** (graphite or water) works by scattering collisions: neutrons bounce off moderator atoms, losing energy with each collision. After many collisions, they slow down to \"thermal\" energies (~0.025 eV). At thermal energies, the fission cross-section for U-235 is enormously higher—a thermal neutron is far more likely to be absorbed and cause fission.\n\n+ Key: It's not about more neutrons—it's about making each neutron more \"effective\" at causing fission.", "source": "MiniMax M1 ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "Explain why gamma sterilisation of medical equipment does not make the equipment radioactive, but can still kill bacteria. (2 steps)", "answer": "- Step 1: Gamma rays are **high-energy photons**, not particles that can become embedded in material. They pass through the equipment, transferring energy to atoms they encounter via ionisation and excitation—but they don't leave any radioactive atoms behind. When the gamma source is removed, the equipment is completely safe.\n\n- Step 2: The gamma radiation still **kills bacteria** because it ionises molecules in the microorganisms' DNA and cellular structures, causing fatal damage. The mechanism is radiation damage to biological molecules, not contamination. This is **irradiation** (external radiation), not **contamination** (radioactive material deposited).\n\n+ Key difference: The gamma source is external and stays external. The equipment never touches the radioactive material—it only experiences radiation passing through.", "source": "MiniMax M1 ②", "_id": "minimax_2_38", "judge_pick": false}], "count": 39}}, "meta": {"gemini_1": {"run": 1, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.7, "in_tokens": 7633, "out_tokens": 9065, "reasoning_chars": 0, "cost_eur": 0.0922, "elapsed_s": 95, "content_chars": 37635}, "gemini_2": {"run": 2, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.8, "in_tokens": 7633, "out_tokens": 6908, "reasoning_chars": 0, "cost_eur": 0.0723, "elapsed_s": 65, "content_chars": 27711}, "gemini_3": {"run": 3, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.85, "in_tokens": 0, "out_tokens": 0, "cost_eur": 0.0, "elapsed_s": 0, "content_chars": 46970}, "gemini_4": {"run": 4, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.9, "in_tokens": 0, "out_tokens": 0, "cost_eur": 0.0, "elapsed_s": 0, "content_chars": 32353}, "gflash_1": {"run": 1, "provider": "gflash", "model": "gemini-2.5-flash", "display": "Gemini 2.5 Flash", "temperature": 0.7, "in_tokens": 0, "out_tokens": 0, "cost_eur": 0.0, "elapsed_s": 0, "content_chars": 70854}, "gflash_2": {"run": 2, "provider": "gflash", "model": "gemini-2.5-flash", "display": "Gemini 2.5 Flash", "temperature": 0.85, "in_tokens": 0, "out_tokens": 0, "cost_eur": 0.0, "elapsed_s": 0, "content_chars": 72751}, "glm_1": {"run": 1, "provider": "glm", "model": "glm-4.5-flash", "display": "GLM 4.5 Flash", "temperature": 0.7, "in_tokens": 7597, "out_tokens": 16000, "reasoning_chars": 57034, "cost_eur": 0.0, "elapsed_s": 228, "content_chars": 14736}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 7596, "out_tokens": 13710, "reasoning_chars": 27139, "cost_eur": 0.0515, "elapsed_s": 431, "content_chars": 30495}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 7596, "out_tokens": 8728, "reasoning_chars": 34813, "cost_eur": 0.0354, "elapsed_s": 140, "content_chars": 1473}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 7377, "out_tokens": 15011, "reasoning_chars": 1851, "cost_eur": 0.0165, "elapsed_s": 239, "content_chars": 65357}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 7377, "out_tokens": 11678, "reasoning_chars": 2097, "cost_eur": 0.0132, "elapsed_s": 200, "content_chars": 47274}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 7648, "out_tokens": 3527, "reasoning_chars": 4620, "cost_eur": 0.0053, "elapsed_s": 61, "content_chars": 9637}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 7648, "out_tokens": 3904, "reasoning_chars": 3723, "cost_eur": 0.0057, "elapsed_s": 71, "content_chars": 12210}}};
const SK='gcse_ch06_cards';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}
