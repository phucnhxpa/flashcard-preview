<script>
const DATA={"selected": [{"id": "gemini_1_23", "question": "What is meant by the 'random nature' of radioactive decay? Does this randomness mean the decay of a large sample of atoms is unpredictable? (2 steps)", "answer": "- Step 1: The random nature of decay means that for any single unstable nucleus, it is impossible to predict *when* it will decay. Every nucleus in a sample has the same probability of decaying in the next second, regardless of how old it is. It's like rolling a dice for each atom every instant.\n- Step 2: No, for a large sample containing billions of atoms, the randomness averages out to produce a very predictable overall behaviour. While we can't predict individual decays, we can predict with great accuracy what fraction of the entire sample will decay in a given time. This predictability is described by the concept of half-life.", "source": "Gemini 2.5 Pro ①", "blind_id": 3}, {"id": "gemini_4_8", "question": "What is radioactive decay, and what is the fundamental reason an atomic nucleus undergoes this process?", "answer": "Radioactive decay is the spontaneous and random process where an **unstable atomic nucleus** emits energy and/or particles (radiation) to transform into a more stable configuration.\n\nThe fundamental reason for this is an **imbalance within the nucleus**.\n- Nuclei are held together by the strong nuclear force, but the protons also repel each other via the electrostatic force.\n- If a nucleus has too many neutrons, too few neutrons, or is simply too large overall, these forces are out of balance, making the nucleus unstable.\n- To reach a more stable, lower-energy state, the nucleus ejects particles or energy. This often changes the number of protons, transmuting the atom into a different element.", "source": "Gemini 2.5 Pro ④", "blind_id": 4}, {"id": "gemini_3_46", "question": "A decay curve graph plots the activity (or count rate) of a sample on the y-axis against time on the x-axis. How would you use this graph to find the half-life of the isotope? (2 steps)", "answer": "- Step 1: Read the initial activity of the sample from the graph at time $$t=0$$. Let's call this value $$A_0$$.\n- Step 2: Calculate half of this initial activity ($$A_0 / 2$$). Find this value on the y-axis, then move horizontally across to the decay curve and then vertically down to the x-axis. The time value you read from the x-axis at this point is the half-life ($$t_{1/2}$$). You can verify this by starting at any point on the curve, halving its activity, and checking if the time elapsed is the same.", "source": "Gemini 2.5 Pro ③", "blind_id": 6}, {"id": "gemini_1_11", "question": "What are the four main types of nuclear radiation emitted from an unstable nucleus?", "answer": "The four main types are:\n1.  **Alpha (α) particles:** A helium nucleus ($$2$$ protons, $$2$$ neutrons).\n2.  **Beta (β) particles:** A fast-moving electron ($$\\beta^-$$) or positron ($$\\beta^+$$).\n3.  **Gamma (γ) rays:** High-energy electromagnetic radiation (a photon).\n4.  **Neutrons:** An individual neutron ejected from the nucleus.", "source": "Gemini 2.5 Pro ①", "blind_id": 10}, {"id": "gemini_4_4", "question": "How does the Bohr model of the atom refine Rutherford's nuclear model, and what phenomenon does it explain?", "answer": "The Bohr model refines Rutherford's nuclear model by adding a crucial rule for the electrons: **electrons can only orbit the nucleus in specific, fixed energy levels or \"shells.\"** They cannot exist in the spaces between these levels.\n\nThis refinement was brilliant because it explained the phenomenon of **atomic emission and absorption spectra**.\n-   **Absorption:** An electron can absorb a photon of light and jump *up* to a higher energy level, but only if the photon's energy exactly matches the energy gap between the two levels.\n-   **Emission:** An excited electron in a high energy level will eventually fall back *down* to a lower one, releasing the energy difference as a photon of light with a very specific energy (and therefore a specific colour), creating the characteristic line spectrum for that element.\n\nRutherford's model had no such rules for electrons and couldn't explain why atoms only emit or absorb specific colours of light.", "source": "Gemini 2.5 Pro ④", "blind_id": 11}, {"id": "gemini_4_17", "question": "A radioactive isotope has a half-life of 10 years. If a sample currently has an activity of 400 Bq, what will its activity be in 30 years? (3 steps)", "answer": "- Step 1: **Determine the number of half-lives.** The total time is 30 years, and one half-life is 10 years. The number of half-lives is:\n    $$ \\text{Number of half-lives} = \\frac{\\text{Total time}}{\\text{Half-life}} = \\frac{30 \\text{ years}}{10 \\text{ years}} = 3 $$\n- Step 2: **Calculate the activity after each half-life.** The activity halves for each half-life that passes.\n    + **After 1st half-life (10 years):** Activity = $$400 \\text{ Bq} \\div 2 = 200 \\text{ Bq}$$\n    + **After 2nd half-life (20 years):** Activity = $$200 \\text{ Bq} \\div 2 = 100 \\text{ Bq}$$\n    + **After 3rd half-life (30 years):** Activity = $$100 \\text{ Bq} \\div 2 = 50 \\text{ Bq}$$\n- Step 3: **Final Answer.** After 30 years (which is 3 half-lives), the activity of the sample will be **50 Bq**.", "source": "Gemini 2.5 Pro ④", "blind_id": 12}, {"id": "gemini_3_9", "question": "According to the Bohr model, what must happen for an electron to jump to a higher energy level, and what happens when it falls back down? (2 steps)", "answer": "- Step 1: **Jumping Up (Absorption):** An electron can only jump to a higher energy level (further from the nucleus) if it **absorbs** a photon of electromagnetic radiation. Crucially, the energy of the photon ($$E = hf$$) must be *exactly* equal to the energy difference between the initial and final energy levels. If the photon's energy is too little or too much, it won't be absorbed.\n- Step 2: **Falling Down (Emission):** An electron in a higher, \"excited\" energy level is unstable. It will spontaneously fall back down to a lower, vacant energy level. In doing so, it **emits** a photon of electromagnetic radiation. The energy of this emitted photon is exactly equal to the energy difference between the high and low levels it transitioned between. This is the origin of the characteristic line spectra of elements.", "source": "Gemini 2.5 Pro ③", "blind_id": 14}, {"id": "gemini_2_11", "question": "When a nucleus undergoes alpha decay, how do its mass number ($$A$$) and atomic number ($$Z$$) change? (2 steps)", "answer": "- Step 1: During alpha decay, the nucleus emits an alpha particle, which consists of 2 protons and 2 neutrons. This means the nucleus loses $$4$$ nucleons in total. Therefore, the **mass number ($$A$$) decreases by 4**.\n- Step 2: The nucleus also loses 2 protons. Since the atomic number ($$Z$$) is the count of protons, the **atomic number ($$Z$$) decreases by 2**.\n\nThis changes the element. The general equation is: $$^{A}_{Z}X \\rightarrow {}^{A-4}_{Z-2}Y + {}^{4}_{2}\\alpha$$", "source": "Gemini 2.5 Pro ②", "blind_id": 21}, {"id": "gemini_3_7", "question": "How does an **isotope** of an element differ from an **ion** of the same element?", "answer": "The difference lies in which subatomic particles are gained or lost.\n- An **isotope** is defined by a change in the **nucleus**. Specifically, it involves a different number of **neutrons**. The number of protons and electrons (in a neutral atom) remains the same, so the element's identity and chemical properties are unchanged, but its mass and nuclear stability can differ.\n- An **ion** is defined by a change in the **electron cloud**. It is formed when a neutral atom gains or loses one or more **electrons**. This gives the atom a net electrical charge (negative if electrons are gained, positive if lost) and dramatically changes its chemical reactivity, but the nucleus (protons and neutrons) is completely unaffected.\n\n**Takeaway:** Isotopes are about nuclear composition (neutrons), while ions are about electrical charge (electrons).", "source": "Gemini 2.5 Pro ③", "blind_id": 23}, {"id": "gemini_2_15", "question": "Rank alpha, beta, and gamma radiation by their ionising power (from most to least) and their penetrating power (from most to least). Explain the inverse relationship between these two properties. (3 steps)", "answer": "- Step 1: **Ionising Power:** Alpha > Beta > Gamma.\n    + Alpha particles are large and have a +2 charge, so they interact strongly with atoms they pass, knocking off electrons easily. Beta particles are smaller and have a -1 charge, interacting less strongly. Gamma rays have no charge and interact least of all.\n- Step 2: **Penetrating Power:** Gamma > Beta > Alpha.\n    + Alpha particles lose their energy very quickly through intense ionisation, so they are stopped by paper or a few cm of air. Beta particles penetrate further, stopped by a few mm of aluminium. Gamma rays are highly penetrating and require thick lead or concrete to be significantly absorbed.\n- Step 3: **The Inverse Relationship:** High ionising power means the radiation interacts frequently and strongly with the material it passes through. Each interaction transfers energy from the radiation to the material. Because the energy is lost in many interactions over a short distance, the radiation cannot penetrate very far. Conversely, radiation with low ionising power (like gamma) interacts infrequently, allowing it to travel a long distance through the material before its energy is fully absorbed.", "source": "Gemini 2.5 Pro ②", "blind_id": 26}, {"id": "gemini_3_36", "question": "Why is beta radiation the best choice for a thickness gauge for materials like paper or thin metal foil, compared to alpha or gamma?", "answer": "The choice is about finding a \"just right\" level of penetration.\n- **Alpha radiation is unsuitable** because it is **not penetrating enough**. It would be completely stopped by even the thinnest sheet of paper or foil, so the detector would always read zero, and no change in thickness could be detected.\n- **Gamma radiation is unsuitable** because it is **too penetrating**. Almost all the gamma rays would pass through the thin material unaffected, regardless of small changes in its thickness. The detector would register a nearly constant high count rate, making it insensitive to the very changes it needs to measure.\n- **Beta radiation is ideal** because its **moderate penetrating power** means that a significant, measurable fraction of it is absorbed by the material. This makes the count rate at the detector highly sensitive to small variations in the material's thickness.", "source": "Gemini 2.5 Pro ③", "blind_id": 27}, {"id": "gemini_2_6", "question": "Contrast the \"plum pudding\" model of the atom with the \"nuclear\" model. What key feature is present in one but absent in the other?", "answer": "- **Plum Pudding Model (J.J. Thomson):** This model envisioned the atom as a sphere of diffuse, uniformly distributed positive charge (the \"pudding\") with negatively charged electrons embedded within it (the \"plums\"). There was no concept of a dense central core or empty space.\n- **Nuclear Model (Rutherford):** This model, based on experimental evidence, describes the atom as being mostly empty space. It has a tiny, dense, positively charged **nucleus** at its center, containing all the positive charge and nearly all the mass. The electrons orbit this nucleus at a large distance.\n\nThe key distinguishing feature is the **nucleus**. The nuclear model introduced the idea of a concentrated central mass and charge, which was completely absent in the diffuse plum pudding model.", "source": "Gemini 2.5 Pro ②", "blind_id": 28}, {"id": "gemini_4_21", "question": "What is nuclear fission, and why does it release energy? (2 steps)", "answer": "- Step 1: **The Process.** Nuclear fission is the splitting of a large, unstable atomic nucleus (like Uranium-235) into two smaller, lighter nuclei. This split is typically induced by the nucleus absorbing a neutron. The process also releases two or three additional free neutrons and a huge amount of energy.\n- Step 2: **The Source of Energy ($$E=mc^2$$).** The energy comes from the conversion of a tiny amount of mass into energy. The total mass of the fission products (the two smaller nuclei plus the new neutrons) is slightly *less* than the total mass of the original uranium nucleus and the incident neutron. This \"missing mass\" ($$m$$) has been converted directly into energy ($$E$$) according to Einstein's famous equation, $$E=mc^2$$. Because the speed of light squared ($$c^2$$) is an enormous number, a minuscule amount of mass converts into a massive amount of energy.", "source": "Gemini 2.5 Pro ④", "blind_id": 30}, {"id": "gemini_4_6", "question": "An atom of Carbon-14 is represented as $$^{14}_{6}C$$. How many protons, neutrons, and electrons does a neutral atom of Carbon-14 contain? (3 steps)", "answer": "- Step 1: **Find the number of protons.** The atomic number ($$Z$$) is the bottom number, which is 6. Therefore, there are **6 protons**. This also tells us the element is Carbon.\n- Step 2: **Find the number of neutrons.** The mass number ($$A$$) is the top number, which is 14. The number of neutrons is $$A - Z = 14 - 6 = 8$$. Therefore, there are **8 neutrons**.\n- Step 3: **Find the number of electrons.** For a **neutral** atom, the number of negatively charged electrons must balance the number of positively charged protons. Since there are 6 protons, a neutral Carbon-14 atom has **6 electrons**.", "source": "Gemini 2.5 Pro ④", "blind_id": 31}, {"id": "gemini_3_14", "question": "How is a gamma ray ($$\\gamma$$) fundamentally different from both alpha and beta radiation?", "answer": "The fundamental difference is that gamma radiation is a form of **electromagnetic radiation**, while alpha and beta are **particles**.\n- **Alpha ($$\\alpha$$) and Beta ($$\\beta$$) radiation** consist of particles with mass and charge (a helium nucleus and an electron, respectively).\n- **Gamma ($$\\gamma$$) radiation** is a high-energy photon, a packet of pure energy with no mass and no charge. It is a form of light, just like X-rays or visible light, but with a much higher frequency and energy. Gamma emission doesn't change the number of protons or neutrons in a nucleus; it only releases excess energy, often after a nucleus has undergone alpha or beta decay and is left in an \"excited\" state.", "source": "Gemini 2.5 Pro ③", "blind_id": 34}, {"id": "gemini_1_24", "question": "Define the half-life ($$t_{1/2}$$) of a radioactive isotope.", "answer": "The half-life is the average time it takes for half of the unstable nuclei in a sample of a radioactive isotope to decay. Equivalently, it is the time taken for the activity of the source to fall to half of its initial value. It is a constant value for a given isotope and is not affected by temperature, pressure, or chemical conditions.", "source": "Gemini 2.5 Pro ①", "blind_id": 41}, {"id": "gemini_2_2", "question": "An atom is described by the nuclear notation $$^{A}_{Z}X$$. What do the letters $$A$$, $$Z$$, and $$X$$ represent? (3 steps)", "answer": "- Step 1: **$$X$$** is the chemical symbol for the element. For example, 'He' for Helium or 'U' for Uranium.\n- Step 2: **$$Z$$** is the **atomic number** (or proton number). It represents the number of protons in the nucleus. This number uniquely defines the element. For a neutral atom, $$Z$$ is also the number of electrons.\n- Step 3: **$$A$$** is the **mass number** (or nucleon number). It represents the total number of protons and neutrons in the nucleus ($$A = Z + N$$).", "source": "Gemini 2.5 Pro ②", "blind_id": 42}, {"id": "gemini_3_10", "question": "What is the fundamental difference between the process of **ionisation** and the process of **radioactive decay**?", "answer": "- **Ionisation** is a process that affects the **electron cloud** of an atom. It occurs when an atom gains or loses one or more electrons, resulting in a net electrical charge (an ion). The nucleus of the atom remains completely unchanged. This is fundamentally a chemical-level or electromagnetic interaction.\n- **Radioactive decay** is a process that affects the **nucleus** of an atom. It occurs when an unstable nucleus spontaneously transforms to become more stable, emitting nuclear radiation (like alpha or beta particles) in the process. This often changes the number of protons, transmuting the atom into a different element entirely.\n\n**Takeaway:** Ionisation changes an atom's charge by altering its electrons; radioactive decay changes a nucleus's composition by emitting particles.", "source": "Gemini 2.5 Pro ③", "blind_id": 43}, {"id": "gemini_1_30", "question": "Why is an alpha emitter, like Americium-241, the ideal choice for a domestic smoke detector and not a beta or gamma emitter? (3 steps)", "answer": "- Step 1: **High Ionising Power:** The detector works by using the radiation to ionise air particles between two electrodes, creating a small electric current. Alpha particles are intensely ionising, so a very small source can create a reliable current.\n- Step 2: **Short Range:** Alpha particles have a very short range (a few cm in air). This is a crucial safety feature. The radiation is easily contained within the detector's casing and poses no risk to people in the room.\n- Step 3: **Interaction with Smoke:** Smoke particles are large enough to absorb the alpha particles, interrupting the flow of ions and causing the current to drop, which triggers the alarm. Beta and gamma are much less likely to be stopped by smoke particles, so they would not be effective.", "source": "Gemini 2.5 Pro ①", "blind_id": 44}, {"id": "gemini_2_4", "question": "What is an isotope? Use Carbon-12 ($$^{12}_{6}C$$) and Carbon-14 ($$^{14}_{6}C$$) as examples to explain what is the same and what is different between them. (3 steps)", "answer": "- Step 1: **Definition:** Isotopes are atoms of the same element that have the same number of protons but a different number of neutrons.\n- Step 2: **What is the same?** Both Carbon-12 and Carbon-14 are isotopes of carbon. They both have an atomic number ($$Z$$) of $$6$$, meaning they both have $$6$$ protons and $$6$$ electrons (when neutral). Because their electron structure is the same, they have identical chemical properties.\n- Step 3: **What is different?** They have different mass numbers ($$A$$). Carbon-12 has $$A=12$$, so it has $$12 - 6 = 6$$ neutrons. Carbon-14 has $$A=14$$, so it has $$14 - 6 = 8$$ neutrons. This difference in neutron count makes their nuclei have different masses and, crucially, different levels of stability. Carbon-12 is stable, while Carbon-14 is radioactive.", "source": "Gemini 2.5 Pro ②", "blind_id": 45}, {"id": "gemini_2_22", "question": "What is a nuclear chain reaction, and what is the difference between a \"controlled\" and an \"uncontrolled\" chain reaction?", "answer": "A nuclear chain reaction is a self-sustaining sequence of fissions where the neutrons released from one fission event trigger at least one further fission event.\n- **Controlled Chain Reaction:** This occurs in a nuclear reactor. On average, exactly **one** neutron from each fission event goes on to cause another fission. The rate of energy release is constant and manageable. This is achieved by using control rods to absorb any excess neutrons.\n- **Uncontrolled Chain Reaction:** This occurs in a nuclear weapon. **All** or most of the neutrons released from each fission go on to cause further fissions. The number of fissions grows exponentially and very rapidly, releasing a massive amount of energy in a fraction of a second.", "source": "Gemini 2.5 Pro ②", "blind_id": 50}, {"id": "gemini_3_43", "question": "Describe the main steps that convert the heat generated by nuclear fission in a reactor core into electricity at the power outlet. (4 steps)", "answer": "- Step 1: **Heat Generation:** The fission chain reaction in the reactor core releases an immense amount of thermal energy, making the fuel rods extremely hot.\n- Step 2: **Heat Transfer:** A **coolant** (usually pressurised water) is pumped through the core. It absorbs the heat from the fuel rods and carries it to a heat exchanger (a boiler). Here, the heat is transferred to a separate loop of water, causing it to boil and turn into high-pressure steam.\n- Step 3: **Mechanical Energy:** The high-pressure steam is piped to a **turbine**. The force of the steam pushes against the turbine's blades, causing it to spin at high speed. This converts the thermal energy of the steam into kinetic (rotational) energy.\n- Step 4: **Electrical Energy:** The spinning turbine is connected to a **generator**. The generator uses the principle of electromagnetic induction (spinning a magnet inside coils of wire) to convert the kinetic energy of rotation into electrical energy, which is then sent out to the grid.", "source": "Gemini 2.5 Pro ③", "blind_id": 52}, {"id": "gemini_3_32", "question": "A hospital sterilises a sealed plastic syringe using a strong gamma source. Is the syringe safe to use afterwards, or has it become radioactive? Explain your reasoning.", "answer": "The syringe is **completely safe to use**. This process is an example of **irradiation**, not contamination.\n- **Reasoning:** The gamma rays pass through the packaging and the syringe, killing any bacteria or viruses by damaging their DNA. However, the gamma rays are pure energy; they do not have the ability to make the stable atoms in the plastic syringe become radioactive. Once the gamma source is turned off or removed, the syringe is no longer being exposed to radiation and is simply sterile. It does not emit any radiation itself.", "source": "Gemini 2.5 Pro ③", "blind_id": 57}, {"id": "gemini_2_13", "question": "When a nucleus undergoes beta-minus decay, how do its mass number ($$A$$) and atomic number ($$Z$$) change? (2 steps)", "answer": "- Step 1: During beta-minus decay, a neutron turns into a proton. Since a proton has replaced a neutron, the total number of nucleons (protons + neutrons) remains the same. Therefore, the **mass number ($$A$$) is unchanged**.\n- Step 2: The nucleus has gained one proton. Since the atomic number ($$Z$$) is the count of protons, the **atomic number ($$Z$$) increases by 1**.\n\nThis also changes the element. The general equation is: $$^{A}_{Z}X \\rightarrow {}^{A}_{Z+1}Y + {}^{0}_{-1}\\beta$$", "source": "Gemini 2.5 Pro ②", "blind_id": 65}, {"id": "gemini_1_32", "question": "Explain the basic principle of external radiotherapy for treating cancer. How is damage to healthy tissue minimised? (2 steps)", "answer": "- Step 1: Radiotherapy uses high-energy beams of gamma rays (or X-rays) precisely aimed at a cancerous tumour. The intense dose of ionising radiation is designed to damage the DNA of the cancer cells so severely that they can no longer divide, and they die.\n- Step 2: To minimise damage to surrounding healthy tissue, the radiation is delivered from multiple angles. A machine rotates around the patient, keeping the tumour at the centre of rotation. This means the tumour receives a high dose continuously, while any single area of healthy tissue is only exposed to a fraction of the beam for a short time, allowing it to recover.", "source": "Gemini 2.5 Pro ①", "blind_id": 66}, {"id": "gemini_3_8", "question": "Why do different isotopes of the same element, such as Carbon-12 and Carbon-14, share the same chemical properties?", "answer": "An element's chemical properties—how it bonds, reacts, and forms compounds—are determined almost entirely by the configuration of its **electrons**, particularly the electrons in its outermost energy level. Since all isotopes of an element have the same number of protons, a neutral atom of each isotope will have the same number of electrons to balance the nuclear charge. With identical electron structures, they behave identically in chemical reactions. The extra neutrons in the nucleus of a heavier isotope add mass but do not affect the electron cloud.", "source": "Gemini 2.5 Pro ③", "blind_id": 69}, {"id": "gemini_4_13", "question": "Why are gamma rays often emitted immediately following an alpha or beta decay event?", "answer": "Gamma rays are packets of electromagnetic energy (photons), not particles with mass. After a nucleus undergoes alpha or beta decay, the new \"daughter\" nucleus is often left in an **excited, high-energy state**. It's like a bell that has just been struck; it's still \"ringing\" with excess energy.\n\nTo become fully stable, the nucleus must release this surplus energy. It does so by emitting a gamma ray. This process does not change the number of protons or neutrons, so the element and isotope remain the same. It is simply the nucleus settling down from an excited state to its ground state.\n\n$$^{A}_{Z}X^{*} \\rightarrow {}^{A}_{Z}X + \\gamma$$\n(The `*` denotes an excited nucleus).", "source": "Gemini 2.5 Pro ④", "blind_id": 70}, {"id": "gemini_3_13", "question": "A common misconception is that a beta-minus particle ($$\\beta^{-}$$) is an electron that was already orbiting the nucleus. Why is this incorrect, and where does it actually come from? (2 steps)", "answer": "- Step 1: This is incorrect because beta decay is a **nuclear process**. The electrons orbiting the nucleus are not involved. The energy changes and particle emissions originate from within the nucleus itself.\n- Step 2: A beta-minus particle is a high-speed electron that is **created inside the nucleus** at the moment of decay. It is produced when a **neutron transforms into a proton**. To conserve charge, this transformation also creates a negative electron ($$\\beta^{-}$$) and another particle (an antineutrino), which is then immediately ejected from the nucleus at high speed. The new proton remains in the nucleus, changing the element's atomic number.\n$$n \\rightarrow p^+ + e^- (+ \\bar{\\nu}_e)$$", "source": "Gemini 2.5 Pro ③", "blind_id": 74}, {"id": "gemini_3_30", "question": "At a microscopic level, how does ionising radiation cause damage to living cells?", "answer": "Ionising radiation damages living cells by depositing energy that **knocks electrons out of atoms and molecules**, a process called ionisation. This creates highly reactive ions and free radicals. These can then:\n1.  **Break chemical bonds:** This can damage or destroy important molecules within the cell, such as proteins or lipids in the cell membrane, leading to cell death.\n2.  **Damage DNA:** Most critically, the radiation can cause single or double-strand breaks in the DNA molecule. If the cell's repair mechanisms fail to fix this damage correctly, it can lead to a **mutation**. This mutation may cause the cell to die, or worse, cause it to divide uncontrollably, leading to the formation of a **cancerous tumour**.", "source": "Gemini 2.5 Pro ③", "blind_id": 75}, {"id": "gemini_3_1", "question": "To build an intuitive mental model of an atom's scale, if the nucleus were the size of a football in the center of a stadium, where would the electrons be?", "answer": "If the nucleus were a football in the center of a stadium, the electrons would be orbiting at the outer edges of the stadium itself. The radius of an atom is about 10,000 times larger than the radius of its nucleus ($$r_{atom} \\approx 10^4 \\times r_{nucleus}$$). This analogy highlights the astonishing fact that an atom is almost entirely empty space. The tiny, massive nucleus at the center is responsible for almost all the mass, while the lightweight electrons define its volume.", "source": "Gemini 2.5 Pro ③", "blind_id": 77}, {"id": "glm_1_9", "question": "How does the excitation of an atom differ from ionization, and what are the possible outcomes of each process? (2 steps)", "answer": "- Step 1: Excitation occurs when an electron absorbs energy and jumps to a higher energy level within the same atom, but remains bound to the nucleus. Ionization occurs when an electron gains enough energy to escape the atom completely, creating a free electron and a positive ion.\n- Step 2: The outcome of excitation is typically the emission of electromagnetic radiation as the electron returns to a lower energy level. Ionization results in a charged species (ion) and a free electron, which can participate in chemical reactions or electrical conduction.", "source": "GLM 4.5 Flash ①", "blind_id": 82}, {"id": "gemini_3_37", "question": "What is the fundamental difference between a nuclear reaction (like fission or fusion) and a chemical reaction (like burning fuel)?", "answer": "The fundamental difference lies in which part of the atom is involved and the scale of the energy released.\n- A **chemical reaction** involves the rearrangement of **electrons** in the outer shells of atoms to form or break chemical bonds. The atomic nuclei are completely unchanged. The energy released per atom is relatively small (on the order of electron volts, eV).\n- A **nuclear reaction** involves changes **within the atomic nucleus** itself—either splitting it (fission) or joining it with another (fusion). This can change the element's identity. The energy released is due to the conversion of a small amount of nuclear mass into energy ($$E=mc^2$$) and is about a **million times greater** per atom than in a chemical reaction.", "source": "Gemini 2.5 Pro ③", "blind_id": 86}, {"id": "gemini_3_29", "question": "What is a positron, and how does **beta-plus decay** differ from beta-minus decay? (3 steps)", "answer": "- Step 1: A **positron ($$\\beta^{+}$$ or $$e^{+}$$)** is the **antiparticle** of the electron. It has the same negligible mass as an electron but has an equal and opposite charge, i.e., a charge of **$$+1$$.**\n- Step 2: Beta-plus decay occurs in proton-rich nuclei. A **proton** inside the nucleus transforms into a **neutron** and a **positron**, which is then ejected. $$p^+ \\rightarrow n + e^+ (+ \\nu_e)$$\n- Step 3: This is the opposite of beta-minus decay (where a neutron becomes a proton). As a result, the atomic number ($$Z$$) **decreases by 1** (as a proton is lost), while the mass number ($$A$$) remains **unchanged**. This is used in medical PET scans.", "source": "Gemini 2.5 Pro ③", "blind_id": 91}, {"id": "gemini_3_26", "question": "A common misconception is that if an isotope has a half-life of 10 years, all of it will have decayed after 20 years. Explain why this is incorrect. (2 steps)", "answer": "- Step 1: This is incorrect because the half-life applies to the **remaining undecayed nuclei** at the start of each half-life period. It doesn't mean the whole sample decays in two half-lives.\n- Step 2: Let's follow the decay process:\n    + At time $$t=0$$, we have 100% of the sample.\n    + After one half-life (10 years), 50% of the sample will have decayed, leaving **50%**.\n    + After a second half-life (another 10 years, so 20 years total), half of the *remaining* 50% will decay. Half of 50% is 25%. So, an additional 25% decays, leaving **25%** of the original sample.\n    + The decay is exponential; it approaches zero but never theoretically reaches it.", "source": "Gemini 2.5 Pro ③", "blind_id": 93}, {"id": "gemini_1_27", "question": "What is the critical difference between being **irradiated** and being **radioactively contaminated**? Which is generally more dangerous and why? (3 steps)", "answer": "- Step 1: **Irradiation** is the process of being exposed to radiation from an external source. The source does not touch you. Once you move away from the source (or it is turned off), the exposure stops. The irradiated object does *not* become radioactive itself.\n- Step 2: **Contamination** is when radioactive material (atoms) gets onto or into an object or person (e.g., on skin, clothes, or inhaled). The radioactive material is now physically present and continues to emit radiation.\n- Step 3: **Contamination is generally more dangerous**. An external source irradiates you from a distance, but a contaminant on your skin or inside your body irradiates you at very close range, continuously, until it is removed or decays away. Internal contamination is particularly hazardous as delicate organs are exposed directly.", "source": "Gemini 2.5 Pro ①", "blind_id": 106}, {"id": "gemini_4_23", "question": "In a nuclear fission reactor, what are the distinct roles of the **moderator** and the **control rods**? (2 steps)", "answer": "- Step 1: **Moderator (e.g., water, graphite).** The neutrons released during fission are moving extremely fast. Uranium-235 is much more likely to capture a **slow** neutron and undergo fission. The moderator's job is to **slow down the fast neutrons** by having them collide with the moderator's atoms. This makes the neutrons far more effective at causing subsequent fissions, sustaining the chain reaction.\n- Step 2: **Control Rods (e.g., boron, cadmium).** The control rods' job is to **control the rate of the chain reaction**. They are made of materials that are excellent at absorbing neutrons. By lowering the control rods into the reactor core, they absorb more neutrons, reducing the number available to cause fission and slowing the reaction down. Raising them has the opposite effect. They are used to start up, shut down, and maintain the reactor at a constant power output (criticality).\n\n**Misconception Alert:** The moderator enables the reaction by slowing neutrons, while the control rods control the reaction by absorbing neutrons. They have opposite functions.", "source": "Gemini 2.5 Pro ④", "blind_id": 111}, {"id": "gemini_2_7", "question": "In Rutherford's alpha-scattering experiment, what were the three key observations, and what did each one imply about the structure of the atom? (3 steps)", "answer": "- Step 1: **Observation 1:** Most alpha particles passed straight through the thin gold foil with no deflection.\n    + **Implication:** This suggested that the atom is mostly empty space, not a solid \"pudding.\"\n- Step 2: **Observation 2:** A small number of alpha particles were deflected by a small angle as they passed through the foil.\n    + **Implication:** This suggested there is a concentration of positive charge somewhere in the atom. When a positive alpha particle passed near this region, it was repelled and its path was bent.\n- Step 3: **Observation 3:** A very small number of alpha particles (about 1 in 8000) were deflected by large angles, some even bouncing straight back.\n    + **Implication:** This was the most surprising result. It implied that the positive charge and mass must be concentrated in a tiny, dense core (the nucleus). A direct collision with this nucleus was required to cause such a massive repulsion.", "source": "Gemini 2.5 Pro ②", "blind_id": 115}, {"id": "gemini_1_39", "question": "Compare nuclear fission and fusion in terms of the nuclei involved, the energy released per nucleon, and the radioactive waste produced. (3 steps)", "answer": "- Step 1: **Nuclei Involved:** Fission involves splitting one very large nucleus (e.g., Uranium-235) into two smaller ones. Fusion involves joining two very light nuclei (e.g., hydrogen isotopes like Deuterium and Tritium) to form a slightly heavier one (e.g., Helium).\n- Step 2: **Energy Release:** Both release huge amounts of energy. However, fusion releases significantly *more* energy per nucleon (per unit of mass) than fission.\n- Step 3: **Radioactive Waste:** Fission produces highly radioactive daughter nuclei and other products that remain dangerous for thousands of years, creating a major long-term disposal problem. The main product of fusion (Helium) is not radioactive. While the reactor components can become activated, fusion produces no long-lived high-level waste.", "source": "Gemini 2.5 Pro ①", "blind_id": 116}, {"id": "gemini_1_26", "question": "A radioactive source has an initial activity of 480 Bq. After 30 minutes, its activity is measured to be 60 Bq. What is the half-life of the source? (4 steps)", "answer": "- Step 1: Determine the factor by which the activity has decreased. It has gone from 480 Bq to 60 Bq. The fraction remaining is $$60 / 480 = 1/8$$.\n- Step 2: Work out how many half-lives correspond to a reduction to $$1/8$$.\n    + After 1 half-life: $$1/2$$ remains.\n    + After 2 half-lives: $$1/4$$ remains.\n    + After 3 half-lives: $$1/8$$ remains.\n    So, 3 half-lives have passed.\n- Step 3: The total time for these 3 half-lives to pass was 30 minutes.\n- Step 4: To find the time for one half-life, divide the total time by the number of half-lives: $$t_{1/2} = 30 \\text{ minutes} / 3 = 10 \\text{ minutes}$$.", "source": "Gemini 2.5 Pro ①", "blind_id": 124}, {"id": "gemini_4_19", "question": "Medical tracers are chosen to have specific properties. Why must a tracer used to investigate internal organs be a **gamma emitter** with a **short half-life**? (2 steps)", "answer": "- Step 1: **Why a Gamma Emitter?** The radiation must be able to escape the patient's body to be detected by an external scanner (like a gamma camera).\n    + Alpha radiation is stopped by body tissues immediately, so it would never get out.\n    + Beta radiation is also mostly absorbed by tissues and would not provide a clear signal.\n    + Gamma radiation is highly penetrating, so it can pass through the body to the detector, allowing an image of the organ to be formed. It is also the least ionising, minimising damage to the patient.\n- Step 2: **Why a Short Half-Life?** The tracer needs to be active long enough for the scan to be completed (e.g., a few hours), but it must decay away quickly afterwards. A short half-life ensures that the patient is not exposed to unnecessary radiation for a long time, minimising the risk of tissue damage. A half-life of around 6 hours (like Technetium-99m) is ideal.", "source": "Gemini 2.5 Pro ④", "blind_id": 128}, {"id": "gemini_2_25", "question": "According to Einstein's mass-energy equivalence principle, $$E=mc^2$$, how is energy released in both fission and fusion? (3 steps)", "answer": "- Step 1: **The Principle:** The equation $$E=mc^2$$ states that mass ($$m$$) and energy ($$E$$) are two forms of the same thing and can be converted into one another. The conversion factor is the speed of light squared ($$c^2$$), which is a colossal number ($$\\approx 9 \\times 10^{16}$$). This means a tiny amount of mass can be converted into a huge amount of energy.\n- Step 2: **In Fission:** When a large nucleus like Uranium-235 splits, the total mass of the resulting smaller daughter nuclei and neutrons is **slightly less** than the mass of the original uranium nucleus and the initial neutron. This \"missing\" mass (called the mass defect) has been converted directly into energy according to $$E=mc^2$$.\n- Step 3: **In Fusion:** When two light nuclei like deuterium and tritium fuse, the mass of the resulting helium nucleus and neutron is also **slightly less** than the total mass of the original nuclei. Again, this lost mass is converted into a very large amount of energy.", "source": "Gemini 2.5 Pro ②", "blind_id": 129}, {"id": "gemini_3_0", "question": "Describe the basic structure of an atom, contrasting the properties and locations of its three main subatomic particles. (3 steps)", "answer": "- Step 1: At the center of the atom is the **nucleus**, which is extremely small and dense. It contains two types of particles: **protons**, which have a relative charge of $$+1$$ and a relative mass of $$1$$, and **neutrons**, which have a charge of $$0$$ and a relative mass of $$1$$.\n- Step 2: Because the nucleus contains all the protons and neutrons, it holds nearly all the mass of the atom and has an overall positive charge.\n- Step 3: Orbiting the nucleus at specific distances called **energy levels** are the **electrons**. Electrons are tiny particles with a relative charge of $$-1$$ and a negligible mass (about $$1/2000$$ that of a proton). The volume occupied by the orbiting electrons determines the overall size of the atom, which is mostly empty space.\n\n**Takeaway:** An atom is a positively charged, massive nucleus surrounded by a cloud of light, negatively charged electrons, with most of its volume being empty space.", "source": "Gemini 2.5 Pro ③", "blind_id": 133}, {"id": "gemini_4_24", "question": "What is nuclear fusion, and why are extremely high temperatures and pressures required for it to occur?", "answer": "Nuclear fusion is the process where two light atomic nuclei (like isotopes of hydrogen) are joined, or \"fused,\" together to form a single, heavier nucleus. This process releases even more energy per kilogram of fuel than fission.\n\nExtremely high temperatures and pressures are required to overcome the **electrostatic repulsion** between the nuclei.\n-   All nuclei are positively charged because of their protons.\n-   Like charges repel, so as you try to bring two nuclei close together, they will push each other apart with immense force.\n-   To make them fuse, you must give them enormous kinetic energy (very high temperature) to make them move fast enough to overcome this repulsion and get close enough for the short-range strong nuclear force to take over and pull them together. High pressure helps by confining the nuclei in a small space, increasing the chance of collisions. This is why fusion happens in the core of the Sun.", "source": "Gemini 2.5 Pro ④", "blind_id": 144}, {"id": "gemini_4_15", "question": "You use a Geiger-Müller (GM) tube to measure the radiation from a source and get a reading of 120 counts per minute. You then remove the source and still get a reading of 25 counts per minute. What is this second reading called, and what is the true count rate of the source? (2 steps)", "answer": "- Step 1: **Identify Background Radiation.** The reading of 25 counts per minute, taken without the source present, is the **background radiation**. This is low-level ionising radiation that is always present in the environment from sources like radon gas in the ground, cosmic rays from space, and radioactive elements in food and building materials.\n- Step 2: **Calculate the Corrected Count Rate.** To find the true radiation coming from the source alone, you must subtract the background count rate from the measured count rate.\n    + $$C_{\\text{corrected}} = C_{\\text{measured}} - C_{\\text{background}}$$\n    + $$C_{\\text{corrected}} = 120 \\text{ cpm} - 25 \\text{ cpm} = 95 \\text{ counts per minute (cpm)}$$\n\nThe corrected count rate for the source is 95 cpm. It is essential to perform this correction for any accurate experiment.", "source": "Gemini 2.5 Pro ④", "blind_id": 152}], "models": {"glm_1": {"label": "GLM 4.5 Flash ①", "cards": [{"question": "What is the fundamental structure of an atom, and how do its components compare in terms of size and charge? (3 steps)", "answer": "- Step 1: An atom consists of a tiny, dense nucleus at its center surrounded by electrons in orbitals. The nucleus contains protons and neutrons, while electrons occupy specific energy levels outside the nucleus.\n- Step 2: In terms of size, the atom has a radius of approximately 1×10⁻¹⁰ m, while the nucleus is about 10,000 times smaller (radius ≈ 10⁻¹⁴ m). This means the atom is mostly empty space.\n- Step 3: In terms of charge, the nucleus is positively charged due to protons (+1 each), while electrons have a negative charge (-1 each). In a neutral atom, the number of protons equals the number of electrons, balancing the charges.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "Compare and contrast protons, neutrons, and electrons in terms of their properties and locations within an atom. (3 steps)", "answer": "- Step 1: Protons are positively charged particles (+1 relative charge) found in the nucleus, with a relative mass of 1. They determine the element's identity through the atomic number Z.\n- Step 2: Neutrons are neutral particles (0 relative charge) also found in the nucleus, with a relative mass of 1. They contribute to nuclear stability and mass but do not affect the element's identity.\n- Step 3: Electrons have a negative charge (-1 relative charge) and negligible relative mass (about 1/2000 of a proton's mass). They orbit the nucleus in discrete energy levels, determining the atom's chemical properties but not its nuclear identity.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "Explain how the atomic number (Z) and mass number (A) define an isotope and how they relate to the number of neutrons in a nucleus. (2 steps)", "answer": "- Step 1: The atomic number Z represents the number of protons in a nucleus, which uniquely identifies the element. The mass number A represents the total number of nucleons (protons plus neutrons) in the nucleus.\n- Step 2: Isotopes are atoms of the same element (same Z) with different numbers of neutrons. The number of neutrons N can be calculated as N = A - Z. For example, carbon-12 (¹²₆C) has 6 protons and 6 neutrons, while carbon-14 (¹⁴₆C) has 6 protons and 8 neutrons.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "What is nuclear notation, and how can you determine the number of protons, neutrons, and electrons in a neutral atom from the symbol ²³⁸₉₂U? (3 steps)", "answer": "- Step 1: Nuclear notation uses the format ᴬZX, where X is the element symbol, A is the mass number (top), and Z is the atomic number (bottom). For ²³⁸₉₂U, U is uranium.\n- Step 2: The atomic number Z = 92 tells us there are 92 protons in the nucleus. Since this is a neutral atom, there must also be 92 electrons orbiting the nucleus.\n- Step 3: The mass number A = 238 represents the total number of nucleons (protons + neutrons). Therefore, the number of neutrons is A - Z = 238 - 92 = 146 neutrons.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "How do electrons behave in atoms according to the Bohr model, and what happens when they absorb or emit electromagnetic radiation? (2 steps)", "answer": "- Step 1: In the Bohr model, electrons can only exist in specific energy levels (orbits) at fixed distances from the nucleus. These energy levels are quantized, meaning electrons cannot be between these levels.\n- Step 2: When an electron absorbs a photon with exactly the right energy, it jumps to a higher energy level (excited state). When it falls back to a lower level, it emits a photon with energy equal to the difference between the levels, producing characteristic line spectra for each element.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "Explain the key differences between the plum pudding model, the nuclear model, and the Bohr model of the atom. (3 steps)", "answer": "- Step 1: The plum pudding model (proposed by J.J. Thomson) depicted atoms as a uniform positive \"pudding\" with negatively charged electrons embedded throughout, with no concentrated nucleus.\n- Step 2: The nuclear model (proposed by Rutherford after his scattering experiment) showed that atoms have a tiny, dense, positively charged nucleus at the center with electrons orbiting in mostly empty space.\n- Step 3: The Bohr model (refined by Niels Bohr) added the concept of quantized energy levels to the nuclear model, explaining why electrons only exist at specific distances from the nucleus and how atoms emit characteristic line spectra.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "What was the significance of Rutherford's alpha particle scattering experiment, and what unexpected results led to the nuclear model of the atom? (2 steps)", "answer": "- Step 1: In Rutherford's 1909 experiment, alpha particles were fired at a thin sheet of gold foil. The expectation based on the plum pudding model was that most particles would pass through with slight deflections.\n- Step 2: The surprising results were that while most alpha particles did pass straight through, some were deflected at large angles, and a few even bounced back completely. This indicated that the atom's positive charge and most of its mass were concentrated in a tiny nucleus, with most of the atom being empty space.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "Why are isotopes of the same element chemically similar but potentially different in their nuclear properties? (2 steps)", "answer": "- Step 1: Isotopes have the same number of protons and electrons, which determine an element's chemical properties. Since chemical reactions involve the outer electrons, isotopes behave identically chemically.\n- Step 2: However, isotopes have different numbers of neutrons, affecting nuclear stability. Some isotopes are stable, while others are radioactive and undergo decay. The neutron count influences the nucleus's binding energy and can make certain configurations unstable.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "What happens when an atom becomes ionized, and how does this process differ from radioactive decay? (2 steps)", "answer": "- Step 1: When an atom is ionized, it gains or loses electrons, resulting in a net electrical charge. This affects the electron cloud but does not change the nucleus or the element's identity.\n- Step 2: Radioactive decay, in contrast, involves changes to the nucleus itself, where an unstable nucleus emits radiation and transforms into a different element or isotope. Ionization is a process affecting electrons, while radioactive decay is a nuclear process.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "How does the excitation of an atom differ from ionization, and what are the possible outcomes of each process? (2 steps)", "answer": "- Step 1: Excitation occurs when an electron absorbs energy and jumps to a higher energy level within the same atom, but remains bound to the nucleus. Ionization occurs when an electron gains enough energy to escape the atom completely, creating a free electron and a positive ion.\n- Step 2: The outcome of excitation is typically the emission of electromagnetic radiation as the electron returns to a lower energy level. Ionization results in a charged species (ion) and a free electron, which can participate in chemical reactions or electrical conduction.", "source": "GLM 4.5 Flash ①", "judge_pick": true}, {"question": "Compare the properties of alpha particles, beta particles, and gamma rays in terms of their composition, charge, mass, and ionizing power. (3 steps)", "answer": "- Step 1: Alpha particles (α) are identical to helium-4 nuclei, consisting of 2 protons and 2 neutrons, giving them a charge of +2 and a relative mass of 4.\n- Step 2: Beta particles (β) are high-speed electrons emitted from the nucleus during decay. Beta-minus particles (β⁻) have a charge of -1 and negligible mass, while beta-plus particles (β⁺) are positrons with a charge of +1 and negligible mass.\n- Step 3: Gamma rays (γ) are high-energy electromagnetic photons with no mass and no charge. In terms of ionizing power, alpha particles are the most ionizing but least penetrating, beta particles have moderate ionizing and penetrating power, and gamma rays are the least ionizing but most penetrating.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "Explain the penetrating power of different types of radiation and how this affects their detection and shielding requirements. (3 steps)", "answer": "- Step 1: Alpha particles have low penetrating power and can be stopped by a sheet of paper or a few centimeters of air. They deposit their energy quickly over a short distance, making them highly ionizing but easily shielded.\n- Step 2: Beta particles have moderate penetrating power and can be stopped by a few millimeters of aluminum or plastic. They travel further than alpha particles but still require thin shielding.\n- Step 3: Gamma rays have high penetrating power and require several centimeters of lead or several meters of concrete for effective shielding. Their ability to penetrate materials makes them difficult to stop but also useful for applications like medical imaging and industrial radiography.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "What is the random nature of radioactive decay, and how does this randomness relate to the predictability of half-life? (2 steps)", "answer": "- Step 1: Radioactive decay is fundamentally random at the individual nucleus level. Each unstable nucleus has the same probability of decaying per unit time, but it's impossible to predict which specific nucleus will decay or when it will decay.\n- Step 2: Despite this randomness, large samples follow predictable statistical patterns. The half-life (time for half the nuclei to decay) is a constant for each radioactive isotope, allowing us to predict decay rates for macroscopic samples even though individual decay events are random.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "How does the concept of activity differ from count rate in radiation measurements, and why is background radiation important to consider? (3 steps)", "answer": "- Step 1: Activity refers to the actual rate of radioactive decay in a source, measured in becquerels (Bq), where 1 Bq equals one decay per second. It represents the intrinsic property of the radioactive material.\n- Step 2: Count rate is the number of radiation events detected per unit time by a detector like a Geiger-Müller tube. It is always less than the true activity because not all emissions from the source reach the detector.\n- Step 3: Background radiation is the radiation present from natural and artificial sources that is not from the source being measured. To get an accurate measurement of a source's activity, we must subtract the background count rate from the total measured count rate to get the corrected count rate.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "What happens during beta-minus decay and beta-plus decay, and how do these processes affect the atomic number and mass number of the parent nucleus? (3 steps)", "answer": "- Step 1: In beta-minus decay, a neutron in the nucleus converts into a proton and emits an electron (β⁻ particle) and an antineutrino. This process increases the atomic number by 1 (since a proton is added) while keeping the mass number the same.\n- Step 2: In beta-plus decay, a proton converts into a neutron and emits a positron (β⁺ particle) and a neutrino. This decreases the atomic number by 1 while keeping the mass number the same.\n- Step 3: For both types of beta decay, the mass number remains unchanged because the total number of nucleons (protons + neutrons) stays the same. Only the ratio of protons to neutrons changes, which can make the nucleus more stable.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "Write and balance the nuclear equations for alpha decay of radium-226 and beta-minus decay of carbon-14, showing the parent and daughter nuclei. (3 steps)", "answer": "- Step 1: For alpha decay of radium-226 (²²⁶₈₈Ra), an alpha particle (²⁴₂He) is emitted. The balanced equation is: ²²⁶₈₈Ra → ²²²₈₆Rn + ²⁴₂He. The mass numbers (226 = 222 + 4) and atomic numbers (88 = 86 + 2) balance on both sides.\n- Step 2: For beta-minus decay of carbon-14 (¹⁴₆C), a neutron converts to a proton, emitting an electron. The equation is: ¹⁴₆C → ¹⁴₇N + ⁰₋₁e. The mass number remains 14 on both sides, while the atomic number increases from 6 to 7.\n- Step 3: In both cases, the parent nucleus transforms into a daughter nucleus of a different element. In the alpha decay, radium (Ra) becomes radon (Rn), while in the beta decay, carbon (C) becomes nitrogen (N).", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "How is a Geiger-Müller tube used to detect radiation, and what are its limitations compared to other detection methods? (2 steps)", "answer": "- Step 1: A Geiger-Müller tube detects radiation by containing a gas that becomes ionized when radiation passes through it. This ionization creates an electrical pulse that is counted, producing clicks or digital readings. It can detect alpha, beta, and gamma radiation, though with different efficiencies.\n- Step 2: Limitations include its inability to distinguish between different types of radiation without additional shielding, its \"dead time\" where it cannot detect new events immediately after detecting one, and its inability to measure the energy of the radiation. Photographic film badges can identify radiation types by which section darkens, and semiconductor detectors can provide energy information.", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "What is the relationship between activity, the number of undecayed nuclei, and the decay constant? (2 steps)", "answer": "- Step 1: Activity (A) is directly proportional to the number of undecayed nuclei (N) in a sample. The relationship is given by A = λN, where λ is the decay constant (probability of decay per nucleus per unit time).\n- Step 2: The decay constant λ represents the fraction of nuclei that decay per unit time. A larger λ means a higher probability of decay, leading to a shorter half-life. Activity decreases over time as N decreases, following the exponential decay law A = A₀e^(-λt).", "source": "GLM 4.5 Flash ①", "judge_pick": false}, {"question": "Explain the concept of half-life and how it can be determined experimentally using a Geiger-Müller tube. (3 steps)", "answer": "- Step 1: Half-life (t₁/₂) is the time taken for half of the radioactive nuclei in a sample to decay, or equivalently for the activity to reduce to half its initial value. It is a characteristic property of each radioactive isotope.\n- Step 2: To determine half-life experimentally, one would measure the count rate of a radioactive sample at regular intervals using a Geiger-Müller tube, subtracting background radiation to get the corrected count rate.\n- Step 3: By plotting the corrected count rate against time on a logarithmic scale, one can determine the half-life by finding the time it takes for the count rate to halve. Alternatively, from the slope of the linear portion of a log(count rate) vs. time graph, the decay constant λ can be found, and half-life calculated using t₁/₂ = ln(2)/λ ≈ 0.693/λ.", "source": "GLM 4.5 Flash ①", "judge_pick": false}], "count": 19}}, "meta": {"gemini_1": {"run": 1, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.7, "in_tokens": 7633, "out_tokens": 9065, "reasoning_chars": 0, "cost_eur": 0.0922, "elapsed_s": 95, "content_chars": 37635}, "gemini_2": {"run": 2, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.8, "in_tokens": 7633, "out_tokens": 6908, "reasoning_chars": 0, "cost_eur": 0.0723, "elapsed_s": 65, "content_chars": 27711}, "gemini_3": {"run": 3, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.85, "in_tokens": 0, "out_tokens": 0, "cost_eur": 0.0, "elapsed_s": 0, "content_chars": 46970}, "gemini_4": {"run": 4, "provider": "gemini", "model": "gemini-2.5-pro", "display": "Gemini 2.5 Pro", "temperature": 0.9, "in_tokens": 0, "out_tokens": 0, "cost_eur": 0.0, "elapsed_s": 0, "content_chars": 32353}, "glm_1": {"run": 1, "provider": "glm", "model": "glm-4.5-flash", "display": "GLM 4.5 Flash", "temperature": 0.7, "in_tokens": 7597, "out_tokens": 16000, "reasoning_chars": 57034, "cost_eur": 0.0, "elapsed_s": 228, "content_chars": 14736}}};
const SK='gcse_ch06_cards';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
