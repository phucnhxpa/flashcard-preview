 "- Step 1: If $$X$$ and $$Y$$ are dependent, then knowing the value of $$X$$ gives information about $$Y$$. For instance, if high values of $$X$$ tend to coincide with high values of $$Y$$ (positive correlation), then the sum $$X + Y$$ would have more extreme values than a Poisson with parameter $$\\lambda + \\mu$$ would predict. The variance of the sum would be $$\\mathrm{Var}(X) + \\mathrm{Var}(Y) + 2\\mathrm{Cov}(X,Y)$$, which exceeds $$\\lambda + \\mu$$ when the covariance is positive.\n- Step 2: Since a Poisson distribution must have variance equal to mean, a sum with inflated variance (greater than $$\\lambda + \\mu$$) cannot be Poisson. The additive property fundamentally relies on the fact that for independent variables, $$\\mathrm{Var}(X+Y) = \\mathrm{Var}(X) + \\mathrm{Var}(Y) = \\lambda + \\mu$$, which matches the required Poisson variance. Dependence breaks this equality.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Cars pass a point at a rate of 2 per 5 minutes, and other vehicles pass at a rate of 3 per 15 minutes. A student writes $$X + Y \\sim \\mathrm{Po}(2 + 3) = \\mathrm{Po}(5)$$ for the total vehicles in a 10-minute interval. What is wrong? (3 steps)", "answer": "- Step 1: The parameters must refer to the same time interval before they can be added. Here, the car rate is given per 5 minutes and the other-vehicle rate is given per 15 minutes. You cannot add rates from different interval lengths directly.\n- Step 2: Convert both to the same interval. For a 10-minute interval: cars arrive at rate $$\\frac{10}{5} \\times 2 = 4$$, so $$X \\sim \\mathrm{Po}(4)$$. Other vehicles arrive at rate $$\\frac{10}{15} \\times 3 = 2$$, so $$Y \\sim \\mathrm{Po}(2)$$.\n- Step 3: Now $$X + Y \\sim \\mathrm{Po}(4 + 2) = \\mathrm{Po}(6)$$. The student's answer of $$\\mathrm{Po}(5)$$ was wrong because they added parameters from different time scales. Always rescale to a common interval before adding.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "A student asks: \"If $$X \\sim \\mathrm{Po}(5)$$ and $$Y \\sim \\mathrm{Po}(3)$$ independently, can I say $$X - Y \\sim \\mathrm{Po}(2)$$?\" Explain why this is not valid. (2 steps)", "answer": "- Step 1: The difference $$X - Y$$ can take negative values (e.g., $$X = 1, Y = 4$$ gives $$X - Y = -3$$). A Poisson random variable only takes non-negative integer values ($$0, 1, 2, \\ldots$$), so $$X - Y$$ cannot follow a Poisson distribution.\n- Step 2: The additive property only works for sums, not differences. While $$X + Y \\sim \\mathrm{Po}(\\lambda + \\mu)$$, the distribution of $$X - Y$$ is more complex (it follows a \"Skellam distribution\" if you're curious, but this is beyond the syllabus). The key point: you can add independent Poissons, but you cannot subtract them and stay within the Poisson family.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "If $$X \\sim \\mathrm{Po}(\\lambda)$$, state the mean and variance of $$X$$. Why is the equality of mean and variance a useful diagnostic tool when deciding whether data might follow a Poisson distribution? (2 steps)", "answer": "- Step 1: For $$X \\sim \\mathrm{Po}(\\lambda)$$: $$\\mathrm{E}(X) = \\lambda$$ and $$\\mathrm{Var}(X) = \\lambda$$. The mean and variance are equal — both determined by the single parameter $$\\lambda$$.\n- Step 2: This equality is a useful diagnostic because most other common distributions do not have this property. For binomial, the variance $$np(1-p)$$ is less than the mean $$np$$. For many real-world datasets, if you compute the sample mean $$\\bar{x}$$ and sample variance $$s^2$$ and find they are close, this is evidence supporting a Poisson model. If the variance is much larger than the mean (overdispersion) or much smaller (underdispersion), a Poisson model is likely inappropriate.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Data is collected on the number of daisies in 80 squares of a field. The summary statistics are $$\\Sigma x = 295$$ and $$\\Sigma x^2 = 1386$$. How would you calculate the sample mean and sample variance, and how would you use them to assess the Poisson model? (3 steps)", "answer": "- Step 1: The sample mean is $$\\bar{x} = \\frac{\\Sigma x}{n} = \\frac{295}{80} = 3.69$$ (2 d.p.). This estimates the population mean $$\\lambda$$.\n- Step 2: The sample variance is $$s^2 = \\frac{\\Sigma x^2}{n} - \\bar{x}^2 = \\frac{1386}{80} - 3.69^2 = 17.325 - 13.6161 = 3.71$$ (2 d.p.). Note: we use $$\\frac{\\Sigma x^2}{n} - \\bar{x}^2$$, not dividing by $$n-1$$, as per the formula given in the text.\n- Step 3: Since the mean (3.69) and variance (3.71) are very close (both approximately 3.7 to 1 d.p.), this supports the Poisson model. If the Poisson were appropriate, we'd expect mean $$\\approx$$ variance. The close agreement here is consistent with that expectation, giving us confidence to proceed with a Poisson model using $$\\lambda \\approx 3.7$$.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Why is it important that the sample mean and sample variance are close when assessing a Poisson fit, rather than just checking that the data looks roughly bell-shaped or that the mean is a reasonable number? (2 steps)", "answer": "- Step 1: Many distributions can produce roughly bell-shaped data or have a \"reasonable\" mean. The equality of mean and variance is a *specific, distinctive* property of the Poisson. For example, a binomial distribution with the same mean would have a smaller variance; a negative binomial would have a larger variance. Only the Poisson has mean exactly equal to variance.\n- Step 2: Checking mean $$\\approx$$ variance is a *necessary* (though not sufficient) condition for the Poisson to be a good model. If this condition fails, the Poisson is almost certainly wrong, regardless of how the histogram looks. If it holds, the Poisson is plausible, though further checks (like goodness-of-fit tests) would provide more confidence.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "Intuitively, why should a Poisson distribution have equal mean and variance? Consider the underlying process: events occur randomly and independently at a constant rate. How does this lead to variance growing at the same rate as the mean? (3 steps)", "answer": "- Step 1: In a Poisson process, events occur independently. Independence means there's no tendency for events to cluster (which would increase variance) or to spread out evenly (which would decrease variance). The randomness is \"pure\" — neither regular nor clumpy.\n- Step 2: If you double the time interval, you double both the expectedmean (expected count) and the variance. In 2 hours, the mean is twice that of 1 hour, and so is the variance. This linear scaling of both mean and variance with interval length is exactly what happens when mean equals variance: if $$\\mathrm{E}(X) = \\lambda$$ and $$\\mathrm{Var}(X) = \\lambda$$, then both scale as $$\\lambda$$.\n- Step 3: Contrast with the binomial: there, increasing $$n$$ increases both mean and variance, but the variance is \"held back\" by the factor $$(1-p)$$ because there's a fixed cap $$n$$ on the count. The Poisson has no such cap — the absence of a fixed upper bound is precisely what allows the variance to grow as fast as the mean. The \"free\" (uncapped) counting with pure independence is what makes mean = variance.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": true}, {"question": "A data set has sample mean $$\\bar{x} = 4.2$$ and sample variance $$s^2 = 9.1$$. Is a Poisson model appropriate? What does the relationship between mean and variance tell you about the underlying process? (2 steps)", "answer": "- Step 1: The variance (9.1) is much larger than the mean (4.2) — more than double. This is a clear case of **overdispersion** relative to the Poisson expectation. A Poisson model is not appropriate here.\n- Step 2: Overdispersion suggests the events are not truly independent or not occurring at a constant rate. Possible explanations include: (a) clustering — events tend to occur in bursts, inflating the variance; (b) a varying rate — the true $$\\lambda$$ fluctuates across the observation period (e.g., busy vs. quiet times), which also increases variance beyond the mean. A model with a separate variance parameter (like the negative binomial) would be more suitable.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "For $$X \\sim \\mathrm{Po}(\\lambda)$$, you are told that $$\\mathrm{P}(X = 2) = \\mathrm{P}(X = 3)$$. Without doing heavy computation, determine the value of $$\\lambda$$. Walk through the algebraic reasoning. (3 steps)", "answer": "- Step 1: Write out both probabilities using the PMF: $$\\mathrm{P}(X=2) = \\frac{e^{-\\lambda}\\lambda^2}{2!}$$ and $$\\mathrm{P}(X=3) = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$. Setting them equal: $$\\frac{e^{-\\lambda}\\lambda^2}{2!} = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$.\n- Step 2: Cancel the common factor $$e^{-\\lambda}$$ and simplify: $$\\frac{\\lambda^2}{2} = \\frac{\\lambda^3}{6}$$. Multiply both sides by 6: $$3\\lambda^2 = \\lambda^3$$. Since $$\\lambda > 0$$, divide by $$\\lambda^2$$: $$3 = \\lambda$$.\n- Step 3: Therefore $$\\lambda = 3$$. The intuition: the Poisson PMF increases from $$x = 0$$ up to the mode near $$\\lambda$$, then decreases. The probabilities at $$x = 2$$ and $$x = 3$$ are equal when the distribution is transitioning from increasing to decreasing, which happens around $$\\lambda$$.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "For $$X \\sim \\mathrm{Po}(\\lambda)$$, given that $$\\mathrm{P}(X = 4) = 3 \\times \\mathrm{P}(X = 2)$$, find $$\\lambda$$. Show the algebraic steps clearly. (3 steps)", "answer": "- Step 1: Write out the equation: $$\\frac{e^{-\\lambda}\\lambda^4}{4!} = 3 \\cdot \\frac{e^{-\\lambda}\\lambda^2}{2!}$$. Cancel $$e^{-\\lambda}$$ and simplify: $$\\frac{\\lambda^4}{24} = \\frac{3\\lambda^2}{2}$$.\n- Step 2: Multiply both sides by 24: $$\\lambda^4 = 36\\lambda^2$$. Since $$\\lambda > 0$$, divide by $$\\lambda^2$$: $$\\lambda^2 = 36$$, giving $$\\lambda = 6$$.\n- Step 3: Verification: with $$\\lambda = 6$$, $$\\mathrm{P}(X=4) = \\frac{e^{-6} \\cdot 6^4}{24} = \\frac{e^{-6} \\cdot 1296}{24} = 54e^{-6}$$, and $$\\mathrm{P}(X=2) = \\frac{e^{-6} \\cdot 36}{2} = 18e^{-6}$$. Indeed, $$54e^{-6} = 3 \\times 18e^{-6}$$. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "An estate agent sells houses at a rate of 1.8 per week (Poisson). Her weekly target is at least 3 houses. Over 4 consecutive weeks, what is the probability she meets her target exactly once? Identify the two distributions involved and how they connect. (3 steps)", "answer": "- Step 1: First, find the probability of meeting the target in a single week. Let $$X \\sim \\mathrm{Po}(1.8)$$. Then $$p = \\mathrm{P}(X \\geq 3) = 1 - \\mathrm{P}(X \\leq 2) = 1 - 0.731 = 0.269$$ (using tables or calculator).\n- Step 2: Now the question becomes: in 4 independent weeks, what is the probability of exactly 1 \"success\" (meeting target)? This is binomial: let $$Y$$ = number of weeks meeting target. Then $$Y \\sim \\mathrm{B}(4, 0.269)$$.\n- Step 3: Compute $$\\mathrm{P}(Y = 1) = \\binom{4}{1}(0.269)^1(0.731)^3 = 4 \\times 0.269 \\times 0.390 = 0.420$$ (3 s.f.). The Poisson gives the per-week probability; the binomial counts how many weeks out of 4 achieve that outcome.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A café serves breakfast. Customers arrive at random at an average rate of one every 4 minutes. What is the appropriate Poisson model for the number of customers between 10:00 am and 10:20 am, and roughly how would you describe the probability of fewer than 3 customers (without computing an exact number)? (2 steps)", "answer": "- Step 1: The rate is 1 customer per 4 minutes, which is $$\\frac{1}{4}$$ customer per minute, or equivalently $$\\frac{60}{4} = 15$$ customers per hour. For a 20-minute interval: $$\\lambda = \\frac{20}{4} \\times 1 = 5$$. So $$X \\sim \\mathrm{Po}(5)$$.\n- Step 2: For $$\\mathrm{P}(X < 3) = \\mathrm{P}(X \\leq 2)$$ with $$\\lambda = 5$$: the mean is 5, so 2 is noticeably below the mean. We'd expect this probability to be relatively small — the distribution is centred around 5, so being at 2 or fewer is in the lower tail. (The exact value is about 0.125, confirming it's a lower-tail event.)", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Flaws occur in material at a rate of 1.5 per 50 m. The material is sold in rolls of 200 m. A student buys 5 rolls. To find the probability that at least 2 rolls have fewer than 4 flaws, three modelling steps are needed. Describe each step and the distribution used. (3 steps)", "answer": "- Step 1: **Poisson for a single roll**: For 200 m, the rate is $$\\frac{200}{50} \\times 1.5 = 6$$, so $$X \\sim \\mathrm{Po}(6)$$ for flaws in one roll. Compute $$p = \\mathrm{P}(X < 4) = \\mathrm{P}(X \\leq 3)$$ using the Poisson with $$\\lambda = 6$$.\n- Step 2: **Binomial for 5 rolls**: Each roll independently has probability $$p$$ of having fewer than 4 flaws. Let $$Y$$ = number of rolls (out of 5) with fewer than 4 flaws. Then $$Y \\sim \\mathrm{B}(5, p)$$.\n- Step 3: **Compute the target probability**: $$\\mathrm{P}(Y \\geq 2) = 1 - \\mathrm{P}(Y \\leq 1) = 1 - [\\mathrm{P}(Y=0) + \\mathrm{P}(Y=1)]$$. The chain is: Poisson → single-roll probability → binomial across rolls → final answer.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A company director receives personal emails at rate 1.8/hour, business emails at rate 3.7/hour, and advertising emails at rate 1.5/hour (all independent Poisson processes). What is the distribution of the total number of emails in an 8-hour working day, and qualitatively, would you expect more than 50 emails to be likely or unlikely? (3 steps)", "answer": "- Step 1: The total rate per hour is $$1.8 + 3.7 + 1.5 = 7.0$$ emails/hour. By the additive property, the total per hour follows $$\\mathrm{Po}(7)$$.\n- Step 2: For an 8-hour day: $$\\lambda = 7 \\times 8 = 56$$. So the total emails in a day follows $$\\mathrm{Po}(56)$$.\n- Step 3: The mean is 56 and the standard deviation is $$\\sqrt{56} \\approx 7.5$$. The value 50 is less than 1 standard deviation below the mean, so $$\\mathrm{P}(X > 50)$$ is reasonably high (in fact about 0.79). More than 50 emails is quite likely — it would be more surprising to get 50 or fewer.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "A photocopier breaks down at a rate of 8 times per year. A student wants the probability of exactly 2 breakdowns in the next month and sets up $$X \\sim \\mathrm{Po}(8)$$. What is wrong? (2 steps)", "answer": "- Step 1: The rate given is 8 per year, but the interval asked about is one month. The student has used the annual rate for a monthly interval without converting.\n- Step 2: The correct rate per month is $$\\frac{8}{12} = \\frac{2}{3}$$. So the correct model is $$X \\sim \\mathrm{Po}\\left(\\frac{2}{3}\\right)$$, and $$\\mathrm{P}(X = 2) = \\frac{e^{-2/3}(2/3)^2}{2!}$$. Using $$\\lambda = 8$$ for a monthly interval would vastly overestimate the probability of breakdowns.\n+ This is one of the most common errors in Poisson problems: forgetting to match the rate to the interval.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "An office has photocopiers on three floors. Ground floor: breakdown rate 0.4/week. First floor: 0.2/week. Second floor: 0.8/week. All breakdowns are independent. What is the probability of exactly 2 total breakdowns in a given week? (3 steps)", "answer": "- Step 1: By the additive property, the total breakdowns $$T$$ across all three floors follows a Poisson distribution with parameter $$\\lambda = 0.4 + 0.2 + 0.8 = 1.4$$. So $$T \\sim \\mathrm{Po}(1.4)$$.\n- Step 2: We need $$\\mathrm{P}(T = 2) = \\frac{e^{-1.4}(1.4)^2}{2!} = \\frac{e^{-1.4} \\times 1.96}{2} = 0.980 \\times e^{-1.4}$$.\n- Step 3: Evaluating: $$e^{-1.4} \\approx 0.2466$$, so $$\\mathrm{P}(T = 2) \\approx 0.980 \\times 0.2466 \\approx 0.2417$$. The additive property makes this straightforward — no need to enumerate all ways of getting 2 total breakdowns across 3 machines.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "A student reasons: \"If $$X \\sim \\mathrm{Po}(3)$$ and $$Y \\sim \\mathrm{Po}(4)$$, then $$\\mathrm{P}(X + Y = 5)$$ requires me to find all combinations like $$X=0,Y=5$$, $$X=1,Y=4$$, etc., and sum the products.\" While this is technically correct, what much simpler method is available? (2 steps)", "answer": "- Step 1: Since $$X$$ and $$Y$$ are independent Poisson random variables, $$X + Y \\sim \\mathrm{Po}(3 + 4) = \\mathrm{Po}(7)$$. You can directly compute $$\\mathrm{P}(X + Y = 5) = \\frac{e^{-7}(7)^5}{5!}$$ using a single Poisson calculation.\n- Step 2: The convolution approach (enumerating all pairs) gives the same answer but is laborious — for $$\\mathrm{P}(X+Y=5)$$, you'd need 6 terms: $$\\sum_{k=0}^{5}\\mathrm{P}(X=k)\\mathrm{P}(Y=5-k)$$. The additive property collapses all of this into a single Poisson evaluation. Always use the additive property when summing independent Poissons.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "A bus company has buses hired for a week at a time. Requests arrive at a mean rate of 5 per Sunday. The company wants to be at least 99% sure they can fulfil all requests. How many buses must they have? Describe the approach conceptually. (3 steps)", "answer": "- Step 1: Let $$X \\sim \\mathrm{Po}(5)$$ be the number of requests on a Sunday. The company can fulfil all requests if the number of buses $$n$$ is at least as large as $$X$$. We need the smallest $$n$$ such that $$\\mathrm{P}(X \\leq n) \\geq 0.99$$.\n- Step 2: Using cumulative tables for $$\\lambda = 5$$: $$\\mathrm{P}(X \\leq 9) = 0.9682$$ and $$\\mathrm{P}(X \\leq 10) = 0.9863$$ and $$\\mathrm{P}(X \\leq 11) = 0.9945$$. The first value exceeding 0.99 occurs at $$n = 11$$.\n- Step 3: Therefore the company needs 11 buses. With 10 buses, there's about a 1.4% chance of being unable to fulfil demand; with 11, this drops below 1%. The key concept: you're finding the smallest integer $$n$$ where the cumulative probability crosses the 99% threshold.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "During normal hours, planes land at a rate of one every 4 minutes. Given that exactly 10 planes landed between 2 pm and 3 pm, what is the probability that exactly 5 landed between 2 pm and 2:30 pm? This requires a different distribution from Poisson. Which one, and why? (3 steps)", "answer": "- Step 1: This is a *conditional* problem: given that the total count in one hour is 10, what's the distribution of the count in the first half-hour? When you condition on the total number of Poisson events in an interval, the allocation of those events to sub-intervals follows a **binomial distribution**.\n- Step 2: Each of the 10 planes independently \"chooses\" a landing time uniformly within the hour. The probability that any given plane landed in the first half-hour is $$\\frac{30}{60} = \\frac{1}{2}$$. So the number landing in the first half-hour, given 10 total, follows $$\\mathrm{B}(10, 0.5)$$.\n- Step 3: Therefore $$\\mathrm{P}(\\text{5 in first half-hour} \\mid \\text{10 total}) = \\binom{10}{5}(0.5)^5(0.5)^5 = \\binom{10}{5}(0.5)^{10} = 252 \\times \\frac{1}{1024} \\approx 0.246$$. This is a binomial problem, not a Poisson one, because the total count is fixed by the conditioning.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "A student collects data and finds the sample mean is 2.1 and the sample variance is 5.8. They claim \"since the data is discrete and counts events, I should use a Poisson model.\" Evaluate this claim. (2 steps)", "answer": "- Step 1: The claim is not justified. While the data involves counts (a necessary condition for Poisson), the sample variance (5.8) is much larger than the sample mean (2.1) — nearly three times as large. This is strong evidence of overdispersion.\n- Step 2: For a Poisson model to be appropriate, we need mean $$\\approx$$ variance. The large discrepancy here suggests the underlying process violates at least one Poisson condition — most likely independence (events may be clustered) or constant rate (the rate may vary across observations). A Poisson model would significantly underestimate the variability in this data, leading to poor predictions of extreme values.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "The number of policies sold by an employee each week over 150 weeks is recorded. The summary statistics are $$\\Sigma x = 423$$ and $$\\Sigma x^2 = 1531$$. A student computes the mean as $$\\frac{423}{150} = 2.82$$ and the variance as $$\\frac{153}{150} - 2.82^2$$. They get a negative variance. What went wrong? (2 steps)", "answer": "- Step 1: The formula for the variance is $$s^2 = \\frac{\\Sigma x^2}{n} - \\bar{x}^2$$. For this to be non-negative, we need $$\\frac{\\Sigma x^2}{n} \\geq \\bar{x}^2$$, i.e., $$\\Sigma x^2 \\geq \\frac{(\\Sigma x)^2}{n}$$. Substituting: $$\\frac{153}{150} = 1.02$$ but $$2.82^2 = 7.95$$. Clearly $$1.02 < 7.95$$, giving a negative variance — which is impossible.\n- Step 2: The error is in the data: $$\\Sigma x^2 = 153$$ is far too small. If the mean is 2.82, the average of $$x^2$$ must be at least $$2.82^2 = 7.95$$, so $$\\Sigma x^2$$ should be at least $$150 \\times 7.95 \\approx 1193$$. The value 153 is likely a typo or misreporting (perhaps it was $$\\Sigma x^2 = 1531$$ or similar). This is a sanity check: variance can never be negative, so if your calculation gives a negative value, re-examine the input data.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "A break-down company agrees to repair breakdowns over a six-week period. They will give a full refund if there are more than $$n$$ breakdowns. Breakdowns occur at 1.5 per week. The company wants the refund probability to be 5% or less. Describe how to find the smallest $$n$$. (3 steps)", "answer": "- Step 1: For a six-week period, the rate is $$1.5 \\times 6 = 9$$ breakdowns. So $$X \\sim \\mathrm{Po}(9)$$ for breakdowns in six weeks. The company needs $$\\mathrm{P}(X > n) \\leq 0.05$$, which is equivalent to $$\\mathrm{P}(X \\leq n) \\geq 0.95$$.\n- Step 2: Using cumulative tables for $$\\lambda = 9$$: check cumulative probabilities. $$\\mathrm{P}(X \\leq 12) = 0.8758$$, $$\\mathrm{P}(X \\leq 13) = 0.9261$$, $$\\mathrm{P}(X \\leq 14) = 0.9585$$. The first value $$\\geq 0.95$$ occurs at $$n = 14$$.\n- Step 3: Therefore the smallest $$n$$ is 14. With $$n = 14$$, the refund probability is $$1 - 0.9585 = 0.0415 = 4.15\\% \\leq 5\\%$$. With $$n = 13$$, the refund probability would be $$1 - 0.9261 = 7.39\\% > 5\\%$$, which is too high.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "An elevator breaks down at a mean rate of 3 times per four-week period. In one particular week, it broke down twice. A student reasons: \"Since it already broke down twice this week, it's less likely to break down next week.\" Is this reasoning consistent with the Poisson model? Why or why not? (2 steps)", "answer": "- Step 1: No, this reasoning is not consistent with the Poisson model. One of the fundamental conditions of the Poisson model is **independence** — the occurrence of events in one interval does not affect the probability of events in another interval. The breakdowns next week are independent of what happened this week.\n- Step 2: The probability of at least one breakdown next week is the same regardless of what happened this week. With a rate of $$\\frac{3}{4} = 0.75$$ per week, $$X \\sim \\mathrm{Po}(0.75)$$ and $$\\mathrm{P}(X \\geq 1) = 1 - e^{-0.75} \\approx 0.528$$. The student's reasoning reflects the **gambler's fallacy** — the mistaken belief that past outcomes influence independent future events.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "A student receives internal calls at a rate of 1 per 5 minutes and external calls at a rate of 2 per 5 minutes (both Poisson, independent). What is the distribution of the total number of calls in a 10-minute period? (3 steps)", "answer": "- Step 1: First, find the rate of each type in a 10-minute period. Internal: $$\\frac{10}{5} \\times 1 = 2$$, so $$X \\sim \\mathrm{Po}(2)$$. External: $$\\frac{10}{5} \\times 2 = 4$$, so $$Y \\sim \\mathrm{Po}(4)$$.\n- Step 2: Since the two types of calls are independent, by the additive property: $$X + Y \\sim \\mathrm{Po}(2 + 4) = \\mathrm{Po}(6)$$.\n- Step 3: The total calls in 10 minutes follows $$\\mathrm{Po}(6)$$. Note that we could also have computed the total rate per 5 minutes as $$1 + 2 = 3$$, then scaled: $$\\frac{10}{5} \\times 3 = 6$$. Both approaches give the same result, confirming consistency.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "Explain why the Poisson distribution can be seen as a limiting case of the binomial distribution. What conditions on the binomial parameters lead to this limit? (3 steps)", "answer": "- Step 1: Consider $$X \\sim \\mathrm{B}(n, p)$$ where $$n$$ is large and $$p$$ is small, such that the product $$np = \\lambda$$ remains constant. As $$n \\to \\infty$$ and $$p \\to 0$$, the binomial PMF converges to the Poisson PMF with parameter $$\\lambda$$.\n- Step 2: Intuitive explanation: the binomial counts successes in $$n$$ trials, each with small probability $$p$$. When $$n$$ is very large and $$p$$ very small, events are \"rare\" and there are many opportunities — exactly the setting where Poisson applies. The fixed cap $$n$$ becomes irrelevant as $$n \\to \\infty$$, and the no-fixed-upper-bound property of Poisson emerges.\n- Step 3: Rule of thumb: the Poisson is a good approximation to the binomial when $$n \\geq 50$$ and $$p \\leq 0.1$$ (or more conservatively, $$n \\geq 100$$ and $$np \\leq 10$$). This is useful because Poisson calculations (one parameter) are simpler than binomial calculations (two parameters).", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "Left-handed people make up 8% of the population. A random sample of 50 people is taken. Compare the approach using the exact binomial vs. the Poisson approximation for finding $$\\mathrm{P}(X \\leq 3)$$. Conceptually, why might the approximation be reasonable here, and what type of error would you expect? (3 steps)", "answer": "- Step 1: The exact model is $$X \\sim \\mathrm{B}(50, 0.08)$$ with $$np = 4$$. For the Poisson approximation, use $$X \\approx \\mathrm{Po}(4)$$.\n- Step 2: The approximation is reasonable because $$n = 50$$ is fairly large and $$p = 0.08$$ is small (though not tiny). The product $$np = 4$$ is moderate. The Poisson approximation works best when $$n$$ is large and $$p$$ is small, which is roughly satisfied here.\n- Step 3: The Poisson approximation will slightly overestimate the variance. The binomial variance is $$np(1-p) = 50 \\times 0.08 \\times 0.92 = 3.68$$, while the Poisson variance is $$\\lambda = 4$$. Since the Poisson has higher variance, it will place slightly more probability in the tails. The percentage error is typically small (a few percent) but non-zero — the approximation is good but not perfect.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "A random variable $$Y \\sim \\mathrm{Po}(\\lambda)$$ where $$\\lambda$$ is an integer. Given that $$\\mathrm{P}(Y > 10) < 0.1$$, find the largest possible value of $$\\lambda$$. Describe the approach. (3 steps)", "answer": "- Step 1: The condition $$\\mathrm{P}(Y > 10) < 0.1$$ is equivalent to $$\\mathrm{P}(Y \\leq 10) > 0.9$$. We need to find the largest integer $$\\lambda$$ such that the cumulative probability $$\\mathrm{P}(Y \\leq 10)$$ exceeds 0.9.\n- Step 2: Using cumulative tables, check values of $$\\lambda$$: for $$\\lambda = 7$$, $$\\mathrm{P}(Y \\leq 10) = 0.9015 > 0.9$$ ✓. For $$\\lambda = 8$$, $$\\mathrm{P}(Y \\leq 10) = 0.8159 < 0.9$$ ✗.\n- Step 3: Since the cumulative probability at $$\\lambda = 8$$ drops below 0.9, the largest integer $$\\lambda$$ satisfying the condition is $$\\lambda = 7$$. As $$\\lambda$$ increases, the distribution shifts right, making $$\\mathrm{P}(Y \\leq 10)$$ decrease — so there's a threshold beyond which the condition fails.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "A patient arrives at A&E at 11:00 am. The arrival rate is 5 per hour (Poisson). Find the probability that the next patient arrives before 11:15 am. This question connects the Poisson distribution to another distribution. Which one, and how? (3 steps)", "answer": "- Step 1: The event \"next patient arrives before 11:15 am\" is equivalent to \"at least one patient arrives in the 15-minute interval from 11:00 to 11:15.\" Let $$X$$ = number of patients in 15 minutes. The rate is $$\\frac{15}{60} \\times 5 = 1.25$$, so $$X \\sim \\mathrm{Po}(1.25)$$.\n- Step 2: $$\\mathrm{P}(\\text{next patient before 11:15}) = \\mathrm{P}(X \\geq 1) = 1 - \\mathrm{P}(X = 0) = 1 - e^{-1.25} \\approx 1 - 0.2865 = 0.7135$$.\n- Step 3: More deeply, the *waiting time* until the next event in a Poisson process follows an **exponential distribution** with parameter $$\\lambda$$. The probability that the waiting time is less than $$t$$ is $$1 - e^{-\\lambda t}$$, which is exactly what we computed. The connection: Poisson counts events in intervals; exponential measures the time between consecutive events.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "A chocolate chip biscuit has a Poisson-distributed number of chips with mean 5. A packet contains 6 biscuits. What is the probability that exactly half the biscuits contain fewer than 3 chips? Identify each step and the distributions used. (3 steps)", "answer": "- Step 1: For a single biscuit, $$X \\sim \\mathrm{Po}(5)$$. Find $$p = \\mathrm{P}(X < 3) = \\mathrm{P}(X \\leq 2) = \\mathrm{P}(X=0) + \\mathrm{P}(X=1) + \\mathrm{P}(X=2)$$. Using tables: $$\\mathrm{P}(X \\leq 2) = 0.1247$$.\n- Step 2: Each biscuit independently has probability $$p = 0.1247$$ of having fewer than 3 chips. Let $$Y$$ = number of biscuits (out of 6) with fewer than 3 chips. Then $$Y \\sim \\mathrm{B}(6, 0.1247)$$.\n- Step 3: \"Exactly half\" means $$Y = 3$$. So $$\\mathrm{P}(Y = 3) = \\binom{6}{3}(0.1247)^3(0.8753)^3 = 20 \\times 0.00194 \\times 0.6704 \\approx 0.0260$$. This is unlikely — most biscuits have 3 or more chips, so having exactly 3 out of 6 with fewer than 3 is a low-probability event.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "A student computes $$\\mathrm{P}(X \\leq 4)$$ for $$X \\sim \\mathrm{Po}(4.5)$$ using tables, but the tables only have $$\\lambda$$ values in steps of 0.5, and the student's value of 4.5 is available. However, for $$X \\sim \\mathrm{Po}(4.3)$$, the exact value is not in the table. What are the student's options? (2 steps)", "answer": "- Step 1: For $$\\lambda = 4.5$$, the table can be used directly — just look up the row for $$\\lambda = 4.5$$ and the column for $$x = 4$$. This gives $$\\mathrm{P}(X \\leq 4) = 0.4522$$.\n- Step 2: For $$\\lambda = 4.3$$, which is not in the table, the student has two options: (a) use a calculator with the Poisson cumulative distribution function, which can handle any $$\\lambda$$ value; or (b) use linear interpolation between $$\\lambda = 4.0$$ and $$\\lambda = 4.5$$ as an approximation (though this is less accurate). In an exam, calculators are typically permitted, so option (a) is preferred. The tables are a backup for specific values.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "A factory produces 10,000 pieces of cloth per week. In a sample of 120 pieces, no pieces had 8 or more flaws. The observed relative frequency for \"8 or more flaws\" is 0. Why is this not useful as an estimate for the population, and how does the Poisson model help? (2 steps)", "answer": "- Step 1: The observed frequency of 0 out of 120 gives a relative frequency of 0, but this doesn't mean the true probability is zero. With only 120 observations, the sample is too small to reliably estimate the probability of rare events (8+ flaws). The event is so uncommon that you'd need a much larger sample to observe it.\n- Step 2: The Poisson model extrapolates beyond the observed data. Using the estimated $$\\lambda$$ from the sample (computed from the mean), we can calculate $$\\mathrm{P}(X \\geq 8) = 1 - \\mathrm{P}(X \\leq 7)$$ even though no observations fell in this category. For 10,000 pieces, the expected count with 8+ flaws is $$10{,}000 \\times \\mathrm{P}(X \\geq 8)$$, which may be a small but non-zero number. The model gives insight where the data alone is insufficient.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}], "count": 50}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What type of real-world situations does the Poisson distribution model, and how does this differ fundamentally from the binomial distribution? (3 steps)", "answer": "- Step 1: The Poisson distribution models the **number of times an event occurs within a fixed interval of time or space** — for example, phone calls per day, flaws per metre of cloth, or meteor strikes per year. The key distinction is that there is **no fixed number of trials**; instead, events happen continuously within an interval.\n- Step 2: The binomial distribution, by contrast, requires a **fixed number of trials** ($$n$$) each with two outcomes (success/failure), and we count successes among those trials. In Poisson, there is no \"$$n$$\" — the count could theoretically go to infinity, though large values become extremely unlikely.\n- Step 3: Visually, think of binomial as \"out of $$n$$ coin flips, how many are heads?\" whereas Poisson is \"in a stretch of time, how many raindrops hit this window?\" There's no upper bound on raindrops — just a rate at which they arrive.\n\nTakeaway: Binomial = fixed trials, bounded count; Poisson = continuous interval, unbounded count, governed by a rate.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "Write the probability mass function for $$X \\sim \\text{Po}(\\lambda)$$. What is the role of each component ($$e^{-\\lambda}$$, $$\\lambda^x$$, and $$x!$$) in this formula? (3 steps)", "answer": "- Step 1: The PMF is $$\\text{P}(X=x) = \\frac{e^{-\\lambda}\\lambda^x}{x!}$$, for $$x = 0, 1, 2, 3, \\ldots$$\n- Step 2: Breaking down the components:\n  + $$e^{-\\lambda}$$: This is a **normalising factor** that ensures all probabilities sum to 1. It also equals $$\\text{P}(X=0)$$ directly — the probability of zero events. The exponential decay reflects that zero events becomes less likely as the rate $$\\lambda$$ increases.\n  + $$\\lambda^x$$: This captures the **\"likelihood contribution\"** of observing $$x$$ events. Each event independently contributes a factor of $$\\lambda$$, so $$x$$ events give $$\\lambda^x$$. Larger $$\\lambda$$ shifts the distribution right.\n  + $$x!$$: This **discounts** for overcounting. The $$\\lambda^x$$ term treats events as if they are distinguishable and ordered, but we only care about the count. The $$x!$$ in the denominator corrects for the fact that the $$x$$ events can be arranged in $$x!$$ orderings — we don't care about order.\n- Step 3: Together, the formula balances the raw likelihood ($$\\lambda^x$$) against the combinatorial discount ($$x!$$), all scaled by the normaliser ($$e^{-\\lambda}$$). As $$x$$ grows, the factorial eventually dominates the power, making very large counts vanishingly rare.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "Prove that the Poisson PMF sums to 1, i.e., $$\\sum_{x=0}^{\\infty}\\text{P}(X=x) = 1$$. What key mathematical series makes this work? (3 steps)", "answer": "- Step 1: Write out the sum explicitly:\n$$\\sum_{x=0}^{\\infty}\\text{P}(X=x) = e^{-\\lambda} + \\frac{e^{-\\lambda}\\lambda}{1!} + \\frac{e^{-\\lambda}\\lambda^2}{2!} + \\frac{e^{-\\lambda}\\lambda^3}{3!} + \\cdots$$\n- Step 2: Factor out the common $$e^{-\\lambda}$$:\n$$= e^{-\\lambda}\\left(1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\cdots\\right)$$\nThe expression in brackets is the **Taylor series expansion of $$e^{\\lambda}$$**:\n$$e^{\\lambda} = 1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\cdots$$\n- Step 3: Substituting back:\n$$\\sum_{x=0}^{\\infty}\\text{P}(X=x) = e^{-\\lambda} \\cdot e^{\\lambda} = e^0 = 1$$\nThis is why the $$e^{-\\lambda}$$ factor is essential — it exactly cancels the $$e^{\\lambda}$$ from the series expansion, guaranteeing valid probabilities.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "For $$X \\sim \\text{Po}(\\lambda)$$, how do you compute $$\\text{P}(X \\geq 1)$$ efficiently, and why is direct summation a bad approach? (2 steps)", "answer": "- Step 1: The efficient method uses the **complement rule**: $$\\text{P}(X \\geq 1) = 1 - \\text{P}(X = 0)$$. Since $$\\text{P}(X=0) = \\frac{e^{-\\lambda}\\lambda^0}{0!} = e^{-\\lambda}$$, we get $$\\text{P}(X \\geq 1) = 1 - e^{-\\lambda}$$.\n- Step 2: Direct summation would require calculating $$\\text{P}(X=1) + \\text{P}(X=2) + \\text{P}(X=3) + \\cdots$$ — an infinite series! The complement rule replaces an infinite sum with a single calculation. This is a recurring theme in Poisson problems: always check if the complement, or a cumulative table look-up, can replace summing many individual terms.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "For $$X \\sim \\text{Po}(2.1)$$, what is the probability that $$X$$ takes a value strictly between 1 and 4 (i.e., $$1 < X \\leq 4$$)? Which values of $$x$$ actually satisfy this inequality, and why must you be careful? (3 steps)", "answer": "- Step 1: Since $$X$$ is a **discrete** random variable taking values $$0, 1, 2, 3, \\ldots$$, the inequality $$1 < X \\leq 4$$ means $$X \\in \\{2, 3, 4\\}$$. Note: $$X=1$$ does **not** satisfy \"$$1 < X$$\" and $$X=5$$ does **not** satisfy \"$$X \\leq 4$$\".\n- Step 2: So we compute:\n$$\\text{P}(1 < X \\leq 4) = \\text{P}(X=2) + \\text{P}(X=3) + \\text{P}(X=4)$$\n- Step 3: Using the cumulative distribution approach (often faster):\n$$\\text{P}(1 < X \\leq 4) = \\text{P}(X \\leq 4) - \\text{P}(X \\leq 1)$$\nThis works because $$\\text{P}(X \\leq 4)$$ includes all values up to 4, and subtracting $$\\text{P}(X \\leq 1)$$ removes the values 0 and 1, leaving exactly $$\\{2, 3, 4\\}$$. **Misconception alert**: confusing strict vs. non-strict inequalities is the most common error here — always list the integer values explicitly.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "State the three conditions that must be satisfied for the Poisson distribution to be a suitable model for a real-world situation. For each condition, give an example of how it could be violated. (3 steps)", "answer": "- Step 1: **Events occur independently** — the occurrence of one event does not affect the probability of another. Violation example: disease outbreaks where one infection increases the chance of others (contagion), or phone calls where a burst of calls follows a TV advertisement.\n- Step 2: **Events occur singly** — events happen one at a time, not in clusters. Violation example: customers arriving at a restaurant in family groups (arriving 3–4 at once), or raindrops when you model large drops that form splashes.\n- Step 3: **Events occur at a constant average rate** — the mean number of events per unit interval is the same across all intervals of the same size, so the mean is proportional to the length of the interval. Violation example: traffic flow that has rush hours (rate varies by time of day), or emails that arrive more during working hours than at night.\n\nTakeaway: All three conditions must hold simultaneously. If any one fails significantly, Poisson is not an appropriate model.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "Why is the condition \"events occur at a constant average rate\" equivalent to saying \"the mean number of events is proportional to the length of the interval\"? (2 steps)", "answer": "- Step 1: If events occur at a constant average rate of $$\\lambda$$ per unit time (e.g., 4 events per hour), then in an interval of length $$t$$ units, the expected number of events is $$\\lambda \\times t$$. This is direct proportionality: double the interval length, double the expected count.\n- Step 2: This is why we can scale the Poisson parameter. If $$X \\sim \\text{Po}(4)$$ models events per hour, then events per 90 minutes are modelled by $$Y \\sim \\text{Po}(4 \\times 1.5) = \\text{Po}(6)$$. The rate is \"4 per 60 minutes = 1 per 15 minutes,\" and 90 minutes contains six such 15-minute units. Without constant rate, this scaling would be meaningless — you couldn't predict the mean for a different interval length.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "An ISP has on average 4 users failing to connect per hour. If you want to model failed connections in a 90-minute period, what is the Poisson parameter, and why? (2 steps)", "answer": "- Step 1: The rate is 4 failures per 60 minutes. Since the Poisson rate is constant, we scale proportionally. For 90 minutes, the expected number of failures is:\n$$\\lambda_{90} = 4 \\times \\frac{90}{60} = 4 \\times 1.5 = 6$$\n- Step 2: So the model is $$Y \\sim \\text{Po}(6)$$ where $$Y$$ = number of failed connections in a 90-minute period. The key insight is that **the parameter $$\\lambda$$ is not fixed — it depends on the interval you choose**, and it scales linearly with interval length. A common mistake is to use $$\\lambda = 4$$ regardless of the interval length.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "The number of insect-bite patients per day at a clinic is $$X \\sim \\text{Po}(3)$$. Over a 5-day period, we count how many days have more than 4 patients. Explain why this count follows a binomial distribution, not a Poisson distribution, and identify the binomial parameters. (3 steps)", "answer": "- Step 1: First, compute the probability that a single day has more than 4 patients:\n$$p = \\text{P}(X > 4) = 1 - \\text{P}(X \\leq 4) = 1 - 0.8153 = 0.1847$$\nThis is the \"success probability\" for each day.\n- Step 2: Now consider the 5-day period. For each day, we ask a yes/no question: \"Did more than 4 patients visit?\" Each day is an independent trial with the same probability $$p = 0.1847$$. The number of \"yes\" days out of 5 is a **count of successes in fixed trials** — this is the definition of a binomial distribution.\n- Step 3: So if $$Y$$ = number of days (out of 5) with more than 4 patients, then $$Y \\sim \\text{B}(5, 0.1847)$$. **Key insight**: Poisson models \"how many events in a continuous interval,\" while binomial models \"how many successes in a fixed number of trials.\" Here, the 5 days are the fixed trials, and the Poisson merely provides the per-day success probability.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "If $$X \\sim \\text{Po}(\\lambda)$$ and $$\\text{P}(X=2) = \\text{P}(X=3)$$, find $$\\lambda$$. Walk through the algebra, and explain intuitively why $$\\lambda$$ must be 3. (3 steps)", "answer": "- Step 1: Set up the equation using the PMF:\n$$\\frac{e^{-\\lambda}\\lambda^2}{2!} = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$\nCancel the common factor $$e^{-\\lambda}$$:\n$$\\frac{\\lambda^2}{2} = \\frac{\\lambda^3}{6}$$\n- Step 2: Cross-multiply:\n$$6\\lambda^2 = 2\\lambda^3$$\nDivide both sides by $$2\\lambda^2$$ (valid since $$\\lambda > 0$$):\n$$3 = \\lambda$$\n- Step 3: Intuitive check: the ratio of consecutive Poisson probabilities is $$\\frac{\\text{P}(X=x+1)}{\\text{P}(X=x)} = \\frac{\\lambda}{x+1}$$. This ratio equals 1 (probabilities are equal) when $$\\lambda = x+1$$. For $$x=2$$, this gives $$\\lambda = 3$$. So when the rate equals 3, the distribution \"peaks\" around 2–3, making these two probabilities equal.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "If $$X \\sim \\text{Po}(\\lambda)$$ and $$\\text{P}(X=4) = 3 \\times \\text{P}(X=2)$$, find $$\\lambda$$. (3 steps)", "answer": "- Step 1: Write the equation:\n$$\\frac{e^{-\\lambda}\\lambda^4}{4!} = 3 \\times \\frac{e^{-\\lambda}\\lambda^2}{2!}$$\nCancel $$e^{-\\lambda}$$:\n$$\\frac{\\lambda^4}{24} = \\frac{3\\lambda^2}{2}$$\n- Step 2: Multiply both sides by 24:\n$$\\lambda^4 = 36\\lambda^2$$\nSince $$\\lambda > 0$$, divide by $$\\lambda^2$$:\n$$\\lambda^2 = 36 \\implies \\lambda = 6$$\n- Step 3: Check: with $$\\lambda = 6$$, the ratio $$\\frac{\\text{P}(X=4)}{\\text{P}(X=2)} = \\frac{\\lambda^2 \\cdot 2!}{4!} = \\frac{36 \\times 2}{24} = 3$$. ✓ This confirms the answer.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "If $$X \\sim \\text{Po}(\\lambda)$$ and $$Y \\sim \\text{Po}(\\mu)$$ are independent, what is the distribution of $$X + Y$$? Why must independence hold for this result? (3 steps)", "answer": "- Step 1: If $$X \\sim \\text{Po}(\\lambda)$$ and $$Y \\sim \\text{Po}(\\mu)$$ are independent, then $$X + Y \\sim \\text{Po}(\\lambda + \\mu)$$. The parameters simply add.\n- Step 2: **Why independence matters**: If $$X$$ and $$Y$$ were dependent (e.g., correlated), the variance of $$X+Y$$ would include a covariance term: $$\\text{Var}(X+Y) = \\text{Var}(X) + \\text{Var}(Y) + 2\\text{Cov}(X,Y)$$. For Poisson, we need $$\\text{Var}(X+Y) = \\lambda + \\mu$$ (equal to the new mean $$\\lambda + \\mu$$). This only works if $$\\text{Cov}(X,Y) = 0$$, which requires independence.\n- Step 3: **Visual intuition**: Think of two independent streams of events (e.g., cars from the north and cars from the south passing a point). Each stream independently generates events at its own rate. The total event stream has a combined rate equal to the sum — it's as if you merged two independent flows. But if the streams were correlated (e.g., cars from both directions tend to arrive together in convoys), the combined process wouldn't have a simple Poisson structure.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "When adding two independent Poisson random variables, why must they both refer to the **same time/space interval**? What goes wrong if they don't? (2 steps)", "answer": "- Step 1: The additive property $$X + Y \\sim \\text{Po}(\\lambda + \\mu)$$ requires that $$X$$ and $$Y$$ both count events within the **same interval**. For example, if $$X$$ = cars in 5 minutes and $$Y$$ = other vehicles in 5 minutes, then $$X+Y$$ = total vehicles in 5 minutes, and the result holds.\n- Step 2: If the intervals differ — say $$X$$ = cars in 5 minutes ($$\\text{Po}(2)$$) and $$Y$$ = other vehicles in 15 minutes ($$\\text{Po}(3)$$) — then $$X+Y$$ is meaningless. You'd be adding \"cars in 5 min\" to \"other vehicles in 15 min\" — these aren't comparable. You must **first rescale** to a common interval: convert $$Y$$ to the 5-minute rate ($$\\text{Po}(1)$$), or convert $$X$$ to the 15-minute rate ($$\\text{Po}(6)$$), and then add.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Cars pass an observation point at a rate of 2 per 5 minutes, and other vehicles pass at a rate of 3 per 15 minutes. You want the probability that exactly 5 total vehicles pass in a 10-minute interval. How do you set up the calculation? (4 steps)", "answer": "- Step 1: **Rescale both rates to the same interval** (10 minutes). Cars: rate = 2 per 5 min → 4 per 10 min. Other vehicles: rate = 3 per 15 min → 2 per 10 min.\n- Step 2: Define variables for the 10-minute interval: $$X_1 \\sim \\text{Po}(4)$$ (cars in 10 min), $$Y_1 \\sim \\text{Po}(2)$$ (other vehicles in 10 min).\n- Step 3: Since they're independent and over the same interval, add: $$X_1 + Y_1 \\sim \\text{Po}(4+2) = \\text{Po}(6)$$.\n- Step 4: Compute: $$\\text{P}(X_1 + Y_1 = 5) = \\frac{e^{-6} \\cdot 6^5}{5!} \\approx 0.1606$$.\n\nTakeaway: **Rescale first, then add.** Never add Poisson parameters from different intervals.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "What are the mean and variance of $$X \\sim \\text{Po}(\\lambda)$$? Why is the equality of mean and variance such a powerful diagnostic tool? (3 steps)", "answer": "- Step 1: For $$X \\sim \\text{Po}(\\lambda)$$: $$\\text{E}(X) = \\lambda$$ and $$\\text{Var}(X) = \\lambda$$. The mean and variance are **equal** — both are the single parameter $$\\lambda$$.\n- Step 2: This is a **diagnostic test** for whether Poisson is a suitable model. If you collect data and compute the sample mean and sample variance, and they are approximately equal, this supports the Poisson model. If the variance is much larger than the mean (\"overdispersion\"), events may be clustered or correlated. If the variance is much smaller (\"underdispersion\"), events may be too regular (e.g., scheduled rather than random).\n- Step 3: Compare with other distributions: for a binomial $$\\text{B}(n,p)$$, the variance $$np(1-p)$$ is always less than the mean $$np$$. For a uniform distribution on $$\\{1,2,...,n\\}$$, the variance depends on $$n$$ independently of the mean. The **mean = variance** property is unique to Poisson and serves as its fingerprint.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "Data on daisies in 80 squares gives $$\\sum x = 295$$ and $$\\sum x^2 = 1386$$. The sample mean is 3.69 and sample variance is 3.73. Why does this support using a Poisson model, and what value of $$\\lambda$$ should be used? (3 steps)", "answer": "- Step 1: The sample mean $$\\bar{x} = \\frac{295}{80} = 3.6875 \\approx 3.69$$ and sample variance $$s^2 = \\frac{1386}{80} - (3.6875)^2 = 17.325 - 13.598 = 3.727 \\approx 3.73$$.\n- Step 2: The mean (3.69) and variance (3.73) are **very close** — they agree to 1 decimal place (3.7). Since Poisson requires mean = variance, this near-equality strongly supports the Poisson model. If the variance were, say, 10, the model would be inappropriate (overdispersion).\n- Step 3: Use $$\\lambda = 3.7$$ (rounding the mean to a suitable value, as both mean and variance agree to this level). The model is $$X \\sim \\text{Po}(3.7)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Why can't we simply use observed relative frequencies to estimate the probability of rare events (e.g., 8 or more flaws on a piece of cloth), and how does the Poisson model help? (2 steps)", "answer": "- Step 1: For rare events (like 8+ flaws), the observed frequency in a sample may be **0 or very small**, giving a relative frequency of 0 or an unreliable estimate. For example, if no pieces had 8 flaws in your sample of 120, you'd estimate $$\\text{P}(X \\geq 8) = 0$$, but this is clearly wrong — it's just that 120 is too small a sample to observe such a rare event.\n- Step 2: The Poisson model **extrapolates** from the overall pattern (governed by $$\\lambda$$) to estimate probabilities for rare events that weren't observed. Using $$X \\sim \\text{Po}(\\lambda)$$, you can compute $$\\text{P}(X \\geq 8) = 1 - \\text{P}(X \\leq 7)$$, which gives a small but **non-zero** and meaningful estimate. The model fills in the gaps that the data can't reach.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "What is the ratio of consecutive Poisson probabilities, $$\\frac{\\text{P}(X=x+1)}{\\text{P}(X=x)}$$? What does this tell you about the shape of the Poisson distribution? (3 steps)", "answer": "- Step 1: Compute the ratio:\n$$\\frac{\\text{P}(X=x+1)}{\\text{P}(X=x)} = \\frac{e^{-\\lambda}\\lambda^{x+1}/(x+1)!}{e^{-\\lambda}\\lambda^x/x!} = \\frac{\\lambda}{x+1}$$\n- Step 2: This ratio tells us when probabilities are increasing vs. decreasing:\n  + When $$\\lambda > x+1$$ (i.e., $$x < \\lambda - 1$$): ratio > 1, so probabilities are **increasing**.\n  + When $$\\lambda = x+1$$ (i.e., $$x = \\lambda - 1$$): ratio = 1, probabilities are **equal** (peak region).\n  + When $$\\lambda < x+1$$ (i.e., $$x > \\lambda - 1$$): ratio < 1, probabilities are **decreasing**.\n- Step 3: The Poisson distribution rises, peaks near $$x = \\lambda - 1$$ and $$x = \\lambda$$, then falls. For integer $$\\lambda$$, the two most likely values are $$\\lambda - 1$$ and $$\\lambda$$ (they have equal probability). For non-integer $$\\lambda$$, the mode is the integer part of $$\\lambda$$. As $$\\lambda$$ increases, the distribution becomes more symmetric and bell-shaped (approaching a normal distribution, by the Central Limit Theorem).", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "A company receives emails at a rate of 3 per 5 minutes. What is the probability of receiving exactly 7 emails in a 10-minute period? Set up the model carefully. (3 steps)", "answer": "- Step 1: The rate is 3 per 5 minutes. For a 10-minute period, the expected number is $$\\lambda = 3 \\times \\frac{10}{5} = 6$$. So $$X \\sim \\text{Po}(6)$$ where $$X$$ = emails in 10 minutes.\n- Step 2: Compute:\n$$\\text{P}(X=7) = \\frac{e^{-6} \\cdot 6^7}{7!} \\approx 0.1377$$\n- Step 3: Common mistake: using $$\\lambda = 3$$ (the rate for 5 minutes) when the interval is 10 minutes. Always rescale $$\\lambda$$ to match the interval you're asked about.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "For $$X \\sim \\text{Po}(\\lambda)$$, show that $$\\text{P}(Q=0) = e^{-(\\lambda+\\mu)}$$ where $$Q = X + Y$$ and $$Y \\sim \\text{Po}(\\mu)$$ independently. What is the intuitive meaning? (3 steps)", "answer": "- Step 1: Since $$X$$ and $$Y$$ are independent Poisson variables, $$Q = X + Y \\sim \\text{Po}(\\lambda + \\mu)$$.\n- Step 2: The probability that $$Q = 0$$ means **neither** $$X$$ nor $$Y$$ produces any events:\n$$\\text{P}(Q=0) = \\text{P}(X=0 \\text{ and } Y=0) = \\text{P}(X=0) \\cdot \\text{P}(Y=0) = e^{-\\lambda} \\cdot e^{-\\mu} = e^{-(\\lambda+\\mu)}$$\n- Step 3: This matches the Poisson formula with parameter $$\\lambda + \\mu$$: $$\\text{P}(Q=0) = e^{-(\\lambda+\\mu)}$$. Intuitively, for zero total events, we need zero from each source, and since the sources are independent, we multiply the individual probabilities. The exponential rates add because the combined rate is $$\\lambda + \\mu$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "For $$Q = X + Y$$ where $$X \\sim \\text{Po}(\\lambda)$$ and $$Y \\sim \\text{Po}(\\mu)$$ are independent, show that $$\\text{P}(Q=1) = (\\lambda+\\mu)e^{-(\\lambda+\\mu)}$$. (3 steps)", "answer": "- Step 1: The event $$Q = 1$$ means exactly one event total from both sources. This can happen in two mutually exclusive ways:\n  + $$X = 1$$ and $$Y = 0$$\n  + $$X = 0$$ and $$Y = 1$$\n- Step 2: Calculate each:\n$$\\text{P}(X=1, Y=0) = \\lambda e^{-\\lambda} \\cdot e^{-\\mu} = \\lambda e^{-(\\lambda+\\mu)}$$\n$$\\text{P}(X=0, Y=1) = e^{-\\lambda} \\cdot \\mu e^{-\\mu} = \\mu e^{-(\\lambda+\\mu)}$$\n- Step 3: Add them (mutually exclusive):\n$$\\text{P}(Q=1) = \\lambda e^{-(\\lambda+\\mu)} + \\mu e^{-(\\lambda+\\mu)} = (\\lambda + \\mu)e^{-(\\lambda+\\mu)}$$\nThis matches the Poisson PMF for $$Q \\sim \\text{Po}(\\lambda+\\mu)$$: $$\\text{P}(Q=1) = \\frac{e^{-(\\lambda+\\mu)}(\\lambda+\\mu)^1}{1!} = (\\lambda+\\mu)e^{-(\\lambda+\\mu)}$$. ✓", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Misconception check: If $$X \\sim \\text{Po}(3)$$ models patients per day, can we say $$2X \\sim \\text{Po}(6)$$ for patients over 2 days? Explain why this is wrong and give the correct approach. (3 steps)", "answer": "- Step 1: **This is a critical misconception.** $$2X$$ means \"twice the number of patients on a single day,\" not \"the number of patients over two days.\" The variable $$2X$$ takes even values only (0, 2, 4, 6, ...) and its distribution is **not** Poisson.\n- Step 2: The correct approach: let $$X_1$$ = patients on day 1 and $$X_2$$ = patients on day 2, where $$X_1 \\sim \\text{Po}(3)$$ and $$X_2 \\sim \\text{Po}(3)$$ independently. Then the total over two days is $$X_1 + X_2 \\sim \\text{Po}(3+3) = \\text{Po}(6)$$.\n- Step 3: The difference: $$2X$$ is **scaling a single observation** (which changes the distribution type), while $$X_1 + X_2$$ is **adding two independent counts** (which preserves the Poisson family). Similarly, $$\\text{E}(2X) = 6$$ and $$\\text{Var}(2X) = 4 \\times 3 = 12$$, but for $$X_1 + X_2$$, $$\\text{E}(X_1+X_2) = 6$$ and $$\\text{Var}(X_1+X_2) = 6$$. The variance tells you: $$2X$$ is not Poisson!", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "A Poisson cumulative distribution table gives $$\\text{P}(X \\leq x)$$ for integer $$x$$. If you need $$\\text{P}(X < b)$$ where $$b$$ is an integer, how do you use the table? (2 steps)", "answer": "- Step 1: For a discrete distribution, $$\\text{P}(X < b)$$ means $$X$$ takes values $$0, 1, 2, \\ldots, b-1$$. This is the same as $$\\text{P}(X \\leq b-1)$$, because the next value up from $$b-1$$ is $$b$$, which is excluded by the strict inequality.\n- Step 2: So look up $$\\text{P}(X \\leq b-1)$$ in the table. For example, if $$b = 8$$ and $$X \\sim \\text{Po}(7.5)$$, then $$\\text{P}(X < 8) = \\text{P}(X \\leq 7) = 0.5246$$. **Common mistake**: looking up $$\\text{P}(X \\leq 8)$$ instead of $$\\text{P}(X \\leq 7)$$ — off by one.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "If you need to find the value of $$c$$ such that $$\\text{P}(X \\geq c) = 0.3380$$ for $$X \\sim \\text{Po}(7.5)$$, how do you convert this into a form usable with cumulative tables? (3 steps)", "answer": "- Step 1: The tables give $$\\text{P}(X \\leq x)$$, not $$\\text{P}(X \\geq x)$$. Convert using the complement:\n$$\\text{P}(X \\geq c) = 1 - \\text{P}(X \\leq c-1) = 0.3380$$\n- Step 2: Solve for the cumulative probability:\n$$\\text{P}(X \\leq c-1) = 1 - 0.3380 = 0.6620$$\n- Step 3: Look up 0.6620 in the $$\\text{Po}(7.5)$$ table. We find $$\\text{P}(X \\leq 8) = 0.6620$$, so $$c - 1 = 8$$, giving $$c = 9$$. The key trick is always converting to a \"$$\\leq$$\" inequality for table look-up.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "An elevator breaks down at a mean rate of 3 times per four-week period. What is the rate per week, and what model should you use for breakdowns in one week? (2 steps)", "answer": "- Step 1: Scale the rate proportionally. Three breakdowns per 4 weeks means:\n$$\\text{Rate per week} = \\frac{3}{4} = 0.75$$\n- Step 2: For the number of breakdowns in one week, model with $$X \\sim \\text{Po}(0.75)$$. The probability of at least one breakdown is $$\\text{P}(X \\geq 1) = 1 - e^{-0.75}$$. Note: the rate 3 per four weeks is the given rate — you must always rescale to the interval asked about.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "An elevator broke down twice last week. Does this information change the probability of a breakdown next week? What Poisson property is relevant? (2 steps)", "answer": "- Step 1: **No, it does not change the probability.** This is because of the **independence** property of Poisson events. The number of events in one interval is independent of the number in any other non-overlapping interval.\n- Step 2: This is often called the **\"memoryless\"** property of Poisson processes. Knowing the past gives no information about the future (unlike, say, a Markov chain where state matters, or a situation with wear-and-tear where recent breakdowns might indicate a worsening condition). If the model truly holds, $$\\text{P}(\\text{breakdown next week})$$ is still based on $$\\text{Po}(0.75)$$ regardless of what happened last week.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "Flaws occur in material at a mean rate of 1.5 per 50 m. The material is sold in 200 m rolls. Five rolls are bought. What is the probability that at least two rolls have fewer than 4 flaws? Walk through the full modelling chain. (4 steps)", "answer": "- Step 1: **Model flaws per roll.** Rate = 1.5 per 50 m, so per 200 m roll: $$\\lambda = 1.5 \\times \\frac{200}{50} = 6$$. So $$X \\sim \\text{Po}(6)$$ where $$X$$ = flaws per roll.\n- Step 2: **Find $$p = \\text{P}(\\text{fewer than 4 flaws})$$** per roll:\n$$p = \\text{P}(X \\leq 3) = 0.1512$$ (from tables with $$\\lambda = 6$$).\n- Step 3: **Model across 5 rolls.** Each roll is an independent trial (yes/no: fewer than 4 flaws?). This is binomial: $$Y \\sim \\text{B}(5, 0.1512)$$ where $$Y$$ = number of rolls with fewer than 4 flaws.\n- Step 4: **Compute:**\n$$\\text{P}(Y \\geq 2) = 1 - \\text{P}(Y \\leq 1) = 1 - [\\text{P}(Y=0) + \\text{P}(Y=1)]$$\n$$= 1 - [(0.8488)^5 + 5(0.1512)(0.8488)^4] \\approx 1 - [0.4378 + 0.3910] = 1 - 0.8288 = 0.1712$$\n\nTakeaway: This is a classic \"Poisson inside, Binomial outside\" structure — Poisson gives the per-unit probability, Binomial counts across multiple units.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "A company wants to be at least 99% sure they can fulfil all bus hire requests on any Sunday, where requests follow $$\\text{Po}(5)$$. How many buses must they own? (3 steps)", "answer": "- Step 1: Let $$X \\sim \\text{Po}(5)$$ be the number of requests. They need $$\\text{P}(X \\leq n) \\geq 0.99$$, where $$n$$ is the number of buses they own (the maximum number of requests they can handle).\n- Step 2: Use cumulative Poisson tables with $$\\lambda = 5$$:\n$$\\text{P}(X \\leq 9) = 0.9682$$ (not enough)\n$$\\text{P}(X \\leq 10) = 0.9863$$ (not enough)\n$$\\text{P}(X \\leq 11) = 0.9945$$ (meets the 99% threshold)\n- Step 3: They need at least **11 buses**. The smallest $$n$$ for which $$\\text{P}(X \\leq n) \\geq 0.99$$ is $$n = 11$$. This means there's only a 0.55% chance of more than 11 requests, keeping the risk of being unable to fulfil all requests below 1%.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "A maintenance firm will give a full refund if more than $$n$$ breakdowns occur in a 6-week period, where breakdowns occur at 1.5 per week. The firm wants $$\\text{P}(\\text{refund}) \\leq 0.05$$. Find the smallest $$n$$. (3 steps)", "answer": "- Step 1: For 6 weeks, the expected number of breakdowns is $$\\lambda = 1.5 \\times 6 = 9$$. So $$X \\sim \\text{Po}(9)$$ where $$X$$ = breakdowns in 6 weeks.\n- Step 2: The firm pays a refund if $$X > n$$, so they want $$\\text{P}(X > n) \\leq 0.05$$, i.e., $$\\text{P}(X \\leq n) \\geq 0.95$$.\n- Step 3: From cumulative tables with $$\\lambda = 9$$:\n$$\\text{P}(X \\leq 13) = 0.9261$$ (too low)\n$$\\text{P}(X \\leq 14) = 0.9585$$ (meets 95%)\nSo the smallest $$n$$ is **14**. With $$n = 14$$, there's only a 4.15% chance of paying a refund.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "Three photocopiers on different floors break down independently at rates 0.4, 0.2, and 0.8 per week respectively. Find the probability that at least one breaks down in a given week. (3 steps)", "answer": "- Step 1: The total breakdown rate is $$\\lambda = 0.4 + 0.2 + 0.8 = 1.4$$ per week. So total breakdowns $$T \\sim \\text{Po}(1.4)$$.\n- Step 2: $$\\text{P}(\\text{at least one breakdown}) = \\text{P}(T \\geq 1) = 1 - \\text{P}(T = 0) = 1 - e^{-1.4}$$.\n- Step 3: $$e^{-1.4} \\approx 0.2466$$, so $$\\text{P}(T \\geq 1) \\approx 1 - 0.2466 = 0.7534$$. Alternatively, you could compute $$\\text{P}(\\text{none break down}) = e^{-0.4} \\times e^{-0.2} \\times e^{-0.8} = e^{-1.4}$$, giving the same result. The additive property of independent Poissons makes the direct approach much simpler.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "For the three photocopiers (rates 0.4, 0.2, 0.8 per week), find the probability that **each** breaks down exactly once in a given week. Why can't you use the additive property for this? (3 steps)", "answer": "- Step 1: \"Each breaks down exactly once\" means $$X_1 = 1$$ AND $$X_2 = 1$$ AND $$X_3 = 1$$. This is a **joint probability**, not a total. The additive property gives the distribution of the **sum** $$X_1 + X_2 + X_3$$, which doesn't tell us the individual values.\n- Step 2: Since the copiers break down independently, multiply the individual probabilities:\n$$\\text{P}(X_1=1) \\times \\text{P}(X_2=1) \\times \\text{P}(X_3=1) = (0.4e^{-0.4}) \\times (0.2e^{-0.2}) \\times (0.8e^{-0.8})$$\n- Step 3: Compute: $$= 0.4 \\times 0.2 \\times 0.8 \\times e^{-(0.4+0.2+0.8)} = 0.064 \\times e^{-1.4} \\approx 0.064 \\times 0.2466 \\approx 0.0158$$. This is much smaller than the probability of at least one total breakdown (0.7534), because requiring *each specific copier* to break down exactly once is a very specific joint event.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "A director receives personal emails at rate 1.8/hr, business at 3.7/hr, and advertising at 1.5/hr. What is the probability she receives **at least one of each type** during a 30-minute period? (3 steps)", "answer": "- Step 1: Scale rates to 30 minutes: personal $$\\lambda_1 = 0.9$$, business $$\\lambda_2 = 1.85$$, advertising $$\\lambda_3 = 0.75$$.\n- Step 2: For each type, compute $$\\text{P}(\\text{at least one}) = 1 - e^{-\\lambda_i}$$:\n  + Personal: $$1 - e^{-0.9} \\approx 1 - 0.4066 = 0.5934$$\n  + Business: $$1 - e^{-1.85} \\approx 1 - 0.1572 = 0.8428$$\n  + Advertising: $$1 - e^{-0.75} \\approx 1 - 0.4724 = 0.5276$$\n- Step 3: Since the three types arrive independently, multiply:\n$$\\text{P}(\\text{at least one of each}) = 0.5934 \\times 0.8428 \\times 0.5276 \\approx 0.2637$$\n\nKey point: \"At least one of each type\" requires independence between types (which we assume), and we use the complement for each type individually. We do NOT use the additive property here — that would give the total email count, not the per-type breakdown.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "Using the same email rates (1.8, 3.7, 1.5 per hour), find the probability of more than 50 emails in an 8-hour working day. (3 steps)", "answer": "- Step 1: Total rate per hour = $$1.8 + 3.7 + 1.5 = 7.0$$. For 8 hours, $$\\lambda = 7 \\times 8 = 56$$. Total emails $$T \\sim \\text{Po}(56)$$.\n- Step 2: We need $$\\text{P}(T > 50) = 1 - \\text{P}(T \\leq 50)$$. With $$\\lambda = 56$$, this is a large parameter — the tables typically only go up to $$\\lambda = 10$$, so we'd need a calculator.\n- Step 3: For large $$\\lambda$$, the Poisson is well approximated by a normal distribution: $$T \\approx \\text{N}(56, 56)$$. Then:\n$$\\text{P}(T > 50) = \\text{P}\\left(Z > \\frac{50.5 - 56}{\\sqrt{56}}\\right) = \\text{P}\\left(Z > \\frac{-5.5}{7.483}\\right) = \\text{P}(Z > -0.735) \\approx 0.769$$\n(The 0.5 is a continuity correction.) The normal approximation works well when $$\\lambda$$ is large (typically $$\\lambda > 15$$).", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": true}, {"question": "If data has a sample mean much larger than the sample variance (e.g., mean = 10, variance = 2), why is Poisson a poor model? What distribution might be more appropriate? (2 steps)", "answer": "- Step 1: Poisson requires mean = variance. If the variance is much smaller than the mean (\"underdispersion\"), the data is **more regular** than Poisson predicts. Poisson expects considerable variability around the mean; the data shows less.\n- Step 2: This pattern suggests events are **too evenly spaced** — perhaps they're scheduled or regulated. A binomial distribution (where variance = $$np(1-p) < np =$$ mean) might be more appropriate, or the events might not be truly random. For example, if buses arrive every 10 minutes on schedule, the count per hour has low variance relative to the mean.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": true}, {"question": "If data has a sample variance much larger than the sample mean (e.g., mean = 3, variance = 15), why is Poisson a poor model? What might be causing this? (2 steps)", "answer": "- Step 1: This is **overdispersion** — the data is far more variable than Poisson predicts. Poisson assumes events are independent and occur singly; if variance greatly exceeds the mean, one or both assumptions are violated.\n- Step 2: Common causes include:\n  + **Clustering**: events occur in bursts (e.g., customers arriving in groups), violating the \"singly\" condition.\n  + **Correlation**: one event makes others more likely (e.g., contagion), violating independence.\n  + **Varying rate**: the average rate changes across the observation period (e.g., rush hour vs. off-peak), violating the constant rate condition.\nA negative binomial distribution is often used as an alternative when overdispersion is present.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": true}, {"question": "Exercise: For $$X \\sim \\text{Po}(5)$$, find $$\\text{P}(X = 3)$$ using the formula. Walk through the computation step by step. (3 steps)", "answer": "- Step 1: Apply the PMF: $$\\text{P}(X=3) = \\frac{e^{-5} \\cdot 5^3}{3!} = \\frac{e^{-5} \\cdot 125}{6}$$\n- Step 2: Compute: $$e^{-5} \\approx 0.006738$$, so $$\\frac{0.006738 \\times 125}{6} = \\frac{0.8422}{6} \\approx 0.1404$$\n- Step 3: This matches the table value. Notice that for $$\\lambda = 5$$, the most likely values are around 3–5 (since the mode is near $$\\lambda - 1 = 4$$ and $$\\lambda = 5$$), so $$\\text{P}(X=3)$$ is moderately large.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "Exercise: For $$X \\sim \\text{Po}(2.5)$$, find $$\\text{P}(1 < X \\leq 3)$$. (2 steps)", "answer": "- Step 1: The inequality means $$X \\in \\{2, 3\\}$$. So $$\\text{P}(1 < X \\leq 3) = \\text{P}(X=2) + \\text{P}(X=3)$$.\n- Step 2: Alternatively, use cumulative probabilities: $$\\text{P}(X \\leq 3) - \\text{P}(X \\leq 1)$$. From tables with $$\\lambda = 2.5$$: $$\\text{P}(X \\leq 3) = 0.7576$$ and $$\\text{P}(X \\leq 1) = 0.2873$$. So the answer is $$0.7576 - 0.2873 = 0.4703$$.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "Exercise: For $$X \\sim \\text{Po}(3.5)$$, find the smallest value of $$c$$ such that $$\\text{P}(X \\leq c) \\geq 0.95$$. (2 steps)", "answer": "- Step 1: Use cumulative Poisson tables with $$\\lambda = 3.5$$:\n  + $$\\text{P}(X \\leq 5) = 0.8576$$ (too low)\n  + $$\\text{P}(X \\leq 6) = 0.9347$$ (too low)\n  + $$\\text{P}(X \\leq 7) = 0.9733$$ (meets 0.95)\n- Step 2: The smallest $$c$$ is **7**. With $$c = 7$$, we're 97.3% confident that $$X$$ won't exceed 7.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "A call-centre agent handles calls at 15 per hour. Find the probability of exactly 4 calls in a randomly selected 20-minute interval. (2 steps)", "answer": "- Step 1: Scale the rate: 15 per 60 minutes = 0.25 per minute. For 20 minutes: $$\\lambda = 15 \\times \\frac{20}{60} = 5$$. So $$X \\sim \\text{Po}(5)$$.\n- Step 2: $$\\text{P}(X = 4) = \\frac{e^{-5} \\cdot 5^4}{4!} = \\frac{e^{-5} \\cdot 625}{24} \\approx 0.1755$$.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "Cars pass a bridge at 180 per hour. Find the probability that more than 5 cars cross in any given minute. (3 steps)", "answer": "- Step 1: Rate per minute = $$\\frac{180}{60} = 3$$. So $$X \\sim \\text{Po}(3)$$ for cars per minute.\n- Step 2: $$\\text{P}(X > 5) = 1 - \\text{P}(X \\leq 5)$$. From tables with $$\\lambda = 3$$: $$\\text{P}(X \\leq 5) = 0.9161$$.\n- Step 3: $$\\text{P}(X > 5) = 1 - 0.9161 = 0.0839$$. About an 8.4% chance — fairly unlikely but not negligible, consistent with the mean being 3 (values above 5 are in the right tail).", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "Aisha receives letters at 1.2/day and Biyu at 0.8/day (independently). Find the probability that on a particular day they receive a total of 3 letters between them. (2 steps)", "answer": "- Step 1: Total rate = $$1.2 + 0.8 = 2.0$$ letters per day. So $$T \\sim \\text{Po}(2)$$ for total letters per day.\n- Step 2: $$\\text{P}(T = 3) = \\frac{e^{-2} \\cdot 2^3}{3!} = \\frac{8e^{-2}}{6} \\approx \\frac{1.0827}{6} \\approx 0.1804$$.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "For Aisha (1.2/day) and Biyu (0.8/day), find the probability that **each** receives at least 1 letter on a particular day. (2 steps)", "answer": "- Step 1: Compute individually: $$\\text{P}(\\text{Aisha} \\geq 1) = 1 - e^{-1.2} \\approx 1 - 0.3012 = 0.6988$$. $$\\text{P}(\\text{Biyu} \\geq 1) = 1 - e^{-0.8} \\approx 1 - 0.4493 = 0.5507$$.\n- Step 2: Since independent, multiply: $$\\text{P}(\\text{each} \\geq 1) = 0.6988 \\times 0.5507 \\approx 0.3848$$. Note this is different from \"total ≥ 2\" (which would use the additive property). The question asks about each person individually, so we must use the joint probability.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "A salesman sells cars at 6 per week. Over 4 consecutive weeks, find the probability that exactly 2 of those weeks have exactly 5 sales. Identify both distributions used. (3 steps)", "answer": "- Step 1: First, find the probability of exactly 5 sales in a single week. With $$X \\sim \\text{Po}(6)$$: $$\\text{P}(X=5) = \\frac{e^{-6} \\cdot 6^5}{5!} \\approx 0.1606$$. Call this $$p = 0.1606$$.\n- Step 2: Now model across 4 weeks. Each week is a trial: \"did the salesman sell exactly 5 cars?\" with probability $$p$$. The number of such weeks is $$Y \\sim \\text{B}(4, 0.1606)$$.\n- Step 3: $$\\text{P}(Y = 2) = \\binom{4}{2}(0.1606)^2(0.8394)^2 = 6 \\times 0.0258 \\times 0.7046 \\approx 0.1090$$. Again, Poisson gives the per-unit probability, and Binomial counts across multiple independent units.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "Accidents occur at a roundabout at 15 per year. Find the probability of at least 1 accident in exactly 4 months out of a 6-month period. (4 steps)", "answer": "- Step 1: Rate per month = $$\\frac{15}{12} = 1.25$$. So $$X \\sim \\text{Po}(1.25)$$ for accidents per month.\n- Step 2: $$\\text{P}(\\text{at least 1 per month}) = 1 - e^{-1.25} \\approx 1 - 0.2865 = 0.7135$$. Call this $$p$$.\n- Step 3: Across 6 months, the number of months with at least 1 accident is $$Y \\sim \\text{B}(6, 0.7135)$$.\n- Step 4: $$\\text{P}(Y = 4) = \\binom{6}{4}(0.7135)^4(0.2865)^2 = 15 \\times 0.2596 \\times 0.0821 \\approx 0.3194$$.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "Given that exactly 10 planes landed between 2pm and 3pm (rate: 1 per 4 minutes normally), find the probability that exactly 5 landed between 2pm and 2:30pm. This is a conditional probability problem — what's the key insight? (3 steps)", "answer": "- Step 1: The key insight is that **given a fixed total of events in an interval, the distribution of events across sub-intervals is binomial**. If 10 planes landed in 60 minutes, and each plane independently has probability $$\\frac{30}{60} = 0.5$$ of landing in the first 30 minutes, then the count in the first 30 minutes follows a binomial distribution.\n- Step 2: More formally, if $$N$$ events occur in an interval and each event independently falls in a sub-interval of relative length $$p$$, then the number in the sub-interval is $$\\text{Bin}(N, p)$$. Here, $$N = 10$$ and $$p = 0.5$$.\n- Step 3: $$\\text{P}(\\text{exactly 5 in first 30 min}) = \\binom{10}{5}(0.5)^5(0.5)^5 = 252 \\times \\frac{1}{1024} \\approx 0.2461$$. This result does NOT depend on the Poisson rate — it only depends on the total count and the relative interval length.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "Why does the Poisson distribution have no upper bound on $$X$$, unlike the binomial? What does this mean practically? (2 steps)", "answer": "- Step 1: In the binomial, the count is bounded by $$n$$ (you can't have more successes than trials). In the Poisson, there is no \"$$n$$\" — the interval is continuous, and theoretically, an infinite number of events could occur (though with vanishingly small probability for large counts). The PMF is defined for all $$x = 0, 1, 2, 3, \\ldots$$ without an upper limit.\n- Step 2: Practically, for moderate $$\\lambda$$, probabilities for large $$x$$ become negligibly small (the factorial in the denominator grows faster than the power of $$\\lambda$$). For $$\\lambda = 3$$, $$\\text{P}(X > 10) \\approx 0.001$$. But the lack of an upper bound is essential — it reflects the reality that in a continuous process, there's no hard ceiling on how many events could occur.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "What is the relationship between the Poisson distribution and the binomial distribution when $$n$$ is large and $$p$$ is small? Why does this approximation work? (3 steps)", "answer": "- Step 1: When $$n$$ is large and $$p$$ is small (so $$np$$ is moderate), the binomial $$\\text{B}(n, p)$$ is well approximated by the Poisson $$\\text{Po}(np)$$. This is the **Poisson approximation to the binomial**.\n- Step 2: Intuitively, the binomial counts successes in $$n$$ trials. When $$n$$ is large and $$p$$ is small, most trials result in failure, and the rare successes occur independently and singly — exactly the conditions for Poisson. The expected number of successes is $$np$$, which becomes the Poisson rate $$\\lambda$$.\n- Step 3: Example: left-handed people are 8% of the population. In a sample of 50, $$X \\sim \\text{B}(50, 0.08)$$. Here $$np = 4$$, so we approximate with $$\\text{Po}(4)$$. The exact binomial gives $$\\text{P}(X \\leq 3) \\approx 0.4332$$, while the Poisson approximation gives $$\\text{P}(X \\leq 3) \\approx 0.4335$$ — very close. The approximation improves as $$n \\to \\infty$$ and $$p \\to 0$$ with $$np$$ fixed.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "A company records policies sold per week over 150 weeks. The data gives mean ≈ 2.44 and variance ≈ 2.56. Does this support a Poisson model? How would you decide? (2 steps)", "answer": "- Step 1: For Poisson, mean should equal variance. Here, mean = 2.44 and variance = 2.56. These are **close** but not identical. In real data, they won't be exactly equal due to sampling variation.\n- Step 2: The difference is small (about 5% of the mean), so this **supports** the Poisson model as a reasonable approximation. If the variance were, say, 10 or 0.5, the discrepancy would be too large. There's no strict threshold, but a useful heuristic: if the ratio variance/mean is between roughly 0.8 and 1.2, Poisson is plausible. Here, 2.56/2.44 ≈ 1.05 — well within range.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "Exercise: For $$X \\sim \\text{Po}(3.1)$$, find $$\\text{P}(1 \\leq X \\leq 4)$$ using the cumulative approach. (2 steps)", "answer": "- Step 1: $$\\text{P}(1 \\leq X \\leq 4) = \\text{P}(X \\leq 4) - \\text{P}(X \\leq 0)$$. Note: $$\\text{P}(X \\leq 0) = \\text{P}(X = 0)$$, and we subtract it to remove the 0 case.\n- Step 2: From tables with $$\\lambda = 3.1$$: $$\\text{P}(X \\leq 4) = 0.8148$$ and $$\\text{P}(X \\leq 0) = 0.0450$$. So the answer is $$0.8148 - 0.0450 = 0.7698$$.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question
