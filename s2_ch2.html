ogether)\n\nThe constant rate and independence are key — queues often have time-varying rates and correlation between arrivals.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": true}, {"question": "Given $X \\sim \\text{Po}(\\lambda)$, if you know $P(X=0) = 0.2$, what is $\\lambda$? How can you then find $P(X=1)$, $P(X=2)$, etc.? (2 steps)", "answer": "- Step 1: Since $P(X=0) = e^{-\\lambda}$, we have $e^{-\\lambda} = 0.2$, so $\\lambda = -\\ln(0.2) \\approx 1.6094$\n\n- Step 2: Once $\\lambda$ is known, all other probabilities follow from the pmf:\n- $P(X=1) = \\lambda e^{-\\lambda} = 1.6094 \\times 0.2 \\approx 0.3219$\n- $P(X=2) = \\frac{\\lambda^2 e^{-\\lambda}}{2!} = \\frac{(1.6094)^2 \\times 0.2}{2} \\approx 0.2592$\n\nAnd so on. The entire distribution is determined by a single parameter — this is the \"one-parameter\" nature of Poisson.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "A car salesman sells cars at 6/week. Find probability of at least 2 weeks with at least 2 sales in a 4-week period. (3 steps)", "answer": "- Step 1: For one week, $X \\sim \\text{Po}(6)$. $P(X \\geq 2) = 1 - P(X \\leq 1) = 1 - 0.0174 = 0.9826$ (from tables)\n\nWait, that's nearly certain. Let me recalculate: Actually $P(X \\geq 2)$ with $\\lambda = 6$ is indeed very high. But let me check: $P(X \\leq 1) = P(X=0) + P(X=1) = e^{-6} + 6e^{-6} = 0.00248 + 0.0149 = 0.0174$. Yes, so $P(X \\geq 2) = 0.9826$.\n\nActually, I think the question might have meant something else, or $\\lambda=6$ makes this trivial. Let me check if maybe it should be different. But I'll proceed as stated.\n\n- Step 2: In 4 weeks, let $Y$ be weeks with ≥2 sales: $Y \\sim B(4, 0.9826)$\n\n- Step 3: $P(Y \\geq 2) = 1 - P(Y \\leq 1) = 1 - [P(Y=0) + P(Y=1)] = 1 - [(0.0174)^4 + 4(0.0174)^3(0.9826)] \\approx 0.99997$\n\nWith such a high per-week probability, it's almost certain to have at least 2 such weeks.\n\nActually wait, this seems odd. Let me re-read: maybe the question meant something different. Actually, looking at the original, I think it's correct — with mean 6, probability of 2+ is indeed extremely high.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "In a hospital, patients arrive at 5/hour. Find probability of exactly 4 in 30 minutes, at least 3 in 30 minutes. Given a patient arrived at 11:00, find probability next patient arrives before 11:15. (3 steps)", "answer": "- Step 1: For 30 min (0.5 hr): $\\lambda = 5 \\times 0.5 = 2.5$. $X \\sim \\text{Po}(2.5)$. $P(X=4) = \\frac{e^{-2.5} \\times 2.5^4}{4!} \\approx 0.1336$\n\n- Step 2: $P(X \\geq 3) = 1 - P(X \\leq 2) = 1 - 0.5438 = 0.4562$\n\n- Step 3: For the next patient arriving after 11:00, before 11:15 is 15 minutes = 0.25 hr. $\\lambda = 5 \\times 0.25 = 1.25$. The probability that at least one arrives in that interval is $1 - P(0) = 1 - e^{-1.25} \\approx 0.7135$\n\nThis is the memoryless property in action: given no arrivals up to 11:00, the time to next arrival still follows the same exponential distribution.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}], "count": 52}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What three conditions must be satisfied for the Poisson distribution to be an appropriate model for counting events in an interval? (3 steps)", "answer": "- Step 1: The events must occur **independently** — the occurrence of one event does not affect the probability of another event occurring.\n- Step 2: The events must occur **singly** — at most one event can occur at any given point in time or space (no simultaneous events).\n- Step 3: The events must occur at a **constant average rate** — the mean number of events in an interval is proportional to the length of that interval.\n\nThese three conditions ensure the Poisson process models random events occurring uniformly over time or space.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Prove that the Poisson distribution is a valid probability distribution, i.e., that ΣP(X=x) = 1. (3 steps)", "answer": "- Step 1: Start with the sum of all probabilities:\n$$\\Sigma P(X=x) = e^{-\\lambda} + e^{-\\lambda}\\lambda + \\frac{e^{-\\lambda}\\lambda^2}{2!} + \\frac{e^{-\\lambda}\\lambda^3}{3!} + \\ldots$$\n- Step 2: Factor out e^(-λ):\n$$\\Sigma P(X=x) = e^{-\\lambda}\\left(1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\ldots\\right)$$\n- Step 3: Recognize the series in brackets as the Maclaurin expansion of e^λ:\n$$e^\\lambda = 1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\ldots$$\nSo: $$\\Sigma P(X=x) = e^{-\\lambda} \\cdot e^\\lambda = 1$$\nThis confirms it is a valid probability distribution.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "For a Poisson distribution, what does the parameter λ represent, and what is its relationship to the mean and variance? (1 step)", "answer": "The parameter λ represents the **average rate** (mean number) of events occurring in a given interval. For a Poisson distribution:\n- Mean: E(X) = λ\n- Variance: Var(X) = λ\n\nThis equality of mean and variance is a defining characteristic of the Poisson distribution.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "If X ~ Po(2.1), calculate P(X ≥ 1). Explain why you can use the complement. (2 steps)", "answer": "- Step 1: Use the complement: P(X ≥ 1) = 1 - P(X = 0)\n- Step 2: P(X = 0) = e^(-2.1) × 2.1^0 / 0! = e^(-2.1) ≈ 0.1225\nSo: P(X ≥ 1) = 1 - 0.1225 ≈ 0.8775\n\nWe use the complement because calculating directly P(X ≥ 1) would require summing infinitely many terms, while P(X = 0) is straightforward.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "If X ~ Po(λ), and you're given that P(X=2) = P(X=3), find the value of λ. (3 steps)", "answer": "- Step 1: Write the two probabilities:\n$$P(X=2) = \\frac{e^{-\\lambda}\\lambda^2}{2!}$$\n$$P(X=3) = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$\n- Step 2: Set them equal and cancel common terms (e^-λ):\n$$\\frac{\\lambda^2}{2} = \\frac{\\lambda^3}{6}$$\n- Step 3: Solve: Multiply both sides by 6: 3λ² = λ³, so λ = 3", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A taxi company receives an average of 2 calls per hour. Using Poisson model, find the probability of receiving exactly 3 calls in a 2-hour period. Explain how you determine λ. (2 steps)", "answer": "- Step 1: Since events occur at a constant rate, λ scales proportionally with time. In 2 hours, the expected number is: λ = 2 × 2 = 4\n- Step 2: P(X=3) = e^(-4) × 4³ / 3! ≈ 0.1954\n\nThe key insight is that λ must be proportional to the interval length because the rate is constant.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "When validating whether data follows a Poisson distribution, what relationship between the sample mean and sample variance would you look for, and why? (2 steps)", "answer": "- Step 1: For a Poisson distribution, the theoretical mean equals the variance (both equal λ). So you would check if: sample mean ≈ sample variance\n- Step 2: In the phone calls example from the text, mean = 2.82 and variance = 2.83, which are very close, supporting the Poisson model.\n\nThis is a quick diagnostic: if mean and variance differ substantially, Poisson is likely inappropriate.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "If X ~ Po(5), use the cumulative distribution tables to find P(X ≥ 2). Explain the method. (2 steps)", "answer": "- Step 1: Note that P(X ≥ 2) = 1 - P(X ≤ 1)\n- Step 2: From Poisson tables with λ = 5: P(X ≤ 1) = 0.0404\nSo P(X ≥ 2) = 1 - 0.0404 = 0.9596\n\nWe use the cumulative table to find P(X ≤ 1) rather than summing individual probabilities.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Given X ~ Po(7.5), and P(X ≤ a) = 0.2414, find the value of a. (1 step)", "answer": "From Poisson cumulative tables with λ = 7.5, find where the probability equals 0.2414:\nP(X ≤ 5) = 0.2414\nTherefore, a = 5", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Given X ~ Po(7.5), and P(X < b) = 0.5246, find the value of b. Explain the reasoning. (2 steps)", "answer": "- Step 1: Note that P(X < b) = P(X ≤ b-1) since X is discrete.\n- Step 2: From tables: P(X ≤ 7) = 0.5246, so b - 1 = 7, giving b = 8.\n\nThe inequality is strict (< b), so we look for the CDF value at b-1.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Given X ~ Po(7.5), and P(X ≥ c) = 0.3380, find the value of c. (2 steps)", "answer": "- Step 1: P(X ≥ c) = 1 - P(X ≤ c-1) = 0.3380\nSo P(X ≤ c-1) = 1 - 0.3380 = 0.6620\n- Step 2: From tables: P(X ≤ 8) = 0.6620, so c - 1 = 8, giving c = 9.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "State the additive property for Poisson distributions. If X ~ Po(3.6) and Y ~ Po(4.4), what is the distribution of X + Y? (1 step)", "answer": "If X and Y are independent Poisson random variables, then:\n$$X + Y \\sim \\text{Po}(\\lambda_X + \\lambda_Y)$$\n\nFor X ~ Po(3.6) and Y ~ Po(4.4):\n$$X + Y \\sim \\text{Po}(3.6 + 4.4) = \\text{Po}(8)$$", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Two independent Poisson processes model cars and vans passing a point. Cars pass at 24 per minute, vans at 8 per minute. Find the probability that in a 15-second period, exactly 4 cars and exactly 2 vans pass. Explain the approach. (3 steps)", "answer": "- Step 1: Convert to the correct time interval (15 seconds = 1/4 minute):\nCars: λ_cars = 24 × (1/4) = 6 per 15 seconds\nVans: λ_vans = 8 × (1/4) = 2 per 15 seconds\n- Step 2: Since X (cars) and Y (vans) are independent:\nP(X=4 and Y=2) = P(X=4) × P(Y=2)\n= [e^(-6)×6⁴/4!] × [e^(-2)×2²/2!]\n= 0.1339 × 0.2707 ≈ 0.0362\n- Step 3: We multiply because the processes are independent.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Why is it incorrect to simply add two Poisson random variables without first ensuring their parameters refer to the same interval? Illustrate with an example. (2 steps)", "answer": "- Step 1: The additive property requires that X and Y model events in the **same** interval. If X ~ Po(λ₁) for interval T₁ and Y ~ Po(λ₂) for interval T₂, we cannot add them directly unless T₁ = T₂.\n- Step 2: Example: In Example 7, cars in 5 minutes have mean 2, but we needed cars in 10 minutes (λ = 4) before adding to \"other vehicles in 10 minutes\" (λ = 2). The intervals must match before adding parameters.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "An internet cafe has two printers. Printer A breaks down on average 0.1 times per week, printer B breaks down 0.05 times per week. In a 12-week period, what is the probability of exactly 3 total breakdowns? (3 steps)", "answer": "- Step 1: First scale to the correct time period:\n12 weeks: λ_A = 0.1 × 12 = 1.2, λ_B = 0.05 × 12 = 0.6\n- Step 2: Since breakdowns are independent, total T = A + B ~ Po(1.2 + 0.6) = Po(1.8)\n- Step 3: P(T = 3) = e^(-1.8) × 1.8³ / 3! ≈ 0.1607", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "If X ~ Po(λ), prove that E(X) = λ using the definition of expected value. (3 steps)", "answer": "- Step 1: By definition: E(X) = Σ x × P(X=x) for x = 0, 1, 2, ...\n$$E(X) = \\sum_{x=0}^{\\infty} x \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!}$$\n- Step 2: For x = 0, the term is 0. For x ≥ 1, rewrite:\n$$E(X) = \\sum_{x=1}^{\\infty} \\frac{e^{-\\lambda}\\lambda^x}{(x-1)!} = \\lambda e^{-\\lambda} \\sum_{x=1}^{\\infty} \\frac{\\lambda^{x-1}}{(x-1)!}$$\n- Step 3: Let k = x-1, then:\n$$E(X) = \\lambda e^{-\\lambda} \\sum_{k=0}^{\\infty} \\frac{\\lambda^k}{k!} = \\lambda e^{-\\lambda} \\cdot e^\\lambda = \\lambda$$", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "If X ~ Po(λ), prove that Var(X) = λ. (4 steps)", "answer": "- Step 1: Recall Var(X) = E(X²) - [E(X)]². We know E(X) = λ.\n- Step 2: Find E(X(X-1)): \n$$E[X(X-1)] = \\sum_{x=0}^{\\infty} x(x-1) \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!}$$\nFor x = 0,1 the term is 0, so:\n$$= \\sum_{x=2}^{\\infty} \\frac{e^{-\\lambda}\\lambda^x}{(x-2)!} = \\lambda^2 e^{-\\lambda} \\sum_{x=2}^{\\infty} \\frac{\\lambda^{x-2}}{(x-2)!} = \\lambda^2 e^{-\\lambda} \\cdot e^\\lambda = \\lambda^2$$\n- Step 3: Note that X² = X(X-1) + X, so:\nE(X²) = E[X(X-1)] + E(X) = λ² + λ\n- Step 4: Therefore:\nVar(X) = E(X²) - [E(X)]² = (λ² + λ) - λ² = λ", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "A botanist counts daisies in 80 squares: Σx = 295, Σx² = 1386. Calculate the sample mean and variance, and explain whether a Poisson model is appropriate. (3 steps)", "answer": "- Step 1: Mean = 295/80 = 3.6875 ≈ 3.69\n- Step 2: Variance = (1386/80) - (295/80)² = 17.325 - 13.603 = 3.722 ≈ 3.72\n- Step 3: Mean ≈ 3.69 and variance ≈ 3.72 are very close (both ≈ 3.7 to 1 decimal place). This supports using a Poisson model since for Poisson, mean = variance = λ.\n\nThe close agreement between mean and variance is strong evidence for Poisson appropriateness.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A call center handles calls at 15 per hour. Find the probability of handling at least 6 calls in a 30-minute period. (2 steps)", "answer": "- Step 1: Scale λ to 30 minutes: λ = 15 × (30/60) = 7.5\nLet X = number of calls in 30 minutes: X ~ Po(7.5)\n- Step 2: P(X ≥ 6) = 1 - P(X ≤ 5)\nFrom tables with λ = 7.5: P(X ≤ 5) = 0.2414\nSo P(X ≥ 6) = 1 - 0.2414 = 0.7586", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Why is the Poisson distribution considered a limiting case of the binomial distribution? Under what conditions? (2 steps)", "answer": "- Step 1: The Poisson distribution can be derived as the limit of a binomial distribution B(n, p) as n → ∞ and p → 0, while keeping np = λ constant.\n- Step 2: This models situations with many independent trials (n large), each with a very small probability of success (p small), but with a finite expected number of successes λ = np.\n\nThis is why Poisson models rare events in large populations.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In a hospital, patients arrive at 5 per hour. What's the probability that the next patient arrives within 15 minutes of the previous one? (2 steps)", "answer": "- Step 1: In 15 minutes (0.25 hours), expected arrivals: λ = 5 × 0.25 = 1.25\nLet Y = time between arrivals. The probability of at least 1 arrival in 15 min equals 1 - P(0 arrivals).\n- Step 2: P(at least 1 in 15 min) = 1 - P(Y = 0) = 1 - e^(-1.25) ≈ 1 - 0.2865 = 0.7135\n\nThis uses the property that the waiting time between Poisson events follows an exponential distribution.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "If X ~ Po(λ), what is P(X = 0)? If λ doubles, how does P(X = 0) change? (2 steps)", "answer": "- Step 1: P(X = 0) = e^(-λ) × λ^0 / 0! = e^(-λ)\n- Step 2: If λ doubles from λ to 2λ, then:\nP(X = 0) changes from e^(-λ) to e^(-2λ) = [e^(-λ)]²\nSo the probability of zero events decreases exponentially as λ increases.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A company receives emails at 3 per 5 minutes. Find the probability of exactly 7 emails in a 10-minute period. Explain why Poisson is suitable here. (3 steps)", "answer": "- Step 1: Rate = 3 per 5 minutes = 0.6 per minute. For 10 minutes: λ = 0.6 × 10 = 6\nX ~ Po(6)\n- Step 2: P(X = 7) = e^(-6) × 6⁷ / 7! ≈ 0.1377\n- Step 3: Poisson is suitable because: emails occur independently, one at a time, and at a roughly constant average rate.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "The number of accidents per month follows Po(0.7). Find the probability of no accidents in exactly 2 out of the next 6 months. (3 steps)", "answer": "- Step 1: For one month: P(no accidents) = P(X = 0) = e^(-0.7) ≈ 0.4966\n- Step 2: Let Y = number of months with no accidents in 6 months\nY ~ B(6, 0.4966)\n- Step 3: P(Y = 2) = C(6,2) × (0.4966)² × (1-0.4966)^4\n= 15 × 0.2466 × 0.5034^4 ≈ 0.312\n\nWe use binomial because each month is an independent trial with fixed probability of \"success\" (no accidents).", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A shop sells desktops at 2.4/day and laptops at 1.6/day. Find the probability of selling at least 2 of each on a particular day. (3 steps)", "answer": "- Step 1: Let D = desktops, L = laptops. D ~ Po(2.4), L ~ Po(1.6), independent.\nP(D ≥ 2) = 1 - P(D ≤ 1) = 1 - [e^(-2.4) + e^(-2.4)×2.4] ≈ 0.6918\nP(L ≥ 2) = 1 - P(L ≤ 1) = 1 - [e^(-1.6) + e^(-1.6)×1.6] ≈ 0.4630\n- Step 2: Since independent: P(both ≥ 2) = P(D ≥ 2) × P(L ≥ 2)\n- Step 3: = 0.6918 × 0.4630 ≈ 0.3203\n\nWe multiply because the processes are independent.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "A random variable X ~ Po(λ) has the property that P(X > 10) < 0.1. Find the largest possible integer value of λ. (2 steps)", "answer": "- Step 1: Use Poisson cumulative tables to find when P(X > 10) becomes less than 0.1\n- Step 2: Check λ values:\nλ = 10: P(X > 10) = 1 - P(X ≤ 10) = 1 - 0.5830 = 0.417 > 0.1\nλ = 11: P(X > 10) = 1 - P(X ≤ 10) = 1 - 0.4525 = 0.5475 > 0.1\nλ = 12: P(X > 10) = 1 - P(X ≤ 10) = 1 - 0.3320 = 0.668 > 0.1\nWait, I need to recheck - we need P(X ≤ 10) > 0.9\nλ = 12: P(X ≤ 10) ≈ 0.332, so P(X > 10) ≈ 0.668\nActually checking properly from tables:\nFor λ = 10: P(X≤10) ≈ 0.583, P(X>10) = 0.417\nFor λ = 11: P(X≤10) ≈ 0.453, P(X>10) ≈ 0.547\nFor λ = 12: P(X≤10) ≈ 0.332, P(X>10) ≈ 0.668\nActually looking at P(X≤10) values, I need where P(X≤10) > 0.9\nChecking λ = 9: P(X≤10) = 0.706, P(X>10) = 0.294\nλ = 8: P(X≤10) = 0.816, P(X>10) = 0.184 > 0.1\nλ = 7: P(X≤10) = 0.901, P(X>10) = 0.099 < 0.1\nSo λ = 7 is the largest integer where P(X > 10) < 0.1", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A fisherman catches fish at 2 per hour. He takes 5 trips, each lasting 2 hours. What's the probability he catches at least 5 fish on exactly 3 of these trips? (4 steps)", "answer": "- Step 1: For one 2-hour trip: λ = 2 × 2 = 4\nP(at least 5) = 1 - P(X ≤ 4) = 1 - 0.629 = 0.371 (using tables for λ=4)\n- Step 2: Let Y = number of trips with at least 5 fish\nY ~ B(5, 0.371)\n- Step 3: P(Y = 3) = C(5,3) × (0.371)³ × (0.629)²\n- Step 4: = 10 × 0.0511 × 0.3956 ≈ 0.202\n\nWe use binomial because each trip is an independent trial with the same probability of success.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Why might a Poisson distribution be inappropriate for modelling the number of customers entering a shop during opening hours? Give two reasons. (2 steps)", "answer": "- Step 1: **Non-constant rate**: Customer arrival rate varies throughout the day (busier at lunch/after work), violating the constant rate condition.\n- Step 2: **Group arrivals**: Customers often arrive in groups (families, colleagues), violating the \"single occurrence\" condition.\n- Step 3: **Non-independence**: One customer's arrival might attract others (herding behavior), violating independence.\n\nThese would cause the variance to exceed the mean, unlike Poisson where they are equal.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "If you observe data where the variance is much larger than the mean, what might this indicate about the appropriate model? (1 step)", "answer": "This situation is called **overdispersion**, where Var(X) > E(X). The standard Poisson model assumes Var = E, so this suggests:\n- The Poisson model may be inappropriate\n- A **negative binomial distribution** might be more suitable, which has an extra parameter to account for extra variability\n- Or there may be heterogeneity in the data (different groups with different rates)", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A factory produces cloth with flaws occurring at 1.5 per 50m. For a 200m roll, what's the probability of fewer than 4 flaws? (2 steps)", "answer": "- Step 1: Scale λ to 200m: λ = 1.5 × (200/50) = 1.5 × 4 = 6\n- Step 2: P(X < 4) = P(X ≤ 3) = P(X = 0) + P(X = 1) + P(X = 2) + P(X = 3)\n= e^(-6)(6⁰/0! + 6¹/1! + 6²/2! + 6³/3!)\n= 0.0025 + 0.0149 + 0.0446 + 0.0892 ≈ 0.1512", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "Two independent Poisson processes have rates λ₁ and λ₂. What is the probability that exactly k events occur from the combined process in a given interval? (2 steps)", "answer": "- Step 1: If X ~ Po(λ₁) and Y ~ Po(λ₂), independent, then T = X + Y ~ Po(λ₁ + λ₂)\n- Step 2: Therefore: P(T = k) = e^-(λ₁+λ₂) × (λ₁+λ₂)^k / k!\n\nThis is the simplest way - we don't need to sum over all combinations of X and Y that sum to k.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A clinic sees 3 insect bite patients per day on average. What's the probability that in a 5-day period, at least 4 days have more than 4 patients? (4 steps)", "answer": "- Step 1: For one day: X ~ Po(3), P(X > 4) = 1 - P(X ≤ 4) = 1 - 0.8153 = 0.1847\n- Step 2: Let Y = number of days with > 4 patients in 5 days\nY ~ B(5, 0.1847)\n- Step 3: P(Y ≥ 4) = P(Y = 4) + P(Y = 5)\n- Step 4: = C(5,4)(0.1847)⁴(0.8153) + C(5,5)(0.1847)⁵\n= 5 × 0.00116 × 0.8153 + 1 × 0.0000215 ≈ 0.00496 + 0.00002 ≈ 0.00498", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In the phone call example from the text, the observed mean was 2.82 and variance was 2.83. If someone claimed the data followed a Poisson with λ = 2, would this be appropriate? Explain. (2 steps)", "answer": "- Step 1: The sample mean (2.82) provides the best estimate of λ for a Poisson model. So λ ≈ 2.82, not λ = 2.\n- Step 2: Using λ = 2 would underestimate the expected number of calls. We should use the sample mean as our estimate of λ, so λ ≈ 2.82 or 2.8 would be more appropriate.\n\nThe method of moments estimator for λ in Poisson is simply the sample mean.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "What is the difference between P(X ≤ x) and P(X < x) for a Poisson random variable? If λ = 8 and you want P(X < 5), what do you calculate? (2 steps)", "answer": "- Step 1: Since X is discrete, P(X < 5) = P(X ≤ 4). The difference matters because:\nP(X ≤ 4) includes x = 4, while P(X < 4) = P(X ≤ 3)\n- Step 2: For P(X < 5) with λ = 8: this equals P(X ≤ 4)\nFrom tables: P(X ≤ 4) ≈ 0.0996\n\nThe strict inequality requires us to find the CDF at one less than the boundary value.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A company has buses for hire starting Sunday. Mean requests is 5 per Sunday. They want to be 99% sure they can fulfill all requests. How many buses do they need? (3 steps)", "answer": "- Step 1: Find smallest n such that P(X ≤ n) ≥ 0.99, where X ~ Po(5)\n- Step 2: From Poisson tables with λ = 5:\nP(X ≤ 9) = 0.9682 < 0.99\nP(X ≤ 10) = 0.9912 ≥ 0.99\n- Step 3: Therefore, they need 10 buses to be at least 99% sure of meeting demand.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "If X ~ Po(4.2), calculate P(3 ≤ X ≤ 5). Show two methods. (2 steps)", "answer": "- Method 1 (direct): P(X=3) + P(X=4) + P(X=5)\n= e^(-4.2)[4.2³/3! + 4.2⁴/4! + 4.2⁵/5!]\n= 0.220 + 0.154 + 0.086 = 0.460\n\n- Method 2 (using CDF): P(3 ≤ X ≤ 5) = P(X ≤ 5) - P(X ≤ 2)\n= 0.6736 - 0.2146 = 0.459 ≈ 0.46\n\nBoth methods give approximately the same answer.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "A photocopier breaks down 0.4 times/week on ground floor, 0.2 on first floor, 0.8 on second floor. Find probability of exactly 2 breakdowns in a week. (2 steps)", "answer": "- Step 1: Total breakdowns T = G + F1 + F2 ~ Po(0.4 + 0.2 + 0.8) = Po(1.4)\n- Step 2: P(T = 2) = e^(-1.4) × 1.4² / 2! ≈ 0.3467\n\nWe can simply add the parameters because the processes are independent and we want total breakdowns across all floors.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Why is the Poisson distribution suitable for modelling radioactive decay? What conditions does it satisfy? (2 steps)", "answer": "- Step 1: Radioactive emissions satisfy all three Poisson conditions:\n- **Independence**: Each emission is independent of others\n- **Singly**: At any instant, only one particle is emitted\n- **Constant rate**: On average, emissions occur at a fixed rate (though in reality, this is over short time periods)\n\n- Step 2: The exponential distribution (continuous counterpart) describes the time between successive Poisson events.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "For what types of real-world phenomena is the Poisson distribution most appropriate? Give four examples. (1 step)", "answer": "The Poisson distribution is appropriate for modelling counts of:\n1. Telephone calls arriving at a switchboard in a given time\n2. Radioactive particles emitted by a source\n3. typos/spelling mistakes on a page\n4. Cars passing a checkpoint in a given time interval\n5. Customers arriving at a service point\n6. Flaws in a material per unit length\n\nAll share the three key properties: independence, single occurrences, and constant rate.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "A website receives 240 visits per hour. Find the probability of at least 10 visits in a 2-minute period. (2 steps)", "answer": "- Step 1: Scale to 2 minutes (1/30 hour): λ = 240 × (2/60) = 240 × (1/30) = 8\n- Step 2: P(X ≥ 10) = 1 - P(X ≤ 9)\nFrom tables with λ = 8: P(X ≤ 9) = 0.7166\nSo P(X ≥ 10) = 1 - 0.7166 = 0.2834", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "The number of policies sold per week over 150 weeks has mean 2.64 and variance 2.78. Does this support a Poisson model? Explain. (2 steps)", "answer": "- Step 1: For Poisson, mean = variance = λ. Here mean ≈ 2.64 and variance ≈ 2.78, which are very close.\n- Step 2: The slight difference (2.78 > 2.64) might indicate minor overdispersion, but the values are close enough that Poisson with λ ≈ 2.64 is a reasonable model.\n\nThis is consistent with the Poisson assumption.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "If X ~ Po(0.84), find P(1 < X ≤ 3). Show the calculation. (2 steps)", "answer": "- Step 1: This means X = 2 or X = 3\nP(2) + P(3) = e^(-0.84)[0.84²/2! + 0.84³/3!]\n= e^(-0.84)[0.7056/2 + 0.5927/6]\n= e^(-0.84)[0.3528 + 0.0988]\n= 1.5416 × e^(-0.84) ≈ 1.5416 × 0.4317 ≈ 0.3327\n\nThe inequality 1 < X ≤ 3 includes x = 2, 3.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "A company receives 3 emails every 5 minutes. What's the probability of exactly 7 emails in a 10-minute period, and at least 8 in the same period? (2 steps)", "answer": "- Step 1: Rate = 3 per 5 min = 0.6 per min. For 10 min: λ = 6\nP(X = 7) = e^(-6) × 6⁷ / 7! ≈ 0.1377\n- Step 2: P(X ≥ 8) = 1 - P(X ≤ 7) = 1 - 0.744 = 0.256\n\nWe use the scaled λ for the correct time interval.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "What is the key difference between the binomial and Poisson distributions in terms of what they model? (1 step)", "answer": "- **Binomial**: Models the number of successes in a **fixed number of independent trials**, each with probability p of success.\n- **Poisson**: Models the number of events occurring in a **fixed interval of time or space** where events occur at a constant average rate λ.\n\nPoisson has no fixed number of trials - theoretically infinite; binomial has fixed n.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}], "count": 44}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What kind of real-world phenomena is the Poisson distribution designed to model, and what distinguishes it from a setting like \"flip a coin 10 times\"? (3 steps)", "answer": "- Step 1: The Poisson distribution models the **count of events occurring within a fixed interval** of time or space — phone calls per hour, meteor strikes per night, typos per page.\n- Step 2: Unlike a binomial experiment, there are **no discrete \"trials\"**. Events arrive continuously, and in principle the count has no fixed upper bound.\n- Step 3: The focus is on a **rate** (events per unit interval), not on a fixed number of attempts with success probability $$p$$. Given this rate, the distribution tells you how probable each possible total count is.\n\nKey takeaway: Poisson = \"how many rare-ish events per interval\"; binomial = \"how many successes in a fixed batch of trials.\"", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Write the probability mass function of $$X \\sim \\operatorname{Po}(\\lambda)$$ and state the range of $$x$$.", "answer": "For $$X \\sim \\operatorname{Po}(\\lambda)$$:\n$$P(X = x) = \\frac{e^{-\\lambda}\\lambda^x}{x!}, \\quad x = 0, 1, 2, 3, \\ldots$$\n\nThe range is all non-negative integers, with no upper bound. This reflects that arbitrarily many events *could* occur in the interval, although probabilities become vanishingly small for $$x$$ much greater than $$\\lambda$$, so extreme counts are effectively unseen.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "What three conditions must a process satisfy for a Poisson model to be suitable? (3 steps)", "answer": "- Step 1: **Independently** — one event occurring doesn't change the probability of any other. If events cluster or trigger one another, the model fails.\n- Step 2: **Singly** — events occur one at a time in space or time. Two events cannot happen at exactly the same instant.\n- Step 3: **Constant average rate** — the rate $$\\lambda$$ per unit interval is stable across the whole period being modelled, so the mean count is proportional to the interval length.\n\nIf any of these three breaks down, be suspicious of a Poisson fit.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "What does the parameter $$\\lambda$$ represent in a Poisson distribution, and what are its units?", "answer": "$$\\lambda$$ is the **average (expected) number of events** per unit of the chosen interval — e.g., calls per hour, defects per metre, meteors per night. Crucially, it simultaneously equals the **mean** and the **variance** of $$X$$, so this single parameter determines both the centre and spread of the distribution. That tight linkage is the Poisson distribution's \"fingerprint.\"", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "Why does the factor $$e^{-\\lambda}$$ appear in the Poisson PMF? (3 steps)", "answer": "- Step 1: We need $$\\sum_{x=0}^\\infty P(X=x) = 1$$. Without any normalisation, $$\\sum_{x=0}^\\infty \\frac{\\lambda^x}{x!}$$ equals $$e^{\\lambda}$$ (the Taylor series of the exponential).\n- Step 2: To force the total to equal $$1$$, we divide by $$e^{\\lambda}$$, or equivalently multiply each term by $$e^{-\\lambda}$$.\n- Step 3: So $$e^{-\\lambda}$$ is precisely the **normalisation constant** that turns $$\\lambda^x / x!$$ into a valid probability distribution.\n\nThe exponential isn't magic — it's just the bookkeeping needed to make probabilities add to one.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Walk through why $$\\sum_{x=0}^\\infty P(X = x) = 1$$ for a Poisson variable. (3 steps)", "answer": "- Step 1: Write the sum and factor out the common $$e^{-\\lambda}$$:\n$$\\sum_{x=0}^\\infty \\frac{e^{-\\lambda}\\lambda^x}{x!} = e^{-\\lambda}\\left(1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\cdots\\right)$$\n- Step 2: Recognise the bracketed series as the Taylor expansion of $$e^{\\lambda}$$.\n- Step 3: So the total becomes $$e^{-\\lambda}\\cdot e^{\\lambda} = e^{0} = 1$$, confirming it's a valid probability distribution.\n\nTakeaway: the formula is engineered so the exponential series cancels cleanly.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Informally, how does the Poisson distribution arise as a limiting case of a binomial distribution? (4 steps)", "answer": "- Step 1: Divide an interval into $$n$$ tiny subintervals, each with a small chance $$p$$ of containing one event. The total event count is $$\\operatorname{B}(n, p)$$.\n- Step 2: Take $$n \\to \\infty$$ while keeping the expected count $$np = \\lambda$$ fixed — each subinterval becomes vanishingly likely to have an event, but there are vastly more subintervals.\n- Step 3: The binomial coefficient times $$p^k$$ simplifies: $$\\binom{n}{k}p^k \\to \\lambda^k/k!$$, and $$(1-p)^{n-k} \\to e^{-\\lambda}$$.\n- Step 4: Combining gives $$P(X=k) \\to \\dfrac{e^{-\\lambda}\\lambda^k}{k!}$$ — the Poisson PMF.\n\nThis is why Poisson models \"many opportunities, each rare\" — binomial collapses into Poisson as trials become many and success rare.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "What is $$P(X = 0)$$ for a Poisson variable, and what is its physical interpretation?", "answer": "Setting $$x = 0$$ in the PMF gives $$P(X=0) = \\frac{e^{-\\lambda}\\lambda^0}{0!} = e^{-\\lambda}$$.\n\nConceptually, this is the probability of seeing **no events at all** in the interval. It decays exponentially with $$\\lambda$$: if only a few events are expected (small $$\\lambda$$), a zero count is plausible; if many events are expected (large $$\\lambda$$), zero becomes vanishingly rare. It's a handy sanity check — the formula's behaviour at $$x=0$$ should feel intuitive.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "If events occur at rate $$r$$ per unit time as a Poisson process, what is the parameter for the count over an interval of length $$t$$, and why? (3 steps)", "answer": "- Step 1: The \"constant average rate\" condition states that mean count is **proportional to interval length**. So in an interval of length $$t$$, the expected count is $$rt$$.\n- Step 2: Since the Poisson parameter equals the mean, we set $$\\lambda = rt$$.\n- Step 3: So the count over the interval is $$\\operatorname{Po}(rt)$$. This proportionality is a direct consequence of independence and constant rate.\n\nExample intuition: 4 calls per hour $$\\Rightarrow$$ expect 6 calls in 90 min, so use $$\\operatorname{Po}(6)$$ for that period.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "State the mean and variance of $$X \\sim \\operatorname{Po}(\\lambda)$$, and describe what's remarkable about the relationship.", "answer": "Both the mean and the variance equal $$\\lambda$$:\n$$E(X) = \\lambda, \\quad \\operatorname{Var}(X) = \\lambda$$\n\nWhat's remarkable is that the spread and the centre are **locked together** — both grow at the same rate as $$\\lambda$$ increases. In most distributions you can shift the centre independently of stretching the spread; in Poisson you cannot. This single-parameter constraint is a hallmark of Poisson and a practical diagnostic for whether the model fits data.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "Why can the empirical equality of sample mean and sample variance be used as a test for Poisson fit? (3 steps)", "answer": "- Step 1: Any Poisson distribution *must* satisfy $$E(X) = \\operatorname{Var}(X)$$ exactly. So if observed mean and variance are far apart, Poisson is probably wrong.\n- Step 2: Sample variance $$\\gg$$ sample mean (**overdispersion**) means the data is \"burstier\" than Poisson — events may cluster or be correlated.\n- Step 3: Sample variance $$\\ll$$ sample mean (**underdispersion**) means the data is too regular for pure randomness — suggests a schedule or regulation.\n\nThe test is diagnostic, not definitive: close values *support* Poisson but don't prove it; very different values firmly reject it.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Walk through the derivation of $$E(X) = \\lambda$$ for $$X \\sim \\operatorname{Po}(\\lambda)$$. (4 steps)", "answer": "- Step 1: From the definition, $$E(X) = \\sum_{x=0}^\\infty x \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!}$$. The $$x = 0$$ term vanishes, so start from $$x = 1$$.\n- Step 2: Use the identity $$\\frac{x}{x!} = \\frac{1}{(x-1)!}$$:\n$$E(X) = \\sum_{x=1}^\\infty \\frac{e^{-\\lambda}\\lambda^x}{(x-1)!}$$\n- Step 3: Factor one $$\\lambda$$ out of $$\\lambda^x$$ and reindex with $$k = x - 1$$:\n$$E(X) = \\lambda \\sum_{k=0}^\\infty \\frac{e^{-\\lambda}\\lambda^k}{k!}$$\n- Step 4: The sum in brackets is the full Poisson PMF summed over all $$k$$, which equals $$1$$. So $$E(X) = \\lambda$$.\n\nThe trick is the index shift — reduce the sum back to the PMF itself.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "Explain conceptually why $$\\operatorname{Var}(X) = \\lambda$$ for a Poisson distribution. (3 steps)", "answer": "- Step 1: Compute $$E(X(X-1)) = \\sum x(x-1)\\frac{e^{-\\lambda}\\lambda^x}{x!}$$. Using $$\\frac{x(x-1)}{x!} = \\frac{1}{(x-2)!}$$ and the same reindexing trick, this collapses to $$\\lambda^2$$.\n- Step 2: So $$E(X^2) = E(X(X-1)) + E(X) = \\lambda^2 + \\lambda$$.\n- Step 3: Therefore $$\\operatorname{Var}(X) = E(X^2) - (E(X))^2 = \\lambda^2 + \\lambda - \\lambda^2 = \\lambda$$.\n\nThe deeper reason: in a Poisson *process*, events in disjoint sub-intervals are independent, so variances add just as means add — giving variance proportional to interval length, i.e., equal to the mean.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "State the additive property of independent Poisson variables, including when it applies.", "answer": "If $$X \\sim \\operatorname{Po}(\\lambda)$$ and $$Y \\sim \\operatorname{Po}(\\mu)$$ are **independent**, then\n$$X + Y \\sim \\operatorname{Po}(\\lambda + \\mu)$$\n\nFor this to be meaningful, both $$X$$ and $$Y$$ must be counts over the **same interval** of time or space. Adding \"cars in 5 min\" to \"vans in 15 min\" without rescaling is nonsense — you'd be summing parameters with incompatible interval lengths.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Give an intuitive argument for why the sum of two independent Poisson streams is itself Poisson. (3 steps)", "answer": "- Step 1: Each stream individually satisfies the Poisson conditions — independent, singly, constant rate.\n- Step 2: When you merge (superpose) the two streams, the combined stream still has all three properties: events from either stream are still random, still occur one at a time (since they did in each separately), and the combined rate is simply $$\\lambda + \\mu$$.\n- Step 3: By the uniqueness of Poisson under these conditions, the merged count must also follow $$\\operatorname{Po}(\\lambda + \\mu)$$.\n\nPicture it as overlaying two sparse dot-patterns on a time axis — the result looks like a single denser Poisson stream.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Why can't we directly add parameters when $$X$$ measures cars in a 5-minute window and $$Y$$ measures vans in a 15-minute window? (3 steps)", "answer": "- Step 1: The additive property requires both variables to be counts over the **same interval**. Otherwise you're adding rates with inconsistent time bases.\n- Step 2: Rescale each to a common interval first. For a 10-minute window: $$\\lambda_{\\text{car}} = 2 \\times (10/5) = 4$$ and $$\\lambda_{\\text{van}} = 3 \\times (10/15) = 2$$.\n- Step 3: Now both refer to counts in 10 minutes, so the combined total follows $$\\operatorname{Po}(4 + 2) = \\operatorname{Po}(6)$$.\n\nPitfall: summing raw Poisson parameters from different timeframes gives a meaningless answer.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Why is independence essential in the additive property of Poisson variables?", "answer": "Without independence, knowing one count reveals something about the other, so the joint behaviour isn't purely random. The elegant convolution of two independent Poissons into one Poisson relies on all the cross-terms vanishing in exactly the right way. If $$X$$ and $$Y$$ share a common driver (e.g., both caused by the same surge event), the sum can be overdispersed or skewed and won't follow Poisson. Always question whether \"two event streams\" are genuinely independent or hiddenly coupled.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "How are the exam's Poisson cumulative tables structured, and what do they give you?", "answer": "The tables give $$P(X \\le x)$$ for selected $$\\lambda$$ values (typically $$\\lambda = 0$$ to $$10$$ in steps of $$0.5$$) and $$x$$ from $$0$$ up to about $$20$$. To use them:\n- $$P(X \\le a)$$ → read directly.\n- $$P(X \\ge a) = 1 - P(X \\le a - 1)$$.\n- $$P(a \\le X \\le b) = P(X \\le b) - P(X \\le a - 1)$$.\n\nIf your $$\\lambda$$ isn't listed, fall back to the formula or calculator. Tables only cover $$\\lambda \\le 10$$ because beyond that, the normal approximation is usually preferable.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "How do you convert each of $$P(X \\ge a)$$, $$P(X < a)$$, and $$P(a < X \\le b)$$ into forms usable with cumulative tables? (3 steps)", "answer": "- Step 1: $$P(X \\ge a) = 1 - P(X \\le a-1)$$. Take the complement and shift the cutoff by 1 because of the strict inequality.\n- Step 2: $$P(X < a) = P(X \\le a-1)$$. For integer-valued $$X$$, \"less than $$a$$\" simply excludes $$a$$ itself.\n- Step 3: $$P(a < X \\le b) = P(X \\le b) - P(X \\le a)$$. Subtract the cumulative just past the exclusion point.\n\nRule of thumb: translate strict to non-strict inequalities by shifting by 1, since $$X$$ takes integer values.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "For $$X \\sim \\operatorname{Po}(\\lambda)$$, how do you find $$a$$ such that $$P(X \\le a) = p$$? (2 steps)", "answer": "- Step 1: In the cumulative Poisson tables, locate the column matching your value of $$\\lambda$$.\n- Step 2: Scan the probability entries in that column until you find $$p$$ (or the exact match); the corresponding row label is your $$a$$.\n\nFor inequalities like $$P(X \\ge c) = q$$, first rewrite as $$P(X \\le c-1) = 1 - q$$, then look up.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Given $$X \\sim \\operatorname{Po}(\\lambda)$$ with $$P(X = 2) = P(X = 3)$$, describe how to find $$\\lambda$$. (3 steps)", "answer": "- Step 1: Write both probabilities using the PMF:\n$$\\frac{e^{-\\lambda}\\lambda^2}{2!} = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$\n- Step 2: Cancel $$e^{-\\lambda}$$ (same on both sides) and cancel $$\\lambda^2$$:\n$$\\frac{1}{2!} = \\frac{\\lambda}{3!} \\;\\Rightarrow\\; \\lambda = \\frac{3!}{2!} = 3$$\n- Step 3: So $$\\lambda = 3$$. General principle: cancel the exponential, cancel common powers of $$\\lambda$$, then solve a simple factorial relation.\n\nMental shortcut: $$P(X = k) = P(X = k+1)$$ in Poisson $$\\iff \\lambda = k+1$$.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "Given $$X \\sim \\operatorname{Po}(\\lambda)$$ with $$P(X = 4) = 3 \\times P(X = 2)$$, describe how to find $$\\lambda$$. (3 steps)", "answer": "- Step 1: Set up using the PMF:\n$$\\frac{e^{-\\lambda}\\lambda^4}{4!} = 3 \\cdot \\frac{e^{-\\lambda}\\lambda^2}{2!}$$\n- Step 2: Cancel $$e^{-\\lambda}$$ and $$\\lambda^2$$ (valid since $$\\lambda > 0$$):\n$$\\frac{\\lambda^2}{4!} = \\frac{3}{2!} \\;\\Rightarrow\\; \\lambda^2 = \\frac{3 \\cdot 24}{2} = 36$$\n- Step 3: So $$\\lambda = 6$$ (taking the positive root since $$\\lambda > 0$$).\n\nGeneral method: ratio-type conditions always cancel $$e^{-\\lambda}$$ cleanly, leaving a polynomial in $$\\lambda$$.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Why are telephone calls to a switchboard a textbook example of Poisson, and under what circumstances might the model fail? (3 steps)", "answer": "- Step 1: Typically callers act independently, calls arrive singly (one ring at a time), and the rate is reasonably constant over short windows (say a quiet midday hour). All three Poisson conditions are met.\n- Step 2: So modelling the hourly count as $$\\operatorname{Po}(\\lambda)$$ is reasonable for those windows.\n- Step 3: The model can fail when (a) many people call simultaneously after a TV advert (spikes in rate — not constant), (b) callers coordinate with each other (not independent), or (c) auto-dialling software produces bursts (not singly).\n\nAlways examine the assumptions before applying the model.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "List several classical examples of counts that typically fit a Poisson distribution well.", "answer": "- Radioactive decay emissions over a fixed time period — each atom decays independently.\n- Number of telephone calls to a switchboard in a 10-minute window.\n- Number of typos per page of a newspaper (assuming roughly uniform typing error rate).\n- Number of vehicles passing a quiet checkpoint per minute.\n- Number of raisins in a randomly chosen slice of fruitcake (spatial Poisson).\n\nCommon theme: rare independent events scattered across a continuum with a steady density. These are the canonical Poisson use-cases.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "The number of cars passing a school gate differs hugely between 8 am and 2 pm. Does this violate Poisson modelling? (3 steps)", "answer": "- Step 1: Within a narrow window (say a 3-minute slot at 8 am), the rate is approximately constant, so $$\\operatorname{Po}(\\lambda_{8\\text{am}})$$ is fine locally.\n- Step 2: But across the whole day, rate varies wildly (rush hour peaks, afternoon lulls). One $$\\lambda$$ can't represent the entire day correctly.\n- Step 3: Fix: use **different** $$\\lambda$$ for different time bands, or a **non-homogeneous Poisson process** where $$\\lambda(t)$$ varies with time. The basic Poisson distribution assumes constant rate within the analysed interval.\n\nLesson: verify the rate is stable over the window you're modelling, not just averaged across a longer span.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "A dataset has sample mean $$3.5$$ and sample variance $$7.0$$. Is Poisson plausible, and what might be happening? (3 steps)", "answer": "- Step 1: Poisson requires mean equal to variance. Here variance is about **twice** the mean — significant overdispersion.\n- Step 2: Reject Poisson as a first model. The excess spread suggests **clustering** or **correlation** — e.g., storms bring multiple lightning strikes at once, or machine faults occur in bursts.\n- Step 3: Alternatives: negative binomial (a mixture of Poissons with varying $$\\lambda$$), or a compound/clustered process.\n\nSignature diagnostic: $$\\sigma^2 \\gg \\mu$$ usually kills Poisson on arrival.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "A count process has mean $$5$$ and variance $$1$$. Why is Poisson unlikely, and what might this indicate? (2 steps)", "answer": "- Step 1: For Poisson, variance should also be $$5$$. A variance of $$1$$ is far too small — the data is much more regular than pure randomness would allow.\n- Step 2: Underdispersion ($$\\sigma^2 \\ll \\mu$$) typically indicates events are **scheduled, coordinated, or regulated** — e.g., trains departing every 10 minutes, production lines pacing output. The randomness is actively suppressed.\n\nRule of thumb: $$\\sigma^2 \\ll \\mu$$ → too regular; $$\\sigma^2 \\gg \\mu$$ → too bursty; $$\\sigma^2 \\approx \\mu$$ → Poisson plausible.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "A clinic sees more than 4 patients with some probability $$p$$ on any given day (computed via Poisson). What's the natural model for \"number of busy days in a 5-day week,\" and why does the distribution change? (3 steps)", "answer": "- Step 1: Each day is an independent trial with fixed probability $$p$$ of being a \"busy day\" (more than 4 patients). This is the classic binomial setup.\n- Step 2: So if $$Y$$ is the count of busy days out of 5, then $$Y \\sim \\operatorname{B}(5, p)$$. The Poisson gave us $$p$$; the binomial now stacks those day-level events.\n- Step 3: We've compressed a continuous \"number of patients\" count into a binary \"busy or not\" flag, and counting flags across days is precisely binomial territory.\n\nTwo-stage reasoning: Poisson gives the per-day event probability, binomial counts successes across days.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "If the probability a roll of cloth has \"fewer than 4 flaws\" is about $$0.08$$ (from a Poisson), and a customer buys 5 rolls, how do you set up \"at least 2 rolls satisfy this\"? (2 steps)", "answer": "- Step 1: Once you have the per-roll probability $$p \\approx 0.08$$, each roll becomes an independent Bernoulli trial.\n- Step 2: The number of such rolls out of 5 follows $$\\operatorname{B}(5, 0.08)$$, so $$P(\\text{at least 2}) = 1 - P(0) - P(1)$$, computed using binomial formulae.\n\nInner Poisson gives the per-roll probability; outer binomial counts across rolls. Keep the levels separate.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Weeds occur at a rate of 1.3 per m². What is the Poisson parameter for a 4 m² plot, and what does it physically represent? (2 steps)", "answer": "- Step 1: The given rate 1.3 per m² is a **spatial rate** — the mean weed count per unit area. It presumes weeds occur independently, singly, and at constant density.\n- Step 2: For 4 m², the expected count scales linearly: $$\\lambda_{4\\mathrm{m}^2} = 4 \\times 1.3 = 5.2$$. The count over that plot follows $$\\operatorname{Po}(5.2)$$.\n\nThis mirrors the time version: rate × interval size = $$\\lambda$$ for that interval.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "For $$X \\sim \\operatorname{Po}(\\lambda)$$, how does $$P(X = k)$$ behave as $$k$$ grows much larger than $$\\lambda$$, and why? (3 steps)", "answer": "- Step 1: $$P(X = k) = \\dfrac{e^{-\\lambda}\\lambda^k}{k!}$$. For $$k \\gg \\lambda$$, the factorial $$k!$$ grows **much faster** than the exponential $$\\lambda^k$$.\n- Step 2: So probabilities decay super-exponentially in $$k$$. Outcomes far above the mean become astronomically unlikely.\n- Step 3: The distribution is **right-skewed** and concentrated around $$\\lambda$$. E.g., for $$\\lambda = 4$$, values $$k = 2$$ to $$6$$ are common, but $$k = 12$$ is negligible.\n\nIntuition: factorials crush exponentials in the long run.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "For $$X \\sim \\operatorname{Po}(\\lambda)$$, where is the mode (most likely value)?", "answer": "The mode is at $$\\lfloor \\lambda \\rfloor$$ (the greatest integer at or below $$\\lambda$$). If $$\\lambda$$ is a positive integer, the distribution has **two equal modes** at $$\\lambda - 1$$ and $$\\lambda$$. If $$\\lambda$$ is non-integer, the single mode is $$\\lfloor \\lambda \\rfloor$$.\n\nThis aligns with intuition: the most likely count is near the expected rate, with a slight bias downward when $$\\lambda$$ is exactly an integer because of the discrete asymmetry of the distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "How does the shape of the Poisson distribution change as $$\\lambda$$ grows from small to large? (3 steps)", "answer": "- Step 1: For small $$\\lambda$$ (say $$< 1$$), the distribution is strongly right-skewed; most mass sits at $$x = 0$$ and $$x = 1$$. The zero count dominates.\n- Step 2: For moderate $$\\lambda$$ (around $$3$$–$$10$$), it becomes more bell-shaped but still with a visible right tail and discrete spikes.\n- Step 3: For large $$\\lambda$$ ($$\\gtrsim 20$$), the shape approaches a **normal distribution** with mean $$\\lambda$$ and standard deviation $$\\sqrt{\\lambda}$$. This is the **Central Limit Theorem** acting on counts.\n\nSo Poisson morphs from spiky-at-zero to symmetric Gaussian-like as $$\\lambda$$ grows.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Outline a systematic procedure for tackling a Poisson word problem. (5 steps)", "answer": "- Step 1: **Identify and define the random variable** — e.g., \"$$X$$ = number of calls in a 10-minute interval.\" Always write it out explicitly.\n- Step 2: **Check (and perhaps comment on) the conditions** — independent, singly, constant rate.\n- Step 3: **Determine $$\\lambda$$** — scale the given rate to match the interval mentioned in the question.\n- Step 4: **Translate the probability expression** — rewrite the inequality into a form matching your tool (formula, cumulative table, calculator).\n- Step 5: **Compute and interpret** — round sensibly and state the answer in context.\n\nSkipping step 3 (scaling) is the single most common exam mistake.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "A doctor sees 6 patients between 9–10 am and 4 between 10–11 am. Does it make sense to model the two-hour total as $$\\operatorname{Po}(10)$$? (3 steps)", "answer": "- Step 1: On average, 5 per hour, so 10 over two hours — but this relies on the rate being constant within each hour.\n- Step 2: Here the rates clearly differ (6 vs 4), so pooling into one $$\\lambda$$ masks the non-constant rate and misrepresents the process.\n- Step 3: Cleaner: model each hour separately as $$\\operatorname{Po}(6)$$ and $$\\operatorname{Po}(4)$$, then use the additive property. The combined total count can still be treated as $$\\operatorname{Po}(10)$$ if the hours are independent and each hour individually follows Poisson, but the underlying process is non-homogeneous.\n\nSubtlety: additivity can mask non-stationarity of the rate; be mindful of what you're assuming.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "Customers arrive at a café at one every 4 minutes. What is the Poisson parameter for a 20-minute window? (2 steps)", "answer": "- Step 1: Rate = 1 customer per 4 min = $$0.25$$ per minute, equivalent to 5 per 20-minute window.\n- Step 2: So the count over 20 minutes follows $$\\operatorname{Po}(5)$$.\n\nSanity check: \"one every 4 min\" over 20 min → roughly 5 on average, which matches $$\\lambda$$. Always verify the scaling mentally.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "How do you fit a Poisson distribution to an observed dataset of counts? (3 steps)", "answer": "- Step 1: Compute the sample mean $$\\bar x$$ and sample variance $$s^2$$. If they're close, Poisson is plausible.\n- Step 2: Estimate the parameter as $$\\hat{\\lambda} = \\bar x$$ — the sample mean is the natural estimator.\n- Step 3: Check the fit by computing predicted probabilities $$\\hat{P}(X=x) = \\dfrac{e^{-\\hat\\lambda}\\hat\\lambda^x}{x!}$$ for each $$x$$ and comparing to observed relative frequencies.\n\nIf the fit is poor or variance/mean differ significantly, try a richer model (negative binomial, mixture, etc.).", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Why might we prefer a fitted Poisson model over raw empirical frequencies when estimating $$P(X = 8)$$ from a sample? (3 steps)", "answer": "- Step 1: Empirical frequencies work well for common values near the mean, but for **rare** values in the tail, the observed count is often zero or near zero even when the true probability is small but nonzero.\n- Step 2: A parametric Poisson model \"smooths\" the distribution: the fitted formula gives a sensible positive estimate even for $$x$$ values not observed in the sample.\n- Step 3: So tail probabilities from a well-chosen Poisson fit are usually **more reliable** than raw frequency estimates — provided the Poisson assumption holds.\n\nLesson: models help you extrapolate into sparsely-sampled regions.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Two independent vending machines break down at rates $$0.1$$ and $$0.05$$ per week. What is the distribution of total breakdowns over 12 weeks? (3 steps)", "answer": "- Step 1: Scale each rate to 12 weeks: machine 1 → $$\\operatorname{Po}(12 \\times 0.1) = \\operatorname{Po}(1.2)$$; machine 2 → $$\\operatorname{Po}(0.6)$$.\n- Step 2: Since the two machines are **independent**, the combined count follows $$\\operatorname{Po}(1.2 + 0.6) = \\operatorname{Po}(1.8)$$.\n- Step 3: From this combined distribution any probability can be computed: e.g., $$P(\\text{exactly 3 total}) = \\dfrac{e^{-1.8}(1.8)^3}{3!}$$.\n\nWorkflow: rescale each rate to the common interval, *then* add parameters.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "An angler catches fish at 2 per hour and fishes for 2 hours per trip. Over 5 independent trips, what is the distribution of \"trips in which at least 5 fish were caught\"? (3 steps)", "answer": "- Step 1: **Inner Poisson step:** per trip, catch follows $$\\operatorname{Po}(2 \\times 2) = \\operatorname{Po}(4)$$. Compute $$p = P(\\text{catches} \\ge 5)$$ using the tables or formula.\n- Step 2: **Middle conversion:** each trip becomes a Bernoulli trial with success probability $$p$$ (the trip is \"productive\").\n- Step 3: **Outer binomial step:** the number of productive trips out of 5 follows $$\\operatorname{B}(5, p)$$.\n\nGeneral insight: whenever you count \"in how many intervals did some Poisson threshold occur,\" you shift up to a binomial at the outer level.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Why is \"number of left-handed people in a class of 30\" a poor fit for the Poisson distribution? (3 steps)", "answer": "- Step 1: There's a **fixed number of trials** (30 students), each a binary success/failure outcome (left/right-handed). This is classic binomial territory.\n- Step 2: The count is bounded above by 30, with nonzero probability of being exactly 30. Poisson has no upper bound and has vanishing probability for counts that large.\n- Step 3: Poisson models rates of events across a continuous interval, not fixed-batch enumerations. Use $$\\operatorname{B}(30, p)$$ instead.\n\nDiagnostic: is there a fixed $$n$$ and a clear \"trial\"? If yes, think binomial, not Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "When is a binomial $$\\operatorname{B}(n, p)$$ well approximated by a Poisson, and why? (3 steps)", "answer": "- Step 1: Approximate when $$n$$ is large and $$p$$ is small, with $$np$$ moderate — a common guideline is $$n > 50$$ and $$p < 0.1$$.\n- Step 2: Under these conditions, trials are so numerous and successes so rare that the binomial's \"fixed $$n$$\" constraint barely matters — it behaves like an unbounded rate.\n- Step 3: Use $$\\lambda = np$$, so $$\\operatorname{B}(n, p) \\approx \\operatorname{Po}(np)$$. This is especially helpful because Poisson cumulative tables are simpler and the formula is neater.\n\nApproximation breaks down when $$p$$ is large (binomial cap matters) or $$n$$ is small (not enough trials for convergence).", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "The Poisson formula involves $$\\lambda^0$$ and $$0!$$. Why does this give a sensible value at $$x = 0$$?", "answer": "Directly substituting $$x=0$$ gives $$P(X=0) = \\dfrac{e^{-\\lambda}\\cdot 1}{1} = e^{-\\lambda}$$, a valid probability.\n\nThis works because both $$\\lambda^0 = 1$$ and $$0! = 1$$ by convention. These aren't arbitrary definitions — they're chosen precisely so that formulas like the Poisson PMF apply uniformly for all $$x \\ge 0$$ without needing a special case for $$x = 0$$. Consistency is baked into the notation.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "What quick sanity checks should you perform on a computed Poisson probability? (3 steps)", "answer": "- Step 1: Check $$0 \\le P \\le 1$$ — any probability outside this range reveals an arithmetic slip.\n- Step 2: Check that $$P(X = \\lfloor \\lambda \\rfloor)$$ is the largest single probability — this is the mode, so it should dominate.\n- Step 3: Check that $$P(X = k)$$ decays rapidly as $$k$$ moves far from $$\\lambda$$. Large probability for an extreme outcome = recalculate.\n\nThese cheap checks catch most computational mistakes before they propagate.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "What is the significance of Poisson being a single-parameter distribution, from a modelling perspective?", "answer": "One parameter $$\\lambda$$ captures everything — mean *and* variance are locked to it. Consequences:\n- Modelling is parsimonious: estimate one number from data.\n- But the model is **restrictive**: if observed data needs different mean and variance, Poisson cannot flex. You'd need a two-parameter alternative (negative binomial, gamma-Poisson mixture).\n- The parameter has a direct physical interpretation as a rate.\n\nSo Poisson trades flexibility for interpretability and simplicity — a very useful tradeoff when the rate assumption is genuinely warranted.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "A botanist counts weeds in 80 squares: $$\\sum x = 295$$, $$\\sum x^2 = 1386$$. Without heavy calculation, would Poisson likely fit? (3 steps)", "answer": "- Step 1: Sample mean is roughly $$\\bar x \\approx 295/80 \\approx 3.7$$.\n- Step 2: Sample variance is approximately $$1386/80 - 3.7^2 \\approx 17.3 - 13.7 \\approx 3.6$$.\n- Step 3: Mean ($$\\approx 3.7$$) and variance ($$\\approx 3.6$$) are very close. This is the classic Poisson fingerprint, so the data supports modelling with $$\\operatorname{Po}(3.7)$$.\n\nMentally checking $$\\bar x \\approx s^2$$ is the quickest way to assess Poisson compatibility — no deep computation needed.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "A sample has mean $$\\approx 5$$ and variance $$\\approx 15$$. What should you conclude about Poisson fit, and what might you try instead? (2 steps)", "answer": "- Step 1: Variance is roughly $$3\\times$$ the mean — significant overdispersion. A Poisson model would systematically underpredict both the tails and the overall spread.\n- Step 2: Consider a **negative binomial** distribution (or a gamma-Poisson mixture). These handle overdispersion by letting $$\\lambda$$ vary across subunits, inflating variance while keeping the count nature of the data.\n\nTakeaway: never force Poisson onto overdispersed data; it's the wrong tool.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Quality control detects faulty components at 2.5 per hour (Poisson). Set up \"probability of at least 7 faults in 4 hours.\" (3 steps)", "answer": "- Step 1: Scale the rate: $$\\lambda_{4\\mathrm{h}} = 2.5 \\times 4 = 10$$. So the count in 4 hours follows $$\\operatorname{Po}(10)$$.\n- Step 2: Translate the inequality: $$P(X \\ge 7) = 1 - P(X \\le 6)$$.\n- Step 3: Look up $$P(X \\le 6)$$ in the cumulative Poisson table for $$\\lambda = 10$$, subtract from 1.\n\nCritical first step is always the rescaling. Forgetting to convert to the relevant interval is the commonest error.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Derive a simple formula for $$P(X \\ge 1)$$ when $$X \\sim \\operatorname{Po}(\\lambda)$$ and interpret it. (2 steps)", "answer": "- Step 1: Use the complement: $$P(X \\ge 1) = 1 - P(X = 0) = 1 - e^{-\\lambda}$$.\n- Step 2: Interpretation: probability of **at least one event** in the interval. It approaches $$1$$ as $$\\lambda$$ grows (so many expected events that at least one is near-certain) and approaches $$0$$ as $$\\lambda \\to 0$$.\n\nThis appears frequently in exam questions — memorise its form.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "If $$\\lambda = 100$$, can you still use the Poisson formula directly? What alternative do you use? (3 steps)", "answer": "- Step 1: The formula $$\\dfrac{e^{-100} \\cdot 100^x}{x!}$$ is numerically unstable — $$e^{-100}$$ is minuscule, $$100^x$$ is enormous, so direct computation risks overflow/underflow and precision loss.\n- Step 2: Tables typically stop at $$\\lambda = 10$$, so they don't help here either.\n- Step 3: Use the **normal approximation**: for large $$\\lambda$$, $$X \\approx N(\\lambda, \\lambda)$$. So for $$\\lambda = 100$$, approximate with $$N(100, 100)$$ (standard deviation $$10$$), using the standard normal tables.\n\nRule of thumb: $$\\lambda \\ge 20$$ makes the normal approximation good enough for most purposes.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "If $$X \\sim \\operatorname{Po}(10)$$ and we \"split\" into $$X = A + B$$ by doubling the count ($$A = 2X$$), is $$A$$ Poisson? (2 steps)", "answer": "- Step 1: No. If $$A = 2X$$, then $$A$$ can only take even values ($$0, 2, 4, \\ldots$$) — never odd. That's incompatible with any Poisson distribution, which must assign positive probability to every non-negative integer.\n- Step 2: To split a Poisson into Poissons requires each subcount to arise from **independent random tagging** of events (thinning), not a deterministic reshaping.\n\nMoral: the additive property is one-directional — summing independents gives Poisson, but decomposition requires extra structure.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "If events from a Poisson stream of rate $$\\lambda$$ are each independently \"tagged\" with probability $$p$$, what's the distribution of the tagged count? (3 steps)", "answer": "- Step 1: Each Poisson event is tagged independently, preserving independence among events.\n- Step 2: The tagged events form a new Poisson process with rate $$\\lambda' = p\\lambda$$ (original rate multiplied by tagging probability).\n- Step 3: So the tagged count over the same interval is $$\\operatorname{Po}(p\\lambda)$$.\n\nThis is **Poisson thinning**: a fundamental property complementing the additive one. You can split a Poisson stream into independent Poisson sub-streams.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "Two independent Poisson streams run at rates $$3.6$$ and $$4.4$$ per hour. What is the distribution of the combined count per hour, and what's the expected total? (2 steps)", "answer": "- Step 1: By the additive property, combined count ~ $$\\operatorname{Po}(3.6 + 4.4) = \\operatorname{Po}(8)$$.\n- Step 2: Expected value = $$\\lambda = 8$$ (by $$E(X) = \\lambda$$), and variance is also 8.\n\nYou don't need to compute individual probabilities to report the mean and distribution — just sum the parameters.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "A student reports $$P(X > 6) = P(X \\le 5)$$ for $$X \\sim \\operatorname{Po}(4)$$, using the cumulative tables. What's the error? (2 steps)", "answer": "- Step 1: \"Strictly greater than 6\" means $$X \\in \\{7, 8, 9, \\ldots\\}$$, so $$P(X > 6) = 1 - P(X \\le 6)$$, not $$P(X \\le 5)$$.\n- Step 2: The student conflated strict with non-strict inequality. Correct form: $$P(X > 6) = 1 - P(X \\le 6)$$, requiring the complement and the right cutoff.\n\nAlways translate carefully: \"greater than $$k$$\" = \"at least $$k+1$$\" = $$1 - P(X \\le k)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "In a problem about two coffee machines breaking down independently, what does \"independent\" concretely require?", "answer": "Concretely: the breakdown of machine C does not change the probability that machine D breaks down, and vice versa. They don't share a common cause (e.g., power surges that would affect both), they aren't mechanically coupled, and users don't switch usage in a way that stresses one when the other fails. Independence is a strong assumption requiring justification — if it fails, the additive property of Poissons no longer gives the combined distribution, and ordinary product-rule calculations for joint events also break down.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "For $$X \\sim \\operatorname{Po}(25)$$, how large a deviation from the mean is \"typical\"? (3 steps)", "answer": "- Step 1: Standard deviation = $$\\sqrt{\\operatorname{Var}(X)} = \\sqrt{25} = 5$$.\n- Step 2: Typical outcomes lie within roughly $$\\pm 1$$ SD of the mean, i.e., in $$[20, 30]$$; very likely outcomes lie within $$\\pm 2$$ SD, i.e., $$[15, 35]$$.\n- Step 3: Relative spread = $$\\sqrt{\\lambda}/\\lambda = 1/\\sqrt{\\lambda}$$, which shrinks as $$\\lambda$$ grows. So large-$$\\lambda$$ Poissons appear sharp and predictable relative to the scale of outcomes.\n\nAs $$\\lambda$$ grows, absolute spread grows but relative spread falls — the distribution becomes proportionally more \"concentrated.\"", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "If $$X, Y, Z$$ are independent Poissons with parameters $$\\lambda_1, \\lambda_2, \\lambda_3$$, what's the distribution of $$X + Y + Z$$?", "answer": "Applying the additive property repeatedly,\n$$X + Y + Z \\sim \\operatorname{Po}(\\lambda_1 + \\lambda_2 + \\lambda_3)$$\n\nThe additive property generalises to any finite number of independent Poissons: the sum is Poisson with parameter equal to the sum of individual parameters. Useful for combining multiple event streams, such as emails by category (personal, business, advertising) or cross-channel customer contacts.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "A problem asks about events over 90 minutes, with rate given per hour. What's the correct modelling move? (2 steps)", "answer": "- Step 1: Convert the rate to a parameter matching the question's interval. If the rate is $$4$$ per hour, then $$\\lambda_{90} = 4 \\times (90/60) = 6$$ for a 90-minute window.\n- Step 2: Define the variable: \"$$Y$$ = events in 90 minutes\" with $$Y \\sim \\operatorname{Po}(6)$$, and compute the required probability from there.\n\nConverting the rate to the question's interval is the most-tested skill in scaled Poisson problems.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "Is it a strict requirement that Poisson events be \"rare\"? (3 steps)", "answer": "- Step 1: Poisson itself doesn't require rarity — $$\\lambda$$ can be any positive real number, and counts can be arbitrarily large.\n- Step 2: However, Poisson often *arises* in rare-event settings because it's the limit of $$\\operatorname{B}(n, p)$$ for large $$n$$, small $$p$$. \"Rare\" refers to the microscopic rate per infinitesimal subinterval, not the overall expected count.\n- Step 3: For large $$\\lambda$$ (say 500/day), events aren't rare in any everyday sense, but Poisson can still apply structurally — though you'd typically switch to the normal approximation for computations.\n\nSo \"rare\" describes the microscopic setup, not the macroscopic outcome.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "Accidents occur at rate $$0.7$$ per month (Poisson). How do you find the probability of \"no accidents in exactly 2 of the next 6 months\"? (3 steps)", "answer": "- Step 1: Per month, accident count $$\\sim \\operatorname{Po}(0.7)$$. Compute $$p = P(\\text{zero accidents}) = e^{-0.7}$$ — the per-month probability of a \"quiet\" month.\n- Step 2: Over 6 independent months, the number of quiet months follows $$\\operatorname{B}(6, e^{-0.7})$$.\n- Step 3: Required probability = $$\\binom{6}{2}(e^{-0.7})^2(1 - e^{-0.7})^4$$. Conceptually: choose which 2 months are quiet, raise the probabilities accordingly.\n\nTwo-layer structure again: Poisson gives the monthly event, binomial stacks across months.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "What's a practical limitation of directly using the Poisson formula for large $$\\lambda$$ and $$x$$? (3 steps)", "answer": "- Step 1: For large $$\\lambda$$, $$e^{-\\lambda}$$ is extremely small; for large $$x$$, $$\\lambda^x$$ is extremely large. Multiplying them loses precision in finite arithmetic.\n- Step 2: Also, $$x!$$ overflows quickly (beyond $$x \\approx 170$$ in standard double precision).\n- Step 3: Workarounds: compute log-probabilities and exponentiate at the end; use the normal approximation when $$\\lambda$$ is large; rely on numerical libraries handling stability. For A-level, this matters mainly when tables don't reach the $$\\lambda$$ in question.\n\nFor exam settings, $$\\lambda \\le 10$$ tables cover most cases; beyond that use the normal approximation.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "Cars pass at 24/min, vans at 8/min (independent). What is the distribution of total vehicles per minute, and roughly how likely is it that at least 30 pass? (3 steps)", "answer": "- Step 1: By the additive property, total ~ $$\\operatorname{Po}(24 + 8) = \\operatorname{Po}(32)$$.\n- Step 2: $$P(\\text{total} \\ge 30) = 1 - P(\\text{total} \\le 29)$$. Since 30 is just below the mean, this should be a moderately large probability.\n- Step 3: Use the normal approximation (since $$\\lambda = 32$$ is large): $$X \\approx N(32, 32)$$, so $$P(X \\ge 30) \\approx P(Z \\ge -2/\\sqrt{32}) \\approx P(Z \\ge -0.35) \\approx 0.64$$.\n\nBig lesson: combine Poissons by summing parameters, then analyse at the combined scale — using normal approximation for large $$\\lambda$$.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": false}, {"question": "Why is \"at least 5 accidents each month in a 2-month span\" different from \"at least 10 accidents over 2 months\"? (3 steps)", "answer": "- Step 1: $$P(\\text{at least 5 each month}) = P(\\text{month 1} \\ge 5) \\times P(\\text{month 2} \\ge 5)$$ by independence. Requires **both** counts to be high.\n- Step 2: $$P(\\text{at least 10 total}) = P(\\operatorname{Po}(2\\lambda) \\ge 10)$$. Requires just the **sum** to be high — could be achieved by one very busy month and one very quiet one.\n- Step 3: These impose different constraints. Typically the \"both high\" event is a subset of \"total high,\" so its probability is smaller. Conflating them is a reading error, not a computational one.\n\nMoral: read the question carefully — \"each\" vs \"total\" are totally different conditions.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": true}, {"question": "If $$X \\sim \\operatorname{Po}(\\lambda)$$ and $$Y = X$$ (perfectly correlated), what's the distribution of $$X + Y$$? (3 steps)", "answer": "- Step 1: $$X + Y = 2X$$, which takes only even values (0, 2, 4, …).\n- Step 2: That support is incompatible with any Poisson distribution, which must give positive probability to every non-negative integer.\n- Step 3: So the sum is **not** Poisson — the additive property fails without independence. The mean still satisfies $$E(X+Y) = 2\\lambda$$ (linearity of expectation always holds), but the distribution has changed.\n\nKey reminder: additivity of Poissons is an independence-critical result, not universal.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": true}, {"question": "Given $$X \\sim \\operatorname{Po}(7.5)$$ with $$P(X < b) = 0.5246$$, how do you find $$b$$ using cumulative tables? (3 steps)", "answer": "- Step 1: Translate the strict inequality for integer $$X$$: $$P(X < b) = P(X \\le b-1)$$.\n- Step 2: So find $$b$$ such that $$P(X \\le b-1) = 0.5246$$ in the $$\\lambda = 7.5$$ column of the cumulative table.\n- Step 3: Suppose the table shows $$P(X \\le 7) = 0.5246$$. Then $$b - 1 = 7$$, giving $$b = 8$$.\n\nAlways apply the shift-by-1 translation for strict inequalities on integer variables.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "Given $$X \\sim \\operatorname{Po}(7.5)$$ with $$P(X \\ge c) = 0.3380$$, how do you find $$c$$? (3 steps)", "answer": "- Step 1: Convert to a cumulative form: $$P(X \\ge c) = 1 - P(X \\le c-1) = 0.3380$$, so $$P(X \\le c-1) = 0.6620$$.\n- Step 2: In the cumulative table for $$\\lambda = 7.5$$, find where $$P(X \\le x) = 0.6620$$.\n- Step 3: Suppose this gives $$P(X \\le 8) = 0.6620$$. Then $$c - 1 = 8$$, so $$c = 9$$.\n\nWorkflow: transform \"at least $$c$$\" to \"at most $$c-1$$\", then read the probability complement and solve.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": false}, {"question": "Why do cumulative Poisson tables cover only a finite range of $$x$$ even though $$X$$ is unbounded?", "answer": "Because probabilities decay super-exponentially for $$x \\gg \\lambda$$, the cumulative probability $$P(X \\le x)$$ approaches $$1$$ very quickly. Typical tables go up to around $$x = 20$$, by which point $$P(X \\le 20)$$ already reads as $$1.0000$$ to 4 decimal places for most practical $$\\lambda$$ values. Listing further entries would just print \"1.0000\" over and over — no new information. The finite table is thus sufficient for all realistic calculations.", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": true}, {"question": "Given that exactly 10 planes landed at an airport in one hour (Poisson process), what's the distribution of how many landed in the first half-hour? (3 steps)", "answer": "- Step 1: Conditional on the total count in an interval, Poisson events are **uniformly distributed** across that interval.\n- Step 2: So each of the 10 planes has probability $$1/2$$ of being in the first half-hour, independently of the others.\n- Step 3: The count in the first half-hour is thus $$\\operatorname{B}(10, 1/2)$$ — a classic binomial.\n\nDeep fact: conditioning on a Poisson total converts the problem to binomial (or multinomial for more bins). This underpins many spatial/temporal probability calculations.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": false}, {"question": "Show in detail how $$\\operatorname{B}(n, p)$$ with $$np = \\lambda$$ fixed and $$n \\to \\infty$$ produces the Poisson PMF. (5 steps)", "answer": "- Step 1: Start with $$P(X=k) = \\binom{n}{k}p^k(1-p)^{n-k}$$. Substitute $$p = \\lambda/n$$.\n- Step 2: Expand the binomial coefficient: $$\\binom{n}{k} = \\dfrac{n(n-1)\\cdots(n-k+1)}{k!}$$. For large $$n$$, the numerator is approximately $$n^k$$.\n- Step 3: Combine with $$p^k = (\\lambda/n)^k$$: $$\\binom{n}{k} p^k \\approx \\dfrac{n^k}{k!}\\cdot\\dfrac{\\lambda^k}{n^k} = \\dfrac{\\lambda^k}{k!}$$.\n- Step 4: For the \"no-event\" factor: $$(1-p)^{n-k} = \\left(1 - \\dfrac{\\lambda}{n}\\right)^{n-k} \\to e^{-\\lambda}$$ as $$n \\to \\infty$$, using the standard limit $$(1 - x/n)^n \\to e^{-x}$$.\n- Step 5: Multiplying the two pieces gives $$P(X=k) \\to \\dfrac{e^{-\\lambda}\\lambda^k}{k!}$$ — the Poisson PMF.\n\nThis derivation is the foundation for why Poisson arises everywhere — it's the natural limit of \"many trials, each rare.\"", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": true}, {"question": "Provide a practical checklist for deciding whether Poisson is the right model for a given count variable. (5 steps)", "answer": "- Step 1: **Is it a count variable?** Must take
