is $$1 - e^{-\\lambda t}$$, which is exactly what we computed. The connection: Poisson counts events in intervals; exponential measures the time between consecutive events.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "What happens to a Poisson distribution as $$\\lambda \\to 0$$? And $$\\lambda \\to \\infty$$? (4 steps)", "answer": "- Step 1: As $$\\lambda \\to 0$$: $$P(X = 0) = e^{-\\lambda} \\to 1$$, and all other probabilities $$\\to 0$$. The distribution collapses to a point mass at 0 — essentially certain of no events.\n- Step 2: As $$\\lambda \\to \\infty$$: the distribution shifts right and spreads out. The standardised variable $$(X - \\lambda)/\\sqrt{\\lambda}$$ converges in distribution to a standard normal.\n- Step 3: So for large $$\\lambda$$, Poisson can be approximated by a normal distribution $$N(\\lambda, \\lambda)$$. (This is the normal approximation to Poisson, used for moderate-to-large rates.)\n- Step 4: Rule of thumb: for $$\\lambda \\geq 20$$ (some say 10), the normal approximation is reasonable.\n\nTakeaway: $$\\lambda \\to 0$$: all mass at zero; $$\\lambda \\to \\infty$$: looks normal around $$\\lambda$$ with SD $$\\sqrt{\\lambda}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_68"}, {"question": "Why can two independent Poisson variables $X \\sim \\text{Po}(\\lambda)$ and $Y \\sim \\text{Po}(\\mu)$ be added to form $Z=X+Y \\sim \\text{Po}(\\lambda+\\mu)$? Intuitively, why does the sum retain the Poisson property?", "answer": "- Step 1: **Independence ensures no overlap** – Events from $X$ and $Y$ don’t influence each other, so their counts combine additively.  \n- Step 2: **Constant rate addition** – The combined process has a rate $\\lambda + \\mu$ (e.g., $X$: client emails, $\\lambda=2$/hr; $Y$: customer emails, $\\mu=3$/hr → $Z$: total emails, $\\lambda+\\mu=5$/hr).  \n- Step 3: **Poisson properties preserved** – Events in $Z$ still occur independently, singly, and at a constant rate $\\lambda+\\mu$.  \n**Limitation:** If $X$ and $Y$ overlap (e.g., shared resources), independence fails, and $Z$ is not Poisson.", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "Show step-by-step why $$P(Q = n) = \\frac{e^{-(\\lambda + \\mu)}(\\lambda+\\mu)^n}{n!}$$ when $$Q = X + Y$$ with $$X \\sim \\mathrm{Po}(\\lambda)$$ and $$Y \\sim \\mathrm{Po}(\\mu)$$ independent. (5 steps)", "answer": "- Step 1: $$P(Q = n) = \\sum_{k=0}^{n} P(X = k) P(Y = n - k)$$ by independence — the convolution formula.\n- Step 2: Substitute Poisson PMFs: $$\\sum_{k=0}^{n} \\frac{e^{-\\lambda}\\lambda^k}{k!} \\cdot \\frac{e^{-\\mu}\\mu^{n-k}}{(n-k)!}$$.\n- Step 3: Pull out constants: $$e^{-(\\lambda+\\mu)} \\sum_{k=0}^{n} \\frac{\\lambda^k \\mu^{n-k}}{k!(n-k)!} = \\frac{e^{-(\\lambda+\\mu)}}{n!} \\sum_{k=0}^{n} \\binom{n}{k} \\lambda^k \\mu^{n-k}$$.\n- Step 4: Recognise the sum as the binomial expansion of $$(\\lambda + \\mu)^n$$. So $$P(Q = n) = \\frac{e^{-(\\lambda+\\mu)}(\\lambda + \\mu)^n}{n!}$$.\n- Step 5: This is exactly the PMF of $$\\mathrm{Po}(\\lambda + \\mu)$$. Confirmed!\n\nTakeaway: The binomial theorem is the key algebraic tool that makes convolution of Poissons come out as a Poisson with summed rate.", "source": "Opus 4.7 ②", "_id": "opus_2_72"}, {"question": "Why is using observed relative frequencies to estimate probability of rare events (e.g., 8+ flaws when you observed 0 in 120) unreliable? How does Poisson help? (2 steps)", "answer": "- Step 1: With 0 observed cases in 120, the observed relative frequency would be 0/120 = 0, which implies we expect 0 in 10,000 — clearly underestimate for rare events.\n\n- Step 2: Poisson uses all the data (through $\\lambda$) to estimate the tail probability. Even if we observed 0 rare events, the shape of the Poisson distribution (informed by the mean) tells us the probability isn't exactly zero.\n\nThis is why in the previous question, using Poisson gave ~6 pieces with 8+ flaws while observed frequency gave 0. The Poisson model \"borrows strength\" from the entire distribution, not just the tail itself.", "source": "MiniMax ①", "_id": "minimax_1_30"}, {"question": "Explain why the Poisson distribution is a good model for radioactive decay but not for the number of people in a queue at a bank. (2 steps)", "answer": "- Step 1: Radioactive decay is a classic Poisson process because:\n- Emissions occur independently\n- One at a time (singly)\n- At a constant average rate (each atom has fixed probability of decay per unit time)\n\n- Step 2: Queue at a bank violates Poisson assumptions because:\n- Arrivals are not independent (families arrive together)\n- Rate varies with time (lunch hour vs. morning)\n- May have \"batching\" (multiple people arrive together)\n\nThe constant rate and independence are key — queues often have time-varying rates and correlation between arrivals.", "source": "MiniMax ①", "_id": "minimax_1_48"}, {"question": "Misconception check: If $$X \\sim \\text{Po}(3)$$ models patients per day, can we say $$2X \\sim \\text{Po}(6)$$ for patients over 2 days? Explain why this is wrong and give the correct approach. (3 steps)", "answer": "- Step 1: **This is a critical misconception.** $$2X$$ means \"twice the number of patients on a single day,\" not \"the number of patients over two days.\" The variable $$2X$$ takes even values only (0, 2, 4, 6, ...) and its distribution is **not** Poisson.\n- Step 2: The correct approach: let $$X_1$$ = patients on day 1 and $$X_2$$ = patients on day 2, where $$X_1 \\sim \\text{Po}(3)$$ and $$X_2 \\sim \\text{Po}(3)$$ independently. Then the total over two days is $$X_1 + X_2 \\sim \\text{Po}(3+3) = \\text{Po}(6)$$.\n- Step 3: The difference: $$2X$$ is **scaling a single observation** (which changes the distribution type), while $$X_1 + X_2$$ is **adding two independent counts** (which preserves the Poisson family). Similarly, $$\\text{E}(2X) = 6$$ and $$\\text{Var}(2X) = 4 \\times 3 = 12$$, but for $$X_1 + X_2$$, $$\\text{E}(X_1+X_2) = 6$$ and $$\\text{Var}(X_1+X_2) = 6$$. The variance tells you: $$2X$$ is not Poisson!", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "If $$X \\sim \\operatorname{Po}(10)$$ and we \"split\" into $$X = A + B$$ by doubling the count ($$A = 2X$$), is $$A$$ Poisson? (2 steps)", "answer": "- Step 1: No. If $$A = 2X$$, then $$A$$ can only take even values ($$0, 2, 4, \\ldots$$) — never odd. That's incompatible with any Poisson distribution, which must assign positive probability to every non-negative integer.\n- Step 2: To split a Poisson into Poissons requires each subcount to arise from **independent random tagging** of events (thinning), not a deterministic reshaping.\n\nMoral: the additive property is one-directional — summing independents gives Poisson, but decomposition requires extra structure.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "An event occurs at a rate modeled by a Poisson distribution. You want to find the probability that this event occurs more than 3 times on exactly 4 out of 5 days. What two distributions must you combine, and in what order? (3 steps)", "answer": "- Step 1: First, use the Poisson distribution to find the probability of the event occurring more than 3 times on a single day. Let this probability be $$p$$.\n- Step 2: Second, recognize that observing whether the event happens more than 3 times over 5 days constitutes 5 independent trials, each with success probability $$p$$.\n- Step 3: Model the number of \"successful\" days using a Binomial distribution, $$Y \\sim B(5, p)$$, and calculate $$P(Y=4)$$ using the binomial formula.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "If $$X \\sim \\text{Po}(\\lambda)$$ and $$Y \\sim \\text{Po}(\\mu)$$ are independent, what is the distribution of $$X + Y$$? Why must independence hold for this result? (3 steps)", "answer": "- Step 1: If $$X \\sim \\text{Po}(\\lambda)$$ and $$Y \\sim \\text{Po}(\\mu)$$ are independent, then $$X + Y \\sim \\text{Po}(\\lambda + \\mu)$$. The parameters simply add.\n- Step 2: **Why independence matters**: If $$X$$ and $$Y$$ were dependent (e.g., correlated), the variance of $$X+Y$$ would include a covariance term: $$\\text{Var}(X+Y) = \\text{Var}(X) + \\text{Var}(Y) + 2\\text{Cov}(X,Y)$$. For Poisson, we need $$\\text{Var}(X+Y) = \\lambda + \\mu$$ (equal to the new mean $$\\lambda + \\mu$$). This only works if $$\\text{Cov}(X,Y) = 0$$, which requires independence.\n- Step 3: **Visual intuition**: Think of two independent streams of events (e.g., cars from the north and cars from the south passing a point). Each stream independently generates events at its own rate. The total event stream has a combined rate equal to the sum — it's as if you merged two independent flows. But if the streams were correlated (e.g., cars from both directions tend to arrive together in convoys), the combined process wouldn't have a simple Poisson structure.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "How are the exam's Poisson cumulative tables structured, and what do they give you?", "answer": "The tables give $$P(X \\le x)$$ for selected $$\\lambda$$ values (typically $$\\lambda = 0$$ to $$10$$ in steps of $$0.5$$) and $$x$$ from $$0$$ up to about $$20$$. To use them:\n- $$P(X \\le a)$$ → read directly.\n- $$P(X \\ge a) = 1 - P(X \\le a - 1)$$.\n- $$P(a \\le X \\le b) = P(X \\le b) - P(X \\le a - 1)$$.\n\nIf your $$\\lambda$$ isn't listed, fall back to the formula or calculator. Tables only cover $$\\lambda \\le 10$$ because beyond that, the normal approximation is usually preferable.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "For a single Poisson trial in a tiny time interval $$dt$$, the probability of ONE event is $$\\lambda \\, dt$$ and TWO events is negligible. Explain how this \"infinitesimal\" view leads to the Poisson PMF. (4 steps)", "answer": "- Step 1: Divide a unit interval into $$n$$ tiny pieces of length $$1/n$$. In each piece, probability of an event is approximately $$\\lambda/n$$ (using constant rate), and probability of multiple events is $$\\sim (\\lambda/n)^2$$, negligible for large $$n$$.\n- Step 2: So each piece is (approximately) a Bernoulli trial with $$p = \\lambda/n$$, and trials are independent (by Poisson's independence). Number of events in the whole interval is $$\\mathrm{B}(n, \\lambda/n)$$.\n- Step 3: Take the limit $$n \\to \\infty$$: $$\\binom{n}{k}(\\lambda/n)^k(1-\\lambda/n)^{n-k} \\to \\frac{\\lambda^k e^{-\\lambda}}{k!}$$.\n- Step 4: This is the formal derivation of Poisson from Binomial, grounded in the physical intuition of \"many rare chances for events\".\n\nTakeaway: Poisson is the limiting distribution when you break a continuous interval into many tiny Bernoulli trials — a deep connection between discrete and continuous randomness.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "What does it mean to say the Poisson distribution is \"memoryless\"? Is this literally true in the discrete sense? (4 steps)", "answer": "- Step 1: Discretely, \"memoryless\" of Poisson means: given that you've observed a certain number of events in one interval, the count in the next (disjoint) interval is still $$\\mathrm{Po}(\\lambda)$$ — unaffected by past data.\n- Step 2: This is due to the independence condition in disjoint time intervals: Poisson events in $$[0, t]$$ are independent of events in $$[t, 2t]$$.\n- Step 3: Strictly, \"memorylessness\" is more associated with the exponential distribution (for waiting times between events). But the Poisson count inherits a related property.\n- Step 4: Practical implication: the model predicts that current rates don't change based on history — something worth double-checking in applications (stock markets, disease outbreaks, etc. often violate this).\n\nTakeaway: Poisson assumes fresh independence in every interval; past behaviour doesn't update the model — a strong and often-violated assumption.", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "Explain why a Poisson distribution would be a poor model for the number of goals scored in 15-minute intervals during a football match. Which condition(s) fail? (4 steps)", "answer": "- Step 1: **Constant rate fails**: goals are more likely to be scored late in the game when teams are fatigued/attacking desperately. The rate varies across the match.\n- Step 2: **Independence potentially fails**: after a goal, the losing team changes strategy (more attacking), making another goal more likely; or the leading team defends, making further goals less likely.\n- Step 3: **Singly**: this condition generally holds — goals occur at distinct moments.\n- Step 4: So Poisson's main weaknesses here are in modelling time-dependent scoring rates and goal-clustering effects.\n\nTakeaway: When rates fluctuate over time or events trigger further events, Poisson is a poor fit.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Why does the Poisson PMF have $$x!$$ in the denominator? What role does this factorial play in shaping the distribution? (4 steps)", "answer": "- Step 1: The $$x!$$ in the denominator comes from the Taylor series of $$e^\\lambda = \\sum_{x=0}^\\infty \\frac{\\lambda^x}{x!}$$. It's required to make probabilities sum to 1.\n- Step 2: Intuition: $$x!$$ represents the number of ways to arrange $$x$$ events in order. In the Poisson-from-Binomial derivation, this factor emerges from accounting for indistinguishable arrangements.\n- Step 3: Shape effect: for small $$x$$ (less than $$\\lambda$$), $$\\lambda^x$$ grows faster than $$x!$$, so probabilities rise. For $$x$$ much larger than $$\\lambda$$, $$x!$$ grows much faster than $$\\lambda^x$$, so probabilities plummet.\n- Step 4: The crossover point is around $$x = \\lambda$$, which is why the mode is near $$\\lambda$$.\n\nTakeaway: $$x!$$ in the denominator is both a normalising device (from the Taylor series) and a brake on tail probabilities (it grows superexponentially).", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "A signal model uses Poisson to describe photons arriving at a detector. If the rate $$\\lambda$$ doubles, what happens to (a) the probability of zero photons, (b) the standard deviation, (c) the coefficient of variation? (4 steps)", "answer": "- Step 1: (a) $$P(X=0) = e^{-\\lambda}$$. Doubling $$\\lambda$$ changes this to $$e^{-2\\lambda} = (e^{-\\lambda})^2$$ — the probability is squared, not halved. So the chance of zero photons drops dramatically.\n- Step 2: (b) Standard deviation is $$\\sqrt{\\lambda}$$. Doubling $$\\lambda$$ multiplies the SD by $$\\sqrt{2} \\approx 1.41$$ — SD grows, but much slower than the mean.\n- Step 3: (c) Coefficient of variation is $$\\frac{1}{\\sqrt{\\lambda}}$$. Doubling $$\\lambda$$ divides CV by $$\\sqrt{2} \\approx 1.41$$ — relative variability decreases by a factor of ~0.71.\n- Step 4: Implication: higher-rate Poisson is tighter relative to its mean — exactly why counting statistics in physics become more reliable with stronger signals.\n\nTakeaway: In Poisson, doubling the rate squares the \"zero\" probability but only $$\\sqrt{2}$$-multiplies the standard deviation — the shape becomes tighter.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "A student reasons: \"If $$X \\sim \\mathrm{Po}(3)$$ and $$Y \\sim \\mathrm{Po}(4)$$, then $$\\mathrm{P}(X + Y = 5)$$ requires me to find all combinations like $$X=0,Y=5$$, $$X=1,Y=4$$, etc., and sum the products.\" While this is technically correct, what much simpler method is available? (2 steps)", "answer": "- Step 1: Since $$X$$ and $$Y$$ are independent Poisson random variables, $$X + Y \\sim \\mathrm{Po}(3 + 4) = \\mathrm{Po}(7)$$. You can directly compute $$\\mathrm{P}(X + Y = 5) = \\frac{e^{-7}(7)^5}{5!}$$ using a single Poisson calculation.\n- Step 2: The convolution approach (enumerating all pairs) gives the same answer but is laborious — for $$\\mathrm{P}(X+Y=5)$$, you'd need 6 terms: $$\\sum_{k=0}^{5}\\mathrm{P}(X=k)\\mathrm{P}(Y=5-k)$$. The additive property collapses all of this into a single Poisson evaluation. Always use the additive property when summing independent Poissons.", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "The Poisson distribution has only one parameter, $$\\lambda$$, unlike the binomial which has two ($$n$$ and $$p$$). What property of the Poisson distribution makes a second parameter unnecessary, and why? (2 steps)", "answer": "- Step 1: For the Poisson distribution, the mean equals the variance: $$\\mathrm{E}(X) = \\lambda$$ and $$\\mathrm{Var}(X) = \\lambda$$. In the binomial, the mean $$np$$ and variance $$np(1-p)$$ can vary independently (by changing $$n$$ and $$p$$), so two parameters are needed. In the Poisson, once you specify the mean, the variance is automatically determined — it must equal the mean.\n- Step 2: This equality of mean and variance is a defining structural constraint. It means the \"shape\" of the distribution is fully pinned down by a single number. If you tried to introduce a second parameter, you would either break the mean-variance equality (making it no longer Poisson) or introduce redundancy. The single parameter $$\\lambda$$ simultaneously controls both the centre and the spread.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "Intuitively, why should a Poisson distribution have equal mean and variance? Consider the underlying process: events occur randomly and independently at a constant rate. How does this lead to variance growing at the same rate as the mean? (3 steps)", "answer": "- Step 1: In a Poisson process, events occur independently. Independence means there's no tendency for events to cluster (which would increase variance) or to spread out evenly (which would decrease variance). The randomness is \"pure\" — neither regular nor clumpy.\n- Step 2: If you double the time interval, you double both the expectedmean (expected count) and the variance. In 2 hours, the mean is twice that of 1 hour, and so is the variance. This linear scaling of both mean and variance with interval length is exactly what happens when mean equals variance: if $$\\mathrm{E}(X) = \\lambda$$ and $$\\mathrm{Var}(X) = \\lambda$$, then both scale as $$\\lambda$$.\n- Step 3: Contrast with the binomial: there, increasing $$n$$ increases both mean and variance, but the variance is \"held back\" by the factor $$(1-p)$$ because there's a fixed cap $$n$$ on the count. The Poisson has no such cap — the absence of a fixed upper bound is precisely what allows the variance to grow as fast as the mean. The \"free\" (uncapped) counting with pure independence is what makes mean = variance.", "source": "GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "Give a \"quick test\" you'd apply to any real-world scenario to decide if Poisson is worth considering. (5 steps)", "answer": "- Step 1: **Is the variable a count?** Poisson is for non-negative integers.\n- Step 2: **Is it count of events in a fixed interval (time/space)?** If yes, Poisson is a candidate.\n- Step 3: **Could events occur at any moment, many of them possible?** Rules out binomial (fixed $$n$$).\n- Step 4: **Are events roughly independent, sparse, and uniformly rated?** If yes, Poisson is likely appropriate.\n- Step 5: **Do you have data?** Check if sample mean $$\\approx$$ sample variance. If yes, strong evidence for Poisson.\n\nTakeaway: Count + continuous interval + no natural upper limit + independence + uniformity = Poisson candidate.", "source": "Opus 4.7 ②", "_id": "opus_2_65"}, {"question": "What quick sanity checks should you perform on a computed Poisson probability? (3 steps)", "answer": "- Step 1: Check $$0 \\le P \\le 1$$ — any probability outside this range reveals an arithmetic slip.\n- Step 2: Check that $$P(X = \\lfloor \\lambda \\rfloor)$$ is the largest single probability — this is the mode, so it should dominate.\n- Step 3: Check that $$P(X = k)$$ decays rapidly as $$k$$ moves far from $$\\lambda$$. Large probability for an extreme outcome = recalculate.\n\nThese cheap checks catch most computational mistakes before they propagate.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "How do you convert each of $$P(X \\ge a)$$, $$P(X < a)$$, and $$P(a < X \\le b)$$ into forms usable with cumulative tables? (3 steps)", "answer": "- Step 1: $$P(X \\ge a) = 1 - P(X \\le a-1)$$. Take the complement and shift the cutoff by 1 because of the strict inequality.\n- Step 2: $$P(X < a) = P(X \\le a-1)$$. For integer-valued $$X$$, \"less than $$a$$\" simply excludes $$a$$ itself.\n- Step 3: $$P(a < X \\le b) = P(X \\le b) - P(X \\le a)$$. Subtract the cumulative just past the exclusion point.\n\nRule of thumb: translate strict to non-strict inequalities by shifting by 1, since $$X$$ takes integer values.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "A student claims that \"independence\" in the Poisson model means that the events are equally likely to occur at any moment. Is this correct? If not, what does independence actually mean, and what condition does \"equally likely at any moment\" relate to? (2 steps)", "answer": "- Step 1: No, this is a misconception. Independence means that the occurrence of one event does not change the probability of another event occurring. It is about the relationship *between* events, not about uniformity over time. For example, if a burst pipe causes multiple phone calls to a plumber, those calls are not independent — one event (the pipe bursting) triggered the others.\n- Step 2: The idea that events are \"equally likely at any moment\" relates to the **constant average rate** condition. This means the rate $$\\lambda$$ per unit time is the same throughout the interval — there's no time-dependent variation in intensity. Independence and constant rate are separate conditions: independence is about events not influencing each other; constant rate is about the temporal uniformity of the average frequency.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "A key subtlety: the Poisson model assumes events occur \"one at a time\". If two people independently walk into a shop at the same instant (two arrivals in the same infinitesimal moment), does this invalidate the model? (4 steps)", "answer": "- Step 1: In theory, the probability of two arrivals in exactly the same instant is zero in the Poisson model — events are singular.\n- Step 2: In practice, \"same time\" is a matter of scale. If our time resolution is 1 second, then \"two people in the same second\" might be recorded. For Poisson to work, the rate per second must still be small compared to the time resolution.\n- Step 3: If events truly cluster (e.g., a couple always arriving together), the model is misspecified, and variance will exceed the mean.\n- Step 4: So the \"singly\" condition is about the microscopic structure of events — not that events never overlap in records, but that their underlying nature is separable and independent.\n\nTakeaway: \"Singly in time\" is a microscopic condition; apparent simultaneities at coarse time scales are okay, but genuine pairings break the model.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "The mean number of cars crossing a bridge is 180 per hour. Describe how to model the probability of \"more than 5 cars in a given minute\" and estimate the order of magnitude. (4 steps)", "answer": "- Step 1: First scale the rate to per minute: 180 per hour = 3 per minute. So $$X$$ (cars per minute) is modelled as $$X \\sim \\mathrm{Po}(3)$$.\n- Step 2: \"More than 5\" means $$X > 5$$, i.e., $$X \\geq 6$$. Compute $$P(X \\geq 6) = 1 - P(X \\leq 5)$$.\n- Step 3: Conceptually: with mean 3, the distribution peaks around 2–3, and $$X = 6$$ is about $$\\frac{6-3}{\\sqrt{3}} \\approx 1.7$$ standard deviations above the mean — so we expect this probability to be small (probably well under 10%).\n- Step 4: Actual values from tables: $$P(X \\leq 5) \\approx 0.9161$$, so $$P(X \\geq 6) \\approx 0.084$$, consistent with the intuition.\n\nTakeaway: Always rescale rates to the right interval first; then the tail probability follows from how many SDs the threshold is above the mean.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "Explain the subtle difference between the \"Poisson distribution\" and a \"Poisson process\". (4 steps)", "answer": "- Step 1: \"Poisson distribution\" is a probability distribution over the COUNT of events — a discrete random variable $$X$$ taking values 0, 1, 2, ...\n- Step 2: \"Poisson process\" is a stochastic process describing the entire time series: when each event occurs. It generates infinitely many possible event times; the count over any interval is Poisson.\n- Step 3: At A-level, we mostly use the Poisson distribution — looking at counts in fixed intervals. The full Poisson process (with its continuous time structure) is more advanced.\n- Step 4: The relationship: a Poisson process with rate $$\\lambda$$ generates a Poisson distribution with parameter $$\\lambda t$$ for the count over $$[0, t]$$.\n\nTakeaway: Poisson distribution is about counts; Poisson process is about the full temporal structure. The distribution is a slice of the process.", "source": "Opus 4.7 ②", "_id": "opus_2_67"}, {"question": "How is the Poisson distribution related to the underlying \"Poisson process,\" and why does that perspective unify the additive property, thinning, and conditioning? (3 steps)", "answer": "- Step 1: A **Poisson process** is a random model for events happening along a continuous axis (time or space), with independent increments and constant rate $$\\lambda$$. The *count* over any interval then follows a Poisson distribution.\n- Step 2: The process viewpoint makes key properties obvious: merging two processes gives a process with summed rates (additive property); tagging each event independently with probability $$p$$ gives a subprocess of rate $$p\\lambda$$ (thinning); given a fixed total count in an interval, event positions are uniformly distributed (conditioning → binomial).\n- Step 3: So all three \"tricks\" are facets of the same underlying structure — the Poisson distribution is the window through which we see a deeper random process.\n\nSeeing the process unifies the rules: each property is a natural consequence of independent increments and constant rate.", "source": "Opus 4.7 ①", "_id": "opus_1_71"}, {"question": "Edge case: Can $$\\lambda = 0$$ in a Poisson distribution? What would this mean? (2 steps)", "answer": "- Step 1: Technically, if $$\\lambda = 0$$, then $$\\text{P}(X=0) = e^0 = 1$$ and $$\\text{P}(X=x) = 0$$ for all $$x \\geq 1$$. The distribution is **degenerate** — the event never occurs.\n- Step 2: In practice, $$\\lambda = 0$$ means the rate is zero, so the process doesn't exist. This is a valid but trivial Poisson distribution. In modelling, you'd never use $$\\lambda = 0$$ — it means there's nothing to model. The interesting range is $$\\lambda > 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_65"}, {"question": "Explain the connection between the Poisson distribution and the exponential distribution at a conceptual level. (4 steps)", "answer": "- Step 1: A Poisson process generates events at constant rate $$\\lambda$$. The COUNT of events in an interval is Poisson; the WAITING TIME between events is exponential with the same rate $$\\lambda$$.\n- Step 2: The two descriptions are complementary:\n+ \"How many events in $$[0, t]$$?\" → $$\\mathrm{Po}(\\lambda t)$$\n+ \"How long until the next event?\" → $$\\mathrm{Exp}(\\lambda)$$\n- Step 3: Consistency: $$P(X = 0 \\text{ in } [0, t]) = e^{-\\lambda t}$$. Meanwhile, $$P(\\text{wait} > t) = e^{-\\lambda t}$$ from the exponential CDF. These match!\n- Step 4: So Poisson counts and exponential waiting times are two views of the same underlying process.\n\nTakeaway: Poisson (discrete count) and exponential (continuous wait) are dual descriptions of the same Poisson process.", "source": "Opus 4.7 ②", "_id": "opus_2_61"}, {"question": "For a shop with daily Poisson total sales of mean 4, describe how to model 2-day total sales and what condition is needed. (4 steps)", "answer": "- Step 1: If days are independent Poissons with rate 4 each, then 2-day total is $$\\mathrm{Po}(4) + \\mathrm{Po}(4) = \\mathrm{Po}(8)$$ by additivity — assuming independence between days.\n- Step 2: Equivalently, we could just scale the rate: $$\\lambda_{\\text{2 days}} = 2 \\times 4 = 8$$, same answer.\n- Step 3: Independence condition: the number of sales on day 1 cannot influence day 2 sales. If there's a \"buy one day, bring friends next day\" effect, this is violated.\n- Step 4: This is the \"temporal additivity\" property, implicit in the constant-rate condition.\n\nTakeaway: Across time, Poisson totals add naturally — but always confirm that the independence assumption is reasonable.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "What is the probability generating function (PGF) of $$X \\sim \\text{Po}(\\lambda)$$, and how does it make proving mean = variance almost trivial? (3 steps)", "answer": "- Step 1: The PGF is $$G(t) = \\text{E}(t^X) = \\sum_{x=0}^{\\infty} t^x \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!} = e^{-\\lambda}\\sum_{x=0}^{\\infty}\\frac{(\\lambda t)^x}{x!} = e^{-\\lambda} \\cdot e^{\\lambda t} = e^{\\lambda(t-1)}$$.\n- Step 2: The mean and variance come from derivatives of the PGF at $$t=1$$:\n  + $$\\text{E}(X) = G'(1)$$: $$G'(t) = \\lambda e^{\\lambda(t-1)}$$, so $$G'(1) = \\lambda e^0 = \\lambda$$.\n  + $$\\text{E}(X^2) = G''(1) + G'(1)$$: $$G''(t) = \\lambda^2 e^{\\lambda(t-1)}$$, so $$G''(1) = \\lambda^2$$. Then $$\\text{E}(X^2) = \\lambda^2 + \\lambda$$.\n- Step 3: $$\\text{Var}(X) = \\text{E}(X^2) - [\\text{E}(X)]^2 = \\lambda^2 + \\lambda - \\lambda^2 = \\lambda$$. The PGF makes this almost automatic — the exponential form of the PGF means all derivatives have the same structure, and the mean = variance property falls out immediately.", "source": "GLM 5.1 ③", "_id": "glm_3_77"}, {"question": "Why do cumulative Poisson tables cover only a finite range of $$x$$ even though $$X$$ is unbounded?", "answer": "Because probabilities decay super-exponentially for $$x \\gg \\lambda$$, the cumulative probability $$P(X \\le x)$$ approaches $$1$$ very quickly. Typical tables go up to around $$x = 20$$, by which point $$P(X \\le 20)$$ already reads as $$1.0000$$ to 4 decimal places for most practical $$\\lambda$$ values. Listing further entries would just print \"1.0000\" over and over — no new information. The finite table is thus sufficient for all realistic calculations.", "source": "Opus 4.7 ①", "_id": "opus_1_66"}, {"question": "What is the significance of Poisson being a single-parameter distribution, from a modelling perspective?", "answer": "One parameter $$\\lambda$$ captures everything — mean *and* variance are locked to it. Consequences:\n- Modelling is parsimonious: estimate one number from data.\n- But the model is **restrictive**: if observed data needs different mean and variance, Poisson cannot flex. You'd need a two-parameter alternative (negative binomial, gamma-Poisson mixture).\n- The parameter has a direct physical interpretation as a rate.\n\nSo Poisson trades flexibility for interpretability and simplicity — a very useful tradeoff when the rate assumption is genuinely warranted.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "If $$\\lambda = 100$$, can you still use the Poisson formula directly? What alternative do you use? (3 steps)", "answer": "- Step 1: The formula $$\\dfrac{e^{-100} \\cdot 100^x}{x!}$$ is numerically unstable — $$e^{-100}$$ is minuscule, $$100^x$$ is enormous, so direct computation risks overflow/underflow and precision loss.\n- Step 2: Tables typically stop at $$\\lambda = 10$$, so they don't help here either.\n- Step 3: Use the **normal approximation**: for large $$\\lambda$$, $$X \\approx N(\\lambda, \\lambda)$$. So for $$\\lambda = 100$$, approximate with $$N(100, 100)$$ (standard deviation $$10$$), using the standard normal tables.\n\nRule of thumb: $$\\lambda \\ge 20$$ makes the normal approximation good enough for most purposes.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Why might we prefer a fitted Poisson model over raw empirical frequencies when estimating $$P(X = 8)$$ from a sample? (3 steps)", "answer": "- Step 1: Empirical frequencies work well for common values near the mean, but for **rare** values in the tail, the observed count is often zero or near zero even when the true probability is small but nonzero.\n- Step 2: A parametric Poisson model \"smooths\" the distribution: the fitted formula gives a sensible positive estimate even for $$x$$ values not observed in the sample.\n- Step 3: So tail probabilities from a well-chosen Poisson fit are usually **more reliable** than raw frequency estimates — provided the Poisson assumption holds.\n\nLesson: models help you extrapolate into sparsely-sampled regions.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "Explain why $$P(X = 0) + P(X = 1) + P(X = 2) + \\ldots = 1$$ is NOT obvious just from the Poisson formula. What makes it work out? (4 steps)", "answer": "- Step 1: The Poisson formula is $$P(X = x) = \\frac{e^{-\\lambda}\\lambda^x}{x!}$$. If you picked $$e^{-\\lambda}$$ to be some other function, the probabilities wouldn't sum to 1.\n- Step 2: The key fact is the Taylor series: $$e^\\lambda = 1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\ldots$$. This gives us exactly what we need.\n- Step 3: So $$\\sum_x P(X=x) = e^{-\\lambda} \\cdot e^\\lambda = 1$$. The $$e^{-\\lambda}$$ is specifically chosen to cancel the $$e^\\lambda$$ that emerges from summing the numerators.\n- Step 4: This is not \"obvious\" in the sense that constructing a probability distribution from $$\\lambda^x / x!$$ terms requires knowing the Taylor series of $$e^\\lambda$$ — a non-trivial fact.\n\nTakeaway: The $$e^{-\\lambda}$$ in Poisson is not arbitrary — it's a carefully chosen normalising constant that cancels the Taylor series of $$e^\\lambda$$.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "A classic mistake: a student sees $$P(X=0) = 0.3$$ and concludes \"so the mean is about 0.3\". Why is this wrong, and what's the correct relation? (4 steps)", "answer": "- Step 1: $$P(X = 0) = e^{-\\lambda}$$. Setting this equal to 0.3: $$e^{-\\lambda} = 0.3$$, so $$\\lambda = -\\ln(0.3) \\approx 1.2$$.\n- Step 2: The mean is $$\\lambda \\approx 1.2$$, not 0.3. The confusion is between \"probability of zero events\" and \"expected number of events\".\n- Step 3: These are very different: you can have a mean of 5 events with probability of zero events very small ($$e^{-5} \\approx 0.007$$), or mean of 0.1 events with probability of zero very high ($$e^{-0.1} \\approx 0.905$$).\n- Step 4: The relation between them is $$P(X=0) = e^{-\\lambda}$$ — exponentially-decreasing in $$\\lambda$$.\n\nTakeaway: $$P(X=0)$$ and $$E(X)$$ are different things; they're related by $$P(X=0) = e^{-E(X)}$$ in Poisson.", "source": "Opus 4.7 ②", "_id": "opus_2_63"}, {"question": "A key modelling error: assuming Poisson when events occur in clusters (e.g., tourists arriving by bus in groups of 10). What specifically breaks down? (4 steps)", "answer": "- Step 1: The \"singly in time\" condition fails when events arrive in groups. If a bus unloads 10 tourists at once, that's one arrival event with 10 sub-events — not 10 independent single events.\n- Step 2: Result: variance > mean (over-dispersion). The data will have bursts of activity followed by lulls, creating more extreme counts than Poisson predicts.\n- Step 3: The mean number might still equal \"events per hour\", but the variance is inflated because the clustering creates correlated arrivals.\n- Step 4: Better models here: compound Poisson (where each arrival brings a random group size), or negative binomial (which allows variance > mean).\n\nTakeaway: Clustering or batching of events invalidates \"singly in time\"; variance exceeds mean, and Poisson systematically underestimates extremes.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Compare Poisson modeling for the number of customers arriving at a café vs. the number of customers in the café at any time. Which is better modeled as Poisson, and why?", "answer": "- Step 1: **Arrivals (Poisson)** – Customers arrive at a constant rate (e.g., 1 per 4 minutes), independently, singly → Poisson is suitable.  \n- Step 2: **Customers in café (Not Poisson)** – Number in the café depends on service times (e.g., some stay longer) → violates independence and constant rate.  \n+ Example: A café might have 10 arrivals/hour but 5 customers in the café on average – arrivals are Poisson, but in-café count is not.", "source": "Qwen 3 ②", "_id": "qwen_2_8"}, {"question": "Synthesis: Why is it that when you scale a Poisson rate (e.g., from \"per hour\" to \"per 90 minutes\"), you multiply $$\\lambda$$ by a factor, but when you add two independent Poisson processes, you add the $$\\lambda$$ values? Connect both to the same underlying principle. (3 steps)", "answer": "- Step 1: Both operations rely on the same principle: **the expected number of events is proportional to both the rate and the interval length**. If events occur at rate $$r$$ per unit time, then in interval of length $$t$$, the expected count is $$\\lambda = r \\times t$$.\n- Step 2: **Scaling**: When you change the interval from $$t_1$$ to $$t_2$$, you multiply the rate: $$\\lambda_2 = r \\times t_2 = \\lambda_1 \\times \\frac{t_2}{t_1}$$. This is just applying the same rate to a different interval.\n- Step 3: **Adding**: When you merge two independent processes with rates $$r_1$$ and $$r_2$$ over the same interval $$t$$, the combined rate is $$r_1 + r_2$$ (events from both sources contribute independently). The expected total is $$(r_1 + r_2) \\times t = r_1 t + r_2 t = \\lambda_1 + \\lambda_2$$. Both rules are just \"expected count = rate × time,\" applied to one process with a new interval, or two processes in the same interval.", "source": "GLM 5.1 ③", "_id": "glm_3_71"}, {"question": "For Aisha (1.2/day) and Biyu (0.8/day), find the probability that **each** receives at least 1 letter on a particular day. (2 steps)", "answer": "- Step 1: Compute individually: $$\\text{P}(\\text{Aisha} \\geq 1) = 1 - e^{-1.2} \\approx 1 - 0.3012 = 0.6988$$. $$\\text{P}(\\text{Biyu} \\geq 1) = 1 - e^{-0.8} \\approx 1 - 0.4493 = 0.5507$$.\n- Step 2: Since independent, multiply: $$\\text{P}(\\text{each} \\geq 1) = 0.6988 \\times 0.5507 \\approx 0.3848$$. Note this is different from \"total ≥ 2\" (which would use the additive property). The question asks about each person individually, so we must use the joint probability.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "For the three photocopiers (rates 0.4, 0.2, 0.8 per week), find the probability that **each** breaks down exactly once in a given week. Why can't you use the additive property for this? (3 steps)", "answer": "- Step 1: \"Each breaks down exactly once\" means $$X_1 = 1$$ AND $$X_2 = 1$$ AND $$X_3 = 1$$. This is a **joint probability**, not a total. The additive property gives the distribution of the **sum** $$X_1 + X_2 + X_3$$, which doesn't tell us the individual values.\n- Step 2: Since the copiers break down independently, multiply the individual probabilities:\n$$\\text{P}(X_1=1) \\times \\text{P}(X_2=1) \\times \\text{P}(X_3=1) = (0.4e^{-0.4}) \\times (0.2e^{-0.2}) \\times (0.8e^{-0.8})$$\n- Step 3: Compute: $$= 0.4 \\times 0.2 \\times 0.8 \\times e^{-(0.4+0.2+0.8)} = 0.064 \\times e^{-1.4} \\approx 0.064 \\times 0.2466 \\approx 0.0158$$. This is much smaller than the probability of at least one total breakdown (0.7534), because requiring *each specific copier* to break down exactly once is a very specific joint event.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "How do you fit a Poisson distribution to an observed dataset of counts? (3 steps)", "answer": "- Step 1: Compute the sample mean $$\\bar x$$ and sample variance $$s^2$$. If they're close, Poisson is plausible.\n- Step 2: Estimate the parameter as $$\\hat{\\lambda} = \\bar x$$ — the sample mean is the natural estimator.\n- Step 3: Check the fit by computing predicted probabilities $$\\hat{P}(X=x) = \\dfrac{e^{-\\hat\\lambda}\\hat\\lambda^x}{x!}$$ for each $$x$$ and comparing to observed relative frequencies.\n\nIf the fit is poor or variance/mean differ significantly, try a richer model (negative binomial, mixture, etc.).", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "For $$X \\sim \\operatorname{Po}(\\lambda)$$, how does $$P(X = k)$$ behave as $$k$$ grows much larger than $$\\lambda$$, and why? (3 steps)", "answer": "- Step 1: $$P(X = k) = \\dfrac{e^{-\\lambda}\\lambda^k}{k!}$$. For $$k \\gg \\lambda$$, the factorial $$k!$$ grows **much faster** than the exponential $$\\lambda^k$$.\n- Step 2: So probabilities decay super-exponentially in $$k$$. Outcomes far above the mean become astronomically unlikely.\n- Step 3: The distribution is **right-skewed** and concentrated around $$\\lambda$$. E.g., for $$\\lambda = 4$$, values $$k = 2$$ to $$6$$ are common, but $$k = 12$$ is negligible.\n\nIntuition: factorials crush exponentials in the long run.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "A student wants to compute $$P(X \\leq 3)$$ for $$X \\sim \\mathrm{Po}(0.84)$$ using tables — but tables start at $$\\lambda = 0.5$$ and go up in steps of 0.5. What should they do? (4 steps)", "answer": "- Step 1: If $$\\lambda$$ isn't tabulated, don't use tables! Use the Poisson PMF formula directly with a calculator.\n- Step 2: $$P(X \\leq 3) = P(X=0) + P(X=1) + P(X=2) + P(X=3)$$, computing each term with $$\\lambda = 0.84$$.\n- Step 3: Modern calculators have a built-in Poisson PDF and CDF function — use it for non-tabulated $$\\lambda$$.\n- Step 4: Never \"round\" $$\\lambda$$ to the nearest tabulated value — that introduces unnecessary approximation error.\n\nTakeaway: Tables are convenient only for tabulated $$\\lambda$$s; use the formula or calculator otherwise.", "source": "Opus 4.7 ②", "_id": "opus_2_69"}, {"question": "For $$X \\sim \\operatorname{Po}(25)$$, how large a deviation from the mean is \"typical\"? (3 steps)", "answer": "- Step 1: Standard deviation = $$\\sqrt{\\operatorname{Var}(X)} = \\sqrt{25} = 5$$.\n- Step 2: Typical outcomes lie within roughly $$\\pm 1$$ SD of the mean, i.e., in $$[20, 30]$$; very likely outcomes lie within $$\\pm 2$$ SD, i.e., $$[15, 35]$$.\n- Step 3: Relative spread = $$\\sqrt{\\lambda}/\\lambda = 1/\\sqrt{\\lambda}$$, which shrinks as $$\\lambda$$ grows. So large-$$\\lambda$$ Poissons appear sharp and predictable relative to the scale of outcomes.\n\nAs $$\\lambda$$ grows, absolute spread grows but relative spread falls — the distribution becomes proportionally more \"concentrated.\"", "source": "Opus 4.7 ①", "_id": "opus_1_55"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A binomial distribution models the number of successes in a fixed number of trials. What fundamental difference in the setup of a situation makes a Poisson distribution the appropriate model instead of a binomial? (2 steps)", "answer": "- Step 1: A binomial distribution requires a fixed, finite number of trials ($$n$$). In many real-world scenarios, like the number of phone calls a company receives in a day, there is no fixed upper limit to the number of events; theoretically, it could be infinitely many.\n- Step 2: The Poisson distribution models the number of events occurring in a fixed interval of time or space, where the maximum number of occurrences is not fixed (can be 0, 1, 2, ... up to infinity, though large numbers become increasingly improbable).", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "If you collect data on the number of times an event occurs per day and calculate the sample mean and sample variance, what specific numerical relationship between these two statistics would strongly suggest a Poisson distribution is a good model? (2 steps)", "answer": "- Step 1: For a Poisson distribution, the theoretical mean $$E(X)$$ and theoretical variance $$Var(X)$$ are both equal to the parameter $$\\lambda$$.\n- Step 2: Therefore, if the sample mean and sample variance are approximately equal (e.g., mean = 2.82, variance = 2.83), this close agreement strongly supports choosing a Poisson model. If the variance is much larger or smaller than the mean, a Poisson model is likely inappropriate.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "For a random variable $$X \\sim Po(\\lambda)$$, write down the probability mass function $$P(X=x)$$ and state the valid range of values for $$x$$.", "answer": "The formula is $$P(X=x) = \\frac{e^{-\\lambda} \\lambda^x}{x!}$$, where $$x$$ can take any non-negative integer value: $$x = 0, 1, 2, 3, \\dots$$", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "How can the Maclaurin/Taylor series expansion of $$e^\\lambda$$ be used to prove that the sum of all Poisson probabilities equals 1? (3 steps)", "answer": "- Step 1: Write out the sum of probabilities: $$\\sum P(X=x) = P(X=0) + P(X=1) + P(X=2) + \\dots = e^{-\\lambda} + e^{-\\lambda}\\lambda + \\frac{e^{-\\lambda}\\lambda^2}{2!} + \\dots$$\n- Step 2: Factor out $$e^{-\\lambda}$$ to get $$e^{-\\lambda} \\left(1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\dots\\right)$$.\n- Step 3: Recognize that the expression in the parentheses is the series expansion for $$e^\\lambda$$. Substitute this back in to get $$e^{-\\lambda} \\times e^\\lambda = e^0 = 1$$, proving it is a valid probability distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "When calculating probabilities like $$P(X \\geq 1)$$ for a Poisson distribution, why is it computationally easier to use the complement rather than summing an infinite series? (2 steps)", "answer": "- Step 1: $$P(X \\geq 1)$$ would require summing $$P(X=1) + P(X=2) + P(X=3) + \\dots$$ infinitely, which is impossible to compute directly.\n- Step 2: By the complement rule, $$P(X \\geq 1) = 1 - P(X < 1) = 1 - P(X=0)$$. Since $$P(X=0) = \\frac{e^{-\\lambda}\\lambda^0}{0!} = e^{-\\lambda}$$, the calculation reduces to a simple $$1 - e^{-\\lambda}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "If $$X \\sim Po(\\lambda)$$ and you are told that $$P(X=2) = P(X=3)$$, explain the algebraic steps to find the value of $$\\lambda$$. (3 steps)", "answer": "- Step 1: Set up the equation using the PMF: $$\\frac{e^{-\\lambda}\\lambda^2}{2!} = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$.\n- Step 2: Cancel the common terms $$e^{-\\lambda}$$ and $$\\lambda^2$$ from both sides, leaving $$\\frac{1}{2} = \\frac{\\lambda}{6}$$.\n- Step 3: Solve for $$\\lambda$$ by multiplying both sides by 6, giving $$\\lambda = 3$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "What are the three essential conditions that must be met for a Poisson distribution to be a suitable model for a real-world situation? (1 step)", "answer": "- Step 1: The events must occur (1) independently, (2) singly in space or time (meaning two events cannot occur at the exact same instant/location), and (3) at a constant average rate, so the mean number in an interval is proportional to the length of the interval.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "A student suggests modelling the number of people entering a store using a Poisson distribution. Why might the \"singly\" condition be violated in this scenario? (2 steps)", "answer": "- Step 1: The Poisson model assumes events occur \"singly,\" meaning the probability of two events happening at the exact same instant is essentially zero.\n- Step 2: People often enter stores in groups (families, friends). If a family of 4 walks in together, that's 4 people at the same instant, violating the \"singly\" condition. A better model would be to model the number of *groups* entering with a Poisson distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "If emails arrive at a mean rate of 6 per hour, explain how to find the parameter $$\\lambda$$ for the number of emails received in a 20-minute interval. (2 steps)", "answer": "- Step 1: The rate must be proportional to the length of the interval. First, express the new interval in the same units as the given rate (20 minutes = 1/3 of an hour).\n- Step 2: Multiply the hourly rate by the fraction of the hour: $$\\lambda = 6 \\times \\frac{1}{3} = 2$$. So, the number of emails in 20 minutes follows $$Po(2)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "An event occurs at a rate modeled by a Poisson distribution. You want to find the probability that this event occurs more than 3 times on exactly 4 out of 5 days. What two distributions must you combine, and in what order? (3 steps)", "answer": "- Step 1: First, use the Poisson distribution to find the probability of the event occurring more than 3 times on a single day. Let this probability be $$p$$.\n- Step 2: Second, recognize that observing whether the event happens more than 3 times over 5 days constitutes 5 independent trials, each with success probability $$p$$.\n- Step 3: Model the number of \"successful\" days using a Binomial distribution, $$Y \\sim B(5, p)$$, and calculate $$P(Y=4)$$ using the binomial formula.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "If $$X \\sim Po(\\lambda)$$ and $$Y \\sim Po(\\mu)$$ are independent, state the distribution of $$X+Y$$ and explain why the time intervals must be the same for this addition to be meaningful. (2 steps)", "answer": "- Step 1: The distribution is $$X+Y \\sim Po(\\lambda+\\mu)$$.\n- Step 2: For $$X+Y$$ to represent a combined total of events, both $$X$$ and $$Y$$ must be counting events over the exact same interval of time or space. If $$X$$ is events per hour and $$Y$$ is events per day, adding them directly makes no physical sense.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "If $$X \\sim Po(5)$$ and $$Y \\sim Po(3)$$ are independent, explain why $$X - Y$$ does NOT follow a Poisson distribution. (2 steps)", "answer": "- Step 1: A Poisson distribution only takes non-negative integer values ($$0, 1, 2, \\dots$$). However, since $$Y$$ can be larger than $$X$$, the difference $$X - Y$$ can be negative.\n- Step 2: Furthermore, while the mean of $$X-Y$$ would be $$5-3=2$$, the variance of $$X-Y$$ is $$5+3=8$$ (variances add even for independent differences). A Poisson distribution requires the mean and variance to be equal, which is not the case here (2 ≠ 8).", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "Given independent $$X \\sim Po(2)$$ and $$Y \\sim Po(3)$$, explain the conceptual difference between finding $$P(X=2 \\text{ and } Y=1)$$ and $$P(X+Y=3)$$. (2 steps)", "answer": "- Step 1: $$P(X=2 \\text{ and } Y=1)$$ refers to exactly one specific combination of events: $$X$$ takes the value 2 AND $$Y$$ takes the value 1. You calculate this by multiplying the individual probabilities: $$P(X=2) \\times P(Y=1)$$.\n- Step 2: $$P(X+Y=3)$$ refers to the total being 3, which could be achieved through multiple combinations: ($$X=0, Y=3$$), ($$X=1, Y=2$$), ($$X=2, Y=1$$), or ($$X=3, Y=0$$). You could sum the probabilities of all these specific combinations, but it is much easier to use the additive property to define $$X+Y \\sim Po(5)$$ and find $$P(Z=3)$$ directly.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "State the mean and variance of a random variable $$X \\sim Po(\\lambda)$$, and explain why this relationship makes Poisson a particularly unique and restrictive model. (2 steps)", "answer": "- Step 1: For $$X \\sim Po(\\lambda)$$, both the mean $$E(X)$$ and the variance $$Var(X)$$ are equal to $$\\lambda$$.\n- Step 2: This is unique because most distributions have separate parameters for mean and variance (like Normal) or variance is a function of both parameters (like Binomial). This restrictiveness means Poisson is only suitable for data where the spread (variance) is roughly equal to the average (mean); it cannot model data that is highly clustered (variance > mean) or highly uniform (variance < mean).", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "When given sample data (like $$\\sum x$$ and $$\\sum x^2$$ for $$n$$ observations) to check if a Poisson model is suitable, what value should you use as the parameter $$\\lambda$$ for the model, and why? (2 steps)", "answer": "- Step 1: Calculate the sample mean $$\\bar{x} = \\frac{\\sum x}{n}$$ and sample variance $$s^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$. If they are close, Poisson is supported.\n- Step 2: Use the sample mean $$\\bar{x}$$ as the estimate for $$\\lambda$$. This is because $$\\lambda$$ represents the average rate of occurrence, and the sample mean is the best estimator for the population mean.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "If $$\\lambda$$ is very small (approaching 0) in a Poisson distribution, which specific probability approaches 1, and what does this imply about the shape of the distribution? (2 steps)", "answer": "- Step 1: As $$\\lambda \\to 0$$, $$P(X=0) = e^{-\\lambda} \\to e^0 = 1$$. This means the probability of zero events approaches certainty.\n- Step 2: This implies the distribution becomes heavily right-skewed, with almost all the probability mass concentrated at $$x=0$$, and probabilities for $$x \\geq 1$$ becoming negligible.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Cars pass a point at a rate of 12 per hour, and trucks pass at a rate of 3 per hour. Assuming both are independent Poisson processes, what is the distribution of the total number of vehicles passing in a 15-minute interval? (3 steps)", "answer": "- Step 1: Convert the rates to the 15-minute interval. Since 15 minutes is 1/4 of an hour, the rate for cars is $$12 \\times \\frac{1}{4} = 3$$, so $$C \\sim Po(3)$$.\n- Step 2: The rate for trucks is $$3 \\times \\frac{1}{4} = 0.75$$, so $$T \\sim Po(0.75)$$.\n- Step 3: Since they are independent, the total vehicles $$V = C + T$$ follows a Poisson distribution with the added parameters: $$V \\sim Po(3 + 0.75) = Po(3.75)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "For $$X \\sim Po(\\lambda)$$, given that $$P(X=4) = 3 \\times P(X=2)$$, walk through the algebraic steps to find $$\\lambda$$. (3 steps)", "answer": "- Step 1: Write the equation using the PMF: $$\\frac{e^{-\\lambda}\\lambda^4}{4!} = 3 \\times \\frac{e^{-\\lambda}\\lambda^2}{2!}$$.\n- Step 2: Cancel $$e^{-\\lambda}$$ and $$\\lambda^2$$ from both sides, leaving $$\\frac{\\lambda^2}{24} = \\frac{3}{2}$$.\n- Step 3: Solve for $$\\lambda^2$$: $$\\lambda^2 = 24 \\times \\frac{3}{2} = 36$$. Since $$\\lambda > 0$$, $$\\lambda = 6$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "You need to find the smallest value of $$c$$ such that $$P(X > c) \\leq 0.05$$ for $$X \\sim Po(4)$$. Explain how to use cumulative probability tables to find $$c$$. (3 steps)", "answer": "- Step 1: Rewrite the inequality using cumulative probability: $$P(X > c) \\leq 0.05$$ is equivalent to $$1 - P(X \\leq c) \\leq 0.05$$, which simplifies to $$P(X \\leq c) \\geq 0.95$$.\n- Step 2: Look at the cumulative Poisson table for $$\\lambda = 4$$. Find the smallest integer $$c$$ where the table value is at least 0.95.\n- Step 3: From tables, $$P(X \\leq 7) = 0.9489$$ (which is < 0.95) and $$P(X \\leq 8) = 0.9786$$ (which is > 0.95). Therefore, the smallest value of $$c$$ is 8.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Given that exactly 10 planes landed at an airport between 2 pm and 3 pm, explain why the probability that exactly 5 of them landed between 2 pm and 2:30 pm follows a Binomial distribution rather than a Poisson distribution. (3 steps)", "answer": "- Step 1: We are no longer asking about the rate of arrivals over an open interval; we have a fixed total number of \"successes\" (10 planes) that occurred in the full hour.\n- Step 2: Each of these 10 planes had a 30-minute window out of a 60-minute total window to land in the first half. Thus, the probability of any single plane landing in the first half-hour is $$p = \\frac{30}{60} = 0.5$$.\n- Step 3: Since the planes arrive independently, we are counting the number of \"successes\" (landing in the first 30 mins) out of a fixed number of trials (10 planes) with a constant probability of success (0.5). This perfectly matches the conditions for a Binomial distribution, $$X \\sim B(10, 0.5)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "When approximating a Binomial distribution $$B(n, p)$$ with a Poisson distribution, what conditions must $$n$$ and $$p$$ satisfy, and what is the parameter $$\\lambda$$ for the approximating Poisson distribution? (2 steps)", "answer": "- Step 1: The Binomial distribution can be approximated by Poisson when the number of trials $$n$$ is large (typically $$n > 50$$) and the probability of success $$p$$ is small (typically $$p < 0.1$$).\n- Step 2: The parameter $$\\lambda$$ for the approximating Poisson distribution is set equal to the mean of the Binomial distribution, so $$\\lambda = np$$.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}], "count": 21}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "The Poisson probability mass function is $$\\mathrm{P}(X=x) = \\frac{e^{-\\lambda}\\lambda^{x}}{x!}$$ for $$x = 0, 1, 2, \\ldots$$. Explain the role of each component ($$e^{-\\lambda}$$, $$\\lambda^x$$, and $$x!$$) in shaping the distribution. Why does the formula need all three? (3 steps)", "answer": "- Step 1: The factor $$e^{-\\lambda}$$ is a normalising constant. Since the probabilities must sum to 1 over all non-negative integers, and the series $$\\sum_{x=0}^{\\infty} \\frac{\\lambda^x}{x!} = e^{\\lambda}$$, multiplying by $$e^{-\\lambda}$$ ensures the total probability equals 1. Without it, the sum would be $$e^{\\lambda}$$, not 1.\n- Step 2: The factor $$\\lambda^x$$ captures how probability grows with the count $$x$$. A larger $$\\lambda$$ shifts the distribution rightward — higher counts become more likely. For a given $$\\lambda$$, as $$x$$ increases, $$\\lambda^x$$ grows, tending to push probability toward larger values.\n- Step 3: The factor $$\\frac{1}{x!}$$ is the \"discount\" that prevents probabilities from growing without bound. As $$x$$ increases, $$x!$$ grows faster than $$\\lambda^x$$ (for any fixed $$\\lambda$$), so the ratio $$\\frac{\\lambda^x}{x!}$$ eventually decreases. This is what gives the Poisson its characteristic shape: probability rises, peaks near $$\\lambda$$, then tails off toward zero.\n\nThe three factors work together: $$e^{-\\lambda}$$ normalises, $$\\lambda^x$$ scales with count, and $$x!$$ ensures the distribution eventually decays.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "How do we know that the Poisson PMF defines a valid probability distribution, i.e., that $$\\sum_{x=0}^{\\infty} \\mathrm{P}(X=x) = 1$$? Walk through the key algebraic step. (3 steps)", "answer": "- Step 1: Write out the sum explicitly: $$\\sum_{x=0}^{\\infty} \\mathrm{P}(X=x) = e^{-\\lambda} + e^{-\\lambda}\\lambda + \\frac{e^{-\\lambda}\\lambda^2}{2!} + \\frac{e^{-\\lambda}\\lambda^3}{3!} + \\cdots$$\n- Step 2: Factor out the common term $$e^{-\\lambda}$$: $$\\sum_{x=0}^{\\infty} \\mathrm{P}(X=x) = e^{-\\lambda}\\left(1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\cdots\\right)$$. The expression in brackets is exactly the Maclaurin series expansion of $$e^{\\lambda}$$.\n- Step 3: Therefore $$\\sum_{x=0}^{\\infty} \\mathrm{P}(X=x) = e^{-\\lambda} \\cdot e^{\\lambda} = 1$$. This is the fundamental reason the Poisson PMF is a valid probability distribution — the exponential series provides the perfect cancellation.\n\nThis connection between the Poisson distribution and the exponential function is not coincidental; it reflects the deep link between Poisson processes and exponential waiting times.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "The Poisson random variable $$X$$ can take values $$x = 0, 1, 2, 3, \\ldots$$ with no upper bound. In practice, for $$X \\sim \\mathrm{Po}(\\lambda)$$, why do we not worry about extremely large values of $$x$$ even though they are theoretically possible? (2 steps)", "answer": "- Step 1: The factor $$\\frac{1}{x!}$$ in the PMF causes the probability to decay extremely rapidly for large $$x$$. The factorial grows super-exponentially (faster than any exponential $$\\lambda^x$$), so $$\\frac{\\lambda^x}{x!} \\to 0$$ very quickly as $$x$$ increases beyond $$\\lambda$$.\n+ For example, if $$\\lambda = 3$$, then $$\\mathrm{P}(X = 10) \\approx 0.0008$$ and $$\\mathrm{P}(X = 15) \\approx 0.0000017$$ — probabilities become negligible.\n- Step 2: In real-world data (like the phone call example in the chapter), counts far above the mean are virtually never observed. The theoretical possibility of infinite counts is a mathematical formality; the distribution is effectively concentrated in a range around $$\\lambda$$. This is why, despite no fixed upper limit, the Poisson is still practical for modelling.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "The Poisson distribution has only one parameter, $$\\lambda$$, unlike the binomial which has two ($$n$$ and $$p$$). What property of the Poisson distribution makes a second parameter unnecessary, and why? (2 steps)", "answer": "- Step 1: For the Poisson distribution, the mean equals the variance: $$\\mathrm{E}(X) = \\lambda$$ and $$\\mathrm{Var}(X) = \\lambda$$. In the binomial, the mean $$np$$ and variance $$np(1-p)$$ can vary independently (by changing $$n$$ and $$p$$), so two parameters are needed. In the Poisson, once you specify the mean, the variance is automatically determined — it must equal the mean.\n- Step 2: This equality of mean and variance is a defining structural constraint. It means the \"shape\" of the distribution is fully pinned down by a single number. If you tried to introduce a second parameter, you would either break the mean-variance equality (making it no longer Poisson) or introduce redundancy. The single parameter $$\\lambda$$ simultaneously controls both the centre and the spread.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "For $$X \\sim \\mathrm{Po}(\\lambda)$$, what is $$\\mathrm{P}(X = 0)$$? Give both the formula and an intuitive interpretation of what this probability represents in a real-world context. (2 steps)", "answer": "- Step 1: Substituting $$x = 0$$ into the PMF: $$\\mathrm{P}(X = 0) = \\frac{e^{-\\lambda}\\lambda^0}{0!} = e^{-\\lambda}$$. This is a pure exponential decay in $$\\lambda$$ — as the rate increases, the chance of zero events drops exponentially.\n- Step 2: Intuitively, $$\\mathrm{P}(X = 0)$$ is the probability that no events occur in the interval. If $$\\lambda$$ is small (events are rare), then $$e^{-\\lambda} \\approx 1$$ and it's very likely nothing happens. If $$\\lambda$$ is large, $$e^{-\\lambda}$$ is tiny — with a high rate, it's almost certain that at least one event occurs.\n+ For $$\\lambda = 1$$: $$\\mathrm{P}(X=0) = e^{-1} \\approx 0.368$$ — about a one-third chance of no events.\n+ For $$\\lambda = 5$$: $$\\mathrm{P}(X=0) = e^{-5} \\approx 0.0067$$ — extremely unlikely to see no events.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "A student needs to find $$\\mathrm{P}(X \\geq 1)$$ for $$X \\sim \\mathrm{Po}(\\lambda)$$. They start writing out $$\\mathrm{P}(X=1) + \\mathrm{P}(X=2) + \\mathrm{P}(X=3) + \\cdots$$. What is the much simpler approach, and why does it work? (2 steps)", "answer": "- Step 1: Recognise that $$\\mathrm{P}(X \\geq 1)$$ is the complement of $$\\mathrm{P}(X = 0)$$. Since the total probability is 1: $$\\mathrm{P}(X \\geq 1) = 1 - \\mathrm{P}(X = 0) = 1 - e^{-\\lambda}$$.\n- Step 2: This works because the Poisson is a discrete distribution on $$\\{0, 1, 2, \\ldots\\}$$, and the events $$\\{X = 0\\}$$ and $$\\{X \\geq 1\\}$$ partition the entire sample space. The complement approach avoids summing an infinite series — a single evaluation of $$e^{-\\lambda}$$ gives the answer.\n+ Misconception: Some students try $$\\mathrm{P}(X \\geq 1) = 1 - \\mathrm{P}(X \\leq 1)$$. This is wrong because $$\\mathrm{P}(X \\leq 1)$$ includes both $$\\mathrm{P}(X=0)$$ and $$\\mathrm{P}(X=1)$$, so the complement would give $$\\mathrm{P}(X \\geq 2)$$, not $$\\mathrm{P}(X \\geq 1)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "For a Poisson random variable, what is the difference between $$\\mathrm{P}(X < 3)$$, $$\\mathrm{P}(X \\leq 3)$$, and $$\\mathrm{P}(1 < X \\leq 4)$$? Express each in terms of cumulative probabilities or sums of individual probabilities. (3 steps)", "answer": "- Step 1: $$\\mathrm{P}(X < 3)$$ means $$X$$ is strictly less than 3. Since $$X$$ takes integer values, this is $$\\mathrm{P}(X = 0) + \\mathrm{P}(X = 1) + \\mathrm{P}(X = 2) = \\mathrm{P}(X \\leq 2)$$. The key insight: for a discrete integer-valued variable, $$\\mathrm{P}(X < k) = \\mathrm{P}(X \\leq k-1)$$.\n- Step 2: $$\\mathrm{P}(X \\leq 3)$$ means $$X = 0, 1, 2,$$ or $$3$$. This is directly available from cumulative tables: $$\\mathrm{P}(X \\leq 3)$$.\n- Step 3: $$\\mathrm{P}(1 < X \\leq 4)$$ means $$X$$ is greater than 1 but at most 4, so $$X = 2, 3,$$ or $$4$$. This equals $$\\mathrm{P}(X \\leq 4) - \\mathrm{P}(X \\leq 1)$$. The general pattern: $$\\mathrm{P}(a < X \\leq b) = \\mathrm{P}(X \\leq b) - \\mathrm{P}(X \\leq a)$$.\n+ Watch out: $$\\mathrm{P}(1 < X \\leq 4)$$ does NOT equal $$\\mathrm{P}(X \\leq 4) - \\mathrm{P}(X < 1)$$ if you're not careful about whether the boundary is included. Always convert to the form $$\\mathrm{P}(X \\leq \\cdot)$$ first.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "Poisson cumulative distribution tables give you $$\\mathrm{P}(X \\leq x)$$ for selected values of $$\\lambda$$. A student wants to find $$\\mathrm{P}(X \\geq 5)$$ for $$X \\sim \\mathrm{Po}(7)$$. How should they use the table, and what is a common mistake? (2 steps)", "answer": "- Step 1: Convert to a cumulative form the table provides. Since $$\\mathrm{P}(X \\geq 5) = 1 - \\mathrm{P}(X \\leq 4)$$, look up $$\\mathrm{P}(X \\leq 4)$$ in the table for $$\\lambda = 7$$, then subtract from 1.\n- Step 2: The common mistake is to write $$\\mathrm{P}(X \\geq 5) = 1 - \\mathrm{P}(X \\leq 5)$$. This would actually give $$\\mathrm{P}(X \\geq 6)$$, because $$\\mathrm{P}(X \\leq 5)$$ includes $$\\mathrm{P}(X = 5)$$. The correct boundary is: for $$\\mathrm{P}(X \\geq k)$$, use $$1 - \\mathrm{P}(X \\leq k-1)$$.\n+ Quick check: $$\\mathrm{P}(X \\geq 5) = \\mathrm{P}(X=5) + \\mathrm{P}(X=6) + \\cdots$$, and the complement is $$\\mathrm{P}(X=0) + \\mathrm{P}(X=1) + \\cdots + \\mathrm{P}(X=4) = \\mathrm{P}(X \\leq 4)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "For $$X \\sim \\mathrm{Po}(7.5)$$, you are told that $$\\mathrm{P}(X \\leq a) = 0.2414$$. How do you find the value of $$a$$, and what type of values can $$a$$ take? (2 steps)", "answer": "- Step 1: Look up the cumulative probabilities in the table for $$\\lambda = 7.5$$. Scan the column until you find the value $$0.2414$$. The table shows $$\\mathrm{P}(X \\leq 5) = 0.2414$$, so $$a = 5$$.\n- Step 2: Since $$X$$ is a discrete integer-valued random variable, $$a$$ must be a non-negative integer. You cannot have $$a = 5.3$$, for instance, because $$X$$ only takes integer values. If the given probability doesn't appear exactly in the table, you would find the integer $$a$$ for which $$\\mathrm{P}(X \\leq a)$$ is closest to or satisfies the stated condition.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "For $$X \\sim \\mathrm{Po}(7.5)$$, if $$\\mathrm{P}(X < b) = 0.5246$$, what is $$b$$? Carefully explain the difference between strict and non-strict inequalities for discrete variables. (2 steps)", "answer": "- Step 1: Convert the strict inequality: $$\\mathrm{P}(X < b) = \\mathrm{P}(X \\leq b - 1)$$ for integer-valued $$X$$. So we need $$\\mathrm{P}(X \\leq b-1) = 0.5246$$. Looking up in the table for $$\\lambda = 7.5$$, we find $$\\mathrm{P}(X \\leq 7) = 0.5246$$, so $$b - 1 = 7$$, giving $$b = 8$$.\n- Step 2: The crucial point is that for a discrete variable, $$\\mathrm{P}(X < b) \\neq \\mathrm{P}(X \\leq b)$$. There is a \"jump\" at each integer value equal to $$\\mathrm{P}(X = b)$$. So $$\\mathrm{P}(X < 8) = \\mathrm{P}(X \\leq 7)$$, which excludes the probability mass at 8 itself. Always convert strict inequalities by subtracting 1 before using cumulative tables.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "For $$X \\sim \\mathrm{Po}(7.5)$$, if $$\\mathrm{P}(X \\geq c) = 0.3380$$, find $$c$$. Walk through the conversion from a \"greater than or equal\" condition to a cumulative table lookup. (3 steps)", "answer": "- Step 1: Rewrite using complement: $$\\mathrm{P}(X \\geq c) = 1 - \\mathrm{P}(X \\leq c - 1)$$. So $$1 - \\mathrm{P}(X \\leq c-1) = 0.3380$$, which gives $$\\mathrm{P}(X \\leq c-1) = 1 - 0.3380 = 0.6620$$.\n- Step 2: Look up $$0.6620$$ in the cumulative table for $$\\lambda = 7.5$$. The table shows $$\\mathrm{P}(X \\leq 8) = 0.6620$$, so $$c - 1 = 8$$.\n- Step 3: Therefore $$c = 9$$. Verification: $$\\mathrm{P}(X \\geq 9) = 1 - \\mathrm{P}(X \\leq 8) = 1 - 0.6620 = 0.3380$$. ✓\n\nThe pattern: for $$\\mathrm{P}(X \\geq c)$$, always convert to $$1 - \\mathrm{P}(X \\leq c-1)$$ before using tables.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "List the three conditions that must hold for a Poisson distribution to be a suitable model for counting events in an interval. For each condition, give a brief intuitive explanation of what it means. (3 steps)", "answer": "- Step 1: **Independence** — the occurrence of one event does not affect the probability of another event occurring. If events influence each other (e.g., one phone call triggers another), the Poisson model breaks down because the rate is no longer stable.\n- Step 2: **Singly, in space or time** — events occur one at a time; two events cannot happen at exactly the same instant or location. If events can cluster or occur simultaneously (e.g., cars arriving in convoys), the Poisson is inappropriate.\n- Step 3: **Constant average rate** — the mean number of events in any interval is proportional to the length of that interval. If the rate varies (e.g., more phone calls during business hours than at night), then a single Poisson with fixed $$\\lambda$$ doesn't model the full timeframe correctly.\n\nAll three conditions must hold simultaneously. Violating any one means the Poisson is not a valid model for that situation.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A student claims that \"independence\" in the Poisson model means that the events are equally likely to occur at any moment. Is this correct? If not, what does independence actually mean, and what condition does \"equally likely at any moment\" relate to? (2 steps)", "answer": "- Step 1: No, this is a misconception. Independence means that the occurrence of one event does not change the probability of another event occurring. It is about the relationship *between* events, not about uniformity over time. For example, if a burst pipe causes multiple phone calls to a plumber, those calls are not independent — one event (the pipe bursting) triggered the others.\n- Step 2: The idea that events are \"equally likely at any moment\" relates to the **constant average rate** condition. This means the rate $$\\lambda$$ per unit time is the same throughout the interval — there's no time-dependent variation in intensity. Independence and constant rate are separate conditions: independence is about events not influencing each other; constant rate is about the temporal uniformity of the average frequency.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "Why is the \"singly\" condition important for the Poisson model? Give an example where this condition is violated, and explain the consequence. (2 steps)", "answer": "- Step 1: The \"singly\" condition requires that events occur one at a time — you cannot have two or more events happening at the same instant. This is what allows the Poisson process to be built from the limit of many small intervals, each with at most one event. Mathematically, in an infinitesimally small interval, the probability of two or more events is negligibly small compared to the probability of exactly one.\n- Step 2: Violation example: Cars passing a checkpoint might arrive in convoys (groups of 3-4 cars travelling together). In a tiny time window, you'd get multiple cars simultaneously, violating the \"singly\" condition. The consequence is that the variance would be larger than the mean (a phenomenon called **overdispersion**), and the Poisson model would underestimate the probability of both very low and very high counts.\n+ Conversely, if events are \"repelled\" (one event makes the next less likely in a short window), the variance would be less than the mean (**underdispersion**), also violating the Poisson assumption.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "The Poisson condition states events occur \"at a constant average rate so that the mean number in an interval is proportional to the length of the interval.\" If emails arrive at an average rate of 6 per hour, what is the mean number of emails in a 25-minute period, and why does this proportionality hold? (2 steps)", "answer": "- Step 1: The rate is 6 per hour. For a 25-minute period, which is $$\\frac{25}{60} = \\frac{5}{12}$$ of an hour, the mean is $$6 \\times \\frac{5}{12} = 2.5$$. The parameter scales linearly: $$\\lambda_{\\text{new}} = \\lambda_{\\text{original}} \\times \\frac{\\text{new interval}}{\\text{original interval}}$$.\n- Step 2: This proportionality holds precisely because of the constant average rate assumption. If the rate is truly constant (say $$r$$ events per unit time), then in $$t$$ units of time, the expected count is $$rt$$. This is why we can freely rescale: the Poisson parameter for any interval is just the rate multiplied by the interval length. Without the constant rate assumption, this simple scaling would not be valid.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "A website receives visits at a rate of 240 per hour. A student sets up $$X \\sim \\mathrm{Po}(240)$$ for the number of visits in a one-minute interval. Explain what is wrong and how to correct it. (2 steps)", "answer": "- Step 1: The rate is 240 per hour, but the interval is one minute. The student has used the hourly rate for a per-minute model. The correct rate per minute is $$\\frac{240}{60} = 4$$ visits per minute.\n- Step 2: The correct model is $$X \\sim \\mathrm{Po}(4)$$ for a one-minute interval. The parameter $$\\lambda$$ must always match the interval you are modelling: $$\\lambda = \\text{rate} \\times \\text{interval length}$$. Using $$\\lambda = 240$$ for a one-minute interval would imply an absurdly high rate of 14,400 per hour.\n+ General rule: Always check that the units of $$\\lambda$$ match the units of the interval. \"Rate per hour\" needs to be converted to \"rate per minute\" (or whatever interval you're working with) before using it as $$\\lambda$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "A clinic treats insect bites at a rate of 3 patients per day (modelled as Poisson). The probability of more than 4 patients on a given day is 0.1847. To find the probability that at least 4 out of 5 days have more than 4 patients, you need a second distribution. What is it and why? (3 steps)", "answer": "- Step 1: The question shifts from \"how many patients in a day?\" to \"how many days (out of 5) have a certain property?\" Each day is a trial with two outcomes: \"more than 4 patients\" (success, probability $$p = 0.1847$$) or \"4 or fewer patients\" (failure, probability $$1 - 0.1847$$). This is a binomial setup.\n- Step 2: Let $$Y$$ = number of days (out of 5) with more than 4 patients. Then $$Y \\sim \\mathrm{B}(5, 0.1847)$$. We need $$\\mathrm{P}(Y \\geq 4) = \\mathrm{P}(Y=4) + \\mathrm{P}(Y=5)$$.\n- Step 3: This is a two-stage model: the Poisson gives the per-day probability, which then feeds into the binomial as the success probability. The key insight is recognising when the question has shifted from counting events in an interval (Poisson) to counting how many intervals satisfy a condition (binomial).", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "A student reasons: \"Since the Poisson has no upper limit, it can model any counting situation.\" Give two scenarios where the Poisson is clearly inappropriate, each violating a different condition. (2 steps)", "answer": "- Step 1: **Violating independence**: Modelling the number of people catching a contagious disease in a town. Once one person is infected, they increase the probability of others being infected. The events are not independent — one event directly influences the probability of subsequent events. An appropriate model might be something with variance greater than the mean.\n- Step 2: **Violating constant rate**: Modelling the number of customers entering a shop over a full 24-hour period. The rate is much higher during the day than at 3 AM. Since the average rate is not constant across the interval, a single Poisson with fixed $$\\lambda$$ is inappropriate. You would need to split the day into periods with roughly constant rates, or use a non-homogeneous Poisson process.\n+ **Violating singly**: Modelling the number of people arriving at a cinema when groups of friends arrive together. Multiple people arrive at the same instant, violating the \"one at a time\" requirement.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "If $$X \\sim \\mathrm{Po}(\\lambda)$$ and $$Y \\sim \\mathrm{Po}(\\mu)$$ are independent, what is the distribution of $$X + Y$$? State the result and give an intuitive explanation for why the parameters add. (2 steps)", "answer": "- Step 1: The result is $$X + Y \\sim \\mathrm{Po}(\\lambda + \\mu)$$. The sum of two independent Poisson random variables is also Poisson, with parameter equal to the sum of the individual parameters.\n- Step 2: Intuitive explanation: If events of type A occur at average rate $$\\lambda$$ per interval and events of type B occur at average rate $$\\mu$$ per interval (independently), then the total events (A or B) occur at average rate $$\\lambda + \\mu$$. This is just the addition of rates — the expected total count is the sum of the expected individual counts. Since the combined process still satisfies all three Poisson conditions (independence, singly, constant rate), the result is Poisson with the combined rate.\n+ Think of it like traffic on a road: if cars arrive from the north at rate 3/minute and from the south at rate 2/minute, independently, total arrivals are at rate 5/minute.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Why is the independence requirement essential for the additive property $$X + Y \\sim \\mathrm{Po}(\\lambda + \\mu)$$? What could go wrong if $$X$$ and $$Y$$ were dependent? (2 steps)", "answer":
