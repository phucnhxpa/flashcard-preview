values $$0, 1, 2, \\ldots$$, with no fixed upper bound (or one much larger than typical values).\n- Step 2: **Do events occur singly?** Two events cannot happen at exactly the same instant.\n- Step 3: **Are events independent?** One's occurrence doesn't change another's probability.\n- Step 4: **Is the rate constant?** The rate shouldn't vary systematically over the analysed interval.\n- Step 5: **Does mean ≈ variance in the data?** If you have data, this is the empirical diagnostic.\n\nIf all five pass, Poisson is your friend. If any fail, use a generalisation (negative binomial, non-homogeneous Poisson, etc.).", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": false}, {"question": "Using the ratio $$P(X = k+1)/P(X = k) = \\lambda/(k+1)$$, explain how Poisson probabilities rise then fall around $$\\lambda$$. (3 steps)", "answer": "- Step 1: The ratio of consecutive probabilities is $$\\dfrac{\\lambda}{k+1}$$. When $$k + 1 < \\lambda$$, this ratio exceeds 1, so probabilities are *increasing* as $$k$$ grows.\n- Step 2: When $$k + 1 > \\lambda$$, the ratio is less than 1, so probabilities *decrease*.\n- Step 3: The turning point is around $$k \\approx \\lambda - 1$$, which gives the mode. This matches the rule \"mode ≈ $$\\lfloor \\lambda \\rfloor$$\" — probabilities peak there and fall off on either side.\n\nElegant consequence: the whole shape of the Poisson is determined by one simple ratio relation.", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": true}, {"question": "How is the Poisson distribution related to the underlying \"Poisson process,\" and why does that perspective unify the additive property, thinning, and conditioning? (3 steps)", "answer": "- Step 1: A **Poisson process** is a random model for events happening along a continuous axis (time or space), with independent increments and constant rate $$\\lambda$$. The *count* over any interval then follows a Poisson distribution.\n- Step 2: The process viewpoint makes key properties obvious: merging two processes gives a process with summed rates (additive property); tagging each event independently with probability $$p$$ gives a subprocess of rate $$p\\lambda$$ (thinning); given a fixed total count in an interval, event positions are uniformly distributed (conditioning → binomial).\n- Step 3: So all three \"tricks\" are facets of the same underlying structure — the Poisson distribution is the window through which we see a deeper random process.\n\nSeeing the process unifies the rules: each property is a natural consequence of independent increments and constant rate.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": true}, {"question": "A company receives 6 cars booked per week from Company A and 4 from Company B independently (Poisson). Describe conceptually how to compute the probability that total bookings over a 5-day week exceed 10. (3 steps)", "answer": "- Step 1: Combine the two rates: total bookings per week ~ $$\\operatorname{Po}(6 + 4) = \\operatorname{Po}(10)$$. (Since both are weekly counts, you can add directly.)\n- Step 2: The required probability is $$P(X > 10) = 1 - P(X \\le 10)$$, where $$X \\sim \\operatorname{Po}(10)$$.\n- Step 3: Read $$P(X \\le 10)$$ from cumulative tables for $$\\lambda = 10$$ and subtract from 1. No rescaling is needed because both rates were already weekly.\n\nStructural lesson: identify the interval, scale rates if needed, sum parameters for independent streams, then do inequality translation.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": false}, {"question": "Why is it meaningful to report that Poisson's mode (most likely outcome) is near the mean, whereas this is also true for the normal distribution? Why highlight it for Poisson? (3 steps)", "answer": "- Step 1: For the normal distribution, the peak is exactly at the mean by symmetry, so saying \"mode ≈ mean\" is trivial.\n- Step 2: For Poisson, the distribution is right-skewed, so the mode could in principle be far from the mean. That it lies at $$\\lfloor \\lambda \\rfloor$$ — the integer just below $$\\lambda$$ — is a nontrivial and useful fact.\n- Step 3: It also tells us the Poisson is tightly organised around its mean despite the skew. The asymmetry matters mainly in the tails, not the centre.\n\nSo the mode ≈ mean fact is more informative for Poisson because of the skew, not despite it.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": true}, {"question": "A company wants at least 99% certainty of fulfilling all requests on a Sunday when requests are $$\\operatorname{Po}(5)$$. Conceptually, how do you find the number of buses required? (3 steps)", "answer": "- Step 1: Let $$X$$ be the number of requests, $$X \\sim \\operatorname{Po}(5)$$. The company needs enough buses $$n$$ so that $$P(X \\le n) \\ge 0.99$$.\n- Step 2: Read the cumulative Poisson table for $$\\lambda = 5$$ and find the smallest $$n$$ where $$P(X \\le n) \\ge 0.99$$.\n- Step 3: That $$n$$ is the minimum fleet size. Conceptually, this is an inverse-probability problem — we're finding the 99th percentile of a Poisson distribution.\n\nThe idea: use cumulative probabilities to set a capacity that exceeds random demand with a prescribed confidence level.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": false}], "count": 75}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "State the probability mass function (PMF) of a Poisson distribution $$X \\sim \\mathrm{Po}(\\lambda)$$, identifying the support of $$X$$ and the meaning of the parameter $$\\lambda$$. (3 steps)", "answer": "- Step 1: The PMF is $$P(X=x) = \\frac{e^{-\\lambda}\\lambda^x}{x!}$$ for $$x = 0, 1, 2, 3, \\ldots$$ — so $$X$$ is a discrete random variable taking non-negative integer values with no upper bound.\n- Step 2: The parameter $$\\lambda$$ is the average (mean) number of events occurring per unit interval of time or space. It is strictly positive.\n- Step 3: Three important features of this PMF:\n+ The factor $$\\lambda^x$$ controls how quickly the probability grows as we increase $$x$$ from 0\n+ The factor $$x!$$ in the denominator makes the probability drop off rapidly for large $$x$$\n+ The factor $$e^{-\\lambda}$$ is the normalising constant that ensures all probabilities sum to 1\n\nTakeaway: A Poisson random variable counts events in a fixed interval; it has only one parameter $$\\lambda$$ which is simultaneously the mean, the variance, and the rate.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why must the Poisson PMF include the factor $$e^{-\\lambda}$$? Derive why this makes the probabilities sum to 1. (4 steps)", "answer": "- Step 1: For any probability distribution, $$\\sum_x P(X=x) = 1$$. So we need $$\\sum_{x=0}^{\\infty} \\frac{e^{-\\lambda}\\lambda^x}{x!} = 1$$.\n- Step 2: Factor out $$e^{-\\lambda}$$ (it doesn't depend on $$x$$): $$e^{-\\lambda}\\left(1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\cdots\\right)$$.\n- Step 3: Recognise the bracketed series as the Maclaurin expansion of $$e^{\\lambda}$$, namely $$e^{\\lambda} = \\sum_{k=0}^{\\infty}\\frac{\\lambda^k}{k!}$$.\n- Step 4: So the total is $$e^{-\\lambda} \\cdot e^{\\lambda} = e^{0} = 1$$, confirming the PMF is a valid probability distribution.\n\nTakeaway: The $$e^{-\\lambda}$$ factor exists precisely so the Taylor series of $$e^{\\lambda}$$ gets cancelled out, making the distribution legitimate.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Three conditions must hold for a Poisson distribution to be a good model. State them and explain why each one matters conceptually. (3 steps)", "answer": "- Step 1: **Independence** — events must occur independently of one another. Conceptually: one event occurring should not change the probability of another. Example failure: if one phone call causes a queue of follow-up calls, independence is violated.\n- Step 2: **Singly in space/time** — only one event can occur at a time (or location); events don't come in pairs, bursts, or clusters. Example failure: radioactive particles emitted in pairs would not satisfy this.\n- Step 3: **Constant average rate** — the rate $$\\lambda$$ must not vary over the interval being modelled, and the mean in any sub-interval must be proportional to the sub-interval's length. Example failure: phone calls to a business concentrated during business hours wouldn't fit over a 24-hour interval.\n\nTakeaway: Independence, singleness, and uniformity of rate are the pillars of the Poisson model; violating any of them makes the distribution unsuitable.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "A Poisson model is fitted to events with rate $$\\lambda$$ per hour. Explain how to adjust $$\\lambda$$ when modelling the same process over a 90-minute interval, and why this works. (3 steps)", "answer": "- Step 1: Since the rate is constant, the expected number of events scales linearly with the interval length. So for a 90-minute interval: $$\\lambda_{90} = \\frac{90}{60} \\times \\lambda = 1.5\\lambda$$.\n- Step 2: This works because of the \"constant average rate\" condition — the mean number in any interval is proportional to the length of the interval.\n- Step 3: More generally, if $$X$$ counts events in a unit interval with rate $$\\lambda$$, then events in an interval of length $$t$$ follow $$\\mathrm{Po}(\\lambda t)$$.\n\nTakeaway: The Poisson parameter scales linearly with interval length; this is a direct consequence of the constant-rate assumption.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Why is the Poisson distribution conceptually different from a binomial distribution, even though both count \"number of successes\"? (3 steps)", "answer": "- Step 1: **Binomial** has a fixed number of trials $$n$$, each with only two outcomes (success/failure). The count $$X$$ can therefore only range from 0 to $$n$$.\n- Step 2: **Poisson** has no fixed number of trials — it models events occurring continuously in time or space. The count $$X$$ has no theoretical upper limit (goes to infinity), though very large values are very rare.\n- Step 3: Binomial has two parameters ($$n$$ and $$p$$); Poisson has one ($$\\lambda$$). The Poisson can be thought of as a limit of Binomial when $$n \\to \\infty$$ and $$np \\to \\lambda$$ (rare events over many trials).\n\nTakeaway: Binomial counts successes among a fixed number of trials; Poisson counts events in a continuous interval with no upper bound.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "In a data set, the sample mean is close to the sample variance. Why does this strongly suggest a Poisson distribution is a suitable model? (3 steps)", "answer": "- Step 1: For a Poisson distribution $$X \\sim \\mathrm{Po}(\\lambda)$$, we have $$E(X) = \\lambda$$ AND $$\\mathrm{Var}(X) = \\lambda$$. So the mean and variance are theoretically equal.\n- Step 2: Most other distributions do not have this property. For example, for a binomial $$\\mathrm{B}(n,p)$$, $$E(X) = np$$ but $$\\mathrm{Var}(X) = np(1-p) < np$$ (variance is smaller than mean).\n- Step 3: So if sample mean $$\\bar{x}$$ and sample variance $$s^2$$ are close, this is a fingerprint consistent with Poisson. Conversely, if they differ substantially, Poisson is probably a poor fit (over-dispersion or under-dispersion).\n\nTakeaway: The mean-equals-variance property is a diagnostic test for Poisson — it's the distribution's signature.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "If $$X \\sim \\mathrm{Po}(\\lambda)$$ and we're told $$P(X=2) = P(X=3)$$, explain conceptually what value $$\\lambda$$ must take and why. (4 steps)", "answer": "- Step 1: Setting the probabilities equal: $$\\frac{e^{-\\lambda}\\lambda^2}{2!} = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$.\n- Step 2: Cancel common factors $$e^{-\\lambda}\\lambda^2$$ from both sides (valid since $$\\lambda > 0$$): $$\\frac{1}{2!} = \\frac{\\lambda}{3!}$$.\n- Step 3: Solving: $$\\lambda = \\frac{3!}{2!} = 3$$.\n- Step 4: Conceptually, the ratio $$\\frac{P(X=k+1)}{P(X=k)} = \\frac{\\lambda}{k+1}$$. So $$P(X=k+1) = P(X=k)$$ iff $$\\lambda = k+1$$. Here $$k=2$$ gives $$\\lambda = 3$$.\n\nTakeaway: Consecutive Poisson probabilities are equal exactly when $$\\lambda$$ equals the larger index — a useful insight about the distribution's shape.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Describe how successive Poisson probabilities $$P(X=k)$$ change as $$k$$ increases, for a given $$\\lambda$$. Where is the peak (mode) approximately? (3 steps)", "answer": "- Step 1: The ratio is $$\\frac{P(X=k+1)}{P(X=k)} = \\frac{e^{-\\lambda}\\lambda^{k+1}/(k+1)!}{e^{-\\lambda}\\lambda^k/k!} = \\frac{\\lambda}{k+1}$$.\n- Step 2: This ratio is:\n+ greater than 1 when $$k+1 < \\lambda$$, so probabilities are increasing\n+ less than 1 when $$k+1 > \\lambda$$, so probabilities are decreasing\n+ equal to 1 when $$k+1 = \\lambda$$, the boundary between rising and falling\n- Step 3: Therefore the mode is at $$k \\approx \\lambda - 1$$ or $$k \\approx \\lambda$$ (either $$\\lfloor\\lambda\\rfloor$$ or nearby). The distribution first rises, peaks near the mean, then falls away with a long right tail.\n\nTakeaway: Poisson has a single peak near $$\\lambda$$; as $$\\lambda$$ grows, the distribution shifts right and becomes more spread out.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "State the additive property of Poisson distributions and explain the two conditions under which it can be applied. (3 steps)", "answer": "- Step 1: If $$X \\sim \\mathrm{Po}(\\lambda)$$ and $$Y \\sim \\mathrm{Po}(\\mu)$$ are **independent**, then $$X + Y \\sim \\mathrm{Po}(\\lambda + \\mu)$$.\n- Step 2: Two essential conditions:\n+ The random variables $$X$$ and $$Y$$ must be **independent** — the count of one type of event cannot affect the count of the other.\n+ The random variables must model events over the **same interval** of time or space. You cannot add cars-per-hour with pedestrians-per-minute directly.\n- Step 3: Intuition: if events of type A arrive at rate $$\\lambda$$ and (independently) events of type B arrive at rate $$\\mu$$, then events of type A-or-B arrive at rate $$\\lambda + \\mu$$, and the combined process is itself Poisson.\n\nTakeaway: Poisson processes \"add\" — independent Poisson events pooled over the same interval give a Poisson with the summed rate.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Cars pass an observation point at Poisson rate 2 per 5-minute interval; other vehicles pass at Poisson rate 3 per 15-minute interval. To find the probability of exactly 5 vehicles (any type) in a 10-minute interval, describe how to set up the combined Poisson model. (3 steps)", "answer": "- Step 1: First scale both rates to the same 10-minute interval:\n+ Cars: $$\\frac{10}{5} \\times 2 = 4$$ per 10 minutes, so $$X_1 \\sim \\mathrm{Po}(4)$$\n+ Other vehicles: $$\\frac{10}{15} \\times 3 = 2$$ per 10 minutes, so $$Y_1 \\sim \\mathrm{Po}(2)$$\n- Step 2: Since the two processes are independent and now measured over the same 10-minute interval, we can add: $$X_1 + Y_1 \\sim \\mathrm{Po}(4 + 2) = \\mathrm{Po}(6)$$.\n- Step 3: Compute $$P(X_1 + Y_1 = 5)$$ using the Poisson PMF or tables with $$\\lambda = 6$$.\n\nTakeaway: When combining Poissons, always rescale to the same interval first, then sum parameters.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "For $$X \\sim \\mathrm{Po}(\\lambda)$$, state the mean and variance, and explain the intuitive reason for the surprising fact that they're equal. (4 steps)", "answer": "- Step 1: $$E(X) = \\lambda$$ — the single parameter $$\\lambda$$ is defined as the average rate, so of course the mean equals $$\\lambda$$.\n- Step 2: $$\\mathrm{Var}(X) = \\lambda$$ — this is the non-obvious part. The variance, which measures spread, also equals $$\\lambda$$.\n- Step 3: Intuition: a Poisson process can be viewed as a limit of many Bernoulli trials, each with a very small success probability. For $$\\mathrm{B}(n,p)$$, mean is $$np$$ and variance is $$np(1-p)$$. As $$p \\to 0$$ (rare events), $$1-p \\to 1$$, so variance $$\\to np \\to \\lambda$$. Mean and variance become equal in this limit.\n- Step 4: Practical implication: the standard deviation is $$\\sqrt{\\lambda}$$, so as $$\\lambda$$ grows, the distribution spreads out but relative spread ($$\\sqrt{\\lambda}/\\lambda = 1/\\sqrt{\\lambda}$$) shrinks.\n\nTakeaway: Poisson has mean = variance = $$\\lambda$$; this reflects its origin as a limit of rare-event binomials.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "When using Poisson cumulative distribution tables, how do you compute $$P(X \\geq k)$$, $$P(X < k)$$, and $$P(a \\leq X \\leq b)$$? (4 steps)", "answer": "- Step 1: Tables give $$P(X \\leq k)$$ directly for specified values of $$\\lambda$$ and $$k$$. Everything else is translated to this form.\n- Step 2: For $$P(X \\geq k)$$: use the complement — $$P(X \\geq k) = 1 - P(X \\leq k-1)$$. The trap is writing $$1 - P(X \\leq k)$$, which would wrongly exclude $$X = k$$.\n- Step 3: For $$P(X < k)$$: this is $$P(X \\leq k-1)$$ since $$X$$ is integer-valued.\n- Step 4: For $$P(a \\leq X \\leq b)$$: $$P(X \\leq b) - P(X \\leq a-1)$$. Again carefully include/exclude endpoints based on the inequality.\n\nTakeaway: Always convert to $$P(X \\leq \\text{integer})$$ form, and carefully handle integer boundary values for strict vs non-strict inequalities.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "Give five real-world situations that are typically modelled by a Poisson distribution, and for each briefly justify why the three Poisson conditions seem plausible. (5 steps)", "answer": "- Step 1: **Radioactive emissions in a fixed time period** — atoms decay independently, emissions happen one at a time, rate is essentially constant over short timescales.\n- Step 2: **Phone calls to a switchboard** — callers act independently, calls arrive singly, rate is roughly constant within a chosen interval (e.g., busy period).\n- Step 3: **Spelling mistakes per page** — each mistake is independent of others, one mistake at a time, errors occur at a roughly constant rate per page of writing.\n- Step 4: **Cars passing a point in a short interval** — each driver acts independently, cars pass one at a time (on a single lane), rate roughly constant off-peak.\n- Step 5: **Raisins in a fruitcake** — raisins independently distributed in the mix, each raisin is a distinct point, constant density throughout the cake.\n\nTakeaway: Poisson describes sparse, random, independent events; ask \"are they independent, individual, and uniformly rated?\" for any candidate application.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Explain why a Poisson distribution would be a poor model for the number of goals scored in 15-minute intervals during a football match. Which condition(s) fail? (4 steps)", "answer": "- Step 1: **Constant rate fails**: goals are more likely to be scored late in the game when teams are fatigued/attacking desperately. The rate varies across the match.\n- Step 2: **Independence potentially fails**: after a goal, the losing team changes strategy (more attacking), making another goal more likely; or the leading team defends, making further goals less likely.\n- Step 3: **Singly**: this condition generally holds — goals occur at distinct moments.\n- Step 4: So Poisson's main weaknesses here are in modelling time-dependent scoring rates and goal-clustering effects.\n\nTakeaway: When rates fluctuate over time or events trigger further events, Poisson is a poor fit.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "A fruitcake manufacturer puts on average 2.5 cherries per cake. What does this imply about the probability of a cake with 0 cherries? Without computing exactly, describe the order of magnitude and why. (4 steps)", "answer": "- Step 1: $$P(X=0) = e^{-\\lambda} = e^{-2.5}$$.\n- Step 2: Since $$e^{-1} \\approx 0.37$$ and $$e^{-2} \\approx 0.14$$, $$e^{-2.5}$$ is somewhere around $$0.08$$ — about 8%.\n- Step 3: Conceptually: even though the average is 2.5, there's still a non-trivial chance (roughly 1 in 12 cakes) of getting zero cherries. This is because Poisson has a longer tail and considerable variance.\n- Step 4: In general, $$P(X=0) = e^{-\\lambda}$$, which falls exponentially with $$\\lambda$$. So doubling the mean from 2.5 to 5 drops $$P(X=0)$$ from ~8% to ~0.7%.\n\nTakeaway: $$e^{-\\lambda}$$ is the probability of the \"empty outcome\" and can be substantial even when the mean is moderate.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "A quality control example combines Poisson with binomial: faulty parts occur at rate 2.5 per hour. Describe how to find the probability that at least 4 out of 5 randomly chosen hours have \"more than 4 faulty parts\". (4 steps)", "answer": "- Step 1: First use Poisson to find $$p = P(X > 4)$$ where $$X \\sim \\mathrm{Po}(2.5)$$ is faults in one hour. This $$p$$ is the \"success probability\" of a single hour being \"bad\".\n- Step 2: Now let $$Y$$ = number of \"bad\" hours out of 5. Since hours are independent, $$Y \\sim \\mathrm{B}(5, p)$$.\n- Step 3: Compute $$P(Y \\geq 4) = P(Y=4) + P(Y=5)$$ using the binomial PMF.\n- Step 4: This two-layered approach is key: Poisson handles \"events in an interval\", binomial handles \"how many intervals satisfy a condition\".\n\nTakeaway: Many Poisson problems have a hidden binomial layer on top; recognise when to switch models.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "The relationship between $$P(Y>b)$$, $$P(Y \\geq b)$$, $$P(Y<b)$$, and $$P(Y \\leq b)$$ for a Poisson $$Y$$ — why does it matter so much which inequality is used? (3 steps)", "answer": "- Step 1: Poisson $$Y$$ is discrete, so the individual probabilities $$P(Y=b)$$ are non-zero. This means $$P(Y < b) \\neq P(Y \\leq b)$$ and $$P(Y > b) \\neq P(Y \\geq b)$$.\n- Step 2: Specifically:\n+ $$P(Y > b) = 1 - P(Y \\leq b)$$ (both exclude $$Y=b$$)\n+ $$P(Y \\geq b) = 1 - P(Y \\leq b-1)$$ (both include $$Y=b$$)\n+ $$P(Y < b) = P(Y \\leq b-1)$$\n- Step 3: Tables give $$P(Y \\leq k)$$ for integer $$k$$. An off-by-one error in handling strict/non-strict inequalities is a common mistake.\n\nTakeaway: For discrete distributions, always check whether endpoint integers are included before translating to table lookups.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Given $$X \\sim \\mathrm{Po}(7.5)$$ and $$P(X \\geq c) = 0.3380$$, describe the strategy to find $$c$$ using cumulative tables. (4 steps)", "answer": "- Step 1: Convert to the standard form found in tables: $$P(X \\geq c) = 1 - P(X \\leq c-1)$$, so $$P(X \\leq c-1) = 1 - 0.3380 = 0.6620$$.\n- Step 2: Look up $$\\lambda = 7.5$$ in tables and find which value of $$k$$ gives $$P(X \\leq k) = 0.6620$$. Suppose this is at $$k=8$$.\n- Step 3: Then $$c - 1 = 8$$, giving $$c = 9$$.\n- Step 4: Check: $$P(X \\geq 9) = 1 - P(X \\leq 8) = 1 - 0.6620 = 0.3380$$. ✓\n\nTakeaway: For \"find $$c$$\" problems, algebraically rearrange into the $$P(X \\leq k)$$ form, then reverse-lookup.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "An estate agent sells houses at rate 1.8 per week. In a 4-week period, what's the general approach to find the probability she meets her weekly target (sells $$\\geq 3$$ houses) in exactly one week? (4 steps)", "answer": "- Step 1: First compute the single-week probability of meeting target using Poisson: $$p = P(X \\geq 3)$$ where $$X \\sim \\mathrm{Po}(1.8)$$.\n- Step 2: Treat each of the 4 weeks as an independent Bernoulli trial with success probability $$p$$. So total number of successful weeks $$Y \\sim \\mathrm{B}(4, p)$$.\n- Step 3: The answer is $$P(Y=1) = \\binom{4}{1} p^1 (1-p)^3 = 4p(1-p)^3$$.\n- Step 4: Key insight — weeks don't \"add\" via Poisson here because we care about pattern of weeks (exactly one success), not total count across weeks. Poisson → Binomial compounding is needed.\n\nTakeaway: Use Poisson to find a per-interval probability; use Binomial when asking \"how many intervals out of N hit the threshold?\"", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Why, intuitively (not rigorously), does the sum of two independent Poisson variables follow a Poisson distribution? (4 steps)", "answer": "- Step 1: Imagine a Poisson process for events of type A at rate $$\\lambda$$ and type B at rate $$\\mu$$, operating over the same time interval and independently of each other.\n- Step 2: In any tiny sub-interval of length $$dt$$, the probability of an A-event is roughly $$\\lambda\\, dt$$, and independently the probability of a B-event is $$\\mu\\, dt$$. Because both are small and independent, the probability of \"either\" event is approximately $$(\\lambda + \\mu) dt$$.\n- Step 3: Thus the combined events form a Poisson process with rate $$\\lambda + \\mu$$. Over a unit interval, the total count is therefore $$\\mathrm{Po}(\\lambda + \\mu)$$.\n- Step 4: Formally this can also be proven with probability generating functions (out of scope at A-level) or by direct convolution of the PMFs.\n\nTakeaway: Superposing independent Poisson processes gives a Poisson process whose rate is the sum of the rates — \"events add, rates add\".", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Prove $$P(Q=1) = (\\lambda + \\mu)e^{-(\\lambda + \\mu)}$$ when $$Q = X + Y$$ with $$X \\sim \\mathrm{Po}(\\lambda)$$ and $$Y \\sim \\mathrm{Po}(\\mu)$$ independent. (5 steps)", "answer": "- Step 1: $$Q = 1$$ happens when either $$(X=1, Y=0)$$ or $$(X=0, Y=1)$$ — these are the two mutually exclusive ways.\n- Step 2: By independence: $$P(X=1, Y=0) = P(X=1)P(Y=0) = (\\lambda e^{-\\lambda})(e^{-\\mu}) = \\lambda e^{-(\\lambda+\\mu)}$$.\n- Step 3: Similarly $$P(X=0, Y=1) = (e^{-\\lambda})(\\mu e^{-\\mu}) = \\mu e^{-(\\lambda+\\mu)}$$.\n- Step 4: Add: $$P(Q=1) = \\lambda e^{-(\\lambda+\\mu)} + \\mu e^{-(\\lambda+\\mu)} = (\\lambda+\\mu)e^{-(\\lambda+\\mu)}$$.\n- Step 5: This matches $$\\mathrm{Po}(\\lambda+\\mu)$$ evaluated at 1, confirming the additive property at this special case.\n\nTakeaway: Direct convolution of PMFs confirms the additive property; the result matches the $$\\mathrm{Po}(\\lambda+\\mu)$$ PMF.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "For a Poisson distribution, the standard deviation is $$\\sqrt{\\lambda}$$. Describe how the relative spread (coefficient of variation) changes as $$\\lambda$$ increases, and what this tells us about large-$$\\lambda$$ Poisson distributions. (4 steps)", "answer": "- Step 1: Mean is $$\\lambda$$, standard deviation is $$\\sqrt{\\lambda}$$. The coefficient of variation (CV) is $$\\frac{\\sqrt{\\lambda}}{\\lambda} = \\frac{1}{\\sqrt{\\lambda}}$$.\n- Step 2: As $$\\lambda$$ grows, CV decreases like $$1/\\sqrt{\\lambda}$$: for $$\\lambda = 4$$, CV = 0.5 (50% relative spread); for $$\\lambda = 100$$, CV = 0.1 (10% spread).\n- Step 3: Interpretation: small-$$\\lambda$$ Poissons are very \"noisy\" (big swings relative to the mean), while large-$$\\lambda$$ Poissons are concentrated around $$\\lambda$$ — predictions become more reliable.\n- Step 4: Connection to the normal approximation: when $$\\lambda$$ is large (roughly $$\\geq 20$$), $$\\mathrm{Po}(\\lambda) \\approx N(\\lambda, \\lambda)$$.\n\nTakeaway: Poisson becomes more predictable (tighter around the mean) as the rate grows — this is the law-of-large-numbers at work.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "A student claims: \"For rare events, Poisson and Binomial give the same answer.\" Describe when this approximation holds and why. (4 steps)", "answer": "- Step 1: The Binomial-to-Poisson approximation holds when $$n$$ is large and $$p$$ is small, specifically with $$np = \\lambda$$ held fixed. A common rule of thumb: $$n \\geq 50$$ and $$p \\leq 0.1$$.\n- Step 2: Intuition: Poisson originated as the limit of Binomial when we break a time interval into many tiny sub-intervals, each with a small chance of containing an event. As $$n \\to \\infty$$ and $$p \\to 0$$, $$np$$ = rate stays finite, and the Binomial collapses to Poisson.\n- Step 3: Mathematical sketch: $$\\binom{n}{k}p^k(1-p)^{n-k} \\to \\frac{(np)^k}{k!}e^{-np}$$ as $$n \\to \\infty$$, $$p \\to 0$$, $$np \\to \\lambda$$.\n- Step 4: For moderate $$p$$ (e.g., $$p = 0.4$$), the approximation is poor because Binomial has variance $$np(1-p)$$, which differs from its mean $$np$$ — Poisson requires mean = variance.\n\nTakeaway: Poisson approximates Binomial when trials are many and success is rare; the key condition is small $$p$$ so that $$np(1-p) \\approx np$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "Why can the Poisson distribution in principle take any non-negative integer value, even when the \"natural\" scenario (like phone calls per day) seems to have a practical maximum? (4 steps)", "answer": "- Step 1: The Poisson PMF is defined for all $$x = 0, 1, 2, \\ldots$$ with no upper bound. Mathematically, there's always a non-zero (albeit extremely small) probability for any large $$x$$.\n- Step 2: In practice, probabilities become astronomically small for $$x \\gg \\lambda$$. E.g., for $$\\mathrm{Po}(3)$$, $$P(X = 20) \\approx 10^{-12}$$ — effectively impossible but technically non-zero.\n- Step 3: This is actually useful for modelling: the \"unbounded\" aspect captures the intuition that unusual events (e.g., a freak day with 12 phone calls when the mean is 3) are rare but possible.\n- Step 4: Contrast with Binomial, which has a hard upper limit of $$n$$ — no matter how lucky, you can't get more successes than trials. Poisson has a \"soft\" upper bound defined by rapidly-decaying probabilities.\n\nTakeaway: Poisson's unbounded support is a mathematical feature that reflects real-world reality — extreme events are rare but not impossible.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "Given sample data, the mean is 3.69 and variance is 3.73. Is Poisson a reasonable model? Explain what you'd look at next. (4 steps)", "answer": "- Step 1: For Poisson, we expect $$\\mathrm{mean} \\approx \\mathrm{variance}$$. Here 3.69 and 3.73 are very close (agreement to 1 dp), so Poisson is broadly consistent.\n- Step 2: However, mean ≈ variance is necessary but not sufficient. One should also check:\n+ The three modelling conditions (independence, singleness, constant rate)\n+ The shape of the data distribution against the Poisson PMF for $$\\lambda \\approx 3.7$$\n+ Goodness-of-fit tests (e.g., chi-squared, beyond A-level scope)\n- Step 3: If the data shows more extreme values than Poisson would predict, that's \"over-dispersion\" (variance > mean significantly). If variance < mean, that's \"under-dispersion\".\n- Step 4: In this case, to estimate a probability like $$P(X=3)$$, use $$\\lambda = 3.7$$ (rounded sensibly from both mean and variance).\n\nTakeaway: Equal mean and variance is diagnostic for Poisson but not definitive; always cross-check with context and shape.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "A rate is given as \"1.5 flaws per 50 m\" of material. Describe how to model the number of flaws in a 200 m roll of the same material. (4 steps)", "answer": "- Step 1: Constant-rate assumption says the number of flaws scales linearly with length. So the mean in a 200 m roll is $$\\frac{200}{50} \\times 1.5 = 6$$ flaws.\n- Step 2: So $$Y$$ = flaws in a 200 m roll follows $$Y \\sim \\mathrm{Po}(6)$$.\n- Step 3: This works because of the equivalence between \"rate per unit length\" and \"rate per unit time\" in the Poisson model — both rely on the same independence and uniformity assumptions.\n- Step 4: Caution: this assumes flaws are independent of each other and occur uniformly along the roll — if there's a defective batch (flaws cluster in one section), Poisson isn't appropriate.\n\nTakeaway: Rates scale linearly with interval length (in time or space) by the constant-rate assumption, so $$\\lambda$$ is adjusted proportionally.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "If 5 rolls are bought, and the probability a single roll has fewer than 4 flaws is $$q$$, describe how to find the probability at least 2 of the rolls have fewer than 4 flaws. (4 steps)", "answer": "- Step 1: First find $$q = P(Y < 4) = P(Y \\leq 3)$$ using $$Y \\sim \\mathrm{Po}(6)$$ for a single roll.\n- Step 2: Each roll is now an independent Bernoulli trial with success probability $$q$$. Define $$W$$ = number of rolls (out of 5) with fewer than 4 flaws. Then $$W \\sim \\mathrm{B}(5, q)$$.\n- Step 3: Compute $$P(W \\geq 2) = 1 - P(W = 0) - P(W = 1)$$. This uses the Binomial PMF, not Poisson.\n- Step 4: Note: the rolls themselves are still Poisson internally, but the question about \"at least 2 rolls\" is about counting successful rolls — a discrete, fixed-number-of-trials binomial problem.\n\nTakeaway: Within-roll randomness is Poisson, but across-roll counting is Binomial — identify the appropriate level of modelling.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A company has daily Poisson demand with mean 5 for its buses. Describe the strategy to find how many buses they should stock to be at least 99% sure of meeting all demand on any given day. (4 steps)", "answer": "- Step 1: We need the smallest integer $$n$$ such that $$P(X \\leq n) \\geq 0.99$$, where $$X \\sim \\mathrm{Po}(5)$$ is the daily request count.\n- Step 2: Look up cumulative probabilities: check $$P(X \\leq n)$$ for $$n = 6, 7, 8, \\ldots$$ until it first exceeds 0.99. (From tables: $$P(X \\leq 9) \\approx 0.9682$$, $$P(X \\leq 10) \\approx 0.9863$$, $$P(X \\leq 11) \\approx 0.9945$$.)\n- Step 3: Conclude $$n = 11$$ is the smallest value that works. Intuitively: keep adding buses until cumulative probability exceeds threshold.\n- Step 4: Conceptually — note how far above the mean of 5 we need to go! This is because a Poisson has substantial right tail at low $$\\lambda$$ (CV $$\\approx 1/\\sqrt{5} \\approx 0.45$$).\n\nTakeaway: Service-level decisions require reading the upper tail of Poisson; stocking to the mean leaves you short half the time.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Explain why the additive property requires the random variables to be defined over the **same** interval. What would go wrong otherwise? (4 steps)", "answer": "- Step 1: The parameter $$\\lambda$$ of a Poisson distribution is an event-count per specific interval. If $$X \\sim \\mathrm{Po}(2)$$ is phone calls in 10 minutes and $$Y \\sim \\mathrm{Po}(3)$$ is emails in 1 hour, then $$X + Y$$ has no natural interpretation — it's counting apples plus oranges.\n- Step 2: The \"interval\" doesn't have to be time — it could be space, volume, or any scale — but it must be the same for both variables.\n- Step 3: To combine processes measured on different scales, first rescale to a common interval using the constant-rate assumption, then sum the (now consistent) rates.\n- Step 4: If you naively add $$\\mathrm{Po}(2) + \\mathrm{Po}(3)$$ when the intervals are different, you'll incorrectly claim $$\\mathrm{Po}(5)$$ events per... per what?\n\nTakeaway: Poisson rates only add when the rates are measured over identical intervals; otherwise the sum has no well-defined physical meaning.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "Why must $$X$$ and $$Y$$ be independent for $$X + Y \\sim \\mathrm{Po}(\\lambda + \\mu)$$? Give an intuitive explanation. (4 steps)", "answer": "- Step 1: If $$X$$ and $$Y$$ are not independent, they can influence each other. Example: $$X$$ = phone calls inbound, $$Y$$ = phone calls outbound. If the line is busy on incoming, then the agent may return calls, making $$Y$$ correlated with $$X$$.\n- Step 2: When dependence exists, the variance of the sum is $$\\mathrm{Var}(X+Y) = \\mathrm{Var}(X) + \\mathrm{Var}(Y) + 2\\mathrm{Cov}(X,Y)$$, not simply $$\\lambda + \\mu$$.\n- Step 3: Since Poisson requires $$\\mathrm{Var} = \\mathrm{Mean}$$, but $$E(X+Y) = \\lambda+\\mu$$ regardless of dependence, the mean and variance will disagree when there's covariance — so the sum is NOT Poisson.\n- Step 4: Only with independence (covariance = 0) does the variance of the sum equal its mean, preserving the Poisson fingerprint.\n\nTakeaway: Dependence breaks the mean-equals-variance property of the sum, disqualifying Poisson; independence is necessary to preserve it.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Given $$Y \\sim \\mathrm{Po}(\\lambda)$$ with integer $$\\lambda$$, and the condition $$P(Y > 10) < 0.1$$, describe how to find the largest possible $$\\lambda$$. (4 steps)", "answer": "- Step 1: Convert: $$P(Y > 10) = 1 - P(Y \\leq 10)$$, so we need $$1 - P(Y \\leq 10) < 0.1$$, i.e., $$P(Y \\leq 10) > 0.9$$.\n- Step 2: From tables, find the largest integer $$\\lambda$$ for which $$P(Y \\leq 10) > 0.9$$. As $$\\lambda$$ increases, the mass shifts right, so $$P(Y \\leq 10)$$ decreases.\n- Step 3: So we need the largest $$\\lambda$$ below the threshold where $$P(Y \\leq 10)$$ just drops below 0.9. Check values: for $$\\lambda = 7$$, $$P \\approx 0.9015$$ ✓; for $$\\lambda = 8$$, $$P \\approx 0.8159$$ ✗. So answer is $$\\lambda = 7$$.\n- Step 4: Conceptual interpretation: we're finding the largest rate consistent with \"we rarely see more than 10 events.\"\n\nTakeaway: Increasing $$\\lambda$$ shifts Poisson mass right; reverse this direction to find maximum $$\\lambda$$ compatible with a tail constraint.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Describe the steps to find $$\\lambda$$ when $$P(Y=5) = 1.25 \\times P(Y=3)$$, where $$Y \\sim \\mathrm{Po}(\\lambda)$$. (5 steps)", "answer": "- Step 1: Write out: $$\\frac{e^{-\\lambda}\\lambda^5}{5!} = 1.25 \\times \\frac{e^{-\\lambda}\\lambda^3}{3!}$$.\n- Step 2: Cancel the common factor $$e^{-\\lambda}\\lambda^3$$ from both sides: $$\\frac{\\lambda^2}{5!} = \\frac{1.25}{3!}$$.\n- Step 3: Rearrange: $$\\lambda^2 = 1.25 \\times \\frac{5!}{3!} = 1.25 \\times \\frac{120}{6} = 1.25 \\times 20 = 25$$.\n- Step 4: So $$\\lambda = 5$$ (taking the positive root, since rates are non-negative).\n- Step 5: Sanity check: when $$\\lambda = 5$$, $$\\mathrm{Po}(5)$$ has mode near 4–5, and $$P(Y=5) > P(Y=3)$$ as expected.\n\nTakeaway: For ratio equations, cancel common terms algebraically; the $$e^{-\\lambda}$$ always cancels leaving polynomial-in-$$\\lambda$$ equations.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Textbook examples of Poisson include spelling mistakes per page, emissions per minute, raisins per cake, and cars per 3-minute interval. Identify the \"interval\" in each case and explain what $$\\lambda$$ represents. (5 steps)", "answer": "- Step 1: **Spelling mistakes per page** — interval is a single page of the newspaper. $$\\lambda$$ is the average number of mistakes that appear per page.\n- Step 2: **Radioactive emissions per 5-minute period** — interval is 5 minutes. $$\\lambda$$ is the average emissions detected in a 5-minute window.\n- Step 3: **Raisins in a fruitcake** — interval is a unit of volume (the whole cake). $$\\lambda$$ is the average number of raisins in a single cake.\n- Step 4: **Cars per 3-minute interval** — interval is 3 minutes. $$\\lambda$$ is average cars counted in a 3-minute observation.\n- Step 5: The common thread: in each case, $$\\lambda$$ = average count in ONE unit of the defined interval. To find probabilities in a different-size interval, scale $$\\lambda$$ linearly.\n\nTakeaway: The \"interval\" in Poisson can be time, space, volume, or any continuous domain — but $$\\lambda$$ is always the mean count per unit of that domain.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Why does the Poisson PMF have $$x!$$ in the denominator? What role does this factorial play in shaping the distribution? (4 steps)", "answer": "- Step 1: The $$x!$$ in the denominator comes from the Taylor series of $$e^\\lambda = \\sum_{x=0}^\\infty \\frac{\\lambda^x}{x!}$$. It's required to make probabilities sum to 1.\n- Step 2: Intuition: $$x!$$ represents the number of ways to arrange $$x$$ events in order. In the Poisson-from-Binomial derivation, this factor emerges from accounting for indistinguishable arrangements.\n- Step 3: Shape effect: for small $$x$$ (less than $$\\lambda$$), $$\\lambda^x$$ grows faster than $$x!$$, so probabilities rise. For $$x$$ much larger than $$\\lambda$$, $$x!$$ grows much faster than $$\\lambda^x$$, so probabilities plummet.\n- Step 4: The crossover point is around $$x = \\lambda$$, which is why the mode is near $$\\lambda$$.\n\nTakeaway: $$x!$$ in the denominator is both a normalising device (from the Taylor series) and a brake on tail probabilities (it grows superexponentially).", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "A signal model uses Poisson to describe photons arriving at a detector. If the rate $$\\lambda$$ doubles, what happens to (a) the probability of zero photons, (b) the standard deviation, (c) the coefficient of variation? (4 steps)", "answer": "- Step 1: (a) $$P(X=0) = e^{-\\lambda}$$. Doubling $$\\lambda$$ changes this to $$e^{-2\\lambda} = (e^{-\\lambda})^2$$ — the probability is squared, not halved. So the chance of zero photons drops dramatically.\n- Step 2: (b) Standard deviation is $$\\sqrt{\\lambda}$$. Doubling $$\\lambda$$ multiplies the SD by $$\\sqrt{2} \\approx 1.41$$ — SD grows, but much slower than the mean.\n- Step 3: (c) Coefficient of variation is $$\\frac{1}{\\sqrt{\\lambda}}$$. Doubling $$\\lambda$$ divides CV by $$\\sqrt{2} \\approx 1.41$$ — relative variability decreases by a factor of ~0.71.\n- Step 4: Implication: higher-rate Poisson is tighter relative to its mean — exactly why counting statistics in physics become more reliable with stronger signals.\n\nTakeaway: In Poisson, doubling the rate squares the \"zero\" probability but only $$\\sqrt{2}$$-multiplies the standard deviation — the shape becomes tighter.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Prove that $$E(X) = \\lambda$$ for $$X \\sim \\mathrm{Po}(\\lambda)$$ using the series definition. (5 steps)", "answer": "- Step 1: Start with the definition: $$E(X) = \\sum_{x=0}^{\\infty} x \\cdot P(X=x) = \\sum_{x=0}^{\\infty} x \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!}$$.\n- Step 2: The $$x = 0$$ term vanishes (since $$x = 0$$ there). For $$x \\geq 1$$: $$\\frac{x}{x!} = \\frac{1}{(x-1)!}$$, so the sum becomes $$\\sum_{x=1}^{\\infty} \\frac{e^{-\\lambda}\\lambda^x}{(x-1)!}$$.\n- Step 3: Factor out $$\\lambda$$ and substitute $$y = x - 1$$: $$\\lambda e^{-\\lambda} \\sum_{y=0}^{\\infty} \\frac{\\lambda^y}{y!}$$.\n- Step 4: Recognise the inner sum as the Taylor series of $$e^\\lambda$$: $$\\sum_{y=0}^{\\infty} \\frac{\\lambda^y}{y!} = e^\\lambda$$.\n- Step 5: Substitute: $$E(X) = \\lambda e^{-\\lambda} \\cdot e^\\lambda = \\lambda$$.\n\nTakeaway: The factor $$\\frac{1}{(x-1)!}$$ emerges from $$x/x!$$ and allows a reindexing that produces the Taylor series for $$e^\\lambda$$, which cancels with $$e^{-\\lambda}$$, leaving just $$\\lambda$$.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Prove that $$\\mathrm{Var}(X) = \\lambda$$ for $$X \\sim \\mathrm{Po}(\\lambda)$$. Hint: compute $$E(X(X-1))$$ first. (5 steps)", "answer": "- Step 1: Compute $$E(X(X-1)) = \\sum_{x=0}^{\\infty} x(x-1) \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!}$$. Terms with $$x=0$$ and $$x=1$$ vanish.\n- Step 2: For $$x \\geq 2$$: $$\\frac{x(x-1)}{x!} = \\frac{1}{(x-2)!}$$, giving $$\\sum_{x=2}^{\\infty} \\frac{e^{-\\lambda}\\lambda^x}{(x-2)!}$$.\n- Step 3: Factor $$\\lambda^2$$ and substitute $$y = x - 2$$: $$\\lambda^2 e^{-\\lambda} \\sum_{y=0}^{\\infty} \\frac{\\lambda^y}{y!} = \\lambda^2 e^{-\\lambda} \\cdot e^\\lambda = \\lambda^2$$.\n- Step 4: Now use $$E(X^2) = E(X(X-1)) + E(X) = \\lambda^2 + \\lambda$$.\n- Step 5: Variance: $$\\mathrm{Var}(X) = E(X^2) - [E(X)]^2 = (\\lambda^2 + \\lambda) - \\lambda^2 = \\lambda$$.\n\nTakeaway: Using the \"factorial moment\" $$E(X(X-1))$$ leverages the factorial structure of Poisson to produce a clean algebraic answer $$\\lambda^2 + \\lambda - \\lambda^2 = \\lambda$$.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "What are the implications of the Poisson being \"discrete\"? Why can't we ask for $$P(X = 2.5)$$ or evaluate a density at non-integer points? (4 steps)", "answer": "- Step 1: Poisson models the **count** of events — you can't have 2.5 events; it doesn't make sense physically.\n- Step 2: Mathematically, the PMF $$P(X = x)$$ is defined only for $$x = 0, 1, 2, \\ldots$$; it's undefined (or implicitly zero) for non-integers.\n- Step 3: For continuous analogues, we'd use an exponential distribution (for \"time between events\") or a gamma distribution (for \"time to nth event\") — these have PDFs defined on a continuous domain.\n- Step 4: A related subtle point: for discrete distributions, probability at a point is non-zero (unlike for continuous), so equalities matter — $$P(X \\leq 3) \\neq P(X < 3)$$.\n\nTakeaway: Poisson is intrinsically discrete; for continuous waiting-time questions, use exponential or gamma distributions instead.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "A key modelling error: assuming Poisson when events occur in clusters (e.g., tourists arriving by bus in groups of 10). What specifically breaks down? (4 steps)", "answer": "- Step 1: The \"singly in time\" condition fails when events arrive in groups. If a bus unloads 10 tourists at once, that's one arrival event with 10 sub-events — not 10 independent single events.\n- Step 2: Result: variance > mean (over-dispersion). The data will have bursts of activity followed by lulls, creating more extreme counts than Poisson predicts.\n- Step 3: The mean number might still equal \"events per hour\", but the variance is inflated because the clustering creates correlated arrivals.\n- Step 4: Better models here: compound Poisson (where each arrival brings a random group size), or negative binomial (which allows variance > mean).\n\nTakeaway: Clustering or batching of events invalidates \"singly in time\"; variance exceeds mean, and Poisson systematically underestimates extremes.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "A student computes $$P(X \\geq 2) = 1 - P(X \\leq 2)$$. What's the error, and what should they have written? (4 steps)", "answer": "- Step 1: The error is subtle but important: $$P(X \\geq 2)$$ INCLUDES $$X = 2$$, but $$1 - P(X \\leq 2)$$ EXCLUDES it (because $$P(X \\leq 2)$$ already includes $$X=2$$).\n- Step 2: So $$1 - P(X \\leq 2)$$ actually equals $$P(X \\geq 3)$$, not $$P(X \\geq 2)$$.\n- Step 3: The correct expression is $$P(X \\geq 2) = 1 - P(X \\leq 1)$$, leaving $$X = 2$$ in the \"upper tail\" half.\n- Step 4: Quick test to avoid this: write out what $$P(X \\leq k)$$ includes, then check which integers are left over when you complement.\n\nTakeaway: For discrete distributions, complement at the BOUNDARY BELOW the inequality, not at the inequality itself.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "Consider a fixed interval of time. If we double the interval's length, what happens to the variance of the count? Explain from first principles. (4 steps)", "answer": "- Step 1: The mean is $$\\lambda$$ per unit interval, so over a 2-unit interval, mean is $$2\\lambda$$.\n- Step 2: Crucially, doubling the interval is like adding two independent identical Poisson processes (additivity applied to disjoint intervals). So the count over 2 units is $$\\mathrm{Po}(2\\lambda)$$.\n- Step 3: Variance of $$\\mathrm{Po}(2\\lambda)$$ is also $$2\\lambda$$ — doubled from the original $$\\lambda$$. So variance scales linearly with interval length, same as mean.\n- Step 4: This matches the property $$\\mathrm{Var}(X+Y) = \\mathrm{Var}(X) + \\mathrm{Var}(Y)$$ for independent $$X, Y$$: adding another Poisson interval adds its variance.\n\nTakeaway: Over longer intervals, both mean and variance grow linearly — another way to see why mean = variance for Poisson.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "The mean number of cars crossing a bridge is 180 per hour. Describe how to model the probability of \"more than 5 cars in a given minute\" and estimate the order of magnitude. (4 steps)", "answer": "- Step 1: First scale the rate to per minute: 180 per hour = 3 per minute. So $$X$$ (cars per minute) is modelled as $$X \\sim \\mathrm{Po}(3)$$.\n- Step 2: \"More than 5\" means $$X > 5$$, i.e., $$X \\geq 6$$. Compute $$P(X \\geq 6) = 1 - P(X \\leq 5)$$.\n- Step 3: Conceptually: with mean 3, the distribution peaks around 2–3, and $$X = 6$$ is about $$\\frac{6-3}{\\sqrt{3}} \\approx 1.7$$ standard deviations above the mean — so we expect this probability to be small (probably well under 10%).\n- Step 4: Actual values from tables: $$P(X \\leq 5) \\approx 0.9161$$, so $$P(X \\geq 6) \\approx 0.084$$, consistent with the intuition.\n\nTakeaway: Always rescale rates to the right interval first; then the tail probability follows from how many SDs the threshold is above the mean.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Compare the Poisson and binomial for modelling \"number of typos per page\" of a book, assuming each character has probability 0.001 of being a typo, and there are ~2000 characters per page. (5 steps)", "answer": "- Step 1: The binomial approach: each character is a Bernoulli trial with $$p = 0.001$$; there are $$n = 2000$$ characters per page. So errors per page $$\\sim \\mathrm{B}(2000, 0.001)$$.\n- Step 2: Binomial parameters: mean $$np = 2$$, variance $$np(1-p) \\approx 2 \\cdot 0.999 = 1.998$$. Mean and variance almost equal.\n- Step 3: The Poisson approximation: since $$n$$ is large and $$p$$ is small, use $$\\mathrm{Po}(np) = \\mathrm{Po}(2)$$. This has mean = variance = 2.\n- Step 4: The two distributions agree almost perfectly for this case because $$(1-p) \\approx 1$$. For practical purposes, Poisson is easier (one parameter) and accurate.\n- Step 5: The key simplification: in Poisson, we don't need to track $$n$$ at all — we just need the rate per page.\n\nTakeaway: When trials are many and success is rare, Poisson with $$\\lambda = np$$ is an excellent approximation to Binomial and much simpler.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "If the mean AND variance of sample data are BOTH about 10, but the sample shows lots of zero counts and also many very high counts (much more than a typical Poisson would), what might this tell us? (4 steps)", "answer": "- Step 1: Mean ≈ variance doesn't uniquely identify Poisson — it's necessary but not sufficient. A bimodal or mixture distribution could have mean ≈ variance by coincidence.\n- Step 2: The symptoms (excess zeros plus excess large values) hint at a zero-inflated or mixed process: maybe two populations (e.g., \"quiet\" hours with near-zero events, \"busy\" hours with many events) mixed together.\n- Step 3: Poisson has a smooth, unimodal shape. If you see a spike at zero AND a long tail, it's NOT a single Poisson — even if the first two moments match.\n- Step 4: Better models: zero-inflated Poisson, mixture of Poissons, or negative binomial (for over-dispersion).\n\nTakeaway: Matching moments alone can be misleading; always inspect the distribution shape to confirm Poisson fits.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "An angler catches fish at mean rate 2 per hour. Over 5 two-hour trips, describe the strategy to find the probability of \"at least 5 fish on exactly 3 trips\". (4 steps)", "answer": "- Step 1: For a 2-hour trip, the fish count follows $$\\mathrm{Po}(4)$$ (rate scaled). Find $$p = P(X \\geq 5)$$ where $$X \\sim \\mathrm{Po}(4)$$.\n- Step 2: Now trips are independent Bernoulli trials with success probability $$p$$. Let $$N$$ = number of successful trips out of 5. Then $$N \\sim \\mathrm{B}(5, p)$$.\n- Step 3: The answer is $$P(N = 3) = \\binom{5}{3} p^3 (1-p)^2 = 10 p^3 (1-p)^2$$.\n- Step 4: Two-layer structure: Poisson handles \"how many fish per trip\"; Binomial handles \"how many trips hit the threshold\". The trips don't combine additively because we're not asking about total fish.\n\nTakeaway: When combining trips or days, the internal count is Poisson, but the across-periods success count is Binomial.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "If an elevator breaks down at mean rate 3 times per 4-week period, and it broke down TWICE last week, what's the probability of breakdown next week? Explain the surprising result. (5 steps)", "answer": "- Step 1: Rescale to one week: mean is $$\\frac{1}{4} \\times 3 = 0.75$$ per week. So $$X \\sim \\mathrm{Po}(0.75)$$ for a single week.\n- Step 2: $$P(X \\geq 1) = 1 - P(X=0) = 1 - e^{-0.75}$$ for any week.\n- Step 3: Critical insight: by the INDEPENDENCE assumption of the Poisson model, next week is still $$\\mathrm{Po}(0.75)$$ — last week's two breakdowns do NOT change it!\n- Step 4: This is counterintuitive but correct: Poisson is \"memoryless\" across disjoint intervals. Each week is an independent sample.\n- Step 5: Reality check: in practice, a machine that just broke down twice may actually be more likely to break down (wear and tear, cascading failures) — violating independence. The Poisson model would then be wrong!\n\nTakeaway: Poisson implies that past events don't affect future rates — a strong assumption that can be wrong in reality, but is a feature of the model.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "A company records 282 phone calls over 100 days. Sample mean is 2.82, sample variance is 2.83. The chapter uses $$\\lambda = 2.76$$ or $$\\lambda = 2.82$$ when modelling. Explain the reasoning for choosing an exact value. (4 steps)", "answer": "- Step 1: The sample mean and variance aren't identical (2.82 vs 2.83, approximately) because of sampling variability — no real dataset has exactly equal mean and variance.\n- Step 2: Choosing $$\\lambda$$ requires a judgement call. Options:\n+ Use the mean (2.82) — the standard maximum likelihood estimator\n+ Use the variance (2.83) — another moment-based estimator\n+ Round to a meaningful value\n- Step 3: The impact of small choices in $$\\lambda$$ on probabilities is typically small for moderate $$\\lambda$$.\n- Step 4: In practice, the sample mean is the usual choice because it's the MLE. The near-equality of variance is evidence for Poisson-ness, not itself a source for the estimate.\n\nTakeaway: Use the sample mean as your Poisson parameter estimate; check the variance separately as a diagnostic for model fit.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "For a single Poisson trial in a tiny time interval $$dt$$, the probability of ONE event is $$\\lambda \\, dt$$ and TWO events is negligible. Explain how this \"infinitesimal\" view leads to the Poisson PMF. (4 steps)", "answer": "- Step 1: Divide a unit interval into $$n$$ tiny pieces of length $$1/n$$. In each piece, probability of an event is approximately $$\\lambda/n$$ (using constant rate), and probability of multiple events is $$\\sim (\\lambda/n)^2$$, negligible for large $$n$$.\n- Step 2: So each piece is (approximately) a Bernoulli trial with $$p = \\lambda/n$$, and trials are independent (by Poisson's independence). Number of events in the whole interval is $$\\mathrm{B}(n, \\lambda/n)$$.\n- Step 3: Take the limit $$n \\to \\infty$$: $$\\binom{n}{k}(\\lambda/n)^k(1-\\lambda/n)^{n-k} \\to \\frac{\\lambda^k e^{-\\lambda}}{k!}$$.\n- Step 4: This is the formal derivation of Poisson from Binomial, grounded in the physical intuition of \"many rare chances for events\".\n\nTakeaway: Poisson is the limiting distribution when you break a continuous interval into many tiny Bernoulli trials — a deep connection between discrete and continuous randomness.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "A sample of cherries in fruitcakes has mean 1.43 and variance 1.43 (approximately). Describe the approach to estimate the probability that exactly 3 cherries are in a randomly selected cake. (4 steps)", "answer": "- Step 1: Since mean ≈ variance ≈ 1.43, Poisson is consistent. Use $$\\lambda = 1.43$$ (the sample mean, which is the MLE).\n- Step 2: Let $$X \\sim \\mathrm{Po}(1.43)$$. Then $$P(X = 3) = \\frac{e^{-1.43}(1.43)^3}{3!}$$.\n- Step 3: Qualitatively: $$X = 3$$ is above the mean of 1.43 (about 1.3 SDs above, since SD $$= \\sqrt{1.43} \\approx 1.20$$), so the probability is moderate but falling — expect roughly 10% or less.\n- Step 4: Exact computation: $$P(X = 3) \\approx 0.10$$.\n\nTakeaway: Use sample mean as $$\\lambda$$; given the Poisson PMF, probabilities follow mechanically.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Why is the Poisson distribution especially popular for modeling \"rare events\"? What happens if we try to use it for common events? (4 steps)", "answer": "- Step 1: \"Rare events\" here means events with small per-trial probability but many potential trials — the conditions under which Binomial $$\\to$$ Poisson.\n- Step 2: For common events, two things go wrong:\n+ The Binomial variance $$np(1-p)$$ is noticeably less than the mean $$np$$, so Poisson (with variance = mean) overestimates variability\n+ The probability mass above $$n$$ (which is theoretically non-zero in Poisson but impossible in Binomial) is larger, also making the fit worse\n- Step 3: So for, say, $$n = 10$$ trials with $$p = 0.5$$ (mean 5, variance 2.5), Poisson with $$\\lambda = 5$$ would give variance 5 — twice too big.\n- Step 4: The classic rule: Poisson works well when $$n \\geq 50$$ and $$p \\leq 0.1$$ (or $$np \\leq 5$$ roughly), i.e., the \"rare event regime\".\n\nTakeaway: Poisson's mean = variance property is accurate for rare events; for common events, it exaggerates variability.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "A shop sells desktops at rate 2.4 per day and laptops at rate 1.6 per day. Describe how to model the joint probability of \"at least 2 desktops AND at least 2 laptops\" in a single day. (4 steps)", "answer": "- Step 1: We have two independent Poisson processes: $$D$$ for desktops with $$D \\sim \\mathrm{Po}(2.4)$$ and $$L$$ for laptops with $$L \\sim \\mathrm{Po}(1.6)$$.\n- Step 2: The joint event \"$$D \\geq 2$$ AND $$L \\geq 2$$\" has probability $$P(D \\geq 2) \\times P(L \\geq 2)$$ — by independence, the joint probability is the product.\n- Step 3: Compute each separately from Poisson tables or formulas:\n+ $$P(D \\geq 2) = 1 - P(D = 0) - P(D = 1)$$\n+ $$P(L \\geq 2) = 1 - P(L = 0) - P(L = 1)$$\n- Step 4: Multiply: answer is $$P(D \\geq 2) \\cdot P(L \\geq 2)$$.\n\nTakeaway: Independent Poissons multiply probabilities for joint events; don't add rates unless the quantity of interest is the sum.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "For the SAME setup (desktops at rate 2.4, laptops at rate 1.6 per day), describe how to find \"combined total of 6 computers in a single day\". Compare the technique to the previous joint-event question. (4 steps)", "answer": "- Step 1: Now we care about $$D + L$$, not the joint event. Since $$D$$ and $$L$$ are independent Poissons on the same interval, $$D + L \\sim \\mathrm{Po}(2.4 + 1.6) = \\mathrm{Po}(4)$$.\n- Step 2: Compute $$P(D + L = 6) = \\frac{e^{-4}(4)^6}{6!}$$.\n- Step 3: Conceptually: the additive property reduces a two-variable problem to a single Poisson computation. This is a huge simplification!\n- Step 4: Contrast with the joint-event case: there we multiplied separate probabilities (independence); here we add rates (additivity). Different questions $$\\to$$ different techniques.\n\nTakeaway: When the question asks about a SUM of events, use Poisson additivity; when it asks about a COMBINATION of constraints on each, use independence (multiplication).", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "For a shop with daily Poisson total sales of mean 4, describe how to model 2-day total sales and what condition is needed. (4 steps)", "answer": "- Step 1: If days are independent Poissons with rate 4 each, then 2-day total is $$\\mathrm{Po}(4) + \\mathrm{Po}(4) = \\mathrm{Po}(8)$$ by additivity — assuming independence between days.\n- Step 2: Equivalently, we could just scale the rate: $$\\lambda_{\\text{2 days}} = 2 \\times 4 = 8$$, same answer.\n- Step 3: Independence condition: the number of sales on day 1 cannot influence day 2 sales. If there's a \"buy one day, bring friends next day\" effect, this is violated.\n- Step 4: This is the \"temporal additivity\" property, implicit in the constant-rate condition.\n\nTakeaway: Across time, Poisson totals add naturally — but always confirm that the independence assumption is reasonable.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "In Poisson, the rate $$\\lambda$$ is the only parameter. Does this mean Poisson is a \"rigid\" model? Why or why not, in practice? (4 steps)", "answer": "- Step 1: Mathematically, yes — one parameter fully determines the distribution. Once $$\\lambda$$ is fixed, all probabilities are determined.\n- Step 2: But practically, $$\\lambda$$ can depend on context (time of day, location, condition). So different intervals/settings can have different $$\\lambda$$s, making the overall model flexible.\n- Step 3: For a single homogeneous interval, the rigidity is a feature — mean and variance are forced to be equal, which is a testable prediction. If data violates this, we know Poisson is wrong.\n- Step 4: More flexible models (negative binomial) introduce a second parameter, but at the cost of interpretability and simplicity.\n\nTakeaway: Poisson's single parameter is its strength (simplicity, testability) and its weakness (can't handle over-dispersion); use it when its assumptions hold.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "Explain why $$P(X = 0) + P(X = 1) + P(X = 2) + \\ldots = 1$$ is NOT obvious just from the Poisson formula. What makes it work out? (4 steps)", "answer": "- Step 1: The Poisson formula is $$P(X = x) = \\frac{e^{-\\lambda}\\lambda^x}{x!}$$. If you picked $$e^{-\\lambda}$$ to be some other function, the probabilities wouldn't sum to 1.\n- Step 2: The key fact is the Taylor series: $$e^\\lambda = 1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\ldots$$. This gives us exactly what we need.\n- Step 3: So $$\\sum_x P(X=x) = e^{-\\lambda} \\cdot e^\\lambda = 1$$. The $$e^{-\\lambda}$$ is specifically chosen to cancel the $$e^\\lambda$$ that emerges from summing the numerators.\n- Step 4: This is not \"obvious\" in the sense that constructing a probability distribution from $$\\lambda^x / x!$$ terms requires knowing the Taylor series of $$e^\\lambda$$ — a non-trivial fact.\n\nTakeaway: The $$e^{-\\lambda}$$ in Poisson is not arbitrary — it's a carefully chosen normalising constant that cancels the Taylor series of $$e^\\lambda$$.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "In an early step of proving $$E(X) = \\lambda$$ for Poisson, we split off $$x = 0$$. Why can we do this without worry? (4 steps)", "answer": "- Step 1: The term at $$x = 0$$ is $$0 \\cdot P(X=0) = 0$$. So it contributes nothing to the expectation.\n- Step 2: This is because $$E(X) = \\sum x \\cdot P(X=x)$$, and $$x = 0$$ has a factor of zero.\n- Step 3: More generally, for any random variable, $$X = 0$$ contributes nothing to expectation (but it does contribute to $$P(X \\leq k)$$!).\n- Step 4: The reason to split it off is to then reindex the remaining sum and match it to a known series (Taylor series of $$e^\\lambda$$).\n\nTakeaway: The $$x = 0$$ term is \"harmless\" for mean calculations but must be included for cumulative probabilities.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "A key subtlety: the Poisson model assumes events occur \"one at a time\". If two people independently walk into a shop at the same instant (two arrivals in the same infinitesimal moment), does this invalidate the model? (4 steps)", "answer": "- Step 1: In theory, the probability of two arrivals in exactly the same instant is zero in the Poisson model — events are singular.\n- Step 2: In practice, \"same time\" is a matter of scale. If our time resolution is 1 second, then \"two people in the same second\" might be recorded. For Poisson to work, the rate per second must still be small compared to the time resolution.\n- Step 3: If events truly cluster (e.g., a couple always arriving together), the model is misspecified, and variance will exceed the mean.\n- Step 4: So the \"singly\" condition is about the microscopic structure of events — not that events never overlap in records, but that their underlying nature is separable and independent.\n\nTakeaway: \"Singly in time\" is a microscopic condition; apparent simultaneities at coarse time scales are okay, but genuine pairings break the model.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "A store operates 10 hours a day with Poisson rate $$\\lambda$$ per hour. Its daily total follows $$\\mathrm{Po}(10\\lambda)$$. Why can we confidently say this without computing anything? (4 steps)", "answer": "- Step 1: Each of the 10 hours gives an independent count $$X_i \\sim \\mathrm{Po}(\\lambda)$$ (by independence and identical distribution within the day).\n- Step 2: By the additive property (repeated application), $$\\sum_{i=1}^{10} X_i \\sim \\mathrm{Po}(10\\lambda)$$.\n- Step 3: Equivalently, by the constant-rate assumption, events in a 10-hour span have mean $$10 \\lambda$$ (proportional to length), and the process is still Poisson.\n- Step 4: Both perspectives (additivity of independent intervals, linear scaling of the rate) give the same answer — a nice consistency check of the model.\n\nTakeaway: Poisson additivity and rate-scaling are two sides of the same coin — both follow from the three core conditions.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "What does it mean to say the Poisson distribution is \"memoryless\"? Is this literally true in the discrete sense? (4 steps)", "answer": "- Step 1: Discretely, \"memoryless\" of Poisson means: given that you've observed a certain number of events in one interval, the count in the next (disjoint) interval is still $$\\mathrm{Po}(\\lambda)$$ — unaffected by past data.\n- Step 2: This is due to the independence condition in disjoint time intervals: Poisson events in $$[0, t]$$ are independent of events in $$[t, 2t]$$.\n- Step 3: Strictly, \"memorylessness\" is more associated with the exponential distribution (for waiting times between events). But the Poisson count inherits a related property.\n- Step 4: Practical implication: the model predicts that current rates don't change based on history — something worth double-checking in applications (stock markets, disease outbreaks, etc. often violate this).\n\nTakeaway: Poisson assumes fresh independence in every interval; past behaviour doesn't update the model — a strong and often-violated assumption.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": true}, {"question": "For a Poisson distribution with $$\\lambda = 3$$, describe how to quickly determine the ratio $$P(X = 4) / P(X = 3)$$, and what this tells us about the distribution's shape. (4 steps)", "answer": "- Step 1: $$\\frac{P(X=4)}{P(X=3)} = \\frac{\\lambda^4/4!}{\\lambda^3/3!} = \\frac{\\lambda}{4}$$.\n- Step 2: Substituting $$\\lambda = 3$$: ratio = 3/4.\n- Step 3: So $$P(X = 4)$$ is 75% as large as $$P(X = 3)$$ — probabilities are falling as we move past the mode.\n- Step 4: General pattern: $$\\frac{P(X = k+1)}{P(X = k)} = \\frac{\\lambda}{k+1}$$. When $$k + 1 < \\lambda$$, probabilities rise; when $$k + 1 > \\lambda$$, they fall. Here $$k + 1 = 4 > 3 = \\lambda$$, so we're past the peak.\n\nTakeaway: The ratio $$\\lambda / (k+1)$$ tells us whether we're before or after the Poisson's peak — a quick way to understand the distribution's shape.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": true}, {"question": "A challenge problem: given a total of 10 events occurred between 2pm and 3pm in a Poisson process, what's the conditional distribution of events in [2pm, 2:30pm]? (5 steps)", "answer": "- Step 1: This is a classical result: given $$n$$ events in an interval, the time of each event is uniformly distributed on that interval (for Poisson).\n- Step 2: So each of the 10 events is independently in $$[2\\text{pm}, 2:30\\text{pm}]$$ with probability 1/2.\n- Step 3: Therefore, the number in $$[2\\text{pm}, 2:30\\text{pm}]$$ given 10 total in $$[2\\text{pm}, 3\\text{pm}]$$ follows $$\\mathrm{B}(10, 1/2)$$, NOT Poisson!\n- Step 4: Intuition: conditioning on the total removes the \"rate\" uncertainty; what's left is just allocating the fixed count across sub-intervals via a Binomial.\n- Step 5: So to find \"exactly 5 events in $$[2\\text{pm}, 2:30\\text{pm}]$$\", compute $$\\binom{10}{5}(1/2)^{10}$$.\n\nTakeaway: Conditional on the total, Poisson events are uniformly distributed in time — the distribution \"conditional on total\" is Binomial.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "Explain the connection between the Poisson distribution and the exponential distribution at a conceptual level. (4 steps)", "answer": "- Step 1: A Poisson process generates events at constant rate $$\\lambda$$. The COUNT of events in an interval is Poisson; the WAITING TIME between events is exponential with the same rate $$\\lambda$$.\n- Step 2: The two descriptions are complementary:\n+ \"How many events in $$[0, t]$$?\" → $$\\mathrm{Po}(\\lambda t)$$\n+ \"How long until the next event?\" → $$\\mathrm{Exp}(\\lambda)$$\n- Step 3: Consistency: $$P(X = 0 \\text{ in } [0, t]) = e^{-\\lambda t}$$. Meanwhile, $$P(\\text{wait} > t) = e^{-\\lambda t}$$ from the exponential CDF. These match!\n- Step 4: So Poisson counts and exponential waiting times are two views of the same underlying process.\n\nTakeaway: Poisson (discrete count) and exponential (continuous wait) are dual descriptions of the same Poisson process.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": true}, {"question": "If accidents occur at a roundabout at rate 15 per year, describe how to find the probability of \"at least 1 accident in a single month\" without a calculator. (4 steps)", "answer": "- Step 1: Rescale to per-month: $$\\lambda_{\\text{month}} = 15 / 12 = 1.25$$. So monthly count $$X \\sim \\mathrm{Po}(1.25)$$.\n- Step 2: $$P(X \\geq 1) = 1 - P(X = 0) = 1 - e^{-1.25}$$.\n- Step 3: Conceptually: $$e^{-1.25} \\approx 0.287$$ (between $$e^{-1} \\approx 0.37$$ and $$e^{-2} \\approx 0.14$$), so $$P(X \\geq 1) \\approx 0.71$$ — about 71% of months have at least one accident.\n- Step 4: Sanity check: if the mean is 1.25 per month, even though the most likely count is 1, there's still a ~29% chance of zero, reflecting Poisson's variability.\n\nTakeaway: $$P(X \\geq 1) = 1 - e^{-\\lambda}$$ for Poisson — a quick memorisable formula for \"at least one\".", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": false}, {"question": "A classic mistake: a student sees $$P(X=0) = 0.3$$ and concludes \"so the mean is about 0.3\". Why is this wrong, and what's the correct relation? (4 steps)", "answer": "- Step 1: $$P(X = 0) = e^{-\\lambda}$$. Setting this equal to 0.3: $$e^{-\\lambda} = 0.3$$, so $$\\lambda = -\\ln(0.3) \\approx 1.2$$.\n- Step 2: The mean is $$\\lambda \\approx 1.2$$, not 0.3. The confusion is between \"probability of zero events\" and \"expected number of events\".\n- Step 3: These are very different: you can have a mean of 5 events with probability of zero events very small ($$e^{-5} \\approx 0.007$$), or mean of 0.1 events with probability of zero very high ($$e^{-0.1} \\approx 0.905$$).\n- Step 4: The relation between them is $$P(X=0) = e^{-\\lambda}$$ — exponentially-decreasing in $$\\lambda$$.\n\nTakeaway: $$P(X=0)$$ and $$E(X)$$ are different things; they're related by $$P(X=0) = e^{-E(X)}$$ in Poisson.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": true}, {"question": "A botanist counts weeds per $$\\mathrm{m}^2$$ of a field, getting rate 1.3 per $$\\mathrm{m}^2$$. They plan to check a 4 $$\\mathrm{m}^2$$ plot. Describe the Poisson parameter to use and the conditions needed for validity. (4 steps)", "answer": "- Step 1: Scaling: expected weeds in 4 $$\\mathrm{m}^2$$ is $$4 \\times 1.3 = 5.2$$. So model as $$X \\sim \\mathrm{Po}(5.2)$$.\n- Step 2: For this scaling to be valid, the **constant rate** condition must hold across the field — weeds must be uniformly distributed on average (not concentrated in wet areas, for example).\n- Step 3: Also **independence** between weeds (not colonising each other) and **singly** (no clumps of root systems counted as one \"weed\" vs. individuals).\n- Step 4: If the density varies (e.g., wetter at one end), the Poisson model would require either a smaller homogeneous sub-plot, or a non-homogeneous Poisson (with varying rate).\n\nTakeaway: Rate per unit area scales linearly with total area — but only if density is uniform across the area.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": true}, {"question": "Give a \"quick test\" you'd apply to any real-world scenario to decide if Poisson is worth considering. (5 steps)", "answer": "- Step 1: **Is the variable a count?** Poisson is for non-negative integers.\n- Step 2: **Is it count of events in a fixed interval (time/space)?** If yes, Poisson is a candidate.\n- Step 3: **Could events occur at any moment, many of them possible?** Rules out binomial (fixed $$n$$).\n- Step 4: **Are events roughly independent, sparse, and uniformly rated?** If yes, Poisson is likely appropriate.\n- Step 5: **Do you have data?** Check if sample mean $$\\approx$$ sample variance. If yes, strong evidence for Poisson.\n\nTakeaway: Count + continuous interval + no natural upper limit + independence + uniformity = Poisson candidate.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": true}, {"question": "Why is the Poisson PMF sometimes written using $$\\mu$$ or $$m$$ instead of $$\\lambda$$? Are these different parameters? (4 steps)", "answer": "- Step 1: They're just notation conventions — $$\\lambda$$, $$\\mu$$, $$m$$ all represent the same thing: the mean (and variance) of the distribution.\n- Step 2: $$\\lambda$$ (lambda) is the most common in physics and engineering; $$\\mu$$ (mu) is common in statistics (as it's the \"mean\" symbol generally); $$m$$ is a plainer alternative.\n- Step 3: In the Edexcel syllabus, $$\\lambda$$ is standard. In the additive property, we use $$\\lambda$$ and $$\\mu$$ for two different Poissons to distinguish them.\n- Step 4: The key is context — always state your notation at the start of a problem.\n\nTakeaway: Symbols vary, but the concept is singular: the Poisson parameter is the mean per interval.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": false}, {"question": "Explain the subtle difference between the \"Poisson distribution\" and a \"Poisson process\". (4 steps)", "answer": "- Step 1: \"Poisson distribution\" is a probability distribution over the COUNT of events — a discrete random variable $$X$$ taking values 0, 1, 2, ...\n- Step 2: \"Poisson process\" is a stochastic process describing the entire time series: when each event occurs. It generates infinitely many possible event times; the count over any interval is Poisson.\n- Step 3: At A-level, we mostly use the Poisson distribution — looking at counts in fixed intervals. The full Poisson process (with its continuous time structure) is more advanced.\n- Step 4: The relationship: a Poisson process with rate $$\\lambda$$ generates a Poisson distribution with parameter $$\\lambda t$$ for the count over $$[0, t]$$.\n\nTakeaway: Poisson distribution is about counts; Poisson process is about the full temporal structure. The distribution is a slice of the process.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": true}, {"question": "What happens to a Poisson distribution as $$\\lambda \\to 0$$? And $$\\lambda \\to \\infty$$? (4 steps)", "answer": "- Step 1: As $$\\lambda \\to 0$$: $$P(X = 0) = e^{-\\lambda} \\to 1$$, and all other probabilities $$\\to 0$$. The distribution collapses to a point mass at 0 — essentially certain of no events.\n- Step 2: As $$\\lambda \\to \\infty$$: the distribution shifts right and spreads out. The standardised variable $$(X - \\lambda)/\\sqrt{\\lambda}$$ converges in distribution to a standard normal.\n- Step 3: So for large $$\\lambda$$, Poisson can be approximated by a normal distribution $$N(\\lambda, \\lambda)$$. (This is the normal approximation to Poisson, used for moderate-to-large rates.)\n- Step 4: Rule of thumb: for $$\\lambda \\geq 20$$ (some say 10), the normal approximation is reasonable.\n\nTakeaway: $$\\lambda \\to 0$$: all mass at zero; $$\\lambda \\to \\infty$$: looks normal around $$\\lambda$$ with SD $$\\sqrt{\\lambda}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": true}, {"question": "A student wants to compute $$P(X \\leq 3)$$ for $$X \\sim \\mathrm{Po}(0.84)$$ using tables — but tables start at $$\\lambda = 0.5$$ and go up in steps of 0.5. What should they do? (4 steps)", "answer": "- Step 1: If $$\\lambda$$ isn't tabulated, don't use tables! Use the Poisson PMF formula directly with a calculator.\n- Step 2: $$P(X \\leq 3) = P(X=0) + P(X=1) + P(X=2) + P(X=3)$$, computing each term with $$\\lambda = 0.84$$.\n- Step 3: Modern calculators have a built-in Poisson PDF and CDF function — use it for non-tabulated $$\\lambda$$.\n- Step 4: Never \"round\" $$\\lambda$$ to the nearest tabulated value — that introduces unnecessary approximation error.\n\nTakeaway: Tables are convenient only for tabulated $$\\lambda$$s; use the formula or calculator otherwise.", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": true}, {"question": "Why is $$\\mathrm{Po}(\\lambda)$$ sometimes said to generalise the binomial \"all-or-nothing\" philosophy? (4 steps)", "answer": "- Step 1: Both distributions are about counting \"successes\" (events) in some setup. The difference is what constrains the count.\n- Step 2: Binomial has $$n$$ predetermined trials; Poisson has a continuous \"trial time\" where the chance of success in each tiny interval is proportional to $$\\lambda \\cdot dt$$.\n- Step 3: In the Binomial $$\\to$$ Poisson limit, we break the time interval into many tiny sub-intervals, each a rare-success Bernoulli trial. The count of successes becomes Poisson.\n- Step 4: So Poisson captures the idea of \"infinitely many opportunities, each infinitesimally likely\" — a natural limit of Binomial when $$n \\to \\infty$$ and $$p \\to 0$$.\n\nTakeaway: Poisson i
