<script>
const DATA={"selected": [{"question": "Cars pass an observation point at Poisson rate 2 per 5-minute interval; other vehicles pass at Poisson rate 3 per 15-minute interval. To find the probability of exactly 5 vehicles (any type) in a 10-minute interval, describe how to set up the combined Poisson model. (3 steps)", "answer": "- Step 1: First scale both rates to the same 10-minute interval:\n+ Cars: $$\\frac{10}{5} \\times 2 = 4$$ per 10 minutes, so $$X_1 \\sim \\mathrm{Po}(4)$$\n+ Other vehicles: $$\\frac{10}{15} \\times 3 = 2$$ per 10 minutes, so $$Y_1 \\sim \\mathrm{Po}(2)$$\n- Step 2: Since the two processes are independent and now measured over the same 10-minute interval, we can add: $$X_1 + Y_1 \\sim \\mathrm{Po}(4 + 2) = \\mathrm{Po}(6)$$.\n- Step 3: Compute $$P(X_1 + Y_1 = 5)$$ using the Poisson PMF or tables with $$\\lambda = 6$$.\n\nTakeaway: When combining Poissons, always rescale to the same interval first, then sum parameters.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "In a data set, the sample mean is close to the sample variance. Why does this strongly suggest a Poisson distribution is a suitable model? (3 steps)", "answer": "- Step 1: For a Poisson distribution $$X \\sim \\mathrm{Po}(\\lambda)$$, we have $$E(X) = \\lambda$$ AND $$\\mathrm{Var}(X) = \\lambda$$. So the mean and variance are theoretically equal.\n- Step 2: Most other distributions do not have this property. For example, for a binomial $$\\mathrm{B}(n,p)$$, $$E(X) = np$$ but $$\\mathrm{Var}(X) = np(1-p) < np$$ (variance is smaller than mean).\n- Step 3: So if sample mean $$\\bar{x}$$ and sample variance $$s^2$$ are close, this is a fingerprint consistent with Poisson. Conversely, if they differ substantially, Poisson is probably a poor fit (over-dispersion or under-dispersion).\n\nTakeaway: The mean-equals-variance property is a diagnostic test for Poisson — it's the distribution's signature.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "If $$X \\sim Po(5)$$ and $$Y \\sim Po(3)$$ are independent, explain why $$X - Y$$ does NOT follow a Poisson distribution. (2 steps)", "answer": "- Step 1: A Poisson distribution only takes non-negative integer values ($$0, 1, 2, \\dots$$). However, since $$Y$$ can be larger than $$X$$, the difference $$X - Y$$ can be negative.\n- Step 2: Furthermore, while the mean of $$X-Y$$ would be $$5-3=2$$, the variance of $$X-Y$$ is $$5+3=8$$ (variances add even for independent differences). A Poisson distribution requires the mean and variance to be equal, which is not the case here (2 ≠ 8).", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "Why is it meaningful to report that Poisson's mode (most likely outcome) is near the mean, whereas this is also true for the normal distribution? Why highlight it for Poisson? (3 steps)", "answer": "- Step 1: For the normal distribution, the peak is exactly at the mean by symmetry, so saying \"mode ≈ mean\" is trivial.\n- Step 2: For Poisson, the distribution is right-skewed, so the mode could in principle be far from the mean. That it lies at $$\\lfloor \\lambda \\rfloor$$ — the integer just below $$\\lambda$$ — is a nontrivial and useful fact.\n- Step 3: It also tells us the Poisson is tightly organised around its mean despite the skew. The asymmetry matters mainly in the tails, not the centre.\n\nSo the mode ≈ mean fact is more informative for Poisson because of the skew, not despite it.", "source": "Opus 4.7 ①", "_id": "opus_1_73"}, {"question": "How does the PGF prove that the sum of independent Poissons is Poisson? (3 steps)", "answer": "- Step 1: If $$X$$ and $$Y$$ are independent, the PGF of $$X+Y$$ is the **product** of their PGFs: $$G_{X+Y}(t) = G_X(t) \\cdot G_Y(t)$$. This is because for independent variables, $$\\text{E}(t^{X+Y}) = \\text{E}(t^X) \\cdot \\text{E}(t^Y)$$.\n- Step 2: For $$X \\sim \\text{Po}(\\lambda)$$ and $$Y \\sim \\text{Po}(\\mu)$$:\n$$G_{X+Y}(t) = e^{\\lambda(t-1)} \\cdot e^{\\mu(t-1)} = e^{(\\lambda+\\mu)(t-1)}$$\n- Step 3: This is the PGF of $$\\text{Po}(\\lambda+\\mu)$$! Since the PGF uniquely determines the distribution, $$X + Y \\sim \\text{Po}(\\lambda + \\mu)$$. The proof is beautifully simple — just multiply two exponentials and read off the combined parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_78"}, {"question": "In Poisson, the rate $$\\lambda$$ is the only parameter. Does this mean Poisson is a \"rigid\" model? Why or why not, in practice? (4 steps)", "answer": "- Step 1: Mathematically, yes — one parameter fully determines the distribution. Once $$\\lambda$$ is fixed, all probabilities are determined.\n- Step 2: But practically, $$\\lambda$$ can depend on context (time of day, location, condition). So different intervals/settings can have different $$\\lambda$$s, making the overall model flexible.\n- Step 3: For a single homogeneous interval, the rigidity is a feature — mean and variance are forced to be equal, which is a testable prediction. If data violates this, we know Poisson is wrong.\n- Step 4: More flexible models (negative binomial) introduce a second parameter, but at the cost of interpretability and simplicity.\n\nTakeaway: Poisson's single parameter is its strength (simplicity, testability) and its weakness (can't handle over-dispersion); use it when its assumptions hold.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "Explain conceptually why $$\\operatorname{Var}(X) = \\lambda$$ for a Poisson distribution. (3 steps)", "answer": "- Step 1: Compute $$E(X(X-1)) = \\sum x(x-1)\\frac{e^{-\\lambda}\\lambda^x}{x!}$$. Using $$\\frac{x(x-1)}{x!} = \\frac{1}{(x-2)!}$$ and the same reindexing trick, this collapses to $$\\lambda^2$$.\n- Step 2: So $$E(X^2) = E(X(X-1)) + E(X) = \\lambda^2 + \\lambda$$.\n- Step 3: Therefore $$\\operatorname{Var}(X) = E(X^2) - (E(X))^2 = \\lambda^2 + \\lambda - \\lambda^2 = \\lambda$$.\n\nThe deeper reason: in a Poisson *process*, events in disjoint sub-intervals are independent, so variances add just as means add — giving variance proportional to interval length, i.e., equal to the mean.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "A patient arrives at A&E at 11:00 am. Calls arrive at rate 5/hour. Find the probability the next patient arrives before 11:15 am. What conceptual shift is needed here? (3 steps)", "answer": "- Step 1: This question asks about the **time until the next event**, not the count of events. We need to shift from \"how many events?\" (Poisson count) to \"how long until the first event?\" (exponential waiting time).\n- Step 2: The probability that **zero** patients arrive in 15 minutes = $$e^{-\\lambda}$$ where $$\\lambda = 5 \\times \\frac{15}{60} = 1.25$$. So $$\\text{P}(\\text{no arrivals in 15 min}) = e^{-1.25}$$.\n- Step 3: The probability the next patient arrives **before** 11:15 is the complement: $$\\text{P}(\\text{at least 1 arrival in 15 min}) = 1 - e^{-1.25} \\approx 1 - 0.2865 = 0.7135$$. This connects the Poisson distribution to the exponential distribution: the waiting time for the first event is exponentially distributed with the same rate parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_62"}, {"question": "A shop sells desktops at rate 2.4 per day and laptops at rate 1.6 per day. Describe how to model the joint probability of \"at least 2 desktops AND at least 2 laptops\" in a single day. (4 steps)", "answer": "- Step 1: We have two independent Poisson processes: $$D$$ for desktops with $$D \\sim \\mathrm{Po}(2.4)$$ and $$L$$ for laptops with $$L \\sim \\mathrm{Po}(1.6)$$.\n- Step 2: The joint event \"$$D \\geq 2$$ AND $$L \\geq 2$$\" has probability $$P(D \\geq 2) \\times P(L \\geq 2)$$ — by independence, the joint probability is the product.\n- Step 3: Compute each separately from Poisson tables or formulas:\n+ $$P(D \\geq 2) = 1 - P(D = 0) - P(D = 1)$$\n+ $$P(L \\geq 2) = 1 - P(L = 0) - P(L = 1)$$\n- Step 4: Multiply: answer is $$P(D \\geq 2) \\cdot P(L \\geq 2)$$.\n\nTakeaway: Independent Poissons multiply probabilities for joint events; don't add rates unless the quantity of interest is the sum.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "For a Poisson distribution with $$\\lambda = 3$$, describe how to quickly determine the ratio $$P(X = 4) / P(X = 3)$$, and what this tells us about the distribution's shape. (4 steps)", "answer": "- Step 1: $$\\frac{P(X=4)}{P(X=3)} = \\frac{\\lambda^4/4!}{\\lambda^3/3!} = \\frac{\\lambda}{4}$$.\n- Step 2: Substituting $$\\lambda = 3$$: ratio = 3/4.\n- Step 3: So $$P(X = 4)$$ is 75% as large as $$P(X = 3)$$ — probabilities are falling as we move past the mode.\n- Step 4: General pattern: $$\\frac{P(X = k+1)}{P(X = k)} = \\frac{\\lambda}{k+1}$$. When $$k + 1 < \\lambda$$, probabilities rise; when $$k + 1 > \\lambda$$, they fall. Here $$k + 1 = 4 > 3 = \\lambda$$, so we're past the peak.\n\nTakeaway: The ratio $$\\lambda / (k+1)$$ tells us whether we're before or after the Poisson's peak — a quick way to understand the distribution's shape.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "Why is independence essential in the additive property of Poisson variables?", "answer": "Without independence, knowing one count reveals something about the other, so the joint behaviour isn't purely random. The elegant convolution of two independent Poissons into one Poisson relies on all the cross-terms vanishing in exactly the right way. If $$X$$ and $$Y$$ share a common driver (e.g., both caused by the same surge event), the sum can be overdispersed or skewed and won't follow Poisson. Always question whether \"two event streams\" are genuinely independent or hiddenly coupled.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "Cars pass a point at a rate of 2 per 5 minutes, and other vehicles pass at a rate of 3 per 15 minutes. A student writes $$X + Y \\sim \\mathrm{Po}(2 + 3) = \\mathrm{Po}(5)$$ for the total vehicles in a 10-minute interval. What is wrong? (3 steps)", "answer": "- Step 1: The parameters must refer to the same time interval before they can be added. Here, the car rate is given per 5 minutes and the other-vehicle rate is given per 15 minutes. You cannot add rates from different interval lengths directly.\n- Step 2: Convert both to the same interval. For a 10-minute interval: cars arrive at rate $$\\frac{10}{5} \\times 2 = 4$$, so $$X \\sim \\mathrm{Po}(4)$$. Other vehicles arrive at rate $$\\frac{10}{15} \\times 3 = 2$$, so $$Y \\sim \\mathrm{Po}(2)$$.\n- Step 3: Now $$X + Y \\sim \\mathrm{Po}(4 + 2) = \\mathrm{Po}(6)$$. The student's answer of $$\\mathrm{Po}(5)$$ was wrong because they added parameters from different time scales. Always rescale to a common interval before adding.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "Why is \"at least 5 accidents each month in a 2-month span\" different from \"at least 10 accidents over 2 months\"? (3 steps)", "answer": "- Step 1: $$P(\\text{at least 5 each month}) = P(\\text{month 1} \\ge 5) \\times P(\\text{month 2} \\ge 5)$$ by independence. Requires **both** counts to be high.\n- Step 2: $$P(\\text{at least 10 total}) = P(\\operatorname{Po}(2\\lambda) \\ge 10)$$. Requires just the **sum** to be high — could be achieved by one very busy month and one very quiet one.\n- Step 3: These impose different constraints. Typically the \"both high\" event is a subset of \"total high,\" so its probability is smaller. Conflating them is a reading error, not a computational one.\n\nMoral: read the question carefully — \"each\" vs \"total\" are totally different conditions.", "source": "Opus 4.7 ①", "_id": "opus_1_62"}, {"question": "Is it a strict requirement that Poisson events be \"rare\"? (3 steps)", "answer": "- Step 1: Poisson itself doesn't require rarity — $$\\lambda$$ can be any positive real number, and counts can be arbitrarily large.\n- Step 2: However, Poisson often *arises* in rare-event settings because it's the limit of $$\\operatorname{B}(n, p)$$ for large $$n$$, small $$p$$. \"Rare\" refers to the microscopic rate per infinitesimal subinterval, not the overall expected count.\n- Step 3: For large $$\\lambda$$ (say 500/day), events aren't rare in any everyday sense, but Poisson can still apply structurally — though you'd typically switch to the normal approximation for computations.\n\nSo \"rare\" describes the microscopic setup, not the macroscopic outcome.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "Why is it important that the sample mean and sample variance are close when assessing a Poisson fit, rather than just checking that the data looks roughly bell-shaped or that the mean is a reasonable number? (2 steps)", "answer": "- Step 1: Many distributions can produce roughly bell-shaped data or have a \"reasonable\" mean. The equality of mean and variance is a *specific, distinctive* property of the Poisson. For example, a binomial distribution with the same mean would have a smaller variance; a negative binomial would have a larger variance. Only the Poisson has mean exactly equal to variance.\n- Step 2: Checking mean $$\\approx$$ variance is a *necessary* (though not sufficient) condition for the Poisson to be a good model. If this condition fails, the Poisson is almost certainly wrong, regardless of how the histogram looks. If it holds, the Poisson is plausible, though further checks (like goodness-of-fit tests) would provide more confidence.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "Show in detail how $$\\operatorname{B}(n, p)$$ with $$np = \\lambda$$ fixed and $$n \\to \\infty$$ produces the Poisson PMF. (5 steps)", "answer": "- Step 1: Start with $$P(X=k) = \\binom{n}{k}p^k(1-p)^{n-k}$$. Substitute $$p = \\lambda/n$$.\n- Step 2: Expand the binomial coefficient: $$\\binom{n}{k} = \\dfrac{n(n-1)\\cdots(n-k+1)}{k!}$$. For large $$n$$, the numerator is approximately $$n^k$$.\n- Step 3: Combine with $$p^k = (\\lambda/n)^k$$: $$\\binom{n}{k} p^k \\approx \\dfrac{n^k}{k!}\\cdot\\dfrac{\\lambda^k}{n^k} = \\dfrac{\\lambda^k}{k!}$$.\n- Step 4: For the \"no-event\" factor: $$(1-p)^{n-k} = \\left(1 - \\dfrac{\\lambda}{n}\\right)^{n-k} \\to e^{-\\lambda}$$ as $$n \\to \\infty$$, using the standard limit $$(1 - x/n)^n \\to e^{-x}$$.\n- Step 5: Multiplying the two pieces gives $$P(X=k) \\to \\dfrac{e^{-\\lambda}\\lambda^k}{k!}$$ — the Poisson PMF.\n\nThis derivation is the foundation for why Poisson arises everywhere — it's the natural limit of \"many trials, each rare.\"", "source": "Opus 4.7 ①", "_id": "opus_1_68"}, {"question": "Compare the Poisson and binomial for modelling \"number of typos per page\" of a book, assuming each character has probability 0.001 of being a typo, and there are ~2000 characters per page. (5 steps)", "answer": "- Step 1: The binomial approach: each character is a Bernoulli trial with $$p = 0.001$$; there are $$n = 2000$$ characters per page. So errors per page $$\\sim \\mathrm{B}(2000, 0.001)$$.\n- Step 2: Binomial parameters: mean $$np = 2$$, variance $$np(1-p) \\approx 2 \\cdot 0.999 = 1.998$$. Mean and variance almost equal.\n- Step 3: The Poisson approximation: since $$n$$ is large and $$p$$ is small, use $$\\mathrm{Po}(np) = \\mathrm{Po}(2)$$. This has mean = variance = 2.\n- Step 4: The two distributions agree almost perfectly for this case because $$(1-p) \\approx 1$$. For practical purposes, Poisson is easier (one parameter) and accurate.\n- Step 5: The key simplification: in Poisson, we don't need to track $$n$$ at all — we just need the rate per page.\n\nTakeaway: When trials are many and success is rare, Poisson with $$\\lambda = np$$ is an excellent approximation to Binomial and much simpler.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "A student computes $$P(X \\geq 2) = 1 - P(X \\leq 2)$$. What's the error, and what should they have written? (4 steps)", "answer": "- Step 1: The error is subtle but important: $$P(X \\geq 2)$$ INCLUDES $$X = 2$$, but $$1 - P(X \\leq 2)$$ EXCLUDES it (because $$P(X \\leq 2)$$ already includes $$X=2$$).\n- Step 2: So $$1 - P(X \\leq 2)$$ actually equals $$P(X \\geq 3)$$, not $$P(X \\geq 2)$$.\n- Step 3: The correct expression is $$P(X \\geq 2) = 1 - P(X \\leq 1)$$, leaving $$X = 2$$ in the \"upper tail\" half.\n- Step 4: Quick test to avoid this: write out what $$P(X \\leq k)$$ includes, then check which integers are left over when you complement.\n\nTakeaway: For discrete distributions, complement at the BOUNDARY BELOW the inequality, not at the inequality itself.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Why is the condition \"events occur at a constant average rate\" equivalent to saying \"the mean number of events is proportional to the length of the interval\"? (2 steps)", "answer": "- Step 1: If events occur at a constant average rate of $$\\lambda$$ per unit time (e.g., 4 events per hour), then in an interval of length $$t$$ units, the expected number of events is $$\\lambda \\times t$$. This is direct proportionality: double the interval length, double the expected count.\n- Step 2: This is why we can scale the Poisson parameter. If $$X \\sim \\text{Po}(4)$$ models events per hour, then events per 90 minutes are modelled by $$Y \\sim \\text{Po}(4 \\times 1.5) = \\text{Po}(6)$$. The rate is \"4 per 60 minutes = 1 per 15 minutes,\" and 90 minutes contains six such 15-minute units. Without constant rate, this scaling would be meaningless — you couldn't predict the mean for a different interval length.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "Explain why the additive property requires the random variables to be defined over the **same** interval. What would go wrong otherwise? (4 steps)", "answer": "- Step 1: The parameter $$\\lambda$$ of a Poisson distribution is an event-count per specific interval. If $$X \\sim \\mathrm{Po}(2)$$ is phone calls in 10 minutes and $$Y \\sim \\mathrm{Po}(3)$$ is emails in 1 hour, then $$X + Y$$ has no natural interpretation — it's counting apples plus oranges.\n- Step 2: The \"interval\" doesn't have to be time — it could be space, volume, or any scale — but it must be the same for both variables.\n- Step 3: To combine processes measured on different scales, first rescale to a common interval using the constant-rate assumption, then sum the (now consistent) rates.\n- Step 4: If you naively add $$\\mathrm{Po}(2) + \\mathrm{Po}(3)$$ when the intervals are different, you'll incorrectly claim $$\\mathrm{Po}(5)$$ events per... per what?\n\nTakeaway: Poisson rates only add when the rates are measured over identical intervals; otherwise the sum has no well-defined physical meaning.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Why might a Poisson model be unsuitable for modeling earthquakes in a year? (1 step)", "answer": "Earthquakes often cluster (aftershocks violate independence) and occur in bursts (not singly), violating Poisson assumptions.", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "Why is the \"singly\" condition important for the Poisson model? Give an example where this condition is violated, and explain the consequence. (2 steps)", "answer": "- Step 1: The \"singly\" condition requires that events occur one at a time — you cannot have two or more events happening at the same instant. This is what allows the Poisson process to be built from the limit of many small intervals, each with at most one event. Mathematically, in an infinitesimally small interval, the probability of two or more events is negligibly small compared to the probability of exactly one.\n- Step 2: Violation example: Cars passing a checkpoint might arrive in convoys (groups of 3-4 cars travelling together). In a tiny time window, you'd get multiple cars simultaneously, violating the \"singly\" condition. The consequence is that the variance would be larger than the mean (a phenomenon called **overdispersion**), and the Poisson model would underestimate the probability of both very low and very high counts.\n+ Conversely, if events are \"repelled\" (one event makes the next less likely in a short window), the variance would be less than the mean (**underdispersion**), also violating the Poisson assumption.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "Prove that $\\sum_{x=0}^{\\infty} P(X=x) = 1$ for a Poisson distribution. (3 steps)", "answer": "- Step 1: Start with the sum of probabilities:\n$$\\sum_{x=0}^{\\infty} P(X=x) = \\sum_{x=0}^{\\infty} \\frac{e^{-\\lambda} \\lambda^x}{x!}$$\n\n- Step 2: Factor out $e^{-\\lambda}$:\n$$= e^{-\\lambda} \\sum_{x=0}^{\\infty} \\frac{\\lambda^x}{x!}$$\n\n+ This is the Taylor series expansion of $e^\\lambda$, which equals $1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\ldots$\n\n- Step 3: Apply the exponential series:\n$$= e^{-\\lambda} \\cdot e^\\lambda = e^0 = 1$$\n\nThis confirms the Poisson pmf is a valid probability distribution that sums to 1.", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "For $$X \\sim \\mathrm{Po}(7.5)$$, you are told that $$\\mathrm{P}(X \\leq a) = 0.2414$$. How do you find the value of $$a$$, and what type of values can $$a$$ take? (2 steps)", "answer": "- Step 1: Look up the cumulative probabilities in the table for $$\\lambda = 7.5$$. Scan the column until you find the value $$0.2414$$. The table shows $$\\mathrm{P}(X \\leq 5) = 0.2414$$, so $$a = 5$$.\n- Step 2: Since $$X$$ is a discrete integer-valued random variable, $$a$$ must be a non-negative integer. You cannot have $$a = 5.3$$, for instance, because $$X$$ only takes integer values. If the given probability doesn't appear exactly in the table, you would find the integer $$a$$ for which $$\\mathrm{P}(X \\leq a)$$ is closest to or satisfies the stated condition.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "An elevator broke down twice last week. Does this information change the probability of a breakdown next week? What Poisson property is relevant? (2 steps)", "answer": "- Step 1: **No, it does not change the probability.** This is because of the **independence** property of Poisson events. The number of events in one interval is independent of the number in any other non-overlapping interval.\n- Step 2: This is often called the **\"memoryless\"** property of Poisson processes. Knowing the past gives no information about the future (unlike, say, a Markov chain where state matters, or a situation with wear-and-tear where recent breakdowns might indicate a worsening condition). If the model truly holds, $$\\text{P}(\\text{breakdown next week})$$ is still based on $$\\text{Po}(0.75)$$ regardless of what happened last week.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "A student collects data and finds the sample mean is 2.1 and the sample variance is 5.8. They claim \"since the data is discrete and counts events, I should use a Poisson model.\" Evaluate this claim. (2 steps)", "answer": "- Step 1: The claim is not justified. While the data involves counts (a necessary condition for Poisson), the sample variance (5.8) is much larger than the sample mean (2.1) — nearly three times as large. This is strong evidence of overdispersion.\n- Step 2: For a Poisson model to be appropriate, we need mean $$\\approx$$ variance. The large discrepancy here suggests the underlying process violates at least one Poisson condition — most likely independence (events may be clustered) or constant rate (the rate may vary across observations). A Poisson model would significantly underestimate the variability in this data, leading to poor predictions of extreme values.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "A student reasons: \"Since the Poisson has no upper limit, it can model any counting situation.\" Give two scenarios where the Poisson is clearly inappropriate, each violating a different condition. (2 steps)", "answer": "- Step 1: **Violating independence**: Modelling the number of people catching a contagious disease in a town. Once one person is infected, they increase the probability of others being infected. The events are not independent — one event directly influences the probability of subsequent events. An appropriate model might be something with variance greater than the mean.\n- Step 2: **Violating constant rate**: Modelling the number of customers entering a shop over a full 24-hour period. The rate is much higher during the day than at 3 AM. Since the average rate is not constant across the interval, a single Poisson with fixed $$\\lambda$$ is inappropriate. You would need to split the day into periods with roughly constant rates, or use a non-homogeneous Poisson process.\n+ **Violating singly**: Modelling the number of people arriving at a cinema when groups of friends arrive together. Multiple people arrive at the same instant, violating the \"one at a time\" requirement.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "What are the mean and variance of $$X \\sim \\text{Po}(\\lambda)$$? Why is the equality of mean and variance such a powerful diagnostic tool? (3 steps)", "answer": "- Step 1: For $$X \\sim \\text{Po}(\\lambda)$$: $$\\text{E}(X) = \\lambda$$ and $$\\text{Var}(X) = \\lambda$$. The mean and variance are **equal** — both are the single parameter $$\\lambda$$.\n- Step 2: This is a **diagnostic test** for whether Poisson is a suitable model. If you collect data and compute the sample mean and sample variance, and they are approximately equal, this supports the Poisson model. If the variance is much larger than the mean (\"overdispersion\"), events may be clustered or correlated. If the variance is much smaller (\"underdispersion\"), events may be too regular (e.g., scheduled rather than random).\n- Step 3: Compare with other distributions: for a binomial $$\\text{B}(n,p)$$, the variance $$np(1-p)$$ is always less than the mean $$np$$. For a uniform distribution on $$\\{1,2,...,n\\}$$, the variance depends on $$n$$ independently of the mean. The **mean = variance** property is unique to Poisson and serves as its fingerprint.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "If $X \\sim \\text{Po}(\\lambda)$, what is the probability generating function (PGF)? How does this relate to $E(X)$ and $\\operatorname{Var}(X)$? (2 steps)", "answer": "- Step 1: The PGF is $G_X(t) = E(t^X) = \\sum_{x=0}^{\\infty} t^x \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!} = e^{-\\lambda} \\sum_{x=0}^{\\infty} \\frac{(\\lambda t)^x}{x!} = e^{-\\lambda} e^{\\lambda t} = e^{\\lambda(t-1)}$\n\n- Step 2: Key property: $G_X'(1) = E(X) = \\lambda$, and $G_X''(1) + G_X'(1) - [G_X'(1)]^2 = \\text{Var}(X) = \\lambda$\n\nThis is a more advanced view: the PGF completely characterizes the distribution, and its derivatives at $t=1$ give moments. The Poisson PGF has the simple form $e^{\\lambda(t-1)}$.", "source": "MiniMax ①", "_id": "minimax_1_31"}, {"question": "What kind of real-world phenomena is the Poisson distribution designed to model, and what distinguishes it from a setting like \"flip a coin 10 times\"? (3 steps)", "answer": "- Step 1: The Poisson distribution models the **count of events occurring within a fixed interval** of time or space — phone calls per hour, meteor strikes per night, typos per page.\n- Step 2: Unlike a binomial experiment, there are **no discrete \"trials\"**. Events arrive continuously, and in principle the count has no fixed upper bound.\n- Step 3: The focus is on a **rate** (events per unit interval), not on a fixed number of attempts with success probability $$p$$. Given this rate, the distribution tells you how probable each possible total count is.\n\nKey takeaway: Poisson = \"how many rare-ish events per interval\"; binomial = \"how many successes in a fixed batch of trials.\"", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "A company director receives personal emails at rate 1.8/hour, business emails at rate 3.7/hour, and advertising emails at rate 1.5/hour (all independent Poisson processes). What is the distribution of the total number of emails in an 8-hour working day, and qualitatively, would you expect more than 50 emails to be likely or unlikely? (3 steps)", "answer": "- Step 1: The total rate per hour is $$1.8 + 3.7 + 1.5 = 7.0$$ emails/hour. By the additive property, the total per hour follows $$\\mathrm{Po}(7)$$.\n- Step 2: For an 8-hour day: $$\\lambda = 7 \\times 8 = 56$$. So the total emails in a day follows $$\\mathrm{Po}(56)$$.\n- Step 3: The mean is 56 and the standard deviation is $$\\sqrt{56} \\approx 7.5$$. The value 50 is less than 1 standard deviation below the mean, so $$\\mathrm{P}(X > 50)$$ is reasonably high (in fact about 0.79). More than 50 emails is quite likely — it would be more surprising to get 50 or fewer.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "Why is the Poisson distribution suitable for modelling radioactive decay emissions, telephone calls, and spelling mistakes, but NOT suitable for modelling the number of heads when flipping a biased coin 20 times? (2 steps)", "answer": "- Step 1: Poisson is appropriate for radioactive decay, calls, and mistakes because these events:\n- Occur independently (one emission doesn't cause another)\n- Occur singly (one emission at a time)\n- At a constant average rate\n\n- Step 2: For 20 coin flips, we have a fixed number of trials ($n=20$) with exactly two outcomes per trial. This is a binomial situation, not Poisson. The key difference: Poisson has no fixed upper limit (theoretically infinite), while coin flips have a fixed $n$.\n\nPoisson is for \"arrivals\" or \"occurrences\" in continuous time/space; binomial is for fixed numbers of trials.", "source": "MiniMax ①", "_id": "minimax_1_25"}, {"question": "If an elevator breaks down at mean rate 3 times per 4-week period, and it broke down TWICE last week, what's the probability of breakdown next week? Explain the surprising result. (5 steps)", "answer": "- Step 1: Rescale to one week: mean is $$\\frac{1}{4} \\times 3 = 0.75$$ per week. So $$X \\sim \\mathrm{Po}(0.75)$$ for a single week.\n- Step 2: $$P(X \\geq 1) = 1 - P(X=0) = 1 - e^{-0.75}$$ for any week.\n- Step 3: Critical insight: by the INDEPENDENCE assumption of the Poisson model, next week is still $$\\mathrm{Po}(0.75)$$ — last week's two breakdowns do NOT change it!\n- Step 4: This is counterintuitive but correct: Poisson is \"memoryless\" across disjoint intervals. Each week is an independent sample.\n- Step 5: Reality check: in practice, a machine that just broke down twice may actually be more likely to break down (wear and tear, cascading failures) — violating independence. The Poisson model would then be wrong!\n\nTakeaway: Poisson implies that past events don't affect future rates — a strong assumption that can be wrong in reality, but is a feature of the model.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "State the mean and variance of $$X \\sim \\operatorname{Po}(\\lambda)$$, and describe what's remarkable about the relationship.", "answer": "Both the mean and the variance equal $$\\lambda$$:\n$$E(X) = \\lambda, \\quad \\operatorname{Var}(X) = \\lambda$$\n\nWhat's remarkable is that the spread and the centre are **locked together** — both grow at the same rate as $$\\lambda$$ increases. In most distributions you can shift the centre independently of stretching the spread; in Poisson you cannot. This single-parameter constraint is a hallmark of Poisson and a practical diagnostic for whether the model fits data.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "Write the probability mass function for $$X \\sim \\text{Po}(\\lambda)$$. What is the role of each component ($$e^{-\\lambda}$$, $$\\lambda^x$$, and $$x!$$) in this formula? (3 steps)", "answer": "- Step 1: The PMF is $$\\text{P}(X=x) = \\frac{e^{-\\lambda}\\lambda^x}{x!}$$, for $$x = 0, 1, 2, 3, \\ldots$$\n- Step 2: Breaking down the components:\n  + $$e^{-\\lambda}$$: This is a **normalising factor** that ensures all probabilities sum to 1. It also equals $$\\text{P}(X=0)$$ directly — the probability of zero events. The exponential decay reflects that zero events becomes less likely as the rate $$\\lambda$$ increases.\n  + $$\\lambda^x$$: This captures the **\"likelihood contribution\"** of observing $$x$$ events. Each event independently contributes a factor of $$\\lambda$$, so $$x$$ events give $$\\lambda^x$$. Larger $$\\lambda$$ shifts the distribution right.\n  + $$x!$$: This **discounts** for overcounting. The $$\\lambda^x$$ term treats events as if they are distinguishable and ordered, but we only care about the count. The $$x!$$ in the denominator corrects for the fact that the $$x$$ events can be arranged in $$x!$$ orderings — we don't care about order.\n- Step 3: Together, the formula balances the raw likelihood ($$\\lambda^x$$) against the combinatorial discount ($$x!$$), all scaled by the normaliser ($$e^{-\\lambda}$$). As $$x$$ grows, the factorial eventually dominates the power, making very large counts vanishingly rare.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "How does the shape of the Poisson distribution change as $$\\lambda$$ grows from small to large? (3 steps)", "answer": "- Step 1: For small $$\\lambda$$ (say $$< 1$$), the distribution is strongly right-skewed; most mass sits at $$x = 0$$ and $$x = 1$$. The zero count dominates.\n- Step 2: For moderate $$\\lambda$$ (around $$3$$–$$10$$), it becomes more bell-shaped but still with a visible right tail and discrete spikes.\n- Step 3: For large $$\\lambda$$ ($$\\gtrsim 20$$), the shape approaches a **normal distribution** with mean $$\\lambda$$ and standard deviation $$\\sqrt{\\lambda}$$. This is the **Central Limit Theorem** acting on counts.\n\nSo Poisson morphs from spiky-at-zero to symmetric Gaussian-like as $$\\lambda$$ grows.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "A dataset has sample mean $$3.5$$ and sample variance $$7.0$$. Is Poisson plausible, and what might be happening? (3 steps)", "answer": "- Step 1: Poisson requires mean equal to variance. Here variance is about **twice** the mean — significant overdispersion.\n- Step 2: Reject Poisson as a first model. The excess spread suggests **clustering** or **correlation** — e.g., storms bring multiple lightning strikes at once, or machine faults occur in bursts.\n- Step 3: Alternatives: negative binomial (a mixture of Poissons with varying $$\\lambda$$), or a compound/clustered process.\n\nSignature diagnostic: $$\\sigma^2 \\gg \\mu$$ usually kills Poisson on arrival.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "A student computes $$\\mathrm{P}(X \\leq 4)$$ for $$X \\sim \\mathrm{Po}(4.5)$$ using tables, but the tables only have $$\\lambda$$ values in steps of 0.5, and the student's value of 4.5 is available. However, for $$X \\sim \\mathrm{Po}(4.3)$$, the exact value is not in the table. What are the student's options? (2 steps)", "answer": "- Step 1: For $$\\lambda = 4.5$$, the table can be used directly — just look up the row for $$\\lambda = 4.5$$ and the column for $$x = 4$$. This gives $$\\mathrm{P}(X \\leq 4) = 0.4522$$.\n- Step 2: For $$\\lambda = 4.3$$, which is not in the table, the student has two options: (a) use a calculator with the Poisson cumulative distribution function, which can handle any $$\\lambda$$ value; or (b) use linear interpolation between $$\\lambda = 4.0$$ and $$\\lambda = 4.5$$ as an approximation (though this is less accurate). In an exam, calculators are typically permitted, so option (a) is preferred. The tables are a backup for specific values.", "source": "GLM 5.1 ②", "_id": "glm_2_48"}, {"question": "A clinic treats insect bites at a rate of 3 patients per day (modelled as Poisson). The probability of more than 4 patients on a given day is 0.1847. To find the probability that at least 4 out of 5 days have more than 4 patients, you need a second distribution. What is it and why? (3 steps)", "answer": "- Step 1: The question shifts from \"how many patients in a day?\" to \"how many days (out of 5) have a certain property?\" Each day is a trial with two outcomes: \"more than 4 patients\" (success, probability $$p = 0.1847$$) or \"4 or fewer patients\" (failure, probability $$1 - 0.1847$$). This is a binomial setup.\n- Step 2: Let $$Y$$ = number of days (out of 5) with more than 4 patients. Then $$Y \\sim \\mathrm{B}(5, 0.1847)$$. We need $$\\mathrm{P}(Y \\geq 4) = \\mathrm{P}(Y=4) + \\mathrm{P}(Y=5)$$.\n- Step 3: This is a two-stage model: the Poisson gives the per-day probability, which then feeds into the binomial as the success probability. The key insight is recognising when the question has shifted from counting events in an interval (Poisson) to counting how many intervals satisfy a condition (binomial).", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "Walk through the derivation of $$E(X) = \\lambda$$ for $$X \\sim \\operatorname{Po}(\\lambda)$$. (4 steps)", "answer": "- Step 1: From the definition, $$E(X) = \\sum_{x=0}^\\infty x \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!}$$. The $$x = 0$$ term vanishes, so start from $$x = 1$$.\n- Step 2: Use the identity $$\\frac{x}{x!} = \\frac{1}{(x-1)!}$$:\n$$E(X) = \\sum_{x=1}^\\infty \\frac{e^{-\\lambda}\\lambda^x}{(x-1)!}$$\n- Step 3: Factor one $$\\lambda$$ out of $$\\lambda^x$$ and reindex with $$k = x - 1$$:\n$$E(X) = \\lambda \\sum_{k=0}^\\infty \\frac{e^{-\\lambda}\\lambda^k}{k!}$$\n- Step 4: The sum in brackets is the full Poisson PMF summed over all $$k$$, which equals $$1$$. So $$E(X) = \\lambda$$.\n\nThe trick is the index shift — reduce the sum back to the PMF itself.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "A Poisson cumulative distribution table gives $$\\text{P}(X \\leq x)$$ for integer $$x$$. If you need $$\\text{P}(X < b)$$ where $$b$$ is an integer, how do you use the table? (2 steps)", "answer": "- Step 1: For a discrete distribution, $$\\text{P}(X < b)$$ means $$X$$ takes values $$0, 1, 2, \\ldots, b-1$$. This is the same as $$\\text{P}(X \\leq b-1)$$, because the next value up from $$b-1$$ is $$b$$, which is excluded by the strict inequality.\n- Step 2: So look up $$\\text{P}(X \\leq b-1)$$ in the table. For example, if $$b = 8$$ and $$X \\sim \\text{Po}(7.5)$$, then $$\\text{P}(X < 8) = \\text{P}(X \\leq 7) = 0.5246$$. **Common mistake**: looking up $$\\text{P}(X \\leq 8)$$ instead of $$\\text{P}(X \\leq 7)$$ — off by one.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "If $$X \\sim \\operatorname{Po}(\\lambda)$$ and $$Y = X$$ (perfectly correlated), what's the distribution of $$X + Y$$? (3 steps)", "answer": "- Step 1: $$X + Y = 2X$$, which takes only even values (0, 2, 4, …).\n- Step 2: That support is incompatible with any Poisson distribution, which must give positive probability to every non-negative integer.\n- Step 3: So the sum is **not** Poisson — the additive property fails without independence. The mean still satisfies $$E(X+Y) = 2\\lambda$$ (linearity of expectation always holds), but the distribution has changed.\n\nKey reminder: additivity of Poissons is an independence-critical result, not universal.", "source": "Opus 4.7 ①", "_id": "opus_1_63"}, {"question": "Three photocopiers on different floors break down independently at rates 0.4, 0.2, and 0.8 per week respectively. Find the probability that at least one breaks down in a given week. (3 steps)", "answer": "- Step 1: The total breakdown rate is $$\\lambda = 0.4 + 0.2 + 0.8 = 1.4$$ per week. So total breakdowns $$T \\sim \\text{Po}(1.4)$$.\n- Step 2: $$\\text{P}(\\text{at least one breakdown}) = \\text{P}(T \\geq 1) = 1 - \\text{P}(T = 0) = 1 - e^{-1.4}$$.\n- Step 3: $$e^{-1.4} \\approx 0.2466$$, so $$\\text{P}(T \\geq 1) \\approx 1 - 0.2466 = 0.7534$$. Alternatively, you could compute $$\\text{P}(\\text{none break down}) = e^{-0.4} \\times e^{-0.2} \\times e^{-0.8} = e^{-1.4}$$, giving the same result. The additive property of independent Poissons makes the direct approach much simpler.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "Outline a systematic procedure for tackling a Poisson word problem. (5 steps)", "answer": "- Step 1: **Identify and define the random variable** — e.g., \"$$X$$ = number of calls in a 10-minute interval.\" Always write it out explicitly.\n- Step 2: **Check (and perhaps comment on) the conditions** — independent, singly, constant rate.\n- Step 3: **Determine $$\\lambda$$** — scale the given rate to match the interval mentioned in the question.\n- Step 4: **Translate the probability expression** — rewrite the inequality into a form matching your tool (formula, cumulative table, calculator).\n- Step 5: **Compute and interpret** — round sensibly and state the answer in context.\n\nSkipping step 3 (scaling) is the single most common exam mistake.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "For the SAME setup (desktops at rate 2.4, laptops at rate 1.6 per day), describe how to find \"combined total of 6 computers in a single day\". Compare the technique to the previous joint-event question. (4 steps)", "answer": "- Step 1: Now we care about $$D + L$$, not the joint event. Since $$D$$ and $$L$$ are independent Poissons on the same interval, $$D + L \\sim \\mathrm{Po}(2.4 + 1.6) = \\mathrm{Po}(4)$$.\n- Step 2: Compute $$P(D + L = 6) = \\frac{e^{-4}(4)^6}{6!}$$.\n- Step 3: Conceptually: the additive property reduces a two-variable problem to a single Poisson computation. This is a huge simplification!\n- Step 4: Contrast with the joint-event case: there we multiplied separate probabilities (independence); here we add rates (additivity). Different questions $$\\to$$ different techniques.\n\nTakeaway: When the question asks about a SUM of events, use Poisson additivity; when it asks about a COMBINATION of constraints on each, use independence (multiplication).", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "Flaws occur in material at a mean rate of 1.5 per 50 m. The material is sold in 200 m rolls. Five rolls are bought. What is the probability that at least two rolls have fewer than 4 flaws? Walk through the full modelling chain. (4 steps)", "answer": "- Step 1: **Model flaws per roll.** Rate = 1.5 per 50 m, so per 200 m roll: $$\\lambda = 1.5 \\times \\frac{200}{50} = 6$$. So $$X \\sim \\text{Po}(6)$$ where $$X$$ = flaws per roll.\n- Step 2: **Find $$p = \\text{P}(\\text{fewer than 4 flaws})$$** per roll:\n$$p = \\text{P}(X \\leq 3) = 0.1512$$ (from tables with $$\\lambda = 6$$).\n- Step 3: **Model across 5 rolls.** Each roll is an independent trial (yes/no: fewer than 4 flaws?). This is binomial: $$Y \\sim \\text{B}(5, 0.1512)$$ where $$Y$$ = number of rolls with fewer than 4 flaws.\n- Step 4: **Compute:**\n$$\\text{P}(Y \\geq 2) = 1 - \\text{P}(Y \\leq 1) = 1 - [\\text{P}(Y=0) + \\text{P}(Y=1)]$$\n$$= 1 - [(0.8488)^5 + 5(0.1512)(0.8488)^4] \\approx 1 - [0.4378 + 0.3910] = 1 - 0.8288 = 0.1712$$\n\nTakeaway: This is a classic \"Poisson inside, Binomial outside\" structure — Poisson gives the per-unit probability, Binomial counts across multiple units.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "A student claims: \"For rare events, Poisson and Binomial give the same answer.\" Describe when this approximation holds and why. (4 steps)", "answer": "- Step 1: The Binomial-to-Poisson approximation holds when $$n$$ is large and $$p$$ is small, specifically with $$np = \\lambda$$ held fixed. A common rule of thumb: $$n \\geq 50$$ and $$p \\leq 0.1$$.\n- Step 2: Intuition: Poisson originated as the limit of Binomial when we break a time interval into many tiny sub-intervals, each with a small chance of containing an event. As $$n \\to \\infty$$ and $$p \\to 0$$, $$np$$ = rate stays finite, and the Binomial collapses to Poisson.\n- Step 3: Mathematical sketch: $$\\binom{n}{k}p^k(1-p)^{n-k} \\to \\frac{(np)^k}{k!}e^{-np}$$ as $$n \\to \\infty$$, $$p \\to 0$$, $$np \\to \\lambda$$.\n- Step 4: For moderate $$p$$ (e.g., $$p = 0.4$$), the approximation is poor because Binomial has variance $$np(1-p)$$, which differs from its mean $$np$$ — Poisson requires mean = variance.\n\nTakeaway: Poisson approximates Binomial when trials are many and success is rare; the key condition is small $$p$$ so that $$np(1-p) \\approx np$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "What are the implications of the Poisson being \"discrete\"? Why can't we ask for $$P(X = 2.5)$$ or evaluate a density at non-integer points? (4 steps)", "answer": "- Step 1: Poisson models the **count** of events — you can't have 2.5 events; it doesn't make sense physically.\n- Step 2: Mathematically, the PMF $$P(X = x)$$ is defined only for $$x = 0, 1, 2, \\ldots$$; it's undefined (or implicitly zero) for non-integers.\n- Step 3: For continuous analogues, we'd use an exponential distribution (for \"time between events\") or a gamma distribution (for \"time to nth event\") — these have PDFs defined on a continuous domain.\n- Step 4: A related subtle point: for discrete distributions, probability at a point is non-zero (unlike for continuous), so equalities matter — $$P(X \\leq 3) \\neq P(X < 3)$$.\n\nTakeaway: Poisson is intrinsically discrete; for continuous waiting-time questions, use exponential or gamma distributions instead.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Why is $$\\mathrm{Po}(\\lambda)$$ sometimes said to generalise the binomial \"all-or-nothing\" philosophy? (4 steps)", "answer": "- Step 1: Both distributions are about counting \"successes\" (events) in some setup. The difference is what constrains the count.\n- Step 2: Binomial has $$n$$ predetermined trials; Poisson has a continuous \"trial time\" where the chance of success in each tiny interval is proportional to $$\\lambda \\cdot dt$$.\n- Step 3: In the Binomial $$\\to$$ Poisson limit, we break the time interval into many tiny sub-intervals, each a rare-success Bernoulli trial. The count of successes becomes Poisson.\n- Step 4: So Poisson captures the idea of \"infinitely many opportunities, each infinitesimally likely\" — a natural limit of Binomial when $$n \\to \\infty$$ and $$p \\to 0$$.\n\nTakeaway: Poisson is what you get when you make Binomial trials infinitely many and infinitely rare, keeping the rate $$np$$ fixed.", "source": "Opus 4.7 ②", "_id": "opus_2_70"}, {"question": "Given that exactly 10 planes landed at an airport between 2 pm and 3 pm, explain why the probability that exactly 5 of them landed between 2 pm and 2:30 pm follows a Binomial distribution rather than a Poisson distribution. (3 steps)", "answer": "- Step 1: We are no longer asking about the rate of arrivals over an open interval; we have a fixed total number of \"successes\" (10 planes) that occurred in the full hour.\n- Step 2: Each of these 10 planes had a 30-minute window out of a 60-minute total window to land in the first half. Thus, the probability of any single plane landing in the first half-hour is $$p = \\frac{30}{60} = 0.5$$.\n- Step 3: Since the planes arrive independently, we are counting the number of \"successes\" (landing in the first 30 mins) out of a fixed number of trials (10 planes) with a constant probability of success (0.5). This perfectly matches the conditions for a Binomial distribution, $$X \\sim B(10, 0.5)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "Given $$X \\sim \\operatorname{Po}(\\lambda)$$ with $$P(X = 2) = P(X = 3)$$, describe how to find $$\\lambda$$. (3 steps)", "answer": "- Step 1: Write both probabilities using the PMF:\n$$\\frac{e^{-\\lambda}\\lambda^2}{2!} = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$\n- Step 2: Cancel $$e^{-\\lambda}$$ (same on both sides) and cancel $$\\lambda^2$$:\n$$\\frac{1}{2!} = \\frac{\\lambda}{3!} \\;\\Rightarrow\\; \\lambda = \\frac{3!}{2!} = 3$$\n- Step 3: So $$\\lambda = 3$$. General principle: cancel the exponential, cancel common powers of $$\\lambda$$, then solve a simple factorial relation.\n\nMental shortcut: $$P(X = k) = P(X = k+1)$$ in Poisson $$\\iff \\lambda = k+1$$.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "A botanist counts weeds in 80 squares: $$\\sum x = 295$$, $$\\sum x^2 = 1386$$. Without heavy calculation, would Poisson likely fit? (3 steps)", "answer": "- Step 1: Sample mean is roughly $$\\bar x \\approx 295/80 \\approx 3.7$$.\n- Step 2: Sample variance is approximately $$1386/80 - 3.7^2 \\approx 17.3 - 13.7 \\approx 3.6$$.\n- Step 3: Mean ($$\\approx 3.7$$) and variance ($$\\approx 3.6$$) are very close. This is the classic Poisson fingerprint, so the data supports modelling with $$\\operatorname{Po}(3.7)$$.\n\nMentally checking $$\\bar x \\approx s^2$$ is the quickest way to assess Poisson compatibility — no deep computation needed.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "A rate is given as \"1.5 flaws per 50 m\" of material. Describe how to model the number of flaws in a 200 m roll of the same material. (4 steps)", "answer": "- Step 1: Constant-rate assumption says the number of flaws scales linearly with length. So the mean in a 200 m roll is $$\\frac{200}{50} \\times 1.5 = 6$$ flaws.\n- Step 2: So $$Y$$ = flaws in a 200 m roll follows $$Y \\sim \\mathrm{Po}(6)$$.\n- Step 3: This works because of the equivalence between \"rate per unit length\" and \"rate per unit time\" in the Poisson model — both rely on the same independence and uniformity assumptions.\n- Step 4: Caution: this assumes flaws are independent of each other and occur uniformly along the roll — if there's a defective batch (flaws cluster in one section), Poisson isn't appropriate.\n\nTakeaway: Rates scale linearly with interval length (in time or space) by the constant-rate assumption, so $$\\lambda$$ is adjusted proportionally.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "A sample has mean $$\\approx 5$$ and variance $$\\approx 15$$. What should you conclude about Poisson fit, and what might you try instead? (2 steps)", "answer": "- Step 1: Variance is roughly $$3\\times$$ the mean — significant overdispersion. A Poisson model would systematically underpredict both the tails and the overall spread.\n- Step 2: Consider a **negative binomial** distribution (or a gamma-Poisson mixture). These handle overdispersion by letting $$\\lambda$$ vary across subunits, inflating variance while keeping the count nature of the data.\n\nTakeaway: never force Poisson onto overdispersed data; it's the wrong tool.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "For a Poisson random variable, what is the difference between $$\\mathrm{P}(X < 3)$$, $$\\mathrm{P}(X \\leq 3)$$, and $$\\mathrm{P}(1 < X \\leq 4)$$? Express each in terms of cumulative probabilities or sums of individual probabilities. (3 steps)", "answer": "- Step 1: $$\\mathrm{P}(X < 3)$$ means $$X$$ is strictly less than 3. Since $$X$$ takes integer values, this is $$\\mathrm{P}(X = 0) + \\mathrm{P}(X = 1) + \\mathrm{P}(X = 2) = \\mathrm{P}(X \\leq 2)$$. The key insight: for a discrete integer-valued variable, $$\\mathrm{P}(X < k) = \\mathrm{P}(X \\leq k-1)$$.\n- Step 2: $$\\mathrm{P}(X \\leq 3)$$ means $$X = 0, 1, 2,$$ or $$3$$. This is directly available from cumulative tables: $$\\mathrm{P}(X \\leq 3)$$.\n- Step 3: $$\\mathrm{P}(1 < X \\leq 4)$$ means $$X$$ is greater than 1 but at most 4, so $$X = 2, 3,$$ or $$4$$. This equals $$\\mathrm{P}(X \\leq 4) - \\mathrm{P}(X \\leq 1)$$. The general pattern: $$\\mathrm{P}(a < X \\leq b) = \\mathrm{P}(X \\leq b) - \\mathrm{P}(X \\leq a)$$.\n+ Watch out: $$\\mathrm{P}(1 < X \\leq 4)$$ does NOT equal $$\\mathrm{P}(X \\leq 4) - \\mathrm{P}(X < 1)$$ if you're not careful about whether the boundary is included. Always convert to the form $$\\mathrm{P}(X \\leq \\cdot)$$ first.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "Using the same email rates (1.8, 3.7, 1.5 per hour), find the probability of more than 50 emails in an 8-hour working day. (3 steps)", "answer": "- Step 1: Total rate per hour = $$1.8 + 3.7 + 1.5 = 7.0$$. For 8 hours, $$\\lambda = 7 \\times 8 = 56$$. Total emails $$T \\sim \\text{Po}(56)$$.\n- Step 2: We need $$\\text{P}(T > 50) = 1 - \\text{P}(T \\leq 50)$$. With $$\\lambda = 56$$, this is a large parameter — the tables typically only go up to $$\\lambda = 10$$, so we'd need a calculator.\n- Step 3: For large $$\\lambda$$, the Poisson is well approximated by a normal distribution: $$T \\approx \\text{N}(56, 56)$$. Then:\n$$\\text{P}(T > 50) = \\text{P}\\left(Z > \\frac{50.5 - 56}{\\sqrt{56}}\\right) = \\text{P}\\left(Z > \\frac{-5.5}{7.483}\\right) = \\text{P}(Z > -0.735) \\approx 0.769$$\n(The 0.5 is a continuity correction.) The normal approximation works well when $$\\lambda$$ is large (typically $$\\lambda > 15$$).", "source": "GLM 5.1 ③", "_id": "glm_3_32"}, {"question": "Why is the Poisson distribution especially popular for modeling \"rare events\"? What happens if we try to use it for common events? (4 steps)", "answer": "- Step 1: \"Rare events\" here means events with small per-trial probability but many potential trials — the conditions under which Binomial $$\\to$$ Poisson.\n- Step 2: For common events, two things go wrong:\n+ The Binomial variance $$np(1-p)$$ is noticeably less than the mean $$np$$, so Poisson (with variance = mean) overestimates variability\n+ The probability mass above $$n$$ (which is theoretically non-zero in Poisson but impossible in Binomial) is larger, also making the fit worse\n- Step 3: So for, say, $$n = 10$$ trials with $$p = 0.5$$ (mean 5, variance 2.5), Poisson with $$\\lambda = 5$$ would give variance 5 — twice too big.\n- Step 4: The classic rule: Poisson works well when $$n \\geq 50$$ and $$p \\leq 0.1$$ (or $$np \\leq 5$$ roughly), i.e., the \"rare event regime\".\n\nTakeaway: Poisson's mean = variance property is accurate for rare events; for common events, it exaggerates variability.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "If data has a sample variance much larger than the sample mean (e.g., mean = 3, variance = 15), why is Poisson a poor model? What might be causing this? (2 steps)", "answer": "- Step 1: This is **overdispersion** — the data is far more variable than Poisson predicts. Poisson assumes events are independent and occur singly; if variance greatly exceeds the mean, one or both assumptions are violated.\n- Step 2: Common causes include:\n  + **Clustering**: events occur in bursts (e.g., customers arriving in groups), violating the \"singly\" condition.\n  + **Correlation**: one event makes others more likely (e.g., contagion), violating independence.\n  + **Varying rate**: the average rate changes across the observation period (e.g., rush hour vs. off-peak), violating the constant rate condition.\nA negative binomial distribution is often used as an alternative when overdispersion is present.", "source": "GLM 5.1 ③", "_id": "glm_3_34"}, {"question": "For $$X \\sim \\text{Po}(\\lambda)$$, show that $$\\text{P}(Q=0) = e^{-(\\lambda+\\mu)}$$ where $$Q = X + Y$$ and $$Y \\sim \\text{Po}(\\mu)$$ independently. What is the intuitive meaning? (3 steps)", "answer": "- Step 1: Since $$X$$ and $$Y$$ are independent Poisson variables, $$Q = X + Y \\sim \\text{Po}(\\lambda + \\mu)$$.\n- Step 2: The probability that $$Q = 0$$ means **neither** $$X$$ nor $$Y$$ produces any events:\n$$\\text{P}(Q=0) = \\text{P}(X=0 \\text{ and } Y=0) = \\text{P}(X=0) \\cdot \\text{P}(Y=0) = e^{-\\lambda} \\cdot e^{-\\mu} = e^{-(\\lambda+\\mu)}$$\n- Step 3: This matches the Poisson formula with parameter $$\\lambda + \\mu$$: $$\\text{P}(Q=0) = e^{-(\\lambda+\\mu)}$$. Intuitively, for zero total events, we need zero from each source, and since the sources are independent, we multiply the individual probabilities. The exponential rates add because the combined rate is $$\\lambda + \\mu$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "A botanist counts weeds per $$\\mathrm{m}^2$$ of a field, getting rate 1.3 per $$\\mathrm{m}^2$$. They plan to check a 4 $$\\mathrm{m}^2$$ plot. Describe the Poisson parameter to use and the conditions needed for validity. (4 steps)", "answer": "- Step 1: Scaling: expected weeds in 4 $$\\mathrm{m}^2$$ is $$4 \\times 1.3 = 5.2$$. So model as $$X \\sim \\mathrm{Po}(5.2)$$.\n- Step 2: For this scaling to be valid, the **constant rate** condition must hold across the field — weeds must be uniformly distributed on average (not concentrated in wet areas, for example).\n- Step 3: Also **independence** between weeds (not colonising each other) and **singly** (no clumps of root systems counted as one \"weed\" vs. individuals).\n- Step 4: If the density varies (e.g., wetter at one end), the Poisson model would require either a smaller homogeneous sub-plot, or a non-homogeneous Poisson (with varying rate).\n\nTakeaway: Rate per unit area scales linearly with total area — but only if density is uniform across the area.", "source": "Opus 4.7 ②", "_id": "opus_2_64"}, {"question": "If data has a sample mean much larger than the sample variance (e.g., mean = 10, variance = 2), why is Poisson a poor model? What distribution might be more appropriate? (2 steps)", "answer": "- Step 1: Poisson requires mean = variance. If the variance is much smaller than the mean (\"underdispersion\"), the data is **more regular** than Poisson predicts. Poisson expects considerable variability around the mean; the data shows less.\n- Step 2: This pattern suggests events are **too evenly spaced** — perhaps they're scheduled or regulated. A binomial distribution (where variance = $$np(1-p) < np =$$ mean) might be more appropriate, or the events might not be truly random. For example, if buses arrive every 10 minutes on schedule, the count per hour has low variance relative to the mean.", "source": "GLM 5.1 ③", "_id": "glm_3_33"}, {"question": "An elevator breaks down at a mean rate of 3 times per four-week period. In one particular week, it broke down twice. A student reasons: \"Since it already broke down twice this week, it's less likely to break down next week.\" Is this reasoning consistent with the Poisson model? Why or why not? (2 steps)", "answer": "- Step 1: No, this reasoning is not consistent with the Poisson model. One of the fundamental conditions of the Poisson model is **independence** — the occurrence of events in one interval does not affect the probability of events in another interval. The breakdowns next week are independent of what happened this week.\n- Step 2: The probability of at least one breakdown next week is the same regardless of what happened this week. With a rate of $$\\frac{3}{4} = 0.75$$ per week, $$X \\sim \\mathrm{Po}(0.75)$$ and $$\\mathrm{P}(X \\geq 1) = 1 - e^{-0.75} \\approx 0.528$$. The student's reasoning reflects the **gambler's fallacy** — the mistaken belief that past outcomes influence independent future events.", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "Consider a fixed interval of time. If we double the interval's length, what happens to the variance of the count? Explain from first principles. (4 steps)", "answer": "- Step 1: The mean is $$\\lambda$$ per unit interval, so over a 2-unit interval, mean is $$2\\lambda$$.\n- Step 2: Crucially, doubling the interval is like adding two independent identical Poisson processes (additivity applied to disjoint intervals). So the count over 2 units is $$\\mathrm{Po}(2\\lambda)$$.\n- Step 3: Variance of $$\\mathrm{Po}(2\\lambda)$$ is also $$2\\lambda$$ — doubled from the original $$\\lambda$$. So variance scales linearly with interval length, same as mean.\n- Step 4: This matches the property $$\\mathrm{Var}(X+Y) = \\mathrm{Var}(X) + \\mathrm{Var}(Y)$$ for independent $$X, Y$$: adding another Poisson interval adds its variance.\n\nTakeaway: Over longer intervals, both mean and variance grow linearly — another way to see why mean = variance for Poisson.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "When using Poisson cumulative distribution tables, how do you compute $$P(X \\geq k)$$, $$P(X < k)$$, and $$P(a \\leq X \\leq b)$$? (4 steps)", "answer": "- Step 1: Tables give $$P(X \\leq k)$$ directly for specified values of $$\\lambda$$ and $$k$$. Everything else is translated to this form.\n- Step 2: For $$P(X \\geq k)$$: use the complement — $$P(X \\geq k) = 1 - P(X \\leq k-1)$$. The trap is writing $$1 - P(X \\leq k)$$, which would wrongly exclude $$X = k$$.\n- Step 3: For $$P(X < k)$$: this is $$P(X \\leq k-1)$$ since $$X$$ is integer-valued.\n- Step 4: For $$P(a \\leq X \\leq b)$$: $$P(X \\leq b) - P(X \\leq a-1)$$. Again carefully include/exclude endpoints based on the inequality.\n\nTakeaway: Always convert to $$P(X \\leq \\text{integer})$$ form, and carefully handle integer boundary values for strict vs non-strict inequalities.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "An elevator breaks down 3 times per 4 weeks. Find probability of at least once in 1 week, exactly twice in 1 week. If it broke down twice in one week, what's probability of at least once in next week? Explain. (3 steps)", "answer": "- Step 1: Rate = 3 per 4 weeks = 0.75 per week. $X \\sim \\text{Po}(0.75)$. $P(X \\geq 1) = 1 - e^{-0.75} \\approx 0.5276$. $P(X = 2) = \\frac{e^{-0.75} \\times 0.75^2}{2!} \\approx 0.1763$\n\n- Step 2: If it broke down twice in one week, what's probability of at least once in the next week? The answer is still $P(X \\geq 1) = 0.5276$.\n\n- Step 3: Reason: Poisson process is \"memoryless\" in a specific sense — the probability of future events depends only on the rate and time interval, not on what happened in the past. Each week is independent in this sense (the process doesn't \"remember\" previous weeks). This is why the probability remains the same regardless of what happened previously.", "source": "MiniMax ①", "_id": "minimax_1_44"}, {"question": "A doctor sees 6 patients between 9–10 am and 4 between 10–11 am. Does it make sense to model the two-hour total as $$\\operatorname{Po}(10)$$? (3 steps)", "answer": "- Step 1: On average, 5 per hour, so 10 over two hours — but this relies on the rate being constant within each hour.\n- Step 2: Here the rates clearly differ (6 vs 4), so pooling into one $$\\lambda$$ masks the non-constant rate and misrepresents the process.\n- Step 3: Cleaner: model each hour separately as $$\\operatorname{Po}(6)$$ and $$\\operatorname{Po}(4)$$, then use the additive property. The combined total count can still be treated as $$\\operatorname{Po}(10)$$ if the hours are independent and each hour individually follows Poisson, but the underlying process is non-homogeneous.\n\nSubtlety: additivity can mask non-stationarity of the rate; be mindful of what you're assuming.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "The number of policies sold by an employee each week over 150 weeks is recorded. The summary statistics are $$\\Sigma x = 423$$ and $$\\Sigma x^2 = 1531$$. A student computes the mean as $$\\frac{423}{150} = 2.82$$ and the variance as $$\\frac{153}{150} - 2.82^2$$. They get a negative variance. What went wrong? (2 steps)", "answer": "- Step 1: The formula for the variance is $$s^2 = \\frac{\\Sigma x^2}{n} - \\bar{x}^2$$. For this to be non-negative, we need $$\\frac{\\Sigma x^2}{n} \\geq \\bar{x}^2$$, i.e., $$\\Sigma x^2 \\geq \\frac{(\\Sigma x)^2}{n}$$. Substituting: $$\\frac{153}{150} = 1.02$$ but $$2.82^2 = 7.95$$. Clearly $$1.02 < 7.95$$, giving a negative variance — which is impossible.\n- Step 2: The error is in the data: $$\\Sigma x^2 = 153$$ is far too small. If the mean is 2.82, the average of $$x^2$$ must be at least $$2.82^2 = 7.95$$, so $$\\Sigma x^2$$ should be at least $$150 \\times 7.95 \\approx 1193$$. The value 153 is likely a typo or misreporting (perhaps it was $$\\Sigma x^2 = 1531$$ or similar). This is a sanity check: variance can never be negative, so if your calculation gives a negative value, re-examine the input data.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "A company records 282 phone calls over 100 days. Sample mean is 2.82, sample variance is 2.83. The chapter uses $$\\lambda = 2.76$$ or $$\\lambda = 2.82$$ when modelling. Explain the reasoning for choosing an exact value. (4 steps)", "answer": "- Step 1: The sample mean and variance aren't identical (2.82 vs 2.83, approximately) because of sampling variability — no real dataset has exactly equal mean and variance.\n- Step 2: Choosing $$\\lambda$$ requires a judgement call. Options:\n+ Use the mean (2.82) — the standard maximum likelihood estimator\n+ Use the variance (2.83) — another moment-based estimator\n+ Round to a meaningful value\n- Step 3: The impact of small choices in $$\\lambda$$ on probabilities is typically small for moderate $$\\lambda$$.\n- Step 4: In practice, the sample mean is the usual choice because it's the MLE. The near-equality of variance is evidence for Poisson-ness, not itself a source for the estimate.\n\nTakeaway: Use the sample mean as your Poisson parameter estimate; check the variance separately as a diagnostic for model fit.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "In an early step of proving $$E(X) = \\lambda$$ for Poisson, we split off $$x = 0$$. Why can we do this without worry? (4 steps)", "answer": "- Step 1: The term at $$x = 0$$ is $$0 \\cdot P(X=0) = 0$$. So it contributes nothing to the expectation.\n- Step 2: This is because $$E(X) = \\sum x \\cdot P(X=x)$$, and $$x = 0$$ has a factor of zero.\n- Step 3: More generally, for any random variable, $$X = 0$$ contributes nothing to expectation (but it does contribute to $$P(X \\leq k)$$!).\n- Step 4: The reason to split it off is to then reindex the remaining sum and match it to a known series (Taylor series of $$e^\\lambda$$).\n\nTakeaway: The $$x = 0$$ term is \"harmless\" for mean calculations but must be included for cumulative probabilities.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "When is a binomial $$\\operatorname{B}(n, p)$$ well approximated by a Poisson, and why? (3 steps)", "answer": "- Step 1: Approximate when $$n$$ is large and $$p$$ is small, with $$np$$ moderate — a common guideline is $$n > 50$$ and $$p < 0.1$$.\n- Step 2: Under these conditions, trials are so numerous and successes so rare that the binomial's \"fixed $$n$$\" constraint barely matters — it behaves like an unbounded rate.\n- Step 3: Use $$\\lambda = np$$, so $$\\operatorname{B}(n, p) \\approx \\operatorname{Po}(np)$$. This is especially helpful because Poisson cumulative tables are simpler and the formula is neater.\n\nApproximation breaks down when $$p$$ is large (binomial cap matters) or $$n$$ is small (not enough trials for convergence).", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "A fruitcake manufacturer puts on average 2.5 cherries per cake. What does this imply about the probability of a cake with 0 cherries? Without computing exactly, describe the order of magnitude and why. (4 steps)", "answer": "- Step 1: $$P(X=0) = e^{-\\lambda} = e^{-2.5}$$.\n- Step 2: Since $$e^{-1} \\approx 0.37$$ and $$e^{-2} \\approx 0.14$$, $$e^{-2.5}$$ is somewhere around $$0.08$$ — about 8%.\n- Step 3: Conceptually: even though the average is 2.5, there's still a non-trivial chance (roughly 1 in 12 cakes) of getting zero cherries. This is because Poisson has a longer tail and considerable variance.\n- Step 4: In general, $$P(X=0) = e^{-\\lambda}$$, which falls exponentially with $$\\lambda$$. So doubling the mean from 2.5 to 5 drops $$P(X=0)$$ from ~8% to ~0.7%.\n\nTakeaway: $$e^{-\\lambda}$$ is the probability of the \"empty outcome\" and can be substantial even when the mean is moderate.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "The Poisson formula involves $$\\lambda^0$$ and $$0!$$. Why does this give a sensible value at $$x = 0$$?", "answer": "Directly substituting $$x=0$$ gives $$P(X=0) = \\dfrac{e^{-\\lambda}\\cdot 1}{1} = e^{-\\lambda}$$, a valid probability.\n\nThis works because both $$\\lambda^0 = 1$$ and $$0! = 1$$ by convention. These aren't arbitrary definitions — they're chosen precisely so that formulas like the Poisson PMF apply uniformly for all $$x \\ge 0$$ without needing a special case for $$x = 0$$. Consistency is baked into the notation.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "If the mean AND variance of sample data are BOTH about 10, but the sample shows lots of zero counts and also many very high counts (much more than a typical Poisson would), what might this tell us? (4 steps)", "answer": "- Step 1: Mean ≈ variance doesn't uniquely identify Poisson — it's necessary but not sufficient. A bimodal or mixture distribution could have mean ≈ variance by coincidence.\n- Step 2: The symptoms (excess zeros plus excess large values) hint at a zero-inflated or mixed process: maybe two populations (e.g., \"quiet\" hours with near-zero events, \"busy\" hours with many events) mixed together.\n- Step 3: Poisson has a smooth, unimodal shape. If you see a spike at zero AND a long tail, it's NOT a single Poisson — even if the first two moments match.\n- Step 4: Better models: zero-inflated Poisson, mixture of Poissons, or negative binomial (for over-dispersion).\n\nTakeaway: Matching moments alone can be misleading; always inspect the distribution shape to confirm Poisson fits.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "Informally, how does the Poisson distribution arise as a limiting case of a binomial distribution? (4 steps)", "answer": "- Step 1: Divide an interval into $$n$$ tiny subintervals, each with a small chance $$p$$ of containing one event. The total event count is $$\\operatorname{B}(n, p)$$.\n- Step 2: Take $$n \\to \\infty$$ while keeping the expected count $$np = \\lambda$$ fixed — each subinterval becomes vanishingly likely to have an event, but there are vastly more subintervals.\n- Step 3: The binomial coefficient times $$p^k$$ simplifies: $$\\binom{n}{k}p^k \\to \\lambda^k/k!$$, and $$(1-p)^{n-k} \\to e^{-\\lambda}$$.\n- Step 4: Combining gives $$P(X=k) \\to \\dfrac{e^{-\\lambda}\\lambda^k}{k!}$$ — the Poisson PMF.\n\nThis is why Poisson models \"many opportunities, each rare\" — binomial collapses into Poisson as trials become many and success rare.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "For $$X \\sim \\operatorname{Po}(\\lambda)$$, where is the mode (most likely value)?", "answer": "The mode is at $$\\lfloor \\lambda \\rfloor$$ (the greatest integer at or below $$\\lambda$$). If $$\\lambda$$ is a positive integer, the distribution has **two equal modes** at $$\\lambda - 1$$ and $$\\lambda$$. If $$\\lambda$$ is non-integer, the single mode is $$\\lfloor \\lambda \\rfloor$$.\n\nThis aligns with intuition: the most likely count is near the expected rate, with a slight bias downward when $$\\lambda$$ is exactly an integer because of the discrete asymmetry of the distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "The number of cars passing a school gate differs hugely between 8 am and 2 pm. Does this violate Poisson modelling? (3 steps)", "answer": "- Step 1: Within a narrow window (say a 3-minute slot at 8 am), the rate is approximately constant, so $$\\operatorname{Po}(\\lambda_{8\\text{am}})$$ is fine locally.\n- Step 2: But across the whole day, rate varies wildly (rush hour peaks, afternoon lulls). One $$\\lambda$$ can't represent the entire day correctly.\n- Step 3: Fix: use **different** $$\\lambda$$ for different time bands, or a **non-homogeneous Poisson process** where $$\\lambda(t)$$ varies with time. The basic Poisson distribution assumes constant rate within the analysed interval.\n\nLesson: verify the rate is stable over the window you're modelling, not just averaged across a longer span.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "If events from a Poisson stream of rate $$\\lambda$$ are each independently \"tagged\" with probability $$p$$, what's the distribution of the tagged count? (3 steps)", "answer": "- Step 1: Each Poisson event is tagged independently, preserving independence among events.\n- Step 2: The tagged events form a new Poisson process with rate $$\\lambda' = p\\lambda$$ (original rate multiplied by tagging probability).\n- Step 3: So the tagged count over the same interval is $$\\operatorname{Po}(p\\lambda)$$.\n\nThis is **Poisson thinning**: a fundamental property complementing the additive one. You can split a Poisson stream into independent Poisson sub-streams.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "A director receives personal emails at rate 1.8/hr, business at 3.7/hr, and advertising at 1.5/hr. What is the probability she receives **at least one of each type** during a 30-minute period? (3 steps)", "answer": "- Step 1: Scale rates to 30 minutes: personal $$\\lambda_1 = 0.9$$, business $$\\lambda_2 = 1.85$$, advertising $$\\lambda_3 = 0.75$$.\n- Step 2: For each type, compute $$\\text{P}(\\text{at least one}) = 1 - e^{-\\lambda_i}$$:\n  + Personal: $$1 - e^{-0.9} \\approx 1 - 0.4066 = 0.5934$$\n  + Business: $$1 - e^{-1.85} \\approx 1 - 0.1572 = 0.8428$$\n  + Advertising: $$1 - e^{-0.75} \\approx 1 - 0.4724 = 0.5276$$\n- Step 3: Since the three types arrive independently, multiply:\n$$\\text{P}(\\text{at least one of each}) = 0.5934 \\times 0.8428 \\times 0.5276 \\approx 0.2637$$\n\nKey point: \"At least one of each type\" requires independence between types (which we assume), and we use the complement for each type individually. We do NOT use the additive property here — that would give the total email count, not the per-type breakdown.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "Why can the Poisson distribution in principle take any non-negative integer value, even when the \"natural\" scenario (like phone calls per day) seems to have a practical maximum? (4 steps)", "answer": "- Step 1: The Poisson PMF is defined for all $$x = 0, 1, 2, \\ldots$$ with no upper bound. Mathematically, there's always a non-zero (albeit extremely small) probability for any large $$x$$.\n- Step 2: In practice, probabilities become astronomically small for $$x \\gg \\lambda$$. E.g., for $$\\mathrm{Po}(3)$$, $$P(X = 20) \\approx 10^{-12}$$ — effectively impossible but technically non-zero.\n- Step 3: This is actually useful for modelling: the \"unbounded\" aspect captures the intuition that unusual events (e.g., a freak day with 12 phone calls when the mean is 3) are rare but possible.\n- Step 4: Contrast with Binomial, which has a hard upper limit of $$n$$ — no matter how lucky, you can't get more successes than trials. Poisson has a \"soft\" upper bound defined by rapidly-decaying probabilities.\n\nTakeaway: Poisson's unbounded support is a mathematical feature that reflects real-world reality — extreme events are rare but not impossible.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Using the ratio $$P(X = k+1)/P(X = k) = \\lambda/(k+1)$$, explain how Poisson probabilities rise then fall around $$\\lambda$$. (3 steps)", "answer": "- Step 1: The ratio of consecutive probabilities is $$\\dfrac{\\lambda}{k+1}$$. When $$k + 1 < \\lambda$$, this ratio exceeds 1, so probabilities are *increasing* as $$k$$ grows.\n- Step 2: When $$k + 1 > \\lambda$$, the ratio is less than 1, so probabilities *decrease*.\n- Step 3: The turning point is around $$k \\approx \\lambda - 1$$, which gives the mode. This matches the rule \"mode ≈ $$\\lfloor \\lambda \\rfloor$$\" — probabilities peak there and fall off on either side.\n\nElegant consequence: the whole shape of the Poisson is determined by one simple ratio relation.", "source": "Opus 4.7 ①", "_id": "opus_1_70"}, {"question": "In a problem about two coffee machines breaking down independently, what does \"independent\" concretely require?", "answer": "Concretely: the breakdown of machine C does not change the probability that machine D breaks down, and vice versa. They don't share a common cause (e.g., power surges that would affect both), they aren't mechanically coupled, and users don't switch usage in a way that stresses one when the other fails. Independence is a strong assumption requiring justification — if it fails, the additive property of Poissons no longer gives the combined distribution, and ordinary product-rule calculations for joint events also break down.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "Why is \"number of left-handed people in a class of 30\" a poor fit for the Poisson distribution? (3 steps)", "answer": "- Step 1: There's a **fixed number of trials** (30 students), each a binary success/failure outcome (left/right-handed). This is classic binomial territory.\n- Step 2: The count is bounded above by 30, with nonzero probability of being exactly 30. Poisson has no upper bound and has vanishing probability for counts that large.\n- Step 3: Poisson models rates of events across a continuous interval, not fixed-batch enumerations. Use $$\\operatorname{B}(30, p)$$ instead.\n\nDiagnostic: is there a fixed $$n$$ and a clear \"trial\"? If yes, think binomial, not Poisson.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "A patient arrives at A&E at 11:00 am. The arrival rate is 5 per hour (Poisson). Find the probability that the next patient arrives before 11:15 am. This question connects the Poisson distribution to another distribution. Which one, and how? (3 steps)", "answer": "- Step 1: The event \"next patient arrives before 11:15 am\" is equivalent to \"at least one patient arrives in the 15-minute interval from 11:00 to 11:15.\" Let $$X$$ = number of patients in 15 minutes. The rate is $$\\frac{15}{60} \\times 5 = 1.25$$, so $$X \\sim \\mathrm{Po}(1.25)$$.\n- Step 2: $$\\mathrm{P}(\\text{next patient before 11:15}) = \\mathrm{P}(X \\geq 1) = 1 - \\mathrm{P}(X = 0) = 1 - e^{-1.25} \\approx 1 - 0.2865 = 0.7135$$.\n- Step 3: More deeply, the *waiting time* until the next event in a Poisson process follows an **exponential distribution** with parameter $$\\lambda$$. The probability that the waiting time is less than $$t$$
