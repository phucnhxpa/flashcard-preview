": "A café has customers arriving at 1 per 4 minutes. Find the probability that more than 10 customers arrive between 10:00 and 10:20 on a Friday. (3 steps)", "answer": "- Step 1: The interval is 20 minutes. Rate = 1 per 4 minutes, so in 20 minutes: $$\\lambda = 1 \\times 5 = 5$$. Model: $$X \\sim \\text{Po}(5)$$.\n- Step 2: $$\\text{P}(X > 10) = 1 - \\text{P}(X \\leq 10)$$. From tables with $$\\lambda = 5$$: $$\\text{P}(X \\leq 10) = 0.9863$$.\n- Step 3: $$\\text{P}(X > 10) = 1 - 0.9863 = 0.0137$$. About a 1.4% chance — quite unlikely, consistent with the mean being 5.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "Chocolate chips per biscuit follow $$\\text{Po}(5)$$. A packet of 6 biscuits is selected. Find the probability that exactly half contain fewer than 3 chips. (3 steps)", "answer": "- Step 1: For one biscuit: $$p = \\text{P}(X < 3) = \\text{P}(X \\leq 2)$$. From tables with $$\\lambda = 5$$: $$\\text{P}(X \\leq 2) = 0.1247$$.\n- Step 2: Across 6 biscuits, the number with fewer than 3 chips is $$Y \\sim \\text{B}(6, 0.1247)$$.\n- Step 3: $$\\text{P}(Y = 3) = \\binom{6}{3}(0.1247)^3(0.8753)^3 = 20 \\times 0.00194 \\times 0.6695 \\approx 0.0260$$. The \"exactly half\" condition means 3 out of 6, which is a specific binomial probability.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "For $$X \\sim \\text{Po}(7.5)$$, find the value of $$a$$ such that $$\\text{P}(X \\leq a) = 0.2414$$. (2 steps)", "answer": "- Step 1: Look up 0.2414 in the cumulative Poisson table for $$\\lambda = 7.5$$. Scanning the table: $$\\text{P}(X \\leq 5) = 0.2414$$.\n- Step 2: So $$a = 5$$. This means about 24% of the time, we'd expect 5 or fewer events when the rate is 7.5 — the left tail of the distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "For $$X \\sim \\text{Po}(8)$$, find the value of $$d$$ such that $$\\text{P}(X > d) = 0.8088$$. (3 steps)", "answer": "- Step 1: Convert to cumulative form: $$\\text{P}(X > d) = 1 - \\text{P}(X \\leq d) = 0.8088$$, so $$\\text{P}(X \\leq d) = 1 - 0.8088 = 0.1912$$.\n- Step 2: Look up 0.1912 in the cumulative Poisson table for $$\\lambda = 8$$: $$\\text{P}(X \\leq 4) = 0.1912$$.\n- Step 3: So $$d = 4$$. This makes sense: with $$\\lambda = 8$$, the mean is 8, so being at 4 or below is in the lower tail. The probability of exceeding 4 is about 81% — most of the distribution is above 4.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "Two independent Poisson variables $$X \\sim \\text{Po}(3.3)$$ and $$Y \\sim \\text{Po}(2.7)$$ are given. Find $$\\text{P}(X + Y > 4)$$. (3 steps)", "answer": "- Step 1: $$X + Y \\sim \\text{Po}(3.3 + 2.7) = \\text{Po}(6)$$.\n- Step 2: $$\\text{P}(X + Y > 4) = 1 - \\text{P}(X + Y \\leq 4)$$. From tables with $$\\lambda = 6$$: $$\\text{P}(X + Y \\leq 4) = 0.2851$$.\n- Step 3: $$\\text{P}(X + Y > 4) = 1 - 0.2851 = 0.7149$$.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "For $$X \\sim \\text{Po}(2.5)$$ and $$Y \\sim \\text{Po}(3.5)$$ independently, find $$\\text{P}(X=2 \\text{ and } Y=2)$$. Why is this different from $$\\text{P}(X+Y=4)$$? (3 steps)", "answer": "- Step 1: Since independent: $$\\text{P}(X=2 \\text{ and } Y=2) = \\text{P}(X=2) \\times \\text{P}(Y=2)$$. This is a **joint** probability — both specific values must hold simultaneously.\n- Step 2: Compute: $$\\text{P}(X=2) = \\frac{e^{-2.5}(2.5)^2}{2!} = 0.2560$$ and $$\\text{P}(Y=2) = \\frac{e^{-3.5}(3.5)^2}{2!} = 0.1850$$. So $$\\text{P}(X=2, Y=2) = 0.2560 \\times 0.1850 \\approx 0.0474$$.\n- Step 3: $$\\text{P}(X+Y=4)$$ is a **sum** probability — it includes all ways to get a total of 4: $$(X=0,Y=4), (X=1,Y=3), (X=2,Y=2), (X=3,Y=1), (X=4,Y=0)$$. Using $$X+Y \\sim \\text{Po}(6)$$: $$\\text{P}(X+Y=4) = \\frac{e^{-6}(6)^4}{4!} \\approx 0.1339$$. The sum probability is much larger because there are many combinations that give a total of 4, not just $$(2,2)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "An office worker receives internal calls at 1 per 5 minutes and external calls at 2 per 5 minutes. Find the probability of exactly 3 total calls in a 4-minute period. (3 steps)", "answer": "- Step 1: Scale rates to 4 minutes: internal = $$1 \\times \\frac{4}{5} = 0.8$$, external = $$2 \\times \\frac{4}{5} = 1.6$$. Total rate = $$0.8 + 1.6 = 2.4$$.\n- Step 2: $$T \\sim \\text{Po}(2.4)$$ for total calls in 4 minutes.\n- Step 3: $$\\text{P}(T = 3) = \\frac{e^{-2.4}(2.4)^3}{3!} = \\frac{0.0907 \\times 13.824}{6} \\approx 0.2090$$.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "Machine C breaks down at 0.1/week and Machine D at 0.05/week (independently). Over 12 weeks, find the probability that each machine breaks down at least once. (3 steps)", "answer": "- Step 1: For 12 weeks: $$C \\sim \\text{Po}(1.2)$$ and $$D \\sim \\text{Po}(0.6)$$.\n- Step 2: For each: $$\\text{P}(C \\geq 1) = 1 - e^{-1.2} \\approx 1 - 0.3012 = 0.6988$$. $$\\text{P}(D \\geq 1) = 1 - e^{-0.6} \\approx 1 - 0.5488 = 0.4512$$.\n- Step 3: Since independent: $$\\text{P}(\\text{each} \\geq 1) = 0.6988 \\times 0.4512 \\approx 0.3153$$. Machine D has a lower rate, so it's less likely to break down at all — the joint probability is dominated by the weaker machine.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": false}, {"question": "For the same machines over 12 weeks ($$C \\sim \\text{Po}(1.2)$$, $$D \\sim \\text{Po}(0.6)$$), find the probability of exactly 3 total breakdowns. (2 steps)", "answer": "- Step 1: Total breakdowns: $$T = C + D \\sim \\text{Po}(1.2 + 0.6) = \\text{Po}(1.8)$$.\n- Step 2: $$\\text{P}(T = 3) = \\frac{e^{-1.8}(1.8)^3}{3!} = \\frac{0.1653 \\times 5.832}{6} \\approx 0.1607$$.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "During weekdays, cars pass at 24/min and vans at 8/min. In a 15-second period, find the probability that at least 4 of each type pass. (3 steps)", "answer": "- Step 1: Scale rates to 15 seconds (= 0.25 min): cars = $$24 \\times 0.25 = 6$$, vans = $$8 \\times 0.25 = 2$$. So $$C \\sim \\text{Po}(6)$$, $$V \\sim \\text{Po}(2)$$.\n- Step 2: $$\\text{P}(C \\geq 4) = 1 - \\text{P}(C \\leq 3) = 1 - 0.1512 = 0.8488$$. $$\\text{P}(V \\geq 4) = 1 - \\text{P}(V \\leq 3) = 1 - 0.8572 = 0.1428$$.\n- Step 3: Since independent: $$\\text{P}(\\text{each} \\geq 4) = 0.8488 \\times 0.1428 \\approx 0.1212$$. Vans are much rarer (rate 2 vs. 6), so the joint probability is limited by the van condition.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "A holiday website receives 240 visits per hour. What distribution models visits in a 1-minute interval, and why? (2 steps)", "answer": "- Step 1: Rate per minute = $$\\frac{240}{60} = 4$$. So $$X \\sim \\text{Po}(4)$$ for visits per minute.\n- Step 2: This is appropriate because website visits occur independently (one person's visit doesn't affect another's), singly (each visit is a discrete event), and at a constant average rate (240/hour is steady). The Poisson model is justified by these three conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": false}, {"question": "For the website with 240 visits/hour, find the probability of at least 10 visits in 2 minutes. (3 steps)", "answer": "- Step 1: Rate per 2 minutes = $$4 \\times 2 = 8$$. So $$X \\sim \\text{Po}(8)$$.\n- Step 2: $$\\text{P}(X \\geq 10) = 1 - \\text{P}(X \\leq 9)$$. From tables with $$\\lambda = 8$$: $$\\text{P}(X \\leq 9) = 0.7166$$.\n- Step 3: $$\\text{P}(X \\geq 10) = 1 - 0.7166 = 0.2834$$. About a 28% chance — not that unlikely, since the mean is 8 and 10 is only 2 above it.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "The number of policies sold per week over 150 weeks is recorded. If the mean is 2.44 and variance is 2.56, and you use $$\\lambda = 2.44$$, find the probability of no more than 2 policies in a randomly chosen week. (2 steps)", "answer": "- Step 1: Using $$X \\sim \\text{Po}(2.44)$$, compute $$\\text{P}(X \\leq 2)$$. Since $$\\lambda = 2.44$$ is not in the standard table (which has steps of 0.5), use a calculator: $$\\text{P}(X \\leq 2) = e^{-2.44}(1 + 2.44 + \\frac{2.44^2}{2}) = e^{-2.44}(1 + 2.44 + 2.9768)$$.\n- Step 2: $$= e^{-2.44} \\times 6.4168 = 0.0870 \\times 6.4168 \\approx 0.5583$$. About a 56% chance of 0, 1, or 2 policies — the left half of the distribution, which makes sense since the mean is 2.44.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "A patient arrives at A&E at 11:00 am. Calls arrive at rate 5/hour. Find the probability the next patient arrives before 11:15 am. What conceptual shift is needed here? (3 steps)", "answer": "- Step 1: This question asks about the **time until the next event**, not the count of events. We need to shift from \"how many events?\" (Poisson count) to \"how long until the first event?\" (exponential waiting time).\n- Step 2: The probability that **zero** patients arrive in 15 minutes = $$e^{-\\lambda}$$ where $$\\lambda = 5 \\times \\frac{15}{60} = 1.25$$. So $$\\text{P}(\\text{no arrivals in 15 min}) = e^{-1.25}$$.\n- Step 3: The probability the next patient arrives **before** 11:15 is the complement: $$\\text{P}(\\text{at least 1 arrival in 15 min}) = 1 - e^{-1.25} \\approx 1 - 0.2865 = 0.7135$$. This connects the Poisson distribution to the exponential distribution: the waiting time for the first event is exponentially distributed with the same rate parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": true}, {"question": "Conceptual check: If $$X \\sim \\text{Po}(\\lambda)$$, what happens to the distribution shape as $$\\lambda$$ increases from 1 to 100? Describe qualitatively. (3 steps)", "answer": "- Step 1: For small $$\\lambda$$ (e.g., $$\\lambda = 1$$): the distribution is heavily **right-skewed**, with most probability mass at 0 and 1. The mode is at 0 (or 1), and the tail extends right.\n- Step 2: For moderate $$\\lambda$$ (e.g., $$\\lambda = 5$$): the distribution becomes more **symmetric** and bell-shaped. The mode is near 4–5, and the spread (standard deviation $$\\sqrt{\\lambda}$$) grows.\n- Step 3: For large $$\\lambda$$ (e.g., $$\\lambda = 100$$): the distribution closely approximates a **normal distribution** $$\\text{N}(100, 100)$$, by the Central Limit Theorem. The mean, mode, and median all converge to $$\\lambda$$, and the distribution is nearly symmetric. This is why the normal approximation to Poisson works well for large $$\\lambda$$ (typically $$\\lambda > 15$$ is sufficient).", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": false}, {"question": "Edge case: What is $$\\text{P}(X = 0)$$ for $$X \\sim \\text{Po}(0.01)$$? What does a very small $$\\lambda$$ imply about the process? (2 steps)", "answer": "- Step 1: $$\\text{P}(X = 0) = e^{-0.01} \\approx 0.9900$$. There's a 99% chance of zero events. The probability of exactly one event is $$0.01 \\times e^{-0.01} \\approx 0.0099$$, and larger counts are negligibly small.\n- Step 2: A very small $$\\lambda$$ means the event is **very rare**. The distribution is almost entirely concentrated at 0, with a tiny probability of 1, and effectively zero probability of 2 or more. In the limit $$\\lambda \\to 0$$, the distribution degenerates to $$\\text{P}(X=0) = 1$$ — the event essentially never occurs.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": false}, {"question": "Edge case: Can $$\\lambda = 0$$ in a Poisson distribution? What would this mean? (2 steps)", "answer": "- Step 1: Technically, if $$\\lambda = 0$$, then $$\\text{P}(X=0) = e^0 = 1$$ and $$\\text{P}(X=x) = 0$$ for all $$x \\geq 1$$. The distribution is **degenerate** — the event never occurs.\n- Step 2: In practice, $$\\lambda = 0$$ means the rate is zero, so the process doesn't exist. This is a valid but trivial Poisson distribution. In modelling, you'd never use $$\\lambda = 0$$ — it means there's nothing to model. The interesting range is $$\\lambda > 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": true}, {"question": "Synthesis question: A hospital ward has patients arriving at 5/hour (Poisson). The ward needs extra staff if 8 or more patients arrive in a 2-hour period. Over a 7-day week (14 half-day shifts of 2 hours each), find the probability that extra staff are needed on at least 3 shifts. (4 steps)", "answer": "- Step 1: For a 2-hour period: $$\\lambda = 5 \\times 2 = 10$$. So $$X \\sim \\text{Po}(10)$$ per 2-hour shift.\n- Step 2: $$p = \\text{P}(X \\geq 8) = 1 - \\text{P}(X \\leq 7) = 1 - 0.2202 = 0.7798$$.\n- Step 3: Over 14 shifts, the number needing extra staff is $$Y \\sim \\text{B}(14, 0.7798)$$.\n- Step 4: $$\\text{P}(Y \\geq 3) = 1 - \\text{P}(Y \\leq 2)$$. Since $$p$$ is large (0.78), most shifts will need extra staff. $$\\text{P}(Y = 0) = (0.2202)^{14} \\approx 0$$, $$\\text{P}(Y = 1) = 14 \\times 0.7798 \\times (0.2202)^{13} \\approx 0$$, $$\\text{P}(Y = 2) = 91 \\times (0.7798)^2 \\times (0.2202)^{12} \\approx 0$$. So $$\\text{P}(Y \\geq 3) \\approx 1$$. It's virtually certain that extra staff will be needed on at least 3 shifts — the per-shift probability is too high.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": false}, {"question": "Why can't you use the additive property of Poisson distributions if the two variables are not independent? Give a concrete example. (2 steps)", "answer": "- Step 1: Without independence, the variance of the sum includes a covariance term: $$\\text{Var}(X+Y) = \\text{Var}(X) + \\text{Var}(Y) + 2\\text{Cov}(X,Y)$$. For the sum to be Poisson, we need $$\\text{Var}(X+Y) = \\text{E}(X+Y)$$, i.e., mean = variance. But if $$\\text{Cov}(X,Y) \\neq 0$$, the variance of the sum won't equal the sum of the individual variances, so the sum won't have a Poisson distribution.\n- Step 2: Example: if $$X$$ = number of car accidents on a highway and $$Y$$ = number of ambulances dispatched, these are correlated (more accidents → more ambulances). Adding them gives a total that doesn't follow Poisson — the variance would be inflated by the positive covariance. The sum would be overdispersed relative to Poisson.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": false}, {"question": "Exercise: For $$Y \\sim \\text{Po}(\\lambda)$$, find $$\\lambda$$ such that $$\\text{P}(Y=5) = 1.25 \\times \\text{P}(Y=3)$$. (3 steps)", "answer": "- Step 1: Write the equation:\n$$\\frac{e^{-\\lambda}\\lambda^5}{5!} = 1.25 \\times \\frac{e^{-\\lambda}\\lambda^3}{3!}$$\nCancel $$e^{-\\lambda}$$:\n$$\\frac{\\lambda^5}{120} = 1.25 \\times \\frac{\\lambda^3}{6} = \\frac{5\\lambda^3}{24}$$\n- Step 2: Multiply both sides by 120:\n$$\\lambda^5 = 25\\lambda^3$$\nDivide by $$\\lambda^3$$ (since $$\\lambda > 0$$):\n$$\\lambda^2 = 25 \\implies \\lambda = 5$$\n- Step 3: Check: with $$\\lambda = 5$$, $$\\text{P}(Y=5) = \\frac{e^{-5} \\cdot 5^5}{120}$$ and $$\\text{P}(Y=3) = \\frac{e^{-5} \\cdot 5^3}{6}$$. Ratio: $$\\frac{5^5/120}{5^3/6} = \\frac{5^2}{20} = \\frac{25}{20} = 1.25$$. ✓", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "The number of calls per hour received by a business is $$\\text{Po}(\\lambda)$$ where $$\\lambda$$ is an integer. Given that $$\\text{P}(Y > 10) < 0.1$$, find the largest possible value of $$\\lambda$$. (3 steps)", "answer": "- Step 1: We need $$\\text{P}(Y > 10) < 0.1$$, i.e., $$\\text{P}(Y \\leq 10) > 0.9$$. We check integer values of $$\\lambda$$ in the cumulative tables.\n- Step 2: Check from larger $$\\lambda$$ values downward:\n  + $$\\lambda = 8$$: $$\\text{P}(Y \\leq 10) = 0.8159$$ — too low (not > 0.9)\n  + $$\\lambda = 7$$: $$\\text{P}(Y \\leq 10) = 0.9015$$ — meets the condition (> 0.9)\n  + $$\\lambda = 9$$: $$\\text{P}(Y \\leq 10) = 0.7060$$ — too low\n- Step 3: Wait — we need to be more careful. As $$\\lambda$$ increases, the distribution shifts right, so $$\\text{P}(Y \\leq 10)$$ **decreases**. So the largest $$\\lambda$$ satisfying the constraint is the largest integer where $$\\text{P}(Y \\leq 10) \\geq 0.9$$. Checking: $$\\lambda = 7$$ gives 0.9015 ≥ 0.9 ✓, $$\\lambda = 8$$ gives 0.8159 < 0.9 ✗. So the largest possible value is **$$\\lambda = 7$$**.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}, {"question": "For $$X \\sim \\text{Po}(0.84)$$, find $$\\text{P}(X = 1)$$. What does the small $$\\lambda$$ tell you about the likely outcomes? (2 steps)", "answer": "- Step 1: $$\\text{P}(X = 1) = \\frac{e^{-0.84} \\times 0.84^1}{1!} = 0.84 \\times e^{-0.84} \\approx 0.84 \\times 0.4317 \\approx 0.3626$$.\n- Step 2: With $$\\lambda = 0.84$$, the distribution is concentrated at small values. $$\\text{P}(X=0) = e^{-0.84} \\approx 0.4317$$ and $$\\text{P}(X=1) \\approx 0.3626$$. Together, these account for about 79% of the probability. Outcomes of 2 or more are increasingly rare. This is typical of low-rate processes — most of the time, nothing happens.", "source": "GLM 5.1 ③", "_id": "glm_3_70", "judge_pick": false}, {"question": "Synthesis: Why is it that when you scale a Poisson rate (e.g., from \"per hour\" to \"per 90 minutes\"), you multiply $$\\lambda$$ by a factor, but when you add two independent Poisson processes, you add the $$\\lambda$$ values? Connect both to the same underlying principle. (3 steps)", "answer": "- Step 1: Both operations rely on the same principle: **the expected number of events is proportional to both the rate and the interval length**. If events occur at rate $$r$$ per unit time, then in interval of length $$t$$, the expected count is $$\\lambda = r \\times t$$.\n- Step 2: **Scaling**: When you change the interval from $$t_1$$ to $$t_2$$, you multiply the rate: $$\\lambda_2 = r \\times t_2 = \\lambda_1 \\times \\frac{t_2}{t_1}$$. This is just applying the same rate to a different interval.\n- Step 3: **Adding**: When you merge two independent processes with rates $$r_1$$ and $$r_2$$ over the same interval $$t$$, the combined rate is $$r_1 + r_2$$ (events from both sources contribute independently). The expected total is $$(r_1 + r_2) \\times t = r_1 t + r_2 t = \\lambda_1 + \\lambda_2$$. Both rules are just \"expected count = rate × time,\" applied to one process with a new interval, or two processes in the same interval.", "source": "GLM 5.1 ③", "_id": "glm_3_71", "judge_pick": true}, {"question": "For $$X \\sim \\text{Po}(\\lambda)$$, derive the formula for $$\\text{E}(X)$$ using the definition $$\\text{E}(X) = \\sum x \\cdot \\text{P}(X=x)$$. (3 steps)", "answer": "- Step 1: Write out the expectation:\n$$\\text{E}(X) = \\sum_{x=0}^{\\infty} x \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!} = e^{-\\lambda}\\sum_{x=1}^{\\infty} x \\cdot \\frac{\\lambda^x}{x!}$$\nNote: the $$x=0$$ term vanishes (multiplied by 0), so we start from $$x=1$$.\n- Step 2: Simplify: $$x \\cdot \\frac{\\lambda^x}{x!} = \\frac{x \\cdot \\lambda^x}{x!} = \\frac{\\lambda^x}{(x-1)!}$$ (since $$\\frac{x}{x!} = \\frac{1}{(x-1)!}$$). Substituting $$k = x-1$$:\n$$\\sum_{x=1}^{\\infty}\\frac{\\lambda^x}{(x-1)!} = \\sum_{k=0}^{\\infty}\\frac{\\lambda^{k+1}}{k!} = \\lambda \\sum_{k=0}^{\\infty}\\frac{\\lambda^k}{k!} = \\lambda \\cdot e^{\\lambda}$$\n- Step 3: So: $$\\text{E}(X) = e^{-\\lambda} \\cdot \\lambda \\cdot e^{\\lambda} = \\lambda$$. The sum telescopes beautifully — the $$e^{-\\lambda}$$ cancels the $$e^{\\lambda}$$, leaving just $$\\lambda$$.", "source": "GLM 5.1 ③", "_id": "glm_3_72", "judge_pick": false}, {"question": "For $$X \\sim \\text{Po}(\\lambda)$$, show that $$\\text{Var}(X) = \\lambda$$ using $$\\text{Var}(X) = \\text{E}(X^2) - [\\text{E}(X)]^2$$. You'll need to find $$\\text{E}(X^2)$$ first. (4 steps)", "answer": "- Step 1: First, find $$\\text{E}(X^2) = \\sum_{x=0}^{\\infty} x^2 \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!}$$. Use the identity $$x^2 = x(x-1) + x$$, so:\n$$\\text{E}(X^2) = \\text{E}[X(X-1)] + \\text{E}(X)$$\n- Step 2: Find $$\\text{E}[X(X-1)]$$:\n$$\\text{E}[X(X-1)] = \\sum_{x=0}^{\\infty} x(x-1) \\frac{e^{-\\lambda}\\lambda^x}{x!} = e^{-\\lambda}\\sum_{x=2}^{\\infty} \\frac{\\lambda^x}{(x-2)!}$$\n(The $$x=0$$ and $$x=1$$ terms vanish.) Substituting $$k = x-2$$:\n$$= e^{-\\lambda}\\sum_{k=0}^{\\infty}\\frac{\\lambda^{k+2}}{k!} = e^{-\\lambda} \\cdot \\lambda^2 \\cdot e^{\\lambda} = \\lambda^2$$\n- Step 3: So $$\\text{E}(X^2) = \\lambda^2 + \\lambda$$.\n- Step 4: Therefore:\n$$\\text{Var}(X) = \\text{E}(X^2) - [\\text{E}(X)]^2 = (\\lambda^2 + \\lambda) - \\lambda^2 = \\lambda$$\nThe mean and variance are both $$\\lambda$$ — a remarkable property unique to the Poisson distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_73", "judge_pick": false}, {"question": "A botanist suggests weeds in a field follow a Poisson distribution at rate 1.3 per $$\\text{m}^2$$. Write down two conditions that must apply, and find the probability of fewer than 3 weeds in a $$4\\text{m}^2$$ plot. (3 steps)", "answer": "- Step 1: Two conditions (from the three Poisson conditions): (1) Weeds occur **independently** — the presence of one weed doesn't make another more or less likely nearby. (2) Weeds occur **singly** — they don't grow in clumps or clusters.\n- Step 2: For a $$4\\text{m}^2$$ plot: $$\\lambda = 1.3 \\times 4 = 5.2$$. So $$X \\sim \\text{Po}(5.2)$$.\n- Step 3: $$\\text{P}(X < 3) = \\text{P}(X \\leq 2)$$. Since $$\\lambda = 5.2$$ is not in the standard table, use a calculator: $$\\text{P}(X \\leq 2) = e^{-5.2}(1 + 5.2 + \\frac{5.2^2}{2}) = e^{-5.2}(1 + 5.2 + 13.52) = e^{-5.2} \\times 19.72 \\approx 0.00552 \\times 19.72 \\approx 0.1088$$.", "source": "GLM 5.1 ③", "_id": "glm_3_74", "judge_pick": false}, {"question": "For the same weed model (1.3 per $$\\text{m}^2$$), find the probability of more than 8 weeds in a $$5\\text{m}^2$$ plot. (2 steps)", "answer": "- Step 1: For $$5\\text{m}^2$$: $$\\lambda = 1.3 \\times 5 = 6.5$$. So $$X \\sim \\text{Po}(6.5)$$.\n- Step 2: $$\\text{P}(X > 8) = 1 - \\text{P}(X \\leq 8)$$. From tables with $$\\lambda = 6.5$$: $$\\text{P}(X \\leq 8) = 0.7916$$. So $$\\text{P}(X > 8) = 1 - 0.7916 = 0.2084$$.", "source": "GLM 5.1 ③", "_id": "glm_3_75", "judge_pick": false}, {"question": "Data on car counts in 200 five-minute periods gives mean 3.635 and variance 3.557. Does this support a Poisson model? (2 steps)", "answer": "- Step 1: The mean (3.635) and variance (3.557) are very close — they differ by only about 0.08, or roughly 2% of the mean value.\n- Step 2: This close agreement **supports** the Poisson model. The slight difference is well within what you'd expect from sampling variation in 200 observations. If the variance were, say, 8 or 1, the discrepancy would be too large and Poisson would be inappropriate.", "source": "GLM 5.1 ③", "_id": "glm_3_76", "judge_pick": false}, {"question": "What is the probability generating function (PGF) of $$X \\sim \\text{Po}(\\lambda)$$, and how does it make proving mean = variance almost trivial? (3 steps)", "answer": "- Step 1: The PGF is $$G(t) = \\text{E}(t^X) = \\sum_{x=0}^{\\infty} t^x \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!} = e^{-\\lambda}\\sum_{x=0}^{\\infty}\\frac{(\\lambda t)^x}{x!} = e^{-\\lambda} \\cdot e^{\\lambda t} = e^{\\lambda(t-1)}$$.\n- Step 2: The mean and variance come from derivatives of the PGF at $$t=1$$:\n  + $$\\text{E}(X) = G'(1)$$: $$G'(t) = \\lambda e^{\\lambda(t-1)}$$, so $$G'(1) = \\lambda e^0 = \\lambda$$.\n  + $$\\text{E}(X^2) = G''(1) + G'(1)$$: $$G''(t) = \\lambda^2 e^{\\lambda(t-1)}$$, so $$G''(1) = \\lambda^2$$. Then $$\\text{E}(X^2) = \\lambda^2 + \\lambda$$.\n- Step 3: $$\\text{Var}(X) = \\text{E}(X^2) - [\\text{E}(X)]^2 = \\lambda^2 + \\lambda - \\lambda^2 = \\lambda$$. The PGF makes this almost automatic — the exponential form of the PGF means all derivatives have the same structure, and the mean = variance property falls out immediately.", "source": "GLM 5.1 ③", "_id": "glm_3_77", "judge_pick": true}, {"question": "How does the PGF prove that the sum of independent Poissons is Poisson? (3 steps)", "answer": "- Step 1: If $$X$$ and $$Y$$ are independent, the PGF of $$X+Y$$ is the **product** of their PGFs: $$G_{X+Y}(t) = G_X(t) \\cdot G_Y(t)$$. This is because for independent variables, $$\\text{E}(t^{X+Y}) = \\text{E}(t^X) \\cdot \\text{E}(t^Y)$$.\n- Step 2: For $$X \\sim \\text{Po}(\\lambda)$$ and $$Y \\sim \\text{Po}(\\mu)$$:\n$$G_{X+Y}(t) = e^{\\lambda(t-1)} \\cdot e^{\\mu(t-1)} = e^{(\\lambda+\\mu)(t-1)}$$\n- Step 3: This is the PGF of $$\\text{Po}(\\lambda+\\mu)$$! Since the PGF uniquely determines the distribution, $$X + Y \\sim \\text{Po}(\\lambda + \\mu)$$. The proof is beautifully simple — just multiply two exponentials and read off the combined parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_78", "judge_pick": true}, {"question": "The Poisson cumulative distribution tables in the exam booklet cover $$\\lambda$$ from 0 to 10 in steps of 0.5. What do you do if $$\\lambda = 3.7$$ or $$\\lambda = 15$$? (2 steps)", "answer": "- Step 1: For $$\\lambda = 3.7$$ (not in the table, which has 3.5 and 4.0): use your **calculator** to evaluate the Poisson CDF directly. Most scientific calculators have a Poisson cumulative distribution function.\n- Step 2: For $$\\lambda = 15$$ (beyond the table range): use your calculator, or apply the **normal approximation** $$X \\approx \\text{N}(15, 15)$$ with continuity correction. The normal approximation works well for $$\\lambda > 15$$. For values slightly beyond the table (e.g., $$\\lambda = 10.5$$), the calculator is the most reliable option.", "source": "GLM 5.1 ③", "_id": "glm_3_79", "judge_pick": false}], "count": 80}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What is the formula for the Poisson distribution, and what does each symbol represent? (3 steps)", "answer": "- Step 1: The formula is $ P(X = x) = \\frac{e^{-\\lambda} \\lambda^x}{x!} $, where $ x = 0, 1, 2, \\dots $.  \n- Step 2: $ \\lambda $ represents the **mean rate** (average number of occurrences in a fixed interval), and $ e $ is Euler’s number (~2.718).  \n+ Example: If $ \\lambda = 2.1 $, the probability of $ X = 3 $ is $ \\frac{e^{-2.1} \\cdot 2.1^3}{3!} $.  \n- Step 3: The formula models probabilities for **independent, singly-occurring events at a constant average rate**.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why does the sum of all probabilities in a Poisson distribution equal 1? (3 steps)", "answer": "- Step 1: Substitute the Poisson PMF into $ \\sum_{x=0}^\\infty P(X = x) $.  \n- Step 2: Factor out $ e^{-\\lambda} $, giving $ e^{-\\lambda} \\sum_{x=0}^\\infty \\frac{\\lambda^x}{x!} $.  \n+ The series $ \\sum_{x=0}^\\infty \\frac{\\lambda^x}{x!} $ is the Taylor expansion of $ e^\\lambda $.  \n- Step 3: Multiply $ e^{-\\lambda} \\cdot e^\\lambda = 1 $, proving the sum equals 1.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "When is a Poisson distribution a suitable model? List three conditions and explain their importance. (3 steps)", "answer": "- Step 1: **Independent events** – occurrences must not influence each other (e.g., phone calls don’t trigger more calls).  \n- Step 2: **Singly in time/space** – no two events occur simultaneously (e.g., radioactive decay particles are emitted one at a time).  \n- Step 3: **Constant average rate** – the mean number of events per interval is proportional to the interval length (e.g., 4 failed connections/hour implies 8/2 hours).", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How does the Poisson distribution relate to the binomial distribution? Why isn’t it derived from the binomial here?", "answer": "The Poisson models rare events with large $ n $ and small $ p $ (where $ \\lambda = np $), but the derivation here uses the series expansion of $ e^\\lambda $. The binomial requires fixed trials, while Poisson assumes an infinite maximum (e.g., meteor strikes: no fixed \"trials\").", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why do the mean and variance of a Poisson distribution both equal $ \\lambda $? (3 steps)", "answer": "- Step 1: The mean $ E(X) $ is derived using the probability generating function $ G(s) = e^{\\lambda(s-1)} $. Differentiating gives $ E(X) = G'(1) = \\lambda $.  \n- Step 2: The variance $ Var(X) = E(X^2) - [E(X)]^2 $. For Poisson, $ E(X^2) = \\lambda + \\lambda^2 $, so $ Var(X) = \\lambda $.  \n+ Example: For $ X \\sim \\text{Po}(3) $, $ E(X) = Var(X) = 3 $.  \n- Step 3: This equality is key to validating Poisson as a model (e.g., if sample variance ≈ mean, Poisson fits).", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How do you adjust $ \\lambda $ for different time intervals? Provide an example. (2 steps)", "answer": "- Step 1: Multiply $ \\lambda $ by the scaling factor of the interval.  \n+ Example: If $ \\lambda = 4 $ per hour, over 90 minutes (1.5 hours), new $ \\lambda = 4 \\times 1.5 = 6 $.  \n- Step 2: This ensures the rate scales linearly with interval length (constant average rate assumption).", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "When can you add two Poisson distributions? What is the resulting distribution? (2 steps)", "answer": "- Step 1: If $ X \\sim \\text{Po}(\\lambda) $ and $ Y \\sim \\text{Po}(\\mu) $ are **independent**, then $ X + Y \\sim \\text{Po}(\\lambda + \\mu) $.  \n- Step 2: This works only if both model events in the **same interval** (e.g., cars/hour and buses/hour at a stop).  \n+ Counterexample: Adding calls/hour and texts/day violates interval consistency.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why might a Poisson model be unsuitable for modeling earthquakes in a year? (1 step)", "answer": "Earthquakes often cluster (aftershocks violate independence) and occur in bursts (not singly), violating Poisson assumptions.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}, {"question": "Compare Poisson and Binomial distributions. When is each more appropriate?", "answer": "- **Poisson**: Infinite maximum, constant rate, independent events (e.g., typos/page).  \n- **Binomial**: Fixed trials, two outcomes (e.g., defective items in 100 sampled).  \n+ Use Poisson for rare events without a fixed $ n $, Binomial when trials are finite.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How would you estimate $ P(X \\geq 10) $ for $ X \\sim \\text{Po}(5) $ using cumulative tables? (2 steps)", "answer": "- Step 1: Use $ P(X \\geq 10) = 1 - P(X \\leq 9) $.  \n- Step 2: Look up $ \\lambda = 5 $ in tables for $ x = 9 $. If $ P(X \\leq 9) = 0.968 $, then $ P(X \\geq 10) = 1 - 0.968 = 0.032 $.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why is the Poisson additive property useful in real-world scenarios? Provide an example. (2 steps)", "answer": "- Step 1: Combines independent processes. Example: If emails arrive at 3/hour (work) and 2/hour (personal), total $ \\sim \\text{Po}(5) $.  \n- Step 2: Simplifies modeling without tracking sources separately.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "If sample data has $ \\bar{x} = 3.69 $ and $ s^2 = 3.73 $, why might Poisson fit well? (1 step)", "answer": "Because the mean and variance are approximately equal (property of Poisson), supporting its use as a model.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "What is the probability mass function for $ X \\sim \\text{Po}(\\lambda) $ when $ x = 0 $? Why is this useful?", "answer": "$ P(X=0) = e^{-\\lambda} $. This models the probability of **no events** in an interval (e.g., no accidents/month).", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "For a Poisson process with $ \\lambda = 2 $, why is $ P(X = 3) $ lower than $ P(X = 2) $? (2 steps)", "answer": "- Step 1: The PMF peaks at $ x = \\lfloor \\lambda \\rfloor $ (here, $ x=2 $).  \n- Step 2: Beyond the mean, probabilities decrease as $ x $ increases due to the $ x! $ in the denominator overpowering $ \\lambda^x $.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "How would you model the number of flaws in 200 m of material if flaws occur at 1.5/50 m? (2 steps)", "answer": "- Step 1: Scale $ \\lambda $: $ 1.5 \\times (200/50) = 6 $.  \n- Step 2: Model as $ X \\sim \\text{Po}(6) $.  \n+ This adjusts the rate for interval length.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Define the Poisson distribution, explain its formula, and show why it satisfies the total probability condition ΣP(X=x)=1.", "answer": "- Step 1: The Poisson distribution models the number of events occurring in a fixed interval with parameter λ (mean rate). Its formula is:  \n$$\n\\mathrm{P}(X=x) = \\frac{e^{-\\lambda} \\lambda^x}{x!}, \\quad x=0,1,2,\\dots\n$$  \n- Step 2: To prove ΣP(X=x)=1, expand the series:  \n$$\n\\sum_{x=0}^\\infty \\frac{e^{-\\lambda} \\lambda^x}{x!} = e^{-\\lambda} \\left(1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\dots\\right)\n$$  \n+ The series in the parentheses is the Taylor expansion of $e^\\lambda$.  \n- Step 3: Substitute $e^\\lambda$:  \n$$\n\\sum_{x=0}^\\infty \\mathrm{P}(X=x) = e^{-\\lambda} \\cdot e^{\\lambda} = 1.\n$$  \nThis confirms the Poisson distribution is valid.  \n\n**Takeaway:** The exponential terms normalize the probabilities to sum to 1.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Under what conditions is the Poisson distribution a suitable model for real-world scenarios? Explain why each condition is required.", "answer": "- Step 1: **Events occur independently** – The occurrence of one event does not affect others.  \n+ Example: Radioactive decay events are independent.  \n- Step 2: **Singly in time/space** – No two events occur simultaneously.  \n+ Example: Phone calls arrive individually, not in batches.  \n- Step 3: **Constant average rate (λ)** – The mean number of events in an interval is proportional to the interval length.  \n+ Example: Meteor strikes per hour have a constant mean rate.  \n**Why?** Violating independence (e.g., earthquakes triggering aftershocks) or non-constant rate (e.g., traffic accidents during rush hour) invalidates the model.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why can two independent Poisson variables $X \\sim \\text{Po}(\\lambda)$ and $Y \\sim \\text{Po}(\\mu)$ be added to form $Z=X+Y \\sim \\text{Po}(\\lambda+\\mu)$? Intuitively, why does the sum retain the Poisson property?", "answer": "- Step 1: **Independence ensures no overlap** – Events from $X$ and $Y$ don’t influence each other, so their counts combine additively.  \n- Step 2: **Constant rate addition** – The combined process has a rate $\\lambda + \\mu$ (e.g., $X$: client emails, $\\lambda=2$/hr; $Y$: customer emails, $\\mu=3$/hr → $Z$: total emails, $\\lambda+\\mu=5$/hr).  \n- Step 3: **Poisson properties preserved** – Events in $Z$ still occur independently, singly, and at a constant rate $\\lambda+\\mu$.  \n**Limitation:** If $X$ and $Y$ overlap (e.g., shared resources), independence fails, and $Z$ is not Poisson.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "Why are the mean and variance of the Poisson distribution equal? How does this property help in validating real-world data?", "answer": "- Step 1: **Mathematical derivation** – For $X \\sim \\text{Po}(\\lambda)$:  \n$$\n\\mathrm{E}(X) = \\lambda, \\quad \\mathrm{Var}(X) = \\lambda.\n$$  \n+ Proof uses probability generating functions; the equality arises from the Poisson process’s properties.  \n- Step 2: **Model validation** – If real data (e.g., daily phone calls) has sample mean ≈ sample variance, Poisson is a good fit.  \n+ Example: Call center data with mean 2.82 and variance 2.8276 supports Poisson modeling.  \n- Step 3: **Contrast with other distributions** – Binomial has $\\mathrm{Var}(X) = np(1-p) < \\mathrm{E}(X)$; overdispersed data (variance > mean) requires alternatives like Negative Binomial.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "When modeling events over time or space, how do you adjust the parameter λ for different interval lengths? Use an example to illustrate.", "answer": "- Step 1: **Proportionality** – Poisson distribution assumes the rate λ scales linearly with interval length.  \n- Step 2: **Example** – If $X \\sim \\text{Po}(4)$ for 1 hour (e.g., failed connections per hour), then for 90 minutes (1.5 hours):  \n$$\n\\lambda = 4 \\times 1.5 = 6 \\quad \\text{(so } Y \\sim \\text{Po}(6)\\text{)}.\n$$  \n- Step 3: **General rule** – For an interval $t$ times the original, $X_t \\sim \\text{Po}(\\lambda t)$.  \n+ Example: Meteors strike at 3 per minute → $X_t \\sim \\text{Po}(180)$ for 1 hour.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Solve for λ given that $X \\sim \\text{Po}(\\lambda)$ and $P(X=2) = P(X=3)$. Explain the intuition behind the result.", "answer": "- Step 1: Set up the equation:  \n$$\n\\frac{e^{-\\lambda} \\lambda^2}{2!} = \\frac{e^{-\\lambda} \\lambda^3}{3!}.\n$$  \n- Step 2: Cancel $e^{-\\lambda}$ and multiply both sides by $3!$:  \n$$\n\\frac{\\lambda^2}{2} = \\frac{\\lambda^3}{6} \\implies 3\\lambda^2 = \\lambda^3 \\implies \\lambda = 3.\n$$  \n- Step 3: **Interpretation** – At $\\lambda=3$, the probabilities of 2 and 3 events are equal. This occurs because the Poisson distribution peaks at $x=\\lfloor\\lambda\\rfloor$ or $x=\\lceil\\lambda\\rceil$.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why is the Poisson distribution unsuitable for modeling the number of earthquakes in a tectonically active region? Identify violated conditions.", "answer": "- Step 1: **Independence** – Large earthquakes trigger aftershocks, violating independence.  \n- Step 2: **Singly in time** – Earthquakes often cluster in time (e.g., aftershock sequences), violating the singly occurrence condition.  \n- Step 3: **Constant rate** – Tectonic activity changes over time (e.g., after a major quake), breaking the constant rate assumption.  \n**Alternative model:** Cluster processes like the Hawkes process.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How does the shape of the Poisson distribution change as λ increases? Contrast with a small λ.", "answer": "- Step 1: **Small λ (e.g., λ=0.5)** – Skewed right, high probability at x=0, rapidly decreasing probabilities for x≥1.  \n- Step 2: **Moderate λ (e.g., λ=3)** – Approaches a bell-shaped curve, peak around x=3.  \n- Step 3: **Large λ (e.g., λ=100)** – Approximately normal distribution (Central Limit Theorem), symmetric with spread $\\sqrt{\\lambda}$.  \n+ Example: λ=100 → Mean 100, variance 100, standard deviation 10.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Compare Poisson modeling for the number of customers arriving at a café vs. the number of customers in the café at any time. Which is better modeled as Poisson, and why?", "answer": "- Step 1: **Arrivals (Poisson)** – Customers arrive at a constant rate (e.g., 1 per 4 minutes), independently, singly → Poisson is suitable.  \n- Step 2: **Customers in café (Not Poisson)** – Number in the café depends on service times (e.g., some stay longer) → violates independence and constant rate.  \n+ Example: A café might have 10 arrivals/hour but 5 customers in the café on average – arrivals are Poisson, but in-café count is not.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": true}, {"question": "Given observed data (e.g., daily complaints), how would you check if a Poisson model is valid? Use an example.", "answer": "- Step 1: **Calculate mean and variance** – If they are approximately equal, Poisson is plausible.  \n+ Example: Σx=295, Σx²=1386, n=80 → Mean=3.69, Variance=3.73 (close → Poisson fits).  \n- Step 2: **Compare observed frequencies to Poisson probabilities** – Use χ² goodness-of-fit test if needed.  \n- Step 3: **Check model assumptions** – Independence, constant rate, singly occurrences.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Write down the probability mass function for a Poisson-distributed random variable $X$ with parameter $\\lambda$, and explain what values $X$ can take. (1 step)", "answer": "- The Poisson distribution is defined by:\n$$P(X = x) = \\frac{e^{-\\lambda} \\lambda^x}{x!}, \\quad \\text{where } x = 0, 1, 2, 3, \\ldots$$\n\nThe random variable $X$ can take any non-negative integer value (including 0). The parameter $\\lambda > 0$ represents the average rate (mean number of events) in the given interval.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Prove that $\\sum_{x=0}^{\\infty} P(X=x) = 1$ for a Poisson distribution. (3 steps)", "answer": "- Step 1: Start with the sum of probabilities:\n$$\\sum_{x=0}^{\\infty} P(X=x) = \\sum_{x=0}^{\\infty} \\frac{e^{-\\lambda} \\lambda^x}{x!}$$\n\n- Step 2: Factor out $e^{-\\lambda}$:\n$$= e^{-\\lambda} \\sum_{x=0}^{\\infty} \\frac{\\lambda^x}{x!}$$\n\n+ This is the Taylor series expansion of $e^\\lambda$, which equals $1 + \\lambda + \\frac{\\lambda^2}{2!} + \\frac{\\lambda^3}{3!} + \\ldots$\n\n- Step 3: Apply the exponential series:\n$$= e^{-\\lambda} \\cdot e^\\lambda = e^0 = 1$$\n\nThis confirms the Poisson pmf is a valid probability distribution that sums to 1.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "What are the three key conditions required for a situation to be appropriately modelled by a Poisson distribution? (2 steps)", "answer": "- Step 1: The events must occur **independently** — the occurrence of one event does not affect the probability of another event occurring.\n\n- Step 2: The events must occur **singly** (one at a time) in space or time — we cannot have two events occurring simultaneously at the same point.\n\n+ Step 3: The events occur at a **constant average rate** — the mean number of events in an interval is proportional to the length of the interval (if you double the time interval, you double the expected number).\n\nThese three conditions are the hallmark of a Poisson process.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A call centre receives an average of 6 calls per hour. If calls arrive according to a Poisson process, what would be the expected number of calls in a 45-minute period? Explain your reasoning. (2 steps)", "answer": "- Step 1: Since the rate is proportional to the interval length, we scale $\\lambda$ linearly. The rate is 6 calls per 60 minutes (1 hour), so per minute the rate is $\\frac{6}{60} = 0.1$ calls per minute.\n\n- Step 2: For 45 minutes, $\\lambda = 0.1 \\times 45 = 4.5$, or more directly: $\\lambda_{45\\text{ min}} = 6 \\times \\frac{45}{60} = 6 \\times 0.75 = 4.5$\n\nThe key insight is that $\\lambda$ scales proportionally with time because events occur at a constant average rate — this is the proportionality property of Poisson processes.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "For $X \\sim \\text{Po}(2.1)$, calculate $P(X=3)$, $P(X \\geq 1)$, and $P(1 < X \\leq 4)$. Show your reasoning. (3 steps)", "answer": "- Step 1: Using the formula $P(X=x) = \\frac{e^{-\\lambda}\\lambda^x}{x!}$ with $\\lambda = 2.1$:\n$$P(X=3) = \\frac{e^{-2.1} \\times 2.1^3}{3!} = \\frac{e^{-2.1} \\times 9.261}{6} \\approx 0.1890$$\n\n- Step 2: For $P(X \\geq 1)$, use the complement:\n$$P(X \\geq 1) = 1 - P(X=0) = 1 - e^{-2.1} \\approx 1 - 0.1225 = 0.8775$$\n\n- Step 3: For $P(1 < X \\leq 4) = P(X=2) + P(X=3) + P(X=4)$:\n$$= \\frac{e^{-2.1} \\times 2.1^2}{2!} + \\frac{e^{-2.1} \\times 2.1^3}{3!} + \\frac{e^{-2.1} \\times 2.1^4}{4!} \\approx 0.2701 + 0.1890 + 0.0993 \\approx 0.5584$$", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Why is the Poisson distribution considered a \"one-parameter\" distribution, while the binomial distribution is a \"two-parameter\" distribution? (2 steps)", "answer": "- Step 1: In the binomial distribution $B(n, p)$, we need both $n$ (number of trials) and $p$ (probability of success) to fully specify the distribution — two parameters.\n\n- Step 2: In the Poisson distribution $\\text{Po}(\\lambda)$, only $\\lambda$ is needed. Remarkably, for Poisson:\n$$E(X) = \\lambda \\quad \\text{and} \\quad \\text{Var}(X) = \\lambda$$\n\nThe mean equals the variance, so a single parameter determines both the central tendency and spread. This elegant property is unique to Poisson and stems from it being the limit of binomial as $n \\to \\infty$, $p \\to 0$ with $np = \\lambda$ fixed.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A shop records daily customer complaints over 100 days: mean = 2.82, variance = 2.83. Why does this support using a Poisson model? (2 steps)", "answer": "- Step 1: For a Poisson distribution, the theoretical property is $E(X) = \\text{Var}(X) = \\lambda$.\n\n- Step 2: The observed mean (2.82) and variance (2.83) are approximately equal. This equality (or near-equality) between mean and variance is a hallmark diagnostic for Poisson data — it's called \"equidispersion.\"\n\nIf the variance were significantly larger than the mean (overdispersion), we'd consider alternatives like the negative binomial. If smaller (underdispersion), we'd consider other models. The close agreement here strongly supports Poisson as appropriate.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "If $X \\sim \\text{Po}(\\lambda)$ and $Y \\sim \\text{Po}(\\mu)$ are independent, what distribution does $Z = X + Y$ follow? Explain why the independence condition is essential. (2 steps)", "answer": "- Step 1: If $X$ and $Y$ are independent Poisson variables, then:\n$$X + Y \\sim \\text{Po}(\\lambda + \\mu)$$\n\nThe parameters simply add. This is the additive property of Poisson distributions.\n\n- Step 2: Independence is essential because the additive property relies on the independence assumption. If $X$ and $Y$ were not independent, we couldn't simply add their parameters — the distribution of the sum would depend on their covariance.\n\n+ This property is particularly useful: the sum of independent Poisson processes (e.g., customers arriving from different sources) is still Poisson with rate equal to the sum of individual rates.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Cars pass a checkpoint at 24 per minute, vans at 8 per minute. What's the probability of exactly 5 vehicles passing in a 15-second period? Assume Poisson processes. (3 steps)", "answer": "- Step 1: Convert all rates to the same time interval. A 15-second period is $\\frac{15}{60} = 0.25$ minutes.\n\n- Step 2: Scale the rates: cars: $24 \\times 0.25 = 6$ per 15 seconds; vans: $8 \\times 0.25 = 2$ per 15 seconds. Total vehicles: $\\lambda = 6 + 2 = 8$\n\n- Step 3: Let $Z \\sim \\text{Po}(8)$, then:\n$$P(Z = 5) = \\frac{e^{-8} \\times 8^5}{5!} \\approx 0.0916$$\n\nWe add the Poisson parameters because the two vehicle types are assumed independent, then use the combined distribution.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Given $X \\sim \\text{Po}(\\lambda)$ with $P(X=2) = P(X=3)$, find the value of $\\lambda$. (2 steps)", "answer": "- Step 1: Set up the equation:\n$$\\frac{e^{-\\lambda}\\lambda^2}{2!} = \\frac{e^{-\\lambda}\\lambda^3}{3!}$$\n\n- Step 2: Cancel common terms ($e^{-\\lambda}$) and solve:\n$$\\frac{\\lambda^2}{2} = \\frac{\\lambda^3}{6} \\implies 3\\lambda^2 = \\lambda^3 \\implies \\lambda^3 - 3\\lambda^2 = 0 \\implies \\lambda^2(\\lambda - 3) = 0$$\n\nSince $\\lambda > 0$, we have $\\lambda = 3$.\n\nThis type of question tests understanding of the pmf structure — the factorial terms create ratios that simplify nicely.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "If $X \\sim \\text{Po}(\\lambda)$, prove that $E(X) = \\lambda$. (3 steps)", "answer": "- Step 1: Start with the definition of expected value:\n$$E(X) = \\sum_{x=0}^{\\infty} x \\cdot P(X=x) = \\sum_{x=0}^{\\infty} x \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!}$$\n\n- Step 2: Note that the $x=0$ term is zero, so start from $x=1$:\n$$= \\sum_{x=1}^{\\infty} \\frac{e^{-\\lambda}\\lambda^x}{(x-1)!} = e^{-\\lambda}\\lambda \\sum_{x=1}^{\\infty} \\frac{\\lambda^{x-1}}{(x-1)!}$$\n\n+ Let $k = x-1$, so as $x$ goes from $1$ to $\\infty$, $k$ goes from $0$ to $\\infty$.\n\n- Step 3: This gives:\n$$= e^{-\\lambda}\\lambda \\sum_{k=0}^{\\infty} \\frac{\\lambda^k}{k!} = e^{-\\lambda}\\lambda \\cdot e^\\lambda = \\lambda$$\n\nThe sum is the exponential series equaling $e^\\lambda$, which cancels with $e^{-\\lambda}$, leaving $\\lambda$.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "If $X \\sim \\text{Po}(\\lambda)$, prove that $\\text{Var}(X) = \\lambda$. (4 steps)", "answer": "- Step 1: Use the formula $\\text{Var}(X) = E(X^2) - [E(X)]^2$. We already know $E(X) = \\lambda$.\n\n- Step 2: Find $E(X(X-1))$ first:\n$$E[X(X-1)] = \\sum_{x=0}^{\\infty} x(x-1) \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!}$$\n\n+ For $x = 0, 1$, this is zero. Start from $x = 2$:\n$$= \\sum_{x=2}^{\\infty} \\frac{e^{-\\lambda}\\lambda^x}{(x-2)!} = e^{-\\lambda}\\lambda^2 \\sum_{x=2}^{\\infty} \\frac{\\lambda^{x-2}}{(x-2)!}$$\n\n- Step 3: Let $k = x-2$:\n$$= e^{-\\lambda}\\lambda^2 \\sum_{k=0}^{\\infty} \\frac{\\lambda^k}{k!} = e^{-\\lambda}\\lambda^2 \\cdot e^\\lambda = \\lambda^2$$\n\n- Step 4: Now use $E[X(X-1)] = E(X^2) - E(X)$:\n$$\\lambda^2 = E(X^2) - \\lambda \\implies E(X^2) = \\lambda^2 + \\lambda$$\n\nTherefore: $\\text{Var}(X) = E(X^2) - [E(X)]^2 = (\\lambda^2 + \\lambda) - \\lambda^2 = \\lambda$", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A botanist counts daisies in 80 squares: $\\sum x = 295$, $\\sum x^2 = 1386$. Calculate mean and variance, then estimate $P(X=3)$ using a Poisson model. (3 steps)", "answer": "- Step 1: Mean = $\\bar{x} = \\frac{295}{80} = 3.6875 \\approx 3.69$\n\n- Step 2: Variance = $\\frac{\\sum x^2}{n} - \\bar{x}^2 = \\frac{1386}{80} - 3.6875^2 = 17.325 - 13.5975 \\approx 3.73$\n\nNotice mean ≈ 3.69 and variance ≈ 3.73 are very close — this supports using a Poisson model (mean ≈ variance).\n\n- Step 3: Using $\\lambda = 3.69$ (or 3.7), $P(X=3) = \\frac{e^{-3.69} \\times 3.69^3}{3!} \\approx 0.2087$\n\nThe close agreement between mean and variance is the key diagnostic for Poisson suitability.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A factory produces items with defects at a rate of 2.5 per hour. What's the probability of at least 6 defects in a 3-hour period? (2 steps)", "answer": "- Step 1: Scale the parameter: $\\lambda_{3\\text{ hours}} = 2.5 \\times 3 = 7.5$. Let $X \\sim \\text{Po}(7.5)$.\n\n- Step 2: $P(X \\geq 6) = 1 - P(X \\leq 5)$\n\nUsing Poisson tables: $P(X \\leq 5) = 0.2414$, so:\n$$P(X \\geq 6) = 1 - 0.2414 = 0.7586$$\n\nAlternatively, using complement: $P(X \\geq 6) = 1 - P(X \\leq 5)$, which is often easier than summing individual probabilities.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Why is the equality $E(X) = \\text{Var}(X)$ a useful diagnostic for checking if data follows a Poisson distribution? (2 steps)", "answer": "- Step 1: For any Poisson distribution, this equality holds exactly in theory: if $X \\sim \\text{Po}(\\lambda)$, then $E(X) = \\lambda$ and $\\text{Var}(X) = \\lambda$.\n\n- Step 2: In practice, we collect sample data and compute the sample mean ($\\bar{x}$) and sample variance ($s^2$). If these are approximately equal (the data is \"equidispersed\"), it suggests Poisson is appropriate.\n\n+ If $s^2 > \\bar{x}$ significantly (overdispersion), we might use negative binomial. If $s^2 < \\bar{x}$ (underdispersion), we might use binomial or a truncated model. This mean-variance relationship is a quick visual check before formal testing.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A call centre handles 15 calls per hour. Find the probability of exactly 4 calls in a 20-minute interval, and more than 8 calls in a 30-minute interval. (3 steps)", "answer": "- Step 1: 20 minutes = $\\frac{1}{3}$ hour, so $\\lambda_{20\\text{min}} = 15 \\times \\frac{1}{3} = 5$. Let $X \\sim \\text{Po}(5)$.\n$$P(X=4) = \\frac{e^{-5} \\times 5^4}{4!} \\approx 0.1755$$\n\n- Step 2: 30 minutes = $\\frac{1}{2}$ hour, so $\\lambda_{30\\text{min}} = 15 \\times \\frac{1}{2} = 7.5$. Let $Y \\sim \\text{Po}(7.5)$.\n\n- Step 3: $P(Y > 8) = 1 - P(Y \\leq 8)$. Using tables with $\\lambda = 7.5$:\n$$P(Y \\leq 8) = 0.6620 \\quad \\text{so} \\quad P(Y > 8) = 1 - 0.6620 = 0.3380$$\n\nAlways scale $\\lambda$ proportionally to the time interval — this is the constant rate assumption in action.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Two independent Poisson processes have rates $\\lambda_1 = 3.6$ and $\\lambda_2 = 4.4$. Find $P(X+Y = 7)$ and $P(X+Y \\leq 5)$. (2 steps)", "answer": "- Step 1: Combine: $X + Y \\sim \\text{Po}(3.6 + 4.4) = \\text{Po}(8)$\n\n- Step 2: Using $\\lambda = 8$:\n$$P(X+Y = 7) = \\frac{e^{-8} \\times 8^7}{7!} \\approx 0.1396$$\n$$P(X+Y \\leq 5) = 0.1912 \\text{ (from tables)}$$\n\nThe additive property lets us combine independent Poisson sources into a single distribution.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "In a factory, machine A breaks down at 0.1 times per week, machine B at 0.05 times per week (independent). What's the probability of exactly 3 breakdowns in a 12-week period? (3 steps)", "answer": "- Step 1: Scale rates to 12 weeks: $\\lambda_A = 0.1 \\times 12 = 1.2$, $\\lambda_B = 0.05 \\times 12 = 0.6$\n\n- Step 2: Total breakdowns: $A + B \\sim \\text{Po}(1.2 + 0.6) = \\text{Po}(1.8)$\n\n- Step 3: $P(\\text{exactly 3}) = \\frac{e^{-1.8} \\times 1.8^3}{3!} \\approx 0.1607$\n\nWe sum the rates because the processes are independent, then use the combined distribution.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A shop gets 4 customers per hour on average. What's the probability that in a randomly chosen hour, exactly 2 customers arrive? What about in a 90-minute period? (3 steps)", "answer": "- Step 1: For 1 hour: $X \\sim \\text{Po}(4)$, so $P(X=2) = \\frac{e^{-4} \\times 4^2}{2!} = 0.1465$\n\n- Step 2: For 90 minutes ($1.5$ hours), scale $\\lambda$: $\\lambda = 4 \\times 1.5 = 6$, so $Y \\sim \\text{Po}(6)$\n\n- Step 3: $P(Y=5) = \\frac{e^{-6} \\times 6^5}{5!} \\approx 0.1606$\n\nThe key principle: since customers arrive at a constant average rate, $\\lambda$ scales proportionally with time. This is what makes the Poisson process \"memoryless\" in a specific sense — the rate is constant.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A company receives emails at 3 per 5 minutes. What's the probability of at least 8 emails in a 10-minute period? (2 steps)", "answer": "- Step 1: Rate is $\\frac{3}{5} = 0.6$ emails per minute. For 10 minutes: $\\lambda = 0.6 \\times 10 = 6$. Let $X \\sim \\text{Po}(6)$.\n\n- Step 2: $P(X \\geq 8) = 1 - P(X \\leq 7)$. Using tables:\n$$P(X \\leq 7) = 0.7440 \\quad \\text{so} \\quad P(X \\geq 8) = 1 - 0.7440 = 0.2560$$\n\nAlternatively, calculate directly: $P(X \\geq 8) = 1 - \\sum_{x=0}^{7} P(X=x)$", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A medical clinic sees 3 insect-bite patients per day on average. What's the probability of more than 4 patients on a given day? If over 5 days, at least 4 days have >4 patients, an extra doctor is needed. Find that probability. (3 steps)", "answer": "- Step 1: Let $X \\sim \\text{Po}(3)$. $P(X > 4) = 1 - P(X \\leq 4) = 1 - 0.8153 = 0.1847$\n\n- Step 2: Let $Y$ be number of days with $>4$ patients in 5 days. $Y \\sim B(5, 0.1847)$\n\n- Step 3: $P(Y \\geq 4) = P(Y=4) + P(Y=5)$:\n$$= \\binom{5}{4}(0.1847)^4(0.8153) + \\binom{5}{5}(0.1847)^5 \\approx 0.00496$$\n\nThis is a two-level model: Poisson for daily patient counts, then binomial for the number of \"high-load\" days.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Why can't you use the additive property of Poisson distributions when combining two processes that occur in overlapping time intervals? (2 steps)", "answer": "- Step 1: The additive property $X + Y \\sim \\text{Po}(\\lambda_X + \\lambda_Y)$ requires $X$ and $Y$ to model events in the **same** interval of time or space.\n\n- Step 2: If the intervals differ (e.g., $X$ counts events in [0, 10] and $Y$ counts in [5, 15]), they're not independent in the way needed — they overlap, and counting the sum would double-count the overlap region.\n\n+ Example: You cannot add \"cars passing in 5 minutes\" + \"cars passing in 15 minutes\" to get \"cars passing in 20 minutes\" — the 5-minute interval is already contained within the 15-minute one. You must define new variables for the same interval before adding.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "For $X \\sim \\text{Po}(\\lambda)$, if $P(X=4) = 3 \\times P(X=2)$, find $\\lambda$. (2 steps)", "answer": "- Step 1: Set up the equation:\n$$\\frac{e^{-\\lambda}\\lambda^4}{4!} = 3 \\times \\frac{e^{-\\lambda}\\lambda^2}{2!}$$\n\n- Step 2: Cancel $e^{-\\lambda}$ and solve:\n$$\\frac{\\lambda^4}{24} = 3 \\times \\frac{\\lambda^2}{2} = \\frac{3\\lambda^2}{2}$$\n$$\\lambda^4 = 24 \\times \\frac{3\\lambda^2}{2} = 36\\lambda^2$$\n$$\\lambda^2 = 36 \\implies \\lambda = 6$$\n\nSince $\\lambda > 0$, $\\lambda = 6$.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A shop has mean 1.8 sales per week. What's the probability of 0, 3, and at least 3 sales in a week? If the agent meets target at least 3 sales/week, what's probability of meeting target exactly once in 4 weeks? (4 steps)", "answer": "- Step 1: Let $X \\sim \\text{Po}(1.8)$. $P(X=0) = e^{-1.8} \\approx 0.1653$\n\n- Step 2: $P(X=3) = \\frac{e^{-1.8} \\times 1.8^3}{3!} \\approx 0.1607$\n\n- Step 3: $P(X \\geq 3) = 1 - P(X \\leq 2) = 1 - 0.8358 = 0.1642$\n\n- Step 4: Let $Y$ be weeks meeting target in 4 weeks: $Y \\sim B(4, 0.1642)$. $P(Y=1) = \\binom{4}{1}(0.1642)^1(0.8358)^3 \\approx 0.3805$\n\nTwo-stage problem: Poisson for weekly sales, then binomial for counting target-weeks.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "A road has accidents at 0.7 per month. Find probability of no accidents in a month, exactly 2 accidents in 3 months, and no accidents in exactly 2 of the next 6 months. (4 steps)", "answer": "- Step 1: No accidents in next month: $X \\sim \\text{Po}(0.7)$, $P(X=0) = e^{-0.7} \\approx 0.4966$\n\n- Step 2: Exactly 2 in 3 months: scale $\\lambda = 0.7 \\times 3 = 2.1$, $Y \\sim \\text{Po}(2.1)$, $P(Y=2) = \\frac{e^{-2.1} \\times 2.1^2}{2!} \\approx 0.2700$\n\n- Step 3: No accidents in exactly 2 of next 6 months: Each month $P(\\text{no accidents}) = e^{-0.7} \\approx 0.4966$. Let $Z \\sim B(6, 0.4966)$.\n\n- Step 4: $P(Z = 2) = \\binom{6}{2}(0.4966)^2(0.5034)^4 \\approx 0.2387$\n\nAgain, Poisson for each month, binomial for counting months with no accidents.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Why is the Poisson distribution suitable for modelling radioactive decay emissions, telephone calls, and spelling mistakes, but NOT suitable for modelling the number of heads when flipping a biased coin 20 times? (2 steps)", "answer": "- Step 1: Poisson is appropriate for radioactive decay, calls, and mistakes because these events:\n- Occur independently (one emission doesn't cause another)\n- Occur singly (one emission at a time)\n- At a constant average rate\n\n- Step 2: For 20 coin flips, we have a fixed number of trials ($n=20$) with exactly two outcomes per trial. This is a binomial situation, not Poisson. The key difference: Poisson has no fixed upper limit (theoretically infinite), while coin flips have a fixed $n$.\n\nPoisson is for \"arrivals\" or \"occurrences\" in continuous time/space; binomial is for fixed numbers of trials.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": true}, {"question": "A photocopier breaks down 0.4 times/week (floor 1), 0.2 times/week (floor 2), 0.8 times/week (floor 3). Find probability each breaks down exactly once, at least one breaks down, and exactly 2 total breakdowns in a week. (3 steps)", "answer": "- Step 1: Let $X_1 \\sim \\text{Po}(0.4)$, $X_2 \\sim \\text{Po}(0.2)$, $X_3 \\sim \\text{Po}(0.8)$, independent.\n\n- Step 2: $P(\\text{each exactly once}) = P(X_1=1)P(X_2=1)P(X_3=1)$:\n$$= (0.4e^{-0.4}) \\times (0.2e^{-0.2}) \\times (0.8e^{-0.8}) \\approx 0.0293$$\n\n- Step 3: Total breakdowns: $T = X_1 + X_2 + X_3 \\sim \\text{Po}(0.4+0.2+0.8) = \\text{Po}(1.4)$\n$$P(T \\geq 1) = 1 - P(T=0) = 1 - e^{-1.4} \\approx 0.7534$$\n$$P(T = 2) = \\frac{e^{-1.4} \\times 1.4^2}{2!} \\approx 0.2347$$\n\nFor \"at least one breaks down,\" we use the sum distribution; for \"each breaks down exactly once,\" we multiply individual probabilities because they're independent.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "A random variable $X \\sim \\text{Po}(\\lambda)$ has $P(X \\leq 10) < 0.9$ and $P(X \\leq 11) \\geq 0.9$. What can you say about $\\lambda$? (2 steps)", "answer": "- Step 1: This describes finding $\\lambda$ from Poisson cumulative tables. We're looking for where the cumulative probability crosses 0.9.\n\n- Step 2: For different $\\lambda$ values, we check:\n- If $\\lambda = 10$: $P(X \\leq 10) \\approx 0.5830$ (too low)\n- If $\\lambda = 15$: $P(X \\leq 10) \\approx 0.0485$ (way too low)\n- Actually, we need higher $\\lambda$ to make $P(X \\leq 10)$ approach 0.9\n\nWait, let me reconsider: For larger $\\lambda$, the distribution shifts right, so $P(X \\leq 10)$ decreases. To have $P(X \\leq 10) \\approx 0.9$, we'd need small $\\lambda$. Looking at tables: $\\lambda = 6$ gives $P(X \\leq 10) \\approx 0.9573$, which is > 0.9. This shows how to use tables inversely.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A fisherman catches fish at 2 per hour. What's the probability of catching at least 5 fish in a 2-hour trip? If he takes 5 trips, find probability of at least 5 fish on exactly 3 trips. (3 steps)", "answer": "- Step 1: For 2 hours: $\\lambda = 2 \\times 2 = 4$. Let $X \\sim \\text{Po}(4)$. $P(X \\geq 5) = 1 - P(X \\leq 4) = 1 - 0.6289 = 0.3711$\n\n- Step 2: For 5 trips, let $Y$ be trips with $\\geq 5$ fish: $Y \\sim B(5, 0.3711)$\n\n- Step 3: $P(Y = 3) = \\binom{5}{3}(0.3711)^3(0.6289)^2 \\approx 0.2012$\n\nThis is a classic two-level Poisson-binomial model: each trip is Poisson with scaled $\\lambda$, then binomial counts \"successful\" trips.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In a cloth manufacturing plant, 120 pieces are tested. Results: mean = 2.475, variance = 2.62. Explain why Poisson is suitable, then estimate pieces with 8+ flaws out of 10,000 weekly production. (3 steps)", "answer": "- Step 1: Mean ≈ 2.48, variance ≈ 2.62 — these are very close, supporting Poisson. The slight difference is sampling variation.\n\n- Step 2: Use $\\lambda = 2.48$ (or 2.5). For a single piece: $P(X \\geq 8) = 1 - P(X \\leq 7)$. With $\\lambda = 2.5$: $P(X \\leq 7) \\approx 0.9994$, so $P(X \\geq 8) \\approx 0.0006$\n\n- Step 3: Expected pieces with 8+ flaws = $10000 \\times 0.0006 = 6$ pieces\n\nThis shows why using observed relative frequencies for rare events (8+ flaws) would be unreliable — we observed 0 pieces with 8+ flaws in 120, giving zero estimate, which is clearly wrong. Poisson lets us extrapolate.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Why is using observed relative frequencies to estimate probability of rare events (e.g., 8+ flaws when you observed 0 in 120) unreliable? How does Poisson help? (2 steps)", "answer": "- Step 1: With 0 observed cases in 120, the observed relative frequency would be 0/120 = 0, which implies we expect 0 in 10,000 — clearly underestimate for rare events.\n\n- Step 2: Poisson uses all the data (through $\\lambda$) to estimate the tail probability. Even if we observed 0 rare events, the shape of the Poisson distribution (informed by the mean) tells us the probability isn't exactly zero.\n\nThis is why in the previous question, using Poisson gave ~6 pieces with 8+ flaws while observed frequency gave 0. The Poisson model \"borrows strength\" from the entire distribution, not just the tail itself.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": true}, {"question": "If $X \\sim \\text{Po}(\\lambda)$, what is the probability generating function (PGF)? How does this relate to $E(X)$ and $\\operatorname{Var}(X)$? (2 steps)", "answer": "- Step 1: The PGF is $G_X(t) = E(t^X) = \\sum_{x=0}^{\\infty} t^x \\cdot \\frac{e^{-\\lambda}\\lambda^x}{x!} = e^{-\\lambda} \\sum_{x=0}^{\\infty} \\frac{(\\lambda t)^x}{x!} = e^{-\\lambda} e^{\\lambda t} = e^{\\lambda(t-1)}$\n\n- Step 2: Key property: $G_X'(1) = E(X) = \\lambda$, and $G_X''(1) + G_X'(1) - [G_X'(1)]^2 = \\text{Var}(X) = \\lambda$\n\nThis is a more advanced view: the PGF completely characterizes the distribution, and its derivatives at $t=1$ give moments. The Poisson PGF has the simple form $e^{\\lambda(t-1)}$.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": true}, {"question": "What is the limitation of using Poisson tables (given typically for $\\lambda = 0$ to 10 in steps of 0.5), and how do you handle larger $\\lambda$ values? (2 steps)", "answer": "- Step 1: The tables only cover $\\lambda$ from 0 to 10 in increments of 0.5, and $x$ from 0 to 10. For $\\lambda > 10$ or non-tabulated values, you cannot directly read from tables.\n\n- Step 2: Options:\n- Use a calculator with Poisson functions\n- Use the normal approximation for large $\\lambda$: if $X \\sim \\text{Po}(\\lambda)$ with $\\lambda$ large, $X \\approx N(\\lambda, \\lambda)$\n- Interpolate (not recommended for exam)\n- Use computational tools\n\nFor example, $X \\sim \\text{Po}(15)$, find $P(X \\leq 8)$: can approximate with $N(15, 15)$, i.e., $N(15, 3.87^2)$.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A hospital receives 5 patients per hour on average. What's the probability that in any 30-minute period, exactly 4 patients arrive, and that at least 3 arrive? (2 steps)", "answer": "- Step 1: For 30 minutes = 0.5 hours: $\\lambda = 5 \\times 0.5 = 2.5$. Let $X \\sim \\text{Po}(2.5)$.\n\n- Step 2: From tables or calculation:\n$$P(X = 4) = \\frac{e^{-2.5} \\times 2.5^4}{4!} \\approx 0.1336$$\n$$P(X \\geq 3) = 1 - P(X \\leq 2) = 1 - 0.5438 = 0.4562$$\n\nNote: $P(X \\geq 3)$ includes 3, 4, 5, ... all values 3 or more.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "The number of raisins in a fruitcake follows $\\text{Po}(2.5)$. A packet has 4 cakes. Find probability of more than 12 raisins total in a packet. If 8 packets selected, find probability exactly 2 packets have >12 raisins. (4 steps)", "answer": "- Step 1: For one cake: $P(\\text{>12 raisins}) = 1 - P(X \\leq 12)$ with $X \\sim \\text{Po}(2.5)$. Since $\\lambda = 2.5$ is small, $P(X \\leq 12) \\approx 1$, so $P(X > 12) \\approx 0$ — wait, let me reconsider.\n\nActually with mean 2.5, having more than 12 is astronomically unlikely. Let me recalculate properly:\n\nWith $\\lambda = 2.5$, the probability of 12+ is essentially 0. Let me use calculator: $P(X \\leq 12) = 0.9999999...$, so $P(X > 12) \\approx 0.0000001$\n\nActually, I think the question meant \"at least 12\" or I'm misunderstanding. Let me assume it's \"at least 12\" or maybe it's a different $\\lambda$. Looking at the question again: the mean is 2.5, having more than 12 is essentially impossible. This seems like a typo in my thinking — wait, the original question is in the material. Let me check... Actually maybe it's \"at least 2\" or something else? \n\nLet me just proceed with the calculation as stated: with $\\lambda=2.5$, $P(X > 12)$ is effectively zero. But the question is from the material, so let me assume it's correct.\n\nActually, I'll recalculate: $P(X > 12)$ would require computing from the Poisson with $\\lambda=2.5$, which is negligible.\n\nWait, I think I see it now - maybe it's asking about a different scenario. Let me recalculate with the correct understanding:\n\nFor total in 4 cakes: $T \\sim \\text{Po}(4 \\times 2.5) = \\text{Po}(10)$\n$P(T > 12) = 1 - P(T \\leq 12) = 1 - 0.7916 = 0.2084$\n\nLet me correct: For one cake mean 2.5, 4 cakes have mean 10. $P(T > 12) = 1 - P(T \\leq 12) = 1 - 0.7916 = 0.2084$\n\nFor 8 packets with $p = 0.2084$: $Y \\sim B(8, 0.2084)$, $P(Y = 2) = \\binom{8}{2}(0.2084)^2(0.7916)^6 \\approx 0.2829$", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "A website gets 240 visits per hour. What's the distribution for visits in a 1-minute interval? Find probability of 8 visits in a minute and at least 10 in 2 minutes. (3 steps)", "answer": "- Step 1: 240 per hour = 4 per minute. For 1 minute: $X \\sim \\text{Po}(4)$.\n\n- Step 2: $P(X = 8) = \\frac{e^{-4} \\times 4^8}{8!} \\approx 0.0298$\n\n- Step 3: For 2 minutes: $\\lambda = 4 \\times 2 = 8$, $Y \\sim \\text{Po}(8)$. $P(Y \\geq 10) = 1 - P(Y \\leq 9) = 1 - 0.4559 = 0.5441$\n\nThe rate per minute is 240/60 = 4. Scale linearly for any time interval.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "In a call centre, 15 calls per hour. Find probability of at least 6 boats hired in a 30-minute period when rate is 9/hour. Then show that with 8 boats, probability of running out is <1% for 20-minute periods. (3 steps)", "answer": "- Step 1: For 30 min at 9/hour: $\\lambda = 9 \\times 0.5 = 4.5$. $P(X \\geq 6) = 1 - P(X \\leq 5) = 1 - 0.7029 = 0.2971$\n\n- Step 2: For 20 min at 9/hour: $\\lambda = 9 \\times \\frac{20}{60} = 3$. With 8 boats, running out means >8 customers: $P(X > 8) = 1 - P(X \\leq 8)$\n\n- Step 3: With $\\lambda = 3$: $P(X \\leq 8) \\approx 0.9999$, so $P(X > 8) \\approx 0.0001 < 0.01$ (1%). This confirms probability is less than 1%.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "A machine breaks down 1.5 times/week. Find probability of ≤2 breakdowns in a week, and ≥5 in a 2-week period. If >n breakdowns in 6 weeks triggers refund, find smallest n for P(refund) ≤ 0.05. (3 steps)", "answer": "- Step 1: $X \\sim \\text{Po}(1.5)$, $P(X \\leq 2) = 0.8088$\n\n- Step 2: For 2 weeks: $\\lambda = 1.5 \\times 2 = 3$, $Y \\sim \\text{Po}(3)$. $P(Y \\geq 5) = 1 - P(Y \\leq 4) = 1 - 0.8153 = 0.1847$\n\n- Step 3: For 6 weeks: $\\lambda = 1.5 \\times 6 = 9$. Find smallest $n$ where $P(X > n) \\leq 0.05$, i.e., $P(X \\leq n) \\geq 0.95$. From tables: $P(X \\leq 12) = 0.9262$, $P(X \\leq 13) = 0.9585$. So $n = 13$.\n\nSmallest $n$ such that $P(X > n) \\leq 0.05$ means $n = 13$.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A car salesman sells 6 cars/week on average. Suggest a suitable model and find probability of exactly 5 in a week, and exactly 2 weeks with exactly 5 sales in 4 weeks. (3 steps)", "answer": "- Step 1: Poisson is suitable because sales occur independently, singly, at constant rate. $X \\sim \\text{Po}(6)$.\n\n- Step 2: $P(X = 5) = \\frac{e^{-6} \\times 6^5}{5!} \\approx 0.1606$\n\n- Step 3: In 4 weeks, let $Y$ be weeks with exactly 5 sales: $Y \\sim B(4, 0.1606)$. $P(Y = 2) = \\binom{4}{2}(0.1606)^2(0.8394)^2 \\approx 0.2012$\n\nTwo levels again: Poisson for weekly sales, binomial for counting weeks with specific outcomes.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Compare the binomial and Poisson distributions: when is each appropriate? Why is Poisson sometimes called the \"limit of binomial\"? (2 steps)", "answer": "- Step 1: Binomial $B(n, p)$: fixed $n$ trials, each trial has constant $p$, counts successes. Poisson: counts events in continuous time/space, no fixed upper limit, one parameter $\\lambda$.\n\n- Step 2: Poisson is the limiting case of binomial as $n \\to \\infty$, $p \\to 0$ with $np = \\lambda$ fixed. When $n$ is large and $p$ is small, binomial with $(n, p)$ is approximately $\\text{Po}(np)$.\n\nThis is why Poisson models rare events in large populations — the binomial approximation becomes accurate.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Why might a Poisson model be unsuitable for modelling the number of customers arriving at a restaurant during lunch rush (12pm-2pm)? What could be a better model? (2 steps)", "answer": "- Step 1: During lunch rush, the arrival rate is NOT constant — it's high around 12-1pm and lower at 2pm. The Poisson assumption of constant average rate is violated.\n\n- Step 2: Better models might include:\n- Non-homogeneous Poisson process (rate varies with time)\n- Time-varying binomial\n- Splittin\n\nThe key violation: Poisson requires the rate to be constant throughout the interval. Time-varying rates need more complex models.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Two friends receive letters: Aisha 1.2/day, Biyu 0.8/day. Find probability each gets at least 1 letter on a particular day, and total of 3 letters. For 5-day week, find probability of total 3 letters on at least 3 days. (4 steps)", "answer": "- Step 1: Aisha: $X \\sim \\text{Po}(1.2)$, $P(X \\geq 1) = 1 - e^{-1.2} = 0.6988$; Biyu: $Y \\sim \\text{Po}(0.8)$, $P(Y \\geq 1) = 1 - e^{-0.8} = 0.5507$. Since independent: $P(\\text{both} \\geq 1) = 0.6988 \\times 0.5507 \\approx 0.3848$\n\n- Step 2: Total $T = X + Y \\sim \\text{Po}(2.0)$. $P(T = 3) = \\frac{e^{-2} \\times 2^3}{3!} \\approx 0.1805$\n\n- Step 3: For 5 days, each day total $\\sim \\text{Po}(2)$. Let $Z$ be days with exactly 3 letters: $P(Z = 3) = \\frac{e^{-2} \\times 2^3}{3!} = 0.1805$. Then $W \\sim B(5, 0.1805)$.\n\n- Step 4: $P(W \\geq 3) = P(W=3) + P(W=4) + P(W=5) = \\binom{5}{3}(0.1805)^3(0.8195)^2 + \\binom{5}{4}(0.1805)^4(0.8195) + \\binom{5}{5}(0.1805)^5 \\approx 0.0465 + 0.0061 + 0.0003 \\approx 0.0529$", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "A shop sells desktops at 2.4/day, laptops at 1.6/day. Find probability of at least 2 of each on a day, combined total of 6, and over 2 days total ≤6. (3 steps)", "answer": "- Step 1: $D \\sim \\text{Po}(2.4)$, $L \\sim \\text{Po}(1.6)$. $P(D \\geq 2) = 1 - P(D \\leq 1) = 1 - 0.4098 = 0.5902$. Similarly $P(L \\geq 2) = 1 - 0.5247 = 0.4753$. Independent: $0.5902 \\times 0.4753 \\approx 0.2805$\n\n- Step 2: Total $T = D + L \\sim \\text{Po}(4.0)$. $P(T = 6) = \\frac{e^{-4} \\times 4^6}{6!} \\approx 0.1042$\n\n- Step 3: For 2 days: $\\lambda = 4 \\times 2 = 8$. $T_{2\\text{days}} \\sim \\text{Po}(8)$. $P(T_{2\\text{days}} \\leq 6) = P(X \\leq 6) = 0.3134$", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "A roundabout has 15 accidents/year. Find probability of <5 accidents in 6 months, at least 1 in a month, and at least 1 in exactly 4 of 6 months. (4 steps)", "answer": "- Step 1: 6 months = half year, so $\\lambda = 15 \\times 0.5 = 7.5$. $X \\sim \\text{Po}(7.5)$, $P(X < 5) = P(X \\leq 4) = 0.0244$\n\n- Step 2: For 1 month: $\\lambda = 15 \\times \\frac{1}{12} = 1.25$. $Y \\sim \\text{Po}(1.25)$, $P(Y \\geq 1) = 1 - e^{-1.25} \\approx 0.7135$\n\n- Step 3: Let $Z$ be months with ≥1 accident: $Z \\sim B(6, 0.7135)$. $P(Z = 4) = \\binom{6}{4}(0.7135)^4(0.2865)^2 \\approx 0.3234$\n\nThe monthly probability of at least 1 accident comes from the monthly rate.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "An elevator breaks down 3 times per 4 weeks. Find probability of at least once in 1 week, exactly twice in 1 week. If it broke down twice in one week, what's probability of at least once in next week? Explain. (3 steps)", "answer": "- Step 1: Rate = 3 per 4 weeks = 0.75 per week. $X \\sim \\text{Po}(0.75)$. $P(X \\geq 1) = 1 - e^{-0.75} \\approx 0.5276$. $P(X = 2) = \\frac{e^{-0.75} \\times 0.75^2}{2!} \\approx 0.1763$\n\n- Step 2: If it broke down twice in one week, what's probability of at least once in the next week? The answer is still $P(X \\geq 1) = 0.5276$.\n\n- Step 3: Reason: Poisson process is \"memoryless\" in a specific sense — the probability of future events depends only on the rate and time interval, not on what happened in the past. Each week is independent in this sense (the process doesn't \"remember\" previous weeks). This is why the probability remains the same regardless of what happened previously.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": true}, {"question": "What is the key difference between $P(X \\leq a)$ and $P(X < a)$ when working with Poisson distribution? How do you find $P(X < a)$ using tables? (2 steps)", "answer": "- Step 1: For discrete distributions like Poisson:\n- $P(X \\leq a)$ includes $a$\n- $P(X < a)$ excludes $a$, so $P(X < a) = P(X \\leq a-1)$\n\n- Step 2: Using cumulative tables (which give $P(X \\leq x)$):\n- To find $P(X < 5)$, use $P(X \\leq 4)$\n- To find $P(X \\leq 5)$, directly read from table\n- To find $P(X > 5)$, use $1 - P(X \\leq 5)$\n\nThis distinction matters crucially for inequality questions.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "A chocolate chip biscuit has mean 5 chips per biscuit. Find probability a biscuit has <3 chips. For a packet of 6 biscuits, find probability exactly half (<3 chips). (3 steps)", "answer": "- Step 1: $X \\sim \\text{Po}(5)$, $P(X < 3) = P(X \\leq 2) = P(X=0) + P(X=1) + P(X=2) = e^{-5} + 5e^{-5} + \\frac{25}{2}e^{-5} \\approx 0.1247$\n\n- Step 2: For each biscuit, $p = 0.1247$. In a packet of 6, let $Y$ be biscuits with <3 chips: $Y \\sim B(6, 0.1247)$\n\n- Step 3: $P(Y = 3) = \\binom{6}{3}(0.1247)^3(0.8753)^3 \\approx 0.0159$\n\nThis is a compound problem: Poisson for chips per biscuit, then binomial for counting biscuits in the packet.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "A company wants to be 99% sure of fulfilling all requests for buses on a Sunday. Mean requests = 5/week. How many buses needed? (2 steps)", "answer": "- Step 1: We need $n$ buses such that $P(X \\leq n) \\geq 0.99$ where $X \\sim \\text{Po}(5)$.\n\n- Step 2: From Poisson tables:\n- $P(X \\leq 9) = 0.9682$\n- $P(X \\leq 10) = 0.9913$\n\nSo we need 10 buses (since with 9, $P(\\text{fulfilled}) = 0.9682 < 0.99$; with 10, $P = 0.9913 > 0.99$).\n\nThis is a capacity planning problem: find the 99th percentile of the Poisson distribution.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "Explain why the Poisson distribution is a good model for radioactive decay but not for the number of people in a queue at a bank. (2 steps)", "answer": "- Step 1: Radioactive decay is a classic Poisson process because:\n- Emissions occur independently\n- One at a time (singly)\n- At a constant average rate (each atom has fixed probability of decay per unit time)\n\n- Step 2: Queue at a bank violates Poisson assumptions because:\n- Arrivals are not independent (families arrive together)\n- Rate varies with time (lunch hour vs. morning)\n- May have \"batching\" (multiple people arrive t
