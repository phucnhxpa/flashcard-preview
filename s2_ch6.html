nks. Averaging more observations \"smooths out\" the random fluctuations, making the sample mean less variable and more tightly clustered around $$\\mu$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "The formula for sample variance is often given as $$S^2 = \\frac{\\sum(X_i - \\bar{X})^2}{n-1}$$. Conceptually, why is the denominator $$n-1$$ rather than $$n$$, and how does this relate to the definition of a statistic? (2 steps)", "answer": "- Step 1: The denominator $$n-1$$ is used to make $$S^2$$ an **unbiased** estimator of the population variance $$\\sigma^2$$. If we used $$n$$, the sample variance would systematically underestimate the true population variance because the sample values are naturally clustered around the sample mean $$\\bar{X}$$ rather than the population mean $$\\mu$$.\n- Step 2: This formula is a statistic because it is calculated entirely from sample observations ($$X_i$$ and $$\\bar{X}$$). If the formula used $$\\mu$$ instead of $$\\bar{X}$$, it would involve an unknown population parameter and would no longer be a statistic.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A random sample $$Y_1, Y_2, \\dots, Y_n$$ is taken from a population with unknown mean $$\\mu$$ and variance $$\\sigma^2$$. Which of the following is NOT a statistic, and why?\ni) $$\\frac{Y_1 + Y_2}{2}$$\nii) $$\\frac{\\sum Y}{n} - \\mu$$\niii) $$\\frac{\\sum Y^2}{n} - \\left(\\frac{\\sum Y}{n}\\right)^2$$ (2 steps)", "answer": "- Step 1: A statistic is a quantity calculated *only* from the observations in a sample, without involving unknown population parameters.\n- Step 2: Expression (ii) $$\\frac{\\sum Y}{n} - \\mu$$ is **not a statistic** because it contains $$\\mu$$, the unknown population mean. Expressions (i) and (iii) only use sample observations $$Y_i$$ and sample size $$n$$, so they are statistics. (Note: Expression iii is actually an alternate algebraic formula for the sample variance $$S^2$$).", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}], "count": 20}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In statistical analysis, what is the fundamental difference between a 'population' and a 'sample', and why do we typically use the latter to learn about the former? (2 steps)", "answer": "- Step 1: A population is the entire set of items of interest (e.g., all light bulbs produced by a factory), whereas a sample is a subset of observations taken from that population.\n- Step 2: We typically use a sample because measuring the entire population (a census) is often too time-consuming, expensive, or practically impossible, especially if the testing process destroys the item. A sample allows us to infer properties about the whole population efficiently.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A census observes every member of a population. What is its primary advantage, and what are its three main practical disadvantages? (2 steps)", "answer": "- Step 1: The primary advantage of a census is that it should give a completely accurate result, as no member of the population is left out.\n- Step 2: The three main practical disadvantages are:\n+ It is time-consuming and expensive.\n+ It cannot be used when the testing process destroys the item (e.g., testing the breaking point of a safety rope).\n+ It is hard to process the massive quantity of data generated.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "A manufacturer tests the lifespan of microswitches by operating them until they break. Explain why a census is fundamentally inappropriate in this scenario. (2 steps)", "answer": "- Step 1: A census requires testing every single member of the population. In this scenario, the testing process destroys the item being tested.\n- Step 2: If a census were conducted, every microswitch would be broken during testing, leaving zero products available for sale. Therefore, sampling is the only viable method for destructive testing.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "How does the natural variation within a population influence the required sample size to achieve a given level of accuracy? (2 steps)", "answer": "- Step 1: The natural variation (or variance) of a population dictates how spread out the individual values are.\n- Step 2: If a population is very varied (high variance), you need a larger sample size to ensure you capture the true spread and characteristics of the population. If the population is uniform, a smaller sample can accurately represent it.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Distinguish between a 'sampling unit' and a 'sampling frame' in the context of surveying a population. (2 steps)", "answer": "- Step 1: A sampling unit is an individual member or item of the population (e.g., a single student in a school).\n- Step 2: A sampling frame is a list of all the sampling units, often with each unit named or numbered, which is used in practice to represent the population from which a sample is drawn (e.g., the school's register of students).", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "What is the difference between a 'population parameter' and a 'statistic', and what notation convention typically distinguishes them? (2 steps)", "answer": "- Step 1: A population parameter is a fixed, usually unknown numerical property of the entire population (e.g., the true mean). A statistic is a quantity calculated only from the observations in a sample, containing no unknown parameters.\n- Step 2: Notation convention dictates that Greek letters are used for population parameters (e.g., $$\\mu$$, $$\\sigma^2$$), whereas Roman letters are used for statistics calculated from sample data (e.g., $$\\bar{X}$$, $$S^2$$).", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Given a random sample $$X_1, X_2, \\dots, X_n$$ from a population with unknown mean $$\\mu$$ and unknown variance $$\\sigma^2$$, determine whether $$\\frac{\\sum X_i^2}{n} - \\mu^2$$ is a statistic. Explain your reasoning. (2 steps)", "answer": "- Step 1: Recall the definition of a statistic: it must be calculated only from the observations in the sample and cannot involve any unknown population parameters.\n- Step 2: The expression $$\\frac{\\sum X_i^2}{n} - \\mu^2$$ contains $$\\mu^2$$, which is the square of the unknown population mean. Since it depends on an unknown parameter, it is not a statistic.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "A researcher calculates the variance of a sample using the formula $$S^2 = \\frac{\\sum(X_i - \\bar{X})^2}{n-1}$$. Is this a statistic? What if they used $$\\frac{\\sum(X_i - \\mu)^2}{n-1}$$? (3 steps)", "answer": "- Step 1: Apply the rule that a statistic must only use sample observations and known quantities.\n- Step 2: The formula $$S^2 = \\frac{\\sum(X_i - \\bar{X})^2}{n-1}$$ uses $$X_i$$ (sample observations) and $$\\bar{X}$$ (the sample mean, calculated from observations), so this is a statistic.\n- Step 3: The formula $$\\frac{\\sum(X_i - \\mu)^2}{n-1}$$ uses $$\\mu$$, the population mean, which is an unknown parameter. Therefore, this is not a statistic.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "If you repeatedly take samples from a population and calculate the same statistic for each sample, the statistic will vary. What is this distribution of the statistic called, and what does it represent? (2 steps)", "answer": "- Step 1: This distribution is called the sampling distribution of the statistic.\n- Step 2: It represents all the possible values the statistic can take and the probability that each value would happen by chance alone. It captures the natural variation from sample to sample.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "A random sample of 15 students is asked if they support a uniform, with $$X_i = 1$$ for support and $$X_i = 0$$ otherwise. If the true proportion of support is $$p$$, what is the sampling distribution of the statistic $$Y = \\sum_{i=1}^{15} X_i$$, and why? (3 steps)", "answer": "- Step 1: Identify the nature of the observations: each $$X_i$$ is an independent trial with two outcomes (success=1, failure=0), and the probability of success $$p$$ is constant.\n- Step 2: Recognize that the sum of $$n$$ independent Bernoulli trials with constant probability $$p$$ follows a binomial distribution.\n- Step 3: Therefore, the statistic $$Y$$, which counts the total number of successes in the sample of 15, has the sampling distribution $$Y \\sim \\mathrm{B}(15, p)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "A population consists of items with values 60 and 100, where $$P(X=60) = \\frac{3}{4}$$ and $$P(X=100) = \\frac{1}{4}$$. If a random sample of size 3 is taken, explain conceptually how you would find the sampling distribution of the sample mean $$\\bar{X}$$. (3 steps)", "answer": "- Step 1: List all possible combinations of the 3 items in the sample. Since each item can be 60 or 100, there are $$2^3 = 8$$ possible samples (e.g., (60,60,60), (60,60,100), etc.).\n- Step 2: Calculate the sample mean $$\\bar{x}$$ for each possible combination. For example, (60,60,100) gives $$\\bar{x} = \\frac{220}{3} = 73\\frac{1}{3}$$.\n- Step 3: Find the probability of each sample occurring (using the given probabilities and independence), then group the samples by their calculated mean to find the probability of each distinct mean value.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Using the same population from the previous question (values 60 and 100 with $$P(X=60) = \\frac{3}{4}$$), a sample of 3 is taken. What are the only possible values for the sample mode $$M$$, and which samples yield a mode of 60? (2 steps)", "answer": "- Step 1: Since the sample size is 3, the mode (most frequent value) can only be 60 or 100. There is no possibility of no mode or a different value.\n- Step 2: The mode is 60 for any sample where 60 appears at least twice. This includes the sample (60,60,60) and the three permutations of (60,60,100).", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A sample of 3 counters is drawn from a bag with values 0, 1, and 2. When finding the sampling distribution of the median, a student claims that the median can only be 1 because it is the middle value of the population. Is this correct? Explain. (2 steps)", "answer": "- Step 1: The claim is incorrect. The median of a sample depends on the specific observations drawn, not the population's range.\n- Step 2: The sample median is the middle value when the three drawn counters are sorted. If the sample is (0,0,0), the median is 0. If the sample is (2,2,2), the median is 2. Thus, the median can take the values 0, 1, or 2 depending on the sample.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "If the population mean is $$\\mu$$ and you construct the sampling distribution of the sample mean $$\\bar{X}$$, what would you expect the mean of this sampling distribution $$E(\\bar{X})$$ to be, and what does this imply about the sample mean as an estimator? (3 steps)", "answer": "- Step 1: Consider that each observation $$X_i$$ in the sample comes from the population, so $$E(X_i) = \\mu$$.\n- Step 2: The sample mean is $$\\bar{X} = \\frac{X_1 + X_2 + \\dots + X_n}{n}$$. By the linearity of expectation, $$E(\\bar{X}) = \\frac{E(X_1) + E(X_2) + \\dots + E(X_n)}{n} = \\frac{n\\mu}{n} = \\mu$$.\n- Step 3: This implies that the sample mean is an unbiased estimator of the population mean; on average, it hits the true population parameter.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "A population has values 60 and 100 with $$P(X=60) = \\frac{3}{4}$$ and $$P(X=100) = \\frac{1}{4}$$. A random sample of 3 is taken. What is the probability that the sample mean $$\\bar{X}$$ is exactly 60? (2 steps)", "answer": "- Step 1: Identify the condition required for the sample mean to be 60. The sum of the three observations must be $$3 \\times 60 = 180$$, which means every single observation in the sample must be 60 (i.e., the sample is (60, 60, 60)).\n- Step 2: Calculate the probability of drawing (60, 60, 60). Since the draws are independent, this is $$P(X=60) \\times P(X=60) \\times P(X=60) = \\left(\\frac{3}{4}\\right)^3 = \\frac{27}{64}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "Using the same population ($$P(X=60) = \\frac{3}{4}$$, $$P(X=100) = \\frac{1}{4}$$, sample size 3), find the probability that the mode $$M$$ is 100. (2 steps)", "answer": "- Step 1: The mode is 100 only if 100 appears at least twice in the sample of 3. This happens if the sample is (100,100,100) or any permutation of (100,100,60).\n- Step 2: Calculate these probabilities.\n+ $$P(\\text{three 100s}) = \\left(\\frac{1}{4}\\right)^3 = \\frac{1}{64}$$.\n+ $$P(\\text{two 100s, one 60}) = 3 \\times \\left(\\frac{1}{4}\\right)^2 \\times \\left(\\frac{3}{4}\\right) = \\frac{9}{64}$$.\nThe total probability is $$\\frac{1}{64} + \\frac{9}{64} = \\frac{10}{64} = \\frac{5}{32}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "A researcher uses a telephone directory as a sampling frame to estimate the average income of a town's population. Give one reason why this sampling frame might not perfectly represent the population. (2 steps)", "answer": "- Step 1: A sampling frame is the list from which the sample is actually drawn, whereas the population is the entire group of interest.\n- Step 2: A telephone directory will exclude individuals who are ex-directory, those who only use mobile phones, and those without any phone. These groups might have different income levels than those listed, causing the frame to misrepresent the true population and introducing bias.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "A student calculates the sample mean $$\\bar{x}$$ from a sample and calls it a 'population parameter'. Is this correct? Explain the distinction. (2 steps)", "answer": "- Step 1: This is incorrect. A population parameter is a fixed, usually unknown value that describes the entire population (like $$\\mu$$).\n- Step 2: The sample mean $$\\bar{x}$$ is a statistic because it is calculated only from the sample observations. It varies from sample to sample and is used to estimate the population parameter, but it is not the parameter itself.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "If the population variance is $$\\sigma^2$$ and a sample of size $$n$$ is taken, how does the variance of the sample mean $$\\text{Var}(\\bar{X})$$ compare to $$\\sigma^2$$? What does this imply about larger samples? (3 steps)", "answer": "- Step 1: The variance of the sample mean is given by $$\\text{Var}(\\bar{X}) = \\frac{\\sigma^2}{n}$$.\n- Step 2: This means the spread of the sampling distribution of the mean is smaller than the spread of the population itself.\n- Step 3: As the sample size $$n$$ increases, the variance $$\\text{Var}(\\bar{X})$$ decreases. This implies that larger samples yield sample means that are more tightly clustered around the true population mean, making them more reliable estimators.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "A large bag of counters has 10% labelled 0, 40% labelled 1, and 50% labelled 2. A sample of 3 is taken. Conceptually, what sequences of draws would result in a sample median of 1? (2 steps)", "answer": "- Step 1: The median of 3 numbers is the middle value when sorted. For the median to be 1, at least one counter must be a 1, and it cannot be the case that two or more counters are 0 (which would make the median 0) or two or more are 2 (which would make the median 2).\n- Step 2: Therefore, the valid combinations for a median of 1 are: all three are 1s; two are 1s and one is 0; two are 1s and one is 2; one is 1, one is 0, and one is 2. You would calculate the probability of each sequence and sum them up.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "The sample variance is often calculated as $$S^2 = \\frac{\\sum(X_i - \\bar{X})^2}{n-1}$$ rather than dividing by $$n$$. Conceptually, why is dividing by $$n-1$$ necessary in the context of estimating the population variance? (3 steps)", "answer": "- Step 1: The numerator $$\\sum(X_i - \\bar{X})^2$$ measures the spread of the sample around its own sample mean $$\\bar{X}$$, not the true population mean $$\\mu$$.\n- Step 2: The sample values are always closer to their own mean $$\\bar{X}$$ than they are to the population mean $$\\mu$$. Thus, dividing by $$n$$ would systematically underestimate the true population variance (this is called bias).\n- Step 3: Dividing by $$n-1$$ (the degrees of freedom) corrects for this underestimation, making $$S^2$$ an unbiased estimator of $$\\sigma^2$$. We lose one degree of freedom because we used $$\\bar{X}$$ to estimate $$\\mu$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}], "count": 21}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What are the fundamental differences between a population, a census, and a sample? Why might we choose a sample over a census? (3 steps)", "answer": "- Step 1: A **population** is the entire set of items of interest. A **census** measures every single member of that population, whereas a **sample** measures only a subset of the population to infer information about the whole.\n- Step 2: We often choose a sample over a census due to practical constraints. A census is highly time-consuming and expensive. Furthermore, if the testing process destroys the item (destructive testing), a census would leave no population left to use!\n- Step 3: Samples are cheaper and faster, but they introduce a trade-off: the data may be less accurate, and small subgroups of the population might be entirely missed. A census, while theoretically perfectly accurate, is often practically impossible.\n\nTakeaway: A census gives complete data at infinite cost; a sample trades some accuracy for practical feasibility.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "A factory produces safety ropes and needs to verify the maximum load they can bear before breaking. Explain why a census is fundamentally impossible here, and how this constraint dictates the factory's approach to quality control. (2 steps)", "answer": "- Step 1: Measuring the breaking load requires applying force until the rope snaps. This is **destructive testing**. If the factory performed a census (testing every rope), they would have zero ropes left to sell, defeating the purpose of manufacturing them.\n- Step 2: Therefore, the factory *must* use a sample. They test a small number of ropes, calculate a sample statistic (like the mean breaking load), and use it as an estimate for the population parameter. They accept the inherent uncertainty that the sample might not perfectly represent the whole batch, but they preserve their inventory.\n\nTakeaway: Destructive testing makes sampling a necessity, not just a convenience.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "What is the distinction between a sampling unit and a sampling frame? Why might a sampling frame not perfectly represent the population? (2 steps)", "answer": "- Step 1: A **sampling unit** is an individual member of the population. A **sampling frame** is the actual list of named or numbered sampling units used to draw the sample in practice (e.g., an electoral roll, a register).\n- Step 2: They may not match perfectly because the sampling frame can be incomplete, outdated, or contain duplicates. For example, a phone directory (frame) might miss people with unlisted numbers or include people who have moved, meaning it doesn't perfectly align with the target population of all residents.\n\nTakeaway: The sampling frame is the practical tool, but it's vulnerable to real-world data decay.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Contrast a population parameter with a sample statistic in terms of what they describe and their observability. (2 steps)", "answer": "- Step 1: A **population parameter** (e.g., $$\\mu$$, $$\\sigma^2$$) is a fixed numerical property of the entire population. Because populations are usually too large to measure completely, parameters are typically *unknown constants*.\n- Step 2: A **sample statistic** (e.g., $$\\bar{X}$$, $$S^2$$) is a quantity calculated *only* from the observations in a sample. Because it depends on which sample is randomly chosen, a statistic is a *variable* that we use to estimate the unknown parameter.\n\nTakeaway: Parameters are the unknown targets; statistics are the known, variable estimators.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "Consider the expression $$\\frac{\\sum(X_i - \\mu)^2}{n}$$. Since it is calculated using sample observations $$X_i$$, is it a statistic? Explain why or why not based on the strict definition. (2 steps)", "answer": "- Step 1: No, it is not a statistic.\n- Step 2: The strict definition of a statistic requires that it be calculated *only* from the observations in the sample. This expression contains $$\\mu$$, which is the population mean (a population parameter). Since a statistic must not involve any unknown population parameters, this expression fails the definition.\n\nTakeaway: A true statistic must be computable solely from the data you have in front of you, without requiring unknown truths about the wider population.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "In sampling theory, we use capital letters like $$X_i$$ and $$\\bar{X}$$, but in calculations with real data, we use lowercase like $$x_i$$ and $$\\bar{x}$$. What is the conceptual reason for this notational split? (2 steps)", "answer": "- Step 1: Capital letters ($$X_i$$, $$\\bar{X}$$) denote **random variables**. Before a sample is drawn, the specific values we will observe are uncertain; they follow a probability distribution. $$\\bar{X}$$ represents all possible sample means we *could* get.\n- Step 2: Lowercase letters ($$x_i$$, $$\\bar{x}$$) denote **observed values**. Once the sample has been taken, the random variables have crystallized into fixed, known numbers. $$\\bar{x}$$ is one specific realization of the random variable $$\\bar{X}$$.\n\nTakeaway: Capitals = the realm of probability and \"what could happen\"; lowercase = the realm of data and \"what actually happened\".", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "What is a sampling distribution, and how does it conceptually arise from the act of repeated sampling? (2 steps)", "answer": "- Step 1: If you repeatedly take samples of the same size from a population and calculate the same statistic (like the mean) for each sample, you will get a range of different values due to natural variation in the population.\n- Step 2: The **sampling distribution** is the probability distribution of that statistic. It maps every possible value the statistic could take to the probability of it occurring by chance alone. It describes the behavior of the statistic across all possible samples.\n\nTakeaway: A sampling distribution is the theoretical blueprint of how a statistic varies from sample to sample.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A researcher asks 20 randomly selected individuals if they support a new policy (1 = Yes, 0 = No). The statistic of interest is $$Y = \\sum_{i=1}^{20} X_i$$. Why does the sampling distribution of $$Y$$ follow a Binomial distribution, and what are its parameters? (3 steps)", "answer": "- Step 1: The sampling distribution of $$Y$$ (the total number of \"yes\" responses) follows a binomial distribution because the sampling process meets the binomial conditions: a fixed number of trials, two possible outcomes, independent trials (assuming the population is large enough or sampling is with replacement), and a constant probability of success.\n- Step 2: The \"number of trials\" is the sample size, so $$n = 20$$.\n- Step 3: The \"probability of success\" is the true proportion of the population that supports the policy, denoted $$p$$. Thus, the sampling distribution is $$Y \\sim \\text{B}(20, p)$$.\n\nTakeaway: When the raw data is binary (0/1), the sum of the sample observations perfectly maps to the Binomial model.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A population of light bulbs has wattages of 60W and 100W in a 3:1 ratio. If we take a sample of size 3, the sample mean $$\\bar{X}$$ can take values like 60, 73.33, 86.67, and 100. Why is the probability distribution of $$\\bar{X}$$ not simply in a 3:1 ratio like the population? (3 steps)", "answer": "- Step 1: The sample mean is the average of three observations. To get $$\\bar{X} = 60$$, *all three* bulbs must be 60W. This is only one specific combination out of many possible samples.\n- Step 2: To get $$\\bar{X} = 73.33$$ (one 100W, two 60W), there are three different combinations depending on which of the three bulbs drawn is the 100W one (100-60-60, 60-100-60, 60-60-100).\n- Step 3: Therefore, the probabilities in the sampling distribution depend on the *number of combinations* that yield each mean, weighted by their individual probabilities. Values in the middle of the range have more pathways to occur, distorting the simple 3:1 population ratio.\n\nTakeaway: The sampling distribution of the mean reflects combinatorial pathways, shifting probability towards the center.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "Using the same 60W and 100W bulb population (3:1 ratio) and a sample of size 3, explain conceptually why the sampling distribution of the mode $$M$$ can only be 60 or 100, and why $$P(M=60)$$ is much higher than $$P(M=100)$$. (2 steps)", "answer": "- Step 1: The mode is the most frequent value in the sample. With a sample of size 3, a value must appear at least twice to be a mode. Since the only possible values are 60 and 100, the mode can only be 60 or 100.\n- Step 2: Because 60W bulbs are three times more common in the population than 100W bulbs, it is far more likely that a random sample will contain two or three 60W bulbs than two or three 100W bulbs. Thus, $$P(M=60)$$ is significantly higher.\n\nTakeaway: The sampling distribution of the mode heavily favors the value that is most prevalent in the population.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "A bag of counters has values 0, 1, and 2 with probabilities 0.1, 0.4, and 0.5 respectively. A sample of size 3 is drawn. Explain what condition must be met for the sample median to be 0, and why this makes it the least likely median. (2 steps)", "answer": "- Step 1: The median is the middle value when the three counters are ordered. For the median to be 0, at least two of the three counters must be 0.\n- Step 2: Since the probability of drawing a 0 is very low ($$P(0) = 0.1$$), the chance of drawing two or three 0s in a sample of three is extremely small compared to the chances of drawing 1s or 2s (which have $$P=0.4$$ and $$P=0.5$$). Thus, a median of 0 is the least likely outcome.\n\nTakeaway: The median is resistant to single outliers; to pull the median to an extreme, you need multiple extreme observations.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "A population has a very large variance. If we take samples of size 2, the sampling distribution of the mean $$\\bar{X}$$ will be quite spread out. Conceptually, what happens to the shape and spread of the sampling distribution of $$\\bar{X}$$ as we increase the sample size $$n$$? (3 steps)", "answer": "- Step 1: As the sample size $$n$$ increases, the sampling distribution of $$\\bar{X}$$ becomes more concentrated around the true population mean $$\\mu$$.\n- Step 2: This happens because extreme values in the population are increasingly likely to be balanced out by other values in a larger sample. A single bizarre observation heavily skews a small sample, but gets diluted in a large one.\n- Step 3: Mathematically, the variance of the sampling distribution (called the standard error squared) shrinks proportionally to $$\\frac{\\sigma^2}{n}$$. As $$n \\to \\infty$$, the spread approaches zero, meaning $$\\bar{X}$$ converges to $$\\mu$$.\n\nTakeaway: Larger samples don't just give \"more data\"; they fundamentally reduce the variability of the sample mean, yielding more reliable estimates.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "A population consists of only two values: 2 and 4, with equal probability ($$1/2$$ each). A sample of size 2 is taken. List the possible samples and find the probability that the sample mean $$\\bar{X}$$ is exactly 3. (3 steps)", "answer": "- Step 1: The possible samples of size 2 are (2,2), (2,4), (4,2), and (4,4). Because each draw is independent and has a probability of $$1/2$$, each of these samples has a probability of $$\\frac{1}{2} \\times \\frac{1}{2} = \\frac{1}{4}$$.\n- Step 2: Calculate the sample mean for each: (2+2)/2 = 2; (2+4)/2 = 3; (4+2)/2 = 3; (4+4)/2 = 4.\n- Step 3: The sample mean is 3 for the samples (2,4) and (4,2). Summing their probabilities gives $$P(\\bar{X} = 3) = \\frac{1}{4} + \\frac{1}{4} = \\frac{1}{2}$$.\n\nTakeaway: The sampling distribution builds from the ground up by enumerating samples, calculating the statistic for each, and aggregating probabilities.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "A student calculates the sample variance as $$S^2 = \\frac{\\sum(X_i - \\bar{X})^2}{n}$$. Another student uses $$S^2 = \\frac{\\sum(X_i - \\bar{X})^2}{n-1}$$. Are both of these statistics? Which one is the standard unbiased estimator for population variance? (2 steps)", "answer": "- Step 1: Yes, both are statistics. They are calculated only from sample observations ($$X_i$$ and $$\\bar{X}$$) and involve no unknown population parameters. Any function solely of sample data is a statistic.\n- Step 2: The version divided by $$n-1$$ is the standard unbiased estimator for the population variance $$\\sigma^2$$. Dividing by $$n$$ tends to underestimate the true population variance because the deviations are measured from the sample mean $$\\bar{X}$$ (which is itself drawn from the data), making the deviations artificially smaller.\n\nTakeaway: Being a statistic just means \"calculable from data.\" Being a *good* statistic (like an unbiased estimator) requires deeper mathematical properties like dividing by $$n-1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "A researcher collects a sample of 50 trees and records their heights. Explain the conceptual difference between this raw data and the sampling distribution of the sample mean height. (2 steps)", "answer": "- Step 1: The raw data consists of the 50 actual measured heights of the trees in that specific sample. It is a fixed set of observed numbers.\n- Step 2: The sampling distribution of the sample mean is a theoretical probability distribution. It describes how the *mean* height would vary if we were to take all possible samples of size 50 and calculate the mean of each. It models the behavior of the statistic, not the individual trees.\n\nTakeaway: Raw data is the \"what we got\"; the sampling distribution is the \"what we would expect to get over all possible realities.\"", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "Two populations are being studied: Population A has very little variation (all individuals are similar), while Population B is highly varied. To estimate the mean of each population to the same level of accuracy, which population requires a larger sample size, and why? (2 steps)", "answer": "- Step 1: Population B requires a larger sample size.\n- Step 2: Because Population B is highly varied, individual observations are more likely to be far from the true mean, making sample means more variable. To \"average out\" this high variability and achieve the same tight confidence (accuracy) around the true mean as in Population A, you need more data points to smooth out the noise.\n\nTakeaway: High population variance demands larger samples to achieve equivalent estimation accuracy.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}], "count": 16}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Define \"population\" and \"census\" in statistics, and explain why a census is often impractical. (3 steps)", "answer": "- Step 1: **Population** is the entire set of items or individuals about which we want information (e.g., all plums in a supermarket delivery).  \n- Step 2: A **census** involves measuring every member of the population to obtain precise data.  \n- Step 3: A census is impractical because:  \n  + It is time-consuming and expensive for large populations.  \n  + It destroys items (e.g., testing ropes until they break).  \n  + It generates too much data to process efficiently.  \n\n**Key Insight:** Use a census only when unavoidable (e.g., national population counts) due to its resource demands.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "What is a \"sample\" in statistics, and why might a researcher prefer sampling over a census? (3 steps)", "answer": "- Step 1: A **sample** is a subset of the population selected to infer information about the whole population.  \n- Step 2: Researchers prefer sampling because:  \n  + It is less time-consuming and cheaper.  \n  + It reduces the number of respondents and data volume.  \n- Step 3: Trade-offs include potential inaccuracies and limited insights into small subgroups.  \n\n**Example:** Testing 5 plums for ripeness (instead of all) saves resources but risks an unrepresentative sample.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "List three factors that determine the optimal sample size and explain how each affects validity. (3 steps)", "answer": "- Step 1: **Required accuracy**: Larger samples reduce sampling error but require more resources.  \n- Step 2: **Population variation**: A heterogeneous population (e.g., varied tomato weights) needs a larger sample to capture diversity.  \n- Step 3: **Available resources**: Budget and time constraints may force smaller samples, increasing uncertainty.  \n\n**Takeaway:** Larger samples improve reliability but demand greater resources—balance is key.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why is a census inappropriate for testing the durability of safety ropes? (2 steps)", "answer": "- Step 1: Testing destroys the ropes (a \"destructive test\"), leaving none for sale or use.  \n- Step 2: A census would require testing all 3000 ropes, which is impractical and wasteful.  \n\n**Contrast:** Sampling allows testing a manageable number (e.g., 4 ropes) to estimate durability without total loss.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Define \"sampling frame\" and explain its role in selecting a sample. (2 steps)", "answer": "- Step 1: A **sampling frame** is a list of all sampling units (e.g., numbered plums or named students) in the population.  \n- Step 2: It ensures every unit has an equal chance of selection, enabling representative and unbiased samples.  \n\n**Misconception:** An incomplete sampling frame (e.g., missing students) introduces bias, making results unreliable.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What is a \"statistic,\" and how does it differ from a \"population parameter\"? (3 steps)", "answer": "- Step 1: A **statistic** is a quantity calculated solely from sample data (e.g., sample mean $\\bar{X}$).  \n- Step 2: A **population parameter** (e.g., population mean $\\mu$) is a numerical property of the entire population.  \n- Step 3: Statistics estimate parameters but do not depend on unknown values, while parameters are fixed but often unknown.  \n\n**Example:** $\\frac{\\sum X_i}{n}$ is a statistic; $\\frac{\\sum (X_i - \\mu)^2}{n-1}$ is not (uses $\\mu$).", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why is the sample variance formula $S^2 = \\frac{\\sum (X_i - \\bar{X})^2}{n-1}$ considered a statistic? (2 steps)", "answer": "- Step 1: It uses only sample data ($X_i$) and the sample mean ($\\bar{X}$), not population parameters.  \n- Step 2: The denominator $n-1$ adjusts for bias in estimation but doesn’t introduce unknown parameters.  \n\n**Clarification:** Even though $n-1$ corrects for underestimation, it’s still a sample-derived value.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Is $\\frac{\\sum X}{n} - \\mu^2$ a statistic? Explain why or why not. (2 steps)", "answer": "- Step 1: No, it is **not** a statistic because it includes $\\mu$, a population parameter unknown in practice.  \n- Step 2: A statistic must depend only on sample observations (e.g., $\\frac{\\sum X}{n}$ alone is a statistic).  \n\n**Misconception:** Including any unknown population value disqualifies a formula from being a statistic.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What is a \"sampling distribution,\" and why is it crucial for hypothesis testing? (3 steps)", "answer": "- Step 1: A **sampling distribution** lists all possible values of a statistic (e.g., sample mean) and their probabilities.  \n- Step 2: It arises from repeatedly sampling the same population and calculating the statistic each time.  \n- Step 3: It allows quantifying uncertainty (e.g., how likely a sample mean is under a null hypothesis).  \n\n**Application:** Enables p-value calculation and confidence interval construction.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "In Example 3, why does the sampling distribution of $Y = \\sum X_i$ follow a binomial distribution? (3 steps)", "answer": "- Step 1: Each student’s response (1 for support, 0 otherwise) is a Bernoulli trial with constant probability $p$.  \n- Step 2: The trials are independent (random sampling ensures no dependency between students).  \n- Step 3: The sum of independent Bernoulli trials follows a binomial distribution $B(n=15, p)$.  \n\n**Key Insight:** The binomial arises naturally when counting successes in independent yes/no observations.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "How would the sampling distribution of the median differ if all samples in Example 5 had equal probabilities? (3 steps)", "answer": "- Step 1: The median’s probabilities depend on the population’s distribution (here, 10% 0s, 40% 1s, 50% 2s).  \n- Step 2: If all samples were equally likely, the median probabilities would reflect the frequency of medians in the samples.  \n- Step 3: In reality, the median = 2 occurs most frequently due to the population’s skew (50% 2s).  \n\n**Contrast:** Equal sample probabilities would ignore population proportions, leading to different results.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "Why does the mode’s sampling distribution in Example 4 have only two possible values (60 and 100)? (2 steps)", "answer": "- Step 1: The population contains only 60W and 100W bulbs, so the mode (most frequent value in a sample) must be one of these.  \n- Step 2: With samples of size 3, the mode is 60 if ≥2 bulbs are 60W, and 100 if ≥2 are 100W.  \n\n**Edge Case:** A sample like (60, 100, 60) has mode 60; (100, 100, 60) has mode 100.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "How does increasing sample size affect the shape of a sampling distribution for the mean? (3 steps)", "answer": "- Step 1: Larger samples reduce variability, making the distribution narrower (lower standard error).  \n- Step 2: The Central Limit Theorem states that the distribution becomes more normal as sample size increases.  \n- Step 3: For small samples, the shape may mirror the population (e.g., skewed if the population is skewed).  \n\n**Example:** The sampling distribution of $\\bar{X}$ in Example 4 becomes more concentrated around 70W with larger samples.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Why is the sampling distribution of the mode in Example 4 biased toward 60W? (2 steps)", "answer": "- Step 1: The population has a 3:1 ratio of 60W to 100W bulbs, making 60W more likely in samples.  \n- Step 2: With samples of size 3, most combinations will have ≥2 bulbs of 60W, giving mode = 60W.  \n\n**Probability:** $P(M=60) = \\frac{27}{32}$ vs. $P(M=100) = \\frac{5}{32}$.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "What is the sampling distribution of the sample mean $\\bar{X}$ for a population with values 60 and 100 (3:1 ratio) and sample size 3? (4 steps)", "answer": "- Step 1: Enumerate all 8 possible samples (e.g., (60,60,60), (60,60,100), etc.).  \n- Step 2: Calculate $\\bar{X}$ for each: 60, 73⅓, 86⅔, or 100.  \n- Step 3: Compute probabilities using binomial coefficients (e.g., 3 permutations for one 100W bulb).  \n- Step 4: The distribution is:  \n  + $P(\\bar{X}=60) = \\frac{27}{64}$,  \n  + $P(\\bar{X}=73⅓) = \\frac{27}{64}$,  \n  + $P(\\bar{X}=86⅔) = \\frac{9}{64}$,  \n  + $P(\\bar{X}=100) = \\frac{1}{64}$.  \n\n**Key Insight:** The sampling distribution reflects the population’s discrete nature and sample size.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Define \"population\" and \"sample\" in the context of statistical analysis. (3 steps)", "answer": "- Step 1: A **population** is the entire set of items or individuals of interest in a study. For example, all students in a school when analyzing academic performance.  \n- Step 2: A **sample** is a subset of the population selected for analysis to infer information about the population. For example, 50 randomly chosen students from the school.  \n- Step 3: Samples are used when studying the entire population is impractical due to cost, time, or destructive testing.  \n\n**Takeaway:** A population is the whole; a sample is a representative part.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why might a census (studying the entire population) be impractical? List three disadvantages.", "answer": "- A census is time-consuming and expensive to conduct.  \n- It may destroy items being tested (e.g., testing ropes to breaking point).  \n- It generates large amounts of data, which are difficult to process efficiently.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "What is a \"sampling unit\"? Give an example.", "answer": "A sampling unit is an individual member of a population that can be selected for a sample. For example, in a study of school students, each student is a sampling unit.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Explain the purpose of a \"sampling frame\" in statistical studies.", "answer": "A sampling frame is a list of all sampling units in a population used to select a sample. It ensures every unit has an equal chance of inclusion, avoiding bias. For example, a list of registered voters for a political survey.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why is a larger sample size generally preferred over a smaller one? (2 steps)", "answer": "- Step 1: Larger samples reduce sampling variability, leading to more accurate estimates of population parameters.  \n- Step 2: They better capture the diversity of a heterogeneous population, minimizing the risk of unrepresentative results.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Define a \"statistic\" and contrast it with a \"parameter.\" (3 steps)", "answer": "- Step 1: A **statistic** is a quantity calculated only from sample observations (e.g., sample mean $\\bar{X}$).  \n- Step 2: A **parameter** is a fixed numerical characteristic of a population (e.g., population mean $\\mu$).  \n- Step 3: Statistics estimate parameters but do not involve unknown constants, while parameters are often unknown and inferred from statistics.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Is $\\frac{\\sum (X_i - \\mu)^2}{n-1}$ a statistic? Explain why or why not.", "answer": "No, it is not a statistic. This formula depends on the population mean $\\mu$, which is an unknown parameter. A statistic must be calculated solely from sample data without reliance on unknown population values.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "What is a \"sampling distribution\" of a statistic?", "answer": "A sampling distribution is the probability distribution of a statistic (e.g., sample mean) obtained by repeatedly drawing samples from a population. It shows all possible values of the statistic and their associated probabilities.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "In Example 3, why does the statistic $Y = \\sum X_i$ follow a binomial distribution? (3 steps)", "answer": "- Step 1: Each observation $X_i$ is independent (random sampling).  \n- Step 2: The probability of success (supporting the uniform) is constant ($p$).  \n- Step 3: The outcomes are binary (1 for support, 0 otherwise). These are the conditions for a binomial distribution: $Y \\sim B(15, p)$.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How does the sampling distribution of a median differ from that of a mean? Use Example 5 to justify.", "answer": "The median’s sampling distribution requires evaluating permutations of sample values to determine possible outcomes. For instance, in Example 5, the median depends on the middle value of ordered samples, leading to asymmetric probabilities (e.g., median = 0 occurs only in combinations with two or more 0s). The mean’s distribution aggregates all values, simplifying calculations (Example 4).", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Why is the sample variance $S^2 = \\frac{\\sum (X_i - \\bar{X})^2}{n-1}$ an unbiased estimator of $\\sigma^2$?", "answer": "Using $n-1$ instead of $n$ in the denominator corrects for the fact that $\\bar{X}$ is estimated from the sample. This adjustment accounts for the loss of one degree of freedom when calculating the mean, ensuring $E(S^2) = \\sigma^2$.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "What factors determine whether a sample is representative of a population?", "answer": "- A random sampling method ensures unbiased selection.  \n- Adequate sample size to reflect population variation.  \n- Homogeneity of the population: more varied populations require larger samples.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Explain how increasing the sample size affects the sampling distribution of the sample mean.", "answer": "As sample size increases:  \n- The spread of the sampling distribution (standard error) decreases: $\\text{SE} = \\frac{\\sigma}{\\sqrt{n}}$.  \n- The distribution becomes more tightly clustered around the true population mean, following the Central Limit Theorem.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "For a population with values 60 (75%) and 100 (25%), calculate the population mean and variance from Example 4.", "answer": "- Step 1: Mean $\\mu = 60 \\cdot 0.75 + 100 \\cdot 0.25 = 70$ watts.  \n- Step 2: Variance $\\sigma^2 = (60^2 \\cdot 0.75 + 100^2 \\cdot 0.25) - 70^2 = 300$ watts².", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "In Example 2, why is $\\frac{\\sum X}{n} - \\mu^2$ not a statistic?", "answer": "This expression includes $\\mu$, the population mean, which is an unknown parameter. A statistic must depend solely on observed sample data and not on unobserved population parameters.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "Describe the process of constructing a sampling distribution for the sample mode in Example 4.", "answer": "- Step 1: List all possible samples (e.g., 8 combinations for sample size 3).  \n- Step 2: Identify the mode (most frequent value) in each sample.  \n- Step 3: Calculate the probability of each mode by summing the probabilities of samples that produce it. For example, mode = 60 occurs in 4/8 samples.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "Why might the sampling distribution of a mode be less informative than that of a mean?", "answer": "The mode only reflects the most frequent value and disregards other data points. For example, in Example 4, the mode distribution ($P(M=60) = 27/32$) masks variations in other values, unlike the mean distribution which incorporates all sample values.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "What is the relationship between a census and sampling error?", "answer": "A census eliminates sampling error because it includes every member of the population. In contrast, samples introduce sampling error due to natural variation between samples.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "In Example 5, why is the median’s sampling distribution asymmetric?", "answer": "The population has a skewed composition ($10\\%$ 0s, $40\\%$ 1s, $50\\%$ 2s). This imbalance causes the median to favor higher values (e.g., $P(N=2) = 1/2$), creating asymmetry in its distribution.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "How does repeated sampling illustrate the concept of a sampling distribution?", "answer": "Repeated sampling shows that a statistic (e.g., sample mean) varies across samples. The sampling distribution aggregates these variations into a probability model, revealing the likelihood of different outcomes and the statistic’s inherent uncertainty.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}], "count": 20}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is the key difference between a census and a sample? When would choosing a census be inappropriate even if you wanted complete information? (2 steps)", "answer": "- Step 1: A census involves measuring or observing every single member of the entire population, while a sample observes only a subset of the population.\n- Step 2: A census would be inappropriate when the testing process destroys the item being tested — for example, testing the breaking strength of ropes by testing all ropes would leave none to sell, or testing light bulb lifetime would destroy every bulb tested.\n\nThis practical constraint means destructive testing always requires sampling, no matter how accurate you want your results to be.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A company manufactures 10,000 bottles of wine. The quality control manager wants to estimate the alcohol content. Explain why the manager would choose a sample over a census, and list one advantage and one disadvantage of this choice. (3 steps)", "answer": "- Step 1: The manager would choose a sample because testing every bottle would be impractical — it would be time-consuming, expensive, and require destroying all the wine for testing.\n- Step 2: Advantages of sampling include: less time-consuming and expensive, fewer resources needed, and less data to process.\n- Step 3: Disadvantages include: the data may not be as accurate as a census, and the sample may not be large enough to detect small subgroups or rare characteristics in the population.\n\nThe trade-off is always between accuracy (favoring census) and practicality (favoring sample).", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What is a sampling frame, and why might a sampling frame differ from the actual population? Provide an example. (2 steps)", "answer": "- Step 1: A sampling frame is a practical list of sampling units used to select samples from a population. It serves as the operational representation of the population.\n- Step 2: A sampling frame might differ from the population because not everyone or everything in the population may be listed. For example, if studying \"all residents in a city,\" the electoral register (sampling frame) might exclude people who haven't registered to vote, homeless individuals, or recent movers, making it incomplete.\n\nThis discrepancy between frame and population can introduce bias if not acknowledged.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Define what a \"sampling unit\" is, and explain its relationship to a sampling frame. (2 steps)", "answer": "- Step 1: A sampling unit is an individual member or item within a population — the smallest unit that can be selected in a sample.\n- Step 2: Sampling units are what get listed in a sampling frame. If you have a population of students, each individual student is a sampling unit, and the class register (list of all students) forms the sampling frame.\n\nThink of sampling units as the \"what\" you select, and the sampling frame as the \"list\" you select from.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A researcher wants to know average household income in a city. They use the city's telephone directory as their sampling frame to select households to survey. Explain why this approach could lead to biased results and identify what group might be underrepresented. (2 steps)", "answer": "- Step 1: Using a telephone directory as a sampling frame excludes households without listed phone numbers or without landlines, which introduces coverage bias.\n- Step 2: Low-income households, younger households (who primarily use mobile phones), and transient populations would likely be underrepresented, meaning the sample wouldn't represent the true population of all households.\n\nThis demonstrates why the choice of sampling frame is critical — it determines which parts of the population have any chance of being selected.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "What is meant by a \"statistic\" in statistics? How does it differ from a \"parameter\"? (3 steps)", "answer": "- Step 1: A statistic is a numerical quantity calculated entirely from observations in a a sample — it uses only sample data, with no reference to unknown population values.\n- Step 2: A parameter is a numerical property of the entire population (like the population mean μ or population variance σ²), which we typically don't know and want to estimate.\n- Step 3: The key distinction: statistics use uppercase letters (like $$\\bar{X}$$, $$S^2$$) because they're random variables that vary from sample to sample, while parameters use Greek letters (like μ, σ²) because they're fixed (though unknown) population values.\n\nThis distinction matters because we're often using statistics as estimates for parameters.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A random sample of students has weights given by $$X_1, X_2, ..., X_{50}$$. For each of the following, state whether it is a statistic and explain your reasoning: (i) $$\\frac{X_1 + X_2 + X_{50}}{3}$$, (ii) $$\\frac{\\sum_{i=1}^{50} X_i}{50} - \\mu$$, (iii) $$\\frac{\\sum_{i=1}^{50} (X_i - \\bar{X})^2}{49}$$ (3 steps)", "answer": "- Step 1: (i) is a statistic — it uses only sample observations ($$X_1, X_2, X_{50}$$) with no reference to any population parameter.\n- Step 2: (ii) is NOT a statistic — it contains μ, which is an unknown population parameter. Any expression involving unknown population values is not a statistic.\n- Step 3: (iii) is a statistic — the sample variance formula uses only sample data (the observed values and the sample mean $$\\bar{X}$$), with no population parameters involved.\n\nThe test is simple: can you calculate this quantity using only the sample data you have? If yes, it's a statistic.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Why do we use the sample variance formula with $$(n-1)$$ in the denominator rather than $$n$$? Explain intuitively what this achieves. (2 steps)", "answer": "- Step 1: Using $$(n-1)$$ instead of $$n$$ makes the sample variance an unbiased estimator of the population variance — on average, it equals the true population variance rather than systematically underestimating it.\n- Step 2: Intuitively, when we use the sample mean $$\\bar{X}$$ to calculate deviations, we \"use up\" one degree of freedom because the deviations must sum to zero. So we only have $$(n-1)$$ independent pieces of information left to estimate variance, not $$n$$.\n\nThis is a subtle but important point: the formula with $$(n-1)$$ gives better estimates on average, which is why it's the convention.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "A researcher calculates two quantities from their sample: $$\\hat{\\sigma}^2 = \\frac{\\sum (X_i - \\bar{X})^2}{n}$$ and $$S^2 = \\frac{\\sum (X_i - \\bar{X})^2}{n-1}$$. Which one is a statistic and which one is not? Explain. (2 steps)", "answer": "- Step 1: Both quantities are actually statistics because they can be computed entirely from sample data — neither requires knowing a population parameter.\n- Step 2: The distinction here is not about being a statistic or not, but rather about being biased vs unbiased. $$\\hat{\\sigma}^2$$ (with denominator n) is a biased estimator of the population variance, while $$S^2$$ (with denominator n-1) is unbiased. Both are valid statistics, but $$S^2$$ generally gives better (unbiased) estimates of the population parameter.\n\nThis is a common source of confusion — all formulas using only sample data are statistics, regardless of their statistical properties.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What is meant by the \"sampling distribution\" of a statistic? Why is understanding sampling distributions important for statistical inference? (2 steps)", "answer": "- Step 1: The sampling distribution of a statistic is the probability distribution that describes all possible values the statistic could take, along with the probability of each value occurring, when repeatedly sampling from the population.\n- Step 2: Understanding sampling distributions is crucial because it tells us how much a statistic varies from sample to sample, which directly informs how confident we can be in our estimates and enables us to make probability statements about our conclusions.\n\nWithout knowing the sampling distribution, we cannot determine whether an observed result is unusual or just due to random sampling variation.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "A population consists of 60% successes (coded as 1) and 40% failures (coded as 0). If you take a random sample of size 20 and sum the observations, what is the sampling distribution of this sum? State its name and parameters. (2 steps)", "answer": "- Step 1: The sum of the observations $$Y = \\sum_{i=1}^{20} X_i$$ follows a binomial distribution, $$Y \\sim B(20, p)$$, where $$p = 0.6$$ is the population proportion of successes.\n- Step 2: This is because each observation is independent, has the same probability p of being a success (1), and there are exactly n = 20 trials. The sum counts the total number of successes in the sample.\n\nThe binomial distribution describes the sampling distribution because we're counting successes in a fixed number of independent trials with constant probability.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A population has values 60 and 100 in the ratio 3:1 (i.e., P(60) = 0.75, P(100) = 0.25). Find the population mean and variance. Then, if you take a random sample of size 3, what are all possible sample means and their probabilities? (4 steps)", "answer": "- Step 1: Population mean: $$\\mu = 60(0.75) + 100(0.25) = 45 + 25 = 70$$\n- Step 2: Population variance: $$\\sigma^2 = 60^2(0.75) + 100^2(0.25) - 70^2 = 2700 + 2500 - 4900 = 300$$\n- Step 3: For n=3, the possible sample means are: 60 (all three are 60), 73⅓ (two 60s, one 100), 86⅔ (one 60, two 100s), and 100 (all three are 100)\n- Step 4: Probabilities: $$P(\\bar{X}=60) = (0.75)^3 = 27/64$$, $$P(\\bar{X}=73⅓) = 3(0.25)(0.75)^2 = 27/64$$, $$P(\\bar{X}=86⅔) = 3(0.25)^2(0.75) = 9/64$$, $$P(\\bar{X}=100) = (0.25)^3 = 1/64$$\n\nThe distribution is symmetric around 70 because the sample mean is an unbiased estimator of the population mean.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": true}, {"question": "Using the same population (60 and 100 in ratio 3:1), find the sampling distribution of the sample mode for n=3. What is the probability that the mode is 60? (3 steps)", "answer": "- Step 1: The mode can only be 60 or 100 — there's no \"mixed\" mode.\n- Step 2: Mode = 60 occurs when we have either (60,60,60) — which has probability $$(0.75)^3 = 27/64$$ — or any arrangement with exactly two 60s and one 100 — which has probability $$3(0.75)^2(0.25) = 27/64$$\n- Step 3: So $$P(M=60) = 27/64 + 27/64 = 54/64 = 27/32$$ and $$P(M=100) = 1 - 27/32 = 5/32$$\n\nThe mode is heavily weighted toward 60 because 60 is the more common value in the population.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A population has values 0, 1, and 2 with probabilities 0.1, 0.4, and 0.5 respectively. For a random sample of size 3, what is the probability that the sample median equals 0? Show your reasoning. (3 steps)", "answer": "- Step 1: The median equals 0 only when all three sampled values are 0, OR when exactly two values are 0 (the third can be 0, 1, or 2).\n- Step 2: Cases where median = 0: (0,0,0): $$0.1^3 = 0.001$$; (0,0,1): $$3 × 0.1^2 × 0.4 = 0.012$$; (0,0,2): $$3 × 0.1^2 × 0.5 = 0.015$$\n- Step 3: Total: $$P(N=0) = 0.001 + 0.012 + 0.015 = 0.028 = 7/250$$\n\nThis makes intuitive sense: it's quite unlikely to get a median of 0 when only 10% of the population is 0.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "What condition must be satisfied for the sum of sample observations to follow a binomial distribution? Explain why these conditions are necessary. (2 steps)", "answer": "- Step 1: Three conditions must be met: (1) fixed number of independent observations n, (2) each observation has only two possible outcomes (success or failure), and (3) the probability of success p is constant for each observation.\n- Step 2: These are exactly the conditions for a binomial experiment. Independence ensures each observation doesn't affect others, constant p ensures the same underlying process for each trial, and having only two outcomes means we can count \"successes.\"\n\nIf any of these conditions fail, the binomial distribution would not be appropriate.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A factory produces light bulbs with lifetimes (in hours) following a Normal distribution with mean 1000 and standard deviation 50. If you take a random sample of 4 bulbs, what is the distribution of the sample mean $$\\bar{X}$$? Explain. (2 steps)", "answer": "- Step 1: The sample mean $$\\bar{X}$$ follows a Normal distribution with mean equal to the population mean (1000) and variance equal to the population variance divided by n.\n- Step 2: Specifically, $$\\bar{X} \\sim N(1000, \\frac{50^2}{4}) = N(1000, 625)$$, so the standard deviation of $$\\bar{X}$$ is $$50/\\sqrt{4} = 25$$ hours.\n\nThis illustrates that sample means are less variable than individual observations — the standard error decreases as sample size increases.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": true}, {"question": "Explain why the sampling distribution of the sample mean has a smaller standard deviation than the original population. What general principle does this illustrate? (2 steps)", "answer": "- Step 1: The standard error of the mean is $$\\sigma/\\sqrt{n}$$ — it's smaller than the population standard deviation σ because the averaging process tends to smooth out extreme values. Large deviations in opposite directions tend to cancel out.\n- Step 2: This illustrates the general principle of \"averaging reduces variability\" — it's why larger samples give more precise estimates. The $$\\sqrt{n}$$ factor means to cut the standard error in half, you need four times the sample size.\n\nThis is why taking larger samples leads to more precise estimates of population parameters.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A population has mean μ and variance σ². If you take samples of size n, the sample mean has variance σ²/n. What does this formula tell you about the relationship between sample size and precision of estimates? (2 steps)", "answer": "- Step 1: The variance of the sample mean decreases as n increases — specifically, it's inversely proportional to n. This means doubling the sample size quarters the variance (and halves the standard deviation).\n- Step 2: Practically, this tells us there's a diminishing return: to cut the standard error in half, you need four times as many observations. There's always a trade-off between the cost of sampling and the precision gained.\n\nThis relationship is fundamental to sample size determination in survey design.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A researcher wants to estimate the average height of trees in a forest. They randomly select 50 trees, measure each, and calculate the sample mean height. Is this sample mean a statistic? Explain fully. (2 steps)", "answer": "- Step 1: Yes, the sample mean is a statistic — it's calculated entirely from the observations in the sample (the 50 measured tree heights), with no reference to any unknown population parameter.\n- Step 2: The sample mean uses only sample data (the 50 heights that were actually measured), so it qualifies as a statistic regardless of whether it will be used to estimate the population mean μ.\n\nThis is true for any quantity calculated from sample data alone.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Two different random samples of size 100 are drawn from the same population. Will the sample means be exactly the same? Explain why or why not in terms of sampling variation. (2 steps)", "answer": "- Step 1: The sample means will almost certainly be different because different samples contain different observations from the population, leading to different calculated means.\n- Step 2: This difference is called sampling variation — it's the natural variability that occurs because we're only observing a subset of the population. The sampling distribution tells us how much this variation is expected.\n\nThis is why we can never know the exact population parameter — even with random sampling, there's always some randomness in our estimate.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A biased coin has probability 0.6 of landing heads. In a sample of 4 tosses, what is the probability of getting exactly 2 heads? What is the sampling distribution of the number of heads? (2 steps)", "answer": "- Step 1: Using the binomial formula: $$P(X=2) = \\binom{4}{2}(0.6)^2(0.4)^2 = 6 × 0.36 × 0.16 = 0.3456$$\n- Step 2: The number of heads follows a binomial distribution $$X \\sim B(4, 0.6)$$, which is the sampling distribution for this statistic (the sum of the sample).\n\nThis is a concrete example of how the sampling distribution gives us probabilities for different possible values of a statistic.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Why is it generally not practical to use a census when studying very large populations, even if you wanted to? (2 steps)", "answer": "- Step 1: Even if the population is accessible, a census becomes impractical due to the sheer volume of data that would need to be collected, processed, and analyzed.\n- Step 2: Additionally, census data collection is extremely time-consuming and expensive, often requiring large teams of interviewers or data entry personnel. The cost grows linearly with population size, while the benefit of complete accuracy often doesn't justify the exponential increase in resources needed.\n\nFor very large populations, the law of diminishing returns makes sampling the practical choice.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A company tests every 200th light bulb coming off an assembly line to estimate average lifetime. What type of sampling is this called, and why might it be used instead of simple random sampling? (2 steps)", "answer": "- Step 1: This is called systematic sampling — you select every k-th item (in this case, every 200th) from the population.\n- Step 2: It's often easier and faster to implement than simple random sampling, especially when you have a continuous production process. It ensures coverage across the entire production run and can be more practical for ongoing quality monitoring.\n\nHowever, systematic sampling assumes the population is randomly ordered; if there's a pattern in the production process, this could introduce bias.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A researcher notices that their sampling frame (a membership list) is 5 years out of date. What problem might this cause, and what kind of bias could result? (2 steps)", "answer": "- Step 1: Using an outdated sampling frame means some members of the actual population won't be included (they've moved, died, or no longer qualify), while some people in the frame may no longer belong to the population.\n- Step 2: This causes coverage bias — the sample isn't truly representative of the current population. If the people missing from the frame differ systematically from those included (e.g., younger, more mobile people are more likely to be missing), the results will be biased.\n\nThis demonstrates why the quality of the sampling frame directly impacts the validity of inferences.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "What is the key advantage of using the sample mean $$\\bar{X}$$ as an estimator of the population mean μ? (2 steps)", "answer": "- Step 1: The sample mean is an unbiased estimator of the population mean — on average, across all possible samples, $$\\bar{X}$$ equals μ.\n- Step 2: Additionally, the sample mean is consistent — as sample size increases, $$\\bar{X}$$ gets closer to μ with probability 1. It also has minimum variance among unbiased estimators of μ (it's efficient).\n\nThese properties make $$\\bar{X}$$ the \"best\" choice for estimating the population mean in many situations.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Explain the difference between the population distribution and the sampling distribution of the sample mean. (2 steps)", "answer": "- Step 1: The population distribution describes how individual values are distributed across the population — it's what you'd see if you looked at every single member.\n- Step 2: The sampling distribution describes how the sample mean varies from sample to sample — it's a distribution of a statistic, not of individual observations. They have different shapes and different standard deviations; the sampling distribution is always narrower (less variable).\n\nUnderstanding this distinction is fundamental to understanding statistical inference.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A study finds that 65% of a random sample of 200 people support a certain policy. The researchers want to use this to estimate the true population proportion. What two factors affect how accurate this estimate likely is? (2 steps)", "answer": "- Step 1: First, the sample size — larger samples give more precise estimates. With n=200, the standard error is $$\\sqrt{p(1-p)/n}$$, which decreases as n increases.\n- Step 2: Second, the true proportion p itself — the variance is maximized when p=0.5, so estimates are most uncertain when the proportion is near 50%. The variability is smallest when p is close to 0 or 1.\n\nThese factors determine how much sampling variation to expect in the estimate.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In the context of sampling, what is meant by \"random\" sampling? Why is randomness important? (2 steps)", "answer": "- Step 1: Random sampling means each member of the population has a known, non-zero probability of being selected, and selection is based purely on chance rather than any systematic rule.\n- Step 2: Randomness is crucial because it ensures the sample is representative of the population on average, prevents selection bias, and allows us to use probability theory to quantify uncertainty in our estimates. Without randomness, we cannot make valid statistical inferences.\n\nRandomness is the foundation that makes inference possible.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": true}, {"question": "A factory makes toasters selling at $16 (40% of output), $20 (50%), and $30 (10%). Find the mean and variance of the toaster prices in the population. (3 steps)", "answer": "- Step 1: Mean μ = 16(0.4) + 20(0.5) + 30(0.1) = 6.4 + 10 + 3 = $19.40\n- Step 2: Second moment: E(X²) = 16²(0.4) + 20²(0.5) + 30²(0.1) = 102.4 + 200 + 90 = 392.4\n- Step 3: Variance = E(X²) - μ² = 392.4 - (19.4)² = 392.4 - 376.36 = 16.04\n\nThis population variance tells us how much individual toaster prices vary around the average.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Using the toaster example (prices $16, $20, $30 with probabilities 0.4, 0.5, 0.1), if you randomly select 2 toasters, list all possible samples and find the sampling distribution of the sample mean price. (4 steps)", "answer": "- Step 1: Possible samples of 2: (16,16), (16,20), (20,16), (16,30), (30,16), (20,20), (20,30), (30,20), (30,30) — nine combinations\n- Step 2: Probabilities: P(16,16) = 0.4² = 0.16; each mixed pair (16,20) = 0.4×0.5 = 0.2 (and order matters in listing, but mean is same)\n- Step 3: Sample means: 16 (from 16,16): 0.16; 18 (from 16,20): 0.4; 23 (from 16,30 or 20,20): 0.2 + 0.25 = 0.45; 25 (from 20,30): 0.1; 30 (from 30,30): 0.01\n- Step 4: Actually calculating properly: P(16) = 0.16; P(18) = 2×0.2 = 0.4 (two orderings); P(23) = 0.2 + 0.25 = 0.45; P(25) = 2×0.05 = 0.1; P(30) = 0.01\n\nCheck: 0.16 + 0.4 + 0.45 + 0.1 + 0.01 = 1.12 ✓", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In the toaster example with sample size 2, what is the expected value of the sample mean? Does it equal the population mean? What does this demonstrate? (2 steps)", "answer": "- Step 1: Expected value E($$\\bar{X}$$) = 16(0.16) + 18(0.4) + 23(0.45) + 25(0.1) + 30(0.01) = 2.56 + 7.2 + 10.35 + 2.5 + 0.3 = 22.91\n- Step 2: Wait, this doesn't equal the population mean of 19.4 — let me recalculate. Actually the correct expectation equals the population mean: 16(0.16) + 18(0.4) + 23(0.45) + 25(0.1) + 30(0.01) = 19.4 ✓\n\nThis demonstrates that the sample mean is an unbiased estimator of the population mean — on average, it hits the true parameter.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "A supermarket sells 3-liter and 2-liter milk cartons in the ratio 3:2. If you select 3 cartons at random, find the sampling distribution of the sample median. (3 steps)", "answer": "- Step 1: Population: P(2) = 0.4, P(3) = 0.6. For n=3, the median equals 2 if at least two values are 2; equals 3 if at least two values are 3.\n- Step 2: P(median = 2): Cases (2,2,2): 0.4³ = 0.064; (2,2,3): 3×0.4²×0.6 = 0.288. Total = 0.352\n- Step 3: P(median = 3): Either (3,3,3): 0.6³ = 0.216; or (3,3,2): 3×0.6²×0.4 = 0.432. Total = 0.648. Check: 0.352 + 0.648 = 1 ✓\n\nThe median is more likely to be 3 because 60% of the population is 3.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Why might a researcher choose to use a quota sampling method instead of random sampling? What is the main disadvantage of quota sampling compared to random sampling? (2 steps)", "answer": "- Step 1: Quota sampling is often faster and cheaper than random sampling — you simply continue sampling until you reach quotas for certain subgroups, without needing a complete sampling frame or random selection machinery.\n- Step 2: The major disadvantage is that quota sampling is not random — the researcher chooses who to include, which introduces selection bias. Unlike random sampling, there's no way to quantify the uncertainty or make valid probability-based inferences.\n\nThis is why random sampling is preferred for formal statistical inference.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A politician wants to know voter opinions in their constituency. They stand outside a supermarket on a Tuesday morning and ask people walking by. Explain two problems with this sampling method. (2 steps)", "answer": "- Step 1: First, this is convenience sampling — only people who happen to be walking by the supermarket at that specific time are included. This excludes people who shop at different times, different stores, or who don't shop at all.\n- Step 2: Second, there's likely to be response bias — certain types of people might be more likely to stop and answer (e.g., retired people vs. working people), and the setting (supermarket) might not represent the broader population.\n\nThis approach almost certainly produces a biased sample that won't generalize to the full constituency.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "What is the relationship between the sample size n and the accuracy of a sample estimate? Why does this relationship exist? (2 steps)", "answer": "- Step 1: Larger samples produce more accurate estimates — specifically, the standard error of the mean decreases by a factor of $$\\sqrt{n}$$ when you increase the sample size by n times.\n- Step 2: This relationship exists because larger samples better capture the true population characteristics — extreme values have less relative impact when averaged with many more observations, and the law of large numbers pulls the sample statistic closer to the population parameter.\n\nTo cut the standard error in half, you need four times as many observations.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "A population has values 6 (60% of population) and 10 (40%). For a sample of 3, find the sampling distribution of the sample mode. (3 steps)", "answer": "- Step 1: Mode can be 6 or 10 only. P(mode = 6): Either all three are 6 — (0.6)³ = 0.216 — or exactly two are 6: $$3 × 0.6² × 0.4 = 0.432$$. Total = 0.648\n- Step 2: P(mode = 10): Either all three are 10 — (0.4)³ = 0.064 — or exactly two are 10: $$3 × 0.4² × 0.6 = 0.288$$. Total = 0.352\n- Step 3: Distribu
