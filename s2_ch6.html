<script>
const DATA={"selected": [{"question": "If a population is highly varied (high variance), how should this change the sample size you choose, and why? (2 steps)", "answer": "- Step 1: You should take a **larger** sample. With high variability, individual observations swing widely, so a small sample can easily land biased high or low by chance.\n- Step 2: A larger sample dilutes the influence of any single extreme observation, letting the statistic settle near the true population value. Contrast: if the population were uniform (everyone identical), a sample of one would be perfectly informative.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "What is a \"population parameter,\" and why do we usually use Greek letters to denote it? (2 steps)", "answer": "- Step 1: A population parameter is a measurable numerical property of the whole population — for example the population mean $$\\mu$$, population variance $$\\sigma^{2}$$, or population proportion $$p$$.\n- Step 2: Greek letters are used to visually distinguish them from sample-based quantities (for which Roman letters like $$\\bar{X}$$ or $$S^{2}$$ are used). The Greek/Roman split lets readers see at a glance whether a number describes the whole population (usually unknown) or a sample (calculated and known).\n\nTakeaway: $$\\mu, \\sigma, p$$ = population (often unknown); $$\\bar{X}, S, \\hat{p}$$ = sample (known).", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "For $$n = 3$$ independent observations each with variance $$\\sigma^2$$, show that $$\\text{Var}(\\bar{X}) = \\frac{\\sigma^2}{3}$$. (4 steps)", "answer": "- Step 1: $$\\bar{X} = \\frac{1}{3}(X_1 + X_2 + X_3)$$.\n- Step 2: Variance scales quadratically with a multiplicative constant: $$\\text{Var}(aY) = a^2 \\text{Var}(Y)$$. So $$\\text{Var}(\\bar{X}) = \\frac{1}{9} \\text{Var}(X_1 + X_2 + X_3)$$.\n- Step 3: For independent variables, variance of a sum is the sum of variances: $$\\text{Var}(X_1 + X_2 + X_3) = \\sigma^2 + \\sigma^2 + \\sigma^2 = 3\\sigma^2$$.\n- Step 4: Combining: $$\\text{Var}(\\bar{X}) = \\frac{1}{9} \\times 3\\sigma^2 = \\frac{\\sigma^2}{3}$$.\n\nTakeaway: averaging $$n$$ independent observations shrinks variance by a factor of $$n$$ — *that's* why larger samples are more accurate.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "A researcher collects a sample of 50 trees and records their heights. Explain the conceptual difference between this raw data and the sampling distribution of the sample mean height. (2 steps)", "answer": "- Step 1: The raw data consists of the 50 actual measured heights of the trees in that specific sample. It is a fixed set of observed numbers.\n- Step 2: The sampling distribution of the sample mean is a theoretical probability distribution. It describes how the *mean* height would vary if we were to take all possible samples of size 50 and calculate the mean of each. It models the behavior of the statistic, not the individual trees.\n\nTakeaway: Raw data is the \"what we got\"; the sampling distribution is the \"what we would expect to get over all possible realities.\"", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "What's the essential distinction between a *population*, a *sample*, a *sampling frame*, and a *sampling unit*? (4 steps)", "answer": "- Step 1: **Population** — the entire universe of items of interest (e.g., all 400 call-centre operators).\n- Step 2: **Sampling frame** — the practical list of sampling units, used to draw a sample from (e.g., the employee register).\n- Step 3: **Sampling unit** — an individual member of the population (e.g., one operator). This is what gets selected.\n- Step 4: **Sample** — the actual selected subset (e.g., the 30 chosen operators). It's a collection of sampling units drawn from the frame.\n\nRelationship: population (ideal target) ≈ frame (practical list) ⟶ select sampling units ⟶ sample (actual data).", "source": "Opus 4.7 ②", "_id": "opus_2_62"}, {"question": "Why is the size of the *population* much less important than the size of the *sample* for a statistic's precision? (3 steps)", "answer": "- Step 1: The variance of the sample mean (for a simple random sample, with replacement) is $$\\sigma^{2}/n$$ — it depends on the population's spread $$\\sigma^{2}$$ and sample size $$n$$, but not on the population size $$N$$.\n- Step 2: Intuitively, once you have a sample that captures the spread of the population, having \"more of the population out there\" doesn't degrade your estimate. A sample of size 1000 from 10,000 has roughly the same precision as a sample of 1000 from 10 million.\n- Step 3: (A finite-population correction applies when the sample is a substantial fraction of the population, but usually a minor effect.) The key driver of precision is $$n$$ and $$\\sigma^{2}$$, not $$N$$.\n\nTakeaway: sample size, not population size, is the primary lever for precision.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "What is the sampling distribution of a statistic? (3 steps)", "answer": "- Step 1: If you repeatedly draw fresh samples of a fixed size and compute the same statistic each time, you get a *range* of values — the statistic varies from sample to sample.\n- Step 2: The sampling distribution is the **probability distribution** of those values: it lists all possible values the statistic can take and the probability of each.\n- Step 3: Formally: the sampling distribution of statistic $$T$$ gives pairs $$(t, P(T = t))$$ for every achievable value $$t$$. It's the bridge between sample data and probability theory, enabling hypothesis tests and confidence intervals.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "A census provides a completely accurate result, yet it is rarely used in practice for large populations. What are the primary disadvantages that outweigh this accuracy? (2 steps)", "answer": "- Step 1: The practical disadvantages of a census are that it is extremely **time-consuming and expensive** to conduct for large populations, and it generates a massive quantity of data that is hard to process.\n- Step 2: The critical conceptual disadvantage is that it **cannot be used when the testing process destroys the item** (destructive testing). If you test every lightbulb until it fails, you have no lightbulbs left to sell.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "Can the sample mode from a size-3 sample always be predicted from the population mode? (3 steps)", "answer": "- Step 1: No — even if a population has a clear mode (say, value 2 with probability 0.5), individual samples can produce a different mode by chance. A sample $$(0, 1, 1)$$ has mode 1 regardless of what's most common overall.\n- Step 2: The sample mode is itself a statistic with its own sampling distribution, and it *tends to* favour the population mode, but doesn't guarantee it.\n- Step 3: For large samples, the sample mode almost certainly matches the population mode. But for $$n = 3$$, there's meaningful probability of disagreement — a reflection of sampling variability.\n\nTakeaway: sample statistics estimate population characteristics, never equalling them with certainty in a single sample.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "A population has values 0, 1, and 2 with probabilities 0.1, 0.4, and 0.5 respectively. For a random sample of size 3, what is the probability that the sample median equals 0? Show your reasoning. (3 steps)", "answer": "- Step 1: The median equals 0 only when all three sampled values are 0, OR when exactly two values are 0 (the third can be 0, 1, or 2).\n- Step 2: Cases where median = 0: (0,0,0): $$0.1^3 = 0.001$$; (0,0,1): $$3 × 0.1^2 × 0.4 = 0.012$$; (0,0,2): $$3 × 0.1^2 × 0.5 = 0.015$$\n- Step 3: Total: $$P(N=0) = 0.001 + 0.012 + 0.015 = 0.028 = 7/250$$\n\nThis makes intuitive sense: it's quite unlikely to get a median of 0 when only 10% of the population is 0.", "source": "MiniMax ①", "_id": "minimax_1_13"}, {"question": "A factory tests 5 microswitches for reliability, getting lifetimes (in cycles): 23150, 25071, 19480, 22921, 7455. The company claims switches last 20 000 cycles on average. Comment on this claim conceptually, and suggest an improvement. (3 steps)", "answer": "- Step 1: The sample mean is roughly 19 620 — slightly *below* the claimed 20 000. On face value, the data modestly contradict the claim.\n- Step 2: But the sample size is only 5, and one observation (7455) is a large outlier pulling the mean down. With so few data points, a single unusual switch has huge influence — we cannot reliably conclude much.\n- Step 3: To improve: test a **larger sample** (e.g., 30 or more). The influence of outliers shrinks, and the sample mean becomes a more stable estimate of the true average lifetime.\n\nTakeaway: don't over-interpret a single suspicious number in a tiny sample.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "A random sample of five observations is taken: X₁ = 3, X₂ = 8, X₂ = 32, X₄ = 38, X₅ = 43, X₆ = 44. For each of the following, state whether it is a statistic and explain why: (i) the sample mean, (ii) the expression (ΣX²/n) - (ΣX/n)², (iii) (ΣX/n) - μ² where μ is the population mean. (2 steps)", "answer": "- Step 1: (i) The sample mean x̄ = (3+8+32+38+43+44)/6 = 28 is a statistic because it is calculated entirely from sample observations with no unknown parameters.\n- Step 2: (ii) This expression equals the sample variance s² = [ΣX²/n] - [x̄]², which is also a statistic — it uses only sample values. (iii) This is NOT a statistic because it contains μ, the population mean, which is an unknown parameter. To be a statistic, the expression must be calculable from sample data alone.\n- This distinction matters because statistics can be computed from actual data, while parameters are unknown quantities we estimate using statistics.", "source": "MiniMax ②", "_id": "minimax_2_7"}, {"question": "How do you compute the population variance $$\\sigma^2$$ using the identity $$\\sigma^2 = E(X^2) - \\mu^2$$, for the 60W/100W population (3:1 ratio)? (3 steps)", "answer": "- Step 1: Compute $$E(X^2) = \\sum x^2 P(X=x) = 60^2 \\times \\tfrac{3}{4} + 100^2 \\times \\tfrac{1}{4} = 2700 + 2500 = 5200$$.\n- Step 2: We already have $$\\mu = 70$$, so $$\\mu^2 = 4900$$.\n- Step 3: Variance: $$\\sigma^2 = 5200 - 4900 = 300$$ watts$$^2$$. The formula is a clean shortcut: \"average of squares minus square of average,\" avoiding the computation of individual deviations.\n\nTakeaway: $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ — a universally useful identity.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "When listing all possible samples of size 3 from a population, why do we treat ordered samples like $$(60, 60, 100)$$, $$(60, 100, 60)$$, and $$(100, 60, 60)$$ as distinct? (3 steps)", "answer": "- Step 1: Each position in the sample corresponds to an **independent draw**. The first draw's outcome is independent of the second's, and so on.\n- Step 2: The probability of each ordered outcome is a **product of individual-draw probabilities**, e.g., $$P(60) \\times P(100) \\times P(60)$$. Different orderings can yield the same unordered combination but still count as separate atomic events in the probability space.\n- Step 3: That's why we list them all: each ordered triple is one distinct event. We group them *afterwards* by the value of the statistic to find its sampling distribution. If we only listed unordered combinations, we'd underestimate the probability of mixed samples.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "A city council wants to learn residents' opinions on a recycling centre. Why would they use a sample rather than a census, what is a plausible sampling frame, and what are the sampling units? (3 steps)", "answer": "- Step 1: A census of a whole city would be prohibitively expensive and time-consuming, and not all residents would respond — a sample gives good information much more cheaply.\n- Step 2: A suitable sampling frame is a list identifying residents — for example, the electoral register or a council-maintained register of adult residents.\n- Step 3: The sampling units are the individual residents — the smallest indivisible members of the population being sampled.\n\nTakeaway: reasoning order: population → frame (practical list) → unit (individual item selected).", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "Given a sample $$X_1, \\ldots, X_{20}$$ from a population with mean $$\\mu$$, std deviation $$\\sigma$$, classify each as a statistic or not: (a) $$\\frac{X_1 + X_{20}}{3}$$; (b) $$\\frac{\\sum X}{20}$$; (c) $$\\sum X^2 + \\mu$$; (d) $$\\frac{\\sum X^2}{20} - \\sigma^2$$. (4 steps)", "answer": "- Step 1: **(a) Statistic ✓** — divisor is odd but no population parameter appears. Computable from sample values alone.\n- Step 2: **(b) Statistic ✓** — this is the sample mean $$\\bar{X}$$, a canonical example.\n- Step 3: **(c) Not a statistic ✗** — contains $$\\mu$$, the unknown population mean. Can't evaluate from sample alone.\n- Step 4: **(d) Not a statistic ✗** — contains $$\\sigma^2$$, the unknown population variance. Even though $$\\frac{\\sum X^2}{20}$$ is sample-based, subtracting $$\\sigma^2$$ makes the whole expression uncomputable.\n\nRule: any Greek letter (parameter) disqualifies.", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "For a sample of size 3 drawn (with replacement) from a population with 2 possible values, how many ordered samples are possible, and how many distinct sample means result? (3 steps)", "answer": "- Step 1: Each of the 3 positions has 2 independent choices: $$2^3 = 8$$ ordered samples total.\n- Step 2: Distinct sample means correspond to how many of each value appear. With values $$a$$ and $$b$$, the count of $$a$$s can be 0, 1, 2, or 3 — **four** distinct means.\n- Step 3: Multiple ordered samples can give the same mean (e.g., the 3 arrangements with \"two $$a$$s and one $$b$$\" all give the same average). Their probabilities combine when grouping.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Could a sample from a population ever be *more accurate* than a census of the same population? (2 steps)", "answer": "- Step 1: In pure theory, no — the census captures every member exactly, leaving no room for sampling error. The sample, being a subset, has some uncertainty.\n- Step 2: **In practice, yes** — if a census is so large and error-prone that measurement mistakes accumulate, a smaller, more carefully measured sample can be more accurate overall. Data-entry errors, non-response, and coverage gaps can outweigh the theoretical precision advantage of a census. This is one reason modern statistical offices often prefer well-designed samples to massive censuses.\n\nTakeaway: accuracy depends on both sampling error and measurement quality.", "source": "Opus 4.7 ②", "_id": "opus_2_63"}, {"question": "Why does the sampling distribution of the *median* (for $$n=3$$, 3-valued population) typically have *fewer* possible values than the sampling distribution of the *mean*? (3 steps)", "answer": "- Step 1: The median for an odd-sized sample is literally one of the observations — so it can only take values from the discrete population set (e.g., $$\\{0, 1, 2\\}$$): only 3 possible values.\n- Step 2: The mean takes averages of 3 draws, producing many more possible outcomes (e.g., $$0, \\tfrac{1}{3}, \\tfrac{2}{3}, 1, \\tfrac{4}{3}, \\ldots$$) — a finer grid.\n- Step 3: More granularity means the mean spreads probability thinly across many values; the median concentrates mass on a few. So the median's distribution looks \"lumpy\" while the mean's is smoother.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "\"Because samples are smaller than censuses, sample-based estimates must be less accurate for small subgroups too — just proportionally less accurate.\" What's the deeper issue? (2 steps)", "answer": "- Step 1: The deeper issue isn't just \"smaller = proportionally noisier.\" It's that **small subgroups may not appear at all** or appear very rarely in a sample, so there is simply no data to estimate from for those subgroups.\n- Step 2: With a census, even rare subgroups are represented at their true proportion. With a sample, you need a large enough $$n$$ to capture rare strata — otherwise, estimates about them are impossible, not just imprecise. This is a qualitative limitation, not just a quantitative one.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Walk through the reasoning that $$E(\\bar{X}) = \\mu$$ for a random sample $$X_1, \\ldots, X_n$$ from a population with mean $$\\mu$$. (3 steps)", "answer": "- Step 1: Start from the definition $$\\bar{X} = \\dfrac{1}{n}\\sum_{i=1}^{n} X_i$$.\n- Step 2: Take expectations on both sides, using linearity of expectation:\n$$E(\\bar{X}) = \\dfrac{1}{n}\\sum_{i=1}^{n} E(X_i).$$\n- Step 3: Each $$X_i$$ has expectation $$\\mu$$, so the sum is $$n\\mu$$; dividing gives $$E(\\bar{X}) = \\dfrac{n\\mu}{n} = \\mu$$.\n\nTakeaway: the sample mean is an unbiased estimator of the population mean — its sampling distribution centres exactly on $$\\mu$$.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "A call center with 400 operators wants to estimate the average time operators spend on each call. The manager times a random sample of 30 operators. Explain why the sample mean time is a statistic, and why the manager chose to use a sample rather than a census. (2 steps)", "answer": "- Step 1: The sample mean is a statistic because it is calculated entirely from the observations in the sample — the 30 timing measurements. No population parameters are involved in its calculation.\n- Step 2: The manager chose a sample because:\n  + Timing 400 operators would be extremely time-consuming and expensive\n  + The data from 400 calls would be difficult to process\n  + The manager doesn't need to time every single operator to get a good estimate — a well-chosen sample of 30 can provide sufficient accuracy\n- A census would be wasteful if a sample can provide adequate information at much lower cost.", "source": "MiniMax ②", "_id": "minimax_2_16"}, {"question": "A factory produces light bulbs with lifetimes (in hours) following a Normal distribution with mean 1000 and standard deviation 50. If you take a random sample of 4 bulbs, what is the distribution of the sample mean $$\\bar{X}$$? Explain. (2 steps)", "answer": "- Step 1: The sample mean $$\\bar{X}$$ follows a Normal distribution with mean equal to the population mean (1000) and variance equal to the population variance divided by n.\n- Step 2: Specifically, $$\\bar{X} \\sim N(1000, \\frac{50^2}{4}) = N(1000, 625)$$, so the standard deviation of $$\\bar{X}$$ is $$50/\\sqrt{4} = 25$$ hours.\n\nThis illustrates that sample means are less variable than individual observations — the standard error decreases as sample size increases.", "source": "MiniMax ①", "_id": "minimax_1_15"}, {"question": "Conceptually, why does $$\\operatorname{Var}(\\bar{X}) = \\sigma^{2}/n$$ decrease as $$n$$ grows — even though each individual observation has variance $$\\sigma^{2}$$? (3 steps)", "answer": "- Step 1: Averaging is a specific kind of smoothing: when independent random variables are summed, their high fluctuations and low fluctuations partly cancel.\n- Step 2: The cancellation isn't perfect because fluctuations are random, but in a sum of $$n$$ independent terms the total variance is only $$n\\sigma^{2}$$ (variances add) — not $$n^{2}\\sigma^{2}$$.\n- Step 3: Dividing by $$n$$ (to form the mean) shrinks the standard deviation by a factor of $$n$$ *after* variance has grown by $$n$$, giving net variance $$\\sigma^{2}/n$$. So precision of $$\\bar{X}$$ improves like $$\\sqrt{n}$$.\n\nTakeaway: cancellation in sums is why large samples are informative — but the gain is $$\\sqrt{n}$$, not linear in $$n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "For $$n = 3$$ draws from a 3-valued population (0: 10%, 1: 40%, 2: 50%), what's the conceptual reason $$P(\\text{median} = 1)$$ is relatively high (around 47%)? (3 steps)", "answer": "- Step 1: The median equals 1 whenever the middle-sorted value is 1. This happens in several scenarios — all three 1s; two 1s plus any other; or one 1 flanked by a 0 and a 2 (sorted as 0,1,2).\n- Step 2: Many arrangements contribute:\n+ $$(1,1,1)$$: 1 ordering\n+ Two 1s + one other: 6 orderings (3 positions for the odd one × 2 choices of value)\n+ One of each {0,1,2}: 6 orderings (3! permutations)\n- Step 3: Because 1 has moderate probability (0.4) and \"can be in the middle\" of many mixed configurations, its contributions add up. The median = 1 isn't as extreme as requiring two 0s (very rare) or as constrained as pure-2 dominance. Intuitively, 1 is a natural \"middle\" value and often ends up in the median slot.\n\nTakeaway: the median favours central values that can sit between extremes.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "Why does the sampling distribution of $$\\bar{X}$$ typically include values *not* present in the population? (3 steps)", "answer": "- Step 1: The sample mean $$\\bar{X}$$ is an **average** — it pools information from all $$n$$ draws.\n- Step 2: If observations in a sample are mixed (some at value $$a$$, some at $$b$$), the mean lies strictly between $$a$$ and $$b$$. E.g., sample $$(60, 60, 100)$$ has mean $$73\\tfrac{1}{3}$$ — a value not in the population.\n- Step 3: Only a pure-one-value sample has $$\\bar{X}$$ equal to a population value. So the sampling distribution of $$\\bar{X}$$ lives on a **finer grid** than the population's values. This is why the mean is \"smoother\" than the mode or median.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Explain why the sample mean $$\\bar{X}$$ and sample variance $$S^{2}$$ are statistics, but why $$\\dfrac{\\sum (X_i - \\mu)^{2}}{n-1}$$ is not. (3 steps)", "answer": "- Step 1: The sample mean uses only the observations $$X_i$$ and $$n$$. No unknown parameters appear, so it is computable from the sample — it qualifies as a statistic.\n- Step 2: The sample variance $$S^{2} = \\dfrac{\\sum (X_i - \\bar{X})^{2}}{n-1}$$ uses the $$X_i$$, their own mean $$\\bar{X}$$ (itself a statistic), and $$n-1$$. Again no unknown parameter enters — so it too is a statistic.\n- Step 3: The third expression contains $$\\mu$$, the population mean. If $$\\mu$$ is unknown, the expression cannot be evaluated from the sample. It fails the \"no unknown parameters\" test and is therefore not a statistic.\n\nTakeaway: replacing $$\\bar{X}$$ by $$\\mu$$ in a formula usually destroys the \"statistic\" property.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "Why is \"a statistic has a sampling distribution\" a more powerful idea than \"a statistic is just a formula\"? (2 steps)", "answer": "- Step 1: Treating the statistic as a formula gives one number per sample, with no framework for assessing how reliable or how typical that number is.\n- Step 2: Recognising the statistic as a random variable with its own distribution lets us answer questions like: \"How likely is this estimate off by more than 5%? How does precision grow with $$n$$? Is the observed value unusual enough to reject a hypothesis?\" None of those are answerable from a single realised value.\n\nTakeaway: statistics aren't numbers — they're random variables. That shift in viewpoint unlocks all of inferential reasoning.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "For a sample of size 3 from a two-value population, why does the sampling distribution of the sample mean $$\\bar{X}$$ have 4 possible values, while the sampling distribution of the mode has only 2? (3 steps)", "answer": "- Step 1: With three draws from $$\\{60, 100\\}$$, the number of 60's can be 0, 1, 2 or 3. Each count corresponds to a distinct mean — hence 4 possible means.\n- Step 2: The mode is the most frequent value. In a sample of three from two categories, the majority value is either one or the other — there's no tie possible between two categories in three draws. So the mode always equals one of the two category values.\n- Step 3: The mean \"sees\" every combination; the mode only \"sees\" which side won the majority. The mode collapses several distinct sample compositions into the same outcome, shrinking the outcome set to 2.\n\nTakeaway: different statistics summarise the sample differently — so they have different sampling distributions even from the same raw samples.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "Why is the binomial model sometimes inappropriate even when each outcome is 0/1? (3 steps)", "answer": "- Step 1: The binomial model requires a fixed number of independent trials, a constant success probability, and two outcomes per trial.\n- Step 2: Independence fails if sample members influence each other — e.g., students asked in a group where opinions spread. Constant probability fails if $$p$$ changes between trials — e.g., sampling without replacement from a small finite population, where the remaining proportion shifts after each draw.\n- Step 3: In such cases the count of successes follows a different distribution (hypergeometric when sampling without replacement; other models under dependence). Treating it as binomial systematically misleads probability calculations.\n\nTakeaway: 0/1 outcomes ≠ binomial; the independence and constant-p assumptions are non-negotiable.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "A population has values 60 and 100 in the ratio 3:1 (i.e., P(60) = 0.75, P(100) = 0.25). Find the population mean and variance. Then, if you take a random sample of size 3, what are all possible sample means and their probabilities? (4 steps)", "answer": "- Step 1: Population mean: $$\\mu = 60(0.75) + 100(0.25) = 45 + 25 = 70$$\n- Step 2: Population variance: $$\\sigma^2 = 60^2(0.75) + 100^2(0.25) - 70^2 = 2700 + 2500 - 4900 = 300$$\n- Step 3: For n=3, the possible sample means are: 60 (all three are 60), 73⅓ (two 60s, one 100), 86⅔ (one 60, two 100s), and 100 (all three are 100)\n- Step 4: Probabilities: $$P(\\bar{X}=60) = (0.75)^3 = 27/64$$, $$P(\\bar{X}=73⅓) = 3(0.25)(0.75)^2 = 27/64$$, $$P(\\bar{X}=86⅔) = 3(0.25)^2(0.75) = 9/64$$, $$P(\\bar{X}=100) = (0.25)^3 = 1/64$$\n\nThe distribution is symmetric around 70 because the sample mean is an unbiased estimator of the population mean.", "source": "MiniMax ①", "_id": "minimax_1_11"}, {"question": "In sampling theory, we use capital letters like $$X_i$$ and $$\\bar{X}$$, but in calculations with real data, we use lowercase like $$x_i$$ and $$\\bar{x}$$. What is the conceptual reason for this notational split? (2 steps)", "answer": "- Step 1: Capital letters ($$X_i$$, $$\\bar{X}$$) denote **random variables**. Before a sample is drawn, the specific values we will observe are uncertain; they follow a probability distribution. $$\\bar{X}$$ represents all possible sample means we *could* get.\n- Step 2: Lowercase letters ($$x_i$$, $$\\bar{x}$$) denote **observed values**. Once the sample has been taken, the random variables have crystallized into fixed, known numbers. $$\\bar{x}$$ is one specific realization of the random variable $$\\bar{X}$$.\n\nTakeaway: Capitals = the realm of probability and \"what could happen\"; lowercase = the realm of data and \"what actually happened\".", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "A small bag has counters valued 0, 1, 2 with probabilities $$\\tfrac{1}{10}, \\tfrac{4}{10}, \\tfrac{5}{10}$$. Without computing every term, explain why the probability the median of 3 counters equals 2 is by far the largest. (3 steps)", "answer": "- Step 1: The median of 3 observations equals 2 when at least two of the three counters are 2's (since 2 is the largest value, the median can't be 2 otherwise).\n- Step 2: The value 2 is the most common single outcome ($$P=0.5$$), so in a sample of 3 we expect roughly 1.5 counters equal to 2. Having at least two 2's is therefore the most likely scenario among the three possible medians.\n- Step 3: For contrast: to get median 0 we'd need at least two 0's, but $$P(0)=0.1$$ is rare, making two-or-more 0's very unlikely. So intuitively $$P(N=2) \\gg P(N=0)$$ and in fact $$P(N=2) = \\tfrac{1}{2}$$ dominates the distribution.\n\nTakeaway: the median of a small sample is usually near the mode of the population.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "In what sense is the mean of a sample still a \"random variable\" even after you've calculated it from actual data? (3 steps)", "answer": "- Step 1: The computed mean is a single number for that specific sample. But that number was obtained by applying the mean formula to a random sample; a different random sample would have yielded a different number.\n- Step 2: Thinking of \"the sample mean\" as a function of the random sample makes it a random variable: its value depends on the random outcome of the sampling process.\n- Step 3: This dual perspective — a realised number after sampling, a random variable before sampling — is what makes inference possible. We use the distribution of the random variable to judge the plausibility of the realised number.\n\nTakeaway: the sample mean lives in both worlds — concrete after the fact, random before it.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "A coin is tossed 3 times and $$H$$ is the number of heads. What is the sampling distribution of $$H$$, and why can we recognise this without enumeration? (3 steps)", "answer": "- Step 1: Each toss is independent with $$P(\\text{Head}) = 0.5$$, and we're counting heads across a fixed number of identical independent trials with two outcomes. These are exactly the conditions for $$B(3, 0.5)$$.\n- Step 2: By pattern recognition we write $$H \\sim B(3, 0.5)$$, giving\n+ $$P(H=0) = 1/8$$\n+ $$P(H=1) = 3/8$$\n+ $$P(H=2) = 3/8$$\n+ $$P(H=3) = 1/8$$\n- Step 3: The symmetry $$P(H=0) = P(H=3)$$ and $$P(H=1) = P(H=2)$$ reflects $$p = 0.5$$, and the binomial coefficients (1, 3, 3, 1) count orderings producing each outcome.\n\nTakeaway: the binomial distribution encodes both the number of success-paths and the trial probabilities.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Suppose someone asserts: \"If I double my sample from 100 to 200, my estimate becomes twice as precise.\" Is this correct, and why or why not? (3 steps)", "answer": "- Step 1: Precision for the sample mean is measured by the standard error $$SE = \\sigma/\\sqrt{n}$$.\n- Step 2: Going from $$n=100$$ to $$n=200$$ changes $$SE$$ from $$\\sigma/10$$ to $$\\sigma/\\sqrt{200} \\approx \\sigma/14.1$$ — a factor of only $$\\sqrt{2} \\approx 1.41$$, not 2.\n- Step 3: So doubling the sample size reduces the standard error by $$\\sqrt{2}$$, not 2. To *halve* the standard error one must *quadruple* $$n$$. The assertion is wrong — the improvement is only about 41%, not 100%.\n\nTakeaway: precision grows like $$\\sqrt{n}$$; diminishing returns are built into sampling.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "A company wishes to estimate the proportion of defective items in their production line. They are considering using a sample of 50 items rather than testing all 10,000 items produced daily. State two advantages and two disadvantages of using a sample instead of a census in this scenario. (1 step)", "answer": "- Advantages of using a sample:\n  + Much less time-consuming and cheaper than examining every single item\n  + Fewer personnel needed to conduct the testing\n  + Less data to process and analyze, making results available faster\n  + If testing is destructive, samples are the only practical option\n\n- Disadvantages of using a sample:\n  + Results may be less accurate — the sample might not perfectly represent the population\n  + The sample may not be large enough to detect small subgroups or rare defects\n  + Different samples could lead to different conclusions due to natural variation", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "What is the fundamental difference between a census and a sample in statistics, and when might a census be practically impossible? (2 steps)", "answer": "- Step 1: A **census** observes or measures *every single member* of the population, whereas a **sample** selects only a subset of the population to draw inferences about the whole.\n- Step 2: A census is practically impossible when the testing process destroys the item (e.g., testing rope breaking points), when the population is infinitely large or continuously changing, or when the resources required to measure everyone are unfeasible.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "A city council wants to survey residents about a recycling centre. Why would a census be impractical, and what would be a suitable sampling frame and sampling unit? (3 steps)", "answer": "- Step 1: **Why not a census?** Asking every resident would be prohibitively expensive and slow, and many wouldn't respond. A sample captures opinion at a fraction of the cost.\n- Step 2: **Sampling frame:** the electoral register, or a list of all households in the city — any enumeration of residents.\n- Step 3: **Sampling unit:** each individual resident (or each household, depending on survey design) — the entity randomly selected from the frame.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "A manager of a garage (10 mechanics) wants to know their views on a new savings scheme, and asks all of them. Why is this census reasonable? (3 steps)", "answer": "- Step 1: With only 10 mechanics, the population is **small and accessible** — asking all is quick, cheap, and low-effort.\n- Step 2: A census captures **every opinion**, ensuring no view is missed — especially important if some mechanics have strong or unusual concerns a sample might miss.\n- Step 3: With such a small population, any sample would cover a large fraction anyway — so the \"saving\" from sampling is minimal, and the benefit of full coverage dominates.\n\nTakeaway: small populations + non-destructive testing ⇒ census often best.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "What happens to the sampling distribution of the sample mean when the population variance is 0? (2 steps)", "answer": "- Step 1: Variance 0 means every population member has the same value $$\\mu$$. Any sample drawn must consist entirely of $$\\mu$$s.\n- Step 2: So $$\\bar{X}$$ is always exactly $$\\mu$$ — no variability. The sampling distribution is a single-point distribution: $$P(\\bar{X} = \\mu) = 1$$. In this limiting case, sampling gives certainty after a single observation.\n\nIntuition: uniform population ⇒ no value in sampling more than once.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "A school defines $$X = 1$$ if a student supports a new uniform and $$X = 0$$ otherwise. A random sample of 15 students is taken. Why does $$Y = \\sum_{i=1}^{15} X_i$$ follow a binomial distribution? (3 steps)", "answer": "- Step 1: Each $$X_i$$ is a **Bernoulli trial**: the student either supports (1) or doesn't (0). Each trial has the same success probability $$p$$ (the population proportion of supporters).\n- Step 2: Because the sample is random, each $$X_i$$ is **independent** of the others, and $$p$$ is **constant** across all 15 observations.\n- Step 3: The sum of $$n$$ independent Bernoulli trials with constant probability is, by definition, binomial: $$Y \\sim B(15, p)$$. All binomial conditions (fixed $$n$$, independence, constant $$p$$, two outcomes) are satisfied.\n\nTakeaway: yes/no questions on a random sample ⇒ binomial sum.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "Why does a census, despite giving the most accurate possible result, often turn out to be impractical or impossible in real investigations? (3 steps)", "answer": "- Step 1: A census requires examining every unit, so effort and cost scale directly with population size. For large populations this becomes prohibitively time-consuming and expensive.\n- Step 2: If the test itself destroys the item — cutting a plum to check ripeness, loading a rope until it breaks, operating a switch until failure — a full census would annihilate the entire population, including what you wanted to sell or use.\n- Step 3: Even if data could be collected, processing enormous volumes of observations is logistically hard, and personnel and record-keeping costs can dwarf any gain in accuracy.\n\nTakeaway: accuracy comes at the price of feasibility; censuses are ideal in theory but often irrational in practice.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Why is the sample variance $$S^{2} = \\tfrac{1}{n-1}\\sum (X_i-\\bar{X})^{2}$$ defined with $$n-1$$ rather than $$n$$ in the denominator? (3 steps)", "answer": "- Step 1: When measuring deviations from the true population mean $$\\mu$$, every observation contributes a \"fresh\" piece of information — dividing by $$n$$ would then be natural.\n- Step 2: But since $$\\mu$$ is unknown we substitute $$\\bar{X}$$, which is itself computed from the same data. The sample values are already \"pulled toward\" $$\\bar{X}$$, so deviations from $$\\bar{X}$$ are systematically smaller than deviations from $$\\mu$$.\n- Step 3: Dividing by $$n-1$$ instead of $$n$$ compensates for this \"lost\" degree of freedom, making $$S^{2}$$ an unbiased estimator of $$\\sigma^{2}$$. Intuitively: we used one piece of data to compute $$\\bar{X}$$, leaving only $$n-1$$ independent residuals.\n\nTakeaway: $$n-1$$ is a degrees-of-freedom correction that unbiases $$S^{2}$$ after estimating $$\\mu$$ from the same sample.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "In the context of sampling distributions, what does it mean for a statistic to be an \"unbiased estimator\" of a population parameter? Explain with an example from this chapter. (2 steps)", "answer": "- Step 1: An unbiased estimator is a statistic whose expected value (mean of its sampling distribution) equals the population parameter it estimates. In other words, on average, the statistic hits the true parameter value.\n- Step 2: For example, the sample mean x̄ is an unbiased estimator of the population mean μ — the expected value of x̄ equals μ. Similarly, the sample variance s² (using n-1 in denominator) is an unbiased estimator of the population variance σ².\n- If we used n in the denominator instead, the estimator would be biased (it would systematically underestimate σ²), especially for small samples.", "source": "MiniMax ②", "_id": "minimax_2_20"}, {"question": "A receptionist makes typing mistakes at a rate of 5 per 10 pages. What sampling distribution models the number of mistakes in a 6-page document, and why? (3 steps)", "answer": "- Step 1: Mistakes occur randomly and independently at a roughly constant rate over the pages — the conditions for a Poisson process.\n- Step 2: The Poisson parameter $$\\lambda$$ is the expected number of events in the chosen interval. At 5 mistakes per 10 pages, the rate is 0.5 per page, so for 6 pages $$\\lambda = 6 \\times 0.5 = 3$$.\n- Step 3: Therefore the number of mistakes $$X \\sim \\text{Po}(3)$$. To find $$P(X<2)$$ we would compute $$P(X=0) + P(X=1)$$ using the Poisson PMF.\n\nTakeaway: constant-rate, independent events in a fixed interval ⇒ Poisson; the parameter scales linearly with the interval.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "What is meant by \"raw data\"?", "answer": "Raw data refers to the direct, unprocessed observations or measurements gathered from the population (or sample). It's the data *as collected*, before any summarisation, averaging, or analysis has been applied. For example, if you measure the height of every tree in a forest, the list of individual heights is the raw data; computing the mean height would then be a derived statistic.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "Why does a more variable (less uniform) population require a larger sample to reach the same level of accuracy? (3 steps)", "answer": "- Step 1: If every unit in the population were identical, a single observation would already characterise the whole — no variability means no uncertainty.\n- Step 2: When units differ substantially, any small sample could by chance contain mostly extreme or mostly typical items. The sample statistic can therefore swing widely depending on which items happen to be picked.\n- Step 3: Increasing the sample size averages over this variability so that extreme values cancel out. The more varied the population, the more observations we need before the sample statistic settles close to the true population parameter.\n\nTakeaway: sample size must scale with the \"spread\" you're trying to pin down.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "A student claims: \"Since $$X_1, X_2, X_3$$ are independent with mean $$\\mu$$, the sample mean $$\\bar{X}$$ must equal $$\\mu$$.\" What's the error? (3 steps)", "answer": "- Step 1: The statement confuses **expected value** with **actual value**. We have $$E(X_i) = \\mu$$ for each $$i$$, hence $$E(\\bar{X}) = \\mu$$ — but an expected value is a *long-run average*, not a guarantee for any single sample.\n- Step 2: For any specific sample, $$\\bar{X}$$ is some actual number that will usually *differ* from $$\\mu$$ — sometimes higher, sometimes lower. That's sampling variability.\n- Step 3: The correct statement: $$\\bar{X}$$ is an *unbiased estimator* of $$\\mu$$ — meaning on average over all possible samples, it hits $$\\mu$$. Any single sample mean is a random draw from a distribution *centred* on $$\\mu$$.\n\nTakeaway: don't conflate \"$$E(\\bar{X}) = \\mu$$\" with \"$$\\bar{X} = \\mu$$.\"", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Why is understanding the sampling distribution central to hypothesis testing? (3 steps)", "answer": "- Step 1: A hypothesis test compares a sample statistic to what the statistic \"should\" look like *if* some claim about the population were true.\n- Step 2: \"Should look like\" is made precise by the sampling distribution under the hypothesis: it tells us the range of values the statistic naturally takes and with what probabilities.\n- Step 3: If our observed statistic lies far out in the tails of that sampling distribution, the hypothesis becomes implausible; if near the centre, the data is consistent with the hypothesis. Without a sampling distribution, there's no way to decide what counts as \"far\" versus \"typical,\" and no objective hypothesis test is possible.\n\nTakeaway: the sampling distribution = the reference ruler against which sample evidence is judged.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "A student calculates the sample variance as $$S^2 = \\frac{\\sum(X_i - \\bar{X})^2}{n}$$. Another student uses $$S^2 = \\frac{\\sum(X_i - \\bar{X})^2}{n-1}$$. Are both of these statistics? Which one is the standard unbiased estimator for population variance? (2 steps)", "answer": "- Step 1: Yes, both are statistics. They are calculated only from sample observations ($$X_i$$ and $$\\bar{X}$$) and involve no unknown population parameters. Any function solely of sample data is a statistic.\n- Step 2: The version divided by $$n-1$$ is the standard unbiased estimator for the population variance $$\\sigma^2$$. Dividing by $$n$$ tends to underestimate the true population variance because the deviations are measured from the sample mean $$\\bar{X}$$ (which is itself drawn from the data), making the deviations artificially smaller.\n\nTakeaway: Being a statistic just means \"calculable from data.\" Being a *good* statistic (like an unbiased estimator) requires deeper mathematical properties like dividing by $$n-1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "Why is it more useful to know the *full sampling distribution* of a statistic, rather than just its mean and variance? (3 steps)", "answer": "- Step 1: Mean and variance summarise the statistic's **centre** and **spread**, but not its full shape. Two statistics can have the same mean and variance but very different distributions (e.g., symmetric vs. skewed).\n- Step 2: Hypothesis testing needs probabilities of extreme values — e.g., \"What's the chance of observing a value this large if $$H_0$$ is true?\" That requires the full distribution, not just summaries.\n- Step 3: The sampling distribution also reveals other features: multiple modes, boundary constraints (e.g., proportions between 0 and 1), discrete support. These shape interpretation of sample results.\n\nTakeaway: full distribution > summary statistics, especially for tail probabilities.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "How does the sampling-distribution concept unify sample size, population variability, and reliability of conclusions? (4 steps)", "answer": "- Step 1: For a given statistic (say the sample mean), the sampling distribution's spread measures how much the statistic varies from sample to sample.\n- Step 2: A narrow sampling distribution (small variance) means any single sample's estimate will be close to the true parameter — high reliability. A broad distribution means any single estimate is untrustworthy.\n- Step 3: That spread shrinks as $$n$$ grows (e.g. $$\\operatorname{Var}(\\bar{X}) = \\sigma^{2}/n$$) and grows with population variability $$\\sigma^{2}$$.\n- Step 4: So \"larger samples give more accurate estimates\" and \"more variable populations require larger samples\" are both direct consequences of how $$n$$ and $$\\sigma^{2}$$ jointly set the sampling distribution's spread.\n\nTakeaway: the sampling distribution unifies the practical intuitions about sample size and variability into one precise mathematical object.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "For a sample of size 2, why is it incorrect to compute the probability of sample mean $$\\bar{X} = \\tfrac{a+b}{2}$$ (for $$a \\neq b$$) as simply $$P(X=a) \\cdot P(X=b)$$? (3 steps)", "answer": "- Step 1: The product $$P(X=a) \\cdot P(X=b)$$ counts only one specific ordered outcome — first draw $$a$$, second draw $$b$$.\n- Step 2: But the same mean $$\\bar{X} = \\tfrac{a+b}{2}$$ arises equally from the ordered draw $$(b,a)$$, with probability $$P(X=b) \\cdot P(X=a)$$. Both orderings occur in real draws, so both must be counted.\n- Step 3: The correct probability for $$a \\neq b$$ is $$2 \\cdot P(X=a) \\cdot P(X=b)$$. Missing the factor of 2 (or, in general, the multinomial coefficient) systematically underestimates probabilities whenever the sample values are not all identical.\n\nTakeaway: distinct values → multiply by the number of orderings; identical values → only one ordering exists.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Why does testing a larger sample of plums (say 30 instead of 5) typically give a better estimate of the proportion of ripe plums? (3 steps)", "answer": "- Step 1: With only 5 plums, each single plum swings the estimated proportion by $$\\tfrac{1}{5} = 20\\%$$. One misleading observation shifts the estimate dramatically.\n- Step 2: With 30 plums, each one swings the proportion by only $$\\tfrac{1}{30} \\approx 3\\%$$. The estimate is much less sensitive to any individual plum.\n- Step 3: Formally, the standard error of a sample proportion is $$\\sqrt{\\frac{p(1-p)}{n}}$$, shrinking like $$\\frac{1}{\\sqrt{n}}$$. Going from $$n = 5$$ to $$n = 30$$ reduces the typical error by a factor of about $$\\sqrt{6} \\approx 2.4$$.\n\nTakeaway: individual observations have less leverage as $$n$$ grows.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Why is the mode generally considered a \"less informative\" statistic than the mean or median for a small sample? (3 steps)", "answer": "- Step 1: The mode collapses the whole sample into a single category label — it uses only the \"which value appears most often\" information, discarding how often each appears and by how much.\n- Step 2: The mean uses every observation *and* their magnitudes, making it sensitive to every data point. The median uses the *ordering* of observations, giving a central-tendency summary that resists outliers.\n- Step 3: In small samples from multi-valued populations, the mode can also be undefined (ties) or unstable (flipping with little data). The mean and median are always defined and carry richer information.\n\nTakeaway: the mode is a summary of majority, not of magnitude or order — it is informationally minimal.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "Why can't we compute an exact sampling distribution of the sample mean from a continuous population (like weights or heights) by enumeration — and what replaces enumeration? (3 steps)", "answer": "- Step 1: A continuous distribution has uncountably many possible values, so \"listing all samples\" is impossible — there are infinitely many.\n- Step 2: Instead, we derive the distribution analytically: for a normal population, $$\\bar{X} \\sim N(\\mu,\\ \\sigma^{2}/n)$$ by properties of linear combinations of normal variables.\n- Step 3: For non-normal populations and large $$n$$, the Central Limit Theorem gives an approximate normal sampling distribution for $$\\bar{X}$$ without knowing the exact population form. In general: enumeration is for finite discrete cases; continuous cases need theorem-based derivation.\n\nTakeaway: enumeration works for finite discrete problems; probability theorems generalise to continuous ones.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "A bag of coins contains 5p, 10p, 20p coins in ratio 3:2:1. What's the population mean value, and a quick sanity check? (3 steps)", "answer": "- Step 1: Probabilities from the ratio: $$P(5) = \\tfrac{3}{6} = \\tfrac{1}{2}$$, $$P(10) = \\tfrac{2}{6} = \\tfrac{1}{3}$$, $$P(20) = \\tfrac{1}{6}$$.\n- Step 2: Population mean $$\\mu = 5 \\times \\tfrac{1}{2} + 10 \\times \\tfrac{1}{3} + 20 \\times \\tfrac{1}{6} = 2.5 + 3.\\overline{3} + 3.\\overline{3} \\approx 9.17$$ pence.\n- Step 3: Sanity check: the mean sits between 5 and 20, dominated by 5p (50%-weighted) but pulled up by the rarer but larger-valued coins. The answer is plausibly close to 5–10p.\n\nTakeaway: the weighted mean must lie between min and max population values, biased toward more frequent ones.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "In what sense is taking a sample \"different from\" simply repeating a single measurement several times with the same instrument? (3 steps)", "answer": "- Step 1: Repeating measurements on the *same* physical item reduces measurement error but does not capture population variability — all replicates come from one unit.\n- Step 2: A sample draws *different* units from the population, so each observation reflects unit-to-unit variation — exactly the variability we want to estimate to make population-level claims.\n- Step 3: Consequently, a sample statistic (like $$\\bar{X}$$) estimates a *population parameter*; an averaged replicate measurement estimates one unit's true value. Confusing the two massively underestimates uncertainty.\n\nTakeaway: samples are informative about the population; repeated measurements are informative about a single unit.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "For a sample of size 3 from a 3-value population, explain why ties in the mode are possible — and why the textbook often prefers the median over the mode in such cases. (3 steps)", "answer": "- Step 1: With 3 observations spread over 3 categories, counts of each category must sum to 3. The possible partitions are $$(3,0,0)$$, $$(2,1,0)$$, $$(1,1,1)$$.\n- Step 2: $$(3,0,0)$$ and $$(2,1,0)$$ have a unique maximum count, so the mode is well-defined. But $$(1,1,1)$$ — one of each value — has a three-way tie, making the mode undefined (or multi-valued).\n- Step 3: The median is always well-defined (the middle of three sorted values), so textbooks prefer it when the mode risks ambiguity in small samples.\n\nTakeaway: the mode is a cleaner statistic for very few categories or majority-dominated populations; it can break down when observations are evenly spread.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "Why is the sampling distribution of any statistic always a valid probability distribution — in the sense that its probabilities sum to 1? (2 steps)", "answer": "- Step 1: Every possible sample of the chosen size from the population produces some value of the statistic. So partitioning all possible samples by the statistic's value puts each sample in exactly one group.\n- Step 2: Summing the probabilities of all samples (which total 1) across these groups gives the total probability across all values of the statistic — also 1. Hence the sampling distribution is a legitimate probability distribution.\n\nTakeaway: completeness in enumeration ⇒ probabilities sum to 1; the sampling distribution isn't invented — it is inherited from the probability structure of the sample.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "When a company estimates the average lifetime of its microswitches by operating them until they fail, why is a sample — not a census — essentially the only option? (2 steps)", "answer": "- Step 1: A census would require operating every microswitch until it fails. Since the quantity being measured is lifetime-to-failure, every unit tested is destroyed.\n- Step 2: A destroyed population has no products left to ship; the census would bankrupt the very investigation it was meant to support. A sample lets us estimate typical lifetime while sacrificing only a small fraction of production.\n\nTakeaway: whenever the measurement process destroys the item, sampling is not just preferred — it is mandatory.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "A bag has counters valued 6 (probability 0.6) and 10 (probability 0.4). For a random sample of 3, why will the mode be 6 more often than 10, and how does this manifest in the sampling distribution? (3 steps)", "answer": "- Step 1: With only two values, the mode in a sample of 3 is whichever value appears at least twice. So $$P(\\text{mode}=6) = P(\\text{at least two 6's})$$.\n- Step 2: Since 6 has the higher single-draw probability (0.6 vs 0.4), \"at least two 6's in 3 draws\" is more likely than \"at least two 10's.\" Let $$K \\sim B(3, 0.6)$$ count the number of 6's; then $$P(K\\geq 2) > P(K\\leq 1)$$.\n- Step 3: Concretely, $$P(K=2) + P(K=3) = 3(0.6)^{2}(0.4) + (0.6)^{3} \\approx 0.432 + 0.216 = 0.648$$, vs about 0.352 for mode = 10. The sampling distribution of the mode is skewed toward the majority population value.\n\nTakeaway: the mode of a small sample usually matches the most probable population value, amplifying the population's asymmetry.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "A common misconception is that \"a large sample guarantees correct conclusions.\" Why is this wrong? (3 steps)", "answer": "- Step 1: A large sample size reduces sampling variability — the statistic will be close to its expected value with high probability. But \"expected value\" depends on how the sample was drawn.\n- Step 2: If the sampling method is biased — e.g. a non-random frame that under-covers some subgroup — a large sample merely gives a very precise estimate of the *biased* quantity, not of the true population parameter.\n+ Example: 10,000 online survey responses about internet habits would precisely describe internet users, not the general population.\n- Step 3: So both large $$n$$ AND representative sampling are required. Bias cannot be \"fixed\" by increasing $$n$$ — only variance can.\n\nTakeaway: sample size cures variance; design cures bias. They're not interchangeable.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "A call-centre manager with 400 operators times only 30 randomly chosen operators over one day. Identify two advantages of sampling over a census here, one disadvantage, and whether the computed mean time is a statistic. (3 steps)", "answer": "- Step 1: Advantages of the sample:\n+ Much faster and cheaper — timing 30 operators for a day is manageable; timing all 400 would require huge resources.\n+ Far less data to process and analyse; inference can be drawn quickly.\n- Step 2: Disadvantage:\n+ The estimate of average call time is not perfectly accurate — it carries sampling variability and could mislead if the 30 chosen operators happen to be atypical.\n- Step 3: The mean time *is* a statistic, because it is calculated only from sample observations with no unknown parameters involved.\n\nTakeaway: sample vs census is a trade-off of speed and cost against accuracy; any quantity computed only from sample data qualifies as a statistic.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "A researcher wants to know average household income in a city. They use the city's telephone directory as their sampling frame to select households to survey. Explain why this approach could lead to biased results and identify what group might be underrepresented. (2 steps)", "answer": "- Step 1: Using a telephone directory as a sampling frame excludes households without listed phone numbers or without landlines, which introduces coverage bias.\n- Step 2: Low-income households, younger households (who primarily use mobile phones), and transient populations would likely be underrepresented, meaning the sample wouldn't represent the true population of all households.\n\nThis demonstrates why the choice of sampling frame is critical — it determines which parts of the population have any chance of being selected.", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "A population of light bulbs has wattages of 60W and 100W in a 3:1 ratio. If we take a sample of size 3, the sample mean $$\\bar{X}$$ can take values like 60, 73.33, 86.67, and 100. Why is the probability distribution of $$\\bar{X}$$ not simply in a 3:1 ratio like the population? (3 steps)", "answer": "- Step 1: The sample mean is the average of three observations. To get $$\\bar{X} = 60$$, *all three* bulbs must be 60W. This is only one specific combination out of many possible samples.\n- Step 2: To get $$\\bar{X} = 73.33$$ (one 100W, two 60W), there are three different combinations depending on which of the three bulbs drawn is the 100W one (100-60-60, 60-100-60, 60-60-100).\n- Step 3: Therefore, the probabilities in the sampling distribution depend on the *number of combinations* that yield each mean, weighted by their individual probabilities. Values in the middle of the range have more pathways to occur, distorting the simple 3:1 population ratio.\n\nTakeaway: The sampling distribution of the mean reflects combinatorial pathways, shifting probability towards the center.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "When computing the sampling distribution of the median of 3 observations from a 3-category population $$\\{0,1,2\\}$$, why is listing ordered samples essential rather than just listing distinct value-multisets? (3 steps)", "answer": "- Step 1: Each ordered sample has a single probability given by the product of the three category probabilities in order (e.g. $$P(0,1,2) = p \\cdot q \\cdot r$$).\n- Step 2: Different orderings of the same multiset (say $$\\{0,1,2\\}$$) share the same multiplied probability but represent distinct draw pathways. There are $$3! = 6$$ orderings for $$\\{0,1,2\\}$$, each with probability $$pqr$$, summing to $$6pqr$$.\n- Step 3: The median of $$\\{0,1,2\\}$$ is 1 regardless of order, so we'd add $$6pqr$$ to $$P(N=1)$$. If we'd listed the multiset only once, we'd understate that probability by a factor of 6. Listing ordered samples guarantees every pathway counts.\n\nTakeaway: the number of orderings is the combinatorial multiplier — missing it skews the sampling distribution.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "After listing all possible ordered samples and their probabilities, how do you collapse them into the sampling distribution of a specific statistic? (3 steps)", "answer": "- Step 1: Compute the statistic's value for each ordered sample. Multiple distinct samples may map to the same value (e.g., $$(60, 60, 100)$$, $$(60, 100, 60)$$, $$(100, 60, 60)$$ all give mean $$73\\tfrac{1}{3}$$).\n- Step 2: **Group samples by the statistic's value** and **sum** the probabilities within each group.\n- Step 3: The resulting table $$(t, P(T=t))$$ is the sampling distribution of the statistic $$T$$. Check: probabilities should sum to 1.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "In statistics, what is meant by the term \"population\"? (3 steps)", "answer": "- Step 1: A population is the **complete, exhaustive set of items** (or people, or observations) that are of interest to an investigation.\n- Step 2: \"Population\" doesn't mean people — it's domain-specific. It could be all plums in a delivery, all light bulbs made by a factory, all households in a town, or all exam scripts in a school.\n- Step 3: The investigator defines the population based on the question being asked. Once defined, it is fixed: the population is the entire universe of things we want to learn about.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "In the context of sampling, what is meant by \"random\" sampling? Why is randomness important? (2 steps)", "answer": "- Step 1: Random sampling means each member of the population has a known, non-zero probability of being selected, and selection is based purely on chance rather than any systematic rule.\n- Step 2: Randomness is crucial because it ensures the sample is representative of the population on average, prevents selection bias, and allows us to use probability theory to quantify uncertainty in our estimates. Without randomness, we cannot make valid statistical inferences.\n\nRandomness is the foundation that makes inference possible.", "source": "MiniMax ①", "_id": "minimax_1_27"}, {"question": "Contrast a population parameter with a sample statistic in terms of what they describe and their observability. (2 steps)", "answer": "- Step 1: A **population parameter** (e.g., $$\\mu$$, $$\\sigma^2$$) is a fixed numerical property of the entire population. Because populations are usually too large to measure completely, parameters are typically *unknown constants*.\n- Step 2: A **sample statistic** (e.g., $$\\bar{X}$$, $$S^2$$) is a quantity calculated *only* from the observations in a sample. Because it depends on which sample is randomly chosen, a statistic is a *variable* that we use to estimate the unknown parameter.\n\nTakeaway: Parameters are the unknown targets; statistics are the known, variable estimators.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "You have two options: (a) census of 30 people in a village, (b) random sample of 30 from a city of 300 000. Compare the accuracy of each for its respective population. (3 steps)", "answer": "- Step 1: **For the village:** the census covers 100% of the 30 people — perfect information about the village population, zero sampling error.\n- Step 2: **For the city:** 30 out of 300 000 is a tiny fraction (0.01%). The sample mean has real sampling error, with magnitude depending on the city's variability.\n- Step 3: So (a) gives perfect info about its population; (b) gives a noisy estimate. But the comparison is apples-to-oranges: different populations. Both have the same sample size, but the villaged population is dramatically smaller. If the goal is \"accurate info about a city of 300k,\" 30 is clearly inadequate.\n\nTakeaway: accuracy depends on sample-to-population ratio *and* population variability, not just absolute sample size.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What is the fundamental difference between a census and a sample in statistics, and when might a census be practically impossible? (2 steps)", "answer": "- Step 1: A **census** observes or measures *every single member* of the population, whereas a **sample** selects only a subset of the population to draw inferences about the whole.\n- Step 2: A census is practically impossible when the testing process destroys the item (e.g., testing rope breaking points), when the population is infinitely large or continuously changing, or when the resources required to measure everyone are unfeasible.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "A census provides a completely accurate result, yet it is rarely used in practice for large populations. What are the primary disadvantages that outweigh this accuracy? (2 steps)", "answer": "- Step 1: The practical disadvantages of a census are that it is extremely **time-consuming and expensive** to conduct for large populations, and it generates a massive quantity of data that is hard to process.\n- Step 2: The critical conceptual disadvantage is that it **cannot be used when the testing process destroys the item** (destructive testing). If you test every lightbulb until it fails, you have no lightbulbs left to sell.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "While samples are cheaper and faster, what is the fundamental trade-off regarding their accuracy, and why might they fail to represent small subgroups? (2 steps)", "answer": "- Step 1: The fundamental trade-off is that sample data **may not be as accurate** as a census because it only estimates the population parameters, and different samples can lead to different conclusions due to natural variation.\n- Step 2: A sample **may not be large enough** to give information about small subgroups of the population. If a minority group is very small, a random sample might entirely miss them, making it impossible to draw valid conclusions about that subgroup.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "How does the inherent variability of a population influence the required sample size for accurate estimation? (2 steps)", "answer": "- Step 1: The more varied (heterogeneous) a population is, the larger the sample needs to be to capture that variation accurately. If the population is uniform (homogeneous), even a very small sample will be highly representative.\n- Step 2: Therefore, required sample size is directly related to population variance; a highly varied population demands a larger sample to achieve the same level of estimation accuracy as a uniform population.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Distinguish between a 'sampling unit' and a 'sampling frame'. Why is a sampling frame necessary? (2 steps)", "answer": "- Step 1: A **sampling unit** is an individual member or item of the population (e.g., a single student, a specific lightbulb).\n- Step 2: A **sampling frame** is a numbered or named list of all sampling units. It is necessary because to take a random sample, you must be able to identify and select individual units, which requires an organized list representing the population.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "In statistical notation, how do we conceptually and notationally distinguish between a 'population parameter' and a 'statistic'? (2 steps)", "answer": "- Step 1: A **population parameter** is a fixed, often unknown numerical property of the entire population (e.g., the true mean). We typically use **Greek letters** (like $$\\mu$$, $$\\sigma^2$$) to denote parameters.\n- Step 2: A **statistic** is a quantity calculated *only* from the observations in a sample (e.g., the sample mean). It does not involve unknown population parameters. We typically use **Latin letters** (like $$\\bar{X}$$, $$S^2$$) to denote statistics.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "A random sample $$X_1, X_2, \\dots, X_n$$ is taken from a population with unknown mean $$\\mu$$. Explain why $$\\frac{\\sum X_i}{n}$$ is a statistic, but $$\\frac{\\sum (X_i - \\mu)^2}{n}$$ is not. (2 steps)", "answer": "- Step 1: A statistic must be calculated *solely* from the sample observations. The expression $$\\frac{\\sum X_i}{n}$$ only uses the sample values $$X_i$$ and the sample size $$n$$, so it is a statistic.\n- Step 2: The expression $$\\frac{\\sum (X_i - \\mu)^2}{n}$$ includes the population parameter $$\\mu$$. Since $$\\mu$$ is unknown and not part of the sample data, this expression cannot be calculated from the sample alone and is therefore **not** a statistic.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "In the context of sampling distributions, what is the conceptual difference between writing $$\\bar{X}$$ versus $$\\bar{x}$$? (2 steps)", "answer": "- Step 1: **Upper case** $$\\bar{X}$$ represents the random variable—the sample mean *before* the sample is taken. It has a probability distribution (the sampling distribution) because its value depends on which random sample is drawn.\n- Step 2: **Lower case** $$\\bar{x}$$ represents a specific observed value—the actual calculated mean *after* a sample has been taken. It is a fixed number, not a random variable.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "What exactly is a 'sampling distribution of a statistic', and how does it differ from a population distribution? (2 steps)", "answer": "- Step 1: A sampling distribution is the probability distribution of a statistic (like $$\\bar{X}$$ or the mode $$M$$). It lists all possible values the statistic can take and the probability of each occurring by chance alone.\n- Step 2: It differs from the population distribution because the population distribution describes the spread of individual items, while the sampling distribution describes the spread of *sample summaries* (statistics). For example, even if the population is skewed, the sampling distribution of the mean might cluster around the true mean.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Why is it essential to find the sampling distribution of a statistic before conducting a hypothesis test? (2 steps)", "answer": "- Step 1: A hypothesis test compares an observed sample statistic to what we would expect to see if a null hypothesis were true. The sampling distribution tells us exactly what values the statistic can take and the probability of each occurring *by chance alone* under the null hypothesis.\n- Step 2: Without the sampling distribution, we have no baseline for comparison. We wouldn't know whether an observed sample mean is typical or extreme. The sampling distribution provides the probabilities needed to calculate the p-value or critical region, allowing us to determine if real-life data fits the model.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "A random variable $$X$$ is defined as 1 (success) or 0 (failure) for an individual. If you take a random sample of size $$n$$ and define the statistic $$Y = \\sum_{i=1}^n X_i$$, what is the sampling distribution of $$Y$$, and what conditions make this true? (3 steps)", "answer": "- Step 1: The sampling distribution of $$Y$$ is a **Binomial distribution**: $$Y \\sim B(n, p)$$, where $$p$$ is the probability of success in the population.\n- Step 2: This occurs because the sampling process satisfies the binomial conditions: each observation is **independent**, the probability $$p$$ is **constant** for each trial, and each outcome is a binary **success/failure**.\n- Step 3: Since $$Y$$ is simply the count of successes across $$n$$ independent trials with constant probability, the sum of these Bernoulli random variables naturally forms a Binomial distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "A population of lightbulbs has wattages of 60W (probability 3/4) and 100W (probability 1/4). If a sample of 3 bulbs is taken, intuitively explain why $$P(\\bar{X} = 60)$$ is much larger than $$P(\\bar{X} = 100)$$. (2 steps)", "answer": "- Step 1: For $$\\bar{X} = 60$$, *all three* bulbs in the sample must be 60W. The probability is $$\\left(\\frac{3}{4}\\right)^3 = \\frac{27}{64}$$.\n- Step 2: For $$\\bar{X} = 100$$, *all three* bulbs must be 100W. The probability is $$\\left(\\frac{1}{4}\\right)^3 = \\frac{1}{64}$$. Since 60W bulbs are overwhelmingly more common in the population, a sample consisting entirely of 60W bulbs is far more likely than a sample consisting entirely of the rare 100W bulbs.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "In a sample of 3 items drawn from a population, the mode can sometimes be undefined. Under what specific condition does a sample of size 3 have no mode, and how is this handled when finding the sampling distribution of the mode $$M$$? (2 steps)", "answer": "- Step 1: A sample of size 3 has no mode if all three items are distinct (e.g., values 0, 1, 2). It also has no mode if two different values appear with equal highest frequency (e.g., two 0s and two 1s in a sample of 4).\n- Step 2: In constructing the sampling distribution of the mode, any sample where the mode is undefined must either be excluded from the \"mode\" distribution, or the probability of these \"no mode\" outcomes must be accounted for in a separate category. This highlights that not all statistics are defined for every possible sample.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "When finding the sampling distribution of the median for a sample of size 3, how does the calculation of $$P(\\text{median} = x)$$ fundamentally differ from finding the mode? (2 steps)", "answer": "- Step 1: The **median** of a sample of size 3 is simply the middle value when ordered. To find $$P(\\text{median} = x)$$, you must consider all combinations where the middle ordered value is $$x$$. This includes cases where exactly one item is $$x$$ and the others are on opposite sides, or all three items are $$x$$, or two items are $$x$$.\n- Step 2: The **mode**, however, requires counting the most frequent value. You must sum the probabilities of all samples where a specific value appears at least twice and is the most frequent. The mathematical conditions for \"middle ordered value\" (median) vs \"most frequent value\" (mode) require summing entirely different sets of sample probabilities.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A box of coins contains 5p, 10p, and 20p coins in the ratio 3:2:1. If a sample of 2 coins is taken, what are the probabilities of drawing each coin type, and why is it important to list all possible ordered samples before finding a sampling distribution? (2 steps)", "answer": "- Step 1: The total ratio parts are $$3 + 2 + 1 = 6$$. Therefore, $$P(5\\text{p}) = \\frac{3}{6} = \\frac{1}{2}$$, $$P(10\\text{p}) = \\frac{2}{6} = \\frac{1}{3}$$, and $$P(20\\text{p}) = \\frac{1}{6}$$.\n- Step 2: Listing all possible ordered samples (e.g., (5, 5), (5, 10), (10, 5), etc.) is crucial because the sampling distribution of a statistic depends on the probability of *each specific ordered sample* occurring. Since (5, 10) and (10, 5) are distinct ordered outcomes, they have separate probabilities that must be summed to find the total probability of a given statistic value.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Using the coin population from the previous question (5p with $$p=\\frac{1}{2}$$, 10p with $$p=\\frac{1}{3}$$, 20p with $$p=\\frac{1}{6}$$), find $$P(\\bar{X} = 7.5)$$ for a sample of size 2. (3 steps)", "answer": "- Step 1: The sample mean $$\\bar{X} = 7.5$$ implies the sum of the two coins is $$7.5 \\times 2 = 15$$. The only way to get a sum of 15 is by drawing one 5p coin and one 10p coin.\n- Step 2: The ordered samples that yield a sum of 15 are (5, 10) and (10, 5). Since draws are independent, we multiply probabilities for each sequence.\n+ $$P(5 \\text{ then } 10) = \\frac{1}{2} \\times \\frac{1}{3} = \\frac{1}{6}$$\n+ $$P(10 \\text{ then } 5) = \\frac{1}{3} \\times \\frac{1}{2} = \\frac{1}{6}$$\n- Step 3: The total probability is the sum of these mutually exclusive ordered samples: $$P(\\bar{X} = 7.5) = \\frac{1}{6} + \\frac{1}{6} = \\frac{1}{3}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Let $$X_1, X_2, \\dots, X_n$$ be independent observations from a population with mean $$\\mu$$. Intuitively, why does the expected value of the sample mean $$E(\\bar{X})$$ equal $$\\mu$$? (2 steps)", "answer": "- Step 1: Each individual observation $$X_i$$ is drawn from the same population, so each has an expected value of $$E(X_i) = \\mu$$.\n- Step 2: The sample mean $$\\bar{X} = \\frac{1}{n} \\sum X_i$$. By the linearity of expectation, $$E(\\bar{X}) = \\frac{1}{n} \\sum E(X_i) = \\frac{1}{n} (n\\mu) = \\mu$$. This means the sampling distribution of the mean is centered on the true population mean; it is an unbiased estimator.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Why does the variance of the sample mean, $$\\text{Var}(\\bar{X})$$, decrease as the sample size $$n$$ increases? Walk through the logic for $$n=3$$. (3 steps)", "answer": "- Step 1: Because the observations are independent, the variance of their sum is the sum of their variances: $$\\text{Var}(\\sum X_i) = n\\sigma^2$$.\n- Step 2: When we divide by $$n$$ to get the mean, we apply the rule $$\\text{Var}(aX) = a^2\\text{Var}(X)$$. So, $$\\text{Var}(\\bar{X}) = \\text{Var}\\left(\\frac{1}{n}\\sum X_i\\right) = \\left(\\frac{1}{n}\\right)^2 \\text{Var}(\\sum X_i) = \\frac{1}{n^2}(n\\sigma^2) = \\frac{\\sigma^2}{n}$$.\n- Step 3: For $$n=3$$, $$\\text{Var}(\\bar{X}) = \\frac{\\sigma^2}{3}$$. Intuitively, as $$n$$ grows, the fraction $$\\frac{1}{n}$$ shri
